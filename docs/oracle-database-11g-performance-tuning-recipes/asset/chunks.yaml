    The default value of the `LOG_BUFFER` parameter is way too small for many databases.
    Oracle states that you don''t normally need to set a value larger than 1 MB for
    this parameter. However, you shouldn''t hesitate to raise it to a much larger
    amount, if it''s warranted by circumstances.'
  trans: '#### 工作原理


    Oracle 数据库智能闪存缓存是 Oracle Database 11.2 版本的一项功能，作为数据库服务器企业版的一部分包含在内。闪存缓存利用了基于闪存设备的
    I/O 速度优势，其性能远优于基于磁盘的存储。例如，小型基于磁盘的读取提供 4 毫秒的响应时间，而基于闪存的设备执行相同的读取仅需 0.4 毫秒。


    请注意，闪存缓存实际上是一个只读缓存——当因空间压力导致未修改的（干净的）数据块从缓冲区缓存中被淘汰时，这些块会被移至闪存缓存。如果之后需要它们，数据库会将这些已传输的数据块从闪存缓存移回系统全局区。假设您和
    Oracle 数据库总能访问无限内存并不总是现实的。如果您最多只能为 Oracle 系统全局区分配 12 GB，但结果证明如果拥有 50 GB 内存，数据库运行速度会快得多呢？Oracle
    数据库智能闪存缓存正是为这类情况设计的。


    Oracle 建议您将闪存缓存的大小设置为缓冲区缓存大小的一个倍数。这里没有硬性规定：请采用试错法，将其设置为缓冲区缓存大小的一到十倍之间，并校准结果。Oracle
    还建议，如果`db file sequential read`等待事件成为首要等待事件，并且您有足够的 CPU 容量，应考虑使用闪存缓存。


    一旦启用闪存缓存，Oracle 会将数据块从缓冲区缓存移至闪存缓存（您创建的文件），并将有关这些块的元数据保存在数据库缓冲区缓存中。根据移入闪存缓存的块数量，您可能需要调高`MEMORY_TARGET`参数的值，以免累积的元数据影响留给其他组件的内存量。


    Oracle 为闪存缓存存储提供了两种设备——Sun Storage F5100 Flash Array 和 Sun Flash Accelerator F20
    PCIe Card。由于您只能指定一个闪存设备，因此需要一个卷管理器。根据 Oracle 的测试，Oracle 自动存储管理器是这些设备的最佳卷管理器。


    如果您在 Oracle 真正应用集群环境中使用闪存缓存，则必须为每个实例创建一个单独的闪存缓存文件路径，并且还需要为每个实例的闪存缓存创建一个单独的自动存储管理磁盘组。


    Oracle 对数据库智能闪存缓存功能的测试表明，它特别适合 I/O 受限的工作负载。如果并发的只读事务量非常大，磁盘系统在某个时间点后可能会饱和。Oracle
    数据库智能闪存缓存通过处理更多的每秒 I/O 操作来提高此类系统的吞吐量。Oracle 对此功能的测试结果还显示，当引入智能闪存缓存来处理因磁盘 I/O 吞吐量达到上限而面临显著性能下降的工作负载时，响应时间提高了五倍。截至本书撰写时，Oracle
    仅针对完全或主要是只读操作的工作负载做出这些声明。虽然 Oracle 仍在测试闪存缓存对写密集型工作负载的效果，但请注意，即使对于只读操作，使用闪存缓存减少磁盘系统的负载也意味着您将有更多的
    I/O 带宽来处理写操作。


    ### 3-13. 调优重做日志缓冲区


    #### 问题


    您想知道如何调优重做日志缓冲区，因为您查看了几份 AWR 报告，其中指出生产数据库的重做日志缓冲区设置过小。


    #### 解决方案


    您通过设置初始化参数`LOG_BUFFER`的值来配置重做日志缓冲区的大小。此参数是静态的，因此对其任何更改都需要重启数据库。您在`init.ora`文件中按如下方式设置该参数：


    ```

    log_buffer=4096000

    ```


    您也可以使用以下`ALTER SYSTEM`语句来更改日志缓冲区的大小：


    ```

    SQL> alter system set log_buffer=4096000 scope=spfile;

    系统已更改

    SQL>

    ```


    对于许多数据库而言，`LOG_BUFFER`参数的默认值太小。Oracle 声明通常无需为此参数设置大于 1 MB 的值。但是，如果情况需要，您应该毫不犹豫地将其提高到更大的数值。'
- fmt: "# How It Works\n\n当 Oracle 服务器处理缓冲区高速缓存中的数据块时，这些更改会首先以重做日志条目的形式写入重做日志，然后才被写入磁盘。重做日志条目使数据库能够通过各种操作（如\
    \ `INSERT`、`UPDATE` 和 `DELETE`）以及 DDL 操作来重做或重建数据库更改。因此，Oracle 重做日志对于任何数据库恢复都至关重要，因为正是这些重做日志条目使数据库能够应用从过去某个时间点开始对数据库所做的所有更改。然而，更改的数据不会直接进入重做日志；Oracle\
    \ 首先将更改写入一个名为重做日志缓冲区的内存区域。你可以使用 `LOG_BUFFER` 参数来配置这个内存缓冲区的大小。Oracle 日志写入器（LGWR）进程将重做日志缓冲区条目写入活动的重做日志文件（或文件组）。每当缓冲区填充三分之一时，或者当数据库写入器请求\
    \ LGWR 写入重做日志文件时，LGWR 会将缓冲区的内容刷新到磁盘。此外，在每次服务器进程执行 `COMMIT` 或 `ROLLBACK` 时，LGWR\
    \ 进程都会将缓冲区的内容写入磁盘上的重做日志文件。\n\n重做日志缓冲区是一个可重用的缓存，因此当条目被写出到重做日志文件时，用户进程会将新的条目复制到重做日志缓冲区中。虽然\
    \ LGWR 通常工作得足够快，使得缓冲区中有空间，但更大的缓冲区总是有更多的空间容纳新条目。由于增大 `LOG_BUFFER` 大小没有任何成本，因此可以将其设置为高于该参数建议的最大值\
    \ 1 MB。\n\n如果你的数据库正在处理大型更新，即使没有 `COMMIT` 语句，LGWR 也必须频繁地将重做日志缓冲区刷新到重做日志文件中，以保持缓冲区填充不超过三分之一。在这种情况下，增加重做日志缓冲区的大小是一个可以接受的解决方案，并允许\
    \ LGWR 跟上大量进入重做日志缓冲区的条目。如果你认为 LGWR 进程的性能不够快，这也在某些方面抵消了缓慢的 I/O 系统的影响。有几种方法可以减轻重做日志缓冲区的压力：你可以对所有批处理作业批量执行\
    \ `COMMIT` 操作，并在可能的情况下（例如在常规数据加载期间）指定 `NOLOGGING` 选项。当你在数据加载期间指定 `NOLOGGING` 选项时，Oracle\
    \ 不需要使用重做日志文件，因此也会绕过重做日志缓冲区。\n\n调整 `LOG_BUFFER` 参数的大小相当容易。只需执行以下语句来获取当前的“重做日志空间请求比率”：\n\
    ```sql\nSQL> select round(t.value/s.value,5) \"Redo Log Space Request Ratio\"\n\
    \     from v$sysstat s, v$sysstat t\n     where s.name = 'redo log space requests'\n\
    \     and t.name = 'redo entries'\n```\n重做日志空间请求比率只是总重做日志空间请求与重做条目的比率。你也可以查询 `V$SYSSTAT`\
    \ 视图以查找统计信息 `redo buffer allocation retries` 的值。此统计信息显示进程等待重做日志缓冲区空间的次数：\n```sql\n\
    SQL> select name,value from V$SYSSTAT\n     where name= 'redo buffer allocation\
    \ retries';\n```\n在一段时间内多次执行此 SQL 查询。如果“重做缓冲区分配重试”统计信息的值在此时间段内稳定上升，则表明重做日志缓冲区正面临空间压力，因此进程正在等待将其重做日志条目写入重做日志缓冲区。如果你持续看到这种情况，就必须增加重做日志缓冲区的大小。\n\
    \n## Chapter 4: Monitoring System Performance\n\n监控系统和数据库性能是一项复杂的任务，管理性能可能涉及许多方面，包括内存、磁盘、CPU、数据库对象和数据库用户会话——这仅仅是个开始。本章重点介绍如何使用\
    \ Oracle 的自动工作负载存储库（AWR）来收集有关数据库中发生活动的数据，并帮助将这些原始数据转换为有用的信息，以评估特定时间段内数据库的性能。通常，当数据库中出现性能问题时，很容易知道性能问题何时发生，因为在此给定时间段内数据库活动“缓慢”。知道这个时间段是使用\
    \ AWR 信息执行分析的起点。\n\n当你创建 Oracle 数据库时，AWR 会自动创建，并自动收集数据库中活动的统计数据。其中一些数据是实时或接近实时的，有些数据则代表这些活动的历史统计信息。关于活动会话的最新数据存储在性能统计信息存储库的活动会话历史（ASH）组件中。更早的历史数据快照通常称为\
    \ AWR 快照。\n\nAWR 进程默认从 Oracle 的动态性能视图捕获每小时快照，并将其存储在 AWR 中。这使得 DBA 能够查看任何时间段内的数据库活动，无论是单个小时的时间段，还是\
    \ AWR 中存储的所有活动。例如，如果你有一段时间数据库性能较差，你可以生成一个 AWR 报告，该报告将仅提供该特定时间段内的数据库活动统计信息。\n\n\
    ASH 组件旨在为 DBA 提供更实时的会话信息视图，这些信息不会捕获在 AWR 快照中。ASH 存储库中存储的会话信息是每秒从动态性能视图采样一次的数据。\n\
    \nOracle 多年来通过其前身 UTLBSTAT/UTLESTAT 和 Statspack 在数据库中拥有类似的信息，但直到 Oracle 10g 推出\
    \ AWR 后，报告数据才会自动生成或保存。现在，这些信息可以更轻松地监控数据库性能，无论是分析数据库中当前活动的实时数据，还是分析历史数据（根据数据库中\
    \ AWR 的配置，这些数据可能已有数天、数周甚至数月之久）。\n\n### 4-1. Implementing Automatic Workload Repository\
    \ (AWR)\n\n#### Problem\n\n你希望为调优目的在数据库中存储历史数据库性能统计信息。\n\n#### Solution\n\n通过在数据库中实施和使用自动工作负载存储库（AWR），Oracle\
    \ 将基于间隔的历史统计信息存储在你的数据库中以供将来参考。此信息可用于查看给定时间段内数据库中发生的情况。默认情况下，应启用数据库中的 AWR。需要验证的关键初始化参数是\
    \ `STATISTICS_LEVEL` 参数：\n```sql\nSQL> show parameter statistics_level\n\nNAME\
    \                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\nstatistics_level               \
    \      string      TYPICAL\n```\n此参数可设置为 `BASIC`、`TYPICAL`（默认值）和 `ALL`。只要参数设置为\
    \ `TYPICAL` 或 `ALL`，就会为 AWR 收集统计信息。如果参数设置为 `BASIC`，你只需修改参数即可开始为数据库收集 AWR 统计信息：\n\
    ```sql\nalter system set statistics_level=TYPICAL scope=both;\n```"
  raw: '#### How It Works


    When the Oracle server processes change data blocks in the buffer cache, those
    changes are written to the redo logs in the form of redo log entries, before they
    are written to disk. The redo log entries enable the database to redo or reconstruct
    the database changes by using various operations such as `INSERT`, `UPDATE`, and
    `DELETE`, as well as DDL operations. The Oracle redo logs are thus critical for
    any database recovery, because it''s these redo log entries that enable the database
    to apply all the changes made to the database from a point in time in the past.
    The changed data doesn''t directly go to the redo logs, however; Oracle first
    writes the changes to a memory area called the redo log buffer. It''s the value
    of this memory buffer that you can configure with the `LOG_BUFFER` parameter.
    The Oracle log writer (LGWR) process writes the redo log buffer entries to the
    active redo log file (or group of files). LGWR flushes the contents of the buffer
    to disk whenever the buffer is one-third full, or if the database writer requests
    the LGWR to write to the redo log file. Also, upon each `COMMIT` or `ROLLBACK`
    by a server process, the LGWR process writes the contents of the buffer to the
    redo log file on disk.


    The redo log buffer is a re-usable cache, so as entries are written out to the
    redo log file, user processes copy new entries into the redo log buffer. While
    the LGWR usually works fast enough so there''s space in the buffer, a larger buffer
    will always have more room for new entries. Since there''s no cost whatsoever
    to increasing the `LOG_BUFFER` size, feel free to set it to higher than the suggested
    maximum of 1 MB for this parameter.


    If your database is processing large updates, the LGWR has to frequently flush
    the redo log buffer to the redo log files even in the absence of a `COMMIT` statement,
    so as to keep the buffer no more than a third full. Raising the size of the redo
    log buffer is an acceptable solution in this situation, and allows the LGWR to
    catch up with the heavy amount of entries into the redo log buffer. This also
    offsets a slow I/O system in some ways, if you think the performance of the LGWR
    process is not fast enough. There are a couple of ways in which you keep the pressure
    on the redo log buffer down: you can batch `COMMIT` operations for all batch jobs
    and also specify the `NOLOGGING` option where possible, say during regular data
    loads. When you specify the `NOLOGGING` option during a data load, Oracle doesn''t
    need to use the redo log files, and hence it also bypasses the redo log buffer
    as well.


    It''s fairly easy to tune the size of the `LOG_BUFFER` parameter. Just execute
    the following statement to get the current “redo log space request ratio”:


    `SQL> select round(t.value/s.value,5) "Redo Log Space Request Ratio"`

    `     from v$sysstat s, v$sysstat t`

    `     where s.name = ''redo log space requests''`

    `     and t.name = ''redo entries''`


    The redo log space request ratio is simply the ratio of total redo log space requests
    to redo entries. You can also query the `V$SYSSTAT` view to find the value of
    the statistic `redo buffer allocation retries`. This statistic shows the number
    of times processes waited for space in the redo log buffer:


    `SQL> select name,value from V$SYSSTAT`

    `     where name= ''redo buffer allocation retries'';`


    Execute this SQL query multiple times over a period of time. If the value of the
    “redo buffer allocation retries” statistic is rising steadily over this period,
    it indicates that the redo log buffer is under space pressure and as a result,
    processes are waiting to write their redo log entries to the redo log buffer.
    You must increase the size of the redo log buffer if you continue to see this.


    ## C H A P T E R  4


    ## Monitoring System Performance


    Monitoring system and database performance is a complex task, and there can be
    many aspects to managing performance, including memory, disk, CPU, database objects,
    and database user sessions—just for starters. This chapter zeroes in on using
    Oracle’s Automatic Workload Repository (AWR) to gather data about the activities
    occurring within your database, and help convert that raw data into useful information
    to help gauge performance within your database for a specific period of time.
    Usually, when there are performance issues occurring within a database, it''s
    easy to know when the performance problems are occurring because database activity
    is “slow” during that given time frame. Knowing this time frame is the starting
    point to perform the analysis using the AWR information.


    The AWR is created automatically when you create your Oracle database, and automatically
    gathers statistics on the activities occurring within your database. Some of this
    data is real-time or very near real-time, and some of the data represents historical
    statistics on these activities. The most current data on active sessions is stored
    in the Active Session History (ASH) component of the performance statistics repository.
    The more historical snapshots of data are generally known as the AWR snapshots.


    The AWR process captures hourly snapshots by default from Oracle''s dynamic performance
    views, and stores them within the AWR. This gives the DBA the ability to view
    database activity over any period of time, whether it is a single-hour time frame,
    up to all activity that is stored within the AWR. For instance, if you have a
    period of time where your database is performing poorly, you can generate an AWR
    report that will give statistics on the database activity for only that specific
    period of time.


    The ASH component of the AWR is really meant to give the DBA a more real-time
    look at session information that is not captured within the AWR snapshots. The
    session information stored within the ASH repository is data that is sampled every
    second from the dynamic performance views.


    Oracle has had similar information within the database for many years with its
    predecessors UTLBSTAT/UTLESTAT and Statspack, but the report data hasn''t been
    generated or saved automatically until AWR came along with Oracle 10g. This information
    can now help monitor your database performance much more easily, whether it be
    analyzing real-time data on activities currently going on within your database,
    or historical information that could be days, weeks, or even months old, depending
    on the configuration of the AWR within your database.


    ### 4-1. Implementing Automatic Workload Repository (AWR)


    #### Problem


    You want to store historical database performance statistics on your database
    for tuning purposes.


    #### Solution


    By implementing and using the Automatic Workload Repository (AWR) within your
    database, Oracle will store interval-based historical statistics in your database
    for future reference. This information can be used to see what was going on within
    your database within a given period of time. By default, the AWR should be enabled
    within your database. The key initialization parameter to validate is the `STATISTICS_LEVEL`
    parameter:


    `SQL> show parameter statistics_level`


    `NAME                                 TYPE     VALUE`

    `------------------------------------ -------- ------------------------------`

    `statistics_level                     string   TYPICAL`


    This parameter can be set to `BASIC`, `TYPICAL` (which is the default), and `ALL`.
    As long as the parameter is set to `TYPICAL` or `ALL`, statistics will be gathered
    for the AWR. If the parameter is set to `BASIC`, you simply need to modify the
    parameter in order to start gathering AWR statistics for your database:


    `alter system set statistics_level=TYPICAL scope=both;`'
  trans: "\n# 工作原理\n\n当 Oracle 服务器处理缓冲区高速缓存中的数据块时，这些更改会首先以重做日志条目的形式写入重做日志，然后才被写入磁盘。重做日志条目使数据库能够通过各种操作（如\
    \ `INSERT`、`UPDATE` 和 `DELETE`）以及 DDL 操作来重做或重建数据库更改。因此，Oracle 重做日志对于任何数据库恢复都至关重要，因为正是这些重做日志条目使数据库能够应用从过去某个时间点开始对数据库所做的所有更改。然而，更改的数据不会直接进入重做日志；Oracle\
    \ 首先将更改写入一个名为重做日志缓冲区的内存区域。你可以使用 `LOG_BUFFER` 参数来配置这个内存缓冲区的大小。Oracle 日志写入器（LGWR）进程将重做日志缓冲区条目写入活动的重做日志文件（或文件组）。每当缓冲区填充三分之一时，或者当数据库写入器请求\
    \ LGWR 写入重做日志文件时，LGWR 会将缓冲区的内容刷新到磁盘。此外，在每次服务器进程执行 `COMMIT` 或 `ROLLBACK` 时，LGWR\
    \ 进程都会将缓冲区的内容写入磁盘上的重做日志文件。\n\n重做日志缓冲区是一个可重用的缓存，因此当条目被写出到重做日志文件时，用户进程会将新的条目复制到重做日志缓冲区中。虽然\
    \ LGWR 通常工作得足够快，使得缓冲区中有空间，但更大的缓冲区总是有更多的空间容纳新条目。由于增大 `LOG_BUFFER` 大小没有任何成本，因此可以将其设置为高于该参数建议的最大值\
    \ 1MB。\n\n如果你的数据库正在处理大型更新，即使没有 `COMMIT` 语句，LGWR 也必须频繁地将重做日志缓冲区刷新到重做日志文件中，以保持缓冲区填充不超过三分之一。在这种情况下，增加重做日志缓冲区的大小是一个可以接受的解决方案，并允许\
    \ LGWR 跟上大量进入重做日志缓冲区的条目。如果你认为 LGWR 进程的性能不够快，这也在某些方面抵消了缓慢的 I/O 系统的影响。有几种方法可以减轻重做日志缓冲区的压力：你可以对所有批处理作业批量执行\
    \ `COMMIT` 操作，并在可能的情况下（例如在常规数据加载期间）指定 `NOLOGGING` 选项。当你在数据加载期间指定 `NOLOGGING` 选项时，Oracle\
    \ 不需要使用重做日志文件，因此也会绕过重做日志缓冲区。\n\n调整 `LOG_BUFFER` 参数的大小相当容易。只需执行以下语句来获取当前的“重做日志空间请求比率”：\n\
    ```sql\nSQL> select round(t.value/s.value,5) \"Redo Log Space Request Ratio\"\n\
    \     from v$sysstat s, v$sysstat t\n     where s.name = 'redo log space requests'\n\
    \     and t.name = 'redo entries'\n```\n重做日志空间请求比率只是总重做日志空间请求与重做条目的比率。你也可以查询 `V$SYSSTAT`\
    \ 视图以查找统计信息 `redo buffer allocation retries` 的值。此统计信息显示进程等待重做日志缓冲区空间的次数：\n```sql\n\
    SQL> select name,value from V$SYSSTAT\n     where name= 'redo buffer allocation\
    \ retries';\n```\n在一段时间内多次执行此 SQL 查询。如果“重做缓冲区分配重试”统计信息的值在此时间段内稳定上升，则表明重做日志缓冲区正面临空间压力，因此进程正在等待将其重做日志条目写入重做日志缓冲区。如果你持续看到这种情况，就必须增加重做日志缓冲区的大小。\n\
    \n## 第四章：监控系统性能\n\n监控系统和数据库性能是一项复杂的任务，管理性能可能涉及许多方面，包括内存、磁盘、CPU、数据库对象和数据库用户会话——这仅仅是个开始。本章重点介绍如何使用\
    \ Oracle 的自动工作负载存储库（AWR）来收集中有关数据库中发生活动的数据，并帮助将这些原始数据转换为有用的信息，以评估特定时间段内数据库的性能。通常，当数据库中出现性能问题时，很容易知道性能问题何时发生，因为在此给定时间段内数据库活动“缓慢”。知道这个时间段是使用\
    \ AWR 信息执行分析的起点。\n\n当你创建 Oracle 数据库时，AWR 会自动创建，并自动收集数据库中活动的统计数据。其中一些数据是实时或接近实时的，有些数据则代表这些活动的历史统计信息。关于活动会话的最新数据存储在性能统计信息存储库的活动会话历史（ASH）组件中。更早的历史数据快照通常称为\
    \ AWR 快照。\n\nAWR 进程默认从 Oracle 的动态性能视图捕获每小时快照，并将其存储在 AWR 中。这使得 DBA 能够查看任何时间段内的数据库活动，无论是单个小时的时间段，还是\
    \ AWR 中存储的所有活动。例如，如果你有一段时间数据库性能较差，你可以生成一个 AWR 报告，该报告将仅提供该特定时间段内的数据库活动统计信息。\n\n\
    ASH 组件旨在为 DBA 提供更实时的会话信息视图，这些信息不会捕获在 AWR 快照中。ASH 存储库中存储的会话信息是每秒从动态性能视图采样一次的数据。\n\
    \nOracle 多年来通过其前身 UTLBSTAT/UTLESTAT 和 Statspack 在数据库中拥有类似的信息，但直到 Oracle10g 推出\
    \ AWR 后，报告数据才会自动生成或保存。现在，这些信息可以更轻松地监控数据库性能，无论是分析数据库中当前活动的实时数据，还是分析历史数据（根据数据库中\
    \ AWR 的配置，这些数据可能已有数天、数周甚至数月之久）。\n\n### 4-1. 实施自动工作负载存储库（AWR）\n\n#### 问题\n\n你希望为调优目的在数据库中存储历史数据库性能统计信息。\n\
    \n#### 解决方案\n\n通过在数据库中实施和使用自动工作负载存储库（AWR），Oracle 将基于间隔的历史统计信息存储在你的数据库中以供将来参考。此信息可用于查看给定时间段内数据库中发生的情况。默认情况下，应启用数据库中的\
    \ AWR。需要验证的关键初始化参数是 `STATISTICS_LEVEL` 参数：\n```sql\nSQL> show parameter statistics_level\n\
    \nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\nstatistics_level               \
    \      string      TYPICAL\n```\n此参数可设置为 `BASIC`、`TYPICAL`（默认值）和 `ALL`。只要参数设置为\
    \ `TYPICAL` 或 `ALL`，就会为 AWR 收集统计信息。如果参数设置为 `BASIC`，你只需修改参数即可开始为数据库收集 AWR 统计信息：\n\
    ```sql\nalter system set statistics_level=TYPICAL scope=both;\n```\n"
- fmt: "# 4. AWR (Automatic Workload Repository)\n\n## How It Works\n\nAWR的前身是Statspack，它需要手动设置和配置才能启用统计数据收集。如前所述，通常不需要设置，除非`STATISTICS_LEVEL`参数被更改为`BASIC`设置。默认情况下，AWR快照每小时在数据库上拍摄一次，默认存储八天。这些是可配置的设置，如果需要可以进行修改。有关修改AWR快照默认设置的信息，请参阅配方4-2。\n\
    \n除了简单地查看`STATISTICS_LEVEL`参数的值外，您还可以查看`V$STATISTICS_LEVEL`视图以获取此信息，该视图包含有关`STATISTICS_LEVEL`设置以及数据库中所有其他相关统计组件的信息：\n\
    \n```sql\nSELECT statistics_name, activation_level, system_status\nFROM v$statistics_level;\n\
    ```\n\n```\nSTATISTICS_NAME                                  ACTIVAT SYSTEM_S\n\
    ---------------------------------------- ------- --------\nBuffer Cache Advice\
    \                             TYPICAL ENABLED\nMTTR Advice                   \
    \                  TYPICAL ENABLED\nTimed Statistics                         \
    \       TYPICAL ENABLED\nTimed OS Statistics                             ALL \
    \    DISABLED\nSegment Level Statistics                        TYPICAL ENABLED\n\
    PGA Advice                                      TYPICAL ENABLED\nPlan Execution\
    \ Statistics                       ALL     DISABLED\nShared Pool Advice      \
    \                        TYPICAL ENABLED\nModification Monitoring            \
    \             TYPICAL ENABLED\nLongops Statistics                            \
    \  TYPICAL ENABLED\nBind Data Capture                               TYPICAL ENABLED\n\
    Ultrafast Latch Statistics                      TYPICAL ENABLED\nThreshold-based\
    \ Alerts                          TYPICAL ENABLED\nGlobal Cache Statistics   \
    \                      TYPICAL ENABLED\nActive Session History               \
    \           TYPICAL ENABLED\nUndo Advisor, Alerts and Fast Ramp up           TYPICAL\
    \ ENABLED\nStreams Pool Advice                             TYPICAL ENABLED\nTime\
    \ Model Events                               TYPICAL ENABLED\nPlan Execution Sampling\
    \                         TYPICAL ENABLED\nAutomated Maintenance Tasks       \
    \              TYPICAL ENABLED\nSQL Monitoring                               \
    \   TYPICAL ENABLED\nAdaptive Thresholds Enabled                     TYPICAL ENABLED\n\
    V$IOSTAT_* statistics                           TYPICAL ENABLED\nSession Wait\
    \ Stack                              TYPICAL ENABLED\n\n24 rows selected.\n```\n\
    \nAWR中存储的信息类型包括以下内容：\n\n*   关于对象访问和使用的统计信息\n*   时间模型统计信息\n*   系统统计信息\n*   会话统计信息\n\
    *   SQL语句\n\n收集的信息然后按类别进行分组和格式化。报告中找到的一些类别包括以下内容：\n\n*   实例效率\n*   前5个定时事件\n*\
    \   内存和CPU统计信息\n*   等待信息\n*   SQL语句信息\n*   各种操作系统和数据库统计信息\n*   数据库文件和表空间使用信息\n\
    \n![images](images/square.jpg) 注意 要使用AWR功能，必须满足以下条件。首先，您必须拥有Oracle Diagnostics\
    \ Pack的许可，否则您需要使用Statspack。其次，`CONTROL_MANAGEMENT_PACK_ACCESS`参数必须设置为`DIAGNOSTIC+TUNING`或`DIAGNOSTIC`。\n\
    \n## 4-2. 修改统计信息间隔和保留期\n\n### 问题\n\n您需要将AWR快照的间隔或保留期设置为默认值以外的值。\n\n### 解决方案\n\n\
    通过使用`DBMS_WORKLOAD_REPOSITORY` PL/SQL包，您可以修改数据库的默认快照设置。为了首先验证AWR快照的当前保留和间隔设置，请运行以下查询：\n\
    \n```sql\nSQL> column awr_snapshot_retention_period format a40\nSQL> SELECT EXTRACT(day\
    \ from retention) || ':' ||\n       EXTRACT(hour from retention) || ':' ||\n \
    \      EXTRACT (minute from retention)  awr_snapshot_retention_period,\n     \
    \  EXTRACT (day from snap_interval) *24*60+\n       EXTRACT (hour from snap_interval)\
    \ *60+\n       EXTRACT (minute from snap_interval) awr_snapshot_interval\nFROM\
    \ dba_hist_wr_control;\n```\n\n```\nAWR_SNAPSHOT_RETENTION_PERIOD      AWR_SNAPSHOT_INTERVAL\n\
    ------------------------------ ---------------------\n8:13:45                \
    \                            60\n```\n\n上面显示的保留期输出采用日：时：分格式。因此，我们当前的保留期是8天13小时45分钟。间隔，即收集AWR快照的频率，在前面的示例中是60分钟。然后，要修改保留期和间隔设置，您可以使用`DBMS_WORKLOAD_REPOSITORY`包的`MODIFY_SNAPSHOT_SETTINGS`过程。要更改数据库的这些设置，请发出如下示例所示的命令，该示例将保留期修改为30天（以分钟数指定），并将拍摄快照的快照间隔修改为30分钟。当然，您可以选择只设置一个参数或另一个参数，而不必同时更改两个设置。以下示例仅出于演示目的显示了两个参数：\n\
    \n```sql\nSQL> exec DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(retention=>43200,\
    \ interval=>30);\n```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n\
    然后，您可以简单地重新运行来自`DBA_HIST_WR_CONTROL`数据字典视图的查询，以验证您的更改现已生效：\n\n```sql\nSQL> /\n\
    ```\n\n```\nAWR_SNAPSHOT_RETENTION_PERIOD               AWR_SNAPSHOT_INTERVAL\n\
    ---------------------------------------- ---------------------\n30:0:0       \
    \                                                   30\n```\n\n### 工作原理\n\n修改数据库的默认设置通常是一个好主意，因为八天的保留期在诊断可能的数据库问题或在数据库上执行数据库调优活动时通常不够。例如，如果您被告知月度流程存在问题，那么表示该流程上次成功执行的普通时间框架将不再可用，除非快照存储了给定的间隔。因此，如果可能的话，最好存储至少45天的快照，或者如果数据库上的存储不是问题，则存储更长时间。如果您希望快照无限期存储，可以指定零值，这告诉Oracle无限期保留快照信息（实际上是40,150天，或110年）。请参见以下示例：\n\
    \n```sql\nSQL> exec DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(retention=>0);\n\
    ```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n```sql\nSQL> /\n\
    ```\n\n```\nAWR_SNAPSHOT_RETENTION_PERIOD               AWR_SNAPSHOT_INTERVAL\n\
    ---------------------------------------- ---------------------\n40150:0:0    \
    \                                                  30\n```\n\n默认的快照间隔为一小时，对于大多数数据库来说通常足够精细，因为当有更频繁或更接近实时的需求时，您可以使用活动会话历史（ASH）信息。通过将默认快照间隔增加到大于一小时，实际上可能使诊断性能问题变得更加困难，因为增加窗口的统计信息可能使得更难区分和识别特定时间段内的性能问题。\n\
    \n## 4-3. 手动生成 AWR 报告\n\n### 问题\n\n您想要生成一个AWR报告，并知道收集信息的时间范围。"
  raw: '#### How It Works


    The predecessor of AWR, which is Statspack, requires manual setup and configuration
    to enable the statistics gathering. As stated, there generally is no setup required,
    unless the `STATISTICS_LEVEL` parameter has been changed to the `BASIC` setting.
    By default, an AWR snapshot is taken every hour on your database, and is stored,
    by default, for eight days. These are configurable settings that can be modified,
    if desired. See Recipe 4-2 for information on modifying the default settings of
    the AWR snapshots.


    In addition to simply seeing the value of the `STATISTICS_LEVEL` parameter, you
    can also view the `V$STATISTICS_LEVEL` view to see this information, which has
    information on the `STATISTICS_LEVEL` setting, as well as all other relevant statistical
    components within your database:


    `SELECT statistics_name, activation_level, system_status`

    `FROM v$statistics_level;`


    `STATISTICS_NAME                          ACTIVAT SYSTEM_S`

    `---------------------------------------- ------- --------`

    `Buffer Cache Advice                      TYPICAL ENABLED`

    `MTTR Advice                              TYPICAL ENABLED`

    **`Timed Statistics`****`TYPICAL ENABLED`**

    `Timed OS Statistics                      ALL     DISABLED`

    `Segment Level Statistics                 TYPICAL ENABLED`

    `PGA Advice                               TYPICAL ENABLED`

    `Plan Execution Statistics                ALL     DISABLED`

    `Shared Pool Advice                       TYPICAL ENABLED`

    `Modification Monitoring                  TYPICAL ENABLED`

    `Longops Statistics                       TYPICAL ENABLED`

    `Bind Data Capture                        TYPICAL ENABLED`

    `Ultrafast Latch Statistics               TYPICAL ENABLED`

    `Threshold-based Alerts                   TYPICAL ENABLED`

    `Global Cache Statistics                  TYPICAL ENABLED`

    `Active Session History                   TYPICAL ENABLED`

    `Undo Advisor, Alerts and Fast Ramp up    TYPICAL ENABLED`

    `Streams Pool Advice                      TYPICAL ENABLED`

    `Time Model Events                        TYPICAL ENABLED`

    `Plan Execution Sampling                  TYPICAL ENABLED`

    `Automated Maintenance Tasks              TYPICAL ENABLED`

    `SQL Monitoring                           TYPICAL ENABLED`

    `Adaptive Thresholds Enabled              TYPICAL ENABLED`

    `V$IOSTAT_* statistics                    TYPICAL ENABLED`

    `Session Wait Stack                       TYPICAL ENABLED`


    `24 rows selected.`


    The type of information that is stored in the AWR includes the following:


    *   Statistics regarding object access and usage

    *   Time model statistics

    *   System statistics

    *   Session statistics

    *   SQL statements


    The information gathered is then grouped and formatted by category. Some of the
    categories found on the report include the following:


    *   Instance efficiency

    *   Top 5 timed events

    *   Memory and CPU statistics

    *   Wait information

    *   SQL statement information

    *   Miscellaneous operating system and database statistics

    *   Database file and tablespace usage information


    ![images](images/square.jpg) **Note** To use AWR functionality, the following
    must apply. First, you must be licensed for the Oracle Diagnostics Pack, otherwise
    you need to use Statspack. Second, the `CONTROL_MANAGEMENT_PACK_ACCESS` parameter
    must be set to `DIAGNOSTIC+TUNING` or `DIAGNOSTIC`.


    ### 4-2. Modifying the Statistics Interval and Retention Periods


    #### Problem


    You need to set an interval or retention period for your AWR snapshots to values
    other than the default.


    #### Solution


    By using the `DBMS_WORKLOAD_REPOSITORY` PL/SQL package, you can modify the default
    snapshot settings for your database. In order to first validate your current retention
    and interval settings for your AWR snapshots, run the following query:


    `SQL> column awr_snapshot_retention_period format a40`

    `SQL> SELECT EXTRACT(day from retention) || '':'' ||`

    `       EXTRACT(hour from retention) || '':'' ||`

    `       EXTRACT (minute from retention)  awr_snapshot_retention_period,`

    `       EXTRACT (day from snap_interval) *24*60+`

    `       EXTRACT (hour from snap_interval) *60+`

    `       EXTRACT (minute from snap_interval) awr_snapshot_interval`

    `FROM dba_hist_wr_control;`


    `AWR_SNAPSHOT_RETENTION_PERIOD  AWR_SNAPSHOT_INTERVAL`

    `------------------------------ ---------------------`

    `8:13:45                                           60`


    The retention period output just shown is in day:hour:minute format. So, our current
    retention period is 8 days, 13 hours, and 45 minutes. The interval, or how often
    the AWR snapshots will be gathered, is 60 minutes in the foregoing example. To
    then modify the retention period and interval settings, you can use the `MODIFY_SNAPSHOT_SETTINGS`
    procedure of the `DBMS_WORKLOAD_REPOSITORY` package. To change these settings
    for your database, issue a command such as the following example, which modifies
    the retention period to 30 days (specified by number of minutes), and the snapshot
    interval at which snapshots are taken to 30 minutes. Of course, you can choose
    to simply set one parameter or the other, and do not have to change both settings.
    The following example shows both parameters simply for demonstration purposes:


    `SQL> exec DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(retention=>43200,
    interval=>30);`


    `PL/SQL procedure successfully completed.`


    You can then simply rerun the query from the `DBA_HIST_WR_CONTROL` data dictionary
    view in order to validate that your change is now in effect:


    `SQL> /`


    `AWR_SNAPSHOT_RETENTION_PERIOD            AWR_SNAPSHOT_INTERVAL`

    `---------------------------------------- ---------------------`

    `30:0:0                                                      30`


    #### How It Works


    It is generally a good idea to modify the default settings for your database,
    as eight days of retention is often not enough when diagnosing possible database
    issues or performing database tuning activities on your database. If you have
    been notified of a problem for a monthly process, for example, the last time frame
    that denoted an ordinary and successful execution of the process would no longer
    be available, unless snapshots were stored for the given interval. Because of
    this, it is a good idea to store a minimum of 45 days of snapshots, if at all
    possible, or even longer if storage is not an issue on your database. If you want
    your snapshots to be stored for an unlimited amount of time, you can specify a
    zero value, which tells Oracle to keep the snapshot information indefinitely (actually,
    for 40,150 days, or 110 years). See the following example:


    `SQL> exec DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(retention=>0);`


    `PL/SQL procedure successfully completed.`


    `SQL> /`


    `AWR_SNAPSHOT_RETENTION_PERIOD            AWR_SNAPSHOT_INTERVAL`

    `---------------------------------------- ---------------------`

    `40150:0:0                                                   30`


    The default snapshot interval of one hour is usually granular enough for most
    databases, as when there are more frequent or closer to real-time needs, you can
    use the Active Session History (ASH) information. By increasing the default snapshot
    interval to greater than one hour, it can actually make it more difficult to diagnose
    performance issues, as statistics for the increased window may make it harder
    to distinguish and identify performance issues for a given time period.


    ### 4-3. Generating an AWR Report Manually


    #### Problem


    You want to generate an AWR report, and know the time frame on which to gather
    information.'
  trans: "# 4. AWR（自动工作负载存储库）\n\n## 工作原理\n\nAWR 的前身是 Statspack，它需要手动设置和配置才能启用统计数据收集。如前所述，通常不需要设置，除非`STATISTICS_LEVEL`参数被更改为`BASIC`设置。默认情况下，AWR\
    \ 快照每小时在数据库上拍摄一次，默认存储八天。这些是可配置的设置，如果需要可以进行修改。有关修改 AWR 快照默认设置的信息，请参阅配方 4-2。\n\n\
    除了简单地查看`STATISTICS_LEVEL`参数的值外，您还可以查看`V$STATISTICS_LEVEL`视图以获取此信息，该视图包含有关`STATISTICS_LEVEL`设置以及数据库中所有其他相关统计组件的信息：\n\
    \n```sql\nSELECT statistics_name, activation_level, system_status\nFROM v$statistics_level;\n\
    ```\n\n```\nSTATISTICS_NAME                                  ACTIVAT SYSTEM_S\n\
    ---------------------------------------- ------- --------\nBuffer Cache Advice\
    \                             TYPICAL ENABLED\nMTTR Advice                   \
    \                  TYPICAL ENABLED\nTimed Statistics                         \
    \       TYPICAL ENABLED\nTimed OS Statistics                             ALL \
    \    DISABLED\nSegment Level Statistics                        TYPICAL ENABLED\n\
    PGA Advice                                      TYPICAL ENABLED\nPlan Execution\
    \ Statistics                       ALL     DISABLED\nShared Pool Advice      \
    \                        TYPICAL ENABLED\nModification Monitoring            \
    \             TYPICAL ENABLED\nLongops Statistics                            \
    \  TYPICAL ENABLED\nBind Data Capture                               TYPICAL ENABLED\n\
    Ultrafast Latch Statistics                      TYPICAL ENABLED\nThreshold-based\
    \ Alerts                          TYPICAL ENABLED\nGlobal Cache Statistics   \
    \                      TYPICAL ENABLED\nActive Session History               \
    \           TYPICAL ENABLED\nUndo Advisor, Alerts and Fast Ramp up           TYPICAL\
    \ ENABLED\nStreams Pool Advice                             TYPICAL ENABLED\nTime\
    \ Model Events                               TYPICAL ENABLED\nPlan Execution Sampling\
    \                         TYPICAL ENABLED\nAutomated Maintenance Tasks       \
    \              TYPICAL ENABLED\nSQL Monitoring                               \
    \   TYPICAL ENABLED\nAdaptive Thresholds Enabled                     TYPICAL ENABLED\n\
    V$IOSTAT_* statistics                           TYPICAL ENABLED\nSession Wait\
    \ Stack                              TYPICAL ENABLED\n\n24 rows selected.\n```\n\
    \nAWR 中存储的信息类型包括以下内容：\n\n*   关于对象访问和使用的统计信息\n*   时间模型统计信息\n*   系统统计信息\n*   会话统计信息\n\
    *   SQL 语句\n\n收集的信息然后按类别进行分组和格式化。报告中找到的一些类别包括以下内容：\n\n*   实例效率\n*   前 5 个定时事件\n\
    *   内存和 CPU 统计信息\n*   等待信息\n*   SQL 语句信息\n*   各种操作系统和数据库统计信息\n*   数据库文件和表空间使用信息\n\
    \n![images](img/square.jpg) 注意 要使用 AWR 功能，必须满足以下条件。首先，您必须拥有 Oracle Diagnostics\
    \ Pack 的许可，否则您需要使用 Statspack。其次，`CONTROL_MANAGEMENT_PACK_ACCESS`参数必须设置为`DIAGNOSTIC+TUNING`或`DIAGNOSTIC`。\n\
    \n## 4-2. 修改统计信息间隔和保留期\n\n### 问题\n\n您需要将 AWR 快照的间隔或保留期设置为默认值以外的值。\n\n### 解决方案\n\
    \n通过使用`DBMS_WORKLOAD_REPOSITORY` PL/SQL 包，您可以修改数据库的默认快照设置。为了首先验证 AWR 快照的当前保留和间隔设置，请运行以下查询：\n\
    \n```sql\nSQL> column awr_snapshot_retention_period format a40\nSQL> SELECT EXTRACT(day\
    \ from retention) || ':' ||\n       EXTRACT(hour from retention) || ':' ||\n \
    \      EXTRACT (minute from retention)  awr_snapshot_retention_period,\n     \
    \  EXTRACT (day from snap_interval) *24*60+\n       EXTRACT (hour from snap_interval)\
    \ *60+\n       EXTRACT (minute from snap_interval) awr_snapshot_interval\nFROM\
    \ dba_hist_wr_control;\n```\n\n```\nAWR_SNAPSHOT_RETENTION_PERIOD      AWR_SNAPSHOT_INTERVAL\n\
    ------------------------------ ---------------------\n8:13:45                \
    \                            60\n```\n\n上面显示的保留期输出采用日：时：分格式。因此，我们当前的保留期是 8 天 13\
    \ 小时 45 分钟。间隔，即收集 AWR 快照的频率，在前面的示例中是 60 分钟。然后，要修改保留期和间隔设置，您可以使用`DBMS_WORKLOAD_REPOSITORY`包的`MODIFY_SNAPSHOT_SETTINGS`过程。要更改数据库的这些设置，请发出如下示例所示的命令，该示例将保留期修改为\
    \ 30 天（以分钟数指定），并将拍摄快照的快照间隔修改为 30 分钟。当然，您可以选择只设置一个参数或另一个参数，而不必同时更改两个设置。以下示例仅出于演示目的显示了两个参数：\n\
    \n```sql\nSQL> exec DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(retention=>43200,\
    \ interval=>30);\n```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n\
    然后，您可以简单地重新运行来自`DBA_HIST_WR_CONTROL`数据字典视图的查询，以验证您的更改现已生效：\n\n```sql\nSQL> /\n\
    ```\n\n```\nAWR_SNAPSHOT_RETENTION_PERIOD               AWR_SNAPSHOT_INTERVAL\n\
    ---------------------------------------- ---------------------\n30:0:0       \
    \                                                   30\n```\n\n### 工作原理\n\n修改数据库的默认设置通常是一个好主意，因为八天的保留期在诊断可能的数据库问题或在数据库上执行数据库调优活动时通常不够。例如，如果您被告知月度流程存在问题，那么表示该流程上次成功执行的普通时间框架将不再可用，除非快照存储了给定的间隔。因此，如果可能的话，最好存储至少\
    \ 45 天的快照，或者如果数据库上的存储不是问题，则存储更长时间。如果您希望快照无限期存储，可以指定零值，这告诉 Oracle 无限期保留快照信息（实际上是\
    \ 40,150 天，或 110 年）。参见以下示例：\n\n```sql\nSQL> exec DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(retention=>0);\n\
    ```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n```sql\nSQL> /\n\
    ```\n\n```\nAWR_SNAPSHOT_RETENTION_PERIOD               AWR_SNAPSHOT_INTERVAL\n\
    ---------------------------------------- ---------------------\n40150:0:0    \
    \                                                  30\n```\n\n默认的快照间隔为一小时，对于大多数数据库来说通常足够精细，因为当有更频繁或更接近实时的需求时，您可以使用活动会话历史（ASH）信息。通过将默认快照间隔增加到大于一小时，实际上可能使诊断性能问题变得更加困难，因为增加窗口的统计信息可能使得更难区分和识别特定时间段内的性能问题。\n\
    \n## 4-3. 手动生成 AWR 报告\n\n### 问题\n\n您想要生成一个 AWR 报告，并知道收集信息的时间范围。"
- fmt: '## 4-4. 通过 Enterprise Manager 生成 AWR 报告


    ### 问题


    你想要从 Enterprise Manager 中生成一份 AWR 报告。


    ### 解决方案


    在 Enterprise Manager 中，根据版本的不同，生成 AWR 报告的方式可能有所不同。通常也有不止一种生成方法。在[图 4-1](#Chapter04.html#fig_4_1)中，这个特定的屏幕显示你需要输入开始和结束的快照范围，在你点击“Generate
    Report”按钮后，一份 AWR HTML 报告将立即在浏览器窗口中显示。生成的 AWR 报告样本屏幕如[图 4-2](#Chapter04.html#fig_4_2)所示。


    ![images](images/0401.jpg)


    **图 4-1. 在 Enterprise Manager 中生成 AWR 报告**


    ![images](images/0402.jpg)


    **图 4-2. HTML AWR 报告**


    ### 工作原理


    如果你配置了 Database Control，或者正在使用 Grid Control，就可以通过 Enterprise Manager 生成 AWR 报告。要使用此功能，你必须拥有
    Oracle Diagnostics Pack 的许可。


    ### 4-5. 为单个 SQL 语句生成 AWR 报告


    ### 问题


    你希望查看单个 SQL 语句的统计信息，并且不希望从 AWR 报告中生成所有其他相关统计信息。'
  raw: '#### Solution


    In order to generate an AWR report, run the `awrrpt.sql` script found under the
    `$ORACLE_HOME/rdbms/admin` directory. In this example, we needed to enter information
    for the following:


    *   Report type (text or html)

    *   Number of days you want displayed from which to choose snapshots

    *   The starting snapshot number for the period on which you want to generate
    a report

    *   The ending snapshot number for the period on which you want to generate a
    report

    *   The name of the report (enter a name if you do not want the default report
    name and location)


    The lines in bold type here denote points where user input is required:


    `$ sqlplus / as sysdba @awrrpt`


    `Current Instance`

    `~~~~~~~~~~~~~~~~`

    `   DB Id    DB Name      Inst Num Instance`

    `----------- ------------ -------- ------------`

    `2334201269 ORCL               1 ORCL`


    `Specify the Report Type`

    `~~~~~~~~~~~~~~~~~~~~~~~`

    `Would you like an HTML report, or a plain text report?`

    `Enter ''html'' for an HTML report, or ''text'' for plain text`

    `Defaults to ''html''`

    **`Enter value for report_type: text`**


    `Type Specified:  text`


