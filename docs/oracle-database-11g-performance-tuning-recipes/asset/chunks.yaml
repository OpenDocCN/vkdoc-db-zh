    \ DDL 命令完成的。你可以在创建表或索引的 `CREATE` 语句中启用并行性。\n\n对于一个新表，如果你期望有能利用多进程的稳定查询，那么为对象设置一个固定的\
    \ DOP 可能比在 SQL 中添加提示（hint）或让 Oracle 为你设置 DOP 更方便。在以下示例中，我们为 `EMP` 表指定了 DOP 为 4：\n\
    \n```sql\nCREATE TABLE EMP\n(\n EMPNO NUMBER(4) CONSTRAINT PK_EMP PRIMARY KEY,\n\
    \ ENAME VARCHAR2(10),\n JOB VARCHAR2(9),\n MGR NUMBER(4),\n HIREDATE DATE,\n SAL\
    \ NUMBER(7,2),\n COMM NUMBER(7,2),\n DEPTNO NUMBER(2) CONSTRAINT FK_DEPTNO REFERENCES\
    \ DEPT\n)\nPARALLEL(DEGREE 4);\n```\n\n通过在表上放置一个静态的 DOP 值 4，任何访问 `EMP` 表的用户执行的每个查询都将使用\
    \ DOP 为 4。\n\n```sql\nselect * from emp;\n```\n\n```\n----------------------------------------------------------------------\n\
    | Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |\n----------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT     |          |        |      |            |\n|   1\
    \ |  PX COORDINATOR      |          |        |      |            |\n|   2 |  \
    \ PX SEND QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |\n|   3 |    PX\
    \ BLOCK ITERATOR |          |  Q1,00 | PCWC |            |\n|   4 |     TABLE\
    \ ACCESS FULL| EMP      |  Q1,00 | PCWP |            |\n----------------------------------------------------------------------\n\
    ```\n\n在创建索引时，也可以指定默认的 DOP。在某些情况下，创建索引时使用更高的 DOP 是有益的。对于大型分区表，在 `WHERE` 子句中常用的列上创建二次本地分区索引是很常见的。使用这些索引的一些查询可能会受益于增加\
    \ DOP。在以下 DDL 中，我们以 DOP 为 4 创建了这个索引：\n\n```sql\nCREATE INDEX EMP_I1\nON EMP (HIREDATE)\n\
    LOCAL\nPARALLEL(DEGREE 4);\n```\n\n### 工作原理\n\n直接在对象上设置并行性有助于多个进程更快地完成任务——无论是加速查询，还是帮助加速索引的创建。为了能够评估为对象设置的合适\
    \ DOP，你应该了解数据的访问模式。如果对对象的信息了解越少，设置的 DOP 就应该越保守。为一系列对象设置高 DOP 可能会像它帮助性能一样轻易地损害性能，因此启用对象\
    \ DOP 需要经过仔细的规划和考虑。\n\n![images](img/square.jpg) **提示** 如果启用了自动 DOP 并且配置正确（`PARALLEL_DEGREE_POLICY=AUTO`），那么你在对象上设置的并行性将被忽略，优化器会选择要使用的并行度。有关启用自动\
    \ DOP 的详细信息，请参见配方 15-10。\n\n## 15-3. 为现有对象启用并行性\n\n### 问题\n\n你有一系列运行缓慢的查询正在访问一组现有的数据库表，并且你希望采取措施来减少查询的执行时间。\n\
    \n### 解决方案\n\n为现有表或索引设置更高的 DOP 是一种更一致和固定的启用多进程的方法。设置表或索引的 DOP 是在 DDL 命令中完成的。你可以使用\
    \ `ALTER` 语句来更改表或索引的 DOP。例如，如果你有一个现有表需要更改 DOP 以适应希望利用多进程的用户查询，可以轻松地将其添加到表上，并立即生效。以下示例更改了表的默认\
    \ DOP：\n\n```sql\nALTER TABLE EMP\nPARALLEL(DEGREE 4);\n```\n\n如果过了一段时间，你希望重置表上的\
    \ DOP，也可以使用 `ALTER` 语句来完成。查看以下两个示例，了解如何重置表的 DOP：\n\n```sql\nALTER TABLE EMP\n\
    PARALLEL(DEGREE 1);\n```\n\n```sql\nALTER TABLE EMP\nNOPARALLEL;\n```\n\n如果你认为一个已存在的索引会受益于更高的\
    \ DOP，也可以轻松更改。与表一样，更改会立即生效。以下示例展示了如何更改索引的默认 DOP：\n\n```sql\nALTER INDEX EMP_I1\n\
    PARALLEL(DEGREE 4);\n```\n\n与表类似，你可以通过以下两种方式之一重置索引的 DOP：\n\n```sql\nALTER INDEX\
    \ EMP_I4\nPARALLEL(DEGREE 1);\n```\n\n```sql\nALTER INDEX EMP_I4\nNOPARALLEL;\n\
    ```\n\n### 工作原理\n\n增加现有对象的 DOP 是表明你数据库中访问表的查询已经存在性能问题的标志。监控并行性能是了解为对象或一组对象设置的\
    \ DOP 是否合适的关键因素。检查 `V$PQ_TQSTAT` 中的数据以帮助确定已使用的 DOP，或检查 `V$SYSSTAT` 以帮助了解数据库上并行性的使用程度。请参阅配方\
    \ 15-12 获取使用这些数据字典视图的一些示例。\n\n## 15-4. 实现并行 DML\n\n### 问题\n\n你希望在执行 DML 操作（`INSERT`、`UPDATE`、`MERGE`、`DELETE`）时诱导并行性，以提高性能并减少事务时间。\n\
    \n### 解决方案\n\n如果在数据仓库环境或需要高容量批量事务的大型表环境中操作，并行 DML 可以帮助加快处理速度并减少执行这些操作所需的时间。并行\
    \ DML 在数据库中默认是禁用的，必须使用以下语句显式启用：\n\n```sql\nALTER SESSION ENABLE PARALLEL DML;\n\
    ```\n\n通过指定上述语句，它确实*启用*了会话中并行 DML 的可能性，但并不保证一定会发生。并行 DML 操作只会在特定条件下发生：\n\n*  \
    \ 在 DML 语句中指定了提示（hint）。\n*   具有并行属性的表是 DML 语句的一部分。\n*   DML 操作满足语句并行运行的适当规则。使用并行\
    \ DML 的关键限制在本配方后面部分注明。\n\n在某些情况下，你可能希望强制并行行为，无论你为对象设置了什么并行度，或者无论你在 DML 中放置了什么提示。因此，或者，你可以使用以下语句强制并行\
    \ DML：\n\n```sql\nALTER SESSION FORCE PARALLEL DML;\n```\n\n作为一般规则，在常规运行的 DML\
    \ 中强制使用并行 DML 不是一个好的做法，因为它会很快消耗系统资源，导致性能开始下降。最好谨慎使用，它可以帮助处理偶尔的大型 DML 操作。"
- fmt: "# How It Works\n\nParallel DML can work for any DML operation—`INSERT`, `UPDATE`,\
    \ `MERGE`, and `DELETE`. The rules vary slightly depending on which DML operation\
    \ you are running. If you want to run an `INSERT` statement in parallel, for instance,\
    \ first enable parallelism for your session, and then execute your `INSERT` statement\
    \ with the appropriate mechanism in order for the DML to run in parallel:\n\n\
    `ALTER SESSION ENABLE PARALLEL DML;`\n\n`INSERT /*+ PARALLEL(DEPT,4) */ INTO DEPT\
    \ SELECT /*+ PARALLEL(DEPT_COPY,4) */ * FROM DEPT_COPY;`\n\nWith the foregoing\
    \ statement, we put a parallel hint into the `INSERT` statement, and also put\
    \ a parallel hint into the `SELECT` portion of the statement. A very important\
    \ thing to remember is that even if parallelism is in effect for your DML statement,\
    \ it does not directly impact any parallelism on a related query within the same\
    \ statement. For instance, the following statement's DML operation can run in\
    \ parallel, but the corresponding `SELECT` statement will run in serial mode,\
    \ as no parallelism is specified on the query itself.\n\n`ALTER SESSION ENABLE\
    \ PARALLEL DML;`\n\n`INSERT /*+ PARALLEL(DEPT,4) */ INTO DEPT SELECT * FROM DEPT_COPY;`\n\
    \nIn order to take full advantage of parallel capabilities, try to parallelize\
    \ all portions of a statement. If you parallelize the `INSERT` but not the `SELECT`,\
    \ the `SELECT` portion becomes a bottleneck for the `INSERT`, and the `INSERT`\
    \ performance suffers.\n\nParallel DML operations can also occur on `UPDATE`,\
    \ `MERGE`, and `DELETE` statements. Let's say your company was generous and decided\
    \ to give everyone in the accounting department a 1% raise:\n\n`UPDATE /*+ PARALLEL(EMP,4)\
    \ */ EMP SET SAL = SAL*1.01 WHERE DEPTNO=10;`\n\nThen, after a period of months,\
    \ your company decides to lay off those employees they gave raises to in accounting:\n\
    \n`DELETE /*+ PARALLEL(EMP,4) */ FROM EMP WHERE DEPTNO=10;`\n\nAnother way to\
    \ parallelize a DML transaction within your database is to use the `DBMS_PARALLEL_EXECUTE`\
    \ PL/SQL package. Although more complex to configure, there are some key advantages\
    \ of using this package to run your parallelized transactions:\n\n*   The overall\
    \ transaction is split into pieces, each of which has its own commit point.\n\
    *   Transactions are restartable.\n*   Locks are done only on affected rows.\n\
    *   Undo utilization is reduced.\n*   You have more control over how the work\
    \ is divided. You can divide the work in several ways:\n    *   By column\n  \
    \  *   By ROWID\n    *   By SQL statement\n\nThe obvious benefits of using the\
    \ `DBMS_PARALLEL_EXECUTE` package are greater control over how large transactions\
    \ are run, increased functionality, and more efficient use of database resources.\
    \ The key trade-off with using this package is it is simply more complex to configure,\
    \ set up, and run—but may be well worth it when processing large volumes of data.\n\
    \n`![images](images/square.jpg)` `Tip` You must execute the `ALTER SESSION ENABLE\
    \ | FORCE PARALLEL DML` statement in order for parallel DML to occur for your\
    \ transaction.\n\n## Restrictions on Parallel DML\n\nThere are plenty of restrictions\
    \ in using parallel DML, and you need to understand that even if dealing with\
    \ a large volume of data, parallel DML may not be possible in certain circumstances:\n\
    \n*   Individual inserts of rows (using `VALUES` clause) cannot be run in parallel.\n\
    *   You can modify a table only one time within a transaction.\n*   Cannot be\
    \ run for tables with triggers.\n*   Tables with certain constraints may not be\
    \ eligible.\n*   There is limited parallel DML functionality on tables with objects\
    \ or LOB columns.\n*   There is limited parallel DML functionality on temporary\
    \ tables.\n*   Distributed transactions cannot be parallelized.\n\n## Degree of\
    \ Parallelism\n\nOnce you submit a parallelized DML operation for execution, Oracle\
    \ determines, based on a set of precedence rules, what DOP will be used for the\
    \ entire statement being submitted. It is important to understand these rules\
    \ so you get the desired DOP you are expecting for your transaction.\n\nFor DML\
    \ transactions, Oracle applies the following base rules of precedence to determine\
    \ DOP:\n\n1.  Checks to see if an hint is specified on `INSERT`, `UPDATE`, `MERGE`,\
    \ or `DELETE` statements.\n2.  Checks to see if there are any session-level instructions.\n\
    3.  Checks the object-level parallelism on the target object.\n4.  Chooses maximum\
    \ DOP specified between the queried table or any associated indexes for the query\
    \ portion of the statement (insert only).\n\nAfter choosing the appropriate DOP\
    \ for the insert and query portions of the statement, the query is executed. Note\
    \ that the DOP chosen for each portion of the statement can be different.\n\n\
    ## Other Considerations\n\nUsing parallel DML can be complex, as there are many\
    \ permutations of possibilities of the type of objects involved: whether they\
    \ are partitioned, the DOP specified on the objects, the hints specified in statements,\
    \ and the parallel parameter settings, just to name a few.\n\nHere are some other\
    \ factors that need to be considered when using parallel DML:\n\n*   For parallelized\
    \ insert transactions, direct-path loads are performed.\n*   When deciding whether\
    \ to use parallel DML, you must weigh the performance gain you will achieve with\
    \ the space usage for that operation. Parallelized `INSERT` statements are fast,\
    \ but cost you more space. If you have specified a DOP of 4 for an insert transaction,\
    \ 4 extents will be allocated for that operation. You must determine based on\
    \ your requirements what is more important.\n*   If objects are partitioned, it\
    \ can affect how a parallel DML transaction runs.\n\n# 15-5. Creating Tables in\
    \ Parallel\n\n## Problem\n\nYou need to quickly create a table from an existing\
    \ large table, and want to employ the use of multiple processes to help speed\
    \ up the creation of the table.\n\n## Solution\n\nIf you are administering very\
    \ large databases (VLDBs) or have to rebuild a large table, parallel DDL is fast\
    \ and has advantages over running parallel DML. Speed is the biggest factor in\
    \ choosing to use parallel DDL to create a table from an existing large table.\
    \ Within your specific DDL command, there is a `PARALLEL` clause that determines\
    \ if operations are to be performed in parallel. This is done by using the `CREATE\
    \ TABLE ... AS SELECT` operation:\n\n```\nCREATE TABLE EMP_COPY\nPARALLEL(DEGREE\
    \ 4)\nAS\nSELECT * FROM EMP;\n```\n\n```\n------------------------------------------------------------------------\n\
    | Id  | Operation              | Name     |    TQ  |IN-OUT| PQ Distrib |\n------------------------------------------------------------------------\n\
    |   0 | CREATE TABLE STATEMENT |          |        |      |            |\n|  \
    \ 1 |  PX COORDINATOR        |          |        |      |            |\n|   2\
    \ |   PX SEND QC (RANDOM)  | :TQ10000 |  Q1,00 | P->S | QC (RAND)  |\n|   3 |\
    \    LOAD AS SELECT      | EMP_COPY |  Q1,00 | PCWP |            |\n|   4 |  \
    \   PX BLOCK ITERATOR  |          |  Q1,00 | PCWC |            |\n|   5 |    \
    \  TABLE ACCESS FULL | EMP      |  Q1,00 | PCWP |            |\n------------------------------------------------------------------------\n\
    ```"
