    您希望从企业管理器中生成一份 AWR 报告。


    ### 解决方案


    在企业管理器中，根据版本的不同，生成 AWR 报告的方式可能有所不同。通常也有不止一种生成方法。在图 4-1 中，这个特定的屏幕显示您需要输入开始和结束的快照范围，在您点击“Generate
    Report”按钮后，一份 AWR HTML 报告将立即在浏览器窗口中显示。生成的 AWR 报告样本屏幕如图 4-2 所示。


    ![images](img/0401.jpg)


    **图 4-1. 在企业管理器中生成 AWR 报告**


    ![images](img/0402.jpg)


    **图 4-2. HTML AWR 报告**


    ### 工作原理


    如果您配置了数据库控制（Database Control），或者正在使用网格控制（Grid Control），就可以通过企业管理器生成 AWR 报告。要使用此功能，您必须拥有
    Oracle 诊断包（Diagnostics Pack）的许可。


