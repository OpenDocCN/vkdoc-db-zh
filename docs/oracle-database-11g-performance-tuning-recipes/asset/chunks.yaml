    \n![images](img/1202.jpg)\n\n`图 12-2.` 配置 SQL 配置文件的自动接受\n\n通过此屏幕，你可以管理诸如 SQL 配置文件的自动接受、优化会话的最长时间等功能。\n\
    \n### 12-3. 显示 SQL 配置文件信息\n\n#### 问题\n\n你已经创建并接受了多个 SQL 配置文件，现在想要查看与这些数据库对象相关的信息。\n\
    \n#### 解决方案\n\n使用 `DBA_SQL_PROFILES` 视图来显示有关 SQL 配置文件的信息。以下是一个选择最有趣列的示例：\n\n```\n\
