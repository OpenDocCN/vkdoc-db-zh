  trans: '

    # 将 CURSOR_SHARING 设置为非默认值的影响


    `FORCE` 和 `SIMILAR` 这两种设置都可以帮助你规避应用程序中未使用绑定变量的问题，方法是让数据库生成绑定值（即系统生成的绑定值，与用户指定的绑定值相对）。然而，你需要意识到，当将
    `cursor_sharing` 参数设置为 `FORCE` 与设置为 `SIMILAR` 时，优化器的行为存在差异。这里关键要理解的是，查询性能与共享池中多次执行查询所占用的空间之间存在权衡。


    以下是 `cursor_sharing` 参数设置为 `EXACT`、`FORCE` 和 `SIMILAR` 时的性能影响总结。我们假设存在以下包含字面量的查询：


    `select * from employees where job = ''Clerk''`


    请注意，如果查询使用的是绑定变量而非字面量，其形式如下：


    `select * from employees where job=:b`


    > `EXACT`：数据库不会替换任何字面量，优化器看到的查询就是其呈现给优化器的样子。优化器会根据语句中的字面量值，为每次语句执行生成不同的执行计划。因此，该计划将是最优的，但每个语句都有自己的父游标，因此执行次数多的语句可能会在共享池中占用大量空间。这可能导致闩锁争用和性能下降。

    >

    > `FORCE`：无论是否存在直方图，优化器都会将字面量值替换为绑定值，并按以下形式优化此查询：

    >

    > `select * from employees where job=:b`

    >

    > 无论字面量值如何，优化器对每个 SQL 语句都使用单一执行计划。因此，执行计划可能不是最优的，因为该计划是通用的，而非基于字面量值。如果查询使用了字面量，优化器会利用这些值来寻找最有效的执行计划。如果
    SQL 语句中没有字面量，优化器很难确定最佳执行计划。通过“窥视”绑定变量的值，优化器可以更好地了解 `where` 子句条件的**选择性**——这几乎就像在
    SQL 语句中使用了字面量一样。优化器在硬解析阶段窥视绑定值。由于执行计划是基于优化器碰巧窥视到的绑定变量特定值生成的，因此该计划可能对绑定变量的所有可能值并非都是最优的。

    >

    > 在此示例中，优化器基于它看到的 `JOB` 列的特定值使用绑定窥视。这种情况下，优化器使用值 `Clerk` 来估算查询的基数。当执行相同语句时（`JOB`
    列使用不同值，比如 `Manager`），优化器将使用第一次生成（`JOB`=`Clerk` 时）的相同计划。由于只有一个父游标和仅为不同语句生成的子游标，对共享池的压力较小。请注意，子游标在共享池中占用的空间远少于父游标。通常，将
    `cursor_sharing` 参数设置为 `FORCE` 能立即解决数据库中严重的闩锁争用，这是少数几个能帮助你快速减少闩锁争用的“灵丹妙药”之一。

    >

    > `SIMILAR`（`JOB` 列上没有直方图）：数据库将使用字面量替换——它为 `JOB` 列的字面量值（`Clerk`）使用系统生成的绑定值。这是因为
    `JOB` 列上缺少直方图告诉优化器该列的数据不是偏斜的，因此即使字面量值不同，优化器也会为语句的每次执行选择相同的计划。优化器认为不应为仅字面量值不同的语句更改执行计划，因为数据是均匀分布的。在查询列上没有直方图的情况下，`SIMILAR`
    设置提供的查询性能以及对共享池的影响与指定 `FORCE` 设置时相同。

    >

    > `SIMILAR`（`JOB` 列上有直方图）：当优化器看到 `JOB` 列上的直方图时，它会意识到该列数据是偏斜的——这告诉优化器，查询结果可能因 `JOB`
    列的字面量值不同而有很大差异。因此，优化器根据字面量值为每个语句生成不同的计划——因此计划非常高效，就像指定 `EXACT` 设置时一样。在有直方图的情况下使用
    `SIMILAR` 选项确实会在共享池中使用更多空间，但不如使用 `EXACT` 设置时那么多。原因在于每个语句拥有自己的子游标，而不是父游标。


    在 `cursor_sharing` 参数的各种设置之间做选择，实质上是评估什么对数据库性能更为关键：使用默认的 `EXACT` 设置或 `SIMILAR`（相关列上有直方图）确实能提供更好的查询性能，但会导致生成大量父游标（`EXACT`
    设置）或子游标（`SIMILAR` 设置）。如果共享池压力巨大，并伴随闩锁争用，整个数据库性能将变得很差。在这种情况下，你最好实施全系统解决方案，将 `cursor_sharing`
    参数设置为 `FORCE`，因为这能保证每个 SQL 语句只有一个子游标。如果你担心单个 SQL 语句的影响，只需删除该 SQL 语句所用相关列上的直方图，并将
    `cursor_sharing` 参数设置为 `FORCE`——这将确保优化器为该列使用系统生成的绑定值，并确保该 SQL 语句在共享池中占用少得多的空间。正如你将在下一节看到的，如果你将
    `cursor_sharing` 参数设置为 `FORCE` 并保留列上的直方图，Oracle Database 11g 的**自适应游标共享**提供了一个更好的解决方案。


    ## 13-15. 理解自适应游标共享


    ### 问题


    你的数据库使用了用户定义的绑定变量。你想知道是否有任何方法可以优化数据库行为，使其不会对所有绑定变量值都“盲目地”使用相同的执行计划。


    ### 解决方案


    在之前的版本中，无论绑定变量的值如何，Oracle 对每次 SQL 语句的执行都使用单一执行计划。在 Oracle Database 11g 中，名为 `自适应游标共享`
    的数据库功能使带有绑定变量的 SQL 语句能够使用多个执行计划，每个执行计划基于绑定变量的值生成。自适应游标共享默认启用，且无法禁用它。

    '
- fmt: "#### 自适应游标共享工作原理\n\n自适应游标共享功能旨在改进包含绑定变量的SQL查询的执行计划。要理解自适应游标共享如何提供帮助，首先需要理解Oracle的绑定窥探功能的工作原理。绑定窥探（在Oracle\
    \ 9i中引入）允许优化器在数据库首次调用游标时窥探绑定变量的值。优化器使用这个“窥探到的值”来确定`WHERE`子句的选择性。\n\n使用用户定义绑定变量的问题在于，执行计划无法准确衡量`WHERE`子句的选择性。绑定窥探通过让优化器表现得像它实际在使用字面值而非绑定变量，从而帮助改善情况，进而为带有绑定变量的SQL语句生成更好的执行计划。当`WHERE`子句中的列值分布均匀时，绑定窥探效果良好。如果列值是倾斜的，优化器通过窥探用户定义的绑定变量值所选择的执行计划，可能并不一定对所有可能的绑定变量值都是最优的。因此，最终会导致一种情况：如果SQL语句使用的绑定变量值是优化器窥探到的那个值，执行计划会非常高效；而对于所有其他可能的绑定变量值，执行计划则效率低下。\n\
    \n让我们通过一个涉及具有倾斜数据的列的示例，来学习自适应游标共享是如何工作的。\n\n我们的测试表`DEMO`有78，681行数据。数据有三列，且都是倾斜的。因此，在收集此表的统计信息时，我们在这三列上创建了直方图，如下所示。\n\
    \n```sql\nSQL> select column_name,table_name,histogram from user_TAB_COLUMNS\n\
    \  2      where table_name='DEMO';\n\nCOLUMN_NAME                    TABLE_NAME\
    \                     HISTOGRAM\n------------------------------ ------------------------------\
    \ ---------------\nRNUM                           DEMO                       \
    \    HEIGHT BALANCED\nRNAME                          DEMO                    \
    \       HEIGHT BALANCED\nSTATUS                         DEMO                 \
    \          FREQUENCY\n```\n\n请注意，当优化器注意到表上有直方图时，它会将该列中的数据标记为倾斜。`STATUS`列有两个值：`Coarse`和`Fine`。只有157行的值是`Coarse`，而78，524行的值是`Fine`，这使得数据极度倾斜。\n\
    \n让我们执行一系列操作来说明自适应游标共享是如何工作的。发出一个查询，绑定变量设置为值`Coarse`。由于`DEMO`表中只有很少的行具有此值，我们期望数据库使用索引范围扫描，这正是优化器所做的。这是我们的查询及其执行过程：\n\
    \n```sql\nSQL> var b varchar2(6)\nSQL> exec :b:='Coarse';\n\nPL/SQL procedure\
    \ successfully completed.\n\nSQL> select /*+ ACS */ count(*) from demo where status\
    \ = :b;\n  COUNT(*)\n----------\n       157\n\nSQL> select * from table(dbms_xplan.display_cursor);\n\
    \nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    SQL_ID  cxau3vvabpzd0, child number 0\n-------------------------------------\n\
    select /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 3478245284\n\
    --------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name       | Rows  | Bytes | Cost (%CPU)| Time   \
    \  |\n--------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |            |       |       |     1 (100)|        \
    \  |\n|   1 |  SORT AGGREGATE   |            |     1 |     6 |            |  \
    \        |\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    |*  2 |   INDEX RANGE SCAN| IDX01_DEMO |   157 |   942 |     1   (0)| 00:00:52\
    \ |\n--------------------------------------------------------------------------------\n\
    Predicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   2 - access(\"STATUS\"=:B)\n19 rows selected.\n```\n\n接下来，执行以下语句以检查数据库是否已将`STATUS`列标记为绑定敏感或绑定感知，或两者兼有：\n\
    \n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive\
    \ as\n  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"\
    BIND_SHARE\"\n  3   from v$SQL\n  4*  where sql_text like 'select /*+ ACS */%'\n\
    SQL> /\n\nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n\
    ------------ ---------- ----------- -----------  ----------  -----------\n   \
    \        0          1          43          Y            N            Y\n\nSQL>\n\
    ```\n\n请注意，数据库将`STATUS`列标记为绑定敏感，因为`STATUS`列上有直方图。每次使用不同的绑定变量值执行查询时，数据库都会将执行统计信息与先前执行的统计信息进行比较。如果执行统计信息差异显著，它会将该列标记为绑定感知。数据库在决定是否将语句标记为绑定感知时使用的输入之一是处理的行数。一旦游标被标记为绑定感知，优化器将根据绑定变量的值选择执行计划。这里，`IS_BIND_AWARE`列标记为`N`，因为没有先前的执行统计信息可供比较。`BIND_SHAREABLE`列标记为`Y`。\n\
    \n再次发出查询，绑定变量设置为值`Fine`。由于几乎所有行的`STATUS`列值都是`Fine`，我们期望优化器倾向于进行全表扫描。然而，优化器选择的执行计划与之前完全相同（`INDEX\
    \ RANGE SCAN`）。原因是数据库正在使用与第一次执行相同的执行计划——例如：\n\n```sql\nSQL> exec :b := 'Fine';\n\
    \nPL/SQL procedure successfully completed.\n\nSQL> select /*+ ACS */ count(*)\
    \ from demo where status = :b;\n\n  COUNT(*)\n----------\n     78524\n\nSQL> select\
    \ * from table(dbms_xplan.display_cursor);\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    SQL_ID  cxau3vvabpzd0, child number 0\n-------------------------------------\n\
    select /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 3478245284\n\
    --------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name       | Rows  | Bytes | Cost (%CPU)| Time   \
    \  |\n--------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |            |       |       |     1 (100)|        \
    \  |\n|   1 |  SORT AGGREGATE   |            |     1 |     6 |            |  \
    \        |\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    |*  2 |   INDEX RANGE SCAN| IDX01_DEMO |   157 |   942 |     1   (0)| 00:00:52\
    \ |\n\n--------------------------------------------------------------------------------\n\
    Predicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   2 - access(\"STATUS\"=:B)\n\n19 rows selected.\n```\n\n由于SQL语句的游标被标记为绑定敏感，优化器使用了与之前相同的执行计划（`INDEX\
    \ RANGE SCAN`）。在以下示例中请注意，`BIND_AWARE`列仍然标记为`N`。优化器正在使用与之前相同的游标（`child_number`\
    \ 0）。\n\n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive\
    \ as\n  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"\
    BIND_SHARE\"\n  3   from v$sql\n  4   WHERE sql_text like 'select /*+ ACS */%';\n\
    \nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n------------\
    \ ---------- ----------- -----------  ----------  -----------\n           0  \
    \        2         220           Y           N            Y\n\nSQL>\n```\n\n再次执行查询，使用的`STATUS`列值与上一次查询相同（'`Fine`'）。看！优化器现在使用了`INDEX\
    \ FAST FULL SCAN`，而不是`INDEX RANGE SCAN`。执行计划的更改是自动的——就好像优化器在不断学习，并在确信新计划更高效时修改计划。以下是执行过程和新的计划：\n\
    \n```sql\nSQL>  exec :b := 'Fine';\nPL/SQL procedure successfully completed.\n\
    \nSQL> select /*+ ACS */ count(*) from demo where status = :b;\n  COUNT(*)\n----------\n\
    \     78524\n\nSQL> select * from table(dbms_xplan.display_cursor);\nPLAN_TABLE_OUTPUT\n\
    --------------------------------------------------------------------------------\n\
    SQL_ID  cxau3vvabpzd0, child number 1\n-------------------------------------\n\
    select /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 2683512795\n\
    --------------------------------------------------------------------------------\n\
    | Id  | Operation             | Name       | Rows  | Bytes | Cost (%CPU)| Time\
    \   |\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT      |            |       |       |    45 (100)|    \
    \    |\n   |\n|   1 |  SORT AGGREGATE       |            |     1 |     6 |   \
    \         |        |\n   |\n|*  2 |   INDEX FAST FULL SCAN| IDX01_DEMO | 78524\
    \ |   460K|    45   (0)| 00:38:\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    37 |\n--------------------------------------------------------------------------------\n\
    Predicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   2 - filter(\"STATUS\"=:B)\n19 rows selected.\n```\n\n请注意，`BIND_AWARE`列现在显示值`Y`。当我们第二次使用相同的绑定变量值（`Fine`）执行查询时，由于查询被标记为绑定敏感，数据库会评估上一次执行的执行统计信息。由于统计信息不同，它将游标标记为绑定感知。优化器随后决定新计划更优，因此执行硬解析并生成了一个使用`INDEX\
    \ FAST FULL SCAN`而不是`INDEX RANGE SCAN`的新执行计划。以下查询显示了子游标的详细信息以及查询是绑定敏感还是绑定感知。\n\
    \n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive\
    \ as\n  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"\
    BIND_SHARE\"\n  3   from v$sql\n  4   WHERE sql_text like 'select /*+ ACS */%';\n\
    \nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n------------\
    \ ---------- ----------- -----------  ----------  -----------\n           0  \
    \        2         220           Y           N            Y\n           1    \
    \      1         184           Y           Y            Y\n\nSQL>\n```\n\n请注意，`IS_BIND_AWARE`列现在显示值`Y`。还要注意，出现了一个新的子游标（`child_number`\
    \ 1），它代表包含`INDEX FAST FULL SCAN`的新执行计划——这个新游标被标记为绑定感知。\n\n我们再次执行查询，但这次使用原始的绑定变量值`Coarse`。优化器将通过执行`INDEX\
    \ RANGE SCAN`来选择正确的执行计划。以下是有关子游标的信息，以及查询是绑定敏感还是绑定感知。\n\n```sql\nSQL> select child_number,\
    \ executions, buffer_gets, is_bind_sensitive as\n  2   \"BIND_SENSI\", is_bind_aware\
    \ as \"BIND_AWARE\", is_shareable as \"BIND_SHARE\"\n  3   from v$sql\n  4   where\
    \ sql_text like 'select /*+ ACS */%';\n\nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI\
    \   BIND_AWARE  BIND_SHARE\n------------ ---------- ----------- -----------  ----------\
    \  -----------\n           0          2         220           Y           N  \
    \          N\n           1          1         184           Y           Y    \
    \        Y\n           2          1           2           Y           Y      \
    \      Y\n\nSQL>\n```\n\n数据库为此查询创建了一个新的子游标（`child_number`=2），并将原始游标（`child_cursor`=0）标记为非绑定感知。最终，数据库将从此游标从共享池中移除此游标。\n\
    \n在我们的示例中，我们在测试中仅使用了两个绑定变量值。如果有数十种不同的绑定变量值会怎样？Oracle并非总是为每个不同的绑定变量值执行硬解析。最初它会对一些绑定变量值执行硬解析，在此过程中确定各种绑定变量与相关执行计划之间的关系。在建立了绑定变量值与相关执行计划的初始映射之后，Oracle足够智能，可以简单地从缓存中选择最优的子游标，而无需为其他绑定值执行硬解析。\n\
    \n自适应游标共享是在Oracle Database 11g版本中引入的一项新功能。在更早的版本中，当DBA遇到数据库由于绑定窥探效应显然开始为某个SQL语句使用不合适的执行计划的情况时，常常会刷新共享池（更糟糕的是，有时会重启数据库）。在11g版本中，你无需做任何事情——优化器在遇到倾斜数据时会自动更改执行计划。借助自适应游标共享，数据库对使用绑定变量的语句使用多个执行计划，确保始终根据绑定变量的值使用最佳执行计划。自适应游标共享意味着当不同的绑定变量值表明查询需要处理的数据量不同时，Oracle会调整其行为，为查询使用不同的执行计划，而不是对所有绑定值坚持使用相同的计划。由于自适应游标共享仅在字面值被绑定替换的地方有效，Oracle鼓励你对`cursor_sharing`参数使用`FORCE`设置。如果将该参数设置为`SIMILAR`，并且在列上有直方图，优化器不会用绑定变量执行字面替换，因此自适应游标共享不会发生。你必须将`cursor_sharing`参数设置为`FORCE`，自适应游标共享才能工作，从而让优化器为不同的绑定变量值选择最优的执行计划。"
  raw: '#### How It Works


    The adaptive cursor-sharing feature is designed to improve the execution plans
    for SQL queries that contain bind variables. To understand how adaptive cursor
    sharing helps, it''s important to understand how Oracle''s bind peeking feature
    works. Bind peeking (introduced in Oracle 9i) lets the optimizer peek at the value
    of a bind variable when the database invokes the cursor for the first time. The
    optimizer uses the “peeked value” to determine the selectivity of the `WHERE`
    clause.


    The problem with using user-defined bind variables is that the execution plan
    doesn''t have an accurate measure of the selectivity of the `WHERE` clause. Bind
    peeking helps improve matters by letting the optimizer act as if it were actually
    using a literal value instead of the bind variable, thus helping it generate better
    execution plans for SQL statements with bind variables. Bind peeking works well
    when the values of the column in the `WHERE` clause have a uniform distribution.
    If the column values are skewed, the plan the optimizer chooses by peeking at
    the value of the user-defined bind variable may not necessarily be good for all
    possible values of the bind variable. You thus end up with a situation where the
    execution plan will be very efficient if the SQL statement has the bind variable
    value that the optimizer has peeked at—and inefficient execution plans for all
    other possible values of the bind variable.


    Let''s learn how adaptive cursor sharing works, with the help of an example that
    involves a column with skewed data.


    Our test table, `DEMO`, has 78,681 rows. The data has three columns, which are
    all skewed. Thus, when we gathered statistics for this table, we created histograms
    on the three columns, as shown here.


    `SQL> select column_name,table_name,histogram from user_TAB_COLUMNS`

    `     where table_name=''DEMO'';`


    `COLUMN_NAME                    TABLE_NAME                     HISTOGRAM`

    `------------------------------ ------------------------------ ---------------`

    `RNUM                            DEMO                           HEIGHT BALANCED`

    `RNAME                           DEMO                           HEIGHT BALANCED`

    `STATUS                          DEMO                           FREQUENCY`


    Note that when the optimizer notices that there''s a histogram on a table, it
    marks the data in that column as skewed. The column `STATUS` has two values: `Coarse`
    and `Fine`. Only 157 rows have the value of `Coarse`, and 78,524 rows have the
    value `Fine`, making the data extremely skewed.


    Let''s perform a sequence of operations to illustrate how adaptive cursor sharing
    works. Issue a query with the bind variable set to the value `Coarse`. Since very
    few rows in the `DEMO` table have this value, we expect the database to use an
    index range scan, which is exactly what the optimizer does. Here is our query
    and its execution:


    `SQL> var b varchar2(6)`

    `SQL> exec :b:=''Coarse'';`


    `PL/SQL procedure successfully completed.`


    `SQL> select /*+ ACS */ count(*) from demo where status = :b;`

    `  COUNT(*)`

    `----------`

    `       157`


    `SQL> select * from table(dbms_xplan.display_cursor);`


    `PLAN_TABLE_OUTPUT`

    `--------------------------------------------------------------------------------`

    `SQL_ID  cxau3vvabpzd0, child number 0`

    `-------------------------------------`

    `select /*+ ACS */ count(*) from demo where status = :b`


    `Plan hash value: 3478245284`

    `--------------------------------------------------------------------------------`

    `| Id  | Operation         | Name       | Rows  | Bytes | Cost (%CPU)| Time     |`

    `--------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |            |       |       |     1 (100)|          |`

    `|   1 |  SORT AGGREGATE   |            |     1 |     6 |            |          |`


    `PLAN_TABLE_OUTPUT`

    `--------------------------------------------------------------------------------`

    `|*  2 |   INDEX RANGE SCAN| IDX01_DEMO |   157 |   942 |     1   (0)| 00:00:52
    |`

    `--------------------------------------------------------------------------------`

    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`

    `   2 - access("STATUS"=:B)`

    `19 rows selected.`


    Next issue the following statement to check whether the database has marked the
    `STATUS` column as bind-sensitive or bind-aware or both:


    `SQL> select child_number, executions, buffer_gets, is_bind_sensitive as`

    `  2  "BIND_SENSI", is_bind_aware as "BIND_AWARE", is_shareable as "BIND_SHARE"`

    `  3  from v$SQL`

    `  4* where sql_text like ''select /*+ ACS */%''`

    `SQL> /`

    `CHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE`

    `------------ ---------- ----------- -----------  ----------  -----------`

    `           0          1          43          Y            N            Y`


    `SQL>`


    Note that the database marks the `STATUS` column as bind-sensitive, because there''s
    a histogram on the column `STATUS`. Each time you execute the query with a different
    value for the bind variable, the database compares the execution statistics with
    those from the prior execution. If the execution statistics differ significantly,
    it marks the column as bind-aware. One of the inputs the database uses in deciding
    whether to mark a statement as bind-aware is the number of rows processed. Once
    a cursor is marked bind-aware, the optimizer will choose an execution plan based
    on the value of the bind variable. Here, the `IS_BIND_AWARE` column is marked
    `N`, because there are no prior execution statistics to compare. The `BIND_SHAREABLE`
    column is marked `Y`.


    Issue the query again, with the bind variable set to the value `Fine`. Since almost
    all of the rows have the `STATUS` column set to the value `Fine`, we expect the
    optimizer to prefer a full table scan. However, the optimizer picks exactly the
    same plan as before (`INDEX RANGE SCAN`). The reason for this is that the database
    is using the same execution plan from the first execution—for example:


    `SQL> exec :b := ''Fine'';`


    `PL/SQL procedure successfully completed.`


    `SQL> select /*+ ACS */ count(*) from demo where status = :b;`


    `  COUNT(*)`

    `----------`

    `     78524`


    `SQL> select * from table(dbms_xplan.display_cursor);`


    `PLAN_TABLE_OUTPUT`

    `--------------------------------------------------------------------------------`

    `SQL_ID  cxau3vvabpzd0, child number 0`

    `-------------------------------------`

    `select /*+ ACS */ count(*) from demo where status = :b`


    `Plan hash value: 3478245284`

    `--------------------------------------------------------------------------------`

    `| Id  | Operation         | Name       | Rows  | Bytes | Cost (%CPU)| Time     |`

    `--------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |            |       |       |     1 (100)|          |`

    `|   1 |  SORT AGGREGATE   |            |     1 |     6 |            |          |`


    `PLAN_TABLE_OUTPUT`

    `--------------------------------------------------------------------------------`

    `|*  2 |   INDEX RANGE SCAN| IDX01_DEMO |   157 |   942 |     1   (0)| 00:00:52
    |`


    `--------------------------------------------------------------------------------`

    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`

    `   2 - access("STATUS"=:B)`


    `19 rows selected.`


    Since the cursor for the SQL statement is marked bind-sensitive, the optimizer
    uses the same execution plan (`INDEX RANGE SCAN`) as before. Note in the following
    example that the `BIND_AWARE` column is still marked `N`. The optimizer is using
    the same cursor as before (`child_number` 0).


    `SQL> select child_number, executions, buffer_gets, is_bind_sensitive as`

    `  2  "BIND_SENSI", is_bind_aware as "BIND_AWARE", is_shareable as "BIND_SHARE"`

    `  3  from v$sql`

    `  4  WHERE sql_text like ''select /*+ ACS */%'';`


    `CHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE`

    `------------ ---------- ----------- -----------  ----------  -----------`

    `           0          2         220           Y           N            Y`


    `SQL>`


    Execute the query again, with the same value for the `STATUS` column as in the
    previous query (''`Fine`''). Voila! The optimizer now uses an `INDEX FAST FULL
    SCAN`, instead of the `INDEX RANGE SCAN`. The change in execution plans is automatic—it
    is as if the optimizer is learning as it goes along and modifies the plan when
    it''s certain that the new plan is more efficient. Here is the execution and the
    new plan:


    `SQL>  exec :b := ''Fine'';`

    `PL/SQL procedure successfully completed.`


    `SQL> select /*+ ACS */ count(*) from demo where status = :b;`

    `  COUNT(*)`

    `----------`

    `     78524`


    `SQL> select * from table(dbms_xplan.display_cursor);`

    `PLAN_TABLE_OUTPUT`

    `--------------------------------------------------------------------------------`

    `SQL_ID  cxau3vvabpzd0, child number 1`

    `-------------------------------------`

    `select /*+ ACS */ count(*) from demo where status = :b`


    `Plan hash value: 2683512795`

    `--------------------------------------------------------------------------------`

    `| Id  | Operation             | Name       | Rows  | Bytes | Cost (%CPU)| Time   |`


    `PLAN_TABLE_OUTPUT`

    `--------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT      |            |       |       |    45 (100)|`

    `   |`

    `|   1 |  SORT AGGREGATE       |            |     1 |     6 |            |`

    `   |`

    `|*  2 |   INDEX FAST FULL SCAN| IDX01_DEMO | 78524 |   460K|    45   (0)| 00:38:`

    `PLAN_TABLE_OUTPUT`

    `--------------------------------------------------------------------------------`

    `37 |`

    `--------------------------------------------------------------------------------`

    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`

    `   2 - filter("STATUS"=:B)`

    `19 rows selected.`


    Note that the `BIND_AWARE` column now shows the value `Y`. When we execute the
    query with the same bind variable value (`Fine`) the second time, since the query
    is marked as bind-sensitive, the database evaluates the execution statistics from
    the previous execution. Since the statistics are different, it marks the cursor
    as bind-aware. The optimizer then decides a new plan is more optimal and thus
    performs a hard parse and generates a new execution plan that uses an `INDEX FAST
    FULL SCAN` instead of an `INDEX RANGE SCAN`. The following query shows details
    about the child cursors as well as whether the query is bind-sensitive or bind-aware.


    `SQL> select child_number, executions, buffer_gets, is_bind_sensitive as`

    `  2  "BIND_SENSI", is_bind_aware as "BIND_AWARE", is_shareable as "BIND_SHARE"`

    `  3  from v$sql`

    `  4  WHERE sql_text like ''select /*+ ACS */%'';`


    `CHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE`

    `------------ ---------- ----------- -----------  ----------  -----------`

    `           0          2         220           Y           N            Y`

    `           1          1         184           Y           Y            Y`


    `SQL>`


    Note that the `IS_BIND_AWARE` column shows the value `Y` now. Notice also that
    there is a new child cursor (`child_number` 1) that represents the new execution
    plan containing the `INDEX FAST FULL SCAN`—this new cursor is marked bind-aware.


    We execute the query again, but this time with the original bind variable value
    `Coarse`. The optimizer will choose the correct execution plan, by performing
    an `INDEX RANGE SCAN`. Here''s the information about the child cursors, as well
    as whether the query is bind-sensitive or bind-aware.


    `SQL> select child_number, executions, buffer_gets, is_bind_sensitive as`

    `  2  "BIND_SENSI", is_bind_aware as "BIND_AWARE", is_shareable as "BIND_SHARE"`

    `  3  from v$sql`

    `  4  where sql_text like ''select /*+ ACS */%'';`


    `CHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE`

    `------------ ---------- ----------- -----------  ----------  -----------`

    `           0          2         220           Y           N            N`

    `           1          1         184           Y           Y            Y`

    `           2          1           2           Y           Y            Y`


    `SQL>`


    The database creates a new child cursor (`child_number`=2) for this query and
    marks the original cursor (`child_cursor`=0) as not being bind-aware. Eventually
    the database will remove this cursor from the shared pool.


    In our example, we used only two values for the bind variable in our tests. What
    happens if there are dozens of different bind variable values? Oracle doesn''t
    always perform a hard parse for each distinct bind variable value. Initially it
    performs a hard parse for some values of the bind variable, during which it determines
    the relationships between various bind variables and the associated execution
    plan. After the initial mapping of the bind variable values and the associated
    execution plans, Oracle is smart enough to simply pick the optimal child cursor
    from the cache without performing a hard parse for other bind values.


    Adaptive cursor sharing is a new feature introduced in the Oracle Database 11g
    release. In earlier releases, DBAs often flushed the shared pool (and worse, sometimes
    restarted the database) when confronted with situations where the database apparently
    started using an inappropriate execution plan for a SQL statement, due to the
    bind peeking effect. In the 11g release, you don''t have to do anything—the optimizer
    automatically changes execution plans when it encounters skewed data. With adaptive
    cursor sharing, the database uses multiple execution plans for a statement that
    uses bind variables, ensuring that the best execution plan is always used, depending
    on the value of the bind variable. Adaptive cursor sharing means that when different
    bind variable values indicate different amounts of data to be handled by the query,
    Oracle adapts its behavior by using different execution plans for the query instead
    of sticking to the same plan for all bind values. Since adaptive cursor sharing
    works only where literal values are replaced with binds, Oracle encourages you
    to use the `FORCE` setting for the `cursor_sharing` parameter. If you set the
    parameter to `SIMILAR` and you have a histogram on a column, the optimizer doesn''t
    perform a literal replacement with bind variables, and thus adaptive cursor sharing
    won''t take place. You must set the `cursor_sharing` parameter to `FORCE` for
    adaptive cursor sharing to work, thus letting the optimizer select the optimal
    execution plan for different values of the bind variable.'
  trans: "#### 自适应游标共享工作原理\n\n自适应游标共享功能旨在改进包含绑定变量的 SQL 查询的执行计划。要理解自适应游标共享如何提供帮助，首先需要理解\
    \ Oracle 的**绑定窥探**功能的工作原理。绑定窥探（在 Oracle 9i 中引入）允许优化器在数据库首次调用游标时窥探绑定变量的值。优化器使用这个“窥探到的值”来确定\
    \ `WHERE` 子句的选择性。\n\n使用用户定义绑定变量的问题在于，执行计划无法准确衡量 `WHERE` 子句的选择性。绑定窥探通过让优化器表现得像它实际在使用字面值而非绑定变量，从而帮助改善情况，进而为带有绑定变量的\
    \ SQL 语句生成更好的执行计划。当 `WHERE` 子句中的列值分布均匀时，绑定窥探效果良好。如果列值是倾斜的，优化器通过窥探用户定义的绑定变量值所选择的执行计划，可能并不一定对所有可能的绑定变量值都是最优的。因此，最终会导致一种情况：如果\
    \ SQL 语句使用的绑定变量值是优化器窥探到的那个值，执行计划会非常高效；而对于所有其他可能的绑定变量值，执行计划则效率低下。\n\n让我们通过一个涉及具有倾斜数据的列的示例，来学习自适应游标共享是如何工作的。\n\
    \n我们的测试表 `DEMO` 有 78,681 行数据。数据有三列，且都是倾斜的。因此，在收集此表的统计信息时，我们在这三列上创建了直方图，如下所示。\n\
    \n```sql\nSQL> select column_name,table_name,histogram from user_TAB_COLUMNS\n\
    \  2      where table_name='DEMO';\n\nCOLUMN_NAME                     TABLE_NAME\
    \                     HISTOGRAM\n------------------------------ ------------------------------\
    \ ---------------\nRNUM                            DEMO                      \
    \     HEIGHT BALANCED\nRNAME                           DEMO                  \
    \         HEIGHT BALANCED\nSTATUS                          DEMO              \
    \             FREQUENCY\n```\n\n请注意，当优化器注意到表上有直方图时，它会将该列中的数据标记为倾斜。`STATUS` 列有两个值：`Coarse`\
    \ 和 `Fine`。只有 157 行的值是 `Coarse`，而 78,524 行的值是 `Fine`，这使得数据极度倾斜。\n\n让我们执行一系列操作来说明自适应游标共享是如何工作的。发出一个查询，绑定变量设置为值\
    \ `Coarse`。由于 `DEMO` 表中只有很少的行具有此值，我们期望数据库使用索引范围扫描，这正是优化器所做的。这是我们的查询及其执行过程：\n\n\
    ```sql\nSQL> var b varchar2(6)\nSQL> exec :b:='Coarse';\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL> select /*+ ACS */ count(*) from demo where status = :b;\n\
    \  COUNT(*)\n----------\n       157\n\nSQL> select * from table(dbms_xplan.display_cursor);\n\
    \nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    SQL_ID  cxau3vvabpzd0, child number 0\n-------------------------------------\n\
    select /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 3478245284\n\
    --------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name       | Rows  | Bytes | Cost (%CPU)| Time   \
    \  |\n--------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |            |       |       |     1 (100)|        \
    \  |\n|   1 |  SORT AGGREGATE   |            |     1 |     6 |            |  \
    \        |\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    |*  2 |   INDEX RANGE SCAN| IDX01_DEMO |   157 |   942 |     1   (0)| 00:00:52\
    \ |\n--------------------------------------------------------------------------------\n\
    Predicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   2 - access(\"STATUS\"=:B)\n19 rows selected.\n```\n\n接下来，执行以下语句以检查数据库是否已将\
    \ `STATUS` 列标记为**绑定敏感**或**绑定感知**，或两者兼有：\n\n```sql\nSQL> select child_number, executions,\
    \ buffer_gets, is_bind_sensitive as\n  2   \"BIND_SENSI\", is_bind_aware as \"\
    BIND_AWARE\", is_shareable as \"BIND_SHARE\"\n  3   from v$SQL\n  4*  where sql_text\
    \ like 'select /*+ ACS */%'\nSQL> /\n\nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI\
    \   BIND_AWARE  BIND_SHARE\n------------ ---------- ----------- -----------  ----------\
    \  -----------\n           0          1          43          Y            N  \
    \          Y\n\nSQL>\n```\n\n请注意，数据库将 `STATUS` 列标记为绑定敏感，因为 `STATUS` 列上有直方图。每次使用不同的绑定变量值执行查询时，数据库都会将执行统计信息与先前执行的统计信息进行比较。如果执行统计信息差异显著，它会将该列标记为绑定感知。数据库在决定是否将语句标记为绑定感知时使用的输入之一是处理的行数。一旦游标被标记为绑定感知，优化器将根据绑定变量的值选择执行计划。这里，`IS_BIND_AWARE`\
    \ 列标记为 `N`，因为没有先前的执行统计信息可供比较。`BIND_SHAREABLE` 列标记为 `Y`。\n\n再次发出查询，绑定变量设置为值 `Fine`。由于几乎所有行的\
    \ `STATUS` 列值都是 `Fine`，我们期望优化器倾向于进行全表扫描。然而，优化器选择的执行计划与之前完全相同（`INDEX RANGE SCAN`）。原因是数据库正在使用与第一次执行相同的执行计划——例如：\n\
    \n```sql\nSQL> exec :b := 'Fine';\n\nPL/SQL procedure successfully completed.\n\
    \nSQL> select /*+ ACS */ count(*) from demo where status = :b;\n\n  COUNT(*)\n\
    ----------\n     78524\n\nSQL> select * from table(dbms_xplan.display_cursor);\n\
    \nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    SQL_ID  cxau3vvabpzd0, child number 0\n-------------------------------------\n\
    select /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 3478245284\n\
    --------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name       | Rows  | Bytes | Cost (%CPU)| Time   \
    \  |\n--------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |            |       |       |     1 (100)|        \
    \  |\n|   1 |  SORT AGGREGATE   |            |     1 |     6 |            |  \
    \        |\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    |*  2 |   INDEX RANGE SCAN| IDX01_DEMO |   157 |   942 |     1   (0)| 00:00:52\
    \ |\n\n--------------------------------------------------------------------------------\n\
    Predicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   2 - access(\"STATUS\"=:B)\n\n19 rows selected.\n```\n\n由于 SQL 语句的游标被标记为绑定敏感，优化器使用了与之前相同的执行计划（`INDEX\
    \ RANGE SCAN`）。在以下示例中请注意，`BIND_AWARE` 列仍然标记为 `N`。优化器正在使用与之前相同的游标（`child_number`\
    \ 0）。\n\n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive\
    \ as\n  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"\
    BIND_SHARE\"\n  3   from v$sql\n  4   WHERE sql_text like 'select /*+ ACS */%';\n\
    \nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n------------\
    \ ---------- ----------- -----------  ----------  -----------\n           0  \
    \        2         220           Y           N            Y\n\nSQL>\n```\n\n再次执行查询，使用的\
    \ `STATUS` 列值与上一次查询相同（'`Fine`'）。看！优化器现在使用了 `INDEX FAST FULL SCAN`，而不是 `INDEX RANGE\
    \ SCAN`。执行计划的更改是自动的——就好像优化器在不断学习，并在确信新计划更高效时修改计划。以下是执行过程和新的计划：\n\n```sql\nSQL>\
    \  exec :b := 'Fine';\nPL/SQL procedure successfully completed.\n\nSQL> select\
    \ /*+ ACS */ count(*) from demo where status = :b;\n  COUNT(*)\n----------\n \
    \    78524\n\nSQL> select * from table(dbms_xplan.display_cursor);\nPLAN_TABLE_OUTPUT\n\
    --------------------------------------------------------------------------------\n\
    SQL_ID  cxau3vvabpzd0, child number 1\n-------------------------------------\n\
    select /*+ ACS */ count(*) from demo where status = :b\n\nPlan hash value: 2683512795\n\
    --------------------------------------------------------------------------------\n\
    | Id  | Operation             | Name       | Rows  | Bytes | Cost (%CPU)| Time\
    \   |\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT      |            |       |       |    45 (100)|    \
    \    |\n   |\n|   1 |  SORT AGGREGATE       |            |     1 |     6 |   \
    \         |        |\n   |\n|*  2 |   INDEX FAST FULL SCAN| IDX01_DEMO | 78524\
    \ |   460K|    45   (0)| 00:38:\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------\n\
    37 |\n--------------------------------------------------------------------------------\n\
    Predicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   2 - filter(\"STATUS\"=:B)\n19 rows selected.\n```\n\n请注意，`BIND_AWARE` 列现在显示值\
    \ `Y`。当我们第二次使用相同的绑定变量值（`Fine`）执行查询时，由于查询被标记为绑定敏感，数据库会评估上一次执行的执行统计信息。由于统计信息不同，它将游标标记为绑定感知。优化器随后决定新计划更优，因此执行硬解析并生成了一个使用\
    \ `INDEX FAST FULL SCAN` 而不是 `INDEX RANGE SCAN` 的新执行计划。以下查询显示了子游标的详细信息以及查询是绑定敏感还是绑定感知。\n\
    \n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive\
    \ as\n  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"\
    BIND_SHARE\"\n  3   from v$sql\n  4   WHERE sql_text like 'select /*+ ACS */%';\n\
    \nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n------------\
    \ ---------- ----------- -----------  ----------  -----------\n           0  \
    \        2         220           Y           N            Y\n           1    \
    \      1         184           Y           Y            Y\n\nSQL>\n```\n\n请注意，`IS_BIND_AWARE`\
    \ 列现在显示值 `Y`。还要注意，出现了一个新的子游标（`child_number` 1），它代表包含 `INDEX FAST FULL SCAN` 的新执行计划——这个新游标被标记为绑定感知。\n\
    \n我们再次执行查询，但这次使用原始的绑定变量值 `Coarse`。优化器将通过执行 `INDEX RANGE SCAN` 来选择正确的执行计划。以下是有关子游标的信息，以及查询是绑定敏感还是绑定感知。\n\
    \n```sql\nSQL> select child_number, executions, buffer_gets, is_bind_sensitive\
    \ as\n  2   \"BIND_SENSI\", is_bind_aware as \"BIND_AWARE\", is_shareable as \"\
    BIND_SHARE\"\n  3   from v$sql\n  4   where sql_text like 'select /*+ ACS */%';\n\
    \nCHILD_NUMBER EXECUTIONS BUFFER_GETS BIND_SENSI   BIND_AWARE  BIND_SHARE\n------------\
    \ ---------- ----------- -----------  ----------  -----------\n           0  \
    \        2         220           Y           N            N\n           1    \
    \      1         184           Y           Y            Y\n           2      \
    \    1           2           Y           Y            Y\n\nSQL>\n```\n\n数据库为此查询创建了一个新的子游标（`child_number`=2），并将原始游标（`child_cursor`=0）标记为非绑定感知。最终，数据库将从此游标从共享池中移除此游标。\n\
    \n在我们的示例中，我们在测试中仅使用了两个绑定变量值。如果有数十种不同的绑定变量值会怎样？Oracle 并非总是为每个不同的绑定变量值执行硬解析。最初它会对一些绑定变量值执行硬解析，在此过程中确定各种绑定变量与相关执行计划之间的关系。在建立了绑定变量值与相关执行计划的初始映射之后，Oracle\
    \ 足够智能，可以简单地从缓存中选择最优的子游标，而无需为其他绑定值执行硬解析。\n\n自适应游标共享是在 Oracle Database 11g 版本中引入的一项新功能。在更早的版本中，当\
    \ DBA 遇到数据库由于绑定窥探效应显然开始为某个 SQL 语句使用不合适的执行计划的情况时，常常会刷新共享池（更糟糕的是，有时会重启数据库）。在 11g\
    \ 版本中，你无需做任何事情——优化器在遇到倾斜数据时会自动更改执行计划。借助自适应游标共享，数据库对使用绑定变量的语句使用多个执行计划，确保始终根据绑定变量的值使用最佳执行计划。自适应游标共享意味着当不同的绑定变量值表明查询需要处理的数据量不同时，Oracle\
    \ 会调整其行为，为查询使用不同的执行计划，而不是对所有绑定值坚持使用相同的计划。由于自适应游标共享仅在字面值被绑定替换的地方有效，Oracle 鼓励你对\
    \ `cursor_sharing` 参数使用 `FORCE` 设置。如果将该参数设置为 `SIMILAR`，并且在列上有直方图，优化器不会用绑定变量执行字面替换，因此自适应游标共享不会发生。你必须将\
    \ `cursor_sharing` 参数设置为 `FORCE`，自适应游标共享才能工作，从而让优化器为不同的绑定变量值选择最优的执行计划。"
- fmt: "## 13-16. Creating Statistics on Expressions\n\n### Problem\n\nYou want to\
    \ create statistics on an expression such as an user-created function.\n\n###\
    \ Solution\n\nExecute the `GATHER_TABLE_STATS` procedure of the `DBMS_STATS` package\
    \ in the following way, to gather statistics on an expression. In this example,\
    \ we're gathering statistics for the `lower` function, which transforms the `cust_state_province`\
    \ column.\n\n```sql\nSQL> execute dbms_stats.gather_table_stats('sh','customers',-\n\
    \   > method_opt =>'for all columns size skewonly -\n   > for columns(lower(cust_state_province))\
    \ size skewonly');\n\nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\n\
    Alternatively, you can collect expression statistics by invoking the `create_extended_stats`\
    \ function—for example:\n\n```sql\nSQL> select\n  2  dbms_stats.create_extended_stats(null,'customers','(lower(cust_state_province))')\n\
    \  3  from dual;\n```\n\nNote that (`lower (cust_state_province)`) is called an\
    \ *extension,* because collecting statistics on functions is a type of Oracle\
    \ extended statistics. Any statistics you collect for expressions and column groups\
    \ (see Recipe 13-17) are called “extended statistics.”\n\n### How It Works\n\n\
    The optimizer knows the selectivity of a table's column and uses the selectivity\
    \ estimates for creating optimal execution plans. However, applying a function\
    \ to a column in the `WHERE` clause of a query throws the optimizer off, because\
    \ it can't estimate the selectivity of the underlying column. Here's an example\
    \ of a function that makes the optimizer's job harder:\n\n```sql\nSQL> select\
    \ count(*) from customers\n     where lower(cust_state_province) = 'CA';\n```\n\
    \nExpression statistics on functions enable the optimizer to obtain a vastly more\
    \ accurate selectivity value for predicates that involve expressions.\n\nYou can\
    \ issue the following query to find details about expression statistics on a table's\
    \ columns:\n\n```sql\nSQL> select extension_name, extension\n     from user_stat_extensions\n\
    \     where table_name='CUSTOMERS';\n\nEXTENSION_NAME                        \
    \              EXTENSION\n-------------------------------------------------- \
    \ ------------------------------\nSYS_STUBPHJSBRKOIK9O2YV3W8HOUE             \
    \         (LOWER(\"CUST_STATE_PROVINCE\"))\nSQL>\n```\n\nYou can delete expression\
    \ statistics you've collected on a table by using the `drop_extended_stats` function:\n\
    \n```sql\nSQL> exec dbms_stats.drop_extended_stats(null,'customers','(lower(cust_state_province))');\n\
    \nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\nNote that extended\
    \ statistics include both statistics on expressions such as a function and statistics\
    \ gathered for a column group that consists of two or more related columns. Recipe\
    \ 13-17 shows how to collect statistics on column groups.\n\n## 13-17. Creating\
    \ Statistics for Related Columns\n\n### Problem\n\nYou're aware that certain columns\
    \ from a table that are part of a join condition are correlated. You want to make\
    \ the optimizer aware of this relationship.\n\n### Solution\n\nIn order to generate\
    \ statistics for two or more related columns, you must first create a *column\
    \ group* and then collect fresh statistics for the table so the optimizer can\
    \ use the newly generated “extended statistics.” Use the `DBMS_STATS.CREATE_EXTENDED_STATS`\
    \ function to define a column group that consists of two or more columns from\
    \ a table. Here's how you execute this function to create a column group that\
    \ consists of the `COUNTRY_ID` and `CUST_STATE_PROVINCE` columns in the table\
    \ `SH.CUSTOMERS`.\n\n```sql\nSQL> select dbms_stats.create_extended_stats(null,'CUSTOMERS',\
    \ '(country_id,cust_state_province)') from dual;\n\nDBMS_STATS.CREATE_EXTENDED_STATS(NULL,'CUSTOMERS','(COUNTRY_ID,CUST_STATE_PROVINCE)')\n\
    --------------------------------------------------------------------------------\n\
    SYS_STUJGVLRVH5USVDU$XNV4_IR#4\nSQL>\n```\n\nOnce you create the column group,\
    \ gather fresh statistics for the `CUSTOMERS` table to generate statistics for\
    \ the new column group.\n\n```sql\nSQL> exec dbms_stats.gather_table_stats(null,'customers');\n\
    \nPL/SQL procedure successfully completed.\n\nSQL>\n```\n\n### How It Works\n\n\
    Often, values in one column of a table influence the values of another column\
    \ in that table, due to natural relationships that exist between the data stored\
    \ in the two columns. For example, the values of the `CUST_STATE_PROVINCE` column\
    \ in the `SH.CUSTOMERS` table are influenced by the values of the `COUNTRY_ID`\
    \ column. You can find a `CUST_STATE_PROVINCE` value of `Florida` only in the\
    \ United States. The optimizer doesn't know about real-life relationships and\
    \ thus tends to produce wrong estimates of the all-important cardinality statistic\
    \ when multiple related columns appear in the `WHERE` clause of a query or in\
    \ a `group_by` key. Column group statistics help the optimizer capture the correlation\
    \ among a table's columns. If a query includes the predicates `CUST_STATE_PROVINCE\
    \ ='Florida'` and `COUNTRY_ID=U.S.`, Oracle can derive a better estimate of the\
    \ combined selectivity of these two predicates by looking up the statistics for\
    \ the column group instead of using separate statistics for the two columns.\n\
    \nThe statistics the database gathers on the column groups that you create are\
    \ called extended statistics. These statistics provide much more accurate cardinality\
    \ estimates to the optimizer, which helps the optimizer produce more efficient\
    \ execution plans. When you create extended statistics, Oracle maintains a subset\
    \ of statistics for the column groups that you create, including the number of\
    \ distinct values, nulls, and histograms for the group. Even if a query contains\
    \ columns in addition to the columns that are part of a column group, the optimizer\
    \ takes advantage of the extended stats that are available to it. For example,\
    \ suppose you've created a column group as shown in this recipe, using the `CUST_STATE_PROVINCE`\
    \ and the `COUNTRY_ID` columns. If the `WHERE` clause for a query includes these\
    \ two columns as well as the `CUST_CITY` column, Oracle will still take advantage\
    \ of the extended statistics on the `CUST_STATE_PROVINCE` and `COUNTRY_ID` columns.\n\
    \n## 13-18. Automatically Creating Column Groups\n\n### Problem\n\nYou know that\
    \ creating extended statistics by generating statistics on correlated table columns\
    \ helps generate better execution plans. You want to find out how to select candidate\
    \ column groups for creating extended statistics."
  raw: '### 13-16. Creating Statistics on Expressions


    #### Problem


    You want to create statistics on an expression such as an user-created function.


    #### Solution


    Execute the `GATHER_TABLE_STATS` procedure of the `DBMS_STATS` package in the
    following way, to gather statistics on an expression. In this example, we''re
    gathering statistics for the `lower` function, which transforms the `cust_state_province`
    column.


    `SQL> execute dbms_stats.gather_table_stats(''sh'',''customers'',-`

    `   > method_opt =>''for all columns size skewonly -`

    `   > for columns(lower(cust_state_province)) size skewonly'');`


    `PL/SQL procedure successfully completed.`


    `SQL>`


    Alternatively, you can collect expression statistics by invoking the `create_extended_stats`
    function—for example:


    `SQL> select`

    `  2  dbms_stats.create_extended_stats(null,''customers'',''(lower(cust_state_province))'')`

    `  3  from dual;`


    Note that (`lower (cust_state_province)`) is called an *extension,* because collecting
    statistics on functions is a type of Oracle extended statistics. Any statistics
    you collect for expressions and column groups (see Recipe 13-17) are called “extended
    statistics.”


    #### How It Works


    The optimizer knows the selectivity of a table''s column and uses the selectivity
    estimates for creating optimal execution plans. However, applying a function to
    a column in the `WHERE` clause of a query throws the optimizer off, because it
    can''t estimate the selectivity of the underlying column. Here''s an example of
    a function that makes the optimizer''s job harder:


    `SQL> select count(*) from customers`

    `     where lower(cust_state_province) = ''CA'';`


    Expression statistics on functions enable the optimizer to obtain a vastly more
    accurate selectivity value for predicates that involve expressions.


    You can issue the following query to find details about expression statistics
    on a table''s columns:


    `SQL> select extension_name, extension`

    `     from user_stat_extensions`

    `     where table_name=''CUSTOMERS'';`


    `EXTENSION_NAME                                  EXTENSION`

    `------------------------------------           ------------------------------`

    `SYS_STUBPHJSBRKOIK9O2YV3W8HOUE                 (LOWER("CUST_STATE_PROVINCE"))`

    `SQL>`


    You can delete expression statistics you''ve collected on a table by using the
    `drop_extended_stats` function:


    `SQL> exec dbms_stats.drop_extended_stats(null,''customers'',''(lower(cust_state_pro`

    `vince))'');`


    `PL/SQL procedure successfully completed.`


    `SQL>`


    Note that extended statistics include both statistics on expressions such as a
    function and statistics gathered for a column group that consists of two or more
    related columns. Recipe 13-17 shows how to collect statistics on column groups.


    ### 13-17. Creating Statistics for Related Columns


    #### Problem


    You''re aware that certain columns from a table that are part of a join condition
    are correlated. You want to make the optimizer aware of this relationship.


    #### Solution


    In order to generate statistics for two or more related columns, you must first
    create a *column group* and then collect fresh statistics for the table so the
    optimizer can use the newly generated “extended statistics.” Use the `DBMS_STATS.CREATE_EXTENDED_STATS`
    function to define a column group that consists of two or more columns from a
    table. Here''s how you execute this function to create a column group that consists
    of the `COUNTRY_ID` and `CUST_STATE_PROVINCE` columns in the table `SH.CUSTOMERS`.


    `SQL> select dbms_stats.create_extended_stats(null,''CUSTOMERS'', ''(country_id,cust`

    `_state_province)'') from dual;`


    `DBMS_STATS.CREATE_EXTENDED_STATS(NULL,''CUSTOMERS'',''(COUNTRY_ID,CUST_STATE_PROVIN`

    `--------------------------------------------------------------------------------`


    `SYS_STUJGVLRVH5USVDU$XNV4_IR#4`

    `SQL>`


    Once you create the column group, gather fresh statistics for the `CUSTOMERS`
    table to generate statistics for the new column group.


    `SQL> exec dbms_stats.gather_table_stats(null,''customers'');`


    `PL/SQL procedure successfully completed.`


    `SQL>`


    #### How It Works


    Often, values in one column of a table influence the values of another column
    in that table, due to natural relationships that exist between the data stored
    in the two columns. For example, the values of the `CUST_STATE_PROVINCE` column
    in the `SH.CUSTOMERS` table are influenced by the values of the `COUNTRY_ID` column.
    You can find a `CUST_STATE_PROVINCE` value of `Florida` only in the United States.
    The optimizer doesn''t know about real-life relationships and thus tends to produce
    wrong estimates of the all-important cardinality statistic when multiple related
    columns appear in the `WHERE` clause of a query or in a `group_by` key. Column
    group statistics help the optimizer capture the correlation among a table''s columns.
    If a query includes the predicates `CUST_STATE_PROVINCE =''Florida''` and `COUNTRY_ID=U.S.`,
    Oracle can derive a better estimate of the combined selectivity of these two predicates
    by looking up the statistics for the column group instead of using separate statistics
    for the two columns.


    The statistics the database gathers on the column groups that you create are called
    extended statistics. These statistics provide much more accurate cardinality estimates
    to the optimizer, which helps the optimizer  produce more efficient execution
    plans. When you create extended statistics, Oracle maintains a subset of statistics
    for the column groups that you create, including the number of distinct values,
    nulls, and histograms for the group. Even if a query contains columns in addition
    to the columns that are part of a column group, the optimizer takes advantage
    of the extended stats that are available to it. For example, suppose you''ve created
    a column group as shown in this recipe, using the `CUST_STATE_PROVINCE` and the
    `COUNTRY_ID` columns. If the `WHERE` clause for a query includes these two columns
    as well as the `CUST_CITY` column, Oracle will still take advantage of the extended
    statistics on the `CUST_STATE_PROVINCE` and `COUNTRY_ID` columns.


    ### 13-18. Automatically Creating Column Groups


    #### Problem


    You know that creating extended statistics by generating statistics on correlated
    table columns helps generate better execution plans. You want to find out how
    to select candidate column groups for creating extended statistics.'
  trans: "## 13-16. 在表达式上创建统计信息\n\n### 问题\n\n你想在表达式（例如用户创建的函数）上创建统计信息。\n\n### 解法\n\
    \n按以下方式执行 `DBMS_STATS` 包中的 `GATHER_TABLE_STATS` 过程，以收集表达式上的统计信息。在此示例中，我们正在为 `lower`\
    \ 函数收集统计信息，该函数转换 `cust_state_province` 列。\n\n```sql\nSQL> execute dbms_stats.gather_table_stats('sh','customers',-\n\
    \   > method_opt =>'for all columns size skewonly -\n   > for columns(lower(cust_state_province))\
    \ size skewonly');\n\nPL/SQL 过程成功完成。\n\nSQL>\n```\n\n或者，你可以通过调用 `create_extended_stats`\
    \ 函数来收集表达式统计信息——例如：\n\n```sql\nSQL> select\n  2  dbms_stats.create_extended_stats(null,'customers','(lower(cust_state_province))')\n\
    \  3  from dual;\n```\n\n注意，`lower(cust_state_province)` 被称为一个*扩展*，因为对函数收集统计信息是\
    \ Oracle 扩展统计信息的一种类型。你为表达式和列组（参见配方 13-17）收集的任何统计信息都称为“扩展统计信息”。\n\n### 工作原理\n\n\
    优化器了解表列的选择性，并使用选择性估计值来创建最优执行计划。然而，在查询的 `WHERE` 子句中对列应用函数会使优化器难以处理，因为它无法估计底层列的选择性。下面是一个使优化器工作更困难的函数示例：\n\
    \n```sql\nSQL> select count(*) from customers\n     where lower(cust_state_province)\
    \ = 'CA';\n```\n\n函数上的表达式统计信息使优化器能够为涉及表达式的谓词获得更准确的选择性值。\n\n你可以发出以下查询以查找表列上表达式统计信息的详细信息：\n\
    \n```sql\nSQL> select extension_name, extension\n     from user_stat_extensions\n\
    \     where table_name='CUSTOMERS';\n\nEXTENSION_NAME                        \
    \              EXTENSION\n-------------------------------------------------- \
    \ ------------------------------\nSYS_STUBPHJSBRKOIK9O2YV3W8HOUE             \
    \         (LOWER(\"CUST_STATE_PROVINCE\"))\nSQL>\n```\n\n你可以使用 `drop_extended_stats`\
    \ 函数删除已在表上收集的表达式统计信息：\n\n```sql\nSQL> exec dbms_stats.drop_extended_stats(null,'customers','(lower(cust_state_province))');\n\
    \nPL/SQL 过程成功完成。\n\nSQL>\n```\n\n注意，扩展统计信息既包括函数等表达式上的统计信息，也包括为由两个或多个相关列组成的列组收集的统计信息。配方\
    \ 13-17 展示了如何收集列组的统计信息。\n\n## 13-17. 为相关列创建统计信息\n\n### 问题\n\n你意识到作为连接条件一部分的表中的某些列是相关的。你希望让优化器知道这种关系。\n\
    \n### 解法\n\n为了为两个或多个相关列生成统计信息，你必须首先创建一个*列组*，然后为表收集新的统计信息，以便优化器可以使用新生成的“扩展统计信息”。使用\
    \ `DBMS_STATS.CREATE_EXTENDED_STATS` 函数来定义一个由表中两个或多个列组成的列组。以下是执行此函数以在表 `SH.CUSTOMERS`\
    \ 中创建包含 `COUNTRY_ID` 和 `CUST_STATE_PROVINCE` 列的列组的方法。\n\n```sql\nSQL> select dbms_stats.create_extended_stats(null,'CUSTOMERS',\
    \ '(country_id,cust_state_province)') from dual;\n\nDBMS_STATS.CREATE_EXTENDED_STATS(NULL,'CUSTOMERS','(COUNTRY_ID,CUST_STATE_PROVINCE)')\n\
    --------------------------------------------------------------------------------\n\
    SYS_STUJGVLRVH5USVDU$XNV4_IR#4\nSQL>\n```\n\n创建列组后，收集 `CUSTOMERS` 表的新统计信息，以为新列组生成统计信息。\n\
    \n```sql\nSQL> exec dbms_stats.gather_table_stats(null,'customers');\n\nPL/SQL\
    \ 过程成功完成。\n\nSQL>\n```\n\n### 工作原理\n\n通常，表中一列中的值会影响该表中另一列的值，这是由于存储在这两列中的数据之间存在的自然关系。例如，`SH.CUSTOMERS`\
    \ 表中的 `CUST_STATE_PROVINCE` 列的值受到 `COUNTRY_ID` 列值的影响。你只会在美国找到 `CUST_STATE_PROVINCE`\
    \ 值为 `Florida` 的记录。优化器不了解现实生活中的关系，因此当多个相关列出现在查询的 `WHERE` 子句或 `group_by` 键中时，往往会对至关重要的基数统计信息产生错误的估计。列组统计信息有助于优化器捕获表列之间的相关性。如果查询包含谓词\
    \ `CUST_STATE_PROVINCE ='Florida'` 和 `COUNTRY_ID=U.S.`，Oracle 可以通过查找列组的统计信息而不是使用两个列的单独统计信息，来推导出这两个谓词组合选择性的更好估计值。\n\
    \n数据库为你在创建的列组上收集的统计信息称为扩展统计信息。这些统计信息为优化器提供了更准确的基数估计，这有助于优化器生成更高效的执行计划。当你创建扩展统计信息时，Oracle\
    \ 会维护你创建的列组的统计信息子集，包括不同值的数量、空值以及组的直方图。即使查询包含除了列组中列之外的列，优化器也会利用可用的扩展统计信息。例如，假设你已如本配方所示，使用\
    \ `CUST_STATE_PROVINCE` 和 `COUNTRY_ID` 列创建了一个列组。如果查询的 `WHERE` 子句除了这两个列之外还包含 `CUST_CITY`\
    \ 列，Oracle 仍将利用 `CUST_STATE_PROVINCE` 和 `COUNTRY_ID` 列上的扩展统计信息。\n\n## 13-18. 自动创建列组\n\
    \n### 问题\n\n你知道通过在相关表列上生成统计信息来创建扩展统计信息有助于生成更好的执行计划。你想了解如何选择候选列组来创建扩展统计信息。"
- fmt: "### 13-18. Automatic Column Group Creation\n\n#### Solution\n\n在 Oracle Database\
    \ 11.2.0.2 及更高版本中，您可以使用 *Auto Column Group Creation* 功能，让数据库告诉您必须创建哪些列组。此功能仅用于创建列组，不能用于为包含表达式的列收集扩展统计信息（参见配方\
    \ 13-16）。\n\n要使用自动列组创建功能并让数据库提供建议，您必须让数据库监控其工作负载。首先执行 `DBMS_STATS.SEED_COL_USAGE`\
    \ 过程来确定需要创建的适当列组：\n\n```\nSQL> begin\n      dbms_stats.seed_col_usage(null,null,900);\n\
    \      end;\n      /\n```\n\n通过执行此过程，您告知数据库监控工作负载 15 分钟（900 秒），以确定是否需要创建任何列组。该过程捕获列使用信息并存储在\
    \ `sys.col_group_usage$` 视图中。\n\n接下来运行一些查询以创建工作负载。如果查询运行时间很长，您可以仅运行这些查询的执行计划，以便数据库捕获列组信息。监控期（15\
    \ 分钟）结束后，使用以下查询查看捕获的列使用信息：\n\n```\nSQL> select dbms_stats.report_col_usage(user,'customers')\
    \ from dual;\n```\n\n`REPORT_COL_USAGE` 过程显示 `CUSTOMERS` 表的列使用情况报告，基于您已执行的查询和运行的执行计划。列使用情况显示了数据库如何使用\
    \ `CUSTOMERS` 表的每一列，并以以下格式列出：\n\n*   `Equality predicates (EQ)`：如果某列用于等式谓词，例如在子句\
    \ `where COUNTRY_ID='US'` 中，则该列是独立使用的。在这种情况下不需要扩展统计信息。\n*   `FILTER`：如果一组列用于 `SELECT`\
    \ 语句，并且这些列中的一个或多个出现在该语句的 `GROUP BY` 子句中，则 `SELECT` 语句中的所有列都被记录为一个列组过滤器。\n*   `GROUP_BY`：在\
    \ `GROUP_BY` 子句中一起使用的所有列。\n\n查看列使用情况报告后，您可以允许 Oracle 自动为过滤器谓词中使用的列和 `GROUP_BY`\
    \ 子句中使用的列创建列组。通过执行以下过程完成：\n\n```\nSQL> select dbms_stats.create_extended_stats(user,'customers')\
    \ from dual;\n```\n\n或者，您可以只为指定的列创建列组，通过发出以下命令：\n\n```\nSQL> select dbms_stats.create_extended_stats(null,'CUSTOMERS',\
    \ '(cust_city,cust_state_province,country_id)') from dual\nSQL> /\nSYS_STUMZ$C3AIHLPBROI#SKA58H_N\n\
    SQL>\n```\n\n此时，您已经创建了列组，但列组上没有统计信息。重新收集 `CUSTOMERS` 表的统计信息以为新列组生成统计信息——例如：\n\n\
    ```\nSQL> exec dbms_stats.gather_table_stats(user,'customers')\nPL/SQL procedure\
    \ successfully completed.\nSQL>\n```\n\n#### How It Works\n\n让 Oracle 根据工作负载期间的实际列使用情况指出潜在的列组，比您尝试为每个表确定适当的列组要高效得多。一旦运行了工作负载，您可以查看列使用情况报告，并通过执行\
    \ `dbms_stats.create_extended_stats` 函数并将 `table_name` 参数的值传递为 `NULL`，来要求数据库同时为整个模式创建所有提议的列组。\n\
    \n### 13-19. Maintaining Statistics on Partitioned Tables\n\n#### Problem\n\n\
    您频繁地向一个或多个分区加载数据，维护全局统计信息成了问题。您希望在不经历耗时耗资源的过程的情况下收集新的全局统计信息。\n\n#### Solution\n\
    \n您可以使用 Oracle 11g 版本中的 *incremental statistics maintenance* 功能，在每次加载新分区后维护全局统计信息。例如，如果您想维护\
    \ `SH.SALES` 表的全局统计信息，请遵循以下步骤：\n\n1.  为 `SH.SALES` 表启用增量统计信息收集：\n    ```\n   \
    \ SQL> exec dbms_stats.set_table_prefs('SH','SALES','INCREMENTAL','TRUE');\n \
    \   PL/SQL procedure successfully completed.\n    SQL>\n    ```\n2.  在向分区加载数据后，收集全局表级统计信息，如下所示：\n\
    \    ```\n    SQL> exec dbms_stats.gather_table_stats('SH','SALES');\n    PL/SQL\
    \ procedure successfully completed.\n    SQL>\n    ```\n\n要为分区表设置增量统计信息收集功能，必须为\
    \ `ESTIMATE_PERCENT` 参数指定 `AUTO_SAMPLE_SIZE` 值，并为 `GRANULARITY` 参数指定 `AUTO` 值。"
  raw: "#### Solution\n\nIn Oracle Database 11.2.0.2 and later releases, you can use\
    \ the *Auto Column Group Creation* feature to let the database tell you which\
    \ column groups you must create. You can use this feature only for creating column\
    \ groups, but not for collecting extended statistics for columns with expressions\
    \ (see Recipe 13-16).\n\nIn order to use the Auto Column Group Creation capability\
    \ and let the database provide advice on which column groups to create in the\
    \ database, you must let the database monitor the workload in the database. Begin\
    \ by executing the `DBMS_STATS.SEED_COL_USAGE` procedure to determine the appropriate\
    \ column groups that you must create:\n\n`SQl> begin`\n`     dbms_stats.seed_col_usage(null,null,900);`\n\
    `     end;`\n`     /`\n\nBy executing this procedure, you're telling the database\
    \ to monitor the workload for 15 minutes (900 seconds) to determine if you need\
    \ to create any column groups. The procedure captures the column usage information\
    \ and stores it in the `sys.col_group_usage$` view.\n\nNext run some queries to\
    \ create the workload. If the queries are long-running, you can just run explain\
    \ plan statements for the queries so the database can capture the column group\
    \ information. Once the monitoring period (15 minutes) is over, review the captured\
    \ column usage information by using the following query:\n\n`SQL> select dbms_stats.report_col_usage(user,'customers')\
    \ from dual;`\n\nThe `REPORT_COL_USAGE` procedure shows a column usage report\
    \ for the `CUSTOMERS` table, based on the queries you've executed, and the explain\
    \ plans that you ran. The column usage shows how the database used each column\
    \ of the `CUSTOMERS` table, and lists column usage in the following format:\n\n\
    *   `Equality predicates (EQ)`: If a column was used in an equality predicate\
    \ such as in the clause `where COUNTRY_ID='US'`, that column was used independently.\
    \ No extension statistics are called for in this case.\n*   `FILTER`: If a set\
    \ of columns was used in a `SELECT` statement that contained one or more of those\
    \ columns in a `GROUP BY` clause, all columns in the `SELECT` statement are recorded\
    \ as a column group filter.\n*   `GROUP_BY`: All columns used together in a `GROUP_BY`\
    \ clause.\n\nOnce you view the column usage report, you can let Oracle automatically\
    \ create the column groups for the columns used in the filter predicates and the\
    \ columns used in the `GROUP_BY` clause. Do that by executing the following procedure:\n\
    \n`SQL>select dbms_stats.create_extended_stats(user,'customers') from dual;`\n\
    \nAlternatively, you can create column groups only for columns that you specify,\
    \ by issuing the following command:\n\n`SQL> select dbms_stats.create_extended_stats(null,'CUSTOMERS',\
    \ '(cust_city,cust_`\n`state_province,country_id)') from dual`\n`SQL> /`\n`DBMS_STATS.CREATE_EXTENDED_STATS(NULL,'CUSTOMERS','(CUST_CITY,CUST_STATE_PROVINC`\n\
    \n`--------------------------------------------------------------------------------`\n\
    `SYS_STUMZ$C3AIHLPBROI#SKA58H_N`\n`SQL>`\n\nAt this point, you've created the\
    \ column group, but there are no statistics on the column group. Regather statistics\
    \ for the `CUSTOMERS` table to generate statistics for the new column group—for\
    \ example:\n\n`SQL> exec dbms_stats.gather_table_stats(user,'customers')`\n`PL/SQL\
    \ procedure successfully completed.`\n`SQL>`\n\n#### How It Works\n\nLetting Oracle\
    \ point out potential column groups based on the actual column usage during a\
    \ workload is far more efficient than your trying to figure out the appropriate\
    \ column groups for each table. Once you run the workload, you can view the column\
    \ usage report and ask the database to create all proposed column groups for  an\
    \ entire schema at the same time, by executing the `dbms_stats.create_extended_stats`\
    \ function and passing the value `NULL` for the `table_name` parameter.\n\n###\
    \ 13-19. Maintaining Statistics on Partitioned Tables\n\n#### Problem\n\nYou load\
    \ data into one or more partitions frequently, and the maintenance of global statistics\
    \ is a problem. You want to collect new global statistics without having to go\
    \ through a time- and resource-consuming process.\n\n#### Solution\n\nYou can\
    \ use the *incremental statistics maintenance* feature in the Oracle 11g release\
    \ to maintain global statistics after each load into a new partition. For example,\
    \ if you want to maintain global statistics for the `SH.SALES` table, here are\
    \ the steps to follow:\n\n1.  Turn on incremental statistics collection for the\
    \ `SH.SALES` table: `SQL> exec dbms_stats.set_table_prefs('SH','SALES','INCREMENTAL','TRUE');`\n\
    \n    `PL/SQL procedure successfully completed.`\n\n    `SQL>`\n2.  After each\
    \ load into a partition, gather global table-level statistics as shown here: `SQL>\
    \ exec dbms_stats.gather_table_stats('SH','SALES');`\n\n    `PL/SQL procedure\
    \ successfully completed.`\n\n    `SQL>`\n\nIn order to set the incremental statistics\
    \ collection feature for partitioned tables, you must specify the `AUTO_SAMPLE_SIZE`\
    \ value for the `ESTIMATE_PERCENT` parameter and the `AUTO` value for the `GRANULARITY`\
    \ parameter."
