    `ORA-06512: at line 42`


    Although it is recommended to use the `awrrpt.sql` script to generate the desired
    AWR report, you can manually use the `AWR_REPORT_TEXT` or `AWR_REPORT_HTML` functions
    within the `DBMS_WORKLOAD_REPOSITORY` package to generate an AWR report, if needed.
    You need to also have your database''s DBID and instance number handy as well
    when running either of these functions. See the following for an example:


    `SELECT  dbms_workload_repository.awr_report_text`

    `        (l_dbid=>2334201269,l_inst_num=>1,l_bid=>258,l_eid=>268)`

    `FROM dual;`


    ### 4-4. Generating an AWR Report via Enterprise Manager


    #### Problem


    You want to generate an AWR report from within Enterprise Manager.


    #### Solution


    Within Enterprise Manager, depending on your version, the manner in which to generate
    an AWR report may differ. There is also generally more than one way to generate
    an AWR report. In [Figure 4-1](#Chapter04.html#fig_4_1), this particular screen
    shows that you enter the beginning and ending snapshot ranges, and after you click
    the Generate Report button, an AWR HTML report will immediately be displayed within
    your browser window. A sample screen of the resulting AWR report is shown in [Figure
    4-2](#Chapter04.html#fig_4_2).


    ![images](images/0401.jpg)


    ***Figure 4-1.** Generating an AWR report within Enterprise Manager*


    ![images](images/0402.jpg)


    ***Figure 4-2.** HTML AWR report*


    #### How It Works


    The AWR report via Enterprise Manager can be generated if you have Database Control
    configured, or if you are using Grid Control. You need to be licensed for the
    Oracle Diagnostics Pack in order to be able to use this feature.


    ### 4-5. Generating an AWR Report for a Single SQL Statement


    #### Problem


    You want to see statistics for a single SQL statement, and do not want all other
    associated statistics generated from an AWR report.'
