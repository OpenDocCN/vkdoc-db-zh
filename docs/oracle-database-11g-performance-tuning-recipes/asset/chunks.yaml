  trans: "\n## 解决方案\n\n当诊断 Oracle 数据库网络连接问题时，请遵循以下步骤作为指导：\n\n1.  使用操作系统的 `ping` 工具来确定远程主机是否可访问——例如：\n\
    \    ```\n    $ ping dwdb\n    dwdb is alive\n    ```\n    如果 `ping` 不起作用，请联系您的系统或网络管理员，确保已建立服务器到服务器的连接。\n\
    2.  使用 `telnet` 查看您是否可以连接到远程服务器和端口（即监听器正在监听的端口）——例如：\n    ```\n    $ telnet ora03\
    \ 1521\n    Trying 127.0.0.1...\n    Connected to ora03.\n    Escape character\
    \ is '^]'.\n    ```\n    上述输出表明到服务器和端口的连接正常。如果上述命令挂起，请联系您的系统管理员或网络管理员以获取进一步协助。\n\
    3.  使用 `tnsping` 来确定 Oracle Net 是否正常工作。该工具将验证是否可以通过网络建立到数据库的 Oracle Net 连接——例如：\n\
    \    ```\n    $ tnsping dwrep\n    ..........\n    Used TNSNAMES adapter to resolve\
    \ the alias\n    Attempting to contact (DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)\n\
    \    (HOST = dwdb1.us.farm.com)(PORT = 1521))\n    (CONNECT_DATA = (SERVER = DEDICATED)\
    \ (SERVICE_NAME = DWREP)))\n    OK (500 msec)\n    ```\n    如果 `tnsping` 无法联系到远程数据库，请验证远程监听器和数据库是否都已启动并运行。在远程主机上，使用\
    \ `lsnrctl status` 命令来验证监听器是否已启动。通过使用非 `SYS` 帐户建立本地连接来验证远程数据库是否可用（`SYS` 帐户通常可以在其他方案无法工作时连接到有问题的数据库）。\n\
    4.  验证 `TNS` 信息是否正确。如果远程监听器和数据库工作正常，那么请确保用于确定 `TNS` 信息的机制（如 `tnsnames.ora` 文件）包含正确的信息。\n\
    \    有时客户端机器可能有多个 `TNS_ADMIN` 位置和 `tnsnames.ora` 文件。验证是否正在使用某个特定 `tnsnames.ora`\
    \ 文件的一种方法是重命名它，然后在尝试连接到远程数据库时查看是否会出现不同的错误。\n\n## 工作原理\n\n网络连接问题可能难以诊断，因为其正确运行需要多个架构组件就位。您需要确保以下各项到位：\n\
    \n*   功能正常的网络\n*   端到端开放的端口\n*   正确安装和配置的 Oracle Net\n*   目标数据库和监听器已启动并运行\n* \
    \  从客户端到目标数据库的正确导航信息\n\n如果您仍然遇到问题，请检查客户端的 `sqlnet.log` 文件和远程服务器的 `listener.log`\
    \ 文件。有时这些日志文件会显示能够定位问题的附加信息。\n\n## 6-9. 将资源密集型进程映射到数据库进程\n\n### 问题\n\n那是一个漆黑风雨交加的夜晚，系统性能糟糕。您在主机上识别出一个操作系统级别的资源密集型进程。您希望将该操作系统进程映射回数据库进程。如果该数据库进程是一个\
    \ SQL 进程，您还想显示 SQL 语句的用户及其 SQL 文本。\n\n### 解决方案\n\n在 Linux/Unix 环境中，如果您能识别出资源密集型的操作系统进程，那么您可以轻松检查该进程是否与数据库进程相关联。该过程包括以下步骤：\n\
    \n1.  运行操作系统命令以识别资源密集型进程及关联的 ID。\n2.  确定与该进程关联的数据库。\n3.  从数据库数据字典视图中提取有关该进程的详细信息。\n\
    4.  如果是 SQL 语句，则获取这些详细信息。\n5.  为该 SQL 语句生成执行计划。\n\n例如，假设您使用 `ps` 命令识别出消耗 CPU 最多的查询：\n\
    ```\n$ ps -e -o pcpu,pid,user,tty,args|grep -i oracle|sort -n -k 1 -r|head\n```\n\
    这是一些示例输出：\n```\n16.4 11026   oracle ?       oracleDWREP (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
    \ 0.1  6448   oracle ?       oracleINVPRD (LOCAL=NO)\n 0.5  3639   oracle ?  \
    \     ora_dia0_STAGE\n 0.4 28133   oracle ?       ora_dia0_DEVSEM\n 0.4  4093\
    \   oracle ?       ora_dia0_DWODI\n 0.4  3534   oracle ?       ora_dia0_ENGDEV\n\
    \ 0.2  4111   oracle ?       ora_mmnl_DWODI\n```\n上述输出识别出一个操作系统进程消耗了过多的 CPU（16.4%）。进程\
    \ ID 是 11026，名称是 `oracleDWREP`。从进程名称看，这是与 `DWREP` 数据库关联的一个 Oracle 进程。\n\n您可以通过查询数据字典来确定这是哪种类型的\
    \ Oracle 进程：\n```sql\nSELECT\n  'USERNAME   : ' || s.username     || CHR(10) ||\n\
    \  'SCHEMA     : ' || s.schemaname   || CHR(10) ||\n  'OSUSER     : ' || s.osuser\
    \       || CHR(10) ||\n  'PROGRAM    : ' || s.program      || CHR(10) ||\n  'SPID\
    \       : ' || p.spid         || CHR(10) ||\n  'SID        : ' || s.sid      \
    \    || CHR(10) ||\n  'SERIAL#    : ' || s.serial#      || CHR(10) ||\n  'KILL\
    \ STRING: ' || '''' || s.sid || ',' || s.serial# || ''''  || CHR(10) ||\n  'MACHINE\
    \    : ' || s.machine      || CHR(10) ||\n  'TYPE       : ' || s.type        \
    \ || CHR(10) ||\n  'TERMINAL   : ' || s.terminal     || CHR(10) ||\n  'SQL ID\
    \     : ' || q.sql_id       || CHR(10) ||\n  'SQL TEXT   : ' || q.sql_text\nFROM\
    \ v$session s\n    ,v$process p\n    ,v$sql     q\nWHERE s.paddr  = p.addr\nAND\
    \   p.spid   = '&&PID_FROM_OS'\nAND   s.sql_id = q.sql_id(+);\n```\n上述脚本会提示您输入操作系统进程\
    \ ID。这是本示例的输出：\n```\nUSERNAME   : MV_MAINT\nSCHEMA     : MV_MAINT\nOSUSER    \
    \ : oracle\nPROGRAM    : sqlplus@dwdb (TNS V1-V3)\nSPID       : 11026\nSID   \
    \     : 410\nSERIAL#    : 30653\nKILL STRING: '410,30653'\nMACHINE    : dwdb\n\
    TYPE       : USER\nTERMINAL   : pts/2\nSQL ID     : by3c8848gyngu\nSQL TEXT  \
    \ : SELECT \"A1\".\"REGISTRATION_ID\",\"A1\".\"PRODUCT_INSTANCE_ID\"\n,\"A1\"\
    .\"SOA_ID\",\"A1\".\"REG_SOURCE_IP_ADDR\",\"A1\"...\n```\n输出表明这是一个 SQL*Plus 进程，其数据库\
    \ `SID` 为 410，`SERIAL#` 为 30653。如果您决定使用 `ALTER SYSTEM KILL SESSION` 语句终止该进程（详情请参阅配方\
    \ 6-10），您将需要这些信息。\n\n在此示例中，由于该进程正在运行 SQL 语句，可以通过生成执行计划来提取有关该查询的更多详细信息：\n```sql\n\
    SQL> SELECT * FROM table(DBMS_XPLAN.DISPLAY_CURSOR(('&&sql_id')));\n```\n运行上述语句时，系统将提示您输入\
    \ `sql_id`（在此示例中，`sql_id` 是 `by3c8848gyngu`）。以下是部分输出列表：\n"
- fmt: "# Chapter 7\n\n## 6-10. 终止资源密集型进程\n\n### 问题\n\n你已经识别出一个消耗大量系统资源的进程（参见配方 6-9），并确定它是一个需要被终止的失控\
    \ SQL 语句。\n\n### 解决方案\n\n有三种基本方法可以终止 SQL 进程：\n\n*   如果你能访问正在运行 SQL 语句的终端，可以按下\
    \ `Ctrl+C` 尝试终止进程。\n*   确定会话 ID 和序列号，然后使用 SQL 的 `ALTER SYSTEM KILL SESSION` 语句。\n\
    *   确定操作系统进程 ID，并使用 `kill` 实用程序来停止进程。\n\n如果你碰巧能访问运行资源密集型 SQL 语句的终端，可以尝试按下 `Ctrl+C`\
    \ 来终止进程。通常你无法访问终端，必须使用 SQL 语句或操作系统命令来终止进程。\n\n#### 使用 SQL 杀死会话\n\n如果它是一个 Oracle\
    \ 进程，并且你已经确定了 `SID` 和 `SERIAL#`（参见配方 6-9），你可以在 SQL*Plus 中终止进程。以下是通用语法：\n\n```sql\n\
    alter system kill session 'integer1, integer2 [,integer3]' [immediate];\n```\n\
    \n在上面的语法语句中，`integer1` 是 `SID` 列的值，`integer2` 是 `SERIAL#` 列的值（来自 `V$SESSION`）。在\
    \ RAC 环境中，你可以选择为 `integer3` 指定实例 ID 的值。实例 ID 可以从 `GV$SESSION` 视图中检索。\n\n以下是一个终止\
    \ `SID` 为 1177、`SERIAL#` 为 38583 的进程的示例：\n\n```sql\nSQL> alter system kill session\
    \ '1177,38583';\n```\n\n如果成功，你应该会看到此输出：\n\n```\nSystem altered.\n```\n\n当你杀死一个会话时，这会将会话标记为已终止，回滚活动事务（在会话内），并释放任何锁（由会话持有）。会话将保持在终止状态，直到所有依赖事务被回滚。如果回滚事务需要一分钟或更长时间，Oracle\
    \ 会将该会话报告为“标记为要终止”，并将控制权返回给 SQL 提示符。如果你指定 `IMMEDIATE`（可选），Oracle 将回滚任何活动事务并立即将控制权返回给你。\n\
    \n#### 使用操作系统 kill 命令\n\n如果你能访问数据库服务器，并且拥有可以终止 Oracle 进程的操作系统帐户权限（例如 `oracle`\
    \ 操作系统帐户），你也可以直接使用 `kill` 命令终止进程。\n\n例如，假设你运行了 `ps` 命令，并已经完成相关工作，确定有一个已运行数小时并需要被终止的\
    \ SQL 语句。`kill` 命令直接终止操作系统进程。在此示例中，进程 ID 6254 被终止：\n\n```bash\n$ kill -9 6254\n\
    ```\n\n![images](images/square.jpg) **注意** 确保你没有杀死错误的 Oracle 进程。如果不小心杀死了必需的 Oracle\
    \ 后台进程，这将导致你的实例中止。\n\n### 工作原理\n\n有时你会发现自己处于需要终止挂起的 SQL 进程、数据库作业或消耗大量资源的 SQL 语句的情况。例如，你可能有一个测试服务器，其中一个作业已经运行了几个小时，消耗了大量服务器资源，需要被停止，以便其他作业能够及时继续处理。\n\
    \n手动杀死 SQL 语句将导致事务被回滚。因此请谨慎操作。确保你正在终止正确的进程。如果你错误地终止了关键进程，这显然会对应用程序和相关数据产生不利影响。\n\
    \n# Chapter 7\n\n`SQL_ID  by3c8848gyngu, child number 0`\n`-------------------------------------`\n\
