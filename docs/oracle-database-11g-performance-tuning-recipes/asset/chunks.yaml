- fmt: "# Chapter 1\n\n## Optimizing Table Performance\n\nThis chapter details database\
    \ features that impact the performance of storing and retrieving data within a\
    \ table. Table performance is partially determined by database characteristics\
    \ implemented prior to creating tables. For example, the physical storage features\
    \ implemented when first creating a database and associated tablespaces subsequently\
    \ influence the performance of tables. Similarly, performance is also impacted\
    \ by your choice of initial physical features such as table types and data types.\
    \ Therefore implementing practical database, tablespace, and table creation standards\
    \ (with performance in mind) forms the foundation for optimizing data availability\
    \ and scalability.\n\nAn `Oracle database` is comprised of the physical structures\
    \ used to store, manage, secure, and retrieve data. When first building a database,\
    \ there are several performance-related features that you can implement at the\
    \ time of database creation. For example, the initial layout of the datafiles\
    \ and the type of tablespace management are specified upon creation. Architectural\
    \ decisions instantiated at this point often have long-lasting implications.\n\
    \nA `tablespace` is the logical structure that allows you to manage a group of\
    \ datafiles. Datafiles are the physical datafiles on disk. When configuring tablespaces,\
    \ there are several features to be aware of that can have far-reaching performance\
    \ implications, namely locally managed tablespaces and automatic segment storage–managed\
    \ tablespaces. When you reasonably implement these features, you maximize your\
    \ ability to obtain acceptable future table performance.\n\nThe `table` is the\
    \ object that stores data in a database. Database performance is a measure of\
    \ the speed at which an application is able to insert, update, delete, and select\
    \ data. Therefore it's appropriate that we begin this book with recipes that provide\
    \ solutions regarding problems related to table performance.\n\nWe start by describing\
    \ aspects of database and tablespace creation that impact table performance. We\
    \ next move on to topics such as choosing table types and data types that meet\
    \ performance-related business requirements. Later topics include managing the\
    \ physical implementation of tablespace usage. We detail issues such as detecting\
    \ table fragmentation, dealing with free space under the high-water mark, row\
    \ chaining, and compressing data. Also described is the Oracle Segment Advisor.\
    \ This handy tool helps you with automating the detection and resolution of table\
    \ fragmentation and unused space.\n\n### 1-1. Building a Database That Maximizes\
    \ Performance\n\n#### Problem\n\nYou realize when initially creating a database\
    \ that some features (when enabled) have long-lasting ramifications for table\
    \ performance and availability. Specifically, when creating the database, you\
    \ want to do the following:\n\n*   Enforce that every tablespace ever created\
    \ in the database must be locally managed. Locally managed tablespaces deliver\
    \ better performance than the deprecated dictionary-managed technology.\n*   Ensure\
    \ users are automatically assigned a default permanent tablespace. This guarantees\
    \ that when users are created they are assigned a default tablespace other than\
    \ `SYSTEM`. You don't want users ever creating objects in the `SYSTEM` tablespace,\
    \ as this can adversely affect performance and availability.\n*   Ensure users\
    \ are automatically assigned a default temporary tablespace. This guarantees that\
    \ when users are created they are assigned a temporary tablespace other than `SYSTEM`.\
    \ You don't ever want users using the `SYSTEM` tablespace for a temporary sorting\
    \ space, as this can adversely affect performance and availability.\n\n#### Solution\n\
    \nUse a script such as the following to create a database that adheres to reasonable\
    \ standards that set the foundation for a well-performing database:\n\n```sql\n\
    CREATE DATABASE O11R2\n   MAXLOGFILES 16\n   MAXLOGMEMBERS 4\n   MAXDATAFILES\
    \ 1024\n   MAXINSTANCES 1\n   MAXLOGHISTORY 680\n   CHARACTER SET AL32UTF8\nDATAFILE\n\
    '/ora01/dbfile/O11R2/system01.dbf'\n   SIZE 500M REUSE\n   EXTENT MANAGEMENT LOCAL\n\
    UNDO TABLESPACE undotbs1 DATAFILE\n'/ora02/dbfile/O11R2/undotbs01.dbf'\n   SIZE\
    \ 800M\nSYSAUX DATAFILE\n'/ora03/dbfile/O11R2/sysaux01.dbf'\n   SIZE 500M\nDEFAULT\
    \ TEMPORARY TABLESPACE TEMP TEMPFILE\n'/ora02/dbfile/O11R2/temp01.dbf'\n   SIZE\
    \ 500M\nDEFAULT TABLESPACE USERS DATAFILE\n'/ora01/dbfile/O11R2/users01.dbf'\n\
    \   SIZE 50M\nLOGFILE GROUP 1\n        ('/ora01/oraredo/O11R2/redo01a.rdo',\n\
    \         '/ora02/oraredo/O11R2/redo01b.rdo') SIZE 200M,\n        GROUP 2\n  \
    \      ('/ora01/oraredo/O11R2/redo02a.rdo',\n         '/ora02/oraredo/O11R2/redo02b.rdo')\
    \ SIZE 200M,\n        GROUP 3\n        ('/ora01/oraredo/O11R2/redo03a.rdo',\n\
    \         '/ora02/oraredo/O11R2/redo03b.rdo') SIZE 200M\nUSER sys    IDENTIFIED\
    \ BY topfoo\nUSER system IDENTIFIED BY topsecrectfoo;\n```\n\nThe prior `CREATE\
    \ DATABASE` script helps establish a good foundation for performance by enabling\
    \ features such as the following:\n\n*   Defines the `SYSTEM` tablespace as locally\
    \ managed via the `EXTENT MANAGEMENT LOCAL` clause; this ensures that all tablespaces\
    \ ever created in database are locally managed. If you are using Oracle Database\
    \ 11g R2 or higher, the `EXTENT MANAGEMENT DICTIONARY` clause has been deprecated.\n\
    *   Defines a default tablespace named `USERS` for any user created without an\
    \ explicitly defined default tablespace; this helps prevent users from being assigned\
    \ the `SYSTEM` tablespace as the default. Users created with a default tablespace\
    \ of `SYSTEM` can have an adverse impact on performance.\n*   Defines a default\
    \ temporary tablespace named `TEMP` for all users; this helps prevent users from\
    \ being assigned the `SYSTEM` tablespace as the default temporary tablespace.\
    \ Users created with a default temporary tablespace of `SYSTEM` can have an adverse\
    \ impact on performance, as this will cause contention for resources in the `SYSTEM`\
    \ tablespace.\n\nSolid performance starts with a correctly configured database.\
    \ The prior recommendations help you create a reliable infrastructure for your\
    \ table data.\n\n## About the Technical Reviewer\n\n![image](images/surachart_opun.jpg)\
    \ ![image](images/square.jpg)`Surachart Opun` was born in Phetchabun, Thailand.\
    \ He graduated with a bachelor's degree in computer engineering. He has worked\
    \ in the Internet service provider business over eight years. He has a lot of\
    \ experience with Oracle Database and Linux. He has worked with Oracle Database\
    \ and Oracle Real Applications Cluster over six years. He is an Oracle Certified\
    \ Professional 10g and 11g. He is also an Oracle Certified Expert RAC. He is interested\
    \ in Oracle Database technology and spends a lot of time on it. His blog is [`http://surachartopun.com`](http://surachartopun.com).\
    \ He has spent a lot of time sharing his Oracle knowledge and helping people with\
    \ Oracle technology. In 2010, he became an Oracle ACE and developed the Oracle\
    \ User Group in Thailand, to which he is a contributor."
