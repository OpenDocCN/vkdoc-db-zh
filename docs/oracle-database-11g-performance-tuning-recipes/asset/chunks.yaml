- fmt: '## Execution Statistics


    `TKPROF` lists execution statistics for each SQL statement in the trace file.
    `TKPROF` lists the execution statistics for the three steps that are part of SQL
    statement processing: `parse`, `execute`, and `fetch`.


    ```

    call   count      cpu   elapsed      disk     query   current       rows

    ------- ------  -------- ---------- ---------- ---------- ----------  ----------

    Parse        1      0.01       0.03          0         64          0           0

    Execute      1      0.00       0.00          0          0          0           0

    Fetch     5461      0.29       0.40          0       1299          0       81901

    ------- ------  -------- ---------- ---------- ---------- ----------  ----------

    total     5463      0.31       0.43          0       1363          0       81901

    ```


    > The following is what the SQL execution statistics in the table stand for:

    >

    > `count`: The number of times the database parsed, executed, or fetched this
    statement

    >

    > `cpu`: The CPU time used for the parse/execute/fetch phases

    >

    > `elapsed`: Total elapsed time (in seconds) for the parse/execute/fetch phases

    >

    > `disk`: Number of physical block reads for the parse/execute/fetch phases

    >

    > `query`: Number of data blocks read with logical reads from the buffer cache
    in consistent mode for the parse/fetch/execute phases (for a `select` statement)

    >

    > `current`: Number of data blocks read and retrieved with logical reads from
    the buffer cache in current mode (for `insert`, `update`, `delete`, and `merge`
    statements)

    >

    > `rows`: Number of fetched rows for a `select` statement or the number of rows
    inserted, deleted, or updated, respectively, for an `insert`, `delete`, `update`,
    or `merge` statement


    ## Row Source Operations


    The next section of the report shows the number of misses in the library cache,
    the current optimizer mode, and the row source operations for the query. Row source
    operations show the number of rows that the database processes for each operation
    such as joins or full table scans.


    ```

    Misses in library cache during parse: 1

    Optimizer mode: ALL_ROWS

    Parsing user id: 85  (HR)


    Rows     Row Source Operation

    -------  ---------------------------------------------------

      81901  HASH JOIN  (cr=1299 pr=0 pw=0 time=3682295 us cost=22 size=41029632 card=217088)

       1728   TABLE ACCESS FULL DEPT (cr=16 pr=0 pw=0 time=246 us cost=6 size=96768
    card=1728)

       1291   TABLE ACCESS FULL EMP (cr=1283 pr=0 pw=0 time=51213 us cost=14 size=455392
    card=3424)

    ```


    The `Misses in library cache during parse` indicates the number of hard parses
    during the parse and execute database calls. In the `Row Source Operation` column,
    the output includes several statistics for each row source operation. These statistics
    quantify the various types of work performed during a row source operation. The
    following is what the different statistics stand for (you may not see all of these
    for every query):


    > `cr`: Blocks retrieved through a logical read in the consistent mode

    >

    > `pr`: Number of blocks read through a physical disk read

    >

    > `pw`: Number of blocks written with a physical write to a disk

    >

    > `time`: Total time (in milliseconds) spent processing the operation

    >

    > `cost`: Estimated cost of the operation

    >

    > `size`: Estimated amount of data (bytes) returned by the operation

    >

    > `card`: Estimated number of rows returned by the operation


    ## The Execution Plan


    If you specified the `explain` parameter when issuing the `tkprof` command, you''ll
    find an execution table showing the execution plan for each SQL statement.


    ```

    Rows     Execution Plan

    -------  ---------------------------------------

          0  SELECT STATEMENT   MODE: ALL_ROWS

      81901   HASH JOIN

       1728    TABLE ACCESS (FULL) OF ''DEPT'' (TABLE)

       1291    TABLE ACCESS (FULL) OF ''EMP'' (TABLE)

    ```


    In our example, the execution plan shows that there were two full table scans,
    and a hash join following it.


    ## Wait Events


    You''ll see the wait events section only if you''ve specified `waits=>true` in
    your trace command. The wait events table summarizes waits during the trace period:


    ```

    Elapsed times include waiting on following events:

      Event waited on                             Times   Max. Wait  Total Waited

      ----------------------------------------   Waited  ----------  ------------

        SQL*Net message from client                5461      112.95        462.81

        db file sequential read                       1        0.05          0.05

    ```


    ```

    ********************************************************************************

    ```


    In this example, the `SQL*Net message to client` waits account for most of the
    waits, but these are idle waits. If you see wait events such as the `db file sequential
    read` event or the `db file scattered read` event with a significant number of
    waits (and/or total wait time), you need to investigate those wait events further.


    Note that the `TKPROF` output doesn''t show you information about any bind variables.
    It also doesn''t show any waits due to enqueue locks.


    ### 10-9. Analyzing Trace Files with Oracle Trace Analyzer


    #### Problem


    You want to use the Oracle Trace Analyzer to analyze trace files.'
