    \ create package` 命令有几个选项：您可以在创建逻辑包时直接指定事件编号或问题编号，从而跳过 `add incident` 命令。您还可以创建一个包含两个时间点之间所有事件的包，如下所示：\n\
    \n```\nadrci> ips create package time '2011-04-12 10:00:00.00 -06:00' to '2011-04-12\
    \ 23:00:00.00 -06:00'\nCreated package 2 based on time range 2011-04-12 12:00:00.000000\
    \ -06:00 to 2011-04-12 23:00:00.000000 -06:00, correlation level typical\nadrci>\n\
    ```\n\n由先前命令生成的包包含 2011 年 4 月 12 日上午 10 点至晚上 11 点之间发生的所有事件。\n\n请注意，您还可以手动将特定的诊断文件添加到现有包中。要添加文件，您需要在\
    \ `ips add file` 命令中指定文件名——您仅限于添加位于 ADR 基目录内的那些诊断文件。以下是一个示例：\n\n```\nadrci> ips\
