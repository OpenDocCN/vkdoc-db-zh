    views, to find out exactly what''s causing the highest number of wait events or
    who''s waiting the most, in the past few minutes. This information is extremely
    valuable when troubleshooting “live” database performance issues.


    ### 5-19. Identifying Time Spent Waiting Due to Locking


    #### Problem


    You want to identify the total time spent waiting by sessions due to locking issues.


    #### Solution


    You can use the following query to identify (and quantify) waits caused by locking
    of a table''s rows. Since the query orders the wait events by time waited, you
    can quickly see which type of wait events accounts for most of the waits in your
    instance.


    `SQL> select wait_class, event, time_waited / 100 time_secs`

    `  2  from v$system_event e`

