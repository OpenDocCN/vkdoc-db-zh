    \n## 工作原理\n\n在 Oracle 数据库 11g 或更高版本中，一个自动配置的作业会定期运行 SQL 优化顾问（运行周期由配置的维护窗口决定）。该作业从\
    \ AWR 中包含的性能指标中识别高资源消耗的 SQL 语句。当自动优化作业运行时，它偶尔会建议为性能不佳的 SQL 语句实现一个 SQL 配置文件。如果满足以下条件，Oracle\
    \ 将自动接受该配置文件：\n\n*   已通过 `DBMS_AUTO_SQLTUNE.SET_AUTO_TUNING_TASK_PARAMETER` 配置了自动接受。\n\
    *   使用该 SQL 配置文件后，性能增益（由 SQL 优化顾问确定）至少是未使用配置文件的三倍。\n\n你可以通过此查询报告自动优化任务配置的详细信息：\n\
