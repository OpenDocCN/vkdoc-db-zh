    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`


    `   1 - filter("EMPLOYEES"."DEPARTMENT_ID" IS NOT NULL)`

    `   2 - access("EMPLOYEES"."EMPLOYEE_ID"=101)`


    The `DBMS_XPLAN.DISPLAY` procedure is very flexible in configuring how you would
    like to see output. If you wanted to see only the most basic execution plan output,
    using the foregoing query, you could configure the `DBMS_XPLAN.DISPLAY` function
    to get that output:


    `SELECT * FROM table(dbms_xplan.display(null,null,''BASIC''));`


    `-----------------------------------------------------`

    `| Id  | Operation                   | Name          |`

    `-----------------------------------------------------`

    `|   0 | SELECT STATEMENT            |               |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |`

    `|   2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK |`

    `-----------------------------------------------------`'
  trans: "#### 工作原理\n\n使用 `AUTOTRACE` 时有多个选项可供选择，基本要素如下：\n\n1.  是否要执行查询？\n2.  是否要查看查询的执行计划？\n\
    3.  是否要查看查询的执行统计信息？\n\n如表 9-1 所示，您可以选择缩写每个命令。方括号中的部分是可选的。\n\n![images](img/t0901.jpg)\n\
    \n`AUTOTRACE` 最常见的用途是在不运行查询的情况下获取其执行计划。这样做可以让您快速判断执行计划是否合理，且无需实际执行查询：\n\n```sql\n\
    SQL> set autot trace exp\n\nSELECT l.location_id, city, department_id, department_name\n\
    \  FROM locations l, departments d\n  WHERE l.location_id = d.location_id(+)\n\
    \  ORDER BY 1;\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation           | Name        | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT    |             |    27 |   837 |     8  (25)| 00:00:01\
    \ |\n|   1 |  SORT ORDER BY      |             |    27 |   837 |     8  (25)|\
    \ 00:00:01 |\n|*  2 |   HASH JOIN OUTER   |             |    27 |   837 |    \
    \ 7  (15)| 00:00:01 |\n|   3 |    TABLE ACCESS FULL| LOCATIONS   |    23 |   276\
    \ |     3   (0)| 00:00:01 |\n|   4 |    TABLE ACCESS FULL| DEPARTMENTS |    27\
    \ |   513 |     3   (0)| 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    ```\n\n对于上述查询，如果您只想查看查询的执行统计信息，而不希望看到所有查询输出，您可以这样做：\n\n```sql\nSQL> set autot\
    \ trace stat\nSQL> /\n\n43 rows selected.\n\nStatistics\n----------------------------------------------------------\n\
    \          0  recursive calls\n          0  db block gets\n         14  consistent\
    \ gets\n          0  physical reads\n          0  redo size\n       1862  bytes\
    \ sent via SQL*Net to client\n        438  bytes received via SQL*Net from client\n\
    \          4  SQL*Net roundtrips to/from client\n          1  sorts (memory)\n\
    \          0  sorts (disk)\n         43  rows processed\n```\n\n一旦您在某个会话中使用完 `AUTOTRACE`，并希望将其关闭以便在不使用\
    \ `AUTOTRACE` 的情况下运行其他查询，请在您的 SQL Plus 会话中运行以下命令：\n\n```sql\nSQL> set autot off\n\
    ```\n\n每个 SQL Plus 会话的默认设置是 `AUTOTRACE OFF`，但如果您想检查给定会话的当前 `AUTOTRACE` 设置，可以通过执行以下命令来完成：\n\
    \n```sql\nSQL> show autot\nautotrace OFF\n```\n\n### 9-2. 自定义执行计划输出\n\n#### 问题\n\
    \n您想根据特定需求配置查询的解释计划输出。\n\n#### 解决方案\n\nOracle 提供的 PL/SQL 包 `DBMS_XPLAN` 具有广泛的功能，可用于获取给定查询的解释计划信息。`DBMS_XPLAN`\
    \ 包中包含许多函数。`DISPLAY` 函数可用于快速获取查询的执行计划，并可根据您的具体需求自定义所呈现的信息。以下是一个调用基本显示功能的示例：\n\n\
    ```sql\nexplain plan for\nSELECT last_name, first_name\nFROM employees JOIN departments\
    \ USING(department_id)\nWHERE employee_id = 101;\n\nExplained.\n\nSELECT * FROM\
    \ table(dbms_xplan.display);\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------------------\n\
    Plan hash value: 1833546154\n\n--------------------------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name          | Rows  | Bytes | Cost (%CPU)|\
    \ Time    |\n--------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |               |     1 |    22 |     1  \
    \ (0)| 00:00:01|\n|*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1\
    \ |    22 |     1   (0)| 00:00:01|\n|*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK\
    \ |     1 |       |     0   (0)| 00:00:01|\n--------------------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - filter(\"EMPLOYEES\".\"DEPARTMENT_ID\" IS NOT NULL)\n   2 - access(\"\
    EMPLOYEES\".\"EMPLOYEE_ID\"=101)\n```\n\n`DBMS_XPLAN.DISPLAY` 过程在配置输出显示方式方面非常灵活。如果您只想查看最基本的执行计划输出，使用上述查询，您可以配置\
    \ `DBMS_XPLAN.DISPLAY` 函数来获取该输出：\n\n```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'BASIC'));\n\
    \n-----------------------------------------------------\n| Id  | Operation   \
    \                | Name          |\n-----------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |               |\n|   1 |  TABLE ACCESS BY\
    \ INDEX ROWID| EMPLOYEES     |\n|   2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK\
    \ |\n-----------------------------------------------------\n```"
- fmt: "#### How It Works\n\n`DBMS_XPLAN.DISPLAY` 函数具有大量内置功能，可根据您的需求提供自定义输出。该函数提供四个基本的输出详细级别：\n\
    \n*   `BASIC`\n*   `TYPICAL`（默认）\n*   `SERIAL`\n*   `ALL`\n\n[Table 9-2](#Chapter09.html#tab_9_2)\
    \ 显示了每个详细级别选项中包含的格式选项。\n\n![images](images/t0902.jpg)\n\n如果您只需要默认的输出格式，则无需传入任何特殊格式选项：\n\
    \n```sql\nSELECT * FROM table(dbms_xplan.display);\n```\n\n如果您想获取查询的所有可用输出，请使用\
    \ `ALL` 详细级别格式输出选项：\n\n```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'ALL'));\n\
    ```\n\n```\n--------------------------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name          | Rows  | Bytes | Cost (%CPU)|\
    \ Time    |\n--------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |               |     1 |    22 |     1  \
    \ (0)| 00:00:01|\n|*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1\
    \ |    22 |     1   (0)| 00:00:01|\n|*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK\
    \ |     1 |       |     0   (0)| 00:00:01|\n--------------------------------------------------------------------------------------------\n\
    \nQuery Block Name / Object Alias (identified by operation id):\n-------------------------------------------------------------\n\
    \n   1 - SEL$38D4D5F3 / EMPLOYEES@SEL$1\n   2 - SEL$38D4D5F3 / EMPLOYEES@SEL$1\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - filter(\"EMPLOYEES\".\"DEPARTMENT_ID\" IS NOT NULL)\n   2 - access(\"\
    EMPLOYEES\".\"EMPLOYEE_ID\"=101)\n\nColumn Projection Information (identified\
    \ by operation id):\n-----------------------------------------------------------\n\
    \n   1 - \"EMPLOYEES\".\"FIRST_NAME\"[VARCHAR2,20], \"EMPLOYEES\".\"LAST_NAME\"\
    [VARCHAR2,25]\n   2 - \"EMPLOYEES\".ROWID[ROWID,10]\n\nNote\n-----\n   - rule\
    \ based optimizer used (consider using cbo)\n```\n\n`DBMS_XPLAN.DISPLAY` 函数一个非常好的特性是，在确定了您需要的详细信息基础级别后，您可以添加个别选项，以便在该级别基础输出之外额外显示。例如，如果您只需要最基本的输出信息，但还想了解成本信息，可以按如下方式格式化\
    \ `DBMS_XPLAN.DISPLAY`：\n\n```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'BASIC\
    \ +COST'));\n```\n\n```\n--------------------------------------------------------------------------------\n\
    | Id  | Operation                    | Name                       | Cost (%CPU)|\n\
    --------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT             |                            |     1   (0)|\n\
    |   1 |  RESULT CACHE                | 0fnzzb94z0dj2b5vzkmq4f4xcu |          \
    \  |\n|   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES                  |    \
    \ 1   (0)|\n|   3 |    INDEX UNIQUE SCAN         | EMP_EMP_ID_PK             \
    \ |     0   (0)|\n--------------------------------------------------------------------------------\n\
    ```\n\n您也可以做相反的操作，即减去您不想看到的信息。如果您想查看使用 `TYPICAL` 级别的输出，但不想看到 `ROWS` 或 `BYTES`\
    \ 信息，可以执行以下查询来显示该级别的输出：\n\n```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'TYPICAL\
    \ -BYTES -ROWS'));\n```\n\n```\n-----------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name          | Cost (%CPU)| Time     |\n\
    -----------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |               |     1   (0)| 00:00:01 |\n\
    |*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1   (0)| 00:00:01 |\n\
    |*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK |     0   (0)| 00:00:01 |\n\
    -----------------------------------------------------------------------------\n\
    ```\n\n### 9-3. Graphically Displaying an Execution Plan\n\n#### Problem\n\n您希望无需运行\
    \ SQL 语句即可快速查看执行计划。您希望通过 GUI 查看计划，以便只需点击即可获取。\n\n#### Solution\n\n在 Enterprise\
    \ Manager 中，您可以快速找到查询的执行计划。要使用此功能，您必须在环境中配置 Enterprise Manager。这可以是管理单个数据库的 Database\
    \ Control，也可以是管理企业数据库的 Grid Control。要查看给定查询的执行计划，您需要导航到 Enterprise Manager 的 Top\
    \ Sessions 屏幕。（请参阅您特定版本的 Oracle Enterprise Manager 文档。）在 Top Sessions 屏幕上，您可以深入查看会话特定信息。首先，找到您的会话。然后，单击\
    \ Current SQL 下显示的 SQL ID。从那里，您可以单击 Plan，执行计划就会出现，如 [Figure 9-1](#Chapter09.html#fig_9_1)\
    \ 所示。\n\n![images](images/0901.jpg)\n\n`Figure 9-1. Sample execution plan output\
    \ from within Enterprise Manager`\n\n#### How It Works\n\n使用 Enterprise Manager\
    \ 可以非常轻松地找到数据库中当前正在运行的 SQL 操作的执行计划。如果某个特定 SQL 语句的性能不如预期，此方法是确定正在运行的查询或其他 SQL 操作的执行计划的最快方法之一。要使用此功能，您必须拥有\
    \ Enterprise Manager 的 Tuning Pack 许可。\n\n### 9-4. Reading an Execution Plan\n\
    \n#### Problem\n\n您已为给定 SQL 语句运行了执行计划解释，并希望了解如何阅读该计划。"
  raw: '#### How It Works


    The `DBMS_XPLAN.DISPLAY` function has a lot of built-in functionality to provide
    customized output based on your needs. The function provides four basic levels
    of output detail:


    *   `BASIC`

    *   TYPICAL (default)

    *   `SERIAL`

    *   ALL


    [Table 9-2](#Chapter09.html#tab_9_2) shows the format options that are included
    within each level of detail option.


    ![images](images/t0902.jpg)


    If you simply want the default output format, there is no need to pass in any
    special format options:


    `SELECT * FROM table(dbms_xplan.display);`


    If you want to get all available output for a query, use the `ALL` level of detail
    format output option:


    `SELECT * FROM table(dbms_xplan.display(null,null,''ALL''));`


    `--------------------------------------------------------------------------------------------`

    `| Id  | Operation                   | Name          | Rows  | Bytes | Cost (%CPU)|
    Time    |`

    `--------------------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT            |               |     1 |    22 |     1   (0)|
    00:00:01|`

    `|*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1 |    22 |     1   (0)|
    00:00:01|`

    `|*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK |     1 |       |     0   (0)|
    00:00:01|`

    `--------------------------------------------------------------------------------------------`


    `Query Block Name / Object Alias (identified by operation id):`

    `-------------------------------------------------------------`


    `   1 - SEL$38D4D5F3 / EMPLOYEES@SEL$1`

    `   2 - SEL$38D4D5F3 / EMPLOYEES@SEL$1`


    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`


    `   1 - filter("EMPLOYEES"."DEPARTMENT_ID" IS NOT NULL)`

    `   2 - access("EMPLOYEES"."EMPLOYEE_ID"=101)`


    `Column Projection Information (identified by operation id):`

    `-----------------------------------------------------------`


    `   1 - "EMPLOYEES"."FIRST_NAME"[VARCHAR2,20], "EMPLOYEES"."LAST_NAME"[VARCHAR2,25]`

    `   2 - "EMPLOYEES".ROWID[ROWID,10]`


    `Note`

    `-----`

    `   - rule based optimizer used (consider using cbo)`


    One of the very nice features of the `DBMS_XPLAN.DISPLAY` function is after deciding
    the base level of detail you need, you can add individual options to be displayed
    in addition to the base output for that level of detail. For instance, if you
    want just the most basic output information, but also want to know cost information,
    you can format the `DBMS_XPLAN.DISPLAY` as follows:


    `SELECT * FROM table(dbms_xplan.display(null,null,''BASIC +COST''));`

    `--------------------------------------------------------------------------------`

    `| Id  | Operation                    | Name                       | Cost (%CPU)|`

    `--------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT             |                            |     1   (0)|`

    `|   1 |  RESULT CACHE                | 0fnzzb94z0dj2b5vzkmq4f4xcu |            |`

    `|   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES                  |     1   (0)|`

    `|   3 |    INDEX UNIQUE SCAN         | EMP_EMP_ID_PK              |     0   (0)|`

    `--------------------------------------------------------------------------------`


    You can also do the reverse, that is, subtract information you do not want to
    see. If you wanted to see the output using the `TYPICAL` level of output, but
    did not want to see the `ROWS` or `BYTES` information, you could issue the following
    query to display that level of output:


    `SELECT * FROM table(dbms_xplan.display(null,null,''TYPICAL -BYTES -ROWS''));`


    `-----------------------------------------------------------------------------`

    `| Id  | Operation                   | Name          | Cost (%CPU)| Time     |`

    `-----------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT            |               |     1   (0)| 00:00:01 |`

    `|*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1   (0)| 00:00:01 |`

    `|*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK |     0   (0)| 00:00:01 |`

    `-----------------------------------------------------------------------------`


    ### 9-3. Graphically Displaying an Execution Plan


    #### Problem


    You want to quickly view an execution plan without having to run SQL statements
    to retrieve the execution plan. You would like to use a GUI to view the plan,
    so that you can just click your way to it.


    #### Solution


    From within Enterprise Manager, you can quickly find the execution plan for a
    query. In order to use this functionality, you will have to have Enterprise Manager
    configured within your environment. This can be either Database Control, which
    manages a single database, or Grid Control, which manages an enterprise of databases.
    In order to see the execution plan for a given query, you will need to navigate
    to the Top Sessions screen of Enterprise Manager. (Refer to the Oracle Enterprise
    Manager documentation for your specific release.) Once on the Top Sessions screen,
    you can drill down into session specific information. First, find your session.
    Then, click the SQL ID shown under Current SQL. From there, you can click Plan,
    and the execution plan will appear, such as the one shown in [Figure 9-1](#Chapter09.html#fig_9_1).


    ![images](images/0901.jpg)


    ***Figure 9-1.** Sample execution plan output from within Enterprise Manager*


    #### How It Works


    Using Enterprise Manager makes it very easy to find the execution plan for currently
    running SQL operations within your database. If a particular SQL statement isn''t
    performing as expected, this method is one of the fastest ways to determine the
    execution plan for a running query or other SQL operation. In order to use this
    feature, you must be licensed for the Tuning Pack of Enterprise Manager.


    ### 9-4\. Reading an Execution Plan


    #### Problem


    You have run an explain plan for a given SQL statement, and want to understand
    how to read the plan.'
