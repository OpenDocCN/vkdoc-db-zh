    ,disk_reads\n,cpu_time\n,elapsed_time\n,buffer_gets\n,parsing_schema_name\nFROM\
    \ table(\nDBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(\n begin_snap => 21730\n,end_snap\
    \ => 22900\n,basic_filter => 'parsing_schema_name <> ''SYS'''\n,ranking_measure1\
    \ => 'buffer_gets'\n,result_limit => 10\n));\n```\n\n在前面的查询中，`SYS` 关键字被两个单引号括起来（换句话说，`SYS`\
    \ 周围的不是双引号）。\n\n![images](img/t1105.jpg)\n\n![images](img/t1105a.jpg)\n\n### 11-9.\
    \ 在内存中查看资源密集型 SQL\n\n## 问题\n\n在填充 SQL 调优集之前，你想查看内存中游标缓存里的高负载 SQL 语句。你希望最终使用内存中包含的\
    \ SQL 作为填充 SQL 调优集的输入。\n\n## 解决方案\n\n使用 `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` 函数查看内存中当前的高资源消耗\
    \ SQL 语句。此查询选择需要超过一百万次磁盘读取的内存中 SQL 语句：\n\n```sql\nSELECT\n sql_id\n,substr(sql_text,1,20)\n\
    ,disk_reads\n,cpu_time\n,elapsed_time\nFROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('disk_reads\
    \ > 1000000'))\nORDER BY sql_id;\n```\n\n以下是一些示例输出：\n\n```\nSQL_ID        SUBSTR(SQL_TEXT,1,20\
    \ DISK_READS   CPU_TIME ELAPSED_TIME\n------------- -------------------- ----------\
    \ ---------- ------------\n0s6gq1c890p4s  delete from \"MVS\".\"    3325320 8756130000\
    \   1.0416E+10\nb63h4skwvpshj BEGIN dbms_mview.ref    9496353 1.4864E+10   3.3006E+10\n\
    ```\n\n## 工作原理\n\n在使用 SQL 调优集之前，理解你可以使用 `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` 函数从内存中检索高资源使用率的\
    \ SQL 至关重要。这个 PL/SQL 函数检索的结果集可以用作填充 SQL 调优集的输入。有关 `SELECT_CURSOR_CACHE` 函数参数的描述，请参见表\
    \ 11-6。\n\n你使用这个函数有很大的灵活性。下面是一个例子，它选择内存中的 SQL，但排除了由 `SYS` 用户解析的语句，并且只返回经过时间大于\
    \ 100,000 的语句：\n\n```sql\nSELECT sql_id, substr(sql_text,1,20)\n,disk_reads, cpu_time,\
    \ elapsed_time\nFROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('parsing_schema_name\
    \ <> ''SYS''\n                                             AND elapsed_time >\
    \ 100000'))\nORDER BY sql_id;\n```\n\n在前面的查询中，`SYS` 关键字被两个单引号括起来（换句话说，`SYS` 周围的不是双引号）。`SQL_TEXT`\
    \ 列被截断为 20 个字符，以便输出更容易在页面上显示。以下是一些示例输出：\n\n```\nSQL_ID        SUBSTR(SQL_TEXT,1,20\
    \ DISK_READS   CPU_TIME ELAPSED_TIME\n------------- -------------------- ----------\
    \ ---------- ------------\nbyzwu34haqmh4 SELECT /* DS_SVC */           0     140000\
    \       159828\n```\n\n一旦你确定了一个资源密集型 SQL 语句的 `SQL_ID`，你可以通过这个查询查看其所有执行细节：\n\n\
    ```sql\nSELECT *\nFROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE('sql_id = ''byzwu34haqmh4'''));\n\
    ```\n\n请注意，前面语句中的 `SQL_ID` 被两个单引号括起来（不是双引号）。\n\n下一个例子选择内存中按 CPU 时间排名前 10 的非 `SYS`\
    \ 用户查询：\n\n```sql\nSELECT\n sql_id\n,substr(sql_text,1,20)\n,disk_reads\n,cpu_time\n\
    ,elapsed_time\n,buffer_gets\n,parsing_schema_name\nFROM table(\nDBMS_SQLTUNE.SELECT_CURSOR_CACHE(\n\
    \ basic_filter => 'parsing_schema_name <> ''SYS'''\n,ranking_measure1 => 'cpu_time'\n\
    ,result_limit => 10\n));\n```\n\n![images](img/t1106.jpg)\n\n### 11-10. 从 AWR\
    \ 中的高资源消耗 SQL 填充 SQL 调优集\n\n## 问题\n\n你想创建一个 SQL 调优集，并用在 AWR 中找到的 I/O 消耗最高的 SQL\
    \ 语句来填充它。\n"
- fmt: "#### Solution\n\nUse the following steps to populate a SQL tuning set from\
    \ high resource-consuming statements in the AWR:\n\n1.  Create a SQL tuning set\
    \ object.\n2.  Determine begin and end AWR snapshot IDs.\n3.  Populate the SQL\
    \ tuning set with high-resource SQL found in AWR.\n\nThe prior steps are detailed\
    \ in the following subsections.\n\n##### Step 1: Create a SQL Tuning Set Object\n\
    \nCreate a SQL tuning set. This next bit of code creates a tuning set named `IO_STS`:\n\
    \n```sql\nBEGIN\n  dbms_sqltune.create_sqlset(\n    sqlset_name => 'IO_STS'\n\
    \   ,description => 'STS from AWR');\nEND;\n/\n```\n\n##### Step 2: Determine\
    \ Begin and End AWR Snapshot IDs\n\nIf you're unsure of the available snapshots\
    \ in your database, you can run an AWR report or select the `SNAP_ID` from `DBA_HIST_SNAPSHOTS`:\n\
    \n```sql\nselect snap_id, begin_interval_time\nfrom dba_hist_snapshot order by\
    \ 1;\n```\n\n##### Step 3: Populate the SQL Tuning Set with High-Resource SQL\
    \ Found in AWR\n\nNow the SQL tuning set is populated with the top 15 SQL statements\
    \ ordered by disk reads. The begin and end AWR snapshot IDs are 26800 and 26900\
    \ respectively:\n\n```sql\nDECLARE\n  base_cur dbms_sqltune.sqlset_cursor;\nBEGIN\n\
    \  OPEN base_cur FOR\n    SELECT value(x)\n    FROM table(dbms_sqltune.select_workload_repository(\n\
    \      26800,26900, null, null,'disk_reads',\n      null, null, null, 15)) x;\n\
    \  --\n  dbms_sqltune.load_sqlset(\n    sqlset_name => 'IO_STS',\n    populate_cursor\
    \ => base_cur);\nEND;\n/\n```\n\nThe prior code populates the top 15 SQL statements\
    \ contained in the AWR ordered by disk reads. The `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY`\
    \ function is used to populate a PL/SQL cursor with AWR information based on a\
    \ ranking criterion. Next the `DBMS_SQLTUNE.LOAD_SQLSET` procedure is used to\
    \ populate the SQL tuning set using the cursor as input.\n\n#### How It Works\n\
    \nThe `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY` function can be used in a variety\
    \ of ways to populate a SQL tuning set using queries in the AWR. You can instruct\
    \ it to load SQL statements by criteria such as disk reads, elapsed time, CPU\
    \ time, buffer gets, and so on. See [Table 11-5](#Chapter11.html#tab_11_5) for\
    \ descriptions for parameters to this function. When designating the AWR as input,\
    \ you can use either of the following:\n\n*   Begin and end AWR snapshot IDs\n\
    *   An AWR baseline that you've previously created\n\nYou can view the details\
    \ of the SQL tuning set (created in the “Solution” section) via this query:\n\n\
    ```sql\nSELECT\n sqlset_name\n,elapsed_time\n,cpu_time\n,buffer_gets\n,disk_reads\n\
    ,sql_text\nFROM dba_sqlset_statements\nWHERE sqlset_name = 'IO_STS';\n```\n\n\
    ### 11-11. Populating a SQL Tuning Set from Resource-Consuming SQL in Memory\n\
    \n#### Problem\n\nYou want to populate a tuning set from high resource-consuming\
    \ SQL statements that are currently in the memory.\n\n#### Solution\n\nUse the\
    \ `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` function to populate a SQL tuning set with\
    \ statements currently in memory. This example creates a tuning set and populates\
    \ it with high-load resource-consuming statements not belonging to the `SYS` schema\
    \ and having disk reads greater than 1,000,000:\n\n```sql\n-- Create the tuning\
    \ set\nEXEC DBMS_SQLTUNE.CREATE_SQLSET('HIGH_DISK_READS');\n-- populate the tuning\
    \ set from the cursor cache\nDECLARE\n  cur DBMS_SQLTUNE.SQLSET_CURSOR;\nBEGIN\n\
    \  OPEN cur FOR\n  SELECT VALUE(x)\n  FROM table(\n  DBMS_SQLTUNE.SELECT_CURSOR_CACHE(\n\
    \  'parsing_schema_name <> ''SYS'' AND disk_reads > 1000000',\n  NULL, NULL, NULL,\
    \ NULL, 1, NULL,'ALL')) x;\n--\n  DBMS_SQLTUNE.LOAD_SQLSET(sqlset_name => 'HIGH_DISK_READS',\n\
    \    populate_cursor => cur);\nEND;\n/\n```\n\nIn the prior code, notice that\
    \ the `SYS` user is bookended by sets of two single quotes (not double quotes).\
    \ The `SELECT_CURSOR_CACHE` function loads the SQL statements into a PL/SQL cursor,\
    \ and the `LOAD_SQLSET` procedure populates the SQL tuning set with the SQL statements.\n\
    \n#### How It Works\n\nThe `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` function (see [Table\
    \ 11-6](#Chapter11.html#tab_11_6) for function parameter descriptions) allows\
    \ you to extract from memory SQL statements and associated statistics into a SQL\
    \ tuning set. The procedure allows you to filter SQL statements by various resource-consuming\
    \ criteria, such as the following:\n\n*   `ELAPSED_TIME`\n*   `CPU_TIME`\n*  \
    \ `BUFFER_GETS`\n*   `DISK_READS`\n*   `DIRECT_WRITES`\n*   `ROWS_PROCESSED`\n\
    \nThis allows you a great deal of flexibility on how to filter and populate the\
    \ SQL tuning set.\n\n### 11-12. Populating SQL Tuning Set with All SQL in Memory\n\
    \n#### Problem\n\nYou want to create a SQL tuning set and populate it with all\
    \ SQL statements currently in memory.\n\n#### Solution\n\nUse the `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET`\
    \ procedure to efficiently capture all of the SQL currently stored in the cursor\
    \ cache (in memory). This example creates a SQL tuning set named `PROD_WORKLOAD`\
    \ and then populates by sampling memory for 3,600 seconds (waiting 20 seconds\
    \ between each polling event):\n\n```sql\nBEGIN\n  -- Create the tuning set\n\
    \  DBMS_SQLTUNE.CREATE_SQLSET(\n    sqlset_name => 'PROD_WORKLOAD'\n   ,description\
    \ => 'Prod workload sample');\n  --\n  DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET(\n\
    \    sqlset_name     => 'PROD_WORKLOAD'\n   ,time_limit      => 3600\n   ,repeat_interval\
    \ => 20);\nEND;\n/\n```\n\n#### How It Works\n\nThe `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET`\
    \ procedure allows you to poll for queries and memory and use any queries found\
    \ to populate a SQL tuning set. This is a powerful technique that you can use\
    \ when it's required to capture a sample set of all SQL statements executing.\n\
    \nYou have a great deal of flexibility on instructing `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET`\
    \ to capture SQL statements in memory (see [Table 11-7](#Chapter11.html#tab_11_7)\
    \ for details on all parameters). For example, you can instruct the procedure\
    \ to capture a cumulative set of statistics for each SQL statement by specifying\
    \ a `CAPTURE_MODE` of `DBMS_SQLTUNE.MODE_ACCUMULATE_STATS`.\n\n```sql\nBEGIN\n\
    \  DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET(\n    sqlset_name     => 'PROD_WORKLOAD'\n\
    \   ,time_limit      => 60\n   ,repeat_interval => 10\n   ,capture_mode    =>\
    \ DBMS_SQLTUNE.MODE_ACCUMULATE_STATS);\nEND;\n/\n```\n\nThis is more resource-intensive\
    \ than the default settings, but produces more accurate statistics for each SQL\
    \ statement.\n\n![images](images/t1107.jpg)\n\n### 11-13. Displaying the Contents\
    \ of a SQL Tuning Set\n\n#### Problem\n\nYou have populated a SQL tuning set and\
    \ want to verify its characteristics such as the SQL statements and corresponding\
    \ statistics.\n\n#### Solution\n\nYou can determine the name and number of SQL\
    \ statements for SQL tuning sets in your database via this query:\n\n```sql\n\
    SELECT name, created, statement_count\nFROM dba_sqlset;\n```\n\nHere is some sample\
    \ output:\n\n```\nNAME                           CREATED   STATEMENT_COUNT\n------------------------------\
    \ --------- ---------------\ntest1                          19-APR-11        \
    \      29\n```\n\nUse the following query to display the SQL text and associated\
    \ statistical information for each query within the SQL tuning set:\n\n```sql\n\
    SELECT sqlset_name, elapsed_time, cpu_time, buffer_gets, disk_reads, sql_text\n\
    FROM dba_sqlset_statements;\n```\n\nHere is a small snippet of the output. The\
    \ `SQL_TEXT` column has been truncated in order to fit the output on the page:\n\
    \n```\nSQLSET_NAME     ELAPSED_TIME   CPU_TIME BUFFER_GETS DISK_READS SQL_TEXT\n\
    --------------- ------------ ---------- ----------- ---------- ----------------------------\n\
    test1              235285363   45310000      112777       3050 INSERT ......\n\
    test1               52220149   22700000      328035      18826  delete from.....\n\
    ```"
  raw: '#### Solution


    Use the following steps to populate a SQL tuning set from high resource-consuming
    statements in the AWR:


    1.  Create a SQL tuning set object.

    2.  Determine begin and end AWR snapshot IDs.

    3.  Populate the SQL tuning set with high-resource SQL found in AWR.


    The prior steps are detailed in the following subsections.


    ##### Step 1: Create a SQL Tuning Set Object


    Create a SQL tuning set. This next bit of code creates a tuning set named `IO_STS`:


    `BEGIN`

    `  dbms_sqltune.create_sqlset(`

    `    sqlset_name => ''IO_STS''`

    `   description => ''STS from AWR'');`

    `END;`

    `/`


    ##### Step 2: Determine Begin and End AWR Snapshot IDs


    If you''re unsure of the available snapshots in your database, you can run an
    AWR report or select the `SNAP_ID` from `DBA_HIST_SNAPSHOTS`:


    `select snap_id, begin_interval_time`

    `from dba_hist_snapshot order by 1;`


    ##### Step 3: Populate the SQL Tuning Set with High-Resource SQL Found in AWR


    Now the SQL tuning set is populated with the top 15 SQL statements ordered by
    disk reads. The begin and end AWR snapshot IDs are 26800 and 26900 respectively:


    `DECLARE`

    `  base_cur dbms_sqltune.sqlset_cursor;`

    `BEGIN`

    `  OPEN base_cur FOR`

    `    SELECT value(x)`

    `    FROM table(dbms_sqltune.select_workload_repository(`

    `      26800,26900, null, null,''disk_reads'',`

    `      null, null, null, 15)) x;`

    `  --`

    `  dbms_sqltune.load_sqlset(`

    `    sqlset_name => ''IO_STS'',`

    `    populate_cursor => base_cur);`

    `END;`

    `/`


    The prior code populates the top 15 SQL statements contained in the AWR ordered
    by disk reads. The `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY` function is used
    to populate a PL/SQL cursor with AWR information based on a ranking criterion.
    Next the `DBMS_SQLTUNE.LOAD_SQLSET` procedure is used to populate the SQL tuning
    set using the cursor as input.


    #### How It Works


    The `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY` function can be used in a variety
    of ways to populate a SQL tuning set using queries in the AWR. You can instruct
    it to load SQL statements by criteria such as disk reads, elapsed time, CPU time,
    buffer gets, and so on. See [Table 11-5](#Chapter11.html#tab_11_5) for descriptions
    for parameters to this function. When designating the AWR as input, you can use
    either of the following:


    *   Begin and end AWR snapshot IDs

    *   An AWR baseline that you''ve previously created


    You can view the details of the SQL tuning set (created in the “Solution” section)
    via this query:


    `SELECT`

    ` sqlset_name`

    `,elapsed_time`

    `,cpu_time`

    `,buffer_gets`

    `,disk_reads`

    `,sql_text`

    `FROM dba_sqlset_statements`

    `WHERE sqlset_name = ''IO_STS'';`


    ### 11-11. Populating a SQL Tuning Set from Resource-Consuming SQL in Memory


    #### Problem


    You want to populate a tuning set from high resource-consuming SQL statements
    that are currently in the memory.


    #### Solution


    Use the `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` function to populate a SQL tuning set
    with statements currently in memory. This example creates a tuning set and populates
    it with high-load resource-consuming statements not belonging to the `SYS` schema
    and having disk reads greater than 1,000,000:


    `-- Create the tuning set`

    `EXEC DBMS_SQLTUNE.CREATE_SQLSET(''HIGH_DISK_READS'');`

    `-- populate the tuning set from the cursor cache`

    `DECLARE`

    `  cur DBMS_SQLTUNE.SQLSET_CURSOR;`

    `BEGIN`

    `  OPEN cur FOR`

    `  SELECT VALUE(x)`

    `  FROM table(`

    `  DBMS_SQLTUNE.SELECT_CURSOR_CACHE(`

    `  ''parsing_schema_name <> ''''SYS'''' AND disk_reads > 1000000'',`

    `  NULL, NULL, NULL, NULL, 1, NULL,''ALL'')) x;`

    `--`

    `  DBMS_SQLTUNE.LOAD_SQLSET(sqlset_name => ''HIGH_DISK_READS'',`

    `    populate_cursor => cur);`

    `END;`

    `/`


    In the prior code, notice that the `SYS` user is bookended by sets of two single
    quotes (not double quotes). The `SELECT_CURSOR_CACHE` function loads the SQL statements
    into a PL/SQL cursor, and the `LOAD_SQLSET` procedure populates the SQL tuning
    set with the SQL statements.


    #### How It Works


    The `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` function (see [Table 11-6](#Chapter11.html#tab_11_6)
    for function parameter descriptions) allows you to extract from memory SQL statements
    and associated statistics into a SQL tuning set. The procedure allows you to filter
    SQL statements by various resource-consuming criteria, such as the following:


    *   `ELAPSED_TIME`

    *   `CPU_TIME`

    *   `BUFFER_GETS`

    *   `DISK_READS`

    *   `DIRECT_WRITES`

    *   `ROWS_PROCESSED`


    This allows you a great deal of flexibility on how to filter and populate the
    SQL tuning set.


    ### 11-12. Populating SQL Tuning Set with All SQL in Memory


    #### Problem


    You want to create a SQL tuning set and populate it with all SQL statements currently
    in memory.


    #### Solution


    Use the `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET` procedure to efficiently capture
    all of the SQL currently stored in the cursor cache (in memory). This example
    creates a SQL tuning set named `PROD_WORKLOAD` and then populates by sampling
    memory for 3,600 seconds (waiting 20 seconds between each polling event):


    `BEGIN`

    `  -- Create the tuning set`

    `  DBMS_SQLTUNE.CREATE_SQLSET(`

    `    sqlset_name => ''PROD_WORKLOAD''`

    `   ,description => ''Prod workload sample'');`

    `  --`

    `  DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET(`

    `    sqlset_name     => ''PROD_WORKLOAD''`

    `   ,time_limit      => 3600`

    `   ,repeat_interval => 20);`

    `END;`

    `/`


    #### How It Works


    The `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET` procedure allows you to poll for
    queries and memory and use any queries found to populate a SQL tuning set. This
    is a powerful technique that you can use when it''s required to capture a sample
    set of all SQL statements executing.


    You have a great deal of flexibility on instructing `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET`
    to capture SQL statements in memory (see [Table 11-7](#Chapter11.html#tab_11_7)
    for details on all parameters). For example, you can instruct the procedure to
    capture a cumulative set of statistics for each SQL statement by specifying a
    `CAPTURE_MODE` of `DBMS_SQLTUNE.MODE_ACCUMULATE_STATS`.


    `BEGIN`

    `  DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET(`

    `    sqlset_name     => ''PROD_WORKLOAD''`

    `   ,time_limit      => 60`

    `   ,repeat_interval => 10`

    `   ,capture_mode    => DBMS_SQLTUNE.MODE_ACCUMULATE_STATS);`

    `END;`

    `/`


    This is more resource-intensive than the default settings, but produces more accurate
    statistics for each SQL statement.


    ![images](images/t1107.jpg)


    ### 11-13\. Displaying the Contents of a SQL Tuning Set


    #### Problem


    You have populated a SQL tuning set and want to verify its characteristics such
    as the SQL statements and corresponding statistics.


    #### Solution


    You can determine the name and number of SQL statements for SQL tuning sets in
    your database via this query:


    `SELECT name, created, statement_count`

    `FROM dba_sqlset;`


    Here is some sample output:


    `NAME                           CREATED   STATEMENT_COUNT`

    `------------------------------ --------- ---------------`

    `test1                          19-APR-11              29`


    Use the following query to display the SQL text and associated statistical information
    for each query within the SQL tuning set:


    `SELECT sqlset_name, elapsed_time, cpu_time, buffer_gets, disk_reads, sql_text`

    `FROM dba_sqlset_statements;`


    Here is a small snippet of the output. The `SQL_TEXT` column has been truncated
    in order to fit the output on the page:


    `SQLSET_NAME     ELAPSED_TIME   CPU_TIME BUFFER_GETS DISK_READS SQL_TEXT`

    `--------------- ------------ ---------- ----------- ---------- ----------------------------`

    `test1              235285363   45310000      112777       3050 INSERT ......`

    `test1               52220149   22700000      328035      18826  delete from.....`'
  trans: "#### 解决方案\n\n使用以下步骤，从 AWR 中高资源消耗的语句填充 SQL 调优集：\n\n1.  创建一个 SQL 调优集对象。\n\
    2.  确定起始和结束的 AWR 快照 ID。\n3.  使用在 AWR 中找到的高资源 SQL 填充 SQL 调优集。\n\n前述步骤将在以下小节中详细说明。\n\
    \n##### 步骤 1：创建 SQL 调优集对象\n\n创建一个 SQL 调优集。下面这段代码创建了一个名为 `IO_STS` 的调优集：\n\n```sql\n\
    BEGIN\n  dbms_sqltune.create_sqlset(\n    sqlset_name => 'IO_STS'\n   ,description\
    \ => 'STS from AWR');\nEND;\n/\n```\n\n##### 步骤 2：确定起始和结束的 AWR 快照 ID\n\n如果您不确定数据库中有哪些可用的快照，可以运行\
    \ AWR 报告或从 `DBA_HIST_SNAPSHOTS` 中查询 `SNAP_ID`：\n\n```sql\nselect snap_id, begin_interval_time\n\
    from dba_hist_snapshot order by 1;\n```\n\n##### 步骤 3：使用在 AWR 中找到的高资源 SQL 填充 SQL\
    \ 调优集\n\n现在，SQL 调优集将按磁盘读取排序，填充前 15 条 SQL 语句。起始和结束的 AWR 快照 ID 分别为 26800 和 26900：\n\
    \n```sql\nDECLARE\n  base_cur dbms_sqltune.sqlset_cursor;\nBEGIN\n  OPEN base_cur\
    \ FOR\n    SELECT value(x)\n    FROM table(dbms_sqltune.select_workload_repository(\n\
    \      26800,26900, null, null,'disk_reads',\n      null, null, null, 15)) x;\n\
    \  --\n  dbms_sqltune.load_sqlset(\n    sqlset_name => 'IO_STS',\n    populate_cursor\
    \ => base_cur);\nEND;\n/\n```\n\n上述代码填充了 AWR 中按磁盘读取排序的前 15 条 SQL 语句。`DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY`\
    \ 函数用于根据排名条件，使用 AWR 信息填充一个 PL/SQL 游标。然后，使用 `DBMS_SQLTUNE.LOAD_SQLSET` 过程，以该游标为输入来填充\
    \ SQL 调优集。\n\n#### 工作原理\n\n`DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY` 函数可以通过多种方式使用\
    \ AWR 中的查询来填充 SQL 调优集。您可以指示它按磁盘读取、耗用时间、CPU 时间、缓冲区获取等条件加载 SQL 语句。有关此函数的参数描述，请参见表\
    \ 11-5。当指定 AWR 作为输入时，可以使用以下任一方式：\n\n*   起始和结束的 AWR 快照 ID\n*   您先前创建的 AWR 基线\n\n\
    您可以通过此查询查看 SQL 调优集（在“解决方案”部分中创建）的详细信息：\n\n```sql\nSELECT\n sqlset_name\n,elapsed_time\n\
    ,cpu_time\n,buffer_gets\n,disk_reads\n,sql_text\nFROM dba_sqlset_statements\n\
    WHERE sqlset_name = 'IO_STS';\n```\n\n### 11-11. 从内存中的高资源消耗 SQL 填充 SQL 调优集\n\n\
    #### 问题\n\n您希望从当前在内存中的高资源消耗 SQL 语句填充一个调优集。\n\n#### 解决方案\n\n使用 `DBMS_SQLTUNE.SELECT_CURSOR_CACHE`\
    \ 函数，用当前在内存中的语句填充 SQL 调优集。此示例创建一个调优集，并用不属于 `SYS` 模式且磁盘读取大于 1,000,000 的高负载资源消耗语句填充它：\n\
    \n```sql\n-- 创建调优集\nEXEC DBMS_SQLTUNE.CREATE_SQLSET('HIGH_DISK_READS');\n-- 从游标缓存填充调优集\n\
    DECLARE\n  cur DBMS_SQLTUNE.SQLSET_CURSOR;\nBEGIN\n  OPEN cur FOR\n  SELECT VALUE(x)\n\
    \  FROM table(\n  DBMS_SQLTUNE.SELECT_CURSOR_CACHE(\n  'parsing_schema_name <>\
    \ ''SYS'' AND disk_reads > 1000000',\n  NULL, NULL, NULL, NULL, 1, NULL,'ALL'))\
    \ x;\n--\n  DBMS_SQLTUNE.LOAD_SQLSET(sqlset_name => 'HIGH_DISK_READS',\n    populate_cursor\
    \ => cur);\nEND;\n/\n```\n\n在上述代码中，请注意 `SYS` 用户被两组单引号（不是双引号）包围。`SELECT_CURSOR_CACHE`\
    \ 函数将 SQL 语句加载到 PL/SQL 游标中，`LOAD_SQLSET` 过程则使用这些 SQL 语句填充 SQL 调优集。\n\n#### 工作原理\n\
    \n`DBMS_SQLTUNE.SELECT_CURSOR_CACHE` 函数（有关函数参数描述，请参见表 11-6）允许您从内存中提取 SQL 语句及相关统计信息到\
    \ SQL 调优集。该过程允许您根据各种资源消耗条件过滤 SQL 语句，例如：\n\n*   `ELAPSED_TIME`（耗用时间）\n*   `CPU_TIME`（CPU\
    \ 时间）\n*   `BUFFER_GETS`（缓冲区获取）\n*   `DISK_READS`（磁盘读取）\n*   `DIRECT_WRITES`（直接写入）\n\
    *   `ROWS_PROCESSED`（处理行数）\n\n这为您如何过滤和填充 SQL 调优集提供了极大的灵活性。\n\n### 11-12. 用内存中的所有\
    \ SQL 填充 SQL 调优集\n\n#### 问题\n\n您希望创建一个 SQL 调优集，并用当前在内存中的所有 SQL 语句填充它。\n\n####\
    \ 解决方案\n\n使用 `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET` 过程，高效捕获当前存储在游标缓存（内存中）的所有\
    \ SQL。此示例创建一个名为 `PROD_WORKLOAD` 的 SQL 调优集，然后通过采样内存 3,600 秒（每次轮询事件之间等待 20 秒）进行填充：\n\
    \n```sql\nBEGIN\n  -- 创建调优集\n  DBMS_SQLTUNE.CREATE_SQLSET(\n    sqlset_name =>\
    \ 'PROD_WORKLOAD'\n   ,description => 'Prod workload sample');\n  --\n  DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET(\n\
    \    sqlset_name     => 'PROD_WORKLOAD'\n   ,time_limit      => 3600\n   ,repeat_interval\
    \ => 20);\nEND;\n/\n```\n\n#### 工作原理\n\n`DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET`\
    \ 过程允许您轮询内存中的查询，并使用找到的任何查询来填充 SQL 调优集。当需要捕获所有正在执行的 SQL 语句的样本集时，这是一种强大的技术。\n\n\
    在指示 `DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET` 捕获内存中的 SQL 语句方面，您拥有极大的灵活性（有关所有参数的详细信息，请参见表\
    \ 11-7）。例如，您可以通过指定 `CAPTURE_MODE` 为 `DBMS_SQLTUNE.MODE_ACCUMULATE_STATS`，来指示该过程捕获每条\
    \ SQL 语句的累计统计信息集。\n\n```sql\nBEGIN\n  DBMS_SQLTUNE.CAPTURE_CURSOR_CACHE_SQLSET(\n\
    \    sqlset_name     => 'PROD_WORKLOAD'\n   ,time_limit      => 60\n   ,repeat_interval\
    \ => 10\n   ,capture_mode    => DBMS_SQLTUNE.MODE_ACCUMULATE_STATS);\nEND;\n/\n\
    ```\n\n这比默认设置更消耗资源，但能为每条 SQL 语句生成更准确的统计信息。\n\n![images](img/t1107.jpg)\n\n###\
    \ 11-13. 显示 SQL 调优集的内容\n\n#### 问题\n\n您已填充了一个 SQL 调优集，并希望验证其特性，例如 SQL 语句及相应的统计信息。\n\
    \n#### 解决方案\n\n您可以通过此查询确定数据库中 SQL 调优集的名称和 SQL 语句数量：\n\n```sql\nSELECT name, created,\
    \ statement_count\nFROM dba_sqlset;\n```\n\n以下是一些示例输出：\n\n```\nNAME          \
    \                 CREATED   STATEMENT_COUNT\n------------------------------ ---------\
    \ ---------------\ntest1                          19-APR-11              29\n\
    ```\n\n使用以下查询显示 SQL 调优集中每个查询的 SQL 文本及相关统计信息：\n\n```sql\nSELECT sqlset_name, elapsed_time,\
    \ cpu_time, buffer_gets, disk_reads, sql_text\nFROM dba_sqlset_statements;\n```\n\
    \n下面是一小段输出。为了适应页面显示，`SQL_TEXT` 列已被截断：\n\n```\nSQLSET_NAME     ELAPSED_TIME   CPU_TIME\
    \ BUFFER_GETS DISK_READS SQL_TEXT\n--------------- ------------ ---------- -----------\
    \ ---------- ----------------------------\ntest1              235285363   45310000\
    \      112777       3050 INSERT ......\ntest1               52220149   22700000\
    \      328035      18826  delete from.....\n```"
- fmt: "#### How It Works\n\nRecall that a SQL tuning set consists of one or more\
    \ SQL statements and the corresponding execution statistics. This information\
    \ is viewable from the `DBA_SQLSET_*` views. [Table 11-8](#Chapter11.html#tab_11_8)\
    \ describes the type of SQL tuning set information contained within each of these\
    \ views.\n\n![images](images/t1108.jpg)\n\nYou can also use the `DBMS_SQLTUNE.SELECT_SQLSET`\
    \ function to retrieve information about SQL tuning sets—for example:\n\n```sql\n\
    SELECT\n  sql_id\n  ,elapsed_time\n  ,cpu_time\n  ,buffer_gets\n  ,disk_reads\n\
    \  ,sql_text\nFROM TABLE(DBMS_SQLTUNE.SELECT_SQLSET('&&sqlset_name'));\n```\n\n\
    Whether you use the `DBMS_SQLTUNE.SELECT_SQLSET` function or directly query the\
    \ data dictionary views depends entirely on your personal preference or business\
    \ requirement.\n\n### 11-14. Selectively Deleting Statements from a SQL Tuning\
    \ Set\n\n#### Problem\n\nYou want to prune SQL statements from an STS that don't\
    \ meet a performance measure, such as queries that have less than 2,000,000 disk\
    \ reads.\n\n#### Solution\n\nFirst view the existing SQL information associated\
    \ with an STS:\n\n```sql\nselect sqlset_name, disk_reads, cpu_time, elapsed_time,\
    \ buffer_gets\nfrom dba_sqlset_statements;\n```\n\nHere is some sample output:\n\
    \n```\nSQLSET_NAME                       DISK_READS   CPU_TIME ELAPSED_TIME BUFFER_GETS\n\
    ------------------------------ ---------- ---------- ------------ -----------\n\
    IO_STS                             3112941 3264960000   7805935285     2202432\n\
    IO_STS                             2943527 3356460000   8930436466     1913415\n\
    IO_STS                             2539642 2310610000   5869237421     1658465\n\
    IO_STS                             1999373 2291230000   6143543429     1278601\n\
    IO_STS                             1993973 2243180000   5461607976     1272271\n\
    IO_STS                             1759096 1930320000   4855618689     1654252\n\
    ```\n\nNow use the `DBMS_SQLTUNE.DELETE_SQLSET` procedure to remove SQL statements\
    \ from the STS based on the specified criterion. This example removes SQL statements\
    \ that have less than 2,000,000 disk reads from the SQL tuning set named `IO_STS`:\n\
    \n```sql\nBEGIN\n  DBMS_SQLTUNE.DELETE_SQLSET(\n    sqlset_name  => 'IO_STS'\n\
    \   ,basic_filter => 'disk_reads < 2000000');\nEND;\n/\n```\n\n#### How It Works\n\
    \nThe key to understanding is that a SQL tuning set consists of the following:\n\
    \n*   One or more SQL statements\n*   Associated metrics/statistics for each SQL\
    \ statement\n\nBecause the metrics/statistics are part of the STS, you can remove\
    \ SQL statements from a SQL tuning set based on characteristics of the associated\
    \ metrics/statistics. You can use the `DBMS_SQLTUNE.DELETE_SQLSET` procedure to\
    \ remove statements from the STS based on statistics such as the following:\n\n\
    *   `ELAPSED_TIME`\n*   `CPU_TIME`\n*   `BUFFER_GETS`\n*   `DISK_READS`\n*   `DIRECT_WRITES`\n\
    *   `ROWS_PROCESSED`\n\nIf you want to delete all SQL statements from a SQL tuning\
    \ set, then don't specify a filter—for example:\n\n```\nSQL> exec   DBMS_SQLTUNE.DELETE_SQLSET(sqlset_name\
    \  => 'IO_STS');\n```\n\n### 11-15. Transporting a SQL Tuning Set\n\n#### Problem\n\
    \nYou've identified some resource-intensive SQL statements in a production environment.\
    \ You want to transport these statements and associated statistics to a test environment,\
    \ where you can tune the statements without impacting production.\n\n#### Solution\n\
    \nThe following steps are used to copy a SQL tuning set from one database to another:\n\
    \n1.  Create a staging table in source database.\n2.  Populate the staging table\
    \ with STS data.\n3.  Copy the staging table to the destination database.\n4.\
    \  Unpack the staging table in the destination database.\n\nThe prior steps are\
    \ elaborated on in the following subsections.\n\n##### Step 1: Create a Staging\
    \ Table in the Source Database\n\nUse the `DBMS_SQLTUNE.CREATE_STGTAB_SQLSET`\
    \ procedure to create a table that will be used to contain the SQL tuning set\
    \ metadata. This example creates a table named `STS_TABLE`:\n\n```sql\nBEGIN\n\
    \  dbms_sqltune.create_stgtab_sqlset(\n  table_name => 'STS_TABLE'\n,schema_name\
    \ => 'MV_MAINT');\nEND;\n/\n```\n\n##### Step 2: Populate Staging Table with STS\
    \ Data\n\nNow populate the staging table with STS metadata using `DBMS_SQLTUNE.PACK_STGTAB_SQLSET`:\n\
    \n```sql\nBEGIN\n  dbms_sqltune.pack_stgtab_sqlset(\n  sqlset_name          =>\
    \ 'IO_STS'\n ,sqlset_owner         => 'SYS'\n ,staging_table_name   => 'STS_TABLE'\n\
    \ ,staging_schema_owner => 'MV_MAINT');\nEND;\n/\n```\n\nIf you're unsure of the\
    \ names of the STS you want to transport, run the following query to get the details:\n\
    \n```sql\nSELECT name, owner, created, statement_count\nFROM dba_sqlset;\n```\n\
    \n##### Step 3: Copy the Staging Table to the Destination Database\n\nYou can\
    \ copy the table from one database to the other via Data Pump, the old `exp`/`imp`\
    \ utilities, or by using a database link. This example creates a database link\
    \ in the destination database and then copies the table from the source database:\n\
    \n```sql\ncreate database link source_db\nconnect to mv_maint\nidentified by foo\n\
    using 'source_db';\n```\n\nIn the destination database, the table can be copied\
    \ directly from the source with the `CREATE TABLE AS SELECT` statement:\n\n```\n\
    SQL> create table STS_TABLE as select * from STS_TABLE@source_db;\n```\n\n#####\
    \ Step 4: Unpack the Staging Table in the Destination Database\n\nUse the `DBMS_SQLTUNE.UNPACK_STGTAB_SQLSET`\
    \ procedure to take the contents of the staging table and populate the data dictionary\
    \ with the SQL tuning set metadata. This example unpacks all SQL tuning sets contained\
    \ within the staging table:\n\n```sql\nBEGIN\nDBMS_SQLTUNE.UNPACK_STGTAB_SQLSET(\n\
    \  sqlset_name        => '%'\n ,replace            => TRUE\n ,staging_table_name\
    \ => 'STS_TABLE');\nEND;\n/\n```\n\n#### How It Works\n\nA SQL tuning set consists\
    \ of one or more queries and corresponding execution statistics. You will occasionally\
    \ have a need to copy a SQL tuning set from one database to another. For example,\
    \ you might be having performance problems with a production database but want\
    \ to capture and move the top resource-consuming statements to a test database\
    \ where you can diagnose the SQL (within the STS) without impacting production.\n\
    \nKeep in mind that an STS can be used as input for any of the following tools:\n\
    \n*   SQL Tuning Advisor\n*   SQL Access Advisor\n*   SQL Plan Management\n* \
    \  SQL Performance Analyzer\n\nThe prior tools are used extensively to troubleshoot\
    \ and test SQL performance. Transporting a SQL tuning set from one environment\
    \ to another allows you to use these tools in a testing or development environment.\n\
    \n![images](images/square.jpg) **Note** SQL tuning sets can be transported to\
    \ Oracle Database 10g R2 or higher versions of the database only.\n\n### 11-16.\
    \ Creating a Tuning Task\n\n#### Problem\n\nYou realize that as part of manually\
    \ running the SQL Tuning Advisor, you need to first create a tuning task.\n\n\
    ![images](images/square.jpg) **Tip** Refer to [Figure 11-1](#Chapter11.html#fig_11_1)\
    \ for the details on the flow of processes required when manually running the\
    \ SQL Tuning Advisor."
  raw: '#### How It Works


    Recall that a SQL tuning set consists of one or more SQL statements and the corresponding
    execution statistics. This information is viewable from the `DBA_SQLSET_*` views.
    [Table 11-8](#Chapter11.html#tab_11_8) describes the type of SQL tuning set information
    contained within each of these views.


    ![images](images/t1108.jpg)


    You can also use the `DBMS_SQLTUNE.SELECT_SQLSET` function to retrieve information
    about SQL tuning sets—for example:


    `SELECT`

    ` sql_id`

    `,elapsed_time`

    `,cpu_time`

    `,buffer_gets`

    `,disk_reads`

    `,sql_text`

    `FROM TABLE(DBMS_SQLTUNE.SELECT_SQLSET(''&&sqlset_name''));`


    Whether you use the `DBMS_SQLTUNE.SELECT_SQLSET` function or directly query the
    data dictionary views depends entirely on your personal preference or business
    requirement.


    ### 11-14. Selectively Deleting Statements from a SQL Tuning Set


    #### Problem


    You want to prune SQL statements from an STS that don''t meet a performance measure,
    such as queries that have less than 2,000,000 disk reads.


    #### Solution


    First view the existing SQL information associated with an STS:


    `select sqlset_name, disk_reads, cpu_time, elapsed_time, buffer_gets`

    `from dba_sqlset_statements;`


    Here is some sample output:


    `SQLSET_NAME                    DISK_READS   CPU_TIME ELAPSED_TIME BUFFER_GETS`

    `------------------------------ ---------- ---------- ------------ -----------`

    `IO_STS                            3112941 3264960000   7805935285     2202432`

    `IO_STS                            2943527 3356460000   8930436466     1913415`

    `IO_STS                            2539642 2310610000   5869237421     1658465`

    `IO_STS                            1999373 2291230000   6143543429     1278601`

    `IO_STS                            1993973 2243180000   5461607976     1272271`

    `IO_STS                            1759096 1930320000   4855618689     1654252`


    Now use the `DBMS_SQLTUNE.DELETE_SQLSET` procedure to remove SQL statements from
    the STS based on the specified criterion. This example removes SQL statements
    that have less than 2,000,000 disk reads from the SQL tuning set named `IO_STS`:


    `BEGIN`

    `  DBMS_SQLTUNE.DELETE_SQLSET(`

    `    sqlset_name  => ''IO_STS''`

    `   ,basic_filter => ''disk_reads < 2000000'');`

    `END;`

    `/`


    #### How It Works


    The key to understanding is that a SQL tuning set consists of the following:


    *   One or more SQL statements

    *   Associated metrics/statistics for each SQL statement


    Because the metrics/statistics are part of the STS, you can remove SQL statements
    from a SQL tuning set based on characteristics of the associated metrics/statistics.
    You can use the `DBMS_SQLTUNE.DELETE_SQLSET` procedure to remove statements from
    the STS based on statistics such as the following:


    *   `ELAPSED_TIME`

    *   `CPU_TIME`

    *   `BUFFER_GETS`

    *   `DISK_READS`

    *   `DIRECT_WRITES`

    *   `ROWS_PROCESSED`


    If you want to delete all SQL statements from a SQL tuning set, then don''t specify
    a filter—for example:


    `SQL> exec  DBMS_SQLTUNE.DELETE_SQLSET(sqlset_name  => ''IO_STS'');`


    ### 11-15\. Transporting a SQL Tuning Set


    #### Problem


    You''ve identified some resource-intensive SQL statements in a production environment.
    You want to transport these statements and associated statistics to a test environment,
    where you can tune the statements without impacting production.


    #### Solution


    The following steps are used to copy a SQL tuning set from one database to another:


    1.  Create a staging table in source database.

    2.  Populate the staging table with STS data.

    3.  Copy the staging table to the destination database.

    4.  Unpack the staging table in the destination database.


    The prior steps are elaborated on in the following subsections.


    ##### Step 1: Create a Staging Table in the Source Database


    Use the `DBMS_SQLTUNE.CREATE_STGTAB_SQLSET` procedure to create a table that will
    be used to contain the SQL tuning set metadata. This example creates a table named
    `STS_TABLE`:


    `BEGIN`

    `  dbms_sqltune.create_stgtab_sqlset(`

    `  table_name => ''STS_TABLE''`

    `,schema_name => ''MV_MAINT'');`

    `END;`

    `/`


    ##### Step 2: Populate Staging Table with STS Data


    Now populate the staging table with STS metadata using `DBMS_SQLTUNE.PACK_STGTAB_SQLSET`:


    `BEGIN`

    `  dbms_sqltune.pack_stgtab_sqlset(`

    `  sqlset_name          => ''IO_STS''`

    ` ,sqlset_owner         => ''SYS''`

    ` ,staging_table_name   => ''STS_TABLE''`

    ` ,staging_schema_owner => ''MV_MAINT'');`

    `END;`

    `/`


    If you''re unsure of the names of the STS you want to transport, run the following
    query to get the details:


    `SELECT name, owner, created, statement_count`

    `FROM dba_sqlset;`


    ##### Step 3: Copy the Staging Table to the Destination Database


    You can copy the table from one database to the other via Data Pump, the old `exp`/`imp`
    utilities, or by using a database link. This example creates a database link in
    the destination database and then copies the table from the source database:


    `create database link source_db`

    `connect to mv_maint`

    `identified by foo`

    `using ''source_db'';`


    In the destination database, the table can be copied directly from the source
    with the `CREATE TABLE AS SELECT` statement:


    `SQL> create table STS_TABLE as select * from STS_TABLE@source_db;`


    ##### Step 4: Unpack the Staging Table in the Destination Database


    Use the `DBMS_SQLTUNE.UNPACK_STGTAB_SQLSET` procedure to take the contents of
    the staging table and populate the data dictionary with the SQL tuning set metadata.
    This example unpacks all SQL tuning sets contained within the staging table:


    `BEGIN`

    `DBMS_SQLTUNE.UNPACK_STGTAB_SQLSET(`

    `  sqlset_name        => ''%''`

    ` ,replace            => TRUE`

    ` ,staging_table_name => ''STS_TABLE'');`

    `END;`

    `/`


    #### How It Works


    A SQL tuning set consists of one or more queries and corresponding execution statistics.
    You will occasionally have a need to copy a SQL tuning set from one database to
    another. For example, you might be having performance problems with a production
    database but want to capture and move the top resource-consuming statements to
    a test database where you can diagnose the SQL (within the STS) without impacting
    production.


    Keep in mind that an STS can be used as input for any of the following tools:


    *   SQL Tuning Advisor

    *   SQL Access Advisor

    *   SQL Plan Management

    *   SQL Performance Analyzer


    The prior tools are used extensively to troubleshoot and test SQL performance.
    Transporting a SQL tuning set from one environment to another allows you to use
    these tools in a testing or development environment.


    ![images](images/square.jpg) **Note** SQL tuning sets can be transported to Oracle
    Database 10g R2 or higher versions of the database only.


    ### 11-16\. Creating a Tuning Task


    #### Problem


    You realize that as part of manually running the SQL Tuning Advisor, you need
    to first create a tuning task.


    ![images](images/square.jpg) **Tip** Refer to [Figure 11-1](#Chapter11.html#fig_11_1)
    for the details on the flow of processes required when manually running the SQL
    Tuning Advisor.'
  trans: "#### 工作原理\n\n回想一下，一个 SQL 调优集包含一个或多个 SQL 语句及其对应的执行统计信息。这些信息可以从 `DBA_SQLSET_*`\
    \ 视图中查看。表 11-8 描述了这些视图中包含的 SQL 调优集信息类型。\n\n![images](img/t1108.jpg)\n\n您也可以使用\
    \ `DBMS_SQLTUNE.SELECT_SQLSET` 函数来检索关于 SQL 调优集的信息——例如：\n\n```sql\nSELECT\n  sql_id\n\
    \  ,elapsed_time\n  ,cpu_time\n  ,buffer_gets\n  ,disk_reads\n  ,sql_text\nFROM\
    \ TABLE(DBMS_SQLTUNE.SELECT_SQLSET('&&sqlset_name'));\n```\n\n究竟是使用 `DBMS_SQLTUNE.SELECT_SQLSET`\
    \ 函数还是直接查询数据字典视图，完全取决于您的个人偏好或业务需求。\n\n### 11-14. 从 SQL 调优集中选择性删除语句\n\n#### 问题\n\
    \n您想要从 STS 中删除那些不符合特定性能度量的 SQL 语句，例如删除磁盘读取少于 2,000,000 次的查询。\n\n#### 解决方案\n\n\
    首先，查看与某个 STS 关联的现有 SQL 信息：\n\n```sql\nselect sqlset_name, disk_reads, cpu_time,\
    \ elapsed_time, buffer_gets\nfrom dba_sqlset_statements;\n```\n\n以下是一些示例输出：\n\n\
    ```\nSQLSET_NAME                       DISK_READS   CPU_TIME ELAPSED_TIME BUFFER_GETS\n\
    ------------------------------ ---------- ---------- ------------ -----------\n\
    IO_STS                             3112941 3264960000   7805935285     2202432\n\
    IO_STS                             2943527 3356460000   8930436466     1913415\n\
    IO_STS                             2539642 2310610000   5869237421     1658465\n\
    IO_STS                             1999373 2291230000   6143543429     1278601\n\
    IO_STS                             1993973 2243180000   5461607976     1272271\n\
    IO_STS                             1759096 1930320000   4855618689     1654252\n\
    ```\n\n现在，使用 `DBMS_SQLTUNE.DELETE_SQLSET` 过程，根据指定的条件从 STS 中移除 SQL 语句。此示例从名为 `IO_STS`\
    \ 的 SQL 调优集中删除磁盘读取少于 2,000,000 次的 SQL 语句：\n\n```sql\nBEGIN\n  DBMS_SQLTUNE.DELETE_SQLSET(\n\
    \    sqlset_name  => 'IO_STS'\n   ,basic_filter => 'disk_reads < 2000000');\n\
    END;\n/\n```\n\n#### 工作原理\n\n理解的关键在于，一个 SQL 调优集由以下部分组成：\n\n*   一个或多个 SQL 语句\n\
    *   每个 SQL 语句的关联度量/统计信息\n\n因为度量/统计信息是 STS 的一部分，所以您可以基于关联度量/统计信息的特性，从 SQL 调优集中删除\
    \ SQL 语句。您可以使用 `DBMS_SQLTUNE.DELETE_SQLSET` 过程，基于诸如以下的统计信息来删除 STS 中的语句：\n\n* \
    \  `ELAPSED_TIME`\n*   `CPU_TIME`\n*   `BUFFER_GETS`\n*   `DISK_READS`\n*   `DIRECT_WRITES`\n\
    *   `ROWS_PROCESSED`\n\n如果您想删除 SQL 调优集中的所有 SQL 语句，则不要指定过滤器——例如：\n\n```\nSQL> exec\
    \   DBMS_SQLTUNE.DELETE_SQLSET(sqlset_name  => 'IO_STS');\n```\n\n### 11-15. 传输\
    \ SQL 调优集\n\n#### 问题\n\n您已在生产环境中识别出一些资源消耗大的 SQL 语句。您希望将这些语句和相关的统计信息传输到测试环境，以便您可以在不影响生产的情况下对这些语句进行调优。\n\
    \n#### 解决方案\n\n以下步骤用于将 SQL 调优集从一个数据库复制到另一个数据库：\n\n1.  在源数据库中创建一个暂存表。\n2.  用 STS\
    \ 数据填充暂存表。\n3.  将暂存表复制到目标数据库。\n4.  在目标数据库中解包暂存表。\n\n上述步骤将在以下小节中详细阐述。\n\n#####\
    \ 步骤 1：在源数据库中创建暂存表\n\n使用 `DBMS_SQLTUNE.CREATE_STGTAB_SQLSET` 过程创建一个表，该表将用于包含 SQL\
    \ 调优集元数据。此示例创建一个名为 `STS_TABLE` 的表：\n\n```sql\nBEGIN\n  dbms_sqltune.create_stgtab_sqlset(\n\
    \  table_name => 'STS_TABLE'\n,schema_name => 'MV_MAINT');\nEND;\n/\n```\n\n#####\
    \ 步骤 2：用 STS 数据填充暂存表\n\n现在使用 `DBMS_SQLTUNE.PACK_STGTAB_SQLSET` 用 STS 元数据填充暂存表：\n\
    \n```sql\nBEGIN\n  dbms_sqltune.pack_stgtab_sqlset(\n  sqlset_name          =>\
    \ 'IO_STS'\n ,sqlset_owner         => 'SYS'\n ,staging_table_name   => 'STS_TABLE'\n\
    \ ,staging_schema_owner => 'MV_MAINT');\nEND;\n/\n```\n\n如果您不确定要传输的 STS 名称，可以运行以下查询获取详细信息：\n\
    \n```sql\nSELECT name, owner, created, statement_count\nFROM dba_sqlset;\n```\n\
    \n##### 步骤 3：将暂存表复制到目标数据库\n\n您可以通过 Data Pump、旧的 `exp`/`imp` 实用程序或使用数据库链接将表从一个数据库复制到另一个数据库。此示例在目标数据库中创建一个数据库链接，然后从源数据库复制表：\n\
    \n```sql\ncreate database link source_db\nconnect to mv_maint\nidentified by foo\n\
    using 'source_db';\n```\n\n在目标数据库中，可以使用 `CREATE TABLE AS SELECT` 语句直接从源数据库复制表：\n\
    \n```\nSQL> create table STS_TABLE as select * from STS_TABLE@source_db;\n```\n\
    \n##### 步骤 4：在目标数据库中解包暂存表\n\n使用 `DBMS_SQLTUNE.UNPACK_STGTAB_SQLSET` 过程，获取暂存表的内容并用\
    \ SQL 调优集元数据填充数据字典。此示例解包暂存表中包含的所有 SQL 调优集：\n\n```sql\nBEGIN\nDBMS_SQLTUNE.UNPACK_STGTAB_SQLSET(\n\
    \  sqlset_name        => '%'\n ,replace            => TRUE\n ,staging_table_name\
    \ => 'STS_TABLE');\nEND;\n/\n```\n\n#### 工作原理\n\n一个 SQL 调优集包含一个或多个查询及其对应的执行统计信息。您偶尔会需要将\
    \ SQL 调优集从一个数据库复制到另一个数据库。例如，您可能遇到了生产数据库的性能问题，但希望捕获并移动消耗资源最多的语句到一个测试数据库，在那里您可以诊断\
    \ STS 中的 SQL，而不影响生产。\n\n请记住，STS 可作为以下任何工具的输入：\n\n*   SQL 调优顾问\n*   SQL 访问顾问\n\
    *   SQL 执行计划管理\n*   SQL 性能分析器\n\n上述工具被广泛用于故障排除和测试 SQL 性能。将 SQL 调优集从一个环境传输到另一个环境，使您可以在测试或开发环境中使用这些工具。\n\
    \n![images](img/square.jpg) **注意** SQL 调优集只能传输到 Oracle Database 10g R2 或更高版本的数据库。\n\
    \n### 11-16. 创建调优任务\n\n#### 问题\n\n您意识到，作为手动运行 SQL 调优顾问的一部分，您需要首先创建一个调优任务。\n\n\
    ![images](img/square.jpg) **提示** 有关手动运行 SQL 调优顾问所需的过程流详情，请参阅图 11-1。"
- fmt: "## Solution\n\n使用 `DBMS_SQLTUNE.CREATE_TUNING_TASK` 过程来创建SQL调优任务。在创建SQL调优任务时，可以使用以下输入：\n\
    \n*   特定SQL语句的文本\n*   从内存中游标缓存获取的特定SQL语句的标识符\n*   给定一系列快照ID的AWR中的单个SQL语句\n*  \
    \ SQL调优集名称（关于如何创建SQL调优集的详细信息，请参见食谱11-7至11-11）\n\n以下小节描述了创建SQL调优任务的上述技术示例。\n\n\
    ![images](images/square.jpg) 注意：创建调优任务的用户需要 `ADMINISTER SQL MANAGEMENT OBJECT`\
    \ 系统权限。\n\n### Text for a Specific SQL Statement\n\n此示例在创建调优任务时提供SQL语句的文本：\n\n\
    ```\nDECLARE\n  tune_task VARCHAR2(30);\n  tune_sql  CLOB;\nBEGIN\n  tune_sql\
    \ := 'select count(*) from mgmt_db_feature_usage_ecm';\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n\
    \    sql_text    => tune_sql\n   ,user_name   => 'MV_MAINT'\n   ,scope       =>\
    \ 'COMPREHENSIVE'\n   ,time_limit  => 60\n   ,task_name   => 'tune_test'\n   ,description\
    \ => 'Provide SQL text'\n);\nEND;\n/\n```\n\n### SQL ID for a Specific SQL Statement\
    \ from the Cursor Cache\n\n首先通过查询 `V$SQL` 来识别 `SQL_ID`：\n\n```\nSELECT sql_id,\
    \ sql_text\nFROM v$sql where sql_text like '%&&mytext%';\n```\n\n一旦有了 `SQL_ID`，就可以将其作为输入提供给\
    \ `DBMS_SQLTUNE.CREATE_TUNING_TASK`：\n\n```\nDECLARE\n  tune_task VARCHAR2(30);\n\
    \  tune_sql  CLOB;\nBEGIN\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n \
    \   sql_id      => '98u3gf0xzq03f'\n   ,task_name   => 'tune_test2'\n   ,description\
    \ => 'Provide SQL ID'\n);\nEND;\n/\n```\n\n### Single SQL Statement from the AWR\
    \ Given a Range of Snapshot IDs\n\n以下是一个通过提供 `SQL_ID` 和一系列AWR快照ID来创建SQL调优任务的示例：\n\
    \n```\nDECLARE\n  tune_task VARCHAR2(30);\n  tune_sql  CLOB;\nBEGIN\n  tune_task\
    \ := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n    sql_id      => '1tbu2jp7kv0pm'\n  \
    \ ,begin_snap  => 21690\n   ,end_snap    => 21864\n   ,task_name   => 'tune_test3'\n\
    );\nEND;\n/\n```\n\n如果不确定使用哪个 `SQL_ID`（及相关查询），请运行此查询：\n\n```\nSQL> select sql_id,\
    \ sql_text from dba_hist_sqltext;\n```\n\n如果不知道可用的快照ID，请运行此查询：\n\n```\nSQL> select\
    \ snap_id from dba_hist_snapshot order by 1;\n```\n\n![images](images/square.jpg)\
    \ 提示：默认情况下，AWR只包含高资源消耗的查询。你可以通过以下方式将特定SQL语句添加到AWR（无论其资源消耗如何），从而修改此行为以确保其包含在每个快照中：\n\
    \n```\nSQL> exec dbms_workload_repository.add_colored_sql('98u3gf0xzq03f');\n\
    ```\n\n### SQL Tuning Set Name\n\n如果需要针对多个SQL查询运行SQL调优顾问，则需要一个SQL调优集。要使用SQL调优集作为输入创建调优任务，请按如下方式操作：\n\
    \n```\nSQL> variable mytt varchar2(30);\nSQL> exec :mytt := DBMS_SQLTUNE.CREATE_TUNING_TASK(sqlset_name\
    \ => 'IO_STS');\nSQL> print :mytt\n```\n\n## How It Works\n\n在手动执行SQL调优顾问之前，首先需要定义将哪些SQL语句用作输入。这是通过创建SQL调优任务来完成的。Oracle在如何向调优任务添加SQL语句方面提供了极大的灵活性。如“Solution”部分所示，你可以执行以下操作：\n\
    \n*   硬编码特定SQL查询的文本\n*   使用内存中的SQL查询\n*   使用AWR中的SQL查询\n*   在调优多个查询时定义SQL调优集\n\
    \n上述技术提供了多种方法来识别将由SQL调优顾问分析的SQL语句。创建调优任务后，可以通过此查询查看其详细信息：\n\n```\nselect owner,\
    \ task_name, advisor_name, created\nfrom dba_advisor_tasks\norder by created;\n\
    ```\n\n创建调优任务后，现在可以手动执行SQL调优顾问（食谱11-17）。如果需要删除调优任务，可以按如下方式操作：\n\n```\nSQL> exec\
    \ dbms_sqltune.drop_tuning_task(task_name => '&&task_name');\n```\n\n### 11-17.\
    \ Manually Running SQL Tuning Advisor\n\n#### Problem\n\n你想要手动执行SQL调优顾问并获取针对某条SQL语句的调优建议。\n\
    \n#### Solution\n\n按照以下步骤手动运行SQL调优顾问：\n\n1.  创建一个调优任务（完整细节请参见食谱11-16）；这定义了哪些SQL语句将被调优。这可以是单个SQL语句，也可以是SQL调优集中的多个SQL语句。\n\
    2.  执行调优任务。\n3.  显示调优任务的结果。\n\n此示例为单个SQL语句运行SQL调优顾问。首先创建一个调优任务。\n\n```\nDECLARE\n\
    \  tune_task VARCHAR2(30);\n  tune_sql  CLOB;\nBEGIN\n  tune_sql := 'select a.emp_id,\
    \ b.dept_name ' ||\n              'from emp a, dept b ' ||\n              'where\
    \ a.dept_id = b.dept_id';\n  --\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n\
    \    sql_text    => tune_sql\n   ,user_name   => 'MV_MAINT'\n   ,scope       =>\
    \ 'COMPREHENSIVE'\n   ,time_limit  => 60\n   ,task_name   => 'tune_test'\n   ,description\
    \ => 'Tune a SQL statement.'\n);\nEND;\n/\n```\n\n接下来执行调优任务：\n\n```\nSQL> exec\
    \ dbms_sqltune.execute_tuning_task(task_name => 'tune_test');\n```\n\n最后，生成一份报告显示调优建议：\n\
    \n```\nSQL> set long 10000 longchunksize 10000\nSQL> set linesize 132 pagesize\
    \ 200\nSQL> select dbms_sqltune.report_tuning_task('tune_test') from dual;\n```\n\
    \n以下是一些示例输出：\n\n```\n1- Statistics Finding\n---------------------\n  Table \"\
    MV_MAINT\".\"DEPT\" was not analyzed.\n  Recommendation\n  --------------\n  -\
    \ Consider collecting optimizer statistics for this table.\n....\n2- Index Finding\
    \ (see explain plans section below)\n--------------------------------------------------\n\
    \  The execution plan of this statement can be improved by creating one or more\n\
    \  indices.\n  Recommendation (estimated benefit: 97.98%)\n  ------------------------------------------\n\
    \  - Consider running the Access Advisor to improve the physical schema design\n\
    \    or creating the recommended index.\n    create index MV_MAINT.IDX$$_21E10001\
    \ on MV_MAINT.EMP(\"DEPT_ID\");\n```\n\n上述输出包含关于为查询中的表生成统计信息以及添加索引的具体建议。你需要在生产环境实施这些建议之前对其进行测试，以确保性能确实有所提升。\n\
    \n### OPTIMIZER TUNING MODES\n\n优化器在两种不同的模式下运行：常规模式和调优模式。当执行SQL语句时，优化器运行在常规模式下，并快速确定一个合理的执行计划。在此模式下，优化器只花费几分之一秒的时间来尝试确定最佳计划。\n\
    \n当SQL调优顾问分析查询时，它让优化器运行在调优模式下。在此模式下，优化器可能花费几分钟来分析执行计划的每个步骤，并生成一个可能比常规模式下生成的计划效率高得多的执行计划。\n\
    \n这有点像计算机象棋游戏。如果你允许象棋软件每步只花一秒或更少的时间，很容易击败程序。然而，如果你允许象棋游戏每步花一分钟或更长时间，在此模式下，游戏会做出更优的决策。"
  raw: '#### Solution


    Use the `DBMS_SQLTUNE.CREATE_TUNING_TASK` procedure to create a SQL tuning task.
    You can use the following as inputs when creating a SQL tuning task:


    *   Text for a specific SQL statement

    *   SQL identifier for a specific SQL statement from the cursor cache in memory

    *   Single SQL statement from the AWR given a range of snapshot IDs

    *   SQL tuning set name (see Recipes 11-7 through 11-11 for details on how to
    create a SQL tuning set)


    Examples of the prior techniques for creating a SQL tuning task are described
    in the following subsections.


    ![images](images/square.jpg) **Note** The user creating the tuning task needs
    the `ADMINISTER SQL MANAGEMENT OBJECT` system privilege.


    ##### Text for a Specific SQL Statement


    This example provides the text of a SQL statement when creating the tuning task:


    `DECLARE`

    `  tune_task VARCHAR2(30);`

    `  tune_sql  CLOB;`

    `BEGIN`

    `  tune_sql := ''select count(*) from mgmt_db_feature_usage_ecm'';`

    `  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(`

    `    sql_text    => tune_sql`

    `   ,user_name   => ''MV_MAINT''`

    `   ,scope       => ''COMPREHENSIVE''`

    `   ,time_limit  => 60`

    `   ,task_name   => ''tune_test''`

    `   ,description => ''Provide SQL text''`

    `);`

    `END;`

    `/`


    ##### SQL ID for a Specific SQL Statement from the Cursor Cache


    First identify the `SQL_ID` by querying `V$SQL`:


    `SELECT sql_id, sql_text`

    `FROM v$sql where sql_text like ''%&&mytext%'';`


    Once you have the `SQL_ID`, you can provide it as input to `DBMS_SQLTUNE.CREATE_TUNING_TASK`:


    `DECLARE`

    `  tune_task VARCHAR2(30);`

    `  tune_sql  CLOB;`

    `BEGIN`

    `  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(`

    `    sql_id      => ''98u3gf0xzq03f''`

    `   ,task_name   => ''tune_test2''`

    `   ,description => ''Provide SQL ID''`

    `);`

    `END;`

    `/`


    ##### Single SQL Statement from the AWR Given a Range of Snapshot IDs


    Here''s an example of creating a SQL tuning task by providing a `SQL_ID` and range
    of AWR snapshot IDs:


    `DECLARE`

    `  tune_task VARCHAR2(30);`

    `  tune_sql  CLOB;` `BEGIN`

    `  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(`

    `    sql_id      => ''1tbu2jp7kv0pm''`

    `   ,begin_snap  => 21690`

    `   ,end_snap    => 21864`

    `   ,task_name   => ''tune_test3''`

    `);`

    `END;`

    `/`


    If you''re not sure which `SQL_ID` (and associated query) to use, then run this
    query:


    `SQL> select sql_id, sql_text from dba_hist_sqltext;`


    If you''re unaware of the available snapshot IDs, then run this query:


    `SQL> select snap_id from dba_hist_snapshot order by 1;`


    ![images](images/square.jpg) **Tip** By default, the AWR contains only high resource-consuming
    queries. You can modify this behavior and ensure that a specific SQL statement
    is included in every snapshot (regardless of its resource consumption) by adding
    it to the AWR via the following:


    `SQL> exec dbms_workload_repository.add_colored_sql(''98u3gf0xzq03f'');`


    ##### SQL Tuning Set Name


    If you have the requirement of running the SQL Tuning Advisor against multiple
    SQL queries, then a SQL tuning set is required. To create a tuning task using
    a SQL tuning set as input, do so as follows:


    `SQL> variable mytt varchar2(30);`

    `SQL> exec :mytt := DBMS_SQLTUNE.CREATE_TUNING_TASK(sqlset_name => ''IO_STS'');`

    `SQL> print :mytt`


    #### How It Works


    Before manually executing the SQL Tuning Advisor, you first need to define what
    SQL statements will be used as input. You do this by creating a SQL tuning task.
    Oracle provides a great deal of flexibility on how you add SQL statements to a
    tuning task. As shown in the “Solution” section, you can do the following:


    *   Hard-code the text for a specific SQL query

    *   Use a SQL query in memory

    *   Use a SQL query in the AWR

    *   Define a SQL tuning set when tuning multiple queries


    The prior techniques provide a variety of ways to identify SQL statements to be
    analyzed by the SQL Tuning Advisor. Once you''ve created a tuning task, you can
    view its details via this query:


    `select owner, task_name, advisor_name, created`

    `from dba_advisor_tasks`

    `order by created;`


    Once you have created a tuning task, you can now manually execute the SQL Tuning
    Advisor (Recipe 11-17). If you need to drop the tuning task, you can do so as
    follows:


    `SQL> exec dbms_sqltune.drop_tuning_task(task_name => ''&&task_name'');`


    ### 11-17. Manually Running SQL Tuning Advisor


    #### Problem


    You want to manually execute SQL Tuning Advisor and get tuning advice for a SQL
    statement.


    #### Solution


    Use the following steps to manually run the SQL Tuning Advisor:


    1.  Create a tuning task (see Recipe 11-16 for complete details); this defines
    which SQL statements will be tuned. This can be a single SQL statement or several
    SQL statements within a SQL tuning set.

    2.  Execute the tuning task.

    3.  Display the results of the tuning task.


    This example runs the SQL Tuning Advisor for a single SQL statement. First a tuning
    task is created.


    `DECLARE`

    `  tune_task VARCHAR2(30);`

    `  tune_sql  CLOB;`

    `BEGIN`

    `  tune_sql := ''select a.emp_id, b.dept_name '' ||`

    `              ''from emp a, dept b '' ||`

    `              ''where a.dept_id = b.dept_id'';`

    `  --`

    `  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(`

    `    sql_text    => tune_sql`

    `   ,user_name   => ''MV_MAINT''`

    `   ,scope       => ''COMPREHENSIVE''`

    `   ,time_limit  => 60`

    `   ,task_name   => ''tune_test''`

    `   ,description => ''Tune a SQL statement.''`

    `);`

    `END;`

    `/`


    Next the tuning task is executed:


    `SQL> exec dbms_sqltune.execute_tuning_task(task_name => ''tune_test'');`


    Lastly, a report is generated that displays the tuning advice:


    `SQL> set long 10000 longchunksize 10000`

    `SQL> set linesize 132 pagesize 200`

    `SQL> select dbms_sqltune.report_tuning_task(''tune_test'') from dual;`


    Here is some sample output:


    `1- Statistics Finding`

    `---------------------`

    `  Table "MV_MAINT"."DEPT" was not analyzed.`

    `  Recommendation`

    `  --------------`

    `  - Consider collecting optimizer statistics for this table.`

    `....`

    `2- Index Finding (see explain plans section below)`

    `--------------------------------------------------`

    `  The execution plan of this statement can be improved by creating one or more`

    `  indices.`

    `  Recommendation (estimated benefit: 97.98%)`

    `  ------------------------------------------`

    `  - Consider running the Access Advisor to improve the physical schema design`

    `    or creating the recommended index.`

    `    create index MV_MAINT.IDX$$_21E10001 on MV_MAINT.EMP("DEPT_ID");`


    The prior output has specific recommendations on generating statistics for a table
    in the query and adding an index. You''ll need to test the recommendations to
    ensure that performance does improve before implementing them in a production
    environment.


    **OPTIMIZER TUNING MODES**


    The optimizer operates in two different modes: normal and tuning. When a SQL statement
    executes, the optimizer operates in normal mode and quickly identifies a reasonable
    execution plan. In this mode, the optimizer spends only a fraction of a second
    to try to determine the best plan.


    When the SQL Tuning Advisor analyzes a query, it runs the optimizer in tuning
    mode. In this mode, the optimizer can take several minutes to analyze each step
    of the execution plan and generate an execution plan that is potentially much
    more efficient than the plan generated under normal mode.


    This is somewhat similar to a computer chess game. When you allow the chess software
    to spend only a second or less on each move, it''s easy to beat the game. However,
    if you allow the chess game to spend a minute or more on each move, in this mode
    the game makes much more optimal decisions.'
  trans: "## 解决方案\n\n使用 `DBMS_SQLTUNE.CREATE_TUNING_TASK` 过程来创建 SQL 调优任务。在创建 SQL 调优任务时，可以使用以下输入：\n\
    \n*   特定 SQL 语句的文本\n*   从内存中游标缓存获取的特定 SQL 语句的标识符\n*   给定一系列快照 ID 的 AWR 中的单个 SQL\
    \ 语句\n*   SQL 调优集名称（关于如何创建 SQL 调优集的详细信息，请参见方案 11-7 至 11-11）\n\n以下小节描述了创建 SQL 调优任务的上述技术示例。\n\
    \n![images](img/square.jpg) 注意：创建调优任务的用户需要 `ADMINISTER SQL MANAGEMENT OBJECT`\
    \ 系统权限。\n\n### 特定 SQL 语句的文本\n\n此示例在创建调优任务时提供 SQL 语句的文本：\n\n```\nDECLARE\n  tune_task\
    \ VARCHAR2(30);\n  tune_sql  CLOB;\nBEGIN\n  tune_sql := 'select count(*) from\
    \ mgmt_db_feature_usage_ecm';\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n\
    \    sql_text    => tune_sql\n   ,user_name   => 'MV_MAINT'\n   ,scope       =>\
    \ 'COMPREHENSIVE'\n   ,time_limit  => 60\n   ,task_name   => 'tune_test'\n   ,description\
    \ => 'Provide SQL text'\n);\nEND;\n/\n```\n\n### 从游标缓存获取的特定 SQL 语句的 SQL ID\n\n\
    首先通过查询 `V$SQL` 来识别 `SQL_ID`：\n\n```\nSELECT sql_id, sql_text\nFROM v$sql where\
    \ sql_text like '%&&mytext%';\n```\n\n一旦有了 `SQL_ID`，就可以将其作为输入提供给 `DBMS_SQLTUNE.CREATE_TUNING_TASK`：\n\
    \n```\nDECLARE\n  tune_task VARCHAR2(30);\n  tune_sql  CLOB;\nBEGIN\n  tune_task\
    \ := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n    sql_id      => '98u3gf0xzq03f'\n  \
    \ ,task_name   => 'tune_test2'\n   ,description => 'Provide SQL ID'\n);\nEND;\n\
    /\n```\n\n### 给定一系列快照 ID 的 AWR 中的单个 SQL 语句\n\n以下是一个通过提供 `SQL_ID` 和一系列 AWR 快照 ID\
    \ 来创建 SQL 调优任务的示例：\n\n```\nDECLARE\n  tune_task VARCHAR2(30);\n  tune_sql  CLOB;\n\
    BEGIN\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n    sql_id      => '1tbu2jp7kv0pm'\n\
    \   ,begin_snap  => 21690\n   ,end_snap    => 21864\n   ,task_name   => 'tune_test3'\n\
    );\nEND;\n/\n```\n\n如果不确定使用哪个 `SQL_ID`（及相关查询），请运行此查询：\n\n```\nSQL> select sql_id,\
    \ sql_text from dba_hist_sqltext;\n```\n\n如果不知道可用的快照 ID，请运行此查询：\n\n```\nSQL> select\
    \ snap_id from dba_hist_snapshot order by 1;\n```\n\n![images](img/square.jpg)\
    \ 提示：默认情况下，AWR 只包含高资源消耗的查询。你可以通过以下方式将特定 SQL 语句添加到 AWR（无论其资源消耗如何），从而修改此行为以确保其包含在每个快照中：\n\
    \n```\nSQL> exec dbms_workload_repository.add_colored_sql('98u3gf0xzq03f');\n\
    ```\n\n### SQL 调优集名称\n\n如果需要针对多个 SQL 查询运行 SQL 调优顾问，则需要一个 SQL 调优集。要使用 SQL 调优集作为输入创建调优任务，请按如下方式操作：\n\
    \n```\nSQL> variable mytt varchar2(30);\nSQL> exec :mytt := DBMS_SQLTUNE.CREATE_TUNING_TASK(sqlset_name\
    \ => 'IO_STS');\nSQL> print :mytt\n```\n\n## 工作原理\n\n在手动执行 SQL 调优顾问之前，首先需要定义将哪些\
    \ SQL 语句用作输入。这是通过创建 SQL 调优任务来完成的。Oracle 在如何向调优任务添加 SQL 语句方面提供了极大的灵活性。如“解决方案”部分所示，你可以执行以下操作：\n\
    \n*   硬编码特定 SQL 查询的文本\n*   使用内存中的 SQL 查询\n*   使用 AWR 中的 SQL 查询\n*   在调优多个查询时定义\
    \ SQL 调优集\n\n上述技术提供了多种方法来识别将由 SQL 调优顾问分析的 SQL 语句。创建调优任务后，可以通过此查询查看其详细信息：\n\n```\n\
    select owner, task_name, advisor_name, created\nfrom dba_advisor_tasks\norder\
    \ by created;\n```\n\n创建调优任务后，现在可以手动执行 SQL 调优顾问（方案 11-17）。如果需要删除调优任务，可以按如下方式操作：\n\
    \n```\nSQL> exec dbms_sqltune.drop_tuning_task(task_name => '&&task_name');\n\
    ```\n\n### 11-17. 手动运行 SQL 调优顾问\n\n#### 问题\n\n你想要手动执行 SQL 调优顾问并获取针对某条 SQL 语句的调优建议。\n\
    \n#### 解决方案\n\n按照以下步骤手动运行 SQL 调优顾问：\n\n1.  创建一个调优任务（完整细节请参见方案 11-16）；这定义了哪些 SQL\
    \ 语句将被调优。这可以是单个 SQL 语句，也可以是 SQL 调优集中的多个 SQL 语句。\n2.  执行调优任务。\n3.  显示调优任务的结果。\n\
    \n此示例为单个 SQL 语句运行 SQL 调优顾问。首先创建一个调优任务。\n\n```\nDECLARE\n  tune_task VARCHAR2(30);\n\
    \  tune_sql  CLOB;\nBEGIN\n  tune_sql := 'select a.emp_id, b.dept_name ' ||\n\
    \              'from emp a, dept b ' ||\n              'where a.dept_id = b.dept_id';\n\
    \  --\n  tune_task := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n    sql_text    => tune_sql\n\
    \   ,user_name   => 'MV_MAINT'\n   ,scope       => 'COMPREHENSIVE'\n   ,time_limit\
    \  => 60\n   ,task_name   => 'tune_test'\n   ,description => 'Tune a SQL statement.'\n\
    );\nEND;\n/\n```\n\n接下来执行调优任务：\n\n```\nSQL> exec dbms_sqltune.execute_tuning_task(task_name\
    \ => 'tune_test');\n```\n\n最后，生成一份报告显示调优建议：\n\n```\nSQL> set long 10000 longchunksize\
    \ 10000\nSQL> set linesize 132 pagesize 200\nSQL> select dbms_sqltune.report_tuning_task('tune_test')\
    \ from dual;\n```\n\n以下是一些示例输出：\n\n```\n1- 统计信息查找\n---------------------\n  表\
    \ \"MV_MAINT\".\"DEPT\" 未被分析。\n  建议\n  --------------\n  - 考虑为此表收集优化器统计信息。\n....\n\
    2- 索引查找（参见下面的执行计划部分）\n--------------------------------------------------\n  通过创建一个或多个索引，可以改进此语句的执行计划。\n\
    \  建议（预计收益：97.98%）\n  ------------------------------------------\n  - 考虑运行访问顾问以改进物理模式设计，或创建推荐的索引。\n\
    \    create index MV_MAINT.IDX$$_21E10001 on MV_MAINT.EMP(\"DEPT_ID\");\n```\n\
    \n上述输出包含关于为查询中的表生成统计信息以及添加索引的具体建议。你需要在生产环境实施这些建议之前对其进行测试，以确保性能确实有所提升。\n\n### 优化器调优模式\n\
    \n优化器在两种不同的模式下运行：常规模式和调优模式。当执行 SQL 语句时，优化器运行在常规模式下，并快速确定一个合理的执行计划。在此模式下，优化器只花费几分之一秒的时间来尝试确定最佳计划。\n\
    \n当 SQL 调优顾问分析查询时，它让优化器运行在调优模式下。在此模式下，优化器可能花费几分钟来分析执行计划的每个步骤，并生成一个可能比常规模式下生成的计划效率高得多的执行计划。\n\
    \n这有点像计算机象棋游戏。如果你允许象棋软件每步只花一秒或更少的时间，很容易击败程序。然而，如果你允许象棋游戏每步花一分钟或更长时间，在此模式下，游戏会做出更优的决策。"
- fmt: '# 11-18. Getting SQL Tuning Advice from the Automatic Database Diagnostic
    Monitor


    ## How It Works


    The SQL Tuning Advisor helps automate the task of tuning poorly performing queries.
    The tool is fairly easy to use, and it provides suggestions on how to tune a query,
    such as the following:


    *   Rewriting the SQL

    *   Adding indexes

    *   Implementing a SQL profile or plan baselines

    *   Generating statistics


    You can also manually run the SQL Tuning Advisor from either SQL Developer or
    Enterprise Manager. Running the SQL Tuning Advisor from these tools is briefly
    described in the next two subsections.


    ### Running SQL Tuning Advisor from SQL Developer


    If you have access to SQL Developer 3.0 or higher, then it''s very easy to run
    the SQL Tuning Advisor for a query. Follow these simple steps:


    1.  Open a SQL worksheet.

    2.  Type in the query.

    3.  Click the button associated with the SQL Tuning Advisor.


    You will be presented with any findings and recommendations. If you have access
    to SQL Developer (it''s a free download), this is the easiest way to run the SQL
    Tuning Advisor.


    ![images](images/square.jpg) `Note` Before running SQL Tuning Advisor, ensure
    the user that you''re connected to has the `ADVISOR` system privilege granted
    to it.


    ### Running SQL Tuning Advisor from Enterprise Manager


    You can also run the advisor from within Enterprise Manager. Log into Enterprise
    Manager and follow these steps:


    1.  From the main database page, click the `Advisor Central` link (near the bottom).

    2.  Under the Advisors section, click the `SQL Advisors` link.

    3.  Click the `SQL Tuning Advisor` link.


    You should be presented with a page similar to the one shown in [Figure 11-3](#Chapter11.html#fig_11_3).


    ![images](images/1103.jpg)


    **Figure 11-3.** Scheduling SQL Tuning Advisor jobs from Enterprise Manager


    From here you can run a SQL Tuning Advisor tuning task on the top SQL statements
    or SQL in the AWR, or provide a SQL tuning set as input.


    ## Problem


    You want to get advice on problem SQL statements from the Automatic Database Diagnostic
    Monitor (ADDM).


    ## Solution


    You can view an ADDM report from the following tools:


    *   SQL*Plus script

    *   `DBMS_ADDM` package

    *   Enterprise Manager


    These techniques are elaborated on in the following subsections.


    ### SQL Approach


    You can run the ADDM report manually as shown:


    ```

    SQL> @?/rdbms/admin/addmrpt.sql

    ```


    You''ll be prompted to specify a beginning and ending snapshot. Here''s some sample
    output:


    ```

    Instance     DB Name        Snap Id    Snap Started    Level

    ------------ ------------ --------- ------------------ -----

    DWREP        DWREP            26482 09 Apr 2011 08:00      1

                                  26483 09 Apr 2011 09:00      1

                                  26484 09 Apr 2011 10:00      1

                                  26485 09 Apr 2011 11:00      1

                                  26486 09 Apr 2011 12:00      1


    Specify the Begin and End Snapshot Ids

    ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

    Enter value for begin_snap:

    ```


    You''ll then be prompted for a report name:


    ```

    The default report file name is addmrpt_1_26468_26486.txt. To use this name,

    press <return> to continue, otherwise enter an alternative.

    Enter value for report_name:

    ```


    After the report executes, you can inspect the output. There''s a Top SQL Statements
    section that reports on tuning recommendations for the top resource-consuming
    SQL statement. Here''s some sample output:


    ```

    Finding 1: Top SQL Statements

    Impact is .79 active sessions, 72.17% of total activity.

    --------------------------------------------------------

    SQL statements consuming significant database time were found. These

    statements offer a good opportunity for performance improvement.

       Recommendation 1: SQL Tuning

       Estimated benefit is .58 active sessions, 53.07% of total activity.

       -------------------------------------------------------------------

       Action

          Investigate the INSERT statement with SQL_ID "2nw0mmysuma43" for

          possible performance improvements. You can supplement the information

          given here with an ASH report for this SQL_ID.

          Related Object

             SQL statement with SQL_ID 2nw0mmysuma43.

             INSERT INTO bling

             ( registration_id,company

             ,soa_id,product_name

    ```


    ### DBMS_ADDM Package


    The `DBMS_ADDM` package is available with Oracle Database 11g R2 or higher. When
    using the `DBMS_ADDM` package, you must pass in a valid range of begin and end
    AWR snapshot IDs—for example:


    ```

    var task_name varchar2(30);

    exec DBMS_ADDM.ANALYZE_DB(:task_name, 8020, 8050);

    print :task_name

    ```


    Here is some sample output displaying the task name:


    ```

    TASK_NAME

    -------------------------------

    TASK_8676

    ```


    Query the `DBA_HIST_SNAPSHOT` view if you''re not sure of what snapshots are available.
    Next the ADDM report is displayed:


    ```

    SET LONG 1000000 PAGESIZE 0;

    SELECT DBMS_ADDM.GET_REPORT(''TASK_8676'') FROM DUAL;

    ```


    The output can be quite lengthy. Here is a small snippet recommending that you
    run the SQL Tuning Advisor for a specific SQL statement:


    ```

       Action

          Run SQL Tuning Advisor on the DELETE statement with SQL_ID

          "0s6gq1c890p4s".

          Related Object

             SQL statement with SQL_ID 0s6gq1c890p4s.

             delete from "MVS"."MGMT_DB_FEAT_USE_ECM_LATEST"

       Rationale

          The SQL spent 98% of its database time on CPU, I/O and Cluster waits.

          This part of database time may be improved by the SQL Tuning Advisor.

    ```


    ### Enterprise Manager


    First, log into Enterprise Manager. From the main login page, you can access the
    ADDM reports in Enterprise Manager as follows:


    1.  From the main database page, click the `Advisor Central` link (near the bottom).

    2.  Under the Advisors section, click the `ADDM` link.


    You should be presented with a page similar to the one shown in [Figure 11-4](#Chapter11.html#fig_11_4).


    ![images](images/1104.jpg)


    **Figure 11-4.** Running ADDM from Enterprise Manager


    From this page, you can run ADDM to analyze current performance or investigate
    past performance issues.


    ## How It Works


    The ADDM analyzes AWR snapshots every hour (by default) and produces performance
    recommendations. The suggestions are ranked by the expected benefit of implementing
    a recommendation. Listed next are the types of recommendations you can expect
    from ADDM:


    *   Expensive SQL statements

    *   Expensive PL/SQL

    *   RAC issues

    *   CPU bottlenecks

    *   Memory sizing recommendations

    *   Database configuration recommendations

    *   I/O bottlenecks


    If you are having database performance issues, the ADDM report is an excellent
    place to first look for bottlenecks and problem areas of the database. The ADDM
    also details top resource-consuming SQL statements and makes recommendations on
    how to tune these queries.'
  raw: '#### How It Works


    The SQL Tuning Advisor helps automate the task of tuning poorly performing queries.
    The tool is fairly easy to use, and it provides suggestions on how to tune a query,
    such as the following:


    *   Rewriting the SQL

    *   Adding indexes

    *   Implementing a SQL profile or plan baselines

    *   Generating statistics


    You can also manually run the SQL Tuning Advisor from either SQL Developer or
    Enterprise Manager. Running the SQL Tuning Advisor from these tools is briefly
    described in the next two subsections.


    ##### Running SQL Tuning Advisor from SQL Developer


    If you have access to SQL Developer 3.0 or higher, then it''s very easy to run
    the SQL Tuning Advisor for a query. Follow these simple steps:


    1.  Open a SQL worksheet.

    2.  Type in the query.

    3.  Click the button associated with the SQL Tuning Advisor.


    You will be presented with any findings and recommendations. If you have access
    to SQL Developer (it''s a free download), this is the easiest way to run the SQL
    Tuning Advisor.


    ![images](images/square.jpg) **Note** Before running SQL Tuning Advisor, ensure
    the user that you''re connected to has the `ADVISOR` system privilege granted
    to it.


    ##### Running SQL Tuning Advisor from Enterprise Manager


    You can also run the advisor from within Enterprise Manager. Log into Enterprise
    Manager and follow these steps:


    1.  From the main database page, click the Advisor Central link (near the bottom).

    2.  Under the Advisors section, click the SQL Advisors link.

    3.  Click the SQL Tuning Advisor link.


    You should be presented with a page similar to the one shown in [Figure 11-3](#Chapter11.html#fig_11_3).


    ![images](images/1103.jpg)


    ***Figure 11-3.** Scheduling SQL Tuning Advisor jobs from Enterprise Manager*


    From here you can run a SQL Tuning Advisor tuning task on the top SQL statements
    or SQL in the AWR, or provide a SQL tuning set as input.


    ### 11-18. Getting SQL Tuning Advice from the Automatic Database Diagnostic Monitor


    #### Problem


    You want to get advice on problem SQL statements from the Automatic Database Diagnostic
    Monitor (ADDM).


    #### Solution


    You can view an ADDM report from the following tools:


    *   SQL*Plus script

    *   `DBMS_ADDM` package

    *   Enterprise Manager


    These techniques are elaborated on in the following subsections.


    ##### SQL Approach


    You can run the ADDM report manually as shown:


    `SQL> @?/rdbms/admin/addmrpt.sql`


    You''ll be prompted to specify a beginning and ending snapshot. Here''s some sample
    output:


    `Instance     DB Name        Snap Id    Snap Started    Level`

    `------------ ------------ --------- ------------------ -----`

    `DWREP        DWREP            26482 09 Apr 2011 08:00      1`

    `                              26483 09 Apr 2011 09:00      1`

    `                              26484 09 Apr 2011 10:00      1`

    `                              26485 09 Apr 2011 11:00      1`

    `                              26486 09 Apr 2011 12:00      1`


    `Specify the Begin and End Snapshot Ids`

    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`

    `Enter value for begin_snap:`


    You''ll then be prompted for a report name:


    `The default report file name is addmrpt_1_26468_26486.txt. To use this name,`

    `press <return> to continue, otherwise enter an alternative.`

    `Enter value for report_name:`


    After the report executes, you can inspect the output. There''s a Top SQL Statements
    section that reports on tuning recommendations for the top resource-consuming
    SQL statement. Here''s some sample output:


    `Finding 1: Top SQL Statements`

    `Impact is .79 active sessions, 72.17% of total activity.`

    `--------------------------------------------------------`

    `SQL statements consuming significant database time were found. These`

    `statements offer a good opportunity for performance improvement.`

    `   Recommendation 1: SQL Tuning`

    `   Estimated benefit is .58 active sessions, 53.07% of total activity.`

    `   -------------------------------------------------------------------`

    `   Action`

    `      Investigate the INSERT statement with SQL_ID "2nw0mmysuma43" for`

    `      possible performance improvements. You can supplement the information`

    `      given here with an ASH report for this SQL_ID.`

    `      Related Object`

    `         SQL statement with SQL_ID 2nw0mmysuma43.`

    `         INSERT INTO bling`

    `         ( registration_id,company`

    `         ,soa_id,product_name`


    ##### DBMS_ADDM Package


    The `DBMS_ADDM` package is available with Oracle Database 11g R2 or higher. When
    using the `DBMS_ADDM` package, you must pass in a valid range of begin and end
    AWR snapshot IDs—for example:


    `var task_name varchar2(30);`

    `exec DBMS_ADDM.ANALYZE_DB(:task_name, 8020, 8050);`

    `print :task_name`


    Here is some sample output displaying the task name:


    `TASK_NAME`

    `-------------------------------`

    `TASK_8676`


    Query the `DBA_HIST_SNAPSHOT` view if you''re not sure of what snapshots are available.
    Next the ADDM report is displayed:


    `SET LONG 1000000 PAGESIZE 0;`

    `SELECT DBMS_ADDM.GET_REPORT(''TASK_8676'') FROM DUAL;`


    The output can be quite lengthy. Here is a small snippet recommending that you
    run the SQL Tuning Advisor for a specific SQL statement:


    `   Action`

    `      Run SQL Tuning Advisor on the DELETE statement with SQL_ID`

    `      "0s6gq1c890p4s".`

    `      Related Object`

    `         SQL statement with SQL_ID 0s6gq1c890p4s.`

    `         delete from "MVS"."MGMT_DB_FEAT_USE_ECM_LATEST"`

    `   Rationale`

    `      The SQL spent 98% of its database time on CPU, I/O and Cluster waits.`

    `      This part of database time may be improved by the SQL Tuning Advisor.`


    ##### Enterprise Manager


    First, log into Enterprise Manager. From the main login page, you can access the
    ADDM reports in Enterprise Manager as follows:


    1.  From the main database page, click the Advisor Central link (near the bottom).

    2.  Under the Advisors section, click the ADDM link.


    You should be presented with a page similar to the one shown in [Figure 11-4](#Chapter11.html#fig_11_4).


    ![images](images/1104.jpg)


    ***Figure 11-4.** Running ADDM from Enterprise Manager*


    From this page, you can run ADDM to analyze current performance or investigate
    past performance issues.


    #### How It Works


    The ADDM analyzes AWR snapshots every hour (by default) and produces performance
    recommendations. The suggestions are ranked by the expected benefit of implementing
    a recommendation. Listed next are the types of recommendations you can expect
    from ADDM:


    *   Expensive SQL statements

    *   Expensive PL/SQL

    *   RAC issues

    *   CPU bottlenecks

    *   Memory sizing recommendations

    *   Database configuration recommendations

    *   I/O bottlenecks


    If you are having database performance issues, the ADDM report is an excellent
    place to first look for bottlenecks and problem areas of the database. The ADDM
    also details top resource-consuming SQL statements and makes recommendations on
    how to tune these queries.


