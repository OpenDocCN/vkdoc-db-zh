    index. For example, if we want to get the names of all employees that received
    a commission, our query would look like this:


    `SELECT ename, comm FROM emp`

    `WHERE comm > 0;`


    `----------------------------------`

    `| Id  | Operation         | Name |`

    `----------------------------------`

    `|   0 | SELECT STATEMENT  |      |`

    `|   1 |  TABLE ACCESS FULL| EMP  |`

    `----------------------------------`


    As noted in the explain plan, no index is used. We happen to know there is a composite
    index on the `SAL` and `COMM` columns of our `EMP` table. We can add a hint to
    use this index to gain the benefit of having an index on the `COMM` column, even
    though it is not the leading column of the index:


    `SELECT /*+ index_ss(emp emp_i3) */ ename, comm FROM emp`

    `WHERE comm > 0;`


    `----------------------------------------------`

    `| Id  | Operation                   | Name   |`

    `----------------------------------------------`

    `|   0 | SELECT STATEMENT            |        |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| EMP    |`

    `|   2 |   INDEX SKIP SCAN           | EMP_I3 |`

    `----------------------------------------------`


    ![images](images/square.jpg) **Note** Hints influence the optimizer, but the optimizer
    may still choose to ignore any hints specified in the query.'
  trans: '## 解决方案


    您可以通过在查询中放置访问路径提示来更改 SQL 语句的访问路径。最常放置在查询中的两种访问路径提示是告诉 Oracle 优化器执行全表扫描或使用索引。通常，优化器在为查询选择最佳或至少合理的数据访问路径方面表现良好。但有时，由于表中数据的特定构成、对象的统计信息或特定数据库的配置，优化器不一定能做出最佳选择。在这些情况下，您可以通过在查询中放置提示来影响优化器。


    当您决定在查询中放置提示时，您应该已经知道优化器没有做出您想要的选择。假设您想在查询中放置一个提示，告诉优化器修改访问路径以执行全表扫描，或更改优化器访问表中数据的方式。如果您的查询将返回大量行，则全表扫描是合适的。例如，如果您想对您的表执行全表扫描，您的提示将如下所示：


    ```sql

    SELECT /*+ full(emp) */ empno, ename

    FROM emp

    WHERE DEPTNO = 20;

    ```


    上述提示指示优化器绕过对 `EMP` 表上任何可能索引的使用，而只是扫描整个表以检索查询所需的数据。


    反过来，假设您正在从 `EMP` 表中检索一个更小的数据子集，并且想要获取部门 20 中那些员工的平均工资。您可以告诉优化器在查询中使用给定表上的索引：


    ```sql

    SELECT /*+ index(emp emp_i2) */ avg(sal)

    FROM emp

    WHERE deptno = 20;

    ```


    ![images](img/square.jpg) 语法错误或不当的提示会被优化器忽略。


    ## 工作原理


    访问路径提示，像许多提示一样，被放置在您的查询中，因为您已经知道优化器将为您的查询采用何种访问路径，并且您相信使用您通过提示指定的方法会更有效。在您使用提示之前，非常重要的一点是验证您是否没有得到您期望的或认为应该得到的访问路径。您还可以通过分析有提示和无提示时优化器的查询成本来衡量潜在的性能提升。


    例如，您想将您的工资与公司内其他职位的工资进行比较，因此您编写了以下查询，以按职位获取最低、平均和最高工资。


    ```sql

    SELECT job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    ```

    -----------------------------------------------

    | Id  | Operation                    | Name   |

    -----------------------------------------------

    |   0 | SELECT STATEMENT             |        |

    |   1 |  HASH GROUP BY               |        |

    |   2 |   TABLE ACCESS BY INDEX ROWID| EMP    |

    |   3 |    INDEX RANGE SCAN          | EMP_I2 |

    -----------------------------------------------

    ```


    如果您想绕过查询中索引的使用，在查询中放置 `FULL` 提示将指示优化器绕过索引的使用：


    ```sql

    SELECT /*+ full(emp) */ job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    ```

    -----------------------------------

    | Id  | Operation         | Name  |

    -----------------------------------

    |   0 | SELECT STATEMENT  |       |

    |   1 |  HASH GROUP BY    |       |

    |   2 |   TABLE ACCESS FULL| EMP  |

    -----------------------------------

    ```


    另一种告诉优化器绕过索引使用的方法是告诉优化器不要使用索引来检索给定查询的数据。在这种特定情况下，它与 `FULL` 提示效果相同：


    ```sql

    SELECT /*+ no_index(emp) */ job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    您也可以明确指定您希望绕过的索引名称：


    ```sql

    SELECT /*+ no_index(emp emp_i2) */ job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    在上述两种情况下，结果都是全表扫描。在另一种情况下，您的查询可能可以使用不同的索引。例如，在我们的 `EMP` 表上，我们在 `DEPTNO` 列上有一个索引，在
    `HIREDATE` 列上也有一个索引。如果我们想执行一个查询来获取 1980 年入职的部门 20 的员工，我们的查询将如下所示：


    ```sql

    SELECT empno, ename

    FROM emp

    WHERE DEPTNO = 20

    AND hiredate

    BETWEEN to_date(''1980-01-01'',''yyyy-mm-dd'')

    AND to_date(''1980-12-31'',''yyyy-mm-dd'');

    ```


    ```

    ----------------------------------------------

    | Id  | Operation                   | Name   |

    ----------------------------------------------

    |   0 | SELECT STATEMENT            |        |

    |   1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

    |   2 |   INDEX RANGE SCAN          | EMP_I1 |

    ----------------------------------------------

    ```


    在这种情况下，优化器选择了 `EMP_I1` 索引，这是 `HIREDATE` 列上的索引。我们可以指示优化器绕过该索引的使用：


    ```sql

    SELECT /*+ no_index(emp emp_i1) */ job, min(sal), avg(sal), max(sal)

    FROM emp

    WHERE deptno=20

    GROUP BY job;

    ```


    在这种情况下，我们不一定知道优化器接下来会做什么。它可能会决定使用我们在 `DEPTNO` 列上的另一个索引，或者它可能选择执行全表扫描。在使用提示时，尽可能具体地指示优化器该做什么是一个好的实践。因此，如果我们放置一个索引提示来告诉优化器使用
    `DEPTNO` 列上的索引，我们可以看到优化器现在使用了该索引：


    ```sql

    SELECT /*+ index(emp emp_i2) */ empno, ename

    FROM emp

    WHERE DEPTNO = 20

    AND hiredate

    BETWEEN to_date(''1980-01-01'',''yyyy-mm-dd'')

    AND to_date(''1980-12-31'',''yyyy-mm-dd'');

    ```


    ```

    ----------------------------------------------

    | Id  | Operation                   | Name   |

    ----------------------------------------------

    | 0 | SELECT STATEMENT            |        |

    | 1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

    | 2 |   INDEX RANGE SCAN          | EMP_I2 |

    ----------------------------------------------

    ```


    索引提示的其他例子包括用于索引快速全扫描的 `INDEX_FFS` 和用于索引跳跃扫描的 `INDEX SS`。如果您有一个包含复合、多列索引的表，`INDEX_SS`
    提示是合适的。即使查询不使用索引的前导列，也可能让 Oracle 使用该索引。有时，即使 `WHERE` 子句中提到的列不是索引的前导列，`INDEX_SS`
    提示也可以有益于快速检索数据。例如，如果我们想获取所有获得佣金的员工的名字，我们的查询将如下所示：


    ```sql

    SELECT ename, comm FROM emp

    WHERE comm > 0;

    ```


    ```

    ----------------------------------

    | Id  | Operation        | Name  |

    ----------------------------------

    |   0 | SELECT STATEMENT |       |

    |   1 |  TABLE ACCESS FULL| EMP  |

    ----------------------------------

    ```


    如执行计划所示，没有使用索引。我们碰巧知道在我们的 `EMP` 表的 `SAL` 和 `COMM` 列上有一个复合索引。我们可以添加一个提示来使用此索引，以获得在
    `COMM` 列上拥有索引的好处，即使它不是索引的前导列：


    ```sql

    SELECT /*+ index_ss(emp emp_i3) */ ename, comm FROM emp

    WHERE comm > 0;

    ```


    ```

    ----------------------------------------------

    | Id  | Operation                   | Name   |

    ----------------------------------------------

    |   0 | SELECT STATEMENT            |        |

    |   1 |  TABLE ACCESS BY INDEX ROWID| EMP    |

    |   2 |   INDEX SKIP SCAN           | EMP_I3 |

    ----------------------------------------------

    ```


    ![images](img/square.jpg) 注意：提示会影响优化器，但优化器仍可能选择忽略查询中指定的任何提示。'
- fmt: '### 14-3. Changing the Join Order


    #### Problem


    You have a performance issue with a query where you are joining multiple tables,
    and the Oracle optimizer is not choosing the join order you desire.


    #### Solution


    There are two hints—the `ORDERED` hint, and the `LEADING` hint—that can be used
    to influence the join order used within a query.


    ##### Using the `ORDERED` Hint


    You are running a query to join two tables, `EMP` and `DEPT`, as you want to get
    the department names for each employee. By placing an `ORDERED` hint into the
    query, you can see how the hint alters the execution access path—for example:


    ```sql

    SELECT ename, deptno

    FROM emp JOIN dept USING(deptno);

    ```


    ```

    ---------------------------------------

    | Id  | Operation          | Name     |

    ---------------------------------------

    |   0 | SELECT STATEMENT   |          |

    |   1 |  HASH JOIN         |          |

    |   2 |   INDEX FULL SCAN  | PK_DEPT  |

    |   3 |   TABLE ACCESS FULL| EMP      |

    ---------------------------------------

    ```


    ```sql

    SELECT /*+ ordered */ ename, deptno

    FROM emp JOIN dept USING(deptno);

    ```


    ```

    ---------------------------------------

    | Id  | Operation          | Name     |

    ---------------------------------------

    |   0 | SELECT STATEMENT   |          |

    |   1 |  NESTED LOOPS      |          |

    |   2 |   TABLE ACCESS FULL| EMP      |

    |   3 |   INDEX UNIQUE SCAN| PK_DEPT  |

    ---------------------------------------

    ```


    ##### Using the `LEADING` Hint


    As with the example using the `ORDERED` hint, you have the same control to specify
    the join order of the query. The difference with the `LEADING` hint is that you
    specify the join order from within the hint itself, while with the `ORDERED` hint,
    it is specified in the `FROM` clause of the query. Here''s an example:


    ```sql

    SELECT /*+ leading(dept, emp) */ ename, deptno

    FROM emp JOIN dept USING(deptno);

    ```


    ```

    ---------------------------------------

    | Id  | Operation          | Name     |

    ---------------------------------------

    |   0 | SELECT STATEMENT   |          |

    |   1 |  NESTED LOOPS      |          |

    |   2 |   TABLE ACCESS FULL| EMP      |

    |   3 |   INDEX UNIQUE SCAN| PK_DEPT  |

    ---------------------------------------

    ```


    From the foregoing query, we can see that the table order specified in the `FROM`
    clause is irrelevant, as the order specified in the `LEADING` hint itself specifies
    the join order for the query.


    #### How It Works


    The main purpose of specifying either of these hints is for multi-table joins
    where the most optimal join order is known. This is usually known from past experience
    with a given query, based on the makeup of the data and the tables. In these cases,
    specifying either of these hints will save the optimizer the time of having to
    process all of the possible join orders in determining the optimal join order.
    This can improve query performance, especially as the number of tables to join
    within a query increases.


    When using either of these hints, you instruct the optimizer about the join order
    of the tables. Because of this, it is critically important that you know that
    the hint will improve the query''s performance. Oracle recommends, where possible,
    to use the `LEADING` hint over the `ORDERED` hint, as the `LEADING` hint has more
    versatility built in. When specifying the `ORDERED` hint, you specify the join
    order from the list of tables in the `FROM` clause, while with the `LEADING` hint,
    you specify the join order within the hint itself.


    ### 14-4. Changing the Join Method


    #### Problem


    You have a query where the optimizer is choosing a non-optimal join type for your
    query, and you wish to override the join type by placing the appropriate hint
    in the query.


    #### Solution


    There are three possible types of joins: nested loops, hash, and sort merge. Depending
    on the size of your tables, certain join types perform better than others. You
    can use hints to specify the join order that you prefer.


    ##### Nested Loops Join Hint


    To invoke a nested loops join, use the `USE_NL` hint, and place both tables needing
    the join within parentheses inside the `USE_NL` hint:


    ```sql

    SELECT /*+ use_nl(emp, dept)  */ ename, dname

    FROM emp JOIN dept USING (deptno);

    ```


    ```

    -----------------------------------------------

    | Id  | Operation                    | Name   |

    -----------------------------------------------

    |   0 | SELECT STATEMENT             |        |

    |   1 |  NESTED LOOPS                |        |

    |   2 |   NESTED LOOPS               |        |

    |   3 |    TABLE ACCESS FULL         | DEPT   |

    |   4 |    INDEX RANGE SCAN          | EMP_I2 |

    |   5 |   TABLE ACCESS BY INDEX ROWID| EMP    |

    -----------------------------------------------

    ```


    The nested loops join is usually best when joining small tables together. In a
    nested loops join, one table is considered the "driving" table. This is the outer
    table in the join. For each row in the outer, driving table, each row in the inner
    table is searched for matching rows. In the execution plan for the foregoing statement,
    the `EMP` table is the driving, outer table, and it is seen in the execution plan
    as the outermost part of the plan. The `DEPT` table is the inner table, and is
    shown as the innermost part of the execution plan.


    ##### Hash Join Hint


    To invoke a hash join, use the `USE_HASH` hint, and place both tables needing
    the join within parentheses inside the `USE_HASH` hint:


    ```sql

    SELECT /*+ use_hash(emp_all, dept)  */ ename, dname

    FROM emp_all JOIN dept USING (deptno);

    ```


    ```

    ----------------------------------------------

    | Id  | Operation          | Name    | Rows  |

    ----------------------------------------------

    |   0 | SELECT STATEMENT   |         |  1037K|

    |   1 |  HASH JOIN         |         |  1037K|

    |   2 |   TABLE ACCESS FULL| DEPT    |     4 |

    |   3 |   TABLE ACCESS FULL| EMP_ALL |  1037K|

    ----------------------------------------------

    ```


    For the optimizer to use a hash join, it must be an equijoin condition. Hash joins
    are best used when joining large amounts of data or where a large percentage of
    rows from a table is needed. The smaller of the two tables is used by the optimizer
    to build a hash table on the join key between the two tables. In the foregoing
    example, the `DEPT` table is the smaller table, and will be used to build the
    hash table. For best performance, the hash table completely resides in memory.


    ##### Sort Merge Join Hint


    To invoke a sort merge join, use the `USE_MERGE` hint, and place both tables needing
    the join within parentheses inside the `USE_MERGE` hint:


    ```sql

    SELECT /*+ use_merge(emp, dept)  */ ename, dname

    FROM emp JOIN dept USING (deptno)

    WHERE deptno != 20;

    ```


    ```

    ------------------------------------------------

    | Id  | Operation                    | Name    |

    ------------------------------------------------

    |   0 | SELECT STATEMENT             |         |

    |   1 |  MERGE JOIN                  |         |

    |   2 |   TABLE ACCESS BY INDEX ROWID| DEPT    |

    |   3 |    INDEX FULL SCAN           | PK_DEPT |

    |   4 |   SORT JOIN                  |         |

    |   5 |    TABLE ACCESS FULL         | EMP     |

    ------------------------------------------------

    ```


    Sort merge joins, like hash joins, are used to join a large volume of data. Unlike
    the hash join, the sort merge join is used when the join condition between the
    tables is not an equijoin. The hash join will generally perform better than the
    sort merge join, unless the data is already sorted on the two tables. During this
    operation, the input data from both tables is sorted on the join key, and then
    merged together.'
