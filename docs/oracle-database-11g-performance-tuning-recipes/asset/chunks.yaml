  trans: "\n## 执行统计\n\n`TKPROF` 会列出跟踪文件中每条 SQL 语句的执行统计信息。`TKPROF` 列出了 SQL 语句处理过程中三个步骤的执行统计：`解析`、`执行`\
    \ 和 `获取`。\n\n```\n调用   次数      CPU 时间   耗时      磁盘读    查询(一致模式)  查询(当前模式)  行数\n\
    ------- ------  -------- -------- ---------- ---------- ---------- ----------\n\
    Parse        1      0.01       0.03          0         64          0         \
    \ 0\nExecute      1      0.00       0.00          0          0          0    \
    \      0\nFetch     5461      0.29       0.40          0       1299          0\
    \      81901\n------- ------  -------- -------- ---------- ---------- ----------\
    \ ----------\ntotal     5463      0.31       0.43          0       1363      \
    \    0      81901\n```\n\n> 下表解释了 SQL 执行统计表中各项的含义：\n>\n> `count`：数据库解析、执行或获取此语句的次数\n\
    >\n> `cpu`：解析/执行/获取阶段所使用的 CPU 时间\n>\n> `elapsed`：解析/执行/获取阶段的总耗时（以秒为单位）\n>\n> `disk`：解析/执行/获取阶段的物理数据块读取次数\n\
    >\n> `query`：在一致模式下，通过逻辑读从缓冲区缓存中读取的数据块数量（针对 `select` 语句的解析/获取/执行阶段）\n>\n> `current`：在当前模式下，通过逻辑读从缓冲区缓存中读取和检索的数据块数量（针对\
    \ `insert`、`update`、`delete` 和 `merge` 语句）\n>\n> `rows`：对于 `select` 语句，表示获取的行数；对于\
    \ `insert`、`delete`、`update` 或 `merge` 语句，则分别表示插入、删除或更新的行数\n\n## 行源操作\n\n报告的下一部分显示了库缓存中的未命中次数、当前的优化器模式以及查询的行源操作。行源操作显示了数据库为每个操作（如连接或全表扫描）处理的行数。\n\
    \n```\n解析期间库缓存未命中次数：1\n优化器模式：ALL_ROWS\n解析用户 ID：85  (HR)\n\n行数   行源操作\n-------\
    \  ---------------------------------------------------\n  81901  HASH JOIN  (cr=1299\
    \ pr=0 pw=0 time=3682295 us cost=22 size=41029632 card=217088)\n   1728   TABLE\
    \ ACCESS FULL DEPT (cr=16 pr=0 pw=0 time=246 us cost=6 size=96768 card=1728)\n\
    \   1291   TABLE ACCESS FULL EMP (cr=1283 pr=0 pw=0 time=51213 us cost=14 size=455392\
    \ card=3424)\n```\n\n`解析期间库缓存未命中次数` 表示在解析和执行数据库调用期间的硬解析次数。在 `行源操作` 列中，输出包含了每个行源操作的若干统计信息。这些统计信息量化了行源操作期间执行的各种类型的工作。以下是不同统计信息的含义（并非每个查询都会显示所有信息）：\n\
    \n> `cr`：通过一致模式逻辑读取的数据块数\n>\n> `pr`：通过物理磁盘读取的数据块数\n>\n> `pw`：通过物理写入磁盘的数据块数\n>\n\
    > `time`：处理该操作花费的总时间（以毫秒为单位）\n>\n> `cost`：该操作的估计成本\n>\n> `size`：该操作返回的数据量估计值（字节）\n\
    >\n> `card`：该操作返回的行数估计值\n\n## 执行计划\n\n如果您在发出 `tkprof` 命令时指定了 `explain` 参数，您将看到一个执行表，显示每条\
    \ SQL 语句的执行计划。\n\n```\n行数   执行计划\n-------  ---------------------------------------\n\
    \      0  SELECT STATEMENT   MODE: ALL_ROWS\n  81901   HASH JOIN\n   1728    TABLE\
    \ ACCESS (FULL) OF 'DEPT' (TABLE)\n   1291    TABLE ACCESS (FULL) OF 'EMP' (TABLE)\n\
    ```\n\n在我们的示例中，执行计划显示有两次全表扫描，随后进行了一次哈希连接。\n\n## 等待事件\n\n只有在跟踪命令中指定了 `waits=>true`\
    \ 时，您才会看到等待事件部分。等待事件表总结了跟踪期间的等待情况：\n\n```\n耗时包括等待以下事件：\n  等待的事件              \
    \            等待次数  最大等待时间  总等待时间\n  ---------------------------------------- \
    \  -------  ----------  ------------\n    SQL*Net message from client        \
    \        5461     112.95        462.81\n    db file sequential read          \
    \            1       0.05          0.05\n```\n\n```\n********************************************************************************\n\
    ```\n\n在此示例中，`SQL*Net message to client` 等待占据了大部分等待，但这些属于空闲等待。如果您看到诸如 `db file\
    \ sequential read` 或 `db file scattered read` 之类的等待事件，并且等待次数（和/或总等待时间）显著，您需要进一步调查这些等待事件。\n\
    \n请注意，`TKPROF` 输出不会显示任何绑定变量的信息。它也不显示因队列锁而导致的任何等待。\n\n### 10-9. 使用 Oracle Trace\
    \ Analyzer 分析跟踪文件\n\n#### 问题\n\n您想使用 Oracle Trace Analyzer 来分析跟踪文件。\n"
- fmt: "# 10-10. Tracing a Parallel Query\n\n## Solution\n\nOracle Trace Analyzer，也称为\
    \ TRCANLZR 或 TRCA，是一个 SQL 跟踪分析工具，可作为 `TKPROF` 工具的替代方案。您必须从 Oracle Support 下载 TRCA。下载后，解压文件并通过执行\
    \ `/trca/install/trcreate.sql` 脚本来安装 TRCA。\n\n安装 TRCA 后，您必须以具有 SYSDBA 权限的用户登录来执行\
    \ `tacreate.sql` 脚本。`tacreate.sql` 会为任何已生成的跟踪文件生成格式化输出文件。该脚本会询问您有关跟踪文件位置、输出文件以及希望\
    \ TRCA 存储其数据的表空间等信息。\n\n以下是安装和运行 TRCA 的步骤。\n\n1.  安装 TRCA 非常简单，这里我们只展示安装摘要：\n\
    \    ```\n    SQL> @tacreate.sql\n    Uninstalling TRCA, please wait\n    TADOBJ\
    \ completed.\n    SQL>\n    SQL> WHENEVER SQLERROR EXIT SQL.SQLCODE;\n    SQL>\
    \ REM If this DROP USER command fails that means a session is connected with this\
    \ user.\n    SQL> DROP USER trcanlzr CASCADE;\n    SQL> WHENEVER SQLERROR CONTINUE;\n\
    \    SQL>\n    SQL> SET ECHO OFF;\n    TADUSR completed.\n    TADROP completed.\n\
    \n    Creating TRCA$ INPUT/BDUMP/STAGE Server Directories\n    ...\n\n    TACREATE\
    \ completed. Installation completed successfully.\n    SQL>\n    ```\n2.  设置跟踪。\n\
    \    ```\n    SQL> alter session set events '10046 trace name context forever,\
    \ level 12';\n\n    System altered.\n\n    SQL>\n    ```\n3.  执行要跟踪的 SQL 语句。\n\
    \    ```\n    SQL> select ...\n    ```\n4.  关闭跟踪。\n    ```\n    SQL> alter session\
    \ set events '10046 trace name context off';\n    System altered.\n\n    SQL>\n\
    \    ```\n5.  运行 `/trca/run/trcanlzr` 脚本（`START trcanlzr.sql`）来分析刚刚生成的跟踪文件。您必须将跟踪文件名作为输入传递给此脚本：\n\
    \    ```\n    c:\\trace\\trca\\trca\\run>sqlplus hr/hr\n    SQL> START trcanlzr.sql\
    \ orcl1_ora_7460_mytrace7.trc\n    Parameter 1:\n    Trace Filename or control_file.txt\
    \ (required)\n    Value passed to trcanlzr.sql:\n    ~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\
    \    TRACE_FILENAME: orcl1_ora_7460_mytrace7.trc\n    Analyzing orcl1_ora_7460_mytrace7.trc\n\
    \    ... analyzing trace(s) ...\n    Trace Analyzer completed.\n    Review first\
    \ trcanlzr_error.log file for possible fatal errors.\n    TKPROF: Release 11.2.0.1.0\
    \ - Development on Sat May 14 15:59:13 2011\n      …\n       233387  05/14/2011\
    \ 15:59   trca_e21106.html\n       115885  05/14/2011 15:59   trca_e21106.txt\n\
    \    File trca_e21106.zip has been created\n    TRCANLZR completed.\n    SQL>\n\
    \    c:\\trace\\trca\\trca\\run>\n    ```\n\n现在，您可以在文本或 HTML 格式中查看分析后的跟踪数据——TRCA\
    \ 在完成跟踪文件分析后创建的 ZIP 文件中提供了这两种格式。TRCA 将 ZIP 文件放在运行 `/trca/run/trcanlzr.sql` 脚本的目录中。\n\
    \n## How It Works\n\nOracle Support Center of Expertise (CoE) 提供了 TRCA 诊断工具。虽然许多\
    \ DBA 知道 TRCA，但很少有人定期使用它。我们中的一些人只是在 Oracle Support 要求时才使用它。正如您在“解决方案”部分学到的，TRCA\
    \ 工具接受您生成的 SQL 跟踪，并以文本和 HTML 格式输出诊断报告。TRCA 工具还为您提供 `TKPROF` 报告（它在诊断数据收集中执行 `tkprof`\
    \ 命令）。由于 TRCA 提供了丰富的诊断信息，请考虑使用它来代替 `TKPROF`。\n\n除了 `TKPROF` 工具通常收集的数据外，TRCA 还会识别昂贵的\
    \ SQL 语句并收集它们的执行计划。它还显示优化器统计信息和配置参数，这些参数对跟踪中 SQL 语句的性能有影响。\n\n![images](images/square.jpg)\
    \ **提示** 使用 TRCA 而不是 `TKPROF` 来分析您的跟踪文件——它不仅为您提供丰富的诊断信息，还附带赠送一个 `TKPROF` 输出文件。\n\
    \n在我们的示例中，我们在生成跟踪的同一系统上使用 TRCA 来格式化跟踪文件。但是，如果您无法在生产系统上安装 TRCA，不用担心。TRCA 也可以使用不同的系统分析生产环境中的跟踪。详细信息在\
    \ `trca_instructions` HTML 文档中，该文档是 TRCA 下载 ZIP 文件的一部分。\n\n以下是 TRCA 报告的主要部分，正如您已经看到的，该报告提供了比\
    \ `TKPROF` 更丰富的诊断信息。\n\n> *摘要*：提供 elapsed time、分解为 CPU 和非空闲等待时间的 response time\
    \ 以及其他与 response time 相关的信息的细分。\n>\n> *非递归时间和总计*：提供解析、执行和获取步骤期间的 response time\
    \ 和 elapsed time 的细分；报告还包含一个表，提供每个空闲和非空闲等待事件的总计和平均等待时间。\n>\n> *Top SQL*：提供有关占用最多\
    \ response time、elapsed time 和 CPU time 的 SQL 语句的详细信息，如下方报告摘录所示：\n> ```\n> There\
    \ are 2 SQL statements with \"Response Time Accounted-for\" larger than threshold\
    \ of 10.0% of the \"Total Response Time Accounted-for\"\n> These combined 2 SQL\
    \ statements are responsible for a total of 99.3% of the \"Total Response Time\
    \ Accounted-for\".\n>\n> There are 3 SQL statements with \"Elapsed Time\" larger\
    \ than threshold of 10.0% of the \"Total Elapsed Time\".\n> These combined 3 SQL\
    \ statements are responsible for a total of 75.5% of the \"Total Elapsed Time\"\
    .\n>\n> There is only one SQL statement with \"CPU Time\" larger than threshold\
    \ of 10.0% of the \"Total CPU Time\".\n> ```\n> *单个 SQL*：这是一个非常有用的部分，它列出了所有 SQL\
    \ 语句并显示了它们的 elapsed time、response time 和 CPU time。它提供了每条语句的哈希值和 SQL ID。\n>\n>\
    \ *SQL 自身时间、总计、等待、绑定和行源计划*：显示每条语句的解析、执行和获取统计信息，类似于 `TKPROF` 工具；它还显示了每条语句的等待事件细分（平均和总时间）。每条语句还有一个非常好的执行计划，显示了每个执行步骤的时间和成本。\n\
    >\n> *表和索引*：显示行数、分区状态、样本大小以及对象上次分析的时间；对于索引，它还额外显示聚簇因子和键数。\n>\n> *摘要*：显示与 I/O 相关的等待（例如\
    \ db file sequential read 事件）信息，包括表的平均和总等待时间。\n>\n> *热 I/O 块*：显示等待时间最长或等待次数最多的块列表。\n\
    >\n> *非默认初始化参数*：列出所有非默认初始化参数。\n\n正如对 TRCA 的简要回顾所示，它是一个比 `TKPROF` 优越得多的工具。此外，如果您碰巧喜欢\
    \ `TKPROF` 报告，它的 ZIP 文件中也包含了这些报告。那么，您还在等什么？下载 TRCA 并利用它对问题 SQL 语句的丰富诊断分析能力吧。\n\
    \n## Problem\n\n您希望跟踪一个并行查询。"
  raw: "#### Solution\n\nThe Oracle Trace Analyzer, also known as TRCANLZR or TRCA,\
    \ is a SQL trace profiling tool that's an alternative to the `TKPROF` utility.\
    \ You must download the TRCA from Oracle Support. Once you download TRCA, unzip\
    \ the files and install TRCA by executing the `/trca/install/trcreate.sql` script.\n\
    \nOnce you install TRCA, you must log in as a user with the SYSDBA privilege to\
    \ execute the `tacreate.sql` script. The `tacreate.sql` generates the formatted\
    \ output files for any traces you've generated. The script asks you for information\
    \ relating to the location of the trace files, the output file, and the tablespace\
    \ where you want TRCA to store its data.\n\nHere are the steps for installing\
    \ and running TRCA.\n\n1.  Installing TRCA is straightforward, so we just show\
    \ you a summary of the installation here: `SQL> @tacreate.sql`\n    `Uninstalling\
    \ TRCA, please wait`\n    `TADOBJ completed.`\n    `SQL>`\n    `SQL> WHENEVER\
    \ SQLERROR EXIT SQL.SQLCODE;`\n    `SQL> REM If this DROP USER command fails that\
    \ means a session is connected wi`\n    `this user.`\n    `SQL> DROP USER trcanlzr\
    \ CASCADE;`\n    `SQL> WHENEVER SQLERROR CONTINUE;`\n    `SQL>`\n    `SQL> SET\
    \ ECHO OFF;`\n    `TADUSR completed.`\n    `TADROP completed.`\n\n    `Creating\
    \ TRCA$ INPUT/BDUMP/STAGE Server Directories`\n    `...`\n\n    `TACREATE completed.\
    \ Installation completed successfully.`\n    `SQL>`\n2.  Set up tracing. `SQL>\
    \ alter session set events '10046 trace name context forever, level 12';`\n\n\
    \    `System altered.`\n\n    `SQL>`\n3.  Execute the SQL statement you want to\
    \ trace. `SQL> select ...`\n4.  Turn off tracing. `SQL> alter session set events\
    \ '10046 trace name context off';`\n    `System altered.`\n\n    `SQL>`\n5.  Run\
    \ the `/trca/run/trcanlzr` script (`START trcanlzr.sql`) to profile the trace\
    \ you've just generated. You must pass the trace file name as input to this script:\
    \ `c:\\trace\\trca\\trca\\run>sqlplus hr/hr`\n    `SQL> START trcanlzr.sql orcl1_ora_7460_mytrace7.trc`\n\
    \    `Parameter 1:`\n    `Trace Filename or control_file.txt (required)`\n   \
    \ `Value passed to trcanlzr.sql:`\n    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~`\n    `TRACE_FILENAME:\
    \ orcl1_ora_7460_mytrace7.trc`\n    `Analyzing orcl1_ora_7460_mytrace7.trc`\n\
    \    `... analyzing trace(s) ...`\n    `Trace Analyzer completed.`\n    `Review\
    \ first trcanlzr_error.log file for possible fatal errors.`\n    `TKPROF: Release\
    \ 11.2.0.1.0 - Development on Sat May 14 15:59:13 2011`\n    `  …`\n    `   233387  05/14/2011\
    \ 15:59   trca_e21106.html`\n    `   115885  05/14/2011 15:59   trca_e21106.txt`\n\
    \    `File trca_e21106.zip has been created`\n    `TRCANLZR completed.`\n    `SQL>`\n\
    \    `c:\\trace\\trca\\trca\\run>`\n\nYou can now view the profiled trace data\
    \ in text or HTML format—TRCA provides both of these in the ZIP file that it creates\
    \ when it completes profiling the trace file. TRCA places the ZIP file in the\
    \ directory from which you run the `/trca/run/trcanlzr.sql` script.\n\n#### How\
    \ It Works\n\nOracle Support Center of Expertise (CoE) provides the TRCA diagnostic\
    \ tool. Although many DBAs are aware of the TRCA, few use it on regular basis.\
    \ Some of us have used it in response to a request by Oracle Support. As you learned\
    \ in the “Solution” section, the TRCA tool accepts a SQL trace generated by you\
    \ and outputs a diagnostic report in both text and HTML formats. The TRCA tool\
    \ also provides you a `TKPROF` report (it executes the `tkprof` command as part\
    \ of its diagnostic data collection). Since TRCA provides a rich set of diagnostic\
    \ information, consider using it instead of `TKPROF`.\n\nApart from the data normally\
    \ collected by the `TKPROF` utility, TRCA also identifies expensive SQL statements\
    \ and gathers their explain plans. It also shows the  optimizer statistics and\
    \ configuration parameters that have a bearing on the  performance of the SQL\
    \ statements in the trace.\n\n![images](images/square.jpg) **Tip** Use TRCA instead\
    \ of `TKPROF` for analyzing your trace files—it provides you a wealth of diagnostic\
    \ information, besides giving you a `TKPROF` output file as part of the bargain.\n\
    \nIn our example, we used TRCA to format a trace file on the same system where\
    \ we generated the trace. However, if you can't install TRCA in a production system,\
    \ not to worry. TRCA can also analyze production traces using a different system.\
    \ The details are in the `trca_instructions` HTML document, which is part of the\
    \ TRCA download ZIP file.\n\nHere are the major sections of a TRCA report, and\
    \ as you can see already, the report offers a richer set of  diagnostic information\
    \ than that offered by `TKPROF`.\n\n> *Summary*: Provides a breakdown of elapsed\
    \ time, response time broken down into CPU and non-idle wait time, and other response\
    \ time-related information\n> \n> *Non-Recursive Time and Totals*: Provides a\
    \ breakdown of response time and elapsed time during the parse, execute, and fetch\
    \ steps; the report also contains a table that provides total and average waits\
    \ for each idle and non-idle wait event.\n> \n> *Top SQL*: Provides detailed information\
    \ about SQL statements that account for the most response time, elapsed time,\
    \ and CPU time, as shown in the following extract from the report:\n> \n> `There\
    \ are 2 SQL statements with \"Response Time Accounted-for\" larger than threshold\
    \ of 10.0% of the \"Total Response Time Accounted-for\"`\n> `These combined 2\
    \ SQL statements are responsible for a total of 99.3% of the \"Total Response\
    \ Time Accounted-for\".`\n> \n> `There are 3 SQL statements with \"Elapsed Time\"\
    \ larger than threshold of 10.0% of the \"Total Elapsed Time\".`\n> `These combined\
    \ 3 SQL statements are responsible for a total of 75.5% of the \"Total Elapsed\
    \ Time\".`\n> \n> `There is only one SQL statement with \"CPU Time\" larger than\
    \ threshold of 10.0% of the \"Total CPU Time\".`\n> \n> *Individual SQL*: This\
    \ is a highly useful section, as it lists all SQL statements and shows their elapsed\
    \ time, response time, and CPU time. It provides the hash values and SQL IDs of\
    \ each statement.\n> \n> *SQL Self - Time, Totals, Waits, Binds and Row Source\
    \ Plan*: Shows parse, execute, and fetch statistics for each statement, similar\
    \ to the `TKPROF` utility; it also shows the wait event breakdown (average and\
    \ total times) for each statement. There's also a very nice explain plan for each\
    \ statement, which shows the time and the cost of each execution step.\n> \n>\
    \ *Tables and Indexes*: Shows the number of rows, partitioning status, the sample\
    \ size, and the last time the object was analyzed; for indexes, it additionally\
    \ shows the clustering factor and the number of keys.\n> \n> *Summary*: Shows\
    \ I/O related wait (such as the db file sequential read event) information including\
    \ average and total waits, for tables and indexes\n> \n> *Hot I/O Blocks*: Shows\
    \ the list of blocks with the largest wait time or times waited\n> \n> *Non-default\
    \ Initialization Parameters*: Lists all non-default initialization parameters\n\
    \nAs this brief review of TRCA shows, it's a far superior tool than `TKPROF`.\
    \ Besides, if you happen to love `TKPROF` reports, it includes them as well in\
    \ its ZIP file. So, what are you waiting for? Download the TRCA and benefit from\
    \ its rich diagnostic profiling of problem SQL statements.\n\n### 10-10\\. Tracing\
    \ a Parallel Query\n\n#### Problem\n\nYou'd like to trace a parallel query."
  trans: "# 10-10. 追踪并行查询\n\n## 解决方案\n\nOracle Trace Analyzer，也称为 TRCANLZR 或 TRCA，是一个\
    \ SQL 跟踪分析工具，可作为 `TKPROF` 工具的替代方案。您必须从 Oracle Support 下载 TRCA。下载后，解压文件并通过执行 `/trca/install/trcreate.sql`\
    \ 脚本来安装 TRCA。\n\n安装 TRCA 后，您必须以具有 SYSDBA 权限的用户登录来执行 `tacreate.sql` 脚本。`tacreate.sql`\
    \ 会为任何已生成的跟踪文件生成格式化输出文件。该脚本会询问您有关跟踪文件位置、输出文件以及希望 TRCA 存储其数据的表空间等信息。\n\n以下是安装和运行\
    \ TRCA 的步骤。\n\n1.  安装 TRCA 非常简单，这里我们只展示安装摘要：\n    ```\n    SQL> @tacreate.sql\n\
    \    Uninstalling TRCA, please wait\n    TADOBJ completed.\n    SQL>\n    SQL>\
    \ WHENEVER SQLERROR EXIT SQL.SQLCODE;\n    SQL> REM If this DROP USER command\
    \ fails that means a session is connected with this user.\n    SQL> DROP USER\
    \ trcanlzr CASCADE;\n    SQL> WHENEVER SQLERROR CONTINUE;\n    SQL>\n    SQL>\
    \ SET ECHO OFF;\n    TADUSR completed.\n    TADROP completed.\n\n    Creating\
    \ TRCA$ INPUT/BDUMP/STAGE Server Directories\n    ...\n\n    TACREATE completed.\
    \ Installation completed successfully.\n    SQL>\n    ```\n2.  设置跟踪。\n    ```\n\
    \    SQL> alter session set events '10046 trace name context forever, level 12';\n\
    \n    System altered.\n\n    SQL>\n    ```\n3.  执行要跟踪的 SQL 语句。\n    ```\n    SQL>\
    \ select ...\n    ```\n4.  关闭跟踪。\n    ```\n    SQL> alter session set events '10046\
    \ trace name context off';\n    System altered.\n\n    SQL>\n    ```\n5.  运行 `/trca/run/trcanlzr`\
    \ 脚本（`START trcanlzr.sql`）来分析刚刚生成的跟踪文件。您必须将跟踪文件名作为输入传递给此脚本：\n    ```\n    c:\\\
    trace\\trca\\trca\\run>sqlplus hr/hr\n    SQL> START trcanlzr.sql orcl1_ora_7460_mytrace7.trc\n\
    \    Parameter 1:\n    Trace Filename or control_file.txt (required)\n    Value\
    \ passed to trcanlzr.sql:\n    ~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n    TRACE_FILENAME:\
    \ orcl1_ora_7460_mytrace7.trc\n    Analyzing orcl1_ora_7460_mytrace7.trc\n   \
    \ ... analyzing trace(s) ...\n    Trace Analyzer completed.\n    Review first\
    \ trcanlzr_error.log file for possible fatal errors.\n    TKPROF: Release 11.2.0.1.0\
    \ - Development on Sat May 14 15:59:13 2011\n      …\n       233387  05/14/2011\
    \ 15:59   trca_e21106.html\n       115885  05/14/2011 15:59   trca_e21106.txt\n\
    \    File trca_e21106.zip has been created\n    TRCANLZR completed.\n    SQL>\n\
    \    c:\\trace\\trca\\trca\\run>\n    ```\n\n现在，您可以在文本或 HTML 格式中查看分析后的跟踪数据——TRCA\
    \ 在完成跟踪文件分析后创建的 ZIP 文件中提供了这两种格式。TRCA 将 ZIP 文件放在运行 `/trca/run/trcanlzr.sql` 脚本的目录中。\n\
    \n## 工作原理\n\nOracle Support Center of Expertise (CoE) 提供了 TRCA 诊断工具。虽然许多 DBA 知道\
    \ TRCA，但很少有人定期使用它。我们中的一些人只是在 Oracle Support 要求时才使用它。正如您在“解决方案”部分学到的，TRCA 工具接受您生成的\
    \ SQL 跟踪，并以文本和 HTML 格式输出诊断报告。TRCA 工具还为您提供 `TKPROF` 报告（它在诊断数据收集中执行 `tkprof` 命令）。由于\
    \ TRCA 提供了丰富的诊断信息，请考虑使用它来代替 `TKPROF`。\n\n除了 `TKPROF` 工具通常收集的数据外，TRCA 还会识别昂贵的 SQL\
    \ 语句并收集它们的执行计划。它还显示优化器统计信息和配置参数，这些参数对跟踪中 SQL 语句的性能有影响。\n\n![images](img/square.jpg)\
    \ **提示** 使用 TRCA 而不是 `TKPROF` 来分析您的跟踪文件——它不仅为您提供丰富的诊断信息，还附带赠送一个 `TKPROF` 输出文件。\n\
    \n在我们的示例中，我们在生成跟踪的同一系统上使用 TRCA 来格式化跟踪文件。但是，如果您无法在生产系统上安装 TRCA，不用担心。TRCA 也可以使用不同的系统分析生产环境中的跟踪。详细信息在\
    \ `trca_instructions` HTML 文档中，该文档是 TRCA 下载 ZIP 文件的一部分。\n\n以下是 TRCA 报告的主要部分，正如您已经看到的，该报告提供了比\
    \ `TKPROF` 更丰富的诊断信息。\n\n> *摘要*：提供耗时、分解为 CPU 和非空闲等待时间的响应时间以及其他与响应时间相关的信息的细分。\n\
    >\n> *非递归时间和总计*：提供解析、执行和获取步骤期间的响应时间和耗时的细分；报告还包含一个表，提供每个空闲和非空闲等待事件的总计和平均等待时间。\n\
    >\n> *Top SQL*：提供有关占用最多响应时间、耗时和 CPU 时间的 SQL 语句的详细信息，如下方报告摘录所示：\n> ```\n> There\
    \ are 2 SQL statements with \"Response Time Accounted-for\" larger than threshold\
    \ of 10.0% of the \"Total Response Time Accounted-for\"\n> These combined 2 SQL\
    \ statements are responsible for a total of 99.3% of the \"Total Response Time\
    \ Accounted-for\".\n>\n> There are 3 SQL statements with \"Elapsed Time\" larger\
    \ than threshold of 10.0% of the \"Total Elapsed Time\".\n> These combined 3 SQL\
    \ statements are responsible for a total of 75.5% of the \"Total Elapsed Time\"\
    .\n>\n> There is only one SQL statement with \"CPU Time\" larger than threshold\
    \ of 10.0% of the \"Total CPU Time\".\n> ```\n> *单个 SQL*：这是一个非常有用的部分，它列出了所有 SQL\
    \ 语句并显示了它们的耗时、响应时间和 CPU 时间。它提供了每条语句的哈希值和 SQL ID。\n>\n> *SQL 自身时间、总计、等待、绑定和行源计划*：显示每条语句的解析、执行和获取统计信息，类似于\
    \ `TKPROF` 工具；它还显示了每条语句的等待事件细分（平均和总时间）。每条语句还有一个非常好的执行计划，显示了每个执行步骤的时间和成本。\n>\n\
    > *表和索引*：显示行数、分区状态、样本大小以及对象上次分析的时间；对于索引，它还额外显示聚簇因子和键数。\n>\n> *摘要*：显示与 I/O 相关的等待（例如\
    \ db file sequential read 事件）信息，包括表的平均和总等待时间。\n>\n> *热 I/O 块*：显示等待时间最长或等待次数最多的块列表。\n\
    >\n> *非默认初始化参数*：列出所有非默认初始化参数。\n\n正如对 TRCA 的简要回顾所示，它是一个比 `TKPROF` 优越得多的工具。此外，如果您碰巧喜欢\
    \ `TKPROF` 报告，它的 ZIP 文件中也包含了这些报告。那么，您还在等什么？下载 TRCA 并利用它对问题 SQL 语句的丰富诊断分析能力吧。\n\
    \n## 问题\n\n您希望追踪一个并行查询。"
- fmt: "#### Solution\n\nYou can get an event 10046 trace for a parallel query in\
    \ the same way as you would for any other query. The only difference is that the\
    \ 10046 event will generate as many trace files as the number of parallel query\
    \ servers. Here's an example:\n\n```sql\nSQL> alter session set tracefile_identifier='MyTrace1';\n\
    \nSQL> alter session set events '10046 trace name context forever, level 12';\n\
    \nSession altered.\n\nSQL> select /*+ full(sales) parallel (sales 6) */ count(quantity_sold)\
    \ from\n     sales;\n\nCOUNT(QUANTITY_SOLD)\n--------------------\n          \
    \    918843\n\nSQL> alter session set events '10046 trace name context off';\n\
    \nSession altered.\n\nSQL>\n```\n\nYou'll now see a total of seven trace files\
    \ with the trace file identifier `MyTrace1` in the trace directory. Depending\
    \ on what you're looking for, you can analyze each of the trace files separately,\
    \ or consolidate them into one big trace file with the `trcsess` utility before\
    \ analyzing it with `TKPROF` or another profiler such as the Oracle Trace Analyzer.\
    \ You'll also find several files with the suffix `.trm` in the trace directory—you\
    \ can ignore these files, as they are for use by the database.\n\n#### How It\
    \ Works\n\nThe only real difference between getting an extended trace for a single\
    \ query and one for a parallel query is that you'll have multiple trace files,\
    \ one for each parallel query server. When a user executes a parallel query, Oracle\
    \ creates multiple parallel query processes to process the query, with each process\
    \ getting its own session. That's the reason Oracle creates multiple trace files\
    \ for a parallel query.\n\nOnce you turn off the trace, go to the trace directory\
    \ and execute the following command to find all the trace files for the parallel\
    \ query:\n\n```bash\n$ find . -name '*MyTrace1*'\n```\n\nThe `find` command lists\
    \ all the trace files for your parallel query (ignore the files ending with `.trm`\
    \ in the trace directory). You can move the trace files to another directory and\
    \ use the `trcsess` utility to consolidate those files, as shown here:\n\n```bash\n\
    $ trcsess output=MyTrace1.trc clientid='px_test1' orcl1_ora_8432_mytrace1.trc\
    \ orcl1_ora_8432_mytrace2.trc\n```\n\nYou're now ready to use the `TKPROF` utility\
    \ to profile the parallel query.\n\nWhen you issue a parallel query, the parallel\
    \ execution coordinator/query coordinator (`QC`) controls the execution of the\
    \ query. The parallel execution servers/slaves (`QS`) do the actual work. The\
    \ parallel execution server *set* is the set of all the query servers that execute\
    \ an operation. The query coordinator and each of the execution servers generate\
    \ their own trace files. For example, if one of the slave processes waits for\
    \ a resource, the database records the resulting wait events in that slave process's\
    \ trace file, but not in the query coordinator's trace file.\n\nNote that if you're\
    \ using a 10.2 or an older release, the trace files for the user process will\
    \ be created in the user dump directory and the background processes (slaves)\
    \ will generate trace files in the background dump directory. In 11.1 and newer\
    \ databases, the trace files for both background and user processes are in the\
    \ same directory (trace). You can find the trace file names by issuing the `show\
    \ tracefile -t` command after invoking `ADRCI`, or by querying the `V$DIAG_INFO`\
    \ view from SQL*Plus.\n\n### 10-11. Tracing Specific Parallel Query Processes\n\
    \n#### Problem\n\nYou want to trace one or more specific parallel query processes.\n\
    \n#### Solution\n\nIdentify the parallel query processes you want to trace with\
    \ the following command.\n\n```sql\nSQL> select inst_id,p.server_name,\n     p.status\
    \ as p_status,\n     p.pid as p_pid,\n     p.sid as p_sid\n     from  gv$px_process\
    \ p\n     order by p.server_name;\n```\n\nLet's say you decide to trace the processes\
    \ `p002` and `p003`. Issue the following `alter system set events` command to\
    \ trace just these two parallel processes.\n\n```sql\nSQL> alter system set events\
    \ 'sql_trace  {process: pname = p002 | p003}';\n```\n\nOnce you're done tracing,\
    \ turn off the trace by issuing the following command:\n\n```sql\nSQL> alter system\
    \ set events 'sql_trace  {process: pname = p002 | p003} off';\n```\n\n#### How\
    \ It Works\n\nTracing parallel processes is always tricky. One of the improvements\
    \ made to the tracing infrastructure in the Oracle Database 11g release is the\
    \ capability to trace a specific statement or a set of statements. This capability\
    \ comes in handy when there are a large number of SQL statements being executed\
    \ by a session and you're sure about the identity of the SQL statement whose execution\
    \ you want to trace.\n\n### 10-12. Tracing Parallel Queries in a RAC System\n\n\
    #### Problem\n\nYou're tracing a parallel query in a RAC environment, but aren't\
    \ sure in which instance the trace files are located.\n\n#### Solution\n\nFinding\
    \ the trace files for the server (or thread or slave) processes is sometimes difficult\
    \ in a RAC environment, because you aren't sure on which node or node(s) the database\
    \ has created the trace files. Here are the steps to follow to make it easier\
    \ to find the trace files on the different nodes.\n\n> 1.  Set the `px_trace`\
    \ with an `alter session` command, to help identify the trace files, as shown\
    \ here:\n>     ```sql\n>     SQL> alter session set tracefile_identifier='10046';\n\
    >     SQL> alter session set  \"_px_trace\" = low , messaging;\n>     SQL> alter\
    \ session set events '10046 trace name context forever,level 12';\n>     ```\n\
    > 2.  Execute your parallel query.\n>     ```sql\n>     SQL> alter table bigsales\
    \ (parallel 4);\n>     SQL> select count(*) from bigsales;\n>     ```\n> 3.  Turn\
    \ all tracing off.\n>     ```sql\n>     SQL> alter session set events '10046 trace\
    \ name context off';\n>     SQL> alter session set \"_px_trace\" = none;\n>  \
    \   ```\n\nSpecifying `px_trace` will cause the query coordinator's trace file\
    \ to include information about the slave processes that are part of the query,\
    \ and the instance each slave process belongs to. You can then retrieve the trace\
    \ files from the instances listed in the query coordinator's trace file.\n\n####\
    \ How It Works\n\nThe `_px_trace` (px trace) parameter is an undocumented, internal\
    \ Oracle parameter that has existed since the 9.2 release. Once you run the trace\
    \ commands as shown in the \"Solution\" section of this recipe, the trace file\
    \ for the query coordinator (`QC`) process will show within it the name of each\
    \ of the slave processes and the instances the processes have run on—for example:\n\
    \n```\nAcquired 4 slaves on 1 instances avg height=4 in 1 set q serial:2049\n\
    \        P000 inst 1 spid 7512\n        P001 inst 1 spid 4088\n        P002 inst\
    \ 1 spid 7340\n        P003 inst 1 spid 9256\n```\n\nIn this case, you know that\
    \ Instance 1 is where you must look to get the trace files for the slave processes\
    \ `P000`, `P001`, `P002`, and `P003`. On Instance 1, in the ADR trace subdirectory,\
    \ look for file names that contain the words `P000` (or `P001`/`P002`/`P003`),\
    \ to identify the correct trace files.\n\n### 10-13. Consolidating Multiple Trace\
    \ Files\n\n#### Problem\n\nYou have generated multiple trace files for a session\
    \ in order to tune performance, and you want to consolidate those files into a\
    \ single trace file.\n\n#### Solution\n\nUse the `trcsess` command to merge multiple\
    \ trace files into a single trace file. Here's a simple example:\n\n```bash\n\
    c:\\trace> trcsess output=combined.trc session=196.614 orcl1_ora_8432_mytrace1.trc\
    \ orcl1_ora_8432_mytrace2.trc\nC:\\trace>\n```\n\nThe `trcsess` command shown\
    \ here combines two trace files generated for a session into a single trace file.\
    \ The `session` parameter identifies the session with a session identifier, consisting\
    \ of the session index and session serial number, which you can get from the `V$SESSION`\
    \ view."
  raw: '#### Solution


    You can get an event 10046 trace for a parallel query in the same way as you would
    for any other query. The only difference is that the 10046 event will generate
    as many trace files as the number of parallel query servers. Here''s an example:


    `SQL>alter session set tracefile_identifier=''MyTrace1'';`


    `SQL> alter session set events ''10046 trace name context forever, level 12'';`


    `Session altered.`


    `SQL> select /*+ full(sales) parallel (sales 6) */ count(quantity_sold) from`

    `     sales;`


    `COUNT(QUANTITY_SOLD)`

    `--------------------`

    `              918843`


    `SQL> alter session set events ''10046 trace name context off'';`


    `Session altered.`


    `SQL>`


    You''ll now see a total of seven trace files with the trace file identifier `MyTrace1`
    in the trace directory. Depending on what you''re looking for, you can analyze
    each of the trace files separately, or consolidate them into one big trace file
    with the `trcsess` utility before analyzing it with `TKPROF` or another profiler
    such as the Oracle Trace Analyzer. You''ll also find several files with the suffix
    `.trm` in the trace directory—you can ignore these files, as they are for use
    by the database.


    #### How It Works


    The only real difference between getting an extended trace for a single query
    and one for a parallel query is that you''ll have multiple trace files, one for
    each parallel query server. When a user executes a parallel query, Oracle creates
    multiple parallel query processes to process the query, with each process getting
    its own session. That''s the reason Oracle creates multiple trace files for a
    parallel query.


    Once you turn off the trace, go to the trace directory and execute the following
    command to find all the trace files for the parallel query:


    `$ find . -name ''*MyTrace1*''`


    The `find` command lists all the trace files for your parallel query (ignore the
    files ending with `.trm` in the trace directory). You can move the trace files
    to another directory and use the `trcsess` utility to consolidate those files,
    as shown here:


    `$ trcsess output=MyTrace1.trc clientid=''px_test1'' orcl1_ora_8432_mytrace1.trc
    orcl1_ora_8432_mytrace2.trc`


    You''re now ready to use the `TKPROF` utility to profile the parallel query.


    When you issue a parallel query, the parallel execution coordinator/query coordinator
    (QC) controls the execution of the query. The parallel execution servers/slaves
    (QS) do the actual work. The parallel execution server *set* is the set of all
    the query servers that execute an operation. The query coordinator and each of
    the execution servers generate their own trace files. For example, if one of the
    slave processes waits for a resource, the database records the resulting wait
    events in that slave process''s trace file, but not in the query coordinator''s
    trace file.


    Note that if you''re using a 10.2 or an older release, the trace files for the
    user process will be created in the user dump directory and the background processes
    (slaves) will generate trace files in the background dump directory. In 11.1 and
    newer databases, the trace files for both background and user processes are in
    the same directory (trace). You can find the trace file names by issuing the `show
    tracefile -t` command after invoking ADRCI, or by querying the `V$DIAG_INFO` view
    from SQL*Plus.


    ### 10-11. Tracing Specific Parallel Query Processes


    #### Problem


    You want to trace one or more specific parallel query processes.


    #### Solution


    Identify the parallel query processes you want to trace with the following command.


    `SQL> select inst_id,p.server_name,`

    `     p.status as p_status,`

    `     p.pid as p_pid,`

    `     p.sid as p_sid`

    `     from  gv$px_process p`

    `     order by p.server_name;`


    Let''s say you decide to trace the processes p002 and p003\. Issue the following
    `alter system set events` command to trace just these two parallel processes.


    `SQL> alter system set events ‘sql_trace  {process: pname = p002 | p003}'';`


    Once you''re done tracing, turn off the trace by issuing the following command:


    `SQL> alter system set events ‘sql_trace  {process: pname = p002 | p003} off'';`


    #### How It Works


    Tracing parallel processes is always tricky. One of the improvements made to the
    tracing infrastructure in the Oracle Database 11g release is the capability to
    trace a specific statement or a set of statements. This capability comes in handy
    when there are a large number of SQL statements being executed by a session and
    you''re sure about the identity of the SQL statement whose execution you want
    to trace.


    ### 10-12. Tracing Parallel Queries in a RAC System


    #### Problem


    You''re tracing a parallel query in a RAC environment, but aren''t sure in which
    instance the trace files are located.


    #### Solution


    Finding the trace files for the server (or thread or slave) processes is sometimes
    difficult in a RAC environment, because you aren''t sure on which node or node(s)
    the database has created the trace files. Here are the steps to follow to make
    it easier to find the trace files on the different nodes.


    > 1.  Set the `px_trace` with an `alter session` command, to help identify the
    trace files, as shown here: `SQL> alter session set tracefile_identifier=''10046'';`

    >     `SQL> alter session set  "_px_trace" = low , messaging;`

    >     `SQL> alter session set events ''10046 trace name context forever,level
    12'';`

    > 2.  Execute your parallel query. `SQL> alter table bigsales (parallel 4);`

    >     `SQL> select count(*) from bigsales;`

    > 3.  Turn all tracing off. `SQL> alter session set events ''10046 trace name
    context off'';`

    >     `SQL> alter session set "_px_trace" = none;`


    Specifying `px_trace` will cause the query coordinator''s trace file to include
    information about the slave processes that are part of the query, and the instance
    each slave process belongs to. You can then retrieve the trace files from the
    instances listed in the query coordinator''s trace file.


    #### How It Works


    The `_px_trace` (px trace) parameter is an undocumented, internal Oracle parameter
    that has existed since the 9.2 release. Once you run the trace commands as shown
    in the “Solution” section of this recipe, the trace file for the query coordinator
    (QC) process will show within it the name of each of the slave processes and the
    instances the processes have run on—for example:


    `Acquired 4 slaves on 1 instances avg height=4 in 1 set q serial:2049`

    `        P000 inst 1 spid 7512`

    `        P001 inst 1 spid 4088`

    `        P002 inst 1 spid 7340`

    `        P003 inst 1 spid 9256`


    In this case, you know that Instance 1 is where you must look to get the trace
    files for the slave processes P000, P001, P002, and P003\. On Instance 1, in the
    ADR trace subdirectory, look for file names that contain the words P000 (or P001/P002/P003),
    to identify the correct trace files.


    ### 10-13. Consolidating Multiple Trace Files


    #### Problem


    You have generated multiple trace files for a session in order to tune performance,
    and you want to consolidate those files into a single trace file.


    #### Solution


    Use the `trcsess` command to merge multiple trace files into a single trace file.
    Here''s a simple example:


    `c:\trace> trcsess output=combined.trc session=196.614 orcl1_ora_8432_mytrace1.trc
    orcl1_ora_8432_mytrace2.trc`

    `C:\trace>`


    The `trcsess` command shown here combines two trace files generated for a session
    into a single trace file. The session parameter identifies the session with a
    session identifier, consisting of the session index and session serial number,
    which you can get from the `V$SESSION` view.'
  trans: "\n#### 解决方案\n\n获取并行查询的 10046 跟踪文件的方式与获取任何其他查询的方式相同。唯一的区别是，10046 事件将生成与并行查询服务器数量一样多的跟踪文件。下面是一个示例：\n\
    \n```sql\nSQL> alter session set tracefile_identifier='MyTrace1';\n\nSQL> alter\
    \ session set events '10046 trace name context forever, level 12';\n\nSession\
    \ altered.\n\nSQL> select /*+ full(sales) parallel (sales 6) */ count(quantity_sold)\
    \ from\n     sales;\n\nCOUNT(QUANTITY_SOLD)\n--------------------\n          \
    \    918843\n\nSQL> alter session set events '10046 trace name context off';\n\
    \nSession altered.\n\nSQL>\n```\n\n现在，你将在跟踪目录中看到总共七个带有跟踪文件标识符 `MyTrace1` 的跟踪文件。根据你要查找的内容，你可以分别分析每个跟踪文件，或者在用\
    \ `TKPROF` 或 Oracle Trace Analyzer 等其他分析器进行分析之前，使用 `trcsess` 工具将它们合并成一个大的跟踪文件。你还会在跟踪目录中找到一些后缀为\
    \ `.trm` 的文件——可以忽略这些文件，因为它们是供数据库使用的。\n\n#### 工作原理\n\n获取单个查询的扩展跟踪与获取并行查询的扩展跟踪之间，唯一真正的区别在于你会得到多个跟踪文件，每个并行查询服务器对应一个。当用户执行并行查询时，Oracle\
    \ 会创建多个并行查询进程来处理该查询，每个进程都有自己的会话。这就是 Oracle 为并行查询创建多个跟踪文件的原因。\n\n关闭跟踪后，转到跟踪目录并执行以下命令以查找并行查询的所有跟踪文件：\n\
    \n```bash\n$ find . -name '*MyTrace1*'\n```\n\n`find` 命令会列出你并行查询的所有跟踪文件（忽略跟踪目录中以\
    \ `.trm` 结尾的文件）。你可以将跟踪文件移动到另一个目录，并使用 `trcsess` 工具合并这些文件，如下所示：\n\n```bash\n$ trcsess\
    \ output=MyTrace1.trc clientid='px_test1' orcl1_ora_8432_mytrace1.trc orcl1_ora_8432_mytrace2.trc\n\
    ```\n\n现在，你已准备好使用 `TKPROF` 工具来分析并行查询。\n\n当你发出并行查询时，并行执行协调器/查询协调器 (`QC`) 控制查询的执行。并行执行服务器/从属进程\
    \ (`QS`) 执行实际的工作。并行执行服务器*集*是执行某个操作的所有查询服务器的集合。查询协调器和每个执行服务器都会生成自己的跟踪文件。例如，如果某个从属进程在等待资源，数据库会将由此产生的等待事件记录在该从属进程的跟踪文件中，而不是查询协调器的跟踪文件中。\n\
    \n请注意，如果你使用的是 10.2 或更早的版本，用户进程的跟踪文件将创建在用户转储目录中，而后台进程（从属进程）将在后台转储目录中生成跟踪文件。在 11.1\
    \ 及更新版本的数据库中，后台和用户进程的跟踪文件都在同一个目录（trace）中。你可以在调用 `ADRCI` 后执行 `show tracefile -t`\
    \ 命令，或者通过 SQL*Plus 查询 `V$DIAG_INFO` 视图来查找跟踪文件名。\n\n### 10-11. 跟踪特定的并行查询进程\n\n\
    #### 问题\n\n你想要跟踪一个或多个特定的并行查询进程。\n\n#### 解决方案\n\n使用以下命令识别你想要跟踪的并行查询进程。\n\n```sql\n\
    SQL> select inst_id,p.server_name,\n     p.status as p_status,\n     p.pid as\
    \ p_pid,\n     p.sid as p_sid\n     from  gv$px_process p\n     order by p.server_name;\n\
    ```\n\n假设你决定跟踪进程 `p002` 和 `p003`。发出以下 `alter system set events` 命令以仅跟踪这两个并行进程。\n\
    \n```sql\nSQL> alter system set events 'sql_trace  {process: pname = p002 | p003}';\n\
    ```\n\n跟踪完成后，发出以下命令关闭跟踪：\n\n```sql\nSQL> alter system set events 'sql_trace  {process:\
    \ pname = p002 | p003} off';\n```\n\n#### 工作原理\n\n跟踪并行进程总是很棘手。Oracle Database\
    \ 11g 版本对跟踪基础设施的一项改进是能够跟踪特定语句或一组语句。当某个会话正在执行大量 SQL 语句，并且你确切知道要跟踪其执行的 SQL 语句的身份时，这一功能就派上用场了。\n\
    \n### 10-12. 在 RAC 系统中跟踪并行查询\n\n#### 问题\n\n你正在 RAC 环境中跟踪一个并行查询，但不确定跟踪文件位于哪个实例中。\n\
    \n#### 解决方案\n\n在 RAC 环境中查找服务器（或线程或从属）进程的跟踪文件有时很困难，因为你不确定数据库在哪个或哪些节点上创建了跟踪文件。请按照以下步骤操作，以便更轻松地在不同节点上查找跟踪文件。\n\
    \n> 1.  使用 `alter session` 命令设置 `px_trace`，以帮助识别跟踪文件，如下所示：\n>     ```sql\n>  \
    \   SQL> alter session set tracefile_identifier='10046';\n>     SQL> alter session\
    \ set  \"_px_trace\" = low , messaging;\n>     SQL> alter session set events '10046\
    \ trace name context forever,level 12';\n>     ```\n> 2.  执行你的并行查询。\n>     ```sql\n\
    >     SQL> alter table bigsales (parallel 4);\n>     SQL> select count(*) from\
    \ bigsales;\n>     ```\n> 3.  关闭所有跟踪。\n>     ```sql\n>     SQL> alter session\
    \ set events '10046 trace name context off';\n>     SQL> alter session set \"\
    _px_trace\" = none;\n>     ```\n\n指定 `px_trace` 将导致查询协调器的跟踪文件包含有关作为查询一部分的从属进程以及每个从属进程所属实例的信息。然后，你可以从查询协调器跟踪文件中列出的实例中检索跟踪文件。\n\
    \n#### 工作原理\n\n`_px_trace` (px trace) 参数是一个未文档化的内部 Oracle 参数，自 9.2 版本起就已存在。一旦你运行了本“解决方案”部分中所示的跟踪命令，查询协调器\
    \ (`QC`) 进程的跟踪文件将显示其中运行的每个从属进程的名称以及这些进程运行所在的实例——例如：\n\n```\nAcquired 4 slaves\
    \ on 1 instances avg height=4 in 1 set q serial:2049\n        P000 inst 1 spid\
    \ 7512\n        P001 inst 1 spid 4088\n        P002 inst 1 spid 7340\n       \
    \ P003 inst 1 spid 9256\n```\n\n在这种情况下，你知道需要在实例 1 中查找从属进程 `P000`、`P001`、`P002`\
    \ 和 `P003` 的跟踪文件。在实例 1 上，在 ADR 跟踪子目录中，查找文件名中包含 `P000`（或 `P001`/`P002`/`P003`）字样的文件，以识别正确的跟踪文件。\n\
    \n### 10-13. 合并多个跟踪文件\n\n#### 问题\n\n你已经为某个会话生成了多个跟踪文件以调整性能，并希望将这些文件合并成一个跟踪文件。\n\
    \n#### 解决方案\n\n使用 `trcsess` 命令将多个跟踪文件合并成一个跟踪文件。下面是一个简单的例子：\n\n```bash\nc:\\trace>\
    \ trcsess output=combined.trc session=196.614 orcl1_ora_8432_mytrace1.trc orcl1_ora_8432_mytrace2.trc\n\
    C:\\trace>\n```\n\n此处显示的 `trcsess` 命令将为某个会话生成的两个跟踪文件合并为一个跟踪文件。`session` 参数使用会话标识符（由会话索引和会话序列号组成）来标识会话，你可以从\
    \ `V$SESSION` 视图中获取该标识符。\n"
- fmt: "# How It Works\n\nThe `trcsess` utility is part of the Oracle database and\
    \ helps by letting you consolidate multiple trace files during performance tuning\
    \ and debugging exercises. Here's the syntax of the `trcsess` command:\n\n```shell\n\
    trcsess [output=output_file_name]\n           [session=session_id]\n         \
    \  [client_id=cleint_id]\n           [service=service_name]\n           [action=action_name]\n\
    \           [module=module_name]\n           [trace_files]\n```\n\nYou must specify\
    \ one of these five options when issuing the `trcsess` command: `session`, `client_id`,\
    \ `service`, `action`, and `module`. For example, if you issue the command in\
    \ the following manner, the command includes all the trace files in the current\
    \ directory for a session and combines them into a single file:\n\n```shell\n\
    $ trcsess output=main.trc session=196.614\n```\n\nIn our example, we specified\
    \ the name of the consolidated trace file with the `output` option. If you don't\
    \ specify the output option, `trcsess` prints the output to standard out. Once\
    \ you use `trcsess` to combine the output of multiple trace files into one consolidated\
    \ file, you can use the `TKPROF` utility to analyze the file, just as you'd do\
    \ in the case of a single trace file.\n\n## 10-14. Finding the Correct Session\
    \ for Tracing\n\n### Problem\n\nYou want to initiate a session trace for a user\
    \ from your own session, and you would like to find out the correct session to\
    \ trace.\n\n### Solution\n\nYou must have the `SID` and the serial number for\
    \ the user whose session you want to trace. You can find these from the `V$SESSION`\
    \ view, of course, once you know the user's name. However, you must get several\
    \ other details about the user's session to identify the correct session, since\
    \ the user may have multiple sessions open. Use the following query to get the\
    \ user's information:\n\n```sql\nSQL> select a.sid, a.serial#, b.spid, b.pid,\n\
    \     a.username, a.osuser, a.machine\n     from\n     v$session a,\n     v$process\
    \ b\n     where a.username IS NOT NULL\n     and a.paddr=b.addr;\n```\n\nThe query\
    \ provides several attributes such as `USERNAME`, `OSUSER`, and `MACHINE`, which\
    \ help you unambiguously select the correct session.\n\n### How It Works\n\nYou\
    \ can't always rely on the first set of `SID` and serial number you manage to\
    \ find for the user whose session you want to trace. Together, the `SID` and serial\
    \ number uniquely identify a session. However, you may find multiple `SID` and\
    \ serial number combinations for the same user, because your database may be using\
    \ common user logins. Therefore, querying the `V$SESSION` view for other information\
    \ such as `OSUSER` and `MACHINE` besides the `SID` and serial number helps to\
    \ identify the correct user session.\n\n`V$SESSION` view columns such as `COMMAND`,\
    \ `SERVER`, `LOGON_TIME`, `PROGRAM`, and `LAST_CALL_ET` help identify the correct\
    \ session to trace. If you still can't find the correct session, you may want\
    \ to join the `V$SESSION` and `V$SQLAREA` views to identify the correct session.\n\
    \n## 10-15. Tracing a SQL Session\n\n### Problem\n\nYou want to turn on SQL tracing\
    \ for a session to diagnose a performance problem.\n\n### Solution\n\nThere are\
    \ multiple ways to trace a session, but the Oracle-recommended approach is to\
    \ use the `DBMS_MONITOR` package to access the SQL tracing facility. To trace\
    \ a session, first identify the session with the following command, assuming you\
    \ know either the username or the SID for the session:\n\n```sql\nSQL> select\
    \ sid, serial#, username from v$session;\n```\n\nOnce you get the `SID` and `SERIAL#`\
    \ from the previous query, invoke the `session_trace_enable` procedure of the\
    \ `DBMS_MONITOR` package, as shown here:\n\n```sql\nSQL> execute dbms_monitor.session_trace_enable(session_id=>138,serial_num=>242,\n\
    waits=>true,binds=>false);\nPL/SQL procedure successfully completed.\nSQL>\n```\n\
    \n**Caution** SQL tracing does impose an overhead on the database—you need to\
    \ be very selective in tracing sessions in a production environment, as a trace\
    \ can fill up a disk or affect CPU usage adversely.\n\nIn this example, we chose\
    \ to trace the wait information as well, but it's optional. Once you execute this\
    \ command, have the user execute the SQL statements that you're testing (in a\
    \ dev or test environment). In a production environment, wait for a long enough\
    \ period to make sure you've captured the execution of the SQL statements, before\
    \ turning the tracing off. Invoke the `session_trace_disable` procedure to disable\
    \ the SQL tracing for the session, as shown here:\n\n```sql\nSQL> execute dbms_monitor.session_trace_disable();\n\
    PL/SQL procedure successfully completed.\nSQL>\n```\n\nOnce you complete tracing\
    \ the session activity, you can get the trace file for the session from the trace\
    \ directory and use the `TKPROF` utility (or a different profiler) to get a report.\
    \ The trace file will have the suffix `mytrace1`, the value you set as the trace\
    \ file identifier.\n\nTo trace the current user session, use the following pair\
    \ of commands:\n\n```sql\nSQL> execute dbms_monitor.session_trace_enable();\n\
    SQL> execute dbms_monitor.session_trace_disable();\n```\n\n### How It Works\n\n\
    Tracing an entire session is expensive in terms of resource usage and you must\
    \ do so only when you haven't identified a poorly performing SQL statement already.\
    \ A session trace gathers the following types of information.\n\n- Physical and\
    \ logical reads for each statement that's running in the session\n- CPU and elapsed\
    \ times\n- Number of rows processed by each statement\n- Misses in the library\
    \ cache\n- Number of commits and rollbacks\n- Row operations that show the actual\
    \ execution plan for each statement\n- Wait events for each SQL statement\n\n\
    **Note** You need the DBA role to execute procedures and functions in the `DBMS_MONITOR`\
    \ package.\n\n> You can specify the following parameters for the `session_trace_enable`\
    \ procedure:\n>\n> `session_id`: Identifies the session you want to trace (`SID`);\
    \ if you omit this, your own session will be traced.\n>\n> `serial_num`: Serial\
    \ number for the session\n>\n> `waits`: Set it to true if you want to capture\
    \ wait information (default = false).\n>\n> `binds`: Set it to true to capture\
    \ bind information (default=false).\n>\n> `plan_stat`: Determines the frequency\
    \ with which the row source statistics (execution plan and execution statistics)\
    \ are dumped\n>\n> All the parameters for the `session_trace_enable` procedure\
    \ are self-evident, except the `plan_stat` parameter. You can set the following\
    \ values for this parameter:\n>\n> `never`: The trace file won't contain any information\
    \ about row source operations.\n>\n> `first_execution` (same as setting the `plan_stat`\
    \ parameter to the value `null`): Row source information is written once, after\
    \ the first execution of a statement.\n>\n> `all_executions`: Execution plan and\
    \ execution statistics are written for each execution of the cursor, instead of\
    \ only when the cursor is closed.\n\nSince an execution plan for a statement can\
    \ change during the course of a program run, you may want to set the `plan_stat`\
    \ parameter to the value `all_executions` if you want to capture all possible\
    \ execution plans for a statement.\n\n## 10-16. Tracing a Session by Process ID\n\
    \n### Problem\n\nYou want to identify and trace a session using an operating system\
    \ process ID."
  raw: "#### How It Works\n\nThe `trcsess` utility is part of the Oracle database\
    \ and helps by letting you consolidate multiple trace files during performance\
    \ tuning and debugging exercises. Here's the syntax of the `trcsess` command:\n\
    \n`trcsess [output=output_file_name]`\n`           [session=session_id]`\n`           [client_id=cleint_id]`\n\
    `           [service=service_name]`\n`           [action=action_name]`\n`           [module=module_name]`\n\
    `           [trace_files]`\n\nYou must specify one of these five options when\
    \ issuing the `trcess` command: `session`, `client_id`, `service`, `action`, and\
    \ `module`. For example, if you issue the command in the following manner, the\
    \ command includes all the trace files in the current directory for a session\
    \ and combines them into a single file:\n\n`$ trcsess output=main.trc session=196.614`\n\
    \nIn our example, we specified the name of the consolidated trace file with the\
    \ `output` option. If you don't specify the output option, `trcsess` prints the\
    \ output to standard out. Once you use `trcsess` to combine the output of multiple\
    \ trace files into one consolidated file, you can use the `TKPROF` utility to\
    \ analyze the file, just as you'd do in the case of a single trace file.\n\n###\
    \ 10-14. Finding the Correct Session for Tracing\n\n#### Problem\n\nYou want to\
    \ initiate a session trace for a user from your own session, and you would like\
    \ to find out the correct session to trace.\n\n#### Solution\n\nYou must have\
    \ the `SID` and the serial number for the user whose session you want to trace.\
    \ You can find these from the `V$SESSION` view, of course, once you know the user's\
    \ name. However, you must get several other details about the user's session to\
    \ identify the correct session, since the user may have multiple sessions open.\
    \ Use the following query to get the user's information:\n\n`SQL> select a.sid,\
    \ a.serial#, b.spid, b.pid,`\n`     a.username, a.osuser, a.machine`\n`     from`\n\
    `     v$session a,`\n`     v$process b`\n`     where a.username IS NOT NULL`\n\
    `     and a.paddr=b.addr;`\n\nThe query provides several attributes such as `USERNAME`,\
    \ `OSUSER`, and `MACHINE`, which help you unambiguously select the correct session.\n\
    \n#### How It Works\n\nYou can't always rely on the first set of `SID` and serial\
    \ number you manage to find for the user whose session you want to trace. Together,\
    \ the `SID` and serial number uniquely identify a session. However, you may find\
    \ multiple `SID` and serial number combinations for the same user, because your\
    \ database may be using common user logins. Therefore, querying the `V$SESSION`\
    \ view for other information such as `OSUSER` and `MACHINE` besides the `SID`\
    \ and serial number helps to identify the correct user session.\n\n`V$SESSION`\
    \ view columns such as `COMMAND`, `SERVER`, `LOGON_TIME`, `PROGRAM`, and `LAST_CALL_ET`\
    \ help identify the correct session to trace. If you still can't find the correct\
    \ session, you may want to join the `V$SESSION` and `V$SQLAREA` views to identify\
    \ the correct session.\n\n### 10-15\\. Tracing a SQL Session\n\n#### Problem\n\
    \nYou want to turn on SQL tracing for a session to diagnose a performance problem.\n\
    \n#### Solution\n\nThere are multiple ways to trace a session, but the Oracle-recommended\
    \ approach is to use the `DBMS_MONITOR` package to access the SQL tracing facility.\
    \ To trace a session, first identify the session with the following command, assuming\
    \ you know either the username or the SID for the session:\n\n`SQL> select sid,\
    \ serial#, username from v$session;`\n\nOnce you get the `SID` and `SERIAL#` from\
    \ the previous query, invoke the `session_trace_enable` procedure of the `DBMS_MONITOR`\
    \ package, as shown here:\n\n`SQL> execute dbms_monitor.session_trace_enable(session_id=>138,serial_num=>242,`\n\
    `waits=>true,binds=>false);`\n`PL/SQL procedure successfully completed.`\n`SQL>`\n\
    \n![images](images/square.jpg) **Caution** SQL tracing does impose an overhead\
    \ on the database—you need to be very selective in tracing sessions in a production\
    \ environment, as a trace can fill up a disk or affect CPU usage adversely.\n\n\
    In this example, we chose to trace the wait information as well, but it's optional.\
    \ Once you execute this command, have the user execute the SQL statements that\
    \ you're testing (in a dev or test environment). In a production environment,\
    \ wait for a long enough period to make sure you've captured the execution of\
    \ the SQL statements, before turning the tracing off. Invoke the `session_trace_disable`\
    \ procedure to disable the SQL tracing for the session, as shown here:\n\n`SQL>\
    \ execute dbms_monitor.session_trace_disable();`\n`PL/SQL procedure successfully\
    \ completed.`\n`SQL>`\n\nOnce you complete tracing the session activity, you can\
    \ get the trace file for the session from the trace directory and use the `TKPROF`\
    \ utility (or a different profiler) to get a report. The trace file will have\
    \ the suffix `mytrace1`, the value you set as the trace file identifier.\n\nTo\
    \ trace the current user session, use the following pair of commands:\n\n`SQL>\
    \ execute dbms_monitor.session_trace_enable();`\n`SQL> execute dbms_monitor.session_trace_disable();`\n\
    \n#### How It Works\n\nTracing an entire session is expensive in terms of resource\
    \ usage and you must do so only when you haven't identified a poorly performing\
    \ SQL statement already. A session trace gathers the following types of information.\n\
    \n*   Physical and logical reads for each statement that's running in the session\n\
    *   CPU and elapsed times\n*   Number of rows processed by each statement\n* \
    \  Misses in the library cache\n*   Number of commits and rollbacks\n*   Row operations\
    \ that show the actual execution plan for each statement\n*   Wait events for\
    \ each SQL statement\n\n![images](images/square.jpg) **Note** You need the DBA\
    \ role to execute procedures and functions in the `DBMS_MONITOR` package.\n\n\
    > You can specify the following parameters for the `session_trace_enable` procedure:\n\
    > \n> `session_id`: Identifies the session you want to trace (`SID`); if you omit\
    \ this, your own session will be traced.\n> \n> `serial_num`: Serial number for\
    \ the session\n> \n> `waits`: Set it to true if you want to capture wait information\
    \ (default = false).\n> \n> `binds`: Set it to true to capture bind information\
    \ (default=false).\n> \n> `plan_stat`: Determines the frequency with which the\
    \ row source statistics (execution plan and execution statistics) are dumped\n\
    > \n> All the parameters for the `session_trace_enable` procedure are self-evident,\
    \ except the `plan_stat` parameter. You can set the following values for this\
    \ parameter:\n> \n> `never`: The trace file won't contain any information about\
    \ row source operations.\n> \n> `first_execution` (same as setting the `plan_stat`\
    \ parameter to the value `null`): Row source information is written once, after\
    \ the first execution of a statement.\n> \n> `all_executions`: Execution plan\
    \ and execution statistics are written for each execution of the cursor, instead\
    \ of only when the cursor is closed.\n\nSince an execution plan for a statement\
    \ can change during the course of a program run, you may want to set the `plan_stat`\
    \ parameter to the value `all_executions` if you want to capture all possible\
    \ execution plans for a statement.\n\n### 10-16\\. Tracing a Session by Process\
    \ ID\n\n#### Problem\n\nYou want to identify and trace a session using an operating\
    \ system process ID."
  trans: "\n# 工作原理\n\n`trcsess` 实用程序是 Oracle 数据库的一部分，可在性能调优和调试过程中帮助你合并多个跟踪文件。以下是 `trcsess`\
    \ 命令的语法：\n\n```shell\ntrcsess [output=output_file_name]\n           [session=session_id]\n\
    \           [client_id=cleint_id]\n           [service=service_name]\n       \
    \    [action=action_name]\n           [module=module_name]\n           [trace_files]\n\
    ```\n\n发出 `trcsess` 命令时，必须指定以下五个选项之一：`session`、`client_id`、`service`、`action`\
    \ 和 `module`。例如，如果你按如下方式发出命令，该命令会包含当前目录中某个会话的所有跟踪文件，并将其合并为一个文件：\n\n```shell\n\
    $ trcsess output=main.trc session=196.614\n```\n\n在我们的示例中，我们使用 `output` 选项指定了合并后跟踪文件的名称。如果未指定输出选项，`trcsess`\
    \ 会将输出打印到标准输出。一旦使用 `trcsess` 将多个跟踪文件的输出合并为一个文件，你就可以使用 `TKPROF` 实用程序来分析该文件，就像分析单个跟踪文件一样。\n\
    \n## 10-14. 查找用于跟踪的正确会话\n\n### 问题\n\n你想从你自己的会话为某个用户发起会话跟踪，并且你想找出要跟踪的正确会话。\n\n\
    ### 解决方案\n\n你必须拥有要跟踪其会话的用户的 `SID` 和序列号。当然，一旦你知道用户名，就可以从 `V$SESSION` 视图中找到这些信息。然而，你必须获取有关该用户会话的若干其他详细信息才能识别正确的会话，因为该用户可能打开了多个会话。使用以下查询获取用户信息：\n\
    \n```sql\nSQL> select a.sid, a.serial#, b.spid, b.pid,\n     a.username, a.osuser,\
    \ a.machine\n     from\n     v$session a,\n     v$process b\n     where a.username\
    \ IS NOT NULL\n     and a.paddr=b.addr;\n```\n\n该查询提供了诸如 `USERNAME`、`OSUSER` 和\
    \ `MACHINE` 等多个属性，这些属性可帮助你明确无误地选择正确的会话。\n\n### 工作原理\n\n你不能总是依赖为要跟踪其会话的用户找到的第一组\
    \ `SID` 和序列号。`SID` 和序列号共同唯一标识一个会话。但是，你可能会发现同一用户有多个 `SID` 和序列号组合，因为你的数据库可能使用公共用户登录。因此，除了\
    \ `SID` 和序列号外，查询 `V$SESSION` 视图的其他信息（如 `OSUSER` 和 `MACHINE`）有助于识别正确的用户会话。\n\n\
    `V$SESSION` 视图的列（如 `COMMAND`、`SERVER`、`LOGON_TIME`、`PROGRAM` 和 `LAST_CALL_ET`）有助于识别要跟踪的正确会话。如果仍然找不到正确的会话，你可能需要连接\
    \ `V$SESSION` 和 `V$SQLAREA` 视图来识别。\n\n## 10-15. 跟踪 SQL 会话\n\n### 问题\n\n你想为某个会话开启\
    \ SQL 跟踪以诊断性能问题。\n\n### 解决方案\n\n有多种方法可以跟踪会话，但 Oracle 推荐的方法是使用 `DBMS_MONITOR` 包来访问\
    \ SQL 跟踪功能。要跟踪会话，首先使用以下命令识别会话（假设你知道该会话的用户名或 SID）：\n\n```sql\nSQL> select sid,\
    \ serial#, username from v$session;\n```\n\n一旦从上一个查询中获取了 `SID` 和 `SERIAL#`，就调用\
    \ `DBMS_MONITOR` 包的 `session_trace_enable` 过程，如下所示：\n\n```sql\nSQL> execute dbms_monitor.session_trace_enable(session_id=>138,serial_num=>242,\n\
    waits=>true,binds=>false);\nPL/SQL procedure successfully completed.\nSQL>\n```\n\
    \n**注意** SQL 跟踪确实会给数据库带来开销——在生产环境中跟踪会话时需要非常谨慎，因为跟踪文件可能会填满磁盘或对 CPU 使用率产生不利影响。\n\
    \n在此示例中，我们选择同时跟踪等待信息，但这是可选的。执行此命令后，让用户执行你正在测试的 SQL 语句（在开发或测试环境中）。在生产环境中，等待足够长的时间以确保捕获了\
    \ SQL 语句的执行，然后再关闭跟踪。调用 `session_trace_disable` 过程以禁用该会话的 SQL 跟踪，如下所示：\n\n```sql\n\
    SQL> execute dbms_monitor.session_trace_disable();\nPL/SQL procedure successfully\
    \ completed.\nSQL>\n```\n\n完成会话活动的跟踪后，你可以从跟踪目录中获取该会话的跟踪文件，并使用 `TKPROF` 实用程序（或其他分析器）获取报告。该跟踪文件将具有你设置为跟踪文件标识符的后缀\
    \ `mytrace1`。\n\n要跟踪当前用户会话，请使用以下命令对：\n\n```sql\nSQL> execute dbms_monitor.session_trace_enable();\n\
    SQL> execute dbms_monitor.session_trace_disable();\n```\n\n### 工作原理\n\n跟踪整个会话在资源使用方面代价高昂，只有在尚未识别出性能不佳的\
    \ SQL 语句时才应这样做。会话跟踪收集以下类型的信息：\n\n- 会话中运行的每个语句的物理读和逻辑读\n- CPU 时间和耗时\n- 每个语句处理的行数\n\
    - 库缓存中的未命中次数\n- 提交和回滚次数\n- 显示每个语句实际执行计划的行操作\n- 每个 SQL 语句的等待事件\n\n**注意** 你需要 DBA\
    \ 角色才能执行 `DBMS_MONITOR` 包中的过程和函数。\n\n> 你可以为 `session_trace_enable` 过程指定以下参数：\n\
    >\n> `session_id`：标识要跟踪的会话（`SID`）；如果省略此项，将跟踪你自己的会话。\n>\n> `serial_num`：会话的序列号\n\
    >\n> `waits`：如果要捕获等待信息，请将其设置为 true（默认 = false）。\n>\n> `binds`：如果要捕获绑定信息，请将其设置为\
    \ true（默认=false）。\n>\n> `plan_stat`：确定行源统计信息（执行计划和执行统计信息）转储的频率\n>\n> `session_trace_enable`\
    \ 过程的所有参数都是自解释的，除了 `plan_stat` 参数。你可以为此参数设置以下值：\n>\n> `never`：跟踪文件将不包含任何有关行源操作的信息。\n\
    >\n> `first_execution`（等同于将 `plan_stat` 参数设置为 `null`）：行源信息在语句首次执行后写入一次。\n>\n>\
    \ `all_executions`：为游标的每次执行都写入执行计划和执行统计信息，而不仅是在游标关闭时。\n\n由于语句的执行计划在程序运行过程中可能会改变，如果你想捕获语句所有可能的执行计划，可能需要将\
    \ `plan_stat` 参数的值设置为 `all_executions`。\n\n## 10-16. 通过进程 ID 跟踪会话\n\n### 问题\n\n\
    你想使用操作系统进程 ID 来识别并跟踪一个会话。\n"
- fmt: '### 10-16. Tracing a Session by Its Operating System Process ID


    #### Solution


    执行 `alter session`（或 `alter system`）`set events` 命令，以根据操作系统的进程 ID 追踪会话，该 ID 由
    `V$PROCESS` 视图中的 `SPID` 列显示。此命令的通用格式如下：


    `alter session set events ‘sql_trace {process:pid}''`


    以下是根据操作系统进程 ID 追踪会话的步骤。


    > 1.  通过查询 `V$PROCESS` 视图获取操作系统进程 ID。

    >     `SQL> select spid,pname from v$process;`

    > 2.  一旦确定了用户的 `SPID`，请执行以下语句以开始对该会话的追踪：

    >     `SQL> alter session set events ‘sql_trace {process:2714}'';`

    >     `Session altered.`

    >     `SQL>`

    > 3.  通过以下方式关闭追踪：

    >     `SQL> alter session set events ‘sql_trace {process:2714} off'';`

    >     `Session altered.`

    >     `SQL>`

    > 4.  您也可以通过以下方式执行 `set events` 命令，以连接两个进程：

    >     `SQL> alter system set events ‘sql_trace {process:2714|2936}'';`

    >     `System altered.`

    >     `SQL> alter system set events ‘sql_trace {process:2714|2936} off'';`

    >     `System altered.`

    >     `SQL>`


    当您连接两个进程时，数据库会生成两个独立的跟踪文件，每个进程一个，如下所示：


    `orcl1_ora_2714.trc`

    `orcl1_ora_2936.trc`


    #### How It Works


    在 Oracle Database 11g 中，`alter session set events` 命令得到了增强，允许您通过指定进程 ID（`PID`）、进程名称（`PNAME`）或
    Oracle 进程 ID（`ORAPID`）来追踪进程。您也可以使用具有相同通用语法的 `alter system` 命令。该命令的语法如下：


    `alter session set events ‘sql_trace {process : pid = <pid>, pname = <pname>,
    orapid = <orapid>} rest of event specification''`


    `V$PROCESS` 视图包含有关所有当前活动进程的信息。在 `V$PROCESS` 视图中，以下列可帮助您识别三个与进程相关的值：


    `PID: the Oracle process identifier`

    `SPID: the Operating System process identifier`

    `PNAME: name of the process`


    在本方法中，我们展示了如何使用操作系统进程标识符（`V$PROCESS` 视图中的 `SPID` 列）生成跟踪文件。您可以使用此处显示的通用语法来生成使用
    `PID` 或进程名称的跟踪。


    ### 10-17. Tracing Multiple Sessions


    #### Problem


    您想要追踪属于单个用户的多个 SQL 会话。


    #### Solution


    您可以使用 `DBMS_MONITOR` 包中的 `client_id_trace_enable` 过程来追踪属于一个用户的多个会话。在执行 `dbms_monitor.client_id_trace_enable`
    过程之前，必须使用 `DBMS_SESSION` 包为会话设置 `client_identifier`，如下所示：


    `SQL> execute dbms_session.set_identifier(''SH'')`


    一旦如上设置了客户端标识符，`V$SESSION` 视图中的 `client_identifier` 列就会被填充。您可以通过执行以下语句来确认 `client_identifier`
    列的值：


    `SQL> select sid, serial#,username from v$session where client_identifier=''SH'';`


    现在您可以执行 `dbms_monitor.client_id_trace_enable` 过程：


    `SQL> execute dbms_monitor.client_id_trace_enable(client_id=>''SH'', waits=>true,
    binds=>false);`


    您可以使用以下命令禁用追踪：


    `SQL> execute dbms_monitor.client_id_trace_disable(client_id=>''SH'');`


    #### How It Works


    设置 `client_identifier` 列允许您在多个用户可能作为同一 Oracle 用户连接时（尤其是在使用连接池的应用程序中）启用对多个会话的追踪。`client_id_trace_enable`
    过程为所有具有特定客户端 ID 的会话收集统计信息。


    请注意，您必须指定的 `client_id` 不必属于当前活动的会话。默认情况下，`waits` 和 `binds` 参数设置为 `false`，您可以在执行
    `client_id_trace_enable` 过程时添加这些参数来同时设置对等待和绑定的追踪：


    `SQL> exec dbms_monitor.client_id_trace_enable(''SH'',true,true);`

    `PL/SQL procedure successfully completed.`


    您可以查询 `DBA_ENABLED_TRACES` 视图以查找使用客户端标识符执行的跟踪的状态。在此视图中，`TRACE_TYPE` 列显示值 `CLIENT_ID`，`PRIMARY_ID`
    显示客户端标识符的值。


    `SQL> select trace_type, primary_id,waits,binds from dba_enabled_traces;`

    `TRACE_TYPE       PRIMARY_ID        WAITS     BINDS`

    `-------------    ---------------   --------  --------------`

    `CLIENT_ID        SH                TRUE      TRUE`


    ### 10-18. Tracing an Instance or a Database


    #### Problem


    您想要追踪整个实例或数据库中所有 SQL 语句的执行情况。


    #### Solution


    使用 `dbms_monitor.database_trace_enable` 过程来追踪特定实例或整个数据库。执行以下命令对以开始和停止对 *单个实例*
    的追踪。


    `SQL> execute dbms_monitor.database_trace_enable(instance_name=>''instance1'');`

    `SQL> execute dbms_monitor.database_trace_disable(instance_name=>''instance1'');`


    您可以选择指定 `waits` 和 `binds` 属性。以下命令在 *数据库级别* 启用和禁用 SQL 追踪：


    `SQL> execute dbms_monitor.database_trace_enable();`

    `SQL> execute dbms_monitor.database_trace_disable();`


    您也可以将 `sql_trace` 初始化参数设置为 `true` 来打开和关闭 SQL 追踪，但此参数已不推荐使用。Oracle 建议您使用 `dbms_monitor`（或
    `dbms_session`）包进行 SQL 追踪。


    #### How It Works


    显然，实例级别和数据库级别的 SQL 追踪会带来严重的开销，并很可能成为另一个性能问题的来源！您通常不需要这样做——应使用会话级追踪来识别性能问题。如果您因为不知道查询可能从哪个会话执行而必须追踪整个实例，请尽快关闭追踪以减少开销。


    ### 10-19. Generating an Event 10046 Trace for a Session


    #### Problem


    您想要获取会话的 Oracle 事件 10046 跟踪。


    #### Solution


    您可以按照以下步骤获取 Oracle 事件 10046 跟踪（也称为扩展跟踪）：


    > 1.  设置您的跟踪文件标识符。

    >     `SQL> alter session set tracefile_identifier=''10046'';`

    > 2.  执行以下语句以开始跟踪。

    >     `SQL> alter session set events ''10046 trace name context forever, level
    12''`

    > 3.  执行您想要跟踪的 SQL 语句。

    >     `SQL> select sum(amount_sold) from sales;`

    > 4.  使用以下命令关闭跟踪：

    >     `SQL> alter session set events ''10046 trace name context off'';`


    您会在由 `diagnostic_dest` 参数指定的跟踪目录（`($DIAG_HOME/rdbms/db/inst/trace`）中找到跟踪转储文件。您可以使用
    `TKPROF` 或 Oracle Trace Analyzer 等其他实用程序分析此跟踪文件。'
  raw: '#### Solution


    Execute the `alter session` (or `alter system`) `set events` command to trace
    a session by its operating system process ID, which is shown by the `SPID` column
    in the `V$PROCESS` view. The general format of this command is as follows:


    `alter session set events ‘sql_trace {process:pid}''`


    Here are the steps to tracing a session by its OS PID.


    > 1.  Get the OS process ID by querying the `V$PROCESS` view. `SQL> select spid,pname
    from v$process;`

    > 2.  Once you identify the SPID of the user, issue the following statement to
    start the trace for that session: `SQL> alter session set events ‘sql_trace {process:2714}'';`

    >     `Session altered.`

    >     `SQL>`

    > 3.  Turn off tracing the following way: `SQL> alter session set events ‘sql_trace
    {process:2714} off'';`

    >     `Session altered.`

    >     `SQL>`

    > 4.  You can also execute the `set events` command in the following manner, to
    concatenate two processes: `SQL> alter system set events ‘sql_trace {process:2714|2936}'';`

    >     `System altered.`

    >     `SQL> alter system set events ‘sql_trace {process:2714|2936} off'';`

    >     `System altered.`

    >     `SQL>`


    When you concatenate two processes, the database generates two separate trace
    files, one for each process, as shown here:


    `orcl1_ora_2714.trc`

    `orcl1_ora_2936.trc`


    #### How It Works


    In Oracle Database 11g, the `alter session set events` command has been enhanced
    to allow you to trace a process by specifying the process ID (PID), process name
    (PNAME), or the Oracle Process ID (ORAPID). You can also use an `alter system`
    command with the same general syntax as well. Here''s the syntax of the command:


    `alter session set events ‘sql_trace {process : pid = <pid>, pname = <pname>,
    orapid = <orapid>} rest of event specification''`


    The `V$PROCESS` view contains information about all currently active processes.
    In the `V$PROCESS` view, the following columns help you identify the three process-related
    values:


    `PID: the Oracle process identifier`

    `SPID: the Operating System process identifier`

    `PNAME: name of the process`


    In this recipe, we showed how to generate a trace file using the OS process identifier
    (`SPID` column in the `V$PROCESS` view). You can use the general syntax shown
    here to generate a trace using the PID or the process name.


    ### 10-17\. Tracing Multiple Sessions


    #### Problem


    You want to trace multiple SQL sessions that belong to a single user.


    #### Solution


    You can trace multiple sessions that belong to a user by using the `client_id_trace_enable`
    procedure from the `DBMS_MONITOR` package. Before you can execute the `dbms_monitor.client_id_trace_enable`
    procedure, you must set the `client_identifier` for the session by using the `DBMS_SESSION`
    package, as shown here:


    `SQL> execute dbms_session.set_identifier(''SH'')`


    Once you set the client identifier as shown here, the `client_identifier` column
    in the `V$SESSION` view is populated. You can confirm the value of the `client_identifier`
    column by executing the following statement:


    `SQL> select sid, serial#,username from v$session where client_identifier=''SH'';`


    Now you can execute the `dbms_monitor.client_id_trace_enable` procedure:


    `SQL> execute dbms_monitor.client_id_trace_enable(client_id=>''SH'', waits=>true,
    binds=>false);`


    You can disable the trace with the following command:


    `SQL> execute dbms_monitor.client_id_trace_disable(client_id=>''SH'');`


    #### How It Works


    Setting the `client_identifier` column lets you enable the tracing of multiple
    sessions, when several users may be connecting as the same Oracle user, especially
    in applications that use connection pools. The `client_id_trace_enable` procedure
    collects statistics for all sessions with a specific client ID.


    Note that the `client_id` that you must specify doesn''t have to belong to a currently
    active session. By default, the waits and binds parameters are set to `false`
    and you can set the tracing of both waits and binds by adding those parameters
    when you execute the `client_id_trace_enable` procedure:


    ` SQL> exec dbms_monitor.client_id_trace_enable(''SH'',true,true);`


    `PL/SQL procedure successfully completed.`


    You can query the `DBA_ENABLED_TRACES` view to find the status of a trace that
    you executed with a client identifier. In this view, the column `TRACE_TYPE` shows
    the value `CLIENT_ID` and the `PRIMARY_ID` shows the value of the client identifier.


    `SQL> select trace_type, primary_id,waits,binds from dba_enabled_traces;`


    `TRACE_TYPE       PRIMARY_ID        WAITS     BINDS`

    `-------------    ---------------   --------  --------------`

    `CLIENT_ID        SH                TRUE      TRUE`


    ### 10-18. Tracing an Instance or a Database


    #### Problem


    You want to trace the execution of all SQL statements in the entire instance or
    database.


    #### Solution


    Use the `dbms_monitor.database_trace_enable` procedure to trace a specific instance
    or an entire database. Issue the following pair of commands to start and stop
    tracing for an *individual instance*.


    `SQL> execute dbms_monitor.database_trace_enable(instance_name=>''instance1'');`

    `SQL> execute dbms_monitor.database_trace_disable(instance_name=>''instance1'');`


    You can optionally specify the waits and binds attributes. The following commands
    enable and disable SQL tracing at the *database level*:


    `SQL> execute dbms_monitor.database_trace_enable();`

    `SQL> execute dbms_monitor.database_trace_disable();`


    You can also set the `sql_trace` initialization parameter to `true` to turn on
    and turn off SQL tracing, but this parameter is deprecated. Oracle recommends
    that you use the `dbms_monitor` (or the `dbms_session`) package for SQL tracing.


    #### How It Works


    Obviously, instance-level and database-level SQL tracing is going to impose a
    serious overhead, and may well turn out to be another source of performance problems!
    You normally don''t ever have to do this—use the session-level tracing instead
    to identify performance problems. If you must trace an entire instance, because
    you don''t know from which session a query may be executed, turn off tracing as
    soon as possible, to reduce the overhead.


    ### 10-19\. Generating an Event 10046 Trace for a Session


    #### Problem


    You want to get an Oracle event 10046 trace for a session.


    #### Solution


    You can get an Oracle event 10046 trace, also called an extended trace, by following
    these steps:


    > 1.  Set your trace file identifier. `SQL> alter session set tracefile_identifier=''10046'';`

    > 2.  Issue the following statement to start the trace. `SQL> alter session set
    events ''10046 trace name context forever, level 12''`

    > 3.  Execute the SQL statement(s) that you want to trace. `SQL> select sum(amount_sold)
    from sales;`

    > 4.  Turn tracing off with the following command: `SQL> alter session set events
    ''10046 trace name context off'';`


    You''ll find the trace dump file in the trace directory that''s specified by the
    `diagnostic_dest` parameter `($DIAG_HOME/rdbms/db/inst/trace`). You can analyze
    this trace file with `TKPROF` or another utility such as the Oracle Trace Analyzer.'
