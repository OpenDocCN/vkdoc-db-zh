    \          TABLE ACCESS FULL |REGISTRATIONS |     1 |    77 | 64964   (5)| 00:13:00\
    \ |`\n\n此输出将帮助你确定 SQL 语句的效率，并提供有关如何调整它的见解。有关如何手动调整查询的详细信息，请参阅[第 9 章](#Chapter09.html#ch9)；有关自动\
    \ SQL 调优的详细信息，请参阅[第 11 章](#Chapter11.html#ch11)。\n\n#### 工作原理\n\n本配方“解决方案”部分描述的过程允许你快速识别资源密集型进程，然后将\
    \ OS 进程映射到数据库进程，并随后将数据库进程映射到 SQL 语句。一旦你知道了哪个 SQL 语句正在消耗资源，就可以生成执行计划，以进一步尝试确定任何可能的低效之处。\n\
