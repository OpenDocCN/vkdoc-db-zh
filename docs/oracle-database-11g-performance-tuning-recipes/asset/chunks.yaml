- fmt: "## Solution\n\nIf you aren't sure of the correct name of the background process\
    \ you want to trace, you can list the exact names of all background processes\
    \ by issuing the following command:\n\n```sql\nSQL> select name,description from\
    \ v$bgprocess;\n```\n\nSuppose you want to trace the `dbwo` process. Issue the\
    \ following commands to start and stop the trace.\n\n```sql\nSQL> alter system\
    \ set events 'sql_trace {process:pname=dbw0}';\nSystem altered.\nSQL> alter system\
    \ set events 'sql_trace {process:pname=dbw0} off';\nSystem altered.\nSQL>\n```\n\
    \nYou can trace two background processes at the same time by specifying the pipe\
    \ (`|`) character to separate the process names:\n\n```sql\nSQL> alter system\
    \ set events 'sql_trace {process:pname=dbw0|dbw1}';\nSystem altered.\n\nSQL> alter\
    \ system set events 'sql_trace {process:pname=dbw0|dbw1} off';\nSystem altered.\n\
    SQL>\n```\n\n## How It Works\n\nThe Oracle Database 11g release offers several\
    \ improvements to the SQL tracing facility. One of them is the new capability\
    \ that allows you to issue an `alter system set events` command to trace a process\
    \ (or a set of processes) or a specific SQL statement (or a set of statements).\
    \ This recipe shows how to trace a background process by specifying the process\
    \ name.\n\n## 10-26. Enabling Oracle Listener Tracing\n\n### Problem\n\nYou want\
    \ to trace the Oracle listener for diagnostic purposes.\n\n### Solution\n\nTo\
    \ generate a trace for the Oracle listener, add the following two lines in the\
    \ `listener.ora` file, which is by default located in the `$ORACLE_HOME/network/admin`\
    \ directory.\n\n```plaintext\ntrace_level_listener=support\ntrace_timestamp_listener=true\n\
    ```\n\nYou can optionally specify a file name for the listener trace by adding\
    \ the line `trace_file_listener=<file_name>`. Reload the listener with the `lsnrctl\
    \ reload` command, and then check the status of the listener with the `lsnrctl\
    \ status` command. You should see the trace file listed in the output:\n\n```bash\n\
    C:\\>lsnrctl reload\n\nThe command completed successfully\n\nC:\\>lsnrctl status\n\
    ...\n\nListener Parameter File   C:\\app\\ora\\product\\11.2.0\\dbhome_1\\network\\\
    admin\\listener.ora\nListener Log File         c:\\app\\ora\\diag\\tnslsnr\\MIROPC61\\\
    listener\\alert\\log.xml\nListener Trace File       c:\\app\\ora\\diag\\tnslsnr\\\
    MIROPC61\\listener\\trace\\ora_8640_9960.trc\n...\n  Instance \"orcl1\", status\
    \ READY, has 1 handler(s) for this service...\nService \"orcl1XDB.miro.local\"\
    \ has 1 instance(s).\n  Instance \"orcl1\", status READY, has 1 handler(s) for\
    \ this service...\nThe command completed successfully\n\nC:>\n```\n\nThe output\
    \ shows the listener trace file you've just configured.\n\n![images](images/square.jpg)\
    \ Note: This and the next recipe don't have anything to with SQL tracing, which\
    \ is the focus of this chapter. However, we thought we'd add these two recipes\
    \ because they're useful, and there's no better chapter to put them in!\n\n###\
    \ How It Works\n\nYou can specify various levels for listener tracing. You can\
    \ specify Level 4 (`user`) for user trace information and Level 10 (`admin`) for\
    \ administrative trace information. Oracle Support may request Level 16 (`support`)\
    \ for troubleshooting Oracle listener issues.\n\nIf you can't reload or restart\
    \ the listener, you can configure the tracing dynamically by issuing the following\
    \ commands:\n\n```bash\nC:\\>lsnrctl\n\nLSNRCTL> set current_listener listener\n\
    Current Listener is listener\nLSNRCTL> set trc_level 16\n\nConnecting to (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC1521)))\n\
    listener parameter \"trc_level\" set to support\nThe command completed successfully\n\
    LSNRCTL>\n```\n\nYou can turn off listener tracing by issuing the command `set\
    \ trc_level off`, which is the default value for this parameter:\n\n```bash\n\
    LSNRCTL> set trc_level off\nConnecting to (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC1521)))\n\
    LISTENER parameter \"trc_level\" set to off\nThe command completed successfully\n\
    LSNRCTL>\n```\n\nYou'll notice that the `lsnrctl status` command doesn't show\
    \ the listener trace file any longer. Note that the trace file for the listener\
    \ will not be in the `$ORACLE_HOME\\rdbms\\network\\admin` directory. Rather,\
    \ the database stores the trace file in the `diag` directory of the database diagnosability\
    \ infrastructure (ADR), under the `tnslsnr` directory, as shown here:\n\n```plaintext\n\
    Listener Trace File      c:\\app\\ora\\diag\\tnslsnr\\myhost\\listener\\trace\\\
    ora_8640_9960.trc\n```\n\n## 10-27. Setting Archive Tracing for Data Guard\n\n\
    ### Problem\n\nYou want to trace the creation and transmission of the archive\
    \ logs in a Data Guard environment.\n\n### Solution\n\nYou can trace the archive\
    \ logs on either the primary or the standby database by setting the `log_archive_trace`\
    \ initialization parameter:\n\n```sql\nlog_archive_trace=trace_level(integer)\n\
    ```\n\nFor example, if you want to set tracing at Level 15 on the primary server,\
    \ you'd set this parameter as follows:\n\n```sql\nSQL> alter system set log_archive_trace=15\n\
    ```\n\nBy default the `log_archive_trace` parameter is set to zero, meaning archive\
    \ log tracing is disabled.\n\n### How It Works\n\nAlthough archive log tracing\
    \ is disabled when you leave the `log_archive_trace` parameter at its default\
    \ level of zero, the database will still record error conditions in the trace\
    \ files and the alert log. When you set the `log_archive_trace` parameter to a\
    \ non-zero value, Oracle writes the appropriate trace output generated by the\
    \ archive log process to an audit trail. The audit trail is the same trace directory\
    \ as that for the SQL trace files—the *trace* directory in the ADR (this is the\
    \ same as the user dump directory specified by the `user_dump_dest` initialization\
    \ parameter).\n\nOn the primary database, the `log_archive_trace` parameter controls\
    \ the output of the `ARCn` (archiver), `FAL` (fetch archived log), and the `LGWR`\
    \ (log writer) background processes. On the standby databases, it traces the work\
    \ of the `ARCn`, `RFS` (remote file server), and the `FAL` processes.\n\nYou can\
    \ specify any of 15 levels of archive log tracing. Here's what the important tracing\
    \ levels mean:\n\nLevel 1: Tracks the archiving of log files\nLevel 2: Tracks\
    \ archive log status by destination\nLevel 4: Tracks archive operational phase\n\
    Level 8: Tracks archive log destination activity\nLevel 128: Tracks LGWR redo\
    \ shipping network activity\nLevel 4096: Tracks real-time apply activity\nLevel\
    \ 8192: Tracks redo apply activity (media recovery or physical standby)\n\nWhen\
    \ you specify a higher level of tracing, the trace will include information from\
    \ all lower tracing levels. For example, if you specify Level 15, the trace file\
    \ will include trace information from Levels 1, 2, 4, and 8.\n\n## C H A P T E\
    \ R  11"
  raw: '#### Solution


    If you aren''t sure of the correct name of the background process you want to
    trace, you can list the exact names of all background processes by issuing the
    following command:


    `SQL> select name,description from v$bgprocess;`


    Suppose you want to trace the `dbwo` process. Issue the following commands to
    start and stop the trace.


    `SQL> alter system set events ''sql_trace {process:pname=dbw0}'';`

    `System altered.`

    `SQL> alter system set events ''sql_trace {process:pname=dbw0} off'';`

    `System altered.`

    `SQL>`


    You can trace two background processes at the same time by specifying the pipe
    (`|`) character to separate the process names:


    `SQL> alter system set events ''sql_trace {process:pname=dbw0|dbw1}'';`

    `System altered.`


    `SQL> alter system set events ''sql_trace {process:pname=dbw0|dbw1} off'';`

    `System altered.`

    `SQL>`


    #### How It Works


    The Oracle Database 11g release offers several improvements to the SQL tracing
    facility. One of them is the new capability that allows you to issue an `alter
    system set events` command to trace a process (or a set of processes) or a specific
    SQL statement (or a set of statements). This recipe shows how to trace a background
    process by specifying the process name.


    ### 10-26. Enabling Oracle Listener Tracing


    #### Problem


    You want to trace the Oracle listener for diagnostic purposes.


    #### Solution


    To generate a trace for the Oracle listener, add the following two lines in the
    `listener.ora` file, which is by default located in the `$ORACLE_HOME/network/admin`
    directory.


    `trace_level_listener=support`

    `trace_timestamp_listener=true`


    You can optionally specify a file name for the listener trace by adding the line
    `trace_file_listener=<file_name>`. Reload the listener with the `lsnrctl reload`
    command, and then check the status of the listener with the `lsnrctl status` command.
    You should see the trace file listed in the output:


    `C:\>lsnrctl reload`


    `The command completed successfully`


    `C:\>lsnrctl status`

    `...`


    `Listener Parameter File   C:\app\ora\product\11.2.0\dbhome_1\network\admin\liste`

    `ner.ora`

    `Listener Log File         c:\app\ora\diag\tnslsnr\MIROPC61\listener\alert\log.xm`

    `l`

    `Listener Trace File       c:\app\ora\diag\tnslsnr\MIROPC61\listener\trace\ora_86`

    `40_9960.trc`

    `...`

    `  Instance "orcl1", status READY, has 1 handler(s) for this service...`

    `Service "orcl1XDB.miro.local" has 1 instance(s).`

    `  Instance "orcl1", status READY, has 1 handler(s) for this service...`

    `The command completed successfully`


    `C:>`


    The output shows the listener trace file you''ve just configured.


    ![images](images/square.jpg) **Note** This and the next recipe don''t have anything
    to with SQL tracing, which is the focus of this chapter. However, we thought we''d
    add these two recipes because they''re useful, and there''s no better chapter
    to put them in!


    #### How It Works


    You can specify various levels for listener tracing. You can specify Level 4 (`user`)
    for user trace information and Level 10 (`admin`) for administrative trace information.
    Oracle Support may request Level 16 (`support`) for troubleshooting Oracle listener
    issues.


    If you can''t reload or restart the listener, you can configure the tracing dynamically
    by issuing the following commands:


    `C:>lsnrctl`


    `LSNRCTL> set current_listener listener`

    `Current Listener is listener`

    `LSNRCTL> set trc_level 16`


    `Connecting to (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC`

    `listener parameter "trc_level" set to support`

    `The command completed successfully`

    `LSNRCTL>`


    You can turn off listener tracing by issuing the command `set trc_level off`,
    which is the default value for this parameter:


    `LSNRCTL> set trc_level off`

    `Connecting to (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC1521)))`

    `LISTENER parameter "trc_level" set to off`

    `The command completed successfully`

    `LSNRCTL>`


    You''ll notice that the `lsnrctl status` command doesn''t show the listener trace
    file any longer. Note that the trace file for the listener will not be in the
    `$ORACLE_HOME\rdbms\network\admin` directory. Rather, the database stores the
    trace file in the `diag` directory of the database diagnosability infrastructure
    (ADR), under the `tnslsnr` directory, as shown here:


    `Listener Trace File      c:\app\ora\diag\tnslsnr\myhost\listener\trace\ora_86`

    `                            40_9960.trc`


    ### 10-27. Setting Archive Tracing for Data Guard


    #### Problem


    You want to trace the creation and transmission of the archive logs in a Data
    Guard environment.


    #### Solution


    You can trace the archive logs on either the primary or the standby database by
    setting the `log_archive_trace` initialization parameter:


    `log_archive_trace=trace_level(integer)`


    For example, if you want to set tracing at Level 15 on the primary server, you''d
    set this parameter as follows:


    `SQL> alter system set log_archive_trace=15`


    By default the `log_archive_trace` parameter is set to zero, meaning archive log
    tracing is disabled.


    #### How It Works


    Although archive log tracing is disabled when you leave the `log_archive_trace`
    parameter at its default level of zero, the database will still record error conditions
    in the trace files and the alert log. When you set the `log_archive_trace` parameter
    to a non-zero value, Oracle writes the appropriate trace output generated by the
    archive log process to an audit trail. The audit trail is the same trace directory
    as that for the SQL trace files—the *trace* directory in the ADR (this is the
    same as the user dump directory specified by the `user_dump_dest` initialization
    parameter).


    On the primary database, the `log_archive_trace` parameter controls the output
    of the `ARC`*`n`* (archiver), `FAL` (fetch archived log), and the `LGWR` (log
    writer) background processes. On the standby databases, it traces the work of
    the `ARCn`, `RFS` (remote file server), and the `FAL` processes.


    You can specify any of 15 levels of archive log tracing. Here''s what the important
    tracing levels mean:


    Level 1: Tracks the archiving of log files


    Level 2: Tracks archive log status by destination


    Level 4: Tracks archive operational phase


    Level 8: Tracks archive log destination activity


    Level 128: Tracks LGWR redo shipping network activity


    Level 4096: Tracks real-time apply activity


    Level 8192: Tracks redo apply activity (media recovery or physical standby)


    When you specify a higher level of tracing, the trace will include information
    from all lower tracing levels. For example, if you specify Level 15, the trace
    file will include trace information from Levels 1, 2, 4, and 8.


    ## C H A P T E R  11'
  trans: "## 解决方案\n\n如果您不确定要跟踪的后台进程的确切名称，可以通过执行以下命令列出所有后台进程的确切名称：\n\n```sql\nSQL>\
    \ select name,description from v$bgprocess;\n```\n\n假设您想要跟踪 `dbwo` 进程。请执行以下命令来启动和停止跟踪。\n\
    \n```sql\nSQL> alter system set events 'sql_trace {process:pname=dbw0}';\n系统已更改。\n\
    SQL> alter system set events 'sql_trace {process:pname=dbw0} off';\n系统已更改。\nSQL>\n\
    ```\n\n您可以通过指定管道符 (`|`) 来分隔进程名称，从而同时跟踪两个后台进程：\n\n```sql\nSQL> alter system set\
    \ events 'sql_trace {process:pname=dbw0|dbw1}';\n系统已更改。\n\nSQL> alter system set\
    \ events 'sql_trace {process:pname=dbw0|dbw1} off';\n系统已更改。\nSQL>\n```\n\n## 工作原理\n\
    \nOracle Database 11g 版本对 SQL 跟踪设施提供了多项改进。其中之一是新的功能，允许您执行 `alter system set events`\
    \ 命令来跟踪一个进程（或一组进程）或特定的 SQL 语句（或一组语句）。本方法展示了如何通过指定进程名称来跟踪后台进程。\n\n## 10-26. 启用\
    \ Oracle 监听器跟踪\n\n### 问题\n\n您希望出于诊断目的跟踪 Oracle 监听器。\n\n### 解决方案\n\n要为 Oracle 监听器生成跟踪文件，请在默认位于\
    \ `$ORACLE_HOME/network/admin` 目录下的 `listener.ora` 文件中添加以下两行：\n\n```plaintext\n\
    trace_level_listener=support\ntrace_timestamp_listener=true\n```\n\n您还可以选择通过添加\
    \ `trace_file_listener=<file_name>` 行来指定监听器跟踪的文件名。使用 `lsnrctl reload` 命令重新加载监听器，然后使用\
    \ `lsnrctl status` 命令检查监听器状态。您应该会在输出中看到列出的跟踪文件：\n\n```bash\nC:\\>lsnrctl reload\n\
    \n命令执行成功\n\nC:\\>lsnrctl status\n...\n\n监听器参数文件   C:\\app\\ora\\product\\11.2.0\\\
    dbhome_1\\network\\admin\\listener.ora\n监听器日志文件     c:\\app\\ora\\diag\\tnslsnr\\\
    MIROPC61\\listener\\alert\\log.xml\n监听器跟踪文件     c:\\app\\ora\\diag\\tnslsnr\\\
    MIROPC61\\listener\\trace\\ora_8640_9960.trc\n...\n  实例 \"orcl1\", 状态 READY, 有\
    \ 1 个处理程序用于此服务...\n服务 \"orcl1XDB.miro.local\" 有 1 个实例。\n  实例 \"orcl1\", 状态 READY,\
    \ 有 1 个处理程序用于此服务...\n命令执行成功\n\nC:>\n```\n\n输出显示了您刚刚配置的监听器跟踪文件。\n\n![images](img/square.jpg)\
    \ 注意：本方法和下一个方法与 SQL 跟踪无关，后者是本章的重点。然而，我们认为这两个方法很有用，而且没有更合适的章节来放置它们！\n\n### 工作原理\n\
    \n您可以为监听器跟踪指定不同的级别。您可以指定级别 4 (`user`) 用于用户跟踪信息，级别 10 (`admin`) 用于管理跟踪信息。Oracle\
    \ 支持部门在解决 Oracle 监听器问题时可能会要求级别 16 (`support`)。\n\n如果您无法重新加载或重启监听器，可以通过执行以下命令动态配置跟踪：\n\
    \n```bash\nC:\\>lsnrctl\n\nLSNRCTL> set current_listener listener\n当前监听器为 listener\n\
    LSNRCTL> set trc_level 16\n\n连接到 (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC1521)))\n\
    监听器参数 \"trc_level\" 被设置为 support\n命令执行成功\nLSNRCTL>\n```\n\n您可以通过执行命令 `set trc_level\
    \ off` 来关闭监听器跟踪，这是该参数的默认值：\n\n```bash\nLSNRCTL> set trc_level off\n连接到 (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC1521)))\n\
    监听器参数 \"trc_level\" 被设置为 off\n命令执行成功\nLSNRCTL>\n```\n\n您会注意到 `lsnrctl status`\
    \ 命令不再显示监听器跟踪文件。请注意，监听器的跟踪文件不会位于 `$ORACLE_HOME\\rdbms\\network\\admin` 目录中。相反，数据库会将跟踪文件存储在数据库诊断存储库\
    \ (ADR) 的 `diag` 目录中，位于 `tnslsnr` 目录下，如下所示：\n\n```plaintext\n监听器跟踪文件      c:\\\
    app\\ora\\diag\\tnslsnr\\myhost\\listener\\trace\\ora_8640_9960.trc\n```\n\n##\
    \ 10-27. 为 Data Guard 设置归档跟踪\n\n### 问题\n\n您希望在 Data Guard 环境中跟踪归档日志的创建和传输。\n\n\
    ### 解决方案\n\n您可以通过设置 `log_archive_trace` 初始化参数来跟踪主数据库或备用数据库上的归档日志：\n\n```sql\n\
    log_archive_trace=跟踪级别(整数)\n```\n\n例如，如果您想在主服务器上设置级别 15 的跟踪，您可以如下设置此参数：\n\n```sql\n\
    SQL> alter system set log_archive_trace=15\n```\n\n默认情况下，`log_archive_trace` 参数设置为零，这意味着归档日志跟踪被禁用。\n\
    \n### 工作原理\n\n虽然当您将 `log_archive_trace` 参数保留为其默认级别零时归档日志跟踪被禁用，但数据库仍会在跟踪文件和警报日志中记录错误状况。当您将\
    \ `log_archive_trace` 参数设置为非零值时，Oracle 会将归档日志进程生成的相应跟踪输出写入审计跟踪。审计跟踪与 SQL 跟踪文件所在的跟踪目录相同——即\
    \ ADR 中的 *trace* 目录（这与 `user_dump_dest` 初始化参数指定的用户转储目录相同）。\n\n在主数据库上，`log_archive_trace`\
    \ 参数控制 `ARCn`（归档器）、`FAL`（获取归档日志）和 `LGWR`（日志写入器）后台进程的输出。在备用数据库上，它跟踪 `ARCn`、`RFS`（远程文件服务器）和\
    \ `FAL` 进程的工作。\n\n您可以指定 15 个归档日志跟踪级别中的任意一个。以下是重要跟踪级别的含义：\n\n级别 1：跟踪日志文件的归档\n级别\
    \ 2：按目的地跟踪归档日志状态\n级别 4：跟踪归档操作阶段\n级别 8：跟踪归档日志目的地活动\n级别 128：跟踪 LGWR 重做传输网络活动\n级别\
    \ 4096：跟踪实时应用活动\n级别 8192：跟踪重做应用活动（介质恢复或物理备用）\n\n当您指定更高的跟踪级别时，跟踪将包含所有较低跟踪级别的信息。例如，如果您指定级别\
    \ 15，跟踪文件将包含来自级别 1、2、4 和 8 的跟踪信息。\n\n## 第 11 章"
- fmt: '## Automated SQL Tuning


    Prior to Oracle Database 11g, accurately identifying poorly performing SQL queries
    and recommending solutions was mainly the purview of veteran SQL tuners. Typically
    one had to know how to identify high-resource SQL statements and bottlenecks,
    generate and interpret execution plans, extract data from the dynamic performance
    views, understand wait events and statistics, and then collate this knowledge
    to produce good SQL queries. As you''ll see in this chapter, the Oracle SQL tuning
    paradigm has shifted a bit.


    With the advent of automated SQL tuning features, anybody from novice to expert
    can generate and recommend solutions for SQL performance problems. This opens
    the door for new ways to address problematic SQL. For example, imagine your boss
    coming to you each morning with tuning recommendations and asking what the plan
    is to implement enhancements. This is different.


    The automated SQL tuning feature is not a panacea for SQL performance angst. If
    you are an expert SQL tuner, there''s no need to fear your skills are obsolete
    or your job is lost. There will always be a need to verify recommendations and
    successfully implement solutions. A human is still required to review the automated
    SQL tuning output and confirm the worthiness of fixes.


    Still, there''s been a change in the way SQL performance problems can be identified
    and solutions can be recommended. Some old-school folks may disagree and argue
    that you can''t allow just anybody to generate SQL tuning advice. Regardless,
    Oracle has made these automated tools accessible and usable by the general population
    (for a fee). Therefore you need to understand the underpinnings of these features
    and how to use them.


    This chapter focuses on the following automated SQL tuning tools:


    *   Automatic SQL Tuning

    *   SQL tuning sets (`STS`)

    *   SQL Tuning Advisor

    *   Automatic Database Diagnostic Monitor (`ADDM`)


    Starting with Oracle Database 11g, `Automatic SQL Tuning` is a preset background
    database job that by default runs every day. This task examines high resource-consuming
    statements in the Automatic Workload Repository (`AWR`). It then invokes the `SQL
    Tuning Advisor` and generates tuning advice (if any) for each statement analyzed.
    As part of automated SQL tuning, you can configure characteristics such as the
    automatic acceptance of some recommendations such as SQL profiles (see [Chapter
    12](#Chapter12.html#ch12) for details on SQL profiles).


    A `SQL tuning set` (`STS`) is a database object that contains one or more SQL
    statements *and* the associated execution statistics. You can populate a SQL tuning
    set from multiple sources, such as SQL recorded in the `AWR` and SQL in memory,
    or you can provide specific SQL statements. It''s critical that you be familiar
    with SQL tuning sets. This feature is used as an input to several of Oracle''s
    performance tuning and management tools, such as the `SQL Tuning Advisor`, `SQL
    Plan Management`, `SQL Access Advisor`, and `SQL Performance Advisor`.


    The `SQL Tuning Advisor` is central to Oracle''s `Automatic SQL Tuning` feature.
    This tool runs automatically on a periodic basis and generates tuning advice for
    high resource-consuming SQL statements found in the `AWR`. You can also run the
    `SQL Tuning Advisor` manually and provide as input specific snapshot periods in
    the `AWR`, high resource-consuming SQL in memory, or user-provided SQL statements.
    This tool can be invoked via the `DBMS_SQLTUNE` package, `SQL Developer`, or `Enterprise
    Manager`.


    The `Automatic Database Diagnostic Monitor` (`ADDM`) analyzes information in the
    `AWR` and provides recommendations on database performance issues including high
    resource-consuming SQL statements. The main goal of `ADDM` is to help you reduce
    the overall time (the `DB time` metric) spent by the database processing user
    requests. This tool can be invoked from an Oracle-provided SQL script, the `DBMS_ADDM`
    package, or `Enterprise Manager`.


    All of the prior listed tools require an extra license from Oracle. You may not
    have a license to run these tools. Even if you don''t have one, we still recommend
    that you know how these tools function. For example, you might be a manager asking
    if these automated tools are worth the cost, or you might be working with a developer
    who is investigating the use of these tools in a test environment. As a SQL tuning
    guru, you need to be familiar with these tools, as you will sooner or later encounter
    these automated features.


    Before investigating the recipes in this chapter, please take a long look at [Figure
    11-1](#Chapter11.html#fig_11_1). This diagram demonstrates how the various automated
    tools interact and in what scenarios you would use a particular feature. Refer
    back to this diagram as you work through the recipes in this chapter. Particularly
    notice that you can easily use SQL statements found in the `AWR` or SQL currently
    in memory as input for various Oracle tuning tools. This allows you to systematically
    identify and use high-resource SQL statements as the target for various performance
    tuning activities.


    ![images](images/1101.jpg)


    **Figure 11-1.** Oracle''s automatic SQL tuning tools


    The first several recipes in this chapter deal with the `Automatic SQL Tuning`
    feature. You''ll be shown how to determine if and when the automated job is running
    and how to modify its characteristics. The middle section of this chapter focuses
    on how to create and manage SQL tuning sets. SQL tuning sets are used widely as
    input to various Oracle performance tuning tools. Lastly, the chapter shows you
    how to manually run the `SQL Tuning Advisor` and `ADDM` to generate performance
    recommendations for SQL statements.


    ![images](images/square.jpg) **Note** In the examples in this chapter, we focus
    on showing you how to use features via SQL and built-in PL/SQL packages. While
    we do show some screenshots from `Enterprise Manager`, we don''t focus on the
    graphical tool usage. You should be able to use the SQL and PL/SQL regardless
    of whether `Enterprise Manager` is installed. Furthermore, the manual approach
    allows you to understand each piece of the process and will help you to diagnose
    issues when problems arise.


    ### 11-1. Displaying Automatic SQL Tuning Job Details


    #### Problem


    You have an Oracle Database 11g environment and want to determine if the `Automatic
    SQL Tuning` job is enabled and regularly running. If the job is enabled, you want
    to display other aspects, such as when it starts and how long it executes.


    #### Solution


    Use the following query to determine if any `Automatic SQL Tuning` jobs are enabled:


    ```sql

    SELECT client_name, status, consumer_group, window_group

    FROM dba_autotask_client

    ORDER BY client_name;

    ```


    The following output shows that there are three enabled automatic jobs running,
    one of which is the `SQL Tuning Advisor`:


    ```

    CLIENT_NAME                      STATUS   CONSUMER_GROUP            WINDOW_GROUP

    ------------------------------- -------- ------------------------- --------------------

    sql tuning advisor              ENABLED  ORA$AUTOTASK_SQL_GROUP    ORA$AT_WGRP_SQ

    auto space advisor              ENABLED  ORA$AUTOTASK_SPACE_GROUP  ORA$AT_WGRP_SA

    auto optimizer stats collection ENABLED  ORA$AUTOTASK_STATS_GROUP  ORA$AT_WGRP_OS

    ```


    Run the following query to view the last several times the `Automatic SQL Tuning
    Advisor` job has run:


    ```sql

    SELECT task_name, status, TO_CHAR(execution_end,''DD-MON-YY HH24:MI'')

    FROM dba_advisor_executions

    WHERE task_name=''SYS_AUTO_SQL_TUNING_TASK''

    ORDER BY execution_end;

    ```


    Here is some sample output:


    ```

    TASK_NAME                      STATUS     TO_CHAR(EXECUTION_END

    ------------------------------ ---------- ---------------------

    SYS_AUTO_SQL_TUNING_TASK       COMPLETED   30-APR-11 06:00

    SYS_AUTO_SQL_TUNING_TASK       COMPLETED   01-MAY-11 06:02

    ```'
  raw: '## Automated SQL Tuning


    Prior to Oracle Database 11g, accurately identifying poorly performing SQL queries
    and recommending solutions was mainly the purview of veteran SQL tuners. Typically
    one had to know how to identify high-resource SQL statements and bottlenecks,
    generate and interpret execution plans, extract data from the dynamic performance
    views, understand wait events and statistics, and then collate this knowledge
    to produce good SQL queries. As you''ll see in this chapter, the Oracle SQL tuning
    paradigm has shifted a bit.


    With the advent of automated SQL tuning features, anybody from novice to expert
    can generate and recommend solutions for SQL performance problems. This opens
    the door for new ways to address problematic SQL. For example, imagine your boss
    coming to you each morning with tuning recommendations and asking what the plan
    is to implement enhancements. This is different.


    The automated SQL tuning feature is not a panacea for SQL performance angst. If
    you are an expert SQL tuner, there''s no need to fear your skills are obsolete
    or your job is lost. There will always be a need to verify recommendations and
    successfully implement solutions. A human is still required to review the automated
    SQL tuning output and confirm the worthiness of fixes.


    Still, there''s been a change in the way SQL performance problems can be identified
    and solutions can be recommended. Some old-school folks may disagree and argue
    that you can''t allow just anybody to generate SQL tuning advice. Regardless,
    Oracle has made these automated tools accessible and usable by the general population
    (for a fee). Therefore you need to understand the underpinnings of these features
    and how to use them.


    This chapter focuses on the following automated SQL tuning tools:


    *   Automatic SQL Tuning

    *   SQL tuning sets (STS)

    *   SQL Tuning Advisor

    *   Automatic Database Diagnostic Monitor (ADDM)


    Starting with Oracle Database 11g, *Automatic SQL Tuning* is a preset background
    database job that by default runs every day. This task examines high resource-consuming
    statements in the Automatic Workload Repository (AWR). It then invokes the SQL
    Tuning Advisor and generates tuning advice (if any) for each statement analyzed.
    As part of automated SQL tuning, you can configure characteristics such as the
    automatic acceptance of some recommendations such as SQL profiles (see [Chapter
    12](#Chapter12.html#ch12) for details on SQL profiles).


    A *SQL tuning set* (STS) is a database object that contains one or more SQL statements
    *and* the associated execution statistics. You can populate a SQL tuning set from
    multiple sources, such as SQL recorded in the AWR and SQL in memory, or you can
    provide specific SQL statements. It''s critical that you be familiar with SQL
    tuning sets. This feature is used as an input to several of Oracle''s performance
    tuning and management tools, such as the SQL Tuning Advisor, SQL Plan Management,
    SQL Access Advisor, and SQL Performance Advisor.


    The *SQL Tuning Advisor* is central to Oracle''s Automatic SQL Tuning feature.
    This tool runs automatically on a periodic basis and generates tuning advice for
    high resource-consuming SQL statements found in the AWR. You can also run the
    SQL Tuning Advisor manually and provide as input specific snapshot periods in
    the AWR, high resource-consuming SQL in memory, or user-provided SQL statements.
    This tool can be invoked via the `DBMS_SQLTUNE` package, SQL Developer, or Enterprise
    Manager.


    The *Automatic Database Diagnostic Monitor* (ADDM) analyzes information in the
    AWR and provides recommendations on database performance issues including high
    resource-consuming SQL statements. The main goal of ADDM is to help you reduce
    the overall time (the DB time metric) spent by the database processing user requests.
    This tool can be invoked from an Oracle-provided SQL script, the `DBMS_ADDM` package,
    or Enterprise Manager.


    All of the prior listed tools require an extra license from Oracle. You may not
    have a license to run these tools. Even if you don''t have one, we still recommend
    that you know how these tools function. For example, you might have a manager
    asking if these automated tools are worth the cost, or you might be working with
    a developer who is investigating the use of these tools in a test environment.
    As a SQL tuning guru, you need to be familiar with these tools, as you will sooner
    or later encounter these automated features.


    Before investigating the recipes in this chapter, please take a long look at [Figure
    11-1](#Chapter11.html#fig_11_1). This diagram demonstrates how the various automated
    tools interact and in what scenarios you would use a particular feature. Refer
    back to this diagram as you work through the recipes in this chapter. Particularly
    notice that you can easily use SQL statements found in the AWR or SQL currently
    in memory as input for various Oracle tuning tools. This allows you to systematically
    identify and use high-resource SQL statements as the target for various performance
    tuning activities.


    ![images](images/1101.jpg)


    ***Figure 11-1.** Oracle''s automatic SQL tuning tools*


    The first several recipes in this chapter deal with the Automatic SQL Tuning feature.
    You''ll be shown how to determine if and when the automated job is running and
    how to modify its characteristics. The middle section of this chapter focuses
    on how to create and manage SQL tuning sets. SQL tuning sets are used widely as
    input to various Oracle performance tuning tools. Lastly, the chapter shows you
    how to manually run the SQL Tuning Advisor and ADDM to generate performance recommendations
    for SQL statements.


    ![images](images/square.jpg) **Note** In the examples in this chapter, we focus
    on showing you how to use features via SQL and built-in PL/SQL packages. While
    we do show some screenshots from Enterprise Manager, we don''t focus on the graphical
    tool usage. You should be able to use the SQL and PL/SQL regardless of whether
    Enterprise Manager is installed. Furthermore, the manual approach allows you to
    understand each piece of the process and will help you to diagnose issues when
    problems arise.


    ### 11-1. Displaying Automatic SQL Tuning Job Details


    #### Problem


    You have an Oracle Database 11g environment and want to determine if the Automatic
    SQL Tuning job is enabled and regularly running. If the job is enabled, you want
    to display other aspects, such as when it starts and how long it executes.


    #### Solution


    Use the following query to determine if any Automatic SQL Tuning jobs are enabled:


    `SELECT client_name, status, consumer_group, window_group`

    `FROM dba_autotask_client`

    `ORDER BY client_name;`


    The following output shows that there are three enabled automatic jobs running,
    one of which is the SQL Tuning Advisor:


    `CLIENT_NAME                     STATUS   CONSUMER_GROUP            WINDOW_GROUP`

    `------------------------------- -------- ------------------------- --------------------`

    `sql tuning advisor              ENABLED  ORA$AUTOTASK_SQL_GROUP    ORA$AT_WGRP_SQ`

    `auto space advisor              ENABLED  ORA$AUTOTASK_SPACE_GROUP  ORA$AT_WGRP_SA`

    `auto optimizer stats collection ENABLED  ORA$AUTOTASK_STATS_GROUP  ORA$AT_WGRP_OS`


    Run the following query to view the last several times the Automatic SQL Tuning
    Advisor job has run:


    `SELECT task_name, status, TO_CHAR(execution_end,''DD-MON-YY HH24:MI'')`

    `FROM dba_advisor_executions`

    `WHERE task_name=''SYS_AUTO_SQL_TUNING_TASK''`

    `ORDER BY execution_end;`


    Here is some sample output:


    `TASK_NAME                      STATUS     TO_CHAR(EXECUTION_END`

    `------------------------------ ---------- ---------------------`

    `SYS_AUTO_SQL_TUNING_TASK       COMPLETED   30-APR-11 06:00`

    `SYS_AUTO_SQL_TUNING_TASK       COMPLETED   01-MAY-11 06:02`'
  trans: '## 自动 SQL 调优


    在 Oracle Database 11g 之前，准确识别性能不佳的 SQL 查询并推荐解决方案，主要还是资深 SQL 调优专家的领域。通常需要懂得如何识别高资源消耗的
    SQL 语句和瓶颈，生成并解读执行计划，从动态性能视图中提取数据，理解等待事件和统计数据，然后整合这些知识来写出好的 SQL 查询。正如你将在本章看到的，Oracle
    SQL 调优的范式已经有所转变。


    随着自动 SQL 调优功能的出现，从新手到专家的任何人都可以为 SQL 性能问题生成并推荐解决方案。这为处理有问题的 SQL 打开了新的大门。例如，想象一下你的老板每天早上带着调优建议来找你，并询问实施改进的计划是什么。这很不一样。


    自动 SQL 调优功能并非解决 SQL 性能焦虑的万能药。如果你是一位专家级 SQL 调优人员，无需担心自己的技能会过时或工作会丢失。总需要有人来验证建议并成功实施解决方案。仍然需要人工来审阅自动
    SQL 调优的输出，并确认修复措施的价值。


    尽管如此，识别 SQL 性能问题并推荐解决方案的方式已经发生了变化。一些守旧派可能不同意，并认为不能让任何人都能生成 SQL 调优建议。无论如何，Oracle
    已经让这些自动化工具对普通用户（需付费）可用且易于使用。因此，你需要理解这些功能的基础原理以及如何使用它们。


    本章重点介绍以下自动 SQL 调优工具：


    *   自动 SQL 调优

    *   SQL 调优集 (`STS`)

    *   SQL 调优建议器

    *   自动数据库诊断监控器 (`ADDM`)


    从 Oracle Database 11g 开始，`自动 SQL 调优`是一个预设的后台数据库作业，默认每天运行。此任务会检查自动工作量仓库 (`AWR`)
    中的高资源消耗语句。然后，它会调用`SQL 调优建议器`，并为每个分析的语句生成调优建议（如果有）。作为自动 SQL 调优的一部分，你可以配置一些特性，例如自动接受某些建议（如
    SQL 配置文件，有关 SQL 配置文件的详细信息请参见第 12 章）。


    一个`SQL 调优集` (`STS`) 是一个数据库对象，包含一个或多个 SQL 语句*以及*相关的执行统计信息。你可以从多个来源填充 SQL 调优集，例如记录在`AWR`中的
    SQL、内存中的 SQL，或者提供特定的 SQL 语句。熟悉 SQL 调优集至关重要。此功能被用作 Oracle 多个性能调优和管理工具的输入，例如`SQL
    调优建议器`、`SQL 计划管理`、`SQL 访问建议器`和`SQL 性能建议器`。


    `SQL 调优建议器`是 Oracle `自动 SQL 调优`功能的核心。此工具定期自动运行，并为在`AWR`中发现的高资源消耗 SQL 语句生成调优建议。你也可以手动运行`SQL
    调优建议器`，并提供特定的`AWR`快照时间段、内存中的高资源消耗 SQL 或用户提供的 SQL 语句作为输入。此工具可以通过`DBMS_SQLTUNE`包、`SQL
    Developer`或`Enterprise Manager`调用。


    `自动数据库诊断监控器` (`ADDM`) 分析`AWR`中的信息，并就数据库性能问题（包括高资源消耗 SQL 语句）提供建议。`ADDM`的主要目标是帮助你减少数据库处理用户请求所花费的总时间（`DB
    时间`指标）。此工具可以通过 Oracle 提供的 SQL 脚本、`DBMS_ADDM`包或`Enterprise Manager`调用。


    前面列出的所有工具都需要从 Oracle 获得额外许可。你可能没有运行这些工具的许可。即使没有，我们仍然建议你了解这些工具的功能。例如，你可能是一位经理，在询问这些自动化工具是否值得其成本；或者你可能与一位正在测试环境中研究使用这些工具的开发人员合作。作为一名
    SQL 调优专家，你需要熟悉这些工具，因为你迟早会遇到这些自动化功能。


    在探究本章的实践方法之前，请仔细查看图 11-1。该图展示了各种自动化工具如何交互，以及在何种场景下你会使用特定功能。在完成本章的实践方法时，请参考此图。特别要注意的是，你可以轻松地将`AWR`中发现的
    SQL 语句或当前内存中的 SQL 作为各种 Oracle 调优工具的输入。这使你能够系统地识别高资源 SQL 语句，并将其作为各种性能调优活动的目标。


    ![images](img/1101.jpg)


    **图 11-1.** Oracle 的自动 SQL 调优工具


    本章的前几个实践方法涉及`自动 SQL 调优`功能。你将学习如何确定自动作业是否启用以及何时运行，以及如何修改其特性。本章中间部分重点介绍如何创建和管理 SQL
    调优集。SQL 调优集被广泛用作各种 Oracle 性能调优工具的输入。最后，本章向你展示如何手动运行`SQL 调优建议器`和`ADDM`，为 SQL 语句生成性能建议。


    ![images](img/square.jpg) **注意** 在本章的示例中，我们侧重于向你展示如何通过 SQL 和内置 PL/SQL 包来使用功能。虽然我们确实展示了一些来自`Enterprise
    Manager`的截图，但我们不关注图形工具的使用。无论`Enterprise Manager`是否安装，你都应该能够使用 SQL 和 PL/SQL。此外，手动方法让你能够理解流程的每个环节，并在问题出现时帮助你进行诊断。


    ### 11-1. 显示自动 SQL 调优作业详细信息


    #### 问题


    你有一个 Oracle Database 11g 环境，并想确定`自动 SQL 调优`作业是否已启用并定期运行。如果作业已启用，你想显示其他方面信息，例如它何时启动以及执行多长时间。


    #### 解决方案


    使用以下查询来确定是否有任何`自动 SQL 调优`作业已启用：


    ```sql

    SELECT client_name, status, consumer_group, window_group

    FROM dba_autotask_client

    ORDER BY client_name;

    ```


    以下输出显示有三个启用的自动作业在运行，其中一个是`SQL 调优建议器`：


    ```

    CLIENT_NAME                      STATUS   CONSUMER_GROUP            WINDOW_GROUP

    ------------------------------- -------- ------------------------- --------------------

    sql tuning advisor              ENABLED  ORA$AUTOTASK_SQL_GROUP    ORA$AT_WGRP_SQ

    auto space advisor              ENABLED  ORA$AUTOTASK_SPACE_GROUP  ORA$AT_WGRP_SA

    auto optimizer stats collection ENABLED  ORA$AUTOTASK_STATS_GROUP  ORA$AT_WGRP_OS

    ```


    运行以下查询以查看`自动 SQL 调优建议器`作业最近几次的运行情况：


    ```sql

    SELECT task_name, status, TO_CHAR(execution_end,''DD-MON-YY HH24:MI'')

    FROM dba_advisor_executions

    WHERE task_name=''SYS_AUTO_SQL_TUNING_TASK''

    ORDER BY execution_end;

    ```


    以下是一些示例输出：


    ```

    TASK_NAME                      STATUS     TO_CHAR(EXECUTION_END

    ------------------------------ ---------- ---------------------

    SYS_AUTO_SQL_TUNING_TASK       COMPLETED   30-APR-11 06:00

    SYS_AUTO_SQL_TUNING_TASK       COMPLETED   01-MAY-11 06:02

    ```'
- fmt: "#### How It Works\n\nWhen you create a database in Oracle Database 11g or\
    \ higher, Oracle automatically implements three automatic maintenance jobs:\n\n\
    *   Automatic SQL Tuning Advisor\n*   Automatic Segment Advisor\n*   Automatic\
    \ Optimizer Statistics Collection\n\nThese tasks are automatically configured\
    \ to run in maintenance windows. A maintenance window is a specified time and\
    \ duration for the task to run. You can view the maintenance window details with\
    \ this query:\n\n```sql\nSELECT window_name,TO_CHAR(window_next_time,'DD-MON-YY\
    \ HH24:MI:SS')\n,sql_tune_advisor, optimizer_stats, segment_advisor\nFROM dba_autotask_window_clients;\n\
    ```\n\nHere's a snippet of the output for this example:\n\n```sql\nWINDOW_NAME\
    \      TO_CHAR(WINDOW_NEXT_TIME SQL_TUNE OPTIMIZE SEGMENT_\n---------------- ------------------------\
    \ -------- -------- --------\nTHURSDAY_WINDOW  28-APR-11 22:00:00       ENABLED\
    \  ENABLED  ENABLED\nFRIDAY_WINDOW    29-APR-11 22:00:00       ENABLED  ENABLED\
    \  ENABLED\nSATURDAY_WINDOW  30-APR-11 06:00:00       ENABLED  ENABLED  ENABLED\n\
    SUNDAY_WINDOW    01-MAY-11 06:00:00       ENABLED  ENABLED  ENABLED\n```\n\nThere\
    \ are several data dictionary views related to the automatically scheduled jobs.\
    \ See [Table 11-1](#Chapter11.html#tab_11_1) for descriptions of these views.\n\
    \n![images](images/t1101.jpg)\n\n### 11-2. Displaying Automatic SQL Tuning Advice\n\
    \n#### Problem\n\nYou're aware that Oracle automatically runs a daily job that\
    \ generates SQL tuning advice. You want to view the advice.\n\n#### Solution\n\
    \nIf you're using Oracle Database 11g Release 2 or higher, here's the quickest\
    \ way to display automatically generated SQL tuning advice:\n\n```sql\nSQL> SET\
    \ LINESIZE 80 PAGESIZE 0 LONG 100000\nSQL> SELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK\
    \ FROM DUAL;\n```\n\n![images](images/square.jpg) **Note** Starting with Oracle\
    \ Database 11g Release 2, the `DBMS_AUTO_SQLTUNE` package should be used (instead\
    \ of `DBMS_SQLTUNE`) for administrating automatic SQL tuning features. If you\
    \ are using an older release of Oracle, use `DBMS_SQLTUNE.REPORT_AUTO_TUNING_TASK`\
    \ to view automated SQL tuning advice.\n\nDepending on the activity in your database,\
    \ there may be a great deal of output. Here's a small sample of output from a\
    \ very active database:\n\n```sql\nGENERAL INFORMATION SECTION\n-------------------------------------------------------------------------------\n\
    Tuning Task Name                        : SYS_AUTO_SQL_TUNING_TASK\nTuning Task\
    \ Owner                       : SYS\nWorkload Type                           :\
    \ Automatic High-Load SQL Workload\nExecution Count                         :\
    \ 30\nCurrent Execution                       : EXEC_3483\nExecution Type    \
    \                      : TUNE SQL\nScope                                   : COMPREHENSIVE\n\
    .....\nCompletion Status                       : COMPLETED\nStarted at       \
    \                       : 04/10/2011 06:00:01\nCompleted at                  \
    \          : 04/10/2011 06:02:41\nNumber of Candidate SQLs                : 103\n\
    Cumulative Elapsed Time of SQL (s)      : 49124\n-------------------------------------------------------------------------------\n\
    SUMMARY SECTION\n-------------------------------------------------------------------------------\n\
    \                      Global SQL Tuning Result Statistics\n-------------------------------------------------------------------------------\n\
    Number of SQLs Analyzed                      : 103\nNumber of SQLs in the Report\
    \                 : 8\nNumber of SQLs with Findings                 : 8\nNumber\
    \ of SQLs with Alternative Plan Findings: 1\nNumber of SQLs with SQL profiles\
    \ recommended : 1\n-------------------------------------------------------------------------------\n\
    \    SQLs with Findings Ordered by Maximum (Profile/Index) Benefit, Object ID\n\
    -------------------------------------------------------------------------------\n\
    object ID  SQL ID        statistics profile(benefit) index(benefit) restructure\n\
    ---------- ------------- ---------- ---------------- -------------- -----------\n\
    \      9130 crx9h7tmwwv67                      51.44%\n```\n\n**AUTOMATICALLY\
    \ E-MAILING SQL OUTPUT**\n\nOn Linux/Unix systems, it's quite easy to automate\
    \ the e-mailing of output from a SQL script. First encapsulate the SQL in a shell\
    \ script, and then use a utility such as `cron` to automatically generate and\
    \ e-mail the output. Here's a sample shell script:\n\n```bash\n#!/bin/bash\nif\
    \ [ $# -ne 1 ]; then\n  echo \"Usage: $0 SID\"\n  exit 1\nfi\n# source oracle\
    \ OS variables\n. /var/opt/oracle/oraset $1\n#\nBOX=`uname -a | awk '{print$2}'`\n\
    OUTFILE=$HOME/bin/log/sqladvice.txt\n#\nsqlplus -s <<EOF\nmv_maint/foo\nSPO $OUTFILE\n\
    SET LINESIZE 80 PAGESIZE 0 LONG 100000\nSELECT DBMS_AUTO_SQLTUNE.REPORT_AUTO_TUNING_TASK\
    \ FROM DUAL;\nEOF\ncat $OUTFILE | mailx -s \"SQL Advice: $1 $BOX\" larry@oracle.com\n\
    exit 0\n```\n\nHere's the corresponding `cron` entry that runs the report on a\
    \ daily basis:\n\n```bash\n#-----------------------------------------------------------------\n\
    # SQL Advice report from SQL auto tuning\n16 11 * * * /orahome/oracle/bin/sqladvice.bsh\
    \ DWREP\n   1>/orahome/oracle/bin/log/sqladvice.log 2>&1\n#-----------------------------------------------------------------\n\
    ```\n\nIn the prior `cron` entry, the command was broken into two lines to fit\
