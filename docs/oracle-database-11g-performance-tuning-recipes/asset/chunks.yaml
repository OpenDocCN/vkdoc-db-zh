    ### 1-8. Displaying Automated Segment Advisor Advice


    #### Problem


    You have a poorly performing query accessing a table. Upon further investigation,
    you discover the table has only a few rows in it. You wonder why the query is
    taking so long when there are so few rows. You want to examine the output of the
    Segment Advisor to see if there are any space-related recommendations that might
    help with performance in this situation.


    #### Solution


    Use the Segment Advisor to display information regarding tables that may have
    space allocated to them (that was once used) but now the space is empty (due to
    a large number of deleted rows). Tables with large amounts of unused space can
    cause full table scan queries to perform poorly. This is because Oracle is scanning
    every block beneath the high-water mark, regardless of whether the blocks contain
    data.


    This solution focuses on accessing the Segment Advisor''s advice via the `DBMS_SPACE`
    PL/SQL package. This package retrieves information generated by the Segment Advisor
    regarding segments that may be candidates for shrinking, moving, or compressing.
    One simple and effective way to use the `DBMS_SPACE` package (to obtain Segment
    Advisor advice) is via a SQL query—for example:


    `SELECT`

    ` ''Segment Advice --------------------------''|| chr(10) ||`

    ` ''TABLESPACE_NAME  : '' || tablespace_name   || chr(10) ||`

    ` ''SEGMENT_OWNER    : '' || segment_owner     || chr(10) ||`

    ` ''SEGMENT_NAME     : '' || segment_name      || chr(10) ||`

    ` ''ALLOCATED_SPACE  : '' || allocated_space   || chr(10) ||`

    ` ''RECLAIMABLE_SPACE: '' || reclaimable_space || chr(10) ||`

    ` ''RECOMMENDATIONS  : '' || recommendations   || chr(10) ||`

    ` ''SOLUTION 1       : '' || c1                || chr(10) ||`

    ` ''SOLUTION 2       : '' || c2                || chr(10) ||`

    ` ''SOLUTION 3       : '' || c3 Advice`

    `FROM`

    `TABLE(dbms_space.asa_recommendations(''FALSE'', ''FALSE'', ''FALSE''));`


    Here is some sample output:


    `Segment Advice --------------------------`

    `TABLESPACE_NAME  : USERS`

    `SEGMENT_OWNER    : MV_MAINT`

    `SEGMENT_NAME     : F_REGS`

    `ALLOCATED_SPACE  : 20971520`

    `RECLAIMABLE_SPACE: 18209960`

    `RECOMMENDATIONS  : Perform re-org on the object F_REGS, estimated savings is
    182`

    `09960 bytes.`

    `SOLUTION 1       : Perform Reorg`

    `SOLUTION 2       :`

    `SOLUTION 3       :`


    In the prior output, the `F_REGS` table is a candidate for the shrink operation.
    It is consuming 20 MB, and 18 MB can be reclaimed.'
  trans: "#### 工作原理\n\n如果你需要在删除数据时选择回退（而非提交），那么应该使用 `DELETE` 语句。然而，`DELETE` 语句的缺点在于它会生成大量的撤销和重做信息。因此，对于大表而言，`TRUNCATE`\
    \ 语句通常是删除数据最高效的方式。\n\n`TRUNCATE` 语句的另一个特点是它会将表的高水位线重置为零。当你使用 `DELETE` 语句从表中删除数据时，高水位线并不会改变。使用\
    \ `TRUNCATE` 语句并重置高水位线的一个优势是，全表扫描查询只会搜索高水位线以下的数据块。这对于执行全表扫描的查询可能具有显著的性能影响。\n\n\
    `TRUNCATE` 语句的另一个副作用是，你无法截断一个父表，即使该父表的主键被子表中一个已启用的外键约束所引用——即使子表中没有任何行。在这种情况下，当尝试截断父表时，Oracle\
    \ 会抛出此错误：\n`ORA-02266: unique/primary keys in table referenced by enabled foreign\
    \ keys`\n\nOracle 阻止你截断父表，因为在多用户系统中，在你截断子表和随后截断父表之间，有可能另一个会话向子表中填充了数据。在这种情况下，你必须暂时禁用子表引用的外键约束，发出\
    \ `TRUNCATE` 语句，然后重新启用这些约束。\n\n将 `TRUNCATE` 的行为与 `DELETE` 语句进行比较。Oracle 确实允许你在约束启用的情况下使用\
    \ `DELETE` 语句从父表中删除行（假设子表中没有行）。这是因为 `DELETE` 会生成撤销记录，具有读一致性，并且可以被回滚。表 1-4 总结了\
    \ `DELETE` 和 `TRUNCATE` 之间的区别。\n\n如果你需要使用 `DELETE` 语句，你必须发出 `COMMIT` 或 `ROLLBACK`\
    \ 来完成事务。提交 `DELETE` 语句会使数据更改永久生效：\n\n```sql\nSQL> delete from computer_systems;\n\
    SQL> commit;\n```\n\n![images](img/square.jpg) **注意** 提交事务的其他（有时不那么明显）方式包括：发出后续的\
    \ DDL 语句（它会隐式提交会话中的活动事务），或正常退出客户端工具（如 SQL*Plus）。\n\n如果你发出的是 `ROLLBACK` 语句而非 `COMMIT`，那么表中的数据将恢复到执行\
    \ `DELETE` 之前的状态。\n\n在处理 DML 语句时，你可以通过查询 `V$TRANSACTION` 视图来确认事务的详细信息。例如，假设你刚刚向表中插入了数据；在你发出\
    \ `COMMIT` 或 `ROLLBACK` 之前，你可以查看当前连接会话的活动事务信息，如下所示：\n\n```sql\nSQL> insert into\
    \ computer_systems(cs_id) values(1);\nSQL> select xidusn, xidsqn from v$transaction;\n\
    \    XIDUSN      XIDSQN\n---------- ----------\n         3      12878\nSQL> commit;\n\
    SQL> select xidusn, xidsqn from v$transaction;\nno rows selected\n```\n\n![images](img/t0104.jpg)\n\
    \n![images](img/square.jpg) **注意** 另一种从表中删除数据的方法是删除并重新创建表。然而，这意味着你也必须重新创建属于该表的任何索引、约束、授权和触发器。此外，当你删除一个表时，在重新创建它并重新发出任何所需的授权之前，它会暂时不可用。通常，删除并重新创建表仅在开发或测试环境中是可以接受的。\n\
    \n### 1-8. 显示自动化段顾问建议\n\n#### 问题\n\n你有一个访问表的性能不佳的查询。经过进一步调查，你发现该表中只有几行数据。你很疑惑，当行数如此之少时，为什么查询会花费这么长时间。你想检查段顾问的输出，看看是否有任何与空间相关的建议可能有助于改善这种情况下的性能。\n\
    \n#### 解决方案\n\n使用段顾问来显示关于那些可能已分配空间（曾经被使用过）但现在空间为空（由于大量行被删除）的表的信息。具有大量未使用空间的表可能导致全表扫描查询性能低下。这是因为\
    \ Oracle 会扫描高水位线下的每个数据块，而不管这些数据块是否包含数据。\n\n此解决方案侧重于通过 `DBMS_SPACE` PL/SQL 包访问段顾问的建议。此包检索段顾问生成的关于可能适合收缩、移动或压缩的段的信息。使用\
    \ `DBMS_SPACE` 包（以获取段顾问建议）的一种简单有效的方法是通过 SQL 查询——例如：\n\n```sql\nSELECT\n 'Segment\
    \ Advice --------------------------'|| chr(10) ||\n 'TABLESPACE_NAME  : ' || tablespace_name\
    \   || chr(10) ||\n 'SEGMENT_OWNER    : ' || segment_owner     || chr(10) ||\n\
    \ 'SEGMENT_NAME     : ' || segment_name      || chr(10) ||\n 'ALLOCATED_SPACE\
    \  : ' || allocated_space   || chr(10) ||\n 'RECLAIMABLE_SPACE: ' || reclaimable_space\
    \ || chr(10) ||\n 'RECOMMENDATIONS  : ' || recommendations   || chr(10) ||\n 'SOLUTION\
    \ 1       : ' || c1                || chr(10) ||\n 'SOLUTION 2       : ' || c2\
    \                || chr(10) ||\n 'SOLUTION 3       : ' || c3 Advice\nFROM\nTABLE(dbms_space.asa_recommendations('FALSE',\
    \ 'FALSE', 'FALSE'));\n```\n\n以下是一些示例输出：\n\n```\nSegment Advice --------------------------\n\
    TABLESPACE_NAME  : USERS\nSEGMENT_OWNER    : MV_MAINT\nSEGMENT_NAME     : F_REGS\n\
    ALLOCATED_SPACE  : 20971520\nRECLAIMABLE_SPACE: 18209960\nRECOMMENDATIONS  : Perform\
    \ re-org on the object F_REGS, estimated savings is 18209960 bytes.\nSOLUTION\
    \ 1       : Perform Reorg\nSOLUTION 2       :\nSOLUTION 3       :\n```\n\n在前面的输出中，`F_REGS`\
    \ 表是收缩操作的候选对象。它占用了 20 MB 空间，其中 18 MB 可以被回收。"
- fmt: "## How It Works\n\nIn Oracle Database 10g R2 and later, Oracle automatically\
    \ schedules and runs a Segment Advisor job. This job analyzes segments in the\
    \ database and stores its findings in internal tables. The output of the Segment\
    \ Advisor contains findings (issues that may need to be resolved) and recommendations\
    \ (actions to resolve the findings). Findings from the Segment Advisor are of\
    \ the following types:\n\n*   Segments that are good candidates for shrink operations\n\
    *   Segments that have significant row chaining\n*   Segments that might benefit\
    \ from OLTP compression\n\nWhen viewing the Segment Advisor's findings and recommendations,\
    \ it's important to understand several aspects of this tool. First, the Segment\
    \ Advisor regularly calculates advice via an automatically scheduled `DBMS_SCHEDULER`\
    \ job. You can verify the last time the automatic job ran by querying the `DBA_AUTO_SEGADV_SUMMARY`\
    \ view:\n\n```sql\nselect\n segments_processed\n,end_time\nfrom dba_auto_segadv_summary\n\
    order by end_time;\n```\n\nHere is some sample output:\n\n```\nSEGMENTS_PROCESSED\
    \ END_TIME\n------------------ ----------------------------\n                \
    \ 9 30-JAN-11 02.02.46.414424 PM\n                11 30-JAN-11 06.03.44.500178\
    \ PM\n                17 30-JAN-11 10.04.35.688915 PM\n```\n\nYou can compare\
    \ the `END_TIME` date to the current date to determine if the Segment Advisor\
    \ is running on a regular basis.\n\n![images](images/square.jpg) **Note** In addition\
    \ to automatically generated segment advice, you have the option of manually executing\
    \ the Segment Advisor to generate advice on specific tablespaces, tables, and\
    \ indexes (see Recipe 1-9 for details).\n\nWhen the Segment Advisor executes,\
    \ it uses the Automatic Workload Repository (AWR) for the source of information\
    \ for its analysis. For example, the Segment Advisor examines usage and growth\
    \ statistics in the AWR to generate segment advice. When the Segment Advisor runs,\
    \ it generates advice and stores the output in internal database tables. The advice\
    \ and recommendations can be viewed via data dictionary views such as the following:\n\
    \n*   `DBA_ADVISOR_EXECUTIONS`\n*   `DBA_ADVISOR_FINDINGS`\n*   `DBA_ADVISOR_OBJECTS`\n\
    \nThere are three different tools for retrieving the Segment Advisor's output:\n\
    \n*   Executing `DBMS_SPACE.ASA_RECOMMENDATIONS`\n*   Manually querying `DBA_ADVISOR_*`\
    \ views\n*   Viewing Enterprise Manager's graphical screens\n\nIn the “Solution”\
    \ section, we described how to use the `DBMS_SPACE.ASA_RECOMMENDATIONS` procedure\
    \ to retrieve the Segment Advisor advice. The `ASA_RECOMMENDATIONS` output can\
    \ be modified via three input parameters, which are described in [Table 1-5](#Chapter01.html#tab_1_5).\
    \ For example, you can instruct the procedure to show information generated when\
    \ you have manually executed the Segment Advisor.\n\n![images](images/t0105.jpg)\n\
    \nYou can also directly query the data dictionary views to view the advice of\
    \ the Segment Advisor. Here's a query that displays Segment Advisor advice generated\
    \ within the last day:\n\n```sql\nselect\n 'Task Name        : ' || f.task_name\
    \  || chr(10) ||\n 'Start Run Time   : ' || TO_CHAR(execution_start, 'dd-mon-yy\
    \ hh24:mi') || chr (10) ||\n 'Segment Name     : ' || o.attr2    || chr(10) ||\n\
    \ 'Segment Type     : ' || o.type       || chr(10) ||\n 'Partition Name   : '\
    \ || o.attr3      || chr(10) ||\n 'Message          : ' || f.message    || chr(10)\
    \ ||\n 'More Info        : ' || f.more_info  || chr(10) ||\n '------------------------------------------------------'\
    \ Advice\nFROM dba_advisor_findings   f\n    ,dba_advisor_objects    o\n    ,dba_advisor_executions\
    \ e\nWHERE o.task_id   = f.task_id\nAND   o.object_id = f.object_id\nAND   f.task_id\
    \   = e.task_id\nAND   e. execution_start > sysdate - 1\nAND   e.advisor_name\
    \ = 'Segment Advisor'\nORDER BY f.task_name;\n```\n\nHere is some sample output:\n\
    \n```\nTask Name        : SYS_AUTO_SPCADV_53092205022011\nStart Run Time   : 05-feb-11\
    \ 22:09\nSegment Name     : CWP_USER_PROFILE\nSegment Type     : TABLE\nPartition\
    \ Name   :\nMessage          : Compress object REP_MV.CWP_USER_PROFILE, estimated\
    \ savings is\n 3933208576 bytes.\nMore Info        : Allocated Space:3934257152:\
    \ Used Space:10664: Reclaimable Spa\nce :3933208576:\n------------------------------------------------------\n\
    ```\n\nThe prior output indicates that a table segment is a candidate for compression.\
    \ The allocated, used, and reclaimable space numbers are displayed to help you\
    \ determine the space savings.\n\nYou can also view Segment Advisor advice from\
    \ Enterprise Manager. To view the advice, first navigate to the Advisor Central\
    \ page. Next navigate to the Segment Advisor page. Then navigate to the Segment\
    \ Advisor Recommendations. This page will display any recent Segment Advisor findings\
    \ and recommendations.\n\n### 1-9. Manually Generating Segment Advisor Advice\n\
    \n#### Problem\n\nYou have a table that experiences a large amount of updates.\
    \ You have noticed that the query performance against this table has slowed down.\
    \ You suspect the table may be experiencing poor performance due to row chaining.\
    \ Therefore you want to manually confirm with the Segment Advisor that a table\
    \ has issues with row chaining."
  raw: '#### How It Works


    In Oracle Database 10g R2 and later, Oracle automatically schedules and runs a
    Segment Advisor job. This job analyzes segments in the database and stores its
    findings in internal tables. The output of the Segment Advisor contains findings
    (issues that may need to be resolved) and recommendations (actions to resolve
    the findings). Findings from the Segment Advisor are of the following types:


    *   Segments that are good candidates for shrink operations

    *   Segments that have significant row chaining

    *   Segments that might benefit from OLTP compression


    When viewing the Segment Advisor''s findings and recommendations, it''s important
    to understand several aspects of this tool. First, the Segment Advisor regularly
    calculates advice via an automatically scheduled `DBMS_SCHEDULER` job. You can
    verify the last time the automatic job ran by querying the `DBA_AUTO_SEGADV_SUMMARY`
    view:


    `select`

    ` segments_processed`

    `,end_time`

    `from dba_auto_segadv_summary`

    `order by end_time;`


    Here is some sample output:


    `SEGMENTS_PROCESSED END_TIME`

    `------------------ ----------------------------`

    `                 9 30-JAN-11 02.02.46.414424 PM`

    `                11 30-JAN-11 06.03.44.500178 PM`

    `                17 30-JAN-11 10.04.35.688915 PM`


    You can compare the END_TIME date to the current date to determine if the Segment
    Advisor is running on a regular basis.


    ![images](images/square.jpg) **Note** In addition to automatically generated segment
    advice, you have the option of manually executing the Segment Advisor to generate
    advice on specific tablespaces, tables, and indexes (see Recipe 1-9 for details).


    When the Segment Advisor executes, it uses the Automatic Workload Repository (AWR)
    for the source of information for its analysis. For example, the Segment Advisor
    examines usage and growth statistics in the AWR to generate segment advice. When
    the Segment Advisor runs, it generates advice and stores the output in internal
    database tables. The advice and recommendations can be viewed via data dictionary
    views such as the following:


    *   `DBA_ADVISOR_EXECUTIONS`

    *   `DBA_ADVISOR_FINDINGS`

    *   `DBA_ADVISOR_OBJECTS`


    There are three different tools for retrieving the Segment Advisor''s output:


    *   Executing `DBMS_SPACE.ASA_RECOMMENDATIONS`

    *   Manually querying `DBA_ADVISOR_*` views

    *   Viewing Enterprise Manager''s graphical screens


    In the “Solution” section, we described how to use the `DBMS_SPACE.ASA_RECOMMENDATIONS`
    procedure to retrieve the Segment Advisor advice. The `ASA_RECOMMENDATIONS` output
    can be modified via three input parameters, which are described in [Table 1-5](#Chapter01.html#tab_1_5).
    For example, you can instruct the procedure to show information generated when
    you have manually executed the Segment Advisor.


    ![images](images/t0105.jpg)


    You can also directly query the data dictionary views to view the advice of the
    Segment Advisor. Here''s a query that displays Segment Advisor advice generated
    within the last day:


    `select`

    ` ''Task Name        : '' || f.task_name  || chr(10) ||`

    ` ''Start Run Time   : '' || TO_CHAR(execution_start, ''dd-mon-yy hh24:mi'') ||
    chr (10) ||`

    ` ''Segment Name     : '' || o.attr2    || chr(10) ||`

    ` ''Segment Type     : '' || o.type       || chr(10) ||`

    ` ''Partition Name   : '' || o.attr3      || chr(10) ||`

    ` ''Message          : '' || f.message    || chr(10) ||`

    ` ''More Info        : '' || f.more_info  || chr(10) ||`

    ` ''------------------------------------------------------'' Advice`

    `FROM dba_advisor_findings   f`

    `    ,dba_advisor_objects    o`

    `    ,dba_advisor_executions e`

    `WHERE o.task_id   = f.task_id`

    `AND   o.object_id = f.object_id`

    `AND   f.task_id   = e.task_id`

    `AND   e. execution_start > sysdate - 1`

    `AND   e.advisor_name = ''Segment Advisor''`

    `ORDER BY f.task_name;`


    Here is some sample output:


    `Task Name        : SYS_AUTO_SPCADV_53092205022011`

    `Start Run Time   : 05-feb-11 22:09`

    `Segment Name     : CWP_USER_PROFILE`

    `Segment Type     : TABLE`

    `Partition Name   :`

    `Message          : Compress object REP_MV.CWP_USER_PROFILE, estimated savings
    is`

    ` 3933208576 bytes.`

    `More Info        : Allocated Space:3934257152: Used Space:10664: Reclaimable
    Spa`

    `ce :3933208576:`

    `------------------------------------------------------`


    The prior output indicates that a table segment is a candidate for compression.
    The allocated, used, and reclaimable space numbers are displayed to help you determine
    the space savings.


    You can also view Segment Advisor advice from Enterprise Manager. To view the
    advice, first navigate to the Advisor Central page. Next navigate to the Segment
    Advisor page. Then navigate to the Segment Advisor Recommendations. This page
    will display any recent Segment Advisor findings and recommendations.


    ### 1-9. Manually Generating Segment Advisor Advice


    #### Problem


    You have a table that experiences a large amount of updates. You have noticed
    that the query performance against this table has slowed down. You suspect the
    table may be experiencing poor performance due to row chaining. Therefore you
    want to manually confirm with the Segment Advisor that a table has issues with
    row chaining.'
  trans: "## 工作原理\n\n在 Oracle Database 10g R2 及更高版本中，Oracle 会自动调度并运行一个“段顾问”作业。此作业分析数据库中的段，并将其发现的结果存储在内部表中。段顾问的输出包含发现（可能需要解决的问题）和建议（用于解决问题的操作）。段顾问的发现分为以下几种类型：\n\
    \n*   适合执行收缩操作的段\n*   存在严重行链接的段\n*   可能受益于 OLTP 压缩的段\n\n在查看段顾问的发现和建议时，了解该工具的几个方面非常重要。首先，段顾问通过一个自动调度的\
    \ `DBMS_SCHEDULER` 作业定期计算建议。您可以通过查询 `DBA_AUTO_SEGADV_SUMMARY` 视图来确认自动作业上次运行的时间：\n\
    \n```sql\nselect\n segments_processed\n,end_time\nfrom dba_auto_segadv_summary\n\
    order by end_time;\n```\n\n以下是一些示例输出：\n\n```\nSEGMENTS_PROCESSED END_TIME\n------------------\
    \ ----------------------------\n                 9 30-JAN-11 02.02.46.414424 PM\n\
    \                11 30-JAN-11 06.03.44.500178 PM\n                17 30-JAN-11\
    \ 10.04.35.688915 PM\n```\n\n您可以将 `END_TIME` 日期与当前日期进行比较，以确定段顾问是否定期运行。\n\n![images](img/square.jpg)\
    \ **注意** 除了自动生成的段建议外，您还可以选择手动执行段顾问，以针对特定的表空间、表和索引生成建议（详情请参阅配方 1-9）。\n\n当段顾问执行时，它使用自动工作负载仓库\
    \ (AWR) 作为其分析的信息来源。例如，段顾问检查 AWR 中的使用情况和增长统计信息以生成段建议。段顾问运行时，会生成建议并将输出存储在内部数据库表中。可以通过以下数据字典视图查看这些建议和推荐：\n\
    \n*   `DBA_ADVISOR_EXECUTIONS`\n*   `DBA_ADVISOR_FINDINGS`\n*   `DBA_ADVISOR_OBJECTS`\n\
    \n有三种不同的工具可用于检索段顾问的输出：\n\n*   执行 `DBMS_SPACE.ASA_RECOMMENDATIONS`\n*   手动查询 `DBA_ADVISOR_*`\
    \ 视图\n*   查看企业管理器的图形界面\n\n在“解决方案”部分，我们描述了如何使用 `DBMS_SPACE.ASA_RECOMMENDATIONS`\
    \ 过程来获取段顾问建议。`ASA_RECOMMENDATIONS` 的输出可以通过三个输入参数进行修改，这些参数在 表 1-5 中进行了描述。例如，您可以指示该过程显示在手动执行段顾问时生成的信息。\n\
    \n![images](img/t0105.jpg)\n\n您也可以直接查询数据字典视图来查看段顾问的建议。以下是一个显示过去一天内生成的段顾问建议的查询：\n\
    \n```sql\nselect\n 'Task Name        : ' || f.task_name  || chr(10) ||\n 'Start\
    \ Run Time   : ' || TO_CHAR(execution_start, 'dd-mon-yy hh24:mi') || chr (10)\
    \ ||\n 'Segment Name     : ' || o.attr2    || chr(10) ||\n 'Segment Type     :\
    \ ' || o.type       || chr(10) ||\n 'Partition Name   : ' || o.attr3      || chr(10)\
    \ ||\n 'Message          : ' || f.message    || chr(10) ||\n 'More Info      \
    \  : ' || f.more_info  || chr(10) ||\n '------------------------------------------------------'\
    \ Advice\nFROM dba_advisor_findings   f\n    ,dba_advisor_objects    o\n    ,dba_advisor_executions\
    \ e\nWHERE o.task_id   = f.task_id\nAND   o.object_id = f.object_id\nAND   f.task_id\
    \   = e.task_id\nAND   e. execution_start > sysdate - 1\nAND   e.advisor_name\
    \ = 'Segment Advisor'\nORDER BY f.task_name;\n```\n\n以下是一些示例输出：\n\n```\nTask Name\
    \        : SYS_AUTO_SPCADV_53092205022011\nStart Run Time   : 05-feb-11 22:09\n\
    Segment Name     : CWP_USER_PROFILE\nSegment Type     : TABLE\nPartition Name\
    \   :\nMessage          : Compress object REP_MV.CWP_USER_PROFILE, estimated savings\
    \ is\n 3933208576 bytes.\nMore Info        : Allocated Space:3934257152: Used\
    \ Space:10664: Reclaimable Spa\nce :3933208576:\n------------------------------------------------------\n\
    ```\n\n前面的输出表明一个表段是压缩的候选对象。显示已分配空间、已用空间和可回收空间数字，以帮助您确定可节省的空间。\n\n您也可以从企业管理器查看段顾问建议。要查看建议，首先导航到“顾问中心”页面。接着导航到“段顾问”页面。然后导航到“段顾问建议”。此页面将显示任何最近的段顾问发现和建议。\n\
    \n### 1-9. 手动生成段顾问建议\n\n#### 问题\n\n您有一个经历了大量更新操作的表。您注意到对该表的查询性能已经下降。您怀疑该表可能由于行链接而性能不佳。因此，您想通过段顾问手动确认一个表是否存在行链接问题。"
- fmt: "### Solution\n\nYou can manually run the Segment Advisor and tell it to specifically\
    \ analyze all segments in a tablespace or look at a specific object (such as a\
    \ single table or index). You can manually generate advice for a specific segment\
    \ using the `DBMS_ADVISOR` package by executing the following steps:\n\n1.  Create\
    \ a task.\n2.  Assign an object to the task.\n3.  Set the task parameters.\n4.\
    \  Execute the task.\n\n![images](images/square.jpg) **Note** The database user\
    \ executing `DBMS_ADVISOR` needs the `ADVISOR` system privilege. This privilege\
    \ is administered via the `GRANT` statement.\n\nThe following example executes\
    \ the `DBMS_ADVISOR` package from an anonymous block of PL/SQL. The table being\
    \ examined is the `F_REGS` table.\n\n```sql\nDECLARE\n  my_task_id   number;\n\
    \  obj_id       number;\n  my_task_name varchar2(100);\n  my_task_desc varchar2(500);\n\
    BEGIN\n  my_task_name := 'F_REGS Advice';\n  my_task_desc := 'Manual Segment Advisor\
    \ Run';\n\n ---------\n -- Step 1\n ---------\n  dbms_advisor.create_task (\n\
    \  advisor_name => 'Segment Advisor',\n  task_id      => my_task_id,\n  task_name\
    \    => my_task_name,\n  task_desc    => my_task_desc);\n ---------\n -- Step\
    \ 2\n ---------\n  dbms_advisor.create_object (\n  task_name   => my_task_name,\n\
    \  object_type => 'TABLE',\n  attr1       => 'MV_MAINT',\n  attr2       => 'F_REGS',\n\
    \  attr3       => NULL,\n  attr4       => NULL,\n  attr5       => NULL,\n  object_id\
    \   => obj_id);\n ---------\n -- Step 3\n ---------\n  dbms_advisor.set_task_parameter(\n\
    \  task_name => my_task_name,\n  parameter => 'recommend_all',\n  value     =>\
    \ 'TRUE');\n ---------\n -- Step 4\n ---------\n  dbms_advisor.execute_task(my_task_name);\n\
    END;\n/\n```\n\nNow you can view Segment Advisor advice regarding this table by\
    \ executing the `DBMS_SPACE` package and instructing it to pull information from\
    \ a manual execution of the Segment Advisor (via the input parameters—see [Table\
    \ 1-6](#Chapter01.html#tab_1_6) for details)—for example:\n\n```sql\nSELECT\n\
    \ 'Segment Advice --------------------------'|| chr(10) ||\n 'TABLESPACE_NAME\
    \  : ' || tablespace_name   || chr(10) ||\n 'SEGMENT_OWNER    : ' || segment_owner\
    \     || chr(10) ||\n 'SEGMENT_NAME     : ' || segment_name      || chr(10) ||\n\
    \ 'ALLOCATED_SPACE  : ' || allocated_space   || chr(10) ||\n 'RECLAIMABLE_SPACE:\
    \ ' || reclaimable_space || chr(10) ||\n 'RECOMMENDATIONS  : ' || recommendations\
    \   || chr(10) ||\n 'SOLUTION 1       : ' || c1                || chr(10) ||\n\
    \ 'SOLUTION 2       : ' || c2                || chr(10) ||\n 'SOLUTION 3     \
    \  : ' || c3 Advice\nFROM\nTABLE(dbms_space.asa_recommendations('TRUE', 'TRUE',\
    \ 'FALSE'));\n```\n\nHere is some sample output:\n\n```\nSegment Advice --------------------------\n\
    TABLESPACE_NAME  : USERS\nSEGMENT_OWNER    : MV_MAINT\nSEGMENT_NAME     : F_REGS\n\
    ALLOCATED_SPACE  : 20971520\nRECLAIMABLE_SPACE: 18209960\nRECOMMENDATIONS  : Perform\
    \ re-org on the object F_REGS, estimated savings is 182\n09960 bytes.\nSOLUTION\
    \ 1       : Perform Reorg\nSOLUTION 2       :\nSOLUTION 3       :\n```\n\nYou\
    \ can also retrieve Segment Advisor advice by querying data dictionary views—for\
    \ example:\n\n```sql\nSELECT\n 'Task Name        : ' || f.task_name  || chr(10)\
    \ ||\n 'Segment Name     : ' || o.attr2      || chr(10) ||\n 'Segment Type   \
    \  : ' || o.type       || chr(10) ||\n 'Partition Name   : ' || o.attr3      ||\
    \ chr(10) ||\n 'Message          : ' || f.message    || chr(10) ||\n 'More Info\
    \        : ' || f.more_info TASK_ADVICE\nFROM dba_advisor_findings f\n    ,dba_advisor_objects\
    \  o\nWHERE o.task_id = f.task_id\nAND o.object_id = f.object_id\nAND f.task_name\
    \ like 'F_REGS Advice'\nORDER BY f.task_name;\n```\n\nIf the table has a potential\
    \ issue with row chaining, then the advice output will indicate it as follows:\n\
    \n```\nTASK_ADVICE\n--------------------------------------------------------------------------------\n\
    Task Name        : F_REGS Advice\nSegment Name     : F_REGS\nSegment Type    \
    \ : TABLE\nPartition Name   :\nMessage          : Perform re-org on the object\
    \ F_REGS, estimated savings is 182\n09960 bytes.\nMore Info        : Allocated\
    \ Space:20971520: Used Space:2761560: Reclaimable Spa\nce :18209960:\n```\n\n\
    ### How It Works\n\nThe `DBMS_ADVISOR` package is used to manually instruct the\
    \ Segment Advisor to generate advice for specific tables. This package contains\
    \ several procedures that perform operations such as creating and executing a\
    \ task. [Table 1-6](#Chapter01.html#tab_1_6) lists the procedures relevant to\
    \ the Segment Advisor.\n\n![images](images/t0106.jpg)\n\nThe Segment Advisor can\
    \ be invoked with various degrees of granularity. For example, you can generate\
    \ advice for all objects in a tablespace or advice for a specific table, index,\
    \ or partition. [Table 1-7](#Chapter01.html#tab_1_7) lists the object types for\
    \ which Segment Advisor advice can be obtained via the `DBMS_ADVISOR.CREATE_TASK`\
    \ procedure.\n\n![images](images/t0107.jpg)\n\n![images](images/t0107a.jpg)\n\n\
    You can also specify a maximum amount of time that you want the Segment Advisor\
    \ to run. This is controlled via the `SET_TASK_PARAMETER` procedure. This procedure\
    \ also controls the type of advice that is generated. [Table 1-8](#Chapter01.html#tab_1_8)\
    \ describes valid inputs for this procedure.\n\n![images](images/t0108.jpg)\n\n\
    ## 1-10. Automatically E-mailing Segment Advisor Output\n\n### Problem\n\nYou\
    \ realize that the Segment Advisor automatically generates advice and want to\
    \ automatically e-mail yourself Segment Advisor output.\n\n### Solution\n\nFirst\
    \ encapsulate the SQL that displays the Segment Advisor output in a shell script—for\
    \ example:\n\n```bash\n#!/bin/bash\nif [ $# -ne 1 ]; then\n  echo \"Usage: $0\
    \ SID\"\n  exit 1\nfi\n# source oracle OS variables\n. /var/opt/oracle/oraset\
    \ $1\n#\n BOX=`uname -a | awk '{print$2}'`\n#\nsqlplus -s <<EOF\nmv_maint/foo\n\
    spo $HOME/bin/log/seg.txt\nset lines 80\nset pages 100\nSELECT\n 'Segment Advice\
    \ --------------------------'|| chr(10) ||\n 'TABLESPACE_NAME  : ' || tablespace_name\
    \   || chr(10) ||\n 'SEGMENT_OWNER    : ' || segment_owner     || chr(10) ||\n\
    \ 'SEGMENT_NAME     : ' || segment_name      || chr(10) ||\n 'ALLOCATED_SPACE\
    \  : ' || allocated_space   || chr(10) ||\n 'RECLAIMABLE_SPACE: ' || reclaimable_space\
    \ || chr(10) ||\n 'RECOMMENDATIONS  : ' || recommendations   || chr(10) ||\n 'SOLUTION\
    \ 1       : ' || c1                || chr(10) ||\n 'SOLUTION 2       : ' || c2\
    \                || chr(10) ||\n 'SOLUTION 3       : ' || c3 Advice\nFROM\nTABLE(dbms_space.asa_recommendations('FALSE',\
    \ 'FALSE', 'FALSE'));\nEOF\ncat $HOME/bin/log/seg.txt | mailx -s \"Seg. rpt. on\
    \ DB: $1 $BOX\" dkuhn@oracle.com\nexit 0\n```\n\nThe prior shell script can be\
    \ regularly executed from a Linux/Unix utility such as `cron`. Here is a sample\
    \ `cron` entry:\n\n```\n# Segment Advisor report\n16 11 * * * /orahome/oracle/bin/seg.bsh\
    \ DWREP\n```\n\nIn this way, you automatically receive segment advice and proactively\
    \ resolve issues before they become performance problems.\n\n### How It Works\n\
    \nThe Segment Advisor automatically generates advice on a regular basis. Sometimes\
    \ it's handy to proactively send yourself the recommendations. This allows you\
    \ to periodically review the output and implement suggestions that make sense.\n\
    \nThe shell script in the “Solution” section contains a line near the top where\
    \ the OS variables are established through running an `oraset` script. This is\
    \ a custom script that is the equivalent of the `oraset` script provided by Oracle.\
    \ You can use a script to set the OS variables or hard-code the required lines\
    \ into the script. Calling a script to set the variables is more flexible and\
    \ maintainable, as it allows you to use as input any database name that appears\
    \ in the `oratab` file.\n\n## 1-11. Rebuilding Rows Spanning Multiple Blocks"
  raw: '#### Solution


    You can manually run the Segment Advisor and tell it to specifically analyze all
    segments in a tablespace or look at a specific object (such as a single table
    or index). You can manually generate advice for a specific segment using the `DBMS_ADVISOR`
    package by executing the following steps:


    1.  Create a task.

    2.  Assign an object to the task.

    3.  Set the task parameters.

    4.  Execute the task.


    ![images](images/square.jpg) **Note** The database user executing `DBMS_ADVISOR`
    needs the `ADVISOR` system privilege. This privilege is administered via the `GRANT`
    statement.


    The following example executes the `DBMS_ADVISOR` package from an anonymous block
    of PL/SQL. The table being examined is the `F_REGS` table.


    `DECLARE`

    `  my_task_id   number;`

    `  obj_id       number;`

    `  my_task_name varchar2(100);`

    `  my_task_desc varchar2(500);`

    `BEGIN`

    `  my_task_name := ''F_REGS Advice'';`

    `  my_task_desc := ''Manual Segment Advisor Run'';`


    `---------`

    `-- Step 1`

    `---------`

    `  dbms_advisor.create_task (`

    `  advisor_name => ''Segment Advisor'',`

    `  task_id      => my_task_id,`

    `  task_name    => my_task_name,`

    `  task_desc    => my_task_desc);`

    `---------`

    `-- Step 2`

    `---------`

    `  dbms_advisor.create_object (`

    `  task_name   => my_task_name,`

    `  object_type => ''TABLE'',`

    `  attr1       => ''MV_MAINT'',`

    `  attr2       => ''F_REGS'',`

    `  attr3       => NULL,`

    `  attr4       => NULL,`

    `  attr5       => NULL,`

    `  object_id   => obj_id);`

    `---------`

    `-- Step 3`

    `---------`

    `  dbms_advisor.set_task_parameter(`

    `  task_name => my_task_name,`

    `  parameter => ''recommend_all'',`

    `  value     => ''TRUE'');`

    `---------`

    `-- Step 4`

    `---------`

    `  dbms_advisor.execute_task(my_task_name);`

    `END;`

    `/`


    Now you can view Segment Advisor advice regarding this table by executing the
    `DBMS_SPACE` package and instructing it to pull information from a manual execution
    of the Segment Advisor (via the input parameters—see [Table 1-6](#Chapter01.html#tab_1_6)
    for details)—for example:


    `SELECT`

    ` ''Segment Advice --------------------------''|| chr(10) ||`

    ` ''TABLESPACE_NAME  : '' || tablespace_name   || chr(10) ||`

    ` ''SEGMENT_OWNER    : '' || segment_owner     || chr(10) ||`

    ` ''SEGMENT_NAME     : '' || segment_name      || chr(10) ||`

    ` ''ALLOCATED_SPACE  : '' || allocated_space   || chr(10) ||`

    ` ''RECLAIMABLE_SPACE: '' || reclaimable_space || chr(10) ||`

    ` ''RECOMMENDATIONS  : '' || recommendations   || chr(10) ||`

    ` ''SOLUTION 1       : '' || c1                || chr(10) ||`

    ` ''SOLUTION 2       : '' || c2                || chr(10) ||`

    ` ''SOLUTION 3       : '' || c3 Advice`

    `FROM`

    `TABLE(dbms_space.asa_recommendations(''TRUE'', ''TRUE'', ''FALSE''));`


    Here is some sample output:


    `Segment Advice --------------------------`

    `TABLESPACE_NAME  : USERS`

    `SEGMENT_OWNER    : MV_MAINT`

    `SEGMENT_NAME     : F_REGS`

    `ALLOCATED_SPACE  : 20971520`

    `RECLAIMABLE_SPACE: 18209960`

    `RECOMMENDATIONS  : Perform re-org on the object F_REGS, estimated savings is
    182`

    `09960 bytes.`

    `SOLUTION 1       : Perform Reorg`

    `SOLUTION 2       :`

    `SOLUTION 3       :`


    You can also retrieve Segment Advisor advice by querying data dictionary views—for
    example:


    `SELECT`

    ` ''Task Name        : '' || f.task_name  || chr(10) ||`

    ` ''Segment Name     : '' || o.attr2      || chr(10) ||`

    ` ''Segment Type     : '' || o.type       || chr(10) ||`

    ` ''Partition Name   : '' || o.attr3      || chr(10) ||`

    ` ''Message          : '' || f.message    || chr(10) ||`

    ` ''More Info        : '' || f.more_info TASK_ADVICE`

    `FROM dba_advisor_findings f`

    `    ,dba_advisor_objects  o`

    `WHERE o.task_id = f.task_id`

    `AND o.object_id = f.object_id`

    `AND f.task_name like ''F_REGS Advice''`

    `ORDER BY f.task_name;`


