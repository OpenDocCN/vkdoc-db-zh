- fmt: "# How It Works\n\nWhen you receive the `ORA-01652` error, your normal tendency\
    \ is to check the temporary tablespace. You check the `DBA_TEMP_FREE_SPACE` view,\
    \ and there's plenty of free space in the default temporary tablespace, `TEMP`.\
    \ Well, if you look at the error message carefully, it tells you that the database\
    \ is unable to extend the temp segment in the `INDX_01` tablespace. When you create\
    \ an index, as in this case, you provide the name of the permanent tablespace\
    \ in which the database must create the new index. Oracle starts the creation\
    \ of the new index by putting the new index structure into a temporary segment\
    \ in the tablespace you specify (`INDX_01` in our example) for the index. The\
    \ reason is that if your index creation process fails, Oracle (to be more specific,\
    \ the SMON process) will remove the temporary segment from the tablespace you\
    \ specified for creating the new index. Once the index is successfully created\
    \ (or rebuilt), Oracle converts the temporary segment into a permanent segment\
    \ within the `INDX_01` tablespace. However, as long as Oracle is still creating\
    \ the index, the database deems it a temporary segment and thus when an index\
    \ creation fails, the database issues the `ORA-01652` error, which is also the\
    \ error code for an “out of space” error for a temporary tablespace. The `TEMP`\
    \ segment the error refers to is the segment that was holding the new index while\
    \ it was being built. Once you increase the size of the `INDX_01` tablespace,\
    \ the error will go away.\n\n![images](images/square.jpg) `Tip` The temporary\
    \ segment in an `ORA-1652` error message may not be referring to a temporary segment\
    \ in a temporary tablespace.\n\nThe key to resolving the `ORA-01652` error is\
    \ to understand that Oracle uses temporary segments in places other than a temporary\
    \ tablespace. While a temporary segment in the temporary tablespace is for activities\
    \ such as sorting, a permanent tablespace can also use temporary segments when\
    \ performing temporary actions necessary during the creation of a table (`CTAS`)\
    \ or an index.\n\n![images](images/square.jpg) `Tip` When you create an index,\
    \ the creation process uses two different temporary segments. One temporary segment\
    \ in the `TEMP` tablespace is used to sort the index data. Another temporary segment\
    \ in the permanent tablespace holds the index while it is being created. After\
    \ creating the index, Oracle changes the temporary segment in the index's tablespace\
    \ into a permanent segment. The same is the case when you create a table with\
    \ the `CREATE TABLE…AS SELECT` (`CTAS`) option.\n\nAs the “Solution” section explains,\
    \ the `ORA-01652` error refers to the tablespace where you're rebuilding an index.\
    \ If you are creating a new index, Oracle uses the temporary tablespace for sorting\
    \ the index data. When creating a large index, it may be a smart idea to create\
    \ a large temporary tablespace and assign it to the user who's creating the index.\
    \ Once the index is created, you can re-assign the user the original temporary\
    \ tablespace and remove the large temporary tablespace. This strategy helps avoid\
    \ enlarging the default temporary tablespace to a very large size to accommodate\
    \ the creation of a large index.\n\nIf you specify `autoextend` for a temporary\
    \ tablespace, the temp files may get very large, based on one or two large sorts\
    \ in the database. When you try to reclaim space for the `TEMP` tablespace, you\
    \ may get the following error.\n\n```sql\nSQL> alter database tempfile '/u01/app/oracle/oradata/prod1/temp01.dbf'\
    \ resize 500M;\nalter database tempfile '/u01/app/oracle/oradata/prod1/temp01.dbf'\
    \ resize 500M\n*ERROR at line 1:\nORA-03297: file contains used data beyond requested\
    \ RESIZE value\n```\n\nOne solution is to create a new temporary tablespace, make\
    \ that the default temporary tablespace, and then drop the larger temporary tablespace.\
    \ In Oracle Database 11g, you can simplify matters by using the following `alter\
    \ tablespace` command to shrink the temporary tablespace:\n\n```sql\nSQL> alter\
    \ tablespace temp shrink space;\n\nTablespace altered.\n\nSQL>\n```\n\nIn this\
    \ example, we shrank the entire temporary tablespace, but you can shrink a specific\
    \ tempfile by issuing the command `alter tablespace temp shrink tempfile <file_name>`.\
    \ The command will shrink the tempfile to the smallest size possible.\n\n## 7-7.\
    \ Resolving Open Cursor Errors\n\n### Problem\n\nYou are frequently getting the\
    \ `Maximum Open Cursors exceeded error`, and you want to resolve the error.\n\n\
    ### Solution\n\nOne of the first things you need to do when you receive the `ORA-01000`:\
    \ “maximum open cursors exceeded” error is to check the value of the initialization\
    \ parameter `open_cursors`. You can view the current limit for open cursors by\
    \ issuing the following command:\n\n```sql\nSQL> sho parameter open_cursors\n\n\
    NAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ---------\nopen_cursors                         integer     300\n\
    SQL>\n```\n\nThe parameter `OPEN_CURSORS` sets the maximum number of cursors a\
    \ session can have open at once. You specify this parameter to control the number\
    \ of open cursors. Keeping the parameter's value too low will result in a session\
    \ receiving the `ORA-01000` error. There's no harm in specifying a very large\
    \ value for the `OPEN_CURSORS` parameter (unless you expect all sessions to simultaneously\
    \ max out their cursors, which is unlikely), so you can usually resolve cursor-related\
    \ errors simply by raising the parameter value to a large number. However, you\
    \ may sometimes find that raising the value of the `open_cursors` parameter doesn't\
    \ “fix” the problem. In such cases, investigate which processes are using the\
    \ open cursors by issuing the following query:\n\n```sql\nSQL> select a.value,\
    \ s.username,s.sid,s.serial#,s.program,s.inst_id\n     from gv$sesstat a,gv$statname\
    \ b,gv$session s\n     where a.statistic# = b.statistic# and s.sid=a.sid\n   \
    \  and b.name='opened cursors current'\n```\n\nThe `GV$OPEN_CURSOR` (or the `V$OPEN_CURSOR`)\
    \ view shows all the cursors that each user session has currently opened and parsed,\
    \ or cached. You can issue the following query to identify the sessions with a\
    \ high number of opened and parsed or cached cursors.\n\n```sql\nSQL> select saddr,\
    \ sid, user_name, address,hash_value,sql_id, sql_text\n     from gv$open_cursor\n\
    \     where sid in\n     (select sid from v$open_cursor\n     group by sid having\
    \ count(*)  > &threshold);\n```\n\nThe query lists all sessions with an open cursor\
    \ count greater than the threshold you specify. This way, you can limit the query's\
    \ output and focus just on the sessions that have opened, parsed, or cached a\
    \ large number of cursors.\n\nYou can get the actual SQL code and the open cursor\
    \ count for a specific session by issuing the following query:\n\n```sql\nSQl>\
    \ select sql_id,substr(sql_text,1,50) sql_text, count(*)\n     from gv$open_cursor\
    \ where sid=81\n     group by sql_id,substr(sql_text,1,50)\n     order by sql_id;\n\
    ```\n\nThe output shows the SQL code for all open cursors in the session with\
    \ the SID 81. You can examine all SQL statements with a high open cursor count,\
    \ to see why the session was keeping a large number of cursors open."
  raw: '#### How It Works


    When you receive the `ORA-01652` error, your normal tendency is to check the temporary
    tablespace. You check the `DBA_TEMP_FREE_SPACE` view, and there''s plenty of free
    space in the default temporary tablespace, `TEMP`. Well, if you look at the error
    message carefully, it tells you that the database is unable to extend the temp
    segment in the `INDX_01` tablespace. When you create an index, as in this case,
    you provide the name of the permanent tablespace in which the database must create
    the new index. Oracle starts the creation of the new index by putting the new
    index structure into a temporary segment in the tablespace you specify (`INDX_01`
    in our example) for the index. The reason is that if your index creation process
    fails, Oracle (to be more specific, the SMON process) will remove the temporary
    segment from the tablespace you specified for creating the new index. Once the
    index is successfully created (or rebuilt), Oracle converts the temporary segment
    into a permanent segment within the `INDX_01` tablespace. However, as long as
    Oracle is still creating the index, the database deems it a temporary segment
    and thus when an index creation fails, the database issues the `ORA-01652` error,
    which is also the error code for an “out of space” error for a temporary tablespace.
    The `TEMP` segment the error refers to is the segment that was holding the new
    index while it was being built.  Once you increase the size of the `INDX_01` tablespace,
    the error will go away.


    ![images](images/square.jpg) **Tip** The temporary segment in an `ORA-1652` error
    message may not be referring to a temporary segment in a temporary tablespace.


    The key to resolving the `ORA-01652` error is to understand that Oracle uses temporary
    segments in places other than a temporary tablespace. While a temporary segment
    in the temporary tablespace is for activities such as sorting, a permanent tablespace
    can also use temporary segments when performing temporary actions necessary during
    the creation of a table (`CTAS`) or an index.


    ![images](images/square.jpg) **Tip** When you create an index, the creation process
    uses two different temporary segments. One temporary segment in the `TEMP` tablespace
    is used to sort the index data. Another temporary segment in the permanent tablespace
    holds the index while it is being created. After creating the index, Oracle changes
    the temporary segment in the index''s tablespace into a permanent segment. The
    same is the case when you create a table with the `CREATE TABLE…AS SELECT` (`CTAS`)
    option.


    As the “Solution” section explains, the `ORA-01652` error refers to the tablespace
    where you''re rebuilding an index. If you are creating a new index, Oracle uses
    the temporary tablespace for sorting the index data. When creating a large index,
    it may be a smart idea to create a large temporary tablespace and assign it to
    the user who''s creating the index. Once the index is created, you can re-assign
    the user the original temporary tablespace and remove the large temporary tablespace.
    This strategy helps avoid enlarging the default temporary tablespace to a very
    large size to accommodate the creation of a large index.


    If you specify `autoextend` for a temporary tablespace, the temp files may get
    very large, based on one or two large sorts in the database. When you try to reclaim
    space for the `TEMP` tablespace, you may get the following error.


    `SQL> alter database tempfile ''/u01/app/oracle/oradata/prod1/temp01.dbf'' resize
    500M;`

    `alter database tempfile ''/u01/app/oracle/oradata/prod1/temp01.dbf'' resize 500M`

    `*ERROR at line 1:`

    `ORA-03297: file contains used data beyond requested RESIZE value`


    One solution is to create a new temporary tablespace, make that the default temporary
    tablespace, and then drop the larger temporary tablespace. In Oracle Database
    11g, you can simplify matters by using the following `alter tablespace` command
    to shrink the temporary tablespace:


    `SQL> alter tablespace temp shrink space;`


    `Tablespace altered.`


    `SQL>`


    In this example, we shrank the entire temporary tablespace, but you can shrink
    a specific tempfile by issuing the command `alter tablespace temp shrink tempfile
    <file_name>`. The command will shrink the tempfile to the smallest size possible.


    ### 7-7\. Resolving Open Cursor Errors


    #### Problem


    You are frequently getting the `Maximum Open Cursors exceeded error`, and you
    want to resolve the error.


    #### Solution


    One of the first things you need to do when you receive the `ORA-01000`: “maximum
    open cursors exceeded” error is to check the value of the initialization parameter
    `open_cursors`. You can view the current limit for open cursors by issuing the
    following command:


    `SQL> sho parameter open_cursors`


    `NAME                                 TYPE        VALUE`

    `------------------------------------ ----------- ---------`

    `open_cursors                         integer     300`

    `SQL>`


    The parameter `OPEN_CURSORS` sets the maximum number of cursors a session can
    have open at once. You specify this parameter to control the number of open cursors.
    Keeping the parameter''s value too low will result in a session receiving the
    `ORA-01000` error. There''s no harm in specifying a very large value for the `OPEN_CURSORS`
    parameter (unless you expect all sessions to simultaneously max out their cursors,
    which is unlikely), so you can usually resolve cursor-related errors simply by
    raising the parameter value to a large number. However, you may sometimes find
    that raising the value of the `open_cursors` parameter doesn''t “fix” the problem.
    In such cases, investigate which processes are using the open cursors by issuing
    the following query:


    `SQL> select a.value, s.username,s.sid,s.serial#,s.program,s.inst_id`

    `     from gv$sesstat a,gv$statname b,gv$session s`

    `     where a.statistic# = b.statistic# and s.sid=a.sid`

    `     and b.name=''opened cursors current''`


    The `GV$OPEN_CURSOR` (or the `V$OPEN_CURSOR`) view shows all the cursors that
    each user session has currently opened and parsed, or cached. You can issue the
    following query to identify the sessions with a high number of opened and parsed
    or cached cursors.


    `SQL> select saddr, sid, user_name, address,hash_value,sql_id, sql_text`

    `     from gv$open_cursor`

    `     where sid in`

    `     (select sid from v$open_cursor`

    `     group by sid having count(*)  > &threshold);`


    The query lists all sessions with an open cursor count greater than the threshold
    you specify. This way, you can limit the query''s output and focus just on the
    sessions that have opened, parsed, or cached a large number of cursors.


    You can get the actual SQL code and the open cursor count for a specific session
    by issuing the following query:


    `SQl> select sql_id,substr(sql_text,1,50) sql_text, count(*)`

    `     from gv$open_cursor where sid=81`

    `     group by sql_id,substr(sql_text,1,50)`

    `     order by sql_id;`


    The output shows the SQL code for all open cursors in the session with the SID
    81\. You can examine all SQL statements with a high open cursor count, to see
    why the session was keeping a large number of cursors open.'
  trans: "\n# 工作原理\n\n当您收到 `ORA-01652` 错误时，通常的第一反应是检查临时表空间。您会查看 `DBA_TEMP_FREE_SPACE`\
    \ 视图，发现默认临时表空间 `TEMP` 中有大量空闲空间。但是，如果您仔细查看错误信息，它会告诉您数据库无法在 `INDX_01` 表空间中扩展临时段。当您像在此例中一样创建索引时，您需要提供数据库创建新索引时必须使用的永久表空间的名称。Oracle\
    \ 开始创建新索引时，会将新的索引结构放入您为索引指定的表空间（我们的例子中是 `INDX_01`）的一个临时段中。原因是，如果您的索引创建过程失败，Oracle（更具体地说，是\
    \ SMON 进程）会从您指定用于创建新索引的表空间中删除该临时段。一旦索引成功创建（或重建），Oracle 会将临时段转换为 `INDX_01` 表空间中的一个永久段。然而，只要\
    \ Oracle 仍在创建索引，数据库就会将其视为临时段，因此当索引创建失败时，数据库会发出 `ORA-01652` 错误，这也是临时表空间“空间不足”错误的错误代码。错误中提到的\
    \ `TEMP` 段，是指在构建过程中保存新索引的那段空间。一旦您增大了 `INDX_01` 表空间的大小，错误就会消失。\n\n![images](img/square.jpg)\
    \ `提示` `ORA-1652` 错误消息中的临时段可能并非指临时表空间中的临时段。\n\n解决 `ORA-01652` 错误的关键在于理解，Oracle\
    \ 在临时表空间之外的地方也会使用临时段。临时表空间中的临时段用于排序等活动，而永久表空间在执行创建表（`CTAS`）或索引所需的临时操作时，也可以使用临时段。\n\
    \n![images](img/square.jpg) `提示` 当您创建索引时，创建过程会使用两个不同的临时段。一个位于 `TEMP` 表空间的临时段用于对索引数据进行排序。另一个位于永久表空间的临时段则在索引创建期间保存索引。索引创建完成后，Oracle\
    \ 会将索引表空间中的临时段更改为永久段。使用 `CREATE TABLE…AS SELECT`（`CTAS`）选项创建表时，情况也是如此。\n\n如“解决方案”部分所述，`ORA-01652`\
    \ 错误指的是您正在重建索引的表空间。如果您正在创建新索引，Oracle 会使用临时表空间对索引数据进行排序。在创建大型索引时，明智的做法可能是创建一个大型临时表空间并将其分配给正在创建索引的用户。索引创建完成后，您可以为该用户重新分配原始临时表空间，并删除那个大型临时表空间。此策略有助于避免为容纳大型索引的创建而将默认临时表空间扩展得非常大。\n\
    \n如果您为临时表空间指定了 `autoextend`，临时文件可能会变得非常大，这取决于数据库中一两次大型排序操作。当您尝试回收 `TEMP` 表空间的空间时，可能会遇到以下错误。\n\
    \n```sql\nSQL> alter database tempfile '/u01/app/oracle/oradata/prod1/temp01.dbf'\
    \ resize 500M;\nalter database tempfile '/u01/app/oracle/oradata/prod1/temp01.dbf'\
    \ resize 500M\n*ERROR at line 1:\nORA-03297: file contains used data beyond requested\
    \ RESIZE value\n```\n\n一种解决方案是创建一个新的临时表空间，将其设为默认临时表空间，然后删除那个较大的临时表空间。在 Oracle\
    \ Database 11g 中，您可以通过使用以下 `alter tablespace` 命令来简化临时表空间的收缩操作：\n\n```sql\nSQL>\
    \ alter tablespace temp shrink space;\n\nTablespace altered.\n\nSQL>\n```\n\n\
    在此示例中，我们收缩了整个临时表空间，但您可以通过执行命令 `alter tablespace temp shrink tempfile <file_name>`\
    \ 来收缩特定的临时文件。该命令会将临时文件收缩到尽可能小的大小。\n\n## 7-7. 解决 Open Cursor 错误\n\n### 问题\n\n您频繁遇到\
    \ `Maximum Open Cursors exceeded error`，并希望解决此错误。\n\n### 解决方案\n\n当您收到 `ORA-01000`：“maximum\
    \ open cursors exceeded”错误时，首先需要做的一件事是检查初始化参数 `open_cursors` 的值。您可以通过执行以下命令查看当前打开的游标数限制：\n\
    \n```sql\nSQL> sho parameter open_cursors\n\nNAME                            \
    \     TYPE        VALUE\n------------------------------------ ----------- ---------\n\
    open_cursors                         integer     300\nSQL>\n```\n\n参数 `OPEN_CURSORS`\
    \ 设置一个会话可以同时打开的最大游标数。您指定此参数以控制打开游标数。将该参数的值设置得太低将导致会话收到 `ORA-01000` 错误。为 `OPEN_CURSORS`\
    \ 参数指定一个非常大的值通常没有害处（除非您预计所有会话会同时达到其游标上限，而这不太可能），因此您通常只需将参数值提高到一个较大的数字，即可解决与游标相关的错误。然而，有时您可能会发现提高\
    \ `open_cursors` 参数的值并不能“修复”问题。在这种情况下，请通过执行以下查询来调查哪些进程正在使用打开的游标：\n\n```sql\nSQL>\
    \ select a.value, s.username,s.sid,s.serial#,s.program,s.inst_id\n     from gv$sesstat\
    \ a,gv$statname b,gv$session s\n     where a.statistic# = b.statistic# and s.sid=a.sid\n\
    \     and b.name='opened cursors current'\n```\n\n`GV$OPEN_CURSOR`（或 `V$OPEN_CURSOR`）视图显示每个用户会话当前已打开并解析或缓存的所有游标。您可以执行以下查询来识别具有大量已打开、已解析或已缓存游标的会话。\n\
    \n```sql\nSQL> select saddr, sid, user_name, address,hash_value,sql_id, sql_text\n\
    \     from gv$open_cursor\n     where sid in\n     (select sid from v$open_cursor\n\
    \     group by sid having count(*)  > &threshold);\n```\n\n该查询列出所有打开游标数大于您指定阈值的会话。这样，您可以限制查询的输出，并专注于那些已打开、解析或缓存了大量游标的会话。\n\
    \n您可以通过执行以下查询获取特定会话的实际 SQL 代码和打开的游标数：\n\n```sql\nSQl> select sql_id,substr(sql_text,1,50)\
    \ sql_text, count(*)\n     from gv$open_cursor where sid=81\n     group by sql_id,substr(sql_text,1,50)\n\
    \     order by sql_id;\n```\n\n输出显示了 SID 为 81 的会话中所有打开游标的 SQL 代码。您可以检查所有具有高打开游标数的\
    \ SQL 语句，以了解该会话为何保持大量游标打开。\n"
- fmt: "#### How It Works\n\nIf your application is not closing open cursors, then\
    \ setting the `OPEN_CURSORS` parameter to a higher value won't really help you.\
    \ You may momentarily resolve the issue, but you're likely to run into the same\
    \ issue a little later. If the application layer never closes the ref cursors\
    \ created by the PL/SQL code, the database will simply hang on to the server resources\
    \ for the used cursors. You must fix the application logic so it closes the cursors—the\
    \ problem isn't really in the database.\n\nIf you're using a Java application\
    \ deployed on an application server such as the Oracle WebLogic Server, the WebLogic\
    \ Server's JDBC connection pools provide open database connections for applications.\
    \ Any prepared statements in each of these connections will use a cursor. Multiple\
    \ application server instances and multiple JDBC connection pools will mean that\
    \ the database needs to support all the cursors. If multiple requests share the\
    \ same session ID, the open cursor problem may be due to implicit cursors. The\
    \ only solution then is to close the connection after each request.\n\nA `cursor\
    \ leak` is when the database opens cursors but doesn't close them. You can run\
    \ a 10046 trace for a session to find out if it's closing its cursors:\n\n```\n\
    SQL> alter session set events '10046 trace name context forever, level 12';\n\
    ```\n\nIf you notice that the same SQL statement is associated with different\
    \ cursors, it means that the application isn't closing its cursors. If the application\
    \ doesn't close its cursors after opening them, Oracle assigns different cursor\
    \ numbers for the next SQL statement it executes. If the cursor is closed, instead,\
    \ Oracle will re-use the same cursor number for the next cursor it assigns. Thus,\
    \ if you see the item `PARSING IN CURSOR #nnnn` progressively increase in the\
    \ output for the 10046 trace, it means that the application is not closing the\
    \ cursors. Note that while leaving cursors open may be due to a faulty application\
    \ design, developers may also intentionally leave cursors open to reduce soft\
    \ parsing, or when they use the session cursor cache.\n\nYou can use the `SESSION_CACHED_CURSORS`\
    \ initialization parameter to set the maximum number of cached closed cursors\
    \ for each session. The default setting is 50. You can use this parameter to prevent\
    \ a session from opening an excessive number of cursors, thereby filling the library\
    \ cache or forcing excessive hard parses. Repeated parse calls for a SQL statement\
    \ leads Oracle to move the session cursor for that statement into the session\
    \ cursor cache. The database satisfies subsequent parse calls by using the cached\
    \ cursor instead of re-opening the cursor.\n\nWhen you re-execute a SQL statement,\
    \ Oracle will first try to find a parsed version of that statement in the shared\
    \ pool—if it finds the parsed version in the shared pool, a soft parse occurs.\
    \ Oracle is forced to perform the much more expensive hard parse if it doesn't\
    \ find the parsed version of the statement in the shared pool. While a soft parse\
    \ is much less expensive than a hard parse, a large number of soft parses can\
    \ affect performance, because they do require CPU usage and library cache latches.\
    \ To reduce the number of soft parses, Oracle caches the recent closed cursors\
    \ of each session in a local session cache for that session—Oracle stores any\
    \ cursor for which a minimum of three parse calls were made, thus avoiding having\
    \ to cache every single session cursor, which will fill up the cursor cache.\n\
    \nThe default value of 50 for the `SESSION_CACHED_CURSORS` initialization parameter\
    \ may be too low for many databases. You can check if the database is bumping\
    \ against the maximum limit for session-cached cursors by issuing the following\
    \ statement:\n\n```\nSQL> select max(value) from v$sesstat\n  2  where statistic#\
    \ in (select statistic# from v$statname\n  3  where name = 'session cursor cache\
    \ count');\n\nMAX(VALUE)\n----------\n        49\n\nSQL>\n```\n\nThe query shows\
    \ the maximum number of session cursors that have been cached in the past. Since\
    \ this number (49) is virtually the same as the default value (or the value you've\
    \ set) for the `SESSION_CACHED_CURSORS` parameter, you must set the parameter's\
    \ value to a larger number. Session cursor caches use the shared pool. If you're\
    \ using automatic memory management, there's nothing for you to do after you reset\
    \ the `SESSION_CACHED_CURSORS` parameter—the database will bump up the shared\
    \ pool size if necessary. You can find out how many cursors each session has in\
    \ its session cursor cache by issuing the following query:\n\n```\nSQL> select\
    \ a.value,s.username,s.sid,s.serial#\n  2  from v$sesstat a, v$statname b,v$session\
    \ s\n  3  where a.statistic#=b.statistic# and s.sid=a.sid\n  4  and b.name='session\
    \ cursor cache count';\n```\n\n### 7-8. Resolving a Hung Database\n\n#### Problem\n\
    \nYour database is hung. Users aren't able to log in, and existing users can't\
    \ complete their transactions. The DBAs with SYSDBA privileges may also be unable\
    \ to log in to the database. You need to find out what is causing the database\
    \ to hang, and fix the problem."
  raw: '#### How It Works


    If your application is not closing open cursors, then setting the `OPEN_CURSORS`
    parameter to a higher value won''t really help you. You may momentarily resolve
    the issue, but you''re likely to run into the same issue a little later. If the
    application layer never closes the ref cursors created by the PL/SQL code, the
    database will simply hang on to the server resources for the used cursors. You
    must fix the application logic so it closes the cursors—the problem isn''t really
    in the database.


    If you''re using a Java application deployed on an application server such as
    the Oracle WebLogic Server, the WebLogic Server''s JDBC connection pools provide
    open database connections for applications. Any prepared statements in each of
    these connections will use a cursor. Multiple application server instances and
    multiple JDBC connection pools will mean that the database needs to support all
    the cursors. If multiple requests share the same session ID, the open cursor problem
    may be due to implicit cursors. The only solution then is to close the connection
    after each request.


    A *cursor leak* is when the database opens cursors but doesn''t close them. You
    can run a 10046 trace for a session to find out if it''s closing its cursors:


    `SQL> alter session set events ''10046 trace name context forever, level 12'';`


    If you notice that the same SQL statement is associated with different cursors,
    it means that the application isn''t closing its cursors. If the application doesn''t
    close its cursors after opening them, Oracle assigns different cursor numbers
    for the next SQL statement it executes. If the cursor is closed, instead, Oracle
    will re-use the same cursor number for the next cursor it assigns. Thus, if you
    see the item `PARSING IN CURSOR #nnnn` progressively increase in the output for
    the 10046 trace, it means that the application is not closing the cursors. Note
    that while leaving cursors open may be due to a faulty application design, developers
    may also intentionally leave cursors open to reduce soft parsing, or when they
    use the session cursor cache.


    You can use the `SESSION_CACHED_CURSORS` initialization parameter to set the maximum
    number of cached closed cursors for each session. The default setting is 50\.
    You can use this parameter to prevent a session from opening an excessive number
    of cursors, thereby filling the library cache or forcing excessive hard parses.
    Repeated parse calls for a SQL statement leads Oracle to move the session cursor
    for that statement into the session cursor cache. The database satisfies subsequent
    parse calls by using the cached cursor instead of re-opening the cursor.


    When you re-execute a SQL statement, Oracle will first try to find a parsed version
    of that statement in the shared pool—if it finds the parsed version in the shared
    pool, a soft parse occurs. Oracle is forced to perform the much more expensive
    hard parse if it doesn''t find the parsed version of the statement in the shared
    pool. While a soft parse is much less expensive than a hard parse, a large number
    of soft parses can affect performance, because they do require CPU usage and library
    cache latches. To reduce the number of soft parses, Oracle caches the recent closed
    cursors of each session in a local session cache for that session—Oracle stores
    any cursor for which a minimum of three parse calls were made, thus avoiding having
    to cache every single session cursor, which will fill up the cursor cache.


    The default value of 50 for the `SESSION_CACHED_CURSORS` initialization parameter
    may be too low for many databases. You can check if the database is bumping against
    the maximum limit for session-cached cursors by issuing the following statement:


    `SQL> select max(value) from v$sesstat`

    `  2  where statistic# in (select statistic# from v$statname`

    `  3* where name = ''session cursor cache count'');`


    `MAX(VALUE)`

    `----------`

    `        49`


    `SQL>`


    The query shows the maximum number of session cursors that have been cached in
    the past. Since this number (49) is virtually the same as the default value (or
    the value you''ve set) for the `SESSION_CACHED_CURSORS` parameter, you must set
    the parameter''s value  to a larger number. Session cursor caches use the shared
    pool. If you''re using automatic memory management, there''s nothing for you to
    do after you reset the `SESSION_CACHED_CURSORS` parameter—the database will bump
    up the shared pool size if necessary. You can find out how many cursors each session
    has in its session cursor cache by issuing the following query:


    `SQL> select a.value,s.username,s.sid,s.serial#`

    `  2  from v$sesstat a, v$statname b,v$session s`

    `  3  where a.statistic#=b.statistic# and s.sid=a.sid`

    `  4* and b.name=''session cursor cache count'';`


    ### 7-8\. Resolving a Hung Database


    #### Problem


    Your database is hung. Users aren''t able to log in, and existing users can''t
    complete their transactions. The DBAs with SYSDBA privileges may also be unable
    to log in to the database. You need to find out what is causing the database to
    hang, and fix the problem.'
  trans: "#### 工作原理\n\n如果你的应用没有关闭打开的游标，那么将 `OPEN_CURSORS` 参数设置为更高的值对你帮助不大。你可能暂时解决了问题，但不久后很可能又会遇到同样的问题。如果应用层从不关闭由\
    \ PL/SQL 代码创建的 ref 游标，数据库将仅仅为已使用的游标持有服务器资源。你必须修复应用逻辑，使其关闭游标——问题其实不在于数据库。\n\n如果你使用的是部署在应用服务器（如\
    \ Oracle WebLogic Server）上的 Java 应用，WebLogic Server 的 JDBC 连接池会为应用程序提供打开的数据库连接。这些连接中的每个预处理语句都将使用一个游标。多个应用服务器实例和多个\
    \ JDBC 连接池意味着数据库需要支持所有的游标。如果多个请求共享相同的会话 ID，打开的游标问题可能是由隐式游标引起的。此时唯一的解决方案是在每个请求后关闭连接。\n\
    \n`游标泄漏` 是指数据库打开游标但没有关闭它们。你可以为一个会话运行 10046 跟踪，以查明它是否关闭了其游标：\n\n```\nSQL> alter\
    \ session set events '10046 trace name context forever, level 12';\n```\n\n如果你注意到同一条\
    \ SQL 语句与不同的游标相关联，那就意味着应用没有关闭其游标。如果应用在打开游标后不关闭它们，Oracle 会为其执行的下一条 SQL 语句分配不同的游标号。反之，如果游标被关闭，Oracle\
    \ 将为分配的下一个游标重用相同的游标号。因此，如果你在 10046 跟踪的输出中看到 `PARSING IN CURSOR #nnnn` 项逐渐增加，则表明应用没有关闭游标。请注意，游标保持打开状态可能是由于有缺陷的应用设计，但开发者也可能有意让游标保持打开以减少软解析，或者当他们使用会话游标缓存时。\n\
    \n你可以使用 `SESSION_CACHED_CURSORS` 初始化参数来设置每个会话缓存的已关闭游标的最大数量。默认设置是 50。你可以使用此参数来防止一个会话打开过多游标，从而填满库缓存或强制进行过多的硬解析。对一条\
    \ SQL 语句重复进行解析调用会导致 Oracle 将该语句的会话游标移入会话游标缓存。数据库通过使用缓存的游标来满足后续的解析调用，而不是重新打开游标。\n\
    \n当你重新执行一条 SQL 语句时，Oracle 会首先尝试在共享池中查找该语句的已解析版本——如果在共享池中找到了已解析版本，则发生软解析。如果未在共享池中找到该语句的已解析版本，Oracle\
    \ 将被迫执行开销大得多的硬解析。虽然软解析的开销远小于硬解析，但大量的软解析会影响性能，因为它们确实需要 CPU 使用和库缓存闩。为了减少软解析的数量，Oracle\
    \ 将每个会话最近关闭的游标缓存在该会话的本地会话缓存中——Oracle 存储那些至少进行了三次解析调用的游标，从而避免了缓存每一个会话游标（这会填满游标缓存）。\n\
    \n`SESSION_CACHED_CURSORS` 初始化参数的默认值 50 对许多数据库来说可能太低了。你可以通过执行以下语句来检查数据库是否达到了会话缓存游标的上限：\n\
    \n```\nSQL> select max(value) from v$sesstat\n  2  where statistic# in (select\
    \ statistic# from v$statname\n  3  where name = 'session cursor cache count');\n\
    \nMAX(VALUE)\n----------\n        49\n\nSQL>\n```\n\n该查询显示了过去已被缓存的会话游标的最大数量。由于这个数字（49）几乎与\
    \ `SESSION_CACHED_CURSORS` 参数的默认值（或你设置的值）相同，你必须将该参数的值设置为更大的数字。会话游标缓存使用共享池。如果你使用的是自动内存管理，在重置\
    \ `SESSION_CACHED_CURSORS` 参数后无需做其他事情——数据库会在必要时增加共享池大小。你可以通过执行以下查询来了解每个会话在其会话游标缓存中有多少游标：\n\
    \n```\nSQL> select a.value,s.username,s.sid,s.serial#\n  2  from v$sesstat a,\
    \ v$statname b,v$session s\n  3  where a.statistic#=b.statistic# and s.sid=a.sid\n\
    \  4  and b.name='session cursor cache count';\n```\n\n### 7-8. 解决数据库挂起问题\n\n\
    #### 问题\n\n你的数据库挂起了。用户无法登录，现有用户也无法完成其事务。具有 SYSDBA 权限的数据库管理员也可能无法登录到数据库。你需要找出导致数据库挂起的原因，并修复该问题。"
- fmt: '## Solution


    Follow these general steps when facing a database that appears to be hung:


    1.  Check your `alert log` to see if the database has reported any errors, which
    may indicate why the database is hanging.

    2.  See if you can get an `AWR` or `ASH` report or query some of the `ASH` views,
    as explained in [Chapter 5](#Chapter05.html#ch5). You may notice events such as
    `hard parses` at the top of the `Load Profile` section of the `AWR` report, indicating
    that this is what is slowing down the database.

    3.  A single `ad hoc query` certainly has the potential to bring an entire database
    to its knees. See if you can identify one or more very poorly performing `SQL`
    statements that may be leading to the hung (or a very poorly performing) database.

    4.  Check the database for blocking `locks` as well as `latch` contention.

    5.  Check the server''s memory usage as well as `CPU` usage. Make sure the sessions
    aren''t stalling because you''ve sized the `PGA` too low, as explained in [Chapter
    3](#Chapter03.html#ch3).

    6.  Don''t overlook the fact that a scary-looking database hang may be caused
    by something as simple as the filling up of all `archive log` destinations. If
    the `archive destination` is full, the database will hang, and new user connections
    will fail. You can, however, still connect as the `SYS` user, and once you make
    room in the `archive destination` by moving some of the archived redo log files,
    the database becomes accessible to the users.

    7.  Check the `Flash Recovery Area (FRA)`. A database also hangs when it''s unable
    to write `Flashback Database` logs to the recovery area. When the `FRA` fills
    up, the database won''t process new work and it won''t spawn new database connections.
    You can fix this problem by making the recovery area larger with the `alter system
    set db_recovery_file_dest_size` command.


    If you''re still unable to resolve the reasons for the hung database, you most
    likely have a truly hung database. While you''re investigating such a database,
    you may sometimes find yourself unable to connect and log in. In that case, use
    the `prelim` option to log in to the database. The `prelim` option doesn''t require
    a real database connection. Here''s an example that shows how to use the `prelim`
    option to log into a database:


    ```

    C:\app\ora\product\11.2.0\dbhome_1\bin>sqlplus /nolog


    SQL*Plus: Release 11.2.0.1.0 Production on Sun Mar 27 10:43:31 2011


    Copyright (c) 1982, 2010, Oracle.  All rights reserved.


    SQL> set _prelim on

    SQL> connect / as sysdba

    Prelim connection established

    SQL>

    ```


    Alternatively, you can use the command `sqlplus -prelim "/ as sysdba"` to log
    in with the `-prelim` option. Note that you use the `nolog` option to open a `SQL*Plus`
    session. You can''t execute the `set _prelim on` command if you''re already connected
    to the database. Once you establish a `prelim` connection as shown here, you can
    execute the `oradebug hanganalyze` command to analyze a hung database—for example:


    ```

    SQL> oradebug hanganalyze 3

    Statement processed.

    SQL>

    ```


    In an Oracle `RAC` environment, specify the `oradebug hanganalyze` command with
    additional options, as shown here:


    ```

    SQL> oradebug setinst all

    SQL> oradebug -g def hanganalyze 3

    ```


    You can repeat the `oradebug hanganalyze` command a couple of times to generate
    dump files for varying process states.


    In addition to the dump files generated by the `hanganalyze` command, Oracle Support
    may often also request a process state dump, also called a `systemstate` dump,
    to analyze hung database conditions. The `systemstate` dump will report on what
    the processes are doing and the resources they''re currently holding. You can
    get a `systemstate` dump from a non-`RAC` system by executing the following set
    of commands.


    ```

    SQL> oradebug setmypid

    Statement processed.

    SQL> oradebug dump systemstate 266

    Statement processed.

    SQL>

    ```


    Issue the following commands to get a `systemstate` dump in a `RAC` environment:


    ```

    SQL> oradebug setmypid

    SQL> oradebug unlimit

    SQL> oradebug -g all dump systemstate 266

    ```


    Note that unlike the `oradebug hanganalyze` command, you must connect to a process.
    The `setmypid` option specifies the process, in this case your own process. You
    can also specify a process ID other than yours, in which case you issue the command
    `oradebug setmypid <pid>` before issuing the `dump systemstate` command. If you
    try to issue the `dump systemstate` command without setting the `PID`, you''ll
    receive an error:


    ```

    SQL> oradebug dump systemstate 10

    ORA-00074: no process has been specified

    SQL>

    ```


    You must take the `systemstate` dumps a few times, with an interval of about a
    minute or so in between the dumps. Oracle Support usually requests several `systemstate`
    dumps along with the trace files generated by the `hanganalyze` command.'
