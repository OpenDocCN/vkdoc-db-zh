    \ due to the forced ordering of queued sequence values."
  trans: "\n## 问题\n\n您遇到了大量的**闩锁等待**，并希望减少**闩锁争用**。\n\n## 解决方案\n\n严重的**闩锁争用**会显著拖慢您的数据库。当您处理**闩锁争用**问题时，首先执行以下查询，以查明**闩锁**的具体类型以及每次等待导致的总等待时间。\n\
    \n```\nSQL> select event, sum(P3), sum(seconds_in_wait) seconds_in_wait\n    \
    \ from v$session_wait\n     where event like 'latch%'\n     group by event;\n\
    ```\n\n前面的查询显示当前此会话正在等待的**闩锁**。要查明整个实例为各种**闩锁**等待的总时间，请执行以下 SQL 语句。\n\n```\nSQL>\
    \ select wait_class, event, time_waited / 100 time_secs\n     from v$system_event\
    \ e\n     where e.wait_class <> 'Idle' AND time_waited > 0\n     union\n     select\
    \ 'Time Model', stat_name NAME,\n     round ((value / 1000000), 2) time_secs\n\
    \     from v$sys_time_model\n     where stat_name not in ('background elapsed\
    \ time', 'background cpu time')\n     order by 3 desc;\n```\n\n```\nWAIT_CLASS\
    \                                         EVENT                              \
    \ TIME_SECS\n-------------------- ----------------------------- -----------------\n\
    Concurrency              library cache pin                           622.24\n\
    Concurrency              latch: library cache                        428.23\n\
    Concurrency              latch: library cache lock                    93.24\n\
    Concurrency              library cache lock                          24.20\nConcurrency\
    \              latch: library cache pin                    60.28\n-\n```\n\n查询的部分输出显示了与**闩锁**相关的等待事件，这些事件属于\
    \ `Concurrency` 等待类。\n\n您还可以查看 AWR 报告中的前五个等待事件，以确认**闩锁争用**是否是个问题，如下所示：\n\n```\n\
    Event                                   Waits           Time (s)     (ms)    \
    \  Time      Wait Class\n------------------------   ------------    ----------\
    \    -------   --------   ------------\ndb file sequential read      42,005,780\
    \       232,838          6       73.8      User I/O\nCPU time                \
    \                    124,672                  39.5      Other\nlatch free    \
    \               11,592,952        76,746          7       24.3      Other\nwait\
    \ list latch free            107,553         2,088         19        0.7     \
    \ Other\nlatch: library cache          1,135,976         1,862          2    \
    \    0.6      Concurrency\n```\n\n### 常见的闩锁等待类型及减少方法\n\n以下是最常见的 Oracle **闩锁**等待类型以及您可以如何减少它们。\n\
    \n> `Shared pool` 和 `library latches`：这些主要由数据库反复执行几乎相同但略有变化的 SQL 语句引起。例如，数据库可能执行一个\
    \ SQL 语句 10,000 次，每次为某个变量使用不同的值。所有此类情况的解决方案是使用**绑定变量**。应用程序在每次执行后显式关闭所有**游标**也可能导致这种等待。其解决方案是设置\
    \ `CURSOR_SPACE_FOR_TIME` 初始化参数。**共享池**太小也可能导致**闩锁**问题，因此请检查您的 SGA 大小。\n> \n>\
    \ `Cache buffers LRU chain`：这些**闩锁**事件通常由过度的**缓冲区缓存**使用引起，可能由过多的物理读以及逻辑读导致。要么是数据库在执行大型**全表扫描**，要么是在执行大型**索引范围扫描**。这类**闩锁**等待的常见原因是缺少索引或存在非选择性索引。另外，请检查是否需要增加**缓冲区缓存**的大小。\n\
    > \n> `Cache buffer chains`：这些等待是由于一个或多个**热点块**被反复访问造成的。应用程序代码通过更新表的行来生成序列号，而不是使用\
    \ Oracle **序列**，可能会导致此类**热点块**。当太多进程使用相似的谓词扫描一个非选择性索引时，您也可能会看到 `cache buffer chains`\
    \ 等待事件。\n\n### 优化 Oracle 序列\n\n此外，如果您正在使用 Oracle **序列**，请使用更大的 `CACHE` 设置重新创建它们，并尽量避免使用\
    \ `ORDER` 子句。序列的 `CACHE` 子句决定了数据库必须在 SGA 中缓存的序列值数量。如果您的数据库正在处理大量的插入和更新，请考虑增加缓存大小以避免对序列值的**争用**。默认情况下，缓存设置为\
    \ 20 个值。如果请求值的速度足够快以至于经常耗尽缓存，就可能导致**争用**。如果您正在处理 RAC 环境，使用 `NOORDER` 子句将防止由于强制排队序列值而导致的入队**争用**。\n"
- fmt: "#### How It Works\n\nOracle uses internal locks called latches to protect\
    \ various memory structures. When a server process attempts to get a latch but\
    \ fails to do so, that attempt is counted as a `latch free wait event`. Oracle\
    \ doesn't group all latch waits into a single `latch free wait event`. Oracle\
    \ does use a generic `latch free wait event`, but this is only for the minor latch-related\
    \ wait events. For the latches that are most common, Oracle uses various subgroups\
    \ of latch wait events, with the name of the wait event type. You can identify\
    \ the exact type of latch by looking at the latch event name. For example, the\
    \ latch event `latch: library cache` indicates contention for library cache latches.\
    \ Similarly, the `latch: cache buffer chains` event indicates contention for the\
    \ buffer cache.\n\nOracle uses various types of latches to prevent multiple sessions\
    \ from updating the same area of the `SGA`. Various database operations require\
    \ sessions to read or update the `SGA`. For example, when a session reads a data\
    \ block into the `SGA` from disk, it must modify the buffer cache least recently\
    \ used chain. Similarly, when the database parses a `SQL` statement, that statement\
    \ has to be added to the `library cache` component of the `SGA`. Oracle uses latches\
    \ to prevent database operations from stepping on each other and corrupting the\
    \ `SGA`.\n\nA database operation needs to acquire and hold a latch for very brief\
    \ periods, typically lasting a few nanoseconds. If a session fails to acquire\
    \ a latch at first because the latch is already in use, the session will try a\
    \ few times before going to “sleep.” The session will re-awaken and try a few\
    \ more times, before going into the sleep mode again if it still can't acquire\
    \ the latch it needs. Each time the session goes into the sleep mode, it stays\
    \ longer there, thus increasing the time interval between subsequent attempts\
    \ to acquire a latch. Thus, if there's a severe contention for latches in your\
    \ database, it results in a severe degradation of response times and throughput.\n\
    \nDon't be surprised to see latch contention even in a well-designed database\
    \ running on very fast hardware. Some amount of latch contention, especially the\
    \ `cache buffers chain` latch events, is pretty much unavoidable. You should be\
    \ concerned only if the latch waits are extremely high and are slowing down database\
    \ performance.\n\nContention due to the `library cache` latches as well as `shared\
    \ pool` latches is usually due to applications not using bind variables. If your\
    \ application can't be recoded to incorporate bind variables, all's not lost.\
    \ You can set the `CURSOR_SHARING` parameter to force Oracle to use bind variables,\
    \ even if your application hasn't specified them in the code. You can choose between\
    \ a setting of `FORCE` or `SIMILAR` for this parameter to force the substituting\
    \ of bind variables for hard-coded values of variables. The default setting for\
    \ this parameter is `EXACT`, which means that the database won't substitute bind\
    \ variables for literal values. When you set the `CURSOR_SHARING` parameter to\
    \ `FORCE`, Oracle converts all literals to bind variables. The `SIMILAR` setting\
    \ causes a statement to use bind variables only if doing so doesn't change a statement's\
    \ execution plan. Thus, the `SIMILAR` setting seems a safer way to go about forcing\
    \ the database to use bind variables instead of literals. Although there are some\
    \ concerns about the safety of setting the `CURSOR_SHARING` parameter to `FORCE`,\
    \ we haven't seen any real issues with using this setting. The `library cache`\
    \ contention usually disappears once you set the `CURSOR_SHARING` parameter to\
    \ `FORCE` or to `SIMILAR`. The `CURSOR_SHARING` parameter is one of the few Oracle\
    \ silver bullets that'll improve database performance immediately by eliminating\
    \ latch contention. Use it with confidence when dealing with `library cache` latch\
    \ contention.\n\nThe `cache buffer chains` latch contention is usually due to\
    \ a session repeatedly reading the same data blocks. First identify the `SQL`\
    \ statement that's responsible for the highest amount of the `cache buffers chain`\
    \ latches and see if you can tune it. If this doesn't reduce the latch contention,\
    \ you must identify the actual hot blocks that are being repeatedly read.\n\n\
    If a hot block belongs to an index segment, you may consider partitioning the\
    \ table and using local indexes. For example, a hash partitioning scheme lets\
    \ you spread the load among multiple partitioned indexes. You can also consider\
    \ converting the table to a hash cluster based on the indexed columns. This way,\
    \ you can avoid the index altogether. If the hot blocks belong to a table segment\
    \ instead, you can still consider partitioning the table to spread the load across\
    \ the partitions. You may also want to reconsider the application design to see\
    \ why the same blocks are being repeatedly accessed, thus rendering them “hot.”\n\
    \n### 5-21. Managing Locks from Oracle Enterprise Manager\n\n#### Problem\n\n\
    You'd like to find out how to handle locking issues through the Oracle Enterprise\
    \ Manager Database Control GUI interface.\n\n#### Solution\n\nInstead of issuing\
    \ multiple `SQL` queries to identify quickly disappearing locking events, you\
    \ can use Oracle Enterprise Manager (`OEM`) `DB Control` to identify and resolve\
    \ locking situations. You can find all current locks in the instance, including\
    \ the blocking and the blocked sessions—you can also kill the blocking session\
    \ from `OEM`.\n\nHere are the ways you can manage locking issues through `OEM`:\n\
    \n*   In the Home page of `DB Control`, you'll see locking information in the\
    \ Alerts table. Look for the User Block category to identify blocking sessions.\
    \ The alert name you must look for is `Blocking Session Count`. Clicking the message\
    \ link shown for this alert, such as “Session 68 is blocking 12 other sessions,”\
    \ for example, will take you to the `Blocking Session Count` page. In the Alert\
    \ History table on this page, you can view details about the blocking and blocked\
    \ sessions.\n\n    Also in the Home page, under Related Alerts, you'll find the\
    \ ADDM Performance table. Locking issues are revealed by the presence of the `Row\
    \ Lock Waits` link. Click the `Row Lock Waits` link to go to the `Row Lock Waits`\
    \ page. This page, shown in [Figure 5-1](#Chapter05.html#fig_5_1), lets you view\
    \ all the `SQL` statements that were found waiting for row locks.\n\n    ![images](images/0501.jpg)\n\
    \n    **Figure 5-1.** The Row Lock Waits page in `OEM`\n\n*   You can also view\
    \ blocking session details by clicking the Performance tab in the Home page. Click\
    \ `Blocking Sessions` under the Additional Monitoring Links section to go to the\
    \ `Blocking Sessions` page. The `Blocking Sessions` page contains details for\
    \ both the blocking as well as the blocked sessions. You can see the exact wait\
    \ event, which will be `enq: TX row lock contention` when one session blocks another.\
    \ You can find out the exact `SQL` statement that's involved in blocking sessions,\
    \ by clicking the `SQL ID` link on this page. You can kill the blocking session\
    \ from this page by clicking the `Kill Session` button at the top left side of\
    \ the page.\n*   Also in the Additional Monitoring Links section is another link\
    \ named `Instance Locks`, which takes you to the `Instance Locks` page. The `Instance\
    \ Locks` page shows the session details for both the blocking and blocked sessions.\
    \ You can click the `SQL ID` link to view the current `SQL` that's being executed\
    \ by the blocker and the blocked sessions. You can also find out the name of the\
    \ object that's locked. You can kill the blocking session by clicking the `Kill\
    \ Session` button."
