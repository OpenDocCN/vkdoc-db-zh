- fmt: "#### How It Works\n\n假设贵公司为新成立的两个部门招聘了员工。你需要在对应的 `DEPT` 和 `EMP` 表中插入行，但需要为每个部门单独执行一个事务。如果出现错误，你可以回滚到上一个逻辑事务完成的点。首先，我们可以查看\
    \ `DEPT` 表的当前情况：\n\n```\nSELECT * FROM dept;\n\n    DEPTNO DNAME          LOC\n\
    ---------- -------------- -------------\n        10 ACCOUNTING     NEW YORK\n\
    \        20 RESEARCH       DALLAS\n        30 SALES          CHICAGO\n       \
    \ 40 OPERATIONS     BOSTON\n```\n\n我们首先将第一个部门的信息插入到 `DEPT` 和 `EMP` 表中，然后创建一个保存点：\n\
    \n```\nINSERT INTO dept VALUES (50,'PAYROLL','LOS ANGELES');\n\n1 row created.\n\
    \nINSERT INTO emp VALUES (7997,'EVANS','ACCTNT',7566,'2011-08-15',900,0,50);\n\
    \n1 row created.\n\nsavepoint A;\n\nSavepoint created.\n```\n\n然后我们开始处理第二个部门的信息。假设在事务处理到一半时，在向\
    \ `DEPT` 表插入和向 `EMP` 表插入之间发生了未知错误。这种情况下，我们知道这个为招聘部门插入信息的事务必须被回滚。同时，我们希望提交工资部门的事务。利用我们创建的保存点，我们可以提交事务的一部分，同时回滚我们不想要保留的那部分事务：\n\
    \n```\nINSERT INTO dept VALUES (60,'RECRUITING','DENVER');\n\n1 row created.\n\
    \nROLLBACK to savepoint A;\n\nRollback complete.\n\nCOMMIT;\n\nCommit complete.\n\
    ```\n\n由于保存点的存在，我们的回滚仅回滚了部门 60 的未完成事务，随后的提交将部门 50 的完整事务写入了数据库的 `DEPT` 和 `EMP`\
    \ 表：\n\n```\nSELECT * FROM dept;\n\n    DEPTNO DNAME          LOC\n----------\
    \ -------------- -------------\n        10 ACCOUNTING     NEW YORK\n        20\
    \ RESEARCH       DALLAS\n        30 SALES          CHICAGO\n        40 OPERATIONS\
    \     BOSTON\n        50 PAYROLL        LOS ANGELES\n\nSELECT * FROM emp\nWHERE\
    \ empno = 7997;\n\n     EMPNO ENAME      JOB              MGR HIREDATE    SAL\
    \       COMM  DEPTNO\n---------- ---------  ---------- ---------- ---------- ----\
    \ ---------- -------\n      7997 EVANS      ACCTNT          7566 2011-08-15  900\
    \          0      50\n```\n\n在编程语言（如 PL/SQL）中，你可以使用许多类似的机制或编码技术。SQL 语言中的 `SAVEPOINT`\
    \ 命令是一种简单的方法来管理事务，而无需编写更复杂的程序结构。\n\n## 第 9 章 手动调整 SQL\n\n书籍、文章和其他出版物中多次提到，数据库中超过\
    \ 90% 的性能问题是由编写不当的 SQL 引起的。当查询性能不足时，数据库管理员常常被赋予“修复数据库”的任务。在证明清白之前，数据库管理员往往就被认定有罪——并且经常需要证明性能问题并非源于数据库本身，而仅仅是\
    \ SQL 语句编写效率低下。当然，目标是让 SQL 语句在第一次编写时就足够高效。本章的重点是帮助监控和分析现有查询，说明其性能不佳的原因，并展示一些改进查询的步骤。\n\
    \n如果你有正在维护或需要帮助提升性能的 SQL 代码，首先需要问的一些问题包括：\n\n*   该查询之前是否成功运行过？\n*   过去该查询的性能是否可以接受？\n\
    *   是否有该查询成功运行时耗时的度量指标？\n*   该查询通常返回多少数据？\n*   最近一次对查询中引用的对象收集统计信息是什么时候？\n\n一旦这些问题得到解答，就有助于将焦点引导到问题可能所在之处。然后，你可能希望为该查询运行一个执行计划，以查看执行计划乍看之下是否合理。阅读执行计划的技能需要时间，并随着经验而提高。有时，特别是在被查询对象之上存在视图时，执行计划可能会很长且令人望而生畏。因此，重要的是首先知道要关注什么，然后随着深入再挖掘细节。\n\
    \n有时，运行不佳的 SQL 可能会暴露出数据库配置问题，但通常，性能不佳的 SQL 查询是由于 SQL 语句编写不当造成的。再次强调，作为数据库管理员或数据库开发人员，最佳方法是尽可能提前花时间在\
    \ SQL 语句运行于生产环境之前对其进行调整。通常，查询的耗时是效率的基准，但这很容易让人陷入误区。随着时间的推移，数据库的特性会发生变化，应用程序可能会存储更多的历史数据，一个在初始安装时性能良好的查询在应用程序成熟时就可能无法很好地扩展。因此，第一次就花时间把它做对很重要，这说起来容易，但在平衡客户需求、预算和项目时间表时却很难做到。\n\
    \n### 9-1. 显示查询的执行计划\n\n#### 问题\n\n你想在 SQL Plus 中快速获取一个查询的执行计划。\n\n#### 解决方案\n\
    \n在 SQL Plus 中，你可以使用 `AUTOTRACE` 功能来快速获取查询的执行计划。这个 SQL Plus 工具在获取执行计划以及查询执行计划的统计信息时非常方便。最基本的形式是，在你的会话中启用\
    \ `AUTOTRACE`，在 SQL Plus 中执行以下命令：\n\n```\nSQL> set autotrace on\n```\n\n然后，你可以使用\
    \ `AUTOTRACE` 运行一个查询，这将显示该查询的执行计划和执行统计信息：\n\n```\nSELECT last_name, first_name\n\
    FROM employees NATURAL JOIN departments\nWHERE employee_id = 101;\n\nLAST_NAME\
    \                 FIRST_NAME\n------------------------- --------------------\n\
    Kochhar                   Neena\n\n--------------------------------------------------------------------------------------------\n\
    | Id  | Operation                    | Name          | Rows  | Bytes | Cost (%CPU)|\
    \ Time   |\n--------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT             |               |     1 |    33 |     2 \
    \  (0)| 00:00:01\n|   1 |  NESTED LOOPS                |               |     1\
    \ |    33 |     2   (0)| 00:00:01\n|   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES\
    \     |     1 |    26 |     1   (0)| 00:00:01\n|*  3 |    INDEX UNIQUE SCAN  \
    \       | EMP_EMP_ID_PK |     1 |       |     0   (0)| 00:00:01\n|*  4 |   TABLE\
    \ ACCESS BY INDEX ROWID| DEPARTMENTS   |    11 |    77 |     1   (0)| 00:00:01\n\
    |*  5 |    INDEX UNIQUE SCAN         | DEPT_ID_PK    |     1 |       |     0 \
    \  (0)| 00:00:01\n--------------------------------------------------------------------------------------------\n\
    \nStatistics\n----------------------------------------------------------\n   \
    \       0  recursive calls\n          0  db block gets\n          4  consistent\
    \ gets\n          0  physical reads\n          0  redo size\n        490  bytes\
    \ sent via SQL*Net to client\n        416  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n          1  rows processed\n```"
  raw: '#### How It Works


    Let''s say your company has established two new departments, as well as employees
    for those departments. You need to insert rows in the corresponding `DEPT` and
    `EMP` tables, but you need to do this in one transaction per department. In case
    of an error, you can roll back to the point the last logical transaction completed.
    First, we can see a current picture of the `DEPT` table:


    `SELECT * FROM dept;`


    `    DEPTNO DNAME          LOC`

    `---------- -------------- -------------`

    `        10 ACCOUNTING     NEW YORK`

    `        20 RESEARCH       DALLAS`

    `        30 SALES          CHICAGO`

    `        40 OPERATIONS     BOSTON`


    We first insert the information for the first department into the `DEPT` and `EMP`
    tables, and then create a savepoint:


    `INSERT INTO dept VALUES (50,''PAYROLL'',''LOS ANGELES'');`


    `1 row created.`


    `INSERT INTO emp VALUES (7997,''EVANS'',''ACCTNT'',7566,''2011-08-15'',900,0,50);`


    `1 row created.`


    `savepoint A;`


    `Savepoint created.`


    We then start processing information for the second department. Let''s say in
    the middle of the transaction, an unknown error occurs between the insert into
    the `DEPT` table and the insert into the `EMP` table. In this case, we know this
    transaction of inserting the information into the recruiting department must be
    rolled back. At the same time, we wish to commit the transaction to the payroll
    department. Using the savepoint we created, we can commit a portion of the transaction,
    while rolling back the portion of the transaction we do not want to keep:


    `INSERT INTO dept VALUES (60,''RECRUITING'',''DENVER'');`


    `1 row created.`


    `ROLLBACK to savepoint A;`


    `Rollback complete.`


    `COMMIT;`


    `Commit complete.`


    Because of the savepoint, our rollback rolled back the incomplete transaction
    only for department 60, and the subsequent commit wrote the complete transaction
    for department 50 to the database in both the `DEPT` and `EMP` tables:


    `SELECT * FROM dept;`


    `    DEPTNO DNAME          LOC`

    `---------- -------------- -------------`

    `        10 ACCOUNTING     NEW YORK`

    `        20 RESEARCH       DALLAS`

    `        30 SALES          CHICAGO`

    `        40 OPERATIONS     BOSTON`

    `        50 PAYROLL        LOS ANGELES`


    `SELECT * FROM emp`

    `WHERE empno = 7997;`


    `     EMPNO ENAME      JOB              MGR HIREDATE    SAL       COMM  DEPTNO`

    `---------- ---------- --------- ---------- ---------- ---- ---------- -------`

    `      7997 EVANS      ACCTNT          7566 2011-08-15  900          0      50`


    There are many similar mechanisms or coding techniques you can use in programming
    languages such as PL/SQL.  The SAVEPOINT command in the SQL language is a simple
    way to manage transactions without having to code more complex programming structures.


    ## C H A P T E R  9


    ## Manually Tuning SQL


    It has been said many times in books, articles, and other publications that over
    90% of all performance problems on a database are due to poorly written SQL. Often,
    database administrators are given the task of “fixing the database” when queries
    are not performing adequately. The database administrator is often guilty before
    proven innocent—and often has the task of proving that a performance problem is
    not the database itself, but rather, simply, SQL statements that are not written
    efficiently. The goal, of course, is to have SQL statements written efficiently
    the first time. This chapter''s focus is to help monitor and analyze existing
    queries to help show why they may be underperforming, as well as show some steps
    to improve queries.


    If you have SQL code that you are maintaining or that needs help to improve performance,
    some of the questions that need to be asked first include the following:


    *   Has the query run before successfully?

    *   Was the query performance acceptable in the past?

    *   Are there any metrics on how long the query has run when successful?

    *   How much data is typically returned from the query?

    *   When was the last time statistics were gathered on the objects referenced
    in the query?


    Once these questions are answered, it helps to direct the focus to where the problem
    may lie. You then may want to run an explain plan for the query to see if the
    execution plan is reasonable at first glance. The skill of reading an explain
    plan takes time and improves with experience. Sometimes, especially if there are
    views on top of the objects being queried, an explain plan can be lengthy and
    intimidating. Therefore, it''s important to simply know what to look for first,
    and then dig as you go.


    At times, poorly running SQL can expose database configuration issues, but normally,
    poorly performing SQL queries occur due to poorly written SQL statements. Again,
    as a database administrator or database developer, the best approach is to take
    time up front whenever possible to tune the SQL statements prior to ever running
    in a production environment. Often, a query''s elapsed time is a benchmark for
    efficiency, which is an easy trap in which to fall. Over time, database characteristics
    change, more historical data may be stored for an application, and a query that
    performed well on initial install simply doesn''t scale as an application matures.
    Therefore, it''s important to take the time to do it right the first time, which
    is easy to say, but tough to accomplish when balancing client requirements, budgets,
    and project timelines.


    ### 9-1. Displaying an Execution Plan for a Query


    #### Problem


    You want to quickly retrieve an execution plan from within SQL Plus for a query.


    #### Solution


    From within SQL Plus, you can use the `AUTOTRACE` feature to quickly retrieve
    the execution plan for a query. This SQL Plus utility is very handy at getting
    the execution plan, along with getting statistics for the query''s execution plan.
    In the most basic form, to enable `AUTOTRACE` within your session, execute the
    following command within SQL Plus:


    `SQL> set autotrace on`


    Then, you can run a query using `AUTOTRACE`, which will show the execution plan
    and query execution statistics for your query:


    `SELECT last_name, first_name`

    `FROM employees NATURAL JOIN departments`

    `WHERE employee_id = 101;`


    `LAST_NAME                 FIRST_NAME`

    `------------------------- --------------------`

    `Kochhar                   Neena`


    `--------------------------------------------------------------------------------------------`

    `| Id  | Operation                    | Name          | Rows  | Bytes | Cost (%CPU)|
    Time   |`

    `--------------------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT             |               |     1 |    33 |     2   (0)|
    00:00:01`

    `|   1 |  NESTED LOOPS                |               |     1 |    33 |     2   (0)|
    00:00:01`

    `|   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1 |    26 |     1   (0)|
    00:00:01`

    `|*  3 |    INDEX UNIQUE SCAN         | EMP_EMP_ID_PK |     1 |       |     0   (0)|
    00:00:01`

    `|*  4 |   TABLE ACCESS BY INDEX ROWID| DEPARTMENTS   |    11 |    77 |     1   (0)|
    00:00:01`

    `|*  5 |    INDEX UNIQUE SCAN         | DEPT_ID_PK    |     1 |       |     0   (0)|
    00:00:01`

    `--------------------------------------------------------------------------------------------`


    `Statistics`

    `----------------------------------------------------------`

    `          0  recursive calls`

    `          0  db block gets`

    `          4  consistent gets`

    `          0  physical reads`

    `          0  redo size`

    `        490  bytes sent via SQL*Net to client`

    `        416  bytes received via SQL*Net from client`

    `          2  SQL*Net roundtrips to/from client`

    `          0  sorts (memory)`

    `          0  sorts (disk)`

    `          1  rows processed`'
  trans: "#### 工作原理\n\n假设贵公司为两个新成立的部门招聘了员工。你需要在对应的 `DEPT` 和 `EMP` 表中插入行，但需要为每个部门单独执行一个事务。如果出现错误，你可以回滚到上一个逻辑事务完成的点。首先，我们可以查看\
    \ `DEPT` 表的当前情况：\n\n```\nSELECT * FROM dept;\n\n    DEPTNO DNAME          LOC\n\
    ---------- -------------- -------------\n        10 ACCOUNTING     NEW YORK\n\
    \        20 RESEARCH       DALLAS\n        30 SALES          CHICAGO\n       \
    \ 40 OPERATIONS     BOSTON\n```\n\n我们首先将第一个部门的信息插入到 `DEPT` 和 `EMP` 表中，然后创建一个保存点：\n\
    \n```\nINSERT INTO dept VALUES (50,'PAYROLL','LOS ANGELES');\n\n1 row created.\n\
    \nINSERT INTO emp VALUES (7997,'EVANS','ACCTNT',7566,'2011-08-15',900,0,50);\n\
    \n1 row created.\n\nsavepoint A;\n\nSavepoint created.\n```\n\n然后我们开始处理第二个部门的信息。假设在事务处理到一半时，在向\
    \ `DEPT` 表插入和向 `EMP` 表插入之间发生了未知错误。这种情况下，我们知道这个为招聘部门插入信息的事务必须被回滚。同时，我们希望提交工资部门的事务。利用我们创建的保存点，我们可以提交事务的一部分，同时回滚我们不想要保留的那部分事务：\n\
    \n```\nINSERT INTO dept VALUES (60,'RECRUITING','DENVER');\n\n1 row created.\n\
    \nROLLBACK to savepoint A;\n\nRollback complete.\n\nCOMMIT;\n\nCommit complete.\n\
    ```\n\n由于保存点的存在，我们的回滚仅回滚了部门 60 的未完成事务，随后的提交将部门 50 的完整事务写入了数据库的 `DEPT` 和 `EMP`\
    \ 表：\n\n```\nSELECT * FROM dept;\n\n    DEPTNO DNAME          LOC\n----------\
    \ -------------- -------------\n        10 ACCOUNTING     NEW YORK\n        20\
    \ RESEARCH       DALLAS\n        30 SALES          CHICAGO\n        40 OPERATIONS\
    \     BOSTON\n        50 PAYROLL        LOS ANGELES\n\nSELECT * FROM emp\nWHERE\
    \ empno = 7997;\n\n     EMPNO ENAME      JOB              MGR HIREDATE    SAL\
    \       COMM  DEPTNO\n---------- ---------  ---------- ---------- ---------- ----\
    \ ---------- -------\n      7997 EVANS      ACCTNT          7566 2011-08-15  900\
    \          0      50\n```\n\n在编程语言（如 PL/SQL）中，你可以使用许多类似的机制或编码技术。SQL 语言中的 `SAVEPOINT`\
    \ 命令是一种简单的方法来管理事务，而无需编写更复杂的程序结构。\n\n## 第 9 章 手动调整 SQL\n\n书籍、文章和其他出版物中多次提到，数据库中超过\
    \ 90% 的性能问题是由编写不当的 SQL 引起的。当查询性能不足时，数据库管理员常常被赋予“修复数据库”的任务。在证明清白之前，数据库管理员往往就被认定有罪——并且经常需要证明性能问题并非源于数据库本身，而仅仅是\
    \ SQL 语句编写效率低下。当然，目标是让 SQL 语句在第一次编写时就足够高效。本章的重点是帮助监控和分析现有查询，说明其性能不佳的原因，并展示一些改进查询的步骤。\n\
    \n如果你有正在维护或需要帮助提升性能的 SQL 代码，首先需要问的一些问题包括：\n\n*   该查询之前是否成功运行过？\n*   过去该查询的性能是否可以接受？\n\
    *   是否有该查询成功运行时耗时的度量指标？\n*   该查询通常返回多少数据？\n*   最近一次对查询中引用的对象收集统计信息是什么时候？\n\n一旦这些问题得到解答，就有助于将焦点引导到问题可能所在之处。然后，你可能希望为该查询运行一个执行计划，以查看执行计划乍看之下是否合理。阅读执行计划的技能需要时间，并随着经验而提高。有时，特别是在被查询对象之上存在视图时，执行计划可能会很长且令人望而生畏。因此，重要的是首先知道要关注什么，然后随着深入再挖掘细节。\n\
    \n有时，运行不佳的 SQL 可能会暴露出数据库配置问题，但通常，性能不佳的 SQL 查询是由于 SQL 语句编写不当造成的。再次强调，作为数据库管理员或数据库开发人员，最佳方法是尽可能提前花时间在\
    \ SQL 语句运行于生产环境之前对其进行调整。通常，查询的耗时是效率的基准，但这很容易让人陷入误区。随着时间的推移，数据库的特性会发生变化，应用程序可能会存储更多的历史数据，一个在初始安装时性能良好的查询在应用程序成熟时就可能无法很好地扩展。因此，第一次就花时间把它做对很重要，这说起来容易，但在平衡客户需求、预算和项目时间表时却很难做到。\n\
    \n### 9-1. 显示查询的执行计划\n\n#### 问题\n\n你想在 SQL Plus 中快速获取一个查询的执行计划。\n\n#### 解决方案\n\
    \n在 SQL Plus 中，你可以使用 `AUTOTRACE` 功能来快速获取查询的执行计划。这个 SQL Plus 工具在获取执行计划以及查询执行计划的统计信息时非常方便。最基本的形式是，在你的会话中启用\
    \ `AUTOTRACE`，在 SQL Plus 中执行以下命令：\n\n```\nSQL> set autotrace on\n```\n\n然后，你可以使用\
    \ `AUTOTRACE` 运行一个查询，这将显示该查询的执行计划和执行统计信息：\n\n```\nSELECT last_name, first_name\n\
    FROM employees NATURAL JOIN departments\nWHERE employee_id = 101;\n\nLAST_NAME\
    \                 FIRST_NAME\n------------------------- --------------------\n\
    Kochhar                   Neena\n\n--------------------------------------------------------------------------------------------\n\
    | Id  | Operation                    | Name          | Rows  | Bytes | Cost (%CPU)|\
    \ Time   |\n--------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT             |               |     1 |    33 |     2 \
    \  (0)| 00:00:01\n|   1 |  NESTED LOOPS                |               |     1\
    \ |    33 |     2   (0)| 00:00:01\n|   2 |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES\
    \     |     1 |    26 |     1   (0)| 00:00:01\n|*  3 |    INDEX UNIQUE SCAN  \
    \       | EMP_EMP_ID_PK |     1 |       |     0   (0)| 00:00:01\n|*  4 |   TABLE\
    \ ACCESS BY INDEX ROWID| DEPARTMENTS   |    11 |    77 |     1   (0)| 00:00:01\n\
    |*  5 |    INDEX UNIQUE SCAN         | DEPT_ID_PK    |     1 |       |     0 \
    \  (0)| 00:00:01\n--------------------------------------------------------------------------------------------\n\
    \nStatistics\n----------------------------------------------------------\n   \
    \       0  recursive calls\n          0  db block gets\n          4  consistent\
    \ gets\n          0  physical reads\n          0  redo size\n        490  bytes\
    \ sent via SQL*Net to client\n        416  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n          1  rows processed\n```"
- fmt: "#### How It Works\n\nThere are several options to choose from when using `AUTOTRACE`,\
    \ and the basic factors are as follows:\n\n1.  Do you want to execute the query?\n\
    2.  Do you want to see the execution plan for the query?\n3.  Do you want to see\
    \ the execution statistics for the query?\n\nAs you can see from [Table 9-1](#Chapter09.html#tab_9_1),\
    \ you can abbreviate each command, if so desired. The portions of the words in\
    \ brackets are optional.\n\n![images](images/t0901.jpg)\n\nThe most common use\
    \ for `AUTOTRACE` is to get the execution plan for the query, without running\
    \ the query. By doing this, you can quickly see whether you have a reasonable\
    \ execution plan, and can do this without having to execute the query:\n\n```sql\n\
    SQL> set autot trace exp\n\nSELECT l.location_id, city, department_id, department_name\n\
    \  FROM locations l, departments d\n  WHERE l.location_id = d.location_id(+)\n\
    \  ORDER BY 1;\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation           | Name        | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT    |             |    27 |   837 |     8  (25)| 00:00:01\
    \ |\n|   1 |  SORT ORDER BY      |             |    27 |   837 |     8  (25)|\
    \ 00:00:01 |\n|*  2 |   HASH JOIN OUTER   |             |    27 |   837 |    \
    \ 7  (15)| 00:00:01 |\n|   3 |    TABLE ACCESS FULL| LOCATIONS   |    23 |   276\
    \ |     3   (0)| 00:00:01 |\n|   4 |    TABLE ACCESS FULL| DEPARTMENTS |    27\
    \ |   513 |     3   (0)| 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    ```\n\nFor the foregoing query, if you wanted to see only the execution statistics\
    \ for the query, and did not want to see all the query output, you would do the\
    \ following:\n\n```sql\nSQL> set autot trace stat\nSQL> /\n\n43 rows selected.\n\
    \nStatistics\n----------------------------------------------------------\n   \
    \       0  recursive calls\n          0  db block gets\n         14  consistent\
    \ gets\n          0  physical reads\n          0  redo size\n       1862  bytes\
    \ sent via SQL*Net to client\n        438  bytes received via SQL*Net from client\n\
    \          4  SQL*Net roundtrips to/from client\n          1  sorts (memory)\n\
    \          0  sorts (disk)\n         43  rows processed\n```\n\nOnce you are done\
    \ using `AUTOTRACE` for a given session and want to turn it off and run other\
    \ queries without using `AUTOTRACE`, run the following command from within your\
    \ SQL Plus session:\n\n```sql\nSQL> set autot off\n```\n\nThe default for each\
    \ SQL Plus session is `AUTOTRACE OFF`, but if you want to check to see what your\
    \ current `AUTOTRACE` setting is for a given session, you can do that by executing\
    \ the following command:\n\n```sql\nSQL> show autot\nautotrace OFF\n```\n\n###\
    \ 9-2. Customizing Execution Plan Output\n\n#### Problem\n\nYou want to configure\
    \ the explain plan output for your query based on your specific needs.\n\n####\
    \ Solution\n\nThe Oracle-provided PL/SQL package `DBMS_XPLAN` has extensive functionality\
    \ to get explain plan information for a given query. There are many functions\
    \ within the `DBMS_XPLAN` package. The `DISPLAY` function can be used to quickly\
    \ get the execution plan for a query, and also to customize the information that\
    \ is presented to meet your specific needs. The following is an example that invokes\
    \ the basic display functionality:\n\n```sql\nexplain plan for\nSELECT last_name,\
    \ first_name\nFROM employees JOIN departments USING(department_id)\nWHERE employee_id\
    \ = 101;\n\nExplained.\n\nSELECT * FROM table(dbms_xplan.display);\n\nPLAN_TABLE_OUTPUT\n\
    --------------------------------------------------------------------------------------------\n\
    Plan hash value: 1833546154\n\n--------------------------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name          | Rows  | Bytes | Cost (%CPU)|\
    \ Time    |\n--------------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |               |     1 |    22 |     1  \
    \ (0)| 00:00:01|\n|*  1 |  TABLE ACCESS BY INDEX ROWID| EMPLOYEES     |     1\
    \ |    22 |     1   (0)| 00:00:01|\n|*  2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK\
    \ |     1 |       |     0   (0)| 00:00:01|\n--------------------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - filter(\"EMPLOYEES\".\"DEPARTMENT_ID\" IS NOT NULL)\n   2 - access(\"\
    EMPLOYEES\".\"EMPLOYEE_ID\"=101)\n```\n\nThe `DBMS_XPLAN.DISPLAY` procedure is\
    \ very flexible in configuring how you would like to see output. If you wanted\
    \ to see only the most basic execution plan output, using the foregoing query,\
    \ you could configure the `DBMS_XPLAN.DISPLAY` function to get that output:\n\n\
    ```sql\nSELECT * FROM table(dbms_xplan.display(null,null,'BASIC'));\n\n-----------------------------------------------------\n\
    | Id  | Operation                   | Name          |\n-----------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |               |\n|   1 |  TABLE ACCESS BY\
    \ INDEX ROWID| EMPLOYEES     |\n|   2 |   INDEX UNIQUE SCAN         | EMP_EMP_ID_PK\
    \ |\n-----------------------------------------------------\n```"
