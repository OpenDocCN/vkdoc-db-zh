    \                                                        3 HASH JOIN         \
    \           1752552\n                                                        \
    \  8 PX BLOCK ITERATOR            1752552\n                                  \
    \                        9 TABLE ACCESS FULL            1752552\n       101 36bdwxutr5n75\
    \ EXECUTING      0 SELECT STATEMENT                              0\n         \
    \                                                 2 PX SEND QC (RANDOM)      \
    \    2148232\n                                                          3 HASH\
    \ JOIN                    2148232\n                                          \
    \                8 PX BLOCK ITERATOR            2148232\n                    \
    \                                      9 TABLE ACCESS FULL            2148232\n\
    ```\n\n在此特定示例中，`EMPPART`表的并行度为 2，我们可以看到对于 SID 27 和 101，这些是获取数据的并行从属进程。当这些进程将数据传递回查询协调器，然后再返回给用户时，我们可以查看\
    \ SID 18 时看到这一点。如果我们只是针对`V$SQL_PLAN_MONITOR`视图运行后续查询，我们就可以在查询执行时查看其进度。在上述示例中，我们只看到随着查询的进行，输出的行值在增加。\n\
    \n另一种通过执行计划查看查询进度的方法是使用`DBMS_SQLTUNE.REPORT_SQL_MONITOR`函数。如果我们使用与上一个示例中针对`EMPPART`和`DEPT`表相同的查询，我们可以运行`REPORT_SQL_MONITOR`函数来获取进度的图形化视图。请参阅以下示例，了解如何生成可产生\
    \ HTML 文件的文件，该文件随后可用于查看我们的进度。图 9-2 显示了生成报告的部分内容。\n\n```sql\nset pages 9999\nset\
    \ long 1000000\nSELECT DBMS_SQLTUNE.REPORT_SQL_MONITOR(sql_id=> '36bdwxutr5n75',type=>'HTML')\
    \ FROM dual;\n```\n\n![images](img/0902.jpg)\n\n*图 9-2. `DBMS_SQLTUNE.REPORT_SQL_MONITOR`生成的\
    \ HTML 报告示例*\n\n## 工作原理\n\n`V$SQL_PLAN_MONITOR`视图是从`V$SQL_MONITOR`视图填充的（参见配方 9-7）。这两个视图都是\
    \ Oracle 11g 新增的，并在语句执行的每秒钟更新一次。每当 SQL 语句被监控时，`V$SQL_MONITOR`视图就会被填充。\n\n`DBMS_SQLTUNE.REPORT_SQL_MONITOR`函数可以通过多种方式调用。报告中细节的详细程度以及您希望看到的细节类型，可以根据传递给函数的参数进行更改。输出可以多种格式查看，包括纯文本、HTML\
    \ 和 XML。默认输出格式是纯文本。例如，假设我们想查看针对`EMPPART`和`DEPT`表的连接查询的输出。在这种情况下，我们希望输出为文本格式。我们希望聚合细节，并且只想看到最基本级别的细节。我们的查询将按如下方式运行：\n\
    \n```sql\nSELECT DBMS_SQLTUNE.REPORT_SQL_MONITOR\n(sql_id=>'36bdwxutr5n75',event_detail=>'NO',report_level=>'BASIC')\
    \ FROM dual;\n```\n\n报告输出如下：\n\n```\nSQL Monitoring Report\n\nSQL Text\n------------------------------\n\
    select ename, dname from emppart join dept using (deptno)\n\nGlobal Information\n\
    ------------------------------\n Status              :  EXECUTING\n Instance ID\
    \         :  1\n Session             :  SCOTT (27:229)\n SQL ID              :\
    \  36bdwxutr5n75\n SQL Execution ID    :  16777225\n Execution Started   :  05/15/2011\
    \ 14:56:16\n First Refresh Time  :  05/15/2011 14:56:16\n Last Refresh Time  \
    \ :  05/15/2011 15:09:47\n Duration            :  812s\n Module/Action       :\
    \  SQL*Plus/-\n Service             :  SYS$USERS\n Program             :  sqlplus@ora\n\
    \ Fetch Calls         :  6131367\n\nGlobal Stats\n==========================================================================================\n\
    | Elapsed |   Cpu   |    IO    | Concurrency |  Other   | Fetch | Buffer | Read\
    \ | Read  |\n| Time(s) | Time(s) | Waits(s) |  Waits(s)   | Waits(s) | Calls |\
    \  Gets  | Reqs | Bytes |\n=========================================================================================\n\
    |     398 |     235 |     6.45 |        0.04 |      156 |    6M |   556K | 17629|\
    \   4GB |\n=========================================================================================\n\
    ```\n\n有关执行`REPORT_SQL_MONITOR`函数可用的所有参数的完整列表，请参阅《Oracle PL/SQL Packages and Types\
    \ Reference》。这是一个非常强大的函数，根据您的具体需求，有无数种组合可以进行报告。\n\n### 9-9. 识别过去执行过的消耗资源的 SQL\
    \ 语句\n\n#### 问题\n\n您希望查看以前运行的 SQL 语句的信息，以帮助识别资源密集型操作。\n\n![images](img/square.jpg)\
    \ **注意** 配方 9-6 展示了如何识别*当前正在执行的*资源密集型语句。"
- fmt: "## Solution\n\n`DBA_HIST_SQLSTAT` 和 `DBA_HIST_SQLTEXT` 视图是用于获取 SQL 语句历史信息及其资源消耗统计信息的视图之一。例如，要获取历史信息以了解哪些\
    \ SQL 语句导致了最多的磁盘读取，您可以针对 `DBA_HIST_SQLSTAT` 执行以下查询：\n\n```sql\nSELECT * FROM (\n\
    \  SELECT sql_id, sum(disk_reads_delta) disk_reads_delta,\n                 sum(disk_reads_total)\
    \ disk_reads_total,\n                 sum(executions_delta) execs_delta,\n   \
    \              sum(executions_total) execs_total\n  FROM dba_hist_sqlstat\n  GROUP\
    \ BY sql_id\n  ORDER BY 2 desc)\nWHERE rownum <= 5;\n```\n\n```\nSQL_ID      \
    \  DISK_READS_DELTA DISK_READS_TOTAL EXECS_DELTA EXECS_TOTAL\n------------- ----------------\
    \ ---------------- ----------- -----------\n36bdwxutr5n75          6306401   \
    \      10933153          13          24\n0bx1z9rbm10a1          1590538      \
    \    1590538           2           2\n0gzf8010xdasr           970292         \
    \ 1848743           1           3\n1gtkxf53fk7bp           969785           969785\
    \           7           7\n4h81qj5nspx6s           869588           869588   \
    \        2           2\n```\n\n由于 SQL 的实际文本并未存储在 `DBA_HIST_SQLSTAT` 中，因此您可以查看关联的\
    \ `DBA_HIST_SQLTEXT` 视图以获取磁盘读取次数最高的查询的 SQL 文本：\n\n```sql\nSELECT sql_text FROM\
    \ dba_hist_sqltext\nWHERE sql_id = '36bdwxutr5n75';\n```\n\n```\nSQL_TEXT\n----------------------------------------\n\
    select ename, dname\nfrom emppart join dept using (deptno)\n```\n\n## How It Works\n\
    \n从 `DBA_HIST_SQLSTAT` 视图中可以获取许多关于历史 SQL 语句的有用统计信息，包括以下内容：\n\n*   CPU 利用率\n* \
    \  执行耗时\n*   执行次数\n*   总磁盘读取和写入次数\n*   缓冲区获取信息\n*   并行服务器信息\n*   处理的行数\n*   解析调用\n\
    *   失效次数\n\n此外，这些信息被分为两个数据视图。一组列中包含“总计”信息，另一组列中包含“增量”信息。“总计”列是基于实例启动计算的。“增量”列则基于\
    \ `DBA_HIST_SNAPSHOT` 视图中的 `BEGIN_INTERVAL_TIME` 和 `END_INTERVAL_TIME` 列的值。\n\n\
    如果您想查看历史 SQL 语句的执行计划信息，有一个关联的视图可用于检索给定查询的该信息。您可以访问 `DBA_HIST_SQL_PLAN` 视图以获取历史\
    \ SQL 语句的执行计划信息。请参见以下示例：\n\n```sql\nSELECT id, operation || ' ' || options operation,\
    \ object_name, cost, bytes\nFROM dba_hist_sql_plan\nWHERE sql_id = '0gzf8010xdasr'\n\
    ORDER BY 1;\n```\n\n```\n        ID OPERATION                 OBJECT_NAME    \
    \    COST      BYTES\n---------- ------------------------- ------------ ----------\
    \ ----------\n         0 SELECT STATEMENT                                    73679\n\
    \         1 PX COORDINATOR\n         2 PX SEND QC (RANDOM)       :TQ10001    \
    \      73679 3506438144\n         3 HASH JOIN                                \
    \     73679 3506438144\n         4 BUFFER SORT\n         5 PX RECEIVE        \
    \                                 3          52\n         6 PX SEND BROADCAST\
    \         :TQ10000              3          52\n         7 TABLE ACCESS FULL  \
    \       DEPT                  3          52\n         8 PX BLOCK ITERATOR    \
    \                       73550 1434451968\n         9 TABLE ACCESS FULL       \
    \ EMPPART            73550 1434451968\n\n10 rows selected.\n```\n\n### 9-10. 比较系统变更后的\
    \ SQL 性能\n\n#### Problem\n\n您正在进行系统变更，并希望查看该变更对 SQL 语句性能的影响。\n\n#### Solution\n\
    \n通过使用 Oracle SQL 性能分析器，特别是 `DBMS_SQLPA` 包，您可以量化系统变更将对一个或多个 SQL 语句产生的性能影响。系统变更可以是初始化参数变更、数据库升级或可能影响\
    \ SQL 语句性能的任何其他环境变更。\n\n假设您将执行数据库升级，并希望查看升级对数据库中运行的一系列 SQL 语句的影响。使用 `DBMS_SQLPA`\
    \ 包，执行分析所需的基本步骤通常如下：\n\n1.  基于单个或一系列 SQL 语句创建分析任务。\n2.  基于当前配置运行这些语句的分析。\n3. \
    \ 对环境执行给定的变更（如数据库升级）。\n4.  基于新配置运行这些语句的分析。\n5.  运行“前后”比较以确定变更对 SQL 语句性能的影响。\n\
    6.  生成报告以查看比较结果的输出。\n\n使用上述步骤，参见以下针对单个查询的示例。首先，我们需要创建一个分析任务。对于数据库升级示例，这将在合适的 Oracle\
    \ 11g 测试数据库上完成。在本例中，我们将在 SQL*Plus 中对一个特定的 SQL 语句进行分析：\n\n```sql\nvariable g_task\
    \ varchar2(100);\n```\n\n```sql\nEXEC :g_task := DBMS_SQLPA.CREATE_ANALYSIS_TASK(sql_text\
    \ => 'select ename, dname from emppart join dept using(deptno)');\n```\n\n为了正确模拟此场景，在我们的\
    \ Oracle 11g 数据库上，我们将 `optimizer_features_enable` 参数设置回 Oracle 10g。然后，我们使用“变更前”条件——在本例中，使用先前版本的优化器——运行查询分析：\n\
    \n```sql\nalter session set optimizer_features_enable='10.2.0.4';\n```\n\n```sql\n\
    EXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'test\
    \ execute',execution_name=>'before_change');\n```\n\n完成变更前分析后，我们将优化器设置为当前数据库版本，在本例中，这代表我们将升级到的数据库版本：\n\
    \n```sql\nalter session set optimizer_features_enable='11.2.0.1';\n```\n\n```sql\n\
    EXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'test\
    \ execute',execution_name=>'after_change');\n```\n\n现在，我们已经基于给定的 SQL 语句创建了分析任务，并基于变更条件为该语句运行了“前后”分析任务，我们现在可以运行一个分析任务来比较查询的两次执行结果。有多个指标可以比较。在本例中，我们比较“缓冲区获取次数”：\n\
    \n```sql\nEXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'COMPARE\
    \ PERFORMANCE',execution_name=>'compare change',execution_params => dbms_advisor.arglist('comparison_metric','buffer_gets'));\n\
    ```\n\n最后，我们现在可以使用 `DBMS_SQLPA` 包的 `REPORT_ANALYSIS_TASK` 函数来查看结果。在以下示例中，我们希望仅在执行计划发生更改时才查看输出。输出可以是多种格式，最流行的是\
    \ HTML 和纯文本。对于我们的示例，我们生成了文本输出：\n\n```sql\nset long 100000 longchunksize 100000\
    \ linesize 200 head off feedback off echo off\nspool compare_report.txt\n```\n\
    \n```sql\nSELECT DBMS_SQLPA.REPORT_ANALYSIS_TASK(:g_task, 'TEXT', 'CHANGED_PLANS',\
    \ 'ALL')\nFROM DUAL;\n```\n\n```\nGeneral Information\n--------------------------------------------------------------------------------------------\n\
    \ Task Information:                              Workload Information:\n----------------------------------------------\
    \  --------------------------------------------\n  Task Name    : TASK_1383\n\
    \  Task Owner   : SCOTT\n  Description  :\n```"
  raw: '#### Solution


    The `DBA_HIST_SQLSTAT` and `DBA_HIST_SQLTEXT` views are two of the views that
    can be used to get historical information on SQL statements and their resource
    consumption statistics. For example, to get historical information on what SQL
    statements are incurring the most disk reads, you can issue the following query
    against `DBA_HIST_SQLSTAT`:


    `SELECT * FROM (`

    `  SELECT sql_id, sum(disk_reads_delta) disk_reads_delta,`

    `                 sum(disk_reads_total) disk_reads_total,`

    `                 sum(executions_delta) execs_delta,`

    `                 sum(executions_total) execs_total`

    `  FROM dba_hist_sqlstat`

    `  GROUP BY sql_id`

    `  ORDER BY 2 desc)`

    `WHERE rownum <= 5;`


    `SQL_ID        DISK_READS_DELTA DISK_READS_TOTAL EXECS_DELTA EXECS_TOTAL`

    `------------- ---------------- ---------------- ----------- -----------`

    `36bdwxutr5n75          6306401         10933153          13          24`

    `0bx1z9rbm10a1          1590538          1590538           2           2`

    `0gzf8010xdasr           970292          1848743           1           3`

    `1gtkxf53fk7bp           969785           969785           7           7`

    `4h81qj5nspx6s           869588           869588           2           2`


    Since the actual text of the SQL isn''t stored in `DBA_HIST_SQLSTAT`, you can
    then look at the associated `DBA_HIST_SQLTEXT` view to get the SQL text for the
    query with the highest number of disk reads:


    `SELECT sql_text FROM dba_hist_sqltext`

    `WHERE sql_id = ''36bdwxutr5n75'';`


    `SQL_TEXT`

    `----------------------------------------`

    `select ename, dname`

    `from emppart join dept using (deptno)`


    #### How It Works


    There are many useful statistics to get from the `DBA_HIST_SQLSTAT` view regarding
    historical SQL statements, including the following:


    *   CPU utilization

    *   Elapsed time of execution

    *   Number of executions

    *   Total disk reads and writes

    *   Buffer get information

    *   Parallel server information

    *   Rows processed

    *   Parse calls

    *   Invalidations


    Furthermore, this information is separated by two views of the data. There is
    a set of “Total” information in one set of columns, and there is a “Delta” set
    of information in another set of columns. The “Total” set of columns is calculated
    based on instance startup. The “Delta” columns are based on the values seen in
    the `BEGIN_INTERVAL_TIME` and `END_INTERVAL_TIME` columns of the `DBA_HIST_SNAPSHOT`
    view.


    If you want to see explain plan information for historical SQL statements, there
    is an associated view available to retrieve that information for a given query.
    You can access the `DBA_HIST_SQL_PLAN` view to get the explain plan information
    for historical SQL statements. See the following example:


    `SELECT id, operation || '' '' || options operation, object_name, cost, bytes`

    `FROM dba_hist_sql_plan`

    `WHERE sql_id = ''0gzf8010xdasr''`

    `ORDER BY 1;`


    `        ID OPERATION                 OBJECT_NAME        COST      BYTES`

    `---------- ------------------------- ------------ ---------- ----------`

    `         0 SELECT STATEMENT                            73679`

    `         1 PX COORDINATOR`

    `         2 PX SEND QC (RANDOM)       :TQ10001          73679 3506438144`

    `         3 HASH JOIN                                   73679 3506438144`

    `         4 BUFFER SORT`

    `         5 PX RECEIVE                                      3         52`

    `         6 PX SEND BROADCAST         :TQ10000              3         52`

    `         7 TABLE ACCESS FULL         DEPT                  3         52`

    `         8 PX BLOCK ITERATOR                           73550 1434451968`

    `         9 TABLE ACCESS FULL         EMPPART           73550 1434451968`


    `10 rows selected.`


    ### 9-10. Comparing SQL Performance After a System Change


    #### Problem


    You are making a system change, and want to see the impact that change will have
    on performance of a SQL statement.


    #### Solution


    By using the Oracle SQL Performance Analyzer, and specifically the `DBMS_SQLPA`
    package, you can quantify the performance impact a system change will have on
    one or more SQL statements. A system change can be an initialization parameter
    change, a database upgrade, or any other change to your environment that could
    affect SQL statement performance.


    Let''s say you are going to be performing a database upgrade, and want to see
    the impact the upgrade is going to have on a series of SQL statements run within
    your database. Using the `DBMS_SQLPA` package, the basic steps to get the information
    needed to perform the analysis generally are as follows:


    1.  Create an analysis task based on a single or series of SQL statements.

    2.  Run an analysis for those statements based on your current configuration.

    3.  Perform the given change to your environment (like a database upgrade).

    4.  Run an analysis for those statements based on the new configuration.

    5.  Run a “before and after” comparison to determine what impact the change has
    on the performance of your SQL statement(s).

    6.  Generate a report to view the output of the comparison results.


    Using the foregoing steps, see the following example for a single query. First,
    we need to create an analysis task. For the database upgrade example, this would
    be done on an appropriate test database that is Oracle 11g. In this case, within
    SQL Plus, we will do the analysis for one specific SQL statement:


    `variable g_task varchar2(100);`


    `EXEC :g_task := DBMS_SQLPA.CREATE_ANALYSIS_TASK(sql_text => ''select ename, dname
    from emppart join dept using(deptno)'');`


    In order to properly simulate this scenario, on our Oracle 11g database, we then
    set the `optimizer_features_enable` parameter back to Oracle 10g. We then run
    an analysis for our query using the “before” conditions—in this case, with a previous
    version of the optimizer:


    `alter session set optimizer_features_enable=''10.2.0.4'';`


    `EXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>''test
    execute'',execution_name=>''before_change'');`


    After completing the before analysis, we set the optimizer to the current version
    of our database, which, for this example, represents the version to which we are
    upgrading our database:


    `alter session set optimizer_features_enable=''11.2.0.1'';`


    `EXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>''test
    execute'',execution_name=>''after_change'');`


    Now that we have created our analysis task based on a given SQL statement, and
    have run “before” and “after” analysis tasks for that statement based on the changed
    conditions, we can now run an analysis task to compare the results of the two
    executions of our query. There are several metrics that can be compared. In this
    case, we are comparing “buffer gets”:


    `EXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>''COMPARE
    PERFORMANCE'',execution_name=>''compare change'',execution_params => dbms_advisor.arglist(''comparison_metric'',''buffer_gets''));`


    Finally, we can now use the `REPORT_ANALYSIS_TASK` function of the `DBMS_SQLPA`
    package in order to view the results. In the following example, we want to see
    output only if the execution plan has changed. The output can be in several formats,
    the most popular being HTML and plain text. For our example, we produced text
    output:


    `set long 100000 longchunksize 100000 linesize 200 head off feedback off echo
    off`

    `spool compare_report.txt`


    `SELECT DBMS_SQLPA.REPORT_ANALYSIS_TASK(:g_task, ''TEXT'', ''CHANGED_PLANS'',
    ''ALL'')`

    `FROM DUAL;`


    `General Information`

    `--------------------------------------------------------------------------------------------`

    ` Task Information:                              Workload Information:`

    `----------------------------------------------  --------------------------------------------`

    `  Task Name    : TASK_1383`

    `  Task Owner   : SCOTT`

    `  Description  :`'
  trans: "\n## 解决方案\n\n`DBA_HIST_SQLSTAT` 和 `DBA_HIST_SQLTEXT` 视图是用于获取 SQL 语句历史信息及其资源消耗统计信息的视图之一。例如，要获取历史信息以了解哪些\
    \ SQL 语句导致了最多的磁盘读取，您可以针对 `DBA_HIST_SQLSTAT` 执行以下查询：\n\n```sql\nSELECT * FROM (\n\
    \  SELECT sql_id, sum(disk_reads_delta) disk_reads_delta,\n                 sum(disk_reads_total)\
    \ disk_reads_total,\n                 sum(executions_delta) execs_delta,\n   \
    \              sum(executions_total) execs_total\n  FROM dba_hist_sqlstat\n  GROUP\
    \ BY sql_id\n  ORDER BY 2 desc)\nWHERE rownum <= 5;\n```\n\n```\nSQL_ID      \
    \  DISK_READS_DELTA DISK_READS_TOTAL EXECS_DELTA EXECS_TOTAL\n------------- ----------------\
    \ ---------------- ----------- -----------\n36bdwxutr5n75          6306401   \
    \      10933153          13          24\n0bx1z9rbm10a1          1590538      \
    \    1590538           2           2\n0gzf8010xdasr           970292         \
    \ 1848743           1           3\n1gtkxf53fk7bp           969785           969785\
    \           7           7\n4h81qj5nspx6s           869588           869588   \
    \        2           2\n```\n\n由于 SQL 的实际文本并未存储在 `DBA_HIST_SQLSTAT` 中，因此您可以查看关联的\
    \ `DBA_HIST_SQLTEXT` 视图以获取磁盘读取次数最高的查询的 SQL 文本：\n\n```sql\nSELECT sql_text FROM\
    \ dba_hist_sqltext\nWHERE sql_id = '36bdwxutr5n75';\n```\n\n```\nSQL_TEXT\n----------------------------------------\n\
    select ename, dname\nfrom emppart join dept using (deptno)\n```\n\n## 工作原理\n\n\
    从 `DBA_HIST_SQLSTAT` 视图中可以获取许多关于历史 SQL 语句的有用统计信息，包括以下内容：\n\n*   CPU 利用率\n*   执行耗时\n\
    *   执行次数\n*   总磁盘读取和写入次数\n*   缓冲区获取信息\n*   并行服务器信息\n*   处理的行数\n*   解析调用\n*   失效次数\n\
    \n此外，这些信息被分为两个数据视图。一组列中包含“总计”信息，另一组列中包含“增量”信息。“总计”列是基于实例启动计算的。“增量”列则基于 `DBA_HIST_SNAPSHOT`\
    \ 视图中的 `BEGIN_INTERVAL_TIME` 和 `END_INTERVAL_TIME` 列的值。\n\n如果您想查看历史 SQL 语句的执行计划信息，有一个关联的视图可用于检索给定查询的该信息。您可以访问\
    \ `DBA_HIST_SQL_PLAN` 视图以获取历史 SQL 语句的执行计划信息。请参见以下示例：\n\n```sql\nSELECT id, operation\
    \ || ' ' || options operation, object_name, cost, bytes\nFROM dba_hist_sql_plan\n\
    WHERE sql_id = '0gzf8010xdasr'\nORDER BY 1;\n```\n\n```\n        ID OPERATION\
    \                 OBJECT_NAME        COST      BYTES\n---------- -------------------------\
    \ ------------ ---------- ----------\n         0 SELECT STATEMENT            \
    \                        73679\n         1 PX COORDINATOR\n         2 PX SEND\
    \ QC (RANDOM)       :TQ10001          73679 3506438144\n         3 HASH JOIN \
    \                                    73679 3506438144\n         4 BUFFER SORT\n\
    \         5 PX RECEIVE                                         3          52\n\
    \         6 PX SEND BROADCAST         :TQ10000              3          52\n  \
    \       7 TABLE ACCESS FULL         DEPT                  3          52\n    \
    \     8 PX BLOCK ITERATOR                           73550 1434451968\n       \
    \  9 TABLE ACCESS FULL        EMPPART            73550 1434451968\n\n10 rows selected.\n\
    ```\n\n### 9-10. 比较系统变更后的 SQL 性能\n\n#### 问题\n\n您正在进行系统变更，并希望查看该变更对 SQL 语句性能的影响。\n\
    \n#### 解决方案\n\n通过使用 Oracle SQL 性能分析器，特别是 `DBMS_SQLPA` 包，您可以量化系统变更将对一个或多个 SQL 语句产生的性能影响。系统变更可以是初始化参数变更、数据库升级或可能影响\
    \ SQL 语句性能的任何其他环境变更。\n\n假设您将执行数据库升级，并希望查看升级对数据库中运行的一系列 SQL 语句的影响。使用 `DBMS_SQLPA`\
    \ 包，执行分析所需的基本步骤通常如下：\n\n1.  基于单个或一系列 SQL 语句创建分析任务。\n2.  基于当前配置运行这些语句的分析。\n3. \
    \ 对环境执行给定的变更（如数据库升级）。\n4.  基于新配置运行这些语句的分析。\n5.  运行“前后”比较以确定变更对 SQL 语句性能的影响。\n\
    6.  生成报告以查看比较结果的输出。\n\n使用上述步骤，参见以下针对单个查询的示例。首先，我们需要创建一个分析任务。对于数据库升级示例，这将在合适的 Oracle\
    \ 11g 测试数据库上完成。在本例中，我们将在 SQL*Plus 中对一个特定的 SQL 语句进行分析：\n\n```sql\nvariable g_task\
    \ varchar2(100);\n```\n\n```sql\nEXEC :g_task := DBMS_SQLPA.CREATE_ANALYSIS_TASK(sql_text\
    \ => 'select ename, dname from emppart join dept using(deptno)');\n```\n\n为了正确模拟此场景，在我们的\
    \ Oracle 11g 数据库上，我们将 `optimizer_features_enable` 参数设置回 Oracle 10g。然后，我们使用“变更前”条件——在本例中，使用先前版本的优化器——运行查询分析：\n\
    \n```sql\nalter session set optimizer_features_enable='10.2.0.4';\n```\n\n```sql\n\
    EXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'test\
    \ execute',execution_name=>'before_change');\n```\n\n完成变更前分析后，我们将优化器设置为当前数据库版本，在本例中，这代表我们将升级到的数据库版本：\n\
    \n```sql\nalter session set optimizer_features_enable='11.2.0.1';\n```\n\n```sql\n\
    EXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'test\
    \ execute',execution_name=>'after_change');\n```\n\n现在，我们已经基于给定的 SQL 语句创建了分析任务，并基于变更条件为该语句运行了“前后”分析任务，我们现在可以运行一个分析任务来比较查询的两次执行结果。有多个指标可以比较。在本例中，我们比较“缓冲区获取次数”：\n\
    \n```sql\nEXEC DBMS_SQLPA.EXECUTE_ANALYSIS_TASK(task_name=>:g_task,execution_type=>'COMPARE\
    \ PERFORMANCE',execution_name=>'compare change',execution_params => dbms_advisor.arglist('comparison_metric','buffer_gets'));\n\
    ```\n\n最后，我们现在可以使用 `DBMS_SQLPA` 包的 `REPORT_ANALYSIS_TASK` 函数来查看结果。在以下示例中，我们希望仅在执行计划发生更改时才查看输出。输出可以是多种格式，最流行的是\
    \ HTML 和纯文本。对于我们的示例，我们生成了文本输出：\n\n```sql\nset long 100000 longchunksize 100000\
    \ linesize 200 head off feedback off echo off\nspool compare_report.txt\n```\n\
    \n```sql\nSELECT DBMS_SQLPA.REPORT_ANALYSIS_TASK(:g_task, 'TEXT', 'CHANGED_PLANS',\
    \ 'ALL')\nFROM DUAL;\n```\n\n```\nGeneral Information\n--------------------------------------------------------------------------------------------\n\
    \ Task Information:                              Workload Information:\n----------------------------------------------\
    \  --------------------------------------------\n  Task Name    : TASK_1383\n\
    \  Task Owner   : SCOTT\n  Description  :\n```\n"
