    ### 10-24. Generating Automatic Oracle Error Traces


    #### Problem


    You want to create an automatic error dump file when a specific Oracle error occurs.


    #### Solution


    You can create error dumps to diagnose various problems in the database, by specifying
    the error number in a `hanganalyze` or `systemstate` command. For example, diagnosing
    the causes for deadlocks is often tricky. You can ask the database to dump a trace
    file when it hits the `ORA-00060: Deadlock detected` error. To do this, specify
    the event number 60 with the `hanganalyze` or the `systemstate` command:


    `SQL> alter session set events ''60 trace name hanganalyze level 4'';`


    `Session altered.`


    `SQL> alter session set events ''60 trace name systemstate level 266'';`


    `Session altered.`


    `SQL>`


    Both of these commands will trigger the automatic dumping of diagnostic data when
    the database next encounters the `ORA-00060` error. You can use the same technique
    in an Oracle RAC database. For example, you can issue the following command to
    generate automatic `hanganalyze` dumps:


    `SQL>alter session set events ''60 trace name hanganalyze_global level 4'';`


    This `alter session` statement invokes the `hanganalyze` command in any instance
    in which the database encounters the `ORA-00060` error.


    #### How It Works


    Setting event numbers for an error will ensure that when the specified error occurs
    the next time, Oracle automatically dumps the error information for you. This
    comes in very handy when you''re diagnosing an error that occurs occasionally
    and getting a current `systemstate` dump or a `hanganalyze` dump is unhelpful.
    Some events such as deadlocks have a text alias, in which case you can specify
    the alias instead of the error number. For the `ORA-00060` error, the text alias
    is `deadlock`, and so you can issue the following command for tracing the error:


    `SQL> alter session set events ''deadlock trace name systemstate level 266'';`


    `Session altered.`


    `SQL>`


    Similarly, you can use text aliases wherever they''re available, for other error
    events.


    ### 10-25\. Tracing a Background Process


    #### Problem


    You want to trace a background process.'
