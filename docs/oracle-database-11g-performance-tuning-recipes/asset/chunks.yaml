    \ 'TRUE', 'FALSE'));\n```\n\n以下是一些示例输出：\n\n```\nSegment Advice --------------------------\n\
    TABLESPACE_NAME  : USERS\nSEGMENT_OWNER    : MV_MAINT\nSEGMENT_NAME     : F_REGS\n\
    ALLOCATED_SPACE  : 20971520\nRECLAIMABLE_SPACE: 18209960\nRECOMMENDATIONS  : Perform\
