  trans: "\n# 工作原理\n\n并行 DML 可适用于任何 DML 操作——`INSERT`、`UPDATE`、`MERGE` 和 `DELETE`。根据你运行的\
    \ DML 操作类型，规则略有不同。例如，若想并行运行 `INSERT` 语句，首先需为会话启用并行处理，然后使用适当的机制执行 `INSERT` 语句，以使\
    \ DML 能够并行运行：\n\n`ALTER SESSION ENABLE PARALLEL DML;`\n\n`INSERT /*+ PARALLEL(DEPT,4)\
    \ */ INTO DEPT SELECT /*+ PARALLEL(DEPT_COPY,4) */ * FROM DEPT_COPY;`\n\n通过上述语句，我们在\
    \ `INSERT` 语句中加入了一个并行提示，同时在该语句的 `SELECT` 部分也加入了一个并行提示。需要记住一个非常重要的点：即使你的 DML 语句启用了并行处理，它也不会直接影响同一语句中相关查询的并行性。例如，以下语句的\
    \ DML 操作可以并行运行，但相应的 `SELECT` 语句将以串行模式运行，因为查询本身未指定并行性。\n\n`ALTER SESSION ENABLE\
    \ PARALLEL DML;`\n\n`INSERT /*+ PARALLEL(DEPT,4) */ INTO DEPT SELECT * FROM DEPT_COPY;`\n\
    \n为了充分利用并行能力，尝试将语句的所有部分都并行化。如果你并行化了 `INSERT` 但没有并行化 `SELECT`，那么 `SELECT` 部分就成了\
    \ `INSERT` 的瓶颈，导致 `INSERT` 性能下降。\n\n并行 DML 操作也适用于 `UPDATE`、`MERGE` 和 `DELETE`\
    \ 语句。假设你的公司很慷慨，决定给会计部门的每个员工加薪 1%：\n\n`UPDATE /*+ PARALLEL(EMP,4) */ EMP SET SAL\
    \ = SAL*1.01 WHERE DEPTNO=10;`\n\n然后，几个月后，你的公司决定解雇那些在会计部门加过薪的员工：\n\n`DELETE /*+\
    \ PARALLEL(EMP,4) */ FROM EMP WHERE DEPTNO=10;`\n\n在数据库中并行化 DML 事务的另一种方法是使用 `DBMS_PARALLEL_EXECUTE`\
    \ PL/SQL 包。虽然配置更复杂，但使用此包运行并行化事务有一些关键优势：\n\n*   整个事务被分割成若干部分，每部分都有自己的提交点。\n*  \
    \ 事务可重新启动。\n*   锁定仅作用于受影响的行。\n*   减少了 Undo 空间使用。\n*   你可以更精细地控制工作如何划分。你可以通过多种方式划分工作：\n\
    \    *   按列\n    *   按 ROWID\n    *   按 SQL 语句\n\n使用 `DBMS_PARALLEL_EXECUTE` 包的明显好处是能更好地控制大型事务的运行方式、增加功能性以及更高效地利用数据库资源。使用此包的主要权衡取舍是它配置、设置和运行起来更为复杂——但在处理海量数据时，这可能是非常值得的。\n\
    \n`![images](img/square.jpg)` `提示` 你必须执行 `ALTER SESSION ENABLE | FORCE PARALLEL\
    \ DML` 语句，才能使并行 DML 在你的事务中生效。\n\n## 并行 DML 的限制\n\n使用并行 DML 存在许多限制，你需要了解，即使处理大量数据，在某些情况下并行\
    \ DML 也可能无法实现：\n\n*   单行插入（使用 `VALUES` 子句）无法并行运行。\n*   在一个事务中，你只能对一个表进行一次修改。\n\
    *   无法对带有触发器的表运行。\n*   带有某些约束的表可能不符合条件。\n*   对带有对象或 LOB 列的表，并行 DML 功能有限。\n*  \
    \ 对临时表，并行 DML 功能有限。\n*   分布式事务无法并行化。\n\n## 并行度\n\n一旦你提交一个并行化的 DML 操作以供执行，Oracle\
    \ 会根据一组优先规则，确定将用于整个提交语句的并行度。理解这些规则很重要，这样你才能获得事务所期望的并行度。\n\n对于 DML 事务，Oracle 应用以下基本优先规则来确定并行度：\n\
    \n1.  检查 `INSERT`、`UPDATE`、`MERGE` 或 `DELETE` 语句上是否指定了提示。\n2.  检查是否存在任何会话级指令。\n\
    3.  检查目标对象上的对象级并行性。\n4.  在语句查询部分所涉及的查询表或任何关联索引中，选择指定的最大并行度（仅适用于插入）。\n\n为语句的插入和查询部分选择合适的并行度后，查询即被执行。请注意，为语句每个部分选择的并行度可以不同。\n\
    \n## 其他注意事项\n\n使用并行 DML 可能很复杂，因为涉及的对象类型、是否是分区表、对象上指定的并行度、语句中指定的提示以及并行参数设置等，存在多种可能的排列组合。\n\
    \n以下是使用并行 DML 时需要考虑的其他一些因素：\n\n*   对于并行化的插入事务，会执行直接路径加载。\n*   在决定是否使用并行 DML 时，你必须权衡你将获得的性能提升与该操作的空间使用量。并行化的\
    \ `INSERT` 语句速度快，但占用更多空间。如果你为插入事务指定了并行度为 4，那么将为该操作分配 4 个区。你必须根据自身需求判断哪个更重要。\n\
    *   如果对象是分区表，可能会影响并行 DML 事务的运行方式。\n\n# 15-5. 并行创建表\n\n## 问题\n\n你需要从现有的大型表中快速创建一个新表，并希望利用多进程来帮助加速表的创建。\n\
    \n## 解决方案\n\n如果你正在管理超大型数据库，或者需要重建大型表，并行 DDL 速度快，并且比运行并行 DML 更有优势。速度是选择使用并行 DDL\
    \ 从现有大型表创建表的最大因素。在你的特定 DDL 命令中，有一个 `PARALLEL` 子句来决定是否并行执行操作。这是通过使用 `CREATE TABLE\
    \ ... AS SELECT` 操作完成的：\n\n```\nCREATE TABLE EMP_COPY\nPARALLEL(DEGREE 4)\nAS\n\
    SELECT * FROM EMP;\n```\n\n```\n------------------------------------------------------------------------\n\
    | Id  | Operation              | Name     |    TQ  |IN-OUT| PQ Distrib |\n------------------------------------------------------------------------\n\
    |   0 | CREATE TABLE STATEMENT |          |        |      |            |\n|  \
    \ 1 |  PX COORDINATOR        |          |        |      |            |\n|   2\
    \ |   PX SEND QC (RANDOM)  | :TQ10000 |  Q1,00 | P->S | QC (RAND)  |\n|   3 |\
    \    LOAD AS SELECT      | EMP_COPY |  Q1,00 | PCWP |            |\n|   4 |  \
    \   PX BLOCK ITERATOR  |          |  Q1,00 | PCWC |            |\n|   5 |    \
    \  TABLE ACCESS FULL | EMP      |  Q1,00 | PCWP |            |\n------------------------------------------------------------------------\n\
    ```\n"
- fmt: "# How It Works\n\n并行 DDL 之所以流行，是因为它是在大量数据上执行操作的一种快速方式。工作被分成若干部分并并发执行。假设你刚买了一栋新房子，正在搬家过程中。如果你正在用卡车装载箱子，四个人一起装肯定比一个人快得多。此外，并行\
    \ DDL 是在 DDL 命令掩护下执行 DML 类型操作的一种有吸引力的方式。\n\n使用 `CREATE TABLE ... AS SELECT` 最常见的原因包括以下几点：\n\
    \n*   表结构已更改，需要重建表。\n*   为某些特定应用目的创建类似结构。\n*   从表中删除大量行。\n*   需要从一个大表中删除多个列。\n\
    \n上述一些操作也可以严格使用并行 DML 来处理，但使用并行 DDL 相对于并行 DML 有一个明显的优势。由于 DDL 操作无法回滚，因此不会为这些操作生成撤销（undo），这使得操作更加高效。\n\
    \n并行 DDL 操作的并行度（DOP）由对象的 DOP 决定。这也包括语句中的查询部分。如果你选择，可以通过执行以下命令来覆盖对象的 DOP：\n\n`ALTER\
    \ SESSION FORCE PARALLEL DDL;`\n\n如果你有一个非常大的表，需要从中删除许多行，请考虑使用 `CREATE TABLE ...\
    \ AS SELECT`，而不是使用 DML `DELETE` 语句。删除行是一项昂贵的操作。在大型数据仓库环境中，当需要删除大量行时，执行删除操作的成本和时间可能会变得难以控制。由于删除操作的性质，它对数据库来说非常耗费资源，因为执行该操作会产生大量的重做（redo）和撤销（undo）。一个好的经验法则是，如果你正在删除一个表中不到\
    \ 5-10% 的行，直接创建一个包含所有你想要保留的行的新表可能会更快。\n\n下面是一个示例，我们从包含 1,234,568 行的 `EMP` 表中删除大约\
    \ 20% 的行：\n\n```\n  delete /*+ parallel(emp,4) */ from emp\n  where empno > 1000000\n\
    SQL> /\n\n234568 rows deleted.\n\nElapsed: 00:00:09.94\n\n--------------------------------------------------------------------------\n\
    | Id  | Operation                | Name     |    TQ  |IN-OUT| PQ Distrib |\n--------------------------------------------------------------------------\n\
    |   0 | DELETE STATEMENT         |          |        |      |            |\n|\
    \   1 |  PX COORDINATOR          |          |        |      |            |\n|\
    \   2 |   PX SEND QC (RANDOM)    | :TQ10001 |  Q1,01 | P->S | QC (RAND)  |\n|\
    \   3 |    INDEX MAINTENANCE     | EMP      |  Q1,01 | PCWP |            |\n|\
    \   4 |     PX RECEIVE           |          |  Q1,01 | PCWP |            |\n|\
    \   5 |      PX SEND RANGE       | :TQ10000 |  Q1,00 | P->P | RANGE      |\n|\
    \   6 |       DELETE             | EMP      |  Q1,00 | PCWP |            |\n|\
    \   7 |        PX BLOCK ITERATOR |          |  Q1,00 | PCWC |            |\n|\
    \   8 |          TABLE ACCESS FULL| EMP      |  Q1,00 | PCWP |            |\n\
    --------------------------------------------------------------------------\n```\n\
    \n这个删除操作耗时 9.94 秒。如果我们现在运行一个 `CREATE TABLE ... AS SELECT` 语句来实现相同的结果，我们可以看到性能上的差异。\n\
    \n```\ncreate table emp_ctas_new2\nparallel(degree 4)\nnologging\nas select /*+\
    \ parallel(a,4) */ * from emp_ctas\nwhere empno <= 1000000\nSQL> /\nElapsed: 00:00:01.70\n\
    \n--------------------------------------------------------------------------------------\n\
    | Id  | Operation                        | Name         |    TQ  |IN-OUT| PQ Distrib\
    \ |\n--------------------------------------------------------------------------------------\n\
    |   0 | CREATE TABLE STATEMENT           |              |        |      |    \
    \        |\n|   1 |  PX COORDINATOR                  |              |        |\
    \      |            |\n|   2 |   PX SEND QC (RANDOM)            | :TQ10001   \
    \  |  Q1,01 | P->S | QC (RAND)  |\n|   3 |    LOAD AS SELECT                |\
    \ EMP_CTAS_NEW |  Q1,01 | PCWP |            |\n|   4 |     PX RECEIVE        \
    \           |              |  Q1,01 | PCWP |            |\n|   5 |      PX SEND\
    \ ROUND-ROBIN         | :TQ10000     |        | S->P | RND-ROBIN  |\n|   6 | \
    \      TABLE ACCESS BY INDEX ROWID| EMP_CTAS     |        |      |           \
    \ |\n|   7 |        INDEX RANGE SCAN          | EMP_CTAS_PK  |        |      |\
    \            |\n--------------------------------------------------------------------------------\n\
    ```\n\n创建表耗时 1.7 秒，比使用 `DELETE` 语句执行相同操作快了 5 倍以上。但是，如果表上有索引，你需要在选择此方法之前考虑这个因素，因为如果你重新创建一个表，还必须为该表重新创建相关的索引。尽管如此，它仍然可能更快，因为你可以并行地重新创建任何索引。\n\
    \n请记住，尽管前面的示例在这些语句上使用了并行 DDL，但即使你以串行模式运行，这个概念同样成立。当你需要从表中删除大量行时，`CREATE TABLE\
    \ ... AS SELECT` 与并行执行的 DDL 或非并行串行执行的 DDL 下的 `DELETE` 相比，都是一个有利的选择。\n\n并行创建表的一个潜在缺点是，这些操作的空间分配可能会导致表比串行创建时更碎片化。这是在并行创建表时应该考虑的一个权衡。操作中指定的\
    \ DOP 会生成相应数量的并行线程，并为每个线程分配一个区（extent）。因此，如果你为并行操作指定了 DOP 为 4，那么该操作至少会分配 4 个区。根据表空间的\
    \ `MINIMUM EXTENT` 大小，Oracle 会尝试在操作结束时修剪未使用的空间。不过，你应该预料到，并行创建表操作的空间效率确实不如串行运行的操作。\n\
    \n### 15-6. 并行创建索引\n\n#### 问题\n\n你需要尽快为一个大表创建索引，并希望使用多个进程来帮助加速索引创建。\n\n#### 解决方案\n\
    \n任何时候拥有一个大表时，始终使用并行 DDL 创建该表的任何关联索引都是一个好主意，即使你希望索引的 DOP 在查询时是非并行化的。并行创建索引的主要好处是它确实能大大减少创建索引的时间。为一个大表并行创建索引总是有意义的，然后可以在创建操作完成后选择重置用于查询的\
    \ DOP。在以下示例中，我们使用 DOP 为 4 来创建索引，该 DOP 将在创建索引的过程中使用：\n\n```\nCREATE INDEX EMP_COPY_I1\n\
    ON EMP_COPY (HIREDATE)\nPARALLEL(DEGREE 4);\n```\n\n然后，在索引创建完成后，我们可以选择使用以下任一示例将\
    \ DOP 重置为不同的值供查询使用：\n\n`ALTER INDEX EMP_COPY_I1 NOPARALLEL;`\n`ALTER INDEX EMP_COPY_I1\
    \ PARALLEL(DEGREE 1);`"
  raw: '#### How It Works


    The reason parallel DDL is popular is that it is a fast way to perform operations
    on a large amount of data. The work is divided up in several pieces and done concurrently.
    Let''s say you just bought a new house, and are in the process of moving. If you
    are loading a large moving truck with boxes, it will simply be faster with four
    people loading rather than one. Moreover, parallel DDL is an attractive way to
    perform DML-type operations under the covers of DDL commands.


    The most common reasons to use the `CREATE TABLE ... AS SELECT` include the following:


    *   The table structure has changed and you need to rebuild the table.

    *   You are creating a like structure for some specific application purpose.

    *   You are deleting a large number of rows from the table.

    *   You need to drop multiple columns from a large table.


    Some of the foregoing operations could also be strictly handled with parallel
    DML, but using parallel DDL has a distinct advantage over parallel DML. Since
    DDL operations cannot be rolled back, undo is not generated for these operations,
    and it is simply a more efficient operation.


    The DOP for a parallel DDL operation is determined by the object DOP. This also
    includes the query portion of the statement. If you choose to, you can override
    the DOP of the objects by issuing the following command:


    `ALTER SESSION FORCE PARALLEL DDL;`


    If you have a very large table from which you need to delete many rows, consider
    using `CREATE TABLE ... AS SELECT` rather than using a DML `DELETE` statement.
    Deleting rows is an expensive operation. In large data warehouse environments,
    in scenarios where a large volume of rows needs to be deleted, the cost and time
    of doing the delete can quickly become unmanageable. Because of the nature of
    delete, it is very resource-intensive for the database as far as the amount of
    redo and undo generation it takes to perform the operation. One good rule of thumb
    to use is that if you are deleting as little as 5–10% of the rows of a large table,
    it can be simply faster to create a new table with all the rows you want to keep.


    Here is an example where we are deleting about 20% of the rows from our `EMP`
    table of 1,234,568 rows:


    `  delete /*+ parallel(emp,4) */ from emp`

    `  where empno > 1000000`

    `SQL> /`


    `234568 rows deleted.`


    `Elapsed: 00:00:09.94`


    `--------------------------------------------------------------------------`

    `| Id  | Operation                | Name     |    TQ  |IN-OUT| PQ Distrib |`

    `--------------------------------------------------------------------------`

    `|   0 | DELETE STATEMENT         |          |        |      |            |`

    `|   1 |  PX COORDINATOR          |          |        |      |            |`

    `|   2 |   PX SEND QC (RANDOM)    | :TQ10001 |  Q1,01 | P->S | QC (RAND)  |`

    `|   3 |    INDEX MAINTENANCE     | EMP      |  Q1,01 | PCWP |            |`

    `|   4 |     PX RECEIVE           |          |  Q1,01 | PCWP |            |`

    `|   5 |      PX SEND RANGE       | :TQ10000 |  Q1,00 | P->P | RANGE      |`

    `|   6 |       DELETE             | EMP      |  Q1,00 | PCWP |            |`

    `|   7 |        PX BLOCK ITERATOR |          |  Q1,00 | PCWC |            |`

    `|   8 |         TABLE ACCESS FULL| EMP      |  Q1,00 | PCWP |            |`

    `--------------------------------------------------------------------------`


    This delete took 9.94 seconds to run. If we now run a `CREATE TABLE ... AS SELECT`
    statement to achieve the same result, we can see the difference in performance.


    `create table emp_ctas_new2`

    `parallel(degree 4)`

    `nologging`

    `as select /*+ parallel(a,4) */ * from emp_ctas`

    `where empno <= 1000000`

    `SQL> /`

    `Elapsed: 00:00:01.70`


    `--------------------------------------------------------------------------------------`

    `| Id  | Operation                        | Name         |    TQ  |IN-OUT| PQ
    Distrib |`

    `--------------------------------------------------------------------------------------`

    `|   0 | CREATE TABLE STATEMENT           |              |        |      |            |`

    `|   1 |  PX COORDINATOR                  |              |        |      |            |`

    `|   2 |   PX SEND QC (RANDOM)            | :TQ10001     |  Q1,01 | P->S | QC
    (RAND)  |`

    `|   3 |    LOAD AS SELECT                | EMP_CTAS_NEW |  Q1,01 | PCWP |            |`

    `|   4 |     PX RECEIVE                   |              |  Q1,01 | PCWP |            |`

    `|   5 |      PX SEND ROUND-ROBIN         | :TQ10000     |        | S->P | RND-ROBIN  |`

    `|   6 |       TABLE ACCESS BY INDEX ROWID| EMP_CTAS     |        |      |     |`

    `|   7 |        INDEX RANGE SCAN          | EMP_CTAS_PK  |        |      |     |`

    `--------------------------------------------------------------------------------`


    Creating the table took 1.7 seconds, over 5 times faster than performing the same
    operation with a `DELETE` statement. If you have indexes on the table, however,
    you need to consider that as a factor before choosing this method, because if
    you re-create a table, you must also re-create the associated indexes for that
    table. It''s still likely to be faster, however, as you can re-create any indexes
    in parallel as well.


    Keep in mind that, even though the foregoing example uses parallel DDL on these
    statements, this concept holds true even if you are running in serial mode. When
    you need to delete a large number of rows from a table, the `CREATE TABLE ...
    AS SELECT` can be compared favorably to `DELETE` with parallel-executed DDL or
    non-parallel, serial-executed DDL.


    One potential drawback of creating tables in parallel is that the space allocations
    for these operations may leave the table more fragmented than if you created the
    table serially. This is a trade-off that should be considered when creating tables
    in parallel. The DOP that is specified in the operation spawns that number of
    parallel threads, and one extent is allocated for each thread. So, if you have
    specified a DOP of 4 for your parallel operation, there will be a minimum of 4
    extents allocated for the operation. Depending on the `MINIMUM EXTENT` size for
    the tablespace, Oracle does attempt to trim unused space at the end of the operation.
    You should expect, though, that parallel create table operations are simply less
    space-efficient than operations run serially.


    ### 15-6\. Creating Indexes in Parallel


    #### Problem


    You need to create indexes for a large table as quickly as possible and want to
    employ the use of multiple processes to help speed up the index creation.


    #### Solution


    Any time you have a large table, it is a good idea to always create any associated
    index for that table using parallel DDL, even if you want the DOP on the index
    to be non-parallelized for queries. The major benefit of creating an index in
    parallel is that it simply takes much less time to create the index. It always
    makes sense to create an index for a large table in parallel, and then optionally
    choose to reset the DOP used for queries after the create operation is complete.
    In the following example, we are creating the index with a DOP of 4, which will
    be used during the process of creating the index:


    `CREATE INDEX EMP_COPY_I1`

    `ON EMP_COPY (HIREDATE)`

    `PARALLEL(DEGREE 4);`


    Then, after the index has been created, we can choose to reset the DOP to a different
    value for use by queries, using either of the following examples:


    `ALTER INDEX EMP_COPY_I1 NOPARALLEL;`

    `ALTER INDEX EMP_COPY_I1 PARALLEL(DEGREE 1);`'
