- fmt: "#### 解决方案\n\n要创建一个 SQL 测试案例，首先必须导出 SQL 语句以及关于该语句的若干有用信息。以下示例展示了如何捕获抛出错误的 SQL\
    \ 语句。在此示例中，用户 SH 执行导出操作（你无法以用户 SYS 的身份执行导出）。\n\n首先，以 SYSDBA 身份连接到数据库并创建一个目录来保存测试案例：\n\
    \n```\nSQL> conn / as sysdba\nConnected.\nSQL> create or replace directory TEST_DIR1\
    \ as 'c:\\myora\\diagnsotics\\incidents\\';\n\nDirectory created.\nSQL> grant\
    \ read,write on directory TEST_DIR1 to sh;\n\nGrant succeeded.\nSQL>\n```\n\n\
