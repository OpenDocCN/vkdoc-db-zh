    mergeable views.


    ![images](images/t1403.jpg)


    For a non-mergeable view, the optimizer must break the work up into two pieces.
    It first must execute the query that defines the view, and then must execute the
    top-level query. Because of this, the hints defined within the view itself are
    preserved. For instance, we are querying our `DEPT_SAL` view. We can see from
    the explain plan that the query is broken up into pieces:


    `SELECT manager_id, sum(total_salary)`

    `FROM dept_sal`

