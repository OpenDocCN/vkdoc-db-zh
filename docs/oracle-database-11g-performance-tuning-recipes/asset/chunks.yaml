    the `V$LOCK` and the `V$SESSION` views. The `V$LOCKED_OBJECT` and the `DBA_OBJECTS`
    views are also very useful in identifying the locked objects. In order to find
    out whether a session is being blocked by the locks being applied by another session,
    you can execute the following query:


    `SQL> select s1.username || ''@'' || s1.machine`

    `  2  || '' ( SID='' || s1.sid || '' )  is blocking ''`

    `  3  || s2.username || ''@'' || s2.machine || '' ( SID='' || s2.sid || '' ) ''
    AS blocking_status`

    `  4  from v$lock l1, v$session s1, v$lock l2, v$session s2`

    `  5  where s1.sid=l1.sid and s2.sid=l2.sid`

    `  6  and l1.BLOCK=1 and l2.request > 0`

    `  7  and l1.id1 = l2.id1`

    `  8  and l2.id2 = l2.id2 ;`


    `BLOCKING_STATUS`

    `--------------------------------------------------------------------`


    `HR@MIRO\MIROPC61 ( SID=68 )  is blocking SH@MIRO\MIROPC61 ( SID=81 )`


    `SQL>`


    The output of the query shows the blocking session as well as all the blocked
    sessions.


    A quick way to find out if you have any blocking locks in your instance at all,
    for any user, is to simply run the following query:


    `SQL> select * from V$lock where block > 0;`


    If you don''t get any rows back from this query—good—you don''t have any blocking
    locks in the instance right now! We''ll explain this view in more detail in the
    explanation section.


    #### How It Works


    Oracle uses two types of locks to prevent destructive behavior: exclusive and
    shared locks. Only one transaction can obtain an exclusive lock on a row or a
    table, while multiple shared locks can be obtained on the same object. Oracle
    uses locks at two levels—row and table levels. Row locks, indicated by the symbol
    `TX`, lock just a single row of a table for each row that''ll be modified by a
    DML statement such as `INSERT`, `UPDATE`, and `DELETE`. This is true also for
    a `MERGE` or a `SELECT … FOR UPDATE` statement. The transaction that includes
    one of these statements grabs an exclusive row lock as well as a row share table
    lock. The transaction (and the session) will hold these locks until it commits
    or rolls back the statement. Until it does one of these two things, all other
    sessions that intend to modify that particular row are blocked. Note that each
    time a transaction intends to modify a row or rows of a table, it holds a table
    lock (`TM`) as well on that table, to prevent the database from allowing any DDL
    operations (such as `DROP TABLE`) on that table while the transaction is trying
    to modify some of its rows.


    In an Oracle database, locking works this way:


    *   A reader won''t block another reader.

    *   A reader won''t block a writer.

    *   A writer won''t block a reader of the same data.

    *   A writer will block another writer that wants to modify the same data.


    It''s the last case in the list, where two sessions intend to modify the same
    data in a table, that Oracle''s automatic locking kicks in, to prevent destructive
    behavior. The first transaction that contains the statement that updates an existing
    row will get an exclusive lock on that row. While the first session that locks
    a row continues to hold that lock (until it issues a `COMMIT` or `ROLLBACK` statement),
    other sessions can modify any other rows in that table other than the locked row.
    The concomitant table lock held by the first session is merely intended to prevent
    any other sessions from issuing a DDL statement to alter the table''s structure.
    Oracle uses a sophisticated locking mechanism whereby a row-level lock isn''t
    automatically escalated to the table, or even the block level.


    ### 5-13. Identifying Blocked and Blocking Sessions


    #### Problem


    You notice enqueue locks in your database and suspect that a blocking lock may
    be holding up other sessions. You''d like to identify the blocking and the blocked
    sessions.


    #### Solution


    When you see an enqueue wait event in an Oracle database, chances are that it''s
    a locking phenomenon that''s holding up some sessions from executing their SQL
    statements. When a session waits on an “enqueue” wait event, that session is waiting
    for a lock that''s held by a different session. The blocking session is holding
    the lock in a mode that''s incompatible with the lock mode that''s being requested
    by the blocked session. You can issue the following command to view information
    about the blocked and the blocking sessions:


    `SQL> select decode(request,0,''Holder: '',''Waiter: '')||sid sess,`

    `     id1, id2, lmode, request, type`

    `     from v$lock`

    `     where (id1, id2, type) in`

    `     (select id1, id2, type from v$lock where request>0)`

    `     order by id1, request;  `


    The `V$LOCK` view shows if there are any blocking locks in the instance. If there
    are blocking locks, it also shows the blocking session(s) and the blocked session(s).
    Note that a blocking session can block multiple sessions simultaneously, if all
    of them need the same object that''s being blocked. Here''s an example that shows
    there are locks present:


    `SQL> select sid,type,lmode,request,ctime,block from v$lock;`


    `       SID           TY           LMODE         REQUEST       CTIME        BLOCK`

    `--------------     --------     -----------    -----------   --------     -------     `

    `       127           MR              4             0         102870          0`

    `        81           TX              0             6            778          0`

    `       191           AE              4             0            758          0`

    `       205           AE              4             0            579          0`

    `       140           AE              4             0          11655          0`

    `        68           TM              3             0            826          0`

    `        68           TX              6             0            826          1`

    `…`

    `SQL>`


    The key column to watch is the `BLOCK` column—the blocking session will have the
    value 1 for this column. In our example, session 68 is the blocking session, because
    it shows the value 1 under the `BLOCK` column. Thus, the `V$LOCK` view confirms
    our initial finding in the “Solution” section of this recipe. The blocking session,
    with a SID of 68, also shows a lock mode 6 under the `LMODE` column, indicating
    that it''s holding this lock in the exclusive mode—this is the reason session
    81 is “hanging,” unable to perform its update operation. The blocked session,
    of course, is the victim—so it shows a value of 0 in the `BLOCK` column. It also
    shows a value of 6 under the `REQUEST` column, because it''s requesting a lock
    in the exclusive mode to perform its update of the column. The blocking session,
    in turn, will show a value of 0 for the `REQUEST` column, because it isn''t requesting
    any locks—it''s already holding it.


    If you want to find out the wait class and for how long a blocking session has
    been blocking others, you can do so by querying the `V$SESSION` view, as shown
    here:


    `SQL> select  blocking_session, sid,  wait_class,`

    `     seconds_in_wait`

    `     from     v$session`

    `     where blocking_session is not NULL`

    `     order by blocking_session;`


    `BLOCKING_SESSION        SID        WAIT_CLASS        SECONDS_IN_WAIT`

    `-----------------    --------       -------------    ----------------  `

    `      68                81          Application                  7069`


    `SQL>`


    The query shows that the session with SID=68 is blocking the session with SID=81,
    and the block started 7,069 seconds ago.'
  trans: "### 解决方案\n\n正如本章引言中所述，Oracle 使用多种锁来控制由多个会话执行的事务，以防止数据库中的破坏性行为。阻塞锁可能会“拖慢”会话——实际上，该会话只是在等待另一个持有对象锁（例如一行或一组行，甚至是一整张表）的会话。或者，在开发场景中，开发人员可能启动了多个会话，其中一些会话相互阻塞。\n\
    \n在分析 Oracle 锁时，必须检查的一些关键数据库视图是 `V$LOCK` 和 `V$SESSION` 视图。`V$LOCKED_OBJECT` 和\
    \ `DBA_OBJECTS` 视图对于识别被锁定的对象也非常有用。要查明一个会话是否被另一个会话应用的锁阻塞，您可以执行以下查询：\n\n```sql\n\
    SQL> select s1.username || '@' || s1.machine\n  2  || ' ( SID=' || s1.sid || '\
    \ )  is blocking '\n  3  || s2.username || '@' || s2.machine || ' ( SID=' || s2.sid\
    \ || ' ) ' AS blocking_status\n  4  from v$lock l1, v$session s1, v$lock l2, v$session\
    \ s2\n  5  where s1.sid=l1.sid and s2.sid=l2.sid\n  6  and l1.BLOCK=1 and l2.request\
    \ > 0\n  7  and l1.id1 = l2.id1\n  8  and l2.id2 = l2.id2 ;\n\nBLOCKING_STATUS\n\
    --------------------------------------------------------------------\n\nHR@MIRO\\\
    MIROPC61 ( SID=68 )  is blocking SH@MIRO\\MIROPC61 ( SID=81 )\n\nSQL>\n```\n\n\
    此查询的输出显示了阻塞会话以及所有被阻塞的会话。\n\n一个快速检查实例中是否存在任何用户阻塞锁的方法是简单地运行以下查询：\n\n```sql\nSQL>\
    \ select * from V$lock where block > 0;\n```\n\n如果您没有从该查询中获得任何返回行——很好——您的实例当前没有任何阻塞锁！我们将在解释部分更详细地说明此视图。\n\
    \n### 工作原理\n\nOracle 使用两种类型的锁来防止破坏性行为：排他锁和共享锁。只有一个事务能获得对一行或一张表的排他锁，而多个共享锁可以被获取到同一个对象上。Oracle\
    \ 在两个级别使用锁——行级和表级。行锁（由符号 `TX` 表示）对于将被 `INSERT`、`UPDATE` 和 `DELETE` 等 DML 语句修改的每一行，仅锁定表中的单个行。对于\
    \ `MERGE` 或 `SELECT … FOR UPDATE` 语句也是如此。包含这些语句之一的事务会抓取一个排他行锁以及一个行共享表锁。事务（和会话）将持有这些锁，直到它提交或回滚该语句。在它执行这两件事之一之前，所有其他打算修改该特定行的会话都将被阻塞。请注意，每当事务打算修改表中的一行或多行时，它也会在该表上持有一个表锁（`TM`），以防止数据库在事务尝试修改其某些行时允许任何\
    \ DDL 操作（如 `DROP TABLE`）。\n\n在 Oracle 数据库中，锁机制按如下方式工作：\n\n*   读取器不会阻塞另一个读取器。\n\
    *   读取器不会阻塞写入器。\n*   写入器不会阻塞同一数据的读取器。\n*   写入器会阻塞另一个想要修改相同数据的写入器。\n\n正是列表中的最后一种情况，即两个会话打算修改表中的相同数据时，Oracle\
    \ 的自动锁定机制才会启动，以防止破坏性行为。包含更新现有行语句的第一个事务将获得该行的排他锁。当锁定行的第一个会话继续持有该锁（直到它发出 `COMMIT`\
    \ 或 `ROLLBACK` 语句）时，其他会话可以修改该表中除锁定行之外的任何其他行。第一个会话伴随持有的表锁仅仅是为了防止任何其他会话发出 DDL 语句来更改表的结构。Oracle\
    \ 使用复杂的锁定机制，其中行级锁不会自动升级到表级，甚至不会升级到数据块级别。\n\n## 5-13. 识别被阻塞和阻塞的会话\n\n### 问题\n\n\
    您注意到数据库中存在队列锁，并怀疑可能存在阻塞锁阻碍了其他会话。您希望识别出阻塞会话和被阻塞的会话。\n\n### 解决方案\n\n当您在 Oracle 数据库中看到“enqueue”等待事件时，很可能是一个锁定现象阻碍了某些会话执行其\
    \ SQL 语句。当一个会话在“enqueue”等待事件上等待时，该会话正在等待由另一个会话持有的锁。阻塞会话持有的锁模式与被阻塞会话请求的锁模式不兼容。您可以发出以下命令来查看有关被阻塞会话和阻塞会话的信息：\n\
    \n```sql\nSQL> select decode(request,0,'Holder: ','Waiter: ')||sid sess,\n   \
    \  id1, id2, lmode, request, type\n     from v$lock\n     where (id1, id2, type)\
    \ in\n     (select id1, id2, type from v$lock where request>0)\n     order by\
    \ id1, request;\n```\n\n`V$LOCK` 视图显示实例中是否存在任何阻塞锁。如果有阻塞锁，它还会显示阻塞会话和被阻塞会话。请注意，如果所有会话都需要同一个被阻塞的对象，一个阻塞会话可以同时阻塞多个会话。以下是一个显示存在锁的示例：\n\
    \n```sql\nSQL> select sid,type,lmode,request,ctime,block from v$lock;\n\n    \
    \   SID           TY           LMODE          REQUEST       CTIME        BLOCK\n\
    --------------      --------      -----------    -----------   -------      -------\n\
    \       127           MR               4             0         102870        \
    \  0\n        81           TX               0             6           778    \
    \      0\n       191           AE               4             0           758\
    \          0\n       205           AE               4             0          \
    \ 579          0\n       140           AE               4             0      \
    \   11655          0\n        68           TM               3             0  \
    \         826          0\n        68           TX               6            \
    \ 0           826          1\n…\nSQL>\n```\n\n需要关注的关键列是 `BLOCK` 列——阻塞会话在此列的值为\
    \ 1。在我们的示例中，会话 68 是阻塞会话，因为它在 `BLOCK` 列下显示值 1。因此，`V$LOCK` 视图证实了我们在本方案“解决方案”部分中的初步发现。SID\
    \ 为 68 的阻塞会话还在 `LMODE` 列下显示了锁模式 6，表示它以排他模式持有此锁——这就是会话 81 “挂起”无法执行其更新操作的原因。当然，被阻塞的会话是受害者——所以它在\
    \ `BLOCK` 列中显示值 0。它还在 `REQUEST` 列下显示值 6，因为它正在请求一个排他锁以执行其列更新。反过来，阻塞会话将在 `REQUEST`\
    \ 列中显示值 0，因为它没有请求任何锁——它已经持有了。\n\n如果您想查明阻塞会话的等待类别以及它阻塞了其他会话多长时间，可以通过查询 `V$SESSION`\
    \ 视图来实现，如下所示：\n\n```sql\nSQL> select  blocking_session, sid,  wait_class,\n  \
    \   seconds_in_wait\n     from     v$session\n     where blocking_session is not\
    \ NULL\n     order by blocking_session;\n\nBLOCKING_SESSION        SID       \
    \ WAIT_CLASS        SECONDS_IN_WAIT\n-----------------    -------       -------------\
    \    ----------------\n      68                81          Application       \
    \           7069\n\nSQL>\n```\n\n该查询显示，SID=68 的会话正在阻塞 SID=81 的会话，并且阻塞已经开始 7,069\
    \ 秒。"
- fmt: "#### How It Works\n\n以下是Oracle数据库中最常见的几种入队锁：\n\n*   `TX`： 由于事务锁引起，通常由有问题的应用程序逻辑导致。\n\
    *   `TM`： 这些是表级DML锁，最常见的原因是子表中的外键约束未建立索引。\n\n此外，你偶尔也可能注意到ST入队锁。这些表示当Oracle正在执行空间管理操作（例如为执行排序而分配临时段）时，会话正在等待。\n\
    \n### 5-14. 处理阻塞锁\n\n#### 问题\n\n你已经在数据库中识别出了阻塞锁。你想知道如何处理这些锁。\n\n#### 解决方案\n\n\
    处理阻塞锁有两种基本策略——短期策略和长期策略。首先你需要做的是消除阻塞锁，这样会话就不会持续排队——一个阻塞锁导致数十甚至数百个会话全部等待被阻塞的对象，这种情况并不少见。既然你已经知道了阻塞会话的\
    \ `SID`（在我们的示例中是68），只需先查询 `V$SESSION` 视图以获取该会话对应的 `serial#`，然后像这样杀掉该会话：\n\n```\n\
    SQL> alter system kill session '68, 1234';\n```\n\n短期解决方案是快速清除阻塞锁，以免它们损害数据库性能。清除方法就是简单地杀掉阻塞会话。如果你看到一长串被阻塞的会话在阻塞会话后面排队，就杀掉阻塞会话，这样其他会话就可以继续执行了。\n\
    \n但从长远来看，你必须调查阻塞会话为何会表现出这种行为。通常，你会在应用程序逻辑中发现缺陷。不过，你可能需要深入挖掘阻塞会话正在执行的SQL代码。\n\n\
    #### How It Works\n\n在这个例子中，显然阻塞锁是一个DML锁。然而，即使你事先不知道这一点，也可以通过检查 `V$LOCK` 视图的 `TYPE`\
    \ (`TY`) 列来确定锁的类型。Oracle使用几种内部“系统”锁来维护库缓存和其他与实例相关的组件，但这些锁是正常的，你在 `V$LOCK` 视图中找不到任何与这些锁相关的信息。\n\
    \n对于DML操作，Oracle使用两种基本类型的锁——事务锁 (`TX`) 和DML锁 (`TM`)。还有第三种类型的锁，用户锁 (`UL`)，但它在解决常规锁定问题中不起作用。事务锁是你在解决Oracle锁定问题时最常遇到的一种锁。每次事务修改数据时，都会调用一个\
    \ `TX` 锁，这是一个行事务锁。而DML锁 `TM`，则是为每个被DML语句更改的对象获取一次。\n\n`LMODE` 列显示锁模式，值为6表示排他锁。`REQUEST`\
    \ 列显示请求的锁模式。第一个修改行的会话将持有 `LMODE=6` 的排他锁。该会话的 `REQUEST` 列将显示值0，因为它没有请求锁——它已经持有一个锁了！被阻塞的会话需要但无法在同一行上获得排他锁，因此它也以排他模式\
    \ (`MODE=6`) 请求一个 `TX` 锁。所以，被阻塞会话的 `REQUEST` 列将显示值6，而其 `LMODE` 列显示值0（被阻塞的会话在任何模式下都没有锁）。\n\
    \n前面的讨论适用于行锁，行锁总是以排他模式获取。`TM` 锁通常以模式3（即 `Shared Row Exclusive` 模式）获取，而DDL语句将需要\
    \ `TM exclusive` 锁。\n\n### 5-15. 识别被锁定的对象\n\n#### 问题\n\n你意识到存在锁定情况，并且想找出正在被锁定的对象。\n\
    \n#### 解决方案\n\n你可以通过查看 `V$LOCK` 视图中的 `ID1` (LockIdentifier) 列的值来找到被锁定对象的标识（参见配方\
    \ 5-13）。当 `TYPE` 列为 `TM`（DML入队）时，`ID1` 列的值标识了被锁定的对象。假设你已经确定 `ID1` 列的值是99999。然后你可以发出以下查询来识别被锁定的表：\n\
    \n```\nSQL> select object_name from dba_objects where object_id=99999;\n\nOBJECT_NAME\n\
    ------------\nTEST\nSQL>\n```\n\n一个更简单的方法是使用 `V$LOCKED_OBJECT` 视图来找出被锁定的对象、对象类型以及对象的所有者。\n\
    \n```\nSQL> select lpad(' ',decode(l.xidusn,0,3,0)) || l.oracle_username \"User\"\
    ,\n       o.owner, o.object_name, o.object_type\n       from v$locked_object l,\
    \ dba_objects o\n       where l.object_id = o.object_id\n       order by o.object_id,\
    \ 1 desc;\nUser       OWNER      OBJECT_NAME      OBJECT_TYPE\n------     ------\
    \     ------------     ------------\nHR         HR         TEST             TABLE\n\
    SH         HR         TEST             TABLE\n\nSQL>\n```\n\n注意，此查询同时显示了阻塞用户和被阻塞用户。\n\
    \n#### How It Works\n\n正如“解决方案”部分所示，识别被锁定的对象相当容易。你当然可以使用Oracle Enterprise Manager快速识别被锁定的对象、涉及锁定的ROWID以及导致锁定的SQL语句。然而，理解包含锁定信息的底层Oracle视图总是很重要的，而这正是本配方所演示的。使用本配方中显示的查询，你可以轻松地识别被锁定的对象，而无需借助诸如Oracle\
    \ Enterprise Manager之类的监控工具。\n\n在解决方案显示的示例中，被锁定的对象是一个表，但它也可能是任何其他类型的对象，包括一个PL/SQL包。通常，查询挂起的原因正是查询所需的某个对象被锁定了。在其他用户能够访问该对象之前，你可能需要先杀掉持有该对象锁的会话。\n\
    \n### 5-16. 解决 enq: TM 争用\n\n#### 问题\n\n数据库中的几个会话执行一些插入语句花费了很长时间。结果，“活动”会话计数非常高，数据库无法接受新的会话连接。经检查，你发现数据库正经历大量的\
    \ `enq: TM – contention` 等待事件。\n\n#### 解决方案\n\n`enq: TM – contention` 事件通常是由于Oracle\
    \ DML操作所涉及的表缺少外键约束引起的。一旦你通过向相关表添加外键约束来修复问题，`enq: TM – contention` 事件就会消失。\n\n\
    等待 `enq: TM – contention` 事件的、正等待执行插入操作的会话，几乎总是由于未索引的外键约束。当一个依赖表或子表的外键约束引用父表，但该外键相关的键上缺少索引时，就会发生这种情况。如果Oracle在父表中执行对主键列的修改（该主键列被子表的外键引用），它就会在子表上获取一个表锁。注意，这些是表级锁\
    \ (`TM`)，而不是行级锁 (`TX`)——因此，这些锁不限于一行，而是针对整个表。自然地，一旦获取了这个表锁，Oracle将阻塞所有试图修改子表数据的其他会话。一旦你在子表中为引用父表的列创建了索引，由于\
    \ `TM` 争用而导致的等待就会消失。"
  raw: '#### How It Works


    The following are the most common types of enqueue locks you''ll see in an Oracle
    database:


    *   `TX`: These are due to a transaction lock and usually caused by faulty application
    logic.

    *   `TM`: These are table-level DML locks, and the most common cause is that you
    haven''t indexed foreign key constraints in a child table.


    In addition, you are also likely to notice ST enqueue locks on occasion. These
    indicate sessions that are waiting while Oracle is performing space management
    operations, such as the allocation of temporary segments for performing a sort.


    ### 5-14\. Dealing with a Blocking Lock


    #### Problem


    You''ve identified blocking locks in your database. You want to know how to deal
    with those locks.


    #### Solution


    There are two basic strategies when dealing with a blocking lock—a short-term
    and a long-term strategy. The first thing you need to do is get rid of the blocking
    lock, so the sessions don''t keep queuing up—it''s not at all uncommon for a single
    blocking lock to result in dozens and even hundreds of sessions, all waiting for
    the blocked object. Since you already know the `SID` of the blocking session (session
    68 in our example), just kill the session in this way, after first querying the
    `V$SESSION` view for the corresponding `serial#` for the session:


    `SQL> alter system kill session ''68, 1234'';`


    The short-term solution is to quickly get rid of the blocking locks so they don''t
    hurt the performance of your database. You get rid of them by simply killing the
    blocking session. If you see a long queue of blocked sessions waiting behind a
    blocking session, kill the blocking session so that the other sessions can get
    going.


    For the long run, though, you must investigate why the blocking session is behaving
    the way that it is. Usually, you''ll find a flaw in the application logic. You
    may, though, need to dig deep into the SQL code that the blocking session is executing.


    #### How It Works


    In this example, obviously, the blocking lock is a DML lock. However, even if
    you didn''t know this ahead of time, you can figure out the type of lock by examining
    the `TYPE` (`TY`) column of the `V$LOCK` view. Oracle uses several types of internal
    “system” locks to maintain the library cache and other instance-related components,
    but those locks are normal and you won''t find anything related to those locks
    in the `V$LOCK` view.


    For DML operations, Oracle uses two basic types of locks—transaction locks (`TX`)
    and DML locks (`TM`). There is also a third type of lock, a user lock (`UL`),
    but it doesn''t play a role in troubleshooting general locking issues. Transaction
    locks are the most frequent type of locks you''ll encounter when troubleshooting
    Oracle locking issues. Each time a transaction modifies data, it invokes a `TX`
    lock, which is a row transaction lock. The DML lock, `TM`, on the other hand,
    is acquired once for each object that''s being changed by a DML statement.


    The `LMODE` column shows the lock mode, with a value of 6 indicating an exclusive
    lock. The `REQUEST` column shows the requested lock mode. The session that first
    modifies a row will hold an exclusive lock with `LMODE=6`. This session''s `REQUEST`
    column will show a value of 0, since it''s not requesting a lock¬—it already has
    one! The blocked session needs but can''t obtain an exclusive lock on the same
    rows, so it requests a `TX` in the exclusive mode (`MODE=6`) as well. So, the
    blocked session''s `REQUEST` column will show a value of 6, and its `LMODE` column
    a value of 0 (a blocked session has no lock at all in any mode).


    The preceding discussion applies to row locks, which are always taken in the exclusive
    mode. A `TM` lock is normally acquired in mode 3, which is a `Shared Row Exclusive`
    mode, whereas a DDL statement will need a `TM exclusive` lock.


    ### 5-15\. Identifying a Locked Object


    #### Problem


    You are aware of a locking situation, and you''d like to find out the object that''s
    being locked.


    #### Solution


    You can find the locked object''s identity by looking at the value of the `ID1`
    (LockIdentifier) column in the `V$LOCK` view (see Recipe 5-13). The value of the
    `ID1` column where the `TYPE` column is `TM` (DML enqueue) identifies the  locked
    object. Let''s say you''ve ascertained that the value of the `ID1` column is 99999.  You
    can then issue the following query to identify the locked table:


    `SQL> select object_name from dba_objects where object_id=99999;`


    `OBJECT_NAME`

    `------------`

    `TEST`

    `SQL>`


    An even easier way is  to use the `V$LOCKED_OBJECT` view to find out the locked
    object, the object type, and the owner of the object.


    `SQL> select lpad('' '',decode(l.xidusn,0,3,0)) || l.oracle_username "User",`

    `     o.owner, o.object_name, o.object_type`

    `     from v$locked_object l, dba_objects o`

    `     where l.object_id = o.object_id`

    `     order by o.object_id, 1 desc;`

    `User       OWNER      OBJECT_NAME      OBJECT_TYPE`

    `------     ------     ------------     ------------`

    `HR         HR         TEST             TABLE`

    `SH         HR         TEST             TABLE`


    `SQL>`


    Note that the query shows both the blocking and the blocked users.


    #### How It Works


    As the “Solution” section shows, it''s rather easy to identify a locked object.
    You can certainly use Oracle Enterprise Manager to quickly identify a locked object,
    the ROWID of the object involved in the lock, and the SQL statement that''s responsible
    for the locks. However, it''s always important to understand the underlying Oracle
    views that contain the locking information, and that''s what this recipe demonstrates.
    Using the queries shown in this recipe, you can easily identify a locked object
    without recourse to a monitoring tool such as Oracle Enterprise Manager, for example.


    In the example shown in the solution, the locked object was a table, but it could
    be any other type of object, including a PL/SQL package. Often, it turns out that
    the reason a query is just hanging is that one of the objects the query needs
    is locked. You may have to kill the session holding the lock on the object before
    other users can access the object.


    ### 5-16. Resolving enq: TM Lock Contention


    #### Problem


    Several sessions in your database are taking a very long time to process some
    insert statements. As a result, the “active” sessions count is very high and the
    database is unable to accept new session connections. Upon checking, you find
    that the database is experiencing a lot of `enq: TM – contention` wait events.


    #### Solution


    The `enq: TM – contention` event is usually due to missing foreign key constraints
    on a table that''s part of an Oracle DML operation. Once you fix the problem by
    adding the foreign key constraint to the relevant table, the `enq: TM – contention`
    event will go away.


    The waits on the `enq: TM – contention` event for the sessions that are waiting
    to perform insert operations are almost always due to an unindexed foreign key
    constraint.. This happens when a dependent or child table''s foreign key constraint
    that references a parent table is missing an index on the associated key. Oracle
    acquires a table lock on a child table if it''s performing modifications on the
    primary key column in the parent table that''s referenced by the foreign key of
    the child table. Note that these are full table locks (`TM`), and not row-level
    locks (`TX`)—thus, these locks aren''t restricted to a row but to the entire table.
    Naturally, once this table lock is acquired, Oracle will block all other sessions
    that seek to modify the child table''s data. Once you create an index in the child
    table performing on the column that references the parent table, the waits due
    to the `TM` contention will go away.'
  trans: "#### 工作原理\n\n以下是 Oracle 数据库中最常见的几种入队锁：\n\n*   `TX`： 由于事务锁引起，通常由有问题的应用程序逻辑导致。\n\
    *   `TM`： 这些是表级 DML 锁，最常见的原因是子表中的外键约束未建立索引。\n\n此外，你偶尔也可能注意到 ST 入队锁。这些表示当 Oracle\
    \ 正在执行空间管理操作（例如为执行排序而分配临时段）时，会话正在等待。\n\n### 5-14. 处理阻塞锁\n\n#### 问题\n\n你已经在数据库中识别出了阻塞锁。你想知道如何处理这些锁。\n\
    \n#### 解决方案\n\n处理阻塞锁有两种基本策略——短期策略和长期策略。首先你需要做的是消除阻塞锁，这样会话就不会持续排队——一个阻塞锁导致数十甚至数百个会话全部等待被阻塞的对象，这种情况并不少见。既然你已经知道了阻塞会话的\
    \ `SID`（在我们的示例中是 68），只需先查询 `V$SESSION` 视图以获取该会话对应的 `serial#`，然后像这样杀掉该会话：\n\n```\n\
    SQL> alter system kill session '68, 1234';\n```\n\n短期解决方案是快速清除阻塞锁，以免它们损害数据库性能。清除方法就是简单地杀掉阻塞会话。如果你看到一长串被阻塞的会话在阻塞会话后面排队，就杀掉阻塞会话，这样其他会话就可以继续执行了。\n\
    \n但从长远来看，你必须调查阻塞会话为何会表现出这种行为。通常，你会在应用程序逻辑中发现缺陷。不过，你可能需要深入挖掘阻塞会话正在执行的 SQL 代码。\n\
    \n#### 工作原理\n\n在这个例子中，显然阻塞锁是一个 DML 锁。然而，即使你事先不知道这一点，也可以通过检查 `V$LOCK` 视图的 `TYPE`\
    \ (`TY`) 列来确定锁的类型。Oracle 使用几种内部“系统”锁来维护库缓存和其他与实例相关的组件，但这些锁是正常的，你在 `V$LOCK` 视图中找不到任何与这些锁相关的信息。\n\
    \n对于 DML 操作，Oracle 使用两种基本类型的锁——事务锁 (`TX`) 和 DML 锁 (`TM`)。还有第三种类型的锁，用户锁 (`UL`)，但它在解决常规锁定问题中不起作用。事务锁是你在解决\
    \ Oracle 锁定问题时最常遇到的一种锁。每次事务修改数据时，都会调用一个 `TX` 锁，这是一个行事务锁。而 DML 锁 `TM`，则是为每个被 DML\
    \ 语句更改的对象获取一次。\n\n`LMODE` 列显示锁模式，值为 6 表示排他锁。`REQUEST` 列显示请求的锁模式。第一个修改行的会话将持有 `LMODE=6`\
    \ 的排他锁。该会话的 `REQUEST` 列将显示值 0，因为它没有请求锁——它已经持有一个锁了！被阻塞的会话需要但无法在同一行上获得排他锁，因此它也以排他模式\
    \ (`MODE=6`) 请求一个 `TX` 锁。所以，被阻塞会话的 `REQUEST` 列将显示值 6，而其 `LMODE` 列显示值 0（被阻塞的会话在任何模式下都没有锁）。\n\
    \n前面的讨论适用于行锁，行锁总是以排他模式获取。`TM` 锁通常以模式 3（即 `Shared Row Exclusive` 模式）获取，而 DDL 语句将需要\
    \ `TM exclusive` 锁。\n\n### 5-15. 识别被锁定的对象\n\n#### 问题\n\n你意识到存在锁定情况，并且想找出正在被锁定的对象。\n\
    \n#### 解决方案\n\n你可以通过查看 `V$LOCK` 视图中的 `ID1` (LockIdentifier) 列的值来找到被锁定对象的标识（参见配方\
    \ 5-13）。当 `TYPE` 列为 `TM`（DML 入队）时，`ID1` 列的值标识了被锁定的对象。假设你已经确定 `ID1` 列的值是 99999。然后你可以发出以下查询来识别被锁定的表：\n\
    \n```\nSQL> select object_name from dba_objects where object_id=99999;\n\nOBJECT_NAME\n\
    ------------\nTEST\nSQL>\n```\n\n一个更简单的方法是使用 `V$LOCKED_OBJECT` 视图来找出被锁定的对象、对象类型以及对象的所有者。\n\
    \n```\nSQL> select lpad(' ',decode(l.xidusn,0,3,0)) || l.oracle_username \"User\"\
    ,\n       o.owner, o.object_name, o.object_type\n       from v$locked_object l,\
    \ dba_objects o\n       where l.object_id = o.object_id\n       order by o.object_id,\
    \ 1 desc;\nUser       OWNER      OBJECT_NAME      OBJECT_TYPE\n------     ------\
    \     ------------     ------------\nHR         HR         TEST             TABLE\n\
    SH         HR         TEST             TABLE\n\nSQL>\n```\n\n注意，此查询同时显示了阻塞用户和被阻塞用户。\n\
    \n#### 工作原理\n\n正如“解决方案”部分所示，识别被锁定的对象相当容易。你当然可以使用 Oracle Enterprise Manager 快速识别被锁定的对象、涉及锁定的\
    \ ROWID 以及导致锁定的 SQL 语句。然而，理解包含锁定信息的底层 Oracle 视图总是很重要的，而这正是本配方所演示的。使用本配方中显示的查询，你可以轻松地识别被锁定的对象，而无需借助诸如\
    \ Oracle Enterprise Manager 之类的监控工具。\n\n在解决方案显示的示例中，被锁定的对象是一个表，但它也可能是任何其他类型的对象，包括一个\
    \ PL/SQL 包。通常，查询挂起的原因正是查询所需的某个对象被锁定了。在其他用户能够访问该对象之前，你可能需要先杀掉持有该对象锁的会话。\n\n###\
    \ 5-16. 解决 enq: TM 争用\n\n#### 问题\n\n数据库中的几个会话执行一些插入语句花费了很长时间。结果，“活动”会话计数非常高，数据库无法接受新的会话连接。经检查，你发现数据库正经历大量的\
    \ `enq: TM – contention` 等待事件。\n\n#### 解决方案\n\n`enq: TM – contention` 事件通常是由于\
    \ Oracle DML 操作所涉及的表缺少外键约束引起的。一旦你通过向相关表添加外键约束来修复问题，`enq: TM – contention` 事件就会消失。\n\
    \n等待 `enq: TM – contention` 事件的、正等待执行插入操作的会话，几乎总是由于未索引的外键约束。当一个依赖表或子表的外键约束引用父表，但该外键相关的键上缺少索引时，就会发生这种情况。如果\
    \ Oracle 在父表中执行对主键列的修改（该主键列被子表的外键引用），它就会在子表上获取一个表锁。注意，这些是表级锁 (`TM`)，而不是行级锁 (`TX`)——因此，这些锁不限于一行，而是针对整个表。自然地，一旦获取了这个表锁，Oracle\
    \ 将阻塞所有试图修改子表数据的其他会话。一旦你在子表中为引用父表的列创建了索引，由于 `TM` 争用而导致的等待就会消失。"
- fmt: "## How It Works\n\nOracle会在子表上获取一个排他锁，如果你没有为子表中的外键约束创建索引。为了说明未索引的外键如何因锁导致争用，我们使用以下示例。创建两个表：`STORES`和`PRODUCTS`，如下所示：\n\
    \n```sql\ncreate table stores\n     (store_id       number(10)     not null,\n\
    \      supplier_name  varchar2(40)   not null,\n      constraint stores_pk primary\
    \ key (store_id));\n\ncreate table products\n    (product_id     number(10)  \
    \   not null,\n     product_name   varchar2(30)   not null,\n     supplier_id\
    \    number(10)     not null,\n     store_id       number(10)     not null,\n\
    \     constraint fk_stores\n     foreign key (store_id)\n     references stores(store_id)\n\
    \     on delete cascade);\n```\n\n如果你现在删除`STORES`表中的任何行，你将注意到由于锁导致的等待。通过简单地为`PRODUCTS`表中指定为外键的列创建索引，就可以消除这些等待：\n\
    \n```sql\ncreate index fk_stores on products(store_id);\n```\n\n你可以通过执行以下查询来查找数据库中所有未索引的外键约束：\n\
    \n```sql\nselect * from (\n     select c.table_name, co.column_name, co.position\
    \ column_position\n     from   user_constraints c, user_cons_columns co\n    \
    \ where  c.constraint_name = co.constraint_name\n     and    c.constraint_type\
    \ = 'R'\n     minus\n     select ui.table_name, uic.column_name, uic.column_position\n\
    \     from   user_indexes ui, user_ind_columns uic\n     where  ui.index_name\
    \ = uic.index_name\n     )\n     order by table_name, column_position;\n```\n\n\
    如果你不索引外键列，你会注意到子表经常被锁定，从而导致与争用相关的等待。Oracle建议你始终为外键创建索引。\n\n![Tip](images/square.jpg)\
    \ `Tip` 如果子表外键匹配的唯一键或主键永远不会被更新或删除，你就不必在子表中为该外键列创建索引。\n\n如果你没有为外键列创建索引，Oracle倾向于在子表上获取表锁。如果你向父表插入一行，父表不会在子表上获取锁；但是，如果你在父表中更新或删除一行，数据库将在子表上获取一个完整的表锁。也就是说，对父表主键的任何修改都会导致子表上的完整表锁（`TM`）。在我们的例子中，`STORES`表是`PRODUCTS`表的父表，后者包含外键`STORE_ID`。`PRODUCTS`表作为依赖表，其`STORE_ID`列中的值必须与父表`STORES`的唯一键或主键的值相匹配。在这种情况下，`STORES`表中的`STORE_ID`列是该表的主键。\n\
    \n每当你修改父表（`STORES`）的主键时，数据库就会在`PRODUCTS`表上获取一个完整的表锁。其他会话无法更改`PRODUCTS`表中的任何值，包括外键列以外的列。这些会话只能查询而不能修改`PRODUCTS`表。在此期间，任何试图修改`PRODUCTS`表中任何列的会话都必须等待（`TM`：enq争用等待）。Oracle只有在完成修改父表`STORES`中的主键后，才会释放对子表`PRODUCTS`的锁。如果你有一堆会话等待修改`PRODUCTS`表中的数据，它们都必须等待，如果你有一个在线事务处理类型的数据库，其中有许多执行简短DML操作的用户，活动会话计数自然会迅速上升。请注意，你在子表上执行的任何DML操作都不需要在父表上获取表锁。\n\
    \n### 5-17. Identifying Recently Locked Sessions\n\n#### Problem\n\n一个会话在数据库中经历了严重的等待，很可能是由于另一个会话放置了阻塞锁。你尝试使用`V$LOCK`和其他视图来更深入地研究锁定问题，但无法在锁处于活动状态时“捕获”它。你希望使用不同的视图来“查看”你可能在锁定发生时错过的较旧的锁定数据。\n\
    \n#### Solution\n\n你可以执行以下基于ASH的语句，以找出过去五分钟内数据库中持有的所有锁的信息。当然，你可以将时间间隔调整为更小或更大的周期，只要该时间段内有ASH数据覆盖。\n\
    \n```sql\nselect to_char(h.sample_time, 'HH24:MI:SS') TIME,h.session_id,\n   \
    \    decode(h.session_state, 'WAITING' ,h.event, h.session_state) STATE,\n   \
    \    h.sql_id,\n       h.blocking_session BLOCKER\n  from v$active_session_history\
    \ h, dba_users u\n where u.user_id = h.user_id\n   and h.sample_time > systimestamp-(2/1440);\n\
    ```\n\n```\nTIME            SID                      STATE                   \
    \     SQL_ID          BLOCKER\n------------   -----      -----------------------------------\
    \      -------------    ---------\n17:00:52        197          116 enq: TX -\
    \ row lock contention     094w6n53tnywr     191\n17:00:51        197         \
    \ 116 enq: TX - row lock contention     094w6n53tnywr     191\n17:00:50      \
    \  197          116 enq: TX - row lock contention     094w6n53tnywr     191\n\
    …\n```\n\n你可以看到，ASH记录了由阻塞会话（SID=191）放置的所有锁，这些锁导致了被阻塞会话（SID=197）的“挂起”情况。"
  raw: '#### How It Works


    Oracle takes out an exclusive lock on a child table if you don''t index the foreign
    key constraints in that table. To illustrate how an unindexed foreign key will
    result in contention due to locking, we use the following example. Create two
    tables, `STORES` and `PRODUCTS`, as shown here:


    `SQL> create table stores`

    `     (store_id     number(10)     not null,`

    `     supplier_name     varchar2(40)     not null,`

    `     constraint stores_pk PRIMARY KEY (store_id));`

    `SQL>create table products`

    `    (product_id     number(10)     not null,`

    `    product_name    varchar2(30)    not null,`

    `    supplier_id     number(10)     not null,`

    `    store_id     number(10)     not null,`

    `    constraint fk_stores`

    `    foreign key (store_id)`

    `    references stores(store_id)`

    `    on delete cascade);`


    If you now delete any rows in the `STORES` table, you''ll notice waits due to
    locking. You can get rid of these waits by simply creating an index on the column
    you''ve specified as the foreign key in the `PRODUCTS` table:


    `create index fk_stores on products(store_id);`


    You can find all unindexed foreign key constraints in your database by issuing
    the following query:


    `SQL> select * from (`

    `     select c.table_name, co.column_name, co.position column_position`

    `     from   user_constraints c, user_cons_columns co`

    `     where  c.constraint_name = co.constraint_name`

    `     and   c.constraint_type = ''R''`

    `     minus`

    `     select ui.table_name, uic.column_name, uic.column_position`

    `     from   user_indexes ui, user_ind_columns uic`

    `     where  ui.index_name = uic.index_name`

    `     )`

    `     order by table_name, column_position;`


    If you don''t index a foreign key column, you''ll notice the child table is often
    locked, thus leading to contention-related waits. Oracle recommends that you always
    index your foreign keys.


    ![images](images/square.jpg) **Tip** If the matching unique or primary key for
    a child table''s foreign key never gets updated or deleted, you don''t have to
    index the foreign key column in the child table.


    Oracle will tend to acquire a table lock on the child table if you don''t index
    the foreign key column. If you insert a row into the parent table, the parent
    table doesn''t acquire a lock on the child table; however, if you update or delete
    a row in the parent table, the database will acquire a full table lock on the
    child table. That is, any modifications to the primary key in the parent table
    will result in a full table lock (`TM`) on the child table. In our example, the
    `STORES` table is a parent of the `PRODUCTS` table, which contains the foreign
    key `STORE_ID`. The table `PRODUCTS` being a dependent table, the values of the
    `STORE_ID` column in that table must match the values of the unique or primary
    key of the parent table, `STORES`. In this case, the `STORE_ID` column in the
    `STORES` table is the primary key of that table.


    Whenever you modify the parent table''s (`STORES`) primary key, the database acquires
    a full table lock on the `PRODUCTS` table. Other sessions can''t change any values
    in the `PRODUCTS` table, including the columns other than the foreign key column.
    The sessions can only query but not modify the `PRODUCTS` table. During this time,
    any sessions attempting to modify any column in the `PRODUCTS` table will have
    to wait (`TM`: enq contention wait). Oracle will release this lock on the child
    table `PRODUCTS` only after it finishes modifying the primary key in the parent
    table, `STORES`. If you have a bunch of sessions waiting to modify data in the
    `PRODUCTS` table, they''ll all have to wait, and the active session count naturally
    will go up very fast, if you''ve an online transaction processing–type database
    that has many users that perform short DML operations. Note that any DML operations
    you perform on the child table don''t require a table lock on the parent table.


    ### 5-17. Identifying Recently Locked Sessions


    #### Problem


    A session is experiencing severe waits in the database, most likely due to a blocking
    lock placed by another session. You''ve tried to use the `V$LOCK` and other views
    to drill deeper into the locking issue, but are unable to “capture” the lock while
    it''s in place. You''d like to use a different view to “see” the older locking
    data that you might have missed while the locking was going on.


    #### Solution


    You can execute the following statement based on ASH, to find out information
    about all locks held in the database during the previous five minutes. Of course,
    you can vary the time interval to a smaller or larger period, so long as there''s
    ASH data covering that time period.


    `SQL> select to_char(h.sample_time, ''HH24:MI:SS'') TIME,h.session_id,`

    `     decode(h.session_state, ''WAITING'' ,h.event, h.session_state) STATE,     `

    `     h.sql_id,`

    `     h.blocking_session BLOCKER`

    `     from v$active_session_history h, dba_users u`

    `     where u.user_id = h.user_id`

    `     and h.sample_time > SYSTIMESTAMP-(2/1440);`


    `TIME            SID                      STATE                      SQL_ID          BLOCKER`

    `------------   -----      -----------------------------------     -------------    ---------`

    `17:00:52        197         116 enq: TX - row lock contention     094w6n53tnywr     191`

    `17:00:51        197         116 enq: TX - row lock contention     094w6n53tnywr     191`

    `17:00:50        197         116 enq: TX - row lock contention     094w6n53tnywr     191`


    `…`


    `SQL>`


    You can see that ASH has recorded all the blocks placed by session 1, the blocking
    session (SID=191) that led to a “hanging” situation for session 2, the blocked
    session (SID=197).'
  trans: "## 工作原理\n\n如果你没有为子表中的外键约束创建索引，Oracle 会在子表上获取一个排他锁。为了说明未索引的外键如何因锁导致争用，我们使用以下示例。创建两个表：`STORES`和`PRODUCTS`，如下所示：\n\
    \n```sql\ncreate table stores\n     (store_id       number(10)     not null,\n\
    \      supplier_name  varchar2(40)   not null,\n      constraint stores_pk primary\
    \ key (store_id));\n\ncreate table products\n    (product_id     number(10)  \
    \   not null,\n     product_name   varchar2(30)   not null,\n     supplier_id\
    \    number(10)     not null,\n     store_id       number(10)     not null,\n\
    \     constraint fk_stores\n     foreign key (store_id)\n     references stores(store_id)\n\
    \     on delete cascade);\n```\n\n如果你现在删除`STORES`表中的任何行，你将注意到由于锁导致的等待。通过简单地为`PRODUCTS`表中指定为外键的列创建索引，就可以消除这些等待：\n\
    \n```sql\ncreate index fk_stores on products(store_id);\n```\n\n你可以通过执行以下查询来查找数据库中所有未索引的外键约束：\n\
    \n```sql\nselect * from (\n     select c.table_name, co.column_name, co.position\
    \ column_position\n     from   user_constraints c, user_cons_columns co\n    \
    \ where  c.constraint_name = co.constraint_name\n     and    c.constraint_type\
    \ = 'R'\n     minus\n     select ui.table_name, uic.column_name, uic.column_position\n\
    \     from   user_indexes ui, user_ind_columns uic\n     where  ui.index_name\
    \ = uic.index_name\n     )\n     order by table_name, column_position;\n```\n\n\
    如果你不索引外键列，你会注意到子表经常被锁定，从而导致与争用相关的等待。Oracle 建议你始终为外键创建索引。\n\n![Tip](img/square.jpg)\
    \ `Tip` 如果子表外键匹配的唯一键或主键永远不会被更新或删除，你就不必在子表中为该外键列创建索引。\n\n如果你没有为外键列创建索引，Oracle 倾向于在子表上获取表锁。如果你向父表插入一行，父表不会在子表上获取锁；但是，如果你在父表中更新或删除一行，数据库将在子表上获取一个完整的表锁。也就是说，对父表主键的任何修改都会导致子表上的完整表锁（`TM`）。在我们的例子中，`STORES`表是`PRODUCTS`表的父表，后者包含外键`STORE_ID`。`PRODUCTS`表作为依赖表，其`STORE_ID`列中的值必须与父表`STORES`的唯一键或主键的值相匹配。在这种情况下，`STORES`表中的`STORE_ID`列是该表的主键。\n\
    \n每当你修改父表（`STORES`）的主键时，数据库就会在`PRODUCTS`表上获取一个完整的表锁。其他会话无法更改`PRODUCTS`表中的任何值，包括外键列以外的列。这些会话只能查询而不能修改`PRODUCTS`表。在此期间，任何试图修改`PRODUCTS`表中任何列的会话都必须等待（`TM`：enq\
    \ 争用等待）。Oracle 只有在完成修改父表`STORES`中的主键后，才会释放对子表`PRODUCTS`的锁。如果你有一堆会话等待修改`PRODUCTS`表中的数据，它们都必须等待，如果你有一个在线事务处理类型的数据库，其中有许多执行简短\
    \ DML 操作的用户，活动会话计数自然会迅速上升。请注意，你在子表上执行的任何 DML 操作都不需要在父表上获取表锁。\n\n### 5-17. 识别最近被锁定的会话\n\
    \n#### 问题\n\n一个会话在数据库中经历了严重的等待，很可能是由于另一个会话放置了阻塞锁。你尝试使用`V$LOCK`和其他视图来更深入地研究锁定问题，但无法在锁处于活动状态时“捕获”它。你希望使用不同的视图来“查看”你可能在锁定发生时错过的较旧的锁定数据。\n\
    \n#### 解决方案\n\n你可以执行以下基于 ASH 的语句，以找出过去五分钟内数据库中持有的所有锁的信息。当然，你可以将时间间隔调整为更小或更大的周期，只要该时间段内有\
    \ ASH 数据覆盖。\n\n```sql\nselect to_char(h.sample_time, 'HH24:MI:SS') TIME,h.session_id,\n\
    \       decode(h.session_state, 'WAITING' ,h.event, h.session_state) STATE,\n\
    \       h.sql_id,\n       h.blocking_session BLOCKER\n  from v$active_session_history\
    \ h, dba_users u\n where u.user_id = h.user_id\n   and h.sample_time > systimestamp-(2/1440);\n\
    ```\n\n```\nTIME            SID                      STATE                   \
    \     SQL_ID          BLOCKER\n------------   -----      -----------------------------------\
    \      -------------    ---------\n17:00:52        197          116 enq: TX -\
    \ row lock contention     094w6n53tnywr     191\n17:00:51        197         \
    \ 116 enq: TX - row lock contention     094w6n53tnywr     191\n17:00:50      \
    \  197          116 enq: TX - row lock contention     094w6n53tnywr     191\n\
    …\n```\n\n你可以看到，ASH 记录了由阻塞会话（SID=191）放置的所有锁，这些锁导致了被阻塞会话（SID=197）的“挂起”情况。"
- fmt: "## How It works\n\nOften, when your database users complain about a performance\
    \ problem, you may query the `V$SESSION` or `V$LOCK` views, but you may not find\
    \ anything useful there, because the wait issue may have been already resolved\
    \ by then. In these circumstances you can query the `V$ACTIVE_SESSION_HISTORY`\
    \ view to find out what transpired in the database during the previous 60 minutes.\
    \ This view offers a window into the Active Session History (ASH), which is a\
    \ memory buffer that collects information about all active sessions, every second.\
    \ The `V$ACTIVE_SESSION_HISTORY` contains one row for each active session, and\
    \ newer information continuously overwrites older data, since ASH is a rolling\
    \ buffer.\n\nWe can best demonstrate the solution by creating the scenario that\
    \ we're discussing, and then working through that scenario. Begin by creating\
    \ a test table with a couple of columns:\n\n```sql\nSQL> create table test (name\
    \ varchar(20), id number (4));\nTable created.\nSQL>\n```\n\nInsert some data\
    \ into the test table.\n\n```sql\nSQL> insert into test values ('alapati','9999');\n\
    1 row created.\nSQL> insert into test values ('sam', '1111');\n1 row created.\n\
    SQL> commit;\nCommit complete.\nSQL>\n```\n\nIn session 1 (the current session),\
    \ execute a `SELECT * FOR UPDATE` statement on the table `TEST`—this will place\
    \ a lock on that table.\n\n```sql\nSQL> select * from test for update;\nSQL>\n\
    ```\n\nIn a different session, session 2, execute the following `UPDATE` statement:\n\
    \n```sql\nSQL> update test set name='Jackson' where id = '9999';\n```\n\nSession\
    \ 2 will hang now, because it's being blocked by the `SELECT FOR UPDATE` statement\
    \ issued by session 1. Go ahead now and issue either a `ROLLBACK` or a `COMMIT`\
    \ from session 1:\n\n```sql\nSQL> rollback;\nRollback complete.\nSQL>\n```\n\n\
    When you issue the `ROLLBACK` statement, session 1 releases all locks it's currently\
    \ holding on table `TEST`. You'll notice that session 2, which has been blocked\
    \ thus far, immediately processes the `UPDATE` statement, which was previously\
    \ “hanging,” waiting for the lock held by session 2.\n\nTherefore, we know for\
    \ sure that there was a blocking lock in your database for a brief period, with\
    \ session 1 the blocking session, and session 2 the blocked session. You can't\
    \ find any evidence of this in the `V$LOCK` view, though, because that and all\
    \ other lock-related views show you details only about currently held locks. Here's\
    \ where the Active Session History views shine—they can provide you information\
    \ about locks that have been held recently but are gone already before you can\
    \ view them with a query on the `V$LOCK` or `V$SESSION` views.\n\n![images](images/square.jpg)\n\
    \n```\nCaution: Be careful when executing the Active Session History (ASH) query\
    \ shown in the “Solution” section of this recipe. As the first column (`SAMPLE_TIME`)\
    \ shows, ASH will record session information every second. If you execute this\
    \ query over a long time frame, you may get a very large amount of output just\
    \ repeating the same locking information. To deal with that output, you may specify\
    \ the `SET PAUSE ON` option in SQL*Plus. That will pause the output every page,\
    \ enabling you to scroll through a few rows of the output to identify the problem.\n\
    ```\n\nUse the following query to find out the wait events for which this session\
    \ has waited during the past hour.\n\n```sql\nSQL> select sample_time, event,\
    \ wait_time\n     from v$active_session_history\n     where session_id = 81\n\
    \     and session_serial# = 422;\n```\n\nThe column `SAMPLE_TIME` lets you know\
    \ precisely when this session suffered a performance hit due to a specific wait\
    \ event. You can identify the actual SQL statement that was being executed by\
    \ this session during that period, by using the `V$SQL` view along with the `V$ACTIVE_SESSION_HISTORY`\
    \ view, as shown here:\n\n```sql\nSQL> select sql_text, application_wait_time\n\
    \     from v$sql\n     where sql_id in ( select sql_id from v$active_session_history\n\
    \     where sample_time = '08-MAR-11 05.00.52.00 PM'\n     and session_id = 68\
    \ and session_serial# = 422);\n```\n\nAlternatively, if you have the `SQL_ID`\
    \ already from the `V$ACTIVE_SESSION_HISTORY` view, you can get the value for\
    \ the `SQL_TEXT` column from the `V$SQLAREA` view, as shown here:\n\n```sql\n\
    SQL> select sql_text FROM v$sqlarea WHERE sql_id = '7zfmhtu327zm0';\n```\n\nOnce\
    \ you have the `SQL_ID`, it's also easy to extract the SQL Plan for this SQL statement,\
    \ by executing the following query based on the `DBMS_XPLAN` package:\n\n```sql\n\
    SQL> select * FROM table(dbms_xplan.display_awr('7zfmhtu327zm0'));\n```\n\nThe\
    \ background process MMON flushes ASH data to disk every hour, when the AWR snapshot\
    \ is created. What happens when MMON flushes ASH data to disk? Well, you won't\
    \ be able to query older data any longer with the `V$ACTIVE_SESSION_HISTORY` view.\
    \ Not to worry, because you can still use the `DBA_HIST_ACTIVE_SESS_HISTORY` view\
    \ to query the older data. The structure of this view is similar to that of the\
    \ `V$ACTIVE_SESSION_HISTORY` view. The `DBA_HIST_ACTIVE_SESS_HISTORY` view shows\
    \ the history of the contents of the in-memory active session history of recent\
    \ system activity. You can also query the `V$SESSION_WAIT_HISTORY` view to examine\
    \ the last ten wait events for a session, while it's still active. This view offers\
    \ more reliable information for very recent wait events than the `V$SESSION` and\
    \ `V$SESSION_WAIT` views, both of which show wait information for only the most\
    \ recent wait. Here's a typical query using the `V$SESSION_WAIT_HISTORY` view.\n\
    \n```sql\nSQL> select sid from v$session_wait_history\n     where wait_time =\
    \ (select max(wait_time) from v$session_wait_history);\n```\n\nAny non-zero values\
    \ under the `WAIT_TIME` column represent the time waited by this session for the\
    \ last wait event. A zero value for this column means that the session is waiting\
    \ currently for a wait event.\n\n### 5-18. Analyzing Recent Wait Events in a Database\n\
    \n#### Problem\n\nYou'd like to find out the most important waits in your database\
    \ in the recent past, as well as the users, SQL statements, and objects that are\
    \ responsible for most of those waits.\n\n#### Solution\n\nQuery the `V$ACTIVE_SESSION_HISTORY`\
    \ view to get information about the most common wait events, and the SQL statements,\
    \ database objects, and users responsible for those waits. The following are some\
    \ useful queries you can use.\n\nTo find the most important wait events in the\
    \ last 15 minutes, issue the following query:\n\n```sql\nSQL> select event,\n\
    \     sum(wait_time +\n     time_waited) total_wait_time\n     from v$active_session_history\n\
    \     where sample_time between\n     sysdate – 30/2880 and sysdate\n     group\
    \ by event\n     order by total_wait_time desc\n```\n\nTo find out which of your\
    \ users experienced the most waits in the past 15 minutes, issue the following\
    \ query:\n\n```sql\nSQL> select s.sid, s.username,\n     sum(a.wait_time +\n \
    \    a.time_waited) total_wait_time\n     from v$active_session_history a,\n \
    \    v$session s\n     where a.sample_time between sysdate – 30/2880 and sysdate\n\
    \     and a.session_id=s.sid\n     group by s.sid, s.username\n     order by total_wait_time\
    \ desc;\n```\n\nExecute the following query to find out the objects with the highest\
    \ waits.\n\n```sql\nSQL> select a.current_obj#, o.object_name, o.object_type,\
    \ a.event,\n     sum(a.wait_time +\n     a.time_waited) total_wait_time\n    \
    \ from v$active_session_history a,\n     dba_objects d\n     where a.sample_time\
    \ between sysdate – 30/2880 and sysdate\n     and a.current_obj# = d.object_id\n\
    \     group by a.current_obj#, d.object_name, d.object_type, a.event\n     order\
    \ by total_wait_time;\n```\n\nYou can identify the SQL statements that have been\
    \ waiting the most during the last 15 minutes with this query.\n\n```sql\nSQL>\
    \ select a.user_id,u.username,s.sql_text,\n     sum(a.wait_time + a.time_waited)\
    \ total_wait_time\n     from v$active_session_history a,\n     v$sqlarea s,\n\
    \     dba_users u\n     where a.sample_time between sysdate – 30/2880 and sysdate\n\
    \     and a.sql_id = s.sql_id\n     and a.user_id = u.user_id\n     group by a.user_id,s.sql_text,\
    \ u.username;\n```"
  raw: '#### How It works


    Often, when your database users complain about a performance problem, you may
    query the `V$SESSION` or `V$LOCK` views, but you may not find anything useful
    there, because the wait issue may have been already resolved by then. In these
    circumstances you can query the `V$ACTIVE_SESSION_HISTORY` view to find out what
    transpired in the database during the previous 60 minutes. This view offers a
    window into the Active Session History (ASH), which is a memory buffer that collects
    information about all active sessions, every second. The `V$ACTIVE_SESSION_HISTORY`
    contains one row for each active session, and newer information continuously overwrites
    older data, since ASH is a rolling buffer.


    We can best demonstrate the solution by creating the scenario that we''re discussing,
    and then working through that scenario. Begin by creating a test table with a
    couple of columns:


    `SQL>  create table test (name varchar(20), id number (4));`

    `Table created.`

    `SQL>`


    Insert some data into the test table.


    `SQL> insert into test values (''alapati'',''9999'');`

    `1 row created.`

    `SQL> insert into test values (''sam'', ''1111'');`

    `1 row created.`

    `SQL> commit;`

    `Commit complete.`

    `SQL>`


    In session 1 (the current session), execute a `SELECT * FOR UPDATE` statement
    on the table `TEST`—this will place a lock on that table.


    `SQL> select * from test for update;`


    `SQL>`


    In a different session, session 2, execute the following `UPDATE` statement:


    `SQL> update test set name=''Jackson'' where id = ''9999'';`


    Session 2 will hang now, because it''s being blocked by the `SELECT FOR UPDATE`
    statement issued by session 1\. Go ahead now and issue either a `ROLLBACK` or
    a `COMMIT` from session 1:


    `SQL> rollback;`

    `Rollback complete.`

    `SQL>`


    When you issue the `ROLLBACK` statement, session 1 releases all locks it''s currently
    holding on table `TEST`. You''ll notice that session 2, which has been blocked
    thus far, immediately processes the `UPDATE` statement, which was previously “hanging,”
    waiting for the lock held by session 2.


    Therefore, we know for sure that there was a blocking lock in your database for
    a brief period, with session 1 the blocking session, and session 2 the blocked
    session. You can''t find any evidence of this in the `V$LOCK` view, though, because
    that and all other lock-related views show you details only about currently held
    locks. Here''s where the Active Session History views shine—they can provide you
    information about locks that have been held recently but are gone already before
    you can view them with a query on the `V$LOCK` or `V$SESSION` views.


    ![images](images/square.jpg) **Caution**   Be careful when executing the Active
    Session History (ASH) query shown in the “Solution” section of this recipe. As
    the first column (`SAMPLE_TIME`) shows, ASH will record session information every
    second. If you execute this query over a long time frame, you may get a very large
    amount of output just repeating the same locking information. To deal with that
    output, you may specify the `SET PAUSE ON` option in SQL*Plus. That will pause
    the output every page, enabling you to scroll through a few rows of the output
    to identify the problem.


    Use the following query to find out the wait events for which this session has
    waited during the past hour.


    `SQL> select sample_time, event, wait_time`

    `     from v$active_session_history`

    `     where session_id = 81`

    `     and session_serial# = 422;`


    The column `SAMPLE_TIME` lets you know precisely when this session suffered a
    performance hit due to a specific wait event. You can identify the actual SQL
    statement that was being executed by this session during that period, by using
    the `V$SQL` view along with the `V$ACTIVE_SESSION_HISTORY` view, as shown here:


    `SQL> select sql_text, application_wait_time`

    `     from v$sql`

    `     where sql_id in ( select sql_id from v$active_session_history`

    `     where sample_time =  ''08-MAR-11 05.00.52.00 PM''`

    `     and session_id = 68 and session_serial# = 422);`


    Alternatively, if you have the `SQL_ID` already from the `V$ACTIVE_SESSION_HISTORY`
    view, you can get the value for the `SQL_TEXT` column from the `V$SQLAREA` view,
    as shown here:


    `SQL> select sql_text FROM v$sqlarea WHERE sql_id = ''7zfmhtu327zm0'';`


    Once you have the `SQL_ID`, it''s also easy to extract the SQL Plan for this SQL
    statement, by executing the following query based on the `DBMS_XPLAN` package:


    `SQL> select * FROM table(dbms_xplan.display_awr(''7zfmhtu327zm0''));`


    The background process MMON flushes ASH data to disk every hour, when the AWR
    snapshot is created. What happens when MMON flushes ASH data to disk? Well, you
    won''t be able to query older data any longer with the `V$ACTIVE_SESSION_HISTORY`
    view. Not to worry, because you can still use the `DBA_HIST_ACTIVE_SESS_HISTORY`
    view to query the older data. The structure of this view is similar to that of
    the `V$ACTIVE_SESSION_HISTORY` view. The `DBA_HIST_ACTIVE_SESS_HISTORY` view shows
    the history of the contents of the in-memory active session history of recent
    system activity. You can also query the `V$SESSION_WAIT_HISTORY` view to examine
    the last ten wait events for a session, while it''s still active. This view offers
    more reliable information for very recent wait events than the `V$SESSION` and
    `V$SESSION_WAIT` views, both of which show wait information for only the most
    recent wait. Here''s a typical query using the `V$SESSION_WAIT_HISTORY` view.


    `SQL> select sid from v$session_wait_history`

    `     where wait_time = (select max(wait_time) from v$session_wait_history);`


    Any non-zero values under the `WAIT_TIME` column represent the time waited by
    this session for the last wait event. A zero value for this column means that
    the session is waiting currently for a wait event.


    ### 5-18. Analyzing Recent Wait Events in a Database


    #### Problem


    You''d like to find out the most important waits in your database in the recent
    past, as well as the users, SQL statements, and objects that are responsible for
    most of those waits.


    #### Solution


    Query the `V$ACTIVE_SESSION_HISTORY` view to get information about the most common
    wait events, and the SQL statements, database objects, and users responsible for
    those waits. The following are some useful queries you can use.


    To find the most important wait events in the last 15 minutes, issue the following
    query:


    `SQL> select event,`

    `     sum(wait_time +`

    `     time_waited) total_wait_time`

    `     from v$active_session_history`

    `     where sample_time between`

    `     sysdate – 30/2880 and sysdate`

    `     group by event`

    `     order by total_wait_time desc`


    To find out which of your users experienced the most waits in the past 15 minutes,
    issue the following query:


    `SQL> select s.sid, s.username,`

    `     sum(a.wait_time +`

    `     a.time_waited) total_wait_time`

    `     from v$active_session_history a,`

    `     v$session s`

    `     where a.sample_time between sysdate – 30/2880 and sysdate`

    `     and a.session_id=s.sid`

    `     group by s.sid, s.username`

    `     order by total_wait_time desc;`


    Execute the following query to find out the objects with the highest waits.


    `SQL>select a.current_obj#, o.object_name, o.object_type, a.event,`

    `    sum(a.wait_time +`

    `    a.time_waited) total_wait_time`

    `    from v$active_session_history a,`

    `    dba_objects d`

    `    where a.sample_time between sysdate – 30/2880 and sysdate`

    `    and a.current_obj# = d.object_id`

    `    group by a.current_obj#, d.object_name, d.object_type, a.event`

    `    order by total_wait_time;`


    You can identify the SQL statements that have been waiting the most during the
    last 15 minutes with this query.


    `SQL> select a.user_id,u.username,s.sql_text,`

    `     sum(a.wait_time + a.time_waited) total_wait_time`

    `     from v$active_session_history a,`

    `     v$sqlarea s,`

    `     dba_users u`

    `     where a.sample_time between sysdate – 30/2880 and sysdate`

    `     and a.sql_id = s.sql_id`

    `     and a.user_id = u.user_id`

    `     group by a.user_id,s.sql_text, u.username;`'
  trans: "\n## 工作原理\n\n通常，当你的数据库用户抱怨性能问题时，你可能会查询 `V$SESSION` 或 `V$LOCK` 视图，但可能找不到任何有用的信息，因为等待问题可能在那时已经解决了。在这种情况下，你可以查询\
    \ `V$ACTIVE_SESSION_HISTORY` 视图，以找出过去 60 分钟内数据库中发生的情况。该视图提供了访问活动会话历史（ASH）的窗口，这是一个内存缓冲区，每秒收集所有活动会话的信息。`V$ACTIVE_SESSION_HISTORY`\
    \ 为每个活动会话包含一行，并且由于 ASH 是一个循环缓冲区，更新的信息会不断覆盖旧数据。\n\n我们通过创建正在讨论的场景，然后逐步处理该场景，可以最好地演示解决方案。首先创建一个包含几列的测试表：\n\
    \n```sql\nSQL> create table test (name varchar(20), id number (4));\nTable created.\n\
    SQL>\n```\n\n向测试表中插入一些数据。\n\n```sql\nSQL> insert into test values ('alapati','9999');\n\
    1 row created.\nSQL> insert into test values ('sam', '1111');\n1 row created.\n\
    SQL> commit;\nCommit complete.\nSQL>\n```\n\n在会话 1（当前会话）中，对表 `TEST` 执行 `SELECT\
    \ * FOR UPDATE` 语句——这将锁住该表。\n\n```sql\nSQL> select * from test for update;\nSQL>\n\
    ```\n\n在另一个不同的会话，即会话 2 中，执行以下 `UPDATE` 语句：\n\n```sql\nSQL> update test set name='Jackson'\
    \ where id = '9999';\n```\n\n会话 2 现在会挂起，因为它被会话 1 发出的 `SELECT FOR UPDATE` 语句阻塞了。现在继续从会话\
    \ 1 执行 `ROLLBACK` 或 `COMMIT`：\n\n```sql\nSQL> rollback;\nRollback complete.\n\
    SQL>\n```\n\n当你执行 `ROLLBACK` 语句时，会话 1 会释放它当前在表 `TEST` 上持有的所有锁。你会注意到，此前一直被阻塞的会话\
    \ 2 立即处理了之前处于“挂起”状态、等待会话 2 持有的锁的 `UPDATE` 语句。\n\n因此，我们确信在你的数据库中曾短暂地存在一个阻塞锁，其中会话\
    \ 1 是阻塞会话，会话 2 是被阻塞会话。然而，你无法在 `V$LOCK` 视图中找到任何证据，因为该视图以及其他所有与锁相关的视图只显示当前持有的锁的详细信息。这正是活动会话历史视图大放异彩的地方——它们可以为你提供最近持有但已在你通过查询\
    \ `V$LOCK` 或 `V$SESSION` 视图查看之前就消失的锁的信息。\n\n![images](img/square.jpg)\n\n```\n\
    注意：执行本解决方案部分中所示的活动会话历史（ASH）查询时请小心。正如第一列（`SAMPLE_TIME`）所示，ASH 会每秒记录一次会话信息。如果你在很长的时间范围内执行此查询，可能会得到大量只是重复相同锁定信息的输出。为了处理这些输出，你可以在\
    \ SQL*Plus 中指定 `SET PAUSE ON` 选项。这将使输出在每页暂停，使你能够滚动浏览几行输出以识别问题。\n```\n\n使用以下查询找出此会话在过去一小时内等待过的等待事件。\n\
    \n```sql\nSQL> select sample_time, event, wait_time\n     from v$active_session_history\n\
    \     where session_id = 81\n     and session_serial# = 422;\n```\n\n列 `SAMPLE_TIME`\
    \ 让你精确知道此会话由于特定等待事件而遭受性能打击的时间。你可以通过结合使用 `V$SQL` 视图和 `V$ACTIVE_SESSION_HISTORY`\
    \ 视图，来识别该时间段内此会话正在执行的实际 SQL 语句，如下所示：\n\n```sql\nSQL> select sql_text, application_wait_time\n\
    \     from v$sql\n     where sql_id in ( select sql_id from v$active_session_history\n\
    \     where sample_time = '08-MAR-11 05.00.52.00 PM'\n     and session_id = 68\
    \ and session_serial# = 422);\n```\n\n或者，如果你已经从 `V$ACTIVE_SESSION_HISTORY` 视图中获得了\
    \ `SQL_ID`，你可以从 `V$SQLAREA` 视图中获取 `SQL_TEXT` 列的值，如下所示：\n\n```sql\nSQL> select\
    \ sql_text FROM v$sqlarea WHERE sql_id = '7zfmhtu327zm0';\n```\n\n一旦你有了 `SQL_ID`，也容易提取此\
    \ SQL 语句的 SQL 执行计划，通过执行以下基于 `DBMS_XPLAN` 包的查询：\n\n```sql\nSQL> select * FROM table(dbms_xplan.display_awr('7zfmhtu327zm0'));\n\
    ```\n\n后台进程 MMON 每小时在创建 AWR 快照时会将 ASH 数据刷新到磁盘。当 MMON 将 ASH 数据刷新到磁盘时会发生什么？嗯，你将无法再使用\
    \ `V$ACTIVE_SESSION_HISTORY` 视图查询更早的数据。不用担心，因为你仍然可以使用 `DBA_HIST_ACTIVE_SESS_HISTORY`\
    \ 视图来查询旧数据。此视图的结构与 `V$ACTIVE_SESSION_HISTORY` 视图类似。`DBA_HIST_ACTIVE_SESS_HISTORY`\
    \ 视图显示了近期系统活动的内存中活动会话历史内容的历史记录。你还可以查询 `V$SESSION_WAIT_HISTORY` 视图来检查会话仍处于活动状态时的最后十个等待事件。与只显示最近一次等待信息的\
    \ `V$SESSION` 和 `V$SESSION_WAIT` 视图相比，此视图为最近的等待事件提供了更可靠的信息。这是一个使用 `V$SESSION_WAIT_HISTORY`\
    \ 视图的典型查询。\n\n```sql\nSQL> select sid from v$session_wait_history\n     where\
    \ wait_time = (select max(wait_time) from v$session_wait_history);\n```\n\n`WAIT_TIME`\
    \ 列下的任何非零值代表此会话为最后一个等待事件所等待的时间。此列值为零表示会话当前正在等待一个等待事件。\n\n### 5-18. 分析数据库中最近的等待事件\n\
    \n#### 问题\n\n你想找出最近数据库中最重要的等待，以及造成这些等待的主要用户、SQL 语句和对象。\n\n#### 解决方案\n\n查询 `V$ACTIVE_SESSION_HISTORY`\
    \ 视图以获取最常见的等待事件，以及造成这些等待的 SQL 语句、数据库对象和用户的信息。以下是一些有用的查询。\n\n要找出过去 15 分钟内最重要的等待事件，请执行以下查询：\n\
    \n```sql\nSQL> select event,\n     sum(wait_time +\n     time_waited) total_wait_time\n\
    \     from v$active_session_history\n     where sample_time between\n     sysdate\
    \ – 30/2880 and sysdate\n     group by event\n     order by total_wait_time desc\n\
    ```\n\n要找出过去 15 分钟内哪些用户经历的等待最多，请执行以下查询：\n\n```sql\nSQL> select s.sid, s.username,\n\
    \     sum(a.wait_time +\n     a.time_waited) total_wait_time\n     from v$active_session_history\
    \ a,\n     v$session s\n     where a.sample_time between sysdate – 30/2880 and\
    \ sysdate\n     and a.session_id=s.sid\n     group by s.sid, s.username\n    \
    \ order by total_wait_time desc;\n```\n\n执行以下查询以找出等待最多的对象。\n\n```sql\nSQL> select\
    \ a.current_obj#, o.object_name, o.object_type, a.event,\n     sum(a.wait_time\
    \ +\n     a.time_waited) total_wait_time\n     from v$active_session_history a,\n\
    \     dba_objects d\n     where a.sample_time between sysdate – 30/2880 and sysdate\n\
    \     and a.current_obj# = d.object_id\n     group by a.current_obj#, d.object_name,\
    \ d.object_type, a.event\n     order by total_wait_time;\n```\n\n你可以用此查询识别在过去\
    \ 15 分钟内等待时间最长的 SQL 语句。\n\n```sql\nSQL> select a.user_id,u.username,s.sql_text,\n\
    \     sum(a.wait_time + a.time_waited) total_wait_time\n     from v$active_session_history\
    \ a,\n     v$sqlarea s,\n     dba_users u\n     where a.sample_time between sysdate\
    \ – 30/2880 and sysdate\n     and a.sql_id = s.sql_id\n     and a.user_id = u.user_id\n\
    \     group by a.user_id,s.sql_text, u.username;\n```\n"
- fmt: "#### How It Works\n\nThe “Solution” section shows how to join the `V$ACTIVE_SESSION_HISTORY`\
    \ view with other views, such as the `V$SESSION`, `V$SQLAREA`, `DBA_USERS`, and\
    \ `DBA_OBJECTS` views, to find out exactly what's causing the highest number of\
    \ wait events or who's waiting the most, in the past few minutes. This information\
    \ is extremely valuable when troubleshooting “live” database performance issues.\n\
    \n### 5-19. Identifying Time Spent Waiting Due to Locking\n\n#### Problem\n\n\
    You want to identify the total time spent waiting by sessions due to locking issues.\n\
    \n#### Solution\n\nYou can use the following query to identify (and quantify)\
    \ waits caused by locking of a table's rows. Since the query orders the wait events\
    \ by time waited, you can quickly see which type of wait events accounts for most\
    \ of the waits in your instance.\n\n```sql\nselect wait_class, event, time_waited\
    \ / 100 time_secs\nfrom v$system_event e\nwhere e.wait_class <> 'Idle' AND time_waited\
    \ > 0\nunion\nselect 'Time Model', stat_name NAME,\nround ((value / 1000000),\
    \ 2) time_secs\nfrom v$sys_time_model\nwhere stat_name NOT IN ('background elapsed\
    \ time', 'background cpu time')\norder by 3 desc;\n```\n\n```\nWAIT_CLASS    \
    \                            EVENT                            TIME_SECS\n-------------------------\
    \       ------------------------------   --------------\nSystem I/O          \
    \            log file parallel write                45066.32\nSystem I/O     \
    \                 control file sequential read           23254.41\nTime Model\
    \                      DB time                                11083.91\nTime Model\
    \                      sql execute elapsed time                7660.04\nConcurrency\
    \                     latch: shared pool                      5928.73\nApplication\
    \                     enq: TX - row lock contention           3182.06\n…\nSQL>\n\
    ```\n\nIn this example, the wait event `enq: TX - row lock contention` reveals\
    \ the total time due to row lock enqueue wait events. Note that the shared pool\
    \ latch events are classified under the Concurrency wait class, while the enqueue\
    \ `TX - row lock contention` event is classified as an Application class wait\
    \ event.\n\n#### How It Works\n\nThe query in the “Solution” section joins the\
    \ `V$SYSTEM_EVENT` and the `V$SYS_TIME_MODEL` views to show you the total time\
    \ waited due to various wait events. In our case, we're interested in the total\
    \ time waited due to enqueue locking. If you're interested in the total time waited\
    \ by a specific session, you can use a couple of different `V$` views to find\
    \ out how long sessions have been in a wait state, but we recommend using the\
    \ `V$SESSION` view, because it shows you various useful attributes of the blocking\
    \ and blocked sessions. Here's an example showing how to find out how long a session\
    \ has been blocked by another session.\n\n```sql\nSQL>select sid, username, event,\
    \ blocking_session,\n    seconds_in_wait, wait_time\n    from v$session where\
    \ state in ('WAITING');\n```\n\nThe query reveals the following about the session\
    \ with SID 81, which is in a `WAITING` state:\n\n`SID  : 81` (this is the blocked\
    \ session)\n`username: SH` (user who's being blocked right now)\n`event: TX -\
    \ row lock contention` (shows the exact type of lock contention)\n`blocking session:\
    \ 68` (this is the \"blocker\")\n`seconds_in_wait: 3692` (how long the blocked\
    \ session is in this state)\n\nThe query reveals that the user SH, with a SID\
    \ of 81, has been blocked for almost an hour (3,692 seconds). User SH is shown\
    \ as waiting for a lock on a table that is currently locked by session 68. While\
    \ the `V$SESSION` view is highly useful for identifying the blocking and blocked\
    \ sessions, it can't tell you the SQL statement that's involved in the blocking\
    \ of the table. Often, identifying the SQL statement that's involved in a blocking\
    \ situation helps in finding out exactly why the statement is leading to the locking\
    \ behavior. To find out the actual SQL statement that's involved, you must join\
    \ the `V$SESSION` and the `V$SQL` views, as shown here.\n\n```sql\nSQL> select\
    \ sid, sql_text\n     from v$session s, v$sql q\n     where sid in (68,81)\n \
    \    and (\n     q.sql_id = s.sql_id or  q.sql_id = s.prev_sql_id)\nSQL> /\n```\n\
    \n```\n      SID                       SQL_TEXT\n-------------     -----------------------------------------------------\n\
    \      68           select * from test for update\n      81           update hr.test\
    \ set name='nalapati' where user_id=1111\nSQL>\n```\n\nThe output of the query\
    \ shows that session 81 is being blocked because it's trying to update a row in\
    \ a table that has been locked by session 68, using the `SELECT … FOR UPDATE`\
    \ statement. In cases such as this, if you find a long queue of user sessions\
    \ being blocked by another session, you must kill the blocking session so the\
    \ other sessions can process their work. You'll also see a high active user count\
    \ in the database during these situations—killing the blocking session offers\
    \ you an immediate solution to resolving contention caused by enqueue locks. Later\
    \ on, you can investigate why the blocks are occurring, so as to prevent these\
    \ situations.\n\nFor any session, you can identify the total time waited by a\
    \ session for each wait class, by issuing the following query:\n\n```sql\nSQL>\
    \ select wait_class_id, wait_class,\n     total_waits, time_waited\n     from\
    \ v$session_wait_class\n     where sid = <SID>;\n```\n\nIf you find, for example,\
    \ that this session endured a very high number of waits in the application wait\
    \ class (wait class ID for this class is 4217450380), you can issue the following\
    \ query using the `V$SYSTEM_EVENT` view, to find out exactly which waits are responsible:\n\
    \n```sql\nSQL> select event, total_waits, time_waited\n     from v$system_event\
    \ e, v$event_name n\n     where n.event_id = e.event_id\n     and e.wait_class_id\
    \ = 4217450380;\n```\n\n```\nEVENT                                          TOTAL_WAITS\
    \                 TIME_WAITED\n----------------------        ----------------------\
    \     --------------------\nenq: TM - contention                             \
    \        82                          475\n…\nSQL>\n```\n\nIn our example, the\
    \ waits in the application class (ID 4217450380) are due to locking contention\
    \ as revealed by the wait event `enq:TM - contention`. You can further use the\
    \ `V$EVENT_HISTOGRAM` view, to find out how many times and for how long sessions\
    \ have waited for a specific wait event since you started the instance. Here's\
    \ the query you need to execute to find out the wait time pattern for enqueue\
    \ lock waits:\n\n```sql\nSQL> select wait_time_milli bucket, wait_count\n    \
    \ from v$event_histogram\n     where event = 'enq: TX - row lock contention';\n\
    ```\n\nA high amount of enqueue waits due to locking behavior is usually due to\
    \ faulty application design. You'll sometimes encounter this when an application\
    \ executes many updates against the same row or a set of rows. Since this type\
    \ of high waits due to locking is due to inappropriately designed applications,\
    \ there's not much you can do by yourself to reduce these waits. Let your application\
    \ team know why these waits are occurring, and ask them to consider modifying\
    \ the application logic to avoid the waits.\n\nAny of the following four DML statements\
    \ can cause locking contention: `INSERT`, `UPDATE`, `DELETE`, and `SELECT FOR\
    \ UPDATE`. `INSERT` statements wait for a lock because another session is attempting\
    \ to insert a row with an identical value. This usually happens when you have\
    \ a table that has a primary key or unique constraint, with the application generating\
    \ the keys. Use an Oracle sequence instead to generate the key values, to avoid\
    \ these types of locking situations. You can specify the `NOWAIT` option with\
    \ a `SELECT FOR UPDATE` statement to eliminate session blocking due to locks.\
    \ You can also use the `SELECT FOR UPDATE NOWAIT` statement to avoid waiting by\
    \ sessions for locks when they issue an `UPDATE` or `DELETE` statement. The `SELECT\
    \ FOR UPDATE NOWAIT` statement locks the row without waiting.\n\n### 5-20. Minimizing\
    \ Latch Contention"
