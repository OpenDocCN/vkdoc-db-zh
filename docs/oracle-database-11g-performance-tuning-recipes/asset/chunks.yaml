    \n#### 问题\n\n你使用了许多涉及重复查询的 OCI 应用程序。你想探索如何在客户端缓存结果集。"
- fmt: "## 解决方案\n\n您可以通过启用客户端结果缓存来实现SQL查询结果的客户端查询缓存。客户端结果缓存在许多方面与服务器端结果缓存类似，但它是独立于服务器端缓存的。您可以通过设置以下初始化参数来配置客户端结果缓存：\n\
    \n*   `CLIENT_RESULT_CACHE_SIZE`：要启用客户端结果缓存，请将此参数设置为32 KB或更高，最大可达2 GB。默认情况下，此参数设置为零，表示客户端查询缓存被禁用。与服务器端结果缓存的情况不同，`CLIENT_RESULT_CACHE_SIZE`参数值设置的是每个进程的结果集缓存的最大大小，而非整个实例的大小。由于此参数不是动态参数，重置它需要重启实例。您需要根据可能被缓存的结果数量以及结果集的平均大小（这取决于结果集中行的大小和行数）来确定此参数的大小。\n\
    \n    ![images](images/square.jpg) **提示** Oracle建议您不要在数据库创建期间设置`CLIENT_RESULT_CACHE_SIZE`，以免出现潜在错误。\n\
    \n*   `CLIENT_RESULT_CACHE_LAG`：此参数允许您指定客户端结果缓存落后于影响结果集值的更改的最大时间量。默认情况下，此参数的值设置为3,000毫秒，因此如果此时间间隔对您来说足够，您可以省略此参数。更改此参数也需要重启数据库，因为它是一个静态参数。\n\
    \n![images](images/square.jpg) **注意** 您可以在所有使用OCI构建的OCI应用程序和驱动程序中使用客户端查询缓存。\n\n\
    此外，您必须将初始化参数`COMPATIBLE`的值指定为11.0.0或更高，才能启用客户端结果缓存。如果您想在客户端缓存视图，则`COMPATIBLE`参数的值必须为11.2.0.0或更高。\n\
    \n除了必须在数据库服务器上设置的初始化参数外，Oracle还允许您包含一个可选的客户端配置文件，以指定覆盖初始化文件中客户端查询缓存相关参数值的值。如果您指定了这些参数中的任何一个，则该参数的值将覆盖服务器初始化文件中相应参数的值。您可以在可选的客户端配置文件中指定以下一个或多个参数，该文件可以包含在客户端的`sqlnet.ora`文件中：\n\
    \n> `OCI_RESULT_CACHE_MAX_SIZE`：每个独立进程的查询缓存最大大小（以字节为单位）\n>\n> `OCI_RESULT_CACHE_MAX_RSET_SIZE`：任何进程中结果集的最大大小（以字节为单位）\n\
    >\n> `OCI_RESULT_CACHE_MAX_RSET_ROWS`：任何进程中结果集的最大行数\n\n您无法在客户端文件中设置任何与查询缓存延迟相关的参数。一旦设置了适当的初始化参数和可选的客户端配置文件，您必须使用`/*+\
    \ result_cache +/`（和`/*+ no_result_cache +/`）提示或表注释来启用或禁用查询的缓存。完成此操作后，数据库将尝试在客户端查询缓存中缓存所有符合条件的查询。\n\
    \n## 工作原理\n\n您可以部署客户端查询结果缓存来加速您的数据库在OCI应用程序中频繁执行的查询的响应速度。数据库会保持结果集数据与任何数据库更改（包括会话更改）的一致性。对于重复查询，您可能会看到巨大的性能提升，因为数据库从本地OCI客户端进程检索结果，而不必通过网络重新访问服务器并重新执行相同的查询来获取这些结果。当OCI应用程序发出`OCIStmtExecute()`或`OCIStmtFetch()`调用时，如果查询结果已在客户端查询缓存中缓存，Oracle会在客户端本地处理这些调用。\n\
    \n使用客户端查询缓存的一大优势是它可以节省服务器内存使用，并帮助您扩展应用程序以服务更多进程。客户端查询缓存是基于每个进程而非每个会话组织的。多个客户端会话可以共享相同的缓存结果集，所有会话都可以通过多个线程和多个语句并发访问相同的结果集。如果OCI进程在数据库服务器上发现重大的数据库更改，缓存会自动使缓存的结果集失效。一旦结果集失效，查询将被再次执行，并将新的结果集存储在缓存中。\n\
    \n![images](images/square.jpg) **提示** Oracle建议您仅对只读或主要是只读的查询使用客户端缓存。\n\n您可以选择设置`RESULT_CACHE_MODE`参数（参见配方3-7）来控制缓存行为，但默认情况下，此参数设置为`MANUAL`，因此您可以保持不变。您真的不希望将其替代值设置为`FORCE`，这会强制数据库缓存每个符合条件的SQL查询的结果——显然，缓存很快就会用尽空间！然后，您可以在SQL级别指定适当的查询提示，或在表级别指定表注释来控制客户端结果缓存。如果您已经通过服务器查询缓存设置了服务器端结果缓存怎么办？没关系。您仍然可以启用客户端结果缓存。只需记住，默认情况下，客户端缓存是禁用的，而服务器端结果缓存是启用的。\n\
    \n在实现客户端查询缓存时，重要的是要发出`OCIStmtExecute()`调用，以便语句句柄可以匹配缓存的结果。OCI语句句柄的首次`OCIStmtExecute()`调用总是会发送到服务器，无论是否存在缓存的结果集。随后的`OCIStmtExecute()`调用如果匹配，将使用缓存的结果。类似地，只有首次`OCIStmtFetch()`调用会获取行，直到获得“未找到数据”错误——如果调用与缓存的结果集匹配，则随后的获取调用在获得此错误之前不需要获取数据。Oracle建议您的OCI应用程序要么缓存OCI语句，要么为OCI语句句柄使用语句缓存，以便它们可以返回已执行的OCI语句。缓存集允许多个OCI语句句柄从单个或多个会话进行多次访问。\n\
    \n与服务器端缓存一样，您可以将`RESULT_CACHE_MODE`参数设置为`FORCE`以指定所有查询的缓存。Oracle建议您将此参数设置为替代值`MANUAL`，并在应用程序传递给`OCIStmtPrepare()`和`OCIStmtPrepare2()`调用的SQL代码中使用SQL提示（`/*+\
    \ result_cache */`）。您也可以使用表注释，如配方3-7所述，在创建或更改表时指定缓存。随后所有包含该表的查询都将遵循该缓存规范。\n\n\
    您可以查询`V$CLIENT_RESULT_CACHE_STATS`视图以获取详细信息，例如缓存的结果集数量、失效的缓存结果集数量以及缓存未命中次数。例如，统计信息`Create\
    \ Count Success`显示了数据库在缓存结果集的所有行之前未使其失效的次数。统计信息`Create Count Failure`显示了未能获取结果集中所有行的缓存结果集的数量。\n\
    \n### 3-11. 缓存PL/SQL函数结果\n\n#### 问题\n\n您已经在数据库中设置了服务器查询缓存，并希望实现对某些PL/SQL函数结果的缓存。"
  raw: "#### Solution\n\nYou can enable client-side query caching of SQL query results\
    \ by enabling the client result cache. The client result cache works similarly\
    \ to the server result cache in many ways, but is separate from the server cache.\
    \ You set the client result cache by setting the following initialization parameters:\n\
    \n*   `CLIENT_RESULT_CACHE_SIZE`: To enable the client result cache, set this\
    \ parameter to 32 KB or higher, up to a maximum of 2 GB. By default, this parameter\
    \ is set to zero, meaning the client query cache is disabled. Unlike in the case\
    \ of the server result cache, the `CLIENT_RESULT_CACHE_SIZE` parameter value sets\
    \ the maximum size of result set cache per process, not for the entire instance.\
    \ Since this parameter isn't a dynamic one, a reset requires that you bounce the\
    \ instance. You have to determine the size of this parameter based on the potential\
    \ number of results that'll be cached, as well as the average size of the result\
    \ set, which depends both on the size of the rows and the number of rows in the\
    \ result set.\n\n    ![images](images/square.jpg) **Tip** Oracle cautions you\
    \ not to set the `CLIENT_RESULT_CACHE_SIZE` during database creation, due to potential\
    \ errors.\n\n*   `CLIENT_RESULT_CACHE_LAG`: This parameter lets you specify the\
    \ maximum amount of time the client result cache can fall behind a change that\
    \ affects the result set values. By default, the value of this parameter is set\
    \ to 3,000 milliseconds, so you can omit this parameter if this time interval\
    \ is adequate for you. Changes in this parameter also need a restart of the database,\
    \ because it's a static parameter.\n\n![images](images/square.jpg) **Note** You\
    \ can use the client query cache with all OCI applications and drivers built using\
    \ OCI.\n\nIn addition, you must specify the value of the initialization parameter\
    \ `COMPATIBLE` at 11.0.0 or higher to enable the client result cache. If you want\
    \ to cache views on the client side, the value of the `COMPATIBLE` parameter must\
    \ be 11.2.0.0 or higher.\n\nIn addition to the initialization parameters you must\
    \ set on the database server, Oracle lets you also include an optional client-side\
    \ configuration file to specify values that override the values of the client\
    \ query cache–related parameters in the initialization file. If you specify any\
    \ of these parameters, the value of that parameter will override the value of\
    \ the corresponding parameter in the server initialization file. You can specify\
    \ one or more of the following parameters in the optional client configuration\
    \ file, which you can include in the `sqlnet.ora` file on the client:\n\n> `OCI_RESULT_CACHE_MAX_SIZE`:\
    \ Maximum size (in bytes) for the query cache for each individual process\n> \n\
    > `OCI_RESULT_CACHE_MAX_RSET_SIZE`: Maximum size of a result set in bytes in any\
    \ process\n> \n> `OCI_RESULT_CACHE_MAX_RSET_ROWS`: Maximum size of the result\
    \ set in terms of rows, in any process\n\nYou can't set any query cache lag–related\
    \ parameters in the client-side file. Once you set the appropriate initialization\
    \ parameters and the optional client-side configuration file, you must enable\
    \ and disable queries for caching with either the `/*+ result_cache +/` (and the\
    \ `/*+ no_result_cache +/`) hint, or table annotations. Once you do this, the\
    \ database will attempt to cache all eligible queries in the client query cache.\n\
    \n#### How It Works\n\nYou can deploy client-side query result caching to speed\
    \ up the responses of queries that your database frequently executes in an OCI\
    \ application. The database keeps the result set data consistent with any database\
    \ changes, including session changes. You can potentially see a huge performance\
    \ improvement for repetitive queries because the database retrieves the results\
    \ from the local OCI client process rather than having to re-access the server\
    \ via the network and re-execute the same query there and fetch those results.\
    \ When an OCI application issues an `OCIStmtExecute()` or `OCIStmtFetch()` call,\
    \ Oracle processes those calls locally on the client, if the query results are\
    \ already cached in the client query cache.\n\nThe big advantage of using a client-side\
    \ query cache is that it conserves your server memory usage and helps you scale\
    \ up your applications to serve more processes. The client query cache is organized\
    \ on a per-process basis rather than a per-session basis. Multiple client sessions\
    \ can share the same cached result sets, all of which can concurrently access\
    \ the same result sets through multiple threads and multiple statements. The cache\
    \ automatically invalidates the cached result sets if an OCI process finds significant\
    \ database changes on the database server. Once a result set is invalidated, the\
    \ query will be executed again and a fresh result set is stored in the cache.\n\
    \n![images](images/square.jpg) **Tip** Oracle recommends that you use client-side\
    \ caching only for read-only or mostly read-only queries.\n\nYou can optionally\
    \ set the `RESULT_CACHE_MODE` parameter (see Recipe 3-7) to control caching behavior,\
    \ but by default, this parameter is set to the value `MANUAL`, so you can leave\
    \ it alone. You really don't want to set this parameter to its alternative value\
    \ `FORCE`, which compels the database to cache the results of every eligible SQL\
    \ query¬—obviously, the cache will run out of room before too long! You can then\
    \ specify either the appropriate query hint at the SQL level or table annotations\
    \ at the table level to control the client-side result caching. What if you've\
    \ already set up server-side result caching through the server query cache? No\
    \ matter. You can still enable client result caching. Just remember that by default,\
    \ client-side caching is disabled and server-side result caching is enabled.\n\
    \nWhen implementing client query caching, it's important that an `OCIStmtExecute()`\
    \ call is made so a statement handle can match a cached result. The very first\
    \ `OCIStmtExecute()` call for an OCI statement handle goes to the server regardless\
    \ of the existence of a cached result set. Subsequent `OCIStmtExecute()` calls\
    \ will use the cached results if there's a match. Similarly, only the first `OCIStmtFetch()`\
    \ call fetches rows until it gets the “Data Not Found” error—subsequent fetch\
    \ calls don't need to fetch the data until they get this error, if the call matches\
    \ the cached result set. Oracle recommends that your OCI applications either cache\
    \ OCI statements or use statement caching for OCI statement handles, so they can\
    \ return OCI statements that have already been executed. The cached set allows\
    \ multiple accesses from OCI statement handles from single or multiple sessions.\n\
    \nAs with the server-side cache, you can set the `RESULT_CACHE_MODE` parameter\
    \ to `FORCE` to specify query caching for all queries. Oracle recommends you set\
    \ this parameter to the alternative value of `MANUAL` and use  SQL hints (`/*+\
    \ result_cache */`) in the SQL code the application passes to the `OCIStmtPrepare()`,\
    \ and `OCIStmtPrepare2()` calls. You can also use table annotations, as explained\
    \ in Recipe 3-7, to specify caching when you create or alter a table. All queries\
    \ that include that table will follow the caching specifications subsequently.\n\
    \nYou can query the `V$CLIENT_RESULT_CACHE_STATS` view for details such as the\
    \ number of cached result sets, number of cached result sets invalidated, and\
    \ the number of cache misses. The statistic `Create Count Success`, for example,\
    \ shows the number of cached result sets the database didn't validate before caching\
    \ all rows of the result set. The statistic `Create Count Failure` shows the number\
    \ of the cached result sets that didn't fetch all rows in the result set.\n\n\
    ### 3-11\\. Caching PL/SQL Function Results\n\n#### Problem\n\nYou've set up a\
    \ server query cache in your database and would like to implement the caching\
    \ of certain PL/SQL function results."
  trans: "## 解决方案\n\n您可以通过启用客户端结果缓存来实现 SQL 查询结果的客户端查询缓存。客户端结果缓存在许多方面与服务器端结果缓存类似，但它是独立于服务器端缓存的。您可以通过设置以下初始化参数来配置客户端结果缓存：\n\
    \n*   `CLIENT_RESULT_CACHE_SIZE`：要启用客户端结果缓存，请将此参数设置为 32 KB 或更高，最大可达 2 GB。默认情况下，此参数设置为零，表示客户端查询缓存被禁用。与服务器端结果缓存的情况不同，`CLIENT_RESULT_CACHE_SIZE`\
    \ 参数值设置的是每个进程的结果集缓存的最大大小，而非整个实例的大小。由于此参数不是动态参数，重置它需要重启实例。您需要根据可能被缓存的结果数量以及结果集的平均大小（这取决于结果集中行的大小和行数）来确定此参数的大小。\n\
    \n    ![images](img/square.jpg) **提示** Oracle 建议您不要在数据库创建期间设置 `CLIENT_RESULT_CACHE_SIZE`，以免出现潜在错误。\n\
    \n*   `CLIENT_RESULT_CACHE_LAG`：此参数允许您指定客户端结果缓存落后于影响结果集值的更改的最大时间量。默认情况下，此参数的值设置为\
    \ 3,000 毫秒，因此如果此时间间隔对您来说足够，您可以省略此参数。更改此参数也需要重启数据库，因为它是一个静态参数。\n\n![images](img/square.jpg)\
    \ **注意** 您可以在所有使用 OCI 构建的 OCI 应用程序和驱动程序中使用客户端查询缓存。\n\n此外，您必须将初始化参数 `COMPATIBLE`\
    \ 的值指定为 11.0.0 或更高，才能启用客户端结果缓存。如果您想在客户端缓存视图，则 `COMPATIBLE` 参数的值必须为 11.2.0.0 或更高。\n\
    \n除了必须在数据库服务器上设置的初始化参数外，Oracle 还允许您包含一个可选的客户端配置文件，以指定覆盖初始化文件中客户端查询缓存相关参数值的值。如果您指定了这些参数中的任何一个，则该参数的值将覆盖服务器初始化文件中相应参数的值。您可以在可选的客户端配置文件中指定以下一个或多个参数，该文件可以包含在客户端的\
    \ `sqlnet.ora` 文件中：\n\n> `OCI_RESULT_CACHE_MAX_SIZE`：每个独立进程的查询缓存最大大小（以字节为单位）\n\
    >\n> `OCI_RESULT_CACHE_MAX_RSET_SIZE`：任何进程中结果集的最大大小（以字节为单位）\n>\n> `OCI_RESULT_CACHE_MAX_RSET_ROWS`：任何进程中结果集的最大行数\n\
    \n您无法在客户端文件中设置任何与查询缓存延迟相关的参数。一旦设置了适当的初始化参数和可选的客户端配置文件，您必须使用 `/*+ result_cache\
    \ +/`（和 `/*+ no_result_cache +/`）提示或表注释来启用或禁用查询的缓存。完成此操作后，数据库将尝试在客户端查询缓存中缓存所有符合条件的查询。\n\
    \n## 工作原理\n\n您可以部署客户端查询结果缓存来加速您的数据库在 OCI 应用程序中频繁执行的查询的响应速度。数据库会保持结果集数据与任何数据库更改（包括会话更改）的一致性。对于重复查询，您可能会看到巨大的性能提升，因为数据库从本地\
    \ OCI 客户端进程检索结果，而不必通过网络重新访问服务器并重新执行相同的查询来获取这些结果。当 OCI 应用程序发出 `OCIStmtExecute()`\
    \ 或 `OCIStmtFetch()` 调用时，如果查询结果已在客户端查询缓存中缓存，Oracle 会在客户端本地处理这些调用。\n\n使用客户端查询缓存的一大优势是它可以节省服务器内存使用，并帮助您扩展应用程序以服务更多进程。客户端查询缓存是基于每个进程而非每个会话组织的。多个客户端会话可以共享相同的缓存结果集，所有会话都可以通过多个线程和多个语句并发访问相同的结果集。如果\
    \ OCI 进程在数据库服务器上发现重大的数据库更改，缓存会自动使缓存的结果集失效。一旦结果集失效，查询将被再次执行，并将新的结果集存储在缓存中。\n\n\
    ![images](img/square.jpg) **提示** Oracle 建议您仅对只读或主要是只读的查询使用客户端缓存。\n\n您可以选择设置 `RESULT_CACHE_MODE`\
    \ 参数（参见配方 3-7）来控制缓存行为，但默认情况下，此参数设置为 `MANUAL`，因此您可以保持不变。您真的不希望将其替代值设置为 `FORCE`，这会强制数据库缓存每个符合条件的\
    \ SQL 查询的结果——显然，缓存很快就会用尽空间！然后，您可以在 SQL 级别指定适当的查询提示，或在表级别指定表注释来控制客户端结果缓存。如果您已经通过服务器查询缓存设置了服务器端结果缓存怎么办？没关系。您仍然可以启用客户端结果缓存。只需记住，默认情况下，客户端缓存是禁用的，而服务器端结果缓存是启用的。\n\
    \n在实现客户端查询缓存时，重要的是要发出 `OCIStmtExecute()` 调用，以便语句句柄可以匹配缓存的结果。OCI 语句句柄的首次 `OCIStmtExecute()`\
    \ 调用总是会发送到服务器，无论是否存在缓存的结果集。随后的 `OCIStmtExecute()` 调用如果匹配，将使用缓存的结果。类似地，只有首次 `OCIStmtFetch()`\
    \ 调用会获取行，直到获得“未找到数据”错误——如果调用与缓存的结果集匹配，则随后的获取调用在获得此错误之前不需要获取数据。Oracle 建议您的 OCI\
    \ 应用程序要么缓存 OCI 语句，要么为 OCI 语句句柄使用语句缓存，以便它们可以返回已执行的 OCI 语句。缓存集允许多个 OCI 语句句柄从单个或多个会话进行多次访问。\n\
    \n与服务器端缓存一样，您可以将 `RESULT_CACHE_MODE` 参数设置为 `FORCE` 以指定所有查询的缓存。Oracle 建议您将此参数设置为替代值\
    \ `MANUAL`，并在应用程序传递给 `OCIStmtPrepare()` 和 `OCIStmtPrepare2()` 调用的 SQL 代码中使用 SQL\
    \ 提示（`/*+ result_cache */`）。您也可以使用表注释，如配方 3-7 所述，在创建或更改表时指定缓存。随后所有包含该表的查询都将遵循该缓存规范。\n\
    \n您可以查询 `V$CLIENT_RESULT_CACHE_STATS` 视图以获取详细信息，例如缓存的结果集数量、失效的缓存结果集数量以及缓存未命中次数。例如，统计信息\
    \ `Create Count Success` 显示了数据库在缓存结果集的所有行之前未使其失效的次数。统计信息 `Create Count Failure`\
    \ 显示了未能获取结果集中所有行的缓存结果集的数量。\n\n### 3-11. 缓存 PL/SQL 函数结果\n\n#### 问题\n\n您已经在数据库中设置了服务器查询缓存，并希望实现对某些\
    \ PL/SQL 函数结果的缓存。"
- fmt: "#### Solution\n\nOracle's server query cache (Recipe 3-7) helps you cache\
    \ both normal SQL query results as well as PL/SQL function results. By using the\
    \ server result cache, you can instruct the database to cache the results of PL/SQL\
    \ functions in the SGA. Other sessions can use these cached results, just as they\
    \ can use cached query results with the query result cache. Once you've configured\
    \ the server query cache by setting the appropriate initialization parameters\
    \ (please see Recipe 3-7), you are ready to make use of this feature.\n\nYou must\
    \ specify the `RESULT_CACHE` clause inside a function to make the database cache\
    \ the function's results in the PL/SQL function result cache. When a session invokes\
    \ a function after you enable caching, it first checks to see if the cache holds\
    \ results for the function with identical parameter values. If so, it fetches\
    \ the cached results and doesn't have to execute the function body. Note that\
    \ if you declare a function first, you must also specify the `RESULT_CACHE` clause\
    \ in the function declaration, in addition to specifying the clause within the\
    \ function itself.\n\n`[Listing 3-1](#Chapter03.html#list_3_1)` shows how to cache\
    \ a PL/SQL function's results.\n\n**Listing 3-1.** Creating a PL/SQL Function\
    \ with the `/*+result_cache*/` Hint\n\n```\n`SQL> create or replace package store_pkg\
    \ is`\n`      type store_sales_record is record (`\n`      store_name stores.store_name%TYPE,`\n\
    `      mgr_name   employees.last_name%type,`\n`      store_size  PLS_INTEGER`\n\
    `      );`\n`      function get_store_info (store_id PLS_INTEGER)`\n`       RETURN\
    \ store_info_record`\n`       RESULT_CACHE;`\n`      END store_pkg;`\n`    /`\n\
    `Create or replace package body store_pkg is`\n`    FUNCTION get_store_sales (store_id\
    \ PLS_INTEGER)`\n`    RETURN store_sales_record`\n`    RESULT_CACHE RELIES_ON\
    \ (stores, employees)`\n`  IS`\n`    rec  store_sales_record;`\n`  BEGIN`\n` \
    \   SELECT store_name INTO rec.store_name`\n`    FROM stores`\n`    WHERE store_id\
    \ = store_id;`\n`    SELECT e.last_name INTO rec.mgr_name`\n`    FROM stores d,\
    \ employees e`\n`    WHERE d.store_id = store_id`\n`    AND d.manager_id = e.employee_id;`\n\
    `     SELECT COUNT(*) INTO rec.store_size`\n`    FROM EMPLOYEES`\n`    WHERE store_id\
    \ = store_id;`\n`     RETURN rec;`\n`  END get_store_sales;`\n`END store_pkg;`\n\
    `/`\n```\n\nLet's say you invoke the function with the following values:\n\n`SQL>\
    \ execute store_pkg.get_store_sales(999)`\n\nThe first execution will cache the\
    \ PL/SQL function's results in the server result cache. Any future executions\
    \ of this function with the same parameters (999) won't require the database to\
    \ re-execute this function—it merely fetches the results from the server result\
    \ cache.\n\nNote that in addition to specifying the `RESULT_CACHE` clause in the\
    \ function declaration, you can optionally specify the `RESULT_CACHE RELIES ON`\
    \ clause in the function body, as we did in this example. In this case, specifying\
    \ the `RESULT_CACHE_RELIES_ON` clause means that the result cache relies on the\
    \ tables `STORES` and `EMPLOYEES`. What this means is that whenever these tables\
    \ change, the database invalidates all the cached results for the `get_store_info`\
    \ function.\n\n#### How It Works\n\nThe PL/SQL function result cache uses the\
    \ same server-side result cache as the query result cache, and you set the size\
    \ of the cache using the `RESULT_CACHE_MAX_SIZE` and `RESULT_CACHE_MAX_RESULT`\
    \ initialization parameters, with the first parameter fixing the maximum SGA memory\
    \ that the cache can use, and the latter fixing the maximum percentage of the\
    \ cache a single result can use. Unlike the query result cache, the PL/SQL function\
    \ cache may quickly gather numerous results for caching, because the cache will\
    \ store multiple values for the same function, based on the parameter values.\
    \ If there's space pressure within the cache, older cached function results are\
    \ removed to make room for new results.\n\nOracle recommends that you employ the\
    \ PL/SQL function result cache to cache the results of functions that execute\
    \ frequently but rely on static or mostly static data. The reason for specifying\
    \ the static data requirement is simple: Oracle automatically invalidates cache\
    \ results of any function whose underlying views or tables undergo committed changes.\
    \ When this happens, the invocation of the function will result in a fresh execution.\n\
    \nWhenever you introduce a modified version of a package on which a result cache\
    \ function depends (such as in `[Listing 3-1](#Chapter03.html#list_3_1)`), the\
    \ database is supposed to automatically flush that function's cached results from\
    \ the PL/SQL function cache. In our example, when you hot-patch (recompile) the\
    \ package `store_pkg`, Oracle technically must flush the cached results associated\
    \ with the `get_store_info` function. However, sometimes the database may fail\
    \ to automatically flush these results. In order to ensure that the cached results\
    \ of the function are removed, follow these steps whenever you recompile a PL/SQL\
    \ unit such as a package that includes a cache-enabled function.\n\n1.  Place\
    \ the result cache in the bypass mode.\n    `SQL> execute DBMS_RESULT_CACHE.bypass(true);`\n\
    2.  Clear the cache with the `flush` procedure.\n    `SQL> execute DBMS_RESULT_CACHE.flush;`\n\
    3.  Recompile the package that contains the cache-enabled function.\n    `SQL>\
    \ alter package store_pkg compile;`\n4.  Re-enable the result cache with the `bypass`\
    \ procedure.\n    `SQL> execute DBMS_RESULT_CACHE.bypass(false);`\n\n![images](images/square.jpg)\
    \ **Tip** If you're using both the SQL query cache and PL/SQL function result\
    \ cache simultaneously, remember that both caches are actually part of the same\
    \ server query cache. In cases such as this, ensure that you've sized the `RESULT_CACHE_SIZE`\
    \ parameter high enough to hold cached results from both SQL queries and PL/SQL\
    \ functions.\n\nIf you're operating in an Oracle RAC environment, you must run\
    \ the cache enabling and disabling steps on each RAC instance.\n\nOf course, when\
    \ you bypass the cache temporarily in this manner, during that time the cache\
    \ is bypassed, the database will execute the function, instead of seeking to retrieve\
    \ its results from the cache. The database will also bypass the result cache on\
    \ its own for a function if a session is in the process of performing a DML statement\
    \ on a table or view that the function depends on. This automatic bypassing of\
    \ the result cache by the database ensures that users won't see uncommitted changes\
    \ of another session in their own session, thus ensuring read consistency.\n\n\
    You can use the `V$RESULT_CACHE_STATISTICS`, `V$RESULT_CACHE_MEMORY`, `V$RESULT_CACHE_OBJECTS`,\
    \ and `V$RESULT_CACHE_DEPENDENCY` views to monitor the usage of the server result\
    \ cache, which includes both the SQL result cache as well as the PL/SQL function\
    \ result cache."
  raw: '#### Solution


    Oracle''s server query cache (Recipe 3-7) helps you cache both normal SQL query
    results as well as PL/SQL function results. By using the server result cache,
    you can instruct the database to cache the results of PL/SQL functions in the
    SGA. Other sessions can use these cached results, just as they can use cached
    query results with the query result cache. Once you''ve configured the server
    query cache by setting the appropriate initialization parameters (please see Recipe
    3-7), you are ready to make use of this feature.


    You must specify the `RESULT_CACHE` clause inside a function to make the database
    cache the function''s results in the PL/SQL function result cache. When a session
    invokes a function after you enable caching, it first checks to see if the cache
    holds results for the function with identical parameter values. If so, it fetches
    the cached results and doesn''t have to execute the function body. Note that if
    you declare a function first, you must also specify the `RESULT_CACHE` clause
    in the function declaration, in addition to specifying the clause within the function
    itself.


    [Listing 3-1](#Chapter03.html#list_3_1) shows how to cache a PL/SQL function''s
    results.


    ***Listing 3-1.** Creating a PL/SQL Function with the `/*+result_cache*/` Hint*


    `SQL> create or replace package store_pkg is`

    `      type store_sales_record is record (`

    `      store_name stores.store_name%TYPE,`

    `     mgr_name   employees.last_name%type,`

    `     store_size  PLS_INTEGER`

    `     );`

    `     function get_store_info (store_id PLS_INTEGER)`

    `      RETURN store_info_record`

    `      RESULT_CACHE;`

    `     END store_pkg;`

    `    /`

    `Create or replace package body store_pkg is`

    `    FUNCTION get_store_sales (store_id PLS_INTEGER)`

    `    RETURN store_sales_record`

    `    RESULT_CACHE RELIES_ON (stores, employees)`

    `  IS`

    `    rec  store_sales_record;`

    `  BEGIN`

    `    SELECT store_name INTO rec.store_name`

    `    FROM stores`

    `    WHERE store_id = store_id;`

    `    SELECT e.last_name INTO rec.mgr_name`

    `    FROM stores d, employees e`

    `    WHERE d.store_id = store_id`

    `    AND d.manager_id = e.employee_id;`

    `     SELECT COUNT(*) INTO rec.store_size`

    `    FROM EMPLOYEES`

    `    WHERE store_id = store_id;`

    `     RETURN rec;`

    `  END get_store_sales;`

    `END store_pkg;`

    `/`


    Let''s say you invoke the function with the following values:


    `SQL> execute store_pkg.get_store_sales(999)`


    The first execution will cache the PL/SQL function''s results in the server result
    cache. Any future executions of this function with the same parameters (999) won''t
    require the database to re-execute this function—it merely fetches the results
    from the server result cache.


    Note that in addition to specifying the  `RESULT_CACHE` clause in the function
    declaration, you can optionally specify the `RESULT_CACHE RELIES ON` clause in
    the function body, as we did in this example. In this case, specifying the `RESULT_CACHE_RELIES_ON`
    clause means  that the result cache relies on the tables `STORES` and `EMPLOYEES`.
    What this means is that whenever these tables change, the database invalidates
    all the cached results for the `get_store_info` function.


    #### How It Works


    The PL/SQL function result cache uses the same server-side result cache as the
    query result cache, and you set the size of the cache using the `RESULT_CACHE_MAX_SIZE`
    and `RESULT_CACHE_MAX_RESULT` initialization parameters, with the first parameter
    fixing the maximum SGA memory that the cache can use, and the latter fixing the
    maximum percentage of the cache a single result can use. Unlike the query result
    cache, the PL/SQL function cache may quickly gather numerous results for caching,
    because the cache will store multiple values for the same function, based on the
    parameter values. If there''s space pressure within the cache, older cached function
    results are removed to make room for new results.


    Oracle recommends that you employ the PL/SQL function result cache to cache the
    results of functions that execute frequently but rely on static or mostly static
    data. The reason for specifying the static data requirement is simple: Oracle
    automatically invalidates cache results of any function whose underlying views
    or tables undergo committed changes. When this happens, the invocation of the
    function will result in a fresh execution.


    Whenever you introduce a modified version of a package on which a result cache
    function depends (such as in [Listing 3-1](#Chapter03.html#list_3_1)), the database
    is supposed to automatically flush that function''s cached results from the PL/SQL
    function cache. In our example, when you hot-patch (recompile) the package `store_pkg`,
    Oracle technically must flush the cached results associated with the `get_store_info`
    function. However, sometimes the database may fail to automatically flush these
    results. In order to ensure that the cached results of the function are removed,
    follow these steps whenever you recompile a PL/SQL unit such as a package that
    includes a cache-enabled function.


    1.  Place the result cache in the bypass mode. `SQL> execute DBMS_RESULT_CACHE.bypass(true);`

    2.  Clear the cache with the `flush` procedure. `SQL> execute DBMS_RESULT_CACHE.flush;`

    3.  Recompile the package that contains the cache-enabled function. `SQL> alter
    package store_pkg compile;`

    4.  Re-enable the result cache with the `bypass` procedure. `SQL> execute DBMS_RESULT_CACHE.bypass(false);`


    ![images](images/square.jpg) **Tip** If you''re using both the SQL query cache
    and PL/SQL function result cache simultaneously, remember that both caches are
    actually part of the same server query cache. In cases such as this, ensure that
    you''ve sized the `RESULT_CACHE_SIZE` parameter high enough to hold cached results
    from both SQL queries and PL/SQL functions.


    If you''re operating in an Oracle RAC environment, you must run the cache enabling
    and disabling steps on each RAC instance.


    Of course, when you bypass the cache temporarily in this manner, during that time
    the cache is bypassed, the database will execute the function, instead of seeking
    to retrieve its results from the cache. The database will also bypass the result
    cache on its own for a function if a session is in the process of performing a
    DML statement on a table or view that the function depends on. This automatic
    bypassing of the result cache by the database ensures that users won''t see uncommitted
    changes of another session in their own session, thus ensuring read consistency.


    You can use the `V$RESULT_CACHE_STATISTICS`, `V$RESULT_CACHE_MEMORY`, `V$RESULT_CACHE_OBJECTS`,
    and `V$RESULT_CACHE_DEPENDENCY` views to monitor the usage of the server result
    cache, which includes both the SQL result cache as well as the PL/SQL function
    result cache.'
  trans: "#### 解决方案\n\nOracle 的服务器查询缓存（参见配方 3-7）可帮助您缓存常规 SQL 查询结果以及 PL/SQL 函数结果。通过使用服务器结果缓存，您可以指示数据库将\
    \ PL/SQL 函数的结果缓存到 SGA 中。其他会话可以使用这些缓存结果，就像它们可以使用查询结果缓存中的缓存查询结果一样。一旦您通过设置适当的初始化参数配置好服务器查询缓存（请参阅配方\
    \ 3-7），就可以开始使用此功能了。\n\n您必须在函数内指定`RESULT_CACHE`子句，以使数据库将函数结果缓存在 PL/SQL 函数结果缓存中。在启用缓存后，当一个会话调用该函数时，它首先检查缓存中是否存有具有相同参数值的函数结果。如果有，它就直接获取缓存结果，而无需执行函数体。请注意，如果您先声明了一个函数，那么除了在函数体本身中指定该子句外，还必须在函数声明中也指定`RESULT_CACHE`子句。\n\
    \n`清单 3-1`展示了如何缓存 PL/SQL 函数的结果。\n\n**清单 3-1.** 创建带有`/*+result_cache*/`提示的 PL/SQL\
    \ 函数\n\n```\n`SQL> create or replace package store_pkg is`\n`      type store_sales_record\
    \ is record (`\n`      store_name stores.store_name%TYPE,`\n`      mgr_name  \
    \ employees.last_name%type,`\n`      store_size  PLS_INTEGER`\n`      );`\n` \
    \     function get_store_info (store_id PLS_INTEGER)`\n`       RETURN store_info_record`\n\
    `       RESULT_CACHE;`\n`      END store_pkg;`\n`    /`\n`Create or replace package\
    \ body store_pkg is`\n`    FUNCTION get_store_sales (store_id PLS_INTEGER)`\n\
    `    RETURN store_sales_record`\n`    RESULT_CACHE RELIES_ON (stores, employees)`\n\
    `  IS`\n`    rec  store_sales_record;`\n`  BEGIN`\n`    SELECT store_name INTO\
    \ rec.store_name`\n`    FROM stores`\n`    WHERE store_id = store_id;`\n`    SELECT\
    \ e.last_name INTO rec.mgr_name`\n`    FROM stores d, employees e`\n`    WHERE\
    \ d.store_id = store_id`\n`    AND d.manager_id = e.employee_id;`\n`     SELECT\
    \ COUNT(*) INTO rec.store_size`\n`    FROM EMPLOYEES`\n`    WHERE store_id = store_id;`\n\
    `     RETURN rec;`\n`  END get_store_sales;`\n`END store_pkg;`\n`/`\n```\n\n假设您使用以下值调用该函数：\n\
    \n`SQL> execute store_pkg.get_store_sales(999)`\n\n第一次执行会将 PL/SQL 函数的结果缓存到服务器结果缓存中。之后任何使用相同参数（999）执行此函数时，数据库都不必重新执行它——它只需从服务器结果缓存中获取结果即可。\n\
    \n请注意，除了在函数声明中指定`RESULT_CACHE`子句外，您还可以选择在函数体中指定`RESULT_CACHE RELIES ON`子句，正如我们在本例中所做的那样。在这种情况下，指定`RESULT_CACHE_RELIES_ON`子句意味着结果缓存依赖于表`STORES`和`EMPLOYEES`。这意味着每当这些表发生更改时，数据库都会使`get_store_info`函数的所有缓存结果失效。\n\
    \n#### 工作原理\n\nPL/SQL 函数结果缓存使用与查询结果缓存相同的服务器端结果缓存，您可以使用`RESULT_CACHE_MAX_SIZE`和`RESULT_CACHE_MAX_RESULT`初始化参数来设置缓存的大小，其中第一个参数固定了缓存可以使用的最大\
    \ SGA 内存量，后者则固定了单个结果可以占用的最大缓存百分比。与查询结果缓存不同，PL/SQL 函数缓存可能会快速收集大量缓存结果，因为缓存将根据参数值存储同一函数的多个值。如果缓存空间不足，则会移除较旧的缓存函数结果以为新结果腾出空间。\n\
    \nOracle 建议您使用 PL/SQL 函数结果缓存来缓存那些执行频繁但依赖于静态或基本静态数据的函数的结果。规定静态数据要求的原因很简单：Oracle\
    \ 会自动使任何底层视图或表发生已提交更改的函数的缓存结果失效。发生这种情况时，调用该函数将导致重新执行。\n\n每当您引入结果缓存函数所依赖的程序包的修改版本时（如`清单\
    \ 3-1`所示），数据库应该自动从 PL/SQL 函数缓存中刷新该函数的缓存结果。在我们的示例中，当您热补丁（重新编译）程序包`store_pkg`时，Oracle\
    \ 技术上必须刷新与`get_store_info`函数关联的缓存结果。但是，有时数据库可能无法自动刷新这些结果。为了确保函数的缓存结果被移除，每当您重新编译包含缓存启用函数的\
    \ PL/SQL 单元（如程序包）时，请执行以下步骤：\n\n1.  将结果缓存置于旁路模式。\n    `SQL> execute DBMS_RESULT_CACHE.bypass(true);`\n\
    2.  使用`flush`过程清除缓存。\n    `SQL> execute DBMS_RESULT_CACHE.flush;`\n3.  重新编译包含缓存启用函数的程序包。\n\
    \    `SQL> alter package store_pkg compile;`\n4.  使用`bypass`过程重新启用结果缓存。\n    `SQL>\
    \ execute DBMS_RESULT_CACHE.bypass(false);`\n\n![images](img/square.jpg) **提示**\
    \ 如果您同时使用 SQL 查询缓存和 PL/SQL 函数结果缓存，请记住，这两个缓存实际上都是同一服务器查询缓存的一部分。在这种情况下，请确保您将`RESULT_CACHE_SIZE`参数设置得足够大，以容纳来自\
    \ SQL 查询和 PL/SQL 函数的缓存结果。\n\n如果您在 Oracle RAC 环境中运行，则必须在每个 RAC 实例上运行启用和禁用缓存的步骤。\n\
    \n当然，当您以这种方式临时旁路缓存时，在缓存被旁路期间，数据库将执行该函数，而不是尝试从缓存中检索其结果。如果某个会话正在对函数所依赖的表或视图执行 DML\
    \ 语句，数据库也会自动为该函数旁路结果缓存。数据库的这种自动旁路结果缓存机制可确保用户在其自己的会话中看不到另一个会话未提交的更改，从而确保读一致性。\n\
    \n您可以使用`V$RESULT_CACHE_STATISTICS`、`V$RESULT_CACHE_MEMORY`、`V$RESULT_CACHE_OBJECTS`和`V$RESULT_CACHE_DEPENDENCY`视图来监控服务器结果缓存的使用情况，该缓存既包括\
    \ SQL 结果缓存，也包括 PL/SQL 函数结果缓存。"
- fmt: "##### Important Considerations\n\nWhile a PL/SQL function cache gets you results\
    \ much faster than repetitive execution of a function, PL/SQL collections (arrays)–based\
    \ processing could be even faster because the PL/SQL runtime engine gets the results\
    \ from the collection cache based in the PGA rather than the SGA. However, since\
    \ this requires additional PGA memory for each session, you'll have problems with\
    \ the collections approach as the number of sessions grows large. The PL/SQL function\
    \ is easily shareable by all concurrent sessions, whereas you can set up collections\
    \ for sharing only through additional coding.\n\nYou must be alert to the possibility\
    \ that if your database undergoes frequent DML changes, the PL/SQL function cache\
    \ may not be ideal for you—it's mostly meant for data that never changes, or does\
    \ so only infrequently. Even if you set the `RESULT_CACHE_REMOTE_EXPIRATION` parameter\
    \ to a high value, any DML changes will force the database to invalidate the cached\
    \ PL/SQL function cache result sets.\n\nOracle will invalidate result cache output\
    \ when it becomes out of date, so when a DML statement modifies the rows of a\
    \ table that is part of a PL/SQL function that you've enabled for the function\
    \ cache, the database invalidates the cached results of that function. This could\
    \ happen if the specific rows that were modified aren't part of the PL/SQL function\
    \ result set. Again, remember that this limitation could be “bypassed” by using\
    \ the PL/SQL function cache in databases that are predominantly read-only.\n\n\
    ##### Restrictions on the PL/SQL Function Cache\n\nIn order for its results to\
    \ be cached, a function must satisfy the following requirements:\n\n*   The function\
    \ doesn't use an `OUT` or an `IN OUT` parameter.\n*   An `IN` parameter of a function\
    \ has one of these types: `BLOB`, `CLOB`, `NCLOB`, `REF CURSOR`, `Collection Object`,\
    \ and `Record`.\n*   The function isn't a pipelined table function.\n*   The function\
    \ isn't part of an anonymous block.\n*   The function isn't part of any module\
    \ that uses invoker's rights as opposed to definer's rights.\n*   The function's\
    \ return type doesn't include the following types: `BLOB`, `CLOB`, `NCLOB`, `REF\
    \ CURSOR`, `Object`, `Record`, or a PL/SQL collection that contains one of the\
    \ preceding unsupported return types.\n\n### 3-12. Configuring the Oracle Database\
    \ Smart Flash Cache\n\n#### Problem\n\nYour AWR (Automatic Workload Repository)\
    \ report indicates that you need a much larger buffer cache. You also notice that\
    \ the shared pool is sized correctly, and so you can't set a higher minimum level\
    \ for the buffer cache by reducing the shared pool memory allocation. In addition,\
    \ you're limited in the amount of additional memory you can allocate to Oracle.\n\
    \n#### Solution\n\nDepending on your operating system, you can use the new Oracle\
    \ Database Smart Flash Cache feature, in cases where the database indicates that\
    \ it needs a much larger amount of memory for the buffer cache. Right now, the\
    \ Flash Cache feature is limited to Solaris and Oracle Linux operating systems.\n\
    \nSet the following parameters to turn the Flash Cache feature on:\n\n*   `DB_FLASH_CACHE_FILE`:\
    \ This parameter sets the pathname and the file name for the flash cache. The\
    \ file name you specify will hold the flash cache. You must use a flash device\
    \ for the flash cache file, and it could be located in the operating system file\
    \ system, a raw disk, or an Oracle ASM disk group—for example: `DB_FLASH_CACHE_FILE=\
    \ \"/dev/sdc\"`\n    `DB_FLASH_CACHE_FILE = \"/export/home/oracle/file_raw\"         /*\
    \ raw file`\n    `DB_FLASH_CACHE_FILE = \"+dg1/file_asm\"                        /*\
    \ using ASM storage`\n*   `DB_FLASH_CACHE_SIZE`: This parameter sets the size\
    \ of the flash cache storage. Here's an example: `DB_FLASH_CACHE_SIZE = 8GB`\n\
    \nYou can toggle between a system with a flash cache and one without, by using\
    \ the `alter system` command as shown here:\n\n```\nSQL> alter system set db_flash_cache_size\
    \ = 0;       /* disables the flash cache */\nSQL> alter system set db_flash_cache_size\
    \ = 8G;      /* reenables the flash cache */\n```\n\nNote that although you can\
    \ successfully enable and disable the flash cache dynamically as shown here, Oracle\
    \ doesn't support this method.\n\n![images](images/square.jpg) `Note` If you're\
    \ using Oracle RAC, in order to utilize the Flash Cache feature, you must enable\
    \ it on all the nodes of the cluster."
