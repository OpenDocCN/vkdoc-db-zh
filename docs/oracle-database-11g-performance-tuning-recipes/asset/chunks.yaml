    older data there in order to reduce the overall cost of storage on your database.
    To alter a table to rebuild a partition in parallel, you would issue a command
    such as the one here:


    `ALTER TABLE EMP`

    `MOVE PARTITION P2`

    `TABLESPACE EMP_S`

    `PARALLEL(DEGREE 4);`


    #### How It Works


    The `ALTER TABLE` statement to move a partition is an easy, efficient way to move
    data around for a partitioned table. As with some of the other parallel DDL operations
    shown within this chapter, there are several reasons to need to move a table partition
    to a different tablespace:


    *   You are moving older data to cheaper, slower storage.

    *   You are consolidating a series of partitions to a single tablespace.

    *   You are moving certain partitions to separate tablespaces to logically group
