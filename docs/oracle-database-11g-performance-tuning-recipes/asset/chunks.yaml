    #### How It Works


    In the foregoing example, note that between some of the snapshots listed there
    is a blank line. Since we are getting information based on the dynamic performance
    views of the data dictionary, you cannot specify a snapshot period that spans
    bounces of the database instance, as all statistics in the dynamic performance
    views are lost when a database instance is shut down. Therefore, choose a snapshot
    period only for the life of an instance; otherwise you can experience the following
    error:


    `Enter value for begin_snap: 274`

    `Begin Snapshot Id specified: 274`


    `Enter value for end_snap: 275`

    `End   Snapshot Id specified: 275`


    `declare`

