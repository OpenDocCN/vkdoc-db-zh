    \    AVERAGE_WAIT\n----------- ------------    -----------   -------------  -------------\n\
    enq: UL - contention                  1             499          499.19\nlatch:\
    \ shared pool                  251           10944           43.6\nlibrary cache\
    \ load lock              24             789          32.88\nSQL>\n```\n\n> ![images](img/square.jpg)\
    \ **提示** 两个最常见的 Oracle 等待事件是 `db file scattered read` 和 `db file sequential read`\
    \ 事件。`db file scattered read` 等待事件是由于对大表进行全表扫描引起的。如果你遇到这个等待事件， investigate 为表添加索引的可能性。`db\
    \ file sequential read` 等待事件是由于索引读引起的。虽然索引读看起来是好事，但大量的索引读可能表明存在需要优化的低效查询。如果 `db\
    \ file sequential read` 等待事件的高值是由大量小型索引读引起的，这并不是真正的问题——这在数据库中很常见。如果少数查询导致了大部分等待，你就应该关注了。\n\
    \n你可以看到，由行锁争用引起的入队等待是这两个类别下导致最多等待的原因。现在你确切地知道是什么拖慢了数据库中的查询！要找到性能受到行锁争用影响的会话，请使用以下查询深入到会话级别：\n\
    \n```sql\nSQL> select a.sid, a.event, a.total_waits, a.time_waited, a.average_wait\n\
    \     from v$session_event a, v$session b\n     where time_waited > 0\n     and\
    \ a.sid=b.sid\n     and b.username is not NULL\n     and a.event='enq: TX - row\
    \ lock contention';\n\n  SID               EVENT                      TOTAL_WAITS\
    \    time_waited      average_wait\n----------     ------------------------------\
    \  ------------   -----------      ------------\n        68      enq: TX - row\
    \ lock contention             24           8018              298\nSQL>\n```\n\n\
    输出显示，SID 为 68 的会话正在等待被另一个事务持有的行锁。\n\n#### 工作原理\n\n理解各种 Oracle 等待事件类别能增强你快速诊断 Oracle\
    \ 与等待相关问题的能力。按类别分析等待事件可以让你知道是争用、用户 I/O 还是配置问题导致了高等待。“解决方案”部分中的示例展示了如何基于等待事件类别开始分析等待。这有助于识别等待的来源，例如并发问题。一旦你识别出导致大部分等待的等待事件类别，你就可以深入研究该等待事件类别，找出导致该类别下总等待时间过高的具体等待事件。然后，你可以使用“解决方案”部分中显示的最终查询，识别正在等待这些等待事件的用户会话。\n\
    \n### 5-7. 解决缓冲区忙等待\n\n#### 问题\n\n根据 AWR 报告的输出，你的数据库正在经历大量的缓冲区忙等待。你想要解决这些等待。\n\
    \n#### 解决方案\n\n...\n\n### 5-6. 按类别检查等待事件\n\n#### 工作原理\n\n“解决方案”部分中显示的第一个查询提供了一种简单的方法来查明哪些等待事件（如果有的话）正在拖慢用户会话。当你在不指定\
    \ `SID` 的情况下发出查询时，它会显示数据库中所有会话的当前和最后一次等待。例如，如果你在数据库中遇到锁定情况，你可以定期发出查询，以查看总入队等待次数是否在下降。如果整个实例的入队等待次数在增长，则意味着更多会话因被阻塞的锁而遇到性能下降。\n\
    \n`V$SESSION_WAIT` 视图显示每个会话的当前或上一次等待。该视图中的 `STATE` 列告诉你会话是否正在等待。以下是 `STATE` 列的可能值：\n\
    \n> `WAITING:` 会话当前正在等待资源。\n>\n> `WAITED UNKNOWN TIME`: 上一次等待的持续时间未知（仅在你将 `TIMED_STATISTICS`\
    \ 参数设置为 `false` 时才显示此值）。\n>\n> `WAITED SHORT TIME`: 最近一次等待少于百分之一秒。\n>\n> `WAITED\
    \ KNOWN TIME`: `WAIT_TIME` 列显示上一次等待的持续时间。\n\n请注意，该查询利用 `seconds_in_wait` 列来查明此会话已等待了多长时间。Oracle\
    \ 已弃用此列，转而使用 `wait_time_micro` 列，该列以微秒为单位显示等待时间。如果会话当前正在等待，这两列都显示当前等待已等待的时间量。如果会话当前没有等待，`wait_time_micro`\
    \ 列显示上一次等待期间已等待的时间量。\n"
- fmt: "## Solution\n\nOracle has several types of buffer classes, such as data block,\
    \ segment header, undo header, and undo block. How you fix a buffer busy wait\
    \ situation will depend on the types of buffer classes that are causing the problem.\
    \ You can find out the type of buffer causing the buffer waits by issuing the\
    \ following two queries. Note that you first get the value of `row_wait_obj#`\
    \ from the first query and use it as the value for `data_object_id` in the second\
    \ query.\n\n```\nSQL> select row_wait_obj#\n     from v$session\n     where event\
    \ = 'buffer busy waits';\n```\n\n```\nSQL> select owner, object_name, subobject_name,\
    \ object_type\n     from dba_objects\n     where data_object_id = &row_wait_obj;\n\
    ```\n\nThe preceding queries will reveal the specific type of buffer causing the\
    \ high buffer waits. Your fix will depend on which buffer class causes the buffer\
    \ waits, as summarized in the following subsections.\n\n### Segment Header\n\n\
    If your queries show that the buffer waits are being caused by contention on the\
    \ segment header, there's free list contention in the database, due to several\
    \ processes attempting to insert into the same data block—each of these processes\
    \ needs to obtain a free list before it can insert data into that block. If you\
    \ aren't already using it, you must switch from manual space management to automatic\
    \ segment space management (`ASSM`)—under `ASSM`, the database doesn't use free\
    \ lists. However, note that moving to `ASSM` may not be easily feasible in most\
    \ cases. In cases where you can't implement `ASSM`, you must increase the free\
    \ lists for the segment in question. You can also try increasing the free list\
    \ groups as well.\n\n### Data Block\n\nData block buffer contention could be related\
    \ to a table or an index. This type of contention is often caused by right-hand\
    \ indexes, that is, indexes that result in several processes inserting into the\
    \ same point, such as when you use sequence number generators to produce the key\
    \ values. Again, if you're using manual segment management, move to `ASSM` or\
    \ increase free lists for the segment.\n\n### Undo Header and Undo Block\n\nIf\
    \ you're using automatic undo management, few or none of the buffer waits will\
    \ be due to contention for an undo segment header or an undo segment block. If\
    \ you do see one of these buffer classes as the culprit, however, you may increase\
    \ the size of your undo tablespace to resolve the buffer busy waits.\n\n## How\
    \ It Works\n\nA buffer busy wait indicates that more than one process is simultaneously\
    \ accessing the same data block. One of the reasons for a high number of buffer\
    \ busy waits is that an inefficient query is reading too many data blocks into\
    \ the buffer cache, thus potentially keeping in wait other sessions that want\
    \ to access one or more of those same blocks. Not only that, a query that reads\
    \ too much data into the buffer cache may lead to the aging out of necessary blocks\
    \ from the cache. You must investigate queries that involve the segment causing\
    \ the buffer busy waits with a view to reducing the number of data blocks they're\
    \ reading into the buffer cache.\n\nIf your investigation of buffer busy waits\
    \ reveals that the same block or set of blocks is involved most of the time, a\
    \ good strategy would be to delete some of these rows and insert them back into\
    \ the table, thus forcing them onto different data blocks.\n\nCheck your current\
    \ memory allocation to the buffer cache, and, if necessary, increase it. A larger\
    \ buffer cache can reduce the waiting by sessions to read data from disk, since\
    \ more of the data will already be in the buffer cache. You can also place the\
    \ offending table in memory by using the `KEEP POOL` in the buffer cache (please\
    \ see Recipe 3-7). By making the hot block always available in memory, you'll\
    \ avoid the high buffer busy waits.\n\nIndexes that have a very low number of\
    \ unique values are called low cardinality indexes. Low cardinality indexes generally\
    \ result in too many block reads. Thus, if several DML operations are occurring\
    \ concurrently, some of the index blocks could become “hot” and lead to high buffer\
    \ busy waits. As a long-term solution, you can try to reduce the number of the\
    \ low cardinality indexes in your database.\n\nEach Oracle data segment such as\
    \ a table or an index contains a header block that records information such as\
    \ free blocks available. When multiple sessions are trying to insert or delete\
    \ rows from the same segment, you could end up with contention for the data segment's\
    \ header block.\n\nBuffer busy waits are also caused by a contention for free\
    \ lists. A session that's inserting data into a segment needs to first examine\
    \ the free list information for the segment, to find blocks with free space into\
    \ which the session can insert data. If you use `ASSM` in your database, you shouldn't\
    \ see any waits due to contention for a free list.\n\n## 5-8. Resolving Log File\
    \ Sync Waits\n\n### Problem\n\nYou're seeing a high amount of `log file sync`\
    \ wait events, which are at the top of all wait events in your database. You want\
    \ to reduce these wait events.\n\n### Solution\n\nThe following are two strategies\
    \ for dealing with high `log file sync` waits in your database.\n\n*   If you\
    \ notice a very large number of waits with a short average wait time per wait,\
    \ that's an indication that too many commit statements are being issued by the\
    \ database. You must change the commit behavior by batching the commits. Instead\
    \ of committing after each row, for example, you can specify that the commits\
    \ occur after every 500 rows.\n*   If you notice that the large amount of wait\
    \ time accumulated due to the `redo log file sync` event was caused by long waits\
    \ for writing to the redo log file (high average time waited for this event),\
    \ it's more a matter of how fast your I/O subsystem is. You can alternate the\
    \ redo log files on various disks to reduce contention. You can also see if you\
    \ can dedicate disks entirely for the redo logs instead of allowing other files\
    \ on those disks—this will reduce I/O contention when the LGWR is writing the\
    \ buffers to disk. Finally, as a long-term solution, you can look into placing\
    \ redo logs on faster devices, say, by moving them from a RAID 5 to a RAID 1 device."
  raw: '#### Solution


    Oracle has several types of buffer classes, such as data block, segment header,
    undo header, and undo block. How you fix a buffer busy wait situation will depend
    on the types of buffer classes that are causing the problem. You can find out
    the type of buffer causing the buffer waits by issuing the following two queries.
    Note that you first get the value of `row_wait_obj#` from the first query and
    use it as the value for `data_object_id` in the second query.


    `SQL> select row_wait_obj#`

    `     from v$session`

    `     where event = ''buffer busy waits'';`


    `SQL> select owner, object_name, subobject_name, object_type`

    `     from dba_objects`

    `     where data_object_id = &row_wait_obj;`


    The preceding queries will reveal the specific type of buffer causing the high
    buffer waits. Your fix will depend on which buffer class causes the buffer waits,
    as summarized in the following subsections.


    ##### Segment Header


    If your queries show that the buffer waits are being caused by contention on the
    segment header, there''s free list contention in the database, due to several
    processes attempting to insert into the same data block—each of these processes
    needs to obtain a free list before it can insert data into that block. If you
    aren''t already using it, you must switch from manual space management to automatic
    segment space management (ASSM)—under ASSM, the database doesn''t use free lists.
    However, note that moving to ASSM may not be easily feasible in most cases. In
    cases where you can''t implement ASSM, you must increase the free lists for the
    segment in question. You can also try increasing the free list groups as well.


    ##### Data Block


    Data block buffer contention could be related to a table or an index. This type
    of contention is often caused by right-hand indexes, that is, indexes that result
    in several processes inserting into the same point, such as when you use sequence
    number generators to produce the key values. Again, if you''re using manual segment
    management, move to ASSM or increase free lists for the segment.


    ##### Undo Header and Undo Block


    If you''re using automatic undo management, few or none of the buffer waits will
    be due to contention for an undo segment header or an undo segment block. If you
    do see one of these buffer classes as the culprit, however, you may increase the
    size of your undo tablespace to resolve the buffer busy waits.


    #### How It Works


    A buffer busy wait indicates that more than one process is simultaneously accessing
    the same data block. One of the reasons for a high number of buffer busy waits
    is that an inefficient query is reading too many data blocks into the buffer cache,
    thus potentially keeping in wait other sessions that want to access one or more
    of those same blocks. Not only that, a query that reads too much data into the
    buffer cache may lead to the aging out of necessary blocks from the cache. You
    must investigate queries that involve the segment causing the buffer busy waits
    with a view to reducing the number of data blocks they''re reading into the buffer
    cache.


    If your investigation of buffer busy waits reveals that the same block or set
    of blocks is involved most of the time, a good strategy would be to delete some
    of these rows and insert them back into the table, thus forcing them onto different
    data blocks.


    Check your current memory allocation to the buffer cache, and, if necessary, increase
    it. A larger buffer cache can reduce the waiting by sessions to read data from
    disk, since more of the data will already be in the buffer cache. You can also
    place the offending table in memory by using the `KEEP POOL` in the buffer cache
    (please see Recipe 3-7). By making the hot block always available in memory, you''ll
    avoid the high buffer busy waits.


    Indexes that have a very low number of unique values are called low cardinality
    indexes. Low cardinality indexes generally result in too many block reads. Thus,
    if several DML operations are occurring concurrently, some of the index blocks
    could become “hot” and lead to high buffer busy waits. As a long-term solution,
    you can try to reduce the number of the low cardinality indexes in your database.


    Each Oracle data segment such as a table or an index contains a header block that
    records information such as free blocks available. When multiple sessions are
    trying to insert or delete rows from the same segment, you could end up with contention
    for the data segment''s header block.


    Buffer busy waits are also caused by a contention for free lists. A session that''s
    inserting data into a segment needs to first examine the free list information
    for the segment, to find blocks with free space into which the session can insert
    data. If you use ASSM in your database, you shouldn''t see any waits due to contention
    for a free list.


    ### 5-8\. Resolving Log File Sync Waits


    #### Problem


    You''re seeing a high amount of `log file sync` wait events, which are at the
    top of all wait events in your database. You want to reduce these wait events.


    #### Solution


    The following are two strategies for dealing with high `log file sync` waits in
    your database.


    *   If you notice a very large number of waits with a short average wait time
    per wait, that''s an indication that too many commit statements are being issued
    by the database. You must change the commit behavior by batching the commits.
    Instead of committing after each row, for example, you can specify that the commits
    occur after every 500 rows.

    *   If you notice that the large amount of wait time accumulated due to the `redo
    log file sync` event was caused by long waits for writing to the redo log file
    (high average time waited for this event), it''s more a matter of how fast your
    I/O subsystem is. You can alternate the redo log files on various disks to reduce
    contention. You can also see if you can dedicate disks entirely for the redo logs
    instead of allowing other files on those disks—this will reduce I/O contention
    when the LGWR is writing the buffers to disk. Finally, as a long-term solution,
    you can look into placing redo logs on faster devices, say, by moving them from
    a RAID 5 to a RAID 1 device.'
  trans: "\n## 解决方案\n\nOracle 有多种缓冲区类，例如数据块、段头、撤销头和撤销块。您如何修复缓冲区忙等待情况，取决于导致问题的缓冲区类类型。您可以通过执行以下两个查询来找出导致缓冲区等待的缓冲区类型。请注意，您需要先从第一个查询中获取\
    \ `row_wait_obj#` 的值，并将其用作第二个查询中 `data_object_id` 的值。\n\n```\nSQL> select row_wait_obj#\n\
    \     from v$session\n     where event = 'buffer busy waits';\n```\n\n```\nSQL>\
    \ select owner, object_name, subobject_name, object_type\n     from dba_objects\n\
    \     where data_object_id = &row_wait_obj;\n```\n\n上述查询将揭示导致高缓冲区等待的具体缓冲区类型。您的修复措施将取决于哪个缓冲区类导致了缓冲区等待，如下文各小节所述。\n\
    \n### 段头\n\n如果您的查询显示缓冲区等待是由段头争用引起的，那么数据库中存在空闲列表争用，这是因为多个进程试图向同一个数据块插入数据——每个进程在能向该块插入数据之前都需要获取一个空闲列表。如果您尚未使用自动段空间管理\
    \ (`ASSM`)，则必须从手动空间管理切换到 `ASSM`——在 `ASSM` 下，数据库不使用空闲列表。但是请注意，在大多数情况下，切换到 `ASSM`\
    \ 可能并不容易实现。在无法实施 `ASSM` 的情况下，您必须为相关段增加空闲列表数量。您也可以尝试同时增加空闲列表组数量。\n\n### 数据块\n\n\
    数据块缓冲区争用可能与表或索引有关。此类争用通常由右式索引引起，即导致多个进程在同一点插入的索引，例如当您使用序列号生成器来产生键值时。同样，如果您使用的是手动段管理，请切换到\
    \ `ASSM` 或为该段增加空闲列表。\n\n### 撤销头和撤销块\n\n如果您使用的是自动撤销管理，那么很少或根本没有缓冲区等待会是由于撤销段头或撤销段块争用引起的。如果您确实看到其中一种缓冲区类是罪魁祸首，那么您可以增加撤销表空间的大小来解决缓冲区忙等待问题。\n\
    \n## 工作原理\n\n缓冲区忙等待表明有多个进程同时访问同一个数据块。导致大量缓冲区忙等待的原因之一是一个低效的查询将过多的数据块读入了缓冲区缓存，从而可能让其他想要访问其中一个或多个相同块的会话陷入等待。不仅如此，一个将过多数据读入缓冲区缓存的查询还可能导致必要的块被老化换出缓存。您必须调查涉及导致缓冲区忙等待的段的查询，以期减少它们读入缓冲区缓存的数据块数量。\n\
    \n如果您对缓冲区忙等待的调查显示大多数时候都涉及同一个块或同一组块，那么一个有效的策略是删除其中一些行并将其重新插入表中，从而强制它们位于不同的数据块上。\n\
    \n检查您当前分配给缓冲区缓存的内存，如果需要，请增加其大小。更大的缓冲区缓存可以减少会话等待从磁盘读取数据的情况，因为更多的数据已经存在于缓冲区缓存中。您还可以通过在缓冲区缓存中使用\
    \ `KEEP POOL` 将问题表放置在内存中（请参阅配方 3-7）。通过使热点块始终在内存中可用，您将避免高缓冲区忙等待。\n\n具有非常少唯一值的索引称为低基数索引。低基数索引通常会导致过多的块读取。因此，如果同时发生多个\
    \ DML 操作，某些索引块可能会成为“热点”并导致高缓冲区忙等待。作为长期解决方案，您可以尝试减少数据库中低基数索引的数量。\n\n每个 Oracle 数据段（例如表或索引）都包含一个头块，其中记录诸如可用空闲块等信息。当多个会话试图从同一段插入或删除行时，最终可能会导致对该数据段头块的争用。\n\
    \n缓冲区忙等待也是由对空闲列表的争用引起的。向段中插入数据的会话需要首先检查该段的空闲列表信息，以查找有空闲空间可以插入数据的块。如果您在数据库中使用 `ASSM`，则不应该看到任何因空闲列表争用而导致的等待。\n\
    \n## 5-8. 解决日志文件同步等待\n\n### 问题\n\n您看到大量的 `log file sync` 等待事件，它们位于数据库所有等待事件的首位。您希望减少这些等待事件。\n\
    \n### 解决方案\n\n以下是处理数据库中高 `log file sync` 等待的两种策略。\n\n*   如果您注意到等待次数非常多，但每次等待的平均等待时间很短，这表明数据库发出了太多的提交语句。您必须通过批处理提交来更改提交行为。例如，您可以指定在每\
    \ 500 行之后进行提交，而不是每行之后都提交。\n*   如果您注意到由于 `redo log file sync` 事件而累积的大量等待时间是由写入重做日志文件的长等待（该事件的高平均等待时间）引起的，那么这更多的是关于您的\
    \ I/O 子系统速度的问题。您可以将重做日志文件分布在不同的磁盘上来减少争用。您也可以查看是否可以专门为重做日志分配磁盘，而不允许其他文件放在这些磁盘上——这将减少\
    \ LGWR 将缓冲区写入磁盘时的 I/O 争用。最后，作为长期解决方案，您可以考虑将重做日志放置在更快的设备上，例如，将它们从 RAID 5 移动到 RAID\
    \ 1 设备。\n"
- fmt: "#### How It Works\n\nOracle（实际上是LGWR后台进程）在会话发出`COMMIT`语句时，会自动将会话的重做信息刷新到重做日志文件中。数据库在将控制权返回给客户端之前，会先将提交记录写入磁盘。因此，服务器进程会等待写入重做日志完成。这是默认行为，但您也可以通过`COMMIT_WRITE`初始化参数来控制数据库提交行为。\n\
    \n![images](images/square.jpg) `Note` `COMMIT_WRITE`参数是一个高级参数，在Oracle Database\
    \ 11.2中已被弃用。由于它可能对性能产生不利影响，您可能希望保持该参数不变，并依赖Oracle的默认提交行为。\n\n会话将通知LGWR进程，将会话的重做信息从重做日志缓冲区写入磁盘上的重做日志文件。LGWR进程在完成将缓冲区内容写入磁盘后，会向用户会话发出信号。`log\
    \ file sync`等待事件包括等待LGWR将日志缓冲区写入磁盘的时间，以及将该信息通知会话的时间。服务器进程必须等待，直到获得LGWR进程已完成将日志缓冲区内容写入重做日志文件的确认。\n\
    \n`log file sync`事件是由将日志缓冲区内容写入重做日志文件时的争用引起的。检查`V$SESSION_WAIT`视图以确定Oracle是否在递增`SEQ#`列。如果Oracle在递增此列，则意味着LGWR进程是罪魁祸首，因为它可能被卡住了。\n\
    \n由于`log file sync`等待事件是由LGWR进程引起的争用造成的，看看您是否可以使用`NOLOGGING`选项来消除这些等待。当然，在生产系统中，当数据库正在处理用户请求时，您不能使用`NOLOGGING`选项，因此该选项在大多数情况下用途有限。\n\
    \n`log file sync`等待事件也可能是由于`LOG_BUFFER`初始化参数设置过大引起的。`LOG_BUFFER`参数值过大会导致LGWR进程更少地将数据写入重做日志文件。例如，如果您将`LOG\
    \ BUFFER`设置为12 MB左右，它会将一个内部参数`log_io_size`设置为一个较高的值。`log_io_size`参数充当LGWR何时写入重做日志文件的阈值。在没有提交请求或检查点的情况下，LGWR会等待直到达到`log_io_size`阈值。因此，当数据库发出`COMMIT`语句时，LGWR进程将被迫立即将大量数据写入重做日志文件，导致会话在`log\
    \ file sync`等待事件上等待。这是因为每个等待的会话都在等待LGWR将会话的重做日志缓冲区内容刷新到重做日志文件。虽然数据库会自动计算`log_io_size`参数的值，但您可以通过发出如下命令来为其指定一个值：\n\
    \n```\nSQL> alter system set \"_log_io_size\"=1024000 scope=spfile;\n\nSystem\
    \ altered.\n\nSQL>\n```\n\n### 5-9. Minimizing read by other session Wait Events\n\
    \n#### Problem\n\n您的AWR报告显示，`read by other session`等待事件是导致最多等待的原因。您希望减少高`read\
    \ by other session`等待。\n\n#### Solution\n\n您看到`read by other session`等待事件的主要原因是多个会话试图读取相同的数据块（无论是表块还是索引块），并且不得不等待当前正在读取这些块的会话。您可以通过执行以下命令找到会话正在等待的数据块：\n\
    \n```\nSQL> select p1 \"file#\", p2 \"block#\", p3 \"class#\"\n     from v$session_wait\n\
    \     where event = 'read by other session';\n```\n\n然后，您可以获取`block#`并在以下查询中使用，以识别导致`read\
    \ by other session`等待的确切段（表或索引）。\n\n```\nSQL> select relative_fno, owner, segment_name,\
    \ segment_type\n     from dba_extents\n     where file_id = &file\n     and &block\
    \ between block_id\n     and block_id + blocks - 1;\n```\n\n一旦您识别出热点块及其所属的段，就需要识别使用这些数据块和段的查询，并尽可能调整这些查询。您也可以尝试删除并重新插入热点块内的行。\n\
    \n为了减少每个热点块中的数据量从而减少此类等待，您还可以尝试创建一个具有较小块大小的新表空间，并将段移动到该表空间。检查是否使用了任何低基数索引也是一个好主意，因为这类索引会使数据库将大量数据块读入缓冲区缓存，可能导致`read\
    \ by other session`等待事件。如果可能，将任何低基数索引替换为在高基数列上的索引。\n\n#### How It Works\n\n`read\
    \ by other session`等待事件表明一个或多个会话正在等待另一个会话将相同的数据块从磁盘读取到SGA中。显然，大量的此类等待会降低性能。您的首要目标应该是识别实际的数据块以及这些块所属的对象。例如，这些等待可能是由多个会话试图读取相同的索引块引起的。多个会话也可能试图同时对同一张表执行全表扫描。\n\
    \n### 5-10. Reducing Direct Path Read Wait Events\n\n#### Problem\n\n您注意到大量的`direct\
    \ path read`等待事件，以及`direct path read temp`等待事件，并且您希望减少这些事件的发生。"
  raw: '#### How It Works


    Oracle (actually the LGWR background process) automatically flushes a session''s
    redo information to the redo log file whenever a session issues a `COMMIT` statement.
    The database writes commit records to disk before it returns control to the client.
    The server process thus waits for the completion of the  write to the redo log.
    This is the default behavior, but you can also control the database commit behavior
    with the `COMMIT_WRITE` initialization parameter.


    ![images](images/square.jpg) **Note** The `COMMIT_WRITE` parameter is an advanced
    parameter that has been deprecated in Oracle Database 11.2\. Since it may have
    an adverse impact on performance, you may want to leave the parameter alone and
    rely on Oracle''s default commit behavior.


    The session will tell the LGWR process to write the session''s redo information
    from the redo log buffer to the redo log file on disk. The LGWR process posts
    the user session after it finishes writing the buffer''s contents to disk. The
    `log file sync` wait event includes the wait during the writing of the log buffer
    to disk by LGWR and the posting of that information to the session. The server
    process will have to wait until it gets confirmation that the LGWR process has
    completed writing the log buffer contents out to the redo log file.


    The `log file sync` events are caused by contention during the writing of the
    log buffer contents to the redo log files. Check the `V$SESSION_WAIT` view to
    ascertain whether Oracle is incrementing the `SEQ#` column. If Oracle is incrementing
    this column, it means that the LGWR process is the culprit, as it may be stuck.


    As the `log file sync` wait event is caused by contention caused by the LGWR process,
    see if you can use the `NOLOGGING` option to get rid of these waits. Of course,
    in a production system, you can''t use the `NOLOGGING` option when the database
    is processing user requests, so this option is of limited use in most cases.


    The `log file sync` wait event can also be caused by too large a setting for the
    `LOG_BUFFER` initialization parameter. Too large a value for the `LOG_BUFFER`
    parameter will lead the LGWR process to write data less frequently to the redo
    log files. For example, if you set the `LOG BUFFER` to something like 12 MB, it
    sets an internal parameter, `log_io_size`, to a high value. The `log_io_size`
    parameter acts as a threshold for when the LGWR writes to the redo log files.
    In the absence of a commit request or a checkpoint, LGWR waits until the `log_io_size`
    threshold is met. Thus, when the database issues a `COMMIT` statement, the LGWR
    process would be forced to write a large amount of data to the redo log files
    at once, resulting in sessions waiting on the `log file sync` wait event. This
    happens because each of the waiting sessions is waiting for LGWR to flush the
    contents of the redo log buffer to the redo log files. Although the database automatically
    calculates the value of the `log_io_size` parameter, you can specify a value for
    it, by issuing a command such as the following:


    `SQL> alter system set "_log_io_size"=1024000 scope=spfile;`


    `System altered.`


    `SQL>`


    ### 5-9. Minimizing read by other session Wait Events


    #### Problem


    Your AWR report shows that the `read by other session` wait event is responsible
    for the highest number of waits. You''d like to reduce the high `read by other`
    `session` waits.


    #### Solution


    The main reason you''ll see the `read by other session` wait event is that multiple
    sessions are seeking to read the same data blocks, whether they are table or index
    blocks, and are forced to wait behind the session that''s currently reading those
    blocks. You can find the data blocks a session is waiting for by executing the
    following command:


    `SQL> select p1 "file#", p2 "block#", p3 "class#"`

    `     from v$session_wait`

    `     where event = ''read by other session'';`


    You can then take the `block#` and use it in the following query, to identify
    the exact segments (table or index) that are causing the `read by other session`
    waits.


    `SQL> select relative_fno, owner, segment_name, segment_type`

    `     from dba_extents`

    `     where file_id = &file`

    `     and &block between block_id`

    `     and block_id + blocks - 1;`


    Once you identify the hot blocks and the segments they belong to, you need to
    identify the queries that use these data blocks and segments and tune those queries
    if possible. You can also try deleting and re-inserting the rows inside the hot
    blocks.


    In order to reduce the amount of data in each of the hot blocks and thus reduce
    these types of waits, you can also try to create a new tablespace with a smaller
    block size and move the segment to that tablespace. It''s also a good idea to
    check if any low cardinality indexes are being used, because this type of an index
    will make the database read a large number of data blocks into the buffer cache,
    potentially leading to the `read by other session` wait event. If possible, replace
    any low cardinality indexes with an index on a column with a high cardinality.


    #### How It Works


    The `read by other session` wait event indicates that one or more sessions are
    waiting for another session to read the same data blocks from disk into the SGA.
    Obviously, a large number of these waits will slow down performance. Your first
    goal should be to identify the actual data blocks and the objects the blocks belong
    to. For example, these waits can be caused by multiple sessions trying to read
    the same index blocks. Multiple sessions can also be trying to execute a full
    table scan simultaneously on the same table.


    ### 5-10. Reducing Direct Path Read Wait Events


    #### Problem


    You notice a high amount of the `direct path read` wait events, and also of `direct
    path read temp` wait events, and you''d like to reduce the occurrence of those
    events.'
  trans: "\n#### 工作原理\n\nOracle（实际上是 LGWR 后台进程）在会话发出`COMMIT`语句时，会自动将会话的重做信息刷新到重做日志文件中。数据库在将控制权返回给客户端之前，会先将提交记录写入磁盘。因此，服务器进程会等待写入重做日志完成。这是默认行为，但您也可以通过`COMMIT_WRITE`初始化参数来控制数据库提交行为。\n\
    \n![images](img/square.jpg) `注意` `COMMIT_WRITE`参数是一个高级参数，在 Oracle Database 11.2\
    \ 中已被弃用。由于它可能对性能产生不利影响，您可能希望保持该参数不变，并依赖 Oracle 的默认提交行为。\n\n会话将通知 LGWR 进程，将会话的重做信息从重做日志缓冲区写入磁盘上的重做日志文件。LGWR\
    \ 进程在完成将缓冲区内容写入磁盘后，会向用户会话发出信号。`log file sync`等待事件包括等待 LGWR 将日志缓冲区写入磁盘的时间，以及将该信息通知会话的时间。服务器进程必须等待，直到获得\
    \ LGWR 进程已完成将日志缓冲区内容写入重做日志文件的确认。\n\n`log file sync`事件是由将日志缓冲区内容写入重做日志文件时的争用引起的。检查`V$SESSION_WAIT`视图以确定\
    \ Oracle 是否在递增`SEQ#`列。如果 Oracle 在递增此列，则意味着 LGWR 进程是罪魁祸首，因为它可能被卡住了。\n\n由于`log file\
    \ sync`等待事件是由 LGWR 进程引起的争用造成的，看看您是否可以使用`NOLOGGING`选项来消除这些等待。当然，在生产系统中，当数据库正在处理用户请求时，您不能使用`NOLOGGING`选项，因此该选项在大多数情况下用途有限。\n\
    \n`log file sync`等待事件也可能是由于`LOG_BUFFER`初始化参数设置过大引起的。`LOG_BUFFER`参数值过大会导致 LGWR\
