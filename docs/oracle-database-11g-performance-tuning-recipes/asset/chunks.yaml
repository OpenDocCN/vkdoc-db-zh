    \ set events '10053 trace name context forever,level 1';\n    ```\n    ```\n \
    \   Session altered.\n    ```\n    ```\n    SQL>\n    ```\n\n3.  执行你想要跟踪其执行路径的\
    \ SQL 语句。\n    ```sql\n    SQL> select * from users\n      2  where user_id=88\
    \ and\n      3  account_status='OPEN'\n      4  and username='SH';\n    ```\n\
    \    ```\n    ...\n    ```\n    ```\n    SQL>\n    ```\n\n4.  关闭跟踪。\n    ```sql\n\
