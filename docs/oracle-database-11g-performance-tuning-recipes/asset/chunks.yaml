    \ in the Solution section, `FOR ALL COLUMNS SIZE AUTO` option tells the database\
    \ to create histograms on any column that Oracle deems skewed. However, the `FOR\
    \ COLUMNS SIZE 1 PROD_ID` tells the database not to create a histogram for the\
    \ column `PROD_ID` in the `SH.SALES` table. The `SIZE` column accepts values 1–254,\
    \ with the integer number you specify representing the number of buckets in the\
    \ histogram. Telling the database to use just a single bucket (`N`=1) means that\
    \ all data will be in a single bucket—i.e., the database won't create a histogram\
    \ on that column.\n\n### 13-14. Improving Performance When Not Using Bind Variables\n\
    \n#### Problem\n\nFor various reasons, your developers didn't specify bind variables\
    \ in the code. You notice heavy latch contention and poor response times due to\
    \ the non-use of bind variables. You want to improve the performance of the database\
    \ in a situation like this, where you can't change existing code.\n\n#### Solution\n\
    \nIf your applications aren't using bind variables, there will be an increase\
    \ in expensive hard-parsing in the database. To avoid this, you need to set the\
    \ `cursor_sharing` initialization parameter to a non-default value. The default\
    \ value for this parameter is `EXACT`. You can set the `cursor_sharing` parameter\
    \ to either `FORCE` or `SIMILAR` to determine which SQL statements can share the\
    \ same cursors.\n\nHere's how you can set the `cursor_sharing` parameter to `force`\
    \ or `similar`.\n\n`SQL> alter system set cursor_sharing=force;`\n`SQL> alter\
    \ system set cursor_sharing=similar;`\n\nSetting the `cursor_sharing` parameter\
    \ to a non-default value has several implications, as the next section explains."
  trans: "\n### 问题\n\n你升级了数据库，但你希望确保查询计划不会因新版本中的新优化器特性而发生变化。\n\n### 解决方案\n\n默认情况下，数据库会启用当前数据库版本的所有查询优化器特性。你可以通过设置\
    \ `optimizer_features_enable` 初始化参数来控制数据库中启用的优化器特性集。例如，如果你运行的是 Oracle 数据库 11g\
    \ 第 2 版，优化器特性将设置为 11.2 版本，如下所示：\n\n```sql\nSQL> show parameter optimizer_features_enable\n\
    \nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ----------\noptimizer_features_enable            string      11.2.0.1\n\
    SQL>\n```\n\n你可以通过将 `optimizer_features_enable` 参数设置为与其默认值（与数据库版本相同）不同的值，将数据库的优化器特性设置为更早的版本。例如，在\
    \ 11.x 版本中，你可以这样做：\n\n```sql\nSQL> alter system set optimizer_features_enable='10.2.0.5';\n\
    \nSystem altered.\nSQL>\n```\n\n现在你可以检查该参数的当前值：\n\n```sql\nSQL> show  parameter\
    \ optimizer_features_enable\n\nNAME                                 TYPE     \
    \   VALUE\n------------------------------------ ----------- --------------\noptimizer_features_enable\
    \            string      10.2.0.5\nSQL>\n```\n\n你可以将 `optimizer_features_enable`\
    \ 参数设置为任何过去的主要版本或点版本，一直可以追溯到 Oracle 数据库 8.0 版本。\n\n### 工作原理\n\n将 `optimizer_features_enable`\
    \ 参数设置为前一个数据库版本的值，可以确保在升级数据库时，优化器的行为与升级前完全一致。这是数据库管理员常用的一种策略，以确保查询计划在升级后不会突然恶化。一旦你对新的优化器特性有了更深入的了解，你就可以将\
    \ `optimizer_features_enable` 参数的值设置为升级后数据库版本相同的值。\n\n当然，当你将 `optimizer_features_enable`\
    \ 参数设置为低于当前版本的值时，你将无法利用任何新的优化器特性——但你也不会因执行计划的突然变化而感到意外。优化器特性在不同版本之间不会发生剧烈变化，但这完全取决于数据库版本。例如，在\
    \ 11.1.0.6 版本中有六个主要的新优化器特性，在 10.2.0.2 版本中是没有的。这些特性包括增强的绑定变量窥探功能以及使用扩展统计信息来估算选择性的能力。不同的应用程序在引入新的优化器特性后会有不同的表现——这正是升级期间保留当前优化器特性集为你提供安全网的地方。你有机会在生产数据库中启用新特性之前，对它们进行全面测试并理解其影响。\n\
    \n“解决方案”部分中的示例展示了如何为整个数据库设置优化器特性级别。然而，你也可以仅在会话级别启用它（`alter session …`），以便在升级后测试执行计划的回退情况。你还可以通过提示（hint）指定版本号，从而使用特定版本的优化器特性来测试查询，如下所示（在一个\
    \ 11.2 版本的数据库中）：\n\n```sql\nSQL>  select /*+ optimizer_features_enable ('11.1.0.6')\
    \  */ sum(sales) from sales\n      order by product_id;\n```\n\n这个 `SELECT` 语句是在\
    \ 11.2 版本数据库中执行的，但使用了 11.1 版本的优化器特性。\n\n## 13-13. 防止数据库创建直方图\n\n### 问题\n\n你认为特定列上存在的直方图导致了次优的执行计划。你希望数据库不要在该列上使用任何直方图。\n\
    \n### 解决方案\n\n如果你想阻止 Oracle 使用它在列上自动收集的直方图，你需要做两件事：\n\n1.  通过执行 `DELETE_COLUMN_STATS`\
    \ 过程来删除直方图：\n    ```sql\n    SQL> begin\n      2  dbms_stats.delete_column_stats(ownname=>'SH',tabname=>'SALES',\n\
    \      3  colname=>'PROD_ID',col_stat_type=>'HISTOGRAM');\n      4  end;\n   \
    \   5  /\n\n    PL/SQL procedure successfully completed.\n\n    SQL>\n    ```\n\
    2.  删除直方图后，通过执行以下 `SET_TABLE_PREFS` 过程，告诉 Oracle 不要在 `PROD_ID` 列上创建直方图：\n    ```sql\n\
    \    SQL> begin\n      2  dbms_stats.set_table_prefs('SH','SALES','METHOD_OPT','FOR\
    \  ALL COLUMNS SIZE\n         AUTO,\n         FOR COLUMNS  SIZE 1 PROD_ID');\n\
    \      3  end;\n      4  /\n\n    PL/SQL procedure successfully completed.\n\n\
    \    SQL>\n    ```\n\n#### 工作原理\n\n出于各种原因，数据库管理员有时会希望阻止优化器在列上使用直方图。如果列上已经存在直方图，你必须先将其移除，然后使用\
    \ `dbms_stats.set_table_prefs` 过程来阻止数据库在该列上创建直方图。在 Oracle 数据库 10g 版本中，你需要先删除直方图，冻结统计信息（使用\
    \ `lock_table_stats` 过程），然后手动收集表的统计信息，指定数据库不得为你删除了直方图的列收集统计信息。因为你锁定了统计信息，所以在执行\
    \ `dbms_stats.gather_table_stats` 过程以手动收集表的统计信息时，还必须指定 `force=true` 选项。正如你所见，11g\
    \ 版本中的 `dbms_stats.set_table_prefs` 过程使事情变得简单多了。\n\n在“解决方案”部分所示的命令中，`FOR ALL COLUMNS\
    \ SIZE AUTO` 选项告诉数据库在 Oracle 认为存在数据倾斜的任何列上创建直方图。然而，`FOR COLUMNS SIZE 1 PROD_ID`\
    \ 则告诉数据库不要在 `SH.SALES` 表的 `PROD_ID` 列上创建直方图。`SIZE` 列接受 1-254 的值，你指定的整数表示直方图中的桶数。告诉数据库只使用一个桶（`N`=1）意味着所有数据都将位于一个桶中——即，数据库不会在该列上创建直方图。\n\
    \n## 13-14. 在未使用绑定变量时提高性能\n\n### 问题\n\n由于各种原因，你的开发人员没有在代码中指定绑定变量。你注意到由于未使用绑定变量，导致了严重的闩锁争用和糟糕的响应时间。你想在无法更改现有代码的情况下，改善数据库在这种情况下的性能。\n\
    \n### 解决方案\n\n如果你的应用程序不使用绑定变量，数据库中昂贵的硬解析将会增加。为避免这种情况，你需要将 `cursor_sharing` 初始化参数设置为非默认值。此参数的默认值为\
    \ `EXACT`。你可以将 `cursor_sharing` 参数设置为 `FORCE` 或 `SIMILAR`，以确定哪些 SQL 语句可以共享相同的游标。\n\
    \n以下是如何将 `cursor_sharing` 参数设置为 `force` 或 `similar`。\n\n```sql\nSQL> alter system\
    \ set cursor_sharing=force;\nSQL> alter system set cursor_sharing=similar;\n```\n\
    \n将 `cursor_sharing` 参数设置为非默认值会产生若干影响，下一节将对此进行解释。\n"
- fmt: '### How It Works


    The best practice in writing SQL code is to use bind variables so the SQL statements
    are shareable. During the parse stage, the optimizer will compare a SQL statement''s
    text with the texts of existing statements that are stored in the shared pool.
    The database considers the current statement `identical` to another statement
    only if it matches the other statement in all respects, including each character,
    space, and even case. When you leave the `cursor_sharing` parameter at its default
    value of `EXACT`, Oracle will reuse the shared SQL area when it reexecutes a SQL
    statement that uses bind variables. There''s no need for hard-parsing the new
    statement because a parsed version already exists in the shared pool. The new
    statement can use an existing cursor (thus it''s called a shared cursor) and not
    create its own parent cursor.


    If the code doesn''t use bind variables, but the new SQL statement the database
    is parsing is the same in all respects to a previously parsed statement in the
    shared pool, the statement is considered `similar` to the previous statement.


    By default, the database shares cursors when SQL statements are identical, but
    not when they are similar. The database will perform a heavy amount of hard-parsing
    if applications use literal values instead of bind variables, and in a busy system,
    it could put enormous pressure on the shared pool and the cursor cache. You can
    make the database share cursors when the new statement is similar (but not identical)
    to an existing parsed statement, by setting the `cursor_sharing` parameter to
    either `FORCE` or `SIMILAR`. Setting the `cursor_sharing` parameter to either
    `FORCE` or `SIMILAR` lets the database replace the literal values with system-generated
    bind variables. The goal here is to reduce the number of parent cursors in the
    shared pool. Sharing cursors even when the application doesn''t use bind variables
    relieves the pressure on the shared pool by reducing the number of parent cursors
    in the cursor cache (in the shared pool). Leaving the `cursor_sharing` parameter
    at its default value will make the database perform a hard parse if the statement
    it''s parsing isn''t identical to an existing statement in the shared pool. However,
    if you set the parameter to `FORCE` or `SIMILAR`, the database will perform the
    much cheaper soft parse when it finds a similar statement in the shared pool.


    #### When to Set CURSOR_SHARING to a Non-default Value


    Ideally, you should leave the `cursor_sharing` parameter at its default value
    of `EXACT`. However, if your response time is suffering due to a heavy amount
    of library cache misses, and the SQL statements aren''t using bind variables,
    consider setting the `cursor_sharing` parameter to `FORCE` or `SIMILAR`. If the
    application doesn''t use bind variables, your hands are tied—the fixes will be
    long in coming, and meanwhile, you have a slow-performing database on your hands.
    Go ahead and change the `cursor_sharing` parameter from its default setting under
    these circumstances. There are really no issues with setting the `cursor_sharing`
    parameter to a non-default value, except minor drawbacks such as the non-support
    for star transformation, for example.


    ![images](images/square.jpg) Tip Oracle recommends using the `FORCE` setting for
    the `CURSOR_SHARING` parameter, in an OLTP environment.


    Oracle recommends that, if possible, you should leave the `cursor_sharing` parameter
    at its default value of `EXACT`, and use shareable SQL by employing bind variables
    in your code instead of literal values. If you do decide to change the default
    setting to `SIMILAR` or `FORCE` due to pressure in the shared pool and latch contention,
    be aware that there are some performance implications in doing so. If you set
    the `cursor_sharing` parameter to `FORCE`, the database uses system-generated
    bind values, uses the same execution plan for each execution of a statement, and
    uses one parent cursor and one child cursor for each distinct SQL statement. If
    you set the parameter to `SIMILAR` and there are no histograms on the column for
    which the database generates bind values, the behavior is the same as with the
    `FORCE` setting. If there are histograms, on the other hand, the `SIMILAR` setting
    will result in a different plan based on the value of the bind variable, and thus
    there''ll be a different child cursor for each execution. When there''s no histogram,
    the database acts as if bind variables are not used, under the `SIMILAR` setting.


    Although Oracle has historically recommended the `SIMILAR` setting for the `cursor_sharing`
    parameter, in Oracle Database 11g, unless you''re in a DSS environment, Oracle
    recommends that you set the `cursor_sharing` parameter to `FORCE`, because it
    limits the growth of child cursors when compared to setting the parameter to the
    `SIMILAR` value.'
