    \nAlso, if you're using Oracle sequences, re-create them with a larger cache size\
    \ setting and try to avoid using the `ORDER` clause. The `CACHE` clause for a\
    \ sequence determines the number of sequence values the database must cache in\
    \ the SGA. If your database is processing a large number of inserts and updates,\
