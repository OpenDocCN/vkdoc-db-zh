  trans: "\n## 最小化系统竞争\n\nOracle DBA 接到用户被数据库锁定或“阻塞”的电话并不罕见。Oracle 的锁定机制极其精密，支持多用户同时使用数据库。但有时由于应用程序设计缺陷，可能会出现一个用户阻塞其他用户工作的情况。本章将解释\
    \ Oracle 如何处理锁，以及如何识别阻塞其他会话的会话。\n\nOracle 数据库可能遇到两种主要类型的资源竞争。第一种是对表行事务锁的竞争。第二种竞争是由同时请求共享内存区域（`SGA`）引起的，这会导致**门竞争**。除了向你展示如何排查典型锁定问题外，我们还将演示如何处理数据库中各种类型的门竞争。\n\
    \nOracle 等待接口是一个方便的名称，用于指代 Oracle 内部用于分类和衡量 Oracle 实例中等待不同类型资源的机制。理解 Oracle 等待事件是实例调优的关键，因为高等待会拖慢响应时间。我们将在本章解释\
    \ Oracle 等待接口，并展示如何减少那些困扰 Oracle DBA 的最常见等待事件。我们将向你展示如何使用各种 SQL 脚本来解开 Oracle 等待接口的奥秘，同时也会说明如何利用\
    \ Oracle Enterprise Manager 快速追踪导致数据库竞争的 SQL 语句和会话。\n\n### 5-1. 理解响应时间\n\n####\
    \ 问题\n\n你想了解数据库响应时间是什么，以及它与等待时间的关系。\n\n#### 解决方案\n\n数据库中最关键的性能指标是响应时间。响应时间是指客户端向数据库发送查询后，从数据库获得响应所需的时间。响应时间简单来说是两个组成部分之和：\n\
    \n`响应时间 = 处理时间 + 等待时间`\n\n上述关系也常表示为 `R = S + W`，其中 `R` 是响应时间，`S` 是服务时间，`W` 代表等待时间。处理时间部分是数据库实际处理请求所花费的时间。而等待时间则是数据库实际浪费的时间——是数据库等待资源（如表行锁、库缓存门，或查询完成处理所需的众多资源之一）所花费的时间。Oracle\
    \ 有数百个官方等待事件，其中大约十几个对排查查询运行缓慢至关重要。\n\n##### 你是否存在等待问题？\n\n很容易找出数据库在等待资源而非实际执行上花费的时间比例。执行以下查询，找出数据库中等待时间与实际\
    \ CPU 处理时间的相对百分比：\n\n```sql\nSQL> select metric_name, value\n   2 from v$sysmetric\n\
    \   3 where metric_name in ('Database CPU Time Ratio',\n   4 'Database Wait Time\
    \ Ratio') and\n   5 intsize_csec =\n   6 (select max(INTSIZE_CSEC) from V$SYSMETRIC);\n\
    \nMETRIC_NAME                                     VALUE\n————————————————————------------\
    \              ————————————\nDatabase Wait Time Ratio                        11.371689\n\
    Database CPU Time Ratio                         87.831890\nSQL>\n```\n\n如果查询显示\
    \ `Database Wait Time Ratio` 的值非常高，或者 `Database Wait Time Ratio` 远大于 `Database\
    \ CPU Time Ratio`，则表明数据库花费在等待上的时间多于处理时间，你必须更深入地研究 Oracle 等待事件，以确定导致此情况的具体等待事件。\n\
    \n##### 查找详细信息\n\n你可以使用以下 Oracle 视图来查找等待事件实际在等待什么以及每种资源等待了多长时间的详细信息。\n\n> `V$SESSION`：此视图显示每个会话当前正在等待的事件以及上一次等待的事件。\n\
    >\n> `V$SESSION_WAIT`：此视图列出每个会话当前正在等待的事件或上一次等待的事件。它还显示等待状态和等待时间。\n>\n> `V$SESSION_WAIT_HISTORY`：此视图显示每个当前会话的最后十个等待事件。\n\
    >\n> `V$SESSION_EVENT`：此视图显示每个会话累计的事件等待历史记录。此视图中的数据仅在会话处于活动状态时可用。\n>\n> `V$SYSTEM_EVENT`：此视图显示自实例启动以来，整个实例为每个等待事件所等待的时间。\n\
    >\n> `V$SYSTEM_WAIT_CLASS`：此视图按等待类别显示等待事件统计信息。\n"
- fmt: "#### How It Works\n\nYour goal in tuning performance is to minimize the total\
    \ response time. If the `Database Wait Time Ratio` (in the query shown in the\
    \ “Solution” section) is high, your response time will also be high due to waits\
    \ or bottlenecks in your system. On the other hand, high values for the `Database\
    \ CPU Time Ratio` indicate a well-running database, with few waits or bottlenecks.\
    \ The `Database CPU Time Ratio` is calculated by dividing the total CPU used by\
    \ the database by the Oracle time model statistic `DB time`.\n\nOracle uses time\
    \ model statistics to measure the time spent in the database by the type of operation.\
    \ Database time, or `DB time`, is the most important time model statistic—it represents\
    \ the total time spent in database calls, and serves as a measure of total instance\
    \ workload. `DB time` is computed by adding the CPU time and wait time of all\
    \ sessions (excluding the waits for idle events). An AWR report shows the total\
    \ `DB time` for the instance (in the section titled “Time Model System Stats”)\
    \ during the period covered by the AWR snapshots. If the time model statistic\
    \ `DB CPU` consumes most of the `DB time` for the instance, it shows the database\
    \ was actively processing most of the time. `DB time` tuning, or understanding\
    \ how the database is spending its time, is fundamental to understanding performance.\n\
    \nThe total time spent by foreground sessions making database calls consists of\
    \ I/O time, CPU time, and time spent waiting for non-idle events. Your `DB time`\
    \ will increase as the system load increases—that is, as more users log on and\
    \ larger queries are executed, the greater the system load. However, even in the\
    \ absence of an increase in system load, `DB time` can increase, due to deterioration\
    \ either in I/O or application performance. As application performance degrades,\
    \ wait time will increase and consequently `DB time` (that is, response time)\
    \ will increase.\n\n`DB time` is captured by internal instrumentation, `ASH`,\
    \ `AWR`, and `ADDM`, and you can find detailed performance information by querying\
    \ various views or through Enterprise Manager.\n\n![images](images/square.jpg)\
    \ Note If the host system is CPU-bound, you'll see an increase in `DB time`. You\
    \ must first tune CPU usage before focusing on wait events in that particular\
    \ case.\n\nThe `V$SESSION_WAIT` view shows more detailed information than the\
    \ `V$SESSION_EVENT` and the `V$SYSTEM_EVENT` views. While both the `V$SESSION_EVENT`\
    \ and the `V$SESSION_WAIT` views show that there are waits such as the event `db\
    \ file scattered read`, for example, only the `V$SESSION_WAIT` view shows the\
    \ file number (`P1`), the block number read (`P2`), and the number of blocks read\
    \ (`P3`). The columns `P1` and `P2` from this view help you identify the segments\
    \ involved in the wait event that is currently occurring.\n\n![images](images/square.jpg)\
    \ Note The Automatic Workload Repository (`AWR`) queries the `V$SYSTEM_EVENT`\
    \ view for its wait event–related analysis.\n\nYou can first query the `V$SYSTEM_EVENT`\
    \ view to rank the top wait events by total and average time waited for that event.\
    \ You can then drill down to the wait event level, by focusing on the events at\
    \ the top of the event list. Note that you can query the `V$WAITSTAT` view for\
    \ the same information as well. In addition to providing information about blocking\
    \ and blocked users and the current wait events, the `V$SESSION` view also shows\
    \ the objects that are causing the problem, by providing the file number and block\
    \ number for the object.\n\n### 5-2. Identifying SQL Statements with the Most\
    \ Waits\n\n#### Problem\n\nYou want to identify the SQL statements responsible\
    \ for the most waits in your database.\n\n#### Solution\n\nExecute the following\
    \ query to identify the SQL statements that are experiencing the most waits in\
    \ your database:\n\n```sql\nSQL> select ash.user_id,\n  2  u.username,\n  3  s.sql_text,\n\
    \  4  sum(ash.wait_time +\n  5  ash.time_waited) ttl_wait_time\n  6  from v$active_session_history\
    \ ash,\n  7  v$sqlarea s,\n  8  dba_users u\n  9  where ash.sample_time between\
    \ sysdate - 60/2880 and sysdate\n 10  and ash.sql_id = s.sql_id\n 11  and ash.user_id\
    \ = u.user_id\n 12  group by ash.user_id,s.sql_text, u.username\n 13* order by\
    \ ttl_wait_time\nSQL>\n```\n\nThe preceding query ranks queries that ran during\
    \ the past 30 minutes, according to the total time waited by each query.\n\n####\
    \ How It Works\n\nWhen you're experiencing a performance problem, it's a good\
    \ idea to see which SQL statements are waiting the most. These are the statements\
    \ that are using most of the database's resources. To find the queries that are\
    \ waiting the most, you must sum the values in the `wait_time` and the `time_waited`\
    \ columns of the `V$ACTIVE_SESSION_HISTORY` for a specific SQL statement. In order\
    \ to do this, you must join the `V$SQLAREA` view with the `V$ACTIVE_SESSION_HISTORY`\
    \ view, using `SQL_ID` as the join column.\n\nBesides the `SQL_ID` of the SQL\
    \ statements, the `V$ACTIVE_SESSION_HISTORY` view also contains information about\
    \ the execution plans used by the SQL statements. You can use this information\
    \ to identify why a SQL statement is experiencing a high amount of waits. You\
    \ can also run an Active Session History (`ASH`) report, using a SQL script or\
    \ through Oracle Enterprise Manager, to get details about the top SQL statements\
    \ in the sampled session activity. The Top SQL section of an `ASH` report helps\
    \ you identify the high-load SQL statements that are responsible for performance\
    \ problems. Examining the Top SQL report may show you, for example, that one bad\
    \ query has been responsible for most of the database activity.\n\n### 5-3. Analyzing\
    \ Wait Events\n\n#### Problem\n\nYou want to analyze Oracle wait events.\n\n####\
    \ Solution\n\nSeveral recipes in this chapter show you how to analyze the most\
    \ important Oracle wait events. An overwhelming amount of wait time in a database\
    \ is due to I/O–related waits, such as those caused by either full table scans\
    \ or indexed reads. While indexed reads may seem to be completely normal on the\
    \ face of it, too many indexed reads can also slow down performance. Therefore,\
    \ you must investigate why the database is performing a large number of indexed\
    \ reads. For example, if you see the `db file sequential read` event (indicates\
    \ indexed reads) at the top of the wait event list, you must look a bit further\
    \ to see how the database is accumulating these read events. If you find that\
    \ the database is performing hundreds of thousands of query executions, with each\
    \ query doing only a few indexed reads, that's fine. However, if you find that\
    \ just a couple of queries are contributing to a high number of logical reads,\
    \ then, most likely, those queries are reading more data than necessary. You must\
    \ tune those queries to reduce the `db file sequential read` events."
  raw: '#### How It Works


    Your goal in tuning performance is to minimize the total response time. If the
    Database Wait Time Ratio (in the query shown in the “Solution” section) is high,
    your response time will also be high due to waits or bottlenecks in your system.
    On the other hand, high values for the Database CPU Time Ratio indicate a well-running
    database, with few waits or bottlenecks. The Database CPU Time Ratio is calculated
    by dividing the total CPU used by the database by the Oracle time model statistic
    DB time.


    Oracle uses *time model statistics* to measure the time spent in the database
    by the type of operation. Database time, or DB time, is the most important time
    model statistic—it represents the total time spent in database calls, and serves
    as a measure of total instance workload. DB time is computed by adding the CPU
    time and wait time of all sessions (excluding the waits for idle events). An AWR
    report shows the total DB time for the instance (in the section titled “Time Model
    System Stats”) during the period covered by the AWR snapshots. If the time model
    statistic DB CPU consumes most of the DB time for the instance, it shows the database
    was actively processing most of the time. DB time tuning, or understanding how
    the database is spending its time, is fundamental to understanding performance.


    The total time spent by foreground sessions making database calls consists of
    I/O time, CPU time, and time spent waiting for non-idle events. Your DB time will
    increase as the system load increases—that is, as more users log on and larger
    queries are executed, the greater the system load. However, even in the absence
    of an increase in system load, DB time can increase, due to deterioration either
    in I/O or application performance. As application performance degrades, wait time
    will increase and consequently DB time (that is, response time) will increase.


    DB time is captured by internal instrumentation, ASH, AWR, and ADDM, and you can
    find detailed performance information by querying various views or through Enterprise
    Manager.


    ![images](images/square.jpg) **Note** If the host system is CPU-bound, you''ll
    see an increase in DB time. You must first tune CPU usage before focusing on wait
    events in that particular case.


    The `V$SESSION_WAIT` view shows more detailed information than the `V$SESSION_EVENT`
    and the `V$SYSTEM_EVENT` views. While both the `V$SESSION_EVENT` and the `V$SESSION_WAIT`
    views show that there are waits such as the event `db file scattered read`, for
    example, only the `V$SESSION_WAIT` view shows the file number (P1), the block
    number read (P2), and the number of blocks read (P3). The columns `P1` and `P2`
    from this view help you identify the segments involved in the wait event that
    is currently occurring.


    ![images](images/square.jpg) **Note** The Automatic Workload Repository (AWR)
    queries the `V$SYSTEM_EVENT` view for its wait event–related analysis.


    You can first query the `V$SYSTEM_EVENT` view to rank the top wait events by total
    and average time waited for that event. You can then drill down to the wait event
    level, by focusing on the events at the top of the event list. Note that you can
    query the `V$WAITSTAT` view for the same information as well. In addition to providing
    information about blocking and blocked users and the current wait events, the
    `V$SESSION` view also shows the objects that are causing the problem, by providing
    the file number and block number for the object.


    ### 5-2. Identifying SQL Statements with the Most Waits


    #### Problem


    You want to identify the SQL statements responsible for the most waits in your
    database.


    #### Solution


    Execute the following query to identify the SQL statements that are experiencing
    the most waits in your database:


    `SQL> select ash.user_id,`

    `  2  u.username,`

    `  3  s.sql_text,`

    `  4  sum(ash.wait_time +`

    `  5  ash.time_waited) ttl_wait_time`

    `  6  from v$active_session_history ash,`

    `  7  v$sqlarea s,`

    `  8  dba_users u`

    `  9  where ash.sample_time between sysdate - 60/2880 and sysdate`

    ` 10  and ash.sql_id = s.sql_id`

    ` 11  and ash.user_id = u.user_id`

    ` 12  group by ash.user_id,s.sql_text, u.username`

    ` 13* order by ttl_wait_time`

    `SQL>`


    The preceding query ranks queries that ran during the past 30 minutes, according
    to the total time waited by each query.


    #### How It Works


    When you''re experiencing a performance problem, it''s a good idea to see which
    SQL statements are waiting the most. These are the statements that are using most
    of the database''s resources. To find the queries that are waiting the most, you
    must sum the values in the `wait_time` and the `time_waited` columns of the `V$ACTIVE_SESSION_HISTORY`
    for a specific SQL statement. In order to do this, you must join the `V$SQLAREA`
    view with the `V$ACTIVE_SESSION_HISTORY` view, using `SQL_ID` as the join column.


    Besides the `SQL_ID` of the SQL statements, the `V$ACTIVE_SESSION_HISTORY` view
    also contains information about the execution plans used by the SQL statements.
    You can use this information to identify why a SQL statement is experiencing a
    high amount of waits. You can also run an Active Session History (ASH) report,
    using a SQL script or through Oracle Enterprise Manager, to get details about
    the top SQL statements in the sampled session activity. The Top SQL section of
    an ASH report helps you identify the high-load SQL statements that are responsible
    for performance problems. Examining the Top SQL report may show you, for example,
    that one bad query has been responsible for most of the database activity.


    ### 5-3\. Analyzing Wait Events


    #### Problem


    You want to analyze Oracle wait events.


    #### Solution


    Several recipes in this chapter show you how to analyze the most important Oracle
    wait events. An overwhelming amount of wait time in a database is due to I/O–related
    waits, such as those caused by either full table scans or indexed reads. While
    indexed reads may seem to be completely normal on the face of it, too many indexed
    reads can also slow down performance. Therefore, you must investigate why the
    database is performing a large number of indexed reads. For example, if you see
    the `db file sequential read` event (indicates indexed reads) at the top of the
    wait event list, you must look a bit further to see how the database is accumulating
    these read events. If you find that the database is performing hundreds of thousands
    of query executions, with each query doing only a few indexed reads, that''s fine.
    However, if you find that just a couple of queries are contributing to a high
    number of logical reads, then, most likely, those queries are reading more data
    than necessary. You must tune those queries to reduce the `db file sequential
    read` events.'
  trans: "\n#### 工作原理\n\n在性能调优时，你的目标是**最小化总响应时间**。如果“`Database Wait Time Ratio`”（见“解决方案”部分的查询）较高，由于系统中的等待或瓶颈，你的响应时间也会相应较高。另一方面，“`Database\
    \ CPU Time Ratio`”值较高则表明数据库运行良好，几乎没有等待或瓶颈。“`Database CPU Time Ratio`”是通过将数据库使用的总\
    \ CPU 时间除以 Oracle 时间模型统计信息“`DB time`”来计算的。\n\nOracle 使用时间模型统计信息来按操作类型衡量在数据库中花费的时间。数据库时间，即“`DB\
    \ time`”，是最重要的时间模型统计信息——它代表了在数据库调用中花费的总时间，是衡量实例总工作负载的指标。“`DB time`”是通过将所有会话（不包括空闲事件的等待）的\
    \ CPU 时间和等待时间相加来计算的。AWR 报告会显示实例在 AWR 快照覆盖期间的总“`DB time`”（在标题为“Time Model System\
    \ Stats”的部分）。如果时间模型统计信息“`DB CPU`”占据了实例大部分的“`DB time`”，则表明数据库在大部分时间都在积极地进行处理。理解“`DB\
    \ time`”，或者说理解数据库是如何花费其时间的，是理解性能的基础。\n\n前台会话进行数据库调用所花费的总时间由 I/O 时间、CPU 时间和等待非空闲事件的时间组成。你的“`DB\
    \ time`”会随着系统负载的增加而增加——也就是说，随着更多用户登录和执行更大的查询，系统负载会更大。然而，即使系统负载没有增加，“`DB time`”也可能由于\
    \ I/O 或应用程序性能的下降而增加。随着应用程序性能下降，等待时间会增加，因此“`DB time`”（即响应时间）也会增加。\n\n“`DB time`”由内部检测工具、`ASH`、`AWR`\
    \ 和 `ADDM` 捕获，你可以通过查询各种视图或通过 Enterprise Manager 找到详细的性能信息。\n\n![images](img/square.jpg)\
    \ 注意：如果主机系统 CPU 资源紧张，你将会看到“`DB time`”增加。在那种特定情况下，你必须首先调优 CPU 使用率，然后再关注等待事件。\n\n\
    `V$SESSION_WAIT` 视图比 `V$SESSION_EVENT` 和 `V$SYSTEM_EVENT` 视图显示了更详细的信息。虽然 `V$SESSION_EVENT`\
    \ 和 `V$SESSION_WAIT` 视图都显示了诸如“`db file scattered read`”事件之类的等待，但只有 `V$SESSION_WAIT`\
    \ 视图显示了文件号 (`P1`)、读取的块号 (`P2`) 和读取的块数 (`P3`)。此视图中的 `P1` 和 `P2` 列可帮助你识别当前发生的等待事件所涉及的段。\n\
    \n![images](img/square.jpg) 注意：自动工作负载仓库 (`AWR`) 会查询 `V$SYSTEM_EVENT` 视图进行其与等待事件相关的分析。\n\
    \n你可以先查询 `V$SYSTEM_EVENT` 视图，按每个事件的总等待时间和平均等待时间对顶级等待事件进行排序。然后，你可以通过关注事件列表顶部的事件，下钻到等待事件级别。请注意，你也可以查询\
    \ `V$WAITSTAT` 视图以获得相同的信息。除了提供有关阻塞和被阻塞用户以及当前等待事件的信息外，`V$SESSION` 视图还通过提供对象的文件号和块号来显示导致问题的对象。\n\
    \n### 5-2. 识别等待最多的 SQL 语句\n\n#### 问题\n\n你希望识别出数据库中导致最多等待的 SQL 语句。\n\n#### 解决方案\n\
    \n执行以下查询，以识别数据库中经历最多等待的 SQL 语句：\n\n```sql\nSQL> select ash.user_id,\n  2  u.username,\n\
    \  3  s.sql_text,\n  4  sum(ash.wait_time +\n  5  ash.time_waited) ttl_wait_time\n\
    \  6  from v$active_session_history ash,\n  7  v$sqlarea s,\n  8  dba_users u\n\
    \  9  where ash.sample_time between sysdate - 60/2880 and sysdate\n 10  and ash.sql_id\
    \ = s.sql_id\n 11  and ash.user_id = u.user_id\n 12  group by ash.user_id,s.sql_text,\
    \ u.username\n 13* order by ttl_wait_time\nSQL>\n```\n\n前面的查询根据每个查询的总等待时间，对过去\
    \ 30 分钟内运行的查询进行排序。\n\n#### 工作原理\n\n当你遇到性能问题时，查看哪些 SQL 语句等待最多是个好主意。这些就是使用了大部分数据库资源的语句。要找出等待最多的查询，你必须为特定的\
    \ SQL 语句，对 `V$ACTIVE_SESSION_HISTORY` 中“`wait_time`”和“`time_waited`”列的值求和。为此，你必须使用\
    \ `SQL_ID` 作为连接列，将 `V$SQLAREA` 视图与 `V$ACTIVE_SESSION_HISTORY` 视图连接起来。\n\n除了 SQL\
    \ 语句的 `SQL_ID`，`V$ACTIVE_SESSION_HISTORY` 视图还包含有关 SQL 语句使用的执行计划的信息。你可以使用此信息来识别为什么某个\
    \ SQL 语句会经历大量等待。你还可以运行活动会话历史 (`ASH`) 报告（使用 SQL 脚本或通过 Oracle Enterprise Manager）以获取有关采样会话活动中顶级\
    \ SQL 语句的详细信息。`ASH` 报告的“Top SQL”部分可帮助你识别导致性能问题的高负载 SQL 语句。检查“Top SQL”报告可能会显示，例如，一个糟糕的查询导致了大部分的数据库活动。\n\
    \n### 5-3. 分析等待事件\n\n#### 问题\n\n你想要分析 Oracle 等待事件。\n\n#### 解决方案\n\n本章中的几个方法将向你展示如何分析最重要的\
    \ Oracle 等待事件。数据库中绝大多数等待时间是由于与 I/O 相关的等待引起的，例如由全表扫描或索引读取引起的等待。虽然索引读取表面上看起来可能完全正常，但过多的索引读取也会降低性能。因此，你必须调查为什么数据库会执行大量的索引读取。例如，如果你在等待事件列表顶部看到“`db\
    \ file sequential read`”事件（表示索引读取），你必须进一步查看数据库是如何累积这些读取事件的。如果你发现数据库正在执行数十万次查询执行，而每次查询只进行少量索引读取，那是没问题的。但是，如果你发现仅仅几个查询就导致了大量的逻辑读，那么很可能，这些查询读取了比必要更多的数据。你必须调优这些查询以减少“`db\
    \ file sequential read`”事件。\n"
- fmt: "#### How It Works\n\nWait events are statistics that a server process or thread\
    \ increments when it waits for an event to complete, in order to continue its\
    \ processing. For example, a SQL statement may be modifying data, but the server\
    \ process may have to wait for a data block to be read from disk, because it's\
    \ not available in the SGA. Although there's a large number of wait events, the\
    \ most common events are the following:\n*   `buffer busy waits`\n*   `free buffer\
    \ waits`\n*   `db file scattered read`\n*   `db file sequential read`\n*   `enqueue\
    \ waits`\n*   `log buffer space`\n*   `log file sync`\n\nAnalyzing Oracle wait\
    \ events is the most important performance tuning task you'll perform when troubleshooting\
    \ a slow-running query. When a query is running slow, it usually means that there\
    \ are excessive waits of one type or another. Some of the waits may be due to\
    \ excessive I/O due to missing indexes. Other waits may be caused by a latch or\
    \ a locking event. Several recipes in this chapter show you how to identify and\
    \ fix various types of Oracle wait-related performance problems.\n\nIn general,\
    \ wait events that account for the most wait time warrant further investigation.\
    \ However, it's important to understand that wait events show only the symptoms\
    \ of underlying problems—thus, you should view a wait event as a window into a\
    \ particular problem, and not the problem itself. When Oracle encounters a problem\
    \ such as buffer contention or latch contention, it simply increments a specific\
    \ type of wait event relating to that latch or buffer. By doing this, the database\
    \ is showing where it had to wait for a specific resource, and was thus unable\
    \ to continue processing.\n\nThe buffer or latch contention can often be traced\
    \ to faulty application logic, but some wait events could also emanate from system\
    \ issues such as a misconfigured RAID system. Missing indexes, inappropriate initialization\
    \ parameters, inadequate values for initialization parameters that relate to memory,\
    \ and inadequate sizing of redo log files are just some of the things that can\
    \ lead to excessive waits in a database. The great benefit of analyzing Oracle\
    \ wait events is that it takes the guesswork out of performance tuning—you can\
    \ see exactly what is causing a performance slowdown, so you can immediately focus\
    \ on fixing the problem.\n\n### 5-4. Understanding Wait Class Events\n\n#### Problem\n\
    \nYou want to understand how Oracle classifies wait events into various classes.\n\
    \n#### Solution\n\nEvery Oracle wait event belongs to a specific wait event class.\
    \ Oracle groups wait events into classes such as `Administrative`, `Application`,\
    \ `Cluster`, `Commit`, `Concurrency`, `Configuration`, `Scheduler`, `System I/O`,\
    \ and `User I/O`, to facilitate the analysis of wait events. Here are some examples\
    \ of typical waits in some of these classes:\n\n> `Application`: Lock-related\
    \ wait information\n> \n> `Commit`: Waits for confirmation of a redo log write\
    \ after committing a transaction\n> \n> `Network`: Waits caused by delays in sending\
    \ data over the network\n> \n> `User I/O`: Waiting to read blocks from disk\n\n\
    Two key wait classes are the `Application` and the `User I/O` wait classes. The\
    \ `Application` wait class contains waits due to row and table locks caused by\
    \ an application. The `User I/O` class includes the `db file scattered read`,\
    \ `db file sequential read`, `direct path read`, and `direct path write` events.\
    \ The `System I/O` class includes redo log–related wait events among other waits.\
    \ The `Commit` class contains just the `log file sync` wait information. There's\
    \ also an “idle” class of wait events such as `SQL*Net message from client` for\
    \ example, that merely indicate an inactive session. You can ignore the idle waits.\n\
    \n#### How It Works\n\nClasses of wait events help you quickly find out what type\
    \ of activity is affecting database performance. For example, the `Administrative`\
    \ wait class may show a high number of waits because you're rebuilding an index.\
    \ `Concurrency` waits point to waits for internal database resources such as latches.\
    \ If the `Cluster` wait class shows the most wait events, then your RAC instances\
    \ may be experiencing contention for global cache resources (`gc cr block busy`\
    \ event). Note that the `System I/O` wait class includes waits for background\
    \ process I/O such as the DBWR (database writer) wait event `db file parallel\
    \ write`.\n\nThe `Application` wait class contains waits that result from user\
    \ application code—most of your enqueue waits fall in this wait class. The only\
    \ wait event in the `Commit` class is the `log file sync` event, which we examine\
    \ in detail later in this chapter. The `Configuration` class waits include waits\
    \ such as those caused by log files that are sized too small.\n\n### 5-5. Examining\
    \ Session Waits\n\n#### Problem\n\nYou want to find out the wait events in a session.\n\
    \n#### Solution\n\nYou can use the `V$SESSION_WAIT` view to get a quick idea about\
    \ what a particular session is waiting for, as shown here:\n\n```\nSQL> select\
    \ event, count(*) from v$session_wait\n     group by event;\n\nEVENT         \
    \                                                          COUNT(*)\n----------------------------------------------------------------\
    \ ----------\nSQL*Net message from client                                    \
    \                11\nStreams AQ: waiting for messages in the queue           \
    \                        1\nenq: TX - row lock contention                    \
    \                               1\n…\n15 rows selected.\n\nSQL>\n```\n\nThe output\
    \ of the query indicates that one session is waiting for an enqueue lock, possibly\
    \ because of a blocking lock held by another session. If you see a large number\
    \ of sessions experiencing row lock contention, you must investigate further and\
    \ identify the blocking session.\n\nHere's one more way you can query the `V$SESSION_WAIT`\
    \ view, to find out what's slowing down a particular session:\n\n```\nSQL> select\
    \ event, state, seconds_in_wait siw\n     from   v$session_wait\n     where  sid\
    \ = 81;\n\nEVENT                                         STATE             SIW\n\
    ----------------------------------------     -----------        ------\nenq: TX\
    \ - row lock contention                 WAITING             976\n```\n\nThe preceding\
    \ query shows that the session with the SID 81 has been waiting for an enqueue\
    \ event, because the row (or rows) it wants to update is locked by another transaction.\n\
    \n![images](images/square.jpg) **Note** In Oracle Database 11g, the database counts\
    \ each resource wait as just one wait, even if the session experiences many internal\
    \ time-outs caused by the wait. For example, a wait for an enqueue for 15 seconds\
    \ may include 5 different 3-second-long wait calls—the database considers these\
    \ as just a single enqueue wait."
