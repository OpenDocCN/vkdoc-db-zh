    \ 实用程序来显示消耗 SQL 语句最多的语句。例如，假设你已经使用 `top` 或 `ps` 等实用程序识别出一个高 CPU 消耗的操作系统进程，并且从进程名称你确定它是一个数据库进程。现在登录到\
    \ SQL*Plus 并使用 `oradebug` 来显示与该进程相关的任何 SQL。在此示例中，OS 进程 ID 是 7853：\n\n```sql\n\
