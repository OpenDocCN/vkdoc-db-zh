- fmt: "#### How It Works\n\nAdding parallelism can speed up the process of splitting\
    \ a partition with a large amount of data. Here is an example of a partition with\
    \ over 16 million rows, and enabling parallelism for the split operation reduced\
    \ the time of the split operation. First, the split was performed in parallel:\n\
    \n```sql\nALTER TABLE EMPPART SPLIT PARTITION emppart2000_p AT ('2000-01-01')\n\
    INTO (PARTITION emppart1990_p, PARTITION emppart2000_p)\nPARALLEL(DEGREE 4);\n\
    ```\n\n`Table altered.`\n\n`Elapsed: 00:00:53.61`\n\nThe same split was then performed\
    \ on a similar table, to see the performance impact of doing the split serially:\n\
    \n```sql\nALTER TABLE EMPPART2 SPLIT PARTITION emppart2000_p AT ('2000-01-01')\n\
    INTO (PARTITION emppart1990_p, PARTITION emppart2000_p);\n```\n\n`Table altered.`\n\
    \n`Elapsed: 00:01:05.36`\n\nAgain, keep in mind that for parallel operations,\
    \ an extent needs to be allocated for each parallel operation. For the foregoing\
    \ partition split operation, the table that used parallelism has a significantly\
    \ higher number of extents allocated:\n\n```sql\nSELECT segment_name, partition_name,\
    \ extents\nFROM dba_segments\nWHERE segment_name LIKE '%EMP%'\nAND owner = 'SCOTT'\n\
    ORDER BY 2,1;\n```\n\n```text\nSEGMENT_NAME          PARTITION_NAME       EXTENTS\n\
    -------------------- -------------------- ----------\nEMPPART               EMPPART1990_P\
    \               335\nEMPPART2              EMPPART1990_P               121\nEMPPART\
    \               EMPPART2000_P               338\nEMPPART2              EMPPART2000_P\
    \               125\n```\n\n### 15-10. Enabling Automatic Degree of Parallelism\n\
    \n#### Problem\n\nYou want to allow Oracle to automatically determine if a SQL\
    \ statement should execute in parallel and what DOP it should use.\n\n#### Solution\n\
    \nSet the `PARALLEL_DEGREE_POLICY` to `AUTO` to allow Oracle to determine whether\
    \ a statement runs in parallel. You can set this either at the system level or\
    \ session level. To set it for all SQL statements, run the following command:\n\
    \n```sql\nalter system set parallel_degree_policy=auto scope=both;\n```\n\nTo\
    \ set it for a single SQL statement, you can alter your session to enable automatic\
    \ DOP:\n\n```sql\nalter session set parallel_degree_policy=auto;\n```\n\n####\
    \ How It Works\n\nBy default, Oracle executes a statement in parallel only when\
    \ the DOP is set for the table or the parallel hint is used. You can instruct\
    \ Oracle to automatically consider using parallelism for a statement via the `PARALLEL_DEGREE_POLICY`\
    \ initialization parameter. Oracle takes the following steps when a SQL statement\
    \ is issued when `PARALLEL_DEGREE_POLICY` is set to `AUTO`:\n\n1.  Statement is\
    \ parsed.\n2.  The `PARALLEL_MIN_TIME_THRESHOLD` parameter is checked:\n    *\
    \   If execution time is less than the threshold set, then the statement runs\
    \ without parallelism.\n    *   If execution time is greater than the threshold\
    \ set, then the statement runs in parallel depending on the automatic DOP that\
    \ is calculated by the optimizer.\n\nThe `PARALLEL_DEGREE_POLICY` can be set to\
    \ three different values: `AUTO`, `LIMITED`, and `MANUAL`. `MANUAL` is the default\
    \ and turns off the automatic degree of parallelism. `LIMITED` instructs Oracle\
    \ to use automatic DOP only on those objects with parallelism explicitly set.\
    \ The `AUTO` setting gives Oracle full control over setting automatic DOP. One\
    \ prerequisite of using automatic DOP is to run the `DBMS_RESOURCE_MANAGER.CALIBRATE_IO`\
    \ procedure. This procedure needs to be run only once, and gathers information\
    \ on the hardware characteristics of your system.\n\nWith automatic DOP, there\
    \ is a shift away from downgrading parallel operations based on available parallel\
    \ slaves, to use a new feature in Oracle 11g R2 called statement queuing. With\
    \ statement queuing, statements will not be downgraded, and will always be run\
    \ with the query's specified DOP. If there are not enough slaves to meet that\
    \ DOP, the statement will be queued until that DOP is available. While it may\
    \ appear that queuing could actually degrade the performance of queries in your\
    \ database because some statements may have to wait for the specified DOP to be\
    \ available, it is designed to improve the overall parallelism performance on\
    \ the database, as running fewer statements with the specified DOP will outperform\
    \ running more statements, some with a downgraded DOP. There are many other parameters\
    \ that can be set related to parallelism. [Table 15-3](#Chapter15.html#tab_15_3)\
    \ lists other parallel parameters you may want to consider for your application.\n\
    \n![images](images/t1503.jpg)\n\n![images](images/t1503a.jpg)\n\n### 15-11. Examining\
    \ Parallel Explain Plans\n\n#### Problem\n\nYou want to understand how to read\
    \ parallel explain plans."
  raw: "#### How It Works\n\nAdding parallelism can speed up the process of splitting\
    \ a partition with a large amount of data. Here is an example of a partition with\
    \ over 16 million rows, and enabling parallelism for the split operation reduced\
    \ the time of the split operation. First, the split was performed in parallel:\n\
    \n`ALTER TABLE EMPPART SPLIT PARTITION emppart2000_p AT ('2000-01-01')`\n`INTO\
    \ (PARTITION emppart1990_p, PARTITION emppart2000_p)`\n`PARALLEL(DEGREE 4);`\n\
    \n`Table altered.`\n\n`Elapsed: 00:00:53.61`\n\nThe same split was then performed\
    \ on a similar table, to see the performance impact of doing the split serially:\n\
    \n`ALTER TABLE EMPPART2 SPLIT PARTITION emppart2000_p AT ('2000-01-01')`\n`INTO\
    \ (PARTITION emppart1990_p, PARTITION emppart2000_p);`\n\n`Table altered.`\n\n\
    `Elapsed: 00:01:05.36`\n\nAgain, keep in mind that for parallel operations, an\
    \ extent needs to be allocated for each parallel operation. For the foregoing\
    \ partition split operation, the table that used parallelism has a significantly\
    \ higher number of extents allocated:\n\n`SELECT segment_name, partition_name,\
    \ extents`\n`FROM dba_segments`\n`WHERE segment_name LIKE '%EMP%'`\n`AND owner\
    \ = 'SCOTT'`\n`ORDER BY 2,1;`\n\n`SEGMENT_NAME         PARTITION_NAME       EXTENTS`\n\
    `-------------------- -------------------- ----------`\n`EMPPART              EMPPART1990_P               335`\n\
    `EMPPART2             EMPPART1990_P               121`\n`EMPPART              EMPPART2000_P               338`\n\
    `EMPPART2             EMPPART2000_P               125`\n\n### 15-10. Enabling\
    \ Automatic Degree of Parallelism\n\n#### Problem\n\nYou want to allow Oracle\
    \ to automatically determine if a SQL statement should execute in parallel and\
    \ what DOP it should use.\n\n#### Solution\n\nSet the `PARALLEL_DEGREE_POLICY`\
    \ to `AUTO` to allow Oracle to determine whether a statement runs in parallel.\
    \ You can set this either at the system level or session level. To set it for\
    \ all SQL statements, run the following command:\n\n`alter system set parallel_degree_policy=auto\
    \ scope=both;`\n\nTo set it for a single SQL statement, you can alter your session\
    \ to enable automatic DOP:\n\n`alter session set parallel_degree_policy=auto;`\n\
    \n#### How It Works\n\nBy default, Oracle executes a statement in parallel only\
    \ when the DOP is set for the table or the parallel hint is used. You can instruct\
    \ Oracle to automatically consider using parallelism for a statement via the `PARALLEL_DEGREE_POLICY`\
    \ initialization parameter. Oracle takes the following steps when a SQL statement\
    \ is issued when `PARALLEL_DEGREE_POLICY` is set to `AUTO`:\n\n1.  Statement is\
    \ parsed.\n2.  The `PARALLEL_MIN_TIME_THRESHOLD` parameter is checked:\n    *\
    \   If execution time is less than the threshold set, then the statement runs\
    \ without parallelism.\n    *   If execution time is greater than the threshold\
    \ set, then the statement runs in parallel depending on the automatic DOP that\
    \ is calculated by the optimizer.\n\nThe `PARALLEL_DEGREE_POLICY` can be set to\
    \ three different values: `AUTO`, `LIMITED`, and `MANUAL`. `MANUAL` is the default\
    \ and turns off the automatic degree of parallelism. `LIMITED` instructs Oracle\
    \ to use automatic DOP only on those objects with parallelism explicitly set.\
    \ The `AUTO` setting gives Oracle full control over setting automatic DOP. One\
    \ prerequisite of using automatic DOP is to run the `DBMS_RESOURCE_MANAGER.CALIBRATE_IO`\
    \ procedure. This procedure needs to be run only once, and gathers information\
    \ on the hardware characteristics of your system.\n\nWith automatic DOP, there\
    \ is a shift away from downgrading parallel operations based on available parallel\
    \ slaves, to use a new feature in Oracle 11g R2 called statement queuing. With\
    \ statement queuing, statements will not be downgraded, and will always be run\
    \ with the query's specified DOP. If there are not enough slaves to meet that\
    \ DOP, the statement will be queued until that DOP is available. While it may\
    \ appear that queuing could actually degrade the performance of queries in your\
    \ database because some statements may have to wait for the specified DOP to be\
    \ available, it is designed to improve the overall parallelism performance on\
    \ the database, as running fewer statements with the specified DOP will outperform\
    \ running more statements, some with a downgraded DOP. There are many other parameters\
    \ that can be set related to parallelism. [Table 15-3](#Chapter15.html#tab_15_3)\
    \ lists other parallel parameters you may want to consider for your application.\n\
    \n![images](images/t1503.jpg)\n\n![images](images/t1503a.jpg)\n\n### 15-11. Examining\
    \ Parallel Explain Plans\n\n#### Problem\n\nYou want to understand how to read\
    \ parallel explain plans."
  trans: "#### 工作原理\n\n添加并行性可以加速拆分包含大量数据的分区的过程。以下是一个包含超过 1600 万行数据的分区示例，为拆分操作启用并行性减少了该操作所需的时间。首先，以并行方式执行拆分：\n\
    \n```sql\nALTER TABLE EMPPART SPLIT PARTITION emppart2000_p AT ('2000-01-01')\n\
    INTO (PARTITION emppart1990_p, PARTITION emppart2000_p)\nPARALLEL(DEGREE 4);\n\
    ```\n\n`表已更改。`\n\n`已用时间: 00:00:53.61`\n\n然后，在一个类似的表上执行了相同的拆分操作，以查看串行执行拆分操作对性能的影响：\n\
    \n```sql\nALTER TABLE EMPPART2 SPLIT PARTITION emppart2000_p AT ('2000-01-01')\n\
    INTO (PARTITION emppart1990_p, PARTITION emppart2000_p);\n```\n\n`表已更改。`\n\n`已用时间:\
    \ 00:01:05.36`\n\n再次提醒，对于并行操作，需要为每个并行操作分配一个区间。对于前面的分区拆分操作，使用了并行性的表分配了明显更多的区间：\n\
    \n```sql\nSELECT segment_name, partition_name, extents\nFROM dba_segments\nWHERE\
    \ segment_name LIKE '%EMP%'\nAND owner = 'SCOTT'\nORDER BY 2,1;\n```\n\n```text\n\
    SEGMENT_NAME          PARTITION_NAME       EXTENTS\n-------------------- --------------------\
    \ ----------\nEMPPART               EMPPART1990_P               335\nEMPPART2\
    \              EMPPART1990_P               121\nEMPPART               EMPPART2000_P\
    \               338\nEMPPART2              EMPPART2000_P               125\n```\n\
    \n### 15-10. 启用自动并行度\n\n#### 问题\n\n你希望允许 Oracle 自动确定 SQL 语句是否应并行执行以及应使用何种并行度。\n\
    \n#### 解决方案\n\n将 `PARALLEL_DEGREE_POLICY` 设置为 `AUTO`，以允许 Oracle 决定语句是否并行运行。你可以在系统级别或会话级别进行设置。要为所有\
    \ SQL 语句设置，请运行以下命令：\n\n```sql\nalter system set parallel_degree_policy=auto scope=both;\n\
    ```\n\n要为单个 SQL 语句设置，你可以修改会话以启用自动并行度：\n\n```sql\nalter session set parallel_degree_policy=auto;\n\
    ```\n\n#### 工作原理\n\n默认情况下，Oracle 仅在表设置了并行度或使用了并行提示时才会并行执行语句。你可以通过 `PARALLEL_DEGREE_POLICY`\
    \ 初始化参数，指示 Oracle 自动考虑对语句使用并行性。当 `PARALLEL_DEGREE_POLICY` 设置为 `AUTO` 时，Oracle\
    \ 在发出 SQL 语句后执行以下步骤：\n\n1.  解析语句。\n2.  检查 `PARALLEL_MIN_TIME_THRESHOLD` 参数：\n\
    \    *   如果执行时间小于设定的阈值，则该语句不使用并行性运行。\n    *   如果执行时间大于设定的阈值，则该语句将根据优化器计算出的自动并行度并行运行。\n\
    \n`PARALLEL_DEGREE_POLICY` 可设置为三个不同的值：`AUTO`、`LIMITED` 和 `MANUAL`。`MANUAL` 是默认值，会关闭自动并行度。`LIMITED`\
    \ 指示 Oracle 仅在那些显式设置了并行性的对象上使用自动并行度。`AUTO` 设置则让 Oracle 完全控制自动并行度的设置。使用自动并行度的一个先决条件是运行\
    \ `DBMS_RESOURCE_MANAGER.CALIBRATE_IO` 过程。该过程只需运行一次，它会收集系统硬件特性的信息。\n\n采用自动并行度后，Oracle\
    \ 不再基于可用的并行从属进程数量来降低并行操作的等级，而是使用 Oracle 11g R2 中的一项新特性，称为语句排队。通过语句排队，语句不会被降级，并将始终以其指定的并行度运行。如果没有足够的从属进程来满足该并行度，语句将被排队，直到有足够的资源可用。虽然看起来排队实际上可能会降低数据库中查询的性能，因为某些语句可能必须等待指定的并行度变为可用，但此设计旨在提高数据库的整体并行性能，因为以指定并行度运行较少语句的表现，通常优于运行更多但其中一些被降低了并行度的语句。还有许多其他与并行性相关的参数可以设置。表\
    \ 15-3 列出了其他一些你可能需要为应用程序考虑的并行参数。\n\n![images](img/t1503.jpg)\n\n![images](img/t1503a.jpg)\n\
    \n### 15-11. 检查并行执行计划\n\n#### 问题\n\n你想了解如何读取并行执行计划。"
- fmt: '### Solution


    When reading your explain plan, interpret it from the innermost to outermost levels,
    and from the bottom going up. For instance, here again is our parallel execution
    plan from using a parallel hint against the `EMP` table:


    ```

    select /*+ parallel(emp,4) */ * from emp;

    ```


    ```

    ----------------------------------------------------------------------

    | Id  | Operation            | Name     |    TQ  |IN-OUT| PQ Distrib |

    ----------------------------------------------------------------------

    |   0 | SELECT STATEMENT     |          |        |      |            |

    |   1 |  PX COORDINATOR      |          |        |      |            |

    |   2 |   PX SEND QC (RANDOM)| :TQ10000 |  Q1,00 | P->S | QC (RAND)  |

    |   3 |    PX BLOCK ITERATOR |          |  Q1,00 | PCWC |            |

    |   4 |     TABLE ACCESS FULL| EMP      |  Q1,00 | PCWP |            |

    ----------------------------------------------------------------------

    ```


    Looking at the foregoing plan starting at the bottom, we are doing a full table
    scan of the `EMP` table. The `PX BLOCK INTERATOR` just above the table scan is
    responsible for taking that request for a full table scan, and breaking it up
    into chunks based on the DOP specified. The `PX SEND` processes pass the data
    to the consuming processes. Finally, the `PX COORDINATOR` is the process used
    by the query coordinator to receive the data from a given parallel process and
    return to the `SELECT` statement.


    If you look at the `IN-OUT` column of your explain plan, you can see the execution
    flow of the operation, and determine if there are any bottlenecks, or any parts
    of the plan that are not parallelized, which may cause a decrease in the expected
    performance. As can be seen in [Table 15-5](#Chapter15.html#tab_15_5), the operation
    that normally shows that there may be a bottleneck is the `PARALLEL_FROM_SERIAL`
    operation, because it means parallel processes are being spawned from a serial
    operation, which denotes an inefficiency in the process.


    For instance, you have a series of employee tables by region of the country, and
    a user is performing a query to get information from several of these tables.
    However, the makeup of the query is such that a bottleneck occurs.


    ```

    select /*+ parallel(emp_north,4) */ * from emp_north

    union

    select * from emp_south;

    ```


    ```

    ------------------------------------------------------------------------------------

    | Id  | Operation                      | Name          |    TQ  |IN-OUT| PQ Distrib
    |

    ------------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT               |               |        |      |            |

    |   1 |  PX COORDINATOR                |               |        |      |            |

    |   2 |   PX SEND QC (RANDOM)          | :TQ10002      |  Q1,02 | P->S | QC (RAND)  |

    |   3 |    SORT UNIQUE                 |               |  Q1,02 | PCWP |            |

    |   4 |     PX RECEIVE                 |               |  Q1,02 | PCWP |            |

    |   5 |      PX SEND HASH              | :TQ10001      |  Q1,01 | P->P | HASH       |

    |   6 |       BUFFER SORT              |               |  Q1,01 | PCWP |            |

    |   7 |        UNION-ALL               |               |  Q1,01 | PCWP |            |

    |   8 |         PX BLOCK ITERATOR      |               |  Q1,01 | PCWC |            |

    |   9 |          TABLE ACCESS FULL     | EMP_NORTH     |  Q1,01 | PCWP |            |

    |  10 |         BUFFER SORT            |               |  Q1,01 | PCWC |            |

    |  11 |          PX RECEIVE            |               |  Q1,01 | PCWP |            |

    |  12 |           PX SEND ROUND-ROBIN  | :TQ10000      |        | S->P |RND-ROBIN   |

    |  13 |            TABLE ACCESS FULL   | EMP_SOUTH     |        |      |            |

    ------------------------------------------------------------------------------------

    ```


    You can tell from the foregoing explain plan output that the `PX SEND` process
    is serial, and is sending data back to be fed into a parallel process. This represents
    a bottleneck in this query. If we change all aspects of the query to run in parallel,
    we see an improvement in the execution plan:


    ```

    select /*+ parallel(emp_north,4) */ * from emp_north

    union

    select /*+ parallel(emp_south,4) */ * from emp_south;

    ```


    ```

    -------------------------------------------------------------------------------

    | Id  | Operation                | Name          |    TQ  |IN-OUT| PQ Distrib
    |

    -------------------------------------------------------------------------------

    |   0 | SELECT STATEMENT         |               |        |      |            |

    |   1 |  PX COORDINATOR          |               |        |      |            |

    |   2 |   PX SEND QC (RANDOM)    | :TQ10001      |  Q1,01 | P->S | QC (RAND)  |

    |   3 |    SORT UNIQUE           |               |  Q1,01 | PCWP |            |

    |   4 |     PX RECEIVE           |               |  Q1,01 | PCWP |            |

    |   5 |      PX SEND HASH        | :TQ10000      |  Q1,00 | P->P | HASH       |

    |   6 |       UNION-ALL          |               |  Q1,00 | PCWP |            |

    |   7 |        PX BLOCK ITERATOR |               |  Q1,00 | PCWC |            |

    |   8 |         TABLE ACCESS FULL| EMP_NORTH     |  Q1,00 | PCWP |            |

    |   9 |        PX BLOCK ITERATOR |               |  Q1,00 | PCWC |            |

    |  10 |         TABLE ACCESS FULL| EMP_SOUTH     |  Q1,00 | PCWP |            |

    -------------------------------------------------------------------------------

    ```


    ### How It Works


    [Tables 15-4](#Chapter15.html#tab_15_4) and [15-5](#Chapter15.html#tab_15_5) delineate
    the fundamental information that can be used to determine the execution plan for
    a parallel operation. In order to understand the basics of interpreting your explain
    plan output, you should be aware of two aspects:


    *   The possible parallel execution steps ([Table 15-4](#Chapter15.html#tab_15_4))

    *   The parallel operations that occur within each step ([Table 15-5](#Chapter15.html#tab_15_5))


    The execution steps are the aspects of a parallelized plan, while the operations
    that occur within your parallel execution plan can help you determine if you have
    an optimized plan, or one that needs tuning and improvement.


    As with non-parallel operations, the explain plan utility is a very useful tool
    in determining what the optimizer is planning to do to complete the task at hand.
    When executing operations in parallel, there are specific aspects of the explain
    plan related to parallelism. These are important to understand, so you can determine
    if the operation is running as optimized as possible. One of the key aspects of
    analyzing a parallel explain plan is to determine if there are any aspects of
    the plan that are being run serially, as this bottleneck can reduce the overall
    performance of a given operation. That it is why it is critical to understand
    aspects of the explain plan that relate to parallel operations, with the end goal
    being that all aspects of the operation are parallelized.


    ![images](images/t1504.jpg)


    ![images](images/t1505.jpg)


    ## 15-12. Monitoring Parallel Operations


    ### Problem


    You want to quickly get information regarding the performance of your parallel
    operations from the database.'
