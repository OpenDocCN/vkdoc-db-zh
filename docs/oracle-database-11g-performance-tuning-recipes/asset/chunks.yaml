- fmt: "#### How It Works\n\nSQL Performance Analyzer和`DBMS_SQLPA`包可用于分析SQL工作负载，该工作负载可定义为以下任何一种：\n\
    \n*   一条SQL语句\n*   缓存中存储的SQL ID\n*   SQL调优集（有关SQL调优集的信息，请参见[第11章](#Chapter11.html#ch11)）\n\
    *   基于自动工作负载 repository (AWR) 快照的SQL ID（更多信息，请参见[第4章](#Chapter04.html#ch4)）\n\n\
    在通常情况下，收集一系列SQL语句的信息比收集单个语句的信息更容易。通过自动工作负载 repository (AWR) 快照或SQL调优集来获取信息是为一系列语句收集信息的最简单方法。AWR快照将包含基于特定时间段的信息，而SQL调优集将包含针对特定目标SQL语句集的信息。考虑进行“前后”性能分析的一些可能的关键原因包括：\n\
    \n*   初始化参数更改\n*   数据库升级\n*   硬件更改\n*   操作系统更改\n*   应用程序模式对象添加或更改\n*   SQL基线或配置文件的实施\n\
    \n有大量信息可供比较。在报告分析中收集的信息时，仅显示因系统更改而受到不利影响的SQL语句的输出可能是有益的。例如，您可能希望将`REPORT_ANALYSIS_TASK`函数显示的信息范围缩小，仅显示以下类型的SQL语句信息：\n\
    \n*   那些性能退化的语句\n*   那些执行计划发生更改的语句\n*   那些SQL语句中出现错误的语句\n\n在收集每个任务的信息之前，刷新`shared_pool`和/或`buffer_cache`可能是有益的，这将有助于为比较获得最佳信息。分析任务的信息存储在数据字典中。您可以引用任何以“`DBA_ADVISOR`”为前缀的数据字典视图，以获取有关您创建的性能分析任务、执行的操作以及执行统计信息、执行计划和报告信息的信息。有关`DBMS_SQLPA`包的完整说明，请参阅适用于您数据库版本的Oracle\
    \ PL/SQL Packages and Types Reference，该包在Oracle 11g版本中是新增的。\n\n![images](images/square.jpg)\
    \ **注意** 执行使用`DBMS_SQLPA`的分析任务需要`ADVISOR`系统权限。\n\n## 第10章\n\n## 追踪SQL执行\n\n追踪会话活动是大多数SQL性能调优工作的核心。Oracle提供了一套丰富的工具来追踪SQL活动。本章介绍Oracle\
    \ SQL追踪功能，并向您展示如何在您的环境中设置SQL追踪。Oracle提供了许多“事件”来帮助您执行各种类型的追踪。\n\n尽管有几种追踪方法可用，但Oracle现在建议您对大多数类型的追踪使用`DBMS_MONITOR`包。本章包含几个说明如何使用此包生成追踪的配方。此外，我们还展示了如何通过设置各种Oracle事件来追踪会话，这通常是Oracle支持人员所要求的。您将学习如何追踪单个SQL语句、一个会话以及整个实例，以及如何追踪并行查询。有配方展示了如何追踪另一个用户的会话以及如何使用触发器来启动会话追踪。您还将学习如何追踪Oracle优化器的执行路径。\n\
    \nOracle提供了`TKPROF`实用程序以及可免费下载的分析器Oracle Trace Analyzer。本章展示了如何使用这两种分析器来分析您生成的原始追踪文件。\n\
    \n### 10-1\\. 准备环境\n\n#### 问题\n\n您希望确保数据库已为追踪SQL会话正确设置。\n\n#### 解决方案\n\n在开始追踪SQL语句之前，您必须做三件事：\n\
    \n1.  启用定时统计信息收集。\n2.  指定追踪转储文件的目标位置。\n3.  调整追踪转储文件大小。\n\n您可以通过将`timed_statistics`参数设置为`true`来启用定时统计信息的收集。首先检查此参数的当前值：\n\
    \n```sql\nSQL> sho parameter statistics\nNAME                                \
    \ TYPE        VALUE\n------------------------------------ ----------- -----------\n\
    ...\nstatistics_level                     string      TYPICAL\ntimed_statistics\
    \                     boolean     TRUE\nSQL>\n```\n\n如果`timed_statistics`参数的值为`false`，请使用以下语句将其设置为`true`：\n\
    \n```sql\nSQL> alter system set timed_statistics=true scope=both;\nSystem altered.\n\
    SQL>\n```\n\n您也可以使用以下语句在会话级别设置此参数：\n\n```sql\nSQL> alter session set timed_statistics=true\n\
    ```\n\n您可以使用以下命令找到追踪目录的位置（在Oracle Database 11g之前的版本中称为用户转储目录）：\n\n```sql\nSQL>\
    \ select name,value from v$diag_info\n  2* where name='Diag Trace'\nSQL> /\nNAME\
    \                                      VALUE\n-----------------------------  \
    \  ----------------------------------------\nDiag Trace                      \
    \ c:\\app\\ora\\diag\\rdbms\\orcl1\\orcl1\\trace\nSQL>\n```\n\n在Oracle Database\
    \ 11g中，`max_dump_file_size`参数的默认值为`unlimited`，您可以通过发出以下命令进行验证：\n\n```sql\nSQL>\
    \ sho parameter dump\nNAME                                 TYPE        VALUE\n\
    ------------------------------------ ----------- ----------\n...\nmax_dump_file_size\
    \                   string      unlimited\n```\n\n无限制的转储文件大小意味着文件可以增长到操作系统允许的大小。"
  raw: '#### How It Works


    The SQL Performance Analyzer and the `DBMS_SQLPA` package can be used to analyze
    a SQL workload, which can be defined as any of the following:


    *   A SQL statement

    *   A SQL ID stored in cache

    *   A SQL tuning set (see [Chapter 11](#Chapter11.html#ch11) for information on
    SQL tuning sets)

    *   A SQL ID based on a snapshot from the Automatic Workload Repository (see [Chapter
    4](#Chapter04.html#ch4) for more information)


    In normal circumstances, it is easiest to gather information on a series of SQL
    statements, rather than one single statement. Getting information via Automatic
    Workload Repository (AWR) snapshots or via SQL tuning sets is the easiest way
    to get information for a series of statements. The AWR snapshots will contain
    information based on a specific time period, while SQL tuning sets will contain
    information on a specifically targeted set of SQL statements. Some of the possible
    key reasons to consider doing a “before and after” performance analysis include
    the following:


    *   Initialization parameter changes

    *   Database upgrades

    *   Hardware changes

    *   Operating system changes

    *   Application schema object additions or changes

    *   The implementation of SQL baselines or profiles


    There is an abundance of information available for comparison. When reporting
    on the information gathered in your analysis, it may be beneficial to show only
    the output for SQL statements affected adversely by the system change. For instance,
    you may want to narrow down the information shown from the `REPORT_ANALYSIS_TASK`
    function to show information only on SQL statements such as the following:


    *   Those statements that show regressed performance

    *   Those statements with a changed execution plan

    *   Those statements that show errors in the SQL statements


    It may be beneficial to flush the `shared_pool` and/or the `buffer_cache` prior
    to gathering information on each of your tasks, which will aid in getting the
    best possible information for comparison. Information on analysis tasks is stored
    in the data dictionary. You can reference any of the data dictionary views prefaced
    with “`DBA_ADVISOR`” to get information on performance analysis tasks you have
    created, executions performed, as well as execution statistics, execution plans,
    and report information. Refer to the Oracle PL/SQL Packages and Types Reference
    for your version of the database for a complete explanation of the `DBMS_SQLPA`
    package, which is new as of version Oracle 11g.


    ![images](images/square.jpg) **Note** The `ADVISOR` system privilege is needed
    to perform the analysis tasks using `DBMS_SQLPA`.


    ## C H A P T E R  10


    ## Tracing SQL Execution


    Tracing session activity is at the heart of most SQL performance tuning exercises.
    Oracle provides a rich set of tools to trace SQL activity. This chapter introduces
    the Oracle SQL trace facility and shows you how to set up SQL tracing in your
    environment. Oracle provides numerous “events” that help you perform various types
    of traces.


    Although there are several tracing methods available, Oracle now recommends that
    you use the `DBMS_MONITOR` package for most types of tracing. The chapter contains
    several recipes that explain how to use this package to generate traces. In addition,
    we show how to trace sessions by setting various Oracle events, the setting of
    which is often requested by Oracle Support. You''ll learn how to trace a single
    SQL statement, a session as well as an entire instance, as well as how to trace
    parallel queries. There are recipes that show how to trace another user''s session
    and how to use a trigger to start a session trace. You''ll also learn how to trace
    the Oracle optimizer''s execution path.


    Oracle provides the `TKPROF` utility as well as the freely downloadable profiler
    named Oracle Trace Analyzer. This chapter shows how to use both of these profilers
    to analyze the raw trace files you generate.


    ### 10-1\. Preparing Your Environment


    #### Problem


    You want to make sure your database is set up correctly for tracing SQL sessions.


    #### Solution


    You must do three things before you can start tracing SQL statements:


    1.  Enable timed statistics collection.

    2.  Specify a destination for the trace dump file.

    3.  Adjust the trace dump file size.


    You can enable the collection of timed statistics by setting the `timed_statistics`
    parameter to `true`. Check the current value of this parameter first:


    `SQL> sho parameter statistics`


    `NAME                                 TYPE        VALUE`

    `------------------------------------ ----------- -----------`

    `...`

    `statistics_level                     string      TYPICAL`

    `timed_statistics                     boolean     TRUE`

    `SQL>`


    If the value of the `timed_statistics` parameter is `false`, you set it to `true`
    with the following statement.


    `SQL> alter system set timed_statistics=true scope=both;`


    `System altered.`


    `SQL>`


    You can also set this parameter at the session level with the following statement:


    `SQL> alter session set timed_statistics=true`


    You can find the location of the trace directory (which was referred to as the
    user dump directory in pre-Oracle Database 11g releases) with the following command:


    `SQL> select name,value from v$diag_info`

    `  2* where name=''Diag Trace''`

    `SQL> /`


    `NAME                                              VALUE`

    `-----------------------------    ----------------------------------------`


    `Diag Trace                       c:\app\ora\diag\rdbms\orcl1\orcl1\trace`


    `SQL>`


    In Oracle Database 11g, the default value of the `max_dump_file_size` parameter
    is `unlimited`, as you can verify by issuing the following command:


    `SQL> sho parameter dump`


    `NAME                                 TYPE        VALUE`

    `------------------------------------ ----------- ----------`

    `...`

    `max_dump_file_size                   string      unlimited`


    An unlimited dump file size means that the file can grow as large as the operating
    system permits'
