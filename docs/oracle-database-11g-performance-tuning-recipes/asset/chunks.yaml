    This solution focuses on using the `ALTER TABLE...ADD CONSTRAINT` statement. When
    you create a unique key constraint, Oracle will automatically create an index
    for you. This is our recommended approach for creating unique key constraints
    and indexes. This example creates a unique constraint named `CUST_UX1` on the
    combination of the `LAST_NAME` and `FIRST_NAME` columns of the `CUST` table:


    `alter table cust add constraint cust_ux1 unique (last_name, first_name)`

    `using index tablespace users;`


    The prior statement creates the unique constraint, and additionally Oracle automatically
    creates an associated index. The following query displays the constraint that
    was created successfully:


    `select`

    ` constraint_name`

    `,constraint_type`

    `from user_constraints`

    `where table_name = ''CUST'';`


    Here is a snippet of the output:


    `CONSTRAINT_NAME                C`

    `------------------------------ -`

    `CUST_UX1                       U`


    This query shows the index that was automatically created along with the constraint:


    `select`

    ` index_name`

    `,tablespace_name`

    `,index_type`

    `,uniqueness`

    `from user_indexes`

    `where table_name = ''CUST'';`


    Here is some sample output:


    `INDEX_NAME           TABLESPACE INDEX_TYPE UNIQUENESS`

    `-------------------- ---------- ---------- ---------`

    `CUST_UX1             USERS      NORMAL     UNIQUE`


    #### How It Works


    Defining a unique constraint ensures that when you insert or update column values,
    then any combination of non-null values are unique. Besides the approach we displayed
    in the “Solution” section, there are several additional techniques for creating
    unique constraints:


    *   Use the `CREATE TABLE` statement.

    *   Create a regular index, and then use `ALTER TABLE` to add a constraint.

    *   Create a unique index and don''t add the constraint.


    These techniques are described in the next few subsections.


    ##### Use CREATE TABLE


    Listed next is an example of using the `CREATE TABLE` statement to include a unique
    constraint.


    `create table cust(`

    ` cust_id number`

    `,last_name varchar2(30)`

    `,first_name varchar2(30)`

    `,constraint cust_ux1 unique(last_name, first_name)`

    ` using index tablespace users);`


    The advantage of this approach is that it''s simple and encapsulates the constraint
    and index creation within one statement.


    ##### Create Index First, Then Add Constraint


    You have the option of first creating an index and then adding the constraint
    as a separate statement—for example:


    `SQL> create unique index cust_uidx1 on cust(last_name, first_name) tablespace
    users;`

    `SQL> alter table cust add constraint cust_uidx1 unique (last_name, first_name);`


    The advantage of creating the index separate from the constraint is that you can
    drop or disable the constraint without dropping the underlying index. When working
    with large indexes, you may want to consider this approach. If you need to disable
    the constraint for any reason and then re-enable it later, you can do so without
    dropping the index (which may take a long time for large indexes).


    ##### Creating Only a Unique Index


    You can also create just a unique index without adding the unique constraint—for
    example:


    `SQL> create unique index cust_uidx1 on cust(last_name, first_name) tablespace
    users;`


    When you create only a unique index explicitly (as in the prior statement), Oracle
    creates a unique index but doesn''t add an entry for a constraint in `DBA/ALL/USER_CONSTRAINTS`.
    Why does this matter? Consider this scenario:


    `SQL> insert into cust values (1, ''STARK'', ''JIM'');`

    `SQL> insert into cust values (1, ''STARK'', ''JIM'');`


    Here''s the corresponding error message that is thrown:


    `ERROR at line 1:`

    `ORA-00001: unique constraint (MV_MAINT.CUST_UIDX1) violated`


    If you''re asked to troubleshoot this issue, the first place you look is in `DBA_CONSTRAINTS`
    for a constraint named `CUST_UIDX1`. However, there is no information:


    `select`

    `  constraint_name`

    `from dba_constraints`

    `where constraint_name=''CUST_UIDX1'';`

    `no rows selected`


    The “no rows selected” message can be confusing: the error message thrown when
    you insert into the table indicates that a unique constraint has been violated,
    yet there is no information in the constraint-related data-dictionary views. In
    this situation, you have to look at `DBA_INDEXES` to view the details of the unique
    index that has been created—for example:


    `select index_name, uniqueness`

    `from dba_indexes where index_name=''CUST_UIDX1'';`


    `INDEX_NAME                     UNIQUENESS`

    `------------------------------ ----------`

    `CUST_UIDX1                     UNIQUE`


    ### 2-5\. Indexing Foreign Key Columns


    #### Problem


    A large number of the queries in your application use foreign key columns as predicates
    in the `WHERE` clause. Therefore, for performance reasons, you want to ensure
    that you have all foreign key columns indexed.


    #### Solution


    Unlike primary key constraints, Oracle does not automatically create indexes on
    foreign key columns. For example, say you have a requirement that every record
    in the `ADDRESS` table be assigned a corresponding `CUST_ID` column that exists
    in the `CUST` table. To enforce this relationship, you create a foreign key constraint
    on the `ADDRESS` table as follows:


    `alter table address add constraint addr_fk1`

    `foreign key (cust_id) references cust(cust_id);`


    ![images](images/square.jpg) **Note** A foreign key column must reference a column
    in the parent table that has a primary key or unique key constraint defined on
    it. Otherwise you''ll receive the error “ORA-02270: no matching unique or primary
    key for this column-list.”


    You realize the foreign key column is used extensively when joining the `CUST`
    and `ADDRESS` tables and that an index on the foreign key column will dramatically
    increase performance. You have to manually create an index in this situation.
    For example, a regular B-tree index is created on the foreign key column of `CUST_ID`
    in the `ADDRESS` table:


    `SQL> create index addr_fk1 on address(cust_id);`


    You don''t have to name the index the same as the foreign key name (as we did
    in the prior lines of code). It''s a personal preference as to whether you do
    that. We feel it''s easier to maintain environments when the constraint and corresponding
    index have the same name.'
  trans: "#### 解决方案\n\n本方案重点介绍使用 `ALTER TABLE...ADD CONSTRAINT` 语句。当你创建唯一键约束时，Oracle\
    \ 会自动为你创建一个索引。这是我们创建唯一键约束和索引的推荐方法。此示例在 `CUST` 表的 `LAST_NAME` 和 `FIRST_NAME` 列组合上创建了一个名为\
    \ `CUST_UX1` 的唯一约束：\n\n```sql\nalter table cust add constraint cust_ux1 unique\
    \ (last_name, first_name)\nusing index tablespace users;\n```\n\n上述语句创建了唯一约束，此外\
    \ Oracle 还自动创建了一个关联的索引。以下查询显示已成功创建的约束：\n\n```sql\nselect\n constraint_name\n,constraint_type\n\
    from user_constraints\nwhere table_name = 'CUST';\n```\n\n以下是输出片段：\n\n```\nCONSTRAINT_NAME\
    \                C\n------------------------------ -\nCUST_UX1               \
    \        U\n```\n\n此查询显示了随约束自动创建的索引：\n\n```sql\nselect\n index_name\n,tablespace_name\n\
    ,index_type\n,uniqueness\nfrom user_indexes\nwhere table_name = 'CUST';\n```\n\
    \n以下是一些示例输出：\n\n```\nINDEX_NAME           TABLESPACE INDEX_TYPE UNIQUENESS\n--------------------\
    \ ---------- ---------- ---------\nCUST_UX1             USERS      NORMAL    \
    \ UNIQUE\n```\n\n#### 工作原理\n\n定义唯一约束可确保在插入或更新列值时，任何非空值的组合都是唯一的。除了我们在“解决方案”部分展示的方法外，还有几种其他技术可以创建唯一约束：\n\
    \n*   使用 `CREATE TABLE` 语句。\n*   创建一个常规索引，然后使用 `ALTER TABLE` 添加约束。\n*   创建唯一索引但不添加约束。\n\
    \n这些技术将在接下来的几个小节中描述。\n\n##### 使用 CREATE TABLE\n\n下面列出了使用 `CREATE TABLE` 语句包含唯一约束的示例。\n\
    \n```sql\ncreate table cust(\n cust_id number\n,last_name varchar2(30)\n,first_name\
    \ varchar2(30)\n,constraint cust_ux1 unique(last_name, first_name)\n using index\
    \ tablespace users);\n```\n\n这种方法的优点是简单，并将约束和索引创建封装在一个语句中。\n\n##### 先创建索引，然后添加约束\n\
    \n你可以选择先创建一个索引，然后在单独的语句中添加约束——例如：\n\n```sql\nSQL> create unique index cust_uidx1\
    \ on cust(last_name, first_name) tablespace users;\nSQL> alter table cust add\
    \ constraint cust_uidx1 unique (last_name, first_name);\n```\n\n将索引创建与约束分开的优点是，你可以在不删除底层索引的情况下删除或禁用约束。处理大型索引时，你可能需要考虑这种方法。如果需要出于任何原因禁用约束并在以后重新启用，你可以在不删除索引的情况下完成（对于大型索引，删除操作可能非常耗时）。\n\
    \n##### 仅创建唯一索引\n\n你也可以仅创建一个唯一索引而不添加唯一约束——例如：\n\n```sql\nSQL> create unique index\
    \ cust_uidx1 on cust(last_name, first_name) tablespace users;\n```\n\n当你显式地仅创建唯一索引时（如前面的语句），Oracle\
    \ 会创建一个唯一索引，但不会在 `DBA/ALL/USER_CONSTRAINTS` 中为约束添加条目。为什么这很重要？考虑以下场景：\n\n```sql\n\
    SQL> insert into cust values (1, 'STARK', 'JIM');\nSQL> insert into cust values\
    \ (1, 'STARK', 'JIM');\n```\n\n以下是抛出的相应错误消息：\n\n```\nERROR at line 1:\nORA-00001:\
    \ unique constraint (MV_MAINT.CUST_UIDX1) violated\n```\n\n如果你被要求排查此问题，首先会查看 `DBA_CONSTRAINTS`\
    \ 中名为 `CUST_UIDX1` 的约束。但是，没有信息：\n\n```sql\nselect\n  constraint_name\nfrom dba_constraints\n\
    where constraint_name='CUST_UIDX1';\n```\n\n```\nno rows selected\n```\n\n“未选定行”的消息可能会令人困惑：向表中插入数据时抛出的错误消息表明违反了唯一约束，但在约束相关的数据字典视图中却没有任何信息。在这种情况下，你必须查看\
    \ `DBA_INDEXES` 以查看已创建的唯一索引的详细信息——例如：\n\n```sql\nselect index_name, uniqueness\n\
    from dba_indexes where index_name='CUST_UIDX1';\n```\n\n```\nINDEX_NAME      \
    \               UNIQUENESS\n------------------------------ ----------\nCUST_UIDX1\
    \                     UNIQUE\n```\n\n### 2-5. 为外键列创建索引\n\n#### 问题\n\n你应用程序中的大量查询使用外键列作为\
    \ `WHERE` 子句中的谓词。因此，出于性能原因，你希望确保所有外键列都建有索引。\n\n#### 解决方案\n\n与主键约束不同，Oracle 不会自动在外键列上创建索引。例如，假设你有一个要求：`ADDRESS`\
    \ 表中的每条记录都必须分配一个在 `CUST` 表中存在的相应 `CUST_ID` 列值。为了强制实施这种关系，你在 `ADDRESS` 表上创建了一个外键约束，如下所示：\n\
    \n```sql\nalter table address add constraint addr_fk1\nforeign key (cust_id) references\
    \ cust(cust_id);\n```\n\n![images](img/square.jpg) **注意** 外键列必须引用父表中定义了主键或唯一键约束的列。否则你会收到错误“ORA-02270:\
    \ 此列列表没有匹配的唯一或主键”。\n\n你意识到在连接 `CUST` 和 `ADDRESS` 表时，外键列被广泛使用，并且在外键列上建立索引将显著提高性能。在这种情况下，你必须手动创建索引。例如，在\
    \ `ADDRESS` 表的 `CUST_ID` 外键列上创建一个常规的 B 树索引：\n\n```sql\nSQL> create index addr_fk1\
    \ on address(cust_id);\n```\n\n你不必将索引命名为与外键名称相同（就像我们在前面的代码行中所做的那样）。是否这样做取决于个人偏好。我们认为，当约束和相应的索引具有相同名称时，维护环境会更加容易。"
- fmt: "#### How It Works\n\n外键的存在是为了确保在向子表中插入数据时，对应的父表记录确实存在。这是一种保证数据符合父子业务关系规则的机制。从性能角度看，通常为外键列创建索引是一个好主意。这是因为父子表经常通过子表中的外键列与父表中的主键列进行连接——例如：\n\
    \n```sql\nselect\n a.last_name, a.first_name, b.state\nfrom cust a\n    ,address\
    \ b\nwhere a.cust_id = b.cust_id;\n```\n\n在大多数情况下，Oracle 查询优化器会选择使用外键列上的索引来识别满足查询结果所需的子记录。如果没有索引，Oracle\
    \ 就必须对子表执行全表扫描。\n\n如果你继承了一个数据库，那么谨慎的做法是检查定义了外键约束的列是否有对应的索引。以下查询显示了与外键约束关联的索引：\n\
    \n```sql\nselect\n  a.constraint_name cons_name\n ,a.table_name      tab_name\n\
    \ ,b.column_name cons_column\n ,nvl(c.column_name,'***No Index***') ind_column\n\
    from user_constraints  a\n     join\n     user_cons_columns b on a.constraint_name\
    \ = b.constraint_name\n     left outer join\n     user_ind_columns  c on b.column_name\
    \ = c.column_name\n                        and b.table_name  = c.table_name\n\
    where constraint_type = 'R'\norder by 2,1;\n```\n\n如果外键列上没有索引，则会显示 ***No Index***\
    \ 信息。例如，假设“解决方案”部分中的索引被意外删除，然后运行了前面的查询。以下是一些示例输出：\n\n```\nCONS_NAME          TAB_NAME\
    \                CONS_COLUMN               IND_COLUMN\n------------------ -----------------------\
    \ ------------------------- --------------------\nADDR_FK1           ADDRESS \
    \                CUST_ID                   ***No Index***\n```\n\n### 2-6. Deciding\
    \ When to Use a Concatenated Index\n\n#### Problem\n\n你有一组（来自同一张表的）列，它们经常在几个 SQL\
    \ 查询的 `WHERE` 子句中一起使用。例如，你使用 `LAST_NAME` 与 `FIRST_NAME` 的组合来标识客户：\n\n```sql\n\
    select last_name, first_name\nfrom cust\nwhere last_name = 'SMITH'\nand first_name\
    \ = 'STEVE';\n```\n\n你不确定是创建一个在 `LAST_NAME` 和 `FIRST_NAME` 列组合上的单个复合索引更高效，还是分别在\
    \ `LAST_NAME` 和 `FIRST_NAME` 上创建两个单独的索引性能更好。\n\n#### Solution\n\n当经常在 `WHERE`\
    \ 子句中同时访问两个或多个列时，复合索引通常比两个单列索引更具选择性。对于此示例，以下是表创建脚本：\n\n```sql\ncreate table cust(\n\
    \ cust_id number primary key\n,last_name varchar2(30)\n,first_name varchar2(30));\n\
    ```\n\n以下是在 `LAST_NAME` 和 `FIRST_NAME` 上创建的复合索引示例：\n\n```sql\nSQL> create index\
    \ cust_idx1 on cust(last_name, first_name);\n```\n\n为了确定是否使用了复合索引，插入了几行数据（这里只显示了部分行）：\n\
    \n```sql\nSQL> insert into cust values(1,'SMITH','JOHN');\nSQL> insert into cust\
    \ values(2,'JONES','DAVE');\n..........\nSQL> insert into cust values(3,'FORD','SUE');\n\
    ```\n\n接下来，为表和索引生成统计信息：\n\n```sql\nSQL> exec dbms_stats.gather_table_stats(ownname=>'MV_MAINT',-\n\
    \           tabname=>'CUST',cascade=>true);\n```\n\n现在启用 Autotrace，以便在运行查询时显示执行计划：\n\
    \n```sql\nSQL> set autotrace on;\n```\n\n以下是待执行的查询：\n\n```sql\nselect last_name,\
    \ first_name\nfrom cust\nwhere last_name = 'SMITH'\nand first_name = 'JOHN';\n\
    ```\n\n接下来列出了一个执行计划，显示优化器正在使用索引：\n\n```\n------------------------------------------------------------------------------\n\
    | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |           |    13 |   143 |     1   (0)| 00:00:01 |\n\
    |*  1 |  INDEX RANGE SCAN| CUST_IDX1 |    13 |   143 |     1   (0)| 00:00:01 |\n\
    ------------------------------------------------------------------------------\n\
    ```\n\n前面的输出表明使用了 `INDEX RANGE SCAN` 来访问 `CUST_IDX1` 索引。请注意，满足此查询结果所需的所有信息都包含在索引中。不需要访问表数据。Oracle\
    \ 只访问了索引。\n\n另外需要考虑的一点是：假设你有这个额外选择了 `CUST_ID` 列的查询：\n\n```sql\nselect cust_id,\
    \ last_name, first_name\nfrom cust\nwhere last_name = 'SMITH'\nand first_name\
    \ = 'JOHN';\n```\n\n如果你经常将 `CUST_ID` 与 `LAST_NAME` 和 `FIRST_NAME` 一起访问，考虑将 `CUST_ID`\
    \ 添加到复合索引中。这将为查询提供索引中的所有信息。Oracle 将能够从索引块中检索所需的数据，从而无需访问表块。\n\n#### How It Works\n\
    \nOracle 允许你创建包含多于一列的索引。多列索引被称为*复合索引*。当你经常在访问表时在 `WHERE` 子句中使用多个列时，这些索引尤其有效。以下是使用复合索引时需要考虑的一些因素：\n\
    \n*   如果列经常在 `WHERE` 子句中一起使用，考虑创建一个复合索引。\n*   如果一个列在（其他查询中）单独用于 `WHERE` 子句，请将该列放在索引的前沿（定义的第一列）。\n\
    *   请记住，如果滞后列单独出现在 `WHERE` 子句中，Oracle 仍然可以使用滞后边缘索引（非定义的第一列）（有关详细信息，请参阅此处接下来的几段）。\n\
    \n在旧版本的 Oracle（约 v8）中，优化器仅当前沿列出现在 `WHERE` 子句中时才会使用复合索引。在现代版本中，即使前沿列没有出现在 `WHERE`\
    \ 子句中，优化器也会使用复合索引。这种无需引用前沿列即可使用索引的能力被称为*跳过扫描*功能。例如，假设你有这个使用 `FIRST_NAME` 列（这是“解决方案”部分创建的复合索引中的一个滞后列）的查询：\n\
    \n```sql\nSQL> select last_name from cust where first_name='DAVE';\n```\n\n以下是相应的执行计划，表明跳过扫描功能正在发挥作用：\n\
    \n```\n------------------------------------------------------------------------------\n\
    | Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
    ------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT |           |    38 |   418 |     1   (0)| 00:00:01 |\n\
    |*  1 |  INDEX SKIP SCAN | CUST_IDX1 |    38 |   418 |     1   (0)| 00:00:01 |\n\
    ------------------------------------------------------------------------------\n\
    ```\n\n用于跳过扫描的复合索引比全表扫描更高效。但是，如果你始终只使用复合索引的滞后边缘列，那么请考虑在该滞后列上创建一个单列索引。\n\n### 2-7.\
    \ Reducing Index Size Through Compression"
  raw: '#### How It Works


    Foreign keys exist to ensure that when inserting into a child table, a corresponding
    parent table record exists. This is the mechanism to guarantee that data conforms
    to parent/child business relationship rules. From a performance perspective, it''s
    usually a good idea to create an index on foreign key columns. This is because
    parent/child tables are frequently joined on the foreign key column(s) in the
    child table to the primary key column(s) in the parent table—for example:


    `select`

    ` a.last_name, a.first_name, b.state`

    `from cust a`

    `    ,address b`

    `where a.cust_id = b.cust_id;`


    In most scenarios, the Oracle query optimizer will choose to use the index on
    the foreign key column to identify the child records that are required to satisfy
    the results of the query. If no index exists, Oracle has to perform a full table
    scan on the child table.


    If you''ve inherited a database, then it''s prudent to check if columns with foreign
    key constraints defined on them have a corresponding index. The following query
    displays indexes associated with foreign key constraints:


    `select`

    `  a.constraint_name cons_name`

    ` ,a.table_name  tab_name`

    ` ,b.column_name cons_column`

    ` ,nvl(c.column_name,''***No Index***'') ind_column`

    `from user_constraints  a`

    `     join`

    `     user_cons_columns b on a.constraint_name = b.constraint_name`

    `     left outer join`

    `     user_ind_columns  c on b.column_name = c.column_name`

    `                        and b.table_name  = c.table_name`

    `where constraint_type = ''R''`

    `order by 2,1;`


    If there is no index on the foreign key column, the ***No Index*** message is
    displayed. For example, suppose the index in the “Solution” section was accidentally
    dropped and then the prior query was run. Here is some sample output:


    `CONS_NAME          TAB_NAME                CONS_COLUMN               IND_COLUMN`

    `------------------ ----------------------- ------------------------- --------------------`

    `ADDR_FK1                  ADDRESS                   CUST_ID                   ***No
    Index***`


    ### 2-6. Deciding When to Use a Concatenated Index


    #### Problem


    You have a combination of columns (from the same table) that are often used in
    the `WHERE` clause of several SQL queries. For example, you use `LAST_NAME` in
    combination with `FIRST_NAME` to identify a customer:


    `select last_name, first_name`

    `from cust`

    `where last_name = ''SMITH''`

    `and first_name = ''STEVE'';`


    You wonder if it would be more efficient to create a single concatenated index
    on the combination of `LAST_NAME` and `FIRST_NAME` columns or if performance would
    be better if two indexes were created separately on `LAST_NAME` and `FIRST_NAME`.


    #### Solution


    When frequently accessing two or more columns in conjunction in the `WHERE` clause,
    a concatenated index is often more selective than two single indexes. For this
    example, here''s the table creation script:


    `create table cust(`

    ` cust_id number primary key`

    `,last_name varchar2(30)`

    `,first_name varchar2(30));`


    Here''s an example of a concatenated index created on `LAST_NAME` and `FIRST_NAME`:


    `SQL> create index cust_idx1 on cust(last_name, first_name);`


    To determine whether the concatenated index is used, several rows are inserted
    (only a subset of the rows is shown here):


    `SQL> insert into cust values(1,''SMITH'',''JOHN'');`

    `SQL> insert into cust values(2,''JONES'',''DAVE'');`

    `..........`

    `SQL> insert into cust values(3,''FORD'',''SUE'');`


    Next, statistics are generated for the table and index:


    `SQL> exec dbms_stats.gather_table_stats(ownname=>''MV_MAINT'',-`

    `           tabname=>''CUST'',cascade=>true);`


    Now Autotrace is turned on so that the execution plan is displayed when a query
    is run:


    `SQL> set autotrace on;`


    Here''s the query to execute:


    `select last_name, first_name`

    `from cust`

    `where last_name = ''SMITH''`

    `and first_name = ''JOHN'';`


    Listed next is an explain plan that shows the optimizer is using the index:


    `------------------------------------------------------------------------------`

    `| Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |`

    `------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT |           |    13 |   143 |     1   (0)| 00:00:01
    |`

    `|*  1 |  INDEX RANGE SCAN| CUST_IDX1 |    13 |   143 |     1   (0)| 00:00:01
    |`

    `------------------------------------------------------------------------------`


    The prior output indicates that an `INDEX RANGE SCAN` was used to access the `CUST_IDX1`
    index. Notice that all of the information required to satisfy the results of this
    query was contained within the index. The table data was not required. Oracle
    accessed only the index.


    One other item to consider: suppose you have this query that additionally selects
    the `CUST_ID` column:


    `select cust_id, last_name, first_name`

    `from cust`

    `where last_name = ''SMITH''`

    `and first_name = ''JOHN'';`


    If you frequently access `CUST_ID` in combination with `LAST_NAME` and `FIRST_NAME`,
    consider adding `CUST_ID` to the concatenated index. This will provide all of
    the information that the query needs in the index. Oracle will be able to retrieve
    the required data from the index blocks and thus not have to access the table
    blocks.


    #### How It Works


    Oracle allows you to create an index that contains more than one column. Multicolumn
    indexes are known as *concatenated indexes*. These indexes are especially effective
    when you often use multiple columns in the `WHERE` clause when accessing a table.
    Here are some factors to consider when using concatenated indexes:


    *   If columns are often used together in the `WHERE` clause, consider creating
    a concatenated index.

    *   If a column is also used (in other queries) by itself in the `WHERE` clause,
    place that column at the leading edge of the index (first column defined).

    *   Keep in mind that Oracle can still use a lagging edge index (not the first
    column defined) if the lagging column appears by itself in the `WHERE` clause
    (see the next few paragraphs here for details).


    In older versions of Oracle (circa v8), the optimizer would use a concatenated
    index only if the leading edge column(s) appeared in the `WHERE` clause. In modern
    versions, the optimizer uses a concatenated index even if the leading edge column(s)
    aren''t present in the `WHERE` clause. This ability to use an index without reference
    to leading edge columns is known as the *skip-scan* feature. For example, say
    you have this query that uses the `FIRST_NAME` column (which is a lagging column
    in the concatenated index created in the “Solution” section of this recipe):


    `SQL> select last_name from cust where first_name=''DAVE'';`


    Here is the corresponding explain plan showing that the skip-scan feature is in
    play:


    `------------------------------------------------------------------------------`

    `| Id  | Operation        | Name      | Rows  | Bytes | Cost (%CPU)| Time     |`

    `------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT |           |    38 |   418 |     1   (0)| 00:00:01
    |`

    `|*  1 |  INDEX SKIP SCAN | CUST_IDX1 |    38 |   418 |     1   (0)| 00:00:01
    |`

    `------------------------------------------------------------------------------`


    A concatenated index that is used for skip-scanning is more efficient than a full
    table scan. However, if you''re consistently using only a lagging edge column
    of a concatenated index, then consider creating a single-column index on the lagging
    column.


    ### 2-7. Reducing Index Size Through Compression'
