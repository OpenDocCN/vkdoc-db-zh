- fmt: "#### Solution\n\nImplementing bind variables within an application can tremendously\
    \ improve the efficiency and performance of queries. Essentially, bind variables\
    \ are called substitution variables, and replace literals within a query. By placing\
    \ bind variables within your SQL statements, the statements can be re-used in\
    \ memory, and do not have to go through the entire expensive SQL parsing process.\n\
    \nHere is an example of a normal SQL statement, with literal values shown in the\
    \ `WHERE` clause:\n\n```sql\nSELECT employee_id, last_name || ', ' || first_name\
    \ employee_name\nFROM employees\nWHERE employee_id = 115;\n```\n\n```\nEMPLOYEE_ID\
    \ EMPLOYEE_NAME\n----------- -------------------------\n        115 Khoo, Alexander\n\
    ```\n\nThere are a couple of ways to define bind variables within Oracle. First,\
    \ you can simply use SQL Plus. To accomplish this within SQL Plus, you first need\
    \ to define a variable, along with a datatype to the variable. Then, you can use\
    \ the `exec` command, which actually will run a PL/SQL command to populate the\
    \ variable with the desired value. Notice that when referencing a bind variable\
    \ in SQL Plus, it is prefaced with a colon:\n\n```sql\nSQL> variable g_emp_id\
    \ number\nSQL> exec :g_emp_id := 115;\n```\n\n```\nPL/SQL procedure successfully\
    \ completed.\n```\n\nAfter you have defined a variable and assigned a value to\
    \ it, you can simply substitute the variable name within your SQL statement. Again,\
    \ since it is a bind variable, you need to preface it with a colon:\n\n```sql\n\
    SELECT employee_id, last_name || ', ' || first_name employee_name\nFROM employees\n\
    WHERE employee_id = :g_emp_id;\n```\n\n```\nEMPLOYEE_ID EMPLOYEE_NAME\n-----------\
    \ -------------------------\n        115 Khoo, Alexander\n```\n\nYou can also\
    \ assign variables within PL/SQL. The nice advantage of PL/SQL is that just by\
    \ using variables in PL/SQL, they are automatically bind variables, so there is\
    \ no special coding required. And, unlike SQL Plus, no colon is required when\
    \ referencing a variable that was defined within the PL/SQL block:\n\n```sql\n\
    SQL> set serveroutput on\n  1  DECLARE\n  2    v_emp_id employees.employee_id%TYPE\
    \ := 200;\n  3    v_last_name employees.last_name%TYPE;\n  4    v_first_name employees.first_name%TYPE;\n\
    \  5  BEGIN\n  6    SELECT last_name, first_name\n  7    INTO v_last_name, v_first_name\n\
    \  8    FROM employees\n  9    WHERE employee_id = v_emp_id;\n 10    dbms_output.put_line('Employee\
    \ Name = ' || v_last_name || ', ' || v_first_name);\n 11* END;\nSQL> /\n```\n\n\
    ```\nEmployee Name = Whalen, Jennifer\n```\n\n#### How It Works\n\nWhen bind variables\
    \ are used, their use increases the likelihood that a SQL statement can be re-used\
    \ within the shared pool. Oracle uses a hashing algorithm to assign a value to\
    \ every unique SQL statement. If literals are used within a SQL statement, the\
    \ hash values between two otherwise identical statements will be different. By\
    \ using the bind variables, the statements will have the same hash value within\
    \ the shared pool, and part of the expensive parsing process can be avoided.\n\
    \n##### Re-use Is Efficient\n\nRe-use is efficient because Oracle does not have\
    \ to go through the entire parsing process for those SQL statements. If you do\
    \ not use bind variables within your SQL statements, and instead use literals,\
    \ the statements need to be completely parsed.\n\nSee [Table 8-3](#Chapter08.html#tab_8_3)\
    \ for a review of the steps taken to process a SQL statement. A statement that\
    \ is “hard-parsed” must execute all of the steps. If a statement is “soft parsed,”\
    \ the optimizer generally does not execute the optimization and row source generation\
    \ steps.\n\n![images](images/t0803.jpg)\n\n![images](images/t0803a.jpg)\n\n#####\
    \ Hard-Parsing Can Be Avoided\n\nBy using bind variables, a hard parse can be\
    \ avoided and can help the performance of SQL queries, as well as reduce the amount\
    \ of memory thrashing that can occur in the shared pool. The `TKPROF` utility\
    \ is one way to verify whether SQL statements are being re-used in the shared\
    \ pool. Later, there are examples of PL/SQL code that use bind variables, and\
    \ PL/SQL code that does not use bind variables.\n\nBy using the `TKPROF` utility,\
    \ we can see how these statements are processed. In order to see this information\
    \ with the `TKPROF` utility, we first must turn tracing on within our session:\n\
    \n```sql\nalter session set sql_trace=true;\n```\n\nThe trace file gets generated\
    \ in the location specified by the `diagnostic_dest` or `user_dump_dest` parameter\
    \ settings. The following PL/SQL block updates the employees table and gives all\
    \ employees a 3% raise. Since all PL/SQL variables are treated as bind variables,\
    \ we can see with the `TKPROF` output that the update statement was parsed only\
    \ once, but executed 107 times:\n\n```sql\nBEGIN\nFOR i IN 100..206\nLOOP\nUPDATE\
    \ employees\nSET salary=salary*1.03\nWHERE employee_id = i;\nEND LOOP;\nCOMMIT;\n\
    END;\n```\n\nHere is an excerpt from the `TKPROF`-generated report, which summarizes\
    \ information about the session on which tracing was enabled:\n\n```\nSQL ID :\
    \ f7mtnudzhm2py\nUPDATE EMPLOYEES SET SALARY=SALARY*1.03\nWHERE\n EMPLOYEE_ID\
    \ = :B1\n\ncall     count       cpu    elapsed       disk      query    current\
    \        rows\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\nParse        1      0.00       0.00          0          0     \
    \     0           0\nExecute    107      0.01       0.00          0        107\
    \        112         107\nFetch        0      0.00       0.00          0     \
    \     0          0           0\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\ntotal      108      0.01       0.00     \
    \     0        107        112         107\n```\n\nIn the following example, we\
    \ do the same thing using dynamic SQL with the `execute immediate` command:\n\n\
    ```sql\nBEGIN\nFOR i IN 100..206\nLOOP\nexecute immediate 'UPDATE employees SET\
    \ salary=salary*1.03 WHERE employee_id = ' || i;\nEND LOOP;\nCOMMIT;\nEND;\n```\n\
    \nSince the entire statement is assembled together prior to execution, the variable\
    \ is converted to a literal before execution. We can see with the `TKPROF` output\
    \ that the statement was parsed with each execution:\n\n```\nSQL ID : 67776qbqqz5wc\n\
    UPDATE employees SET salary=salary*:\"SYS_B_0\"\nWHERE\n employee_id = :\"SYS_B_1\"\
    \n\ncall     count       cpu    elapsed       disk      query    current     \
    \   rows\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\nParse      107      0.00       0.00          0          0     \
    \     0           0\nExecute    107      0.00       0.04          0        107\
    \        112         107\nFetch        0      0.00       0.00          0     \
    \     0          0           0\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\ntotal      214      0.00       0.05     \
    \     0        107        112         107\n```"
  raw: '#### Solution


    Implementing bind variables within an application can tremendously improve the
    efficiency and performance of queries. Essentially, bind variables are called
    substitution variables, and replace literals within a query. By placing bind variables
    within your SQL statements, the statements can be re-used in memory, and do not
    have to go through the entire expensive SQL parsing process.


    Here is an example of a normal SQL statement, with literal values shown in the
    `WHERE` clause:


    `SELECT employee_id, last_name || '', '' || first_name employee_name`

    `FROM employees`

    **`WHERE employee_id = 115;`**


    `EMPLOYEE_ID EMPLOYEE_NAME`

    `----------- -------------------------`

    `        115 Khoo, Alexander`


    There are a couple of ways to define bind variables within Oracle. First, you
    can simply use SQL Plus. To accomplish this within SQL Plus, you first need to
    define a variable, along with a datatype to the variable. Then, you can use the
    `exec` command, which actually will run a PL/SQL command to populate the variable
    with the desired value. Notice that when referencing a bind variable in SQL Plus,
    it is prefaced with a colon:


    **`SQL> variable g_emp_id number`**

    **`SQL> exec :g_emp_id := 115;`**


    `PL/SQL procedure successfully completed.`


    After you have defined a variable and assigned a value to it, you can simply substitute
    the variable name within your SQL statement. Again, since it is a bind variable,
    you need to preface it with a colon:


    `SELECT employee_id, last_name || '', '' || first_name employee_name`

    `FROM employees`

    **`WHERE employee_id = :g_emp_id;`**


    `EMPLOYEE_ID EMPLOYEE_NAME`

    `----------- -------------------------`

    `        115 Khoo, Alexander`


    You can also assign variables within PL/SQL. The nice advantage of PL/SQL is that
    just by using variables in PL/SQL, they are automatically bind variables, so there
    is no special coding required. And, unlike SQL Plus, no colon is required when
    referencing a variable that was defined within the PL/SQL block:


    `SQL> set serveroutput on`

    `  1  DECLARE`

    **`2    v_emp_id employees.employee_id%TYPE := 200;`**

    `  3    v_last_name employees.last_name%TYPE;`

    `  4    v_first_name employees.first_name%TYPE;`

    `  5  BEGIN`

    `  6    SELECT last_name, first_name`

    `  7    INTO v_last_name, v_first_name`

    `  8    FROM employees`

    **`9    WHERE employee_id = v_emp_id;`**

    ` 10  dbms_output.put_line(''Employee Name = '' || v_last_name || '', '' || v_first_name);`

    ` 11* END;`

    `SQL> /`

    `Employee Name = Whalen, Jennifer`


    #### How It Works


    When bind variables are used, their use increases the likelihood that a SQL statement
    can be re-used within the shared pool. Oracle uses a hashing algorithm to assign
    a value to every unique SQL statement. If literals are used within a SQL statement,
    the hash values between two otherwise identical statements will be different.
    By using the bind variables, the statements will have the same hash value within
    the shared pool, and part of the expensive parsing process can be avoided.


    ##### Re-use Is Efficient


    Re-use is efficient because Oracle does not have to go through the entire parsing
    process for those SQL statements. If you do not use bind variables within your
    SQL statements, and instead use literals, the statements need to be completely
    parsed.


    See [Table 8-3](#Chapter08.html#tab_8_3) for a review of the steps taken to process
    a SQL statement. A statement that is “hard-parsed” must execute all of the steps.
    If a statement is “soft parsed,” the optimizer generally does not execute the
    optimization and row source generation steps.


    ![images](images/t0803.jpg)


    ![images](images/t0803a.jpg)


    ##### Hard-Parsing Can Be Avoided


    By using bind variables, a hard parse can be avoided and can help the performance
    of SQL queries, as well as reduce the amount of memory thrashing that can occur
    in the shared pool. The `TKPROF` utility is one way to verify whether SQL statements
    are being re-used in the shared pool. Later, there are examples of PL/SQL code
    that use bind variables, and PL/SQL code that does not use bind variables.


    By using the `TKPROF` utility, we can see how these statements are processed.
    In order to see this information with the `TKPROF` utility, we first must turn
    tracing on within our session:


    `alter session set sql_trace=true;`


    The trace file gets generated in the location specified by the `diagnostic_dest`
    or `user_dump_dest` parameter settings. The following PL/SQL block updates the
    employees table and gives all employees a 3% raise. Since all PL/SQL variables
    are treated as bind variables, we can see with the `TKPROF` output that the update
    statement was parsed only once, but executed 107 times:


