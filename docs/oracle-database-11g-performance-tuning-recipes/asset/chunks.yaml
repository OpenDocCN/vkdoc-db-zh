    `King                      Steven                    24000       6462`


    Let''s say you want to know which departments overall had a higher salary than
    the average for your company. By placing the subquery in the `HAVING` clause,
    you can get the desired results:


    `column avg_sal format 99999.99`


    `SELECT department_id, ROUND(avg(salary),2) avg_sal`

    `FROM employees`

    `GROUP BY department_id`

    **`HAVING avg(salary) > (SELECT AVG(salary) FROM employees)`**

    `ORDER BY 2;`


    `DEPARTMENT_ID   AVG_SAL`

    `------------- ---------`

    `           40   6500.00`

    `          100   8600.00`

    `           80   8955.88`

    `           20   9500.00`

    `           70  10000.00`

    `          110  10150.00`

    `           90  19333.33`


    `8 rows selected.`


    ##### Multiple-Row Subqueries


    If you know the desired subquery is going to return multiple rows, you can use
    the `IN`, `ANY`, `ALL`, and `SOME` operators. The `IN` operator is the same as
    having multiple `OR` conditions in a select statement. For example, in the following
    SQL statement, we are getting the `DEPARTMENT_NAME` for departments 20, 30, and
    40.


    `SELECT department_id, department_name`

    `FROM departments`

