- fmt: "#### Solution\n\n数据库会自动每小时执行一次AWR快照，并将统计信息保存在AWR中八天。一份AWR报告包含两个快照之间捕获的数据，这两个快照不必是连续的。因此，AWR报告可以让您检查两个时间点之间的实例性能。您可以通过Oracle\
    \ Enterprise Manager生成AWR报告。不过，我们会向您展示如何使用Oracle提供的脚本创建AWR报告。\n\n要为单实例数据库生成AWR报告，请执行`awrrpt.sql`脚本，如下所示。\n\
    \n```\nSQL> @?/rdbms/admin/awrrpt.sql\n\nCurrent Instance\n~~~~~~~~~~~~~~~~\n\
    \   DB Id    DB Name      Inst Num Instance\n----------- ------------ --------\
    \ ------------\n1118243965 ORCL1               1 orcl1\nSpecify the Report Type\n\
    ~~~~~~~~~~~~~~~~~~~~~~~\nWould you like an HTML report, or a plain text report?\n\
    Enter 'html' for an HTML report, or 'text' for plain text\nDefaults to 'html'\n\
    Enter value for report_type: text\n\nType Specified:  \n```\n\n选择基于文本或HTML的报告。HTML报告是默认报告类型，它提供外观美观、格式良好、易于阅读的报告。按Enter键选择默认的HTML类型报告。\n\
    \n```\nInstances in this Workload Repository schema\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\
    \n   DB Id     Inst Num DB Name      Instance     Host\n------------ --------\
    \ ------------ ------------ ------------\n* 1118243965        1 ORCL1        orcl1\
    \        MIROPC61\n\nUsing 1118243965 for database Id\nUsing          1 for instance\
    \ number\n```\n\n此时您必须指定数据库的DBID。然而，在我们的示例中，只有一个数据库，因此也只有一个DBID，所以无需输入DBID。\n\n\
    ```\nSpecify the number of days of snapshots to choose from\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\
    Entering the number of days (n) will result in the most recent\n(n) days of snapshots\
    \ being listed.  Pressing <return> without\nspecifying a number lists all completed\
    \ snapshots.\nEnter value for num_days: 1\n```\n\n输入您希望数据库列出快照ID的天数。在此示例中，我们选择1，因为我们想生成一个发生在最近一天的时间段内的AWR报告。\n\
    \n```\nListing the last day's Completed Snapshots\n                          \
    \                      Snap\nInstance     DB Name        Snap Id    Snap Started\
    \    Level\n------------ ------------ --------- ------------------ -----\norcl1\
    \        ORCL1             1877 17 Apr 2011 00:00      1\n                   \
    \            1878 17 Apr 2011 07:47      1\n```\n\n为AWR报告指定一个开始和结束的快照。\n\n```\n\
    Specify the Begin and End Snapshot Ids\n~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n\
    Enter value for begin_snap: 1877\nBegin Snapshot Id specified: 1877\n\nEnter value\
    \ for end_snap: 1878\nEnd Snapshot Id specified: 1878\n```\n\n您可以通过按Enter键接受AWR报告的默认名称，或者为报告输入一个名称。\n\
    \n```\nSpecify the Report Name\n~~~~~~~~~~~~~~~~~~~~~~~\nThe default report file\
    \ name is awrrpt_1_1877_1878.txt.  To use this name,\npress <return> to continue,\
    \ otherwise enter an alternative.\n\nEnter value for report_name:\nUsing the report\
    \ name awrrpt_1_1877_1878.html\n```\n\n数据库会在您调用`awrrpt.sql`脚本的同一目录下生成AWR报告。例如，如果您选择基于HTML的报告，AWR报告将采用以下格式：`awrrpt_1_1881_1882.html`。\n\
    \n![images](images/square.jpg) `Tip` 您可以通过执行`awrsqrpt.sql`脚本来生成AWR报告，以分析单个SQL语句的性能。\n\
    \n#### How It Works\n\n您生成的AWR报告会显示两个时间点之间捕获的性能统计信息，每个时间点称为一个快照。通过仔细阅读AWR报告，您可以深入了解数据库性能。AWR报告在大多数情况下运行时间不到一分钟，并且包含大量性能信息。该报告由多个部分组成。浏览AWR报告通常可以找出数据库未达到最佳性能水平的原因。\n\
    \n要在Oracle RAC环境中为所有实例生成AWR报告，请改用`awrgrpt.sql`脚本。您可以通过使用`awrrpti.sql`脚本为RAC环境中的特定实例生成AWR报告。您还可以通过调用`awrsqrpt.sql`脚本并提供SQL语句的`SQL_ID`，为单个SQL语句生成AWR报告。\n\
    \n只要AWR拥有覆盖该时间段的快照，您就可以生成跨越任意时长的AWR报告。默认情况下，AWR将其快照保留八天。\n\n您可以随时生成AWR快照，无论是通过Oracle\
    \ Enterprise Manager还是使用`DBMS_WORKLOAD_REPOSITORY`包。当您想调查20分钟前发生的问题，而下一个快照要在40分钟后才产生时，这个能力就很有用了。在这种情况下，您必须等待40分钟或创建手动快照。以下示例展示了如何手动创建AWR快照：\n\
    \n```\nSQL> exec dbms_workload_repository.create_snapshot();\n\nPL/SQL procedure\
    \ successfully completed.\nSQL>\n```\n\n创建快照后，您可以运行`awrrpt.sql`脚本。然后选择之前的两个快照来生成最新的AWR报告。\n\
    \n当用户响应时间突然增加时，例如在高峰时段从一秒增加到十秒，您可以生成AWR报告。如果关键批处理作业突然需要更长时间才能完成，AWR报告也可能有所帮助。当然，您还必须借助操作系统工具（如`sar`、`vmstat`和`iosat`）检查该时间段内的系统CPU、I/O和内存使用情况。\n\
    \n如果系统CPU使用率很高，这并不一定意味着CPU是罪魁祸首。CPU使用率百分比并不总是吞吐量的真实度量，CPU使用率也并不总是作为数据库工作负载指标有用。请确保为观察到性能恶化的精确时间段生成AWR报告。跨度为24小时的AWR报告对于诊断两小时前仅持续了30分钟的性能下降几乎没有用处。让您的报告时间范围与性能问题的发生时间段相匹配。\n\
    \n### 7-16. Comparing Database Performance Between Two Periods\n\n#### Problem\n\
    \n您想要检查并比较数据库在两个不同时段内的性能表现。"
  raw: '#### Solution


    The database automatically takes an AWR snapshot every hour, and saves the statistics
    in the AWR for eight days. An AWR report contains data captured between two snapshots,  which
    need not be consecutive. Thus, an AWR report lets you examine  instance performance
    between two points in time.  You can generate an AWR report through Oracle Enterprise
    Manager. However, we show you how to create an AWR report using Oracle-provided
    scripts.


    To generate an AWR report for a single instance database, execute the `awrrpt.sql`
    script as shown here.


    `SQL> @?/rdbms/admin/awrrpt.sql`


    `Current Instance`

    `~~~~~~~~~~~~~~~~`

    `   DB Id    DB Name      Inst Num Instance`

    `----------- ------------ -------- ------------`

    `1118243965 ORCL1               1 orcl1`

    `Specify the Report Type`

    `~~~~~~~~~~~~~~~~~~~~~~~`

    `Would you like an HTML report, or a plain text report?`

    `Enter ''html'' for an HTML report, or ''text'' for plain text`

    `Defaults to ''html''`

    `Enter value for report_type: text`


    `Type Specified:  `


    Select a text- or an HTML-based report. The HTML report is the default report
    type, and it provides a nice-looking, well-formatted, easy-to-read report. Press
    Enter to select the default HTML-type report.


    `Instances in this Workload Repository schema`

    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`


    `   DB Id     Inst Num DB Name      Instance     Host`

    `------------ -------- ------------ ------------ ------------`

    `* 1118243965        1 ORCL1        orcl1        MIROPC61`


    `Using 1118243965 for database Id`

    `Using          1 for instance number`


    You must specify the DBID for the database at this point. In our example, however,
    there''s only one database and therefore one DBID, so there''s no need to enter
    the DBID.


    `Specify the number of days of snapshots to choose from`

    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`

    `Entering the number of days (n) will result in the most recent`

    `(n) days of snapshots being listed.  Pressing <return> without`

    `specifying a number lists all completed snapshots.`

    `Enter value for num_days: 1`


    Enter the number of days for which you want the database to list the snapshot
    IDs. In this example, we chose 1 because we want to generate an AWR for a time
    period that falls in the last day.


    `Listing the last day''s Completed Snapshots`

    `                                                        Snap`

    `Instance     DB Name        Snap Id    Snap Started    Level`

    `------------ ------------ --------- ------------------ -----`

    `orcl1        ORCL1             1877 17 Apr 2011 00:00      1`

    `                               1878 17 Apr 2011 07:47      1`


    Specify a beginning and an ending snapshot for the AWR report.


    `Specify the Begin and End Snapshot Ids`

    `~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~`

    `Enter value for begin_snap: 1877`

    `Begin Snapshot Id specified: 1877`


    `Enter value for end_snap: 1878`

    `End Snapshot Id specified: 1878`


    You can either accept the default name for the AWR report by pressing Enter, or
    enter a name for the report.


    `Specify the Report Name`

    `~~~~~~~~~~~~~~~~~~~~~~~`

    `The default report file name is awrrpt_1_1877_1878.txt.  To use this name,`

    `press <return> to continue, otherwise enter an alternative.`


    `Enter value for report_name:`

    `Using the report name awrrpt_1_1877_1878.html`


    The database generates an AWR report in the same directory from which you invoked
    the `awrrpt.sql` script. For example, if you choose an HTML-based report, the
    AWR report will be in the following format: `awrrpt_1_1881_1882.html`*.*


    ![images](images/square.jpg) **Tip** You can generate an AWR report to analyze
    the performance of a single SQL statement by executing the `awrsqrpt.sql` script.


    #### How It Works


    The AWR reports that you generate show performance statistics captured between
    two points in time, each of which is called a snapshot. You can gain significant
    insights into your database performance by reading the AWR reports carefully.
    An AWR report takes less than a minute to run in most cases, and holds a treasure
    trove of performance information. The report consists of multiple sections. Walking
    through an AWR report usually shows you the reason that your database isn''t performing
    at peak levels.


    To generate an AWR report for all instances in an Oracle RAC environment, use
    the `awrgrpt.sql` script instead. You can generate an AWR report for a specific
    instance in a RAC environment by using the `awrrpti.sql` script. You can also
    generate an AWR report for a single SQL statement by invoking the `awrsqrpt.sql`
    script and providing the `SQL_ID` of the SQL statement.


    You can generate an AWR report to span any length of time, as long as the AWR
    has snapshots covering that period. By default, the AWR retains its snapshots
    for a period of eight days.


    You can generate an AWR snapshot any time you want, either through the Oracle
    Enterprise Manager or by using the `DBMS_WORKLOAD_REPOSITORY` package. That ability
    is useful when, for example, you want to investigate a performance issue from
    20 minutes and the next snapshot is 40 minutes away. In that case, you must either
    wait 40 minutes or create a manual snapshot. Here''s an example that shows how
    to create an AWR snapshot manually:


    `SQL> exec dbms_workload_repository.create_snapshot();`


    `PL/SQL procedure successfully completed.`

    `SQL>`


    Once you create the snapshot, you can run the `awrrpt.sql` script. Then select
    the previous two snapshots to generate an up-to-date AWR report.


    You can generate an AWR report when your user response time increases suddenly,
    say from one to ten seconds during peak hours. An AWR report can also be helpful
    if a key batch job is suddenly taking much longer to complete. Of course, you
    must check the system CPU, I/O, and memory usage during the period as well, with
    the help of operating system tools such as `sar`, `vmstat`, and `iosat`.


    If the system CPU usage is high, that doesn''t necessarily mean that it''s the
    CPU that''s the culprit. CPU usage percentages are not always a true measure of
    throughput, nor is CPU usage always useful as a database workload metric. Make
    sure to generate the AWR report for the precise period that encompasses the time
    during which you noticed the performance deterioration. An AWR report that spans
    a 24-hour period is of little use in diagnosing a performance dip that occurred
    2 hours ago for only 30 minutes. Match your report to the time period of the performance
    problem.


    ### 7-16. Comparing Database Performance Between Two Periods


    #### Problem


    You want to examine and compare how the database performed during two different
    periods.'
