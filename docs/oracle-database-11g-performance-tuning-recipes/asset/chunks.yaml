    \ PL/SQL 块执行 `DBMS_ADVISOR` 包。被检查的表是 `F_REGS` 表。\n\n```sql\nDECLARE\n  my_task_id\
    \   number;\n  obj_id       number;\n  my_task_name varchar2(100);\n  my_task_desc\
    \ varchar2(500);\nBEGIN\n  my_task_name := 'F_REGS Advice';\n  my_task_desc :=\
    \ 'Manual Segment Advisor Run';\n\n ---------\n -- 步骤 1\n ---------\n  dbms_advisor.create_task\
    \ (\n  advisor_name => 'Segment Advisor',\n  task_id      => my_task_id,\n  task_name\
    \    => my_task_name,\n  task_desc    => my_task_desc);\n ---------\n -- 步骤 2\n\
    \ ---------\n  dbms_advisor.create_object (\n  task_name   => my_task_name,\n\
