    `,substr(sql_text,1,20)`

    `,disk_reads`

    `,cpu_time`

    `,elapsed_time`

    `FROM table(DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(8200,8201,`

    `            null, null, ''disk_reads'',null, null, null, 10))`

    `ORDER BY disk_reads DESC;`


    Here is a small snippet of the output:


    `SQL_ID         SUBSTR(SQL_TEXT,1,20 DISK_READS      CPU_TIME  ELAPSED_TIME`

    `-------------- -------------------- ---------- ------------- -------------`

    `achffburdff9j   delete from "MVS"."     101145     814310000     991574249`

    `5vku5ap6g6zh8  INSERT /*+ BYPASS_RE      98172      75350000      91527239`


    #### How It Works


    Before you work with SQL tuning sets, it''s critical to understand you can use
    the `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY` function to retrieve high resource-usage
    SQL from the AWR. The result sets retrieved by this PL/SQL function can be used
    as input for populating SQL tuning sets. See [Table 11-5](#Chapter11.html#tab_11_5)
    for a description of the `SELECT_WORKLOAD_REPOSITORY` function parameters.


    You have a great deal of flexibility in how you use this function. A few examples
    will help illustrate this. Say you want to retrieve SQL from the AWR that was
    not parsed by the `SYS` user. Here is the SQL to do that:


    `SELECT sql_id, substr(sql_text,1,20)`

    `,disk_reads, cpu_time, elapsed_time, parsing_schema_name`

    `FROM table(`

    `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(8200,8201,`

    `''parsing_schema_name <> ''''SYS'''''',`

    `NULL, NULL,NULL,NULL, 1, NULL, ''ALL''));`


    The following example retrieves the top ten queries ranked by buffer gets for
    non-`SYS` users:


    `SELECT`

    ` sql_id`

    `,substr(sql_text,1,20)`

    `,disk_reads`

    `,cpu_time`

    `,elapsed_time`

    `,buffer_gets`

    `,parsing_schema_name`

    `FROM table(`

    `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(`

    ` begin_snap => 21730`

    `,end_snap => 22900`

    `,basic_filter => ''parsing_schema_name <> ''''SYS''''''`

    `,ranking_measure1 => ''buffer_gets''`

    `,result_limit => 10`

    `));`


    In the prior queries, the `SYS` keyword is enclosed by two single quotes (in other
    words, those aren''t double quotes around `SYS`).


    ![images](images/t1105.jpg)


    ![images](images/t1105a.jpg)


    ### 11-9. Viewing Resource-Intensive SQL in Memory


    #### Problem


    Before populating a SQL tuning set, you want to view high-load SQL statements
    in the cursor cache in memory. You want to eventually use SQL contained in memory
    as input for populating a SQL tuning set.


    #### Solution


    Use the `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` function to view current high resource-consuming
    SQL statements in memory. This query selects SQL statements in memory that have
    required more than a million disk reads:


    `SELECT`

    ` sql_id`

    `,substr(sql_text,1,20)`

    `,disk_reads`

    `,cpu_time`

    `,elapsed_time`

    `FROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE(''disk_reads > 1000000''))`

    `ORDER BY sql_id;`


    Here is some sample output:


    `SQL_ID        SUBSTR(SQL_TEXT,1,20 DISK_READS   CPU_TIME ELAPSED_TIME`

    `------------- -------------------- ---------- ---------- ------------`

    `0s6gq1c890p4s  delete from "MVS"."    3325320 8756130000   1.0416E+10`

    `b63h4skwvpshj BEGIN dbms_mview.ref    9496353 1.4864E+10   3.3006E+10`


    #### How It Works


    Before you work with SQL tuning sets, it''s critical to understand you can use
    the `DBMS_SQLTUNE.SELECT_CURSOR_CACHE` function to retrieve high resource-usage
    SQL from memory. The result set retrieved by this PL/SQL function can be used
    as input for populating SQL tuning sets. See [Table 11-6](#Chapter11.html#tab_11_6)
    for a description of the `SELECT_CURSOR_CACHE` function parameters.


    You have a great deal of flexibility in how you use this function. Here''s an
    example that selects SQL in memory, but excludes statements parsed by the `SYS`
    user and also returns statements with an elapsed time greater than 100,000:


    `SELECT sql_id, substr(sql_text,1,20)`

    `,disk_reads, cpu_time, elapsed_time`

    `FROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE(''parsing_schema_name <> ''''SYS''''`

    `                                             AND elapsed_time > 100000''))`

    `ORDER BY sql_id;`


    In the prior query, the `SYS` keyword is enclosed by two single quotes (in other
    words, those aren''t double quotes around `SYS`). The `SQL_TEXT` column is truncated
    to 20 characters so that the output can be displayed on the page more easily.
    Here is some sample output:


    `SQL_ID        SUBSTR(SQL_TEXT,1,20 DISK_READS   CPU_TIME ELAPSED_TIME`

    `------------- -------------------- ---------- ---------- ------------`

    `byzwu34haqmh4 SELECT /* DS_SVC */           0     140000       159828`


    Once you have identified a `SQL_ID` for a resource-intensive SQL statement, you
    can view all of its execution details via this query:


    `SELECT *`

    `FROM table(DBMS_SQLTUNE.SELECT_CURSOR_CACHE(''sql_id = ''''byzwu34haqmh4''''''));`


    Note that the `SQL_ID` in the prior statement is enclosed by two single quotes
    (not double quotes).


    This next example selects the top ten queries in memory in terms of CPU time for
    non-`SYS` users:


    `SELECT`

    ` sql_id`

    `,substr(sql_text,1,20)`

    `,disk_reads`

    `,cpu_time`

    `,elapsed_time`

    `,buffer_gets`

    `,parsing_schema_name`

    `FROM table(`

    `DBMS_SQLTUNE.SELECT_CURSOR_CACHE(`

    ` basic_filter => ''parsing_schema_name <> ''''SYS''''''`

    `,ranking_measure1 => ''cpu_time''`

    `,result_limit => 10`

    `));`


    ![images](images/t1106.jpg)


    ### 11-10. Populating SQL Tuning Set from High-Resource SQL in AWR


    #### Problem


    You want to create a SQL tuning set and populate it with the top I/O-consuming
    SQL statements found in the AWR.'
  trans: "\n## 问题\n\n你正在处理一个需要分析一组 SQL 语句的性能问题。在将这些 SQL 语句作为一个集合处理之前，你需要创建一个 SQL 调优集对象。\n\
    \n## 解决方案\n\n使用 `DBMS_SQLTUNE.CREATE_SQLSET` 过程来创建一个 SQL 调优集对象——例如：\n\n```sql\n\
    BEGIN\n  DBMS_SQLTUNE.CREATE_SQLSET(\n  sqlset_name => 'HIGH_IO',\n  description\
    \ => 'High disk read tuning set');\nEND;\n/\n```\n\n前面的代码创建了一个名为 `HIGH_IO` 的调优集。至此，你已经创建了一个命名的调优集对象。该调优集尚未包含任何\
    \ SQL 语句。\n\n## 工作原理\n\n在向调优集填充 SQL 语句之前，必须先创建一个 SQL 调优集对象（有关向 STS 添加 SQL 语句的详细信息，请参见配方\
    \ 11-9 到 11-11）。你可以通过查询 `DBA_SQLSET` 视图来查看数据库中任何已定义的 SQL 调优集：\n\n```sql\nSQL>\
    \ select id, name, created, statement_count from dba_sqlset;\n```\n\n以下是一些示例输出：\n\
    \n```\n        ID NAME                           CREATED   STATEMENT_COUNT\n----------\
    \ ------------------------------ --------- ---------------\n         5 HIGH_IO\
    \                        26-APR-11               0\n```\n\n如果需要删除一个 SQL 调优集对象，则使用\
    \ `DBMS_SQLTUNE.DROP_SQLSET` 过程来删除调优集。以下示例删除了一个名为 `MY_TUNING_SET` 的调优集：\n\n```sql\n\
    SQL> EXEC  DBMS_SQLTUNE.DROP_SQLSET(sqlset_name => 'MY_TUNING_SET' );\n```\n\n\
    ### 11-8. 在 AWR 中查看资源密集型 SQL\n\n## 问题\n\n在填充 SQL 调优集之前，你想查看 AWR 中的高负载 SQL 语句。你希望最终使用\
    \ AWR 中包含的 SQL 作为填充 SQL 调优集的输入。\n\n## 解决方案\n\n可以使用 `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY`\
    \ 函数来提取存储在 AWR 中的 SQL。这个特定的查询选择了快照 8200 到 8201 之间，按磁盘读取使用类别排名前 10 的 SQL：\n\n```sql\n\
    SELECT\nsql_id\n,substr(sql_text,1,20)\n,disk_reads\n,cpu_time\n,elapsed_time\n\
    FROM table(DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(8200,8201,\n            null,\
    \ null, 'disk_reads',null, null, null, 10))\nORDER BY disk_reads DESC;\n```\n\n\
    以下是一小段输出：\n\n```\nSQL_ID         SUBSTR(SQL_TEXT,1,20 DISK_READS      CPU_TIME\
    \  ELAPSED_TIME\n-------------- -------------------- ---------- -------------\
    \ -------------\nachffburdff9j   delete from \"MVS\".\"      101145     814310000\
    \     991574249\n5vku5ap6g6zh8  INSERT /*+ BYPASS_RE       98172      75350000\
    \      91527239\n```\n\n## 工作原理\n\n在使用 SQL 调优集之前，理解你可以使用 `DBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY`\
    \ 函数从 AWR 中检索高资源使用率的 SQL 至关重要。这个 PL/SQL 函数检索的结果集可以用作填充 SQL 调优集的输入。有关 `SELECT_WORKLOAD_REPOSITORY`\
    \ 函数参数的描述，请参见表 11-5。\n\n你使用这个函数有很大的灵活性。几个例子将帮助说明这一点。假设你想从 AWR 中检索不是由 `SYS` 用户解析的\
    \ SQL。执行此操作的 SQL 如下：\n\n```sql\nSELECT sql_id, substr(sql_text,1,20)\n,disk_reads,\
    \ cpu_time, elapsed_time, parsing_schema_name\nFROM table(\nDBMS_SQLTUNE.SELECT_WORKLOAD_REPOSITORY(8200,8201,\n\
    'parsing_schema_name <> ''SYS''',\nNULL, NULL,NULL,NULL, 1, NULL, 'ALL'));\n```\n\
