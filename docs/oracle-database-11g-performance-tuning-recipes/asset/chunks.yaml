    ### 8-5. Constructing Simple Subqueries


    #### Problem


    You need to retrieve data from the database, but cannot get the data you need
    using a single query.


    #### Solution


    It is common that data needs from a relational database are complex enough that
    the data cannot be retrieved within a single SQL `SELECT` statement. Rather than
    having to run two or more queries serially, it is possible to construct several
    SQL `SELECT` statements and place them within a single query. These additional
    `SELECT` statements are called subqueries, sub-selects, or nested selects.


    Let''s say you want to get the name of the employee with the highest salary in
    your company so you can ask your boss for a raise. Since you don''t know what
    the highest salary is, you first have to run a query to determine the following:


    `SELECT MAX(salary) FROM employees;`


    `MAX(SALARY)`

    `-----------`

    `      24000`


    Then, knowing what the highest salary is, you could run a second query to get
    the employee(s) with that salary:


    `SELECT last_name, first_name`

    `FROM employees`

    `WHERE salary = 24000;`


    `LAST_NAME                 FIRST_NAME`

    `------------------------- --------------------`

    `King                      Steven`


    It''s very simple to combine the foregoing two queries, and construct a single
    SQL statement with a subquery to accomplish the same task:


    `SELECT last_name, first_name`

    `FROM employees`

    `WHERE salary =`

    `(SELECT MAX(salary) FROM employees);`


    `LAST_NAME                 FIRST_NAME`

    `------------------------- --------------------`

    `King                      Steven`'
  trans: "\n#### 解决方案\n\n你需要展示所有地点，因此内连接在此情况下无法实现。此时，可以使用所谓的外连接。注意以下示例中的 `(+)` 语法：\n\
    \n```sql\nSELECT l.location_id, city, department_id, department_name\nFROM locations\
    \ l, departments d\nWHERE l.location_id = d.location_id(+)\nORDER BY 1;\n```\n\
    \n```\nLOCATION_ID CITY                 DEPARTMENT_ID DEPARTMENT_NAME\n-----------\
    \ -------------------- ------------- -------------------------\n       1100 Venice\n\
    \       1400 Southlake                       60 IT\n       1500 South San Francisco\
    \             50 Shipping\n       1700 Seattle                        170 Manufacturing\n\
    \       1700 Seattle                        240 Sales\n       1700 Seattle   \
    \                     270 Payroll\n       1700 Seattle                       \
    \ 120 Treasury\n       1700 Seattle                        110 Accounting\n  \
    \     1700 Seattle                        100 Finance\n       1700 Seattle   \
    \                      30 Purchasing\n       1800 Toronto                    \
    \     20 Marketing\n       2000 Beijing\n       2400 London                  \
    \        40 Human Resources\n       2700 Munich                          70 Public\
    \ Relations\n       3200 Mexico City\n```\n\n要在传统的 Oracle SQL 中指定外连接，只需在 `WHERE`\
    \ 子句的连接条件中，在你已知有缺失数据的表的列旁边放置一个带括号的加号。从前述案例我们知道，有些地点没有被分配到任何一个部门。从结果中，我们可以看到那些没有分配部门的地点。\n\
    \n要使用 ISO SQL 语法执行相同的查询，你可以使用 `LEFT OUTER JOIN` 或 `RIGHT OUTER JOIN` 子句，它们可以简写为\
    \ `LEFT JOIN` 或 `RIGHT JOIN`——例如：\n\n```sql\nSELECT location_id, city, department_id,\
    \ department_name\nFROM locations LEFT JOIN departments d\nUSING (location_id)\n\
    ORDER BY 1;\n```\n\n现在假设你需要执行一个查询，其中连接的任一侧的任一张表都可能缺失一个或多个对应的行。一种方法是创建两个外连接查询的并集：\n\
    \n```sql\nSELECT last_name, first_name, department_name\nFROM employees e, departments\
    \ d\nWHERE e.manager_id = d.manager_id(+)\nUNION\nSELECT last_name, first_name,\
    \ department_name\nFROM employees e, departments d\nWHERE e.manager_id(+) = d.manager_id\n\
    ORDER BY department_name, last_name, first_name;\n```\n\n```\nLAST_NAME      \
    \           FIRST_NAME           DEPARTMENT_NAME\n------------------------- --------------------\
    \ -------------------------\nGietz                     William              Accounting\n\
    \                                                 Administration\n           \
    \                                      Benefits\nCambrault                 Gerald\
    \               Executive\nChen                      John                 Finance\n\
    \                                                 Government Sales\n         \
    \                                        Human Resources\nPataballa          \
    \       Valli                IT\n                                            \
    \     Manufacturing\nFay                       Pat                  Marketing\n\
    \                                                 Payroll\n                  \
    \                               Public Relations\nTobias                    Sigal\
    \                Purchasing\nTucker                    Peter                Sales\n\
    \                                                 Shareholder Services\nSarchand\
    \                  Nandita              Shipping\n                           \
    \                      Treasury\nLee                       Linda\nMorse      \
    \               Steve\n```\n\n从前面的结果中，我们可以看到所有管理部门的员工、所有不管理部门的员工，以及那些没有指定经理的部门。\n\
    \n要使用 ISO SQL 语法进行相同的查询，请使用 `FULL OUTER JOIN` 子句，它可以简写为 `FULL JOIN`：\n\n```sql\n\
    SELECT last_name, first_name, department_name\nFROM employees FULL JOIN departments\n\
    USING (manager_id);\n```\n\n#### 工作原理\n\n根据你的具体情况，实际上可以进行三种外连接。表 8-2 描述了所有可能的连接条件。使用传统语法或\
    \ ISO SQL 语法的 SQL 语句都是完全可以接受的。然而，ISO SQL 通常比传统的 Oracle SQL 更容易编写、阅读和维护。\n\nISO\
    \ 语法的主要优点之一是，对于多表连接，所有的连接条件都在 `FROM` 子句中指定，因此是隔离的且易于查看。在 Oracle SQL 中，连接条件在 `WHERE`\
    \ 子句中指定，与查询所需的任何其他过滤条件放在一起。如果你继承了结构不佳的 SQL 代码，那么阅读那些连接条件和过滤条件交织在单个 `WHERE` 子句中的更长、更复杂的\
    \ SQL 语句就会更加困难。\n\n另一种尚未提及的连接类型是交叉连接，即笛卡尔连接。虽然这种连接类型很少有用，但偶尔会带来便利。假设你是一名 DBA，正在为企业数据库收集数据库大小信息，并将结果放在一个电子表格中。你需要为每个查询获取数据库和主机信息。你可以执行以下查询：\n\
    \n```sql\nSELECT d.name, i.host_name, round(sum(f.bytes)/1048576) megabytes\n\
    FROM v$database d\nCROSS JOIN v$instance i\nCROSS JOIN v$datafile f\nGROUP BY\
    \ d.name, i.host_name;\n```\n\n```\nNAME      HOST_NAME                      \
    \ MEGABYTES\n--------- ------------------------------ ----------\nORCL      DREGS-PC\
    \                             2333\n```\n\n在这种情况下，`v$instance` 和 `v$database`\
    \ 视图只包含一行数据，因此进行笛卡尔连接没有问题。上述连接也可以用传统的 Oracle SQL 来编写：\n\n```sql\nSELECT d.name,\
    \ i.host_name, round(sum(f.bytes)/1048576) megabytes\nFROM v$database d, v$instance\
    \ i, v$datafile f\nGROUP BY d.name, i.host_name;\n```\n\n![images](img/t0802.jpg)\n\
    \n### 8-5. 构建简单子查询\n\n#### 问题\n\n你需要从数据库中检索数据，但无法使用单个查询获取所需的数据。\n\n#### 解决方案\n\
    \n关系数据库的数据需求往往很复杂，以至于无法在单个 SQL `SELECT` 语句中检索数据，这是很常见的。与其必须串行运行两个或多个查询，不如构建多个\
    \ SQL `SELECT` 语句并将它们放在一个查询中。这些额外的 `SELECT` 语句被称为子查询、子选择或嵌套选择。\n\n假设你想获取公司里薪水最高的员工姓名，以便向你的老板要求加薪。由于你不知道最高薪水是多少，你必须先运行一个查询来确定：\n\
    \n```sql\nSELECT MAX(salary) FROM employees;\n```\n\n```\nMAX(SALARY)\n-----------\n\
    \      24000\n```\n\n然后，知道了最高薪水是多少，你可以运行第二个查询来获取拿该薪水的员工：\n\n```sql\nSELECT last_name,\
    \ first_name\nFROM employees\nWHERE salary = 24000;\n```\n\n```\nLAST_NAME   \
    \              FIRST_NAME\n------------------------- --------------------\nKing\
    \                      Steven\n```\n\n将前述两个查询组合起来，并构建一个带子查询的单个 SQL 语句来完成相同的任务，是非常简单的：\n\
    \n```sql\nSELECT last_name, first_name\nFROM employees\nWHERE salary =\n(SELECT\
    \ MAX(salary) FROM employees);\n```\n\n```\nLAST_NAME                 FIRST_NAME\n\
    ------------------------- --------------------\nKing                      Steven\n\
    ```\n"
- fmt: "#### How It Works\n\nWithin a SQL statement, a subquery can be placed within\
    \ the `SELECT`, `WHERE`, or `HAVING` clauses. You can also place a query within\
    \ the `FROM` clause, which is also called an inline view, which is addressed in\
    \ a different recipe. There are several kinds of subqueries that can be constructed:\n\
    \n*   Single-row or scalar subquery\n*   Multiple-row subquery\n*   Multiple-column\
    \ subquery\n*   Correlated subquery (addressed in a different recipe)\n\nThe subquery\
    \ itself is also called an inner query. Except for correlated subqueries, the\
    \ inner query is executed first, and then the results of the inner query are passed\
    \ to the outer query, which is then executed.\n\n##### Single-Row Subqueries\n\
    \nSingle-row subqueries return a single column of a single row. The example shown\
    \ in the “Solution” section is a single-row subquery. Use caution and be certain\
    \ that the subquery can return only a single value; otherwise you can get an error\
    \ from your subquery:\n\n```sql\nSELECT last_name, first_name\nFROM employees\n\
    WHERE salary =\n(SELECT salary FROM employees WHERE department_id = 30);\n```\n\
    \n```\n(SELECT salary FROM employees WHERE department_id = 30)\n *\nERROR at line\
    \ 4:\nORA-01427: single-row subquery returns more than one row\n```\n\nIn the\
    \ foregoing example, there are multiple employees in department 30, so the subquery\
    \ would return all of the matching rows.\n\nIf you want to see how your salary\
    \ stacks up against the average salaries of employees in your company, you can\
    \ issue a subquery in the `SELECT` clause to accomplish this:\n\n```sql\nSELECT\
    \ last_name, first_name, salary, ROUND((SELECT AVG(salary) FROM employees)) avg_sal\n\
    FROM employees\nWHERE last_name = 'King';\n```\n\n```\nLAST_NAME             \
    \    FIRST_NAME               SALARY    AVG_SAL\n------------------------- --------------------\
    \ ---------- ----------\nKing                      Steven                    24000\
    \       6462\n```\n\nLet's say you want to know which departments overall had\
    \ a higher salary than the average for your company. By placing the subquery in\
    \ the `HAVING` clause, you can get the desired results:\n\n```sql\ncolumn avg_sal\
    \ format 99999.99\n\nSELECT department_id, ROUND(avg(salary),2) avg_sal\nFROM\
    \ employees\nGROUP BY department_id\nHAVING avg(salary) > (SELECT AVG(salary)\
    \ FROM employees)\nORDER BY 2;\n```\n\n```\nDEPARTMENT_ID   AVG_SAV\n-------------\
    \ ---------\n           40   6500.00\n          100   8600.00\n           80 \
    \  8955.88\n           20   9500.00\n           70  10000.00\n          110  10150.00\n\
    \           90  19333.33\n\n8 rows selected.\n```\n\n##### Multiple-Row Subqueries\n\
    \nIf you know the desired subquery is going to return multiple rows, you can use\
    \ the `IN`, `ANY`, `ALL`, and `SOME` operators. The `IN` operator is the same\
    \ as having multiple `OR` conditions in a select statement. For example, in the\
    \ following SQL statement, we are getting the `DEPARTMENT_NAME` for departments\
    \ 20, 30, and 40.\n\n```sql\nSELECT department_id, department_name\nFROM departments\n\
    WHERE department_id = 20\nOR department_id = 30\nOR department_id = 40;\n```\n\
    \n```\nDEPARTMENT_ID DEPARTMENT_NAME\n------------- ------------------------------\n\
    \           20 Marketing\n           30 Purchasing\n           40 Human Resources\n\
    ```\n\nUsing the `IN` operator, we can simplify our SQL statement and achieve\
    \ the same result:\n\n```sql\nSELECT department_id, department_name\nFROM departments\n\
    WHERE department_id IN (20,30,40);\n```\n\nThe `ANY` and `SOME` operators function\
    \ identically. They are used to compare a value retrieved from the database to\
    \ each value shown in the list of values in the query. They are used with the\
    \ comparison operators =, !=, <>, <, <=, >, or >=. Use care with `ANY` or `SOME`,\
    \ as it evaluates each value separately, without regard to the entire list of\
    \ values. For example, using the same query to get the department name for departments\
    \ 20, 30, or 40, if we modify this query to use `ANY` or `SOME`, we can see how\
    \ Oracle evaluates each value in the `ANY` clause. Because we used the `ANY` clause,\
    \ departments 10, 20, and 30 were included in the result, even though departments\
    \ 20 and 30 were within our `ANY` clause. This is because each value is evaluated\
    \ separately before the result set is returned.\n\n```sql\nSELECT department_id,\
    \ department_name\nFROM departments\nWHERE department_id < ANY (20,30,40);\n```\n\
    \n```sql\nSELECT department_id, department_name\nFROM departments\nWHERE department_id\
    \ < SOME (20,30,40);\n```\n\n```\nDEPARTMENT_ID DEPARTMENT_NAME\n-------------\
    \ ------------------------------\n           10 Administration\n           20\
    \ Marketing\n           30 Purchasing\n```\n\nThe `ALL` operator essentially uses\
    \ a logical `AND` operator to do the comparison of values shown in the query.\
    \ While with the `ANY` operator, each value was compared individually to see if\
    \ there was a match, the `ALL` operator needs to compare every value in the list\
    \ before determining if there is a match. Using our department table as an example,\
    \ see the following query. In this query, we are retrieving the department names\
    \ from the table if the `DEPARTMENT_ID` value is less than or equal to *all* values\
    \ in the list:\n\n```sql\nSELECT department_id, department_name\nFROM departments\n\
    WHERE department_id <= ALL (20,30,40);\n```\n\n```\nDEPARTMENT_ID DEPARTMENT_NAME\n\
    ------------- ------------------------------\n           10 Administration\n \
    \          20 Marketing\n```\n\n##### Multiple-Column Subqueries\n\nAt times,\
    \ you need to match data based on multiple columns. If placed within the `WHERE`\
    \ clause, the column list needs to be placed within parentheses. As an example,\
    \ if you want to get a list of the employees with the highest salary in their\
    \ respective departments, you can write a multiple-column subquery such as the\
    \ following:\n\n```sql\nSELECT last_name, first_name, department_id, salary\n\
    FROM employees\nWHERE (department_id, salary) IN\n(SELECT department_id, max(salary)\n\
    FROM employees\nGROUP BY department_id)\nORDER BY department_id;\n```\n\n```\n\
    LAST_NAME                 FIRST_NAME           DEPARTMENT_ID     SALARY\n-------------------------\
    \ -------------------- ------------- ----------\nWhalen                    Jennifer\
    \                        10       4400\nHartstein                 Michael    \
    \                     20      13000\nRaphaely                  Den           \
    \                  30      11000\nMavris                    Susan            \
    \               40       6500\nFripp                     Adam                \
    \            50       8200\nHunold                    Alexander              \
    \         60       9000\nBaer                      Hermann                   \
    \      70      10000\nRussell                   John                         \
    \   80      14000\nKing                      Steven                          90\
    \      24000\nGreenberg                 Nancy                          100   \
    \   12000\nHiggins                   Shelley                        110      12000\n\
    \n11 rows selected.\n```\n\n### 8-6. Constructing Correlated Subqueries\n\n####\
    \ Problem\n\nYou are writing a subquery to retrieve data from a given set of tables\
    \ from your database, but in order to retrieve the proper results, you really\
    \ need to reference the outer query from inside the inner query.\n\n#### Solution\n\
    \nThe correlated subquery is a powerful component of the SQL language. The reason\
    \ it is called “correlated” is that it allows you to reference the outer query\
    \ from within the inner query. For example, we want to see all the jobs each current\
    \ employee has ever held in the company:\n\n```sql\nSELECT employee_id, job_id\n\
    FROM job_history h\nWHERE job_id in\n(SELECT job_id FROM employees e\nWHERE e.job_id\
    \ = h.job_id)\nORDER BY 1;\n```\n\n```\nEMPLOYEE_ID JOB_ID\n----------- ----------\n\
    \        101 AC_ACCOUNT\n        101 AC_MGR\n        102 IT_PROG\n        114\
    \ ST_CLERK\n        122 ST_CLERK\n        176 SA_REP\n        176 SA_MAN\n   \
    \     200 AD_ASST\n        200 AC_ACCOUNT\n        201 MK_REP\n\n10 rows selected.\n\
    ```"
