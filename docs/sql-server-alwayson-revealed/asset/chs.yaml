  ### 配置 MSDTC


  如果你的 `SQL Server` 实例使用分布式事务，或者你正在安装 `SQL Server Integration Services (SSIS)`，那么它依赖于
  `MSDTC`（Microsoft 分布式事务协调器）。如果你的实例将使用 `MSDTC`，则需要确保其配置正确。如果未正确配置，安装程序会成功，但依赖于它的事务可能会失败。


  在群集上安装时，`SQL Server` 会自动使用 `MSDTC` 的实例



  ## 第三章 ■ 实现群集


  ### MSDTC 实例放置策略


  如果存在，则使用安装在同一角色中的实例。如果不存在，则使用已映射到它的 `MSDTC` 实例（如果已执行此映射）。如果没有映射，则使用群集的默认 `MSDTC`
  实例；如果也没有默认实例，则使用本地计算机的 `MSDTC` 实例。


  许多 `DBA` 选择将 `MSDTC` 与 `SQL Server` 安装在同一角色中；然而，这会带来一个问题。如果 `MSDTC` 发生故障，也可能导致 `SQL
  Server` 实例宕机。当然，群集会尝试在另一个节点上重新启动这两个应用程序，但这仍然会涉及停机时间，包括在新节点上恢复数据库所需的时间，这个时间是不确定的。因此，我建议将
  `MSDTC` 安装在一个单独的角色中。如果这样做，`SQL Server` 实例仍然可以使用 `MSDTC`，因为它是群集的默认实例，并且消除了 `MSDTC`
  导致 `SQL Server` 中断的可能性。这比使用映射实例或本地计算机实例更可取，因为它避免了不必要的配置，并且当群集的 `SQL Server` 实例使用它时，`MSDTC`
  实例也应该是群集化的。


  ### 通过 GUI 创建 MSDTC 角色


  要创建 `MSDTC` 角色，首先在故障转移群集管理器中，从“角色”上下文菜单中选择“配置角色”选项。这将启动“高可用性向导”。在向导的“选择角色”页面上，选择“分布式事务协调器
  (DTC)”角色类型，如图 3-24 所示。


  `图 3-24.` 选择角色页面

  ![](img/index-64_1.jpg)


  在如图 3-25 所示的“客户端访问点”页面上，您需要为 `MSDTC` 输入一个虚拟名称和 IP 地址。在我们的例子中，我们将其命名为 `ALWAYSON-MSDTC-C`
  并分配 `192.168.0.50` 作为 IP 地址。在多子网群集中，您需要为每个网络提供一个 IP 地址。


  `图 3-25.` 客户端访问点页面


  在向导的“选择存储”页面上，选择您计划用于存储 `MSDTC` 文件的群集磁盘，如图 3-26 所示。在我们的例子中，这是 `磁盘 4`。


  `图 3-26.` 选择存储页面

  ![](img/index-65_1.jpg)

  ![](img/index-65_2.jpg)


  “确认”页面显示了即将创建的角色的概览，如图 3-27 所示。


  `图 3-27.` 确认页面


  ### 通过 PowerShell 创建 MSDTC 角色


  或者，我们可以在 `PowerShell` 中创建此角色。清单 3-4 中的脚本首先使用 `Add-ClusterServerRole` cmdlet 来创建角色。我们将用于该角色的虚拟名称传递给
  `Name` 参数，将要使用的群集磁盘名称传递给 `Storage` 参数，并将该角色的 IP 地址传递给 `StaticAddress` 参数。


  然后，我们使用 `Add-ClusterResource` cmdlet 来添加 `DTC` 资源。`Name` 参数为资源命名，`ResourceType`
  参数指定它是一个 `DTC` 资源。然后，我们需要在角色内的资源之间创建依赖关系。使用 `GUI` 时我们不需要这样做，因为依赖关系是自动为我们创建的。资源依赖关系指定了其他资源所依赖的资源。一个资源失败会通过链传播，并可能导致角色脱机。例如，在我们
  `ALWAYSON-MSDTC-C` 角色的例子中，如果磁盘或虚拟名称中的任何一个变得不可用，`DTC` 资源就会脱机。Windows Server 支持具有
  `AND` 和 `OR` 约束的多重依赖关系。正是 `OR` 约束使得多子网群集成为可能，因为一个资源可以依赖于 IP 地址 `A` 或 IP 地址 `B`。最后，我们需要使用
  `Start-ClusterGroup` cmdlet 使角色联机。


  `清单 3-4.` 创建 MSDTC 角色

  ```

  #创建角色

  Add-ClusterServerRole -Name ALWAYSON-MSDTC-C -Storage "Cluster Disk 3" -StaticAddress
  192.168.0.50


  #创建 DTC 资源

  ```



  ```markdown

  Add-ClusterResource -Name MSDTC-ALWAYSON-MSDTC-C -ResourceType "分布式事务协调器" -Group
  ALWAYSON-MSDTC-C


  #创建依赖关系


  Add-ClusterResourceDependency MSDTC-ALWAYSON-MSDTC-C ALWAYSON-MSDTC-C


  Add-ClusterResourceDependency MSDTC-ALWAYSON-MSDTC-C "Cluster Disk 3"


  #使角色联机


  Start-ClusterGroup ALWAYSON-MSDTC-C


  ### 配置角色


  创建角色后，您可能希望对其进行配置，以更改故障转移策略或配置节点为首选所有者。要配置角色，请从角色的上下文菜单中选择“属性”。在如`图 3-28`所示的“属性”对话框的“常规”选项卡上，您可以将一个节点配置为角色的首选所有者。您还可以通过在“首选所有者”窗口中将节点上移或下移来更改节点优先级的顺序。


  ![](img/index-67_1.jpg)


  `图 3-28.` “常规”选项卡


  您还可以选择在多个角色同时故障转移到另一个节点时该角色的优先级。此设置的选项如下：


  - 高

  - 中

  - 低

  - 无自动启动


  我们将配置`ALWAYSON-MSDTC-C`角色以高优先级进行故障转移。


  ![](img/index-68_1.jpg)


  在“属性”对话框的“故障转移”选项卡上，您可以配置在角色被脱机之前，在给定时间段内可以故障转移的次数。默认值为 6 小时内一次故障。这里的问题是，如果一个角色发生故障转移，并且您在原始节点上修复问题后将其故障恢复回来，那么在
  6 小时窗口内将不允许更多的故障转移。这显然是一个风险，我通常建议您更改此设置。在我们的例子中，我们已将该角色配置为在 24 小时窗口内最多允许三次故障转移，如`图
  3-29`所示。我们还配置了该角色，如果首选所有者再次可用，则故障恢复到该所有者。请记住，在设置自动故障恢复时，故障恢复与故障转移一样会导致停机。如果您追求极高的可用性，例如五个
  9（99.999%），那么此选项可能不合适。我们将配置`ALWAYSON-MSDTC-C`角色以允许在 24 小时期间进行三次故障转移。我们还将配置该角色以允许立即故障恢复。


  `图 3-29.` “故障转移”选项卡


  ### 小结


  在创建集群之前，必须在所有节点上安装 Microsoft 群集服务 (MCS)。这可以通过使用“添加角色和功能向导”安装“故障转移群集”功能来实现。


  安装“故障转移群集”功能后，即可在每个节点上使用“创建群集向导”配置群集。在构建群集之前，此向导将提示您运行“群集验证向导”。“群集验证向导”将验证环境是否满足群集的要求。如果您发现环境不符合要求，仍然可以继续构建群集，但安装将不受
  Microsoft 支持。


  群集构建完成后，还需要对其进行配置。这将包括配置仲裁模式，也可能包括配置 MSDTC。在群集上创建角色后，您可能还希望使用故障转移策略或首选所有者来配置该角色。


