  ('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n('Edward', 'James'),\n\
  ('Marie', 'Andrews'),\n('Jennifer', 'Abraham'),\n('Margaret', 'Jones') ;\n\nINSERT\
  \ INTO App1Customers(Firstname, LastName, CreditCardNumber)\nSELECT FirstName, LastName,\
  \ CreditCardNumber FROM\n(SELECT\n(SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID())\
  \ FirstName\n,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName\n,(SELECT\
  \ CONVERT(VARBINARY(8000)\n,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\n\
  WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number\
  \ * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND 99 ORDER BY NEWID())\n\
  + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number\
  \ BETWEEN 10 AND 99 ORDER BY NEWID())\n+ '-' +\n(SELECT TOP 1 CAST(Number * 100\
  \ AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND 99 ORDER BY NEWID())))\n\
  CreditCardNumber\nFROM @Numbers a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c\n\
  ) d ;\nGO\n\nSET STATISTICS TIME OFF\nGO\n```\n\n此查询的相关结果展示在`清单 5-7`中。你可以看到，当`可用性组`运行在`同步提交模式`下时，索引重建慢了三倍，`INSERT`操作慢了近两倍，`DELETE`操作也略微慢了一些。\n\
  \n## 第五章：使用 AlwaysOn 可用性组实现高可用性\n\n#### 清单 5-7：SQL Server 2016 性能测试结果\n\n```\nBegin\
