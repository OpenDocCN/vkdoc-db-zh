  ### AlwaysOn 可用性组

  ### AlwaysOn 可用性组


  AlwaysOn 可用性组取代了数据库镜像，它本质上是数据库镜像和集群技术的融合。在集群的每个节点上，SQL Server 以独立实例（而不是 AlwaysOn
  故障转移集群实例）的形式安装。然后，一个名为可用性组侦听器的集群感知应用程序被安装在集群上；它用于将流量定向到正确的节点。然而，AOAG 不依赖于共享磁盘，而是压缩日志流并将其发送到其他节点，其方式类似于数据库镜像。

  AlwaysOn 可用性组取代了数据库镜像，它本质上是数据库镜像与故障转移群集技术的融合。在群集的每个节点上，SQL Server 以独立实例（而非 AlwaysOn
  故障转移群集实例）的形式安装。然后，一个名为“可用性组侦听器”的、群集感知的应用程序会安装在群集上；它用于将流量定向到正确的节点。然而，AOAG 不依赖于共享磁盘，而是压缩日志流并将其发送到其他节点，其方式类似于数据库镜像。


  在 SQL Server 2016 之前，AlwaysOn 可用性组仅在 SQL Server 的企业版中受支持。然而，在 SQL Server 2016 中，标准版开始支持
  AlwaysOn 可用性组，但仅提供基本功能。标准版中的基本功能仅支持两个副本。这旨在作为标准版对数据库镜像（仅限高安全模式）支持的替代方案。

  在 SQL Server 2016 之前，AlwaysOn 可用性组仅在 SQL Server 企业版中受支持。然而，在 SQL Server 2016 中，标准版开始支持
  AlwaysOn 可用性组，但仅提供基本功能。标准版中的基本功能仅支持两个副本。这旨在替代标准版对数据库镜像（仅限高安全模式）的支持。


  在你拥有写入量较小的中小型数据库场景下，AOAG 是最合适的高可用性技术。这是因为，当使用同步模式时，它要求在数据提交到主数据库之前，先提交到所有同步副本。然而，与数据库镜像不同，你最多可以拥有八个副本，其中包括两个同步副本。在虚拟化环境中实现高可用性时，AOAG
  也可能是最合适的技术。这是因为集群所需的共享磁盘可能与虚拟化环境的某些功能不兼容。例如，当虚拟机使用通过光纤通道呈现的共享磁盘时，VMware 不支持使用 vMotion（用于在物理服务器之间手动移动虚拟机）和分布式资源调度器（用于根据资源利用率在物理服务器之间自动移动虚拟机）。

