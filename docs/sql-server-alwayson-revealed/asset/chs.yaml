- "# 索引 207\n\nx\n\n![](img/index-10_1.jpg)\n\n## 关于作者\n\n**Peter A. Carter** 是一位\
  \ SQL Server 专家，拥有超过十年的开发、管理和架构设计经验，涉及 SQL Server 平台、数据层应用程序和 ETL 解决方案。Peter 对 SQL\
  \ Server 充满热情，并希望他对这项技术的热忱能够帮助或激励他人。\n\nxi\n\n![](img/index-11_1.jpg)\n\n## 关于技术审校者\n\
  \n**Bradley Beard** 是一名软件工程师，拥有超过 15 年使用 ColdFusion 和 SQL Server 编写动态交互式网站的经验。他于\
  \ 2007 年从佛罗里达理工学院毕业，获得计算机信息系统硕士学位，并在赫兹大学攻读了计算机信息系统和技术管理的本科学位。2013 年，他获得了微软的 MCSA:\
  \ SQL Server 2012 认证，2016 年，他又获得了 MCSE: Business Intelligence 认证。他对学习的持续追求使他在家里和工作场所都拥有满架的书籍，其中大部分是关于\
  \ SQL Server、ColdFusion 或通用 Web 架构的。\n\n\n\n### 框架。\n\n他与妻子杰西卡以及孩子们乔希、凯莉、马修和艾玛居住在佛罗里达州的棕榈湾。显然，他还经营着一个动物收容所，成员包括他的狗狗\
  \ Lady 和 Bella，以及猫咪 Spice、Simba、Mercury 和 Dobby。闲暇时，他喜欢钓鱼，并与妻子和孩子们共度时光。\n\n可通过 `bradley.beard@gmail.com`\
  \ 联系布拉德利，咨询关于 ColdFusion 和 SQL Server 的事宜，或洽谈第三班次远程工作。\n\n### xiii\n\n### 致谢\n\n\
  我要感谢伊恩·斯特克和保罗·格鲁布，他们都对本书第一版提供了有益且建设性的反馈。我已尝试将他们的建议纳入本版。\n\n我还要特别感谢劳伦斯·尤，他帮助我解决了本书所用实验室环境中子网之间的路由问题。\n\
  \n### xv\n\n## 第 1 章 高可用性与灾难恢复概念\n\n在当今运行关键任务应用程序的 24×7 环境中，企业严重依赖于其数据的可用性。尽管服务器及其软件通常可靠，但始终存在硬件故障或软件缺陷的风险，这些都可能导致服务器宕机。为减轻这些风险，关键业务应用程序通常依赖冗余硬件来提供容错能力。如果主系统发生故障，应用程序可以自动故障转移到冗余系统。这是高可用性\
  \ (HA) 的基本原理。\n\n即使实施了 HA 技术，仍然存在导致应用程序不可用的小概率事件风险。这可能是由于重大事件造成的，例如自然灾害或恐怖行为导致的数据中心损毁，也可能是由于数据损坏或人为错误，导致应用程序数据丢失或损坏到无法修复的程度。\n\
  \n在这些情况下，一些应用程序可能依赖于恢复最新备份以尽可能多地恢复数据。然而，更关键的应用程序可能需要在辅助位置设置一台冗余服务器来保存数据的同步副本。这是灾难恢复\
  \ (DR) 的基本概念。本章讨论 HA 和 DR 背后的概念。\n\n### 可用性级别\n\n解决方案可供最终用户使用的时长称为 `可用性级别` 或 `正常运行时间`。为了提供真实的正常运行时间情况，公司应从用户的桌面测量解决方案的可用性。换句话说，即使您的\
  \ SQL Server 已连续运行超过一个月，用户仍可能因其他因素而经历其解决方案的中断。这些因素可能包括网络中断或应用程序服务器故障。\n\n**电子补充材料**\
  \ 本章的在线版本 ([doi:10.1007/978-1-4842-2397-0_1](http://dx.doi.org/10.1007/978-1-4842-2397-0_1))\
  \ 包含补充材料，可供授权用户使用。\n\n© Peter A. Carter 2016\nP. A. Carter, *SQL Server AlwaysOn\
  \ Revealed*, DOI 10.1007/978-1-4842-2397-0_1\n\n然而，在某些情况下，您别无选择，只能在 SQL Server 级别测量\
  \ `可用性级别`。这可能是因为企业内部缺乏整体监控工具。但最常见的是，在实例级别测量 `可用性级别` 的要求是出于政治而非技术原因。在 IT 行业，将数据中心管理外包给第三方提供商已成为一种趋势。在这种情况下，负责管理\
  \ SQL 服务器的提供商不一定是负责网络或应用程序服务器的提供商。在这种情况下，您需要在 SQL Server 级别监控正常运行时间，以准确判断服务提供商的性能。\n\
  \n`可用性级别` 是以应用程序可用时间占总时间的百分比来衡量的...\n\n\n\n服务器是否可用。企业通常努力达到 99%、99.9%、99.99%或 99.999%的可用性。因此，可用性水平通常用“几个\
  \ 9”来指代。例如，五个 9 的可用性意味着 99.999%的正常运行时间，三个 9 则意味着 99.9%的正常运行时间。\n\n表 1-1 详细列出了每个可用性级别对应的每周、每月和每年可接受的停机时间。\n\
  \n`表 1-1. 可用性级别`\n\n`可用性级别` | `每周停机时间` | `每月停机时间` | `每年停机时间`\n--- | --- | --- |\
  \ ---\n99% | 1 小时 40 分 48 秒 | 7 小时 18 分 17 秒 | 3 天 15 小时 39 分 28 秒\n99.9% | 10 分\
  \ 4 秒 | 43 分 49 秒 | 8 小时 45 分 56 秒\n99.99% | 1 分钟 | 4 分 23 秒 | 52 分 35 秒\n99.999%\
  \ | 6 秒 | 26 秒 | 5 分 15 秒\n\n*所有数值均向下取整到最接近的秒。*\n\n要计算其他级别的可用性，你可以使用`代码清单 1-1`中的脚本。运行此脚本前，请将`@Uptime`的值替换为你希望计算的正常运行时间级别。你还应将`@UptimeInterval`的值替换为相应的每周、每月或每年的运行时间间隔。\n\
  \n`代码清单 1-1. 计算可用性级别`\n\n```sql\nDECLARE @Uptime DECIMAL(5,3) ;\n--指定要计算的正常运行时间级别\n\
  SET @Uptime = 99.9 ;\n\nDECLARE @UptimeInterval VARCHAR(5) ;\n--指定 WEEK, MONTH,\
  \ 或 YEAR\nSET @UptimeInterval = 'YEAR' ;\n\nDECLARE @SecondsPerInterval FLOAT ;\n\
  --计算每个时间间隔的总秒数\nSET @SecondsPerInterval =\n(\n    SELECT CASE\n        WHEN @UptimeInterval\
  \ = 'YEAR'\n            THEN 60*60*24*365.243\n        WHEN @UptimeInterval = 'MONTH'\n\
  \            THEN 60*60*24*30.437\n        WHEN @UptimeInterval = 'WEEK'\n     \
  \       THEN 60*60*24*7\n    END\n) ;\n\nDECLARE @UptimeSeconds DECIMAL(12,4) ;\n\
  --计算允许的停机秒数\nSET @UptimeSeconds = @SecondsPerInterval * (100-@Uptime) / 100 ;\n\n\
  --格式化结果\nSELECT\n    CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60/24)) + ' 天,\
  \ '\n    + CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60 % 24)) + ' 小时, '\n \
  \   + CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60 % 60)) + ' 分钟, '\n    + CONVERT(VARCHAR(12),\
  \ FLOOR(@UptimeSeconds % 60)) + ' 秒。' ;\n```\n\n### 服务级别协议与服务级别目标\n\n当由第三方提供商负责管理服务器时，合同通常包含服务级别协议（`SLAs`）。这些`SLAs`定义了诸多参数，包括可接受的停机时间、故障发生时服务器可停机的最长时间，以及故障发生时可接受的数据丢失量。通常，如果未能满足这些`SLAs`，提供商将面临经济处罚。\n\
  \n如果服务器由内部管理，数据库管理员（`DBAs`）仍然有客户（customers）的概念。这些客户通常是应用程序的最终用户，主要联系人是业务负责人（business\
  \ owner）。应用程序的业务负责人是组织内委托该应用程序并负责签署资金增强等事项的利益相关者。\n\n在内部场景中，仍然可以定义`SLAs`，在这种情况下，如果未能满足这些`SLAs`，`IT\
  \ 基础设施`或`平台`部门可能需要向业务团队承担费用结算（charge-back）责任。然而，在内部场景中，`IT`部门与业务团队协商确定服务级别目标（`SLOs`）要比制定`SLAs`常见得多。`SLOs`在本质上与`SLAs`非常相似，但采用`SLOs`意味着业务方不会在未能达成目标时对`IT`部门施加经济处罚。\n\
  \n### 主动维护\n\n重要的是要记住，停机时间不仅由故障引起，也由主动维护引起。例如，如果你需要为操作系统或`SQL Server`本身打上最新的服务包，那么在安装过程中必然需要一些停机时间。\n\
  \n根据你所应用的升级类型，在这种情况下的停机时间可能\n\n\n\n## 第 1 章 高可用性与灾难恢复概念\n\n### 恢复点目标与恢复时间目标\n\n\
  应用程序的恢复点目标（`RPO`）指明了在发生故障时可接受的数据丢失量。例如，对于一个支持报表应用程序的数据仓库，由于它可能每天只通过一个 `ETL`（提取、转换和加载）流程更新一次，而所有其他活动都是只读报表，因此这个周期可能较长，比如\
  \ 24 小时。然而，对于高事务性系统，例如支持交易平台或 Web 应用程序的 `OLTP`（联机事务处理）数据库，`RPO` 将为零。`RPO` 为零意味着不可接受任何数据丢失。\n\
  \n应用程序的高可用性和灾难恢复可能有不同的 `RPO`。例如，出于成本或应用程序性能的考虑，站点内故障转移可能要求 `RPO` 为零。但是，如果同一应用程序故障转移到\
  \ `DR`（灾难恢复）数据中心，则可能可接受五到十分钟的数据丢失。这是因为实现站点内可用性和站点间恢复所用的技术存在差异。\n\n应用程序的恢复时间目标（`RTO`）指定了从故障发生到恢复完成且用户可以重新连接之前，应用程序可以停机的最大时间。在计算可实现的应用程序\
  \ `RTO` 时，需要考虑许多方面。例如，集群从一个节点故障转移到另一个节点，并且 `SQL Server` 服务重新启动可能只需不到一分钟；然而，数据库恢复可能需要更长得多的时间。数据库恢复所需的时间取决于许多因素，包括数据库的大小、实例中的数据库数量以及故障转移发生时有多少事务正在处理中。这是因为所有未提交的事务都需要回滚。\n\
  \n就像 `RPO` 一样，根据是站点内还是站点间故障转移，存在不同的 `RTO` 也是很常见的。同样，这主要是由于技术差异造成的，但也考虑了如果主数据中心丢失，你需要花费多少时间在\
  \ `DR` 数据中心启动整个环境。\n\n在发生数据损坏的情况下，应用程序的 `RPO` 和 `RTO` 也可能有所不同。根据损坏的性质以及已实施的 `HA/DR`\
  \ 技术，数据损坏可能导致你需要从备份中还原数据库。\n\n如果必须还原数据库，最坏的情况是可实现的还原点可能是上次备份的时间。这意味着你必须将特定 `RPO`\
  \ 的硬性业务要求纳入备份策略。但是，如果只有部分数据库损坏，你或许可以从实时数据库中抢救一些数据，并且只从还原后的数据库中还原损坏的数据。\n\n数据损坏也可能影响\
  \ `RTO`。最大的影响因素之一是备份是存储在本地服务器上，还是需要从磁带中检索。从磁带，甚至从异地位置检索备份文件，很可能会显著增加恢复过程的时间。\n\n\
  另一个影响因素是导致损坏的原因。如果是由有故障的 `IO` 子系统引起的，那么你可能需要留出时间让 Windows 管理员对卷运行磁盘检查命令（`CHKDSK`），并可能需要更多时间来更换磁盘。但是，如果损坏是由用户意外截断表或删除数据文件引起的，则无需担心此问题。\n\
  \n### 停机成本\n\n如果你询问任何业务负责人，他们的应用程序可以接受多长的停机时间\n\n\n\n## 第 1 章 ■ 高可用性与灾难恢复概念\n\n\
  当被问及可容忍多少数据丢失时，答案无一例外都是零和零。当然，保证零停机时间是永远不可能的，而一旦你开始解释不同可用性级别所关联的成本，就更容易协商出一个双方都能接受的服务水平。\n\
  \n决定你应该努力实现多少个“9”的关键因素是停机成本。停机成本分为两类：有形成本和无形成本。有形成本通常比较容易计算。让我们以一个销售应用为例。在这种情况下，最明显的有形成本是收入损失，因为销售人员无法接单。无形成本则更难量化，但可能昂贵得多。例如，如果客户无法在你的公司下单，他们可能会在竞争对手的公司下单，并且再也不回来。其他无形成本可能包括员工士气低落导致的更高人员流失率，甚至公司声誉损失。由于无形成本的本质使其只能估算，行业的经验法则是将有形成本乘以三，并用这个数字来代表你的无形成本。\n\
  \n一旦你有了应用程序总停机成本的每小时数字，你就可以将这个数字按应用程序的预计生命周期进行扩展，并比较实施不同可用性级别的成本。例如，假设你计算出你的总停机成本是每小时`$2,000`，而你的应用程序的预计生命周期是三年。表\
  \ 1-2 说明了你的应用程序的停机成本，比较了你为实施每个可用性级别所计算出的成本（已计入硬件、许可证、电力、布线、额外存储、额外支持设备（如新机架）、管理成本等）。这被称为解决方案的总拥有成本（`TCO`）。\n\
  \n**表 1-2.** 停机成本\n\n| 可用性级别 | 停机成本（三年） | 可用性解决方案成本 |\n| :--- | :--- | :--- |\n\
  | 99% | `$525,600` | `$108,000` |\n| 99.9% | `$52,560` | `$224,000` |\n| 99.99%\
  \ | `$5,256` | `$462,000` |\n| 99.999% | `$526` | `$910,000` |\n\n在此表中，你可以看到，实现五个\
  \ 9 的可用性比两个 9 的解决方案节省了`$525,074`，但实施该解决方案的成本额外增加了`$802,000`，这意味着它不经济。四个 9 的可用性比两个\
  \ 9 的解决方案节省了`$520,344`，而实施成本仅额外增加了`$354,000`。因此，对于这个特定的应用程序，设计为四个 9 的解决方案是最合适的服务水平。\n\
  \n### 备用服务器分类\n\n备用解决方案分为三类。你可以使用不同的技术实现每一类，尽管某些技术可用于实现多个类别的备用服务器。表 1-3 概述了你可以实现的不同备用类别。\n\
  \n**表 1-3.** 备用分类\n\n| 类别 | 描述 | 技术示例 |\n| :--- | :--- | :--- |\n| 热备 | 一种同步解决方案，故障转移可自动或手动发生。常用于高可用性。\
  \ | 集群、`AlwaysOn 可用性组（同步）` |\n| 温备 | 一种同步解决方案，故障转移只能手动发生。常用于灾难恢复。 | `日志传送`、`AlwaysOn\
  \ 可用性组（异步）` |\n| 冷备 | 一种未同步的解决方案，故障转移只能手动发生。这仅适用于永不修改的只读数据。 | - |\n\n**注意** 冷备未列出技术示例，因为不需要同步，因此也不需要特定的技术实现。\n\
  \n### 总结\n\n你的应用程序的可用性级别是以正常运行时间占总时间的百分比来衡量的...\n\n\n\n应用程序面向用户可用。其可用性水平常以“9”的个数来描述。例如，99.9%的正常运行时间要求被称为“三个\
  \ 9”的可用性。对正常运行时间的要求越高，实现解决方案的成本就越高。因此，您努力要达到的可用性水平应由服务级别协议（SLA）和停机成本来驱动。\n\n恢复点目标是衡量在发生灾难时可接受丢失多少数据的指标。例如，如果您唯一的灾难恢复解决方案是备份，并且备份计划每小时执行一次，那么您可以实现一小时的恢复点目标。\n\
  \n恢复时间目标是衡量在发生故障后恢复解决方案所需时间的指标。例如，如果您设定的恢复时间目标是 30 分钟，那么您必须能够在半小时内恢复服务。\n\n确定应用程序的停机成本非常重要，因为这是决定您可用性水平的主要驱动因素之一。停机成本包括有形成本和无形成本。有形成本可以计算，而无形成本需要估算。\n\
  \n冗余基础设施有助于维护您的应用程序和服务的可用性。冗余服务器将被分类为热、温或冷。热备服务器是与活动服务器保持同步并配置为允许自动故障转移的服务器。这适用于高可用性（HA）场景。温备服务器是与活动服务器保持同步，但未配置为自动故障转移的服务器。相反，必须由工程师手动执行故障转移。这适用于灾难恢复（DR）场景。冷备服务器不与活动服务器保持同步，因此无法自动故障转移。冷备服务器适用于所有数据为只读且从不修改的灾难恢复场景。\n\
  \n"
- '# 第 2 章


  ## 理解高可用性与灾难恢复技术


  SQL Server 提供了一套完整的技术来实现高可用性和灾难恢复。本章概述了这些技术，并讨论了它们最适用的场景。


  ### AlwaysOn 故障转移集群


  Windows 集群是一种提供高可用性的技术，其中一组最多 64 台服务器协同工作以提供冗余。AlwaysOn 故障转移集群实例（FCI）是一个 SQL Server
  实例，跨越此组内的服务器。如果该组内的一台服务器发生故障，另一台服务器将接管该实例的所有权。其最适用的场景是数据库规模较大或写入负载较高的高可用性场景。这是因为集群依赖于共享存储，这意味着数据只写入磁盘一次。而对于
  SQL Server 级别的高可用性技术，写入操作会在主数据库上执行，然后在所有辅助数据库上再次执行，之后才在主数据库上完成提交。这可能会导致性能问题。


  尽管可以将集群扩展到多个站点，但在 Windows Server 2012 R2 及更早版本中，这需要 SAN 复制，这意味着集群通常配置在单个站点内。当配置了
  SAN 复制时，故障转移到辅助站点不是自动的（除非您创建自定义脚本来自动化此过程）。这是因为必须停止 SAN 复制，并且 SAN 在灾难恢复站点的 LUN 需要手动设为可写。在
  SAN 复制处于活动状态时，它们将呈现给灾难恢复服务器为只读。


  Windows Server 2016 通过引入存储副本（SR）技术解决了此问题。SR 旨在提供一种不依赖于 SAN 复制的地理集群解决方案，它执行与存储无关的块级数据同步。SR
  可以在同步或异步模式下工作，在同步模式下使用时会产生性能开销，而在异步模式下使用则存在潜在的数据丢失风险。


