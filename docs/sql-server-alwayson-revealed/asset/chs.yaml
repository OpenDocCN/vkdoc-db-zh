  ## 第二章 ■ 理解高可用性与灾难恢复技术


  P. A. Carter, *SQL Server AlwaysOn 技术揭秘*, DOI 10.1007/978-1-4842-2397-0_2


  ![](img/index-21_1.jpg)


  Windows Server 2016 还引入了站点感知集群功能，通过增强节点间心跳检测和故障转移行为等操作，提高了多站点集群的可管理性。此版本的 Windows
  也移除了对所有集群节点必须位于同一域中的依赖，这意味着集群可以跨越多个域，甚至可以存在于工作组中。


  集群中的每台服务器称为一个节点。因此，如果一个集群由三台服务器组成，则称为三节点集群。集群中的每个节点都安装了 SQL Server 二进制文件，但 SQL Server
  服务仅在其中一个节点上启动，该节点称为活动节点。集群中的每个节点还共享用于 SQL Server 数据和日志文件的相同存储。然而，该存储仅附加到活动节点。


  如果活动节点发生故障，则 SQL Server 服务将停止，存储将被分离。然后，存储会重新附加到集群中的另一个节点，并在该节点（现在成为活动节点）上启动 SQL
  Server 服务。该实例还会被分配自己的网络名称和 IP 地址，这些也会绑定到活动节点。这意味着应用程序可以无缝连接到该实例，无论哪个节点拥有所有权。


  图 2-1 中的示意图说明了一个双节点集群。它显示尽管数据库存储在共享存储阵列上，但每个节点仍然有一个专用的系统卷。该卷包含 SQL Server 二进制文件。它还说明了在发生故障转移时，共享存储、IP
  地址和网络名称如何重新绑定到被动节点。


  **图 2-1.** 双节点集群


  ![](img/index-22_1.jpg)


  ### 主动/主动配置


  虽然图 2-1 说明了主动/被动配置，但也可能采用主动/主动配置。尽管一次不可能有一个以上的节点拥有一个实例，因此无法实现负载均衡，但可以在集群上安装多个实例，并且不同的节点可以拥有每个实例。在此场景中，每个节点都有其唯一的网络名称和
  IP 地址。每个实例的共享存储也由一组唯一的卷组成。


  因此，在主动/主动配置中，在正常操作期间，`Node1` 可能托管 `Instance1`，`Node2` 可能托管 `Instance2`。如果 `Node1`
  发生故障，则两个实例都将由 `Node2` 托管，反之亦然。图 2-2 中的示意图说明了一个双节点主动/主动集群。


  **图 2-2.** 主动/主动集群


  ■ **注意** 在主动/主动集群中，考虑故障转移时的资源至关重要。例如，如果每个节点有 128GB 的 RAM，并且托管在每个节点上的实例使用了 96GB 的
  RAM 并在内存中锁定页面，那么当一个节点故障转移到另一个节点时，该节点也会因为没有足够的内存分配给两个实例而失败。请确保您规划内存和处理器需求时，将两个节点视为一台服务器。因此，通常不建议为
  SQL Server 使用主动/主动集群。


  ![](img/index-23_1.jpg)


  ### 三节点以上配置


  如前所述，一个集群最多可以拥有 64 个节点。当您拥有三个或更多节点时，由于相关成本，您不太可能只保留一个活动节点和两个冗余节点。相反，您可以选择实施 `N+1`
  或 `N+M` 配置。


  在 `N+1` 配置中，您拥有多个活动节点和一个被动节点。如果




  ## 第 2 章 理解高可用性与灾难恢复技术


  活动节点中的任何一个发生故障，它们都会故障转移到被动节点。图 2-3 中的示意图描绘了一个三节点的 `N+1` 集群。


  **图 2-3.** 三节点 `N+1` 配置


  在 `N+1` 配置中，在多重故障场景下，多个节点可能会故障转移到被动节点。因此，在规划资源时必须非常小心，以确保被动节点能够支持多个实例。不过，你可以通过使用
  `N+M` 配置来缓解这个问题。


  `N+1` 配置拥有多个活动节点和一个被动节点，而 `N+M` 集群则拥有多个活动节点和多个被动节点，尽管被动节点的数量通常少于活动节点。图 2-4 展示了一个五节点的
  `N+M` 配置。图中显示，Instance3 被配置为始终故障转移到其中一个被动节点，而 Instance1 和 Instance2 被配置为始终故障转移到另一个被动节点。这让你可以灵活地控制被动节点上的资源，但你也可以将集群配置为允许任何活动节点故障转移到任一被动节点——如果这更适合你的环境设计的话。


  **图 2-4.** 五节点 `N+M` 配置


  ### 仲裁


  为了能够进行自动故障转移，集群服务需要知道节点是否宕机。为此，你必须形成一个仲裁。仲裁的定义是“为开展业务所需的最少成员数量”。在高可用性方面，这意味着集群内的每个节点，以及一个可选的见证设备（可以是集群磁盘或集群外部的文件共享），都会获得一票投票权。如果超过半数的投票成员无法与某个节点通信，那么集群服务就会知道该节点已宕机，并将该服务器上任何感知集群的应用程序故障转移到另一个节点。之所以要求超过半数的投票成员无法与该节点通信，是为了避免一种称为*脑裂*的情况。


  为了解释脑裂场景，想象一下数据中心 1 中有三个节点，数据中心 2 中有三个节点。现在假设两个数据中心之间的网络连接中断，但所有六个节点仍然在线。数据中心 1
  中的三个节点认为数据中心 2 中的所有节点都不可用。反之，数据中心 2 中的节点认为数据中心 1 中的节点不可用。这使得集群的双方（称为分区）都认为自己应该取得控制权。这对于成功连接到其中任一分区的任何应用程序都可能产生不可预测且不希望的后果。`仲裁
  = (投票成员数 / 2) + 1` 这个公式可以防范此场景。


  **提示** 如果你的集群失去了仲裁，你可以通过使用 `/fq` 开关启动集群服务来强制使一个分区联机。如果你使用的是 Windows Server 2012
  R2 或更高版本，那么你强制联机的分区被视为*权威分区*。这意味着当连接恢复时，其他分区可以自动重新加入集群。


  #### 表 2-1. 仲裁模型


  **仲裁模型** | **适用场景**

  ---|---

  节点多数 | 当集群中的节点数为奇数时

  节点 + 磁盘见证多数 | 当集群中的节点数为偶数时

  节点 + 文件共享见证多数 | 当节点分布在多个站点，或节点数为偶数时




  ## Windows Server 2016 高可用与灾难恢复技术


  ### 避免使用共享磁盘的仲裁配置


  当节点分布在多个站点，但没有第三个数据中心来托管文件共享仲裁见证时，需要避免使用共享磁盘。这种仲裁模型是 Windows Server 2016 中的新功能。


  **本章稍后将讨论因虚拟化而需要避免使用共享磁盘的原因。**


  虽然默认选项是“一节点一票”，但可以通过将 `NodeWeight` 属性更改为零来手动移除节点的投票权。这在你拥有**多子网集群**（节点分布在多个站点的集群）时非常有用。在此场景中，建议在第三个站点使用文件共享见证。这有助于避免因数据中心之间的网络故障导致的集群中断。然而，如果仲裁中的节点数为奇数，那么添加文件共享见证会使总票数变为偶数，这是危险的。移除辅助数据中心中一个节点的投票权可以消除此问题。


  > **注意：** 文件共享见证和仲裁见证不存储仲裁数据库的完整副本。这意味着带有文件共享见证的双节点集群容易受到一种称为**脑裂**的场景影响。在此场景中，如果你正在修补或更改第二个节点的集群服务时其中一个节点发生故障，那么将没有最新的仲裁数据库副本。这会使你陷入需要销毁并重建集群的境地。


  ### 动态仲裁与解决 50% 节点分割的方法


  Windows Server 2012 R2 引入了动态仲裁和用于处理 50% 节点分割的“打破僵局”概念。


  当启用动态仲裁时，集群服务会根据集群中的节点数量自动决定是否赋予仲裁见证投票权。

  *   如果节点数为偶数，则见证被赋予投票权。

  *   如果节点数为奇数，则见证不被赋予投票权。


  用于 50% 节点分割的“打破僵局”概念扩展了这一理念。如果你有偶数个节点并使用见证，而见证发生故障，那么集群服务会自动从集群内一个随机节点移除其投票权。这能维持仲裁中的奇数票数，降低因见证故障导致集群离线的风险。


  > **注意：** 集群将在第 3 章和第 4 章中更深入地讨论。


  ### 数据库镜像


  数据库镜像是一种可以同时提供高可用性和灾难恢复配置的技术。与依赖 Windows 集群服务不同，数据库镜像完全在 SQL Server 内部实现，并在数据库级别（而非实例级别）提供可用性。它的工作原理是压缩事务日志记录，并通过
  TCP 端点将它们发送到辅助服务器。


  数据库镜像拓扑精确包含一个主服务器、一个辅助服务器和一个可选的见证服务器。


  数据库镜像是一项已弃用的技术，这意味着它将在未来的 SQL Server 版本中被移除。然而，在 SQL Server 2014 中，它仍然可以发挥作用。例如，如果你正在将数据层应用程序从
  SQL Server 2008（当时不支持 AlwaysOn 可用性组，但已实现了数据库镜像）升级，并且预计应用程序的生命周期将在下一个主要 SQL Server
  版本发布之前结束，那么你可以继续使用数据库镜像。一些组织，特别是 Windows 管理团队与 SQL Server DBA 团队之间存在脱节的组织，也选择在数据库镜像被移除之前不实现
  AlwaysOn 可用性组（特别是用于灾难恢复），这是因为其相对复杂性和涉及多团队协作的特点。




  ## 第二章 ■ 理解高可用性与灾难恢复技术


  在管理 AlwaysOn 环境时，数据库镜像也可能很有用。当你通过并行迁移方式将数据层应用程序从旧版 SQL Server 升级时，情况也是如此。这是因为你可以同步数据库，并以最小的停机时间进行故障转移。如果升级不成功，你可以以最小的工作量和停机时间将它们移回原始服务器。


  数据库镜像可以配置为在三种不同模式下运行：高性能模式、高安全模式以及带自动故障转移的高安全模式。在高性能模式下运行时，数据库镜像以异步方式工作。数据在主体数据库上提交，然后被发送到镜像数据库，随后在镜像数据库上提交。这意味着在发生故障时有可能丢失数据。如果数据丢失，恢复点是最老的未提交事务的开始时刻。这意味着你无法保证依赖于异步镜像来实现可用性的恢复点目标，因为它是不确定的。在此配置中也不支持自动故障转移。因此，异步镜像提供的是灾难恢复解决方案，而非高可用性解决方案。图
  2-5 中的图表展示了一个配置为高性能模式的镜像拓扑。


  ![](img/index-27_1.jpg)


  **图 2-5.** 高性能模式下的数据库镜像


  在带自动故障转移的高安全模式下运行时，数据在镜像服务器上以同步方式提交，而非异步方式。这意味着数据在主体服务器提交之前，先在镜像服务器提交。这可能会导致性能下降，并且需要两台服务器之间有快速的网络链路。网络延迟应小于
  3 毫秒。


  为了支持自动故障转移，数据库镜像拓扑需要形成一个仲裁。为了实现仲裁，它需要一台第三服务器。这台服务器称为见证服务器，它用于在主体服务器和镜像服务器失去网络连接时进行仲裁。因此，如果主体服务器和镜像服务器位于不同的站点，最佳实践是将见证服务器放在与主体服务器相同的数据中心，而不是与镜像服务器放在一起。这可以降低因数据中心之间网络中断而导致它们被隔离并引发故障转移的可能性。图
  2-6 中的图表展示了一个配置为带自动故障转移的高安全模式的数据库镜像拓扑。


  ![](img/index-28_1.jpg)


  **图 2-6.** 带自动故障转移的高安全模式下的数据库镜像


  高安全模式结合了另外两种模式的缺点。你会遇到与带自动故障转移的高安全模式相同的性能下降，但同时你也会遇到与高性能模式相关的手动服务器故障转移。高安全模式提供的优势在于，当见证服务器离线时，它具有弹性。如果数据库镜像失去见证服务器，为了避免脑裂场景而挂起镜像会话，它会切换到高安全模式。这意味着数据库镜像继续运行，但没有自动故障转移。高安全模式在计划内故障转移场景中也很有用。如果你的主体服务器在线，但需要进行维护性故障转移，那么你可以切换到高安全模式。这实质上是将数据库置于安全状态，不存在数据丢失的可能性，而无需你配置见证服务器。然后你就可以故障转移数据库。在维护工作完成并将数据库故障恢复后，



  then you can revert to High Performance mode.

  这样，你就可以切换回高性能模式。


