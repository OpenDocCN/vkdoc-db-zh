  \ Server Execution Times:\nCPU time = 12500 ms, elapsed time = 21671 ms.\n\nInsert\
  \ into table\n\nSQL Server Execution Times:\nCPU time = 6454 ms, elapsed time =\
  \ 8771 ms.\n\nBegin synchronous commit benchmark\n\nBuild a nonclustered index\n\
  \nSQL Server Execution Times:\nCPU time = 4610 ms, elapsed time = 15709 ms.\n\n\
  Delete from table\n\nSQL Server Execution Times:\nCPU time = 11468 ms, elapsed time\
  \ = 27389 ms.\n\nInsert into table\n\nSQL Server Execution Times:\nCPU time = 7562\
