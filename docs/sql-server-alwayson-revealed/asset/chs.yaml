  也可能是最合适的技术。这是因为群集所需的共享磁盘可能与虚拟化环境的某些功能不兼容。例如，当虚拟机使用通过光纤通道呈现的共享磁盘时，VMware 不支持使用 vMotion（用于在物理服务器之间手动移动虚拟机）和分布式资源调度器（用于根据资源利用率在物理服务器之间自动移动虚拟机）。


