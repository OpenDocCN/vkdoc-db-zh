  ## 第二章 ■ 理解高可用性与灾难恢复技术


  ### 自动页修复


  ■ `注意` 第五章和第六章将更详细地讨论 AlwaysOn 可用性组。


  如果配置为 AlwaysOn 可用性组拓扑中副本的数据库中某个页面损坏，SQL Server 会尝试通过从某个辅助副本获取该页面的副本来修复损坏。这意味着无需你执行还原操作或运行带有修复选项的
  `DBCC CHECKDB`，即可解决逻辑损坏问题。但是，自动页修复不适用于以下页面类型：


  - 文件头页

  - 数据库引导页

  - 分配页

  - `GAM`（全局分配图）

  - `SGAM`（共享全局分配图）

  - `PFS`（页可用空间）


  如果主副本因页面损坏而无法读取该页面，它会首先将该页面记录在 `MSDB.dbo.suspect_pages` 表中。然后，它会检查是否有至少一个副本处于 `SYNCHRONIZED`
  状态，并且事务仍在发送给该副本。如果满足这些条件，主副本会向所有副本发送广播，指定 `PageID` 和刷新日志结束时的 `LSN`（日志序列号）。随后，该页面将被标记为恢复挂起，这意味着任何访问它的尝试都将失败，并返回错误代码
  829。


  收到广播后，辅助副本会等待，直到它们重做了广播消息中指定的 `LSN` 之前的事务。此时，它们会尝试访问该页面。如果无法访问，则返回错误。如果能够访问该页面，它们会将页面发送回主副本。主副本接受第一个响应的辅助副本发来的页面。


  随后，主副本将用从辅助副本收到的版本替换损坏的页面副本。此过程完成后，它会通过将 `MSDB.dbo.suspect_pages` 表中的 `event_type`
  列设置为值 5（已修复）来更新该页面，以反映其已被修复。


  如果辅助副本在重做日志时因页面损坏而无法读取该页面，它会将该辅助副本置于 `SUSPENDED` 状态。然后，它会将该页面记录在 `MSDB.dbo.suspect_pages`
  表中，并向主副本请求该页面的副本。主副本尝试访问该页面。如果无法访问，则返回错误，辅助副本保持 `SUSPENDED` 状态。


  如果主副本能够访问该页面，它会将页面发送给发出请求的辅助副本。辅助副本用从主副本获得的版本替换损坏的页面。然后，它使用 `event_id` 为 5 更新 `MSDB.dbo.suspect_pages`
  表。最后，它尝试恢复 AOAG 会话。


  ■ `注意` 可以手动恢复会话，但如果这样做，同步期间会再次遇到损坏的页面。请确保先在主副本上修复或还原该页面。


  ![](img/index-34_1.jpg)


  ### 日志传送


  日志传送是一种可用于实现灾难恢复的技术。其工作原理是备份主体服务器上的事务日志，将其复制到辅助服务器，然后还原它。在需要加载延迟的灾难恢复场景中，使用日志传送最为合适，因为
  AOAG 无法实现此功能。举个加载延迟可能有用的场景例子：假设用户意外删除了表中的所有数据。如果在更新 DR 服务器上的数据库之前存在延迟，则可以从 DR 服务器恢复该表的数据，然后重新填充生产服务器。这意味着你无需还原备份来恢复数据。日志传送不适用于高可用性，因为存在




  ## 第 2 章 ■ 理解高可用性与灾难恢复技术


  不提供自动故障转移功能。图 2-9 中的图表展示了一个日志传送拓扑。


  **图 2-9.** 日志传送拓扑


  ![](img/index-35_1.jpg)


  ### 恢复模式


  在日志传送拓扑中，始终只有一个主体服务器，即生产服务器。然而，可以存在多个辅助服务器，这些服务器可以是灾难恢复服务器和用于卸载报表负载的服务器的混合体。


  当你还原事务日志时，可以指定三种恢复模式：`Recovery`、`NoRecovery` 和 `Standby`。`Recovery` 模式使数据库上线，但这不被日志传送支持。`NoRecovery`
  模式使数据库保持离线，以便可以还原更多备份。这是日志传送的常规配置，也是灾难恢复场景的合适选择。


  `Standby` 选项使数据库上线，但处于只读状态，以便你可以还原更多备份。此功能通过维护一个事务撤销文件来工作。`TUF` 文件记录了事务日志中所有未提交的事务。这意味着你可以回滚事务日志中的这些未提交事务，从而使数据库更易于访问（尽管是只读的）。下次需要应用还原时，你可以在下一个日志还原的重做阶段开始之前，将
  `TUF` 文件中的未提交事务重新应用到日志中。


  图 2-10 展示了一个同时使用灾难恢复服务器和报表服务器的日志传送拓扑。


  **图 2-10.** 使用灾难恢复服务器和报表服务器的日志传送


  ## 第 2 章 ■ 理解高可用性与灾难恢复技术


  ### 远程监视服务器


  可以选择在日志传送拓扑中配置一个监视服务器。这有助于你集中监控和警报。当你实现监视服务器时，所有备份、复制和还原操作的历史记录和状态都存储在该监视服务器上。监视服务器还允许你设置单个警报作业，该作业被配置为监控所有服务器上的备份、复制和还原操作，而不是在拓扑中的每个服务器上配置单独的警报。


  **`注意`** 如果你希望使用监视服务器，在设置日志传送时配置它非常重要。日志传送配置完成后，添加监视服务器的唯一方法是拆除并重新配置日志传送。


  #### 故障转移


  与其他高可用性和灾难恢复技术不同，执行日志传送故障转移需要一定的管理工作量。要进行日志传送故障转移，你必须备份事务日志的尾部，并将其连同任何其他未复制的备份文件一起复制到辅助服务器。


  现在你需要按顺序将剩余的事务日志备份应用到辅助服务器，最后应用尾日志备份。你应用最终还原时使用 `WITH RECOVERY` 选项，以使数据库在一致状态下重新上线。如果你不打算故障恢复回去，可以将辅助服务器重新配置为新的主体服务器来重新配置日志传送。


  ### 组合技术


  为了满足业务目标和非功能性需求，你需要将多种高可用性和灾难恢复技术组合在一起，以创建一个可靠、可扩展的平台。这方面的一个经典示例是要求将 AlwaysOn 故障转移群集与
  AlwaysOn 可用性组结合使用。


  你可能需要组合这些技术的原因是，当你在同步模式下使用 AlwaysOn 可用性组时（为了进行自动故障转移必须这样做），它可能会导致性能障碍。如本章前面所讨论的，该性能问题是由事务在辅助服务器上提交后才在主服务器上提交所引起的。而群集技术则不存在此问题，




  然而，由于它依赖于一个共享磁盘资源，因此事务只会提交一次。


  因此，常见的做法是首先使用集群来实现高可用性，然后使用 AlwaysOn 可用性组来执行灾难恢复和/或卸载报表负载。图 2-11 中的图表展示了一种 HA/DR
  拓扑，它结合了集群和 AOAG，分别用于实现高可用性和灾难恢复。


  ![](img/index-37_1.jpg)


  ## 第 2 章 ■ 理解高可用性与灾难恢复技术


  ### 图 2-11. 集群与 AlwaysOn 可用性组结合


  图 2-11 中的图表显示，数据库的主副本托管在一个双节点主动/被动集群上。如果主动节点发生故障，则适用集群规则，共享存储、网络名称和 IP 地址会重新附加到被动节点，该节点随后成为主动节点。然而，如果两个节点均无法访问，可用性组侦听器会将流量指向集群的第三个节点，该节点位于灾难恢复站点，并通过日志流复制进行同步。当然，当使用异步模式时，数据库必须由数据库管理员手动执行故障转移。


  另一种常见场景是结合使用集群和日志传送，分别实现高可用性和灾难恢复。这种组合的工作方式与集群结合 AlwaysOn 可用性组非常相似，并在图 2-12.中进行了说明。


  ![](img/index-38_1.jpg)


  ## 第 2 章 ■ 理解高可用性与灾难恢复技术


  ### 图 2-12. 集群与日志传送结合


  该图表显示，在主数据中心配置了一个双节点主动/被动集群。然后，托管在此实例上的数据库的事务日志被传送到灾难恢复数据中心的一台独立服务器。由于集群使用共享存储，您还应该为备份卷使用共享存储，并将备份卷作为资源添加到角色中。这意味着当实例故障转移到另一个节点时，备份共享也会随之故障转移，日志传送继续同步，不会中断。


  > `注意` 如果在日志传送备份或复制作业正在进行时发生故障转移，则日志传送可能会失去同步并需要手动干预。这意味着故障转移后，您应该检查日志传送作业的运行状况。


  ### 总结


  SQL Server 提供了一套完整的高可用性和灾难恢复技术，使您能够灵活地实施最符合数据层应用程序需求的解决方案。对于高可用性，您可以实施 AlwaysOn
  集群或 AlwaysOn 可用性组 (AOAG)。集群使用共享磁盘资源，故障转移发生在实例级别。另一方面，AOAG 通过维护带有同步日志流的数据库冗余副本，在数据库级别同步数据。数据库镜像在
  SQL Server 2014 中也可用，但它是一项已弃用的功能，将在未来版本的 SQL Server 中移除。


  要实现灾难恢复，您可以选择实施 AOAG 或日志传送。日志传送通过备份、复制和还原数据库的事务日志来工作，而 AOAG 则使用异步日志流来同步数据。


  也可以将多种 HA 和 DR 技术结合在一起，以实施最合适的可用性策略。常见的例子是将用于高可用性的集群与用于提供 DR 的 AOAG 或日志传送相结合。


