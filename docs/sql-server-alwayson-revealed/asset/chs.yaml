  `MSDTC` 的驱动器。如图 3-19 所示。


  **图 3-19.** 群集摘要


  ![](img/index-60_1.jpg)


  我们可以通过进入群集的上下文菜单并选择 `更多操作 | 配置群集仲裁设置` 来修改此设置，这将调用“配置群集仲裁向导”。在“选择仲裁配置选项”页面（如图 3-20
  所示），我们选择 `选择仲裁见证` 选项。


  **图 3-20.** “选择仲裁配置选项”页面


  在“选择仲裁见证”页面，我们选择要配置的仲裁类型。当群集中有偶数个节点且所有节点位于同一数据中心时，或者当主数据中心有偶数个节点而辅助数据中心有另一个节点时，磁盘见证最合适。


  当节点分布在两个数据中心，并且你可以访问第三个数据中心（其中有一个可用作仲裁的文件共享）时，文件共享见证最合适。


  云见证是 `Windows 2016` 的一项新功能，当节点分布在两个数据中心且没有可用的第三个数据中心来设置文件共享见证时最合适。要使用云见证，你必须拥有 `Azure`
  存储账户，因为见证将在 `Azure BLOB` 存储中创建。


  在单一数据中心中有奇数个节点的情况下，不配置见证是最合适的。


  对于我们的场景，我们将选择配置磁盘见证的选项。如图 3-21 所示。


