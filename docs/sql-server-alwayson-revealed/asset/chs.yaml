  应用程序连接字符串中的读取意向属性会将应用程序指向合适的节点。这意味着你可以轻松地横向扩展报表和数据库维护例程，只需很少的开发工作量，并且应用程序能够使用单一连接字符串。


  ### SQL Server 2016 与可读辅助副本的负载均衡


  在 `SQL Server 2016` 中，引入了针对可读辅助副本的负载均衡功能。此功能允许你指定一组可读的辅助副本，只读工作负载将在这些副本之间进行均衡。这与之前的版本形成对比，在旧版本中，流量会被路由到第一个可用的副本。


  ### 理解 AlwaysOn 可用性组 (AOAG)


  因为 `AOAG` 允许你结合使用同步副本（带或不带自动故障转移）、异步副本以及用于只读访问的副本，所以它允许你使用单一技术来满足高可用性、灾难恢复和报表横向扩展的需求。


  #### 故障转移级别与可用性组概念


  当你使用 `AOAG` 时，故障转移不会发生在数据库级别或实例级别。相反，故障转移发生在 `可用性组` 级别。`可用性组` 是一个概念，允许你将相似的数据库分组在一起，以便它们可以作为一个原子单元进行故障转移。这在整合环境中特别有用，因为它允许你将映射到单一应用程序的数据库分组在一起。然后，你可以出于
  `DR` 测试等目的，将此应用程序故障转移到另一个副本，而不会影响托管在同一实例上的其他数据层应用程序。


  ### 分布式可用性组


  `SQL Server 2016` 扩展了 `可用性组` 概念，允许你将来自独立集群的数据库分组到一个单一的 `可用性组` 中。如果你正在为分布在独立集群上、但所有数据库都需要原子性地故障转移到
  `DR` 站点的数据层应用程序实现 `DR`，这一点尤其有用。此功能被称为 `分布式可用性组`。


  ### 可扩展性与限制


  对于实例上可配置的 `可用性组` 数量没有硬性限制，对于实例上可参与 `AOAG` 的数据库数量也没有硬性限制。然而，微软经过测试并官方建议，每个实例最多 100
  个数据库和 10 个 `可用性组`。扩展数据库数量的主要限制因素是 `AOAG` 使用数据库镜像端点，并且每个实例只能有一个。这意味着所有数据修改的日志流都通过同一个端点发送。


