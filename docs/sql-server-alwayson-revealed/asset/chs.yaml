  ## 第 8 章 ■ 监控 ALWAYSON 可用性组\n\n### 事件描述\n\n当可用性副本管理器的状态发生更改时触发\n\n`availability_group_lease_expired`\n\
  当集群与可用性组之间出现连接问题导致未能续订租约时触发\n\n`availability_replica_automatic_failover_validation`\n\
  当故障转移验证副本作为主副本的准备状态时触发\n\n`availability_replica_database_fault_reporting`\n当数据库向可用性副本管理器报告故障时触发\n\
  \n`before_redo_lsn_update`\n在更新末尾日志序列号（EOL LSN）之前立即触发\n\n`read_only_route_complete`\n\
  当只读路由操作成功完成时触发\n\n`read_only_route_fail`\n当只读路由操作失败时触发\n\n### 目标\n\n目标是事件的消费者；本质上，它是跟踪数据将写入的设备。SQL\
  \ Server 2016 中可用的目标详见表 8-3。\n\n**表 8-3.** 目标\n\n| 目标 | 同步/异步 | 描述 |\n| :--- | :---\
  \ | :--- |\n| `事件计数器` | 同步 | 统计会话期间发生的事件数量 |\n| `事件文件` | 异步 | 将事件输出写入内存缓冲区，然后刷新到磁盘\
  \ |\n| `事件配对` | 异步 | 确定配对事件是否在没有匹配事件的情况下发生，例如，语句开始但从未完成 |\n| `ETW (Windows 事件跟踪)`\
  \ | 同步 | 用于将扩展事件与操作系统数据关联 |\n| `直方图` | 异步 | 基于操作或事件列，统计会话期间发生的事件数量 |\n| `环形缓冲区`\
  \ | 异步 | 使用`先进先出（FIFO）`方法将数据存储在内存缓冲区中 |\n\n### 操作\n\n操作也称为`全局字段`，是允许在事件触发时捕获附加信息的命令。操作在事件发生时同步触发，事件本身并不知晓该操作。有\
  \ 50 种可用操作，可让您捕获丰富的信息，包括触发事件的语句、语句运行的安全上下文、事务 ID、CPU ID 和调用堆栈。\n\n### 谓词\n\n谓词是您可以在系统将事件发送到目标之前应用的筛选条件。可以创建简单的谓词，例如根据数据库\
  \ ID 筛选完成的语句，但也可以创建更复杂的谓词，例如仅当 AlwaysOn 可用性组副本的角色更改发生超过两次时才捕获。\n\n谓词也完全支持短路求值。这意味着如果您在谓词中使用多个条件，那么谓词的顺序很重要，因为如果第一个谓词的求值失败，第二个谓词将不会被求值。由于谓词是同步求值的，这可能会影响性能。因此，明智的做法是设计您的谓词，将最不可能求值为真的谓词放在非常可能求值为真的谓词之前。\n\
  \n例如，假设您计划筛选特定数据库（数据库 ID 为`6`），但该数据库在实例活动中占比很高。您还计划筛选特定用户 ID（`UserA`），该用户负责的活动占比很低。在此场景中，您将使用以下谓词先筛选出与`UserA`无关的活动，然后再筛选出与数据库\
  \ ID`6`无关的活动：\n\n```\nWHERE (([sqlserver].[username]='UserA') AND ([sqlserver].[database_id]=(6)))\n\
  ```\n\n### 类型\n\n包中的所有对象都被分配一个类型。此类型用于解释存储在对象字节集合中的数据。对象被分配以下类型之一：\n\n*   `操作`\n\
  *   `事件`\n*   `Pred_compare`（从事件中检索数据）\n*   `Pred_source`（比较数据类型）\n*   `目标`\n* \
  \  `类型`\n\n### 映射\n\n\n\n一个映射（map）是一个字典，它将内部 ID 值映射为数据库管理员（DBA）可以理解的字符串。\n\n`Map\
  \ keys`仅在其所属上下文中是唯一的，在不同上下文之间会被重复使用。例如，在 `statement_recompile_cause` 上下文中，`map_key`为\
  \ 1 对应于`map_value`“模式已更改”（Schema Changed）。然而，在`database_sql_statement type`上下文中，`map_key`为\
  \ 1 却对应于`map_value`“CREATE DATABASE”。你可以使用`sys.dm_xe_map_values DMV`查找完整的映射列表。\n\
  \n### 会话（Sessions）\n\n一个会话本质上是一个跟踪（trace）。它可以包含来自多个包（package）、动作（action）、目标（target）和谓词（predicate）的事件。当你启动或停止一个会话时，就是在打开或关闭这个跟踪。当会话启动时，事件会被写入内存缓冲区，并在发送到目标之前应用谓词。因此，在创建会话时，你需要配置一些属性，例如会话可用于缓冲的内存量、当会话遇到内存压力时可以丢弃哪些事件，以及事件发送到目标之前的最大延迟。\n\
  \n![](img/index-191_1.jpg)\n\n## 第 8 章 ■ 监控 ALWAYSON 可用性组\n\n### 创建事件会话以监控可用性组\n\
  \n你可以使用`新建会话向导`（New Session Wizard）、`新建会话对话框`（New Session Dialog Box）或通过 TSQL 来创建事件会话。要使用`新建会话向导`创建会话，请在对象资源管理器中依次展开\
  \ `管理 | 扩展事件`，然后从`会话`的上下文菜单中选择`新建会话向导`。这将显示`新建会话向导`的介绍页面。\n\n通过介绍页面后，你将看到`设置会话属性页面`，如图\
  \ 8-5 所示。在这里，你可以为`会话`配置一个名称，并指定`会话`是否应在创建时自动启动。\n\n`图 8-5. 设置属性页面`\n\n在向导的`选择模板`页面上，如图\
  \ 8-6 所示，你可以选择一个预定义的模板（这将为你提供常用会话的起点），或者从空白画布开始手动定义整个会话。我们将选择后者。\n\n![](img/index-192_1.jpg)\n\
  \n## 第 8 章 ■ 监控 ALWAYSON 可用性组\n\n`图 8-6. 选择模板页面`\n\n图 8-7 显示了`选择要捕获的事件页面`。在这里，我们可以选择希望在会话中包含哪些事件。出于本次演示的目的，假设我们经常看到辅助副本落后于主副本，并且我们正试图确定原因。具体来说，我们是否存在\
  \ I/O 瓶颈？因为我们试图回答一个非常具体的问题，所以选择要捕获的事件就很明确了。我们需要`hadr_db_marked_for_reseed`事件来确定辅助副本何时落后，以及`long_io_detected`事件，以便我们可以关联时间点并查看是否存在某种模式。\n\
  \n![](img/index-193_1.jpg)\n![](img/index-193_2.jpg)\n\n## 第 8 章 ■ 监控 ALWAYSON 可用性组\n\
  \n`图 8-7. 选择要捕获的事件页面`\n\n`捕获全局字段页面`允许我们指定希望捕获的任何动作（Action）。在我们的场景中，我们将捕获`NT 用户名`和`SQL\
  \ 文本`动作。这将使我们能够追溯任何长时间 I/O 操作，以查看它们是否是由低效查询引起的。`捕获全局字段页面`如图 8-8 所示。\n\n`图 8-8. 捕获全局字段页面`\n\
  \n![](img/index-194_1.jpg)\n\n## 第 8 章 ■ 监控 ALWAYSON 可用性组\n\n`设置会话事件筛选器页面`，如图 8-9\
  \ 所示，允许你为`会话`配置谓词（Predicate）。我们将配置一个筛选对系统数据库操作的谓词。\n\n`图 8-9. 设置会话事件筛选器页面`\n\n向导的`指定会话数据存储页面`是我们可以配置目标（Target）的地方。该向导提供了文件目标或环形缓冲区目标的选择，以及...\n\
  \n\n\n## 第 8 章 ■ 监控 AlwaysOn 可用性组\n\n指定大小和回滚选项的功能。我们将配置一个文件目标，如图 8-10 所示。\n\n![](img/index-195_1.jpg)\n\
  \n#### 图 8-10. 指定会话数据存储\n\n向导的摘要页面将确认向导将执行的操作。会话创建后，完成页面将提供退出时观看实时数据的选项。若要使用 T-SQL\
  \ 创建相同的会话，您可以使用清单 8-1.中的脚本。\n\n#### 清单 8-1. 创建事件会话\n\n```\nCREATE EVENT SESSION\
  \ AlwaysOnTrace ON SERVER\nADD EVENT sqlserver.hadr_db_marked_for_reseed(\n    ACTION(sqlserver.nt_username,sqlserver.sql_text)\n\
  \    WHERE (sqlserver.database_id>(4))),\nADD EVENT sqlserver.long_io_detected(\n\
  \    ACTION(sqlserver.nt_username,sqlserver.sql_text)\n    WHERE (sqlserver.database_id>(4)))\n\
  ADD TARGET package0.event_file(SET filename='C:\\MSSQL\\ASlwaysOnTrace.xel')\nWITH\
  \ (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
  \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)\
  \ ;\n```\n\n`CREATE EVENT SESSION` DDL 语句接受的参数详见表 8-4.。\n\n#### 表 8-4. CREATE EVENT\
  \ SESSION 参数\n\n| 参数 | 说明 |\n|----------|-------------|\n| `event_session_name`\
  \ | 指定您正在创建的事件会话的名称 |\n| `ADD EVENT \\| SET` | 为添加到会话的每个事件重复此部分，后跟事件名称，格式为 `package.event`；您可以使用\
  \ `SET` 语句设置特定于事件的自定义项，例如包含非强制事件字段 |\n| `ACTION` | 如果该事件需要捕获全局字段，则在每个 `ADD EVENT`\
  \ 参数后指定 |\n| `WHERE` | 如果该事件需要关联谓词，则在每个 `ADD EVENT` 参数后指定 |\n| `ADD TARGET \\| SET`\
  \ | 为将添加到会话的每个目标指定；您可以使用 `SET` 语句来填充特定于目标的参数，例如 `event_file` 目标的 `filename` 参数 |\n\
  \n`CREATE EVENT SESSION` 语句还接受多个 `WITH` 选项，详见表 8-5.。\n\n#### 表 8-5. CREATE EVENT\
  \ SESSION WITH 选项\n\n| WITH 选项 | 说明 |\n|-------------|-------------|\n| `MAX_MEMORY`\
  \ | 指定事件会话在将事件分派到目标之前可用于缓冲事件的最大内存量 |\n| `EVENT_RETENTION_MODE` | 指定如果缓冲区已满时的行为：可接受的值为\
  \ `ALLOW_SINGLE_EVENT_LOSS`，表示如果所有缓冲区都已满，则可以丢失单个事件；`ALLOW_MULTIPLE_EVENT_LOSS`，表示如果所有缓冲区都已满，则可以丢失整个缓冲区；以及\
  \ `NO_EVENT_LOSS`，表示导致事件触发的任务将等待，直到缓冲区中有空间 |\n| `MAX_DISPATCH_LATENCY` | 指定事件在会话缓冲区中驻留的最大时间（以秒为单位），之后将被刷新到目标\
  \ |\n| `MAX_EVENT_SIZE` | 指定来自任何单个事件的事件数据的最大可能大小；可以千字节或兆字节为单位指定，并且应仅配置为允许大于 `MAX_MEMORY`\
  \ 设置的事件 |\n| `MEMORY_PARTITION_MODE` | 指定在何处创建事件缓冲区；可接受的值如下：`NONE` - 表示将在实例内创建缓冲区；`PER_NODE`\
  \ - 表示将为每个 NUMA 节点创建缓冲区；`PER_CPU` - 表示将为每个 CPU 创建缓冲区 |\n| `TRACK_CAUSALITY` | 指定将为每个事件存储一个额外的\
  \ GUID 和序列号，以便可以关联事件 |\n| `STARTUP_STATE` | 指定会话是否在实例启动时自动启动；`ON` 表示是；`OFF` 表示否\
  \ |\n\n\n**提示** 关于扩展事件的深入讨论，我强烈推荐 Apress 出版的《Pro SQL Server Administration》一书，可以从[www.apress.com/9781484207116](http://www.apress.com/9781484207116)购买。\n\
  \n### 总结\n\nSQL Server 提供了丰富的工具来监控 AlwaysOn 可用性组的健康状况。\n\nAlwaysOn 仪表板是 SQL Server\
  \ Management Studio 中的一个交互式报告，它允许您评估可用性组和副本的健康状况。它还提供了查看仲裁配置信息和实时健康数据的链接。\n\n实时健康数据由一个扩展事件会话捕获，该会话在您在实例上创建第一个可用性组时创建，并在后台运行，捕获预先配置的事件。可以自定义此跟踪；如果您需要自定义捕获，我建议保留其默认配置并创建一个新的事件会话。\n\
  \n创建事件会话允许您捕获非常细粒度的关注点，或者仅仅是较粗粒度的信息，这取决于您的需求。扩展事件使用 WMI 实现，是一个非常轻量级的框架，这意味着您可以在不影响实例性能的情况下识别问题和趋势。\n\
  \n"
- "# 第九章 故障排除 AlwaysOn\n\nSQL Server 公开了大量与高可用性和灾难恢复对象相关的元数据，特别是围绕 AlwaysOn 功能集。这些元数据可用于快速识别配置、查找问题的根本原因或编写针对可能发生的事件的自动响应脚本。以下部分将讨论可用的元数据，并提供如何使用它的示例。\n\
  \n### AlwaysOn 故障转移群集实例元数据\n\n从数据库引擎内部，可以查看关于群集实例及其承载的 Windows 群集的大量元数据。这些信息对 DBA\
  \ 来说非常宝贵。以下部分将介绍一些最有用和最有趣的元数据对象。\n\n#### 发现实例所在的节点\n\n自然地，DBA 需要知道群集中哪个节点正在托管故障转移群集实例，尤其是在尝试诊断连接或性能问题时。如果您的组织有政策规定\
  \ DBA 不允许访问操作系统，则无法使用故障转移管理器。幸运的是，SQL Server 中有一个 DMV（动态管理视图）会公开此信息。`sys.dm_os_cluster_nodes`\
  \ DMV 将返回表 9-1 中详述的列。\n\n© Peter A. Carter 2016\nP. A. Carter, *SQL Server AlwaysOn\
  \ Revealed*, DOI 10.1007/978-1-4842-2397-0_9\n第九章 ■ 故障排除 ALWAYSON\n\n**表 9-1. `sys.dm_os_cluster_nodes`\
  \ 列**\n\n| 列名 | 描述 |\n| :--- | :--- |\n| NodeName | 群集节点的名称 |\n| Status | 节点的当前状态。可能的值为：<br>•\
  \ 0 - 表示节点已启动<br>• 1 - 表示节点已关闭<br>• 2 - 表示节点已暂停<br>• 3 - 表示节点正在加入群集<br>• 4 - 表示状态未知\
  \ |\n| status_description | 状态的文本描述。可能的值为：<br>• Up<br>• Down<br>• Paused<br>• Joining<br>•\
  \ Unknown |\n| is_current_owner | 指示实例当前是否由此节点托管。可能的值为：<br>• 0 - 表示节点不拥有该实例<br>•\
  \ 1 - 表示节点拥有该实例 |\n\n清单 9-1 中的查询将返回当前托管实例的群集节点的名称。\n\n**清单 9-1.** 发现实例所在的节点\n\n\
  ```sql\nSELECT NodeName\nFROM sys.dm_os_cluster_nodes\nWHERE is_current_owner =\
  \ 1;\n```\n\n#### 查看运行状况检查配置\n\n如果协助 Windows 管理团队处理群集实例的重复故障转移，DBA 可能希望公开哪些条件可能导致故障转移，以确保配置了适当的级别。这可以通过使用`sys.`\n\
  \n\n## 第 9 章 ■ AlwaysOn 故障排除\n\n`dm_os_cluster_properties` 动态管理视图 (DMV) 返回表 9-2\
  \ 中详述的列。\n\n`表 9-2. sys.dm_os_cluster_properties 的列`\n\n| `列` | `描述` |\n| :--- |\
  \ :--- |\n| `VerboseLogging` | 指示群集使用的日志记录级别。可能的值有：<br>• 0 - 指示日志记录已关闭<br>• 1 -\
  \ 指示仅记录错误<br>• 2 - 指示记录错误和警告 |\n| `SQLDumperDumpFlags` | 指定 `SQLDumper` 将生成的转储文件类型。可能的值有：<br>•\
  \ 0x0120 - 指示小型转储<br>• 0x0110 - 指示完整转储<br>• 0x8100 - 指示筛选转储 |\n| `SQLDumperDumpPath`\
  \ | 指定 `SQLDumper` 将输出转储文件的文件路径 |\n| `SQLDumperDumpTimeOut` | `SQLDumper` 创建转储文件时的超时值。以毫秒为单位指定\
  \ |\n| `FailureConditionLevel` | 将导致发生故障转移的故障级别。故障条件级别的完整描述见表 9-3 |\n| `HealthCheckTimeout`\
  \ | 数据库引擎等待返回运行状况信息的持续时间，之后它将判定实例无响应 |\n\n`FailureConditionLevel` 列返回的可能故障条件级别详见表\
  \ 9-3。\n\n`表 9-3. 故障条件级别`\n\n| `条件级别` | `描述` |\n| :--- | :--- |\n| 0 | 不会发生自动故障转移\
  \ |\n| 1 | 当 SQL Server 服务关闭时发生自动故障转移 |\n| 2 | 当满足以下条件时将发生自动故障转移：<br>• 满足级别 1 的条件<br>•\
  \ 超过 `HealthCheckTimeout` 值 |\n| 3 | 当满足以下条件时将发生自动故障转移：<br>• 满足级别 2 的条件<br>• 运行状况检查返回系统错误\
  \ |\n| 4 | 当满足以下条件时将发生自动故障转移：<br>• 满足级别 3 的条件<br>• 运行状况检查返回资源错误 |\n| 5 | 当满足以下条件时将发生自动故障转移：<br>•\
  \ 满足级别 4 的条件<br>• 运行状况检查返回查询处理错误 |\n\n清单 9-2 中的查询将返回当前的故障转移条件级别和当前的运行状况检查超时值。\n\n\
  `清单 9-2. 返回运行状况检查配置`\n\n```\nSELECT\n    FailureConditionLevel\n    , HealthCheckTimeout\n\
  FROM sys.dm_os_cluster_properties ;\n```\n\n可以通过使用 `sp_server_diagnostics` 系统存储过程手动确定实例的当前运行状况。该过程接受一个参数\
  \ `@repeat_interval`，它指定该过程应返回结果的频率（以秒为单位）。如果省略该参数，则结果只会返回一次。如果为该参数传递了值，则该值必须大于\
  \ 5。该过程返回表 9-4 中详述的结果集。\n\n`表 9-4. sp_server_diagnostics 返回的列`\n\n| `列` | `描述` |\n\
  | :--- | :--- |\n| `creation_time` | 指示创建行的时间 |\n| `component_type` | 指示组件的类型。可能的值有：<br>•\
  \ Instance<br>• AlwaysOn: Availability Group |\n| `component_name` | 指示组件的名称。可能的值有：<br>•\
  \ system<br>• resource<br>• query_processing<br>• io_subsystem<br>• events<br>•\
  \ [可用性组名称] |\n| `State` | 组件的运行状况状态。可能的值有：<br>• 0 - 指示状态未知<br>• 1 - 指示状态为干净（表示健康）<br>•\
  \ 2 - 指示存在警告<br>• 3 - 指示存在错误 |\n| `state_desc` | 组件状态的文本描述。可能的值有：<br>• Unknown<br>•\
  \ Clean<br>• Warnings<br>• Errors |\n| `Data` | 组件特定数据的 XML 表示形式。例如，资源组件包括指定可用物理内存和可用虚拟内存的元素。它还包括属性，例如内存不足异常的计数\
  \ |\n\n清单 9-3 中的脚本将返回 `sp_server_diagnostics` 系统存储过程的完整结果集，以及已从 XML 中提取的值。\n\n```\n\
  EXEC sp_server_diagnostics 5;\n```\n\n\n## 第 9 章：AlwaysOn 故障排除\n\n**提示：** 关于分解 XML\
  \ 的讨论超出了本书的范围。不过，我推荐 Apress 出版的 *SQL Server DBA 专业脚本与自动化指南* 一书，其中可以找到关于出于管理目的使用\
  \ XML 的讨论。该书可在 [www.apress.com/9781484219423](http://www.apress.com/9781484219423)\
  \ 购买。\n\n### 清单 9-3：检索诊断信息\n\n```sql\nCREATE TABLE ##Server_Diagnostics\n(\n   \
  \ creation_time DATETIME,\n    component_type NVARCHAR(8),\n    component_name NVARCHAR(128),\n\
  \    [state] TINYINT,\n    state_desc NVARCHAR(8),\n    [data] XML\n) ;\n\nINSERT\
  \ INTO ##Server_Diagnostics\nEXEC sp_server_diagnostics ;\n\nSELECT *,\n    data.value('(/system/@systemCpuUtilization)[1]','int')\
  \ AS SystemCPUUtilization,\n    data.value('(/system/@sqlCpuUtilization)[1]','int')\
  \ AS SQLServerCPU,\n    data.value('(/resource/@outOfMemoryExceptions)[1]','int')\
  \ AS OutOfMemoryExceptions\nFROM ##Server_Diagnostics ;\n\nDROP TABLE ##Server_Diagnostics\
  \ ;\n```\n\n### AlwaysOn 可用性组元数据\n\n元数据也可用于排查可用性组的问题。以下部分将讨论一些与可用性组相关且最实用、最有趣的元数据对象。\n\
  \n#### 确定上次故障转移原因\n\n如果可用性组发生了故障转移，您可能首先想要回答的问题是“何时？”和“为什么？”。这些可以使用 `sys.dm_hadr_availability_replica_states`\
  \ DMV 来回答。该对象返回表 9-5 中详述的列。\n\n#### 表 9-5：sys.dm_hadr_availability_replica_states\n\
  \n| 列 | 描述 |\n| :--- | :--- |\n| `replica_id` | 副本的 GUID |\n| `group_id` | 可用性组的\
  \ GUID |\n| `is_local` | 指示副本是本地还是远程。可能的值有：<br>• `0` - 指示远程辅助副本<br>• `1` - 指示本地副本\
  \ |\n| `role` | 指示当前分配给副本的角色。可能的值有：<br>• `0` - 指示角色正在解析中<br>• `1` - 指示副本具有主角色<br>•\
  \ `2` - 指示副本当前具有辅助角色 |\n| `role_desc` | 副本当前角色的文本描述。可能的值有：<br>• `RESOLVING`<br>•\
  \ `PRIMARY`<br>• `SECONDARY` |\n| `operational_state` | 指示副本的当前操作状态。可能的值有：<br>•\
  \ `0` - 指示故障转移正在等待中<br>• `1` - 指示状态为挂起<br>• `2` - 指示在线<br>• `3` - 指示离线<br>• `4`\
  \ - 指示失败<br>• `5` - 指示失败，且无仲裁<br>• `NULL` - 指示副本不是本地的 |\n| `operational_state_desc`\
  \ | 操作状态的文本描述。可能的值有：<br>• `PENDING_FAILOVER`<br>• `PENDING`<br>• `ONLINE`<br>• `OFFLINE`<br>•\
  \ `FAILED`<br>• `FAILED_NO_QUORUM`<br>• `NULL` |\n| *(续表)* | |\n| **列** | **描述**\
  \ |\n| `connected_state` | 指示辅助副本当前是否已连接到主副本。可能的值有：<br>• `0` - 指示副本已与主副本断开连接<br>•\
  \ `1` - 指示副本已连接到主副本 |\n| `connected_state_desc` | 连接状态的文本描述。可能的值有：<br>• `DISCONNECTED`<br>•\
  \ `CONNECTED` |\n| `recovery_health` | 指示可用性组内的数据库是否联机。可能的值有：<br>• `0` - 指示至少有一个数据库未联机<br>•\
  \ `1` - 指示所有数据库均已联机<br>• `NULL` - 指示可用性组不是本地的 |\n| `recovery_health_desc` | `recovery_health`\
  \ 的文本描述。可能的值有：<br>• `ONLINE_IN_PROGRESS`<br>• `ONLINE`<br>• `NULL` |\n| `synchronization_health`\
  \ | 指示可用性组数据库的同步状态。可能的值有：<br>• `0` - 指示至少有一个数据库处于 `NOT SYNCHRONIZING` 状态。这称为不健康<br>•\
  \ `1` - 指示至少有一个数据库未处于... |\n\n\n## 第九章 ■ AlwaysOn 故障排除\n\n##### 表 9-5. （续）\n\n|\
  \ 列名 | 描述 |\n| :--- | :--- |\n| synchronization_health_desc | 同步运行状况状态的文本描述。可能的值为\
  \ `NOT_HEALTHY`， `PARTIALLY_HEALTHY`， `HEALTHY` |\n| last_connect_error_number |\
  \ 上次连接错误的错误号。 |\n| last_connect_error_description | 上次连接错误的描述。 |\n| last_connect_error_timestamp\
  \ | 上次连接错误的日期和时间。 |\n\n清单 9-4 中的查询演示了如何返回上次连接错误的时间和原因。这将指明故障转移发生的时间和原因。每个副本与可用性组的组合将返回一行。你会注意到，我们将\
  \ `sys.dm_hadr_availability_replica_states` DMV 与 `sys.availability_replicas` 和\
  \ `sys.availability_groups` DMV 进行了联接，以检索承载副本的节点名称以及可用性组的名称。\n\n#### 清单 9-4. 确定上次故障转移的时间和原因\n\
  \n```sql\nSELECT\nar.replica_server_name\n,ag.name\n,ars.last_connect_error_description\n\
  ,ars.last_connect_error_timestamp\nFROM sys.dm_hadr_availability_replica_states\
  \ ars\nINNER JOIN sys.availability_replicas ar\nON ar.group_id = ars.group_id\n\
  AND ars.replica_id = ar.replica_id\nINNER JOIN sys.availability_groups ag\nON ag.group_id\
  \ = ar.group_id ;\n```\n\n### 评估可用性数据库的状态\n\n你可能已经注意到，`sys.dm_hadr_availability_replica_states`\
  \ DMV 会提供包含不健康数据库的可用性组的详细信息。然而，其结果不够精细，无法让你发现具体哪些数据库不健康。这些信息可以从 `sys.dm_hadr_database_replica_states`\
  \ DMV 中检索，该 DMV 返回表 9-6 中详述的列。\n\n#### 表 9-6. sys.dm_hadr_database_replica_states\
  \ 的列\n\n| 列名 | 描述 |\n| :--- | :--- |\n| database_id | 数据库的 ID。 |\n| group_id | 可用性组的\
  \ GUID。 |\n| replica_id | 可用性副本的 GUID。 |\n| group_database_id | 数据库在可用性组内的 ID。 |\n\
  | is_local | 指示数据库是本地还是远程。可能的值为 `0`（非本地）和 `1`（本地）。 |\n| is_primary_replica | 指示数据库副本当前是主角色还是辅助角色。可能的值为\
  \ `0`（辅助）和 `1`（主）。 |\n| synchronization_state | 指示数据库同步状态。可能的值为 `0`（未同步），`1`（正在同步），`2`（已同步），`3`（正在还原）和\
  \ `4`（正在初始化）。 |\n| synchronization_state_desc | 同步状态的文本描述。可能的值为 `NOT SYNCHRONIZING`，\
  \ `SYNCHRONIZING`， `SYNCHRONIZED`， `REVERTING`， `INITIALIZING`。 |\n| is_commit_participant\
  \ | 指示事务提交是否已同步。异步副本上的数据库始终报告 `0`，该值仅对同步副本上的主数据库准确。可能的值为 `0`（未同步）和 `1`（已同步）。 |\n\
  | synchronization_health | 指示数据库的事务同步运行状况状态。可能的值为 `0`（NOT_HEALTHY），`1`（PARTIALLY_HEALTHY）和\
  \ `2`（HEALTHY）。 |\n\n\n#### 数据库同步状态参数说明\n\n`指示数据库的同步状态。`\n\n可能的值为\n\n• `0` - 表示不健康。这意味着数据库未在同步\n\
  \n• `1` - 表示部分健康。这意味着数据库正在同步\n\n• `2` - 表示健康。这意味着数据库已同步\n\n`synchronization_health_desc`\n\
  \n同步健康状态的文字描述。\n\n可能的值为\n\n• `NOT_HEALTHY`\n\n• `PARTIALLY_HEALTHY`\n\n• `HEALTHY`\n\
  \n`database_state`\n\n指示数据库的当前状态。该值反映了 `sys.databases` 目录视图中的值。\n\n可能的值为\n\n• `0`\
  \ - 表示数据库处于在线状态\n\n• `1` - 表示数据库正在还原\n\n• `2` - 表示数据库正在恢复\n\n• `3` - 表示数据库处于等待恢复状态\n\
  \n• `4` - 表示数据库处于可疑状态\n\n• `5` - 表示数据库处于紧急模式\n\n• `6` - 表示数据库处于离线状态\n\n`database_state_desc`\n\
  \n数据库状态的文字描述。可能的值为\n\n• `ONLINE`\n\n• `RESTORING`\n\n• `RECOVERING`\n\n• `RECOVERY_PENDING`\n\
  \n• `SUSPECT`\n\n• `EMERGENCY`\n\n• `OFFLINE`\n\n`is_suspended`\n\n指示数据库是否已挂起。\n\
  \n可能的值为\n\n• `0` - 表示已恢复\n\n• `1` - 表示已挂起\n\n`suspend_reason`\n\n如果数据库已挂起，`suspend_reason`\
  \ 列将指示原因。可能的值为\n\n• `0` - 表示用户手动挂起了数据移动\n\n• `1` - 表示在强制故障转移后挂起\n\n• `2` - 表示在重做阶段发生错误\n\
  \n• `3` - 表示在日志捕获过程中发生错误\n\n• `4` - 表示在写入日志时发生错误\n\n• `5` - 表示数据库在重启前已挂起\n\n• `6`\
  \ - 表示在撤销阶段发生错误\n\n• `7` - 表示日志链不匹配错误\n\n• `8` - 表示在计算辅助副本的同步点时发生错误\n\n`suspend_reason_desc`\n\
  \n`suspend_reason` 列的文字描述。可能的值为\n\n• `SUSPEND_FROM_USER`\n\n• `SUSPEND_FROM_PARTNER`\n\
  \n• `SUSPEND_FROM_REDO`\n\n• `SUSPEND_FROM_CAPTURE`\n\n• `SUSPEND_FROM_APPLY`\n\n\
  • `SUSPEND_FROM_RESTART`\n\n• `SUSPEND_FROM_UNDO`\n\n• `SUSPEND_FROM_REVALIDATION`\n\
  \n• `SUSPEND_FROM_XRF_UPDATE`\n\n`recovery_lsn`\n\n在主副本上，`recovery_lsn` 表示事务日志的结尾（事务日志中用于时间点恢复的最后一点）。在辅助副本上，该列表示需要重新同步的点。但是，如果该值大于或等于\
  \ `last_hardened_lsn`，则表示不需要重新同步。\n\n`truncation_lsn`\n\n对于主副本，该列表示所有辅助副本上的最小日志截断\
  \ LSN。对于辅助副本，该列表示该特定数据库副本的日志截断点。\n\n`last_sent_lsn`\n\n指示已发送的最后一个日志块的结尾。\n\n`last_sent_time`\n\
  \n发送最后一个日志块的日期和时间。\n\n`last_recieved_lsn`\n\n指示要接收的最后一个日志块的结尾。\n\n`last_hardened_lsn`\n\
  \n指示要固化（hardened）的最后一个日志块的开始。对于异步提交副本，该值将为 `NULL`。\n\n`last_hardened_time`\n\n固化的\
  \ LSN 的日期和时间。\n\n`last_redone_lsn`\n\n在辅助副本上重做的最后一条日志记录的 LSN。\n\n`last_redone_time`\n\
  \n在辅助副本上重做的最后一条 LSN 的时间戳。\n\n`log_send_queue_size`\n\n尚未发送到辅助副本的日志记录的大小，以千字节为单位。\n\
  \n`log_send_rate`\n\n日志记录被发送到辅助副本的速度，以千字节/秒为单位。\n\n`filestream_send_rate`\n\nFILESTREAM\
  \ 文件被发送到辅助副本的速度，以千字节/秒为单位。\n\n`end_of_log_lsn`\n\n日志缓存中最后一条日志记录的 LSN。\n\n`last_commit_lsn`\n\
  \n\n## 第 9 章 ■ AlwaysOn 故障排除\n\n### 事务日志中最后提交事务的 LSN\n\n### `last_commit_time`\n\
  事务日志中最后提交的 LSN 的时间戳\n\n### `low_water_mark_for_ghosts`\n虚影清理任务（用于物理删除已逻辑删除的行）使用此列在数据库所有副本中的最小值，来确定从何处开始清理记录。\n\
  \n### `secondary_log_seconds`\n辅助副本落后于主副本的秒数\n\n清单 9-5 中的脚本演示了如何评估 App1 可用性组内的可用性数据库的健康状况。您会注意到，我们使用\
  \ `DB_NAME()` 函数返回数据库名称，并将 `sys.dm_hadr_database_replica_states` DMV 与 `sys.availability_groups`\
  \ 和 `sys.availability_replicas` 目录视图连接，以返回可用性组和副本的名称。\n\n`清单 9-5.` 评估可用性数据库的状态\n\
  ```sql\nSELECT\n    DB_NAME(database_id)\n    ,ag.name\n    ,ar.replica_server_name\n\
  \    ,is_primary_replica\n    ,synchronization_state_desc\n    ,synchronization_health_desc\n\
  \    ,database_state_desc\nFROM sys.dm_hadr_database_replica_states drs\nINNER JOIN\
  \ sys.availability_groups ag\n    ON drs.group_id = ag.group_id\nINNER JOIN sys.availability_replicas\
  \ ar\n    ON drs.replica_id = ar.replica_id\nWHERE ag.name = 'App1';\n```\n\n###\
  \ 摘要\nSQL Server 提供了大量元数据，可帮助您排查问题并审核配置。虽然本章节讨论了一些最有用的元数据，但我强烈建议您进一步探索 `hadr` 系列\
  \ DMV。\n\n对于故障转移群集实例，`sys.dm_os_cluster_nodes` DMV 会公开群集中节点的运行状况状态。可以通过调用系统存储过程\
  \ `sp_server_diagnostics` 找到更详细的故障排除信息。\n\n**提示：** 系统存储过程 `sp_server_diagnostics`\
  \ 也可用于排除 AlwaysOn 可用性组的故障，并为实例上承载的每个可用性组返回一行。\n\n`sys.dm_hadr_availability_replica_states`\
  \ DMV 公开了托管 AlwaysOn 可用性组的副本的详细健康状态信息。要深入查看参与可用性组的数据库的健康状态，可以查询 `sys.dm_hadr_database_replica_states`\
  \ DMV。\n\n上述两个 DMV 都可以与 `sys.availability_groups` 和 `sys.availability_replicas`\
  \ DMV 连接，以获取有关配置的文本信息，而不是 GUID。`sys.dm_hadr_database_replica_states` DMV 也可以与 `sys.databases`\
  \ 连接，以获取有关数据库配置的更多信息。\n\n## 索引\n**A**\n- `数据库页面`，92–93\n- `数据同步页面`，98–99\n- `活动节点`，10\n\
