  \ `HADR` 传输消息                 |\n| `hadr_transport_dump_config_message`| 追踪 `HADR`\
  \ 配置消息                           |\n| `hadr_transport_dump_failure_message` | 追踪\
  \ `HADR` 故障消息                         |\n| `hadr_transport_dump_preconfig_message`\
