    # 第三章 ■ 实现群集


    **图 3-14.** 故障转移群集验证报告


    在“摘要”页面单击“完成”将返回到“创建群集向导”，此时会看到“用于管理群集的访问点”页面，如图 3-15 所示。在此页面上，你需要输入群集的虚拟名称。我们将我们的群集命名为
    `ALWAYSON-C`。如果网卡配置为自动获取 IP 地址，则将使用 `DHCP` 分配一个 IP 地址。否则，你将需要手动输入一个 IP 地址。这被称为静态
    IP，因为它将保持不变，而通过 `DHCP` 分配的 IP 地址可能会改变。我强烈建议为群集访问点使用静态 IP，以避免动态路由问题，但这可以在群集创建后进行更改。


    ![](img/index-56_1.jpg)


    **图 3-15.** “用于管理群集的访问点”页面


    ## ■ **注意**

    虚拟名称和 IP 地址绑定到任何活动的节点，这意味着在发生故障转移时群集始终可访问。


    在我们的案例中，群集驻留在一个简单的域、单一站点和单一子网中。但是，如果你正在配置一个多子网群集，则向导会检测到这一点，并且将需要为每个子网提供 IP 地址。在这种情况下，你需要为每个子网输入一个
    IP 地址。


    ## ■ **注意**

    节点内的两个网卡各自配置在独立的子网上，以便节点间的心跳流量与公共网络隔离。但是，只有当群集节点的数据网卡位于不同的子网中时，群集才被视为多子网群集。


    ## ■ **提示**

    如果你的群集将位于域中，并且你没有在包含群集的 `OU`（组织单位）中创建 `AD`（Active Directory）对象的权限，那么群集的 `VCO`（虚拟计算机对象）必须已存在，并且你必须被分配了完全控制权限。


    ![](img/index-57_1.jpg)


    “确认”页面显示将要创建的群集的摘要。你还可以使用此屏幕指定是否应将所有符合条件的存储添加到群集中，这通常是一个有用的功能。此屏幕如图 3-16 所示。


    **图 3-16.** “确认”页面


    群集构建完成后，将显示如图 3-17 所示的“摘要”页面。此屏幕总结了群集名称、IP 地址、节点、已配置的仲裁模型，以及有关群集的任何警告的详细信息。它还提供了一个指向报告的
    `HTML`（超文本标记语言）版本的链接。


    ![](img/index-58_1.jpg)


    ![](img/index-58_2.jpg)


    **图 3-17.** “摘要”页面


    “创建群集”报告显示了在群集构建期间完成的任务的完整列表，如图 3-18 所示。


    **图 3-18.** “创建群集”报告


    ![](img/index-59_1.jpg)


    我们也可以使用 `PowerShell` 来创建群集。清单 3-2 中的脚本首先使用 `Test-Cluster` cmdlet 运行群集验证测试，然后使用
    `New-Cluster` cmdlet 配置群集。


    **清单 3-2.** 验证并创建群集

    ```

    #运行验证测试

    Test-Cluster -Node Clusternode1,Clusternode2


    #创建群集

    New-Cluster -Node ClusterNode1,ClusterNode2 -Name ALWAYSON-C

    ```


    ## 配置群集


    许多群集配置可以更改，具体取决于你的环境需求。本节演示如何更改一些更常见的配置。


    ### 更改仲裁


    如果我们在“故障转移群集管理器”中检查群集存储，通过浏览 `ALWAYSON-C | 存储 | 磁盘` 并高亮显示分配给仲裁的磁盘，我们可以看到见证磁盘被错误地配置为
    `MSDTC` 的驱动器。如图 3-19 所示。


    **图 3-19.** 群集摘要


    ![](img/index-60_1.jpg)


    我们可以通过进入群集的上下文菜单并选择 `更多操作 | 配置群集仲裁设置` 来修改此设置，这将调用“配置群集仲裁向导”。在“选择仲裁配置选项”页面（如图 3-20
    所示），我们选择 `选择仲裁见证` 选项。


    **图 3-20.** “选择仲裁配置选项”页面


    在“选择仲裁见证”页面，我们选择要配置的仲裁类型。当群集中有偶数个节点且所有节点位于同一数据中心时，或者当主数据中心有偶数个节点而辅助数据中心有另一个节点时，磁盘见证最合适。


    当节点分布在两个数据中心，并且你可以访问第三个数据中心（其中有一个可用作仲裁的文件共享）时，文件共享见证最合适。


    云见证是 `Windows 2016` 的一项新功能，当节点分布在两个数据中心且没有可用的第三个数据中心来设置文件共享见证时最合适。要使用云见证，你必须拥有
    `Azure` 存储账户，因为见证将在 `Azure BLOB` 存储中创建。


    在单一数据中心中有奇数个节点的情况下，不配置见证是最合适的。


    对于我们的场景，我们将选择配置磁盘见证的选项。如图 3-21 所示。


