- fmt: '## Managing AlwaysOn Availability Groups


    Once the initial setup of your Availability Group is complete, you still need
    to perform administrative tasks. These include failing over the Availability Group,
    monitoring, and on rare occasions, adding additional listeners. These topics are
    discussed in the following sections.


    ### Failover


    If a replica is in Synchronous Commit mode and is configured for automatic failover,
    then the Availability Group automatically moves to a redundant replica in the
    event of an error condition being met on the primary replica. There are occasions,
    however, when you will want to manually fail over an Availability Group. This
    could be because of DR testing, proactive maintenance, or because you need to
    bring up an asynchronous replica following a failure of the primary replica or
    the primary data center.


    The script in Listing 7-3 removes a node from our cluster when we run it from
    the root directory of the SQL Server installation media.


    **Listing 7-3.** Removing a Node


    ```

    .\setup.exe /ACTION="RemoveNode" /INSTANCENAME="ALWAYSON-SQL-C" /CONFIRMIPDEPENDENCYCHANGE=0
    /qs

    ```


    ![](index-164_1.jpg)


    ### Synchronous Failover


    If you wish to fail over a replica that is in Synchronous Commit mode, launch
    the Failover Availability Group wizard by selecting Failover from the context
    menu of your Availability Group in Object Explorer. After moving past the Introduction
    page, you find the Select New Primary Replica page (see Figure 7-4). On this page,
    check the box of the replica to which you want to fail over. Before doing so,
    however, review the Failover Readiness column to ensure that the replicas are
    synchronized and that no data loss will occur.


    **Figure 7-4.** The Select New Primary Replica page


    On the Connect to Replica page, illustrated in Figure 7-5, use the Connect button
    to establish a connection to the new primary replica.


    ![](index-165_1.jpg)


    **Figure 7-5.** The Connect to Replica page


    On the Summary page, you are given details of the task to be performed, followed
    by a progress indicator on the Results page. Once the failover completes, check
    that all tasks were successful, and investigate any errors or warnings that you
    receive.


    We can also use T-SQL to fail over the Availability Group. The command in Listing
    7-4 achieves the same results. Make sure to run this script from the replica that
    will be the new primary replica. If you run it from the current primary replica,
    use `SQLCMD` mode and connect to the new primary within the script.


    **Listing 7-4.** Failing Over an Availability Group


    ```sql

    ALTER AVAILABILITY GROUP App1 FAILOVER ;

    GO

    ```


    ### Asynchronous Failover


    If your Availability Group is in Asynchronous Commit mode, then from a technical
    standpoint, you can fail over in a similar way to the way you can for a replica
    running in Synchronous Commit mode, except for the fact that you need to force
    the failover, thereby accepting the risk of data loss. You can force failover
    by using the command in Listing 7-5.


    You should run this script on the instance that will be the new primary. For it
    to work, the cluster must have quorum. If it doesn’t, then you need to force the
    cluster online before you force the Availability Group online.


    **Listing 7-5.** Forcing Failover


    ```sql

    ALTER AVAILABILITY GROUP App1 FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    ```


    From a process perspective, you should only ever do this if your primary site
    is completely unavailable. If this is not the case, first put the application
    into a safe state. This avoids any possibility of data loss. The way that I normally
    achieve this in a production environment is by performing the following steps:

    1.  Disable logins.

    2.  Change the mode of the replica to Synchronous Commit mode.

    3.  Fail over.

    4.  Change the replica back to Asynchronous Commit mode.

    5.  Enable the logins.'
