    ## Using the New Availability Group Dialog Box


    Now that we have successfully created our first Availability Group, let’s create
    a second Availability Group for `App2`. This time, we use the **New Availability
    Group** and **Add Listener** Dialog boxes. We begin this process by backing up
    the `App2Customers` database.


    Just like when we created the `App1` Availability Group, the databases are not
    selectable until we perform the backup. Unlike when we used the wizard, however,
    we have no way to make SQL Server perform the initial database synchronization
    for us. Therefore, we back up the database to the share that we created during
    the previous demonstration and then restore the backup, along with a transaction
    log backup, to the secondary instance.


    We do this by using the script in Listing 5-5, which must be run in `SQLCMD` mode
    for it to work. This is because it connects to both instances.


    **Listing 5-5.** Backing Up and Restoring the Database


    ```sql

    --Back Up Database and Log

    :Connect CLUSTERNODE1\PRIMARYREPLICA

    BACKUP DATABASE App2Customers TO DISK = N''\\CLUSTERNODE1\Backups\App2Customers.bak''
    WITH COPY_ONLY, FORMAT, INIT, REWIND, COMPRESSION, STATS = 5 ;

    GO

    BACKUP LOG App2Customers TO DISK = N''\\CLUSTERNODE1\Backups\App2Customers.trn''
