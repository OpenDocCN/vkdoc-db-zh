- fmt: "# CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS\n\n## Listener\
    \ 与数据同步配置\n\nOn the Listener tab, illustrated in [Figure 6-14](#index_split_002.html#144),\
    \ we can decide if we will create a new listener. This is a strange option, since\
    \ SQL Server only allows us to create a single listener for an Availability Group,\
    \ and we already have one. Therefore, we leave the default choice of **Do Not\
    \ Create an Availability Group Listener** selected. It is possible to create a\
    \ second listener, directly from Failover Cluster Manager, but you would only\
    \ want a second listener for the same Availability Group in very rare, special\
    \ cases, which we discuss later in this chapter.\n\n**Figure 6-14.** The Listener\
    \ tab\n\nOn the Select Data Synchronization page, we choose how we want to perform\
    \ the initial synchronization of the replica. The options are the same as they\
    \ were when we created the Availability Group, except that the file share will\
    \ be prepopulated, assuming that we chose the Full synchronization when creating\
    \ the Availability Group. This screen is shown in [Figure 6-15](#index_split_002.html#145).\n\
    \n![](index-145_1.jpg)\n\n**Figure 6-15.** The Select Data Synchronization page\n\
    \nOn the Validation page, we should review any warnings or errors and resolve\
    \ them before continuing. Finally, on the Summary page, we are presented with\
    \ a summary of the configurations that will be carried out.\n\n## 添加副本与故障处理\n\n\
    After the reconfiguration completes, our new replica is added to the cluster.\
    \ We should then review the results and respond to any warnings or errors. We\
    \ could also have used T-SQL to add the replica to the Availability Group. The\
    \ script in [Listing 6-1](#index_split_002.html#146) performs the same actions\
    \ just demonstrated. You must run this script in SQLCMD Mode since it connects\
    \ to multiple instances.\n\n**Tip:** You will notice that the following script\
    \ (and other scripts throughout the book) drops the final character from the domain\
    \ name. This is because `alwaysonrevealed` exceeds the 15 characters allowed as\
    \ a NETBIOS name. Therefore, SQL Server does not recognize the domain name. The\
    \ work-around for this in SQL Server is to only specify the first 15 characters.\
    \ While this seems a little strange, as SQL Server actually stores the data as\
    \ the `sysname` data type, which is a synonym for `NVARCHAR(128)`, it is a better\
    \ situation than we are faced with when dealing login names. Here, the maximum\
    \ length is 16 characters, and while longer names are fine if the login maps to\
    \ a Windows group, if the login maps to a Windows user, then the login can be\
    \ created, but cannot log in.\n\n## 代码清单：添加副本\n\n**Listing 6-1.** Adding a Replica\n\
    \n```sql\n:Connect CLUSTERNODE3\\ASYNCDR\n\n--Create Login for Service Account\n\
    USE master\nGO\nCREATE LOGIN [alwaysonreveale\\SQLAdmin] FROM WINDOWS ;\nGO\n\n\
    --Create the Endpoint\nCREATE ENDPOINT Hadr_endpoint\n    AS TCP (LISTENER_PORT\
    \ = 5022)\n    FOR DATA_MIRRORING (ROLE = ALL, ENCRYPTION = REQUIRED ALGORITHM\
    \ AES) ;\nGO\nALTER ENDPOINT Hadr_endpoint STATE = STARTED ;\nGO\n\n--Grant the\
    \ Service Account permissions to the Endpoint\nGRANT CONNECT ON ENDPOINT::[Hadr_endpoint]\
    \ TO [alwaysonreveale\\SQLAdmin] ;\nGO\n\n--Start the AOAG Health Trace\nIF EXISTS(SELECT\
    \ * FROM sys.server_event_sessions WHERE name='AlwaysOn_health')\nBEGIN\n    ALTER\
    \ EVENT SESSION AlwaysOn_health ON SERVER WITH (STARTUP_STATE=ON);\nEND\nIF NOT\
    \ EXISTS(SELECT * FROM sys.dm_xe_sessions WHERE name='AlwaysOn_health')\nBEGIN\n\
    \    ALTER EVENT SESSION AlwaysOn_health ON SERVER STATE=START;\nEND\nGO\n\n:Connect\
    \ CLUSTERNODE1\\PRIMARYREPLICA\nUSE master\nGO\n\n--Add the replica to the Availability\
    \ Group\nALTER AVAILABILITY GROUP App1\nADD REPLICA ON N'CLUSTERNODE3\\ASYNCDR'\n\
    \    WITH (ENDPOINT_URL = N'TCP://CLUSTERNODE3.ALWAYSONREVEALE.COM:5022',\n  \
    \        FAILOVER_MODE = MANUAL, AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n  \
    \        BACKUP_PRIORITY = 50,\n          SECONDARY_ROLE(ALLOW_CONNECTIONS = NO));\n\
    GO\n\n--Back up and restore the first database and log\nBACKUP DATABASE App1Customers\
    \ TO DISK = N'\\\\CLUSTERNODE1\\Backups\\App1Customers.bak'\n```"
