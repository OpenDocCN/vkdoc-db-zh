    dependency report against the `Name` resource in Failover Cluster Manager, as
    illustrated in Figure 6-17。


    ![](index-151_1.jpg)


    **Figure 6-17.** The dependency report


    ## Improving Connection Times


    Clients using `.NET 4` or higher are able to specify the new `MultiSubnetFailover=True`
    property in their connecting strings when connecting to an AlwaysOn Availability
    Group. This improves connection times by retrying TCP connections more aggressively.
    If clients are using older versions of `.NET`, however, then there is a high risk
    of their connections timing out.


    There are two workarounds for this issue. The first is to set the `RegisterAllProvidersIP`
    property to `0`. This is the recommended approach, but the problem with it is
    that failover to the DR site can take up to 15 minutes. This is because the IP
    Address resource for the second subnet is offline until failover occurs. It can
    then take up to 15 minutes for the PTR record to be published. In order to reduce
    this risk, it is recommended that you also lower the `HostRecordTTL`. This property
    defines how often the resource records for the cluster name are published.


    The script in Listing 6-3 demonstrates how to disable `RegisterAllProvidersIP`
    and then reduce the `HostRecordTTL` to 300 seconds.


    **Listing 6-3.** Configuring Connection Properties


    ```powershell

    Get-ClusterResource "App1_App1Listen" | Set-ClusterParameter RegisterAllProvidersIP
    0

    Get-ClusterResource "App1_App1Listen" | Set-ClusterParameter HostRecordTTL 300

    ```


    The alternative workaround is to simply increase the timeout value for connections
    to 30 seconds. However, this solution accepts that a large volume of connections
    will take up to 30 seconds. This may not be acceptable to the business.


    ## Distributed Availability Groups


    Distributed Availability Groups are a new feature of SQL Server 2016, which offer
    an alternative DR configuration, which can reduce network traffic and mitigate
    the risk of cluster health at the DR site causing issues in the primary site,
    while still being able to fully monitor quorum in the DR site.


    Instead of a single cluster being stretched across two sites, distributed Availability
    Group allow you to join together Availability Groups which reside on multiple
    clusters. Each cluster maintains its own quorum, so the DR site becoming unavailable
    will have no impact on the primary site. Additionally, network traffic is reduced
    between the sites, if there are multiple replicas in the secondary site, because
    the data from the primary site is only replicated once, as opposed to being replicated
    to each individual replica, as it would be with a traditional stretch cluster
    configuration. Other clustering rules are also relaxed. For example, the cluster
    nodes in the DR site cluster can optimally run a different version of the operating
    system, to the cluster nodes in the primary site cluster.


    > **Tip** While many rules are relaxed, the configuration and folder locations
    of the databases within the primary and secondary Availability Groups must be
    the same, just as if you used a single stretch cluster. The same port number must
    also be used for the database mirroring endpoint.


    A typical Distributed Availability Group topology is illustrated in Figure 6-18。


    ![](index-153_1.jpg)


    **Figure 6-18.** Distributed Availability Group topology


    Distributed Availability Groups can also be configured with a SQL Server AlwaysOn
    Failover Clustered Instance. In this scenario, a cluster in the primary site would
    host a failover clustered instance, with an Availability Group in the DR site
    providing DR, without the need for a stretch cluster.'
