    # About the Author


    **Peter A. Carter** is a SQL Server expert with over a decade of experience in
    developing, administering, and architecting SQL Server platforms, data-tier applications,
    and ETL solutions. Peter has a passion for SQL Server and hopes that his enthusiasm
    for this technology helps or inspires others.


    xi


    ![](index-11_1.jpg)


    # About the Technical Reviewer


    **Bradley Beard** is a software engineer with more than 15 years experience writing
    dynamic, interactive websites using ColdFusion and SQL Server. He graduated from
    Florida Institute of Technology in 2007 with a Master of Science in Computer Information
