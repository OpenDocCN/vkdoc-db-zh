    returned for each combination of Replica and Availability Group. You will notice
    that we


    join the sys.dm_hadr_availability_replica_states DMV to the sys.availability_


    replicas and sys.availability_groups DMVs, to retrieve the names of the nodes
    that


    host the Replicas, and the names of the Availability Groups.


    ***Listing 9-4.*** Determine Last Failover Time and Reason


    SELECT


    ar.replica_server_name


    ,ag.name


    ,ars.last_connect_error_description


    ,ars.last_connect_error_timestamp


    FROM sys.dm_hadr_availability_replica_states ars


    INNER JOIN sys.availability_replicas ar


    ON ar.group_id = ars.group_id


    AND ars.replica_id = ar.replica_id


    INNER JOIN sys.availability_groups ag


    ON ag.group_id = ar.group_id ;


    Assessing the State of Availability Databases


    You may have noticed that the sys.dm_hard_availability_replica_states DMV will


    provide details of Availability Groups that contain databases that are not in
    a healthy


    state. The results are not granular enough, however, for you to discover which
    databases


    are not healthy. This information can be retrieved from the sys.dm_hadr_database_


    replica_states DMV, which returns the columns detailed in Ta[ble 9-6](#index_split_002.html#207)
    .


    CHAPTER 9 ■ TROUBLESHOOTING ALWAYSON


    ***Table 9-6.** sys.dm_hadr_database_replica_states Columns*


    **Column**


    **Description**


    database_id


    The ID of the database


    group_id


    The Availability Group GUID


    replica_id


    The Availability Replica GUID


    group_database_id


    The ID of the database, within the Availability Group


    is_local


    Indicates if the database is local of remote. Possible


    values are


    • 0 - Indicates that the database is not local to the instance


    • 1 - Indicates that the database is local to the instance


    is_primary_replica


    Indicates if the database replica currently has the role of


    primary or secondary. Possible values are


    • 0 - Indicates a Secondary Database Replica


    • 1 - Indicates a Primary Database Replica


    synchronization_state


    Indicates the state of the database synchronization.


    Possible values are


    • 0 - Indicates Not Synchronizing


    • 1 - Indicates Synchronizing


    • 2 - Indicates Synchronized


    • 3 - Indicates that the state is Reverting. This means


    that the secondary is at the part of the undo stage,


    where is retrieving pages from the primary


    • 4 - Indicates that the state is Initializing. This means


    that the secondary is at the part of the undo phase,


    where required log records are currently being


    shipped and hardened


    synchronization_state_desc A textual description of the synchronization state.


    Possible values are


    • NOT SYNCHRONIZING


    • SYNCHRONIZING


    • SYNCHRONIZED


    • REVERTING


    • INITIALIZING


    ( *continued*)


    CHAPTER 9 ■ TROUBLESHOOTING ALWAYSON


    ***Table 9-6.*** ( *continued*)


    **Column**


    **Description**


    is_commit_participant


    Indicates if transaction commits are synchronized.


    Databases on asynchronous replicas will always


    report 0 and the value is only accurate for databases


    on synchronous replicas, for the primary database.


    Possible values are


    • 0 - Indicates that transaction commit is not


    synchronized


    • 1 - Indicates that transaction commit is synchronized


    synchronization_health'
  trans: '

    ## 第九章 ■ AlwaysOn 故障排除


    ### 表 9-5. （续）


    | 列名 | 描述 |

    | :--- | :--- |

    | synchronization_health_desc | 同步运行状况状态的文本描述。可能的值为 `NOT_HEALTHY`， `PARTIALLY_HEALTHY`，
    `HEALTHY` |

    | last_connect_error_number | 上次连接错误的错误号。 |

    | last_connect_error_description | 上次连接错误的描述。 |

    | last_connect_error_timestamp | 上次连接错误的日期和时间。 |


    清单 9-4 中的查询演示了如何返回上次连接错误的时间和原因。这将指明故障转移发生的时间和原因。每个副本与可用性组的组合将返回一行。你会注意到，我们将 `sys.dm_hadr_availability_replica_states`
    DMV 与 `sys.availability_replicas` 和 `sys.availability_groups` DMV 进行了联接，以检索承载副本的节点名称以及可用性组的名称。


    ### 清单 9-4. 确定上次故障转移的时间和原因


    ```sql

    SELECT

    ar.replica_server_name

    ,ag.name

    ,ars.last_connect_error_description

    ,ars.last_connect_error_timestamp

    FROM sys.dm_hadr_availability_replica_states ars

    INNER JOIN sys.availability_replicas ar

    ON ar.group_id = ars.group_id

    AND ars.replica_id = ar.replica_id

    INNER JOIN sys.availability_groups ag

    ON ag.group_id = ar.group_id ;

    ```


    ## 评估可用性数据库的状态


    你可能已经注意到，`sys.dm_hadr_availability_replica_states` DMV 会提供包含不健康数据库的可用性组的详细信息。然而，其结果不够精细，无法让你发现具体哪些数据库不健康。这些信息可以从
    `sys.dm_hadr_database_replica_states` DMV 中检索，该 DMV 返回表 9-6 中详述的列。


    ### 表 9-6. sys.dm_hadr_database_replica_states 的列


    | 列名 | 描述 |

    | :--- | :--- |

    | database_id | 数据库的 ID。 |

    | group_id | 可用性组的 GUID。 |

    | replica_id | 可用性副本的 GUID。 |

    | group_database_id | 数据库在可用性组内的 ID。 |

    | is_local | 指示数据库是本地还是远程。可能的值为 `0`（非本地）和 `1`（本地）。 |

    | is_primary_replica | 指示数据库副本当前是主角色还是辅助角色。可能的值为 `0`（辅助）和 `1`（主）。 |

    | synchronization_state | 指示数据库同步状态。可能的值为 `0`（未同步），`1`（正在同步），`2`（已同步），`3`（正在还原）和
    `4`（正在初始化）。 |

    | synchronization_state_desc | 同步状态的文本描述。可能的值为 `NOT SYNCHRONIZING`， `SYNCHRONIZING`，
    `SYNCHRONIZED`， `REVERTING`， `INITIALIZING`。 |

    | is_commit_participant | 指示事务提交是否已同步。异步副本上的数据库始终报告 `0`，该值仅对同步副本上的主数据库准确。可能的值为
    `0`（未同步）和 `1`（已同步）。 |

    | synchronization_health | 指示数据库的事务同步运行状况状态。可能的值为 `0`（NOT_HEALTHY），`1`（PARTIALLY_HEALTHY）和
    `2`（HEALTHY）。 |

    '
- fmt: '### 数据库同步状态参数说明


    `Indicates the synchronization state of the database.`


    Possible values are


    • `0` - Indicates Not Healthy. This means that the database is not synchronizing


    • `1` - Indicates Partially Healthy. This means that the database is synchronizing


    • `2` - Indicates Healthy. This means that the database is synchronized


    `synchronization_health_desc`


    A textual description of the synchronization health.


    Possible values are


    • `NOT_HEALTHY`


    • `PARTIALLY_HEALTHY`


    • `HEALTHY`


    `database_state`


    Indicates that current state of the database. The value reflects the value in
    the `sys.databases` catalog view.


    Possible values are


    • `0` - Indicates that the database is Online


    • `1` - Indicates that the database is Restoring


    • `2` - Indicates that the database is Recovering


    • `3` - Indicates that the database has a state of Recovery pending


    • `4` - Indicates that the database is Suspect


    • `5` - Indicates that the database is in Emergency mode


    • `6` - Indicates that the database is Offline


    `database_state_desc`


    A textual description of the database state. Possible values are


    • `ONLINE`


    • `RESTORING`


    • `RECOVERING`


    • `RECOVERY_PENDING`


    • `SUSPECT`


    • `EMERGENCY`


    • `OFFLINE`


    `is_suspended`


    Indicates if the database is suspended.


    Possible values are


    • `0` - Indicates resumed


    • `1` - Indicates suspended


    `suspend_reason`


    If the database is suspended, the `suspend_reason` column indicates the reason.
    Possible values are


    • `0` - Indicates a user manually suspended the data movement


    • `1` - Indicates a suspension following a forced failover


    • `2` - Indicates that an error occurred during the redo phase


    • `3` - Indicates that there was an error during the log capture


    • `4` - Indicates that there was an error when writing the log


    • `5` - Indicates the database was suspended prior to a restart


    • `6` - Indicates that there was an error during the undo phase


    • `7` - Indicates a log chain mismatch error


    • `8` - Indicates that there was an error in the calculation of the secondary
    replica’s synchronization point


    `suspend_reason_desc`


    A textual description of the `suspend_reason` column. Possible values are


    • `SUSPEND_FROM_USER`


    • `SUSPEND_FROM_PARTNER`


    • `SUSPEND_FROM_REDO`


    • `SUSPEND_FROM_CAPTURE`


    • `SUSPEND_FROM_APPLY`


    • `SUSPEND_FROM_RESTART`


    • `SUSPEND_FROM_UNDO`


    • `SUSPEND_FROM_REVALIDATION`


    • `SUSPEND_FROM_XRF_UPDATE`


    `recovery_lsn`


    On the primary replica, `recovery_lsn` indicates the end of the transaction log
    (the final point in the transaction log for point-in-time recovery). On a secondary
    replica, the column indicates the point to which the resynchronization would be
    required. If the value is equal or greater than `last_hardened_lsn`, however,
    then it indicates that resynchronization would not be required


    `truncation_lsn`


    For a primary replica, the column indicates the minimum log truncation LSN across
    all secondaries. For a secondary replica, the column indicates the log truncation
    point for that specific database replica


    `last_sent_lsn`


    Indicates the end of the last log block that has been sent


    `last_sent_time`


    The date and time that the last log block was sent


    `last_recieved_lsn`


    Indicates the end of the last log block to be received


    `last_hardened_lsn`


    Indicates the start of the last log block to be hardened. The value will be `NULL`
    for Asynchronous Commit replicas


    `last_hardened_time`


    The date and time of the hardened LSN


    `last_redone_lsn`


    The LSN of the last log record to be redone on the secondary


    `last_redone_time`


    The timestamp of the last LSN to be redone on the secondary


    `log_send_queue_size`


    The size of the log records that have not yet been sent to the secondary, specified
    in kilobytes


    `log_send_rate`


    The speed at which log records are being sent to the secondary, specified in kilobytes/sec


    `filestream_send_rate`


    The speed at which FILESTREAM files are being sent to the secondary, specified
    in kilobytes/sec


    `end_of_log_lsn`


    The LSN of the final log record within the log cache


    `last_commit_lsn`'
