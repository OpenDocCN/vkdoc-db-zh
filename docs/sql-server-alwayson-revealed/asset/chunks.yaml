    the “Failover” section of this chapter, we disabled the logins that have users
    mapped to the databases. If you must place your database in single-user mode,
    then you must first remove it from the Availability Group.


    A database can be removed from an Availability Group by running the command in
    Listing 7-8. This command removes the `App1Customers` database from the Availability
    Group.


    **Listing 7-8.** Removing a Database from an Availability Group


    ```sql

    ALTER DATABASE App1Customers SET HADR OFF ;

    ```


