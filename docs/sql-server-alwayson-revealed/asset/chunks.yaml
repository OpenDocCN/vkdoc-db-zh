    向导的介绍页面如图 5-2 所示，现在已显示出来，为我们概述了需要执行的步骤。


    ![](img/index-102_1.jpg)


    ## 图 5-2. 介绍页面


    在"指定名称"页面（见图 5-3），系统提示我们为可用性组输入一个名称。我们还需要指定是否对可用性组使用数据库级运行状况检测。这是 SQL Server 2016
    的一个新功能，如果启用，当组内的任何可用性数据库脱离 **ONLINE** 状态时，可用性组将发生故障转移。


    ![](img/index-103_1.jpg)


    ## 图 5-3. "指定名称"页面


    在"选择数据库"页面，系统提示我们选择希望加入可用性组的数据库，如图 5-4 所示。在此屏幕上，请注意我们无法选择 `App2Customers` 数据库，因为我们尚未对该数据库进行完整备份。


    ![](img/index-104_1.jpg)


    ## 图 5-4. "选择数据库"页面


    "指定副本"页面包含四个选项卡。我们使用第一个选项卡"副本"来将辅助副本添加到拓扑中。勾选"同步提交"选项会导致数据在提交到主副本之前，先在辅助副本上提交。（这也被称为主副本提交前在辅助副本上*固化日志*。）这意味着，在发生故障转移时，不可能丢失数据，即我们可以满足
    `RPO`（恢复点目标）为 0（零）的 `SLA`（服务级别协议）。但这也意味着存在性能阻碍。如果我们选择不勾选"同步提交"选项，则副本将以"异步提交"模式运行。这意味着数据先在主副本上提交，然后再在辅助副本上提交。这避免了性能阻碍，但也意味着在发生故障转移时，`RPO`
    是不可确定的。同步副本的性能考虑将在本章后面讨论。


    ![](img/index-105_1.jpg)


    ## 图 5-5. "副本"选项卡


    **提示** SQL Server 2016 企业版允许配置三个副本进行自动故障转移。以前版本的 SQL Server 只允许两个同步副本。


    当我们勾选"自动故障转移"选项时，如果我们尚未选择，系统也会自动选择"同步提交"选项。这是因为只有在同步提交模式下才可能进行自动故障转移。我们可以将"可读辅助副本"下拉列表设置为"否"、"是"或"读意向"。当设置为"否"时，处于辅助角色的副本上的数据库不可访问。当设置为"读意向"时，可用性组侦听器能够将只读工作负载定向到此辅助副本，但前提是应用程序在连接字符串中指定了
    `Application Intent=Read-only`。将其设置为"是"可启用侦听器来重定向只读流量，无论应用程序的连接字符串中是否存在"应用程序意向"参数。虽然我们可以通过
    GUI 更改"可读辅助副本"的值，同时配置副本进行自动故障转移而不会出错，但这只是向导的一个特点。实际上，由于在配置为自动故障转移时不支持活动辅助副本，因此该副本是不可访问的。"副本"选项卡如图
    5-5 所示。


    **注意** 第六章将更深入地讨论使用辅助副本来处理只读工作负载。

