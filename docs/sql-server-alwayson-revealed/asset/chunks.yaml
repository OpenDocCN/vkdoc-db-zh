    ## Automatic Page Repair


    ■ `Note` AlwaysOn Availability Groups are discussed in more detail in [Chapter
    5](http://dx.doi.org/10.1007/978-1-4842-2397-0_5) and [Chapter 6](http://dx.doi.org/10.1007/978-1-4842-2397-0_6).


    If a page becomes corrupt in a database configured as a replica in an AlwaysOn
    Availability Group topology, then SQL Server attempts to fix the corruption by
    obtaining a copy of the pages from one of the secondary replicas. This means that
    a logical corruption can be resolved without you needing to perform a restore
    or for you to run `DBCC CHECKDB` with a repair option. However, automatic page
    repair does not work for the following page types:


    - File Header page

    - Database Boot page

    - Allocation pages

    - `GAM` (Global Allocation Map)

    - `SGAM` (Shared Global Allocation Map)

    - `PFS` (Page Free Space)


    If the primary replica fails to read a page because it is corrupt, it first logs
    the page in the `MSDB.dbo.suspect_pages` table. It then checks that at least one
    replica is in the `SYNCHRONIZED` state and that transactions are still being sent
    to the replica. If these conditions are met, then the primary sends a broadcast
    to all replicas, specifying the `PageID` and `LSN` (log sequence number) at the
    end of the flushed log. The page is then marked as restore pending, meaning that
    any attempts to access it will fail, with error code 829.


    After receiving the broadcast, the secondary replicas wait, until they have redone
    transactions up to the `LSN` specified in the broadcast message. At this point,
    they try to access the page. If they cannot access it, they return an error. If
    they can access the page, they send the page back to the primary replica. The
    primary replica accepts the page from the first secondary to respond.


    The primary replica will then replace the corrupt copy of the page with the version
    that it received from the secondary replica. When this process completes, it updates
    the page in the `MSDB.dbo.suspect_pages` table to reflect that it has been repaired
    by setting the `event_type` column to a value of 5 (Repaired).


    If the secondary replica fails to read a page while redoing the log because it
    is corrupt, it places the secondary into the `SUSPENDED` state. It then logs the
    page in the `MSDB.dbo.suspect_pages` table and requests a copy of the page from
    the primary replica. The primary replica attempts to access the page. If it is
    inaccessible, then it returns an error and the secondary replica remains in the
    `SUSPENDED` state.


    If it can access the page, then it sends it to the secondary replica that requested
    it. The secondary replica replaces the corrupt page with the version that it obtained
    from the primary replica. It then updates the `MSDB.dbo.suspect_pages` table with
    an `event_id` of 5. Finally, it attempts to resume the AOAG session.


    ■ `Note` It is possible to manually resume the session, but if you do, the corrupt
    page is hit again during the synchronization. Make sure you repair or restore
    the page on the primary replica first.


    ![](index-34_1.jpg)


    ## Log Shipping


    Log shipping is a technology that you can use to implement disaster recovery.
    It works by backing up the transaction log on the principal server, copying it
    to the secondary server, and then restoring it. It is most appropriate to use
    log shipping in DR scenarios in which you require a load delay, because this is
    not possible with AOAG. As an example of where a load delay may be useful, consider
    a scenario in which a user accidentally deletes all of the data from a table.
    If there is a delay before the database on the DR server is updated, then it is
    possible to recover the data for this table, from the DR server, and then repopulate
    the production server. This means that you do not need to restore a backup to
    recover the data. Log shipping is not appropriate for high availability, since
    there is'
