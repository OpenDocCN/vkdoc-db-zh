    to in 9s. For example 99.9% uptime requirement is known as three 9s of availability.
    The higher the uptime requirement, the higher the cost of implementing the solution.
    Therefore, the level of uptime that you strive to achieve should be driven by
    SLAs and the cost of downtime.


    Recovery point objective is a measure of how much data it is acceptable to lose
    in the event of a disaster. For example, if your only DR solution is backups and
    backups are scheduled to be taken every hour, you can achieve a recovery point
    objective of one hour.


    Recovery time objective is a measure of how long it will take to recover a solution
    after a failure. For example if you have a recovery time objective of 30 minutes,
    then you must be able to restore service with half an hour.


    It is important to determine the cost of downtime for your application, as this
    is one of the main drivers to determine your level of availability. The cost of
    downtime consists of both tangible and intangible costs. Tangible costs can be
    calculated, whereas intangible costs need to be estimated.


    Redundant infrastructure helps you to maintain availability of your applications
    and services. A redundant server will be classified as hot, warm, or cold. A hot
    standby server is one which is kept synchronized with the live server and configured
    to allow automatic failover. This is suitable for HA scenarios. A warn standby
    server is one which is kept synchronized with the live server, but is not configured
    to fail over automatically. Instead, an engineer must perform the failover manually.
    This is suitable for DR scenarios. A cold standby server is not kept synchronized
    with the live server and therefore cannot be failed over automatically. A cold
    standby server is suitable for DR scenarios where all data is read-only and never
    modified.


    # CHAPTER 2


    ## Understanding High Availability and Disaster Recovery Technologies


    SQL Server provides a full suite of technologies for implementing high availability
    and disaster recovery. This chapter provides an overview of these technologies
    and discusses their most appropriate uses.


    ### AlwaysOn Failover Clustering


    A Windows cluster is a technology for providing high availability in which a group
    of up to 64 servers works together to provide redundancy. An AlwaysOn Failover
    Clustered Instance (FCI) is an instance of SQL Server that spans the servers within
    this group. If one of the servers within this group fails, another server takes
    ownership of the instance. Its most appropriate usage is for high availability
    scenarios where the databases are large or have high write profiles. This is because
    clustering relies on shared storage, meaning the data is only written to disk
    once. With SQL Server–level HA technologies, write operations occur on the primary
    database, and then again on all secondary databases, before the commit on the
    primary completes. This can cause performance issues.


    Even though it is possible to stretch a cluster across multiple sites, in Windows
    Server 2012 R2 and prior, this involves SAN replication, which means that a cluster
    is normally configured within a single site. When configured with SAN replication,
    failover to a secondary site is not automatic (unless you create custom scripts
    to automate the process). This is because SAN replication must be stopped, and
    the LUNs in the SAN at the DR site need to be manually made writable. They will
    be presented to the DR server as read-only, while SAN replication is active.


    Windows Server 2016 addresses this issue, by introducing Storage Replica (SR).
    SR technology aims to provide a geo-cluster solution that does not rely on SAN
    replication, by performing storage-agnostic, block level data synchronization.
    SR works in either synchronous or asynchronous modes, with a performance overhead
    when used in synchronous mode being traded off against a potential for data loss
    in asynchronous mode.


    © Peter A. Carter 2016'
