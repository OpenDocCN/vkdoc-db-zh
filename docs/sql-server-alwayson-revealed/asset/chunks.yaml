- fmt: '## CHAPTER 9 ■ TROUBLESHOOTING ALWAYSON


    ### Table 9-5. (continued)


    | Column | Description |

    | :--- | :--- |

    | synchronization_health_desc | A textual description of the synchronization health
    state. Possible values are `NOT_HEALTHY`， `PARTIALLY_HEALTHY`， `HEALTHY` |

    | last_connect_error_number | The error number of the last connection error. |

    | last_connect_error_description | The description of the last connection error.
    |

    | last_connect_error_timestamp | The date and time of the last connection error.
    |


    The query in [Listing 9-4](#index_split_002.html#206) demonstrates how to return
    the time and reason of the last connection error. This will indicate when and
    why failover occurred. One row will be returned for each combination of Replica
    and Availability Group. You will notice that we join the `sys.dm_hadr_availability_replica_states`
    DMV to the `sys.availability_replicas` and `sys.availability_groups` DMVs, to
    retrieve the names of the nodes that host the Replicas, and the names of the Availability
    Groups.


    ### Listing 9-4. Determine Last Failover Time and Reason


    ```sql

    SELECT

    ar.replica_server_name

    ,ag.name

    ,ars.last_connect_error_description

    ,ars.last_connect_error_timestamp

    FROM sys.dm_hadr_availability_replica_states ars

    INNER JOIN sys.availability_replicas ar

    ON ar.group_id = ars.group_id

    AND ars.replica_id = ar.replica_id

    INNER JOIN sys.availability_groups ag

    ON ag.group_id = ar.group_id ;

    ```


    ## Assessing the State of Availability Databases


    You may have noticed that the `sys.dm_hadr_availability_replica_states` DMV will
    provide details of Availability Groups that contain databases that are not in
    a healthy state. The results are not granular enough, however, for you to discover
    which databases are not healthy. This information can be retrieved from the `sys.dm_hadr_database_replica_states`
    DMV, which returns the columns detailed in [Table 9-6](#index_split_002.html#207).


    ### Table 9-6. sys.dm_hadr_database_replica_states Columns


    | Column | Description |

    | :--- | :--- |

    | database_id | The ID of the database. |

    | group_id | The Availability Group GUID. |

    | replica_id | The Availability Replica GUID. |

    | group_database_id | The ID of the database, within the Availability Group. |

    | is_local | Indicates if the database is local or remote. Possible values are
    `0` (not local) and `1` (local). |

    | is_primary_replica | Indicates if the database replica currently has the role
    of primary or secondary. Possible values are `0` (Secondary) and `1` (Primary).
    |

    | synchronization_state | Indicates the state of the database synchronization.
    Possible values are `0` (Not Synchronizing), `1` (Synchronizing), `2` (Synchronized),
    `3` (Reverting), and `4` (Initializing). |

    | synchronization_state_desc | A textual description of the synchronization state.
    Possible values are `NOT SYNCHRONIZING`， `SYNCHRONIZING`， `SYNCHRONIZED`， `REVERTING`，
    `INITIALIZING`。 |

    | is_commit_participant | Indicates if transaction commits are synchronized. Databases
    on asynchronous replicas will always report `0` and the value is only accurate
    for databases on synchronous replicas, for the primary database. Possible values
    are `0` (not synchronized) and `1` (synchronized). |

    | synchronization_health | Indicates the transaction synchronization health state
    of the database. Possible values are `0` (NOT_HEALTHY), `1` (PARTIALLY_HEALTHY),
    and `2` (HEALTHY). |'
