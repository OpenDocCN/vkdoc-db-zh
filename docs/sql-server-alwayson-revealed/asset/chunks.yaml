  trans: "\n# 第六章 ■ 使用 AlwaysOn 可用性组实现灾难恢复\n\n## 侦听器与数据同步配置\n\n在如图 6-14 所示的“侦听器”选项卡上，我们可以决定是否创建新的侦听器。这是一个奇怪的选项，因为\
    \ SQL Server 只允许我们为一个可用性组创建单个侦听器，而我们已经有一个了。因此，我们保留默认选择**不创建可用性组侦听器**。可以直接从故障转移群集管理器创建第二个侦听器，但只有在非常罕见和特殊的情况下，你才需要为同一个可用性组创建第二个侦听器，我们将在本章后面讨论这一点。\n\
    \n**图 6-14.** 侦听器选项卡\n\n在“选择数据同步”页面上，我们选择执行副本初始同步的方式。选项与我们创建可用性组时相同，只是文件共享路径会自动填充，假设我们在创建可用性组时选择了“完整”同步方式。此屏幕如图\
    \ 6-15 所示。\n\n![](img/index-145_1.jpg)\n\n**图 6-15.** 选择数据同步页面\n\n在“验证”页面上，我们应该检查任何警告或错误，并在继续之前解决它们。最后，在“摘要”页面上，会显示将要执行的配置摘要。\n\
    \n## 添加副本与故障处理\n\n重新配置完成后，我们的新副本将被添加到群集中。然后，我们应该检查结果并处理任何警告或错误。我们也可以使用 T-SQL 将副本添加到可用性组。清单\
    \ 6-1 中的脚本执行了与刚才演示相同的操作。由于该脚本连接到多个实例，你必须在 SQLCMD 模式下运行它。\n\n**提示：** 你会注意到以下脚本（以及本书中的其他脚本）去掉了域名的最后一个字符。这是因为\
    \ `alwaysonrevealed` 超过了 NETBIOS 名称允许的 15 个字符限制。因此，SQL Server 无法识别该域名。在 SQL Server\
    \ 中的解决方法是指定前 15 个字符。虽然这看起来有点奇怪，因为 SQL Server 实际上以 `sysname` 数据类型存储数据，它是 `NVARCHAR(128)`\
    \ 的同义词，但这种情况比我们在处理登录名时遇到的情况要好。对于登录名，最大长度是 16 个字符，如果登录名映射到 Windows 组，使用更长的名称没问题，但如果登录名映射到\
    \ Windows 用户，那么登录名可以被创建，但无法登录。\n\n## 代码清单：添加副本\n\n**清单 6-1.** 添加副本\n\n```sql\n\
    :Connect CLUSTERNODE3\\ASYNCDR\n\n--Create Login for Service Account\nUSE master\n\
    GO\nCREATE LOGIN [alwaysonreveale\\SQLAdmin] FROM WINDOWS ;\nGO\n\n--Create the\
    \ Endpoint\nCREATE ENDPOINT Hadr_endpoint\n    AS TCP (LISTENER_PORT = 5022)\n\
    \    FOR DATA_MIRRORING (ROLE = ALL, ENCRYPTION = REQUIRED ALGORITHM AES) ;\n\
    GO\nALTER ENDPOINT Hadr_endpoint STATE = STARTED ;\nGO\n\n--Grant the Service\
    \ Account permissions to the Endpoint\nGRANT CONNECT ON ENDPOINT::[Hadr_endpoint]\
    \ TO [alwaysonreveale\\SQLAdmin] ;\nGO\n\n--Start the AOAG Health Trace\nIF EXISTS(SELECT\
    \ * FROM sys.server_event_sessions WHERE name='AlwaysOn_health')\nBEGIN\n    ALTER\
    \ EVENT SESSION AlwaysOn_health ON SERVER WITH (STARTUP_STATE=ON);\nEND\nIF NOT\
    \ EXISTS(SELECT * FROM sys.dm_xe_sessions WHERE name='AlwaysOn_health')\nBEGIN\n\
    \    ALTER EVENT SESSION AlwaysOn_health ON SERVER STATE=START;\nEND\nGO\n\n:Connect\
    \ CLUSTERNODE1\\PRIMARYREPLICA\nUSE master\nGO\n\n--Add the replica to the Availability\
    \ Group\nALTER AVAILABILITY GROUP App1\nADD REPLICA ON N'CLUSTERNODE3\\ASYNCDR'\n\
    \    WITH (ENDPOINT_URL = N'TCP://CLUSTERNODE3.ALWAYSONREVEALE.COM:5022',\n  \
    \        FAILOVER_MODE = MANUAL, AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n  \
    \        BACKUP_PRIORITY = 50,\n          SECONDARY_ROLE(ALLOW_CONNECTIONS = NO));\n\
    GO\n\n--Back up and restore the first database and log\nBACKUP DATABASE App1Customers\
    \ TO DISK = N'\\\\CLUSTERNODE1\\Backups\\App1Customers.bak'\n```"
- fmt: "# CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS\n\n```sql\n\
    WITH COPY_ONLY, FORMAT, INIT, REWIND, COMPRESSION, STATS = 5 ;\nGO\n\nBACKUP LOG\
    \ App1Customers\nTO DISK = N'\\\\CLUSTERNODE1\\Backups\\App1Customers.trn'\nWITH\
    \ NOSKIP, REWIND, COMPRESSION, STATS = 5 ;\nGO\n\n:Connect CLUSTERNODE3\\ASYNCDR\n\
    ALTER AVAILABILITY GROUP App1 JOIN;\nGO\n\nRESTORE DATABASE App1Customers\nFROM\
    \ DISK = N'\\\\CLUSTERNODE1\\Backups\\App1Customers.bak'\nWITH NORECOVERY, STATS\
    \ = 5 ;\nGO\n\nRESTORE LOG App1Customers\nFROM DISK = N'\\\\CLUSTERNODE1\\Backups\\\
    App1Customers.trn'\nWITH NORECOVERY, STATS = 5 ;\nGO\n```\n\n-- Wait for the replica\
    \ to start communicating\n\n```sql\nDECLARE @connection BIT\nDECLARE @replica_id\
    \ UNIQUEIDENTIFIER\nDECLARE @group_id UNIQUEIDENTIFIER\nSET @connection = 0\n\n\
    WHILE @Connection = 0\nBEGIN\n    SET @group_id = (SELECT group_id FROM Master.sys.availability_groups\
    \ WHERE name = N'App1')\n    SET @replica_id = (SELECT replica_id FROM Master.sys.availability_replicas\
    \ WHERE UPPER(replica_server_name COLLATE Latin1_General_CI_AS) = UPPER(@@SERVERNAME\
    \ COLLATE Latin1_General_CI_AS) AND group_id = @group_id)\n    SET @connection\
    \ = ISNULL((SELECT connected_state FROM Master.sys.dm_hadr_availability_replica_states\
    \ WHERE replica_id = @replica_id), 1)\n    WAITFOR DELAY '00:00:10'\nEND\n```\n\
    \n--Add the first Database to the Availability Group on the new replica\n\n```sql\n\
    ALTER DATABASE App1Customers SET HADR AVAILABILITY GROUP = [App1];\nGO\n```\n\n\
    --Back up and restore the second database and log\n\n```sql\n:Connect CLUSTERNODE1\\\
    PRIMARYREPLICA\nBACKUP DATABASE App1Sales\nTO DISK = N'\\\\CLUSTERNODE1\\Backups\\\
    App1Sales.bak'\nWITH COPY_ONLY, FORMAT, INIT, REWIND, COMPRESSION, STATS = 5 ;\n\
    GO\n\nBACKUP LOG App1Sales\nTO DISK = N'\\\\CLUSTERNODE1\\Backups\\App1Sales.trn'\n\
    WITH NOSKIP, REWIND, COMPRESSION, STATS = 5 ;\nGO\n\n:Connect CLUSTERNODE3\\ASYNCDR\n\
    ALTER AVAILABILITY GROUP [App1] JOIN;\nGO\n\nRESTORE DATABASE App1Sales\nFROM\
    \ DISK = N'\\\\CLUSTERNODE1\\Backups\\App1Sales.bak'\nWITH NORECOVERY, STATS =\
    \ 5 ;\nGO\n\nRESTORE LOG App1Sales\nFROM DISK = N'\\\\CLUSTERNODE1\\Backups\\\
