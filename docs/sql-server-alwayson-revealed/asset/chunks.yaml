    # 第 3 章 ■ 实现集群


    虽然用户不一定需要自己搭建集群，但他们确实需要熟悉相关技术，并且通常需要在过程中提供自己的意见。他们也可能参与解决集群发现问题的故障排除。


    基于这些原因，本章将讨论如何在 Windows 层面构建集群，并探讨一些可能的配置。本章的演示使用一个预构建的环境，该环境由两台服务器组成：`ClusterNode1`
    和 `ClusterNode2`。两台服务器均位于名为 `AlwaysOnRevealed.com` 的域中。从 SAN 向节点呈现了四个卷，并在 `ClusterNode1`
    上联机并进行了格式化，配置详情如表 3-1 所示。


    | **驱动器号** | **卷标** | **大小** | **说明** |

    | :--- | :--- | :--- | :--- |

    | `F` | `Data` | 4.88GB | 托管数据和日志文件 |

    | `G` | `MSDTC` | 972MB | 托管与 `MSDTC` 角色关联的文件 |

    | `H` | `Quorum` | 461MB | 托管基于磁盘的仲裁见证 |

    | `I` | `TempDB` | 1.96GB | 托管 `TempDB` 数据和日志文件 |


    **`提示`** 您可能会惊讶于数据和日志文件分配了同一个卷，因为 DBA 的本能是将这些文件分开放置到不同的驱动器上。这里需要记住的重要一点是，我们使用的是
    SAN，即使我们使用了单独的卷，这些卷也很可能位于相同的物理磁盘轴上，这意味着这种分离只是逻辑上的。此外，如果要使用 SAN 快照，一些 SAN 可能要求数据和日志文件存储在同一卷上，以确保数据一致性。


    © Peter A. Carter 2016

    P. A. Carter, *SQL Server AlwaysOn Revealed*, DOI 10.1007/978-1-4842-2397-0_3


    本章的场景要求我们构建一个具有磁盘见证的双节点故障转移群集。在开始之前，我们需要配置 Windows 群集服务 (`WCS`)。我们还需要配置一个 `MSDTC`（Microsoft
    分布式事务协调器）群集角色，以为 `SSIS`（SQL Server 集成服务）提供分布式事务协调。此外，我们需要将集群配置为使 `MSDTC` 角色以 `高`
    优先级（与同一集群上的其他角色相比）进行故障转移，允许在任何 24 小时内发生三次故障转移，并允许立即故障回退。


    因此，我们将执行的任务完整列表如下：


    *   安装故障转移群集功能

    *   构建名为 `ALWAYSON-C` 的 Windows 群集

    *   正确配置仲裁

    *   创建名为 `ALWAYSON-MSDTC-C` 的 `MSDTC` 群集角色

    *   配置 `MSDTC` 角色的属性

    *   配置 `MSDTC` 角色的故障转移属性


    **`提示`** 如果您希望出于学习目的构建一个集群，但无法访问域或 SAN，那么群集的新功能允许您模拟一个非常相似的拓扑。可以使用两台虚拟机作为集群节点。第三台运行
    Windows `iSCSI Target` 功能的虚拟机可用于向这些节点呈现共享存储。更好的是，Windows Server 2016 允许在工作组上创建群集，这意味着无需创建额外的虚拟机来用作域控制器。但请注意，在工作组中创建群集仅在
    `PowerShell` 中支持，无法通过故障转移群集管理器完成（在 Windows Server 2016 `CTP5` 中是正确的）。同样重要的是要认识到，从
    SQL Server 的角度来看，可用性组在工作组群集上是支持的，但故障转移群集实例则不支持。


