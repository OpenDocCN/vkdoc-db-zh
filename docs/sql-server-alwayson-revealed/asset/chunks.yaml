    And how much data loss is acceptable, the answers invariably come back as zero
    and zero, respectively. Of course, it is never possible to guarantee zero downtime,
    and once you begin to explain the costs associated with the different levels of
    availability, it starts to get easier to negotiate a mutually acceptable level
    of service.


    The key factor in deciding how many 9s you should try to achieve is the cost of
    downtime. Two categories of cost are associated with downtime: tangible costs
    and intangible costs. Tangible costs are usually fairly straightforward to calculate.
    Let’s use a sales application as an example. In this case, the most obvious tangible
    cost is lost revenue because the sales staff cannot take orders. Intangible costs
    are more difficult to quantify but can be far more expensive. For example, if
    a customer is unable to place an order with your company, they may place their
    order with a rival company and never return. Other intangible costs can include
    loss of staff morale, which leads to higher staff turnover, or even loss of company
    reputation. Because intangible costs, by their very nature, can only be estimated,
    the industry rule of thumb is to multiply the tangible costs by three and use
    this figure to represent your intangible costs.


    Once you have an hourly figure for the total cost of downtime for your application,
    you can scale this figure out, across the predicted lifecycle of your application,
    and compare the costs of implementing different availability levels. For example,
    imagine that you calculate that your total cost of downtime is `$2,000/hour` and
    the predicted lifecycle of your application is three years. Table 1-2 illustrates
    the cost of downtime for your application, comparing the costs that you have calculated
    for implementing each level of availability, after you have factored in hardware,
    licenses, power, cabling, additional storage, and additional supporting equipment,
    such as new racks, administrative costs, and so on. This is known as the total
    cost of ownership (`TCO`) of a solution.


    **Table 1-2.** Cost of Downtime


    | Level of Availability | Cost of Downtime (Three Years) | Cost of Availability
    Solution |

    | :--- | :--- | :--- |

    | 99% | `$525,600` | `$108,000` |

    | 99.9% | `$52,560` | `$224,000` |

    | 99.99% | `$5,256` | `$462,000` |

    | 99.999% | `$526` | `$910,000` |


    In this table, you can see that implementing five 9s of availability saves `$525,074`
    over a two-9s solution, but the cost of implementing the solution is an additional
    `$802,000`, meaning that it is not economical to implement. Four 9s of availability
    saves `$520,344` over a two-9s solution and only costs an additional `$354,000`
    to implement. Therefore, for this particular application, a four-9s solution is
    the most appropriate level of service to design for.


    ## Classification of Standby Servers


    There are three classes of standby solution. You can implement each using different
    technologies, although you can use some technologies to implement multiple classes
    of standby server. Table 1-3 outlines the different classes of standby that you
    can implement.


    **Table 1-3.** Standby Classifications


    | Class | Description | Example Technologies |

    | :--- | :--- | :--- |

    | Hot | A synchronized solution where failover can occur automatically or manually.
    Often used for high availability. | Clustering, `AlwaysOn Availability Groups
    (Synchronous)` |

    | Warm | A synchronized solution where failover can only occur manually. Often
    used for disaster recovery. | `Log Shipping`, `AlwaysOn Availability Groups (Asynchronous)`
    |

    | Cold | An unsynchronized solution where failover can only occur manually. This
    is only suitable for read-only data, which is never modified. | - |


    **Note** Cold standby does not show an example technology because no synchronization
    is required and, thus, no technology implementation is required.


