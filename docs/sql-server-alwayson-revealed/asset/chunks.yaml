    a progress indicator on the Results page. Once the failover completes, check that
    all tasks


    were successful, and investigate any errors or warnings that you receive.


    We can also use T-SQL to fail over the Availability Group. The command in Listing


    [7-4](#index_split_002.html#165) achieves the same results. Make sure to run this
    script from the replica that will be the new primary replica. If you run it from
    the current primary replica, use SQLCMD mode


    and connect to the new primary within the script.


    ***Listing 7-4.*** Failing Over an Availability Group


    ALTER AVAILABILITY GROUP App1 FAILOVER ;


    GO


    CHAPTER 7 ■ ADMINISTERING ALWAYSON


    Asynchronous Failover


    If your Availability Group is in Asynchronous Commit mode, then from a technical


    standpoint, you can fail over in a similar way to the way you can for a replica
    running in


    Synchronous Commit mode, except for the fact that you need to force the failover,
    thereby


    accepting the risk of data loss. You can force failover by using the comm[and
    in Listing 7-5 .](#index_split_002.html#166)


    You should run this script on the instance that will be the new primary. For it
    to work, the


    cluster must have quorum. If it doesn’t, then you need to force the cluster online
    before


    you force the Availability Group online.


    ***Listing 7-5.*** Forcing Failover


    ALTER AVAILABILITY GROUP App1 FORCE_FAILOVER_ALLOW_DATA_LOSS ;


    From a process perspective, you should only ever do this if your primary site


    is completely unavailable. If this is not the case, first put the application
    into a safe


    state. This avoids any possibility of data loss. The way that I normally achieve
    this in a


    production environment is by performing the following steps:


    1.


    Disable logins.


    2.


    Change the mode of the replica to Synchronous Commit mode.


    3.


    Fail over.


    4.


    Change the replica back to Asynchronous Commit mode.


    5.


    Enable the logins.'
  trans: '

    ## 管理 AlwaysOn 可用性组


    可用性组初始设置完成后，仍需执行管理任务。这些任务包括故障转移可用性组、监控，以及在极少数情况下添加其他侦听器。以下各节将讨论这些主题。


    ### 故障转移


    如果副本处于同步提交模式并配置为自动故障转移，那么在满足主副本上的错误条件时，可用性组会自动故障转移到冗余副本。然而，有时您会希望手动故障转移可用性组。这可能是由于灾难恢复测试、主动维护，或者需要在主副本或主数据中心故障后启动异步副本。


    清单 7-3 中的脚本在从 SQL Server 安装介质的根目录运行时，会从我们的集群中移除一个节点。


    **清单 7-3.** 移除节点


    ```

    .\setup.exe /ACTION="RemoveNode" /INSTANCENAME="ALWAYSON-SQL-C" /CONFIRMIPDEPENDENCYCHANGE=0
    /qs

    ```


    ![](img/index-164_1.jpg)


    ### 同步故障转移


    如果您希望故障转移一个处于同步提交模式的副本，请在对象资源管理器中右键单击您的可用性组，从上下文菜单中选择“故障转移”以启动“故障转移可用性组向导”。跳过“简介”页面后，您将看到“选择新的主副本”页面（参见图
    7-4）。在此页面上，勾选您希望故障转移到的副本的复选框。但在执行此操作之前，请查看“故障转移准备情况”列，以确保副本已同步且不会发生数据丢失。


    **图 7-4.** “选择新的主副本”页面


    在图 7-5 所示的“连接到副本”页面上，使用“连接”按钮建立与新主副本的连接。


    ![](img/index-165_1.jpg)


    **图 7-5.** “连接到副本”页面


    在“摘要”页面上，将显示要执行任务的详细信息，随后在“结果”页面上显示进度指示器。故障转移完成后，请检查所有任务是否成功，并调查收到的任何错误或警告。


    我们也可以使用 T-SQL 来故障转移可用性组。清单 7-4 中的命令可达到相同效果。请确保从将成为新主副本的副本上运行此脚本。如果您从当前主副本运行它，请使用
    `SQLCMD` 模式并在脚本中连接到新的主副本。


    **清单 7-4.** 故障转移可用性组


    ```sql

    ALTER AVAILABILITY GROUP App1 FAILOVER ;

    GO

    ```


    ### 异步故障转移


    如果您的可用性组处于异步提交模式，那么从技术角度来看，您可以以类似于在同步提交模式下运行的副本的方式进行故障转移，不同之处在于您需要强制故障转移，从而接受数据丢失的风险。您可以使用清单
    7-5 中的命令强制故障转移。


    您应在将成为新主副本的实例上运行此脚本。为了使其工作，集群必须具有仲裁。如果没有，则需要先强制集群联机，然后再强制可用性组联机。


    **清单 7-5.** 强制故障转移


    ```sql

    ALTER AVAILABILITY GROUP App1 FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    ```


    从流程角度来看，您只应在您的主站点完全不可用时才执行此操作。如果情况并非如此，首先应将应用程序置于安全状态。这避免了任何数据丢失的可能性。在生产环境中，我通常通过执行以下步骤来实现：

    1.  禁用登录。

    2.  将副本的模式更改为同步提交模式。

    3.  进行故障转移。

    4.  将副本更改回异步提交模式。

    5.  启用登录。

