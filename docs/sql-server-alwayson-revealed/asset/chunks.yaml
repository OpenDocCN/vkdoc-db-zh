    | – |

    | `AVAILABILITY_MODE` | Determines if the replica operates in synchronous or asynchronous
    mode. | `SYNCHRONOUS_COMMIT`<br>`ASYNCHRONOUS_COMMIT` |

    | `FAILOVER_MODE` | When the `AVAILABILITY_MODE` is set to synchronous, determines
    if automatic failover should be allowed. | `AUTOMATIC`<br>`MANUAL` |

    | `BACKUP_PRIORITY` | Gives the replica a weight when SQL Server is deciding where
    an automated backup job should run. | `0` through `100` |

    | `SECONDARY_ROLE` | Specifies properties that only apply to the replica when
    it is in a secondary role. `ALLOW_CONNECTIONS` specifies if the replica is readable,
    and if so, by all `read_only` connections or only those that specify `read-intent`
    in the connection string. `READ_ONLY_ROUTING_URL` specifies the URL for applications
    to connect to it, for read-only operations, in the following format: `TCP://ServerName:Port`.
    | - |

    | `PRIMARY_ROLE` | Specifies properties that only apply to the replica when it
    is in the primary role. `ALLOW_CONNECTIONS` can be configured as `All` to allow
