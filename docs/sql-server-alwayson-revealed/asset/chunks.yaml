- fmt: '# CHAPTER 2 ■ UNDERSTANDING HIGH AVAILABILITY AND DISASTER RECOVERY TECHNOLOGIES


    P. A. Carter, *SQL Server AlwaysOn Revealed*, DOI 10.1007/978-1-4842-2397-0_2


    ![](index-21_1.jpg)


    Windows Server 2016 also introduces site-aware cluster functionality, which improves
    the manageability of multisite clusters by enhancing operations such as heartbeat
    between nodes and failover behavior. The reliance on all cluster nodes being within
    the same domain is also removed in this version of Windows, meaning that a cluster
    can span multiple domains, or even exist within a workgroup.


    Each server within a cluster is called a node. Therefore, if a cluster consists
    of three servers, it is known as a three-node cluster. Each node within a cluster
    has the SQL Server binaries installed, but the SQL Server service is only started
    on one of the nodes, which is known as the active node. Each node within the cluster
    also shares the same storage for the SQL Server data and log files. The storage,
    however, is only attached to the active node.


    If the active node fails, then the SQL Server service is stopped and the storage
    is detached. The storage is then reattached to one of the other nodes in the cluster,
    and the SQL Server service is started on this node, which is now the active node.
    The instance is also assigned its own network name and IP Address, which are also
    bound to the active node. This means that applications can connect seamlessly
    to the instance, regardless of which node has ownership.


    The diagram in Figure 2-1 illustrates a two-node cluster. It shows that although
    the databases are stored on a shared storage array, each node still has a dedicated
    system volume. This volume contains the SQL Server binaries. It also illustrates
    how the shared storage, IP Address, and network name are rebound to the passive
    node in the event of failover.


    **Figure 2-1.** Two-node cluster


    ![](index-22_1.jpg)


    ## Active/Active Configuration


    Although the diagram in Figure 2-1 illustrates an active/passive configuration,
    it is also possible to have an active/active configuration. Although it is not
    possible for more than one node at a time to own a single instance, and therefore
    it is not possible to implement load-balancing, it is possible to install multiple
    instances on a cluster, and a different node may own each instance. In this scenario,
    each node has its own unique network name and IP Address. Each instance’s shared
    storage also consists of a unique set of volumes.


    Therefore, in an active/active configuration, during normal operations, `Node1`
    may host `Instance1` and `Node2` may host `Instance2`. If `Node1` fails, both
    instances are then hosted by `Node2`, and vice versa. The diagram in Figure 2-2
    illustrates a two-node active/active cluster.


    **Figure 2-2.** Active/active cluster


    ■ **Caution** In an active/active cluster, it is important to consider resources
    in the event of failover. For example, if each node has 128GB of RAM and the instance
    hosted on each node is using 96GB of RAM and locking pages in memory, then when
    one node fails over to the other node, this node fails as well, because it does
    not have enough memory to allocate to both instances. Make sure you plan both
    memory and processor requirements as if the two nodes are a single server. For
    this reason, active/active clusters are not generally recommended for SQL Server.


    ![](index-23_1.jpg)


    ## Three-Plus Node Configurations


    As previously mentioned, it is possible to have up to 64 nodes in a cluster. When
    you have three or more nodes, it is unlikely that you will want to have a single
    active node and two redundant nodes, due to the associated costs. Instead, you
    can choose to implement an `N+1` or `N+M` configuration.


    In an `N+1` configuration, you have multiple active nodes and a single passive
    node. If'
