    more


    common for IT departments to negotiate service-level objectives (SLOs) with the


    business teams, as opposed to SLAs. SLOs are very similar in nature to SLAs, but
    their use


    implies that the business does not impose financial penalties on the IT department
    in the


    event that they are not met.


    Proactive Maintenance


    It is important to remember that downtime is caused not only by failure, but also
    by


    proactive maintenance. For example, if you need to patch the operating system,
    or SQL


    Server itself, with the latest service pack, then you must have some downtime
    during


    installation.


    Depending on the upgrade you are applying, the downtime in such a scenario could'
  trans: "\n服务器是否可用。企业通常努力达到 99%、99.9%、99.99%或 99.999%的可用性。因此，可用性水平通常用“几个 9”来指代。例如，五个\
    \ 9 的可用性意味着 99.999%的正常运行时间，三个 9 则意味着 99.9%的正常运行时间。\n\n表 1-1 详细列出了每个可用性级别对应的每周、每月和每年可接受的停机时间。\n\
    \n`表 1-1. 可用性级别`\n\n`可用性级别` | `每周停机时间` | `每月停机时间` | `每年停机时间`\n--- | --- | ---\
    \ | ---\n99% | 1 小时 40 分 48 秒 | 7 小时 18 分 17 秒 | 3 天 15 小时 39 分 28 秒\n99.9% |\
    \ 10 分 4 秒 | 43 分 49 秒 | 8 小时 45 分 56 秒\n99.99% | 1 分钟 | 4 分 23 秒 | 52 分 35 秒\n\
    99.999% | 6 秒 | 26 秒 | 5 分 15 秒\n\n*所有数值均向下取整到最接近的秒。*\n\n要计算其他级别的可用性，你可以使用`代码清单\
    \ 1-1`中的脚本。运行此脚本前，请将`@Uptime`的值替换为你希望计算的正常运行时间级别。你还应将`@UptimeInterval`的值替换为相应的每周、每月或每年的运行时间间隔。\n\
    \n`代码清单 1-1. 计算可用性级别`\n\n```sql\nDECLARE @Uptime DECIMAL(5,3) ;\n--指定要计算的正常运行时间级别\n\
    SET @Uptime = 99.9 ;\n\nDECLARE @UptimeInterval VARCHAR(5) ;\n--指定 WEEK, MONTH,\
    \ 或 YEAR\nSET @UptimeInterval = 'YEAR' ;\n\nDECLARE @SecondsPerInterval FLOAT\
    \ ;\n--计算每个时间间隔的总秒数\nSET @SecondsPerInterval =\n(\n    SELECT CASE\n        WHEN\
    \ @UptimeInterval = 'YEAR'\n            THEN 60*60*24*365.243\n        WHEN @UptimeInterval\
    \ = 'MONTH'\n            THEN 60*60*24*30.437\n        WHEN @UptimeInterval =\
    \ 'WEEK'\n            THEN 60*60*24*7\n    END\n) ;\n\nDECLARE @UptimeSeconds\
    \ DECIMAL(12,4) ;\n--计算允许的停机秒数\nSET @UptimeSeconds = @SecondsPerInterval * (100-@Uptime)\
    \ / 100 ;\n\n--格式化结果\nSELECT\n    CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60/24))\
    \ + ' 天, '\n    + CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60 % 24)) + '\
    \ 小时, '\n    + CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60 % 60)) + ' 分钟, '\n\
    \    + CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds % 60)) + ' 秒。' ;\n```\n\n## 服务级别协议与服务级别目标\n\
    \n当由第三方提供商负责管理服务器时，合同通常包含服务级别协议（`SLAs`）。这些`SLAs`定义了诸多参数，包括可接受的停机时间、故障发生时服务器可停机的最长时间，以及故障发生时可接受的数据丢失量。通常，如果未能满足这些`SLAs`，提供商将面临经济处罚。\n\
    \n如果服务器由内部管理，数据库管理员（`DBAs`）仍然有客户（customers）的概念。这些客户通常是应用程序的最终用户，主要联系人是业务负责人（business\
    \ owner）。应用程序的业务负责人是组织内委托该应用程序并负责签署资金增强等事项的利益相关者。\n\n在内部场景中，仍然可以定义`SLAs`，在这种情况下，如果未能满足这些`SLAs`，`IT\
    \ 基础设施`或`平台`部门可能需要向业务团队承担费用结算（charge-back）责任。然而，在内部场景中，`IT`部门与业务团队协商确定服务级别目标（`SLOs`）要比制定`SLAs`常见得多。`SLOs`在本质上与`SLAs`非常相似，但采用`SLOs`意味着业务方不会在未能达成目标时对`IT`部门施加经济处罚。\n\
    \n## 主动维护\n\n重要的是要记住，停机时间不仅由故障引起，也由主动维护引起。例如，如果你需要为操作系统或`SQL Server`本身打上最新的服务包，那么在安装过程中必然需要一些停机时间。\n\
    \n根据你所应用的升级类型，在这种情况下的停机时间可能\n"
- fmt: '# Chapter 1 High Availability and Disaster Recovery Concepts


    ## Recovery Point Objective and Recovery Time Objective


    The recovery point objective (`RPO`) of an application indicates how much data
    loss is acceptable in the event of a failure. For a data warehouse that supports
    a reporting application, for example, this may be an extended period, such as
    24 hours, given that it may only be updated once per day by an `ETL` (Extract
    Transform and Load) process and all other activity is read-only reporting. For
    highly transactional systems, however, such as an `OLTP` (Online Transaction Processing)
    database supporting trading platforms or web applications, the `RPO` will be zero.
    An `RPO` of zero means that no data loss is acceptable.


    Applications may have different `RPO`s for high availability and for disaster
    recovery. For example, for reasons of cost or application performance, an `RPO`
    of zero may be required for a failover within the site. If the same application
    fails over to a `DR` data center, however, five or ten minutes of data loss may
    be acceptable. This is because of technology differences used to implement intrasite
    availability and intersite recovery.


    The recovery time objective (`RTO`) for an application specifies the maximum amount
    of time an application can be down before recovery is complete and users can reconnect.
    When calculating the achievable `RTO` for an application, you need to consider
    many aspects. For example, it may take less than a minute for a cluster to fail
    over from one node to another and for the `SQL Server` service to come back up;
    however, it may take far longer for the databases to recover. The time it takes
    for databases to recover depends on many factors, including the size of the databases,
    the quantity of databases within an instance, and how many transactions were in-flight
    when the failover occurred. This is because all noncommitted transactions need
    to be rolled back.


    Just like `RPO`, it is common for there to be different `RTO`s depending on whether
    you have an intrasite or intersite failover. Again, this is primarily due to differences
    in technologies, but it also factors in the amount of time you need to bring up
    the entire estate in the `DR` data center if the primary data center is lost.


    The `RPO` and `RTO` of an application may also vary in the event of data corruption.
    Depending on the nature of the corruption and the `HA/DR` technologies that have
    been implemented, data corruption may result in you needing to restore a database
    from a backup.


    If you must restore a database, the worst-case scenario is that the achievable
    point of recovery may be the time of the last backup. This means that you must
    factor a hard business requirement for a specific `RPO` into your backup strategy.
    If only part of the database is corrupt, however, you may be able to salvage some
    data from the live database and restore only the corrupt data from the restored
    database.


    Data corruption is also likely to have an impact on the `RTO`. One of the biggest
    influencing factors is if backups are stored locally on the server, or if you
    need to retrieve them from tape. Retrieving backup files from tape, or even from
    off-site locations, is likely to add significant time to the recovery process.


    Another influencing factor is what caused the corruption. If it is caused by a
    faulty `IO` subsystem, then you may need to factor in time for the Windows administrators
    to run the check disk command (`CHKDSK`) against the volume and potentially more
    time for disks to be replaced. If the corruption is caused by a user accidently
    truncating a table or deleting a data file, however, then this is not of concern.


    ## Cost of Downtime


    If you ask any business owners how much downtime is acceptable for their applications'
