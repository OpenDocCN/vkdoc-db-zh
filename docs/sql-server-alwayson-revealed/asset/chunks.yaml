    # 第四章 ■ 实现永始终在线的故障转移集群实例


    ## 图 4-12. 安装 SQL Server 故障转移集群 — 服务账户选项卡

    SQL Server 2016 的一项新功能是在安装过程中启用 `执行卷维护任务`，此功能在服务账户选项卡上通过一个简单的复选框实现。这里的考量是安全性与性能的权衡。如果你选择执行卷维护任务，那么在创建或扩展数据文件时，文件将不会被置零；然而，拥有专业软件的攻击者有可能检索到先前存储在已分配磁盘块上的数据。`执行卷维护任务`
    不适用于事务日志文件。


    **■ 提示** 有关 SQL Server 安全考量的完整讨论，我推荐 Apress 出版的图书 *保护 SQL Server：数据库管理员防御指南*，可从
    [www.apress.com/9781484222645](http://www.apress.com/9781484222645) 购买。


    在如图 4-13 所示的“排序规则”选项卡上，你可以指定为该实例配置的排序规则。只要可能，在整个企业中使用一致的排序规则是一个好主意，或者至少应在构成一个数据层应用程序的所有实例中保持一致。


    ![](img/index-83_1.jpg)


    ![](img/index-83_2.jpg)


    ## 图 4-13. 安装 SQL Server 故障转移集群 — 排序规则选项卡


    数据库引擎配置页面包含四个选项卡。第一个是“服务器配置”选项卡，如图 4-14 所示。在此处，我们指定实例将使用的身份验证模式。


    ## 图 4-14. 安装 SQL Server 故障转移集群 — 服务器配置选项卡


    `Windows 身份验证模式` 意味着用户在登录 Windows 时提供的凭据将传递给 SQL Server，用户无需任何额外凭据即可访问实例。使用 `混合模式`
    时，虽然仍可使用 Windows 凭据访问实例，但也可以为用户配置二级凭据。如果选择此选项，那么 SQL Server 将在实例内部维护自己的登录名和密码，用户可以使用这些凭据进行访问，即使他们的
    Windows 身份没有权限。


    出于安全最佳实践考虑，最好只允许对你的实例使用 Windows 身份验证。这有两个原因。首先，仅使用 Windows 身份验证时，即使攻击者获取了对您网络的访问权限，他们仍然无法访问
    SQL Server，因为他们不会有具有正确权限的有效 Windows 帐户。然而，使用混合模式身份验证，一旦进入网络，攻击者可能使用暴力破解攻击或其他黑客技术尝试通过二级
    SQL Server 登录名获得访问权限。其次，如果指定混合模式身份验证，则需要创建一个 `SA` 帐户。`SA` 帐户是一个 SQL Server 用户帐户，对实例拥有管理权限。如果此帐户的密码泄露，攻击者可能获得对
    SQL Server 的管理控制权。如果必须使用混合模式身份验证，最好禁用 `SA` 帐户。


    然而，在某些情况下，混合模式身份验证是必要的。例如，你可能有一个不支持 Windows 身份验证的旧版应用程序，或者有一个使用硬编码连接并依赖二级身份验证的第三方应用程序。这些是混合模式身份验证可能被要求的两个有效理由。另一个有效理由是，如果你有用户需要从非受信任域访问实例。


    此外，在“服务器配置”选项卡上，你可以指定将哪些 Windows 用户添加到 `sysadmin` 固定服务器角色，从而赋予他们对实例的无限制访问权限。在我们的场景中，我们将添加
    `AlwaysOnRevealed\SQLAdmin` 用户作为


