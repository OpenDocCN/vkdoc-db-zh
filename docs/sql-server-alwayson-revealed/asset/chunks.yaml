  trans: "\n# 第四章：实施 AlwaysOn 故障转移群集实例\n\n**图 4-6** 安装 SQL Server 故障转移群集向导——安装故障转移群集规则\
    \  \n您会注意到有一条关于 Windows 防火墙的警告。显示此警告仅仅是因为防火墙已启用，它并不表示所需的端口未开放。关于为 SQL Server 配置防火墙的更多信息，我推荐\
    \ Apress 出版的图书*保护 SQL Server：数据库管理员防御指南*，可从[www.apress.com/9781484222645](http://www.apress.com/9781484222645)获取。\n\
    \n在向导的\"功能选择\"页面（如图 4-7 所示），您将选择要安装的 SQL Server 2016 产品套件功能。本书的目的，我们将选择安装数据库引擎和\
    \ SQL Server 集成服务（`SSIS`）。\n\n![](img/index-77_1.jpg)\n\n**图 4-7** 安装 SQL Server\
    \ 故障转移群集向导——功能选择页面  \n值得注意的是，`SSIS`并非群集感知的，其设计初衷也并非用于群集。在某些情况下，您可能决定对集成服务进行群集化，如果是这样，您可以通过创建一个`通用`类型的群集角色，并将集成服务作为依赖项添加进来，从而规避此限制。然而，在大多数场景中，在群集实例上管理`SSIS`最合适的方式，仅仅是将集成服务作为独立服务安装在群集的每个节点上。\n\
    \n此外，向导的功能选择页面要求您指定实例根目录文件夹和共享功能文件夹的位置。您可能希望将它们移动到不同的驱动器，以便为操作系统保留`C:\\`驱动器。这可能是出于空间原因的考虑，或者只是为了将\
    \ SQL Server 二进制文件与其他应用程序隔离。\n\n实例根目录通常将包含您在服务器上创建的每个实例的一个文件夹，并且数据库引擎、`SSAS`和`SSRS`安装将有各自的文件夹。与数据库引擎关联的文件夹将称为`MSSQL13.[实例名称]`，其中实例名称是您的实例名称，对于默认实例则是`MSSQLSERVER`。文件夹名称中的数字\
    \ 13 与 SQL Server 的版本相关，SQL Server 2016 的版本号是 13。\n\n此文件夹将包含一个名为`MSSQL`的子文件夹，该子文件夹又将包含用于存储与您实例关联的文件的文件夹，包括一个名为`Binn`的文件夹，其中包含与您实例关联的应用程序文件、应用程序扩展和\
    \ XML 配置；一个名为`Backup`的文件夹，它将是数据库备份的默认位置；以及一个名为`Data`的文件夹，它将是系统数据库的默认位置。\n\n`TempDB`、用户数据库和备份的默认文件夹可以在安装过程的后期进行修改，并且将这些数据库拆分到独立的卷上通常是个好做法，但如果您数据位于`SAN`上（如本章前面所讨论的），则可能不必要（甚至不可能）。这里还将创建其他文件夹，包括一个名为`LOGS`的文件夹，它将是`错误日志`和默认`扩展事件运行状况跟踪`文件的默认位置。\n\
    \n![](img/index-78_1.jpg)\n\n如果您在 64 位环境中安装 SQL Server，系统将要求您输入共享功能目录的 32 位和 64\
    \ 位版本文件夹。这是因为某些 SQL Server 组件始终作为 32 位进程安装。32 位和 64 位组件不能共享同一目录，因此为了使安装继续，您必须为这些选项分别指定不同的文件夹。共享功能目录成为根目录\n"
- fmt: '## 第四章：实现AlwaysOn故障转移群集实例


    ### 共享功能目录


    用于存储SQL Server所有实例共享的功能，例如SDK和管理工具。


    ### 安装规则检查


    安装向导将检查您所选功能的安装规则。如果所有规则都通过，将显示“实例配置”页面（如图4-8所示）。在此页面上，您需要为实例指定名称。由于此实例将是群集的一部分，此页面还会要求您指定实例的网络名称。在此场景中，我们将安装SQL
    Server的默认实例，这意味着我们不需要指定实例名称。我们将`ALWAYSON-SQL-C`指定为网络名称。


    > **图 4-8. 安装SQL Server故障转移群集向导 — 实例配置页面**


    ![](index-79_1.jpg)


    ### 提示：群集资源组术语


    SQL Server使用术语“群集资源组”来描述一个群集角色。而“群集角色”是微软较新的术语。在本章中，这两个术语应视为同义词。


    ### 群集资源配置


    在向导的“群集资源组”页面，您可以选择现有的群集资源组（这允许Windows管理员预先创建资源组），或者输入一个新的资源组名称，该名称将由安装程序创建。在我们的案例中，我们将指定`ALWAYSON-SQL-C`作为新资源组的名称。如图4-9所示。


    > **图 4-9. 安装SQL Server故障转移群集向导 — 群集资源组页面**


    **提示**：现有资源组将在“合格”列中标有红色或绿色指示器。如果是红色指示器，则表示无法将该资源组用于SQL Server实例。此时，“消息”列将说明原因。


    ![](index-80_1.jpg)


    ### 群集磁盘选择


    在“群集磁盘选择”页面（如图4-10所示），您可以选择应与资源组关联的磁盘资源。此页面将列出与群集关联的所有磁盘，并通过“合格”列中的红色或绿色指示器标明哪些磁盘可被选择。已与其他资源组关联的磁盘无法被选中，因为一个磁盘只能与一个资源组关联。我们将指定两个可用磁盘（`Data`和`TempDB`）都与`ALWAYSON-SQL-C`资源组关联。


    > **图 4-10. 安装SQL Server故障转移群集向导 — 群集磁盘选择页面**


    ### 群集网络配置


    在“群集网络配置”页面（图4-11），我们可以配置群集角色的IP地址。我们可以选择`DHCP`（这意味着IP地址将自动获取），或者指定一个静态IP地址。在我们的案例中，我们将指定一个静态IP地址。如果我们的群集是一个跨子网的扩展群集，则需要为每个子网指定一个IP地址。


    ![](index-81_1.jpg)


    > **图 4-11. 安装SQL Server故障转移群集向导 — 群集网络配置页面**


    ### 服务器配置


    “服务器配置”页面有两个选项卡。第一个是“服务账户”选项卡（如图4-12所示）。在此选项卡上，我们将指定用作每个`SQL Server`服务安全上下文的服务账户，并为每个服务指定启动模式。这一点值得注意，因为在安装独立实例时，您通常会将每个服务设置为自动启动。然而，在安装群集时，应将感知群集的服务配置为手动启动。这是因为它们将由群集服务管理。


    ![](index-82_1.jpg)'
