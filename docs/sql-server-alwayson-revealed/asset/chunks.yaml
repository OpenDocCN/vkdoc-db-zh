    \ or 99.999% availability. As a result, the level of availability is often referred\
    \ to in 9s. For example, five 9s of availability means 99.999% uptime and three\
    \ 9s means 99.9% uptime.\n\nTable [1-1](#index_split_000.html#14) details the\
    \ amount of acceptable downtime per week, per month, and per year for each level\
    \ of availability.\n\n`Table 1-1. Levels of Availability`\n\n`Level of Availability`\
    \ | `Downtime per Week` | `Downtime per Month` | `Downtime per Year`\n--- | ---\
    \ | --- | ---\n99% | 1 hour, 40 minutes, 48 seconds | 7 hours, 18 minutes, 17\
    \ seconds | 3 days, 15 hours, 39 minutes, 28 seconds\n99.9% | 10 minutes, 4 seconds\
    \ | 43 minutes, 49 seconds | 8 hours, 45 minutes, 56 seconds\n99.99% | 1 minute\
    \ | 4 minutes, 23 seconds | 52 minutes, 35 seconds\n99.999% | 6 seconds | 26 seconds\
    \ | 5 minutes, 15 seconds\n\n*All values are rounded down to the nearest second.*\n\
    \nTo calculate other levels of availability, you can use the script in `Listing\
    \ 1-1`. Before running this script, replace the value of `@Uptime` to represent\
    \ the level of uptime that you wish to calculate. You should also replace the\
    \ value of `@UptimeInterval` to reflect uptime per week, month, or year.\n\n`Listing\
    \ 1-1. Calculating the Level of Availability`\n\n```sql\nDECLARE @Uptime DECIMAL(5,3)\
    \ ;\n--Specify the uptime level to calculate\nSET @Uptime = 99.9 ;\n\nDECLARE\
    \ @UptimeInterval VARCHAR(5) ;\n--Specify WEEK, MONTH, or YEAR\nSET @UptimeInterval\
    \ = 'YEAR' ;\n\nDECLARE @SecondsPerInterval FLOAT ;\n--Calculate seconds per interval\n\
    SET @SecondsPerInterval =\n(\n    SELECT CASE\n        WHEN @UptimeInterval =\
    \ 'YEAR'\n            THEN 60*60*24*365.243\n        WHEN @UptimeInterval = 'MONTH'\n\
    \            THEN 60*60*24*30.437\n        WHEN @UptimeInterval = 'WEEK'\n   \
    \         THEN 60*60*24*7\n    END\n) ;\n\nDECLARE @UptimeSeconds DECIMAL(12,4)\
    \ ;\n--Calculate uptime\nSET @UptimeSeconds = @SecondsPerInterval * (100-@Uptime)\
