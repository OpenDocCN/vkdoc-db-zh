    ## Configuring a Role


    After creating a role, you may wish to configure it to alter the failover policy
    or configure nodes as preferred owners. To configure a role, select Properties
    from the role’s context menu. On the General tab of the Properties dialog box,
    which is shown in `Figure 3-28`, you can configure a node as the preferred owner
    of the role. You can also change the order of precedence of node preference by
    moving nodes above or below others in the Preferred Owners window.


    ![](index-67_1.jpg)


    `Figure 3-28.` The General tab


    You can also select the priority for the role in the event that multiple roles
    fail over to another node at the same time. The options for this setting are as
    follows:


    - High

    - Medium

    - Low

    - No Auto Start


    We will configure the `ALWAYSON-MSDTC-C` role to failover with High priority.


    ![](index-68_1.jpg)


    On the Failover tab of the Properties dialog box, you can configure the number
    of times that the role can fail over within a given period before the role is
    left offline. The default value for this is one failure within 6 hours. The issue
    with this is that if a role fails over, and after you fix the issue on the original
    node, you fail the role back, no more failovers are allowed within the 6-hour
    window. This is obviously a risk, and I generally advise that you change this
    setting. In our case, we have configured the role to allow a maximum of three
    failovers within a 24-hour time window, as illustrated in `Figure 3-29`. We have
    also configured the role to fail back to the most preferred owner if it becomes
    available again. Remember, when setting automatic failback, that failback also
    causes downtime in the same way that a failover does. If you aspire to a very
    high level of availability, such as five 9s, then this option may not be appropriate.
    We will configure the `ALWAYSON-MSDTC-C` Role to allow three failovers within
    a 24-hour period. We will also configure the role to allow immediate failback.


    `Figure 3-29.` The Failover tab


    ## Summary


    Before creating the cluster, the Microsoft Cluster Service (MCS) must be installed
    on all nodes. This can be achieved by installing the Cluster feature, using the
    Add Roles and Features wizard.


    Once the Cluster feature has been installed, clustering can be configured on each
    node by using the Create Cluster Wizard. Before building the cluster, this wizard
    will prompt you to run the Cluster Validation Wizard. The Cluster Validation Wizard
    will validate that environment meets the requirements for a cluster. If you find
    that your environment does not meet the requirements, you can continue to building
    the cluster, but the installation will not be supported by Microsoft.


    Once the cluster has been built, it will also need to be configured. This will
    include configuring the quorum mode and may also include configuring MSDTC. After
    creating a role on the cluster, you may also wish to configure the role with failover
    policies or preferred owners.


