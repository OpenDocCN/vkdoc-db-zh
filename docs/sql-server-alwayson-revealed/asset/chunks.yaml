  trans: '# 第六章 ■ 使用 AlwaysOn 可用性组实施灾难恢复


    清单 6-4 中的脚本演示了如何为我们的 `App2` 可用性组创建一个分布式可用性组。该脚本假设你已经在第二个集群上创建了一个可用性组，其配置与位于 `ALWAYSON-C`
    集群上的 `App2` 可用性组相匹配。它假设你已将灾难恢复集群上的可用性组侦听器命名为 `App2DR`。然后，该脚本会将第二个服务器上的可用性组加入到分布式可用性组中。


    ■ **提示** 将辅助可用性组加入分布式可用性组后，它将自动变为只读状态，只允许通过从主可用性组同步进行的更新。


    ## 清单 6-4 创建分布式可用性组


    ```sql

    CREATE AVAILABILITY GROUP App2Distributed

    WITH (DISTRIBUTED)

    AVAILABILITY GROUP ON

    ''App2'' WITH

    (

    LISTENER_URL = ''tcp://App2_App2Listen:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''App2DR'' WITH

    (

    LISTENER_URL = ''tcp://App2_App2Listen:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    ```


    ■ **注意** 如果你希望遵循后续章节中的演示，请不要遵循本节中的演示。


    ## 配置可读辅助副本


    在 AlwaysOn 可用性组拓扑中添加可读辅助副本以实现垂直扩展的报表功能会非常有用。当你使用此策略时，数据库通过日志流保持同步，延迟通常是可变且较低的。从
    SQL Server 2014 开始，可读辅助副本的一个额外优势是，即使主副本脱机，它们也能保持在线。然而，使用此可用性功能的限制在于，用户必须直接连接到实例，而不是可用性组侦听器。


    你可以通过使用临时统计信息来进一步提高可读辅助副本的读取性能，这些统计信息也可用于优化只读工作负载。此外，即使明确请求了其他隔离级别或锁定提示，快照隔离也**仅**在可读辅助副本上使用。这有助于避免争用，但也意味着
    `TempDB` 应适当扩展并位于快速磁盘阵列上。


    使用可读辅助副本的主要风险在于，在辅助副本上实现快照隔离实际上可能导致主副本上已删除的记录无法被清理。这是因为幽灵记录清理任务仅在行不再被辅助副本需要时，才会从主副本中移除它们。在这种情况下，主副本上的日志截断也会被延迟。这意味着你可能面临需要终止针对可读辅助副本执行的长时间运行的查询的风险。如果辅助副本与主副本断开连接，此问题也可能发生。因此，存在你可能需要将辅助副本从可用性组中移除并随后读取它的风险。


    要使辅助副本可读，你需要执行三项任务。首先，配置辅助副本以允许只读连接。其次，指定用于报表的只读 URL。然后，可用性组侦听器会将适当的流量定向到此 URL。最后一项任务是更新主副本上的只读路由列表。这些任务由清单
    6-5 中的脚本执行。


    ## 清单 6-5 配置只读路由


    ```sql

    --将 ASYNCDR 副本配置为允许只读连接

    ALTER AVAILABILITY GROUP App1

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH

    (SECONDARY_ROLE (ALLOW_CONNECTIONS = READ_ONLY)) ;


    --为 ASYNCDR 副本配置只读 URL

    ALTER AVAILABILITY GROUP App1

    ```'
- fmt: '# CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS


    ```sql

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH


    (SECONDARY_ROLE (READ_ONLY_ROUTING_URL = N''TCP://CLUSTERNODE3.


    ALWAYSONREVEALE.com:1433'')) ;


    --Configure the read-only routing list on the Primary Replica


    ALTER AVAILABILITY GROUP App1


    MODIFY REPLICA ON N''CLUSTERNODE1\PRIMARYREPLICA'' WITH


    (PRIMARY_ROLE (READ_ONLY_ROUTING_LIST=(''CLUSTERNODE3\ASYNCDR''))) ;

    ```


    Prior to SQL Server 2016, if you specified multiple readable secondary replicas
    in the routing list, then the listener would attempt to direct read-intent traffic
    to the first replica in the routing list. If this replica was not available, it
    would attempt to write to the second replica in the routing list, and so on. The
    result of this, was that while you could scale reporting to a secondary server,
    you could not load balance those reports across multiple secondary servers.


    SQL Server 2016 introduces load balancing for active secondary replicas, however.
    When using load balancing for active secondaries, the listener will balance the
    read-intent workload, by distributing it across the specified replicas with a
    round-robin algorithm.


    Additionally, you can specify groups of balanced replicas. For example, imagine
    that we added four additional replicas to the `App1` Availability Group, all of
    which were intended for the offloading of reporting. Figure 6-19 shows several
    different topologies that could be used, depending on your requirements for consistency
    of performance.


    ![](index-156_1.jpg)


    ## Figure 6-19. Possible load balancing topologies


    > **Tip:** Often, business users will value consistency of performance over the
    performance itself.


    In the first example, traffic will be balanced across all four active secondaries.
    The second example illustrates that the replicas have been split into two separate
    groups. The listener will first try to route read-intent request to the first
    group of servers and will balance the load between the two. If the first group
    of servers is unavailable, then the listener will route the read-intent traffic
    to the second group of servers, and balance the load between the servers within
    this group. In the final example, the listener will attempt to route traffic to
    the two server group. If this group of servers is unavailable, then it will route
    all read-intent traffic to the third server, with no load balancing. If the third
    server also goes offline, then all read-intent traffic will be routed to the fourth
    server, again with no load balancing.


    The script in Listing 6-6 demonstrates how to modify the read-only routing list
    on the primary replica, to configure load balancing as illustrated in the second
    example. The script assumes that the read-only routing URLs have already been
    configured on the active secondaries. Notice that each server group has been enclosed
    in nested parenthesis.


    ### Listing 6-6. Configure the Read-Only Routing List for Load Balancing


    ```sql

    ALTER AVAILABILITY GROUP App1


    MODIFY REPLICA ON N''CLUSTERNODE1\PRIMARYREPLICA'' WITH


    (PRIMARY_ROLE (READ_ONLY_ROUTING_LIST=((''CLUSTERNODE4\READ01'',''CLUSTERNODE5\


    READ02''),(''CLUSTERNODE6\READ03'',''CLUSTERNODE7\READ04'')))) ;

    ```


    ## Summary


    If you implement disaster recovery with Availability Groups, then you need to
    configure a multi-subnet cluster. This does not mean that you must have SAN replication
    between the sites, however, since Availability Groups do not rely on shared storage.
    What you do need to do is add additional IP Addresses for the administrative cluster
    access point and also for the Availability Group Listener. You also need to pay
    attention to the properties of the cluster that support client reconnection to
    ensure that clients do not experience a high number of timeouts.


    # CHAPTER 7 ■ ADMINISTERING ALWAYSON


    This chapter will discuss how to administer AlwaysOn features. We will first look
    at cluster maintenance, including rolling patch upgrades and removing an instance.
    We will then discuss managing Availability Groups, including how to fail over
    synchronously and asynchronously. We will also examine how to fail over a Distributed
    Availability Group.


    Additional maintenance tasks, such as synchronizing instance-level objects, safe-stating
    an application, and adding multiple Listeners to an Availability Group, will also
    be discussed. The chapter will end by discussing how to suspend data movement
    and how to remove a database from an Availability Group.


    ## Managing a Cluster


    Installing the cluster is not the end of the road from an administrative perspective.
    You still need to periodically perform maintenance tasks. The following sections
    describe some of the most common maintenance tasks.


    ### Moving the Instance Between Nodes


    Other than protecting against unplanned outages, one of the benefits of implementing
    high availability technologies is that doing so significantly reduces downtime
    for maintenance tasks, such as patching. This can be at the operating system level
    or the SQL Server level.


    If you have a two-node cluster, apply the patch to the passive node first. Once
    you are happy that the update was successful, fail over the instance and then
    apply the patch to the other node. At this point, you may or may not wish to fail
    back to the original node, depending on the needs of your environment. For example,
    if the overriding priority is the level of availability of the instance, then
    you will probably not wish to fail back, because this will incur another short
    outage.


    On the other hand, if your instance is less critical and you have licensed SQL
    Server with Software Assurance, then you may not be paying for the SQL Server
    license on the passive node. In this scenario, you only have a limited time period
    in which to fail the instance back to avoid needing to purchase an additional
    license for the passive node.


    > **Note:** For versions of SQL Server prior to SQL Server 2014, Software Assurance
    is not required in order to have a passive node without a license.


    To move an instance to a different node using Failover Cluster Manager, select
    Move | Select Node from the context menu of the role that contains the instance.
    This causes the Move Clustered Role dialog box to display. Here, you can select
    the node to which you wish to move the role, as illustrated in Figure 7-1.


    ### Figure 7-1. The Move Clustered Role dialog box


    The role is then moved to the new node. If you watch the role’s resources window
    in Failover Cluster Manager, then you see each resource move through the states
    of Online ➤ Offline Pending ➤ Offline. The new node is now displayed as the owner
    before the resources move in turn through the states of Offline ➤ Online Pending
    ➤ Online. The resources are taken offline and placed back online in order of their
    dependencies.


    We can also fail over a role using PowerShell. To do this, we need to use the
    `Move-ClusterGroup` cmdlet. Listing 7-1 demonstrates this by using the cmdlet
    to fail back the instance to `ClusterNode1`. We use the `-Name` parameter to specify
    the role that we wish to move and the `-Node` parameter to specify the node to
    which we wish to move it.


    ### Listing 7-1. Moving the Role Between Nodes


    ```powershell

    Move-ClusterGroup -Name "SQL Server (ALWAYSON-C)" -Node ClusterNode1

    ```


    ### Rolling Patch Upgrade


    If you have a cluster with more than two nodes, then consider performing a rolling
    patch upgrade when you are applying updates for SQL Server. In this scenario,
    you mitigate the risk of having different nodes, which are possible owners of
    the role, running different'
