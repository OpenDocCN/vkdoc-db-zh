    name.


    ![](index-50_1.jpg)


    ### Figure 3-9. The Select Servers page


    On the `Validation Warnings` page, you are asked if you wish to run the validation
    tests against the cluster. You should always choose to run this validation for
    production servers, because Microsoft will not offer support for the cluster unless
    it has been validated. Choosing to run the validation tests invokes the `Validate
    a Configuration Wizard`. You can also run this wizard independently from the Management
    pane of `Failover Cluster Manager`. The `Validation Warnings` page is shown in
    Figure 3-10.


    ![](index-51_1.jpg)


    ### Figure 3-10. The Validation Warning page


    **Tip** There are some situations in which validation is not possible, and in
    these instances, you need to select the `No, I Do Not Require Support…` option.
    For example, some DBAs choose to install one-node clusters instead of stand-alone
    instances so that they can be scaled up to full clusters in the future, if need
    be. This approach can cause operational challenges for Windows administrators,
    however, so use it with extreme caution.


    After you pass through the `Before You Begin` page of the `Validate a Configuration
    Wizard`, you see the `Testing Options` page. Here, you are given the option of
    either running all validation tests or selecting a subset of tests to run, as
    illustrated in Figure 3-11. Normally when you are installing a new cluster, you
    want to run all validation tests, but it is useful to be able to select a subset
