    ### Tip


    数据库镜像不支持使用内存中 OLTP 的数据库。


    如果你的数据库包含内存优化文件组，你将无法配置数据库镜像。


    ## AlwaysOn 可用性组


    AlwaysOn 可用性组取代了数据库镜像，它本质上是数据库镜像和集群技术的融合。在集群的每个节点上，SQL Server 以独立实例（而不是 AlwaysOn
    故障转移集群实例）的形式安装。然后，一个名为可用性组侦听器的集群感知应用程序被安装在集群上；它用于将流量定向到正确的节点。然而，AOAG 不依赖于共享磁盘，而是压缩日志流并将其发送到其他节点，其方式类似于数据库镜像。


    在 SQL Server 2016 之前，AlwaysOn 可用性组仅在 SQL Server 的企业版中受支持。然而，在 SQL Server 2016
    中，标准版开始支持 AlwaysOn 可用性组，但仅提供基本功能。标准版中的基本功能仅支持两个副本。这旨在作为标准版对数据库镜像（仅限高安全模式）支持的替代方案。


    在你拥有写入量较小的中小型数据库场景下，AOAG 是最合适的高可用性技术。这是因为，当使用同步模式时，它要求在数据提交到主数据库之前，先提交到所有同步副本。然而，与数据库镜像不同，你最多可以拥有八个副本，其中包括两个同步副本。在虚拟化环境中实现高可用性时，AOAG
    也可能是最合适的技术。这是因为集群所需的共享磁盘可能与虚拟化环境的某些功能不兼容。例如，当虚拟机使用通过光纤通道呈现的共享磁盘时，VMware 不支持使用
    vMotion（用于在物理服务器之间手动移动虚拟机）和分布式资源调度器（用于根据资源利用率在物理服务器之间自动移动虚拟机）。


    ### Tip


    通过 iSCSI 连接将存储直接呈现给客户机操作系统，可以解决 VMware 功能对共享磁盘的限制。然而，这是以性能下降为代价的。


    ## 第 2 章 ■ 理解高可用性和灾难恢复技术


    在你有主动故障转移需求但不需要实现负载延迟的场景下，AOAG 是最合适的灾难恢复技术。在你希望利用灾难恢复服务器卸载报告负载的场景中，AOAG 也可能适用于灾难恢复。当用于灾难恢复时，AOAG
    以异步模式工作。这意味着在发生故障转移时有可能丢失数据。RPO 是非确定性的，并基于最后一个未提交事务的时间。


    当你使用数据库镜像时，辅助数据库始终处于离线状态。这意味着你无法使用辅助数据库来卸载任何报告或其他只读活动。通过针对辅助数据库创建数据库快照并将只读活动指向该快照，可以部分解决这个问题。然而，这仍然可能很复杂，因为你必须配置你的应用程序以针对不同的网络名称和
    IP 地址发出只读语句。另一方面，可用性组允许你将一个或多个副本配置为可读。唯一的限制是可读副本和自动故障转移不能配置在同一个辅助副本上。然而，通常的做法是在异步提交模式下配置可读的辅助副本，这样它们就不会影响性能。


    为了进一步简化这一点，可用性组副本会检查只读或...'
