- fmt: "You can perform these steps with the [script in Listing 7-6](#index_split_002.html#166).\
    \ When run from the DR instance, this script places the databases in App1 into\
    \ a safe state before failing over, and then it reconfigures the application to\
    \ work under normal operations.\n\n### **Listing 7-6.** Safe-Stating an Application\
    \ and Failing Over\n\n```sql\n--DISABLE LOGINS\n\nDECLARE @AOAGDBs TABLE\n(\n\
    \    DBName NVARCHAR(128)\n) ;\n\nINSERT INTO @AOAGDBs\nSELECT database_name\n\
    FROM sys.availability_groups AG\nINNER JOIN sys.availability_databases_cluster\
    \ ADC\n    ON AG.group_id = ADC.group_id\nWHERE AG.name = 'App1' ;\n\nCHAPTER\
    \ 7 ■ ADMINISTERING ALWAYSON\n\nDECLARE @Mappings TABLE\n(\n    LoginName NVARCHAR(128),\n\
    \    DBname NVARCHAR(128),\n    UserName NVARCHAR(128),\n    AliasName NVARCHAR(128)\n\
    ) ;\n\nINSERT INTO @Mappings\nEXEC sp_msloginmappings ;\n\nDECLARE @SQL NVARCHAR(MAX)\n\
    \nSELECT DISTINCT @SQL =\n(\n    SELECT 'ALTER LOGIN [' + LoginName + '] DISABLE;\
    \ ' AS [data()]\n    FROM @Mappings M\n    INNER JOIN @AOAGDBs A\n        ON M.DBname\
    \ = A.DBName\n    WHERE LoginName <> SUSER_NAME()\n    FOR XML PATH ('')\n)\n\n\
    EXEC(@SQL)\nGO\n\n--SWITCH TO SYNCHRONOUS COMMIT MODE\n\nALTER AVAILABILITY GROUP\
    \ App1\nMODIFY REPLICA ON N'CLUSTERNODE3\\ASYNCDR' WITH (AVAILABILITY_MODE = SYNCHRONOUS_COMMIT)\
    \ ;\nGO\n\n--FAIL OVER\n\nALTER AVAILABILITY GROUP App1 FAILOVER\nGO\n\n--SWITCH\
    \ BACK TO ASYNCHRONOUS COMMIT MODE\n\nALTER AVAILABILITY GROUP App1\nMODIFY REPLICA\
    \ ON N'CLUSTERNODE3\\ASYNCDR' WITH (AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT) ;\n\
    GO\n\nCHAPTER 7 ■ ADMINISTERING ALWAYSON\n\n--ENABLE LOGINS\n\nDECLARE @AOAGDBs\
    \ TABLE\n(\n    DBName NVARCHAR(128)\n) ;\n\nINSERT INTO @AOAGDBs\nSELECT database_name\n\
    FROM sys.availability_groups AG\nINNER JOIN sys.availability_databases_cluster\
    \ ADC\n    ON AG.group_id = ADC.group_id\nWHERE AG.name = 'App1' ;\n\nDECLARE\
    \ @Mappings TABLE\n(\n    LoginName NVARCHAR(128),\n    DBname NVARCHAR(128),\n\
    \    Username NVARCHAR(128),\n    AliasName NVARCHAR(128)\n) ;\n\nINSERT INTO\
    \ @Mappings\nEXEC sp_msloginmappings\n\nDECLARE @SQL NVARCHAR(MAX)\n\nSELECT DISTINCT\
    \ @SQL =\n(\n    SELECT 'ALTER LOGIN [' + LoginName + '] ENABLE; ' AS [data()]\n\
    \    FROM @Mappings M\n    INNER JOIN @AOAGDBs A\n        ON M.DBname = A.DBName\n\
    \    WHERE LoginName <> SUSER_NAME()\n    FOR XML PATH ('')\n) ;\n\nEXEC(@SQL)\n\
    ```\n\n### Failing Over a Distributed Availability Group\n\nDistributed Availability\
    \ Groups do not support automatic failover; only manual failover is supported.\
    \ When you need to fail over to a secondary Availability Group, within a Distributed\
    \ Availability Group, you should perform the following steps:\n\n• Set the synchronization\
    \ mode to Synchronous Commit\n• Wait for the secondary Availability Group to become\
    \ synchronized\n• Set the primary Availability Group to take the role of the secondary\n\
    • Force failover\n\nCHAPTER 7 ■ ADMINISTERING ALWAYSON\n\nThe [script in Listing\
    \ 7-7](#index_split_002.html#169) will force failover for the Distributed Availability\
    \ Group discussed in [Chapter 6](http://dx.doi.org/10.1007/978-1-4842-2397-0_6).\n\
    \n### **Listing 7-7.** Failover for a Distributed Availability Group\n\n```sql\n\
    --Set the secondary Availability Group to synchronous commit mode\n\nALTER AVAILABILITY\
    \ GROUP App2Distributed\nMODIFY AVAILABILITY GROUP ON\n    'ag1' WITH\n    (\n\
    \        LISTENER_URL = 'tcp://App2_App2Listen:5022',\n        AVAILABILITY_MODE\
    \ = ASYNCHRONOUS_COMMIT,\n        FAILOVER_MODE = MANUAL,\n        SEEDING_MODE\
    \ = MANUAL\n    ),\n    'ag2' WITH\n    (\n        LISTENER_URL = 'tcp://App2_App2Listen:5022',\n\
    \        AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n        FAILOVER_MODE = MANUAL,\n\
    \        SEEDING_MODE = MANUAL\n    );\n\n--Wait until the Availability Groups\
    \ are synchronized\n\nWHILE (SELECT COUNT(DISTINCT synchronization_state_desc)\n\
    \       FROM (\n            SELECT\n                ag.name,\n               \
    \ drs.database_id,\n                drs.group_id,\n                drs.replica_id,\n\
    \                drs.synchronization_state_desc,\n                drs.end_of_log_lsn\n\
    \            FROM sys.dm_hadr_database_replica_states drs\n            INNER JOIN\
    \ sys.availability_groups ag\n                ON drs.group_id = ag.group_id\n\
    \            WHERE ag.name = 'App2'\n                AND synchronization_state_desc\
    \ = 'synchronized'\n       ) a\n) > 1\nBEGIN\n    WAITFOR DELAY '00:00:05' ;\n\
    END\n\nCHAPTER 7 ■ ADMINISTERING ALWAYSON\n\n--Assign the primary Availability\
    \ Group, the secondary role\n\nALTER AVAILABILITY GROUP App2Distributed SET (ROLE\
    \ = SECONDARY) ;\n\n--Force the failover\n\nALTER AVAILABILITY GROUP App2Distributed\
    \ FORCE_FAILOVER_ALLOW_DATA_LOSS ;\n```\n\n### Synchronizing Uncontained Objects"
