    ```

    .\setup.exe /IACCEPTSQLSERVERLICENSETERMS /ACTION="AddNode" /INSTANCENAME="MSSQLSERVER"
    /SQLSVCACCOUNT="ALWAYSONREVEALED\SQLAdmin" /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="ALWAYSONREVEALED\SQLAdmin"
    /AGTSVCPASSWORD="Pa$$w0rd" /FAILOVERCLUSTERIPADDRESSES="IPv4;192.168.0.51;Cluster
    Network 2;255.255.255.0" /CONFIRMIPDEPENDENCYCHANGE=0 /qs

    ```


    ## 小结


    可以使用 SQL Server 安装中心或通过 PowerShell 安装 AlwaysOn 故障转移集群实例。使用 SQL Server 安装中心时，过程与安装独立实例非常相似；但是，您需要指定其他详细信息，例如网络名称、IP
    地址和资源组配置。


    使用 PowerShell 安装实例时，您将使用 `InstallFailoverCluster` 操作，除了独立实例构建所需的参数外，还需要指定 `/FAILOVERCLUSTERIPADDRESSES`、`/FAILOVERCLUSTERNETWORKNAME`
    和 `/INSTALLSQLDATADIR` 参数。


    # 第五章 ■ 使用 AlwaysOn 可用性组实现高可用性


    AlwaysOn 可用性组为实现高可用性、灾难恢复和扩展只读工作负载提供了一个灵活的选项。该技术在数据库级别同步数据，但健康监控和仲裁由 Windows 集群提供。


    本章演示如何为高可用性和灾难恢复构建和配置可用性组。我们还将讨论诸如性能注意事项和维护等方面，以及如何使用可用性组来扩展只读工作负载。


    本章的演示使用在[第 3 章](http://dx.doi.org/10.1007/978-1-4842-2397-0_3)中构建的集群。每个节点都已预先配置了一个独立实例。`CLUSTERNODE1`
    托管名为 `PRIMARYREPLICA` 的实例，`CLUSTERNODE2` 托管名为 `SYNCHA` 的实例。


    在本章中，我们将创建两个可用性组。第一个将命名为 `App1`，并包含 `App1Customers` 和 `App1Sales` 数据库。第二个将命名为
    `App2`，并包含 `App2Customers` 数据库。因此，我们将在本章执行的任务如下：


    *   创建 `App1Customers`、`App1Sales` 和 `App2Customers` 数据库。

    *   配置独立实例以支持可用性组。

    *   使用“新建可用性组”向导创建 `App1` 可用性组和侦听器。

    *   使用“新建可用性组”对话框创建 `App2` 可用性组。

    *   使用“新建侦听器”对话框创建 `App2` 侦听器。


    © Peter A. Carter 2016

    P. A. Carter, *SQL Server AlwaysOn Revealed*, DOI 10.1007/978-1-4842-2397-0_5

