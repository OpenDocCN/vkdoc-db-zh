  trans: "# 第 5 章 ■ 使用 AlwaysOn 可用性组实现高可用性\n\n如图 5-10 所示。如果任何结果返回为 `失败`，那么你需要在尝试继续之前解决它们。\n\
    \n![](img/index-111_1.jpg)\n\n**图 5-10.** 验证页面\n\n一旦验证测试完成，我们进入摘要页面，会看到一个将在设置过程中执行的任务列表。随着设置的进行，每个配置任务的结果会显示在结果页面上。如果此页面出现任何错误，请务必调查它们，但这不一定意味着需要重新配置整个可用性组。例如，如果可用性组侦听器的创建因为\
    \ `VCO` 未在 `AD` 中预先创建而失败，那么你可以重新创建侦听器，而无需重新创建整个可用性组。\n\n作为使用新建可用性组向导的替代方法，你可以使用新建可用性组对话框，然后使用添加侦听器对话框来执行可用性组的配置。这种创建可用性组的方法将在本章后面探讨。\n\
    \n## 脚本化可用性组\n\n我们还可以使用清单 5-4 中的脚本来编写活动脚本。此脚本连接到集群中的两个实例，这意味着它只能在 `SQLCMD` 模式下运行。\n\
    \n首先，脚本在每个实例上为服务帐户创建登录名。然后，它创建 `TCP` 端点，为服务帐户分配连接权限，并启动 AlwaysOn 可用性组的运行状况跟踪（我们将在本章后面讨论）。接着，脚本在主副本上创建可用性组，并将辅助副本加入该组。接下来，我们执行完整备份和日志备份，并在将数据库添加到组之前还原每个将参与可用性组的数据库。请注意，数据库是以串行方式备份、还原和添加到组的。如果你有许多数据库，那么你可能希望将此过程并行化。\n\
    \n**清单 5-4.** 创建可用性组\n\n```\n--为服务帐户创建登录名，\n--创建端点并在主副本上\n--为服务帐户分配端点连接权限\n\n\
    :Connect CLUSTERNODE1\\PRIMARYREPLICA\n\nUSE master\nGO\n\nCREATE LOGIN [prosqladmin\\\
    clusteradmin] FROM WINDOWS ;\nGO\n\nCREATE ENDPOINT [Hadr_endpoint]\n   AS TCP\
    \ (LISTENER_PORT = 5022)\n   FOR DATA_MIRRORING (ROLE = ALL, ENCRYPTION = REQUIRED\
    \ ALGORITHM AES) ;\nGO\n\nALTER ENDPOINT [Hadr_endpoint] STATE = STARTED ;\nGO\n\
    \nGRANT CONNECT ON ENDPOINT::[Hadr_endpoint] TO [prosqladmin\\clusteradmin] ;\n\
    GO\n\nIF EXISTS(SELECT * FROM sys.server_event_sessions WHERE name='AlwaysOn_health')\n\
    BEGIN\n    ALTER EVENT SESSION AlwaysOn_health ON SERVER WITH (STARTUP_STATE=ON);\n\
    END\n\nIF NOT EXISTS(SELECT * FROM sys.dm_xe_sessions WHERE name='AlwaysOn_health')\n\
    BEGIN\n    ALTER EVENT SESSION AlwaysOn_health ON SERVER STATE=START;\nEND\nGO\n\
    \n--为服务帐户创建登录名，\n--创建端点并在辅助副本上\n--为服务帐户分配端点连接权限\n\n:Connect CLUSTERNODE2\\SYNCHA\n\
    \nUSE master\nGO\n\nCREATE LOGIN [prosqladmin\\ClusterAdmin] FROM WINDOWS ;\n\
    GO\n\nCREATE ENDPOINT [Hadr_endpoint]\n   AS TCP (LISTENER_PORT = 5022)\n   FOR\
    \ DATA_MIRRORING (ROLE = ALL, ENCRYPTION = REQUIRED ALGORITHM AES) ;\nGO\n\nALTER\
    \ ENDPOINT [Hadr_endpoint] STATE = STARTED ;\nGO\n\nGRANT CONNECT ON ENDPOINT::[Hadr_endpoint]\
