    On the `Confirmation` page of the wizard, you are given a summary of the configuration
    changes that will be made, as shown in Figure 6-7.


    ## Figure 6-7. The Confirmation page


    On the `Configure Cluster Quorum Settings` page, a progress bar displays. Once
    the configuration is complete, the `Summary` page appears. This page provides
