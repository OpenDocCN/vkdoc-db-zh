    \ 9-2 中详述的列。\n\n`表 9-2. sys.dm_os_cluster_properties 的列`\n\n| `列` | `描述` |\n|\
    \ :--- | :--- |\n| `VerboseLogging` | 指示群集使用的日志记录级别。可能的值有：<br>• 0 - 指示日志记录已关闭<br>•\
    \ 1 - 指示仅记录错误<br>• 2 - 指示记录错误和警告 |\n| `SQLDumperDumpFlags` | 指定 `SQLDumper` 将生成的转储文件类型。可能的值有：<br>•\
    \ 0x0120 - 指示小型转储<br>• 0x0110 - 指示完整转储<br>• 0x8100 - 指示筛选转储 |\n| `SQLDumperDumpPath`\
    \ | 指定 `SQLDumper` 将输出转储文件的文件路径 |\n| `SQLDumperDumpTimeOut` | `SQLDumper` 创建转储文件时的超时值。以毫秒为单位指定\
    \ |\n| `FailureConditionLevel` | 将导致发生故障转移的故障级别。故障条件级别的完整描述见表 9-3 |\n| `HealthCheckTimeout`\
    \ | 数据库引擎等待返回运行状况信息的持续时间，之后它将判定实例无响应 |\n\n`FailureConditionLevel` 列返回的可能故障条件级别详见表\
    \ 9-3。\n\n`表 9-3. 故障条件级别`\n\n| `条件级别` | `描述` |\n| :--- | :--- |\n| 0 | 不会发生自动故障转移\
    \ |\n| 1 | 当 SQL Server 服务关闭时发生自动故障转移 |\n| 2 | 当满足以下条件时将发生自动故障转移：<br>• 满足级别 1\
    \ 的条件<br>• 超过 `HealthCheckTimeout` 值 |\n| 3 | 当满足以下条件时将发生自动故障转移：<br>• 满足级别 2 的条件<br>•\
    \ 运行状况检查返回系统错误 |\n| 4 | 当满足以下条件时将发生自动故障转移：<br>• 满足级别 3 的条件<br>• 运行状况检查返回资源错误 |\n\
    | 5 | 当满足以下条件时将发生自动故障转移：<br>• 满足级别 4 的条件<br>• 运行状况检查返回查询处理错误 |\n\n清单 9-2 中的查询将返回当前的故障转移条件级别和当前的运行状况检查超时值。\n\
    \n`清单 9-2. 返回运行状况检查配置`\n\n```\nSELECT\n    FailureConditionLevel\n    , HealthCheckTimeout\n\
    FROM sys.dm_os_cluster_properties ;\n```\n\n可以通过使用 `sp_server_diagnostics` 系统存储过程手动确定实例的当前运行状况。该过程接受一个参数\
    \ `@repeat_interval`，它指定该过程应返回结果的频率（以秒为单位）。如果省略该参数，则结果只会返回一次。如果为该参数传递了值，则该值必须大于\
    \ 5。该过程返回表 9-4 中详述的结果集。\n\n`表 9-4. sp_server_diagnostics 返回的列`\n\n| `列` | `描述`\
    \ |\n| :--- | :--- |\n| `creation_time` | 指示创建行的时间 |\n| `component_type` | 指示组件的类型。可能的值有：<br>•\
    \ Instance<br>• AlwaysOn: Availability Group |\n| `component_name` | 指示组件的名称。可能的值有：<br>•\
    \ system<br>• resource<br>• query_processing<br>• io_subsystem<br>• events<br>•\
    \ [可用性组名称] |\n| `State` | 组件的运行状况状态。可能的值有：<br>• 0 - 指示状态未知<br>• 1 - 指示状态为干净（表示健康）<br>•\
    \ 2 - 指示存在警告<br>• 3 - 指示存在错误 |\n| `state_desc` | 组件状态的文本描述。可能的值有：<br>• Unknown<br>•\
    \ Clean<br>• Warnings<br>• Errors |\n| `Data` | 组件特定数据的 XML 表示形式。例如，资源组件包括指定可用物理内存和可用虚拟内存的元素。它还包括属性，例如内存不足异常的计数\
    \ |\n\n清单 9-3 中的脚本将返回 `sp_server_diagnostics` 系统存储过程的完整结果集，以及已从 XML 中提取的值。\n\n\
    ```\nEXEC sp_server_diagnostics 5;\n```\n"
