    ```\n\n### 对分布式可用性组执行故障转移\n\n分布式可用性组不支持自动故障转移；仅支持手动故障转移。当你需要故障转移到分布式可用性组内的辅助可用性组时，应执行以下步骤：\n\
    \n• 将同步模式设置为同步提交\n• 等待辅助可用性组变为已同步状态\n• 将主可用性组的角色设置为辅助角色\n• 强制故障转移\n\nCHAPTER 7\
