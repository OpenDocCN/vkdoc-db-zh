    ## Figure 6-2. Confirmation page


    On the `Configure the Cluster` page, the progress on the tasks displays until
    it is complete.


    The `Summary` page then displays, giving an overview of the actions and their
    success.


    ### Modifying the Quorum


    Our next step in configuring the cluster will be to modify the quorum. As mentioned
    earlier, we would like to remove our current dependency on shared storage. Therefore,
    we need to make a choice. Since we now have three nodes in the cluster, one possibility
    is to remove the disk witness and form a node majority quorum. The issue with
    this is that one of our nodes is in a different location. Therefore, if we lose
    network connectivity between the two sites for an extended period, then we have
    no fault tolerance in our primary site. If one of the nodes goes down, we lose
    quorum and the cluster goes offline. On the other hand, if we have an additional
    witness in the primary location, then we are not maintaining best practice, since
    there is an even number of votes. Again, if we lose one voting member, we lose
    resilience.


    Therefore, the approach that we take is to replace the disk witness with a file
    share witness, thus removing the shared disk dependency. We then remove the vote
    from the node in the DR site. This means that we have three voting members of
    the quorum, and all of them are within the same site. This mitigates the risk
    of an intersite network issue causing loss of redundancy in our HA solution.


    In order to invoke the `Configure Cluster Quorum Wizard`, we select `Configure
    Cluster Quorum` from the `More Actions` submenu within the context menu of our
    cluster in `Failover Cluster Manager`. After moving through the `Before You Begin`
    page of this wizard, you are asked to select the configuration that you wish to
    make on the `Select Quorum Configuration Option` page, which is shown in Figure
    6-3. We select the `Advanced Quorum Configuration` option.


    ## Figure 6-3. The Select Quorum Configuration Option page


    On the `Select Voting Configuration` page, we choose to select nodes and remove
    the vote from `CLUSTERNODE3`. This is demonstrated in Figure 6-4.


    ## Figure 6-4. The Select Voting Configuration page


    On the `Select Quorum Witness` page, we choose the `Configure a File Share Witness`
    option, as shown in Figure 6-5.


    ## Figure 6-5. The Select Quorum Witness page


    On the `Configure File Share Witness` page, which is illustrated in Figure 6-6,
    we enter the UNC of the share that we will use for the quorum. This file share
    must reside outside of the cluster and must be an SMB file share on a machine
    running `Windows Server`.


    ## Figure 6-6. The Configure File Share Witness page


    **Tip** Although many non-Windows-based NAS (network-attached storage) devices
    have support for SMB 3, I have experienced real-world implementations of a file
    share quorum on a NAS device work only intermittently, without resolution by either
