    in [Chapter 3](http://dx.doi.org/10.1007/978-1-4842-2397-0_3). We will also discuss
    how to build the failover clustered instance using PowerShell. To do this, we
    will need to use the Install a SQL Server Failover Cluster wizard on the primary
    node of

