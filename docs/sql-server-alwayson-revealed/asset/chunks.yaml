    MSSQL\\ASlwaysOnTrace.xel')\nWITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
    \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)\
    \ ;\n```\n\n`CREATE EVENT SESSION` DDL 语句接受的参数详见表 8-4.。\n\n## 表 8-4. CREATE EVENT\
    \ SESSION 参数\n\n| 参数 | 说明 |\n|----------|-------------|\n| `event_session_name`\
    \ | 指定您正在创建的事件会话的名称 |\n| `ADD EVENT \\| SET` | 为添加到会话的每个事件重复此部分，后跟事件名称，格式为 `package.event`；您可以使用\
    \ `SET` 语句设置特定于事件的自定义项，例如包含非强制事件字段 |\n| `ACTION` | 如果该事件需要捕获全局字段，则在每个 `ADD EVENT`\
    \ 参数后指定 |\n| `WHERE` | 如果该事件需要关联谓词，则在每个 `ADD EVENT` 参数后指定 |\n| `ADD TARGET \\\
    | SET` | 为将添加到会话的每个目标指定；您可以使用 `SET` 语句来填充特定于目标的参数，例如 `event_file` 目标的 `filename`\
    \ 参数 |\n\n`CREATE EVENT SESSION` 语句还接受多个 `WITH` 选项，详见表 8-5.。\n\n## 表 8-5. CREATE\
    \ EVENT SESSION WITH 选项\n\n| WITH 选项 | 说明 |\n|-------------|-------------|\n|\
    \ `MAX_MEMORY` | 指定事件会话在将事件分派到目标之前可用于缓冲事件的最大内存量 |\n| `EVENT_RETENTION_MODE` |\
    \ 指定如果缓冲区已满时的行为：可接受的值为 `ALLOW_SINGLE_EVENT_LOSS`，表示如果所有缓冲区都已满，则可以丢失单个事件；`ALLOW_MULTIPLE_EVENT_LOSS`，表示如果所有缓冲区都已满，则可以丢失整个缓冲区；以及\
    \ `NO_EVENT_LOSS`，表示导致事件触发的任务将等待，直到缓冲区中有空间 |\n| `MAX_DISPATCH_LATENCY` | 指定事件在会话缓冲区中驻留的最大时间（以秒为单位），之后将被刷新到目标\
    \ |\n| `MAX_EVENT_SIZE` | 指定来自任何单个事件的事件数据的最大可能大小；可以千字节或兆字节为单位指定，并且应仅配置为允许大于 `MAX_MEMORY`\
    \ 设置的事件 |\n| `MEMORY_PARTITION_MODE` | 指定在何处创建事件缓冲区；可接受的值如下：`NONE` - 表示将在实例内创建缓冲区；`PER_NODE`\
    \ - 表示将为每个 NUMA 节点创建缓冲区；`PER_CPU` - 表示将为每个 CPU 创建缓冲区 |\n| `TRACK_CAUSALITY` |\
    \ 指定将为每个事件存储一个额外的 GUID 和序列号，以便可以关联事件 |\n| `STARTUP_STATE` | 指定会话是否在实例启动时自动启动；`ON`\
    \ 表示是；`OFF` 表示否 |\n"
- fmt: '**Tip** 对于扩展事件的深入讨论，我强烈推荐Apress出版的《Pro SQL Server Administration》一书，可以从[www.apress.com/9781484207116](http://www.apress.com/9781484207116)购买。


    # Summary


    SQL Server提供了丰富的工具来监控AlwaysOn可用性组的健康状况。


    AlwaysOn仪表板是SQL Server Management Studio中的一个交互式报告，它允许您评估可用性组和副本的健康状况。它还提供了查看仲裁配置信息和实时健康数据的链接。


    实时健康数据由一个扩展事件会话捕获，该会话在您在实例上创建第一个可用性组时创建，并在后台运行，捕获预先配置的事件。可以自定义此跟踪；如果您需要自定义捕获，我建议保留其默认配置并创建一个新的事件会话。


    创建事件会话允许您捕获非常细粒度的关注点，或者仅仅是较粗粒度的信息，这取决于您的需求。扩展事件使用WMI实现，是一个非常轻量级的框架，这意味着您可以在不影响实例性能的情况下识别问题和趋势。


    # CHAPTER 9 Troubleshooting AlwaysOn


    SQL Server公开了大量与高可用性和灾难恢复对象相关的元数据，特别是围绕AlwaysOn功能集。这些元数据可用于快速识别配置、查找问题的根本原因或编写针对可能发生的事件的自动响应脚本。以下部分将讨论可用的元数据，并提供如何使用它的示例。


    ## AlwaysOn 故障转移群集实例元数据


    从数据库引擎内部，可以查看关于群集实例及其承载的Windows群集的大量元数据。这些信息对DBA来说非常宝贵。以下部分将介绍一些最有用和最有趣的元数据对象。


    ### 发现实例所在的节点


    自然地，DBA需要知道群集中哪个节点正在托管故障转移群集实例，尤其是在尝试诊断连接或性能问题时。如果您的组织有政策规定DBA不允许访问操作系统，则无法使用故障转移管理器。幸运的是，SQL
    Server中有一个DMV（动态管理视图）会公开此信息。`sys.dm_os_cluster_nodes` DMV将返回表9-1中详述的列。


