- fmt: '# Suspending Data Movement and Configuration Considerations for Availability
    Groups


    Sometimes you may need to suspend data movement to other replicas in an Availability
    Group. This is usually because the Availability Group is in Synchronous Commit
    mode and you have a period of high utilization where you need a performance improvement.
    You can suspend the data movement to a database by using the command in Listing
    7-9, which suspends data movement for the `App1Sales` database and then resumes
    it.


    > **Note:** If you suspend data movement, the transaction log on the primary replica
    continues to grow, and you are not able to truncate it until data movement resumes
    and the databases are synchronized.


    **Listing 7-9.** Suspending Data Movement


    ```sql

    ALTER DATABASE App1Customers SET HADR SUSPEND ;

    GO


    ALTER DATABASE App1Customers SET HADR RESUME ;

    GO

    ```


    ## File Placement for Databases and Logs


    Another important consideration is the placement of database and log files. These
    files must be in the same location on each replica. This means that if you use
    named instances, it is a hard technical requirement that you change the default
    file locations for data and logs, because the default location includes the name
    of the instance. This is assuming, of course, that you do not use the same instance
    name on each node, which would defy many of the benefits of having a named instance.


    ## Summary


    Failover to a synchronous replica in the event of a failure of the primary replica
    is automatic. There are instances, however, in which you will also need to fail
    over manually. This could be because of a disaster that requires failover to the
    DR site, or it could be for proactive maintenance. Although it is possible to
    fail over to an asynchronous replica with the possibility of data loss, it is
    good practice to place the databases in a safe-state first. Because you cannot
    place a database in read-only or single-user mode if it is participating in an
    Availability Group, safe-stating usually consists of disabling the logins and
    then switching to Synchronous Commit mode before failover.


    # CHAPTER 7 ■ ADMINISTERING ALWAYSON


    To monitor Availability Groups throughout the enterprise, you need to use a monitoring
    tool, such as Systems Operation Center. If you need to monitor a small number
    of Availability Groups or troubleshoot a specific issue, however, use one of the
    tools included with SQL Server, such as a dashboard for monitoring the health
    of the topology, and an extended events session, called the `AlwaysOn Health Trace`.


    One benefit of achieving high availability for SQL Server is that doing so allows
    you to minimize downtime during planned maintenance. On a two-node cluster, you
    can upgrade the passive node, fail over, and then upgrade the active node. For
    larger clusters, you can perform a rolling patch upgrade, which involves removing
    half of the nodes from the possible owners list and upgrading them. You then fail
    over the instance to one of the upgraded nodes and repeat the process for the
    remaining nodes. This mitigates the risk of mixed versions across the possible
    owners.


    # CHAPTER 8


    ## Monitoring AlwaysOn Availability Groups


    Once you have implemented Availability Groups, you need to monitor them and respond
    to any errors or warnings that could affect the availability of your data. If
    you have many Availability Groups implemented throughout the enterprise, then
    the only way to monitor them effectively and holistically is by using an enterprise
    monitoring tool, such as `SOC` (Systems Operations Center). If you only have a
    small number of Availability Groups, however, or if you are troubleshooting a
    specific issue, then SQL Server provides the `AlwaysOn Dashboard` and the `AlwaysOn
    Health Trace`. You can also create your own Extended Events sessions to monitor
    Availability Groups. This chapter will discuss each of these monitoring possibilities.


