  trans: "\n# 第 9 章 ■ AlwaysOn 故障排除\n\n## 事务日志中最后提交事务的 LSN\n\n## `last_commit_time`\n\
    事务日志中最后提交的 LSN 的时间戳\n\n## `low_water_mark_for_ghosts`\n虚影清理任务（用于物理删除已逻辑删除的行）使用此列在数据库所有副本中的最小值，来确定从何处开始清理记录。\n\
    \n## `secondary_log_seconds`\n辅助副本落后于主副本的秒数\n\n清单 9-5 中的脚本演示了如何评估 App1 可用性组内的可用性数据库的健康状况。您会注意到，我们使用\
    \ `DB_NAME()` 函数返回数据库名称，并将 `sys.dm_hadr_database_replica_states` DMV 与 `sys.availability_groups`\
    \ 和 `sys.availability_replicas` 目录视图连接，以返回可用性组和副本的名称。\n\n`清单 9-5.` 评估可用性数据库的状态\n\
    ```sql\nSELECT\n    DB_NAME(database_id)\n    ,ag.name\n    ,ar.replica_server_name\n\
    \    ,is_primary_replica\n    ,synchronization_state_desc\n    ,synchronization_health_desc\n\
    \    ,database_state_desc\nFROM sys.dm_hadr_database_replica_states drs\nINNER\
    \ JOIN sys.availability_groups ag\n    ON drs.group_id = ag.group_id\nINNER JOIN\
    \ sys.availability_replicas ar\n    ON drs.replica_id = ar.replica_id\nWHERE ag.name\
    \ = 'App1';\n```\n\n## 摘要\nSQL Server 提供了大量元数据，可帮助您排查问题并审核配置。虽然本章节讨论了一些最有用的元数据，但我强烈建议您进一步探索\
    \ `hadr` 系列 DMV。\n\n对于故障转移群集实例，`sys.dm_os_cluster_nodes` DMV 会公开群集中节点的运行状况状态。可以通过调用系统存储过程\
    \ `sp_server_diagnostics` 找到更详细的故障排除信息。\n\n**提示：** 系统存储过程 `sp_server_diagnostics`\
    \ 也可用于排除 AlwaysOn 可用性组的故障，并为实例上承载的每个可用性组返回一行。\n\n`sys.dm_hadr_availability_replica_states`\
    \ DMV 公开了托管 AlwaysOn 可用性组的副本的详细健康状态信息。要深入查看参与可用性组的数据库的健康状态，可以查询 `sys.dm_hadr_database_replica_states`\
    \ DMV。\n\n上述两个 DMV 都可以与 `sys.availability_groups` 和 `sys.availability_replicas`\
    \ DMV 连接，以获取有关配置的文本信息，而不是 GUID。`sys.dm_hadr_database_replica_states` DMV 也可以与\
    \ `sys.databases` 连接，以获取有关数据库配置的更多信息。\n\n## 索引\n**A**\n- `数据库页面`，92–93\n- `数据同步页面`，98–99\n\
    - `活动节点`，10\n- `端点选项卡`，95\n- `高级加密标准 (AES)`，95\n- `FAILOVER_CONDITION_LEVEL 参数`，108\n\
    - `AlwaysOn 介绍页面`，90–91\n- `侦听器对话框`，100\n- `侦听器选项卡`，97–98\n- `多子网群集`，97\n- `网络流量`，97\n\
    - `副本页面`，93–94\n- `脚本`，101\n- `服务账户`，95\n- `摘要页面`，100\n- `同步提交选项`，93–94\n- `验证页面`，99–100\n\
    \n**AlwaysOn 管理**\n- `可用性组`\n- `群集维护`，149\n- `群集节点配置页面`，153\n- `配置可能的所有者`，152\n\
    - `故障转移群集管理器`，150\n- `移动群集角色对话框`，150\n- `在节点间移动实例`，149，151\n- `覆盖优先级`，149\n- `PowerShell`，151，154\n\
    - `删除节点向导`，153–154\n- `删除可能的所有者`，151–152\n- `滚动修补升级`，151–152\n- `软件保障`，149\n-\
    \ `指定名称页面`，91–92\n\n**AlwaysOn 可用性组 (AOAG)**\n- `活动/被动群集`，26–27\n- `App1 和 App2`，83\n\
    - `App1Customers 和 App1Sales 数据库`，121\n- `异步故障转移`，157\n- `自动页面修复`，22\n- `备份数据库`，90，27\n\
    \n**C**\n- `数据库和日志文件`，164\n- `数据库创建`，84\n- `群集技术`，18\n\n**D**\n- `数据层应用程序`，19–20\n\
