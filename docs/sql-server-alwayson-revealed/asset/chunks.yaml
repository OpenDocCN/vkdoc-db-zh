- fmt: '# CHAPTER 4 ■ IMPLEMENTING AN ALWAYSON FAILOVER CLUSTERED INSTANCE


    Must be configured as `AddNode`.


    `/IACCEPTSQLSERVERLICENSETERMS`


    Mandatory when installing on Windows Server Core, since the `/qs` switch must
    be specified on Windows Server Core.


    `/INSTANCENAME`

    The instance that you are adding the extra node to support.


    `/CONFIRMIPDEPENDENCYCHANGE`

    Allows multiple IP Addresses to be specified for multi-subnet clusters. Pass in
    a value of 1 for True or 0 for False.


    `/FAILOVERCLUSTERIPADDRESSES`

    Specifies the IP Address(es) to use for the instance in the format `<IP Type>;<address>;<network
    name>;<subnet mask>`. For multi-subnet clusters, the IP Addresses are space delimited.


    `/FAILOVERCLUSTERNETWORKNAME`

    The virtual name of the clustered instance.


    `/INSTALLSQLDATADIR`

    The folder in which to place SQL Server data files. This must be a cluster disk.


    `/SQLSVCACCOUNT`

    The service account that is used to run the Database Engine.


    `/SQLSVCPASSWORD`

    The password of the service account that is used to run the Database Engine.


    `/AGTSVCACCOUNT`

    The service account that issued to run SQL Server Agent.


    `/AGTSVCPASSWORD`

    The password of the service account that is used to run SQL Server Agent.


    The [script in Listing 4-2](#index_split_001.html#92) adds `ClusterNode2` to the
    role when you run it from the root folder of the install media.


    ***Listing 4-2.*** Adding a Node Using PowerShell


    ```

    .\setup.exe /IACCEPTSQLSERVERLICENSETERMS /ACTION="AddNode" /INSTANCENAME="MSSQLSERVER"
    /SQLSVCACCOUNT="ALWAYSONREVEALED\SQLAdmin" /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="ALWAYSONREVEALED\SQLAdmin"
    /AGTSVCPASSWORD="Pa$$w0rd" /FAILOVERCLUSTERIPADDRESSES="IPv4;192.168.0.51;Cluster
    Network 2;255.255.255.0" /CONFIRMIPDEPENDENCYCHANGE=0 /qs

    ```


    ## Summary


    An AlwaysOn Failover Clustered Instance can be installed using SQL Server Installation
    Center or via PowerShell. When using the SQL Server Installation Center, the process
    is very similar to the installation of a stand-alone instance; however, you will
    need to specify additional details, such as the network name, IP Address, and
    resource group configuration.


    When using PowerShell to install the Instance, you will use the `InstallFailoverCluster`
    action, specifying the `/FAILOVERCLUSTERIPADDRESSES`, `/FAILOVERCLUSTERNETWORKNAME`,
    and `/INSTALLSQLDATADIR` parameters, in addition the parameters required for a
    stand-alone instance build.


    # CHAPTER 5 ■ Implementing HA with AlwaysOn Availability Groups


    AlwaysOn Availability Groups provide a flexible option for achieving high availability,
    recovering from disasters, and scaling out read-only workloads. The technology
    synchronizes data at the database level, but health monitoring and quorum are
    provided by a Windows cluster.


    This chapter demonstrates how to build and configure Availability Groups for both
    high availability (HA) and disaster recovery (DR). We also discuss aspects such
    as performance considerations and maintenance, along with using Availability Groups
    to scale out read-only workloads.


    Demonstrations in this chapter make use of the cluster that was built in [Chapter
    3](http://dx.doi.org/10.1007/978-1-4842-2397-0_3). Each node has been preconfigured
    with a stand-alone instance. `CLUSTERNODE1` hosts an instance called `PRIMARYREPLICA`
    and `CLUSTERNODE2` hosts an instance called `SYNCHA`.


    In this chapter, we will create two Availability Groups. The first will be called
    `App1` and contain the `App1Customers` and `App1Sales` databases. The second will
    be called `App2` and contain the `App2Customers` database. Therefore, the tasks
    that we will perform in this chapter are as follows:


    *   Create the `App1Customers`, `App1Sales`, and `App2Customers` databases.

    *   Configure the stand-alone instances to support Availability Groups.

    *   Use the New Availability Groups wizard to create the `App1` Availability Group
    and Listener.

    *   Use the New Availability Group dialog box to create the `App2` Availability
    Group.

    *   Use the New Listener dialog box to create the `App2` Listener.


    © Peter A. Carter 2016

    P. A. Carter, *SQL Server AlwaysOn Revealed*, DOI 10.1007/978-1-4842-2397-0_5'
