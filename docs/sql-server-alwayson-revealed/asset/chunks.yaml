  trans: '# 第五章 ■ 使用始终可用组实现高可用性


    配置。表 5-1 列出了完整的参数列表及其说明。


    **表 5-1. 创建可用性组参数**


    | 参数 | 说明 | 可接受值 |

    | :--- | :--- | :--- |

    | `AUTOMATED_BACKUP_PREFERENCE` | 定义应从何处运行自动作业执行备份。 | `PRIMARY`<br>`SECONDARY_ONLY`<br>`SECONDARY`<br>`NONE`
    |

    | `FAILURE_CONDITION_LEVEL` | 指定故障转移的敏感度。详见表 5-2。 | `1` 至 `5` |

    | `HEALTH_CHECK_TIMEOUT` | 配置 SQL Server 必须在集群判定实例无响应之前（当 `FAILOVER_MODE` 设为 `AUTOMATIC`
    时会触发故障转移）返回运行状况检查信息的时间（以毫秒为单位）。 | `15000ms` 至 `4294967295ms` |

    | `DB_FAILOVER` | 指当主副本上可用性组中的某个数据库退出 `ONLINE` 状态时，可用性组是否应发生故障转移。可接受值为 `ON` 和
    `OFF`。 | |

    | `DTC_SUPPORT` | 指定是否支持跨数据库事务。可接受值为 `PER_DB` 和 `NONE`。此设置仅在创建新可用性组时可配置，无法在现有可用性组上设置。
    | |

    | `BASIC` | 指定应支持基本可用性组。这是 SQL Server 标准版唯一可用的选项，并将可用性组限制为一个数据库和两个副本。 | |

    | `DISTRIBUTED` | 指定可用性组将包含跨多个 Windows 故障转移群集拉伸的数据库。 | |

    | `DATABASE` | 将加入可用性组的数据库的逗号分隔列表。 | – |

    | `REPLICA ON` | 将作为组内副本的 `server\instance` 名称的逗号分隔列表。<br>下表中的参数构成 `REPLICA ON`
    参数的 `WITH` 子句。 | – |

    | `ENDPOINT_URL` | 副本用于通信的 TCP 终结点 URL。 | – |

    | `AVAILABILITY_MODE` | 确定副本是以同步模式还是异步模式运行。 | `SYNCHRONOUS_COMMIT`<br>`ASYNCHRONOUS_COMMIT`
    |

    | `FAILOVER_MODE` | 当 `AVAILABILITY_MODE` 设置为同步时，确定是否允许自动故障转移。 | `AUTOMATIC`<br>`MANUAL`
    |

    | `BACKUP_PRIORITY` | 当 SQL Server 决定自动备份作业应在何处运行时，为副本分配权重。 | `0` 至 `100` |

    | `SECONDARY_ROLE` | 指定仅当副本处于辅助角色时才适用的属性。`ALLOW_CONNECTIONS` 指定该副本是否可读，如果是，是允许所有
    `read_only` 连接，还是只允许在连接字符串中指定了 `read-intent` 的连接。`READ_ONLY_ROUTING_URL` 指定应用程序用于连接到它进行只读操作的
    URL，格式如下：`TCP://ServerName:Port`。 | - |

    | `PRIMARY_ROLE` | 指定仅当副本处于主角色时才适用的属性。`ALLOW_CONNECTIONS` 可配置为 `All` 以允许任何连接，或配置为
    `Read_Write` 以禁止只读连接。`READ_ONLY_ROUTING_LIST` 是已配置为只读副本的 `server\instance` 名称的逗号分隔列表。
    | - |

    | `AVAILABILITY GROUP ON` | 如果可用性组是 `DISTRIBUTED`，请使用 `AVAILABILITY GROUP ON`
    参数来指定将使用的两个可用性组（位于不同的群集上）。 | |

    | `SESSION_TIMEOUT` | 指定副本在未收到 ping 消息后，进入 `DISCONNECTED` 状态前可以存活的时间。 | `5` 至
    `2147483647` 秒 |


    `FAILOVER_CONDITION_LEVEL` 参数决定了组对故障转移的敏感度。表 5-2 描述了五个级别各自的含义。


    **表 5-2. FAILOVER_CONDITION_LEVEL 参数**


    | 级别 | 触发故障转移的原因 |

    | :--- | :--- |

    | 1 | 实例宕机。<br>AOAG 租约到期。 |

    | 2 | 级别 1 的条件加上：<br>超过 `HEALTH_CHECK_TIMEOUT`。<br>副本状态为 `FAILED`。 |

    | 3 (默认) | |'
