    ## xv


    ## 第 1 章 高可用性与灾难恢复概念


    在当今运行关键任务应用程序的 24×7 环境中，企业严重依赖于其数据的可用性。尽管服务器及其软件通常可靠，但始终存在硬件故障或软件缺陷的风险，这些都可能导致服务器宕机。为减轻这些风险，关键业务应用程序通常依赖冗余硬件来提供容错能力。如果主系统发生故障，应用程序可以自动故障转移到冗余系统。这是高可用性
    (HA) 的基本原理。


    即使实施了 HA 技术，仍然存在导致应用程序不可用的小概率事件风险。这可能是由于重大事件造成的，例如自然灾害或恐怖行为导致的数据中心损毁，也可能是由于数据损坏或人为错误，导致应用程序数据丢失或损坏到无法修复的程度。


    在这些情况下，一些应用程序可能依赖于恢复最新备份以尽可能多地恢复数据。然而，更关键的应用程序可能需要在辅助位置设置一台冗余服务器来保存数据的同步副本。这是灾难恢复
    (DR) 的基本概念。本章讨论 HA 和 DR 背后的概念。


    ### 可用性级别


    解决方案可供最终用户使用的时长称为 `可用性级别` 或 `正常运行时间`。为了提供真实的正常运行时间情况，公司应从用户的桌面测量解决方案的可用性。换句话说，即使您的
    SQL Server 已连续运行超过一个月，用户仍可能因其他因素而经历其解决方案的中断。这些因素可能包括网络中断或应用程序服务器故障。


    **电子补充材料** 本章的在线版本 ([doi:10.1007/978-1-4842-2397-0_1](http://dx.doi.org/10.1007/978-1-4842-2397-0_1))
    包含补充材料，可供授权用户使用。


    © Peter A. Carter 2016

    P. A. Carter, *SQL Server AlwaysOn Revealed*, DOI 10.1007/978-1-4842-2397-0_1


    然而，在某些情况下，您别无选择，只能在 SQL Server 级别测量 `可用性级别`。这可能是因为企业内部缺乏整体监控工具。但最常见的是，在实例级别测量
    `可用性级别` 的要求是出于政治而非技术原因。在 IT 行业，将数据中心管理外包给第三方提供商已成为一种趋势。在这种情况下，负责管理 SQL 服务器的提供商不一定是负责网络或应用程序服务器的提供商。在这种情况下，您需要在
    SQL Server 级别监控正常运行时间，以准确判断服务提供商的性能。


    `可用性级别` 是以应用程序可用时间占总时间的百分比来衡量的...

