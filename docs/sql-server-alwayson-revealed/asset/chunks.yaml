    ## Performance Considerations for Synchronous Commit Mode


    Unlike traditional clustering, Availability Group topology does not have any shared
    disk resources. Therefore, data must be replicated on two devices, which of course,
    has an overhead. This overhead varies depending on various aspects of your environment,
    such as network latency and disk performance, as well as the application profile.
    However, the script in `Listing 5-6` runs some write-intensive tests against the
    `App2Customers` database (which is in `Asynchronous Commit mode`) and then against
    the `App1Customers` database (which is `Synchronous Commit mode`). This indicates
    the overhead that you can expect to witness.


    ■ **Tip** It is important to remember that there is no overhead on read performance.
    Also, despite the overhead associated with writes, some of this is offset by distributing
    read-only workloads if you implement readable secondary replicas.


