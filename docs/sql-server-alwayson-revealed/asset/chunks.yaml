- fmt: '# CHAPTER 4 ■ IMPLEMENTING AN ALWAYSON FAILOVER CLUSTERED INSTANCE


    ## Figure 4-12. Install a SQL Server Failover Cluster— Service Accounts tab

    A new feature of SQL Server 2016 is to enable `Perform Volume Maintenance Tasks`
    during setup, and this is implemented as a simple check box of the Service Account
    tab. The consideration here is security versus performance. If you choose to perform
    volume maintenance tasks, then data files will not be zeroed out when they are
    created or expanded; however, an attacker with specialist software could potentially
    retrieve data that was previously stored on the allocated disk blocks. `Perform
    Volume Maintenance Tasks` does not apply to transaction log files.


    **■ Tip** For a full discussion on SQL Server security considerations, I recommend
    the Apress title *Securing SQL Server: DBAs Defending the Database*, which can
    be purchased from [www.apress.com/9781484222645](http://www.apress.com/9781484222645).


    On the Collation tab, shown in Figure 4-13, you can specify the collation that
    will be configured for the instance. Wherever possible, it is a good idea to use
    a consistent collation throughout the enterprise, or at a minimum, throughout
    the instances that make up a data-tier application.


    ![](index-83_1.jpg)


    ![](index-83_2.jpg)


    ## Figure 4-13. Install a SQL Server Failover Cluster— Collation tab


    The Database Engine Configuration page consists of four tabs. The first of these
    is the Server Configuration tab, which is illustrated in Figure 4-14. Here, we
    specify the authentication mode that the instance will use.


    ## Figure 4-14. Install a SQL Server Failover Cluster— Server Configuration tab


    `Windows Authentication Mode` means that the credentials that a user supplies
    when logging into Windows will be passed to SQL Server, and the user does not
    require any additional credentials to gain access to the instance. With `Mixed
    Mode`, although Windows credentials can still be used to access the instance,
    users can also be given second-tier credentials. If this option is selected, then
    SQL Server will hold its own Login names and passwords for Login created inside
    the instance, and users can supply these in order to gain access, even if their
    Windows identity does not have permissions.


    For security best practice, it is a good idea to only allow Windows authentication
    to your instance. This is for two reasons. First, with Windows authentication
    only, if an attacker were to gain access to your network, then they would still
    not be able to access SQL Server, since they would not have a valid Windows account
    with the correct permissions. With mixed-mode authentication, however, once inside
    the network, attackers could use brute force attacks or other hacking methodologies
    to attempt to gain access via a second-tier SQL Server Login. Secondly, if you
    specify mixed-mode authentication, then you are required to create an `SA` account.
    The `SA` account is a SQL Server user account that has administrative privileges
    over the instance. If the password for this account became compromised, then an
    attacker could gain administrative control over SQL Server. If mixed-mode authentication
    must be used, it is a good idea to disable the `SA` account.


    Mixed-mode authentication is a necessity in some cases, however. For example,
    you may have a legacy application that does not support Windows authentication,
    or a third-party application that has a hardcoded connection that uses second-tier
    authentication. These would be two valid reasons why mixed mode authentication
    may be required. Another valid reason would be if you have users that need to
    access the instance from a nontrusted domain.


    Additionally, on the Server Configuration tab, you can specify Windows users that
    will be added to the `sysadmin` fixed server role, giving them unrestricted access
    to the instance. In our scenario, we will add the `AlwaysOnRevealed\SQLAdmin`
    user as an'
