    由于同步提交模式相关的性能挑战，许多 DBA 决定通过使用三节点集群来实现高可用性和灾难恢复，其中两个节点位于主数据中心，一个节点位于灾难恢复数据中心。然而，他们不是在主数据中心内部署两个同步副本，而是将主副本跨故障转移群集实例进行延伸，并将群集配置为只能在这两个节点上承载实例，而不能在灾难恢复数据中心的第三个节点上承载。这很重要，因为这意味着我们不需要在数据中心之间实现
    SAN 复制。灾难恢复节点使用异步提交模式的可用性组进行同步。如果以这种方式将 AlwaysOn 故障转移群集实例与 AlwaysOn 可用性组结合使用，则群集实例和副本之间不支持自动故障转移。只能配置为手动故障转移。在承载群集实例的两个节点之间也不需要可用性组进行故障转移，因为此故障转移由群集服务管理。此配置可被证明是实现业务连续性要求的一种极其强大且灵活的方式。


    # 第 5 章 ■ 使用 AlwaysOn 可用性组实现高可用性


    ## 总结


    AlwaysOn 可用性组可以实施最多八个辅助副本，结合了同步和异步提交模式。在使用可用性组实现高可用性时，总是使用同步提交模式，因为异步提交模式不支持自动故障转移。然而，在实施同步提交模式时，您必须意识到在辅助副本提交事务后才在主副本提交事务所导致的相关性能损失。对于灾难恢复，通常选择实施异步提交模式。


    可以通过“新建可用性组向导”、对话框、T-SQL 甚至 PowerShell 创建可用性组。如果使用对话框创建可用性组，则某些方面（例如端点和相关权限）必须使用
    T-SQL 或 PowerShell 编写脚本。


    # **使用 AlwaysOn 可用性组实现灾难恢复**


    在第 5 章中，我们通过 App1 可用性组成功为 App1Customers 和 App1Sales 数据库实现了高可用性。在本章中，我们将讨论如何也为这些数据库实现灾难恢复。为此，我们首先需要在第二个站点中构建一台新服务器并安装
    SQL Server 的独立实例。由于现在群集跨越两个站点，我们需要将其重新配置为'
- fmt: '# CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS


    multi-subnet cluster. We also need to reconfigure the quorum model to remove its
    dependency on the shared storage, which we currently have for the quorum. Once
    this is complete, we are able to add the instance on the new node to our Availability
    Group.


    The following sections assume that you have already built out a third server with
    a SQL Server instance called `CLUSTERNODE3\ASYNCDR`, and they demonstrate how
    to reconfigure the cluster as well as the Availability Group. The chapter will
    also discuss Distributed Availability Groups and readable secondary replicas.
    Therefore, the tasks that we will perform in this chapter are as follows:


    • Use the `Add Node Wizard`, to add a third node to the cluster

    • Modify the quorum, to use a file share, and exclude the DR node from voting

    • Add an IP Address to the quorum

    • Configure an `OR` constraint on the IP Address dependencies

    • Configure the cluster’s `RegisterAllProvidersIP` and `HostRecordTTL` settings


    ## Configuring the Cluster


    We need to perform several cluster configuration steps before we begin to alter
    our Availability Group. These include adding the new node, reconfiguring the quorum,
    and adding a new IP to the cluster’s client access point.


