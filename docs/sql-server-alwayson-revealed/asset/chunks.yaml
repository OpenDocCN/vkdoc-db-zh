- fmt: '# CHAPTER 2 ■ UNDERSTANDING HIGH AVAILABILITY AND DISASTER RECOVERY TECHNOLOGIES


    in managing an AlwaysOn environment. Database mirroring can also be useful when
    you upgrade data-tier applications from older versions of SQL Server in a side-by-side
    migration. This is because you can synchronize the databases and fail them over
    with minimal downtime. If the upgrade is unsuccessful, then you can move them
    back to the original servers with minimal effort and downtime.


    Database mirroring can be configured to run in three different modes : High Performance,
    High Safety, and High Safety with Automatic Failover. When running in High Performance
    mode, database mirroring works in an asynchronous manor. Data is committed on
    the primary database and is then sent to the secondary database, where it is subsequently
    committed. This means that it is possible to lose data in the event of a failure.
    If data is lost, the recovery point is the beginning of the oldest open transaction.
    This means that you cannot guarantee an `RPO` that relies on asynchronous mirroring
    for availability, since it will be nondeterministic. There is also no support
    for automatic failover in this configuration. Therefore, asynchronous mirroring
    offers a `DR` solution, as opposed to a high availability solution. The diagram
    in Figure 2-5 illustrates a mirroring topology, configured in High Performance
    mode.


    ![](index-27_1.jpg)


    **Figure 2-5.** Database mirroring in High Performance mode


    When running in High Safety with Automatic Failover mode, data is committed at
    the secondary server using a synchronous method, as opposed to an asynchronous
    method. This means that the data is committed on the secondary server before it
    is committed on the primary server. This can cause performance degradation and
    requires a fast network link between the two servers. The network latency should
    be less than 3 milliseconds.


    In order to support automatic failover, the database mirroring topology needs
    to form a quorum. In order to achieve quorum, it needs a third server. This server
    is known as the witness server and it is used to arbitrate in the event that the
    primary and secondary servers lose network connectivity. For this reason, if the
    primary and secondary servers are in separate sites, it is good practice to place
    the witness server in the same data center as the primary server, as opposed to
    with the secondary server. This can reduce the likelihood of a failover caused
    by a network outage between the data centers, which makes them become isolated.
    The diagram in Figure 2-6 illustrates a database mirroring topology configured
    in High Safety with Automatic Failover mode.


    ![](index-28_1.jpg)


    **Figure 2-6.** Database mirroring in High Safety with Automatic Failover mode


    High Safety mode combines the negative aspects of the other two modes. You have
    the same performance degradation that you expect with High Safety with Automatic
    Failover, but you also have the manual server failover associated with High Performance
    mode. The benefit that High Safety mode offers is resilience in the event that
    the witness goes offline. If database mirroring loses the witness server, instead
    of suspending the mirroring session to avoid a split-brain scenario, it switches
    to High Safety mode. This means that database mirroring continues to function,
    but without automatic failover. High Safety mode is also useful in planned failover
    scenarios. If your primary server is online, but you need to fail over for maintenance,
    then you can change to High Safety mode. This essentially puts the database in
    a safe state, where there is no possibility of data loss, without you needing
    to configure a witness server. You can then fail over the database. After the
    maintenance work is complete and you have failed the database back,'
