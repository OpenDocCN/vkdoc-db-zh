    # 第 1 章 高可用性与灾难恢复概念


    ## 恢复点目标与恢复时间目标


    应用程序的恢复点目标（`RPO`）指明了在发生故障时可接受的数据丢失量。例如，对于一个支持报表应用程序的数据仓库，由于它可能每天只通过一个 `ETL`（提取、转换和加载）流程更新一次，而所有其他活动都是只读报表，因此这个周期可能较长，比如
    24 小时。然而，对于高事务性系统，例如支持交易平台或 Web 应用程序的 `OLTP`（联机事务处理）数据库，`RPO` 将为零。`RPO` 为零意味着不可接受任何数据丢失。


    应用程序的高可用性和灾难恢复可能有不同的 `RPO`。例如，出于成本或应用程序性能的考虑，站点内故障转移可能要求 `RPO` 为零。但是，如果同一应用程序故障转移到
    `DR`（灾难恢复）数据中心，则可能可接受五到十分钟的数据丢失。这是因为实现站点内可用性和站点间恢复所用的技术存在差异。


    应用程序的恢复时间目标（`RTO`）指定了从故障发生到恢复完成且用户可以重新连接之前，应用程序可以停机的最大时间。在计算可实现的应用程序 `RTO` 时，需要考虑许多方面。例如，集群从一个节点故障转移到另一个节点，并且
    `SQL Server` 服务重新启动可能只需不到一分钟；然而，数据库恢复可能需要更长得多的时间。数据库恢复所需的时间取决于许多因素，包括数据库的大小、实例中的数据库数量以及故障转移发生时有多少事务正在处理中。这是因为所有未提交的事务都需要回滚。


    就像 `RPO` 一样，根据是站点内还是站点间故障转移，存在不同的 `RTO` 也是很常见的。同样，这主要是由于技术差异造成的，但也考虑了如果主数据中心丢失，你需要花费多少时间在
    `DR` 数据中心启动整个环境。


    在发生数据损坏的情况下，应用程序的 `RPO` 和 `RTO` 也可能有所不同。根据损坏的性质以及已实施的 `HA/DR` 技术，数据损坏可能导致你需要从备份中还原数据库。


    如果必须还原数据库，最坏的情况是可实现的还原点可能是上次备份的时间。这意味着你必须将特定 `RPO` 的硬性业务要求纳入备份策略。但是，如果只有部分数据库损坏，你或许可以从实时数据库中抢救一些数据，并且只从还原后的数据库中还原损坏的数据。


    数据损坏也可能影响 `RTO`。最大的影响因素之一是备份是存储在本地服务器上，还是需要从磁带中检索。从磁带，甚至从异地位置检索备份文件，很可能会显著增加恢复过程的时间。


    另一个影响因素是导致损坏的原因。如果是由有故障的 `IO` 子系统引起的，那么你可能需要留出时间让 Windows 管理员对卷运行磁盘检查命令（`CHKDSK`），并可能需要更多时间来更换磁盘。但是，如果损坏是由用户意外截断表或删除数据文件引起的，则无需担心此问题。


    ## 停机成本


    如果你询问任何业务负责人，他们的应用程序可以接受多长的停机时间

