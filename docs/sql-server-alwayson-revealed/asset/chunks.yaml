    **表 9-1. `sys.dm_os_cluster_nodes` 列**


    | 列名 | 描述 |

    | :--- | :--- |

    | NodeName | 群集节点的名称 |

    | Status | 节点的当前状态。可能的值为：<br>• 0 - 表示节点已启动<br>• 1 - 表示节点已关闭<br>• 2 - 表示节点已暂停<br>•
    3 - 表示节点正在加入群集<br>• 4 - 表示状态未知 |

    | status_description | 状态的文本描述。可能的值为：<br>• Up<br>• Down<br>• Paused<br>• Joining<br>•
    Unknown |

    | is_current_owner | 指示实例当前是否由此节点托管。可能的值为：<br>• 0 - 表示节点不拥有该实例<br>• 1 - 表示节点拥有该实例
    |


    清单9-1中的查询将返回当前托管实例的群集节点的名称。


    **清单 9-1.** 发现实例所在的节点


    ```sql

    SELECT NodeName

    FROM sys.dm_os_cluster_nodes

    WHERE is_current_owner = 1;

    ```


