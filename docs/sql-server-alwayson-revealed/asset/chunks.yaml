    database workload profile.


    Because of the performance challenges associated with Synchronous Commit mode,
    many DBAs decide to implement high availability and disaster recovery by using
    a three-node cluster, with two nodes in the primary data center and one node in
    the DR data center. Instead of having two synchronous replicas within the primary
    data center, however, they stretch the primary replica across a failover clustered
    instance and configure the cluster to be able to host the instance only on these
    two nodes, and not on the third node in the DR data center. This is important,
    because it means that we don’t need to implement SAN replication between the data
    centers. The DR node is synchronized using Availability Groups in Asynchronous
    Commit mode. If you combine an AlwaysOn failover clustered instance with AlwaysOn
    Availability Groups in this way, then automatic failover is not supported between
    the clustered instance and the replica. It can only be configured for manual failover.
    There is also no need for Availability Groups to fail over between the two nodes
    hosting the clustered instance, because this failover is managed by the cluster
    service. This configuration can prove to be a highly powerful and flexible way
    to achieve your continuity requirements.


    # CHAPTER 5 ■ IMPLEMENTING HA WITH ALWAYSON AVAILABILITY GROUPS


    ## Summary


    AlwaysOn Availability Groups can be implemented with up to eight secondary replicas,
    combining both Synchronous and Asynchronous Commit modes. When implementing high
    availability with Availability Groups, you always use Synchronous Commit mode,
    because Asynchronous Commit mode does not support automatic failover. When implementing
    Synchronous Commit mode, however, you must be aware of the associated performance
    penalty caused by committing the transaction on the secondary replica before it
    is committed on the primary replica. For disaster recovery, you will normally
    choose to implement Asynchronous Commit mode.


    The Availability Group can be created via the New Availability Group Wizard, through
    dialog boxes, through T-SQL, or even through PowerShell. If you create an Availability
    Group using dialog boxes, then some aspects, such as the endpoint and associated
    permissions, must be scripted using T-SQL or PowerShell.


