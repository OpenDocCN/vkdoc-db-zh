- fmt: '# Extended Events Concepts


    Extended Events have a rich architecture, which consists of Events, Targets, Actions,
    Predicates, Types, Maps, and Sessions. These artifacts are stored within a package,
    which is, in turn, stored within a module, which can be either a `.dll` or an
    executable. We discuss these concepts in the following sections.


    very fine grain, such as page splits, to coarser-grain information, such as `CPU`
    utilization. You can also correlate Extended Events with operating system data
    to provide a holistic picture when troubleshooting issues. The predecessor to
    Extended Events was a T-SQL based tool called `SQL Trace`, and its GUI, which
    was called `Profiler`.


    ## Packages


    A package is a container for the objects used within Extended Events. Here are
    the four types of `SQL Server` package:


    - `Package0`: The default package, used for Extended Events system objects.

    - `Sqlserver`: Used for `SQL Server`–related objects.

    - `Sqlos`: Used for `SQLOS`-related objects.

    - `SecAudit`: Used by `SQL Audit`; however, its objects are not exposed.


    ## Events


    An event is an occurrence of interest that you can trace. It may be a `SQL` batch
    completing, a cache miss, or a page split, or virtually anything else that can
    happen within the Database Engine, depending on the nature of the trace that you
    are configuring. Each event is categorized by `channel` and `keyword` (also known
    as `category`). A `channel` is a high-level categorization, and all events in
    `SQL Server 2016` fall into one of the channels described in Table 8-1.


    ### Table 8-1. Channels


    | **Channel** | **Description** |

    | :--- | :--- |

    | `Admin` | Well-known events with well-known resolutions. For example, deadlocks,
    server starts, `CPU` thresholds being exceeded, and the use of deprecated features.
    |

    | `Operational` | Used for troubleshooting issues. For example, bad memory being
    detected, an `AlwaysOn Availability Group` replica changing its state, and a long
    `IO` being detected are all events that fall within the `Operational` channel.
    |

    | `Analytic` | High-volume events that you can use for troubleshooting issues
    such as performance. For example, a transaction beginning, a lock being acquired,
    and a file read completing are all events that fall within the `Analytic` channel.
    |

    | `Debug` | Used by developers to diagnose issues by returning internal data.
    The events in the `Debug` channel are subject to change in future versions of
    `SQL Server`, so you should avoid them when possible. |


    `Keywords` (or `categories`) are much more fine-grain. All events relating to
    `AlwaysOn` fall into the `AlwaysOn` and `HARD` categories. `SQL Server` exposes
    122 events relating to `AlwaysOn`. These events are listed in Table 8-2.


    ### Table 8-2. AlwaysOn Events


    | **Event** | **Description** |

    | :--- | :--- |

    | `hadr_ddl_failover_execution_state` | Raised when a `DDL` command alters the
    `Availability Group` failover state |

    | `hadr_transport_dump_message` | Traces `HADR` transport messages throughout
    the system |

    | `hadr_transport_dump_config_message` | Traces `HADR` configuration messages
    |

    | `hadr_transport_dump_failure_message` | Traces `HADR` failure messages |

    | `hadr_transport_dump_preconfig_message` | Traces `HADR` preconfig messages |

    | `hadr_transport_dump_dropped_message` | Traces trace dropped `HADR` transport
    messages throughout the system |

    | `hadr_transport_session_state` | Raised when a `HADR` transport session changes
    states |

    | `hadr_transport_configuration_state` | Raised when session state changes |

    | `hadr_transport_ucs_registration` | Raised when `UCS` registration state changes
    |

    | `hadr_transport_ucs_connection_info` | Raised when the `USC` connection `ID`
    associated with the `AlwaysOn` transport replica is registered or changes |

    | `hadr_transport_flow_control_action` | Raised when a flow control action has
    occurred for a particular replica |

    | `hadr_database_flow_control_action` | Raised when a flow control action has
    occurred for a particular replica |

    | `hadr_db_manager_state` | Raised when the state of `db_manager` state |

    | `hadr_db_manager_lsn_sync_msg` | Traces Log Sequence Number |'
