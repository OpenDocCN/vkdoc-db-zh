    assumes that the instance is not responding, which triggers a failover when `FAILOVER_MODE`
    is set to `AUTOMATIC`. | `15000ms` through `4294967295ms` |

    | `DB_FAILOVER` | Specifies if an Availability Group should fail over when a database
    within the Availability Group on the primary replica transitions out of the `ONLINE`
    state. Acceptable values are `ON` and `OFF`. | |

    | `DTC_SUPPORT` | Specifies if cross-database transactions are supported. Acceptable
    values are `PER_DB` and `NONE`. This setting can only be configured when creating
    a new Availability Group. It cannot be set on existing Availability Groups. |
    |

    | `BASIC` | Specifies that a basic Availability Group should be supported. This
    is the only option available for SQL Server Standard Edition and limits the Availability
    Group to one database and two replicas. | |

    | `DISTRIBUTED` | Specifies that the Availability Group will contain databases
    which are stretched across multiple Windows Failover Clusters. | |

    | `DATABASE` | A comma-separated list of databases that will join the Availability
    Group. | – |

    | `REPLICA ON` | A comma-separated list of `server\instance` names that will be
    replicas within the group.<br>The following arguments in this table form the `WITH`
    clause of the `REPLICA ON` argument. | – |

