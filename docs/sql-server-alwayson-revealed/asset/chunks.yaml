  trans: "\n# 第 5 章 ■ 使用 AlwaysOn 可用性组实现高可用性\n\n## 准备可用性组\n\n在实施 AlwaysOn 可用性组之前，我们首先创建三个数据库，这些数据库将在本章的演示中使用。其中两个数据库与虚构的应用程序\
    \ App1 相关，第三个数据库与虚构的应用程序 App2 相关。每个数据库包含一个单独的表，并填充了数据。每个数据库的恢复模式都设置为 `FULL`。这是数据库使用\
    \ AlwaysOn 可用性组的硬性要求，因为数据是通过日志流同步的。清单 5-1 中的脚本创建了这些数据库。\n\n### 清单 5-1. 创建数据库\n\
    \n```sql\nCREATE DATABASE App1Customers;\nGO\n\nALTER DATABASE App1Customers SET\
    \ RECOVERY FULL;\nGO\n\nUSE App1Customers;\nGO\n\nCREATE TABLE App1Customers\n\
    (\n    ID INT PRIMARY KEY IDENTITY,\n    FirstName NVARCHAR(30),\n    LastName\
    \ NVARCHAR(30),\n    CreditCardNumber VARBINARY(8000)\n);\nGO\n\n--填充表\nDECLARE\
    \ @Numbers TABLE\n(\n    Number INT\n);\n\n;WITH CTE(Number)\nAS\n(\n    SELECT\
    \ 1 Number\n    UNION ALL\n    SELECT Number + 1\n    FROM CTE\n    WHERE Number\
    \ < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE;\n\nDECLARE @Names TABLE\n\
    (\n    FirstName VARCHAR(30),\n    LastName VARCHAR(30)\n);\n\nINSERT INTO @Names\n\
    VALUES('Peter', 'Carter'),\n      ('Michael', 'Smith'),\n      ('Danielle', 'Mead'),\n\
    \      ('Reuben', 'Roberts'),\n      ('Iris', 'Jones'),\n      ('Sylvia', 'Davies'),\n\
    \      ('Finola', 'Wright'),\n      ('Edward', 'James'),\n      ('Marie', 'Andrews'),\n\
    \      ('Jennifer', 'Abraham'),\n      ('Margaret', 'Jones');\n\nINSERT INTO App1Customers(Firstname,\
    \ LastName, CreditCardNumber)\nSELECT FirstName, LastName, CreditCardNumber FROM\n\
    (SELECT\n    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,\n\
    \    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,\n    (SELECT\
    \ CONVERT(VARBINARY(8000),\n        (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n\
    \         FROM @Numbers\n         WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID())\
    \ + '-' +\n        (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n         FROM\
    \ @Numbers\n         WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-' +\n\
    \        (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n         FROM @Numbers\n\
    \         WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-' +\n        (SELECT\
    \ TOP 1 CAST(Number * 100 AS CHAR(4))\n         FROM @Numbers\n         WHERE\
    \ Number BETWEEN 10 AND 99 ORDER BY NEWID()))\n    ) CreditCardNumber\nFROM @Numbers\
    \ a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c) d;\n\nCREATE DATABASE App1Sales;\n\
    GO\n\nALTER DATABASE App1Sales SET RECOVERY FULL;\nGO\n\nUSE App1Sales;\nGO\n\n\
    CREATE TABLE dbo.Orders(\n    OrderNumber int NOT NULL IDENTITY(1,1) PRIMARY KEY\
    \ CLUSTERED,\n    OrderDate date NOT NULL,\n    CustomerID int NOT NULL,\n   \
    \ ProductID int NOT NULL,\n    Quantity int NOT NULL,\n    NetAmount money NOT\
    \ NULL,\n    TaxAmount money NOT NULL,\n    InvoiceAddressID int NOT NULL,\n \
    \   DeliveryAddressID int NOT NULL,\n    DeliveryDate date NULL\n);\n\nDECLARE\
    \ @Numbers TABLE\n(\n    Number INT\n);\n\n;WITH CTE(Number)\nAS\n(\n    SELECT\
    \ 1 Number\n    UNION ALL\n    SELECT Number + 1\n    FROM CTE\n    WHERE Number\
    \ < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE;\n\n--用数据填充现有订单\nINSERT\
    \ INTO Orders\nSELECT\n    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number\n    \
    \                        FROM @Numbers\n                            ORDER BY NEWID()),getdate())\
    \ as DATE)),\n    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),\n\
    \    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n    (SELECT TOP 1\
    \ Number FROM @Numbers ORDER BY NEWID()),\n    500,\n    100,\n    (SELECT TOP\
    \ 1 Number FROM @Numbers ORDER BY NEWID()),\n    (SELECT TOP 1 Number FROM @Numbers\
    \ ORDER BY NEWID()),\n    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10\n\
    \                            FROM @Numbers\n                            ORDER\
    \ BY NEWID()),getdate()) as DATE))\nFROM @Numbers a\nCROSS JOIN @Numbers b\nCROSS\
    \ JOIN @Numbers c;\n\nCREATE DATABASE App2Customers;\nGO\n\nALTER DATABASE App2Customers\
    \ SET RECOVERY FULL;\nGO\n\nUSE App2Customers;\nGO\n\nCREATE TABLE App2Customers\n\
    (\n    ID INT PRIMARY KEY IDENTITY,\n    FirstName NVARCHAR(30),\n    LastName\
    \ NVARCHAR(30),\n    CreditCardNumber VARBINARY(8000)\n);\nGO\n\n--填充表\nDECLARE\
    \ @Numbers TABLE\n(\n    Number INT\n);\n\n;WITH CTE(Number)\nAS\n(\n    SELECT\
    \ 1 Number\n    UNION ALL\n    SELECT Number + 1\n    FROM CTE\n    WHERE Number\
    \ < 100\n)\n```\n"
- fmt: "# CHAPTER 5 ■ IMPLEMENTING HA WITH ALWAYSON AVAILABILITY GROUPS\n\n```sql\n\
    INSERT INTO @Numbers\nSELECT Number FROM CTE ;\n\nDECLARE @Names TABLE\n(\n  \
    \  FirstName VARCHAR(30),\n    LastName VARCHAR(30)\n) ;\n\nINSERT INTO @Names\n\
    VALUES('Peter', 'Carter'),\n      ('Michael', 'Smith'),\n      ('Danielle', 'Mead'),\n\
    \      ('Reuben', 'Roberts'),\n      ('Iris', 'Jones'),\n      ('Sylvia', 'Davies'),\n\
    \      ('Finola', 'Wright'),\n      ('Edward', 'James'),\n      ('Marie', 'Andrews'),\n\
    \      ('Jennifer', 'Abraham'),\n      ('Margaret', 'Jones')\n\nINSERT INTO App2Customers(Firstname,\
    \ LastName, CreditCardNumber)\nSELECT FirstName, LastName, CreditCardNumber FROM\n\
    \    (SELECT\n        (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName\n\
    \        ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName\n    \
    \    ,(SELECT CONVERT(VARBINARY(8000),\n            (SELECT TOP 1 CAST(Number\
    \ * 100 AS CHAR(4))\n             FROM @Numbers\n             WHERE Number BETWEEN\
    \ 10 AND 99 ORDER BY NEWID()) + '-' +\n            (SELECT TOP 1 CAST(Number *\
    \ 100 AS CHAR(4))\n             FROM @Numbers\n             WHERE Number BETWEEN\
    \ 10 AND 99 ORDER BY NEWID())\n            + '-' +\n            (SELECT TOP 1\
    \ CAST(Number * 100 AS CHAR(4))\n             FROM @Numbers\n             WHERE\
    \ Number BETWEEN 10 AND 99 ORDER BY NEWID())\n            + '-' +\n          \
    \  (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n             FROM @Numbers\n \
    \            WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID())))\n        CreditCardNumber\n\
    \    FROM @Numbers a\n    CROSS JOIN @Numbers b\n    CROSS JOIN @Numbers c\n \
    \   ) d ;\n```\n\n![](index-100_1.jpg)\n\n## Configuring SQL Server\n\nThe first\
    \ step in configuring AlwaysOn Availability Groups is enabling this feature on\
    \ the SQL Server service. To enable the feature from the GUI, we open SQL Server\
    \ Configuration Manager, drill through SQL Server Services, and select Properties\
    \ from the context menu of the SQL Server service. When we do this, the service\
    \ properties display and we navigate to the AlwaysOn High Availability tab, shown\
    \ in Figure 5-1.\n\n`Figure 5-1.` The AlwaysOn High Availability tab\n\nOn this\
    \ tab, we check the `Enable AlwaysOn Availability Groups` box and ensure that\
    \ the cluster name displayed in the `Windows Failover Cluster Name` box is correct.\
    \ We then need to restart the SQL Server service. Because AlwaysOn Availability\
    \ Groups uses stand-alone instances, which are installed locally on each cluster\
    \ node, as opposed to a failover clustered instance, which spans multiple nodes,\
    \ we need to repeat these steps for each stand-alone instance hosted on the cluster.\n\
    \nWe can also use PowerShell to enable AlwaysOn Availability Groups. To do this,\
    \ we use the PowerShell command in Listing 5-2. The script assumes that `CLUSTERNODE1`\
    \ is the name of the server and that `PRIMARYREPLICA` is the name of the SQL Server\
    \ instance.\n\n`Listing 5-2.` Enabling AlwaysOn Availability Groups\n\n```powershell\n\
    Enable-SqlAlwaysOn -Path SQLSERVER:\\SQL\\CLUSTERNODE1\\PRIMARYREPLICA\n```\n\n\
    The next step is to take a full backup of all databases that will be part of the\
    \ Availability Group. We create separate Availability Groups for `App1` and `App2`,\
    \ respectively, so to create an Availability Group for `App1`, we need to back\
    \ up the `App1Customers` and `App1Sales` databases. We do this by running the\
    \ script in Listing 5-3.\n\n`Listing 5-3.` Backing Up the Databases\n\n```sql\n\
    BACKUP DATABASE App1Customers\nTO DISK = N'C:\\Backups\\App1Customers.bak'\nWITH\
    \ NAME = N'App1Customers-Full Database Backup' ;\nGO\n\nBACKUP DATABASE App1Sales\n\
    TO DISK = N'C:\\Backups\\App1Sales.bak'\nWITH NAME = N'App1Sales-Full Database\
    \ Backup' ;\nGO\n```\n\n## Creating the Availability Group\n\nYou can create an\
    \ Availability Group topology in SQL Server in several ways. It can be created\
    \ manually, predominantly through dialog boxes, via T-SQL, or through a wizard.\
    \ The following sections explore each of these options.\n\n### Using the New Availability\
    \ Group Wizard\n\nWhen the backups complete successfully, we invoke the New Availability\
    \ Group wizard by drilling through AlwaysOn High Availability in Object Explorer\
    \ and selecting the New Availability Group wizard from the context menu of the\
    \ Availability Groups folder."
