- fmt: "# CHAPTER 5 ■ IMPLEMENTING HA WITH ALWAYSON AVAILABILITY GROUPS\n\n## Preparing\
    \ for Availability Groups\n\nBefore implementing AlwaysOn Availability Groups,\
    \ we first create three databases, which we will use during the demonstrations\
    \ in this chapter. Two of the databases relate to the fictional application App1,\
    \ and the third database relates to the fictional application App2. Each contains\
    \ a single table, which we populate with data. Each database is configured with\
    \ Recovery mode set to `FULL`. This is a hard requirement for a database to use\
    \ AlwaysOn Availability Groups because data is synchronized via a log stream.\
    \ The script in Listing 5-1 creates these databases.\n\n### Listing 5-1. Creating\
    \ Databases\n\n```sql\nCREATE DATABASE App1Customers;\nGO\n\nALTER DATABASE App1Customers\
    \ SET RECOVERY FULL;\nGO\n\nUSE App1Customers;\nGO\n\nCREATE TABLE App1Customers\n\
    (\n    ID INT PRIMARY KEY IDENTITY,\n    FirstName NVARCHAR(30),\n    LastName\
    \ NVARCHAR(30),\n    CreditCardNumber VARBINARY(8000)\n);\nGO\n\n--Populate the\
    \ table\nDECLARE @Numbers TABLE\n(\n    Number INT\n);\n\n;WITH CTE(Number)\n\
    AS\n(\n    SELECT 1 Number\n    UNION ALL\n    SELECT Number + 1\n    FROM CTE\n\
    \    WHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE;\n\n\
    DECLARE @Names TABLE\n(\n    FirstName VARCHAR(30),\n    LastName VARCHAR(30)\n\
    );\n\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n      ('Michael', 'Smith'),\n\
    \      ('Danielle', 'Mead'),\n      ('Reuben', 'Roberts'),\n      ('Iris', 'Jones'),\n\
    \      ('Sylvia', 'Davies'),\n      ('Finola', 'Wright'),\n      ('Edward', 'James'),\n\
    \      ('Marie', 'Andrews'),\n      ('Jennifer', 'Abraham'),\n      ('Margaret',\
    \ 'Jones');\n\nINSERT INTO App1Customers(Firstname, LastName, CreditCardNumber)\n\
    SELECT FirstName, LastName, CreditCardNumber FROM\n(SELECT\n    (SELECT TOP 1\
    \ FirstName FROM @Names ORDER BY NEWID()) FirstName,\n    (SELECT TOP 1 LastName\
    \ FROM @Names ORDER BY NEWID()) LastName,\n    (SELECT CONVERT(VARBINARY(8000),\n\
    \        (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n         FROM @Numbers\n\
    \         WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-' +\n        (SELECT\
    \ TOP 1 CAST(Number * 100 AS CHAR(4))\n         FROM @Numbers\n         WHERE\
    \ Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-' +\n        (SELECT TOP 1 CAST(Number\
    \ * 100 AS CHAR(4))\n         FROM @Numbers\n         WHERE Number BETWEEN 10\
    \ AND 99 ORDER BY NEWID()) + '-' +\n        (SELECT TOP 1 CAST(Number * 100 AS\
    \ CHAR(4))\n         FROM @Numbers\n         WHERE Number BETWEEN 10 AND 99 ORDER\
    \ BY NEWID()))\n    ) CreditCardNumber\nFROM @Numbers a\nCROSS JOIN @Numbers b\n\
    CROSS JOIN @Numbers c) d;\n\nCREATE DATABASE App1Sales;\nGO\n\nALTER DATABASE\
    \ App1Sales SET RECOVERY FULL;\nGO\n\nUSE App1Sales;\nGO\n\nCREATE TABLE dbo.Orders(\n\
    \    OrderNumber int NOT NULL IDENTITY(1,1) PRIMARY KEY CLUSTERED,\n    OrderDate\
    \ date NOT NULL,\n    CustomerID int NOT NULL,\n    ProductID int NOT NULL,\n\
    \    Quantity int NOT NULL,\n    NetAmount money NOT NULL,\n    TaxAmount money\
    \ NOT NULL,\n    InvoiceAddressID int NOT NULL,\n    DeliveryAddressID int NOT\
    \ NULL,\n    DeliveryDate date NULL\n);\n\nDECLARE @Numbers TABLE\n(\n    Number\
    \ INT\n);\n\n;WITH CTE(Number)\nAS\n(\n    SELECT 1 Number\n    UNION ALL\n  \
    \  SELECT Number + 1\n    FROM CTE\n    WHERE Number < 100\n)\nINSERT INTO @Numbers\n\
    SELECT Number FROM CTE;\n\n--Populate ExistingOrders with data\nINSERT INTO Orders\n\
    SELECT\n    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number\n                   \
    \         FROM @Numbers\n                            ORDER BY NEWID()),getdate())\
    \ as DATE)),\n    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),\n\
    \    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n    (SELECT TOP 1\
    \ Number FROM @Numbers ORDER BY NEWID()),\n    500,\n    100,\n    (SELECT TOP\
    \ 1 Number FROM @Numbers ORDER BY NEWID()),\n    (SELECT TOP 1 Number FROM @Numbers\
    \ ORDER BY NEWID()),\n    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10\n\
    \                            FROM @Numbers\n                            ORDER\
    \ BY NEWID()),getdate()) as DATE))\nFROM @Numbers a\nCROSS JOIN @Numbers b\nCROSS\
    \ JOIN @Numbers c;\n\nCREATE DATABASE App2Customers;\nGO\n\nALTER DATABASE App2Customers\
    \ SET RECOVERY FULL;\nGO\n\nUSE App2Customers;\nGO\n\nCREATE TABLE App2Customers\n\
    (\n    ID INT PRIMARY KEY IDENTITY,\n    FirstName NVARCHAR(30),\n    LastName\
    \ NVARCHAR(30),\n    CreditCardNumber VARBINARY(8000)\n);\nGO\n\n--Populate the\
    \ table\nDECLARE @Numbers TABLE\n(\n    Number INT\n);\n\n;WITH CTE(Number)\n\
    AS\n(\n    SELECT 1 Number\n    UNION ALL\n    SELECT Number + 1\n    FROM CTE\n\
    \    WHERE Number < 100\n)\n```"
