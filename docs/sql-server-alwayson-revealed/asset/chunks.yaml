- fmt: '# CHAPTER 8 ■ MONITORING ALWAYSON AVAILABILITY GROUPS


    ## 事件描述


    Fires when the state of the Availability Replica Manager has changed


    `availability_group_lease_expired`

    Fires when there is a connectivity issue between the cluster and the Availability
    Group, which has caused a failure to renew the lease


    `availability_replica_automatic_failover_validation`

    Fires when the failover validates the readiness of replica as a primary


    `availability_replica_database_fault_reporting`

    Fires when a database reports a fault to the availability replica manager


    `before_redo_lsn_update`

    Fires immediately before the update of the EOL Log Sequence Number


    `read_only_route_complete`

    Fires when a read-only routing operation successfully completed


    `read_only_route_fail`

    Fires when a read-only routing operation failed


    ## Targets


    A target is the consumer of the events; essentially, it is the device to which
    the trace data will be written. The targets available within SQL Server 2016 are
    detailed in Table 8-3.


    **Table 8-3.** Targets


    | Target | Synchronous/Asynchronous | Description |

    | :--- | :--- | :--- |

    | `Event counter` | Synchronous | Counts the number of events that occur during
    a session |

    | `Event file` | Asynchronous | Writes the event output to memory buffers and
    then flushes them to disk |

    | `Event pairing` | Asynchronous | Determines if a paired event occurs without
    its matching event, for example, if a statement started but never completed |

    | `ETW (Event Tracking for Windows)` | Synchronous | Used to correlate Extended
    Events with operating system data |

    | `Histogram` | Asynchronous | Counts the number of events that occur during a
    session, based on an action or event column |

    | `Ring buffer` | Asynchronous | Stores data in a memory buffer, using `First-In
    First-Out (FIFO)` methodology |


    ## Actions


    Also known as `Global Fields`, Actions are commands that allow additional information
    to be captured when an event fires. An action is fired synchronously when an event
    occurs and the event is unaware of the action. There are 50 actions available
    that allow you to capture a rich array of information, including the statement
    that caused the event to fire, the security context under which the statement
    ran, the transaction ID, the CPU ID, and the call stack.


    ## Predicates


    Predicates are filter conditions that you can apply before the system sends events
    to the target. It is possible to create simple predicates, such as filtering statements
    completing based on a database ID, but you can also create more complex predicates,
    such as only capturing the role change of an AlwaysOn Availability Group replica
    if it happens more than twice.


    Predicates also fully support short-circuiting. This means that if you use multiple
    conditions within a predicate, then the order of predicates is important, because
    if the evaluation of the first predicate fails, the second predicate will not
    be evaluated. Because predicates are evaluated synchronously, this can have an
    impact on performance. Therefore, it is sensible to design your predicates so
    that predicates which are least likely to evaluate to true are placed before predicates
    that are very likely to evaluate to true.


    For example, imagine that you are planning to filter on a specific database (with
    a database ID of `6`), but this database accounts for a high percentage of the
    activity on the instance. You also plan to filter on a specific user ID (`UserA`),
    which is responsible for a low percentage of the activity. In this scenario, you
    would use the following predicate to first filter out activity that does not relate
    to `UserA`, before then filtering out activity that does not relate to database
    ID `6`:


    ```

    WHERE (([sqlserver].[username]=''UserA'') AND ([sqlserver].[database_id]=(6)))

    ```


    ## Types


    All objects within a package are assigned a type. This type is used to interpret
    the data stored within the byte collection of an object. Objects are assigned
    one of the following types:


    *   `Action`

    *   `Event`

    *   `Pred_compare` (retrieve data from events)

    *   `Pred_source` (compare data types)

    *   `Target`

    *   `Type`


    ## Maps'
