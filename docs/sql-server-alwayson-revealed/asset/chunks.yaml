    **Table 5-1. The CREATE AVAIABILITY GROUP Arguments**


    | Argument | Description | Acceptable Values |

    | :--- | :--- | :--- |

    | `AUTOMATED_BACKUP_PREFERENCE` | Defines where backups run from automated jobs
    should be taken. | `PRIMARY`<br>`SECONDARY_ONLY`<br>`SECONDARY`<br>`NONE` |

    | `FAILURE_CONDITION_LEVEL` | Specifies how sensitive the failover will be. Further
