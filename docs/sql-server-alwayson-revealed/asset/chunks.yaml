  trans: "\n# 第 5 章 ■ 使用高可用性组实现高可用性\n\n```sql\nINSERT INTO @Numbers\nSELECT Number\
    \ FROM CTE ;\n\nDECLARE @Names TABLE\n(\n    FirstName VARCHAR(30),\n    LastName\
    \ VARCHAR(30)\n) ;\n\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n      ('Michael',\
    \ 'Smith'),\n      ('Danielle', 'Mead'),\n      ('Reuben', 'Roberts'),\n     \
    \ ('Iris', 'Jones'),\n      ('Sylvia', 'Davies'),\n      ('Finola', 'Wright'),\n\
    \      ('Edward', 'James'),\n      ('Marie', 'Andrews'),\n      ('Jennifer', 'Abraham'),\n\
    \      ('Margaret', 'Jones')\n\nINSERT INTO App2Customers(Firstname, LastName,\
    \ CreditCardNumber)\nSELECT FirstName, LastName, CreditCardNumber FROM\n    (SELECT\n\
    \        (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName\n   \
    \     ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName\n       \
    \ ,(SELECT CONVERT(VARBINARY(8000),\n            (SELECT TOP 1 CAST(Number * 100\
    \ AS CHAR(4))\n             FROM @Numbers\n             WHERE Number BETWEEN 10\
    \ AND 99 ORDER BY NEWID()) + '-' +\n            (SELECT TOP 1 CAST(Number * 100\
    \ AS CHAR(4))\n             FROM @Numbers\n             WHERE Number BETWEEN 10\
    \ AND 99 ORDER BY NEWID())\n            + '-' +\n            (SELECT TOP 1 CAST(Number\
    \ * 100 AS CHAR(4))\n             FROM @Numbers\n             WHERE Number BETWEEN\
    \ 10 AND 99 ORDER BY NEWID())\n            + '-' +\n            (SELECT TOP 1\
    \ CAST(Number * 100 AS CHAR(4))\n             FROM @Numbers\n             WHERE\
    \ Number BETWEEN 10 AND 99 ORDER BY NEWID())))\n        CreditCardNumber\n   \
    \ FROM @Numbers a\n    CROSS JOIN @Numbers b\n    CROSS JOIN @Numbers c\n    )\
    \ d ;\n```\n\n![](img/index-100_1.jpg)\n\n## 配置 SQL Server\n\n配置高可用性组的第一步是在 SQL\
    \ Server 服务上启用此功能。要通过 GUI 启用该功能，我们打开 SQL Server 配置管理器，展开 SQL Server 服务，然后从 SQL\
    \ Server 服务的上下文菜单中选择属性。执行此操作时，将显示服务属性，我们导航到“高可用性”选项卡，如图 5-1 所示。\n\n`图 5-1.` 高可用性选项卡\n\
    \n在此选项卡上，我们勾选“启用高可用性组”框，并确保“Windows 故障转移群集名称”框中显示的群集名称正确无误。然后我们需要重新启动 SQL Server\
    \ 服务。由于高可用性组使用独立实例（这些实例本地安装在每个群集节点上），而不是跨越多个节点的故障转移群集实例，因此我们需要为群集上托管的每个独立实例重复这些步骤。\n\
    \n我们也可以使用 PowerShell 来启用高可用性组。为此，我们使用代码清单 5-2 中的 PowerShell 命令。该脚本假定 `CLUSTERNODE1`\
    \ 是服务器名称，`PRIMARYREPLICA` 是 SQL Server 实例名称。\n\n`代码清单 5-2.` 启用高可用性组\n\n```powershell\n\
    Enable-SqlAlwaysOn -Path SQLSERVER:\\SQL\\CLUSTERNODE1\\PRIMARYREPLICA\n```\n\n\
    下一步是对所有将成为可用性组一部分的数据库进行完整备份。我们分别为 `App1` 和 `App2` 创建独立的可用性组，因此要为 `App1` 创建可用性组，我们需要备份\
    \ `App1Customers` 和 `App1Sales` 数据库。我们通过运行代码清单 5-3 中的脚本来完成此操作。\n\n`代码清单 5-3.`\
    \ 备份数据库\n\n```sql\nBACKUP DATABASE App1Customers\nTO DISK = N'C:\\Backups\\App1Customers.bak'\n\
    WITH NAME = N'App1Customers-完整数据库备份' ;\nGO\n\nBACKUP DATABASE App1Sales\nTO DISK\
    \ = N'C:\\Backups\\App1Sales.bak'\nWITH NAME = N'App1Sales-完整数据库备份' ;\nGO\n```\n\
    \n## 创建可用性组\n\n有几种方式可以在 SQL Server 中创建可用性组拓扑。可以通过对话框手动创建，通过 T-SQL 创建，或通过向导创建。以下各节将探讨这些选项。\n\
    \n### 使用新建可用性组向导\n\n备份成功完成后，我们通过在对象资源管理器中展开“高可用性”，然后从“可用性组”文件夹的上下文菜单中选择“新建可用性组向导”来调用新建可用性组向导。\n"
- fmt: '# CHAPTER 5 ■ IMPLEMENTING HA WITH ALWAYSON AVAILABILITY GROUPS


    The Introduction page of the wizard, displayed in Figure 5-2, now displays, giving
    us an overview of the steps that we need to undertake.


    ![](index-102_1.jpg)


    ## Figure 5-2. The Introduction page


    On the Specify Name page (see Figure 5-3), we are prompted to enter a name for
    our Availability Group. We also need to specify if Database Level Health Detection
    will be used for the Availability Group. This is a new feature of SQL Server 2016,
    and if used, the Availability Group will fail over, if any of the availability
    databases within the group transition out of the ONLINE state.


    ![](index-103_1.jpg)


    ## Figure 5-3. The Specify Name page


    On the Select Databases page, we are prompted to select the database(s) that we
    wish to participate in the Availability Group, as illustrated in Figure 5-4. On
    this screen, notice that we cannot select the `App2Customers` database, because
    we have not yet taken a full backup of the database.


    ![](index-104_1.jpg)


    ## Figure 5-4. The Select Database page


    The Specify Replicas page consists of four tabs. We use the first tab, Replicas,
    to add the secondary replicas to the topology. Checking the Synchronous Commit
    option causes data to be committed on the secondary replica before it is committed
    on the primary replica. (This is also referred to as *hardening the log* on the
    secondary before the primary.) This means that, in the event of a failover, data
    loss is not possible, meaning that we can meet an `SLA` (service level agreement)
    with an `RPO` (recovery point objective) of 0 (zero). It also means that there
    is a performance impediment, however. If we choose not to check the option for
    Synchronous Commit, then the replica operates in Asynchronous Commit mode. This
    means that data is committed on the primary replica before being committed on
    the secondary replica. This stops us from suffering a performance impediment,
    but it also means that, in the event of failover, the `RPO` is nondeterministic.
    Performance considerations for synchronous replicas are discussed later in this
    chapter.


    ![](index-105_1.jpg)


    ## Figure 5-5. The Replicas tab


    **Tip** SQL Server 2016 Enterprise Edition allows three replicas to be configured
    for automatic failover. Previous versions of SQL Server only allowed two synchronous
    replicas.


    When we check the Automatic Failover option, the Synchronous Commit option is
    also selected automatically if we have not already selected it. This is because
    automatic failover is only possible in Synchronous Commit mode. We can set the
    Readable Secondary drop-down to No, Yes, or Read-intent. When we set it to No,
    the database is not accessible on replicas that are in a secondary role. When
    we set it to read-intent, the Availability Group Listener is able to redirect
    read-only workloads to this secondary replica, but only if the application has
    specified `Application Intent=Read-only` in the connection string. Setting it
    to Yes enables the listener to redirect read-only traffic, regardless of whether
    the Application Intent parameter is present in the application’s connection string.
    Although we can change the value of Readable Secondary through the GUI while at
    the same time configuring a replica for automatic failover without error, this
    is simply a quirk of the wizard. In fact, the replica is not accessible, since
    active secondaries are not supported when configured for automatic failover. The
    Replicas tab is illustrated in Figure 5-5.


    **Note** Using secondary replicas for read-only workloads is discussed in more
    depth in chapter 6.'
