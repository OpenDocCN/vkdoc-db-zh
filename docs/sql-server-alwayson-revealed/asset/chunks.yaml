    ## MSDTC Instance Placement Strategy


    that is installed in the same role, if one exists. If it does not, then it uses
    the instance of `MSDTC` to which it has been mapped (if this mapping has been
    performed). If there is no mapping, it uses the cluster’s default instance of
    `MSDTC`, and if there is not one, it uses the local machine’s instance of `MSDTC`.


    Many `DBA`s choose to install `MSDTC` within the same role as `SQL Server`; however,
    this introduces a problem. If `MSDTC` fails, it can also bring down the instance
    of `SQL Server`. Of course, the cluster attempts to bring both of the applications
    up on a different node, but this still involves downtime, including the time it
    takes to recover the databases on the new node, which takes a nondeterministic
    duration. For this reason, I recommend installing `MSDTC` in a separate role.
    If you do, the `SQL Server` instance still utilizes `MSDTC`, since it is the cluster’s
    default instance, and it removes the possibility of `MSDTC` causing an outage
    to `SQL Server`. This is also preferable to using a mapped instance or the local
    machine instance since it avoids unnecessary configuration, and the `MSDTC` instance
    should be clustered when a clustered instance of `SQL Server` is using it.


    ## Creating an MSDTC Role via GUI


    To create an `MSDTC` role, start by selecting the `Configure Role` option from
    the `Roles` context menu in `Failover Cluster Manager`. This invokes the `High
    Availability Wizard`. On the `Select a Role` page of the wizard, select the `Distributed
    Transaction Coordinator (DTC)` role type, as shown in Figure 3-24.


    `Figure 3-24.` The Select Role page

    ![](index-64_1.jpg)


    On the `Client Access Point` page, illustrated in Figure 3-25, you need to enter
    a virtual name and IP Address for `MSDTC`. In our case, we name it `ALWAYSON-MSDTC-C`
    and assign `192.168.0.50` as the IP Address. On a multi-subnet cluster, you need
    to provide an IP Address for each network.


    `Figure 3-25.` The Client Access Point page


    On the `Select Storage` page of the wizard, select the cluster disk on which you
    plan to store the `MSDTC` files, as shown in Figure 3-26. In our case, this is
    `Disk 4`.


    `Figure 3-26.` The Select Storage page

    ![](index-65_1.jpg)

    ![](index-65_2.jpg)


    The `Confirmation` page displays an overview of the role that is about to be created,
    as shown in Figure 3-27.


    `Figure 3-27.` The Confirmation page


    ## Creating an MSDTC Role via PowerShell


    Alternatively, we could create this role in `PowerShell`. The script in Listing
    3-4 first uses the `Add-ClusterServerRole` cmdlet to create the role. We pass
    the virtual name to use for the role into the `Name` parameter, the name of the
    cluster disk to use into the `Storage` parameter, and the IP Address for the role
    into the `StaticAddress` parameter.


    We then use the `Add-ClusterResource` cmdlet to add the `DTC` resource. The `Name`
    parameter names the resource and the `ResourceType` parameter specifies that it
    is a `DTC` resource. We then need to create the dependencies between the resources
    within the role. We did not need to do this when using the `GUI`, as the dependencies
    were created for us automatically. Resource dependencies specify the resource
    or resources on which other resources depend. A resource failing propagates through
    the chain and could take a role offline. For example, in the case of our `ALWAYSON-MSDTC-C`
    role, if either the disk or the virtual name becomes unavailable, the `DTC` resource
    goes offline. Windows Server supports multiple dependencies with both `AND` and
    `OR` constraints. It is the `OR` constraints that make multi-subnet clustering
    possible, because a resource can be dependent on IP Address `A` OR IP Address
    `B`. Finally, we need to bring the role online by using the `Start-ClusterGroup`
    cmdlet.


    `Listing 3-4.` Creating an MSDTC Role

    ```

    #Create the Role

    Add-ClusterServerRole -Name ALWAYSON-MSDTC-C -Storage "Cluster Disk 3" -StaticAddress
    192.168.0.50


    #Create the DTC Resource

    ```'
