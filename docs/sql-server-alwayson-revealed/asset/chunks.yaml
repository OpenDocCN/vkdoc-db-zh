  trans: '### 数据库同步状态参数说明


    `指示数据库的同步状态。`


    可能的值为


    • `0` - 表示不健康。这意味着数据库未在同步


    • `1` - 表示部分健康。这意味着数据库正在同步


    • `2` - 表示健康。这意味着数据库已同步


    `synchronization_health_desc`


    同步健康状态的文字描述。


    可能的值为


    • `NOT_HEALTHY`


    • `PARTIALLY_HEALTHY`


    • `HEALTHY`


    `database_state`


    指示数据库的当前状态。该值反映了 `sys.databases` 目录视图中的值。


    可能的值为


    • `0` - 表示数据库处于在线状态


    • `1` - 表示数据库正在还原


    • `2` - 表示数据库正在恢复


    • `3` - 表示数据库处于等待恢复状态


    • `4` - 表示数据库处于可疑状态


    • `5` - 表示数据库处于紧急模式


    • `6` - 表示数据库处于离线状态


    `database_state_desc`


    数据库状态的文字描述。可能的值为


    • `ONLINE`


    • `RESTORING`


    • `RECOVERING`


    • `RECOVERY_PENDING`


    • `SUSPECT`


    • `EMERGENCY`


    • `OFFLINE`


    `is_suspended`


    指示数据库是否已挂起。


    可能的值为


    • `0` - 表示已恢复


    • `1` - 表示已挂起


    `suspend_reason`


    如果数据库已挂起，`suspend_reason` 列将指示原因。可能的值为


    • `0` - 表示用户手动挂起了数据移动


    • `1` - 表示在强制故障转移后挂起


    • `2` - 表示在重做阶段发生错误


    • `3` - 表示在日志捕获过程中发生错误


    • `4` - 表示在写入日志时发生错误


    • `5` - 表示数据库在重启前已挂起


    • `6` - 表示在撤销阶段发生错误


    • `7` - 表示日志链不匹配错误


    • `8` - 表示在计算辅助副本的同步点时发生错误


    `suspend_reason_desc`


    `suspend_reason` 列的文字描述。可能的值为


    • `SUSPEND_FROM_USER`


    • `SUSPEND_FROM_PARTNER`


    • `SUSPEND_FROM_REDO`


    • `SUSPEND_FROM_CAPTURE`


    • `SUSPEND_FROM_APPLY`


    • `SUSPEND_FROM_RESTART`


    • `SUSPEND_FROM_UNDO`


    • `SUSPEND_FROM_REVALIDATION`


    • `SUSPEND_FROM_XRF_UPDATE`


    `recovery_lsn`


    在主副本上，`recovery_lsn` 表示事务日志的结尾（事务日志中用于时间点恢复的最后一点）。在辅助副本上，该列表示需要重新同步的点。但是，如果该值大于或等于
    `last_hardened_lsn`，则表示不需要重新同步。


    `truncation_lsn`


    对于主副本，该列表示所有辅助副本上的最小日志截断 LSN。对于辅助副本，该列表示该特定数据库副本的日志截断点。


    `last_sent_lsn`


    指示已发送的最后一个日志块的结尾。


    `last_sent_time`


    发送最后一个日志块的日期和时间。


    `last_recieved_lsn`


    指示要接收的最后一个日志块的结尾。


    `last_hardened_lsn`


    指示要固化（hardened）的最后一个日志块的开始。对于异步提交副本，该值将为 `NULL`。


    `last_hardened_time`


    固化的 LSN 的日期和时间。


    `last_redone_lsn`


    在辅助副本上重做的最后一条日志记录的 LSN。


    `last_redone_time`


    在辅助副本上重做的最后一条 LSN 的时间戳。


    `log_send_queue_size`


    尚未发送到辅助副本的日志记录的大小，以千字节为单位。


    `log_send_rate`


    日志记录被发送到辅助副本的速度，以千字节/秒为单位。


    `filestream_send_rate`


    FILESTREAM 文件被发送到辅助副本的速度，以千字节/秒为单位。


    `end_of_log_lsn`


    日志缓存中最后一条日志记录的 LSN。


    `last_commit_lsn`'
- fmt: "# CHAPTER 9 ■ TROUBLESHOOTING ALWAYSON\n\n## The LSN of the last committed\
    \ transaction in the transaction log\n\n## `last_commit_time`\nThe timestamp of\
    \ the last committed LSN in the transaction log\n\n## `low_water_mark_for_ghosts`\n\
    The ghost cleanup task (which physically deletes rows that have already been logically\
    \ deleted), uses the minimum value of this column, across all replicas of the\
    \ database, to determine where to start cleaning up records\n\n## `secondary_log_seconds`\n\
    The number of seconds that the secondary replica is behind the primary replica\n\
    \nThe script in Listing 9-5 demonstrates how to assess the health availability\
    \ database, within the App1 Availability Group. You will notice that we use the\
    \ `DB_NAME()` function to return the name of the database, and join the `sys.dm_hadr_database_replica_states`\
    \ DMV to the `sys.availability_groups` and `sys.availability_replicas` catalog\
    \ views, to return the names of the Availability Groups, and Replicas.\n\n`Listing\
    \ 9-5.` Assessing the State of an Availability Database\n```sql\nSELECT\n    DB_NAME(database_id)\n\
    \    ,ag.name\n    ,ar.replica_server_name\n    ,is_primary_replica\n    ,synchronization_state_desc\n\
    \    ,synchronization_health_desc\n    ,database_state_desc\nFROM sys.dm_hadr_database_replica_states\
    \ drs\nINNER JOIN sys.availability_groups ag\n    ON drs.group_id = ag.group_id\n\
    INNER JOIN sys.availability_replicas ar\n    ON drs.replica_id = ar.replica_id\n\
    WHERE ag.name = 'App1';\n```\n\n## Summary\nSQL Server exposes a large amount\
    \ of metadata that can help you troubleshoot issues and audit your configuration.\
    \ While this chapter discusses some of the most helpful metadata, I strongly encourage\
    \ you to explore the `hadr` DMVs further.\n\nFor failover clustered instances,\
    \ the `sys.dm_os_cluster_nodes` DMV exposes the health status of nodes within\
    \ a cluster. Further troubleshooting detail can be found by calling the `sp_server_diagnostics`\
    \ system stored procedure.\n\n**Tip:** The `sp_server_diagnostics` system stored\
    \ procedure can also be used for troubleshooting AlwaysOn Availability Groups,\
    \ and returns a row for each Availability Group hosted on the instance.\n\nThe\
    \ `sys.dm_hadr_availability_replica_states` DMV exposes details of the health\
    \ status of Replicas, which host AlwaysOn Availability Groups. To drill down to\
    \ view the health status of databases that participate within an Availability\
    \ Group, the `sys.dm_hadr_database_replica_states` DMV can be queried.\n\nBoth\
    \ of the DMVs mentioned in the preceding can be joined to the `sys.availability_groups`\
    \ and `sys.availability_replicas` DMVs, to obtain the textual information regarding\
    \ the configuration, as opposed to GUIDs. The `sys.dm_hadr_database_replica_states`\
    \ DMV can also be joined to `sys.databases`, to obtain further information, regarding\
    \ database configuration.\n\n## Index\n**A**\n- `database page`, 92–93\n- `data\
    \ synchorization page`, 98–99\n- `Active node`, 10\n- `Endpoints tab`, 95\n- `Advanced\
    \ Encryption Standard (AES)`, 95\n- `FAILOVER_CONDITION_LEVEL argument`, 108\n\
    - `AlwaysOn introduction page`, 90–91\n- `Listener dialog box`, 100\n- `Listener\
    \ tab`, 97–98\n- `multi-subnet clusters`, 97\n- `network traffic`, 97\n- `replicas\
    \ page`, 93–94\n- `script`, 101\n- `service account`, 95\n- `summary page`, 100\n\
    - `Synchronous Commit option`, 93–94\n- `validation page`, 99–100\n\n**AlwaysOn\
    \ administration**\n- `Availability Group`\n- `cluster maintenance`, 149\n- `Cluster\
    \ Node Configuration page`, 153\n- `configuring possible owners`, 152\n- `Failover\
    \ Cluster Manager`, 150\n- `move clustered role dialog box`, 150\n- `move instance\
    \ between nodes`, 149, 151\n- `overriding priority`, 149\n- `PowerShell`, 151,\
