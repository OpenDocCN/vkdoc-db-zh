- fmt: "# CHAPTER 5 ■ IMPLEMENTING HA WITH ALWAYSON AVAILABILITY GROUPS\n\nillustrated\
    \ in [Figure 5-10](#index_split_001.html#111). If any of the results come back\
    \ as `Failed`, then you need to resolve them before you attempt to continue.\n\
    \n![](index-111_1.jpg)\n\n**Figure 5-10.** The Validation page\n\nOnce validation\
    \ tests are complete and we move to the Summary page, we are presented with a\
    \ list of the tasks that are to be carried out during the setup. As setup progresses,\
    \ the results of each configuration task display on the Results page. If any errors\
    \ occur on this page, be sure to investigate them, but this does not necessarily\
    \ mean that the entire Availability Group needs to be reconfigured. For example,\
    \ if the creation of the Availability Group listener fails because the `VCO` had\
    \ not been prestaged in `AD`, then you can re-create the listener without needing\
    \ to re-create the entire Availability Group.\n\nAs an alternative to using the\
    \ New Availability Group wizard, you can perform the configuration of the Availability\
    \ Group using the New Availability Group dialog box, followed by the Add Listener\
    \ dialog box. This method of creating an Availability Group is examined later\
    \ in this chapter.\n\n## Scripting the Availability Group\n\nWe can also script\
    \ the activity by using the [script in Listing 5-4](#index_split_001.html#112).\
    \ This script connects to both instances within the cluster, meaning that it can\
    \ only be run in `SQLCMD` mode.\n\nFirst, the script creates a login for the service\
    \ account on each instance. It then creates the `TCP` endpoint, assigns the connect\
    \ permission to the service account, and starts the health trace for AlwaysOn\
    \ Availability Groups (which we discuss later in this chapter). The script then\
    \ creates the Availability Group on the primary and joins the secondary to the\
    \ group. Next, we perform a full and log backup and a restore of each database\
    \ that will participate in the Availability Group before we add the databases\
    \ to the group. Note that the databases are backed up, restored, and added to\
    \ the group in a serial manner. If you have many databases, then you may want\
    \ to parallelize this process.\n\n**Listing 5-4.** Creating Availability Group\n\
    \n```\n--Create Logins for the Service Account,\n--create Endpoints and assign\
    \ Service Account permissions\n--to the Endpoint on Primary Replica\n\n:Connect\
    \ CLUSTERNODE1\\PRIMARYREPLICA\n\nUSE master\nGO\n\nCREATE LOGIN [prosqladmin\\\
    clusteradmin] FROM WINDOWS ;\nGO\n\nCREATE ENDPOINT [Hadr_endpoint]\n   AS TCP\
    \ (LISTENER_PORT = 5022)\n   FOR DATA_MIRRORING (ROLE = ALL, ENCRYPTION = REQUIRED\
    \ ALGORITHM AES) ;\nGO\n\nALTER ENDPOINT [Hadr_endpoint] STATE = STARTED ;\nGO\n\
    \nGRANT CONNECT ON ENDPOINT::[Hadr_endpoint] TO [prosqladmin\\clusteradmin] ;\n\
    GO\n\nIF EXISTS(SELECT * FROM sys.server_event_sessions WHERE name='AlwaysOn_health')\n\
    BEGIN\n    ALTER EVENT SESSION AlwaysOn_health ON SERVER WITH (STARTUP_STATE=ON);\n\
    END\n\nIF NOT EXISTS(SELECT * FROM sys.dm_xe_sessions WHERE name='AlwaysOn_health')\n\
    BEGIN\n    ALTER EVENT SESSION AlwaysOn_health ON SERVER STATE=START;\nEND\nGO\n\
    \n--Create Logins for the Service Account,\n--create Endpoints and assign Service\
    \ Account permissions\n--to the Endpoint on Secondary Replica\n\n:Connect CLUSTERNODE2\\\
    SYNCHA\n\nUSE master\nGO\n\nCREATE LOGIN [prosqladmin\\ClusterAdmin] FROM WINDOWS\
    \ ;\nGO\n\nCREATE ENDPOINT [Hadr_endpoint]\n   AS TCP (LISTENER_PORT = 5022)\n\
    \   FOR DATA_MIRRORING (ROLE = ALL, ENCRYPTION = REQUIRED ALGORITHM AES) ;\nGO\n\
    \nALTER ENDPOINT [Hadr_endpoint] STATE = STARTED ;\nGO\n\nGRANT CONNECT ON ENDPOINT::[Hadr_endpoint]\
    \ TO [prosqladmin\\ClusterAdmin] ;\nGO\n\nIF EXISTS(SELECT * FROM sys.server_event_sessions\
    \ WHERE name='AlwaysOn_health')\nBEGIN\n    ALTER EVENT SESSION AlwaysOn_health\
    \ ON SERVER WITH (STARTUP_STATE=ON);\nEND\n\nIF NOT EXISTS(SELECT * FROM sys.dm_xe_sessions\
    \ WHERE name='AlwaysOn_health')\nBEGIN\n    ALTER EVENT SESSION AlwaysOn_health\
    \ ON SERVER STATE=START;\nEND\nGO\n\n--Create Avaiability Group\n\n:Connect CLUSTERNODE1\\\
    PRIMARYREPLICA\n\nUSE master\nGO\n\nCREATE AVAILABILITY GROUP App1\n```"
