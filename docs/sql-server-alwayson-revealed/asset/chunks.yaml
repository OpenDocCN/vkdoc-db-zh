    # 第 1 章 ■ 高可用性与灾难恢复概念


    当被问及可容忍多少数据丢失时，答案无一例外都是零和零。当然，保证零停机时间是永远不可能的，而一旦你开始解释不同可用性级别所关联的成本，就更容易协商出一个双方都能接受的服务水平。


    决定你应该努力实现多少个“9”的关键因素是停机成本。停机成本分为两类：有形成本和无形成本。有形成本通常比较容易计算。让我们以一个销售应用为例。在这种情况下，最明显的有形成本是收入损失，因为销售人员无法接单。无形成本则更难量化，但可能昂贵得多。例如，如果客户无法在你的公司下单，他们可能会在竞争对手的公司下单，并且再也不回来。其他无形成本可能包括员工士气低落导致的更高人员流失率，甚至公司声誉损失。由于无形成本的本质使其只能估算，行业的经验法则是将有形成本乘以三，并用这个数字来代表你的无形成本。


    一旦你有了应用程序总停机成本的每小时数字，你就可以将这个数字按应用程序的预计生命周期进行扩展，并比较实施不同可用性级别的成本。例如，假设你计算出你的总停机成本是每小时`$2,000`，而你的应用程序的预计生命周期是三年。表
    1-2 说明了你的应用程序的停机成本，比较了你为实施每个可用性级别所计算出的成本（已计入硬件、许可证、电力、布线、额外存储、额外支持设备（如新机架）、管理成本等）。这被称为解决方案的总拥有成本（`TCO`）。


    **表 1-2.** 停机成本


    | 可用性级别 | 停机成本（三年） | 可用性解决方案成本 |

    | :--- | :--- | :--- |

    | 99% | `$525,600` | `$108,000` |

    | 99.9% | `$52,560` | `$224,000` |

    | 99.99% | `$5,256` | `$462,000` |

    | 99.999% | `$526` | `$910,000` |


    在此表中，你可以看到，实现五个 9 的可用性比两个 9 的解决方案节省了`$525,074`，但实施该解决方案的成本额外增加了`$802,000`，这意味着它不经济。四个
    9 的可用性比两个 9 的解决方案节省了`$520,344`，而实施成本仅额外增加了`$354,000`。因此，对于这个特定的应用程序，设计为四个 9 的解决方案是最合适的服务水平。


    ## 备用服务器分类


    备用解决方案分为三类。你可以使用不同的技术实现每一类，尽管某些技术可用于实现多个类别的备用服务器。表 1-3 概述了你可以实现的不同备用类别。


    **表 1-3.** 备用分类


    | 类别 | 描述 | 技术示例 |

    | :--- | :--- | :--- |

    | 热备 | 一种同步解决方案，故障转移可自动或手动发生。常用于高可用性。 | 集群、`AlwaysOn 可用性组（同步）` |

    | 温备 | 一种同步解决方案，故障转移只能手动发生。常用于灾难恢复。 | `日志传送`、`AlwaysOn 可用性组（异步）` |

    | 冷备 | 一种未同步的解决方案，故障转移只能手动发生。这仅适用于永不修改的只读数据。 | - |


    **注意** 冷备未列出技术示例，因为不需要同步，因此也不需要特定的技术实现。


    ## 总结


    你的应用程序的可用性级别是以正常运行时间占总时间的百分比来衡量的...

