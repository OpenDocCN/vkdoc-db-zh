    ![](index-104_1.jpg)


    CHAPTER 5 ■ IMPLEMENTING HA WITH ALWAYSON AVAILABILITY GROUPS


    ***Figure 5-4.** The Select Database page*


    The Specify Replicas page consists of four tabs. We use the first tab, Replicas,
    to add


    the secondary replicas to the topology. Checking the Synchronous Commit option
    causes


    data to be committed on the secondary replica before it is committed on the primary


    replica. (This is also referred to as *hardening the log* on the secondary before
    the primary.) This means that, in the event of a failover, data loss is not possible,
    meaning that we can


    meet an SLA (service level agreement) with an RPO (recovery point objective) of
    0 (zero).


    It also means that there is a performance impediment, however. If we choose not
    to check


    the option for Synchronous Commit, then the replica operates in Asynchronous Commit


    mode. This means that data is committed on the primary replica before being committed


    on the secondary replica. This stops us from suffering a performance impediment,
    but


    it also means that, in the event of failover, the RPO is nondeterministic. Performance


    considerations for synchronous replicas are discussed later in this chapter.


    ![](index-105_1.jpg)


    CHAPTER 5 ■ IMPLEMENTING HA WITH ALWAYSON AVAILABILITY GROUPS


    ■ **Tip** SQL Server 2016 Enterprise Edition allows three replicas to be configured
    for automatic failover. Previous versions of SQL Server only allowed two synchronous
    replicas.


    When we check the Automatic Failover option, the Synchronous Commit option is


    also selected automatically if we have not already selected it. This is because
    automatic


    failover is only possible in Synchronous Commit mode. We can set the Readable


    Secondary drop-down to No, Yes, or Read-intent. When we set it to No, the database


    is not accessible on replicas that are in a secondary role. When we set it to
    read-intent,


    the Availability Group Listener is able to redirect read-only workloads to this
    secondary


    replica, but only if the application has specified Application Intent=Read-only
    in


    the connection string. Setting it to Yes enables the listener to redirect read-only
    traffic,


    regardless of whether the Application Intent parameter is present in the application’s


    connection string. Although we can change the value of Readable Secondary through


    the GUI while at the same time configuring a replica for automatic failover without
    error,


    this is simply a quirk of the wizard. In fact, the replica is not accessible,
    since active


    secondaries are not supported when configured for automatic failover. The Replicas
    tab is


    illustrated in Figur[e 5-5 .](#index_split_001.html#105)


    ***Figure 5-5.** The Replicas tab*


    ![](index-106_1.jpg)


    CHAPTER 5 ■ IMPLEMENTING HA WITH ALWAYSON AVAILABILITY GROUPS


    ■ **Note** Using secondary replicas for read-only workloads is discussed in more
    depth in cha[pter 6](http://dx.doi.org/10.1007/978-1-4842-2397-0_6) .'
