    application to the appropriate node. This means that you can easily scale reporting
    and database maintenance routines horizontally with very little development effort
    and with the applications being able to use a single connection string.


    ## SQL Server 2016 and Load Balancing for Readable Secondary Replicas


    In `SQL Server 2016`, load balancing for readable secondary replicas has been
    introduced. This functionality allows you to specify groups of readable secondaries
    that the read-only workload will be balanced across. This is in contrast to previous
    versions, where traffic was routed to the first available replica.


    ## Understanding AlwaysOn Availability Groups (AOAG)


    Because `AOAG` allows you to combine synchronous replicas (with or without automatic
    failover), asynchronous replicas, and replicas for read-only access, it allows
    you to satisfy high availability, disaster recovery, and reporting scale-out requirements
    using a single technology.


    ### Failover Level and the Availability Group Concept


    When you are using `AOAG`, failover does not occur at the database level, or at
    the instance level. Instead, failover occurs at the level of the `Availability
    Group`. The `Availability Group` is a concept that allows you to group similar
    databases together so that they can fail over as an atomic unit. This is particularly
    useful in consolidated environments, because it allows you to group together the
    databases that map to a single application. You can then fail over this application
    to another replica for the purposes of `DR` testing, among other reasons, without
    having an impact on the other data-tier applications that are hosted on the instance.


    ### Distributed Availability Groups


    `SQL Server 2016` extends the `Availability Group` concept, to allow you to group
    databases from separate clusters into a single `Availability Group`. This is especially
    useful if you are implementing `DR` for a data-tier application that is dispersed
    across separate clusters, but where all databases need to fail over atomically,
    to the `DR` site. This functionality is known as a `Distributed Availability Group`.


    ## Scalability and Limits


    No hard limits are imposed for the number of `Availability Groups` you can configure
    on an instance, nor are there any hard limits for the number of databases on an
    instance that can take part in `AOAG`. Microsoft, however, has tested up to, and
    officially recommends, a maximum of 100 databases and 10 `Availability Groups`
    per instance. The main limiting factor in scaling the number of databases is that
    `AOAG` uses a database mirroring endpoint and there can only be one per instance.
    This means that the log stream for all data modifications is sent over the same
    endpoint.


    ## Diagrams: Mapping Applications and Topologies


    ![](index-31_1.jpg)


    **CHAPTER 2 ■ UNDERSTANDING HIGH AVAILABILITY AND DISASTER RECOVERY TECHNOLOGIES**


    `Figure 2-7` depicts how you can map data-tier applications to `Availability Groups`
    for independent failover. In this example, a single instance hosts two data-tier
    applications. Each application has been added to a separate `Availability Group`.
    The first `Availability Group` has failed over to `Node2`. Therefore, the `Availability
    Group Listeners` point traffic for `Application1` to `Node2` and traffic for `Application2`
    to `Node1`. Because each `Availability Group` has its own network name and `IP`
    Address, and because these resources fail over with the `AOAG`, the application
    is able to seamlessly reconnect to the databases after failover.


    ***Figure 2-7.** Availability groups failover*


    ![](index-32_1.jpg)


    **CHAPTER 2 ■ UNDERSTANDING HIGH AVAILABILITY AND DISASTER RECOVERY TECHNOLOGIES**


    The diagram in `Figure 2-8` depicts an `AlwaysOn Availability Group` topology.
    In this example, there are four nodes in the cluster and a disk witness. `Node1`
    is hosting the primary replicas of the databases, `Node2` is being used for automatic
    failover, `Node3` is being used to offload reporting, and `Node4` is being used
    for `DR`. Because the cluster is stretched across two data centers, multi-subnet
    clustering has been implemented. Because there is no shared storage, however,
    there is no need for `SAN` replication between the sites.


    ***Figure 2-8.** AlwaysOn Availability Group topology*'
