    ## Adding a Node


    The next step you should take when installing the cluster is to add the second
    node. Failure to add the second node results in the instance staying online, but
    with no high availability, since the second node is unable to take ownership of
    the role. To configure the second node, you need to log in to the passive cluster
    node and select the **Add Node to SQL Server Failover Cluster** option from the
    **Installation** tab of **SQL Server Installation Center**. This invokes the **Add
    a Failover Cluster Node Wizard**.


    The first page of this wizard is the **Product Key** page. Just like when you
    install an instance, you need to use this screen to provide the product key for
    SQL Server. Not specifying a product key only leaves you the option of installing
    the **Evaluation** edition, and since this expires after 180 days, it’s probably
    not the wisest choice for high availability.


    The following **License Terms** page of the wizard asks you to read and accept
    the license terms of SQL Server. Additionally, you need to specify if you wish
    to participate in **Microsoft’s Customer Experience Improvement Program**. If
    you select this option, then error reporting is captured and sent to Microsoft.


    After you accept the license terms, a rules check runs to ensure that all of the
    conditions are met so you can continue with the installation. After the wizard
    checks for Microsoft updates and installing the setup files required for installation,
    another rules check is carried out to ensure that the rules for adding the node
    to the cluster are met.


    ![](index-89_1.jpg)


    `CHAPTER 4 ■ IMPLEMENTING AN ALWAYSON FAILOVER CLUSTERED INSTANCE`


    On the **Cluster Node Configuration** page, illustrated in Figure 4-18, you are
    asked to confirm the instance name to which you are adding a node. If you have
    multiple instances on the cluster, then you can use the drop-down box to select
    the appropriate instance.


    `Figure 4-18. Add a Failover Cluster Node Wizard— Cluster Node Configuration page`


    On the **Cluster Network Configuration** page, shown in Figure 4-19, you confirm
    the network details. These should be identical to the first node in the cluster,
    including the same IP Address, since this is, of course, shared between the two
    nodes.


    ![](index-90_1.jpg)


    `CHAPTER 4 ■ IMPLEMENTING AN ALWAYSON FAILOVER CLUSTERED INSTANCE`


    `Figure 4-19. The Cluster Network Configuration page`


    On the **Service Accounts** page of the wizard, most of the information is in
    read-only mode and you are not able to modify it. This is because the service
    accounts you use must be the same for each node of the cluster. You need to re-enter
    the service account passwords, however. This page is shown in Figure 4-20.


    ![](index-91_1.jpg)


    `CHAPTER 4 ■ IMPLEMENTING AN ALWAYSON FAILOVER CLUSTERED INSTANCE`


    `Figure 4-20. The Service Accounts page`


    Now that the wizard has all of the required information, an additional rules check
    is carried out before the summary page displays. The summary page is known as
    the **Ready to Add Node** page, which provides a summary of the activities that
    take place during the installation.


    ## Adding a Node Using PowerShell


    To add a node using PowerShell instead of the GUI, you can run SQL Server’s \`setup.exe\`
    application with an \`AddNode\` action. When you add a node from the command line,
    the parameters detailed in Table 4-2 are mandatory.


    `CHAPTER 4 ■ IMPLEMENTING AN ALWAYSON FAILOVER CLUSTERED INSTANCE`


    `Table 4-2. Mandatory Parameters for the AddNode Action`


    | **Parameter** | **Usage** |

    | :--- | :--- |

    | \`/ACTION\` |  |'
