    ## Recovery Modes


    In a log shipping topology, there is always exactly one principal server, which
    is the production server. It is possible to have multiple secondary servers, however,
    and these servers can be a mix of DR servers and servers used to offload reporting.


    When you restore a transaction log, you can specify three recovery modes: `Recovery`,
    `NoRecovery`, and `Standby`. The `Recovery` mode brings the database online, which
    is not supported with Log Shipping. The `NoRecovery` mode keeps the database offline
    so that more backups can be restored. This is the normal configuration for log
    shipping and is the appropriate choice for DR scenarios.


    The `Standby` option brings the database online, but in a read-only state so that
    you can restore further backups. This functionality works by maintaining a TUF
    (Transaction Undo File). The `TUF` file records any uncommitted transactions in
    the transaction log. This means that you can roll back these uncommitted transactions
    in the transaction log, which allows the database to be more accessible (although
    it is read-only). The next time a restore needs to be applied, you can reapply
    the uncommitted transaction in the `TUF` file to the log before the redo phase
    of the next log restore begins.


    Figure 2-10 illustrates a log shipping topology that uses both a DR server and
    a reporting server.


    **Figure 2-10.** Log shipping with DR and reporting servers


    # CHAPTER 2 ■ UNDERSTANDING HIGH AVAILABILITY AND DISASTER RECOVERY TECHNOLOGIES


    ## Remote Monitor Server


    Optionally, you can configure a monitor server in your log shipping topology.
    This helps you centralize monitoring and alerting. When you implement a monitor
    server, the history and status of all backup, copy, and restore operations are
    stored on the monitor server. A monitor server also allows you to have a single
    alert job, which is configured to monitor the backup, copy, and restore operations
    on all servers, as opposed to it needing separate alerts on each server in the
    topology.


    **`Caution`** If you wish to use a monitor server, it is important to configure
    it when you set up log shipping. After log shipping has been configured, the only
    way to add a monitor server is to tear down and reconfigure log shipping.


    ## Failover


    Unlike other high availability and disaster recovery technologies, an amount of
    administrative effort is associated with failing over log shipping. To fail over
    log shipping, you must back up the tail end of the transaction log and copy it,
    along with any other uncopied backup files, to the secondary server.


    You now need to apply the remaining transaction log backups to the secondary server
    in sequence, finishing with the tail-log backup. You apply the final restore using
    the `WITH RECOVERY` option to bring the database back online in a consistent state.
    If you are not planning to fail back, you can reconfigure log shipping with the
    secondary server as the new primary server.


    ## Combining Technologies


    To meet your business objectives and nonfunctional requirements (NFRs), you need
    to combine multiple high availability and disaster recovery technologies together
    to create a reliable, scalable platform. A classic example of this is the requirement
    to combine an AlwaysOn Failover Cluster with AlwaysOn Availability Groups.


    The reason you may need to combine these technologies is that when you use AlwaysOn
    Availability Groups in synchronous mode, which you must do for automatic failover,
    it can cause a performance impediment. As discussed earlier in this chapter, the
    performance issue is caused by the transaction being committed on the secondary
    server before being committed on the primary server. Clustering does not suffer
    from this issue,'
