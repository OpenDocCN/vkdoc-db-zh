- fmt: '# Chapter 2. Understanding High Availability and Disaster Recovery Technologies


    A failure occurs on any of the active nodes, they fail over to the passive node.
    The diagram in Figure 2-3 depicts a three-node `N+1` cluster.


    **Figure 2-3.** Three-node `N+1` configuration


    In an `N+1` configuration, in a multifailure scenario, multiple nodes may fail
    over to the passive node. For this reason, you must be very careful when you plan
    resources to ensure that the passive node is able to support multiple instances.
    However, you can mitigate this issue by using an `N+M` configuration.


    Whereas an `N+1` configuration has multiple active nodes and a single passive
    node, an `N+M` cluster has multiple active nodes and multiple passive nodes, although
    there are usually fewer passive nodes than there are active nodes. The diagram
    in Figure 2-4 shows a five-node `N+M` configuration. The diagram shows that Instance3
    is configured to always fail over to one of the passive nodes, whereas Instance1
    and Instance2 are configured to always fail over to the other passive node. This
    gives you the flexibility to control resources on the passive nodes, but you can
    also configure the cluster to allow any of the active nodes to fail over to either
    of the passive nodes, if this is a more appropriate design for your environment.


    **Figure 2-4.** Five-node `N+M` configuration


    ## Quorum


    So that automatic failover can occur, the cluster service needs to know if a node
    goes down. In order to achieve this, you must form a quorum. The definition of
    a quorum is “The minimum number of members required in order for business to be
    carried out.” In terms of high availability, this means that each node within
    a cluster, and optionally a witness device (which may be a cluster disk or a file
    share that is external to the cluster), receives a vote. If more than half of
    the voting members are unable to communicate with a node, then the cluster service
    knows that it has gone down and any cluster-aware applications on the server fail
    over to another node. The reason that more than half of the voting members need
    to be unable to communicate with the node is to avoid a situation known as a *split
    brain*.


    To explain a split-brain scenario, imagine that you have three nodes in Data Center
    1 and three nodes in Data Center 2. Now imagine that you lose network connectivity
    between the two data centers, yet all six nodes remain online. The three nodes
    in Data Center 1 believe that all of the nodes in Data Center 2 are unavailable.
    Conversely, the nodes in Data Center 2 believe that the nodes in Data Center 1
    are unavailable. This leaves both sides (known as partitions) of the cluster thinking
    that they should take control. This can have unpredictable and undesirable consequences
    for any application that successfully connects to one or the other partition.
    `The Quorum = (Voting Members / 2) + 1` formula protects against this scenario.


    **Tip** If your cluster loses quorum, then you can force one partition online,
    by starting the cluster service using the `/fq` switch. If you are using Windows
    Server 2012 R2 or higher, then the partition that you force online is considered
    the *authoritative partition*. This means that other partitions can automatically
    rejoin the cluster when connectivity is re-established.


    ### Table 2-1. Quorum Models


    **Quorum Model** | **Appropriate Usage**

    ---|---

    Node Majority | When you have an odd number of nodes in the cluster

    Node + Disk Witness Majority | When you have an even number of nodes in the cluster

    Node + File Share Witness Majority | When you have nodes split across multiple
    sites or when you have an even number of nodes'
