    ## 从集群中移除节点


    如果你想卸载 AlwaysOn 故障转移集群实例，则不能像处理独立实例那样从控制面板执行此操作。相反，你必须在集群的每个节点上运行“移除节点向导”。你可以通过在
    SQL Server 安装中心的 `维护` 选项卡中选择 `从 SQL Server 故障转移集群中移除节点` 选项来启动此向导。


    该向导首先运行全局规则检查，然后是移除节点的规则检查。接着，在如 图 7-3 所示的 `集群节点配置` 页面上，系统会要求你确认要从中移除节点的实例。如果集群托管了多个实例，你可以从下拉框中选择适当的实例。


    `图 7-3.` 集群节点配置页面。


    在 `准备移除节点` 页面上，系统会提供将执行任务的摘要。确认详细信息后，该实例将被移除。此过程应在所有被动节点上重复，最后在主动节点上执行。当从最后一个节点移除实例时，集群角色也将被移除。


    要使用 PowerShell 移除节点，我们需要运行 SQL Server 的 `setup.exe` 应用程序，并将操作参数配置为 `RemoveNode`。当你使用
    PowerShell 移除节点时，表 7-1 中的参数是必需的。


    `表 7-1.` 从集群中移除节点时的必需参数


    | `参数` | `用法` |

    | --- | --- |

    | `/ACTION` | 必须配置为 `AddNode`。 |

    | `/INSTANCENAME` | 你正在添加额外节点以支持的实例。 |

