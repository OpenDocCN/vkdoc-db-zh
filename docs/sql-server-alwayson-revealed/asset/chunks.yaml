  raw: 'the configuration changes and a link to the report.


    Adding an IP Address


    Our next task is to add a second IP Address to the cluster’s client access point.
    We do not


    add an extra IP Address for the Availability Group Listener yet. We perform this
    task in the


    “ Configuring the Availability Group ” section later in this chapter.


    In order to add the second IP Address, we select Properties from the context menu
    of


    Server Name in the Core Cluster Resources window of Failover Cluster Manager.
    On the


    General tab of the Cluster Properties dialog box, we add the IP Address for administrative


    clients, following failover to DR, as illustrated in Figur[e 6-8 .](#index_split_002.html#139)


    ![](index-139_1.jpg)


    CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS


    ***Figure 6-8.** The General tab*


    When we apply the change, we receive a warning saying that administrative clients


    will temporarily be disconnected from the cluster. This does not include any clients


    connected to our Availability Group. If we choose to proceed, we then navigate
    to the


    Dependencies tab of the dialog box and ensure that an OR dependency has been created


    between our two IP Addresses, as shown in Figur[e 6-9](#index_split_002.html#140)
    .


    ![](index-140_1.jpg)


    CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS


    ***Figure 6-9.** The Dependencies tab*


    After this process is complete, the second IP Address resource in the Cluster
    Core


    Resources group shows up as offline. This is normal. In the event of failover
    to the server


    in the second subnet, this IP Address comes online, and the IP Address of the
    subnet


    in the primary site goes offline. This is why the OR dependency (as opposed to
    an AND


    dependency) is critical. Without it, the Server Name resource could never be online.


    Configuring the Availability Group


    To configure the Availability Group, we first have to add the new node as a replica
    and


    configure its properties. We then add a new IP Address to our listener for the
    second


    subnet. Finally, we look at improving the connection times for clients.


    ![](index-141_1.jpg)


    CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS


    Adding and Configuring a Replica


    In SQL Server Management Studio (SSMS) , on the primary replica, we drill through


    Availability Groups | App1 and select Add Replica from the context menu of the


    Availability Replicas node. This causes the Add Replica to Availability Group
    wizard to be


    displayed. After passing through the Introduction page of the wizard, you see
    the Connect


    to Replicas page, as displayed in Figur[e 6-10](#index_split_002.html#141) . On
    this page, you are invited to connect to the other replicas in the Availability
    Group.


    ***Figure 6-10.** The Connect to Replicas page*


    On the Replicas tab of the Specify Replicas page , shown in Figur[e 6-11 , we
    first use](#index_split_002.html#142)


    the Add Replica button to connect to the DR instance. After we have connected
    to the


    new replica, we specify the properties for that replica. In this case, we leave
    them as-is


    because it will be a DR replica. Therefore, we want it to be asynchronous and
    we do not


    want it to be readable.


    ![](index-142_1.jpg)


    CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS


    ***Figure 6-11.** The Replicas tab*


    On the Endpoints tab, shown in Figur[e 6-12 , we ensur](#index_split_002.html#143)e
    that the default settings are correct and acceptable.


    ![](index-143_1.jpg)


    ![](index-143_2.jpg)


    CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS


    ***Figure 6-12.** The Endpoints tab*


    On the Backup Preferences tab, the option for specifying the preferred backup


    replica is read-only. We are, however, able to specifically exclude our new replica
    as a


    candidate for backups or change its backup priority. This page is displayed in
    Figur[e 6-13 .](#index_split_002.html#143)


    ***Figure 6-13.** The Backup Preferences tab*


