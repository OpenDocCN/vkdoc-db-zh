    Skip Initial Data Synchronization allows you to back up and restore the databases
    yourself after you complete the setup.


    ■ **Tip** If your Availability Group will contain many databases, then it may
    be best to perform the backup/restore yourself. This is because the inbuilt utility
    will perform the


    actions sequentially, and therefore it may take a long time to complete.


    On the Validation page, rules that may cause the setup to fail are checked, as'
  trans: '

    # 备份历史与恢复挑战


    `only maintains the backup history on the instance where the backup was taken.`
    这意味着你可能需要在多个服务器之间来回查找，试图取回所有的备份文件，却不知道每个文件具体存放在哪里。如果其中一台服务器发生完全系统故障，情况会变得更糟。你可能会发现自己陷入日志链断裂的困境。


    ## 解决方案与新问题


    解决上述大部分问题的方法是使用文件服务器上的共享位置，并将每个实例配置为备份到同一个共享目录。然而，这样做的问题在于，通过这种设置，你实际上是将所有备份都通过网络传输，而不是在本地进行备份。这可能会增加备份的持续时间，同时也会增加网络流量。


    # Listener 选项卡配置


    在 `Listener` 选项卡上（如图`5-8`所示），我们可以选择是立即创建一个可用性组`Listener`，还是将这个任务推迟到以后执行。如果选择创建侦听器，则需要指定侦听器的名称、它应监听的端口以及它应使用的`IP`地址。在多子网集群中，我们需要为每个子网指定一个地址。此处提供的详细信息用于在可用性组的集群角色中创建客户端访问点资源。


    你可能会注意到，我们为侦听器指定了端口`1433`，而我们的`SQL Server`实例也运行在端口`1433`上。这是一个有效的配置，因为侦听器配置在与`SQL
    Server`实例不同的`IP`地址上。使用相同的端口号并非强制要求，但这样做是有益的——如果你是在现有实例上实施`AlwaysOn`可用性组，因为那些指定端口号进行连接的应用程序可能需要更少的修改。请记住，服务器名称仍然会不同，因为应用程序将连接到侦听器的虚拟名称，而不是物理服务器\实例的名称。在我们的示例中，应用程序连接到`APP1LISTEN\PRIMARYREPLICA`，而不是`CLUSTERNODE1\PRIMARYREPLICA`。虽然通过`CLUSTERNODE1`的连接仍然被允许，但它们无法受益于高可用性或报表的扩展。


    ![](img/index-109_1.jpg)


    `第 5 章 ■ 使用 AlwaysOn 可用性组实现高可用性`


    `图 5-8. ` `Listener 选项卡`


    `■ 提示` `如果你在组织单位内没有“创建计算机对象”的权限，那么侦听器的 VCO（虚拟计算机对象）必须在 AD 中预先创建，并且你必须被分配对该对象的“完全控制”权限。`


    # 初始数据同步选择


    在`Select Initial Data Synchronization`屏幕上（如图`5-9`所示），我们选择如何对副本进行初始数据同步。如果选择`Full`，那么参与可用性组的每个数据库都会进行一次完整备份，接着是日志备份。备份文件会先备份到一个你指定的共享位置，然后还原到辅助服务器上。还原完成后，通过日志流的数据同步就会开始。


    ![](img/index-110_1.jpg)


    `第 5 章 ■ 使用 AlwaysOn 可用性组实现高可用性`


    `图 5-9. ` `选择数据同步页面`


    如果你已经备份了数据库并将它们还原到了辅助副本上，那么可以选择`Join Only`选项。这将启动可用性组内数据库通过日志流进行的数据同步。选择`Skip
    Initial Data Synchronization`允许你在完成设置后自行备份和还原数据库。


    `■ 提示` `如果你的可用性组将包含许多数据库，那么最好由你自己执行备份/还原操作。这是因为内置的实用程序将按顺序执行这些操作，因此可能需要很长时间才能完成。`


    在`Validation`页面上，系统会检查可能导致设置失败的问题。

