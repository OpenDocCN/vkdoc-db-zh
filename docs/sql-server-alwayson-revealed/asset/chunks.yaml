    from the


    context menu of the SQL Server service. When we do this, the service properties
    display


    and we navigate to the AlwaysOn High Availability tab, shown in Figur[e 5-1](#index_split_001.html#100)
    .


    ***Figure 5-1.** The AlwaysOn High Availability tab*


    On this tab, we check the Enable AlwaysOn Availability Groups box and ensure that


    the cluster name displayed in the Windows Failover Cluster Name box is correct.
    We then


    need to restart the SQL Server service. Because AlwaysOn Availability Groups uses
    stand-


    alone instances , which are installed locally on each cluster node, as opposed
    to a failover


    clustered instance, which spans multiple nodes, we need to repeat these steps
    for each


    stand-alone instance hosted on the cluster.


    We can also use PowerShell to enable AlwaysOn Availability Groups. To do this,
    we


