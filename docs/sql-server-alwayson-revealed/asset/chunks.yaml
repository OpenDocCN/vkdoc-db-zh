    # CHAPTER 3 ■ IMPLEMENTING A CLUSTER


    **Figure 3-14.** The Failover Cluster Validation Report


    Clicking Finish on the Summary page returns you to the Create Cluster Wizard,
    where you are greeted with the Access Point for Administering the Cluster page,
    illustrated in Figure 3-15. On this page, you need to enter the virtual name of
    your cluster. We will name our cluster `ALWAYSON-C`. If the network card is configured
    to acquire an IP Address automatically, then an IP Address will be assigned using
    `DHCP`. Otherwise, you will be required to enter an IP Address manually. This
    is known as a static IP, as it will remain constant, whereas an IP Address assigned
    through `DHCP` may change. I strongly recommend using a static IP for cluster
    access points, to avoid dynamic routing issues, but this can be changed after
    the cluster has been created.


    ![](index-56_1.jpg)


    **Figure 3-15.** The Access Point for Administering the Cluster page


    ## ■ **Note**

    The virtual name and IP Address are bound to whichever node is active, meaning
    that the cluster is always accessible in the event of failover.


    In our case, the cluster resides within a simple domain, a single site and single
    subnet. If you are configuring a multi-subnet cluster, however, then the wizard
    detects this, and IP Addresses will be required for each subnet. In this scenario,
    you need to enter an IP Address for each subnet.


    ## ■ **Note**

    Each of the two NICs within a node is configured on a separate subnet so that
    the heartbeat between the nodes is segregated from the public network. However,
    a cluster is only regarded as multi-subnet if the data NICs of the cluster nodes
    reside in different subnets.


    ## ■ **Tip**

    If your cluster will reside within a domain, and if you do not have permissions
    to create `AD` (Active Directory) objects in the `OU` (organizational unit) that
    contains your cluster, then the `VCO` (virtual computer object) for the cluster
    must already exist and you must have the Full Control permission assigned.


    ![](index-57_1.jpg)


    The Confirmation page displays a summary of the cluster that is created. You can
    also use this screen to specify whether or not all eligible storage should be
    added to the cluster, which is generally a useful feature. This screen is displayed
    in Figure 3-16.


    **Figure 3-16.** The Confirmation page


    After the cluster has been built, the Summary page shown in Figure 3-17 displays.
    This screen summarizes the cluster name, IP Address, nodes, the quorum model that
    has been configured, and details of any warnings regarding the cluster. It also
    provides a link to an `HTML` (Hypertext Markup Language) version of the report.


    ![](index-58_1.jpg)


    ![](index-58_2.jpg)


    **Figure 3-17.** The Summary page


    The Create Cluster report displays a complete list of tasks that have been completed
    during the cluster build, as shown in Figure 3-18.


    **Figure 3-18.** The Create Cluster report


    ![](index-59_1.jpg)


    We could also have used `PowerShell` to create the cluster. The script in Listing
    3-2 runs the cluster validation tests using the `Test-Cluster` cmdlet, before
    using the `New-Cluster` cmdlet to configure the cluster.


    **Listing 3-2.** Validating and Creating the Cluster

    ```

    #Run the validation tests

    Test-Cluster -Node Clusternode1,Clusternode2


    #Create the cluster

    New-Cluster -Node ClusterNode1,ClusterNode2 -Name ALWAYSON-C

    ```


    ## Configuring the Cluster


    Many cluster configurations can be altered, depending on the needs of your environment.
    This section demonstrates how to change some of the more common configurations.


    ### Changing the Quorum


    If we examine our cluster storage in the `Failover Cluster Manager`, by drilling
    through `ALWAYSON-C | Storage | Disks` and highlighting the disk assigned to quorum,
    we can see that the witness has been incorrectly configured as the drive for `MSDTC`.
    This is illustrated in Figure 3-19.


    **Figure 3-19.** Cluster summary


    ![](index-60_1.jpg)


    We can modify this by entering the context menu of the cluster and by selecting
    `More Actions | Configure Cluster Quorum Settings`, which causes the Configure
    Cluster Quorum Wizard to be invoked. On the Select Quorum Configuration Option
    page, shown in Figure 3-20, we choose the `Select the Quorum Witness` option.


    **Figure 3-20.** The Select Quorum Configuration Option page


    On the Select Quorum Witness page, we select the type of quorum that we want to
    configure. A disk witness is most appropriate when there is an even number of
    nodes in the cluster and all nodes reside in the same data center, or when there
    is an even number of nodes in the primary data center and another node in a secondary
    data center.


    A fileshare witness is most appropriate when there are nodes split across two
    data centers, and you have access to a third data center, where a fileshare is
    available to act as a quorum.


    A cloud witness is a new feature of `Windows 2016` and is most appropriate when
    there are nodes spread across two data centers and there is not a third data center
    available to set up a fileshare witness. To use a cloud witness, you must have
    an `Azure` storage account, as the witness will be created in `Azure BLOB` storage.


    It is most appropriate to not configure a witness where there is an odd number
    of nodes in a single data center.


    For our scenario, we will select the option to configure a disk witness. This
    is illustrated in Figure 3-21.


    ![](index-61_1.jpg)


    ![](index-61_2.jpg)


    **Figure 3-21.** The Select Quorum Witness page


    On the Configure Storage Witness page of the wizard, we can select the correct
    disk to use as a quorum. In our case, this is `Disk 2`, as illustrated in Figure
    3-22.


    **Figure 3-22.** The Configure Storage Witness page


    ![](index-62_1.jpg)


    The Summary page of the wizard, shown in Figure 3-23, details the configuration
    changes that will be made to the cluster. It also highlights that dynamic quorum
    management is enabled and that all nodes, plus the quorum disk, have a vote in
    the quorum. Advanced quorum configurations are discussed further in Chapter 4.


    **Figure 3-23.** The Summary page


    We can also perform this configuration from the command line by using the `PowerShell`
    command in Listing 3-3. Here, we use the `Set-ClusterQuorum` cmdlet and pass in
    the name of the cluster, followed by the quorum type that we wish to configure.
    Because disk is included in this quorum type, we can also pass in the name of
    the cluster disk that we plan to use, and it is this aspect that allows us to
    change the quorum disk.


    ## ■ **Tip**

    If following the demos using `PowerShell`, remember to change the disk number
    to match your own configuration.


    **Listing 3-3.** Configuring the Quorum Disk

    ```

    Set-ClusterQuorum -Cluster ALWAYSON-C -NodeAndDiskMajority "Cluster Disk 2"

    ```


    ![](index-63_1.jpg)


    ### Configuring MSDTC


    If your instance of `SQL Server` uses distributed transactions, or if you are
    installing `SQL Server Integration Services (SSIS)`, then it relies on `MSDTC`
    (Microsoft Distributed Transaction Coordinator). If your instance will use `MSDTC`,
    then you need to ensure that it is properly configured. If it is not, then setup
    will succeed, but transactions that rely on it may fail.


    When installed on a cluster, `SQL Server` automatically uses the instance of `MSDTC`'
