    # 第六章 ■ 利用 AlwaysOn 可用性组实现灾难恢复


    多子网群集。我们还需要重新配置仲裁模型，以消除其对当前用于仲裁的共享存储的依赖。完成此操作后，我们便能将新节点上的实例添加到我们的可用性组中。


    以下各节假设您已经构建了第三台服务器，其上运行着名为 `CLUSTERNODE3\ASYNCDR` 的 SQL Server 实例，并将演示如何重新配置群集以及可用性组。本章还将讨论分布式可用性组和可读辅助副本。因此，我们将在本章执行的任务如下：


    •  使用 `添加节点向导` 将第三个节点添加到群集

    •  修改仲裁，以使用文件共享，并将灾难恢复节点排除在投票之外

    •  向仲裁添加一个 IP 地址

    •  在 IP 地址依赖项上配置 `OR` 约束

    •  配置群集的 `RegisterAllProvidersIP` 和 `HostRecordTTL` 设置


    ## 配置群集


    在开始修改可用性组之前，我们需要执行若干群集配置步骤。这些步骤包括添加新节点、重新配置仲裁以及向群集的客户端访问点添加新的 IP。


    © Peter A. Carter 2016


    P. A. Carter, *SQL Server AlwaysOn Revealed*, DOI 10.1007/978-1-4842-2397-0_6


    ![](img/index-132_1.jpg)


    ## 添加节点


    向可用性组添加灾难恢复能力的首要任务，是将第三个节点添加到群集。为此，我们在 `故障转移群集管理器` 中右键单击节点，从上下文菜单中选择 `添加节点`。这将调用
    `添加节点向导`。通过此向导的 `开始之前` 页面后，您将看到 `选择服务器` 页面，如 图 6-1 所示。在此页面上，您需要输入计划添加到群集的节点的服务器名称。


    **`图 6-1.` `选择服务器` 页面**


    在 `验证警告` 页面，系统会邀请您运行 `群集验证向导`。在生产环境中进行此类更改时，您应始终运行此向导；否则，您将无法获得 Microsoft 对群集的支持。运行
    `群集验证向导` 的详细信息可在[第 3 章](http://dx.doi.org/10.1007/978-1-4842-2397-0_3)中找到。在我们当前的场景中运行
    `群集验证向导` 可能会产生一些警告，详见 表 6-1。


    **`表 6-1.` 群集验证警告**


    **警告** | **原因** | **解决方法**

    --- | --- | ---

    `此资源未将群集的所有节点列为可能的所有者。` | 显示此警告是因为我们尚未配置可用性组以使用新节点。 | 在本章后续部分将讨论如何配置可用性组以使用新节点。

    `网络名称 ''Name: App1Listen'' 的 RegisterAllProvidersIP 属性设置为 1。对于当前群集配置，此值应设置为 0。`
    | 将 `RegisterAllProvidersIP` 设置为 1 将导致所有 IP 地址都被注册，无论它们是否在线。当我们通过 SSMS 创建可用性组侦听器时，此设置被自动配置为允许客户端更快地故障转移，此警告应始终被忽略。如果我们通过
    `故障转移群集管理器` 创建侦听器，则该属性默认设置为 0。 | `RegisterAllProvidersIP` 将在本章后续部分更详细地讨论。无解决方法


