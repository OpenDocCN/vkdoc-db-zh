    | Level | Failover Triggered By |

    | :--- | :--- |

    | 1 | Instance down.<br>AOAG lease expires. |

    | 2 | Conditions of level 1 plus:<br>`HEALTH_CHECK_TIMEOUT` is exceeded.<br>The
    replica has a state of `FAILED`. |

    | 3 (Default) | |'
