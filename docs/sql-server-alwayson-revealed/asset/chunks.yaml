    Node + Cloud Witness Majority


    When you have nodes split across multiple sites,


    but there is not a third data center available to


    host a file share quorum . This quorum model is


    new in Windows Server 2016


    **Reasons for needing to avoid shared disks due to virtualization are discussed
    later in this* *chapter.*


    Although the default option is one node, one vote, it is possibly to manually
    remove


    a node’s vote by changing the NodeWeight property to zero. This is useful if you
    have a


    *multi-subnet cluster* (a cluster in which the nodes are split across multiple
    sites). In this scenario, it is recommended that you use a file-share witness
    in a third site. This helps


    you avoid a cluster outage as a result of network failure between data centers.
    If you have


    an odd number of nodes in the quorum, however, then adding a file-share witness
    leaves


    you with an even number of votes, which is dangerous. Removing the vote from one
    of


    the nodes in the secondary data center eliminates this issue.


    ■ **Caution** A file-share witness and quorum witness do not store a full copy
    of the quorum database. This means that a two-node cluster with a file-share witness
    is vulnerable to a


    scenario known as *partition in time* . In this scenario, if one node fails while
    you are in the process of patching or altering the cluster service on the second
    node, then there is no


    up-to-date copy of the quorum database. This leaves you in a position in which
    you need to


    destroy and rebuild the cluster.


    Windows Server 2012 R2 introduced the concepts of Dynamic Quorum and Tie


    Breaker for 50% Node Split. When Dynamic Quorum is enabled, the cluster service


    automatically decides whether or not to give the quorum witness a vote, depending


    on the number of nodes in the cluster. If you have an even number of nodes, then
    it is


    CHAPTER 2 ■ UNDERSTANDING HIGH AVAILABILITY AND DISASTER RECOVERY TECHNOLOGIES


    assigned a vote. If you have an odd number of nodes, it is not assigned a vote.
    Tie Breaker


    for 50% Node Split expands on this concept. If you have an even number of nodes
    and


    a witness and the witness fails, then the cluster service automatically removes
    a vote


    from one random node within the cluster. This maintains an odd number of votes
    in the


    quorum and reduces the risk of a cluster going offline, due to a witness failure.


    ■ **Note** Clustering is discussed in more depth in Cha[pter 3 and Cha](http://dx.doi.org/10.1007/978-1-4842-2397-0_3)[pter
    4 .](http://dx.doi.org/10.1007/978-1-4842-2397-0_4)


    Database Mirroring


    Database mirroring is a technology that can provide configurations for both high


    availability and disaster recovery. As opposed to relying on the Windows cluster
    service ,


    Database mirroring is implemented entirely within SQL Server and provides availability


    at the database level, as opposed to the instance level. It works by compressing


    transaction log records and sending them to the secondary server via a TCP endpoint
    .


    A database mirroring topology consists of precisely one primary server, precisely
    one


    secondary server, and an optional witness server.


    Database mirroring is a deprecated technology , which means that it will be removed


    in a future version of SQL Server. In SQL Server 2014, however, it can still prove
    useful.


    For instance, if you are upgrading a data-tier application from SQL Server 2008,
    where


    AlwaysOn Availability Groups were not supported and database mirroring had been


    implemented, and also assuming your expectation is that the lifecycle of the application


    will end before the next major release of SQL Server, then you can continue to
    use


    database mirroring. Some organizations, especially where there is disconnect between


    the Windows administration team and the SQL Server DBA team, are also choosing
    not to


    implement AlwaysOn Availability Groups , especially for DR, until database mirroring
    has


    been removed; this is because of the relative complexity and multiteam effort
    involved'
