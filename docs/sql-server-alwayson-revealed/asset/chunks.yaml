  trans: '

    # 第 6 章 ■ 使用 AlwaysOn 可用性组实现灾难恢复


    对故障转移群集管理器中的`Name`资源运行依赖关系报告，如图 6-17 所示。


    ![](img/index-151_1.jpg)


    **图 6-17.** 依赖关系报告


    ## 改进连接时间


    使用`.NET 4`或更高版本的客户端在连接到 AlwaysOn 可用性组时，可以在其连接字符串中指定新的`MultiSubnetFailover=True`属性。这通过更积极地重试
    TCP 连接来改进连接时间。但是，如果客户端使用的是旧版本的`.NET`，则其连接超时的风险很高。


    此问题有两种解决方法。第一种是将`RegisterAllProvidersIP`属性设置为`0`。这是推荐的方法，但问题在于，故障转移到 DR 站点可能需要长达
    15 分钟。这是因为第二个子网的 IP 地址资源在发生故障转移之前处于脱机状态。然后，PTR 记录的发布可能需要长达 15 分钟。为了降低此风险，建议您同时降低`HostRecordTTL`。此属性定义群集名称的资源记录发布的频率。


    清单 6-3 中的脚本演示了如何禁用`RegisterAllProvidersIP`，然后将`HostRecordTTL`减少到 300 秒。


    **清单 6-3.** 配置连接属性


    ```powershell

    Get-ClusterResource "App1_App1Listen" | Set-ClusterParameter RegisterAllProvidersIP
    0

    Get-ClusterResource "App1_App1Listen" | Set-ClusterParameter HostRecordTTL 300

    ```


    另一种解决方法是简单地将连接的超时值增加到 30 秒。但是，此解决方案接受大量连接将需要长达 30 秒的时间。这对于业务来说可能是不可接受的。


    ## 分布式可用性组


    分布式可用性组是 SQL Server 2016 的一项新功能，它提供了一种替代的灾难恢复配置，可以减少网络流量，并减轻 DR 站点的群集健康状况导致主站点问题的风险，同时仍能完全监控
    DR 站点中的仲裁。


    分布式可用性组不是将单个群集跨两个站点扩展，而是允许您连接驻留在多个群集上的可用性组。每个群集维护自己的仲裁，因此 DR 站点不可用不会影响主站点。此外，如果辅助站点中有多个副本，站点之间的网络流量会减少，因为主站点的数据仅复制一次，而不是像传统的扩展群集配置那样复制到每个单独的副本。其他群集规则也放宽了。例如，DR
    站点群集中的群集节点可以最佳地运行与主站点群集中的群集节点不同版本的操作系统。


    > **提示** 虽然许多规则被放宽，但主可用性组和辅助可用性组中数据库的配置和文件夹位置必须相同，就像使用单个扩展群集时一样。数据库镜像端点也必须使用相同的端口号。


    典型的分布式可用性组拓扑如图 6-18 所示。


    ![](img/index-153_1.jpg)


    **图 6-18.** 分布式可用性组拓扑


    分布式可用性组也可以与 SQL Server AlwaysOn 故障转移群集实例一起配置。在这种情况下，主站点中的群集将托管一个故障转移群集实例，而 DR
    站点中的可用性组提供灾难恢复功能，无需扩展群集。

    '
- fmt: '# CHAPTER 6 ■ IMPLEMENTING DR WITH ALWAYSON AVAILABILITY GROUPS


    The [script in Listing 6-4](#index_split_002.html#154) demonstrates how to create
    a distributed Availability Group, for our `App2` Availability Group. The script
    assumes that you have already created an Availability Group on a second cluster,
    which matches the configuration of the `App2` Availability Group, which resides
    on the `ALWAYSON-C` cluster. It assumes that you have named the Availability Group
    listener on the DR cluster `App2DR`. The script then joins the Availability Group
    on the second server, to the distributed Availability Group.


    ■ **Tip** Once you have joined the secondary Availability Group to the Distributed
    Availability Group, it will automatically become read only, and updates will only
    be allowed, via the synchronization from the primary Availability Group.


    ## Listing 6-4 Creating a Distributed Availability Group


    ```sql

    CREATE AVAILABILITY GROUP App2Distributed

    WITH (DISTRIBUTED)

    AVAILABILITY GROUP ON

    ''App2'' WITH

    (

    LISTENER_URL = ''tcp://App2_App2Listen:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''App2DR'' WITH

    (

    LISTENER_URL = ''tcp://App2_App2Listen:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    ```


    ■ **Note** Do not follow the demonstrations in this section, if you wish to follow
    the demonstrations in later chapters.


    ## Configuring Readable Secondary Replicas


    It can be very useful to add readable secondary replicas to an AlwaysOn Availability
    Group topology in order to implement vertically scaled reporting. When you use
    this strategy, the databases are kept synchronized, with variable, but typically
    low latency, using log streaming. The additional advantage of readable secondary
    replicas from SQL Server 2014 onward is that they stay online, even if the primary
    replica is offline. The limitation when using this availability feature, however,
    is that users must connect directly to the instance, as opposed to the Availability
    Group Listener.


    You can further improve read performance in readable secondary replicas by using
    temporary statistics, which you can also use to optimize read-only workloads.
    Also, snapshot isolation is also used exclusively on readable secondary replicas,
    even if other isolation levels or locking hints are explicitly requested. This
    helps avoid contention, but it also means that `TempDB` should be suitably scaled
    and on a fast disk array.


    The main risk of using readable secondary replicas is that implementing snapshot
    isolation on the secondary replica can actually cause deleted records not to be
    cleaned up on the primary replica. This is because the ghost record clean-up task
    only removes rows from the primary once they are no longer required at the secondary.
    In this scenario, log truncation is also delayed on the primary replica. This
    means that you potentially risk having to kill long-running queries that are being
    satisfied against the readable secondary. This issue can also occur if the secondary
    replica becomes disconnected from the primary. Therefore, there is a risk that
    you may need to remove the secondary replica from the Availability Group and subsequently
    read it.


    To make a secondary replica readable, you need to perform three tasks. First configure
    the secondary replica to allow read-only connections. Second, specify a read-only
    URL for reporting. The Availability Group Listener then directs appropriate traffic
    to this URL. The final task is to update the read-only routing list on the primary
    replica. These tasks are performed by the [script in Listing 6-5](#index_split_002.html#155).


    ## Listing 6-5 Configuring Read-Only Routing


    ```sql

    --Configure the ASYNCDR Replica to allow read-only connections

    ALTER AVAILABILITY GROUP App1

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH

    (SECONDARY_ROLE (ALLOW_CONNECTIONS = READ_ONLY)) ;


    --Configure the read-only URL for the ASYNCDR Replica

    ALTER AVAILABILITY GROUP App1

    ```'
