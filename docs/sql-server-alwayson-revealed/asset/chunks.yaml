- fmt: '## 添加IP地址


    我们的下一个任务是向集群的客户端访问点添加第二个IP地址。我们暂时不为可用性组侦听器添加额外的IP地址。我们将在本章后面的“配置可用性组”部分执行此任务。


    为了添加第二个IP地址，我们在“故障转移群集管理器”的“核心群集资源”窗口中，右键单击“服务器名称”，然后选择“属性”。在“群集属性”对话框的“常规”选项卡上，我们为管理客户端添加故障转移到DR后使用的IP地址，如图6-8所示。


    ![](index-139_1.jpg)


    **图6-8.** 常规选项卡


    当我们应用更改时，会收到一条警告，称管理客户端将暂时与群集断开连接。这不包括任何连接到我们可用性组的客户端。如果我们选择继续，接下来导航到对话框的“依赖项”选项卡，并确保在我们的两个IP地址之间创建了一个“或”依赖项，如图6-9所示。


    ![](index-140_1.jpg)


    **图6-9.** 依赖项选项卡


    此过程完成后，“群集核心资源”组中的第二个IP地址资源显示为脱机。这是正常的。如果故障转移到第二个子网中的服务器，此IP地址将联机，而主站点中子网的IP地址将脱机。这就是为什么“或”依赖项（相对于“与”依赖项）至关重要。没有它，“服务器名称”资源将永远无法联机。


    ## 配置可用性组


    要配置可用性组，我们首先必须将新节点添加为副本并配置其属性。然后，我们为第二个子网向侦听器添加一个新的IP地址。最后，我们探讨如何改善客户端的连接时间。


    ![](index-141_1.jpg)


    ### 添加并配置副本


    在SQL Server Management Studio (SSMS)中，在主副本上，我们依次展开“可用性组”|“App1”，然后在“可用性副本”节点上右键单击并选择“添加副本”。这将显示“将副本添加到可用性组”向导。在通过向导的“简介”页面后，你将看到“连接到副本”页面，如图6-10所示。在此页面上，系统会提示你连接到可用性组中的其他副本。


    **图6-10.** 连接到副本页面


    在“指定副本”页面的“副本”选项卡上，如图6-11所示，我们首先使用“添加副本”按钮连接到DR实例。连接到新副本后，我们指定该副本的属性。在本例中，我们保留原样，因为它将是一个DR副本。因此，我们希望它是异步的，并且不可读。


    ![](index-142_1.jpg)


    **图6-11.** 副本选项卡


