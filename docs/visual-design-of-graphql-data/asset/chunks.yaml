- fmt: '## What Is GraphQL and Why Is Design Important?


    GraphQL is getting a lot of interest. GraphQL is a Facebook open source project
    that has its primary information site at [`http://graphql.org/`](http://graphql.org/)
    .^([⁷](#fn7))


    My interest is the relationship between GraphQL and design. That relationship
    is certainly very real. In `graphql.org`’s own words:


    > "Describe what’s possible with a type system. GraphQL APIs are organized in
    terms of types and fields, not endpoints. Access the full capabilities of your
    data from a single endpoint. GraphQL uses types to ensure apps only ask for what’s
    possible and provide clear and helpful errors. Apps can use types to avoid writing
    manual parsing code."


    The gist of GraphQL can be seen in the example in Figure [1-1](#471428_1_En_1_Chapter.xhtml#Fig1),
    from `graphql.org`.


    ![../images/471428_1_En_1_Chapter/471428_1_En_1_Fig1_HTML.jpg](images/471428_1_En_1_Chapter/471428_1_En_1_Fig1_HTML.jpg)


    Figure 1-1: GraphQL simple example


    The context of Figure [1-1](#471428_1_En_1_Chapter.xhtml#Fig1) is *Star Wars*
    metadata. And what you see to the right is actually part of a GraphQL Schema.
    What you see on the left could well be a query to the API, and the resulting set
    of data will share exactly that (data) structure.


    The open GraphQL project started in 2012 and belongs in the software architecture
    universe talked about as APIs these days. In Facebook’s own terms: “… GraphQL
    [is] a query language created by Facebook in 2012 for describing the capabilities
    and requirements of data models for client-server applications” (GraphQL on GitHub^([⁸](#fn8))).


    The `graphql.org` site does a nice job of explaining, so I will not repeat all
    of that here. Graphcool has a nice blog post called “GraphQL Server Basics: The
    Schema”,^([⁹](#fn9)) which includes a good introduction to structure and behavior
    of GraphQL. William Lyon of Neo4j ( [`http://www.neo4j.com/`](http://www.neo4j.com/)
    ^([^(10)](#fn10))) has made an excellent overview of GraphQL, which is available
    as a “refcard” from Dzone at GraphQL Refcard^([^(11)](#fn11)) (login is required).


    The best tool for getting structure and meaning right is visualization of the
    graphs. The property graph approach is very powerful for database design across
    many different data stores. And it is equally well suited for design of data-level
    APIs, as you will see in this book.


    Also notice that the most developers today only have indented bracket displays
    with “prettify” functionality available. Type completion, driven by the GraphQL
    Schema, is also available.


    ### Note


    There are a few “boxes and arrows” POC-level diagramming tools on the web. See
    for example GraphQL Voyager,^([^(12)](#fn12)) GraphQL Visualizer GraphQL Visualizer,^([^(13)](#fn13))
    or GraphQL Rover.^([^(14)](#fn14)) All of them are “after the fact” in the sense
    that they visualize from the schema definition. (And they are, to my regret, in
    the legacy boxes-and-arrows style.)


    High-quality data designs are possible only if you get the structure and the meaning
    right, and that is what this book is about.


    ## Issues with Defining Data Structures in GraphQL


    As you know, GraphQL is not a database, but it is an API of data, which is described
    in (and produced from) a set of *GraphQL schema(s).* Since so much relies on the
    schema, you need to ensure it has high quality.


    You are also looking at servers producing data from many different sources, legacy
    or new. Whatever kind of source, there may be quality issues. *Garbage in equals
    garbage out*. For that reason, GraphQL API design may take you into having to
    resolve data discovery and unification issues, such as quality, metadata, and
    business acceptance.


    The focus should always be on the application or business-facing aspects of the
    interface exposed by the GraphQL server, based on the definitions in the server-side
    schema.


    Consider these guidelines and issues for a GraphQL API:


    *   Structural mistakes (many-to-many et al.) should be avoided.

    *   Meaning must be provided and preserved in business terms—in the end, business
    people will meet the model through the tools.

    *   Uniqueness must be provided.

    *   Identity should also be nurtured, just like in a data model.

    *   The presentation of the data through the API should present (“prettify”, if
    you will) the data in business-and developer-friendly manners—including handling
    missing or bad data.

    *   The model should essentially be hierarchical, so care should be spent on nursing
    the hierarchies and their levels, just like one would do in a multidimensional
    model.

    *   In particular, the traversal of many-to-many data structures in the underlying
    data model should be carefully understood when the API structures that span such
    relationships are set up.


    The major value proposition of this book is to illustrate how issues like these
    are handled in the GraphQL environment by way of adding visualizations in the
    property graph style.


    ## Issues with Data Content in GraphQL


    Handling the garbage-in/garbage-out dilemma is a matter of:


    *   Getting to know the data better (a.k.a. data discovery)

    *   Unifying data from disparate sources (a.k.a. data unification).


    There is (too) much information about data preparation and ETL on the Internet
    and in books (including one of mine). In the GraphQL context, you should be observant
    of these 10 most important issues:


    *   Including business names in the API

    *   Providing identity and uniqueness

    *   Presenting the keys

    *   Presenting state changes

    *   Presenting versions of data

    *   Presenting dates and times

    *   Presenting relationships and missing references

    *   Determining which objects and which relationships

    *   Presenting the right level of detail

    *   Developing good relationships


    How much work is necessary on the resolver side really depends on these issues,
    most of which are partly out of your control:


    *   The quality of the data sources by themselves (structure, meaning, and content)

    *   Conflicts arising from unification of data from multiple sources (both upstream
    and down-stream)


    We will look at these issues in later chapters of this book.


    First, we need to deconstruct the GraphQL language.


