    first established in 1976 (in an early object oriented context). It soon came
    to rule the world of primary and foreign keys under the name “surrogate key”.
    It turns out that business-level keys seldom are single-level fields, unless developers
    building IT solutions define them. Think account numbers, item numbers, postal
    codes, and the like. And even if reasonably precisely defined concepts were used,
    they were not always guaranteed to stay unique over a longer period of time. Item
    numbers, for instance, could be reused over time.'
  trans: '## 6. 呈现业务流程


    ### 确立身份与唯一性


    分析函数依赖、寻找候选键的日子已离我们远去。但我们仍需处理身份与唯一性问题。由于 `GraphQL 模式` 是一个有向图，节点的身份和唯一性必须在模式层面解决。


    问题何在？麻烦在于——作为人类——我们其实并不太在意唯一性。名字又算得了什么？我们都知道 James Brown 可以指代许多人。我们使用的技巧是添加上下文，比如“是的，你知道的，那位歌手，灵魂乐教父
    James Brown”。因此，当这确实重要时，上下文是确切的答案。但如果一个节点代表一个名叫 James Brown 的人，我们会查看上下文来尝试推断我们谈论的是谁。


    幸运的是，我们处于一个连接的图（模式）中，这意味着我们应该查看其近邻环境，并从中推断身份与唯一性。


    身份在功能上源自唯一性，而唯一性设定了上下文。


    换种说法，身份实际上是属性适用范围的界定（见图 5-2）。


    ![../images/471428_1_En_5_Chapter/471428_1_En_5_Fig2_HTML.jpg](img/471428_1_En_5_Fig2_HTML.jpg)


    **图 5-2** 身份由唯一性驱动


    `接收日期` 与 `目标角色` 共享作用域，两者都由 `目标` 的身份驱动。目前，我们只需说明需要为 `目标` 建立可靠的身份。（这过去被称为“寻找主键”。）


    唯一性是识别在业务层面是什么使一个身份成为唯一的问题。


    是的，`目标` 由 `消息` 和 `地址` 的组合（无论它们的身份如何定义）唯一地定义。强制唯一性也是 API 模式设计中的一项重要任务。（以前这是“外键”的范畴。）


    没有充分的理由添加视觉图标或特殊标记，因为唯一性已由结构暗示。但我确实用粗体突出了 `地址规范`、`消息 ID` 和 `关键词`（属性），因为根据业务定义，它们是唯一的。


    总之，身份决定了属性的作用域（例如，`接收日期` 适用于 `目标`），而唯一性决定了在接口中确保唯一性的业务级标准（例如，`目标` 必须在 `地址` 和 `消息`
    的身份组合中是唯一的）。请注意，到目前为止我们谈论的是业务层面。在大多数情况下，这些问题可能已经通过数据库中由 IT 生成的“代理键”解决了。


    至少在北欧（我来自的地方），使用分配的识别号码（如社会保险号码）通常并不可取。它们无法保证始终保持唯一和持久。对我们 IT 人员来说，发明新的“自然身份”可能非常实用，对吧？多年来我们一直是推动这一趋势的人。业务人员不太反对，有时他们也能理解为什么这类键很实用。


    以下是一些在图中寻找唯一性和身份的规则：


    *   一个对象的唯一性由来自更高层级概念指向它的关系决定。

    *   因此，一个对象的身份就是引用它的那些概念的身份的组合。

    *   另一方面，属性共享它们所依赖的对象的身份，这是属性的定义标准。


    所以，使用这些简单的视觉检查方法，我们可以在业务层面推断出每个对象类型的上下文及其唯一性：


    | 对象类型 | 唯一性 |

    | --- | --- |

    | `地址` | `地址规范` |

    | `发起方` | `地址规范`, `消息 ID`, `发起方角色` |

    | `目标` | `地址规范`, `消息 ID`, `目标角色` |

    | `消息` | `消息 ID` |

    | `关键词` | `关键词 ID`, `消息 ID` |


    让我们回顾一下身份和唯一性问题：


    `唯一性` 是决定数据实例唯一性的业务级规则。通常，这是业务级“键”的组合，例如票号、线路号、员工号、邮政编码、产品号等。身份是参与类型唯一性的组合结果。例如，一个订单行，对于订单号（来自
    `订单` 类型）和订单行号（来自 `订单行` 类型）的组合是唯一的。在大多数 IT 系统中，身份通过唯一的 `ID` 字段（关系数据库中的主键）或其他类型的代理键来确保。显然，必须解决跨多个源数据库的
    `ID` 冲突。还需注意，`GraphQL API` 数据的下游需求可能对 API 交付身份和唯一性提出不同的要求。


    不匹配之处可以在解析器层修复。稍后在我们将数据库连接到 API 时再详细讨论。


    确立业务含义及其规则显然很重要。同样重要的是设计良好的方法来促进业务流程的导航，这就是我们接下来要探讨的内容。


    ### 呈现键


    为了让应用程序和业务用户能够轻松访问反映业务流程的对象和事件网络，我们需要从网络导航的角度来思考。这始于让识别变得容易的问题。


    显然，业务端许多拼接的身份组件（唯一性规则）并不实用。作为 API 设计师，我们被允许创造事物。一类可创造的事物被称为“键”。


    例如，使用大型拼接键实际上不太实用。我们更喜欢精确、简单（单变量）字段的清晰性。这最早于 1976 年确立（在一个早期的面向对象环境中）。它很快以“代理键”的名义统治了主键和外键的世界。事实证明，业务级键很少是单层字段，除非开发
    IT 解决方案的人员定义了它们。想想账号、项目编号、邮政编码之类的东西。即使使用了合理精确定义的概念，它们也不能保证在较长时间内保持唯一。例如，项目编号可能会随时间被重复使用。'
- fmt: '### Note


    There are some important scope considerations in the discussion of keys and IDs.


    Many database designs include system-generated keys of the surrogate key kind.
    These can most likely be reused as “`Xxxxxx ID`” identity fields in your API design,
    which is good. The scope of such keys are at the database-instance level, but
    the surrogate keys may well have been carried over into data warehouse tables
    and the like.


    GraphQL supports “`ID`” as a scalar type. The scope of such an `ID` field is within
    that object type within that application (server), and the `ID` is mainly for
    getting data out of the cache. They are unique within that scope, but not more
    than that.


    How will a solution-level data design of email enhanced with system-assigned keys
    look?


    Figure [6-1](#471428_1_En_6_Chapter.xhtml#Fig1) is a solution-level property graph
    and it includes an identifier (`XxxxxxxId`) for each object type. The purpose
    of the identifier is to serve as a simple, persistent, unique identifier of the
    instances of the object. (That is the nature of a surrogate key.) Note that “Message
    ID” was already in the system (by definition, in the Internet Message Format standard).


    If there is no surrogate key scheme in place, and if the data scope needs to be
    larger than the application, such as for data-level integration purposes downstream,
    then you are looking at a data architecture design issue.


    Keys can be dealt with at the resolver level. More about that later.


    ![../images/471428_1_En_6_Chapter/471428_1_En_6_Fig1_HTML.jpg](images/471428_1_En_6_Chapter/471428_1_En_6_Fig1_HTML.jpg)

    Figure 6-1

    Identities added as key fields (`ID`)


    ## Presenting State Changes


    Sometimes you have to handle state changes in the interface. Here we are talking
    about business state changes. In the financial world, for example, buy/sell transactions
    in securities are being raised up through a hierarchy that looks something like
    this:


    *   Considered

    *   Planned

    *   Agreed (done deal)

    *   Preliminarily booked

    *   Settled

    *   Finally accounted for


    (This is a bit more complex in real life.) The issue is that the same transaction
    exists in different versions throughout its lifecycle. Date and time are necessary
    to keep track of that.


    In our email example, we would probably have to materialize (in the API) whether
    the message was resent (and when).


    “Making data look pretty” is clearly something that can be done at the resolver
    level. More about that later.


    ## Presenting Versions of Data


    This brings us to versions on the data level. (And not on the metadata level,
    such as schema changes.)


    Not only in data warehouses, but certainly also in other kinds of applications,
    version control is a requirement. Generally the requirements are on the level
    of these:


    *   Which version is the current one?

    *   What is the starting point and ending point of a given version (with date
    and or time precision)?

    *   When did this version come into existence?


    Sometimes backdated corrections are necessary. It could be, for example, correcting
    a price, which was found to be wrong, at a later point in time.


    Keeping two versions depends on accounting practices and possibly also legislative
    requirements. Be sure to understand what the situation is in your context.


    If you are into versioning, you should consider chains of events. (The *next*
    event following this version of this transaction is `XXXXX` on date `YYYYMMDD`,
    for example.) Graphs are excellent for modeling and implementing that. You might
    also be interested in prior event chains. (The event that *preceded* this version
    of this transaction is `XXXXX` on date `YYYYMMDD`, for example.) See the discussion
    about resolving this in a later chapter.


    # 7. Content Matters


    ## Housekeeping Proper


    A recommended best practice is to keep order in your housekeeping—the accountant
    way, of course. Keep track of who did what and when.


    It is a good idea to keep track of things like the following for all object types:


    *   Who created this record?

    *   When was the record created?

    *   Who changed this record the last time?

    *   When was the date and time of the last change?

    *   How was this record loaded?

    *   When was the record loaded?

    *   What was the source system of the record?

    *   What are the versioning control dates (from and to)?

    *   And more…


    If such metadata is available in the data sources, I am sure that there are many
    people out there who would benefit greatly from having them available in the API.
    Some of this information may be added at the resolver level.


    ## Scalar Data Types


    When should we worry about data types?


    If you have not done so already, now is the time to think about the *API-level*
    data types. The GraphQL simple scalar types are given beforehand. Just prepare
    yourself for surprises. You want to consider precision and representation of large
    numbers needing high precision. With regard to dates and timestamps, you have
    to define your own custom types. If there are advanced business needs, you need
    to know this. Refer to the following section on handling time.


    The physical data types are not likely going to be the same, but hopefully they
    are compatible (and mappable in resolver functions). The same goes for type conversions.


    ## Presenting Dates and Times


    Date and time are some of the tough challenges in databases, and indeed also in
    GraphQL. GraphQL is a relatively new framework and it is evolving. At the time
    of writing, `Date` can be implemented as a custom scalar type (`DIY`). There are
    a number of GitHub projects developing good stuff in this area. See for example
    GraphQL ISO Date^([^(26)](#fn26)) at [`https://github.com/excitement-engineer/graphql-iso-date`](https://github.com/excitement-engineer/graphql-iso-date).


    Dates and times obey some slightly irregular international rules set for the management
    of time zones, as you know. They are not systematic in the sense that they can
    be easily derived from the value of the field.


    Time zones are indeed difficult to handle. Calendars are somewhat easier, but
    still subject to a lot of national and cultural variations. If you take a plain
    vanilla U.S. calendar from the month of February, you will notice that there are
    two special days that do not apply outside of the United States. Valentine’s Day
    is slowly finding its way into Europe, but there is no Presidents’ Day.


    If your data model is required to support global operations, you might need at
    least four variables on everything:


    *   Local date (pure)

    *   Local time (no date involved)

    *   Global date (pure)

    *   Global time (set to GMT, for example)


    See more details about resolving date and time in the resolver chapters.'
