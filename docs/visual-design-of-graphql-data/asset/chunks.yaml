  trans: '

    ### 注意


    在讨论键和 ID 时，存在一些重要的作用域考量。


    许多数据库设计包含系统生成的代理键。这些键很可能可以直接用作你 API 设计中的"Xxxxxx ID"标识字段，这是很好的。此类键的作用域位于数据库实例级别，但代理键很可能已被带入数据仓库表等结构中。


    GraphQL 支持"`ID`"作为标量类型。此类`ID`字段的作用域仅限于该应用程序（服务器）内的该对象类型，且`ID`主要用于从缓存中获取数据。它们在该作用域内是唯一的，但不会超出此范围。


    一个在解决方案级别、由系统分配键增强的电子邮件数据设计会是什么样子？


    图 6-1 是一个解决方案级别的属性图，它为每个对象类型包含了一个标识符（`XxxxxxxId`）。该标识符的目的是作为对象实例的简单、持久、唯一的标识符。（这正是代理键的特性。）请注意，"Message
    ID"已经存在于系统中（根据定义，在互联网消息格式标准中）。


    如果没有现成的代理键方案，并且数据作用域需要大于应用程序，例如为了下游的数据层面集成，那么你面对的就是一个数据架构设计问题。


    键可以在解析器层面处理。稍后会详细介绍。


    ![../images/471428_1_En_6_Chapter/471428_1_En_6_Fig1_HTML.jpg](img/471428_1_En_6_Fig1_HTML.jpg)

    图 6-1

    作为键字段（`ID`）添加的标识符


    ## 呈现状态变化


    有时你必须在接口中处理状态变化。这里我们讨论的是业务状态变化。例如，在金融界，证券交易中的买入/卖出交易会经历一个大致如下的层级状态：


    *   已考虑

    *   已计划

    *   已达成（成交）

    *   已初步记账

    *   已结算

    *   最终已入账


    （现实中可能稍微复杂一些。）问题在于同一笔交易在其生命周期中以不同的版本存在。日期和时间对于跟踪这一点是必要的。


    在我们的电子邮件示例中，我们可能需要在 API 中具体化（实现）邮件是否被重发（以及何时重发）。


    "让数据看起来更美观"显然是可以在解析器层面完成的事情。稍后会详细介绍。


    ## 呈现数据版本


    这让我们来到了数据层面的版本控制。（而不是元数据层面，例如模式变更。）


    不仅在数据仓库中，在其他类型的应用程序中，版本控制也是一个普遍的需求。通常需求包括：


    *   哪个版本是当前版本？

    *   给定版本的起点和终点是什么（精确到日期和/或时间）？

    *   这个版本是何时存在的？


    有时需要进行追溯更正。例如，可能需要在之后的时间点纠正一个被发现错误的价格。


    保留两个版本取决于会计实务，也可能取决于法规要求。务必了解你所在环境的具体情况。


    如果你涉及版本控制，应该考虑事件链。（例如，紧随此交易版本之后的*下一个*事件是日期`YYYYMMDD`上的`XXXXX`。）图非常适合对此进行建模和实现。你可能还对先前的事件链感兴趣。（例如，*先于*此交易版本的事件是日期`YYYYMMDD`上的`XXXXX`。）关于如何解决这个问题，请参阅后面章节的讨论。


    # 7. 内容至关重要


    ## 妥善的内务管理


    推荐的最佳实践是保持内务管理的条理性——当然是以会计师的方式。记录谁在什么时候做了什么。


    为所有对象类型跟踪以下信息是很好的做法：


    *   谁创建了这条记录？

    *   记录是何时创建的？

    *   谁最后一次更改了这条记录？

    *   最后一次更改的日期和时间是什么时候？

    *   这条记录是如何加载的？

    *   记录是何时加载的？

    *   记录的源系统是什么？

    *   版本控制日期是什么（起始和结束）？

    *   以及更多……


    如果此类元数据在数据源中可用，我相信很多人会受益于在 API 中提供它们。其中一些信息可以在解析器层面添加。


    ## 标量数据类型


    我们何时需要关注数据类型？


    如果你还没有考虑过，现在是思考*API 层面*数据类型的时候了。GraphQL 的简单标量类型是预先定义好的。只需为意外情况做好准备。你需要考虑需要高精度的大型数字的精度和表示形式。对于日期和时间戳，你必须定义自己的自定义类型。如果有高级业务需求，你需要了解这一点。请参阅下一节关于处理时间的内容。


    物理数据类型不太可能完全相同，但希望它们是兼容的（并且可以在解析函数中映射）。类型转换也是如此。


    ## 呈现日期和时间


    日期和时间是数据库中的一些棘手挑战，在 GraphQL 中也是如此。GraphQL 是一个相对较新的框架，并且仍在发展。在撰写本文时，`Date`可以被实现为自定义标量类型（`DIY`）。GitHub
    上有许多项目正在这个领域开发优秀成果。例如，GraphQL ISO Date^(²⁶)，网址为 [`https://github.com/excitement-engineer/graphql-iso-date`](https://github.com/excitement-engineer/graphql-iso-date)。


    如你所知，日期和时间遵循一些为时区管理制定的、稍显不规则的国际规则。它们并非系统性的，无法轻易从字段值中推导出来。


    时区确实难以处理。日历稍微容易一些，但仍然受制于许多国家和文化的差异。如果你拿一个普通的美国二月份日历，你会注意到有两个在美国以外不适用的特殊日子。情人节正逐渐进入欧洲，但没有总统日。


    如果你的数据模型需要支持全球运营，你可能需要为每个事物至少使用四个变量：


    *   本地日期（纯日期）

    *   本地时间（不涉及日期）

    *   全球日期（纯日期）

    *   全球时间（例如，设置为 GMT）


    关于在解析器中解决日期和时间问题的更多细节，请参见相关章节。

