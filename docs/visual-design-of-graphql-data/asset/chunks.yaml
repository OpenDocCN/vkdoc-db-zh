  raw: '### Problem 5: Boilerplate Overdose


    > *This is by no means an issue exclusive* *to GraphQL apps, but it’s true that
    they generally require you to write a lot of similar boilerplate code. —*Sacha
    Greif


    *   Implementing a typical GraphQL service involves writing a schema for the GraphQL
    service, a schema for the database, resolver functions to fetch the data, AND
    mutations for creating and updating data. Much of this is boilerplate code that
    can be generated by inspecting the GraphQL schema.


    *Solution: Auto-generate Query and Mutation types from GraphQL schema. See* *Figure*
    [*12-1*](#471428_1_En_12_Chapter.xhtml#Fig1) *.*


    ![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig1_HTML.png](images/471428_1_En_12_Chapter/471428_1_En_12_Fig1_HTML.png)


    Figure 12-1


    Query and Mutation types are generated automatically when using Neo4j-GraphQL


    *   We mentioned previously that resolvers are implemented automatically by inferring
    the database schema from the GraphQL schema, translating GraphQL to Cypher, and
    handling the database call. Additionally, the entry points for the GraphQL service
    (Query and Mutation types) are auto-generated as well, reducing the boilerplate
    code necessary to implement a GraphQL service backed by Neo4j. In addition, first,
    offset, filter-fields, ordering for both top-level queries and fields pointing
    to other entities are generated.


    This concludes the post by Will Lyon about the design goals of Neo4j-GraphQL.


    Let’s see it in action!


    ## Generating Your Neo4j Database from the GraphQL Schema


    Let’s use the email example, which I introduced in earlier chapters of this book,
    in Neo4j.


    To generate the Neo4j side from the GraphQL schema , you simply pass the type
    definitions from the schema to the interface by issuing a command like this in
    the Neo4j desktop:


    ```

    1   CALL graphql.idl(

    2   ''type Address {

    3     id: ID!

    4     display_name: String

    5     address_spec: String!

    6     address_from: Originator! @relation(name: "From")

    7     address_sender: Originator @relation(name: "Sender")

    8     address_reply_to: Originator @relation(name: "ReplyTo")

    9     destination_to: [Destination] @relation(name: "To")

    10     destination_cc: [Destination] @relation(name: "Cc")

    11     destination_bcc: [Destination] @relation(name: "Bcc")

    12   }


    14   type Originator {

    15     id: ID!

    16     origin_date: String!

    17     originator_role: String!

    18     message: [Message!] @relation(name: "Originator")

    19     address_from: Address! @relation(name: "From", direction:"IN")

    20     address_sender: Address @relation(name: "Sender", direction:"IN")

    21     address_reply_to: Address @relation(name: "ReplyTo", direction:"IN")

    22   }


    24   type Destination {

    25     id: ID!

    26     destination_role: String!

    27     received_date: String!

    28     message: Message! @relation(name: "Destination", direction:"IN")

    29     address_to: [Address]! @relation(name: "To", direction:"IN")

    30     address_cc: [Address] @relation(name: "Cc", direction:"IN")

    31     address_bcc: [Address] @relation(name: "Bcc", direction:"IN")

    32   }


    34   type Message {

    35     id: ID!

    36     subject: String

    37     comments: String

    38     originator: Originator! @relation(name: "Originator", direction:"IN")

    39      destinations: [Destination]! @relation(name: "HasDestination")

    40      referencing: [Message] @relation(name: "Referencing")

    41      in_reply_to: [Message] @relation(name: "InReplyTo")

    42      keywords: [Keyword] @relation(name: "Tags")

    43   }


    45   type Keyword {

    46     id: ID!

    47     keyword: String!

    48     messages: [Message] @relation(name: "Tags", direction:"IN")

    49   }

    50   '');

    ```


    Note that I have added directions to the `@relation`s, since Neo4j needs to know
    the semantics.


    In the Neo4j desktop workbench the result is the display of an internal-use only
    metadata document, which describes the GraphQL schema.


    The Neo4j-GraphQL plugin contains some useful procedures for working with GraphQL
    in Neo4j. One of the important ones is about visualizing the GraphQL schema as
    a graph data model, as shown in Figure [12-2](#471428_1_En_12_Chapter.xhtml#Fig2).


    ![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig2_HTML.jpg](images/471428_1_En_12_Chapter/471428_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    Visualizing the GraphQL schema as a graph data model


    This lets you review the structure of the physical graph model. Corrections can
    be made on the GraphQL level, and the schema can be reprocessed.


    Finally, by opening the GraphiQL GraphQL browser, we can see the GraphQL schema
    documentation. So, by now we are ready to query and mutate the data in the Neo4j
    graph database via the GraphQL API, as shown in Figure [12-3](#471428_1_En_12_Chapter.xhtml#Fig3).


    ![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig3_HTML.jpg](images/471428_1_En_12_Chapter/471428_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Using GraphiQL to query and manipulate the graph data in Neo4j


    Using a Neo4j graph database as the underlying data store gives you a head start
    on your GraphQL project. Write your schema, tell it to Neo4j, and you are ready
    to enter data and query it by way of GraphQL.


    ## Neo4j-GraphQL Resources


    A good place to start getting involved with GraphQL and Neo4j is this previously
    cited article (by Will Lyon), entitled “Using The Neo4j-GraphQL Plugin In Neo4j
    Desktop”.^([^(51)](#fn51)) It guides you through all necessary steps.


    There is a JavaScript variant of the Neo4j-GraphQL integration. The [neo4j](https://www.npmjs.com/package/neo4j-graphql-js)-graphql-js
    NPM package^([^(52)](#fn52)) is available at [`https://www.npmjs.com/package/neo4j-graphql-js`](https://www.npmjs.com/package/neo4j-graphql-js)
    . The JavaScript version of the Neo4j-GraphQL integration is designed to work
    with all JavaScript GraphQL server implementations.


    You can learn more about the neo4j-graphql and GRANDstack projects here:


    *   *GRANDstack.io*:^([^(53)](#fn53)) All things related to building applications
    using GRANDstack (GraphQL, React, Apollo, and Neo4j Database). See [`http://grandstack.io`](http://grandstack.io)
    `/`.


    *   *Neo4j and GraphQL developer page*:^([^(54)](#fn54)) Overview of ways to use
    GraphQL with Neo4j. See [`https://neo4j.com/developer/graphql/`](https://neo4j.com/developer/graphql)
    .


    *   *Using Neo4j-GraphQL Procedures*:^([^(55)](#fn55)) Interacting with the Neo4j-GraphQL
    plugin. See [`https://github.com/neo4j-graphql/neo4j-graphql#procedures`](https://github.com/neo4j-graphql/neo4j-graphql#procedures)
    .


    *   *Neo4j-GraphQL GitHub organization*:^([^(56)](#fn56)) Find the code and docs
    for Neo4j-GraphQL integrations here. See [`https://github.com/neo4j-graphql`](https://github.com/neo4j-graphql)
    .


    *   *neo4j-graphql-cli*:^([^(57)](#fn57)) A command-line tool for quickly spinning
    up a GraphQL API using Neo4j-GraphQL on Neo4j Sandbox. See [`https://www.npmjs.com/package/neo4j-graphql-cli`](https://www.npmjs.com/package/neo4j-graphql-cli)
    .


    *   *The Neo4j Slack Channel*:^([^(58)](#fn58)) A command-line tool for quickly
    spinning up a GraphQL API using Neo4j-GraphQL on Neo4j Sandbox. See [`https://www.neo4j.com/slack`](https://www.neo4j.com/slack)
    .


    Footnotes [1](#471428_1_En_12_Chapter.xhtml#Fn1_source)   [2](#471428_1_En_12_Chapter.xhtml#Fn2_source)
      [3](#471428_1_En_12_Chapter.xhtml#Fn3_source)   [4](#471428_1_En_12_Chapter.xhtml#Fn4_source)
      [5](#471428_1_En_12_Chapter.xhtml#Fn5_source)   [6](#471428_1_En_12_Chapter.xhtml#Fn6_source)
