- fmt: '## Good Relationships


    关系对于构建正确的结构至关重要。即使是简单的一对多关系，也有一些需要考虑的因素。运用概念和关系分析方法的一部分理念在于，你应该关注概念之间的链接短语（即关系箭头上的标签）。如果这些名称定义得当，结构和含义必然会更加准确。


    请查看图[8-12](#471428_1_En_8_Chapter.xhtml#Fig12)中具有命名关系的属性图。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig12_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig12_HTML.jpg)

    **图 8-12**

    命名关系


    良好、跨对象的关系基于行为动词。在此示例中，动词表示定位（`City`是`Supplier`的位置）和供应链（`Supplier`供应`SupplierPart`，而`Part`由`SupplierPart`供应）。`SupplierPart`实际上是`Suppliers`和`Parts`之间多对多关系的一个实例。名称`SupplierPart`听起来有点人为构造，不太像直接从业务术语中得来的。挑战在于我们拥有关系上的信息。`SupplierPart`携带了一个`Qty`属性（在现实中至少还包括供应日期）。图[8-13](#471428_1_En_8_Chapter.xhtml#Fig13)展示了它的多对多设计。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig13_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig13_HTML.jpg)

    **图 8-13**

    供应商零件多对多模型


    通常，事物和事件不应放在关系上。在某些（大多数）图数据库中，这是允许的。这与属性配合得很好，这些属性描述了关系的特征，例如权重、所有权百分比等。


    有人可能会争辩说，例如，所有权百分比是一个称为所有权部分的实体的属性，该实体是帮助实现所有者与财产之间多对多关系的关系型“桥接”表。这主要是一个业务决策。如果业务人员不认可所有权部分的概念，那么事情就到此为止。


    频繁（但不总是）情况下，一个“桥接物”可以被命名，并且它通常会携带信息，就像供应商-零件示例中那样。这里要小心——构造的对象类型必须有业务能够理解的、有意义的名称和定义。另一方面，如果你不使用图数据库，你将被迫（至少在
    SQL 中）具体化“桥接表”，并将关系拥有的信息放在那里。


    在图数据库源中，多对多关系完全没有问题。我们将在后面的解析器讨论中对此进行讨论。


    这对 GraphQL API 有什么影响？结果是树结构。在简单的供应商零件示例中，基本上有两种方式可以构建这棵树，如图[8-14](#471428_1_En_8_Chapter.xhtml#Fig14)所示。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig14_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig14_HTML.jpg)

    **图 8-14**

    供应商零件可能的树结构


    问题是，哪个解析器函数应该生成关于多对多关系的信息？在这个例子中是`QTY`，它可以与`Supplier`一起生成，也可以与`Part`一起生成。这在整个系统中并不是非常灵活。如果你选择在模式级别将多对多关系的`SupplierPart`具体化为自己的对象类型，你将获得最高程度的灵活性。


    对象/事件始终是节点，它们可以扮演不同的角色并改变状态。新状态是新节点吗？这取决于业务类型。有时，新状态引入了关于对象类型/事件的新信息，这种情况下需要在两种对象类型与附加属性之间做出选择。问问业务专家，他们认为什么是最自然的表示方式。


    通常，多对多关系是一个挑战，必须处理，因为 GraphQL 查询暴露的是树结构（层次化的），而没有关于关系本身的信息。


    要小心驻留在关系上的信息。你无法在 GraphQL 中做到这一点，因此你可能需要为此发明一个新的对象类型。多对多关系也是如此。在查询中遍历它们时要小心。如果模式不正确，或者数据存在冗余，你就有创建笛卡尔积和“地狱查询”的风险。这将在后面关于解析器的部分进一步讨论。


    记住：当你探索“陌生”数据时，可视化是你得力的助手。


    脚注 [1](#471428_1_En_8_Chapter.xhtml#Fn1_source)   [2](#471428_1_En_8_Chapter.xhtml#Fn2_source)
      [3](#471428_1_En_8_Chapter.xhtml#Fn3_source)   [4](#471428_1_En_8_Chapter.xhtml#Fn4_source)
      [5](#471428_1_En_8_Chapter.xhtml#Fn5_source)


    ## 9. 从图到树


    ### API 级别的结构设计


    模式定义位于服务器端。你在应用侧看到的是模式设计所暴露的结果。


    GraphQL 列表修饰符是生成结果树子分支的一种简单方法。在我们的`Email`示例中，我们有很多列表。例如，标记消息的关键字：


    ```

    keywords: [Keyword] @relation(name: "Tags")

    ```


    列表可以处理空值，这在 GraphQL 中有语法上的可视化表示：


    *   数据可以为空：`[Keyword]`

    *   数据不能为空：`[Keyword!]`

    *   列表不能为空：`[Keyword!]!`


    另一个在复杂情况下有用的 GraphQL 构造是*联合类型*。


    还记得关于联系人拥有接口与不拥有联系人作为类型的设计挑战吗？联合类型可以帮助构建一个合并的联系人列表（发起者和接收者）：


    ```

    Union Contacts = Originator | Destination

    ```


    然而，由于贡献的对象类型可能不完全兼容，你可能需要在查询中使用内联片段：


    ```

    1   {

    2     SearchResult {

    3       ... on Originator {

    4         origin_date

    5       }

    6       ... on Destination {

    7         received_date

    8       }

    8     }

    9   }

    ```


    有关更多信息，请参阅位于 [`http://graphql.org/learn/`](http://graphql.org/learn) 的 GraphQL
    文档^([^(33)](#fn33))。


    在本书的背景下，你必须记住，我们正在为 GraphQL API 中共享根查询（每个模式）的结果树构建一个范围。'
  raw: '## Good Relationships


    Relationships are key to getting the structure right. Even simple (one-to-many)
    relationships have some considerations. Part of the idea of using concepts and
    relationships analysis is that you should pay attention to *the* *linking phrase*
    between concepts (the label on the relationship arrow). If you get those names
    right, the structure and meaning are bound to be more correct.


    Look at the property graph (with named relationships) in Figure [8-12](#471428_1_En_8_Chapter.xhtml#Fig12).


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig12_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Named relationships


    Good, inter-object relationships are based on action verbs. In this example, the
    verbs represent localization (`City` is the location of `Supplier`) and supply
    chain (`Supplier` supplies `SupplierPart` and `Part` is to be supplied by `SupplierPart`).
    `SupplierPart` is really an instance of a many-to-many relationship between `Suppliers`
    and `Parts`. The name `SupplierPart` seems a bit constructed and not really coming
    straight from business terminology. The challenge is that we have information
    on the relationship. `SupplierPart` carries a `Qty` (and in reality at least a
    date of the supply). Figure [8-13](#471428_1_En_8_Chapter.xhtml#Fig13) shows it
    as a many-to-many design.


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig13_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Supplier parts many:many model


    In general, things and events should not be placed on relationships. In some (most)
    graph databases, it is permitted. This works well with properties, which characterize
    the relationship, such as weight, ownership percentage, and so on.


    One might argue that ownership percentage, for example, is a property of an entity
    called ownership part, which is a relational “bridge” table helping to implement
    a M:M relationship between owners and properties. This is mostly a business decision.
    If the business folks do not recognize the concept of an ownership part, the story
    ends there.


    Frequently (not always), a “bridging thing” can be named, and it will, most often,
    carry information, as in the supplier-parts example. Be careful here—constructed
    object types must have meaningful names and definitions, which the business can
    relate to. On the other hand, if you do not have a graph database, you are forced
    (at least in SQL) to materialize the “bridge table” and place the information
    owned by the relationship there.


    In graph database sources, M:M is perfectly fine. We discuss that in the resolver
    discussions later.


    What are the consequences for the GraphQL API? The results are tree structures.
    In the simple supplier parts example, there are basically two ways the tree can
    be constructed, as shown in Figure [8-14](#471428_1_En_8_Chapter.xhtml#Fig14).


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig14_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig14_HTML.jpg)


    Figure 8-14


    Supplier parts possible trees


    The question is, which resolver function should produce the information on the
    M:M relationship? In this case it is QTY, and it can be produced either together
    with `Supplier` or together with `Part`. That is not very flexible across the
    board. It you choose to materialize the M:M `SupplierPart` as an object type of
    its own at the schema level, you have the highest possible degree of flexibility.


    Objects/events are always nodes, which may be role-playing and state-changing.
    Are new states new nodes? It depends on the type of business. Sometimes a new
    state introduces new information about the object type/event, and in that case
    the choice is between two object types versus additional properties. Ask the business
    experts what they think is the most natural way to represent this.


    In general, M:M relationships are a challenge and must be handled, because what
    GraphQL queries expose are tree structures (hierarchical) with no information
    on the relationships as such.


    Be careful with information residing on a relationship. You cannot do that in
    GraphQL, so you may have to invent a new object type for that purpose. The same
    goes for many-to-many. Be careful when you traverse them in the queries. If the
    schema is not correct, or if the data has redundancies, you risk creating Cartesian
    products and “queries from hell”. This is further discussed under resolvers, later.


    Remember: Visualization is your competent servant when you’re exploring “strange”
    data.


