- fmt: '## Data Names


    More often than not, you will have to map the physical column and table names
    to the business facing terminology of the GraphQL types. This is annoying and
    takes some time.


    Wait! Maybe somebody has already done parts of that work? It could be in reporting
    or data warehouse contexts, and it could be SQL views and/or ETL-jobs that contain
    the mappings. Look around. I am a fan of SQL views, so if you need the mapping,
    do it in views, which are reusable. If the underlying database schema changes,
    you can, to some extent, continue to support the views’ result sets without impacting
    the GraphQL schemas. Using views may also give you a better opportunity to exploit
    “automatic mapping” between GraphQL and the source views.


    Using `SELECT *` is not a good idea, because data models do change, and they are
    typically extended with new columns and occasional changes in physical data types.
    So this is actually another good argument for using views to insulate your API
    even more from the physical data.


    ## Identity, Uniqueness, and Keys


    ### Note


    Many SQL database designs include system-generated keys of the surrogate key kind.
    These can most likely be reused as `Xxxxxx ID` identity fields in your API design,
    which is good. The scope of such keys is typically at the database instance level,
    but the surrogate keys may have been carried over into data warehouse tables and
    the like. GraphQL supports “ID” as a scalar type. The scope of such a GraphQL
    ID field is within that object type within that application (server), and the
    ID is mainly for getting data out of the cache. They are unique within that scope,
    but not more than that.


    Uniqueness in the databases is not controlled in the same way as the business-level
    uniqueness rules are defined. Typically a row in a table should be unique across
    several components in a concatenated string of business keys. The keys, in turn,
    frequently represent a hierarchy such as Customer/Order/Orderline/Product and
    more.


    Identity is the matter of what controls the uniqueness in the database. Most often
    it is a single “surrogate key” field guaranteeing the uniqueness of the orderline,
    for example. In principle, surrogate keys should not carry information other than
    the identity of the row. But that is not always the case.


    In mainstream data modeling the last 20-30 years, the use of surrogate keys is
    widespread. Clever people have added another purpose to them: The issue of identifying
    the nonexistent! (I am not going to get into a SQL `NULL`-discussion, because
    SQL `NULL`s are generally no good.) What many applications nowadays rely on is
    that the ID (the key) equaling 0 (zero, not null) is the representation of the
    nonexistent instance at the other end of the join. That means, of course, that
    there should exist a row in the database table referred to in the join, which
    has `"Id" = 0`. Those rows typically contain default values. The issue here is
    to avoid the use of SQL outer joins, which would otherwise be required. Look out
    for “zero records”. See Figure 10-2.


    ![../images/471428_1_En_10_Chapter/471428_1_En_10_Fig2_HTML.png](images/471428_1_En_10_Chapter/471428_1_En_10_Fig2_HTML.png)


    Figure 10-2: A first in class zero record


    If there is no surrogate key in a table, then the primary key must be examined.
    Often primary keys are information bearing, which is to be avoided. Even social
    security numbers and the ilk may change over time. Some item numbers may be reused
    after some time of inactivity and so forth.


    Using a GraphQL schema directive might be a good way to generate globally unique
    object identifiers, if you need to do so.


    ## States, Versions, and Housekeeping


    States (business states, for example Planned, Ordered, Delivered, and Archived)
    are not always modeled explicitly in elderly data models. They can be rather easy
    to generate by way of a SQL `CASE` construct, either in a resolver function or
    in an underlying view. Business people love them because they are looking for
    state information all the time.


    Versions are the same story, really. Ideally, most business needs can be met with
    the simple construct of three new concepts:


    *   Valid From Date (could be 1900-01-01 for unknown historic dates)

    *   Valid To Date (could be 2099-12-31 for unknown future dates)

    *   Current Version (a flag string containing “Yes” or “No” for example).


    But, if the legacy data are not persisted with versions, you will have to look
    for old versions in a data warehouse or a data vault database. If they are not
    there, you cannot satisfy that business need without further ado. If you can get
    the funding for that, you could look at time series paradigms, including key/value
    stores and graph databases for solving the persistence of versioned data.


    Other housekeeping data can include (where applicable):


    *   `UserId` of the user who created the record

    *   `CreationDate` of the record

    *   `UserId` of the user who changed this record the last time

    *   `ChangeTimeStamp` of the date and time of the last change

    *   Identification of the batch process that loaded this record

    *   `LoadTimeStamp` when the record was loaded

    *   Name of the source system of the record (if this record is not the golden
    record)

    *   And more


    Look for states, versions, and other housekeeping data in the reporting and data
    warehouse parts of your organization. Somebody may have done the hard work already.


    ## Scalar Data Types


    The type system of GraphQL is meant to be coercive, and the server will do its
    best to deliver according to the specified data type in the schema. That could
    involve truncating a floating point value to an integer value, if that is what
    it takes to stay “within the contract”. But there will still be a need for transformations
    at the resolver level. Check your data.


    Another issue is the matter of “prettifying” your data. A three-digit integer
    can be a product category code, but it must be accompanied by a textual description.
    Many users will not know the code values by heart.


    The GraphQL type system is extensible in the newest working draft of the GraphQL
    schema specification. It is going to be interesting to see how it develops in
    the next year or so.


    ## Date and Time


    IT has struggled with date and time since the 1960s.


    Let’s start at the bottom. Date and time are mixed into a variety of data types
    in many data stores and DBMS products. Some of the types can be:


    *   Pure date

    *   Date and time in one property

    *   Time in its own property


    Be careful about which server you pull the date and time information. Much depends
    on the settings of those servers and database instances.


    Another issue is handling missing dates. If you want to avoid `SQL NULL`s (and
    who doesn’t?), you could define default low and high dates, which are supplied
    whenever a date (or time-of-day) is missing. Sometimes we record future dates
    on records, which have happened now, but where the future event is still to happen
    in a couple of years’ time (budgets, for example). Not very elegant modeling,
    but it happens. You may end up having to define a “future undefined date” (a default
    high date that you choose).


    In the data warehousing world, a date/calendar dimension is a given requirement.
    But for the same reasons as the reporting and analytics need to know about calendars
    (such as public holidays or banking days), ordinary applications need to keep
    track of several properties of dates and sometimes also of time of days. Be prepared.'
  raw: '## Data Names


    More often than not, you will have to map the physical column and table names
    to the business facing terminology of the GraphQL types. This is annoying and
    takes some time.


    Wait! Maybe somebody has already done parts of that work? It could be in reporting
    or data warehouse contexts, and it could be SQL views and/or ETL-jobs that contain
    the mappings. Look around. I am a fan of SQL views, so if you need the mapping,
    do it in views, which are reusable. If the underlying database schema changes,
    you can, to some extent, continue to support the views’ result sets without impacting
    the GraphQL schemas. Using views may also give you a better opportunity to exploit
    “automatic mapping” between GraphQL and the source views.


    Using `Select *` is not a good idea, because data models do change, and they are
    typically extended with new columns and occasional changes in physical data types.
    So this is actually another good argument for using views to insulate your API
    even more from the physical data.


    ## Identity, Uniqueness, and Keys


    ### Note


    Many SQL database designs include system-generated keys of the surrogate key kind.
    These can most likely be reused as `Xxxxxx ID` identity fields in your API design,
    which is good. The scope of such keys is typically at the database instance level,
    but the surrogate keys may have been carried over into data warehouse tables and
    the like. GraphQL supports “ID” as a scalar type. The scope of such a GraphQL
    ID field is within that object type within that application (server), and the
    ID is mainly for getting data out of the cache. They are unique within that scope,
    but not more than that.


    Uniqueness in the databases is not controlled in the same way as the business-level
    uniqueness rules are defined. Typically a row in a table should be unique across
    several components in a concatenated string of business keys. The keys, in turn,
    frequently represent a hierarchy such as Customer/Order/Orderline/Product and
    more.


    Identity is the matter of what controls the uniqueness in the database. Most often
    it is a single “surrogate key” field guaranteeing the uniqueness of the orderline,
    for example. In principle, surrogate keys should not carry information other than
    the identity of the row. But that is not always the case.


    In mainstream data modeling the last 20-30 years, the use of surrogate keys is
    widespread. Clever people have added another purpose to them: The issue of identifying
    the nonexistent! (I am not going to get into a SQL `NULL`-discussion, because
    SQL `NULL`s are generally no good.) What many applications nowadays rely on is
    that the ID (the key) equaling 0 (zero, not null) is the representation of the
    nonexistent instance at the other end of the join. That means, of course, that
    there should exist a row in the database table referred to in the join, which
    has `"Id" = 0`. Those rows typically contain default values. The issue here is
    to avoid the use of SQL outer joins, which would otherwise be required. Look out
    for “zero records”. See Figure [10-2](#471428_1_En_10_Chapter.xhtml#Fig2).


    ![../images/471428_1_En_10_Chapter/471428_1_En_10_Fig2_HTML.png](images/471428_1_En_10_Chapter/471428_1_En_10_Fig2_HTML.png)


    Figure 10-2


    A first in class zero record


    If there is no surrogate key in a table, then the primary key must be examined.
    Often primary keys are information bearing, which is to be avoided. Even social
    security numbers and the ilk may change over time. Some item numbers may be reused
    after some time of inactivity and so forth.


    Using a GraphQL schema directive might be a good way to generate globally unique
    object identifiers, if you need to do so.


    ## States, Versions, and Housekeeping


    States (business states, for example Planned, Ordered, Delivered, and Archived)
    are not always modeled explicitly in elderly data models . They can be rather
    easy to generate by way of a SQL `CASE` construct, either in a resolver function
    or in an underlying view. Business people love them because they are looking for
    state information all the time.


    Versions are the same story, really. Ideally, most business needs can be met with
    the simple construct of three new concepts:


    *   Valid From Date (could be 1900-01-01 for unknown historic dates)


    *   Valid To Date (could be 2099-12-31 for unknown future dates)


    *   Current Version (a flag string containing “Yes” or “No” for example).


    But, if the legacy data are not persisted with versions, you will have to look
    for old versions in a data warehouse or a data vault database. If they are not
    there, you cannot satisfy that business need without further ado. If you can get
    the funding for that, you could look at time series paradigms, including key/value
    stores and graph databases for solving the persistence of versioned data.


    Other housekeeping data can include (where applicable):


    *   `UserId` of the user who created the record


    *   `CreationDate` of the record


    *   `UserId` of the user who changed this record the last time


    *   `ChangeTimeStamp` of the date and time of the last change


    *   Identification of the batch process that loaded this record


    *   `LoadTimeStamp` when the record was loaded


    *   Name of the source system of the record (if this record is not the golden
    record)


    *   And more


    Look for states, versions, and other housekeeping data in the reporting and data
    warehouse parts of your organization. Somebody may have done the hard work already.


    ## Scalar Data Types


    The type system of GraphQL is meant to be coercive, and the server will do its
    best to deliver according to the specified data type in the schema. That could
    involve truncating a floating point value to an integer value, if that is what
    it takes to stay “within the contract”. But there will still be a need for transformations
    at the resolver level. Check your data.


    Another issue is the matter of “prettifying” your data. A three-digit integer
    can be a product category code, but it must be accompanied by a textual description.
    Many users will not know the code values by heart.


    The GraphQL type system is extensible in the newest working draft of the GraphQL
    schema specification. It is going to be interesting to see how it develops in
    the next year or so.


    ## Date and Time


    IT has struggled with date and time since the 1960s.


    Let’s start at the bottom. Date and time are mixed into a variety of data types
    in many data stores and DBMS products. Some of the types can be:


    *   Pure date


    *   Date and time in one property


    *   Time in its own property


    Be careful about which server you pull the date and time information. Much depends
    on the settings of those servers and database instances.


    Another issue is handling missing dates. If you want to avoid `SQL_NULLs` (and
    who doesn’t?), you could define default low and high dates, which are supplied
    whenever a date (or time-of-day) is missing. Sometimes we record future dates
    on records, which have happened now, but where the future event is still to happen
    in a couple of years’ time (budgets, for example). Not very elegant modeling,
    but it happens. You may end up having to define a “future undefined date” (a default
    high date that you choose).


    In the data warehousing world, a date/calendar dimension is a given requirement.
    But for the same reasons as the reporting and analytics need to know about calendars
    (such as public holidays or banking days), ordinary applications need to keep
    track of several properties of dates and sometimes also of time of days. Be prepared.'
  trans: '

    ## 数据名称


    通常，你需要将物理列名和表名映射到 GraphQL 类型的业务术语。这很烦人，也很耗时。


    等等！也许有人已经完成了部分工作？它可能存在于报表或数据仓库的上下文中，可能就是包含映射关系的 SQL 视图和/或 ETL 作业。找找看。我是个 SQL 视图的粉丝，所以如果你需要映射，就在视图中完成，这样可以复用。如果底层数据库模式发生变化，你可以在一定程度上继续支持视图的结果集，而不影响
    GraphQL 模式。使用视图也可能为你提供更好的机会，来利用 GraphQL 和源视图之间的“自动映射”。


    使用`SELECT *`不是一个好主意，因为数据模型确实会变化，它们通常会扩展新的列，偶尔也会改变物理数据类型。所以这实际上是支持使用视图的又一个充分理由，可以让你的
    API 更好地与物理数据隔离。


    ## 标识、唯一性与键


    ### 注意


    许多 SQL 数据库设计包含了系统生成的代理键。这些键很可能可以作为你 API 设计中的`Xxxxxx ID`标识字段被复用，这很好。此类键的作用域通常在数据库实例级别，但代理键可能已被带入数据仓库表等。GraphQL
    支持“ID”作为标量类型。这种 GraphQL ID 字段的作用域是在该应用程序（服务器）内的那个对象类型中，并且 ID 主要用于从缓存中获取数据。它们在该作用域内是唯一的，但也就仅此而已。


    数据库中的唯一性控制方式与业务级别的唯一性规则定义方式不同。通常，表中的一行记录应在多个业务键组成的连接字符串中唯一。而这些键又经常代表一种层次结构，例如客户/订单/订单行/产品等等。


    标识是控制数据库中唯一性的事物。最常见的是一个单一的“代理键”字段来保证唯一性，例如保证订单行的唯一性。原则上，代理键不应携带除行标识之外的信息。但情况并非总是如此。


    在过去 20-30 年的主流数据建模中，代理键的使用非常广泛。聪明的人们给它们增加了另一个用途：标识不存在的实体！（我不会深入探讨 SQL `NULL`，因为
    SQL `NULL`通常没什么好处。）如今许多应用程序依赖的是，ID（键）等于 0（零，非空）代表连接另一端的不存在实例。这当然意味着，在连接引用的数据库表中，应该存在一行`"Id"
    = 0`的记录。这些行通常包含默认值。这里的问题是避免使用 SQL 外连接，否则就需要用到外连接。留意“零记录”。参见图 10-2。


    ![../images/471428_1_En_10_Chapter/471428_1_En_10_Fig2_HTML.png](img/471428_1_En_10_Fig2_HTML.png)


    图 10-2：一个典型的零记录示例


    如果表中没有代理键，那么就必须检查主键。通常主键是包含信息的，这是应避免的。即使是社会安全号码之类的信息也可能随时间变化。某些项目编号可能在一段闲置期后被重新使用，等等。


    如果你需要生成全局唯一的对象标识符，使用 GraphQL 模式指令可能是个好方法。


    ## 状态、版本与管理数据


    状态（例如：计划中、已订购、已交付、已归档）在旧的数据模型中并不总是被显式建模。它们可以通过 SQL `CASE`结构轻松生成，无论是在解析器函数中还是在底层视图中。业务人员喜欢它们，因为他们一直在寻找状态信息。


    版本问题其实也一样。理想情况下，大多数业务需求可以通过三个新概念的简单结构来满足：


    *   生效日期（对于未知的历史日期，可以是 1900-01-01）

    *   失效日期（对于未知的未来日期，可以是 2099-12-31）

    *   当前版本（一个标志字符串，例如包含“是”或“否”）


    但是，如果遗留数据没有以版本形式持久化，你就必须到数据仓库或数据保险库数据库中寻找旧版本。如果它们不在那里，你就无法轻易满足该业务需求。如果你能为此获得资金，你可以研究时间序列范式，包括用于解决版本化数据持久化的键/值存储和图数据库。


    其他管理数据可以包括（如适用）：


    *   `UserId`：创建该记录的用户

    *   `CreationDate`：记录的创建日期

    *   `UserId`：上次更改此记录的用户

    *   `ChangeTimeStamp`：上次更改的日期和时间

    *   批处理标识：加载此记录的批处理

    *   `LoadTimeStamp`：记录加载的时间戳

    *   源系统名称（如果此记录不是黄金记录）

    *   以及其他信息


    在你所在组织的报表和数据仓库部分中寻找状态、版本和其他管理数据。可能有人已经完成了这项艰苦的工作。


    ## 标量数据类型


    GraphQL 的类型系统旨在具有强制性，服务器将尽最大努力按照模式中指定的数据类型提供数据。这可能涉及将浮点值截断为整数值，如果这是保持“符合契约”所必需的。但在解析器层面仍然需要进行转换。检查你的数据。


    另一个问题是“美化”你的数据。一个三位数的整数可能是一个产品类别代码，但它必须伴随一个文本描述。许多用户不会记住代码值。


    GraphQL 类型系统在最新的 GraphQL 模式规范工作草案中是可扩展的。观察它在未来一年左右的发展会很有趣。


    ## 日期与时间


    自 20 世纪 60 年代以来，IT 领域一直在与日期和时间作斗争。


    让我们从基础开始。在许多数据存储和 DBMS 产品中，日期和时间被混合到各种数据类型中。有些类型可能是：


    *   纯日期

    *   日期和时间在一个属性中

    *   时间在其自己的属性中


    注意你从哪个服务器获取日期和时间信息。这在很大程度上取决于这些服务器和数据库实例的设置。


    另一个问题是处理缺失日期。如果你想避免`SQL NULL`（谁不想呢？），你可以定义默认的最小和最大日期，在日期（或时间）缺失时提供。有时我们在记录中记录未来日期，这些事件现在已经发生，但相关的未来事件将在几年后才发生（例如预算）。这不是非常优雅的建模，但它确实会发生。你最终可能不得不定义一个“未来未定日期”（一个你选择的默认最大日期）。


    在数据仓库领域，日期/日历维度是给定的需求。但出于与报表和分析需要了解日历（例如公共假日或银行工作日）相同的原因，普通应用程序也需要跟踪日期的几个属性，有时还包括时间。请做好准备。

    '
- fmt: '## Naming Relationships


    正如本书前面指出的，关系名称对于传达数据结构的含义非常重要。因此，在 GraphQL Schema 层面，我建议你使用 Graphcool 的`@relation`指令来传达这些结构信息。


    在解析器层面，你的任务是弄清楚如何执行一个满足关系的连接（join）。这可能是一个外键约束（如果你幸运的话）。它也可能是两个不同表中具有相同名称的两个列。或者，它可以从目标表（一个或多个列）的索推断出来。再或者，你必须知道或者使用数据剖析来发现数据中的表间依赖关系。


    ## Relationship Types


    ### One-to-One Relationships


    这些关系有时是 one-to-none，有时是 one-to-one。对于第一种情况，解析器应处理缺失实例的默认属性。通常，将两者分开有良好的业务原因，如果解析器能够产生这种效果，那么这就是你必须做的。


    ### One/Zero to Zero/Many Relationships


    同样，如果关系为空（例如，一个没有订单的客户），树就到此为止。我认为使用“Not Available”而不是 nothing (a null) 可能更好。


    ### Many-to-Many Relationships


    这正是你需要一个大缓存的地方。你必须复制冗余信息，以维持结果集的树结构。回想一下供应商/零件的例子，如图`10-3`所示。


    ![`../images/471428_1_En_10_Chapter/471428_1_En_10_Fig3_HTML.jpg`](images/471428_1_En_10_Chapter/471428_1_En_10_Fig3_HTML.jpg)


    `Figure 10-3`


    供应商/零件多对多模型


    这对 GraphQL API 有什么影响？结果是树结构。在简单的供应商零件示例中，基本上有两种构建树的方式，如图`10-4`所示。


    ![`../images/471428_1_En_10_Chapter/471428_1_En_10_Fig4_HTML.jpg`](images/471428_1_En_10_Chapter/471428_1_En_10_Fig4_HTML.jpg)


    `Figure 10-4`


    供应商零件可能的树


    问题是，哪个解析器函数应该生成关于 M:M 关系的信息？


    在这个例子中是`QTY`，它可以和`Supplier`一起生成，也可以和`Part`一起生成。这在整个系统中并不十分灵活。如果你选择在模式层面将 M:M 的`SupplierPart`具体化为它自己的对象类型，你就拥有了最高程度的灵活性。


    ## Missing Information


    处理缺失信息近乎是业务规则驱动的。我通常倾向于在源数据模型之上的功能层（如解析器函数）中处理此类事情。解析器需要解析缺失信息。


    在这一层面，问题应以符合平台能力的方式处理。


    但在面向业务的（API）一侧，我更喜欢默认值方案，而不是使用 NULL。关于这一点有很多文章，尤其是来自 Kimball Group 的。基本要点如下：


    *   保留“虚拟”记录，并让它们参与层次结构和其他连接。（如果你在未知级别上报告数字，你将在聚合中需要`Unknown`实例。）

    *   对于缺失信息，至少使用 Unknown 或 Not Specified 方法。

    *   对于缺失日期，使用默认的低值和高值日期。

    *   等等。


    ## Properties on Relationships


    这在 SQL 中不被支持。最接近的是一个辅助/桥接表，它也应该在 GraphQL 层面具体化为一个类型。


    Footnotes [1](#471428_1_En_10_Chapter.xhtml#Fn1_source)   [2](#471428_1_En_10_Chapter.xhtml#Fn2_source)


    # 11. Using GraphQL with an Existing Graph Database


    既然 GraphQL 基于图思维，我们如何能在图数据库之上使用 GraphQL？这当然是一个相关的问题。为了回答这个问题，我们首先看一个用例，即从一个 GraphQL
    API 支持一个现有的图数据库。之后，我们看一个常见的用例，即 GraphQL API 将与一个新的图数据库一起使用。


    由于转换是基于 DBMS 的语言，我使用 Neo4j^([^(36)](#fn36)) 图平台的语言（参见[`https://neo4j.com/`](https://neo4j.com/)）。它被称为
    Cypher，是一种非常强大的声明性语言。虽然 Neo4j 使用 Cypher，但该语言已通过 openCypher 项目开源，现在有许多其他项目也使用 Cypher^([^(37)](#fn37))（参见[`http://www.opencypher.org/`](http://www.opencypher.org/)）。


    ## The Neo4j GraphQL Plugin


    Neo4j 在将 GraphQL 集成到 Neo4j 平方方面做得非常出色。最简单的使用方法是在 Neo4j Desktop 界面中安装一个插件。


    Neo4j 开发者关系部门的 Will Lyon 制作了一个出色的视频来解释一切。它被称为“Using The Neo4j-GraphQL Plugin With
    Neo4j Desktop”^([^(38)](#fn38))（参见[`https://youtu.be/J-J90uwugb4`](https://youtu.be/J-J90uwugb4)）。


    基本上，该插件使你能够直接从 Neo4j 提供 GraphQL 端点，通过：


    *   从现有的 Neo4j 数据生成 GraphQL 模式

    *   基于你提供的 GraphQL 模式提供 GraphQL 端点

    *   将 GraphQL 实时翻译为 Cypher

    *   自动生成用于 GraphQL 查询的查询类型

    *   自动生成用于 GraphQL 写入操作的变更类型

    *   通过 GraphQL 作为`@cypher`模式指令暴露 Cypher


    你也可以在 Will Lyon 的博客文章“[Using The Neo4j](https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9)-GraphQL
    Plugin In Neo4j Desktop”^([^(39)](#fn39))（参见[`https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9`](https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9)）中找到有关该插件的更多信息。'
  raw: '## Naming Relationships


    As pointed out earlier in this book, the relationship names are important for
    conveying the meaning of the structure of the data. So, at the GraphQL Schema
    level, I recommend that you use the Graphcool `@relation` directive to convey
    that structural information.


    At the resolver level, you have the job of figuring out how to do a join that
    satisfies the relationship. This could be a foreign key constraint (if you are
    lucky). It could also be two columns in two distinct tables with the same name.
    Or it could be inferred from an index on the target table (one or more columns).
    Or, you just either have to know or you have to use data profiling to find inter-table
    dependencies in the data.


    ## Relationship Types


    ### One-to-One Relationships


    These are sometimes one-to-none relationships and sometimes one-to-one. In the
    first case, the default properties of the missing instance should be handled by
    the resolver. There are normally good business reasons for maintaining the divide
    between the two, and if the resolver can produce that, then that is what you must
    do.


    ### One/Zero to Zero/Many Relationships


    Again, if the relationship is empty (for example, a customer without orders),
    the tree stops here. I think it might be prettier to stop with “Not available”
    instead of nothing (a null).


    ### Many-to-Many Relationships


    This is where you need a large cache . You have to duplicate redundant information
    such that the tree structure of the result set is maintained. Recall the supplier/parts,
    as shown in Figure [10-3](#471428_1_En_10_Chapter.xhtml#Fig3).


    ![../images/471428_1_En_10_Chapter/471428_1_En_10_Fig3_HTML.jpg](images/471428_1_En_10_Chapter/471428_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Supplier/parts many:many model


    What are the consequences for the GraphQL API? The results are tree structures.
    In the simple supplier parts example, there are basically two ways the tree can
    be constructed, as shown in Figure [10-4](#471428_1_En_10_Chapter.xhtml#Fig4).


    ![../images/471428_1_En_10_Chapter/471428_1_En_10_Fig4_HTML.jpg](images/471428_1_En_10_Chapter/471428_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Supplier parts possible trees


    The question is, which resolver function should produce the information on the
    M:M relationship?


    In this case it is `QTY`, and it can be produced together with `Supplier` or together
    with `Part`. That is not very flexible across the board. If you choose to materialize
    the M:M `SupplierPart` as an object type of its own at the schema level, you have
    the highest possible degree of flexibility.


    ## Missing Information


    Handling missing information things is close to being business rules driven. I
    generally prefer to treat such things in a functional layer (like a resolver function)
    on top of the source data model. The resolvers need to resolve the missing information.


    At this level, the matters should be handled in a way that matches the capabilities
    of the platform.


    But on the business facing (API) side, I prefer default value schemes over using
    NULLs. There are many articles about this, not the least from the Kimball Group.
    Basic stuff like the following:


    *   Keep “dummy” records available and let them participate in hierarchies and
    other joins. (If you report numbers on unknown levels, you will need the `Unknown`
    instance in your aggregate.)


    *   Use at least the Unknown or Not Specified approach for missing information.


    *   Use default low and high dates for missing dates.


    *   Etc.


    ## Properties on Relationships


    This is not supported in SQL. The closest thing is a helper/bridge table, which
    should also materialize as a type on the GraphQL level.


    Footnotes [1](#471428_1_En_10_Chapter.xhtml#Fn1_source)   [2](#471428_1_En_10_Chapter.xhtml#Fn2_source)


    # 11. Using GraphQL with an Existing Graph Database


    It is of course a relevant question to ask that, since GraphQL is based on graph
    thinking, how can we use GraphQL on top of a graph database? To answer that, we
    first look at the use case in which an existing graph database is supported from
    a GraphQL API. Later we look at a common use case, whereby a GraphQL API will
    be used with a new graph database.


    Since transformations are based on the language of the DBMS, I use the language
    of the Neo4j^([^(36)](#fn36)) graph platform (see [`https://neo4j.com/`](https://neo4j.com/)
    ). It is called Cypher, and it is a very powerful, declarative language. While
    Neo4j uses Cypher, the language has been open sourced through the openCypher project
    and there are now a number of other projects using Cypher^([^(37)](#fn37)) (see
    [`http://www.opencypher.org/`](http://www.opencypher.org/) ).


    ## The Neo4j GraphQL Plugin


    Neo4j has done a great job of integrating GraphQL into the Neo4j platform. The
    easiest way to use it is to use a plugin installed in the Neo4j Desktop interface.


    Will Lyon (working in developer relations at Neo4j) has made an excellent video
    explaining everything. It’s called “Using The Neo4j-GraphQL Plugin With Neo4j
    Desktop”^([^(38)](#fn38)) (see [`https://youtu.be/J-J90uwugb4`](https://youtu.be/J-J90uwugb4)
    ).


    Basically the plugin enables you to serve a GraphQL endpoint directly from Neo4j
    by:


    *   Generating a GraphQL schema from existing Neo4j data


    *   Serving a GraphQL endpoint based on a GraphQL schema that you supply


    *   Translating GraphQL to Cypher (on the fly)


    *   Automatically generating query types for querying with GraphQL


    *   Automatically generating mutation types for write operations from GraphQL


    *   Exposing Cypher through GraphQL as a `@cypher` schema directive


    You can also find more information about the plugin in Will Lyon’s blog post called
    “[Using The Neo4j](https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9)-GraphQL
    Plugin In Neo4j Desktop”^([^(39)](#fn39)) (see [`https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9`](https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9)
    ).'
  trans: '## 命名关系


    正如本书前面指出的，关系名称对于传达数据结构的含义非常重要。因此，在 GraphQL Schema 层面，我建议你使用 Graphcool 的`@relation`指令来传达这些结构信息。


    在解析器层面，你的任务是弄清楚如何执行一个满足关系的连接。这可能是一个外键约束（如果你幸运的话）。它也可能是两个不同表中具有相同名称的两个列。或者，它可以从目标表（一个或多个列）的索引推断出来。再或者，你必须知道或者使用数据剖析来发现数据中的表间依赖关系。


    ## 关系类型


    ### 一对一关系


    这些关系有时是 one-to-none，有时是 one-to-one。对于第一种情况，解析器应处理缺失实例的默认属性。通常，将两者分开有良好的业务原因，如果解析器能够产生这种效果，那么这就是你必须做的。


    ### 一/零 对 零/多关系


    同样，如果关系为空（例如，一个没有订单的客户），树就到此为止。我认为使用“Not Available”而不是 nothing (a null) 可能更好。


    ### 多对多关系


    这正是你需要一个大缓存的地方。你必须复制冗余信息，以维持结果集的树结构。回想一下供应商/零件的例子，如图`10-3`所示。


    ![`../images/471428_1_En_10_Chapter/471428_1_En_10_Fig3_HTML.jpg`](img/471428_1_En_10_Fig3_HTML.jpg)


    `图 10-3`


    供应商/零件多对多模型


    这对 GraphQL API 有什么影响？结果是树结构。在简单的供应商零件示例中，基本上有两种构建树的方式，如图`10-4`所示。


    ![`../images/471428_1_En_10_Chapter/471428_1_En_10_Fig4_HTML.jpg`](img/471428_1_En_10_Fig4_HTML.jpg)


    `图 10-4`


    供应商零件可能的树


    问题是，哪个解析器函数应该生成关于 M:M 关系的信息？


    在这个例子中是`QTY`，它可以和`Supplier`一起生成，也可以和`Part`一起生成。这在整个系统中并不十分灵活。如果你选择在模式层面将 M:M 的`SupplierPart`具体化为它自己的对象类型，你就拥有了最高程度的灵活性。


    ## 缺失信息


    处理缺失信息近乎是业务规则驱动的。我通常倾向于在源数据模型之上的功能层（如解析器函数）中处理此类事情。解析器需要解析缺失信息。


    在这一层面，问题应以符合平台能力的方式处理。


    但在面向业务的（API）一侧，我更喜欢默认值方案，而不是使用 NULL。关于这一点有很多文章，尤其是来自 Kimball Group 的。基本要点如下：


    *   保留“虚拟”记录，并让它们参与层次结构和其他连接。（如果你在未知级别上报告数字，你将在聚合中需要`Unknown`实例。）

    *   对于缺失信息，至少使用 Unknown 或 Not Specified 方法。

    *   对于缺失日期，使用默认的低值和高值日期。

    *   等等。


    ## 关系上的属性


    这在 SQL 中不被支持。最接近的是一个辅助/桥接表，它也应该在 GraphQL 层面具体化为一个类型。


    脚注 1   2


    # 11. 将 GraphQL 与现有图数据库结合使用


    既然 GraphQL 基于图思维，我们如何能在图数据库之上使用 GraphQL？这当然是一个相关的问题。为了回答这个问题，我们首先看一个用例，即从一个 GraphQL
    API 支持一个现有的图数据库。之后，我们看一个常见的用例，即 GraphQL API 将与一个新的图数据库一起使用。


    由于转换是基于 DBMS 的语言，我使用 Neo4j^(³⁶) 图平台的语言（参见[`https://neo4j.com/`](https://neo4j.com/)）。它被称为
    Cypher，是一种非常强大的声明性语言。虽然 Neo4j 使用 Cypher，但该语言已通过 openCypher 项目开源，现在有许多其他项目也使用 Cypher^(³⁷)（参见[`http://www.opencypher.org/`](http://www.opencypher.org/)）。


    ## Neo4j GraphQL 插件


    Neo4j 在将 GraphQL 集成到 Neo4j 平方方面做得非常出色。最简单的使用方法是在 Neo4j Desktop 界面中安装一个插件。


    Neo4j 开发者关系部门的 Will Lyon 制作了一个出色的视频来解释一切。它被称为“Using The Neo4j-GraphQL Plugin With
    Neo4j Desktop”^(³⁸)（参见[`https://youtu.be/J-J90uwugb4`](https://youtu.be/J-J90uwugb4)）。


    基本上，该插件使你能够直接从 Neo4j 提供 GraphQL 端点，通过：


    *   从现有的 Neo4j 数据生成 GraphQL 模式

    *   基于你提供的 GraphQL 模式提供 GraphQL 端点

    *   将 GraphQL 实时翻译为 Cypher

    *   自动生成用于 GraphQL 查询的查询类型

    *   自动生成用于 GraphQL 写入操作的变更类型

    *   通过 GraphQL 作为`@cypher`模式指令暴露 Cypher


    你也可以在 Will Lyon 的博客文章“[Using The Neo4j](https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9)-GraphQL
    Plugin In Neo4j Desktop”^(³⁹)（参见[`https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9`](https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9)）中找到有关该插件的更多信息。'
- fmt: "## Generating Your First GraphQL Schema\n\nIt really is very simple. You install\
    \ the plugin from the Neo4j Desktop, as shown in Figure 11-1.\n\n![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig1_HTML.jpg](images/471428_1_En_11_Chapter/471428_1_En_11_Fig1_HTML.jpg)\n\
    \n**Figure 11-1:** Plugin installation from the Neo4j Desktop\n\nHaving installed\
    \ the plugin, you will want to install the Electron version of the GraphiQL app^([^(40)](#fn40))\
    \ for browsing and testing. Refer to the video and the blog post for details about\
    \ setting up the endpoint and authorization headers to make the connection (not\
    \ a big deal).\n\nTo generate the schema from the data in the Neo4j database,\
    \ issue this command to the Neo4j Desktop:\n\n```graphql\nCALL graphql.idl(null);\n\
    ```\n\nYou may have to transform the existing data to make it fit for presentation\
    \ through GraphQL. This depends on the quality of the data and likewise of the\
    \ metadata (labels, property names, and relationship types). In the following\
    \ sections, we will go through the potential issues. If you need to do transformations,\
    \ it is nice to know that the Neo4j-GraphQL integration includes an `@cypher`\
    \ directive, which enables you to do some graphical things inside the GraphQL\
    \ schema. Take a look at this example having embedded `@cypher` statements as\
    \ well as type extensions:\n\n```graphql\ntype Movie {\n    title: ID!\n    released:\
    \ Int\n    tagline: String\n    actors: [Person] @relation(name:\"ACTED_IN\",\
    \ direction:IN)\n    director: Person @relation(name:\"DIRECTED\", direction:IN)\n\
    \    recommendation(first:Int = 3): [Movie]\n      @cypher(statement:\n      \
    \  \"MATCH (this)-[:ACTED_IN]->()-[:ACTED_IN]-(reco:Movie)\n         WHERE this\
    \ <> reco\n         RETURN DISTINCT reco LIMIT {first}\")\n}\nschema {\n   mutations:\
    \ Mutations\n}\n```\n\nNote that fields annotated with the `@cypher` schema directive\
    \ then become “computed” fields. This technique allows for some transformation\
    \ between how the data is stored in Neo4j and how it is presented in the GraphQL\
    \ layer.\n\nThe video and the blog post cited in this chapter cover the how-tos\
    \ of using GraphQL on top of an existing graph database, as well as on top of\
    \ a blank graph database, which is the last subject of this book.\n\nLet’s recast\
    \ the legacy SQL issues and see how they apply in the context of an existing Neo4j\
    \ database.\n\n## Data Names\n\nThe Neo4j-GraphQL plugin will derive a GraphQL\
    \ schema from the existing graph data. By way of sampling, the integration adds\
    \ a type for each `Node-Label` with all the properties and their types found as\
    \ fields.\n\nThis gives you a much better starting point than a blank slate. However,\
    \ much depends on the quality of the existing data model, of course. So, being\
    \ a bit cynical, you should expect to spend some time on mapping not-so-good names\
    \ to something business facing. The mapping will be done by way of editing the\
    \ generated GraphQL schema, e.g., `@cypher` extensions. Just as with SQL, you\
    \ may spend time here, but the time spent should be less than what would need\
    \ to be done in SQL. Some SQL databases that I have seen almost needed an archeologist\
    \ in order to establish data identities.\n\n## Identity, Uniqueness, and Keys\n\
    \nNeo4j can live without constraints , but you can also have them. Data profiling^([^(41)](#fn41))\
    \ (see [`https://neo4j.com/blog/data-profiling-holistic-view-neo4j/`](https://neo4j.com/blog/data-profiling-holistic-view-neo4j/)\
    \ ) is rather easy, and you should spend some time double-checking candidate keys.\
    \ So, just as with SQL, you may have to spend some time here.\n\nThe Neo4j node\
    \ ID is internal use only. Don’t use internal Neo4j IDs for long-term entity identification.\
    \ Future versions of Neo4j might shift these IDs around for performance purposes.\
    \ Create your own unique ID property (ideally with a constraint) for tracking\
    \ entities.\n\n## States, Versions, and Housekeeping\n\nAs with SQL, you might\
    \ want to spend some time here. One benefit, though: Neo4j is schema-free, so\
    \ refactoring the database is much easier than in SQL.\n\n## Scalar Data Types\n\
    \nNeo4j does not have explicit types , but the Neo4j-GraphQL is coercive, and\
    \ the proper types will be transmitted by default in most cases. Type conversion\
    \ functions are available, though. There might be issues with string-encoded information,\
    \ which should be something else (a float, for example). This may take some time\
    \ to identify and fix.\n\n## Date and Time\n\nNeo4j does not have any date and\
    \ time types per se. However, in Neo4j 3.x, APOC procedure support was added,\
    \ including procedures for date/time support^([^(42)](#fn42)) (see [`https://neo4j-contrib.github.io/neo4j-apoc-procedures/#_date_and_time_conversions`](https://neo4j-contrib.github.io/neo4j-apoc-procedures/#_date_and_time_conversions)\
    \ ). This enables you to handle most conversions from Cypher commands.\n\nSupport\
    \ of temporal functions in Cypher per se arrived in release 3.4.\n\nGraphAware\
    \ has a library called TimeTree^([^(43)](#fn43)), which looks interesting, as\
    \ shown in Figure 11-2. See [`https://graphaware.com/neo4j/2014/08/20/graphaware-neo4j-timetree.html`](https://graphaware.com/neo4j/2014/08/20/graphaware-neo4j-timetree.html)\
    \ .\n\n![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig2_HTML.jpg](images/471428_1_En_11_Chapter/471428_1_En_11_Fig2_HTML.jpg)\n\
    \n**Figure 11-2:** TimeTree from GraphAware\n\n## Naming Relationships\n\nThe\
    \ Neo4j-GraphQL plugin^([^(44)](#fn44)) will generate GraphQL schema code using\
    \ the `@relation` directive. It looks like this for the `ACTED_IN` relationship\
    \ in the `Movie` database:\n\n```graphql\ntype Person { name: String, movies :\
    \ Movie @relation(name:\"ACTED_IN\", direction:OUT) }\n```\n\nAs you can see,\
    \ the Neo4j-GraphQL plugin uses the `@relation` directive to encode a relationship\
    \ type, but also a direction since graphs are directed in the property graph model.\n\
    \nAgain, the quality (business-facing) of the relationship type names will depend\
    \ on whodunnit.\n\n## Relationship Types\n\nThe Neo4j-GraphQL integration will\
    \ catch most of what you need.\n\nIn a Neo4j graph database, M:M is perfectly\
    \ fine. However, you will have to split them into two. If you recall in the `Movie`\
    \ example, there is a M:M in the `ACTED_IN` relationship. That will give you two\
    \ relationships (`@relation` in GraphQL):\n\n*   `Movies` are the movies that\
    \ an `Actor` acted in\n*   `Actors` lists the actors in a `Movie`\n\nYou can easily\
    \ check the cardinalities in Cypher:\n\n```cypher\nMATCH (p:Person)-[:WROTE]->(m)<-[:WROTE]-(coPersons:Person)\n\
    RETURN p, m, coPersons\n```\n\nThe path query returns some data, which shows that\
    \ even the `WROTE` relationship (and, as it happens, the `DIRECTED` relationship)\
    \ is many-to-many, as shown in Figure 11-3.\n\n![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig3_HTML.jpg](images/471428_1_En_11_Chapter/471428_1_En_11_Fig3_HTML.jpg)\n\
    \n**Figure 11-3:** Finding many to many\n\nThe data is just for demo purposes.\
    \ Obviously, in real life, there are many more cases like these of M:M relationships\
    \ in the movie context.\n\n## Missing Information\n\nMissing information is handled\
    \ differently in Neo4j when compared to SQL. In SQL you use `NULL` values, but\
    \ in Neo4j (and most other NoSQL data types), missing information is simply not\
    \ there. Take the age of a person, for example. Age is a property, and if a `Person`\
    \ node has no known age, the `Age` property is missing on that node.\n\nIn GraphQL\
    \ on the user-facing side, you can have non-nullable fields, which means that\
    \ you may have to handle the generation of default values yourself. Fortunately\
    \ the `@cypher` extension can be used for that, as shown in the sample GraphQL\
    \ schema.\n\nI do think that `NULL`s should be avoided and that they can be replaced\
    \ by default values according to business specifications."
  raw: '## Generating Your First GraphQL Schema


    It really is very simple. You install the plugin from the Neo4j Desktop, as shown
    in Figure [11-1](#471428_1_En_11_Chapter.xhtml#Fig1).


    ![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig1_HTML.jpg](images/471428_1_En_11_Chapter/471428_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Plugin installation from the Neo4j Desktop


    Having installed the plugin, you will want to install the Electron version of
    the GraphiQL app^([^(40)](#fn40)) for browsing and testing. Refer to the video
    and the blog post for details about setting up the endpoint and authorization
    headers to make the connection (not a big deal).


    To generate the schema from the data in the Neo4j database, issue this command
    to the Neo4j Desktop:


    ```

    CALL graphql.idl(null);

    ```


    You may have to transform the existing data to make it fit for presentation through
    GraphQL. This depends on the quality of the data and likewise of the metadata
    (labels, property names, and relationship types). In the following sections, we
    will go through the potential issues. If you need to do transformations, it is
    nice to know that the Neo4j-GraphQL integration includes an `@cypher` directive,
    which enables you to do some graphical things inside the GraphQL schema. Take
    a look at this example having embedded `@cypher` statements as well as type extensions:


    ```

    1   type Movie {

    2       title: ID!

    3       released: Int

    4       tagline: String


    6       actors: [Person] @relation(name:"ACTED_IN", direction:IN)

    7       director: Person @relation(name:"DIRECTED", direction:IN)

    8       recommendation(first:Int = 3): [Movie]

    9         @cypher(statement:

    10           "MATCH (this)(reco:Movie)

    11                            WHERE 3 (m)")

    36   }

    37   schema {

    38      mutations: Mutations

    39   }

    ```


    Note that fields annotated with the `@cypher` schema directive then become “computed”
    fields. This technique allows for some transformation between how the data is
    stored in Neo4j and how it is presented in the GraphQL layer.


    The video and the blog post cited in this chapter cover the how-tos of using GraphQL
    on top of an existing graph database, as well as on top of a blank graph database,
    which is the last subject of this book.


    Let’s recast the legacy SQL issues and see how they apply in the context of an
    existing Neo4j database.


    ## Data Names


    The Neo4j-GraphQL plugin will derive a GraphQL schema from the existing graph
    data. By way of sampling, the integration adds a type for each `Node-Label` with
    all the properties and their types found as fields.


    This gives you a much better starting point than a blank slate. However, much
    depends on the quality of the existing data model, of course. So, being a bit
    cynical, you should expect to spend some time on mapping not-so-good names to
    something business facing. The mapping will be done by way of editing the generated
    GraphQL schema, e.g., `@cypher` extensions. Just as with SQL, you may spend time
    here, but the time spent should be less than what would need to be done in SQL.
    Some SQL databases that I have seen almost needed an archeologist in order to
    establish data identities.


    ## Identity, Uniqueness, and Keys


    Neo4j can live without constraints , but you can also have them. Data profiling^([^(41)](#fn41))
    (see [`https://neo4j.com/blog/data-profiling-holistic-view-neo4j/`](https://neo4j.com/blog/data-profiling-holistic-view-neo4j/)
    ) is rather easy, and you should spend some time double-checking candidate keys.
    So, just as with SQL, you may have to spend some time here.


    The Neo4j node ID is internal use only. Don’t use internal Neo4j IDs for long-term
    entity identification. Future versions of Neo4j might shift these IDs around for
    performance purposes. Create your own unique ID property (ideally with a *constraint*)
    for tracking entities.


    ## States, Versions, and Housekeeping


    As with SQL, you might want to spend some time here. One benefit, though: Neo4j
    is schema-free, so refactoring the database is much easier than in SQL.


    ## Scalar Data Types


    Neo4j does not have explicit types , but the Neo4j-GraphQL is coercive, and the
    proper types will be transmitted by default in most cases. Type conversion functions
    are available, though. There might be issues with string-encoded information,
    which should be something else (a float, for example). This may take some time
    to identify and fix.


    ## Date and Time


    Neo4j does not have any date and time types per se. However, in Neo4j 3.x, APOC
    procedure support was added, including procedures for date/time support^([^(42)](#fn42))
    (see [`https://neo4j-contrib.github.io/neo4j-apoc-procedures/#_date_and_time_conversions`](https://neo4j-contrib.github.io/neo4j-apoc-procedures/#_date_and_time_conversions)
    ). This enables you to handle most conversions from Cypher commands.


    Support of temporal functions in Cypher per se arrived in release 3.4.


    GraphAware has a library called TimeTree^([^(43)](#fn43)), which looks interesting,
    as shown in Figure [11-2](#471428_1_En_11_Chapter.xhtml#Fig2). See [`https://graphaware.com/neo4j/2014/08/20/graphaware-neo4j-timetree.html`](https://graphaware.com/neo4j/2014/08/20/graphaware-neo4j-timetree.html)
    .


    ![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig2_HTML.jpg](images/471428_1_En_11_Chapter/471428_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    TimeTree from GraphAware


    ## Naming Relationships


    The Neo4j-GraphQL plugin^([^(44)](#fn44)) will generate GraphQL schema code using
    the `@relation` directive. It looks like this for the `ACTED_IN` relationship
    in the `Movie` database:


    ```

    1   type Person { name: String, movies : Movie @relation(name:"ACTED_IN", direction:OUT)\

    2    }

    ```


    As you can see, the Neo4j-GraphQL plugin uses the `@relation` directive to encode
    a relationship type, but also a direction since graphs are directed in the property
    graph model.


    Again, the quality (business-facing) of the relationship type names will depend
    on whodunnit.


    ## Relationship Types


    The Neo4j-GraphQL integration will catch most of what you need.


    In a Neo4j graph database, M:M is perfectly fine. However, you will have to split
    them into two. If you recall in the `Movie` example, there is a M:M in the `ACTED_IN`
    relationship. That will give you two relationships (`@relation` in GraphQL):


    *   `Movies` are the movies that an `Actor` acted in


    *   `Actors` lists the actors in a `Movie`


    You can easily check the cardinalities in Cypher:


    ```

    1   MATCH (p:Person)-[:WROTE]->(m)<-[:WROTE]-(coPersons:Person)

    2   RETURN p, m, coPersons

    ```


    The path query returns some data, which shows that even the `WROTE` relationship
    (and, as it happens, the `DIRECTED` relationship) is many-to-many, as shown in
    Figure [11-3](#471428_1_En_11_Chapter.xhtml#Fig3).


    ![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig3_HTML.jpg](images/471428_1_En_11_Chapter/471428_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Finding many to many


    The data is just for demo purposes. Obviously, in real life, there are many more
    cases like these of M:M relationships in the movie context.


    ## Missing Information


    Missing information is handled differently in Neo4j when compared to SQL. In SQL
    you use `NULL` values, but in Neo4j (and most other NoSQL data types), missing
    information is simply not there. Take the age of a person, for example. Age is
    a property, and if a `Person` node has no known age, the `Age` property is missing
    on that node.


    In GraphQL on the user-facing side, you can have non-nullable fields, which means
    that you may have to handle the generation of default values yourself. Fortunately
    the `@cypher` extension can be used for that, as shown in the sample GraphQL schema.


    I do think that `NULL`s should be avoided and that they can be replaced by default
    values according to business specifications.'
  trans: "\n## 生成你的第一个 GraphQL 模式\n\n其实非常简单。你从 Neo4j Desktop 安装插件，如图 11-1 所示。\n\n\
    ![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig1_HTML.jpg](img/471428_1_En_11_Fig1_HTML.jpg)\n\
    \n**图 11-1:** 在 Neo4j Desktop 中安装插件\n\n安装插件后，你需要安装 GraphiQL 应用的 Electron 版本^(⁴⁰)，用于浏览和测试。关于设置端点和授权头以建立连接（不是什么大事）的详细信息，请参考视频和博客文章。\n\
    \n要根据 Neo4j 数据库中的数据生成模式，请向 Neo4j Desktop 发出此命令：\n\n```graphql\nCALL graphql.idl(null);\n\
    ```\n\n你可能需要转换现有数据，使其适合通过 GraphQL 展示。这取决于数据的质量以及元数据（标签、属性名称和关系类型）的质量。在接下来的章节中，我们将讨论潜在的问题。如果你需要做转换，值得知道的是\
    \ Neo4j-GraphQL 集成包含一个 `@cypher` 指令，它使你能够在 GraphQL 模式内做一些图形化的事情。看看这个包含嵌入式 `@cypher`\
    \ 语句和类型扩展的示例：\n\n```graphql\ntype Movie {\n    title: ID!\n    released: Int\n\
    \    tagline: String\n    actors: [Person] @relation(name:\"ACTED_IN\", direction:IN)\n\
    \    director: Person @relation(name:\"DIRECTED\", direction:IN)\n    recommendation(first:Int\
    \ = 3): [Movie]\n      @cypher(statement:\n        \"MATCH (this)-[:ACTED_IN]->()-[:ACTED_IN]-(reco:Movie)\n\
    \         WHERE this <> reco\n         RETURN DISTINCT reco LIMIT {first}\")\n\
    }\nschema {\n   mutations: Mutations\n}\n```\n\n请注意，带有 `@cypher` 模式指令的字段将成为“计算”字段。这种技术允许在数据存储于\
    \ Neo4j 的方式与在 GraphQL 层展示的方式之间进行一些转换。\n\n本章引用的视频和博客文章涵盖了在现有图数据库之上以及在空白图数据库之上使用\
    \ GraphQL 的操作指南，后者是本书的最后一个主题。\n\n让我们重新审视遗留的 SQL 问题，看看它们在现有 Neo4j 数据库的上下文中如何应用。\n\
    \n## 数据名称\n\nNeo4j-GraphQL 插件将从现有的图数据中派生出 GraphQL 模式。通过采样，集成为每个 `节点标签` 添加一个类型，所有找到的属性及其类型都作为字段。\n\
    \n这给你提供了一个比从零开始好得多的起点。然而，当然，这在很大程度上取决于现有数据模型的质量。所以，略带讽刺地说，你应该预期会花一些时间将不太好的名称映射到面向业务的名称上。这种映射将通过编辑生成的\
    \ GraphQL 模式来完成，例如使用 `@cypher` 扩展。就像处理 SQL 一样，你可能会在这里花费时间，但花费的时间应该比在 SQL 中需要做的少。我见过的一些\
    \ SQL 数据库几乎需要考古学家才能确定数据标识。\n\n## 标识、唯一性和键\n\n没有约束 Neo4j 也能运行，但你也可以拥有约束。数据剖析^(⁴¹)（参见\
    \ [`https://neo4j.com/blog/data-profiling-holistic-view-neo4j/`](https://neo4j.com/blog/data-profiling-holistic-view-neo4j/)）相当容易，你应该花些时间仔细检查候选键。所以，就像处理\
    \ SQL 一样，你可能需要在这里花费一些时间。\n\nNeo4j 节点 ID 仅供内部使用。不要将内部 Neo4j ID 用于长期的实体标识。未来版本的\
    \ Neo4j 可能会为了性能目的而调整这些 ID。创建你自己的唯一 ID 属性（最好带有约束）以跟踪实体。\n\n## 状态、版本和内务管理\n\n与 SQL\
    \ 一样，你可能想在这里花费一些时间。不过有一个好处：Neo4j 是无模式的，因此重构数据库比在 SQL 中容易得多。\n\n## 标量数据类型\n\nNeo4j\
    \ 本身没有显式类型，但 Neo4j-GraphQL 是强制的，在大多数情况下，默认会传输正确的类型。不过，类型转换函数是可用的。对于字符串编码的信息（本应是其他类型，例如浮点数）可能会存在问题。识别和修复这些问题可能需要一些时间。\n\
    \n## 日期和时间\n\nNeo4j 本身没有任何日期和时间类型。然而，在 Neo4j 3.x 中，添加了 APOC 程序支持，包括用于日期/时间支持^(⁴²)\
    \ 的程序（参见 [`https://neo4j-contrib.github.io/neo4j-apoc-procedures/#_date_and_time_conversions`](https://neo4j-contrib.github.io/neo4j-apoc-procedures/#_date_and_time_conversions)）。这使你能够通过\
    \ Cypher 命令处理大多数转换。\n\nCypher 本身对时间函数的支持在 3.4 版本中到来。\n\nGraphAware 有一个名为 TimeTree^(⁴³)\
    \ 的库，看起来很有趣，如图 11-2 所示。参见 [`https://graphaware.com/neo4j/2014/08/20/graphaware-neo4j-timetree.html`](https://graphaware.com/neo4j/2014/08/20/graphaware-neo4j-timetree.html)。\n\
    \n![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig2_HTML.jpg](img/471428_1_En_11_Fig2_HTML.jpg)\n\
    \n**图 11-2:** 来自 GraphAware 的 TimeTree\n\n## 命名关系\n\nNeo4j-GraphQL 插件^(⁴⁴) 将使用\
    \ `@relation` 指令生成 GraphQL 模式代码。对于 `Movie` 数据库中的 `ACTED_IN` 关系，它看起来像这样：\n\n```graphql\n\
    type Person { name: String, movies : Movie @relation(name:\"ACTED_IN\", direction:OUT)\
    \ }\n```\n\n如你所见，Neo4j-GraphQL 插件使用 `@relation` 指令来编码关系类型，同时也编码方向，因为在属性图模型中图是有向的。\n\
    \n再次强调，关系类型名称的质量（面向业务）将取决于创建者。\n\n## 关系类型\n\nNeo4j-GraphQL 集成将捕获你需要的大部分内容。\n\n\
    在 Neo4j 图数据库中，多对多（M:M）是完全可以的。然而，你将需要将它们拆分为两个。如果你还记得 `Movie` 示例，`ACTED_IN` 关系中存在一个多对多关系。这将给你两个关系（在\
    \ GraphQL 中是 `@relation`）：\n\n*   `Movies` 是一个 `Actor` 演过的电影\n*   `Actors` 列出了某部\
    \ `Movie` 中的演员\n\n你可以很容易地在 Cypher 中检查基数：\n\n```cypher\nMATCH (p:Person)-[:WROTE]->(m)<-[:WROTE]-(coPersons:Person)\n\
    RETURN p, m, coPersons\n```\n\n路径查询返回一些数据，表明即使是 `WROTE` 关系（以及碰巧 `DIRECTED` 关系）也是多对多的，如图\
    \ 11-3 所示。\n\n![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig3_HTML.jpg](img/471428_1_En_11_Fig3_HTML.jpg)\n\
    \n**图 11-3:** 查找多对多关系\n\n这些数据仅用于演示目的。显然，在现实生活中，在电影语境中，像这样的多对多关系案例还有很多。\n\n## 缺失信息\n\
    \n与 SQL 相比，Neo4j 中处理缺失信息的方式不同。在 SQL 中你使用 `NULL` 值，但在 Neo4j（以及大多数其他 NoSQL 数据类型）中，缺失的信息就是不存在。以一个人的年龄为例。年龄是一个属性，如果一个\
    \ `Person` 节点没有已知年龄，则该节点上就缺失 `Age` 属性。\n\n在用户端的 GraphQL 中，你可以拥有非空字段，这意味着你可能需要自己处理默认值的生成。幸运的是，如示例\
    \ GraphQL 模式所示，`@cypher` 扩展可以用于此目的。\n\n我确实认为应该避免 `NULL`，并且可以根据业务规范用默认值来替代它们。\n"
- fmt: '## Properties on Relationships


    In my honest opinion, things and events should not be placed on relationships.
    In some (most) graph databases, it is permitted. However, it works well with properties,
    which characterize the relationship, such as weight, ownership percentage, and
    so on.


    One might argue that ownership percentage, for example, is a property of an entity
    called ownership share, which is a relational bridge table helping to implement
    a M:M relationship between owners and properties. This is mostly a business decision.
    If the business folks do not recognize the concept of an ownership share, the
    story ends there.


    If the introduction of a new business level concept like ownership share is acceptable,
    then the relationship surfaces as a new `GraphQL` object type having a scalar
    field representing the percentage. Two new relationships will emerge. The API
    designer will have to decide the traversal path, obviously. Given that the restriction
    is on the `GraphQL` concepts side, this is an acceptable solution.


