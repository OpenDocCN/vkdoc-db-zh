    ## 12. Using `GraphQL` with a New Graph Database


    ### Design Goals of the `Neo4j-GraphQL` Integration


    What does a graph solution for a `GraphQL` API look like?


    I can best answer this question by looking at the `Neo4j-GraphQL` plugin. Instead
    of repeating what Will Lyon says in his video, I have decided to briefly summarize
    a recent blog post from March 2018, also by Will Lyon of `Neo4j`. It’s entitled
    “Five Common `GraphQL` Problems and How `Neo4j-GraphQL` Aims To Solve Them” (see
    [`https://blog.grandstack.io/five-common-graphql-problems-and-how-neo4j-graphql-aims-to-solve-them-e9a8999c8d43`](https://blog.grandstack.io/five-common-graphql-problems-and-how-neo4j-graphql-aims-to-solve-them-e9a8999c8d43)
    ).


    Obviously, there are advantages to using a graph database as a store for a `GraphQL`
    API, as you will see. In the following, Will explains the ambitions of the `GraphQL`
    `Neo4j` integration:


    *   A few weeks ago, I came across an article from Sacha Greif on freeCodeCamp
    titled “Five Common Problems in `GraphQL` Apps (And How to Fix Them)”. I thought
    this was a good overview of some of problems developers encounter when adopting
    `GraphQL`.


    *   As I read through the list of common problems, I realized these were some
    of the same issues that users had complained about when we were researching how
    a `Neo4j-GraphQL` integration would look (see [`https://neo4j.com/developer/graphql/`](https://neo4j.com/developer/graphql/)
    ). Ultimately, the design of our integration aimed to help developers be more
    productive when building `GraphQL` services backed by `Neo4j`.


    *   In this post, I would like to revisit each of the five problems that Sacha
    points out and show how `Neo4j-GraphQL` addresses each of those issues.


    #### Problem 1: Schema Duplication


    > *Namely, you need one schema for your database, and another one for your GraphQL
    endpoint. —Sacha Greif*


    *   `GraphQL` uses a strictly defined `schema`, which defines the types available
    and the entry points for the API. This `schema` acts as the specification for
    the `GraphQL` API, and with introspection enables powerful developer tools such
    as query completion, mocking, and documentation generation. However, standard
    `GraphQL` implementations often require working with a `schema` for your database
    and a `schema` for your `GraphQL` API.


    *   To simplify the process of building `GraphQL` applications backed by `Neo4j`,
    the `Neo4j-GraphQL` integration uses the `GraphQL` `schema` to infer what the
    `Neo4j` data model should be.


    *Solution: Use the `GraphQL` schema to drive the `Neo4j` database model.*


    #### Problem 2: Server/Client Data Mismatch


    > *Your database and GraphQL API will have different schemas, which translate
    into different document shapes. —Sacha Greif*


    *   If the backend for your `GraphQL` service is not a graph database, then there
    is some mapping and translation that must occur to transform the data from how
    you model it at the data persistence layer to the shape of a graph for `GraphQL`.
    By using a graph database as the data layer for our `GraphQL` service, we preempt
    this problem.


    *   The `Neo4j-GraphQL` integration translates any arbitrary `GraphQL` request
    to `Cypher`, the query language for graphs, and handles the database call as part
    of the `GraphQL` resolver.


    *Solution: Translate `GraphQL` to `Cypher`. (Note: This is done automatically.)*


    #### Problem 3: Superfluous Database Calls


    > *Imagine a list of posts, each of which has a user attached to it. You now want
    to display 10 of these posts, along with the name of their author. —Sacha Greif*


    *   As Sacha points out, for the example above, a typical `GraphQL` implementation
    makes one database query for the list of posts, then one query per post to fetch
    the user. This results in 11 round-trip requests to the database! This is known
    as the n+1 query problem and the common solution is to use a tool like `Dataloader`.


    *   We can certainly use `Dataloader` with `Neo4j`—it is designed to be data layer
    agnostic, but with `Neo4j-GraphQL` we have the advantage of generating a *single*
    `Cypher` query for any arbitrary `GraphQL` request. This means for any `GraphQL`
    request we make only a single request to the database.


    *Solution: Translate `GraphQL` to a single `Cypher` query. (Note: This is done
    automatically.)*


    #### Problem 4: Poor Performance


    > *On one hand you want to take full advantage of GraphQL’s graph traversal features
    (“show me the authors of the comments of the author of the post of …” etc.). But
    on the other hand, you don’t want your app to become slow and unresponsive. —Sacha
    Greif*


    *   While it is true that `GraphQL` enables the expression of graph traversals
    like the example above, many of the database systems responsible for resolving
    the data are not optimized for these workloads. Graph databases like `Neo4j` are
    optimized for graph traversal queries like this. By translating `GraphQL` to `Cypher`,
    we can take advantage of the powerful performance benefits of using a graph database
    execution engine like `Neo4j`. Furthermore, `GraphQL` lacks the semantics of a
    database query language for expressing things like filtering, projects, or aggregations.
    Through the use of `GraphQL` `schema` directives, we can use the power of `Cypher`
    with `GraphQL` to map a `GraphQL` field to the result of an arbitrary `Cypher`
    query.


    *Solution: Expose the power of `Cypher` in `GraphQL`.*'
  raw: '## Properties on Relationships


    In my honest opinion, things and events should not be placed on relationships.
    In some (most) graph databases, it is permitted. However, it works well with properties,
    which characterize the relationship, such as weight, ownership percentage, and
    so on.


    One might argue that ownership percentage, for example, is a property of an entity
    called ownership share, which is a relational bridge table helping to implement
    a M:M relationship between owners and properties. This is mostly a business decision.
    If the business folks do not recognize the concept of an ownership share, the
    story ends there.


    If the introduction of a new business level concept like ownership share is acceptable,
    then the relationship surfaces as a new GraphQL object type having a scalar field
    representing the percentage. Two new relationships will emerge. The API designer
