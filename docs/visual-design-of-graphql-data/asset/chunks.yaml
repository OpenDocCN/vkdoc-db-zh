- fmt: '## Positioning the Graph for Generation of Trees


    图 [9-1](#471428_1_En_9_Chapter.xhtml#Fig1) 展示了之前的电子邮件数据模型。

    ![`../images/471428_1_En_9_Chapter/471428_1_En_9_Fig1_HTML.jpg`](images/471428_1_En_9_Chapter/471428_1_En_9_Fig1_HTML.jpg)

    **图 9-1**

    我们的电子邮件属性图再次展示。


    这个数据模型是一个有向图，可以使用图技术（但不是 GraphQL）沿任意方向遍历。GraphQL 必须为每一次`查询`（`query`）产生一个树。


    请注意，图 [9-2](#471428_1_En_9_Chapter.xhtml#Fig2) 中所示的也是一个属性图——现在只是模式图的一个“Banzai”版本，而且还是扭曲的。


    这很大程度上取决于你的根查询（`root query`）是什么样子。它决定了可能查询的视角。一个模式（`schema`）应该服务于特定应用程序的需求。


    你可以在根查询中拥有多个字段。你也可以在配置中拥有多个模式。模式缝合（`schema-stitching`）的可能性使你能够合并模式，本质上是将根字段组合到合并后的根查询中。更多信息请参阅
    GraphQL 文档。


    如果某个特定模式中的查询都应该始于发起者（`originator`）级别，因为这是应用程序所需要的，那么我们可以根据这种模式构建 API 查询结果树，如图
    [9-2](#471428_1_En_9_Chapter.xhtml#Fig2) 所示。

    ![`../images/471428_1_En_9_Chapter/471428_1_En_9_Fig2_HTML.jpg`](images/471428_1_En_9_Chapter/471428_1_En_9_Fig2_HTML.jpg)

    **图 9-2**

    将发起者作为查询的根


    这意味着，例如，地址级别或关键字级别的属性将会冗余地出现在树中，因为它们必须被反规范化（`denormalized`）到较低级别，或者，替代性地，放入一个
    GraphQL 列表（`list`）结构。


    属性图与 GraphQL 开发者高度相关。它们极大地简化了对当前数据的分析，并有助于组织生成的 API 模式和查询结构。


    完成这些之后，我们也已经处理了：


    *   正确地暴露所暴露数据（查询结果）中固有的关系结构。

    *   处理多对多（`M:M`）关系的遍历以生成结果树（包括模式和查询结果）。


    这种可视化是一种直观易懂（相当不错）的业务和应用程序术语表示，可以与业务人员讨论。


    获得查询范围概览的一个简单方法是旋转和扭动应用程序图数据模型，使其以自上而下、从左到右的方式可视化结果树范围（参见图 [9-3](#471428_1_En_9_Chapter.xhtml#Fig3)）。

    ![`../images/471428_1_En_9_Chapter/471428_1_En_9_Fig3_HTML.jpg`](images/471428_1_En_9_Chapter/471428_1_En_9_Fig3_HTML.jpg)

    **图 9-3**

    将发起者拉到顶部


    请注意，树的一个分支只能沿一个方向遍历 `M:M` 关系。


    如果另一个应用程序视角是关注某人发送给某些目的地的、带有特定标签的消息，那么结果树可视化可能如图 [9-4](#471428_1_En_9_Chapter.xhtml#Fig4)
    所示。

    ![`../images/471428_1_En_9_Chapter/471428_1_En_9_Fig4_HTML.jpg`](images/471428_1_En_9_Chapter/471428_1_En_9_Fig4_HTML.jpg)

    **图 9-4**

    以关键字为根的结果树


    派生出的树以关键字为根，将逐个关键字地传递所有被标记了该关键字的消息。对于每条这样的消息，将列出所有发起者及其各自的地址和所有目的地。


    导航图数据模型也可以通过视觉上“套出”单个子树（层次结构）来简化。这将让你感觉到可以构造哪些结果树。


    换句话说，反规范化和复制是你的好朋友。对于 GraphQL 而言，数据存在于 API 中，即在运行时存在于缓存中。


    ### 注意


    GraphQL 的强大优势之一正是基于此：在分布式应用程序的缓存中，拥有一个精心自定义并可用的树状结构，可以带来更好的性能和更少的阻塞。


    因此，暴露冗余数据没有问题，对于某些物理数据存储来说，这是必要的。显然，基于树的反规范化结果可能包含以下内容：


    *   `数据`（`Data`）：选定的叶节点数据（模式设计中的选定属性）。

    *   `导航字段`（`Navigation fields`）：中间和顶层节点属性，包括标识键以及分类层次结构的中间级别等。这是为了方便起见。


    重要的是要包含所有必要的中间和顶层键。否则，你将无法唯一标识结果中的每个级别。


    将已经反规范化的结构（例如在 NoSQL 存储中）映射到 GraphQL，在大多数情况下通常应该是可行的且相对容易实现，但改变序列化顺序并不是胆怯者能做的。


    你也可以考虑使用重复的列组。在 1:M 关系中，有时重复字段不会太多，因此可以很好地工作，并且受到 GraphQL 列表的支持。


    一般来说，将图表示的解决方案数据模型映射为树表示的查询结果是非常直接的。你的可视化将帮助你擅长于此，一旦你的模式图变得很大，你会欣赏这一点。


    生成正确的结果树是解析器（`resolver`）需求的重要组成部分，这正是我们下一章要讨论的内容。


    脚注 [1](#471428_1_En_9_Chapter.xhtml#Fn1_source)


    # 10. Resolving Legacy SQL Data Issues


    在新的空数据存储中使用 GraphQL 是简单的方式。在许多情况下，数据库模式和解析器（如果需要）可以从 GraphQL 模式生成或推断出来。


    如果你计划在现有数据库中使用 GraphQL，你需要注意你的步骤，如图 [10-1](#471428_1_En_10_Chapter.xhtml#Fig1)
    所示。

    ![`../images/471428_1_En_10_Chapter/471428_1_En_10_Fig1_HTML.jpg`](images/471428_1_En_10_Chapter/471428_1_En_10_Fig1_HTML.jpg)

    **图 10-1**

    跨越遗留河流通往 GraphQL 的桥梁


    多年来活跃于数据仓库社区，我对 SQL 数据库“丛林”非常熟悉。将 GraphQL 应用于 SQL 数据的这一令人困惑的遗产是本章的背景。在过桥时，请期待一些惊喜。


    你可以使用额外的工具，例如：


    *   对象关系映射器（`ORMs`）（例如，位于 [`http://docs.sequelizejs.com/`](http://docs.sequelizejs.com/)
    的 `Sequelize`^([^(34)](#fn34))）

    *   SQL 生成器（例如，位于 [`https://github.com/stems/join-monster/blob/master/README.md`](https://github.com/stems/join-monster/blob/master/README.md)
    的 `join-monster`^([^(35)](#fn35))）


    我对其中任何一个都没有实际经验；你必须自己构建。从它们的网站来看，两者都不错，而且它们确实有一些客户。我对 `ORMs` 有点怀疑。在我看来，你必须构建另一个模式，仅仅是为了映射的目的。我认为这可能相当于花费相当多的时间。


    在下面的例子中，我期望你的平台可以构建解析器函数，这些函数可以包含或发出（几乎不受限制的）`SQL` 命令。


    让我们按照之前介绍一般问题的相同顺序，来逐步了解具体的遗留问题。'
  raw: '## Positioning the Graph for Generation of Trees


    Figure [9-1](#471428_1_En_9_Chapter.xhtml#Fig1) shows the email data model from
    before.


    ![../images/471428_1_En_9_Chapter/471428_1_En_9_Fig1_HTML.jpg](images/471428_1_En_9_Chapter/471428_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Our email property graph once again


    This data model is a directed graph, and it can be traversed in any direction
    (using graph technologies, but not GraphQL). GraphQL must result in a tree for
    each and every *query*.


    Note that the graph shown in Figure [9-2](#471428_1_En_9_Chapter.xhtml#Fig2) is
    also a property graph—now just a “Banzai” version of the schema graph, and a twisted
    one at that.


    Much depends on what your root query looks like. It determines the perspective
    of the possible queries. A schema should be serving a particular application’s
    needs.


    You can have multiple fields in your root query. You can also have multiple schemas
    in your configuration. The schema-stitching possibility enables you to merge schemas,
    essentially bringing the root fields together in the combined root query. Refer
    to the GraphQL documentation for more information.


    If queries in a particular schema should all start at the originator level, because
    that is what the application needs, then we can construct API query result trees
    according to this pattern, as shown in Figure [9-2](#471428_1_En_9_Chapter.xhtml#Fig2).


    ![../images/471428_1_En_9_Chapter/471428_1_En_9_Fig2_HTML.jpg](images/471428_1_En_9_Chapter/471428_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Having originator as the root of a query


    This implies that address-level or keyword-level properties , for example, will
    be redundantly available in the trees, since they must be denormalized into a
    lower level or, alternatively, into a GraphQL list construct.


    Property graphs are highly relevant to GraphQL developers. They ease the analysis
    of the data at hand significantly, and they help organize the resulting API schema
    and query structures.


    Having done this, we have also dealt with:


    *   Correct exposure of the structure of the relationships inherent in the exposed
    data (query result).


    *   Handling traversals of many-to-many relationships in order to produce a result
    tree (both schema and query result).


    The visualization is an intuitively understandable (pretty good) representation
    of business and application terminology that can be discussed with business folks.


    An easy way to get an overview of the query scope is to turn and twist the application
    graph data model so that it visualizes the result tree scope in a top-down, left-to-right
    manner (see Figure [9-3](#471428_1_En_9_Chapter.xhtml#Fig3)).


    ![../images/471428_1_En_9_Chapter/471428_1_En_9_Fig3_HTML.jpg](images/471428_1_En_9_Chapter/471428_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Pulling originator to the top


    Note that a branch of the tree can traverse the M:M relationship in one direction
    only.


    If another application perspective should be on messages with certain tags sent
    by someone to certain destinations, the result tree visualization could look like
    Figure [9-4](#471428_1_En_9_Chapter.xhtml#Fig4).


    ![../images/471428_1_En_9_Chapter/471428_1_En_9_Fig4_HTML.jpg](images/471428_1_En_9_Chapter/471428_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Result tree having keyword as root


    The tree, which can be derived, is rooted in the keyword and will deliver, keyword
    after keyword, all the messages having been tagged with that keyword. For each
    such message, all originators will be listed with their respective addresses and
    all destinations.


    Navigating the graph data model can also be eased by way of visually “lassoing”
    individual sub-trees (hierarchies). This will give you a feel for which result
    trees can be constructed.


    In other words, denormalization and duplication are your good friends. In the
    case of GraphQL, the data lives in the API, i.e., in the cache at runtime.


    ### Note


    One the strong points of GraphQL is based on just that: Having a tree-structure
    carefully self-defined and available in the caches of a distributed application
    leads to better performance and less blocking.


    So, no problems in exposing redundant data, and for some physical data stores,
    it is a necessity. Obviously the tree-based denormalization result could contain
    the following:


    *   *Data*: The selected leaf-node data (selected properties in the schema design).


    *   *Navigation fields*: The intermediate and top-level node properties, which
    include identity keys and intermediate levels of classification hierarchies and
    the like. This is for convenience.


    It is important that you include all the necessary intermediate and top-level
    keys. Otherwise, you will not be able to uniquely identify each level in the result.


    Mapping already denormalized structures (in NoSQL stores, for example) to GraphQL
    should normally be possible and relatively easy to do in most cases, but changing
    the serialization order is not for the faint-hearted.


    You can also consider using repeating groups of columns. Sometimes there are not
    too many in a 1:M relationship, so repeating fields could work well and are supported
    by GraphQL lists.


    In general, mapping from a solution data model expressed as a graph to query results
    expressed as trees is pretty straightforward. Your visualizations will help you
    get good at doing that, which you will appreciate once your schema graph is large.


    Producing correct result trees is a big part of the resolver requirements, which
    is what we look at in the next chapter.


    Footnotes [1](#471428_1_En_9_Chapter.xhtml#Fn1_source)


    # 10. Resolving Legacy SQL Data Issues


    Using GraphQL with a new, empty data store is the easy way. In many cases, the
    database schema and resolvers (if needed) can be generated or inferred from the
    GraphQL schema.


    If you plan to use GraphQL with existing databases, you should mind your steps,
    as illustrated in Figure [10-1](#471428_1_En_10_Chapter.xhtml#Fig1).


    ![../images/471428_1_En_10_Chapter/471428_1_En_10_Fig1_HTML.jpg](images/471428_1_En_10_Chapter/471428_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    The bridge to GraphQL crossing river legacy


    Having been active in the data warehouse community for years, I know the SQL database
    “jungle” well. Applying GraphQL to this bewildering legacy of SQL data is the
    context for this chapter. Expect some surprises as you cross the bridge.


    There are additional tools you may use, such as:


    *   Object-relational mappers (ORMs) (such as Sequelize at [`http://docs.sequelizejs.com/`](http://docs.sequelizejs.com/)
    , for example^([^(34)](#fn34)))


    *   SQL generators (such as join-monster, at [`https://github.com/stems/join-monster/blob/master/README.md`](https://github.com/stems/join-monster/blob/master/README.md)
    for example^([^(35)](#fn35)))


    I do not have practical experience with any of them; you will have to build your
    own. Both of them look good from their websites, and they do have some customers.
    I am bit skeptical about the ORMs. Seems to me that you have to build another
    schema, just for the sake of the mapping. That can potentially amount to quite
    a few hours spent, I think.


    In the following example, I expect that your platform can build resolver functions,
    which can contain or issue (almost unrestricted) SQL commands.


    Let’s walk through the specific legacy issues in the same order as we presented
    the general issues earlier.'
  trans: '

    ## 定位图以生成树结构


    图 9-1 展示了之前的电子邮件数据模型。

    ![`../images/471428_1_En_9_Chapter/471428_1_En_9_Fig1_HTML.jpg`](img/471428_1_En_9_Fig1_HTML.jpg)

    **图 9-1**

    我们的电子邮件属性图再次展示。


    这个数据模型是一个有向图，可以使用图技术（但不是 GraphQL）沿任意方向遍历。GraphQL 必须为每一次`查询`（`query`）产生一个树。


    请注意，图 9-2 中所示的也是一个属性图——现在只是模式图的一个“Banzai”版本，而且还是扭曲的。


    这很大程度上取决于你的根查询（`root query`）是什么样子。它决定了可能查询的视角。一个模式（`schema`）应该服务于特定应用程序的需求。


    你可以在根查询中拥有多个字段。你也可以在配置中拥有多个模式。模式缝合（`schema-stitching`）的可能性使你能够合并模式，本质上是将根字段组合到合并后的根查询中。更多信息请参阅
    GraphQL 文档。


    如果某个特定模式中的查询都应该始于发起者（`originator`）级别，因为这是应用程序所需要的，那么我们可以根据这种模式构建 API 查询结果树，如图
    9-2 所示。

    ![`../images/471428_1_En_9_Chapter/471428_1_En_9_Fig2_HTML.jpg`](img/471428_1_En_9_Fig2_HTML.jpg)

    **图 9-2**

    将发起者作为查询的根


    这意味着，例如，地址级别或关键字级别的属性将会冗余地出现在树中，因为它们必须被反规范化（`denormalized`）到较低级别，或者，替代性地，放入一个
    GraphQL 列表（`list`）结构。


    属性图与 GraphQL 开发者高度相关。它们极大地简化了对当前数据的分析，并有助于组织生成的 API 模式和查询结构。


    完成这些之后，我们也已经处理了：


    *   正确地暴露所暴露数据（查询结果）中固有的关系结构。

    *   处理多对多（`M:M`）关系的遍历以生成结果树（包括模式和查询结果）。


    这种可视化是一种直观易懂（相当不错）的业务和应用程序术语表示，可以与业务人员讨论。


    获得查询范围概览的一个简单方法是旋转和扭动应用程序图数据模型，使其以自上而下、从左到右的方式可视化结果树范围（参见图 9-3）。

    ![`../images/471428_1_En_9_Chapter/471428_1_En_9_Fig3_HTML.jpg`](img/471428_1_En_9_Fig3_HTML.jpg)

    **图 9-3**

    将发起者拉到顶部


    请注意，树的一个分支只能沿一个方向遍历 `M:M` 关系。


    如果另一个应用程序视角是关注某人发送给某些目的地的、带有特定标签的消息，那么结果树可视化可能如图 9-4 所示。

    ![`../images/471428_1_En_9_Chapter/471428_1_En_9_Fig4_HTML.jpg`](img/471428_1_En_9_Fig4_HTML.jpg)

    **图 9-4**

    以关键字为根的结果树


    派生出的树以关键字为根，将逐个关键字地传递所有被标记了该关键字的消息。对于每条这样的消息，将列出所有发起者及其各自的地址和所有目的地。


    导航图数据模型也可以通过视觉上“套出”单个子树（层次结构）来简化。这将让你感觉到可以构造哪些结果树。


    换句话说，反规范化和复制是你的好朋友。对于 GraphQL 而言，数据存在于 API 中，即在运行时存在于缓存中。


    ### 注意


    GraphQL 的强大优势之一正是基于此：在分布式应用程序的缓存中，拥有一个精心自定义并可用的树状结构，可以带来更好的性能和更少的阻塞。


    因此，暴露冗余数据没有问题，对于某些物理数据存储来说，这是必要的。显然，基于树的反规范化结果可能包含以下内容：


    *   `数据`（`Data`）：选定的叶节点数据（模式设计中的选定属性）。

    *   `导航字段`（`Navigation fields`）：中间和顶层节点属性，包括标识键以及分类层次结构的中间级别等。这是为了方便之故。


    重要的是要包含所有必要的中间和顶层键。否则，你将无法唯一标识结果中的每个级别。


    将已经反规范化的结构（例如在 NoSQL 存储中）映射到 GraphQL，在大多数情况下通常应该是可行的且相对容易实现的，但改变序列化顺序并不是胆怯者能做的。


    你也可以考虑使用重复的列组。在 1:M 关系中，有时重复字段不会太多，因此可以很好地工作，并且受到 GraphQL 列表的支持。


    一般来说，将图表示的解决方案数据模型映射为树表示的查询结果是非常直接的。你的可视化将帮助你擅长于此，一旦你的模式图变得很大，你会欣赏这一点。


    生成正确的结果树是解析器（`resolver`）需求的重要组成部分，这正是我们下一章要讨论的内容。


    脚注 1


