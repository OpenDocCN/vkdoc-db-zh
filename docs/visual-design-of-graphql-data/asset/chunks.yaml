      [9](#471428_1_En_12_Chapter.xhtml#Fn9_source)   [10](#471428_1_En_12_Chapter.xhtml#Fn10_source)
      [11](#471428_1_En_12_Chapter.xhtml#Fn11_source)   [12](#471428_1_En_12_Chapter.xhtml#Fn12_source)
