- fmt: '# Using Custom Schema Directives


    Date formatting is a good use case for custom schema directives. Ben Newman has
    a good blog post entitled “Reusable GraphQL Schema Directives^([^(27)](#fn27)),”
    ([`https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1`](https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1)),
    which goes into quite some detail about how to implement those.


    Here I will just give you a feel for what it looks like (in Ben Newman’s blog
    post).


    First, define a directive with a default format and an argument:


    ```

    1   directive @formattableDate(

    2     defaultFormat: String = "mmmm d, yyyy"

    3   ) on FIELD_DEFINITION

    4

    5   scalar Date

    6

    7   type Query {

    8     today: Date @formattableDate

    9   }

    ```


    The directive can be incorporated into a schema and used with different formats:


    ```

    1   import { graphql } from "graphql";

    2   import { makeExecutableSchema } from "graphql-tools";

    3

    4   const schema = makeExecutableSchema({

    5     typeDefs,

    6     schemaDirectives: {

    7       formattableDate: FormattableDateDirective

    8     }

    9   });

    10

    11   graphql(schema, `query { today }`).then(result => {

    12     // Logs with the default "mmmm d, yyyy" format:

    13     console.log(result.data.today);

    14   });

    15

    16   graphql(schema, `query {

    17     today(format: "d mmm yyyy")

    18   }`).then(result => {

    19     // Logs with the requested "d mmm yyyy" format:

    20     console.log(result.data.today);

    21   });

    ```


    As said, Ben Newman’s blog post has all the details that you need to implement
    this.


    # Design Is Decisions


    Never forget that API schema modeling is about `design`! Design means making decisions
    that impact the *business quality* of the solution. Obviously there is a dilemma
    between:


    *   Supporting the business processes at hand/the business questions in demand
    (now and in the future)

    *   Keeping it simple


    Strive for a balanced solution between scope and simplicity. Visualizing the design
    decisions will make your world more simple.


    *Since we design for the business, in the end, the decisions are up to the business!*


    Let’s move on to the structural matters.


    Footnotes [1](#471428_1_En_7_Chapter.xhtml#Fn1_source)   [2](#471428_1_En_7_Chapter.xhtml#Fn2_source)


    # 8. Getting the Structure Right


    ## Which Objects and Which Relationships?


    The structure of the data model is, of course, built on the object types and the
    relationships, which we have already discussed.


    But more general issues arise from picking the right objects.


    We do have some generally applicable tools in our tool belt, as follows:


    *   Abstraction, generalization, and specialization (aka aggregation)

    *   Classification and typing

    *   Lifecycle dependencies and versioning

    *   Recognizing hierarchies


    There are also some problem areas to be aware of:


    *   One-to-one relationships

    *   Many-to-many relationships and nested object types

    *   Trees (hierarchies of different kinds)


    One of your best helpers is a good concept model with meaningful linking phrases
    (names of the dependencies). Creating the model on a whiteboard is often enough.
    Remember that concepts relate to other concepts in a sentence-like (subject/predicate/object)
    manner, such as `Customer-places-Order`.


    The verbs in those little sentences tell you a lot about the structure. Is the
    target just a property or not? The inclusion of “is” or “has” indicate a property.
    Or is it a full-blown relationship between business objects? “Places” indicates
    a full-blown relationship, because it implies a process that transforms one state
    of the business to another state.


    ## GraphQL Schema Stitching, Making a Patchwork


    GraphQL is moving toward becoming a patchwork of federated servers working together.
    The new capabilities are called:


    *   Schema stitching

    *   Schema delegation

    *   Schema binding


    The discussion quickly becomes technical. Instead, let’s focus on the overall
    consequences.


    Basically those new features allow you to:


    *   Make distributed queries, which get consolidated results from a set of GraphQL
    schemas/servers.

    *   Make integrations between your own schema and somebody else’s schemas, either
    at the schema level or at the level of resolvers.


    GraphQL has a high level of “self consciousness” thanks to its introspection functionality,
    and it is strongly typed. This means that the integrations can benefit from having
    remote servers introspecting one another to determine who can answer what within
    a query. This also opens up the possibility for publicly available GraphQL APIs
    (and there are already some of those). So, GraphQL aspires to take the lead in
    the open data space, which has been dominated by the W3C stack and SPARQL endpoints.


    Sashko Stubailo has a nice blog post^([^(28)](#fn28)) at [`https://dev-blog.apollodata.com/graphql-schema-stitching-8af23354ac37`](https://dev-blog.apollodata.com/graphql-schema-stitching-8af23354ac37)
    and a GitHub repository for the most simple level, [schema](https://github.com/stubailo/schema-stitching-demo)
    stitching,^([^(29)](#fn29)) as shown in Figure [8-1](#471428_1_En_8_Chapter.xhtml#Fig1).


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig1_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig1_HTML.jpg)


    Figure 8-1 Schema stitching demo from Stubailo


    What happens in this patchwork is that two queries are being stitched together:


    *   The event

    *   The weather forecast


    They are in two separate servers, but they know each other’s URLs. That way they
    can do the integration.


    See the Apollo documentation^([^(30)](#fn30)) ([`https://www.apollographql.com/docs/graphql-tools/schema-stitching.html`](https://www.apollographql.com/docs/graphql-tools/schema-stitching.html))
    for more details.


    The consequences are clear:


    *   You should investigate whether someone else already created (parts of) an
    API, which you can take advantage of.

    *   You should not try to solve everything at the same time. Instead, take a patchworking
    approach.

    *   You should cooperate and share within your working scope so that everybody
    contributes to the GraphQL API space of which you are a part.


    Combined with the fact that there are also tools for generating mockup data from
    a GraphQL schema, you have rich possibilities for applying iterative development
    and parallel development of frontend and backend. But, having a roadmap and having
    a high-level concept map of the major anticipated object types is a great help.


    ## Presenting the Right Level of Detail


    Abstraction is the strongest weapon in your arsenal. Abstraction works like layers,
    as shown in Figure [8-5](#471428_1_En_8_Chapter.xhtml#Fig5).


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig5_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig5_HTML.jpg)


    Figure 8-5 Generalization versus specialization


    So you can generalize originator addresses and destination addresses to be just
    addresses. Or you can specialize addresses into being originators and destinations.'
