  trans: '

    ## 获取概览


    如果你还不了解范围，你需要对你正在为其创建模式的领域有一个概览。


    图 3-1 展示了一个汽车经销商中一些业务概念的概览。


    ![../images/471428_1_En_3_Chapter/471428_1_En_3_Fig1_HTML.jpg](img/471428_1_En_3_Fig1_HTML.jpg)


    图 3-1：汽车经销商概念概览


    注意，上层往往是分类和其他层级结构。中间层级是参与业务流程的核心业务对象。


    有趣的是，最低层的概念都是业务事件或其他记录，其中一些是快照类型（比如特定日期的库存）。


    这样的概览将为你的 API 工作提供一个良好的开端，所以花几个小时在白板上创建一个概览，让其他业务人员评审它，并让它指导你后续的模式定义活动。


    你也可以考虑从数据源开始自下而上地构建概览。通常，自上而下和自下而上相结合的方式能给你带来所需的结果。


    请注意，最低层的概念实际上是业务的价值链——从预算开始，演变为采购，然后到库存和销售。（再到后续的维护和盈利能力计算。）


    显然，不应存在“孤岛”——一切都应该与其他事物相连。


    你可以在我的名为 *《NoSQL 与 SQL 的图数据建模》* [*Graph Data Modeling for* [*NoSQL and SQL*](https://technicspub.com/graph-data-modeling/)
    ](https://technicspub.com/graph-data-modeling/) 的书中了解更多关于概念级分析和设计的内容，^(²⁰) 2016，Technics
    Publications (访问 [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling/)
    )。


    注意，即使像汽车经销商这样简单的业务运营，其连接程度也很高。显然，图表示是可行之道，`GraphQL` 开发者可以从这些如今被称为“企业知识图谱”的高层次地图中学到很多。


    *一旦你开始审视字段属性，模式数据设计就会变得清晰可见，因为承载属性的概念是业务对象，而没有属性的概念可能只是抽象概念，你可能希望根据需要将其剔除或用属性进行描述。*


    请注意，即使你应该尝试映射整个企业（在高层次概念图上），也不应采取太多或太大的步骤。事实上，`GraphQL` 社区近期的进展鼓励采用渐进式方法，并复用现有的模式部分与新开发的模式部分。我们将在后面的章节简要讨论这一点（模式拼接和模式绑定）。


    我们正在探讨定义 `GraphQL` 模式和 API。物理的数据存取操作隐藏在解析器函数中，我们将在本书最后部分提及它们。


    我们的重点既在于内容含义的业务方面，也在于相关数据的结构方面。


    准确地说，我们寻找的是：


    *   含义

    *   结构


    *这就是为什么图可视化是查看结构化信息的通用关键。*


    可以公允地说，本书的视觉部分提出了属性图建模风格作为 `GraphQL` 模式的最佳设计模式。


    脚注 1


    # 4. 一个电子邮件示例


    `GraphQL 模式`是一个*数据图*，包含网络中的相关概念，组织为有向图。在某种程度上，你可以说 `GraphQL` 方法让一切都看起来像一个图！（反正实际情况也确实如此。）


    这使得所谓的属性图方法对于 `GraphQL 模式` 设计师来说，是一个强大的可视化机会。


    我们将从一个简单的电子邮件图数据模型开始。首先，让我们了解一下电子邮件的基本概念（如名为 `RFC 5322` 的互联网消息格式标准所定义）。参见图 4-1。


    ![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig1_HTML.jpg](img/471428_1_En_4_Fig1_HTML.jpg)


    图 4-1：电子邮件概念概览


    图 4-1 忠实于互联网标准中实际使用的术语。如果你试图由此构建一个经典的、规范化数据模型，这会引起问题，我们稍后会讨论。


    注意，有些关系是一对一的（例如，来自 `地址` 的 `发件人`），而另一些是多对多的（例如，`关键词` 标记 `消息`）。也存在一些一对多的关系。我们将回到这个问题，但请务必记住：


    ***注意：关系基数性很重要，因为尽管 `GraphQL` 是一个有向图范式，但在 `GraphQL 模式` 内的可能查询集合是源自根查询的所有子树的子图集合。***


    稍微离题一点：这个电子邮件主题领域有点复杂，所以我们暂时跳过消息重发的业务。


    让我们继续以详细的属性图形式描述 `GraphQL` 数据范围的边界，如图 4-2 所示。


    ![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig2_HTML.jpg](img/471428_1_En_4_Fig2_HTML.jpg)


    图 4-2：电子邮件作为属性图


    注意，图 4-2 在概念模型上添加了小的属性框。这是在同一图表中描述结构和内容的一种紧凑方式。这使得该图表成为一个真正的属性图模型。（你可以在我的名为 *《NoSQL
    与 SQL 的图数据建模》* [*Graph*](https://technicspub.com/graph-data-modeling/) *Data Modeling
    for NoSQL and SQL* ](https://technicspub.com/graph-data-modeling/) 的书中了解更多关于属性图的内容，^(²¹)
    2016，Technics Publications。参见 [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling)
    。）


    概括一下，圆圈是*概念*，它们是图的*节点*。例如，消息是一个概念，它是多个关系的一部分，比如发件人（谁发送了消息）或“回复自”（回复的是哪条其他消息）。属性可以附加到概念（节点）和/或关系（图的边）上。


    该符号使用箭头表示基数性。在图 4-2 中，你可以找到一对一、一对多和多对多的关系。有关属性图的简要解释，^(²²) 参见 [`http://bit.ly/2hMNYvE`](http://bit.ly/2hMNYvE)
    。


    在 `GraphQL` 背景下，属性图对于表示模式的结构很有用：


    ![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig3_HTML.jpg](img/471428_1_En_4_Fig3_HTML.jpg)


    图 4-3：简化的电子邮件属性图


    *   *节点是类型（对象类型、接口类型和联合类型）*

    *   *关系表示类型之间的连接*

    *   *属性是类型的字段（标量或列表）*


    **注意** 事实上，如果你愿意“忘记”一些业务概念（比如 `发件人` 和 `收件人`），你可以将模型简化得更紧凑。参见图 4-3。

    '
- fmt: "Notice that in the compact version shown in Figure 4-3, there are more M:M\
    \ relationships. A logical model like that (yes, logical models may include M:M)\
    \ is problematic with SQL source, but makes good sense in a graph database.\n\n\
    Note that in property graphs, the relationships are named. This is important because\
    \ those names are part of the business semantics, and by visualizing them, it\
    \ is much easier to review and discuss the meaning imposed by the structure. `Graphcool`\
    \ offers a `@relation` directive for getting the names of the relationships into\
    \ the schema. This is a very good idea.\n\nThe property graph representation is\
    \ considerably more compact than the “boxes and arrows” method found in most diagramming\
    \ approaches. In the `GraphQL` space, there is a tool called `GraphQL Voyager`\
    \ ([`https://apis.guru/graphql-voyager/`](https://apis.guru/graphql-voyager)).\
    \ The `Voyager` is based on a standard data model diagramming library, which is\
    \ in the “boxes and arrows” style. Getting a solid grip on the structure across,\
    \ say, five or eight object types is not easy. The property graph representation\
    \ is much more compact and has been successful over the last 15 years, and it\
    \ comes out of the Nordics. `Neo4J`, based in Malmö, invented the property graph\
    \ model as a data model, and they are now a leading player in the graph database\
    \ segment worldwide. The property graph style proposed here was designed by the\
    \ author in his 2016 book on *Graph Data Modeling for SQL and NoSQL*.\n\nAt this\
    \ point, we have dealt with schema visualization, and that makes `GraphQL` pretty\
    \ and good:\n\n*   Alignment with business terminology and definitions (structure\
    \ and content fields)\n*   Understanding complex schemas, structured as graphs\n\
    \nExpressed in the `GraphQL Schema Definition Language (SDL)`, the (non-compacted)\
    \ email data model could be specified along these lines:\n\n```graphql\n#\n# Email\
    \ Graph Data Model\n#\n# GraphQL Schema\n#\n# Based on Internet Message Format\
    \ RFC5322, but simplified somewhat\n#\n# Copyright Thomas Frisendal, 2017\n#\n\
    \nscalar Datetime\nscalar AddrSpec\nenum destination_role {\n  To\n  Cc\n  Bcc\n\
    }\n\nenum originator_role {\n  From\n  Sender\n  Reply to\n}\n\ntype Address {\n\
    \  id: ID!\n  display_name: String\n  address_spec: AddrSpec!\n  address_from:\
    \ Originator! @relation(name: \"From\")\n  address_sender: Originator @relation(name:\
    \ \"Sender\")\n  address_reply_to: Originator @relation(name: \"ReplyTo\")\n \
    \ destination_to: [Destination] @relation(name: \"To\")\n  destination_cc: [Destination]\
    \ @relation(name: \"Cc\")\n  destination_bcc: [Destination] @relation(name: \"\
    Bcc\")\n}\n\ntype Originator {\n  id: ID!\n  origin_date: Datetime!\n  originator_role:\
    \ originator_role!\n  message: [Message!] @relation(name: \"Originator\")\n  address_from:\
    \ Address! @relation(name: \"From\")\n  address_sender: Address @relation(name:\
    \ \"Sender\")\n  address_reply_to: Address @relation(name: \"ReplyTo\")\n}\n\n\
    type Destination {\n  id: ID!\n  destination_role: destination_role!\n  received_date:\
    \ Datetime!\n  message: Message! @relation(name: \"Destination\")\n  address_to:\
    \ [Address]! @relation(name: \"To\")\n  address_cc: [Address] @relation(name:\
    \ \"Cc\")\n  address_bcc: [Address] @relation(name: \"Bcc\")\n}\n\ntype Message\
    \ {\n  id: ID!\n  subject: String\n  comments: String\n  originator: Originator!\
    \ @relation(name: \"Originator\")\n  destinations: [Destination]! @relation(name:\
    \ \"HasDestination\")\n  referencing: [Message] @relation(name: \"Referencing\"\
    )\n  in_reply_to: [Message] @relation(name: \"InReplyTo\")\n  keywords: [Keyword]\
    \ @relation(name: \"Tags\")\n}\n\ntype Keyword {\n  id: ID!\n  keyword: String!\
    \ @isUnique\n  messages: [Message] @relation(name: \"Tags\")\n}\n\ntype Query\
    \ {\n  messages(limit: Int = 20): [Message]!\n}\n\nschema {\n  query: Query\n\
    }\n```\n\nNote that this example uses the `Graphcool`-invented schema directive\
    \ `@relation`, which, not the least, names the relationships. This is a feature\
    \ that I strongly recommend.\n\nAlso note that the schema code is not complete\
    \ and will probably give syntax errors if you try to use it directly. `GraphQL`\
    \ platforms do have extensions of their own. This example, when used on `Graphcool`,\
    \ has issues with underscores and missing `@model` directives, for example. On\
    \ the other hand, a subset of this example was used with `Neo4j` as a basis for\
    \ a new graph database, without problems.\n\n*Also note that the property graph\
    \ diagram is many times easier to read and understand than the schema definition\
    \ syntax!*\n\nLet’s see what kinds of issues this design could contain.\n\n##\
    \ 5. Business Meaning\n\nThe meaning part is really owned by the business. The\
    \ business folks have the privilege of deciding on their terminology. Applications\
    \ or microservices are business facing and should talk the language of the business.\
    \ That goes for the data content as well."
