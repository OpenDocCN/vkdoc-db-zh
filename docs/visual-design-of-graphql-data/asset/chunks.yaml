    \ have a one-step approach to modeling, which is performed when necessary in the\
    \ development process. Logical and physical models have come together. The driving\
    \ force is time to delivery, and what the unified process is trying to answer\
    \ are two aspects of developing a good solution:\n\n*   Describing the “what”\
    \ in terms of a logical data model\n\n*   Describing some aspects of the “how,”\
    \ e.g., physical access optimization for better performance\n\nIn the GraphQL\
    \ context, the aim is complete independence between applications (or users) and\
    \ data stores. Since we (in this book) are only interested in the schema(s) and\
    \ queries, we should focus on the “what” question.\n\nIn other words, we need\
    \ a fresh take on the conceptual level. It still adds business value, because\
    \ it is a tool to communicate effectively with business folks about things like\
    \ terminology, relationships, and the like. This is why visualization techniques\
    \ must play a dominant role.\n\nSecondly, we should also nurse the “logical level,”\
    \ since it (the schema) is a designed artifact encompassing design decisions about\
    \ scope, generalizations, abstractions and aggregations, relationships and presentation.\
    \ Again, visualization is a great tool for understanding and for communication.\n\
    \nFor the physical level we have various use cases of the resolver functions.\
    \ We look at some of the requirements in chapters toward the end of the book.\
    \ We describe some considerations, which can influence the resolver functionality,\
    \ but we are not giving specific code examples, such as JavaScript or similar.\n\
    \nBut let us start at the top. A good way to get going is to try to understand\
    \ and scope the subject area."
  trans: "\n# 2. GraphQL 概念\n\nGraphQL 上下文中定义了许多概念。图 2-1 所展示的概念模型囊括了所有重要的概念。\n\n![../images/471428_1_En_2_Chapter/471428_1_En_2_Fig1_HTML.jpg](img/471428_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1 GraphQL 概念\n\n(有关所有模式的详细信息，请参阅 GraphQL 模式介绍 [`http://graphql.org/learn/schema/`](http://graphql.org/learn/schema/)^[15])。关于图\
    \ 2-1 所示的图表风格，有几点说明：\n\n*   它是一个有向图（属于概念图类别）\n*   关系是有名称的\n*   关系可以是：\n    * \
    \  一对一（无箭头）\n    *   一对多（单箭头）\n    *   多对多（双侧箭头，图 2-1 中未出现）。\n\n您可以在我的著作 `Graph\
    \ Data Modeling for NoSQL and SQL`^[16], 2016, Technics Publications (访问 [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling/))\
    \ 中了解更多关于这种图表风格的信息。\n\n一些概念，如 `Mutation`、`Input`、`Function` 和 `Subscription`，属于应用/服务器构建服务（更新、插入、数据库映射和推送服务），它们也是模式的一部分。然而，由于我的关注点在于所暴露模型自身的结构和含义，因此在接下来的讨论中，我将忽略所有这些内容。\n\
    \n其余的概念大多如其名所示。以下是一些简短的解释：\n\n| 概念 | 解释 |\n| --- | --- |\n| GraphQL 模式 | 定义了所暴露数据模型的结构和含义（以及数据操作函数，这里我们不讨论这些函数）。\
    \ |\n| 枚举 | 基本上是一个值列表，可应用于某个字段。 |\n| 查询 | 根查询定义了应用程序图（树）的锚点，并塑造了结果集。 |\n| 接口 |\
    \ 本质上是对象（或查询）的一个“视图”；常用于“子类型化”。 |\n| 联合 | 共享相关内容的结果子图的串联。例如，各种类型的人物，如用户、演员等。 |\n\
    | 对象 | 一个业务对象（可以想想星球大战示例中的 `电影` 或 `星际飞船`）。 |\n| 片段 | 子图的一个子集。内联片段通常与联合结构一起使用。\
    \ |\n| 字段 | 承载数据的部分。可以是标量或列表（是的，就像重复组一样）。 |\n| 指令 | 用户可定义的 GraphQL 语法扩展。 |\n\n\
    `@relation` 是一个很好的 GraphQL 指令示例。它是由 Graphcool^[17] 引入的（参见 [`http://www.graph.cool/`](http://www.graph.cool/)）。我非常喜欢它，因为它命名了关系。\n\
    \n否则，你只是像这样连接对象类型：\n\n```\nType Movie { ..... actors: [Actor] } )\n```\n\n通常，可复用的\
    \ GraphQL 模式指令可用于多种目的：\n\n*   强制访问权限\n*   格式化日期字符串\n*   为特定后端自动生成解析器函数\n*   标记字符串以进行国际化\n\
    *   合成全局唯一标识符\n*   指定缓存行为\n*   跳过、包含或弃用字段\n*   以及更多\n\n所有详细信息请参见 Ben Newman^[18]\
    \ 的博文 [`https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1`](https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1)。\n\
    \n请注意，在 GraphQL 规范^[19]（参见 [`https://github.com/facebook/graphql/blob/master/spec/GraphQL.md`](https://github.com/facebook/graphql/blob/master/spec/GraphQL.md)）的最新工作草案中，以下类型可以由用户定义的扩展进行扩展：标量、对象、接口、联合、枚举和输入对象。这可能会被本地服务用来表示\
    \ GraphQL 客户端仅在本地访问的数据，或者被本身就是另一个 GraphQL 服务扩展的 GraphQL 服务所使用。扩展可以是常量、指令或字段定义。\n\
    \n我们感兴趣的模式部分的语法图，在元层面上如图 2-2 所示。\n\n![../images/471428_1_En_2_Chapter/471428_1_En_2_Fig2_HTML.jpg](img/471428_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2 GraphQL 语法元素\n\n圆角矩形表示它们所连接的概念（对象类型）的属性。\n\n让我们从总体上看看数据设计问题，并确定在 GraphQL\
    \ API 上下文中哪些问题是相关的。\n\n# 3. 入门指南\n\n## 哪些设计层次？\n\n经典的数据建模在多个方面都失败了。我们必须做得比那更好。效果不佳的是概念建模，它已经逐渐淡出，取而代之的可以说是“伟大、实用、快速、统一的数据建模实践”。\n\
    \n如今，许多开发组织采用一步到位的建模方法，在开发过程中必要时执行。逻辑模型和物理模型已经合并。驱动力是交付时间，而统一过程试图回答的是开发一个良好解决方案的两个方面：\n\
    \n*   用逻辑数据模型描述“是什么”\n*   描述“如何做”的某些方面，例如，为获得更好性能而进行的物理访问优化\n\n在 GraphQL 上下文中，目标是实现应用程序（或用户）与数据存储之间的完全独立。由于我们（在本书中）只对模式和查询感兴趣，我们应该专注于“是什么”的问题。\n\
    \n换句话说，我们需要对概念层次有一个全新的视角。它仍然能增加业务价值，因为它是与业务人员有效沟通术语、关系等事物的工具。这就是为什么可视化技术必须发挥主导作用。\n\
    \n其次，我们也应该培育“逻辑层次”，因为它（模式）是一个包含关于范围、泛化、抽象和聚合、关系与呈现等设计决策的人工制品。同样，可视化是理解和沟通的绝佳工具。\n\
    \n对于物理层次，我们有解析器函数的各种用例。我们将在本书后面的章节中探讨一些需求。我们会描述一些可能影响解析器功能的考虑因素，但不会给出具体的代码示例，比如\
    \ JavaScript 或类似的。\n\n但让我们从头开始。一个好的起点是尝试理解并界定主题领域。\n"
- fmt: '## Getting an Overview


    If you don’t know the scope already, you need to get an overview of a subject
    area that you are creating a schema for.


    Figure [3-1](#471428_1_En_3_Chapter.xhtml#Fig1) shows an overview of some business
    concepts in a car dealership.


    ![../images/471428_1_En_3_Chapter/471428_1_En_3_Fig1_HTML.jpg](images/471428_1_En_3_Chapter/471428_1_En_3_Fig1_HTML.jpg)


    Figure 3-1: Car dealership concepts overview


    Notice how the upper levels tend to be classifications and other hierarchies.
    The levels in the middle are the core business objects engaged in the business
    processes.


    The concepts at the lowest level are, interestingly enough, all business events
    or other records, some of which are the snapshot type (like inventory on a given
    date).


    Such an overview will give you a head start on the API, so spend a few hours on
    creating one on a whiteboard, have other business people review it, and let it
    guide the rest of your schema-definition activities.


    You can also consider building an overview bottom up from the data sources. Frequently
    a combination of top down and bottom up gives you what you need.


    Note that the concepts on the lowest level are actually the value chain of the
    business—starting with budget morphing into procurement and then to inventory
    and sales. (And later to maintenance and to profitability calculations.)


    Obviously, there should be no “islands”—everything should be connected to something.


    You can learn a lot more about concept-level analysis and design in my book entitled
    *Graph Data Modeling for* [*NoSQL and SQL*](https://technicspub.com/graph-data-modeling/)
    ,^([^(20)](#fn20)) 2016, Technics Publications (visit [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling/)
    ).


    Notice the high degree of connectedness of even a simple business operation such
    as a car dealership. Clearly graph representation is the way to go, and `GraphQL`
    developers can learn a lot from such high-level maps, which today are called “enterprise
    knowledge graphs”.


    *Once you get into looking at field properties, the schema data design will become
    clearly visible, because concepts, which carry properties, are business objects,
    whereas concepts without properties are probably just abstractions, which you
    may wish to get rid of, or describe with properties, as appropriate.*


    Note that even though you should try to map the enterprise (on a high-level concept
    map), you should not take too many, or too big, steps. In fact, recent developments
    in the `GraphQL` community encourage a stepwise approach and reuse of existing
    schema parts together with freshly developed schema parts. We will return briefly
    to this (schema stitching and schema binding) in a later chapter.


    We are looking at defining `GraphQL` schemas and APIs. The physical gofers are
    hidden in resolver functions and we will mention them in the last part of this
    book.


    Our focus is on both the business aspects of meaning of content and also on the
    structural aspects of related data.


    To be precise, what we are looking for is:


    *   Meaning

    *   Structure


    *This is why graph visualization is the universal key to looking at structured
    information.*


    It is fair to say that the visual parts of this book propose the property graph
    modeling style as the best design pattern for `GraphQL` schemas.


    Footnotes [1](#471428_1_En_3_Chapter.xhtml#Fn1_source)


    # 4. An Email Example


    The `GraphQL Schema` is a *data graph* containing related concepts in a network,
    organized as a directed graph. In a way, you could say that the `GraphQL` approach
    makes everything look like a graph! (Which is actually the case, anyway.)


    This makes the so-called property graph approach to graph visualization a powerful
    opportunity for the `GraphQL Schema` designer.


    We will work from a simple email graph data model. First let’s get an overview
    of the basic concepts of email (as defined in the Internet Message Format standard
    called `RFC 5322`). See Figure [4-1](#471428_1_En_4_Chapter.xhtml#Fig1).


    ![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig1_HTML.jpg](images/471428_1_En_4_Chapter/471428_1_En_4_Fig1_HTML.jpg)


    Figure 4-1: Email concepts overview


    Figure [4-1](#471428_1_En_4_Chapter.xhtml#Fig1) is loyal to the terminology actually
    used in the Internet standard. This gives rise to issues, if you try to build
    a classic, normalized data model from this, which we discuss shortly.


    Notice that some relationships are one-to-one (for example, `Originator` from
    `Address`), whereas other are many-to-many (e.g., `Keyword` tags `Message`). There
    are also some one-to-many relationships. We will come back to this issue, but
    please make a mental note of this:


    ***Caveat: Relationship cardinalities matter, because although `GraphQL` is a
    directed graph paradigm, the set of possible queries within a `GraphQL Schema`
    is a subset of sub-graphs all originating as sub-trees from the root query. ***


    Descoping a little bit: This email subject area is a bit complex, so let’s skip
    the business of resending messages for now.


    Let’s move on to describe the scope of the `GraphQL` data scope in the form of
    a detailed property graph, as shown in Figure [4-2](#471428_1_En_4_Chapter.xhtml#Fig2).


    ![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig2_HTML.jpg](images/471428_1_En_4_Chapter/471428_1_En_4_Fig2_HTML.jpg)


    Figure 4-2: Email as a property graph


    Notice that Figure [4-2](#471428_1_En_4_Chapter.xhtml#Fig2) adds little property
    boxes to the concept model. This is a compact way of describing structure and
    content in the same diagram. This makes the diagram a true property graph model
    . (You can learn much more about property graphs in my *book entitled* [*Graph*](https://technicspub.com/graph-data-modeling/)
    *Data Modeling for NoSQL and SQL*,^([^(21)](#fn21)) 2016, Technics Publications.
    See [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling)
    .)


    To recap, the circles are *concepts*, which are the *nodes* of the graph. A message,
    for example, is a concept, and it is part of several relationships, such as the
    originator (who sent the message) or “in reply to” (which other message is replying
    to). The properties can be attached to concepts (nodes) and/or relationships (edges
    of the graph).


    The notation uses arrowheads for cardinalities. In Figure [4-2](#471428_1_En_4_Chapter.xhtml#Fig2),
    you find one-to-one, one-to-many, and many-to-many relationships. For a brief
    explanation of property graphs,^([^(22)](#fn22)) see [`http://bit.ly/2hMNYvE`](http://bit.ly/2hMNYvE)
    .


    In the `GraphQL` context, the property graph is useful for representing the structure
    of the schema:


    ![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig3_HTML.jpg](images/471428_1_En_4_Chapter/471428_1_En_4_Fig3_HTML.jpg)


    Figure 4-3: Email property graph simplified


    *   *Nodes are types (object types, interface types, and union types)*

    *   *Relationships represent the connections between types*

    *   *Properties are the fields of the types (scalars or lists)*


    **Note** As a matter of fact, if you are willing to “forget” some of the business
    concepts (like `Originator` and `Destination`), you can reduce the model to be
    more compact. See Figure [4-3](#471428_1_En_4_Chapter.xhtml#Fig3).'
