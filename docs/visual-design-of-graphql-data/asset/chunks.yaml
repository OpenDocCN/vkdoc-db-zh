- fmt: '## Data Names in the API Matter


    Since many physical data stores may be schema-free or schema-on-read, where the
    “schema” is inferred when reading the data, we need a layer of presentation to
    business users, using business terms. That layer is our `GraphQL` API.


    Even more challenging is that much of the (big) data that people want to analyze
    is more or less machine generated or system generated. Again, this calls for a
    user-facing data terminology layer toward the business environment. Finally, even
    in integration projects, standardizing business names is necessary to obtain acceptance
    in the business user community.


    Names include object type names (e.g., `originator`), property names (e.g., `display
    name` of the address), and relationship names (e.g., `cc`).


    Relationship names are important because they are also used to infer the type
    of the relationship (dependency). Action verbs indicate activity on business objects,
    whereas weak verbs like “has” etc. indicate ordinary functional dependencies between
    an identifier of a business object type and its properties.


    Relationships are bidirectional, as shown in Figure 5-1.


    ![../images/471428_1_En_5_Chapter/471428_1_En_5_Fig1_HTML.jpg](images/471428_1_En_5_Chapter/471428_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Read from right to left or vice versa


    For those reasons, names matter. However, I tend only to write the name coming
    from the parent. That is the `originator` in this case, since left-to-right ordering
    is applied (Western cultural conventions).


    What is important is that some linking phrases (the names of relationships) contain
    verbs, and verbs imply that an “actor” makes something happen. In other words,
    the relationship denotes something, which is more than a plain property depending
    on the identity of something. This makes the target a candidate for being identified
    as a business object type.


    Names should be backed up by solid definitions (as comments or descriptions) wherever
    there is risk of ambiguity. Definitions of core business concepts last a long
    time and reach many people. This means that they should not only be precise and
    to the point, they should also communicate well and be easy to remember.


    Names should be as specific as they can get. For example, avoid using `Address`
    if what you are talking about is `Destination Address`.


    Note that `GraphQL` has a nice, simple way to support subtyping by way of defined
    interfaces. In the email example, we could consider setting up `Originator` and
    `Destination` as interfaces, both implementing a `Contact` type. It would look
    like the following.


    First as the two types:


    ```

    1   type Originator {

    2     id: ID!

    3     origin_date: Datetime!

    4     message: : [Message!]  @relation(name: "Originator")

    5     address_from: Address! @relation(name: "From")

    6     address_sender: Address @relation(name: "Sender")

    7     address_reply_to: Address @relation(name: "ReplyTo")

    8   }


    10   type Destination {

    11     id: ID!

    12     destination_role: destination_role!

    13     received_date: Datetime!

    14     message: Message! @relation(name: "Destination")

    15     address_to: [Address]! @relation(name: "To")

    16     address_cc: [Address] @relation(name: "Cc")

    17     address_bcc: [Address] @relation(name: "Bcc")

    18   }

    ```


    And here is an interface construct:


    ```

    1   interface Contact {

    2     id: ID!

    3   }


    5   type Originator implements Contact {

    6   origin_date: Datetime!

    7     message: [Message!] @relation(name: "Originator")

    8     address_from: Address! @relation(name: "From")

    9     address_sender: Address @relation(name: "Sender")

    10     address_reply_to: Address @relation(name: "ReplyTo")

    11   }


    13   type Destination implements Contact {

    14   destination_role: destination_role!

    15     received_date: Datetime!

    16     message: Message! @relation(name: "Destination")

    17     address_to: [Address]! @relation(name: "To")

    18     address_cc: [Address] @relation(name: "Cc")

    19     address_bcc: [Address] @relation(name: "Bcc")

    20   }

    ```


    We did not use interfaces in our email design, because the overlap between the
    two are minimal. However, interface names should also be valid business names.


    The quality of the content of the API results depends on the business semantics
    and on the actual data delivered by the API. We dealt with the structure and the
    terminology in the property graphs, so next we need to handle the actual data
    content properly. However, remember that meaning and content go together. If you
    change the semantics, then you may have to refactor the data.


    ### Note


    Do name checks of the content of the property graph(s) together with some subject
    area experts to get the semantics sorted out.


    In cases of mismatch between business terminology and the data names in the databases,
    somebody will have to do something at the resolver level. More about that later.


    ## Finding Standard Data Structures


    Another thing to think about before you set up the schema is standard patterns.
    Many areas of various kinds of business activities and ditto objects have already
    been defined as best practice data models.


    For example, a `Company Location` property seems to be a bit under-designed. Locations
    are geographical addresses, which are business addresses. There are several best
    practices out there for many general object types. See for example `schema.org`
    or various national or international standards.


    How can we detect that something is missing about, for example, company locations?
    One indicator could be that the precise linking phrase contains an action verb:
    `located at`. Action verbs tend to denote relationships between object types,
    not between objects and their properties.


    So, looking for standard patterns is another check to do before releasing your
    schema.'
  raw: '## Data Names in the API Matter


    Since many physical data stores may be schema-free or schema-on-read, where the
    “schema” is inferred when reading the data, we need a layer of presentation to
    business users, using business terms. That layer is our GraphQL API.


    Even more challenging is that much of the (big) data that people want to analyze
    is more or less machine generated or system generated. Again, this calls for a
    user-facing data terminology layer toward the business environment. Finally, even
    in integration projects, standardizing business names is necessary to obtain acceptance
    in the business user community.


    Names include object type names (e.g., originator), property names (e.g., display
    name of the address), and relationship names (e.g., cc).


    Relationship names are important because they are also used to infer the type
    of the relationship (dependency). Action verbs indicate activity on business objects,
    whereas weak verbs like “has” etc. indicate ordinary functional dependencies between
    an identifier of a business object type and its properties.


    Relationships are bidirectional, as shown in Figure [5-1](#471428_1_En_5_Chapter.xhtml#Fig1).


    ![../images/471428_1_En_5_Chapter/471428_1_En_5_Fig1_HTML.jpg](images/471428_1_En_5_Chapter/471428_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Read from right to left or vice versa


    For those reasons, names matter. However, I tend only to write the name coming
    from the parent. That is the “originator” in this case, since left-to-right ordering
    is applied (Western cultural conventions).


    What is important is that some linking phrases (the names of relationships) contain
    verbs, and verbs imply that an “actor” makes something happen. In other words,
    the relationship denotes something, which is more than a plain property depending
    on the identity of something. This makes the target a candidate for being identified
    as a business object type.


    Names should be backed up by solid definitions (as comments or descriptions) wherever
    there is risk of ambiguity. Definitions of core business concepts last a long
    time and reach many people. This means that they should not only be precise and
    to the point, they should also communicate well and be easy to remember.


    Names should be as specific as they can get. For example, avoid using Address
    if what you are talking about is Destination Address.


    Note that GraphQL has a nice, simple way to support subtyping by way of defined
    interfaces. In the email example, we could consider setting up `Originator` and
    `Destination` as interfaces, both implementing a Contact type. It would look like
    the following.


    First as the two types:


    ```

    1   type Originator {

    2     id: ID!

    3     origin_date: Datetime!

    4     message: : [Message!]  @relation(name: "Originator")

    5     address_from: Address! @relation(name: "From")

    6     address_sender: Address @relation(name: "Sender")

    7     address_reply_to: Address @relation(name: "ReplyTo")

    8   }


    10   type Destination {

    11     id: ID!

    12     destination_role: destination_role!

    13     received_date: Datetime!

    14     message: Message! @relation(name: "Destination")

    15     address_to: [Address]! @relation(name: "To")

    16     address_cc: [Address] @relation(name: "Cc")

    17     address_bcc: [Address] @relation(name: "Bcc")

    18   }

    ```


    And here is an interface construct:


    ```

    1   interface Contact {

    2     id: ID!

    3   }


    5   type Originator implements Contact {

    6   origin_date: Datetime!

    7     message: [Message!] @relation(name: "Originator")

    8     address_from: Address! @relation(name: "From")

    9     address_sender: Address @relation(name: "Sender")

    10     address_reply_to: Address @relation(name: "ReplyTo")

    11   }


    13   type Destination implements Contact {

    14   destination_role: destination_role!

    15     received_date: Datetime!

    16     message: Message! @relation(name: "Destination")

    17     address_to: [Address]! @relation(name: "To")

    18     address_cc: [Address] @relation(name: "Cc")

    19     address_bcc: [Address] @relation(name: "Bcc")

    20   }

    ```


    We did not use interfaces in our email design, because the overlap between the
    two are minimal. However, interface names should also be valid business names.


    The quality of the content of the API results depends on the business semantics
    and on the actual data delivered by the API. We dealt with the structure and the
    terminology in the property graphs, so next we need to handle the actual data
