- fmt: "# 2. GraphQL Concepts\n\nThere are a number of concepts defined in the GraphQL\
    \ context. The concept model shown in Figure 2-1 lays out all the important ones.\n\
    \n![../images/471428_1_En_2_Chapter/471428_1_En_2_Fig1_HTML.jpg](images/471428_1_En_2_Chapter/471428_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1 GraphQL concepts\n\n(Refer to the GraphQL Schema introduction at\
    \ [`http://graphql.org/learn/schema/`](http://graphql.org/learn/schema/) for all\
    \ the schema details.^[15]) A few words on the diagram style shown in Figure 2-1:\n\
    \n*   It is a directed graph (of the concept map category)\n*   Relationships\
    \ are named\n*   Relationships may be:\n    *   One-to-one (no arrows)\n    *\
    \   One-to-many (arrow)\n    *   Many-to-many (double-sided arrow and not found\
    \ in Figure 2-1).\n\nYou can learn more about this diagramming style in my book\
    \ entitled `Graph Data Modeling for NoSQL and SQL`,^[16] 2016, Technics Publications\
    \ (visit [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling/)).\n\
    \nSome concepts, such as `Mutation`, `Input`, `Function`, and `Subscription`,\
    \ are application/server construction services (updates, inserts, DB mapping,\
    \ and push services), which also are part of the schema. However, since my focus\
    \ is on the structure and meaning of the exposed model in its own right, I disregard\
    \ all of them in the following discussion.\n\nThe rest of the concepts are pretty\
    \ much what their names imply. Here are some one-liner explanations:\n\n| Concept\
    \ | Explanation |\n| --- | --- |\n| GraphQL Schema | Defines the structure and\
    \ the meaning of the exposed data model (as well as the data-manipulation functions,\
    \ which we do not look at here). |\n| Enum | Basically a list of values, which\
    \ can be applied to a field. |\n| Query | The root query defines the anchor point\
    \ of the application graph (tree) and shapes the result sets. |\n| Interface |\
    \ Essentially a “view” of an object (or query); it is frequently used for “subtyping”.\
    \ |\n| Union | A concatenation of results sub-graphs sharing related content.\
    \ For example various types of persons, as in users, actors, etc. |\n| Object\
    \ | A business object (think `Movie` or `Starship` in the Star Wars example).\
    \ |\n| Fragment | A subset of a sub-graph. Inline fragments are typically used\
    \ with union-constructs. |\n| Field | The data-bearing things. Can be scalars\
    \ or lists (yes, like in repeating groups). |\n| Directive | User-definable extensions\
    \ to the GraphQL syntax. |\n\n`@relation` is a good example of a GraphQL directive.\
    \ It is introduced by Graphcool^[17] (see [`http://www.graph.cool/`](http://www.graph.cool/)).\
    \ I like it very much, because it names the relationships.\n\nOtherwise you just\
    \ connect object types like this:\n\n```\nType Movie { ..... actors: [Actor] }\
    \ )\n```\n\nIn general, reusable GraphQL schema directives can be used for a variety\
    \ of purposes:\n\n*   Enforcing access permissions\n*   Formatting date strings\n\
    *   Auto-generating resolver functions for a particular backend\n*   Marking strings\
    \ for internationalization\n*   Synthesizing globally unique identifiers\n*  \
    \ Specifying caching behavior\n*   Skipping, including, or deprecating fields\n\
    *   And much more\n\nSee the blog post from Ben Newman^[18] at [`https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1`](https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1)\
    \ for all the details.\n\nNote that in the latest working draft of the GraphQL\
    \ specification^[19] (see [`https://github.com/facebook/graphql/blob/master/spec/GraphQL.md`](https://github.com/facebook/graphql/blob/master/spec/GraphQL.md)),\
    \ the following types can be extended by user-defined extensions: Scalars, Objects,\
    \ Interfaces, Unions, Enums, and InputObjects. This might be used, for example,\
    \ by a local service to represent data a GraphQL client only accesses locally,\
    \ or by a GraphQL service that is itself an extension of another GraphQL service.\
    \ The extensions can be constants, directives, or field definitions.\n\nThe syntax\
    \ graph of the schema parts, which we are interested in, looks like Figure 2-2\
    \ on the meta level.\n\n![../images/471428_1_En_2_Chapter/471428_1_En_2_Fig2_HTML.jpg](images/471428_1_En_2_Chapter/471428_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2 GraphQL syntax elements\n\nThe rounded rectangles signify properties\
    \ of the concepts (object types) they are connected to.\n\nLet’s look at data\
    \ design issues in general and determine which of those are relevant in the GraphQL\
    \ API context.\n\n# 3. Getting Started\n\n## Which Design Levels?\n\nClassical\
    \ data modeling failed in a number of ways. We have to do better than that. What\
    \ did not work well was conceptual modeling, which has faded away in favor of\
    \ what one could call “The Great Pragmatic and Quick, Unified Data Modeling Practice”.\n\
    \nToday many development organizations have a one-step approach to modeling, which\
    \ is performed when necessary in the development process. Logical and physical\
    \ models have come together. The driving force is time to delivery, and what the\
    \ unified process is trying to answer are two aspects of developing a good solution:\n\
    \n*   Describing the “what” in terms of a logical data model\n*   Describing some\
    \ aspects of the “how,” e.g., physical access optimization for better performance\n\
    \nIn the GraphQL context, the aim is complete independence between applications\
    \ (or users) and data stores. Since we (in this book) are only interested in the\
    \ schema(s) and queries, we should focus on the “what” question.\n\nIn other words,\
    \ we need a fresh take on the conceptual level. It still adds business value,\
    \ because it is a tool to communicate effectively with business folks about things\
    \ like terminology, relationships, and the like. This is why visualization techniques\
    \ must play a dominant role.\n\nSecondly, we should also nurse the “logical level,”\
    \ since it (the schema) is a designed artifact encompassing design decisions about\
    \ scope, generalizations, abstractions and aggregations, relationships and presentation.\
    \ Again, visualization is a great tool for understanding and for communication.\n\
    \nFor the physical level we have various use cases of the resolver functions.\
    \ We look at some of the requirements in chapters toward the end of the book.\
    \ We describe some considerations, which can influence the resolver functionality,\
    \ but we are not giving specific code examples, such as JavaScript or similar.\n\
    \nBut let us start at the top. A good way to get going is to try to understand\
    \ and scope the subject area."
