      [3](#471428_1_En_8_Chapter.xhtml#Fn3_source)   [4](#471428_1_En_8_Chapter.xhtml#Fn4_source)
      [5](#471428_1_En_8_Chapter.xhtml#Fn5_source)


    # 9. From Graph to Trees


    ## Structure Design at the API Level


    The schema definitions are on the server side. What you see at the application
    side is being exposed as a result of the schema design.


    The GraphQL list modifier is an easy way to generate a sub-branch of the result
    tree. In our Email example, we have plenty of lists. For example, the keywords
    tagging a message:


    ```

    keywords: [Keyword] @relation(name: "Tags")

    ```


    Lists can handle nulls, which are syntactically visualized in GraphQL:


    *   The data can be null: `[Keyword]`


    *   The data cannot be null: `[Keyword!]`


    *   The list cannot be null: `[Keyword!]!`


    Another GraphQL construct that can be useful in complex situations is the *union*.


    Remember the design challenge about contacts having interfaces versus not having
    a contact as a type? Unions can help build a consolidated list of contacts (originators
    and destinations):


    ```

    Union Contacts = Originator | Destination

    ```


    However, since the contributing object types may not be completely compatible,
    you may need to use inline fragments in the query:


    ```

    1   {

    2     SearchResult {

    3       ... on Originator {

    4         origin_date

    5       }

    6       ... on Destination {

    7         received_date

    8       }

    9     }

    10   }

    ```


    Refer to the GraphQL documentation^([^(33)](#fn33)) at [`http://graphql.org/learn/`](http://graphql.org/learn)
    for more information.


    In the context of this book, you must remember that we are building a scope for
    result trees sharing a root query (per schema) in the GraphQL API.'
