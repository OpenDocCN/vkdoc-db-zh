  trans: '

    # 使用自定义模式指令


    日期格式化是自定义模式指令的一个典型用例。Ben Newman 有一篇优秀的博文，题为“可复用的 GraphQL 模式指令^(²⁷)，”（[`https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1`](https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1))，其中相当详细地介绍了如何实现它们。


    这里我将仅让你感受一下它的样子（参考 Ben Newman 的博文）。


    首先，定义一个带有默认格式和一个参数的指令：


    ```

    1   directive @formattableDate(

    2     defaultFormat: String = "mmmm d, yyyy"

    3   ) on FIELD_DEFINITION

    4

    5   scalar Date

    6

    7   type Query {

    8     today: Date @formattableDate

    9   }

    ```


    该指令可以被整合进一个模式中，并以不同的格式使用：


    ```

    1   import { graphql } from "graphql";

    2   import { makeExecutableSchema } from "graphql-tools";

    3

    4   const schema = makeExecutableSchema({

    5     typeDefs,

    6     schemaDirectives: {

    7       formattableDate: FormattableDateDirective

    8     }

    9   });

    10

    11   graphql(schema, `query { today }`).then(result => {

    12     // 使用默认的 "mmmm d, yyyy" 格式记录：

    13     console.log(result.data.today);

    14   });

    15

    16   graphql(schema, `query {

    17     today(format: "d mmm yyyy")

    18   }`).then(result => {

    19     // 使用请求的 "d mmm yyyy" 格式记录：

    20     console.log(result.data.today);

    21   });

    ```


    如前所述，Ben Newman 的博文包含了实现此功能所需的所有细节。


    # 设计即决策


    永远不要忘记，API 模式建模关乎 `设计`！设计意味着做出影响解决方案 *业务质量* 的决策。显然，这里存在一个两难境地：


    *   支持当前的业务流程/需要处理的业务问题（现在和未来）

    *   保持简单性


    力求在范围和简单性之间取得平衡的解决方案。将设计决策可视化将使你的世界更简单。


    *既然我们是为业务而设计，最终决策权在业务方！*


    我们继续讨论结构性问题。


    脚注 1   2


    # 8. 构建正确的结构


    ## 哪些对象与哪些关系？


    数据模型的结构当然建立在我们已讨论过的对象类型和关系之上。


    但更普遍的问题源于选择合适的对象。


    我们工具箱中确实有一些普遍适用的工具，如下所示：


    *   抽象、概括和特化（又称聚合）

    *   分类与类型化

    *   生命周期依赖和版本控制

    *   识别层次结构


    也有一些需要注意的问题领域：


    *   一对一关系

    *   多对多关系与嵌套对象类型

    *   树（不同种类的层次结构）


    你最好的帮手之一是具有良好链接短语（依赖关系名称）的概念模型。在白板上创建模型通常就足够了。记住，概念以类似句子的方式（主语/谓语/宾语）与其他概念相关联，例如
    `客户-下单-订单`。


    这些小句子中的动词能告诉你很多关于结构的信息。目标仅仅是一个属性吗？包含“是”或“有”表示属性。或者它是业务对象之间的完整关系？“下单”表示一个完整的关系，因为它意味着一个将业务从一个状态转变到另一个状态的过程。


    ## GraphQL 模式缝合，构建拼凑体


    GraphQL 正朝着由协同工作的联邦服务器组成的拼凑体发展。新功能被称为：


    *   模式缝合

    *   模式委托

    *   模式绑定


    讨论很快变得技术性。相反，让我们关注整体影响。


    基本上，这些新功能允许你：


    *   进行分布式查询，从一组 GraphQL 模式/服务器获取整合结果。

    *   在你自己的模式与他人的模式之间建立集成，无论是在模式层面还是在解析器层面。


    得益于其内省功能，GraphQL 具有高水平的“自我意识”，并且它是强类型的。这意味着集成可以受益于让远程服务器相互内省，以确定谁可以在查询中回答什么。这也为公开可用的
    GraphQL API 开辟了可能性（并且已经有一些这样的 API）。因此，GraphQL 渴望在开放数据领域占据领先地位，该领域一直由 W3C 技术栈和
    SPARQL 端点主导。


    Sashko Stubailo 在 [`https://dev-blog.apollodata.com/graphql-schema-stitching-8af23354ac37`](https://dev-blog.apollodata.com/graphql-schema-stitching-8af23354ac37)
    有一篇不错的博文^(²⁸)，并且有一个用于最简单级别（[模式缝合](https://github.com/stubailo/schema-stitching-demo)）^(²⁹)的
    GitHub 仓库，如图 8-1 所示。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig1_HTML.jpg](img/471428_1_En_8_Fig1_HTML.jpg)


    图 8-1 来自 Stubailo 的模式缝合演示


    在这个拼凑体中发生的是两个查询被缝合在一起：


    *   事件

    *   天气预报


    它们位于两个独立的服务器上，但它们知道彼此的 URL。这样它们就可以进行集成。


    更多细节请参阅 Apollo 文档^(³⁰)（[`https://www.apollographql.com/docs/graphql-tools/schema-stitching.html`](https://www.apollographql.com/docs/graphql-tools/schema-stitching.html)）。


    结果很明确：


    *   你应该调查是否已经有其他人创建了（部分的）API，供你利用。

    *   你不应该试图一次性解决所有问题。相反，采取一种拼凑的方法。

    *   你应该在你的工作范围内合作和共享，以便每个人都为你所处的 GraphQL API 领域做出贡献。


    结合还有从 GraphQL 模式生成模拟数据的工具这一事实，你在应用迭代开发以及前端和后端的并行开发方面拥有丰富的可能性。但是，拥有路线图和预期主要对象类型的高层次概念图会大有帮助。


    ## 呈现适当详细程度


    抽象是你武器库中最强大的武器。抽象像图层一样工作，如图 8-5 所示。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig5_HTML.jpg](img/471428_1_En_8_Fig5_HTML.jpg)


    图 8-5 概括化与特化


    因此，你可以将发起方地址和目的地地址概括化为仅仅“地址”。或者，你可以将地址特化为“发起方”和“目的地”。

    '
- fmt: '### Note


    向上移动到更高层级是泛化；特化则是向下深入到越来越多的细节。


    泛化使事物更具普适性，但同时会丢失一些细节。


    而特化则让你获得更多细节，并随之带来更高的复杂性。问问你的业务专家他们真正想要和需要什么。（通常，他们想要的比需要的多一点，因为他们担心这是唯一能获得它的机会。）


    事实上，电子邮件属性图的压缩版本就是一种泛化，如图[8-6](#471428_1_En_8_Chapter.xhtml#Fig6)所示。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig6_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig6_HTML.jpg)


    图 8-6


    为简化而泛化


    我们将`Originator`和`Destination`泛化，使其不再显式存在。然而，它们所扮演的角色——“发件人”、“收件人”等——作为关系在模式中得以保留。


    另一种降低引用复杂性的有用方法是使用分类，这与特化相关。我们可以引入一个“消息类型”的概念，来指示消息是否为高优先级，如图[8-7](#471428_1_En_8_Chapter.xhtml#Fig7)所示。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig7_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig7_HTML.jpg)


    图 8-7


    优先级作为类型或属性


    显然，通过将`Priority`属性下推到`Message`级别可以简化这一点。


    有时你可能会遇到不寻常的数据结构，这些结构可以用不同的方式处理。


    ### Remember


    始终致力于降低复杂性。


    关系数据建模中规范化方法的问题之一是它会导致大量的表。其中一些表仅作为关系的占位符。


    一种这样的场景是多重类型关系，这种关系有时看起来是合乎逻辑的。


    让我们来看一个三元关系。


    地址可以用作目的地，而目的地可以描述为三种角色：收件人（to）、抄送（cc）和密送（bcc）。这基本上是一个具有三个参与概念的三元关系。


    事实上，多对多关系背后几乎总是存在一个真实的业务对象。在多维（数据仓库）建模中，有一个称为“无事实的事实”的结构，意思是除了指向维度的外键之外没有任何信息的事实表。这样的表是所有关系的源头，而且事实上（双关语），即使无事实的事实，一旦你开始寻找，大多数情况下也具有属性（度量）。见图[8-8](#471428_1_En_8_Chapter.xhtml#Fig8)。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig8_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig8_HTML.jpg)


    图 8-8


    使用“桥接对象类型”解决三元关系


    可视化这种三元关系的另一种好方法是利用属性图模型在关系上设置属性的能力。


    如果你的最终目标是属性图数据库（如`Neo4J`或类似数据库），这种方法效果很好。见图[8-9](#471428_1_En_8_Chapter.xhtml#Fig9)。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig9_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig9_HTML.jpg)


    图 8-9


    作为关系属性的角色


    然而，如果你的数据存储是SQL数据库，你很可能需要将三种业务对象类型实现为三个表。在我看来，表示三种对象类型是公平且切中要害的。角色确实存在，在多对多关系的“桥接表”上使用这种分类是个好主意。


    仔细想想，在关系层级上使用属性的另一个常见用途是“权重”。它表示，例如，参与度或部分所有权或类似的局部度量。这当然可以在属性图中作为边上的属性来实现，但在大多数人的观念中，一个“参与度”业务对象类型会更有意义。这让我们回到一个观点：多对多关系中，经常能找到一些实质性的东西，就像前面的例子一样。


    ### Note


    在`GraphQL`模式中，关系——无论是简单的名称-名称引用还是`Graphcool`模式指令`@relation`——都是不携带信息的。这让你可以选择使用专门的对象类型来承载描述关系的属性。这是一个解析器（resolver）的问题。


    另一个奇特的例子是一对一关系。对象类型及其属性之间总是一对一关系，也称为*依赖*（dependencies）。但一对一关系也确实发生在业务对象类型之间。虽然不那么常见。例子往往更多属于业务规则领域，而不是数据模型领域。图[8-10](#471428_1_En_8_Chapter.xhtml#Fig10)展示了一个我们之前见过的例子。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig10_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig10_HTML.jpg)


    图 8-10


    每个发件人只有一个来源


    每个发件人只有一个“发件人”地址，对我来说，这似乎是互联网电子邮件历史遗留设计中的一项业务决策。发件人是一组“发件人”地址的邮件是完全可以想象的。


    然而，值得检查该关系是否携带信息。就像前面的例子那样，情况可能如此。可以想象，“回复”（in reply to）关系承载了一个日期，由此产生的API设计可能应该不同。


    顺便说一句，这再次证实了一个假设：大多数时候，多对多关系是携带信息的构造。


    一般来说，节点和关系都可以（应该）有“名称”（正式称为节点的标签（labels）和关系的类型（types）），就像图[8-10](#471428_1_En_8_Chapter.xhtml#Fig10)中的概念及其关系一样。


    关系是有方向的，通过箭头可视化。


    节点和关系都可能与属性相关联，属性是键值对，例如`Color:Red`。在数据模型层面，我们称键为属性名称。


    ### Note


    带标签的属性图模型是我们今天拥有的最灵活的通用数据模型范式。


    重要的是名称和结构（节点和关系）。属性通过添加内容来补充解决方案的结构。属性基本上也只是标签，但它们可以表示“身份”（数据模型层面的键的一般概念）。


    最后，自引用也会时不时地出现在数据模型中。图[8-11](#471428_1_En_8_Chapter.xhtml#Fig11)展示了一个双重例子。消息可以引用另一条消息，无论是引用还是回复。


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig11_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig11_HTML.jpg)


    图 8-11


    两个自引用


    当你以后用`GraphQL`查询遍历这种自引用时，你应该理解由此产生的树状结构。最好使用`GraphiQL`来感受一下，通过操作模式。


    你还应该相当确定自引用在任何意义上都不携带信息。像这样的关系经常携带开始日期和结束日期。这可能需要一个单独的小型对象类型，其名称反映关系的周期性，并以两个日期作为属性。关于这方面的更多内容将在后面的解析器章节中讨论。


    你是否在努力理解数据结构？画一个简单的属性图——那会有所帮助！'
  raw: '### Note


    Moving up a to a higher level layer is generalization; specialization is working
    your way down into more and more detail.


    Generalization make things more broadly useful while at the same time losing some
    details.


    Specialization, on the other hand, gets you more detail, and—consequently—more
    complexity. Ask your business experts what they really want and need. (Normally
    they want a bit more than they need, because they fear that this is the only chance
    of getting it.)


    In fact, the compacted version of the email property graph was a generalization,
    as shown in Figure [8-6](#471428_1_En_8_Chapter.xhtml#Fig6).


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig6_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Generalization for simplification


    We have generalized `Originator` and `Destination` out of explicit existence.
    However, the roles they play—“from” “to” and so on—are maintained as relationships
    in the schema.


    Another useful way to reduce referential complexity is to use classification,
    which is related to specialization. We could have had a concept of “message type”
    to indicate whether a message is high priority, as shown in Figure [8-7](#471428_1_En_8_Chapter.xhtml#Fig7).


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig7_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Priority as a type or a property


    Obviously this can be simplified by pushing the `Priority` property down to the
    `Message` level.


    Sometimes you may run into unusual data structures, which can be handled in different
    manners.


    ### Remember


    Always aim at keeping complexity down.


    One of the problems with the normalization approach in relational data modeling
    is that it leads to a plentitude of tables. Some of the tables only serve as placeholders
    for relationships.


    One such scenario is multiple type relationships, which, at times, seem to be
    logical.


    Let us have a look at a 3-way relationship.


    Addresses can be used as destinations and destinations can be described as of
    three roles: to, cc, and bcc. Basically this is a ternary relationship with three
    participating concepts.


    In fact, there is almost always a real business object behind a many-to-many relationship.
    In multidimensional (data warehouse) modeling, there is a construct called the
    “factless fact,” meaning a fact table without any information other than the foreign
    keys to the dimensions. Such a table is the mother of all relationships, and in
    fact (pun intended), even factless facts most often have properties (measures),
    once you start looking for them. See Figure [8-8](#471428_1_En_8_Chapter.xhtml#Fig8).


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig8_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Resolving a 3-way relationship using a “bridge object type”


    Another good way to visualize this ternary relationship is using the property
    graph models’ capability of having properties on relationships.


    This works well if your final destination is a property graph database such as
    Neo4J^([^(31)](#fn31)) or the like. See Figure [8-9](#471428_1_En_8_Chapter.xhtml#Fig9).


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig9_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Role as a property of the relationship


    However, if your data store is a SQL database, you will most likely have the three
    business object types implemented as three tables. In my opinion the representation
    of three object types is fair and to the point. Roles do exist and using such
    classifications on “bridge tables” in a many-to-many relationship is a good idea.


    Come to think of it, another common use of properties on the relationship level
    is “weight”. It signifies, for instance, participation or part-ownership or similar
    partial measures. That can certainly be implemented as a property on the edge
    in a property graph, but in most peoples’ minds, a “participation” business object
    type would make a lot of sense. This brings us back to finding something substantial
    more often than not in a many-to-many relationship, as in the previous example.


    ### Note


    In GraphQL schemas, relationships—either simple name-name references or the Graphcool
    schema directive `@relation`—are non-information bearing. This leaves you with
    the option of using a specialized object type to carry the properties, which describe
    the relationship. This is a resolver issue.


    Another odd fellow is the one-to-one relationship. Between object types and their
    properties there are always one-to-one relationships, also known as *dependencies*.
    But one-to-one relationships do happen between business object types. Not that
    often, however. The examples all tend to be more in the business rules space than
    in the data model realm. Figure [8-10](#471428_1_En_8_Chapter.xhtml#Fig10) shows
    one, which we have seen before.


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig10_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Only one from originator


    Having only one “from” address per originator seems to me to be a business decision
    made in the the legacy design of Internet email messages. A message where the
    originator is a group of “from” addresses is perfectly conceivable.


    However, it is worth checking whether the relationship is information bearing.
    That could be the case, like in the previous example. It is conceivable that “in
    reply to” carries a date, and that the resulting API design should be different.


    This, by the way, once again confirms the assumption that most of the time many-to-many
    relationships are information bearing constructs.


    In general, both nodes and relationships can (should) have “names” (formally called
    labels for nodes and types for relationships), just like concepts and their relationships
    have in Figure [8-10](#471428_1_En_8_Chapter.xhtml#Fig10).


    Relationships are directed, which is visualized by the arrowheads.


    Both nodes and relationships may be associated with properties, which are key/value
    pairs, such as Color:Red. On the data model level, we call the key a property
    name.


    ### Note


    The labeled property graph model is the most flexible general purpose data model
    paradigm that we have today.


    The important things are the names and the structure (the nodes and the relationships).
    The properties supplement the solution structure by way of adding content. Properties
    are also basically just labels, but they can signify “identity” (the general idea
    of a key on the data model level).


    Finally, self-references are also visiting data models from time to time. Figure
    [8-11](#471428_1_En_8_Chapter.xhtml#Fig11) shows a double example. Messages may
    refer to another message, either in reference to or in reply to.


    ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig11_HTML.jpg](images/471428_1_En_8_Chapter/471428_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Two self-references


    When you later traverse such self-references with a GraphQL query, you should
    understand the resulting tree structure. It is probably best to use GraphiQL^([^(32)](#fn32))
    to get a feel for it, by playing with the schema.


    You should also be quite certain that a self-reference is not really information
    bearing in any way. Quite frequently relationships like that carry a start date
    and an end date. This could call for a separate little object type, having a name
    that reflects the periodicity of the relationship, having the two dates as properties.
    More about this on the resolver level in a later chapter.


    Are you struggling with understanding data structures? Draw a little property
    graph—that will help!'
