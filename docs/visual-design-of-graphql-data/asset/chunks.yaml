    ## 12. 将 `GraphQL` 与新的图数据库结合使用


    ### `Neo4j-GraphQL` 集成的设计目标


    一个用于 `GraphQL` API 的图解决方案是什么样的？


    我可以通过考察 `Neo4j-GraphQL` 插件来最好地回答这个问题。我没有重复 Will Lyon 在其视频中的内容，而是决定简要总结另一篇由 `Neo4j`
    的 Will Lyon 于 2018 年 3 月撰写的最新博客文章。文章题为“五个常见的 `GraphQL` 问题以及 `Neo4j-GraphQL` 如何旨在解决它们”（参见
    [`https://blog.grandstack.io/five-common-graphql-problems-and-how-neo4j-graphql-aims-to-solve-them-e9a8999c8d43`](https://blog.grandstack.io/five-common-graphql-problems-and-how-neo4j-graphql-aims-to-solve-them-e9a8999c8d43)）。


    显然，使用图数据库作为 `GraphQL` API 的存储具有一些优势，你将会看到。在下文中，Will 解释了 `GraphQL` `Neo4j` 集成的愿景：


    *   几周前，我读到了 Sacha Greif 在 freeCodeCamp 上的一篇文章，题为“`GraphQL` 应用中的五个常见问题（以及如何解决它们）”。我认为这是对开发者在采用
    `GraphQL` 时遇到的一些问题的很好概述。


    *   当我通读这个常见问题列表时，我意识到这些问题与我们在研究 `Neo4j-GraphQL` 集成应该是什么样子时用户抱怨的一些问题相同（参见 [`https://neo4j.com/developer/graphql/`](https://neo4j.com/developer/graphql/)）。最终，我们的集成设计旨在帮助开发者在构建由
    `Neo4j` 支持的 `GraphQL` 服务时提高效率。


    *   在这篇文章中，我想重新审视 Sacha 指出的每一个问题，并展示 `Neo4j-GraphQL` 如何解决每一个问题。


    #### 问题 1：模式重复


    > *即，你需要一个数据库模式，还需要另一个用于你的 GraphQL 端点的模式。——Sacha Greif*


    *   `GraphQL` 使用严格定义的 `schema`（模式），它定义了可用的类型和 API 的入口点。这个 `schema` 充当了 `GraphQL`
    API 的规范，并且通过自省功能支持强大的开发者工具，如查询补全、模拟和文档生成。然而，标准的 `GraphQL` 实现通常需要同时处理你的数据库的 `schema`
    和你的 `GraphQL` API 的 `schema`。


    *   为了简化构建由 `Neo4j` 支持的 `GraphQL` 应用程序的过程，`Neo4j-GraphQL` 集成使用 `GraphQL` `schema`
    来推断 `Neo4j` 数据模型应该是什么样子。


    *解决方案：使用 `GraphQL` 模式来驱动 `Neo4j` 数据库模型。*


    #### 问题 2：服务器/客户端数据不匹配


    > *你的数据库和 GraphQL API 将会有不同的模式，这会导致不同的文档形状。——Sacha Greif*


    *   如果你的 `GraphQL` 服务的后端不是图数据库，那么就必须进行某种映射和转换，以将数据从你在数据持久层建模的方式转换为 `GraphQL` 所需的图形状。通过使用图数据库作为我们
    `GraphQL` 服务的数据层，我们预先避免了这个问题。


    *   `Neo4j-GraphQL` 集成将任何任意的 `GraphQL` 请求转换为图查询语言 `Cypher`，并作为 `GraphQL` 解析器的一部分处理数据库调用。


    *解决方案：将 `GraphQL` 转换为 `Cypher`。（注意：这是自动完成的。）*


    #### 问题 3：多余的数据库调用


    > *想象一个帖子列表，每个帖子都关联一个用户。你现在想要显示 10 个这样的帖子，以及它们作者的名字。——Sacha Greif*


    *   正如 Sacha 指出的，对于上面的例子，一个典型的 `GraphQL` 实现会为帖子列表进行一次数据库查询，然后为每个帖子再进行一次查询以获取用户信息。这导致了
    11 次到数据库的往返请求！这就是所谓的 n+1 查询问题，常见的解决方案是使用像 `Dataloader` 这样的工具。


    *   我们当然可以将 `Dataloader` 与 `Neo4j` 一起使用——它被设计为与数据层无关，但使用 `Neo4j-GraphQL` 的优势在于，它可以为任何任意的
    `GraphQL` 请求生成*单个* `Cypher` 查询。这意味着对于任何 `GraphQL` 请求，我们只向数据库发出单个请求。


    *解决方案：将 `GraphQL` 转换为单个 `Cypher` 查询。（注意：这是自动完成的。）*


    #### 问题 4：性能不佳


    > *一方面你想充分利用 GraphQL 的图遍历特性（“显示评论作者的帖子的作者……”等等）。但另一方面，你不希望你的应用变得缓慢和无响应。——Sacha
    Greif*


    *   虽然确实 `GraphQL` 支持表达像上面例子那样的图遍历，但负责解析数据的许多数据库系统并未针对这些工作负载进行优化。像 `Neo4j` 这样的图数据库则针对此类图遍历查询进行了优化。通过将
    `GraphQL` 转换为 `Cypher`，我们可以利用像 `Neo4j` 这样的图数据库执行引擎的强大性能优势。此外，`GraphQL` 缺乏像 `Cypher`
    这样的数据库查询语言的语义，无法表达诸如过滤、投影或聚合之类的事情。通过使用 `GraphQL` `schema` 指令，我们可以结合 `Cypher` 的强大功能与
    `GraphQL`，将 `GraphQL` 字段映射到任意 `Cypher` 查询的结果。


    *解决方案：在 `GraphQL` 中展现 `Cypher` 的威力。*'
- fmt: "### Problem 5: Boilerplate Overdose\n\n> *This is by no means an issue exclusive*\
    \ *to GraphQL apps, but it’s true that they generally require you to write a lot\
    \ of similar boilerplate code. —*Sacha Greif\n\n*   Implementing a typical GraphQL\
    \ service involves writing a schema for the GraphQL service, a schema for the\
    \ database, resolver functions to fetch the data, AND mutations for creating and\
    \ updating data. Much of this is boilerplate code that can be generated by inspecting\
    \ the GraphQL schema.\n\n*Solution: Auto-generate Query and Mutation types from\
    \ GraphQL schema. See* *Figure* [*12-1*](#471428_1_En_12_Chapter.xhtml#Fig1) *.*\n\
    \n![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig1_HTML.png](images/471428_1_En_12_Chapter/471428_1_En_12_Fig1_HTML.png)\n\
    \nFigure 12-1\n\nQuery and Mutation types are generated automatically when using\
    \ Neo4j-GraphQL\n\n*   We mentioned previously that resolvers are implemented\
    \ automatically by inferring the database schema from the GraphQL schema, translating\
    \ GraphQL to Cypher, and handling the database call. Additionally, the entry points\
    \ for the GraphQL service (Query and Mutation types) are auto-generated as well,\
    \ reducing the boilerplate code necessary to implement a GraphQL service backed\
    \ by Neo4j. In addition, first, offset, filter-fields, ordering for both top-level\
    \ queries and fields pointing to other entities are generated.\n\nThis concludes\
    \ the post by Will Lyon about the design goals of Neo4j-GraphQL.\n\nLet’s see\
    \ it in action!\n\n## Generating Your Neo4j Database from the GraphQL Schema\n\
    \nLet’s use the email example, which I introduced in earlier chapters of this\
    \ book, in Neo4j.\n\nTo generate the Neo4j side from the GraphQL schema , you\
    \ simply pass the type definitions from the schema to the interface by issuing\
    \ a command like this in the Neo4j desktop:\n\n```\nCALL graphql.idl(\n'type Address\
    \ {\n  id: ID!\n  display_name: String\n  address_spec: String!\n  address_from:\
    \ Originator! @relation(name: \"From\")\n  address_sender: Originator @relation(name:\
    \ \"Sender\")\n  address_reply_to: Originator @relation(name: \"ReplyTo\")\n \
    \ destination_to: [Destination] @relation(name: \"To\")\n  destination_cc: [Destination]\
    \ @relation(name: \"Cc\")\n  destination_bcc: [Destination] @relation(name: \"\
    Bcc\")\n}\n\ntype Originator {\n  id: ID!\n  origin_date: String!\n  originator_role:\
    \ String!\n  message: [Message!] @relation(name: \"Originator\")\n  address_from:\
    \ Address! @relation(name: \"From\", direction:\"IN\")\n  address_sender: Address\
    \ @relation(name: \"Sender\", direction:\"IN\")\n  address_reply_to: Address @relation(name:\
    \ \"ReplyTo\", direction:\"IN\")\n}\n\ntype Destination {\n  id: ID!\n  destination_role:\
    \ String!\n  received_date: String!\n  message: Message! @relation(name: \"Destination\"\
    , direction:\"IN\")\n  address_to: [Address]! @relation(name: \"To\", direction:\"\
    IN\")\n  address_cc: [Address] @relation(name: \"Cc\", direction:\"IN\")\n  address_bcc:\
    \ [Address] @relation(name: \"Bcc\", direction:\"IN\")\n}\n\ntype Message {\n\
    \  id: ID!\n  subject: String\n  comments: String\n  originator: Originator! @relation(name:\
    \ \"Originator\", direction:\"IN\")\n   destinations: [Destination]! @relation(name:\
    \ \"HasDestination\")\n   referencing: [Message] @relation(name: \"Referencing\"\
    )\n   in_reply_to: [Message] @relation(name: \"InReplyTo\")\n   keywords: [Keyword]\
    \ @relation(name: \"Tags\")\n}\n\ntype Keyword {\n  id: ID!\n  keyword: String!\n\
    \  messages: [Message] @relation(name: \"Tags\", direction:\"IN\")\n}\n');\n```\n\
    \nNote that I have added directions to the `@relation`s, since Neo4j needs to\
    \ know the semantics.\n\nIn the Neo4j desktop workbench the result is the display\
    \ of an internal-use only metadata document, which describes the GraphQL schema.\n\
    \nThe Neo4j-GraphQL plugin contains some useful procedures for working with GraphQL\
    \ in Neo4j. One of the important ones is about visualizing the GraphQL schema\
    \ as a graph data model, as shown in Figure [12-2](#471428_1_En_12_Chapter.xhtml#Fig2).\n\
    \n![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig2_HTML.jpg](images/471428_1_En_12_Chapter/471428_1_En_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2\n\nVisualizing the GraphQL schema as a graph data model\n\nThis\
    \ lets you review the structure of the physical graph model. Corrections can be\
    \ made on the GraphQL level, and the schema can be reprocessed.\n\nFinally, by\
    \ opening the GraphiQL GraphQL browser, we can see the GraphQL schema documentation.\
    \ So, by now we are ready to query and mutate the data in the Neo4j graph database\
    \ via the GraphQL API, as shown in Figure [12-3](#471428_1_En_12_Chapter.xhtml#Fig3).\n\
    \n![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig3_HTML.jpg](images/471428_1_En_12_Chapter/471428_1_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3\n\nUsing GraphiQL to query and manipulate the graph data in Neo4j\n\
    \nUsing a Neo4j graph database as the underlying data store gives you a head start\
    \ on your GraphQL project. Write your schema, tell it to Neo4j, and you are ready\
    \ to enter data and query it by way of GraphQL.\n\n## Neo4j-GraphQL Resources\n\
    \nA good place to start getting involved with GraphQL and Neo4j is this previously\
    \ cited article (by Will Lyon), entitled “Using The Neo4j-GraphQL Plugin In Neo4j\
    \ Desktop”.^([^(51)](#fn51)) It guides you through all necessary steps.\n\nThere\
    \ is a JavaScript variant of the Neo4j-GraphQL integration. The [neo4j-graphql-js](https://www.npmjs.com/package/neo4j-graphql-js)\
    \ NPM package^([^(52)](#fn52)) is available at [`https://www.npmjs.com/package/neo4j-graphql-js`](https://www.npmjs.com/package/neo4j-graphql-js)\
    \ . The JavaScript version of the Neo4j-GraphQL integration is designed to work\
    \ with all JavaScript GraphQL server implementations.\n\nYou can learn more about\
    \ the neo4j-graphql and GRANDstack projects here:\n\n*   *GRANDstack.io*:^([^(53)](#fn53))\
    \ All things related to building applications using GRANDstack (GraphQL, React,\
    \ Apollo, and Neo4j Database). See [`http://grandstack.io`](http://grandstack.io)\
    \ `/`.\n\n*   *Neo4j and GraphQL developer page*:^([^(54)](#fn54)) Overview of\
    \ ways to use GraphQL with Neo4j. See [`https://neo4j.com/developer/graphql/`](https://neo4j.com/developer/graphql)\
    \ .\n\n*   *Using Neo4j-GraphQL Procedures*:^([^(55)](#fn55)) Interacting with\
    \ the Neo4j-GraphQL plugin. See [`https://github.com/neo4j-graphql/neo4j-graphql#procedures`](https://github.com/neo4j-graphql/neo4j-graphql#procedures)\
    \ .\n\n*   *Neo4j-GraphQL GitHub organization*:^([^(56)](#fn56)) Find the code\
    \ and docs for Neo4j-GraphQL integrations here. See [`https://github.com/neo4j-graphql`](https://github.com/neo4j-graphql)\
    \ .\n\n*   *neo4j-graphql-cli*:^([^(57)](#fn57)) A command-line tool for quickly\
    \ spinning up a GraphQL API using Neo4j-GraphQL on Neo4j Sandbox. See [`https://www.npmjs.com/package/neo4j-graphql-cli`](https://www.npmjs.com/package/neo4j-graphql-cli)\
    \ .\n\n*   *The Neo4j Slack Channel*:^([^(58)](#fn58)) A command-line tool for\
    \ quickly spinning up a GraphQL API using Neo4j-GraphQL on Neo4j Sandbox. See\
    \ [`https://www.neo4j.com/slack`](https://www.neo4j.com/slack) .\n\nFootnotes\
    \ [1](#471428_1_En_12_Chapter.xhtml#Fn1_source)   [2](#471428_1_En_12_Chapter.xhtml#Fn2_source)\
    \   [3](#471428_1_En_12_Chapter.xhtml#Fn3_source)   [4](#471428_1_En_12_Chapter.xhtml#Fn4_source)\
