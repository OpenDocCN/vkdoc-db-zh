- "# 4. 一个电子邮件示例\n\n`GraphQL 模式`是一个*数据图*，包含网络中的相关概念，组织为有向图。在某种程度上，你可以说 `GraphQL` 方法让一切都看起来像一个图！（反正实际情况也确实如此。）\n\
  \n这使得所谓的属性图方法对于 `GraphQL 模式` 设计师来说，是一个强大的可视化机会。\n\n我们将从一个简单的电子邮件图数据模型开始。首先，让我们了解一下电子邮件的基本概念（如名为\
  \ `RFC 5322` 的互联网消息格式标准所定义）。参见图 4-1。\n\n![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig1_HTML.jpg](img/471428_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1：电子邮件概念概览\n\n图 4-1 忠实于互联网标准中实际使用的术语。如果你试图由此构建一个经典的、规范化数据模型，这会引起问题，我们稍后会讨论。\n\
  \n注意，有些关系是一对一的（例如，来自 `地址` 的 `发件人`），而另一些是多对多的（例如，`关键词` 标记 `消息`）。也存在一些一对多的关系。我们将回到这个问题，但请务必记住：\n\
  \n***注意：关系基数性很重要，因为尽管 `GraphQL` 是一个有向图范式，但在 `GraphQL 模式` 内的可能查询集合是源自根查询的所有子树的子图集合。***\n\
  \n稍微离题一点：这个电子邮件主题领域有点复杂，所以我们暂时跳过消息重发的业务。\n\n让我们继续以详细的属性图形式描述 `GraphQL` 数据范围的边界，如图\
  \ 4-2 所示。\n\n![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig2_HTML.jpg](img/471428_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2：电子邮件作为属性图\n\n注意，图 4-2 在概念模型上添加了小的属性框。这是在同一图表中描述结构和内容的一种紧凑方式。这使得该图表成为一个真正的属性图模型。（你可以在我的名为\
  \ *《NoSQL 与 SQL 的图数据建模》* [*Graph*](https://technicspub.com/graph-data-modeling/)\
  \ *Data Modeling for NoSQL and SQL* ](https://technicspub.com/graph-data-modeling/)\
  \ 的书中了解更多关于属性图的内容，^(²¹) 2016，Technics Publications。参见 [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling)\
  \ 。）\n\n概括一下，圆圈是*概念*，它们是图的*节点*。例如，消息是一个概念，它是多个关系的一部分，比如发件人（谁发送了消息）或“回复自”（回复的是哪条其他消息）。属性可以附加到概念（节点）和/或关系（图的边）上。\n\
  \n该符号使用箭头表示基数性。在图 4-2 中，你可以找到一对一、一对多和多对多的关系。有关属性图的简要解释，^(²²) 参见 [`http://bit.ly/2hMNYvE`](http://bit.ly/2hMNYvE)\
  \ 。\n\n在 `GraphQL` 背景下，属性图对于表示模式的结构很有用：\n\n![../images/471428_1_En_4_Chapter/471428_1_En_4_Fig3_HTML.jpg](img/471428_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3：简化的电子邮件属性图\n\n*   *节点是类型（对象类型、接口类型和联合类型）*\n*   *关系表示类型之间的连接*\n*   *属性是类型的字段（标量或列表）*\n\
  \n**注意** 事实上，如果你愿意“忘记”一些业务概念（比如 `发件人` 和 `收件人`），你可以将模型简化得更紧凑。参见图 4-3。\n\n\n\n请注意，在图\
  \ 4-3 所示的紧凑版本中，存在更多的多对多关系。像这样的逻辑模型（是的，逻辑模型可以包含多对多关系）对于 SQL 数据源来说是有问题的，但在图数据库中却非常合理。\n\
  \n请注意，在属性图中，关系是命名的。这很重要，因为这些名称是业务语义的一部分，通过可视化它们，可以更容易地审查和讨论结构所施加的含义。`Graphcool`\
  \ 提供了一个 `@relation` 指令，用于将关系名称纳入模式中。这是一个非常好的主意。\n\n属性图表示法比大多数图表方法中使用的“方框和箭头”方法要紧凑得多。在\
  \ `GraphQL` 领域，有一个名为 `GraphQL Voyager` ([`https://apis.guru/graphql-voyager/`](https://apis.guru/graphql-voyager))\
  \ 的工具。`Voyager` 基于一个标准的数据模型图表库，该库采用“方框和箭头”风格。要牢固掌握跨越，比如说，五种或八种对象类型的结构并不容易。属性图表示法要紧凑得多，并且在过去的\
  \ 15 年里一直很成功，它起源于北欧。总部位于马尔默的 `Neo4J` 发明了属性图模型作为一种数据模型，他们现在是全球图数据库领域的领先企业。本文提出的属性图样式由作者在其\
  \ 2016 年关于*SQL 与 NoSQL 图数据建模*的书中设计。\n\n至此，我们已经处理了模式可视化问题，这使得 `GraphQL` 既美观又实用：\n\
  \n*   与业务术语和定义（结构和内容字段）保持一致\n*   理解以图结构组织的复杂模式\n\n使用 `GraphQL 模式定义语言 (SDL)` 表示，（未压缩的）电子邮件数据模型可以按照以下思路来指定：\n\
  \n```graphql\n#\n## 邮件图数据模型\n#\n## GraphQL 模式\n#\n## 基于互联网消息格式 RFC5322，但有所简化\n#\n\
  ## Copyright Thomas Frisendal, 2017\n#\n\nscalar Datetime\nscalar AddrSpec\nenum\
  \ destination_role {\n  To\n  Cc\n  Bcc\n}\n\nenum originator_role {\n  From\n \
  \ Sender\n  Reply to\n}\n\ntype Address {\n  id: ID!\n  display_name: String\n \
  \ address_spec: AddrSpec!\n  address_from: Originator! @relation(name: \"From\"\
  )\n  address_sender: Originator @relation(name: \"Sender\")\n  address_reply_to:\
  \ Originator @relation(name: \"ReplyTo\")\n  destination_to: [Destination] @relation(name:\
  \ \"To\")\n  destination_cc: [Destination] @relation(name: \"Cc\")\n  destination_bcc:\
  \ [Destination] @relation(name: \"Bcc\")\n}\n\ntype Originator {\n  id: ID!\n  origin_date:\
  \ Datetime!\n  originator_role: originator_role!\n  message: [Message!] @relation(name:\
  \ \"Originator\")\n  address_from: Address! @relation(name: \"From\")\n  address_sender:\
  \ Address @relation(name: \"Sender\")\n  address_reply_to: Address @relation(name:\
  \ \"ReplyTo\")\n}\n\ntype Destination {\n  id: ID!\n  destination_role: destination_role!\n\
  \  received_date: Datetime!\n  message: Message! @relation(name: \"Destination\"\
  )\n  address_to: [Address]! @relation(name: \"To\")\n  address_cc: [Address] @relation(name:\
  \ \"Cc\")\n  address_bcc: [Address] @relation(name: \"Bcc\")\n}\n\ntype Message\
  \ {\n  id: ID!\n  subject: String\n  comments: String\n  originator: Originator!\
  \ @relation(name: \"Originator\")\n  destinations: [Destination]! @relation(name:\
  \ \"HasDestination\")\n  referencing: [Message] @relation(name: \"Referencing\"\
  )\n  in_reply_to: [Message] @relation(name: \"InReplyTo\")\n  keywords: [Keyword]\
  \ @relation(name: \"Tags\")\n}\n\ntype Keyword {\n  id: ID!\n  keyword: String!\
  \ @isUnique\n  messages: [Message] @relation(name: \"Tags\")\n}\n\ntype Query {\n\
  \  messages(limit: Int = 20): [Message]!\n}\n\nschema {\n  query: Query\n}\n```\n\
  \n请注意，此示例使用了 `Graphcool` 发明的模式指令 `@relation`，尤其重要的是，它命名了关系。这是我强烈推荐的一个特性。\n\n另请注意，此模式代码并不完整，如果直接使用可能会导致语法错误。`GraphQL`\
  \ 平台确实有自己的扩展。例如，当在 `Graphcool` 上使用此示例时，会存在下划线和缺少 `@model` 指令等问题。另一方面，此示例的一个子集已用作\
  \ `Neo4j` 的基础来构建一个新的图数据库，没有出现问题。\n\n*另请注意，属性图图示通常比模式定义语法更容易阅读和理解！*\n\n让我们看看这个设计可能包含哪些问题。\n\
  \n"
- '# 5. 业务含义


  含义部分实际上由业务所有。业务人员有权决定他们的术语。应用程序或微服务面向业务，应该使用业务的语言。数据内容也是如此。




  ## API 中的数据名称至关重要


  由于许多物理数据存储可能是**无模式**或**读取时模式**的，即其“模式”在读取数据时才被推断出来，因此我们需要为业务用户提供一个使用业务术语的**表示层**。这个层就是我们的
  `GraphQL` API。


  更具挑战性的是，人们想要分析的（大）数据大部分或多或少是机器或系统生成的。这再次要求存在一个面向用户、面向业务环境的数据术语层。最后，即使在集成项目中，标准化业务名称对于在业务用户群体中获得认可也是必要的。


  名称包括对象类型名称（例如 `originator`）、属性名称（例如地址的 `display name`）以及关系名称（例如 `cc`）。


  关系名称很重要，因为它们也被用来推断关系的类型（依赖）。动作动词表示在业务对象上进行的活动，而像“has”这样的弱动词则表示业务对象类型的标识符与其属性之间普通的函数依赖关系。


  关系是双向的，如图 5-1 所示。


  ![../images/471428_1_En_5_Chapter/471428_1_En_5_Fig1_HTML.jpg](img/471428_1_En_5_Fig1_HTML.jpg)


  **图 5-1** 从右向左或从左向右读取


  基于这些原因，名称很重要。然而，我倾向于只写下来自父级的名称。在这个例子中，即 `originator`，因为应用了从左到右的顺序（西方文化惯例）。


  重要的是，一些连接短语（关系的名称）包含动词，而动词暗示是一个“行动者”使某事发生。换句话说，该关系表示某种事物，这不仅仅是依赖于某物身份的普通属性。这使得目标有资格被识别为业务对象类型。


  在存在歧义风险的地方，名称应有坚实的定义（作为注释或描述）作为支撑。核心业务概念的定义持续时间长，影响范围广。这意味着它们不仅应该精确且切中要害，还应该易于沟通和记忆。


  名称应尽可能具体。例如，如果你讨论的是 `Destination Address`，就应避免使用 `Address`。


  请注意，`GraphQL` 通过定义接口提供了一种简单而好的方式来支持子类型化。在电子邮件示例中，我们可以考虑将 `Originator` 和 `Destination`
  设置为接口，两者都实现一个 `Contact` 类型。看起来如下。


  首先是两个类型：


  ```

  1   type Originator {

  2     id: ID!

  3     origin_date: Datetime!

  4     message: : [Message!]  @relation(name: "Originator")

  5     address_from: Address! @relation(name: "From")

  6     address_sender: Address @relation(name: "Sender")

  7     address_reply_to: Address @relation(name: "ReplyTo")

  8   }


  10   type Destination {

  11     id: ID!

  12     destination_role: destination_role!

  13     received_date: Datetime!

  14     message: Message! @relation(name: "Destination")

  15     address_to: [Address]! @relation(name: "To")

  16     address_cc: [Address] @relation(name: "Cc")

  17     address_bcc: [Address] @relation(name: "Bcc")

  18   }

  ```


  然后是一个接口构造：


  ```

  1   interface Contact {

  2     id: ID!

  3   }


  5   type Originator implements Contact {

  6   origin_date: Datetime!

  7     message: [Message!] @relation(name: "Originator")

  8     address_from: Address! @relation(name: "From")

  9     address_sender: Address @relation(name: "Sender")

  10     address_reply_to: Address @relation(name: "ReplyTo")

  11   }


  13   type Destination implements Contact {

  14   destination_role: destination_role!

  15     received_date: Datetime!

  16     message: Message! @relation(name: "Destination")

  17     address_to: [Address]! @relation(name: "To")

  18     address_cc: [Address] @relation(name: "Cc")

  19     address_bcc: [Address] @relation(name: "Bcc")

  20   }

  ```


  我们在电子邮件设计中没有使用接口，因为两者之间的重叠极少。然而，接口名称也应该是有效的业务名称。


  API 返回结果的内容质量取决于业务语义以及 API 实际提供的数据。我们已经处理了属性图中的结构和术语，接下来我们需要妥善处理实际的数据内容。但是，请记住，意义和内容是相辅相成的。如果你改变了语义，那么你可能需要重构数据。


  ### 注意


  与一些领域专家一起检查属性图内容的名称，以理清语义。


  当业务术语与数据库中的数据名称不匹配时，需要有人在解析器层面采取措施。更多内容稍后讨论。


  ## 寻找标准数据结构


  在设置模式之前，另一件需要考虑的事情是标准模式。许多不同类型的业务活动及其对象的最佳实践数据模型已经被定义。


  例如，`Company Location` 属性似乎设计得有点不足。位置是地理地址，即业务地址。对于许多通用对象类型，已经存在多种最佳实践。例如，可以参考 `schema.org`
  或各种国家或国际标准。


  我们如何发现例如公司位置相关信息有所缺失？一个指标可能是：精确的连接短语包含一个动作动词：`located at`。动作动词往往表示对象类型之间的关系，而不是对象与其属性之间的关系。


  因此，在发布你的模式之前，寻找标准模式是另一项需要进行的检查。



  '
- '# 6. 呈现业务流程


  ### 确立身份与唯一性


  分析函数依赖、寻找候选键的日子已离我们远去。但我们仍需处理身份与唯一性问题。由于 `GraphQL 模式` 是一个有向图，节点的身份和唯一性必须在模式层面解决。


  问题何在？麻烦在于——作为人类——我们其实并不太在意唯一性。名字又算得了什么？我们都知道 James Brown 可以指代许多人。我们使用的技巧是添加上下文，比如“是的，你知道的，那位歌手，灵魂乐教父
  James Brown”。因此，当这确实重要时，上下文是确切的答案。但如果一个节点代表一个名叫 James Brown 的人，我们会查看上下文来尝试推断我们谈论的是谁。


  幸运的是，我们处于一个连接的图（模式）中，这意味着我们应该查看其近邻环境，并从中推断身份与唯一性。


  身份在功能上源自唯一性，而唯一性设定了上下文。


  换种说法，身份实际上是属性适用范围的界定（见图 5-2）。


  ![../images/471428_1_En_5_Chapter/471428_1_En_5_Fig2_HTML.jpg](img/471428_1_En_5_Fig2_HTML.jpg)


  **图 5-2** 身份由唯一性驱动


  `接收日期` 与 `目标角色` 共享作用域，两者都由 `目标` 的身份驱动。目前，我们只需说明需要为 `目标` 建立可靠的身份。（这过去被称为“寻找主键”。）


  唯一性是识别在业务层面是什么使一个身份成为唯一的问题。


  是的，`目标` 由 `消息` 和 `地址` 的组合（无论它们的身份如何定义）唯一地定义。强制唯一性也是 API 模式设计中的一项重要任务。（以前这是“外键”的范畴。）


  没有充分的理由添加视觉图标或特殊标记，因为唯一性已由结构暗示。但我确实用粗体突出了 `地址规范`、`消息 ID` 和 `关键词`（属性），因为根据业务定义，它们是唯一的。


  总之，身份决定了属性的作用域（例如，`接收日期` 适用于 `目标`），而唯一性决定了在接口中确保唯一性的业务级标准（例如，`目标` 必须在 `地址` 和 `消息`
  的身份组合中是唯一的）。请注意，到目前为止我们谈论的是业务层面。在大多数情况下，这些问题可能已经通过数据库中由 IT 生成的“代理键”解决了。


  至少在北欧（我来自的地方），使用分配的识别号码（如社会保险号码）通常并不可取。它们无法保证始终保持唯一和持久。对我们 IT 人员来说，发明新的“自然身份”可能非常实用，对吧？多年来我们一直是推动这一趋势的人。业务人员不太反对，有时他们也能理解为什么这类键很实用。


  以下是一些在图中寻找唯一性和身份的规则：


  *   一个对象的唯一性由来自更高层级概念指向它的关系决定。

  *   因此，一个对象的身份就是引用它的那些概念的身份的组合。

  *   另一方面，属性共享它们所依赖的对象的身份，这是属性的定义标准。


  所以，使用这些简单的视觉检查方法，我们可以在业务层面推断出每个对象类型的上下文及其唯一性：


  | 对象类型 | 唯一性 |

  | --- | --- |

  | `地址` | `地址规范` |

  | `发起方` | `地址规范`, `消息 ID`, `发起方角色` |

  | `目标` | `地址规范`, `消息 ID`, `目标角色` |

  | `消息` | `消息 ID` |

  | `关键词` | `关键词 ID`, `消息 ID` |


  让我们回顾一下身份和唯一性问题：


  `唯一性` 是决定数据实例唯一性的业务级规则。通常，这是业务级“键”的组合，例如票号、线路号、员工号、邮政编码、产品号等。身份是参与类型唯一性的组合结果。例如，一个订单行，对于订单号（来自
  `订单` 类型）和订单行号（来自 `订单行` 类型）的组合是唯一的。在大多数 IT 系统中，身份通过唯一的 `ID` 字段（关系数据库中的主键）或其他类型的代理键来确保。显然，必须解决跨多个源数据库的
  `ID` 冲突。还需注意，`GraphQL API` 数据的下游需求可能对 API 交付身份和唯一性提出不同的要求。


  不匹配之处可以在解析器层修复。稍后在我们将数据库连接到 API 时再详细讨论。


  确立业务含义及其规则显然很重要。同样重要的是设计良好的方法来促进业务流程的导航，这就是我们接下来要探讨的内容。


  ### 呈现键


  为了让应用程序和业务用户能够轻松访问反映业务流程的对象和事件网络，我们需要从网络导航的角度来思考。这始于让识别变得容易的问题。


  显然，业务端许多拼接的身份组件（唯一性规则）并不实用。作为 API 设计师，我们被允许创造事物。一类可创造的事物被称为“键”。


  例如，使用大型拼接键实际上不太实用。我们更喜欢精确、简单（单变量）字段的清晰性。这最早于 1976 年确立（在一个早期的面向对象环境中）。它很快以“代理键”的名义统治了主键和外键的世界。事实证明，业务级键很少是单层字段，除非开发
  IT 解决方案的人员定义了它们。想想账号、项目编号、邮政编码之类的东西。即使使用了合理精确定义的概念，它们也不能保证在较长时间内保持唯一。例如，项目编号可能会随时间被重复使用。



  ### 注意


  在讨论键和 ID 时，存在一些重要的作用域考量。


  许多数据库设计包含系统生成的代理键。这些键很可能可以直接用作你 API 设计中的"Xxxxxx ID"标识字段，这是很好的。此类键的作用域位于数据库实例级别，但代理键很可能已被带入数据仓库表等结构中。


  GraphQL 支持"`ID`"作为标量类型。此类`ID`字段的作用域仅限于该应用程序（服务器）内的该对象类型，且`ID`主要用于从缓存中获取数据。它们在该作用域内是唯一的，但不会超出此范围。


  一个在解决方案级别、由系统分配键增强的电子邮件数据设计会是什么样子？


  图 6-1 是一个解决方案级别的属性图，它为每个对象类型包含了一个标识符（`XxxxxxxId`）。该标识符的目的是作为对象实例的简单、持久、唯一的标识符。（这正是代理键的特性。）请注意，"Message
  ID"已经存在于系统中（根据定义，在互联网消息格式标准中）。


  如果没有现成的代理键方案，并且数据作用域需要大于应用程序，例如为了下游的数据层面集成，那么你面对的就是一个数据架构设计问题。


  键可以在解析器层面处理。稍后会详细介绍。


  ![../images/471428_1_En_6_Chapter/471428_1_En_6_Fig1_HTML.jpg](img/471428_1_En_6_Fig1_HTML.jpg)

  图 6-1

  作为键字段（`ID`）添加的标识符


  ## 呈现状态变化


  有时你必须在接口中处理状态变化。这里我们讨论的是业务状态变化。例如，在金融界，证券交易中的买入/卖出交易会经历一个大致如下的层级状态：


  *   已考虑

  *   已计划

  *   已达成（成交）

  *   已初步记账

  *   已结算

  *   最终已入账


  （现实中可能稍微复杂一些。）问题在于同一笔交易在其生命周期中以不同的版本存在。日期和时间对于跟踪这一点是必要的。


  在我们的电子邮件示例中，我们可能需要在 API 中具体化（实现）邮件是否被重发（以及何时重发）。


  "让数据看起来更美观"显然是可以在解析器层面完成的事情。稍后会详细介绍。


  ## 呈现数据版本


  这让我们来到了数据层面的版本控制。（而不是元数据层面，例如模式变更。）


  不仅在数据仓库中，在其他类型的应用程序中，版本控制也是一个普遍的需求。通常需求包括：


  *   哪个版本是当前版本？

  *   给定版本的起点和终点是什么（精确到日期和/或时间）？

  *   这个版本是何时存在的？


  有时需要进行追溯更正。例如，可能需要在之后的时间点纠正一个被发现错误的价格。


  保留两个版本取决于会计实务，也可能取决于法规要求。务必了解你所在环境的具体情况。


  如果你涉及版本控制，应该考虑事件链。（例如，紧随此交易版本之后的*下一个*事件是日期`YYYYMMDD`上的`XXXXX`。）图非常适合对此进行建模和实现。你可能还对先前的事件链感兴趣。（例如，*先于*此交易版本的事件是日期`YYYYMMDD`上的`XXXXX`。）关于如何解决这个问题，请参阅后面章节的讨论。


  '
- '# 7. 内容至关重要


  ## 妥善的内务管理


  推荐的最佳实践是保持内务管理的条理性——当然是以会计师的方式。记录谁在什么时候做了什么。


  为所有对象类型跟踪以下信息是很好的做法：


  *   谁创建了这条记录？

  *   记录是何时创建的？

  *   谁最后一次更改了这条记录？

  *   最后一次更改的日期和时间是什么时候？

  *   这条记录是如何加载的？

  *   记录是何时加载的？

  *   记录的源系统是什么？

  *   版本控制日期是什么（起始和结束）？

  *   以及更多……


  如果此类元数据在数据源中可用，我相信很多人会受益于在 API 中提供它们。其中一些信息可以在解析器层面添加。


  ## 标量数据类型


  我们何时需要关注数据类型？


  如果你还没有考虑过，现在是思考*API 层面*数据类型的时候了。GraphQL 的简单标量类型是预先定义好的。只需为意外情况做好准备。你需要考虑需要高精度的大型数字的精度和表示形式。对于日期和时间戳，你必须定义自己的自定义类型。如果有高级业务需求，你需要了解这一点。请参阅下一节关于处理时间的内容。


  物理数据类型不太可能完全相同，但希望它们是兼容的（并且可以在解析函数中映射）。类型转换也是如此。


  ## 呈现日期和时间


  日期和时间是数据库中的一些棘手挑战，在 GraphQL 中也是如此。GraphQL 是一个相对较新的框架，并且仍在发展。在撰写本文时，`Date`可以被实现为自定义标量类型（`DIY`）。GitHub
  上有许多项目正在这个领域开发优秀成果。例如，GraphQL ISO Date^(²⁶)，网址为 [`https://github.com/excitement-engineer/graphql-iso-date`](https://github.com/excitement-engineer/graphql-iso-date)。


  如你所知，日期和时间遵循一些为时区管理制定的、稍显不规则的国际规则。它们并非系统性的，无法轻易从字段值中推导出来。


  时区确实难以处理。日历稍微容易一些，但仍然受制于许多国家和文化的差异。如果你拿一个普通的美国二月份日历，你会注意到有两个在美国以外不适用的特殊日子。情人节正逐渐进入欧洲，但没有总统日。


  如果你的数据模型需要支持全球运营，你可能需要为每个事物至少使用四个变量：


  *   本地日期（纯日期）

  *   本地时间（不涉及日期）

  *   全球日期（纯日期）

  *   全球时间（例如，设置为 GMT）


  关于在解析器中解决日期和时间问题的更多细节，请参见相关章节。




  '
- '# 使用自定义模式指令


  日期格式化是自定义模式指令的一个典型用例。Ben Newman 有一篇优秀的博文，题为“可复用的 GraphQL 模式指令^(²⁷)，”（[`https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1`](https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1))，其中相当详细地介绍了如何实现它们。


  这里我将仅让你感受一下它的样子（参考 Ben Newman 的博文）。


  首先，定义一个带有默认格式和一个参数的指令：


  ```

  1   directive @formattableDate(

  2     defaultFormat: String = "mmmm d, yyyy"

  3   ) on FIELD_DEFINITION

  4

  5   scalar Date

  6

  7   type Query {

  8     today: Date @formattableDate

  9   }

  ```


  该指令可以被整合进一个模式中，并以不同的格式使用：


  ```

  1   import { graphql } from "graphql";

  2   import { makeExecutableSchema } from "graphql-tools";

  3

  4   const schema = makeExecutableSchema({

  5     typeDefs,

  6     schemaDirectives: {

  7       formattableDate: FormattableDateDirective

  8     }

  9   });

  10

  11   graphql(schema, `query { today }`).then(result => {

  12     // 使用默认的 "mmmm d, yyyy" 格式记录：

  13     console.log(result.data.today);

  14   });

  15

  16   graphql(schema, `query {

  17     today(format: "d mmm yyyy")

  18   }`).then(result => {

  19     // 使用请求的 "d mmm yyyy" 格式记录：

  20     console.log(result.data.today);

  21   });

  ```


  如前所述，Ben Newman 的博文包含了实现此功能所需的所有细节。


  '
- '# 设计即决策


  永远不要忘记，API 模式建模关乎 `设计`！设计意味着做出影响解决方案 *业务质量* 的决策。显然，这里存在一个两难境地：


  *   支持当前的业务流程/需要处理的业务问题（现在和未来）

  *   保持简单性


  力求在范围和简单性之间取得平衡的解决方案。将设计决策可视化将使你的世界更简单。


  *既然我们是为业务而设计，最终决策权在业务方！*


  我们继续讨论结构性问题。


  脚注 1   2


  '
- '# 8. 构建正确的结构


  ## 哪些对象与哪些关系？


  数据模型的结构当然建立在我们已讨论过的对象类型和关系之上。


  但更普遍的问题源于选择合适的对象。


  我们工具箱中确实有一些普遍适用的工具，如下所示：


  *   抽象、概括和特化（又称聚合）

  *   分类与类型化

  *   生命周期依赖和版本控制

  *   识别层次结构


  也有一些需要注意的问题领域：


  *   一对一关系

  *   多对多关系与嵌套对象类型

  *   树（不同种类的层次结构）


  你最好的帮手之一是具有良好链接短语（依赖关系名称）的概念模型。在白板上创建模型通常就足够了。记住，概念以类似句子的方式（主语/谓语/宾语）与其他概念相关联，例如
  `客户-下单-订单`。


  这些小句子中的动词能告诉你很多关于结构的信息。目标仅仅是一个属性吗？包含“是”或“有”表示属性。或者它是业务对象之间的完整关系？“下单”表示一个完整的关系，因为它意味着一个将业务从一个状态转变到另一个状态的过程。


  ## GraphQL 模式缝合，构建拼凑体


  GraphQL 正朝着由协同工作的联邦服务器组成的拼凑体发展。新功能被称为：


  *   模式缝合

  *   模式委托

  *   模式绑定


  讨论很快变得技术性。相反，让我们关注整体影响。


  基本上，这些新功能允许你：


  *   进行分布式查询，从一组 GraphQL 模式/服务器获取整合结果。

  *   在你自己的模式与他人的模式之间建立集成，无论是在模式层面还是在解析器层面。


  得益于其内省功能，GraphQL 具有高水平的“自我意识”，并且它是强类型的。这意味着集成可以受益于让远程服务器相互内省，以确定谁可以在查询中回答什么。这也为公开可用的
  GraphQL API 开辟了可能性（并且已经有一些这样的 API）。因此，GraphQL 渴望在开放数据领域占据领先地位，该领域一直由 W3C 技术栈和 SPARQL
  端点主导。


  Sashko Stubailo 在 [`https://dev-blog.apollodata.com/graphql-schema-stitching-8af23354ac37`](https://dev-blog.apollodata.com/graphql-schema-stitching-8af23354ac37)
  有一篇不错的博文^(²⁸)，并且有一个用于最简单级别（[模式缝合](https://github.com/stubailo/schema-stitching-demo)）^(²⁹)的
  GitHub 仓库，如图 8-1 所示。


  ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig1_HTML.jpg](img/471428_1_En_8_Fig1_HTML.jpg)


  图 8-1 来自 Stubailo 的模式缝合演示


  在这个拼凑体中发生的是两个查询被缝合在一起：


  *   事件

  *   天气预报


  它们位于两个独立的服务器上，但它们知道彼此的 URL。这样它们就可以进行集成。


  更多细节请参阅 Apollo 文档^(³⁰)（[`https://www.apollographql.com/docs/graphql-tools/schema-stitching.html`](https://www.apollographql.com/docs/graphql-tools/schema-stitching.html)）。


  结果很明确：


  *   你应该调查是否已经有其他人创建了（部分的）API，供你利用。

  *   你不应该试图一次性解决所有问题。相反，采取一种拼凑的方法。

  *   你应该在你的工作范围内合作和共享，以便每个人都为你所处的 GraphQL API 领域做出贡献。


  结合还有从 GraphQL 模式生成模拟数据的工具这一事实，你在应用迭代开发以及前端和后端的并行开发方面拥有丰富的可能性。但是，拥有路线图和预期主要对象类型的高层次概念图会大有帮助。


  ## 呈现适当详细程度


  抽象是你武器库中最强大的武器。抽象像图层一样工作，如图 8-5 所示。


  ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig5_HTML.jpg](img/471428_1_En_8_Fig5_HTML.jpg)


  图 8-5 概括化与特化


  因此，你可以将发起方地址和目的地地址概括化为仅仅“地址”。或者，你可以将地址特化为“发起方”和“目的地”。



  ### 注意


  向上移动到更高层级是泛化；特化则是向下深入到越来越多的细节。


  泛化使事物更具普适性，但同时会丢失一些细节。


  而特化则让你获得更多细节，并随之带来更高的复杂性。问问你的业务专家他们真正想要和需要什么。（通常，他们想要的比需要的多一点，因为他们担心这是唯一能获得它的机会。）


  事实上，电子邮件属性图的压缩版本就是一种泛化，如图 8-6 所示。


  ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig6_HTML.jpg](img/471428_1_En_8_Fig6_HTML.jpg)


  图 8-6


  为简化而泛化


  我们将`Originator`和`Destination`泛化，使其不再显式存在。然而，它们所扮演的角色——“发件人”、“收件人”等——作为关系在模式中得以保留。


  另一种降低引用复杂性的有用方法是使用分类，这与特化相关。我们可以引入一个“消息类型”的概念，来指示消息是否为高优先级，如图 8-7 所示。


  ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig7_HTML.jpg](img/471428_1_En_8_Fig7_HTML.jpg)


  图 8-7


  优先级作为类型或属性


  显然，通过将`Priority`属性下推到`Message`级别可以简化这一点。


  有时你可能会遇到不寻常的数据结构，这些结构可以用不同的方式处理。


  ### 记住


  始终致力于降低复杂性。


  关系数据建模中规范化方法的问题之一是它会导致大量的表。其中一些表仅作为关系的占位符。


  一种这样的场景是多重类型关系，这种关系有时看起来是合乎逻辑的。


  让我们来看一个三元关系。


  地址可以用作目的地，而目的地可以描述为三种角色：收件人（to）、抄送（cc）和密送（bcc）。这基本上是一个具有三个参与概念的三元关系。


  事实上，多对多关系背后几乎总是存在一个真实的业务对象。在多维（数据仓库）建模中，有一个称为“无事实的事实”的结构，意思是除了指向维度的外键之外没有任何信息的事实表。这样的表是所有关系的源头，而且事实上（双关语），即使无事实的事实，一旦你开始寻找，大多数情况下也具有属性（度量）。见图
  8-8。


  ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig8_HTML.jpg](img/471428_1_En_8_Fig8_HTML.jpg)


  图 8-8


  使用“桥接对象类型”解决三元关系


  可视化这种三元关系的另一种好方法是利用属性图模型在关系上设置属性的能力。


  如果你的最终目标是属性图数据库（如`Neo4J`或类似数据库），这种方法效果很好。见图 8-9。


  ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig9_HTML.jpg](img/471428_1_En_8_Fig9_HTML.jpg)


  图 8-9


  作为关系属性的角色


  然而，如果你的数据存储是 SQL 数据库，你很可能需要将三种业务对象类型实现为三个表。在我看来，表示三种对象类型是公平且切中要害的。角色确实存在，在多对多关系的“桥接表”上使用这种分类是个好主意。


  仔细想想，在关系层级上使用属性的另一个常见用途是“权重”。它表示，例如，参与度或部分所有权或类似的局部度量。这当然可以在属性图中作为边上的属性来实现，但在大多数人的观念中，一个“参与度”业务对象类型会更有意义。这让我们回到一个观点：多对多关系中，经常能找到一些实质性的东西，就像前面的例子一样。


  ### 注意


  在`GraphQL`模式中，关系——无论是简单的名称-名称引用还是`Graphcool`模式指令`@relation`——都是不携带信息的。这让你可以选择使用专门的对象类型来承载描述关系的属性。这是一个解析器（resolver）的问题。


  另一个奇特的例子是一对一关系。对象类型及其属性之间总是一对一关系，也称为*依赖*（dependencies）。但一对一关系也确实发生在业务对象类型之间。虽然不那么常见。例子往往更多属于业务规则领域，而不是数据模型领域。图
  8-10 展示了一个我们之前见过的例子。


  ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig10_HTML.jpg](img/471428_1_En_8_Fig10_HTML.jpg)


  图 8-10


  每个发件人只有一个来源


  每个发件人只有一个“发件人”地址，对我来说，这似乎是互联网电子邮件历史遗留设计中的一项业务决策。发件人是一组“发件人”地址的邮件是完全可以想象的。


  然而，值得检查该关系是否携带信息。就像前面的例子那样，情况可能如此。可以想象，“回复”（in reply to）关系承载了一个日期，由此产生的 API 设计可能应该不同。


  顺便说一句，这再次证实了一个假设：大多数时候，多对多关系是携带信息的构造。


  一般来说，节点和关系都可以（应该）有“名称”（正式称为节点的标签（labels）和关系的类型（types）），就像图 8-10 中的概念及其关系一样。


  关系是有方向的，通过箭头可视化。


  节点和关系都可能与属性相关联，属性是键值对，例如`Color:Red`。在数据模型层面，我们称键为属性名称。


  ### 注意


  带标签的属性图模型是我们今天拥有的最灵活的通用数据模型范式。


  重要的是名称和结构（节点和关系）。属性通过添加内容来补充解决方案的结构。属性基本上也只是标签，但它们可以表示“身份”（数据模型层面的键的一般概念）。


  最后，自引用也会时不时地出现在数据模型中。图 8-11 展示了一个双重例子。消息可以引用另一条消息，无论是引用还是回复。


  ![../images/471428_1_En_8_Chapter/471428_1_En_8_Fig11_HTML.jpg](img/471428_1_En_8_Fig11_HTML.jpg)


