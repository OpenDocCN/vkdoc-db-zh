- "# 11. 将 GraphQL 与现有图数据库结合使用\n\n既然 GraphQL 基于图思维，我们如何能在图数据库之上使用 GraphQL？这当然是一个相关的问题。为了回答这个问题，我们首先看一个用例，即从一个\
  \ GraphQL API 支持一个现有的图数据库。之后，我们看一个常见的用例，即 GraphQL API 将与一个新的图数据库一起使用。\n\n由于转换是基于\
  \ DBMS 的语言，我使用 Neo4j^(³⁶) 图平台的语言（参见[`https://neo4j.com/`](https://neo4j.com/)）。它被称为\
  \ Cypher，是一种非常强大的声明性语言。虽然 Neo4j 使用 Cypher，但该语言已通过 openCypher 项目开源，现在有许多其他项目也使用 Cypher^(³⁷)（参见[`http://www.opencypher.org/`](http://www.opencypher.org/)）。\n\
  \n## Neo4j GraphQL 插件\n\nNeo4j 在将 GraphQL 集成到 Neo4j 平方方面做得非常出色。最简单的使用方法是在 Neo4j\
  \ Desktop 界面中安装一个插件。\n\nNeo4j 开发者关系部门的 Will Lyon 制作了一个出色的视频来解释一切。它被称为“Using The\
  \ Neo4j-GraphQL Plugin With Neo4j Desktop”^(³⁸)（参见[`https://youtu.be/J-J90uwugb4`](https://youtu.be/J-J90uwugb4)）。\n\
  \n基本上，该插件使你能够直接从 Neo4j 提供 GraphQL 端点，通过：\n\n*   从现有的 Neo4j 数据生成 GraphQL 模式\n*  \
  \ 基于你提供的 GraphQL 模式提供 GraphQL 端点\n*   将 GraphQL 实时翻译为 Cypher\n*   自动生成用于 GraphQL\
  \ 查询的查询类型\n*   自动生成用于 GraphQL 写入操作的变更类型\n*   通过 GraphQL 作为`@cypher`模式指令暴露 Cypher\n\
  \n你也可以在 Will Lyon 的博客文章“[Using The Neo4j](https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9)-GraphQL\
  \ Plugin In Neo4j Desktop”^(³⁹)（参见[`https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9`](https://blog.grandstack.io/using-the-neo4j-graphql-plugin-in-neo4j-desktop-c8a60aa014d9)）中找到有关该插件的更多信息。\n\
  \n\n## 生成你的第一个 GraphQL 模式\n\n其实非常简单。你从 Neo4j Desktop 安装插件，如图 11-1 所示。\n\n![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig1_HTML.jpg](img/471428_1_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1:** 在 Neo4j Desktop 中安装插件\n\n安装插件后，你需要安装 GraphiQL 应用的 Electron 版本^(⁴⁰)，用于浏览和测试。关于设置端点和授权头以建立连接（不是什么大事）的详细信息，请参考视频和博客文章。\n\
  \n要根据 Neo4j 数据库中的数据生成模式，请向 Neo4j Desktop 发出此命令：\n\n```graphql\nCALL graphql.idl(null);\n\
  ```\n\n你可能需要转换现有数据，使其适合通过 GraphQL 展示。这取决于数据的质量以及元数据（标签、属性名称和关系类型）的质量。在接下来的章节中，我们将讨论潜在的问题。如果你需要做转换，值得知道的是\
  \ Neo4j-GraphQL 集成包含一个 `@cypher` 指令，它使你能够在 GraphQL 模式内做一些图形化的事情。看看这个包含嵌入式 `@cypher`\
  \ 语句和类型扩展的示例：\n\n```graphql\ntype Movie {\n    title: ID!\n    released: Int\n \
  \   tagline: String\n    actors: [Person] @relation(name:\"ACTED_IN\", direction:IN)\n\
  \    director: Person @relation(name:\"DIRECTED\", direction:IN)\n    recommendation(first:Int\
  \ = 3): [Movie]\n      @cypher(statement:\n        \"MATCH (this)-[:ACTED_IN]->()-[:ACTED_IN]-(reco:Movie)\n\
  \         WHERE this <> reco\n         RETURN DISTINCT reco LIMIT {first}\")\n}\n\
  schema {\n   mutations: Mutations\n}\n```\n\n请注意，带有 `@cypher` 模式指令的字段将成为“计算”字段。这种技术允许在数据存储于\
  \ Neo4j 的方式与在 GraphQL 层展示的方式之间进行一些转换。\n\n本章引用的视频和博客文章涵盖了在现有图数据库之上以及在空白图数据库之上使用 GraphQL\
  \ 的操作指南，后者是本书的最后一个主题。\n\n让我们重新审视遗留的 SQL 问题，看看它们在现有 Neo4j 数据库的上下文中如何应用。\n\n## 数据名称\n\
  \nNeo4j-GraphQL 插件将从现有的图数据中派生出 GraphQL 模式。通过采样，集成为每个 `节点标签` 添加一个类型，所有找到的属性及其类型都作为字段。\n\
  \n这给你提供了一个比从零开始好得多的起点。然而，当然，这在很大程度上取决于现有数据模型的质量。所以，略带讽刺地说，你应该预期会花一些时间将不太好的名称映射到面向业务的名称上。这种映射将通过编辑生成的\
  \ GraphQL 模式来完成，例如使用 `@cypher` 扩展。就像处理 SQL 一样，你可能会在这里花费时间，但花费的时间应该比在 SQL 中需要做的少。我见过的一些\
  \ SQL 数据库几乎需要考古学家才能确定数据标识。\n\n## 标识、唯一性和键\n\n没有约束 Neo4j 也能运行，但你也可以拥有约束。数据剖析^(⁴¹)（参见\
  \ [`https://neo4j.com/blog/data-profiling-holistic-view-neo4j/`](https://neo4j.com/blog/data-profiling-holistic-view-neo4j/)）相当容易，你应该花些时间仔细检查候选键。所以，就像处理\
  \ SQL 一样，你可能需要在这里花费一些时间。\n\nNeo4j 节点 ID 仅供内部使用。不要将内部 Neo4j ID 用于长期的实体标识。未来版本的 Neo4j\
  \ 可能会为了性能目的而调整这些 ID。创建你自己的唯一 ID 属性（最好带有约束）以跟踪实体。\n\n## 状态、版本和内务管理\n\n与 SQL 一样，你可能想在这里花费一些时间。不过有一个好处：Neo4j\
  \ 是无模式的，因此重构数据库比在 SQL 中容易得多。\n\n## 标量数据类型\n\nNeo4j 本身没有显式类型，但 Neo4j-GraphQL 是强制的，在大多数情况下，默认会传输正确的类型。不过，类型转换函数是可用的。对于字符串编码的信息（本应是其他类型，例如浮点数）可能会存在问题。识别和修复这些问题可能需要一些时间。\n\
  \n## 日期和时间\n\nNeo4j 本身没有任何日期和时间类型。然而，在 Neo4j 3.x 中，添加了 APOC 程序支持，包括用于日期/时间支持^(⁴²)\
  \ 的程序（参见 [`https://neo4j-contrib.github.io/neo4j-apoc-procedures/#_date_and_time_conversions`](https://neo4j-contrib.github.io/neo4j-apoc-procedures/#_date_and_time_conversions)）。这使你能够通过\
  \ Cypher 命令处理大多数转换。\n\nCypher 本身对时间函数的支持在 3.4 版本中到来。\n\nGraphAware 有一个名为 TimeTree^(⁴³)\
  \ 的库，看起来很有趣，如图 11-2 所示。参见 [`https://graphaware.com/neo4j/2014/08/20/graphaware-neo4j-timetree.html`](https://graphaware.com/neo4j/2014/08/20/graphaware-neo4j-timetree.html)。\n\
  \n![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig2_HTML.jpg](img/471428_1_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2:** 来自 GraphAware 的 TimeTree\n\n## 命名关系\n\nNeo4j-GraphQL 插件^(⁴⁴) 将使用 `@relation`\
  \ 指令生成 GraphQL 模式代码。对于 `Movie` 数据库中的 `ACTED_IN` 关系，它看起来像这样：\n\n```graphql\ntype\
  \ Person { name: String, movies : Movie @relation(name:\"ACTED_IN\", direction:OUT)\
  \ }\n```\n\n如你所见，Neo4j-GraphQL 插件使用 `@relation` 指令来编码关系类型，同时也编码方向，因为在属性图模型中图是有向的。\n\
  \n再次强调，关系类型名称的质量（面向业务）将取决于创建者。\n\n## 关系类型\n\nNeo4j-GraphQL 集成将捕获你需要的大部分内容。\n\n在\
  \ Neo4j 图数据库中，多对多（M:M）是完全可以的。然而，你将需要将它们拆分为两个。如果你还记得 `Movie` 示例，`ACTED_IN` 关系中存在一个多对多关系。这将给你两个关系（在\
  \ GraphQL 中是 `@relation`）：\n\n*   `Movies` 是一个 `Actor` 演过的电影\n*   `Actors` 列出了某部\
  \ `Movie` 中的演员\n\n你可以很容易地在 Cypher 中检查基数：\n\n```cypher\nMATCH (p:Person)-[:WROTE]->(m)<-[:WROTE]-(coPersons:Person)\n\
  RETURN p, m, coPersons\n```\n\n路径查询返回一些数据，表明即使是 `WROTE` 关系（以及碰巧 `DIRECTED` 关系）也是多对多的，如图\
  \ 11-3 所示。\n\n![../images/471428_1_En_11_Chapter/471428_1_En_11_Fig3_HTML.jpg](img/471428_1_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3:** 查找多对多关系\n\n这些数据仅用于演示目的。显然，在现实生活中，在电影语境中，像这样的多对多关系案例还有很多。\n\n## 缺失信息\n\
  \n与 SQL 相比，Neo4j 中处理缺失信息的方式不同。在 SQL 中你使用 `NULL` 值，但在 Neo4j（以及大多数其他 NoSQL 数据类型）中，缺失的信息就是不存在。以一个人的年龄为例。年龄是一个属性，如果一个\
  \ `Person` 节点没有已知年龄，则该节点上就缺失 `Age` 属性。\n\n在用户端的 GraphQL 中，你可以拥有非空字段，这意味着你可能需要自己处理默认值的生成。幸运的是，如示例\
  \ GraphQL 模式所示，`@cypher` 扩展可以用于此目的。\n\n我确实认为应该避免 `NULL`，并且可以根据业务规范用默认值来替代它们。\n\n\
  \n## 关系上的属性\n\n以我之见，事物和事件不应被置于关系之上。在某些（大多数）图数据库中，这是允许的。然而，它非常适合与描述关系特征的属性配合使用，例如权重、所有权百分比等。\n\
  \n有人可能会争辩说，例如，所有权百分比是一个名为\"所有权份额\"的实体的属性，该实体是一个关系型桥接表，用于实现所有者与财产之间的多对多关系。这主要是一个业务决策。如果业务人员不认可\"\
  所有权份额\"这个概念，那么讨论就到此为止。\n\n如果引入一个新的业务层面概念（如\"所有权份额\"）是可以接受的，那么关系就会作为一个新的 `GraphQL`\
  \ 对象类型显现，该类型包含一个表示百分比的标量字段。将会出现两个新的关系。显然，API 设计者必须决定遍历路径。鉴于限制在于 `GraphQL` 概念层面，这是一个可以接受的解决方案。\n\
  \n脚注 1 2 3 4 5 6 7 8 9\n\n"
- "# 12. 将 `GraphQL` 与新的图数据库结合使用\n\n## `Neo4j-GraphQL` 集成的设计目标\n\n一个用于 `GraphQL` API\
  \ 的图解决方案是什么样的？\n\n我可以通过考察 `Neo4j-GraphQL` 插件来最好地回答这个问题。我没有重复 Will Lyon 在其视频中的内容，而是决定简要总结另一篇由\
  \ `Neo4j` 的 Will Lyon 于 2018 年 3 月撰写的最新博客文章。文章题为“五个常见的 `GraphQL` 问题以及 `Neo4j-GraphQL`\
  \ 如何旨在解决它们”（参见 [`https://blog.grandstack.io/five-common-graphql-problems-and-how-neo4j-graphql-aims-to-solve-them-e9a8999c8d43`](https://blog.grandstack.io/five-common-graphql-problems-and-how-neo4j-graphql-aims-to-solve-them-e9a8999c8d43)）。\n\
  \n显然，使用图数据库作为 `GraphQL` API 的存储具有一些优势，你将会看到。在下文中，Will 解释了 `GraphQL` `Neo4j` 集成的愿景：\n\
  \n*   几周前，我读到了 Sacha Greif 在 freeCodeCamp 上的一篇文章，题为“`GraphQL` 应用中的五个常见问题（以及如何解决它们）”。我认为这是对开发者在采用\
  \ `GraphQL` 时遇到的一些问题的很好概述。\n\n*   当我通读这个常见问题列表时，我意识到这些问题与我们在研究 `Neo4j-GraphQL` 集成应该是什么样子时用户抱怨的一些问题相同（参见\
  \ [`https://neo4j.com/developer/graphql/`](https://neo4j.com/developer/graphql/)）。最终，我们的集成设计旨在帮助开发者在构建由\
  \ `Neo4j` 支持的 `GraphQL` 服务时提高效率。\n\n*   在这篇文章中，我想重新审视 Sacha 指出的每一个问题，并展示 `Neo4j-GraphQL`\
  \ 如何解决每一个问题。\n\n### 问题 1：模式重复\n\n> *即，你需要一个数据库模式，还需要另一个用于你的 GraphQL 端点的模式。——Sacha\
  \ Greif*\n\n*   `GraphQL` 使用严格定义的 `schema`（模式），它定义了可用的类型和 API 的入口点。这个 `schema` 充当了\
  \ `GraphQL` API 的规范，并且通过自省功能支持强大的开发者工具，如查询补全、模拟和文档生成。然而，标准的 `GraphQL` 实现通常需要同时处理你的数据库的\
  \ `schema` 和你的 `GraphQL` API 的 `schema`。\n\n*   为了简化构建由 `Neo4j` 支持的 `GraphQL` 应用程序的过程，`Neo4j-GraphQL`\
  \ 集成使用 `GraphQL` `schema` 来推断 `Neo4j` 数据模型应该是什么样子。\n\n*解决方案：使用 `GraphQL` 模式来驱动 `Neo4j`\
  \ 数据库模型。*\n\n### 问题 2：服务器/客户端数据不匹配\n\n> *你的数据库和 GraphQL API 将会有不同的模式，这会导致不同的文档形状。——Sacha\
  \ Greif*\n\n*   如果你的 `GraphQL` 服务的后端不是图数据库，那么就必须进行某种映射和转换，以将数据从你在数据持久层建模的方式转换为 `GraphQL`\
  \ 所需的图形状。通过使用图数据库作为我们 `GraphQL` 服务的数据层，我们预先避免了这个问题。\n\n*   `Neo4j-GraphQL` 集成将任何任意的\
  \ `GraphQL` 请求转换为图查询语言 `Cypher`，并作为 `GraphQL` 解析器的一部分处理数据库调用。\n\n*解决方案：将 `GraphQL`\
  \ 转换为 `Cypher`。（注意：这是自动完成的。）*\n\n### 问题 3：多余的数据库调用\n\n> *想象一个帖子列表，每个帖子都关联一个用户。你现在想要显示\
  \ 10 个这样的帖子，以及它们作者的名字。——Sacha Greif*\n\n*   正如 Sacha 指出的，对于上面的例子，一个典型的 `GraphQL`\
  \ 实现会为帖子列表进行一次数据库查询，然后为每个帖子再进行一次查询以获取用户信息。这导致了 11 次到数据库的往返请求！这就是所谓的 n+1 查询问题，常见的解决方案是使用像\
  \ `Dataloader` 这样的工具。\n\n*   我们当然可以将 `Dataloader` 与 `Neo4j` 一起使用——它被设计为与数据层无关，但使用\
  \ `Neo4j-GraphQL` 的优势在于，它可以为任何任意的 `GraphQL` 请求生成*单个* `Cypher` 查询。这意味着对于任何 `GraphQL`\
  \ 请求，我们只向数据库发出单个请求。\n\n*解决方案：将 `GraphQL` 转换为单个 `Cypher` 查询。（注意：这是自动完成的。）*\n\n###\
  \ 问题 4：性能不佳\n\n> *一方面你想充分利用 GraphQL 的图遍历特性（“显示评论作者的帖子的作者……”等等）。但另一方面，你不希望你的应用变得缓慢和无响应。——Sacha\
  \ Greif*\n\n*   虽然确实 `GraphQL` 支持表达像上面例子那样的图遍历，但负责解析数据的许多数据库系统并未针对这些工作负载进行优化。像 `Neo4j`\
  \ 这样的图数据库则针对此类图遍历查询进行了优化。通过将 `GraphQL` 转换为 `Cypher`，我们可以利用像 `Neo4j` 这样的图数据库执行引擎的强大性能优势。此外，`GraphQL`\
  \ 缺乏像 `Cypher` 这样的数据库查询语言的语义，无法表达诸如过滤、投影或聚合之类的事情。通过使用 `GraphQL` `schema` 指令，我们可以结合\
  \ `Cypher` 的强大功能与 `GraphQL`，将 `GraphQL` 字段映射到任意 `Cypher` 查询的结果。\n\n*解决方案：在 `GraphQL`\
  \ 中展现 `Cypher` 的威力。*\n\n\n### 问题 5：样板代码泛滥\n\n> *这绝非 GraphQL 应用独有问题，但它们确实通常要求你编写大量相似的样板代码。——Sacha\
  \ Greif*\n\n*   实现一个典型的 GraphQL 服务涉及为 GraphQL 服务编写一个 schema，为数据库编写一个 schema，编写解析器函数来获取数据，以及为创建和更新数据编写变更（mutations）。其中大部分是样板代码，可以通过检查\
  \ GraphQL schema 来生成。\n\n*解决方案：从 GraphQL schema 自动生成查询（Query）和变更（Mutation）类型。参见图*\
  \ *12-1* *。*\n\n![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig1_HTML.png](img/471428_1_En_12_Fig1_HTML.png)\n\
  \n图 12-1\n\n使用 Neo4j-GraphQL 时，查询和变更类型是自动生成的\n\n*   我们之前提到过，解析器是通过从 GraphQL 模式推断数据库模式、将\
  \ GraphQL 转换为 Cypher 以及处理数据库调用来自动实现的。此外，GraphQL 服务的入口点（查询和变更类型）也是自动生成的，从而减少了实现基于\
  \ Neo4j 的 GraphQL 服务所需的样板代码。此外，还会为顶级查询和指向其他实体的字段生成 first、offset、filter-fields、ordering\
  \ 等参数。\n\n以上就是 Will Lyon 关于 Neo4j-GraphQL 设计目标的文章的结尾部分。\n\n让我们看看实际效果吧！\n\n## 从 GraphQL\
  \ 模式生成你的 Neo4j 数据库\n\n让我们在 Neo4j 中使用我在本书前面章节介绍过的电子邮件示例。\n\n要从 GraphQL 模式生成 Neo4j\
  \ 这一侧，你只需将模式中的类型定义传递给接口，方法是在 Neo4j 桌面版中执行类似这样的命令：\n\n```\nCALL graphql.idl(\n'type\
  \ Address {\n  id: ID!\n  display_name: String\n  address_spec: String!\n  address_from:\
  \ Originator! @relation(name: \"From\")\n  address_sender: Originator @relation(name:\
  \ \"Sender\")\n  address_reply_to: Originator @relation(name: \"ReplyTo\")\n  destination_to:\
  \ [Destination] @relation(name: \"To\")\n  destination_cc: [Destination] @relation(name:\
  \ \"Cc\")\n  destination_bcc: [Destination] @relation(name: \"Bcc\")\n}\n\ntype\
  \ Originator {\n  id: ID!\n  origin_date: String!\n  originator_role: String!\n\
  \  message: [Message!] @relation(name: \"Originator\")\n  address_from: Address!\
  \ @relation(name: \"From\", direction:\"IN\")\n  address_sender: Address @relation(name:\
  \ \"Sender\", direction:\"IN\")\n  address_reply_to: Address @relation(name: \"\
  ReplyTo\", direction:\"IN\")\n}\n\ntype Destination {\n  id: ID!\n  destination_role:\
  \ String!\n  received_date: String!\n  message: Message! @relation(name: \"Destination\"\
  , direction:\"IN\")\n  address_to: [Address]! @relation(name: \"To\", direction:\"\
  IN\")\n  address_cc: [Address] @relation(name: \"Cc\", direction:\"IN\")\n  address_bcc:\
  \ [Address] @relation(name: \"Bcc\", direction:\"IN\")\n}\n\ntype Message {\n  id:\
  \ ID!\n  subject: String\n  comments: String\n  originator: Originator! @relation(name:\
  \ \"Originator\", direction:\"IN\")\n   destinations: [Destination]! @relation(name:\
  \ \"HasDestination\")\n   referencing: [Message] @relation(name: \"Referencing\"\
  )\n   in_reply_to: [Message] @relation(name: \"InReplyTo\")\n   keywords: [Keyword]\
  \ @relation(name: \"Tags\")\n}\n\ntype Keyword {\n  id: ID!\n  keyword: String!\n\
  \  messages: [Message] @relation(name: \"Tags\", direction:\"IN\")\n}\n');\n```\n\
  \n请注意，我为 `@relation` 添加了方向，因为 Neo4j 需要知道其语义。\n\n在 Neo4j 桌面版工作台中，结果显示为一个仅供内部使用的元数据文档，它描述了\
  \ GraphQL 模式。\n\nNeo4j-GraphQL 插件包含一些用于在 Neo4j 中处理 GraphQL 的有用过程。其中一个重要的过程是将 GraphQL\
  \ 模式可视化为图数据模型，如图 12-2 所示。\n\n![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig2_HTML.jpg](img/471428_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2\n\n将 GraphQL 模式可视化为图数据模型\n\n这让你可以检查物理图模型的结构。可以在 GraphQL 层面进行更正，然后重新处理模式。\n\
  \n最后，通过打开 GraphiQL GraphQL 浏览器，我们可以看到 GraphQL 模式文档。所以，到目前为止，我们已经准备好通过 GraphQL API\
  \ 来查询和变更 Neo4j 图数据库中的数据了，如图 12-3 所示。\n\n![../images/471428_1_En_12_Chapter/471428_1_En_12_Fig3_HTML.jpg](img/471428_1_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3\n\n使用 GraphiQL 查询和操作 Neo4j 中的图数据\n\n使用 Neo4j 图数据库作为底层数据存储，可以让你的 GraphQL\
  \ 项目获得一个良好的开端。编写你的模式，告诉 Neo4j，你就可以开始通过 GraphQL 输入数据并进行查询了。\n\n## Neo4j-GraphQL 资源\n\
  \n开始接触 GraphQL 和 Neo4j 的一个好地方是前面引用过的文章（作者 Will Lyon），题为“在 Neo4j Desktop 中使用 Neo4j-GraphQL\
  \ 插件”。^(⁵¹) 它会指导你完成所有必要的步骤。\n\n有一个 Neo4j-GraphQL 集成的 JavaScript 版本。[neo4j-graphql-js](https://www.npmjs.com/package/neo4j-graphql-js)\
  \ NPM 包^(⁵²) 可在 [`https://www.npmjs.com/package/neo4j-graphql-js`](https://www.npmjs.com/package/neo4j-graphql-js)\
  \ 获取。Neo4j-GraphQL 集成的 JavaScript 版本设计用于与所有 JavaScript GraphQL 服务器实现配合工作。\n\n你可以在这里了解更多关于\
  \ neo4j-graphql 和 GRANDstack 项目的信息：\n\n*   *GRANDstack.io*：^(⁵³) 与使用 GRANDstack（GraphQL、React、Apollo\
  \ 和 Neo4j 数据库）构建应用程序相关的所有内容。参见 [`http://grandstack.io`](http://grandstack.io) `/`。\n\
  \n*   *Neo4j 和 GraphQL 开发者页面*：^(⁵⁴) 在 Neo4j 中使用 GraphQL 的方法概述。参见 [`https://neo4j.com/developer/graphql/`](https://neo4j.com/developer/graphql)\
  \ 。\n\n*   *使用 Neo4j-GraphQL 过程*：^(⁵⁵) 与 Neo4j-GraphQL 插件交互。参见 [`https://github.com/neo4j-graphql/neo4j-graphql#procedures`](https://github.com/neo4j-graphql/neo4j-graphql#procedures)\
  \ 。\n\n*   *Neo4j-GraphQL GitHub 组织*：^(⁵⁶) 在此找到 Neo4j-GraphQL 集成的代码和文档。参见 [`https://github.com/neo4j-graphql`](https://github.com/neo4j-graphql)\
  \ 。\n\n*   *neo4j-graphql-cli*：^(⁵⁷) 一个命令行工具，用于在 Neo4j Sandbox 上使用 Neo4j-GraphQL\
  \ 快速启动一个 GraphQL API。参见 [`https://www.npmjs.com/package/neo4j-graphql-cli`](https://www.npmjs.com/package/neo4j-graphql-cli)\
  \ 。\n\n*   *Neo4j Slack 频道*：^(⁵⁸) 一个命令行工具，用于在 Neo4j Sandbox 上使用 Neo4j-GraphQL 快速启动一个\
  \ GraphQL API。参见 [`https://www.neo4j.com/slack`](https://www.neo4j.com/slack) 。\n\
