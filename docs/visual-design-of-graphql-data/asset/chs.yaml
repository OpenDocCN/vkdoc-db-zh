- "# 2. GraphQL 概念\n\nGraphQL 上下文中定义了许多概念。图 2-1 所展示的概念模型囊括了所有重要的概念。\n\n![../images/471428_1_En_2_Chapter/471428_1_En_2_Fig1_HTML.jpg](img/471428_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1 GraphQL 概念\n\n(有关所有模式的详细信息，请参阅 GraphQL 模式介绍 [`http://graphql.org/learn/schema/`](http://graphql.org/learn/schema/)^[15])。关于图\
  \ 2-1 所示的图表风格，有几点说明：\n\n*   它是一个有向图（属于概念图类别）\n*   关系是有名称的\n*   关系可以是：\n    *   一对一（无箭头）\n\
  \    *   一对多（单箭头）\n    *   多对多（双侧箭头，图 2-1 中未出现）。\n\n您可以在我的著作 `Graph Data Modeling\
  \ for NoSQL and SQL`^[16], 2016, Technics Publications (访问 [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling/))\
  \ 中了解更多关于这种图表风格的信息。\n\n一些概念，如 `Mutation`、`Input`、`Function` 和 `Subscription`，属于应用/服务器构建服务（更新、插入、数据库映射和推送服务），它们也是模式的一部分。然而，由于我的关注点在于所暴露模型自身的结构和含义，因此在接下来的讨论中，我将忽略所有这些内容。\n\
  \n其余的概念大多如其名所示。以下是一些简短的解释：\n\n| 概念 | 解释 |\n| --- | --- |\n| GraphQL 模式 | 定义了所暴露数据模型的结构和含义（以及数据操作函数，这里我们不讨论这些函数）。\
  \ |\n| 枚举 | 基本上是一个值列表，可应用于某个字段。 |\n| 查询 | 根查询定义了应用程序图（树）的锚点，并塑造了结果集。 |\n| 接口 | 本质上是对象（或查询）的一个“视图”；常用于“子类型化”。\
  \ |\n| 联合 | 共享相关内容的结果子图的串联。例如，各种类型的人物，如用户、演员等。 |\n| 对象 | 一个业务对象（可以想想星球大战示例中的 `电影`\
  \ 或 `星际飞船`）。 |\n| 片段 | 子图的一个子集。内联片段通常与联合结构一起使用。 |\n| 字段 | 承载数据的部分。可以是标量或列表（是的，就像重复组一样）。\
  \ |\n| 指令 | 用户可定义的 GraphQL 语法扩展。 |\n\n`@relation` 是一个很好的 GraphQL 指令示例。它是由 Graphcool^[17]\
  \ 引入的（参见 [`http://www.graph.cool/`](http://www.graph.cool/)）。我非常喜欢它，因为它命名了关系。\n\n\
  否则，你只是像这样连接对象类型：\n\n```\nType Movie { ..... actors: [Actor] } )\n```\n\n通常，可复用的\
  \ GraphQL 模式指令可用于多种目的：\n\n*   强制访问权限\n*   格式化日期字符串\n*   为特定后端自动生成解析器函数\n*   标记字符串以进行国际化\n\
  *   合成全局唯一标识符\n*   指定缓存行为\n*   跳过、包含或弃用字段\n*   以及更多\n\n所有详细信息请参见 Ben Newman^[18]\
  \ 的博文 [`https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1`](https://dev-blog.apollodata.com/reusable-graphql-schema-directives-131fb3a177d1)。\n\
  \n请注意，在 GraphQL 规范^[19]（参见 [`https://github.com/facebook/graphql/blob/master/spec/GraphQL.md`](https://github.com/facebook/graphql/blob/master/spec/GraphQL.md)）的最新工作草案中，以下类型可以由用户定义的扩展进行扩展：标量、对象、接口、联合、枚举和输入对象。这可能会被本地服务用来表示\
  \ GraphQL 客户端仅在本地访问的数据，或者被本身就是另一个 GraphQL 服务扩展的 GraphQL 服务所使用。扩展可以是常量、指令或字段定义。\n\
  \n我们感兴趣的模式部分的语法图，在元层面上如图 2-2 所示。\n\n![../images/471428_1_En_2_Chapter/471428_1_En_2_Fig2_HTML.jpg](img/471428_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2 GraphQL 语法元素\n\n圆角矩形表示它们所连接的概念（对象类型）的属性。\n\n让我们从总体上看看数据设计问题，并确定在 GraphQL\
  \ API 上下文中哪些问题是相关的。\n\n"
- '# 3. 入门指南


  ## 哪些设计层次？


  经典的数据建模在多个方面都失败了。我们必须做得比那更好。效果不佳的是概念建模，它已经逐渐淡出，取而代之的可以说是“伟大、实用、快速、统一的数据建模实践”。


  如今，许多开发组织采用一步到位的建模方法，在开发过程中必要时执行。逻辑模型和物理模型已经合并。驱动力是交付时间，而统一过程试图回答的是开发一个良好解决方案的两个方面：


  *   用逻辑数据模型描述“是什么”

  *   描述“如何做”的某些方面，例如，为获得更好性能而进行的物理访问优化


  在 GraphQL 上下文中，目标是实现应用程序（或用户）与数据存储之间的完全独立。由于我们（在本书中）只对模式和查询感兴趣，我们应该专注于“是什么”的问题。


  换句话说，我们需要对概念层次有一个全新的视角。它仍然能增加业务价值，因为它是与业务人员有效沟通术语、关系等事物的工具。这就是为什么可视化技术必须发挥主导作用。


  其次，我们也应该培育“逻辑层次”，因为它（模式）是一个包含关于范围、泛化、抽象和聚合、关系与呈现等设计决策的人工制品。同样，可视化是理解和沟通的绝佳工具。


  对于物理层次，我们有解析器函数的各种用例。我们将在本书后面的章节中探讨一些需求。我们会描述一些可能影响解析器功能的考虑因素，但不会给出具体的代码示例，比如 JavaScript
  或类似的。


  但让我们从头开始。一个好的起点是尝试理解并界定主题领域。




  ## 获取概览


  如果你还不了解范围，你需要对你正在为其创建模式的领域有一个概览。


  图 3-1 展示了一个汽车经销商中一些业务概念的概览。


  ![../images/471428_1_En_3_Chapter/471428_1_En_3_Fig1_HTML.jpg](img/471428_1_En_3_Fig1_HTML.jpg)


  图 3-1：汽车经销商概念概览


  注意，上层往往是分类和其他层级结构。中间层级是参与业务流程的核心业务对象。


  有趣的是，最低层的概念都是业务事件或其他记录，其中一些是快照类型（比如特定日期的库存）。


  这样的概览将为你的 API 工作提供一个良好的开端，所以花几个小时在白板上创建一个概览，让其他业务人员评审它，并让它指导你后续的模式定义活动。


  你也可以考虑从数据源开始自下而上地构建概览。通常，自上而下和自下而上相结合的方式能给你带来所需的结果。


  请注意，最低层的概念实际上是业务的价值链——从预算开始，演变为采购，然后到库存和销售。（再到后续的维护和盈利能力计算。）


  显然，不应存在“孤岛”——一切都应该与其他事物相连。


  你可以在我的名为 *《NoSQL 与 SQL 的图数据建模》* [*Graph Data Modeling for* [*NoSQL and SQL*](https://technicspub.com/graph-data-modeling/)
  ](https://technicspub.com/graph-data-modeling/) 的书中了解更多关于概念级分析和设计的内容，^(²⁰) 2016，Technics
  Publications (访问 [`https://technicspub.com/graph-data-modeling/`](https://technicspub.com/graph-data-modeling/)
  )。


  注意，即使像汽车经销商这样简单的业务运营，其连接程度也很高。显然，图表示是可行之道，`GraphQL` 开发者可以从这些如今被称为“企业知识图谱”的高层次地图中学到很多。


  *一旦你开始审视字段属性，模式数据设计就会变得清晰可见，因为承载属性的概念是业务对象，而没有属性的概念可能只是抽象概念，你可能希望根据需要将其剔除或用属性进行描述。*


  请注意，即使你应该尝试映射整个企业（在高层次概念图上），也不应采取太多或太大的步骤。事实上，`GraphQL` 社区近期的进展鼓励采用渐进式方法，并复用现有的模式部分与新开发的模式部分。我们将在后面的章节简要讨论这一点（模式拼接和模式绑定）。


  我们正在探讨定义 `GraphQL` 模式和 API。物理的数据存取操作隐藏在解析器函数中，我们将在本书最后部分提及它们。


  我们的重点既在于内容含义的业务方面，也在于相关数据的结构方面。


  准确地说，我们寻找的是：


  *   含义

  *   结构


  *这就是为什么图可视化是查看结构化信息的通用关键。*


  可以公允地说，本书的视觉部分提出了属性图建模风格作为 `GraphQL` 模式的最佳设计模式。


