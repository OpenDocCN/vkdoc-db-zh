    ### 监控空间使用情况


    如果如本章前面讨论的那样，将 `CLEANUP_POLICY` 设置为 `AUTO`，您将需要自行监控空间使用情况，以确保查询存储不会切换到只读模式。默认情况下，查询存储将在容量达到
    90% 时，清理数据至 80% 容量。如果您的 `MAX_STORAGE_SIZE_MB` 大小设置过低，且有大量事务通过，则查询存储有可能增长到超过指定的最大大小。在代码清单
    3-26 中，您将找到用于监控实例上某个数据库空间使用情况的代码（当该数据库容量达到 90% 时）。


    ```sql

    USE [];

    GO

    SELECT current_storage_size_mb,

    max_storage_size_mb,

    FROM sys.database_query_store_options

    WHERE CAST(CAST(current_storage_size_mb AS

    DECIMAL(21, 2)) / CAST(max_storage_size_mb AS

    DECIMAL(21, 2)) * 100 AS DECIMAL(4, 2)) >= 90

    AND size_based_cleanup_mode_desc = ''OFF'';

    ```

    代码清单 3-26 用于检查查询存储是否达到 90% 容量的 T-SQL 代码


    ### 提示


    您会希望将此代码放入一个 SQL Agent 作业中，并添加在查询存储接近容量时向您发送电子邮件警报的代码，以便您可以处理。


    ### 如何清除查询存储


    您可能会发现需要手动清除查询存储中的数据。您可以使用代码清单 3-27 和 3-28 中的两种方法之一来执行此操作。


    ```sql

    USE [];

    GO

    EXEC sys.sp_query_store_flush_db;

    ```

    代码清单 3-28 用于清除查询存储中所有数据的存储过程


    ```sql

    ALTER DATABASE [] SET QUERY_STORE CLEAR ALL;

    ```

    代码清单 3-27 用于清除查询存储中所有数据的 T-SQL


    ### 计划强制失败


    计划强制可能因多种原因而失败，例如计划中的索引被更改或删除、尝试写入索引时正在进行联机索引重建，或提示冲突。跟踪失败的计划很重要，这样您才能知道强制计划后是否获得了预期的性能提升。有两种方法可以跟踪强制计划。第一种是使用
    T-SQL。您可以查询目录视图 `sys.query_store_plan` 来查看最后的失败原因和失败计数，如代码清单 3-29 所示。


    ```sql

    SELECT plan_id,

    force_failure_count,

    last_force_failure_reason

    FROM sys.query_store_plan

    ```

    代码清单 3-29 查询具有失败强制计划的计划


    由于上述方法仅显示最后一次强制计划的原因，然后递增计数器，并且是针对每个数据库的，您可能希望设置一个扩展事件会话来跟踪跨 SQL Server 实例的失败计划强制，并设置一个
    SQL Agent 作业进行查询和发送警报。在代码清单 3-30 中，您将找到一个可以设置来捕获失败计划强制的扩展事件会话。


    ```sql

    CREATE EVENT SESSION [QueryStore_Forcing_Plan_Failure]

    ON SERVER

    ADD EVENT qds.query_store_plan_forcing_failed

    ADD TARGET package0.ring_buffer WITH

    (

    MAX_MEMORY=4096 KB,

    EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,

    MAX_DISPATCH_LATENCY=30 SECONDS,

    MAX_EVENT_SIZE=0 KB,

    MEMORY_PARTITION_MODE=NONE,

    TRACK_CAUSALITY=OFF,

    STARTUP_STATE=ON

    );

    ```

    代码清单 3-30 用于捕获失败强制计划的扩展事件会话


    ### 移除计划和查询


    有时您可能希望从查询存储中移除某个计划。您可以使用存储过程 `sys.sp_query_store_remove_plan` 从查询存储中移除任何计划。运行此过程时，它还会移除与该计划关联的运行时统计信息。它要求对数据库具有
    `EXECUTE` 权限，对查询存储目录视图具有 `DELETE` 权限。有关如何从查询存储中移除计划的示例，请参见代码清单 3-31。


    ```sql

    EXECUTE sys.sp_query_store_remove_plan @plan_id = ;

    ```

    代码清单 3-31 用于从查询存储中移除查询的存储过程


    类似地，有时您可能希望从查询存储中移除某个查询，例如当您有多个即席查询占用查询存储空间时。您可以使用存储过程 `sys.sp_query_store_remove_query`
    从查询存储中移除任何查询。运行此过程时，它也会移除运行时统计信息。它要求对数据库具有 `EXECUTE` 权限，对查询存储目录视图具有 `DELETE` 权限。有关如何通过填写
    `query_id` 从查询存储中移除查询的示例，请参见代码清单 3-32。


    ```sql

    EXECUTE sys.sp_query_store_remove_query @query_id = ;

    ```

    代码清单 3-32 用于从查询存储中移除查询的存储过程


    ### 重置计划的统计信息


    存储过程 `sys.sp_query_store_reset_exec_stats` 清除给定计划的运行时统计信息，但将计划保留在查询存储中。它要求对数据库具有
    `EXECUTE` 权限，对查询存储目录视图具有 `DELETE` 权限。有关如何通过填写 `plan_id` 重置查询存储中计划的统计信息的示例，请参见代码清单
    3-33。


    ```sql

    USE [];

    GO

    EXECUTE sys.sp_query_store_reset_exec_stats @plan_id = ;

    ```

    代码清单 3-33 用于重置计划统计信息的查询


    ## 结论


    在本章中，我们了解了查询存储的所有配置选项和推荐设置。我们讨论了参数化查询与即席查询对查询存储的影响。然后我们讨论了对存储过程、函数和触发器使用删除和创建过程对查看这些对象统计信息的影响。我们讨论了如何通过使用跟踪标志来减少
    SQL Server 实例的关闭和启动时间。我们介绍了如何捕获本机编译存储过程的数据。最后，我们讨论了维护查询存储的各种方法。


