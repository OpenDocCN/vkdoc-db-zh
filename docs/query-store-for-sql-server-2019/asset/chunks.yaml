    collect your data and you don’t have to wait too long between each interval to
    run this next workload.


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig2_HTML.jpg](images/473933_1_En_6_Chapter/473933_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Database properties for Query Store


    The second is to run the stored procedure in Listing [6-2](#473933_1_En_6_Chapter.xhtml#PC2).


    ```

    USE []

    GO

    EXEC sys.sp_query_store_flush_db;

    Listing 6-2

    Store procedure to clear all the data out of Query Store

    ```


    Now we have a clean slate to capture data for our workload. To capture your workload
    so that you can replay it later, open SQL Server Profiler and pick the TSQL_Replay
    template and create a server-side trace as we discussed in Chapter [1](#473933_1_En_1_Chapter.xhtml).
    Now run your workload, and let Query Store capture all the data for the queries
    in the workload, and once the workload is done, stop the trace. Note the time
    period you ran your baseline workload for future comparisons. Now make your changes
    to the code or server that you want to compare. See the next section on how to
    compare the results.'
  trans: '# 6. Query Store 使用案例


    Query Store 有多种不同的应用场景，本章将详细探讨这些用例。我们将讨论如何通过查看报告或目录视图，利用 Query Store 来确定数据库的正常工作负载，并观察与该基线相比的变化。为数据库建立基线是每位数据库管理员（DBA）的必备技能，而
    Query Store 正是可为你提供数据库基线数据的工具。有时，你需要识别在之前的某个时间段内发生了什么。作为 DBA，你还必须排查性能不佳或性能回退的查询，Query
    Store 同样能为此提供所需数据。它可帮助你识别资源消耗最高的查询，从而了解如何提升 SQL Server 数据库的性能。在 SQL Server 升级到不同版本后，可以利用
    Query Store 捕获查询，之后再更改每个数据库的兼容模式并修复任何回退的查询，从而稳定 SQL Server 数据库的升级过程。最后，我们将探讨如何使用
    Query Store 跟踪临时工作负载并提升其性能。


    ## sys.query_store_runtime_stats_interval


    `sys.query_store_runtime_stats_interval` 目录视图是最基础、最小的视图。它包含每个运行时统计间隔的开始和结束时间。统计信息收集间隔分为
    1 分钟、5 分钟、10 分钟、15 分钟、30 分钟、1 小时和 1 天。有关如何配置此设置的更多信息，请参见第 3 章。表 5-9 展示了 `sys.query_store_runtime_stats_interval`
    目录视图中所有列名、数据类型及其描述。


    ## 结论


    要充分利用 Query Store，你需要理解各目录视图之间的关系，并根据不同的用例直接查询它们。所有关于 SQL Server 上运行情况的信息都包含在此处（取决于你的设置），并可根据你的规格进行自定义。数据已唾手可得，我们在第
    4 章已探讨了如何以可视化方式查看这些数据，并将在第 10 章介绍一个用于检索数据的存储过程。


    ## 确定什么是正常工作负载


    启用 Query Store 后，你会按照配置 Query Store 时指定的 `INTERVAL_LENGTH_MINUTES`（详见第 3 章）来收集数据。回顾一下这个配置选项：数据可以按
    1、5、10、15、60 和 1440 分钟的间隔进行聚合。考虑到这些数据点，你可以让正常的工作负载在服务器上运行，然后查看第 4 章中讨论的报告，从图 6-1
    所示的“整体资源消耗报告”开始。


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig1_HTML.jpg](img/473933_1_En_6_Fig1_HTML.jpg)


    图 6-1：整体资源消耗报告


    通过查看此报告，你可以确定数据库的正常工作负载是什么。从图 6-1 的报告中，你会注意到每周有两天活动量较低。这恰好对应周末，表明该数据库可能在周末活动较少、工作日活动较多的公司中使用。我们还可以注意到一种模式：在某些时段，持续时间和逻辑读取量高于正常水平。对于这些情况，你可以点击相应的柱状图，深入查看第
    4 章讨论的“资源消耗最高的查询报告”，以诊断是哪些查询导致了这些异常模式，并判断这些工作负载是否需要你关注。


    另一种获取数据的方式是查询第 5 章讨论的目录视图。清单 6-1 中的查询从目录视图中查询过去 10 天的数据，并按持续时间提取前 10 个查询。


    ```sql

    SELECT TOP 10 qt.query_sql_text,

    q.query_id,

    so.name,

    so.type,

    SUM(rs.count_executions * rs.avg_duration)

    AS ''Total Duration''

    FROM sys.query_store_query_text qt

    INNER JOIN sys.query_store_query q

    ON qt.query_text_id = q.query_text_id

    INNER JOIN sys.query_store_plan p

    ON q.query_id = p.query_id

    INNER JOIN sys.query_store_runtime_stats rs

    ON p.plan_id = rs.plan_id

    INNER JOIN sys.query_store_runtime_stats_interval rsi

    ON rsi.runtime_stats_interval_id =

    rs.runtime_stats_interval_id

    INNER JOIN sysobjects so on so.id = q.object_id

    WHERE rsi.start_time >= DATEADD(DAY, -10, GETUTCDATE())

    GROUP BY qt.query_sql_text,

    q.query_id,

    so.name,

    so.type

    ORDER BY SUM(rs.count_executions * rs.avg_duration_time) DESC

    ```


    清单 6-1：查询过去 10 天内按持续时间排序的顶级查询的 T-SQL


    > **注意**

    > 所有时间均以 UTC 时间存储，因此你需要调整查询以适应你的时区，才能使数据与你的时区完全匹配。


    ## 为查询建立基线


    Query Store 使你能够为数据库中的查询建立基线。它将所有执行运行时统计信息存储在目录视图 `sys.query_store_runtime_stats`
    中，因此你可以查询此视图，查看关于查询过去和当前执行情况的大量统计信息，以建立基线进行比较。但这并非你为服务器建立基线的唯一方式。


    ### 什么是基线？


    首先，我们来讨论基线是什么。基线是你在服务器上运行的工作负载，它为与同一工作负载的未来运行结果进行比较设定了一个起点。理论上，你会运行工作负载以对环境进行任何必要的更改（这些更改可能是代码或硬件更改），然后重新运行相同的工作负载，进行比较并查看哪些指标发生了变化。


    ### 如何使用 Query Store 创建基线


    在 Query Store 中建立基线涉及了解正在收集哪些数据以及何时收集。当你查看图 6-1 所示的“整体资源消耗报告”时，在开始工作负载以建立基线之前清空
    Query Store 可能会很有帮助。第 3 章讨论了两种方法。一种是右键单击数据库，转到“属性”，然后选择“Query Store”选项卡。如图 6-2
    所示，有一个“清除查询数据”选项，它将清除 Query Store 中的所有数据，以便你开始建立基线。请确保在运行工作负载之前，统计信息收集间隔足够短以收集你的数据，并且你无需在每个间隔之间等待太久才能运行下一个工作负载。


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig2_HTML.jpg](img/473933_1_En_6_Fig2_HTML.jpg)


    图 6-2：Query Store 的数据库属性


    第二种方法是运行清单 6-2 中的存储过程。


    ```sql

    USE []

    GO

    EXEC sys.sp_query_store_flush_db;

    ```


    清单 6-2：清除 Query Store 中所有数据的存储过程


    现在，我们有一个干净的起点来捕获工作负载数据。为了捕获工作负载以便日后重放，请打开 SQL Server Profiler，选择 `TSQL_Replay`
    模板，并按照第 1 章讨论的方式创建服务器端跟踪。现在运行你的工作负载，让 Query Store 捕获工作负载中所有查询的数据，工作负载完成后停止跟踪。记下你运行基线工作负载的时间段以供将来比较。接下来，对要进行比较的代码或服务器进行更改。有关如何比较结果，请参阅下一节。'
- fmt: '## How to Compare a Workload Back to the Baseline


    The best way to compare your workload back is to use the reports from Chapter
    4. If you have set your statistics collection interval to 15 minutes, for example,
    you can run your workload outside the next interval to collect data for your comparison.
    The basic steps to make sure you can compare baselines are as follows:


    1.  Run your workload to establish your baseline.

    2.  Apply your changes.

    3.  Run your workload again.

    4.  Compare the results by looking at the `Overall Resource Consumption Report`
    and drilling down to the `Top Consuming Resources Report` to check on the particular
    queries that may have been impacted by your changes.

    5.  Then you can decide rather to keep your changes or roll them back.


    ## See What Happened Last Night


    A common problem is to have someone come over to you and say such and such ran
    slow yesterday at 5 AM and without any tracing turned you would have no idea what
    had run. Now with `Query Store`, all the queries that ran are being recorded for
    you to be able to see what ran yesterday at any time. By looking at the `Top Consuming
    Resources Report`, you can drill down to a specific time period and look for what
    was running slow. Not only can you tell what was running slow you could see what
    query caused a CPU spike or a large number of reads if someone had complained
    that the SAN had slowed down. Figure 6-3 shows your configuration options for
    narrowing down what happened on the server during the time frame you need and
    by the metric you heard was the problem.


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig3_HTML.jpg](images/473933_1_En_6_Chapter/473933_1_En_6_Fig3_HTML.jpg)


    Figure 6-3. `Top Consuming Resources` report configuration screen.


    ## Troubleshooting Regressed Queries


    One of the most powerful use cases for `Query Store` is to be able to identify
    queries that have regressed in performance. Queries can regress in performance
    for various reasons such as a change in statistics, the data cardinality has changed,
    indexes have been created, indexes that existed before could have been altered
    or deleted, etc. In most cases, the `Query Optimizer` in `SQL Server` does pick
    a better plan, but there are times where it does not, and `Query Store` gives
    a quick, easy way to go in and find those queries.


    ### What Is a Regressed Query?


    A regressed query is a query in which the performance has changed due to a change
    on the system such as a change in statistics, the data cardinality has changed,
    indexes that have been created, etc. The change results in a different plan being
    generated than before that does not perform as well. Back in Chapter 4, we explored
    the `Regressed Queries Report` which gives you a quick way to identify regressed
    queries.


    ### Viewing Plan Changes


    In the `Regressed Queries Report`, you can identify a query with two plans and
    use the `compare plan` button at the top right-hand corner after you select both
    plans in the top right-hand pane. The differences will highlight in red as seen
    in Figure 6-4. And in Figure 6-5, you can see what difference there is between
    any operator you highlight in the plans.


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig4_HTML.jpg](images/473933_1_En_6_Chapter/473933_1_En_6_Fig4_HTML.jpg)


    Figure 6-4. `Regressed Query` report comparing plan operator differences.


    The differences seen in Figure 4-24 have a not equal sign highlighted in yellow.


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig5_HTML.jpg](images/473933_1_En_6_Chapter/473933_1_En_6_Fig5_HTML.jpg)


    Figure 6-5. `Regressed Query` report comparing report details.


    As we have seen in Chapter 4, when viewing a query with multiple plans, you can
    force the plan manually from the report screen. If you find a plan that needs
    to be forced, you can force the plan from the report and monitor performance.


    ## Identify Top Consuming Resource Queries


    In Chapter 4, we discussed the `Top Consuming Resource Report` where you visually
    see what queries are taking up the most resources on the `SQL Server` database.
    We can view the following metrics when troubleshooting what the top consuming
    resource queries on the `SQL Server` database are:


    *   Execution count

    *   Duration (ms) (default)

    *   CPU Time (ms)

    *   Logical reads (KB)

    *   Logical writes (KB)

    *   Physical reads (KB)

    *   CLR time (ms)

    *   DOP

    *   Memory consumption (KB)

    *   Row count

    *   Log memory used (KB)

    *   Tempdb memory usage (KB)

    *   Wait time (ms)


    They can be aggregated into totals, averages, minimums, maximums, and standard
    deviation. When looking for top consumers, total is a good starting place. If
    you are seeing high CPU, start with looking at the total with CPU time. The report
    will display by default the top 25 queries with their plans. You can then see
    if there is anything that could be tuned in those queries or perhaps a plan that
    can be forced.


    ## Stabilizing SQL Server Upgrades


    Another great benefit of `Query Store` is to help stabilize `SQL Server` upgrades.
    Every `SQL Server` upgrade due to changes to the query optimizer has the potential
    to cause regression in queries if you change the `compatibility mode` of a database.
    Since it is recommended best practice to change the `compatibility mode` of a
    database when you upgrade `SQL Server` so you can take advantage of the query
    optimizer enhancements and new `T-SQL` functions, it becomes even more critical
    to be able to stabilize the upgrade of `SQL Server`. Also, `SQL Server 2014` introduced
    significant changes to the cardinality estimator causing some regressed queries
    when changing the `compatibility mode`.


    ### Changing Compatibility Mode Effects


    Before `SQL Server 2014`, changing `compatibility modes` didn’t affect the query
    optimizer because `compatibility mode` did not affect the cardinality estimator
    because there had not been a new one released since `SQL Server 7.0`. So the only
    benefits you got form changing `compatibility modes` were any enhancements made
    to the query optimizer and new `T-SQL` functions.


    ### Cardinality Estimation Changes Explained


    Starting with the release of `SQL Server 2014`, Microsoft started making changes
    to the cardinality estimator (`CE`) which affects how queries estimate how many
    rows are being returned by the query. In most cases, the queries ran faster under
    the new `CE`, but some queries had some significant regressions. Your only recourse
    was to revert the `compatibility mode` or use trace flags to control the behavior.


    In `SQL Server 2016`, Microsoft introduced database scoped configurations that
    allowed you to control `MAXDOP`, `LEGACY_CARDINALITY ESTIMATION`, `PARAMETER_SNIFFING`,
    and `QUERY_OPTIMIZER_HOTFIXES` at the database level. The two most important ones
    in this list for what we are talking about are `LEGACY_CARDINALITY ESTIMATION`
    and `QUERY_OPTIMIZER_HOTFIXES`. If you set the `LEGACY_CARDINALITY ESTIMATION`,
    it will use the old `CE` no matter what `compatibility level` the databases is
    set to. The advantage to this is you can still get to use the new `T-SQL` functions
    in the database and not have the query regressions. The `QUERY_OPTIMIZER_HOTFIXES`
    option is the same thing as setting the trace flag `4199` which activates the
    all the query optimizer fixes put in the engine via a new version or patch or
    `CU`. Before `2016`, you had to set trace flag `4199`, and it applied to all the
    databases, and you had no easy way to troubleshoot and fix regressed queries.'
