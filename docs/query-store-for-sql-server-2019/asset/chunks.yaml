    通过游标 API 的存储过程之一执行的查询0x2 – 用于通知的查询0x4 – 内部查询0x8 – 未使用全局参数化的自动参数化查询0x10 – 游标提取刷新查询0x20 –
    在游标更新请求中使用的查询0x40 – 打开游标时返回初始结果集（游标自动提取）0x80 – 加密查询0x100 – 在行级别安全谓词上下文中的查询 |

