  trans: '

    ## 如何将工作负载与基线进行比较


    将您的工作负载回溯比较的最佳方法是使用第 4 章中的报告。例如，如果您已将统计信息收集间隔设置为 15 分钟，那么您可以在下一个间隔之外运行您的工作负载，以收集用于比较的数据。确保您可以比较基线的基本步骤如下：


    1.  运行您的工作负载以建立基线。

    2.  应用您的更改。

    3.  再次运行您的工作负载。

    4.  通过查看 `Overall Resource Consumption Report`（总体资源消耗报告）并深入查看 `Top Consuming Resources
    Report`（资源消耗最多的报告）来比较结果，以检查可能受您更改影响的特定查询。

    5.  然后，您可以决定是保留更改还是将其回滚。


    ## 查看昨晚发生了什么


    一个常见的问题是，有人过来对你说，某某东西昨天凌晨 5 点运行得很慢，而如果没有启用任何跟踪，你根本不知道当时运行了什么。现在，借助 `Query Store`（查询存储），所有运行过的查询都会被记录下来，让你能够随时查看昨天运行了什么。通过查看
    `Top Consuming Resources Report`（资源消耗最多的报告），您可以深入到特定的时间段，寻找当时运行缓慢的内容。您不仅可以识别哪些查询运行缓慢，还能看到是哪个查询导致了
    CPU 尖峰或大量读取（如果有人抱怨 SAN 变慢了的话）。图 6-3 显示了您的配置选项，可根据您需要的时段以及您听到的问题指标来缩小范围，查看服务器上发生了什么。


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig3_HTML.jpg](img/473933_1_En_6_Fig3_HTML.jpg)


    图 6-3. `Top Consuming Resources`（资源消耗最多的报告）配置屏幕。


    ## 故障排除回归查询


    `Query Store`（查询存储）最强大的用例之一是能够识别性能已回归的查询。查询可能因各种原因导致性能回归，例如统计信息发生变化、数据基数发生变化、索引被创建、先前存在的索引可能被修改或删除等。在大多数情况下，`SQL
    Server` 中的 `Query Optimizer`（查询优化器）确实会选择更好的执行计划，但有时它不会，而 `Query Store` 提供了一种快速、简便的方法来查找这些查询。


    ### 什么是回归查询？


    回归查询是指由于系统上的更改（例如统计信息变化、数据基数变化、索引创建等）导致其性能发生变化的查询。这些更改导致生成了与之前不同的执行计划，而该计划的性能不如之前。在第
    4 章中，我们探讨了 `Regressed Queries Report`（回归查询报告），它为您提供了一种快速识别回归查询的方法。


    ### 查看计划变更


    在 `Regressed Queries Report`（回归查询报告）中，您可以识别出具有两个计划的查询，并在顶部右窗格中选择两个计划后，使用右上角的 `compare
    plan`（比较计划）按钮。差异将以红色高亮显示，如图 6-4 所示。并且在图 6-5 中，您可以看到在计划中高亮显示的任何运算符之间有何差异。


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig4_HTML.jpg](img/473933_1_En_6_Fig4_HTML.jpg)


    图 6-4. `Regressed Query`（回归查询）报告比较计划运算符差异。


    图 4-24 中看到的差异用黄色高亮显示了一个不等于符号。


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig5_HTML.jpg](img/473933_1_En_6_Fig5_HTML.jpg)


    图 6-5. `Regressed Query`（回归查询）报告比较报告详情。


    正如我们在第 4 章中所见，在查看具有多个计划的查询时，您可以从报告屏幕手动强制使用某个计划。如果您发现需要强制执行的计划，可以从报告中强制使用该计划并监控其性能。


    ## 识别资源消耗最多的查询


    在第 4 章中，我们讨论了 `Top Consuming Resource Report`（资源消耗最多的报告），通过它您可以直观地看到在 `SQL Server`
    数据库上哪些查询占用了最多的资源。在对 `SQL Server` 数据库上资源消耗最多的查询进行故障排除时，我们可以查看以下指标：


    *   执行次数

    *   持续时间（毫秒）（默认）

    *   CPU 时间（毫秒）

    *   逻辑读取（KB）

    *   逻辑写入（KB）

    *   物理读取（KB）

    *   CLR 时间（毫秒）

    *   DOP（并行度）

    *   内存消耗（KB）

    *   行数

    *   日志内存使用量（KB）

    *   Tempdb 内存使用量（KB）

    *   等待时间（毫秒）


    这些指标可以聚合为总计、平均值、最小值、最大值和标准差。在寻找资源消耗最多的查询时，总计是一个很好的起点。如果您看到 CPU 使用率很高，可以从查看 CPU
    时间的总计开始。报告默认显示前 25 个查询及其执行计划。然后，您可以查看这些查询中是否有任何可以优化的地方，或者是否有可以强制执行的计划。


    ## 稳定 SQL Server 升级


    `Query Store`（查询存储）的另一个巨大好处是帮助稳定 `SQL Server` 升级。每次 `SQL Server` 升级，由于查询优化器的更改，如果您更改了数据库的
    `compatibility mode`（兼容性模式），都有可能导致查询回归。由于建议的最佳实践是在升级 `SQL Server` 时更改数据库的 `compatibility
    mode`（兼容性模式），以便您可以利用查询优化器增强功能和新的 `T-SQL` 函数，因此能够稳定 `SQL Server` 升级变得至关重要。此外，`SQL
    Server 2014` 对基数估算器进行了重大更改，在更改 `compatibility mode`（兼容性模式）时导致了一些查询回归。


    ### 更改兼容性模式的影响


    在 `SQL Server 2014` 之前，更改 `compatibility modes`（兼容性模式）不会影响查询优化器，因为 `compatibility
    mode`（兼容性模式）不会影响基数估算器，自 `SQL Server 7.0` 以来就没有发布过新的基数估算器。因此，通过更改 `compatibility
    modes`（兼容性模式）获得的唯一好处是查询优化器的任何增强以及新的 `T-SQL` 函数。


    ### 基数估算变更解析


    从 `SQL Server 2014` 版本开始，微软开始对基数估算器（`CE`）进行更改，这影响了查询估算返回行数的方式。在大多数情况下，查询在新 `CE`
    下运行得更快，但一些查询出现了明显的性能回归。您唯一的办法是回滚 `compatibility mode`（兼容性模式）或使用跟踪标志来控制行为。


    在 `SQL Server 2016` 中，微软引入了数据库范围配置，允许您在数据库级别控制 `MAXDOP`、`LEGACY_CARDINALITY ESTIMATION`、`PARAMETER_SNIFFING`
    和 `QUERY_OPTIMIZER_HOTFIXES`。在此列表中，与我们讨论内容最相关的两个是 `LEGACY_CARDINALITY ESTIMATION`
    和 `QUERY_OPTIMIZER_HOTFIXES`。如果您设置了 `LEGACY_CARDINALITY ESTIMATION`，无论数据库的 `compatibility
    level`（兼容级别）设置如何，它都将使用旧的 `CE`。这样做的好处是，您仍然可以在数据库中使用新的 `T-SQL` 函数，而不会出现查询回归。`QUERY_OPTIMIZER_HOTFIXES`
    选项与设置跟踪标志 `4199` 相同，该标志激活通过新版本、补丁或 `CU` 引入引擎的所有查询优化器修复。在 `2016` 之前，您必须设置跟踪标志 `4199`，它适用于所有数据库，并且您没有简单的方法来故障排除和修复回归查询。

    '
- fmt: '### Process for Testing and Completing Upgrades Using Query Store


    Now that you are familiar with how changing the compatibility mode effects the
    query optimizer and CE and what may cause you regressed queries, let’s talk about
    how to upgrade SQL Server the most effective way using Query Store to stabilize
    any regressed queries after the upgrade. This is best illustrated in Figure [6-6](#473933_1_En_6_Chapter.xhtml#Fig6).


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig6_HTML.jpg](images/473933_1_En_6_Chapter/473933_1_En_6_Fig6_HTML.jpg)


    Figure 6-6 Steps to upgrade SQL Server using Query Store


    The first step is to upgrade to SQL Server 2016 or higher. Next, you would enable
    Query Store on your database(s). Let your workload run on the database(s) as long
    as you think is necessary to capture a good baseline of your workload. Then set
    the compatibility mode to the newest mode on the database(s). Finally, monitor
    the Regressed Queries report discussed in Chapter [4](#473933_1_En_4_Chapter.xhtml)
    for plans that you need to force due to regression. Chapter [7](#473933_1_En_7_Chapter.xhtml)
    covers Automatic Plan Correction where starting in SQL Server 2017, Query Store
    will automatically force plans for you. See Chapter [7](#473933_1_En_7_Chapter.xhtml)
    for more details.


    ## Finding and Improving Ad-hoc Workloads


    Finally, Query Store can be used to find your ad-hoc queries and improve them.
    If you have a lot of ad-hoc queries, when you look at the Top Consuming Resources
    report, you will not see a large number of resources being consumed by queries
    with execution counts greater than one. If your systems are mostly ad-hoc workloads,
    it will not be ideal for working with Query Store as you are sending in different
    queries, and it is not able to aggregate data for you or force plans to help performance.
    While your application is generating ad-hoc queries, SQL Server is spending its
    time compiling queries for every new query that is executed, bloating the plan
    cache and consuming resources extra than if they were already in the plan cache.
    This will also cause bloat of Query Store because it will be storing different
    plans and aggregated rows of runtime statistics for each query. This will cause
    the background processes that clean up Query Store to take up more resources as
    well to keep the space at a level where it can add data.


    Instead, of using the Top Consuming Resources report, there is T-SQL you can run
    to first get the total number of query texts, queries, and plans, and then compare
    the `query_hash` and `query_plan_hash` to find your ad-hoc queries that are similar
    as seen in Listing [6-3](#473933_1_En_6_Chapter.xhtml#PC3).


    ```sql

    --Total Query Texts

    SELECT COUNT(*) AS CountQueryTextRows

    FROM sys.query_store_query_text;

    --Total Queries

    SELECT COUNT(*) AS CountQueryRows

    FROM sys.query_store_query;

    --Total distinct query hashes (different queries)

    SELECT COUNT(DISTINCT query_hash) AS CountDifferentQueryRows

    FROM  sys.query_store_query;

    --Total plans

    SELECT COUNT(*) AS CountPlanRows

    FROM sys.query_store_plan;

    --Total unique query_plan_hash (different plans)

    SELECT COUNT(DISTINCT query_plan_hash) AS CountDifferentPlanRows

    FROM sys.query_store_plan;

    ```


    Listing 6-3 T-SQL to check for ad-hoc workload


    If you see a difference in `CountQueryRows` and `CountDifferentQueryRows` or `CountPlanRows`
    and `CountDifferentPlansRows,` that is an indication you have similar queries
    running, and you would benefit from writing them in a parameterized way such as
    in stored procedures if you can control the application code, so it can be compiled
    once and stored in memory and stored efficiently in Query Store. If you cannot
    manage the application code, you can have two other options. One is to use plan
    guides; a template for a plan guide is in Listing [6-4](#473933_1_En_6_Chapter.xhtml#PC4).


    ```sql

    DECLARE @stmt nvarchar(max);

    DECLARE @params nvarchar(max);

    EXEC sp_get_query_template

    N'''',

    @stmt OUTPUT,

    @params OUTPUT;

    EXEC sp_create_plan_guide

    N''TemplateGuide1'',

    @stmt,

    N''TEMPLATE'',

    NULL,

    @params,

    N''OPTION (PARAMETERIZATION FORCED)'';

    ```


    Listing 6-4 Template for implementing a plan guide for PARAMETERIZATION FORCED


    Alternately you can turn on `PARAMETERIZATION FORCED` at the database level using
    Listing [6-5](#473933_1_En_6_Chapter.xhtml#PC5).


    ```sql

    ALTER DATABASE  SET PARAMETERIZATION FORCED;

    ```


    Listing 6-5 Turn on PARATERIZATION FORCED at database level


    If in Listing [6-3](#473933_1_En_6_Chapter.xhtml#PC3) the counts remained close
    to the same, then you will not want to turn on `PARAMETERIZATION FORCED`. Instead,
    you will want to enable `optimize for ad hoc workloads` and set the `QUERY_CAPTURE_MODE`
    to `AUTO` for Query Store instead of `ALL`. See Listing [6-6](#473933_1_En_6_Chapter.xhtml#PC6)
    to set these options. This will keep the plans from bloating the plan cache because
    the first time a query is executed it will only store a stub and store the plan
    on the second execution for future reuse. The `AUTO` capture mode will let Query
    Store not capture these queries that consumed insignificant amount of resources
    to limit the amount that is stored.


    ```sql

    EXEC sys.sp_configure N''show advanced options'', N''1''

    GO

    RECONFIGURE WITH OVERRIDE

    GO

    EXEC sys.sp_configure N''optimize for ad hoc workloads'', N''1''

    GO

    RECONFIGURE WITH OVERRIDE

    GO

    ALTER DATABASE [QueryStoreTest] SET QUERY_STORE CLEAR;

    ALTER DATABASE [QueryStoreTest] SET QUERY_STORE = ON

    (OPERATION_MODE = READ_WRITE, QUERY_CAPTURE_MODE = AUTO);

    ```


    Listing 6-6 Enable optimize for ad-hoc workloads and set capture mode to AUTO
    for Query Store


    ## Conclusion


    In this chapter, we explored several use cases for Query Store. We discussed how
    to establish a baseline so you can discover how your system normally performs
    and see what happens when you make changes. Then we discussed who to view what
    happened last night or any previous point in time for a problem. Next we discussed
    what regressed queries were and how to troubleshoot them and force plans. Then
    we discussed identifying top consuming queries so you could look at improving
    them. Next we looked at how you could use Query Store to stabilize the upgrade
    of SQL Server and why this is an important feature to use for this. Finally, we
    discussed who to use Query Store to improve your ad-hoc workloads.


    # 7. Forcing Plans


    While the information collected in the Query Store and all that it tells you about
    the performance of your system is the part of Query Store that you’ll use more
    frequently, the most powerful part of Query Store is the ability to force execution
    plans. Plan forcing is where the choices made by the optimizer during a compile
    or recompile event are superceded by a plan you select. Query Store provides enough
    information between the performance metrics and the execution plan to enable you
    to decide that, under some circumstances, you can pick a superior execution plan.


    This chapter will show you how to use Query Store information and reports to identify
    a poorly behaving execution plan. With a badly behaving plan identified, we’ll
    explore how to use the information in Query Store to identify a well-behaved plan,
    if one exists. With this information in hand, we can then force the good plan
    to be used.'
