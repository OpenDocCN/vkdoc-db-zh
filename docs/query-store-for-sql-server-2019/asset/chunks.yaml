- fmt: '### Automatic Tuning at Work


    为了观察到 Automatic Tuning 在启用它及 Query Store 后的实际工作效果，我们只需要重新运行上面的脚本。然而，为了确保测试能够成功运行，我们将清除
    Query Store 和缓存，以便一切从零开始。以下是更新后的脚本：


    ```

    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;

    GO

    ALTER DATABASE AdventureWorks SET QUERY_STORE CLEAR;

    GO

    EXEC dbo.ProductByCost @ActualCost = 8.2205;

    GO 30

    --remove the plan from cache

    DECLARE @PlanHandle VARBINARY(64);

    SELECT  @PlanHandle = deps.plan_handle

    FROM    sys.dm_exec_procedure_stats AS deps

    WHERE   deps.object_id = OBJECT_ID(''dbo.ProductByCost'');

    IF @PlanHandle IS NOT NULL

    BEGIN

    DBCC FREEPROCCACHE(@PlanHandle);

    END

    GO

    --execute a query that will result in a different plan

    EXEC dbo.ProductByCost @ActualCost = 0.0;

    GO

    --establish a new history of poor performance

    EXEC dbo.ProductByCost @ActualCost = 8.2205;

    GO 15

    ```


    执行此脚本后，我们需要返回去查询 `sys.dm_db_tuning_recommendations`。图 8-8 展示了其中的数据现在如何变化：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig8_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig8_HTML.jpg)


    图 8-8


    Automatic Tuning 已修复了性能回归


    `CurrentState` 的值已变为 `Verifying`。它将像之前一样，在多次执行中测量性能。如果性能下降，它将取消强制执行该计划。此外，如果出现超时或执行中止等错误，该计划也将被取消强制执行。在这种情况下，您还会看到
    `sys.dm_db_tuning_recommendations` 中的 `error_prone` 列的值变为 `Yes`。


    如果您重启服务器，`sys.dm_db_tuning_recommendations` 中的信息将被删除。同样，任何已被强制的计划也将被删除。一旦查询再次出现性能回归，任何计划强制都将被自动重新启用。如果这成为问题，您始终可以手动强制该计划。


    如果一个计划被强制执行后性能下降，它将被取消强制，如前所述。如果该查询再次出现性能下降，计划强制将被移除，并且该查询将被标记——至少在服务器重启之前（届时信息将被移除），它不会被再次强制执行。


    ## Query Store 等待统计信息


    我们在本书中讨论过的 Query Store 为查询性能行为捕获的信息，改变了许多人进行监控和查询调优的方式。为特定查询添加等待统计信息进一步改变了这些方式。现在，您可以轻松地获取查询的等待统计信息。该信息使用您聚合查询的时间间隔（默认为
    60 分钟）进行聚合。此外，由于等待类型众多，Query Store 中的等待统计信息并未单独列出所有等待，而是将它们分组到等待类别中。如果您需要关于某个查询的、详细的单独等待统计信息，则需要使用其他机制来捕获数据。


    ### 等待统计信息类别


    关于这些类别没有太多可说的。您需要了解类别的划分方式，以便理解它们代表哪些等待。除此之外，没有与它们相关的附加功能。这纯粹是信息性的，以便您在查看 Query
    Store 中的等待统计信息时能够正确解读信息。


    表 8-2 显示了微软发布的类别及相关等待类型。遵循他们的惯例，百分号 (`%`) 代表通配符。


    表 8-2


    Query Store 等待统计信息类别及等待类型


    | 整数值 | 等待类别 | 该类别包含的等待类型 |

    | --- | --- | --- |

    | 0 | Unknown | Unknown |

    | 1 | CPU | SOS_SCHEDULER_YIELD |

    | 2 | Worker thread | THREADPOOL |

    | 3 | Lock | LCK_M_% |

    | 4 | Latch | LATCH_% |

    | 5 | Buffer latch | PAGELATCH_% |

    | 6 | Buffer I/O | PAGEIOLATCH_% |

    | 7 | Compilation^* | RESOURCE_SEMAPHORE_QUERY_COMPILE |

    | 8 | SQL CLR | CLR%, SQLCLR% |

    | 9 | Mirroring | DBMIRROR% |

    | 10 | Transaction | XACT%, DTC%, TRAN_MARKLATCH_%, MSQL_XACT_%, TRANSACTION_MUTEX
    |

    | 11 | Idle | SLEEP_%, LAZYWRITER_SLEEP, SQLTRACE_BUFFER_FLUSH, SQLTRACE_INCREMENTAL_FLUSH_SLEEP,
    SQLTRACE_WAIT_ENTRIES, FT_IFTS_SCHEDULER_IDLE_WAIT, XE_DISPATCHER_WAIT, REQUEST_FOR_DEADLOCK_SEARCH,
    LOGMGR_QUEUE, ONDEMAND_TASK_QUEUE, CHECKPOINT_QUEUE, XE_TIMER_EVENT |

    | 12 | Preemptive | PREEMPTIVE_% |

    | 13 | Service broker | BROKER_% (但不包括 BROKER_RECEIVE_WAITFOR) |

    | 14 | Tran log I/O | LOGMGR, LOGBUFFER, LOGMGR_RESERVE_APPEND, LOGMGR_FLUSH,
    LOGMGR_PMM_LOG, CHKPT, WRITELOG |

    | 15 | Network I/O | ASYNC_NETWORK_IO, NET_WAITFOR_PACKET, PROXY_NETWORK_IO, EXTERNAL_SCRIPT_NETWORK_IOF
    |

    | 16 | Parallelism | CXPACKET, EXCHANGE |

    | 17 | Memory | RESOURCE_SEMAPHORE, CMEMTHREAD, CMEMPARTITIONED, EE_PMOLOCK, MEMORY_ALLOCATION_EXT,
    RESERVED_MEMORY_ALLOCATION_EXT, MEMORY_GRANT_UPDATE |

    | 18 | User wait | WAITFOR, WAIT_FOR_RESULTS, BROKER_RECEIVE_WAITFOR |

    | 19 | Tracing | TRACEWRITE, SQLTRACE_LOCK, SQLTRACE_FILE_BUFFER, SQLTRACE_FILE_WRITE_IO_COMPLETION,
    SQLTRACE_FILE_READ_IO_COMPLETION, SQLTRACE_PENDING_BUFFER_WRITERS, SQLTRACE_SHUTDOWN,
    QUERY_TRACEOUT, TRACE_EVTNOTIFF |

    | 20 | Full text search | FT_RESTART_CRAWL, FULLTEXT GATHERER, MSSEARCH, FT_METADATA_MUTEX,
    FT_IFTSHC_MUTEX, FT_IFTSISM_MUTEX, FT_IFTS_RWLOCK, FT_COMPROWSET_RWLOCK, FT_MASTER_MERGE,
    FT_PROPERTYLIST_CACHE, FT_MASTER_MERGE_COORDINATOR, PWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC
    |

    | 21 | Other disk I/O | ASYNC_IO_COMPLETION, IO_COMPLETION, BACKUPIO, WRITE_COMPLETION,
    IO_QUEUE_LIMIT, IO_RETRY |

    | 22 | Replication | SE_REPL_%, REPL_%, HADR_% (但不包括 HADR_THROTTLE_LOG_RATE_GOVERNOR),
    PWAIT_HADR_%, REPLICA_WRITES, FCB_REPLICA_WRITE, FCB_REPLICA_READ, PWAIT_HADRSIM
    |

    | 23 | Log rate governor | LOG_RATE_GOVERNOR, POOL_LOG_RATE_GOVERNOR, HADR_THROTTLE_LOG_RATE_GOVERNOR,
    INSTANCE_LOG_RATE_GOVERNOR |


    ## 查看 Query Store 等待统计信息


    有两种方法可以查看 Query Store 中查询的等待统计信息。您可以使用 T-SQL 来查询信息，或者，在 SQL Server Management
    Studio 18 中有一个报告。我们将从查询等待统计信息开始。'
  raw: '### Automatic Tuning at Work


    In order to see Automatic Tuning at work, after we enable it and Query Store,
    we just have to rerun the script above. However, to ensure that the tests run
    successfully, we’re going to clear Query Store and the cache so that everything
    is starting from scratch. This is the updated script:


    ```

    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;

    GO

    ALTER DATABASE AdventureWorks SET QUERY_STORE CLEAR;

    GO

    EXEC dbo.ProductByCost @ActualCost = 8.2205;

    GO 30

    --remove the plan from cache

    DECLARE @PlanHandle VARBINARY(64);

    SELECT  @PlanHandle = deps.plan_handle

    FROM    sys.dm_exec_procedure_stats AS deps

    WHERE   deps.object_id = OBJECT_ID(''dbo.ProductByCost'');

    IF @PlanHandle IS NOT NULL

    BEGIN

    DBCC FREEPROCCACHE(@PlanHandle);

    END

    GO

    --execute a query that will result in a different plan

    EXEC dbo.ProductByCost @ActualCost = 0.0;

    GO

    --establish a new history of poor performance

    EXEC dbo.ProductByCost @ActualCost = 8.2205;

    GO 15

    ```


    After executing this script, we’ll want to go back and query sys.dm_db_tuning_recommendations.
    Figure [8-8](#473933_1_En_8_Chapter.xhtml#Fig8) shows how the data there has now
    changed:


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig8_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    The regression has been fixed by Automatic Tuning


    The CurrentState value has been changed to Verifying. It will measure performance
    over a number of executions, much as it did before. If the performance degrades,
    it will unforce the plan. Further, if there are errors such as time outs or aborted
    executions, the plan will also be unforced. You’ll also see the error_prone column
    in sys.dm_db_tuning_recommendations changed to a value of “Yes” in this event.


    If you restart the server, the information in sys.dm_db_tuning_recommendations
    will be removed. Also, any plans that have been forced will also be removed. As
    soon as a query regresses again, any plan forcing will be automatically re-enabled.
    If this is an issue, you can always force the plan manually.


    If a query is forced and then performance degrades, it will be unforced, as already
    noted. If that query again suffers from degraded performance, plan forcing will
    be removed and the query will be marked such that, at least until a server reboot
    when the information is removed, it will not be forced again.


    ## Query Store Wait Statistics


    The information we’ve talked about throughout the book that Query Store captures
    for query performance behavior changes the way lots of people do monitoring and
    query tuning. The addition of wait statistics for a given query adds to those
    changes. Now, you can get the wait statistics for a query easily. This information
    is aggregated using the time interval that you’re aggregating your queries with,
    60 minutes by default. Further, because there are so many waits, rather than list
    them all individually, the wait statistics in Query Store are grouped into categories
    of waits. If you need individual, detailed, wait statistics on a query, you’ll
    need to use other mechanisms to capture the data.


    ### Wait Statistics Categories


    There’s not much to say about the categories. You need to know how the categories
    are broken down in order to understand what waits they represent. Other than that,
    there’s no additional functionality associated with them. This is purely informational
    so that you can correctly interpret the information when you look at the wait
    statistics in Query Store.


    Table [8-2](#473933_1_En_8_Chapter.xhtml#Tab2) shows the categories and the associated
    waits as published by Microsoft. Following their convention, percent signs (%)
    represent wild cards.


    Table 8-2


    Query Store wait statistics categories and waits


    | Integer value | Wait category | Wait types include in the category |

    | --- | --- | --- |

    | 0 | Unknown | Unknown |

    | 1 | CPU | SOS_SCHEDULER_YIELD |

    | 2 | Worker thread | THREADPOOL |

    | 3 | Lock | LCK_M_% |

    | 4 | Latch | LATCH_% |

    | 5 | Buffer latch | PAGELATCH_% |

    | 6 | Buffer I/O | PAGEIOLATCH_% |

    | 7 | Compilation^* | RESOURCE_SEMAPHORE_QUERY_COMPILE |

    | 8 | SQL CLR | CLR%, SQLCLR% |

    | 9 | Mirroring | DBMIRROR% |

    | 10 | Transaction | XACT%, DTC%, TRAN_MARKLATCH_%, MSQL_XACT_%, TRANSACTION_MUTEX
    |

    | 11 | Idle | SLEEP_%, LAZYWRITER_SLEEP, SQLTRACE_BUFFER_FLUSH, SQLTRACE_INCREMENTAL_FLUSH_SLEEP,
    SQLTRACE_WAIT_ENTRIES, FT_IFTS_SCHEDULER_IDLE_WAIT, XE_DISPATCHER_WAIT, REQUEST_FOR_DEADLOCK_SEARCH,
    LOGMGR_QUEUE, ONDEMAND_TASK_QUEUE, CHECKPOINT_QUEUE, XE_TIMER_EVENT |

    | 12 | Preemptive | PREEMPTIVE_% |

    | 13 | Service broker | BROKER_% (but not BROKER_RECEIVE_WAITFOR) |

    | 14 | Tran log I/O | LOGMGR, LOGBUFFER, LOGMGR_RESERVE_APPEND, LOGMGR_FLUSH,
    LOGMGR_PMM_LOG, CHKPT, WRITELOG |

    | 15 | Network I/O | ASYNC_NETWORK_IO, NET_WAITFOR_PACKET, PROXY_NETWORK_IO, EXTERNAL_SCRIPT_NETWORK_IOF
    |

    | 16 | Parallelism | CXPACKET, EXCHANGE |

    | 17 | Memory | RESOURCE_SEMAPHORE, CMEMTHREAD, CMEMPARTITIONED, EE_PMOLOCK, MEMORY_ALLOCATION_EXT,
    RESERVED_MEMORY_ALLOCATION_EXT, MEMORY_GRANT_UPDATE |

    | 18 | User wait | WAITFOR, WAIT_FOR_RESULTS, BROKER_RECEIVE_WAITFOR |

    | 19 | Tracing | TRACEWRITE, SQLTRACE_LOCK, SQLTRACE_FILE_BUFFER, SQLTRACE_FILE_WRITE_IO_COMPLETION,
    SQLTRACE_FILE_READ_IO_COMPLETION, SQLTRACE_PENDING_BUFFER_WRITERS, SQLTRACE_SHUTDOWN,
    QUERY_TRACEOUT, TRACE_EVTNOTIFF |

    | 20 | Full text search | FT_RESTART_CRAWL, FULLTEXT GATHERER, MSSEARCH, FT_METADATA_MUTEX,
    FT_IFTSHC_MUTEX, FT_IFTSISM_MUTEX, FT_IFTS_RWLOCK, FT_COMPROWSET_RWLOCK, FT_MASTER_MERGE,
    FT_PROPERTYLIST_CACHE, FT_MASTER_MERGE_COORDINATOR, PWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC
    |

    | 21 | Other disk I/O | ASYNC_IO_COMPLETION, IO_COMPLETION, BACKUPIO, WRITE_COMPLETION,
    IO_QUEUE_LIMIT, IO_RETRY |

    | 22 | Replication | SE_REPL_%, REPL_%, HADR_% (but not HADR_THROTTLE_LOG_RATE_GOVERNOR),
    PWAIT_HADR_%, REPLICA_WRITES, FCB_REPLICA_WRITE, FCB_REPLICA_READ, PWAIT_HADRSIM
    |

    | 23 | Log rate governor | LOG_RATE_GOVERNOR, POOL_LOG_RATE_GOVERNOR, HADR_THROTTLE_LOG_RATE_GOVERNOR,
    INSTANCE_LOG_RATE_GOVERNOR |


    ## Looking at Query Store Wait Statistics


    There are two ways you can look at the wait statistics for a query within the
    Query Store. You can use T-SQL to query the information, or, there is a report
    within SQL Server Management Studio 18\. We’ll start by querying the wait statistics.'
