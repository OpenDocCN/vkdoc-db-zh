    ### 识别查询回归


    我们可以从理解 SQL Server 如何识别回归查询以及它如何传达为何认为该查询已回归开始。幸运的是，所有这些功能都汇总在一个新的动态管理视图中：`sys.dm_db_tuning_recommendations`。


    然而，在我们展示这个新 DMV 的行为之前，需要有一个查询能够可靠地提供可被识别为回归的行为。为此，我们将对标准的 AdventureWorks 数据库进行一些修改。Adam
    Machanic 有一个名为 BigAdventure 的脚本，它使用 AdventureWorks 中的一些表来创建一个更大的数据库。代码可在此处下载：[`http://dataeducation.com/thinking-big-adventure/`](http://dataeducation.com/thinking-big-adventure/)。首先运行
    Adam 的脚本以创建必要的结构。在此基础上，我们将运行此脚本以创建一个存储过程并修改数据库：


    ```sql

    CREATE INDEX ix_ActualCost ON dbo.bigTransactionHistory (ActualCost);

    GO

    --a simple query for the experiment

    CREATE OR ALTER PROCEDURE dbo.ProductByCost (@ActualCost MONEY)

    AS

    SELECT bth.ActualCost

    FROM dbo.bigTransactionHistory AS bth

    JOIN dbo.bigProduct AS p

    ON p.ProductID = bth.ProductID

    WHERE bth.ActualCost = @ActualCost;

    GO

    --ensuring that Query Store is on and has a clean data set

    ALTER DATABASE AdventureWorks SET QUERY_STORE = ON;

    ALTER DATABASE AdventureWorks SET QUERY_STORE CLEAR;

    GO

    ```


    所有这些对于使我们能够创建一个包含将可靠地遭受回归的查询的负载都是必要的。做好这些准备后，为了看到回归发生，我们将运行以下脚本：


    ```sql

    -- 1\. Establish a history of query performance

    EXEC dbo.ProductByCost @ActualCost = 8.2205;

    GO 30

    -- 2\. Remove the plan from cache

    DECLARE @PlanHandle VARBINARY(64);

    SELECT  @PlanHandle = deps.plan_handle

    FROM    sys.dm_exec_procedure_stats AS deps

    WHERE   deps.object_id = OBJECT_ID(''dbo.ProductByCost'');

    IF @PlanHandle IS NOT NULL

    BEGIN

    DBCC FREEPROCCACHE(@PlanHandle);

    END

    GO

    -- 3\. Execute a query that will result in a different plan

    EXEC dbo.ProductByCost @ActualCost = 0.0;

    GO

    -- 4\. Establish a new history of poor performance

    EXEC dbo.ProductByCost @ActualCost = 8.2205;

    GO 15

    ```


    该脚本执行了一系列操作。我在代码的注释中放置了标记，以便我们可以回顾代码的每个部分以理解正在发生的事情。首先，在数字 1 处，我们必须建立查询的行为基线。需要执行多次才能确立查询的某种行为模式，并将数据捕获到查询存储中。接下来，在数字
    2 处，我们通过获取 `plan_handle` 并使用 `FREEPROCCACHE` 仅从缓存中移除该计划，从而将其从计划缓存中移除。这意味着下一次执行将需要编译一个新计划。如果没有此步骤，即使我们使用不同的值执行查询，该计划在自然老化出缓存之前也会保持不变。通过强制将其从缓存中移除，我们为下一步做好了准备。在步骤
    3 中，我们执行查询，但我们使用了一个不同的值，该值在统计信息中具有非常不同的数据分布。这导致执行计划发生更改。最后，在步骤 4 中，我们再次使用新的执行计划建立行为模式。


    在我解释两个版本执行计划之间性能为何如此糟糕之前，让我们先通过如下查询 `sys.dm_db_tuning_recommendations` 来快速查看这是否导致了回归：


    ```sql

    SELECT ddtr.type,

    ddtr.reason,

    ddtr.last_refresh,

    ddtr.state,

    ddtr.score,

    ddtr.details

    FROM sys.dm_db_tuning_recommendations AS ddtr;

    ```


    结果应如图 8-1 所示：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig1_HTML.jpg](img/473933_1_En_8_Fig1_HTML.jpg)

    **图 8-1** 调优建议 DMV 中的结果


    原因很容易理解。如果我们查看使用值 `8.2205` 第一次执行存储过程时生成的执行计划，它看起来像这样：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig2_HTML.jpg](img/473933_1_En_8_Fig2_HTML.jpg)

    **图 8-2** `dbo.ProductByCost` 存储过程的原始执行计划


    此查询可能存在调优机会，如计划中的键查找操作所示。然而，对于正在检索的数据集来说，该计划表现得足够好。估计行数为 1，实际行数为 2，非常接近，因此计划性能相当不错。在使用值
    `0.0` 重新编译后，即使使用值 `8.2205` 执行，计划看起来像这样：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig3_HTML.jpg](img/473933_1_En_8_Fig3_HTML.jpg)

    **图 8-3** 性能非常差的执行计划


    发生此更改的原因是值 `0.0` 在计划中显示有 `12,420,400` 行，而不是我们最初处理的 2 行。这个不同的计划严重降低了性能，因为我们扫描了一个巨大的索引以仅检索两行，而不是简单的查找。通过多次执行查询，SQL
    Server 能够识别出回归，并将数据添加到 `sys.dm_db_tuning_recommendations` 中。让我们更仔细地查看图 8-4 中的该信息：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig4_HTML.jpg](img/473933_1_En_8_Fig4_HTML.jpg)

    **图 8-4** 建议的调优建议


    第一列告诉我们调优建议的类型，在本例中为 `FORCE_LAST_GOOD_PLAN`。Microsoft 未来可能会增加更多建议。下一列是建议的原因，内容如下：


    > Average query CPU time changed from 0.16ms to 4909.41ms

    > （查询平均 CPU 时间从 0.16 毫秒变为 4909.41 毫秒）


    正如我们上面解释的，将执行计划从索引查找更改为扫描索引降低了性能。我们执行存储过程的次数足够多，以至于建立了平均值，其平均值从 `0.16ms` 增加到了
    `4909.41ms`，这是一个巨大的跳跃。


    下一列让我们知道建议上次更新的时间。由于系统内的事物会发生变化，你可以并且将会看到建议随时间发生的变化。


    我们还有 `state` 列。这是 JSON 数据，向我们显示了建议的当前状态，如下所示：


    ```json

    {"currentValue":"Active", "reason":"AutomaticTuningOptionNotEnabled"}

    ```


    该建议处于活动状态，但尚未实施。原因很明确，我们尚未启用自动调优。最后，所有详细信息都显示在另一个 JSON 列中：


    ```json

    {"planForceDetails":{"queryId":2, "regressedPlanId":2, "regressedPlanExecutionCount":15,
    "regressedPlanErrorCount":0, "regressedPlanCpuTimeAverage":4.909411600000000e+006,"regressedPlanCpuTimeStddev":1.181213221539555e+007,
    "recommendedPlanId": 1,"recommendedPlanExecutionCount":30, "recommendedPlanErrorCount":
    0,"recommendedPlanCpuTimeAverage":1.622333333333333e+002, "recommendedPlanCpuTimeStddev":2.380063281138177e+002},
    "implementationDetails":{"method":"TSql", "script":"exec sp_query_store_force_plan
    @query_id = 2, @plan_id = 1"}}

    ```


    这非常难以阅读，因此我们将其整理成表格以便于查看：表 8-1 列出了上述 DMV 中 `details` 列的 JSON 数据中的各个列。


    **表 8-1** 来自 JSON 数据的调优建议详情

    '
- fmt: '## 调优推荐详情


    | planForceDetails |   |

    | --- | --- |

    | queryID | 2: `query_id` 值来自 Query Store |

    | regressedPlanID | 2: 问题计划的 `plan_id` 值，来自 Query Store |

    | regressedPlanExecutionCount | 5: 回归计划被使用的次数 |

    | regressedPlanErrorCount | 0: 当有值时，表示执行期间的错误数 |

    | regressedPlanCpuTimeAverage | 4.909411600000000e+006: 该计划的平均 CPU 时间 |

    | regressedPlanCpuTimeStddev | 1.181213221539555e+006: 该值的标准差 |

    | recommendedPlanID | 1: 调优建议推荐的计划 ID |

    | recommendedPlanExecutionCount | 30: 推荐计划被使用的次数 |

    | recommendedPlanErrorCount | 0: 当有值时，表示执行期间的错误数 |

    | recommendedPlanCpuTimeAverage | 1.622333333333333e+002: 该计划的平均 CPU 时间 |

    | recommendedPlanCpuTimeStddev | 2.380063281138177e+002: 该值的标准差 |

    | **implementationDetails** |   |

    | Method | TSql: 值将始终为 T-SQL，直到创建了新类型的建议 |

    | script | `exec sp_query_store_force_plan @query_id = 2, @plan_id = 1` |


    这意味着您无需启用自动调优即可查看系统中需要哪些类型的建议更改。如果您愿意，可以通过使用如下 JSON 查询更直接地查询此信息：


    ```sql

    WITH DbTuneRec

    AS (SELECT ddtr.reason,

    ddtr.score,

    pfd.query_id,

    pfd.regressedPlanId,

    pfd.recommendedPlanId,

    JSON_VALUE(ddtr.state,

    ''$.currentValue'') AS CurrentState,

    JSON_VALUE(ddtr.state,

    ''$.reason'') AS CurrentStateReason,

    JSON_VALUE(ddtr.details,

    ''$.implementationDetails.script'') AS ImplementationScript

    FROM sys.dm_db_tuning_recommendations AS ddtr

    CROSS APPLY

    OPENJSON(ddtr.details,

    ''$.planForceDetails'')

    WITH (query_id INT ''$.queryId'',

    regressedPlanId INT ''$.regressedPlanId'',

    recommendedPlanId INT ''$.recommendedPlanId'') AS pfd)

    SELECT qsq.query_id,

    dtr.reason,

    dtr.score,

    dtr.CurrentState,

    dtr.CurrentStateReason,

    qsqt.query_sql_text,

    CAST(rp.query_plan AS XML) AS RegressedPlan,

    CAST(sp.query_plan AS XML) AS SuggestedPlan,

    dtr.ImplementationScript

    FROM DbTuneRec AS dtr

    JOIN sys.query_store_plan AS rp

    ON rp.query_id = dtr.query_id

    AND rp.plan_id = dtr.regressedPlanId

    JOIN sys.query_store_plan AS sp

    ON sp.query_id = dtr.query_id

    AND sp.plan_id = dtr.recommendedPlanId

    JOIN sys.query_store_query AS qsq

    ON qsq.query_id = rp.query_id

    JOIN sys.query_store_query_text AS qsqt

    ON qsqt.query_text_id = qsq.query_text_id;

    ```


    这些建议仅仅是建议。尽管 SQL Server 非常擅长基于 Query Store 捕获的行为生成这些建议，但在您启用自动调优之前，您可以根据需要手动在系统中使用这些建议。您需要了解
    `sys.dm_db_tuning_recommendations` 的一点是，其中的信息不会持久化。在故障转移、重启或其他类型的停机中，这些数据将被重置。任何通过自动调强强制执行的计划将保持强制状态。但是，您将丢失有关该计划被强制执行的原因的历史记录。您可能需要定期将此信息捕获到其他位置以防万一。


    ## 启用自动调优


    根据您使用的是 SQL Server 2019 还是 Azure SQL Database，启用自动调优的方式有所不同。如果您使用的是 SQL Server
    2017 或更高版本，可以使用 T-SQL 来启用。如果您使用的是 Azure SQL Database，可以使用 T-SQL 或 Azure 门户。两者的
    T-SQL 是相同的，您用来查看信息的所有其他查询也是相同的。我们将从 Azure 开始，以便您了解其外观。


    ### 在 Azure SQL Database 中启用自动调优


    在我们继续之前，请注意 Azure 更新得非常频繁。您在阅读本书后看到的 GUI 可能与此处显示的不同。但流程应该基本保持不变。


    在门户中连接到数据库，然后滚动到页面底部，您应该会看到类似于图 [8-5](#473933_1_En_8_Chapter.xhtml#Fig5) 的内容：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig5_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig5_HTML.jpg)


    图 8-5


    Azure 门户中的自动调优，当前未配置


    如果您尚未启用自动调优，如您所见，它将在门户中显示为“未配置”。您可以单击此选项，它将打开一个新的边栏选项卡，如图 [8-6](#473933_1_En_8_Chapter.xhtml#Fig6)
    所示：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig6_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig6_HTML.jpg)


    图 8-6


    Azure 门户中数据库的自动调优设置


    边栏选项卡上所有内容都解释得相当清楚。您可以从包含数据库的服务器继承设置、从 Azure 默认值继承，或者将设置更改为不从任何地方继承。您可以看到一个警告，表明虽然我们当前从服务器继承，但服务器本身尚未配置。我们可以更改那里的设置，但为了我们的目的，我们将在此处进行更改。您可以在屏幕底部看到，除了强制执行计划外，您还可以让
    Azure SQL Database 创建或删除索引。索引功能与 Query Store 没有直接关系，因此我们在此不作介绍。要启用强制执行最后一个已知的良好计划，我们只需单击“开”，如图
    [8-7](#473933_1_En_8_Chapter.xhtml#Fig7) 所示：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig7_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig7_HTML.jpg)


    图 8-7


    在 Azure SQL Database 中启用自动调优


    要完成此过程，您将单击页面顶部的“应用”按钮。系统会提示您确认这确实是您想要执行的操作。单击“确定”后，自动调优即在您的数据库上启用。无需其他操作。


    ### 使用 T-SQL 启用自动调优


    在我撰写本文时，Management Studio 中没有用于启用自动查询调优的图形界面。相反，您必须使用 T-SQL 命令。您也可以在 Azure SQL
    Database 或 Azure 托管实例中使用相同的命令。命令如下：


    ```sql

    ALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    ```


    当然，您可以将我在此处使用的 `current` 默认值替换为适当的数据库名称。此命令一次只能在一个数据库上运行。如果您希望为实例上的所有数据库启用自动调优，您要么必须在创建其他数据库之前在
    model 数据库中启用它，要么需要为服务器上的每个数据库将其设置为开。


    目前 `automatic_tuning` 的唯一选项就是像我们这样启用强制执行最后一个良好计划。您可以使用以下命令禁用此功能：


    ```sql

    ALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = OFF);

    ```


    就这么简单。无需其他操作，这不需要重启或对服务器本身进行更改。'
