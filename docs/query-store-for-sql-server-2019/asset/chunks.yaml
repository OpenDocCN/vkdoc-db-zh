- fmt: '### Collecting Query and Plan Information


    When a query gets submitted to SQL Server, it runs through a series of processes.
    These processes ensure that the query is properly written, that the objects in
    the database referenced by the query actually exist, and, most importantly, that
    the query is optimized to run quickly. Figure [2-1](#473933_1_En_2_Chapter.xhtml#Fig1)
    shows an overview of this process:


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig1_HTML.jpg](images/473933_1_En_2_Chapter/473933_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    The basic process of generating an execution plan


    We start with the `T-SQL` query of course. Only Data Manipulation Language (`DML`)
    queries are captured by the `Query Store`. These are queries that are used to
    `SELECT`, `UPDATE`, `DELETE`, or `INSERT` data. Queries that are used to manipulate
    the data structures, Data Definition Language (`DDL`), are not captured to the
    `Query Store`. When the query first comes to SQL Server, it goes through an internal
    process called the `Algebrizer`. This does a number of things, but the two we
    care about the most are that it validates that the syntax is correct in the `parser`
    and it ensures that the objects in the query are actually in the database, through
    `object binding`. The `Algebrizer` also gathers a bunch of information that, along
    with the query, it passes to the `query optimizer`.


    The `query optimizer` is the process that determines an efficient way to retrieve
    or modify your data based on the query you’ve supplied it and the tables, indexes,
    statistics, and constraints in your database. The result of the query optimization
    process itself is an `execution plan` which gets written into a memory space called
    the `plan cache`.


    With one exception, which we’ll cover in a minute, the `Query Store` does not
    interfere with this process in any way. What the `Query Store` does is capture
    the output of the processes that create an `execution plan`. Here’s a graphic
    showing how the `Query Store` works side-by-side with the query optimization process
    as you can see in Figure [2-2](#473933_1_En_2_Chapter.xhtml#Fig2):


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig2_HTML.jpg](images/473933_1_En_2_Chapter/473933_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    The process of capturing the execution plan and query for the Query Store


    After the `query optimizer` does its work and generates an `execution plan`, an
    asynchronous process captures the query and the `execution plan` for the `Query
    Store`. It outputs them to a temporary storage space in memory. On a regular basis,
    the query information stored in memory gets written to the database through another
    asynchronous process. Microsoft describes this as occurring with minimal latency.
    The goal is to ensure that the `Query Store` data collection process does not
    interfere with the normal processing of the `Query Optimizer`.


    The one exception to this that I mentioned earlier is that the asynchronous process
    that captures queries and query plans also checks to see if there is `plan forcing`
    in place. We’ll cover that in a lot of detail in Chapter [7](#473933_1_En_7_Chapter.xhtml).
    `Plan forcing` is the one place where the `Query Store` does interfere with the
    normal optimization process. If `plan forcing` is in place for a query, then the
    plan being forced will be used instead of the plan generated by the `Query Optimizer`.
    That will also be the plan that gets written to the `plan cache`.


    With that, the core processing of retrieving queries and query plans is complete.
    The information is captured by individual query, not by `stored procedure` or
    `batch`. If the query is part of an object, that object’s ID is captured along
    with the query information. We’ll cover the details of what exactly gets capture
    in the section titled “The Data Collected By Query Store” in this chapter.


    ### Collecting Query Runtime Information and Wait Statistics


    The collection of the runtime data is a little more straightforward than the query
    and query plan data collection. All the information collected about the runtime
    statistics and wait statistics occurs after the query and query plan are already
    captured. The query executes and then the `Query Store` process takes place as
    Figure [2-3](#473933_1_En_2_Chapter.xhtml#Fig3) shows:


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig3_HTML.jpg](images/473933_1_En_2_Chapter/473933_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    The process of capturing runtime metrics for the Query Store


    There is only one fundamental difference in the processing of this data collection
    and that of the query and query plan data. This is the timed asynchronous writes
    to disk. Instead of a process with minimal latency, the data is stored and aggregated
    in-memory for a period of time. The default is 15 minutes. You can control this
    and we’ll cover it in detail in Chapter [3](#473933_1_En_3_Chapter.xhtml).


    The information , such as how long a query took to run and the waits experienced
    during the execution, is written to memory. That data is aggregated there in memory.
    When that information is written to disk, it gets reaggregated based on another
    setting, the collection interval. By default this is 60 minutes. What this aggregation
    gives you is the ability to compare two different time periods so that you can
    see if the performance of a query is changing over time. We’ll cover this in more
    detail in the “Data Collected” section.


    ### General Notes on Data Collection


    The `Query Store` works with all the other processes within SQL Server. So, for
    example, if a query is recompiling and it generates the same `execution plan`
    that is already in the `Query Store`, usage statistics are updated and nothing
    else happens. If, however, this recompile results in a new `execution plan`, then
    that plan will get captured to the `Query Store` just as the old plan did.


    In the event of a `cross-database query` using `three-part naming`, the database
    from which the call is being made is where the query will be recorded, regardless
    of where the data being retrieved or modified lives. This is important so that
    you know where to look for `Query Store` information if more than one database
    is involved. You will not see the query in both databases.


    Because all the data collection done in the `Query Store` gets written to disk
    asynchronously, it is possible to lose data because it has not yet been flushed
    to disk. There is a command to make this happen manually,


    ```

    sys.sp_query_store_flush_db

    ```


    Executing that command will force anything currently in memory to be immediately
    written to disk. This ensures that before a controlled failover, shutdown, or
    any event that would result in the data being removed from memory, you can retain
    that data.'
