    This data means that you don’t need to enable Automatic Tuning in order to see
    what types of suggested changes are needed in your system. You can, if you want
    to, query this information much more directly by using JSON queries as follows:


    ```

    WITH DbTuneRec

    AS (SELECT ddtr.reason,

    ddtr.score,

    pfd.query_id,

    pfd.regressedPlanId,

    pfd.recommendedPlanId,

    JSON_VALUE(ddtr.state,

    ''$.currentValue'') AS CurrentState,

    JSON_VALUE(ddtr.state,

    ''$.reason'') AS CurrentStateReason,

    JSON_VALUE(ddtr.details,

    ''$.implementationDetails.script'') AS ImplementationScript

    FROM sys.dm_db_tuning_recommendations AS ddtr

    CROSS APPLY

    OPENJSON(ddtr.details,

    ''$.planForceDetails'')

    WITH (query_id INT ''$.queryId'',

    regressedPlanId INT ''$.regressedPlanId'',

    recommendedPlanId INT ''$.recommendedPlanId'') AS pfd)

    SELECT qsq.query_id,

    dtr.reason,

    dtr.score,

    dtr.CurrentState,

    dtr.CurrentStateReason,

    qsqt.query_sql_text,

    CAST(rp.query_plan AS XML) AS RegressedPlan,

    CAST(sp.query_plan AS XML) AS SuggestedPlan,

    dtr.ImplementationScript

    FROM DbTuneRec AS dtr

    JOIN sys.query_store_plan AS rp

    ON rp.query_id = dtr.query_id

    AND rp.plan_id = dtr.regressedPlanId

    JOIN sys.query_store_plan AS sp

    ON sp.query_id = dtr.query_id

    AND sp.plan_id = dtr.recommendedPlanId

    JOIN sys.query_store_query AS qsq

    ON qsq.query_id = rp.query_id

    JOIN sys.query_store_query_text AS qsqt

    ON qsqt.query_text_id = qsq.query_text_id;

    ```


    These recommendations are just that, recommendations. While SQL Server is very
    good at making these based on the behavior captured through Query Store, until
    you enable Automatic Tuning, you can use these recommendations on your systems
    manually if you want. One thing you need to know about sys.dm_db_tuning_recommendations
    is that the information is not persisted. In a failover, reboot, or other type
    of outage, this data will be reset. Any plans forced through Automatic Tuning
    will remain forced. However, you’ll lose a history for why that plan was forced.
    You may want to capture this information regularly into other locations just in
    case.


    ### Enabling Automatic Tuning


    There are different ways to enable Automatic Tuning depending on if you’re working
    within SQL Server 2019 or Azure SQL Database. If you’re working with SQL Server
    2017 or greater, you can use T-SQL to enable it. If you’re working with Azure
    SQL Database, you can use T-SQL or the Azure portal. The T-SQL for both is the
    same, as is all the other queries you would run to look at the information. We’ll
    start with Azure so you can see what that looks like.


    #### Automatic Tuning in Azure SQL Database


    Before we go on, please note that Azure is updated extremely frequently. The GUI
    that you see after you get this book could be different than that shown here.
    The processes should remain basically the same.


    Connecting to a database within the portal and then scrolling to the bottom of
    the page, you should see something like Figure [8-5](#473933_1_En_8_Chapter.xhtml#Fig5):


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig5_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Automatic Tuning in the Azure portal, not currently configured


    If you have not yet enabled Automatic Tuning, as you can see, it will show as
    “Not Configured” in the portal. You can click on this and it will open a new blade
    as shown in Figure [8-6](#473933_1_En_8_Chapter.xhtml#Fig6):


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig6_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Settings for Automatic Tuning on a database in the Azure portal


    Everything is explained fairly clearly on the blade. You can inherit from the
    server that contains the database, from the Azure defaults, or change the setting
    to not inheriting from anywhere. You can see a warning that while we’re inheriting
    currently from the server, the server itself is not configured. We can make the
    change there, but for our purposes, we’ll make the change right here. You can
    see at the bottom of the screen that in addition to forcing a plan, you can also
    have Azure SQL Database create or drop indexes. The index functionality is not
    directly related to Query Store, so we won’t cover it here. To enable the forcing
    of the last known good plan, we just have to click ON as you can see in Figure
    [8-7](#473933_1_En_8_Chapter.xhtml#Fig7):


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig7_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Enabling Automatic Tuning in Azure SQL Database


    To complete this process, you will click the Apply button at the top of the page.
    It will prompt you to be sure that’s the action you want. Once you click OK, Automatic
    Tuning is enabled on your database. No other actions are required.


    #### Enable Automatic Tuning with T-SQL


    There is no graphical interface for enabling automatic query tuning within Management
    Studio as I type this. Instead, you have to use a T-SQL command. You can also
    use this same command within Azure SQL Database or Azure Managed Instances. The
    command is as follows:


    ```

    ALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    ```


    You can of course substitute the appropriate database name for the default value
    of `current` that I use here. This command can only be run on one database at
    a time. If you wish to enable automatic tuning for all databases on your instance,
    you either have to enable it in the model database before those other databases
    are created, or you need to set it to on for each database on the server.


    The only option currently for automatic_tuning is to do as we have done and enable
    the forcing of the last good plan. You can disable this by using the following
    command:


    ```

    ALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = OFF);

    ```


    It’s that easy. No other actions are necessary and this doesn’t require a reboot
    or changes to the server itself.'
