    ## sp_BlitzQueryStore


    `sp_BlitzQueryStore` 是由 Brent Ozar, ULTD. 开发的急救工具包的一部分，其网址为 [`http://FirstResponderKit.org`](http://firstresponderkit.org)。整个工具包可以从那里下载，或者如果您已安装
    `dbatools`，也可以使用代码清单 10-10 中的代码进行安装。


    ```

    Install-DbaFirstResponderKit -Server MyServer -Database master

    清单 10-10

    用于安装急救工具包的 PowerShell 命令

    ```


    默认情况下，该过程会查看过去 7 天（默认）查询存储中的数据，找出每个指标下资源消耗最多的时间段，并找出每个指标下资源消耗最多的前三条查询（默认）。通过按每个时间段和每个指标进行分析，您可以从查询存储中获得更均衡和有针对性的数据分析。例如，它将找到过去
    7 天中您进行逻辑读取最多的时间段，并返回该时间段内执行读取操作的前三条查询。然后，您可以深入研究，尝试找出如何在该时间段内提升这些查询的性能。


    默认情况下，您只需指定想要查看数据的数据库即可执行该过程，它将返回过去 7 天每个指标的前 N 条查询。代码清单 10-11 展示了用于查看结果的 T-SQL
    执行代码。图 10-7 和 10-8 展示了运行此存储过程时返回的部分列。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig8_HTML.jpg](img/473933_1_En_10_Fig8_HTML.jpg)


    图 10-8

    `sp_BlitzQueryStore` 结果集


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig7_HTML.jpg](img/473933_1_En_10_Fig7_HTML.jpg)


    图 10-7

    `sp_BlitzQueryStore` 结果集


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks''

    清单 10-11

    为过去 7 天每个指标执行 sp_BlitzQueryStore 以获取前 N 条查询

    ```


    您可以点击 `query_plan_xml` 列以调出查询计划进行查看和故障排查。它已为您完成了一些分析，提供了 `top_three_waits`、`missing_indexes`
    和 `implicit_conversion_info`。其他返回的列如下所示：


    *   `top_three_waits` – 括号内为总毫秒数

    *   `missing_indexes` – 从查询计划中的缺失索引提示列出

    *   `implicit_conversion_info` – 从查询计划中列出

    *   `cached_execution_parameters`

    *   `count_executions`

    *   `count_compiles`

    *   `total_cpu_time`

    *   `avg_cpu_time`

    *   `total_duration`

    *   `avg_duration`

    *   `total_logical_io_reads`

    *   `avg_logical_io_reads`

    *   `total_physical_io_reads`

    *   `avg_physical_io_reads`

    *   `total_logical_io_writes`

    *   `avg_logical_io_writes`

    *   `total_rowcount`

    *   `avg_rowcount`

    *   `total_query_max_used_memory`

    *   `avg_query_max_used_memory`

    *   `total_tempdb_space_used`

    *   `avg_tempdb_space_used`

    *   `total_log_bytes_used`

    *   `avg_log_bytes_used`

    *   `total_num_physical_io_reads`

    *   `avg_num_physical_io_reads`

    *   `first_execution_time`

    *   `last_execution_time`

    *   `last_force_failure_reason_desc`

    *   `context_settings`


    您可以在下面看到返回的结果，其中包含了对在该时间段内执行的查询的详细分析，包括是否发现执行计划存在问题、tempdb 使用率高、运行时间长但 CPU 使用率低的查询等，最后通过识别系统在每个指标下表现最差的时间段来总结。此输出的示例请参见图
    10-9。这使您能够深入分析指定时间段内特定的性能不佳的时间点或有问题的查询。


    ### 注意


    使用 `@TOP` 参数可以返回多条（超过一条）查询。但请谨慎使用，因为此过程会通过查询计划进行大量处理。建议限制为 10。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig9_HTML.jpg](img/473933_1_En_10_Fig9_HTML.jpg)


    图 10-9

    `sp_BlitzQueryStore` 时间段分析


    运行此过程还有其他选项；我们将介绍一些重要的选项，以帮助您获取所需的数据。在代码清单 10-12 中，您可以通过指定 `@StateDate` 和 `@EndDate`
    参数来指定输出中要返回的日期范围。


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @StartDate = ''20170526'', @EndDate = ''20170527''

    清单 10-12

    为 sp_BlitzQueryStore 指定日期范围

    ```


    如果您试图对特定的存储过程进行故障排查，可以专门查找该存储过程。在代码清单 10-13 中，您将找到如何通过指定 `@StoredProcName` 参数来返回存储过程
    `MyStoredProcedure` 中的前 N 条语句的代码。


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @Top = 1, @StoredProcName = ''MyStoredProcedure''

    清单 10-13

    返回特定存储过程的前 N 条语句

    ```


    您还可以通过指定 `@Failed` 参数来查看失败的查询。代码清单 10-14 是如何返回失败的前 N 条查询的示例。


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @Top = 1, @Failed = 1

    清单 10-14

    返回失败的前 N 条查询

    ```


    回顾第 4 章，我们查看了网格视图中的许多报告，您可以在其中看到 `plan_ids` 和 `query_ids`。如果您想查看从这些报告中识别出的某个查询的
    `sp_BlitzQueryStore` 数据，那么可以使用代码清单 10-15 和 10-16 中的代码从查询存储中提取数据。


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @QueryIdFilter = 2958

    清单 10-16

    按 query_id 返回数据

    ```


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @PlanIdFilter = 3356

    清单 10-15

    按 plan_id 返回数据

    ```


    您可以指定的其他参数包括表 10-1 中所列的参数。


    表 10-1

    `sp_BlitzQueryStore` 参数


    | 参数名称 | 数据类型 | 默认值 |

    | --- | --- | --- |

    | `@Help` | bit | 0 |

    | `@MinimumExecutionCount` | int | NULL |

    | `@DurationFilter` | decimal(38, 4) | NULL |

    | `@ExportToExcel` | bit | 0 |

    | `@HideSummary` | bit | 0 |

    | `@SkipXML` | bit | 0 |

    | `@Debug` | bit | 0 |

    | `@ExpertMode` | bit | 0 |

    | `@Version` | varchar(30) | NULL |

    | `@VersionDate` | datetime | NULL |

    | `@VersionCheckMode` | bit | 0 |


    ## 结论


    社区工具证明能够增强我们使用查询存储的能力。`dbatools` 让我们能够轻松地跨多个数据库和服务器配置和检查查询存储的设置。`sp_BlitzQueryStore`
    让您能够以不同于第 4 章所示报告的格式来提取查询存储中的数据，并且对于快速找出每个指标下的顶级查询以及每个指标下最繁忙的时间段非常有用。最后，它允许您跟踪您已确定需要进一步调查的存储过程、`query_id`
    或 `plan_id` 的数据。


