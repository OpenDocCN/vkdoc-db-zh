- fmt: '## Overall Resource Consumption Report


    The Overall Resource Consumption report shows the resources the database is consuming
    by default for the last month. The report defaults to showing four categories
    of performance in total amounts: duration in milliseconds, execution count, CPU
    time in milliseconds, and logical reads in kilobytes. Here is an example of a
    report shown in Figure [4-8](#473933_1_En_4_Chapter.xhtml#Fig8):


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig8_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig8_HTML.jpg)

    *Figure 4-8: Overall Resource Consumption report*


    If you double-click on any of the bars shown in the chart, you will automatically
    open the next report we will be talking about, the Top Resource Consuming Queries
    report. If you hover over any of the bars, you will get a list of statistics for
    the period of time for the bar as seen in Figure [4-9](#473933_1_En_4_Chapter.xhtml#Fig9).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig9_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig9_HTML.jpg)

    *Figure 4-9: Overall Consumption Report hover statistics*


    In the top right-hand corner, you have four buttons that allow you to control
    the reports. You can see a close-up picture of these in Figure [4-10](#473933_1_En_4_Chapter.xhtml#Fig10):


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig10_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig10_HTML.jpg)

    *Figure 4-10: Overall Resource Consumption report buttons*


    The `Refresh` button will allow you to refresh the report on the screen. The `Standard
    Grid` button allows you to view the data in a grid view; see Figures [4-11](#473933_1_En_4_Chapter.xhtml#Fig11),
    [4-12](#473933_1_En_4_Chapter.xhtml#Fig12), and [4-13](#473933_1_En_4_Chapter.xhtml#Fig13)
    for an example.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig13_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig13_HTML.jpg)

    *Figure 4-13: Overall Resource Consumption report standard grid view*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig12_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig12_HTML.jpg)

    *Figure 4-12: Overall Resource Consumption report standard grid view*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig11_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig11_HTML.jpg)

    *Figure 4-11: Overall Resource Consumption report standard grid view*


    The `Standard Grid` view contains a lot more columns than you get in the Standard
    View with charts. You can click on the column headings of any of the columns,
    and it will sort the columns and place an arrow showing which way it sorted the
    data. By default, it is sorted by the `interval start date and time`.


    The `Chart` button allows you to switch back to the `Chart View` if you are in
    the `Standard Grid View`.


    Finally, the `Configure` button allows you to control items on the `Chart View`
    and the `Time Interval` shown in either the `Standard View` or the `Chart View`.
    Figure [4-14](#473933_1_En_4_Chapter.xhtml#Fig14) shows the options available
    under the `Configure` button.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig14_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig14_HTML.jpg)

    *Figure 4-14: Configure button options for Overall Resource Consumption reports*


    On the top half of the screen as of `SSMS`, Figure [4-14](#473933_1_En_4_Chapter.xhtml#Fig14)
    shows you all the metrics that are available to be displayed in the `Chart View`.
    You can also use it to remove any item from the view.


    The bottom half of the screen in Figure [4-14](#473933_1_En_4_Chapter.xhtml#Fig14)
    applies to both the `Chart View` and `Standard Grid View`. You can change the
    `Time Interval` from the last month which is the default to a value seen in Figure
    [4-15](#473933_1_En_4_Chapter.xhtml#Fig15) to view a different period of time.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig15_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig15_HTML.jpg)

    *Figure 4-15: Overall Resource Consumption report configure time interval drop-down*


    When you select `Custom` from the drop-down box, the `From` and `To` boxes will
    no longer be greyed and out and you will be able to edit the days by typing or
    selecting from a calendar. Next, there is a drop-down box for `Aggregation Size`
    where you can specify the intervals it rolls the data into for your viewing. Values
    in the drop-down are shown in Figure [4-16](#473933_1_En_4_Chapter.xhtml#Fig16).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig16_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig16_HTML.jpg)

    *Figure 4-16: Aggregation Size drop-down*


    Finally, you can select if data is shown to you in your `Local Time Zone` time
    or `UTC` zone.


    ### Tip

    This is the best report for validating whether or not your system is meeting your
    expected baselines you have established and for seeing if something unusual is
    happening on the server.'
  raw: '## Overall Resource Consumption Report


    The Overall Resource Consumption report shows the resources the database is consuming
    by default for the last month. The report defaults to showing four categories
    of performance in total amounts: duration in milliseconds, execution count, CPU
    time in milliseconds, and logical reads in kilobytes. Here is an example of a
    report shown in Figure [4-8](#473933_1_En_4_Chapter.xhtml#Fig8):


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig8_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Overall Resource Consumption report


    If you double-click on any of the bars shown in the chart, you will automatically
    open the next report we will be talking about, the Top Resource Consuming Queries
    report. If you hover over any of the bars, you will get a list of statistics for
    the period of time for the bar as seen in Figure [4-9](#473933_1_En_4_Chapter.xhtml#Fig9).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig9_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Overall Consumption Report hover statistics


