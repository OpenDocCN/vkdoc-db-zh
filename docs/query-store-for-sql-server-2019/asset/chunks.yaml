- fmt: '# Top Consuming Resources Report


    ## Regular Grid View and Chart View


    The `Regular Grid View` button shows far fewer columns as seen in Figure [4-24](#473933_1_En_4_Chapter.xhtml#Fig24).
    The `Regular Grid View` concentrates on the metric and statistic you are looking
    at in the chart rather than showing all the metrics. Note both views have the
    ability for you to change which metric and statistic you want to view the data
    inside the view without returning to the `Chart View`.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig24_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig24_HTML.jpg)


    *Figure 4-24 Top Consuming Resources regular grid view*


    The `Chart View` button allows you to return to `Chart View` if you have entered
    either of the `Grid Views`.


    ## Changing Axis Options


    You can change what is shown on the y-axis and x-axis of the chart on the `Chart
    View` on the pane as well. For the x-axis you have the options available in Figure
    [4-25](#473933_1_En_4_Chapter.xhtml#Fig25), and for the y-axis you have the options
    available in Figure [4-26](#473933_1_En_4_Chapter.xhtml#Fig26).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig26_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig26_HTML.jpg)


    *Figure 4-26 Top Consuming Resources chart view x-axis options*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig25_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig25_HTML.jpg)


    *Figure 4-25 Top Consuming Resources chart view y-axis options*


    ## Query and Plan Interaction


    The right-hand side of the screen shows you the plans and their IDs associated
    with each query; as you click on the query, this side of the screen adjusts along
    with the query plan shown at the bottom of the screen.


    Also, in the first pane, if you `hover over` any of the bars for the queries,
    it will show you details about the query and the plan you currently have selected
    as seen in Figure [4-27](#473933_1_En_4_Chapter.xhtml#Fig27).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig27_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig27_HTML.jpg)


    *Figure 4-27 Top Consuming Resources report query ID data*


    ## Left-Hand Pane Group By Options


    On the left-hand side of the left-hand pane, you can change how you group the
    data. You can use whichever metric you selected from the top drop-down (`duration`,
    `CPU`, `logical reads`, etc.), `execution count`, and `plan count` as seen in
    Figure [4-28](#473933_1_En_4_Chapter.xhtml#Fig28). The most useful here is `plan
    count` so you can find queries that have multiple plans which will help you identify
    possible queries with plans that can be forced.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig28_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig28_HTML.jpg)


    *Figure 4-28 Top Consuming Resources report left-hand pane group by drop-down*


    ## Left-Hand Pane Controls (Portrait Mode)


    On the left-hand pane in `Portrait mode`, there are a series of buttons that control
    what you may do with the plans being displayed for the selected query. Figure
    [4-29](#473933_1_En_4_Chapter.xhtml#Fig29) shows you the buttons as we go through
    and explain what each one does.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig29_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig29_HTML.jpg)


    *Figure 4-29 Top Consuming Resources report right-hand pane buttons*


    You are already familiar with the `Refresh` button as it just refreshes the current
    report you are in. The next button `forces the plan` whichever plan is highlighted
    in the pane. The next button either tells you the plan is not forced or will `unforce
    a plan` if it has been forced previously. The next button will allow you to `compare
    two plans` if you click two of the dots in the pane below and hold the `Ctrl`
    key. Figure [4-30](#473933_1_En_4_Chapter.xhtml#Fig30) shows an example of what
    comparing a plan looks like. The differences in the plan operators are highlighted
    in red in the plan diagram. Beside that, you will have what you see in Figure
    [4-31](#473933_1_En_4_Chapter.xhtml#Fig31) which shows you more details about
    the differences in where the time is spent on each operation.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig30_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig30_HTML.jpg)


    *Figure 4-30 Top Consuming Resources report comparing plan operator differences*


    The differences seen in Figure [4-31](#473933_1_En_4_Chapter.xhtml#Fig31) have
    a not equal sign highlighted in yellow.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig31_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig31_HTML.jpg)


    *Figure 4-31 Top Consuming Resources report comparing report details*


    The next button shows you data for the plans in the `Grid View` as seen in Figure
    [4-32](#473933_1_En_4_Chapter.xhtml#Fig32). The final button returns the pane
    into the `Chart View`.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig32_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig32_HTML.jpg)


    *Figure 4-32 Top Consuming Resources report grid view of plan data*


    ## Right-Hand Pane Interaction and Icons


    In the right-hand pane, when it is in `Chart View`, you can `hover over` the plan
    and get data about the plan. Three types of icons will appear in this pane. A
    dot with nothing inside of it represents an `unforced plan`, a dot with a check
    mark represents a `forced plan`, and a square represents a `failed execution`
    of the query. These metrics change based on the metric you have selected at the
    top left-hand corner of the report; for example, if you have `CPU Time` chosen,
    you would see `CPU` instead of `Duration`. In Figure [4-33](#473933_1_En_4_Chapter.xhtml#Fig33)
    you can see what the statistics an example of the statistics shown when you `hover
    over` a icon in the pane for the period of time it represents.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig33_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig33_HTML.jpg)


    *Figure 4-33 Top Consuming Resources report hover over query plan details*


    # Queries with Forced Plans Report


    ## Report Overview


    The `Queries with Forced Plans` report shows you the query plans that have been
    forced on your database. This report can be used to check back to make sure you
    still see the same performance improvement when you forced the plan or to see
    what plans have been forced on the database. A sample report can be seen in Figure
    [4-34](#473933_1_En_4_Chapter.xhtml#Fig34):


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig34_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig34_HTML.jpg)


    *Figure 4-34 Queries with Forced Plan report*


    ## Report Buttons


    There are not as many configuration options in this report, but let’s explore
    the buttons we do have available to us. The three buttons in the left-hand pane
    are familiar to us; the first is the `Refresh` button. The second is to `open
    this query in the Track Queries report`. The last is to `open the query text in
    the Query Editor window`.


    The right-hand pane has at the very top the same buttons from the `Top Resource
    Consuming Queries` report. One is to put the report in `Landscape mode` which
    stacks the panes. Another one is to change it back to its default `Portrait mode`.
    Then we have the `Configure` button which looks the same as the one in the `Top
    Resource Consuming` report in Figure [4-34](#473933_1_En_4_Chapter.xhtml#Fig34).
    Underneath that, you have the `Refresh` button for the right-hand pane. There
    is a button to `force a plan` and a button to `unforce a plan`. Lastly is the
    button to `compare plans`.


    ## Bottom Pane Options


    In the bottom pane, you have the plan showed for the highlighted plan ID from
    the top right-hand pane and the buttons to `force` or `unforce` the plan selected
    as seen in Figure [4-34](#473933_1_En_4_Chapter.xhtml#Fig34). On the left-hand
    side of the chart, you have the option to change the statistic that is used to
    display the dots which is defaulted to `average`; see Figure [4-35](#473933_1_En_4_Chapter.xhtml#Fig35)
    for the other options.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig35_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig35_HTML.jpg)


    *Figure 4-35 Queries with Forced Plan report y-axis options*


    Just like in the `Top Resource Consuming Queries` report, you have the same options
    to look at the query plans.'
