    ## 跟踪查询报告


    跟踪查询报告用于显示您正在跟踪的特定查询的运行时统计信息，并查看该查询的所有执行计划。跟踪查询报告的示例可参见图 4-52。当您之前已通过 `查询 ID`
    识别出想要监视并观察其性能随时间变化情况的查询时，此报告最为有用。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig52_HTML.jpg](img/473933_1_En_4_Fig52_HTML.jpg)


    图 4-52 跟踪查询报告


    在左上角，您有两种方法来查找想要跟踪的查询。一种是在白色框中输入 `查询 ID`，然后点击绿色箭头以加载数据。默认情况下，数据涵盖最近一天。另一种是点击放大镜图标，此时将弹出一个窗口，其中已加载存储在
    `查询存储` 中的所有查询，如图 4-53 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig53_HTML.jpg](img/473933_1_En_4_Fig53_HTML.jpg)


    图 4-53 跟踪查询报告放大镜视图


    从这里，您可以选择一个查询进行跟踪，然后点击“确定”，之后您需要点击绿色箭头以在报告中加载数据。将鼠标悬停在数据点上，会显示基于您配置为显示的指标（默认为持续时间）的特定时间段内的统计信息，如图
    4-54 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig54_HTML.jpg](img/473933_1_En_4_Fig54_HTML.jpg)


    图 4-54 跟踪查询报告统计详情


    在顶部，您会看到几个我们之前未见过的新按钮。第一个是 `自动刷新` 按钮，顾名思义，它将每 5 秒自动刷新一次报告。`自动刷新` 设置可在 `配置` 按钮下进行配置。在该屏幕中，还有一个我们未见过的可配置设置，即可以在此处更改要跟踪的查询。


    ## 结论


    在本章中，我们探讨了 `退化查询`、`总体资源消耗`、`前资源消耗查询`、`具有强制计划的查询`、`高差异查询`、`查询等待统计信息` 和 `跟踪查询` 报告，以及它们如何相互作用。我们探索了所有可用的选项，以更改屏幕上报告的数据，以及如何配置每个报告以满足您的需求。这些报告对于快速解决
    SQL Server 实例上 `查询存储` 的问题至关重要。


    # 5. 查询存储目录视图


    `查询存储` 为 SQL Server 引入了八个新的目录视图，用于存储您查询数据以通过 `查询存储` 排查 SQL Server 问题和检查 `查询存储`
    配置所需的所有信息。您需要 `VIEW DATABASE STATE` 权限才能查询这些目录视图。在本章中，您将找到所有目录视图及其列的描述，然后是我们在第
    4 章讨论的标准 `查询存储` 报告背后的查询示例。


    ## sys.database_query_store_options


    包含指示 `查询存储` 设置选项的目录视图是 `sys.database_query_store_options`。此目录视图返回为 `查询存储` 配置设置的所有可用选项。此目录视图与其他任何目录视图没有关系。有时您需要检查所有已启用
    `查询存储` 的数据库的配置；您可以使用清单 5-1 中的查询，为每个启用了 `查询存储` 的数据库返回一个包含所有设置的结果集。


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = '''';

    SELECT @SQL += REPLACE(REPLACE(''

    USE [{{DBName}}];

    SELECT "{{DBName}}",

    *

    FROM sys.database_query_store_options; ''

    ,''{{DBName}}'', [name])

    ,'' " '','''' '''')

    FROM sys.databases

    WHERE is_query_store_on = 1;

    EXEC (@SQL);

    ```

    清单 5-1 检查 SQL Server 实例上所有数据库的查询存储选项


    表 5-1 显示了 `sys.database_query_store_options` 目录视图中所有列的列名、数据类型和描述。需要密切关注的重要列是 `actual_state_desc`；如果
    `desired_state` 是 `READ_WRITE`，您需要确保它保持在 `READ_WRITE` 状态，而不是由于空间不足或 `ERROR` 而切换到
    `READ_ONLY`。要更好地理解这些列的选项，请参阅第 3 章。


    表 5-1 sys.database_query_store_options 的列列表和描述

    '
- fmt: '# Query Store 配置与状态


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `desired_state` | `smallint` | 显示 Query Store 的期望状态。这些是用户可以设置的唯一有效值。有效值如下：`0
    = OFF` `1 = READ_ONLY` `2 = READ_WRITE` |

    | `desired_state_desc` | `nvarchar(60)` | 提供 Query Store 期望状态的描述。有效值如下：`OFF` `READ_ONLY`
    `READ_WRITE` |

    | `actual_state` | `smallint` | 显示 Query Store 的实际状态。注意这里有一个在期望状态中没有的附加值 `ERROR`。有效值如下：`0
    = OFF` `1 = READ_ONLY` `2 = READ_WRITE` `3 = ERROR` |

    | `actual_state_desc` | `nvarchar(60)` | 提供 Query Store 实际状态的描述。有效值如下：`OFF` `READ_ONLY`
    `READ_WRITE` `ERROR` |

    | `readonly_reason` | `int` | 当数据库处于 `READ_ONLY` 模式但期望状态是 `READ_WRITE` 时，此列中存储一个位图来指示原因。有效值如下：`1`
    – 数据库已被置于只读模式。`2` – 数据库已被置于单用户模式。`4` – 数据库已被置于紧急模式。`8` – 数据库是辅助副本。这适用于可用性组和 Azure
    SQL 数据库地理复制数据库，因为所有辅助副本本质上都是数据库的只读副本。`65536` – 已达到 `MAX_STORAGE_SIZE_MB` 中指定的最大大小限制。`46410`
