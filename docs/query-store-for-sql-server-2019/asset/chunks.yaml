    When querying using the `datetimeoffset` datatypes, you need to specify the time
    zone the data was generated in to see the data at the times it was generated because
    all data is stored in UTC time in this datatype.


    ## sys.query_store_query


    All metrics per query executed are stored inside this catalog view. The data in
    the catalog view is stored at the SQL statement level. Batches are split up into
    statements in the catalog view allowing for better troubleshooting. Most of the
    columns in the catalog view are metrics for compiling and binding the plan for
    the statements. Of note in this catalog view is the `object_id` column. This column
    allows you to tie the statements back to their stored procedure, function, or
    trigger. Table 5-4 shows all the column names, data types, and descriptions for
    the columns in the `sys.query_store_query` catalog view.


    **Table 5-4: Column listing and descriptions for sys.query_store_query**


    | Column name | Data type | Description |

    | --- | --- | --- |

    | `query_id` | `bigint` | Primary key |

    | `query_text_id` | `bigint` | Foreign key to `sys.query_store_query_text`. Refer
    to Table 5-5 |

    | `context_settings_id` | `bigint` | Foreign key to `sys.query_context_settings`.
    Refer to Table 5-2 |

    | `object_id` | `bigint` | ID of the database object. Value will be 0 for ad-hoc
    queries |

    | `batch_sql_handle` | `varbinary(64)` | ID of the statement batch the query is
    part of. Populated only if the query references temporary tables or table variables
    |

    | `query_hash` | `binary(8)` | MD5 hash of the query including optimizer hints
    |

    | `is_internal_query` | `bit` | The query was generated internally |

    | `query_paramterization_type` | `tinyint` | Kind of parameterization: 0 – none,
    1 – user, 2 – simple, 3 – forced |

    | `query_paramterization_type_desc` | `nvarchar(60)` | Text description of type
    of parameterization |

    | `initial_compile_start_time` | `datetimeoffset` | Initial compile start time
    |

    | `last_compile_start_time` | `datetimeoffset` | Last compile start time |

    | `last_execution_time` | `datetimeoffset` | Last execution time |

    | `last_compile_batch_sql_handle` | `varbinary(64)` | Last SQL batch handle for
