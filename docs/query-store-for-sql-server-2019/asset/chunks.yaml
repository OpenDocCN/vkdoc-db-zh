- fmt: '## sys.query_store_query_text


    `sys.query_store_query_text` 目录视图包含 SQL 语句的查询文本，需要与 `sys.query_store_query` 目录视图联接以获取语句级别而非批处理级别的数据。使用
    `sys.query_store_query` 中的 `object_id`，我们在清单 [5-6](#473933_1_En_5_Chapter.xhtml#PC6)
    中通过用对象名替换占位符 `<object_name>` 来查询对象的所有语句。


    ```sql

    SELECT *

    FROM sys.query_store_query_text qt

    INNER JOIN sys.query_store_query q

    ON q.query_text_id = qt.query_text_id

    INNER JOIN sys.objects o on o.object_id = q.object_id

    WHERE o.name = ''''

    Listing 5-6

    Retrieve statements for an object

    ```


    表 [5-5](#473933_1_En_5_Chapter.xhtml#Tab5) 显示了 `sys.query_store_query_text` 目录视图中所有列的名称、数据类型和描述。


    表 5-5


    sys.query_store_query_text 的列清单和描述


    | Column name | Data type | Description |

    | --- | --- | --- |

    | `query_text_id` | `bigint` | 主键 |

    | `query_sql_text` | `nvarchar(max)` | 用户提供的查询 SQL 文本 |

    | `statement_sql_handle` | `varbinary(64)` | 查询的 SQL 句柄 |

    | `is_part_of_encrypted_module` | `bit` | 指示查询是否属于加密模块的一部分 |

    | `has_restricted_text` | `bit` | 指示查询文本是否包含密码或其他不可提及的词 |


    ## sys.query_store_wait_stats


    `sys.query_store_wait_stats` 目录视图是在 SQL Server 2017 中引入到查询存储器的，它让我们能深入了解每个查询在执行时的等待情况。在清单
    [5-7](#473933_1_En_5_Chapter.xhtml#PC7) 中，您可以看到通过为 `<object_name>` 替换值来收集的对象中语句的等待统计信息摘要。


    ```sql

    SELECT *

    FROM sys.query_store_query_text qt

    INNER JOIN sys.query_store_query q

    ON q.query_text_id = qt.query_text_id

    INNER JOIN sys.objects o on o.object_id = q.object_id

    INNER JOIN sys.query_store_plan p

    ON p.query_id = q.query_id

    INNER JOIN sys.query_store_wait_stats ws

    ON ws.plan_id = p.plan_id

    WHERE o.name = ''''

    Listing 5-7

    Wait stats for statements in an object

    ```


    下表 [5-6](#473933_1_En_5_Chapter.xhtml#Tab6) 是 `sys.query_store_wait_stats` 目录视图中所有列的名称、数据类型和描述。


    表 5-6


    sys.query_store_wait_stats 的列清单和描述


    | Column name | Data type | Description |

    | --- | --- | --- |

    | `wait_stats_id` | `bigint` | 行标识符，表示 `plan_id`、`runtime_stats_interval_id`、`execution_type`
    和 `wait_category` 的等待统计信息。它仅在过去的运行时统计信息区间内唯一。对于当前活动的区间，可能存在代表刷到磁盘的一行统计信息的多行，以及可能仍在内存中数据的多行
    |

    | `plan_id` | `bigint` | 指向 `sys.query_store_plan` 的外键。请参考表 [5-3](#473933_1_En_5_Chapter.xhtml#Tab3)
    |

    | `runtime_stats_interval_id` | `bigint` | 指向 `sys.query_store_runtime_stats_interval`
    的外键。请参考表 [5-8](#473933_1_En_5_Chapter.xhtml#Tab8) |

    | `wait_category` | `tinyint` | 表示等待时间聚合到的类别。请参考表 [5-7](#473933_1_En_5_Chapter.xhtml#Tab7)
    获取等待统计信息类型映射和有效值 |

    | `wait_category_desc` | `nvarchar(128)` | 等待统计信息类别的描述。请参考表 [5-7](#473933_1_En_5_Chapter.xhtml#Tab7)
    获取等待统计信息类型映射和有效值 |

    | `execution_type` | `tinyint` | 确定查询执行的类型。有效值如下：0 – 常规执行：成功 3 – 客户端中止执行 4 – 异常中止执行
    |

    | `execution_type_desc` | `nvarchar(128)` | execution_type 字段的文本描述。有效值如下：0 – 常规
    3 – 中止 4 – 异常 |

    | `total_query_wait_time_ms` | `bigint` | 聚合区间内的总 CPU 等待时间（毫秒） |

    | `avg_query_wait_time_ms` | `float` | 聚合区间内每次执行的平均 CPU 等待持续时间（毫秒） |

    | `last_query_wait_time_ms` | `bigint` | 聚合区间内最后一次 CPU 等待持续时间（毫秒） |

