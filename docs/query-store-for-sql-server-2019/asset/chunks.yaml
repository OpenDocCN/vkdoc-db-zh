  trans: '### 使用查询存储测试和完成升级的过程


    现在您已经了解了更改兼容性模式如何影响查询优化器和基数估算器，以及可能导致查询性能回退的原因，接下来让我们谈谈如何以最有效的方式升级 SQL Server，即使用查询存储在升级后稳定任何回退的查询。这一点在图
    6-6 中得到了最佳说明。


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig6_HTML.jpg](img/473933_1_En_6_Fig6_HTML.jpg)


    图 6-6 使用查询存储升级 SQL Server 的步骤


    第一步是升级到 SQL Server 2016 或更高版本。接下来，您需要在数据库上启用查询存储。让您的工作负载在数据库上运行足够长的时间，以捕获良好的基线。然后，将数据库的兼容性模式设置为最新模式。最后，监控第
    4 章中讨论的“性能回退查询”报告，查找您因性能回退而需要强制执行的查询计划。第 7 章涵盖了自动计划修正功能，从 SQL Server 2017 开始，查询存储会自动为您强制执行计划。详情请参见第
    7 章。


    ## 查找和改进即席工作负载


    最后，查询存储可用于查找您的即席查询并对其进行改进。如果您有大量即席查询，当您查看“消耗资源最多”报告时，您不会看到大量资源被执行次数大于一的查询所消耗。如果您的系统主要是即席工作负载，那么使用查询存储可能不是理想的方案，因为您发送的是不同的查询，它无法为您聚合数据或强制执行计划来帮助提高性能。当您的应用程序生成即席查询时，SQL
    Server 会花费时间为每一个执行的新查询进行编译，这会膨胀计划缓存，并消耗比查询已在计划缓存中时更多的资源。这也会导致查询存储膨胀，因为它将为每个查询存储不同的计划和聚合的运行时统计数据行。这还将导致清理查询存储的后台进程占用更多资源，以将空间维持在可以添加数据的水平。


    除了使用“消耗资源最多”报告外，您还可以运行 T-SQL 来首先获取查询文本总数、查询总数和计划总数，然后比较 `query_hash` 和 `query_plan_hash`
    以查找相似的即席查询，如清单 6-3 所示。


    ```sql

    -- 总查询文本数

    SELECT COUNT(*) AS CountQueryTextRows

    FROM sys.query_store_query_text;

    -- 总查询数

    SELECT COUNT(*) AS CountQueryRows

    FROM sys.query_store_query;

    -- 总的不同查询哈希数（不同查询）

    SELECT COUNT(DISTINCT query_hash) AS CountDifferentQueryRows

    FROM  sys.query_store_query;

    -- 总计划数

    SELECT COUNT(*) AS CountPlanRows

    FROM sys.query_store_plan;

    -- 总的不同查询计划哈希数（不同计划）

    SELECT COUNT(DISTINCT query_plan_hash) AS CountDifferentPlanRows

    FROM sys.query_store_plan;

    ```


    清单 6-3 用于检查即席工作负载的 T-SQL


    如果您看到 `CountQueryRows` 和 `CountDifferentQueryRows` 或 `CountPlanRows` 和 `CountDifferentPlansRows`
    之间存在差异，这表明有相似的查询在运行，如果您能控制应用程序代码，将它们编写为参数化形式（如存储过程）将会受益，这样它们就可以编译一次并存储在内存中，并在查询存储中高效存储。如果您无法管理应用程序代码，您还有两个其他选择。一是使用计划指南；清单
    6-4 提供了计划指南的模板。


    ```sql

    DECLARE @stmt nvarchar(max);

    DECLARE @params nvarchar(max);

    EXEC sp_get_query_template

    N'''',

    @stmt OUTPUT,

    @params OUTPUT;

    EXEC sp_create_plan_guide

    N''TemplateGuide1'',

    @stmt,

    N''TEMPLATE'',

    NULL,

    @params,

    N''OPTION (PARAMETERIZATION FORCED)'';

    ```


    清单 6-4 用于实现 PARAMETERIZATION FORCED 计划指南的模板


    或者，您可以使用清单 6-5 在数据库级别打开 `PARAMETERIZATION FORCED`。


    ```sql

    ALTER DATABASE  SET PARAMETERIZATION FORCED;

    ```


    清单 6-5 在数据库级别打开 PARATERIZATION FORCED


    如果在清单 6-3 中，计数保持大致相同，那么您就不需要打开 `PARAMETERIZATION FORCED`。相反，您需要为查询存储启用 `optimize
    for ad hoc workloads` 并将 `QUERY_CAPTURE_MODE` 设置为 `AUTO`，而不是 `ALL`。参见清单 6-6 来设置这些选项。这将防止计划膨胀计划缓存，因为查询第一次执行时只会存储一个存根，在第二次执行时才会存储计划以供将来重用。`AUTO`
    捕获模式将使查询存储不捕获那些消耗资源量微不足道的查询，以限制存储量。


    ```sql

    EXEC sys.sp_configure N''show advanced options'', N''1''

    GO

    RECONFIGURE WITH OVERRIDE

    GO

    EXEC sys.sp_configure N''optimize for ad hoc workloads'', N''1''

    GO

    RECONFIGURE WITH OVERRIDE

    GO

    ALTER DATABASE [QueryStoreTest] SET QUERY_STORE CLEAR;

    ALTER DATABASE [QueryStoreTest] SET QUERY_STORE = ON

    (OPERATION_MODE = READ_WRITE, QUERY_CAPTURE_MODE = AUTO);

    ```


    清单 6-6 为查询存储启用“优化即席工作负载”并将捕获模式设置为 AUTO


    ## 结论


    在本章中，我们探讨了查询存储的几种用例。我们讨论了如何建立基线，以便您可以发现系统的正常性能并查看更改时发生的情况。然后我们讨论了如何查看昨晚或任何先前时间点发生的问题。接着我们讨论了什么是性能回退的查询，以及如何对它们进行故障排除并强制执行计划。之后，我们讨论了识别消耗资源最多的查询，以便您可以着手改进它们。接下来，我们研究了如何使用查询存储来稳定
    SQL Server 的升级，以及为什么这是一个用于此目的的重要功能。最后，我们讨论了如何使用查询存储来改进您的即席工作负载。


    # 7. 强制执行计划


    虽然查询存储中收集的信息以及它告诉您有关系统性能的所有内容是您会更频繁使用的部分，但查询存储最强大的部分是强制执行计划的能力。计划强制执行是指编译或重新编译事件期间优化器所做的选择被您选择的计划所取代。查询存储在性能指标和执行计划之间提供了足够的信息，使您能够决定在某些情况下可以选择更优的执行计划。


    本章将向您展示如何使用查询存储信息和报告来识别行为不良的执行计划。在识别出行为不良的计划后，我们将探讨如何使用查询存储中的信息来识别行为良好的计划（如果存在）。有了这些信息，我们就可以强制使用好的计划。'
- fmt: '## Identifying Badly Behaved Execution Plans


    Execution plans, also called query plans or show plans, are your window into the
    choices made by the query optimization process. They show how your `T-SQL`, indexes,
    statistics, tables, columns, and constraints make up your database, and its queries
    will be used to retrieve or modify the data stored there. Reading execution plans
    is a very dense topic. For a detailed look, you should read the book *Execution
    Plans* by Grant Fritchey (one of the co-authors of this book). Here we’ll explore
    the information and reports that may suggest you have a poorly performing query.
    We’ll then use that to lead us to an execution plan. We’ll cover a few of the
    guideposts that can help you tell that a plan might not be supporting a query
    well, but we won’t be covering all the details of how to read an execution plan.


    To get started, we have to understand how we can use `Query Store` to identify
    a query that has both changed its execution plan and how that plan caused performance
    to degrade. Another way you can identify poorly performing queries is when you
    get alerted to issues from the consumers of your database that performance is
    poor but with the information in the `Query Store`, we can be more proactive than
    that.


    ### Identifying Regressed Queries


    A regression is something that occurs when a query was behaving well and now performs
    poorly. You may have a query that runs badly from the start. These are easily
    identified and dealt with. You may have a query that slowly degrades in performance
    over time as more and more data is added to the system. These are also easily
    identified and dealt with. The real issues come when you have queries that were
    performing well and suddenly, sometimes intermittently, run slowly. Prior to `Query
    Store`, these were frequently difficult problems to solve.


    The causes for these regressions are varied. You might see them when you migrate
    from earlier versions of `SQL Server` to later versions of `SQL Server`. These
    are caused by changes to how the query optimizer works and the introduction in
    `SQL Server` 2014 of a new cardinality estimation engine. You may see a regression
    caused by statistics on your database being incorrect or out of date. You could
    also be suffering from a problem known as bad parameter sniffing.


    While incorrect and out-of-date statistics are probably the most common cause
    of regressions in query performance, the most talked about problem, and the one
    we’ll use for our examples in this chapter, is bad parameter sniffing. Let’s start
    by explaining what parameter sniffing is and how it can sometimes cause problems.


    When you have a parameterized query, whether that’s a stored procedure, a parameterized
    query from an `ORM` tool such as `Entity Framework`, or parameters in `sp_executesql`,
    the query optimizer will use the values passed to that parameter when compiling
    an execution plan. It takes those exact values and uses them to look at the statistics
    for the column or index being referenced and creates and execution plan based
    on those precise values. This sampling of values is what is known as parameter
    sniffing. The majority of the time, this is a benign practice. A lot of the time,
    this is a very helpful practice. Sometimes though, you’ll see a situation where
    a plan gets created for one value that performs well enough for the query immediately
    called. However, all other queries perform very poorly with that same execution
    plan. This situation is known as bad parameter sniffing.


    When you hit a situation where a query was performing well, but is suddenly performing
    poorly, you can use the information in `Query Store` to identify both the query
    metrics that define the performance and get a look at the execution plans both
    for when the query was running well and when it was running badly. You can do
    this one of two ways. You can run `T-SQL` code against the data collected in `Query
    Store`. Alternatively, you can use the `Regressed Query` report. Since the `Regressed
    Query` report may not always identify a query that is giving you problems as a
    regressed query, it’s a very good idea to know how to retrieve this information
    from the `Query Store` data yourself.


    #### Identifying Regressed Queries from Query Store Data


    We discussed the information collected by the `Query Store` in Chapter 2. We then
    went over the basics of how to retrieve data from the `Query Store` catalog views
    in Chapter 5. If you don’t get what we’re doing with the queries below, I’d recommend
    going back and reviewing those chapters before proceeding with this one.


    To start with, we need a query that we can reliably get different execution plans
    from. The data distribution in the `Person.Address` table is such that depending
    on what value is used to filter the `City` column, you can get a couple of different
    execution plans in the `AdventureWorks` database. Here is the query we’ll use
    to explore behavior in the rest of the chapter:


    ```sql

    CREATE OR ALTER PROC [dbo].[AddressByCity] @City NVARCHAR(30)

    AS

    SELECT a.AddressID,

    a.AddressLine1,

    a.AddressLine2,

    a.City,

    sp.Name AS StateProvinceName,

    a.PostalCode

    FROM Person.Address AS a

    JOIN Person.StateProvince AS sp

    ON a.StateProvinceID = sp.StateProvinceID

    WHERE a.City = @City;

    GO

    ```


    With this procedure in place, we can execute the query with one of two different
    values to arrive at two different execution plans. If you run the following script
    with execution plans enabled, you can see the two plans. Note: For test purposes
    we’re using a simple way to clear the procedure cache. This may not be the best
    approach on a production system:


    ```sql

    EXEC dbo.AddressByCity @City = N''London'';

    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;

    EXEC dbo.AddressByCity @City = N''Mentor'';

    ```


    This is a classic case of parameter sniffing resulting in different execution
    plans. Each plan is optimized for the result set it is returning; 434 rows for
    the value “London” and one row for the value “Mentor.” However, each plan causes
    poor performance for the opposite data set. What I mean here is that the plan
    to return 434 rows runs fast when returning 434 rows, but it doesn’t run as fast
    as the other plan when returning only a few rows. The opposite is also true. In
    fact, the query will run so much slower when using the plan for “Mentor” when
    returning 434 rows that it will be marked as a regressed query in the `Regressed
    Query` report.'
