  trans: '

    ### 确定哪些计划已被强制


    正如你在图 7-12 中所见，判断一个计划是否已被强制非常容易。甚至有一份报告会列出所有强制计划。我们将在第 4 章详细讨论这份报告。问题应该是，是否有办法以编程方式判断一个计划已被强制。答案当然是，有。你只需查询查询存储的目录视图：


    ```sql

    SELECT qsq.query_id,

    qsp.plan_id,

    qsp.is_forced_plan

    FROM sys.query_store_query AS qsq

    JOIN sys.query_store_plan AS qsp

    ON qsp.query_id = qsq.query_id

    WHERE qsq.query_id = 262;

    ```


    此查询的结果如图 7-14 所示：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig14_HTML.jpg](img/473933_1_En_7_Fig14_HTML.jpg)


    *图 7-14*

    *以编程方式显示哪个查询计划被强制*


    你可以快速看到 `plan_id` 为 273 的计划已被强制，因为其 `is_forced_plan` 值设置为 1，而另一个计划 269 则未被强制。


    你也可以通过查看一些执行计划来判断一个计划是否被强制。如果计划尚未缓存，你只捕获估计计划时，在其上不会看到它。你不会在来自查询存储本身的计划上看到它。你几乎可以在任何其他计划上看到这一点。不过，你要找的东西有点隐蔽。我们需要进入第一个操作符的属性，并查找“使用计划”属性值，如图
    7-15 所示：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig15_HTML.jpg](img/473933_1_En_7_Fig15_HTML.jpg)


    *图 7-15*

    *第一个操作符中的“使用计划”属性*


    这仅作为第一个操作符的属性可用。它在工具提示中不可见。你只会在已被强制的计划上看到这个。在任何其他计划上，你甚至看不到这个属性，因此不会出现值为 False
    的“使用计划”。


    ### 结论


    查询性能回退是一个真实存在的问题。解决它的最佳方法仍然是修改代码、结构或统计信息，以确保生成更合适的计划。然而，在必须时，你确实有能力强制执行某个执行计划。有很多方法可以监控计划强制的情况，以便在结构或代码更改或系统进行其他可能影响计划生成的更改时，可以酌情进行调整。如前所述，仅在必须使用此功能，并且有计划定期审查已强制计划的查询时才使用它。


    # 8. 自动计划修正与等待统计信息


    查询存储捕获和存储的信息开始为微软和你开启新的功能。首先，对于微软而言，能够识别出遭受性能回退的查询（如我们在第 7 章所述）意味着他们可以监控系统，并利用查询存储中的信息，自动强制一个计划来修复回退。这就是自动计划修正在发挥作用。其次，对于我们在查询存储信息中增加的等待统计信息，开启了额外的故障排除可能性。


    本章探讨查询存储的附加功能，包括：


    *   自动标记发生性能回退的查询的能力，以及支持此功能的新目录视图。

    *   SQL Server 根据性能回退自动强制或取消强制计划的能力。

    *   已添加到查询存储信息中的 23 个类别的等待统计信息。


    ## 自动计划修正


    自动计划修正的概念完全建立在查询存储之上。如果没有查询存储收集的信息，SQL Server 和 Azure SQL Database 确定计划已发生回退的能力将无法实现。请记住，计划回退的核心是基于查询本身未发生变化的思想。代码更改总会导致行为变化。当你没有更改代码或数据库结构，但性能却下降时，这才是一种回退。查询存储使得识别回退变得更容易。


    一旦识别出回退，自动计划修正的基本方法就很简单了。这个查询在旧计划下的表现更好。当启用自动计划修正时，SQL Server 可以自动强制该旧计划，即最后一个已知的良好计划。然后，系统的行为会再次观察一段时间。如果强制最后一个良好计划没有奏效，则可以自动取消强制。所有这些都在后台发生，无需用户、开发人员或
    DBA 的实际干预。


    这种行为使调优 SQL Server 的工作变得更加容易，因为你可以腾出时间来处理需要更多知识和理解的更困难的问题，而不是试图修复那些可以轻松自动化解决的简单问题。简单地选择最后一个表现良好的计划并应用它，是一种简单的调优方法，但它可以轻松解决大量问题。

    '
- fmt: '### Identifying Regression


    We can start by understanding how SQL Server identifies a regressed query and
    how it communicates why it thinks that query has regressed. Luckily, all this
    functionality is summarized in a new dynamic management view: `sys.dm_db_tuning_recommendations`.


    However, before we can show off the behavior of the new DMV, it’s necessary to
    have a query which will reliably supply behavior that can be identified as a regression.
    In order to do that, we’ll have to make some modifications to the standard AdventureWorks
    database. Adam Machanic has a script called BigAdventure that uses some of the
    tables from AdventureWorks to create a much larger database. The code is available
    to download here: [`http://dataeducation.com/thinking-big-adventure/`](http://dataeducation.com/thinking-big-adventure/).
    First run Adam’s script to create the necessary structures. With that in place,
    we’ll run this script to create a stored procedure and modify the database:


    ```sql

    CREATE INDEX ix_ActualCost ON dbo.bigTransactionHistory (ActualCost);

    GO

    --a simple query for the experiment

    CREATE OR ALTER PROCEDURE dbo.ProductByCost (@ActualCost MONEY)

    AS

    SELECT bth.ActualCost

    FROM dbo.bigTransactionHistory AS bth

    JOIN dbo.bigProduct AS p

    ON p.ProductID = bth.ProductID

    WHERE bth.ActualCost = @ActualCost;

    GO

    --ensuring that Query Store is on and has a clean data set

    ALTER DATABASE AdventureWorks SET QUERY_STORE = ON;

    ALTER DATABASE AdventureWorks SET QUERY_STORE CLEAR;

    GO

    ```


    All this is necessary to enable us to create a load with queries that will suffer
    from a regression in a reliable fashion. With these preparations in place, in
    order to see the regression occur, we’ll run the following script:


    ```sql

    -- 1\. Establish a history of query performance

    EXEC dbo.ProductByCost @ActualCost = 8.2205;

    GO 30

    -- 2\. Remove the plan from cache

    DECLARE @PlanHandle VARBINARY(64);

    SELECT  @PlanHandle = deps.plan_handle

    FROM    sys.dm_exec_procedure_stats AS deps

    WHERE   deps.object_id = OBJECT_ID(''dbo.ProductByCost'');

    IF @PlanHandle IS NOT NULL

    BEGIN

    DBCC FREEPROCCACHE(@PlanHandle);

    END

    GO

    -- 3\. Execute a query that will result in a different plan

    EXEC dbo.ProductByCost @ActualCost = 0.0;

    GO

    -- 4\. Establish a new history of poor performance

    EXEC dbo.ProductByCost @ActualCost = 8.2205;

    GO 15

    ```


    That script does a number of things. I’ve placed markers in the comments in the
    code so that we can refer back to each section of the code to understand what
    is happening. First, at number 1, we have to establish behavior for the query.
    It takes a number of executions to establish that a query is behaving a certain
    way, capturing the data in Query Store. Next, at number 2, we remove the plan
    from the plan cache by getting the `plan_handle` and using `FREEPROCCACHE` to
    remove just the one plan from cache. This means that the next execution will have
    to compile a new plan. Without this step, even if we executed the query with different
    values, the plan would remain the same until it naturally aged out of cache. By
    forcibly removing it from cache, we set up the next step. In step 3, we execute
    the query, but we use a different value which has a very different data distribution
    in the statistics. This results in a change to the execution plan. Finally, in
    step 4, we again establish a pattern of behavior with the new execution plan.


    Before I explain why the performance was so bad between the two versions of the
    execution plan, let’s quickly see if this resulted in a regression by querying
    `sys.dm_db_tuning_recommendations` like this:


    ```sql

    SELECT ddtr.type,

    ddtr.reason,

    ddtr.last_refresh,

    ddtr.state,

    ddtr.score,

    ddtr.details

    FROM sys.dm_db_tuning_recommendations AS ddtr;

    ```


    The results should look like Figure [8-1](#473933_1_En_8_Chapter.xhtml#Fig1):


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig1_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig1_HTML.jpg)

    **Figure 8-1** Results in the tuning recommendations DMV


    The reason for this is easy enough to understand. If we were to look at the execution
    plan generated the first time we executed the store procedure using the value
    `8.2205`, it looks like this:


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig2_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig2_HTML.jpg)

    **Figure 8-2** Original execution plan for `dbo.ProductByCost` stored procedure


    There could be tuning opportunities with this query as you can see in the plan
    with the Key Lookup operation. However, the plan works well enough for the data
    set being retrieved. The estimated number of rows was 1 and the actual was 2,
    which is extremely close, so the plan performs fairly well. After recompiling
    using the value `0.0`, even when executed using the value `8.2205`, the plan looks
    like this:


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig3_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig3_HTML.jpg)

    **Figure 8-3** Execution plan with very poor performance


    The reason for this change is because the value `0.0` has `12,420,400` rows as
    shown in the plan, not the two we were dealing with originally. This different
    plan degraded performance seriously because we’re scanning a giant index to retrieve
    only two rows rather than a simple seek. By executing the query multiple times,
    SQL Server was able to identify a regression and added data to `sys.dm_db_tuning_recommendations`.
    Let’s take a closer look at that information in Figure [8-4](#473933_1_En_8_Chapter.xhtml#Fig4):


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig4_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig4_HTML.jpg)

    **Figure 8-4** Suggested tuning recommendations


    The first column tells us the type of tuning recommendation, in this case, `FORCE_LAST_GOOD_PLAN`.
    Microsoft is likely to add further recommendations in the future. The next column
    is the reason for the recommendation and reads as follows:


    > Average query CPU time changed from 0.16ms to 4909.41ms


    As we explained above, changing the execution plan to scan the index instead of
    seeking on it degraded performance. We executed the procedure enough times that
    averages were established and it went from `0.16ms` to `4909.41ms` on average,
    a huge leap.


    The next column lets us know when the recommendation was last updated. Because
    things change within the system, you can, and will, see changes made to recommendations
    over time.


    We also have the `state` column. This is JSON data showing us the current status
    of the recommendation as follows:


    ```json

    {"currentValue":"Active", "reason":"AutomaticTuningOptionNotEnabled"}

    ```


    The recommendation is active, but it is not implemented. The reason for this is
    clear, we have yet to enable Automatic Tuning. Finally, all the details of the
    information are shown in another JSON column:


    ```json

    {"planForceDetails":{"queryId":2, "regressedPlanId":2, "regressedPlanExecutionCount":15,
    "regressedPlanErrorCount":0, "regressedPlanCpuTimeAverage":4.909411600000000e+006,"regressedPlanCpuTimeStddev":1.181213221539555e+007,
    "recommendedPlanId": 1,"recommendedPlanExecutionCount":30, "recommendedPlanErrorCount":
    0,"recommendedPlanCpuTimeAverage":1.622333333333333e+002, "recommendedPlanCpuTimeStddev":2.380063281138177e+002},
    "implementationDetails":{"method":"TSql", "script":"exec sp_query_store_force_plan
    @query_id = 2, @plan_id = 1"}}

    ```


    That’s very difficult to read, so we’ll lay it out in a table to make it easier
    to see:Table [8-1](#473933_1_En_8_Chapter.xhtml#Tab1) list the columns in the
    JSON data in the `details` column above in the DMV.


    **Table 8-1** Details of the tuning recommendation from the JSON data'
