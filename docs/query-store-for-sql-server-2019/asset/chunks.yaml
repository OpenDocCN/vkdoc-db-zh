  raw: '## sys.query_store_query_text


    The `sys.query_store_query_text` catalog view contains the query text of the SQL
    Statement to be joined to `sys.query_store_query` catalog view to get statement
    level data, not batch level data. Using the `object_id` from `sys.query_store_query`,
    we are in Listing [5-6](#473933_1_En_5_Chapter.xhtml#PC6) querying for all the
    statements for an object by subbing in an object name in the placeholder `<object_name>`.


    ```

    SELECT *

    FROM sys.query_store_query_text qt

    INNER JOIN sys.query_store_query q

    ON q.query_text_id = qt.query_text_id

    INNER JOIN sys.objects o on o.object_id = q.object_id

    WHERE o.name = ''''

    Listing 5-6

    Retrieve statements for an object

    ```


    Table [5-5](#473933_1_En_5_Chapter.xhtml#Tab5) shows all the column names, data
    types, and descriptions for the columns in the `sys.query_store_query_text` catalog
    view.


    Table 5-5


    Column listing and descriptions for sys.query_store_query_text


    | Column name | Data type | Description |

    | --- | --- | --- |

    | query_text_id | bigint | Primary key |

    | query_sql_text | nvarchar(max) | SQL text of the query as provided by user |

    | statement_sql_handle | varbinary(64) | SQL handle of the query |

    | is_part_of_encrypted_module | bit | Indicates if the query is part of an encrypted
    module |

    | has_restricted_text | bit | Indicates if the query text contains passwords or
    other unmentionable words |


    ## sys.query_store_wait_stats


    The `sys.query_store_wait_stats` catalog view was introduced to Query Store in
    SQL Server 2017 and gave us major insights into what each query was waiting on
    when executing. In Listing [5-7](#473933_1_En_5_Chapter.xhtml#PC7) you can see
    a summary of the wait statistics collected across categories for the statements
    in an object by subbing in value for `<object_name>`.


    ```

    SELECT *

    FROM sys.query_store_query_text qt

    INNER JOIN sys.query_store_query q

    ON q.query_text_id = qt.query_text_id

    INNER JOIN sys.objects o on o.object_id = q.object_id

    INNER JOIN sys.query_store_plan p

    ON p.query_id = q.query_id

    INNER JOIN sys.query_store_wait_stats ws

    ON ws.plan_id = p.plan_id

    WHERE o.name = ''''

    Listing 5-7

    Wait stats for statements in an object

    ```


    Below in Table [5-6](#473933_1_En_5_Chapter.xhtml#Tab6) are all the column names,
    data types, and descriptions for the columns in the `sys.query_store_wait_stats`
    catalog view.


    Table 5-6


    Column listing and descriptions for sys.query_store_wait_stats


    | Column name | Data type | Description |

    | --- | --- | --- |

    | wait_stats_id | bigint | Identifier of the row representing wait statistics
    for the `plan_id`, `runtime_stats_interval_id`, `execution_type,` and `wait_category`.
    It is unique only for the past runtime statistics intervals. For currently active
    intervals, there may be multiple rows representing one row of statistics flushed
    to disk and possible multiple rows for data still held in memory |

    | plan_id | bigint | Foreign key to `sys.query_store_plan`. Refer to Table [5-3](#473933_1_En_5_Chapter.xhtml#Tab3)
    |

    | runtime_stats_interval_id | bigint | Foreign key to `sys.query_store_runtime_stats_interval`.
    Refer to Table [5-8](#473933_1_En_5_Chapter.xhtml#Tab8) |

    | wait_category | tinyint | Represents what category wait time is aggregated into.
    Refer to Table [5-7](#473933_1_En_5_Chapter.xhtml#Tab7) for wait statistics type
    mappings and valid values |

    | wait_category_desc | nvarchar(128) | Description of the wait statistics category.
    Refer to Table [5-7](#473933_1_En_5_Chapter.xhtml#Tab7) for wait statistics type
    mappings and valid values |

    | execution_type | tinyint | Determines the type of query execution. Valid values
    are as follows:0 – regular execution: successful3 – client aborted the execution4 –
    exception aborted execution |

    | execution_type_desc | nvarchar(128) | Textual description of the execution type
    field. Valid values are as follows:0 – regular3 – aborted4 – exception |

    | total_query_wait_time_ms | bigint | Total CPU wait time in the aggregation interval
    in milliseconds |

    | avg_query_wait_time_ms | float | Average CPU wait duration per execution in
    the aggregation interval in milliseconds |

    | last_query_wait_time_ms | bigint | Last CPU wait duration in the aggregation
    interval in milliseconds |

    | min_query_wait_time_ms | bigint | Minimum CPU wait time in the aggregation interval
    in milliseconds |

    | max_query_wait_time_ms | bigint | Maximum CPU wait time in the aggregation interval
    in milliseconds |

    | stdev_query_wait_time_ms | float | Standard deviation CPU wait time in the aggregation interval
    in milliseconds |


    Wait statistics are divided into 23 categories a list of which can be found in
    Table [5-7](#473933_1_En_5_Chapter.xhtml#Tab7) with a list of which wait statistics
    belong in each category.


    Table 5-7


    Wait statistics categories mapping table


    | Wait statistics ID | Wait statistics category description | Wait statistics
    types included in the category |

    | --- | --- | --- |

    | 0 | Unknown | Unknown |

    | 1 | CPU | SOS_SCHEDULER_YIELD |

    | 2 | Worker thread | THREADPOOL |

    | 3 | Lock | LCK_M_% |

    | 4 | Latch | LATCH_% |

    | 5 | Buffer latch | PAGELATCH_% |

    | 6 | Buffer IO | PAGEIOLATCH_% |

    | 7 | Compilation^* | RESOURCE_SEMAPHORE_QUERY_COMPILE |

    | 8 | SQL CLR | CLR%, SQLCLR% |

    | 9 | Mirroring | DBMIRROR% |

    | 10 | Transaction | XACT%, DTC%, TRAN_MARKLATCH_%, MSQL_XACT_%, TRANSACTION_MUTEX
    |

    | 11 | Idle | SLEEP_%, LAZYWRITER_SLEEP, SQLTRACE_BUFFER_FLUSH, SQLTRACE_INCREMENTAL_FLUSH_SLEEP,
    SQLTRACE_WAIT_ENTRIES, FT_IFTS_SCHEDULER_IDLE_WAIT, XE_DISPATCHER_WAIT, REQUEST_FOR_DEADLOCK_SEARCH,
    LOGMGR_QUEUE, ONDEMAND_TASK_QUEUE, CHECKPOINT_QUEUE, XE_TIMER_EVENT |

    | 12 | Preemptive | PREEMPTIVE_% |

    | 13 | Service broker | BROKER**_% (but not BROKER_RECEIVE_WAITFOR)** |

    | 14 | Tran Log IO | LOGMGR, LOGBUFFER, LOGMGR_RESERVE_APPEND, LOGMGR_FLUSH, LOGMGR_PMM_LOG,
    CHKPT, WRITELOGF |

    | 15 | Network IO | ASYNC_NETWORK_IO, NET_WAITFOR_PACKET, PROXY_NETWORK_IO, EXTERNAL_SCRIPT_NETWORK_IOF
    |

    | 16 | Parallelism | CXPACKET, EXCHANGE |

    | 17 | Memory | RESOURCE_SEMAPHORE, CMEMTHREAD, CMEMPARTITIONED, EE_PMOLOCK, MEMORY_ALLOCATION_EXT,
    RESERVED_MEMORY_ALLOCATION_EXT, MEMORY_GRANT_UPDATE |

    | 18 | User wait | WAITFOR, WAIT_FOR_RESULTS, BROKER_RECEIVE_WAITFOR |

    | 19 | Tracing | TRACEWRITE, SQLTRACE_LOCK, SQLTRACE_FILE_BUFFER, SQLTRACE_FILE_WRITE_IO_COMPLETION,
    SQLTRACE_FILE_READ_IO_COMPLETION, SQLTRACE_PENDING_BUFFER_WRITERS, SQLTRACE_SHUTDOWN,
    QUERY_TRACEOUT, TRACE_EVTNOTIFF |

    | 20 | Full text search | FT_RESTART_CRAWL, FULLTEXT GATHERER, MSSEARCH, FT_METADATA_MUTEX,
    FT_IFTSHC_MUTEX, FT_IFTSISM_MUTEX, FT_IFTS_RWLOCK, FT_COMPROWSET_RWLOCK, FT_MASTER_MERGE,
    FT_PROPERTYLIST_CACHE, FT_MASTER_MERGE_COORDINATOR, PWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC
