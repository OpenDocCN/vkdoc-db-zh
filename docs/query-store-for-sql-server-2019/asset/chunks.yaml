  trans: '

    ### 估计值与实际值


    只有当你查看实际执行计划时，才能比较这些值。实际执行计划看起来与估计执行计划相同，但包含了额外的运行时指标。简而言之，要捕获实际执行计划，你必须执行查询。如果我们查看在使用“London”值执行查询后，“Mentor”值的执行计划，我们可以在图
    7-5 中看到这个比较的实际应用：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig5_HTML.jpg](img/473933_1_En_7_Fig5_HTML.jpg)


    *图 7-5：估计值与实际值的比较*


    这里我们看到的是估计值与实际值比较的一个例子，即每个运算符处理的行数。你可以看到，`嵌套循环`连接处理了 434 行，而它预期的只有 2 行。在这种情况下，估计行数是
    2，但实际是 434。这种巨大的差异（21,700%）可能是导致性能不佳的一个指标。


    即使有了这些查看执行计划的指南，你仍然需要深入了解属性，以便更好地理解执行计划的工作原理。不过，这些指引能帮你入门。为了评估一个计划是否更好，学习如何将一个计划与另一个计划进行比较是个好主意。


    ## 比较执行计划


    从性能下降查询报告（以及其他查询存储报告）中，你可以轻松、快速地比较执行计划。是的，你可以通过点击各个节点来图形化地查看和比较计划。然而，有一个专门用于比较执行计划的工具，它能显示更多的细节和功能。


    要使用此功能，你需要按住 Shift 键并单击两个执行计划（一次只能比较两个计划）。然后，点击报告工具栏，如图 7-6 所示：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig6_HTML.jpg](img/473933_1_En_7_Fig6_HTML.jpg)


    *图 7-6：用于比较两个执行计划的工具栏*


    在选择两个计划后点击此按钮，将打开一个类似图 7-7 的新窗口：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig7_HTML.jpg](img/473933_1_En_7_Fig7_HTML.jpg)


    *图 7-7：正在比较的两个执行计划*


    你在图 7-7 中看到的是左侧上下两个窗格中正在比较的两个执行计划。右侧显示的是所选运算符的两组属性。这些属性值也在进行比较。两个计划中运算符周围的阴影（在我的例子中是粉色）表示两个计划之间共有的运算符，甚至是运算符集。因此，在我们的计划中，对`Person.Address`表的索引扫描在两个计划中基本相同。其他运算符则不同。这些信息可用于帮助排查性能问题，要么是向你展示一个需要解决的常见问题（在本例中是扫描索引中的所有数据），要么是向你展示导致性能不佳的计划差异。


    点击左侧窗格中的任何运算符都会改变右侧的属性值，使你能够进一步探索细节和差异。图 7-8 显示了共同`索引扫描`运算符的属性：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig8_HTML.jpg](img/473933_1_En_7_Fig8_HTML.jpg)


    *图 7-8：两个执行计划中的共同运算符*


    不匹配的属性值前面有黄色的“不等于”图标。你可以看到，总体而言，估计成本、行大小、对象信息等都是相同的。只有估计行数、节点 ID 和估计运算符百分比成本不同。实际上，百分比估计值之所以不同，仅仅是因为两个计划中的所有其他运算符都不同。


    比较共同的运算符，尤其是在本例中是一个扫描操作，可以让你了解通过更改代码或结构可能在哪些地方提高查询性能。然而，使用计划强制的全部意义就在于避免修改代码或结构。你主要想比较计划，以便确保你选择强制的那个计划更有可能成功。


    当你查看未标记为两个计划之间共同的运算符时，要比较这些运算符，你需要分别选择每一个。通常，这不会告诉你太多关于计划的信息，因为当不同计划中的不同运算符执行不同的功能时，比较它们用处不大。


    你需要结合性能指标、等待统计信息以及从有问题的执行计划中收集的信息。除了这些信息，你还应考虑查询的重要性、被调用的频率以及其他有助于你确定哪个计划在最常见需求下表现更好的因素。


    一旦你决定要强制执行哪个计划，你有多种选择来强制该计划。

    '
- fmt: '## Forcing and Unforcing Execution Plans


    When a plan regresses for whatever reason, the single best solution is to make
    changes, whether that is to code, structure, or statistics. However, it’s just
    not always possible, or desirable, to make those changes. In this case, we’re
    going to want to force a plan. There are several things you should know about
    plan forcing before we get on to how it’s done.


    Plan forcing overrides the work of the query optimizer. When you choose to force
    a plan, that is the plan that will always be used until you unforce, or invalidate,
    that plan. You can only force a plan that is valid for a given query. If you make
    changes to the code or the structures, such as dropping an index or something
    along those lines, it invalidates the plan, forcing is no longer possible.


    The query optimizer will still generate a plan if one is not in the cache. However,
    in the event that you have a forced plan, any other plan generated by the optimizer
    will be discarded. You can sometimes see a situation where a forced plan looks
    different than the original plan that you forced. Because the optimizer still
    goes through the optimization process, if a plan that is morally equivalent (Microsoft’s
    term) is generated, meaning a plan that for all intents and purposes is exactly
    the same, that morally equivalent plan will be used. However, in most cases, you’ll
    see the exact plan that you chose to force.


    SQL Server has long had a function that is similar in behavior to plan forcing
    in the Query Store, plan guides. These were a way to apply a query hint or even
    suggest an entire execution plan for a query, like plan forcing. However, they
    are very difficult to use and frequently fail. This is one of many reasons why
    plan forcing in Query Store is so attractive. If you are using plan guides, plan
    forcing overrides the plan guides. Although, you’ll still see evidence that guide
    was applied in both Extended Events and the execution plan itself.


    When you mark a plan as forced, that is stored within the Query Store catalog
    views. This means that plan forcing will survive a restart, a detach, or even
    a failover in a clustered environment. This is because the fact that a plan is
    forced has been persisted to disk with the database. The only way to stop plan
    forcing is to invalidate the plan as described earlier, or choose to stop forcing
    that plan.


    Because data and statistics change over time, it’s a good idea to plan to review
    forced plans on a regular basis. You want to be sure that the reasons for forcing
    a particular plan still hold true as things change over time. It’s also a very
    good idea to be very judicious about plan forcing and only do it when absolutely
    necessary in order to address regression.


    ### Forcing Plans Through the Reports


    Choosing to force a plan is never difficult. It’s especially easy inside the Query
    Store reports. In the right-hand pane where you can see the performance of the
    queries over time, you’ll see the execution plans for a query. There may be one,
    or there may be several. In Figure [7-9](#473933_1_En_7_Chapter.xhtml#Fig9) you
    can see that I have two. They are listed on the right of Figure [7-9](#473933_1_En_7_Chapter.xhtml#Fig9)
    in the little box labeled “Plan ID”:


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig9_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Two execution plans in the Query Store report


    Once we decide which of the plans we wish to force, we just have to click on that
    Plan ID value on the right, either 269 or 273 in Figure [7-9](#473933_1_En_7_Chapter.xhtml#Fig9).
    With that selected, the toolbar above has an icon for forcing plans as shown in
    Figure [7-10](#473933_1_En_7_Chapter.xhtml#Fig10):


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig10_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Button in the report that lets you force plans


    Clicking that button opens a confirmation window. You have the opportunity to
    choose not to force the plan. Figure [7-11](#473933_1_En_7_Chapter.xhtml#Fig11)
    shows the window:


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig11_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Confirming that you wish to force a plan


    Clicking on the Yes button will immediately force the plan. Clicking on the No
    button will of course cancel the process. After you click yes, the plan will be
    forced. In my case, I’m choosing to force plan 273. When I do this, the report
    then marks that plan with a check mark. You can see this immediately in the Query
    Store report as shown in Figure [7-12](#473933_1_En_7_Chapter.xhtml#Fig12):


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig12_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    The plans after picking a plan to force


    You can see that a check mark as been placed on plan 273 and will remain there
    until the plan forcing is removed. This is an immediate indication that the plan
    has been forced. You’ll also see that the “Force Plan” button is marked as depressed
    when the plan is forced and not depressed when the plan is not forced.


    Another way to force the plan is immediately below the pane we’ve been looking
    at in Figures [7-9](#473933_1_En_7_Chapter.xhtml#Fig9) and [7-12](#473933_1_En_7_Chapter.xhtml#Fig12).
    Another set of buttons are visible as shown in Figure [7-13](#473933_1_En_7_Chapter.xhtml#Fig13):


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig13_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Plan forcing buttons in the Query Store report


    This button works the same as before. Pick the plan you wish to force and select
    the button. A confirmation window will open and you can acknowledge forcing the
    plan.


    Choosing to remove forcing, or unforcing a plan, is very simple. You have to use
    the button shown in Figure [7-13](#473933_1_En_7_Chapter.xhtml#Fig13). When you
    have a plan selected that has already been forced, the “Unforce Plan” button will
    be enabled. You can then remove plan forcing for that query. You’ll again be prompted
    to confirm that you are unforcing the plan.


    ### Forcing Plans Using T-SQL


    You can also force a plan programmatically using T-SQL. The actual functionality
    of plan forcing through T-SQL is extremely easy. The only trick is that you have
    to have two pieces of information. You have to have the `query_id` within the
    Query Store and you have to have the `plan_id`. As you can see above, you can
    retrieve these using the Query Store reports. You can also use T-SQL against the
    Query Store catalog views as outlined in Chapter [5](#473933_1_En_5_Chapter.xhtml).
    With T-SQL you can retrieve the `query_id` and `plan_id`. With those in hand,
    forcing the plan is quite simple:


    ```

    EXEC sys.sp_query_store_force_plan 262,273;

    ```


    Since we’re now doing this programmatically, there is no confirmation necessary.
    Assuming that both ID values are accurate and that the plan chosen is a valid
    plan, the `plan_id`, in this case 273, is forced for the `query_id`, in this case
    262. If either ID is invalid, you’ll get an error.


    Choosing to unforce the plan programmatically is not very difficult either:


    ```

    EXEC sys.sp_query_store_unforce_plan 262,273;

    ```


    Again, there is no confirmation needed when forcing and unforcing programmatically
    through T-SQL.'
