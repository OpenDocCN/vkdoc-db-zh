    | --- | --- | --- |

    | desired_state | smallint | Shows the desired state of Query Store. These are
    the only values that can be set by the user. Valid values are as follows:0 = OFF1
    = READ_ONLY2 = READ_WRITE |

    | desired_state_desc | nvarchar(60) | Gives you a description of the desired state
    of Query Store. Valid values are as follows:OFFREAD_ONLYREAD_WRITE |

    | actual_state | smallint | Shows the actual state of Query Store. Note the additional
    value of ERROR that was not available in the desired state. Valid values are as
    follows:0 = OFF1 = READ_ONLY2 = READ_WRITE3 = ERROR |

    | actual_state_desc | nvarchar(60) | Gives you a description of the actual state
    of Query Store. Valid values are as follows:OFFREAD_ONLYREAD_WRITEERROR |

    | Column name | Data type | Description |

    | readonly_reason | int | When the database is in READ_ONLY mode, but the desired
    state is READ_WRITE, a bitmap is stored in the column to indicate the reason why.
    Valid values are as follows:1 – the database has been placed in the read-only
    mode2 – the database has been placed in the single-user mode4 – the database has
    been placed in the emergency mode8 – the database is a secondary replica. This
    applies for Availability Groups and Azure SQL Database geo-replicated databases
    because essentially all secondary replicas are read-only copies of the databases65536 –
    the max size limit specified in `MAX_STORAGE_SIZE_MB` has been reached46410 –
    in Azure SQL Database, there is a limit as to how many queries can be stored in
    internal memory, so this indicates you have reached that limit. You may upgrade
    to a higher service tier to get a higher limit or remove queries you no longer
    need from Query Store used in stored procedure `sys.sp_query_store_remove_query`262144 –
    In Azure SQL Database there is the potential to reach a limit to the amount of
    data that will be held in memory before it persists to disk. During that time
    Query Store will be temporarily put in `READ_ONLY` mode524288 – in Azure SQL Database,
    the database has run out of spaceTo fix any of these conditions, please refer
    to Chapter [3](#473933_1_En_3_Chapter.xhtml) on Configuring Query Store |

    | current_storage_size_mb | bigint | Tells you the current size of Query Store
    is used in MBs |

    | flush_interval_seconds | bigint | Tells you how often Query Store is persisting
    data to disk. The default is 900 seconds (15 minutes) |

    | interval_length_minutes | bigint | Tells Query Store what intervals to roll
    up the statistics into. The following are valid values: 1, 5, 10, 15, 30, 60,
    and 1440 minutes. The default value is 60 minutes |

    | max_storage_size_mb | bigint | Tells Query Store the maximum amount of disk
    space that it can use |

    | stale_query_threshold_days | bigint | The number of days a query stays in Query
    Store. The default value is 30 days. If you set the value to 0, it will disable
    the retention policy. For Azure SQL Database Basic Edition, the default value
    is 7 days |

    | max_plans_per_query | bigint | The maximum number of plans Query Store will
    keep for each query. Once the maximum number is reached, Query Store no longer
    captures plans for that query. If you set the value to 0, it will have no limitationApplies
    to SQL Server 2017 and up |

    | query_capture_mode | smallint | The capture mode for Query Store. Valid values
    are as follows:1 = ALL – captures all queries. (Default for SQL Server 2016 and
    up)2 = AUTO – captures queries based on the usage patterns. (Default for Azure
    SQL Database)3 = NONE – tells Query Store to stop capturing new queries. Query
    Store however continues to collect statistics for queries already in Query Store4
    = CUSTOM – tells Query Store to use custom configurations options to determine
    what queries to store (applies to SQL Server 2019 only) |

    | Column name | Data type | Description |

    | query_capture_mode_desc | nvarchar(60) | Description of the capture mode of
    Query Store. Valid values are as follows:ALLAUTOCUSTOM (applies to SQL Server
    2019 only)NONE |

    | capture_policy_execution_count | int | Number of times a query executes while
    query capture mode is CUSTOM before it is captured (applies to SQL Server 2019
    only) |

    | capture_policy_total_compile_cpu_time_ms | bigint | Total CPU compile time in
    ms before is captured while query capture mode is CUSTOM (applies to SQL Server
    2019 only) |

    | capture_policy_total_execution_cpu_time_ms | bigint | Total CPU execution time
    in ms before is captured while query capture mode is CUSTOM (applies to SQL Server
    2019 only) |

    | capture_policy_state_threshold_hours | int | The amount of time queries will
    collect data while query capture mode is CUSTOM to determine if the query stats
    should be captured (applies to SQL Server 2019 only) |

    | size_based_cleanup_mode | smallint | Tells Query Store rather or not to clean
    up Query Store when it gets close to the maximum size. Valid values are as follows:0
    = OFF – do not clean up automatically1 = AUTO – clean up automatically when 90%
    of the maximum size is reached. This is the default value. The least expensive
    and oldest queries are removed first until it reaches about 80% free space |

    | size_based_cleanup_mode_desc | nvarchar(60) | Description of size-based cleanup.
    Valid values are as follows:OFFAUTO |

    | wait_stats_capture_mode | smallint | Tells Query Store to capture wait statistics
    or not. Valid values are as follows:0 = OFF1 = ONApplies to SQL Server 2017 and
    up |

    | wait_stats_capture_mode_desc | nvarchar(60) | Description of rather wait statistics
    are captured or not. Valid values are as follows:OFFON (default)Applies to SQL
    Server 2017 and up |

    | actual_state_additional_info | nvarchar(8000) | Additional information on how
    Query Store ended up in the current state. Usually populated when in the state
    is not in the expected state |'
