    JOIN sys.query_store_query_text AS qsqt

    ON qsqt.query_text_id = qsq.query_text_id;

    ```


    这些建议仅仅是建议。尽管 SQL Server 非常擅长基于查询存储捕获的行为生成这些建议，但在您启用自动调优之前，您可以根据需要手动在系统中使用这些建议。您需要了解
    `sys.dm_db_tuning_recommendations` 的一点是，其中的信息不会持久化。在故障转移、重启或其他类型的停机中，这些数据将被重置。任何通过自动调优强制执行的计划将保持强制状态。但是，您将丢失有关该计划被强制执行的原因的历史记录。您可能需要定期将此信息捕获到其他位置以防万一。


    ## 启用自动调优


    根据您使用的是 SQL Server 2019 还是 Azure SQL Database，启用自动调优的方式有所不同。如果您使用的是 SQL Server
    2017 或更高版本，可以使用 T-SQL 来启用。如果您使用的是 Azure SQL Database，可以使用 T-SQL 或 Azure 门户。两者的
    T-SQL 是相同的，您用来查看信息的所有其他查询也是相同的。我们将从 Azure 开始，以便您了解其外观。


    ### 在 Azure SQL Database 中启用自动调优


    在我们继续之前，请注意 Azure 更新得非常频繁。您在阅读本书后看到的 GUI 可能与此处显示的不同。但流程应该基本保持不变。


    在门户中连接到数据库，然后滚动到页面底部，您应该会看到类似于图 8-5 的内容：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig5_HTML.jpg](img/473933_1_En_8_Fig5_HTML.jpg)


    图 8-5


    Azure 门户中的自动调优，当前未配置


    如果您尚未启用自动调优，如您所见，它将在门户中显示为“未配置”。您可以单击此选项，它将打开一个新的边栏选项卡，如图 8-6 所示：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig6_HTML.jpg](img/473933_1_En_8_Fig6_HTML.jpg)


    图 8-6


    Azure 门户中数据库的自动调优设置


    边栏选项卡上所有内容都解释得相当清楚。您可以从包含数据库的服务器继承设置、从 Azure 默认值继承，或者将设置更改为不从任何地方继承。您可以看到一个警告，表明虽然我们当前从服务器继承，但服务器本身尚未配置。我们可以更改那里的设置，但为了我们的目的，我们将在此处进行更改。您可以在屏幕底部看到，除了强制执行计划外，您还可以让
    Azure SQL Database 创建或删除索引。索引功能与查询存储没有直接关系，因此我们在此不作介绍。要启用强制执行最后一个已知的良好计划，我们只需单击“开”，如图
    8-7 所示：


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig7_HTML.jpg](img/473933_1_En_8_Fig7_HTML.jpg)


    图 8-7


    在 Azure SQL Database 中启用自动调优


    要完成此过程，您将单击页面顶部的“应用”按钮。系统会提示您确认这确实是您想要执行的操作。单击“确定”后，自动调优即在您的数据库上启用。无需其他操作。


    ### 使用 T-SQL 启用自动调优


    在我撰写本文时，Management Studio 中没有用于启用自动查询调优的图形界面。相反，您必须使用 T-SQL 命令。您也可以在 Azure SQL
    Database 或 Azure 托管实例中使用相同的命令。命令如下：


    ```sql

    ALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = ON);

    ```


    当然，您可以将我在此处使用的 `current` 默认值替换为适当的数据库名称。此命令一次只能在一个数据库上运行。如果您希望为实例上的所有数据库启用自动调优，您要么必须在创建其他数据库之前在
    model 数据库中启用它，要么需要为服务器上的每个数据库将其设置为开。


    目前 `automatic_tuning` 的唯一选项就是像我们这样启用强制执行最后一个良好计划。您可以使用以下命令禁用此功能：


    ```sql

    ALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = OFF);

    ```


    就这么简单。无需其他操作，这不需要重启或对服务器本身进行更改。

