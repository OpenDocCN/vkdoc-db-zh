    ## 引言


    本书介绍的是内置于 SQL Server 2019 中的 **查询存储** 功能，以及它如何帮助你识别数据库中性能不佳的查询并加以修复。自 SQL Server
    2016 起，查询存储功能就已包含在 SQL Server 中，并在后续的每个新版本中逐步增加功能，使其在捕获的信息内容和方式上都变得更为出色。本书面向的是希望了解查询存储工作原理、最佳实施方法以及如何有效利用其解决问题的
    SQL Server 数据库管理员（DBA）。查询存储以汇总形式向你展示数据库中曾经运行和当前正在运行的内容。


    第 1 章介绍了在没有查询存储的情况下如何进行故障排除和收集统计数据，从而使你理解为什么查询存储是 SQL Server 的一个重要新特性。第 2 章概述了查询存储的工作原理，并深入探讨了其架构细节，涵盖了数据的捕获方式和存储位置。第
    3 章介绍了如何配置查询存储以及包括跟踪标志在内的最佳配置实践。第 4 章介绍了 SQL Server Management Studio 中为查询存储提供的六份报告，以及如何利用它们获取所需信息。第
    5 章深入阐述了查询存储目录视图中有哪些可用数据。


    第 6 章涵盖了查询存储的不同用例，包括用它来展示数据库的正常性能表现、对查询性能和性能回退的查询进行故障排除、为数据库建立基线，以及测试升级到不同版本的
    SQL Server。第 7 章开始展示查询存储的真正威力，说明如何识别性能不佳的查询以及强制执行计划以稳定性能涉及哪些因素。第 8 章展示了我们最强大的功能——**自动计划回退纠正**，即查询存储自动为你强制执行计划。该章还介绍了将等待统计信息捕获到类别中的功能。第
    9 章向你展示了排除查询存储本身问题、等待统计信息和扩展事件的技术。第 10 章向你介绍了两个社区工具 dbatools 和 sp_blitzQueryStore，它们有助于配置查询存储和从其中提取数据。


    ### 关于作者与关于技术审校者


    ### 关于作者


    ### 关于技术审校者


    # 1. 什么是查询存储？


    当在 SQL Server 数据库上启用**查询存储**功能时，它会保存针对该数据库运行的工作负载的查询和统计信息的汇总聚合数据。这些数据可用于帮助你建立性能基线、对性能问题进行故障排除，以及稳定数据库性能。在本章中，我们将回顾在查询存储功能发布之前所使用的技术，包括
    Profiler/服务器端跟踪、扩展事件、DMV（动态管理视图）、计划指南和 `sp_whoisactive`。然后，我们将了解查询存储如何以及为何成为完成这些活动的变革者。


    查询存储就像是你 SQL Server 的飞行记录仪。它在内存中存储持续时间、读取次数、写入次数、CPU 使用率等统计数据以及查询计划，然后根据启用查询存储时设置的配置（默认为
    1 小时）对这些信息进行聚合。在指定的时间段（默认是 15 分钟）后，这些数据会被持久化到磁盘上的目录视图中，供你通过查询或 SQL Server Management
    Studio (SSMS) 的内置报告进行查看。随着 SQL Server 2017 的发布，我们还能利用自动计划修正和等待统计信息聚合的强大功能——更多内容将在第
    8 章介绍。


    这正是查询存储真正威力的体现。在此之前，这些数据只有通过各种其他方法捕获才能获得，而这些方法被证明要慢得多且使用起来非常繁琐。为了更好地理解查询存储在底层的工作原理，我们将探讨这些其他方法：


    1.  查询存储的实用性

    2.  不使用查询存储技术的故障排除

    3.  查询存储：变革者


    ## 查询存储的实用性


    查询存储可以通过多种方式帮助你管理数据库。在本节中，我们将讨论如何利用它来帮助你建立数据库基线、对性能问题进行故障排除以及稳定性能。


    ### 建立性能基线


    任何数据库专业人员工作的一个关键部分是能够为其数据库服务器建立性能基线，而这并非易事。在本章的这部分内容中，我们将讨论为何要以及如何为你的数据库服务器建立基线，及其与查询存储的关系。查询存储能够捕获所有针对你的数据库执行过的查询并记录运行时统计信息，这使得收集所需的基线信息变得更加容易。

