    ## 性能回退查询报告


    我们首先要查看的是**性能回退查询报告**。此报告显示了在指定时间段内，哪些查询的性能开始下降。您可以在这些报告中执行多项导航操作，但首先让我们看一下图 4-2
    中的这份报告。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig2_HTML.jpg](img/473933_1_En_4_Fig2_HTML.jpg)

    图 4-2


    性能回退查询报告


    左侧的每个柱条代表一个不同的查询，它可能是一个`存储过程`、`触发器`、`用户定义函数`的一部分，也可能是该时间段内执行的`即席查询`。报告的默认时间段是最近一小时。如果您点击任意柱条，底部的`查询计划`将切换显示该查询的`估计计划`。如果您将鼠标悬停在任意柱条上，它将显示该柱条所代表的每个查询的统计数据，如图
