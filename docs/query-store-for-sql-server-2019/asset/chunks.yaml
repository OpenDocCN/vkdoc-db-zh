  trans: '

    ## 总体资源消耗报告


    **总体资源消耗报告**默认显示数据库在过去一个月内消耗的资源。该报告默认以总量显示四类性能指标：持续时间（毫秒）、执行次数、CPU 时间（毫秒）以及逻辑读取（千字节）。下图
    4-8 展示了一个报告示例：


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig8_HTML.jpg](img/473933_1_En_4_Fig8_HTML.jpg)

    *图 4-8：总体资源消耗报告*


    如果您双击图表中显示的任何柱条，将自动打开我们接下来要讨论的下一份报告，即**资源消耗最高的查询**报告。如果您将鼠标悬停在任何柱条上，您将看到该柱条对应时间段的统计信息列表，如图
    4-9 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig9_HTML.jpg](img/473933_1_En_4_Fig9_HTML.jpg)

    *图 4-9：总体资源消耗报告悬停统计信息*


    在屏幕的右上角，您有四个按钮可用于控制报告。您可以在图 4-10 中查看这些按钮的特写图片：


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig10_HTML.jpg](img/473933_1_En_4_Fig10_HTML.jpg)

    *图 4-10：总体资源消耗报告按钮*


    `刷新`按钮允许您刷新屏幕上的报告。`标准网格`按钮允许您以网格视图查看数据；有关示例，请参见图 4-11、4-12 和 4-13。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig13_HTML.jpg](img/473933_1_En_4_Fig13_HTML.jpg)

    *图 4-13：总体资源消耗报告标准网格视图*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig12_HTML.jpg](img/473933_1_En_4_Fig12_HTML.jpg)

    *图 4-12：总体资源消耗报告标准网格视图*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig11_HTML.jpg](img/473933_1_En_4_Fig11_HTML.jpg)

    *图 4-11：总体资源消耗报告标准网格视图*


    `标准网格`视图包含的列比带有图表的标准视图要多得多。您可以单击任何列的列标题，它会对列进行排序，并显示一个箭头指示数据排序的方式。默认情况下，它按`间隔开始日期和时间`排序。


    `图表`按钮允许您在处于`标准网格视图`时切换回`图表视图`。


    最后，`配置`按钮允许您控制`图表视图`上的项目以及`标准视图`或`图表视图`中显示的`时间间隔`。图 4-14 显示了`配置`按钮下可用的选项。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig14_HTML.jpg](img/473933_1_En_4_Fig14_HTML.jpg)

    *图 4-14：总体资源消耗报告的配置按钮选项*


    在屏幕的上半部分，如 `SSMS` 中的图 4-14 所示，向您展示了可在`图表视图`中显示的所有可用指标。您也可以使用它从视图中删除任何项目。


    图 4-14 中屏幕的下半部分同时适用于`图表视图`和`标准网格视图`。您可以将`时间间隔`从默认的“上个月”更改为图 4-15 中所示的值，以查看不同的时间段。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig15_HTML.jpg](img/473933_1_En_4_Fig15_HTML.jpg)

    *图 4-15：总体资源消耗报告的配置时间间隔下拉菜单*


    当您从下拉框中选择`自定义`时，`起始`和`结束`框将不再灰显，您可以通过键入或从日历中选择来编辑日期。接下来，有一个`聚合大小`下拉框，您可以在其中指定用于查看的数据聚合间隔。下拉框中的值如图
    4-16 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig16_HTML.jpg](img/473933_1_En_4_Fig16_HTML.jpg)

    *图 4-16：聚合大小下拉菜单*


    最后，您可以选择数据是按您的`本地时区`时间显示，还是按 `UTC` 时区显示。


    ### 提示

    这是验证您的系统是否达到您所建立的预期基线，以及查看服务器上是否发生异常情况的最佳报告。

    '
- fmt: '## Top Resource Consuming Queries Report


    默认情况下，“Top Resource Consuming Queries Report”报告显示过去一小时内总持续时间排名前25的查询。在图[4-17](#473933_1_En_4_Chapter.xhtml#Fig17)中，你可以看到此报告的示例。与我们讨论过的其他报告一样，报告顶部有许多可查看的选项。

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig17_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig17_HTML.jpg)

    图 4-17 Top Consuming Resources report


    在右上角，我们有三个按钮来控制整体报告，如图[4-18](#473933_1_En_4_Chapter.xhtml#Fig18)所示。`Portrait View`按钮会将三个独立窗格堆叠在一起，而不是将两个窗格并排放在顶部，一个放在底部。`Configure`按钮的功能与我们在上一个报告中看到的相同；请参阅图[4-14](#473933_1_En_4_Chapter.xhtml#Fig14)。

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig18_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig18_HTML.jpg)

    图 4-18 Top Consuming Resources report buttons


    当我们查看图[4-19](#473933_1_En_4_Chapter.xhtml#Fig19)时，可以看到以下按钮，用于控制屏幕的左上角。

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig19_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig19_HTML.jpg)

    图 4-19 Top Consuming Resource report option bar


    首先，有一个下拉菜单，用于选择你想查看前25个查询的度量标准：

    * `Execution count`

    * `Duration (ms)`（默认）

    * `CPU time (ms)`

    * `Logical reads (KB)`

    * `Logical writes (KB)`

    * `Physical reads (KB)`

    * `CLR time (ms)`

    * `DOP`

    * `Memory consumption (KB)`

    * `Row count`

    * `Log memory used (KB)`

    * `Tempdb memory usage (KB)`

    * `Wait time (ms)`


    然后，你可以将统计信息从按总计改为以下值：

    * `Avg`

    * `Max`

    * `Min`

    * `Std dev`

    * `Total`（默认）


    `Refresh`按钮将刷新报告到指定的当前时间段。接下来，有一个按钮可以让你跳转到“Track Queries Report”以查看高亮显示的查询。带有放大镜图标的按钮会获取所选查询的文本，并在新查询窗口中弹出供你查看。`Grid
    View`按钮将为你提供查看每个查询的额外指标。有关`Grid View`样子的示例，请参见图[4-20](#473933_1_En_4_Chapter.xhtml#Fig20)、[4-21](#473933_1_En_4_Chapter.xhtml#Fig21)、[4-22](#473933_1_En_4_Chapter.xhtml#Fig22)和[4-23](#473933_1_En_4_Chapter.xhtml#Fig23)。

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig23_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig23_HTML.jpg)

    图 4-23 Top Consuming Resources additional grid view

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig22_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig22_HTML.jpg)

    图 4-22 Top Consuming Resources additional grid view

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig21_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig21_HTML.jpg)

    图 4-21 Top Consuming Resources additional grid view

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig20_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig20_HTML.jpg)

    图 4-20 Top Consuming Resources additional grid view


    在此视图中，列将根据你选择的统计信息而变化；例如，该图基于总计，但如果你选择`avg`，视图将显示平均值。上图中通常包含的列如下：

    * `Query_id`

    * `Object_id`

    * `Object_name`

    * `Query_sql_text`

    * `Duration`

    * `CPU time`

    * `Logical reads`

    * `Logical writes`

    * `Physical reads`

    * `CLR time`

    * `DOP`

    * `Memory consumption`

    * `Row count`

    * `Log memory used`

    * `Temp db memory used`

    * `Wait time`

    * `Execution count`

    * `Plan count`'
  raw: '## Top Resource Consuming Queries Report


    The Top Resource Consuming Queries Report by default shows the top 25 queries
    summed up by total duration for the last hour. In Figure [4-17](#473933_1_En_4_Chapter.xhtml#Fig17),
    you can see an example of what this report looks like. Like the other reports
    we have discussed, there are many options we can look at the top of the report.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig17_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Top Consuming Resources report


    At the top right-hand corner, we have three buttons that control the overall reports
    as seen in Figure [4-18](#473933_1_En_4_Chapter.xhtml#Fig18). The Portrait View
    button will move the three separate panes stack on top of each other instead of
    having the two panes beside each other at the top and one on the bottom. The Configure
    button does the same as we have seen in the last report; refer to Figure [4-14](#473933_1_En_4_Chapter.xhtml#Fig14).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig18_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Top Consuming Resources report buttons


    When we look at Figure [4-19](#473933_1_En_4_Chapter.xhtml#Fig19), we can see
    the following buttons to allow you to control the top left-hand corner of the
    screen.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig19_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig19_HTML.jpg)


    Figure 4-19


    Top Consuming Resource report option bar


    First, we have the metric we want to see for the top 25 queries by in the drop-down
    listed below :


    *   Execution count


    *   Duration (ms) (default)


    *   CPU time (ms)


    *   Logical reads (KB)


    *   Logical writes (KB)


    *   Physical reads (KB)


    *   CLR time (ms)


    *   DOP


    *   Memory consumption (KB)


    *   Row count


    *   Log memory used (KB)


    *   Tempdb memory usage (KB)


    *   Wait time (ms)


    Then instead of having the statistics by total, you can change the statistics
    to the following values:


    *   Avg


    *   Max


    *   Min


    *   Std dev


    *   Total (default)


    The Refresh button will refresh the report to the current period of time specified.
    Next, you have a button that will let you jump to the Track Queries Report to
    look at the query highlighted. The button with magnifying glass takes the selected
    query’s text and pops it a new query window for you to view. The Grid View button
    will provide you with additional metrics to look for each query. See Figures [4-20](#473933_1_En_4_Chapter.xhtml#Fig20),
    [4-21](#473933_1_En_4_Chapter.xhtml#Fig21), [4-22](#473933_1_En_4_Chapter.xhtml#Fig22),
    and [4-23](#473933_1_En_4_Chapter.xhtml#Fig23) for an example of what the Grid
    View looks like.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig23_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig23_HTML.jpg)


    Figure 4-23


    Top Consuming Resources additional grid view


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig22_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig22_HTML.jpg)


    Figure 4-22


    Top Consuming Resources additional grid view


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig21_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig21_HTML.jpg)


    Figure 4-21


    Top Consuming Resources additional grid view


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig20_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig20_HTML.jpg)


    Figure 4-20


    Top Consuming Resources additional grid view


    Columns will vary in this view based on the statistic you choose to look at; for
    example, the figure is based on totals, but if you pick avg, the view will show
    averages. The columns in general that are included in figures above are as follows
    :


    *   Query_id


    *   Object_id


    *   Object_name


    *   Query_sql_text


    *   Duration


    *   CPU time


    *   Logical reads


    *   Logical writes


    *   Physical reads


    *   CLR time


    *   DOP


    *   Memory consumption


    *   Row count


    *   Log memory used


    *   Temp db memory used


    *   Wait time


    *   Execution count


    *   Plan count'
  trans: '

    ## 资源消耗最大的查询报告


    默认情况下，“资源消耗最大的查询报告”显示过去一小时内总持续时间排名前 25 的查询。在图 4-17 中，你可以看到此报告的示例。与我们讨论过的其他报告一样，报告顶部有许多可供查看的选项。

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig17_HTML.jpg](img/473933_1_En_4_Fig17_HTML.jpg)

    图 4-17 资源消耗最大的报告


    在右上角，我们有三个按钮来控制整个报告，如图 4-18 所示。`纵向视图`按钮会将三个独立窗格堆叠在一起，而不是将两个窗格并排放在顶部，一个放在底部。`配置`按钮的功能与我们在上一个报告中看到的相同；请参阅图
    4-14。

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig18_HTML.jpg](img/473933_1_En_4_Fig18_HTML.jpg)

    图 4-18 资源消耗最大的报告按钮


    当我们查看图 4-19 时，可以看到以下按钮，它们用于控制屏幕的左上角。

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig19_HTML.jpg](img/473933_1_En_4_Fig19_HTML.jpg)

    图 4-19 资源消耗最大的报告选项栏


    首先，有一个下拉菜单，用于选择你想查看前 25 个查询的度量标准：

    * `执行次数`

    * `持续时间 (ms)`（默认）

    * `CPU 时间 (ms)`

    * `逻辑读取 (KB)`

    * `逻辑写入 (KB)`

    * `物理读取 (KB)`

    * `CLR 时间 (ms)`

    * `并行度 (DOP)`

    * `内存消耗 (KB)`

    * `行数`

    * `日志内存使用量 (KB)`

    * `Tempdb 内存使用量 (KB)`

    * `等待时间 (ms)`


    然后，你可以将统计信息从按总计改为以下值：

    * `平均值`

    * `最大值`

    * `最小值`

    * `标准差`

    * `总计`（默认）


    `刷新`按钮将刷新报告到指定的当前时间段。接下来，有一个按钮可以让你跳转到“跟踪查询报告”以查看高亮显示的查询。带有放大镜图标的按钮会获取所选查询的文本，并在新查询窗口中弹出供你查看。`网格视图`按钮将为你提供查看每个查询的额外指标。有关`网格视图`样子的示例，请参见图
    4-20、4-21、4-22 和 4-23。

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig23_HTML.jpg](img/473933_1_En_4_Fig23_HTML.jpg)

    图 4-23 资源消耗最大的报告附加网格视图

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig22_HTML.jpg](img/473933_1_En_4_Fig22_HTML.jpg)

    图 4-22 资源消耗最大的报告附加网格视图

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig21_HTML.jpg](img/473933_1_En_4_Fig21_HTML.jpg)

    图 4-21 资源消耗最大的报告附加网格视图

    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig20_HTML.jpg](img/473933_1_En_4_Fig20_HTML.jpg)

    图 4-20 资源消耗最大的报告附加网格视图


    在此视图中，列将根据你选择的统计信息而变化；例如，该图基于总计，但如果你选择`平均值`，视图将显示平均值。上图中通常包含的列如下：

    * `查询 _id`

    * `对象 _id`

    * `对象名称`

    * `查询 _sql 文本`

    * `持续时间`

    * `CPU 时间`

    * `逻辑读取`

    * `逻辑写入`

    * `物理读取`

    * `CLR 时间`

    * `并行度 (DOP)`

    * `内存消耗`

    * `行数`

    * `日志内存使用量`

    * `Temp db 内存使用量`

    * `等待时间`

    * `执行次数`

    * `计划数`

