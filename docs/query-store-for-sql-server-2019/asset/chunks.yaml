    | runtime_stats_interval_id | bigint | 主键。 |

    | start_time | datetimeoffset | 时间间隔的开始时间。 |

    | end_time | datetimeoffset | 时间间隔的结束时间。 |

    | comment | nvarchar(32) | 始终为 NULL。 |


