  trans: '

    ### 收集查询与计划信息


    当查询提交到 SQL Server 时，它会经历一系列处理过程。这些过程确保查询书写正确、查询引用的数据库对象确实存在，最重要的是，确保查询经过优化以快速运行。图
    2-1 展示了这一过程的概览：


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig1_HTML.jpg](img/473933_1_En_2_Fig1_HTML.jpg)


    图 2-1


    生成执行计划的基本过程


    我们当然从 `T-SQL` 查询开始。只有数据操作语言 (`DML`) 查询才会被 `查询存储` 捕获。这些是用于 `SELECT`、`UPDATE`、`DELETE`
    或 `INSERT` 数据的查询。用于操作数据结构的数据定义语言 (`DDL`) 查询则不会被捕获到 `查询存储` 中。当查询首次到达 SQL Server
    时，它会经过一个名为 `代数化器` 的内部过程。该过程会做很多事情，但我们最关心的两点是：它在 `解析器` 中验证语法是否正确，并通过 `对象绑定` 确保查询中的对象确实存在于数据库中。`代数化器`
    还会收集大量信息，这些信息连同查询一起传递给 `查询优化器`。


    `查询优化器` 是基于您提供的查询以及数据库中的表、索引、统计信息和约束，来确定高效检索或修改数据方式的进程。查询优化过程本身的结果是一个 `执行计划`，该计划会被写入一个称为
    `计划缓存` 的内存空间。


    除了一个我们稍后会讲到的例外情况，`查询存储` 不会以任何方式干扰此过程。`查询存储` 所做的是捕获创建 `执行计划` 的进程的输出。如图 2-2 所示，这张图展示了
    `查询存储` 如何与查询优化过程并行工作：


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig2_HTML.jpg](img/473933_1_En_2_Fig2_HTML.jpg)


    图 2-2


    为查询存储捕获执行计划和查询的过程


    在 `查询优化器` 完成工作并生成 `执行计划` 后，一个异步进程会捕获该查询和 `执行计划` 以供 `查询存储` 使用。它将其输出到内存中的一个临时存储空间。内存中存储的查询信息会定期通过另一个异步进程写入数据库。微软将此描述为以最小延迟发生。其目标是确保
    `查询存储` 的数据收集过程不会干扰 `查询优化器` 的正常处理。


    我之前提到的例外情况是，捕获查询和查询计划的异步进程还会检查是否存在 `计划强制`。我们将在第 7 章详细讨论这一点。`计划强制` 是 `查询存储` 确实会干扰正常优化过程的唯一情况。如果对一个查询设置了
    `计划强制`，那么将使用被强制的计划，而不是 `查询优化器` 生成的计划。该计划也会被写入 `计划缓存`。


    至此，检索查询和查询计划的核心处理就完成了。信息是按单个查询捕获的，而不是按 `存储过程` 或 `批处理`。如果查询是某个对象的一部分，则会连同该对象的 ID
    一起捕获查询信息。我们将在本章名为“查询存储收集的数据”的部分详细介绍具体捕获了哪些内容。


    ### 收集查询运行时信息和等待统计信息


    运行时数据的收集比查询和查询计划数据的收集稍微直接一些。所有关于运行时统计信息和等待统计信息的收集都发生在查询和查询计划已被捕获之后。查询执行，然后 `查询存储`
    进程才发生，如图 2-3 所示：


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig3_HTML.jpg](img/473933_1_En_2_Fig3_HTML.jpg)


    图 2-3


    为查询存储捕获运行时指标的过程


    此数据收集过程与查询和查询计划数据收集过程之间只有一个根本区别。那就是定时异步写入磁盘的方式。数据不是以最小延迟的进程处理，而是在内存中存储和聚合一段时间。默认是
    15 分钟。您可以控制此设置，我们将在第 3 章详细讨论。


    诸如查询运行了多长时间以及执行期间经历的等待等信息被写入内存。这些数据在内存中聚合。当该信息被写入磁盘时，它会根据另一个设置（收集间隔）重新聚合。默认情况下，此间隔为
    60 分钟。这种聚合为您提供的是比较两个不同时间段的能力，以便您可以看到查询的性能是否随时间推移而变化。我们将在“收集的数据”部分更详细地讨论这一点。


    ### 数据收集通用说明


    `查询存储` 与 SQL Server 中的所有其他进程协同工作。因此，例如，如果一个查询正在重新编译，并且它生成的 `执行计划` 与 `查询存储` 中已有的计划相同，则只会更新使用统计信息，不发生其他事情。但是，如果此次重新编译产生了一个新的
    `执行计划`，那么该计划将像旧计划一样被捕获到 `查询存储` 中。


    在使用 `三部分命名` 的 `跨数据库查询` 的情况下，无论检索或修改的数据位于何处，查询都将从发起调用的数据库进行记录。这一点很重要，因此您知道在涉及多个数据库时应在哪里查找
    `查询存储` 信息。您不会在两个数据库中都看到该查询。


    因为 `查询存储` 中的所有数据收集都是异步写入磁盘的，所以如果数据尚未刷新到磁盘，就有可能丢失数据。有一个命令可以手动强制执行此操作，


    ```

    sys.sp_query_store_flush_db

    ```


    执行该命令将强制当前内存中的任何内容立即写入磁盘。这确保了在受控故障转移、关闭或任何可能导致数据从内存中删除的事件发生之前，您可以保留这些数据。

    '
- fmt: '## The Data Collected by Query Store


    As we stated at the beginning of the chapter, there are essentially three sets
    of information that define the data collected by the Query Store: query and plan
    data, runtime data, and wait statistics. As you saw in the previous section, the
    runtime data and the wait statistics are collected the same way, so why break
    them apart? The reason is simple, the focus of the book is SQL Server 2019, but
    Query Store has been implemented since SQL Server 2016. One change between 2016
    and 2017 was the addition of wait statistics in the data collection. So we’re
    breaking that apart just so those who will only see the runtime information still
    get as much out of the book as those who look at both runtime data and wait statistics.
    Plus, you’ll need to plan on querying the wait statistics slightly differently
    than you do the runtime data, but we’ll cover that in detail in Chapter [5](#473933_1_En_5_Chapter.xhtml).


    One point about the system views that expose the Query Store information must
    be made. The information displayed in these system views combines, but does not
    aggregate, the information stored on disk and in memory. As you know from earlier
    in the chapter, data is written first to memory and then eventually written to
    disk. During that interval, the runtime data will be aggregated in both places,
    but visible as separate rows in some of the catalog views. There’s nothing you
    need to do to combine this data. SQL Server does it for you. However, there’s
    also nothing you can do to separate this data. It’s combined at the system level.


    Let’s start with the data collected about the query and the query plan itself.


    ### Query and Query Plan Information


    As we’ve already stated previously, the foundation for the information gathered
    by Query Store is the query itself. You may pass a batch with five or ten statements,
    but each of those statements, assuming they’re all data manipulation statements,
    will be individual queries in the Query Store. The catalog views that expose the
    information available in Query Store are visible in Figure [2-4](#473933_1_En_2_Chapter.xhtml#Fig4):


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig4_HTML.png](images/473933_1_En_2_Chapter/473933_1_En_2_Fig4_HTML.png)


    Figure 2-4: Catalog views containing query and query plan information


    There are only four catalog views that expose the information stored on the query
    and the query plan. At the top and center, you can see `sys.query_store_query`.
    In the diagram only a few of the 30 columns are shown as examples of what information
    is available. Each query has attributes that may or may not be unique to the query.
    These attributes are the tables to the left and right of `sys.query_store_query`:
    `sys.query_store_context_settings` and `sys.query_store_query_text`. These attributes
    can be created once and then reused by multiple queries. This includes the query
    text. If other attributes change, but the query text remains the same, then more
    than one query in `sys.query_store_query` may have the same `query_text_id` value
    (`query_id` is the primary key). The query plans stored in `sys.query_store_plan`
    are tied directly to the query via a foreign key on `query_id`. Any given query
    may have multiple plans. Situations arise like parameter sniffing and others that
    result in a given query with more than one valid execution plan. The table shown
    in Figure [2-4](#473933_1_En_2_Chapter.xhtml#Fig4) for `sys.query_store_plan`
    also only contains a sampling of the 23 columns available.


    We’ll be covering querying these tables in detail in Chapter [5](#473933_1_En_5_Chapter.xhtml).
    However, it’s worth pointing out that some of the information may be a little
    misleading. If you look at both `sys.query_store_query` and `sys.query_store_plan`
    as shown in Figure [2-4](#473933_1_En_2_Chapter.xhtml#Fig4), both have a column
    labeled `count_compiles`. While these values are labeled the same, they actually
    represent the difference between the results of a compile or recompile event for
    a query or for a plan. Every time a query gets compiled or recompiled, that value
    will be updated appropriately. However, that compile event may, or may not, result
    in the same plan. If a different plan gets compiled, then that plan gets its own
    distinct `count_compiles` value updated, not every plan associated with the query.
    Details like this we’ll be addressing throughout the book.


    The rows of data stored in `sys.query_store_plan` actually act as the drivers
    for the runtime data collected. Let’s now take a look at that information.


    ### Runtime Information


    The runtime data actually gets aggregated based on two different values, the `plan_id`
    as mentioned in the previous section and the runtime interval that we talked about
    earlier (that has a default of 60 minutes). Figure [2-5](#473933_1_En_2_Chapter.xhtml#Fig5)
    represents the information captured:


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig5_HTML.png](images/473933_1_En_2_Chapter/473933_1_En_2_Fig5_HTML.png)


    Figure 2-5: Catalog views containing runtime information


    The model may look quite a bit more simplified, but it masks a few complexities
    that are worth noting. First up, the `sys.query_store_runtime_stats` catalog view
    shows only a small part of the 58 columns that make up the view. A lot of that
    data is laid out similar to what you see with the duration values: an average,
    a minimum, a maximum, and a standard deviation. That holds true for such interesting
    data as the CPU time, row count, memory, and more.


    The next most important thing to keep in mind when dealing with the runtime data
    is that it is broken up into multiple aggregations as determined by the runtime
    interval. Since you’re unlikely to turn Query Store on at the top of the hour,
    the `sys.query_store_runtime_stats_interval` system view will have the `start_time`
    and `end_time` of each interval. While these will be the appropriate amount of
    time apart, 60 minutes by default, the start and stop times are not going to coincide
    with the clock.


    Another thing to remember is that there are multiple time values to take into
    account with this information. In addition to the runtime interval, there is also
    the time to flush to disk, with a default of 15 minutes. That means that for any
    given `plan_id`, there may be data on disk across multiple time intervals as well
    as data in memory.


    Further, the `execution_type` can affect the information collected. This column
    has three values:


    *   0 – Successful execution

    *   3 – User aborted execution

    *   4 – An exception or error causing aborted execution


    In the case of a query being aborted for any reason, the runtime data is still
    collected. However, it’s aggregated into a separate value for the given `plan_id`
    and for the given `runtime_stats_interval_id`. Because of this and the fact that
    there can be more than one row of runtime data between memory and disk, when you
    start writing your own queries against this data, you need to aggregate based
    on the `plan_id`, the `execution_type`, and the `runtime_stats_interval_id`.'
