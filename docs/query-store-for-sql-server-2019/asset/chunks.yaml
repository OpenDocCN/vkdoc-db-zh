  raw: '## sys.query_store_runtime_stats


    The `sys.query_store_runtime_stats` catalog view contains the runtime stats for
    all the plans that Query Store has store aggregated by the `runtime_stats_interval_id`.
    Statistics it collects include average, last, minimum, maximum, and standard deviation
    for the duration, CPU, logical IO, physical IO, CLR, DOP (degree of parallelism),
    query max used memory, row count, and for Azure SQL Database log bytes used. Besides
    the wait statistics catalog view, this catalog view is where you harvest the most
    data. Listing [5-8](#473933_1_En_5_Chapter.xhtml#PC8) will return the top 10 queries
    by average duration that have a last_execution_time in the last hour.


    ```

    SELECT TOP 10 sum(rs.count_executions * rs.avg_duration) avg_duration,

    qt.query_sql_text,

    q.query_id,

    qt.query_text_id,

    p.plan_id,

    rs.last_execution_time

    FROM sys.query_store_query_text AS qt

    INNER JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    INNER JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    INNER JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    WHERE rs.last_execution_time > DATEADD(hour, -1, GETUTCDATE())

    GROUP BY qt.query_sql_text,

    q.query_id,

    qt.query_text_id,

    p.plan_id,

    rs.last_execution_time

    ORDER BY avg_duration DESC;

    Listing 5-8

    Top 10 queries by CPU in the last hour

    ```


    Table [5-8](#473933_1_En_5_Chapter.xhtml#Tab8) shows all the column names, data
    types, and descriptions for the columns in the `sys.query_store_runtime_stats`
    catalog view.


    Table 5-9


    Column listing and descriptions for sys.query_runtime_stats_interval


    | Column name | Data type | Description |

    | --- | --- | --- |

    | runtime_stats_interval_id | bigint | Primary key. |

    | start_time | datetimeoffset | Start time of the interval. |

    | end_time | datetimeoffset | End time of the interval. |

    | comment | nvarchar(32) | Always NULL. |


    Table 5-8


    Column listing and descriptions for sys.query_store_runtime_stats'
  trans: '## sys.query_store_runtime_stats


    `sys.query_store_runtime_stats` 目录视图包含 Query Store 已存储的所有计划的运行时统计信息，并按 `runtime_stats_interval_id`
    聚合。它收集的统计数据包括持续时间、CPU、逻辑 IO、物理 IO、CLR、DOP（并行度）、查询最大使用内存、行数的平均值、最后值、最小值、最大值和标准差，对于
    Azure SQL Database 还包括日志字节数。除了等待统计信息目录视图外，这个目录视图是获取最多数据的地方。列表 5-8 将返回过去一小时内最后执行时间在过去一小时内按平均持续时间排名前
    10 的查询。


    ```sql

    SELECT TOP 10 sum(rs.count_executions * rs.avg_duration) avg_duration,

    qt.query_sql_text,

    q.query_id,

    qt.query_text_id,

    p.plan_id,

    rs.last_execution_time

    FROM sys.query_store_query_text AS qt

    INNER JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    INNER JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    INNER JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    WHERE rs.last_execution_time > DATEADD(hour, -1, GETUTCDATE())

    GROUP BY qt.query_sql_text,

    q.query_id,

    qt.query_text_id,

    p.plan_id,

    rs.last_execution_time

    ORDER BY avg_duration DESC;

    ```

    列表 5-8

    过去一小时内按平均持续时间排名前 10 的查询


    表 5-9 显示了 `sys.query_store_runtime_stats` 目录视图中所有列的名称、数据类型和描述。


