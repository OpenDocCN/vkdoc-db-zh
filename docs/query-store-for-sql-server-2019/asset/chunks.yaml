    Query Store reports we discussed in Chapter [4](#473933_1_En_4_Chapter.xhtml).


    ## sys.database_query_store_options


    The catalog view that holds the options that tell you the settings for the setup
    of Query Store is `sys.database_query_store_options`. This catalog view returns
    all the options available that are set for the configuration of Query Store. This
    catalog view has no relationships with any of the other catalog views. Sometimes
