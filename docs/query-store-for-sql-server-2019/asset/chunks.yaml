  trans: '## 高变化率查询报告


    “高变化率查询”报告可以指示存在参数化问题的查询。参数化发生在查询使用一个值执行时被参数化，然后使用不同的值再次执行，但由于数据分布，执行不同的计划可能更合适。例如，如果你要执行一个查询，查找蒙大拿州（MO）的所有居民，它会根据一个小数据集的统计信息生成一个搜索计划，而如果你搜索加利福尼亚州（CA）的所有居民，则会不同。高变化率查询报告的示例如图
    4-36 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig36_HTML.jpg](img/473933_1_En_4_Fig36_HTML.jpg)


    *图 4-36 高变化率报告*


    该报告与“资源消耗最高查询报告”有少许不同：在 `统计信息` 下拉菜单下，你只有两个选项：`变化率` 和 `标准偏差`，并且没有 `配置` 按钮。当你将鼠标悬停在柱状图上时，获得的信息更有限，因为它只显示你所选指标的
    `变化率` 和 `标准偏差`，如图 4-37 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig37_HTML.jpg](img/473933_1_En_4_Fig37_HTML.jpg)


    *图 4-37 高变化率查询摘要信息*


    你可以在左侧窗格中选择用于显示值的统计信息；选项如图 4-38 和 4-39 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig39_HTML.jpg](img/473933_1_En_4_Fig39_HTML.jpg)


    *图 4-39 高变化率查询 X 轴选项*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig38_HTML.jpg](img/473933_1_En_4_Fig38_HTML.jpg)


    *图 4-38 高变化率查询 Y 轴选项*


    当你将鼠标悬停在数据点上时，会根据为查询计划选择的指标接收信息，如图 4-40 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig40_HTML.jpg](img/473933_1_En_4_Fig40_HTML.jpg)


    *图 4-40 高变化率查询计划摘要信息*


    你还可以通过在左侧选择选项来控制右侧窗格的 Y 轴，如图 4-41 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig41_HTML.jpg](img/473933_1_En_4_Fig41_HTML.jpg)


    *图 4-41 高变化率报告计划摘要 Y 轴选项*


    ## 查询等待统计信息报告


    添加到 `SSMS` 的最新报告是查询等待统计信息报告。当你最初打开该报告时，会看到一个按类别显示总等待时间的报告。查询存储将所有等待统计信息分组为 23
    个类别，例如 `CPU`、`内存`、`缓冲区 IO` 等。等待统计信息是排查 `SQL Server` 性能问题的一种久经考验且可靠的方法，也是 `SQL
    Server 2017` 中查询存储的新增实用功能。每个等待统计信息类别在第 9 章中有详细说明。该报告的示例如图 4-42 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig42_HTML.jpg](img/473933_1_En_4_Fig42_HTML.jpg)


    *图 4-42 查询等待统计信息报告类别*


    该报告默认像所有其他报告一样按总计显示等待统计信息，但你可以在顶部和左侧选择更改选项，如图 4-43 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig43_HTML.jpg](img/473933_1_En_4_Fig43_HTML.jpg)


    *图 4-43 查询等待统计信息报告类别报告选项*


    在图表视图的底部，你还可以将图表的 X 轴更改为下拉菜单中的选项之一，如图 4-44 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig44_HTML.jpg](img/473933_1_En_4_Fig44_HTML.jpg)


    *图 4-44 查询等待统计信息报告类别 X 轴选项*


    在屏幕顶部，有三个熟悉的按钮。第一个是 `刷新` 按钮，第二个是 `标准网格` 按钮（其外观如图 4-45 和 4-46 所示），最后一个是切换回图表视图的按钮。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig46_HTML.jpg](img/473933_1_En_4_Fig46_HTML.jpg)


    *图 4-46 查询等待统计信息报告类别网格视图*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig45_HTML.jpg](img/473933_1_En_4_Fig45_HTML.jpg)


    *图 4-45 查询等待统计信息报告类别网格视图*


    一旦你点击图表中显示的某个类别柱状图，就会显示一个向下钻取的报告，其中包含该类别资源消耗最高的前五个查询，如图 4-47 所示。这使你能够基于等待统计信息所显示的瓶颈位置来排查查询。如果你看到较高的
    `CPU` 等待出现在报告首位，那么你可以向下钻取，查看消耗 `CPU` 最多的前五个查询，然后对这些查询进行调优，或者查看是否可以强制使用一个资源消耗更少的执行计划。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig47_HTML.jpg](img/473933_1_En_4_Fig47_HTML.jpg)


    *图 4-47 查询等待统计信息按类别排名前五的报告*


    顶部的下拉菜单提供了一些统计信息，可用于控制哪些前五个查询显示在报告中，如图 4-48 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig48_HTML.jpg](img/473933_1_En_4_Fig48_HTML.jpg)


    *图 4-48 查询等待统计信息前五个查询统计信息*


    其右侧是一组按钮，除了绿色箭头外，其他的现在我们应该都很熟悉了。绿色箭头将我们带回我们向下钻取自的查询等待统计信息类别报告。


    与其他图表视图一样，你可以更改显示的 Y 轴和 X 轴属性；此屏幕上可用的选项参见图 4-49 和 4-50。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig50_HTML.jpg](img/473933_1_En_4_Fig50_HTML.jpg)


    *图 4-50 查询等待统计信息按类别前五 X 轴选项*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig49_HTML.jpg](img/473933_1_En_4_Fig49_HTML.jpg)


    *图 4-49 查询等待统计信息前五类别 Y 轴选项*


    在右侧窗格中，有常见的虚线图，表示不同时间段内的不同执行计划。顶部的按钮与“资源消耗最高查询报告”（见图 4-13）中的相同。你还可以将 Y 轴从默认的总计更改为下拉菜单中的不同统计信息，如图
    4-51 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig51_HTML.jpg](img/473933_1_En_4_Fig51_HTML.jpg)


    *图 4-51 查询等待统计信息按类别前五计划 Y 轴选项*'
- fmt: '## Tracked Queries Report


    The Tracked Queries Report is used to show runtime statistics for a particular
    query you are tracking and see all the execution plans for that query. An example
    of a Tracked Queries Report can be seen in Figure [4-52](#473933_1_En_4_Chapter.xhtml#Fig52).
    This is most useful when you have previously identified a query by `Query ID`
    that you want to watch and see how the performance changes over time.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig52_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig52_HTML.jpg)


    Figure 4-52 Tracked Queries Report


    On the top left-hand corner, you have two ways to find queries that you want to
    track. One is to type the `Query ID` in the white box then hit the green arrow
    to load the data. The data by default is for the last day. The other is to click
    the magnifying glass in which it will pop a window where it has loaded all the
    queries that have been stored in `Query Store` as seen in Figure [4-53](#473933_1_En_4_Chapter.xhtml#Fig53).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig53_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig53_HTML.jpg)


    Figure 4-53 Tracked Queries Report magnifying glass view


    From here you can select a query to track then click on OK after which you will
    need to hit the green arrow for it to load the data in the report. Hovering over
    the dots reveals the statistics for the period of time based on the metric you
    have configured to be shown which is the duration by default as seen in Figure
    [4-54](#473933_1_En_4_Chapter.xhtml#Fig54).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig54_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig54_HTML.jpg)


    Figure 4-54 Tracked Queries Report statistics details


    At the top, you have a couple of new buttons we have not seen. The first is the
    `Auto Refresh` button which will as suspected auto refreshes the report every
    5 seconds. The `Auto Refresh` setting is configurable under the `Configure` button.
    There is only one other configurable setting in that screen we have not seen,
    and that is which query to track which can change from there.


    ## Conclusion


    In this chapter we looked at the `Regressed Queries`, `Overall Resource Consumption`,
    `Top Resource Consumption Queries`, `Queries with Forced Plans`, `Queries with
    High Variation`, `Query Wait Statistics`, and `Tracked Queries` reports and how
    they interacted with each other. We explored all the options you had available
    to change what data is reported on the screen and how to configure each report
    to meet your needs. These reports are vital to quickly being able to troubleshoot
    issues with `Query Store` on your SQL Server instance.


    # 5. Query Store Catalog Views


    `Query Store` introduces eight new catalog views to SQL Server where it stores
    all the information you need to query data to troubleshoot SQL Server with `Query
    Store` and check the configuration of `Query Store`. You need `VIEW DATABASE STATE`
    permission to query the catalog views. In this chapter you will find descriptions
    of all the catalog views and their columns then examples of the queries behind
    the standard `Query Store` reports we discussed in Chapter [4](#473933_1_En_4_Chapter.xhtml).


    ## sys.database_query_store_options


    The catalog view that holds the options that tell you the settings for the setup
    of `Query Store` is `sys.database_query_store_options`. This catalog view returns
    all the options available that are set for the configuration of `Query Store`.
    This catalog view has no relationships with any of the other catalog views. Sometimes
    you need to check the configuration of `Query Store` across all your databases
    where `Query Store` is turned on; you can use the query in Listing [5-1](#473933_1_En_5_Chapter.xhtml#PC1)
    to return a result set for each database that has `Query Store` enabled with all
    the settings.


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = '''';

    SELECT @SQL += REPLACE(REPLACE(''

    USE [{{DBName}}];

    SELECT "{{DBName}}",

    *

    FROM sys.database_query_store_options; ''

    ,''{{DBName}}'', [name])

    ,'' " '','''' '''')

    FROM sys.databases

    WHERE is_query_store_on = 1;

    EXEC (@SQL);

    ```

    Listing 5-1 Check Query Store options across all databases on a SQL Server instance


    Table [5-1](#473933_1_En_5_Chapter.xhtml#Tab1) displays all the column names,
    data types, and descriptions for the columns in the `sys.database_query_store_options`
    catalog view. Important columns to keep an eye on are the `actual_state_desc`;
    you want to make sure it stays in `READ_WRITE` if the `desired_state` is `READ_WRITE`
    and did not switch to `READ_ONLY` due to running out of space or `ERROR`. To understand
    these options for these columns better, please refer to Chapter [3](#473933_1_En_3_Chapter.xhtml).


    Table 5-1 Column listing and descriptions for sys.database_query_store options'
