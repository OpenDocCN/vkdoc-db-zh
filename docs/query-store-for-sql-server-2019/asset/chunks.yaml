    4-1 所示：


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig1_HTML.jpg](img/473933_1_En_4_Fig1_HTML.jpg)


    图 4-1 对象资源管理器中查询存储报告视图

