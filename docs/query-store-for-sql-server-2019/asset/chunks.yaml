- fmt: '### Determining Which Plans Have Been Forced


    As you’ve seen in Figure [7-12](#473933_1_En_7_Chapter.xhtml#Fig12), it’s very
    easy to see if a plan has been forced. There is even a report that lists forced
    plans. We’ll go over that report in Chapter [4](#473933_1_En_4_Chapter.xhtml) in
    some detail. The question should be, is there a way to programmatically tell that
    a plan has been forced. The answer to this is, of course, yes. You just have to
    query the Query Store catalog views:


    ```sql

    SELECT qsq.query_id,

    qsp.plan_id,

    qsp.is_forced_plan

    FROM sys.query_store_query AS qsq

    JOIN sys.query_store_plan AS qsp

    ON qsp.query_id = qsq.query_id

    WHERE qsq.query_id = 262;

    ```


    The results of this query look like Figure [7-14](#473933_1_En_7_Chapter.xhtml#Fig14):


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig14_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig14_HTML.jpg)


    *Figure 7-14*

    *Showing which query plan is forced programmatically*


    You can quickly see that the `plan_id` 273 has been forced since it’s `is_forced_plan`
    value is set to 1, while the other plan, 269, is not forced.


    You can also see if a plan is forced by looking at some execution plans. You won’t
    see it on plans where you just capture an estimated plan if the plan is not yet
    in cache. You won’t see it on a plan from the Query Store itself. You will see
    this on pretty much any other plan. What you’re looking for is a little obscure.
    We’ll need to go the properties of the first operator and look for the “Use Plan”
    property value as shown in Figure [7-15](#473933_1_En_7_Chapter.xhtml#Fig15):


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig15_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig15_HTML.jpg)


    *Figure 7-15*

    *The “Use Plan” property in the first operator*


    This is only available as a property in the first operator. It’s not visible in
    the tooltip. You’ll only see this on a plan that has been forced. You won’t even
    see the property on any other plan, so there is no “Use Plan” that will resolve
    to False.


    ### Conclusion


    Query regression is a real problem. The best way to solve it still remains modifying
    the code, structure, or statistics to ensure a more appropriate plan is generated.
    However, when you must, you do have the capability of forcing an execution plan.
    There are plenty of ways to keep an eye on plan forcing, so you can adjust them
    as necessary when the structure or code changes or other changes are made to the
    system that may affect plan generation. As already mentioned, only use this functionality
    when you have to and have a plan for a regular review of the queries that have
    forced plans.


    # 8. Auto Plan Correction and Wait Statistics


    The information captured and stored within Query Store begins to open up new functionality
    for Microsoft and you. First, for Microsoft, having the ability to identify a
    query that has suffered from a regression (as we describe in Chapter [7](#473933_1_En_7_Chapter.xhtml))
    means that they can monitor the system and, using the information in the Query
    Store, automate forcing a plan to fix the regression. This is the Auto Plan Correction
    at work. Second, for us, the addition of wait statistics within the Query Store
    information opens up additional troubleshooting possibilities.


    This chapter explores additional capabilities of Query Store including:


    *   The ability to automatically mark queries with regressions and the new catalog
    views that support this.

    *   The capacity for SQL Server to automatically force, or unforce, a plan based
    on its performance regressing.

    *   The 23 categories of wait statistics that have been added to the Query Store
    information.


    ## Automatic Plan Correction


    The concepts of Automatic Plan Correction are completely built on Query Store.
    Without the information collected by Query Store, the ability of SQL Server and
    Azure SQL Database to determine that a plan has regressed would not be possible.
    Remember that the core of plan regression is built around the idea that the query
    itself has not changed. Changes in code cause changes in behavior all the time.
    It’s when you don’t change the code or the structure of the database and performance
    degrades anyway that you have a regression. Query Store makes identifying regressions
    easier.


    With the regression identified, the basic approach of Automatic Plan Correction
    is simple. The behavior for this query was better under the older plan. SQL Server
    can, when Automatic Plan Correction is enabled, automatically force that older
    plan, the last known good plan. Then, the behavior of the system is observed again
    for a time. If forcing the last good plan didn’t work, then it can be automatically
    unforced. All this occurs behind the scenes with no real input from the user,
    the developer, or the DBA.


    This behavior makes the job of tuning SQL Server easier because instead of attempting
    to fix simple issues that can be readily automated, you have time to address more
    difficult subjects that require more knowledge and understanding. Simply picking
    the last well-behaved plan and applying it is simple tuning, but it can solve
    a large number of issues easily.'
