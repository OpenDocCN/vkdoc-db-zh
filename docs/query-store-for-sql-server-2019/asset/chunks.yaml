  trans: '

    # 顶级资源消耗报告


    ## 常规网格视图与图表视图


    `常规网格视图`按钮显示的列数要少得多，如图 4-24 所示。`常规网格视图`专注于您在图表中正在查看的度量值和统计信息，而不是显示所有度量值。请注意，这两种视图都允许您在不返回`图表视图`的情况下，更改视图内要查看数据的度量值和统计信息。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig24_HTML.jpg](img/473933_1_En_4_Fig24_HTML.jpg)


    *图 4-24 顶级资源消耗常规网格视图*


    `图表视图`按钮可让您在进入任意一个`网格视图`后返回到`图表视图`。


    ## 更改坐标轴选项


    您还可以在窗格的`图表视图`上更改图表 y 轴和 x 轴的显示内容。对于 x 轴，您有图 4-25 所示的选项可用；对于 y 轴，您有图 4-26 所示的选项可用。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig26_HTML.jpg](img/473933_1_En_4_Fig26_HTML.jpg)


    *图 4-26 顶级资源消耗图表视图 y 轴选项*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig25_HTML.jpg](img/473933_1_En_4_Fig25_HTML.jpg)


    *图 4-25 顶级资源消耗图表视图 x 轴选项*


    ## 查询与计划交互


    屏幕右侧显示与每个查询关联的计划及其 ID；当您单击查询时，屏幕的这一侧会随之调整，同时屏幕底部会显示查询计划。


    此外，在第一个窗格中，如果您将鼠标`悬停在`任何查询的条形图上，它会显示有关该查询和您当前所选计划的详细信息，如图 4-27 所示。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig27_HTML.jpg](img/473933_1_En_4_Fig27_HTML.jpg)


    *图 4-27 顶级资源消耗报告查询 ID 数据*


    ## 左侧窗格分组依据选项


    在左侧窗格的左侧，您可以更改数据的分组方式。您可以使用从顶部下拉菜单中选择的任意度量值（`duration`、`CPU`、`logical reads` 等）、`执行次数`和`计划次数`，如图
    4-28 所示。这里最有用的是`计划次数`，因此您可以找到具有多个计划的查询，这将帮助您识别可能可以强制执行计划的查询。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig28_HTML.jpg](img/473933_1_En_4_Fig28_HTML.jpg)


    *图 4-28 顶级资源消耗报告左侧窗格分组依据下拉菜单*


    ## 左侧窗格控件（纵向模式）


    在`纵向模式`下的左侧窗格中，有一系列按钮，用于控制您可以对所选查询显示的计划执行的操作。图 4-29 向您展示了这些按钮，我们将逐一解释每个按钮的功能。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig29_HTML.jpg](img/473933_1_En_4_Fig29_HTML.jpg)


    *图 4-29 顶级资源消耗报告右侧窗格按钮*


    您已经熟悉了`刷新`按钮，因为它只是刷新您所在的当前报告。下一个按钮`强制执行计划`，无论窗格中高亮显示的是哪个计划。下一个按钮会告诉您计划未被强制执行，或者如果之前已被强制执行过，则会`取消强制执行计划`。再下一个按钮允许您`比较两个计划`，方法是在下面的窗格中单击两个点并按住`Ctrl`键。图
    4-30 展示了比较计划的示例外观。计划运算符的差异在计划图中以红色高亮显示。在该图旁边，您会看到如图 4-31 所示的内容，其中更详细地显示了每个操作花费时间的差异。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig30_HTML.jpg](img/473933_1_En_4_Fig30_HTML.jpg)


    *图 4-30 顶级资源消耗报告比较计划运算符差异*


    图 4-31 中看到的差异以黄色高亮显示了不等号。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig31_HTML.jpg](img/473933_1_En_4_Fig31_HTML.jpg)


    *图 4-31 顶级资源消耗报告比较报告详情*


    下一个按钮在`网格视图`中显示计划的数据，如图 4-32 所示。最后一个按钮将窗格恢复为`图表视图`。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig32_HTML.jpg](img/473933_1_En_4_Fig32_HTML.jpg)


    *图 4-32 顶级资源消耗报告计划数据的网格视图*


    ## 右侧窗格交互与图标


    在右侧窗格中，当处于`图表视图`时，您可以将鼠标`悬停在`计划上以获取有关该计划的数据。此窗格中会出现三种类型的图标。一个内部为空的点代表`未强制执行的计划`，一个带有勾选标记的点代表`已强制执行的计划`，一个正方形代表查询`执行失败`。这些指标根据您在报告左上角选择的度量值而变化；例如，如果您选择了`CPU
    时间`，您将看到`CPU`而不是`持续时间`。在图 4-33 中，您可以看到当您在窗格中将鼠标`悬停在`某个图标上时，该图标所代表时间段的统计信息示例。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig33_HTML.jpg](img/473933_1_En_4_Fig33_HTML.jpg)


    *图 4-33 顶级资源消耗报告悬停查看查询计划详情*


    # 强制计划查询报告


    ## 报告概述


    `强制计划查询`报告显示了数据库上已被强制执行的查询计划。此报告可用于回查以确保在强制执行计划后仍能看到相同的性能改进，或者查看数据库上强制执行了哪些计划。示例报告如图
    4-34 所示：


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig34_HTML.jpg](img/473933_1_En_4_Fig34_HTML.jpg)


    *图 4-34 强制计划查询报告*


    ## 报告按钮


    此报告中的配置选项没有那么多，但让我们探索一下可用的按钮。左侧窗格中的三个按钮我们很熟悉；第一个是`刷新`按钮。第二个是`在跟踪查询报告中打开此查询`。最后一个是`在查询编辑器窗口中打开查询文本`。


    右侧窗格最顶部有与`顶级资源消耗查询`报告相同的按钮。一个是将报告置于`横向模式`，这会堆叠窗格。另一个是将其改回默认的`纵向模式`。然后是`配置`按钮，它看起来与图
    4-34 中`顶级资源消耗`报告中的按钮相同。在那下面，您有右侧窗格的`刷新`按钮。有一个按钮用于`强制执行计划`，一个按钮用于`取消强制执行计划`。最后是用于`比较计划`的按钮。


    ## 底部窗格选项


    在底部窗格中，显示了从右上窗格中高亮显示的计划 ID 对应的计划，以及用于`强制执行`或`取消强制执行`所选计划的按钮，如图 4-34 所示。在图表的左侧，您可以更改用于显示点的统计信息，默认为`平均值`；其他选项请参见图
    4-35。


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig35_HTML.jpg](img/473933_1_En_4_Fig35_HTML.jpg)


    *图 4-35 强制计划查询报告 y 轴选项*


    与在`顶级资源消耗查询`报告中一样，您有相同的选项来查看查询计划。

    '
- fmt: '## Queries with High Variation Report


    The Queries with High Variation report can indicate queries with parameterization
    problems. Parameterization occurs with a query that is executed with one value
    and is parameterized with a parameter then executed again with the different value
    and a different plan would be more appropriate due to data distribution. For example,
    if you were to execute a query looking for every living in Montana (MO), it would
    produce a plan searching based on statistics for a small data set than say if
    you search for everyone living in California (CA). An example of Queries with
    High Variation report is shown in Figure [4-36](#473933_1_En_4_Chapter.xhtml#Fig36).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig36_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig36_HTML.jpg)


    *Figure 4-36 High Variation report*


    The few differences in this report with the Top Resource Consuming Queries Report
    are that under the `Statistics` drop-down, you only have two options: `Variation`
    and `Standard Deviation`, and there is no `Configure` button. When you hover over
    the bars, you receive more limited information as it only shows `Variation` and
    `Standard Deviation` for the metric you have selected as seen in Figure [4-37](#473933_1_En_4_Chapter.xhtml#Fig37).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig37_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig37_HTML.jpg)


    *Figure 4-37 Queries with High Variation summary information*


    You have the option on the left-hand pane to change the statistics that are used
    to display values; options can be seen in Figures [4-38](#473933_1_En_4_Chapter.xhtml#Fig38)
    and [4-39](#473933_1_En_4_Chapter.xhtml#Fig39).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig39_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig39_HTML.jpg)


    *Figure 4-39 Queries with High Variation queries x-axis options*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig38_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig38_HTML.jpg)


    *Figure 4-38 Queries with High Variation y-axis options*


    When you hover over the dots, you receive the information based on the metric
    selected for the query plan as seen in Figure [4-40](#473933_1_En_4_Chapter.xhtml#Fig40).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig40_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig40_HTML.jpg)


    *Figure 4-40 Queries with High Variation plan summary information*


    You can also control the y-axis of the right-hand pane by selecting one of the
    options on the left-hand side as seen in Figure [4-41](#473933_1_En_4_Chapter.xhtml#Fig41).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig41_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig41_HTML.jpg)


    *Figure 4-41 Queries with High Variation report plan summary y-axis options*


    ## Query Wait Statistics Report


    The newest report introduced to `SSMS` is the Query Wait Statistics report. When
    you initially open the report, you get a report that shows you the total wait
    time by category. Query Store takes all the wait statistics and groups them into
    23 categories such as `CPU`, `memory`, `buffer IO`, etc. Wait Statistics is a
    tried and true way of troubleshooting `SQL Server` performance and welcome addition
    to Query Store in `SQL Server 2017`. Each wait statistics category is documented
    in Chapter [9](#473933_1_En_9_Chapter.xhtml). An example of this report can be
    seen in Figure [4-42](#473933_1_En_4_Chapter.xhtml#Fig42).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig42_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig42_HTML.jpg)


    *Figure 4-42 Query Wait Statistics report categories*


    The report defaults like all other reports to show wait statistics by totals,
    but you have the option at the top and to the left to change to the options as
    shown in Figure [4-43](#473933_1_En_4_Chapter.xhtml#Fig43).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig43_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig43_HTML.jpg)


    *Figure 4-43 Query Wait Statistics report categories reporting options*


    At the bottom of the Chart View, you also can change the x-axis on the chart to
    one of the options in the drop-down as seen in Figure [4-44](#473933_1_En_4_Chapter.xhtml#Fig44).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig44_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig44_HTML.jpg)


    *Figure 4-44 Query Wait Statistics report categories x-axis options*


    At the top of the screen, you have three familiar buttons. The first being the
    `Refresh` button, the second being the `Standard Grid` button which how that looks
    can be seen in Figures [4-45](#473933_1_En_4_Chapter.xhtml#Fig45) and [4-46](#473933_1_En_4_Chapter.xhtml#Fig46),
    and finally, the button to change back to the Chart View.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig46_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig46_HTML.jpg)


    *Figure 4-46 Query Wait Statistics report categories grid view*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig45_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig45_HTML.jpg)


    *Figure 4-45 Query Wait Statistics report categories grid view*


    Once you click on one of the category bars displayed in the chart, you are shown
    a drilled down report of top five queries that consumed the most resources for
    that category as seen in Figure [4-47](#473933_1_En_4_Chapter.xhtml#Fig47). This
    gives you the ability troubleshoot queries based on where your bottleneck appears
    to be based on wait statistics. If you see high `CPU` that would be the first
    on the report, then you can drill down and see the top five queries using `CPU`
    and tune those queries or see if there is a plan that can be forced that uses
    less resources.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig47_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig47_HTML.jpg)


    *Figure 4-47 Query Wait Statistics top five by category report*


    The top bar based on drop-down has some statistics you can use to control which
    top five queries show up in the report as seen in Figure [4-48](#473933_1_En_4_Chapter.xhtml#Fig48).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig48_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig48_HTML.jpg)


    *Figure 4-48 Query Wait Statistics top five Queries Statistics*


    To the right of that is a set of buttons all of them should be familiar to us
    by now except for the green arrow. The green arrow takes us back to the Query
    Wait Statistics Categories Report that we drilled down from.


    Like other chart views, you can change the y-axis and x-axis attributes that are
    displayed; see Figures [4-49](#473933_1_En_4_Chapter.xhtml#Fig49) and [4-50](#473933_1_En_4_Chapter.xhtml#Fig50)
    for what options you have on this screen.


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig50_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig50_HTML.jpg)


    *Figure 4-50 Query Wait Statistics top five by Category x-axis options*


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig49_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig49_HTML.jpg)


    *Figure 4-49 Query Wait Statistics top five category y-axis options*


    On the right-hand side pane, you have the usual dotted report representing the
    different plans over the period time. The buttons at the top are the same ones
    on the Top Resource Consuming Resource Queries Report seen in Figure [4-13](#473933_1_En_4_Chapter.xhtml#Fig13).
    You can also change the y-axis to different statistics from the default of total
    to one of the values in the drop-down as seen in Figure [4-51](#473933_1_En_4_Chapter.xhtml#Fig51).


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig51_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig51_HTML.jpg)


    *Figure 4-51 Query Wait Statistics top five by Category Plan y-axis options*'
