    ## Conclusion


    In this chapter we looked at the Regressed Queries, Overall Resource Consumption,
    Top Resource Consumption Queries, Queries with Forced Plans, Queries with High
    Variation, Query Wait Statistics, and Tracked Queries reports and how they interacted
    with each other. We explored all the options you had available to change what
    data is reported on the screen and how to configure each report to meet your needs.
    These reports are vital to quickly being able to troubleshoot issues with Query
    Store on your SQL Server instance.


    # 5. Query Store Catalog Views


    Query Store introduces eight new catalog views to SQL Server where it stores all
    the information you need to query data to troubleshoot SQL Server with Query Store
    and check the configuration of Query Store. You need `VIEW DATABASE STATE` permission
