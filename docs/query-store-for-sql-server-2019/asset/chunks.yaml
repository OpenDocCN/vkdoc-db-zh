    # 3. 配置查询存储


    与任何 SQL Server 功能一样，最大化其潜力都需要针对您的特定环境对功能进行调整。通用的建议是从默认设置开始，然后将其与广泛认可的最佳实践进行比较，并在必要时根据您的用例进行调整。社区内通常存在一套针对偏离
    Microsoft 默认值的典型情况的、被广泛接受的最佳实践。有时，那些看起来“愚蠢”的默认设置之所以如此设定，并非因为 Microsoft 无视其产品或用户群，而是出于向后兼容性的原因。


    在本章中，我们将讨论实施和配置查询存储功能的步骤。我们将涵盖本地部署和 Azure SQL 数据库平台即服务 (PaaS) 产品中的默认配置。我们将详细分解所有查询存储配置选项以及与配置相关的查询存储目录视图（有关所有查询存储相关目录视图的列表，请参阅第
    5 章）。


    之后，我们将深入探讨配置查询存储的最佳实践。我们将讨论参数化及其设置如何影响查询存储，以及重命名对象带来的影响。我们还将重点介绍用于改进恢复时间的跟踪标志，以及适用于
    2016 和 2017 版本的、与性能相关的重要补丁。


    对于那些利用内存中 OLTP 功能的读者，我们将涵盖查询存储与本机编译存储过程的结合使用。我们还将讨论 SQL 2017 中引入的一项激动人心的新功能，称为自动计划回归修正
    (APRC)。我们将介绍其含义以及如何启用或禁用它。


    本章最后将讨论各种查询存储错误状态，以及作为 DBA 如何维护查询存储的详细信息。


    ## 等待统计


    我们将等待统计信息与运行时信息分开，只是因为使用本书的某些读者可能仍在使用 SQL Server 2016。图 2-6 展示了为等待统计信息收集的信息布局：


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig6_HTML.png](img/473933_1_En_2_Fig6_HTML.png)


    图 2-6: 目录视图包含等待统计信息


    与运行时信息一样，等待统计信息按运行时间间隔进行聚合。同样，与运行时信息类似，等待统计信息依赖于刷新到磁盘的间隔（默认为 15 分钟），因此会在两个位置进行聚合。再次与运行时信息类似，`execution_type`
    也会影响等待统计信息的聚合。最后，等待统计信息还多了一层复杂性。在跨时间间隔和 `execution_types` 聚合数据时，必须考虑一个 `wait_category`。我们将在第
    5 章更详细地介绍所有这些内容。


    您还可以看到数据的模式类似，存储了最小值、最大值、最新值、平均值和标准差。然而，只有等待时间是唯一有趣的值。为了节省空间，我在图 2-6 中省略了几个描述性列。那里的其余信息是等待统计数据的重要数据。


    ## 关于查询存储的信息


    实际上，我们还应该提到一个最终的目录视图，尽管其代表的具体细节将在第 3 章介绍。该视图是 `sys.database_query_store_options`。虽然它确实包含了一些关于查询存储的收集信息，但它不是本章的重点。


    ## 总结


    收集查询存储数据方法论的主要驱动因素，是以尽可能不干扰的方式进行。从信息存储到内存和磁盘的异步调用清楚地表明了这一点。但是，一旦数据存储到磁盘，它就与数据库共存，并且无论该数据库去往何处，都将可用，直到它被另一个进程（如自动清理）移除，或者由您手动删除信息。在第
    3 章中，我们将最终开始启动、停止和控制查询存储。


    ## 查询存储默认设置


    在本节中，我们将查看 SQL Server 中查询存储的默认配置选项。SQL Server 中的默认选项并不总是您环境的最佳配置设置，但更改它们确实需要仔细考虑。需要注意的一个重要点是，在撰写本文时，查询存储在
    2016、2017 和 2019 版本的本地产品中默认是禁用的。然而，在 Microsoft 平台即服务 (PaaS) 产品 Azure SQL 数据库中，它是默认启用的。对于
    Azure SQL 数据库托管实例（一种托管的基础设施即服务 (IaaS) 产品），查询存储是受支持的，但默认情况下也是禁用的。


    要启用查询存储，请在清单 3-1 中运行以下 T-SQL 命令：


    ```sql

    ALTER DATABASE [] SET QUERY_STORE=ON;

    ```

    清单 3-1: 在数据库上启用查询存储的 T-SQL


    要在您的实例上的所有数据库上启用查询存储，您可以运行清单 3-2 中的代码：


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(N''ALTER DATABASE [{{DBNAME}}] SET QUERY_STORE=ON '',

    ''{{DBName}}'', [name])

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND [name] NOT IN (''master'', ''tempdb'')

    ORDER BY [name];

    EXEC (@SQL);

    ```

    清单 3-2: 在所有数据库上开启查询存储


    查询存储无法在 `master` 或 `tempdb` 系统数据库中启用。在 *model* 数据库中启用查询存储实际上并不会捕获 *model* 数据库中的任何查询存储数据，但此配置更改将反映在从该时间点创建的新数据库中。在
    `msdb` 系统数据库中，查询存储的行为将与用户数据库中的查询存储没有区别。表 3-1 列出了 Azure SQL 数据库和常规本地 SQL Server
    的选项。


    表 3-1: 查询存储的配置选项


    | **配置名称** | **选项** | **描述** | **默认值** |

    | --- | --- | --- | --- |

    | `OPERATION_MODE` | `OFF`, `READ_WRITE`, `READ_ONLY` | 查询存储的操作模式 | `OFF` (SQL
    2016 和 2017)，Azure SQL 数据库为 `READ_WRITE` |

    | `CLEANUP_POLICY(STALE_QUERY_THRESHOLD_DAYS)` | `BIGINT` | 指定 `CLEAN_UP` 策略（0
    表示永不） | 30 天（Azure SQL 数据库基本版为 7 天） |

    | `DATA_FLUSH_INTERVAL_SECONDS` | `BIGINT` | 缓冲查询存储数据刷新的间隔频率 | 900（15 分钟） |

    | `MAX_STORAGE_SIZE_MB` | `BIGINT` | 查询存储的最大大小（MB） | 100 (SQL Server 2016 和 2017)，1000
    (SQL Server 2019)，（SQL Azure 数据库高级版为 1024，SQL Azure 数据库基本版为 10） |

    | `INTERVAL_LENGTH_MINUTES` | `1`, `5`, `10`, `15`, `30`, `60`, 或 `1440` | 统计信息的聚合间隔
    | 60 |

    | `SIZE_BASED_CLEANUP_MODE` | `AUTO`, `OFF` | 接近容量时尝试清理 | `AUTO` |

    | `QUERY_STORE_CAPTURE_MODE` | `AUTO`, `ALL`, `CUSTOM`, `NONE` | 查询捕获行为 | `AUTO`
    (SQL Server 2016 和 2017)，`ALL` (SQL Server 2019)，`ALL` (Azure SQL 数据库) |

    | `MAX_PLANS_PER_QUERY` | `INT` | 每个查询保留多少个不同的执行计划 | 200。SQL Server 2016 中不可用
    |

    | `WAIT_STATISTICS_CAPTURE_MODE` | `ON`, `OFF` | 指定是否捕获查询的等待统计信息 | 在 SQL Server
    2017 和 2019 以及 Azure SQL 数据库中为 `ON`。SQL Server 2016 中不可用 |

    '
- fmt: '## Configuration Options


    Query Store has many options to configure to properly be set up to collect data
    in the most beneficial way for your database. This section will explain those
    options and give you recommendations on what the best settings would be and how
    to set those options. First, we will go through all the options and what they
    mean and look at code on how to change them. Then we will see what is available
    in the GUI and how to change options there.


    ### OPERATION_MODE


    This setting sets the operational mode of the Query Store. The Query Store operates
    in either read-only or read and write mode. In read-only mode, existing data will
    remain in the Query Store, but no new queries will be captured. If the Query Store
    reaches capacity, it will change from `READ_WRITE` to `READ_ONLY` mode. If capturing
    new queries is desired, which it typically will be, it is important to monitor
    to ensure that the Query Store has its `OPERATION_MODE` set correctly. The T-SQL
    syntax for setting this is in Listing [3-3](#473933_1_En_3_Chapter.xhtml#PC3).


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( OPERATION_MODE = READ_WRITE );

    ```

    Listing 3-3

    T-SQL to set Query Store operation mode


    The Query Store has the concept of an actual state and the desired state. Where
    the desired state is `READ_WRITE,` and the actual state is `READ_ONLY`, there
    will be an associated reason which will be displayed in the catalog view `sys.database_query_store_options`
    under the column `readonly_reason`. The associated catalog views for the Query
    Store will be covered in Chapter [5](#473933_1_En_5_Chapter.xhtml). The default
    setting is `READ_WRITE`.


    ### CLEANUP_POLICY (STALE_QUERY_THRESHOLD_DAYS)


    The Query Store has a configurable number of days to store Query Store data. The
    Query Store settings `SIZE_BASED_CLEANUP_MODE` and `QUERY_STORE_CAPTURE_MODE`
    will also have an impact on the data stored in Query Store, so it is possible
    for queries that do not exceed the stale threshold not to be stored. The default
    for `STALE_QUERY_THREHOLD_DAYS` is 30 days (or 7 days if using Azure SQL Database
    Basic edition). The T-SQL for configuring this setting is in Listing [3-4](#473933_1_En_3_Chapter.xhtml#PC4).


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( CLEANUP_POLICY = ( STALE_QUERY_THRESHOLD_DAYS
    =  ) );

    ```

    Listing 3-4

    T-SQL to set STALE_QUERY_THRESHOLD_DAYS


    ### DATA_FLUSH_INTERVAL_SECONDS


    As discussed in Chapter [2](#473933_1_En_2_Chapter.xhtml), for performance purposes
    the Query Store will buffer data and write it asynchronously to disk at configurable
    intervals. This interval is known as the *data flush interval* *,* and it is specified
    in seconds. As will be discussed in greater detail in the section on Best Practices,
    this option requires careful consideration as it can have a considerable impact
    on the performance of the Query Store. Anyone familiar with indirect checkpoints
    and target recovery intervals in SQL Server will have a grasp of the trade-offs
    involved in setting the data flush interval for the Query Store. A short flush
    interval will result in more aggressive I/O spikes when the Query Store data is
    flushed to disk. This can lead to performance degradation of the I/O subsystem.
    A longer data flush interval should allow SQL Server to spread the I/O load over
    a longer time frame at the expense of greater data loss in the event of a systemic
    failure (since more of the Query Store data will be held in volatile memory).
    The default flush interval is 900 seconds (15 minutes). The T-SQL for configuring
    this setting is in Listing [3-5](#473933_1_En_3_Chapter.xhtml#PC5).


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( DATA_FLUSH_INTERVAL_SECONDS =  );

    ```

    Listing 3-5

    T-SQL to set DATA_FLUSH_INTERVAL_SECONDS


    ### MAX_STORAGE_SIZE_MB


    This setting determines the maximum storage size for the Query Store data for
    an individual database in megabytes. The default setting of 1000 MB is quite small
    for any database with even a moderate level of activity. If this threshold is
    reached, the Query Store will change state from `READ_WRITE` to `READ_ONLY`. Even
    with `SIZE_BASED_CLEANUP_MODE` set to `AUTO` (more on this later), it is still
    possible for the Query Store to reach maximum capacity especially during periods
    of high activity. It is crucial to set the maximum storage size for the Query
    Store appropriately for your environment, considering your desired history retention
    set by the `STALE_QUERY_THRESHOLD_DAYS` value. The T-SQL for configuring this
    setting is in Listing [3-6](#473933_1_En_3_Chapter.xhtml#PC6):


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( MAX_STORAGE_SIZE_MB =  );

    ```

    Listing 3-6

    T-SQL to set MAX_STORAGE_MAX_MB


    ### INTERVAL_LENGTH_MINUTES


    The `INTERVAL_LENGTH_MINUTES` is an important setting as it determines what interval
    data is aggregated into for viewing later. You can only select from values of
    1, 5, 10, 14, 60, and 1440 minutes. The default value is 60 minutes. The smaller
    the interval, the more disk space it will take up but the more granular data you
    will have. The T-SQL for configuring this setting is in Listing [3-7](#473933_1_En_3_Chapter.xhtml#PC7).


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( INTERVAL_LENGTH_MINUTES =  );

    ```

    Listing 3-7

    T-SQL to set INTERVAL_LENGTH_MINUTES


    ### SIZE_BASED_CLEANUP_MODE


    The `SIZE_BASED_CLEANUP_MODE` default value is `AUTO` which means it will automatically
    clean up the data based on the `MAX_STORAGE_SIZE_MB` and `CLEANUP_POLICY` settings.
    The other option is to set it to `OFF`. This setting is set to tell Query Store
    to clean up data automatically before reaching the number of days specified with
    the `CLEANUP_POLICY` setting if it reaches the `MAX_STORAGE_SIZE_MB` value first.
    So, if you set Query Store to keep 30 days of data and it reaches your max size
    of 2 GB at day 28, it will start purging data at the point and time. The T-SQL
    for configuring this setting is in Listing [3-8](#473933_1_En_3_Chapter.xhtml#PC8).


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( SIZE_BASED_CLEANUP_MODE =  );

    ```

    Listing 3-8

    T-SQL to set SIZE_BASED_CLEANUP_MODE'
  raw: '## Configuration Options


    Query Store has many options to configure to properly be set up to collect data
    in the most beneficial way for your database. This section will explain those
    options and give you recommendations on what the best settings would be and how
    to set those options. First, we will go through all the options and what they
    mean and look at code on how to change them. Then we will see what is available
    in the GUI and how to change options there.


    ### OPERATION_MODE


    This setting sets the operational mode of the Query Store. The Query Store operates
    in either read-only or read and write mode. In read-only mode, existing data will
    remain in the Query Store, but no new queries will be captured. If the Query Store
    reaches capacity, it will change from `READ_WRITE` to `READ_ONLY` mode. If capturing
    new queries is desired, which it typically will be, it is important to monitor
    to ensure that the Query Store has its OPERATION_MODE set correctly. The T-SQL
    syntax for setting this is in Listing [3-3](#473933_1_En_3_Chapter.xhtml#PC3).


    ```

    ALTER DATABASE [] SET QUERY_STORE ( OPERATION_MODE = READ_WRITE );

    Listing 3-3

    T-SQL to set Query Store operation mode

    ```


    The Query Store has the concept of an actual state and the desired state. Where
    the desired state is `READ_WRITE,` and the actual state is `READ_ONLY`, there
    will be an associated reason which will be displayed in the catalog view `sys.database_query_store_options`
    under the column `readonly_reason`. The associated catalog views for the Query
    Store will be covered in Chapter [5](#473933_1_En_5_Chapter.xhtml). The default
    setting is `READ_WRITE`.


    ### CLEANUP_POLICY (STALE_QUERY_THRESHOLD_DAYS)


    The Query Store has a configurable number of days to store Query Store data. The
    Query Store settings `SIZE_BASED_CLEANUP_MODE` and `QUERY_STORE_CAPTURE_MODE`
    will also have an impact on the data stored in Query Store, so it is possible
    for queries that do not exceed the stale threshold not to be stored. The default
    for `STALE_QUERY_THREHOLD_DAYS` is 30 days (or 7 days if using Azure SQL Database
    Basic edition). The T-SQL for configuring this setting is in Listing [3-4](#473933_1_En_3_Chapter.xhtml#PC4).


    ```

    ALTER DATABASE [] SET QUERY_STORE ( CLEANUP_POLICY = ( STALE_QUERY_THRESHOLD_DAYS
    =  ) );

    Listing 3-4

    T-SQL to set STALE_QUERY_THRESHOLD_DAYS

    ```


    ### DATA_FLUSH_INTERVAL_SECONDS


    As discussed in Chapter [2](#473933_1_En_2_Chapter.xhtml), for performance purposes
    the Query Store will buffer data and write it asynchronously to disk at configurable
    intervals. This interval is known as the *data flush interval* *,* and it is specified
    in seconds. As will be discussed in greater detail in the section on Best Practices,
    this option requires careful consideration as it can have a considerable impact
    on the performance of the Query Store. Anyone familiar with indirect checkpoints
    and target recovery intervals in SQL Server will have a grasp of the trade-offs
    involved in setting the data flush interval for the Query Store. A short flush
    interval will result in more aggressive I/O spikes when the Query Store data is
    flushed to disk. This can lead to performance degradation of the I/O subsystem.
    A longer data flush interval should allow SQL Server to spread the I/O load over
    a longer time frame at the expense of greater data loss in the event of a systemic
    failure (since more of the Query Store data will be held in volatile memory).
    The default flush interval is 900 seconds (15 minutes). The T-SQL for configuring
    this setting is in Listing [3-5](#473933_1_En_3_Chapter.xhtml#PC5).


    ```

    ALTER DATABASE [] SET QUERY_STORE ( DATA_FLUSH_INTERVAL_SECONDS =  );

    Listing 3-5

    T-SQL to set DATA_FLUSH_INTERVAL_SECONDS

    ```


    ### MAX_STORAGE_SIZE_MB


    This setting determines the maximum storage size for the Query Store data for
    an individual database in megabytes. The default setting of 1000 MB is quite small
    for any database with even a moderate level of activity. If this threshold is
    reached, the Query Store will change state from `READ_WRITE` to `READ_ONLY`. Even
    with `SIZE_BASED_CLEANUP_MODE` set to `AUTO` (more on this later), it is still
    possible for the Query Store to reach maximum capacity especially during periods
    of high activity. It is crucial to set the maximum storage size for the Query
    Store appropriately for your environment, considering your desired history retention
    set by the `STALE_QUERY_THRESHOLD_DAYS` value. The T-SQL for configuring this
    setting is in Listing [3-6](#473933_1_En_3_Chapter.xhtml#PC6):


    ```

    ALTER DATABASE [] SET QUERY_STORE ( MAX_STORAGE_SIZE_MB =  );

    Listing 3-6

    T-SQL to set MAX_STORAGE_MAX_MB

    ```


    ### INTERVAL_LENGTH_MINUTES


    The `INTERVAL_LENGTH_MINUTES` is an important setting as it determines what interval
    data is aggregated into for viewing later. You can only select from values of
    1, 5, 10, 14, 60, and 1440 minutes. The default value is 60 minutes. The smaller
    the interval, the more disk space it will take up but the more granular data you
    will have. The T-SQL for configuring this setting is in Listing [3-7](#473933_1_En_3_Chapter.xhtml#PC7).


    ```

    ALTER DATABASE [] SET QUERY_STORE ( INTERVAL_LENGTH_MINUTES =  );

    Listing 3-7

    T-SQL to set INTERVAL_LENGTH_MINUTES

    ```


    ### SIZE_BASED_CLEANUP_MODE


    The `SIZE_BASED_CLEANUP_MODE` default value is `AUTO` which means it will automatically
    clean up the data based on the `MAX_STORAGE_SIZE_MB` and `CLEANUP_POLICY` settings.
    The other option is to set it to `OFF`. This setting is set to tell Query Store
    to clean up data automatically before reaching the number of days specified with
    the `CLEANUP_POLICY` setting if it reaches the `MAX_STORAGE_SIZE_MB` value first.
    So, if you set Query Store to keep 30 days of data and it reaches your max size
    of 2 GB at day 28, it will start purging data at the point and time. The T-SQL
    for configuring this setting is in Listing [3-8](#473933_1_En_3_Chapter.xhtml#PC8).


    ```

    ALTER DATABASE [] SET QUERY_STORE ( SIZE_BASED_CLEANUP_MODE =  );

    Listing 3-8

    T-SQL to set SIZE_BASED_CLEANUP_MODE

    ```'
  trans: '

    ## 配置选项


    查询存储有许多可配置选项，需要进行适当设置，才能以对数据库最有益的方式收集数据。本节将解释这些选项，并为您提供有关最佳设置以及如何设置这些选项的建议。首先，我们将逐一介绍所有选项及其含义，并查看如何更改它们的代码。然后，我们将了解图形界面中提供了哪些选项以及如何在那里更改选项。


    ### OPERATION_MODE


    此设置用于配置查询存储的操作模式。查询存储以只读或读写模式运行。在只读模式下，现有数据将保留在查询存储中，但不会捕获新的查询。如果查询存储达到容量上限，它将从
    `READ_WRITE` 模式更改为 `READ_ONLY` 模式。如果希望捕获新查询（通常都需要），则必须监控以确保查询存储的 `OPERATION_MODE`
    设置正确。设置此选项的 T-SQL 语法见清单 3-3。


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( OPERATION_MODE = READ_WRITE );

    ```

    清单 3-3

    设置查询存储操作模式的 T-SQL


    查询存储有实际状态和期望状态的概念。当期望状态是 `READ_WRITE`，但实际状态是 `READ_ONLY` 时，将有一个关联的原因，该原因会显示在目录视图
    `sys.database_query_store_options` 的 `readonly_reason` 列下。与查询存储关联的目录视图将在第 5 章中介绍。默认设置为
    `READ_WRITE`。


    ### CLEANUP_POLICY (STALE_QUERY_THRESHOLD_DAYS)


    查询存储的数据存储天数是可配置的。查询存储设置 `SIZE_BASED_CLEANUP_MODE` 和 `QUERY_STORE_CAPTURE_MODE`
    也会影响存储在查询存储中的数据，因此即使查询未超过陈旧阈值，也可能不被存储。`STALE_QUERY_THREHOLD_DAYS` 的默认值为 30 天（如果使用
    Azure SQL 数据库基本版，则为 7 天）。配置此设置的 T-SQL 见清单 3-4。


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( CLEANUP_POLICY = ( STALE_QUERY_THRESHOLD_DAYS
    =  ) );

    ```

    清单 3-4

    设置 STALE_QUERY_THRESHOLD_DAYS 的 T-SQL


    ### DATA_FLUSH_INTERVAL_SECONDS


    如第 2 章所述，出于性能考虑，查询存储将缓冲数据，并在可配置的间隔异步写入磁盘。此间隔称为*数据刷新间隔*，以秒为单位指定。正如在最佳实践部分将更详细讨论的那样，此选项需要仔细考虑，因为它可能对查询存储的性能产生重大影响。熟悉
    SQL Server 中间接检查点和目标恢复间隔的人员将能够理解为查询存储设置数据刷新间隔所涉及的权衡取舍。较短的刷新间隔将导致在查询存储数据刷新到磁盘时出现更剧烈的
    I/O 峰值。这可能导致 I/O 子系统性能下降。较长的数据刷新间隔应允许 SQL Server 在更长的时间范围内分散 I/O 负载，代价是在系统故障时丢失更多数据（因为更多查询存储数据将保留在易失性内存中）。默认刷新间隔为
    900 秒（15 分钟）。配置此设置的 T-SQL 见清单 3-5。


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( DATA_FLUSH_INTERVAL_SECONDS =  );

    ```

    清单 3-5

    设置 DATA_FLUSH_INTERVAL_SECONDS 的 T-SQL


    ### MAX_STORAGE_SIZE_MB


    此设置以 MB 为单位确定单个数据库的查询存储数据的最大存储大小。对于活动量即使中等的数据库，1000 MB 的默认设置也相当小。如果达到此阈值，查询存储的状态将从
    `READ_WRITE` 更改为 `READ_ONLY`。即使 `SIZE_BASED_CLEANUP_MODE` 设置为 `AUTO`（稍后会详细介绍），查询存储仍然可能达到最大容量，尤其是在高活动期间。根据您通过
    `STALE_QUERY_THRESHOLD_DAYS` 值设置的期望历史保留期，为您的环境适当设置查询存储的最大存储大小至关重要。配置此设置的 T-SQL
    见清单 3-6：


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( MAX_STORAGE_SIZE_MB =  );

    ```

    清单 3-6

    设置 MAX_STORAGE_MAX_MB 的 T-SQL


    ### INTERVAL_LENGTH_MINUTES


    `INTERVAL_LENGTH_MINUTES` 是一个重要的设置，因为它决定了将数据聚合到哪个间隔以便后续查看。您只能从 1、5、10、14、60 和
    1440 分钟的值中进行选择。默认值为 60 分钟。间隔越小，占用的磁盘空间越多，但您将获得更精细的数据。配置此设置的 T-SQL 见清单 3-7。


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( INTERVAL_LENGTH_MINUTES =  );

    ```

    清单 3-7

    设置 INTERVAL_LENGTH_MINUTES 的 T-SQL


    ### SIZE_BASED_CLEANUP_MODE


    `SIZE_BASED_CLEANUP_MODE` 的默认值为 `AUTO`，这意味着它将根据 `MAX_STORAGE_SIZE_MB` 和 `CLEANUP_POLICY`
    设置自动清理数据。另一个选项是将其设置为 `OFF`。此设置旨在告诉查询存储，如果先达到 `MAX_STORAGE_SIZE_MB` 值，则在达到 `CLEANUP_POLICY`
    设置指定的天数之前自动清理数据。因此，如果您将查询存储设置为保留 30 天的数据，并在第 28 天达到了最大大小 2 GB，它将从此时间点开始清除数据。配置此设置的
    T-SQL 见清单 3-8。


    ```sql

    ALTER DATABASE [] SET QUERY_STORE ( SIZE_BASED_CLEANUP_MODE =  );

    ```

    清单 3-8

    设置 SIZE_BASED_CLEANUP_MODE 的 T-SQL

    '
- fmt: '### QUERY_STORE_CAPTURE_MODE


    `QUERY_STORE_CAPTURE_MODE` 的默认值对于本地 SQL Server 和 Azure SQL Database 都是 `ALL`。另一个选项是
    `NONE`，它指示查询存储仅不捕获新查询，但仍继续为已被查询存储捕获的查询捕获运行时统计信息。第三个选项 `AUTO` 告知 SQL Server 不捕获那些占用大量资源或不经常执行的查询。配置此设置的
    T-SQL 位于代码清单 [3-9](#473933_1_En_3_Chapter.xhtml#PC9)。


    ```

    ALTER DATABASE [] SET QUERY_STORE ( QUERY_STORE_CAPTURE_MODE = [] );

    代码清单 3-9

    用于设置 QUERY_STORE_CAPTURE_MODE 的 T-SQL

    ```


    对于 `QUERY_STORE_CAPTURE_MODE` 的 `CUSTOM` 选项，有三个选项可用于控制数据的存储方式。此选项是在 SQL Server
    2019 中引入的，以帮助控制为临时工作负载捕获的数据。`STALE_CAPTURE_POLICY_THRESHOLD` 接受一个以天或小时为单位的数字（从
    1 小时到 7 天），查询必须在接下来的三个选项之一上超过该阈值，其数据才会被捕获。在 `CUSTOM` 模式下控制将捕获什么数据并以 OR 方式运行的三个选项如下：


    *   `EXECUTION_COUNT` – 指定查询在时间段内必须执行的次数。

    *   `TOTAL_COMPILE_CPU_TIME_MS` – 指定查询在时间段内必须使用的总 CPU 编译时间。

    *   `TOTAL_EXECUTION_CPU_TIME_MS` – 指定查询在时间段内必须使用的总 CPU 执行时间。


    配置 `CUSTOM` 设置的 T-SQL 位于代码清单 [3-10](#473933_1_En_3_Chapter.xhtml#PC10)。


    ```

    ALTER DATABASE []

    SET QUERY_STORE = ON

    (

    QUERY_CAPTURE_MODE = CUSTOM,

    QUERY_CAPTURE_POLICY = (

    STALE_CAPTURE_POLICY_THRESHOLD = 24 HOURS,

    EXECUTION_COUNT = 30,

    TOTAL_COMPILE_CPU_TIME_MS = 1000,

    TOTAL_EXECUTION_CPU_TIME_MS = 100

    )

    );

    代码清单 3-10

    用于为 CUSTOM 模式设置 QUERY_STORE_CAPTURE_MODE 的 T-SQL

    ```


    ### MAX_PLANS_PER_QUERY


    `MAX_PLANS_PER_QUERY` 的默认值是 200 个计划。此设置在 SQL Server 2016 中不可用。这个数字看起来可能很大，但在某些系统上，每个查询可能有数千个计划，因此
    200 是一个良好的起点。然而，此设置越高，如果您有大量查询具有大量计划，所需的磁盘空间就越多。如果您注意到达到了该限制，可以运行代码清单 [3-11](#473933_1_En_3_Chapter.xhtml#PC11)
    中的代码来查看当前计划缓存中每个查询的最大查询计划数，并用它来决定您希望将此设置为何值。


    ```

    SELECT query_hash,

    COUNT (DISTINCT query_plan_hash) distinct_plans

    FROM sys.dm_exec_query_stats

    GROUP BY query_hash

    ORDER BY distinct_plans DESC;

    代码清单 3-11

    用于查找缓存中每个查询的计划数量的 T-SQL

    ```


    配置此设置的 T-SQL 位于代码清单 [3-12](#473933_1_En_3_Chapter.xhtml#PC12)。


    ```

    ALTER DATABASE [] SET QUERY_STORE ( MAX_PLANS_PER_QUERY =  ) ;

    代码清单 3-12

    用于设置 MAX_PLANS_PER_QUERY 的 T-SQL

    ```


    ### WAIT_STATISTICS_CAPTURE_MODE


    `WAIT_STATISTICS_CAPTURE_MODE` 的默认值是 `ON`。此设置在 SQL Server 2016 中不可用。此设置的唯一其他选项是
    `OFF`。等待统计信息在第 [9](#473933_1_En_9_Chapter.xhtml) 章中有更多讨论。配置此设置的 T-SQL 位于代码清单 [3-13](#473933_1_En_3_Chapter.xhtml#PC13)。


    ```

    ALTER DATABASE [] SET QUERY_STORE ( WAIT_STATISTICS_CAPTURE_MODE =  );

    代码清单 3-13

    用于设置 WAIT_STATISTICS_CAPTURE_MODE 的 T-SQL

    ```


    ### 使用 GUI 更改配置


    默认情况下，本地 SQL Server 数据库的查询存储是关闭的，而 Azure SQL Database 的查询存储默认是打开的。要查看属性并进行更改，您需要连接到
    SQL Server 实例，右键单击您的数据库，然后单击“属性”。从那里，在属性窗口的左侧单击“查询存储”链接。参见图 [3-1](#473933_1_En_3_Chapter.xhtml#Fig1)
    以查看属性窗口的示例。


    ![../images/473933_1_En_3_Chapter/473933_1_En_3_Fig1_HTML.jpg](images/473933_1_En_3_Chapter/473933_1_En_3_Fig1_HTML.jpg)


    图 3-1

    查询存储属性窗口


    ### 注意


    您无法在 GUI 中更改或查看 `MAX_PLANS_PER_QUERY` 或 `WAIT_STATISTICS_CAPTURE_MODE` 选项，也无法查看随
    `CUSTOM QUERY_STORE_CAPTURE_MODE` 设置一起提供的三个选项。


    您可以在左侧的饼图上看到数据库占用的空间以及查询存储占用的空间。在右侧的饼图上，您可以看到查询存储中已使用和可用的空间。您还可以使用“清除查询数据”按钮从查询存储中清除所有数据。


    ## 查询存储配置目录视图


    有一个目录视图保存着查询存储的设置：`sys.database_query_store_options`。有关目录视图的更多信息，请参见第 [5](#473933_1_En_5_Chapter.xhtml)
    章。您可以使用 `sys.database_query_store_options` 目录视图来查看数据库中查询存储的设置。要查看查询存储的配置设置，请使用代码清单
    [3-14](#473933_1_En_3_Chapter.xhtml#PC14) 中的查询。


    ```

    SELECT *

    FROM sys.database_query_store_options

    代码清单 3-14

    用于查看查询存储选项的 T-SQL

    ``


    我们将在本章后面的“维护查询存储”部分中查看其他一些查询。


    ## 查询存储配置最佳实践


    第一个应该与默认值不同地配置的设置是 `MAX_STORAGE_SIZE_MB`。这里的默认设置太小，无法捕获 30 天甚至更长时间的工作负载。一般准则是从
    2048 MB 开始，如果您必须保留更长的保留期或有较大的临时工作负载，再据此向上调整。请记住，此数据存储在 `PRIMARY` 文件组中，因此如果您正在进行部分还原，这将影响您的恢复时间，因此您不希望将大小设置得太高。


    下一个本地 SQL Server 应该更改的设置是 `QUERY_STORE_CAPTURE_MODE`。此设置应从 `ALL` 更改为 `AUTO`，除非您需要捕获那些占用资源很少或执行次数很少的查询。捕获无关紧要的查询只会给查询存储带来更多工作，并占用查询存储中更多的磁盘空间。因此，在将此设置保留为
    `ALL` 之前，请考虑这些因素。


    `SIZE_BASED_CLEANUP_MODE` 的推荐设置是将其保留为 `AUTO`，因为如果由于无法清理数据而达到 `MAX_STORAGE_SIZE_MB`，则
    `OPERATION_MODE` 将自动切换到 `READ_ONLY` 模式，使您处于无法收集新数据的状态。


    下一个您可能考虑更改的设置是 `INTERVAL_LENGTH_MINUTES`。推荐设置是默认的 60，除非您需要更精细级别的数据。在这种情况下，建议低至
    15，因为在合适的硬件上处理每秒 60,000 个事务的系统能够跟上该数据的聚合。如果您的工作负载更多是临时查询，而不是存储过程或参数化工作负载，那么您会希望将此设置保持较高，因为它会写入更多数据。


    `WAIT_STATISTICS_CAPTURE_MODE` 的推荐设置是 `ON`，因为它为您的查询提供了更多的故障排除洞察。将此设置为 `OFF` 会削弱您使用查询存储中内置的强大功能的能力，该功能可用于查看是哪些查询导致了服务器上由您的数据库引起的哪些等待统计信息。'
  raw: '### QUERY_STORE_CAPTURE_MODE


    The `QUERY_STORE_CAPTURE_MODE` default is ALL for both SQL Server on-premise and
    for Azure SQL Database. Another option is `NONE`, which tells Query Store to not
    capture new queries only, it continues to capture runtime statistics for queries
    that have already been captured by Query Store. The third option `AUTO` tells
    SQL Server not to capture queries that do take up significant resources or are
    not executed often. The T-SQL for configuring this setting is in Listing [3-9](#473933_1_En_3_Chapter.xhtml#PC9).


    ```

    ALTER DATABASE [] SET QUERY_STORE ( QUERY_STORE_CAPTURE_MODE = [] );

    Listing 3-9

    T-SQL to set QUERY_STORE_CAPTURE_MODE

    ```


    For the `CUSTOM` option for `QUERY_STORE_CAPTURE_MODE`, there are three options
    you can use to control how that data will be stored. This option was introduced
    to help with controlling what data was captured for ad-hoc workloads in SQL Server
    2019\. The STALE_CAPTURE_POLICY_THRESHOLD accepts a number for days or hours,
    from 1 hour up to 7 days that a query must exceed on of the values in the next
    three options in for the data for query to be captured. The three options that control
    what will be captured in the CUSTOM mode and operate in an OR manner are listed
    below:


    *   EXECUTION_COUNT – Specifies how many times a query must be executed in the
    time period.


    *   TOTAL_COMPILE_CPU_TIME_MS – Specifies the total CPU compile time a query must
    use in the time period.


    *   TOTAL_EXECUTION_CPU_TIME_MS – Specifies the total CPU execution time the query
    must use in the time period.


    The T-SQL for configuring the `CUSTOM` setting is in Listing [3-10](#473933_1_En_3_Chapter.xhtml#PC10).


    ```

    ALTER DATABASE []

    SET QUERY_STORE = ON

    (

    QUERY_CAPTURE_MODE = CUSTOM,

    QUERY_CAPTURE_POLICY = (

    STALE_CAPTURE_POLICY_THRESHOLD = 24 HOURS,

    EXECUTION_COUNT = 30,

    TOTAL_COMPILE_CPU_TIME_MS = 1000,

    TOTAL_EXECUTION_CPU_TIME_MS = 100

    )

    );

    Listing 3-10

    T-SQL to set QUERY_STORE_CAPTURE_MODE for CUSTOM mode

    ```


    ### MAX_PLANS_PER_QUERY


    The `MAX_PLANS_PER_QUERY` default is 200 plans. This setting is not available
    in SQL Server 2016. That may seem like a large number, but on some systems, there
    are thousands of plans per query, but 200 is a good starting point. The higher
    this setting though, the more disk space you will need if you have a large number
    of queries with a large number of plans. If you notice that you are hitting that
    limit, you can run the code in Listing [3-11](#473933_1_En_3_Chapter.xhtml#PC11)
    to see what your max number of query plans currently in plan cache is and use
    it determine what you would like this setting to be set to.


    ```

    SELECT query_hash,

    COUNT (DISTINCT query_plan_hash) distinct_plans

    FROM sys.dm_exec_query_stats

    GROUP BY query_hash

    ORDER BY distinct_plans DESC;

    Listing 3-11

    T-SQL to find the number of plans in the cache per query

    ```


    The T-SQL for configuring this setting is in Listing [3-12](#473933_1_En_3_Chapter.xhtml#PC12).


    ```

    ALTER DATABASE [] SET QUERY_STORE ( MAX_PLANS_PER_QUERY =  ) ;

    Listing 3-12

    T-SQL to set MAX_PLANS_PER_QUERY

    ```


    ### WAIT_STATISTICS_CAPTURE_MODE


    The `WAIT_STATISTICS_CAPTURE_MODE` default is `ON`. This setting is not available
    in SQL Server 2016\. The only other option for this setting is `OFF`. Wait statistics
    are discussed more in Chapter [9](#473933_1_En_9_Chapter.xhtml). The T-SQL for
    configuring this setting is in Listing [3-13](#473933_1_En_3_Chapter.xhtml#PC13).


    ```

    ALTER DATABASE [] SET QUERY_STORE ( WAIT_STATISTICS_CAPTURE_MODE =  );

    Listing 3-13

    T-SQL to set WAIT_STATISTICS_CAPTURE_MODE

    ```


    ### Changing Configuration Using the GUI


    By default, Query Store is turned off on-premise SQL Server databases and turned
    on by default in Azure SQL Database. To view the properties and change them, you
    would connect to your SQL Server instance, right-click on your database, and click
    on Properties. From there, click on the Query Store link on the left-hand side
    of the properties window. See Figure [3-1](#473933_1_En_3_Chapter.xhtml#Fig1)
    to see example of what the properties windows looks like.


    ![../images/473933_1_En_3_Chapter/473933_1_En_3_Fig1_HTML.jpg](images/473933_1_En_3_Chapter/473933_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Query Store properties window


    ### Note


    You cannot change or see the `MAX_PLANS_PER_QUERY` or `WAIT_STATISTICS_CAPTURE_MODE`
    options in the GUI or the three options that come with the `CUSTOM QUERY_STORE_CAPTURE_MODE`
    setting.


    You can see how much space the database is taking up and Query Store is taking
    up on the pie chart on the left. On the pie chart on the right, you can see the
    used and available space in Query Store. You also can purge all the data from
    Query Store with the Purge Query Data button.


    ## Query Store Configuration Catalog View


    There is one catalog view that holds the settings for Query Store: `sys.database_query_store_options`.
    For more on the catalog views, see Chapter [5](#473933_1_En_5_Chapter.xhtml).
    You can use the `sys.database_query_store_options` catalog view to view the settings
    for Query Store in the database. To view the configuration settings for Query
    Store, use the query in Listing [3-14](#473933_1_En_3_Chapter.xhtml#PC14).


    ```

    SELECT *

    FROM sys.database_query_store_options

    Listing 3-14

    T-SQL to view Query Store Options

    ```


    We will look at some other queries in the Maintaining Query Store section later
    in this chapter.


    ## Query Store Configuration Best Practices


    The first setting that should be configured differently than the default is `MAX_STORAGE_SIZE_MB`.
    The default setting here is much too small to capture a 30-day or even longer
    workload. The general guideline is to start with 2048 MBs and if you must keep
    a longer retention period or have a large ad-hoc workload to adjust it up from
    there. Keep in mind that this data is stored in the PRIMARY filegroup, so if you
    are doing piecemeal restores, this will affect your recovery times, so you don’t
    want to set the size too high.


    The next setting for on-premise SQL Servers that should be changed is `QUERY_STORE_CAPTURE_MODE`.
    This setting should be changed from `ALL` to `AUTO` unless you need to capture
    queries that take up insignificant resources or execute very few times. Capturing
    insignificant queries just causes more work for Query Store and takes more disk
    space in Query Store. So before leaving this setting to `ALL,` take those things
    into consideration.


    The recommended setting for `SIZE_BASED_CLEANUP_MODE` is to leave the setting
    on `AUTO` because if the `MAX_STORAGE_SIZE_MB` is reached because it cannot clean
    up data, the `OPERATION_MODE` will be automatically switched to `READ_ONLY` mode
    leaving in a state where you are not collecting new data.


    The next setting you may consider changing is `INTERVAL_LENGTH_MINUTES`. The recommended
    setting is the default of 60 unless you need data at a more granular level. In
    that case, going as low as 15 would be advisable as systems processing 60,000
    transactions per second on the right hardware have been able to keep up aggregating
    that data. If you have more of an ad-hoc workload vs. stored procedure or parameterize
    workload, you are going to want to keep this setting higher as it will be writing
    more data.


    The recommended setting for `WAIT_STATISTICS_CAPTURE_MODE` is `ON` because it
    gives more troubleshooting insight for your queries. Turning this setting `OFF`
    handicaps your ability to use a great feature built into Query Store for seeing
    what queries are causing which wait statistics to occur on your server by your
    database.'
  trans: '

    ### QUERY_STORE_CAPTURE_MODE


    `QUERY_STORE_CAPTURE_MODE` 的默认值对于本地 SQL Server 和 Azure SQL Database 都是 `ALL`。另一个选项是
    `NONE`，它指示查询存储仅不捕获新查询，但仍继续为已被查询存储捕获的查询捕获运行时统计信息。第三个选项 `AUTO` 告知 SQL Server 不捕获那些占用大量资源或不经常执行的查询。配置此设置的
    T-SQL 位于代码清单 3-9。


    ```

    ALTER DATABASE [] SET QUERY_STORE ( QUERY_STORE_CAPTURE_MODE = [] );

    代码清单 3-9

    用于设置 QUERY_STORE_CAPTURE_MODE 的 T-SQL

    ```


    对于 `QUERY_STORE_CAPTURE_MODE` 的 `CUSTOM` 选项，有三个选项可用于控制数据的存储方式。此选项是在 SQL Server
    2019 中引入的，以帮助控制为临时工作负载捕获的数据。`STALE_CAPTURE_POLICY_THRESHOLD` 接受一个以天或小时为单位的数字（从
    1 小时到 7 天），查询必须在接下来的三个选项之一上超过该阈值，其数据才会被捕获。在 `CUSTOM` 模式下控制将捕获什么数据并以 OR 方式运行的三个选项如下：


    *   `EXECUTION_COUNT` – 指定查询在时间段内必须执行的次数。

    *   `TOTAL_COMPILE_CPU_TIME_MS` – 指定查询在时间段内必须使用的总 CPU 编译时间。

    *   `TOTAL_EXECUTION_CPU_TIME_MS` – 指定查询在时间段内必须使用的总 CPU 执行时间。


    配置 `CUSTOM` 设置的 T-SQL 位于代码清单 3-10。


    ```

    ALTER DATABASE []

    SET QUERY_STORE = ON

    (

    QUERY_CAPTURE_MODE = CUSTOM,

    QUERY_CAPTURE_POLICY = (

    STALE_CAPTURE_POLICY_THRESHOLD = 24 HOURS,

    EXECUTION_COUNT = 30,

    TOTAL_COMPILE_CPU_TIME_MS = 1000,

    TOTAL_EXECUTION_CPU_TIME_MS = 100

    )

    );

    代码清单 3-10

    用于为 CUSTOM 模式设置 QUERY_STORE_CAPTURE_MODE 的 T-SQL

    ```


    ### MAX_PLANS_PER_QUERY


    `MAX_PLANS_PER_QUERY` 的默认值是 200 个计划。此设置在 SQL Server 2016 中不可用。这个数字看起来可能很大，但在某些系统上，每个查询可能有数千个计划，因此
    200 是一个良好的起点。然而，此设置越高，如果您有大量查询具有大量计划，所需的磁盘空间就越多。如果您注意到达到了该限制，可以运行代码清单 3-11 中的代码来查看当前计划缓存中每个查询的最大查询计划数，并用它来决定您希望将此设置为何值。


    ```

    SELECT query_hash,

    COUNT (DISTINCT query_plan_hash) distinct_plans

    FROM sys.dm_exec_query_stats

    GROUP BY query_hash

    ORDER BY distinct_plans DESC;

    代码清单 3-11

    用于查找缓存中每个查询的计划数量的 T-SQL

    ```


    配置此设置的 T-SQL 位于代码清单 3-12。


    ```

    ALTER DATABASE [] SET QUERY_STORE ( MAX_PLANS_PER_QUERY =  ) ;

    代码清单 3-12

    用于设置 MAX_PLANS_PER_QUERY 的 T-SQL

    ```


    ### WAIT_STATISTICS_CAPTURE_MODE


    `WAIT_STATISTICS_CAPTURE_MODE` 的默认值是 `ON`。此设置在 SQL Server 2016 中不可用。此设置的唯一其他选项是
    `OFF`。等待统计信息在第 9 章中有更多讨论。配置此设置的 T-SQL 位于代码清单 3-13。


    ```

    ALTER DATABASE [] SET QUERY_STORE ( WAIT_STATISTICS_CAPTURE_MODE =  );

    代码清单 3-13

    用于设置 WAIT_STATISTICS_CAPTURE_MODE 的 T-SQL

    ```


    ### 使用 GUI 更改配置


    默认情况下，本地 SQL Server 数据库的查询存储是关闭的，而 Azure SQL Database 的查询存储默认是打开的。要查看属性并进行更改，您需要连接到
    SQL Server 实例，右键单击您的数据库，然后单击“属性”。从那里，在属性窗口的左侧单击“查询存储”链接。参见图 3-1 以查看属性窗口的示例。


    ![../images/473933_1_En_3_Chapter/473933_1_En_3_Fig1_HTML.jpg](img/473933_1_En_3_Fig1_HTML.jpg)


    图 3-1

    查询存储属性窗口


    ### 注意


    您无法在 GUI 中更改或查看 `MAX_PLANS_PER_QUERY` 或 `WAIT_STATISTICS_CAPTURE_MODE` 选项，也无法查看随
    `CUSTOM QUERY_STORE_CAPTURE_MODE` 设置一起提供的三个选项。


    您可以在左侧的饼图上看到数据库占用的空间以及查询存储占用的空间。在右侧的饼图上，您可以看到查询存储中已使用和可用的空间。您还可以使用“清除查询数据”按钮从查询存储中清除所有数据。


    ## 查询存储配置目录视图


    有一个目录视图保存着查询存储的设置：`sys.database_query_store_options`。有关目录视图的更多信息，请参见第 5 章。您可以使用
    `sys.database_query_store_options` 目录视图来查看数据库中查询存储的设置。要查看查询存储的配置设置，请使用代码清单 3-14
    中的查询。


    ```

    SELECT *

    FROM sys.database_query_store_options

    代码清单 3-14

    用于查看查询存储选项的 T-SQL

    ```


    我们将在本章后面的“维护查询存储”部分中查看其他一些查询。


    ## 查询存储配置最佳实践


    第一个应该与默认值不同地配置的设置是 `MAX_STORAGE_SIZE_MB`。这里的默认设置太小，无法捕获 30 天甚至更长时间的工作负载。一般准则是从
    2048 MB 开始，如果您必须保留更长的保留期或有较大的临时工作负载，再据此向上调整。请记住，此数据存储在 `PRIMARY` 文件组中，因此如果您正在进行部分还原，这将影响您的恢复时间，因此您不希望将大小设置得太高。


    下一个本地 SQL Server 应该更改的设置是 `QUERY_STORE_CAPTURE_MODE`。此设置应从 `ALL` 更改为 `AUTO`，除非您需要捕获那些占用资源很少或执行次数很少的查询。捕获无关紧要的查询只会给查询存储带来更多工作，并占用查询存储中更多的磁盘空间。因此，在将此设置保留为
    `ALL` 之前，请考虑这些因素。


    `SIZE_BASED_CLEANUP_MODE` 的推荐设置是将其保留为 `AUTO`，因为如果由于无法清理数据而达到 `MAX_STORAGE_SIZE_MB`，则
    `OPERATION_MODE` 将自动切换到 `READ_ONLY` 模式，使您处于无法收集新数据的状态。


    下一个您可能考虑更改的设置是 `INTERVAL_LENGTH_MINUTES`。推荐设置是默认的 60，除非您需要更精细级别的数据。在这种情况下，建议低至
    15，因为在合适的硬件上处理每秒 60,000 个事务的系统能够跟上该数据的聚合。如果您的工作负载更多是临时查询，而不是存储过程或参数化工作负载，那么您会希望将此设置保持较高，因为它会写入更多数据。


    `WAIT_STATISTICS_CAPTURE_MODE` 的推荐设置是 `ON`，因为它为您的查询提供了更多的故障排除洞察。将此设置为 `OFF` 会削弱您使用查询存储中内置的强大功能的能力，该功能可用于查看是哪些查询导致了服务器上由您的数据库引起的哪些等待统计信息。

