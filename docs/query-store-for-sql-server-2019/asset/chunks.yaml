- fmt: '# 6. Query Store Use Cases


    Query Store has different use cases that it is useful for. This chapter will go
    into detail on those use cases. We will discuss how to determine what is a normal
    workload on your database using Query Store by looking at the reports or catalog
    views and viewing changes against that baseline. Baselining a database is an essential
    skill for any DBA, and Query Store is a tool you can use to provide you with a
    baseline for your database. Sometimes you will need to identify what happened
    during a previous window of time. As a DBA you also will have to troubleshoot
    poorly performing queries or queries that have regressed in performance, and Query
    Store gives you the data to be able to do that as well. Query Store can help you
    identify the top consuming queries so you can see how to improve performance on
    the SQL Server database. Query Store can be used to capture queries after an upgrade
    of SQL Server to a different version and change the compatibility mode on each
    database later and fix any regressed queries, stabilizing upgrades of your SQL
    Server databases. Finally, we will look at how Query Store is used to track ad-hoc
    workloads and improve their performance.


    ## sys.query_store_runtime_stats_interval


    The `sys.query_store_runtime_stats_interval` catalog view is the most basic and
    smallest. It contains the start and end time of each runtime interval. Statistics
    collection intervals are in 1 minute, 5 minutes, 10 minutes, 15 minutes, 30 minutes,
    1 hour, and 1-day segments. See more in Chapter [3](#473933_1_En_3_Chapter.xhtml)
    on how to configure this setting. Table [5-9](#473933_1_En_5_Chapter.xhtml#Tab6)
    shows all the column names, data types, and descriptions for the columns in the
    `sys.query_store_runtime_stats_interval` catalog view.


    ## Conclusion


    To get the most out of Query Store, you will need to understand how the catalog
    views are related to each other and query them directly for different use cases.
    All the information you need about what is running against your SQL Server is
    contained here depending on your settings and can be customized to your specifications.
    The data is here for the harvesting, and we looked at visual ways of looking at
    this data in Chapter [4](#473933_1_En_4_Chapter.xhtml) and will look at a stored
    procedure for retrieving data in Chapter [10](#473933_1_En_10_Chapter.xhtml).


    ## Determining What Is a Normal Workload


    With Query Store turned on, you are collecting data in the `INTERVAL_LENGTH_MINUTES`
    specified when you configured Query Store as discussed in Chapter [3](#473933_1_En_3_Chapter.xhtml).
    To refresh your memory on this configuration option, the data can be aggregated
    in 1, 5, 10, 15, 60, and 1440 minute intervals. With these data points in mind,
    you can let your normal workload run against your server and view the reports
    discussed in Chapter [4](#473933_1_En_4_Chapter.xhtml) starting with the Overall
    Resource Consumption Report as seen in Figure [6-1](#473933_1_En_6_Chapter.xhtml#Fig1).


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig1_HTML.jpg](images/473933_1_En_6_Chapter/473933_1_En_6_Fig1_HTML.jpg)


    Figure 6-1: Overall Resource Consumption report


    From viewing this report, you can determine what a normal workload is for your
    database. From the report in Figure [6-1](#473933_1_En_6_Chapter.xhtml#Fig1),
    you will notice a pattern of 2 days a week where activity is low. Those happen
    to correspond to weekends which can tell us that this database is used in a company
    where less activity occurs on the weekends and most activity occurs on weekdays.
    We can also notice a pattern, where the duration is higher than normal, and logical
    reads are higher than in other periods. For those you want to click on those bars
    and drill down to the Top Resource Consuming Queries Report, we discussed in Chapter
    [4](#473933_1_En_4_Chapter.xhtml) to diagnose which queries caused those unusual
    patterns and determine if those workloads are something you need to be concerned
    about.


    Another way to get to data is to query the catalog views discussed in Chapter
    [5](#473933_1_En_5_Chapter.xhtml). The query in Listing [6-1](#473933_1_En_6_Chapter.xhtml#PC1)
    queries data from the catalog views for the last 10 days and pulls the top 10
    queries by duration.


    ```sql

    SELECT TOP 10 qt.query_sql_text,

    q.query_id,

    so.name,

    so.type,

    SUM(rs.count_executions * rs.avg_duration)

    AS ''Total Duration''

    FROM sys.query_store_query_text qt

    INNER JOIN sys.query_store_query q

    ON qt.query_text_id = q.query_text_id

    INNER JOIN sys.query_store_plan p

    ON q.query_id = p.query_id

    INNER JOIN sys.query_store_runtime_stats rs

    ON p.plan_id = rs.plan_id

    INNER JOIN sys.query_store_runtime_stats_interval rsi

    ON rsi.runtime_stats_interval_id =

    rs.runtime_stats_interval_id

    INNER JOIN sysobjects so on so.id = q.object_id

    WHERE rsi.start_time >= DATEADD(DAY, -10, GETUTCDATE())

    GROUP BY qt.query_sql_text,

    q.query_id,

    so.name,

    so.type

    ORDER BY SUM(rs.count_executions * rs.avg_duration_time) DESC

    ```


    Listing 6-1: T-SQL to top queries by duration in last 10 days


    > **Note**

    > All times are stored in UTC time so you would need to adjust the query to fit
    your time zone for data to exactly match your time zone.


    ## Establishing a Baseline for Queries


    Query Store gives you the ability to establish a baseline for the queries in your
    database. Query Store stores all the execution runtime statistics in the catalog
    view `sys.query_store_runtime_stats` so you can query this catalog view to see
    a number of statistics about how your queries have performed in the past and are
    currently performing as you work to establish a baseline to compare against. It
    is not how you would baseline your server.


    ### What Is a Baseline?


    First, let’s discuss what a baseline is. A baseline is a workload you run against
    your server that sets a starting point for comparisons against future runs of
    the same workload. In theory, you would run your workload to make any necessary
    changes to your environment; the changes could be code or hardware changes, and
    you would rerun the same workload and compare and see what metrics have changed.


    ### How to Create a Baseline with Query Store


    Establishing a baseline in Query Store involves knowing what data is being collected
    and when. When you look at the Overall Resource Consumption Report seen in Figure
    [6-1](#473933_1_En_6_Chapter.xhtml#Fig1), it can be helpful to clear Query Store
    before starting your workload to establish your baseline. Two ways to do this
    were discussed in Chapter [3](#473933_1_En_3_Chapter.xhtml). One is to right-click
    on the database, go to Properties, then the Query Store tab. As seen in Figure
    [6-2](#473933_1_En_6_Chapter.xhtml#Fig2), there is Purge Query Data that will
    clear all the data from Query Store so you can start your baseline. Be sure before
    you run your workload that your statistics collection interval is low enough to
    collect your data and you don’t have to wait too long between each interval to
    run this next workload.


    ![../images/473933_1_En_6_Chapter/473933_1_En_6_Fig2_HTML.jpg](images/473933_1_En_6_Chapter/473933_1_En_6_Fig2_HTML.jpg)


    Figure 6-2: Database properties for Query Store


    The second is to run the stored procedure in Listing [6-2](#473933_1_En_6_Chapter.xhtml#PC2).


    ```sql

    USE []

    GO

    EXEC sys.sp_query_store_flush_db;

    ```


    Listing 6-2: Store procedure to clear all the data out of Query Store


    Now we have a clean slate to capture data for our workload. To capture your workload
    so that you can replay it later, open SQL Server Profiler and pick the `TSQL_Replay`
    template and create a server-side trace as we discussed in Chapter [1](#473933_1_En_1_Chapter.xhtml).
    Now run your workload, and let Query Store capture all the data for the queries
    in the workload, and once the workload is done, stop the trace. Note the time
    period you ran your baseline workload for future comparisons. Now make your changes
    to the code or server that you want to compare. See the next section on how to
    compare the results.'
