- fmt: '## Query Store Waits


    正如我们前几章所描述的，Query Store 在设计上力求尽可能不引人注目。物理学中的观察者效应指出，对一个过程或物体的观察可能会影响该过程或物体的行为。类似地，在
    SQL Server 中，无论数据收集多么轻量级，收集信息的行为本身都会给 SQL Server 实例增加一些额外负载。可能导致 Query Store 出现问题的潜在因素数量是巨大的。这与
    SQL Server 中任何其他进程的情况相同：可用的内存量和 CPU；系统中事务的数量、大小和总量；磁盘和磁盘控制器的数量和速度；以及，坦白说，你的 T-SQL
    语句中运行的代码。这些因素中的任何一个或全部，甚至更多，都可能改变 Query Store 的行为。


    理解 Query Store 行为的第一种方法是使用等待统计信息。一般来说，等待统计信息始终是了解任何给定系统行为的通用最佳方式。如果你知道系统在等待什么，你就知道瓶颈在哪里。查看
    Query Store 中的等待有两种方式：通过传统的动态管理视图 `sys.dm_os_wait_stats`，或者，在 Azure SQL Database
    上，通过 `sys.dm_db_wait_stats`。你也可以使用 Extended Events 的 `wait_completed` 来查看等待，但这是一种非常细粒度的方法，通常不需要。我们将只关注
    DMV。


    在讨论查询 SQL Server 中的等待统计信息时，我建议你从 Paul Randal 的脚本开始。这些脚本的重要性在于它们消除了噪音，即那些毫无意义的等待统计信息。你可以在这里访问这些脚本：[`https://bit.ly/2wsQHQE`](https://bit.ly/2wsQHQE)。


    Query Store 等待统计信息有一个通用的命名约定。它们总是以 “qds_” 开头。要查看仅来自 Query Store 的等待统计信息，你需要在清单
    [9-1](#473933_1_En_9_Chapter.xhtml#PC1) 中运行此查询：


    ```sql

    SELECT dows.wait_type,

    dows.waiting_tasks_count,

    dows.wait_time_ms,

    dows.max_wait_time_ms,

    dows.signal_wait_time_ms

    FROM sys.dm_os_wait_stats AS dows

    WHERE dows.wait_type LIKE ''qds_%'';

    ```


    清单 9-1 来自 Query Store 的等待统计信息


    结果将类似于图 [9-1](#473933_1_En_9_Chapter.xhtml#Fig1)：


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig1_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig1_HTML.jpg)


    图 9-1 所有 Query Store 等待统计信息


    当然，你的系统中各列的值会有所不同，但你应该看到类似的等待列表。你通常不会孤立地查看 Query Store 等待统计信息。相反，你会查询等待统计信息并查找系统上排名靠前的等待。当这些主要的等待是
    Query Store 时，你可能正经历某种问题。


    然而，只有少数几个 Query Store 等待你可以安全地忽略。Paul Randal 也维护了一个等待统计信息库（可访问此处：[`https://bit.ly/2ePzYO2`](https://bit.ly/2ePzYO2)）。根据他的文档，目前有三种等待在涉及
    Query Store 时可以安全忽略：


    ```text

    qds_async_queue

    qds_cleanup_stale_queries_task_main_loop_sleep

    qds_shutdown_queue

    ```


    你不会简单地只查询 Query Store 的等待。相反，作为你系统上等待统计信息常规监控的一部分，你会查找上述等待，因为它们会表明 Query Store
    本身及其操作正在导致你的系统出现问题。如果你在排名前 10 的等待中看到任何 “qds_*” 等待，你会希望理解那个等待统计信息是什么，然后深入研究为什么它会在你的系统中造成问题。我们在监控
    Query Store 时深入调查的方法是使用 Extended Events。


    ## Extended Events and Query Store


    Extended Events 是对你的系统中 Query Store 行为进行详细分析的最佳方法。Extended Events 是一个相当复杂的主题，我们不打算在本书中详细解释。要开始使用
    Extended Events，我建议先阅读 Microsoft 的文档：[`https://bit.ly/2LfWMoj`](https://bit.ly/2LfWMoj)。一旦你熟悉了
    Extended Events 的工作原理，你就可以更轻松地探索使用 Extended Events 监控 Query Store 的功能。


    在撰写本文时，SQL Server 2019 中定义的 `qds`（Query Data Store）包内当前有 92 个事件。如果你想运行查询，可以轻松地列出它们，如清单
    [9-2](#473933_1_En_9_Chapter.xhtml#PC2) 所示：


    ```sql

    SELECT dxo.name,

    dxo.description

    FROM sys.dm_xe_packages AS dxp

    JOIN sys.dm_xe_objects AS dxo

    ON dxp.guid = dxo.package_guid

    WHERE dxp.name = ''qds''

    AND dxo.object_type = ''event'';

    ```


    清单 9-2 列出 Query Data Store Extended Events


    另一种访问信息的方式是通过 SQL Server Management Studio 中的 Extended Events GUI，如图 [9-2](#473933_1_En_9_Chapter.xhtml#Fig2)
    所示：


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig2_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig2_HTML.jpg)


    图 9-2 在 Extended Events 中仅选择 Query Store 事件


    这里唯一的问题是，并非所有这些事件都是活动的。其中许多，甚至可能是大多数，只能通过 Microsoft 设置的特殊标志来访问。因此，虽然你可以看到它们，甚至将它们添加到某个会话中，但它们永远不会记录任何活动。


    与其他 Extended Events 中的事件一样，Query Store 事件将具有一个名称、一个描述以及与事件关联的一组定义的列。因此，如果我们使用
    Extended Events 来监控 Query Store 的行为，我们可能感兴趣的一个事件是 `query_store_size_retention_cleanup_finished`
    事件。选择该事件后，我们就可以看到 Query Store 本身正在收集的信息，如图 [9-3](#473933_1_En_9_Chapter.xhtml#Fig3)
    所示：


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig3_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig3_HTML.jpg)


    图 9-3 由 `query_store_execution_runtime_info` 捕获的信息


    此事件中的信息代表了 Query Store 在查询完成其清理过程后捕获的数据。因此，通过这个事件，你可以观察和监控 Query Store 行为的那一部分。我们将看看几种你可以监控
    Query Store 行为的不同方法，以及一些在这方面非常有帮助的特定事件。'
  raw: '## Query Store Waits


    By design, as we described in the first couple of chapters, Query Store is designed
    to be as unobtrusive as possible. In physics, the observer effect says that observation
    of a process or object can affect the behavior of that process or object. Similarly
    in SQL Server, however lightweight the data collection, the act of collecting
    information is adding some additional load to your SQL Server instance. The number
    of possible factors that can lead to issues with the Query Store is huge. It is
    the same list as any other process within SQL Server: the amount of memory and
    CPU you have available; the number, size, and volume of the transactions in your
    system; the number and speed of your disks and disk controllers, and, frankly,
    the code running in your T-SQL statements. Any or all of these and more can change
    the behavior of Query Store.


    The first way we can understand Query Store behavior is to use the wait statistics.
    Generally speaking, wait statistics are always the best way to gain a general
    understanding of the behavior of any given system. If you know what the system
    is waiting on, you know where your bottlenecks are. There are two ways to look
    at waits in the Query Store, through the traditional dynamic management view,
    sy.dm_os_wait_stats, or, on Azure SQL Database, sys.dm_db_wait_stats. You can
    also use Extended Events wait_completed to see waits, but that’s a very granular
    approach and won’t generally be needed. We’ll focus only on the DMV.


    When talking about querying the wait statistics within SQL Server, I recommend
    you start with Paul Randal’s scripts. The import of these scripts is that they
    eliminate the noise, the wait statistics that never mean anything. You can access
    those scripts here: [`https://bit.ly/2wsQHQE`](https://bit.ly/2wsQHQE) .


    Query Store wait statistics have a common naming convention. They always start
    with “qds_”. To see just the wait statistics coming from Query Store, you would
    run this query in Listing [9-1](#473933_1_En_9_Chapter.xhtml#PC1):


    ```

    SELECT dows.wait_type,

    dows.waiting_tasks_count,

    dows.wait_time_ms,

    dows.max_wait_time_ms,

    dows.signal_wait_time_ms

    FROM sys.dm_os_wait_stats AS dows

    WHERE dows.wait_type LIKE ''qds_%'';

    Listing 9-1

    Wait Statistics coming from Query Store

    ```


    The results would look something like Figure [9-1](#473933_1_En_9_Chapter.xhtml#Fig1):


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig1_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    All the Query Store wait statistics


    Of course, your system will have different values in each of the columns, but
    you should see a similar list of waits. You would not normally look at the Query
    Store wait statistics in isolation. Instead, you would query the wait statistics
    and look for the top ones on your system. When those top waits are Query Store,
    you’re likely experiencing some sort of issue.


    However, there are just a few Query Store waits that you can safely ignore. Paul
    Randal also maintains a library of wait statistics (accessible here: [`https://bit.ly/2ePzYO2`](https://bit.ly/2ePzYO2)
    ). Based on his documentation, there are three waits, currently, that you can
    safely ignore when it comes to Query Store:


    ```

    qds_async_queue

    qds_cleanup_stale_queries_task_main_loop_sleep

    qds_shutdown_queue

    ```


    You would not simply query for the Query Store waits. Instead, as part of your
    normal monitoring of wait statistics on your system, you would look for the waits
    above because they would indicate Query Store itself, its operations, is leading
    to issues on your system. If you see any of the “qds_∗” waits in your top 10,
    you would want to understand what that wait statistics is and then drill down
    on why it’s causing problems for you in your system. The way we drill down when
    monitoring Query Store is to use Extended Events.


    ## Extended Events and Query Store


    Extended Events are the best method to do a detailed analysis of the behavior
    of Query Store in your systems. Extended Events are a fairly dense topic that
    we’re not going to try to explain in detail in this book. To get started with
    Extended Events, I suggest first the Microsoft documentation here: [`https://bit.ly/2LfWMoj`](https://bit.ly/2LfWMoj)
    . Once you’re comfortable with how Extended Events works, you can more easily
    explore the capabilities of monitoring Query Store using Extended Events.


    At this writing, there are currently 92 events within the qds, Query Data Store,
    package defined within SQL Server 2019\. You can easily list them if you want
    to run a query as follows in Listing [9-2](#473933_1_En_9_Chapter.xhtml#PC2):


    ```

    SELECT dxo.name,

    dxo.description

    FROM sys.dm_xe_packages AS dxp

    JOIN sys.dm_xe_objects AS dxo

    ON dxp.guid = dxo.package_guid

    WHERE dxp.name = ''qds''

    AND dxo.object_type = ''event'';

    Listing 9-2

    List Query Data Store Extended Events

    ```


    Another way to access the information is through the Extended Events GUI within
    SQL Server Management Studio as shown in Figure [9-2](#473933_1_En_9_Chapter.xhtml#Fig2):


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig2_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Selecting only the Query Store events in Extended Events


    The only issue here is that not all these events are active. Many of them, maybe
    even most of them, are only accessible through special flags set by Microsoft.
    So, while you can see them, even add them to a session, no activity will ever
    be recorded by them.


    As is normal with every other event in Extended Events, the Query Store events
    will have a name, a description, and a defined set of columns associated with
    the event. So, if we were to monitor the behavior of Query Store using Extended
    Events, one event we might be interested in is the query_store_size_retention_cleanup_finished
    event. Selecting that event, we can then see the information that Query Store
    itself is gathering as you can see in Figure [9-3](#473933_1_En_9_Chapter.xhtml#Fig3):


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig3_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    The information captured by query_store_execution_runtime_info


    The information in this event represents the data that the Query Store is capturing
    after a query completes its cleanup process. So, with this event, you could observe
    and monitor that part of the behavior of the Query Store. We’re going to look
    at a couple of different ways you can monitor Query Store behavior and some very
    particular events that aid in that regard.'
  trans: '## Query Store Waits


    正如我们前几章所描述的，Query Store 在设计上力求尽可能不引人注目。物理学中的观察者效应指出，对一个过程或物体的观察可能会影响该过程或物体的行为。类似地，在
    SQL Server 中，无论数据收集多么轻量级，收集信息的行为本身都会给 SQL Server 实例增加一些额外负载。可能导致 Query Store 出现问题的潜在因素数量是巨大的。这与
    SQL Server 中任何其他进程的情况相同：可用的内存量和 CPU；系统中事务的数量、大小和总量；磁盘和磁盘控制器的数量和速度；以及，坦白说，你的 T-SQL
    语句中运行的代码。这些因素中的任何一个或全部，甚至更多，都可能改变 Query Store 的行为。


    理解 Query Store 行为的第一种方法是使用等待统计信息。一般来说，等待统计信息始终是了解任何给定系统行为的通用最佳方式。如果你知道系统在等待什么，你就知道瓶颈在哪里。查看
    Query Store 中的等待有两种方式：通过传统的动态管理视图 `sys.dm_os_wait_stats`，或者，在 Azure SQL Database
    上，通过 `sys.dm_db_wait_stats`。你也可以使用 Extended Events 的 `wait_completed` 来查看等待，但这是一种非常细粒度的方法，通常不需要。我们将只关注
    DMV。


    在讨论查询 SQL Server 中的等待统计信息时，我建议你从 Paul Randal 的脚本开始。这些脚本的重要性在于它们消除了噪音，即那些毫无意义的等待统计信息。你可以在这里访问这些脚本：[`https://bit.ly/2wsQHQE`](https://bit.ly/2wsQHQE)。


    Query Store 等待统计信息有一个通用的命名约定。它们总是以 “qds_” 开头。要查看仅来自 Query Store 的等待统计信息，你需要在清单
