  trans: '

    ## 查询存储收集的数据


    正如本章开头所述，定义查询存储收集的数据本质上包含三组信息：查询与计划数据、运行时数据以及等待统计信息。正如你在前一节所见，运行时数据和等待统计信息的收集方式相同，那么为何要将它们分开呢？原因很简单，本书的重点是
    SQL Server 2019，但查询存储功能自 SQL Server 2016 起便已实现。2016 版与 2017 版之间的一个变化，就是在数据收集中添加了等待统计信息。因此，我们将其分开讲解，是为了让那些只接触运行时信息的读者，也能从本书中获得与同时查看运行时数据和等待统计信息的读者同样多的收获。此外，你需要计划以与查询运行时数据略有不同的方式来查询等待统计信息，但我们将在第
    5 章详细讨论这一点。


    关于显示查询存储信息的系统视图，必须说明一点：这些系统视图中显示的信息是**合并**了存储在磁盘和内存中的信息，但并未进行**聚合**。正如你从本章前面内容所知，数据首先写入内存，然后最终写入磁盘。在这个时间间隔内，运行时数据会在这两个地方分别聚合，但在某些目录视图中会显示为单独的行。你无需手动合并这些数据，SQL
    Server 会为你完成。然而，你也无法将它们分开，因为这是在系统层面完成的。


    让我们从关于查询本身和查询计划所收集的数据开始。


    ### 查询与查询计划信息


    正如我们之前所述，查询存储所收集信息的基础是查询本身。你可能提交一个包含五条或十条语句的批处理，但这些语句中的每一条（假设它们都是数据操作语句）在查询存储中都将被视为单独的查询。暴露查询存储可用信息的目录视图如图
    2-4 所示：


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig4_HTML.png](img/473933_1_En_2_Fig4_HTML.png)


    图 2-4：包含查询和查询计划信息的目录视图


    只有四个目录视图会公开存储在查询和查询计划上的信息。在顶部中央，你可以看到 `sys.query_store_query`。在图中，仅展示了其 30 列中的一小部分作为可用信息的示例。每个查询都具有一些属性，这些属性可能对该查询是唯一的，也可能不是。这些属性就是位于
    `sys.query_store_query` 左右两侧的表：`sys.query_store_context_settings` 和 `sys.query_store_query_text`。这些属性可以创建一次，然后被多个查询重用。这包括查询文本。如果其他属性发生变化，但查询文本保持不变，那么
    `sys.query_store_query` 中的多个查询可能会拥有相同的 `query_text_id` 值（`query_id` 是主键）。存储在 `sys.query_store_plan`
    中的查询计划通过 `query_id` 上的外键直接与查询关联。任何给定的查询都可能拥有多个计划。诸如参数探测等情况会导致一个给定的查询拥有多个有效的执行计划。图
    2-4 中所示的 `sys.query_store_plan` 表也仅包含了其 23 个可用列中的一部分示例。


    我们将在第 5 章详细讲解如何查询这些表。然而，值得指出的是，某些信息可能有点误导性。如果你查看图 2-4 中所示的 `sys.query_store_query`
    和 `sys.query_store_plan`，两者都有一个名为 `count_compiles` 的列。虽然这些值的标签相同，但它们实际上分别代表了一个查询或一个计划的一次编译或重新编译事件的结果差异。每次查询被编译或重新编译时，该值都会相应地更新。然而，该编译事件可能产生也可能不产生相同的计划。如果编译出一个不同的计划，那么该计划将更新其自身独特的
    `count_compiles` 值，而不是更新与该查询关联的每一个计划。类似这样的细节我们将在全书中陆续探讨。


    存储在 `sys.query_store_plan` 中的数据行实际上充当了所收集运行时数据的驱动器。现在让我们来看一下这些信息。


    ### 运行时信息


    运行时数据实际上基于两个不同的值进行聚合：上一节提到的 `plan_id` 以及我们之前讨论过的运行时间隔（默认为 60 分钟）。图 2-5 展示了所捕获的信息：


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig5_HTML.png](img/473933_1_En_2_Fig5_HTML.png)


    图 2-5：包含运行时信息的目录视图


    这个模型看起来简化了不少，但它掩盖了一些值得注意的复杂性。首先，`sys.query_store_runtime_stats` 目录视图仅显示了构成该视图的
    58 列中的一小部分。其中许多数据的布局类似于你看到的持续时间值：平均值、最小值、最大值和标准差。这对于诸如 CPU 时间、行数、内存等有趣的数据同样适用。


    处理运行时数据时需要记住的第二件最重要的事情是，它根据运行时间隔被拆分为多个聚合。因为你不太可能在整点开启查询存储，所以 `sys.query_store_runtime_stats_interval`
    系统视图将包含每个间隔的 `start_time` 和 `end_time`。虽然这些间隔时长是恰当的（默认为 60 分钟），但开始和结束时间并不会与时钟时间完全吻合。


    另一件需要记住的事情是，处理此信息时需要考虑多个时间值。除了运行时间隔，还有刷新到磁盘的时间（默认为 15 分钟）。这意味着对于任何给定的 `plan_id`，磁盘上可能跨多个时间间隔存在数据，同时内存中也可能存在数据。


    此外，`execution_type` 也会影响收集的信息。此列有三个值：


    *   0 – 成功执行

    *   3 – 用户中止执行

    *   4 – 导致执行中止的异常或错误


    在查询因任何原因被中止的情况下，运行时数据仍会被收集。但是，它会被聚合成给定 `plan_id` 和给定 `runtime_stats_interval_id`
    的一个单独值。鉴于这一点，以及内存和磁盘之间可能存在多行运行时数据的事实，当你开始针对此数据编写自己的查询时，你需要基于 `plan_id`、`execution_type`
    和 `runtime_stats_interval_id` 进行聚合。

    '
- fmt: '# 3. Configuring Query Store


    As with any SQL Server feature, maximizing its potential involves tuning that
    feature for your specific environment. Common advice would be to begin with the
    defaults, then compare these with commonly agreed best practices and adjust those
    to what makes sense for your use case if necessary. Often there will be a widely
    accepted set of best practices within the community for typical deviations from
    Microsoft defaults. Sometimes defaults that appear “dumb” are often set that way,
    not because Microsoft is ignorant of its product or user base but for backward
    compatibility reasons.


    In this chapter, we will discuss the steps for implementing and configuring the
    Query Store feature. We will cover the default configuration both on-premise and
    in the Azure SQL Database Platform as a Service (PaaS) offering. There will be
    a detailed breakdown of all the Query Store configuration options and the Query
    Store catalog views related to the configuration (for a list of all the Query
    Store–related catalog views, look to Chapter 5).


    After this, we will commence a deep dive into best practices for configuring the
    Query Store. We will talk about how parameterization and parameterization settings
    can impact Query Store as well as the impact of renaming objects. Trace flags
    to improve recovery times and important performance-related patches for versions
    2016 and 2017 will also be highlighted.


    For those of you leveraging the capabilities of In-Memory OLTP, the use of Query
    Store with natively compiled stored procedures will be covered. We will also discuss
    an exciting new feature introduced in SQL 2017, known as automatic plan regression
    correction (APRC). What it entails and how to enable or disable it will be covered.


    We will close the chapter with a discussion of the various query store error states
    and details on how to maintain the Query Store as a DBA.


    ## Wait Statistics


    We’ve separated the wait statistics from the runtime information only because
    some people using this book may be on SQL Server 2016. Figure 2-6 shows the layout
    of the information gathered for the wait statistics:


    ![../images/473933_1_En_2_Chapter/473933_1_En_2_Fig6_HTML.png](images/473933_1_En_2_Chapter/473933_1_En_2_Fig6_HTML.png)


    Figure 2-6: Catalog views contain wait statistics


    Just like with the runtime information, the wait statistics are aggregated by
    the runtime interval. Also, like the runtime information, wait statistics are
    dependent on the flush to disk interval, a default of 15 minutes, so will be aggregated
    in two locations. Again, like the runtime information, the `execution_type` also
    affects the aggregation of the wait statistics. Finally, the wait statistics add
    one more wrinkle. There is a `wait_category` that must be taken into account when
    aggregating the data across time intervals and `execution_types`. We’ll be covering
    all this in more detail in Chapter 5.


    You can also see that there is a similar pattern to the data with a minimum, maximum,
    last, average, and standard deviation being stored. However, the wait time is
    the only interesting value. I left off a couple of descriptive columns in Figure
    2-6 to save space. The rest of the information there is the important data for
    wait statistics.


    ## Information About the Query Store


    There is actually one final catalog view that we should mention, although the
    details of what it represents will be covered in Chapter 3. That view is `sys.database_query_store_options`.
    While it does represent some of the information gathered about the Query Store,
    it is not the focus of this chapter.


    ## Summary


    The principal driving factor of the methodology of collecting query store data
    is to do so in as unobtrusive a way as possible. All the asynchronous calls between
    the storage of the information to memory and disk make that abundantly clear.
    However, once the data is stored to disk, it lives with the database and will
    be available, wherever that database goes, until it is removed from another process,
    such as automatic cleanup, or by you manually removing the information. In Chapter
    3, we’ll finally get going with starting, stopping, and controlling the Query
    Store.


    ## Query Store Defaults


    In this section, we will look at the default configuration options for the Query
    Store in SQL Server. Default options in SQL Server are not always the optimal
    configuration setting for your environment, but changing them does merit careful
    consideration. An important point to note is that the Query Store is disabled
    by default in the on-premise product for versions 2016, 2017, and 2019 at time
    of this writing. However, in the Microsoft Platform as a Service (PaaS) offering
    Azure SQL Database, it is enabled by default. For Azure SQL Database Managed Instances,
    a managed Infrastructure as a Service (IaaS) offering, the Query Store is supported
    but also disabled by default.


    To enable Query Store, run the following T-SQL command in Listing 3-1:


    ```sql

    ALTER DATABASE [] SET QUERY_STORE=ON;

    ```

    Listing 3-1: T-SQL to enable Query Store on a database


    To enable Query Store on all databases on your instance you can run the code in
    Listing 3-2:


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(N''ALTER DATABASE [{{DBNAME}}] SET QUERY_STORE=ON '',

    ''{{DBName}}'', [name])

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND [name] NOT IN (''master'', ''tempdb'')

    ORDER BY [name];

    EXEC (@SQL);

    ```

    Listing 3-2: Turn Query Store on all databases


    The Query Store cannot be enabled in either the `master` or the `tempdb` system
    databases. Enabling the Query Store in the *model* database does not actually
    capture any Query Store data in the *model* database, but this configuration change
    will be reflected in newly created databases from that point forward. In the `msdb`
    system database, the Query Store will behave no differently than the Query Store
    in a user database. A table of options for Azure SQL Database and regular on-premise
    SQL server is presented in Table 3-1.


    Table 3-1: Configuration options for Query Store


    | **Configuration Name** | **Options** | **Description** | **Default** |

    | --- | --- | --- | --- |

    | `OPERATION_MODE` | `OFF`, `READ_WRITE`, `READ_ONLY` | Mode of operation for
    the Query Store | `OFF` (SQL 2016 and 2016), `READ_WRITE` for Azure SQL Database
    |

    | `CLEANUP_POLICY(STALE_QUERY_THRESHOLD_DAYS)` | `BIGINT` | Dictates `CLEAN_UP`
    policy (0 is never) | 30 days (or 7 for Azure SQL Database Basic Edition) |

    | `DATA_FLUSH_INTERVAL_SECONDS` | `BIGINT` | Flush interval frequency for buffered
    Query Store data | 900 (15 minutes) |

    | `MAX_STORAGE_SIZE_MB` | `BIGINT` | The maximum size of Query Store in MB | 100
    (SQL Server 2016 and 2017), 1000 (SQL Server 2019), (1024 for SQL Azure Database
    Premium and 10 for SQL Azure Database Basic Edition) |

    | `INTERVAL_LENGTH_MINUTES` | `1`, `5`, `10`, `15`, `30`, `60`, or `1440` | Aggregation
    interval for statistics | 60 |

    | `SIZE_BASED_CLEANUP_MODE` | `AUTO`, `OFF` | Attempt to clean up if approaching
    capacity | `AUTO` |

    | `QUERY_STORE_CAPTURE_MODE` | `AUTO`, `ALL`, `CUSTOM`, `NONE` | Query capturing
    behavior | `AUTO` (SQL Server 2016 and 2017), `ALL` (SQL Server 2019), `ALL` (Azure
    SQL Database) |

    | `MAX_PLANS_PER_QUERY` | `INT` | How many distinct plans to keep per query |
    200. Not available in SQL Server 2016 |

    | `WAIT_STATISTICS_CAPTURE_MODE` | `ON`, `OFF` | Specifies rather to capture wait
    statistics for queries | `ON` in SQL Server 2017 and 2019 and Azure SQL Database.
    Not available in SQL Server 2016 |'
