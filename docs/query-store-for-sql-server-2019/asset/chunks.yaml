- fmt: '## Regressed Queries Report


    The first report we will look at is the Regressed Queries report. This report
    displays information on which queries over the specified period have started degrading
    in performance. There are several things you can do to navigate around inside
    of these reports, but first let’s take a glance at this report in Figure [4-2](#473933_1_En_4_Chapter.xhtml#Fig2).


