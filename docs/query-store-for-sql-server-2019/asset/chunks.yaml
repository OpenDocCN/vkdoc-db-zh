    Column listing and descriptions for sys.query_store_plan'
  raw: '## sys.query_context_settings


    The `sys.query_context_settings` catalog view holds the context settings that
    the queries in Query Store were running with such `ANSI_NULLS` or `QUOTED_IDENTIFIER`.
    If different context settings are used with the same query, you will end up with
    different plans in Query Store. A bit mask is stored in the `set_options` field
    to tell us which options were used when a query was run. There are two ways to
    view the set options for a query. The first is to use the Dynamic Management Function
    `sys.dm_exec_plan_atttibutes` and pass in the plan_handle. This method only works
    if the plan is still in the plan cache. In Listing [5-2](#473933_1_En_5_Chapter.xhtml#PC2)
    you can retrieve a `plan_handle` or `context_settings_id` for a particular query
    by narrowing down your selection by feeling part of the query in the `WHERE` clause
    in the `<value>` placeholder.


    ```

    SELECT

    q.query_id,

    qt.query_sql_text,

    qs.plan_handle,

    q.context_settings_id

    FROM sys.query_store_query q

    INNER JOIN sys.dm_exec_query_stats qs

    ON q.last_compile_batch_sql_handle =

    qs.sql_handle

    INNER JOIN sys.query_store_query_text qt

    ON q.query_text_id = qt.query_text_id

    INNER JOIN sys.query_context_settings cs

    ON cs.context_settings_id = q.context_settings_id

    WHERE qt.query_sql_text LIKE ''%%''

    ORDER BY q.query_id

    Listing 5-2

    Query to retrieve a plan handle from cache

    ```


    Next, you copy the plan handle for the query you want to see the set options for
    and put in Listing [5-3](#473933_1_En_5_Chapter.xhtml#PC3) replacing `<plan_handle>`
    in the listing.


    ```

    SELECT *

    FROM sys.dm_exec_plan_attributes()

    WHERE attribute = ''set_options''

    Listing 5-3

    Retrieve set options for a plan handle

    ```


    Second, you can create a function then you can query a record from the catalog
    view and use the context_settings_id returned in Listing [5-2](#473933_1_En_5_Chapter.xhtml#PC2)
    as the `@SetOptions` value to view the set options that were used as seen in Listing
    [5-4](#473933_1_En_5_Chapter.xhtml#PC4).


    ```

    CREATE FUNCTION fn_QueryStoreSetOptions (@SetOptions as int)

    RETURNS VARCHAR(MAX)

    AS

    BEGIN

    DECLARE @Result VARCHAR(MAX)=",

    @SetOptionFound INT

    DECLARE @SetOptionsList TABLE

    (

    [Value] INT,

    [Option] VARCHAR(60)

    )

    INSERT INTO @SetOptionsList

    VALUES

    (1,''ANSI_PADDING''),

    (2,''Parallel Plan''),

    (4, ''FORCEPLAN''),

    (8, ''CONCAT_NULL_YIELDS_NULL''),

    (16, ''ANSI_WARNINGS''),

    (32, ''ANSI_NULLS''),

    (64, ''QUOTED_IDENTIFIER''),

    (128, ''ANSI_NULL_DFLT_ON''),

    (256, ''ANSI_NULL_DFLT_OFF''),

    (512, ''NoBrowseTable''),

    (1024, ''TriggerOneRow''),

    (2048, ''ResyncQuery''),

    (4096,''ARITH_ABORT''),

    (8192,''NUMERIC_ROUNDABORT''),

    (16384,''DATEFIRST''),

    (32768,''DATEFORMAT''),

    (65536,''LanguageID''),

    (131072,''UPON''),

    (262144,''ROWCOUNT'')

    SELECT TOP 1 @SetOptionFound = ISNULL([Value], -1),

    @Result = ISNULL([Option] , '''') + ''; ''

    FROM @SetOptionsList

    WHERE [Value]  -1 THEN

    dbo.fn_QueryStoreSetOptions(@SetOptions –

    @SetOptionFound)

    ELSE ''''

    END

    END

    GO

    Listing 5-4

    Function to retrieve SET options for queries executed

    ```


    Next, we need to query the `sys.query_context_settings` catalog view and `CAST`
    the `set_options` column to an `INT` value to parse the `SET` options as seen
    in Listing [5-5](#473933_1_En_5_Chapter.xhtml#PC5). You can see an example of
    the output of the results in Figure [5-1](#473933_1_En_5_Chapter.xhtml#Fig1).


    ![../images/473933_1_En_5_Chapter/473933_1_En_5_Fig1_HTML.jpg](images/473933_1_En_5_Chapter/473933_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Set options query results


    ```

    SELECT dbo.fn_QueryStoreSetOptions(CAST(set_options as int))

    FROM sys.query_context_settings

    Listing 5-5

    Query to return SET options for a query executed

    ```


    Table [5-2](#473933_1_En_5_Chapter.xhtml#Tab2) displays all the column names,
    data types, and descriptions for the columns in the `sys.query_context_settings`
    catalog view.


    Table 5-2


    Column listing and descriptions for sys.query_context_settings


    | Column name | Data type | Description |

    | --- | --- | --- |

    | context_settings_id | bigint | Primary key. This value is in the Showplan XML
    queries for reference |

    | set_options | varbinary(8) | Bit mask reflecting `SET` options. Values for bit
    mask values are calculated using the following:1 – `ANSI_PADDING`2 – Parallel
    Plan4 – `FORCEPLAN`8 – `CONCAT_NULL_YIELDS_NULL`16 – `ANSI_WARNINGS`32 – `ANSI_NULLS`64 –
    `QUOTED_IDENTIFIER`128 – `ANSI_NULL_DFLT_ON`256 – `ANSI_NULL_DFLT_OFF`512 – NoBrowseTable1024 –
    TriggerOneRow2048 – ResyncQuery4096 – `ARITH_ABORT`8192 – `NUMERIC_ROUNDABORT`16384 –
    `DATEFIRST`32768 – `DATEFORMAT`65536 – LanguageID131072 – `UPON`262144 – `ROWCOUNT`
    |

    | language_id | smallint | The ID of the language. Look for more information online
    by looking at the `sys.languages` table |

    | date_format | smallint | The date format. See the `SET DATEFORMAT` command for
    more information |

    | date_first | smallint | The date first value. See the `SET DATEFIRST` command
    for more information |

    | status | varbinary(2) | Bit mask field indicating the type of query or context
    in which it was executed. Value can be any combination of flags in hexadecimal:0x0 –
    regular query (no specific flags)0x1 – query that was executed through on or the
    cursor APIs’ stored procedures0x2 – query for notification0x4 – internal query0x8 –
    auto parameterized query without universal parameterization0x10 – cursor fetch
    refresh query0x20 – a query that is being used in cursor update requests0x40 –
    initial result set is returned when a cursor is opened (Cursor Auto Fetch)0x80 –
    encrypted query0x100 – query in context of row-level security predicate |

    | required_cursor_options | int | Options specified for cursor |

    | acceptable_cursor_options | int | Options SQL Server may implicitly convert
    a cursor to support the execution of the statement |

    | merge_action_type | smallint | A `MERGE` statement trigger execution plan is
    used. Valid values are as follows:0 – no trigger or executes as a `DELETE` action.1 –
    `INSERT` plan.2 – `UPDATE` plan.3 – `DELETE` plan with the addition of an `INSERT`
    or `UPDATE` action |

    | default_schema_id | int | ID of the default schema, which is used to resolve
    names that are not fully qualified names |

    | is_replication_specific | bit | Used for replication |

    | is_contained | varbinary(1) | 1 indicates a contained database |


    ## sys.query_store_plan


    The `sys.query_store_plan` catalog view stores the query plan associated with
    each query in Query Store. The most important column in this catalog view is the
    `query_plan` column as it shows you the execution plan that was stored for the
    query. You can copy and paste this into an editor of your choice and save with
    a .sqlplan extension and open with SSMS to view the graphical execution plan.
    Two other interesting columns are the engine_version and compatibility_level columns.
    The `engine_version` column lets us know what the exact version of SQL Server
    that was running when the query plan was captured. This is useful for troubleshooting
    plan regression due to upgrades. The `compatibility_level` column tells which
    compatibility level the query was ran under. This is useful when upgrading as
    well but especially when going from a compatibility level below SQL Server 2014
    to SQL Server 2014 and up due to the cardinality estimator (CE) changes made in
    SQL Server 2014\. Table [5-3](#473933_1_En_5_Chapter.xhtml#Tab3) displays all
    the column names, data types, and descriptions for the columns in the `sys.query_store_plan`
    catalog view.


    Table 5-3


    Column listing and descriptions for sys.query_store_plan'
