- fmt: '## sys.query_context_settings


    `sys.query_context_settings` 目录视图保存查询存储中查询运行时所使用的上下文设置，例如 `ANSI_NULLS` 或 `QUOTED_IDENTIFIER`。如果相同的查询使用了不同的上下文设置，你会在查询存储中得到不同的执行计划。`set_options`
    字段存储了一个位掩码，用于告诉我们查询运行时使用了哪些选项。有两种方法可以查看查询的设置选项。第一种是使用动态管理函数 `sys.dm_exec_plan_attributes()`
    并传入 `plan_handle`。此方法仅当执行计划仍在计划缓存中时才有效。在清单 [5-2](#473933_1_En_5_Chapter.xhtml#PC2)
    中，你可以通过 `WHERE` 子句中的 `<value>` 占位符缩小选择范围，从而检索特定查询的 `plan_handle` 或 `context_settings_id`。


    ```sql

    SELECT

    q.query_id,

    qt.query_sql_text,

    qs.plan_handle,

    q.context_settings_id

    FROM sys.query_store_query q

    INNER JOIN sys.dm_exec_query_stats qs

    ON q.last_compile_batch_sql_handle =

    qs.sql_handle

    INNER JOIN sys.query_store_query_text qt

    ON q.query_text_id = qt.query_text_id

    INNER JOIN sys.query_context_settings cs

    ON cs.context_settings_id = q.context_settings_id

    WHERE qt.query_sql_text LIKE ''%%''

    ORDER BY q.query_id

    Listing 5-2

    Query to retrieve a plan handle from cache

    ```


    然后，复制你想要查看设置选项的查询的计划句柄，并替换清单 [5-3](#473933_1_En_5_Chapter.xhtml#PC3) 中的 `<plan_handle>`。


    ```sql

    SELECT *

    FROM sys.dm_exec_plan_attributes(<plan_handle>)

    WHERE attribute = ''set_options''

    Listing 5-3

    Retrieve set options for a plan handle

    ```


    第二种方法是创建一个函数，然后你可以从目录视图中查询一条记录，并使用清单 [5-2](#473933_1_En_5_Chapter.xhtml#PC2) 中返回的
    `context_settings_id` 作为 `@SetOptions` 值，以查看所使用的设置选项，如清单 [5-4](#473933_1_En_5_Chapter.xhtml#PC4)
    所示。


    ```sql

    CREATE FUNCTION fn_QueryStoreSetOptions (@SetOptions as int)

    RETURNS VARCHAR(MAX)

    AS

    BEGIN

    DECLARE @Result VARCHAR(MAX)=",

    @SetOptionFound INT

    DECLARE @SetOptionsList TABLE

    (

    [Value] INT,

    [Option] VARCHAR(60)

    )

    INSERT INTO @SetOptionsList

    VALUES

    (1,''ANSI_PADDING''),

    (2,''Parallel Plan''),

    (4, ''FORCEPLAN''),

    (8, ''CONCAT_NULL_YIELDS_NULL''),

    (16, ''ANSI_WARNINGS''),

    (32, ''ANSI_NULLS''),

    (64, ''QUOTED_IDENTIFIER''),

    (128, ''ANSI_NULL_DFLT_ON''),

    (256, ''ANSI_NULL_DFLT_OFF''),

    (512, ''NoBrowseTable''),

    (1024, ''TriggerOneRow''),

    (2048, ''ResyncQuery''),

    (4096,''ARITH_ABORT''),

    (8192,''NUMERIC_ROUNDABORT''),

    (16384,''DATEFIRST''),

    (32768,''DATEFORMAT''),

    (65536,''LanguageID''),

    (131072,''UPON''),

    (262144,''ROWCOUNT'')

    SELECT TOP 1 @SetOptionFound = ISNULL([Value], -1),

    @Result = ISNULL([Option] , '''') + ''; ''

    FROM @SetOptionsList

    WHERE [Value]  -1 THEN

    dbo.fn_QueryStoreSetOptions(@SetOptions –

    @SetOptionFound)

    ELSE ''''

    END

    END

    GO

    Listing 5-4

    Function to retrieve SET options for queries executed

    ```


    接下来，我们需要查询 `sys.query_context_settings` 目录视图，并将 `set_options` 列 `CAST` 为 `INT`
    值，以解析 `SET` 选项，如清单 [5-5](#473933_1_En_5_Chapter.xhtml#PC5) 所示。你可以在图 [5-1](#473933_1_En_5_Chapter.xhtml#Fig1)
    中看到结果输出的示例。


    ![../images/473933_1_En_5_Chapter/473933_1_En_5_Fig1_HTML.jpg](images/473933_1_En_5_Chapter/473933_1_En_5_Fig1_HTML.jpg)


    图 5-1

    Set options query results


    ```sql

    SELECT dbo.fn_QueryStoreSetOptions(CAST(set_options as int))

    FROM sys.query_context_settings

    Listing 5-5

    Query to return SET options for a query executed

    ```


    表 [5-2](#473933_1_En_5_Chapter.xhtml#Tab2) 显示了 `sys.query_context_settings` 目录视图中所有列的名称、数据类型和描述。


    表 5-2

    Column listing and descriptions for sys.query_context_settings


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `context_settings_id` | `bigint` | 主键。此值用于 Showplan XML 查询中以供参考 |

    | `set_options` | `varbinary(8)` | 反映 `SET` 选项的位掩码。位掩码的值通过以下方式计算：1 – `ANSI_PADDING`2 –
    Parallel Plan4 – `FORCEPLAN`8 – `CONCAT_NULL_YIELDS_NULL`16 – `ANSI_WARNINGS`32 –
    `ANSI_NULLS`64 – `QUOTED_IDENTIFIER`128 – `ANSI_NULL_DFLT_ON`256 – `ANSI_NULL_DFLT_OFF`512 –
    NoBrowseTable1024 – TriggerOneRow2048 – ResyncQuery4096 – `ARITH_ABORT`8192 –
    `NUMERIC_ROUNDABORT`16384 – `DATEFIRST`32768 – `DATEFORMAT`65536 – LanguageID131072 –
    `UPON`262144 – `ROWCOUNT` |

