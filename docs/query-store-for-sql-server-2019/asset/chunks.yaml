    and how to track those. You may also need to remove plans and queries from Query
    Store. Finally, you may need to reset the wait statistics.


    ### Monitoring Desired vs. Actual State


    First, to maintain Query Store, you will want to make sure the `desired_state`
    and the `actual_state` of Query Store match. You can run the code in Listing [3-23](#473933_1_En_3_Chapter.xhtml#PC23)
    to check in single database or the code in Listing [3-24](#473933_1_En_3_Chapter.xhtml#PC24)
    to check all the databases in Query Store enabled on your instance.


    ```

    DECLARE @SQL NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(REPLACE(N''USE [{{DBName}}];

    SELECT

    "{{DBName}}" database_name,

    actual_state_desc,

    desired_state_desc

    FROM {{DBName}}.sys.database_query_store_options

    WHERE desired_state_desc  actual_state_desc ''

    ,''{{DBName}}'', [name])

    ,''"'', "")

    FROM sys.databases

    WHERE is_query_store_on = 1

    ORDER BY [name];

    EXEC (@SQL);

    Listing 3-24

    T-SQL to check Query Store’s desired state vs. actual state on all databases

    ```


    ```

    SELECT DB_NAME() database_name,

    actual_state_desc,

    desired_state_desc

    FROM sys.database_query_store_options

    WHERE desired_state_desc  actual_state_desc

    Listing 3-23

    T-SQL to check Query Store’s desired state vs. actual state

    ```


    #### Query Store Read-Only States


    Query Store can enter the READ_ONLY state from READ_WRITE without telling for
    a number of reasons. The reason is stored in the `readonly_reason` as a bit map
    in the `sys.query_store_options` catalog view. In Table [3-2](#473933_1_En_3_Chapter.xhtml#Tab2)
    you will find a list of the reasons.


    Table 3-2


    *Query Store* *read-only state* *reasons*


    | readonly_reason bit map | Description |

    | --- | --- |

    | 1 | Database is in read-only mode |

    | 2 | Database is in single-user mode |

    | 4 | Database is in emergency mode |

    | 8 | Database is a secondary replica (Always On and Azure SQL Database geo-replication)
    |

    | 65536 | Reached limit set by MAX_STORAGE_SIZE_MB |

    | 131072 | The number of different statements has reached memory limit. In this
    case you should consider remove queries from the Query Store or upgrading service
    tierApplies to Azure SQL Database |

    | 262144 | In-memory size limit has been hit. Items will be persisted to disk
    until space is freed up in memory. Query Store will be temporarily in read-only
    modeApplies to Azure SQL Database |

    | 524288 | Database has reached disk size limit so Query Store can no longer growApplies
    to Azure SQL Database |


    #### How to Fix Query Store in Error State


    Starting in SQL Server 2017, Query Store can enter an error state. This can cause
    potential performance problems when you depend on manual plan forcing or auto
    plan regression correction. This is a rare race condition that can occur without
    you knowing. The recommended fix is to first try to turn `OFF` Query Store and
    place it in `READ_WRITE` mode. If that doesn’t work, the persisted data is corrupted
    on disk, so we run `sys.sp_query_store_consistency_check`. Finally, clear Query
    Store of all data. In Listing [3-25](#473933_1_En_3_Chapter.xhtml#PC25) you have
    code to run against all the databases with Query Store in ERROR state to fix the
    ERROR state.


    ```

    DECLARE @SQL AS NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(N''USE [{{DBName}}]

    --Try Changing to READ_WRITE

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    OFF

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    READ_WRITE

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage;

    END CATCH;

    END

    --Run sys.sp_query_store_consistency_check

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    EXEC

    [{{DBName}}].sys.sp_query_store_consistency_check

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    ON

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    (OPERATION_MODE = READ_WRITE)

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage;

    END CATCH;

    END

    --Run purge Query Store

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    CLEAR

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    (OPERATION_MODE = READ_WRITE)

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage

    END CATCH;

    END

    ''

    ,''{{DBName}}'', [name])

    FROM sys.databases

    WHERE is_query_store_on = 1;

    EXEC (@SQL);

    Listing 3-25

    T-SQL to fix error state on all databases on instance

    ```


    ### Tip


    Due to the potential performance, impact recommendation would set the above code
    as a SQL Agent job to run a regular basis so you don’t get caught off guard when
    the Query Store is in an ERROR state.'
  trans: '# 启用与禁用自动计划回归纠正（APRC）


    要启用自动计划回归纠正（APRC），您可以运行清单 3-19 中的代码来针对单个数据库，或运行清单 3-20 中的代码来为所有查询存储已启用且处于 `READ_WRITE`
    状态的数据库启用它。关于 APRC 是什么及其工作原理，在第 9 章有更深入的讨论。


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = N''''

    SELECT @SQL += REPLACE(N''ALTER DATABASE [{{DBNAME}}] SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN
    = ON '',

    ''{{DBName}}'', [name])

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND is_query_store_on = 1

    ORDER BY [name];

    EXEC (@SQL);

    -- 清单 3-20

    -- 用于在数据库在线且查询存储已启用的情况下启用 APRC 的 T-SQL

    ```


    ```sql

    ALTER DATABASE []

    SET AUTOMATIC_TUING ( FORCE_LAST_GOOD_PLAN = ON );

    -- 清单 3-19

    -- 用于启用 APRC 的 T-SQL

    ```


    要关闭查询存储，我们运行相同的查询，但将 `ON` 替换为 `OFF`，如上面代码清单所示，即清单 3-21 和 3-22。


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(N''ALTER DATABASE [{{DBNAME}}] SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN
    = OFF '',

    ''{{DBName}}'', [name])

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND is_query_store_on = 1

    ORDER BY [name];

    EXEC (@SQL);

    -- 清单 3-22

    -- 用于在数据库在线且查询存储已启用的情况下禁用 APRC 的 T-SQL

    ```


    ```sql

    ALTER DATABASE []

    SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN = OFF );

    -- 清单 3-21

    -- 用于禁用 APRC 的 T-SQL

    ```


    # 维护查询存储


    配置好查询存储后，有些项目您可能需要密切关注。有时查询存储的状态会从 `READ_WRITE` 变为 `READ_ONLY` 或 `ERROR`，您需要知道这种情况何时发生并进行纠正。您还需要监控空间使用情况，以确定是否在您需要的时间段内捕获了正确数量的数据，并确保不会空间耗尽。您还需要知道是否有任何您强制的执行计划失败以及如何追踪它们。您可能还需要从查询存储中移除执行计划和查询。最后，您可能需要重置等待统计信息。


    ## 监控期望状态与实际状态


    首先，要维护查询存储，您需要确保查询存储的 `desired_state`（期望状态）和 `actual_state`（实际状态）匹配。您可以运行清单 3-23
    中的代码在单个数据库中检查，或运行清单 3-24 中的代码检查实例上所有启用了查询存储的数据库。


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(REPLACE(N''USE [{{DBName}}];

    SELECT

    "{{DBName}}" database_name,

    actual_state_desc,

    desired_state_desc

    FROM {{DBName}}.sys.database_query_store_options

    WHERE desired_state_desc  actual_state_desc ''

    ,''{{DBName}}'', [name])

    ,''"'', "")

    FROM sys.databases

    WHERE is_query_store_on = 1

    ORDER BY [name];

    EXEC (@SQL);

    -- 清单 3-24

    -- 用于在所有数据库上检查查询存储的期望状态与实际状态的 T-SQL

    ```


    ```sql

    SELECT DB_NAME() database_name,

    actual_state_desc,

    desired_state_desc

    FROM sys.database_query_store_options

    WHERE desired_state_desc  actual_state_desc

    -- 清单 3-23

    -- 用于检查查询存储的期望状态与实际状态的 T-SQL

    ```


    ### 查询存储的只读状态


    查询存储可能在不通知的情况下从 `READ_WRITE` 状态进入 `READ_ONLY` 状态，原因有多种。原因以位图形式存储在 `sys.query_store_options`
    目录视图中的 `readonly_reason` 字段中。在表 3-2 中，您可以找到原因列表。


    **表 3-2 查询存储只读状态原因**


    | readonly_reason 位图 | 描述 |

    | --- | --- |

    | 1 | 数据库处于只读模式 |

    | 2 | 数据库处于单用户模式 |

    | 4 | 数据库处于紧急模式 |

    | 8 | 数据库是辅助副本（Always On 和 Azure SQL 数据库异地复制） |

    | 65536 | 达到 `MAX_STORAGE_SIZE_MB` 设置的限制 |

    | 131072 | 不同语句的数量已达到内存限制。在这种情况下，您应考虑从查询存储中移除查询或升级服务层级。适用于 Azure SQL 数据库 |

    | 262144 | 已达到内存中大小限制。在内存空间释放之前，项目将持久保存到磁盘。查询存储将暂时处于只读模式。适用于 Azure SQL 数据库 |

    | 524288 | 数据库已达到磁盘大小限制，因此查询存储无法再增长。适用于 Azure SQL 数据库 |


    ### 如何修复处于错误状态的查询存储


    从 SQL Server 2017 开始，查询存储可以进入错误状态。当您依赖手动执行计划强制或自动计划回归纠正时，这可能会导致潜在的性能问题。这是一种罕见的竞争条件，可能在您不知情的情况下发生。建议的修复方法是首先尝试将查询存储关闭（`OFF`）并将其置于
    `READ_WRITE` 模式。如果这不起作用，则磁盘上的持久化数据已损坏，因此我们运行 `sys.sp_query_store_consistency_check`。最后，清除查询存储中的所有数据。在清单
    3-25 中，您可以找到针对所有查询存储处于 `ERROR` 状态的数据库运行以修复 `ERROR` 状态的代码。


    ```sql

    DECLARE @SQL AS NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(N''USE [{{DBName}}]

    --尝试更改为 READ_WRITE

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    OFF

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    READ_WRITE

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage;

    END CATCH;

    END

    --运行 sys.sp_query_store_consistency_check

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    EXEC

    [{{DBName}}].sys.sp_query_store_consistency_check

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    ON

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    (OPERATION_MODE = READ_WRITE)

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage;

    END CATCH;

    END

    --运行清除查询存储

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    CLEAR

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    (OPERATION_MODE = READ_WRITE)

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage

    END CATCH;

    END

    ''

    ,''{{DBName}}'', [name])

    FROM sys.databases

    WHERE is_query_store_on = 1;

    EXEC (@SQL);

    -- 清单 3-25

    -- 用于修复实例上所有数据库错误状态的 T-SQL

    ```


    ### 提示


    由于潜在的性能影响，建议将上述代码设置为 SQL Server Agent 作业定期运行，这样当查询存储处于 `ERROR` 状态时，您就不会措手不及。'
- fmt: '### Monitoring Space Usage


    If you do set the `CLEANUP_POLICY` to `AUTO` as discussed earlier in the chapter,
    you will need to monitor the space usage yourself to make sure Query Store doesn’t
    switch to read-only mode. By default, Query Store will, at 90% capacity, clean
    up to an 80% capacity. If you have the `MAX_STORAGE_SIZE_MB` size set too low
    and have a large amount of transactions coming through, it is possible for Query
    Store to grow bigger than the max size specified. In Listing [3-26](#473933_1_En_3_Chapter.xhtml#PC26),
    you will find code to monitor space for a single database on your instance that
    is at 90% capacity.


    ```sql

    USE [];

    GO

    SELECT current_storage_size_mb,

    max_storage_size_mb,

    FROM sys.database_query_store_options

    WHERE CAST(CAST(current_storage_size_mb AS

    DECIMAL(21, 2)) / CAST(max_storage_size_mb AS

    DECIMAL(21, 2)) * 100 AS DECIMAL(4, 2)) >= 90

    AND size_based_cleanup_mode_desc = ''OFF'';

    ```

    Listing 3-26 T-SQL code to check if Query Store is at 90% capacity


    ### Tip


    You will want to put this code in a SQL Agent Job and add code to email you to
    alert when Query Store is near capacity, so that you may address it.


    ### How to Clear Query Store


    You may find it necessary to clear the data manually from Query Store. You may
    use one of the following two methods in Listings [3-27](#473933_1_En_3_Chapter.xhtml#PC27)
    and [3-28](#473933_1_En_3_Chapter.xhtml#PC28) to this.


    ```sql

    USE [];

    GO

    EXEC sys.sp_query_store_flush_db;

    ```

    Listing 3-28 Stored procedure to clear all the data out of Query Store


    ```sql

    ALTER DATABASE [] SET QUERY_STORE CLEAR ALL;

    ```

    Listing 3-27 T-SQL to clear all the data out of Query Store


    ### Failed Plan Forcing


    Plan forcing can fail for a number of reasons such as an index in the plan being
    changed or dropped, online index rebuilds while trying to write to the index,
    or a hint conflict. It’s important to track failed plans so you know if you are
    getting the performance gain you expected when you forced the plans. There are
    two ways to track forced plans. The first is with T-SQL. You can query the catalog
    view `sys.query_store_plan` to see the last failure reason and failed count as
    seen in Listing [3-29](#473933_1_En_3_Chapter.xhtml#PC29).


    ```sql

    SELECT plan_id,

    force_failure_count,

    last_force_failure_reason

    FROM sys.query_store_plan

    ```

    Listing 3-29 Query of plans with failed forced plans


    Because the above method only shows the last forced plan reason then increments
    a counter and is per database, you may want to set up an extended events session
    that can track failed plan forcing across your SQL Server instance and set up
    a SQL Agent job to query and send out alerts. In Listing [3-30](#473933_1_En_3_Chapter.xhtml#PC30)
    you will find an extended events session that can set up to capture failed plan
    forcing.


    ```sql

    CREATE EVENT SESSION [QueryStore_Forcing_Plan_Failure]

    ON SERVER

    ADD EVENT qds.query_store_plan_forcing_failed

    ADD TARGET package0.ring_buffer WITH

    (

    MAX_MEMORY=4096 KB,

    EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,

    MAX_DISPATCH_LATENCY=30 SECONDS,

    MAX_EVENT_SIZE=0 KB,

    MEMORY_PARTITION_MODE=NONE,

    TRACK_CAUSALITY=OFF,

    STARTUP_STATE=ON

    );

    ```

    Listing 3-30 Extended events session to capture failing force plans


    ### Removing Plans and Queries


    There are times when you may want to remove a plan from Query Store. You can use
    the procedure `sys.sp_query_store_remove_plan` to remove any plan from Query Store.
    When you run the procedure, it also removes the runtime statistics associated
    with that plan. It requires the `EXECUTE` permission on the database and `DELETE`
    permission on the Query Store catalog views. See Listing [3-31](#473933_1_En_3_Chapter.xhtml#PC31)
    for an example of how to remove a plan from Query Store.


    ```sql

    EXECUTE sys.sp_query_store_remove_plan @plan_id = ;

    ```

    Listing 3-31 Stored procedure to remove a query from the Query Store


    Similarly, there are times when you may want to remove a query from Query Store,
    such as when you have several ad-hoc queries taking up space in Query Store. You
    can use the procedure `sys.sp_query_store_remove_query` to remove any query from
    Query Store. When you run the procedure, it also removes the runtime statistics.
    It requires the `EXECUTE` permission on the database and `DELETE` permission on
    the Query Store catalog views. See Listing [3-32](#473933_1_En_3_Chapter.xhtml#PC32)
    for an example of how to remove a query from Query Store by filling in the `query_id`.


    ```sql

    EXECUTE sys.sp_query_store_remove_query @query_id = ;

    ```

    Listing 3-32 Stored procedure to remove a query from the query store


    ### Reset Statistics for a Plan


    The stored procedure `sys.sp_query_store_reset_exec_stats` clears runtime statistics
    for a given plan but leaves the plan in Query Store. It requires the `EXECUTE`
    permission on the database and `DELETE` permission on the Query Store catalog
    views. See Listing [3-33](#473933_1_En_3_Chapter.xhtml#PC33) for an example of
    how to reset statistics for a plan from Query Store by filling in the `plan_id`.


    ```sql

    USE [];

    GO

    EXECUTE sys.sp_query_store_reset_exec_stats @plan_id = ;

    ```

    Listing 3-33 Query to reset statistics for a plan


    ## Conclusion


    In this chapter we have learned about all the configuration options for Query
    Store and the recommended settings. We talked about the effect of having parameterized
    queries on Query Store vs. ad-hoc queries. Then we talked about the impact of
    using the drop and create process for stored procedures, functions, and triggers
    on seeing statistics for those objects. We talked about how to reduce the shutdown
    and startup times of the SQL Server instance by using trace flags. We covered
    how to capture data for natively compiled stored procedures. Finally, we discussed
    various methods to maintain Query Store.


    # 4. Standard Query Store Reports


    SQL Server Management Studio (SSMS) has seven built-in reports for Query Store.
    These reports give us the ability to quickly view performance data and troubleshoot
    performance issues in a graphical interface and transition the data into a grid
    view. In this chapter, we will explore how to interact with these reports and
    how they complement each other and work together. A list of the reports can be
    found below the database in Object Explorer as seen in Figure [4-1](#473933_1_En_4_Chapter.xhtml#Fig1):


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig1_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig1_HTML.jpg)


    Figure 4-1 Object Explorer view of reports for Query Store'
