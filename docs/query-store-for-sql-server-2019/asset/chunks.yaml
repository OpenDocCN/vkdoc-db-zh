    ## sys.query_store_plan


    `sys.query_store_plan` 目录视图存储查询存储中每个查询关联的查询计划。此目录视图中最重要的列是 `query_plan` 列，因为它显示了为查询存储的执行计划。你可以将其复制粘贴到你选择的编辑器中，保存为
    `.sqlplan` 扩展名，并使用 SSMS 打开以查看图形化的执行计划。另外两个有趣的列是 `engine_version` 和 `compatibility_level`
    列。`engine_version` 列让我们知道捕获查询计划时运行的 SQL Server 确切版本。这对于排查因升级导致的计划回归很有用。`compatibility_level`
    列告诉查询是在哪个兼容级别下运行的。这在升级时也很有用，特别是当从低于 SQL Server 2014 的兼容级别升级到 SQL Server 2014 及以上时，因为
    SQL Server 2014 中进行了基数估计器 (CE) 的更改。表 [5-3](#473933_1_En_5_Chapter.xhtml#Tab3)
    显示了 `sys.query_store_plan` 目录视图中所有列的名称、数据类型和描述。


