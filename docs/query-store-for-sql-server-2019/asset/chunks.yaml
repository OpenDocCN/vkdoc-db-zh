    that is shown to you by clicking the bar that defaults to `additional duration`.
    Other options are seen in Figure [4-4](#473933_1_En_4_Chapter.xhtml#Fig4):


    ![../images/473933_1_En_4_Chapter/473933_1_En_4_Fig4_HTML.jpg](images/473933_1_En_4_Chapter/473933_1_En_4_Fig4_HTML.jpg)

