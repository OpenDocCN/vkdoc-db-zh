- fmt: '### Parameterization and Query Store


    We have touched on this topic a bit when talking about the `QUERY_STORE_CAPTURE_MODE`
    setting for query store. Let’s explore what this means more. First let’s discuss
    the difference between paramterize queries and ad-hoc queries. A parameterized
    query comes in as a stored procedure, function, trigger, or via `sp_executesql`.
    What makes it parameterized is that each variable that comes in has a predefined
    data type that SQL Server uses each time the query is called. For example, see
    the code in Listing [3-15](#473933_1_En_3_Chapter.xhtml#PC15) where we query for
    the `LastName` from a `Customer` table, but we have the data type fixed to 20
    characters.


    ```sql

    CREATE PROCEDURE dbo.GetName

    @LastName VARCHAR(20)

    AS

    SET NOCOUNT ON;

    SELECT FirstName,

    LastName

    FROM dbo.Customer

    WHERE LastName = @LastName;

    GO

    EXEC dbo.GetName @LastName = ''Boggiano'';

    ```


    Listing 3-15: Stored Procedure Demonstrating a Parametrized Call to SQL Server


    So, what this means is that every time this procedure is called it gets rolled
    up into one record per runtime interval in Query Store because it always has the
    variable defined as `VARCHAR(20)`. Now with an ad-hoc query doing the same thing,
    see Listing [3-16](#473933_1_En_3_Chapter.xhtml#PC16).


    ```sql

    SELECT FirstName,

    LastName

    FROM dbo.Customer

    WHERE LastName = ''Boggiano'';

    ```


    Listing 3-16: T-SQL for Ad-hoc query


    When this query is compiled, it stores the variable for `LastName` as eight characters,
    but if you run the same query with the `LastName` as Smith, it will store the
    query with a variable as five characters giving you two records per runtime interval
    in Query Store. The data doesn’t get aggregated and therefore makes it harder
    to tune and troubleshoot queries that are of the same type. Ad-hoc queries also
    bloat the size of Query Store due to the number of unique questions it must keep
    track of.


    ### Impact of “Drop and Create” vs. “Alter”


    Query Store stores the `object_id` of the procedures, triggers, and functions
    that execute inside of the database. By altering these objects, you preserve the
    `object_id` of the object; if you use the “drop and create” method, you will no
    longer have the same `object_id` so the data will no longer be aggregated together
    going forward. So, if you make a change to try to improve performance and you
    decide to go and compare the performance in Query Store to prior runtime intervals,
    you will not be able to view the results in the Query Store reports, you will
    have to query the catalog views. In SQL Server 2017, the syntax “`CREATE OR ALTER`”
    was introduced so you can avoid the need to code for a `DROP`/`CREATE` operation.


    ### Impact of Database Renaming


    Inside execution plans all objects are referenced as three-part names `database.schema.object`
    because you have the potential of doing cross-database queries. Renaming a database
    will cause plan forcing to fail, causing recompilation of all queries using those
    forced plans on each execution.


    ### Reducing Recovery Times with Trace Flags


    By default, all queries are blocked from running in the database until Query Store
    is loaded if Query Store is enabled on the database. This is where trace flag
    7752 comes into play. By default, this behavior is on in Azure SQL Database, but
    on-premise you can turn on this trace flag and have Query Store load asynchronously,
    and in the background will be in a read-only state until it is completely loaded,
    so queries can process while Query Store loads, but you will not be capturing
    them. You can tell this is an issue on your system if you notice the wait stat
    `QDS_LOADDB` being high after a restart of your SQL Server instance. With this
    being the default behavior in Azure SQL Database it is quite possible it will
    become the default behavior in the on-premise product so we might want to go ahead
    and enable it now and get the benefits of faster startup times for our SQL Server
    instances. This also has the same effects on failovers.


    Trace flag 7745 controls rather your SQL Server instance takes the time to flush
    all the Query Store data to disk while SQL Server instance is being shut down.
    This can take a considerable amount of time that you may not be willing to wait
    to depend on what you have your `DATA_FLUSH_INTERVAL_SECONDS` set to and/or the
    number of databases with Query Store enabled on your instance. The recommendation
    here would be to turn on this trace flag on because if you tell SQL Server to
    shut down; you don’t want to wait for data to be flush to disk, you want to get
    your SQL Server instance back up and running as fast as possible.


    ## Query Store and Memory-Optimized Tables


    Memory-optimized tables are tables that are stored entirely in memory. Therefore,
    Query Store tracks a limited number of metrics when tracking queries that executed
    against memory-optimized tables because those tables are stored in memory. Query
    Store does not track I/O due to the table residing entirely in memory and query
    memory used. It does, however, track other metrics such as duration, CPU time,
    the degree of parallelism, and the row count. When viewing reports discussed in
    Chapter [4](#473933_1_En_4_Chapter.xhtml), keep this in mind if you use memory-optimized
    tables.


    ## Configuring Query Store for Natively Compiled Stored Procedures


    Similarly, to memory-optimized tables, natively compiled stored procedures are
    treated differently by Query Store. Query plans and query text are stored in Query
    Store by default for natively compiled stored procedure and a flag denotes these
    procedures in the catalog view `sys.query_store_plan`. However, runtime statistics
    are not stored in the `sys.query_store_runtime_stats` catalog view by default.
    To capture runtime statistics, you must use the procedure `sys.sp_xtp_control_query_exec_stats`.
    The procedure can be used to capture statistics for all natively compiled procedures
    at the instance level or just particular ones you need to troubleshoot. There
    is a performance overhead associated with collecting these statistics. Listing
    [3-17](#473933_1_En_3_Chapter.xhtml#PC17) shows you how to set up a natively compiled
    stored procedure to capture runtime statistics.


    ```sql

    DECLARE @dbid INT = DB_ID('''');

    DECLARE @object_id INT = OBJECT_ID('''');

    EXEC sys.sp_xtp_control_query_exec_stats

    @new_collection_value = 1,

    @database_id = @dbid,

    @xtp_object_id = @object_id;

    ```


    Listing 3-17: Setup Query Store to capture runtime statistics for a natively compiled
    stored procedure


    Listing [3-18](#473933_1_En_3_Chapter.xhtml#PC18) shows you how to capture statistics
    for all natively compiled stored procedures on an instance.


    ```sql

    EXEC sys.sp_xtp_control_query_exec_stats

    @new_collection_value = 1;

    ```


    Listing 3-18: Setup Query Store to capture runtime statistics for all natively
    compiled stored procedures on the instance


    To turn off the collection of statistics, run the same code in Listings [3-16](#473933_1_En_3_Chapter.xhtml#PC16)
    or [3-17](#473933_1_En_3_Chapter.xhtml#PC17) and change the parameter `@new_collection_value`
    to 0.


    ### Note


    These settings are reset to not capture statistics on the event that the SQL Server
    instance is shut down or restarted. If you need it to persist in collecting statistics,
    you will need to set up a startup stored procedure or a SQL Agent job that runs
    at startup.'
