    ## Introduction


    This book is about the Query Store feature built into SQL Server 2019 and how
    it works to help you identify poorly performing queries and fix them in your databases.
    Query Store has been in SQL Server since SQL Server 2016 and has gradually added
    features with each new release to make it better at what information it captures
    and how it is captured. This book is intended for SQL Server DBAs looking for
    how Query Store works, the best way to implement it, and how to effectively use
    it to solve problems. Query Store shows you in an aggregrated form of what was
    and is running in your database.


    Chapter [1](#473933_1_En_1_Chapter.xhtml) gives you an introduction to how you
    troubleshoot problems and gather statistics without Query Store, so you gain an
    understanding of why Query Store is an important new feature of SQL Server. Chapter
    [2](#473933_1_En_2_Chapter.xhtml) gives you an overview of how Query Store works
    and dives into the details of the architecture of it. It covers how the data is
    captured and where that data is stored. Chapter [3](#473933_1_En_3_Chapter.xhtml)
    covers how to configure Query Store and best practices for configuration including
    trace flags. Chapter [4](#473933_1_En_4_Chapter.xhtml) covers the six reports
    that are available for Query Store in SQL Server Management Studio and how to
    leverage them to get information you need. Chapter [5](#473933_1_En_5_Chapter.xhtml)
    dives into detailing what data is available in the catalog views for Query Store.


    Chapter [6](#473933_1_En_6_Chapter.xhtml) covers different use cases for Query
    Store including using it to show you what is normal performance on your database,
    troubleshooting query performance and regressed queries, establishing a baseline
    for your database, and testing upgrades to different versions of SQL Server. Chapter
    [7](#473933_1_En_7_Chapter.xhtml) starts showing the real power in Query Store
    by showing how to identify poorly performing queries and what goes into forcing
    a plan to stabilize performance. Chapter [8](#473933_1_En_8_Chapter.xhtml) shows
    us the most powerful feature, Automatic Plan Regession Correction (APRC), where
    Query Store automatically forces plans for you. It also introduces to the feature
    of capturing wait statistics into categories. Chapter [9](#473933_1_En_9_Chapter.xhtml)
    shows you techniques to troubleshoot issues with Query Store itself, wait statistics
    and extended events. Chapter [10](#473933_1_En_10_Chapter.xhtml) introduces you
    to two community tools dbatools and sp_blitzQueryStore that help with the configuration
    of Query Store and getting data out of Query Store.


    ### About the Authors and About the Technical Reviewer


    ### About the Authors


    ### About the Technical Reviewer


    # 1. What Is Query Store?


    Query Store keeps rolled-up aggregates of queries and statistics for workloads
    that are run against your SQL Server database when it is enabled. This data can
    be used to help you establish a baseline for performance, troubleshoot performance
    issues, and stabilize performance on your database. In this chapter, we go over
    techniques that were used before Query Store was released, including Profiler/server-side
    traces, Extended Events, DMVs (Dynamic Management Views), plan guides, and `sp_whoisactive`.
    Then, we will look at how and why Query Store is a game changer for doing these
    activities.


    Query Store is like a flight recorder box for your SQL Server. Query Store stores
    statistics such as duration, reads, writes, CPU, etc. along with query plans in
    memory and then aggregates this information based on the settings that were set
    when Query Store was enabled on the database, with a default of 1 hour. At specified
    periods, the default is 15 minutes, this data is persisted to disk into the catalog
    views for you to query or view via the built-in reports in SQL Server Management
    Studio (SSMS). With the introduction of SQL Server 2017, we also can utilize the
    power of auto plan correction and the aggregation of wait statistics – more on
    this in Chapter [8](#473933_1_En_8_Chapter.xhtml).


    This is where the true power of Query Store comes into play. Before this data
    was only available if you captured it using various other methods that proved
    to be much slower and cumbersome to work with. To get a better understanding of
    what Query Store is doing under the covers, we will explore these other methods:


    1.  Query Store Usefulness

    2.  Troubleshooting Without Query Store Techniques

    3.  Query Store: The Game Changer


    ## Query Store Usefulness


    Query Store has more than one way it can be utilized to help with your database.
    In this section, we will discuss how it can be used to help you establish a baseline
    for your database, troubleshoot performance issues, and stabilize performance.


    ### Baselining Performance


    One key part of any database professional’s job is being able to baseline the
    performance of their database server which is not an easy task. In this section
    of the book, we will talk about the why and how of establishing a baseline for
    your database server and its relation to Query Store. Query Store’s ability to
    capture all queries that have executed against your database and record runtime
    statistics in the database makes it easier to collect the baseline information
    you need.'
