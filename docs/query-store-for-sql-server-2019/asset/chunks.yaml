  trans: '## 识别行为不佳的执行计划


    执行计划（也称为查询计划或显示计划）是您洞察查询优化过程所做选择的窗口。它们展示了您的 `T-SQL`、索引、统计信息、表、列和约束如何构成您的数据库，以及数据库将如何利用这些结构来检索或修改存储其中的数据。阅读执行计划是一个非常深奥的话题。如需详细了解，您应阅读
    Grant Fritchey（本书的合著者之一）所著的 *《执行计划》* 一书。在此，我们将探讨可能表明您的查询性能不佳的信息和报告。然后，我们将利用这些信息引导我们找到对应的执行计划。我们将介绍一些有助于您判断某个计划可能未能有效支持查询的标志，但不会涵盖阅读执行计划的所有细节。


    首先，我们必须了解如何使用 `查询存储` 来识别那些既改变了其执行计划，又因此导致性能下降的查询。另一种识别性能不佳查询的方式是，当数据库的使用者提醒您存在性能问题时。但有了
    `查询存储` 中的信息，我们可以采取更为主动的方式。


    ### 识别性能回退的查询


    当某个查询先前运行良好但现在表现不佳时，就发生了性能回退。有些查询可能从一开始就很糟糕，这类问题很容易识别和处理。有些查询随着系统中数据量的不断增加，性能会逐渐下降，这类问题也容易识别和处理。真正棘手的问题是那些原本运行良好，却突然（有时是间歇性地）变慢的查询。在
    `查询存储` 出现之前，这类问题常常难以解决。


    导致这些性能回退的原因多种多样。当您从早期版本的 `SQL Server` 迁移到后期版本时可能会遇到，这源于查询优化器工作方式的变化以及 `SQL Server`
    2014 中引入的新的基数估算引擎。您也可能因为数据库统计信息不正确或过时而遇到性能回退。您还可能受到一个被称为“糟糕的参数探测”问题的困扰。


    虽然不正确和过时的统计信息可能是查询性能回退最常见的原因，但讨论最多、也将在本章用作示例的问题，是糟糕的参数探测。让我们从解释什么是参数探测以及它如何有时引起问题开始。


    当您有一个参数化查询时，无论是存储过程、来自 `ORM` 工具（如 `Entity Framework`）的参数化查询，还是 `sp_executesql`
    中的参数，查询优化器在编译执行计划时都会使用传递给该参数的值。它获取这些确切的值，并用它们来查看所引用列或索引的统计信息，然后基于这些精确的值创建执行计划。这种对值的采样就是所谓的参数探测。大多数情况下，这是一种无害且通常非常有益的做法。然而，有时您会遇到这样一种情况：为一个特定的值创建的计划在紧接着的查询中执行得足够好。但是，所有其他使用同一个执行计划的查询却表现得非常糟糕。这种情况被称为糟糕的参数探测。


    当您遇到一个原本运行良好的查询突然表现不佳的情况时，您可以利用 `查询存储` 中的信息来识别定义性能的查询指标，并查看查询在运行良好和运行不佳时的执行计划。您可以通过两种方式之一来实现。您可以针对
    `查询存储` 中收集的数据运行 `T-SQL` 代码。或者，您可以使用 `回退查询` 报告。由于 `回退查询` 报告可能并不总是将给您带来问题的查询识别为回退查询，因此学会如何自己从
    `查询存储` 数据中检索此信息是一个非常好的主意。


    #### 从查询存储数据中识别回退查询


    我们在第 2 章讨论了 `查询存储` 收集的信息。然后在第 5 章回顾了如何从 `查询存储` 目录视图中检索数据的基础知识。如果您不理解下面查询的操作，我建议您在进行本章之前，先回去复习那些章节。


    首先，我们需要一个能够可靠地从中获取不同执行计划的查询。`Person.Address` 表中的数据分布使得在 `AdventureWorks` 数据库中，根据用于筛选
    `City` 列的值，您可能会得到几种不同的执行计划。以下是我们将在本章剩余部分中用来探究行为的查询：


    ```sql

    CREATE OR ALTER PROC [dbo].[AddressByCity] @City NVARCHAR(30)

    AS

    SELECT a.AddressID,

    a.AddressLine1,

    a.AddressLine2,

    a.City,

    sp.Name AS StateProvinceName,

    a.PostalCode

    FROM Person.Address AS a

    JOIN Person.StateProvince AS sp

    ON a.StateProvinceID = sp.StateProvinceID

    WHERE a.City = @City;

    GO

    ```


    有了这个存储过程后，我们可以使用两个不同的值之一来执行查询，从而得到两个不同的执行计划。如果您在启用执行计划显示的情况下运行以下脚本，可以看到这两个计划。注意：出于测试目的，我们使用了一种清除过程缓存的简单方法。在生产系统上，这可能不是最佳方法：


    ```sql

    EXEC dbo.AddressByCity @City = N''London'';

    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;

    EXEC dbo.AddressByCity @City = N''Mentor'';

    ```


    这是参数探测导致不同执行计划的一个典型案例。每个计划都针对它返回的结果集进行了优化；对于值“London”返回 434 行，对于值“Mentor”返回 1
    行。然而，每个计划都导致了对应相反数据集的糟糕性能。我这里的意思是，返回 434 行的计划在返回 434 行时运行得很快，但在仅返回少量行时，它的运行速度不如另一个计划快。反之亦然。事实上，当使用针对“Mentor”的计划来返回
    434 行时，查询的运行速度会慢得多，以至于在 `回退查询` 报告中会被标记为回退查询。'
- fmt: '## Regressed Query Report


    我们将在第[4](#473933_1_En_4_Chapter.xhtml)章详细讨论报告。不过，这里我们想展示`dbo.AddressByCity`存储过程在报告中的行为表现：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig1_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig1_HTML.jpg)


    图 7-1


    显示性能不佳的“回归查询”报告


    左侧的第一个窗格是根据你所测量的指标（默认为持续时间）列出的查询。报告中的第二个窗格显示了查询执行速度和涉及的不同执行计划。点击其中一个点会改变底部窗格中显示的执行计划。将鼠标悬停在点上会显示它代表的执行次数、平均运行时长等信息。同样，有关使用报告的更多详细信息，请参见第[4](#473933_1_En_4_Chapter.xhtml)章。


    你不能简单地运行上面的代码就得到一个回归查询。“回归查询”报告比较的是行为随时间的变化。因此，为了让报告生成，你必须在一段时间内多次运行代码。为了自己模拟这个场景，你可以运行以下脚本。你可能需要多次运行它才能使查询显示为回归查询，因为它需要在“查询存储”中有数据才能触发报告，并且必须显示出随时间推移的显著差异。不过，这个脚本会起作用：


    ```

    --建立基线行为

    EXEC dbo.AddressByCity @City = N''London'';

    GO 100

    --从缓存中删除计划

    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;

    --编译一个新计划

    EXEC dbo.AddressByCity @City = N''Mentor'';

    GO

    --执行代码以显示查询回归

    EXEC dbo.AddressByCity @City = N''London'';

    GO 100

    ```


    你应该能在“回归查询”报告中看到该查询，并且它应该显示两个不同的执行计划，与图[7-1](#473933_1_En_7_Chapter.xhtml#Fig1)相同。


    ### 执行计划中的警示信号


    回归查询行为是由执行计划的改变驱动的。本书没有篇幅涵盖阅读执行计划所需的所有知识。关于该主题的详细探讨，我们推荐Grant Fritchey的书*SQL Server
    Execution Plans*（Redgate Press，2018）。但是，我们可以在执行计划中寻找一些警示信号作为快速指南。请理解，这些只会为你提供初步指导。你最终还是需要学习细节来阅读和理解执行计划中的信息。


    以下是初次检查执行计划时需要关注的核心事项。


    *   **First Operator**：关于计划本身的详细信息集合

    *   **Most Costly Operator**：显示导致性能不佳最可能原因的最高估计成本

    *   **Warnings and Errors**：优化过程中遇到的问题（如果有）

    *   **Fat Pipes**：数据流的指示，更宽的管道显示更多的数据

    *   **Scans**：指示大量数据移动

    *   **Extra Operators**：你无法轻易解释其存在原因或功能的运算符

    *   **Estimates vs. Actuals**：运算符的估计行数或执行次数与实际数量的比较


    以下是你使用这些指南寻找的目标。我将使用给我们带来最大麻烦的执行计划，即值为“Mentor”的计划，如图[7-2](#473933_1_En_7_Chapter.xhtml#Fig2)所示：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig2_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig2_HTML.jpg)


    图 7-2


    值为“Mentor”的执行计划


    我们现在将按照这些路标来寻找有关此计划的信息。


    #### First Operator


    第一个运算符是任何计划最左边的那个。它通常会根据你的T-SQL执行的操作类型来标记：`SELECT`、`INSERT`、`UPDATE`和`DELETE`。右键单击该运算符并选择“属性”。你会看到类似图[7-3](#473933_1_En_7_Chapter.xhtml#Fig3)的内容：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig3_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig3_HTML.jpg)


    图 7-3


    第一个运算符属性的部分列表


    这只是通过执行计划的第一个运算符暴露的所有属性和信息的一部分。在查看计划回归时，你**很可能**会看到由数据或统计信息的变化，或参数嗅探引起的问题。在这种情况下，“参数列表”属性会显示用于编译执行计划的参数。你可以在图[7-3](#473933_1_En_7_Chapter.xhtml#Fig3)中看到，此计划使用了值“Mentor”。


    #### Most Costly Operator


    图[7-2](#473933_1_En_7_Chapter.xhtml#Fig2)中所示的计划非常简单且易于阅读。你可以快速发现`Index Scan`运算符占估计成本的93%。这些成本是基于优化器内的计算，并不反映实际行为。然而，由于驱动成本的数字来源于你的代码、对象和统计信息中的行数，这是我们用来检查执行计划的一个值。高成本运算符可能指示问题所在。


    #### Warnings and Errors


    这些会显示为黄色警告标志或红色“X”。它们可能是影响执行计划行为的代码问题的指示器。在图[7-2](#473933_1_En_7_Chapter.xhtml#Fig2)中没有这些。


    #### Fat Pipes


    连接运算符的箭头代表数据流。大管道反映大量数据流，而小管道代表少量数据流。寻找大管道以理解数据是如何移动的。你还需要寻找数据创建越来越多的过渡点，或者数据从磁盘移动后稍后被过滤的地方。这些可能是问题的强烈指标。


    #### Scans


    扫描（`Scan`）表示读取了整个表或索引以检索数据。这不一定是个问题；但是，它表明可能涉及大量I/O，因此在评估执行计划时需要考虑。请注意，寻道（`Seek`），即扫描的反面，也可能根据计划的其余部分引起问题。像图[7-2](#473933_1_En_7_Chapter.xhtml#Fig2)中的索引扫描（`Index
    Scan`）应该引导我们质疑该计划。我们有一个过滤到只有一行的数据集，但它却扫描了整个聚集索引来实现这一点。


    #### Extra Operators


    这个概念有点难以解释。如果你正在查看一个计划，但你无法解释某个运算符是什么，或者为什么使用某个运算符，那就应该引起你的注意。让我们看看图[7-4](#473933_1_En_7_Chapter.xhtml#Fig4)中值为“London”的计划：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig4_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig4_HTML.jpg)


    图 7-4


    值为“London”的执行计划


    在这个计划中，我们有一个`Index Scan`、一个`Clustered Index Scan`、一个`Merge Join`和一个`Sort`。当你考虑`dbo.AddressByCity`中的查询时，会注意到没有`ORDER
    BY`命令。因此，在这种情况下，`Sort`运算符是个谜，是一个额外的运算符。为什么我们有一个排序操作？答案是因为优化器认为对于较大的数据集，`Merge
    Join`更快。然而，`Merge Join`要求所有数据都是有序的。因此，添加了一个`Sort`运算符来满足`Merge Join`的需求。'
  raw: "#### Regressed Query Report\n\nWe’re going to be covering the reports in detail\
    \ in Chapter [4](#473933_1_En_4_Chapter.xhtml). However, here we want to show\
    \ how the behavior of the dbo.AddressByCity procedure returns in the report:\n\
    \n![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig1_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\n\nRegressed Query report showing poor performance\n\nThe first pane,\
    \ on the left, is a listing of the queries based on the metric you’re measuring\
    \ (duration by default). The second pane in the report shows query execution speed\
    \ and the different plans involved. Clicking on one of the dots will change the\
    \ plan being displayed in the bottom pane. Hovering over the dot will show how\
    \ many executions it represents, average runtime, and more. Again, for more details\
    \ on using the reports, see Chapter [4](#473933_1_En_4_Chapter.xhtml).\n\nYou\
    \ can’t simply run the code above and arrive at a regressed query. The Regressed\
    \ Query report compares behavior over time. So to get the report to generate,\
    \ you have to run the code multiple times over a period of time. To simulate this\
    \ yourself, you can run the following script. You may have to run it multiple\
    \ times to get the query to show up as a regressed query because it has to have\
    \ the data inside the Query Store to get the report to fire and it has to show\
    \ a substantial difference over time. However, this script will work:\n\n```\n\
    --Establish baseline behavior\nEXEC dbo.AddressByCity @City = N'London';\nGO 100\n\
    --Remove the plan from cache\nALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n\
    --Compile a new plan\nEXEC dbo.AddressByCity @City = N'Mentor';\nGO\n--Execute\
    \ the code to show query regression\nEXEC dbo.AddressByCity @City = N'London';\n\
    GO 100\n```\n\nYou should be able to see the query in the Regressed Query report\
    \ and it should show two different execution plans the same as Figure [7-1](#473933_1_En_7_Chapter.xhtml#Fig1).\n\
    \n### Warning Signs in Execution Plans\n\nRegressed query behavior is driven by\
    \ changes to the execution plans. There isn’t room in this book to cover everything\
    \ you need to know to read execution plans. For a detailed examination on that\
    \ topic, we recommend Grant Fritchey’s book, *SQL Server Execution Plans* (Redgate\
    \ Press, 2018). However, there a few warning signs we can look for in execution\
    \ plans as a quick set of guides. Just understand, these will only guide you initially.\
    \ You’ll have to eventually learn the details to read and understand the information\
    \ inside execution plans.\n\nHere is a core set of things to look at when examining\
    \ execution plans for the first time.\n\n*   First Operator: A detailed collection\
    \ of information about the plan itself\n\n    Most Costly Operator: The highest\
    \ estimated cost showing a highly likely culprit for poor performance\n\n    Warnings\
    \ and Errors: Issues experienced by the optimization process, if any\n\n    Fat\
    \ Pipes: An indication of data flow, with wider pipes showing more data\n\n  \
    \  Scans: An indicator of larger data movement\n\n    Extra Operators: Operators\
    \ that you can’t explain readily why they are there or what they are doing\n\n\
    \    Estimates vs. Actuals: The comparisons between the estimated number of rows\
    \ or executions for an operator and the actual number of either\n\nHere’s what\
    \ you are using these guides to look for. I’ll use the execution plan that is\
    \ causing us the most trouble, the one from the value of “Mentor” as shown here\
    \ in Figure [7-2](#473933_1_En_7_Chapter.xhtml#Fig2):\n\n![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig2_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\n\nExecution plan for the value “Mentor”\n\nWe’ll now walk through\
    \ the guideposts looking for information about this plan.\n\n#### First Operator\n\
    \nThe first operator is the one all the way on the left side of any plan. It will\
    \ usually be labeled by the type of operation your T-SQL is performing: SELECT,\
    \ INSERT, UPDATE, and DELETE. Right-click on that operator and select properties.\
    \ You’ll see something like Figure [7-3](#473933_1_En_7_Chapter.xhtml#Fig3):\n\
    \n![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig3_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\n\nPartial list of first operator properties\n\nThis is only a partial\
    \ of all the properties and information exposed through the first operator of\
    \ an execution plan. When looking at plan regressions, chances are high that you\
    \ **may** be seeing problems caused by changes in data or statistics, or parameter\
    \ sniffing. In that case, the Parameter List property shows you the parameter\
    \ or parameters used to compile the execution plan. You can see in Figure [7-3](#473933_1_En_7_Chapter.xhtml#Fig3)\
    \ that this plan used the value “Mentor.”\n\n#### Most Costly Operator\n\nThe\
    \ plan shown in Figure [7-2](#473933_1_En_7_Chapter.xhtml#Fig2) is very simple\
    \ and easy to read. You can quickly spot that the Index Scan operator is 93% of\
    \ the estimated cost. These costs are based on calculations within the optimizer\
    \ and are not reflective of actual behavior. However, since the numbers that drive\
    \ the costs are derived from your code, objects, and the row counts in the statistics,\
    \ it’s a value we use to examine execution plans. A high cost operator may indicate\
    \ where the problem lies.\n\n#### Warnings and Errors\n\nThese will show as a\
    \ yellow caution sign or a red “X”. They can be indicators of problems with the\
    \ code that affect how the execution plan behaves. There are none in Figure [7-2](#473933_1_En_7_Chapter.xhtml#Fig2).\n\
    \n#### Fat Pipes\n\nThe arrows that connect the operators represent data flow.\
    \ Big pipes reflect a lot of data flow, whereas small pipes represent small data\
    \ flow. Look for the fat pipes to understand how data is being moved. You also\
    \ have to look for transitions where more and more data is created, or where data\
    \ is moved from disk and then filtered later. These can be strong indicators of\
    \ problems.\n\n#### Scans\n\nA scan indicates that the entire table or index was\
    \ read in order to retrieve data. This is not necessarily a problem; however,\
    \ it indicates possible large amounts of I/O and therefore is something to consider\
    \ when evaluating an execution plan. Please note that seeks, the opposite of scans,\
    \ can also cause problems depending on the rest of the plan. Index scans such\
    \ as the one in Figure [7-2](#473933_1_En_7_Chapter.xhtml#Fig2) should lead us\
    \ to question the plan. We have a data set that is filtering down to one row yet\
    \ it’s scanning an entire clustered index to do that.\n\n#### Extra Operators\n\
    \nThis concept is a little harder to explain. If you’re looking at a plan and\
    \ you can’t explain what an operator is, or why a given operator is being used,\
    \ that should draw your eye for consideration. Let’s take a look at the plan for\
    \ the value “London” in Figure [7-4](#473933_1_En_7_Chapter.xhtml#Fig4):\n\n![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig4_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nExecution plan for the value “London”\n\nIn this plan we have\
    \ an Index Scan, a Clustered Index Scan, a Merge Join, and a Sort. When you consider\
    \ the query in dbo.AddressByCity, you’ll note that there is no ORDER BY command.\
    \ Therefore, in this case, the Sort operator is a mystery, an extra operator.\
    \ Why do we have a Sort operation? The answer here is because the optimizer decided\
    \ that the Merge Join was faster for the larger data set. However, a Merge Join\
    \ requires that all data be ordered. So a Sort operator was added to satisfy the\
    \ needs of the Merge Join."
