    扫描（`Scan`）表示读取了整个表或索引以检索数据。这不一定是个问题；但是，它表明可能涉及大量 I/O，因此在评估执行计划时需要考虑。请注意，寻道（`Seek`），即扫描的反面，也可能根据计划的其余部分引起问题。像图
    7-2 中的索引扫描（`Index Scan`）应该引导我们质疑该计划。我们有一个过滤到只有一行的数据集，但它却扫描了整个聚集索引来实现这一点。


    #### Extra Operators


    这个概念有点难以解释。如果你正在查看一个计划，但你无法解释某个运算符是什么，或者为什么使用某个运算符，那就应该引起你的注意。让我们看看图 7-4 中值为“London”的计划：


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig4_HTML.jpg](img/473933_1_En_7_Fig4_HTML.jpg)


    图 7-4


    值为“London”的执行计划


    在这个计划中，我们有一个`Index Scan`、一个`Clustered Index Scan`、一个`Merge Join`和一个`Sort`。当你考虑`dbo.AddressByCity`中的查询时，会注意到没有`ORDER
    BY`命令。因此，在这种情况下，`Sort`运算符是个谜，是一个额外的运算符。为什么我们有一个排序操作？答案是因为优化器认为对于较大的数据集，`Merge
    Join`更快。然而，`Merge Join`要求所有数据都是有序的。因此，添加了一个`Sort`运算符来满足`Merge Join`的需求。

    '
- fmt: '### Estimated vs. Actual


    You can only compare these values when you’re looking at an Actual plan, which
    looks like the same thing as an Estimated plan but has additional runtime metrics.
    In short, to capture an Actual plan, you have to execute the query. If we look
    at the execution plan for the value of “Mentor” after executing the query with
    the value of “London,” we can see this comparison in action as shown in Figure
    [7-5](#473933_1_En_7_Chapter.xhtml#Fig5):


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig5_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig5_HTML.jpg)


    *Figure 7-5: Estimated vs. Actual values compared*


    Here we’re seeing one of the estimated vs. actual comparisons, the number of rows
    processed by each operator. You can see that the `Nested Loops` join processed
    434 rows of the 2 that it anticipated. In this case, the estimated number of rows
    was 2, but the actual was 434. This wide disparity, 21,700%, can be an indicator
    for why performance is poor.


    Even with these guides for looking at execution plans, you’re still going to need
    to drill down into the properties in order to understand better how execution
    plans work. However, the guideposts will get you started. In order to evaluate
    if a plan is better, it’s a good idea to learn how to compare one plan to the
    other.


    ## Comparing Execution Plans


    From the Regressed Query report (as well as other Query Store reports), you have
    the ability to easily, and quickly, compare execution plans. Yes, you can look
    at the plans graphically and compare them by clicking on the dots. However, there
    is a utility for comparing execution plans that shows a lot more detail and functionality.


    To access this functionality, you’ll need to shift-click on two of the execution
    plans (you can only compare two plans at a time). Then click on the toolbar of
    the report as shown in Figure [7-6](#473933_1_En_7_Chapter.xhtml#Fig6):


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig6_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig6_HTML.jpg)


    *Figure 7-6: The toolbar for comparing two execution plans*


    When you click on this after selecting two plans, a new window will open looking
    like Figure [7-7](#473933_1_En_7_Chapter.xhtml#Fig7):


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig7_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig7_HTML.jpg)


    *Figure 7-7: Two execution plans being compared*


    What you’re seeing in Figure [7-7](#473933_1_En_7_Chapter.xhtml#Fig7) are two
    execution plans being compared in the two panes, top and bottom, on the left.
    On the right are two sets of properties from a selected operator. Those property
    values are also being compared. The shading (pink in my case) around the operators
    in both plans is indicated operators, or even sets of operators, that are common
    between two plans. So, in our plan, the scan of the index on the `Person.Address`
    table is essentially the same in both plans. The other operators are different.
    This information can be used to help troubleshoot performance either by showing
    you a common problem needing a solution (in this case a scan of all the data in
    an index) or by showing you the differences in the plan that are causing poor
    performance.


    Clicking on any operator on the left panes will change the property values on
    the right side, allowing you to further explore the details and differences. Figure
    [7-8](#473933_1_En_7_Chapter.xhtml#Fig8) is the properties from the common `Index
    Scan` operator:


    ![../images/473933_1_En_7_Chapter/473933_1_En_7_Fig8_HTML.jpg](images/473933_1_En_7_Chapter/473933_1_En_7_Fig8_HTML.jpg)


    *Figure 7-8: Common operator in both execution plans*


    The property values that do not match have the yellow “does not equal” icon in
    front of those values. You can see that overall, the estimated costs, row size,
    object information, and the rest are all the same. It’s only the estimated number
    of rows, node ID, and the estimated operator percentage costs that are different.
    In fact, the percentage estimates are only different because all the other operators
    in the two plans are different.


    Comparing common operators, especially in this case, a scan, can give you indications
    where the query performance may be improved by changes to the code or structure.
    However, the whole point of using plan forcing is to avoid having to modify the
    code or structure. You mainly want to compare plans so that you’re sure the one
    you pick to force is more likely to succeed.


    When you are looking at operators that are not marked as common between the two
    plans, in order to compare those operators, you would need to select each one
    individually. As a general rule, this won’t tell you much about the plans because
    when different operators are performing different functions between plans, comparing
    them is of little use.


    You combine the performance metrics, the wait statistics, and the information
    you glean from the execution plans in question. Along with this information, you
    should also take into account things like the importance of the query, the frequency
    at which it is being called, and other factors that will help you decide that,
    in fact, one of these plans will outperform the other for your most common needs.


    Once you’ve decided which of the plans you want to force, you have several options
    to force the plan.'
