    Each bar on the left-hand side represents a different query that could be part
    of a `stored procedure`, `trigger`, `user-defined function` or be an `ad-hoc query`
    that executed in the specified period of time. The default period of time for
    the report is the last hour. If you click on any of the bars, the `query plan`
    will change at the bottom to show the `estimated plan` for that query. If you
    hover over any of the bars, it will show you stats for each one of the queries
