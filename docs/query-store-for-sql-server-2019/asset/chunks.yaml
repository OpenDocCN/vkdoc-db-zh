- fmt: '## Query Store and Performance Baselines


    #### What Is a Baseline?


    Before we talk about how Query Store can provide you with a baseline, let’s discuss
    what a baseline is. A baseline is established by running a workload against a
    server and taking metrics in several areas to determine if anything has significantly
    changed over time. Areas of interest in SQL Server include, but are not limited
    to, CPU utilization, memory clerk usage, number of reads and writes (physical
    and logical), query execution times, etc. Baselines should be taken during peak
    and non-peak times to get an accurate measurement of the overall activity of your
    server. By having a baseline, you will be able to isolate performance problems
    better and identify bottlenecks.


    #### How Query Store Provides a Baseline


    Query Store aggregates data about queries ran against the database it is enabled
    on into intervals predefined when you configure it. This data is displayed in
    a few different reports. One example is the Overall Resource Consumption in Figure
    [1-1](#473933_1_En_1_Chapter.xhtml#Fig1) that shows charts of the last month of
    duration, execution count, CPU time, and logical reads by default. This report
    is the best for viewing a baseline of the database.


    ![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig1_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig1_HTML.jpg)


    Figure 1-1: Overall Resource Consumption report


    #### Catalog Views


    All the data collected from Query Store are stored in multiple catalog views.
    The aggregated runtime statistical data is stored in `sys.query_store_runtime_stats`.
    The catalog view `sys.query_store_query_text` stores unique query text values
    that have been executed against the database, and the `sys.query_context_settings`
    view stores the settings for the queries stored in the `sys.query_store_query_text`
    view that was executed under settings such as `SET ANSI_NULLS ON` or `SET QUOTED_IDENTIFERS
    ON`. The view `sys.query_store_query` stores all queries uniquely executed based
    on text and context settings executed so you can track them. The `sys.query_store_plan`
    catalog view stores the estimated plan for the query executed and the compile
    time statistics in XML format. The `sys.query_store_runtime_stats_interval` view
    stores the time intervals that the data is stored in.


    More details on catalog views will be discussed in Chapter [5](#473933_1_En_5_Chapter.xhtml).


    #### Stabilizing Performance


    The next report to look at for baselines is the Regressed Queries report, which
    will show you queries that have regressed in performance. For each of these, you
    should look at why the performance has degraded. This report will show how each
    query plan for a specific query has performed over the last month by default.


    From the Regressed Query report or Top Consuming Queries report, you can easily
    see what plans should be forced based on how they are performing. Forcing a plan
    is when you take an execution plan and based on the performance you see in the
    report decide that you want that plan to be the one the SQL Server engine uses
    going forward. Before Query Store, you had to use plan guides and those are discussed
    later in this chapter. You would force a plan when you notice plan regression.
    Plan regression is when the SQL Server Query Plan Optimizer compiles a new execution
    plan for a query that was previously running and the performance is worse than
    the previous plan. When a plan is forced manually, you should be aware that no
    other execution plan will be used for that query going forward. Also, if there
    is an index change or table schema change, the forced plan could start failing
    causing the SQL Server Query Optimizer to take extra steps to get an execution
    plan each time the query is executed. The reports provide a button by which you
    can force the plans, but you can also for change management purposes use T-SQL
    to force plans with the stored procedure `sys.sp_force_plan`.


    The High Variation report shows you which queries are inconsistent in performance
    which gives you a way to tell which queries are performing differently at times
    and may need to be tuned to perform consistently.


    SSMS has a Forced Plan report where you track and verify that any plans that were
    forced are performing as expected.


    ### Tip


    Older query plans will be deleted from Query Store based on your settings for
    retaining query plans, so you may want to keep separate documentation of the performance
    you expect to see going forward for any forced plans.


    Reports will be discussed in greater detail in Chapter [4](#473933_1_En_4_Chapter.xhtml).


    ## Troubleshooting Without Query Store Techniques


    Without Query Store, there are several techniques you can use to troubleshoot
    problems related to bad query performance. Here we will discuss using `SQL Server
    Profiler` to run a trace on the server through the application, running a server-side
    trace to a file by creating a script using `SQL Server Profiler`, using `Extended
    Events`, pulling information from the DMVs, using a community stored procedure
    called `sp_whoisactive`, and using wait statistics.


    ### SQL Server Profiler


    `SQL Server Profiler` is a common tool that collects information about what is
    running on the server at the moment the application is being executed. Figure
    [1-2](#473933_1_En_1_Chapter.xhtml#Fig2) shows the user interface for it. `SQL
    Server Profiler` is used to capture data for short periods of time quickly. It
    comes with templates to help capture data and gives you the ability to save the
    data to file or table in a database for later analysis. You must have the `ALTER
    TRACE` permission to run `SQL Server Profiler`.


    ![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig2_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig2_HTML.jpg)


    Figure 1-2: SQL Server Profiler screen


    ### Note


    SQL Profiler and server-side traces as of SQL Server 2017 are being deprecated
    and are in maintenance mode. They will be removed in a future release of SQL Server
    in favor of using `Extended Events` and `SSMS XEvent Profiler`.


    `SQL Server Profiler` is commonly used in the following use cases:


    *   Finding slow-running queries and their problem areas.

    *   Stepping through troublesome queries to find the root cause.

    *   Capturing a series of events that cause a problem to be replayed on a test
    system to reproduce the problem.

    *   Capturing data to compare to performance counters to diagnose problems.

    *   Capturing a baseline workload to tune workloads. `SQL Server Profiler` files
    can be used with the Database Engine Tuning Advisor to recommend indexes and statistics
    to tune the captured workload.


    ### Note


    The Database Engine Tuning Advisor recommends indexes and statistics that are
    only ideal for the workload you supplied. Evaluate the recommendations, don’t
    blindly apply them.'
  raw: '#### What Is a Baseline?


    Before we talk about how Query Store can provide you with a baseline, let’s discuss
    what a baseline is. A baseline is established by running a workload against a
    server and taking metrics in several areas to determine if anything has significantly
    changed over time. Areas of interest in SQL Server include, but are not limited
    to, CPU utilization, memory clerk usage, number of reads and writes (physical
    and logical), query execution times, etc. Baselines should be taken during peak
    and non-peak times to get an accurate measurement of the overall activity of your
    server. By having a baseline, you will be able to isolate performance problems
    better and identify bottlenecks.


    #### How Query Store Provides a Baseline


    Query Store aggregates data about queries ran against the database it is enabled
    on into intervals predefined when you configure it. This data is displayed in
    a few different reports. One example is the Overall Resource Consumption in Figure
    [1-1](#473933_1_En_1_Chapter.xhtml#Fig1) that shows charts of the last month of
    duration, execution count, CPU time, and logical reads by default. This report
    is the best for viewing a baseline of the database.


    ![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig1_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Overall Resource Consumption report


    #### Catalog Views


    All the data collected from Query Store are stored in multiple catalog views.
    The aggregated runtime statistical data is stored in `sys.query_store_runtime_stats`.
    The catalog view `sys.query_store_query_text` stores unique query text values
    that have been executed against the database, and the `sys.query_context_settings`
    view stores the settings for the queries stored in the `sys.query_store_query_text`
    view that was executed under settings such as `SET ANSI_NULLS ON` or `SET QUOTED_IDENTIFERS
    ON`. The view `sys.query_store_query` stores all queries uniquely executed based
    on text and context settings executed so you can track them. The `sys.query_store_plan`
    catalog view stores the estimated plan for the query executed and the compile
    time statistics in XML format. The `sys.query_store_runtime_stats_interval` view
    stores the time intervals that the data is stored in.


    More details on catalog views will be discussed in Chapter [5](#473933_1_En_5_Chapter.xhtml).


    #### Stabilizing Performance


    The next report to look at for baselines is the Regressed Queries report, which
    will show you queries that have regressed in performance. For each of these, you
    should look at why the performance has degraded. This report will show how each
    query plan for a specific query has performed over the last month by default.


    From the Regressed Query report or Top Consuming Queries report, you can easily
    see what plans should be forced based on how they are performing. Forcing a plan
    is when you take an execution plan and based on the performance you see in the
    report decide that you want that plan to be the one the SQL Server engine uses
    going forward. Before Query Store, you had to use plan guides and those are discussed
    later in this chapter. You would force a plan when you notice plan regression.
    Plan regression is when the SQL Server Query Plan Optimizer compiles a new execution
    plan for a query that was previously running and the performance is worse than
    the previous plan. When a plan is forced manually, you should be aware that no
    other execution plan will be used for that query going forward. Also, if there
    is an index change or table schema change, the forced plan could start failing
    causing the SQL Server Query Optimizer to take extra steps to get an execution
    plan each time the query is executed. The reports provide a button by which you
    can force the plans, but you can also for change management purposes use T-SQL
    to force plans with the stored procedure `sys.sp_force_plan` .


    The High Variation report shows you which queries are inconsistent in performance
    which gives you a way to tell which queries are performing differently at times
    and may need to be tuned to perform consistently.


    SSMS has a Forced Plan report where you track and verify that any plans that were
    forced are performing as expected.


    ### Tip


    Older query plans will be deleted from Query Store based on your settings for
    retaining query plans, so you may want to keep separate documentation of the performance
    you expect to see going forward for any forced plans.


    Reports will be discussed in greater detail in Chapter [4](#473933_1_En_4_Chapter.xhtml).


    ## Troubleshooting Without Query Store Techniques


    Without Query Store, there are several techniques you can use to troubleshoot
    problems related to bad query performance. Here we will discuss using SQL Server
    Profiler to run a trace on the server through the application, running a server-side
    trace to a file by creating a script using SQL Server Profiler, using Extended
    Events, pulling information from the DMVs, using a community stored procedure
    called `sp_whoisactive`, and using wait statistics.


    ### SQL Server Profiler


    SQL Server Profiler is a common tool that collects information about what is running
    on the server at the moment the application is being executed. Figure [1-2](#473933_1_En_1_Chapter.xhtml#Fig2)
    shows the user interface for it. SQL Server Profiler is used to capture data for
    short periods of time quickly. It comes with templates to help capture data and
    gives you the ability to save the data to file or table in a database for later
    analysis. You must have the `ALTER TRACE` permission to run SQL Server Profiler.


    ![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig2_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    SQL Server Profiler screen


    ### Note


    SQL Profiler and server-side traces as of SQL Server 2017 are being deprecated
    and are in maintenance mode. They will be removed in a future release of SQL Server
    in favor of using Extended Events and SSMS XEvent Profiler.


    SQL Server Profiler is commonly used in the following use cases:


    *   Finding slow-running queries and their problem areas.


    *   Stepping through troublesome queries to find the root cause.


    *   Capturing a series of events that cause a problem to be replayed on a test
    system to reproduce the problem.


    *   Capturing data to compare to performance counters to diagnose problems.


    *   Capturing a baseline workload to tune workloads. SQL Server Profiler files
    can be used with the Database Engine Tuning Advisor to recommend indexes and statistics
    to tune the captured workload.


    ### Note


    The Database Engine Tuning Advisor recommends indexes and statistics that are
    only ideal for the workload you supplied. Evaluate the recommendations, don’t
    blindly apply them.'
  trans: '

    ## 查询存储与性能基线


    #### 什么是基线？


    在讨论查询存储如何为您提供基线之前，我们先来谈谈基线是什么。基线是通过在服务器上运行工作负载并收集多个领域的度量指标来建立的，目的是确定随时间推移是否有任何显著变化。SQL
    Server 中值得关注的领域包括但不限于：CPU 利用率、内存 clerk 使用情况、读写次数（物理和逻辑）、查询执行时间等。为了准确测量服务器的整体活动情况，应在高峰时段和非高峰时段分别采集基线。拥有基线后，您将能更好地隔离性能问题并识别瓶颈。


    #### 查询存储如何提供基线


    查询存储将针对启用该功能的数据库运行的查询数据，聚合到您配置时预定义的时间间隔中。这些数据通过几种不同的报告进行展示。一个例子是图 1-1 中的“总体资源消耗”报告，它默认显示过去一个月的持续时间、执行次数、CPU
    时间和逻辑读取量的图表。这份报告最适合查看数据库的基线。


    ![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig1_HTML.jpg](img/473933_1_En_1_Fig1_HTML.jpg)


    图 1-1：总体资源消耗报告


    #### 目录视图


    从查询存储收集的所有数据都存储在多个目录视图中。聚合的运行时统计数据存储在 `sys.query_store_runtime_stats` 中。目录视图 `sys.query_store_query_text`
    存储了针对数据库执行过的唯一查询文本值，而 `sys.query_context_settings` 视图则存储了存储在 `sys.query_store_query_text`
    视图中的查询所对应的设置，例如在 `SET ANSI_NULLS ON` 或 `SET QUOTED_IDENTIFERS ON` 等设置下执行的查询。`sys.query_store_query`
    视图存储了基于文本和上下文设置唯一执行的所有查询，以便您跟踪它们。`sys.query_store_plan` 目录视图存储了已执行查询的估计计划以及以 XML
    格式存储的编译时统计信息。`sys.query_store_runtime_stats_interval` 视图则存储了数据被存储的时间间隔。


    关于目录视图的更多细节将在第 5 章讨论。


    #### 稳定性能


    下一份用于查看基线的报告是“退化查询”报告，它会向您显示性能已退化的查询。对于每一个这样的查询，您都应该研究其性能下降的原因。默认情况下，该报告会显示特定查询在过去一个月中每个查询计划的执行表现。


    从“退化查询”报告或“消耗最大的查询”报告中，您可以轻松地根据其执行表现来判断哪些计划应该被强制执行。强制执行计划是指，您根据报告中看到的性能表现，决定采用某个执行计划，并指定
    SQL Server 引擎今后都使用该计划。在查询存储出现之前，您必须使用计划指南，这些将在本章后面讨论。当您注意到计划退化时，就应该强制执行一个计划。计划退化是指
    SQL Server 查询计划优化器为之前运行正常的查询编译了一个新的执行计划，但该计划的性能比之前的计划差。当手动强制执行一个计划时，您需要意识到，对于该查询，今后将不再使用任何其他执行计划。此外，如果发生索引更改或表架构更改，被强制的计划可能会开始失效，导致
    SQL Server 查询优化器在每次执行该查询时都需要采取额外步骤来获取执行计划。这些报告提供了一个按钮来强制执行计划，但您也可以出于变更管理的目的，使用
    T-SQL 通过存储过程 `sys.sp_force_plan` 来强制执行计划。


    “高变异度”报告显示了哪些查询在性能上表现不稳定，这为您指明了哪些查询有时表现不同，可能需要进行调整以保持性能的一致性。


    SSMS 中有一份“强制计划报告”，您可以通过它来跟踪和验证任何被强制执行的计划是否按预期运行。


    ### 提示


    较旧的查询计划将根据您设置的查询计划保留策略从查询存储中删除，因此您可能希望单独记录任何强制执行计划的预期未来性能表现。


    更详细的报告讨论将在第 4 章进行。


    ## 不使用查询存储的故障排除技术


    如果不使用查询存储，有几种技术可以用来排除与查询性能不佳相关的问题。这里我们将讨论使用 `SQL Server Profiler` 通过应用程序在服务器上运行跟踪、通过使用
    `SQL Server Profiler` 创建脚本来运行服务器端跟踪到文件、使用 `Extended Events`、从 DMV 中提取信息、使用名为 `sp_whoisactive`
    的社区存储过程，以及使用等待统计信息。


    ### SQL Server Profiler


    `SQL Server Profiler` 是一个常用工具，用于收集应用程序执行时刻服务器上正在运行的信息。图 1-2 展示了它的用户界面。`SQL Server
    Profiler` 用于在短时间内快速捕获数据。它附带了用于帮助捕获数据的模板，并允许您将数据保存到文件或数据库中的表中以便后续分析。运行 `SQL Server
    Profiler` 需要具有 `ALTER TRACE` 权限。


    ![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig2_HTML.jpg](img/473933_1_En_1_Fig2_HTML.jpg)


    图 1-2：SQL Server Profiler 屏幕


    ### 注意


    截至 SQL Server 2017，SQL Profiler 和服务器端跟踪已被弃用，并处于维护模式。它们将在未来版本的 SQL Server 中被移除，建议使用
    `Extended Events` 和 `SSMS XEvent Profiler`。


    `SQL Server Profiler` 通常用于以下用例：


    *   查找运行缓慢的查询及其问题区域。

    *   逐步排查有问题的查询以找到根本原因。

    *   捕获导致问题的一系列事件，以便在测试系统上重放来重现问题。

    *   捕获数据以与性能计数器进行比较来诊断问题。

    *   捕获基线工作负载以进行调优。`SQL Server Profiler` 文件可以与数据库引擎优化顾问一起使用，以推荐用于调优捕获的工作负载的索引和统计信息。


    ### 注意


    数据库引擎优化顾问推荐的索引和统计信息仅针对您提供的工作负载是理想的。请评估这些推荐，不要盲目应用。

    '
- fmt: "# SQL Server Profiler 概念\n\n要使用 SQL Server Profiler，理解其中的术语会很有帮助：\n\n*   **Event**\
    \ 是在数据库引擎中发生的操作。\n\n*   **Event Class** 是要跟踪的事件类型。它包含该事件的所有数据；有多个数据列供您选择。\n\n\
    *   **Event Category** 定义了在 SQL Server Profiler 中事件的分组方式。\n\n*   **Data Column**\
    \ 包含捕获到的事件类数据。每个事件类都有预定义的可用数据列。并非所有数据列都适用于所有事件类。\n\n*   **Template** 是为特定故障排除场景预选了事件类的预定义跟踪。模板预定义了要使用的事件、数据列和筛选器。\n\
    \n*   **Trace** 是 SQL Server Profiler 运行以捕获选定事件类、数据列和筛选器的操作。\n\n*   **Filter**\
    \ 是一种根据您在数据列上指定的条件获取数据子集的方法。\n\n图 1-3 显示了在 SQL Server Profiler 用户界面中应用筛选器的屏幕。\n\
    \n![图 1-3](../images/473933_1_En_1_Chapter/473933_1_En_1_Fig3_HTML.jpg)\n\n图 1-3\
    \ SQL Server Profiler 筛选器屏幕\n\n# 与性能相关的 SQL Server Profiler 事件类\n\n用于收集与查询性能相关数据的不同事件类如下：\n\
    \n*   **Performance Event Category** 下：\n    *   **Auto Stats** 在索引或列的统计信息自动更新时发生。当优化器加载要使用的统计信息时也会发生。\n\
    \n*   **Performance Statistics** 用于获取正在执行的查询、存储过程和触发器的性能统计信息。六个事件子类在系统中构建了这些操作的生命周期。使用这些子类以及以下\
    \ DMV，您可以获取任何查询、存储过程或触发器的性能历史记录：`sys.dm_exec_query_stats`、`sys.dm_exec_procedure_stats`\
    \ 和 `sys.dm_exec_trigger_stats`。\n\n*   **Showplan All** 在执行 SQL 语句时发生。它包含在 Showplan\
    \ XML Statistics Profile 或 Showplan XML 事件类中的信息子集。\n\n*   **Showplan All for Query\
    \ Compile** 在编译 SQL 语句时发生。当您想要识别 Showplan 运算符时，会使用此类事件。这是 Showplan XML for Query\
    \ Compile 事件类中的信息子集。\n\n*   **Showplan Statistics Profile** 在执行 SQL 语句时发生。这是 Showplan\
    \ XML Statistics Profile 事件类中的信息子集。\n\n*   **Showplan Text** 在执行 SQL 语句时发生。这是\
    \ Showplan All、Showplan XML Statistics Profile 或 Showplan XML 事件类中可用信息的一个子集。\n\
    \n*   **Showplan Text (Unencoded)** 与 Showplan Text 事件类相同，只是数据被格式化为文本而不是二进制数据。\n\
    \n*   **Showplan XML** 在执行 SQL 语句时发生。当您想要识别 Showplan 运算符时，会使用此类事件。此事件类中的数据是一个定义的\
    \ XML 文档。\n\n*   **Showplan XML for Query Compile** 在编译 SQL 语句时发生。当您想要识别 Showplan\
    \ 运算符时，会使用此类事件。\n\n*   **Showplan XML Statistics Profile** 在编译 SQL 语句时发生。当您想要识别\
    \ Showplan 运算符时，会使用此类事件。此类事件记录完整的编译时数据。\n\n> **提示** 对于所有 Showplan 事件类，请限制其使用数量，因为它们可能导致显著的性能开销。Showplan\
    \ Text 或 Showplan Text (Unencoded) 是对性能影响最小的事件类，但仍应谨慎使用。\n\n*   **Plan Guide Successful**\
    \ 需要满足三个条件此事件才会触发：\n    1.  计划指南定义中的批处理或模块必须与正在执行的批处理或模块匹配。\n    2.  计划指南定义中的查询必须与正在执行的查询匹配。\n\
    \    3.  编译后的查询必须遵循计划指南中的提示。\n\n*   **Plan Guide Unsuccessful** 在计划指南未能成功生成执行计划时发生。此事件触发需要满足三个条件：\n\
    \    1.  计划指南定义中的批处理或模块必须与正在执行的批处理或模块匹配。\n    2.  计划指南定义中的查询必须与正在执行的查询匹配。\n  \
    \  3.  编译后的查询未遵循计划指南中的提示。\n\n> **注意** 本章后面将详细介绍如何使用计划指南。\n\n*   **Stored Procedures\
    \ Event Category** 下：\n    *   **SP:Completed** 在存储过程完成执行时发生。\n\n*   **SP:Starting**\
    \ 在存储过程开始执行时发生。\n\n*   **SP:StmtCompleted** 在存储过程内的 T-SQL 语句完成执行时发生。\n\n*   **SP:StmtStarting**\
    \ 在存储过程内的 T-SQL 语句开始执行时发生。\n\n*   **T-SQL Event Category** 下：\n    *   **SQL:BatchCompleted**\
    \ 在 T-SQL 批处理完成执行时发生。\n\n*   **SQL:BatchStarting** 在 T-SQL 批处理开始执行时发生。\n\n*  \
    \ **SQL:StmtCompleted** 在 T-SQL 语句完成执行时发生。\n\n*   **SQL:StmtStarting** 在 T-SQL\
    \ 语句开始执行时发生。\n\n在图 1-4 中，您可以看到 SQL Profiler 的跟踪属性屏幕。\n\n![图 1-4](../images/473933_1_En_1_Chapter/473933_1_En_1_Fig4_HTML.jpg)\n\
    \n图 1-4 SQL Server Profiler 事件类屏幕\n\n## 服务器端跟踪\n\n服务器端跟踪是一种无需运行 SQL Server Profiler\
    \ 应用程序即可运行 SQL Server Profiler 会话的方法。这比运行 SQL Profiler 更受推荐。您使用系统存储过程来指定跟踪要捕获的所有事件、数据列和筛选器。您使用\
    \ SQL Profiler 为服务器端跟踪创建脚本：打开 SQL Server Profiler，指定要捕获的事件和列，然后转到“文件”菜单，选择“导出”➤“脚本跟踪定义”➤“适用于\
    \ SQL Server 2005 – 2016”（图 1-5 显示了选择该菜单项的示例）。\n\n![图 1-5](../images/473933_1_En_1_Chapter/473933_1_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5 从 SQL Server Profiler 脚本化服务器端跟踪定义\n\n服务器端跟踪被视为维护模式，这意味着它们计划在未来版本的 SQL\
    \ Server 中移除。因此，您应该尝试切换到 Extended Events，我们将在接下来讨论。\n\n用于创建服务器端跟踪的系统存储过程列表如下：\n\
    \n*   `sp_trace_create` – 创建跟踪。\n*   `sp_trace_generated_event` – 在 SQL Server\
    \ 中创建用户定义的事件。\n*   `sp_trace_setevent` – 向跟踪添加和删除数据列。您必须指定事件编号。完整列表可在线查看：[`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-trace-setevent-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-trace-setevent-transact-sql?view=sql-server-2017)。\n\
    *   `sp_trace_set_filter` – 将筛选器应用于跟踪。\n*   `sp_trace_setstatus` – 根据您指定的跟踪 ID\
    \ 启动或停止跟踪。您可以查询 `sys.traces` 来查找您的 ID。"
  raw: "#### SQL Server Profiler Concepts\n\nTo use SQL Server Profiler, it helps\
    \ to understand the terms in the tool:\n\n*   **Event** is an action that occurs\
    \ in the database engine.\n\n*   **Event Class** is a type of event to be traced.\
    \ This contains all the data for the event; there are several Data Columns for\
    \ you to select from.\n\n*   **EventCategory** defines how the events are grouped\
    \ in SQL Server Profiler.\n\n*   **Data Column** contains the data for the Event\
    \ Class captured. Each Event Class has predefined Data Columns that are available.\
    \ Not all Data Columns are available to all Event Classes.\n\n*   **Template**\
    \ is a predefined trace with an Event Class selected for a particular troubleshooting\
    \ scenario. A template predefines what events, data columns, and filters to use.\n\
    \n*   **Trace** is what SQL Server Profiler runs to capture the selected event\
    \ classes, data columns, and filters.\n\n*   **Filter** is a way to get a subset\
    \ of data based on criteria that you specify on a Data Column.\n\nFigure [1-3](#473933_1_En_1_Chapter.xhtml#Fig3)\
    \ shows the screen in SQL Server Profiler user to apply filters.\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig3_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3\n\nSQL Server Profiler filter screen\n\n#### SQL Server Profiler\
    \ Event Classes Related to Performance\n\nThe different event classes that you\
    \ would use to collect data related to query performance are as follows:\n\n*\
    \   Under the Performance Event Category:\n    *   **Auto Stats** occurs when\
    \ statistics for index or columns are automatically updated. It will also occur\
    \ when the optimizer loads statistics to be used.\n\n*   **Performance Statistics**\
    \ are used to get the performance statistics of queries, stored procedures, and\
    \ triggers executing. Six event subclasses construct the lifetime of these actions\
    \ in the system. Using the subclasses and the following DMVs, you can get the\
    \ performance history of any query, stored procedure, or trigger: `sys.dm_exec_query_stats`,\
    \ `sys.dm_exec_procedure_stats,` and `sys.dm_exec_trigger_stats`.\n\n*   **Showplan\
    \ All** occurs when a SQL Statement is executed. It contains a subset of information\
    \ in the Showplan XML Statistics Profile or Showplan XML event classes.\n\n* \
    \  **Showplan All for Query Compile** occurs when a SQL Statement is compiled.\
    \ This event class is used when you want to identify the Showplan operators. This\
    \ is a subset of information in the Showplan XML for Query Compile event class.\n\
    \n*   **Showplan Statistics Profile** occurs when a SQL statement is executed.\
    \ This is a subset of information in the Showplan XML Statistics Profile event\
    \ class.\n\n*   **Showplan Text** occurs when a SQL statement is executed. This\
    \ is a subset of the information available in the Showplan All, Showplan XML Statistics\
    \ Profile, or Showplan XML event classes.\n\n*   **Showplan Text (Unencoded)**\
    \ is the same as the Showplan Text event class, except the data is formatted as\
    \ text instead of as binary data.\n\n*   **Showplan XML** occurs when a SQL statement\
    \ is executed. This event class is used when you want to identify the Showplan\
    \ operators. The data in this event class is a defined XML document.\n\n*   **Showplan\
    \ XML for Query Compile** occurs when a SQL statement is compiled. This event\
    \ class is used when you want to identify the Showplan operators.\n\n*   **Showplan\
    \ XML Statistics Profile** occurs when a SQL statement is compiled. This event\
    \ class is used when you want to identify the Showplan operators. This event class\
    \ records complete, compile-time data.\n\n**Tip** For all Showplan event classes,\
    \ limit the number of them in use, because they can cause significant performance\
    \ overhead. Showplan Text or Showplan Text (Unencoded) are the event classes that\
    \ will affect performance the least but still should be used sparingly.\n\n* \
    \  **Plan Guide Successful** has three conditions that have to be true for this\
    \ event to fire:\n        1.  The batch or module in the plan guide definition\
    \ must match the batch or module that is being executed.\n\n2.  The query in the\
    \ plan guide definition must match the query that is being executed.\n\n3.  The\
    \ compiled query honors the hints in the plan guide.\n\n*   **Plan Guide Unsuccessful**\
    \ occurs when a plan guide unsuccessfully produces an execution plan. Three conditions\
    \ have to be true for this event to fire:\n        1.  The batch or module in\
    \ the plan guide definition must match the batch or module that is being executed.\n\
    \n2.  The query in the plan guide definition must match the query that is being\
    \ executed.\n\n3.  The compiled query did not honor the hints in the plan guide.\n\
    \n**Note** There is more on how to use plan guides later in this chapter.\n\n\
    *   Under the Stored Procedures Event Category:\n    *   **SP:Completed** occurs\
    \ when a stored procedure finishes executing.\n\n*   **SP:Starting** occurs when\
    \ a stored procedure starts executing.\n\n*   **SP:StmtCompleted** occurs when\
    \ a T-SQL statement inside the stored procedure finishes executing.\n\n*   **SP:StmtStarting**\
    \ occurs when a T-SQL statement inside the stored procedure starts executing.\n\
    \n*   Under the T-SQL Event Category:\n    *   **SQL:BatchCompleted** occurs when\
    \ a T-SQL batch finishes executing.\n\n*   **SQL:BatchStarting** occurs when a\
    \ T-SQL batch starts executing.\n\n*   **SQL:StmtCompleted** occurs when a T-SQL\
    \ statement finishes executing.\n\n*   **SQL:StmtStarting** occurs when a T-SQL\
    \ statement starts executing.\n\nIn Figure [1-4](#473933_1_En_1_Chapter.xhtml#Fig4)\
    \ you can see the trace properties screen from SQL Profiler.\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig4_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig4_HTML.jpg)\n\
    \nFigure 1-4\n\nSQL Server Profiler Event Class screen\n\n### Server-Side Traces\n\
    \nServer-side traces are a way to run a SQL Server Profiler session without running\
    \ the SQL Server Profiler application. This is preferred over running SQL Profiler.\
    \ You use system stored procedures to specify all the events, data columns, and\
    \ filters for the trace to capture. You use SQL Profiler to create a script for\
    \ a server-side trace by opening SQL Server Profiler and specify events and columns\
    \ you want to capture. Then go under the File menu and select, then Export ➤ Script\
    \ Trace Definition ➤ For SQL Server 2005 – 2016\\. (Figure [1-5](#473933_1_En_1_Chapter.xhtml#Fig5)\
    \ shows an example of selecting that menu item).\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig5_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5\n\nScript out server-side trace definition from SQL Server Profiler\n\
    \nServer-side traces are considered in maintenance mode, meaning they are planned\
    \ to be removed in a future version of SQL Server. Thus, you should be trying\
    \ to switch to Extended Events, which we discuss next.\n\nThe list of system stored\
    \ procedures used to create a server-side trace is as follows:\n\n*   `sp_trace_create` –\
    \ creates the trace.\n\n*   `sp_trace_generated_event` – creates a user-defined\
    \ even in SQL Server.\n\n*   `sp_trace_setevent` – adds and removes Data Columns\
    \ to the trace. You must specify the Event Number. A complete list can be found\
    \ online at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-trace-setevent-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-trace-setevent-transact-sql%253Fview%253Dsql-server-2017)\
    \ .\n\n*   `sp_trace_set_filter` – applies a filter to a trace.\n\n*   `sp_trace_setstatus` –\
    \ stops and starts a trace based on the id of the trace you specify. You can query\
    \ `sys.traces` to find your id."
  trans: "\n# SQL Server Profiler 概念\n\n要使用 SQL Server Profiler，理解其中的术语会很有帮助：\n\n\
    *   **事件** 是在数据库引擎中发生的操作。\n\n*   **事件类** 是要跟踪的事件类型。它包含该事件的所有数据；有多个数据列供您选择。\n\n\
    *   **事件类别** 定义了在 SQL Server Profiler 中事件的分组方式。\n\n*   **数据列** 包含捕获到的事件类数据。每个事件类都有预定义的可用数据列。并非所有数据列都适用于所有事件类。\n\
    \n*   **模板** 是为特定故障排除场景预选了事件类的预定义跟踪。模板预定义了要使用的事件、数据列和筛选器。\n\n*   **跟踪** 是 SQL\
    \ Server Profiler 运行以捕获选定事件类、数据列和筛选器的操作。\n\n*   **筛选器** 是一种根据您在数据列上指定的条件获取数据子集的方法。\n\
    \n图 1-3 显示了在 SQL Server Profiler 用户界面中应用筛选器的屏幕。\n\n![图 1-3](img/473933_1_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3 SQL Server Profiler 筛选器屏幕\n\n# 与性能相关的 SQL Server Profiler 事件类\n\n用于收集与查询性能相关数据的不同事件类如下：\n\
    \n*   **Performance Event Category** 下：\n    *   **Auto Stats** 在索引或列的统计信息自动更新时发生。当优化器加载要使用的统计信息时也会发生。\n\
    \n*   **Performance Statistics** 用于获取正在执行的查询、存储过程和触发器的性能统计信息。六个事件子类在系统中构建了这些操作的生命周期。使用这些子类以及以下\
    \ DMV，您可以获取任何查询、存储过程或触发器的性能历史记录：`sys.dm_exec_query_stats`、`sys.dm_exec_procedure_stats`\
    \ 和 `sys.dm_exec_trigger_stats`。\n\n*   **Showplan All** 在执行 SQL 语句时发生。它包含在 Showplan\
    \ XML Statistics Profile 或 Showplan XML 事件类中的信息子集。\n\n*   **Showplan All for Query\
    \ Compile** 在编译 SQL 语句时发生。当您想要识别 Showplan 运算符时，会使用此类事件。这是 Showplan XML for Query\
    \ Compile 事件类中的信息子集。\n\n*   **Showplan Statistics Profile** 在执行 SQL 语句时发生。这是 Showplan\
    \ XML Statistics Profile 事件类中的信息子集。\n\n*   **Showplan Text** 在执行 SQL 语句时发生。这是\
    \ Showplan All、Showplan XML Statistics Profile 或 Showplan XML 事件类中可用信息的一个子集。\n\
    \n*   **Showplan Text (Unencoded)** 与 Showplan Text 事件类相同，只是数据被格式化为文本而不是二进制数据。\n\
    \n*   **Showplan XML** 在执行 SQL 语句时发生。当您想要识别 Showplan 运算符时，会使用此类事件。此事件类中的数据是一个定义的\
    \ XML 文档。\n\n*   **Showplan XML for Query Compile** 在编译 SQL 语句时发生。当您想要识别 Showplan\
    \ 运算符时，会使用此类事件。\n\n*   **Showplan XML Statistics Profile** 在编译 SQL 语句时发生。当您想要识别\
    \ Showplan 运算符时，会使用此类事件。此类事件记录完整的编译时数据。\n\n> **提示** 对于所有 Showplan 事件类，请限制其使用数量，因为它们可能导致显著的性能开销。Showplan\
    \ Text 或 Showplan Text (Unencoded) 是对性能影响最小的事件类，但仍应谨慎使用。\n\n*   **Plan Guide Successful**\
    \ 需要满足三个条件此事件才会触发：\n    1.  计划指南定义中的批处理或模块必须与正在执行的批处理或模块匹配。\n    2.  计划指南定义中的查询必须与正在执行的查询匹配。\n\
    \    3.  编译后的查询必须遵循计划指南中的提示。\n\n*   **Plan Guide Unsuccessful** 在计划指南未能成功生成执行计划时发生。此事件触发需要满足三个条件：\n\
    \    1.  计划指南定义中的批处理或模块必须与正在执行的批处理或模块匹配。\n    2.  计划指南定义中的查询必须与正在执行的查询匹配。\n  \
    \  3.  编译后的查询未遵循计划指南中的提示。\n\n> **注意** 本章后面将详细介绍如何使用计划指南。\n\n*   **Stored Procedures\
    \ Event Category** 下：\n    *   **SP:Completed** 在存储过程完成执行时发生。\n\n*   **SP:Starting**\
    \ 在存储过程开始执行时发生。\n\n*   **SP:StmtCompleted** 在存储过程内的 T-SQL 语句完成执行时发生。\n\n*   **SP:StmtStarting**\
    \ 在存储过程内的 T-SQL 语句开始执行时发生。\n\n*   **T-SQL Event Category** 下：\n    *   **SQL:BatchCompleted**\
    \ 在 T-SQL 批处理完成执行时发生。\n\n*   **SQL:BatchStarting** 在 T-SQL 批处理开始执行时发生。\n\n*  \
    \ **SQL:StmtCompleted** 在 T-SQL 语句完成执行时发生。\n\n*   **SQL:StmtStarting** 在 T-SQL\
    \ 语句开始执行时发生。\n\n在图 1-4 中，您可以看到 SQL Profiler 的跟踪属性屏幕。\n\n![图 1-4](img/473933_1_En_1_Fig4_HTML.jpg)\n\
    \n图 1-4 SQL Server Profiler 事件类屏幕\n\n## 服务器端跟踪\n\n服务器端跟踪是一种无需运行 SQL Server Profiler\
    \ 应用程序即可运行 SQL Server Profiler 会话的方法。这比运行 SQL Profiler 更受推荐。您使用系统存储过程来指定跟踪要捕获的所有事件、数据列和筛选器。您使用\
    \ SQL Profiler 为服务器端跟踪创建脚本：打开 SQL Server Profiler，指定要捕获的事件和列，然后转到“文件”菜单，选择“导出”➤“脚本跟踪定义”➤“适用于\
    \ SQL Server 2005 – 2016”（图 1-5 显示了选择该菜单项的示例）。\n\n![图 1-5](img/473933_1_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5 从 SQL Server Profiler 脚本化服务器端跟踪定义\n\n服务器端跟踪被视为维护模式，这意味着它们计划在未来版本的 SQL\
    \ Server 中移除。因此，您应该尝试切换到 Extended Events，我们将在接下来讨论。\n\n用于创建服务器端跟踪的系统存储过程列表如下：\n\
    \n*   `sp_trace_create` – 创建跟踪。\n*   `sp_trace_generated_event` – 在 SQL Server\
    \ 中创建用户定义的事件。\n*   `sp_trace_setevent` – 向跟踪添加和删除数据列。您必须指定事件编号。完整列表可在线查看：[`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-trace-setevent-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-trace-setevent-transact-sql?view=sql-server-2017)。\n\
    *   `sp_trace_set_filter` – 将筛选器应用于跟踪。\n*   `sp_trace_setstatus` – 根据您指定的跟踪 ID\
    \ 启动或停止跟踪。您可以查询 `sys.traces` 来查找您的 ID。\n"
- fmt: "### Disadvantages of SQL Server Profiler or Server-Side Traces over Query\
    \ Store\n\nA few disadvantages to SQL Profiler or server-side traces over Query\
    \ Store when getting a baseline are that the data is not aggregated for you with\
    \ you writing queries yourself or using a third-party tool. Running the SQL Server\
    \ Profiler application can be a big performance hit in itself to your system under\
    \ heavy workloads; you should run server-side traces instead if you are not going\
    \ to use Extended Events (which we will discuss next). Due to the length of time\
    \ you could be running either one to capture every event, the files or data in\
    \ the SQL Server Profiler application can get quite large and will take time to\
    \ process the data to get the desired information. Query Store automatically captures\
    \ all your queries and aggregates them for you without any extra processes and\
    \ has a minimal impact in performance on most systems.\n\n### Extended Events\n\
    \nExtended Events was introduced in SQL Server 2008 and are a more lightweight\
    \ way alternative to server-side traces. Extended Events can provide you with\
    \ more insight into the database engine than SQL Server Profiler and server-side\
    \ traces. In Figure [1-6](#473933_1_En_1_Chapter.xhtml#Fig6), you can see with\
    \ the newest version of SSMS, you have two built-in Extended Events under the\
    \ tree labeled XEvent Profiler. One thing to note is once you start a session,\
    \ they do not stop running when you close SSMS, you must manually stop a session.\
    \ You can stop can XEvent Profiler session by hitting the red stop button on the\
    \ toolbar before exiting SSMS.\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig6_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6\n\nXEvent Profiler in SSMS\n\nSession definitions can be found in\
    \ your installation path of SSMS, such as `C:\\Program Files (x86)\\Microsoft\
    \ SQL Server\\140\\Tools\\Templates\\sql\\xevent`. In Figure [1-7](#473933_1_En_1_Chapter.xhtml#Fig7),\
    \ you can find a list of the extended event session provided. The T-SQL template\
    \ “Captures all Transact-SQL statements that are submitted to SQL Server by clients\
    \ and the time issued. Use to debug client applications.” The Standard template\
    \ is a “Generic starting point for creating a trace. Captures all stored procedures\
    \ and Transact-SQL batches that are run. Use to monitor general database server\
    \ activity.”\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig7_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7\n\nTemplate directory for extended events templates included with\
    \ SSMS\n\n#### Extended Events Concepts\n\nTo use Extended Events, it helps to\
    \ understand the terms used to define them.\n\n*   **Packages** contain objects\
    \ used for getting and processing data for an Extended Events session. Packages\
    \ can contain the following:\n    *   **Events** are points that you want to monitor\
    \ in the execution path of the SQL Server. They can be asynchronous or synchronous.\
    \ To get a list of events that correspond to the Event Classes in SQL Server Profiler,\
    \ you can execute the query shown in Listing [1-1](#473933_1_En_1_Chapter.xhtml#PC1).\n\
    \n```\nUSE MASTER;\nGO;\nSELECT DISTINCT\ntb.trace_event_id,\nte.[name] AS 'Event\
    \ Class',\nem.package_name AS 'Package',\nem.xe_event_name AS 'XEvent Name',\n\
    tca.[name] AS 'Profiler Category'\nFROM (sys.trace_events te\nLEFT OUTER JOIN\
    \ sys.trace_xe_event_map em\nON te.trace_event_id =\nem.trace_event_id)\nLEFT\
    \ OUTER JOIN sys.trace_event_bindings tb\nON em.trace_event_id = tb.trace_event_id\n\
    INNER JOIN sys.trace_categories tca\nON tca.category_id = te.category_id\nWHERE\
    \ tb.trace_event_id IS NOT NULL\nAND tca.[name] in ('Stored Procedures',\n'TSQL',\n\
    'Performance')\nORDER BY tb.trace_event_id;\n```\nListing 1-1\nCode to get a list\
    \ of corresponding Extended Events for SQL Profiler Events\n\nThe same cautions\
    \ exist as with SQL Server Profiler capturing lots of events, especially with\
    \ execution plans, can cause performance problems. Below is a list of common events\
    \ that you may want to capture in an Extended Events session.\n\n*   `Sp_statement_completed`\
    \ is captured when a statement in a stored procedure completes execution.\n\n\
    *   `Sql_statement_completed` is captured when a SQL statement has completed execution.\n\
    \n*   `Query_post_compilation_showplan` occurs after a SQL statement is compiled\
    \ and returns the estimated plan in XML format.\n\n*   **Targets** tell the session\
    \ where to store the data.\n\n*   **Actions** tell the package what action to\
    \ take if a certain event happens, such as capturing a stack dump or grabbing\
    \ an execution plan.\n\n*   **Types** are the type of bytes strung together and\
    \ the length and characteristics of the data to be able to interpret the data.\
    \ The different types are as follows:\n    *   `event`\n    *   `action`\n   \
    \ *   `target`\n    *   `pred_source`\n    *   `pred_compare`\n    *   `type`\n\
    \n*   **Predicates** are like `WHERE` clauses to help filter out events that are\
    \ captured.\n\n*   **Maps** is a table that lets you know what an internal value\
    \ means.\n\n*   **Targets** provides a place where the data for a session will\
    \ be stored.\n\n*   **Event counter** is used to keep a count of all events that\
    \ occurred that you specified for your session synchronously.\n\n*   **Event file**\
    \ writes all event session data from memory to disk asynchronously.\n\n*   **Event\
    \ pairing** determines when paired events do occur in a matched set asynchronously\
    \ to capture.\n\n*   **Event Tracing for Windows (ETW)** correlates events to\
    \ Windows or applications event data synchronously.\n\n*   **Histogram** is used\
    \ to keep a count of a specified event and occurs asynchronously.\n\n*   **Ring\
    \ buffer** holds data in memory in first-in-first-out (FIFO) method asynchronously.\n\
    \n*   **Engine** implements Extended Events by enabling the definition of events,\
    \ processing event data, managing Extended Events services and objects, and keeping\
    \ a list of sessions and managing access to the list.\n\n*   **Sessions** set\
    \ up with events in them to collect the information you need to troubleshoot an\
    \ issue. This pulls everything together to give you the data you need to troubleshoot\
    \ your issue by allowing to specify actions, targets, and predicates.\n\n####\
    \ Disadvantages of Extended Events over Query Store\n\nSome disadvantages to Extended\
    \ Events are similar to that of SQL Server Profiler in that the data is not aggregated\
    \ unless you are doing a single column. It must be run for the entire period of\
    \ the workload you are measuring which causes the files to get quite large and\
    \ takes time for you to process the data.\n\n#### Disadvantage of SQL Server Profiler\
    \ and Server-Side Traces over Extended Events\n\nSQL Server Profiler and server-side\
    \ traces process each event that occurs to narrow down to the specific events\
    \ you have indicated to capture which can cause a performance hit. Due to the\
    \ performance hit and the lightweight nature of Extended Events it is recommended\
    \ you use Extended Events. Remember also SQL Server Profiler and server-side traces\
    \ are being deprecated."
  raw: "### Disadvantages of SQL Server Profiler or Server-Side Traces over Query\
    \ Store\n\nA few disadvantages to SQL Profiler or server-side traces over Query\
    \ Store when getting a baseline are that the data is not aggregated for you with\
    \ you writing queries yourself or using a third-party tool. Running the SQL Server\
    \ Profiler application can be a big performance hit in itself to your system under\
    \ heavy workloads; you should run server-side traces instead if you are not going\
    \ to use Extended Events (which we will discuss next). Due to the length of time\
    \ you could be running either one to capture every event, the files or data in\
    \ the SQL Server Profiler application can get quite large and will take time to\
    \ process the data to get the desired information. Query Store automatically captures\
    \ all your queries and aggregates them for you without any extra processes and\
    \ has a minimal impact in performance on most systems.\n\n### Extended Events\n\
    \nExtended Events was introduced in SQL Server 2008 and are a more lightweight\
    \ way alternative to server-side traces. Extended Events can provide you with\
    \ more insight into the database engine than SQL Server Profiler and server-side\
    \ traces. In Figure [1-6](#473933_1_En_1_Chapter.xhtml#Fig6), you can see with\
    \ the newest version of SSMS, you have two built-in Extended Events under the\
    \ tree labeled XEvent Profiler. One thing to note is once you start a session,\
    \ they do not stop running when you close SSMS, you must manually stop a session.\
    \ You can stop can XEvent Profiler session by hitting the red stop button on the\
    \ toolbar before exiting SSMS.\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig6_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6\n\nXEvent Profiler in SSMS\n\nSession definitions can be found in\
    \ your installation path of SSMS, such as C:\\Program Files (x86)\\Microsoft SQL\
    \ Server\\140\\Tools\\Templates\\sql\\xevent. In Figure [1-7](#473933_1_En_1_Chapter.xhtml#Fig7),\
    \ you can find a list of the extended event session provided. The T-SQL template\
    \ “Captures all Transact-SQL statements that are submitted to SQL Server by clients\
    \ and the time issued. Use to debug client applications.” The Standard template\
    \ is a “Generic starting point for creating a trace. Captures all stored procedures\
    \ and Transact-SQL batches that are run. Use to monitor general database server\
    \ activity.”\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig7_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7\n\nTemplate directory for extended events templates included with\
    \ SSMS\n\n#### Extended Events Concepts\n\nTo use Extended Events, it helps to\
    \ understand the terms used to define them.\n\n*   **Packages** contain objects\
    \ used for getting and processing data for an Extended Events session. Packages\
    \ can contain the following:\n    *   **Events** are points that you want to monitor\
    \ in the execution path of the SQL Server. They can be asynchronous or synchronous.\
    \ To get a list of events that correspond to the Event Classes in SQL Server Profiler,\
    \ you can execute the query shown in Listing [1-1](#473933_1_En_1_Chapter.xhtml#PC1).\n\
    \n```\nUSE MASTER;\nGO;\nSELECT DISTINCT\ntb.trace_event_id,\nte.[name] AS 'Event\
    \ Class',\nem.package_name AS 'Package',\nem.xe_event_name AS 'XEvent Name',\n\
    tca.[name] AS 'Profiler Category'\nFROM (sys.trace_events te\nLEFT OUTER JOIN\
    \ sys.trace_xe_event_map em\nON te.trace_event_id =\nem.trace_event_id)\nLEFT\
    \ OUTER JOIN sys.trace_event_bindings tb\nON em.trace_event_id = tb.trace_event_id\n\
    INNER JOIN sys.trace_categories tca\nON tca.category_id = te.category_id\nWHERE\
    \ tb.trace_event_id IS NOT NULL\nAND tca.[name] in ('Stored Procedures',\n'TSQL',\n\
    'Performance')\nORDER BY tb.trace_event_id;\nListing 1-1\nCode to get a list of\
    \ corresponding Extended Events for SQL Profiler Events\n```\n\nThe same cautions\
    \ exist as with SQL Server Profiler capturing lots of events, especially with\
    \ execution plans, can cause performance problems. Below is a list of common events\
    \ that you may want to capture in an Extended Events session.\n\n*   Sp_statement_completed\
    \ is captured when a statement in a stored procedure completes execution.\n\n\
    *   Sql_statement_completed is captured when a SQL statement has completed execution.\n\
    \n*   Query_post_compilation_showplan occurs after a SQL statement is compiled\
    \ and returns the estimated plan in XML format.\n\n*   **Targets** tell the session\
    \ where to store the data.\n\n*   **Actions** tell the package what action to\
    \ take if a certain event happens, such as capturing a stack dump or grabbing\
    \ an execution plan.\n\n*   **Types** are the type of bytes strung together and\
    \ the length and characteristics of the data to be able to interpret the data.\
    \ The different types are as follows:\n    *   event\n\n    *   action\n\n   \
    \ *   target\n\n    *   pred_source\n\n    *   pred_compare\n\n    *   type\n\n\
    *   **Predicates** are like `WHERE` clauses to help filter out events that are\
    \ captured.\n\n*   **Maps** is a table that lets you know what an internal value\
    \ means.\n\n*   **Targets** provides a place where the data for a session will\
    \ be stored.\n\n*   **Event counter** is used to keep a count of all events that\
    \ occurred that you specified for your session synchronously.\n\n*   **Event file**\
    \ writes all event session data from memory to disk asynchronously.\n\n*   **Event\
    \ pairing** determines when paired events do occur in a matched set asynchronously\
    \ to capture.\n\n*   **Event Tracing for Windows (ETW)** correlates events to\
    \ Windows or applications event data synchronously.\n\n*   **Histogram** is used\
    \ to keep a count of a specified event and occurs asynchronously.\n\n*   **Ring\
    \ buffer** holds data in memory in first-in-first-out (FIFO) method asynchronously.\n\
    \n*   **Engine** implements Extended Events by enabling the definition of events,\
    \ processing event data, managing Extended Events services and objects, and keeping\
    \ a list of sessions and managing access to the list.\n\n*   **Sessions** set\
    \ up with events in them to collect the information you need to troubleshoot an\
    \ issue. This pulls everything together to give you the data you need to troubleshoot\
    \ your issue by allowing to specify actions, targets, and predicates.\n\n####\
    \ Disadvantages of Extended Events over Query Store\n\nSome disadvantages to Extended\
    \ Events are similar to that of SQL Server Profiler in that the data is not aggregated\
    \ unless you are doing a single column. It must be run for the entire period of\
    \ the workload you are measuring which causes the files to get quite large and\
    \ takes time for you to process the data.\n\n#### Disadvantage of SQL Server Profiler\
    \ and Server-Side Traces over Extended Events\n\nSQL Server Profiler and server-side\
    \ traces process each event that occurs to narrow down to the specific events\
    \ you have indicated to capture which can cause a performance hit. Due to the\
    \ performance hit and the lightweight nature of Extended Events it is recommended\
    \ you use Extended Events. Remember also SQL Server Profiler and server-side traces\
    \ are being deprecated."
  trans: "\n### 与查询存储相比，SQL Server Profiler 或服务器端跟踪的缺点\n\n与查询存储相比，使用 SQL Profiler\
    \ 或服务器端跟踪来获取基线数据有几个缺点：数据不会自动为您聚合，除非您自己编写查询或使用第三方工具。运行 SQL Server Profiler 应用程序本身在高工作负载下可能对系统造成很大的性能影响；如果您不打算使用扩展事件（我们接下来会讨论），您应该运行服务器端跟踪。由于您可能需要长时间运行其中一种工具来捕获所有事件，SQL\
    \ Server Profiler 应用程序中的文件或数据可能会变得相当大，并且需要花费时间处理数据以获取所需信息。查询存储会自动捕获您的所有查询并为您进行聚合，无需任何额外进程，并且在大多数系统上对性能的影响极小。\n\
    \n### 扩展事件\n\n扩展事件在 SQL Server 2008 中引入，是比服务器端跟踪更轻量级的替代方案。扩展事件可以为您提供比 SQL Server\
    \ Profiler 和服务器端跟踪更深入的数据库引擎洞察。在图 1-6 中，您可以看到在最新版本的 SSMS 中，树状结构“XEvent Profiler”下有两个内置的扩展事件。需要注意的一点是，一旦启动一个会话，即使您关闭\
    \ SSMS，它们也不会停止运行，您必须手动停止会话。您可以在退出 SSMS 之前，通过点击工具栏上的红色停止按钮来停止 XEvent Profiler 会话。\n\
    \n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig6_HTML.jpg](img/473933_1_En_1_Fig6_HTML.jpg)\n\
    \n图 1-6\n\nSSMS 中的 XEvent Profiler\n\n会话定义可以在您的 SSMS 安装路径中找到，例如 `C:\\Program Files\
    \ (x86)\\Microsoft SQL Server\\140\\Templates\\sql\\xevent`。在图 1-7 中，您可以找到提供的扩展事件会话列表。T-SQL\
    \ 模板“捕获客户端提交给 SQL Server 的所有 Transact-SQL 语句及其发出时间。用于调试客户端应用程序。” 标准模板是“创建跟踪的通用起点。捕获所有运行的存储过程和\
    \ Transact-SQL 批处理。用于监视一般的数据库服务器活动。”\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig7_HTML.jpg](img/473933_1_En_1_Fig7_HTML.jpg)\n\
    \n图 1-7\n\nSSMS 附带的扩展事件模板的目录\n\n#### 扩展事件概念\n\n要使用扩展事件，理解用于定义它们的术语会很有帮助。\n\n*\
    \   **包** 包含用于获取和处理扩展事件会话数据的对象。包可以包含以下内容：\n    *   **事件** 是您想要在 SQL Server 执行路径中监控的节点。它们可以是异步或同步的。要获取与\
    \ SQL Server Profiler 中的事件类相对应的事件列表，您可以执行清单 1-1 中所示的查询。\n\n```\nUSE MASTER;\n\
    GO;\nSELECT DISTINCT\ntb.trace_event_id,\nte.[name] AS 'Event Class',\nem.package_name\
    \ AS 'Package',\nem.xe_event_name AS 'XEvent Name',\ntca.[name] AS 'Profiler Category'\n\
    FROM (sys.trace_events te\nLEFT OUTER JOIN sys.trace_xe_event_map em\nON te.trace_event_id\
    \ =\nem.trace_event_id)\nLEFT OUTER JOIN sys.trace_event_bindings tb\nON em.trace_event_id\
    \ = tb.trace_event_id\nINNER JOIN sys.trace_categories tca\nON tca.category_id\
    \ = te.category_id\nWHERE tb.trace_event_id IS NOT NULL\nAND tca.[name] in ('Stored\
    \ Procedures',\n'TSQL',\n'Performance')\nORDER BY tb.trace_event_id;\n```\n清单\
    \ 1-1\n用于获取 SQL Profiler 事件对应扩展事件列表的代码\n\n与 SQL Server Profiler 类似的注意事项依然存在，捕获大量事件，特别是执行计划，可能导致性能问题。以下是一个您可能希望在扩展事件会话中捕获的常见事件列表。\n\
    \n*   `Sp_statement_completed` 在存储过程中的语句完成执行时被捕获。\n*   `Sql_statement_completed`\
    \ 在 SQL 语句完成执行时被捕获。\n*   `Query_post_compilation_showplan` 在 SQL 语句编译后发生，并以 XML\
    \ 格式返回估计的计划。\n\n*   **目标** 告诉会话数据存储的位置。\n*   **操作** 告诉包在特定事件发生时应采取的操作，例如捕获堆栈转储或获取执行计划。\n\
    *   **类型** 是字节串在一起的类型以及数据的长度和特征，以便能够解释数据。不同类型如下：\n    *   `event`\n    *   `action`\n\
    \    *   `target`\n    *   `pred_source`\n    *   `pred_compare`\n    *   `type`\n\
    *   **谓词** 类似于 `WHERE` 子句，用于帮助过滤捕获的事件。\n*   **映射** 是一个表格，让您知道内部值的含义。\n*   **目标**\
    \ 提供存储会话数据的地方。\n*   **事件计数器** 用于同步地统计您为会话指定的所有已发生事件。\n*   **事件文件** 异步地将所有会话事件数据从内存写入磁盘。\n\
    *   **事件配对** 异步地确定配对事件是否在匹配的集合中发生以进行捕获。\n*   **Windows 事件跟踪 (ETW)** 同步地将事件与 Windows\
    \ 或应用程序事件数据关联起来。\n*   **直方图** 用于统计指定的事件，并以异步方式发生。\n*   **环形缓冲区** 以先进先出 (FIFO)\
    \ 的方式异步地将数据保存在内存中。\n*   **引擎** 通过支持事件定义、处理事件数据、管理扩展事件服务和对象，以及维护会话列表并管理对列表的访问，来实现扩展事件。\n\
    *   **会话** 通过设置包含事件的会话来收集解决问题所需的信息。这通过允许您指定操作、目标和谓词，将所有内容整合在一起，为您提供解决问题所需的数据。\n\
    \n#### 与查询存储相比，扩展事件的缺点\n\n扩展事件的一些缺点与 SQL Server Profiler 类似，即除非您只处理单列，否则数据不会被聚合。它必须在您测量的整个工作负载期间运行，这会导致文件变得相当大，并且需要花费时间处理数据。\n\
    \n#### 与扩展事件相比，SQL Server Profiler 和服务器端跟踪的缺点\n\nSQL Server Profiler 和服务器端跟踪会处理发生的每个事件，以缩小到您指定的特定事件范围，这可能导致性能下降。由于性能影响以及扩展事件的轻量级特性，建议您使用扩展事件。同时请记住，SQL\
    \ Server Profiler 和服务器端跟踪正逐渐被弃用。\n"
- fmt: "### Lightweight Show Plan Trace Flag\n\nStarting in SQL Server 2014, Trace\
    \ Flag 7412 was introduced to allow to access the actual execution plan of queries\
    \ that are currently running via the `sys.dm_exec_query_statistics_xml` DMV. This\
    \ data can also be accessed from the Activity Monitor by right-clicking on any\
    \ running process and selecting Show Live Execution Plan. Improvements were made\
    \ to make it even more lightweight in SQL Server 2016 SP1. This method is by far\
    \ more lightweight than capturing the estimated plans with SQL Server Profiler,\
    \ server-side traces, Extended Events, and Query Store. So, it’s recommended you\
    \ patch your SQL Server instances and enable this trace flag. It is enabled by\
    \ default in SQL Server 2019. There is a new query hint as well, `query_plan_profile`,\
    \ to enable at the query level in SQL Server 2017 CU11 and SQL Server 2017 CU3.\
    \ The overhead of enabling this trace flag is estimated to be about a 2% CPU performance\
    \ hit. Figure 1-8 shows how to show the Live Execution Plan in the Activity Monitor\
    \ by right-clicking any currently running process.\n\n### Note\n\nSee this blog\
    \ post by SQL Server Tiger Team for more information about the performance impacts:\
    \ [`https://bit.ly/2DKR7qg`](https://bit.ly/2DKR7qg) Also, you can only view the\
    \ plan while the query is running.\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig8_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8: Show Live Execution Plan in Activity Monitor\n\n### sys.dm_exec_query_plan_stats\n\
    \nIn SQL Server 2019, DMF (Dynamic Management Function) was introduced which allows\
    \ you to retrieve the last actual execution plan for a query. This is a compliment\
    \ to the Lightweight Show Plan Trace Flag above but you don’t have to catch the\
    \ query running to be able to get the execution plan. It requires you to turn\
    \ on Trace Flag 2451. Then you can run the code in Listing 1-2 to view the execution\
    \ plan in column `last_actual_exec_plan`.\n\n```\nSELECT er.session_id,\ner.start_time,\n\
    er.status,\ner.command,\nst.text,\nqp.query_plan AS cached_plan,\nqps.query_plan\
    \ AS last_actual_exec_plan\nFROM sys.dm_exec_requests AS er\nOUTER APPLY sys.dm_exec_query_plan(er.plan_handle)\
    \ qp\nOUTER APPLY sys.dm_exec_sql_text(er.sql_handle) st\nOUTER APPLY sys.dm_exec_query_plan_stats(er.plan_handle)\
    \ qps\nWHERE session_id > 50\nAND status IN ('running', 'suspended');\nGO\n```\n\
    Listing 1-2: Query for retrieving last actual execution plan for running processes\n\
    \n### DMVs\n\nDynamic Management Views (DMVs) were introduced in SQL Server 2005\
    \ and made troubleshooting issues with SQL Server easier. There are several DMVs\
    \ related to performance, but only a few that are related to what is running queries\
    \ against the SQL Server. We will discuss those DMVs below:\n\n*   `sys.dm_exec_cached_plans`\
    \ stores the estimated execution plan for each query when it is executed until\
    \ the cache clears it out.\n*   `sys.dm_exec_connections` contains information\
    \ about all the connections to the SQL Server. For Azure SQL Database, it returns\
    \ connections to the SQL Database. It contains relationships with `sys.dm_exec_requests`\
    \ and `sys.dm_exec_sessions`.\n*   `sys.dm_exec_cursors` contains information\
    \ about cursors that are open in the databases on the SQL Server.\n*   `sys.dm_exec_query_stats`\
    \ contains aggregated performance data for plans in the plan cache. When the query\
    \ is purged from the plan cache for any reason, so is the data. Similar to `sys.dm_exec_requests`,\
    \ this DMV contains the `query_hash` and `query_plan_hash` fields. The `query_hash`\
    \ field allows you to find queries with same logic. The `query_plan_hash` field\
    \ allows you to find queries with similar execution plans.\n*   `sys.dm_exec_procedure_stats`\
    \ contains aggregated performance data for cached stored procedures in SQL Server.\
    \ Similar to the above DMV, when the stored procedure’s plan is purged from the\
    \ cache for any reason, so is the data.\n*   `sys.dm_exec_query_memory_grants`\
    \ stores information on all queries that have asked for and are waiting for a\
    \ memory grant or have been granted a memory grant.\n*   `sys.dm_exec_query_plan`\
    \ contains the Showplan in XML format for the batch for the `plan_handle` provided.\n\
    *   `sys.dm_exec_query_stats` contain aggregated performance data for cached query\
    \ plans in SQL Server. It contains one row per query statement within a plan until\
    \ a plan is removed from the cache. This DMV contains information on performance\
    \ including `execution_count`, `worker_time`, `physical_reads`, `logical_writes`,\
    \ `clr_time`, `elapsed_time`, `rows`, and `dop`. This data is provided in totals,\
    \ lasts, minimums, and maximums. It also contains information on memory grants,\
    \ threads, columnstore usage, and tempdb spills. The `query_hash` field can be\
    \ used to identify queries with same logic and aggregate data together. The `query_plan_hash`\
    \ field is used to identify similar query plans and sum up the cost of queries\
    \ with similar plans.\n*   `sys.dm_exec_requests` shows you each request that\
    \ is running on the SQL Server. This DMV contains information on performance including\
    \ `cpu_time`, `reads`, `writes`, `logical_reads`, `row_count`, `wait_time`, and\
    \ `wait_type`. The `query_hash` field can be used to identify queries with similar\
    \ logic and aggregate data together. The `query_plan_hash` field is used to identify\
    \ similar query plans and sum up the cost of queries with similar plans. The `statement_context_id`\
    \ field is the foreign key for the `sys.query_context_settings` DMV.\n*   `sys.dm_exec_sessions`\
    \ contains a row for each session to the SQL Server. It contains information on\
    \ what is currently running for the session and the resources the session is using.\n\
    *   `sys.dm_exec_sql_text` contains the text of the SQL batch uniquely identified\
    \ by the `sql_handle` field. The `sql_handle` field can be used to get information\
    \ from the following DMVs:\n    *   `sys.dm_exec_query_stats`\n    *   `sys.dm_exec_requests`\n\
    \    *   `sys.dm_exec_cursors`\n    *   `sys.dm_exec_xml_handles`\n    *   `sys.dm_exec_query_memory_grants`\n\
    \    *   `sys.dm_exec_connections`\n*   The `plan_handle` field can be used to\
    \ uniquely identify the query plan for a batch from the plan cache and obtain\
    \ information from the following DMVs:\n    *   `sys.dm_exec_cached_plans`\n \
    \   *   `sys.dm_exec_query_stats`\n    *   `sys.dm_exec_requests`\n*   `sys.dm_exec_xml_handles`\
    \ contains information about active handles that are open from using `sp_xml_preparedocument`.\n\
    \n#### Disadvantages of DMVs\n\nThere are some disadvantages to using DMVs over\
    \ Query Store. One is that the data is not persisted to disk; it is only in memory.\
    \ So, if you restart SQL Server, the data is lost for troubleshooting purposes.\
    \ Two, the plan cache is allocated memory and plans will be purged from the cache\
    \ as needed to make room for new plans, so you lose the ability to see everything\
    \ that has run on the server since it was started. Lastly, you have to build some\
    \ system to persist the data to disk yourself and to analyze it to get the most\
    \ value out of the data over time."
  raw: "### Lightweight Show Plan Trace Flag\n\nStarting in SQL Server 2014, Trace\
    \ Flag 7412 was introduced to allow to access the actual execution plan of queries\
    \ that are currently running via the `sys.dm_exec_query_statistics_xml` DMV. This\
    \ data can also be accessed from the Activity Monitor by right-clicking on any\
    \ running process and selecting Show Live Execution Plan. Improvements were made\
    \ to make it even more lightweight in SQL Server 2016 SP1\\. This method is by\
    \ far more lightweight than capturing the estimated plans with SQL Server Profiler,\
    \ server-side traces, Extended Events, and Query Store. So, it’s recommended you\
    \ patch your SQL Server instances and enable this trace flag. It is enabled by\
    \ default in SQL Server 2019\\. There is a new query hint as well, `query_plan_profile,`\
    \ to enable at the query level in SQL Server 2017 CU11 and SQL Server 2017 CU3\\\
    . The overhead of enabling this trace flag is estimated to be about a 2% CPU performance\
    \ hit. Figure [1-8](#473933_1_En_1_Chapter.xhtml#Fig8) shows how to show the Live\
    \ Execution Plan in the Activity Monitor by right-clicking any currently running\
    \ process.\n\n### Note\n\nSee this blog post by SQL Server Tiger Team for more\
    \ information about the performance impacts: [`https://bit.ly/2DKR7qg`](https://bit.ly/2DKR7qg)\
    \ Also, you can only view the plan while the query is running.\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig8_HTML.jpg](images/473933_1_En_1_Chapter/473933_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8\n\nShow Live Execution Plan in Activity Monitor\n\n### sys.dm_exec_query_plan_stats\n\
    \nIn SQL Server 2019, DMF (Dynamic Management Function) was introduced which allows\
    \ you to retrieve the last actual execution plan for a query. This is a compliment\
    \ to the Lightweight Show Plan Trace Flag above but you don’t have to catch the\
    \ query running to be able to get the execution plan. It requires you to turn\
    \ on Trace Flag 2451\\. Then you can run the code in Listing [1-2](#473933_1_En_1_Chapter.xhtml#PC2)\
    \ to view the execution plan in column `last_actual_exec_plan`.\n\n```\nSELECT\
    \ er.session_id,\ner.start_time,\ner.status,\ner.command,\nst.text,\nqp.query_plan\
    \ AS cached_plan,\nqps.query_plan AS last_actual_exec_plan\nFROM sys.dm_exec_requests\
    \ AS er\nOUTER APPLY sys.dm_exec_query_plan(er.plan_handle) qp\nOUTER APPLY sys.dm_exec_sql_text(er.sql_handle)\
    \ st\nOUTER APPLY sys.dm_exec_query_plan_stats(er.plan_handle) qps\nWHERE session_id\
    \ > 50\nAND status IN ('running', 'suspended');\nGO\nListing 1-2\nQuery for retrieving\
    \ last actual execution plan for running processes\n```\n\n### DMVs\n\nDynamic\
    \ Management Views (DMVs) were introduced in SQL Server 2005 and made troubleshooting\
    \ issues with SQL Server easier. There are several DMVs related to performance,\
    \ but only a few that are related to what is running queries against the SQL Server.\
    \ We will discuss those DMVs below:\n\n*   `sys.dm_exec_cached_plans` stores the\
    \ estimated execution plan for each query when it is executed until the cache\
    \ clears it out.\n\n*   `sys.dm_exec_connections` contains information about all\
    \ the connections to the SQL Server. For Azure SQL Database, it returns connections\
    \ to the SQL Database. It contains relationships with `sys.dm_exec_requests` and\
    \ `sys.dm_exec_sessions`.\n\n*   `sys.dm_exec_cursors` contains information about\
    \ cursors that are open in the databases on the SQL Server.\n\n*   `sys.dm_exec_query_stats`\
    \ contains aggregated performance data for plans in the plan cache. When the query\
    \ is purged from the plan cache for any reason, so is the data. Similar to `sys.dm_exec_requests,`\
    \ this DMV contains the `query_hash` and `query_plan_hash` fields . The `query_hash`\
    \ field allows you to find queries with same logic. The `query_plan_hash` field\
    \ allows you to find queries with similar execution plans.\n\n*   `sys.dm_exec_procedure_stats`\
    \ contains aggregated performance data for cached stored procedures in SQL Server.\
    \ Similar to the above DMV, when the stored procedure’s plan is purged from the\
    \ cache for any reason, so is the data.\n\n*   `sys.dm_exec_query_memory_grants`\
    \ stores information on all queries that have asked for and are waiting for a\
    \ memory grant or have been granted a memory grant.\n\n*   `sys.dm_exec_query_plan`\
    \ contains the Showplan in XML format for the batch for the `plan_handle` provided.\n\
    \n*   `sys.dm_exec_query_stats` contain aggregated performance data for cached\
    \ query plans in SQL Server. It contains one row per query statement within a\
    \ plan until a plan is removed from the cache. This DMV contains information on\
    \ performance including `execution_count`, `worker_time`, `physical_reads`, `logical_writes`,\
    \ `clr_time`, `elapsed_time`, `rows`, and `dop`. This data is provided in totals,\
    \ lasts, minimums, and maximums. It also contains information on memory grants,\
    \ threads, columnstore usage, and tempdb spills. The `query_hash` field can be\
    \ used to identify queries with same logic and aggregate data together. The `query_plan_hash`\
    \ field is used to identify similar query plans and sum up the cost of queries\
    \ with similar plans.\n\n*   `sys.dm_exec_requests` shows you each request that\
    \ is running on the SQL Server. This DMV contains information on performance including\
    \ `cpu_time`, `reads`, `writes`, `logical_reads`, `row_count`, `wait_time`, and\
    \ `wait_type`. The `query_hash` field can be used to identify queries with similar\
    \ logic and aggregate data together. The `query_plan_hash` field is used to identify\
    \ similar query plans and sum up the cost of queries with similar plans. The `statement_context_id`\
    \ field is the foreign key for the `sys.query_context_settings` DMV.\n\n*   `sys.dm_exec_sessions`\
    \ contains a row for each session to the SQL Server. It contains information on\
    \ what is currently running for the session and the resources the session is using.\n\
    \n*   `sys.dm_exec_sql_text` contains the text of the SQL batch uniquely identified\
    \ by the `sql_handle` field . The `sql_handle` field can be used to get information\
    \ from the following DMVs:\n    *   `sys.dm_exec_query_stats`\n\n    *   `sys.dm_exec_requests`\n\
    \n    *   `sys.dm_exec_cursors`\n\n    *   `sys.dm_exec_xml_handles`\n\n    *\
    \   `sys.dm_exec_query_memory_grants`\n\n    *   `sys.dm_exec_connections`\n\n\
    \        The `plan_handle` field can be used to uniquely identify the query plan\
    \ for a batch from the plan cache and obtain information from the following DMVs:\n\
    \    *   `sys.dm_exec_cached_plans`\n\n    *   `sys.dm_exec_query_stats`\n\n \
    \   *   `sys.dm_exec_requests`\n\n*   `sys.dm_exec_xml_handles` contains information\
    \ about active handles that are open from using `sp_xml_preparedocument`.\n\n\
    #### Disadvantages of DMVs\n\nThere are some disadvantages to using DMVs over\
    \ Query Store. One is that the data is not persisted to disk; it is only in memory.\
    \ So, if you restart SQL Server, the data is lost for troubleshooting purposes.\
    \ Two, the plan cache is allocated memory and plans will be purged from the cache\
    \ as needed to make room for new plans, so you lose the ability to see everything\
    \ that has run on the server since it was started. Lastly, you have to build some\
    \ system to persist the data to disk yourself and to analyze it to get the most\
    \ value out of the data over time."
  trans: "### 轻量级显示计划跟踪标志\n\n从 SQL Server 2014 开始，引入了跟踪标志 7412，允许通过 `sys.dm_exec_query_statistics_xml`\
    \ DMV 访问当前正在运行的查询的实际执行计划。也可以通过活动监视器访问此数据：右键单击任何正在运行的进程，然后选择“显示实时执行计划”。SQL Server\
    \ 2016 SP1 对其进行了改进，使其更加轻量级。到目前为止，此方法比使用 SQL Server Profiler、服务器端跟踪、扩展事件和查询存储捕获估计计划要轻量得多。因此，建议您为\
    \ SQL Server 实例打上补丁并启用此跟踪标志。在 SQL Server 2019 中，默认启用。还有一个新的查询提示 `query_plan_profile`，可在\
    \ SQL Server 2017 CU11 和 SQL Server 2017 CU3 中在查询级别启用。启用此跟踪标志的开销估计约为 2% 的 CPU\
    \ 性能影响。图 1-8 展示了如何在活动监视器中通过右键单击任何当前运行的进程来显示实时执行计划。\n\n### 注意\n\n有关性能影响的更多信息，请参阅\
    \ SQL Server Tiger Team 的这篇博客文章：[`https://bit.ly/2DKR7qg`](https://bit.ly/2DKR7qg)\
    \ 另外，您只能在查询运行时查看其计划。\n\n![../images/473933_1_En_1_Chapter/473933_1_En_1_Fig8_HTML.jpg](img/473933_1_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8：在活动监视器中显示实时执行计划\n\n### sys.dm_exec_query_plan_stats\n\n在 SQL Server 2019\
    \ 中，引入了 DMF（动态管理函数），它允许您检索查询的最后一个实际执行计划。这是对上述轻量级显示计划跟踪标志的补充，但您不必在查询运行时就能捕获其执行计划。它需要您开启跟踪标志\
    \ 2451。然后，您可以运行清单 1-2 中的代码，在 `last_actual_exec_plan` 列中查看执行计划。\n\n```\nSELECT\
    \ er.session_id,\ner.start_time,\ner.status,\ner.command,\nst.text,\nqp.query_plan\
    \ AS cached_plan,\nqps.query_plan AS last_actual_exec_plan\nFROM sys.dm_exec_requests\
    \ AS er\nOUTER APPLY sys.dm_exec_query_plan(er.plan_handle) qp\nOUTER APPLY sys.dm_exec_sql_text(er.sql_handle)\
    \ st\nOUTER APPLY sys.dm_exec_query_plan_stats(er.plan_handle) qps\nWHERE session_id\
    \ > 50\nAND status IN ('running', 'suspended');\nGO\n```\n\n清单 1-2：用于检索正在运行的进程的最后一个实际执行计划的查询\n\
    \n### DMV\n\n动态管理视图（DMV）在 SQL Server 2005 中引入，使得排查 SQL Server 问题变得更加容易。有几个与性能相关的\
    \ DMV，但只有少数几个与针对 SQL Server 正在运行的查询有关。我们将在下面讨论这些 DMV：\n\n*   `sys.dm_exec_cached_plans`\
    \ 存储每个查询执行时的估计执行计划，直到缓存将其清除。\n*   `sys.dm_exec_connections` 包含有关到 SQL Server 所有连接的信息。对于\
    \ Azure SQL Database，它返回到 SQL Database 的连接。它包含与 `sys.dm_exec_requests` 和 `sys.dm_exec_sessions`\
    \ 的关系。\n*   `sys.dm_exec_cursors` 包含有关 SQL Server 上数据库中打开的游标的信息。\n*   `sys.dm_exec_query_stats`\
    \ 包含计划缓存中计划的聚合性能数据。当查询因任何原因从计划缓存中清除时，其数据也随之清除。与 `sys.dm_exec_requests` 类似，此 DMV\
    \ 包含 `query_hash` 和 `query_plan_hash` 字段。`query_hash` 字段允许您查找具有相同逻辑的查询。`query_plan_hash`\
    \ 字段允许您查找具有相似执行计划的查询。\n*   `sys.dm_exec_procedure_stats` 包含 SQL Server 中缓存的存储过程的聚合性能数据。与上述\
    \ DMV 类似，当存储过程的计划因任何原因从缓存中清除时，其数据也随之清除。\n*   `sys.dm_exec_query_memory_grants`\
    \ 存储所有已请求并正在等待内存授权，或已被授予内存授权的查询的信息。\n*   `sys.dm_exec_query_plan` 包含为提供的 `plan_handle`\
    \ 批处理生成的 Showplan（XML 格式）。\n*   `sys.dm_exec_query_stats` 包含 SQL Server 中缓存的查询计划的聚合性能数据。在计划从缓存中移除之前，它针对计划中的每个查询语句包含一行。此\
    \ DMV 包含性能信息，包括 `execution_count`、`worker_time`、`physical_reads`、`logical_writes`、`clr_time`、`elapsed_time`、`rows`\
    \ 和 `dop`。这些数据以总计、最后值、最小值和最大值的形式提供。它还包含有关内存授权、线程、列存储索引使用和 tempdb 溢出的信息。`query_hash`\
    \ 字段可用于识别具有相同逻辑的查询并将数据聚合在一起。`query_plan_hash` 字段用于识别相似的查询计划并汇总具有相似计划的查询的成本。\n\
    *   `sys.dm_exec_requests` 显示在 SQL Server 上运行的每个请求。此 DMV 包含性能信息，包括 `cpu_time`、`reads`、`writes`、`logical_reads`、`row_count`、`wait_time`\
    \ 和 `wait_type`。`query_hash` 字段可用于识别具有相似逻辑的查询并将数据聚合在一起。`query_plan_hash` 字段用于识别相似的查询计划并汇总具有相似计划的查询的成本。`statement_context_id`\
    \ 字段是 `sys.query_context_settings` DMV 的外键。\n*   `sys.dm_exec_sessions` 为到 SQL\
    \ Server 的每个会话包含一行。它包含有关该会话当前正在运行的内容以及该会话正在使用的资源的信息。\n*   `sys.dm_exec_sql_text`\
    \ 包含由 `sql_handle` 字段唯一标识的 SQL 批处理的文本。`sql_handle` 字段可用于从以下 DMV 获取信息：\n    * \
    \  `sys.dm_exec_query_stats`\n    *   `sys.dm_exec_requests`\n    *   `sys.dm_exec_cursors`\n\
    \    *   `sys.dm_exec_xml_handles`\n    *   `sys.dm_exec_query_memory_grants`\n\
    \    *   `sys.dm_exec_connections`\n*   `plan_handle` 字段可用于从计划缓存中唯一标识批处理的查询计划，并从以下\
    \ DMV 获取信息：\n    *   `sys.dm_exec_cached_plans`\n    *   `sys.dm_exec_query_stats`\n\
    \    *   `sys.dm_exec_requests`\n*   `sys.dm_exec_xml_handles` 包含使用 `sp_xml_preparedocument`\
    \ 时打开的活动句柄的信息。\n\n#### DMV 的缺点\n\n与查询存储相比，使用 DMV 有一些缺点。一是数据不会持久化到磁盘；它只存在于内存中。因此，如果重新启动\
    \ SQL Server，用于故障排除的数据就会丢失。二是计划缓存是分配内存的，为了给新计划腾出空间，计划会根据需要从缓存中清除，因此您会失去查看自服务器启动以来在服务器上运行过的所有内容的能力。最后，您必须自己构建一个系统，将数据持久化到磁盘并对其进行分析，以便随着时间的推移从数据中获得最大价值。"
- fmt: "# sp_whoisactive\n\n`sp_whoisactive` 是由 Adam Machanic 编写的一个非常有用的存储过程，用于从多个\
    \ DMV 中捕获信息。该过程以及关于如何使用的几篇博客文章可以在 [`http://WhoIsActive.com`](http://whoisactive.com)\
    \ 找到。这个存储过程将上面讨论的 DMV 全部结合到一个过程中，并提供参数以便你能够取回不同的信息。这对于获取当前系统上正在运行的进程的估计计划非常有用。一个有用的技巧是定期（例如每分钟）将此数据捕获到表中，这样你就能捕获到可进行故障排除的长运行查询。该网站博客系列的第\
    \ 25 篇文章描述了如何将数据捕获到表中。在列表 [1-3](#473933_1_En_1_Chapter.xhtml#PC3) 中，你会找到一些推荐参数的代码，用于捕获查询文本和\
    \ XML 格式的执行计划，以及其他有用的信息，包括我们接下来要讨论的等待统计信息：\n\n```sql\nEXEC dbo.sp_WhoIsActive\n\
    @get_plans = 1,\n@get_full_inner_text = 1,\n@format_output = 0,\n@get_task_info\
    \ = 2,\n@destination_table = 'DBA.dbo.WhoIsActiveOutput';\n```\n**列表 1-3**\n**运行\
    \ sp_whoisactive 到表中以进行故障排除的推荐参数**\n\n还有其他几个参数你可能觉得有用，可以探索所有文章并自己决定哪些对你最有益。有一个\
    \ `@help` 参数可以打印出所有参数的文档。\n\n## Wait Statistics\n\n等待统计信息提供了另一种排查 SQL Server 问题的方法。等待统计信息在\
    \ SQL Server 2005 中引入，为我们提供了一种全新的故障排除方式。等待统计信息本质上告诉你数据库引擎在试图工作时正在等待什么。等待统计信息分为两类：信号等待和资源等待。当\
    \ SQL Server 等待一个线程变得可用时，这被认为是一个信号等待；这通常表明服务器上的 CPU 使用率很高。其他等待被认为是资源等待，例如等待页面锁。有数百种资源等待。可以从\
    \ DMV `sys.dm_os_wait_stats` 中查询等待统计信息。有了这些信息，你可以判断查询正在等待什么才能执行。你无法通过单个查询来判断，但随着查询存储（Query\
    \ Store）的引入，你将会看到它会按查询进行累积。\n\n## Tip\n\n有一个在线库解释了所有可用的等待类型，可以在 SQLskills 的以下网址找到：\
    \ [`www.sqlskills.com/help/waits/`](http://www.sqlskills.com/help/waits/) 。一个自\
    \ SQL Server 启动以来显示每种等待统计信息使用百分比的查询可以在 Paul Randal 的博客上找到： [`https://bit.ly/2wsQHQE`](https://bit.ly/2wsQHQE)\
    \ 。\n\n# Stabilizing Performance Before Query Store Techniques\n\n在 SQL Server\
    \ 2016 引入查询存储之前，有几种方法可以稳定查询计划的性能。一种方法是使用计划指南和查询的 `USE PLAN` 提示。第二种是尽可能保持统计信息更新，以确保优化器拥有最佳数据来创建计划。另一种是执行\
    \ `UPDATE STATISTICS`，希望 SQL Server 在下次执行时能创建更好的查询计划。然后，你还可以重新编译存储过程或函数，看看 SQL\
    \ Server 是否会生成更好的计划。最后，你可以从缓存中移除一个计划，以便下次执行查询时创建一个新计划，看看是否创建了更好的计划。\n\n## Plan\
    \ Guides/USE PLAN Hint\n\n当你无法或不想更改查询时，计划指南用于稳定查询的性能。计划指南通过使用查询提示或固定查询计划来影响优化器。第三方应用程序可以从计划指南的使用中受益，因为你无法更改查询。要使用计划指南，你需要指定要优化的\
    \ T-SQL，并为该特定查询提供查询提示，SQL Server 将匹配 T-SQL 文本并在执行该语句时使用这些提示。使用查询上的 `OPTION` 子句来指定计划指南。\n\
    \n计划指南有不同的类型：\n\n*   OBJECT 计划指南\n\n    这种类型的计划指南匹配对象类型，例如存储过程、标量用户定义函数、多语句表值用户定义函数和\
    \ DML 触发器。\n\n*   SQL 计划指南\n\n    这种类型的计划指南根据你提供的 T-SQL 匹配查询。它们必须以正确的格式参数化。它们必须精确到空格。它们适用于独立的\
    \ T-SQL 和批处理。\n\n*   TEMPLATE 计划指南\n\n    这种类型的计划指南匹配参数化为特定形式的独立查询。它们用于覆盖数据库的\
    \ `PARAMETERIZATION` 选项。它们可以在以下情况下创建：\n    *   当数据库的 `PARAMETERIZATION` `SET`\
    \ 选项设置为 `FORCED`，但你希望查询使用简单参数化的规则进行编译时。\n\n    *   以及当你想要相反的效果时，数据库的 `PARAMETERIZATION`\
    \ `SET` 选项是 `SIMPLE`，而你要使用强制参数化时。\n\n计划指南匹配发生在数据库级别。对于基于 SQL 或 TEMPLATE 的计划指南，SQL\
    \ Server 将参数 `@module_or_batch` 和 `@params` 与查询逐字符匹配。\n\n当你创建一个计划指南时，它将从计划缓存中移除当前计划。当你为批处理创建一个\
    \ OBJECT 或 SQL 计划指南时，SQL Server 会移除具有相同哈希值的查询计划。当你创建一个 TEMPLATE 计划指南时，SQL Server\
    \ 会移除该数据库计划缓存中所有的单语句批处理。\n\n创建计划指南后，你使用 `OPTION` 子句来指定 `USE PLAN` 参数以指定查询提示。\n\
    \n列表 [1-4](#473933_1_En_1_Chapter.xhtml#PC4) 是原始查询：\n\n```sql\nSELECT count(*)\
    \ AS Total\nFROM Sales.SalesOrderHeader h\nINNER JOIN Sales.SalesOrderDetail d\n\
    ON h.SalesOrderID = d.SalesOrderID\nGO\n```\n**列表 1-4**\n**用于 USE PLAN 的 SELECT\
    \ 语句**\n\n列表 [1-5](#473933_1_En_1_Chapter.xhtml#PC5) 是指定了 `USE PLAN` 查询提示的相同查询：\n\
    \n```sql\nSELECT count(*) AS Total\nFROM Sales.SalesOrderHeader h\nINNER JOIN\
    \ Sales.SalesOrderDetail d\nON h.SalesOrderID = d.SalesOrderID\nOPTION (USE PLAN\
    \ N'\n\n...\n\n')\nGO\n```\n**列表 1-5**\n**一个 USE PLAN 示例**\n\n## Updating Statistics\n\
    \n如果你知道表或索引中的数据已经发生大量更改，使用 `UPDATE STATISTICS` 来更新表或索引的统计信息可以帮助提高性能。请注意，更新统计信息确实会重新编译引用该表或索引的所有计划，因此除非必要，否则你不想过于频繁地执行此操作。在\
    \ SQL Server 2014 之前，必须更新表中 20% 的数据才会触发自动更新统计信息，除非你使用了在 SQL Server 2008 SP1 中引入的跟踪标志\
    \ 2371 来降低这个比例；20% 对于大型表（如数据仓库表）来说并不理想。在 SQL Server 2016 中，此跟踪标志默认是开启的。\n\n要更新表的统计信息，请使用列表\
    \ [1-6](#473933_1_En_1_Chapter.xhtml#PC6)。\n\n```sql\nUSE DATABASE;\nGO\nUPDATE\
    \ STATISTICS SchemaName.TableName;\nGO\n```\n**列表 1-6**\n**为表执行 UPDATE STATISTICS**\n\
    \n要更新特定索引的统计信息，请使用列表 [1-7](#473933_1_En_1_Chapter.xhtml#PC7)。\n\n```sql\nUSE DATABASE;\n\
    GO\nUPDATE STATISTICS SchemaName.TableName IndexName;\nGO\n```\n**列表 1-7**\n**为索引执行\
    \ UPDATE STATISTICS**"
  raw: "#### sp_whoisactive\n\n`sp_whoisactive` is a stored procedure written by Adam\
    \ Machanic that is very useful in capturing information from several DMVs. The\
    \ procedure and several blog posts about how to use can be found at [`http://WhoIsActive.com`](http://whoisactive.com)\
    \ . This procedure combines the DMVs discussed above all into one stored procedure\
    \ with parameters for you to able to pull back different information. This is\
    \ useful for getting the estimated plans for processes that are running on your\
    \ system at the moment. One useful trick is to capture this data into a table\
    \ periodically, such as every minute, so that you capture long running queries\
    \ that you can troubleshoot. Article number 25 in the blog series on the web site\
    \ describes how to capture the data into a table. In Listing [1-3](#473933_1_En_1_Chapter.xhtml#PC3)\
    \ you will find code with some recommended parameters for capturing the text of\
    \ the query and execution plans in XML format, along with other useful information,\
    \ including wait statistics, which will talk about next:\n\n```\nEXEC dbo.sp_WhoIsActive\n\
    @get_plans = 1,\n@get_full_inner_text = 1,\n@format_output = 0,\n@get_task_info\
    \ = 2,\n@destination_table = 'DBA.dbo.WhoIsActiveOutput';\nListing 1-3\nRecommended\
    \ parameters for running sp_whoisactive into a table for troubleshooting\n```\n\
    \nThere are several other parameters you may find useful to explore all the articles\
    \ and decide for yourself what is most beneficial for you. There is a `@help`\
    \ parameter that prints out documentation of all the parameters.\n\n### Wait Statistics\n\
    \nWait statistics provide another way to troubleshoot what is happening on your\
    \ SQL Server. Wait statistics were introduced in SQL Server 2005 and offered us\
    \ a whole new way of troubleshooting. Wait statistics essentially tell you what\
    \ the database engine is waiting on when it is trying to do work. Wait statistics\
    \ are in two categories: signal waits and resource waits. When SQL Server is waiting\
    \ on a thread to become available, it considered a signal wait; this usually indicates\
    \ that the CPU is running high on the server. Other waits are considered resource\
    \ waits, such as waiting for the lock of a page. There are hundreds of resource\
    \ waits. Wait statistics can be queried from the DMV `sys.dm_os_wait_stats`. With\
    \ this information, you are to tell what your queries are waiting on to execute.\
    \ You can’t tell by an individual query, but with the introduction of Query Store,\
    \ you will see later it will accumulate per query.\n\n### Tip\n\nThere is a library\
    \ online that explains all the wait types available from SQLskills at the following\
    \ URL: [`www.sqlskills.com/help/waits/`](http://www.sqlskills.com/help/waits/)\
    \ . A query that will show you the percent of each wait statistics that has been\
    \ used since SQL Server was started is available on Paul Randal’s blog at [`https://bit.ly/2wsQHQE`](https://bit.ly/2wsQHQE)\
    \ .\n\n## Stabilizing Performance Before Query Store Techniques\n\nThere were\
    \ a few ways to stabilize the performance of query plans before Query Store was\
    \ introduced in SQL Server 2016\\. One way was to use plan guides and the `USE\
    \ PLAN` hint with the query. A second was to keep your statistics up to date as\
    \ best as possible to ensure the optimizer had the best data available to create\
    \ a plan. Another was to UPDATE STATISTICS hoping SQL Server would create a better\
    \ query plan on next execution. Then you also could recompile a stored procedure\
    \ or function to get to see if SQL Server would generate a better plan. Lastly,\
    \ you could remove a plan from the cache so that a new plan would be created the\
    \ next time the query was executed to see if a better plan was created.\n\n###\
    \ Plan Guides/USE PLAN Hint\n\nPlan guides are used to stabilize the performance\
    \ of a query when you cannot or do not want to change the query. Plan guides work\
    \ by influencing the optimizer by using query hints or a fixed query plan. Third-party\
    \ applications can benefit from the use of plan guides because you cannot change\
    \ the queries. To use a plan guide, you specify the T-SQL you want to optimize\
    \ and provide query hints for the specific query to use, and SQL Server will match\
    \ the text of the T-SQL and use the hints when executing that statement. Specifying\
    \ the plan guide is done using the `OPTION` clause on the query.\n\nThere are\
    \ different types of plan guides:\n\n*   OBJECT plan guides\n\n    This type of\
    \ plan guide matches to object types, such as stored procedures, scalar user-defined\
    \ functions, multi-statement table-valued user-defined functions, and DML triggers.\n\
    \n*   SQL plan guides\n\n    This type of plan guide matches queries based on\
    \ the T-SQL you provide. They must be parameterized in the correct format. They\
    \ have to match exactly down the spacing. They apply to stand-alone T-SQL and\
    \ batches.\n\n*   TEMPLATE plan guides\n\n    This type of plan guide matches\
    \ stand-alone queries parameterized to a certain form. They are used to override\
    \ a database `PARAMETERIZATION` option. They can create in the following situations:\n\
    \    *   When the database `SET` option for `PARAMETERIZATION` is set to `FORCED`,\
    \ but you want queries to compile using the rules for Simple Parameterization.\n\
    \n    *   And when you want the opposite effect, the database `SET` option for\
    \ `PARAMETERIZATION` is `SIMPLE` and you are to use Forced Parameterization.\n\
    \nPlan guide matching occurs at the database level. For SQL or TEMPLATE-based\
    \ plan guides, SQL Server matches the parameters `@module_or_batch` and `@params`\
    \ to a query character by character.\n\nWhen you create a plan guide, it will\
    \ remove the current plan from the plan cache. When you create an OBJECT or SQL\
    \ plan guide for a batch, SQL Server removes the query plan that has the same\
    \ hash value. When you create a TEMPLATE plan guide, SQL Server removes all the\
    \ single-statement batches in the plan cache for that database.\n\nAfter you create\
    \ a plan guide, you use the `OPTION` clause to specify the `USE PLAN` parameter\
    \ to specify a query hint.\n\nListing [1-4](#473933_1_En_1_Chapter.xhtml#PC4)\
    \ is the original query:\n\n```\nSELECT count(*) AS Total\nFROM Sales.SalesOrderHeader\
    \ h\nINNER JOIN Sales.SalesOrderDetail d\nON h.SalesOrderID = d.SalesOrderID\n\
    GO\nListing 1-4\nA SELECT statement for USE PLAN\n```\n\nListing [1-5](#473933_1_En_1_Chapter.xhtml#PC5)\
    \ is the same query with the `USE PLAN` query hint specified:\n\n```\nSELECT count(*)\
    \ AS Total\nFROM Sales.SalesOrderHeader h\nINNER JOIN Sales.SalesOrderDetail d\n\
    ON h.SalesOrderID = d.SalesOrderID\nOPTION (USE PLAN N'\n\n...\n\n')\nGO\nListing\
    \ 1-5\nA USE PLAN Example\n```\n\n### Updating Statistics\n\nUsing `UPDATE STATISTICS`\
    \ to update statistics for a table or index can help improve performance if you\
    \ know a lot of data has changed in the table or index. Beware that updating statistics\
    \ does recompile all the plans that the table or index are referenced in, so you\
    \ will not want to do this too frequently unless necessary. Prior to SQL Server\
    \ 2014, 20% of a table had to be updated before the auto updated statistic would\
    \ be triggered unless you used Trace Flag 2371 which was introduced in SQL Server\
    \ 2008 SP1 to lower this; 20% is not ideal for large tables such as data warehouse\
    \ tables. In SQL Server 2016, this trace flag is on by default.\n\nTo update statistics\
    \ for a table, use Listing [1-6](#473933_1_En_1_Chapter.xhtml#PC6).\n\n```\nUSE\
    \ DATABASE;\nGO\nUPDATE STATISTICS SchemaName.TableName;\nGO\nListing 1-6\nUPDATE\
    \ STATISTICS for a table\n```\n\nTo update statistics for a particular index,\
    \ use Listing [1-7](#473933_1_En_1_Chapter.xhtml#PC7).\n\n```\nUSE DATABASE;\n\
    GO\nUPDATE STATISTICS SchemaName.TableName IndexName;\nGO\nListing 1-7\nUPDATE\
    \ STATISTICS for an index\n```"
  trans: "\n# sp_whoisactive\n\n`sp_whoisactive` 是由 Adam Machanic 编写的一个非常有用的存储过程，用于从多个\
    \ DMV 中捕获信息。该过程以及关于如何使用的几篇博客文章可以在 [`http://WhoIsActive.com`](http://whoisactive.com)\
    \ 找到。这个存储过程将上面讨论的 DMV 全部结合到一个过程中，并提供参数以便你能够取回不同的信息。这对于获取当前系统上正在运行的进程的估计计划非常有用。一个有用的技巧是定期（例如每分钟）将此数据捕获到表中，这样你就能捕获到可进行故障排除的长运行查询。该网站博客系列的第\
    \ 25 篇文章描述了如何将数据捕获到表中。在列表 1-3 中，你会找到一些推荐参数的代码，用于捕获查询文本和 XML 格式的执行计划，以及其他有用的信息，包括我们接下来要讨论的等待统计信息：\n\
    \n```sql\nEXEC dbo.sp_WhoIsActive\n@get_plans = 1,\n@get_full_inner_text = 1,\n\
    @format_output = 0,\n@get_task_info = 2,\n@destination_table = 'DBA.dbo.WhoIsActiveOutput';\n\
    ```\n**列表 1-3**\n**运行 sp_whoisactive 到表中以进行故障排除的推荐参数**\n\n还有其他几个参数你可能觉得有用，可以探索所有文章并自己决定哪些对你最有益。有一个\
    \ `@help` 参数可以打印出所有参数的文档。\n\n## 等待统计信息\n\n等待统计信息提供了另一种排查 SQL Server 问题的方法。等待统计信息在\
    \ SQL Server 2005 中引入，为我们提供了一种全新的故障排除方式。等待统计信息本质上告诉你数据库引擎在试图工作时正在等待什么。等待统计信息分为两类：信号等待和资源等待。当\
    \ SQL Server 等待一个线程变得可用时，这被认为是一个信号等待；这通常表明服务器上的 CPU 使用率很高。其他等待被认为是资源等待，例如等待页面锁。有数百种资源等待。可以从\
    \ DMV `sys.dm_os_wait_stats` 中查询等待统计信息。有了这些信息，你可以判断查询正在等待什么才能执行。你无法通过单个查询来判断，但随着查询存储（Query\
    \ Store）的引入，你将会看到它会按查询进行累积。\n\n## 提示\n\n有一个在线库解释了所有可用的等待类型，可以在 SQLskills 的以下网址找到：\
    \ [`www.sqlskills.com/help/waits/`](http://www.sqlskills.com/help/waits/) 。一个自\
    \ SQL Server 启动以来显示每种等待统计信息使用百分比的查询可以在 Paul Randal 的博客上找到： [`https://bit.ly/2wsQHQE`](https://bit.ly/2wsQHQE)\
    \ 。\n\n# 在查询存储技术之前稳定性能\n\n在 SQL Server 2016 引入查询存储之前，有几种方法可以稳定查询计划的性能。一种方法是使用计划指南和查询的\
    \ `USE PLAN` 提示。第二种是尽可能保持统计信息更新，以确保优化器拥有最佳数据来创建计划。另一种是执行 `UPDATE STATISTICS`，希望\
    \ SQL Server 在下次执行时能创建更好的查询计划。然后，你还可以重新编译存储过程或函数，看看 SQL Server 是否会生成更好的计划。最后，你可以从缓存中移除一个计划，以便下次执行查询时创建一个新计划，看看是否创建了更好的计划。\n\
    \n## 计划指南/USE PLAN 提示\n\n当你无法或不想更改查询时，计划指南用于稳定查询的性能。计划指南通过使用查询提示或固定查询计划来影响优化器。第三方应用程序可以从计划指南的使用中受益，因为你无法更改查询。要使用计划指南，你需要指定要优化的\
    \ T-SQL，并为该特定查询提供查询提示，SQL Server 将匹配 T-SQL 文本并在执行该语句时使用这些提示。使用查询上的 `OPTION` 子句来指定计划指南。\n\
    \n计划指南有不同的类型：\n\n*   OBJECT 计划指南\n\n    这种类型的计划指南匹配对象类型，例如存储过程、标量用户定义函数、多语句表值用户定义函数和\
    \ DML 触发器。\n\n*   SQL 计划指南\n\n    这种类型的计划指南根据你提供的 T-SQL 匹配查询。它们必须以正确的格式参数化。它们必须精确到空格。它们适用于独立的\
    \ T-SQL 和批处理。\n\n*   TEMPLATE 计划指南\n\n    这种类型的计划指南匹配参数化为特定形式的独立查询。它们用于覆盖数据库的\
    \ `PARAMETERIZATION` 选项。它们可以在以下情况下创建：\n    *   当数据库的 `PARAMETERIZATION` `SET`\
    \ 选项设置为 `FORCED`，但你希望查询使用简单参数化的规则进行编译时。\n\n    *   以及当你想要相反的效果时，数据库的 `PARAMETERIZATION`\
    \ `SET` 选项是 `SIMPLE`，而你要使用强制参数化时。\n\n计划指南匹配发生在数据库级别。对于基于 SQL 或 TEMPLATE 的计划指南，SQL\
    \ Server 将参数 `@module_or_batch` 和 `@params` 与查询逐字符匹配。\n\n当你创建一个计划指南时，它将从计划缓存中移除当前计划。当你为批处理创建一个\
    \ OBJECT 或 SQL 计划指南时，SQL Server 会移除具有相同哈希值的查询计划。当你创建一个 TEMPLATE 计划指南时，SQL Server\
    \ 会移除该数据库计划缓存中所有的单语句批处理。\n\n创建计划指南后，你使用 `OPTION` 子句来指定 `USE PLAN` 参数以指定查询提示。\n\
    \n列表 1-4 是原始查询：\n\n```sql\nSELECT count(*) AS Total\nFROM Sales.SalesOrderHeader\
    \ h\nINNER JOIN Sales.SalesOrderDetail d\nON h.SalesOrderID = d.SalesOrderID\n\
    GO\n```\n**列表 1-4**\n**用于 USE PLAN 的 SELECT 语句**\n\n列表 1-5 是指定了 `USE PLAN` 查询提示的相同查询：\n\
    \n```sql\nSELECT count(*) AS Total\nFROM Sales.SalesOrderHeader h\nINNER JOIN\
    \ Sales.SalesOrderDetail d\nON h.SalesOrderID = d.SalesOrderID\nOPTION (USE PLAN\
    \ N'\n\n...\n\n')\nGO\n```\n**列表 1-5**\n**一个 USE PLAN 示例**\n\n## 更新统计信息\n\n如果你知道表或索引中的数据已经发生大量更改，使用\
    \ `UPDATE STATISTICS` 来更新表或索引的统计信息可以帮助提高性能。请注意，更新统计信息确实会重新编译引用该表或索引的所有计划，因此除非必要，否则你不想过于频繁地执行此操作。在\
    \ SQL Server 2014 之前，必须更新表中 20% 的数据才会触发自动更新统计信息，除非你使用了在 SQL Server 2008 SP1 中引入的跟踪标志\
    \ 2371 来降低这个比例；20% 对于大型表（如数据仓库表）来说并不理想。在 SQL Server 2016 中，此跟踪标志默认是开启的。\n\n要更新表的统计信息，请使用列表\
    \ 1-6。\n\n```sql\nUSE DATABASE;\nGO\nUPDATE STATISTICS SchemaName.TableName;\n\
    GO\n```\n**列表 1-6**\n**为表执行 UPDATE STATISTICS**\n\n要更新特定索引的统计信息，请使用列表 1-7。\n\n\
    ```sql\nUSE DATABASE;\nGO\nUPDATE STATISTICS SchemaName.TableName IndexName;\n\
    GO\n```\n**列表 1-7**\n**为索引执行 UPDATE STATISTICS**\n"
- fmt: '### Recompiling Stored Procedures


    Whenever you can identify a stored procedure, trigger, or function that is performing
    poorly due to parameter sniffing or other issues, you can use `sp_recompile` to
    recompile the object on the next execution of the procedure. Parameter sniffing
    occurs when an execution plan is generated that is optimal for one workload, but
    not optimal for all workloads based on the parameters used for the query. Running
    this procedure will effectively remove the current plan from the plan cache so
    a new plan can be compiled on the next execution of the query. The new plan may
    be the same as the old plan though depending on the parameters passed in.


    ### Removing Plans from the Plan Cache


    You can query `sys.dm_exec_cached_plans` and `sys.dm_exec_sql_text` to retrieve
    a `plan_handle` to remove a specific plan from the cache that is not part of a
    stored procedure, function, or trigger by using the following code.


    First, in Listing 1-8 you select the text you need to find that is part of your
    query:


    ```sql

    SELECT cp.plan_handle, st.text

    FROM sys.dm_exec_cached_plans AS cp

    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) AS st

    WHERE st.text LIKE N''%/* MyTable %'';

    ```

    **Listing 1-8** Find the plan handle for the SQL text you are looking for


    Then copy and paste the plan handle into the `DBCC FREEPROCCACHE` procedure in
    the code provided in Listing 1-9:


    ```sql

    DBCC FREEPROCCACHE (<plan_handle>);

    ```

    **Listing 1-9** `DBCC FREEPROCCACHE` to remove SQL text plan from the plan cache


    ## Query Store: The Game Changer


    Query Store changes how you troubleshoot bad query plans because now everything
    is collected, stored on disk, and persisted over time to provide you trends in
    performance. It provides all the estimated plans that have been used in the retention
    period you have defined which allows you to troubleshoot the query with a graphical
    interface easily and efficiently. Query Store changes how you can troubleshoot
    performance, baseline your system, and stabilize the performance of your SQL Server
    significantly.


    ### What Information Is Gathered


    Query Store gathers runtime statistics for each query that ran and their estimated
    plans. The following data is collected per query and aggregated per time interval
    you have specified in SQL Server 2019:


    *   Execution count

    *   Duration

    *   CPU time

    *   Logical reads

    *   Logical writes

    *   Physical reads

    *   CLR time

    *   DOP

    *   Memory consumption

    *   Row count


    Each statistic is available in totals, averages, maximums, minimums, and standard
    deviations. More information about what data will be discussed in Chapters 4 and
    5.


    ### What Information Query Store Provides for Us: Use Cases


    There are different use cases for Query Store besides just collecting performance
    information. They include


    *   Finding and fixing regressed queries

    *   Finding and identifying top resource consuming queries

    *   A/B testing

    *   Stabilizing performance when upgrading SQL Server

    *   Finding and identifying ad hoc workloads so you can improve them


    These will be discussed in more detail in Chapter 6.


    ### Automatic Plan Correction


    SQL Server 2017 introduced Automatic Plan Correction that will automatically force
    plans and unforce plans based on plan regression. So, you no longer have to force
    plans, although you still can if necessary manually. Chapter 8 will talk more
    about how this feature works.


    ### Wait Statistics


    SQL Server 2017 introduced wait statistics that are being collected per query
    in 23 different categories, such as buffer and CPU. A detailed list is provided
    in Chapter 8 of which wait statistics are in each category. Chapter 8 will talk
    more about this feature.


    ## Conclusion


    Query Store offers an automated and easy way to collect performance information
    about queries that are running on your SQL Server. There are several use cases
    for using Query Store besides just seeing performance information. It provides
    Automatic Plan Correction and wait statistics collection starting in SQL Server
    2017, which are invaluable new tools. The rest of the book will go into much more
    detail about Query Store so you can benefit the most from using it.


    # 2. Overview and Architecture of the Query Store


    In order for the Query Store to collect and maintain a baseline on query performance,
    it needs an architecture that has minimal impact on the overall performance of
    SQL Server. This chapter will review how Query Store operates to collect data.
    We’ll also cover the various data sets that make up the Query Store. This information
    should make it possible for you to both understand what the Query Store is doing
    and have faith that it’s performing these actions in the safest manner possible
    for your databases.


    ## How Query Store Works


    While we are going to cover the data collected in some detail later in the chapter,
    it makes it easier to understand how Query Store works if we first give a quick
    overview of the types of data being collected. There are three fundamental data
    sets that define the Query Store data:


    *   Query and Plan Information: Data about the query itself and about the execution
    plans derived from that query by the query optimizer.

    *   Query Runtime Information: This is the information about how fast the query
    ran and how many times it was called, along with other performance-related information
    from query execution.

    *   Query Wait Statistics: This information covers the various waits that occurred
    on a single query during the execution on the server.


    With those core data sets defined, we can now move on to determine exactly where
    that information comes from and how it gets collected. We will cover all three
    data sets in much more detail later in the chapter. We will use these data sets
    as our architecture for describing the ways that Query Store gathers the data
    because the data sets help define the approach taken by the Query Store. This
    is why it was important to establish what those data sets are before we talk about
    where they came from.


    On additional detail that you need to know to understand how the Query Store works
    is that this is a database level setting. It’s not controlled on the server, but
    rather database-by-database in your system. This is an important detail because
    the information the Query Store captures is written to each individual database,
    not a central location.'
