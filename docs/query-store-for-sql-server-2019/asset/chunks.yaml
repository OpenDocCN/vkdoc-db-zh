    # 2. Overview and Architecture of the Query Store


    In order for the Query Store to collect and maintain a baseline on query performance,
    it needs an architecture that has minimal impact on the overall performance of
    SQL Server. This chapter will review how Query Store operates to collect data.
    We’ll also cover the various data sets that make up the Query Store. This information
    should make it possible for you to both understand what the Query Store is doing
    and have faith that it’s performing these actions in the safest manner possible
    for your databases.


    ## How Query Store Works


    While we are going to cover the data collected in some detail later in the chapter,
    it makes it easier to understand how Query Store works if we first give a quick
    overview of the types of data being collected. There are three fundamental data
    sets that define the Query Store data:


    *   Query and Plan Information: Data about the query itself and about the execution
    plans derived from that query by the query optimizer.


    *   Query Runtime Information: This is the information about how fast the query
    ran and how many times it was called, along with other performance-related information
    from query execution.


    *   Query Wait Statistics: This information covers the various waits that occurred
    on a single query during the execution on the server.


    With those core data sets defined, we can now move on to determine exactly where
    that information comes from and how it gets collected. We will cover all three
    data sets in much more detail later in the chapter. We will use these data sets
    as our architecture for describing the ways that Query Store gathers the data
    because the data sets help define the approach taken by the Query Store. This
    is why it was important to establish what those data sets are before we talk about
    where they came from.


    On additional detail that you need to know to understand how the Query Store works
    is that this is a database level setting. It’s not controlled on the server, but
    rather database-by-database in your system. This is an important detail because
    the information the Query Store captures is written to each individual database,
    not a central location.'
