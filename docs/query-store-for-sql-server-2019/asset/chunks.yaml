    ## 查看查询存储等待统计信息


    有两种方法可以查看查询存储中查询的等待统计信息。您可以使用 T-SQL 来查询信息，或者，在 SQL Server Management Studio 18
    中有一个报告。我们将从查询等待统计信息开始。

    '
- fmt: "### Querying Wait Statistics\n\n查询 `Query Store` 中的等待统计信息非常直接。最重要的一点是要记住，这些统计信息是按时间间隔聚合的。虽然在查询统计信息时可以省略这一点，但这样做就需要你自行聚合这些聚合数据，以获得有意义的信息。以下是一个示例查询，它查看本章前面使用的存储过程的等待统计信息：\n\
    \n```sql\nSELECT qsws.wait_category_desc,\n       qsws.total_query_wait_time_ms,\n\
    \       qsws.avg_query_wait_time_ms,\n       qsws.stdev_query_wait_time_ms\nFROM\
    \   sys.query_store_query AS qsq\n       JOIN sys.query_store_plan AS qsp\n  \
    \         ON qsp.query_id = qsq.query_id\n       JOIN sys.query_store_wait_stats\
    \ AS qsws\n           ON qsws.plan_id = qsp.plan_id\n       JOIN sys.query_store_runtime_stats_interval\
    \ AS qsrsi\n           ON qsrsi.runtime_stats_interval_id = qsws.runtime_stats_interval_id\n\
    WHERE  qsq.object_id = OBJECT_ID('dbo.ProductByCost');\n```\n\n你可以在图 [8-9](#473933_1_En_8_Chapter.xhtml#Fig9)\
    \ 中查看结果：\n\n![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig9_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig9_HTML.jpg)\n\
    \n**Figure 8-9**\n`dbo.ProductbyCost` 的等待统计信息\n\n你可以看到存在两个具有不同等待统计信息的不同时间间隔。该查询经历的等待仅出现在\
    \ `CPU` 和 `Network I/O` 类别中。使用上一节的表格，这意味着所经历的等待可能是表 [8-3](#473933_1_En_8_Chapter.xhtml#Tab3)\
    \ 中的任何一个：\n\n**Table 8-3**\n`dbo.ProductByCost` 经历的等待\n\n| Network IO | `ASYNC_NETWORK_IO`,\
    \ `NET_WAITFOR_PACKET`, `PROXY_NETWORK_IO`, `EXTERNAL_SCRIPT_NETWORK_IOF` |\n\
    | CPU | `SOS_SCHEDULER_YIELD` |\n\n显然，这是一种快速简便地理解查询瓶颈的方法。不过，这只是一个总体的知识，而非详细信息。尽管如此，它在我们轻松识别需要关注的问题方面发挥了巨大作用。\n\
    \n#### Wait Statistics Report\n\n第 [4](#473933_1_En_4_Chapter.xhtml) 章将详细介绍 `Query\
    \ Store` 报告。这里我将只展示报告本身的一般行为。打开报告后，你会看到类似于图 [8-10](#473933_1_En_8_Chapter.xhtml#Fig10)\
    \ 的内容：\n\n![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig10_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig10_HTML.jpg)\n\
    \n**Figure 8-10**\n显示聚合信息的等待统计报告\n\n当你首次打开报告时，只会显示该时间段内的聚合信息。你会看到所有查询以及给定类别中的各种等待。然后，如果你点击某个类别，例如你看到的\
    \ `CPU` 等待，视图将变为类似于图 [8-11](#473933_1_En_8_Chapter.xhtml#Fig11) 的内容：\n\n![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig11_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig11_HTML.jpg)\n\
    \n**Figure 8-11**\n显示所有经历了所选等待的查询的报告\n\n报告中现在显示的是左上方一系列经历了所选等待的查询。然后，该报告的运行方式与其他报告类似。选择一个查询会在右侧显示其随时间变化的各种查询计划。选择其中任何一个计划都会在屏幕底部窗格中显示完整的计划。在我们的实例中，你可以看到等待最多的查询是\
    \ `dbo.ProductByCost`。具体来说，它是我们本章开头原始示例中的那个糟糕的计划。\n\n所有这些提供了一种不仅理解查询性能，而且理解影响查询的等待的方法。\n\
    \n## Conclusion\n\n`Query Store` 支持许多有趣的场景，而自动调优以消除计划回归是其中更令人兴奋的功能之一。与所有其他功能一样，你应该监控你的系统以确保此行为对你有益。然而，大多数系统很可能会受益，从而让你腾出手来做其他工作。那项工作可能涉及使用现在与查询一起存储的等待统计信息，来更好地识别需要调优的查询。所有这些\
    \ `Query Store` 功能正在改变我们进行数据库监控和数据库调优的方式。\n\n# 9. Troubleshooting Issues with\
    \ Query Store\n\n与 `SQL Server` 的任何其他方面一样，大多数时候，你可以直接打开 `Query Store` 而无需担心它。然而，与\
    \ `SQL Server` 的任何其他方面一样，事情也可能出错。有两个工具可以用来了解数据库上 `Query Store` 的情况：\n\n*   `Query\
    \ Store` 特定的等待统计信息\n*   `Extended Events` for `Query Store`\n\n本章将探讨 `Query Store`\
    \ 可能出现的一些常见问题，以及如何使用提供的工具来确保 `Query Store` 在你的系统上运行良好。"
  raw: '### Querying Wait Statistics


    Querying the wait statistics in Query Store is very straightforward. The most
    important thing to remember is that the statistics are aggregated through the
    time interval. While you can leave this off when you query the statistics, doing
    so then requires you to aggregate the aggregates in order to arrive at meaningful
    data. Here’s an example query that looks at the wait statistics for the stored
    procedure we used earlier in the chapter:


    ```

    SELECT qsws.wait_category_desc,

    qsws.total_query_wait_time_ms,

    qsws.avg_query_wait_time_ms,

    qsws.stdev_query_wait_time_ms

    FROM sys.query_store_query AS qsq

    JOIN sys.query_store_plan AS qsp

    ON qsp.query_id = qsq.query_id

    JOIN sys.query_store_wait_stats AS qsws

    ON qsws.plan_id = qsp.plan_id

    JOIN sys.query_store_runtime_stats_interval AS qsrsi

    ON qsrsi.runtime_stats_interval_id = qsws.runtime_stats_interval_id

    WHERE qsq.object_id = OBJECT_ID(''dbo.ProductByCost'');

    ```


    You can see the results in Figure [8-9](#473933_1_En_8_Chapter.xhtml#Fig9):


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig9_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Wait statistics for dbo.ProductbyCost


    You can see that there are two different time intervals with different wait statistics.
    The only waits experienced by the query were in the CPU and Network I/O categories.
    Using the table from the section above, that means that the waits experienced
    could be any of these in Table [8-3](#473933_1_En_8_Chapter.xhtml#Tab3):


    Table 8-3


    The waits experienced by dbo.ProductByCost


    | Network IO | ASYNC_NETWORK_IO, NET_WAITFOR_PACKET, PROXY_NETWORK_IO, EXTERNAL_SCRIPT_NETWORK_IOF
    |

    | CPU | SOS_SCHEDULER_YIELD |


    Clearly, this makes for a quick and easy way to understand the bottleneck experience
    by a query. However, that will be a general set of knowledge, not detailed. Still,
    it makes a huge difference in our ability to easily identify problems that need
    our attention.


    #### Wait Statistics Report


    Chapter [4](#473933_1_En_4_Chapter.xhtml) is going to cover the Query Store reports
    in detail. Here I’ll just show the general behavior of the report itself. Upon
    opening the report, you’ll see something similar to Figure [8-10](#473933_1_En_8_Chapter.xhtml#Fig10):


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig10_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Wait statistics report showing aggregate information


    When you first open the report, only aggregate information for the time period
    is shown. You’re seeing all the queries and the various waits with a given category.
    If you then click on a category, such as the CPU wait that you see, the view will
    change to something like Figure [8-11](#473933_1_En_8_Chapter.xhtml#Fig11):


    ![../images/473933_1_En_8_Chapter/473933_1_En_8_Fig11_HTML.jpg](images/473933_1_En_8_Chapter/473933_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Report showing all queries that have experienced the wait selected


    What is now shown in the report is a series of queries in the upper left that
    have experienced the wait that was selected. Then, the report functions much as
    other reports do. Selecting a query shows its various query plans over time on
    the right. Selecting any of those plans will cause the full plan to be shown in
    the pane at the bottom of the screen. In our instance you can see that the query
    with the most waits was dbo.ProductByCost. Specifically, it was the bad plan from
    our original example at the start of the chapter.


    All this provides a way to understand not simply query performance, but the waits
    affecting the query as well.


    ## Conclusion


    Query Store enables a bunch of interesting scenarios and Automatic Tuning to eliminate
    plan regression is one of the more exciting. As with all else, you should monitor
    your systems to ensure that this behavior is benefiting you. However, most systems
    will likely benefit, thus freeing you up to do other work. That work may entail
    using the wait statistics that are now stored with queries to better identify
    the ones that need to be tuned. All this Query Store functionality is changing
    the way we do database monitoring and database tuning.


    # 9. Troubleshooting Issues with Query Store


    Like any other aspect of SQL Server, most of the time, you can simply turn Query
    Store on and then not worry about it. However, like any other aspect of SQL Server,
    things can go wrong. There are two tools that you can use to understand what is
    happening with Query Store on your database:


    *   Query Store specific wait statistics


    *   Extended Events for Query Store


    This chapter will look at some common problems that can arise with Query Store
    and how you can use the tools provided in order to ensure that Query Store is
    working well on your systems.'
