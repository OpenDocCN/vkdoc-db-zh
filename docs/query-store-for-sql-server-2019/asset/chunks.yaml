    Stored Procedure Demonstrating a Parametrized Call to SQL Server

    ```


    So, what this means is that every time this procedure is called it gets rolled
    up into one record per runtime interval in Query Store because it always has the
    variable defined as `VARCHAR(20)`. Now with an ad-hoc query doing the same thing,
    see Listing [3-16](#473933_1_En_3_Chapter.xhtml#PC16).


    ```

    SELECT FirstName,

    LastName

    FROM dbo.Customer

    WHERE LastName = ''Boggiano'';

    Listing 3-16

    T-SQL for Ad-hoc query

    ```


    When this query is compiled, it stores the variable for LastName as eight characters,
    but if you run the same query with the LastName as Smith, it will store the query
    with a variable as five characters giving you two records per runtime interval
    in Query Store. The data doesn’t get aggregated and therefore makes it harder
    to tune and troubleshoot queries that are of the same type. Ad-hoc queries also
    bloat the size of Query Store due to the number of unique questions it must keep
    track of.


    ### Impact of “Drop and Create” vs. “Alter”


    Query Store stores the `object_id` of the procedures, triggers, and functions
    that execute inside of the database. By altering these objects, you preserve the
    `object_id` of the object; if you use the “drop and create” method, you will no
    longer have the same `object_id` so the data will no longer be aggregated together
    going forward. So, if you make a change to try to improve performance and you
    decide to go and compare the performance in Query Store to prior runtime intervals,
    you will not be able to view the results in the Query Store reports, you will
    have to query the catalog views. In SQL Server 2017, the syntax “`CREATE OR ALTER`”
    was introduced so you can avoid the need to code for a `DROP`/`CREATE` operation.


    ### Impact of Database Renaming


    Inside execution plans all objects are referenced as three-part names `database.schema.object`
    because you have the potential of doing cross-database queries. Renaming a database
    will cause plan forcing to fail, causing recompilation of all queries using those
    forced plans on each execution.


    ### Reducing Recovery Times with Trace Flags


    By default, all queries are blocked from running in the database until Query Store
    is loaded if Query Store is enabled on the database. This is where trace flag
    7752 comes into play. By default, this behavior is on in Azure SQL Database, but
    on-premise you can turn on this trace flag and have Query Store load asynchronously,
    and in the background will be in a read-only state until it is completely loaded,
    so queries can process while Query Store loads, but you will not be capturing
    them. You can tell this is an issue on your system if you notice the wait stat
    `QDS_LOADDB` being high after a restart of your SQL Server instance. With this
    being the default behavior in Azure SQL Database it is quite possible it will
    become the default behavior in the on-premise product so we might want to go ahead
    and enable it now and get the benefits of faster startup times for our SQL Server
    instances. This also has the same effects on failovers.


    Trace flag 7745 controls rather your SQL Server instance takes the time to flush
    all the Query Store data to disk while SQL Server instance is being shut down.
    This can take a considerable amount of time that you may not be willing to wait
    to depend on what you have your `DATA_FLUSH_INTERVAL_SECONDS` set to and/or the
    number of databases with Query Store enabled on your instance. The recommendation
    here would be to turn on this trace flag on because if you tell SQL Server to
    shut down; you don’t want to wait for data to be flush to disk, you want to get
    your SQL Server instance back up and running as fast as possible.


    ## Query Store and Memory-Optimized Tables


    Memory-optimized tables are tables that are stored entirely in memory. Therefore,
    Query Store tracks a limited number of metrics when tracking queries that executed
    against memory-optimized tables because those tables are stored in memory. Query
    Store does not track I/O due to the table residing entirely in memory and query
    memory used. It does, however, track other metrics such as duration, CPU time,
    the degree of parallelism, and the row count. When viewing reports discussed in
    Chapter [4](#473933_1_En_4_Chapter.xhtml), keep this in mind if you use memory-optimized
    tables.


    ## Configuring Query Store for Natively Compiled Stored Procedures


    Similarly, to memory-optimized tables, natively compiled stored procedures are
    treated differently by Query Store. Query plans and query text are stored in Query
    Store by default for natively compiled stored procedure and a flag denotes these
    procedures in the catalog view `sys.query_store_plan`. However, runtime statistics
    are not stored in the `sys.query_store_runtime_stats` catalog view by default.
    To capture runtime statistics, you must use the procedure `sys.sp_xtp_control_query_exec_stats`.
    The procedure can be used to capture statistics for all natively compiled procedures
    at the instance level or just particular ones you need to troubleshoot. There
    is a performance overhead associated with collecting these statistics. Listing
    [3-17](#473933_1_En_3_Chapter.xhtml#PC17) shows you how to set up a natively compiled
    stored procedure to capture runtime statistics.


    ```

    DECLARE @dbid INT = DB_ID('''');

    DECLARE @object_id INT = OBJECT_ID('''');

    EXEC sys.sp_xtp_control_query_exec_stats

    @new_collection_value = 1,

    @database_id = @dbid,

    @xtp_object_id = @object_id;

    Listing 3-17

    Setup Query Store to capture runtime statistics for a natively compiled stored
    procedure

    ```


    Listing [3-18](#473933_1_En_3_Chapter.xhtml#PC18) shows you how to capture statistics
    for all natively compiled stored procedures on an instance.


    ```

    EXEC sys.sp_xtp_control_query_exec_stats

    @new_collection_value = 1;

    Listing 3-18

    Setup Query Store to capture runtime statistics for all natively compiled stored
    procedures on the instance

    ```


    To turn off the collection of statistics, run the same code in Listings [3-16](#473933_1_En_3_Chapter.xhtml#PC16)
    or [3-17](#473933_1_En_3_Chapter.xhtml#PC17) and change the parameter `@new_collection_value`
    to 0.


    ### Note


    These settings are reset to not capture statistics on the event that the SQL Server
    instance is shut down or restarted. If you need it to persist in collecting statistics,
    you will need to set up a startup stored procedure or a SQL Agent job that runs
    at startup.'
  trans: '

    ### 参数化与查询存储


    当讨论查询存储的 `QUERY_STORE_CAPTURE_MODE` 设置时，我们已经稍微触及了这个主题。让我们更深入地探讨其含义。首先，我们来讨论**参数化查询**和**即席查询**之间的区别。参数化查询以存储过程、函数、触发器或通过
    `sp_executesql` 的形式传入。其参数化特性在于，传入的每个变量都具有预定义的数据类型，SQL Server 在每次查询调用时都会使用该数据类型。例如，请参见清单
    3-15 中的代码，我们在其中查询 `Customer` 表的 `LastName`，但将数据类型固定为 20 个字符。


    ```sql

    CREATE PROCEDURE dbo.GetName

    @LastName VARCHAR(20)

    AS

    SET NOCOUNT ON;

    SELECT FirstName,

    LastName

    FROM dbo.Customer

    WHERE LastName = @LastName;

    GO

    EXEC dbo.GetName @LastName = ''Boggiano'';

    ```


    清单 3-15: 演示参数化调用 SQL Server 的存储过程


    那么，这意味着每次调用此过程时，它都会在查询存储中被汇总为每个运行时区间一条记录，因为它总是将变量定义为 `VARCHAR(20)`。现在，如果使用即席查询做同样的事情，请参见清单
    3-16。


    ```sql

    SELECT FirstName,

    LastName

    FROM dbo.Customer

    WHERE LastName = ''Boggiano'';

    ```


    清单 3-16: 即席查询的 T-SQL


    当此查询编译时，它将 `LastName` 变量存储为八个字符，但如果你用 `LastName` 为 Smith 运行相同的查询，它将存储变量为五个字符的查询，这会在查询存储中为你提供每个运行时区间两条记录。数据没有被聚合，因此使得优化和排查同一类型的查询变得更加困难。即席查询还会由于必须跟踪的独特查询数量而导致查询存储的大小膨胀。


    ### “删除并创建”与“更改”的影响


    查询存储存储在数据库内执行的存储过程、触发器和函数的 `object_id`。通过更改 (`ALTER`) 这些对象，你可以保留对象的 `object_id`；如果你使用“删除并创建”
    (`DROP` and `CREATE`) 方法，你将不再拥有相同的 `object_id`，因此未来的数据将无法再被聚合在一起。所以，如果你进行更改以尝试提高性能，并决定去比较查询存储中之前的运行时区间与当前的性能，你将无法在查询存储报告中查看结果，而必须查询目录视图。在
    SQL Server 2017 中，引入了语法 “`CREATE OR ALTER`”，因此你可以避免编写 `DROP`/`CREATE` 操作的需要。


    ### 数据库重命名的影响


    在执行计划中，所有对象都引用为三部分名称 `database.schema.object`，因为你有可能进行跨数据库查询。重命名数据库将导致计划强制 (`plan
    forcing`)失败，从而导致每次执行时使用那些强制计划的所有查询重新编译。


    ### 使用跟踪标志减少恢复时间


    默认情况下，如果数据库启用了查询存储，则在查询存储加载完成之前，所有查询都会被阻止在数据库中运行。这正是跟踪标志 7752 发挥作用的地方。默认情况下，此行为在
    Azure SQL Database 中是开启的，但在本地 (`on-premise`) 版本中，你可以启用此跟踪标志，让查询存储异步加载，并且在后台处于只读状态直到完全加载，因此查询可以在查询存储加载时处理，但你将不会捕获这些查询。如果你在
    SQL Server 实例重启后注意到等待统计信息 `QDS_LOADDB` 很高，你就可以判断你的系统是否存在此问题。由于这是 Azure SQL Database
    的默认行为，它很可能成为本地产品的默认行为，因此我们可能希望现在就启用它，并享受更快的 SQL Server 实例启动时间带来的好处。这也对故障转移 (`failovers`)
    产生相同的效果。


    跟踪标志 7745 控制你的 SQL Server 实例是否在关闭时花时间将所有查询存储数据刷新到磁盘。根据你设置的 `DATA_FLUSH_INTERVAL_SECONDS`
    和/或实例上启用了查询存储的数据库数量，这可能花费相当长的时间，你可能不愿意等待。这里的建议是启用此跟踪标志，因为如果你告诉 SQL Server 关机；你不想等待数据刷新到磁盘，你希望尽快让你的
    SQL Server 实例重新启动并运行。


    ## 查询存储与内存优化表


    内存优化表是完全存储在内存中的表。因此，在跟踪针对内存优化表执行的查询时，查询存储跟踪有限数量的指标，因为这些表存储在内存中。由于表完全驻留在内存中，查询存储不跟踪
    I/O 和使用的查询内存。然而，它确实跟踪其他指标，如持续时间、CPU 时间、并行度和行数。如果你使用内存优化表，在查看第 4 章讨论的报告时，请记住这一点。


    ## 为原生编译存储过程配置查询存储


    与内存优化表类似，查询存储对原生编译存储过程的处理方式也不同。默认情况下，查询存储为原生编译存储过程存储查询计划和查询文本，并在目录视图 `sys.query_store_plan`
    中用一个标志标记这些过程。但是，默认情况下，运行时统计信息不存储在 `sys.query_store_runtime_stats` 目录视图中。要捕获运行时统计信息，必须使用过程
    `sys.sp_xtp_control_query_exec_stats`。此过程可用于在实例级别捕获所有原生编译过程的统计信息，或仅捕获你需要排查的特定过程。收集这些统计信息存在相关的性能开销。清单
    3-17 展示了如何设置原生编译存储过程以捕获运行时统计信息。


    ```sql

    DECLARE @dbid INT = DB_ID('''');

    DECLARE @object_id INT = OBJECT_ID('''');

    EXEC sys.sp_xtp_control_query_exec_stats

    @new_collection_value = 1,

    @database_id = @dbid,

    @xtp_object_id = @object_id;

    ```


    清单 3-17: 设置查询存储以捕获原生编译存储过程的运行时统计信息


    清单 3-18 展示了如何捕获实例上所有原生编译存储过程的统计信息。


    ```sql

    EXEC sys.sp_xtp_control_query_exec_stats

    @new_collection_value = 1;

    ```


    清单 3-18: 设置查询存储以捕获实例上所有原生编译存储过程的运行时统计信息


    要关闭统计信息收集，请运行清单 3-16 或 3-17 中的相同代码，并将参数 `@new_collection_value` 更改为 0。


    ### 注意


    如果 SQL Server 实例被关闭或重启，这些设置会重置为不捕获统计信息。如果你需要持久地收集统计信息，你将需要设置一个启动存储过程或一个在启动时运行的
    SQL Agent 作业。

    '
- fmt: '# Enabling and Disabling Automatic Plan Regression Correction (APRC)


    To enable automatic plan regression correction (APRC), you can run the following
    code in Listing [3-19](#473933_1_En_3_Chapter.xhtml#PC19) for one database or
    the code in Listing [3-20](#473933_1_En_3_Chapter.xhtml#PC20) to enable Query
    Store on all databases where query store is enabled and is a `READ_WRITE` state.
    What is APRC and how it works is discussed more in Chapter [9](#473933_1_En_9_Chapter.xhtml).


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = N''''

    SELECT @SQL += REPLACE(N''ALTER DATABASE [{{DBNAME}}] SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN
    = ON '',

    ''{{DBName}}'', [name])

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND is_query_store_on = 1

    ORDER BY [name];

    EXEC (@SQL);

    -- Listing 3-20

    -- T-SQL to enable APRC where database is online and Query Store is enabled

    ```


    ```sql

    ALTER DATABASE []

    SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN = ON );

    -- Listing 3-19

    -- T-SQL to enable APRC

    ```


    To turn off Query Store, we run the same queries with `OFF` instead of `ON` as
    seen in code listings above as seen in Listings [3-21](#473933_1_En_3_Chapter.xhtml#PC21)
    and [3-22](#473933_1_En_3_Chapter.xhtml#PC22).


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(N''ALTER DATABASE [{{DBNAME}}] SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN
    = OFF '',

    ''{{DBName}}'', [name])

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND is_query_store_on = 1

    ORDER BY [name];

    EXEC (@SQL);

    -- Listing 3-22

    -- T-SQL to disable APRC where database is online and Query Store is enabled

    ```


    ```sql

    ALTER DATABASE []

    SET AUTOMATIC_TUNING ( FORCE_LAST_GOOD_PLAN = OFF );

    -- Listing 3-21

    -- T-SQL to disable APRC

    ```


    # Maintaining Query Store


    After you have Query Store configured, there are some items you may need to keep
    an eye out for. Sometimes the state of Query Store will change from `READ_WRITE`
    to `READ_ONLY` or `ERROR` and you will need to know when this happens and correct
    this. You also need to monitor the space usage to determine if you are capturing
    the write amount of data for the period of time you need and to make sure you
    don’t run out of space. You also need to know if any plans you forced are failing
    and how to track those. You may also need to remove plans and queries from Query
    Store. Finally, you may need to reset the wait statistics.


    ## Monitoring Desired vs. Actual State


    First, to maintain Query Store, you will want to make sure the `desired_state`
    and the `actual_state` of Query Store match. You can run the code in Listing [3-23](#473933_1_En_3_Chapter.xhtml#PC23)
    to check in single database or the code in Listing [3-24](#473933_1_En_3_Chapter.xhtml#PC24)
    to check all the databases in Query Store enabled on your instance.


    ```sql

    DECLARE @SQL NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(REPLACE(N''USE [{{DBName}}];

    SELECT

    "{{DBName}}" database_name,

    actual_state_desc,

    desired_state_desc

    FROM {{DBName}}.sys.database_query_store_options

    WHERE desired_state_desc  actual_state_desc ''

    ,''{{DBName}}'', [name])

    ,''"'', "")

    FROM sys.databases

    WHERE is_query_store_on = 1

    ORDER BY [name];

    EXEC (@SQL);

    -- Listing 3-24

    -- T-SQL to check Query Store’s desired state vs. actual state on all databases

    ```


    ```sql

    SELECT DB_NAME() database_name,

    actual_state_desc,

    desired_state_desc

    FROM sys.database_query_store_options

    WHERE desired_state_desc  actual_state_desc

    -- Listing 3-23

    -- T-SQL to check Query Store’s desired state vs. actual state

    ```


    ### Query Store Read-Only States


    Query Store can enter the `READ_ONLY` state from `READ_WRITE` without telling
    for a number of reasons. The reason is stored in the `readonly_reason` as a bit
    map in the `sys.query_store_options` catalog view. In Table [3-2](#473933_1_En_3_Chapter.xhtml#Tab2)
    you will find a list of the reasons.


    **Table 3-2 Query Store read-only state reasons**


    | readonly_reason bit map | Description |

    | --- | --- |

    | 1 | Database is in read-only mode |

    | 2 | Database is in single-user mode |

    | 4 | Database is in emergency mode |

    | 8 | Database is a secondary replica (Always On and Azure SQL Database geo-replication)
    |

    | 65536 | Reached limit set by `MAX_STORAGE_SIZE_MB` |

    | 131072 | The number of different statements has reached memory limit. In this
    case you should consider remove queries from the Query Store or upgrading service
    tier. Applies to Azure SQL Database |

    | 262144 | In-memory size limit has been hit. Items will be persisted to disk
    until space is freed up in memory. Query Store will be temporarily in read-only
    mode. Applies to Azure SQL Database |

    | 524288 | Database has reached disk size limit so Query Store can no longer grow.
    Applies to Azure SQL Database |


    ### How to Fix Query Store in Error State


    Starting in SQL Server 2017, Query Store can enter an error state. This can cause
    potential performance problems when you depend on manual plan forcing or auto
    plan regression correction. This is a rare race condition that can occur without
    you knowing. The recommended fix is to first try to turn `OFF` Query Store and
    place it in `READ_WRITE` mode. If that doesn’t work, the persisted data is corrupted
    on disk, so we run `sys.sp_query_store_consistency_check`. Finally, clear Query
    Store of all data. In Listing [3-25](#473933_1_En_3_Chapter.xhtml#PC25) you have
    code to run against all the databases with Query Store in `ERROR` state to fix
    the `ERROR` state.


    ```sql

    DECLARE @SQL AS NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(N''USE [{{DBName}}]

    --Try Changing to READ_WRITE

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    OFF

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    READ_WRITE

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage;

    END CATCH;

    END

    --Run sys.sp_query_store_consistency_check

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    EXEC

    [{{DBName}}].sys.sp_query_store_consistency_check

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE =

    ON

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    (OPERATION_MODE = READ_WRITE)

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage;

    END CATCH;

    END

    --Run purge Query Store

    IF EXISTS (SELECT * FROM sys.database_query_store_options

    WHERE actual_state=3)

    BEGIN

    BEGIN TRY

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    CLEAR

    ALTER DATABASE [{{DBName}}] SET QUERY_STORE

    (OPERATION_MODE = READ_WRITE)

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage

    END CATCH;

    END

    ''

    ,''{{DBName}}'', [name])

    FROM sys.databases

    WHERE is_query_store_on = 1;

    EXEC (@SQL);

    -- Listing 3-25

    -- T-SQL to fix error state on all databases on instance

    ```


    ### Tip


    Due to the potential performance impact, recommendation would set the above code
    as a SQL Agent job to run a regular basis so you don’t get caught off guard when
    the Query Store is in an `ERROR` state.'
