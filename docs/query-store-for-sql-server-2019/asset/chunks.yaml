    # 3. Configuring Query Store


    As with any SQL Server feature, maximizing its potential involves tuning that
    feature for your specific environment. Common advice would be to begin with the
    defaults, then compare these with commonly agreed best practices and adjust those
    to what makes sense for your use case if necessary. Often there will be a widely
    accepted set of best practices within the community for typical deviations from
    Microsoft defaults. Sometimes defaults that appear “dumb” are often set that way,
    not because Microsoft is ignorant of its product or user base but for backward
    compatibility reasons.


    In this chapter, we will discuss the steps for implementing and configuring the
    Query Store feature. We will cover the default configuration both on-premise and
    in the Azure SQL Database Platform as a Service (PaaS) offering. There will be
    a detailed breakdown of all the Query Store configuration options and the Query
    Store catalog views related to the configuration (for a list of all the Query
    Store–related catalog views, look to Chapter [5](#473933_1_En_5_Chapter.xhtml)).


    After this, we will commence a deep dive into best practices for configuring the
    Query Store. We will talk about how parameterization and parameterization settings
    can impact Query Store as well as the impact of renaming objects. Trace flags
    to improve recovery times and important performance-related patches for versions
    2016 and 2017 will also be highlighted.


    For those of you leveraging the capabilities of In-Memory OLTP, the use of Query
    Store with natively compiled stored procedures will be covered. We will also discuss
    an exciting new feature introduced in SQL 2017, known as automatic plan regression
    correction (APRC). What it entails and how to enable or disable it will be covered.


    We will close the chapter with a discussion of the various query store error states
    and details on how to maintain the Query Store as a DBA.


    ## Query Store Defaults


    In this section, we will look at the default configuration options for the Query
    Store in SQL Server. Default options in SQL Server are not always the optimal
    configuration setting for your environment, but changing them does merit careful
    consideration. An important point to note is that the Query Store is disabled
    by default in the on-premise product for versions 2016, 2017, and 2019 at time
    of this writing. However, in the Microsoft Platform as a Service (PaaS) offering
    Azure SQL Database, it is enabled by default. For Azure SQL Database Managed Instances,
    a managed Infrastructure as a Service (IaaS) offering, the Query Store is supported
    but also disabled by default.


    To enable Query Store, run the following T-SQL command in Listing [3-1](#473933_1_En_3_Chapter.xhtml#PC1):


    ```

    ALTER DATABASE [] SET QUERY_STORE=ON;

    Listing 3-1

    T-SQL to enable Query Store on a database

    ```


    To enable Query Store on all databases on your instance you can run the code in
    Listing [3-2](#473933_1_En_3_Chapter.xhtml#PC2):


    ```

    DECLARE @SQL NVARCHAR(MAX) = N'''';

    SELECT @SQL += REPLACE(N''ALTER DATABASE [{{DBNAME}}] SET QUERY_STORE=ON '',

    ''{{DBName}}'', [name])

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND [name] NOT IN (''master'', ''tempdb'')

    ORDER BY [name];

    EXEC (@SQL);

    Listing 3-2

    Turn Query Store on all databases

    ```


    The Query Store cannot be enabled in either the `master` or the `tempdb` system
    databases . Enabling the Query Store in the *model* database does not actually
    capture any Query Store data in the *model* database, but this configuration change
    will be reflected in newly created databases from that point forward. In the `msdb`
    system database, the Query Store will behave no differently than the Query Store
    in a user database. A table of options for Azure SQL Database and regular on-premise
    SQL server is presented in Table [3-1](#473933_1_En_3_Chapter.xhtml#Tab1).


    Table 3-1


