    ### 等待统计信息类别


    关于这些类别没有太多可说的。您需要了解类别的划分方式，以便理解它们代表哪些等待。除此之外，没有与它们相关的附加功能。这纯粹是信息性的，以便您在查看查询存储中的等待统计信息时能够正确解读信息。


    表 8-2 显示了微软发布的类别及相关等待类型。遵循他们的惯例，百分号 (`%`) 代表通配符。


