    图 9-1 所有 Query Store 等待统计信息


    当然，你的系统中各列的值会有所不同，但你应该看到类似的等待列表。你通常不会孤立地查看 Query Store 等待统计信息。相反，你会查询等待统计信息并查找系统上排名靠前的等待。当这些主要的等待是
    Query Store 时，你可能正经历某种问题。


    然而，只有少数几个 Query Store 等待你可以安全地忽略。Paul Randal 也维护了一个等待统计信息库（可访问此处：[`https://bit.ly/2ePzYO2`](https://bit.ly/2ePzYO2)）。根据他的文档，目前有三种等待在涉及
    Query Store 时可以安全忽略：


    ```text

    qds_async_queue

    qds_cleanup_stale_queries_task_main_loop_sleep

    qds_shutdown_queue

    ```


    你不会简单地只查询 Query Store 的等待。相反，作为你系统上等待统计信息常规监控的一部分，你会查找上述等待，因为它们会表明 Query Store
    本身及其操作正在导致你的系统出现问题。如果你在排名前 10 的等待中看到任何 “qds_*” 等待，你会希望理解那个等待统计信息是什么，然后深入研究为什么它会在你的系统中造成问题。我们在监控
    Query Store 时深入调查的方法是使用 Extended Events。


    ## Extended Events and Query Store


    Extended Events 是对你的系统中 Query Store 行为进行详细分析的最佳方法。Extended Events 是一个相当复杂的主题，我们不打算在本书中详细解释。要开始使用
    Extended Events，我建议先阅读 Microsoft 的文档：[`https://bit.ly/2LfWMoj`](https://bit.ly/2LfWMoj)。一旦你熟悉了
    Extended Events 的工作原理，你就可以更轻松地探索使用 Extended Events 监控 Query Store 的功能。


    在撰写本文时，SQL Server 2019 中定义的 `qds`（Query Data Store）包内当前有 92 个事件。如果你想运行查询，可以轻松地列出它们，如清单
    9-2 所示：


    ```sql

    SELECT dxo.name,

    dxo.description

    FROM sys.dm_xe_packages AS dxp

    JOIN sys.dm_xe_objects AS dxo

    ON dxp.guid = dxo.package_guid

    WHERE dxp.name = ''qds''

    AND dxo.object_type = ''event'';

    ```


    清单 9-2 列出 Query Data Store Extended Events


    另一种访问信息的方式是通过 SQL Server Management Studio 中的 Extended Events GUI，如图 9-2 所示：


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig2_HTML.jpg](img/473933_1_En_9_Fig2_HTML.jpg)


    图 9-2 在 Extended Events 中仅选择 Query Store 事件


    这里唯一的问题是，并非所有这些事件都是活动的。其中许多，甚至可能是大多数，只能通过 Microsoft 设置的特殊标志来访问。因此，虽然你可以看到它们，甚至将它们添加到某个会话中，但它们永远不会记录任何活动。


    与其他 Extended Events 中的事件一样，Query Store 事件将具有一个名称、一个描述以及与事件关联的一组定义的列。因此，如果我们使用
    Extended Events 来监控 Query Store 的行为，我们可能感兴趣的一个事件是 `query_store_size_retention_cleanup_finished`
    事件。选择该事件后，我们就可以看到 Query Store 本身正在收集的信息，如图 9-3 所示：


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig3_HTML.jpg](img/473933_1_En_9_Fig3_HTML.jpg)


    图 9-3 由 `query_store_execution_runtime_info` 捕获的信息


    此事件中的信息代表了 Query Store 在查询完成其清理过程后捕获的数据。因此，通过这个事件，你可以观察和监控 Query Store 行为的那一部分。我们将看看几种你可以监控
    Query Store 行为的不同方法，以及一些在这方面非常有帮助的特定事件。'
- fmt: "### Tracking Query Store Behaviors\n\nA number of processes that make up the\
    \ Query Store can be observed by capturing Extended Events. We’ve already see\
    \ an event that fires when Query Store is cleansing itself for size. You can also\
    \ watch a matching event, `query_store_size_retention_cleanup_started` to see\
    \ when this event begins. For general observation of Query Store behavior, Listing\
    \ [9-3](#473933_1_En_9_Chapter.xhtml#PC3) contains a set of events that, as of\
    \ this writing, I know will fire to produce information about the standard behavior\
    \ of Query Store:\n\n```sql\nCREATE EVENT SESSION QueryStoreBehavior\nON SERVER\n\
    ADD EVENT qds.query_store_background_task_persist_finished,\nADD EVENT qds.query_store_background_task_persist_started,\n\
    ADD EVENT qds.query_store_capture_policy_evaluate,\nADD EVENT qds.query_store_capture_policy_start_capture,\n\
    ADD EVENT qds.query_store_database_out_of_disk_space,\nADD EVENT qds.query_store_db_cleared,\n\
    ADD EVENT qds.query_store_db_diagnostics,\nADD EVENT qds.query_store_db_settings_changed,\n\
    ADD EVENT qds.query_store_plan_removal,\nADD EVENT qds.query_store_size_retention_cleanup_finished,\n\
    ADD EVENT qds.query_store_size_retention_cleanup_started\nADD TARGET package0.event_file\n\
    (SET filename = N'C:\\ExEvents\\QueryStorePlanForcing.xel', max_rollover_files\
    \ = (3))\nWITH (TRACK_CAUSALITY = ON);\n```\n\nListing 9-3\nExtended Event Session\
    \ producing information on the standard behavior of Query Store\n\nThese events\
    \ capture some of the behaviors of the Query Store. If you create this session,\
    \ start it, and watch the Live Data window in SSMS, we can actually see some of\
    \ the events fire if we manipulate queries and the Query Store itself. Let’s fire\
    \ a few commands to see this in action. To start with, we’ll clear the Query Store\
    \ with the code in Listing [9-4](#473933_1_En_9_Chapter.xhtml#PC4):\n\n```sql\n\
    ALTER DATABASE AdventureWorks SET QUERY_STORE CLEAR;\n```\n\nListing 9-4\nClear\
    \ Query Store\n\nThis will fire the event, `query_store_db_cleared`, as we see\
    \ in Figure [9-4](#473933_1_En_9_Chapter.xhtml#Fig4):\n\n![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig4_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4\n`query_store_db_cleared` event captured for a given database\n\n\
    The first four columns are for managing the Extended Events causality tracking,\
    \ showing the distinct grouping of events and the order in which they occur. We\
    \ can ignore that in this instance. What we see are the `clear_all` setting, which\
    \ is defined in the `QUERY_STORE CLEAR` command, which can be set to clear `ALL`.\n\
    \nTo see the next event, we’ll run the following stored procedure in Listing [9-5](#473933_1_En_9_Chapter.xhtml#PC5)\
    \ from the previous chapter:\n\n```sql\nEXEC dbo.AddressByCity @City = N'London';\n\
    ```\n\nListing 9-5\nCall stored procedure\n\nWe’ll get the following two events,\
    \ related and in the order in which they are firing as shown in Figure [9-5](#473933_1_En_9_Chapter.xhtml#Fig5):\n\
    \n![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig5_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5\nQuery Store evaluates a query and then captures it\n\nI’m showing\
    \ the details of the `query_store_capture_policy_evaluate` event. You can see\
    \ that the `capture_policy_result` is showing the result of the evaluation, in\
    \ this case, `CAPTURE`. You’ll also frequently see `UNDECIDED` for queries that\
    \ have been evaluated but are not going to be captured.\n\nYou may see an intermittent\
    \ event showing how Query Store self-evaluates on a regular basis as shown in\
    \ Figure [9-6](#473933_1_En_9_Chapter.xhtml#Fig6):\n\n![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig6_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6\nSettings and diagnostics of Query Store\n\nYou can see the current\
    \ settings for Query Store, such as the plans per query limit, currently set at\
    \ 200. You also get to see the plans and plan use being managed by Query Store.\
    \ These numbers will obviously change over time, showing the behavior of Query\
    \ Store over time.\n\nLet’s take a look at one more of the events in action. Run\
    \ the following code in Listing [9-6](#473933_1_En_9_Chapter.xhtml#PC6) to remove\
    \ a plan from the plan cache:\n\n```sql\nDECLARE @PlanID INT;\nSELECT TOP 1\n\
    \    @PlanID = qsp.plan_id\nFROM    sys.query_store_query AS qsq\nJOIN    sys.query_store_plan\
    \ AS qsp\n    ON qsp.query_id = qsq.query_id\nWHERE   qsq.object_id = OBJECT_ID('dbo.AddressByCity');\n\
    EXEC sys.sp_query_store_remove_plan @plan_id = @PlanID;\n```\n\nListing 9-6\n\
    Remove a plan from cache\n\nWe can then see this event as shown in Figure [9-7](#473933_1_En_9_Chapter.xhtml#Fig7):\n\
    \n![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig7_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7\nPlan removed from Query Store\n\nYou can see the database, the fact\
    \ that plan was successfully removed, and the plan being removed.\n\nAll these\
    \ events give you a good idea of what’s happening within Query Store, allowing\
    \ you to see how Query Store behaves.\n\n## Conclusion\n\nWhile you really should\
    \ just see normal behavior from Query Store the vast majority of the time, it\
    \ is possible for things to go wrong. Knowing how to monitor Query Store itself\
    \ ensures that you have a higher degree of confidence that Query Store is supporting\
    \ and helping you, not hurting you. Wait statistics are going to be the principal\
    \ mechanism of assuring good Query Store behavior. You can drill down on the details\
    \ of that behavior using Extended Events to see exactly how the system is working.\
    \ These processes should enable you to protect your systems and better understand\
    \ the behavior of Query Store.\n\n# 10. Community Tools\n\nA few community tools\
    \ have been developed to help with configuration and harvesting of the data in\
    \ Query Store. `dbatools` is a community-driven PowerShell module that includes\
    \ three cmdlets for helping you configure Query Store. The First Responder Kit\
    \ contains a set of stored procedures including one that queries Query Store data.\
    \ In this chapter we will cover these tools to how they can help see the options\
    \ of Query Store, set the options of Query Store, and harvest the data in Query\
    \ Store.\n\n## dbatools\n\n`dbatools` is a PowerShell open source module developed\
    \ with currently over 400 commands to help manage SQL Server. There currently\
    \ are three commands for Query Store: `Get-DbaDbQueryStoreOption`, `Set-DbaDbQueryStoreOption`,\
    \ and `Copy-DbaQueryStoreConfig`. By using `dbatools`, you can retrieve and set\
    \ the settings across multiple databases and servers at the same time. Full documentation\
    \ and information on `dbatools` can be found at [`http://dbatools.io`](http://dbatools.io)\
    \ and installed on any machine with PowerShell 5 or higher by running the code\
    \ in Listing [10-1](#473933_1_En_10_Chapter.xhtml#PC1) at a PowerShell command\
    \ prompt.\n\n```powershell\nInstall-Module dbatools\n```\n\nListing 10-1\nInstall\
    \ `dbatools`"
  raw: '### Tracking Query Store Behaviors


    A number of processes that make up the Query Store can be observed by capturing
    Extended Events. We’ve already see an event that fires when Query Store is cleansing
    itself for size. You can also watch a matching event, query_store_size_retention_cleanup_started
    to see when this event begins. For general observation of Query Store behavior,
    Listing [9-3](#473933_1_En_9_Chapter.xhtml#PC3) contains a set of events that,
    as of this writing, I know will fire to produce information about the standard
    behavior of Query Store:


    ```

    CREATE EVENT SESSION QueryStoreBehavior

    ON SERVER

    ADD EVENT qds.query_store_background_task_persist_finished,

    ADD EVENT qds.query_store_background_task_persist_started,

    ADD EVENT qds.query_store_capture_policy_evaluate,

    ADD EVENT qds.query_store_capture_policy_start_capture,

    ADD EVENT qds.query_store_database_out_of_disk_space,

    ADD EVENT qds.query_store_db_cleared,

    ADD EVENT qds.query_store_db_diagnostics,

    ADD EVENT qds.query_store_db_settings_changed,

    ADD EVENT qds.query_store_plan_removal,

    ADD EVENT qds.query_store_size_retention_cleanup_finished,

    ADD EVENT qds.query_store_size_retention_cleanup_started

    ADD TARGET package0.event_file

    (SET filename = N''C:\ExEvents\QueryStorePlanForcing.xel'', max_rollover_files
    = (3))

    WITH (TRACK_CAUSALITY = ON);

    Listing 9-3

    Extended Event Session producing information on the standard behavior of Query
    Store

    ```


    These events capture some of the behaviors of the Query Store. If you create this
    session, start it, and watch the Live Data window in SSMS, we can actually see
    some of the events fire if we manipulate queries and the Query Store itself. Let’s
    fire a few commands to see this in action. To start with, we’ll clear the Query
    Store with the code in Listing [9-4](#473933_1_En_9_Chapter.xhtml#PC4):


    ```

    ALTER DATABASE AdventureWorks SET QUERY_STORE CLEAR;

    Listing 9-4

    Clear Query Store

    ```


    This will fire the event, query_store_db_cleared, as we see in Figure [9-4](#473933_1_En_9_Chapter.xhtml#Fig4):


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig4_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    query_store_db_cleared event captured for a given database


    The first four columns are for managing the Extended Events causality tracking,
    showing the distinct grouping of events and the order in which they occur. We
    can ignore that in this instance. What we see are the clear_all setting, which
    is defined in the QUERY_STORE CLEAR command, which can be set to clear ALL.


    To see the next event, we’ll run the following stored procedure in Listing [9-5](#473933_1_En_9_Chapter.xhtml#PC5) from
    the previous chapter:


    ```

    EXEC dbo.AddressByCity @City = N''London'';

    Listing 9-5

    Call stored procedure

    ```


    We’ll get the following two events, related and in the order in which they are
    firing as shown in Figure [9-5](#473933_1_En_9_Chapter.xhtml#Fig5):


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig5_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Query Store evaluates a query and then captures it


    I’m showing the details of the query_store_capture_policy_evaluate event. You
    can see that the capture_policy_result is showing the result of the evaluation,
    in this case, CAPTURE. You’ll also frequently see UNDECIDED for queries that have
    been evaluated but are not going to be captured.


    You may see an intermittent event showing how Query Store self-evaluates on a
    regular basis as shown in Figure [9-6](#473933_1_En_9_Chapter.xhtml#Fig6):


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig6_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Settings and diagnostics of Query Store


    You can see the current settings for Query Store, such as the plans per query
    limit, currently set at 200\. You also get to see the plans and plan use being
    managed by Query Store. These numbers will obviously change over time, showing
    the behavior of Query Store over time.


    Let’s take a look at one more of the events in action. Run the following code
    in Listing [9-6](#473933_1_En_9_Chapter.xhtml#PC6) to remove a plan from the plan
    cache:


    ```

    DECLARE @PlanID INT;

    SELECT TOP 1

    @PlanID = qsp.plan_id

    FROM    sys.query_store_query AS qsq

    JOIN    sys.query_store_plan AS qsp

    ON qsp.query_id = qsq.query_id

    WHERE   qsq.object_id = OBJECT_ID(''dbo.AddressByCity'');

    EXEC sys.sp_query_store_remove_plan @plan_id = @PlanID;

    Listing 9-6

    Remove a plan from cache

    ```


    We can then see this event as shown in Figure [9-7](#473933_1_En_9_Chapter.xhtml#Fig7):


    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig7_HTML.jpg](images/473933_1_En_9_Chapter/473933_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Plan removed from Query Store


    You can see the database, the fact that plan was successfully removed, and the
    plan being removed.


    All these events give you a good idea of what’s happening within Query Store,
    allowing you to see how Query Store behaves.


    ## Conclusion


    While you really should just see normal behavior from Query Store the vast majority
    of the time, it is possible for things to go wrong. Knowing how to monitor Query
    Store itself ensures that you have a higher degree of confidence that Query Store
    is supporting and helping you, not hurting you. Wait statistics are going to be
    the principal mechanism of assuring good Query Store behavior. You can drill down
    on the details of that behavior using Extended Events to see exactly how the system
    is working. These processes should enable you to protect your systems and better
    understand the behavior of Query Store.


    # 10. Community Tools


    A few community tools have been developed to help with configuration and harvesting
    of the data in Query Store. dbatools is a community-driven PowerShell module that
    includes three cmdlets for helping you configure Query Store. The First Responder
    Kit contains a set of stored procedures including one that queries Query Store
    data. In this chapter we will cover these tools to how they can help see the options
    of Query Store, set the options of Query Store, and harvest the data in Query
    Store.


    ## dbatools


    dbatools is a PowerShell open source module developed with currently over 400
    commands to help manage SQL Server. There currently are three commands for Query
    Store: `Get-DbaDbQueryStoreOption`, `Set-DbaDbQueryStoreOption,` and `Copy-DbaQueryStoreConfig`.
    By using dbatools, you can retrieve and set the settings across multiple databases
    and servers at the same time. Full documentation and information on dbatools can
    be found at [`http://dbatools.io`](http://dbatools.io) and installed on any machine
    with PowerShell 5 or higher by running the code in Listing [10-1](#473933_1_En_10_Chapter.xhtml#PC1)
    at a PowerShell command prompt.


    ```

    Install-Module dbatools

    Listing 10-1

    Install dbatools

    ```'
  trans: "\n### 跟踪查询存储行为\n\n通过捕获扩展事件，可以观察到构成查询存储的多个进程。我们已经看到一个在查询存储因空间不足而进行清理时触发的事件。您还可以观察一个对应的事件\
    \ `query_store_size_retention_cleanup_started`，以了解该事件何时开始。为了对查询存储行为进行一般性观察，清单\
    \ 9-3 包含了一组事件，据我所知，在撰写本文时，这些事件会触发并产生有关查询存储标准行为的信息：\n\n```sql\nCREATE EVENT SESSION\
    \ QueryStoreBehavior\nON SERVER\nADD EVENT qds.query_store_background_task_persist_finished,\n\
    ADD EVENT qds.query_store_background_task_persist_started,\nADD EVENT qds.query_store_capture_policy_evaluate,\n\
    ADD EVENT qds.query_store_capture_policy_start_capture,\nADD EVENT qds.query_store_database_out_of_disk_space,\n\
    ADD EVENT qds.query_store_db_cleared,\nADD EVENT qds.query_store_db_diagnostics,\n\
    ADD EVENT qds.query_store_db_settings_changed,\nADD EVENT qds.query_store_plan_removal,\n\
    ADD EVENT qds.query_store_size_retention_cleanup_finished,\nADD EVENT qds.query_store_size_retention_cleanup_started\n\
    ADD TARGET package0.event_file\n(SET filename = N'C:\\ExEvents\\QueryStorePlanForcing.xel',\
    \ max_rollover_files = (3))\nWITH (TRACK_CAUSALITY = ON);\n```\n\n清单 9-3\n产生关于查询存储标准行为信息的扩展事件会话\n\
    \n这些事件捕获了查询存储的部分行为。如果您创建此会话，启动它，并在 SSMS 中查看实时数据窗口，如果我们操作查询和查询存储本身，实际上可以看到部分事件触发。让我们执行几个命令来实际观察一下。首先，我们使用清单\
    \ 9-4 中的代码清除查询存储：\n\n```sql\nALTER DATABASE AdventureWorks SET QUERY_STORE CLEAR;\n\
    ```\n\n清单 9-4\n清除查询存储\n\n这将触发 `query_store_db_cleared` 事件，如图 9-4 所示：\n\n![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig4_HTML.jpg](img/473933_1_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4\n为给定数据库捕获的 `query_store_db_cleared` 事件\n\n前四列用于管理扩展事件的因果关系跟踪，显示事件的独特分组及其发生的顺序。在此实例中，我们可以忽略这些。我们看到的是\
    \ `clear_all` 设置，它在 `QUERY_STORE CLEAR` 命令中定义，可以设置为清除 `ALL`。\n\n为了查看下一个事件，我们将运行上一章清单\
    \ 9-5 中的以下存储过程：\n\n```sql\nEXEC dbo.AddressByCity @City = N'London';\n```\n\n\
    清单 9-5\n调用存储过程\n\n我们将得到以下两个相关事件，它们按触发顺序显示，如图 9-5 所示：\n\n![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig5_HTML.jpg](img/473933_1_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5\n查询存储评估查询然后捕获它\n\n我展示了 `query_store_capture_policy_evaluate` 事件的详细信息。您可以看到\
    \ `capture_policy_result` 显示了评估结果，在此例中是 `CAPTURE`。对于已评估但不会被捕获的查询，您也经常会看到 `UNDECIDED`。\n\
    \n您可能会看到一个间歇性事件，显示查询存储如何定期进行自我评估，如图 9-6 所示：\n\n![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig6_HTML.jpg](img/473933_1_En_9_Fig6_HTML.jpg)\n\
    \n图 9-6\n查询存储的设置和诊断信息\n\n您可以看到查询存储的当前设置，例如每个查询的计划限制，当前设置为 200。您还可以看到由查询存储管理的计划和计划使用情况。这些数字显然会随时间变化，显示查询存储随时间推移的行为。\n\
    \n让我们再看一个实际发生的事件。运行清单 9-6 中的以下代码以从计划缓存中删除一个计划：\n\n```sql\nDECLARE @PlanID INT;\n\
    SELECT TOP 1\n    @PlanID = qsp.plan_id\nFROM    sys.query_store_query AS qsq\n\
    JOIN    sys.query_store_plan AS qsp\n    ON qsp.query_id = qsq.query_id\nWHERE\
    \   qsq.object_id = OBJECT_ID('dbo.AddressByCity');\nEXEC sys.sp_query_store_remove_plan\
    \ @plan_id = @PlanID;\n```\n\n清单 9-6\n从缓存中删除一个计划\n\n然后我们可以看到这个事件，如图 9-7 所示：\n\n\
    ![../images/473933_1_En_9_Chapter/473933_1_En_9_Fig7_HTML.jpg](img/473933_1_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7\n计划已从查询存储中移除\n\n您可以看到数据库、计划被成功移除的事实以及被移除的计划。\n\n所有这些事件都让您能很好地了解查询存储内部发生的情况，使您能够观察查询存储的行为方式。\n\
    \n## 结论\n\n虽然在绝大多数情况下，您确实应该只看到查询存储的正常行为，但也有可能出现问题。了解如何监控查询存储本身，能确保您更有信心地确认查询存储是在支持并帮助您，而不是在损害您。等待统计信息将是确保查询存储行为良好的主要机制。您可以使用扩展事件深入挖掘该行为的细节，以准确了解系统如何工作。这些流程应能使您保护系统并更好地理解查询存储的行为。\n\
    \n# 10. 社区工具\n\n已经开发了一些社区工具来帮助配置和收集查询存储中的数据。`dbatools` 是一个社区驱动的 PowerShell 模块，包含三个用于帮助配置查询存储的\
    \ cmdlet。First Responder Kit 包含一组存储过程，其中一个用于查询查询存储数据。在本章中，我们将介绍这些工具，了解它们如何帮助查看查询存储的选项、设置查询存储的选项以及收集查询存储中的数据。\n\
    \n## dbatools\n\n`dbatools` 是一个开源 PowerShell 模块，目前开发有超过 400 个命令来帮助管理 SQL Server。目前有三个用于查询存储的命令：`Get-DbaDbQueryStoreOption`、`Set-DbaDbQueryStoreOption`\
    \ 和 `Copy-DbaQueryStoreConfig`。通过使用 `dbatools`，您可以同时跨多个数据库和服务器检索和设置配置。有关 `dbatools`\
    \ 的完整文档和信息可在 [`http://dbatools.io`](http://dbatools.io) 找到，并可以通过在 PowerShell 命令提示符下运行清单\
    \ 10-1 中的代码，在任何装有 PowerShell 5 或更高版本的机器上安装。\n\n```powershell\nInstall-Module dbatools\n\
    ```\n\n清单 10-1\n安装 `dbatools`\n"
- fmt: '## Get-DbaDbQueryStoreOption


    我们将探索的第一个 `dbatools` 命令是 `Get-DbaDbQueryStoreOption`。此命令检索数据库上已设置的查询存储选项。有几种运行该命令以返回数据的方式。清单
    [10-2](#473933_1_En_10_Chapter.xhtml#PC2) 将返回指定服务器上除 `master` 和 `tempdb` 以外的所有数据库的查询存储选项（因为无法在这些数据库中使用查询存储）。清单
    [10-2](#473933_1_En_10_Chapter.xhtml#PC2) 代码的结果如图 [10-1](#473933_1_En_10_Chapter.xhtml#Fig1)
    所示。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig1_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig1_HTML.jpg)


    图 10-1


    整个 SQL Server 实例的 `Get-DbaDbQueryStoreOption` 输出


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer

    ```


    清单 10-2


    返回指定服务器上所有数据库的所有查询存储选项


    要查看特定数据库的设置，可以运行清单 [10-3](#473933_1_En_10_Chapter.xhtml#PC3) 中的代码。结果显示在图 [10-2](#473933_1_En_10_Chapter.xhtml#Fig2)
    中。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig2_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig2_HTML.jpg)


    图 10-2


    `AdventureWorks` 数据库的 `Get-DbaDbQueryStoreOption` 输出


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer

    -Database AdventureWorks

    ```


    清单 10-3


    返回 `AdventureWorks` 数据库的所有查询存储选项


    如果一台服务器上有多个数据库，结果可能难以阅读并且需要大量滚动，但有一个选项可以以表格格式获取这些数据。请参见清单 [10-4](#473933_1_En_10_Chapter.xhtml#PC4)
    中的代码以了解如何实现这一点。清单 [10-4](#473933_1_En_10_Chapter.xhtml#PC4) 代码的部分结果如图 [10-3](#473933_1_En_10_Chapter.xhtml#Fig3)
    所示。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig3_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig3_HTML.jpg)


    图 10-3


    表格格式的 `Get-DbaDbQueryStoreOption` 输出


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer | Format-Table

    -AutoSize -Wrap

    ```


    清单 10-4


    以表格格式返回查询存储设置


    最后，您可以使用 `Get-DbaDbQueryStoreOption` 命令返回具有特定配置设置的所有数据库。在以下示例中，我们将返回查询存储的 `ActualState`
    为 `ReadWrite` 的所有数据库，如清单 [10-5](#473933_1_En_10_Chapter.xhtml#PC5) 所示。清单 [10-5](#473933_1_En_10_Chapter.xhtml#PC5)
    中代码的结果如图 [10-4](#473933_1_En_10_Chapter.xhtml#Fig4) 所示。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig4_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig4_HTML.jpg)


    图 10-4


    读写查询存储数据库的 `Get-DbaDbQueryStoreOption` 输出


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer | Where-Object

    {$_.ActualState -eq "ReadWrite"}

    ```


    清单 10-5


    返回查询存储 `ActualState` 为 `ReadWrite` 的数据库


    可以在 `dbatools` 网站 ([`https://dbatools.io`](https://dbatools.io) ) 上找到此命令的更多参数。


    ## Set-DbaDbQueryStoreOption


    我们将探索的第二个 `dbatools` 命令是 `Set-DbaDbQueryStoreOptions`。此命令在您指定的数据库上设置存在的查询存储选项。您可以根据需要使用该命令仅设置一个设置或设置所有设置。我们将在清单
    [10-6](#473933_1_En_10_Chapter.xhtml#PC6) 中，为 SQL Server 实例上的所有数据库设置第 [3](#473933_1_En_3_Chapter.xhtml)
    章中列出的最佳实践的查询存储选项。如果您还记得第 [3](#473933_1_En_3_Chapter.xhtml) 章，此配置的唯一例外是如果您需要更大的查询存储或想要不同的收集间隔。


    ```

    Set-DbaDbQueryStoreOption -SqlInstance MyServer -State ReadWrite

    -FlushInterval 900 -CollectionInterval 60 -MaxSize 2048

    -CaptureMode AUTO -CleanupMode Auto -StaleQueryThreshold 30

    ```


    清单 10-6


    使用 `Set-DbaDbQueryStoreOption` 将所有数据库的选项设置为最佳实践


    发出清单 [10-6](#473933_1_En_10_Chapter.xhtml#PC6) 中的命令后，该命令会输出每个数据库的新设置，就像您之前从 `Get-DbaDbQueryStoreOption`
    命令看到的那样。这些可以在图 [10-5](#473933_1_En_10_Chapter.xhtml#Fig5) 中看到。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig5_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig5_HTML.jpg)


    图 10-5


    最佳实践的 `Set-DbaDbQueryStoreOption` 输出


    例如，如果需要，可以通过使用清单 [10-6](#473933_1_En_10_Chapter.xhtml#PC6) 中的代码来更改特定数据库的大小和统计信息收集间隔。此代码允许您以更精细的级别保留更多数据。清单
    [10-7](#473933_1_En_10_Chapter.xhtml#PC7) 中代码的输出如图 [10-6](#473933_1_En_10_Chapter.xhtml#Fig6)
    所示。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig6_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig6_HTML.jpg)


    图 10-6


    更改最大大小和收集间隔的 `Set-DbaDbQueryStoreOption` 输出


    ```

    Set-DbaDbQueryStoreOption -SqlInstance MyServer

    -Database AdventureWorks -MaxSize 4096

    -CollectionInterval 15

    ```


    清单 10-7


    使用 `Set-DbaDbQueryStoreOption` 更改 `AdventureWorks` 的大小和收集间隔


    可以在 `dbatools` 网站 ([`https://dbatools.io`](https://dbatools.io) ) 上找到此命令的更多参数。


    ## Copy-DbaQueryStoreConfig


    我们将探索的最后一个命令是 `Copy-DbaQueryStoreConfig`。此命令可以复制同一服务器上数据库之间的查询存储选项，或者使用参数 `-AllDatabases`
    将设置从一台服务器上的一个数据库复制到另一台服务器上的数据库。清单 [10-8](#473933_1_En_10_Chapter.xhtml#PC8) 将把选项从
    `MyServerA` 和 `AdventureWorks` 数据库复制到 `MyServerB` 上的所有数据库。


    ```

    Copy-DbaDbQueryStoreOption -Source MyServerA

    -SourceDatabase AdventureWorks -Destination MyServerB

    -AllDatabases

    ```


    清单 10-8


    将查询存储选项从一个数据库复制到另一台服务器上的所有数据库


    您还可以使用清单 [10-9](#473933_1_En_10_Chapter.xhtml#PC9) 中的代码将选项复制到目标数据库服务器上的一个数据库服务器。


    ```

    Copy-DbaDbQueryStoreOption -Source MyServerA

    -SourceDatabase AdventureWorks -Destination MyServerB

    -DestinationDatabase AdventuresWorksDW

    ```


    清单 10-9


    将查询存储选项从一个数据库复制到另一台服务器上的另一个数据库


    ## dbatools 总结


    总之，我们介绍了 `dbatools` 中的三个 cmdlet，它们帮助您查看查询存储的配置并配置查询存储。`Get-DbaDbQueryStoreOption`
    cmdlet 允许您查看为查询存储设置的选项。`Set-DbaDbQueryStoreOptions` cmdlet 允许您设置查询存储的选项。`Copy-DbaQueryStoreConfig`
    cmdlet 允许您在数据库和服务器之间复制配置。'
  raw: '### Get-DbaDbQueryStoreOption


    The first command from dbatools we will explore is `Get-DbaDbQueryStoreOption`.
    This command retrieves the Query Store options that have been set on a database.
    There are several ways to run the command to return the data. Listing [10-2](#473933_1_En_10_Chapter.xhtml#PC2)
    will return the Query Store options for all databases on the server specified
    except master and tempdb because you cannot use Query Store with those databases.
    The results of the code from Listing [10-2](#473933_1_En_10_Chapter.xhtml#PC2)
    can be seen in Figure [10-1](#473933_1_En_10_Chapter.xhtml#Fig1).


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig1_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    The output from Get-DbaDbQueryStoreOption for the whole SQL Server instance


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer

    Listing 10-2

    Return all the Query Store options for all the databases on the specified server

    ```


    To see the settings for a particular database, you can run the code in Listing
    [10-3](#473933_1_En_10_Chapter.xhtml#PC3). The results are show in Figure [10-2](#473933_1_En_10_Chapter.xhtml#Fig2).


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig2_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    The output from Get-DbaDbQueryStoreOption for the AdventureWorks database


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer

    -Database AdventureWorks

    Listing 10-3

    Return all the Query Store options for the AdventureWorks database

    ```


    The results if you have several databases on one server can be hard to read and
    require a lot of scrolling, but there is an option to get this data back in a
    table format. See the code in Listing [10-4](#473933_1_En_10_Chapter.xhtml#PC4)
    for how to accomplish this. Part of the results from the code in Listing [10-4](#473933_1_En_10_Chapter.xhtml#PC4)
    can be seen in Figure [10-3](#473933_1_En_10_Chapter.xhtml#Fig3).


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig3_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    The output from Get-DbaDbQueryStoreOption in table format


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer | Format-Table

    -AutoSize -Wrap

    Listing 10-4

    Return Query Store settings in table format

    ```


    Lastly, you can use the Get-DbaDbQueryStoreOption command to return all the databases
    with a particular configuration setting. In the following example, we will return
    all the databases that have the ActualState of Query Store as ReadWrite as seen
    in Listing [10-5](#473933_1_En_10_Chapter.xhtml#PC5). The results of the code
    in Listing [10-5](#473933_1_En_10_Chapter.xhtml#PC5) can be seen in Figure [10-4](#473933_1_En_10_Chapter.xhtml#Fig4).


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig4_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    The output from Get-DbaDbQueryStoreOption for ReadWrite Query Store databases


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer | Where-Object

    {$_.ActualState -eq "ReadWrite"}

    Listing 10-5

    Return database where Query Store ActualState is ReadWrite

    ```


    More parameters can be found for this command online at the dbatools website (
    [`https://dbatools.io`](https://dbatools.io) ).


    ### Set-DbaDbQueryStoreOption


    The second command from dbatools we will explore is `Set-DbaDbQueryStoreOptions`.
    This command sets the Query Store options that exists in the databases you specify.
    You can use the command to set just one setting or them all depending on your
    needs. We will, in Listing [10-6](#473933_1_En_10_Chapter.xhtml#PC6), set the
    Query Store options for the best practices laid out in Chapter [3](#473933_1_En_3_Chapter.xhtml)
    for all the databases on the SQL Server instance. The only exceptions to this
    configuration, if you remember from Chapter [3](#473933_1_En_3_Chapter.xhtml),
    would be if you needed a larger Query Store or if you wanted a different collection
    interval.


    ```

    Set-DbaDbQueryStoreOption -SqlInstance MyServer -State ReadWrite

    -FlushInterval 900 -CollectionInterval 60 -MaxSize 2048

    -CaptureMode AUTO -CleanupMode Auto -StaleQueryThreshold 30

    Listing 10-6

    Use Set-DbaDbQueryStoreOption to set options on all the databases to best practices

    ```


    After issuing the command from Listing [10-6](#473933_1_En_10_Chapter.xhtml#PC6),
    the command outputs the new settings for each database as you have seen before
    from the `Get-DbaDbQueryStoreOption` command. These can be seen in Figure [10-5](#473933_1_En_10_Chapter.xhtml#Fig5).


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig5_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Output from Set-DbaDbQueryStoreOption for best practices


    It is possible, for example, to change the size of the particular database and
    the statistics collection interval if you need to, by using the code in Listing
    [10-6](#473933_1_En_10_Chapter.xhtml#PC6). This code allows you to keep more data
    at a more granular level. The output from the code in Listing [10-7](#473933_1_En_10_Chapter.xhtml#PC7)
    can be seen in Figure [10-6](#473933_1_En_10_Chapter.xhtml#Fig6) .


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig6_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Output from Set-DbaDbQueryStoreOption changing max size and collection interval


    ```

    Set-DbaDbQueryStoreOption -SqlInstance MyServer

    -Database AdventureWorks -MaxSize 4096

    -CollectionInterval 15

    Listing 10-7

    Use Set-DbaDbQueryStoreOption to change the size and collection interval for AdventureWorks

    ```


    More parameters can be found for this command online at the dbatools website (
    [`https://dbatools.io`](https://dbatools.io) ).


    ### Copy-DbaQueryStoreConfig


    The last command we will explore is `Copy-DbaQueryStoreConfig` . This command
    can copy the Query Store options between databases on the same server or the settings
    from one database on one server to databases on another server, with the parameter
    `-AllDatabases`. Listing [10-8](#473933_1_En_10_Chapter.xhtml#PC8) will copy the
    options from MyServerA and the AdventureWorks database to all the databases on
    MyServerB.


    ```

    Copy-DbaDbQueryStoreOption -Source MyServerA

    -SourceDatabase AdventureWorks -Destination MyServerB

    -AllDatabases

    Listing 10-8

    Copy Query Store options from one database to all the databases on another server

    ```


    You may also copy the options to one database server on the destination database
    server using the code in Listing [10-9](#473933_1_En_10_Chapter.xhtml#PC9).


    ```

    Copy-DbaDbQueryStoreOption -Source MyServerA

    -SourceDatabase AdventureWorks -Destination MyServerB

    -DestinationDatabase AdventuresWorksDW

    Listing 10-9

    Copy Query Store options from one database to another database on another server

    ```


    ## dbatools Summary


    In summary, we covered the three cmdlets in dbatools that help you see the configuration
    of Query Store and configure Query Store. The `Get-DbaDbQueryStoreOption` cmdlet
    allows you to view the options set for Query Store. The `Set-DbaDbQueryStoreOptions`
    cmdlet allows you to set the options for Query Store. The `Copy-DbaQueryStoreConfig`
    cmdlet allows you to copy configurations between databases and servers.'
  trans: '好的，作为您的文档工程师兼翻译员，我已仔细阅读了格式要求。现在，我将为您翻译给定的技术文档，严格遵守所有格式规范。



    ## Get-DbaDbQueryStoreOption


    我们将要探索的第一个 `dbatools` 命令是 `Get-DbaDbQueryStoreOption`。此命令用于检索数据库上已设置的查询存储选项。有几种运行此命令以返回数据的方式。清单
    10-2 将返回指定服务器上除 `master` 和 `tempdb` 以外的所有数据库的查询存储选项（因为无法在这些数据库中使用查询存储）。清单 10-2
    代码的运行结果如图 10-1 所示。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig1_HTML.jpg](img/473933_1_En_10_Fig1_HTML.jpg)


    图 10-1


    针对整个 SQL Server 实例运行 `Get-DbaDbQueryStoreOption` 的输出


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer

    ```


    清单 10-2


    返回指定服务器上所有数据库的查询存储选项


    要查看特定数据库的设置，可以运行清单 10-3 中的代码。结果显示在图 10-2 中。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig2_HTML.jpg](img/473933_1_En_10_Fig2_HTML.jpg)


    图 10-2


    针对 `AdventureWorks` 数据库运行 `Get-DbaDbQueryStoreOption` 的输出


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer

    -Database AdventureWorks

    ```


    清单 10-3


    返回 `AdventureWorks` 数据库的所有查询存储选项


    如果一台服务器上有多个数据库，结果可能难以阅读并且需要大量滚动查看，但有一个选项可以以表格格式获取这些数据。请参见清单 10-4 中的代码以了解如何实现这一点。清单
    10-4 代码的部分运行结果如图 10-3 所示。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig3_HTML.jpg](img/473933_1_En_10_Fig3_HTML.jpg)


    图 10-3


    以表格格式显示的 `Get-DbaDbQueryStoreOption` 输出


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer | Format-Table

    -AutoSize -Wrap

    ```


    清单 10-4


    以表格格式返回查询存储设置


    最后，您可以使用 `Get-DbaDbQueryStoreOption` 命令返回具有特定配置设置的所有数据库。在以下示例中，我们将返回查询存储的 `ActualState`
    设置为 `ReadWrite` 的所有数据库，如清单 10-5 所示。清单 10-5 中代码的运行结果如图 10-4 所示。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig4_HTML.jpg](img/473933_1_En_10_Fig4_HTML.jpg)


    图 10-4


    针对查询存储处于读写状态的数据库运行 `Get-DbaDbQueryStoreOption` 的输出


    ```

    Get-DbaDbQueryStoreOption -SqlInstance MyServer | Where-Object

    {$_.ActualState -eq "ReadWrite"}

    ```


    清单 10-5


    返回查询存储 `ActualState` 为 `ReadWrite` 的数据库


    可以在 `dbatools` 网站 ([`https://dbatools.io`](https://dbatools.io)) 上找到此命令的更多参数。


    ## Set-DbaDbQueryStoreOption


    我们将探索的第二个 `dbatools` 命令是 `Set-DbaDbQueryStoreOptions`。此命令用于在您指定的数据库上设置现有的查询存储选项。您可以根据需要使用该命令仅设置一个选项或设置所有选项。在清单
    10-6 中，我们将为 SQL Server 实例上的所有数据库设置第 3 章中列出的最佳实践的查询存储选项。如果您还记得第 3 章的内容，此配置的唯一例外是如果您需要更大的查询存储空间或想要不同的收集间隔。


    ```

    Set-DbaDbQueryStoreOption -SqlInstance MyServer -State ReadWrite

    -FlushInterval 900 -CollectionInterval 60 -MaxSize 2048

    -CaptureMode AUTO -CleanupMode Auto -StaleQueryThreshold 30

    ```


    清单 10-6


    使用 `Set-DbaDbQueryStoreOption` 将所有数据库的选项设置为最佳实践


    发出清单 10-6 中的命令后，该命令会输出每个数据库的新设置，就像您之前从 `Get-DbaDbQueryStoreOption` 命令看到的那样。这些输出可以在图
    10-5 中看到。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig5_HTML.jpg](img/473933_1_En_10_Fig5_HTML.jpg)


    图 10-5


    应用最佳实践后运行 `Set-DbaDbQueryStoreOption` 的输出


    例如，如果需要，可以通过使用类似清单 10-6 中的代码来更改特定数据库的大小和统计信息收集间隔。此代码允许您以更精细的级别保留更多数据。清单 10-7 中代码的输出如图
    10-6 所示。


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig6_HTML.jpg](img/473933_1_En_10_Fig6_HTML.jpg)


    图 10-6


    更改最大大小和收集间隔后运行 `Set-DbaDbQueryStoreOption` 的输出


    ```

    Set-DbaDbQueryStoreOption -SqlInstance MyServer

    -Database AdventureWorks -MaxSize 4096

    -CollectionInterval 15

    ```


    清单 10-7


    使用 `Set-DbaDbQueryStoreOption` 更改 `AdventureWorks` 的大小和收集间隔


    可以在 `dbatools` 网站 ([`https://dbatools.io`](https://dbatools.io)) 上找到此命令的更多参数。


    ## Copy-DbaQueryStoreConfig


    我们将探索的最后一个命令是 `Copy-DbaQueryStoreConfig`。此命令可以复制同一服务器上数据库之间的查询存储选项，或者使用 `-AllDatabases`
    参数将设置从一台服务器上的一个数据库复制到另一台服务器上的所有数据库。清单 10-8 将把选项从 `MyServerA` 上的 `AdventureWorks`
    数据库复制到 `MyServerB` 上的所有数据库。


    ```

    Copy-DbaDbQueryStoreOption -Source MyServerA

    -SourceDatabase AdventureWorks -Destination MyServerB

    -AllDatabases

    ```


    清单 10-8


    将查询存储选项从一个数据库复制到另一台服务器上的所有数据库


    您还可以使用清单 10-9 中的代码将选项复制到目标数据库服务器上的一个特定数据库。


    ```

    Copy-DbaDbQueryStoreOption -Source MyServerA

    -SourceDatabase AdventureWorks -Destination MyServerB

    -DestinationDatabase AdventuresWorksDW

    ```


    清单 10-9


    将查询存储选项从一个数据库复制到另一台服务器上的另一个特定数据库


    ## dbatools 总结


    总之，我们介绍了 `dbatools` 中的三个 cmdlet，它们帮助您查看查询存储的配置以及配置查询存储。`Get-DbaDbQueryStoreOption`
    cmdlet 允许您查看为查询存储设置的选项。`Set-DbaDbQueryStoreOptions` cmdlet 允许您设置查询存储的选项。`Copy-DbaQueryStoreConfig`
    cmdlet 允许您在数据库和服务器之间复制配置。

    '
- fmt: '## sp_BlitzQueryStore


    `sp_BlitzQueryStore` is part of the First Responder Kit made by Brent Ozar, ULTD.,
    located at [`http://FirstResponderKit.org`](http://firstresponderkit.org). The
    whole kit can be downloaded from there, or you can install it using the code in
    Listing [10-10](#473933_1_En_10_Chapter.xhtml#PC10) if you have `dbatools` installed.


    ```

    Install-DbaFirstResponderKit -Server MyServer -Database master

    Listing 10-10

    PowerShell to install First Responder Kit

    ```


    The procedure by default looks at the data in Query Store for the last 7 days
    (by default), finds the times that consumed the most resources for each metric,
    and finds the top three queries (by default) that consumed the most resources
    for each metric. By analyzing by each time period and each metric, you can get
    a more balanced and targeted analysis of data from Query Store. For example, it
    will find the time period in the last 7 days where you did the most logical reads
    and return the top three queries doing the reads during that time period. Then
    you can dive in and try to figure out how to improve the performance for those
    queries during that time period.


    By default, you can execute the procedure with just the database you want to see
    data for, and it will return the top query for each metric for the last 7 days.
    Listing [10-11](#473933_1_En_10_Chapter.xhtml#PC11) shows you the T-SQL to execute
    to see the results. Figures [10-7](#473933_1_En_10_Chapter.xhtml#Fig7) and [10-8](#473933_1_En_10_Chapter.xhtml#Fig8)
    show some of the columns that are returned when you run the stored procedure.


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig8_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig8_HTML.jpg)


    Figure 10-8

    `sp_BlitzQueryStore` result set


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig7_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig7_HTML.jpg)


    Figure 10-7

    `sp_BlitzQueryStore` result set


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks''

    Listing 10-11

    Execute sp_BlitzQueryStore for the top query for each metric the last 7 days

    ```


    You can click on the `query_plan_xml` column and bring up the query plan to view
    and troubleshoot. Some analysis has been done for you by giving you the `top_three_waits`,
    `missing_indexes`, and `implicit_conversion_info`. Other columns that returned
    are as follows:


    *   `top_three_waits` – with total ms in parentheses

    *   `missing_indexes` – listed from the missing index hints in the query plans

    *   `implicit_conversion_info` – listed from the query plan

    *   `cached_execution_parameters`

    *   `count_executions`

    *   `count_compiles`

    *   `total_cpu_time`

    *   `avg_cpu_time`

    *   `total_duration`

    *   `avg_duration`

    *   `total_logical_io_reads`

    *   `avg_logical_io_reads`

    *   `total_physical_io_reads`

    *   `avg_physical_io_reads`

    *   `total_logical_io_writes`

    *   `avg_logical_io_writes`

    *   `total_rowcount`

    *   `avg_rowcount`

    *   `total_query_max_used_memory`

    *   `avg_query_max_used_memory`

    *   `total_tempdb_space_used`

    *   `avg_tempdb_space_used`

    *   `total_log_bytes_used`

    *   `avg_log_bytes_used`

    *   `total_num_physical_io_reads`

    *   `avg_num_physical_io_reads`

    *   `first_execution_time`

    *   `last_execution_time`

    *   `last_force_failure_reason_desc`

    *   `context_settings`


    You can see below the results returned that there is a detailed analysis of queries
    that were executed during that time period including if it finds problems with
    your execution plans, high tempdb usage, long-running queries but low CPU, and
    then it wraps up by identifying the worst times by each metric that the system
    was performing in. See Figure [10-9](#473933_1_En_10_Chapter.xhtml#Fig9) for example
    of this output. This gives you the ability to drill down on specific poorly performing
    times or queries that are troublesome within the specified time period.


    ### Note


    Use the `@TOP` parameter to return more than the top one query. But use it cautiously
    as this procedure does a lot processing through the query plans. Recommendations
    are to limit to 10.


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig9_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig9_HTML.jpg)


    Figure 10-9

    `sp_BlitzQueryStore` time period analysis


    There are other options for running this procedure; we will go through a few important
    ones to help you to get the data you need. In Listing [10-12](#473933_1_En_10_Chapter.xhtml#PC12)
    you can specify the date range you want to return in your output by specifying
    the `@StateDate` and `@EndDate` parameters.


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @StartDate = ''20170526'', @EndDate = ''20170527''

    Listing 10-12

    Specify date range for sp_BlitzQueryStore

    ```


    If you are trying to troubleshoot a specific stored procedure, you can look for
    that stored procedure specifically. In Listing [10-13](#473933_1_En_10_Chapter.xhtml#PC13)
    you will find the code on how to return the top statement in the procedure `MyStoredProcedure`
    by specifying the `@StoredProcName` parameter.


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @Top = 1, @StoredProcName = ''MyStoredProcedure''

    Listing 10-13

    Return top statement for a specific stored procedure

    ```


    You can also use it to look at failed queries by specifying the `@Failed` parameter.
    Listing [10-14](#473933_1_En_10_Chapter.xhtml#PC14) is an example of how to return
    the top query that has failed.


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @Top = 1, @Failed = 1

    Listing 10-14

    Return top failed query

    ```


    Back in Chapter [4](#473933_1_En_4_Chapter.xhtml), we looked at the many reports
    in Grid View you could see the `plan_ids` and `query_ids`. If you are looking
    to see the `sp_BlitzQueryStore` data for a query you have identified from those
    reports, then you can use the code from Listings [10-15](#473933_1_En_10_Chapter.xhtml#PC15)
    and [10-16](#473933_1_En_10_Chapter.xhtml#PC16) to pull the data out of Query
    Store.


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @QueryIdFilter = 2958

    Listing 10-16

    Return data by query_id

    ```


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @PlanIdFilter = 3356

    Listing 10-15

    Return data by plan_id

    ```


    Other parameters you can specify include the following in Table [10-1](#473933_1_En_10_Chapter.xhtml#Tab1).


    Table 10-1

    `sp_BlitzQueryStore` parameters


    | Parameter name | Data type | Default |

    | --- | --- | --- |

    | `@Help` | bit | 0 |

    | `@MinimumExecutionCount` | int | NULL |

    | `@DurationFilter` | decimal(38, 4) | NULL |

    | `@ExportToExcel` | bit | 0 |

    | `@HideSummary` | bit | 0 |

    | `@SkipXML` | bit | 0 |

    | `@Debug` | bit | 0 |

    | `@ExpertMode` | bit | 0 |

    | `@Version` | varchar(30) | NULL |

    | `@VersionDate` | datetime | NULL |

    | `@VersionCheckMode` | bit | 0 |


    ## Conclusion


    Community tools prove to enhance our ability to use Query Store. `dbatools` lets
    us configure and check the settings of Query Store across multiple databases and
    servers with ease. `sp_BlitzQueryStore` lets you harvest the data in Query Store
    in a different format than the reports shown in Chapter [4](#473933_1_En_4_Chapter.xhtml)
    and can be useful for finding out what your top queries are for each metric quickly
    and what your busiest periods of times are for each metric. Finally, it allows
    you to track data for a stored procedure, `query_id`, or `plan_id` that you have
    identified you want to investigate further.


    ### Index


    ### A


    ad-hoc queries AdventureWorks database Automatic plan correction automatic tuning
    SeeAutomatic tuning behavior capabilities concepts regression SeeRegression Automatic
    plan regression correction (APRC) disable T-SQL enable T-SQL Automatic tuning
    Azure portal CurrentState value performance regression T-SQL command


    ### B


    Baseline catalog views compare workload back create definition establish overall
    resource consumption performance'
  raw: '## sp_BlitzQueryStore


    sp_BlitzQueryStore is part of the First Responder Kit made by Brent Ozar, ULTD.,
    located at [`http://FirstResponderKit.org`](http://firstresponderkit.org) . The
    whole kit can be downloaded from there, or you can install it using the code in
    Listing [10-10](#473933_1_En_10_Chapter.xhtml#PC10) if you have dbatools installed.


    ```

    Install-DbaFirstResponderKit -Server MyServer -Database master

    Listing 10-10

    PowerShell to install First Responder Kit

    ```


    The procedure by default looks at the data in Query Store for the last 7 days
    (by default), finds the times that consumed the most resources for each metric,
    and finds the top three queries (by default) that consumed the most resources
    for each metric. By analyzing by each time period and each metric, you can get
    a more balanced and targeted analysis of data from Query Store. For example, it
    will find the time period in the last 7 days where you did the most logical reads
    and return the top three queries doing the reads during that time period. Then
    you can dive in and try to figure out how to improve the performance for those
    queries during that time period


    By default, you can execute the procedure with just the database you want to see
    data for, and it will return the top query for each metric for the last 7 days.
    Listing [10-11](#473933_1_En_10_Chapter.xhtml#PC11) shows you the T-SQL to execute
    to see the results. Figures [10-7](#473933_1_En_10_Chapter.xhtml#Fig7) and [10-8](#473933_1_En_10_Chapter.xhtml#Fig8)
    show some of the columns that are returned when you run the stored procedure.


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig8_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    sp_BlitzQueryStore result set


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig7_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    sp_BlitzQueryStore result set


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks''

    Listing 10-11

    Execute sp_BlitzQueryStore for the top query for each metric the last 7 days

    ```


    You can click on the `query_plan_xml` column and bring up the query plan to view
    and troubleshoot. Some analysis has been done for you by giving you the `top_three_waits`,
    `missing_indexes`, and `implicit_conversion_info`. Other columns that returned
    are as follows:


    *   top_three_waits – with total ms in parentheses


    *   missing_indexes – listed from the missing index hints in the query plans


    *   implicit_conversion_info – listed from the query plan


    *   cached_execution_parameters


    *   count_executions


    *   count_compiles


    *   total_cpu_time


    *   avg_cpu_time


    *   total_duration


    *   avg_duration


    *   total_logical_io_reads


    *   avg_logical_io_reads


    *   total_physical_io_reads


    *   avg_physical_io_reads


    *   total_logical_io_writes


    *   avg_logical_io_writes


    *   total_rowcount


    *   avg_rowcount


    *   total_query_max_used_memory


    *   avg_query_max_used_memory


    *   total_tempdb_space_used


    *   avg_tempdb_space_used


    *   total_log_bytes_used


    *   avg_log_bytes_used


    *   total_num_physical_io_reads


    *   avg_num_physical_io_reads


    *   first_execution_time


    *   last_execution_time


    *   last_force_failure_reason_desc


    *   context_settings


    You can see below the results returned that there is a detailed analysis of queries
    that were executed during that time period including if it finds problems with
    your execution plans, high tempdb usage, long-running queries but low CPU, and
    then it wraps up by identifying the worst times by each metric that the system
    was performing in. See Figure [10-9](#473933_1_En_10_Chapter.xhtml#Fig9) for example
    of this output. This gives you the ability to drill down on specific poorly performing
    times or queries that are troublesome within the specified time period.


    ### Note


    Use the @TOP parameter to return more than the top one query. But use it cautiously
    as this procedure does a lot processing through the query plans. Recommendations
    are to limit to 10.


    ![../images/473933_1_En_10_Chapter/473933_1_En_10_Fig9_HTML.jpg](images/473933_1_En_10_Chapter/473933_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    sp_BlitzQueryStore time period analysis


    There are other options for running this procedure; we will go through a few important
    ones to help you to get the data you need. In Listing [10-12](#473933_1_En_10_Chapter.xhtml#PC12)
    you can specify the date range you want to return in your output by specifying
    the `@StateDate` and `@EndDate` parameters.


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @StartDate = ''20170526'', @EndDate = ''20170527''

    Listing 10-12

    Specify date range for sp_BlitzQueryStore

    ```


    If you are trying to troubleshoot a specific stored procedure, you can look for
    that stored procedure specifically. In Listing [10-13](#473933_1_En_10_Chapter.xhtml#PC13)
    you will find the code on how to return the top statement in the procedure `MyStoredProcedure`
    by specifying the `@StoredProcName` parameter.


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @Top = 1, @StoredProcName = ''MyStoredProcedure''

    Listing 10-13

    Return top statement for a specific stored procedure

    ```


    You can also use it to look at failed queries by specifying the `@Failed` parameter.
    Listing [10-14](#473933_1_En_10_Chapter.xhtml#PC14) is an example of how to return
    the top query that has failed.


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @Top = 1, @Failed = 1

    Listing 10-14

    Return top failed query

    ```


    Back in Chapter [4](#473933_1_En_4_Chapter.xhtml), we looked at the many reports
    in Grid View you could see the `plan_ids` and `query_ids`. If you are looking
    to see the `sp_BlitzQueryStore` data for a query you have identified from those
    reports, then you can use the code from Listings [10-15](#473933_1_En_10_Chapter.xhtml#PC15)
    and [10-16](#473933_1_En_10_Chapter.xhtml#PC16) to pull the data out of Query
    Store.


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @QueryIdFilter = 2958

    Listing 10-16

    Return data by query_id

    ```


    ```

    EXEC sp_BlitzQueryStore @DatabaseName = ''AdventureWorks'',

    @PlanIdFilter = 3356

    Listing 10-15

    Return data by plan_id

    ```


    Other parameters you can specify include the following in Table [10-1](#473933_1_En_10_Chapter.xhtml#Tab1).


    Table 10-1


    sp_BlitzQueryStore parameters


    | Parameter name | Data type | Default |

    | --- | --- | --- |

    | @Help | bit | 0 |

    | @MinimumExecutionCount | int | NULL |

    | @DurationFilter | decimal(38, 4) | NULL |

    | @ExportToExcel | bit | 0 |

    | @HideSummary | bit | 0 |

    | @SkipXML | bit | 0 |

    | @Debug | bit | 0 |

    | @ExpertMode | bit | 0 |

    | @Version | varchar(30) | NULL |

    | @VersionDate | datetime | NULL |

    | @VersionCheckMode | bit | 0 |


    ## Conclusion


    Community tools prove to enhance our ability to use Query Store. dbatools lets
    us configure and check the settings of Query Store across multiple databases and
    servers with ease. sp_BlitzQueryStore lets you harvest the data in Query Store
    in a different format than the reports shown in Chapter [4](#473933_1_En_4_Chapter.xhtml)
    and can be useful for finding out what your top queries are for each metric quickly
    and what your busiest periods of times are for each metric. Finally, it allows
    you to track data for a stored procedure, `query_id`, or `plan_id` that you have
    identified you want to investigate further.


