    `127.0.0.1:49194 #2 (1 connection now open)`


    Note


    Using a self-signed certificate is not recommended in a production environment
    unless it’s a trusted network because it will leave you vulnerable to man-in-the-middle
    attacks.


    You will next connect to the above mongod using the mongo shell. When you run
    mongo with a `–ssl` option, you need to either specify `–sslAllowInvalidCertificates`
    or `–sslCAFile`. Let’s use `–sslAllowInvalidCertificates`.


    Open a terminal window and enter the following:


    `C:\>` `C:\practicalmongodb\bin>mongo --ssl --sslAllowInvalidCertificates`


