    #### 8.2.1.3 索引结构：B 树


    现在我们来看看索引是如何存储的。`B 树`（BTree）结构被用于存储索引。一个`B 树`如图 8-7 所示。


    ![A332296_1_En_8_Fig7_HTML.jpg](img/A332296_1_En_8_Fig7_HTML.jpg)

    *图 8-7. B 树*


    在`B 树`的标准实现中，每当一个新的键被插入`B 树`时，默认行为如图 8-8 所示。


    ![A332296_1_En_8_Fig8_HTML.jpg](img/A332296_1_En_8_Fig8_HTML.jpg)

    *图 8-8. B 树标准实现*


    MongoDB 实现`B 树`的方式略有不同。

    在上述场景中，如果你的键是诸如`时间戳`（Timestamp）、`对象 ID`（ObjectID）或一个递增的数字，那么数据桶将总是半满的，导致大量空间浪费。


    为了克服这一点，MongoDB 对其稍作了修改。每当它识别到索引键是一个递增的键时，它不会进行 50/50 分裂，而是进行 90/10 分裂，如图 8-9
    所示。


    ![A332296_1_En_8_Fig9_HTML.jpg](img/A332296_1_En_8_Fig9_HTML.jpg)

    *图 8-9. MongoDB B 树的 90/10 分裂*


    图 8-10 展示了数据桶的结构。`B 树`的每个数据桶大小为 8KB。


    ![A332296_1_En_8_Fig10_HTML.jpg](img/A332296_1_En_8_Fig10_HTML.jpg)

    *图 8-10. B 树数据桶数据结构*


    数据桶包含以下部分：


    -   指向父节点的指针

    -   指向右子节点的指针

    -   指向键节点的指针

    -   一个键对象列表（这些对象大小不一且以无序方式存储；这些对象实际上是索引键的值）


    ##### 键节点


    键节点是固定大小的节点，并以排序方式存储。它们便于在`B 树`的不同节点之间轻松地进行分裂和移动元素。

    一个键节点包含以下内容：


    -   指向左子节点的指针

    -   索引键所属的数据记录

    -   键偏移量（键对象的偏移量，基本上告诉了该键的值存储在数据桶中的什么位置）


    ## 8.3 数据文件（与 WiredTiger 相关）


    在本节中，你将了解当使用`WiredTiger`存储引擎启动`mongod`时，数据目录的内容。

    当选择的存储选项是`WiredTiger`时，数据、日志和索引在磁盘上是压缩存储的。压缩是基于启动`mongod`时指定的压缩算法完成的。


    `Snappy`是默认的压缩选项。

    在数据目录下，有对应于每个集合和索引的单独压缩`wt`文件。日志在数据目录下有自己的文件夹。


    压缩文件实际上是在数据插入集合时创建的（文件在写入时分配，没有预分配）。

    例如，如果你创建一个名为`users`的集合，它将被存储在`collection-0—2259994602858926461`文件中，相关的索引将被存储在`index-1—2259994602858926461`、`index-2—2259994602858926461`等文件中。


    除了集合和索引的压缩文件外，还有一个`_mdb_catalog`文件，用于存储将集合和索引映射到数据目录中文件的元数据。在上面的例子中，它将存储集合`users`到`wt`文件`collection-0—2259994602858926461`的映射。参见图
    8-11。


    ![A332296_1_En_8_Fig11_HTML.jpg](img/A332296_1_En_8_Fig11_HTML.jpg)

    *图 8-11. WiredTiger 数据文件夹*


    可以为存储索引指定单独的卷。

    在指定`DBPath`时，你需要确保该目录对应于启动`mongod`时使用`–storageEngine`选项指定的存储引擎。如果`dbpath`包含由使用`–storageEngine`选项指定的存储引擎之外的其他引擎创建的文件，`mongod`将无法启动。因此，如果在`DBPath`中找到了`MMAPv1`文件，那么`WT`（WiredTiger）将无法启动。


    在内部，`WiredTiger`使用传统的`B+树`结构来存储和管理数据，但相似之处仅限于此。与`B+树`不同，它不支持就地更新。

    `WiredTiger`缓存用于对数据的任何读/写操作。缓存中的树结构针对内存访问进行了优化。


    ## 8.4 读与写


    你将简要了解读和写是如何发生的。如前所述，当 MongoDB 更新和从`DB`读取时，它实际上是在对内存进行读写。

    如果在 MongoDB `MMAPv1`存储引擎中，一个修改操作使得记录大小增长到超过为其分配的空间，那么整个记录将被移动到一个带有额外填充字节的更大空间中。默认情况下，MongoDB
    使用 2 的幂次大小分配，以便 MongoDB 中的每个文档都存储在一个包含文档本身和额外空间（填充）的记录中。填充允许文档在更新后增长，同时最小化重新分配的可能性。记录一旦被移动，原来占用的空间将被释放，并将作为不同大小的空闲列表进行跟踪。如前所述，这就是`.ns`文件中的`$freelist`命名空间。


    在`MMAPv1`存储引擎中，随着对象被删除、修改或创建，随时间推移会产生碎片，这将影响性能。应执行`compact`命令，将碎片化的数据移动到连续的空间中。


    每隔 60 秒，`RAM`中的文件会被刷新到磁盘。为了防止在断电时数据丢失，默认情况下是开启日志记录来运行的。日志的行为取决于所配置的存储引擎。

    `MMAPv1`日志文件每 100ms 刷新到磁盘一次，如果发生断电，它用于将数据库恢复到一致状态。


    在`WiredTiger`中，缓存中的数据以针对内存访问优化的`B+树`结构存储。缓存维护一个与索引关联的磁盘上页面映像，用于识别所请求的数据在页面中的实际位置（参见图
    8-12）。


    ![A332296_1_En_8_Fig12_HTML.jpg](img/A332296_1_En_8_Fig12_HTML.jpg)

    *图 8-12. WiredTiger 缓存*


    `WiredTiger`中的写操作从不进行就地更新。

    每当向`WiredTiger`发出一个操作时，它在内部会被分解成多个事务，其中每个事务都在一个内存中快照的上下文中工作。该快照是事务开始之前已提交版本的快照。写入者可以与读取者并发地创建新版本。


    写操作不更改页面；相反，更新被叠加在页面之上。使用`跳表`（skipList）数据结构来维护所有的更新，其中最新的更新位于顶部。因此，每当用户读/写数据时，索引会检查是否存在`跳表`。如果不存在`跳表`，则从磁盘上的页面映像返回数据。如果存在`跳表`，则将列表头部的数据返回给线程，然后线程更新数据。一旦执行提交，更新后的数据将被添加到列表头部，并相应地调整指针。这样，多个用户可以并发访问数据而不会发生任何冲突。只有当多个线程试图更新同一条记录时才会发生冲突。在这种情况下，一个更新成功，另一个并发更新需要重试。


    由于更新导致的树结构的任何更改，例如页面大小增加时的分裂、重定位等，稍后由后台进程进行调和。这解释了`WiredTiger`引擎快速写操作的原因；数据整理的任务留给了后台进程。参见图
    8-13。


    ![A332296_1_En_8_Fig13_HTML.jpg](img/A332296_1_En_8_Fig13_HTML.jpg)

    *图 8-13. 跳表*


    '
- fmt: '## WiredTiger and MongoDB Storage Mechanisms


    WiredTiger 使用 MVCC 方法来确保并发控制，即维护数据的多个版本。它还确保每个试图访问数据的线程都能看到最一致的数据版本。正如你所看到的，写操作不是原地进行的；相反，它们被追加到
    skipList 数据结构的顶部，最近的更新在最上面。访问数据的线程获取最新副本，并在提交前不间断地使用该副本。一旦它们提交，更新就会被追加到列表顶部，之后任何访问该数据的线程都会看到那个最新的更新。


    这使得多个线程可以并发访问相同数据，而无需任何锁定或争用。这也使得写入者能够与读者并发地创建新版本。冲突只发生在多个线程试图更新同一条记录时。在这种情况下，一个更新获胜，另一个并发更新需要重试。


    图 8-14 展示了 MVCC 的实际运作。


    ![A332296_1_En_8_Fig14_HTML.jpg](A332296_1_En_8_Fig14_HTML.jpg)


    图 8-14. 更新进行中


    `WiredTiger` 日志确保写操作在检查点之间持久化到磁盘。`WiredTiger` 默认每 60 秒或写入 2GB 数据后使用检查点将数据刷新到磁盘。因此，在默认情况下，如果未启用日志记录，`WiredTiger`
    可能会丢失最多 60 秒的写入，尽管如果使用复制来保证持久性，这种丢失的风险通常会小得多。`WiredTiger` 事务日志并非在发生不干净关机时保持数据文件处于一致状态所必需的，因此在不启用日志记录的情况下运行是安全的，尽管为了确保耐久性，应配置“副本安全”的写关注点。`WiredTiger`
    存储引擎的另一个特性是能够压缩磁盘上的日志，从而减少存储空间。


    ## 8.5 How Data Is Written Using Journaling


    在本节中，你将简要了解使用日志记录如何执行写操作。


    `MongoDB` 磁盘写入是惰性的，这意味着如果一秒钟内有 1000 次增量操作，它只会被写入一次。物理写入发生在操作之后的几秒钟。


    你现在将看到更新在 `mongod` 中实际是如何发生的。


    如你所知，在 `MongoDB` 系统中，`mongod` 是主要的守护进程。因此，磁盘上有数据文件和日志文件。见图 8-15。


    ![A332296_1_En_8_Fig15_HTML.jpg](A332296_1_En_8_Fig15_HTML.jpg)


    图 8-15. mongod


    当 `mongod` 启动时，数据文件被映射到一个共享视图。换句话说，数据文件被映射到一个虚拟地址空间。见图 8-16。


    ![A332296_1_En_8_Fig16_HTML.jpg](A332296_1_En_8_Fig16_HTML.jpg)


    图 8-16. 映射到共享视图


    基本上，操作系统识别到你的数据文件在磁盘上是 2000 字节，因此将其映射到内存地址 1,000,000 – 1,002,000。请注意，数据在访问之前不会实际加载；操作系统只是映射它并保持它。


    到目前为止，你仍然有文件在备份内存。因此，内存中的任何更改都将由操作系统刷新到底层文件。


    这是在未启用日志记录时 `mongod` 的工作方式。每 60 秒，内存中的更改会被操作系统刷新。


    在这种情况下，让我们看看启用日志记录后的写入。启用日志记录后，`mongod` 会进行第二次映射到一个私有视图。


    这就是为什么启用日志记录后，`mongod` 使用的虚拟内存量会加倍。见图 8-17。


    ![A332296_1_En_8_Fig17_HTML.jpg](A332296_1_En_8_Fig17_HTML.jpg)


    图 8-17. 映射到私有视图


    你可以在图 8-17 中看到数据文件如何不直接连接到私有视图，因此更改不会由操作系统从私有视图刷新到磁盘。


    让我们看看启动写操作时发生的事件序列。当启动写操作时，首先它写入私有视图（图 8-18）。


    ![A332296_1_En_8_Fig18_HTML.jpg](A332296_1_En_8_Fig18_HTML.jpg)


    图 8-18. 启动的写操作


    接下来，更改被写入日志文件，追加文件更改的简要描述（图 8-19）。


    ![A332296_1_En_8_Fig19_HTML.jpg](A332296_1_En_8_Fig19_HTML.jpg)


    图 8-19. 更新日志文件


    日志在收到更改时不断追加更改描述。如果此时 `mongod` 失败，即使数据文件尚未修改，日志也可以重放所有更改，从而使此时的写入安全。


    日志现在将在共享视图上重放记录的更改（图 8-20）。


    ![A332296_1_En_8_Fig20_HTML.jpg](A332296_1_En_8_Fig20_HTML.jpg)


    图 8-20. 更新共享视图


    最后，更改以非常快的速度写入磁盘。默认情况下，`mongod` 每 60 秒请求操作系统执行此操作（图 8-21）。


    ![A332296_1_En_8_Fig21_HTML.jpg](A332296_1_En_8_Fig21_HTML.jpg)


    图 8-21. 更新数据文件


    在最后一步中，`mongod` 将共享视图重新映射到私有视图。这样做是为了防止私有视图变得过于“脏”（图 8-22）。


    ![A332296_1_En_8_Fig22_HTML.jpg](A332296_1_En_8_Fig22_HTML.jpg)


    图 8-22. 重新映射


    ## 8.6 GridFS – The MongoDB File System


    你已经了解了底层机制。你看到 `MongoDB` 将数据存储在 `BSON` 文档中。`BSON` 文档有 16MB 的文档大小限制。


    `GridFS` 是 `MongoDB` 用于处理超出 `BSON` 文档大小限制的大文件的规范。本节将简要介绍 `GridFS`。


    这里的“规范”意味着它本身并不是 `MongoDB` 的一个特性，因此 `MongoDB` 中没有实现它的代码。它只是规定了应如何处理大文件。`PHP`、`Python`
    等语言驱动程序实现了这个规范，并向该驱动程序的用户公开一个 `API`，使他们能够在 `MongoDB` 中存储/检索大文件。'
  raw: 'WiredTiger uses the MVCC approach to ensure concurrency control wherein multiple
    versions of the data are maintained. It also ensures that every thread that is
    trying to access the data sees the most consistent version of the data. As you
    have seen, the writes are not in place; instead they are appended on top of the
    data in a skipList data structure with the most recent update on the top. Threads
    accessing the data get the latest copy, and they continue to work with that copy
    uninterrupted until the time they commit. Once they commit, the update is appended
    at the top of the list and thereafter any thread accessing the data will see that
    latest update.


    This enables multiple threads to access the same data concurrently without any
    locking or contention. This also enables the writers to create new versions concurrently
    with the readers. The conflict occurs only when multiple threads are trying to
    update the same record. In that case, one update wins and the other concurrent
    update needs to retry.


    Figure [8-14](#A332296_1_En_8_Chapter.html#Fig14) depicts the MVCC in action .


    ![A332296_1_En_8_Fig14_HTML.jpg](A332296_1_En_8_Fig14_HTML.jpg)


    Figure 8-14.


    Update in action


    The WiredTiger journal ensures that writes are persisted to disk between checkpoints.
    WiredTiger uses checkpoints to flush data to disk by default every 60 seconds
    or after 2GB of data has been written. Thus, by default, WiredTiger can lose up
    to 60 seconds of writes if running without journaling, although the risk of this
    loss will typically be much less if using replication for durability. The WiredTiger
    transaction log is not necessary to keep the data files in a consistent state
    in the event of an unclean shutdown, and so it is safe to run without journaling
    enabled, although to ensure durability the “replica safe” write concern should
    be configured. Another feature of the WiredTiger storage engine is the ability
    to compress the journal on disk, thereby reducing storage space.


    ## 8.5 How Data Is Written Using Journaling


    In this section you will briefly look at how write operations are performed using
    journaling.


    MongoDB disk writes are lazy, which means if there are 1,000 increments in one
    second, it will only be written once. The physical writes occurs a few seconds
    after the operation.


    You will now see how an update actually happens in mongod.


    As you know, in the MongoDB system, mongod is the primary daemon process. So the
    disk has the data files and the journal files . See Figure [8-15](#A332296_1_En_8_Chapter.html#Fig15).


    ![A332296_1_En_8_Fig15_HTML.jpg](A332296_1_En_8_Fig15_HTML.jpg)


    Figure 8-15.


    mongod


    When the mongod is started, the data files are mapped to a shared view. In other
    words, the data file is mapped to a virtual address space. See Figure [8-16](#A332296_1_En_8_Chapter.html#Fig16).


    ![A332296_1_En_8_Fig16_HTML.jpg](A332296_1_En_8_Fig16_HTML.jpg)


    Figure 8-16.


    maps to shared view


    Basically, the OS recognizes that your data file is 2000 bytes on disk, so it
    maps this to memory address 1,000,000 – 1,002,000\. Note that the data will not
    be actually loaded until accessed; the OS just maps it and keeps it.


    Until now you still had files backing up the memory. Thus any change in memory
    will be flushed to the underlying files by the OS.


    This is how the mongod works when journaling is not enabled. Every 60 seconds
    the in-memory changes are flushed by the OS.


    In this scenario, let’s look at writes with journaling enabled. When journaling
    is enabled, a second mapping is made to a private view by the mongod.


    That’s why the virtual memory amount used by mongod doubles when the journaling
    is enabled. See Figure [8-17](#A332296_1_En_8_Chapter.html#Fig17).


    ![A332296_1_En_8_Fig17_HTML.jpg](A332296_1_En_8_Fig17_HTML.jpg)


    Figure 8-17.


    maps to private view


    You can see in Figure [8-17](#A332296_1_En_8_Chapter.html#Fig17) how the data
    file is not directly connected to the private view, so the changes will not be
    flushed from the private view to the disk by the OS.


    Let’s see what sequence of events happens when a write operation is initiated.
    When a write operation is initiated it, first it writes to the private view (Figure
    [8-18](#A332296_1_En_8_Chapter.html#Fig18)).


    ![A332296_1_En_8_Fig18_HTML.jpg](A332296_1_En_8_Fig18_HTML.jpg)


    Figure 8-18.


    Initiated write operation


    Next, the changes are written to the journal file, appending a brief description
    of what’s changed in the files (Figure [8-19](#A332296_1_En_8_Chapter.html#Fig19)).


    ![A332296_1_En_8_Fig19_HTML.jpg](A332296_1_En_8_Fig19_HTML.jpg)


    Figure 8-19.


    Updating the journal file


    The journal keeps appending the change description as and when it gets the change.
    If the mongod fails at this point, the journal can replay all the changes even
    if the data file is not yet modified, making the write safe at this point.


    The journal will now replay the logged changes on the shared view (Figure [8-20](#A332296_1_En_8_Chapter.html#Fig20)).


    ![A332296_1_En_8_Fig20_HTML.jpg](A332296_1_En_8_Fig20_HTML.jpg)


    Figure 8-20.


    Updating the shared view


    Finally, with a very fast speed the changes are written to the disk. By default,
    the OS is requested to do this every 60 seconds by the mongod (Figure [8-21](#A332296_1_En_8_Chapter.html#Fig21)).


    ![A332296_1_En_8_Fig21_HTML.jpg](A332296_1_En_8_Fig21_HTML.jpg)


    Figure 8-21.


    Updating the data file


    In the last step, the shared view is remapped to the private view by the mongod.
    This is done to prevent the private view from getting too dirty (Figure [8-22](#A332296_1_En_8_Chapter.html#Fig22)).


    ![A332296_1_En_8_Fig22_HTML.jpg](A332296_1_En_8_Fig22_HTML.jpg)


    Figure 8-22.


    Remapping


    ## 8.6 GridFS – The MongoDB File System


    You looked at what happens under the hood. You saw that MongoDB stores data in
    BSON documents. BSON documents have a document size limit of 16MB.


    GridFS is MongoDB’s specification for handling large files that exceed BSON’s
    document size limit. This section will briefly cover GridFS.


    Here “specification” means that it is not a MongoDB feature by itself, so there
    is no code in MongoDB that implements it. It just specifies how large files need
    to be handled. The language drivers such as PHP, Python, etc. implement this specification
    and expose an API to the user of that driver, enabling them to store/retrieve
    large files in MongoDB.'
