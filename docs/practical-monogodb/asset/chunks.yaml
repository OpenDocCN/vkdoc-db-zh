  trans: '# 1. 大数据


    > “大数据是一个用于描述具有巨大体量、以多样结构产生且生成速度极快的数据的术语。这类数据对传统用于存储和处理数据的 `RDBMS` 系统构成了挑战。大数据正在为处理和存储数据的新方法铺平道路。”


    在本章中，我们将讨论大数据的基础知识、来源和挑战。我们将向你介绍大数据的三个 V（体量、速度、多样性），以及传统技术在处理大数据时面临的限制。


    ## 1.1 入门介绍


    大数据，连同云计算、社交网络、分析和移动性，是当今信息技术领域的热门词汇。互联网和面向大众的电子设备的可用性每天都在增加。具体而言，智能手机、社交网站以及其他生成数据的设备（如平板电脑和传感器）正在引发数据的爆炸式增长。数据从各种来源以多种格式生成，例如视频、文本、语音、日志文件和图像。高清（`HD`）视频的一秒钟产生的数据量是一整页文本的
    2000 倍。


    考虑以下 Facebook 公司网站上报告的统计数据：


    2015 年 6 月的日均活跃用户数为 9.68 亿。2015 年 6 月的移动日均活跃用户数为 8.44 亿。

    截至 2015 年 6 月 30 日，月活跃用户数为 14.9 亿。移动月活跃用户数为 13.1 亿。

    截至 2013 年 5 月，每日产生的“赞”数量为 45 亿，比 2012 年 8 月增长了 67%。


    图 1-1 描绘了 Twitter 的统计数据。


    ![A332296_1_En_1_Fig1_HTML.jpg](img/A332296_1_En_1_Fig1_HTML.jpg)


    **图 1-1.** 如果你打印出 Twitter……


    这是另一个例子：考虑像看电影这样一个简单事件可能产生的数据量。你从在电影评论网站上搜索电影开始，阅读关于该电影的评论，并发布问题。你可能会在 Twitter
    上发推文或在 Facebook 上发布去看电影的照片。在前往影院的途中，你的 `GPS` 系统会追踪你的路线并生成数据。


    你明白了吧：智能手机、社交网站和其他媒体正在为企业制造数据洪流，以供其处理和存储。当数据规模对典型软件工具捕获、处理、存储和管理数据的能力构成挑战时，我们手上就有了大数据。图
    1-2 以图形方式定义了大数据。


    ![A332296_1_En_1_Fig2_HTML.jpg](img/A332296_1_En_1_Fig2_HTML.jpg)


    **图 1-2.** 大数据的定义


    ## 1.2 大数据


    大数据是指具有高体量、高速生成且种类繁多的数据。让我们看一些关于大数据的事实和数字。


    ### 1.2.1 关于大数据的事实


    世界各地的各种研究团队对正在生成的数据量进行了分析。例如，`IDC` 的分析显示，单一年份（2007 年）产生的数字数据量大于全球的总存储容量，这意味着无法存储所有正在生成的数据。此外，数据生成的速度将很快超过数据存储容量扩张的速度。


    以下部分涵盖了 `MGI`（麦肯锡全球研究院）于 2011 年 5 月发布的报告（`www.mckinsey.com/insights/business_technology/big_data_the_next_frontier_for_innovation`）中的见解。该研究指出，大数据的商业和经济可能性及其更广泛的影响是企业领导者和政策制定者必须应对的重要问题。


    #### 1.2.1.1 大数据规模因行业而异


    大数据的增长是每个行业都观察到的现象。`MGI` 估计，2010 年全球企业使用了超过 7 艾字节的增量磁盘驱动器数据存储容量；有趣的是，其中近 80%似乎是在其他地方存储的数据的副本。`MGI`
    还估计，到 2009 年，美国经济中几乎所有行业每家公司的平均存储数据至少达到 200 太字节，而许多行业的平均存储数据超过 1 拍字节。


    一些行业的数据密集度远高于其他行业；在这里，数据密集度指的是该行业公司/企业间积累的平均数据量，意味着它们有更多潜力从大数据中获取价值。


    金融服务行业，包括银行、投资和证券服务，高度以交易为导向；法规也要求它们存储数据。分析显示，它们平均每个公司存储的数字数据最多。


    通信和媒体公司、公用事业公司以及政府机构或组织也存储了大量数字数据，这似乎反映了这些实体具有高业务量和多媒体数据的事实。


    离散型和流程型制造业的字节存储总量最高。然而，这些行业在数据密集度方面的排名要低得多，因为它们分散在大量公司中。


    #### 1.2.1.2 大数据类型因行业而异


    `MGI` 的研究还显示，存储的数据类型也因行业而异。例如，零售和批发、政府行政部分以及金融服务都产生了大量的文本和数字数据，包括客户数据、交易信息以及数学建模和仿真。制造业、医疗保健、媒体和通信等行业负责更高比例的多媒体数据。在医疗保健领域，以
    X 光、CT 和其他扫描形式存在的图像数据主导了数据存储量。


    就大数据的地理分布而言，目前北美和欧洲占全球总量的 70%。得益于云计算，在一个地区生成的数据可以存储在另一个国家的数据中心。因此，拥有重要云服务和托管服务提供商的国家往往拥有较高的数据存储量。'
- fmt: '## 1.3 Big Data Sources


    In this section, we will cover the major factors that are contributing to the
    ever increasing size of data. Figure [1-3](#A332296_1_En_1_Chapter.html#Fig3)
    depicts the major contributing sources.


    ![A332296_1_En_1_Fig3_HTML.jpg](A332296_1_En_1_Fig3_HTML.jpg)

    *Figure 1-3. Sources of data*


    As highlighted in the MGI report, the major sources of this data are


    *   Enterprises, which are collecting data with more granularities now, attaching
    more details with every transaction in order to understand consumer behavior.

    *   Increase in multimedia usage across industries such as health care, product
    companies, etc.

    *   Increased popularity of social media sites such as Facebook, Twitter, etc.

    *   Rapid adoption of smartphones, which enable users to actively use social media
    sites and other Internet applications.

    *   Increased usage of sensors and devices in the day-to-day world, which are
    connected by networks to computing resources.


    The MGI report also projects that the number of machine-to-machine devices such
    as sensors (which are also referred as the Internet of Things, or IoT) will grow
    at a rate exceeding 30 percent annually over the next five years.


    Thus, the rate of growth of data is increasing and so is the diversity. Also,
    the model of data generation has changed from few companies generating data and
    others consuming it to everyone generating data and everyone consuming it. This
    is due to the penetration of consumer IT and internet technologies along with
    trends like social media. Figure [1-4](#A332296_1_En_1_Chapter.html#Fig4) depicts
    the change in the data generation model.


    ![A332296_1_En_1_Fig4_HTML.jpg](A332296_1_En_1_Fig4_HTML.jpg)

    *Figure 1-4. Data model*


    ## 1.4 Three Vs of Big Data


    We have defined big data as data with three Vs:volume , velocity, and variety,
    as shown in Figure [1-5](#A332296_1_En_1_Chapter.html#Fig5). Let’s look at the
    three Vs. It is imperative that organizations and IT leaders focus on these aspects.


    ![A332296_1_En_1_Fig5_HTML.gif](A332296_1_En_1_Fig5_HTML.gif)

    *Figure 1-5. The three Vs of big data. The “big” isn’t just the volume*


    ### 1.4.1 Volume


    Volume in big data means the size of the data. As discussed in the previous sections,
    various factors contribute to the size of big data: as businesses are becoming
    more transaction-oriented, we see ever increasing numbers of transactions; more
    devices are getting connected to the Internet, which is adding to the volume;
    there is an increased usage of the Internet; and there is an increase in the digitization
    of content. Figure [1-6](#A332296_1_En_1_Chapter.html#Fig6) depicts the growth
    in digital universe since 2009.


    ![A332296_1_En_1_Fig6_HTML.jpg](A332296_1_En_1_Fig6_HTML.jpg)

    *Figure 1-6. Digital universe size*


    In today’s scenario, data is not just generated from within the enterprise; it’s
    also generated based on transactions with the extended enterprise and customers.
    This requires extensive maintenance of customer data by the enterprises. A petabyte
    scale is becoming commonplace these days. Figure [1-7](#A332296_1_En_1_Chapter.html#Fig7)
    depicts the data growth rate.


    ![A332296_1_En_1_Fig7_HTML.jpg](A332296_1_En_1_Fig7_HTML.jpg)

    *Figure 1-7. Growth rate*


    This huge volume of data is the biggest challenge for big data technologies. The
    storage and processing power needed to store, process, and make accessible the
    data in a timely and cost effective manner is massive.


    ### 1.4.2 Variety


    The data generated from various devices and sources follows no fixed format or
    structure. Compared to text, CSV or RDBMS data varies from text files, log files,
    streaming videos, photos, meter readings, stock ticker data, PDFs, audio, and
    various other unstructured formats.


    There is no control over the structure of the data these days. New sources and
    structures of data are being created at a rapid pace. So the onus is on technology
    to find a solution to analyze and visualize the huge variety of data that is out
    there. As an example, to provide alternate routes for commuters, a traffic analysis
    application needs data feeds from millions of smartphones and sensors to provide
    accurate analytics on traffic conditions and alternate routes.


    ### 1.4.3 Velocity


    Velocity in big data is the speed at which data is created and the speed at which
    it is required to be processed. If data cannot be processed at the required speed,
    it loses its significance. Due to data streaming in from social media sites, sensors,
    tickers, metering, and monitoring, it is important for the organizations to speedily
    process data both when it is on move and when it is static (see Figure [1-8](#A332296_1_En_1_Chapter.html#Fig8)).
    Reacting and processing quickly enough to deal with the velocity of data is one
    more challenge for big data technology.


    ![A332296_1_En_1_Fig8_HTML.jpg](A332296_1_En_1_Fig8_HTML.jpg)

    *Figure 1-8. The three aspects of data*


    Real-time insight is essential in many big data use cases. For example, an algorithmic
    trading system takes real-time feeds from the market and social media sites like
    Twitter to make decisions on stock trading. Any delay in processing this data
    can mean millions of dollars in lost opportunities on a stock trade.


    There is a fourth V that is talked about whenever big data is discussed. The fourth
    V is veracity, which means not all the data out there is important, so it’s essential
    to identify what will provide meaningful insight, and what should be ignored.


    ## 1.5 Usage of Big Data


    This section will focus on ways of using big data for creating value for organizations.
    Before we delve into how big data can be made usable to the organizations, let’s
    first look at why big data is important.


    Big data is a completely new source of data; it’s data that is generated when
    you post on a blog, like a product, or travel. Previously, such minutely available
    information was not captured. Now it is and organizations that embrace such data
    can pursue innovations, improve their agility, and increase their profitability.


    Big data can create value for any organization in a variety of ways. As listed
    in the MGI report, this can be broadly categorized into five ways of usage of
    big data.


    ### 1.5.1 Visibility


    Accessibility to data in a timely fashion to relevant stakeholders generates a
    tremendous amount of value. Let’s understand this with an example. Consider a
    manufacturing company that has R&D, engineering, and manufacturing departments
    dispersed geographically. If the data is accessible across all these departments
    and can be readily integrated, it can not only reduce the search and processing
    time but will also help in improving the product quality according to the present
    needs.


    ### 1.5.2 Discover and Analyze Information


    Most of the value of big data comes from when the data collected from outside
    sources can be merged with the organization’s internal data. Organizations are
    capturing detailed data on inventories, employees, and customers. Using all of
    this data, they can discover and analyze new information and patterns; as a result,
    this information and knowledge can be used to improve processes and performance.


    ### 1.5.3 Segmentation and Customizations


    Big data enables organizations to create tailor-made products and services to
    meet specific segment needs. This can also be used in the social sector to accurately
    segment populations and target benefit schemes for specific needs. Segmentation
    of customers based on various parameters can aid in targeted marketing campaigns
    and tailoring of products to suit the needs of customers.


    ### 1.5.4 Aiding Decision Making


    Big data can substantially minimize risks, improve decision making , and uncover
    valuable insights. Automated fraud alert systems in credit card processing and
    automatic fine-tuning of inventory are examples of systems that aid or automate
    decision-making based on big data analytics.'
