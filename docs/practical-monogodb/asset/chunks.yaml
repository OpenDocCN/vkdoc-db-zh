    { "shard" : "shard0002" }

    mongos> db.chunks.find({ns:"movies.comedy"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

