    \ 命令、内存、迁移\n    *   监控与分析、`moveChunk` 命令、操作\n    *   主分片、`printShardingStatus()`\
    \ 命令\n    *   基于范围的分区、移除集群场景\n    *   服务器、`serverStatus` 命令、设置集群\n    *   `ShardedEnvironment`、分片键、单一逻辑数据库\n\
    \    *   基于标签的分片（参见`基于标签的分片`）\n    *   终端窗口、`testcollection.count` 命令\n*   基于标签的分片\n\
    \    *   块分布、集合分布、多重标签\n    *   先决条件、通过标签扩展、标签化\n\n## 部署与管理\n\n### 部署\n*   部署策略\n\
