    `Age` fields will be more beneficial than an index that is created on either of
    the fields because the compound index will cover both queries.


    The following command creates a compound index on fields `Name` and `Age` of the
    collection `testindx`.


    `> db.testindx.ensureIndex({"Name":1, "Age": 1})`


    Compound indexes help MongoDB execute queries with multiple clauses more efficiently.
    When creating a compound index, it is also very important to keep in mind that
    the fields that will be used for exact matches (e.g. `Name` : `"S1"` ) come first,
    followed by fields that are used in ranges (e.g. `Age` : `{"$gt":20}`).


    Hence the above index will be beneficial for the following query:


    `>db.testindx.find({"Name": "user5","Age":{"$gt":25}}).explain("allPlansExecution")`


