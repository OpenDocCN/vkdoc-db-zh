    memory, I/O bandwidth, and disk capacity was still available in the host system.
    Greater system utilization enabled by fine-grained concurrency reduces this overhead,
    eliminating unnecessary cost and management load.


    This storage engine provides control to you per collection per index level to
    decide on what to compress and what not to compress.


    The WiredTiger storage engine is only available with 64-bit MongoDB.


    WiredTiger manages data through its cache. The WiredTiger storage engine gives
    more control of memory by allowing you to configure how much RAM to allocate to
    the WiredTiger cache, defaulting to either 1GB or 50% of available memory, whichever
    is larger.


    You will next briefly look at how the data is stored on the disk.'
  trans: '# 8. MongoDB 详解


    > “《MongoDB 详解》涵盖了 MongoDB 内部工作机制的深入概念。”


    在本章中，你将学习数据如何在 MongoDB 中存储，以及写入操作如何通过日志机制发生。最后，你将了解 GridFS 以及 MongoDB 中可用的不同类型的索引。


    ## 8.1 数据存储引擎


    在上一章中，你了解了作为 MongoDB 一部分部署的核心服务；你也了解了副本集和分片。在本节中，我们将讨论数据存储引擎。


    ### MMAP


    MongoDB 默认使用 MMAP 作为其存储引擎。该引擎与内存映射文件协同工作。内存映射文件是操作系统使用`mmap()`系统调用放置在内存中的数据文件。`mmap`是操作系统的一项功能，可将磁盘上的文件映射到虚拟内存。


    虚拟内存不等同于物理内存。虚拟内存是计算机硬盘上与物理 RAM 结合使用的空间。


    MongoDB 使用内存映射文件进行任何数据交互或数据管理活动。当访问文档时，数据文件会被内存映射到内存中。MongoDB 允许操作系统控制内存映射并分配最大量的
    RAM。这样做可以最大限度地减少 MongoDB 层面的工作和编码。缓存基于 LRU（最近最少使用）行为完成，其中最近最少使用的文件会从工作集移出到磁盘，为新的、最近和频繁使用的页面腾出空间。


    然而，这种方法有其自身的缺点。例如，MongoDB 无法控制将哪些数据保留在内存中，哪些数据移除。因此，每次服务器重启都会导致缺页中断，因为每次访问的页面在工作集中都不可用，从而导致数据检索时间较长。


    MongoDB 也无法控制优先处理内存中的内容。在紧急情况下，它可以指定哪些内容需要保留在缓存中，哪些可以被移除。例如，如果对一个未建立索引的大集合执行读取操作，可能会导致将整个集合加载到内存中，这可能导致其他集合的重要索引等内容被从
    RAM 中清除。这种控制缺失也可能导致当任何 MongoDB 外部进程试图访问大部分内存时，分配给 MongoDB 的缓存缩小；这最终将导致 MongoDB
    响应变慢。


    ### 可插拔存储引擎 API


    随着 3.0 版本的发布，MongoDB 附带了可插拔存储引擎 API，使你能够根据工作负载、应用程序需求和可用基础设施在存储引擎之间进行选择。


    可插拔存储引擎层的愿景是拥有一个数据模型、一种查询语言和一组运维关注点，但底层却有许多针对不同用例优化的存储引擎选项，如图 8-1 所示。


    ![A332296_1_En_8_Fig1_HTML.jpg](img/A332296_1_En_8_Fig1_HTML.jpg)


    **图 8-1.** 可插拔存储引擎 API


    可插拔存储引擎功能在部署方面也提供了灵活性，多种类型的存储引擎可以在同一部署中共存。


    MongoDB 3.0 版本附带两个存储引擎。


    默认的`MMAPv1`是先前版本中使用的 MMAP 引擎的改进版本。更新后的 MongoDB `MMAPv1`存储引擎实现了集合级别的并发控制。该存储引擎擅长处理高容量读取、插入和就地更新的工作负载。


    ### WiredTiger


    新的`WiredTiger`存储引擎由 Berkeley DB 的架构师开发，后者是世界上部署最广泛的嵌入式数据管理软件。`WiredTiger`在现代多
    CPU 架构上具有良好的扩展性。它的设计旨在利用具有多核 CPU 和更多 RAM 的现代硬件。


    `WiredTiger`以压缩格式在磁盘上存储数据。根据所使用的压缩算法，压缩可以将数据大小减少高达 70%（仅磁盘），索引大小减少高达 50%（磁盘和内存两者）。除了减少存储空间外，压缩还通过从磁盘读取更少的位来实现更高的
    I/O 可扩展性。它在提高硬件利用率、降低存储成本和提供更可预测的性能方面具有显著优势。


    ### 压缩算法


    可选择使用以下压缩算法：


    *   `Snappy`是默认算法，用于文档和日志。它以较低的 CPU 开销提供良好的压缩比。根据数据类型，压缩比大约在 70%左右。

    *   `zlib`提供极佳的压缩比，但代价是额外的 CPU 开销。

    *   前缀压缩是索引默认使用的算法，可将索引存储的内存占用减少约 50%（取决于工作负载），并为频繁访问的文档释放更多工作集空间。


    管理员可以修改所有集合和索引的默认压缩设置。在创建集合和索引时，也可以按每个集合和每个索引配置压缩。


    `WiredTiger`还提供细粒度的文档级并发。写入操作不再被其他写入操作阻塞，除非它们访问的是同一个文档。因此，它支持读写器对集合中文档的并发访问。客户端可以在写入操作进行时读取文档，并且多个线程可以同时修改集合中的不同文档。因此，它擅长处理写入密集型工作负载（写入性能提升
    7-10 倍）。


    更高的并发性也推动了基础设施的简化。应用程序可以充分利用可用的服务器资源，简化了满足性能 SLA 所需的架构。使用先前 MongoDB 代的较粗粒度数据库级锁定时，用户通常必须实施分片才能扩展因单个数据库写入锁而停滞的工作负载，即使主机系统中仍有足够的内存、I/O
    带宽和磁盘容量。细粒度并发实现的更高系统利用率减少了这种开销，消除了不必要的成本和管理负担。


    该存储引擎让你可以在每个集合、每个索引级别决定压缩什么、不压缩什么。


    `WiredTiger`存储引擎仅适用于 64 位 MongoDB。


    `WiredTiger`通过其缓存管理数据。`WiredTiger`存储引擎通过允许你配置为`WiredTiger`缓存分配多少 RAM 来提供对内存的更多控制，默认为
    1GB 或可用内存的 50%，以较大者为准。


    接下来，你将简要了解数据如何在磁盘上存储。'
- fmt: '## 8.2 Data File (Relevant for MMAPv1)


    首先，让我们检查数据文件。正如你所见，在核心服务下，`mongod`使用的默认数据目录是`/data/db/`。


    在此目录下，每个数据库都有独立的文件。每个数据库有一个`.ns`文件和多个具有单调递增数字扩展名的数据文件。


    例如，如果你创建一个名为`mydbpoc`的数据库，它将存储在以下文件中：`mydb.ns`、`mydb.1`、`mydb.2`等，如图[8-2](#A332296_1_En_8_Chapter.html#Fig2)所示。


    ![A332296_1_En_8_Fig2_HTML.jpg](A332296_1_En_8_Fig2_HTML.jpg)


    Figure 8-2. 数据文件


    对于数据库的每个新数字数据文件，其大小将是前一个数字数据文件大小的两倍。文件大小的上限为2GB。如果文件大小达到2GB，所有后续的数字文件将保持2GB大小。这是设计如此。这种行为确保了小型数据库不会在磁盘上浪费太多空间，并且大型数据库大部分保持在磁盘上的连续区域中。


    请注意，为了确保一致的性能，MongoDB会预分配数据文件。预分配在后台进行，并且每次数据文件被填满时启动。这意味着MongoDB服务器总是试图为每个数据库保留一个额外的空数据文件，以避免在文件分配时被阻塞。


    如果磁盘上存在多个小型数据库，使用`storage.mmapv1.smallFiles`选项将减小这些文件的大小。


    接下来，你将看到数据实际上是如何在底层存储的。双向链表是用于存储数据的关键数据结构。


    ### 8.2.1 Namespace (.ns File)


    在数据文件中，数据空间被划分为命名空间，其中命名空间可以对应一个集合或一个索引。


    这些命名空间的元数据存储在`.ns`文件中。如果你检查数据目录，你会找到一个名为`[dbname].ns`的文件。


    用于存储元数据的`.ns`文件大小为16MB。这个文件可以被视为一个大的哈希表，它被划分为大约1KB大小的小存储桶。


    每个存储桶存储特定于命名空间的元数据（图[8-3](#A332296_1_En_8_Chapter.html#Fig3)）。


    ![A332296_1_En_8_Fig3_HTML.jpg](A332296_1_En_8_Fig3_HTML.jpg)


    Figure 8-3. 命名空间数据结构


    #### 8.2.1.1 Collection Namespace


    如图[8-4](#A332296_1_En_8_Chapter.html#Fig4)所示，集合命名空间存储桶包含元数据，例如：


    ![A332296_1_En_8_Fig4_HTML.jpg](A332296_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. 集合命名空间详情


    - 集合的名称

    - 关于集合的一些统计信息，如计数、大小等。（这就是为什么每当对集合发出计数时，它都能快速响应。）

    - 索引详细信息，因此它可以维护到每个已创建索引的链接

    - 一个删除列表

    - 一个存储范围详情的双向链表（它存储指向第一个和最后一个范围的指针）


    ##### Extent


    Extent指的是数据文件中的一组数据记录，因此一组extent构成了命名空间的完整数据。一个extent使用磁盘位置来引用数据实际驻留的磁盘位置。它由两部分组成：文件号和偏移量。


    文件号指定它指向的数据文件（0、1等）。


    偏移量是文件中的位置（你需要深入文件多远来查找数据）。偏移量大小为4KB。因此，偏移量的最大值可达2^(31)-1，这是数据文件可以增长到的最大文件大小（2048MB或2GB）。


    如图[8-5](#A332296_1_En_8_Chapter.html#Fig5)所示，一个extent数据结构由以下部分组成：


    ![A332296_1_En_8_Fig5_HTML.jpg](A332296_1_En_8_Fig5_HTML.jpg)


    Figure 8-5. Extent


    - 磁盘上的位置，即它指向的文件号。

    - 由于extent作为双向链表元素存储，它有一个指针指向前一个和下一个extent。

    - 一旦有了它所引用的文件号，该文件内它指向的数据记录组进一步存储为双向链表。因此，它维护一个指针指向它指向的数据块的第一条数据记录和最后一条数据记录，这些记录不过是文件内的偏移量（数据存储在文件中的深度）。


    ##### Data Record


    接下来你将查看数据记录结构。该数据结构包含以下详情：


    - 由于数据记录结构是extent双向链表的一个元素，它存储前一个和后一个记录的信息。

    - 它有带头部的长度。

    - 数据块。


    数据块可以有一个BTree Bucket（如果是索引命名空间）或一个BSON对象。你稍后将研究BTree结构。


    BSON对象对应于集合的实际数据。BSON对象的大小不必与数据块相同。默认使用2次幂大小分配，以便每个文档都存储在一个包含文档和额外空间或填充的空间中。这个设计决策有助于避免当更新导致对象大小变化时，对象从一个块移动到另一个块。


    MongoDB支持多种分配策略，这些策略决定了如何为文档添加填充（图[8-6](#A332296_1_En_8_Chapter.html#Fig6)）。由于原地更新比重新定位更高效，所有填充策略都用额外的空间换取更高的效率和更少的碎片。不同的策略支持不同的工作负载。例如，完全匹配分配对于具有仅插入工作负载且大小固定且从不变化的集合是理想的，而2次幂分配对于插入/更新/删除工作负载是高效的。


    ![A332296_1_En_8_Fig6_HTML.jpg](A332296_1_En_8_Fig6_HTML.jpg)


    Figure 8-6. 记录数据结构


    ##### Deleted List


    删除列表存储已删除或移动的extent的详细信息（当更新导致大小变化，数据无法在分配的空间中容纳时发生移动）。


    记录的大小决定了空闲extent需要放置在哪个存储桶中。基本上，这些是分桶的单链表。当需要一个新的extent来容纳命名空间的数据时，它会首先搜索空闲列表以检查是否有任何合适大小的extent可用。


    ##### 总结


    因此，你可以假设数据文件（具有数字扩展名的文件）被划分为不同的集合命名空间，其中命名空间的extent指定了从属于该集合的数据文件中的数据范围。


    理解了数据是如何存储的，现在让我们看看`db.users.find()`是如何工作的。


    它将首先检查`mydbpoc.ns`文件以访问`users`命名空间，并找出它指向的第一个extent。它将跟随第一个extent链接到第一条记录，然后跟随下一条记录指针，它将读取第一个extent的数据记录，直到达到最后一条记录。然后它将跟随下一个extent指针以类似的方式读取其数据记录。遵循这个模式，直到读取最后一个extent的数据记录。


    #### 8.2.1.2 $freelist


    `.ns`文件有一个名为`$freelist`的特殊命名空间，用于extent。`$freelist`跟踪不再使用的extent，例如已删除的索引或集合的extent。'
  raw: '## 8.2 Data File (Relevant for MMAPv1)


    First, let’s examine the data file. As you have seen, under the core services
    the default data directory used by mongod is `/data/db/`.


    Under this directory there are separate files for every database. Each database
    has a single `.ns` file and multiple data files with monotonically increasing
    numeric extensions.


    For example, if you create a database called `mydbpoc`, it will be stored in the
    following files: `mydb.ns`, `mydb.1`, `mydb.2`, and so on, as shown in Figure
    [8-2](#A332296_1_En_8_Chapter.html#Fig2).


    ![A332296_1_En_8_Fig2_HTML.jpg](A332296_1_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    Data files


    For each new numeric data file for a database, the size will be double the size
    of the previous number data file. The limit of the file size is 2GB. If the file
    size has reached 2GB, all subsequent numbered files will remain 2GB in size. This
    behavior is by design. This behavior ensures that small databases do not waste
    too much space on disk, and large databases are mostly kept in contiguous regions
    on the disk.


    Note that in order to ensure consistent performance, MongoDB preallocates data
    files. The preallocation happens in the background and is initiated every time
    a data file is filled. This means that the MongoDB server always attempts to keep
    an extra, empty data file for every database in order to avoid blocking on file
    allocation.


    If multiple small databases exist on disk, using the `storage.mmapv1.smallFiles`
    option will reduce the size of these files.


    Next, you will see how the data is actually stored under the hood. Doubly linked
    lists are the key data structure used for storing the data.


    ### 8.2.1 Namespace (.ns File)


    Within the data files you have data space divided into namespaces , where the
    namespace can correspond to either a collection or an index.


    The metadata of these namespaces are stored in the `.ns` file. If you check your
    data directory, you will find a file named `[dbname].ns`.


    The size of the `.ns` file that is used for storing the metadata is 16MB. This
    file can be thought of as a big hash table that is partitioned into small buckets,
    which are approximately 1KB in size.


    Each bucket stores metadata specific to a namespace (Figure [8-3](#A332296_1_En_8_Chapter.html#Fig3)).


    ![A332296_1_En_8_Fig3_HTML.jpg](A332296_1_En_8_Fig3_HTML.jpg)


    Figure 8-3.


    Namespace data structure


    #### 8.2.1.1 Collection Namespace


    As shown in Figure [8-4](#A332296_1_En_8_Chapter.html#Fig4), the collection namespace
    bucket contains metadata such as


    ![A332296_1_En_8_Fig4_HTML.jpg](A332296_1_En_8_Fig4_HTML.jpg)


    Figure 8-4.


    Collection namespace details


    *   Name of the collection

    *   A few statistics on the collection such as count, size, etc. (This is why
    whenever a count is issued against the collection it returns quick response.)

    *   Index details, so it can maintain links to each index created

    *   A deleted list

    *   A doubly linked list storing the extent details (it stores pointer to the
    first and the last extent)


    ##### Extent


    Extent refers to a group of data records within a data file, so a group of extents
    forms the complete data for a namespace. An extent uses disk locations to refer
    to the location on the disk where the data is actually residing. It consists of
    two parts: file number and offset.


    The file number specifies the data file it’s pointing to (0, 1, etc.).


    Offset is the position within the file (how deep within the file you need to look
    for the data). The offset size is 4KB. Hence the offset’s maximum value can be
    up to 2^(31)-1, which is the maximum file size the data files can grow to (2048MB
    or 2 GB).


    As shown in Figure [8-5](#A332296_1_En_8_Chapter.html#Fig5), an extent data structure
    consists of the following things:


    ![A332296_1_En_8_Fig5_HTML.jpg](A332296_1_En_8_Fig5_HTML.jpg)


    Figure 8-5.


    Extent


    *   Location on the disk, which is the file number it is pointing to.

    *   Since an extent is stored as a doubly linked list element, it has a pointer
    to the next and the previous extent.

    *   Once it has the file number it’s referring to, the group of the data records
    within the file it’s pointing to are further stored as doubly linked list. Hence
    it maintains a pointer to the first data record and the last data record of the
    data block it’s pointing to, which are nothing but the offsets within the file
    (how deep within the file the data is stored).


    ##### Data Record


    Next you will look at the data record structure . The data structure consists
    of the following details:


    *   Since the data record structure is an element of the extent’s doubly linked
    list, it stores information of the previous and the next record.

    *   It has length with headers.

    *   The data block.


    The data block can have either a BTree Bucket (in case of an index namespace)
    or a BSON object. You will be looking into the BTree structure in a while.


    The BSON object corresponds to the actual data for the collection. The size of
    the BSON object need not be same as the data block. Power of 2-sized allocation
    is used by default so that every document is stored in a space that contains the
    document plus extra space or padding. This design decision is useful to avoid
    movement of an object from one block to another whenever an update leads to a
    change in the object size.


    MongoDB supports multiple allocation strategies, which determine how to add padding
    to a document (Figure [8-6](#A332296_1_En_8_Chapter.html#Fig6)). As in-place updates
    are more efficient than relocations, all padding strategies trade extra space
    for increased efficiency and decreased fragmentation. Different workloads are
    supported by different strategies. For instance, exact fit allocation is ideal
    for collections with insert-only workloads where the size is fixed and never varies,
    whereas power of 2 allocations are efficient for insert/update/delete workloads.


    ![A332296_1_En_8_Fig6_HTML.jpg](A332296_1_En_8_Fig6_HTML.jpg)


    Figure 8-6.


    Record data structure


    ##### Deleted List


    The deleted list stores details of the extent whose data has been deleted or moved
    (movement whenever an update has caused change in size, leading to non-fitment
    of data in the allocated space).


    The size of the record determines the bucket in which the free extent needs to
    be placed. Basically these are bucketed single linked lists. When a new extent
    is required for fitting the data for the namespace, it will first search the free
    list to check whether any appropriate size extent is available.


    ##### In Summary


    Hence you can assume the data files (files with numeric extensions) to be divided
    across different collection namespaces where extents of the namespace specify
    the range of data from the data file belonging to that respective collection.


    Having understood how the data is stored, now let’s see how `db.users.find()`
    works.


    It will first check the `mydbpoc.ns` file to reach the `users`’ namespace and
    find out the first extent it’s pointing to. It’ll follow the first extent link
    to the first record, and following the next record pointer, it will read the data
    records of the first extent until the last record is reached. Then it will follow
    the next extent pointer to read its data records in a similar fashion. This pattern
    is followed until the last extent data records are read.


    #### 8.2.1.2 $freelist


    The `.ns` file has a special namespace called `$freelist` for extents. `$freelist`
    keeps track of the extents that are no longer used, such as extents of a dropped
    index or collection.'
  trans: '

    ## 8.2 数据文件（与 MMAPv1 相关）


    首先，让我们检查一下数据文件。如你所见，在核心服务下，`mongod`使用的默认数据目录是`/data/db/`。


    在此目录中，每个数据库都有独立的文件。每个数据库有一个`.ns`文件和多个具有单调递增数字扩展名的数据文件。


    例如，如果你创建一个名为`mydbpoc`的数据库，它将存储在以下文件中：`mydbpoc.ns`、`mydbpoc.1`、`mydbpoc.2`等，如图
    8-2 所示。


    ![A332296_1_En_8_Fig2_HTML.jpg](img/A332296_1_En_8_Fig2_HTML.jpg)


    图 8-2. 数据文件


    对于数据库的每个新的数字数据文件，其大小将是前一个数字数据文件大小的两倍。文件大小的上限为 2GB。如果文件大小达到 2GB，所有后续的数字文件将保持 2GB
    大小。这是设计如此。这种行为确保了小型数据库不会在磁盘上浪费太多空间，并且大型数据库大部分保持在磁盘上的连续区域中。


    请注意，为了确保一致的性能，MongoDB 会预分配数据文件。预分配在后台进行，并且每次数据文件被填满时启动。这意味着 MongoDB 服务器总是试图为每个数据库保留一个额外的空数据文件，以避免在文件分配时被阻塞。


    如果磁盘上存在多个小型数据库，使用`storage.mmapv1.smallFiles`选项将减小这些文件的大小。


    接下来，你将看到数据实际上是如何在底层存储的。双向链表是用于存储数据的关键数据结构。


    ### 8.2.1 命名空间 (.ns 文件)


    在数据文件中，数据空间被划分为命名空间，其中命名空间可以对应一个集合或一个索引。


    这些命名空间的元数据存储在`.ns`文件中。如果你检查数据目录，你会找到一个名为`[数据库名].ns`的文件。


    用于存储元数据的`.ns`文件大小为 16MB。这个文件可以被视为一个大的哈希表，它被划分为大约 1KB 大小的小存储桶。


    每个存储桶存储特定于命名空间的元数据（图 8-3）。


    ![A332296_1_En_8_Fig3_HTML.jpg](img/A332296_1_En_8_Fig3_HTML.jpg)


    图 8-3. 命名空间数据结构


    #### 8.2.1.1 集合命名空间


    如图 8-4 所示，集合命名空间存储桶包含元数据，例如：


    ![A332296_1_En_8_Fig4_HTML.jpg](img/A332296_1_En_8_Fig4_HTML.jpg)


    图 8-4. 集合命名空间详情


    -   集合的名称

    -   关于集合的一些统计信息，如计数、大小等。（这就是为什么每当对集合发出计数时，它都能快速响应。）

    -   索引详细信息，因此它可以维护到每个已创建索引的链接

    -   一个删除列表

    -   一个存储范围详情的双向链表（它存储指向第一个和最后一个范围的指针）


    ##### Extent (范围)


    Extent 指的是数据文件中的一组数据记录，因此一组 extent 构成了命名空间的完整数据。一个 extent 使用磁盘位置来引用数据实际驻留的磁盘位置。它由两部分组成：文件号和偏移量。


    文件号指定它指向的数据文件（0、1 等）。


    偏移量是文件中的位置（你需要深入文件多远来查找数据）。偏移量大小为 4KB。因此，偏移量的最大值可达 2³¹-1，这是数据文件可以增长到的最大文件大小（2048MB
    或 2GB）。


    如图 8-5 所示，一个 extent 数据结构由以下部分组成：


    ![A332296_1_En_8_Fig5_HTML.jpg](img/A332296_1_En_8_Fig5_HTML.jpg)


    图 8-5. Extent


    -   磁盘上的位置，即它指向的文件号。

    -   由于 extent 作为双向链表元素存储，它有一个指针指向前一个和下一个 extent。

    -   一旦有了它所引用的文件号，该文件内它指向的数据记录组进一步存储为双向链表。因此，它维护一个指针指向它指向的数据块的第一条数据记录和最后一条数据记录，这些记录不过是文件内的偏移量（数据存储在文件中的深度）。


    ##### 数据记录 (Data Record)


    接下来你将查看数据记录结构。该数据结构包含以下详情：


    -   由于数据记录结构是 extent 双向链表的一个元素，它存储前一个和后一个记录的信息。

    -   它有带头部的长度。

    -   数据块。


    数据块可以有一个 BTree Bucket（如果是索引命名空间）或一个 BSON 对象。你稍后将研究 BTree 结构。


    BSON 对象对应于集合的实际数据。BSON 对象的大小不必与数据块相同。默认使用 2 次幂大小分配，以便每个文档都存储在一个包含文档和额外空间或填充的空间中。这个设计决策有助于避免当更新导致对象大小变化时，对象从一个块移动到另一个块。


    MongoDB 支持多种分配策略，这些策略决定了如何为文档添加填充（图 8-6）。由于原地更新比重新定位更高效，所有填充策略都用额外的空间换取更高的效率和更少的碎片。不同的策略支持不同的工作负载。例如，完全匹配分配对于具有仅插入工作负载且大小固定且从不变化的集合是理想的，而
    2 次幂分配对于插入/更新/删除工作负载是高效的。


    ![A332296_1_En_8_Fig6_HTML.jpg](img/A332296_1_En_8_Fig6_HTML.jpg)


    图 8-6. 记录数据结构


    ##### 删除列表 (Deleted List)


    删除列表存储已删除或移动的 extent 的详细信息（当更新导致大小变化，数据无法在分配的空间中容纳时发生移动）。


    记录的大小决定了空闲 extent 需要放置在哪个存储桶中。基本上，这些是分桶的单链表。当需要一个新的 extent 来容纳命名空间的数据时，它会首先搜索空闲列表以检查是否有任何合适大小的
    extent 可用。


    ##### 总结


    因此，你可以假设数据文件（具有数字扩展名的文件）被划分为不同的集合命名空间，其中命名空间的 extent 指定了从属于该集合的数据文件中的数据范围。


    理解了数据是如何存储的，现在让我们看看`db.users.find()`是如何工作的。


    它将首先检查`mydbpoc.ns`文件以访问`users`命名空间，并找出它指向的第一个 extent。它将跟随第一个 extent 链接到第一条记录，然后跟随下一条记录指针，它将读取第一个
    extent 的数据记录，直到达到最后一条记录。然后它将跟随下一个 extent 指针以类似的方式读取其数据记录。遵循这个模式，直到读取最后一个 extent
    的数据记录。


    #### 8.2.1.2 $freelist (空闲列表)


    `.ns`文件有一个名为`$freelist`的特殊命名空间，用于 extent。`$freelist`跟踪不再使用的 extent，例如已删除的索引或集合的
    extent。

