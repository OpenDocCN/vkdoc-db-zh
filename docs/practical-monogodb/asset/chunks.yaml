- fmt: "## 6.1 Basic Querying\n\nThis section will briefly discuss the CRUD operations\
    \ (Create, Read, Update, and Delete). Using basic examples and exercises, you\
    \ will learn how these operations are performed in MongoDB. Also, you will understand\
    \ how queries are executed in MongoDB.\n\nIn contrast to traditional SQL, which\
    \ is used for querying, MongoDB uses its own JSON-like query language to retrieve\
    \ information from the stored data.\n\nAfter the successful installation of MongoDB,\
    \ as explained in Chapter [5](#A332296_1_En_5_Chapter.html), you will navigate\
    \ to the directory `C:\\practicalmongodb\\bin\\`. This folder has all of the executables\
    \ for running MongoDB.\n\nThe MongoDB shell can be started by executing the `mongo`\
    \ executable.\n\nThe first step is always to start the database server. Open the\
    \ command prompt (by running it as administrator) and issue the command `CD \\\
    `.\n\nNext, run the command `C:\\practicalmongodb\\bin\\mongod.exe`. (If the installation\
    \ is in some other folder, the path will change accordingly. For the examples\
    \ in this chapter, the installation is in the `C:\\practicalmongodb` folder.)\
    \ This will start the database server.\n\n```\nC:\\>c:\\practicalmongodb\\bin\\\
    mongod.exe\n\n2015-07-06T02:29:24.501-0700 I CONTROL Hotfix KB2731284 or later\
    \ update is insalled, no need to zero-out data files\n\n2015-07-06T02:29:24.522-0700\
    \ I JOURNAL [initandlisten] journal dir=c:\\data\\db\\ournal\n\n....................................................\n\
    \n2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] MongoDB starting : pid=384\
    \ port=27017 dbpath=c:\\data\\db\\ 64-bit host=ANC09\n\n2015-07-06T02:29:24.575-0700\
    \ I CONTROL [initandlisten] targetMinOS: Windows 7/windows Server 2008 R2\n\n\
    2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] db version v3.0.4\n\n2015-07-06T02:29:24.575-0700\
    \ I CONTROL [initandlisten] OpenSSL version: OpenSSL1.0.1j-fips 19 Mar 2015\n\n\
    2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] build info: windows sys\
    \ getwindowsversion(major=6, minor=1, build=7601, platform=2, service_pack='Service\
    \ Pack 1') BOOST_LIB_VERSION=1_49\n\n2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten]\
    \ allocator: system\n\n2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten]\
    \ options: {}\n\n2015-07-06T02:29:24.584-0700 I NETWORK [initandlisten] waiting\
    \ for connections on port 27017\n```\n\nMongoDB by default listens for any incoming\
    \ connections on port 27017 of the localhost interface.\n\nNow that the database\
    \ server is started, you can start issuing commands to the server using the mongo\
    \ shell.\n\nBefore you look at the mongo shell, let’s briefly look at how to use\
    \ the import/export tool to import and export data in and out of the MongoDB database.\n\
    \nFirst, create a CSV file to hold the records of students with the following\
    \ structure:\n\n`Name, Gender, Class, Score, Age.`\n\nSample data of the CSV is\
    \ shown in Figure [6-1](#A332296_1_En_6_Chapter.html#Fig1).\n\n![A332296_1_En_6_Fig1_HTML.jpg](A332296_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1. Sample CSV file\n\nNext, import the data from the MongoDB database\
    \ to a new collection in order to look at how the import tool works.\n\nOpen the\
    \ command prompt by running it as an administrator. The following command is used\
    \ to get help on the `import` command:\n\n```\nC:\\>c:\\practicalmongodb\\bin\\\
    mongoimport.exe --help\n\nImport CSV, TSV or JSON data into MongoDB.\n\nWhen importing\
    \ JSON documents, each document must be a separate line of the input file.\n\n\
    Example:\nmongoimport --host myhost --db my_cms --collection docs < mydocfile.json\n\
    ....\n\nC:\\>\n```\n\nIssue the following command to import the data from the\
    \ file `exporteg.csv` to a new collection called `importeg` in the `MyDB` database:\n\
    \n```\nC:\\>c:\\practicalmongodb\\bin\\mongoimport.exe --host localhost --db mydb\
    \ --collection importeg --type csv --file c:\\exporteg.csv --headerline\n\n2015-07-06T01:53:23.537-0700\
    \ connected to: localhost\n2015-07-06T01:53:23.608-0700 imported 15 documents\n\
    ```\n\nIn order to validate whether the collection is created and the data is\
    \ imported, you connect to the database (which is `localhost` in this case) using\
    \ mongo shell, and you issue commands to validate whether the collection exists\
    \ or not.\n\nTo start the mongo shell, run command prompt as administrator and\
    \ issue the command `C:\\PracticalMongoDB\\bin\\mongo.exe` (the path will vary\
    \ based on the installation folder; in this example, the folder is `C:\\PracticalMongoDB\\\
    `), and press Enter.\n\nThis by default connects to the `localhost` database server\
    \ which is listening on port 27017.\n\n```\nC:\\>c:\\practicalmongodb\\bin\\mongo.exe\n\
    \nMongoDB shell version: 3.0.4\nconnecting to: test\n\n> use mydb\nswitched to\
    \ db mydb\n\n> show collections\nimporteg\nsystem.indexes\n\n> db.importeg.find()\n\
    { \"_id\" : ObjectId(\"5450af58c770b7161eefd31d\"), \"Name\" : \"S1\", \"Gender\"\
    \ : \"M\", \"Class\" : \"C1\", \"Score\" : 95, \"Age\" : 25 }\n.......\n{ \"_id\"\
    \ : ObjectId(\"5450af59c770b7161eefd31e\"), \"Name\" : \"S2\", \"Gender\" : \"\
    M\", \"Class\" : \"C1\", \"Score\" : 85, \"Age\" : 18 }\n\n>\n```\n\nIn brief,\
    \ what you are doing here is:\n\n1.  Connecting to the mongo shell.\n2.  Switching\
    \ to your database, which is `MyDB` in this case.\n3.  Checking for the collections\
    \ that exist in the `MyDB` database using `show collections`.\n4.  Checking the\
    \ count of the collection that you imported using the import tool.\n5.  Finally,\
    \ executing the `find()` command to check for the data in the new collection.\n\
    \nTo connect to different hosts and ports, `–host` and `–port` can be used along\
    \ with the command.\n\nAs you can see in Figure [6-1](#A332296_1_En_6_Chapter.html#Fig1),\
    \ by default the database `test` is used for context.\n\nAt any point in time,\
    \ executing the `db` command will show the current database to which the shell\
    \ is connected:\n\n```\n> db\ntest\n>\n```\n\nTo display all the database names,\
    \ you can run the `show dbs` command. Executing this command will list all of\
    \ the databases for the connected server.\n\n```\n> show dbs\n```\n\nAt any point,\
    \ help can be accessed using the `help()` command.\n\n```\n> help\n    db.help()\
    \                    help on db methods\n    db.mycoll.help()             help\
    \ on collection methods\n    sh.help()                    sharding helpers\n \
    \   rs.help()                    replica set helpers\n    help admin         \
    \          administrative help\n    help connect                 connecting to\
    \ a db help\n    help keys                    key shortcuts\n    help misc   \
    \                 misc things to know\n    help mr                      mapreduce\n\
    \    show dbs                    show database names\n    show collections   \
    \         show collections in current database\n    show users               \
    \   show users in current database\n    ..........\n    exit                 \
    \       quit the mongo shell\n```\n\nAs shown above, if you need help on any of\
    \ the methods of `db` or `collection`, you can use `db.help()` or `db.<CollectionName>.help()`.\
    \ For example, if you need help on the `db` command, execute `db.help()`.\n\n\
    ```\n> db.help()\nDB methods:\n    db.addUser(userDocument)\n    ...\n    db.shutdownServer()\n\
    \    db.stats()\n    db.version()            current version of the server\n>\n\
    ```\n\nUntil now you have been using the default `test` db. The command `use <newdbname>`\
    \ can be used to switch to a new database.\n\n```\n> use mydb\nswitched to db\
    \ mydb\n```\n\nBefore you start your exploration, let’s first briefly look at\
    \ MongoDB terminology and concepts corresponding to SQL terminology and concepts.\
    \ This is summarized in Table [6-1](#A332296_1_En_6_Chapter.html#Tab1).\n\nTable\
    \ 6-1. SQL and MongoDB Terminology\n\n| SQL | MongoDB |\n| --- | --- |\n| Database\
    \ | Database |\n| Table | Collection |\n| Row | Document |\n| Column | Field |\n\
    | Index | Index |\n| Joins within table | Embedding and referencing |\n| Primary\
    \ Key: A column or set of columns can be specified | Primary Key: Automatically\
    \ set to_id field |\n\nLet’s start your exploration of the options for querying\
    \ in MongoDB. Switch to the `MYDBPOC` database.\n\n```\n> use mydbpoc\nswitched\
    \ to db mydbpoc\n>\n```\n\nThis switches the context from `test` to `MYDBPOC`.\
    \ The same can be confirmed using the `db` command.\n\n```\n> db\nmydbpoc\n>\n\
    ```"
  raw: '## 6.1 Basic Querying


    This section will briefly discuss the CRUD operations (Create, Read, Update, and
    Delete). Using basic examples and exercises, you will learn how these operations
    are performed in MongoDB. Also, you will understand how queries are executed in
    MongoDB.


    In contrast to traditional SQL, which is used for querying, MongoDB uses its own
    JSON-like query language to retrieve information from the stored data.


    After the successful installation of MongoDB, as explained in Chapter [5](#A332296_1_En_5_Chapter.html),
    you will navigate to the directory `C:\practicalmongodb\bin\`. This folder has
    all of the executables for running MongoDB.


    The MongoDB shell can be started by executing the mongo executable.


    The first step is always to start the database server. Open the command prompt
    (by running it as administrator) and issue the command `CD \`.


    Next, run the command `C:\practicalmongodb\bin\mongod.exe`. (If the installation
    is in some other folder, the path will change accordingly. For the examples in
    this chapter, the installation is in the `C:\practicalmongodb` folder.) This will
    start the database server .


    `C:\>c:\practicalmongodb\bin\mongod.exe`


    `2015-07-06T02:29:24.501-0700 I CONTROL Hotfix KB2731284 or later update is insalled,
    no need to zero-out data files`


    `2015-07-06T02:29:24.522-0700 I JOURNAL [initandlisten] journal dir=c:\data\db\ournal`


    `....................................................`


    `2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] MongoDB starting : pid=384
    port=27017 dbpath=c:\data\db\ 64-bit host=ANC09`


    `2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] targetMinOS: Windows 7/windows
    Server 2008 R2`


    `2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] db version v3.0.4`


    `2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] OpenSSL version: OpenSSL1.0.1j-fips
    19 Mar 2015`


    `2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] build info: windows sys
    getwindowsversion(major=6, minor=1, build=7601, platform=2, service_pack=''Service
    Pack 1'') BOOST_LIB_VERSION=1_49`


    `2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] allocator: system`


    `2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] options: {}`


    `2015-07-06T02:29:24.584-0700 I NETWORK [initandlisten] waiting for connections
    on port 27017`


    MongoDB by default listens for any incoming connections on port 27017 of the localhost
    interface.


    Now that the database server is started, you can start issuing commands to the
    server using the mongo shell.


    Before you look at the mongo shell, let’s briefly look at how to use the import/export
    tool to import and export data in and out of the MongoDB database.


    First, create a CSV file to hold the records of students with the following structure:


    `Name, Gender, Class, Score, Age.`


    Sample data of the CSV is shown in Figure [6-1](#A332296_1_En_6_Chapter.html#Fig1).


    ![A332296_1_En_6_Fig1_HTML.jpg](A332296_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Sample CSV file


    Next, import the data from the MongoDB database to a new collection in order to
    look at how the import tool works.


    Open the command prompt by running it as an administrator. The following command
    is used to get help on the `import` command :


    `C:\>c:\practicalmongodb\bin\mongoimport.exe --help`


    `Import CSV, TSV or JSON data into MongoDB.`


    `When importing JSON documents, each document must be a separate line of the input
    file.`


    `Example:`


    `mongoimport --host myhost --db my_cms --collection docs < mydocfile.json`


    `....`


    `C:\>`


    Issue the following command to import the data from the file `exporteg.csv` to
    a new collection called `importeg` in the `MyDB` database :


    `C:\>c:\practicalmongodb\bin\mongoimport.exe --host localhost --db mydb --collection
    importeg --type csv --file c:\exporteg.csv --headerline`


    `2015-07-06T01:53:23.537-0700 connected to: localhost`


    `2015-07-06T01:53:23.608-0700 imported 15 documents`


    In order to validate whether the collection is created and the data is imported,
    you connect to the database (which is `localhost` in this case) using mongo shell,
    and you issue commands to validate whether the collection exists or not.


    To start the mongo shell, run command prompt as administrator and issue the command
    `C:\PracticalMongoDB\bin\mongo.exe` (the path will vary based on the installation
    folder; in this example, the folder is `C:\PracticalMongoDB\`), and press Enter.


    This by default connects to the `localhost` database server which is listening
    on port 27017.


    `C:\>c:\practicalmongodb\bin\mongo.exe`


    `MongoDB shell version: 3.0.4`


    `connecting to: test`


    `> use mydb`


    `switched to db mydb`


    `> show collections`


    `importeg`


    `system.indexes`


    `> db.importeg.find()`


    `{ "_id" : ObjectId("5450af58c770b7161eefd31d"), "Name" : "S1", "Gender" : "M",
    "Class" : "C1", "Score" : 95, "Age" : 25 }`


    `.......`


    `{ "_id" : ObjectId("5450af59c770b7161eefd31e"), "Name" : "S2", "Gender" : "M",
    "Class" : "C1", "Score" : 85, "Age" : 18 }`


    `>`


    In brief, what you are doing here is


    Connecting to the mongo shell   Switching to your database, which is `MyDB` in
    this case   Checking for the collections that exist in the `MyDB` database using
    `show collections`.   Checking the count of the collection that you imported using
    the import tool.   Finally, executing the `find()` command to check for the data
    in the new collection.


    To connect to different hosts and ports, `–host` and `–port` can be used along
    with the command.


    As you can see in Figure [6-1](#A332296_1_En_6_Chapter.html#Fig1), by default
    the database `test` is used for context.


    At any point in time, executing the `db` command will show the current database
    to which the shell is connected:


    `> db`


    `test`


    `>`


    To display all the database names, you can run the `show dbs` command. Executing
    this command will list all of the databases for the connected server.


    `> show dbs`


    At any point, help can be accesses using the `help()` command .


    `> help`


    `db.help() help on db methods`


    `db.mycoll.help() help on collection methods`


    `sh.help() sharding helpers`


    `rs.help() replica set helpers`


    `help admin administrative help`


    `help connect connecting to a db help`


    `help keys key shortcuts`


    `help misc misc things to know`


    `help mr mapreduce`


    `show dbs show database names`


    `show collections show collections in current database`


    `show users show users in current database`


    `.............`


    `exit quit the mongo shell`


    As shown above, if you need help on any of the methods of `db` or `collection`,
    you can use `db.help()` or `db.<CollectionName>.help()` . For example, if you
    need help on the `db` command, execute `db.help()`.


    `> db.help()`


    `DB methods:`


    `db.addUser(userDocument)`


    `...`


    `db.shutdownServer()`


    `db.stats()`


    `db.version() current version of the server`


    `>`


    Until now you have been using the default `test` db. The command `use <newdbname>`
    can be used to switch to a new database.


    `> use mydb`


    `switched to db mydb`


    Before you start your exploration, let’s first briefly look at MongoDB terminology
    and concepts corresponding to SQL terminology and concepts . This is summarized
    in Table [6-1](#A332296_1_En_6_Chapter.html#Tab1).


    Table 6-1.


    SQL and MongoDB Terminology


    | SQL | MongoDB |

    | --- | --- |

    | Database | Database |

    | Table | Collection |

    | Row | Document |

    | Column | Field |

    | Index | Index |

    | Joins within table | Embedding and referencing |

    | Primary Key: A column or set of columns can be specified | Primary Key: Automatically
    set to_id field |


    Let’s start your exploration of the options for querying in MongoDB. Switch to
    the `MYDBPOC` database .


    `> use mydbpoc`


    `switched to db mydbpoc`


    `>`


    This switches the context from `test` to `MYDBPOC`. The same can be confirmed
    using the `db` command.


    `> db`


    `mydbpoc`


    `>`'
  trans: "\n## 6.1 基础查询\n\n本节将简要讨论 CRUD 操作（创建、读取、更新和删除）。通过基本示例和练习，你将学习如何在 MongoDB\
    \ 中执行这些操作。同时，你也会了解查询在 MongoDB 中是如何执行的。\n\n与用于查询的传统 SQL 不同，MongoDB 使用其自身的类 JSON\
    \ 查询语言从存储的数据中检索信息。\n\n如第 5 章所述，成功安装 MongoDB 后，你需要导航到目录 `C:\\practicalmongodb\\\
    bin\\`。此文件夹包含运行 MongoDB 所需的所有可执行文件。\n\n通过执行 `mongo` 可执行文件可以启动 MongoDB shell。\n\
    \n第一步始终是启动数据库服务器。打开命令提示符（以管理员身份运行）并发出命令 `CD \\`。\n\n接下来，运行命令 `C:\\practicalmongodb\\\
    bin\\mongod.exe`。（如果安装在其他文件夹，路径将相应更改。本章示例的安装位置为 `C:\\practicalmongodb` 文件夹。）这将启动数据库服务器。\n\
    \n```\nC:\\>c:\\practicalmongodb\\bin\\mongod.exe\n\n2015-07-06T02:29:24.501-0700\
    \ I CONTROL Hotfix KB2731284 or later update is insalled, no need to zero-out\
    \ data files\n\n2015-07-06T02:29:24.522-0700 I JOURNAL [initandlisten] journal\
    \ dir=c:\\data\\db\\ournal\n\n....................................................\n\
    \n2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] MongoDB starting : pid=384\
    \ port=27017 dbpath=c:\\data\\db\\ 64-bit host=ANC09\n\n2015-07-06T02:29:24.575-0700\
    \ I CONTROL [initandlisten] targetMinOS: Windows 7/windows Server 2008 R2\n\n\
    2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] db version v3.0.4\n\n2015-07-06T02:29:24.575-0700\
    \ I CONTROL [initandlisten] OpenSSL version: OpenSSL1.0.1j-fips 19 Mar 2015\n\n\
    2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten] build info: windows sys\
    \ getwindowsversion(major=6, minor=1, build=7601, platform=2, service_pack='Service\
    \ Pack 1') BOOST_LIB_VERSION=1_49\n\n2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten]\
    \ allocator: system\n\n2015-07-06T02:29:24.575-0700 I CONTROL [initandlisten]\
    \ options: {}\n\n2015-07-06T02:29:24.584-0700 I NETWORK [initandlisten] waiting\
    \ for connections on port 27017\n```\n\nMongoDB 默认在本地主机接口的 27017 端口监听任何传入连接。\n\
    \n现在数据库服务器已启动，你可以开始使用 mongo shell 向服务器发出命令。\n\n在深入了解 mongo shell 之前，让我们先简要了解一下如何使用导入/导出工具将数据导入和导出\
    \ MongoDB 数据库。\n\n首先，创建一个 CSV 文件来保存学生记录，结构如下：\n`姓名、性别、班级、成绩、年龄。`\n\nCSV 的示例数据如图\
    \ 6-1 所示。\n\n![A332296_1_En_6_Fig1_HTML.jpg](img/A332296_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1. 示例 CSV 文件\n\n接下来，将数据从 MongoDB 数据库导入到一个新集合中，以了解导入工具的工作原理。\n\n以管理员身份运行命令提示符。以下命令用于获取\
    \ `import` 命令的帮助信息：\n\n```\nC:\\>c:\\practicalmongodb\\bin\\mongoimport.exe --help\n\
    \nImport CSV, TSV or JSON data into MongoDB.\n\nWhen importing JSON documents,\
    \ each document must be a separate line of the input file.\n\nExample:\nmongoimport\
    \ --host myhost --db my_cms --collection docs < mydocfile.json\n....\n\nC:\\>\n\
    ```\n\n发出以下命令，将数据从文件 `exporteg.csv` 导入到 `MyDB` 数据库中名为 `importeg` 的新集合：\n\n```\n\
    C:\\>c:\\practicalmongodb\\bin\\mongoimport.exe --host localhost --db mydb --collection\
    \ importeg --type csv --file c:\\exporteg.csv --headerline\n\n2015-07-06T01:53:23.537-0700\
    \ connected to: localhost\n2015-07-06T01:53:23.608-0700 imported 15 documents\n\
    ```\n\n为了验证集合是否已创建以及数据是否已导入，你需要使用 mongo shell 连接到数据库（本例中是 `localhost`），并发出命令来验证集合是否存在。\n\
    \n要启动 mongo shell，请以管理员身份运行命令提示符，发出命令 `C:\\PracticalMongoDB\\bin\\mongo.exe`（路径将根据安装文件夹而变化；本例中文件夹是\
    \ `C:\\PracticalMongoDB\\`），然后按 Enter 键。\n\n这默认连接到在端口 27017 上监听的 `localhost` 数据库服务器。\n\
    \n```\nC:\\>c:\\practicalmongodb\\bin\\mongo.exe\n\nMongoDB shell version: 3.0.4\n\
    connecting to: test\n\n> use mydb\nswitched to db mydb\n\n> show collections\n\
    importeg\nsystem.indexes\n\n> db.importeg.find()\n{ \"_id\" : ObjectId(\"5450af58c770b7161eefd31d\"\
    ), \"Name\" : \"S1\", \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\" : 95,\
    \ \"Age\" : 25 }\n.......\n{ \"_id\" : ObjectId(\"5450af59c770b7161eefd31e\"),\
    \ \"Name\" : \"S2\", \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\" : 85, \"\
    Age\" : 18 }\n\n>\n```\n\n简而言之，你在这里所做的是：\n\n1.  连接到 mongo shell。\n2.  切换到你的数据库，本例中是\
    \ `MyDB`。\n3.  使用 `show collections` 检查 `MyDB` 数据库中存在的集合。\n4.  使用导入工具检查导入集合的计数。\n\
    5.  最后，执行 `find()` 命令以检查新集合中的数据。\n\n要连接到不同的主机和端口，可以在命令中使用 `–host` 和 `–port`。\n\
    \n如图 6-1 所示，默认情况下使用数据库 `test` 作为上下文。\n\n在任何时间点，执行 `db` 命令将显示 shell 当前连接到的数据库：\n\
    \n```\n> db\ntest\n>\n```\n\n要显示所有数据库名称，可以运行 `show dbs` 命令。执行此命令将列出已连接服务器的所有数据库。\n\
    \n```\n> show dbs\n```\n\n在任何时刻，都可以使用 `help()` 命令获取帮助。\n\n```\n> help\n    db.help()\
    \                    help on db methods\n    db.mycoll.help()             help\
    \ on collection methods\n    sh.help()                    sharding helpers\n \
    \   rs.help()                    replica set helpers\n    help admin         \
    \          administrative help\n    help connect                 connecting to\
    \ a db help\n    help keys                    key shortcuts\n    help misc   \
    \                 misc things to know\n    help mr                      mapreduce\n\
    \    show dbs                    show database names\n    show collections   \
    \         show collections in current database\n    show users               \
    \   show users in current database\n    ..........\n    exit                 \
    \       quit the mongo shell\n```\n\n如上所示，如果你需要关于 `db` 或 `collection` 任何方法的帮助，可以使用\
    \ `db.help()` 或 `db.<CollectionName>.help()`。例如，如果你需要关于 `db` 命令的帮助，请执行 `db.help()`。\n\
    \n```\n> db.help()\nDB methods:\n    db.addUser(userDocument)\n    ...\n    db.shutdownServer()\n\
    \    db.stats()\n    db.version()            current version of the server\n>\n\
    ```\n\n到目前为止，你一直在使用默认的 `test` 数据库。可以使用命令 `use <newdbname>` 切换到新数据库。\n\n```\n>\
    \ use mydb\nswitched to db mydb\n```\n\n在你开始探索之前，让我们先简要了解一下 MongoDB 术语和概念，它们对应于\
    \ SQL 的术语和概念。这总结在表 6-1 中。\n\n表 6-1. SQL 与 MongoDB 术语对照\n\n| SQL | MongoDB |\n\
    | --- | --- |\n| 数据库 | 数据库 |\n| 表 | 集合 |\n| 行 | 文档 |\n| 列 | 字段 |\n| 索引 | 索引 |\n\
    | 表内连接 | 嵌入和引用 |\n| 主键：可指定一列或一组列 | 主键：自动设置为 _id 字段 |\n\n让我们开始探索 MongoDB 中的查询选项。切换到\
    \ `MYDBPOC` 数据库。\n\n```\n> use mydbpoc\nswitched to db mydbpoc\n>\n```\n\n这将上下文从\
    \ `test` 切换到了 `MYDBPOC`。可以使用 `db` 命令确认这一点。\n\n```\n> db\nmydbpoc\n>\n```\n"
- fmt: "# MongoDB 数据库与集合操作\n\n## 6.1 创建与插入\n\n尽管上下文已切换至 `MYDBPOC`，但若执行 `show dbs`\
    \ 命令，数据库名称不会显示。这是因为 MongoDB 仅在数据插入数据库后才真正创建该数据库。此行为符合 MongoDB 动态分配命名空间、简化并加速开发流程的动态数据处理理念。此时若执行\
    \ `show dbs` 命令，`MYDBPOC` 数据库将不会出现在数据库列表中。\n\n以下示例假设有一个名为 `users` 的多态集合，其中包含以下两种原型的文档：\n\
    \n```json\n{\n  \"_id\": ObjectID(),\n  \"FName\": \"First Name\",\n  \"LName\"\
    : \"Last Name\",\n  \"Age\": 30,\n  \"Gender\": \"M\",\n  \"Country\": \"Country\"\
    \n}\n```\n\n以及\n\n```json\n{\n  \"_id\": ObjectID(),\n  \"Name\": \"Full Name\"\
    ,\n  \"Age\": 30,\n  \"Gender\": \"M\",\n  \"Country\": \"Country\"\n}\n```\n\n\
    以及\n\n```json\n{\n  \"_id\": ObjectID(),\n  \"Name\": \"Full Name\",\n  \"Age\"\
    : 30\n}\n```\n\n### 6.1.1 创建与插入操作\n\n现在，我们将了解数据库和集合是如何创建的。如前所述，MongoDB 中的文档采用\
    \ JSON 格式。\n\n首先，通过执行 `db` 命令，可以确认当前上下文是 `mydbpoc` 数据库。\n\n```\n> db\nmydbpoc\n\
    >\n```\n\n现在来看如何创建文档。\n\n第一个文档符合第一种原型，而第二个文档符合第二种原型。你创建了两个名为 `user1` 和 `user2`\
    \ 的文档。\n\n```\n> user1 = {FName: \"Test\", LName: \"User\", Age:30, Gender: \"\
    M\", Country: \"US\"}\n{\n  \"FName\" : \"Test\",\n  \"LName\" : \"User\",\n \
    \ \"Age\" : 30,\n  \"Gender\" : \"M\",\n  \"Country\" : \"US\"\n}\n> user2 = {Name:\
    \ \"Test User\", Age:45, Gender: \"F\", Country: \"US\"}\n{ \"Name\" : \"Test\
    \ User\", \"Age\" : 45, \"Gender\" : \"F\", \"Country\" : \"US\" }\n>\n```\n\n\
    接下来，你将按以下操作顺序将这两个文档（`user1` 和 `user2`）添加到 `users` 集合中：\n\n```\n> db.users.insert(user1)\n\
    > db.users.insert(user2)\n>\n```\n\n上述操作不仅会将两个文档插入 `users` 集合，还会创建该集合以及所属的数据库。可以使用\
    \ `show collections` 和 `show dbs` 命令进行验证。\n\n如前所述，`show dbs` 将显示数据库列表。\n\n```\n\
    > show dbs\nadmin   0.078GB\nlocal   0.078GB\nmydb    0.078GB\nmydbproc 0.078GB\n\
    ```\n\n而 `show collections` 将显示当前数据库中的集合列表。\n\n```\n> show collections\nsystem.indexes\n\
    users\n>\n```\n\n除了 `users` 集合，还会显示 `system.indexes` 集合。这个 `system.indexes` 集合在数据库创建时默认生成，用于管理数据库内所有集合的索引信息。\n\
    \n执行命令 `db.users.find()` 将显示 `users` 集合中的文档。\n\n```\n> db.users.find()\n{ \"_id\"\
    \ : ObjectId(\"5450c048199484c9a4d26b0a\"), \"FName\" : \"Test\", \"LName\" :\
    \ \"User\", \"Age\" : 30, \"Gender\": \"M\", \"Country\" : \"US\" }\n{ \"_id\"\
    \ : ObjectId(\"5450c05d199484c9a4d26b0b\"), \"Name\" : \"Test\", User\", \"Age\"\
    \ : 45,\"Gender\" : \"F\", \"Country\" : \"US\" }\n>\n```\n\n可以看到，你创建的两个文档被显示出来。除了你添加的字段外，还有一个额外的\
    \ `_id` 字段，该字段为所有文档自动生成。\n\n所有文档必须有一个唯一的 `_id` 字段。如果未由你显式指定，MongoDB 将自动为其分配一个唯一的对象\
    \ ID，如上例所示。\n\n你没有显式插入 `_id` 字段，但当使用 `find()` 命令显示文档时，可以看到每个文档都关联了一个 `_id` 字段。\n\
    \n原因在于，默认情况下会在 `_id` 字段上创建一个索引，这可以通过在 `system.indexes` 集合上执行 `find` 命令来验证。\n\n\
    ```\n>db.system.indexes.find()\n{ \"v\" : 1, \"key\" : { \"_id\" : 1 }, \"ns\"\
    \ : \"mydbpoc.users\", \"name\" : \"_id_\" }\n>\n```\n\n可以使用 `ensureIndex()` 和\
    \ `dropIndex()` 命令向集合添加或删除新索引。我们将在本章后面介绍这些内容。默认情况下，所有集合的 `_id` 字段上都会创建一个索引，这个默认索引无法被删除。\n\
    \n### 6.1.2 显式创建集合\n\n在上面的例子中，第一次插入操作隐式地创建了集合。但是，用户也可以在执行插入语句之前显式地创建集合。\n\n```\n\
    db.createCollection(\"users\")\n```\n\n### 6.1.3 使用循环插入文档\n\n也可以使用 `for` 循环向集合添加文档。以下代码使用\
    \ `for` 循环插入用户。\n\n```\n> for(var i=1; i<=20; i++) db.users.insert({\"Name\" :\
    \ \"Test User\" + i, \"Age\": 10+i, \"Gender\" : \"F\", \"Country\" : \"India\"\
    })\n>\n```\n\n为了验证插入是否成功，可以在集合上运行 `find` 命令。\n\n```\n> db.users.find()\n{ \"_id\"\
    \ : ObjectId(\"52f48cf474f8fdcfcae84f79\"), \"FName\" : \"Test\", \"LName\" :\
    \ \"User\", \"Age\" : 30, \"Gender\" : \"M\", \"Country\" : \"US\" }\n{ \"_id\"\
    \ : ObjectId(\"52f48cfb74f8fdcfcae84f7a\"), \"Name\" : \"Test User\", \"Age\"\
    \ : 45, \"Gender\" : \"F\", \"Country\" : \"US\" }\n................\n{ \"_id\"\
    \ : ObjectId(\"52f48eeb74f8fdcfcae84f8c\"), \"Name\" : \"Test User18\", \"Age\"\
    \ : 28, \"Gender\" : \"F\", \"Country\" : \"India\" }\nType \"it\" for more\n\
    >\n```\n\n用户出现在集合中。在继续之前，让我们理解一下 “Type “it” for more” 这条语句。\n\n`find` 命令返回一个指向结果集的游标。它不会一次性在屏幕上显示所有文档（结果可能成千上万或数百万），而是先显示前\
    \ 20 个文档，然后等待迭代请求（输入 `it`）以显示接下来的 20 个，以此类推，直到整个结果集显示完毕。\n\n返回的游标也可以赋值给一个变量，然后使用\
    \ `while` 循环以编程方式遍历它。游标对象也可以作为数组进行操作。\n\n在你的例子中，如果输入 `it` 并按回车键，将显示以下内容：\n\n```\n\
    > it\n{ \"_id\" : ObjectId(\"52f48eeb74f8fdcfcae84f8d\"), \"Name\" : \"Test User19\"\
    , \"Age\" : 29, \"Gender\" : \"F\", \"Country\" : \"India\" }\n{ \"_id\" : ObjectId(\"\
    52f48eeb74f8fdcfcae84f8e\"), \"Name\" : \"Test User20\", \"Age\" : 30, \"Gender\"\
    \ : \"F\", \"Country\" : \"India\" }\n>\n```\n\n由于只剩两个文档，所以它显示了剩余的两个文档。\n\n###\
    \ 6.1.4 通过显式指定 `_id` 插入\n\n在之前的插入示例中，`_id` 字段未被指定，因此是隐式添加的。在下面的例子中，你将看到在向集合插入文档时如何显式指定\
    \ `_id` 字段。\n\n显式指定 `_id` 字段时，必须牢记该字段的唯一性；否则插入操作将失败。\n\n以下命令显式指定了 `_id` 字段：\n\n\
    ```\n> db.users.insert({\"_id\":10, \"Name\": \"explicit id\"})\n```\n\n插入操作在\
    \ `users` 集合中创建了如下文档：\n\n```json\n{ \"_id\" : 10, \"Name\" : \"explicit id\" }\n\
    ```\n\n这可以通过执行以下命令来确认：\n\n```\n>db.users.find()\n```"
  raw: 'Although the context is switched to `MYDBPOC`, the database name will not
    appear if the `show dbs` command is issued because MongoDB doesn’t create a database
    until data is inserted into the database. This is in keeping with MongoDB’s dynamic
    approach to data facilitating, dynamic namespace allocation, and a simplified
    and accelerated development process. If you issue the `show dbs` command at this
    point, it will not list the `MYDBPOC` database in the list of databases because
    the database is not created until data is inserted into the database.


    The following example assumes a polymorphic collection named `users` which contains
    documents of the following two prototypes:


    `{`


    `_id: ObjectID(),`


    `FName: "First Name",`


    `LName: "Last Name",`


    `Age: 30, Gender: "M",`


    `Country: "Country"`


    `}`


    `and`


    `{`


    `_id: ObjectID(),`


    `Name: "Full Name",`


    `Age: 30,`


    `Gender: "M",`


    `Country: "Country"`


    `}`


    `and`


    `{`


    `_id: ObjectID(), Name: "Full Name", Age: 30 }`


    ### 6.1.1 Create and Insert


    You will now look at how databases and collections are created. As explained earlier,
    the documents in MongoDB are in the JSON format.


    First, by issuing the `db` command you will confirm that the context is the `mydbpoc`
    database.


    `> db`


    `mydbpoc`


    `>`


    Now you’ll see how to create documents.


    The first document complies with the first prototype whereas the second document
    complies with the second prototype. You have created two documents named user1
    and user2.


    `> user1 = {FName: "Test", LName: "User", Age:30, Gender: "M", Country: "US"}`


    `{`


    `"FName" : "Test",`


    `"LName" : "User",`


    `"Age" : 30,`


    `"Gender" : "M",`


    `"Country" : "US"`


    `}`


    `> user2 = {Name: "Test User", Age:45, Gender: "F", Country: "US"}`


    `{ "Name" : "Test User", "Age" : 45, "Gender" : "F", "Country" : "US" }`


    `>`


    You will next add both these documents (user1 and user2) to the `users` collection
    in the following order of operations:


    `> db.users.insert(user1)`


    `> db.users.insert(user2)`


    `>`


    The above operation will not only insert the two documents to the `users` collection
    but it will also create the collection as well as the database. The same can be
    verified using the `show collections` and `show dbs` commands.


    As mentioned, `show dbs` will display the list of databases.


    `> show dbs`


    `admin 0.078GB`


    `local 0.078GB`


    `mydb 0.078GB`


    `mydbproc 0.078GB`


    And `show collections` will display the list of collection in the current database.


    `> show collections`


    `system.indexes`


    `users`


    `>`


    Along with the collection `users`, the `system.indexes` collection also gets displayed.
    This `system.indexes` collection is created by default when the database is created.
    It manages the information of all the indexes of all collections within the database.


    Executing the command `db.users.find()` will display the documents in the `users`
    collection.


    `> db.users.find()`


    `{ "_id" : ObjectId("5450c048199484c9a4d26b0a"), "FName" : "Test", "LName" : "User",
    "Age" : 30, "Gender": "M", "Country" : "US" }`


    `{ "_id" : ObjectId("5450c05d199484c9a4d26b0b"), "Name" : "Test", User", "Age"
    : 45,"Gender" : "F", "Country" : "US" }`


    `>`


    You can see that the two documents you created are displayed. In addition to the
    fields you added to the docu ment, there’s an additional `_id` field that is generated
    for all of the documents.


    All documents must have a unique_`_id` field. If not explicitly specified by you,
    the same will be auto-assigned as a unique object ID by MongoDB, as shown in the
    example above.


    You didn’t explicitly insert an `_id` field but when you use the `find()` command
    to display the documents you can see an `_id` field associated with each document.


    The reason behind this is by default an index is created on the_`_id` field, which
    can be validated by issuing the `find` command on the `system.indexes` collection.


    `>db.system.indexes.find()`


    `{ "v" : 1, "key" : { "_id" : 1 }, "ns" : "mydbpoc.users", "name" : "_id_" }`


    `>`


    New indexes can be added or removed from the collection using the `ensureIndex()`
    and `dropIndex()` commands. We will cover this later in this chapter. By default,
    an index is created on the `_id` field of all collections. This default index
    cannot be dropped.


    ### 6.1.2 Explicitly Creating Collections


    In the above example, the first insert operation implicitly created the collection.
    However, the user can also explicitly create a collection before executing the
    insert statement.


    `db.createCollection("users")`


    ### 6.1.3 Inserting Documents Using Loop


    Documents can also be added to the collection using a for loop. The following
    code inserts users using for.


    `> for(var i=1; i<=20; i++) db.users.insert({"Name" : "Test User" + i, "Age":
    10+i, "Gender" : "F", "Country" : "India"})`


    `>`


    In order to verify that the insert is successful, run the `find` command on the
    collection.


    `> db.users.find()`


    `{ "_id" : ObjectId("52f48cf474f8fdcfcae84f79"), "FName" : "Test", "LName" : "User",
    "Age" : 30, "Gender" : "M", "Country" : "US" }`


    `{ "_id" : ObjectId("52f48cfb74f8fdcfcae84f7a"), "Name" : "Test User", "Age" :
    45`


    `, "Gender" : "F", "Country" : "US" }`


    `................`


    `{ "_id" : ObjectId("52f48eeb74f8fdcfcae84f8c"), "Name" : "Test User18", "Age"
    :`


    `28, "Gender" : "F", "Country" : "India" }`


    `Type "it" for more`


    `>`


    Users appear in the collection. Before you go any further, let’s understand the
    “Type “it” for more” statement.


    The `find` command returns a cursor to the result set. Instead of displaying all
    documents(which can be thousands or millions of results) in one go on the screen,
    the cursor displays first 20 documents and waits for the request to iterate (it)
    to display the next 20 and so on until all of the result set is displayed.


    The resulting cursor can also be assigned to a variable and then programmatically
    it can be iterated over using a while loop. The cursor object can also be manipulated
    as an array.


    In your case, if you type “it” and press Enter, the following will appear:


    `>` `it`


    `{ "_id" : ObjectId("52f48eeb74f8fdcfcae84f8d"), "Name" : "Test User19", "Age"
    :`


    `29, "Gender" : "F", "Country" : "India" }`


    `{ "_id" : ObjectId("52f48eeb74f8fdcfcae84f8e"), "Name" : "Test User20", "Age"
    :`


    `30, "Gender" : "F", "Country" : "India" }`


    `>`


    Since only two documents were remaining, it displays the remaining two documents.


    ### 6.1.4 Inserting by Explicitly Specifying_id


    In the previous examples of insert, the `_id` field was not specified, so it was
    implicitly added. In the following example, you will see how to explicitly specify
    the `_id` field when inserting the documents within a collection.


    While explicitly specifying the `_id` field, you have to keep in mind the uniqueness
    of the field; otherwise the insert will fail.


    The following command explicitly specifies the `_id` field:


    `> db.users.insert({"_id":10, "Name": "explicit id"})`


    The insert operation creates the following document in the `users` collection:


    `{ "_id" : 10, "Name" : "explicit id" }`


    This can be confirmed by issuing the following command:


    `>db.users.find()`'
