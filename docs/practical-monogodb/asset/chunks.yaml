- fmt: "# 4. The MongoDB Data Model\n\n> “MongoDB is designed to work with documents\
    \ without any need of predefined columns or data types (unlike relational databases),\
    \ making the data model extremely flexible.”\n\nIn this chapter, you will learn\
    \ about the MongoDB data model. You will also learn what flexible schema (polymorphic\
    \ schema) means and why it’s a significant contemplation of MongoDB data model.\n\
    \n## 3.2.2 Non-Relational Approach\n\nTraditional `RDBMS` platforms provide scalability\
    \ using a scale-up approach, which requires a faster server to increase performance.\
    \ The following issues in `RDBMS` systems led to why `MongoDB` and other `NoSQL`\
    \ databases were designed the way they are designed:\n\n*   In order to scale\
    \ out, the `RDBMS` database needs to link the data available in two or more systems\
    \ in order to report back the result. This is difficult to achieve in `RDBMS`\
    \ systems since they are designed to work when all the data is available for computation\
    \ together. Thus the data has to be available for processing at a single location.\n\
    *   In case of multiple Active-Active servers, when both are getting updated from\
    \ multiple sources there is a challenge in determining which update is correct.\n\
    *   When an application tries to read data from the second server, and the information\
    \ has been updated on the first server but has yet to be synchronized with the\
    \ second server, the information returned may be stale.\n\nThe `MongoDB` team\
    \ decided to take a non-relational approach to solving these problems. As mentioned,\
    \ `MongoDB` stores its data in `BSON` documents where all the related data is\
    \ placed together, which means everything is in one place. The queries in `MongoDB`\
    \ are based on keys in the document, so the documents can be spread across multiple\
    \ servers. Querying each server means it will check its own set of documents and\
    \ return the result. This enables linear scalability and improved performance.\n\
    \n`MongoDB` has a primary-secondary replication where the primary accepts the\
    \ write requests. If the write performance needs to be improved, then sharding\
    \ can be used; this splits the data across multiple machines and enables these\
    \ multiple machines to update different parts of the datasets. Sharding is automatic\
    \ in `MongoDB`; as more machines are added, data is distributed automatically.\n\
    \n## 3.2.3 JSON-Based Document Store\n\n`MongoDB` uses a `JSON`-based (JavaScript\
    \ Object Notation) document store for the data. `JSON`/`BSON` offers a schema-less\
    \ model, which provides flexibility in terms of database design. Unlike in `RDBMS`s,\
    \ changes can be done to the schema seamlessly.\n\nThis design also makes for\
    \ high performance by providing for grouping of relevant data together internally\
    \ and making it easily searchable.\n\nA `JSON` document contains the actual data\
    \ and is comparable to a row in `SQL`. However, in contrast to `RDBMS` rows, documents\
    \ can have dynamic schema. This means documents within a collection can have different\
    \ fields or structure, or common fields can have different type of data.\n\nA\
    \ document contains data in form of key-value pairs. Let’s understand this with\
    \ an example:\n\n```json\n{\n    \"Name\": \"ABC\",\n    \"Phone\": [\"1111111\"\
    ,\n              \"222222\"\n             ],\n    \"Fax\":\n}\n```\n\nAs mentioned,\
    \ keys and values come in pairs. The value of a key in a document can be left\
    \ blank. In the above example, the document has three keys, namely “Name,” ”Phone,”\
    \ and “Fax.” The “Fax” key has no value.\n\n## 3.2.4 Performance vs. Features\n\
    \nIn order to make `MongoDB` high performance and fast, certain features commonly\
    \ available in `RDBMS` systems are not available in `MongoDB`. `MongoDB` is a\
    \ document-oriented `DBMS` where data is stored as documents. It does not support\
    \ `JOIN`s, and it does not have fully generalized transactions. However, it does\
    \ provide support for secondary indexes, it enables users to query using query\
    \ documents, and it provides support for atomic updates at a per document level.\
    \ It provides a replica set, which is a form of master-slave replication with\
    \ automated failover, and it has built-in horizontal scaling.\n\n## 3.2.5 Running\
    \ the Database Anywhere\n\nOne of the main design decisions was the ability to\
    \ run the database from anywhere, which means it should be able to run on servers,\
    \ `VM`s, or even on the cloud using the pay-for-what-you-use service. The language\
    \ used for implementing `MongoDB` is `C++`, which enables `MongoDB` to achieve\
    \ this goal. The `10gen` site provides binaries for different `OS` platforms,\
    \ enabling `MongoDB` to run on almost any type of machine.\n\n## 3.3 SQL Comparison\n\
    \nThe following are the ways in which `MongoDB` is different from `SQL`.\n\n`MongoDB`\
    \ uses documents for storing its data, which offer a flexible schema (documents\
    \ in same collection can have different fields). This enables the users to store\
    \ nested or multi-value fields such as arrays, hashes, etc. In contrast, `RDBMS`\
    \ systems offer a fixed schema where a column’s value should have a similar data\
    \ type. Also, it’s not possible to store arrays or nested values in a cell.\n\n\
    `MongoDB` doesn’t provide support for `JOIN` operations, like in `SQL`. However,\
    \ it enables the user to store all relevant data together in a single document,\
    \ avoiding at the periphery the usage of `JOIN`s. It has a workaround to overcome\
    \ this issue. We will be discussing this in more detail in a later chapter.\n\n\
    `MongoDB` doesn’t provide support for transactions in the same way as `SQL`. However,\
    \ it guarantees atomicity at the document level. Also, it uses an isolation operator\
    \ to isolate write operations that affect multiple documents, but it does not\
    \ provide “all-or-nothing” atomicity for multi-document write operations.\n\n\
    ## 3.4 Summary\n\nIn this chapter, you got to know `MongoDB`, its history, and\
    \ brief details on design of the `MongoDB` system. In the next chapters, you will\
    \ learn more about `MongoDB`’s data model.\n\n**Footnotes**\n\n[1](#A332296_1_En_3_Chapter.html#Fn1_source)\
    \ The Register, Cade Metz, “MongoDB daddy: My baby beats Google BigTable”, [`www.theregister.co.uk/2011/05/25/the_once_and_future_mongodb/`](http://www.theregister.co.uk/2011/05/25/the_once_and_future_mongodb/)),\
    \ May 25, 2011."
  raw: '### 3.2.2 Non-Relational Approach


    Traditional RDBMS platforms provide scalability using a scale-up approach, which
    requires a faster server to increase performance. The following issues in RDBMS
    systems led to why MongoDB and other NoSQL databases were designed the way they
    are designed:


    *   In order to scale out, the RDBMS database needs to link the data available
    in two or more systems in order to report back the result. This is difficult to
    achieve in RDBMS systems since they are designed to work when all the data is
    available for computation together. Thus the data has to be available for processing
    at a single location.

    *   In case of multiple Active-Active servers, when both are getting updated from
    multiple sources there is a challenge in determining which update is correct.

    *   When an application tries to read data from the second server, and the information
    has been updated on the first server but has yet to be synchronized with the second
    server, the information returned may be stale.


    The MongoDB team decided to take a non-relational approach to solving these problems.
    As mentioned, MongoDB stores its data in BSON documents where all the related
    data is placed together, which means everything is in one place. The queries in
    MongoDB are based on keys in the document, so the documents can be spread across
    multiple servers. Querying each server means it will check its own set of documents
    and return the result. This enables linear scalability and improved performance.


    MongoDB has a primary-secondary replication where the primary accepts the write
    requests. If the write performance needs to be improved, then sharding can be
    used; this splits the data across multiple machines and enables these multiple
    machines to update different parts of the datasets. Sharding is automatic in MongoDB;
    as more machines are added, data is distributed automatically.


    ### 3.2.3 JSON-Based Document Store


    MongoDB uses a JSON-based (JavaScript Object Notation) document store for the
    data. JSON/BSON offers a schema-less model, which provides flexibility in terms
    of database design. Unlike in RDBMSs, changes can be done to the schema seamlessly.


    This design also makes for high performance by providing for grouping of relevant
    data together internally and making it easily searchable.


    A JSON document contains the actual data and is comparable to a row in SQL. However,
    in contrast to RDBMS rows, documents can have dynamic schema. This means documents
    within a collection can have different fields or structure, or common fields can
    have different type of data.


    A document contains data in form of key-value pairs. Let’s understand this with
    an example:


    `{`


    `"Name": "ABC",`


    `"Phone": ["1111111",`


    `........"222222"`


    `........],`


    `"Fax":..`


    `}`


    As mentioned, keys and values come in pairs. The value of a key in a document
    can be left blank. In the above example, the document has three keys, namely “Name,”
    ”Phone,” and “Fax.” The “Fax” key has no value.


    ### 3.2.4 Performance vs. Features


    In order to make MongoDB high performance and fast, certain features commonly
    available in RDBMS systems are not available in MongoDB. MongoDB is a document-oriented
    DBMS where data is stored as documents. It does not support JOINs, and it does
    not have fully generalized transactions. However, it does provide support for
    secondary indexes, it enables users to query using query documents, and it provides
    support for atomic updates at a per document level. It provides a replica set,
    which is a form of master-slave replication with automated failover, and it has
    built-in horizontal scaling.


    ### 3.2.5 Running the Database Anywhere


    One of the main design decisions was the ability to run the database from anywhere,
    which means it should be able to run on servers, VMs, or even on the cloud using
    the pay-for-what-you-use service. The language used for implementing MongoDB is
    C++, which enables MongoDB to achieve this goal. The 10gen site provides binaries
    for different OS platforms, enabling MongoDB to run on almost any type of machine.


    ## 3.3 SQL Comparison


    The following are the ways in which MongoDB is different from SQL.


    MongoDB uses documents for storing its data, which offer a flexible schema (documents
    in same collection can have different fields). This enables the users to store
    nested or multi-value fields such as arrays, hashes, etc. In contrast, RDBMS systems
    offer a fixed schema where a column’s value should have a similar data type. Also,
    it’s not possible to store arrays or nested values in a cell.   MongoDB doesn’t
    provide support for JOIN operations, like in SQL. However, it enables the user
    to store all relevant data together in a single document, avoiding at the periphery
    the usage of JOINs. It has a workaround to overcome this issue. We will be discussing
    this in more detail in a later chapter.   MongoDB doesn’t provide support for
    transactions in the same way as SQL. However, it guarantees atomicity at the document
    level. Also, it uses an isolation operator to isolate write operations that affect
    multiple documents, but it does not provide “all-or-nothing” atomicity for multi-document
    write operations.


    ## 3.4 Summary


    In this chapter, you got to know MongoDB, its history, and brief details on design
    of the MongoDB system. In the next chapters, you will learn more about MongoDB’s
    data model.


    Footnotes [1](#A332296_1_En_3_Chapter.html#Fn1_source)


    The Register, Cade Metz, “MongoDB daddy: My baby beats Google BigTable”,


    [`www.theregister.co.uk/2011/05/25/the_once_and_future_mongodb/`](http://www.theregister.co.uk/2011/05/25/the_once_and_future_mongodb/)
    ), May 25, 2011.


    # 4. The MongoDB Data Model


    > “MongoDB is designed to work with documents without any need of predefined columns
    or data types (unlike relational databases), making the data model extremely flexible.”


    In this chapter, you will learn about the MongoDB data model. You will also learn
    what flexible schema (polymorphic schema) means and why it’s a significant contemplation
    of MongoDB data model.'
  trans: "\n# 4. MongoDB 数据模型\n\n> “MongoDB 旨在处理文档，无需预定义列或数据类型（与关系型数据库不同），这使得其数据模型极其灵活。”\n\
    \n在本章中，你将学习 MongoDB 的数据模型。你还将了解灵活模式（或称多态模式）的含义，以及为何它是 MongoDB 数据模型设计中的一个重要考量。\n\
    \n## 3.2.2 非关系型方法\n\n传统的 `RDBMS` 平台通过纵向扩展（scale-up）方式提供可扩展性，这需要更快的服务器来提升性能。`RDBMS`\
    \ 系统中存在的以下问题，促使了 `MongoDB` 及其他 `NoSQL` 数据库被设计成如今的形式：\n\n*   为了进行横向扩展，`RDBMS` 数据库需要将分布在两个或多个系统中的数据关联起来才能返回结果。这在\
    \ `RDBMS` 系统中难以实现，因为它们的设计前提是所有数据需一起参与计算。因此，数据必须在单一位置进行处理。\n*   在多活（Active-Active）服务器的情况下，当两台服务器都接收来自多源的更新时，判定哪个更新是正确的存在挑战。\n\
    *   当应用程序尝试从第二台服务器读取数据，而信息已在第一台服务器上更新但尚未同步到第二台时，返回的信息可能是陈旧的。\n\n`MongoDB` 团队决定采用非关系型方法来解决这些问题。如前所述，`MongoDB`\
    \ 将其数据存储在 `BSON` 文档中，所有相关数据都存放在一起，这意味着所有内容都位于一处。`MongoDB` 中的查询基于文档中的键，因此文档可以分布在多个服务器上。查询每个服务器意味着它将检查自身的文档集合并返回结果。这实现了线性可扩展性和性能提升。\n\
    \n`MongoDB` 采用主从复制，其中主节点接受写入请求。如果需要提升写入性能，则可以使用分片（sharding）；它将数据分布在多台机器上，并使这些机器能够更新数据集的不同部分。分片在\
    \ `MongoDB` 中是自动的；随着更多机器的加入，数据会被自动分配。\n\n## 3.2.3 基于 JSON 的文档存储\n\n`MongoDB` 使用基于\
    \ `JSON`（JavaScript 对象表示法）的文档存储数据。`JSON`/`BSON` 提供无模式模型，在数据库设计方面提供了灵活性。与 `RDBMS`\
    \ 不同，可以无缝地对模式进行更改。\n\n这种设计还通过在内部将相关数据分组存放并使其易于搜索来实现高性能。\n\n一个 `JSON` 文档包含实际数据，可与\
    \ `SQL` 中的一行相比较。然而，与 `RDBMS` 行相比，文档可以具有动态模式。这意味着同一集合中的文档可以有不同的字段或结构，或者公共字段可以包含不同类型的数据。\n\
    \n文档以键值对的形式包含数据。让我们通过一个例子来理解：\n\n```json\n{\n    \"Name\": \"ABC\",\n    \"Phone\"\
    : [\"1111111\",\n              \"222222\"\n             ],\n    \"Fax\":\n}\n\
    ```\n\n如前所述，键值成对出现。文档中某个键的值可以留空。在上面的例子中，文档有三个键，分别是 \"Name\"、\"Phone\" 和 \"Fax\"\
    。\"Fax\" 键没有值。\n\n## 3.2.4 性能与功能权衡\n\n为了使 `MongoDB` 具有高性能和高速，`RDBMS` 系统中常见的一些功能在\
    \ `MongoDB` 中并未提供。`MongoDB` 是面向文档的 `DBMS`，数据以文档形式存储。它不支持 `JOIN` 操作，也没有完全通用的事务。然而，它确实提供二级索引支持，允许用户使用查询文档进行查询，并在单文档级别提供原子更新支持。它提供副本集，这是一种具有自动故障转移的主从复制形式，并且具有内置的水平扩展能力。\n\
    \n## 3.2.5 任意位置运行数据库\n\n一个主要的设计考量是能够从任何地方运行数据库，这意味着它应该能够在服务器、`VM`（虚拟机）上运行，甚至可以在云上通过按使用付费的服务运行。实现\
    \ `MongoDB` 所用的语言是 `C++`，这使得 `MongoDB` 能够实现这一目标。`10gen` 网站为不同的 `OS` 平台提供二进制文件，使\
    \ `MongoDB` 几乎能在任何类型的机器上运行。\n\n## 3.3 SQL 比较\n\n以下是 `MongoDB` 与 `SQL` 的不同之处。\n\
    \n`MongoDB` 使用文档存储数据，提供灵活的模式（同一集合中的文档可以有不同的字段）。这使得用户能够存储嵌套或多值字段，例如数组、哈希等。相比之下，`RDBMS`\
    \ 系统提供固定模式，其中某一列的值应具有相似的数据类型。而且，在单元格中存储数组或嵌套值是不可能的。\n\n`MongoDB` 不支持像 `SQL` 中那样的\
    \ `JOIN` 操作。但是，它允许用户将所有相关数据一起存储在单个文档中，从而在边缘避免了使用 `JOIN`。它提供了一种变通方法来解决这个问题。我们将在后续章节中更详细地讨论这一点。\n\
    \n`MongoDB` 不以与 `SQL` 相同的方式支持事务。但是，它保证文档级别的原子性。此外，它使用隔离操作符来隔离影响多个文档的写入操作，但不为多文档写入操作提供“全有或全无”的原子性。\n\
    \n## 3.4 总结\n\n在本章中，你了解了 `MongoDB`、其历史以及 `MongoDB` 系统设计的简要详情。在接下来的章节中，你将学习更多关于\
    \ `MongoDB` 数据模型的知识。\n\n**脚注**\n\n1 The Register, Cade Metz, “MongoDB 之父：我的孩子胜过\
    \ Google BigTable”，[`www.theregister.co.uk/2011/05/25/the_once_and_future_mongodb/`](http://www.theregister.co.uk/2011/05/25/the_once_and_future_mongodb/))，2011\
    \ 年 5 月 25 日。\n"
- fmt: "## 4.1 The Data Model\n\nIn the previous chapter, you saw that MongoDB is\
    \ a document-based database system where the documents can have a flexible schema.\
    \ This means that documents within a collection can have different (or same) sets\
    \ of fields. This affords you more flexibility when dealing with data.\n\nIn this\
    \ chapter, you will explore MongoDB’s flexible data model. Wherever required,\
    \ we will demonstrate the difference in the approach compared to RDBMS systems.\n\
    \nA MongoDB deployment can have many databases. Each database is a set of collections.\
    \ Collections are similar to the concept of tables in SQL; however, they are schemaless.\
    \ Each collection can have multiple documents. Think of a document as a row in\
    \ SQL. Figure [4-1](#A332296_1_En_4_Chapter.html#Fig1) depicts the MongoDB database\
    \ model .\n\n![A332296_1_En_4_Fig1_HTML.jpg](A332296_1_En_4_Fig1_HTML.jpg)\n\n\
    Figure 4-1.\n\nMongoDB database model\n\nIn an RDBMS system, since the table structures\
    \ and the data types for each column are fixed, you can only add data of a particular\
    \ data type in a column. In MongoDB, a collection is a collection of documents\
    \ where data is stored as key-value pairs.\n\nLet’s understand with an example\
    \ how data is stored in a document. The following document holds the name and\
    \ phone numbers of the users:\n\n`{\"Name\": \"ABC\", \"Phone\": [\"1111111\"\
    , \"222222\" ] }`\n\nDynamic schema means that documents within the same collection\
    \ can have the same or different sets of fields or structure, and even common\
    \ fields can store different types of values across documents. There’s no rigidness\
    \ in the way data is stored in the documents of a collection.\n\nLet’s see an\
    \ example of a `Region` collection:\n\n`{ \"R_ID\" : \"REG001\", \"Name\" : \"\
    United States\" }`\n\n`{ \"R_ID\" :1234, \"Name\" : \"New York\", \"Country\"\
    \ : \"United States\" }`\n\nIn this code, you have two documents in the `Region`\
    \ collection. Although both documents are part of a single collection, they have\
    \ different structures: the second collection has an additional field of information,\
    \ which is country. In fact, if you look at the “`R_ID`” field, it stores a `STRING`\
    \ value in the first document whereas it’s a number in the second document.\n\n\
    Thus a collection’s documents can have entirely different schemas. It falls to\
    \ the application to store the documents in a particular collection together or\
    \ to have multiple collections.\n\n### 4.1.1 `JSON` and `BSON`\n\nMongoDB is a\
    \ document-based database. It uses Binary JSON for storing its data.\n\nIn this\
    \ section, you will learn about `JSON` and Binary-JSON (`BSON`) . `JSON` stands\
    \ for JavaScript Object Notation. It’s a standard used for data interchange in\
    \ today’s modern Web (along with `XML`). The format is human and machine readable.\
    \ It is not only a great way to exchange data but also a nice way to store data.\n\
    \nAll the basic data types (such as strings, numbers, Boolean values, and arrays)\
    \ are supported by `JSON`.\n\nThe following code shows what a `JSON` document\
    \ looks like:\n\n```\n{\n    \"_id\" : 1,\n    \"name\" : { \"first\" : \"John\"\
    , \"last\" : \"Doe\" },\n    \"publications\" : [\n        {\n            \"title\"\
    \ : \"First Book\",\n            \"year\" : 1989,\n            \"publisher\" :\
    \ \"publisher1\"\n        },\n        { \"title\" : \"Second Book\",\n       \
    \     \"year\" : 1999,\n            \"publisher\" : \"publisher2\"\n        }\n\
    \    ]\n}\n```\n\n`JSON` lets you keep all the related pieces of information together\
    \ in one place, which provides excellent performance. It also enables the updating\
    \ of a document to be independent. It is schemaless.\n\n#### 4.1.1.1 Binary `JSON`\
    \ (`BSON`)\n\nMongoDB stores the `JSON` document in a binary-encoded format. This\
    \ is termed as `BSON`. The `BSON` data model is an extended form of the `JSON`\
    \ data model.\n\nMongoDB’s implementation of a `BSON` document is fast, highly\
    \ traversable, and lightweight. It supports embedding of arrays and objects within\
    \ other arrays, and also enables MongoDB to reach inside the objects to build\
    \ indexes and match objects against queried expressions, both on top-level and\
    \ nested `BSON` keys.\n\n### 4.1.2 The Identifier (`_id`)\n\nYou have seen that\
    \ MongoDB stores data in documents. Documents are made up of key-value pairs.\
    \ Although a document can be compared to a row in RDBMS, unlike a row, documents\
    \ have flexible schema. A key, which is nothing but a label, can be roughly compared\
    \ to the column name in RDBMS. A key is used for querying data from the documents.\
    \ Hence, like a RDBMS primary key (used to uniquely identify each row), you need\
    \ to have a key that uniquely identifies each document within a collection. This\
    \ is referred to as `_id` in MongoDB.\n\nIf you have not explicitly specified\
    \ any value for a key, a unique value will be automatically generated and assigned\
    \ to it by MongoDB. This key value is immutable and can be of any data type except\
    \ arrays.\n\n### 4.1.3 Capped Collection\n\nYou are now well versed with collections\
    \ and documents. Let’s talk about a special type of collection called a capped\
    \ collection.\n\nMongoDB has a concept of capping the collection. This means it\
    \ stores the documents in the collection in the inserted order. As the collection\
    \ reaches its limit, the documents will be removed from the collection in `FIFO`\
    \ (first in, first out) order. This means that the least recently inserted documents\
    \ will be removed first.\n\nThis is good for use cases where the order of insertion\
    \ is required to be maintained automatically, and deletion of records after a\
    \ fixed size is required. One such use cases is log files that get automatically\
    \ truncated after a certain size.\n\n**Note**\n\nMongoDB itself uses capped collections\
    \ for maintaining its replication logs. Capped collection guarantees preservation\
    \ of the data in insertion order, so queries retrieving data in the insertion\
    \ order return results quickly and don’t need an index. Updates that change the\
    \ document size are not allowed.\n\n## 4.2 Polymorphic Schemas\n\nAs you are already\
    \ conversant with the schemaless nature of MongoDB data structure, let’s now explore\
    \ polymorphic schemas and use cases.\n\nA polymorphic schema is a schema where\
    \ a collection has documents of different types or schemas. A good example of\
    \ this schema is a collection named `Users`. Some user documents might have an\
    \ extra fax number or email address, while others might have only phone numbers,\
    \ yet all these documents coexist within the same `Users` collection. This schema\
    \ is generally referred to as a polymorphic schema.\n\nIn this part of the chapter,\
    \ you’ll explore the various reasons for using a polymorphic schema ."
  raw: '## 4.1 The Data Model


    In the previous chapter, you saw that MongoDB is a document-based database system
    where the documents can have a flexible schema. This means that documents within
    a collection can have different (or same) sets of fields. This affords you more
    flexibility when dealing with data.


    In this chapter, you will explore MongoDB’s flexible data model. Wherever required,
    we will demonstrate the difference in the approach compared to RDBMS systems.


    A MongoDB deployment can have many databases. Each database is a set of collections.
    Collections are similar to the concept of tables in SQL; however, they are schemaless.
    Each collection can have multiple documents. Think of a document as a row in SQL.
    Figure [4-1](#A332296_1_En_4_Chapter.html#Fig1) depicts the MongoDB database model
    .


    ![A332296_1_En_4_Fig1_HTML.jpg](A332296_1_En_4_Fig1_HTML.jpg)


    Figure 4-1.


    MongoDB database model


    In an RDBMS system, since the table structures and the data types for each column
    are fixed, you can only add data of a particular data type in a column. In MongoDB,
    a collection is a collection of documents where data is stored as key-value pairs.


    Let’s understand with an example how data is stored in a document. The following
    document holds the name and phone numbers of the users:


    `{"Name": "ABC", "Phone": ["1111111", "222222" ] }`


    Dynamic schema means that documents within the same collection can have the same
    or different sets of fields or structure, and even common fields can store different
    types of values across documents. There’s no rigidness in the way data is stored
    in the documents of a collection.


    Let’s see an example of a Region collection:


    `{ "R_ID" : "REG001", "Name" : "United States" }`


    `{ "R_ID" :1234, "Name" : "New York", "Country" : "United States" }`


    In this code, you have two documents in the Region collection. Although both documents
    are part of a single collection, they have different structures: the second collection
    has an additional field of information, which is country. In fact, if you look
    at the “R_ID” field, it stores a STRING value in the first document whereas it’s
    a number in the second document.


    Thus a collection’s documents can have entirely different schemas. It falls to
    the application to store the documents in a particular collection together or
    to have multiple collections.


    ### 4.1.1 JSON and BSON


    MongoDB is a document-based database. It uses Binary JSON for storing its data.


    In this section, you will learn about JSON and Binary-JSON (BSON) . JSON stands
    for JavaScript Object Notation. It’s a standard used for data interchange in today’s
    modern Web (along with XML). The format is human and machine readable. It is not
    only a great way to exchange data but also a nice way to store data.


    All the basic data types (such as strings, numbers, Boolean values, and arrays)
    are supported by JSON.


    The following code shows what a JSON document looks like:


    `{`


    `"_id" : 1,`


    `"name" : { "first" : "John", "last" : "Doe" },`


    `"publications" : [`


    `{`


    `"title" : "First Book",`


    `"year" : 1989,`


    `"publisher" : "publisher1"`


    `},`


    `{ "title" : "Second Book",`


    `"year" : 1999,`


    `"publisher" : "publisher2"`


    `}`


    `]`


    `}`


    JSON lets you keep all the related pieces of information together in one place,
    which provides excellent performance. It also enables the updating of a document
    to be independent. It is schemaless.


    #### 4.1.1.1 Binary JSON (BSON)


    MongoDB stores the JSON document in a binary-encoded format. This is termed as
    BSON. The BSON data model is an extended form of the JSON data model.


    MongoDB’s implementation of a BSON document is fast, highly traversable, and lightweight.
    It supports embedding of arrays and objects within other arrays, and also enables
    MongoDB to reach inside the objects to build indexes and match objects against
    queried expressions, both on top-level and nested BSON keys.


    ### 4.1.2 The Identifier (_id)


    You have seen that MongoDB stores data in documents. Documents are made up of
    key-value pairs. Although a document can be compared to a row in RDBMS, unlike
    a row, documents have flexible schema. A key, which is nothing but a label, can
    be roughly compared to the column name in RDBMS. A key is used for querying data
    from the documents. Hence, like a RDBMS primary key (used to uniquely identify
    each row), you need to have a key that uniquely identifies each document within
    a collection. This is referred to as _id in MongoDB.


    If you have not explicitly specified any value for a key, a unique value will
    be automatically generated and assigned to it by MongoDB. This key value is immutable
    and can be of any data type except arrays.


    ### 4.1.3 Capped Collection


    You are now well versed with collections and documents. Let’s talk about a special
    type of collection called a capped collection.


    MongoDB has a concept of capping the collection. This means it stores the documents
    in the collection in the inserted order. As the collection reaches its limit,
    the documents will be removed from the collection in FIFO (first in, first out)
    order. This means that the least recently inserted documents will be removed first.


    This is good for use cases where the order of insertion is required to be maintained
    automatically, and deletion of records after a fixed size is required. One such
    use cases is log files that get automatically truncated after a certain size.


    Note


    MongoDB itself uses capped collections for maintaining its replication logs. Capped
    collection guarantees preservation of the data in insertion order, so queries
    retrieving data in the insertion order return results quickly and don’t need an
    index. Updates that change the document size are not allowed.


    ## 4.2 Polymorphic Schemas


    As you are already conversant with the schemaless nature of MongoDB data structure,
    let’s now explore polymorphic schemas and use cases.


    A polymorphic schema is a schema where a collection has documents of different
    types or schemas. A good example of this schema is a collection named Users. Some
    user documents might have an extra fax number or email address, while others might
    have only phone numbers, yet all these documents coexist within the same Users
    collection. This schema is generally referred to as a polymorphic schema.


    In this part of the chapter, you’ll explore the various reasons for using a polymorphic
    schema .'
  trans: "\n## 4.1 数据模型\n\n在上一章中，你了解到 MongoDB 是一个基于文档的数据库系统，其中的文档可以拥有灵活的模式。这意味着同一集合中的文档可以拥有不同（或相同）的字段集合。这让你在处理数据时更具灵活性。\n\
    \n本章，你将探索 MongoDB 的灵活数据模型。在需要之处，我们会演示其与关系数据库管理系统（RDBMS）方法的不同之处。\n\n一个 MongoDB\
    \ 部署可以包含多个数据库。每个数据库是一组集合的集合。集合类似于 SQL 中的表的概念；然而，它们是无模式的。每个集合可以包含多个文档。可以将文档视为 SQL\
    \ 中的一行。图 4-1 描述了 MongoDB 的数据库模型。\n\n![A332296_1_En_4_Fig1_HTML.jpg](img/A332296_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1.\n\nMongoDB 数据库模型\n\n在 RDBMS 系统中，由于表结构和每列的数据类型是固定的，你只能在列中添加特定数据类型的数据。在\
    \ MongoDB 中，集合是文档的集合，其中数据以键值对的形式存储。\n\n让我们通过一个例子来理解数据如何在文档中存储。下面的文档保存了用户的姓名和电话号码：\n\
    \n`{\"Name\": \"ABC\", \"Phone\": [\"1111111\", \"222222\" ] }`\n\n动态模式意味着同一集合中的文档可以拥有相同或不同的字段集合或结构，甚至相同的字段在不同文档中可以存储不同类型的值。数据在集合文档中的存储方式没有严格的限制。\n\
    \n让我们看一个 `Region` 集合的例子：\n\n`{ \"R_ID\" : \"REG001\", \"Name\" : \"United States\"\
    \ }`\n\n`{ \"R_ID\" :1234, \"Name\" : \"New York\", \"Country\" : \"United States\"\
    \ }`\n\n在这段代码中，`Region` 集合中有两个文档。尽管两个文档属于同一个集合，但它们的结构不同：第二个文档多了一个国家信息字段。实际上，如果你观察\
    \ \"`R_ID`\" 字段，它在第一个文档中存储的是 `STRING` 值，而在第二个文档中是数字。\n\n因此，一个集合的文档可以拥有完全不同的模式。将文档存储在一个特定集合中还是使用多个集合，这取决于应用程序的设计。\n\
    \n### 4.1.1 `JSON` 和 `BSON`\n\nMongoDB 是一个基于文档的数据库。它使用二进制 JSON（Binary JSON）来存储数据。\n\
    \n在本节中，你将了解 `JSON` 和二进制 JSON（`BSON`）。`JSON` 代表 JavaScript 对象表示法。它是当今现代 Web（与 `XML`\
    \ 一起）用于数据交换的标准。该格式既对人友好，也对机器可读。它不仅是交换数据的好方法，也是存储数据的好方式。\n\n`JSON` 支持所有基本数据类型（如字符串、数字、布尔值和数组）。\n\
    \n以下代码展示了一个 `JSON` 文档的样子：\n\n```\n{\n    \"_id\" : 1,\n    \"name\" : { \"first\"\
    \ : \"John\", \"last\" : \"Doe\" },\n    \"publications\" : [\n        {\n   \
    \         \"title\" : \"First Book\",\n            \"year\" : 1989,\n        \
    \    \"publisher\" : \"publisher1\"\n        },\n        { \"title\" : \"Second\
    \ Book\",\n            \"year\" : 1999,\n            \"publisher\" : \"publisher2\"\
    \n        }\n    ]\n}\n```\n\n`JSON` 让你将所有相关信息保持在一个地方，这提供了出色的性能。它还使得更新文档能够独立进行。它是无模式的。\n\
    \n#### 4.1.1.1 二进制 `JSON` (`BSON`)\n\nMongoDB 以二进制编码格式存储 `JSON` 文档。这被称为 `BSON`。`BSON`\
    \ 数据模型是 `JSON` 数据模型的扩展形式。\n\nMongoDB 对 `BSON` 文档的实现速度快、可遍历性高且轻量级。它支持在其他数组内嵌套数组和对象，并且使\
    \ MongoDB 能够深入对象内部以构建索引并根据查询表达式匹配对象，这些操作既适用于顶级 `BSON` 键，也适用于嵌套的 `BSON` 键。\n\n\
    ### 4.1.2 标识符 (`_id`)\n\n你已经了解到 MongoDB 将数据存储在文档中。文档由键值对组成。虽然文档可以比作 RDBMS 中的一行，但与行不同，文档具有灵活的模式。键（Key）只是一个标签，可以大致比作\
    \ RDBMS 中的列名。键用于从文档中查询数据。因此，就像 RDBMS 主键（用于唯一标识每一行）一样，你需要一个键来唯一标识集合中的每个文档。在 MongoDB\
    \ 中，这被称为 `_id`。\n\n如果你没有为某个键显式指定任何值，MongoDB 会自动生成一个唯一值并分配给它。这个键值是不可变的，并且可以是除数组之外的任何数据类型。\n\
    \n### 4.1.3 定容量集合\n\n你现在对集合和文档已经很熟悉了。让我们谈谈一种特殊类型的集合，称为定容量集合。\n\nMongoDB 有一个限制集合容量的概念。这意味着它按照插入顺序存储集合中的文档。当集合达到其大小限制时，文档将按照\
    \ `FIFO`（先进先出）顺序从集合中移除。这意味着最近插入最少的文档将首先被移除。\n\n这对于需要自动维护插入顺序，并且在达到固定大小后需要删除记录的用例来说非常有用。其中一个用例是日志文件，它们会在达到一定大小后自动截断。\n\
    \n**注意**\n\nMongoDB 本身使用定容量集合来维护其复制日志。定容量集合保证按插入顺序保留数据，因此按插入顺序检索数据的查询可以快速返回结果，并且不需要索引。不允许进行更改文档大小的更新。\n\
    \n## 4.1.2 多态模式\n\n由于你已经熟悉了 MongoDB 数据结构的无模式特性，现在让我们来探讨多态模式及其用例。\n\n多态模式是指一个集合包含不同类型或模式的文档。这种模式的一个好例子是名为\
    \ `Users` 的集合。一些用户文档可能包含额外的传真号码或电子邮件地址，而另一些可能只有电话号码，但所有这些文档都共存于同一个 `Users` 集合中。这种模式通常被称为多态模式。\n\
    \n在本章的这一部分，你将探索使用多态模式的各种原因。\n"
- fmt: "### 4.2.1 面向对象编程\n\n面向对象编程使你能够通过继承让类共享数据和行为。它还允许你在父类中定义函数，这些函数可以在子类中被重写，从而在不同的上下文中发挥不同的作用。换句话说，你可以使用相同的函数名来操作子类和父类，尽管底层的实现可能有所不同。这个特性被称为多态。\n\
    \n在这种情况下，需求是能够拥有一个模式，使得所有相关的对象集或层次结构中的对象可以一起适配，并且能够以相同的方式被检索。\n\n让我们考虑一个例子。假设你有一个应用程序，允许用户上传和分享不同类型的内容，如HTML页面、文档、图像、视频等。尽管上述许多内容类型之间有许多共同的字段（如名称、ID、作者、上传日期和时间），但并非所有字段都是相同的。例如，在图像的情况下，你有一个保存图像内容的二进制字段，而HTML页面则有一个保存HTML内容的大型文本字段。\n\
    \n在这种情况下，可以使用MongoDB的多态模式，其中所有内容节点类型都存储在同一个集合中，例如`LoadContent`，并且每个文档只包含相关的字段。\n\
    \n```json\n// \"文档集合\" - \"HTMLPage\" 文档\n{\n    _id: 1,\n    title: \"Hello\"\
    ,\n    type: \"HTMLpage\",\n    text: \"<html>Hi..Welcome to my world</html>\"\
    \n}\n...\n// 文档集合也有一个 \"Picture\" 文档\n{\n    _id: 3,\n    title: \"Family Photo\"\
    ,\n    type: \"JPEG\",\n    sizeInMB: 10\n}\n```\n\n这种模式不仅使你能够将具有不同结构的相关数据存储在同一个集合中，还简化了查询。同一个集合既可以用于查询公共字段（例如获取特定日期和时间上传的所有内容），也可以用于查询特定字段（例如查找大小超过X\
    \ MB的图像）。\n\n因此，面向对象编程是使用多态模式有意义的用例之一。\n\n### 4.2.2 模式演进\n\n当你使用数据库时，最重要的考虑因素之一是模式演进（即模式更改对运行中应用程序的影响）。设计应尽可能减少对应用程序的影响，意味着没有或最少的停机时间、没有或极少的代码更改等。\n\
    \n通常，模式演进通过执行迁移脚本来实现，该脚本将数据库模式从旧版本升级到新版本。如果数据库未处于生产环境，脚本可以简单地删除并重新创建数据库。然而，如果数据库处于生产环境并包含实时数据，迁移脚本将很复杂，因为数据需要被保留。脚本应考虑到这一点。虽然MongoDB提供了一个`Update`选项，可用于更新集合中所有文档的结构（如果有新增字段），但想象一下，如果你的集合中有成千上万个文档，这样做会产生什么影响。这将非常缓慢，并对底层应用程序的性能产生负面影响。实现这一点的一种方法是，将新结构添加到集合中新增的文档中，然后在应用程序仍在运行时，逐步在后台迁移集合。这是拥有\
    \ polymorphic 模式具有优势的众多用例之一。\n\n例如，假设你正在处理一个`Tickets`集合，其中包含工单详细信息的文档，如下所示：\n\n\
    ```json\n// \"Ticket1\" 文档 (存储在 \"Tickets\" 集合中)\n{\n    _id: 1,\n    Priority:\
    \ \"High\",\n    type: \"Incident\",\n    text: \"Printer not working\"\n}\n```\n\
    \n在某个时候，应用程序团队决定在工单文档结构中引入一个“简短描述”字段，因此最好的选择是在新的工单文档中引入这个新字段。在应用程序内，你嵌入一段代码来处理检索“旧式”文档（没有简短描述字段）和“新式”文档（有简短描述字段）。旧式文档可以逐渐迁移到新式文档。迁移完成后，如果需要，可以更新代码以移除为处理缺失字段而嵌入的代码片段。\n\
    \n## 4.3 小结\n\n在本章中，你学习了MongoDB数据模型。你还了解了标识符和固定集合。本章最后，你理解了灵活模式的优势。\n\n在下一章中，你将开始使用MongoDB。你将进行MongoDB的安装和配置。\n\
    \n# 5. MongoDB - 安装与配置\n\n> “MongoDB是一个跨平台的数据库。”\n\n在本章中，你将了解在Windows和Linux上安装MongoDB的过程。\n\
    \n## 5.1 选择你的版本\n\nMongoDB可以在大多数平台上运行。所有可用软件包的列表可在MongoDB下载页面 [`www.mongodb.org/downloads`](http://www.mongodb.org/downloads)\
    \ 上找到。\n\n适合你环境的正确版本取决于你的服务器操作系统和处理器类型。MongoDB支持32位和64位架构，但建议在生产环境中使用64位。\n\n\
    **32位限制**\n\n这是由于MongoDB使用了内存映射文件。这限制了32位构建版本只能处理大约2GB的数据。出于性能原因，建议在生产环境中使用64位构建版本。\n\
    \n在撰写本书时，最新的MongoDB生产版本是3.0.4。适用于Linux、Windows、Solaris和Mac OS X的MongoDB下载包可用。\n\
    \nMongoDB下载页面分为以下部分：\n\n*   当前稳定版本 (3.0.4) – 2015年6月16日\n*   先前版本 (稳定版)\n*   开发版本\
    \ (不稳定版)\n\n当前版本是最近可用的最稳定版本，在撰写本书时为3.0.4。当新版本发布时，之前的稳定版本将被移至“先前版本”部分。\n\n开发版本，顾名思义，是仍在开发中的版本，因此被标记为不稳定。这些版本可能有额外的功能，但由于仍在开发阶段，可能不稳定。你可以使用开发版本尝试新功能，并向10gen提供有关功能和遇到问题的反馈。\n\
    \n## 5.2 在Linux上安装MongoDB\n\n本节介绍如何在LINUX系统上安装MongoDB。在接下来的演示中，我们将使用Ubuntu Linux发行版。你可以通过手动方式或通过软件仓库安装MongoDB。我们将引导你完成这两种选项。"
  raw: '### 4.2.1 Object-Oriented Programming


    Object-oriented programming enables you to have classes share data and behaviors
    using inheritance. It also lets you define functions in the parent class that
    can be overridden in the child class and thus will function differently in a different
    context. In other words, you can use the same function name to manipulate the
    child as well as the parent class, although under the hood the implementations
    might be different. This feature is referred to as polymorphism.


    The requirement in this case is the ability to have a schema wherein all of the
    related sets of objects or objects within a hierarchy can fit in together and
    can also be retrieved identically.


    Let’s consider an example. Suppose you have an application that lets the user
    upload and share different content types such as HTML pages, documents, images,
    videos, etc. Although many of the fields are common across all of the above-mentioned
    content types (such as Name, ID, Author, Upload Date, and Time), not all fields
    are identical. For example, in the case of images, you have a binary field that
    holds the image content, whereas an HTML page has a large text field to hold the
    HTML content.


    In this scenario, the MongoDB polymorphic schema can be used wherein all of the
    content node types are stored in the same collection, such as LoadContent, and
    each document has relevant fields only.


    `// "Document collections" - "HTMLPage" document`


    `{`


    `_id: 1,`


    `title: "Hello",`


    `type: "HTMLpage",`


    `text: "<html>Hi..Welcome to my world</html>"`


    `}`


    `...`


    `// Document collection also has a "Picture" document`


    `{`


    `_id: 3,`


    `title: "Family Photo",`


    `type: "JPEG",`


    `sizeInMB: 10,........`


    `}`


    This schema not only enables you to store related data with different structures
    together in a same collection, it also simplifies the querying. The same collection
    can be used to perform queries on common fields such as fetching all content uploaded
    on a particular date and time as well as queries on specific fields such as finding
    images with a size greater than X MB.


    Thus object-oriented programming is one of the use cases where having a polymorphic
    schema makes sense.


    ### 4.2.2 Schema Evolution


    When you are working with databases, one of the most important considerations
    that you need to account for is the schema evolution (i.e. the change in the schema’s
    impact on the running application). The design should be done in a way as to have
    minimal or no impact on the application, meaning no or minimal downtime, no or
    very minimal code changes, etc.


    Typically, schema evolution happens by executing a migration script that upgrades
    the database schema from the old version to the new one. If the database is not
    in production, the script can be simple drop and recreation of the database. However,
    if the database is in a production environment and contains live data, the migration
    script will be complex because the data will need to be preserved. The script
    should take this into consideration. Although MongoDB offers an Update option
    that can be used to update all the documents’ structure within a collection if
    there’s a new addition of a field, imagine the impact of doing this if you have
    thousands of documents in the collection. It would be very slow and would have
    a negative impact on the underlying application’s performance. One of the ways
    of doing this is to include the new structure to the new documents being added
    to the collection and then gradually migrating the collection in the background
    while the application is still running. This is one of the many use cases where
    having a polymorphic schema will be advantageous.


    For example, say you are working with a Tickets collection where you have documents
    with ticket details, like so:


    `// "Ticket1" document (stored in "Tickets" collection")`


    `{`


    `_id: 1,`


    `Priority: "High",`


    `type: "Incident",`


    `text: "Printer not working"`


    `}...........`


    At some point, the application team decides to introduce a “short description”
    field in the ticket document structure, so the best alternative is to introduce
    this new field in the new ticket documents. Within the application, you embed
    a piece of code that will handle retrieving both “old style” documents (without
    a short description field) and “new style” documents (with a short description
    field). Gradually the old style documents can be migrated to the new style documents.
    Once the migration is completed, if required the code can be updated to remove
    the piece of code that was embedded to handle the missing field.


    ## 4.3 Summary


    In this chapter, you learned about the MongoDB data model. You also looked at
    identifiers and capped collections. You concluded the chapter with an understanding
    of how the flexible schema helps.


    In the following chapter, you will get started with MongoDB. You will perform
    the installation and configuration of MongoDB.


    # 5. MongoDB - Installation and Configuration


    > “MongoDB is a cross-platform database.”


    In this chapter, you will go over the process of installing MongoDB on Windows
    and Linux.


    ## 5.1 Select Your Version


    MongoDB runs on most platforms. A list of all the available packages is available
    on the MongoDB downloads page at [`www.mongodb.org/downloads`](http://www.mongodb.org/downloads)
    .


    The correct version for your environment will depend on your server’s operating
    system and the kind of processor. MongoDB supports both 32-bit and 64-bit architecture
    but it’s recommended to use 64-bit in your production environment.


    32-bit limitation


    This is due to the usage of memory mapped files in MongoDB. This limits the 32-bit
    builds to around 2GB of data. It’s recommended to use a 64-bit build for a production
    environment for performance reasons.


    The latest MongoDB production release is 3.0.4 at the time of writing this book.
    Downloads for MongoDB are available for Linux, Windows, Solaris, and Mac OS X.


    The MongoDB download page is divided in the following sections :


    *   Current Stable Release (3.0.4) – 6/16/2015

    *   Previous Releases (stable)

    *   Development Releases (unstable)


    The current release is the most stable recent version available, which at time
    of writing of the book is 3.0.4\. When a new version is released, the prior stable
    release is moved to the Previous Releases section.


    The development releases, as the name suggests, are the versions that are still
    under development and hence are tagged as unstable. These versions can have additional
    features but they may not be stable since they are still in the development phase.
    You can use the development versions to try out new features and provide feedback
    to 10gen regarding the features and issues faced.


    ## 5.2 Installing MongoDB on Linux


    This section covers installing MongoDB on a LINUX system . For the following demonstration,
    we will be using an Ubuntu Linux distribution. You can install MongoDB either
    manually or via repositories. We will walk you through both options.'
  trans: "### 4.2.1 面向对象编程\n\n面向对象编程使你能够通过继承让类共享数据和行为。它还允许你在父类中定义函数，这些函数可以在子类中被重写，从而在不同的上下文中发挥不同的作用。换句话说，你可以使用相同的函数名来操作子类和父类，尽管底层的实现可能有所不同。这个特性被称为多态。\n\
    \n在这种情况下，需求是能够拥有一个模式，使得所有相关的对象集或层次结构中的对象可以一起适配，并且能够以相同的方式被检索。\n\n让我们考虑一个例子。假设你有一个应用程序，允许用户上传和分享不同类型的内容，如\
    \ HTML 页面、文档、图像、视频等。尽管上述许多内容类型之间有许多共同的字段（如名称、ID、作者、上传日期和时间），但并非所有字段都是相同的。例如，在图像的情况下，你有一个保存图像内容的二进制字段，而\
    \ HTML 页面则有一个保存 HTML 内容的大型文本字段。\n\n在这种情况下，可以使用 MongoDB 的多态模式，其中所有内容节点类型都存储在同一个集合中，例如`LoadContent`，并且每个文档只包含相关的字段。\n\
    \n```json\n// \"文档集合\" - \"HTMLPage\" 文档\n{\n    _id: 1,\n    title: \"Hello\"\
    ,\n    type: \"HTMLpage\",\n    text: \"<html>Hi..Welcome to my world</html>\"\
    \n}\n...\n// 文档集合也有一个 \"Picture\" 文档\n{\n    _id: 3,\n    title: \"Family Photo\"\
    ,\n    type: \"JPEG\",\n    sizeInMB: 10\n}\n```\n\n这种模式不仅使你能够将具有不同结构的相关数据存储在同一个集合中，还简化了查询。同一个集合既可以用于查询公共字段（例如获取特定日期和时间上传的所有内容），也可以用于查询特定字段（例如查找大小超过\
    \ X MB 的图像）。\n\n因此，面向对象编程是使用多态模式有意义的用例之一。\n\n### 4.2.2 模式演进\n\n当你使用数据库时，最重要的考虑因素之一是模式演进（即模式更改对运行中应用程序的影响）。设计应尽可能减少对应用程序的影响，意味着没有或最少的停机时间、没有或极少的代码更改等。\n\
    \n通常，模式演进通过执行迁移脚本来实现，该脚本将数据库模式从旧版本升级到新版本。如果数据库未处于生产环境，脚本可以简单地删除并重新创建数据库。然而，如果数据库处于生产环境并包含实时数据，迁移脚本将很复杂，因为数据需要被保留。脚本应考虑到这一点。虽然\
    \ MongoDB 提供了一个`Update`选项，可用于更新集合中所有文档的结构（如果有新增字段），但想象一下，如果你的集合中有成千上万个文档，这样做会产生什么影响。这将非常缓慢，并对底层应用程序的性能产生负面影响。实现这一点的一种方法是，将新结构添加到集合中新增的文档中，然后在应用程序仍在运行时，逐步在后台迁移集合。这是拥有多态模式具有优势的众多用例之一。\n\
    \n例如，假设你正在处理一个`Tickets`集合，其中包含工单详细信息的文档，如下所示：\n\n```json\n// \"Ticket1\" 文档 (存储在\
    \ \"Tickets\" 集合中)\n{\n    _id: 1,\n    Priority: \"High\",\n    type: \"Incident\"\
    ,\n    text: \"Printer not working\"\n}\n```\n\n在某个时候，应用程序团队决定在工单文档结构中引入一个“简短描述”字段，因此最好的选择是在新的工单文档中引入这个新字段。在应用程序内，你嵌入一段代码来处理检索“旧式”文档（没有简短描述字段）和“新式”文档（有简短描述字段）。旧式文档可以逐渐迁移到新式文档。迁移完成后，如果需要，可以更新代码以移除为处理缺失字段而嵌入的代码片段。\n\
    \n## 4.3 小结\n\n在本章中，你学习了 MongoDB 数据模型。你还了解了标识符和固定集合。本章最后，你理解了灵活模式的优势。\n\n在下一章中，你将开始使用\
    \ MongoDB。你将进行 MongoDB 的安装和配置。\n\n# 5. MongoDB - 安装与配置\n\n> “MongoDB 是一个跨平台的数据库。”\n\
    \n在本章中，你将了解在 Windows 和 Linux 上安装 MongoDB 的过程。\n\n## 5.1 选择你的版本\n\nMongoDB 可以在大多数平台上运行。所有可用软件包的列表可在\
    \ MongoDB 下载页面 [`www.mongodb.org/downloads`](http://www.mongodb.org/downloads)\
    \ 上找到。\n\n适合你环境的正确版本取决于你的服务器操作系统和处理器类型。MongoDB 支持 32 位和 64 位架构，但建议在生产环境中使用 64\
    \ 位。\n\n**32 位限制**\n\n这是由于 MongoDB 使用了内存映射文件。这限制了 32 位构建版本只能处理大约 2GB 的数据。出于性能原因，建议在生产环境中使用\
    \ 64 位构建版本。\n\n在撰写本书时，最新的 MongoDB 生产版本是 3.0.4。适用于 Linux、Windows、Solaris 和 Mac\
    \ OS X 的 MongoDB 下载包可用。\n\nMongoDB 下载页面分为以下部分：\n\n*   当前稳定版本 (3.0.4) – 2015 年\
    \ 6 月 16 日\n*   先前版本 (稳定版)\n*   开发版本 (不稳定版)\n\n当前版本是最近可用的最稳定版本，在撰写本书时为 3.0.4。当新版本发布时，之前的稳定版本将被移至“先前版本”部分。\n\
    \n开发版本，顾名思义，是仍在开发中的版本，因此被标记为不稳定。这些版本可能有额外的功能，但由于仍在开发阶段，可能不稳定。你可以使用开发版本尝试新功能，并向\
    \ 10gen 提供有关功能和遇到问题的反馈。\n\n## 5.2 在 Linux 上安装 MongoDB\n\n本节介绍如何在 LINUX 系统上安装 MongoDB。在接下来的演示中，我们将使用\
    \ Ubuntu Linux 发行版。你可以通过手动方式或通过软件仓库安装 MongoDB。我们将引导你完成这两种选项。"
- fmt: '### 5.2.1 Installing Using Repositories


    In LINUX, repositories are the online directories that contain software. Aptitude
    is the program used to install software on Ubuntu. Although MongoDB might be present
    in the default repositories, there is the possibility of an out-of-date version,
    so the first step is to configure Aptitude to look at the custom repository.


    Issue the following to import the `public.GPG` key for MongoDB:

    ```bash

    sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv 7F0CEB10

    ```

    Next, use the following command to create the `/etc/apt/sources.list.d/mongodb-org-3.0.list`
    file:

    ```bash

    echo "deb [`http://repo.mongodb.org/apt/ubuntu`](http://repo.mongodb.org/apt/ubuntu)
    \"$(lsb_release -sc)\"/mongodb-org/3.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-3.0.list

    ```

    Finally, use the following command to reload the repository:

    ```bash

    sudo apt-get update

    ```

    Now Aptitude is aware of the manually added repository.


    Next, you need to install the software. The following command should be issued
    in the shell to install MongoDB’s current stable version:

    ```bash

    sudo apt-get install -y mongodb-org

    ```


    You’ve successfully installed MongoDB, and that’s all there is to it.


    ### 5.2.2 Installing Manually


    In this section, you will see how MongoDB can be installed manually. This knowledge
    is important in the following cases:


    *   When the Linux distribution doesn’t use Aptitude.

    *   When the version you require is not available through repositories or is not
    part of the repository.

    *   When you need to run multiple MongoDB versions simultaneously.


    The first step in a manual installation is to decide on the version of MongoDB
    to use and then download from the site. Next, the package needs to be extracted
    using the following command:

    ```bash

    tar -xvf mongodb-linux-x86_64-3.0.4.tgz

    ```

    This will output content similar to:

    ```

    mongodb-linux-i686-3.0.4/THIRD-PARTY-NOTICES

    mongodb-linux-i686-3.0.4/GNU-AGPL-3.0

    mongodb-linux-i686-3.0.4/bin/mongodump

    ............

    mongodb-linux-i686-3.0.4/bin/mongosniff

    mongodb-linux-i686-3.0.4/bin/mongod

    mongodb-linux-i686-3.0.4/bin/mongos

    mongodb-linux-i686-3.0.4/bin/mongo

    ```

    This extracts the package content to a new directory, namely `mongodb-linux-x86_64-3.0.4`
    (which is located under your current directory). The directory contains many subdirectories
    and files. The main executable files are under the subdirectory `bin`.


    This completes the MongoDB installation successfully.


    ## 5.3 Installing MongoDB on Windows


    Installing MongoDB on Windows is a simple matter of downloading the msi file for
    the selected build of Windows and running the installer.


    The installer will guide you through installation of MongoDB.


    Following the wizard, you will reach the Choose Setup Type screen. There are two
    setup types available wherein you can customize your installation. In this example,
    select the setup type as Custom.


    An installation directory needs to be specified when selecting Custom, so specify
    the directory to `C:\PracticalMongoDB`.


    Note that MongoDB can be run from any folder selected by the user because it is
    self-contained and has no dependency on the system. If the setup type of Complete
    is selected, the default folder selected is `C:\Program Files\MongoDB`.


    Clicking Next will take you to the Ready to installation screen. Click Install.


    This will start the installation and will show the progress on a screen. Once
    the installation is complete, the wizard will take you to the completion screen.


    Clicking Finish completes the setup. After successful completion of the above
    steps, you have a directory called `C:\PracticalMongoDB` with all the relevant
    applications in the `bin` folder. That’s all there is to it.


    ## 5.4 Running MongoDB


    Let’s see how to start running and using MongoDB.


    ### 5.4.1 Preconditions


    A data folder is required for storing the files. This by default is `C:\data\db`
    in Windows and `/data/db` in LINUX systems.


    These data directories are not created by MongoDB, so before starting MongoDB
    the data directory needs to be manually created and you need to ensure that proper
    permissions are set (such as that MongoDB has read, write, and directory creation
    permissions).


    If the MongoDB is started before you create the folder, it will throw an error
    message and will fail to run.


    ### 5.4.2 Starting the Service


    Once the directories are created and permissions are in place, execute the `mongod`
    application (placed under the `bin` directory) to start the MongoDB core database
    service.


    In continuation of the above installation, the same can be started by opening
    the command prompt in Windows (which needs to be run as administrator) and executing
    the following:

    ```bash

    c:\> c:\practicalmongodb\bin\mongod.exe

    ```

    In case of Linux, the `mongod` process is started in the shell.


    This will start the MongoDB database on the localhost interface. It will listen
    for connections from the `mongo` shell on port 27017.


    As mentioned, the folder path needs to be created before starting the database,
    which by default is `c:\data\db`. An alternative path can also be provided when
    starting the database service by using the `–dbpath` parameter.

    ```bash

    C:\> C:\practicalmongodb\bin\mongod.exe --dbpath C:\NewDBPath\DBContents

    ```


    ## 5.5 Verifying the Installation


    The relevant executable will be present under the subdirectory `bin`. The following
    can be checked under the `bin` directory in order to vet the success of the installation
    step:


    *   `Mongod`: the core database server

    *   `Mongo`: The database shell

    *   `Mongos`: The auto-sharding process

    *   `Mongoexport`: The export utility

    *   `Mongoimport`: The import utility


    Apart from the above, there are other applications available in the `bin` folder.


    The `mongo` application launches the `mongo` shell, which supplies access to the
    database contents and lets you fire selective queries or execute aggregation against
    the data in MongoDB.


    The `mongod` application, as you saw above, is used to start the database service,
    or daemon.


    Multiple flags can be set when launching the applications. For example, `–dbpath`
    can be used to specify an alternative path for where the database files should
    be stored. To get the list of all available options, include the `--help` flag
    when launching the service.


    ## 5.6 MongoDB Shell


    The `mongo` shell comes as part of the standard distribution of MongoDB. The shell
    provides a full database interface for MongoDB, enabling you play around with
    the data stored in MongoDB using a JavaScript environment, which has complete
    access to the language and all the standard functions.


    Once database services have started, you can fire up the `mongo` shell and start
    using MongoDB. This can be done using Shell in Linux or the command prompt in
    Windows (run as administrator).


    You must refer to the exact location of the executable, such as in the `C:\practicalmongodb\bin\`
    folder in a Windows environment.


    Open the command prompt (run as administrator) and type `mongo.exe`. Press the
    Enter key. This will start the `mongo` shell.

    ```bash

    C:\> C:\practicalmongodb\bin\mongo.exe

    ```

    The output will be similar to:

    ```

    MongoDB shell version: 3.0.4

    connecting to: test

    >

    ```

    If no parameters are specified when starting the service, it connects to the default
    database named `test` on the localhost instance.


    The database will be created automatically when connected to it. MongoDB offers
    this feature of automatically creating a database if an attempt is made to access
    a one that is not there.


    The next chapter offers more information on working with the `mongo` shell.


    ## 5.7 Securing the Deployment


    You know how to install and start using MongoDB via the default configurations.
    Next, you need to ensure that the data that is stored within the database is secure
    in all aspects.


    In this section, you will look at how to secure your data. You will change the
    configuration of the default installation to ensure that your database is more
    secure.'
