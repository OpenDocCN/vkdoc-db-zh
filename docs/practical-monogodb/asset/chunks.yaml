- fmt: '# 6.2.4 `aggregate()`


    上一节介绍了 `MapReduce` 函数。本节，你将初步了解 MongoDB 的聚合框架。


    聚合框架让你无需使用 `MapReduce` 函数即可获取聚合值。从性能上讲，聚合框架比 `MapReduce` 函数更快。你需要始终记住，`MapReduce`
    适用于批处理方法，而非实时分析。


    接下来，你将使用 `aggregate` 函数描绘上述讨论的两个输出结果。第一个输出是找出男女生的数量，可通过执行以下命令实现：


    ```

    > db.students.aggregate({$group:{_id:"$Gender", totalStudent: {$sum: 1}}})

    { "_id" : "F", "totalStudent" : 6 }

    { "_id" : "M", "totalStudent" : 9 }

    >

    ```


    类似地，要找出按班级分类的平均分，可以执行以下命令：


    ```

    > db.students.aggregate({$group:{_id:"$Class", AvgScore: {$avg: "$Score"}}})

    { "_id" : "Biology", "AvgScore" : 90 }

    { "_id" : "C3", "AvgScore" : 90 }

    { "_id" : "Chemistry", "AvgScore" : 90 }

    { "_id" : "C2", "AvgScore" : 93 }

    { "_id" : "C1", "AvgScore" : 85 }

    >

    ```


    # 6.3 设计应用程序的数据模型


    本节将探讨如何为应用程序设计数据模型。MongoDB 数据库为设计数据模型提供了两种选项：用户可以将相关对象嵌入彼此之中，或者通过 ID 引用彼此。本节将探索这些选项。


    为了理解这些选项，你将设计一个博客应用程序并演示这两种选项的用法。


    一个典型的博客应用程序包含以下场景：

    - 人们发布关于不同主题的博客。除了主题分类外，还可以使用不同的标签。例如，如果分类是政治，帖子谈论的是某位政治家，那么该政治家的名字可以作为标签添加到帖子中。这有助于用户快速找到与其兴趣相关的帖子，并将相关帖子链接在一起。

    - 查看博客的人可以对博客文章发表评论。


    ## 6.3.1 关系数据建模与范式化


    在深入 MongoDB 的方法之前，让我们先简要了解一下如何在 SQL 等关系数据库中进行建模。


    在关系数据库中，数据建模通常通过定义表开始，并逐渐消除数据冗余以达到范式形式。


    ### 6.3.1.1 什么是范式形式？


    在关系数据库中，范式形式通常从根据应用程序需求创建表开始，然后逐步消除冗余以达到最高范式形式，也称为第三范式或 `3NF`。为了更好地理解这一点，让我们以表格形式展示博客应用程序的初始数据，如图
    [6-2](#A332296_1_En_6_Chapter.html#Fig2) 所示。


    ![A332296_1_En_6_Fig2_HTML.gif](A332296_1_En_6_Fig2_HTML.gif)


    **图 6-2. 博客应用程序初始数据**


    这些数据实际上处于第一范式形式。你会有大量冗余，因为一篇文章可能有多个评论，也可能关联多个标签。冗余的问题在于它引入了不一致的可能性，即相同数据的不同副本可能具有不同的值。为了消除这种冗余，你需要通过将数据拆分为多个表来进一步范式化数据。在此步骤中，你必须识别一个键列来唯一标识表中的每一行，以便在表之间创建链接。使用
    `3NF` 范式对上述场景建模后，将得到如图 [6-3](#A332296_1_En_6_Chapter.html#Fig3) 所示的 RDBMs 图。


    ![A332296_1_En_6_Fig3_HTML.jpg](A332296_1_En_6_Fig3_HTML.jpg)


    **图 6-3. RDBMS 图**


    在这种情况下，你得到了一个没有冗余的数据模型，允许你更新它而无需担心更新多行。特别是，你不再需要担心数据模型中的不一致问题。


    ### 6.3.1.2 范式形式的问题


    如前所述，范式化的好处是它允许轻松更新且无任何冗余（即有助于保持数据一致性）。更新用户名意味着更新 `Users` 表中的名称。


    然而，当你试图取回数据时，问题就出现了。例如，要查找特定用户发布的所有帖子相关的标签和评论，关系数据库程序员会使用 `JOIN`。通过使用 `JOIN`，数据库会根据应用程序屏幕设计返回所有数据，但真正的问题在于数据库执行什么操作来获得该结果集。


    通常，任何 `RDBMS` 都从磁盘读取并执行寻道，这占用了读取一行所花费的 99% 以上的时间。当涉及磁盘访问时，随机寻道是最大的障碍。这一点在此上下文中如此重要的原因是，`JOIN`
    通常需要随机寻道。`JOIN` 操作是关系数据库中最昂贵的操作之一。此外，如果你最终需要将数据库扩展到多台服务器，还会引入生成分布式 `JOIN` 的问题，这是一个复杂且通常很慢的操作。


    **第一步是定义 `map` 函数，该函数循环遍历集合中的文档，并以 `{"Class": Score}` 的格式返回输出，例如 `{"C1":95}`。第二步对班级进行分组并计算该班级分数的平均值。第三步组合结果；它定义了需要应用
    `map` 和 `reduce` 函数的集合，最后定义了存储输出的位置，在本例中是一个名为 `MR_ClassAvg_1` 的新集合。**


    **最后一步，你使用 `find` 来检查输出结果。**


    第一步是定义 `map` 函数，该函数循环遍历集合中的文档，并以 `{"Class": Score}` 的格式返回输出，例如 `{"C1":95}`。第二步对班级进行分组并计算该班级分数的平均值。第三步组合结果；它定义了需要应用
    `map` 和 `reduce` 函数的集合，最后定义了存储输出的位置，在本例中是一个名为 `MR_ClassAvg_1` 的新集合。


    最后一步，你使用 `find` 来检查输出结果。'
  raw: 'The first step is to define the `map` function, which loops through the collection
    documents and returns output as `{"Class": Score},` for example `{"C1":95}`. The
    second step does a grouping on the class and computes the average of the scores
    for that class. The third step combines the results; it defines the collection
    to which the `map`, `reduce` function needs to be applied and finally it defines
    where to store the output, which in this case is a new collection called `MR_ClassAvg_1`.


    In the last step, you use `find` in order to check the resulting output.


    ### 6.2.4 aggregate()


    The previous section introduced the `MapReduce` function. In this section, you
    will get a glimpse of the aggregation framework of MongoDB.


    The aggregation framework enables you find out the aggregate value without using
    the `MapReduce` function. Performance-wise, the aggregation framework is faster
    than the `MapReduce` function. You always need to keep in mind that `MapReduce`
    is meant for batch approach and not for real-time analysis.


    You will next depict the above two discussed outputs using the `aggregate` function.
    First, the output was to find the count of male and female students. This can
    be achieved by executing the following command:


    `> db.students.aggregate({$group:{_id:"$Gender", totalStudent: {$sum: 1}}})`


    `{ "_id" : "F", "totalStudent" : 6 }`


    `{ "_id" : "M", "totalStudent" : 9 }`


    `>`


    Similarly, in order to find out the class-wise average score, the following command
    can be executed:


    `> db.students.aggregate({$group:{_id:"$Class", AvgScore: {$avg: "$Score"}}})`


    `{ "_id" : "Biology", "AvgScore" : 90 }`


    `{ "_id" : "C3", "AvgScore" : 90 }`


    `{ "_id" : "Chemistry", "AvgScore" : 90 }`


    `{ "_id" : "C2", "AvgScore" : 93 }`


    `{ "_id" : "C1", "AvgScore" : 85 }`


    `>`


    ## 6.3 Designing an Application’s Data Model


    In this section, you will look at how to design the data model for an application.
    The MongoDB database provides two options for designing a data model: the user
    can either embed related objects within one another, or it can reference each
    other using ID. In this section, you will explore these options.


    In order to understand these options, you will design a blogging application and
    demonstrate the usage of the two options.


    A typical blog application consists of the following scenarios:


    You have people posting blogs on different subjects. In addition to the subject
    categorization, different tags can also be used. As an example, if the category
    is politics and the post talks about a politician, then that politician’s name
    can be added as a tag to the post. This helps users find posts related to their
    interests quickly and also lets them link related posts together.


    The people viewing the blog can comment on the blog posts.


    ### 6.3.1 Relational Data Modeling and Normalization


    Before jumping into MongoDB’s approach, let’s take a little detour into how you
    would model this in a relational database such as SQL.


    In relational databases, the data modelling typically progresses by defining the
    tables and gradually removing data redundancy to achieve a normal form.


    #### 6.3.1.1 What Is a Normal Form?


    In relational databases , a normal form typically begins by creating tables as
    per the application requirement and then gradually removing redundancy to achieve
    the highest normal form, which is also termed the third normal form or 3NF.In
    order to understand this better, let’s put the blogging application data in tabular
    form. The initial data is shown in Figure [6-2](#A332296_1_En_6_Chapter.html#Fig2).


    ![A332296_1_En_6_Fig2_HTML.gif](A332296_1_En_6_Fig2_HTML.gif)


    Figure 6-2.


    Blogging application initial data


    This data is actually in the first normal form. You will have lots of redundancy
    because you can have multiple comments against the posts and multiple tags can
    be associated with the post. The problem with redundancy, of course, is that it
    introduces the possibility of inconsistency, where various copies of the same
    data may have different values. To remove this redundancy, you need to further
    normalize the data by splitting it into multiple tables. As part of this step,
    you must identify a key column that uniquely identifies each row in the table
    so that you can create links between the tables. The above scenarios when modeled
    using the 3NF normal forms will look like the RDBMs diagram shown in Figure [6-3](#A332296_1_En_6_Chapter.html#Fig3).


    ![A332296_1_En_6_Fig3_HTML.jpg](A332296_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    RDBMS diagram


    In this case, you have a data model that is free of redundancy, allowing you to
    update it without having to worry about updating multiple rows. In particular,
    you no longer need to worry about inconsistency in the data model.


    #### 6.3.1.2 The Problem with Normal Forms


    As mentioned, the nice thing about normalization is that it allows for easy updating
    without any redundancy (i.e. it helps keep the data consistent). Updating a user
    name means updating the name in the `Users` table.


    However, a problem arises when you try to get the data back out. For instance,
    to find all tags and comments associated with posts by a specific user, the relational
    database programmer uses a JOIN. By using a JOIN, the database returns all data
    as per the application screen design, but the real problem is what operation the
    database performs to get that result set.


    Generally, any RDBMS reads from a disk and does a seek, which takes well over
    99% of the time spent reading a row. When it comes to disk access, random seeks
    are the enemy. The reason why this is so important in this context is because
    JOINs typically require random seeks. The JOIN operation is one of the most expensive
    operations within a relational database. Additionally, if you end up needing to
    scale your database to multiple servers, you introduce the problem of generating
    a distributed join, a complex and generally slow operation.'
