    \n图 9-9. `队列`\n\n`CPU 时间`（`I/O 等待` 和 `用户时间`）图显示了 CPU 核心如何分配其周期。参见图 9-10。\n\n![A332296_1_En_9_Fig10_HTML.jpg](img/A332296_1_En_9_Fig10_HTML.jpg)\n\
    \n图 9-10. `CPU 时间`\n\n`I/O 等待` 表示 CPU 等待其他资源（如磁盘或网络）所花费的时间。参见图 9-11。\n\n![A332296_1_En_9_Fig11_HTML.jpg](img/A332296_1_En_9_Fig11_HTML.jpg)\n\
    \n图 9-11. `I/O 等待`\n\n`用户时间` 表示执行计算所花费的时间，例如文档更新、更新和重新平衡索引、选择或排序查询结果，或运行聚合框架命令、`Map/Reduce`\
    \ 或服务器端 JavaScript。参见图 9-12。\n\n![A332296_1_En_9_Fig12_HTML.jpg](img/A332296_1_En_9_Fig12_HTML.jpg)\n\
    \n图 9-12. `用户时间`\n\n要查看 `CPU 时间` 图表，您需要安装 `munin`。\n\n这些关键指标及其组合应用于调查任何性能问题。\n\
    \n## 9.6 总结\n\n在本章中，您了解了如何使用作为 MongoDB 发行版一部分打包的各种实用程序来管理和维护系统。\n\n您了解了作为管理员必须了解的主要操作，以便详细理解这些实用程序。请通读参考资料。在下一章中，您将研究\
    \ MongoDB 的用例，并探讨哪些情况下 MongoDB 不是一个好的选择。\n\n# 10. MongoDB 用例\n\n> “MongoDB：它对我有用吗？”\n\
    \n在本章中，我们将提供 MongoDB 的特性与其适合解决的业务问题之间急需的连接。我们将使用两个用例来分享用于解决此类问题的技术和模式。\n\n## 10.1\
    \ 用例 1 - 性能监控\n\n在本节中，您将探索如何使用 MongoDB 存储和检索性能数据。您将重点关注用于存储数据的数据模型。检索将仅包括从相应集合中读取。您还将了解如何应用分片和复制以获得更好的性能和数据安全性。\n\
    \n我们假设有一个监控工具正在以 CSV 格式收集服务器定义的参数数据。通常，监控工具要么将数据作为文本文件存储在服务器上的指定文件夹中，要么将其输出重定向到任何报告数据库服务器。在此用例中，有一个调度程序将读取此共享文件夹路径并将数据导入\
    \ MongoDB 数据库。\n\n### 10.1.1 模式设计\n\n设计解决方案的第一步是决定模式。模式取决于监控工具捕获的数据格式。\n\n日志文件中的一行可能类似于表\
    \ 10-1。\n\n表 10-1. `日志文件`\n\n| 节点 UUID | IP 地址 | 节点名称 | MIB | 时间戳（毫秒） | 指标值 |\n\
    | --- | --- | --- | --- | --- | --- |\n| 3beb1a8b-040d-4b46-932a-2d31bd353186\
    \ | 10.161.1.73 | corp_xyz_sardar | IFU | 1369221223384 | 0.2 |\n\n以下是将每一行存储为文本的最简单方式：\n\
    \n```json\n{\n  \"_id\": ObjectId(...),\n  \"line\": \"10.161.1.73 - corp_xyz_sardar\
    \ [15/July/2015:13:55:36 -0700] \\\"Interface Util\\\" ...\"\n}\n```\n\n虽然这捕获了数据，但对用户来说毫无意义，因此如果您想找出特定服务器的事件，则需要使用正则表达式，这将导致对集合进行全扫描，效率非常低。\n\
    \n相反，您可以从日志文件中提取数据，并将其作为有意义的字段存储在 MongoDB 文档中。\n\n请注意，在设计结构时，使用正确的数据类型非常重要。这不仅节省空间，而且对性能有显著影响。\n\
    \n例如，如果您将日志的日期和时间字段存储为字符串，它不仅会占用更多字节，而且执行日期范围查询也会很困难。如果不使用字符串，而是将日期存储为 UTC 时间戳，它将占用\
    \ 8 个字节，而字符串需要 28 个字节，因此执行日期范围查询会更容易。如您所见，为数据使用正确的类型增加了查询的灵活性。\n\n您将使用以下文档来存储您的监控数据：\n\
    \n```json\n{\n  \"_id\": ObjectID(...),\n  \"Host\": \"\",\n  \"Time\": ISODate(\"\
    \"),\n  \"ParameterName\": \"aa\",\n  \"Value\": 10.23\n}\n```\n\n注意\n\n实际的日志数据可能有额外的字段；如果您捕获所有字段，它将导致文档过大，这是对存储和内存的低效使用。在设计模式时，您应该省略不需要的详细信息。识别出为满足您的要求必须捕获哪些字段非常重要。\n\
    \n在您的场景中，满足报告应用程序要求的最重要信息是以下内容：\n\n`主机` `时间戳` `参数` `值`\n\n### 10.1.2 操作\n\n设计好文档结构后，接下来您将查看需要在系统上执行的各种操作。\n"
- fmt: '### 10.1.2.1 Inserting Data


    The method used for inserting data depends on your application write concerns.


    If you are looking for fast insertion speed and can compromise on the data safety,
    then the following command can be used:


    ```javascript

    db.perfpoc.insert({Host:"Host1", GeneratedOn: new ISODate("2015-07-15T12:02Z"),ParameterName:"CPU",Value:13.13},w=0)

    ```


    Although this command is the fastest option available, since it doesn’t wait for
    any acknowledgment of whether the operation was successful or not, you risk losing
    data.


    If you want just an acknowledgment that at least the data is getting saved, you
    can issue the following command:


    ```javascript

    db.perfpoc.insert({Host:"Host1", GeneratedOn: new ISODate("2015-07-15T12:07Z"),ParameterName:"CPU",Value:13.23},w=1)

    ```


    Although this command acknowledges that the data is saved, it will not provide
    safety against any data loss because it is not journaled.


    If your primary focus is to trade off increased insertion speed for data safety
    guarantees, you can issue the following command:


    ```javascript

    db.perfpoc.insert({Host:"Host1", GeneratedOn: new ISODate("2015-07-15T12:09Z"),ParameterName:"CPU",Value:30.01},j=true,w=2)

    ```


    In this code, you are not only ensuring that the data is getting replicated, you
    are also enabling journaling. In addition to the replication acknowledgment, it
    also waits for a successful journal commit.


    **Note**

    Although this is the safest option, it has a severe impact on the insert performance,
    so it is the slowest operation.


    ### 10.1.2.2 Bulk Insert


    Inserting events in bulk is always beneficial when using stringent write concerns,
    as in your case, because this enables MongoDB to distribute the incurred performance
    penalty across a group of insert.


    If possible, bulk inserts should be used for inserting the monitoring data because
    the data will be huge and will be generated in seconds. Grouping them together
    as a group and inserting will have better impact, because in the same wait time,
    multiple events will be getting saved. So for this use case, you will be grouping
    multiple events using a bulk insert.


    ### 10.1.2.3 Querying Performance Data


    You have seen how to insert the event data. The value of maintaining data comes
    when you are able to respond to specific queries by querying the data.


    For example, you may want to view all the performance data associated with a specific
    field, say `Host`.


    You will look at few query patterns for fetching the data and then you will look
    at how to optimize these operations.


    #### Query1: Fetching the Performance Data of a Particular Host


    ```javascript

    db.perfpoc.find({Host:"Host1"})

    ```

    ```

    { "_id" : ObjectId("553dc64009cb76075f6711f3"), "Host" : "Host1", "GeneratedOn":
    ISODate("2015-07-18T12:02:00Z"), "ParameterName" : "CPU", "Value" : 13.13 }

    { "_id" : ObjectId("553dc6cb4fd5989a8aa91b2d"), "Host" : "Host1", "GeneratedOn":
    ISODate("2015-07-18T12:07:00Z"), "ParameterName" : "CPU", "Value" : 13.23 }

    { "_id" : ObjectId("553dc7504fd5989a8aa91b2e"), "Host" : "Host1", "GeneratedOn":
    ISODate("2015-07-18T12:09:00Z"), "ParameterName" : "CPU", "Value" : 30.01 }

    ```

    This can be used if the requirement is to analyze the performance of a host.


    Creating an index on `Host` will optimize the performance of the above queries:


    ```javascript

    db.perfpoc.ensureIndex({Host:1})

    ```


    #### Query2: Fetching Data Within a Date Range from July 10, 2015 to July 20,
    2015


    ```javascript

    db.perfpoc.find({GeneratedOn:{"$gte": ISODate("2015-07-10"), "$lte": ISODate("2015-07-20")}})

    ```

    ```

    { "_id" : ObjectId("5302fec509904770f56bd7ab"), "Host" : "Host1", "GeneratedOn"

    ...............

    ```

    This is important if you want to consider and analyze the data collected for a
    specific date range. In this case, an index on "time" will have a positive impact
    on the performance.


    ```javascript

    db.perfpoc.ensureIndex({GeneratedOn:1})

    ```


    #### Query3: Fetching Data Within a Date Range from July 10, 2015 to July 20,
    2015 for a Specific Host


    ```javascript

    db.perfpoc.find({GeneratedOn:{"$gte": ISODate("2015-07-10"), "$lte": ISODate("2015-07-20")},Host:
    "Host1"})

    ```

    ```

    { "_id" : ObjectId("5302fec509904770f56bd7ab"), "Host" : "Host1", "GeneratedOn"

    .................

    ```

    This is useful if you want to look at the performance data of a host for a specific
    time period.


    In such queries where multiple fields are involved, the indexes that are used
    have a significant impact on the performance. For example, for the above query,
    creating a compound index will be beneficial.


    Also note that the field’s order within the compound index has an impact. Let’s
    understand the difference with an example. Let’s create a compound index as follows:


    ```javascript

    db.perfpoc.ensureIndex({"GeneratedOn":1,"Host":1})

    ```

    Next, do an explain of this:


    ```javascript

    db.perfpoc.find({GeneratedOn:{"$gte": ISODate("2015-07-10"), "$lte": ISODate("2015-07-20")},
    Host: "Host1"}).explain("allPlansExecution")

    ```

    ```

    .......................................................................

    "allPlansExecution" : [

    {

    "nReturned" : 4,

    "executionTimeMillisEstimate" : 0,

    "totalKeysExamined" : 4,

    "totalDocsExamined" : 4

    "indexName" : "GeneratedOn_1_Ho

    .......................................................................

    "isMultiKey" : false,

    "direction" : "forward",

    }]

    .......................................................................

    ```

    Drop the compound index, like so:


    ```javascript

    db.perfpoc.dropIndexes()

    ```

    ```

    {

    "nIndexesWas" : 2,

    "msg" : "non-_id indexes dropped for collection",

    "ok" : 1

    }

    ```

    Alternatively, create the compound index with the fields reversed:


    ```javascript

    db.perfpoc.ensureIndex({"Host":1,"GeneratedOn":1})

    ```

    Do an explain:


    ```javascript

    db.perfpoc.find({GeneratedOn:{"$gte": ISODate("2015-07-10"), "$lte": ISODate("2015-07-20")},
    Host: "Host1"}).explain("allPlansExecution")

    ```

    ```

    .............................................

    "executionStats" : {

    "executionSuccess" : true,

    "nReturned" : 4,

    "executionTimeMillis" : 0,

    "totalKeysExamined" : 4,

    "totalDocsExamined" : 4,

    ......................................................

    "allPlansExecution" : [ ]

    ....................................................

    }

    ```

    You can see the difference in the `explain` command’s output.


    Using `explain()`, you can figure out the impact of indexes and accordingly decide
    on the indexes based on your application usage.


    It’s also recommended to have a single compound indexes covering maximum queries
    rather than having multiple single key indexes.


    Based on you application usage and the results of the `explain` statistics, you
    will use only one compound index on `{''GeneratedOn'':1, ''Host'': 1}` to cover
    all the above mentioned queries.


    #### Query4: Fetching Count of Performance Data by Host and Day


    Listing the data is good, but most often queries on performance data are performed
    to find out the count, average, sum, or other aggregate operation during analysis.
    Here you will see how to use the `aggregate` command to select, process, and aggregate
    the results to fulfil the need of the powerful ad-hoc queries.


    In order to explain this further, let’s write a query that will count the data
    per month:


    ```javascript

    db.perfpoc.aggregate(

    ... [

    ... {$project: {month_joined: {$month: "$GeneratedOn"}}},

    ... {$group: {_id: {month_joined: "$month_joined"}, number: {$sum:1}}},

    ... {$sort: {"_id.month_joined":1}}

    ... ]

    ... )

    ```

    ```

    { "_id" : { "month_joined" : 7 }, "number" : 4 }

    ```

    In order to optimize the performance, you need to ensure that the filter field
    has an index. You have already created an index that covers the same, so for this
    scenario you need not create any additional index.'
