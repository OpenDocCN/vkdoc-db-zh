  trans: '## 12.3 应用程序响应时间优化


    一旦开始开发应用程序，最重要的需求之一就是拥有可接受的响应时间。换句话说，应用程序应该能够即时响应。你可以使用以下技巧进行优化：


    *   尽可能避免磁盘访问和页面错误。主动估算应用程序需要处理的数据集大小，并增加内存以避免页面错误和磁盘读取。此外，以应用程序主要访问内存中可用数据的方式来编程，这样页面错误就会很少发生。

    *   在查询字段上创建索引。如果你在正在执行的筛选器上创建索引，索引在内存中的存储方式将减少内存消耗，从而对查询产生积极影响。

    *   如果应用程序涉及的查询返回的字段数相对于完整文档结构较少，则创建覆盖索引。

    *   使用一个能被最多查询利用的复合索引也能节省内存，因为只需加载一个索引，而非多个。

    *   在正则表达式中使用尾部通配符以获取关联索引的好处。

    *   尝试创建能大幅减少待选文档范围的索引。对“性别”字段的索引就不如对“电话号码”字段的索引有益。

    *   索引并非总是好的。你需要平衡所用索引的最佳数量。虽然你应该为支持查询创建索引，但也应记住删除不再使用的索引，因为每个索引都会为插入/更新操作带来成本。如果一个索引未被使用却仍然存在，它可能对数据库的整体容量产生不利影响。这对于写入密集型的工作负载尤其重要。

    *   文档应设计为层次化结构，将相关事物分组在一起，并在适用的地方描绘为层级关系。这将使 MongoDB 能够找到所需信息，而无需扫描整个文档。

    *   应用 AND 操作符时，应始终从结果集小的查询开始，再到结果集大的查询，因为这将导致查询的文档数量较少。如果你知道最具限制性的条件，该条件应放在最前面。

    *   使用 OR 查询时，应从结果集大的查询转向结果集小的查询，因为这将限制后续查询的搜索空间。

    *   工作集应能完全放入内存。

    *   对于写入密集型和 I/O 密集型应用程序，使用 WiredTiger 存储引擎，因为它支持在块级别和索引级别进行压缩。


    ## 12.4 数据安全性


    你已经学习了在决定部署方案时需要考虑的事项；也了解了一些提升性能的重要技巧。现在，让我们看看一些关于数据安全性和一致性的建议：


    *   **复制**和**日志**是为数据安全提供的两种方法。通常建议在生产环境中使用复制功能，而不是在单台服务器上运行。并且，你应该让至少一台服务器启用日志。当无法启用复制且只能在单台服务器上运行时，日志记录可提供数据安全保障。第
    `tk` 章解释了启用日志时写入操作的工作原理。

    *   在服务器崩溃的情况下，`修复`应是恢复数据的最后手段。尽管运行修复后数据库可能未损坏，但它可能不会包含所有数据。

    *   在复制环境中，将 `W` 设置为安全写入的大多数节点。这是为了确保写入被复制到副本集的大多数成员。虽然这会减慢写入操作的速度，但写入操作是安全的。

    *   在发出命令时，始终为 `w` 参数指定 `wtimeout`，以避免无限期的等待时间。

    *   MongoDB 应始终在受信任的环境中运行，并制定规则以阻止所有未知系统、机器或网络的访问。


    ## 12.5 管理


    以下是一些管理技巧：


    *   对持久化服务器进行**即时时间点备份**。要备份启用了日志的数据库，你可以进行文件系统快照，或者执行正常的 `fsync+lock` 然后转储。请注意，你不能在没有
    `fsync` 和锁定的情况下直接复制所有文件，因为复制操作不是瞬间完成的。

    *   `修复`应用作压缩数据库的手段，因为它基本上执行一次 `mongodump` 然后 `mongorestore`，从而创建数据的干净副本，并在此过程中移除数据文件中的任何空“空洞”。

    *   MongoDB 提供了**数据库探查器**。它会记录所有数据库操作的细粒度信息。可以将其设置为记录所有事件的信息，或者仅记录持续时间超过可配置阈值（默认为
    100 毫秒）的事件。


    注意：探查器数据存储在一个**固定集合**中。与解析日志文件相比，查询此集合可能更容易。


    *   可以使用 `explain` 计划来查看查询是如何被解析的。这涉及诸如使用了哪个索引、返回了多少文档、索引是否覆盖了查询、扫描了多少索引条目以及查询返回结果所花费的时间（以毫秒为单位）等信息。当查询在不到
    1 毫秒内解析完成时，`explain` 计划会显示 `0`。当你调用 `explain` 计划时，它会丢弃旧的执行计划，并启动测试可用索引的过程，以确保使用最佳的执行计划。


    ## 12.6 复制延迟


    **复制延迟**是监控副本集背后的主要管理问题。给定从节点的复制延迟是指操作在主节点写入的时间与该操作在从节点上复制完成的时间之间的差值。通常，复制延迟会自行恢复并且是暂时的。然而，如果延迟持续很高且不断上升，系统可能存在问题。你可能最终需要关闭系统直到问题解决，或者可能需要手动干预来协调不一致，甚至可能不得不在数据过时的情况下继续运行系统。


    可以使用以下命令确定副本集当前的复制延迟：


    ```

    testset:PRIMARY> rs.printSlaveReplicationInfo()

    ```


    此外，你可以使用 `rs.printReplicationInfo()` 命令来补全信息：


    ```

    testset:PRIMARY> rs.printReplicationInfo()

    ```


    也可以使用 MongoDB Cloud Manager 来查看近期和历史的复制延迟信息。复制延迟图可从每个从节点的 `Status` 选项卡获取。


    以下是一些有助于减少此时间的技巧：


    *   在写入负载很重的场景中，从节点的处理能力应与主节点相当，以便能够跟上主节点，并以相同的速率应用写入操作。同时，应有足够的网络带宽，以便能以与操作创建相同的速率从主节点获取这些操作。

    *   调整应用程序的写关注级别。

    *   如果从节点用于构建索引，可以计划在主节点写入活动较少时进行。

    *   如果从节点用于进行备份，请考虑在不阻塞的情况下进行备份。

    *   检查复制错误。运行 `rs.status()` 并检查 `errmsg` 字段。此外，可以检查从节点的日志文件中是否有任何错误消息。


    ## 12.7 分片


    当数据不再适合存储在单个节点上时，可以使用**分片**来确保数据在集群中均匀分布，并且操作不会因资源限制而受到影响。


    *   选择一个好的**分片键**。

    *   在生产部署中，你必须使用三台配置服务器以提供冗余。

    *   在集合达到 256GB 之前进行分片。'
- fmt: '## 12.8 Monitoring


    MongoDB system should be proactively monitored to detect unusual behaviors so
    that necessary actions can be taken to resolve issues. Several tools are available
    for monitoring the MongoDB deployment.


    A free hosted monitoring service named `MongoDB Cloud Manager` is provided by
    MongoDB developers. `MongoDB Cloud Manager` offers a dashboard view of the entire
    cluster metrics. Alternatively, you can use `nagios`, `SNMP`, or `munin` to build
    your own tool.


    MongoDB also provides several tools such as `mongostat` and `mongotop` to gain
    insights into the performance. When using monitoring services, the following should
    be watched closely:


    *   `Op counters`: Includes inserts, delete, reads, updates and cursor usage.

    *   `Resident memory`: An eye should always be kept on the allocated memory. This
    counter value should always be lower than the physical memory. If you run out
    of memory, you will experience slowness in the performance due to page faults
    and index misses.

    *   `Working set size`: The active working set should fit into memory for a good
    performance, so a close eye needs to be kept on the working set. You can either
    optimize the queries so that the working set fits inside the memory or increase
    the memory when the working set is expected to increase.

    *   `Queues`: Prior to the release of MongoDB 3.0, a reader-writer lock was used
    for simultaneous reads and exclusive access was used for writes. In such scenario,
    you might end up with queues behind a single writer, which may contain read/write
    queries. Queue metrics need to be monitored along with the lock percentage. If
    the queues and the lock percentage are trending upwards, that implies that you
    have contention within the database. Changing the operation to batch mode or changing
    the data model can have a significant, positive impact on the concurrency. Starting
    from Version 3.0, collection level locking (in the `MMAPv1` storage engine) and
    document level locking (in the `WiredTiger` storage engine) have been introduced.
    This leads to an improvement in concurrency wherein no write lock with exclusive
    access will be required at the database level. So starting from this version you
    just need to measure the `Queue` metric.

    *   Whenever there’s a hiccup in the application, the CRUD behavior, indexing
    patterns, and indexes can help you better understand the application’s flow.

    *   It’s recommended to run the entire performance test against a full-size database,
    such as the production database copy, because performance characteristic are often
    highlighted when dealing with the actual data. This also lets you to avoid unpleasant
    surprises that might crop up when dealing with the actual performance database.


    ## 12.9 Summary


    In this chapter we provided various How To’s to help you on journey with MongoDB.'
  raw: '## 12.8 Monitoring


    MongoDB system should be proactively monitored to detect unusual behaviors so
    that necessary actions can be taken to resolve issues. Several tools are available
    for monitoring the MongoDB deployment.


    A free hosted monitoring service named MongoDB Cloud Manager is provided by MongoDB
    developers. MongoDB Cloud Manager offers a dashboard view of the entire cluster
    metrics. Alternatively, you can use nagios, SNMP, or munin to build your own tool.


    MongoDB also provides several tools such as mongostat and mongotop to gain insights
    into the performance. When using monitoring services, the following should be
    watched closely:


    *   Op counters: Includes inserts, delete, reads, updates and cursor usage.

    *   Resident memory: An eye should always be kept on the allocated memory. This
    counter value should always be lower than the physical memory. If you run out
    of memory, you will experience slowness in the performance due to page faults
    and index misses.

    *   Working set size: The active working set should fit into memory for a good
    performance, so a close eye needs to be kept on the working set. You can either
    optimize the queries so that the working set fits inside the memory or increase
    the memory when the working set is expected to increase.

    *   Queues: Prior to the release of MongoDB 3.0, a reader-writer lock was used
    for simultaneous reads and exclusive access was used for writes. In such scenario,
    you might end up with queues behind a single writer, which may contain read/write
    queries. Queue metrics need to be monitored along with the lock percentage. If
    the queues and the lock percentage are trending upwards, that implies that you
    have contention within the database. Changing the operation to batch mode or changing
    the data model can have a significant, positive impact on the concurrency. Starting
    from Version 3.0, collection level locking (in the MMAPv1 storage engine) and
    document level locking (in the WiredTiger storage engine) have been introduced.
    This leads to an improvement in concurrency wherein no write lock with exclusive
    access will be required at the database level. So starting from this version you
    just need to measure the Queue metric.

    *   Whenever there’s a hiccup in the application, the CRUD behavior, indexing
    patterns, and indexes can help you better understand the application’s flow.

    *   It’s recommended to run the entire performance test against a full-size database,
    such as the production database copy, because performance characteristic are often
    highlighted when dealing with the actual data. This also lets you to avoid unpleasant
    surprises that might crop up when dealing with the actual performance database.


