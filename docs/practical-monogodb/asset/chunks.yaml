    "Gender" : "M", "Class" : "Chemistry", "Score" : 90 }`


    `>`


    In order to understand how the regular expression works, let’s take the query
    `"Name":/(St|Te)*/i`.


    *   //i indicates that the regex is case insensitive.

    *   (St|Te)* means the Name string must start with either “St” or “Te”.

    *   The * at the end means it will match anything after that.


    When you put everything together, you are doing a case insensitive match of names
    that have either “St” or “Te” at the beginning of them. In the regex for the Class
    also the same Regex is issued.


    Next, let’s complicate the query a bit. Let’s combine it with the operators covered
    above.


    Fetch Students with names as student1, student2 and who are male students with
