  raw: '#### 6.1.8.7 reIndex


    When you have performed a number of insertions and deletions on the collection,
    you may have to rebuild the indexes so that the index can be used optimally. The
    `reIndex` command is used to rebuild the indexes.


    The following command rebuilds all the indexes of a collection. It will first
    drop the indexes, including the default index on the `_id` field, and then it
    will rebuild the indexes.


    `db.collectionname.reIndex()`


    The following command rebuilds the indexes of the `testindx` collection:


    `> db.testindx.reIndex()`


    `{`


    `"nIndexesWas" : 2,`


    `"msg" : "indexes dropped for collection",`


    `"nIndexes" : 2,`


    `..............`


    `"ok" : 1`


    `}`


    `>`


    We will be discussing in detail the different types of indexes available in MongoDB
    in the next chapter.


    #### 6.1.8.8 How Indexing Works


    MongoDB stores indexes in a BTree structure , so range queries are automatically
    supported.


    If multiple selection criteria are used in a query, MongoDB tries to find the
    best single index to select a candidate set. After that, it sequentially iterates
    through the set to evaluate the other criteria.


    When the query is executed for the first time, MongoDB creates multiple execution
    plans for each index that is available for the query. It lets the plans execute
    within certain number of ticks in turns, until the plan that executes the fastest
    finishes. The result is then returned to the system, which remembers the index
    that was used by the fastest execution plan.


    For subsequent queries, the remembered index will be used until some certain number
    of updates has happened within the collection. After the updating limit is crossed,
    the system will again follow the process to find out the best index that is applicable
    at that time.


    The reevaluation of the query plans will happen when either of the following events
    has occurred:


    *   The collection receives 1,000 write operations.

    *   An index is added or dropped.

    *   A restart of the mongod process happens.

    *   A reindexing for rebuilding the index happens.


    If you want to override MongoDB’s default index selection, the same can be done
    using the `hint()` method .


    The index filter is introduced in version 2.6\. It is made of indexes that an
    optimizer will evaluate for a query, including the query, projections, and the
    sorting. MongoDB will use the index as provided by the index filter and will ignore
    the `hint()`.


    Before version 2.6, at any point in time MongoDB uses only one index, so you need
    to ensure that composite indexes exist to match your queries better. This can
    be done by checking the sort and search criteria of the queries.


    Index intersection is introduced in version 2.6\. It enables intersection of indexes
    for fulfilling queries with compound conditions where part of condition is fulfilled
    by one index and the other part is fulfilled by the other index.


    In general, an index intersection is made up of two indexes; however, multiple
    index intersections can be used for resolving a query. This capability provides
    better optimization.


    As in other databases, index maintenance has a cost attached. Every operation
    that changes the collection (such as creation, updating, or deletion) has an overhead
    because the indexes also need to be updated. To maintain an optimal balance, you
    need to periodically check the effectiveness of having an index that can be measured
    by the ratio of reads and writes you are doing on the system. Identify the less-used
    indexes and delete them.


    ## 6.2 Stepping Beyond the Basics


    This section will cover advanced querying using conditional operators and regular
    expressions in the selector part. Each of these operators and regular expressions
    provides you with more control over the queries you write and consequently over
    the information you can fetch from the MongoDB database.


    ### 6.2.1 Using Conditional Operators


    Conditional operators enable you to have more control over the data you are trying
    to extract from the database. In this section, you will be focusing on the following
    operators: `$lt` , `$lte` , `$gt` , `$gte` , `$in` , `$nin` , and `$not` .


    The following example assumes a collection named `Students` that contains the
    following types of documents:


    `{`


    `_id: ObjectID(),`


    `Name: "Full Name",`


    `Age: 30,`


    `Gender: "M",`


    `Class: "C1",`


    `Score: 95`


    `}`


    You will first create the collection and insert few sample documents.


    `>db.students.insert({Name:"S1",Age:25,Gender:"M",Class:"C1",Score:95})`


    `>db.students.insert({Name:"S2",Age:18,Gender:"M",Class:"C1",Score:85})`


    `>db.students.insert({Name:"S3",Age:18,Gender:"F",Class:"C1",Score:85})`


    `>db.students.insert({Name:"S4",Age:18,Gender:"F",Class:"C1",Score:75})`


    `>db.students.insert({Name:"S5",Age:18,Gender:"F",Class:"C2",Score:75})`


    `>db.students.insert({Name:"S6",Age:21,Gender:"M",Class:"C2",Score:100})`


    `>db.students.insert({Name:"S7",Age:21,Gender:"M",Class:"C2",Score:100})`


    `>db.students.insert({Name:"S8",Age:25,Gender:"F",Class:"C2",Score:100})`


    `>db.students.insert({Name:"S9",Age:25,Gender:"F",Class:"C2",Score:90})`


    `>db.students.insert({Name:"S10",Age:28,Gender:"F",Class:"C3",Score:90})`


    `> db.students.find()`


    `{ "_id" : ObjectId("52f874faa13cd6a65998734d"), "Name" : "S1", "Age" : 25, "Gender"
    : "M", "Class" : "C1", "Score" : 95 }`


    `.......................`


    `{ "_id" : ObjectId("52f8758da13cd6a659987356"), "Name" : "S10", "Age" : 28, "Gender"
    : "F", "Class" : "C3", "Score" : 90 }`


    `>`


    #### 6.2.1.1 $lt and $lte


    Let’s start with the `$lt` and `$lte` operators . They stand for “less than” and
    “less than or equal to,” respectively.


    If you want to find all students who are younger than 25 (Age < 25), you can execute
    the following `find` with a selector:


    `> db.students.find({"Age":{"$lt":25}})`


    `{ "_id" : ObjectId("52f8750ca13cd6a65998734e"), "Name" : "S2", "Age" : 18, "Gender"
    : "M", "Class" : "C1", "Score" : 85 }`


    `.............................`


    `{ "_id" : ObjectId("52f87556a13cd6a659987353"), "Name" : "S7", "Age" : 21, "Gender"
    : "M", "Class" : "C2", "Score" : 100 }`


    `>`


    If you want to find out all students who are older than 25 (Age <= 25), execute
    the following:


    `> db.students.find({"Age":{"$lte":25}})`


    `{ "_id" : ObjectId("52f874faa13cd6a65998734d"), "Name" : "S1", "Age" : 25, "Gender"
    : "M", "Class" : "C1", "Score" : 95 }`


    `....................`


    `{ "_id" : ObjectId("52f87578a13cd6a659987355"), "Name" : "S9", "Age" : 25, "Gender"
    : "F", "Class" : "C2", "Score" : 90 }`


    `>`


    #### 6.2.1.2 $gt and $gte


    The `$gt` and `$gte` operators stand for “greater than” and “greater than or equal
    to,” respectively.


    Let’s find out all of the students with Age > 25\. This can be achieved by executing
    the following command:


    `> db.students.find({"Age":{"$gt":25}})`


    `{ "_id" : ObjectId("52f8758da13cd6a659987356"), "Name" : "S10", "Age" : 28, "Gender"
    : "F", "Class" : "C3", "Score" : 90 }`


    `>`


    If you change the above example to return students with Age >= 25, then the command
    is


    `> db.students.find({"Age":{"$gte":25}})`


    `{ "_id" : ObjectId("52f874faa13cd6a65998734d"), "Name" : "S1", "Age" : 25, "Gender"
    : "M", "Class" : "C1", "Score" : 95 }`


    `......................................`


    `{ "_id" : ObjectId("52f8758da13cd6a659987356"), "Name" : "S10", "Age" : 28, "Gender"
    : "F", "Class" : "C3", "Score" : 90 }`


    `>`'
  trans: "\n## 6.1.8.7 `reIndex`\n\n当你在集合上执行了多次插入和删除操作后，可能需要重建索引，以便索引能够以最佳状态使用。`reIndex`\
    \ 命令用于重建索引。\n\n以下命令重建集合的所有索引。它会首先删除索引（包括 `_id` 字段上的默认索引），然后重建这些索引。\n\n```\ndb.collectionname.reIndex()\n\
    ```\n\n以下命令重建 `testindx` 集合的索引：\n\n```\n> db.testindx.reIndex()\n{\n    \"nIndexesWas\"\
    \ : 2,\n    \"msg\" : \"indexes dropped for collection\",\n    \"nIndexes\" :\
    \ 2,\n    ..............\n    \"ok\" : 1\n}\n>\n```\n\n我们将在下一章详细讨论 MongoDB 中可用的不同类型的索引。\n\
    \n## 6.1.8.8 索引如何工作\n\nMongoDB 将索引存储在 BTree 结构中，因此自动支持范围查询。\n\n如果在查询中使用了多个选择条件，MongoDB\
    \ 会尝试找到最佳的单一索引来选择候选集。之后，它会顺序遍历该集合以评估其他条件。\n\n当首次执行查询时，MongoDB 会为该查询可用的每个索引创建多个执行计划。它让这些计划轮流在一定数量的滴答（ticks）内执行，直到执行最快的计划完成。结果随后返回给系统，系统会记住最快执行计划所使用的索引。\n\
    \n对于后续查询，将使用记住的索引，直到集合内发生的更新次数达到某个特定限制。超过更新限制后，系统将再次遵循该过程以找出当时适用的最佳索引。\n\n当发生以下任一事件时，查询计划将重新评估：\n\
    \n*   集合接收到 1,000 次写操作。\n*   添加或删除了一个索引。\n*   `mongod` 进程重启。\n*   为重建索引而重新索引。\n\
    \n如果你想覆盖 MongoDB 的默认索引选择，可以使用 `hint()` 方法来实现。\n\n索引过滤器在 2.6 版本中引入。它由优化器将为查询评估的索引组成，包括查询、投影和排序。MongoDB\
    \ 将使用索引过滤器提供的索引，并忽略 `hint()`。\n\n在 2.6 版本之前，MongoDB 在任何时间点只使用一个索引，因此你需要确保存在复合索引以更好地匹配你的查询。这可以通过检查查询的排序和搜索条件来实现。\n\
    \n索引交集在 2.6 版本中引入。它支持通过满足复合条件的查询来交集索引，其中部分条件由一个索引满足，另一部分由另一个索引满足。\n\n通常，索引交集由两个索引组成；然而，可以使用多个索引交集来解析查询。这种能力提供了更好的优化。\n\
    \n与其他数据库一样，索引维护是有成本的。每个更改集合的操作（如创建、更新或删除）都会产生开销，因为索引也需要更新。为保持最佳平衡，你需要定期检查拥有索引的有效性，这可以通过系统上的读写比率来衡量。识别使用较少的索引并删除它们。\n\
