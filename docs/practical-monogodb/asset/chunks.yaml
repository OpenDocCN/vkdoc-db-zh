    `"Name" : {`


    `"$eq" : "user101"`


    `}`


    `},`


    `"winningPlan" : {`


    `"stage" : "COLLSCAN",`


    `"filter" : {`


    `"Name" : {`


    `"$eq" : "user101"`


    `}`


    `},`


    `"direction" : "forward"`


    `},`


