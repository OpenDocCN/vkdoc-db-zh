    `{ "shard" : "shard0002" }`


    `{ "shard" : "shard0002" }`


    `{ "shard" : "shard0002" }`


    `{ "shard" : "shard0002" }`


    `mongos> db.chunks.find({ns:"movies.comedy"}, {shard:1, _id:0}).sort({shard:1})`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `mongos>`


    The chunks have been redistributed reflecting the changes made (Figure [7-24](#A332296_1_En_7_Chapter.html#Fig24)).


    ![A332296_1_En_7_Fig24_HTML.jpg](A332296_1_En_7_Fig24_HTML.jpg)


    Figure 7-24.


    Tagging with scaling


    #### 7.5.6.4 Multiple Tags


    You can have multiple tags associated with the shards. Let’s add two different
    tags to the shards.


    Say you want to distribute the writes based on the disk. You have one shard that
    has a spinning disk and the other has a SSD (solid state drive). You want to redirect
    50% of the writes to the shard with SSD and the remaining to the one with the
    spinning disk.


    First, tag the shards based on these properties:


    `mongos> sh.addShardTag("shard0001", "spinning")`


    `mongos> sh.addShardTag("shard0002", "ssd")`


    `mongos>`


    Let’s further assume you have a `distribution` field of the `movies.action` collection
    that you will be using as the shard key. The `distribution` field value is between
    0 and 1\. Next, you want to say, “If distribution < .5, send this to the spinning
    disk. If distribution >= .5, send to the SSD.” So you define the rules as follows:


    `mongos>sh.addTagRange("movies.action", {distribution:MinKey} ,{distribution:.5}
    ,"spinning")`


    `mongos>sh.addTagRange("movies.action" ,{distribution:.5} ,{distribution:MaxKey},"ssd")`


    `mongos>`


    Now documents with distribution < .5 will be written to the spinning shard and
    the others will be written to the SSD disk shard.


    With tagging you can control the type of load that each newly added server will
    get.


    ### 7.5.7 Points to Remember When Importing Data in a ShardedEnvironment


    Here are some points to keep in mind when importing data.'
