    Type \"it\" for more\n>\n```\n\n如果 `update()` 命令中指定的字段在文档中已存在，它将更新该字段的值；如果该字段不存在，则会将该字段添加到文档中。\n\
    \n接下来，你将看到如何使用相同的 `update()` 命令配合 `$unset` 操作符从文档中移除字段。\n\n以下命令将从所有文档中移除 `Company`\
    \ 字段：\n```\n> db.users.update({},{$unset:{\"Company\":\"\"}},{multi:true})\n>\n\
    ```\n\n可以通过对 `Users` 集合执行 `find()` 命令来验证。你可以看到 `Company` 字段已从文档中删除。\n```\n> db.users.find()\n\
    { \"Age\" : 30, \"Country\" : \"US\", \"FName\" : \"Test\", \"Gender\" : \"M\"\
    , \"LName\" : \"User\", \"_id\" : ObjectId(\"52f48cf474f8fdcfcae84f79\") }\n.............\n\
    Type \"it\" for more\n```\n\n### 6.1.6 删除\n\n要删除集合中的文档，请使用 `remove()` 方法。如果指定了选择条件，则仅删除符合条件的文档。如果未指定条件，则所有文档都将被删除。\n\
    \n以下命令将删除 `Gender = 'M'` 的文档：\n```\n> db.users.remove({\"Gender\":\"M\"})\n>\n\
    ```\n\n可以通过在 `Users` 上执行 `find()` 命令进行验证：\n```\n> db.users.find({\"Gender\":\"\
    M\"})\n>\n```\n没有文档返回。\n\n以下命令将删除所有文档：\n```\n> db.users.remove({})\n> db.users.find()\n\
    >\n```\n如你所见，没有文档返回。\n\n最后，如果你想删除整个集合，可以使用以下命令：\n```\n> db.users.drop()\ntrue\n\
    >\n```\n\n为了验证集合是否已被删除，可以执行 `show collections` 命令。\n```\n> show collections\n\
    system.indexes\n>\n```\n如你所见，集合名称没有显示，这确认了该集合已从数据库中移除。\n\n在介绍了基本的创建、更新和删除操作之后，下一节将展示如何执行读取操作。\n\
    \n### 6.1.7 读取\n\n在本章的这一部分，你将通过各种示例了解 MongoDB 提供的查询功能，这些功能使你能够从数据库中读取存储的数据。\n\n\
    为了从基本查询开始，首先使用 `insert` 命令创建 `users` 集合并插入数据。\n```\n> user1 = {FName: \"Test\"\
    , LName: \"User\", Age:30, Gender: \"M\", Country: \"US\"}\n{\n    \"FName\" :\
    \ \"Test\",\n    \"LName\" : \"User\",\n    \"Age\" : 30,\n    \"Gender\" : \"\
    M\",\n    \"Country\" : \"US\"\n}\n> user2 = {Name: \"Test User\", Age:45, Gender:\
    \ \"F\", Country: \"US\"}\n{ \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\"\
    \ : \"F\", \"Country\" : \"US\" }\n> db.users.insert(user1)\n> db.users.insert(user2)\n\
    > for(var i=1; i<=20; i++) db.users.insert({\"Name\" : \"Test User\" + i, \"Age\"\
    : 10+i, \"Gender\" : \"F\", \"Country\" : \"India\"})\n```\n\n现在开始基本查询。`find()`\
    \ 命令用于从数据库中检索数据。\n\n执行 `find()` 命令会返回集合中的所有文档。\n```\n> db.users.find()\n{ \"_id\"\
    \ : ObjectId(\"52f4a823958073ea07e15070\"), \"FName\" : \"Test\", \"LName\" :\
    \ \"User\", \"Age\" : 30, \"Gender\" : \"M\", \"Country\" : \"US\" }\n{ \"_id\"\
    \ : ObjectId(\"52f4a826958073ea07e15071\"), \"Name\" : \"Test User\", \"Age\"\
    \ : 45, \"Gender\" : \"F\", \"Country\" : \"US\" }\n......\n{ \"_id\" : ObjectId(\"\
    52f4a83f958073ea07e15083\"), \"Name\" : \"Test User18\", \"Age\" :28, \"Gender\"\
    \ : \"F\", \"Country\" : \"India\" }\nType \"it\" for more\n>\n```\n\n#### 6.1.7.1\
    \ 查询文档\n\nMongoDB 提供了丰富的查询系统。可以将查询文档作为参数传递给 `find()` 方法，以过滤集合中的文档。\n\n查询文档在花括号\
    \ `{` 和 `}` 内指定。在返回结果集之前，查询文档会与集合中的所有文档进行匹配。\n\n使用不带查询文档的 `find()` 命令或使用空查询文档（如\
    \ `find({}`）将返回集合中的所有文档。\n\n查询文档可以包含选择器和投影器。\n\n选择器类似于 SQL 中的 `where` 条件或过滤器，用于过滤结果。\n\
    \n投影器类似于 `select` 条件或选择列表，用于显示数据字段。\n"
- fmt: '## 6.1.7.2 选择器


    你现在将学习如何使用选择器。以下命令将返回所有女性用户：


    ```

    > db.users.find({"Gender":"F"})


    { "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }

    .............

    { "_id" : ObjectId("52f4a83f958073ea07e15084"), "Name" : "Test User19", "Age"
    :29, "Gender" : "F", "Country" : "India" }

    Type "it" for more

    >

    ```


    让我们更进一步。MongoDB还支持操作符，可以将不同的条件合并在一起，以便根据你的需求优化搜索。


    让我们优化上面的查询，现在查找来自印度的女性用户。以下命令将返回相同的结果：


    ```

    > db.users.find({"Gender":"F", $or: [{"Country":"India"}]})


    { "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age" :
    11, "Gender" : "F", "Country" : "India" }

    ...........

    { "_id" : ObjectId("52f4a83f958073ea07e15085"), "Name" : "Test User20", "Age"
    :30, "Gender" : "F", "Country" : "India" }

    >

    ```


    接下来，如果你想找到所有属于印度或美国的女性用户，请执行以下命令：


    ```

    >db.users.find({"Gender":"F",$or:[{"Country":"India"},{"Country":"US"}]})


    { "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }

    ..............

    { "_id" : ObjectId("52f4a83f958073ea07e15084"), "Name" : "Test User19", "Age"
    :29, "Gender" : "F", "Country" : "India" }

    Type "it" for more

    ```


    对于聚合需求，需要使用聚合函数。接下来，你将学习如何使用`count()`函数进行聚合。


    在上面的例子中，你不想显示文档，而是想找出居住在印度或美国的女性用户的数量。因此请执行以下命令：


    ```

    >db.users.find({"Gender":"F",$or:[{"Country":"India"}, {"Country":"US"}]}).count()


    21

    >

    ```


    如果你想查找不考虑任何选择器的用户数量，请执行以下命令：


    ```

    > db.users.find().count()


    22

    >

    ```


    ## 6.1.7.3 投影器


    你已经学习了如何使用选择器来过滤集合中的文档。在上面的例子中，`find()`命令返回匹配选择器的文档的所有字段。


    让我们在查询文档中添加一个投影器，在选择器之外，你还将指定需要显示的特定详情或字段。


    假设你想显示所有女性员工的名字和年龄。在这种情况下，除了选择器，还需要使用投影器。


    执行以下命令以返回所需的结果集：


    ```

    > db.users.find({"Gender":"F"}, {"Name":1,"Age":1})


    { "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45 }

    ..........

    Type "it" for more

    >

    ```


    ## 6.1.7.4 sort()


    在MongoDB中，排序顺序指定如下：1表示升序，-1表示降序。


    如果在上面的例子中，你想按年龄升序对记录进行排序，请执行以下命令：


    ```

    >db.users.find({"Gender":"F"}, {"Name":1,"Age":1}).sort({"Age":1})


    { "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age" :
    11 }

    { "_id" : ObjectId("52f4a83f958073ea07e15073"), "Name" : "Test User2", "Age" :
    12 }

    { "_id" : ObjectId("52f4a83f958073ea07e15074"), "Name" : "Test User3", "Age" :
    13 }

    ..............

    { "_id" : ObjectId("52f4a83f958073ea07e15085"), "Name" : "Test User20", "Age"
    :30 }

    Type "it" for more

    ```


    如果你想按姓名降序、年龄升序显示记录，请执行以下命令：


    ```

    >db.users.find({"Gender":"F"},{"Name":1,"Age":1}).sort({"Name":-1,"Age":1})


    { "_id" : ObjectId("52f4a83f958073ea07e1507a"), "Name" : "Test User9", "Age" :
    19 }

    ............

    { "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age" :
    11 }

    Type "it" for more

    ```


    ## 6.1.7.5 limit()


    你现在将了解如何限制结果集中的记录数。例如，在包含数千个文档的大型集合中，如果你想只返回五个匹配的文档，就会使用`limit`命令，它正好可以让你做到这一点。


    回到之前关于居住在印度或美国的女性用户的查询，假设你想限制结果集，只返回两个用户。需要执行以下命令：


    ```

    >db.users.find({"Gender":"F",$or:[{"Country":"India"},{"Country":"US"}]}).limit(2)


    { "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }

    { "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age" :
    11, "Gender" : "F", "Country" : "India" }

    ```


    ## 6.1.7.6 skip()


    如果需求是跳过前两条记录并返回第三和第四个用户，则需要使用`skip`命令。需要执行以下命令：


    ```

    >db.users.find({"Gender":"F",$or:[{"Country":"India"}, {"Country":"US"}]}).limit(2).skip(2)


    { "_id" : ObjectId("52f4a83f958073ea07e15073"), "Name" : "Test User2", "Age" :
    12, "Gender" : "F", "Country" : "India" }

    { "_id" : ObjectId("52f4a83f958073ea07e15074"), "Name" : "Test User3", "Age" :
    13, "Gender" : "F", "Country" : "India" }

    >

    ```


    ## 6.1.7.7 findOne()


    与`find()`类似的是`findOne()`命令。`findOne()`方法可以接受与`find()`相同的参数，但它不返回游标，而是返回单个文档。假设你想返回一个居住在印度或美国的女性用户。这可以通过以下命令实现：


    ```

    > db.users.findOne({"Gender":"F"}, {"Name":1,"Age":1})


    {

    "_id" : ObjectId("52f4a826958073ea07e15071"),

    "Name" : "Test User",

    "Age" : 45

    }

    >

    ```


    类似地，如果你想不考虑任何选择器返回第一条记录，在这种情况下，你可以使用`findOne()`，它将返回集合中的第一个文档。


    ```

    > db.users.findOne()


    {

    "_id" : ObjectId("52f4a823958073ea07e15070"),

    "FName" : "Test",

    "LName" : "User",

    "Age" : 30,

    "Gender" : "M",

    "Country" : "US"}

    ```


    ## 6.1.7.8 使用游标


    当使用`find()`方法时，MongoDB将查询结果作为游标对象返回。为了显示结果，mongo shell会遍历返回的游标。


    MongoDB使用户能够使用`find`方法的游标对象。在下一个例子中，你将看到如何将游标对象存储到变量中，并使用while循环对其进行操作。


    假设你想返回所有在美国的用户。为此，你创建了一个变量，将`find()`的输出赋值给该变量（这是一个游标），然后使用while循环进行迭代并打印输出。


    代码片段如下：


    ```

    > var c = db.users.find({"Country":"US"})

    > while(c.hasNext()) printjson(c.next())


    {

    "_id" : ObjectId("52f4a823958073ea07e15070"),

    "FName" : "Test",

    "LName" : "User",

    "Age" : 30,

    "Gender" : "M",

    "Country" : "US"

    }

    {

    "_id" : ObjectId("52f4a826958073ea07e15071"),

    "Name" : "Test User",

    "Age" : 45,

    "Gender" : "F",

    "Country" : "US"

    }

    >

    ```


    `next()`函数返回下一个文档。`hasNext()`函数在文档存在时返回true，而`printjson()`以JSON格式呈现输出。


    游标对象被赋值给的变量也可以作为数组进行操作。如果你想显示数组索引1处的文档，而不是遍历该变量，你可以运行以下命令：


    ```

    > var c = db.users.find({"Country":"US"})

    > printjson(c[1])


    {

    "_id" : ObjectId("52f4a826958073ea07e15071"),

    "Name" : "Test User",

    .... "Gender" : "F",

    "Country" : "US"}

    >

    ```'
  raw: '#### 6.1.7.2 Selector


    You will now see how to use the selector. The following command will return all
    the female users:


    `> db.users.find({"Gender":"F"})`


    `{ "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }`


    `.............`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15084"), "Name" : "Test User19", "Age"
    :29, "Gender" : "F", "Country" : "India" }`


    `Type "it" for more`


    `>`


    Let’s step it up a notch. MongoDB also supports operators that merge different
    conditions together in order to refine your search on the basis of your requirements.


    Let’s refine the above query to now look for female users from India. The following
    command will return the same:


    `> db.users.find({"Gender":"F", $or: [{"Country":"India"}]})`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age"
    : 11, "Gender" : "F", "Country" : "India" }`


    `...........`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15085"), "Name" : "Test User20", "Age"
    :30, "Gender" : "F", "Country" : "India" }`


    `>`


    Next, if you want to find all female users who belong to either India or US, execute
    the following command:


    `>db.users.find({"Gender":"F",$or:[{"Country":"India"},{"Country":"US"}]})`


    `{ "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }`


    `..............`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15084"), "Name" : "Test User19", "Age"
    :29, "Gender" : "F", "Country" : "India" }`


    `Type "it" for more`


    For aggregation requirements, the aggregate functions need to be used. Next, you’ll
    learn how to use the `count()` function for aggregation.


    In the above example, instead of displaying the documents, you want to find out
    a count of female users who stay in either India or the US. So execute the following
    command:


    `>db.users.find({"Gender":"F",$or:[{"Country":"India"}, {"Country":"US"}]}).count()`


    `21`


    `>`


    If you want to find a count of users irrespective of any selectors, execute the
    following command:


    `> db.users.find().count()`


    `22`


    `>`


    #### 6.1.7.3 Projector


    You have seen how to use selectors to filter out documents within the collection.
    In the above example, the `find()` command returns all fields of the documents
    matching the selector.


    Let’s add a projector to the query document where, in addition to the selector,
    you will also mention specific details or fields that need to be displayed.


    Suppose you want to display the first name and age of all female employees. In
    this case, along with the selector, a projector is also used.


    Execute the following command to return the desired result set:


    `> db.users.find({"Gender":"F"}, {"Name":1,"Age":1})`


    `{ "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45 }`


    `..........`


    `Type "it" for more`


    `>`


    #### 6.1.7.4 sort(  )


    In MongoDB, the sort order is specified as follows: 1 for ascending and -1 for
    descending sort.


    If in the above example you want to sort the records by ascending order of age,
    you execute the following command:


    `>db.users.find({"Gender":"F"}, {"Name":1,"Age":1}).sort({"Age":1})`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age"
    : 11 }`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15073"), "Name" : "Test User2", "Age"
    : 12 }`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15074"), "Name" : "Test User3", "Age"
    : 13 }`


    `..............`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15085"), "Name" : "Test User20", "Age"
    :30 }`


    `Type "it" for more`


    If you want to display the records in descending order by name and ascending order
    by age, you execute the following command:


    `>db.users.find({"Gender":"F"},{"Name":1,"Age":1}).sort({"Name":-1,"Age":1})`


    `{ "_id" : ObjectId("52f4a83f958073ea07e1507a"), "Name" : "Test User9", "Age"
    : 19 }`


    `............`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age"
    : 11 }`


    `Type "it" for more`


    #### 6.1.7.5 limit(  )


    You will now look at how you can limit the records in your result set. For example,
    in huge collections with thousands of documents, if you want to return only five
    matching documents, the `limit` command is used, which enables you to do exactly
    that.


    Returning to your previous query of female users who live in either India or US,
    say you want to limit the result set and return only two users. The following
    command needs to be executed:


    `>db.users.find({"Gender":"F",$or:[{"Country":"India"},{"Country":"US"}]}).limit(2)`


    `{ "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age"
    : 11, "Gender" : "F", "Country" : "India" }`


    #### 6.1.7.6 skip(  )


    If the requirement is to skip the first two records and return the third and fourth
    user, the `skip` command is used. The following command needs to be executed:


    `>db.users.find({"Gender":"F",$or:[{"Country":"India"}, {"Country":"US"}]}).limit(2).skip(2)`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15073"), "Name" : "Test User2", "Age"
    : 12, "Gender" : "F", "Country" : "India" }`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15074"), "Name" : "Test User3", "Age"
    : 13, "Gender" : "F", "Country" : "India" }`


    `>`


    #### 6.1.7.7 findOne(  )


    Similar to `find()` is the `findOne()` command. The `findOne()` method can take
    the same parameters as `find()`, but rather then returning a cursor, it returns
    a single document. Say you want to return one female user who stays in either
    India or US. This can be achieved using the following command:


    `> db.users.findOne({"Gender":"F"}, {"Name":1,"Age":1})`


    `{`


    `"_id" : ObjectId("52f4a826958073ea07e15071"),`


    `"Name" : "Test User",`


    `"Age" : 45`


    `}`


    `>`


    Similarly, if you want to return the first record irrespective of any selector
    in that case, you can use `findOne()` and it will return the first document in
    the collection.


    `> db.users.findOne()`


    `{`


    `"_id" : ObjectId("52f4a823958073ea07e15070"),`


    `"FName" : "Test",`


    `"LName" : "User",`


    `"Age" : 30,`


    `"Gender" : "M",`


    `"Country" : "US"}`


    #### 6.1.7.8 Using Cursor


    When the `find()` method is used, MongoDB returns the results of the query as
    a cursor object. In order to display the result, the mongo shell iterates over
    the returned cursor.


    MongoDB enables the users to work with the Cursor object of the `find` method.
    In the next example, you will see how to store the cursor object in a variable
    and manipulate it using a while loop.


    Say you want to return all the users in the US. In order to do so, you created
    a variable, assigned the output of `find()` to the variable, which is a cursor,
    and then using the while loop you iterate and print the output.


    The code snippet is as follows:


    `> var c = db.users.find({"Country":"US"})`


    `> while(c.hasNext()) printjson(c.next())`


    `{`


    `"_id" : ObjectId("52f4a823958073ea07e15070"),`


    `"FName" : "Test",`


    `"LName" : "User",`


    `"Age" : 30,`


    `"Gender" : "M",`


    `"Country" : "US"`


    `}`


    `{`


    `"_id" : ObjectId("52f4a826958073ea07e15071"),`


    `"Name" : "Test User",`


    `"Age" : 45,`


    `"Gender" : "F",`


    `"Country" : "US"`


    `}`


    `>`


    The `next()` function returns the next document. The `hasNext()` function returns
    true if a document exists, and `printjson()` renders the output in JSON format.


    The variable to which the cursor object is assigned can also be manipulated as
    an array. If, instead of looping through the variable, you want to display the
    document at array index 1, you can run the following command:


    `> var c = db.users.find({"Country":"US"})`


    `> printjson(c[1])`


    `{`


    `"_id" : ObjectId("52f4a826958073ea07e15071"),`


    `"Name" : "Test User",`


    `.... "Gender" : "F",`


    `"Country" : "US"}`


    `>`'
  trans: '## 6.1.7.2 选择器


    你现在将学习如何使用选择器。以下命令将返回所有女性用户：


    ```

    > db.users.find({"Gender":"F"})


    { "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }

    .............

    { "_id" : ObjectId("52f4a83f958073ea07e15084"), "Name" : "Test User19", "Age"
    :29, "Gender" : "F", "Country" : "India" }

    Type "it" for more

    >

    ```


    让我们更进一步。MongoDB 还支持操作符，可以将不同的条件合并在一起，以便根据你的需求优化搜索。


    让我们优化上面的查询，现在查找来自印度的女性用户。以下命令将返回相同的结果：


    ```

    > db.users.find({"Gender":"F", $or: [{"Country":"India"}]})


    { "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age" :
    11, "Gender" : "F", "Country" : "India" }

    ...........

    { "_id" : ObjectId("52f4a83f958073ea07e15085"), "Name" : "Test User20", "Age"
    :30, "Gender" : "F", "Country" : "India" }

    >

    ```


    接下来，如果你想找到所有属于印度或美国的女性用户，请执行以下命令：


    ```

    >db.users.find({"Gender":"F",$or:[{"Country":"India"},{"Country":"US"}]})


    { "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }

    ..............

    { "_id" : ObjectId("52f4a83f958073ea07e15084"), "Name" : "Test User19", "Age"
    :29, "Gender" : "F", "Country" : "India" }

    Type "it" for more

    ```


    对于聚合需求，需要使用聚合函数。接下来，你将学习如何使用`count()`函数进行聚合。


    在上面的例子中，你不想显示文档，而是想找出居住在印度或美国的女性用户的数量。因此请执行以下命令：


    ```

    >db.users.find({"Gender":"F",$or:[{"Country":"India"}, {"Country":"US"}]}).count()


    21

    >

    ```


    如果你想查找不考虑任何选择器的用户数量，请执行以下命令：


    ```

    > db.users.find().count()


    22

    >

    ```


    ## 6.1.7.3 投影器


    你已经学习了如何使用选择器来过滤集合中的文档。在上面的例子中，`find()`命令返回匹配选择器的文档的所有字段。


    让我们在查询文档中添加一个投影器，在选择器之外，你还将指定需要显示的特定详情或字段。


    假设你想显示所有女性员工的名字和年龄。在这种情况下，除了选择器，还需要使用投影器。


    执行以下命令以返回所需的结果集：


    ```

    > db.users.find({"Gender":"F"}, {"Name":1,"Age":1})


    { "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45 }

    ..........

    Type "it" for more

    >

    ```


    ## 6.1.7.4 sort()


    在 MongoDB 中，排序顺序指定如下：1 表示升序，-1 表示降序。


    如果在上面的例子中，你想按年龄升序对记录进行排序，请执行以下命令：


    ```

    >db.users.find({"Gender":"F"}, {"Name":1,"Age":1}).sort({"Age":1})


    { "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age" :
    11 }

    { "_id" : ObjectId("52f4a83f958073ea07e15073"), "Name" : "Test User2", "Age" :
    12 }

    { "_id" : ObjectId("52f4a83f958073ea07e15074"), "Name" : "Test User3", "Age" :
    13 }

    ..............

    { "_id" : ObjectId("52f4a83f958073ea07e15085"), "Name" : "Test User20", "Age"
    :30 }

    Type "it" for more

    ```


    如果你想按姓名降序、年龄升序显示记录，请执行以下命令：


    ```

    >db.users.find({"Gender":"F"},{"Name":1,"Age":1}).sort({"Name":-1,"Age":1})


    { "_id" : ObjectId("52f4a83f958073ea07e1507a"), "Name" : "Test User9", "Age" :
    19 }

    ............

    { "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age" :
    11 }

    Type "it" for more

    ```


    ## 6.1.7.5 limit()


    你现在将了解如何限制结果集中的记录数。例如，在包含数千个文档的大型集合中，如果你想只返回五个匹配的文档，就会使用`limit`命令，它正好可以让你做到这一点。


    回到之前关于居住在印度或美国的女性用户的查询，假设你想限制结果集，只返回两个用户。需要执行以下命令：


    ```

    >db.users.find({"Gender":"F",$or:[{"Country":"India"},{"Country":"US"}]}).limit(2)


    { "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }

    { "_id" : ObjectId("52f4a83f958073ea07e15072"), "Name" : "Test User1", "Age" :
    11, "Gender" : "F", "Country" : "India" }

    ```


    ## 6.1.7.6 skip()


    如果需求是跳过前两条记录并返回第三和第四个用户，则需要使用`skip`命令。需要执行以下命令：


    ```

    >db.users.find({"Gender":"F",$or:[{"Country":"India"}, {"Country":"US"}]}).limit(2).skip(2)


    { "_id" : ObjectId("52f4a83f958073ea07e15073"), "Name" : "Test User2", "Age" :
    12, "Gender" : "F", "Country" : "India" }

    { "_id" : ObjectId("52f4a83f958073ea07e15074"), "Name" : "Test User3", "Age" :
    13, "Gender" : "F", "Country" : "India" }

    >

    ```


    ## 6.1.7.7 findOne()


    与`find()`类似的是`findOne()`命令。`findOne()`方法可以接受与`find()`相同的参数，但它不返回游标，而是返回单个文档。假设你想返回一个居住在印度或美国的女性用户。这可以通过以下命令实现：


    ```

    > db.users.findOne({"Gender":"F"}, {"Name":1,"Age":1})


    {

    "_id" : ObjectId("52f4a826958073ea07e15071"),

    "Name" : "Test User",

    "Age" : 45

    }

    >

    ```


    类似地，如果你想不考虑任何选择器返回第一条记录，在这种情况下，你可以使用`findOne()`，它将返回集合中的第一个文档。


    ```

    > db.users.findOne()


    {

    "_id" : ObjectId("52f4a823958073ea07e15070"),

    "FName" : "Test",

    "LName" : "User",

    "Age" : 30,

    "Gender" : "M",

    "Country" : "US"}

    ```


    ## 6.1.7.8 使用游标


    当使用`find()`方法时，MongoDB 将查询结果作为游标对象返回。为了显示结果，mongo shell 会遍历返回的游标。


    MongoDB 使用户能够使用`find`方法的游标对象。在下一个例子中，你将看到如何将游标对象存储到变量中，并使用 while 循环对其进行操作。


    假设你想返回所有在美国的用户。为此，你创建了一个变量，将`find()`的输出赋值给该变量（这是一个游标），然后使用 while 循环进行迭代并打印输出。


    代码片段如下：


    ```

    > var c = db.users.find({"Country":"US"})

    > while(c.hasNext()) printjson(c.next())


    {

    "_id" : ObjectId("52f4a823958073ea07e15070"),

    "FName" : "Test",

    "LName" : "User",

    "Age" : 30,

    "Gender" : "M",

    "Country" : "US"

    }

    {

    "_id" : ObjectId("52f4a826958073ea07e15071"),

    "Name" : "Test User",

    "Age" : 45,

    "Gender" : "F",

    "Country" : "US"

    }

    >

    ```


    `next()`函数返回下一个文档。`hasNext()`函数在文档存在时返回 true，而`printjson()`以 JSON 格式呈现输出。


    游标对象被赋值给的变量也可以作为数组进行操作。如果你想显示数组索引 1 处的文档，而不是遍历该变量，你可以运行以下命令：


    ```

    > var c = db.users.find({"Country":"US"})

    > printjson(c[1])


    {

    "_id" : ObjectId("52f4a826958073ea07e15071"),

    "Name" : "Test User",

    .... "Gender" : "F",

    "Country" : "US"}

    >

    ```'
- fmt: "### 6.1.7.9 `explain()`\n\n`explain()` 函数可用于查看 MongoDB 数据库在执行查询时运行的步骤。从 3.0\
