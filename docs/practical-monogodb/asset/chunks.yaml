    Now let’s look at how the indexes are stored. The `BTree` structure is used for
    storing the indexes. A `BTree` is shown in Figure [8-7](#A332296_1_En_8_Chapter.html#Fig7).


    ![A332296_1_En_8_Fig7_HTML.jpg](A332296_1_En_8_Fig7_HTML.jpg)

    *Figure 8-7. BTree*


    In a standard implementation of `BTree`, whenever a new key is inserted in a `BTree`,
    the default behavior is as shown in Figure [8-8](#A332296_1_En_8_Chapter.html#Fig8).


    ![A332296_1_En_8_Fig8_HTML.jpg](A332296_1_En_8_Fig8_HTML.jpg)

    *Figure 8-8. B-Tree standard implementation*


    There’s a slight variation in the way MongoDB implements the `BTree`.

    In the above scenario, if you have keys such as `Timestamp`, `ObjectID`, or an
    incrementing number, then the buckets will always be half full, leading to lots
    of wasted space.


    In order to overcome this, MongoDB has modified this slightly. Whenever it identifies
    that the index key is an incrementing key, rather than doing a 50/50 split, it
    does a 90/10 split as shown in Figure [8-9](#A332296_1_En_8_Chapter.html#Fig9).


    ![A332296_1_En_8_Fig9_HTML.jpg](A332296_1_En_8_Fig9_HTML.jpg)

    *Figure 8-9. MongoDB’s B-Tree 90/10 split*


    Figure [8-10](#A332296_1_En_8_Chapter.html#Fig10) shows the bucket structure.
    Each bucket of the `BTree` is of 8KB.


    ![A332296_1_En_8_Fig10_HTML.jpg](A332296_1_En_8_Fig10_HTML.jpg)

    *Figure 8-10. BTree bucket data structure*


    The bucket consists of the following:


    - Pointer to the parent

    - Pointer to the right child

    - Pointer to key nodes

    - A list of key objects (these objects are of varying size and are stored in an
    unsorted manner; these objects are actually the value of the index keys)


    ##### Key Nodes


    Key nodes are nodes of a fixed size and are stored in a sorted manner. They enable
    easy split and movement of the elements between different nodes of the `BTree`.

    A key node contains the following:


    - A pointer to the left child

    - The data record the index key belongs to

    - A key offset (the offset of the key objects, which basically tells where in
    the bucket the key’s value is stored)


    ## 8.3 Data File (Relevant for WiredTiger)


    In this section, you will look at the content of data directory when the `mongod`
    is started with the `WiredTiger` storage engine.

    When the storage option selected is `WiredTiger`, data, journals, and indexes
    are compressed on disk. The compression is done based on the compression algorithm
    specified when starting the `mongod`.


    `Snappy` is the default compression option.

    Under the data directory, there are separate compressed `wt` files corresponding
    to each collection and indexes. Journals have their own folder under the data
    directory.


    The compressed files are actually created when data is inserted in the collection
    (the files are allocated at write time, no preallocation).

    For example, if you create collection called `users`, it will be stored in `collection-0—2259994602858926461`
    files and the associated index will be stored in `index-1—2259994602858926461`,
    `index-2—2259994602858926461`, and so on.


    In addition to the collection and index compressed files, there is a `_mdb_catalog`
    file that stores metadata mapping collection and indexes to the files in the data
    directory. In the above example it will store mapping of collection `users` to
    the `wt` file `collection-0—2259994602858926461`. See Figure [8-11](#A332296_1_En_8_Chapter.html#Fig11).


    ![A332296_1_En_8_Fig11_HTML.jpg](A332296_1_En_8_Fig11_HTML.jpg)

    *Figure 8-11. WiredTiger Data folder*


    Separate volumes can be specified for storing indexes.

    When specifying the `DBPath` you need to ensure that the directory corresponds
    to the storage engine, which is specified using the `–storageEngine` option when
    starting the `mongod`. The `mongod` will fail to start if the `dbpath` contains
    files created by a storage engine other than the one specified using the `–storageEngine`
    option. So if `MMAPv1` files are found in `DBPath`, then `WT` will fail to start.


    Internally, `WiredTiger` uses the traditional `B+ tree` structure for storing
    and managing data but that’s where the similarity ends. Unlike `B+ tree`, it doesn’t
    support in-place updates.

    `WiredTiger` cache is used for any read/write operations on the data. The trees
    in cache are optimized for in-memory access.


    ## 8.4 Reads and Writes


    You will briefly look at how the reads and writes happen. As mentioned, when MongoDB
    updates and reads from the `DB`, it is actually reading and writing to memory.

    If a modification operation in the MongoDB `MMAPv1` storage engine increases the
    record size bigger then the space allocated for it, then the entire record will
    be moved to a much bigger space with extra padding bytes. By default, MongoDB
    uses power of 2-sized allocations so that every document in MongoDB is stored
    in a record that contains the document itself and extra space (padding). Padding
    allows the document to grow as the result of updates while minimizing the likelihood
    of reallocations. Once the record is moved, the space that was originally occupied
    is freed up and will be tracked as free lists of different size. As mentioned,
    it’s the `$freelist` namespace in the `.ns` file.


    In the `MMAPv1` storage engine, as objects are deleted, modified, or created,
    fragmentation will occur over time, which will affect the performance. The `compact`
    command should be executed to move the fragmented data into contiguous spaces.


    Every 60 seconds the files in `RAM` are flushed to disk. To prevent data loss
    in the event of a power failure, the default is to run with journaling switched
    on. The behavior of journal is dependent on the configured storage engine.

    The `MMAPv1` journal file is flushed to disk every 100ms, and if there is power
    loss, it is used to bring the database back to a consistent state.


    In `WiredTiger`, the data in the cache is stored in a `B+ tree` structure which
    is optimized for in-memory. The cache maintains an on-disk page image in association
    with an index , which is used to identify where the data being asked for actually
    resides within the page (see Figure [8-12](#A332296_1_En_8_Chapter.html#Fig12)).


    ![A332296_1_En_8_Fig12_HTML.jpg](A332296_1_En_8_Fig12_HTML.jpg)

    *Figure 8-12. WiredTiger cache*


    The write operation in `WiredTiger` never updates in-place.

    Whenever an operation is issued to `WiredTiger`, internally it’s broken into multiple
    transactions wherein each transaction works within the context of an in-memory
    snapshot. The snapshot is of the committed version before the transactions started.
    Writers can create new versions concurrent with the readers.


    The write operations do not change the page; instead the updates are layered on
    top of the page. A `skipList` data structure is used to maintain all the updates,
    where the most recent update is on the top. Thus, whenever a user reads/writes
    the data, the index checks whether a `skiplist` exists. If a `skiplist` is not
    there, it returns data from the on-disk page image. If `skiplist` exists, the
    data at the head of the list is returned to the threads, which then update the
    data. Once a commit is performed, the updated data is added to the head of the
    list and the pointers are adjusted accordingly. This way multiple users can access
    data concurrently without any conflict. The conflict occurs only when multiple
    threads are trying to update the same record. In that case, one update wins and
    the other concurrent update needs to retry.


    Any changes to the tree structure due to the update, such as splitting the data
    if the page sizes increase, relocation, etc., are later reconciled by a background
    process. This accounts for the fast write operations of the `WiredTiger` engine;
    the task of data arrangement is left to the background process. See Figure [8-13](#A332296_1_En_8_Chapter.html#Fig13).


    ![A332296_1_En_8_Fig13_HTML.jpg](A332296_1_En_8_Fig13_HTML.jpg)

    *Figure 8-13. SkipList*'
