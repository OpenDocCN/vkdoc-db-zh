    :posttype, \"details\":postdetails}\n    Insert post_document into users.post\
    \ collection\n    Append post_document into user.walls collection\n    Set userlist\
    \ = all users who’s circled in the post based on the posts circle and the posted\
    \ user id\n    While users in userlist\n        Append post_document to users\
    \ social.posts collection\n    End while\nEnd function\n```\n\n### 10.2.3 分片\n\
    \n可以通过对上述四个集合进行分片来实现扩展。由于 `user.profile`、`user.wall` 和 `social.posts` 包含特定于用户的文档，`user_id`\
    \ 是这些集合的完美分片键。`_id` 是 `users.post` 集合的最佳分片键。\n\n## 10.3 本章小结\n\n在本章中，你通过两个用例探讨了如何使用\
    \ MongoDB 来解决特定问题。下一章，我们将列出 MongoDB 的局限性以及它不太适用的用例。\n\n## 11. MongoDB 的局限性\n\n\
    > “开始使用一个新数据库时，你也应该了解其局限性，以便更好地使用它。”\n\n在本章中，我们将列出 MongoDB 的局限性以及它不太适用的用例。\n\n\
    ### 11.1 MongoDB 占用空间过大（适用于 MMAPv1）\n\n让我们从磁盘空间问题开始。MongoDB（使用 MMAPv1 存储引擎）占用空间太大；换句话说，数据目录文件比数据库的实际数据大。\n\
    \n这是由于预分配的数据文件造成的。这是为了防止文件系统碎片化而设计的。\n\n数据目录中的文件被命名为 `<dbname>.0`、`<dbname>.1`\
    \ 等。`mongod` 分配的第一个文件大小为 64MB；之后所有文件的大小都以 2 的倍数增长，因此第二个文件为 128MB，第三个文件为 256MB，依此类推，直到达到\
    \ 2GB，之后所有文件大小都为 2GB。虽然空间在创建时已分配给数据文件，但有些文件可能有 90% 是空的。这种未使用的分配空间在较大的数据库中通常占比较小。\n\
    \n*   可以使用 `-- noprealloc` 选项禁用此选项。但是，不建议在生产环境中使用，它应仅用于测试以及频繁调用 drop database\
    \ 的小型数据集。\n*   Oplog：如果 `mongod` 是副本集成员，那么数据目录中将有一个名为 `oplog.rs` 的文件。此文件存在于 `local`\
    \ 数据库中，是一个预分配的固定集合。在 64 位安装中，此文件的分配默认为磁盘空间的约 5%。\n*   日志：日志文件也包含在数据目录中，用于在 MongoDB\
    \ 将写入操作应用到数据库之前，先将这些写操作存储在磁盘上。\n*   MongoDB 为日志预分配 3GB 的数据，这超出了实际数据库的大小，使其不适合小型安装。解决方法是在你的命令行标志或\
    \ `/etc/mongod.conf` 文件中使用 `–smallflags`，直到你运行在有足够磁盘空间的环境中。但这个特性使其不适合小型安装。\n*\
    \   空记录：当文档或集合被删除时，空间永远不会返回给操作系统；相反，MongoDB 会维护一个这些空记录的列表，以便重用。\n\n要回收这些已删除的空间，可以使用\
    \ `compact` 或 `repairDatabase` 选项，但请注意，这两个选项都需要额外的磁盘空间才能运行。\n\n注意\n\nWiredTiger\
    \ 存储引擎不存在此限制。相反，由于数据文件的压缩，存储大小减少了 50%。此外，一旦集合被删除，磁盘空间会自动回收，这与上述 MMAPv1 存储引擎不同。\n\
    \n### 11.2 内存问题（适用于 MMAPv1 存储引擎）\n\n在 MongoDB 中，内存是通过内存映射整个数据集来管理的。它允许操作系统控制内存映射并分配最大量的\
    \ RAM。结果是性能并非最优，并且无法有效推断内存使用情况。\n\n索引是内存密集型的；换句话说，索引会占用大量 RAM。由于这些是 B 树索引，定义许多索引可能导致系统资源消耗过快。其后果是内存会在需要时自动分配。在共享环境中运行数据库更为棘手。总的来说，与所有数据库服务器一样，最好在专用服务器上运行\
    \ MongoDB。\n\n### 11.3 32 位与 64 位\n\nMongoDB 提供两个版本：32 位和 64 位。\n\n由于 MongoDB\
    \ 使用内存映射文件，32 位版本仅限存储约 2GB 的数据。如果你需要存储更多数据，应使用 64 位版本。\n\n从 3.0 版本开始，MongoDB 不再为\
    \ 32 位版本提供商业支持。此外，32 位版本的 MongoDB 不支持 WiredTiger 存储引擎。\n\n### 11.4 BSON 文档\n\n\
    本节介绍 BSON 文档的限制。\n\n*   大小限制：与其他数据库一样，文档中可存储的内容有限制。当前版本支持最大 16MB 大小的文档。此最大值确保单个文档在传输过程中不会占用过多的\
    \ RAM 或过多的带宽。\n*   嵌套深度限制：在 MongoDB 中，BSON 文档的嵌套层级不超过 100 层。\n*   字段名：如果你存储 1000\
    \ 个键为 “col1” 的文档，那么该键会在数据集中存储那么多次。虽然 MongoDB 支持任意文档，但实际上大多数字段名是相同的。保持简短的字段名被认为是优化空间使用的良好实践。\n"
- fmt: '## 11.5 命名空间限制


    请注意从命名空间角度出发的以下限制。


    *   命名空间长度：每个命名空间的长度（包括集合和数据库名称）必须小于 123 字节。

    *   命名空间文件大小（适用于 MMAPv1 存储引擎）：命名空间文件大小不能大于 2047MB。默认大小为 16MB；但是，这可以通过 `nssize`
    选项进行配置。命名空间数量（适用于 MMAPv1 存储引擎）：命名空间数量 = （命名空间文件大小 / 628）。一个 16MB 的命名空间文件将支持大约
    24,000 个命名空间。


    注意


    WiredTiger 存储引擎不存在此类限制。


    ## 11.6 索引限制


    本节介绍 MongoDB 中索引的限制。


    *   索引大小：索引项不能大于 1024 字节。

    *   每个集合的索引数量：每个集合最多允许 64 个索引。

    *   索引名称长度：默认情况下，索引名称由字段名称和索引方向组成。包括命名空间（即数据库和集合名称）在内的索引名称不能大于 128 字节。如果默认索引名称变得过长，您可以向
    `ensureIndex()` 辅助方法显式指定一个索引名称。

    *   分片集合中的唯一索引：只有当完整分片键作为唯一索引的前缀包含时，才在分片间支持该唯一索引；否则，该唯一索引不在分片间支持。在这种情况下，唯一性是在整个键上强制执行的，而不是在单个字段上。

    *   复合索引中的索引字段数量：不能超过 31 个字段。


    ## 11.7 固定集合限制 - 固定集合中的最大文档数


    如果使用 `max` 参数来指定固定集合中的最大文档数，则该值不能超过 2^32 个文档。但是，如果不使用此参数，则对文档数量没有限制。


    ## 11.8 分片限制


    分片是在分片间拆分数据的机制。以下部分介绍了在处理分片时需要注意的限制。


    ### 11.8.1 尽早分片以避免问题


    使用分片键，数据被拆分成块，然后自动分布到各个分片上。但是，如果分片实施较晚，可能会导致服务器变慢，因为块的拆分和迁移需要时间和资源。


    一个简单的解决方案是使用诸如 MongoDB Cloud Manager 之类的工具监控您的 MongoDB 实例容量（刷新时间、锁百分比、队列长度和故障是很好的度量指标），并在达到估计容量的
    80% 之前进行分片。


    ### 11.8.2 分片键无法更新


    一旦文档插入到集合中，分片键就无法更新，因为 MongoDB 使用分片键来确定文档应路由到哪个分片。如果要更改文档的分片键，建议的解决方案是在更改完成后删除该文档并重新插入。


    ### 11.8.3 集合分片限制


    集合应在达到 256GB 之前进行分片。


    ### 11.8.4 选择正确的分片键


    选择正确的分片键非常重要，因为一旦选定就很难更正。


    注意


    什么被认为是错误的分片键完全取决于应用程序。假设应用程序是一个新闻源；选择时间戳字段作为分片键将是错误的分片键，因为这将最终只向一个分片插入、查询和迁移数据，而不是整个集群。如果需要更正分片键，通常使用的过程是转储并恢复集合。


    ## 11.9 安全限制


    安全对于数据库来说是一个重要问题。让我们从安全角度来看 MongoDB 的限制。


    ### 11.9.1 默认无身份验证


    虽然默认情况下未启用身份验证，但它得到完全支持，并且可以轻松启用。


    ### 11.9.2 与 MongoDB 的通信流量未加密


    默认情况下，与 MongoDB 的通信流量是未加密的。在公共网络上运行时，请考虑对通信进行加密；否则可能对您的数据构成威胁。公共网络上的通信可以使用 MongoDB
    的 SSL 支持版本进行加密，该版本仅在 64 位版本中可用。


    ## 11.10 读写限制


    以下部分涵盖了重要限制。


    ### 11.10.1 大小写敏感查询


    默认情况下，MongoDB 是大小写敏感的。


    例如，以下两个命令将返回不同的结果：`db.books.find({name: ''PracticalMongoDB''})` 和 `db.books.find({name:
    ''practicalmongodb''})`。您应确保知道数据以何种大小写存储。虽然可以使用正则表达式搜索，如 `db.books.find({name:
    /practicalmongodb/i})`，但这并不理想，因为它们相对较慢。


    ### 11.10.2 类型敏感字段


    由于 MongoDB 中的文档没有强制的模式，它无法知道您是否犯了错误。您必须确保对数据使用正确的类型。


    ### 11.10.3 无 JOIN


    MongoDB 中不支持 JOIN。如果需要从多个集合中检索数据，必须进行多次查询。但是，您可以重新设计模式，将相关数据保存在一起，以便在单个查询中检索信息。


    ### 11.10.4 事务


    MongoDB 仅支持单文档原子性。由于写操作可以修改多个文档，因此该操作不是原子的。但是，您可以使用隔离操作符来隔离影响多个文档的写操作。


    #### 11.10.4.1 副本集限制 - 副本集成员数量


    副本集用于确保 MongoDB 中的数据冗余。一个成员充当主成员，其余成员充当次成员。由于 MongoDB 投票的工作方式，您必须使用奇数个成员。


    这是因为一个节点需要获得多数票才能成为主节点。如果您使用偶数个节点，最终会陷入僵局，因为没有一个成员能获得多数票，因此无法选出主节点。在这种情况下，副本集将变为只读。


    您可以使用仲裁者来打破这种僵局。它们可以帮助支持故障转移并节省成本。要了解更多关于副本集的功能，请参考第 [7](#A332296_1_En_7_Chapter.html)
    章。


    ## 11.11 MongoDB 不适用的范围


    MongoDB 不适用于以下场景：


    *   高度事务性的系统，如会计或银行系统。传统的关系型数据库管理系统仍然更适用于需要大量原子性复杂事务的应用程序。

    *   传统的商业智能应用程序，其中针对特定问题的 BI 数据库会生成高度优化的查询。对于此类应用程序，数据仓库可能是更合适的选择。

    *   需要复杂 SQL 查询的应用程序。

    *   MongoDB 不支持事务操作，因此银行系统肯定不能使用它。


    ## 11.12 总结


    在本章中，您了解了 MongoDB 的限制以及它不太适合的使用场景。


    在下一章中，我们将介绍 MongoDB 的操作指南。'
  raw: '## 11.5 Namespaces Limits


    Be aware of the following limitations from the namespace perspective.


    *   Length of a namespace: The length of each namespace including collection and
    database name must be smaller than 123 bytes.

    *   Namespace file size (applicable for the MMAPv1 storage engine): A namespace
    file size cannot be greater than 2047MB. The default size is 16MB; however , this
    can be configured using the `nssize` option. Number of namespaces(applicable for
    the MMAPv1 storage engine): Number of namespace = (namespace file size/628). A
    namespace file of 16MB will support approximately 24,000 namespaces.


    Note


    No such limitations exist for the WiredTiger storage engine.


    ## 11.6 Indexes Limit


    This section covers the limitations of indexing in MongoDB.


    *   Index size: Indexed items cannot be greater than 1024 bytes.

    *   Number of indexes per collection: At the most 64 indexes are allowed per collection.

    *   Index name length: By default the index name is made up of the field names
    and the index directions. The index name including the namespace (which is the
    database and the collection name) cannot be greater than 128 bytes. If the default
    index name is becoming too long, you can explicitly specify an index name to the
    `ensureIndex()` helper.

    *   Unique indexes in sharded collections: Only when the full shard key is contained
    as a prefix of the unique index is it supported across shards; otherwise, the
    unique index is not supported across shards. In this case, the uniqueness is enforced
    across the full key and not a single field.

    *   Number of indexed fields in a compound index: This can’t be more than 31 fields.


    ## 11.7 Capped Collections Limit - Maximum Number of Documents in a Capped Collection


    If the max parameter is used for specifying the maximum number of documents in
    a capped collection, it can’t be more than 232 documents. However, if no such
    parameter is used, there’s no limit on the number of documents.


    ## 11.8 Sharding Limitations


    Sharding is the mechanism of splitting data across shards. The following sections
    talk about the limitations that you need to be aware of when dealing with sharding.


    ### 11.8.1 Shard Early to Avoid Any Issues


    Using the shard key, the data is split into chunks, which are then automatically
    distributed amongst the shards. However, if sharding is implemented late, it can
    cause slowdowns of the servers because the splitting and migration of chunks takes
    time and resources.


    A simple solution is to monitor your MongoDB instance capacity using tools such
    as MongoDB Cloud Manager (flush time, lock percentages, queue lengths, and faults
    are good measures) and shard before reaching 80% of the estimated capacity.


    ### 11.8.2 Shard Key Can’t Be Updated


    The shard key can’t be updated once the document is inserted in the collection
    because MongoDB uses shard keys to determine to which shard the document should
    be routed. If you want to change the shard key of a document, the suggested solution
    is to remove the document and reinsert the document when he change has been made.


    ### 11.8.3 Shard Collection Limit


    The collection should be sharded before it reaches 256GB.


    ### 11.8.4 Select the Correct Shard Key


    It’s very important to choose a correct shard key because once the key is chosen
    it’s not easy to correct it.


    Note


    What’s considered a wrong shard key depends completely on the application. Say
    the application is a news feed; choosing a timestamp field as a shard key would
    be a wrong shard key because this will end up inserting, querying, and migrating
    data from one shard only, and not from the complete cluster. If you need to correct
    the shard key, the process that is commonly used is to dump and restore the collection.


    ## 11.9 Security Limitations


    Security is an important matter when it comes to databases. Let’s look at MongoDB
    limitations from security perspective.


    ### 11.9.1 No Authentication by Default


    Although authentication is not enabled by default, it’s fully supported and can
    be enabled easily.


    ### 11.9.2 Traffic to and from MongoDB Isn’t Encrypted


    By default the connections to and from MongoDB are not encrypted. When running
    on a public network, consider encrypting the communication; otherwise it can pose
    a threat to your data. Communications on a public network can be encrypted using
    the SSL-supported build of MongoDB, which is available in the 64-bit version only.


    ## 11.10 Write and Read Limitations


    The following sections cover important limitations.


    ### 11.10.1 Case-Sensitive Queries


    By default MongoDB is case sensitive.


    For example, the following two commands will return different results: `db.books.find({name:
    ''PracticalMongoDB''})` and `db.books.find({name: ''practicalmongodb''})`. You
    should ensure that you know in which case the data is stored. Although regex searches
    like `db.books.find({name: /practicalmongodb/i})` can be used, they aren’t ideal
    because they are relatively slow.


    ### 11.10.2 Type-Sensitive Fields


    Since there’s no enforced schema for documents in MongoDB, it can’t know you are
    making a mistake. You must make sure that the correct type is used for the data.


    ### 11.10.3 No JOIN


    Joins are not supported in MongoDB. If you need to retrieve data from more than
    one collection, you must do more than one query. However, you can redesign the
    schema to keep the related data together so that the information can be retrieved
    in a single query.


    ### 11.10.4 Transactions


    MongoDB only supports single document atomicity. Since a write operation can modify
    multiple documents, this operation is not atomic. However, you can isolate write
    operations that affect multiple documents using the isolation operator.


    #### 11.10.4.1 Replica Set Limitations - Number of Replica Set Members


    A replica set is used to ensure data redundancy in MongoDB. One member acts as
    a primary member and the rest act as secondary members. Due to the way voting
    works with MongoDB, you must use an odd number of members.


    This is because a node needs majority of votes to become primary. If you use an
    even number of nodes, you will end up in a tie with no primary being chosen because
    no one member will have the majority of vote. In this scenario, the replica set
    will become read only.


    You can use arbiters to break such ties. They can help support failover and save
    on cost. To learn more about replica set functioning, please refer to Chapter
    [7](#A332296_1_En_7_Chapter.html).


    ## 11.11 MongoDB Not Applicable Range


    MongoDB is not suitable for the following:


    *   Highly transactional systems such as accounting or banking systems. Traditional
    RDBMS are still more suitable for such applications, which require a large number
    of atomic complex matters.

    *   Traditional business intelligence applications, where an issue-specific BI
    database would generate highly optimized queries. For such applications, the data
    warehouse may be a more appropriate choice.

    *   Applications requiring complex SQL queries.

    *   MongoDB does not support transactional operations, so a banking system certainly
    cannot use it.


    ## 11.12 Summary


    In this chapter, you learned about MongoDB’s limitations and the use cases where
    it’s not a good fit.


    In the next chapter we will cover the How To’s of MongoDB.'
  trans: '

    ## 11.5 命名空间限制


    请注意从命名空间角度出发的以下限制。


    *   **命名空间长度**：每个命名空间的长度（包括集合和数据库名称）必须小于 123 字节。

    *   **命名空间文件大小**（适用于 MMAPv1 存储引擎）：命名空间文件大小不能大于 2047MB。默认大小为 16MB；但是，这可以通过 `nssize`
    选项进行配置。

    *   **命名空间数量**（适用于 MMAPv1 存储引擎）：命名空间数量 = （命名空间文件大小 / 628）。一个 16MB 的命名空间文件将支持大约
    24,000 个命名空间。


    > **注意**

    >

    > WiredTiger 存储引擎不存在此类限制。


    ## 11.6 索引限制


    本节介绍 MongoDB 中索引的限制。


    *   **索引大小**：索引项不能大于 1024 字节。

    *   **每个集合的索引数量**：每个集合最多允许 64 个索引。

    *   **索引名称长度**：默认情况下，索引名称由字段名称和索引方向组成。包括命名空间（即数据库和集合名称）在内的索引名称不能大于 128 字节。如果默认索引名称变得过长，您可以向
    `ensureIndex()` 辅助方法显式指定一个索引名称。

    *   **分片集合中的唯一索引**：只有当完整分片键作为唯一索引的前缀包含时，才在分片间支持该唯一索引；否则，该唯一索引不在分片间支持。在这种情况下，唯一性是在整个键上强制执行的，而不是在单个字段上。

    *   **复合索引中的索引字段数量**：不能超过 31 个字段。


    ## 11.7 固定集合限制 - 固定集合中的最大文档数


    如果使用 `max` 参数来指定固定集合中的最大文档数，则该值不能超过 2³² 个文档。但是，如果不使用此参数，则对文档数量没有限制。


    ## 11.8 分片限制


    分片是在分片间拆分数据的机制。以下部分介绍了在处理分片时需要注意的限制。


    ### 11.8.1 尽早分片以避免问题


    使用分片键，数据被拆分成块，然后自动分布到各个分片上。但是，如果分片实施较晚，可能会导致服务器变慢，因为块的拆分和迁移需要时间和资源。


    一个简单的解决方案是使用诸如 MongoDB Cloud Manager 之类的工具监控您的 MongoDB 实例容量（刷新时间、锁百分比、队列长度和故障是很好的度量指标），并在达到估计容量的
    80% 之前进行分片。


    ### 11.8.2 分片键无法更新


    一旦文档插入到集合中，分片键就无法更新，因为 MongoDB 使用分片键来确定文档应路由到哪个分片。如果要更改文档的分片键，建议的解决方案是在更改完成后删除该文档并重新插入。


    ### 11.8.3 集合分片限制


    集合应在达到 256GB 之前进行分片。


    ### 11.8.4 选择正确的分片键


    选择正确的分片键非常重要，因为一旦选定就很难更正。


    > **注意**

    >

    > 什么是错误的分片键完全取决于应用程序。假设应用程序是一个新闻源；选择时间戳字段作为分片键将是错误的分片键，因为这将最终只向一个分片插入、查询和迁移数据，而不是整个集群。如果需要更正分片键，通常使用的过程是转储并恢复集合。


    ## 11.9 安全限制


    安全对于数据库来说是一个重要问题。让我们从安全角度来看 MongoDB 的限制。


    ### 11.9.1 默认无身份验证


    虽然默认情况下未启用身份验证，但它得到完全支持，并且可以轻松启用。


    ### 11.9.2 与 MongoDB 的通信流量未加密


    默认情况下，与 MongoDB 的通信流量是未加密的。在公共网络上运行时，请考虑对通信进行加密；否则可能对您的数据构成威胁。公共网络上的通信可以使用 MongoDB
    的 SSL 支持版本进行加密，该版本仅在 64 位版本中可用。


    ## 11.10 读写限制


    以下部分涵盖了重要限制。


    ### 11.10.1 大小写敏感查询


    默认情况下，MongoDB 是大小写敏感的。


    例如，以下两个命令将返回不同的结果：`db.books.find({name: ''PracticalMongoDB''})` 和 `db.books.find({name:
    ''practicalmongodb''})`。您应确保知道数据以何种大小写存储。虽然可以使用正则表达式搜索，如 `db.books.find({name:
    /practicalmongodb/i})`，但这并不理想，因为它们相对较慢。


    ### 11.10.2 类型敏感字段


    由于 MongoDB 中的文档没有强制的模式，它无法知道您是否犯了错误。您必须确保对数据使用正确的类型。


    ### 11.10.3 无 JOIN


    MongoDB 中不支持 JOIN。如果需要从多个集合中检索数据，必须进行多次查询。但是，您可以重新设计模式，将相关数据保存在一起，以便在单个查询中检索信息。


    ### 11.10.4 事务


    MongoDB 仅支持单文档原子性。由于写操作可以修改多个文档，因此该操作不是原子的。但是，您可以使用隔离操作符来隔离影响多个文档的写操作。


    #### 11.10.4.1 副本集限制 - 副本集成员数量


    副本集用于确保 MongoDB 中的数据冗余。一个成员充当主成员，其余成员充当次成员。由于 MongoDB 投票的工作方式，您必须使用奇数个成员。


    这是因为一个节点需要获得多数票才能成为主节点。如果您使用偶数个节点，最终会陷入僵局，因为没有一个成员能获得多数票，因此无法选出主节点。在这种情况下，副本集将变为只读。


    您可以使用仲裁者来打破这种僵局。它们可以帮助支持故障转移并节省成本。要了解更多关于副本集的功能，请参考第 7 章。


    ## 11.11 MongoDB 不适用的范围


    MongoDB 不适用于以下场景：


    *   高度事务性的系统，如会计或银行系统。传统的关系型数据库管理系统仍然更适用于需要大量原子性复杂事务的应用程序。

    *   传统的商业智能应用程序，其中针对特定问题的 BI 数据库会生成高度优化的查询。对于此类应用程序，数据仓库可能是更合适的选择。

    *   需要复杂 SQL 查询的应用程序。

    *   MongoDB 不支持事务操作，因此银行系统肯定不能使用它。


    ## 11.12 总结


    在本章中，您了解了 MongoDB 的限制以及它不太适合的使用场景。


    在下一章中，我们将介绍 MongoDB 的操作指南。

    '
- fmt: "# 12. MongoDB 最佳实践\n\n> “Getting started with MongoDB is easy, but once you\
    \ start developing applications you will come across scenarios where you may need\
    \ best practices to achieve particular use cases.”\n\n在之前的章节中，您已经熟悉了 MongoDB。本章旨在概述已知的问题并借鉴其他用户的经验，同时提供各种“操作指南”，帮助您顺利使用\
    \ MongoDB。\n\n如您所知，MongoDB 以文档方式工作，使用 RAM 存储数据以提升性能，并使用复制和分片来进一步提供数据安全性和可扩展性。\n\
    \n本章将涵盖您应该注意的提示，从部署策略到增强查询，再到数据安全与一致性，以及监控。\n\n## 12.1 部署\n\n在决定部署策略时，请牢记以下提示，以便正确完成硬件规模评估。这些提示也将帮助您决定是否使用分片和复制。\n\
    \n*   **数据集大小**：最重要的一点是确定当前和预期的数据集大小。这不仅能让您为单个物理节点选择资源，也有助于规划分片方案（如果有）。\n*   **数据重要性**：第二重要的是确定数据的重要性，以评估数据的重要程度以及您对任何数据丢失或数据延迟（尤其是在复制情况下）的容忍度。\n\
    *   **内存规模**：下一步是确定内存需求，并相应地处理 RAM。与其他面向数据的应用程序一样，当整个数据集可以驻留在内存中时，MongoDB 的工作效果最佳，从而避免任何磁盘\
    \ I/O。Page faults 表明您可能超出了可用部署的内存，应考虑增加它。Page fault 是一个可以通过监控工具（如 MongoDB Cloud\
    \ Manager）衡量的指标。如果可能，您应始终选择内存大于工作集大小的平台。如果大小超过单个节点的内存，您应考虑使用分片，以便可以增加可用内存量。这可以最大化整个部署的性能。\n\
    *   **磁盘类型**：如果速度不是主要关注点，或者数据集大于任何内存策略所能支持的大小，那么选择适当的磁盘类型就非常重要。IOPS（每秒输入/输出操作次数）是选择磁盘类型的关键；IOPS\
    \ 越高，MongoDB 性能越好。如果可能，应使用本地磁盘，因为网络存储可能导致性能低下和延迟高。还建议在创建磁盘阵列时（在可能的情况下）使用 RAID\
    \ 10。\n*   **CPU**：如果您预计要使用 map reduce，那么时钟速度和可用处理器将成为重要的考虑因素。当您运行一个 `mongod`\
    \ 且大部分数据在内存中时，时钟速度也会对整体性能产生重大影响。在您希望最大化每秒操作数的情况下，您必须考虑在部署策略中包含具有高时钟/总线速度的 CPU。\n\
    *   如果高可用性是要求之一，则使用复制。在任何 MongoDB 部署中，设置一个至少包含三个节点的副本集应该是标准做法。2x1 部署是具有三个节点的最常见的复制配置，其中有两个节点在一个数据中心，一个备用节点在辅助数据中心，如图\
    \ [12-1](#A332296_1_En_12_Chapter.html#Fig1) 所示。\n\n    ![A332296_1_En_12_Fig1_HTML.gif](A332296_1_En_12_Fig1_HTML.gif)\n\
    \    *图 12-1. MongoDB 2*1 部署*\n\n### 12.1.1 MongoDB 网站提供的硬件建议\n\n以下内容仅旨在为 MongoDB\
    \ 部署提供高层指导。实际的硬件配置取决于您的数据、可用性要求、查询、性能标准和所选硬件组件的能力。\n\n*   **内存**：由于 MongoDB 广泛使用内存以获得更好的性能，内存越多，性能越好。\n\
    *   **存储**：MongoDB 可以使用 SSD（固态硬盘）或本地连接存储。由于 MongoDB 的磁盘访问模式不具有顺序特性，使用 SSD 可以让客户体验到显著的性能提升。使用\
    \ SSD 的另一个好处是，如果工作集不再适合内存，它们可以提供性能的平缓下降。大多数 MongoDB 部署应使用 RAID-10。当使用 WiredTiger\
    \ 存储引擎时，由于性能问题，强烈建议使用 XFS 文件系统。另外，不要使用大页面，因为 MongoDB 在默认虚拟内存页面下表现更好。\n*   **CPU**：由于使用\
    \ MMAPv1 存储引擎的 MongoDB 很少遇到需要大量核心的工作负载，因此优选使用具有较快速时钟速度的服务器，而不是核心较多但时钟速度较慢的服务器。然而，WiredTiger\
    \ 存储引擎是 CPU 密集型的，因此使用具有多个核心的服务器将提供显著的性能改进。\n\n### 12.1.2 需要注意的几点\n\n总结本节，为 MongoDB\
    \ 选择硬件时，请考虑以下重要点：\n\n更快的 CPU 时钟速度和更多的 RAM 对生产力很重要。由于 MongoDB 不执行大量计算，增加核心数量有帮助，但使用\
    \ MMAPv1 存储引擎时不会提供高水平的边际回报。使用 SATA SSD 和 PCI（Peripheral Component Interconnect）提供了良好的性价比和良好结果。将资金用于商用\
    \ SATA 机械硬盘更有效。**NUMA 硬件上的 MongoDB**：此点仅适用于在 Linux 中运行的 `mongod`，不适用于在 Windows\
    \ 或其他类 Unix 系统上运行的实例。NUMA（非统一内存访问）和 MongoDB 不能很好地协同工作，因此在 NUMA 硬件上运行 MongoDB 时，您需要为\
    \ MongoDB 禁用 NUMA 并使用交叉内存策略运行，因为 NUMA 会导致 MongoDB 出现许多操作问题，包括一段时间内的性能缓慢或高处理器使用率。"
  raw: "# 12. MongoDB Best Practices\n\n> “Getting started with MongoDB is easy, but\
    \ once you start developing applications you will come across scenarios where\
    \ you may need best practices to achieve particular use cases.”\n\nIn the previous\
    \ chapters, you became acquainted with MongoDB. The intent of this chapter is\
    \ outline well-known issues using other user’s experiences but also to provide\
    \ various How To’s that can help your journey with MongoDB be a smooth ride.\n\
    \nAs you know, MongoDB works with documents, uses RAM for storing data to enhance\
    \ performance, and uses replication and sharding to further provide data safety\
    \ and scalability.\n\nThis chapter will cover tips that you should be aware of,\
    \ from the deployment strategy to enhancing querying to data safety and consistency\
    \ to monitoring.\n\n## 12.1 Deployment\n\nWhile deciding on the deployment strategy\
    \ , keep the following tips in mind so that the hardware sizing is done appropriately.\
    \ These tips will also help you decide whether to use sharding and replication\
    \ .\n\n*   Data set size: The most important thing is to determine the current\
    \ and anticipated data set size. This not only lets you choose resources for individual\
    \ physical nodes, but it also helps when planning your sharding plans (if any).\n\
    *   Data importance: The second most important thing is to determine data importance,\
    \ to determine how important the data is and how tolerant you can be to any data\
    \ loss or data lagging (especially in case of replication) .\n*   Memory sizing:\
    \ The next step is to identify memory needs and accordingly take care of the RAM.\
    \ Like other data-oriented applications, MongoDB also works best when the entire\
    \ data set can reside in memory, thereby avoiding any kind of disk I/O. Page faults\
    \ indicate that you may exceed the available deployment’s memory and should consider\
    \ increasing it. Page fault is a metric that can be measured using monitoring\
    \ tools like MongoDB Cloud Manager. If possible, you should always select a platform\
    \ that has memory greater than your working set size. If the size exceeds the\
    \ single node’s memory, you should consider using sharding so that the amount\
    \ of available memory can be increased. This maximizes the overall deployment’s\
    \ performance.\n*   Disk Type : If speed is not a primary concern or if the data\
    \ set is larger than what any in-memory strategy can support, it’s very important\
    \ to select a proper disk type. IOPS (input/output operations per second) is the\
    \ key for selecting a disk type; the higher the IOPS, the better the MongoDB performance.\
    \ If possible, local disks should be used because network storage can cause poor\
    \ performance and high latency. It is also advised to use RAID 10 when creating\
    \ disk arrays (wherever possible).\n*   CPU : If you anticipate using map reducing,\
    \ then the clock speed and the available processors become important considerations.\
    \ Clock speed can also have a major impact on the overall performance when you\
    \ are running a mongod with the majority of data in memory. In circumstances where\
    \ you want to maximize the operations per second, you must consider including\
    \ a CPU with a high clock/bus speed in your deployment strategy.\n*   Replication\
    \ is used if high availability is one of the requirements. In any MongoDB deployment\
    \ it should be standard to set up a replica set with at least three nodes. A 2x1\
    \ deployment is the most common configuration for replication with three nodes,\
    \ where there are two nodes in one data center and a backup node in a secondary\
    \ data center, as depicted in Figure [12-1](#A332296_1_En_12_Chapter.html#Fig1).\n\
    \n    ![A332296_1_En_12_Fig1_HTML.gif](A332296_1_En_12_Fig1_HTML.gif)\n\n    Figure\
    \ 12-1.\n\n    MongoDB 2*1 deployment\n\n### 12.1.1 Hardware Suggestions from\
    \ the MongoDB Site\n\nThe following are only intended to provide high-level guidance\
    \ for a MongoDB deployment. The actual hardware configuration depends on your\
    \ data, availability requirement, queries, performance criteria, and the selected\
    \ hardware components ’ capabilities.\n\n*   Memory: Since memory is used extensively\
    \ by MongoDB for a better performance, the more memory, the better the performance.\n\
    *   Storage: MongoDB can use SSDs (solid state drives ) or local attached storage.\
    \ Since MongoDB’s disk access patterns don’t have sequential properties, SSDs\
    \ usage can enable customers to experience substantial performance gains. Another\
    \ benefit of using a SSD is if the working set no longer fits in memory, they\
    \ provide a gentle degradation of performance. Most MongoDB deployments should\
    \ use RAID-10. When using the WiredTiger storage engine, the use of a XFS file\
    \ system is highly recommended due to performance issues. Also, do not use huge\
    \ pages because MongoDB performs better with default virtual memory pages.\n*\
    \   CPU: Since MongoDB with a MMAPv1 storage engine rarely encounters workloads\
    \ needing a large number of cores, it’s preferable to use servers with a faster\
    \ clock speed than the ones with multiple cores but slower clock speed. However,\
    \ the WiredTiger storage engine is CPU bound, so using a server with multiple\
    \ cores will offer a significant performance improvement.\n\n### 12.1.2 Few Points\
    \ to be Noted\n\nTo summarize this section, when choosing hardware for MongoDB,\
    \ consider the following important points :\n\nA faster CPU clock speed and more\
    \ RAM are important for productivity.   Since MongoDB doesn’t perform high amounts\
    \ of computation, increasing the number of cores helps but does not provide a\
    \ high level of marginal return when using the MMAPv1 storage engine.   Using\
    \ SATA SSD and PCI (Peripheral Component Interconnect) provides good price/performance\
    \ and good results.   It’s more effective to spend on commodity SATA spinning\
    \ drives.   MongoDB on NUMA Hardware : This point is only applicable for mongod\
    \ running in Linux and not for instances that run on Windows or other Unix-like\
    \ systems. NUMA (non-uniform memory access) and MongoDB don’t work well together,\
    \ so when running MongoDB on NUMA hardware, you need to disable NUMA for MongoDB\
    \ and run with an interleave memory policy because NUMA causes a number of operational\
    \ problems for MongoDB, including performance slowness for periods of time or\
    \ high processor usage."
  trans: "\n# 12. MongoDB 最佳实践\n\n> “入门 MongoDB 很容易，但一旦开始开发应用程序，您会遇到各种场景，此时可能需要最佳实践来实现特定用例。”\n\
    \n在之前的章节中，您已经熟悉了 MongoDB。本章旨在概述已知的问题并借鉴其他用户的经验，同时提供各种“操作指南”，帮助您顺利使用 MongoDB。\n\
    \n如您所知，MongoDB 以文档方式工作，使用 RAM 存储数据以提升性能，并使用复制和分片来进一步提供数据安全性和可扩展性。\n\n本章将涵盖您应该注意的提示，从部署策略到增强查询，再到数据安全与一致性，以及监控。\n\
    \n## 12.1 部署\n\n在决定部署策略时，请牢记以下提示，以便正确完成硬件规模评估。这些提示也将帮助您决定是否使用分片和复制。\n\n*   **数据集大小**：最重要的一点是确定当前和预期的数据集大小。这不仅能让您为单个物理节点选择资源，也有助于规划分片方案（如果有）。\n\
    *   **数据重要性**：第二重要的是确定数据的重要性，以评估数据的重要程度以及您对任何数据丢失或数据延迟（尤其是在复制情况下）的容忍度。\n*   **内存规模**：下一步是确定内存需求，并相应地处理\
    \ RAM。与其他面向数据的应用程序一样，当整个数据集可以驻留在内存中时，MongoDB 的工作效果最佳，从而避免任何磁盘 I/O。页面错误表明您可能超出了可用部署的内存，应考虑增加它。页面错误是一个可以通过监控工具（如\
    \ MongoDB Cloud Manager）衡量的指标。如果可能，您应始终选择内存大于工作集大小的平台。如果大小超过单个节点的内存，您应考虑使用分片，以便可以增加可用内存量。这可以最大化整个部署的性能。\n\
    *   **磁盘类型**：如果速度不是主要关注点，或者数据集大于任何内存策略所能支持的大小，那么选择适当的磁盘类型就非常重要。IOPS（每秒输入/输出操作次数）是选择磁盘类型的关键；IOPS\
    \ 越高，MongoDB 性能越好。如果可能，应使用本地磁盘，因为网络存储可能导致性能低下和延迟高。还建议在创建磁盘阵列时（在可能的情况下）使用 RAID\
    \ 10。\n*   **CPU**：如果您预计要使用 map reduce，那么时钟速度和可用处理器将成为重要的考虑因素。当您运行一个 `mongod`\
    \ 且大部分数据在内存中时，时钟速度也会对整体性能产生重大影响。在您希望最大化每秒操作数的情况下，您必须考虑在部署策略中包含具有高时钟/总线速度的 CPU。\n\
    *   如果高可用性是要求之一，则使用复制。在任何 MongoDB 部署中，设置一个至少包含三个节点的副本集应该是标准做法。2x1 部署是具有三个节点的最常见的复制配置，其中有两个节点在一个数据中心，一个备用节点在辅助数据中心，如图\
    \ 12-1 所示。\n\n    ![A332296_1_En_12_Fig1_HTML.gif](img/A332296_1_En_12_Fig1_HTML.gif)\n\
    \    *图 12-1. MongoDB 2*1 部署*\n\n### 12.1.1 MongoDB 网站提供的硬件建议\n\n以下内容仅旨在为 MongoDB\
    \ 部署提供高层指导。实际的硬件配置取决于您的数据、可用性要求、查询、性能标准和所选硬件组件的能力。\n\n*   **内存**：由于 MongoDB 广泛使用内存以获得更好的性能，内存越多，性能越好。\n\
    *   **存储**：MongoDB 可以使用 SSD（固态硬盘）或本地连接存储。由于 MongoDB 的磁盘访问模式不具有顺序特性，使用 SSD 可以让客户体验到显著的性能提升。使用\
    \ SSD 的另一个好处是，如果工作集不再适合内存，它们可以提供性能的平缓下降。大多数 MongoDB 部署应使用 RAID-10。当使用 WiredTiger\
    \ 存储引擎时，由于性能问题，强烈建议使用 XFS 文件系统。另外，不要使用大页面，因为 MongoDB 在默认虚拟内存页面下表现更好。\n*   **CPU**：由于使用\
    \ MMAPv1 存储引擎的 MongoDB 很少遇到需要大量核心的工作负载，因此优选使用具有较快速时钟速度的服务器，而不是核心较多但时钟速度较慢的服务器。然而，WiredTiger\
    \ 存储引擎是 CPU 密集型的，因此使用具有多个核心的服务器将提供显著的性能改进。\n\n### 12.1.2 需要注意的几点\n\n总结本节，为 MongoDB\
    \ 选择硬件时，请考虑以下重要点：\n\n更快的 CPU 时钟速度和更多的 RAM 对生产力很重要。由于 MongoDB 不执行大量计算，增加核心数量有帮助，但使用\
    \ MMAPv1 存储引擎时不会提供高水平的边际回报。使用 SATA SSD 和 PCI（Peripheral Component Interconnect）提供了良好的性价比和良好结果。将资金用于商用\
    \ SATA 机械硬盘更有效。**NUMA 硬件上的 MongoDB**：此点仅适用于在 Linux 中运行的 `mongod`，不适用于在 Windows\
    \ 或其他类 Unix 系统上运行的实例。NUMA（非统一内存访问）和 MongoDB 不能很好地协同工作，因此在 NUMA 硬件上运行 MongoDB 时，您需要为\
    \ MongoDB 禁用 NUMA 并使用交叉内存策略运行，因为 NUMA 会导致 MongoDB 出现许多操作问题，包括一段时间内的性能缓慢或高处理器使用率。\n"
- fmt: '## 12.2 Coding


    Once the hardware is acquired, consider the following tips when coding with the
    database:


    ### 数据模型选择


    The first point is to think of the data model to be used for the given application
    requirement and to decide on embedding or referencing or a mix of both. For more
    on this, please look at Chapter tk. There’s a trade-off between fast performance
    and guaranteed immediate consistency, so decide based on your application.


    ### 避免文档无限增长


    Avoid application patterns that lead to unbounded growth of document size. In
    MongoDB, the maximum size for a BSON document is 16MB. Application patterns that
    make the documents grow in an unbounded way should be avoided. For instance, an
    application should not update documents a way that leads them to grow significantly.
    When the document size exceeds the allocated size, MongoDB will relocate the document.
    This process is not only time consuming, but is also resource intensive and can
    unnecessarily slow down other database operations. In addition, it can lead to
    inefficient use of storage. Note that the above mentioned limitation applies to
    the MMAPv1 storage engine. When using WiredTiger, the document is rewritten with
    every update.


    For example, let’s consider a blogging application. In this application, it’s
    difficult to estimate how many responses a blog post will receive. The application
    is set to only display a subset of comments to the user, say the most recent comment
    or the first 10 comments. In this case, rather than creating an embedded model
    where the blog post and the user responses are maintained as a single document,
    you should create a referencing model where each response or group of responses
    are maintained as separate documents and then add a reference to the blog post
    in the documents. In this way, the unbound growth of the documents can be controlled,
    which will happen if you follow the first model of embedding the data.


    ### 为未来设计文档


    You can also design documents for the future. Although MongoDB provides the option
    of appending new fields within the documents as and when required, it has a drawback.
    When new fields are introduced, there might be a scenario where the document might
    not fit in the current space available, leading to MongoDB finding a new space
    for the document and moving it there, which might take time. So it is always efficient
    to create all the fields at the start if you are aware of the structure, irrespective
    of whether you have data available at that time or not. As highlighted above,
    the space will be allotted to the document and whenever value is there only needs
    to be updated. In doing so, MongoDB will not have to look for space; it merely
    updates the values entered, which is much faster.


    ### 预设文档大小


    You can also create documents with the anticipated size wherever applicable. This
    point is also to ensure that enough space is allotted to the document and any
    further growth doesn’t lead to hopping here and there for space. This can be achieved
    by using a garbage field, which contains a string of the anticipated size while
    initially inserting the document and then immediately unsetting that field:

    ```javascript

    > mydbcol.insert({"_id" : ObjectID(..),......, "tempField" : stringOfAnticipatedSize})

    > mydbcol.update({"_id" : ...}, {"$unset" : {"tempField" : 1}})

    ```


    ### 子文档 vs 数组


    Subdocuments should always be used in a scenario when you know and will always
    know the names of the fields that you are accessing. Otherwise, use arrays.


    ### 存储计算结果


    If you want to query for information that must be computed and is not explicitly
    present in the document, the best choice is to make the information explicit in
    the document. As MongoDB is designed to just store and retrieve the data, it does
    no computation. Any trivial computation is pushed to the client, leading to performance
    issues.


    ### 避免使用 $Where


    Also, avoid `$Where` as much as possible because it’s an extremely time- and resource-intensive
    operation.


    ### 使用正确的数据类型


    Use the correct data types while designing documents. For example, a number should
    be stored as a number data type only and not as a string data type. Using strings
    takes more space to store data and has an impact on the operations that can be
    performed on the data.


    ### 字符串大小写敏感性


    Another thing to note is that strings in MongoDB are case sensitive. Hence a search
    for `"practicalMongoDB"` will not find `"Practicalmongodb"`. Hence when doing
    a string search, you can do one of the following:

    *   Store data in a normalized case format.

    *   Use a regular expression with `/I` while searching.

    *   Use `$toUpper` or `$toLower` in the aggregation framework.


    ### 自定义 _id 主键


    Using your own unique key as an `_id` will save a bit of space and will be useful
    if you are planning to index on the key. However, you need to keep the following
    things in mind when deciding to use your own key as `_id`:

    *   You must ensure the uniqueness of the key.

    *   Also, consider the insertion order for your key because the insertion order
    will identify how much RAM will be used to maintain this index.


    ### 只返回需要的字段


    Retrieve fields as needed. When hundreds or thousands of requests are fulfilled
    per second, it’s certainly advantageous to fetch only fields that are needed.


    ### 使用 GridFS


    Use GridFS only for storing data that is larger than what can fit in a single
    document or is too big to load at once on the client, such as videos. Anything
    that will be streamed to a client is a good candidate for GridFS.


    ### 使用 TTL 自动删除文档


    Use TTL to delete documents. If documents in a collection need to be deleted after
    a pre-defined time period, the TTL feature can be used to automatically delete
    the document after it reaches the predefined age.


    Say you have a collection that maintains documents containing details of the user
    and the system interaction. The documents have a date field called `lastActivity`,
    which tracks the user and the system interaction. Let’s say you have a requirement
    that says that you need to maintain the user session only for an hour. In this
    scenario, you can set the TTL to 3600 seconds for the field `lastActivity`. A
    background thread will run automatically and will check and delete documents that
    are idle for more than 3600 seconds.


    ### 使用固定集合


    Use capped collections if you require high throughput based on insertion orders.
    In some scenarios, based on data size you need to maintain a rolling window of
    data in the system. For example, a capped collection can be used to store a high-volume
    system’s log information to quickly retrieve the most recent log entries.


    ### 注意数据一致性


    Note that MongoDB’s flexible schema can lead to inconsistent data if care is not
    taken. For example, the ability to duplicate data (embedded documents) if not
    updated properly can lead to data inconsistency, and so on. So it’s very important
    to check for data consistency.


    ### 处理异常与故障转移


    Although MongoDB handles seamless failover, per good coding practice, the application
    should be well written to handle any exception and to gracefully handle such a
    situation.'
