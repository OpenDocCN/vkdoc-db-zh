    \n![A332296_1_En_9_Fig10_HTML.jpg](A332296_1_En_9_Fig10_HTML.jpg)\n\nFigure 9-10.\
    \ `CPU Time`\n\n`IOWait` indicates the time the CPU spends waiting for the other\
