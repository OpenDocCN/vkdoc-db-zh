    ```\nC:\\>mkdir C:\\db1\\active3\\data\nC:\\>\n```\n\n然后，使用以下命令启动 `mongod`：\n\n\
    ```\nc:\\practicalmongodb\\bin>mongod --dbpath C:\\db1\\active3\\data --port 27024\
    \ --replSet testset/ANOC9:27021 --rest\n..........\n```\n\n新的 `mongod` 已经运行，现在你需要将其添加到副本集。为此，连接到主成员的\
    \ mongo 控制台：\n\n```\nC:\\>c:\\practicalmongodb\\bin\\mongo.exe --port 27021\n\
    MongoDB shell version: 3.0.4\nconnecting to: 127.0.0.1:27021/test\ntestset:PRIMARY>\n\
    ```\n\n接着，切换到 `admin` 数据库：\n\n```\ntestset:PRIMARY> use admin\nswitched to db\
    \ admin\ntestset:PRIMARY>\n```\n\n最后，需要发出以下命令将新的 `mongod` 添加到副本集：\n\n```\ntestset:PRIMARY>\
    \ rs.add(\"ANOC9:27024\")\n{ \"ok\" : 1 }\n```\n\n可以检查副本集状态，以验证新的活跃成员是否已添加成功，使用\
    \ `rs.status()` 命令。\n\n#### 7.4.3.4 向副本集添加仲裁器\n\n在此示例中，你将向副本集添加一个仲裁器成员。与其他成员一样，首先为\
