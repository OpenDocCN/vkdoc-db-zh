  trans: '## 1.3 大数据来源


    在本节中，我们将探讨导致数据规模不断增长的主要因素。图 1-3 描绘了主要的贡献来源。


    ![A332296_1_En_1_Fig3_HTML.jpg](img/A332296_1_En_1_Fig3_HTML.jpg)

    *图 1-3. 数据来源*


    正如 MGI 报告所强调的，这些数据的主要来源包括：


    *   **企业**：它们现在以更精细的粒度收集数据，为每笔交易附加更多细节，以理解消费者行为。

    *   **多媒体使用量在各行业的增长**：例如医疗保健、产品公司等。

    *   **社交媒体网站的日益普及**：如 Facebook、Twitter 等。

    *   **智能手机的快速普及**：这使得用户能够积极使用社交媒体网站和其他互联网应用。

    *   **传感器和设备在日常世界中的使用增加**：这些设备通过网络连接到计算资源。


    MGI 报告还预测，诸如传感器这类机器对机器设备（也称为**物联网**，或**IoT**）的数量在未来五年内将以每年超过 30%的速度增长。


    因此，数据的增长速率在提高，其多样性也在增加。此外，数据生成的模式已经从少数公司生成数据、其他方消费数据，转变为**每个人都在生成数据，每个人都在消费数据**。这源于消费级
    IT 和互联网技术的渗透，以及像社交媒体这样的趋势。图 1-4 描绘了数据生成模式的转变。


    ![A332296_1_En_1_Fig4_HTML.jpg](img/A332296_1_En_1_Fig4_HTML.jpg)

    *图 1-4. 数据模式*


    ## 1.4 大数据的三个 V


    我们将大数据定义为具有三个 V 的数据：**Volume（容量）**、**Velocity（速度）** 和 **Variety（多样性）**，如图 1-5
    所示。让我们来了解一下这三个 V。对于组织和 IT 领导者而言，关注这些方面势在必行。


    ![A332296_1_En_1_Fig5_HTML.gif](img/A332296_1_En_1_Fig5_HTML.gif)

    *图 1-5. 大数据的三个 V。“大”并不仅仅指容量*


    ### 1.4.1 容量


    大数据中的容量指的是数据的规模。如前面章节所讨论的，多种因素导致了大数据规模的增长：随着业务变得更加交易导向，我们看到交易数量不断增加；更多设备接入互联网，这也增加了数据量；互联网使用量增加；以及内容的数字化程度提升。图
    1-6 描绘了自 2009 年以来数字宇宙的增长。


    ![A332296_1_En_1_Fig6_HTML.jpg](img/A332296_1_En_1_Fig6_HTML.jpg)

    *图 1-6. 数字宇宙规模*


    在当今场景下，数据不仅来自企业内部；它也基于与扩展企业和客户的交易而产生。这要求企业对客户数据进行广泛的维护。**PB（拍字节）** 级规模如今已变得司空见惯。图
    1-7 描绘了数据的增长率。


    ![A332296_1_En_1_Fig7_HTML.jpg](img/A332296_1_En_1_Fig7_HTML.jpg)

    *图 1-7. 增长率*


    如此庞大的数据量是大数据技术面临的最大挑战。以及时且成本效益高的方式存储、处理并使数据可访问所需的存储和处理能力是巨大的。


    ### 1.4.2 多样性


    来自各种设备和来源生成的数据没有固定的格式或结构。与文本、CSV 或 RDBMS 数据相比，数据可以来自文本文件、日志文件、流媒体视频、照片、仪表读数、股票行情数据、PDF、音频以及各种其他非结构化格式。


    如今，对数据结构的控制是不存在的。新的数据来源和结构正在以极快的速度被创造出来。因此，责任落在了技术上，需要找到一种解决方案来分析和可视化存在的大量多样的数据。例如，为了为通勤者提供替代路线，一个交通分析应用程序需要来自数百万智能手机和传感器的实时数据馈送，以提供关于交通状况和替代路线的准确分析。


    ### 1.4.3 速度


    大数据中的速度指的是数据生成的速度，以及它需要被处理的速度。如果数据不能以所需的速度处理，它就会失去其重要性。由于数据流来自社交媒体网站、传感器、行情指示器、计量和监控设备，对于组织来说，在数据移动时和静止时都快速处理数据至关重要（见图
    1-8）。快速反应和处理以应对数据的速度，是大数据技术面临的又一挑战。


    ![A332296_1_En_1_Fig8_HTML.jpg](img/A332296_1_En_1_Fig8_HTML.jpg)

    *图 1-8. 数据的三个层面*


    实时洞察在许多大数据用例中至关重要。例如，一个算法交易系统从市场和像 Twitter 这样的社交媒体网站获取实时数据输入，以做出股票交易决策。处理这些数据的任何延迟都可能意味着在股票交易中损失数百万美元的机会。


    每当讨论大数据时，都会提到第四个 V。第四个 V 是**Veracity（真实性）**，这意味着并非所有数据都是重要的，因此必须识别哪些数据能提供有意义的洞察，哪些应该被忽略。


    ## 1.5 大数据的使用


    本节将重点介绍利用大数据为组织创造价值的方法。在我们深入探讨如何让大数据为组织所用之前，让我们首先看看为什么大数据很重要。


    大数据是一个全新的数据源；它是你在博客上发文、点赞产品或旅行时生成的数据。以前，这种极其细致的信息并未被捕获。现在它被捕获了，拥抱此类数据的组织可以追求创新、提高敏捷性并增加其盈利能力。


    大数据可以通过多种方式为任何组织创造价值。正如 MGI 报告所列出的，这可以大致分为五种大数据使用方式。


    ### 1.5.1 可见性


    及时地将数据提供给相关利益相关者，可以创造巨大的价值。让我们用一个例子来理解这一点。假设一家制造公司的研发、工程和制造部门地理位置分散。如果这些部门之间的数据可以访问并能随时整合，那么它不仅可以减少搜索和处理时间，还有助于根据当前需求提高产品质量。


    ### 1.5.2 发现与分析信息


    大数据的大部分价值来自于当从外部来源收集的数据可以与组织的内部数据合并时。组织正在捕获关于库存、员工和客户的详细数据。通过利用所有这些数据，他们可以发现并分析新的信息和模式；结果，这些信息和知识可以用来改进流程和绩效。


    ### 1.5.3 细分与定制


    大数据使组织能够创建量身定制的产品和服务，以满足特定的细分需求。这也可以用于社会领域，以精确划分人群并针对特定需求定向投放福利计划。基于各种参数的客户细分有助于开展定向营销活动，并调整产品以满足客户需求。


    ### 1.5.4 辅助决策制定


    大数据可以显著降低风险、改进决策制定并揭示有价值的洞察。信用卡处理中的自动欺诈警报系统和库存的自动微调，都是基于大数据分析来辅助或自动化决策制定的系统实例。'
- fmt: '### 1.5.5 Innovation


    大数据为新产品和服务形式的创新提供了可能。它也为现有产品和服务的创新提供了支持，以覆盖更广泛的人群。制造商利用为实际产品收集的数据，不仅可以创新创造下一代产品，还可以创新销售方案。


    例如，可以分析来自机器和车辆的实时数据，为维护计划提供见解；可以监控机器的磨损情况，以制造更具弹性的机器；可以监控燃油消耗，从而提高发动机效率。实时交通信息已经通过为通勤者提供替代路线的选择，使他们的生活更加便捷。


    因此，大数据不仅仅是数据的规模。它的机遇在于从不断增长的数据池中发现有意义的见解。它帮助组织做出更明智的决策，从而使其更加敏捷。它不仅为组织提供了通过明智决策来加强现有业务的机会，还有助于识别新的机会。


    ## 1.6 Big Data Challenges


    大数据也带来了一些挑战。在本节中，我们将重点介绍其中的几个。


    ### 1.6.1 Policies and Procedures


    随着越来越多的数据被收集、数字化并在全球范围内传输，政策和合规性问题变得越来越重要。数据隐私、安全、知识产权和保护对组织至关重要。


    遵守各种法定和法律要求对数据处理提出了挑战。数据所有权和相关责任问题是大数据案例中需要处理的重要法律方面。


    此外，许多大数据项目利用了公共云计算提供者的可扩展性功能。这对合规性提出了挑战。


    关于谁拥有数据、数据的公平使用如何定义、谁对数据的准确性和保密性负责等政策问题也需要得到解答。


    ### 1.6.2 Access to Data


    为消费目的访问数据对大数据项目来说是一个挑战。部分数据可能对第三方可用，而获得访问权限可能是一个法律或合同上的挑战。


    关于产品或服务的数据可能分布在 Facebook、Twitter 动态、评论和博客上，那么产品所有者如何从各种提供商拥有的不同来源访问这些数据呢？


    同样，需要将访问大数据的合同条款和经济激励措施联系起来，以使消费者能够获得数据。


    ### 1.6.3 Technology and Techniques


    必须利用专门为满足大数据需求而构建的新工具和技术，而不是试图通过遗留系统来解决上述问题。一方面，遗留系统不足以处理大数据，另一方面，缺乏掌握新技术经验丰富的资源，这是任何大数据项目都必须应对的挑战。


    ## 1.7 Legacy Systems and Big Data


    在本节中，我们将讨论组织在使用遗留系统管理大数据时面临的挑战。


    ### 1.7.1 Structure of Big Data


    遗留系统旨在处理结构化数据，其中定义了包含列的表格。存储在列中的数据格式也是已知的。


    然而，大数据是具有多种结构的数据。它基本上是诸如图像、视频、日志等非结构化数据。


    由于大数据可能是非结构化的，而遗留系统是为了通过基于各种列中保存的特定数据类型的索引等技术执行快速查询和分析而创建的，因此无法用于保存或处理大数据。


    ### 1.7.2 Data Storage


    遗留系统使用大型服务器以及 NAS 和 SAN 系统来存储数据。随着数据增加，服务器大小和后端存储大小也必须增加。传统的遗留系统通常采用向上扩展模型，需要不断向一台服务器添加更多的计算、内存和存储资源，以满足日益增长的数据需求。因此，处理时间呈指数级增长，这违背了大数据的另一个重要要求，即速度。


    ### 1.7.3 Data Processing


    遗留系统中的算法被设计为处理诸如字符串和整数等结构化数据。它们还受到数据大小的限制。因此，遗留系统无法处理非结构化数据的处理、海量数据的处理以及所需执行处理的高速要求。


    因此，为了从大数据中获取价值，我们需要在存储、计算和检索领域部署更新的技术，并且需要用于分析数据的新技术。


    ## 1.8 Big Data Technologies


    你已经了解了什么是大数据。在本节中，我们将简要了解哪些技术可以处理这个庞大的数据源。所讨论的技术需要高效地接受和处理不同类型的数据。


    使组织能够充分利用其大数据的最新技术进步包括以下方面：


    *   专门为大型非结构化数据设计的新存储和处理技术

    *   并行处理

    *   集群

    *   大型网格环境

    *   高连接性和高吞吐量

    *   云计算和横向扩展架构


    越来越多的技术正在利用这些技术进步。在本书中，我们将讨论 `MongoDB`，它是可用于存储和处理大数据的技术之一。


    ## 1.9 Summary


    在本章中，你了解了大数据。你研究了产生大数据的各种来源，以及大数据的用途和带来的挑战。你还了解了为什么需要更新的技术来存储和处理大数据。


    在接下来的章节中，你将了解一些帮助组织管理大数据并使其能够从大数据中获取有意义见解的技术。


    # 2. NoSQL


    > “NoSQL 是一种设计互联网规模数据库解决方案的新方法。它不是一种产品或技术，而是一个术语，定义了一组不基于传统 RDBMS 原则的数据库技术。”


    在本章中，我们将介绍 `NoSQL` 的定义和基础知识。我们将向你介绍 `CAP` 定理，并讨论 `NRW` 表示法。我们将比较 `ACID` 和 `BASE`
    方法，并通过比较 `NoSQL` 和 `SQL` 数据库技术来结束本章。


    ## 2.1 SQL


    RDBMS 的想法源于 E.F. Codd 于 1970 年发表的题为《大型共享数据库的关系数据模型》的白皮书。用于查询 RDBMS 系统的语言是 `SQL`（结构化查询语言）。


    RDBMS 系统非常适合存储在列和行中的结构化数据，可以使用 `SQL` 进行查询。RDBMS 系统基于 `ACID` 事务的概念。`ACID` 代表原子性、一致性、隔离性和持久性，其中：


    *   原子性意味着事务的所有更改要么完全应用，要么完全不应用。

    *   一致性意味着事务应用后数据处于一致状态。这意味着事务提交后，获取特定数据的查询将看到相同的结果。

    *   隔离性意味着应用于同一数据集的事务彼此独立。因此，一个事务不会干扰另一个事务。

    *   持久性意味着更改在系统中是永久的，不会因任何故障而丢失。'
  raw: '### 1.5.5 Innovation


    Big data enables innovation of new ideas in the form of products and services.
    It enables innovation in the existing ones in order to reach out to large segments
    of people. Using data gathered for actual products, the manufacturers can not
    only innovate to create the next generation product but they can also innovate
    sales offerings.


    As an example, real-time data from machines and vehicles can be analyzed to provide
    insight into maintenance schedules; wear and tear on machines can be monitored
    to make more resilient machines; fuel consumption monitoring can lead to higher
    efficiency engines. Real-time traffic information is already making life easier
    for commuters by providing them options to take alternate routes.


    Thus, big data is not just the volume of data. It’s the opportunities in finding
    meaningful insights from the ever-increasing pool of data. It’s helping organizations
    make more informed decisions, which makes them more agile. It not only provides
    the opportunity for organizations to strengthen existing business by making informed
    decisions, it also helps in identifying new opportunities.


    ## 1.6 Big Data Challenges


    Big data also poses some challenges. In this section, we will highlight a few
    of them.


    ### 1.6.1 Policies and Procedures


    As more and more data is gathered, digitized, and moved around the globe, the
    policy and compliance issues become increasingly important. Data privacy, security,
    intellectual property, and protection are of immense importance to organizations.


    Compliance with various statutory and legal requirements poses a challenge in
    data handling. Issues around ownership and liabilities around data are important
    legal aspects that need to be dealt with in cases of big data.


    Moreover, many big data projects leverage the scalability features of public cloud
    computing providers. This poses a challenge for compliance.


    Policy questions on who owns the data, what is defined as fair use of data, and
    who is responsible for accuracy and confidentiality of data also need to be answered.


    ### 1.6.2 Access to Data


    Accessing data for consumption is a challenge for big data projects. Some of the
    data may be available to third parties, and gaining access can be a legal, contractual
    challenge.


    Data about a product or service is available on Facebook, Twitter feeds, reviews,
    and blogs, so how does the product owner access this data from various sources
    owned by various providers?


    Likewise, contractual clauses and economic incentives for accessing big data need
    to be tied in to enable the availability of data by the consumer.


    ### 1.6.3 Technology and Techniques


    New tools and technologies built specifically to address the needs of big data
    must be leveraged, rather than trying to address the aforementioned issues through
    legacy systems. The inadequacy of legacy systems to deal with big data on one
    hand and the lack of experienced resources in newer technologies is a challenge
    that any big data project has to manage.


    ## 1.7 Legacy Systems and Big Data


    In this section, we will discuss the challenges that organizations are facing
    when managing big data using legacy systems .


    ### 1.7.1 Structure of Big Data


    Legacy systems are designed to work with structured data where tables with columns
    are defined. The format of the data held in the columns is also known.


    However, big data is data with many structures. It’s basically unstructured data
    such as images, videos, logs, etc.


    Since big data can be unstructured, legacy systems created to perform fast queries
    and analysis through techniques like indexing based on particular data types held
    in various columns cannot be used to hold or process big data.


    ### 1.7.2 Data Storage


    Legacy systems use big servers and NAS and SAN systems to store the data. As the
    data increases, the server size and the backend storage size has to be increased.
    Traditional legacy systems typically work in a scale-up model where more and more
    compute, memory, and storage needs to be added to a server to meet the increased
    data needs. Hence the processing time increases exponentially, which defeats the
    other important requirement of big data, which is velocity.


    ### 1.7.3 Data Processing


    The algorithms in legacy system are designed to work with structured data such
    as strings and integers. They are also limited by the size of data. Thus, legacy
    systems are not capable of handling the processing of unstructured data, huge
    volumes of such data, and the speed at which the processing needs to be performed.


    As a result, to capture value from big data, we need to deploy newer technologies
    in the field of storing, computing, and retrieving, and we need new techniques
    for analyzing the data.


    ## 1.8 Big Data Technologies


    You have seen what big data is. In this section we will briefly look at what technologies
    can handle this humongous source of data. The technologies in discussion need
    to efficiently accept and process different types of data.


    The recent technology advancements that enable organizations to make the most
    of its big data are the following:


    New storage and processing technologies designed specifically for large unstructured
    data   Parallel processing   Clustering   Large grid environments   High connectivity
    and high throughput   Cloud computing and scale-out architectures  


    There are a growing number of technologies that are making use of these technological
    advancements. In this book, we will be discussing MongoDB, one of the technologies
    that can be used to store and process big data.


    ## 1.9 Summary


    In this chapter you learned about big data. You looked into the various sources
    that are generating big data, and the usage and challenges posed by big data.
    You also looked why newer technologies are needed to store and process big data.


    In the following chapters, you will look into a few of the technologies that help
    organizations manage big data and enable them to get meaningful insights from
    big data.


    # 2. NoSQL


    > “NoSQL is a new way of designing Internet-scale database solutions. It is not
    a product or technology but a term that defines a set of database technologies
    that are not based on the traditional RDBMS principles.”


    In this chapter, we will cover the definition and basics of NoSQL. We will introduce
    you to the CAP theorem and will talk about the NRW notations. We will compare
    the ACID and BASE approaches and finally conclude the chapter by comparing NoSQL
    and SQL database technologies.


    ## 2.1 SQL


    The idea of RDBMS was borne from E.F. Codd’s 1970 whitepaper titled “A relational
    model of data for large shared data banks.” The language used to query RDBMS systems
    is SQL (Sequel Query Language ).


    RDBMS systems are well suited for structured data held in columns and rows, which
    can be queried using SQL. The RDBMS systems are based on the concept of ACID transactions.
    ACID stands for Atomic, Consistent, Isolated, and Durable, where


    *   Atomic implies either all changes of a transaction are applied completely
    or not applied at all.

    *   Consistent means the data is in a consistent state after the transaction is
    applied. This means after a transaction is committed, the queries fetching a particular
    data will see the same result.

    *   Isolated means the transactions that are applied to the same set of data are
    independent of each other. Thus, one transaction will not interfere with another
    transaction.

    *   Durable means the changes are permanent in the system and will not be lost
    in case of any failures.'
