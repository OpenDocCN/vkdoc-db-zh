    *   Config servers


    The shard is the component where the actual data is stored. For the sharded cluster,
    it holds a subset of data and can either be a mongod or a replica set. All shard’s
    data combined together forms the complete dataset for the sharded cluster.


    Sharding is enabled per collection basis, so there might be collections that are
    not sharded. In every sharded cluster there’s a primary shard where all the unsharded
    collections are placed in addition to the sharded collection data.


    When deploying a sharded cluster, by default the first shard becomes the primary
    shard although it’s configurable. See Figure [7-16](#A332296_1_En_7_Chapter.html#Fig16).


    ![A332296_1_En_7_Fig16_HTML.jpg](A332296_1_En_7_Fig16_HTML.jpg)


    Figure 7-16.


    Primary shard


    Config servers are special mongods that hold the sharded cluster’s metadata. This
    metadata depicts the sharded system state and organization.


    The config server stores data for a single sharded cluster. The config servers
    should be available for the proper functioning of the cluster.


    One config server can lead to a cluster’s single point of failure. For production
    deployment it’s recommended to have at least three config servers, so that the
    cluster keeps functioning even if one config server is not accessible.


    A config server stores the data in the config database, which enables routing
    of the client requests to the respective data. This database should not be updated.


    MongoDB writes data to the config server only when the data distribution has changed
    for balancing the cluster.


    The mongos act as the routers. They are responsible for routing the read and write
    request from the application to the shards.


    An application interacting with a mongo database need not worry about how the
    data is stored internally on the shards. For them, it’s transparent because it’s
    only the mongos they interact with. The mongos, in turn, route the reads and writes
    to the shards.


    The mongos cache the metadata from config server so that for every read and write
    request they don’t overburden the config server.


    However, in the following cases, the data is read from the config server :


    *   Either an existing mongos has restarted or a new mongos has started for the
    first time.

    *   Migration of chunks. We will explain chunk migration in detail later.


    ### 7.5.2 Data Distribution Process


    You will next look at how the data is distributed among the shards for the collections
    where sharding is enabled. In MongoDB, the data is sharded or distributed at the
    collection level. The collection is partitioned by the shard key.


    #### 7.5.2.1 Shard Key


    Any indexed single/compound field that exists within all documents of the collection
    can be a shard key. You specify that this is the field basis which the documents
    of the collection need to be distributed. Internally, MongoDB divides the documents
    based on the value of the field into chunks and distributes them across the shards.


    There are two ways MongoDB enables distribution of the data: range-based partitioning
    and hash-based partitioning.'
  trans: '

    ## 7.5 分片


    你在上一节中已经看到，MongoDB 如何使用**副本集**来复制数据，以防范各种意外情况，并分发读取负载以提高读取效率。


    MongoDB 广泛使用内存来实现低延迟的数据库操作。当比较从内存读取数据与从磁盘读取数据的速度时，从内存读取大约比从磁盘读取快 100,000 倍。


    在 MongoDB 中，理想情况下，**工作集**应完全容纳在内存中。工作集由最常访问的数据和索引组成。


    当 MongoDB 访问不在内存中的数据时，会发生**页面错误**。如果有空闲内存可用，操作系统会直接将请求的页面加载到内存中；然而，在没有空闲内存的情况下，内存中的页面会被写入磁盘，然后请求的页面才会被加载到内存中，这会拖慢进程。少数操作可能会意外地将工作集的大部分从内存中清除，从而对性能产生不利影响。一个例子是扫描数据库中所有文档的查询，如果其大小超过了服务器内存。这会导致文档被加载到内存中，并将工作集置换到磁盘上。


    确保你在项目的模式设计阶段为查询定义了适当的索引覆盖范围，将最大程度地降低发生这种情况的风险。MongoDB 的 `explain` 操作可用于提供有关你的查询计划和所用索引的信息。


    MongoDB 的 `serverStatus` 命令返回一个 `workingSet` 文档，该文档提供了实例工作集大小的估计值。运维团队可以跟踪实例在给定时间段内访问了多少页面，以及工作集中最旧文档和最新文档之间的时间间隔。通过跟踪所有这些指标，可以检测到工作集何时将达到当前内存限制，从而可以采取主动措施确保系统得到良好扩展以应对这种情况。


    在 MongoDB 中，扩展是通过**水平扩展**数据（即在多台通用服务器之间对数据进行分区）来处理的，这也称为**分片**（水平扩展）。


    分片通过将数据集水平划分到多台服务器上来应对扩展以支持大型数据集和高吞吐量的挑战，每台服务器负责处理其那部分数据，没有哪一台服务器会负担过重。这些服务器也称为**分片**。


    每个分片都是一个独立的数据库。所有分片共同组成一个逻辑数据库。


    分片减少了每个分片需要处理的操作数量。例如，当插入数据时，只需要访问负责存储这些记录的分片。


    随着集群的增长，每个分片需要处理的进程会减少，因为分片所保存的数据子集变小了。这导致了吞吐量和容量的水平提升。


    假设你有一个大小为 1TB 的数据库。如果分片数量为 4，那么每个分片将处理大约 265GB 的数据，而如果将分片数量增加到 40，则每个分片仅需保存 25GB
    的数据。


    图 7-15 描绘了一个被分片的集合在三个分片上分布时的样子。


    ![A332296_1_En_7_Fig15_HTML.jpg](img/A332296_1_En_7_Fig15_HTML.jpg)


    图 7-15.


    跨三个分片的分片集合


    尽管分片是一个引人注目且强大的特性，但它对基础设施有显著要求，并且增加了整个部署的复杂性。因此，你需要了解在哪些情况下可以考虑使用分片。


    在以下情况下使用分片：


    *   数据集的大小非常庞大，并且已经开始挑战单个系统的能力。

    *   由于 MongoDB 使用内存来快速获取数据，当活动工作集的限制即将达到时，进行水平扩展就变得很重要。

    *   如果应用程序是写密集型的，可以使用分片将写入分散到多台服务器上。


    ### 7.5.1 分片组件


    接下来你将了解在 MongoDB 中实现分片所需的组件。分片功能在 MongoDB 中通过**分片集群**启用。


    分片集群的组件如下：


    *   `分片`

    *   `mongos`

    *   `配置服务器`


    分片是实际存储数据的组件。对于分片集群，它保存数据的一个子集，可以是一个 `mongod` 实例或一个**副本集**。所有分片的数据组合在一起构成了分片集群的完整数据集。


    分片是按集合启用的，因此可能存在未分片的集合。在每个分片集群中，都有一个**主分片**，除了分片集合的数据外，所有未分片的集合也放置在此处。


    部署分片集群时，默认情况下第一个分片成为主分片，尽管这是可配置的。见图 7-16。


    ![A332296_1_En_7_Fig16_HTML.jpg](img/A332296_1_En_7_Fig16_HTML.jpg)


    图 7-16.


    主分片


    `配置服务器` 是特殊的 `mongod` 实例，它们保存分片集群的**元数据**。此元数据描述了分片系统的状态和组织结构。


    配置服务器为单个分片集群存储数据。为了使集群正常运行，`配置服务器` 必须可用。


    一个 `配置服务器` 可能导致集群的**单点故障**。对于生产环境部署，建议至少使用三个 `配置服务器`，这样即使一个 `配置服务器` 无法访问，集群也能继续运行。


    `配置服务器` 将数据存储在 `config` 数据库中，该数据库能够将客户端请求路由到相应的数据。此数据库不应被更新。


    MongoDB 仅在数据分布发生变化以进行集群平衡时，才会向 `配置服务器` 写入数据。


    `mongos` 充当**路由器**。它们负责将应用程序的读写请求路由到各个分片。


    与 MongoDB 数据库交互的应用程序无需关心数据在分片内部的存储方式。对于它们来说，这是透明的，因为它们只与 `mongos` 交互。然后，`mongos`
    将读写操作路由到各个分片。


    `mongos` 会缓存来自 `配置服务器` 的元数据，这样对于每个读写请求，它们就不会过度加重 `配置服务器` 的负担。


    然而，在以下情况下，数据是从 `配置服务器` 读取的：


    *   现有的 `mongos` 已重新启动，或者新的 `mongos` 首次启动。

    *   **块迁移**。我们将在后面详细解释 `chunk migration`。


    ### 7.5.2 数据分发过程


    接下来你将了解在启用了分片的集合中，数据如何在分片之间分发。在 MongoDB 中，数据是在**集合级别**进行分片或分发的。集合通过 `shard key`
    进行分区。


    #### 7.5.2.1 分片键


    集合中所有文档中存在的任何已索引的单字段或复合字段都可以作为 `shard key`。你指定这个字段作为依据来分发集合的文档。在内部，MongoDB 根据该字段的值将文档划分成**块**，并将这些块分发到各个分片。


    MongoDB 通过两种方式启用数据分发：`基于范围的分区` 和 `基于哈希的分区`。

    '
- fmt: '## Range-Based Partitioning


    在基于范围的分区中，分片键值被划分为多个范围。假设你考虑一个 `timestamp` 字段作为分片键。在这种分区方式中，值被视为从最小值到最大值的一条直线，其中最小值是起始时期（例如，1970年1月1日），最大值是结束时期（例如，9999年12月31日）。集合中的每个文档都将仅具有此范围内的某个时间戳值，它将代表这条线上的某个点。


    根据可用分片的数量，这条线将被划分为多个范围，文档将根据这些范围进行分发。


    在此分区方案中，如图 [7-17](#A332296_1_En_7_Chapter.html#Fig17) 所示，分片键值相近的文档很可能落在同一个分片上。这可以显著提高范围查询的性能。


    ![A332296_1_En_7_Fig17_HTML.jpg](A332296_1_En_7_Fig17_HTML.jpg)

    **图 7-17. 基于范围的分区**


    然而，其缺点在于它可能导致数据分布不均，使某个分片过载，最终可能接收大部分请求，而其他分片负载不足，因此系统无法正常扩展。


    ## Hash-Based Partitioning


    在基于哈希的分区中，数据是根据分片字段的哈希值进行分布的。如果选择这种方式，与基于范围的分区相比，它将导致更随机的分布。


    分片键相近的文档不太可能属于同一个块。例如，对于基于 `_id` 字段哈希的范围，将会有一条哈希值直线，这条直线将再次根据分片数量进行分区。根据哈希值，文档将分布在任一分片中。参见图
    [7-18](#A332296_1_En_7_Chapter.html#Fig18)。


    ![A332296_1_En_7_Fig18_HTML.jpg](A332296_1_En_7_Fig18_HTML.jpg)

    **图 7-18. 基于哈希的分区**


    与基于范围的分区相比，这确保了数据均匀分布，但这是以高效的范围查询为代价的。


    ## Chunks


    数据以块的形式在分片之间移动。分片键范围被进一步划分为子范围，这些子范围也被称为块。参见图 [7-19](#A332296_1_En_7_Chapter.html#Fig19)。


    ![A332296_1_En_7_Fig19_HTML.jpg](A332296_1_En_7_Fig19_HTML.jpg)

    **图 7-19. 块**


    对于一个分片集群，`64MB` 是默认的块大小。在大多数情况下，这是一个适合进行块拆分和迁移的大小。


    让我们通过一个例子来讨论分片和块的执行过程。假设你有一个博客文章集合，它基于 `date` 字段进行分片。这意味着集合将根据 `date` 字段的值进行拆分。我们进一步假设你有三个分片。在此场景中，数据可能在分片上分布如下：


    *   分片 #1：时间开始至2009年7月

    *   分片 #2：2009年8月至2009年12月

    *   分片 #3：2010年1月至时间结束


    为了检索从2010年1月1日到今天的文档，查询被发送到 `mongos`。


    在此场景中：

    1.  客户端查询 `mongos`。

    2.  `mongos` 知道哪些分片拥有数据，因此它将查询发送给分片 #3。

    3.  分片 #3 执行查询并将结果返回给 `mongos`。

    4.  `mongos` 合并从各个分片（在此情况下仅为分片 #3）接收的数据，并将最终结果返回给客户端。


    应用程序不需要感知分片。它可以像查询普通的 `mongod` 一样查询 `mongos`。


    让我们考虑另一个场景，你插入一个新文档。新文档具有今天的日期。事件序列如下：

    1.  文档被发送到 `mongos`。

    2.  `mongos` 检查日期，并基于此将文档发送给分片 #3。

    3.  分片 #3 插入文档。


    从客户端的角度来看，这再次与单服务器设置相同。


    ## Role of Config Servers in the Above Scenario


    考虑一个场景，你开始收到数百万个日期为2009年9月的文档的插入请求。在这种情况下，分片 #2 开始变得过载。


    一旦配置服务器意识到分片 #2 变得太大，它就会介入。它将拆分该分片上的数据并开始将其迁移到其他分片。迁移完成后，它将更新后的状态发送给 `mongos`。因此现在，分片
    #2 拥有2009年8月到2009年9月18日的数据，而分片 #3 包含2009年9月19日到时间结束的数据。


    当向集群添加新分片时，由配置服务器负责决定如何处理它。数据可能需要立即迁移到新分片，或者新分片可能需要保留一段时间。总之，配置服务器是大脑。每当有任何数据被移动时，配置服务器都会让
    `mongos` 知道最终配置，以便 `mongos` 可以继续进行正确的路由。


    ## 7.5.3 Data Balancing Process


    接下来你将了解如何保持集群的平衡（即 MongoDB 如何确保所有分片负载均等）。


    新数据的添加或现有数据的修改，或服务器的添加或移除，都可能导致数据分布不平衡，这意味着要么一个分片因块过多而过载，其他分片的块数量较少，要么可能导致某个块的大小显著大于其他块。


    MongoDB 通过以下后台进程确保平衡：

    *   块拆分

    *   平衡器


    ### 7.5.3.1 Chunk Splitting


    块拆分是确保块保持指定大小的进程之一。如你所见，选择了一个分片键并用于标识文档将如何跨分片分布。文档进一步被分组为 `64MB` 的块（默认且可配置），并根据其托管的范围存储在分片中。


    如果由于插入或更新操作导致块的大小发生变化并超过默认块大小，则该块将被 `mongos` 拆分为两个更小的块。参见图 [7-20](#A332296_1_En_7_Chapter.html#Fig20)。


    ![A332296_1_En_7_Fig20_HTML.jpg](A332296_1_En_7_Fig20_HTML.jpg)

    **图 7-20. 块拆分**


    此过程使分片内的块保持指定大小或小于该大小（即它确保块为配置的大小）。


    插入和更新操作会触发拆分。拆分操作会导致配置服务器中的数据被修改，因为元数据被更新了。虽然拆分不会导致数据迁移，但此操作可能导致集群不平衡，其中一个分片拥有比另一个分片更多的块。'
  raw: '##### Range-Based Partitioning


    In range-based partitioning , the shard key values are divided into ranges. Say
    you consider a `timestamp` field as the shard key. In this way of partitioning,
    the values are considered as a straight line starting from a Min value to Max
    value where Min is the starting period (say, 01/01/1970) and Max is the end period
    (say, 12/31/9999). Every document in the collection will have timestamp value
    within this range only, and it will represent some point on the line.


    Based on the number of shards available, the line will be divided into ranges,
    and documents will be distributed based on them.


    In this scheme of partitioning, shown in Figure [7-17](#A332296_1_En_7_Chapter.html#Fig17),
    the documents where the values of the shard key are nearby are likely to fall
    on the same shard. This can significantly improve the performance of the range
    queries.


    ![A332296_1_En_7_Fig17_HTML.jpg](A332296_1_En_7_Fig17_HTML.jpg)


    Figure 7-17.


    Range-based partitioning


    However, the disadvantage is that it can lead to uneven distribution of data,
    overloading one of the shards, which may end up receiving majority of the requests,
    whereas the other shards remain underloaded, so the system will not scale properly.


    ##### Hash-Based Partitioning


    In hash-based partitioning , the data is distributed on the basis of the hash
    value of the shard field. If selected, this will lead to a more random distribution
    compared to range-based partitioning.


    It’s unlikely that the documents with close shard key will be part of the same
    chunk. For example, for ranges based on the hash of the `_id` field, there will
    be a straight line of hash values, which will again be partitioned on basis of
    the number of shards. On the basis of the hash values, the documents will lie
    in either of the shards. See Figure [7-18](#A332296_1_En_7_Chapter.html#Fig18).


    ![A332296_1_En_7_Fig18_HTML.jpg](A332296_1_En_7_Fig18_HTML.jpg)


    Figure 7-18.


    Hash-based partitioning


    In contrast to range-based partitioning, this ensures that the data is evenly
    distributed, but it happens at the cost of efficient range queries.


    ##### Chunks


    The data is moved between the shards in form of chunks. The shard key range is
    further partitioned into sub-ranges, which are also termed as chunks. See Figure
    [7-19](#A332296_1_En_7_Chapter.html#Fig19).


    ![A332296_1_En_7_Fig19_HTML.jpg](A332296_1_En_7_Fig19_HTML.jpg)


    Figure 7-19.


    Chunks


    For a sharded cluster, 64MB is the default chunk size. In most situations, this
    is an apt size for chunk slitting and migration.


    Let’s discuss the execution of sharding and chunks with an example. Say you have
    a blog posts collection which is sharded on the field `date`. This implies that
    the collection will be split up on the basis of the `date` field values. Let’s
    assume further that you have three shards. In this scenario the data might be
    distributed across shards as follows:


    *   Shard #1: Beginning of time up to July 2009

    *   Shard #2: August 2009 to December 2009

    *   Shard #3: January 2010 to through the end of time


    In order to retrieve documents from January 1, 2010 until today, the query is
    sent to mongos.


    In this scenario,


    The client queries mongos.   The mongos know which shards have the data, so mongos
    sends the queries to Shard #3.   Shard #3 executes the query and returns the results
    to mongos.   Mongos combines the data received from various shards, which in this
    case is Shard #3 only, and returns the final result back to the client.  


    The application doesn’t need to be sharding-aware. It can query the mongos as
    though it’s a normal mongod.


    Let’s consider another scenario where you insert a new document. The new document
    has today’s date. The sequences of events are as follows:


    The document is sent to the mongos.   Mongos checks the date and on basis of that,
    sends the document to Shard #3.   Shard #3 inserts the document.  


    From a client’s point of view, this is again identical to a single server setup.


    ##### Role of ConfigServers in the Above Scenario


    Consider a scenario where you start getting insert requests for millions of documents
    with the date of September 2009\. In this case, Shard #2 begins to get overloaded.


    The config server steps in once it realizes that Shard #2 is becoming too big.
    It will split the data on the shard and start migrating it to other shards. After
    the migration is completed, it sends the updated status to the mongos. So now
    Shard #2 has data from August 2009 until September 18, 2009 and Shard #3 contains
    data from September 19, 2009 until the end of time.


    When a new shard is added to the cluster, it’s the config server’s responsibility
    to figure out what to do with it. The data may need to be immediately migrated
    to the new shard, or the new shard may need to be in reserve for some time. In
    summary, the config servers are the brains. Whenever any data is moved around,
    the config servers let the mongos know about the final configuration so that the
    mongos can continue doing proper routing.


    ### 7.5.3 Data Balancing Process


    You will next look at how the cluster is kept balanced (i.e. how MongoDB ensures
    that all the shards are equally loaded).


    The addition of new data or modification of existing data, or the addition or
    removal of servers, can lead to imbalance in the data distribution, which means
    either one shard is overloaded with more chunks and the other shards have less
    number of chunks, or it can lead to an increase in the chunk size, which is significantly
    greater than the other chunks.


    MongoDB ensures balance with the following background processes:


    *   Chunk splitting

    *   Balancer


    #### 7.5.3.1 Chunk Splitting


    Chunk splitting is one of the processes that ensures the chunks are of the specified
    size. As you have seen, a shard key is chosen and it is used to identify how the
    documents will be distributed across the shards. The documents are further grouped
    into chunks of 64MB (default and is configurable) and are stored in the shards
    based on the range it is hosting.


    If the size of the chunk changes due to an insert or update operation, and exceeds
    the default chunk size, then the chunk is split into two smaller chunks by the
    mongos. See Figure [7-20](#A332296_1_En_7_Chapter.html#Fig20).


    ![A332296_1_En_7_Fig20_HTML.jpg](A332296_1_En_7_Fig20_HTML.jpg)


    Figure 7-20.


    Chunk splitting


    This process keeps the chunks within a shard of the specified size or lesser than
    that (i.e. it ensures that the chunks are of the configured size).


    Insert and update operations trigger splits. The split operation leads to modification
    of the data in the config server as the metadata is modified. Although splits
    don’t lead to migration of data, this operation can lead to an unbalance of the
    cluster with one shard having more chunks compared to another.'
  trans: '

    ## 基于范围的分区


    在基于范围的分区中，分片键值被划分为多个范围。假设你考虑一个 `timestamp` 字段作为分片键。在这种分区方式中，值被视为从最小值到最大值的一条直线，其中最小值是起始时期（例如，1970
    年 1 月 1 日），最大值是结束时期（例如，9999 年 12 月 31 日）。集合中的每个文档都将仅具有此范围内的某个时间戳值，它将代表这条线上的某个点。


    根据可用分片的数量，这条线将被划分为多个范围，文档将根据这些范围进行分发。


    在此分区方案中，如图 7-17 所示，分片键值相近的文档很可能落在同一个分片上。这可以显著提高范围查询的性能。


    ![A332296_1_En_7_Fig17_HTML.jpg](img/A332296_1_En_7_Fig17_HTML.jpg)

    **图 7-17. 基于范围的分区**


    然而，其缺点在于它可能导致数据分布不均，使某个分片过载，最终可能接收大部分请求，而其他分片负载不足，因此系统无法正常扩展。


    ## 基于哈希的分区


    在基于哈希的分区中，数据是根据分片字段的哈希值进行分布的。如果选择这种方式，与基于范围的分区相比，它将导致更随机的分布。


    分片键相近的文档不太可能属于同一个块。例如，对于基于 `_id` 字段哈希的范围，将会有一条哈希值直线，这条直线将再次根据分片数量进行分区。根据哈希值，文档将分布在任一分片中。参见图
    7-18。


    ![A332296_1_En_7_Fig18_HTML.jpg](img/A332296_1_En_7_Fig18_HTML.jpg)

    **图 7-18. 基于哈希的分区**


    与基于范围的分区相比，这确保了数据均匀分布，但这是以高效的范围查询为代价的。


    ## 块


    数据以块的形式在分片之间移动。分片键范围被进一步划分为子范围，这些子范围也被称为块。参见图 7-19。


    ![A332296_1_En_7_Fig19_HTML.jpg](img/A332296_1_En_7_Fig19_HTML.jpg)

    **图 7-19. 块**


    对于一个分片集群，`64MB` 是默认的块大小。在大多数情况下，这是一个适合进行块拆分和迁移的大小。


    让我们通过一个例子来讨论分片和块的执行过程。假设你有一个博客文章集合，它基于 `date` 字段进行分片。这意味着集合将根据 `date` 字段的值进行拆分。我们进一步假设你有三个分片。在此场景中，数据可能在分片上分布如下：


    *   分片 #1：时间开始至 2009 年 7 月

    *   分片 #2：2009 年 8 月至 2009 年 12 月

    *   分片 #3：2010 年 1 月至时间结束


    为了检索从 2010 年 1 月 1 日到今天的文档，查询被发送到 `mongos`。


    在此场景中：

    1.  客户端查询 `mongos`。

    2.  `mongos` 知道哪些分片拥有数据，因此它将查询发送给分片 #3。

    3.  分片 #3 执行查询并将结果返回给 `mongos`。

    4.  `mongos` 合并从各个分片（在此情况下仅为分片 #3）接收的数据，并将最终结果返回给客户端。


    应用程序不需要感知分片。它可以像查询普通的 `mongod` 一样查询 `mongos`。


    让我们考虑另一个场景，你插入一个新文档。新文档具有今天的日期。事件序列如下：

    1.  文档被发送到 `mongos`。

    2.  `mongos` 检查日期，并基于此将文档发送给分片 #3。

    3.  分片 #3 插入文档。


    从客户端的角度来看，这再次与单服务器设置相同。


    ## 配置服务器在上述场景中的作用


    考虑一个场景，你开始收到数百万个日期为 2009 年 9 月的文档的插入请求。在这种情况下，分片 #2 开始变得过载。


    一旦配置服务器意识到分片 #2 变得太大，它就会介入。它将拆分该分片上的数据并开始将其迁移到其他分片。迁移完成后，它将更新后的状态发送给 `mongos`。因此现在，分片
    #2 拥有 2009 年 8 月到 2009 年 9 月 18 日的数据，而分片 #3 包含 2009 年 9 月 19 日到时间结束的数据。


    当向集群添加新分片时，由配置服务器负责决定如何处理它。数据可能需要立即迁移到新分片，或者新分片可能需要保留一段时间。总之，配置服务器是大脑。每当有任何数据被移动时，配置服务器都会让
    `mongos` 知道最终配置，以便 `mongos` 可以继续进行正确的路由。


    ## 7.5.3 数据平衡过程


    接下来你将了解如何保持集群的平衡（即 MongoDB 如何确保所有分片负载均等）。


    新数据的添加或现有数据的修改，或服务器的添加或移除，都可能导致数据分布不平衡，这意味着要么一个分片因块过多而过载，其他分片的块数量较少，要么可能导致某个块的大小显著大于其他块。


    MongoDB 通过以下后台进程确保平衡：

    *   块拆分

    *   平衡器


    ### 7.5.3.1 块拆分


    块拆分是确保块保持指定大小的进程之一。如你所见，选择了一个分片键并用于标识文档将如何跨分片分布。文档进一步被分组为 `64MB` 的块（默认且可配置），并根据其托管的范围存储在分片中。


    如果由于插入或更新操作导致块的大小发生变化并超过默认块大小，则该块将被 `mongos` 拆分为两个更小的块。参见图 7-20。


    ![A332296_1_En_7_Fig20_HTML.jpg](img/A332296_1_En_7_Fig20_HTML.jpg)

    **图 7-20. 块拆分**


    此过程使分片内的块保持指定大小或小于该大小（即它确保块为配置的大小）。


    插入和更新操作会触发拆分。拆分操作会导致配置服务器中的数据被修改，因为元数据被更新了。虽然拆分不会导致数据迁移，但此操作可能导致集群不平衡，其中一个分片拥有比另一个分片更多的块。

    '
- fmt: '## 7.5.3.2 Balancer


    Balancer 是后台进程，用于确保所有分片负载均衡或处于平衡状态。此进程管理块（chunk）的迁移。


    块的拆分可能导致不平衡。文档的增加或删除也可能导致集群不平衡。在集群不平衡时，会使用平衡器（balancer）来均匀分布数据。


    当一个分片比其他分片拥有更多块时，MongoDB 会自动在各分片间平衡这些块。此过程对应用程序和用户是透明的。


    集群中的任何 `mongos` 都可以启动平衡器进程。它们通过获取配置服务器（config server）上配置数据库（config database）的锁来实现，因为平衡器涉及将块从一个分片迁移到另一个分片，这可能导致元数据变更，进而需要更改配置服务器上的数据库。平衡器进程对数据库性能可能产生巨大影响，因此它可以配置为仅在达到迁移阈值（migration
    threshold）时才开始迁移。迁移阈值是分片上最大块数与最小块数之差。阈值如表 7-4 所示。


    表 7-4：迁移阈值


    | 块数量 | 迁移阈值 |

    | :--- | :--- |

    | < 20 | 2 |

    | 21-80 | 4 |

    | >80 | 8 |


    或者，也可以将其安排在不会影响生产流量的时间段内运行。


    平衡器一次迁移一个块（参见图 7-21），并遵循以下步骤：


    ![A332296_1_En_7_Fig21_HTML.jpg](A332296_1_En_7_Fig21_HTML.jpg)


    图 7-21：块迁移


    1.  将 `moveChunk` 命令发送到源分片。

    2.  源分片启动一个内部的 `moveChunk` 命令，在该命令中创建块内文档的副本并将其排入队列。在此期间，由于配置数据库尚未更改，且源分片仍负责处理该块上的任何读/写请求，因此
    `mongos` 将针对该块的任何操作都路由到源分片。

    3.  目标分片开始从源接收数据的副本。

    4.  一旦目标分片接收到块中的所有文档，就会启动同步过程，以确保迁移期间发生的所有数据变更都在目标分片上更新。

    5.  同步完成后，下一步是在配置数据库中更新元数据，记录块的新位置。此活动由目标分片完成，它连接到配置数据库并执行必要的更新。

    6.  成功完成上述所有步骤后，源分片上维护的文档副本将被删除。


    如果在此期间平衡器需要从源分片进行额外的块迁移，它可以开始新的迁移，而无需等待当前迁移的删除步骤完成。


    如果在迁移过程中出现任何错误，平衡器会中止该过程，将块留在原始分片上。成功完成后，MongoDB 会从原始分片中删除块数据。


    分片的增加或删除也可能导致集群不平衡。添加新分片时，会立即开始向该分片迁移数据。但是，集群达到平衡需要时间。


    当移除一个分片时，平衡器确保数据被迁移到其他分片，并更新元数据信息。完成这两项活动后，该分片才会被安全移除。


    ## 7.5.4 操作


    接下来，我们将了解如何在分片集群上执行读和写操作。如前所述，配置服务器维护集群元数据。这些数据存储在配置数据库（config database）中。`mongos`
    使用配置数据库的这些数据来为应用程序的读和写请求提供服务。


    `mongos` 实例会缓存这些数据，然后用于将写和读操作路由到各个分片。这样配置服务器就不会负担过重。


    `mongos` 仅在以下情况下从配置服务器读取：

    *   `mongos` 首次启动时

    *   现有的 `mongos` 重启后

    *   块迁移后，`mongos` 需要用新的集群元数据更新其缓存的元数据时


    每当发出任何操作时，`mongos` 需要做的第一步是确定哪些分片将服务于该请求。由于分片键（shard key）用于在分片集群中分布数据，如果操作使用了分片键字段，那么就可以据此定位到特定的分片。


    假设分片键是 `employeeid`，可能会发生以下情况：

    *   如果 `find` 查询包含 `employeeid` 字段，那么为了满足查询，`mongos` 将只定位到特定的分片。

    *   如果单个更新操作使用 `employeeid` 来更新文档，请求将被路由到保存该员工数据的分片。


    但是，如果操作没有使用分片键，那么请求将被广播到所有分片。通常，多更新或删除操作会针对整个集群。


    在查询数据时，可能存在一些场景，除了识别分片并从它们获取数据外，`mongos` 可能需要在将最终输出发送给客户端之前，对从各个分片返回的数据进行处理。


    假设一个应用程序发出了一个带有 `sort()` 的 `find()` 请求。在这种情况下，`mongos` 会将 `$orderby` 选项传递给各个分片。分片将从它们的数据集中获取数据，并按排序顺序发送结果。一旦
    `mongos` 收到所有分片的排序数据，它会对整个数据执行增量归并排序（incremental merge sort），然后将最终输出返回给客户端。


    与 `sort` 类似的是聚合函数，例如 `limit()`、`skip()` 等，这些函数要求 `mongos` 在从分片接收数据之后、向客户端返回最终结果集之前执行操作。


    `mongos` 消耗的系统资源极少，并且没有持久状态。因此，如果应用程序的需求是简单的 `find()` 查询，并且这些查询可以完全由分片满足，无需在 `mongos`
    层面进行操作，那么你可以将 `mongos` 运行在与你的应用程序服务器相同的系统上。


    ## 7.5.5 实现分片


    在本节中，你将学习在 Windows 平台的一台机器上配置分片。


    我们将通过仅使用两个分片来保持示例简单。在此配置中，你将使用表 7-5 中列出的服务。


    表 7-5：分片集群配置


    | 组件 | 类型 | 端口 | 数据文件路径 |

    | :--- | :--- | :--- | :--- |

    | 分片控制器 | Mongos | 27021 | - |

    | 配置服务器 | Mongod | 27022 | C:\db1\config\data |

    | 分片0 | Mongod | 27023 | C:\db1\shard1\data |

    | 分片1 | Mongod | 27024 | C:\db1\shard2\data |


    你将重点关注以下内容：

    *   设置一个分片集群。

    *   创建一个数据库和集合，并在该集合上启用分片。

    *   使用导入命令将数据加载到分片集合中。

    *   在分片间分发数据。

    *   向集群中添加和移除分片，并检查数据如何自动重新分布。'
  raw: '#### 7.5.3.2 Balancer


    Balancer is the background process that is used to ensure that all of the shards
    are equally loaded or are in a balanced state. This process manages chunk migrations.


    Splitting of the chunk can cause imbalance. The addition or removal of documents
    can also lead to a cluster imbalance. In a cluster imbalance, balancer is used,
    which is the process of distributing data evenly.


    When you have a shard with more chunks as compared to other shards, then the chunks
    balancing is done automatically by MongoDB across the shards. This process is
    transparent to the application and to you.


    Any of the mongos within the cluster can initiate the balancer process. They do
    so by acquiring a lock on the config database of the config server, as balancer
    involves migration of chunks from one shard to another, which can lead to a change
    in the metadata, which will lead to change in the config server database. The
    balancer process can have huge impact on the database performance, so it can either


    Be configured to start the migration only when the migration threshold has reached.
    The migration threshold is the difference in the number of maximum and minimum
    chunks on the shards. Threshold is shown in Table [7-4](#A332296_1_En_7_Chapter.html#Tab4).


    Table 7-4.


    Migration Threshold


    | Number of Chunks | Migration Threshold |

    | --- | --- |

    | < 20 | 2 |

    | 21-80 | 4 |

    | >80 | 8 |


      Or it can be scheduled to run in a time period that will not impact the production
    traffic.  


    The balancer migrates one chunk at a time (see Figure [7-21](#A332296_1_En_7_Chapter.html#Fig21))
    and follows these steps:


    ![A332296_1_En_7_Fig21_HTML.jpg](A332296_1_En_7_Fig21_HTML.jpg)


    Figure 7-21.


    Chunk migration The `moveChunk` command is sent to the source shard.   An internal
    `moveChunk` command is started on the source where it creates the copy of the
    documents within the chunk and queues it. In the meantime, any operations for
    that chunk are routed to the source by the mongos because the config database
    is not yet changed and the source will be responsible for serving any read/write
    request on that chunk.   The destination shard starts receiving the copy of the
    data from the source.   Once all of the documents in the chunks have been received
    by the destination shard, the synchronization process is initiated to ensure that
    all changes that have happened to the data while migration are updated at the
    destination shard.   Once the synchronization is completed, the next step is to
    update the metadata with the chunk’s new location in the config database. This
    activity is done by the destination shard that connects to the config database
    and carries out the necessary updates.   Post successful completion of all the
    above, the document copy that is maintained at the source shard is deleted.  


    If in the meanwhile the balancer needs additional chunk migration from the source
    shard, it can start with the new migration without even waiting for the deletion
    step to finish for the current migration.


    In case of any error during the migration process, the process is aborted by the
    balancer, leaving the chunks on the original shard. On successful completion of
    the process, the chunk data is removed from the original shard by MongoDB.


    Addition or removal of shards can also lead to cluster imbalance. When a new shard
    is added, data migration to the shard is started immediately. However, it takes
    time for the cluster to be balanced.


    When a shard is removed, the balancer ensures that the data is migrated to the
    other shards and the metadata information is updated. Post completion of the two
    activities, the shard is removed safely.


    ### 7.5.4 Operations


    You will next look at how the read and write operations are performed on the sharded
    cluster. As mentioned, the config servers maintain the cluster metadata. This
    data is stored in the config database. This data of the config database is used
    by the mongos to service the application read and write requests.


    The data is cached by the mongos instances, which is then used for routing write
    and read operations to the shards. This way the config servers are not overburdened.


    The mongos will only read from the config servers in the following scenarios:


    *   The mongos has started for first time or

    *   An existing mongos has restarted or

    *   After chunk migration when the mongos needs to update its cached metadata
    with the new cluster metadata.


    Whenever any operation is issued, the first step that the mongos need to do is
    to identify the shards that will be serving the request. Since the shard key is
    used to distribute data across the sharded cluster, if the operation is using
    the shard key field, then based on that specific shards can be targeted.


    If the shard key is `employeeid`, the following things can happen:


    If the `find` query contains the `employeeid` field, then to satiate the query,
    only specific shards will be targeted by the mongos.   If a single update operation
    uses `employeeid` for updating the document, the request will be routed to the
    shard holding that employee data.  


    However, if the operation is not using the shard key, then the request is broadcast
    to all the shards. Generally a multi-update or remove operation is targeted across
    the cluster.


    While querying the data, there might be scenarios where in addition to identifying
    the shards and getting the data from them, the mongos might need to work on the
    data returned from various shards before sending the final output to the client.


    Say an application has issued a `find()` request with `sort()`. In this scenario,
    the mongos will pass the `$orderby` option to the shards. The shards will fetch
    the data from their data set and will send the result in an ordered manner. Once
    the mongos has all the shard’s sorted data, it will perform an incremental merge
    sort on the entire data and then return the final output to the client.


    Similar to sort are the aggregation functions such as `limit()`, `skip(),` etc.,
    which require mongos to perform operations post receiving the data from the shards
    and before returning the final result set to the client.


    The mongos consumes minimal system resources and has no persistent state. So if
    the application requirement is a simple `find ()` queries that can be solely met
    by the shards and needs no manipulation at the mongos level, you can run the mongos
    on the same system where your application servers are running.


    ### 7.5.5 Implementing Sharding


    In this section, you will learn to configure sharding in one machine on a Windows
    platform.


    You will keep the example simple by using only two shards. In this configuration,
    you will be using the services listed in Table 7-5.


    Table 7-5.


    Sharding Cluster Configuration


    | Component | Type | Port | Datafile path |

    | --- | --- | --- | --- |

    | Shard Controller | Mongos | 27021 | - |

    | Config Server | Mongod | 27022 | C:\db1\config\data |

    | Shard0 | Mongod | 27023 | C:\db1\shard1\data |

    | Shard1 | Mongod | 27024 | C:\db1\shard2\data |


    You will be focusing on the following:


    Setting up a sharded cluster.   Creating a database and collection, and enable
    sharding on the collection.   Using the import command to load data in the sharded
    collection.   Distributed data amongst the shards.   Adding and removing shards
    from the cluster and checking how data is distributed automatically.'
  trans: '## 7.5.3.2 平衡器


    平衡器是一个后台进程，用于确保所有分片负载均衡或处于平衡状态。此进程管理块（chunk）的迁移。


    块的拆分可能导致不平衡。文档的增加或删除也可能导致集群不平衡。在集群不平衡时，会使用平衡器（balancer）来均匀分布数据。


    当一个分片比其他分片拥有更多块时，MongoDB 会自动在各分片间平衡这些块。此过程对应用程序和用户是透明的。


    集群中的任何 `mongos` 都可以启动平衡器进程。它们通过获取配置服务器（config server）上配置数据库（config database）的锁来实现，因为平衡器涉及将块从一个分片迁移到另一个分片，这可能导致元数据变更，进而需要更改配置服务器上的数据库。平衡器进程对数据库性能可能产生巨大影响，因此它可以配置为仅在达到迁移阈值（migration
    threshold）时才开始迁移。迁移阈值是分片上最大块数与最小块数之差。阈值如表 7-4 所示。


    表 7-4：迁移阈值


    | 块数量 | 迁移阈值 |

    | :--- | :--- |

    | < 20 | 2 |

    | 21-80 | 4 |

    | >80 | 8 |


    或者，也可以将其安排在不会影响生产流量的时间段内运行。


    平衡器一次迁移一个块（参见图 7-21），并遵循以下步骤：


    ![图 7-21：块迁移](img/A332296_1_En_7_Fig21_HTML.jpg)


    1.  将 `moveChunk` 命令发送到源分片。

    2.  源分片启动一个内部的 `moveChunk` 命令，在该命令中创建块内文档的副本并将其排入队列。在此期间，由于配置数据库尚未更改，且源分片仍负责处理该块上的任何读/写请求，因此
    `mongos` 将针对该块的任何操作都路由到源分片。

    3.  目标分片开始从源接收数据的副本。

    4.  一旦目标分片接收到块中的所有文档，就会启动同步过程，以确保迁移期间发生的所有数据变更都在目标分片上更新。

    5.  同步完成后，下一步是在配置数据库中更新元数据，记录块的新位置。此活动由目标分片完成，它连接到配置数据库并执行必要的更新。

    6.  成功完成上述所有步骤后，源分片上维护的文档副本将被删除。


    如果在此期间平衡器需要从源分片进行额外的块迁移，它可以开始新的迁移，而无需等待当前迁移的删除步骤完成。


    如果在迁移过程中出现任何错误，平衡器会中止该过程，将块留在原始分片上。成功完成后，MongoDB 会从原始分片中删除块数据。


    分片的增加或删除也可能导致集群不平衡。添加新分片时，会立即开始向该分片迁移数据。但是，集群达到平衡需要时间。


    当移除一个分片时，平衡器确保数据被迁移到其他分片，并更新元数据信息。完成这两项活动后，该分片才会被安全移除。


    ## 7.5.4 操作


    接下来，我们将了解如何在分片集群上执行读和写操作。如前所述，配置服务器维护集群元数据。这些数据存储在配置数据库（config database）中。`mongos`
    使用配置数据库的这些数据来为应用程序的读和写请求提供服务。


    `mongos` 实例会缓存这些数据，然后用于将写和读操作路由到各个分片。这样配置服务器就不会负担过重。


    `mongos` 仅在以下情况下从配置服务器读取：

    *   `mongos` 首次启动时

    *   现有的 `mongos` 重启后

    *   块迁移后，`mongos` 需要用新的集群元数据更新其缓存的元数据时


    每当发出任何操作时，`mongos` 需要做的第一步是确定哪些分片将服务于该请求。由于分片键（shard key）用于在分片集群中分布数据，如果操作使用了分片键字段，那么就可以据此定位到特定的分片。


    假设分片键是 `employeeid`，可能会发生以下情况：

    *   如果 `find` 查询包含 `employeeid` 字段，那么为了满足查询，`mongos` 将只定位到特定的分片。

    *   如果单个更新操作使用 `employeeid` 来更新文档，请求将被路由到保存该员工数据的分片。


    但是，如果操作没有使用分片键，那么请求将被广播到所有分片。通常，多更新或删除操作会针对整个集群。


    在查询数据时，可能存在一些场景，除了识别分片并从它们获取数据外，`mongos` 可能需要在将最终输出发送给客户端之前，对从各个分片返回的数据进行处理。


    假设一个应用程序发出了一个带有 `sort()` 的 `find()` 请求。在这种情况下，`mongos` 会将 `$orderby` 选项传递给各个分片。分片将从它们的数据集中获取数据，并按排序顺序发送结果。一旦
    `mongos` 收到所有分片的排序数据，它会对整个数据执行增量归并排序（incremental merge sort），然后将最终输出返回给客户端。


    与 `sort` 类似的是聚合函数，例如 `limit()`、`skip()` 等，这些函数要求 `mongos` 在从分片接收数据之后、向客户端返回最终结果集之前执行操作。


    `mongos` 消耗的系统资源极少，并且没有持久状态。因此，如果应用程序的需求是简单的 `find()` 查询，并且这些查询可以完全由分片满足，无需在 `mongos`
    层面进行操作，那么你可以将 `mongos` 运行在与你的应用程序服务器相同的系统上。


    ## 7.5.5 实现分片


    在本节中，你将学习在 Windows 平台的一台机器上配置分片。


    我们将通过仅使用两个分片来保持示例简单。在此配置中，你将使用表 7-5 中列出的服务。


    表 7-5：分片集群配置


    | 组件 | 类型 | 端口 | 数据文件路径 |

    | :--- | :--- | :--- | :--- |

    | 分片控制器 | Mongos | 27021 | - |

    | 配置服务器 | Mongod | 27022 | C:\db1\config\data |

    | 分片 0 | Mongod | 27023 | C:\db1\shard1\data |

    | 分片 1 | Mongod | 27024 | C:\db1\shard2\data |


    你将重点关注以下内容：

    *   设置一个分片集群。

    *   创建一个数据库和集合，并在该集合上启用分片。

    *   使用导入命令将数据加载到分片集合中。

    *   在分片间分发数据。

    *   向集群中添加和移除分片，并检查数据如何自动重新分布。'
- fmt: '## 7.5.5.1 设置分片集群


    要设置集群，第一步是设置配置服务器。在新的终端窗口中输入以下代码，为配置服务器创建 `data` 目录并启动 `mongod`：


    ```

    C:\> mkdir C:\db1\config\data


    C:\>CD C:\practicalmongodb\bin


    C:\ practicalmongodb\bin>mongod --port 27022 --dbpath C:\db1\config\data --configsvr


    2015-07-13T23:02:41.982-0700 I JOURNAL [journal writer] Journal writer thread
    started


    2015-07-13T23:02:41.984-0700 I CONTROL [initandlisten] MongoDB starting : pid=3084
    port=27022 dbpath=C:\db1\config\data master=1 64-bit host=ANOC9


    ......................................


    2015-07-13T23:02:42.066-0700 I REPL [initandlisten] ******


    2015-07-13T03:02:42.067-0700 I NETWORK [initandlisten] waiting for connections
    on port 27022

    ```


    接下来，启动 `mongos`。在新的终端窗口中输入：


    ```

    C:\>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongos --configdb localhost:27022 --port 27021 --chunkSize
    1


    2015-07-13T23:06:07.246-0700 W SHARDING running with 1 config server should be
    done only for testing purposes and is not recommended for production


    ...............................................................


    2015-07-13T23:09:07.464-0700 I SHARDING [Balancer] distributed lock ''balancer/
    ANOC9:27021:1429783567:41'' unlocked

    ```


    现在，分片控制器（即 `mongos`）已启动并运行。


    如果切换到启动了配置服务器的窗口，你会发现分片服务器已注册到配置服务器。


    在此示例中，你使用了 1MB 的块大小。请注意，在真实场景中这并不理想，因为它小于 4MB（文档的最大大小）。然而，这仅用于演示目的，因为它无需加载大量数据就能创建必要数量的块。除非另有指定，`chunkSize`
    默认为 128MB。


    接下来，启动分片服务器 Shard0 和 Shard1。


    打开一个新的终端窗口。为第一个分片创建 `data` 目录并启动 `mongod`：


    ```

    C:\>mkdir C:\db1\shard0\data


    C:\>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongod --port 27023 --dbpath c:\db1\shard0\data –shardsvr


    2015-07-13T23:14:58.076-0700 I CONTROL [initandlisten] MongoDB starting : pid=1996
    port=27023 dbpath=c:\db1\shard0\data 64-bit host=ANOC9


    ..................................................................


    2015-07-13T23:14:58.158-0700 I NETWORK [initandlisten] waiting for connections
    on port 27023

    ```


    打开一个新的终端窗口。为第二个分片创建 `data` 目录并启动 `mongod`：


    ```

    C:\>mkdir c:\db1\shard1\data


    C:\>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongod --port 27024 --dbpath C:\db1\shard1\data --shardsvr


    2015-07-13T23:17:01.704-0700 I CONTROL [initandlisten] MongoDB starting : pid=3672
    port=27024 dbpath=C:\db1\shard1\data 64-bit host=ANOC9


    2015-07-13T23:17:01.704-0700 I NETWORK [initandlisten] waiting for connections
    on port 27024

    ```


    到以上步骤结束时，所有与设置相关的服务器都已启动并运行。下一步是将分片信息添加到分片控制器。


    尽管 `mongos` 实际上不是一个完整的实例，但它对应用程序而言表现为一个完整的 MongoDB 实例。可以使用 `mongo` shell 连接到 `mongos`
    来执行任何操作。


    打开 `mongos` 的 `mongo` 控制台：


    ```

    C:\>cd c:\practicalmongodb\bin


    c:\ practicalmongodb\bin>mongo localhost:27021


    MongoDB shell version: 3.0.4


    connecting to: localhost:27021/test


    mongos>

    ```


    切换到 `admin` 数据库：


    ```

    mongos> use admin


    switched to db admin


    mongos>

    ```


    通过运行以下命令添加分片信息：


    ```

    mongos> db.runCommand({addshard:"localhost:27023",allowLocal:true})


    { "shardAdded" : "shard0000", "ok" : 1 }


    mongos> db.runCommand({addshard:"localhost:27024",allowLocal:true})


    { "shardAdded" : "shard0001", "ok" : 1 }


    mongos>

    ```


    这会激活两个分片服务器。


    下一个命令检查分片：


    ```

    mongos> db.runCommand({listshards:1})


    {


    "shards" : [


    {


    "_id" : "shard0000",


    "host" : "localhost:27023"


    }, {


    "_id" : "shard0001",


    "host" : "localhost:27024"


    }


    ], "ok" : 1}

    ```


    ## 7.5.5.2 创建数据库和分片集合


    为了继续此示例，你将创建一个名为 `testdb` 的数据库和一个名为 `testcollection` 的集合，并将基于键 `testkey` 对其进行分片。


    连接到 `mongos` 控制台并执行以下命令以获取数据库：


    ```

    mongos> testdb=db.getSisterDB("testdb")


    testdb

    ```


    接下来，为 `testdb` 在数据库级别启用分片：


    ```

    mongos> db.runCommand({enableSharding system: "testdb"})


    { "ok" : 1 }


    mongos>

    ```


    接下来，指定需要分片的集合以及该集合将基于哪个键进行分片：


    ```

    mongos> db.runCommand({shardcollection: "testdb.testcollection", key: {testkey:1}})


    { "collectionsharded" : "testdb.testcollection", "ok" : 1 }


    mongos>

    ```


    完成以上步骤后，你现在拥有一个所有组件都已启动并运行的分片集群。你已经创建了一个数据库并启用了集合分片。


    接下来，将数据导入集合，以便检查分片上的数据分布。


    你将使用 `import` 命令将数据加载到 `testcollection` 中。连接到一个新的终端窗口并执行：


    ```

    C:\>cd C:\practicalmongodb\bin


    C:\practicalmongodb\bin>mongoimport --host ANOC9 --port 27021 --db testdb --collection
    testcollection --type csv --file c:\mongoimport.csv –-headerline


    2015-07-13T23:17:39.101-0700 connected to: ANOC9:27021


    2015-07-13T23:17:42.298-0700 [##############..........] testdb.testcollection
    1.1 MB/1.9 MB (59.6%)


    2015-07-13T23:17:44.781-0700 imported 100000 documents

    ```


    `mongoimport.csv` 文件包含两个字段。第一个是 `testkey`，它是一个随机生成的数字。第二个字段是文本字段；它用于确保文档占据足够数量的块，从而使使用分片机制变得可行。


    这会在集合中插入 100,000 个对象。


    为了验证记录是否已插入，连接到 `mongos` 的 `mongo` 控制台并发出以下命令：


    ```

    C:\Windows\system32>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongo localhost:27021


    MongoDB shell version: 3.0.4


    connecting to: localhost:27021/test


    mongos> use testdb


    switched to db testdb


    mongos> db.testcollection.count()


    100000


    mongos>

    ```


    接下来，连接到两个分片（Shard0 和 Shard1）的控制台，并查看数据是如何分布的。打开一个新的终端窗口并连接到 Shard0 的控制台：


    ```

    C:\>cd C:\practicalmongodb\bin


    C:\ practicalmongodb\bin>mongo localhost:27023


    MongoDB shell version: 3.0.4


    connecting to: localhost:27023/test

    ```


    切换到 `testdb` 并发出 `count()` 命令以检查该分片上的文档数量：


    ```

    > use testdb


    switched to db testdb


    > db.testcollection.count()


    57998

    ```


    接下来，打开一个新的终端窗口，连接到 Shard1 的控制台，并按照上述步骤操作（即切换到 `testdb` 并检查 `testcollection` 集合的计数）：


    ```

    C:\>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongo localhost:27024


    MongoDB shell version: 3.0.4


    connecting to: localhost:27024/test


    > use testdb


    switched to db testdb


    > db.testcollection.count()


    42002


    >

    ```


    当你运行上述命令一段时间后，可能会看到每个分片上的文档数量存在差异。当文档加载时，所有块都由 `mongos` 放置在一个分片上。随后，通过将块均匀地分布在所有分片上来重新平衡分片集。'
