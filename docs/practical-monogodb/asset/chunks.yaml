  trans: '

    #### 7.5.5.3 添加新分片


    你已经设置好了一个分片集群，也已经对一个集合进行了分片，并查看了数据是如何在分片间分布的。接下来，你将向集群添加一个新分片，以便负载能更分散一些。


    你将重复上述步骤。首先，在一个新的终端窗口中为新分片创建一个数据目录：


    ```

    c:\>mkdir c:\db1\shard2\data

    ```


    然后，在端口 27025 上启动 `mongod`：


    ```

    c:\>cd c:\practicalmongodb\bin

    c:\ practicalmongodb\bin>mongod --port 27025 --dbpath C:\db1\shard2\data --shardsvr

    ```


    ```

    2015-07-13T23:25:49.103-0700 I CONTROL [initandlisten] MongoDB starting : pid=3744
    port=27025 dbpath=C:\db1\shard2\data 64-bit host=ANOC9

    ................................

    2015-07-13T23:25:49.183-0700 I NETWORK [initandlisten] waiting for connections
    on port 27025

    ```


    接下来，新的分片服务器将被添加到分片集群中。为了配置它，在一个新的终端窗口中打开 `mongos` 的 mongo 控制台：


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo localhost:27021

    MongoDB shell version: 3.0.4

    connecting to: localhost:27021/test

    mongos>

    ```


    切换到 `admin` 数据库并运行 `addshard` 命令。此命令将分片服务器添加到分片集群。


    ```

    mongos> use admin

    switched to db admin

    mongos> db.runCommand({addshard: "localhost:27025", allowlocal: true})

    { "shardAdded" : "shard0002", "ok" : 1 }

    mongos>

    ```


    为了验证添加是否成功，运行 `listshards` 命令：


    ```

    mongos> db.runCommand({listshards:1})

    {

    "shards" : [

    {

    "_id" : "shard0000",

    "host" : "localhost:27023"

    },

    {

    "_id" : "shard0001",

    "host" : "localhost:27024"

    },

    {

    "_id" : "shard0002",

    "host" : "localhost:27025"

    }

    ],

    "ok" : 1

    }

    ```


    接下来，检查 `testcollection` 数据是如何分布的。在新的终端窗口中连接到新分片的控制台：


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo localhost:27025

    MongoDB shell version: 3.0.4

    connecting to: localhost:27025/test

    ```


    切换到 `testdb` 并检查该分片上列出的集合：


    ```

    > use testdb

    switched to db testdb

    > show collections

    system.indexes

    testcollection

    ```


    执行三次 `testcollection.count` 命令：


    ```

    > db.testcollection.count()

    6928

    > db.testcollection.count()

    12928

    > db.testcollection.count()

    16928

    ```


    有趣的是，集合中的项目数量在缓慢上升。`mongos` 正在重新平衡集群。


    随着时间的推移，数据块将从分片服务器 Shard0 和 Shard1 迁移到新添加的分片服务器 Shard2，以便数据均匀分布在所有服务器上。此过程完成后，配置服务器元数据将被更新。这是一个自动过程，即使
    `testcollection` 没有新增数据也会发生。这是在确定数据块大小时需要考虑的重要因素之一。


    如果 `chunkSize` 的值非常大，最终会导致数据分布不太均匀。当 `chunkSize` 较小时，数据分布会更均匀。


    #### 7.5.5.4 移除分片


    在下面的例子中，你将看到如何移除一个分片服务器。在此示例中，你将移除你在上面示例中添加的服务器。


    为了启动该过程，你需要登录到 `mongos` 控制台，切换到 `admin` 数据库，并执行以下命令以从分片集群中移除该分片：


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo localhost:27021

    MongoDB shell version: 3.0.4

    connecting to: localhost:27021/test

    mongos> use admin

    switched to db admin

    mongos> db.runCommand({removeShard: "localhost:27025"})

    {

    "msg" : "draining started successfully",

    "state" : "started",

    "shard" : "shard0002",

    "ok" : 1

    }

    mongos>

    ```


    如你所见，`removeShard` 命令返回了一条消息。其中一个消息字段是 `state`，它指示了进程状态。消息还表明排空过程已开始，这由 `msg`
    字段指示。


    你可以重新发出 `removeShard` 命令来检查进度：


    ```

    mongos> db.runCommand({removeShard: "localhost:27025"})

    {

    "msg" : "draining ongoing",

    "state" : "ongoing",

    "remaining" : {

    "chunks" : NumberLong(2),

    "dbs" : NumberLong(0)

    },

    "ok" : 1

    }

    mongos>

    ```


    响应告诉你仍需从该服务器排空的数据块和数据库的数量。如果你重新发出命令且进程已终止，命令的输出将显示相应状态。


    ```

    mongos> db.runCommand({removeShard: "localhost:27025"})

    {

    "msg" : "removeshard completed successfully",

    "state" : "completed",

    "shard" : "shard0002",

    "ok" : 1

    }

    mongos>

    ```


    你可以使用 `listshards` 来验证 `removeShard` 是否成功。


    如你所见，数据已成功迁移到其他分片，因此你可以删除存储文件并终止 Shard2 的 `mongod` 进程。


    这种无需停机即可修改分片集群的能力是 MongoDB 的关键组件之一，使其能够支持高可用、高可扩展性的大容量数据存储。


    #### 7.5.5.5 列出分片集群状态


    `printShardingStatus()` 命令提供了大量关于分片系统内部的洞察。


    ```

    mongos> db.printShardingStatus()

    --- Sharding Status ---

    sharding version: {

    "_id" : 1,

    "version" : 3,

    "minCompatibleVersion" : 5,

    "currentVersion" : 6,

    "clusterId" : ObjectId("52fb7a8647e47c5884749a1a")

    }

    shards:

    { "_id" : "shard0000", "host" : "localhost:27023" }

    { "_id" : "shard0001", "host" : "localhost:27024" }

    balancer:

    Currently enabled: yes

    Currently running: no

    Failed balancer rounds in last 5 attempts: 0

    Migration Results for the last 24 hours:

    17 : Success

    databases:

    { "_id" : "admin", "partitioned" : false, "primary" : "config" }

    { "_id" : "testdb", "partitioned" : true, "primary" : "shard0000" }

    ...............

    ```


    输出列出了以下内容：

    *   分片集群的所有分片服务器

    *   每个分片数据库/集合的配置

    *   分片数据集的所有数据块


    从上述命令中可以获得的重要信息是与每个数据块关联的分片键范围。这还显示了特定数据块存储在何处（在哪台分片服务器上）。该输出可用于分析分片服务器的键和数据块分布情况。


    ### 7.5.6 控制集合分布（基于标签的分片）


    在上一节中，你了解了数据分布是如何发生的。在本节中，你将学习基于标签的分片。此功能在 2.2.0 版本中引入。


    标签赋予了操作员控制哪些集合进入哪个分片的能力。


    为了理解基于标签的分片，让我们设置一个分片集群。你将使用上面创建的分片集群。对于此示例，你需要三个分片，因此你将再次向集群添加 Shard2。

    '
- fmt: '### 7.5.6.1 Prerequisite


    You will start the cluster first. Just to reiterate, follow these steps.


    Start the config server. Enter the following command in a new terminal window
    (if it’s not already running):

    ```

    C:\> mkdir C:\db1\config\data

    C:\>cd c:\practicalmongodb\bin

    C:\practicalmongodb\bin>mongod --port 27022 --dbpath C:\db\config\data --configsvr

    ```


    Start the mongos. Enter the following command in a new terminal window (if it’s
    not already running):

    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongos --configdb localhost:27022 --port 27021

    ```


    You will start the shard servers next.


    Start Shard0. Enter the following command in a new terminal window (if it’s not
    already running):

    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongod --port 27023 --dbpath c:\db1\shard0\data --shardsvr

    ```


    Start Shard1. Enter the following command in a new terminal window (if it’s not
    already running):

    ```

    C:\>cd c:\practicalmongodb\bin

    C:\practicalmongodb\bin>mongod --port 27024 --dbpath c:\db1\shard1\data –shardsvr

    ```


    Start Shard2. Enter the following command in a new terminal window (if it’s not
    already running):

    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongod --port 27025 --dbpath c:\db1\shard2\data –shardsvr

    ```


    Since you have removed Shard2 from the sharded cluster in the earlier example,
    you must add Shard2 to the sharded cluster because for this example you need three
    shards.


    In order to do so, you need to connect to the mongos. Enter the following commands:

    ```

    C:\Windows\system32>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo localhost:27021

    MongoDB shell version: 3.0.4

    connecting to: localhost:27021/test

    mongos>

    ```


    Before the shard is added to the cluster you need to delete the `testdb` database:

    ```

    mongos> use testdb

    switched to db testdb

    mongos> db.dropDatabase()

    { "dropped" : "testdb", "ok" : 1 }

    mongos>

    ```


    Next, add the Shard2 shard using the following steps:

    ```

    mongos> use admin

    switched to db admin

    mongos> db.runCommand({addshard: "localhost:27025", allowlocal: true})

    { "shardAdded" : "shard0002", "ok" : 1 }

    mongos>

    ```


    If you try adding the removed shard without removing the `testdb` database, it
    will give the following error:

    ```

    mongos>db.runCommand({addshard: "localhost:27025", allowlocal: true})

    {

    "ok" : 0,

    "errmsg" : "can''t add shard localhost:27025 because a local database ''testdb''
    exists in another shard0000:localhost:27023"}

    ```


    In order to ensure that all the three shards are present in the cluster, run the
    following command:

    ```

    mongos> db.runCommand({listshards:1})

    {

    "shards" : [

    {

    "_id" : "shard0000",

    "host" : "localhost:27023"

    }, {

    "_id" : "shard0001",

    "host" : "localhost:27024"

    }, {

    "_id" : "shard0002",

    "host" : "localhost:27025"

    }

    ], "ok" : 1}

    ```


    ### 7.5.6.2 Tagging


    By the end of the above steps you have your sharded cluster with a config server,
    three shards, and a mongos up and running. Next, connect to the mongos at `30999`
    port and configdb at `27022` in a new terminal window:

    ```

    C:\ >cd c:\practicalmongodb\bin

    c:\ practicalmongodb\bin>mongos --port 30999 --configdb localhost:27022

    2015-07-13T23:24:39.674-0700 W SHARDING running with 1 config server should be
    done only for testing purposes and is not recommended for production

    ...................................

    2015-07-13T23:24:39.931-0700 I SHARDING [Balancer] distributed lock ''balancer
    /ANOC9:30999: 1429851279:41'' unlocked..

    ```


    Next, start a new terminal window, connect to the mongos, and enable sharding
    on the collections:

    ```

    C:\ >cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo localhost:27021

    MongoDB shell version: 3.0.4

    connecting to: localhost:27021/test

    mongos> show dbs

    admin (empty)

    config 0.016GB

    testdb 0.078GB

    mongos> conn=new Mongo("localhost:30999")

    connection to localhost:30999

    mongos> db=conn.getDB("movies")

    movies

    mongos> sh.enableSharding("movies")

    { "ok" : 1 }

    mongos> sh.shardCollection("movies.drama", {originality:1})

    { "collectionsharded" : "movies.hindi", "ok" : 1 }

    mongos> sh.shardCollection("movies.action", {distribution:1})

    { "collectionsharded" : "movies.action", "ok" : 1 }

    mongos> sh.shardCollection("movies.comedy", {collections:1})

    { "collectionsharded" : "movies.comedy", "ok" : 1 }

    mongos>

    ```


    The steps are as follows:

    1. Connect to the mongos console.

    2. View the running databases connected to the mongos instance running at port
    `30999`.

    3. Get reference to the database `movies`.

    4. Enable sharding of the database `movies`.

    5. Shard the collection `movies.drama` by shard key `originality`.

    6. Shard the collection `movies.action` by shard key `distribution`.

    7. Shard the collection `movies.comedy` by shard key `collections`.


    Next, insert some data in the collections, using the following sequence of commands:

    ```

    mongos>for(var i=0;i<100000;i++){db.drama.insert({originality:Math.random(), count:i,
    time:new Date()});}

    mongos>for(var i=0;i<100000;i++){db.action.insert({distribution:Math.random(),

    count:i, time:new Date()});}

    mongos>for(var i=0;i<100000;i++) {db.comedy.insert({collections:Math.random(),
    count:i, time:new Date()});}

    mongos>

    ```


    By the end of the above step you have three shards and three collections with
    sharding enabled on the collections. Next you will see how data is distributed
    across the shards.


    Switch to configdb:

    ```

    mongos> use config

    switched to db config

    mongos>

    ```


    You can use `chunks.find` to look at how the chunks are distributed:

    ```

    mongos> db.chunks.find({ns:"movies.drama"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    mongos> db.chunks.find({ns:"movies.action"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    mongos> db.chunks.find({ns:"movies.comedy"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    mongos>

    ```


    As you can see, the chunks are pretty evenly spread out amongst the shards. See
    Figure 7-22.


    ![A332296_1_En_7_Fig22_HTML.jpg](A332296_1_En_7_Fig22_HTML.jpg)


    Figure 7-22.'
