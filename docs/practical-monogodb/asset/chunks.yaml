    `{ "_id" : ObjectId("508d27069cc1ae293b36928d"),`


    `"tags" : [`


    `ObjectId("509d35349cc1ae293b369299"),`


    `ObjectId("509d35349cc1ae293b36929a"),`


    `ObjectId("509d35349cc1ae293b36929b"),`


    `ObjectId("509d35349cc1ae293b36929c")`


    `],....................................`


    `}`


    Although querying will be a bit complicated, you no longer need to worry about
    updating a tag everywhere.


    In summary, schema design in MongoDB is one of the very early decisions that you
    need to make, and it is dependent on the application requirements and queries.


    As you have seen, when you need to access the data together or you need to make
    atomic updates, embedding will have a positive impact. However, if you need more
    flexibility while querying or if you have a many-to-many relationships, using
    references is a good choice.


    Ultimately, the decision depends on the access patterns of your application, and
    there are no hard-and-fast rules in MongoDB. In the next section, you will learn
    about various data modelling considerations.'
  trans: '### 6.3.2.2 引用


    你已经了解到，在许多情况下，**嵌入式**方法能提供最佳性能，同时它还能保证数据一致性。然而，在某些情况下，更**规范化**的模型在 MongoDB 中表现更佳。


    采用多个集合并添加引用的一个原因是，它能在查询数据时提供更大的灵活性。让我们以上面提到的博客示例来理解这一点。


    你已经看到了如何使用嵌入式模式，这在需要在同一个页面上展示所有数据时（即显示博客文章及其所有相关评论的页面）效果非常好。


    现在假设你有一个需求：搜索特定用户发表的评论。使用嵌入式模式的查询如下所示：


    `db.posts.find({''comments.author'': ''author2''},{''comments'': 1})`


    那么，此查询的结果将是以下形式的文档：


    ```json

    {

    "_id" : ObjectId("509d27069cc1ae293b36928d"),

    "comments" : [ {

    "subject" : "Sample Comment 1 ",

    "body" : "Comment1 Body.",

    "author_id" : "author2",

    "created_date" : ISODate("2015-07-06T13:34:23.929Z")}...]

    }

    {

    "_id" : ObjectId("509d27069cc1ae293b36928d"),

    "comments" : [

    {

    "subject" : "Sample Comment 2",

    "body" : "Comments Body.",

    "author_id" : "author2",

    "created_date" : ISODate("2015-07-06T13:34:23.929Z")

    }...]

    }

    ```


    这种方法的主要缺点是，你会获取到比实际需要多得多的数据。特别是，你无法只请求 `author2` 的评论；你必须请求 `author2` 评论过的博客文章，而这些文章也包含了所有其他评论。这些数据需要在应用代码中进行进一步筛选。


    另一方面，假设你决定使用规范化模式。在这种情况下，你将拥有三个文档集合："作者"、"文章"和"评论"。


    "作者"文档将包含作者的特有内容，如 `姓名`、`年龄`、`性别` 等；"文章"文档将包含文章的特有细节，如文章创建时间、文章作者、实际内容和文章主题。


    "评论"文档将包含对文章的评论，如 `评论日期`、评论创建者和评论文本。如下图所示：


    ```json

    // 作者文档：

    {

    "_id": ObjectId("508d280e9cc1ae293b36928e "),

    "name": "Jenny",

    ..........

    }

    ```


    ```json

    // 文章文档

    {

    "_id" : ObjectId("508d27069cc1ae293b36928d"),....................

    }

    ```


    ```json

    // 评论文档：

    {

    "_id": ObjectId("508d359a9cc1ae293b3692a0"),

    "Author": ObjectId("508d27069cc1ae293b36928d"),

    "created_date" : ISODate("2015-07-06T13:34:59.336Z"),

    "Post_id": ObjectId("508d27069cc1ae293b36928d"),

    ..........

    }

    ```


    在这种场景下，查找由 "`author2`" 发表的评论的查询，可以通过对评论集合进行一个简单的 `find()` 操作来完成：


    `db.comments.find({"author": "author2"})`


    总的来说，如果你的应用程序的查询模式是已知的，并且数据往往只以一种方式访问，那么嵌入式方法就很有效。反之，如果你的应用程序可能以多种不同方式查询数据，或者你无法预料数据可能被查询的模式，那么更“规范化”的方法可能更好。


    例如，在上述规范化模式中，你将能够使用 `limit`、`skip` 操作符对评论进行排序或返回更受限的评论集合。而在嵌入式情况下，你只能按照评论在文章中的存储顺序检索所有评论。


    另一个可能促使你使用文档引用的因素是存在**一对多**关系时。


    例如，一个拥有大量读者互动的流行博客，可能对某篇文章有数百甚至数千条评论。在这种情况下，嵌入式会带来显著的负面影响：


    *   对读取性能的影响：随着文档尺寸增大，它会占用更多内存。内存的问题在于，MongoDB 数据库会将频繁访问的文档缓存在内存中，文档越大，它们能放入内存的概率就越低。这将导致检索文档时发生更多页面错误，进而引发随机磁盘
    I/O，进一步拖慢性能。

    *   对更新性能的影响：随着尺寸增大，当对此类文档执行追加数据的更新操作时，MongoDB 最终需要将文档移动到有更多可用空间的区域。当这种移动发生时，会显著降低更新性能。


    除此之外，MongoDB 文档有 `16MB` 的硬性大小限制。虽然这一点需要注意，但通常在你达到 `16MB` 的大小限制之前，就会因为内存压力和文档复制而遇到问题。


    促使使用文档引用的最后一个因素是存在**多对多**或 `M:N` 关系的情况。


    例如，在上述例子中，有标签。每个博客可以有多个标签，每个标签也可以关联到多个博客条目。


    实现博客-标签 `M:N` 关系的一种方法是拥有以下三个集合：


    *   `Tags` 集合，用于存储标签详情

    *   `Blogs` 集合，用于存储博客详情

    *   第三个集合，称为 `标签到博客映射`，用于映射标签和博客之间的关系


    这种方法与关系数据库中的类似，但这会对应用程序的性能产生负面影响，因为查询最终会进行大量应用层面的“连接”操作。


    或者，你可以使用嵌入式模型，在博客文档中嵌入标签，但这会导致数据重复。尽管这会在一定程度上简化读取操作，但它会增加更新操作的复杂性，因为在更新一个标签详情时，用户需要确保该更新后的标签在其嵌入到的所有其他博客文档中都得到更新。


    因此，对于多对多连接，通常采用折中方案是最好的：嵌入一个 `_id` 值列表，而不是完整的文档：


    ```json

    // 标签文档：

    {

    "_id": ObjectId("508d35349cc1ae293b369299"),

    "TagName": "Tag1",

    ..........

    }

    ```


    ```json

    // 添加了标签 ID 作为引用的文章文档

    // 文章文档

    { "_id" : ObjectId("508d27069cc1ae293b36928d"),

    "tags" : [

    ObjectId("509d35349cc1ae293b369299"),

    ObjectId("509d35349cc1ae293b36929a"),

    ObjectId("509d35349cc1ae293b36929b"),

    ObjectId("509d35349cc1ae293b36929c")

    ],....................................

    }

    ```


    虽然查询会稍微复杂一些，但你不再需要担心在所有地方更新一个标签了。


    总而言之，MongoDB 中的模式设计是你需要做出的最早期决策之一，它取决于应用程序的需求和查询模式。


    正如你所见，当你需要同时访问数据或需要进行原子更新时，嵌入式方法会产生积极影响。然而，如果你在查询时需要更大的灵活性，或者你有**多对多**关系，使用引用是一个不错的选择。


    最终，决策取决于你应用程序的访问模式，在 MongoDB 中没有硬性规定。在下一节中，你将学习各种数据建模的考量因素。'
- fmt: '### 6.3.2.3 数据建模的决策


    这涉及决定如何组织文档，以便有效地对数据建模。一个重要的决策点是需要嵌入数据还是使用数据引用（即决定使用嵌入还是引用）。


    这一点最好用一个例子来说明。假设你有一个书评网站，其中包含作者、书籍以及带有线程评论的评论。


    现在的问题是如何组织集合。这个决策取决于每本书预期的评论数量以及读操作与写操作的执行频率。


    ### 6.3.2.4 操作考虑因素


    除了元素之间交互的方式（即以嵌入方式存储文档还是使用引用）之外，在为应用程序设计数据模型时，许多其他操作因素也很重要。这些因素将在以下各节中介绍。


    #### 数据生命周期管理


    如果你的应用程序有需要在数据库中仅保留有限时间段的数据集，则需要使用此功能。


    假设你需要将评论和回复相关的数据保留一个月。可以考虑使用此功能。


    这是通过使用集合的 `Time to Live (TTL)` 功能实现的。集合的 `TTL` 功能确保文档在一段时间后过期。


    此外，如果应用程序要求仅处理最近插入的文档，使用固定集合（`capped collections`）将有助于优化性能。


    #### 索引


    可以创建索引以支持常用查询，从而提高性能。默认情况下，`MongoDB` 会在 `_id` 字段上创建索引。


    创建索引时需要考虑以下几点：


    *   每个索引至少需要 8KB 的数据空间。

    *   对于写操作，添加索引会对性能产生一些负面影响。因此，对于写操作频繁的集合，索引可能代价高昂，因为每次插入时都必须将键添加到所有索引中。

    *   索引对于读操作频繁的集合（例如读写操作比例高的情况）是有益的。未建立索引的读操作不受索引影响。


    #### 分片


    设计应用程序模型时的一个重要因素是是否对数据进行分区。这在 `MongoDB` 中是通过分片实现的。


    分片也被称为数据分区。在 `MongoDB` 中，一个集合被分区，其文档分布在称为分片（`shards`）的机器集群上。这对性能有显著影响。我们将在第 `tk`
    章更详细地讨论分片。


    #### 大量集合


    使用多个集合与在单个集合中存储数据的设计考虑如下：


    *   选择多个集合存储数据不会带来性能损失。

    *   为不同类型的数据使用不同的集合可以提高高吞吐量批处理应用程序的性能。


    当你设计拥有大量集合的模型时，需要考虑以下行为：


    *   每个集合都伴随一定的最小开销（几千字节）。

    *   每个索引（包括 `_id` 索引）至少需要 8KB 的数据空间。


    你现在知道，每个数据库的元数据都存储在 `<database>.ns` 文件中。每个集合和索引在命名空间文件中都有自己的条目，因此在决定实施大量集合时，你需要考虑
    `limits_on_the_size_of_namespace` 文件的限制。


    #### 文档增长


    少数更新操作，例如向数组中推送元素、添加新字段等，可能导致文档大小增加，进而可能导致文档从一个槽位移动到另一个槽位以适应文档。这种文档重定位的过程既消耗资源又耗时。尽管
    `MongoDB` 提供了填充（`padding`）以最小化重定位的发生，但你可能需要手动处理文档增长问题。


    ## 6.4 本章小结


    在本章中，你学习了基本的 `CRUD` 操作以及高级查询功能。你还研究了存储和检索数据的两种方式：嵌入和引用。


    在下一章中，你将学习 `MongoDB` 架构、其核心组件和特性。


    # 7. MongoDB 架构


    > “`MongoDB` 架构涵盖了 `MongoDB` 的深度架构概念。”


    在本章中，你将学习 `MongoDB` 架构，特别是核心进程和工具、独立部署、分片概念、复制概念和生产部署。


    ## 7.1 核心进程


    `MongoDB` 软件包中的核心组件是


    *   `mongod`，即核心数据库进程

    *   `mongos`，即分片集群的控制器和查询路由器

    *   `mongo`，即交互式 `MongoDB` shell


    这些组件作为应用程序位于 `bin` 文件夹下。让我们详细讨论这些组件。


    ### 7.1.1 mongod


    `MongoDB` 系统中的主要守护进程是 `mongod`。该守护进程处理所有数据请求，管理数据格式，并执行后台管理操作。


    当不带任何参数运行 `mongod` 时，它会连接到默认数据目录（即 `C:\data\db` 或 `/data/db`）和默认端口 `27017`，并在该端口监听套接字连接。


    在启动 `mongod` 进程之前，确保数据目录存在并且你对该目录具有写权限非常重要。


    如果目录不存在或你对该目录没有写权限，此进程的启动将失败。如果默认端口 `27017` 不可用，服务器将无法启动。


    `mongod` 还有一个 `HTTP` 服务器，它监听比默认端口高 `1000` 的端口。因此，如果你使用默认端口 `27017` 启动 `mongod`，则
    `HTTP` 服务器将位于端口 `28017`，并可通过 URL `http://localhost:28017` 访问。这个基本的 `HTTP` 服务器提供有关数据库的管理信息。


    ### 7.1.2 mongo


    `mongo` 为开发者提供了一个交互式 `JavaScript` 接口，用于直接在数据库上测试查询和操作，并为系统管理员管理数据库。所有这些都通过命令行完成。当启动
    `mongo` shell 时，它将连接到名为 `test` 的默认数据库。此数据库连接值被分配给全局变量 `db`。


    作为开发者或管理员，你需要在第一次连接后将数据库从 `test` 更改为你的数据库。你可以通过使用 `<databasename>.` 来实现这一点。


    ### 7.1.3 mongos


    `mongos` 用于 `MongoDB` 分片。它充当路由服务，处理来自应用层的查询，并确定请求的数据在分片集群中的位置。


    我们将在分片部分更详细地讨论 `mongos`。现在，你可以将 `mongos` 视为将查询路由到持有数据的正确服务器的进程。'
  raw: '#### 6.3.2.3 Decisions of Data Modelling


    This involves deciding how to structure the documents so that the data is modeled
    effectively. An important point to decide is whether you need to embed the data
    or use references to the data (i.e. whether to use embedding or referencing).


    This point is best demonstrated with an example. Suppose you have a book review
    site which has authors and books as well as reviews with threaded comments.


    Now the question is how to structure the collections. The decision depends on
    the number of comments expected on per book and how frequently the read vs. write
    operations will be performed.


    #### 6.3.2.4 Operational Considerations


    In addition to the way the elements interact with each other (i.e. whether to
    store the documents in an embedded manner or use references), a number of other
    operational factors are important when designing a data model for the application.
    These factors are covered in the following sections.


    ##### Data Lifecycle Management


    This feature needs to be used if your application has datasets that need to be
    persisted in the database only for a limited time period.


    Say you need to retain the data related to the review and comments for a month.
    This feature can be taken into consideration.


    This is implemented by using the Time to Live (TTL) feature of the collection.
    The TTL feature of the collection ensures that the documents are expired after
    a period of time.


    Additionally, if the application requirement is to work with only the recently
    inserted documents, using capped collections will help optimize the performance.


    ##### Indexes


    Indexes can be created to support commonly used queries to increase the performance.
    By default, an index is created by MongoDB on the `_id` field.


    The following are a few points to consider when creating indexes:


    *   At least 8KB of data space is required by each index.

    *   For write operations, an index addition has some negative performance impact.
    Hence for collections with heavy writes, indexes might be expensive because for
    each insert, the keys must be added to all the indexes.

    *   Indexes are beneficial for collections with heavy read operations such as
    where the proportion of read-to-write operations is high. The un-indexed read
    operations are not affected by an index.


    ##### Sharding


    One of the important factors when designing the application model is whether to
    partition the data or not. This is implemented using sharding in MongoDB.


    Sharding is also referred as partitioning of data. In MongoDB, a collection is
    partitioned with its documents distributed across cluster of machines, which are
    referred as shards. This can have a significant impact on the performance. We
    will discuss sharding more in Chapter tk.


    ##### A Large Number of Collections


    The design considerations for having multiple collections vs. storing data in
    a single collection are the following:


    *   There is no performance penalty in choosing multiple collections for storing
    data.

    *   Having distinct collections for different types of data can have performance
    improvements in high-throughput batch processing applications.


    When you are designing models that have a large number of collections, you need
    to take into consideration the following behaviors:


    *   A certain minimum overhead of few kilobytes is associated with each collection.

    *   At least 8KB of data space is required by each index, including the `_id`
    index.


    You know by now that the metadata for each database is stored in the `<database>.ns`
    file. Each collection and index has its own entry in the namespace file, so you
    need to consider the limits_on_the_size_of_namespace files when deciding to implement
    a large number of collections.


    ##### Growth of the Document


    Few updates, such as pushing an element to an array, adding new fields, etc.,
    can lead to an increase in the document size, which can lead to the movement of
    the document from one slot to another in order to fit in the document. This process
    of document relocation is both resource and time consuming. Although MongoDB provides
    padding to minimize the relocation occurrences, you may need to handle the document
    growth manually.


    ## 6.4 Summary


    In this chapter you learned the basic CRUD operations plus advanced querying capabilities.
    You also examined the two ways of storing and retrieving data: embedding and referencing.


    In the following chapter, you will learn about the MongoDB architecture, its core
    components, and features.


    # 7. MongoDB Architecture


    > “MongoDB architecture covers the deep-dive architectural concepts of MongoDB.”


    In this chapter, you will learn about the MongoDB architecture, especially core
    processes and tools, standalone deployment, sharding concepts, replication concepts,
    and production deployment.


    ## 7.1 Core Processes


    The core components in the MongoDB package are


    *   mongod, which is the core database process

    *   mongos, which is the controller and query router for sharded clusters

    *   mongo, which is the interactive MongoDB shell


    These components are available as applications under the bin folder. Let’s discuss
    these components in detail.


    ### 7.1.1 mongod


    The primary daemon in a MongoDB system is known as mongod . This daemon handles
    all the data requests, manages the data format, and performs operations for background
    management.


    When a mongod is run without any arguments, it connects to the default data directory,
    which is `C:\data\db` or `/data/db`, and default port 27017, where it listens
    for socket connections.


    It’s important to ensure that the data directory exists and you have write permissions
    to the directory before the mongod process is started.


    If the directory doesn’t exist or you don’t have write permissions on the directory,
    the start of this process will fail. If the default port 27017 is not available,
    the server will fail to start.


    mongod also has a HTTP server which listens on a port 1000 higher than the default
    port, so if you started the mongod with the default port 27017, in this case the
    HTTP server will be on port 28017 and will be accessible using the URL http://localhost:28017\.
    This basic HTTP server provides administrative information about the database.


    ### 7.1.2 mongo


    mongo provides an interactive JavaScript interface for the developer to test queries
    and operations directly on the database and for the system administrators to manage
    the database. This is all done via the command line. When the mongo shell is started,
    it will connect to the default database called `test`. This database connection
    value is assigned to global variable `db`.


    As a developer or administrator you need to change the database from `test` to
    your database post the first connection is made. You can do this by using `<databasename>.`


    ### 7.1.3 mongos


    mongos is used in MongoDB sharding. It acts as a routing service that processes
    queries from the application layer and determines where in the sharded cluster
    the requested data is located.


    We will discuss mongos in more detail in the sharding section. Right now you can
    think of mongos as the process that routes the queries to the correct server holding
    the data.'
  trans: '

    ### 6.3.2.3 数据建模的决策


    这涉及到决定如何组织文档以实现有效的数据建模。一个关键的决策点是需要嵌入数据还是使用数据引用（即决定采用嵌入还是引用）。


    这一点通过一个例子可以更好地说明。假设你有一个书评网站，其中包含作者、书籍以及带有线程式评论的回复。


    当前的问题是如何组织集合。这个决策取决于每本书预期的评论数量以及读操作与写操作的执行频率。


    ### 6.3.2.4 操作考虑因素


    除了元素之间的交互方式（即以嵌入方式存储文档还是使用引用）之外，在为应用程序设计数据模型时，许多其他操作因素也至关重要。这些因素将在以下各节中介绍。


    #### 数据生命周期管理


    如果你的应用程序拥有需要在数据库中仅保留有限时间段的数据集，则需要使用此功能。


    假设你需要将评论和回复相关的数据保留一个月。可以考虑使用此功能。


    这是通过使用集合的 `Time to Live (TTL)` 功能实现的。集合的 `TTL` 功能确保文档在指定时间后过期。


    此外，如果应用程序要求仅处理最近插入的文档，使用固定集合（`capped collections`）将有助于优化性能。


    #### 索引


    可以创建索引以支持常用查询，从而提高性能。默认情况下，`MongoDB` 会在 `_id` 字段上创建索引。


    创建索引时需要考虑以下几点：


    *   每个索引至少需要 8KB 的数据空间。

    *   对于写操作，添加索引会对性能产生一些负面影响。因此，对于写操作频繁的集合，索引可能代价高昂，因为每次插入时都必须将键添加到所有索引中。

    *   索引对于读操作频繁的集合（例如读写操作比例高的情况）是有益的。未建立索引的读操作不受索引影响。


    #### 分片


    设计应用程序模型时的一个重要因素是是否对数据进行分区。这在 `MongoDB` 中是通过分片实现的。


    分片也被称为数据分区。在 `MongoDB` 中，一个集合被分区，其文档分布在称为分片（`shards`）的机器集群上。这对性能有显著影响。我们将在第 `tk`
    章更详细地讨论分片。


    #### 大量集合


    使用多个集合与在单个集合中存储数据的设计考虑如下：


    *   选择多个集合存储数据不会带来性能损失。

    *   为不同类型的数据使用不同的集合可以提高高吞吐量批处理应用程序的性能。


    当你设计拥有大量集合的模型时，需要考虑以下行为：


    *   每个集合都伴随一定的最小开销（几千字节）。

    *   每个索引（包括 `_id` 索引）至少需要 8KB 的数据空间。


    你现在知道，每个数据库的元数据都存储在 `<database>.ns` 文件中。每个集合和索引在命名空间文件中都有自己的条目，因此在决定实施大量集合时，你需要考虑
    `limits_on_the_size_of_namespace` 文件的限制。


    #### 文档增长


    少数更新操作，例如向数组中推送元素、添加新字段等，可能导致文档大小增加，进而可能导致文档从一个槽位移动到另一个槽位以适应文档。这种文档重定位的过程既消耗资源又耗时。尽管
    `MongoDB` 提供了填充（`padding`）以最小化重定位的发生，但你可能需要手动处理文档增长问题。


    ## 6.4 本章小结


    在本章中，你学习了基本的 `CRUD` 操作以及高级查询功能。你还研究了存储和检索数据的两种方式：嵌入和引用。


    在下一章中，你将学习 `MongoDB` 架构、其核心组件和特性。


    # 7. MongoDB 架构


    > “`MongoDB` 架构涵盖了 `MongoDB` 的深度架构概念。”


    在本章中，你将学习 `MongoDB` 架构，特别是核心进程和工具、独立部署、分片概念、复制概念和生产部署。


    ## 7.1 核心进程


    `MongoDB` 软件包中的核心组件是


    *   `mongod`，即核心数据库进程

    *   `mongos`，即分片集群的控制器和查询路由器

    *   `mongo`，即交互式 `MongoDB` shell


    这些组件作为应用程序位于 `bin` 文件夹下。让我们详细讨论这些组件。


    ### 7.1.1 mongod


    `MongoDB` 系统中的主要守护进程是 `mongod`。该守护进程处理所有数据请求，管理数据格式，并执行后台管理操作。


    当不带任何参数运行 `mongod` 时，它会连接到默认数据目录（即 `C:\data\db` 或 `/data/db`）和默认端口 `27017`，并在该端口监听套接字连接。


    在启动 `mongod` 进程之前，确保数据目录存在并且你对该目录具有写权限非常重要。


    如果目录不存在或你对该目录没有写权限，此进程的启动将失败。如果默认端口 `27017` 不可用，服务器将无法启动。


    `mongod` 还有一个 `HTTP` 服务器，它监听比默认端口高 `1000` 的端口。因此，如果你使用默认端口 `27017` 启动 `mongod`，则
    `HTTP` 服务器将位于端口 `28017`，并可通过 URL `http://localhost:28017` 访问。这个基本的 `HTTP` 服务器提供有关数据库的管理信息。


    ### 7.1.2 mongo


    `mongo` 为开发者提供了一个交互式 `JavaScript` 接口，用于直接在数据库上测试查询和操作，并为系统管理员管理数据库。所有这些都通过命令行完成。当启动
    `mongo` shell 时，它将连接到名为 `test` 的默认数据库。此数据库连接值被分配给全局变量 `db`。


    作为开发者或管理员，你需要在第一次连接后将数据库从 `test` 更改为你的数据库。你可以通过使用 `<databasename>.` 来实现这一点。


    ### 7.1.3 mongos


    `mongos` 用于 `MongoDB` 分片。它充当路由服务，处理来自应用层的查询，并确定请求的数据在分片集群中的位置。


    我们将在分片部分更详细地讨论 `mongos`。现在，你可以将 `mongos` 视为将查询路由到持有数据的正确服务器的进程。

    '
- fmt: '## 7.2 MongoDB Tools


    Apart from the core services, there are various tools that are available as part
    of the MongoDB installation:


    *   `mongodump`: This utility is used as part of an effective backup strategy.
    It creates a binary export of the database contents.

    *   `mongorestore`: The binary database dump created by the `mongodump` utility
    is imported to a new or an existing database using the `mongorestore` utility.

    *   `bsondump`: This utility converts the BSON files into human-readable formats
    such as JSON and CSV. For example, this utility can be used to read the output
    file generated by `mongodump`.

    *   `mongoimport`, `mongoexport`: `mongoimport` provides a method for taking data
    in [JSON](http://docs.mongodb.org/manual/reference/glossary/#term-json), [CSV](http://docs.mongodb.org/manual/reference/glossary/#term-csv),
    or [TSV](http://docs.mongodb.org/manual/reference/glossary/#term-tsv) formats
    and importing it into a `mongod` instance. `mongoexport` provides a method to
    export data from a `mongod` instance into JSON, CSV, or TSV formats.

    *   `mongostat`, `mongotop`, `mongosniff`: These utilities provide diagnostic
    information related to the current operation of a `mongod` instance.


    ## 7.3 Standalone Deployment


    Standalone deployment is used for development purpose; it doesn’t ensure any redundancy
    of data and it doesn’t ensure recovery in case of failures. So it’s not recommended
    for use in production environment. Standalone deployment has the following components:
    a single `mongod` and a client connecting to the `mongod`, as shown in Figure
    [7-1](#A332296_1_En_7_Chapter.html#Fig1).


    ![A332296_1_En_7_Fig1_HTML.jpg](A332296_1_En_7_Fig1_HTML.jpg)

    Figure 7-1. Standalone deployment


    MongoDB uses sharding and replication to provide a highly available system by
    distributing and duplicating the data. In the coming sections, you will look at
    sharding and replication. Following that you’ll look at the recommended production
    deployment architecture.


    ## 7.4 Replication


    In a standalone deployment, if the `mongod` is not available, you risk losing
    all the data, which is not acceptable in a production environment. Replication
    is used to offer safety against such kind of data loss.


    Replication provides for data redundancy by replicating data on different nodes,
    thereby providing protection of data in case of node failure. Replication provides
    high availability in a MongoDB deployment.


    Replication also simplifies certain administrative tasks where the routine tasks
    such as backups can be offloaded to the replica copies, freeing the main copy
    to handle the important application requests.


    In some scenarios, it can also help in scaling the reads by enabling the client
    to read from the different copies of data.


    In this section, you will learn how replication works in MongoDB and its various
    components. There are two types of replication supported in MongoDB: traditional
    master/slave replication and replica set.


    ### 7.4.1 Master/Slave Replication


    In MongoDB, the traditional master/slave replication is available but it is recommended
    only for more than 50 node replications. The preferred replication approach is
    replica sets, which we will explain later. In this type of replication, there
    is one master and a number of slaves that replicate the data from the master.
    The only advantage with this type of replication is that there’s no restriction
    on the number of slaves within a cluster. However, thousands of slaves will overburden
    the master node, so in practical scenarios it’s better to have less than dozen
    slaves. In addition, this type of replication doesn’t automate failover and provides
    less redundancy.


    In a basic master/slave setup, you have two types of `mongod` instances: one instance
    is in the master mode and the remaining are in the slave mode, as shown in Figure
    [7-2](#A332296_1_En_7_Chapter.html#Fig2). Since the slaves are replicating from
    the master, all slaves need to be aware of the master’s address.


    ![A332296_1_En_7_Fig2_HTML.jpg](A332296_1_En_7_Fig2_HTML.jpg)

    Figure 7-2. Master/slave replication


    The master node maintains a capped collection (`oplog`) that stores an ordered
    history of logical writes to the database.


    The slaves replicate the data using this `oplog` collection. Since the `oplog`
    is a capped collection, if the slave’s state is far behind the master’s state,
    the slave may become out of sync. In that scenario, the replication will stop
    and manual intervention will be needed to re-establish the replication.


    There are two main reasons behind a slave becoming out of sync:


    *   The slave shuts down or stops and restarts later. During this time, the `oplog`
    may have deleted the log of operations required to be applied on the slave.

    *   The slave is slow in executing the updates that are available from the master.


    ### 7.4.2 Replica Set


    The replica set is a sophisticated form of the traditional master-slave replication
    and is a recommended method in MongoDB deployments.


    Replica sets are basically a type of master-slave replication but they provide
    automatic failover. A replica set has one master, which is termed as primary,
    and multiple slaves, which are termed as secondary in the replica set context;
    however, unlike master-slave replication, there’s no one node that is fixed to
    be primary in the replica set.


    If a master goes down in replica set, automatically one of the slave nodes is
    promoted to the master. The clients start connecting to the new master, and both
    data and application will remain available. In a replica set, this failover happens
    in an automated fashion. We will explain the details of how this process happens
    later.


    The primary node is selected through an election mechanism. If the primary goes
    down, the selected node will be chosen as the primary node.


    Figure [7-3](#A332296_1_En_7_Chapter.html#Fig3) shows how a two-member replica
    set failover happens. Let’s discuss the various steps that happen for a two-member
    replica set in failover.


    1.  The primary goes down, and the secondary is promoted as primary.

    2.  The original primary comes up, it acts as slave, and becomes the secondary
    node.


    ![A332296_1_En_7_Fig3_HTML.jpg](A332296_1_En_7_Fig3_HTML.jpg)

    Figure 7-3. Two-member replica set failover


    The points to be noted are:


    *   A replica set is a `mongod`’s cluster, which replicates among one another
    and ensures automatic failover.

    *   In the replica set, one `mongod` will be the primary member and the others
    will be secondary members.

    *   The primary member is elected by the members of the replica set. All writes
    are directed to the primary member whereas the secondary members replicate from
    the primary asynchronously using `oplog`.

    *   The secondary’s data sets reflect the primary data sets, enabling them to
    be promoted to primary in case of unavailability of the current primary.


    Replica set replication has a limitation on the number of members. Prior to version
    3.0, the limit was 12 but this has been changed to 50 in version 3.0. So now replica
    set replication can have maximum of 50 members only, and at any given point of
    time in a 50-member replica set, only 7 can participate in a vote. We will explain
    the voting concept in a replica set in detail.


    Starting from Version 3.0, replica set members can use different storage engines.
    For example, the `WiredTiger` storage engine might be used by the secondary members
    whereas the `MMAPv1` engine could be used by the primary. In the coming sections,
    you will look at the different storage engines available with MongoDB.'
