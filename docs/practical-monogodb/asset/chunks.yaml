    ## 9.6 Summary


    In this chapter you looked at how various utilities that are packaged as part
    of the MongoDB distribution can be used to manage and maintain the system.


    You learned about the main operations that as an administrator you must be aware
    of for a detailed understanding of the utilities. Please read through the references.
    In the next chapter, you will examine MongoDB’s use cases and you will also look
    at the cases where MongoDB is not a good choice.


    # 10. MongoDB Use Cases


    > “MongoDB: Is it useful for me or not?”


    In this chapter, we will provide the much needed connection between the features
    of MongoDB and the business problems that it is suited to solve. We will be using
    two use cases for sharing the techniques and patterns used for addressing such
    problems.


    ## 10.1 Use Case 1 - Performance Monitoring


    In this section, you will explore how to use MongoDB to store and retrieve performance
    data. You’ll focus on the data model that you will be using for storing the data.
    Retrieving will consist of simply reading from the respective collection. You
    will also be looking at how you can apply sharding and replication for better
    performance and data safety.


    We assume a monitoring tool that is collecting server-defined parameter data in
    CSV format . In general, the monitoring tools either store the data as text files
    in a designated folder on the server or they redirect their output to any reporting
    database server. In this use case , there’s a scheduler that will be reading this
    shared folder path and importing the data within MongoDB database.


    ### 10.1.1 Schema Design


    The first step in designing a solution is to decide on the schema. The schema
    depends on the format of the data that the monitoring tool is capturing.


    A line from the log files may resemble Table [10-1](#A332296_1_En_10_Chapter.html#Tab1).


    Table 10-1.


    Log File


    | Node UUID | IP Address | Node Name | MIB | Time Stamp (ms) | Metric Ve |

    | --- | --- | --- | --- | --- | --- |

    | 3beb1a8b-040d-4b46-932a-2d31bd353186 | 10.161.1.73 | corp_xyz_sardar | IFU |
    1369221223384 | 0.2 |


    The following is the simplest way to store each line as text:


    `{`


    `_id: ObjectId(...),`


    `line: ''10.161.1.73 - corp_xyz_sardar [15/July/2015:13:55:36 -0700] "Interface
    Util" ...`


    `}`


    Although this captures the data, it makes no sense to the user, so if you want
    to find out events are from a particular server, you need to use regular expressions,
    which will lead to full scan of the collection, which is very inefficient.


    Instead, you can extract the data from the log file and store it as meaningful
    fields in MongoDB documents.


    Note that when designing the structure, it’s very important to use the correct
    data type. This not only saves space but also has a significant impact on the
    performance.


    For example, if you store the date and time field of the log as a string, it’ll
    not only use more bytes but it’ll also be difficult to fire date range queries.
    Instead of using strings, if you store the date as a UTC timestamp, it will take
    8 bytes as opposed to 28 bytes for a string, so it’ll be easier to execute date
    range queries. As you can see, using proper types for the data increases querying
    flexibility.


    You will be using the following document for storing your monitoring data:


    `{`


    `_id: ObjectID(...),`


    `Host:,`


    `Time:ISODate(‘’),`


    `ParameterName:’aa’,`


    `Value:10.23`


    `}`


    Note


    The actual log data might have extra fields; if you capture it all, it’ll lead
    to a large document, which is an inefficient use of storage and memory. When designing
    the schema, you should omit the details that are not required. It’s very important
    to identify which fields you must capture in order to meet your requirements.


    In your scenario, the most important information that meets your reporting application
    requirements is the following:


    Host   Timestamp   Parameter   Value


    ### 10.1.2 Operations


    Having designed the document structure, next you will look at the various operations
    that you need to perform on the system.'
