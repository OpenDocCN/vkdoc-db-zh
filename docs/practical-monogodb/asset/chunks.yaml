- fmt: "## 2.2 NoSQL\n\nNoSQL 是一个用于指代非关系型数据库的术语。因此，它涵盖了大多数不基于传统 RDBMS（关系型数据库管理系统）原则、用于处理互联网规模大数据集的存储系统。\n\
    \n正如前一章所讨论的，大数据正对传统的数据存储和处理方式（如 RDBMS 系统）构成挑战。因此，我们看到 NoSQL 数据库的兴起，它们被设计用来在时间和成本约束内处理这种海量且多样的数据。\n\
    \n因此，NoSQL 数据库是从处理大数据的需求中演化而来的；传统 RDBMS 技术无法提供充分的解决方案。图 2-1 展示了多年来非结构化/半结构化数据与结构化数据相比的增长情况。\n\
    \n![A332296_1_En_2_Fig1_HTML.jpg](A332296_1_En_2_Fig1_HTML.jpg)\n\n图 2-1. 结构化\
    \ vs. 非结构化/半结构化数据\n\n以下是一些适合使用 NoSQL 数据库的大数据用例示例：\n\n*   社交网络图谱：谁与谁连接？在社交网络站点上，谁的帖子应该显示在用户的墙或主页上？\n\
    *   检索：搜索所有包含特定关键词的相关页面，并根据关键词在页面中出现的次数进行排序。\n\n### 2.2.1 定义\n\nNoSQL 没有正式的定义。它代表了一种与\
    \ RDBMS 根本不同的持久化/数据存储机制。但如果必须定义 NoSQL，那就是：NoSQL 是指不遵循 RDBMS 原理的数据存储系统的总称。\n\n\
    > 注意\n>\n> 该术语最初用于表示“如果你想扩展，就不要使用 SQL”。后来被重新定义为“不仅仅是 SQL”，这意味着除了 SQL 之外，还存在其他互补的数据库解决方案。\n\
    \n### 2.2.2 NoSQL 简史\n\n1998年，Carlo Strozzi 创造了 NoSQL 这个术语。他用这个术语来标识他的数据库，因为该数据库没有\
    \ SQL 接口。该术语在 2009 年初重新出现，当时 Eric Evans（Rackspace 的一名员工）在一个关于开源分布式数据库的活动中使用这个术语，来指代那些非关系型、不遵循关系数据库\
    \ ACID 特性的分布式数据库。\n\n## 2.3 ACID vs. BASE\n\n在介绍中，我们提到传统的 RDBMS 应用程序一直专注于 ACID\
    \ 事务。无论这些特性看起来多么必不可少，它们与面向 Web 规模的应用程序的可用性和性能要求是相当不兼容的。\n\n举个例子，假设你有一个像 OLX 这样的公司，它销售诸如未使用的家居用品（旧家具、车辆等）之类的产品，并使用\
    \ RDBMS 作为其数据库。让我们考虑两种场景。\n\n第一种场景：我们看一个用户正在购买产品的电子商务购物网站。在交易过程中，用户锁定了数据库的一部分（库存），其他所有用户都必须等待，直到锁定该部分的用户完成交易。\n\
    \n第二种场景：应用程序最终可能使用缓存数据甚至未锁定的记录，从而导致不一致。在这种情况下，两个用户可能最终都会购买该产品，而实际库存已为零。\n\n系统可能会变慢，影响可扩展性和用户体验。\n\
    \n与传统 RDBMS 系统的 ACID 方法相反，NoSQL 使用一种通常称为 BASE 的方法来解决问题。在解释 BASE 之前，让我们先探索 CAP\
    \ 定理的概念。\n\n### 2.3.1 CAP 定理（Brewer 定理）\n\nEric Brewer 在 2000 年概述了 CAP 定理。这是一个重要的概念，处理分布式数据库的开发人员和架构师需要很好地理解。该定理指出，在分布式环境中设计应用程序时，存在三个基本需求，即一致性（Consistency）、可用性（Availability）和分区容错性（Partition\
    \ tolerance）。\n\n*   **一致性**意味着在任何改变数据的操作执行后，数据保持一致，并且所有访问应用程序的用户或客户端都能看到相同的更新数据。\n\
    *   **可用性**意味着系统始终可用。\n*   **分区容错性**意味着即使系统被划分为无法相互通信的服务器组，系统仍将继续运行。\n\nCAP 定理指出，在任何时间点，分布式系统只能满足上述三个保证中的两个（图\
    \ 2-2）。\n\n![A332296_1_En_2_Fig2_HTML.jpg](A332296_1_En_2_Fig2_HTML.jpg)\n\n图\
    \ 2-2. CAP 定理\n\n### 2.3.2 BASE\n\nEric Brewer 创造了 BASE 这个缩写。BASE 可以解释为：\n\n*\
    \   **基本可用（Basically Available）** 意味着系统在 CAP 定理的范围内是可用的。\n*   **软状态（Soft state）**\
    \ 表示即使没有向系统提供输入，状态也会随时间变化。这符合最终一致性。\n*   **最终一致性（Eventual consistency）** 意味着系统将在长期内达到一致性，前提是在此期间没有向系统发送输入。\n\
    \n因此，BASE 与 RDBMS ACID 事务形成对比。\n\n你已经看到 NoSQL 数据库是最终一致的，但最终一致性的实现可能因不同的 NoSQL\
    \ 数据库而异。\n\nNRW 是用于描述最终一致性模型如何在 NoSQL 数据库中实现的表示法，其中：\n\n*   `N` 是数据库维护的数据副本数量。\n\
    *   `R` 是应用程序在返回读取请求输出之前需要引用的副本数量。\n*   `W` 是在写入操作被标记为成功完成之前需要写入的数据副本数量。\n\n使用这些表示法配置，数据库实现了最终一致性模型。\n\
    \n一致性可以在读写操作级别实现。\n\n*   **写入操作**\n    *   `N=W` 意味着写入操作在将控制权返回给客户端并标记写入操作成功之前，将更新所有数据副本。这与传统\
    \ RDBMS 数据库在实现同步复制时的工作方式类似。此设置将减慢写入性能。\n    *   如果写入性能是一个问题，这意味着你希望写入操作快速发生，你可以设置\
    \ `W=1`，`R=N`。这意味着写入将只更新一个副本并标记写入成功，但每当用户发出读取请求时，它将读取所有副本以返回结果。如果任何一个副本未更新，它将确保该副本被更新，然后读取才会成功。此实现将减慢读取性能。\n\
    \    *   因此，大多数 NoSQL 实现使用 `N>W>1`。这意味着需要成功更新多于一个节点，但并非所有节点都需要同时更新。\n*   **读取操作**\n\
    \    *   如果 `R` 设置为 1，读取操作将读取任何一个数据副本，这可能是过时的。如果 `R>1`，则读取多个副本，并将读取最新值。但是，这可能会减慢读取操作。\n\
    \    *   使用 `N<W+R` 总能确保读取操作检索到最新值。这是因为写入副本和读取副本的总数总是大于实际副本数，确保至少一个读取副本具有最新版本。这就是**法定人数装配**。\n\
    \n表 2-1 比较了 ACID 和 BASE。\n\n表 2-1. ACID vs. BASE\n\n| ACID | BASE |\n| --- | ---\
    \ |\n| 原子性 | 基本可用 |\n| 一致性 | 最终一致性 |\n| 隔离性 | 软状态 |\n| 持久性 | |\n\n## 2.4 NoSQL\
    \ 的优势与劣势\n\n在本节中，你将了解 NoSQL 数据库的优势和劣势。"
  raw: '## 2.2 NoSQL


    NoSQL is a term used to refer to non-relational databases . Thus, it encompasses
    majority of the data stores that are not based on the conventional RDBMS principles
    and are used for handling large data sets on an Internet scale.


    Big data, as discussed in the previous chapter, is posing challenges to the traditional
    ways of storing and processing data, such as the RDBMS systems. As a result, we
    see the rise of NoSQL databases, which are designed to process this huge amount
    and variety of data within time and cost constraints.


    Thus NoSQL databases evolved from the need to handle big data; traditional RDBMS
    technologies could not provide adequate solutions. Figure [2-1](#A332296_1_En_2_Chapter.html#Fig1)
    shows the rise of un/semi-structured data over the years as compared to structured
    data .


    ![A332296_1_En_2_Fig1_HTML.jpg](A332296_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Structured vs. un/Semi-Structured data


    Some examples of big data use cases that are a good fit for NoSQL databases are
    the following:


    *   Social Network Graph: Who is connected to whom? Whose post should be visible
    on the user’s wall or homepage on a social network site?

    *   Search and Retrieve: Search all relevant pages with a particular keyword ranked
    by the number of times a keyword appears on a page.


    ### 2.2.1 Definition


    NoSQL doesn’t have a formal definition . It represents a form of persistence/data
    storage mechanism that is fundamentally different from RDBMS. But if pushed to
    define NoSQL, here it is: NoSQL is an umbrella term for data stores that don’t
    follow the RDBMS principles.


    Note


    The term was used initially to mean “do not use SQL if you want to scale.” Later
    this was redefined to “not only SQL,” which means that in addition to SQL other
    complimentary database solutions exist.


    ### 2.2.2 A Brief History of NoSQL


    In 1998, Carlo Strozzi coined the term NoSQL. He used this term to identify his
    database because the database didn’t have a SQL interface. The term resurfaced
    in early 2009 when Eric Evans (a Rackspace employee) used this term in an event
    on open source distributed databases to refer to distributed databases that were
    non-relational and did not follow the ACID features of relational databases.


    ## 2.3 ACID vs. BASE


    In the introduction, we mentioned that the traditional RDBMS applications have
    focused on ACID transactions . Howsoever essential these qualities may seem, they
    are quite incompatible with availability and performance requirements for applications
    of a Web scale.


    Let’s say, for example, that you have a company like OLX, which sells products
    such as unused household goods (old furniture, vehicles, etc.) and uses RDBMS
    as its database. Let’s consider two scenarios.


    First scenario: Let’s look at an e-commerce shopping site where a user is buying
    a product. During the transaction, the user locks a part of database, the inventory,
    and every other user must wait until the user who has put the lock completes the
    transaction.


    Second scenario: The application might end up using cached data or even unlocked
    records , resulting in inconsistency. In this case, two users might end up buying
    the product when the inventory actually was zero.


    The system may become slow, impacting scalability and user experience.


    In contrary to the ACID approach of traditional RDBMS systems, NoSQL solves the
    problem using an approach popularly called as BASE. Before explaining BASE, let’s
    explore the concept of the CAP theorem.


    ### 2.3.1 CAP Theorem (Brewer’s Theorem )


    Eric Brewer outlined the CAP theorem in 2000\. This is an important concept that
    needs to be well understood by developers and architects dealing with distributed
    databases. The theorem states that when designing an application in a distributed
    environment there are three basic requirements that exist, namely consistency,
    availability, and partition tolerance.


    *   Consistency means that the data remains consistent after any operation is
    performed that changes the data, and that all users or clients accessing the application
    see the same updated data.

    *   Availability means that the system is always available.

    *   Partition Tolerance means that the system will continue to function even if
    it is partitioned into groups of servers that are not able to communicate with
    one another.


    The CAP theorem states that at any point in time a distributed system can fulfil
    only two of the above three guarantees (Figure [2-2](#A332296_1_En_2_Chapter.html#Fig2)).


    ![A332296_1_En_2_Fig2_HTML.jpg](A332296_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    CAP Theorem


    ### 2.3.2 The BASE


    Eric Brewer coined the BASE acronym . BASE can be explained as


    *   Basically Available means the system will be available in terms of the CAP
    theorem.

    *   Soft state indicates that even if no input is provided to the system, the
    state will change over time. This is in accordance to eventual consistency.

    *   Eventual consistency means the system will attain consistency in the long
    run, provided no input is sent to the system during that time.


    Hence BASE is in contrast with the RDBMS ACID transactions.


    You have seen that NoSQL databases are eventually consistent but the eventual
    consistency implementation may vary across different NoSQL databases.


    NRW is the notation used to describe how the eventual consistency model is implemented
    across NoSQL databases where


    *   N is the number of data copies that the database has maintained.

    *   R is the number of copies that an application needs to refer to before returning
    a read request’s output.

    *   W is the number of data copies that need to be written to before a write operation
    is marked as completed successfully.


    Using these notation configurations , the databases implement the model of eventual
    consistency.


    Consistency can be implemented at both read and write operation levels.


    *   Write Operations

    *   N=W implies that the write operation will update all data copies before returning
    the control to the client and marking the write operation as successful. This
    is similar to how the traditional RDBMS databases work when implementing synchronous
    replication. This setting will slow down the write performance.

    *   If write performance is a concern, which means you want the writes to be happening
    fast, you can set W=1, R=N. This implies that the write will just update any one
    copy and mark the write as successful, but whenever the user issues a read request,
    it will read all the copies to return the result. If either of the copies is not
    updated, it will ensure the same is updated, and then only the read will be successful.
    This implementation will slow down the read performance.

    *   Hence most NoSQL implementations use N>W>1\. This implies that greater than
    one node needs to be updated successfully; however, not all nodes need to be updated
    at the same time.

    *   Read Operations

    *   If R is set to 1, the read operation will read any data copy, which can be
    outdated. If R>1, more than one copy is read, and it will read most recent value.
    However, this can slow down the read operation.

    *   Using N<W+R always ensures that a read operation retrieves the latest value.
    This is because the number of written copies and read copies are always greater
    than the actual number of copies, ensuring that at least one read copy has the
    latest version. This is quorum assembly.


    Table [2-1](#A332296_1_En_2_Chapter.html#Tab1) compares ACID vs. BASE.


    Table 2-1.


    ACID vs. BASE


    | ACID | BASE |

    | --- | --- |

    | Atomicity | Basically Available |

    | Consistency | Eventually Consistency |

    | Isolation | Soft State |

    | Durable |   |


    ## 2.4 NoSQL Advantages and Disadvantages


    In this section, you will look at the advantages and disadvantages of NoSQL databases.'
  trans: "## 2.2 NoSQL\n\nNoSQL 是一个用于指代非关系型数据库的术语。因此，它涵盖了大多数不基于传统 RDBMS（关系型数据库管理系统）原则、用于处理互联网规模大数据集的存储系统。\n\
    \n正如前一章所讨论的，大数据正对传统的数据存储和处理方式（如 RDBMS 系统）构成挑战。因此，我们看到 NoSQL 数据库的兴起，它们被设计用来在时间和成本约束内处理这种海量且多样的数据。\n\
    \n因此，NoSQL 数据库是从处理大数据的需求中演化而来的；传统 RDBMS 技术无法提供充分的解决方案。图 2-1 展示了多年来非结构化/半结构化数据与结构化数据相比的增长情况。\n\
    \n![A332296_1_En_2_Fig1_HTML.jpg](img/A332296_1_En_2_Fig1_HTML.jpg)\n\n图 2-1.\
    \ 结构化 vs. 非结构化/半结构化数据\n\n以下是一些适合使用 NoSQL 数据库的大数据用例示例：\n\n*   社交网络图谱：谁与谁连接？在社交网络站点上，谁的帖子应该显示在用户的墙或主页上？\n\
    *   检索：搜索所有包含特定关键词的相关页面，并根据关键词在页面中出现的次数进行排序。\n\n### 2.2.1 定义\n\nNoSQL 没有正式的定义。它代表了一种与\
    \ RDBMS 根本不同的持久化/数据存储机制。但如果必须定义 NoSQL，那就是：NoSQL 是指不遵循 RDBMS 原理的数据存储系统的总称。\n\n\
    > 注意\n>\n> 该术语最初用于表示“如果你想扩展，就不要使用 SQL”。后来被重新定义为“不仅仅是 SQL”，这意味着除了 SQL 之外，还存在其他互补的数据库解决方案。\n\
    \n### 2.2.2 NoSQL 简史\n\n1998 年，Carlo Strozzi 创造了 NoSQL 这个术语。他用这个术语来标识他的数据库，因为该数据库没有\
    \ SQL 接口。该术语在 2009 年初重新出现，当时 Eric Evans（Rackspace 的一名员工）在一个关于开源分布式数据库的活动中使用这个术语，来指代那些非关系型、不遵循关系数据库\
    \ ACID 特性的分布式数据库。\n\n## 2.3 ACID vs. BASE\n\n在介绍中，我们提到传统的 RDBMS 应用程序一直专注于 ACID\
    \ 事务。无论这些特性看起来多么必不可少，它们与面向 Web 规模的应用程序的可用性和性能要求是相当不兼容的。\n\n举个例子，假设你有一个像 OLX 这样的公司，它销售诸如未使用的家居用品（旧家具、车辆等）之类的产品，并使用\
    \ RDBMS 作为其数据库。让我们考虑两种场景。\n\n第一种场景：我们看一个用户正在购买产品的电子商务购物网站。在交易过程中，用户锁定了数据库的一部分（库存），其他所有用户都必须等待，直到锁定该部分的用户完成交易。\n\
    \n第二种场景：应用程序最终可能使用缓存数据甚至未锁定的记录，从而导致不一致。在这种情况下，两个用户可能最终都会购买该产品，而实际库存已为零。\n\n系统可能会变慢，影响可扩展性和用户体验。\n\
    \n与传统 RDBMS 系统的 ACID 方法相反，NoSQL 使用一种通常称为 BASE 的方法来解决问题。在解释 BASE 之前，让我们先探索 CAP\
    \ 定理的概念。\n\n### 2.3.1 CAP 定理（Brewer 定理）\n\nEric Brewer 在 2000 年概述了 CAP 定理。这是一个重要的概念，处理分布式数据库的开发人员和架构师需要很好地理解。该定理指出，在分布式环境中设计应用程序时，存在三个基本需求，即一致性（Consistency）、可用性（Availability）和分区容错性（Partition\
    \ tolerance）。\n\n*   **一致性**意味着在任何改变数据的操作执行后，数据保持一致，并且所有访问应用程序的用户或客户端都能看到相同的更新数据。\n\
    *   **可用性**意味着系统始终可用。\n*   **分区容错性**意味着即使系统被划分为无法相互通信的服务器组，系统仍将继续运行。\n\nCAP 定理指出，在任何时间点，分布式系统只能满足上述三个保证中的两个（图\
    \ 2-2）。\n\n![A332296_1_En_2_Fig2_HTML.jpg](img/A332296_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2. CAP 定理\n\n### 2.3.2 BASE\n\nEric Brewer 创造了 BASE 这个缩写。BASE 可以解释为：\n\n\
    *   **基本可用（Basically Available）** 意味着系统在 CAP 定理的范围内是可用的。\n*   **软状态（Soft state）**\
    \ 表示即使没有向系统提供输入，状态也会随时间变化。这符合最终一致性。\n*   **最终一致性（Eventual consistency）** 意味着系统将在长期内达到一致性，前提是在此期间没有向系统发送输入。\n\
    \n因此，BASE 与 RDBMS ACID 事务形成对比。\n\n你已经看到 NoSQL 数据库是最终一致的，但最终一致性的实现可能因不同的 NoSQL\
    \ 数据库而异。\n\nNRW 是用于描述最终一致性模型如何在 NoSQL 数据库中实现的表示法，其中：\n\n*   `N` 是数据库维护的数据副本数量。\n\
    *   `R` 是应用程序在返回读取请求输出之前需要引用的副本数量。\n*   `W` 是在写入操作被标记为成功完成之前需要写入的数据副本数量。\n\n使用这些表示法配置，数据库实现了最终一致性模型。\n\
    \n一致性可以在读写操作级别实现。\n\n*   **写入操作**\n    *   `N=W` 意味着写入操作在将控制权返回给客户端并标记写入操作成功之前，将更新所有数据副本。这与传统\
    \ RDBMS 数据库在实现同步复制时的工作方式类似。此设置将减慢写入性能。\n    *   如果写入性能是一个问题，这意味着你希望写入操作快速发生，你可以设置\
    \ `W=1`，`R=N`。这意味着写入将只更新一个副本并标记写入成功，但每当用户发出读取请求时，它将读取所有副本以返回结果。如果任何一个副本未更新，它将确保该副本被更新，然后读取才会成功。此实现将减慢读取性能。\n\
    \    *   因此，大多数 NoSQL 实现使用 `N>W>1`。这意味着需要成功更新多于一个节点，但并非所有节点都需要同时更新。\n*   **读取操作**\n\
    \    *   如果 `R` 设置为 1，读取操作将读取任何一个数据副本，这可能是过时的。如果 `R>1`，则读取多个副本，并将读取最新值。但是，这可能会减慢读取操作。\n\
    \    *   使用 `N<W+R` 总能确保读取操作检索到最新值。这是因为写入副本和读取副本的总数总是大于实际副本数，确保至少一个读取副本具有最新版本。这就是**法定人数装配**。\n\
    \n表 2-1 比较了 ACID 和 BASE。\n\n表 2-1. ACID vs. BASE\n\n| ACID | BASE |\n| --- | ---\
    \ |\n| 原子性 | 基本可用 |\n| 一致性 | 最终一致性 |\n| 隔离性 | 软状态 |\n| 持久性 | |\n\n## 2.4 NoSQL\
    \ 的优势与劣势\n\n在本节中，你将了解 NoSQL 数据库的优势和劣势。"
- fmt: '### 2.4.1 Advantages of NoSQL


    Let’s talk about the advantages of `NoSQL` databases.


    *   High scalability: This scaling up approach fails when the transaction rates
    and fast response requirements increase. In contrast to this, the new generation
    of `NoSQL` databases is designed to scale out (i.e. to expand horizontally using
    low-end commodity servers).

    *   Manageability and administration: `NoSQL` databases are designed to mostly
    work with automated repairs, distributed data, and simpler data models, leading
    to low manageability and administration.

    *   Low cost: `NoSQL` databases are typically designed to work with a cluster
    of cheap commodity servers, enabling the users to store and process more data
    at a low cost.

    *   Flexible data models: `NoSQL` databases have a very flexible data model, enabling
    them to work with any type of data; they don’t comply with the rigid `RDBMS` data
    models. As a result, any application changes that involve updating the database
    schema can be easily implemented.


    ### 2.4.2 Disadvantages of NoSQL


    In addition to the above mentioned advantages, there are many impediments that
    you need to be aware of before you start developing applications using these platforms.


    *   Maturity: Most `NoSQL` databases are pre-production versions with key features
    that are still to be implemented. Thus, when deciding on a `NoSQL` database, you
    should analyze the product properly to ensure the features are fully implemented
    and not still on the To-do list .

    *   Support: Support is one limitation that you need to consider. Most `NoSQL`
    databases are from start-ups which were open sourced. As a result, support is
    very minimal as compared to the enterprise software companies and may not have
    global reach or support resources.

    *   Limited Query Capabilities: Since `NoSQL` databases are generally developed
    to meet the scaling requirement of the web-scale applications, they provide limited
    querying capabilities. A simple querying requirement may involve significant programming
    expertise.

    *   Administration: Although `NoSQL` is designed to provide a no-admin solution,
    it still requires skill and effort for installing and maintaining the solution.

    *   Expertise: Since `NoSQL` is an evolving area, expertise on the technology
    is limited in the developer and administrator community.


    Although `NoSQL` is becoming an important part of the database landscape, you
    need to be aware of the limitations and advantages of the products to make the
    correct choice of the `NoSQL` database platform.


    ### 2.5 SQL vs. NoSQL Databases


    Now you know the details regarding `NoSQL` databases. Although `NoSQL` is increasingly
    getting adopted as a database solution, it’s not here to replace `SQL` or `RDBMS`
    databases . In this section, you will look at the differences between `SQL` and
    `NoSQL` databases.


    Let’s do a quick recap of the `RDBMS` system. `RDBMS` systems have prevailed for
    about 30 years, and even now they are the default choice of the solution architect
    for data storage for an application. If we will list a few of the good points
    of `RDBMS` system, first and the foremost is the use of `SQL`, which is a rich
    declarative query language used for data processing. It is well understood by
    users. In addition, the `RDBMS` system offers `ACID` support for transactions,
    which is a must in many sectors, such as banking applications.


    However, the biggest drawbacks of the `RDBMS` system are its difficulty in handling
    schema changes and scaling issues as data increases. As data increases, the read
    read/write performance degrades. You face scaling issues with `RDBMS` systems
    because they are mostly designed to scale up and not scale out.


    In contrast to the `SQL RDBMS` databases, `NoSQL` promotes the data stores, which
    break away from the `RDBMS` paradigm.


    Let’s talk about technical scenarios and how they compare in `RDBMS` vs. `NoSQL`
    :'
