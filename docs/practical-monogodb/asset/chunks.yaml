    Distribution with tagging


    #### 7.5.6.3 Scaling with Tagging


    Next, you will look at how to scale with tagging . Let’s change the scenario.
    Let’s assume the collection `movies.action` needs two servers for its data. Since
    you have only three shards, this means the other two collection’s data need to
    be moved to one shard.


    In this scenario, you will change the tagging of the shards. You will add the
    tag “comedies” to Shard0 and remove the tag from Shard2, and further add the tag
    “actions” to Shard2.


    This means that the chunks tagged “comedies” will be moved to Shard0 and chunks
    tagged “actions” will be spread to Shard2.


    You first move the collection `movies.comedy` chunk to Shard0 and remove the same
    from Shard2:


    `mongos> sh.addShardTag("shard0000","comedies")`


    `mongos> sh.removeShardTag("shard0002","comedies")`


    Next, you add the tag “actions” to Shard2, so that `movies.action` chunks are
    spread across Shard2 also:


    `mongos> sh.addShardTag("shard0002","actions")`


    Re-issuing the find command after some time will show the following results:


    `mongos> db.chunks.find({ns:"movies.drama"}, {shard:1, _id:0}).sort({shard:1})`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `{ "shard" : "shard0000" }`


    `mongos> db.chunks.find({ns:"movies.action"}, {shard:1, _id:0}).sort({shard:1})`


    `{ "shard" : "shard0001" }`


    `{ "shard" : "shard0001" }`


    `{ "shard" : "shard0001" }`


    `{ "shard" : "shard0001" }`


    `{ "shard" : "shard0001" }`


    `{ "shard" : "shard0001" }`


