    max\" : 1000})`\n\n任何字段值超出最大值和最小值的文档都将被拒绝。你还可以创建复合地理空间索引。\n\n让我们通过一个例子来理解这个索引是如何工作的。假设你有以下类型的文档：\n\
    \n```json\n{\"loc\":[0,100], \"desc\":\"coffeeshop\"}\n{\"loc\":[0,1], \"desc\"\
    :\"pizzashop\"}\n```\n\n如果用户的查询是找到她位置附近的所有咖啡店，那么以下复合索引可以提供帮助：\n\n`db.ensureIndex({\"\
    userloc\" : \"2d\", \"desc\" : 1})`\n\n### 干草堆索引\n\n干草堆索引是基于桶的地理空间索引（也称为地理空间干草堆索引）。它们对于需要在很小区域内查找位置并需要沿另一个维度进行过滤的查询非常有用，例如查找坐标在\
    \ 10 英里范围内且`type`字段值为`restaurant`的文档。\n\n在定义索引时，必须指定`bucketSize`参数，因为它决定了干草堆索引的粒度。例如，\n\
    \n`db.userplaces.ensureIndex({ userpos : \"geoHaystack\", type : 1 }, { bucketSize\
    \ : 1 })`\n\n此示例创建了一个索引，其中纬度或经度 1 个单位范围内的键存储在同一个桶中。你还可以在索引中包含一个额外的类别，这意味着在查找位置信息的同时也会查找该信息。\n\
    \n如果你的用例通常是搜索\"附近\"的位置（即\"25 英里内的餐厅\"），`haystack`索引会更高效。\n\n对于额外的索引字段（例如类别），可以在每个桶内找到并计数匹配项。\n\
    \n相反，如果你正在搜索\"最近的餐厅\"并希望不考虑距离返回结果，普通的`2d`索引会更高效。\n\n目前（截至 MongoDB 2.2.0），干草堆索引有一些限制：\n\
    \n*   干草堆索引中只能包含一个额外字段。\n*   额外的索引字段必须是单个值，不能是数组。\n*   不支持空的经度/纬度值。\n\n除了上述类型外，版本\
    \ 2.4 还引入了一种支持在集合上进行文本搜索的新索引类型。\n\n在 2.6 版本中，文本搜索功能脱离了之前的测试版，成为一项内置功能。它包括诸如支持\
    \ 15 种语言搜索等选项，以及一个可用于在电子商务网站上按产品或颜色设置分面导航的聚合选项。\n\n### 8.7.1.3 索引交叉\n\n索引交叉是在版本\
    \ 2.6 中引入的，它允许交叉使用多个索引来满足一个查询。进一步解释一下，让我们考虑一个`products`集合，它保存以下格式的文档：\n\n```json\n\
    { \"_id\": ObjectId(...),\"category\": [\"food\", \"grocery\"], \"item\": \"Apple\"\
    , \"location\": \"16th Floor Store\", \"arrival\": Date(...)}.\n```\n\n再假设该集合有以下两个索引：\n\
    \n```json\n{ \"item\": 1 }.\n{ \"location\": 1 }.\n```\n\n上述两个索引的交叉可用于以下查询：\n\n\
    `db.products.find ({\"item\": \"xyz\", \"location\": \"abc\"})`\n\n你可以运行`explain()`来确定上述查询是否使用了索引交叉。`explain`输出将包含以下阶段之一：`AND_SORTED`或`AND_HASH`。进行索引交叉时，可以使用整个索引或仅使用索引前缀。\n\
    \n你接下来需要了解此索引交叉功能如何影响复合索引的创建。\n\n创建复合索引时，索引中列出的键的顺序以及排序顺序（升序和降序）都很重要。因此，复合索引可能无法支持不包含索引前缀或键排序顺序不同的查询。\n\
    \n为了进一步解释，让我们考虑一个`products`集合，它有以下复合索引：\n\n`db.products.ensureIndex ({\"item\"\
    : 1, \"location\": 1})`\n\n除了引用复合索引所有字段的查询外，上述复合索引还可以支持使用任何索引前缀的查询（它也可以支持仅使用`item`字段的查询）。但它无法支持仅使用`location`字段或使用排序顺序不同的`item`键的查询。\n\
    \n相反，如果你创建两个单独的索引，一个在`item`上，另一个在`location`上，这两个索引可以单独或通过交叉来支持上述四种查询。因此，选择创建复合索引还是依赖索引交叉，取决于系统的需求。\n\
    \n请注意，当`sort()`操作需要一个与查询谓词完全分开的索引时，索引交叉将不适用。\n\n例如，假设对于`products`集合，你有以下索引：\n\n\
    ```json\n{ \"item\": 1 }.\n{ \"location\": 1 }.\n{ \"location\": 1, \"arrival_date\"\
    :-1 }.\n{ \"arrival_date\": -1 }.\n```\n\n对于以下查询，不会使用索引交叉：\n\n`db.products.find(\
    \ { item: \"xyz\"} ).sort( { location: 1 } )`\n\n也就是说，MongoDB 不会使用`{ item: 1 }`索引进行查询，也不会使用单独的`{\
    \ location: 1 }`或`{ location: 1, arrival_date: -1 }`索引进行排序。\n\n然而，对于以下查询可以使用索引交叉，因为索引`{location:\
    \ 1,arrival_date: -1 }`可以满足部分查询谓词：\n\n`db.products.find( { item: { \"xyz\"} ,\
    \ location: \"A\" } ).sort( { arrival_date: -1 } )`\n\n### 8.7.2 行为与限制\n\n最后，以下是你需要注意的一些行为和限制：\n\
    \n*   一个集合中可能不允许有超过[64 个索引](http://docs.mongodb.org/manual/reference/limits/#limit-number-of-indexes-per-collection)。\n\
    *   索引键不能大于[1024 字节](http://docs.mongodb.org/manual/reference/limits/#limit-index-size)。\n\
    *   如果文档的字段值大于此大小，则无法为该文档创建索引。\n*   以下命令可用于查询因过大而无法索引的文档：\n\n    `db.practicalCollection.find({<key>:\
    \ <too large to index>}).hint({$natural: 1})`\n\n*   索引名称（包括[命名空间](http://docs.mongodb.org/manual/reference/glossary/#term-namespace)）必须小于[128\
    \ 个字符](http://docs.mongodb.org/manual/reference/limits/#limit-index-name-length)。\n\
    *   插入/更新速度在一定程度上会受到索引的影响。\n*   不要维护未使用或将来不会使用的索引。\n*   由于[`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)查询的每个子句是并行执行的，每个子句可以使用不同的索引。\n\
    *   使用[`sort()`](http://docs.mongodb.org/manual/reference/method/cursor.sort/#cursor.sort%23cursor.sort)方法和[`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)运算符的查询将无法使用[`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)字段上的索引。\n\
    *   使用`$or`运算符的查询不受第二种[地理空间查询](http://docs.mongodb.org/manual/core/geospatial-indexes/)支持。\n\
    \n## 8.8 本章小结\n\n在本章中，你了解了数据在底层是如何存储的，以及如何通过日志记录实现写入。你还学习了 GridFS 以及 MongoDB 中可用的不同类型的索引。\n\
    \n在下一章中，你将从管理视角来审视 MongoDB。\n\n# 9. 管理 MongoDB\n\n> “管理 MongoDB 不同于管理传统的关系型数据库管理系统。虽然大多数管理任务并非必需或由系统自动完成，但仍有一些任务需要人工干预。”\n\
    \n在本章中，你将了解用于备份与恢复、导入与导出数据、管理服务器以及监控数据库实例的基本管理操作流程。\n"
- fmt: '## 9.1 Administration Tools


    Before you dive into the administration tasks, here’s a quick overview of the
    tools. Since MongoDB does not have a GUI-style administrative interface, most
    of the administrative tasks are done using the command line `mongo` shell. However,
    some UIs are available as separate community projects.


    ### 9.1.1 `mongo`


    The `mongo` shell is part of the MongoDB distribution. It’s an interactive JavaScript
    shell for the MongoDB database. It provides a powerful interface for administrators
    as well as developers to test queries and operations directly with the database.


    In previous chapters, you covered development using the shell. In this chapter,
    you will go through the system administration tasks using the shell.


    ### 9.1.2 Third-Party Administration Tools


    A number of third party tools are available for MongoDB. Most of the tools are
    web-based.


    A list of all of the third party administration tools that support MongoDB is
    maintained by 10gen on the MongoDB web site at [`https://docs.mongodb.org/ecosystem/tools/administration-interfaces/`](https://docs.mongodb.org/ecosystem/tools/administration-interfaces/).


    ## 9.2 Backup and Recovery


    Backup is one of the most important administrative tasks. It ensures that the
    data is safe and in case of any emergency can be restored back.


    If the data cannot be restored back, the backup is useless. So, after taking a
    backup, the administrator needs to ensure that it’s in a usable format and has
    captured the data in a consistent state.


    The first skill an administrator needs to learn is how to take backups and restore
    it back.


    ### 9.2.1 Data File Backup


    The easiest way to back up the database is to copy the data into the data directory
    folder.


    All of the MongoDB data is stored in a data directory, which by default is `C:\data\db`
    (in Windows) or `/data/db` (in LINUX). The default path can be changed to a different
    directory using the `–dbpath` option when starting the `mongod`.


    The data directory content is a complete picture of the data that is stored in
    the MongoDB database. Hence taking a MongoDB backup is simply copying the entire
    contents of the data directory folder.


    Generally, it is not safe to copy the data directory content when MongoDB is running.
    One option is to shut down the MongoDB server before copying the data directory
    content.


    If the server is shut down properly, the content of the data directory represents
    a safe snapshot of the MongoDB data, so it can be copied before the server is
    restarted again.


    Although this is a safe and effective way of taking backups, it’s not an ideal
    way, because it requires downtime.


    Next, you will discuss techniques of taking backups that do not require downtime.


    ### 9.2.2 `mongodump` and `mongorestore`


    `mongodump` is the MongoDB backup utility that is supplied as part of the MongoDB
    distribution. It works as a regular client by querying a MongoDB instance and
    writing all the read documents to the disk.


    Let’s perform a backup and then restore it to validate that the backup is in usable
    and consistent format.


    The following code snippets are from running the utilities on a Windows platform.
    The MongoDB server is running on the `localhost` instance.


    Open a terminal window and enter the following command:


    ```

    C:\> cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin> mongod --rest

    2015-07-15T22:26:47.288-0700 I CONTROL [initandlisten] MongoDB starting : pid=3820
    port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9

    .....................................................................................

    2015-07-15T22:28:23.563-0700 I NETWORK [websvr] admin web console waiting for
    connections on port 28017

    ```


    In order to run `mongodump`, execute the following in a new terminal window:


    ```

    C:\> cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin> mongodump

    2015-07-15T22:29:41.538-0700 writing admin.system.indexes to dump\admin\system.indexes.bson

    ................................

    2015-07-14T22:29:46.720-0700 writing mydbproc.users to dump\mydbproc\users.bson

    c:\practicalmongodb\bin>

    ```


    This dumps the entire database under the `dump` folder in the `bin` folder directory
    itself, as shown in Figure 9-1.


    ![A332296_1_En_9_Fig1_HTML.jpg](A332296_1_En_9_Fig1_HTML.jpg)

    *Figure 9-1. The dump folder*


    The `mongodump` utility by default connects to the `localhost` interface of the
    database on the default port.


    Next, it pulls and stores each database and collection’s associated data files
    into a predefined folder structure, which defaults to `./dump/[databasename]/[collectionname].bson`.


    The data is saved in `.bson` format, which is similar to the format used by MongoDB
    for storing its data internally.


    If content is already in the directory, it will remain untouched unless the dump
    contains same file. For example, if the dump contains the files `c1.bson` and
    `c2.bson`, and the output directory has files `c3.bson` and `c1.bson`, then `mongodump`
    will replace the `c1.bson` file of the folder with its `c1.bson` file, and will
    copy the `c2.bson` file, but it won’t remove or change the `c3.bson` file.


    You should make sure that the directory is empty before using it for `mongodump`
    unless you have a requirement of overlaying the data in your backups.


    #### 9.2.2.1 Single Database Backup


    In the above example, you executed `mongodump` with the default setting, which
    dumps all of the databases on the MongoDB database server.


    In a real-life scenario, you will have multiple application databases running
    on a single server, each having a different requirement of backup strategies.


    Specifying the `–d` parameter in the `mongodump` utility will let you take the
    backup’s database wise.


    ```

    c:\practicalmongodb\bin> mongodump -d mydbpoc

    2015-07-14T22:37:49.088-0700 writing mydbproc.mapreducecount1 to dump\mydbproc\
    mapreducecount1.bson

    ......................

    2015-07-14T22:37:54.217-0700 writing mydbproc.users metadata to dump\mydbproc\users.metadata.json

    2015-07-14T22:37:54.218-0700 done dumping mydbproc.users

    c:\practicalmongodb\bin>

    ```


    As of MongoDB-2.6, database administrator must have access to `admin` database
    in order to backup users and user-defined roles for given database as MongoDB
    stores these information in `admin` database only.


    #### 9.2.2.2 Collection Level Backup


    There are two types of data in every database: data that changes rarely, such
    as configuration data where you maintain the users, their roles, and any application-related
    configurations, and then you have data that changes frequently such as the events
    data (in case of a monitoring application), posts data (in case of blog application),
    and so on.


    As a result, the backup requirements are different. For instance, the complete
    database can be backed up once a week whereas the rapidly changing collection
    needs to be backed up every hour.


    Specifying the `–c` parameter in the `mongodump` utility enables the user to implement
    backups for a specified collection individually.


    ```

    c:\practicalmongodb\bin> mongodump -d mydbpoc -c users

    2015-07-14T22:41:19.850-0700 writing mydbproc.users to dump\mydbproc\users.bson

    2015-07-14T22:41:30.710-0700 writing mydbproc.users metadata to dump\mydbproc\users.metadata.json

    ...........................................................

    2015-07-14T22:41:30.712-0700 done dumping mydbproc.users

    c:\practicalmongodb\bin>

    ```


    If the folder where the data needs to be dumped is not specified, by default it
    dumps the data in a directory named `dump` in the current working directory, which
    in this case is `c:\practicalmongodb\bin`.


    #### 9.2.2.3 `mongodump` –Help


    You have covered the basics of executing `mongodump`. Apart from the options mentioned
    above, `mongodump` provides other options that let you tailor the backups as per
    requirements. As with all other utilities, executing the utility with the `–help`
    option will provide the list of all available options.'
  raw: '## 9.1 Administration Tools


    Before you dive into the administration tasks, here’s a quick overview of the
    tools. Since MongoDB does not have a GUI-style administrative interface, most
    of the administrative tasks are done using the command line mongo shell. However,
    some UIs are available as separate community projects.


    ### 9.1.1 mongo


    The mongo shell is part of the MongoDB distribution. It’s an interactive JavaScript
    shell for the MongoDB database. It provides a powerful interface for administrators
    as well as developers to test queries and operations directly with the database.


    In previous chapters, you covered development using the shell. In this chapter,
    you will go through the system administration tasks using the shell.


    ### 9.1.2 Third-Party Administration Tools


    A number of third party tools are available for MongoDB. Most of the tools are
    web-based.


    A list of all of the third party administration tools that support MongoDB is
    maintained by 10gen on the MongoDB web site at [`https://docs.mongodb.org/ecosystem/tools/administration-interfaces/`](https://docs.mongodb.org/ecosystem/tools/administration-interfaces/)
    .


    ## 9.2 Backup and Recovery


    Backup is one of the most important administrative tasks. It ensures that the
    data is safe and in case of any emergency can be restored back.


    If the data cannot be restored back, the backup is useless. So, after taking a
    backup, the administrator needs to ensure that it’s in a usable format and has
    captured the data in a consistent state.


    The first skill an administrator needs to learn is how to take backups and restore
    it back.


    ### 9.2.1 Data File Backup


    The easiest way to back up the database is to copy the data into the data directory
    folder.


    All of the MongoDB data is stored in a data directory, which by default is `C:\data\db`
    (in Windows) or `/data/db` (in LINUX). The default path can be changed to a different
    directory using the `–dbpath` option when starting the mongod.


    The data directory content is a complete picture of the data that is stored in
    the MongoDB database. Hence taking a MongoDB backup is simply copying the entire
    contents of the data directory folder.


    Generally, it is not safe to copy the data directory content when MongoDB is running.
    One option is to shut down the MongoDB server before copying the data directory
    content.


    If the server is shut down properly, the content of the data directory represents
    a safe snapshot of the MongoDB data, so it can be copied before the server is
    restarted again.


    Although this is a safe and effective way of taking backups, it’s not an ideal
    way, because it requires downtime.


    Next, you will discuss techniques of taking backups that do not require downtime.


    ### 9.2.2 mongodump and mongorestore


    mongodump is the MongoDB backup utility that is supplied as part of the MongoDB
    distribution. It works as a regular client by querying a MongoDB instance and
    writing all the read documents to the disk.


    Let’s perform a backup and then restore it to validate that the backup is in usable
    and consistent format.


    The following code snippets are from running the utilities on a Windows platform.
    The MongoDB server is running on the localhost instance.


    Open a terminal window and enter the following command:


    `C:\>` `cd c:\practicalmongodb\bin`


    `c:\practicalmongodb\bin>` `mongod --rest`


    `2015-07-15T22:26:47.288-0700 I CONTROL [initandlisten] MongoDB starting : pid=3820
    port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9`


    `.....................................................................................`


    `2015-07-15T22:28:23.563-0700 I NETWORK [websvr] admin web console waiting for
    connections on port 28017`


    In order to run mongodump, execute the following in a new terminal window:


    `C:\>` `cd c:\practicalmongodb\bin`


    `c:\practicalmongodb\bin>` `mongodump`


    `2015-07-15T22:29:41.538-0700 writing admin.system.indexes to dump\admin\system.indexes.bson`


    `................................`


    `2015-07-14T22:29:46.720-0700 writing mydbproc.users to dump\mydbproc\users.bson`


    `c:\practicalmongodb\bin>`


    This dumps the entire database under the `dump` folder in the `bin` folder directory
    itself, as shown in Figure [9-1](#A332296_1_En_9_Chapter.html#Fig1).


    ![A332296_1_En_9_Fig1_HTML.jpg](A332296_1_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    The dump folder


    The mongodump utility by default connects to the localhost interface of the database
    on the default port.


    Next, it pulls and stores each database and collection’s associated data files
    into a predefined folder structure, which defaults to `./dump/[databasename]/[collectionname].bson`.


    The data is saved in `.bson` format, which is similar to the format used by MongoDB
    for storing its data internally.


    If content is already in the directory, it will remain untouched unless the dump
    contains same file. For example, if the dump contains the files `c1.bson` and
    `c2.bson`, and the output directory has files `c3.bson` and `c1.bson`, then mongodump
    will replace the `c1.bson` file of the folder with its `c1.bson` file, and will
    copy the `c2.bson` file, but it won’t remove or change the `c3.bson` file.


    You should make sure that the directory is empty before using it for mongodump
    unless you have a requirement of overlaying the data in your backups.


    #### 9.2.2.1 Single Database Backup


    In the above example, you executed mongodump with the default setting, which dumps
    all of the databases on the MongoDB database server.


    In a real-life scenario, you will have multiple application databases running
    on a single server, each having a different requirement of backup strategies.


    Specifying the `–d` parameter in the mongodump utility will let you take the backup’s
    database wise.


    `c:\practicalmongodb\bin>` `mongodump -d mydbpoc`


    `2015-07-14T22:37:49.088-0700 writing mydbproc.mapreducecount1 to dump\mydbproc\
    mapreducecount1.bson`


    `......................`


    `2015-07-14T22:37:54.217-0700 writing mydbproc.users metadata to dump\mydbproc\users.metadata.json`


    `2015-07-14T22:37:54.218-0700 done dumping mydbproc.users`


    `c:\practicalmongodb\bin>`


    As of MongoDB-2.6, database administrator must have access to admin database in
    order to backup users and user-defined roles for given database as MongoDB stores
    these information in admin database only.


    #### 9.2.2.2 Collection Level Backup


    There are two types of data in every database: data that changes rarely, such
    as configuration data where you maintain the users, their roles, and any application-related
    configurations, and then you have data that changes frequently such as the events
    data (in case of a monitoring application), posts data (in case of blog application),
    and so on.


    As a result, the backup requirements are different. For instance, the complete
    database can be backed up once a week whereas the rapidly changing collection
    needs to be backed up every hour.


    Specifying the `–c` parameter in the mongodump utility enables the user to implement
    backups for a specified collection individually.


    `c:\practicalmongodb\bin>` `mongodump -d mydbpoc -c users`


    `2015-07-14T22:41:19.850-0700 writing mydbproc.users to dump\mydbproc\users.bson`


    `2015-07-14T22:41:30.710-0700 writing mydbproc.users metadata to dump\mydbproc\users.metadata.json`


    `...........................................................`


    `2015-07-14T22:41:30.712-0700 done dumping mydbproc.users`


    `c:\practicalmongodb\bin>`


    If the folder where the data needs to be dumped is not specified, by default it
    dumps the data in a directory named `dump` in the current working directory, which
    in this case is `c:\practicalmongodb\bin`.


    #### 9.2.2.3 mongodump –Help


    You have covered the basics of executing mongodump. Apart from the options mentioned
    above, mongodump provides other options that let you tailor the backups as per
    requirements. As with all other utilities, executing the utility with the `–help`
    option will provide the list of all available options.'
  trans: '

    ## 9.1 管理工具


    在您开始进行管理任务之前，这里快速概览一下可用的工具。由于 MongoDB 没有图形用户界面风格的管理界面，大多数管理任务都是通过命令行`mongo` shell
    完成的。不过，也有一些作为独立社区项目提供的用户界面。


    ### 9.1.1 `mongo`


    `mongo` shell 是 MongoDB 发行版的一部分。它是一个用于 MongoDB 数据库的交互式 JavaScript shell。它为管理员和开发人员提供了一个强大的界面，可以直接与数据库测试查询和操作。


    在之前的章节中，您已经了解了使用 shell 进行开发。在本章中，您将学习如何使用 shell 执行系统管理任务。


    ### 9.1.2 第三方管理工具


    有许多可用于 MongoDB 的第三方工具。大多数工具是基于 Web 的。


    10gen 在 MongoDB 网站上维护了一个支持 MongoDB 的所有第三方管理工具列表：[`https://docs.mongodb.org/ecosystem/tools/administration-interfaces/`](https://docs.mongodb.org/ecosystem/tools/administration-interfaces/)。


    ## 9.2 备份与恢复


    备份是最重要的管理任务之一。它确保数据安全，并在任何紧急情况下可以恢复。


    如果数据无法恢复，备份就毫无用处。因此，在进行备份后，管理员需要确保备份是可用的格式，并且捕获了数据的一致状态。


    管理员需要学习的第一项技能是如何进行备份和恢复。


    ### 9.2.1 数据文件备份


    备份数据库最简单的方法是将数据复制到数据目录文件夹中。


    所有 MongoDB 数据都存储在一个数据目录中，默认情况下是`C:\data\db`（在 Windows 中）或`/data/db`（在 LINUX 中）。可以在启动`mongod`时使用`–dbpath`选项将默认路径更改为其他目录。


    数据目录的内容是存储在 MongoDB 数据库中数据的完整映像。因此，进行 MongoDB 备份就是简单地复制数据目录文件夹的全部内容。


    通常，在 MongoDB 运行时复制数据目录内容是不安全的。一个选择是在复制数据目录内容之前关闭 MongoDB 服务器。


    如果服务器被正常关闭，数据目录的内容就代表了 MongoDB 数据的安全快照，因此可以在服务器再次启动之前复制它。


    虽然这是一种安全有效的备份方式，但它并不理想，因为它需要停机时间。


    接下来，您将讨论不需要停机时间的备份技术。


    ### 9.2.2 `mongodump` 和 `mongorestore`


    `mongodump`是作为 MongoDB 发行版一部分提供的 MongoDB 备份工具。它作为一个常规客户端工作，通过查询 MongoDB 实例并将所有读取的文档写入磁盘。


    让我们执行一次备份，然后将其恢复，以验证备份是否可用且格式一致。


    以下代码片段来自在 Windows 平台上运行这些工具。MongoDB 服务器运行在`localhost`实例上。


    打开一个终端窗口并输入以下命令：


    ```

    C:\> cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin> mongod --rest

    2015-07-15T22:26:47.288-0700 I CONTROL [initandlisten] MongoDB starting : pid=3820
    port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9

    .....................................................................................

    2015-07-15T22:28:23.563-0700 I NETWORK [websvr] admin web console waiting for
    connections on port 28017

    ```


    为了运行`mongodump`，在一个新的终端窗口中执行以下命令：


    ```

    C:\> cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin> mongodump

    2015-07-15T22:29:41.538-0700 writing admin.system.indexes to dump\admin\system.indexes.bson

    ................................

    2015-07-14T22:29:46.720-0700 writing mydbproc.users to dump\mydbproc\users.bson

    c:\practicalmongodb\bin>

    ```


    这将整个数据库转储到`bin`文件夹目录下的`dump`文件夹中，如图 9-1 所示。


    ![A332296_1_En_9_Fig1_HTML.jpg](img/A332296_1_En_9_Fig1_HTML.jpg)

    *图 9-1. dump 文件夹*


    `mongodump`工具默认连接到数据库的`localhost`接口和默认端口。


    接下来，它会获取每个数据库和集合的相关数据文件，并将其存储到一个预定义的文件夹结构中，默认为`./dump/[databasename]/[collectionname].bson`。


    数据以`.bson`格式保存，这与 MongoDB 内部用于存储数据的格式类似。


    如果目录中已有内容，除非转储包含同名文件，否则这些内容将保持不变。例如，如果转储包含文件`c1.bson`和`c2.bson`，而输出目录已有文件`c3.bson`和`c1.bson`，那么`mongodump`将用其`c1.bson`文件替换文件夹中的`c1.bson`文件，并复制`c2.bson`文件，但不会删除或更改`c3.bson`文件。


    您应确保目录在用于`mongodump`之前是空的，除非您有覆盖备份数据的需求。


    #### 9.2.2.1 单数据库备份


    在上面的例子中，您使用默认设置执行了`mongodump`，它会转储 MongoDB 数据库服务器上的所有数据库。


    在现实场景中，您会在单个服务器上运行多个应用数据库，每个数据库对备份策略有不同的要求。


    在`mongodump`工具中指定`–d`参数将允许您按数据库进行备份。


    ```

    c:\practicalmongodb\bin> mongodump -d mydbpoc

    2015-07-14T22:37:49.088-0700 writing mydbproc.mapreducecount1 to dump\mydbproc\
    mapreducecount1.bson

    ......................

    2015-07-14T22:37:54.217-0700 writing mydbproc.users metadata to dump\mydbproc\users.metadata.json

    2015-07-14T22:37:54.218-0700 done dumping mydbproc.users

    c:\practicalmongodb\bin>

    ```


    从 MongoDB-2.6 开始，数据库管理员必须拥有`admin`数据库的访问权限，才能备份给定数据库的用户和用户定义的角色，因为 MongoDB 仅将这些信息存储在`admin`数据库中。


    #### 9.2.2.2 集合级别备份


    每个数据库中有两种类型的数据：变化很少的数据，例如您维护用户、其角色以及任何应用相关配置的配置数据；以及变化频繁的数据，例如事件数据（在监控应用中）、帖子数据（在博客应用中）等。


    因此，备份要求也不同。例如，完整数据库可以每周备份一次，而快速变化的集合则需要每小时备份一次。


    在`mongodump`工具中指定`–c`参数，使用户能够单独为指定集合实施备份。


    ```

    c:\practicalmongodb\bin> mongodump -d mydbpoc -c users

    2015-07-14T22:41:19.850-0700 writing mydbproc.users to dump\mydbproc\users.bson

    2015-07-14T22:41:30.710-0700 writing mydbproc.users metadata to dump\mydbproc\users.metadata.json

    ...........................................................

    2015-07-14T22:41:30.712-0700 done dumping mydbproc.users

    c:\practicalmongodb\bin>

    ```


    如果未指定数据要转储到的文件夹，默认情况下，它会将数据转储到当前工作目录中名为`dump`的目录中，在本例中为`c:\practicalmongodb\bin`。


    #### 9.2.2.3 `mongodump` –帮助


    您已经了解了执行`mongodump`的基础知识。除了上面提到的选项，`mongodump`还提供了其他选项，让您可以根据需求定制备份。与所有其他工具一样，使用`–help`选项执行该工具将提供所有可用选项的列表。

    '
- fmt: '## 9.2.2 mongorestore


    As mentioned, it is mandatory for the administrators to ensure that the backups
    are happening in a consistent and usable format. So the next step is to restore
    the data dump back using `mongorestore`.


    This utility will restore the database back to the state when the dump was taken.
    Prior to version 3.0, it was allowed to run the command without even starting
    the `mongod`/`mongos`. Starting from version 3.0, if the command is executed before
    starting the `mongod`/`mongos` the following error(s) will show:


    ```

    c:\> cd c:\practicalmongodb\bin

    c:\ practicalmongodb\bin> mongorestore

    2015-07-15T22:43:07.365-0700 using default ''dump'' directory

    2015-07-15T22:43:17.545-0700 Failed: error connecting to db server: no reachable
    servers

    ```


    You must run the `mongod`/`mongos` instance prior to running the `mongorestore`
    command.


    ```

    c:\> cd c:\practicalmongodb\bin

    c:\ practicalmongodb\bin> mongod --rest

    2015-07-15T22:43:25.765-0700 I CONTROL [initandlisten] MongoDB starting : pid=3820
    port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9

    .....................................................................................

    2015-07-15T22:43:25.865-0700 I NETWORK [websvr] admin web console waiting for
    connections on port 28017

    c:\ practicalmongodb\bin> mongorestore

    2015-07-15T22:44:09.786-0700 using default ''dump'' directory

    2015-07-15T22:44:09.792-0700 building a list of dbs and collections to restore
    from dump dir

    ...................................

    2015-07-15T22:44:09.732-0700 restoring indexes for collection mydbproc.users from
    metadata

    2015-07-15T22:44:09.864-0700 finished restoring mydbproc.users

    c:\practicalmongodb\bin>

    ```


    This force appends the data to the back of the existing data.


    To override the default behavior, `–drop` should be used in the above snippet.


    The `–drop` command indicates to the `mongorestore` utility that it needs to delete
    all the collections and data within the aforementioned database and then restore
    the dump data back to the database.


    If `–drop` is not used, the command appends the data to the end of the existing
    data.


    Note that starting from version 3.0, the `mongorestore` command can also accept
    input from standard input.


    ### 9.2.2.5 Restoring a Single Database


    As you saw in the backup section, the backup strategies can be specified at individual
    database level. You can run `mongodump` to take a backup of a single database
    by using the `–d` option.


    Similarly, you can specify the `–d` option to `mongorestore` to restore individual
    databases.


    ```

    c:\ practicalmongodb\bin> mongorestore -d mydbpocc:\practicalmongodb\bin\dump\mydbproc
    -drop

    2015-07-14T22:47:01.155-0700 building a list of collections to restore from C
    :\practicalmongodb\bin\dump\mydbproc dir

    2015-07-14T22:47:01.156-0700 reading metadata file from C :\practicalmongodb\bin\dump\mydbproc
    \users.metadata.json

    ..........................................................................

    2015-07-14T22:50:09.732-0700 restoring indexes for collection mydbproc.users from
    metadata

    2015-07-14T22:50:09.864-0700 finished restoring mydbproc.users

    c:\practicalmongodb\bin>

    ```


    ### 9.2.2.6 Restoring a Single Collection


    As with `mongodump` where you can use `–c` option to specify collection-level
    backups, you can also restore individual collections by using the `–c` option
    with the `mongorestore` utility.


    ```

    c:\ practicalmongodb\bin> mongorestore -d mydbpoc -c users C:\ practicalmongodb\bin\dum\mydb\user.bson
    -drop

    2015-07-14T22:52:14.732-0700 restoring indexes for collection mydbproc.users from
    metadata

    2015-07-14T22:52:14.864-0700 finished restoring mydbproc.users

    c:\practicalmongodb\bin>

    ```


    ### 9.2.2.7 Mongorestore –Help


    The `mongorestore` also has multiple options, which can be viewed using the `–help`
    option. Consult the following web site also: [http://docs.mongodb.org/manual/core/backups/](http://docs.mongodb.org/manual/core/backups/).


    ## 9.2.3 fsync and Lock


    Although the above two methods (`mongodump` and `mongorestore`) enable you take
    a database backup without any downtime, they don’t provide the ability to get
    a point-in-time data view.


    You saw how to copy the data files to take the backups, but this requires shutting
    down the server before copying the data, which is not feasible in a production
    environment.


    MongoDB’s `fsync` command lets you copy content of the data directory by running
    MongoDB without changing any data.


    The `fsync` command forces all pending writes to be flushed to the disk. Optionally,
    it holds a lock in order to prevent further writes until the server is unlocked.
    This lock only makes the `fsync` command usable for backups.


    To run the command from the shell, connect to the `mongo` console in a new terminal
    window.


    ```

    c:\practicalmongodb\bin> mongo

    MongoDB shell version: 3.0.4

    connecting to: test

    >

    ```


    Next, switch to admin and issue the `runCommand` to `fsync`:


    ```

    > use admin

    switched to db admin

    > db.runCommand({"fsync":1, "lock":1})

    {

    "info" : "now locked against writes, use db.fsyncUnlock() to unlock",

    "seeAlso" : "http://dochub.mongodb.org/core/fsynccommand",

    "ok" : 1

    }

    >

    ```


    At this point, the server is locked for any writes, ensuring that the data directory
    is representing a consistent, point-in-time snapshot of the data. The data directory
    contents can be safely copied to be used as the database backup.


    You must unlock the database post the completion of the backup activity. In order
    to do so, issue the following command:


    ```

    > db.$cmd.sys.unlock.findOne()

    { "ok" : 1, "info" : "unlock completed" }

    >

    ```


    The `currentOp` command can be used to check whether the database lock has been
    released or not.


    ```

    > db.currentOp()

    { "inprog" : [ ] }

    (It may take a moment after the unlock is first requested.)

    ```


    The `fsync` command lets you take a backup without downtime and without sacrificing
    the backup’s point-in-time nature. However, there is a momentary blocking of the
    writes (also called a momentary write downtime).


    Starting from version 3.0, when using WiredTiger, `fsync` cannot guarantee that
    the data files will not change. So it cannot be used to ensure consistency for
    creating backups.


    Next, you’ll learn about slave backup. This is the only backup technique that
    enables taking a point-in-time snapshot without any kind of downtime.


    ## 9.2.4 Slave Backups


    Slave backups are the recommended way for data backups in MongoDB. The slave always
    stores a data copy that is nearly in sync with the master, and the slave availability
    or performance is not much of an issue. You can apply any of the techniques discussed
    earlier on the slave rather than the master: shutting down, `fsync` with lock,
    or dump and restore.


    ## 9.3 Importing and Exporting


    When you are trying to migrate your application from one environment to another,
    you often need to import data or export data.'
  raw: '#### 9.2.2.4 mongorestore


    As mentioned, it is mandatory for the administrators to ensure that the backups
    are happening in a consistent and usable format. So the next step is to restore
    the data dump back using mongorestore.


    This utility will restore the database back to the state when the dump was taken.
    Prior to version 3.0, it was allowed to run the command without even starting
    the mongod/mongos. Starting from version 3.0, if the command is executed before
    starting the mongod/mongos the following error(s) will show:


    `c:\>` `cd` `c:\practicalmongodb\bin`


    `c:\ practicalmongodb\bin>` `mongorestore`


    `2015-07-15T22:43:07.365-0700 using default ''dump'' directory`


    `2015-07-15T22:43:17.545-0700 Failed: error connecting to db server: no reachable
    servers`


    You must run the mongod/mongos instance prior to running the `mongorestore` command.


    `c:\>` `cd` `c:\practicalmongodb\bin`


    `c:\ practicalmongodb\bin>` `mongod --rest`


    `2015-07-15T22:43:25.765-0700 I CONTROL [initandlisten] MongoDB starting : pid=3820
    port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9`


    `.....................................................................................`


    `2015-07-15T22:43:25.865-0700 I NETWORK [websvr] admin web console waiting for
    connections on port 28017`


    `c:\ practicalmongodb\bin>` `mongorestore`


    `2015-07-15T22:44:09.786-0700 using default ''dump'' directory`


    `2015-07-15T22:44:09.792-0700 building a list of dbs and collections to restore
    from dump dir`


    `...................................`


    `2015-07-15T22:44:09.732-0700 restoring indexes for collection mydbproc.users
    from metadata`


    `2015-07-15T22:44:09.864-0700 finished restoring mydbproc.users`


    `c:\practicalmongodb\bin>`


    This force appends the data to the back of the existing data.


    To override the default behavior, `–drop` should be used in the above snippet.


    The `–drop` command indicates to the mongorestore utility that it needs to delete
    all the collections and data within the aforementioned database and then restore
    the dump data back to the database.


    If `–drop` is not used, the command appends the data to the end of the existing
    data.


    Note that starting from version 3.0, the `mongorestore` command can also accept
    input from standard input.


    #### 9.2.2.5 Restoring a Single Database


    As you saw in the backup section, the backup strategies can be specified at individual
    database level. You can run `mongodump` to take a backup of a single database
    by using the `–d` option.


    Similarly, you can specify the `–d` option to `mongorestore` to restore individual
    databases.


    `c:\ practicalmongodb\bin>` `mongorestore -d mydbpocc:\practicalmongodb\bin\dump\mydbproc
    -drop`


    `2015-07-14T22:47:01.155-0700 building a list of collections to restore from C
    :\practicalmongodb\bin\dump\mydbproc dir`


    `2015-07-14T22:47:01.156-0700 reading metadata file from C :\practicalmongodb\bin\dump\mydbproc
    \users.metadata.json`


    `..........................................................................`


    `2015-07-14T22:50:09.732-0700 restoring indexes for collection mydbproc.users
    from metadata`


    `2015-07-14T22:50:09.864-0700 finished restoring mydbproc.users`


    `c:\practicalmongodb\bin>`


    #### 9.2.2.6 Restoring a Single Collection


    As with mongodump where you can use `–c` option to specify collection-level backups,
    you can also restore individual collections by using the `–c` option with the
    mongorestore utility.


    `c:\ practicalmongodb\bin>` `mongorestore -d mydbpoc -c users C:\ practicalmongodb\bin\dum\mydb\user.bson
    -drop`


    `2015-07-14T22:52:14.732-0700 restoring indexes for collection mydbproc.users
    from metadata`


    `2015-07-14T22:52:14.864-0700 finished restoring mydbproc.users`


    `c:\practicalmongodb\bin>`


    #### 9.2.2.7 Mongorestore –Help


    The mongorestore also has multiple options, which can be viewed using the `–help`
    option. Consult the following web site also: [`http://docs.mongodb.org/manual/core/backups/`](http://docs.mongodb.org/manual/core/backups/)
    .


    ### 9.2.3 fsync and Lock


    Although the above two methods (mongodump and mongorestore) enable you take a
    database backup without any downtime, they don’t provide the ability to get a
    point-in-time data view.


    You saw how to copy the data files to take the backups, but this requires shutting
    down the server before copying the data, which is not feasible in a production
    environment.


    MongoDB’s `fsync` command lets you copy content of the data directory by running
    MongoDB without changing any data.


    The `fsync` command forces all pending writes to be flushed to the disk. Optionally,
    it holds a lock in order to prevent further writes until the server is unlocked.
    This lock only makes the `fsync` command usable for backups.


    To run the command from the shell, connect to the mongo console in a new terminal
    window.


    `c:\practicalmongodb\bin>` `mongo`


    `MongoDB shell version: 3.0.4`


    `connecting to: test`


    `>`


    Next, switch to admin and issue the `runCommand` to `fsync`:


    `>` `use admin`


    `switched to db admin`


    `>` `db.runCommand({"fsync":1, "lock":1})`


    `{`


    `"info" : "now locked against writes, use db.fsyncUnlock() to unlock",`


    `"seeAlso" : "` [`http://dochub.mongodb.org/core/fsynccommand`](http://dochub.mongodb.org/core/fsynccommand)
    `",`


    `"ok" : 1`


    `}`


    `>`


    At this point, the server is locked for any writes, ensuring that the data directory
    is representing a consistent, point-in-time snapshot of the data. The data directory
    contents can be safely copied to be used as the database backup.


    You must unlock the database post the completion of the backup activity. In order
    to do so, issue the following command:


    `>` `db.$cmd.sys.unlock.findOne()`


    `{ "ok" : 1, "info" : "unlock completed" }`


    `>`


    The `currentOp` command can be used to check whether the database lock has been
    released or not.


    `>` `db.currentOp()`


    `{ "inprog" : [ ] }`


    `(It may take a moment after the unlock is first requested.)`


    The `fsync` command lets you take a backup without downtime and without sacrificing
    the backup’s point-in-time nature. However, there is a momentary blocking of the
    writes (also called a momentary write downtime).


    Starting from version 3.0, when using WiredTiger, `fsync` cannot guarantee that
    the data files will not change. So it cannot be used to ensure consistency for
    creating backups.


    Next, you’ll learn about slave backup. This is the only backup technique that
    enables taking a point-in-time snapshot without any kind of downtime.


    ### 9.2.4 Slave Backups


    Slave backups are the recommended way for data backups in MongoDB. The slave always
    stores a data copy that is nearly in sync with the master, and the slave availability
    or performance is not much of an issue. You can apply any of the techniques discussed
    earlier on the slave rather than the master: shutting down, `fsync` with lock,
    or dump and restore.


    ## 9.3 Importing and Exporting


    When you are trying to migrate your application from one environment to another,
    you often need to import data or export data .'
