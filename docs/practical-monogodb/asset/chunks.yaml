- fmt: '### 7.5.7 准备工作


    #### 7.5.7.1 预分裂数据


    与其让 MongoDB 决定如何创建分片块，你可以使用以下命令告诉 MongoDB 具体如何操作：


    ```

    db.runCommand( { split : "practicalmongodb.mycollection" , middle : { shardkey
    : value } } );

    ```


    之后，你还可以指定哪些分片块分配到哪个节点。


    要做到这些，你需要了解即将导入数据库的数据特性。这也取决于你想要解决的应用场景以及应用程序如何读取数据。在决定分片块的放置位置时，请考虑数据局部性等因素。


    #### 7.5.7.2 决定分片块大小


    在决定分片块大小时，需要牢记以下几点：


    如果分片块尺寸过小，数据虽能均匀分布，但会导致更频繁的迁移，这在 `mongos` 层面是一项昂贵的操作。如果尺寸过大，则会减少迁移次数，降低 `mongos`
    层面的开销，但会导致数据分布不均。


    #### 7.5.7.3 选择一个好的分片键


    为分片集群中的节点选择一个好的分片键以实现良好的数据分布至关重要。


    ### 7.5.8 分片监控


    除了对其他 MongoDB 实例进行的常规监控和分析外，分片集群还需要额外的监控，以确保其所有操作正常运行，并且数据在节点间有效分布。本节将介绍为确保分片集群正常运行应进行的监控。


    ### 7.5.9 监控配置服务器


    配置服务器存储了分片集群的元数据。`mongos` 会缓存这些数据并将请求路由到相应的分片。如果配置服务器宕机但 `mongos` 实例仍在运行，分片集群不会立即受到影响，并且会在一段时间内保持可用。然而，你将无法执行像分片块迁移或启动新
    `mongos` 这样的操作。长期来看，配置服务器的不可用会严重影响集群的可用性。为确保集群保持平衡和可用，你应该监控配置服务器。


    #### 7.5.9.1 监控分片状态、平衡与分片块分布


    为了实现最有效的分片集群部署，需要分片块在分片之间均匀分布。如前所述，这是由 MongoDB 通过后台进程自动完成的。你需要监控分片状态以确保该进程有效工作。为此，你可以在
    `mongos` 的 mongo shell 中使用 `db.printShardingStatus()` 或 `sh.status()` 命令。


    #### 7.5.9.2 监控锁状态


    在几乎所有情况下，平衡器在完成其进程后会自动释放锁，但你需要检查数据库的锁状态，以确保没有持久锁，因为这会阻碍未来的平衡操作，从而影响集群的可用性。在 `mongos`
    的 mongo shell 中执行以下命令来检查锁状态：


    ```

    use config

    db.locks.find()

    ```


    ## 7.6 生产集群架构


    本节将介绍生产集群架构。为了便于理解，我们考虑一个社交网络应用程序的非常通用的用例：用户可以创建自己的朋友圈，并在群组内分享评论或图片。用户也可以评论或点赞好友的评论或图片。用户在地理上是分布式的。


    应用程序的需求是：所有评论需在各地理区域立即可用；数据应冗余，以防用户的评论、帖子和图片丢失；并且应具备高可用性。因此，应用程序的生产集群应包含以下组件：


    *   至少两个 [`mongos`](http://docs.mongodb.org/manual/reference/mongos/#mongos%23mongos)
    实例，但可以根据需要部署更多。

    *   三个 [`config servers`](http://docs.mongodb.org/manual/administration/sharded-clusters/#sharding-config-server)，每个位于独立的系统上。

    *   两个或更多个 [`replica sets`](http://docs.mongodb.org/manual/reference/glossary/#term-replica-set)
    作为 [`shards`](http://docs.mongodb.org/manual/reference/glossary/#term-shard)。副本集分布在不同的地理区域，读关注设置为
    `nearest`。参见图 7-25。


    ![A332296_1_En_7_Fig25_HTML.jpg](A332296_1_En_7_Fig25_HTML.jpg)

    图 7-25. 生产集群架构


    现在，让我们看看 MongoDB 生产部署中可能出现的故障场景及其对环境的影响。


    ### 7.6.1 场景一


    `mongos` 变得不可用：承载已宕机 `mongos` 的应用服务器将无法与集群通信，但这不会导致任何数据丢失，因为 `mongos` 本身不维护任何数据。`mongos`
    可以重启，在重启过程中，它会与配置服务器同步以缓存集群元数据，应用程序通常可以恢复正常操作（图 7-26）。


    ![A332296_1_En_7_Fig26_HTML.jpg](A332296_1_En_7_Fig26_HTML.jpg)

    图 7-26. `mongos` 变得不可用


    ### 7.6.2 场景二


    分片中某个副本集的一个 `mongod` 变得不可用：由于你使用了副本集来提供高可用性，因此没有数据丢失。如果是主节点宕机，则会选举出新的主节点；如果是辅助节点宕机，则它会断开连接，其余功能继续正常运行（图
    7-27）。


    ![A332296_1_En_7_Fig27_HTML.jpg](A332296_1_En_7_Fig27_HTML.jpg)

    图 7-27. 副本集中一个 `mongod` 不可用


    唯一的区别是数据的副本数量减少了，使得系统略微变弱，因此你应该并行检查该 `mongod` 是否可恢复。如果可以，应尽快恢复并重启；如果不可恢复，你需要尽快创建一个新的副本集来替换它。


    ### 7.6.3 场景三


    如果一个分片变得不可用：在此场景下，该分片上的数据将不可用，但其他分片仍然可用，因此不会阻止应用程序运行。应用程序可以继续其读/写操作；但是，必须在应用层处理部分结果的问题。同时，应尽快尝试恢复该分片（图
    7-28）。


    ![A332296_1_En_7_Fig28_HTML.jpg](A332296_1_En_7_Fig28_HTML.jpg)

    图 7-28. 分片不可用


    ### 7.6.4 场景四


    三个配置服务器中只有一个可用：在此场景下，集群将变为只读，但不会服务于任何可能导致集群结构变更（例如，分片块迁移或分片块拆分）的操作，从而导致元数据变更。应尽快更换配置服务器，因为如果所有配置服务器都不可用，将导致集群无法操作（图
    7-29）。


    ![A332296_1_En_7_Fig29_HTML.jpg](A332296_1_En_7_Fig29_HTML.jpg)

    图 7-29. 只有一个配置服务器可用


    ## 7.7 总结


    在本章中，你学习了核心进程与工具、独立部署、分片概念、复制概念以及生产部署。你还了解了如何实现高可用性（HA）。


    在下一章中，你将了解数据在底层的存储方式、写操作如何通过日志实现、`GridFS` 的用途以及 MongoDB 中可用的不同类型的索引。'
  raw: '#### 7.5.7.1 Pre-Splitting of the Data


    Instead of leaving the choice of chunks creation with MongoDB, you can tell MongoDB
    how to do so using the following command:


    `db.runCommand( { split : "practicalmongodb.mycollection" , middle : { shardkey
    : value } } );`


    Post this you can also let MongoDB know which chunks goes to which node.


    For all this you will need knowledge of the data you will be imported to the database.
    And this also depends on the use case you are aiming to solve and how the data
    is being read by your application. When deciding where to place the chunk, keep
    things like data locality in mind.


    #### 7.5.7.2 Deciding on the Chunk Size


    You need to keep the following points in mind when deciding on the chunk size
    :


    If the size is too small, the data will be distributed evenly but it will end
    up having more frequent migrations, which will be an expensive operation at the
    mongos layer.   If the size is large, it will lead to less migration, reducing
    the expense at the mongos layer, but you will end up with uneven data distribution.


    #### 7.5.7.3 Choosing a Good Shard Key


    It’s very essential to pick a good shard key for good distribution of data among
    nodes of the shard cluster .


    ### 7.5.8 Monitoring for Sharding


    In addition to the normal monitoring and analysis that is done for other MongoDB
    instances, the sharding cluster requires an additional monitoring to ensure that
    all its operations are functioning appropriately and the data is distributed effectively
    among the nodes. In this section, you will see what monitoring you should do for
    the proper functioning of the sharding cluster.


    ### 7.5.9 Monitoring the Config Servers


    The config server, as you know by now, stores the metadata of the sharded cluster.
    The mongos caches the data and routes the request to the respective shards. If
    the config server goes down but there’s a running mongos instance, there’s no
    immediate impact on the shard cluster and it will remain available for a while.
    However, you won’t be able to perform operations like chunk migration or restart
    a new mongos. In the long run, the unavailability of the config server can severely
    impact the availability of the cluster. To ensure that the cluster remains balanced
    and available, you should monitor the config servers.


    #### 7.5.9.1 Monitoring the Shard Status Balancing and Chunk Distribution


    For a most effective sharded cluster deployment , it’s required that the chunks
    be distributed evenly among the shards. As you know by now, this is done automatically
    by MongoDB using a background process. You need to monitor the shard status to
    ensure that the process is working effectively. For this, you can use the `db.printShardingStatus()`
    or `sh.status()` command in the mongos mongo shell to ensure that the process
    is working effectively.


    #### 7.5.9.2 Monitoring the Lock Status


    In almost all cases the balancer releases its locks automatically after completing
    its process, but you need to check the lock status of the database in order to
    ensure there’s no long lasting lock because this can block future balancing, which
    will affect the availability of the cluster. Issue the following from mongos mongo
    to check the lock status:


    `use config`


    `db.locks.find()`


    ## 7.6 Production Cluster Architecture


    In this section, you will look at the production cluster architecture. In order
    to understand it, let’s consider a very generic use case of a social networking
    application where the user can create a circle of friends and can share their
    comments or pictures across the group. The user can also comment or like her friend’s
    comments or pictures. The users are geographically distributed.


    The application requirement is immediate availability across geographies of all
    the comments; data should be redundant so that the user’s comments, posts and
    pictures are not lost; and it should be highly available. So the application’s
    production cluster should have the following components :


    At least two [mongos](http://docs.mongodb.org/manual/reference/mongos/#mongos%23mongos)
    instance, but you can have more as per need.   Three [config servers](http://docs.mongodb.org/manual/administration/sharded-clusters/#sharding-config-server),
    each on a separate system.   Two or more [replica sets](http://docs.mongodb.org/manual/reference/glossary/#term-replica-set)
    serving as [shards](http://docs.mongodb.org/manual/reference/glossary/#term-shard).
    The replica sets are distributed across geographies with read concern set to nearest.
    See Figure [7-25](#A332296_1_En_7_Chapter.html#Fig25).


    ![A332296_1_En_7_Fig25_HTML.jpg](A332296_1_En_7_Fig25_HTML.jpg)


    Figure 7-25.


    Production cluster architecture  


    Now let’s look at the possible failure scenarios in MongoDB production deployment
    and its impact on the environment.


    ### 7.6.1 Scenario 1


    Mongos become unavailable: The application server where mongos has gone down will
    not be able to communicate with the cluster but it will not lead to any data loss
    since the mongos don’t maintain any data of its own. The mongos can restart, and
    while restarting, it can sync up with the config servers to cache the cluster
    metadata, and the application can normally start its operations (Figure [7-26](#A332296_1_En_7_Chapter.html#Fig26)).


    ![A332296_1_En_7_Fig26_HTML.jpg](A332296_1_En_7_Fig26_HTML.jpg)


    Figure 7-26.


    Mongos become unavailable


    ### 7.6.2 Scenario 2


    One of the mongod of the replica set becomes unavailable in a shard: Since you
    used replica sets to provide high availability, there is no data loss. If a primary
    node is down, a new primary is chosen, whereas if it’s a secondary node, then
    it is disconnected and the functioning continues normally (Figure [7-27](#A332296_1_En_7_Chapter.html#Fig27)).


    ![A332296_1_En_7_Fig27_HTML.jpg](A332296_1_En_7_Fig27_HTML.jpg)


    Figure 7-27.


    One of the mongod of replica set is unavailable


    The only difference is that the duplication of the data is reduced, making the
    system little weak, so you should in parallel check if the mongod is recoverable.
    If it is, it should be recovered and restarted whereas if it’s non-recoverable,
    you need to create a new replica set and replace it as soon as possible.


    ### 7.6.3 Scenario 3


    If one of the shard becomes unavailable: In this scenario, the data on the shard
    will be unavailable, but the other shards will be available, so it won’t stop
    the application. The application can continue with its read/write operations;
    however, the partial results must be dealt with within the application. In parallel,
    the shard should attempt to recover as soon as possible (Figure [7-28](#A332296_1_En_7_Chapter.html#Fig28)).


    ![A332296_1_En_7_Fig28_HTML.jpg](A332296_1_En_7_Fig28_HTML.jpg)


    Figure 7-28.


    Shard unavailable


    ### 7.6.4 Scenario 4


    Only one config server is available out of three: In this scenario, although the
    cluster will become read-only, it will not serve any operations that might lead
    to changes in the cluster structure, thereby leading to a change of metadata such
    as chunk migration or chunk splitting. The config servers should be replaced ASAP
    because if all config servers become unavailable, this will lead to an inoperable
    cluster (Figure [7-29](#A332296_1_En_7_Chapter.html#Fig29)).


    ![A332296_1_En_7_Fig29_HTML.jpg](A332296_1_En_7_Fig29_HTML.jpg)


    Figure 7-29.


    Only one config server available


    ## 7.7 Summary


    In this chapter you covered the core processes and tools, standalone deployment,
    sharding concepts, replication concepts, and production deployment. You also looked
    at how HA can be achieved.


    In the following chapter, you will see how data is stored under the hood, how
    writes happens using journaling, what is GridFS used for, and the different types
    of indexes available in MongoDB.'
  trans: '

    ### 7.5.7 准备工作


    #### 7.5.7.1 预分裂数据


    与其让 MongoDB 决定如何创建分片块，你可以使用以下命令告诉 MongoDB 具体如何操作：


    ```

    db.runCommand( { split : "practicalmongodb.mycollection" , middle : { shardkey
    : value } } );

    ```


    之后，你还可以指定哪些分片块分配到哪个节点。


    要做到这些，你需要了解即将导入数据库的数据特性。这也取决于你想要解决的应用场景以及应用程序如何读取数据。在决定分片块的放置位置时，请考虑数据局部性等因素。


    #### 7.5.7.2 决定分片块大小


    在决定分片块大小时，需要牢记以下几点：


    如果分片块尺寸过小，数据虽能均匀分布，但会导致更频繁的迁移，这在 `mongos` 层面是一项昂贵的操作。如果尺寸过大，则会减少迁移次数，降低 `mongos`
    层面的开销，但会导致数据分布不均。


    #### 7.5.7.3 选择一个好的分片键


    为分片集群中的节点选择一个好的分片键以实现良好的数据分布至关重要。


    ### 7.5.8 分片监控


    除了对其他 MongoDB 实例进行的常规监控和分析外，分片集群还需要额外的监控，以确保其所有操作正常运行，并且数据在节点间有效分布。本节将介绍为确保分片集群正常运行应进行的监控。


    ### 7.5.9 监控配置服务器


    配置服务器存储了分片集群的元数据。`mongos` 会缓存这些数据并将请求路由到相应的分片。如果配置服务器宕机但 `mongos` 实例仍在运行，分片集群不会立即受到影响，并且会在一段时间内保持可用。然而，你将无法执行像分片块迁移或启动新
    `mongos` 这样的操作。长期来看，配置服务器的不可用会严重影响集群的可用性。为确保集群保持平衡和可用，你应该监控配置服务器。


    #### 7.5.9.1 监控分片状态、平衡与分片块分布


    为了实现最有效的分片集群部署，需要分片块在分片之间均匀分布。如前所述，这是由 MongoDB 通过后台进程自动完成的。你需要监控分片状态以确保该进程有效工作。为此，你可以在
    `mongos` 的 mongo shell 中使用 `db.printShardingStatus()` 或 `sh.status()` 命令。


    #### 7.5.9.2 监控锁状态


    在几乎所有情况下，平衡器在完成其进程后会自动释放锁，但你需要检查数据库的锁状态，以确保没有持久锁，因为这会阻碍未来的平衡操作，从而影响集群的可用性。在 `mongos`
    的 mongo shell 中执行以下命令来检查锁状态：


    ```

    use config

    db.locks.find()

    ```


    ## 7.6 生产集群架构


    本节将介绍生产集群架构。为了便于理解，我们考虑一个社交网络应用程序的非常通用的用例：用户可以创建自己的朋友圈，并在群组内分享评论或图片。用户也可以评论或点赞好友的评论或图片。用户在地理上是分布式的。


    应用程序的需求是：所有评论需在各地理区域立即可用；数据应冗余，以防用户的评论、帖子和图片丢失；并且应具备高可用性。因此，应用程序的生产集群应包含以下组件：


    *   至少两个 [`mongos`](http://docs.mongodb.org/manual/reference/mongos/#mongos%23mongos)
    实例，但可以根据需要部署更多。

    *   三个 [`config servers`](http://docs.mongodb.org/manual/administration/sharded-clusters/#sharding-config-server)，每个位于独立的系统上。

    *   两个或更多个 [`replica sets`](http://docs.mongodb.org/manual/reference/glossary/#term-replica-set)
    作为 [`shards`](http://docs.mongodb.org/manual/reference/glossary/#term-shard)。副本集分布在不同的地理区域，读关注设置为
    `nearest`。参见图 7-25。


    ![A332296_1_En_7_Fig25_HTML.jpg](img/A332296_1_En_7_Fig25_HTML.jpg)

    图 7-25. 生产集群架构


    现在，让我们看看 MongoDB 生产部署中可能出现的故障场景及其对环境的影响。


    ### 7.6.1 场景一


    `mongos` 变得不可用：承载已宕机 `mongos` 的应用服务器将无法与集群通信，但这不会导致任何数据丢失，因为 `mongos` 本身不维护任何数据。`mongos`
    可以重启，在重启过程中，它会与配置服务器同步以缓存集群元数据，应用程序通常可以恢复正常操作（图 7-26）。


    ![A332296_1_En_7_Fig26_HTML.jpg](img/A332296_1_En_7_Fig26_HTML.jpg)

    图 7-26. `mongos` 变得不可用


    ### 7.6.2 场景二


    分片中某个副本集的一个 `mongod` 变得不可用：由于你使用了副本集来提供高可用性，因此没有数据丢失。如果是主节点宕机，则会选举出新的主节点；如果是辅助节点宕机，则它会断开连接，其余功能继续正常运行（图
    7-27）。


    ![A332296_1_En_7_Fig27_HTML.jpg](img/A332296_1_En_7_Fig27_HTML.jpg)

    图 7-27. 副本集中一个 `mongod` 不可用


    唯一的区别是数据的副本数量减少了，使得系统略微变弱，因此你应该并行检查该 `mongod` 是否可恢复。如果可以，应尽快恢复并重启；如果不可恢复，你需要尽快创建一个新的副本集来替换它。


    ### 7.6.3 场景三


    如果一个分片变得不可用：在此场景下，该分片上的数据将不可用，但其他分片仍然可用，因此不会阻止应用程序运行。应用程序可以继续其读/写操作；但是，必须在应用层处理部分结果的问题。同时，应尽快尝试恢复该分片（图
    7-28）。


    ![A332296_1_En_7_Fig28_HTML.jpg](img/A332296_1_En_7_Fig28_HTML.jpg)

    图 7-28. 分片不可用


    ### 7.6.4 场景四


    三个配置服务器中只有一个可用：在此场景下，集群将变为只读，但不会服务于任何可能导致集群结构变更（例如，分片块迁移或分片块拆分）的操作，从而导致元数据变更。应尽快更换配置服务器，因为如果所有配置服务器都不可用，将导致集群无法操作（图
    7-29）。


    ![A332296_1_En_7_Fig29_HTML.jpg](img/A332296_1_En_7_Fig29_HTML.jpg)

    图 7-29. 只有一个配置服务器可用


    ## 7.7 总结


    在本章中，你学习了核心进程与工具、独立部署、分片概念、复制概念以及生产部署。你还了解了如何实现高可用性（HA）。


    在下一章中，你将了解数据在底层的存储方式、写操作如何通过日志实现、`GridFS` 的用途以及 MongoDB 中可用的不同类型的索引。

