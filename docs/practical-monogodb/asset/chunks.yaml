  trans: '# 将 GridFS 更像文件系统一样对待


    `new_file()` - 在 GridFS 中创建新文件


    你可以将任意数量的关键字参数传递给 `new_file()`。这些参数将被添加到 `fs.files` 文档中：


    ```

    >>> with myfs.new_file(

    ...     filename=''practicalfile.txt'',

    ...     content_type=''text/plain'',

    ...     my_other_attribute=42) as myfp:

    ...     myfp.write(''My New file'')

    ...

    >>> myfp

    <gridfs.grid_file.GridIn object at 0x0000000002AC7AC8>

    >>> db.myfs.files.find_one(dict(_id=myfp._id))

    {u''contentType'': u''text/plain'', u''chunkSize'': 262144, u''my_other_attribute'':
    42, u''filename'': u''practicalfile.txt'', u''length'': 8, u''uploadDate'': datetime.datetime(2014,
    11, 4, 9, 1, 32, 800000), u''_id'': ObjectId(''52fdd8db9cd2fd08288d5f66''), u''md5'':
    u''681e10aecbafd7dd385fa51798ca0fd6''}

    >>>

    ```


    文件可以通过文件名被覆盖。由于 GridFS 使用 `_id` 来索引文件，旧文件并不会被移除，只是会维护一个文件版本。


    ```

    >>> with myfs.new_file(filename=''practicalfile.txt'', content_type=''text/plain'')
    as myfp:

    ...     myfp.write(''Overwriting the "My New file"'')

    ...

    ```


    `get_version()` / `get_last_version()`


    在上述情况下，可以使用 `get_version` 或 `get_last_version` 来通过文件名检索文件。


    ```

    >>> myfs.get_last_version(''practicalfile.txt'').read()

    ''Overwriting the "My New file"''

    >>> myfs.get_version(''practicalfile.txt'',0).read()

    ''My New file''

    ```


    你也可以列出 GridFS 中的文件：


    ```

    >>> myfs.list()

    [u''practicalfile.txt'', u''practicalfile2.txt'']

    ```


    `delete()`


    文件也可以被删除：


    ```

    >>> myfp = myfs.get_last_version(''practicalfile.txt'')

    >>> myfs.delete(myfp._id)

    >>> myfs.list()

    [u''practicalfile.txt'', u''practicalfile2.txt'']

    >>> myfs.get_last_version(''practicalfile.txt'').read()

    ''My New file''

    >>>

    ```


    请注意，只有一个版本的 `practicalfile.txt` 被删除了。你的文件系统中仍然存在一个名为 `practicalfile.txt` 的文件。


    `exists()` 和 `put()`


    接下来，你将使用 `exists()` 来检查文件是否存在，并使用 `put()` 将一个短文件快速写入 GridFS：


    ```

    >>> myfs.exists(myfp._id)

    False

    >>> myfs.exists(filename=''practicalfile.txt'')

    True

    >>> myfs.exists({''filename'':''practicalfile.txt''}) # equivalent to above

    True

    >>> myfs.put(''The red fish'', filename=''typingtest.txt'')

    ObjectId(''52fddbc69cd2fd08288d5f6a'')

    >>> myfs.get_last_version(''typingtest.txt'').read()

    ''The red fish''

    >>>

    ```


    # 索引


    在本书的这一部分，你将简要探讨 MongoDB 上下文中的索引是什么。随后，我们将重点介绍 MongoDB 中可用的各种索引类型，最后总结索引的行为和限制。


    索引是一种加快读取操作的数据结构。通俗地讲，它类似于书籍的索引，你可以通过在索引中查找章节并直接跳转到页码来找到任何章节，而无需扫描整本书来找到该章节——如果没有索引，情况就会是那样。


    类似地，索引定义在字段上，可以帮助以更好、更高效的方式搜索信息。


    与其他数据库一样，在 MongoDB 中也以类似方式看待索引（它用于加速 `find()` 操作）。你运行的查询类型有助于为数据库创建高效的索引。例如，如果大多数查询使用日期字段，那么在日期字段上创建索引将是有益的。确定哪个索引对你的查询最优可能很棘手，但值得一试，因为如果没有合适的索引，原本需要几分钟的查询在有正确索引的情况下可以瞬间返回结果。


    在 MongoDB 中，可以在文档的任何字段或子字段上创建索引。在了解 MongoDB 中可以创建的各种索引类型之前，让我们先列出索引的一些核心特性：


    *   索引是在每个集合级别定义的。对于每个集合，都有不同的索引集合。

    *   与 SQL 索引类似，MongoDB 索引也可以在单个字段或字段集上创建。

    *   在 SQL 中，虽然索引提高了查询性能，但每次写入操作都会产生开销。因此在创建任何索引之前，请考虑查询的类型、频率、工作负载的大小以及插入负载，同时结合应用程序需求。

    *   所有 MongoDB 索引都使用 BTree 数据结构。

    *   每个使用更新操作的查询只使用一个索引，这由查询优化器决定。这可以通过使用 `hint` 来覆盖。

    *   如果所有字段都是索引的一部分，无论该字段是用于查询还是用于投影，都说该查询被索引覆盖。

    *   覆盖索引可以最大化 MongoDB 的性能和吞吐量，因为查询可以仅使用索引就得到满足，无需将完整文档加载到内存中。

    *   只有当创建索引所依据的字段被更改时，索引才会更新。并非所有对文档的更新操作都会导致索引更改。只有当相关字段受到影响时，它才会被更改。


    ## 索引类型


    在本节中，你将了解 MongoDB 中可用的不同类型的索引。


    ### `_id` 索引


    这是在 `_id` 字段上创建的默认索引。此索引无法被删除。'
- fmt: '### 8.7.1.2 Secondary Indexes


    All indexes that are user created using `ensureIndex()` in MongoDB are termed
    as secondary indexes.


    These indexes can be created on any field in the document or the sub document.
    Let’s consider the following document:

    ```json

    {"_id": ObjectId(...), "name": "Practical User", "address": {"zipcode": 201301,
    "state": "UP"}}

    ```

    In this document, an index can be created on the `name` field as well as the `state`
    field.


    These indexes can be created on a field that is holding a sub-document. If you
    consider the above document where `address` is holding a sub-document, in that
    case an index can be created on the `address` field as well.


    These indexes can either be created on a single field or a set of fields. When
    created with set of fields, it’s also termed a compound index. To explain it a
    bit further, let’s consider a products collection that holds documents of the
    following format:

    ```json

    { "_id": ObjectId(...),"category": ["food", "grocery"], "item": "Apple", "location":
    "16th Floor Store", "arrival": Date(...)}

    ```

    If the maximum of the queries use the fields `item` and `location`, then the following
    compound index can be created:

    ```javascript

    db.products.ensureIndex ({"item": 1, "location": 1})

    ```

    In addition to the query that is referring to all the fields of the compound index,
    the above compound index can also support queries that are using any of the index
    prefixes (i.e. it can also support queries that are using only the `item` field).


    If the index is created on a field that holds an array as its value, then a multikey
    index is used for indexing each value of the array separately. Consider the following
    document:

    ```json

    { "_id" : ObjectId("..."),"tags" : [ "food", "hot", "pizza", "may" ] }

    ```

    An index on `tags` is a multikey index, and it will have the following entries:

    ```json

    { tags: "food" }

    { tags: "hot" }

    { tags: "pizza" }

    { tags: "may" }

    ```

    Multikey compound indexes can also be created. However, at any point, only one
    field of the compound index can be of the array type. If you create a compound
    index of `{a1: 1, b1: 1}`, the permissible documents are as follows:

    ```json

    {a1: [1, 2], b1: 1}

    {a1: 1, b1: [1, 2]}

    ```

    The following document is not permissible; in fact, MongoDB won’t be even able
    to insert this document:

    ```json

    {a1: [21, 22], b1: [11, 12]}

    ```

    If an attempt is made to insert such a document, the insertion will be rejected
    and the following error results will be produced: “cannot index parallel arrays”.


    You will next look at the various options/properties that might be useful while
    creating indexes.


    ### Indexes with Keys Ordering


    MongoDB indexes maintain references to the fields. The references are maintained
    in either an ascending order or descending order. This is done by specifying a
    number with the key when creating an index. This number indicates the index direction.
    Possible options are 1 and -1, where 1 stands for ascending and -1 stands for
    descending.


    In a single key index, it might not be too important; however, the direction is
    very important in compound indexes.


    Consider an `Events` collection that includes both `username` and `timestamp`.
    Your query is to return events ordered by `username` first and then with the most
    recent event first. The following index will be used:

    ```javascript

    db.events.ensureIndex({ "username" : 1, "timestamp" : -1 })

    ```

    This index contains references to the documents that are sorted in the following
    manner:


    First by the `username` field in ascending order. Then for each `username` sorted
    by the `timestamp` field in the descending order.


    ### Unique Indexes


    When you create an index, you need to ensure uniqueness of the values being stored
    in the indexed field. In such cases, you can create indexes with the `Unique`
    property set to true (by default it’s false).


    Say you want a `unique_index` on the field `userid`. The following command can
    be run to create the unique index:

    ```javascript

    db.payroll.ensureIndex( { "userid": 1 }, { unique: true } )

    ```

    This command ensures that you have unique values in the `user_id` field. A few
    points that you need to note for the uniqueness constraint are


    *   If the unique constraint is used on a compound index in that scenario, uniqueness
    is enforced on the combination of values.

    *   A null value is stored in case there’s no value specified for the field of
    a unique index.

    *   At any point only one document is permitted without a unique value.


    ### dropDups


    If you are creating a unique index on a collection that already has documents,
    the creation might fail because you may have some documents that contain duplicate
    values in the indexed field. In such scenarios, the `dropDups` options can be
    used for force creation of the unique index. This works by keeping the first occurrence
    of the key value and deleting all the subsequent values. By default `dropDups`
    is false.


    ### Sparse Indexes


    A sparse index is an index that holds entries of the documents within a collection
    that has the fields on which the index is created. If you want to create a sparse
    index on the `LastName` field of the `User` collection, the following command
    can be issued:

    ```javascript

    db.User.ensureIndex( { "LastName": 1 }, { sparse: true } )

    ```

    This index will contain documents such as

    ```json

    {FirstName: Test, LastName: User}

    ```

    or

    ```json

    {FirstName: Test2, LastName: }

    ```

    However, the following document will not be part of the sparse index:

    ```json

    {FirstName: Test1}

    ```

    The index is said to be sparse because this only contains documents with the indexes
    field and miss the documents when the fields are missing. Due to this nature,
    sparse indexes provide a significant space saving.


    In contrast, the non-sparse index includes all documents irrespective of whether
    the indexed field is available in the document or not. Null value is stored in
    case the fields are missing.


    ### TTL Indexes (Time To Live)


    A new index property was introduced in version 2.2 that enables you to remove
    documents from the collection automatically after the specified time period is
    elapsed. This property is ideal for scenarios such as logs, session information,
    and machine-generated event data, where the data needs to be persistent only for
    a limited period.


    If you want to set the TTL of one hour on collection `logs`, the following command
    can be used:

    ```javascript

    db.Logs.ensureIndex( { "Sample_Time": 1 }, { expireAfterSeconds: 3600} )

    ```

    However, you need to note the following limitations:


    *   The field on which the index is created must be of the date type only. In
    the above example, the field `sample_time` must hold date values.

    *   It does not support compound indexes.

    *   If the field that is indexed contains an array with multiple dates, the document
    expires when the smallest date in the array matches the expiration threshold.

    *   It cannot be created on the field which already has an index created.

    *   This index cannot be created on capped collections.

    *   TTL indexes expire data using a background task, which is run every minute,
    to remove the expired documents. So you cannot guarantee that the expired document
    no longer exists in the collection.


    ### Geospatial Indexes


    With the rise of the smartphone, it’s becoming very common to query for things
    near a current location. In order to support such location-based queries, MongoDB
    provides geospatial indexes.


    To create a geospatial index, a coordinate pair in the following forms must exist
    in the documents:


    *   Either an array with two elements

    *   Or an embedded document with two keys (the key names can be anything).


    The following are valid examples:

    ```json

    { "userloc" : [ 0, 90 ] }

    { "loc" : { "x" : 30, "y" : -30 } }

    { "loc" : { "latitude" : -30, "longitude" : 180 } }

    {"loc" : {"a1" : 0, "b1" : 1}}

    ```

    The following can be used to create a geospatial index on the `userloc` field:

    ```javascript

    db.userplaces.ensureIndex( { userloc : "2d" } )

    ```

    A geospatial index assumes that the values will range from -180 to 180 by default.
    If this needs to be changed, it can be specified along with `ensureIndex` as follows:'
  raw: '#### 8.7.1.2 Secondary Indexes


    All indexes that are user created using `ensureIndex()` in MongoDB are termed
    as secondary indexes .


    These indexes can be created on any field in the document or the sub document.
    Let’s consider the following document: `{"_id": ObjectId(...), "name": "Practical
    User", "address": {"zipcode": 201301, "state": "UP"}}` In this document, an index
    can be created on the `name` field as well as the `state` field.   These indexes
    can be created on a field that is holding a sub-document. If you consider the
    above document where `address` is holding a sub-document, in that case an index
    can be created on the `address` field as well.   These indexes can either be created
    on a single field or a set of fields. When created with set of fields, it’s also
    termed a compound index. To explain it a bit further, let’s consider a products
    collection that holds documents of the following format: `{ "_id": ObjectId(...),"category":
    ["food", "grocery"], "item": "Apple", "location": "16` ^(`th`) `Floor Store",
    "arrival": Date(...)}` If the maximum of the queries use the fields `Item` and
    `Location`, then the following compound index can be created: `db.products.ensureIndex
    ({"item": 1, "location": 1})` In addition to the query that is referring to all
    the fields of the compound index, the above compound index can also support queries
    that are using any of the index prefixes (i.e. it can also support queries that
    are using only the `item` field).   If the index is created on a field that holds
    an array as its value, then a multikey index is used for indexing each value of
    the array separately. Consider the following document: `{ "_id" : ObjectId("..."),"tags"
    : [ "food", "hot", "pizza", "may" ] }` An index on `tags` is a multikey index,
    and it will have the following entries: `{ tags: "food" }` `{ tags: "hot" }` `{
    tags: "pizza" }` `{ tags: "may" }`   Multikey compound indexes can also be created.
    However, at any point, only one field of the compound index can be of the array
    type. If you create a compound index of `{a1: 1, b1: 1}`, the permissible documents
    are as follows: `{a1: [1, 2], b1: 1}` `{a1: 1, b1: [1, 2]}` The following document
    is not permissible; in fact, MongoDB won’t be even able to insert this document:
    `{a1: [21, 22], b1: [11, 12]}` If an attempt is made to insert such a document,
    the insertion will be rejected and the following error results will be produced:
    “cannot index parallel arrays”.


    You will next look at the various options/properties that might be useful while
    creating indexes.


    Indexes with Keys Ordering


    MongoDB indexes maintain references to the fields. The refernces are maintained
    in either an ascending order or descending order. This is done by specifying a
    number with the key when creating an index. This number indicates the index direction.
    Possible options are 1 and -1, where 1 stands for ascending and -1 stands for
    descending.


    In a single key index, it might not be too important; however, the direction is
    very important in compound indexes.


    Consider an `Events` collection that includes both `username` and `timestamp`.
    Your query is to return events ordered by `username` first and then with the most
    recent event first. The following index will be used:


    `db.events.ensureIndex({ "username" : 1, "timestamp" : -1 })`


    This index contains references to the documents that are sorted in the following
    manner:


    First by the `username` field in ascending order.   Then for each `username` sorted
    by the `timestamp` field in the descending order.


    Unique Indexes


    When you create an index, you need to ensure uniqueness of the values being stored
    in the indexed field. In such cases, you can create indexes with the `Unique`
    property set to true (by default it’s false).


    Say you want a `unique_index` on the field `userid`. The following command can
    be run to create the unique index:


    `db.payroll.ensureIndex( { "userid": 1 }, { unique: true } )`


    This command ensures that you have unique values in the `user_id` field. A few
    points that you need to note for the uniqueness constraint are


    *   If the unique constraint is used on a compound index in that scenario, uniqueness
    is enforced on the combination of values.

    *   A null value is stored in case there’s no value specified for the field of
    a unique index.

    *   At any point only one document is permitted without a unique value.


    dropDups


    If you are creating a unique index on a collection that already has documents,
    the creation might fail because you may have some documents that contain duplicate
    values in the indexed field. In such scenarios, the `dropDups` options can be
    used for force creation of the unique index. This works by keeping the first occurrence
    of the key value and deleting all the subsequent values. By default `dropDups`
    is false.


    Sparse Indexes


    A sparse index is an index that holds entries of the documents within a collection
    that has the fields on which the index is created. If you want to create a sparse
    index on the `LastName` field of the `User` collection, the following command
    can be issued:


    `db.User.ensureIndex( { "LastName": 1 }, { sparse: true } )`


    This index will contain documents such as


    `{FirstName: Test, LastName: User}`


    `or`


    `{FirstName: Test2, LastName: }`


    However, the following document will not be part of the sparse index:


    `{FirstName: Test1}`


    The index is said to be sparse because this only contains documents with the indexes
    field and miss the documents when the fields are missing. Due to this nature,
    sparse indexes provide a significant space saving.


    In contrast, the non-sparse index includes all documents irrespective of whether
    the indexed field is available in the document or not. Null value is stored in
    case the fields are missing.


    TTL Indexes (Time To Live )


    A new index property was introduced in version 2.2 that enables you to remove
    documents from the collection automatically after the specified time period is
    elapsed. This property is ideal for scenarios such as logs, session information,
    and machine-generated event data, where the data needs to be persistent only for
    a limited period.


    If you want to set the TTL of one hour on collection `logs`, the following command
    can be used:


    `db.Logs.ensureIndex( { "Sample_Time": 1 }, { expireAfterSeconds: 3600} )`


    However, you need to note the following limitations:


    *   The field on which the index is created must be of the date type only. In
    the above example, the field `sample_time` must hold date values.

    *   It does not support compound indexes.

    *   If the field that is indexed contains an array with multiple dates, the document
    expires when the smallest date in the array matches the expiration threshold.

    *   It cannot be created on the field which already has an index created.

    *   This index cannot be created on capped collections.

    *   TTL indexes expire data using a background task, which is run every minute,
    to remove the expired documents. So you cannot guarantee that the expired document
    no longer exists in the collection.


    Geospatial Indexes


    With the rise of the smartphone, it’s becoming very common to query for things
    near a current location. In order to support such location-based queries, MongoDB
    provides geospatial indexes .


    To create a geospatial index, a coordinate pair in the following forms must exist
    in the documents:


    *   Either an array with two elements

    *   Or an embedded document with two keys (the key names can be anything).


    The following are valid examples:


    `{ "userloc" : [ 0, 90 ] }`


    `{ "loc" : { "x" : 30, "y" : -30 } }`


    `{ "loc" : { "latitude" : -30, "longitude" : 180 } }`


    `{"loc" : {"a1" : 0, "b1" : 1}}.`


    The following can be used to create a geospatial index on the `userloc` field:


    `db.userplaces.ensureIndex( { userloc : "2d" } )`


    A geospatial index assumes that the values will range from -180 to 180 by default.
    If this needs to be changed, it can be specified along with `ensureIndex` as follows:'
  trans: '

    ### 8.7.1.2 二级索引


    在 MongoDB 中，所有用户使用 `ensureIndex()` 创建的索引都被称为二级索引。


    这些索引可以创建在文档或子文档的任何字段上。让我们考虑以下文档：

    ```json

    {"_id": ObjectId(...), "name": "Practical User", "address": {"zipcode": 201301,
    "state": "UP"}}

    ```

    在此文档中，可以在 `name` 字段上创建索引，也可以在 `state` 字段上创建索引。


    这些索引也可以创建在保存子文档的字段上。如果你考虑上面那个 `address` 字段保存了子文档的文档，那么也可以在 `address` 字段上创建索引。


    这些索引可以创建在单个字段上，也可以创建在一组字段上。当在一组字段上创建时，它也被称为复合索引。为了进一步解释，让我们考虑一个 `products` 集合，它保存了以下格式的文档：

    ```json

    { "_id": ObjectId(...),"category": ["food", "grocery"], "item": "Apple", "location":
    "16th Floor Store", "arrival": Date(...)}

    ```

    如果大多数查询都使用 `item` 和 `location` 字段，那么可以创建如下的复合索引：

    ```javascript

    db.products.ensureIndex ({"item": 1, "location": 1})

    ```

    除了引用复合索引所有字段的查询外，上面的复合索引还支持使用任何索引前缀的查询（即，它也可以支持仅使用 `item` 字段的查询）。


    如果在保存数组作为其值的字段上创建索引，则会使用多键索引来分别索引数组的每个值。考虑以下文档：

    ```json

    { "_id" : ObjectId("..."),"tags" : [ "food", "hot", "pizza", "may" ] }

    ```

    在 `tags` 上的索引是一个多键索引，它将包含以下条目：

    ```json

    { tags: "food" }

    { tags: "hot" }

    { tags: "pizza" }

    { tags: "may" }

    ```

    也可以创建多键复合索引。但是，在任何时候，复合索引中只能有一个字段是数组类型。如果你创建了一个 `{a1: 1, b1: 1}` 的复合索引，则允许的文档如下：

    ```json

    {a1: [1, 2], b1: 1}

    {a1: 1, b1: [1, 2]}

    ```

    以下文档是不允许的；实际上，MongoDB 甚至无法插入此文档：

    ```json

    {a1: [21, 22], b1: [11, 12]}

    ```

    如果尝试插入这样的文档，插入将被拒绝并产生以下错误结果：“cannot index parallel arrays”。


    接下来，你将了解在创建索引时可能有用的各个选项/属性。


    ### 带键排序的索引


    MongoDB 索引维护对字段的引用。引用以升序或降序维护。这是通过在创建索引时为键指定一个数字来完成的。该数字表示索引方向。可能的选项是 1 和 -1，其中
    1 表示升序，-1 表示降序。


    在单键索引中，这可能不太重要；然而，在复合索引中，方向非常重要。


    考虑一个包含 `username` 和 `timestamp` 的 `Events` 集合。你的查询是返回按 `username` 排序，然后最近的事件在前的事件。将使用以下索引：

    ```javascript

    db.events.ensureIndex({ "username" : 1, "timestamp" : -1 })

    ```

    此索引包含按以下方式排序的文档的引用：


    首先按 `username` 字段升序排列。然后，对于每个 `username`，按 `timestamp` 字段降序排列。


    ### 唯一索引


    创建索引时，你需要确保索引字段中存储的值的唯一性。在这种情况下，你可以创建 `Unique` 属性设置为 true 的索引（默认为 false）。


    假设你想在 `userid` 字段上创建一个 `unique_index`。可以运行以下命令来创建唯一索引：

    ```javascript

    db.payroll.ensureIndex( { "userid": 1 }, { unique: true } )

    ```

    此命令确保 `user_id` 字段中的值是唯一的。关于唯一性约束，你需要注意以下几点：


    *   如果唯一约束用于复合索引，则在该场景下，唯一性会在值的组合上强制执行。

    *   如果未为唯一索引的字段指定值，则存储一个空值。

    *   在任何时候，只允许一个文档没有唯一值。


    ### dropDups


    如果你在已包含文档的集合上创建唯一索引，创建可能会失败，因为你可能有一些文档在索引字段中包含重复值。在这种情况下，可以使用 `dropDups` 选项来强制创建唯一索引。其工作原理是保留键值的第一次出现，并删除所有后续值。默认情况下
    `dropDups` 为 false。


    ### 稀疏索引


    稀疏索引是一种索引，它只保存集合中那些在索引所创建的字段上存在的文档的条目。如果你想在 `User` 集合的 `LastName` 字段上创建稀疏索引，可以发出以下命令：

    ```javascript

    db.User.ensureIndex( { "LastName": 1 }, { sparse: true } )

    ```

    此索引将包含如下文档：

    ```json

    {FirstName: Test, LastName: User}

    ```

    或

    ```json

    {FirstName: Test2, LastName: }

    ```

    但是，以下文档不会成为稀疏索引的一部分：

    ```json

    {FirstName: Test1}

    ```

    该索引被称为稀疏的，因为它只包含带有索引字段的文档，而缺失该字段的文档则被忽略。由于这种特性，稀疏索引可以显著节省空间。


    相比之下，非稀疏索引包含所有文档，无论索引字段是否在文档中可用。如果字段缺失，则存储空值。


    ### TTL 索引（生存时间）


    在 2.2 版本中引入了一个新的索引属性，它使你能够在指定时间段过后自动从集合中删除文档。此属性非常适合日志、会话信息和机器生成的事件数据等场景，这些数据只需要在有限的时间内保持持久性。


    如果你想在集合 `logs` 上设置一小时的 TTL，可以使用以下命令：

    ```javascript

    db.Logs.ensureIndex( { "Sample_Time": 1 }, { expireAfterSeconds: 3600} )

    ```

    但是，你需要注意以下限制：


    *   创建索引的字段必须仅为日期类型。在上面的例子中，`sample_time` 字段必须保存日期值。

    *   它不支持复合索引。

    *   如果被索引的字段包含一个带有多个日期的数组，则当数组中的最小日期与过期阈值匹配时，文档过期。

    *   无法在已有索引的字段上创建它。

    *   此索引无法在固定大小集合上创建。

    *   TTL 索引使用后台任务过期数据，该任务每分钟运行一次以删除过期的文档。因此，你无法保证过期文档不再存在于集合中。


    ### 地理空间索引


    随着智能手机的普及，查询当前位置附近的事物变得非常普遍。为了支持此类基于位置的查询，MongoDB 提供了地理空间索引。


    要创建地理空间索引，文档中必须存在以下形式之一的坐标对：


    *   一个包含两个元素的数组

    *   或一个包含两个键的嵌入式文档（键名可以是任意的）。


    以下是有效示例：

    ```json

    { "userloc" : [ 0, 90 ] }

    { "loc" : { "x" : 30, "y" : -30 } }

    { "loc" : { "latitude" : -30, "longitude" : 180 } }

    {"loc" : {"a1" : 0, "b1" : 1}}

    ```

    以下命令可用于在 `userloc` 字段上创建地理空间索引：

    ```javascript

    db.userplaces.ensureIndex( { userloc : "2d" } )

    ```

    地理空间索引默认假设值范围从 -180 到 180。如果需要更改此范围，可以与 `ensureIndex` 一起指定，如下所示：

    '
- fmt: "`db.userplaces.ensureIndex({\"userloc\" : \"2d\"}, {\"min\" : -1000, \"max\"\
    \ : 1000})`\n\nAny documents with values beyond the maximum and the minimum values\
    \ will be rejected. You can also create compound geospatial indexes.\n\nLet’s\
    \ understand with an example how this index works. Say you have documents that\
    \ are of the following type:\n\n```json\n{\"loc\":[0,100], \"desc\":\"coffeeshop\"\
    }\n{\"loc\":[0,1], \"desc\":\"pizzashop\"}\n```\n\nIf the query of a user is to\
    \ find all coffee shops near her location, the following compound index can help:\n\
    \n`db.ensureIndex({\"userloc\" : \"2d\", \"desc\" : 1})`\n\n### Geohaystack Indexes\n\
    \nGeohaystack indexes are bucket-based geospatial indexes (also called geospatial\
    \ haystack indexes). They are useful for queries that need to find out locations\
    \ in a small area and also need to be filtered along another dimension, such as\
    \ finding documents with coordinates within 10 miles and a `type` field value\
    \ as `restaurant`.\n\nWhile defining the index, it’s mandatory to specify the\
    \ `bucketSize` parameter as it determines the haystack index granularity. For\
    \ example,\n\n`db.userplaces.ensureIndex({ userpos : \"geoHaystack\", type : 1\
    \ }, { bucketSize : 1 })`\n\nThis example creates an index wherein keys within\
    \ 1 unit of latitude or longitude are stored together in the same bucket. You\
    \ can also include an additional category in the index, which means that information\
    \ will be looked up at the same time as finding the location details.\n\nIf your\
    \ use case typically searches for \"nearby\" locations (i.e. \"restaurants within\
    \ 25 miles\"), a `haystack` index can be more efficient.\n\nThe matches for the\
    \ additional indexed field (e.g. category) can be found and counted within each\
    \ bucket.\n\nIf, instead, you are searching for \"nearest restaurant\" and would\
    \ like to return results regardless of distance, a normal `2d` index will be more\
    \ efficient.\n\nThere are currently (as of MongoDB 2.2.0) a few limitations on\
    \ haystack indexes:\n\n*   Only one additional field can be included in the haystack\
    \ index.\n*   The additional index field has to be a single value, not an array.\n\
    *   Null long/lat values are not supported.\n\nIn addition to the above mentioned\
    \ types, there is a new type of index introduced in version 2.4 that supports\
    \ text search on a collection.\n\nPreviously in beta, in the 2.6 release, text\
    \ search is a built-in feature. It includes options such as searching in 15 languages\
    \ and an aggregation option that can be used to set up faceted navigation by product\
    \ or color, for example, on an e-commerce website.\n\n### 8.7.1.3 Index Intersection\n\
    \nIndex intersection is introduced in version 2.6 wherein multiple indexes can\
    \ be intersected to satiate a query. To explain it a bit further, let’s consider\
    \ a `products` collection that holds documents of the following format\n\n```json\n\
    { \"_id\": ObjectId(...),\"category\": [\"food\", \"grocery\"], \"item\": \"Apple\"\
    , \"location\": \"16th Floor Store\", \"arrival\": Date(...)}.\n```\n\nLet’s further\
    \ assume that this collection has the following two indexes:\n\n```json\n{ \"\
    item\": 1 }.\n{ \"location\": 1 }.\n```\n\nIntersection of the above two indexes\
    \ can be used for the following query:\n\n`db.products.find ({\"item\": \"xyz\"\
    , \"location\": \"abc\"})`\n\nYou can run `explain()` to determine if index intersection\
    \ is used for the above query. The `explain` output will include either of the\
    \ following stages: `AND_SORTED` or `AND_HASH`. When doing index intersection,\
    \ either the entire index or only the index prefix can be used.\n\nYou next need\
    \ to understand how this index intersection feature impacts the compound index\
    \ creation.\n\nWhile creating a compound index, both the order in which the keys\
    \ are listed in the index and the sort order (ascending and descending) matters.\
    \ Thus a compound index may not support a query that does not have the index prefix\
    \ or has keys with different sort order.\n\nTo explain it a bit further, let’s\
    \ consider a `products` collection that has the following compound index:\n\n\
    `db.products.ensureIndex ({\"item\": 1, \"location\": 1})`\n\nIn addition to the\
    \ query, which is referring to all the fields of the compound index, the above\
    \ compound index can also support queries that are using any of the index prefix\
    \ (it can also support queries that are using only the `item` field). But it won’t\
    \ be able to support queries that are using either only the `location` field or\
    \ are using the `item` key with a different sort order.\n\nInstead, if you create\
    \ two separate indexes, one on the `item` and the other on the `location`, these\
    \ two indexes can either individually or though intersections support the four\
    \ queries mentioned above. Thus, the choice between whether to create a compound\
    \ index or to rely on intersection of indexes depends on the system’s needs.\n\
    \nNote that index intersection will not apply when the `sort()` operation needs\
    \ an index that is completely separate from the query predicate.\n\nFor example,\
    \ let’s assume for the `products` collection you have the following indexes:\n\
    \n```json\n{ \"item\": 1 }.\n{ \"location\": 1 }.\n{ \"location\": 1, \"arrival_date\"\
    :-1 }.\n{ \"arrival_date\": -1 }.\n```\n\nIndex intersection will not be used\
    \ for the following query:\n\n`db.products.find( { item: \"xyz\"} ).sort( { location:\
    \ 1 } )`\n\nThat is, MongoDB will not use the `{ item: 1 }` index for the query,\
    \ and the separate `{ location: 1 }` or the `{ location: 1, arrival_date: -1 }`\
    \ index for the sort.\n\nHowever, index intersection can be used for the following\
    \ query since the index `{location: 1,arrival_date: -1 }` can fulfil part of the\
    \ query predicate:\n\n`db.products.find( { item: { \"xyz\"} , location: \"A\"\
    \ } ).sort( { arrival_date: -1 } )`\n\n### 8.7.2 Behaviors and Limitations\n\n\
    Finally, the following are a few behaviors and limitations that you need to be\
    \ aware of:\n\n*   More than [64 indexes](http://docs.mongodb.org/manual/reference/limits/#limit-number-of-indexes-per-collection)\
    \ may not be allowed in a collection.\n*   Index keys cannot be larger than [1024\
    \ bytes](http://docs.mongodb.org/manual/reference/limits/#limit-index-size).\n\
    *   A document cannot be indexed if its fields’ values are greater than this size.\n\
    *   The following command can be used to query documents that are too large to\
    \ index:\n\n    `db.practicalCollection.find({<key>: <too large to index>}).hint({$natural:\
    \ 1})`\n\n*   An index name (including the [namespace](http://docs.mongodb.org/manual/reference/glossary/#term-namespace))\
    \ must be less than [128 characters](http://docs.mongodb.org/manual/reference/limits/#limit-index-name-length).\n\
    *   The insert/update speeds are impacted to some extent by an index.\n*   Do\
    \ not maintain indexes that are not used or will not be used.\n*   Since each\
    \ clause of an [`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)\
    \ query executes in parallel, each can use a different index.\n*   The queries\
    \ that use the [`sort()`](http://docs.mongodb.org/manual/reference/method/cursor.sort/#cursor.sort%23cursor.sort)\
    \ method and the [`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)\
    \ operator will not be able to use the indexes on the [`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)\
    \ fields.\n*   Queries that use the `$or` operator are not supported by the second\
    \ [geospatial query](http://docs.mongodb.org/manual/core/geospatial-indexes/).\n\
    \n## 8.8 Summary\n\nIn this chapter, you covered how data is stored under the\
    \ hood and how writes happen using journaling. You also looked at GridFS and the\
    \ different types of indexes available in MongoDB.\n\nIn the following chapter,\
    \ you will look at MongoDB from administration perspective.\n\n# 9. Administering\
    \ MongoDB\n\n> “Administering MongoDB is not like administering traditional RDBMS\
    \ databases. Although most of the administrative tasks are not required or are\
    \ done automatically by the system, still there are few tasks that need manual\
    \ intervention.”\n\nIn this chapter, you will go over the process of basic administrative\
    \ operations for backups and restoration, importing and exporting data, managing\
    \ the server, and monitoring the database instances."
  raw: '`db.userplaces.ensureIndex({"userloc" : "2d"}, {"min" : -1000, "max" : 1000})`


    Any documents with values beyond the maximum and the minimum values will be rejected.
    You can also create compound geospatial indexes.


    Let’s understand with an example how this index works. Say you have documents
    that are of the following type:


    `{"loc":[0,100], "desc":"coffeeshop"}`


    `{"loc":[0,1], "desc":"pizzashop"}`


    If the query of a user is to find all coffee shops near her location, the following
    compound index can help:


    `db.ensureIndex({"userloc" : "2d", "desc" : 1})`


    Geohaystack Indexes


    Geohaystack indexes are bucket-based geospatial indexes (also called geospatial
    haystack indexes). They are useful for queries that need to find out locations
    in a small area and also need to be filtered along another dimension, such as
    finding documents with coordinates within 10 miles and a type field value as `restaurant`.


    While defining the index, it’s mandatory to specify the `bucketSize` parameter
    as it determines the haystack index granularity. For example,


    `db.userplaces.ensureIndex({ userpos : "geoHaystack", type : 1 }, { bucketSize
    : 1 })`


    This example creates an index wherein keys within 1 unit of latitude or longitude
    are stored together in the same bucket. You can also include an additional category
    in the index, which means that information will be looked up at the same time
    as finding the location details.


    If your use case typically searches for "nearby" locations (i.e. "restaurants
    within 25 miles"), a haystack index can be more efficient.


    The matches for the additional indexed field (e.g. category) can be found and
    counted within each bucket.


    If, instead, you are searching for "nearest restaurant" and would like to return
    results regardless of distance, a normal 2d index will be more efficient.


    There are currently (as of MongoDB 2.2.0) a few limitations on haystack indexes:


    *   Only one additional field can be included in the haystack index.

    *   The additional index field has to be a single value, not an array.

    *   Null long/lat values are not supported.


    In addition to the above mentioned types, there is a new type of index introduced
    in version 2.4 that supports text search on a collection.


    Previously in beta, in the 2.6 release, text search is a built-in feature. It
    includes options such as searching in 15 languages and an aggregation option that
    can be used to set up faceted navigation by product or color, for example, on
    an e-commerce website.


    #### 8.7.1.3 Index Intersection


    Index intersection is introduced in version 2.6 wherein multiple indexes can be
    intersected to satiate a query. To explain it a bit further, let’s consider a
    products collection that holds documents of the following format


    `{ "_id": ObjectId(...),"category": ["food", "grocery"], "item": "Apple", "location":
    "16` ^(`th`) `Floor Store", "arrival": Date(...)}.`


    Let’s further assume that this collection has the following two indexes:


    `{ "item": 1 }.`


    `{ "location": 1 }.`


    Intersection of the above two indexes can be used for the following query:


    `db.products.find ({"item": "xyz", "location": "abc"})`


    You can run `explain()` to determine if index intersection is used for the above
    query. The explain output will include either of the following stages: AND_SORTED
    or AND_HASH. When doing index intersection, either the entire index or only the
    index prefix can be used.


    You next need to understand how this index intersection feature impacts the compound
    index creation.


    While creating a compound index, both the order in which the keys are listed in
    the index and the sort order (ascending and descending) matters. Thus a compound
    index may not support a query that does not have the index prefix or has keys
    with different sort order.


    To explain it a bit further, let’s consider a products collection that has the
    following compound index:


    `db.products.ensureIndex ({"item": 1, "location": 1})`


    In addition to the query, which is referring to all the fields of the compound
    index, the above compound index can also support queries that are using any of
    the index prefix (it can also support queries that are using only the item field).
    But it won’t be able to support queries that are using either only the location
    field or are using the item key with a different sort order.


    Instead, if you create two separate indexes, one on the item and the other on
    the location, these two indexes can either individually or though intersections
    support the four queries mentioned above. Thus, the choice between whether to
    create a compound index or to rely on intersection of indexes depends on the system’s
    needs.


    Note that index intersection will not apply when the `sort()` operation needs
    an index that is completely separate from the query predicate.


    For example, let’s assume for the products collection you have the following indexes:


    `{ "item": 1 }.`


    `{ "location": 1 }.`


    `{ "location": 1, "arrival_date":-1 }.`


    `{ "arrival_date": -1 }.`


    Index intersection will not be used for the following query:


    `db.products.find( { item: "xyz"} ).sort( { location: 1 } )`


    That is, MongoDBwill not use the `{ item: 1 }` index for the query, and the separate
    `{ location: 1 }` or the `{ location: 1, arrival_date: -1 }` index for the sort.


    However, index intersection can be used for the following query since the index
    `{location: 1,arrival_date: -1 }` can fulfil part of the query predicate:


    `db.products.find( { item: { "xyz"} , location: "A" } ).sort( { arrival_date:
    -1 } )`


    ### 8.7.2 Behaviors and Limitations


    Finally, the following are a few behaviors and limitations that you need to be
    aware of:


    *   More than [64 indexes](http://docs.mongodb.org/manual/reference/limits/#limit-number-of-indexes-per-collection)
    may not be allowed in a collection.

    *   Index keys cannot be larger than [1024 bytes](http://docs.mongodb.org/manual/reference/limits/#limit-index-size).

    *   A document cannot be indexed if its fields’ values are greater than this size.

    *   The following command can be used to query documents that are too large to
    index:


    `db.practicalCollection.find({<key>: <too large to index>}).hint({$natural: 1})`


    *   An index name (including the [namespace](http://docs.mongodb.org/manual/reference/glossary/#term-namespace))
    must be less than [128 characters](http://docs.mongodb.org/manual/reference/limits/#limit-index-name-length).

    *   The insert/update speeds are impacted to some extent by an index.

    *   Do not maintain indexes that are not used or will not be used.

    *   Since each clause of an [`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)
    query executes in parallel, each can use a different index.

    *   The queries that use the [`sort`](http://docs.mongodb.org/manual/reference/method/cursor.sort/#cursor.sort%23cursor.sort)
    `()` method and the [`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)
    operator will not be able to use the indexes on the [`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)
    fields.

    *   Queries that use the `$or` operator are not supported by the second [geospatial
    query](http://docs.mongodb.org/manual/core/geospatial-indexes/).


    ## 8.8 Summary


    In this chapter, you covered how data is stored under the hood and how writes
    happen using journaling. You also looked at GridFS and the different types of
    indexes available in MongoDB.


    In the following chapter, you will look at MongoDB from administration perspective.


    # 9. Administering MongoDB


    > “Administering MongoDB is not like administering traditional RDBMS databases.
    Although most of the administrative tasks are not required or are done automatically
    by the system, still there are few tasks that need manual intervention.”


    In this chapter, you will go over the process of basic administrative operations
    for backups and restoration, importing and exporting data, managing the server,
    and monitoring the database instances.'
