- fmt: "# 5.7.1 Using Authentication and Authorization\n\nAuthentication verifies\
    \ the user’s identity, and authorization determines the level of actions that\
    \ the user can perform on the authenticated database.\n\nThis means the users\
    \ will be able to access the database only if they log in using the credentials\
    \ that have access on the database. This disables anonymous access to the database.\
    \ After the user is authenticated, authorization can be used to ensure that the\
    \ user has only the required amount of access needed to accomplish the tasks at\
    \ hand.\n\nBoth authentication and authorization exist at a per-database level.\
    \ The users exist in the context of a single logical database.\n\nThe information\
    \ on the users is maintained in a collection named `system.users`, which exists\
    \ in the `admin` database. This collection maintains the credentials needed for\
    \ authenticating the user wherein it stores the user id, password, and the database\
    \ against which it is created, plus privileges needed for authorizing the user.\n\
    \nMongoDB uses a role-based approach for authorization (the roles of `read`, `readWrite`,\
    \ `readAnyDatabase`, etc.). If needed, the user administrator can create custom\
    \ roles.\n\nA privilege document within the `system.users` collection is used\
    \ for storing each user roles. The same document maintains the credentials for\
    \ authenticated users.\n\nAn example of a document in the `system.users` collection\
    \ is as follows:\n\n```\n{\n    _id : \"practicaldb.Shaks\",\n    user : \"Shaks\"\
    ,\n    db : \"practicaldb\",\n    credentials : {.......},\n    roles : [\n  \
    \      { role: \"read\", db: \"practicaldb\" },\n        { role: \"readWrite\"\
    , db: \"MyDB\" }\n    ],\n    ......\n}\n```\n\nThis document tells us that the\
    \ user `Shaks` is associated with database `practicaldb` and it has `read` roles\
    \ in the `practicaldb` database and a `readWrite` role in the `MyDB` database.\
    \ Note that a user name and the associated database uniquely identifies a user\
    \ within MongoDB, so if you have two users with the same name, but they are associated\
    \ with different databases, then they are considered as two unique users. Thus\
    \ a user can have multiple roles with different authorization levels on different\
    \ databases.\n\nThe available roles are:\n\n*   `read`: This provides a read-only\
    \ access of all the collections for the specified database.\n*   `readWrite`:\
    \ This provides a read-write access to any collection within the specified database.\n\
    *   `dbAdmin`: This enables the user to perform administrative actions within\
    \ the specified database such as index management using `ensureIndex`, `dropIndexes`,\
    \ `reIndex`, `indexStats`, renaming collections, creating collections, etc.\n\
    *   `userAdmin`: This enables the user to perform `readWrite` operations on the\
    \ `system.users` collection of the specified database. It also enables altering\
    \ permissions of existing users or creating new users. This is effectively the\
    \ `SuperUser` role for the specified database.\n*   `clusterAdmin`: This role\
    \ enables the user to grant access to administrative operations that alter or\
    \ display information about the complete system. `clusterAdmin` is applicable\
    \ only on the `admin` database.\n*   `readAnyDatabase`: This role enables user\
    \ to read from any database in the MongoDB environment.\n*   `readWriteAnyDatabase`:\
    \ This role is similar to `readWrite` except it is for all databases.\n*   `userAdminAnyDatabase`:\
    \ This role is similar to the `userAdmin` role except it applies to all databases.\n\
    *   `dbAdminAnyDatabase`: This role is the same as `dbAdmin`, except it applies\
    \ to all databases.\n*   Starting from version 2.6, a user admin can also create\
    \ user-defined roles to adhere to the policy of least privilege by providing access\
    \ at collection level and command level. A user-defined role is scoped to the\
    \ database in which it’s created and is uniquely identified by the combination\
    \ of the database and the role name. All the user defined roles are stored in\
    \ the `system.roles` collection.\n\n## 5.7.1.1 Enabling Authentication\n\nAuthentication\
    \ is disabled by default, so use `--auth` to enable authentication. While starting\
    \ `mongod`, use `mongod --auth`. Before enabling authentication, you need to have\
    \ at least one `admin` user. As you saw above, an `admin` user is a user who is\
    \ responsible for creating and managing other users.\n\nIt is recommended that\
    \ in production deployments such users are created solely for managing users and\
    \ should not be used for any other roles. In a MongoDB deployment, this user is\
    \ the first user that needs to be created; other users of the system can be created\
    \ by this user.\n\nThe `admin` user can be created either way: before enabling\
    \ the authentication or after enabling the authentication.\n\nIn this example,\
    \ you will first create the `admin` user and then enable the `auth` settings.\
    \ The below steps should be executed on the Windows platform.\n\nStart the `mongod`\
    \ with default settings:\n\n```\nC:\\>C:\\practicalmongodb\\bin\\mongod.exe\n\
    C:\\practicalmongodb\\bin\\mongod.exe --help for help and startup options\n2015-07-03T23:11:10.716-0700\
    \ I CONTROL Hotfix KB2731284 or later update is installed, no need to zero out\
    \ data files\n2015-07-03T23:11:10.716-0700 I JOURNAL [initandlisten] journal dir=C:\\\
    data\\db\\journal\n...................................................\n2015-07-03T23:11:10.763-0700\
    \ I CONTROL [initandlisten] MongoDB starting : pid=2776 port=27017 dbpath=C:\\\
    data\\db\\ 64-bit host=ANOC9\n2015-07-03T23:11:10.763-0700 I CONTROL [initandlisten]\
    \ targetMinOS: Windows 7/Windows Server 2008 R2\n2015-07-03T23:11:10.763-0700\
    \ I CONTROL [initandlisten] db version v3.0.4\n2015-07-03T23:11:10.764-0700 I\
    \ CONTROL [initandlisten] OpenSSL version: OpenSSL 1.0.1j-fips 19 Mar 2015\n2015-07-03T23:11:10.764-0700\
    \ I CONTROL [initandlisten] build info: windows sys. getwindowsversion(major=6,\
    \ minor=1, build=7601, platform=2, service_pack='Service Pack 1') BOOST_LIB_VERSION=1_49\n\
    2015-07-03T23:11:10.771-0700 I NETWORK [initandlisten] waiting for connections\
    \ on port 27017\n```\n\n## 5.7.1.2 Creating the Admin User\n\nRun another instance\
    \ of command prompt by running it as an administrator and execute the `mongo`\
    \ application:\n\n```\nC:\\> C:\\practicalmongodb\\bin\\mongo.exe\nMongoDB shell\
    \ version: 3.0.4\nconnecting to: test\n>\n```\n\n### Switching to the Admin Database\n\
    \nNote that `admin` db is a privileged database that the user needs access to\
    \ in order to execute certain administrative commands such as creating an admin\
    \ user.\n\n```\n> db = db.getSiblingDB('admin')\n```"
  raw: '### 5.7.1 Using Authentication and Authorization


    Authentication verifies the user’s identity, and authorization determines the
    level of actions that the user can perform on the authenticated database.


    This means the users will be able to access the database only if they log in using
    the credentials that have access on the database. This disables anonymous access
    to the database. After the user is authenticated, authorization can be used to
    ensure that the user has only the required amount of access needed to accomplish
    the tasks at hand.


    Both authentication and authorization exist at a per-database level. The users
    exist in the context of a single logical database.


    The information on the users is maintained in a collection named `system.users`,
    which exists in the admin database. This collection maintains the credentials
    needed for authenticating the user wherein it stores the user id, password, and
    the database against which it is created, plus privileges needed for authorizing
    the user.


    MongoDB uses a role-based approach for authorization (the roles of read, readWrite,
    readAnyDatabase, etc.). If needed, the user administrator can create custom roles.


    A privilege document within the `system.users` collection is used for storing
    each user roles. The same document maintains the credentials for authenticated
    users.


    An example of a document in the `system.users` collection is as follows:


    `{`


    `_id : "practicaldb.Shaks",`


    `user : "Shaks",`


    `db : "practicaldb",`


    `credentials : {.......},`


    `roles : [`


    `{ role: "read", db: "practicaldb" },`


    `{ role: "readWrite", db: "MyDB" }`


    `],`


    `......`


    `}`


    This document tells us that the user Shaks is associated with database `practicaldb`
    and it has read roles in the `practicaldb` database and a readWrite role in the
    `MyDB` database. Note that a user name and the associated database uniquely identifies
    a user within MongoDB, so if you have two users with the same name, but they are
    associated with different databases, then they are considered as two unique users.
    Thus a user can have multiple roles with different authorization levels on different
    databases.


    The available roles are


    *   read: This provides a read-only access of all the collections for the specified
    database.

    *   readWrite: This provides a read-write access to any collection within the
    specified database.

    *   dbAdmin: This enables the user to perform administrative actions within the
    specified database such as index management using ensureIndex, dropIndexes, reIndex,
    indexStats, renaming collections, creating collections, etc.

    *   userAdmin: This enables the user to perform readWrite operations on the `system.users`
    collection of the specified database. It also enables altering permissions of
    existing users or creating new users. This is effectively the SuperUser role for
    the specified database.

    *   clusterAdmin: This role enables the user to grant access to administrative
    operations that alter or display information about the complete system. clusterAdmin
    is applicable only on the admin database.

    *   readAnyDatabase: This role enables user to read from any database in the MongoDB
    environment.

    *   readWriteAnyDatabase: This role is similar to readWrite except it is for all
    databases.

    *   userAdminAnyDatabase: This role is similar to the userAdmin role except it
    applies to all databases.

    *   dbAdminAnyDatabase: This role is the same as dbAdmin, except it applies to
    all databases.

    *   Starting from version 2.6, a user admin can also create user-defined roles
    to adhere to the policy of least privilege by providing access at collection level
    and command level. A user-defined role is scoped to the database in which it’s
    created and is uniquely identified by the combination of the database and the
    role name. All the user defined roles are stored in the `system.roles` collection.


    #### 5.7.1.1 Enabling Authentication


    Authentication is disabled by default, so use `--auth` to enable authentication.
    While starting mongod, use `mongod --auth`. Before enabling authentication, you
    need to have at least one admin user. As you saw above, an admin user is a user
    who is responsible for creating and managing other users.


    It is recommended that in production deployments such users are created solely
    for managing users and should not be used for any other roles. In a MongoDB deployment,
    this user is the first user that needs to be created; other users of the system
    can be created by this user.


    The admin user can be created either way: before enabling the authentication or
    after enabling the authentication.


    In this example, you will first create the admin user and then enable the auth
    settings. The below steps should be executed on the Windows platform.


    Start the mongod with default settings:


    `C:\>C:\practicalmongodb\bin\mongod.exe`


    `C:\practicalmongodb\bin\mongod.exe --help for help and startup options`


    `2015-07-03T23:11:10.716-0700 I CONTROL Hotfix KB2731284 or later update is installed,
