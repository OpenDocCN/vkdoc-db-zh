    break away from the RDBMS paradigm.


    Let’s talk about technical scenarios and how they compare in RDBMS vs. NoSQL :'
  trans: '### 2.4.1 NoSQL 的优势


    我们来谈谈 `NoSQL` 数据库的优势。


    *   高可扩展性：当交易速率和快速响应要求增加时，这种纵向扩展的方法会失败。与此相反，新一代的 `NoSQL` 数据库被设计为可以横向扩展（即使用低端商用服务器进行水平扩展）。

    *   可管理性与维护性：`NoSQL` 数据库主要设计为自动修复、分布式数据和更简单的数据模型协同工作，从而降低了管理和维护的复杂度。

    *   低成本：`NoSQL` 数据库通常设计为在一组廉价的商用服务器集群上运行，使用户能够以低成本存储和处理更多数据。

    *   灵活的数据模型：`NoSQL` 数据库拥有非常灵活的数据模型，使其能够处理任何类型的数据；它们不遵循僵化的 `RDBMS` 数据模型。因此，任何涉及更新数据库模式的应用程序变更都可以轻松实现。


    ### 2.4.2 NoSQL 的劣势


    除了上述优势之外，在开始使用这些平台开发应用程序之前，你还需要意识到许多障碍。


    *   成熟度：大多数 `NoSQL` 数据库都是预生产版本，一些关键功能仍有待实现。因此，在决定使用某个 `NoSQL` 数据库时，你应该仔细分析该产品，确保其功能已完全实现，而非仍在待办事项列表中。

    *   支持：支持是你需要考虑的一个限制因素。大多数 `NoSQL` 数据库来自开源的初创公司。因此，与企业软件公司相比，其支持非常有限，并且可能缺乏全球覆盖范围或支持资源。

    *   有限的查询能力：由于 `NoSQL` 数据库通常是为了满足网络级应用程序的扩展需求而开发的，它们提供的查询能力有限。一个简单的查询需求可能也需要大量的编程专业知识。

    *   管理：尽管 `NoSQL` 旨在提供无需管理的解决方案，但安装和维护该方案仍然需要技能和精力。

    *   专业性：由于 `NoSQL` 是一个不断发展的领域，开发者和管理员群体中对该技术的专业知识仍然有限。


    尽管 `NoSQL` 正日益成为数据库领域的重要组成部分，但你需要了解这些产品的局限性和优势，以便为 `NoSQL` 数据库平台做出正确的选择。


    ### 2.5 SQL 与 NoSQL 数据库


    现在你已经了解了 `NoSQL` 数据库的详细信息。尽管 `NoSQL` 作为一种数据库解决方案正日益被采纳，但它并非用来取代 `SQL` 或 `RDBMS`
    数据库。在本节中，你将了解 `SQL` 和 `NoSQL` 数据库之间的差异。


    让我们快速回顾一下 `RDBMS` 系统。`RDBMS` 系统已经盛行了大约 30 年，即使现在，它们仍然是解决方案架构师为应用程序进行数据存储的默认选择。如果我们列举几个
    `RDBMS` 系统的优点，首先也是最重要的就是 `SQL` 的使用，这是一种用于数据处理的丰富的声明式查询语言，用户很容易理解。此外，`RDBMS` 系统为事务提供
    `ACID` 支持，这在许多领域（如银行应用）是必不可少的。


    然而，`RDBMS` 系统最大的缺点是在处理模式变更和随着数据增长而扩展的问题上存在困难。随着数据量的增加，读/写性能会下降。你会在 `RDBMS` 系统中遇到扩展问题，因为它们大多被设计为纵向扩展，而非横向扩展。


    与 `SQL RDBMS` 数据库相比，`NoSQL` 推广了数据存储，它们摆脱了 `RDBMS` 的范式。


    让我们谈谈技术场景以及它们在 `RDBMS` 与 `NoSQL` 中的比较：'
- fmt: "*   **Schema flexibility**：这对于未来的轻松增强以及与外部应用程序（出站或入站）的集成至关重要。RDBMS 在设计上相当不灵活。添加列是绝对不行的，尤其是当表中已有一些数据时。原因涉及默认值、索引和性能影响。很多时候，你最终不得不创建新表，并通过引入跨表关系来增加复杂性。\n\
    *   **Complex queries**：传统的表设计导致开发者编写复杂的 `JOIN` 查询，这些查询不仅难以实现和维护，而且执行时会消耗大量的数据库资源。\n\
    *   **Data update**：跨表更新数据可能是更复杂的场景之一，特别是当它们是事务的一部分时。请注意，长时间保持事务打开会损害性能。你还必须规划将更新传播到系统中的多个节点。如果系统不支持多主架构或同时写入多个节点，则存在节点故障以及整个应用程序转为只读模式的风险。\n\
    *   **Scalability**：通常可能需要的可伸缩性仅针对读取操作。然而，随着操作的增长，有多个因素会影响这种速度。需要提出的一些关键问题是：\n\
    \    *   在物理数据库实例之间同步数据需要多长时间？\n    *   在数据中心之间同步数据需要多长时间？\n    *   同步数据需要多少带宽？\n\
    \    *   数据交换是否经过优化？\n    *   任何更新在服务器之间同步时的延迟是多少？通常，记录会在更新期间被锁定。\nNoSQL 解决方案为上述大多数挑战提供了解决方案。现在让我们看看\
    \ NoSQL 如何应对上面提到的每个技术问题。\n*   **Schema flexibility**：列式数据库将数据存储为列，这与 RDBMS 中的行存储相反。这允许根据需要动态添加一列或多列的灵活性。同样，允许存储半结构化数据的文档存储也是不错的选择。\n\
    *   **Complex queries**：NoSQL 数据库不支持关系或外键。没有复杂的查询。没有 `JOIN` 语句。这是一个缺点吗？如何跨表查询？这无疑是一个功能上的缺陷。要跨表查询，必须执行多个查询。数据库是一个共享资源，被多个应用服务器使用，必须尽快释放。可选方案包括简化要执行的查询、缓存数据以及在应用层执行复杂操作的组合。许多数据库提供内置的实体级缓存。这意味着当访问一条记录时，数据库可能会自动透明地缓存它。为了性能和扩展性，缓存可能是内存分布式缓存。\n\
    *   **Data update**：跨物理实例的数据更新和同步是难以解决的工程问题。数据中心内节点间的同步与跨多个数据中心的同步有不同的要求。人们希望延迟最好在几毫秒或几十毫秒之内。NoSQL\
    \ 解决方案提供了强大的同步选项。例如，`MongoDB` 允许跨节点并发更新、带冲突解决的同步，并最终在可接受的时间内（通常是几毫秒）实现数据中心间的一致性。因此，`MongoDB`\
    \ 没有隔离的概念。请注意，由于管理事务的复杂性可能被移出数据库，应用程序将不得不付出一些额外的努力。一个例子是在实现事务时使用两阶段提交（[`http://docs.mongodb.org/manual/tutorial/perform-two-phase-commits/`](http://docs.mongodb.org/manual/tutorial/perform-two-phase-commits/)）。大量数据库提供多版本并发控制（`MCC`）来实现事务一致性。正如\
    \ eBay 的技术研究员 Dan Pritchett（[`www.addsimplicity.com/`](http://www.addsimplicity.com/)）所说，`eBay.com`\
    \ 不使用事务。请注意，`PayPal` 确实使用事务。\n*   **Scalability**：由于显而易见的原因，`NoSQL` 解决方案提供了更大的可扩展性。许多面向事务的\
    \ RDBMS 所需的复杂性，在不符合 `ACID` 的 `NoSQL` 数据库中并不存在。有趣的是，由于 `NoSQL` 不提供跨表引用，并且没有 `JOIN`\
    \ 查询，而且你无法编写单个查询来整理来自多个表的数据，一个简单而合乎逻辑的解决方案是——有时——在表之间复制数据。在某些场景下，将信息嵌入到主实体中——特别是一对一映射的情况下——可能是个好主意。\n\
    \n表 [2-2](#A332296_1_En_2_Chapter.html#Tab2) 对比了 `SQL` 和 `NoSQL` 技术。\n\n表 2-2.\
    \ SQL vs. NoSQL\n\n|   | SQL Databases | NoSQL Databases |\n| --- | --- | ---\
    \ |\n| **类型** | 所有类型都支持 SQL 标准。 | 存在多种类型，如文档存储、键值存储、列数据库等。 |\n| **开发历史** | 开发于\
    \ 1970 年代。 | 开发于 2000 年代。 |\n| **示例** | `SQL Server`, `Oracle`, `MySQL`。 | `MongoDB`,\
    \ `HBase`, `Cassandra`。 |\n| **数据存储模型** | 数据以行和列的形式存储在表中，每列都有特定类型。表通常根据规范化原则创建。使用联接（`Join`）从多个表中检索数据。\
    \ | 数据模型取决于数据库类型。例如，对于键值存储，数据存储为键值对。在基于文档的数据库中，数据存储为文档。与 RDBMS 的刚性表模型相比，数据模型是灵活的。\
    \ |\n| **模式** | 固定的结构和模式，因此对模式的任何更改都涉及修改数据库。 | 动态模式，可以通过扩展或修改当前模式来容纳新的数据类型或结构。可以动态添加新字段。\
    \ |\n| **可扩展性** | 采用纵向扩展（`Scale up`）方法；这意味着随着负载增加，需要购买更大、更昂贵的服务器来容纳数据。 | 采用横向扩展（`Scale\
    \ out`）方法；这意味着将数据负载分布到廉价的商用服务器上。 |\n| **支持事务** | 支持 `ACID` 和事务。 | 支持分区和可用性，但在事务上有所妥协。事务存在于某些级别，如数据库级别或文档级别。\
    \ |\n| **一致性** | 强一致性。 | 取决于具体产品。少数提供强一致性，而另一些提供最终一致性。 |\n| **支持** | 提供高水平的企业级支持。\
    \ | 开源模型。通过第三方或构建开源产品的公司获得支持。 |\n| **成熟度** | 已经存在很长时间。 | 其中一些是成熟的；其他的仍在发展中。 |\n\
    | **查询能力** | 通过易于使用的图形用户界面（`GUI`）提供。 | 查询可能需要编程专业知识和知识。重点在于功能和编程接口，而非用户界面（`UI`）。\
    \ |\n| **专业知识** | 拥有庞大的开发者社区，他们一直在利用 `SQL` 语言和 `RDBMS` 概念来架构和开发应用程序。 | 在这些开源工具上工作的开发者社区较小。\
    \ |"
  raw: "*   Schema flexibility : This is a must for easy future enhancements and integration\
    \ with external applications (outbound or inbound). RDBMS are quite inflexible\
    \ in their design. Adding a column is an absolute no-no, especially if the table\
    \ has some data. The reasons range from default value, indexes, and performance\
    \ implications. More often than not, you end up creating new tables, and increasing\
    \ the complexity by introducing relationships across tables.\n*   Complex queries\
    \ : The traditional designing of the tables leads to developers writing complex\
    \ JOIN queries, which are not only difficult to implement and maintain but also\
    \ take substantial database resources to execute.\n*   Data update : Updating\
    \ data across tables is probably one of the more complex scenarios, especially\
    \ if they are a part of the transaction. Note that keeping the transaction open\
    \ for a long duration hampers the performance. You also have to plan for propagating\
    \ the updates to multiple nodes across the system. And if the system does not\
    \ support multiple masters or writing to multiple nodes simultaneously, there\
    \ is a risk of node failure and the entire application moving to read-only mode.\n\
    *   Scalability : Often the only scalability that may be required is for read\
    \ operations. However, several factors impact this speed as operations grow. Some\
    \ of the key questions to ask are:\n    *   What is the time taken to synchronize\
    \ the data across physical database instances?\n    *   What is the time taken\
    \ to synchronize the data across datacenters?\n    *   What is the bandwidth requirement\
    \ to synchronize data?\n    *   Is the data exchanged optimized?\n    *   What\
    \ is the latency when any update is synchronized across servers? Typically, the\
    \ records will be locked during an update.NoSQL-based solutions provide answers\
    \ to most of the challenges listed above. Let’s now see what NoSQL has to offer\
    \ against each technical question mentioned above.\n*   Schema flexibility : Column-oriented\
    \ databases store data as columns as opposed to rows in RDBMS. This allows the\
    \ flexibility of adding one or more columns as required, on the fly. Similarly,\
    \ document stores that allow storing semi-structured data are also good options.\n\
    *   Complex queries : NoSQL databases do not have support for relationships or\
    \ foreign keys. There are no complex queries. There are no JOIN statements. Is\
    \ that a drawback? How does one query across tables? It is a functional drawback,\
    \ definitely. To query across tables, multiple queries must be executed. A database\
    \ is a shared resource, used across application servers and must not be released\
    \ from use as quickly as possible. The options involve a combination of simplifying\
    \ the queries to be executed, caching data, and performing complex operations\
    \ in the application tier. A lot of databases provide in-built entity-level caching.\
    \ This means that when a record is accessed, it may be automatically cached transparently\
    \ by the database. The cache may be in-memory distributed cache for performance\
    \ and scale.\n*   Data update : Data updating and synchronization across physical\
    \ instances are difficult engineering problems to solve. Synchronization across\
    \ nodes within a datacenter has a different set of requirements compared to synchronizing\
    \ across multiple datacenters. One would want the latency within a couple of milliseconds\
    \ or tens of milliseconds at the best. NoSQL solutions offer great synchronization\
    \ options. MongoDB, for example, allows concurrent updates across nodes, synchronization\
    \ with conflict resolution, and eventually, consistency across the datacenters\
    \ within an acceptable time that would run in few milliseconds. As such, MongoDB\
    \ has no concept of isolation. Note that now because the complexity of managing\
    \ the transaction may be moved out of the database, the application will have\
    \ to do some hard work. An example of this is a two-phase commit while implementing\
    \ transactions ( [`http://docs.mongodb.org/manual/tutorial/perform-two-phase-commits/`](http://docs.mongodb.org/manual/tutorial/perform-two-phase-commits/)\
    \ ). A plethora of databases offer multiversion concurrency control (MCC) to achieve\
    \ transactional consistency. Well, as Dan Pritchett ( [`www.addsimplicity.com/`](http://www.addsimplicity.com/)\
    \ ), Technical Fellow at eBay puts it, eBay.com does not use transactions. Note\
    \ that PayPal does use transactions.\n*   Scalability : NoSQL solutions provider\
    \ greater scalability for obvious reasons. A lot of the complexity that is required\
    \ for transaction-oriented RDBMS does not exist in ACID non-compliant NoSQL databases.\
    \ Interestingly, since NoSQL does not provide cross-table references and there\
    \ are no JOIN queries possible, and because you can’t write a single query to\
    \ collate data across multiple tables, one simple and logical solution is to—at\
    \ times—duplicate the data across tables. In some scenarios, embedding the information\
    \ within the primary entity—especially in one-to-one mapping cases—may be a great\
    \ idea.\n\nTable [2-2](#A332296_1_En_2_Chapter.html#Tab2) compares SQL and NoSQL\
    \ technologies.\n\nTable 2-2.\n\nSQL vs. NoSQL\n\n|   | SQL Databases | NoSQL\
    \ Databases |\n| --- | --- | --- |\n| Types | All types support SQL standard.\
    \ | Multiple types exists, such as document stores, key value stores, column databases,\
    \ etc. |\n| Development History | Developed in 1970. | Developed in 2000s. |\n\
    | Examples | SQL Server, Oracle, MySQL. | MongoDB, HBase, Cassandra. |\n| Data\
    \ Storage Model | Data is stored in rows and columns in a table, where each column\
    \ is of a specific type. The tables generally are created on principles of normalization.\
    \ Joins are used to retrieve data from multiple tables. | The data model depends\
    \ on the database type. Say data is stored as a key-value pair for key-value stores.\
    \ In document-based databases, the data is stored as documents. The data model\
    \ is flexible, in contrast to the rigid table model of the RDBMS. |\n| Schemas\
    \ | Fixed structure and schema, so any change to schema involves altering the\
    \ database. | Dynamic schema, new data types, or structures can be accommodated\
    \ by expanding or altering the current schema. New fields can be added dynamically.\
    \ |\n| Scalability | Scale up approach is used; this means as the load increases,\
    \ bigger, expensive servers are bought to accommodate the data. | Scale out approach\
    \ is used; this means distributing the data load across inexpensive commodity\
    \ servers. |\n| Supports Transactions | Supports ACID and transactions. | Supports\
    \ partitioning and availability, and compromises on transactions. Transactions\
    \ exist at certain level, such as the database level or document level. |\n| Consistency\
    \ | Strong consistency. | Dependent on the product. Few chose to provide strong\
    \ consistency whereas few provide eventual consistency. |\n| Support | High level\
    \ of enterprise support is provided. | Open source model. Support through third\
    \ parties or companies building the open source products. |\n| Maturity | Have\
    \ been around for a long time. | Some of them are mature; others are evolving.\
    \ |\n| Querying Capabilities | Available through easy-to-use GUI interfaces. |\
    \ Querying may require programming expertise and knowledge. Rather than an UI,\
    \ focus is on functionality and programming interfaces. |\n| Expertise | Large\
    \ community of developers who have been leveraging the SQL language and RDBMS\
    \ concepts to architect and develop applications. | Small community of developers\
    \ working on these open source tools. |"
