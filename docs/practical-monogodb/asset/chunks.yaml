- fmt: '# 1. Big Data


    > “Big data is a term used to describe data that has massive volume, comes in
    a variety of structures, and is generated at high velocity. This kind of data
    poses challenges to the traditional `RDBMS` systems used for storing and processing
    data. Bid data is paving way for newer approaches of processing and storing data.”


    In this chapter, we will talk about big data basics, sources, and challenges.
    We will introduce you to the three Vs (volume, velocity, and variety) of big data
    and the limitations that traditional technologies face when it comes to handling
    big data.


    ## 1.1 Getting Started


    Big data, along with cloud, social, analytics, and mobility, are buzz words today
    in the information technology world. The availability of the Internet and electronic
    devices for the masses is increasing every day. Specifically, smartphones, social
    networking sites, and other data-generating devices such as tablets and sensors
    are creating an explosion of data. Data is generated from various sources in various
    formats such as video, text, speech, log files, and images. A single second of
    a high-definition (`HD`) video generates 2,000 times more bytes than that of a
    single page of text.


    Consider the following statistics about Facebook, as reported on the company’s
    web site:


    There were 968 million daily active users on average for June of 2015. There were
    844 million mobile daily active users on average for June of 2015.

    There were 1.49 billion monthly active users as of June 30, 2015. There were 1.31
    billion mobile monthly active users as of June 30, 2015.

    There were 4.5 billion likes generated daily as of May 2013, which is a 67 percent
    increase from August 2012.


    Figure 1-1 depicts the statistics of Twitter.


    ![A332296_1_En_1_Fig1_HTML.jpg](A332296_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1.** If you printed Twitter…


    Here’s another example: consider the amount of data that a simple event like going
    to a movie can generate. You start by searching for a movie on movie review sites,
    reading reviews about that movie, and posting queries. You may tweet about the
    movie or post photographs of going to the movie on Facebook. While travelling
    to the theater, your `GPS` system tracks your course and generates data.


    You get the picture: smartphones, social networking sites, and other media are
    creating flood of data for companies to process and store. When the size of data
    poses challenges to the ability of typical software tools to capture, process,
    store, and manage data, then we have big data in hand. Figure 1-2 graphically
    defines big data.


    ![A332296_1_En_1_Fig2_HTML.jpg](A332296_1_En_1_Fig2_HTML.jpg)


    **Figure 1-2.** Definition of Big Data


    ## 1.2 Big Data


    Big data is data that has high volume, is generated at high velocity, and has
    multiple varieties. Let’s look at few facts and figures of big data.


    ### 1.2.1 Facts About Big Data


    Various research teams around the world have done analysis on the amount of data
    being generated. For example, `IDC`’s analysis revealed that the amount of digital
    data generated in a single year (2007) is larger than the world’s total capacity
    to store it, which means there is no way in which to store all of the data that
    is being generated. Also, the rate at which data is getting generated will soon
    outgrow the rate at which data storage capacity is expanding.


    The following sections cover insights from the `MGI` (McKinsey Global Institute)
    report (`www.mckinsey.com/insights/business_technology/big_data_the_next_frontier_for_innovation`)
    that was published in May 2011. The study makes the case that the business and
    economic possibilities of big data and its wider implications are important issues
    that business leaders and policy makers must tackle.


    #### 1.2.1.1 The Size of Big Data Varies Across Sectors


    The growth of big data is a phenomenon that is observed in every sector. `MGI`
    estimates that enterprises around the world used more than 7 exabytes of incremental
    disk drive data storage capacity in 2010; what’s interesting is that nearly 80
    percent of that total seemed to duplicate data that was stored elsewhere. `MGI`
    also estimated that, by 2009, nearly all sectors in the US economy had at least
    an average of 200 terabytes of stored data per company and that many sectors had
    more than 1 petabyte in mean stored data per company.


    Some sectors exhibited far higher levels of data intensity than others; in this
    case, data intensity refers to the average amount of data getting accumulated
    across companies/firms of that sector, implying that they have more potential
    to capture value from big data.


    Financial services sectors, including banking, investment, and securities services,
    are highly transaction-oriented; they are also required by regulations to store
    data. The analysis shows that they have the most digital data stored per firm
    on average.


    Communications and media firms, utilities, and government also have significant
    digital data stored per enterprise or organization, which appears to reflect the
    fact that such entities have a high volume of operations and multimedia data.


    Discrete and process manufacturing have the highest aggregate data stored in bytes.
    However, these sectors rank much lower in intensity terms, since they are fragmented
    into a large number of firms.


    #### 1.2.1.2 The Big Data Type Varies Across Sectors


    The `MGI` research also shows that the type of data stored also varies by sector.
    For instance, retail and wholesale, administrative parts of government, and financial
    services all generate significant amounts of text and numerical data including
    customer data, transaction information, and mathematical modeling and simulations.
    Sectors such as manufacturing, health care, media and communications are responsible
    for higher percentages of multimedia data. And image data in the form of X-rays,
    CT, and other scans dominate data storage volumes in health care.


    In terms of geographic spread of big data, North America and Europe have 70% of
    the global total currently. Thanks to cloud computing, data generated in one region
    can be stored in another country’s datacenter. As a result, countries with significant
    cloud and hosting provider offerings tend to have high storage of data.'
