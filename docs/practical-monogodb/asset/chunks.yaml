- fmt: '## 5.8 使用 MongoDB Cloud Manager 进行配置


    在本章开始时，你学习了如何在 Windows 和 Linux 上安装和配置 MongoDB。在本章的这一部分，你将了解如何使用 MongoDB Cloud
    Manager。


    MongoDB Cloud Manager 是数据库开发者内置的监控解决方案。在 2.6 版本之前，MongoDB Cloud Manager（以前称为 MongoDB
    监控服务或 MMS）仅用于监控和管理 MongoDB。从 2.6 版本开始，MongoDB Cloud Manager 引入了重大增强功能，包括备份、时间点恢复和自动化功能，使得操作
    MongoDB 比以往更加简单。自动化功能为管理员提供了强大的能力，只需几次点击即可快速创建、升级、扩展或关闭 MongoDB 实例。


    在本书的这一部分，你将了解如何开始使用 MongoDB Cloud Manager。你将使用 MongoDB Cloud Manager 在 AWS 上部署一个独立的
    MongoDB 实例。


    当你开始使用 MongoDB Cloud Manager 时，它会要求在每个服务器上安装一个自动化代理，MongoDB Cloud Manager 随后使用该代理与服务器通信。


    为了开始配置，你首先需要在 MongoDB Cloud Manager 上创建你的个人资料。


    输入以下 URL：`https://cloud.mongodb.com`。根据你是否有账户，点击“登录”或“免费注册”按钮。


    由于你是第一次开始，请点击“免费注册”按钮。这将带你到图 [5-1](#A332296_1_En_5_Chapter.html#Fig1) 所描绘的页面。


    ![A332296_1_En_5_Fig1_HTML.jpg](A332296_1_En_5_Fig1_HTML.jpg)


    图 5-1.


    账户个人资料


    你将创建一个新的个人资料。不过，MongoDB 提供了一个加入现有 Cloud Manager 组的选项。


    输入所有相关详细信息，如图 [5-1](#A332296_1_En_5_Chapter.html#Fig1) 所示，然后点击“继续”。这将带你到提供公司信息的页面。完成个人资料和公司信息后，接受条款并点击“创建账户”按钮。这样就完成了个人资料的创建。下一步是创建一个组（图
    [5-2](#A332296_1_En_5_Chapter.html#Fig2)）。


    ![A332296_1_En_5_Fig2_HTML.jpg](A332296_1_En_5_Fig2_HTML.jpg)


    图 5-2.


    创建组


    为组提供一个唯一的名称，然后点击“创建组”。接下来是部署选择页面，如图 [5-3](#A332296_1_En_5_Chapter.html#Fig3) 所示，在这里你可以选择构建新部署或管理现有部署。


    ![A332296_1_En_5_Fig3_HTML.jpg](A332296_1_En_5_Fig3_HTML.jpg)


    图 5-3.


    部署


    选择构建新部署。接下来，系统将提示你选择构建部署的位置（即本地、AWS 或其他远程环境）。在此示例中，选择 AWS。点击“在 AWS 中部署”选项，将引导你在自行配置和使用
    Cloud Manager 配置之间进行选择。


    选择“我将配置”选项，这意味着你将使用已在 AWS 上为你配置的机器。


    下一个屏幕提供了部署类型的选项（即独立实例、副本集或分片集群）。你正在执行独立部署，因此点击“创建独立实例”框。这将带你到如图 [5-4](#A332296_1_En_5_Chapter.html#Fig4)
    所示的屏幕。


    ![A332296_1_En_5_Fig4_HTML.jpg](A332296_1_En_5_Fig4_HTML.jpg)


    图 5-4.


    独立实例的详细信息


    提供实例名称和数据目录前缀，然后点击“继续”。接下来是如图 [5-5](#A332296_1_En_5_Chapter.html#Fig5) 所示的屏幕，它提示你在每个服务器上安装自动化代理。


    ![A332296_1_En_5_Fig5_HTML.jpg](A332296_1_En_5_Fig5_HTML.jpg)


    图 5-5.


    安装自动化代理


    此屏幕有一个用于指定服务器数量的选项。在此示例中，你指定 1。


    接下来，你需要指定平台。选择 Ubuntu。然后会出现如图 [5-6](#A332296_1_En_5_Chapter.html#Fig6) 所示的屏幕。


    ![A332296_1_En_5_Fig6_HTML.jpg](A332296_1_En_5_Fig6_HTML.jpg)


    图 5-6.


    自动化代理安装说明


    按照步骤操作。


    在你实施启动代理的步骤之前，你需要确保所有相关端口都是开放的（443、4949、27000 到 27018）。


    一旦所有步骤完成，点击“验证代理”按钮。验证后，如果一切工作正常，你将看到一个“继续”按钮。


    当你点击“继续”时，你将进入如图 [5-7](#A332296_1_En_5_Chapter.html#Fig7) 所示的“审查和部署”页面，在这里你可以看到所有将要部署的进程。在这里，自动化代理会下载并安装监控和备份代理。


    ![A332296_1_En_5_Fig7_HTML.jpg](A332296_1_En_5_Fig7_HTML.jpg)


    图 5-7.


    审查和部署


    点击“部署”按钮将带你到部署页面，部署更改状态为“进行中”。当安装完成时，部署状态将变为“目标状态”，已配置的服务器将出现在拓扑视图中。


    如果你的部署支持 SSL 或使用任何身份验证机制，你需要手动下载并安装监控代理。


    为了检查所有代理是否正常工作，你可以点击控制台上的“管理”选项卡。


    Cloud Manager 可以在任何连接到互联网的服务器上部署 MongoDB 副本集、分片集群和独立实例。服务器只需要能够向 Cloud Manager
    发起出站 TCP 连接。


    ## 5.9 小结


    在本章中，你学习了如何在 Windows 和 Linux 平台上安装 MongoDB。你还研究了一些确保数据库安全使用所必需的重要配置。你通过使用 MongoDB
    Cloud Manager 进行配置结束了本章。


    在下一章中，你将开始学习 MongoDB Shell。


    # 6. 使用 MongoDB Shell


    > “mongo shell 是 MongoDB 标准发行版的一部分。它提供了一个 JavaScript 环境，可以完全访问该语言和标准函数。它为 MongoDB
    数据库提供了完整的接口。”


    在本章中，你将学习 mongo shell 的基础知识以及如何使用它来管理 MongoDB 文档。在深入研究创建与数据库交互的应用程序之前，理解 MongoDB
    shell 的工作原理非常重要。


    要感受 MongoDB 数据库，没有比从 MongoDB shell 开始更好的方法了。MongoDB shell 的介绍分为三个部分，以便读者更容易掌握和实践这些概念。


    第一部分涵盖了数据库的基本功能，包括基本的 CRUD 操作符。下一部分涵盖高级查询。本章的最后一部分解释了存储和检索数据的两种方式：嵌入和引用。'
  raw: '## 5.8 Provisioning Using MongoDB Cloud Manager


    In the starting of the chapter, you learned how to install and configure MongoDB
    using Windows and Linux. In this part of the chapter, you will look at how to
    use MongoDB Cloud Manager .


    Mongo DBCloud Manager is a monitoring solution built in by the developer of the
    database. Prior to version 2.6, MongoDB Cloud Manager (formerly known as MongoDB
    Monitoring Service or MMS ) was used for monitoring and administering MongoDB
    only. Starting from version 2.6, major enhancements have been introduced to MongoDB
    Cloud Manager including backup, point-in-time recovery, and an automation feature,
    making the task of operating MongoDB simpler than before. The automation feature
    provides power capabilities to administrators to quickly create, upgrade, scale,
    or shut down MongoDB instances in few clicks.


    In this part of the book, you will see how to get started with MongoDB Cloud Manager.
    You will deploy a standalone MongoDB instance on AWS using MongoDB Cloud Manager.


    When you start with MongoDB Cloud Manager, it asks to install an automation agent
    on each server, which is then used by the MongoDB Cloud Manager for communicating
    with the server.


    In order to start provisioning, you first need to create your profile on MongoDB
    Cloud Manager.


    Enter the following URL: [`https://cloud.mongodb.com`](https://cloud.mongodb.com/)
    . Click the Login or Sign up for Free button, based on whether you have an account
    or not.


    Since you are starting for the first time, clicked the Sign up for Free button.
    This sends you to the page depicted in Figure [5-1](#A332296_1_En_5_Chapter.html#Fig1).


    ![A332296_1_En_5_Fig1_HTML.jpg](A332296_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    Account Profile


    You will be creating a new profile. However, MongoDB provides an option for joining
    as existing Cloud Manager group.


    Enter all the relevant details, as shown in Figure [5-1](#A332296_1_En_5_Chapter.html#Fig1),
    and click Continue. This sends you to the page for providing company information.
    Once you complete the profile and company information, accept the terms and click
    the Create Account button. This completes the profile creation. The next step
    is to create a group (Figure [5-2](#A332296_1_En_5_Chapter.html#Fig2)).


    ![A332296_1_En_5_Fig2_HTML.jpg](A332296_1_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    Create Group


    Provide a unique name for the group, and click Create Group. Next is the deployment
    selection page shown in Figure [5-3](#A332296_1_En_5_Chapter.html#Fig3), where
    you have the option to build a new deployment or manage an existing deployment.


    ![A332296_1_En_5_Fig3_HTML.jpg](A332296_1_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    Deployment


    Select to build a new deployment. Next, you’ll be prompted for the location of
    where to build the deployment (i.e. Local, AWS, or other remote environment).
    In this example, select AWS. Clicking the Deploy in AWS option leads you to choose
    between provision on your own and using Cloud Manager to provision.


    Select the “I will Provision” option, which means you will be using a machine
    that is already provisioned to you on AWS.


    The next screen provides options for the deployment type (i.e. standalone, replica
    set, or sharded cluster). You are doing a standalone deployment, so click the
    Create Standalone box. This sends you to the screen shown in Figure [5-4](#A332296_1_En_5_Chapter.html#Fig4).


    ![A332296_1_En_5_Fig4_HTML.jpg](A332296_1_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    Details for a standalone instance


    Provide the instance name and data directory prefix, and click Continue. Next
    is the screen shown in Figure [5-5](#A332296_1_En_5_Chapter.html#Fig5), which
    prompts you to install an automation agent on each server


    ![A332296_1_En_5_Fig5_HTML.jpg](A332296_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    Installing an automation agent


    This screen has an option for specifying the number of servers. In this example,
    you specify 1.


    Next, you need to specify the platform. Choose Ubuntu. Then the screen in Figure
    [5-6](#A332296_1_En_5_Chapter.html#Fig6) appears.


    ![A332296_1_En_5_Fig6_HTML.jpg](A332296_1_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    Automation agent installation instructions


    Follow the steps.


    Before you implement the step where you start the agent, you need to ensure that
    all the relevant ports are open (443, 4949, 27000 to 27018).


    Once all the steps are completed, click the Verify Agent button. Post verification,
    if everything is working as needed, you’ll see a Continue button.


    When you click Continue, you will go to the Review and Deploy page shown in Figure
    [5-7](#A332296_1_En_5_Chapter.html#Fig7) where you can see all of the processes
    that are going to get deployed. Here an automation agent downloads and installs
    the monitoring and backup agent.


    ![A332296_1_En_5_Fig7_HTML.jpg](A332296_1_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    Review and deploy


    Clicking the Deploy button takes you to the deployment page with the deploying
    changes status as “In progress.” When the installation is complete, the deployment
    status will change to “Goal State” and the provisioned server will appear in the
    toplogy view.


    If your deployment supports SSL or using any authentication mechanism, you need
    to download and install a monitoring agent manually.


    In order to vet whether all the agents are working properly or not, you can click
    the Administration tab on the console.


    The Cloud Manager can deploy MongoDB replica sets, sharded clusters, and standalones
    on any Internet-connected server. The servers need only be able to make outbound
    TCP connections to the Cloud Manager.


    ## 5.9 Summary


    In this chapter, you learned how to install MongoDB on the Windows and Linux platforms.
    You also looked at some important configurations that are necessary to ensure
    secure and safe usage of the database. You concluded the chapter by provisioning
    using MongoDB Cloud Manager.


    In the following chapter, you will get started with MongoDB Shell.


    # 6. Using MongoDB Shell


    > “mongo shell comes with the standard distribution of MongoDB. It offers a JavaScript
    environment with complete access to the language and the standard functions. It
    provides a full interface for the MongoDB database.”


    In this chapter, you learn the basics of the mongo shell and how to use it to
    manage MongoDB documents. Before you delve into creating applications that interact
    with the database, it is important to understand how the MongoDB shell works.


    There’s no better way to get a feel for a MongoDB database than to get started
    with the MongoDB shell. The MongoDB shell introduction has been divided into three
    parts in order to make it easier for the readers to grasp and practice the concepts.


    The first section covers the basic features of the database, including the basic
    CRUD operators. The next section covers advanced querying. The last section of
    the chapter explains the two ways of storing and retrieving data: embedding and
    referencing.'
