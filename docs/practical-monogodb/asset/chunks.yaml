  raw: '#### 6.1.7.9 explain(  )


    The `explain()` function can be used to see what steps the MongoDB database is
    running while executing a query. Starting from version 3.0, the output format
    of the function and the parameter that is passed to the function have changed.
    It takes an optional parameter called `verbose`, which determines what the explain
    output should look like. The following are the verbosity modes: `allPlansExecution`,
    `executionStats` , and `queryPlanner`. The default verbosity mode is `queryPlanner`
    , which means if nothing is specified, it defaults to `queryPlanner`.


    The following code covers the steps executed when filtering on the `username`
    field:


