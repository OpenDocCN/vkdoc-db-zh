    One important point that you need to consider when using secondaries for scaling
    read operations is that in MongoDB the replication is asynchronous, which means
    if any write or update operation is performed on the master’s data, the secondary
    data will be momentarily out-of-date. If the application in question is read-heavy
    and is accessed over a network and does not need up-to-date data, the secondaries
    can be used to scale out the read in order to provide a good read throughput.
    Although by default the read requests are routed to the primary node, the requests
    can be distributed over secondary nodes by specifying the read preferences. Figure
    [7-9](#A332296_1_En_7_Chapter.html#Fig9) depicts the default read preference.


    ![A332296_1_En_7_Fig9_HTML.jpg](A332296_1_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Default read preference


    The following are ideal use cases whereby routing the reads on secondary node
    can help gain a significant improvement in the read throughput and can also help
    reduce the latency:


    Applications that are geographically distributed: In such cases, you can have
    a replica set that is distributed across geographies. The read preferences should
    be set to read from the nearest secondary node. This helps in reducing the latency
    that is caused when reading over network and this improves the read performance.
    See Figure [7-10](#A332296_1_En_7_Chapter.html#Fig10).


    ![A332296_1_En_7_Fig10_HTML.jpg](A332296_1_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    Read Preference – Nearest   If the application always requires up-to-date data,
    it uses the option `primaryPreferred`, which in normal circumstances will always
    read from the primary node, but in case of emergency will route the read to secondaries.
    This is useful during failovers. See Figure [7-11](#A332296_1_En_7_Chapter.html#Fig11).


    ![A332296_1_En_7_Fig11_HTML.jpg](A332296_1_En_7_Fig11_HTML.jpg)


    Figure 7-11.


    Read Preference – primaryPreferred   If you have an application that supports
    two types of operations, the first operation is the main workload that involves
    reading and doing some processing on the data, whereas the second operation generates
    reports using the data. In such a scenario, you can have the reporting reads directed
    to the secondaries.  


    MongoDB supports the following read preference modes:


    *   primary: This is the default mode. All the read requests are routed to the
    primary node.

    *   primaryPreferred: In normal circumstances the reads will be from primary but
    in an emergency such as a primary not available, reads will be from the secondary
    nodes.

    *   secondary: Reads from the secondary members.

    *   secondaryPreferred: Reads from secondary members. If secondaries are unavailable,
    then read from the primary.

    *   nearest: Reads from the nearest replica set member.


    In addition to scaling reads, the second ideal use case for using secondaries
    is to offload intensive processing, aggregating, and administration tasks in order
    to avoid degrading the primary’s performance. Blocking operations can be performed
    on the secondary without ever affecting the primary node’s performance.


    #### 7.4.2.10 Application Write Concerns


    When the client application interacts with MongoDB, it is generally not aware
    whether the database is on standalone deployment or is deployed as a replica set.
    However, when dealing with replica sets, the client should be aware of write concern
    and read concern.


    Since a replica set duplicates the data and stores it across multiple nodes, these
    two concerns give a client application the flexibility to enforce data consistency
    across nodes while performing read or write operations.


    Using a write concern enables the application to get a success or failure response
    from MongoDB.


    When used in a replica set deployment of MongoDB, the write concern sends a confirmation
    from the server to the application that the write has succeeded on the primary
    node. However, this can be configured so that the write concern returns success
    only when the write is replicated to all the nodes maintaining the data.


    In practical scenario, this isn’t feasible because it will reduce the write performance.
    Ideally the client can ensure, using a write concern, that the data is replicated
    to one more node in addition to the primary, so that the data is not lost even
    if the primary steps down.


    The write concern returns an object that indicates either error or no error.


    The `w` option ensures that the write has been replicated to the specified number
    of members. Either a number or a majority can be specified as the value of the
    `w` option .


    If a number is specified, the write replicates to that many number of nodes before
    returning success. If a majority is specified, the write is replicated to a majority
    of members before returning the result.


    Figure [7-12](#A332296_1_En_7_Chapter.html#Fig12) shows how a write happens with
    w: 2.


    ![A332296_1_En_7_Fig12_HTML.jpg](A332296_1_En_7_Fig12_HTML.jpg)


    Figure 7-12.


    writeConcern


    If while specifying number the number is greater than the nodes that actually
    hold the data, the command will keep on waiting until the members are available.
    In order to avoid this indefinite wait time, `wtimeout` should also be used along
    with `w`, which will ensure that it will wait for the specified time period, and
    if the write has not succeeded by that time, it will time out.


    ##### How Writes Happen with Write Concern


    In order to ensure that the written data is present on say at least two members,
    issue the following command :


    `>db.testprod.insert({i:”test”, q: 50, t: “B”}, {writeConcern: {w:2}})`


    In order to understand how this command will be executed, say you have two members,
    one named primary and the other named secondary, and it is syncing its data from
    the primary.


    But how will the primary know the point at which the secondary is synced? Since
    the primary’s oplog is queried by the secondary for op results to be applied,
    if the secondary requests an op written at say t time, it implies to the primary
    that the secondary has replicated all ops written before t.


    The following are the steps that a write concern takes.


    The write operation is directed to the primary.   The operation is written to
    the oplog of primary with `ts` depicting the time of operation.   A `w: 2` is
    issued, so the write operation needs to be written to one more server before it’s
    marked successful.   The secondary queries the primary’s oplog for the op, and
    it applies the op.   Next, the secondary sends a request to the primary requesting
    for ops with `ts` greater than t.   At this point, the primary sends an update
    that the operation until t has been applied by the secondary as it’s requesting
    for ops with `{ts: {$gt: t}}`.   The writeConcern finds that a write has occurred
    on both the primary and secondary, satisfying the `w: 2` criteria, and the command
    returns success.'
  trans: '#### 7.4.2.9 扩展读取操作


    尽管从节点的主要目的是确保在主节点发生故障时数据仍然可用，但它们还有其他有效的使用场景。它们可以被专门用于执行备份操作、数据处理任务，或者用于扩展读取操作。扩展读取操作的一种方式是向从节点发出读取查询；这样做可以减轻主节点上的负载。


    当使用从节点来扩展读取操作时，你需要考虑的一个重要点是：在 MongoDB 中，复制是异步的。这意味着，如果在主节点数据上执行了任何写入或更新操作，从节点的数据将暂时过时。如果所讨论的应用程序是读取密集型的，并且通过网络访问，且不需要最新的数据，那么可以使用从节点来扩展读取，以提供良好的读取吞吐量。尽管默认情况下读取请求会被路由到主节点，但可以通过指定**读取偏好**将请求分配到从节点上。图
    7-9 描绘了默认的读取偏好。


    ![A332296_1_En_7_Fig9_HTML.jpg](img/A332296_1_En_7_Fig9_HTML.jpg)


    图 7-9. 默认读取偏好


    以下是理想的应用场景，在这些场景中，将读取路由到从节点可以显著提高读取吞吐量，并有助于降低延迟：


    地理分布的应用程序：在这种情况下，你可以拥有一个跨地理区域分布的副本集。读取偏好应设置为从**最近的**从节点读取。这有助于减少通过网络读取时引起的延迟，从而提高读取性能。参见图
    7-10。


    ![A332296_1_En_7_Fig10_HTML.jpg](img/A332296_1_En_7_Fig10_HTML.jpg)


    图 7-10. 读取偏好 – 最近节点


    如果应用程序总是需要最新的数据，它会使用`primaryPreferred`选项。在正常情况下，它总是从主节点读取，但在紧急情况下（如主节点不可用）会将读取路由到从节点。这在发生故障转移时很有用。参见图
    7-11。


    ![A332296_1_En_7_Fig11_HTML.jpg](img/A332296_1_En_7_Fig11_HTML.jpg)


    图 7-11. 读取偏好 – primaryPreferred


    如果你有一个支持两种类型操作的应用程序，第一种操作是主要的负载，涉及读取并对数据进行某些处理，而第二种操作是使用数据生成报告。在这种情况下，你可以将报告读取操作定向到从节点。


    MongoDB 支持以下读取偏好模式：


    *   `primary`：这是默认模式。所有读取请求都被路由到主节点。

    *   `primaryPreferred`：在正常情况下从主节点读取，但在紧急情况（如主节点不可用）下，从从节点读取。

    *   `secondary`：从从节点成员读取。

    *   `secondaryPreferred`：从从节点成员读取。如果从节点不可用，则从主节点读取。

    *   `nearest`：从最近的副本集成员读取。


    除了扩展读取之外，使用从节点的第二个理想用例是卸载密集的处理、聚合和管理任务，以避免降低主节点的性能。可以在从节点上执行阻塞操作，而不会影响主节点的性能。


    #### 7.4.2.10 应用程序写关注点


    当客户端应用程序与 MongoDB 交互时，它通常不知道数据库是独立部署还是部署为副本集。然而，在处理副本集时，客户端应该了解**写关注点**和**读关注点**。


    由于副本集会复制数据并将其存储在多个节点上，这两个关注点使客户端应用程序能够在执行读写操作时灵活地在节点间强制数据一致性。


    使用写关注点使应用程序能够从 MongoDB 获取成功或失败的响应。


    在 MongoDB 的副本集部署中使用时，写关注点会从服务器向应用程序发送确认，表明写入已在主节点成功。然而，可以对此进行配置，使得写关注点仅在写入被复制到所有维护数据的节点后才返回成功。


    在实际场景中，这并不可行，因为它会降低写入性能。理想情况下，客户端可以使用写关注点确保数据在主节点之外，还被复制到至少一个其他节点，这样即使主节点下台，数据也不会丢失。


    写关注点返回一个指示错误或无错误的对象。


    `w` 选项确保写入已被复制到指定数量的成员。可以指定一个数字或`majority`（多数）作为`w`选项的值。


    如果指定了一个数字，写入在复制到该数量的节点后才会返回成功。如果指定了`majority`，写入在复制到多数成员后才会返回结果。


    图 7-12 展示了使用`w: 2`时写入如何发生。


    ![A332296_1_En_7_Fig12_HTML.jpg](img/A332296_1_En_7_Fig12_HTML.jpg)


    图 7-12. writeConcern


    如果在指定数字时，该数字大于实际持有数据的节点数，命令将一直等待，直到有足够多的成员可用。为了避免这种无限期的等待时间，应同时使用`w`和`wtimeout`，这将确保只等待指定的时间段，如果写入在该时间内未成功，则会超时。


    ##### 写关注点下写入如何发生


    为了确保写入的数据至少存在于两个成员上，可以发出以下命令：


    ```

    >db.testprod.insert({i:”test”, q: 50, t: “B”}, {writeConcern: {w:2}})

    ```


    为了理解此命令将如何执行，假设你有两个成员，一个名为 primary，另一个名为 secondary，并且它正在从 primary 同步其数据。


    但是，primary 如何知道 secondary 同步到了哪个点？由于 secondary 会查询 primary 的 oplog 以应用操作结果，如果
    secondary 请求一个在时间`t`写入的操作，对 primary 而言，这意味着 secondary 已经复制了所有在`t`之前写入的操作。


    以下是写关注点采取的步骤：


    1.  写操作被定向到主节点。

    2.  该操作被写入主节点的 oplog，其中`ts`表示操作时间。

    3.  发出了一个`w: 2`，因此写操作需要在被标记为成功之前被写入另一个服务器。

    4.  从节点查询主节点的 oplog 以获取该操作，并应用该操作。

    5.  接下来，从节点向主节点发送请求，请求`ts`大于`t`的操作。

    6.  此时，主节点发送更新，表明直到`t`的操作已被从节点应用，因为它正在请求`{ts: {$gt: t}}`的操作。

    7.  `writeConcern`发现写入已在主节点和从节点上发生，满足了`w: 2`的条件，于是命令返回成功。'
- fmt: '### 7.4.3 Implementing Advanced Clustering with Replica Sets


    Having learned the architecture and inner workings of replica sets, you will now
    focus on administration and usage of replica sets. You will be focusing on the
    following:


    Setting up a replica set.

    Removing a server.

    Adding a server.

    Adding an arbiter.

    Inspecting the status.

    Forcing a new election of a primary.

    Using the web interface to inspect the status of the replica set.


    The following examples assume a replica set named `testset` that has the configuration
    shown in Table [7-2](#A332296_1_En_7_Chapter.html#Tab2).


    Table 7-2. Replica Set Configuration


    | Member | Daemon | Host:Port | Data File Path |

    | --- | --- | --- | --- |

    | Active_Member_1 | Mongod | [hostname]:27021 | C:\db1\active1\data |

    | Active_Member_2 | Mongod | [hostname]:27022 | C:\db1\active2\data |

    | Passive_Member_1 | Mongod | [hostname]:27023 | C:\db1\passive1\data |


    The hostname used in the above table can be found out using the following command:

    ```shell

    C:\>hostname

    ANOC9

    C:\>

    ```


    In the following examples, the `[hostname]` need to be substituted with the value
    that the `hostname` command returns on your system. In our case, the value returned
    is `ANOC9`, which is used in the following examples.


    Use the default (`MMAPv1`) storage engine in the following implementation.


    #### 7.4.3.1 Setting Up a Replica Set


    In order to get the replica set up and running, you need to make all the active
    members up and running.


    The first step is to start the first active member. Open a terminal window and
    create the `data` directory:

    ```shell

    C:\>mkdir C:\db1\active1\data

    C:\>

    ```


    Connect to the `mongod`:

    ```shell

    c:\practicalmongodb\bin>mongod --dbpath C:\db1\active1\data --port 27021 --replSet
    testset/ANOC9:27021 –rest

    2015-07-13T23:48:40.543-0700 I CONTROL ** WARNING: --rest is specified without
    --httpinterface,

    2015-07-13T23:48:40.543-0700 I CONTROL ** enabling http interface

    2015-07-13T23:48:40.543-0700 I CONTROL Hotfix KB2731284 or later update is installed,
    no need to zero-out data files

    2015-07-13T23:48:40.563-0700 I JOURNAL [initandlisten] journal dir=C:\db1\active1\data\journal

    2015-07-13T23:48:40.564-0700 I JOURNAL [initandlisten] recover : no journal files
    present, no recovery needed

    ..................................... port=27021 dbpath=C:\db1\active1\data 64-bit
    host=ANOC9

    2015-07-13T23:48:40.614-0700 I CONTROL [initandlisten] targetMinOS: Windows 7/Windows
    Server 2008 R2

    2015-07-13T23:48:40.615-0700 I CONTROL [initandlisten] db version v3.0.4

    ```


    As you can see, the `–replSet` option specifies the name of the replica set the
    instance is joining and the name of one more member of the set, which in the above
    example is `Active_Member_2`.


    Although you have only specified one member in the above example, multiple members
    can be provided by specifying comma-separated addresses like so:

    ```shell

    mongod –dbpath C:\db1\active1\data –port 27021 –replset testset/[hostname]:27022,[hostname]:27023
    --rest

    ```


    In the next step, you get the second active member up and running. Create the
    `data` directory for the second active member in a new terminal window.

    ```shell

    C:\>mkdir C:\db1\active2\data

    C:\>

    ```


    Connect to `mongod`:

    ```shell

    c:\ practicalmongodb \bin>mongod --dbpath C:\db1\active2\data --port 27022 –replSet
    testset/ANOC9:27021 –rest

    2015-07-13T00:39:11.599-0700 I CONTROL ** WARNING: --rest is specified without
    --httpinterface,

    2015-07-13T00:39:11.599-0700 I CONTROL ** enabling http interface

    2015-07-13T00:39:11.604-0700 I CONTROL Hotfix KB2731284 or later update is installed,
    no need to zero-out data files

    2015-07-13T00:39:11.615-0700 I JOURNAL [initandlisten] journal dir=C:\db1\active2\data\journal

    2015-07-13T00:39:11.615-0700 I JOURNAL [initandlisten] recover : no journal files
    present, no recovery needed

    2015-07-13T00:39:11.664-0700 I JOURNAL [durability] Durability thread started

    2015-07-13T00:39:11.664-0700 I JOURNAL [journal writer] Journal writer thread
    started rs.initiate() in the shell -- if that is not already done

    ```


    Finally, you need to start the passive member. Open a separate window and create
    the `data` directory for the passive member.

    ```shell

    C:\>mkdir C:\db1\passive1\data

    C:\>

    ```


    Connect to `mongod`:

    ```shell

    c:\ practicalmongodb \bin>mongod --dbpath C:\db1\passive1\data --port 27023 --replSet
    testset/ ANOC9:27021 –rest

    2015-07-13T05:11:43.746-0700 I CONTROL Hotfix KB2731284 or later update is installed,
    no need to zero-out data files

    2015-07-13T05:11:43.757-0700 I JOURNAL [initandlisten] journal dir=C:\db1\passive1\data\journal

    2015-07-13T05:11:43.808-0700 I CONTROL [initandlisten] MongoDB starting : pid=620
    port=27019 dbpath=C:\db1\passive1\data 64-bit host= ANOC9

    ......................................................................................

    2015-07-13T05:11:43.812-0700 I CONTROL [initandlisten] options: { net: { http:

    { RESTInterfaceEnabled: true, enabled: true }, port: 27019 }, replication: { re

    lSet: "testset/ ANOC9:27017" }, storage: { dbPath: "C:\db1\passive1\data" }

    ```


    In the preceding examples, the `--rest` option is used to activate a REST interface
    on port +1000. Activating REST enables you to inspect the replica set status using
    web interface.


    By the end of the above steps, you have three servers that are up and running
    and are communicating with each other; however the replica set is still not initialized.
    In the next step, you initialize the replica set and instruct each member about
    their responsibilities and roles.


    In order to initialize the replica set, you connect to one of the servers. In
    this example, it is the first server, which is running on port `27021`.


    Open a new command prompt and connect to the `mongo` interface for the first server:

    ```shell

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo ANOC9 --port 27021

    MongoDB shell version: 3.0.4

    connecting to: ANOC9:27021/test

    >

    ```


    Next, switch to the `admin` database.

    ```shell

    > use admin

    switched to db admin

    >

    ```


    Next, a configuration data structure is set up, which mentions server wise roles:

    ```javascript

    >cfg = {

    ... _id: ''testset'',

    ... members: [

    ... {_id:0, host: ''ANOC9:27021''},

    ... {_id:1, host: ''ANOC9:27022''},

    ... {_id:2, host: ''ANOC9:27023'', priority:0}

    ... ]

    ... }

    { "_id" : "testset",

    "members" : [

    {

    "_id" : 0,

    "host" : "ANOC9:27021"

    },

    ..........

    {

    "_id" : 2,

    "host" : "ANOC9:27023",

    "priority" : 0

    } ]}>

    ```


    With this step the replicas set structure is configured.


    You have used `0` priority when defining the role for the passive member. This
    means that the member cannot be promoted to primary.


    The next command initiates the replica set:

    ```javascript

    > rs.initiate(cfg)

    { "ok" : 1}

    ```


    Let’s now view the replica set status in order to vet that it’s set up correctly:

    ```javascript

    testset:PRIMARY> rs.status()

    {

    "set" : "testset",

    "date" : ISODate("2015-07-13T04:32:46.222Z")

    "myState" : 1,

    "members" : [

    {

    "_id" : 0,

    ...........................

    testset:PRIMARY>

    ```


    The output indicates that all is OK. The replica set is now successfully configured
    and initialized.


    Let’s see how you can determine the primary node. In order to do so, connect to
    any of the members and issue the following and verify the primary:

    ```javascript

    testset:PRIMARY> db.isMaster()

    {

    "setName" : "testset",

    "setVersion" : 1,

    "ismaster" : true,

    "primary" : " ANOC9:27021",

    "me" : "ANOC9:27021",

    ...........................................

    "localTime" : ISODate("2015-07-13T04:36:52.365Z"),

    .........................................................

    "ok" : 1

    }testset:PRIMARY>

    ```'
