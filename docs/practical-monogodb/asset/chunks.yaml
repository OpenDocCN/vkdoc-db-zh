  trans: "\n# 5.7.1 使用身份验证与授权\n\n身份验证用于核实用户的身份，而授权则决定用户在通过身份验证的数据库上可执行操作的权限级别。\n\n\
    这意味着，用户只有在使用拥有该数据库访问权限的凭据登录后，才能访问数据库。这便禁用了对数据库的匿名访问。在用户通过身份验证后，可使用授权来确保用户仅拥有完成当前任务所需的最小访问权限。\n\
    \n身份验证与授权都存在于每个数据库级别。用户存在于单个逻辑数据库的上下文中。\n\n用户信息存储在名为 `system.users` 的集合中，该集合位于\
    \ `admin` 数据库中。此集合维护着身份验证所需的凭据，其中存储了用户 ID、密码、以及创建该用户所关联的数据库，还有用于授权用户的权限信息。\n\n\
    MongoDB 采用基于角色的方法进行授权（例如 `read`、`readWrite`、`readAnyDatabase` 等角色）。如果需要，用户管理员可以创建自定义角色。\n\
    \n`system.users` 集合中的每个权限文档用于存储每个用户的角色。同一个文档也维护着已通过身份验证的用户的凭据。\n\n`system.users`\
    \ 集合中文档示例如下：\n\n```\n{\n    _id : \"practicaldb.Shaks\",\n    user : \"Shaks\"\
    ,\n    db : \"practicaldb\",\n    credentials : {.......},\n    roles : [\n  \
    \      { role: \"read\", db: \"practicaldb\" },\n        { role: \"readWrite\"\
    , db: \"MyDB\" }\n    ],\n    ......\n}\n```\n\n此文档告诉我们，用户 `Shaks` 关联于数据库 `practicaldb`，它在\
    \ `practicaldb` 数据库中拥有 `read` 角色，在 `MyDB` 数据库中拥有一个 `readWrite` 角色。请注意，用户名及其关联的数据库在\
    \ MongoDB 中唯一标识一个用户，因此，如果你有两个同名的用户，但他们关联于不同的数据库，那么他们将被视为两个不同的用户。所以，一个用户可以在不同的数据库上拥有具有不同授权级别的多个角色。\n\
    \n可用的角色包括：\n\n*   `read`: 提供对指定数据库所有集合的只读访问权限。\n*   `readWrite`: 提供对指定数据库内任何集合的读写访问权限。\n\
    *   `dbAdmin`: 使用户能够在指定数据库内执行管理操作，例如使用 `ensureIndex`、`dropIndexes`、`reIndex`、`indexStats`\
    \ 进行索引管理，重命名集合，创建集合等。\n*   `userAdmin`: 使用户能够对指定数据库的 `system.users` 集合执行 `readWrite`\
    \ 操作。它还允许更改现有用户的权限或创建新用户。这实质上是该指定数据库的 `SuperUser`（超级用户）角色。\n*   `clusterAdmin`:\
    \ 此角色使用户有权访问可更改或显示整个系统信息的管理操作。`clusterAdmin` 仅适用于 `admin` 数据库。\n*   `readAnyDatabase`:\
    \ 此角色使用户能够读取 MongoDB 环境中的任何数据库。\n*   `readWriteAnyDatabase`: 此角色与 `readWrite`\
    \ 类似，但适用于所有数据库。\n*   `userAdminAnyDatabase`: 此角色与 `userAdmin` 角色类似，但适用于所有数据库。\n\
    *   `dbAdminAnyDatabase`: 此角色与 `dbAdmin` 相同，但适用于所有数据库。\n*   从版本 2.6 开始，用户管理员还可以创建用户自定义角色，以遵循最小特权原则，在集合级别和命令级别提供访问权限。用户自定义角色的作用域限定于其创建的数据库，并由数据库和角色名称的组合唯一标识。所有用户定义的角色都存储在\
    \ `system.roles` 集合中。\n\n## 5.7.1.1 启用身份验证\n\n身份验证默认是禁用的，因此请使用 `--auth` 来启用它。在启动\
    \ `mongod` 时，使用 `mongod --auth`。在启用身份验证之前，你需要至少有一个 `admin` 用户。如上所述，`admin` 用户是负责创建和管理其他用户的用户。\n\
    \n建议在生产部署中，此类用户应专门用于管理用户，而不应承担任何其他角色。在 MongoDB 部署中，该用户是需要创建的第一个用户；系统的其他用户可以由该用户创建。\n\
    \n`admin` 用户可以在启用身份验证之前创建，也可以在启用之后创建。\n\n在此示例中，你将首先创建 `admin` 用户，然后启用 `auth` 设置。以下步骤应在\
    \ Windows 平台上执行。\n\n使用默认设置启动 `mongod`：\n\n```\nC:\\>C:\\practicalmongodb\\bin\\\
    mongod.exe\nC:\\practicalmongodb\\bin\\mongod.exe --help for help and startup\
