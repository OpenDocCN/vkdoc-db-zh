  trans: '

    ## 12.2 编码


    一旦获得硬件，在编写数据库代码时请考虑以下建议：


    ### 数据模型选择


    首要的一点是，根据给定的应用需求思考要使用的数据模型，并决定采用嵌入、引用还是两者混合的方式。更多相关内容，请参阅第 tk 章。在快速性能和保证即时一致性之间需要做出权衡，因此请根据您的应用程序来决定。


    ### 避免文档无限增长


    应避免导致文档大小无限增长的应用程序模式。在 MongoDB 中，单个 BSON 文档的最大尺寸为 16MB。应避免使文档以无界方式增长的应用程序模式。例如，应用程序不应以导致文档显著增大的方式更新文档。当文档大小超过分配的大小时，MongoDB
    将重新定位该文档。这个过程不仅耗时，而且资源密集，并可能不必要地减慢其他数据库操作。此外，它还可能导致存储空间利用效率低下。请注意，上述限制适用于 MMAPv1
    存储引擎。使用 WiredTiger 时，每次更新都会重写文档。


    例如，考虑一个博客应用程序。在此应用中，很难估计一篇博客文章会收到多少回复。应用程序被设定为仅向用户显示一部分评论，比如最近的评论或前 10 条评论。在这种情况下，与其创建一个将博客文章和用户响应维护为单个文档的嵌入模型，您应该创建一个引用模型，其中每个响应或响应组作为单独的文档维护，然后在这些文档中添加对博客文章的引用。通过这种方式，可以控制文档的无限增长——如果遵循第一种嵌入数据的模式，这种增长就会发生。


    ### 为未来设计文档


    您也可以为未来设计文档。尽管 MongoDB 提供了根据需要向文档中追加新字段的选项，但这有一个缺点。当引入新字段时，可能会出现文档无法容纳在当前可用空间中的情况，导致
    MongoDB 为文档寻找新空间并将其移动过去，这可能需要时间。因此，如果您了解文档结构，无论当时是否有数据可用，最好一开始就创建所有字段。如上所述，空间将被分配给文档，当有值时只需进行更新。这样做，MongoDB
    就不必寻找空间；它只需更新输入的值，这样速度要快得多。


    ### 预设文档大小


    在适用的情况下，也可以创建具有预期大小的文档。这一点也是为了确保为文档分配足够的空间，任何进一步的增长都不会导致为寻找空间而四处转移。这可以通过使用一个“垃圾”字段来实现，该字段在最初插入文档时包含一个预期大小的字符串，然后立即取消设置该字段：

    ```javascript

    > mydbcol.insert({"_id" : ObjectID(..),......, "tempField" : stringOfAnticipatedSize})

    > mydbcol.update({"_id" : ...}, {"$unset" : {"tempField" : 1}})

    ```


    ### 子文档 vs 数组


    当您知道并且将始终知道要访问的字段名称时，应始终使用子文档。否则，请使用数组。


    ### 存储计算结果


    如果您想查询的信息必须经过计算而未明确存在于文档中，最佳选择是在文档中使该信息明确。由于 MongoDB 旨在仅存储和检索数据，它本身不执行任何计算。任何琐碎的计算都被推送到客户端，从而导致性能问题。


    ### 避免使用 `$Where`


    另外，尽可能避免使用 `$Where`，因为它是一个极其耗时且资源密集的操作。


    ### 使用正确的数据类型


    在设计文档时使用正确的数据类型。例如，数字应仅存储为数字数据类型，而不是字符串数据类型。使用字符串存储数据会占用更多空间，并对可以对数据执行的操作产生影响。


    ### 字符串大小写敏感性


    另一件需要注意的事情是，MongoDB 中的字符串是区分大小写的。因此，搜索 `"practicalMongoDB"` 将找不到 `"Practicalmongodb"`。因此，在进行字符串搜索时，您可以执行以下操作之一：

    *   以规范化大小写格式存储数据。

    *   搜索时使用带有 `/I` 的正则表达式。

    *   在聚合框架中使用 `$toUpper` 或 `$toLower`。


    ### 自定义 _id 主键


    使用您自己的唯一键作为 `_id` 将节省一点空间，并且如果您计划对该键建立索引，这将很有用。但是，在决定使用自己的键作为 `_id` 时，需要牢记以下几点：

    *   您必须确保该键的唯一性。

    *   同时，请考虑键的插入顺序，因为插入顺序将决定维护此索引需要使用多少 RAM。


    ### 只返回需要的字段


    按需检索字段。当每秒需要满足成百上千个请求时，只获取所需字段无疑是有利的。


    ### 使用 GridFS


    仅当数据大于单个文档所能容纳的大小或太大而无法在客户端一次性加载时（例如视频），才使用 GridFS 存储。任何将流式传输给客户端的数据都是 GridFS
    的良好候选。


    ### 使用 TTL 自动删除文档


    使用 TTL（生存时间）删除文档。如果集合中的文档需要在预定义的时间段后被删除，则可以使用 TTL 功能在文档达到预定义的存在时间后自动删除。


    假设您有一个集合，其中存储了包含用户与系统交互详细信息的文档。这些文档有一个名为 `lastActivity` 的日期字段，用于跟踪用户与系统的交互。假设您有一个需求，要求只保留用户会话一小时。在这种情况下，您可以为
    `lastActivity` 字段设置 TTL 为 3600 秒。一个后台线程将自动运行，检查并删除闲置超过 3600 秒的文档。


    ### 使用固定集合


    如果您需要基于插入顺序的高吞吐量，请使用固定集合。在某些情况下，根据数据大小，您需要在系统中维护一个数据的滚动窗口。例如，固定集合可用于存储高容量系统的日志信息，以快速检索最新的日志条目。


    ### 注意数据一致性


    请注意，如果不加以注意，MongoDB 的灵活模式可能导致数据不一致。例如，复制数据（嵌入文档）的能力，如果未正确更新，可能导致数据不一致，等等。因此，检查数据一致性非常重要。


    ### 处理异常与故障转移


    尽管 MongoDB 可以处理无缝故障转移，但根据良好的编码实践，应用程序应编写得当，以处理任何异常并优雅地应对这种情况。

    '
- fmt: '## 12.3 Application Response Time Optimization


    Once you start developing the application, one of the most important requirements
    is to have an acceptable response time. In other words, the application should
    respond instantly. You can use the following tips for optimization purposes:


    *   Avoid disk access and page faults as much as possible. Proactively figure
    out the data set size the application will be expected to deal with and add more
    memory in order to avoid page faults and disk read. Also, program your application
    in such a way that it mostly access data available in memory so page faults will
    happen infrequently.

    *   Create an index on the queried fields. If you create an index on the filter
    that you executing, the way the index is stored in memory will lead to less consumption
    of memory and hence will have a positive effect on the queries.

    *   Create covering indexes if the application involves queries that return a
    few fields as compared to the complete document structure.

    *   Having one compound index that can be used by maximum queries will also save
    on memory because instead of loading multiple indexes in memory, one index will
    suffice.

    *   Use trailing wildcards in regular expressions to reap the benefits from the
    associated index.

    *   Try to create indexes that reduce the possible documents to select from radically.
    An index on field “Gender” will not be as beneficial as an index on field “Phone
    Number.”

    *   Indexing is not always good. You need to maintain an optimal balances of indexes
    used. Although you should create indexes for supporting your queries, you should
    also remember to delete indexes that are no longer used because every index has
    a cost associated for insert/update operations. If an index is not used but still
    it exists, it can have an adverse effect on the overall database capacity. This
    is especially important for insert-heavy workloads.

    *   Documents should be designed in a hierarchical fashion where related things
    are grouped together and are depicted as hierarchy wherever applicable. This will
    enable MongoDB to find the desired information without scanning the entire document.

    *   When applying an AND operator, you should always query from small resultset
    to a larger resultset because this will lead to querying a small number of documents.
    If you are aware of the most restrictive condition, that condition should go first.

    *   When querying with OR, you should move from a larger resultset to a smaller
    resultset because this will limit the search space for subsequent queries.

    *   The working set should fit in memory.

    *   Use the WiredTiger storage engine for write-heavy and I/O intensive applications
    due to its support of compression at the block as well as the index level.


    ## 12.4 Data Safety


    You learned what you need to keep in mind when deciding on your deployment; you
    also learned a few important tips for good performance. Now let’s look at some
    tips for data safety and consistency:


    *   Replication and journaling are two approaches that are provided for data safety.
    Generally it’s recommended to run the production setup using replication rather
    than running it using a single server. And you should have at least one of the
    servers journaled. When it is not possible to have replication enabled and you
    are running on a single server, journaling provides data safety. Chapter tk explains
    how writes work when journaling is enabled.

    *   A repair should be the last resort for recovering data in the case of a server
    crash. Although the database might not be corrupted after running a repair, it
    will not contain all of the data.

    *   In a replicated environment, set `W` to the majority of safe writes. This
    is to ensure that the write is replicated to the majority of the members of the
    replica set. Although this will slow down the write operations, the write will
    be safe.

    *   Always specify `wtimeout` along with `w` when issuing the command in order
    to avoid the infinite waiting time.

    *   MongoDB should always be run in a trusted environment with rules to prevent
    access from all unknown systems, machines, or networks.


    ## 12.5 Administration


    The following are some administration tips:


    *   Take instant-in-time backups of durable servers. To take a backup of a database
    with journaling enabled, you can take a file system snapshot or do a normal fsync+lock
    and then dump. Note that you can’t just copy all of the files without fsync and
    locking because copying is not an instantaneous operation.

    *   Repair should be used to compact databases because it basically does a mongodump
    and then a mongorestore, making a clean copy of your data and, in the process,
    removing any empty “holes” in your data files.

    *   Database Profiler is provided by MongoDB. It logs fine-grained information
    on all the database operations. It can be enabled to either log information of
    all events or only events with durations exceeding a configurable threshold, which
    defaults to 100ms.


    Note: The profiler data is stored in a capped collection. As compared to parsing
    the log files, it may be easier to query this collection.


    *   An explain plan can be used to see how a query is being resolved. This involves
    information such as which index is used, how many documents are returned, whether
    the index is covering the query, how many index entries were scanned, and the
    time the query took to return results in milliseconds. When a query is resolved
    in less than 1ms, the explain plan shows `0`. When you make a call to the explain
    plan, it discards the old plan and initiates the process of testing available
    indexes to ensure that the best possible plan is used.


    ## 12.6 Replication Lag


    Replication lag is the primary administrative concern behind monitoring replica
    sets. Replication lag for a given secondary is the difference in time when an
    operation is written in primary and the time when the same was replicated on the
    secondary. Often, the replication lag remedies itself and is transient. However,
    if it remains high and continues to rise, there might be a problem with the system.
    You might end up either shutting down the system until the problem is resolved,
    or it might require manual intervention for reconciling the mismatch, or you might
    even end up running the system with outdated data.


    The following command can be used to determine the current replication lag of
    the replica set:


    ```

    testset:PRIMARY> rs.printSlaveReplicationInfo()

    ```


    Further, you can use the `rs.printReplicationInfo()` command to fill in the missing
    piece:


    ```

    testset:PRIMARY> rs.printReplicationInfo()

    ```


    MongoDB Cloud Manager can also be used to view recent and historical replication
    lag information. The repl lag graph is available from the Status tab of each SECONDARY
    node.


    Here are some tips to help reduce this time:


    *   In scenarios with a heavy write load, you should have a secondary as powerful
    as the primary node so that it can keep up with the primary and the writes can
    be applied on the secondary at the same rate. Also, you should have enough network
    bandwidth so that the ops can be retrieved from the primary at the same rate at
    which they are getting created.

    *   Adjust the application write concern.

    *   If the secondary is used for index builds, this can be planned to be done
    when there are low write activities on the primary.

    *   If the secondary is used for taking backups, consider taking backups without
    blocking.

    *   Check for replication errors. Run `rs.status()` and check the `errmsg` field.
    Additionally, the secondary’s log files can be checked for any existing error
    messages.


    ## 12.7 Sharding


    When the data no longer fits on one node, sharding can be used to ensure that
    the data is distributed evenly across the cluster and the operations are not affected
    due to resource constraints.


    *   Select a good shard key.

    *   You must use three config servers in production deployments to provide redundancy.

    *   Shard collections before they reach 256GB.'
