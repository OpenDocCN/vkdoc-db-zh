- fmt: "# 10.2.1 Schema Design\n\nThe solution you are providing is aimed at minimizing\
    \ the number of documents that must be loaded in order to display any given page.\
    \ The application in question has two main pages: a first page that displays the\
    \ user’s wall (which is intended to display posts created by or directed to a\
    \ particular user), and a social news page where all the notifications and activities\
    \ of all the people who are following the user or whom the user is following are\
    \ displayed.\n\nIn addition to these two pages, there is a user profile page that\
    \ displays the user’s profile-related details, with information on his friend\
    \ group (those who are following him or whom he is following). In order to cater\
    \ to this requirement, the schema for this use case consists of the following\
    \ collections.\n\nThe first collection is `user.profile`, which stores the user’s\
    \ profile-related data:\n\n```json\n{\n    _id: \"User Defined unique identifier\"\
    ,\n    UserName: \"user name\",\n    ProfilDetaile: {Age:.., Place:.., Interests:\
    \ ...etc},\n    FollowerDetails: {\n        \"User_ID\":{name:..., circles: [circle1,\
    \ circle2]}, ....\n    },\n    CirclesUserList: {\n        \"Circle1\": {\"User_Id\"\
    :{name: \"username\"}, ......},\n        .......\n    },\n    ListBlockedUserIDs:\
    \ [\"user1\",...]\n}\n```\n\n*   In this case, you are manually specifying the\
    \ `_id` field.\n*   `Follower` lists the users who are following this user.\n\
    *   `CirclesUserList` consists of the circles this user is following.\n*   `Blocked`\
    \ consist of users whom the user has blocked from viewing his/her updates.\n\n\
    The second collection is the `user.posts` collection, with the following schema:\n\
    \n```json\n{\n    _id: ObjectId(...),\n    by: {id: \"user id\", name: \"user\
    \ name\"},\n    VisibleTocircles: [],\n    PostType: \"post type\",\n    ts: ISODate(),\n\
    \    Postdetail: {\n        text: \"\",\n        Comments_Doc: [\n           \
    \ {Commentedby: {id: \"user_id\", name: \"user name\"}, ts: ISODate(), Commenttext:\
    \ \"comment text\"}, .....\n        ]\n    }\n}\n```\n\n*   This collection is\
    \ basically for displaying all of the user’s activities. `by` provides information\
    \ on the user who posted the post. `Circles` controls the visibility of the post\
    \ to other users. `Type` is used to identify the content of the post. `ts` is\
    \ the datetime when post was created. `detail` contains the post text and it has\
    \ comments embedded within it.\n*   A `comment` document consists of the following\
    \ details: `by` provides details of the user id and name who commented on the\
    \ post, `ts` is the time of comment, and `text` is the actual comment posted by\
    \ the user.\n\nThe third collection is `user.wall`, which is used for rendering\
    \ the user’s wall page in a fraction of a second. This collection fetches data\
    \ from the second collection and stores it in a summarized format for fast rendering\
    \ of the wall page. The collection has the following format:\n\n```json\n{\n \
    \   _id: ObjectId(...),\n    User_id: \"user id\",\n    PostMonth: \"201507\"\
    ,\n    PostDetails: [\n        {\n            _id: ObjectId(..), ts: ISODate(),\
    \ by: {_id: .., Name:.. }, circles: [..], type: ....,\n            detail: {text:\
    \ \"...\"}, comments_shown: 3,\n            comments: [\n                {by:\
    \ {_id:., Name:....}, ts: ISODate(), text:\"\"}, ......\n            ]\n     \
    \   },....\n    ]\n}\n```\n\n*   As you can see, you are maintaining this document\
    \ per user per month. The number of comments that will be visible the first time\
    \ is limited (for this example, it’s 3); if more comments need to be displayed\
    \ for that particular post, the second collection needs to be queried.\n*   In\
    \ other words, it’s kind of a summarized view for quick loading of the user’s\
    \ wall page.\n\nThe forth collection is `social.posts`, which is used for quick\
    \ rendering of the social news screen. This is the screen where all posts get\
    \ displayed. Like the third collection, the fourth collection is also a dependent\
    \ collection. It includes much of the same information as the `user.wall` information,\
    \ so this document has been abbreviated for clarity:\n\n```json\n{\n    _id: ObjectId(...),\n\
    \    user_id: \"user id\",\n    postmonth: '2015_07',\n    postlists: [ ... ]\n\
    }\n```\n\n# 10.2.2 Operations\n\nThese schemas are optimized for read performance.\n\
    \n## 10.2.2.1 Viewing Posts\n\nSince the `social.posts` and `user.wall` collections\
    \ are optimized for rendering the news feed or wall posts in a fraction of a second,\
    \ the query is fairly straightforward. Both of the collections have similar schema,\
    \ so the fetch operation can be supported by the same code. Below is the pseudo\
    \ code for the same. The function takes as parameters the following:\n\n*   The\
    \ collection that needs to be queried.\n*   The user whose data needs to be viewed.\n\
    *   The month is an optional parameter; if specified, it should list all the posts\
    \ of the date less than or equal to the month specified.\n\n```\nFunction Fetch_Post_Details\
    \ (Parameters: CollectionName, View_User_ID, Month)\nSET QueryDocument to {\"\
    User_id\": View_User_ID}\nIF Month IS NOT NULL\nAPPEND Month Filter [\"Month\"\
    :{\"$lte\":Month}] to QueryDocument\nSet O_Cursor = (resultset of the collection\
    \ after applying the QueryDocument filter)\nSet Cur = (sort O_Cursor by \"month\"\
    \ in reverse order)\nwhile records are present in Cur\nPrint record\nEnd while\n\
    End Function\n```\n\nThe above function retrieves all the posts on the given user’s\
    \ wall or news feed in reverse-chronological order.\n\nWhen rendering posts, there\
    \ are certain checks that you need to apply. The following are a few of them.\n\
    \nFirst, when the user is viewing his or her page, while rendering posts on the\
    \ wall you need to check whether the same can be displayed on their own wall.\
    \ A user wall contains the posts that he has posted or the posts of the users\
    \ they are following. The following function takes two parameters: the user to\
    \ whom the wall belongs and the post that is being rendered:\n\n```\nfunction\
    \ Check_VisibleOnOwnWall (Parameters: user, post)\nWhile Loop_User IN user.Circles\
    \ List\nIf post by = Loop_User\nreturn true\nelse\nreturn false\nend while\nend\
    \ function\n```\n\nThe above loop goes through the circles specified in the `user.profile`\
    \ collection, and if the mentioned post is posted by a user on the list, it returns\
    \ true.\n\nIn addition, you also need to take care of the users on the blocked\
    \ list of the user:\n\n```\nfunction ReturnBlockedOrNot(user, post)\nif post by\
    \ user id not in user blocked list\nreturn true\nelse\nreturn false\nendfunction\n\
    ```\n\nYou also need to take care of the permission checks when the user is viewing\
    \ another user’s wall:\n\n```\nFunction visibleposts(parameter user, post)\nif\
    \ post circles is public\nreturn true\nIf post circles is public to all followed\
    \ users\nReturn true\nset listofcircles = followers circle whose user_id is the\
    \ post's by id.\nif listofcircles in post's circles\nreturn true\nreturn false\n\
    end function\n```\n\nThis function first checks whether the post’s circle is public.\
    \ If it’s public, the post will be displayed to all users. If the post’s circle\
    \ is not set to public, it will be displayed to the user if he/she is following\
    \ the user. If neither is true, it goes to the circle of all the users who are\
    \ following the logged-in user. If the list of circle is in posts circle list,\
    \ this implies that the user is in a circle receiving the post, so the post will\
    \ be visible. If neither condition is met, the post will not be visible to the\
    \ user.\n\nIn order to have better performance, you need an index on `user_id`\
    \ and `month` in both the `social.posts` and `user.wall` collections."
  raw: '### 10.2.1 Schema Design


    The solution you are providing is aimed at minimizing the number of documents
    that must be loaded in order to display any given page. The application in question
    has two main pages: a first page that displays the user’s wall (which is intended
    to display posts created by or directed to a particular user), and a social news
    page where all the notifications and activities of all the people who are following
    the user or whom the user is following are displayed.


    In addition to these two pages, there is a user profile page that displays the
    user’s profile-related details, with information on his friend group (those who
    are following him or whom he is following). In order to cater to this requirement,
    the schema for this use case consists of the following collections.


    The first collection is `user.profile`, which stores the user’s profile-related
    data:


    `{`


    `_id: "User Defined unique identifier",`


    `UserName: "user name"`


    `ProfilDetaile:`


    `{Age:.., Place:.., Interests: ...etc},`


    `FollowerDetails: {`


    `"User_ID":{name:..., circles: [circle1, circle2]}, ....`


    `},`


    `CirclesUserList: {`


    `"Circle1":`


    `{"User_Id":{name: "username"}, ......`


    `}, .......`


    `} ,`


    `ListBlockedUserIDs: ["user1",...]`


    `}`


    *   In this case, you are manually specifying the `_id` field.

    *   `Follower` lists the users who are following this user.

    *   `CirclesUserList` consists of the circles this user is following.

    *   `Blocked` consist of users whom the user has blocked from viewing his/her
    updates.


    The second collection is the `user.posts` collection, with the following schema:


    `{`


    `_id: ObjectId(...),`


    `by: {id: "user id", name: "user name"},`


    `VisibleTocircles: [],`


    `PostType: "post type",`


    `ts: ISODate(),`


    `Postdetail: {text: "",`


    `Comments_Doc:`


    `[`


    `{Commentedby: {id: "user_id", name: "user name"}, ts: ISODate(), Commenttext:
    "comment text"}, .....`


    `]`


    `}`


    *   This collection is basically for displaying all of the user’s activities.
    `by` provides information on the user who posted the post. `Circles` controls
    the visibility of the post to other users. `Type` is used to identify the content
    of the post. `ts` is the datetime when post was created. `detail` contains the
    post text and it has comments embedded within it.

    *   A `comment` document consists of the following details: `by` provides details
    of the user id and name who commented on the post, `ts` is the time of comment,
    and `text` is the actual comment posted by the user.


    The third collection is `user.wall`, which is used for rendering the user’s wall
    page in a fraction of a second. This collection fetches data from the second collection
    and stores it in a summarized format for fast rendering of the wall page.


    The collection has the following format:


    `{`


    `_id: ObjectId(...),`


    `User_id: "user id"`


    `PostMonth: "201507",`


    `PostDetails: [`


    `{`


    `_id: ObjectId(..), ts: ISODate(), by: {_id: .., Name:.. }, circles: [..], type:
    ....`


    `, detail: {text: "..."}, comments_shown: 3`


    `,comments: [`


    `{by: {_id:., Name:....}, ts: ISODate(), text:""}, ......]`


    `},....]}`


    *   As you can see, you are maintaining this document per user per month. The
    number of comments that will be visible the first time is limited (for this example,
    it’s 3); if more comments need to be displayed for that particular post, the second
    collection needs to be queried.

    *   In other words, it’s kind of a summarized view for quick loading of the user’s
    wall page.


    The forth collection is `social.posts` , which is used for quick rendering of
    the social news screen. This is the screen where all posts get displayed.


    Like the third collection, the fourth collection is also a dependent collection.
    It includes much of the same information as the `user.wall` information, so this
    document has been abbreviated for clarity:


    `{`


    `_id: ObjectId(...),`


    `user_id: "user id",`


    `postmonth: ''2015_07'',`


    `postlists: [ ... ]`


    `}`


    ### 10.2.2 Operations


    These schemas are optimized for read performance.


    #### 10.2.2.1 Viewing Posts


    Since the `social.posts` and `user.wall` collections are optimized for rendering
    the news feed or wall posts in a fraction of a second, the query is fairly straightforward.


    Both of the collections have similar schema, so the fetch operation can be supported
    by the same code. Below is the pseudo code for the same. The function takes as
    parameters the following:


    *   The collection that needs to be queried.

    *   The user whose data needs to be viewed.

    *   The month is an optional parameter; if specified, it should list all the posts
    of the date less than or equal to the month specified.


    `Function Fetch_Post_Details`


    `(Parameters: CollectionName, View_User_ID, Month)`


    `SET QueryDocument to {"User_id": View_User_ID}`


    `IF Month IS NOT NULL`


    `APPEND Month Filter ["Month":{"$lte":Month}] to QueryDocument`


    `Set O_Cursor = (resultset of the collection after applying the QueryDocument
    filter)`


    `Set Cur = (sort O_Cursor by "month" in reverse order)`


    `while records are present in Cur`


    `Print record`


    `End while`


    `End Function`


    The above function retrieves all the posts on the given user’s wall or news feed
    in reverse-chronological order.


    When rendering posts, there are certain checks that you need to apply. The following
    are a few of them.


    First, when the user is viewing his or her page, while rendering posts on the
    wall you need to check whether the same can be displayed on their own wall. A
    user wall contains the posts that he has posted or the posts of the users they
    are following. The following function takes two parameters: the user to whom the
    wall belongs and the post that is being rendered:


    `function Check_VisibleOnOwnWall`


    `(Parameters: user, post)`


    `While Loop_User IN user.Circles List`


    `If post by = Loop_User`


    `return true`


    `else`


    `return false`


    `end while`


    `end function`


    The above loop goes through the circles specified in the `user.profile` collection,
    and if the mentioned post is posted by a user on the list, it returns true.


    In addition, you also need to take care of the users on the blocked list of the
    user:


    `function ReturnBlockedOrNot(user, post)`


    `if post by user id not in user blocked list`


    `return true`


    `else`


    `return false`


    `endfunction`


    You also need to take care of the permission checks when the user is viewing another
    user’s wall:


    `Function visibleposts(parameter user, post)`


    `if post circles is public`


    `return true`


    `If post circles is public to all followed users`


    `Return true`


    `set listofcircles = followers circle whose user_id is the post''s by id.`


    `if listofcircles in post''s circles`


    `return true`


    `return false`


    `end function`


    This function first checks whether the post’s circle is public. If it’s public,
    the post will be displayed to all users.


    If the post’s circle is not set to public, it will be displayed to the user if
    he/she is following the user. If neither is true, it goes to the circle of all
    the users who are following the logged-in user. If the list of circle is in posts
    circle list, this implies that the user is in a circle receiving the post, so
    the post will be visible. If neither condition is met, the post will not be visible
    to the user.


    In order to have better performance, you need an index on `user_id` and `month`
    in both the `social.posts` and `user.wall` collections.'
  trans: "\n# 10.2.1 模式设计\n\n你所提供的解决方案旨在最小化展示任意给定页面所需加载的文档数量。所讨论的应用程序有两个主要页面：第一个页面展示用户的个人墙（旨在展示由特定用户创建或指向该用户的帖子），以及一个社交新闻页面，该页面展示所有关注该用户的人或该用户所关注的人的所有通知和活动。\n\
    \n除了这两个页面，还有一个用户个人资料页面，用于展示用户与个人资料相关的详细信息，并包含其好友圈（关注他的人或他关注的人）的信息。为了满足此需求，此用例的模式包含以下集合。\n\
    \n第一个集合是 `user.profile`，它存储用户的个人资料相关数据：\n\n```json\n{\n    _id: \"用户定义的唯一标识符\"\
    ,\n    UserName: \"用户名\",\n    ProfilDetaile: {Age:.., Place:.., Interests: ...etc},\n\
    \    FollowerDetails: {\n        \"User_ID\":{name:..., circles: [circle1, circle2]},\
    \ ....\n    },\n    CirclesUserList: {\n        \"Circle1\": {\"User_Id\":{name:\
    \ \"username\"}, ......},\n        .......\n    },\n    ListBlockedUserIDs: [\"\
    user1\",...]\n}\n```\n\n*   在这种情况下，你是手动指定 `_id` 字段。\n*   `Follower` 列出了关注此用户的用户。\n\
    *   `CirclesUserList` 包含此用户正在关注的好友圈。\n*   `Blocked` 包含用户已阻止查看其更新的用户。\n\n第二个集合是\
    \ `user.posts` 集合，其模式如下：\n\n```json\n{\n    _id: ObjectId(...),\n    by: {id:\
    \ \"用户 id\", name: \"用户名\"},\n    VisibleTocircles: [],\n    PostType: \"帖子类型\"\
    ,\n    ts: ISODate(),\n    Postdetail: {\n        text: \"\",\n        Comments_Doc:\
    \ [\n            {Commentedby: {id: \"user_id\", name: \"用户名\"}, ts: ISODate(),\
    \ Commenttext: \"评论内容\"}, .....\n        ]\n    }\n}\n```\n\n*   此集合基本上用于展示用户的所有活动。`by`\
    \ 提供发布帖子的用户信息。`Circles` 控制帖子对其他用户的可见性。`Type` 用于标识帖子内容。`ts` 是帖子创建的日期时间。`detail`\
    \ 包含帖子文本，其中内嵌了评论。\n*   一个 `comment` 文档包含以下详情：`by` 提供评论用户的用户 id 和姓名详情，`ts` 是评论时间，`text`\
    \ 是用户发布的实际评论。\n\n第三个集合是 `user.wall`，它用于在瞬间渲染用户的个人墙页面。此集合从第二个集合获取数据并以汇总格式存储，以便快速渲染墙页面。该集合格式如下：\n\
    \n```json\n{\n    _id: ObjectId(...),\n    User_id: \"用户 id\",\n    PostMonth:\
    \ \"201507\",\n    PostDetails: [\n        {\n            _id: ObjectId(..), ts:\
    \ ISODate(), by: {_id: .., Name:.. }, circles: [..], type: ....,\n           \
    \ detail: {text: \"...\"}, comments_shown: 3,\n            comments: [\n     \
    \           {by: {_id:., Name:....}, ts: ISODate(), text:\"\"}, ......\n     \
    \       ]\n        },....\n    ]\n}\n```\n\n*   如你所见，你是按用户、按月维护此文档。首次显示的评论数量是有限的（此例中为\
    \ 3 条）；如果需要为该特定帖子显示更多评论，则需要查询第二个集合。\n*   换句话说，它是一种用于快速加载用户个人墙页面的汇总视图。\n\n第四个集合是\
    \ `social.posts`，它用于快速渲染社交新闻屏幕。这是显示所有帖子的屏幕。与第三个集合类似，第四个集合也是一个依赖集合。它包含了许多与 `user.wall`\
    \ 信息相同的内容，因此为了清晰起见，此文档已被缩写：\n\n```json\n{\n    _id: ObjectId(...),\n    user_id:\
    \ \"用户 id\",\n    postmonth: '2015_07',\n    postlists: [ ... ]\n}\n```\n\n# 10.2.2\
    \ 操作\n\n这些模式针对读取性能进行了优化。\n\n## 10.2.2.1 查看帖子\n\n由于 `social.posts` 和 `user.wall`\
    \ 集合针对在瞬间渲染新闻流或墙贴进行了优化，因此查询相当直接。这两个集合具有类似的模式，因此获取操作可以由相同的代码支持。以下是相同的伪代码。该函数接受以下参数作为参数：\n\
    \n*   需要查询的集合。\n*   需要查看其数据的用户。\n*   月份是一个可选参数；如果指定，它应列出日期小于或等于指定月份的所有帖子。\n\n\
    ```\nFunction Fetch_Post_Details (Parameters: CollectionName, View_User_ID, Month)\n\
    SET QueryDocument to {\"User_id\": View_User_ID}\nIF Month IS NOT NULL\nAPPEND\
    \ Month Filter [\"Month\":{\"$lte\":Month}] to QueryDocument\nSet O_Cursor = (resultset\
    \ of the collection after applying the QueryDocument filter)\nSet Cur = (sort\
    \ O_Cursor by \"month\" in reverse order)\nwhile records are present in Cur\n\
    Print record\nEnd while\nEnd Function\n```\n\n上述函数以倒序时间顺序检索给定用户墙或新闻流上的所有帖子。\n\n\
    在渲染帖子时，需要应用某些检查。以下是其中一些。\n\n首先，当用户查看自己页面时，在渲染墙上的帖子时，你需要检查该帖子是否可以在其自己的墙上显示。用户墙包含他发布的帖子或他关注的用户的帖子。以下函数接受两个参数：墙所属的用户和正在渲染的帖子：\n\
    \n```\nfunction Check_VisibleOnOwnWall (Parameters: user, post)\nWhile Loop_User\
    \ IN user.Circles List\nIf post by = Loop_User\nreturn true\nelse\nreturn false\n\
    end while\nend function\n```\n\n上述循环遍历在 `user.profile` 集合中指定的好友圈，如果提到的帖子是由列表中的用户发布的，则返回\
    \ true。\n\n此外，你还需要处理用户屏蔽列表中的用户：\n\n```\nfunction ReturnBlockedOrNot(user, post)\n\
    if post by user id not in user blocked list\nreturn true\nelse\nreturn false\n\
    endfunction\n```\n\n当用户查看另一个用户的墙时，你还需要处理权限检查：\n\n```\nFunction visibleposts(parameter\
    \ user, post)\nif post circles is public\nreturn true\nIf post circles is public\
    \ to all followed users\nReturn true\nset listofcircles = followers circle whose\
    \ user_id is the post's by id.\nif listofcircles in post's circles\nreturn true\n\
    return false\nend function\n```\n\n此函数首先检查帖子的圈组是否为公开。如果是公开的，该帖子将对所有用户显示。如果帖子的圈组未设置为公开，但如果他/她正在关注该用户，则该帖子将显示给该用户。如果两种情况都不成立，则它会检查所有关注登录用户的用户的圈组。如果圈组列表在帖子的圈组列表中，这意味着用户位于接收该帖子的圈组中，因此该帖子将可见。如果两个条件都不满足，该帖子将对该用户不可见。\n\
    \n为了获得更好的性能，你需要在 `social.posts` 和 `user.wall` 集合中对 `user_id` 和 `month` 建立索引。\n"
- fmt: "## 10.2.2.2 Creating Comments\n\nTo create a comment by a user on a given\
    \ post containing the given text, you need to execute code similar to the following:\n\
    \n```\nFunction postcomment(\n    Parameters: commentedby, commentedonpostid,\
    \ commenttext)\n    Set commentedon to current datetime\n    Set month to month\
    \ of commentedon\n    Set comment document as {\"by\": {id: commentedby[id], \"\
    Name\": commentedby[\"name\"]}, \"ts\": commentedon, \"text\": commenttext}\n\
    \    Update user.posts collection. Push comment document.\n    Update user.walls\
    \ collection. Push the comment document.\n    Increment the comments_shown in\
    \ user.walls collection by 1.\n    Update social.posts collection. Push the comment\
    \ document.\n    Increment the comments_shown counter in social.posts collection\
    \ by 1.\nEnd function\n```\n\nSince you are displaying a maximum of three comments\
    \ in both dependent collections (the `user.wall` and `social.posts` collections),\
    \ you need to run the following update statement periodically:\n\n```\nFunction\
    \ MaintainComments\n    SET MaximumComments = 3\n    Loop through social.posts\n\
    \        If posts.comments_shown > MaximumComments\n            Pop the comment\
    \ which was inserted first\n            Decrement comments_shown by 1\n      \
    \  End if\n    Loop through user.wall\n        If posts.comments_shown > MaximumComments\n\
    \            Pop the comment which was inserted first\n            Decrement comments_shown\
    \ by 1\n        End if\n    End loop\nEnd Function\n```\n\nTo quickly execute\
    \ these updates, you need to create indexes on `posts.id` and `posts.comments_shown`.\n\
    \n### Creating New Post\n\nThe basic sequence of operations in this code is as\
    \ follows:\n\nThe post is first saved into the “system of record,” the `user.posts`\
    \ collection. Next, the `user.wall` collection is updated with the post. Finally,\
    \ the `social.posts` collection of everyone who is circled in the post is updated\
    \ with the post.\n\n```\nFunction createnewpost\n    (parameter createdby, posttype,\
    \ postdetail, circles)\n    Set ts = current timestamp.\n    Set month = month\
    \ of ts\n    Set post_document = {\"ts\": ts, \"by\":{id:createdby[id], name:\
    \ createdby[name]}, \"circles\":circles, \"type\":posttype, \"details\":postdetails}\n\
    \    Insert post_document into users.post collection\n    Append post_document\
    \ into user.walls collection\n    Set userlist = all users who’s circled in the\
    \ post based on the posts circle and the posted user id\n    While users in userlist\n\
    \        Append post_document to users social.posts collection\n    End while\n\
    End function\n```\n\n### 10.2.3 Sharding\n\nScaling can be achieved by sharding\
    \ the four collections mentioned above. Since `user.profile`, `user.wall`, and\
    \ `social.posts` contain user-specific documents, `user_id` is the perfect shard\
    \ key for these collections. `_id` is the best shard key for the `users.post`\
    \ collection.\n\n## 10.3 Summary\n\nIn this chapter, you used two use cases to\
    \ look at how MongoDB can be used to solve certain problems. In the next chapter,\
    \ we will list MongoDB’s limitations and the use cases where it’s not a good fit.\n\
    \n## 11. MongoDB Limitations\n\n> “When starting with a new database, you should\
    \ also be aware of its limitations to better use the database.”\n\nIn this chapter,\
    \ we will list MongoDB’s limitations and the use cases where it’s not a good fit.\n\
    \n### 11.1 MongoDB Space Is Too Large (Applicable for MMAPv1)\n\nLet’s start with\
    \ the issue of disk space. MongoDB (with storage engine MMAPv1 ) space is too\
    \ large; in other words, the data directory files are larger than the database’s\
    \ actual data.\n\nThis is because of preallocated data files. This is by design\
    \ in order to prevent file system fragmentation.\n\nThe files in the data directory\
    \ are named as `<dbname>.0`, `<dbname>.1` and so on. The size of the first file\
    \ as allocated by the `mongod` is 64MB; all subsequent file sizes increase by\
    \ factor of 2, so the second file will 128MB, the third file will be 256MB, and\
    \ so on until it reaches 2GB, post which all files will be 2GB in size. Though\
    \ the space is allocated to the data files while creation, there might be files\
    \ that are 90% empty. This unused allocated space is mostly small for larger databases.\n\
    \n*   This option can be disabled by using the `-- noprealloc` option. However,\
    \ it’s not recommended to use this on a production environment, and it’s supposed\
    \ to be used only for testing and with small data sets where drop databases are\
    \ called frequently.\n*   Oplog: If `mongod` is a Replica set member, then there\
    \ will be a file named `oplog.rs` in the data directory. This file is present\
    \ in the local database and is a preallocated capped collection. On a 64-bit installation,\
    \ the allocation for this file defaults to approximately 5% of disk space.\n*\
    \   Journal: The journal files are also contained in the data directory that stores\
    \ the writes on the disk before the same can be applied to the databases by MongoDB.\n\
    *   MongoDB pre-allocates 3GB of data for journaling, which is over and above\
    \ the actual database size(s), making it not fit for small installations. The\
    \ workaround available for this is to use `–smallflags` in your command line flags\
    \ or `/etc/mongod.conf` files until you are running in an environment where you\
    \ have the required disk space. But this feature makes it not fit for small installations.\n\
    *   Empty Records: When the documents or collections are deleted, the space is\
    \ never returned back to the operating system; instead, MongoDB maintains a list\
    \ of these empty records, which can be reused.\n\nTo reclaim this deleted space,\
    \ either the `compact` or `repairDatabase` option can be used but be aware that\
    \ both options require additional disk space to run.\n\nNote\n\nNo such limitation\
    \ exists with the WiredTiger storage engine. Instead, storage size reduces by\
    \ 50% due to compression of data files. Also, once the collection is dropped,\
    \ disk space is automatically reclaimed, which is unlike the MMAPv1 storage engine\
    \ mentioned above.\n\n### 11.2 Memory Issues (Applicable for Storage Engine MMAPv1)\n\
    \nIn MongoDB, memory is managed by memory mapping the entire data set. It allows\
    \ the OS to control the memory mapping and allocate the maximum amount of RAM.\
    \ The result is that the performance is non-optimal and the memory usage cannot\
    \ be effectively reasoned about.\n\nIndexes are memory-heavy; in other words,\
    \ indexes take up lot of RAM. Since these are B-tree indexes, defining many indexes\
    \ can lead to faster consumption of system resources. A consequence of this is\
    \ that memory is allocated automatically when required. In a shared environment,\
    \ it’s trickier to run the database. In general, as with all database servers,\
    \ it’s best to run MongoDB on a dedicated server.\n\n### 11.3 32-bit vs. 64-bit\n\
    \nMongoDB comes with two versions, 32-bit and 64-bit.\n\nSince MongoDB uses memory\
    \ mapped files, the 32-bit versions are limited to storing only about 2GB of data.\
    \ If you need more data to be stored, you should use the 64-bit build.\n\nStarting\
    \ from version 3.0, commercial support for 32-bit versions is no longer provided\
    \ by MongoDB. Also, the 32-bit version of MongoDB does not support the WiredTiger\
    \ storage engine.\n\n### 11.4 BSON Documents\n\nThis section covers the limitations\
    \ of BSON documents.\n\n*   Size limits: As with other databases, there’s a limit\
    \ to what can be stored in the document. The current versions support documents\
    \ up to 16MB in size. This maximum size ensures that a document cannot not use\
    \ excessive RAM or excessive bandwidth while in transmission.\n*   Nested depth\
    \ limit: In MongoDB, no more than 100 levels of nesting are supported for BSON\
    \ documents.\n*   Field names: If you store 1,000 documents with the key “col1”,\
    \ the key is stored that many times in the data set. Although arbitrary documents\
    \ are supported in MongoDB, in practice most of the field names are the same.\
    \ Keeping short field names is considered a good practice for optimizing the usage\
    \ of space."
