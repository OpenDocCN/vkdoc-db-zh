    ANOC9:27021:1429783567:41'' unlocked`


    You now have the shard controller (i.e. the mongos) up and running.


    If you switch to the window where the config server has been started, you will
    find a registration of the shard server to the config server.


    In this example you have used chunk size of 1MB. Note that this is not ideal in
    a real-life scenario since the size is less than 4MB (a document’s maximum size).
    However, this is just for demonstration purpose since this creates the necessary
    amount of chunks without loading a large amount of data. The chunkSize is 128MB
    by default unless otherwise specified.


    Next, bring up the shard servers, Shard0 and Shard1.


    Open a fresh terminal window. Create the `data` directory for the first shard
