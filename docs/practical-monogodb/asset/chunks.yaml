- fmt: "# MongoDB 选举过程详解\n\n本节将详细解释选举是如何发生的。\n\n假设你有一个包含以下三个成员的副本集：`A1`、`B1` 和 `C1`。每个成员每隔几秒与其他成员交换一次心跳请求。成员会对此类请求响应其当前状态信息。`A1`\
    \ 向 `B1` 和 `C1` 发送心跳请求。`B1` 和 `C1` 响应它们的当前状态信息，例如它们所处的状态（`primary` 或 `secondary`）、当前时钟时间、是否有资格被提升为\
    \ `primary` 等。`A1` 接收到所有这些信息并更新其副本集“地图”，该地图维护着诸如成员状态变更、成员宕机或恢复以及往返时间等信息。\n\n在更新\
    \ `A1` 的地图变化时，它会根据其状态检查几个事项：\n\n*   `A1` 要做的第一件事是运行完整性检查，它将检查对几个问题的回答，例如：`A1`\
    \ 是否认为自己已经是 `primary`？另一个成员是否认为它是 `primary`？`A1` 是否没有资格参加选举？如果它无法回答任何基本问题，`A1`\
    \ 将继续按兵不动；否则，它将进行选举过程：\n    *   `A1` 向副本集的其他成员（在此例中为 `B1` 和 `C1`）发送消息，说“我打算成为\
    \ `primary`。请建议”。\n    *   当 `B1` 和 `C1` 收到消息时，它们将检查其周围的视图。它们将运行一长串完整性检查，例如：是否有其他节点可以成为\
    \ `primary`？`A1` 是否拥有最新的数据，或者是否有其他节点拥有最新的数据？如果所有检查看起来都正常，它们会发送一个“继续”消息；但是，如果任何检查失败，则会发送“停止选举”消息。\n\
    \    *   如果任何成员发送“停止选举”回复，选举将被取消，`A1` 保持为 `secondary` 成员。\n    *   如果从所有成员那里都收到了“继续”，`A1`\
    \ 将进入选举过程的最后阶段。\n*   在第二（最后）阶段：\n    *   `A1` 重新发送声明其候选人身份的消息给其余成员。\n    *   成员\
    \ `B1` 和 `C1` 进行最终检查，以确保所有答案仍然像以前一样成立。\n    *   如果是，`A1` 被允许获取其选举锁，这将阻止其投票能力30秒，并发回一票。\n\
    \    *   如果任何检查未能成立，则发送否决票。\n    *   如果收到任何否决票，选举停止。\n    *   如果无人否决且 `A1` 获得多数票，它就成为\
    \ `primary`。\n\n*   如果 `A1` 是 `secondary` 且地图没有改变，它将偶尔检查是否应该选举自己。\n\n*   **降级**：当\
    \ `A1` 经历降级时会存在问题。默认情况下，在 MongoDB 中，写操作是“发射后不管”的（即客户端发出写操作但不等待响应）。如果应用程序在 `primary`\
    \ 降级时执行默认写操作，它将永远无法意识到写操作实际上没有发生，并可能最终丢失数据。因此，建议使用安全写操作。在这种情况下，当 `primary` 降级时，它会关闭所有客户端连接，这将导致客户端出现套接字错误。客户端库然后需要重新检查新的\
    \ `primary` 是谁，从而避免丢失其写操作数据。\n\n*   如果 `A1` 是 `primary` 并且其中一个成员宕机，那么它将确保自己仍然能够连接到副本集的大多数成员。如果无法做到，它将自己降级到\
    \ `secondary` 状态。\n\n选举受到优先级设置的影响。优先级为 `0` 的成员永远不能成为 `primary`。\n\n# 7.4.2.4 数据复制过程\n\
    \n让我们看看数据复制是如何工作的。副本集的成员持续复制数据。每个成员，包括 `primary` 成员，都维护一个 `oplog`。`oplog` 是一个\
    \ capped collection（固定集合），成员在其中维护在数据集上执行的所有操作的记录。\n\n`secondary` 成员复制 `primary`\
    \ 成员的 `oplog`，并以异步方式应用所有操作。\n\n## Oplog\n\nOplog 代表操作日志。`oplog` 是一个 capped collection，其中记录了所有修改数据的操作。\n\
    \n`oplog` 维护在一个特殊的数据库中，即 `local` 数据库的 `oplog.$main` 集合中。每个操作都维护为一个文档，其中每个文档对应在主服务器上执行的一个操作。该文档包含各种键，包括以下键：\n\
    \n*   `ts`：存储操作执行时的时间戳。它是一个内部类型，由一个4字节的时间戳和一个4字节的递增计数器组成。\n*   `op`：存储有关所执行操作类型的信息。该值存储为1字节代码（例如，对于插入操作，它将存储为“I”）。\n\
    *   `ns`：此键存储执行操作的集合命名空间。\n*   `o`：此键指定执行的操作。在插入的情况下，这将存储要插入的文档。\n\n只有更改数据的操作才会保留在\
    \ `oplog` 中，因为它是确保 `secondary` 节点数据与 `primary` 节点数据同步的机制。\n\n存储在 `oplog` 中的操作会被转换，以保持它们的幂等性，这意味着即使它在\
    \ `secondary` 上应用多次，`secondary` 节点的数据也将保持一致。由于 `oplog` 是一个 capped collection，随着每次新操作的添加，最旧的操作会自动移出。这样做是为了确保其增长不会超过预设的界限，即\
    \ `oplog` 的大小。\n\n根据操作系统的不同，每当副本集成员首次启动时，MongoDB 都会创建一个默认大小的 `oplog`。\n\n默认情况下，在\
    \ MongoDB 中，Windows 和 64 位 Linux 实例上，可用的空闲空间或 5% 用于 `oplog`。如果大小低于 1GB，则 MongoDB\
    \ 会分配 1GB 的空间。\n\n虽然默认大小在大多数情况下已足够，但你可以在启动服务器时使用 `–oplogsize` 选项来指定以 MB 为单位的 `oplog`\
    \ 大小。\n\n如果你有以下工作负载，可能需要重新考虑 `oplog` 大小：\n\n*   同时更新多个文档：由于操作需要被转换为幂等操作，此场景最终可能需要大量的\
    \ `oplog` 空间。\n*   删除和插入以相同的速率发生，涉及相同数量的数据：在此场景中，虽然数据库大小不会增加，但将操作转换为幂等操作可能导致更大的\
    \ `oplog`。\n*   大量的原地更新：虽然这些更新不会改变数据库大小，但将更新记录为 `oplog` 中的幂等操作可能导致更大的 `oplog`。\n\
    \n## 初始同步与复制\n\n初始同步在成员处于以下两种情况之一时执行：\n\n1.  节点首次启动（即它是一个新节点且没有数据）。\n2.  节点变得陈旧，其中\
    \ `primary` 已覆盖了 `oplog` 且该节点尚未复制数据。在这种情况下，数据将被移除。\n\n在这两种情况下，初始同步涉及以下步骤：\n\n\
    1.  首先，克隆所有数据库。\n2.  使用源节点的 `oplog`，将更改应用到其数据集。\n3.  最后，在所有集合上构建索引。\n\n初始同步之后，副本集成员持续复制更改以保持最新状态。\n\
    \n大多数同步发生在 `primary` 上，但可以启用链式复制，其中同步仅从 `secondary` 进行（即，同步目标根据其他成员复制的 `ping`\
    \ 时间和状态而改变）。"
  raw: "##### Example - Working of Election Process in More Details\n\nThis section\
    \ will explain how the election happens.\n\nLet’s assume you have a replica set\
    \ with the following three members: A1, B1, and C1\\. Each member exchanges a\
    \ heartbeat request with the other members every few seconds. The members respond\
    \ with their current situation information to such requests. A1 sends out heartbeat\
    \ request to B1 and C1\\. B1 and C1 respond with their current situation information,\
    \ such as the state they are in (primary or secondary), their current clock time,\
    \ their eligibility to be promoted as primary, and so on. A1 receives all this\
    \ information’s and updates its “map” of the set, which maintains information\
    \ such as the members changed state, members that have gone down or come up, and\
    \ the round trip time.\n\nWhile updating the A1’s map changes, it will check a\
    \ few things depending on its state:\n\n*   The first task A1 will do is run a\
    \ sanity check where it will check answers to few question such as, Does A1 think\
    \ it’s already primary? Does another member think its primary? Is A1 not eligible\
    \ for election? If it can’t answer any of the basic questions, A1 will continue\
    \ idling as is; otherwise, it will proceed with the election process:\n    * \
    \  A1 sends a message to the other members of the set, which in this case are\
    \ B1 and C1, saying “I am planning to become a primary. Please suggest”\n    *\
    \   When B1 and C1 receive the message, they will check the view around them.\
    \ They will run through a big list of sanity checks, such as, Is there any other\
    \ node that can be primary? Does A1 have the most recent data or is there any\
    \ other node that has the most recent data? If all the checks seem ok, they send\
    \ a “go-ahead” message; however, if any of the checks fail, a “stop election”\
    \ message is sent.\n    *   If any of the members send a “stop election” reply,\
    \ the election is cancelled and A1 remains a secondary member.\n    *   If the\
    \ “go-ahead” is received from all, A1 goes to the election process final phase.\n\
    *   In the second (final) phase,\n    *   A1 resends a message declaring its candidacy\
    \ for the election to the remaining members.\n    *   Members B1 and C1 do a final\
    \ check to ensure that all the answers still hold true as before.\n    *   If\
    \ yes, A1 is allowed to take its election lock, which prevents its voting capabilities\
    \ for 30 seconds and sends back a vote.\n    *   If any of the checks fail to\
    \ hold true, a veto is sent.\n    *   If any veto is received, the election stops.\n\
    \    *   If no one vetoes and A1 gets a majority of the votes, it becomes a primary.\n\
    \n*   If A1 is a secondary and if the map has not changed, it will occasionally\
    \ check whether it should elect itself.\n\n*   Demotions: There’s a problem when\
    \ A1 undergoes a demotion. By default in MongoDB writes are fire-and-forget (i.e.\
    \ the client issues the writes but doesn’t wait for a response). If an application\
    \ is doing the default writes when the primary is stepping down, it will never\
    \ realize that the writes are actually not happening and might end up losing data.\
    \ Hence it’s recommended to use safe writes. In this scenario, when the primary\
    \ is stepping down, it closes all its client connections, which will result in\
    \ socket errors to the clients. The client libraries then need to recheck who\
    \ the new primary is and will be saved from losing their write operations data.\n\
    \n*   If A1 is primary and one of the members has gone down, then it will ensure\
    \ that it’s still able to reach the majority of the set. If it’s not able to do\
    \ so, it will demote itself to secondary state.\n\nThe election is affected by\
    \ the priority settings. A 0 priority member can never become a primary.\n\n####\
    \ 7.4.2.4 Data Replication Process\n\nLet’s look at how the data replication works.\
    \ The members of a replica set replicate data continuously. Every member, including\
    \ the primary member, maintains an oplog. An oplog is a capped collection where\
    \ the members maintain a record of all the operations that are performed on the\
    \ data set.\n\nThe secondary members copy the primary member’s oplog and apply\
    \ all the operations in an asynchronous manner.\n\n##### Oplog\n\nOplog stands\
    \ for the operation log . An oplog is a capped collection where all the operations\
    \ that modify the data are recorded.\n\nThe oplog is maintained in a special database,\
    \ namely `local` in the collection `oplog.$main`. Every operation is maintained\
    \ as a document, where each document corresponds to one operation that is performed\
    \ on the master server. The document contains various keys, including the following\
    \ keys :\n\n*   `ts`: This stores the timestamp when the operations are performed.\
    \ It’s an internal type and is composed of a 4-byte timestamp and a 4-byte incrementing\
    \ counter.\n*   `op`: This stores information about the type of operation performed.\
    \ The value is stored as 1-byte code (e.g. it will store an “I” for an insert\
    \ operation).\n*   `ns`: This key stores the collection namespace on which the\
    \ operation was performed.\n*   `o`: This key specifies the operation that is\
    \ performed. In case of an insert, this will store the document to insert.\n\n\
    Only operations that change the data are maintained in the oplog because it’s\
    \ a mechanism for ensuring that the secondary node data is in sync with the primary\
    \ node data.\n\nThe operations that are stored in the oplog are transformed so\
    \ that they remain idempotent, which means that even if it’s applied multiple\
    \ times on the secondary, the secondary node data will remain consistent. Since\
    \ the oplog is a capped collection, with every new addition of an operation, the\
    \ oldest operations are automatically moved out. This is done to ensure that it\
    \ does not grow beyond a pre-set bound, which is the oplog size.\n\nDepending\
    \ on the OS, whenever the replica set member first starts up, the oplog is created\
    \ of a default size by MongoDB.\n\nBy default in MongoDB, available free space\
    \ or 5% is used for the oplog on Windows and 64-bit Linux instances. If the size\
    \ is lower than 1GB, then 1GB of space is allocated by MongoDB.\n\nAlthough the\
    \ default size is sufficient in most cases, you can use the `–oplogsize` option\
    \ to specify the oplog size in MB when starting the server.\n\nIf you have the\
    \ following workload, there might be a requirement of reconsidering the oplog\
    \ size:\n\n*   Updates to multiple documents simultaneously: Since the operations\
    \ need to be translated into operations that are idempotent, this scenario might\
    \ end up requiring great deal of oplog size.\n*   Deletes and insertions happening\
    \ at the same rate involving same amount of data: In this scenario, although the\
    \ database size will not increase, the operations translation into an idempotent\
    \ operation can lead to a bigger oplog.\n*   Large number of in-place updates:\
    \ Although these updates will not change the database size, the recording of updates\
    \ as idempotent operations in the oplog can lead to a bigger oplog.\n\n##### Initial\
    \ Sync and Replication\n\nInitial sync is done when the member is in either of\
    \ the following two cases:\n\nThe node has started for the first time (i.e. it’s\
    \ a new node and has no data).   The node has become stale, where the primary\
    \ has overwritten the oplog and the node has not replicated the data. In this\
    \ case, the data will be removed.  \n\nIn both cases, the initial sync involves\
    \ the following steps:\n\nFirst, all databases are cloned.   Using oplog of the\
    \ source node, the changes are applied to its dataset.   Finally, the indexes\
    \ are built on all the collections.  \n\nPost the initial sync, the replica set\
    \ members continuously replicate the changes in order to be up-to-date.\n\nMost\
    \ of the synchronization happens from the primary, but chained replication can\
    \ be enabled where the sync happens from a secondary only (i.e. the sync targets\
    \ are changed based on the ping time and state of other member’s replication)."
  trans: "# MongoDB 选举过程详解\n\n本节将详细解释选举是如何发生的。\n\n假设你有一个包含以下三个成员的副本集：`A1`、`B1` 和 `C1`。每个成员每隔几秒与其他成员交换一次心跳请求。成员会对此类请求响应其当前状态信息。`A1`\
    \ 向 `B1` 和 `C1` 发送心跳请求。`B1` 和 `C1` 响应它们的当前状态信息，例如它们所处的状态（`primary` 或 `secondary`）、当前时钟时间、是否有资格被提升为\
    \ `primary` 等。`A1` 接收到所有这些信息并更新其副本集“地图”，该地图维护着诸如成员状态变更、成员宕机或恢复以及往返时间等信息。\n\n在更新\
    \ `A1` 的地图变化时，它会根据其状态检查几个事项：\n\n*   `A1` 要做的第一件事是运行完整性检查，它将检查对几个问题的回答，例如：`A1`\
    \ 是否认为自己已经是 `primary`？另一个成员是否认为它是 `primary`？`A1` 是否没有资格参加选举？如果它无法回答任何基本问题，`A1`\
