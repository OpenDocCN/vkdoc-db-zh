    \   文档与多个集合对比\n    *   操作因素、引用\n    *   关系型数据库\n\n### 数据库对象\n*   `BTree`、`bucket`\
    \ 数据结构、关键节点\n*   集合\n    *   `capped collection`\n    *   命名空间\n    *   数据文件（摘要）\n\
    \    *   数据记录结构、删除列表详情\n    *   区域 (`extent`)、元数据、记录数据结构\n\n### 存储引擎\n*   `WiredTiger`\
    \ 存储引擎\n    *   数据压缩算法、内存映射文件、虚拟内存\n    *   数据 `db.serverStatus()` 命令\n\n### 标识符\n\
    *   标识符 (`_id`)\n\n### 命名空间\n*   命名空间 (`命名空间 (.ns 文件)`)\n    *   `MMAPv1`\n  \
    \  *   集合 `bucket` 数据结构\n    *   `$freelist` 限制、索引、`BTree`\n\n## CRUD 操作\n\n###\
    \ 查询操作符\n*   条件操作符（用于 `aggregate()` 等）\n    *   `$gt` 和 `$gte` 操作符\n    *   `$in`\
    \ 和 `$nin` 操作符\n    *   `$lt` 和 `$lte` 操作符\n*   正则表达式\n\n### 查询方法\n*   `find()`\
