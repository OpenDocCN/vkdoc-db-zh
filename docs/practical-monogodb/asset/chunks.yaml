    \n![A332296_1_En_9_Fig11_HTML.jpg](A332296_1_En_9_Fig11_HTML.jpg)\n\nFigure 9-11.\
    \ `IOWait`\n\n`User time` indicates the time spent performing computations such\
    \ as documents updating, updating and rebalancing indexes, selecting or ordering\
