    `End if`


    `Loop through user.wall`


    `If posts.comments_shown > MaximumComments`


    `Pop the comment which was inserted first`


    `Decrement comments_shown by 1`


    `End if`


    `End loop`


    `End Function`


    To quickly execute these updates, you need to create indexes on `posts.id` and
    `posts.comments_shown`.


    ##### Creating New Post


    The basic sequence of operations in this code is as follows:


    The post is first saved into the “system of record,” the `user.posts` collection.
      Next, the `user.wall` collection is updated with the post.   Finally, the `social.posts`
    collection of everyone who is circled in the post is updated with the post.  


    `Function createnewpost`


    `(parameter createdby, posttype, postdetail, circles)`


    `Set ts = current timestamp.`


    `Set month = month of ts`


    `Set post_document = {"ts": ts, "by":{id:createdby[id], name: createdby[name]},
    "circles":circles, "type":posttype, "details":postdetails}`


    `Insert post_document into users.post collection`


    `Append post_document into user.walls collection`


    `Set userlist = all users who’s circled in the post based on the posts circle
    and the posted user id`


    `While users in userlist`


    `Append post_document to users social.posts collection`


    `End while`


    `End function`


    ### 10.2.3 Sharding


    Scaling can be achieved by sharding the four collections mentioned above. Since
    `user.profile`, `user.wall`, and `social.posts` contain user-specific documents,
    `user_id` is the perfect shard key for these collections. `_id` is the best shard
    key for the `users.post` collection.


    ## 10.3 Summary


    In this chapter, you used two use cases to look at how MongoDB can be used to
    solve certain problems. In the next chapter, we will list MongoDB’s limitations
    and the use cases where it’s not a good fit.


    # 11. MongoDB Limitations


    > “When starting with a new database, you should also be aware of its limitations
    to better use the database.”


    In this chapter, we will list MongoDB’s limitations and the use cases where it’s
    not a good fit.


    ## 11.1 MongoDB Space Is Too Large (Applicable for MMAPv1)


    Let’s start with the issue of disk space. MongoDB (with storage engine MMAPv1
    ) space is too large; in other words, the data directory files are larger than
    the database’s actual data.


    This is because of preallocated data files. This is by design in order to prevent
    file system fragmentation.


    The files in the data directory are named as <dbname>.0, <dbname>.1 and so on.
    The size of the first file as allocated by the mongod is 64MB; all subsequent
    file sizes increase by factor of 2, so the second file will 128MB, the third file
    will be 256MB, and so on until it reaches 2GB, post which all files will be 2GB
    in size. Though the space is allocated to the data files while creation, there
    might be files that are 90% empty. This unused allocated space is mostly small
    for larger databases.


    *   This option can be disabled by using the `-- noprealloc` option. However,
    it’s not recommended to use this on a production environment, and it’s supposed
    to be used only for testing and with small data sets where drop databases are
    called frequently.

    *   Oplog: If mongod is a Replica set member, then there will be a file named
    `oplog.rs` in the data directory. This file is present in the local database and
    is a preallocated capped collection. On a 64-bit installation, the allocation
    for this file defaults to approximately 5% of disk space.

    *   Journal: The journal files are also contained in the data directory that stores
    the writes on the disk before the same can be applied to the databases by MongoDB.

    *   MongoDB pre-allocates 3GB of data for journaling, which is over and above
    the actual database size(s), making it not fit for small installations. The workaround
    available for this is to use `–smallflags` in your command line flags or `/etc/mongod.conf`
    files until you are running in an environment where you have the required disk
    space. But this feature makes it not fit for small installations.

    *   Empty Records: When the documents or collections are deleted, the space is
    never returned back to the operating system; instead, MongoDB maintains a list
    of these empty records, which can be reused.


    To reclaim this deleted space, either the `compact` or `repairDatabase` option
    can be used but be aware that both options require additional disk space to run.


    Note


    No such limitation exists with the WiredTiger storage engine. Instead, storage
    size reduces by 50% due to compression of data files. Also, once the collection
    is dropped, disk space is automatically reclaimed, which is unlike the MMAPv1
    storage engine mentioned above.


    ## 11.2 Memory Issues (Applicable for Storage Engine MMAPv1)


    In MongoDB, memory is managed by memory mapping the entire data set. It allows
    the OS to control the memory mapping and allocate the maximum amount of RAM. The
    result is that the performance is non-optimal and the memory usage cannot be effectively
    reasoned about.


    Indexes are memory-heavy; in other words, indexes take up lot of RAM. Since these
    are B-tree indexes, defining many indexes can lead to faster consumption of system
    resources.   A consequence of this is that memory is allocated automatically when
    required. In a shared environment, it’s trickier to run the database. In general,
    as with all database servers, it’s best to run MongoDB on a dedicated server.


    ## 11.3 32-bit vs. 64-bit


    MongoDB comes with two versions, 32-bit and 64-bit.


    Since MongoDB uses memory mapped files, the 32-bit versions are limited to storing
    only about 2GB of data. If you need more data to be stored, you should use the
    64-bit build.


    Starting from version 3.0, commercial support for 32-bit versions is no longer
    provided by MongoDB. Also, the 32-bit version of MongoDB does not support the
    WiredTiger storage engine.


    ## 11.4 BSON Documents


    This section covers the limitations of BSON documents .


    *   Size limits: As with other databases, there’s a limit to what can be stored
    in the document. The current versions support documents up to 16MB in size. This
    maximum size ensures that a document cannot not use excessive RAM or excessive
    bandwidth while in transmission.

    *   Nested depth limit: In MongoDB, no more than 100 levels of nesting are supported
    for BSON documents.

    *   Field names: If you store 1,000 documents with the key “col1”, the key is
    stored that many times in the data set. Although arbitrary documents are supported
    in MongoDB, in practice most of the field names are the same. Keeping short field
    names is considered a good practice for optimizing the usage of space.'
  trans: "\n## 10.2.2.2 创建评论\n\n要为给定帖子创建一条包含给定文本的用户评论，你需要执行类似下面的代码：\n\n```\nFunction\
