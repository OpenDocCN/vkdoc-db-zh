    \ classifies as high disk I/O.\n\nThe `Queues` graph displays the operations count\
    \ waiting for a lock to be released at any given time. See Figure [9-9](#A332296_1_En_9_Chapter.html#Fig9).\n\
    \n![A332296_1_En_9_Fig9_HTML.jpg](A332296_1_En_9_Fig9_HTML.jpg)\n\nFigure 9-9.\
    \ `Queues`\n\nThe `CPU Time` (`IOWaits` and `User`) graph shows how the CPU cores\
