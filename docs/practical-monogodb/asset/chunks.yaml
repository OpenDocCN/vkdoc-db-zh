    \n![A332296_1_En_9_Fig7_HTML.jpg](A332296_1_En_9_Fig7_HTML.jpg)\n\nFigure 9-7.\
    \ `OpCounters`\n\nIn the `Page Fault` to `Opcounters` ratio, the page faults depend\
