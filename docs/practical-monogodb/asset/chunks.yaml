- fmt: '## 9.4.6 识别和修复集合级数据


    有时你可能需要验证集合是否保存了有效的数据并拥有有效的索引。针对这种情况，MongoDB 提供了 `validate()` 方法来验证指定集合的内容。


    以下示例验证 `Users` 集合的数据：


    ```

    c:\practicalmongodb\bin> mongo


    MongoDB shell version: 3.0.4


    connecting to: test


    > use mydbpoc


    switched to db mydbpoc


    > db.myusers.validate()


    {


    "ns" : "mydbpoc.myusers",


    "firstExtent" : "1:4322000 ns:mydbpoc.myusers",


    "lastExtent" : "1:4322000 ns:mydbpoc.myusers",


    "...............


    "valid" : true,


    "errors" : [ ],


    "warning" : "Some checks omitted for speed. use {full:true} option to do more
    thorough scan.",


    "ok" : 1


    }

    ```


    默认情况下，`validate()` 选项会同时检查数据文件和相关联的索引。提供集合统计数据有助于识别数据文件或索引是否存在问题。


    如果运行 `validate()` 表明索引已损坏，那么可以使用 `reIndex` 来重建集合的索引。这会删除并重建集合的所有索引。


    以下命令重建 `Users` 集合的索引：


    ```

    > use mydbpoc


    switched to db mydbpoc


    > db.myusers.reIndex()


    {


    "nIndexesWas" : 1,


    "msg" : "indexes dropped for collection",


    "nIndexes" : 1,


    "indexes" : [


    {


    "key" : {


    "_id" : 1


    },


    "ns" : "mydbpoc.myusers",


    "name" : "_id_"


    }


    ],


    "ok" : 1


    }


    >

    ```


    如果集合的数据文件已损坏，那么运行 `–repair` 选项是修复所有数据文件的最佳方式。


    ## 9.5 监控 MongoDB


    作为 MongoDB 服务器管理员，监控系统的性能和健康状况非常重要。在本节中，你将学习监控系统的方法。


    ### 9.5.1 mongostat


    `mongostat` 是 MongoDB 发行版的一部分。该工具提供服务器的简单统计信息；虽然不全面，但它提供了一个很好的概览。以下显示了本地主机的统计信息。打开终端窗口并执行以下命令：


    ```

    c:\> cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin> mongostat

    ```


    前六列显示了 `mongod` 服务器处理各种操作的速率。除这些列外，以下列也值得一提，在诊断问题时可能有用：


    *   `Conn`：此指标表示连接到 `mongod` 实例的数量。这里的值高可能表明应用程序未释放或关闭连接，这意味着应用程序虽然发出了打开连接的操作，但在操作完成后未关闭连接。


    从 3.0 版本开始，`mongostat` 也可以使用选项 `–json` 以 JSON 格式返回其响应。


    ```

    c:\> cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin> mongostat –json


    {"ANOC9":{"ar|aw":"0|0","command":"1|0","conn":"1","delete":"*0","faults":"1","flushes":"0","getmore":"0","host":"ANOC9","insert":"*0","locked":"",
    "mapped":"560.0M","netIn":"79b","netOut":"10k","non mapped":"","qr|qw":"0|0","query":"*0","res":"153.0M","time":"05:16:17","update":"*0","vsize":"1.2G"}}

    ```


    ### 9.5.2 mongod Web 界面


    每当启动 `mongod` 时，它默认会创建一个 Web 端口，该端口号比 `mongod` 用于监听连接的端口号高 1000。默认情况下，HTTP 端口是
    28017。


    可以通过 Web 浏览器访问这个 `mongod` Web 界面，它会显示大部分统计信息。如果 `mongod` 运行在 `localhost` 上并在端口
    27017 监听连接，则可以使用以下 URL 访问 HTTP 状态页面：`http://localhost:28017`。页面如图 [9-2](#A332296_1_En_9_Chapter.html#Fig2)
    所示。


    ![A332296_1_En_9_Fig2_HTML.jpg](A332296_1_En_9_Fig2_HTML.jpg)


    图 9-2. Web 界面


    ### 9.5.3 第三方插件


    除了此工具外，还有各种适用于 MongoDB 的第三方适配器，它们允许你使用常见的开源或商业监控系统，如 `cacti`、`Ganglia` 等。在其网站上，10gen
    维护了一个页面，分享有关可用 MongoDB 监控接口的最新信息。


    要获取最新的第三方插件列表，请访问 [`www.mongodb.org/display/DOCS/Monitoring+and+Diagnostics`](http://www.mongodb.org/display/DOCS/Monitoring+and+Diagnostics)。


    ### 9.5.4 MongoDB Cloud Manager


    除了上述用于监控和备份的工具和技术外，还有 MongoDB Cloud Manager（前身为 MMS – MongoDB Monitoring Services）。它由开发
    MongoDB 的团队开发，并且免费使用（30 天试用许可）。与上面讨论的技术相比，MongoDB Cloud Manager 提供了用户界面以及日志和性能详情，并以图形和图表的形式呈现。


    MongoDB Cloud Manager 图表是交互式的，允许用户设置自定义日期范围，如图 [9-3](#A332296_1_En_9_Chapter.html#Fig3)
    所示。


    ![A332296_1_En_9_Fig3_HTML.jpg](A332296_1_En_9_Fig3_HTML.jpg)


    图 9-3. 设置自定义日期范围


    Cloud Manager 的另一个巧妙功能是在发生不同事件时使用电子邮件和短信告警的能力。如图 [9-4](#A332296_1_En_9_Chapter.html#Fig4)
    所示。


    ![A332296_1_En_9_Fig4_HTML.jpg](A332296_1_En_9_Fig4_HTML.jpg)


    图 9-4. 电子邮件和短信告警


    Cloud Manager 不仅提供图表和告警，还允许你查看按响应时间排序的慢查询。你可以轻松地在一个地方查看查询的执行情况。图 [9-5](#A332296_1_En_9_Chapter.html#Fig5)
    显示了绘制查询性能的图表。


    ![A332296_1_En_9_Fig5_HTML.jpg](A332296_1_En_9_Fig5_HTML.jpg)


    图 9-5. 查询响应时间


    Cloud Manager 允许你执行以下操作：


    *   自动化你的 MongoDB 部署（MongoDB 节点、集群的配置以及现有部署的升级）

    *   通过持续备份保护你的数据

    *   通过 AWS 集成提供任意拓扑

    *   在仪表板中监控性能

    *   执行操作任务，例如增加容量


    对于 AWS 用户，它提供直接集成，因此可以在不离开 Cloud Manager 的情况下在 AWS 上启动 MongoDB。你已在第 tk 章中了解了如何使用
    AWS 进行配置。


    Cloud Manager 还有助于你发现系统中的低效之处并进行修正以实现平稳运行。


    它使用你安装的代理收集和报告指标。Cloud Manager 提供了对 MongoDB 系统健康状况的快速概览，并帮助你确定性能问题的根本原因。


    接下来，你将了解任何性能调查都应使用的关键指标。在此过程中，你还将了解这些指标组合的含义。'
  raw: '### 9.4.6 Identifying and Repairing Collection Level Data


    Sometimes you might want to validate that the collection holds valid data and
    had valid indexes. For such cases, MongoDB provides a `validate()` method that
    validates the content of the specified collection.


    The following example validates the data of the `Users` collection:


    `c:\practicalmongodb\bin>` `mongo`


    `MongoDB shell version: 3.0.4`


    `connecting to: test`


    `>` `use mydbpoc`


    `switched to db mydbpoc`


    `>` `db.myusers.validate()`


    `{`


    `"ns" : "mydbpoc.myusers",`


    `"firstExtent" : "1:4322000 ns:mydbpoc.myusers",`


    `"lastExtent" : "1:4322000 ns:mydbpoc.myusers",`


    `"...............`


    `"valid" : true,`


    `"errors" : [ ],`


    `"warning" : "Some checks omitted for speed. use {full:true} option to do`


    `more thorough scan.",`


    `"ok" : 1`


    `}`


    Both the data files and the associated indexes are checked by default by the `validate()`
    option . The collection statistics are provided to help in identifying if there’s
    any problem with the data files or the indexes.


    If running `validate()` indicates that the indexes are damaged, in that case `reIndex`
    can be used to re-index the indexes of the collection. This drops and rebuilds
    all the indexes of the collection.


    The following command reindexes the `Users` collection’s indexes:


    `>` `use mydbpoc`


    `switched to db mydbpoc`


    `>` `db.myusers.reIndex()`


    `{`


    `"nIndexesWas" : 1,`


    `"msg" : "indexes dropped for collection",`


    `"nIndexes" : 1,`


    `"indexes" : [`


    `{`


    `"key" : {`


    `"_id" : 1`


    `},`


    `"ns" : "mydbpoc.myusers",`


    `"name" : "_id_"`


    `}`


    `],`


    `"ok" : 1`


    `}`


    `>`


    If the collection’s data files are corrupt, then running the `–repair` option
    is the best way to repair all of the data files.


    ## 9.5 Monitoring MongoDB


    As a MongoDB server administrator, it’s important to monitor the system’s performance
    and health. In this section, you will learn ways of monitoring the system.


    ### 9.5.1 mongostat


    mongostat comes as part of the MongoDB distribution. This tool provides simple
    stats on the server; although it’s not extensive, it provides a good overview.
    The following shows the statistics of the localhost. Open a terminal window and
    execute the following:


    `c:\>` `cd c:\practicalmongodb\bin`


    `c:\practicalmongodb\bin>` `mongostat`


    The first six columns show the rate at which various operations are handled by
    the mongod server. Apart from these columns, the following column is also worth
    mentioning and can be of use when diagnosing problems :


    *   Conn: This is an indicator of the number of connections to the mongod instance.
    A high value here can indicate a possibility that the connections are not getting
    released or closed from the application, which means that although the application
    is issuing an open connection, it’s not closing the connection after completion
    of the operation.


    Starting from version 3.0, mongostat can also return its response in json format
    using option `–json`.


    `c:\>` `cd c:\practicalmongodb\bin`


    `c:\practicalmongodb\bin>` `mongostat –json`


    `{"ANOC9":{"ar|aw":"0|0","command":"1|0","conn":"1","delete":"*0","faults":"1","flushes":"0","getmore":"0","host":"ANOC9","insert":"*0","locked":"",
    "mapped":"560.0M","netIn":"79b","netOut":"10k","non mapped":"","qr|qw":"0|0","query":"*0","res":"153.0M","time":"05:16:17","update":"*0","vsize":"1.2G"}}`


    ### 9.5.2 mongod Web Interface


    Whenever a mongod is started up, it creates a web port by default, which is 1000
    higher than the port number mongod uses to listen for a connection. By default
    the HTTP port is 28017.


    This mongod web interface is accessed via your web browser, and it displays most
    of the statistical information. If the mongod is running on localhost and is listening
    for the connections on port 27017, then the HTTP status page can be accessed using
    the following URL: `http://localhost:28017`. The page looks like Figure [9-2](#A332296_1_En_9_Chapter.html#Fig2).


    ![A332296_1_En_9_Fig2_HTML.jpg](A332296_1_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    Web interface


    ### 9.5.3 Third-Party Plug-Ins


    In addition to this tool, there are various third-party adapters available for
    MongoDB which let you use common open source or commercial monitoring systems
    such as cacti, Ganglia, etc. On its website, 10gen maintains a page that shares
    the latest information about available MongoDB monitoring interfaces.


    To get an up-to-date list of third-party plug-ins, go to [`www.mongodb.org/display/DOCS/Monitoring+and+Diagnostics`](http://www.mongodb.org/display/DOCS/Monitoring+and+Diagnostics)
    .


    ### 9.5.4 MongoDB Cloud Manager


    In addition to the tools and techniques discussed above for monitoring and backup
    purposes, there is the MongoDB Cloud Manager (formerly known as MMS – MongoDB
    Monitoring Services). It’s developed by the team who developed MongoDB and is
    free to use (30-day trial license). In contrast to the techniques discussed above,
    MongoDB Cloud Manager provides user interface as well as logs and performance
    details in the form of graphs and charts.


    MongoDB Cloud Manager charts are interactive, enabling the user to set a custom
    date range, as depicted in Figure [9-3](#A332296_1_En_9_Chapter.html#Fig3).


    ![A332296_1_En_9_Fig3_HTML.jpg](A332296_1_En_9_Fig3_HTML.jpg)


    Figure 9-3.


    Setting a custom date range


    Another neat feature of the Cloud Manager is the ability to use email and text
    alerts in case of different events. This is depicted in Figure [9-4](#A332296_1_En_9_Chapter.html#Fig4).


    ![A332296_1_En_9_Fig4_HTML.jpg](A332296_1_En_9_Fig4_HTML.jpg)


    Figure 9-4.


    Email and text alerts


    Not only does Cloud Manager provides graphs and alerts, it also lets you view
    the slower queries ordered by response time. You can easily see how your queries
    are performing all at one place. Figure [9-5](#A332296_1_En_9_Chapter.html#Fig5)
    shows the graph that charts query performance.


    ![A332296_1_En_9_Fig5_HTML.jpg](A332296_1_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    Query response time


    Cloud Manager lets you do the following :


    *   Automate your MongoDB deployment (the configuration of MongoDB nodes, clusters,
    and upgrading of the existing deployment)

    *   Protect your data with continuous backup

    *   Provide any topology with AWS integration

    *   Monitor the performance in your dashboard

    *   Perform operational tasks such as adding capacity


    For AWS users, it offers direct integration so the MongoDB can be launched on
    AWS without ever leaving Cloud Manager. You saw how to provision with AWS in Chapter
    tk.


    Cloud Manager also helps you discover inefficiencies in your system and make corrections
    for smooth operation.


    It collects and reports metrics using the agent you install. Cloud Manager provides
    a quick glance of the MongoDB system health and helps you identify the root causes
    of performance issues.


    Next, you will look at the key metrics that should be used for any performance
    investigation. Along the way, you will also look at what the combination of the
    metric indicates.'
