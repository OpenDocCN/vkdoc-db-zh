- fmt: '# Distribution without tagging


    Next, you will use tags to separate the collections. The intent of this is to
    have one collection per shard (i.e. your goal is to have the chunk distribution
    shown in Table [7-6](#A332296_1_En_7_Chapter.html#Tab6)).


    **Table 7-6.**


    | Collection Chunks | On Shard |

    | --- | --- |

    | `movies.drama` | `Shard0000` |

    | `movies.action` | `Shard0001` |

    | `movies.comedy` | `Shard0002` |


    A tag describes the shard’s property, which can be anything. Hence you might tag
    a shard as “slow” or “fast” or “rack space” or “west coast.”


    In the following example, you will tag the shards as belonging to each of the
    collection:


    ```

    mongos> sh.addShardTag("shard0000", "dramas")

    mongos> sh.addShardTag("shard0001", "actions")

    mongos> sh.addShardTag("shard0002", "comedies")

    mongos>

    ```


    This signifies the following:


    *   Put the chunks tagged “dramas” on `shard0000`.

    *   Put the chunks tagged “actions” on `shard0001`.

    *   And put the chunks tagged “comedies” on `shard0002`.


    Next, you will create rules to tag the collections chunk accordingly.


    Rule 1: All chunks created in the `movies.drama` collection will be tagged as
    “dramas:”


    ```

    mongos> sh.addTagRange("movies.drama", {originality:MinKey}, {originality:MaxKey},
    "dramas")

    mongos>

    ```


    The rule uses `MinKey`, which means negative infinity, and `MaxKey`, which means
    positive infinity. Hence the above rule means mark all of the chunks of the collection
    `movies.drama` with the tag “dramas.”


    Similar to this you will make rules for the other two collections.


    Rule 2: All chunks created in the `movies.action` collection will be tagged as
    “actions.”


    ```

    mongos> sh.addTagRange("movies.action", {distribution:MinKey}, {distribution:MaxKey},
    "actions")

    mongos>

    ```


    Rule 3: All chunks created in the `movies.comedy` collection will be tagged as
    “comedies.”


    ```

    mongos> sh.addTagRange("movies.comedy", {collection:MinKey}, {collection:MaxKey},
    "comedies")

    mongos>

    ```


    You need to wait for the cluster to rebalance so that the chunks are distributed
    based on the tags and rules defined above. As mentioned, the chunk distribution
    is an automatic process, so after some time the chunks will automatically be redistributed
    to implement the changes you have made.


    Next, issue `chunks.find` to vet the chunks organization:


    ```

    mongos> use config

    switched to db config

    mongos> db.chunks.find({ns:"movies.drama"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    mongos> db.chunks.find({ns:"movies.action"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    mongos> db.chunks.find({ns:"movies.comedy"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    mongos>

    ```


    Thus the collection chunks have been redistributed based on the tags and rules
    defined (Figure [7-23](#A332296_1_En_7_Chapter.html#Fig23)).


    ![A332296_1_En_7_Fig23_HTML.jpg](A332296_1_En_7_Fig23_HTML.jpg)


    **Figure 7-23.**


    # Scaling with Tagging


    Next, you will look at how to scale with tagging. Let’s change the scenario. Let’s
    assume the collection `movies.action` needs two servers for its data. Since you
    have only three shards, this means the other two collection’s data need to be
    moved to one shard.


    In this scenario, you will change the tagging of the shards. You will add the
    tag “comedies” to `Shard0` and remove the tag from `Shard2`, and further add the
    tag “actions” to `Shard2`.


    This means that the chunks tagged “comedies” will be moved to `Shard0` and chunks
    tagged “actions” will be spread to `Shard2`.


    You first move the collection `movies.comedy` chunk to `Shard0` and remove the
    same from `Shard2`:


    ```

    mongos> sh.addShardTag("shard0000","comedies")

    mongos> sh.removeShardTag("shard0002","comedies")

    ```


    Next, you add the tag “actions” to `Shard2`, so that `movies.action` chunks are
    spread across `Shard2` also:


    ```

    mongos> sh.addShardTag("shard0002","actions")

    ```


    Re-issuing the find command after some time will show the following results:


    ```

    mongos> db.chunks.find({ns:"movies.drama"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    mongos> db.chunks.find({ns:"movies.action"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0001" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    { "shard" : "shard0002" }

    mongos> db.chunks.find({ns:"movies.comedy"}, {shard:1, _id:0}).sort({shard:1})

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    { "shard" : "shard0000" }

    mongos>

    ```


    The chunks have been redistributed reflecting the changes made (Figure [7-24](#A332296_1_En_7_Chapter.html#Fig24)).


    ![A332296_1_En_7_Fig24_HTML.jpg](A332296_1_En_7_Fig24_HTML.jpg)


    **Figure 7-24.**


    # Multiple Tags


    You can have multiple tags associated with the shards. Let’s add two different
    tags to the shards.


    Say you want to distribute the writes based on the disk. You have one shard that
    has a spinning disk and the other has a SSD (solid state drive). You want to redirect
    50% of the writes to the shard with SSD and the remaining to the one with the
    spinning disk.


    First, tag the shards based on these properties:


    ```

    mongos> sh.addShardTag("shard0001", "spinning")

    mongos> sh.addShardTag("shard0002", "ssd")

    mongos>

    ```


    Let’s further assume you have a `distribution` field of the `movies.action` collection
    that you will be using as the shard key. The `distribution` field value is between
    0 and 1. Next, you want to say, “If `distribution` < .5, send this to the spinning
    disk. If `distribution` >= .5, send to the SSD.” So you define the rules as follows:


    ```

    mongos> sh.addTagRange("movies.action", {distribution:MinKey} ,{distribution:.5}
    ,"spinning")

    mongos> sh.addTagRange("movies.action" ,{distribution:.5} ,{distribution:MaxKey},"ssd")

    mongos>

    ```


    Now documents with `distribution` < .5 will be written to the spinning shard and
    the others will be written to the SSD disk shard.


    With tagging you can control the type of load that each newly added server will
    get.


    # Points to Remember When Importing Data in a Sharded Environment


    Here are some points to keep in mind when importing data.'
