    \n图 9-7. `操作计数器`\n\n在 `页面错误` 与 `操作计数器` 的比率中，页面错误取决于系统上执行的操作以及当前内存中的内容。因此，每秒页面错误次数与每秒\
    \ `操作计数器` 的比率可以相当准确地反映磁盘 I/O 需求。参见图 9-8。\n\n![A332296_1_En_9_Fig8_HTML.jpg](img/A332296_1_En_9_Fig8_HTML.jpg)\n\
    \n图 9-8. `页面错误` 与 `操作计数器` 比率\n\n如果该比率是：\n\n-   < 1，则归类为低磁盘 I/O。\n-   接近 1，则归类为常规磁盘\
