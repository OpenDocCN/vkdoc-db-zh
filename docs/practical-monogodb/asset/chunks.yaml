  trans: "\n### 6.1.7.9 `explain()`\n\n`explain()` 函数可用于查看 MongoDB 数据库在执行查询时运行的步骤。从\
    \ 3.0 版本开始，该函数的输出格式和传递给它的参数发生了变化。它接受一个名为 `verbose` 的可选参数，该参数决定解释输出的显示方式。以下是详细程度模式：`allPlansExecution`、`executionStats`\
    \ 和 `queryPlanner`。默认的详细程度模式是 `queryPlanner`，这意味着如果不指定任何参数，则默认使用 `queryPlanner`。\n\
    \n以下代码展示了在 `username` 字段上进行过滤时执行的步骤：\n\n```bash\n> db.users.find({\"Name\":\"\
    Test User\"}).explain(\"allPlansExecution\")\n```\n\n```json\n{\n  \"queryPlanner\"\
    \ : {\n    \"plannerVersion\" : 1,\n    \"namespace\" : \"mydbproc.users\",\n\
    \    \"indexFilterSet\" : false,\n    \"parsedQuery\" : {\n      \"$and\" : [\
    \ ]\n    },\n    \"winningPlan\" : {\n      \"stage\" : \"COLLSCAN\",\n      \"\
    filter\" : {\n        \"$and\" : [ ]\n      },\n      \"direction\" : \"forward\"\
    \n    },\n    \"rejectedPlans\" : [ ]\n  },\n  \"executionStats\" : {\n    \"\
    executionSuccess\" : true,\n    \"nReturned\" : 20,\n    \"executionTimeMillis\"\
    \ : 0,\n    \"totalKeysExamined\" : 0,\n    \"totalDocsExamined\" : 20,\n    \"\
    executionStages\" : {\n      \"stage\" : \"COLLSCAN\",\n      \"filter\" : {\n\
    \        \"$and\" : [ ]\n      },\n      \"nReturned\" : 20,\n      \"executionTimeMillisEstimate\"\
    \ : 0,\n      \"works\" : 22,\n      \"advanced\" : 20,\n      \"needTime\" :\
    \ 1,\n      \"needFetch\" : 0,\n      \"saveState\" : 0,\n      \"restoreState\"\
    \ : 0,\n      \"isEOF\" : 1,\n      \"invalidates\" : 0,\n      \"direction\"\
    \ : \"forward\",\n      \"docsExamined\" : 20\n    },\n    \"allPlansExecution\"\
    \ : [ ]\n  },\n  \"serverInfo\" : {\n    \"host\" : \" ANOC9\",\n    \"port\"\
    \ : 27017,\n    \"version\" : \"3.0.4\",\n    \"gitVersion\" : \"534b5a3f9d10f00cd27737fbcd951032248b5952\"\
    \n  },\n  \"ok\" : 1\n}\n```\n\n如您所见，`explain()` 输出返回了关于 `queryPlanner`、`executionStats`\
    \ 和 `serverInfo` 的信息。如上所示，输出返回的信息取决于所选的详细程度模式。\n\n您已经了解了如何执行基本的查询、排序、限制等。您还看到了如何使用\
    \ `while` 循环或作为数组来操作结果集。在下一节中，您将了解索引以及如何在查询中使用它们。\n\n### 6.1.8 使用索引\n\n索引用于为频繁使用的查询提供高性能的读取操作。默认情况下，每当创建一个集合并向其中添加文档时，就会在文档的\
    \ `_id` 字段上创建一个索引。\n\n在本节中，您将了解如何创建不同类型的索引。让我们从使用 `for` 循环在一个名为 `testindx` 的新集合中插入\
    \ 100 万份文档开始。\n\n```bash\n>for(i=0;i<1000000;i++){db.testindx.insert({\"Name\"\
    :\"user\"+i,\"Age\":Math.floor(Math.random()*120)})}\n```\n\n接下来，发出 `find()` 命令以获取\
    \ `Name` 值为 `user101` 的文档。运行 `explain()` 命令以检查 MongoDB 为返回结果集正在执行哪些步骤。\n\n```bash\n\
    > db.testindx.find({\"Name\":\"user101\"}).explain(\"allPlansExecution\")\n```\n\
    \n```json\n{\n  \"queryPlanner\" : {\n    \"plannerVersion\" : 1,\n    \"namespace\"\
    \ : \"mydbproc.testindx\",\n    \"indexFilterSet\" : false,\n    \"parsedQuery\"\
    \ : {\n      \"Name\" : {\n        \"$eq\" : \"user101\"\n      }\n    },\n  \
    \  \"winningPlan\" : {\n      \"stage\" : \"COLLSCAN\",\n      \"filter\" : {\n\
    \        \"Name\" : {\n          \"$eq\" : \"user101\"\n        }\n      },\n\
    \      \"direction\" : \"forward\"\n    },\n    \"rejectedPlans\" : [ ]\n  },\n\
    \  \"executionStats\" : {\n    \"executionSuccess\" : true,\n    \"nReturned\"\
    \ : 1,\n    \"executionTimeMillis\" : 645,\n    \"totalKeysExamined\" : 0,\n \
    \   \"totalDocsExamined\" : 1000000,\n    \"executionStages\" : {\n      \"stage\"\
    \ : \"COLLSCAN\",\n      \"filter\" : {\n        \"Name\" : {\n          \"$eq\"\
    \ : \"user101\"\n        }\n      },\n      \"nReturned\" : 1,\n      \"executionTimeMillisEstimate\"\
    \ : 20,\n      \"works\" : 1000002,\n      \"advanced\" : 1,\n      \"needTime\"\
    \ : 1000000,\n      \"needFetch\" : 0,\n      \"saveState\" : 7812,\n      \"\
    restoreState\" : 7812,\n      \"isEOF\" : 1,\n      \"invalidates\" : 0,\n   \
    \   \"direction\" : \"forward\",\n      \"docsExamined\" : 1000000\n    },\n \
    \   \"allPlansExecution\" : [ ]\n  },\n  \"serverInfo\" : {\n    \"host\" : \"\
    \ ANOC9\",\n    \"port\" : 27017,\n    \"version\" : \"3.0.4\",\n    \"gitVersion\"\
    \ : \"534b5a3f9d10f00cd27737fbcd951032248b5952\"\n  },\n  \"ok\" : 1\n}\n```\n\
    \n如您所见，数据库扫描了整个表。这对性能有显著影响，发生这种情况是因为没有索引。\n\n#### 6.1.8.1 单键索引\n\n让我们在文档的 `Name`\
    \ 字段上创建一个索引。使用 `ensureIndex()` 创建索引。\n\n```bash\n> db.testindx.ensureIndex({\"\
    Name\":1})\n```\n\n索引创建将花费几分钟时间，具体取决于服务器和集合大小。\n\n让我们运行与之前相同的查询，并使用 `explain()`\
    \ 来检查索引创建后数据库正在执行哪些步骤。检查输出中的 `n`、`nscanned` 和 `millis` 字段。\n\n```bash\n>db.testindx.find({\"\
    Name\":\"user101\"}).explain(\"allPathsExecution\")\n```\n\n```json\n{\n  \"queryPlanner\"\
    \ : {\n    \"plannerVersion\" : 1,\n    \"namespace\" : \"mydbproc.testindx\"\
    ,\n    \"indexFilterSet\" : false,\n    \"parsedQuery\" : {\n      \"Name\" :\
    \ {\n        \"$eq\" : \"user101\"\n      }\n    },\n    \"winningPlan\" : {\n\
    \      \"stage\" : \"FETCH\",\n      \"inputStage\" : {\n        \"stage\" : \"\
    IXSCAN\",\n        \"keyPattern\" : {\n          \"Name\" : 1\n        },\n  \
    \      \"indexName\" : \"Name_1\",\n        \"isMultiKey\" : false,\n        \"\
    direction\" : \"forward\",\n        \"indexBounds\" : {\n          \"Name\" :\
    \ [\n            \"[\\\"user101\\\", \\\"user101\\\"]\"\n          ]\n       \
    \ }\n      }\n    },\n    \"rejectedPlans\" : [ ]\n  },\n  \"executionStats\"\
    \ : {\n    \"executionSuccess\" : true,\n    \"nReturned\" : 1,\n    \"executionTimeMillis\"\
    \ : 0,\n    \"totalKeysExamined\" : 1,\n    \"totalDocsExamined\" : 1,\n    \"\
    executionStages\" : {\n      \"stage\" : \"FETCH\",\n      \"nReturned\" : 1,\n\
    \      \"executionTimeMillisEstimate\" : 0,\n      \"works\" : 2,\n      \"advanced\"\
    \ : 1,\n      \"needTime\" : 0,\n      \"needFetch\" : 0,\n      \"saveState\"\
    \ : 0,\n      \"restoreState\" : 0,\n      \"isEOF\" : 1,\n      \"invalidates\"\
    \ : 0,\n      \"docsExamined\" : 1,\n      \"alreadyHasObj\" : 0,\n      \"inputStage\"\
    \ : {\n        \"stage\" : \"IXSCAN\",\n        \"nReturned\" : 1,\n        \"\
    executionTimeMillisEstimate\" : 0,\n        \"works\" : 2,\n        \"advanced\"\
    \ : 1,\n        \"needTime\" : 0,\n        \"needFetch\" : 0,\n        \"saveState\"\
    \ : 0,\n        \"restoreState\" : 0,\n        \"isEOF\" : 1,\n        \"invalidates\"\
    \ : 0,\n        \"keyPattern\" : {\n          \"Name\" : 1\n        },\n     \
    \   \"indexName\" : \"Name_1\",\n        \"isMultiKey\" : false,\n        \"direction\"\
    \ : \"forward\",\n        \"indexBounds\" : {\n          \"Name\" : [\n      \
    \      \"[\\\"user101\\\", \\\"user101\\\"]\"\n          ]\n        },\n     \
    \   \"keysExamined\" : 1,\n        \"dupsTested\" : 0,\n        \"dupsDropped\"\
    \ : 0,\n        \"seenInvalidated\" : 0,\n        \"matchTested\" : 0\n      }\n\
    \    },\n    \"allPlansExecution\" : [ ]\n  },\n  \"serverInfo\" : {\n    \"host\"\
    \ : \"ANOC9\",\n    \"port\" : 27017,\n    \"version\" : \"3.0.4\",\n    \"gitVersion\"\
    \ : \"534b5a3f9d10f00cd27737fbcd951032248b5952\"\n  },\n  \"ok\" : 1\n}\n```\n\
    \n如您在结果中所见，没有表扫描。索引创建对查询执行时间产生了显著差异。\n"
- fmt: "## 6.1.8.2 复合索引\n\n创建索引时，你需要记住索引应覆盖你的大多数查询。如果你有时只查询`Name`字段，而有时又同时查询`Name`和`Age`字段，那么创建一个在`Name`和`Age`字段上的复合索引，会比仅在其中一个字段上创建索引更有益，因为这个复合索引将覆盖这两种查询。\n\
    \n以下命令在集合`testindx`的字段`Name`和`Age`上创建一个复合索引。\n\n```\n> db.testindx.ensureIndex({\"\
    Name\":1, \"Age\": 1})\n```\n\n复合索引帮助MongoDB更高效地执行包含多个子句的查询。创建复合索引时，同样重要的是要记住，用于精确匹配的字段（例如\
    \ `Name` : `\"S1\"` ）应放在前面，随后是用于范围查询的字段（例如 `Age` : `{\"$gt\":20}`）。\n\n因此，上述索引将对以下查询有益：\n\
    \n```\n>db.testindx.find({\"Name\": \"user5\",\"Age\":{\"$gt\":25}}).explain(\"\
    allPlansExecution\")\n```\n\n```\n{\n    \"queryPlanner\" : {\n        \"plannerVersion\"\
    \ : 1,\n        \"namespace\" : \"mydbproc.testindx\",\n        \"indexFilterSet\"\
    \ : false,\n        \"parsedQuery\" : {\n            \"$and\" : [\n          \
    \      {\n                    \"Name\" : {\n                        \"$eq\" :\
    \ \"user5\"\n                    }\n                },\n                {\n  \
    \                  \"Age\" : {\n                        \"$gt\" : 25\n       \
    \             }\n                }\n            ]\n        },\n        \"winningPlan\"\
    \ : {\n            \"stage\" : \"KEEP_MUTATIONS\",\n            \"inputStage\"\
    \ : {\n                \"stage\" : \"FETCH\",\n                \"filter\" : {\n\
    \                    \"Age\" : {\n                        \"$gt\" : 25\n     \
    \               }\n                },\n                ............................\n\
    \                \"indexBounds\" : {\n                    \"Name\" : [\n     \
    \                   \"[\\\"user5\\\", \\\"user5\\\"\"\n                    }\n\
    \                },\n                \"rejectedPlans\" : [\n                 \
    \   {\n                        \"stage\" : \"FETCH\",\n                      \
    \  ......................................................\n                  \
    \      \"indexName\" : \"Name_1_Age_1\",\n                        \"isMultiKey\"\
    \ : false,\n                        \"direction\" : \"forward\",\n           \
    \             .....................................................\n        \
    \                \"executionStats\" : {\n                            \"executionSuccess\"\
    \ : true,\n                            \"nReturned\" : 1,\n                  \
    \          \"executionTimeMillis\" : 0,\n                            \"totalKeysExamined\"\
    \ : 1,\n                            \"totalDocsExamined\" : 1,\n             \
    \               .....................................................\n      \
    \                      \"inputStage\" : {\n                                \"\
    stage\" : \"FETCH\",\n                                \"filter\" : {\n       \
    \                             \"Age\" : {\n                                  \
    \      \"$gt\" : 25\n                                    }\n                 \
    \               },\n                                \"nReturned\" : 1,\n     \
    \                           \"executionTimeMillisEstimate\" : 0,\n           \
    \                     \"works\" : 2,\n                                \"advanced\"\
    \ : 1,\n                                \"allPlansExecution\" : [\n          \
    \                          {\n                                        \"nReturned\"\
    \ : 1,\n                                        \"executionTimeMillisEstimate\"\
    \ : 0,\n                                        \"totalKeysExamined\" : 1,\n \
    \                                       \"totalDocsExamined\" : 1,\n         \
    \                               \"executionStages\" : {\n                    \
    \                        .............................................................\n\
    \                                            \"serverInfo\" : {\n            \
    \                                    \"host\" : \" ANOC9\",\n                \
    \                                \"port\" : 27017,\n                         \
    \                       \"version\" : \"3.0.4\",\n                           \
    \                     \"gitVersion\" : \"534b5a3f9d10f00cd27737fbcd951032248b5952\"\
    \n                                            },\n                           \
    \                 \"ok\" : 1\n                                        }\n    \
    \                                }\n```\n\n## 6.1.8.3 支持排序操作\n\n在MongoDB中，使用索引字段对文档进行排序的操作能提供最佳性能。\n\
    \n与其他数据库类似，MongoDB中的索引也具有顺序。如果使用索引来访问文档，它将按照与索引相同的顺序返回结果。\n\n当需要在多个字段上排序时，需要创建复合索引。在复合索引中，输出可以按照索引前缀或整个索引的排序顺序排列。\n\
    \n索引前缀是复合索引的一个子集，包含从索引开头的一个或多个字段。\n\n例如，复合索引 `{ x:1, y: 1, z: 1}` 的索引前缀如下所示。\n\
    \n排序操作可以是任何索引前缀的组合，例如 `{x: 1}` 或 `{x: 1, y: 1}`。\n\n复合索引只有当它是排序的前缀时，才能帮助排序。\n\n\
    例如，在 `Age` 、 `Name` 和 `Class` 上创建的复合索引，如下所示：\n\n```\n> db.testindx.ensureIndex({\"\
    Age\": 1, \"Name\": 1, \"Class\": 1})\n```\n\n将对以下查询有用：\n\n```\n> db.testindx.find().sort({\"\
    Age\":1})\n> db.testindx.find().sort({\"Age\":1,\"Name\":1})\n> db.testindx.find().sort({\"\
    Age\":1,\"Name\":1, \"Class\":1})\n```\n\n上述索引对以下查询帮助不大：\n\n```\n> db.testindx.find().sort({\"\
    Gender\":1, \"Age\":1, \"Name\": 1})\n```\n\n你可以使用`explain()`命令来诊断MongoDB如何处理查询。\n\
    \n## 6.1.8.4 唯一索引\n\n在某个字段上创建索引并不能保证唯一性，所以如果在`Name`字段上创建索引，那么两个或多个文档可以具有相同的名称。然而，如果需要启用唯一性约束，则在创建索引时需要将`unique`属性设置为`true`。\n\
    \n首先，让我们删除现有的索引。\n\n```\n>db.testindx.dropIndexes()\n```\n\n以下命令将在`testindx`集合的`Name`字段上创建一个唯一索引：\n\
    \n```\n> db.testindx.ensureIndex({\"Name\":1},{\"unique\":true})\n```\n\n现在，如果你尝试向集合中插入重复的名称，如下所示，MongoDB会返回错误并不允许插入重复记录：\n\
    \n```\n> db.testindx.insert({\"Name\":\"uniquename\"})\n> db.testindx.insert({\"\
    Name\":\"uniquename\"})\n```\n\n```\n\"E11000 duplicate key error index: mydbpoc.testindx.$Name_1\
    \ dup key: { : \"uniquename\" }\"\n```\n\n如果你检查集合，你会看到只有第一个`uniquename`被存储了。\n\
    \n```\n> db.testindx.find({\"Name\":\"uniquename\"})\n{ \"_id\" : ObjectId(\"\
    52f4b3c3958073ea07f092ca\"), \"Name\" : \"uniquename\" }\n>\n```\n\n唯一性也可以为复合索引启用，这意味着虽然单个字段可以有重复值，但字段的组合将始终是唯一的。\n\
    \n例如，如果你在`{\"name\":1, \"age\":1}`上有一个唯一索引，\n\n```\n> db.testindx.ensureIndex({\"\
    Name\":1, \"Age\":1},{\"unique\":true})\n>\n```\n\n那么以下插入操作是被允许的：\n\n```\n> db.testindx.insert({\"\
    Name\":\"usercit\"})\n> db.testindx.insert({\"Name\":\"usercit\", \"Age\":30})\n\
    ```\n\n然而，如果你执行\n\n```\n> db.testindx.insert({\"Name\":\"usercit\", \"Age\":30})\n\
    ```\n\n它将抛出一个类似下面的错误\n\n```\nE11000 duplicate key error index: mydbpoc.testindx.$Name_1_Age_1\
    \ dup key: { : \"usercit\", : 30.0 }\n```\n\n你可能先创建集合并插入文档，然后在集合上创建索引。如果你在可能包含重复值的字段上为集合创建唯一索引，索引创建将会失败。\n\
    \n为了应对这种情况，MongoDB提供了`dropDups`选项。`dropDups`选项会保存找到的第一个文档，并删除任何后续具有重复值的文档。\n\n\
    以下命令将在`name`字段上创建一个唯一索引，并删除任何重复的文档：\n\n```\n>db.testindx.ensureIndex({\"Name\"\
    :1},{\"unique\":true, \"dropDups\":true})\n>\n```\n\n## 6.1.8.5 system.indexes\n\
    \n每当你创建一个数据库时，默认会创建一个`system.indexes`集合。有关数据库索引的所有信息都存储在`system.indexes`集合中。这是一个保留集合，因此你不能修改或删除其中的文档。你只能通过`ensureIndex`和`dropIndexes`数据库命令来操作它。\n\
    \n每当创建一个索引时，其元信息可以在`system.indexes`中看到。可以使用以下命令获取指定集合的所有索引信息：\n\n```\ndb.collectionName.getIndexes()\n\
    ```\n\n例如，以下命令将返回在`testindx`集合上创建的所有索引：\n\n```\n> db.testindx.getIndexes()\n```\n\
    \n## 6.1.8.6 dropIndex\n\n`dropIndex`命令用于删除索引。\n\n以下命令将从`testindx`集合中删除`Name`字段的索引：\n\
    \n```\n> db.testindx.dropIndex({\"Name\":1})\n{ \"nIndexesWas\" : 3, \"ok\" :\
    \ 1 }\n>\n```"
  raw: '#### 6.1.8.2 Compound Index


    When creating an index, you should keep in mind that the index covers most of
    your queries. If you sometimes query only the `Name` field and at times you query
