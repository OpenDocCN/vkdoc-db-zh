    \ 不使用事务。请注意，`PayPal` 确实使用事务。\n*   **可扩展性**：由于显而易见的原因，`NoSQL` 解决方案提供了更大的可扩展性。许多面向事务的\
    \ RDBMS 所需的复杂性，在不符合 `ACID` 的 `NoSQL` 数据库中并不存在。有趣的是，由于 `NoSQL` 不提供跨表引用，并且没有 `JOIN`\
    \ 查询，而且你无法编写单个查询来整理来自多个表的数据，一个简单而合乎逻辑的解决方案是——有时——在表之间复制数据。在某些场景下，将信息嵌入到主实体中——特别是一对一映射的情况下——可能是个好主意。\n\
    \n表 2-2 对比了 `SQL` 和 `NoSQL` 技术。\n\n表 2-2. SQL 与 NoSQL 对比\n\n|   | SQL 数据库 | NoSQL\
    \ 数据库 |\n| --- | --- | --- |\n| **类型** | 所有类型都支持 SQL 标准。 | 存在多种类型，如文档存储、键值存储、列数据库等。\
    \ |\n| **开发历史** | 开发于 1970 年代。 | 开发于 2000 年代。 |\n| **示例** | `SQL Server`, `Oracle`,\
    \ `MySQL`。 | `MongoDB`, `HBase`, `Cassandra`。 |\n| **数据存储模型** | 数据以行和列的形式存储在表中，每列都有特定类型。表通常根据规范化原则创建。使用联接（`Join`）从多个表中检索数据。\
    \ | 数据模型取决于数据库类型。例如，对于键值存储，数据存储为键值对。在基于文档的数据库中，数据存储为文档。与 RDBMS 的刚性表模型相比，数据模型是灵活的。\
    \ |\n| **模式** | 固定的结构和模式，因此对模式的任何更改都涉及修改数据库。 | 动态模式，可以通过扩展或修改当前模式来容纳新的数据类型或结构。可以动态添加新字段。\
    \ |\n| **可扩展性** | 采用纵向扩展（`Scale up`）方法；这意味着随着负载增加，需要购买更大、更昂贵的服务器来容纳数据。 | 采用横向扩展（`Scale\
    \ out`）方法；这意味着将数据负载分布到廉价的商用服务器上。 |\n| **支持事务** | 支持 `ACID` 和事务。 | 支持分区和可用性，但在事务上有所妥协。事务存在于某些级别，如数据库级别或文档级别。\
    \ |\n| **一致性** | 强一致性。 | 取决于具体产品。少数提供强一致性，而另一些提供最终一致性。 |\n| **支持** | 提供高水平的企业级支持。\
    \ | 开源模型。通过第三方或构建开源产品的公司获得支持。 |\n| **成熟度** | 已经存在很长时间。 | 其中一些是成熟的；其他的仍在发展中。 |\n\
    | **查询能力** | 通过易于使用的图形用户界面（`GUI`）提供。 | 查询可能需要编程专业知识和知识。重点在于功能和编程接口，而非用户界面（`UI`）。\
    \ |\n| **专业知识** | 拥有庞大的开发者社区，他们一直在利用 `SQL` 语言和 `RDBMS` 概念来架构和开发应用程序。 | 在这些开源工具上工作的开发者社区较小。\
    \ |\n"
- fmt: '## 2.6 NoSQL 数据库的类别


    在本节中，你将快速浏览 NoSQL 领域。你会了解 NoSQL 数据库新兴的类别。表 2-3 展示了 NoSQL 领域中的部分项目，包括其类型和各类别中的代表产品。


    表 2-3：NoSQL 类别


    | 类别 | 简要描述 | 例如 |

    | --- | --- | --- |

    | 文档型 | 数据以文档形式存储。例如，`{Name=“Test User”, Address=“Address1”, Age:8}` | MongoDB
    |

    | XML 数据库 | 使用 XML 存储数据。 | MarkLogic |

    | 图数据库 | 数据存储为节点集合，节点通过边连接。节点可类比为编程语言中的对象。 | GraphDB |

    | 键值存储 | 将数据存储为键值对。 | Cassandra， Redis， memcached |


    NoSQL 数据库根据数据的存储方式进行分类。由于需要从海量数据（通常是准实时）中提供精选信息，NoSQL 大多采用水平结构。它们针对大规模的插入和检索操作进行了优化，并内置了复制和聚类能力。


    表 2-4 简要对比了各类 NoSQL 数据库的功能特性。


    表 2-4：功能比较


    | 功能 | 列式 | 文档存储 | 键值存储 | 图 |

    | --- | --- | --- | --- | --- |

    | 类表模式支持（列） | 是 | 否 | 否 | 是 |

    | 完整更新/获取 | 是 | 是 | 是 | 是 |

    | 部分更新/获取 | 是 | 是 | 是 | 否 |

    | 按值查询/过滤 | 是 | 是 | 否 | 是 |

    | 跨行聚合 | 是 | 否 | 否 | 否 |

    | 实体间关系 | 否 | 否 | 否 | 是 |

    | 跨实体视图支持 | 否 | 是 | 否 | 否 |

    | 批量获取 | 是 | 是 | 是 | 是 |

    | 批量更新 | 是 | 是 | 是 | 否 |


    在考虑 NoSQL 项目时，重要的是你感兴趣的功能集。在决定使用某个 NoSQL 产品时，首先需要仔细理解问题需求，然后应参考他人使用该产品解决类似问题的经验。请记住，NoSQL
    仍在不断发展成熟，这将使你能够从同行和先前的部署中学习，从而做出更好的选择。


    此外，你还需要考虑以下问题：

    *   需要处理的数据有多大？

    *   读写操作可接受的吞吐量是多少？

    *   系统中如何实现一致性？

    *   系统需要支持高写入性能还是高读取性能？

    *   可维护性和管理难度如何？

    *   需要查询什么？

    *   使用 NoSQL 的好处是什么？


    我们建议你从小而重要的场景开始，并尽可能考虑混合方法。


    ## 2.7 小结


    在本章中，你学习了 NoSQL。现在你应该理解了什么是 NoSQL 以及它与 SQL 的不同之处。你还了解了 NoSQL 的各类别。


    在接下来的章节中，你将深入了解 MongoDB，这是一个基于文档的 NoSQL 数据库。


    # 3. MongoDB 简介


    > “MongoDB 是领先的 NoSQL 文档存储数据库之一。它使组织能够处理大数据并从中获得有价值的洞见。”


    一些领先的企业和消费级 IT 公司已在他们的产品和解决方案中利用了 MongoDB 的能力。MongoDB 3.0 版本引入了可插拔的存储引擎和 Ops Manager，这扩展了最适合
    MongoDB 的应用程序范围。


    MongoDB 的名字源于单词“humungous”（巨大的）。与其他 NoSQL 数据库一样，MongoDB 也不遵循 RDBMS 原则。它没有表、行和列的概念。同时，它也不提供
    ACID 合规性、JOIN、外键等功能。


    MongoDB 以二进制 JSON 文档（也称为 BSON）的形式存储数据。文档可以具有不同的模式，这意味着模式可以随着应用程序的发展而改变。MongoDB
    专为可扩展性、高性能和高可用性而构建。


    在本章中，我们将简要介绍 MongoDB 的创建和设计决策。我们将在后续章节中探讨 MongoDB 的关键特性、组件和架构。


    ## 3.1 历史


    2007 年下半年，Dwight Merriman、Eliot Horowitz 和他们的团队决定开发一项在线服务。该服务的意图是提供一个开发、托管和自动扩展
    Web 应用程序的平台，与 Google App Engine 或 Microsoft Azure 等产品非常相似。很快他们意识到，没有开源数据库平台能满足该服务的要求。


    “我们感觉很多现有数据库并不真正具备你希望它们拥有的‘云计算’原则：弹性、可扩展性……以及易于管理，同时对开发人员和操作人员也易于使用，”Merriman
    说。“[MySQL] 并不具备所有这些特性。”[¹](#A332296_1_En_3_Chapter.html#Fn1) 因此，他们决定构建一个不遵循 RDBMS
    模型的数据库。


    一年后，用于该服务的数据库已可使用。该服务本身从未发布，但团队在 2009 年决定将该数据库作为 MongoDB 开源。2010 年 3 月，MongoDB
    1.4.0 版本的发布被认为已具备生产可用性。最新的生产版本是 3.0，于 2015 年 3 月发布。MongoDB 是在总部位于纽约的初创公司 10gen
    的赞助下构建的。


    ## 3.2 MongoDB 设计哲学


    Eliot Horowitz 在一次演讲中提到，MongoDB 并非在实验室中设计，而是从构建大规模、高可用和健壮系统的经验中诞生的。在本节中，我们将简要了解一些导致
    MongoDB 如今形态的设计决策。


    ### 3.2.1 速度、可扩展性和敏捷性


    设计团队在设计 MongoDB 时的目标是创建一个快速、高度可扩展且易于使用的数据库。为了在分区数据库中实现速度和水平可扩展性，正如 CAP 定理所解释的那样，必须在一致性和事务支持上做出妥协。因此，根据该定理，MongoDB
    以牺牲一致性和事务支持为代价，提供了高可用性、可扩展性和分区能力。在实际应用中，这意味着 MongoDB 使用文档而非表和行，以使其具备灵活性、可扩展性和快速性。'
  raw: '## 2.6 Categories of NoSQL Databases


    In this section, you will quickly explore the NoSQL landscape. You will look at
    the emerging categories of NoSQL databases. Table [2-3](#A332296_1_En_2_Chapter.html#Tab3)
    shows a few of the projects in the NoSQL landscape, with the types and the players
    in each category.


    Table 2-3.


    NoSQL Categories


    | Category | Brief Description | For E.g. |

    | --- | --- | --- |

    | Document-based | Data is stored in form of documents. For instance, {Name=“Test
    User”, Address=“Address1”, Age:8} | MongoDB |

    | XML database | XML is used for storing data. | MarkLogic |

    | Graph databases | Data is stored as node collections. The nodes are connected
    via edges. A node is comparable to an object in a programming language. | GraphDB
    |

    | Key-value store | Stores data as key-value pairs. | Cassandra, Redis, memcached
    |


    The NoSQL databases are categorized on the basis of how the data is stored. NoSQL
    mostly follows a horizontal structure because of the need to provide curated information
    from large volumes, generally in near real-time. They are optimized for insert
    and retrieve operations on a large scale with built-in capabilities for replication
    and clustering.


    Table [2-4](#A332296_1_En_2_Chapter.html#Tab4) briefly provides a feature comparison
    between the various categories of NoSQL databases.


    Table 2-4.


    Feature Comparison


    | Feature | Column-Oriented | Document Store | Key-Value Store | Graph |

    | --- | --- | --- | --- | --- |

    | Table-like schema support (columns) | Yes | No | No | Yes |

    | Complete update/fetch | Yes | Yes | Yes | Yes |

    | Partial update/fetch | Yes | Yes | Yes | No |

    | Query/filter on value | Yes | Yes | No | Yes |

    | Aggregate across rows | Yes | No | No | No |

    | Relationship between entities | No | No | No | Yes |

    | Cross-entity view support | No | Yes | No | No |

    | Batch fetch | Yes | Yes | Yes | Yes |

    | Batch update | Yes | Yes | Yes | No |


    The important thing when considering a NoSQL project is the feature set you are
    interested in. When deciding on a NoSQL product, first you need to understand
    the problem requirements very carefully, and then you should look at other people
    who have already used the NoSQL product to solve similar problems. Remember that
    NoSQL is still maturing, so this will enable you to learn from peers and previous
    deployments, and make better choi ces.


    In addition, you also need to consider the following questions.


    *   How big is the data that needs to be handled?

    *   What throughput is acceptable for read and write?

    *   How is consistency is achieved in the system?

    *   Does the system need to support high write performance or high read performance?

    *   How easy is the maintainability and administration?

    *   What needs to be queried?

    *   What is the benefit of using NoSQL?


    We recommend that you start small but significant, and consider a hybrid approach
    wherever possi ble.


    ## 2.7 Summary


    In this chapter, you learned about NoSQL. You should now understand what NoSQL
    is and how it is different from SQL. You also looked into the various categories
    of NoSQL.


    In the following chapters, you will look into MongoDB, which is a document-based
    NoSQL database.


    # 3. Introducing MongoDB


    > “MongoDB is one of the leading NoSQL document store databases. Itenables organizations
    to handle and gain meaningful insights from Big Data.”


    Some leading enterprises and consumer IT companies have leveraged the capabilities
    of MongoDB in their products and solutions. The MongoDB 3.0 release introduced
    a pluggable storage engine and the Ops Manager, which has extended the set of
    applications that are best suited for MongoDB.


    MongoDB derives its name from the word “humungous.”Like other NoSQL databases,
    MongoDB also doesn’t comply with the RDBMS principles. It doesn’t have the concepts
    of tables, rows, and columns. Also, it doesn’t provide features of ACID compliance,
    JOINS, foreign keys, etc.


    MongoDB stores data as Binary JSON documents (also known as BSON). The documents
    can have different schemas, which means that the schema can change as the application
    evolves. MongoDB is built for scalability, performance, and high availability.


    In this chapter, we will talk a bit about MongoDB’s creation and the design decisions.
    We will look at the key features, components, and architecture of MongoDB in the
    following chapters.


    ## 3.1 History


    In the later part of 2007, Dwight Merriman, Eliot Horowitz, and their team decided
    to develop an online service. The intent of the service was to provide a platform
    for developing, hosting, and auto-scaling web applications, much in line with
    products such as the Google App Engine or Microsoft Azure. Soon they realized
    that no open source database platform suited the requirements of the service.


    “We felt like a lot of existing databases didn’t really have the ‘cloud computing’
    principles you want them to have: elasticity, scalability, and … easy administration,
    but also ease of use for developers and operators,” Merriman said. “[MySQL] doesn’t
    have all those properties.”[¹](#A332296_1_En_3_Chapter.html#Fn1) So they decided
    to build a database that would not comply with the RDBMS model.


    A year later, the database for the service was ready to use. The service itself
    was never released but the team decided in 2009 to open source the database as
    MongoDB. In March of 2010,the release of MongoDB 1.4.0 was considered production-ready.
    The latest production release is 3.0and it was released in March 2015.MongoDB
    was built under the sponsorship of 10gen, a New York–based startup.


    ## 3.2 MongoDB Design Philosophy


    In one of his talks, Eliot Horowitz mentioned that MongoDB wasn’t designed in
    a lab and is instead built from the experiences of building large scale, high
    availability, and robust systems. In this section, we will briefly look at some
    of the design decisions that led to what MongoDB is today.


    ### 3.2.1 Speed, Scalability, and Agility


    The design team’s goal when designing MongoDB was to create a database that was
    fast, massively scalable, and easy to use. To achieve speed and horizontal scalability
    in a partitioned database, as explained in the CAP theorem, the consistency and
    transactional support have to be compromised. Thus, per this theorem, MongoDB
    provides high availability, scalability, and partitioning at the cost of consistency
    and transactional support. In practical terms, this means that instead of tables
    and rows, MongoDB uses documents to make it flexible, scalable, and fast.'
