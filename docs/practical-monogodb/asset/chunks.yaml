    \ 的空间。\n\n虽然默认大小在大多数情况下已足够，但你可以在启动服务器时使用 `–oplogsize` 选项来指定以 MB 为单位的 `oplog` 大小。\n\
    \n如果你有以下工作负载，可能需要重新考虑 `oplog` 大小：\n\n*   同时更新多个文档：由于操作需要被转换为幂等操作，此场景最终可能需要大量的\
    \ `oplog` 空间。\n*   删除和插入以相同的速率发生，涉及相同数量的数据：在此场景中，虽然数据库大小不会增加，但将操作转换为幂等操作可能导致更大的\
    \ `oplog`。\n*   大量的原地更新：虽然这些更新不会改变数据库大小，但将更新记录为 `oplog` 中的幂等操作可能导致更大的 `oplog`。\n\
    \n## 初始同步与复制\n\n初始同步在成员处于以下两种情况之一时执行：\n\n1.  节点首次启动（即它是一个新节点且没有数据）。\n2.  节点变得陈旧，其中\
    \ `primary` 已覆盖了 `oplog` 且该节点尚未复制数据。在这种情况下，数据将被移除。\n\n在这两种情况下，初始同步涉及以下步骤：\n\n\
    1.  首先，克隆所有数据库。\n2.  使用源节点的 `oplog`，将更改应用到其数据集。\n3.  最后，在所有集合上构建索引。\n\n初始同步之后，副本集成员持续复制更改以保持最新状态。\n\
    \n大多数同步发生在 `primary` 上，但可以启用链式复制，其中同步仅从 `secondary` 进行（即，同步目标根据其他成员复制的 `ping`\
    \ 时间和状态而改变）。"
- fmt: "# Syncing and Failover in Replica Sets\n\n## Syncing – Normal Operation\n\n\
    In normal operations, the secondary chooses a member from where it will sync its\
    \ data, and then the operations are pulled from the chosen source’s oplog collection\
    \ (`local.oplog.rs`).\n\nOnce the operation (op) is get, the secondary does the\
    \ following:\n\nIt first applies the op to its data copy. Then it writes the op\
    \ to its local oplog. Once the op is written to the oplog, it requests the next\
    \ op.\n\nSuppose it crashes between step 1 and step 2, and then it comes back\
    \ again. In this scenario, it’ll assume the operation has not been performed and\
    \ will re-apply it.\n\nSince oplog ops are idempotent, the same operation can\
    \ be applied any number of times, and every time the result document will be same.\n\
    \n*   If you have the following doc `{I:11}`\n*   an increment operation is performed\
    \ on the same, such as `{$inc:{I:1}}` on the primary\n*   in this case the following\
    \ will be stored in the primary oplog: `{I:12}`.\n\nThis will be replicated by\
    \ the secondaries. So the value remains the same even if the log is applied multiple\
    \ times.\n\n## Starting Up\n\nWhen a node is started, it checks its local collection\
    \ to find out the `lastOpTimeWritten`. This is the time of the latest op that\
    \ was applied on the secondary.\n\nThe following shell helper can be used to find\
    \ the latest op in the shell:\n\n```\n> rs.debug.getLastOpWritten()\n```\n\nThe\
    \ output returns a field named `ts`, which depicts the last op time.\n\nIf a member\
    \ starts up and finds the `ts` entry, it starts by choosing a target to sync from\
    \ and it will start syncing as in a normal operation. However, if no entry is\
    \ found, the node will begin the initial sync process.\n\n## Whom to Sync From?\n\
    \nIn this section, you will look at how the source is chosen to sync from. As\
    \ of 2.0, based on the average ping time servers automatically sync from the “nearest”\
    \ node.\n\nWhen you bring up a new node, it sends heartbeats to all nodes and\
    \ monitors the response time. Based on the data received, it then decides the\
    \ member to sync from using the following algorithm:\n\n```\nfor each healthy\
    \ member Loop:\n    if state is Primary\n        add the member to possible sync\
    \ target set\n    if member’s lastOpTimeWritten is greater then the local lastOpTime\
    \ Written\n        add the member to possible sync target set\nSet sync_from =\
    \ MIN (PING TIME to members of sync target set)\n```\n\nNote: A “healthy member”\
    \ can be thought of as a “normal” primary or secondary member.\n\nIn version 2.0,\
    \ the slave’s delayed nodes were debatably included in “healthy” nodes. Starting\
    \ from version 2.2, delayed nodes and hidden nodes are excluded from the “healthy”\
    \ nodes.\n\nRunning the following command will show the server that is chosen\
    \ as the source for syncing:\n\n```\ndb.adminCommand({replSetGetStatus:1})\n```\n\
    \nThe output field of `syncingTo` is present only on secondary nodes and provides\
    \ information on the node from which it is syncing.\n\n## Making Writes Work with\
    \ Chaining Slaves\n\nYou have seen that the above algorithm for choosing a source\
    \ to sync from implies that slave chaining is semi-automatic. When a server is\
    \ started, it’ll most probably choose a server within the same data center to\
    \ sync from, thus reducing the WAN traffic.\n\nHowever, this will never lead to\
    \ a loop because the nodes will sync only from a secondary that has a latest value\
    \ of `lastOpTimeWritten` which is greater than its own. You will never end up\
    \ in a scenario where N1 is syncing from N2 and N2 is syncing from N1. It will\
    \ always be either N1 is syncing from N2 or N2 is syncing from N1.\n\nIn this\
    \ section, you will see how `w` (write operation) works with slave chaining. If\
    \ N1 is syncing from N2, which is further syncing from N3, in this case how N3\
    \ will know that until which point N1 is synced to.\n\nWhen N1 starts its sync\
    \ from N2, a special “handshake” message is sent, which intimates to N2 that N1\
    \ will be syncing from its oplog. Since N2 is not primary, it will forward the\
    \ message to the node it is syncing from (i.e. it opens a connection to N3 pretending\
    \ to be N1). By the end of the above step, N2 has two connections that are opened\
    \ with N3: one connection for itself and the other for N1.\n\nWhenever an op request\
    \ is made by N1 to N2, the op is sent by N2 from its oplog and a dummy request\
    \ is forwarded on the link of N1 to N3, as shown in Figure 7-4.\n\n![A332296_1_En_7_Fig4_HTML.jpg](A332296_1_En_7_Fig4_HTML.jpg)\n\
    Figure 7-4. Writes via chaining slaves\n\nAlthough this minimizes network traffic,\
    \ it increases the absolute time for the write to reach to all of the members.\n\
    \n## Failover\n\nIn this section, you will look at how primary and secondary member\
    \ failovers are handled in replica sets. All members of a replica set are connected\
    \ to each other. As shown in Figure 7-5, they exchange a heartbeat message amongst\
    \ each other.\n\n![A332296_1_En_7_Fig5_HTML.jpg](A332296_1_En_7_Fig5_HTML.jpg)\n\
    Figure 7-5. Heartbeat message exchange\n\nHence a node with missing heartbeat\
    \ is considered as crashed.\n\n### If the Node Is a Secondary Node\n\nIf the node\
    \ is a secondary node, it will be removed from the membership of the replica set.\
    \ In the future, when it recovers, it can re-join. Once it re-joins, it needs\
    \ to update the latest changes.\n\nIf the down period is small, it connects to\
    \ the primary and catches up with the latest updates. However, if the down period\
    \ is lengthy, the secondary server will need to resync with primary where it deletes\
    \ all its data and does an initial sync as if it’s a new server.\n\n### If the\
    \ Node Is the Primary Node\n\nIf the node is a primary node, in this scenario\
    \ if the majority of the members of the original replica sets are able to connect\
    \ to each other, a new primary will be elected by these nodes, which is in accordance\
    \ with the automatic failover capability of the replica set.\n\nThe election process\
    \ will be initiated by any node that cannot reach the primary.\n\nThe new primary\
    \ is elected by majority of the replica set nodes. Arbiters can be used to break\
    \ ties in scenarios such as when network partitioning splits the participating\
    \ nodes into two halves and the majority cannot be reached.\n\nThe node with the\
    \ highest priority will be the new primary. If you have more than one node with\
    \ same priority, the data freshness can be used for breaking ties.\n\nThe primary\
    \ node uses a heartbeat to track how many nodes are visible to it. If the number\
    \ of visible nodes falls below the majority, the primary automatically falls back\
    \ to the secondary state. This scenario prevents the primary from functioning\
    \ when it’s separated by a network partition."
  raw: '##### Syncing – Normal Operation


    In normal operations, the secondary chooses a member from where it will sync its
    data, and then the operations are pulled from the chosen source’s oplog collection
    (`local.oplog.rs`).


    Once the operation (op) is get, the secondary does the following:


    It first applies the op to its data copy.   Then it writes the op to its local
    oplog.   Once the op is written to the oplog, it requests the next op.  


    Suppose it crashes between step 1 and step 2, and then it comes back again. In
    this scenario, it’ll assume the operation has not been performed and will re-apply
    it.


    Since oplog ops are idempotent, the same operation can be applied any number of
    times, and every time the result document will be same.


    *   If you have the following doc

    *   {I:11}

    *   an increment operation is performed on the same, such as

    *   {$inc:{I:1}} on the primary

    *   In this case the following will be stored in the primary oplog:

    *   {I:12}.


    This will be replicated by the secondaries. So the value remains the same even
    if the log is applied multiple times.


    ##### Starting Up


    When a node is started, it checks its local collection to find out the `lastOpTimeWritten`.
    This is the time of the latest op that was applied on the secondary.


    The following shell helper can be used to find the latest op in the shell:


    `> rs.debug.getLastOpWritten()`


    The output returns a field named `ts`, which depicts the last op time.


    If a member starts up and finds the `ts` entry, it starts by choosing a target
    to sync from and it will start syncing as in a normal operation. However, if no
    entry is found, the node will begin the initial sync process.


    ##### Whom to Sync From?


    In this section, you will look at how the source is chosen to sync from . As of
    2.0, based on the average ping time servers automatically sync from the “nearest”
    node.


    When you bring up a new node, it sends heartbeats to all nodes and monitors the
    response time. Based on the data received, it then decides the member to sync
    from using the following algorithm:


    `for each healthy member Loop:`


    `if state is Primary`


    `add the member to possible sync target set`


    `if member’s lastOpTimeWritten is greater then the local lastOpTime Written`


    `add the member to possible sync target set`


    `Set sync_from = MIN (PING TIME to members of sync target set)`


    `Note: A “healthy member” can be thought of as a “normal” primary or secondary
    member.`


    In version 2.0, the slave’s delayed nodes were debatably included in “healthy”
    nodes. Starting from version 2.2, delayed nodes and hidden nodes are excluded
    from the “healthy” nodes.


    Running the following command will show the server that is chosen as the source
    for syncing:


    `db.adminCommand({replSetGetStatus:1})`


    The output field of `syncingTo` is present only on secondary nodes and provides
    information on the node from which it is syncing.


    ##### Making Writes Work with Chaining Slaves


    You have seen that the above algorithm for choosing a source to sync from implies
    that slave chaining is semi-automatic. When a server is started, it’ll most probably
    choose a server within the same data center to sync from, thus reducing the WAN
    traffic.


    However, this will never lead to a loop because the nodes will sync only from
    a secondary that has a latest value of `lastOpTimeWritten` which is greater than
    its own. You will never end up in a scenario where N1 is syncing from N2 and N2
    is syncing from N1\. It will always be either N1 is syncing from N2 or N2 is syncing
    from N1.


    In this section, you will see how w (write operation ) works with slave chaining
    . If N1 is syncing from N2, which is further syncing from N3, in this case how
    N3 will know that until which point N1 is synced to.


    When N1 starts its sync from N2, a special “handshake” message is sent, which
    intimates to N2 that N1 will be syncing from its oplog. Since N2 is not primary,
    it will forward the message to the node it is syncing from (i.e. it opens a connection
    to N3 pretending to be N1). By the end of the above step, N2 has two connections
    that are opened with N3: one connection for itself and the other for N1.


    Whenever an op request is made by N1 to N2, the op is sent by N2 from its oplog
    and a dummy request is forwarded on the link of N1 to N3, as shown in Figure [7-4](#A332296_1_En_7_Chapter.html#Fig4).


    ![A332296_1_En_7_Fig4_HTML.jpg](A332296_1_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    Writes via chaining slaves


    Although this minimizes network traffic, it increases the absolute time for the
    write to reach to all of the members.


    #### 7.4.2.5 Failover


    In this section, you will look at how primary and secondary member failovers are
    handled in replica sets. All members of a replica set are connected to each other.
    As shown in Figure [7-5](#A332296_1_En_7_Chapter.html#Fig5), they exchange a heartbeat
    message amongst each other.


    ![A332296_1_En_7_Fig5_HTML.jpg](A332296_1_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    Heartbeat message exchange


    Hence a node with missing heartbeat is considered as crashed.


    ##### If the Node Is a Secondary Node


    If the node is a secondary node , it will be removed from the membership of the
    replica set. In the future, when it recovers, it can re-join. Once it re-joins,
    it needs to update the latest changes.


    If the down period is small, it connects to the primary and catches up with the
    latest updates.   However, if the down period is lengthy, the secondary server
    will need to resync with primary where it deletes all its data and does an initial
    sync as if it’s a new server.


    ##### If the Node Is the Primary Node


    If the node is a primary node, in this scenario if the majority of the members
    of the original replica sets are able to connect to each other, a new primary
    will be elected by these nodes, which is in accordance with the automatic failover
    capability of the replica set.


    The election process will be initiated by any node that cannot reach the primary.


    The new primary is elected by majority of the replica set nodes. Arbiters can
    be used to break ties in scenarios such as when network partitioning splits the
    participating nodes into two halves and the majority cannot be reached.


    The node with the highest priority will be the new primary. If you have more than
    one node with same priority, the data freshness can be used for breaking ties.


    The primary node uses a heartbeat to track how many nodes are visible to it. If
    the number of visible nodes falls below the majority, the primary automatically
    falls back to the secondary state. This scenario prevents the primary from functioning
    when it’s separated by a network partition.'
  trans: "\n# 副本集中的同步与故障转移\n\n## 同步 – 正常操作\n\n在正常操作中， secondary 节点会选择一个成员来同步其数据，然后从所选源的\
    \ `oplog` 集合 (`local.oplog.rs`) 中拉取操作记录。\n\n一旦获取到操作（op）， secondary 节点会执行以下步骤：\n\
    \n它首先将该操作应用到自己的数据副本上。然后，将该操作写入其本地的 `oplog`。操作一旦写入 `oplog`，它就会请求下一个操作。\n\n假设它在步骤\
    \ 1 和步骤 2 之间崩溃，然后又恢复了。在这种情况下，它会假定该操作尚未执行，并将重新应用它。\n\n由于 `oplog` 中的操作是幂等的，同一个操作可以应用任意多次，每次得到的结果文档都是相同的。\n\
    \n*   假设你有以下文档 `{I:11}`\n*   在主节点上对其执行了一个递增操作，例如 `{$inc:{I:1}}`\n*   在这种情况下，以下内容将被存储在主节点的\
    \ `oplog` 中：`{I:12}`。\n\n这将被 secondary 节点复制。因此，即使日志被应用多次，该值也保持不变。\n\n## 启动过程\n\
    \n当一个节点启动时，它会检查其本地集合以找出 `lastOpTimeWritten`。这是应用到该 secondary 节点的最新操作的时间。\n\n以下\
    \ shell 辅助函数可用于在 shell 中查找最新的操作：\n\n```\n> rs.debug.getLastOpWritten()\n```\n\n\
    输出返回一个名为 `ts` 的字段，它描述了最后一次操作的时间。\n\n如果一个成员启动并找到了 `ts` 条目，它就会通过选择一个同步目标来开始，并像正常操作一样开始同步。但是，如果没有找到条目，该节点将开始初始同步过程。\n\
    \n## 从谁同步？\n\n在本节中，您将了解如何选择同步源。截至 2.0 版本，服务器会根据平均 ping 时间自动从“最近”的节点同步。\n\n当您启动一个新节点时，它会向所有节点发送心跳并监控响应时间。根据接收到的数据，然后使用以下算法决定要同步的成员：\n\
    \n```\n对每个健康成员循环执行：\n    如果状态是 Primary\n        将该成员加入可能的同步目标集合\n    如果该成员的 lastOpTimeWritten\
    \ 大于本地的 lastOpTimeWritten\n        将该成员加入可能的同步目标集合\n设置 sync_from = MIN (到同步目标集合成员的\
    \ PING TIME)\n```\n\n注意：“健康成员”可以被认为是“正常”的主节点或 secondary 节点。\n\n在 2.0 版本中，延迟节点是否被包含在“健康”节点中曾有争议。从\
    \ 2.2 版本开始，延迟节点和隐藏节点被排除在“健康”节点之外。\n\n运行以下命令将显示被选为同步源的服务器：\n\n```\ndb.adminCommand({replSetGetStatus:1})\n\
    ```\n\n输出字段 `syncingTo` 仅存在于 secondary 节点上，提供了它正在从中同步的节点信息。\n\n## 使写入操作与链式从节点协同工作\n\
    \n您已经看到，上述选择同步源的算法意味着从节点链式同步是半自动的。当一个服务器启动时，它很可能会选择同一数据中心内的服务器进行同步，从而减少 WAN 流量。\n\
    \n然而，这永远不会导致循环，因为节点只会从 `lastOpTimeWritten` 值比自己新的 secondary 节点同步。您永远不会陷入 N1 正在从\
    \ N2 同步，而 N2 又在从 N1 同步的情况。它总是要么 N1 从 N2 同步，要么 N2 从 N1 同步。\n\n在本节中，您将看到 `w`（写入操作）如何与从节点链式同步协同工作。如果\
    \ N1 正在从 N2 同步，而 N2 又在从 N3 同步，在这种情况下，N3 如何知道 N1 同步到了哪一点。\n\n当 N1 开始从 N2 同步时，会发送一个特殊的“握手”消息，通知\
    \ N2 它将从其 `oplog` 同步。由于 N2 不是主节点，它会将该消息转发给它正在从中同步的节点（即，它假装成 N1 打开一个到 N3 的连接）。完成上述步骤后，N2\
    \ 与 N3 之间建立了两个连接：一个用于它自己，另一个用于 N1。\n\n每当 N1 向 N2 发出操作请求时，N2 会从其 `oplog` 中发送该操作，并在\
    \ N1 的链路上向 N3 转发一个虚拟请求，如图 7-4 所示。\n\n![A332296_1_En_7_Fig4_HTML.jpg](img/A332296_1_En_7_Fig4_HTML.jpg)\n\
    图 7-4. 通过链式从节点进行写入\n\n尽管这最小化了网络流量，但它增加了写入操作到达所有成员所需的绝对时间。\n\n## 故障转移\n\n在本节中，您将了解如何处理副本集中的主节点和\
    \ secondary 节点故障转移。副本集的所有成员都相互连接。如图 7-5 所示，它们彼此交换心跳消息。\n\n![A332296_1_En_7_Fig5_HTML.jpg](img/A332296_1_En_7_Fig5_HTML.jpg)\n\
    图 7-5. 心跳消息交换\n\n因此，一个心跳丢失的节点被视为已崩溃。\n\n### 如果节点是 Secondary 节点\n\n如果该节点是 secondary\
    \ 节点，它将被从副本集的成员资格中移除。未来，当它恢复时，可以重新加入。一旦重新加入，它需要更新最新的更改。\n\n如果宕机时间较短，它会连接到主节点并赶上最新的更新。但是，如果宕机时间较长，该\
    \ secondary 服务器将需要与主节点重新同步，删除其所有数据，并像新服务器一样执行初始同步。\n\n### 如果节点是 Primary 节点\n\n\
    如果该节点是主节点，在这种情况下，如果原始副本集的大多数成员能够相互连接，这些节点将根据副本集的自动故障转移能力选举出一个新的主节点。\n\n任何无法联系到主节点的节点都将发起选举过程。\n\
    \n新的主节点由副本集中的大多数节点选举产生。仲裁器可用于在诸如网络分区将参与节点分成两半且无法达成多数的情况下打破平局。\n\n优先级最高的节点将成为新的主节点。如果您有多个优先级相同的节点，则可以使用数据的新鲜度来打破平局。\n\
    \n主节点使用心跳来跟踪有多少节点对它可见。如果可见节点数量低于多数，主节点会自动回退到 secondary 状态。这种情况可防止主节点在网络分区隔离时继续运行。\n"
- fmt: '### 7.4.2.6 回滚


    在主节点变更的场景中，新主节点上的数据被假定为系统中最新的数据。当旧的主节点重新加入时，其上发生的任何操作都将被回滚。然后，它将与新主节点进行同步。


    回滚操作会撤销所有未在副本集中复制的写操作。这样做是为了维护副本集中数据库的一致性。


    当连接到新主节点时，所有节点都会经历一个重新同步的过程以确保回滚完成。节点会查找在新主节点上不存在的操作，然后查询新主节点以返回受这些操作影响的文档的最新副本。节点处于重新同步过程中，被称为正在恢复；在此过程完成之前，它们不具备参与主节点选举的资格。


    这种情况很少发生，如果发生，通常是由于存在复制滞后的网络分区，导致从节点无法跟上旧主节点上的操作吞吐量。


    需要注意的是，如果写操作在主节点下台之前已经复制到其他成员，并且这些成员可以被副本集中的大多数节点访问，则不会发生回滚。


    回滚数据会被写入一个[BSON](http://docs.mongodb.org/manual/reference/glossary/#term-bson)文件，文件名格式如`<database>.<collection>.<timestamp>.bson`，存放在数据库的[`dbpath`](http://docs.mongodb.org/manual/reference/configuration-options/#dbpath%23dbpath)目录中。


    管理员可以决定忽略或应用回滚数据。应用回滚数据只能在所有节点与新主节点同步并回滚到一致状态后开始。


    可以使用`Bsondump`读取回滚文件的内容，然后需要使用`mongorestore`手动应用到新主节点上。


    对于MongoDB，没有自动处理回滚情况的方法。因此，需要手动干预来应用回滚数据。在应用回滚时，至关重要的是确保这些数据被复制到所有或至少部分成员中，以便在发生任何故障转移时可以避免回滚。


    ### 7.4.2.7 一致性


    你已经看到副本集成员通过读取`oplog`不断在彼此之间复制数据。数据的一致性是如何维护的呢？在本节中，你将了解MongoDB如何确保你始终能访问到一致的数据。


    在MongoDB中，虽然读操作可以被路由到从节点，但写操作总是被路由到主节点，这消除了两个节点同时尝试更新同一数据集的情况。主节点上的数据集始终是一致的。


    如果读请求被路由到主节点，它将始终看到最新的更改，这意味着读操作总是与最后的写操作保持一致。


    但是，如果应用程序更改了读取偏好以从从节点读取，则用户有可能看不到最新的更改或看到之前的状态。这是因为写操作在从节点上是异步复制的。


    这种行为被描述为最终一致性，这意味着尽管从节点的状态与主节点状态不一致，但随着时间的推移，它最终会变得一致。


    没有办法保证从从节点的读取是一致的，除非通过发出写关注点来确保写操作在所有成员上成功后，操作才被实际标记为成功。我们稍后将讨论写关注点。


    ### 7.4.2.8 可能的复制部署架构


    你选择部署副本集的架构会影响其能力和容量。在本节中，你将了解在决定架构时需要意识到的几个策略。我们还将讨论部署架构。


    **奇数个成员**：这样做是为了确保选举主节点时不会出现平票。如果节点数是偶数，则可以使用一个仲裁器来确保参与选举的总节点数为奇数，如图[7-6](#A332296_1_En_7_Chapter.html#Fig6)所示。


    ![A332296_1_En_7_Fig6_HTML.jpg](A332296_1_En_7_Fig6_HTML.jpg)


    **图7-6. 包含主节点、从节点和仲裁器的成员副本集**


    副本集容错能力是指即使有指定数量的成员宕机，副本集仍有足够成员可以选举出主节点。表[7-1](#A332296_1_En_7_Chapter.html#Tab1)说明了副本集中成员数量与其容错能力之间的关系。在决定成员数量时应考虑容错能力。


    **表7-1. 副本集容错能力**


    | 成员数量 | 选举主节点所需的多数 | 容错能力 |

    | :--- | :--- | :--- |

    | 3 | 2 | 1 |

    | 4 | 3 | 1 |

    | 5 | 3 | 2 |

    | 6 | 4 | 2 |


    如果应用程序有特定的专用需求，例如报告或备份，则可以考虑将延迟成员或隐藏成员作为副本集的一部分，如图[7-7](#A332296_1_En_7_Chapter.html#Fig7)所示。


    ![A332296_1_En_7_Fig7_HTML.jpg](A332296_1_En_7_Fig7_HTML.jpg)


    **图7-7. 包含主节点、从节点和隐藏成员的成员副本集**


    如果应用程序读操作密集，读请求可以分布在多个从节点上。随着需求增加，可以添加更多节点以增加数据副本；这对提高读取吞吐量有积极影响。


    成员应进行地理分布，以应对主数据中心故障。如图[7-8](#A332296_1_En_7_Chapter.html#Fig8)所示，那些位于主数据中心之外不同地理位置的成员，其优先级可以设置为0，这样它们就不能被选为主节点，只能作为备用节点。


    ![A332296_1_En_7_Fig8_HTML.jpg](A332296_1_En_7_Fig8_HTML.jpg)


    **图7-8. 包含主节点、从节点和一个跨数据中心分布的优先级为0成员的成员副本集**


    当副本集成员分布在不同数据中心时，网络分区可能导致数据中心之间无法通信。为了确保在网络分区情况下仍能形成多数，它会将大多数成员保持在一个位置。'
  raw: '#### 7.4.2.6 Rollbacks


    In scenario of a primary node change, the data on the new primary is assumed to
    be the latest data in the system. When the former primary joins back, any operation
    that is applied on it will also be rolled back. Then it will be synced with the
    new primary.


    The rollback operation reverts all the write operations that were not replicated
    across the replica set. This is done in order to maintain database consistency
    across the replica set.


    When connecting to the new primary, all nodes go through a resync process to ensure
    the rollback is accomplished. The nodes look through the operation that is not
    there on the new primary, and then they query the new primary to return an updated
    copy of the documents that were affected by the operations. The nodes are in the
    process of resyncing and are said to be recovering; until the process is complete,
    they will not be eligible for primary election.


    This happens very rarely, and if it happens, it is often due to network partition
    with replication lag where the secondaries cannot keep up with the operation’s
    throughput on the former primary.


    It needs to be noted that if the write operations replicate to other members before
    the primary steps down, and those members are accessible to majority of the nodes
    of the replica set, the rollback does not occur.


    The rollback data is written to a [BSON](http://docs.mongodb.org/manual/reference/glossary/#term-bson)
    file with filenames such as `<database>.<collection>.<timestamp>.bson` in the
    database’s [`dbpath`](http://docs.mongodb.org/manual/reference/configuration-options/#dbpath%23dbpath)
    directory.


    The administrator can decide to either ignore or apply the rollback data. Applying
    the rollback data can only begin when all the nodes are in sync with the new primary
    and have rolled back to a consistent state.


    The content of the rollback files can be read using `Bsondump`, which then need
    to be manually applied to the new primary using mongorestore.


    There is no method to handle rollback situations automatically for MongoDB. Therefore
    manual intervention is required to apply rollback data. While applying the rollback,
    it’s vital to ensure that these are replicated to either all or at least some
    of the members in the set so that in case of any failover rollbacks can be avoided.


    #### 7.4.2.7 Consistency


    You have seen that the replica set members keep on replicating data among each
    other by reading the oplog. How is the consistency of data maintained? In this
    section, you will look at how MongoDB ensures that you always access consistent
    data.


    In MongoDB, although the reads can be routed to the secondaries, the writes are
    always routed to the primary, eradicating the scenario where two nodes are simultaneously
    trying to update the same data set. The data set on the primary node is always
    consistent.


    If the read requests are routed to the primary node, it will always see the up-to-date
    changes, which means the read operations are always consistent with the last write
    operations.


    However, if the application has changed the read preference to read from secondaries,
    there might be a probability of user not seeing the latest changes or seeing previous
    states. This is because the writes are replicated asynchronously on the secondaries.


    This behavior is characterized as eventual consistency, which means that although
    the secondary’s state is not consistent with the primary node state, it will eventually
    become consistent over time.


    There is no way that reads from the secondary can be guaranteed to be consistent,
    except by issuing write concerns to ensure that writes succeed on all members
    before the operation is actually marked successful. We will be discussing write
    concerns in a while.


    #### 7.4.2.8 Possible Replication Deployment


    The architecture you chose to deploy a replica set affects its capability and
    capacity. In this section, you will look at few strategies that you need to be
    aware of while deciding on the architecture. We will also be discussing the deployment
    architecture .


    Odd number of members: This should be done in order to ensure that there is no
    tie when electing a primary. If the number of nodes is even, then an arbiter can
    be used to ensure that the total nodes participating in election is odd, as shown
    in Figure [7-6](#A332296_1_En_7_Chapter.html#Fig6).


    ![A332296_1_En_7_Fig6_HTML.jpg](A332296_1_En_7_Fig6_HTML.jpg)


    Figure 7-6.


    Members replica set with primary, secondary, and arbiter   Replica set fault tolerance
    is the count of members, which can go down but still the replica set has enough
    members to elect a primary in case of any failure. Table [7-1](#A332296_1_En_7_Chapter.html#Tab1)
    indicates the relationship between the member count in the replica set and its
    fault tolerance. Fault tolerance should be considered when deciding on the number
    of members.


    Table 7-1.


    Replica Set Fault Tolerance


    | Number of Members | Majority Required for Electing a Primary | Fault Tolerance
    |

    | --- | --- | --- |

    | 3 | 2 | 1 |

    | 4 | 3 | 1 |

    | 5 | 3 | 2 |

    | 6 | 4 | 2 |


      If the application has specific dedicated requirements, such as for reporting
    or backups, then delayed or hidden members can be considered as part of the replica
    set, as shown in Figure [7-7](#A332296_1_En_7_Chapter.html#Fig7).


    ![A332296_1_En_7_Fig7_HTML.jpg](A332296_1_En_7_Fig7_HTML.jpg)


    Figure 7-7.


    Members replica set with primary, secondary, and hidden members   If the application
    is read-heavy, the read can be distributed across secondaries. As the requirement
    increases, more nodes can be added to increase the data duplication; this can
    have a positive impact on the read throughput.   The members should be distributed
    geographically in order to cater to main data center failure. As shown in Figure
    [7-8](#A332296_1_En_7_Chapter.html#Fig8), the members that are kept at a geographically
    different location other than the main data center can have priority set as 0,
    so that they cannot be elected as primary and can act as a standby only.


    ![A332296_1_En_7_Fig8_HTML.jpg](A332296_1_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    Members replica set with primary, secondary, and a priority 0 member distributed
    across the data center   When replica set members are distributed across data
    centers, network partitioning can prevent data centers from communicating with
    each other. In order to ensure a majority in the case of network partitioning,
    it keeps a majority of the members in one location.'
