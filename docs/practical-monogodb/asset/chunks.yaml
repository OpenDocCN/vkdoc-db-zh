    `2015-07-13T23:17:01.704-0700 I CONTROL [initandlisten] MongoDB starting : pid=3672
    port=27024 dbpath=C:\db1\shard1\data 64-bit host=ANOC9`


    `2015-07-13T23:17:01.704-0700 I NETWORK [initandlisten] waiting for connections
    on port 27024`


    All the servers relevant for the setup are up and running by the end of the above
    step. The next step is to add the shards information to the shard controller.


    The mongos appears as a complete MongoDB instance to the application in spite
    of actually not being a full instance. The mongo shell can be used to connect
    to the mongos to perform any operation on it.


    Open the mongos mongo console:


    `C:\>cd c:\practicalmongodb\bin`


    `c:\ practicalmongodb\bin>mongo localhost:27021`


    `MongoDB shell version: 3.0.4`


    `connecting to: localhost:27021/test`


    `mongos>`


    Switch to the `admin` database:


    `mongos> use admin`


    `switched to db admin`


    `mongos>`


    Add the shards information by running the following commands :


    `mongos> db.runCommand({addshard:"localhost:27023",allowLocal:true})`


    `{ "shardAdded" : "shard0000", "ok" : 1 }`


    `mongos> db.runCommand({addshard:"localhost:27024",allowLocal:true})`


    `{ "shardAdded" : "shard0001", "ok" : 1 }`


    `mongos>`


    This activates the two shard servers.


    The next command checks the shards:


    `mongos> db.runCommand({listshards:1})`


    `{`


    `"shards" : [`


    `{`


    `"_id" : "shard0000",`


    `"host" : "localhost:27023"`


    `}, {`


    `"_id" : "shard0001",`


    `"host" : "localhost:27024"`


    `}`


    `], "ok" : 1}`


    #### 7.5.5.2 Creating a Database and Shard Collection


    In order to continue further with the example, you will create a database named
    `testdb` and a collection named `testcollection`, which you will be sharding on
    the key `testkey`.


    Connect to the mongos console and issue the following command to get the database:


    `mongos> testdb=db.getSisterDB("testdb")`


    `testdb`


    Next, enabling sharding at database level for `testdb`:


    `mongos> db.runCommand({enableSharding system: "testdb"})`


    `{ "ok" : 1 }`


    `mongos>`


    Next, specify the collection that needs to be sharded and the key on which the
    collection will be sharded:


    `mongos> db.runCommand({shardcollection: "testdb.testcollection", key: {testkey:1}})`


    `{ "collectionsharded" : "testdb.testcollection", "ok" : 1 }`


    `mongos>`


    With the completion of the above steps you now have a sharded cluster set up with
    all components up and running. You have also created a database and enabled sharding
    on the collection.


    Next, import data into the collection so that you can check the data distribution
    on the shards.


    You will be using the import command to load data in the `testcollection`. Connect
    to a new terminal window and execute the following:


    `C:\>cd C:\practicalmongodb\bin`


    `C:\practicalmongodb\bin>mongoimport --host ANOC9 --port 27021 --db testdb --collection
    testcollection --type csv --file c:\mongoimport.csv –-headerline`


    `2015-07-13T23:17:39.101-0700 connected to: ANOC9:27021`


    `2015-07-13T23:17:42.298-0700 [##############..........] testdb.testcollection
    1.1 MB/1.9 MB (59.6%)`


    `2015-07-13T23:17:44.781-0700 imported 100000 documents`


    The `mongoimport.csv` consists of two fields. The first is the `testkey`, which
    is a randomly generated number. The second field is a text field; it is used to
    ensure that the documents occupy a sufficient number of chunks, making it feasible
    to use the sharding mechanism.


    This inserts 100,000 objects in the collection.


    In order to vet whether the records are inserted or not, connect to the mongo
    console of the mongos and issue the following command:


    `C:\Windows\system32>cd c:\practicalmongodb\bin`


    `c:\practicalmongodb\bin>mongo localhost:27021`


    `MongoDB shell version: 3.0.4`


    `connecting to: localhost:27021/test`


    `mongos> use testdb`


    `switched to db testdb`


    `mongos> db.testcollection.count()`


    `100000`


    `mongos>`


    Next, connect to the consoles of the two shards (Shard0 and Shard1) and look at
    how the data is distributed. Open a new terminal window and connect to Shard0’s
    console:


    `C:\>cd C:\practicalmongodb\bin`


    `C:\ practicalmongodb\bin>mongo localhost:27023`


    `MongoDB shell version: 3.0.4`


    `connecting to: localhost:27023/test`


    Switch to `testdb` and issue the `count()` command to check number of documents
    on the shard:


    `> use testdb`


    `switched to db testdb`


    `> db.testcollection.count()`


    `57998`


    Next, open a new terminal window, connect to Shard1’s console, and follow the
    steps as above (i.e. switch to `testdb` and check the count of `testcollection`
    collection):


    `C:\>cd c:\practicalmongodb\bin`


    `c:\practicalmongodb\bin>mongo localhost:27024`


    `MongoDB shell version: 3.0.4`


    `connecting to: localhost:27024/test`


    `> use testdb`


    `switched to db testdb`


    `> db.testcollection.count()`


    `42002`


    `>`


    You might see a difference in the document’s number in each shard when you run
    the above command for some time. When the documents are loaded, all of the chunks
    are placed on one shard by the mongos. In time the shard set is rebalanced by
    distributing the chunks evenly across all the shards.'
  trans: '

    ## 7.5.5.1 设置分片集群


    要设置集群，第一步是设置配置服务器。在新的终端窗口中输入以下代码，为配置服务器创建 `data` 目录并启动 `mongod`：


    ```

    C:\> mkdir C:\db1\config\data


    C:\>CD C:\practicalmongodb\bin


    C:\ practicalmongodb\bin>mongod --port 27022 --dbpath C:\db1\config\data --configsvr


    2015-07-13T23:02:41.982-0700 I JOURNAL [journal writer] Journal writer thread
    started


    2015-07-13T23:02:41.984-0700 I CONTROL [initandlisten] MongoDB starting : pid=3084
    port=27022 dbpath=C:\db1\config\data master=1 64-bit host=ANOC9


    ......................................


    2015-07-13T23:02:42.066-0700 I REPL [initandlisten] ******


    2015-07-13T03:02:42.067-0700 I NETWORK [initandlisten] waiting for connections
    on port 27022

    ```


    接下来，启动 `mongos`。在新的终端窗口中输入：


    ```

    C:\>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongos --configdb localhost:27022 --port 27021 --chunkSize
    1


    2015-07-13T23:06:07.246-0700 W SHARDING running with 1 config server should be
    done only for testing purposes and is not recommended for production


    ...............................................................


    2015-07-13T23:09:07.464-0700 I SHARDING [Balancer] distributed lock ''balancer/
    ANOC9:27021:1429783567:41'' unlocked

    ```


    现在，分片控制器（即 `mongos`）已启动并运行。


    如果切换到启动了配置服务器的窗口，你会发现分片服务器已注册到配置服务器。


    在此示例中，你使用了 1MB 的块大小。请注意，在真实场景中这并不理想，因为它小于 4MB（文档的最大大小）。然而，这仅用于演示目的，因为它无需加载大量数据就能创建必要数量的块。除非另有指定，`chunkSize`
    默认为 128MB。


    接下来，启动分片服务器 Shard0 和 Shard1。


    打开一个新的终端窗口。为第一个分片创建 `data` 目录并启动 `mongod`：


    ```

    C:\>mkdir C:\db1\shard0\data


    C:\>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongod --port 27023 --dbpath c:\db1\shard0\data –shardsvr


    2015-07-13T23:14:58.076-0700 I CONTROL [initandlisten] MongoDB starting : pid=1996
    port=27023 dbpath=c:\db1\shard0\data 64-bit host=ANOC9


    ..................................................................


    2015-07-13T23:14:58.158-0700 I NETWORK [initandlisten] waiting for connections
    on port 27023

    ```


    打开一个新的终端窗口。为第二个分片创建 `data` 目录并启动 `mongod`：


    ```

    C:\>mkdir c:\db1\shard1\data


    C:\>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongod --port 27024 --dbpath C:\db1\shard1\data --shardsvr


    2015-07-13T23:17:01.704-0700 I CONTROL [initandlisten] MongoDB starting : pid=3672
    port=27024 dbpath=C:\db1\shard1\data 64-bit host=ANOC9


    2015-07-13T23:17:01.704-0700 I NETWORK [initandlisten] waiting for connections
    on port 27024

    ```


    到以上步骤结束时，所有与设置相关的服务器都已启动并运行。下一步是将分片信息添加到分片控制器。


    尽管 `mongos` 实际上不是一个完整的实例，但它对应用程序而言表现为一个完整的 MongoDB 实例。可以使用 `mongo` shell 连接到 `mongos`
    来执行任何操作。


    打开 `mongos` 的 `mongo` 控制台：


    ```

    C:\>cd c:\practicalmongodb\bin


    c:\ practicalmongodb\bin>mongo localhost:27021


    MongoDB shell version: 3.0.4


    connecting to: localhost:27021/test


    mongos>

    ```


    切换到 `admin` 数据库：


    ```

    mongos> use admin


    switched to db admin


    mongos>

    ```


    通过运行以下命令添加分片信息：


    ```

    mongos> db.runCommand({addshard:"localhost:27023",allowLocal:true})


    { "shardAdded" : "shard0000", "ok" : 1 }


    mongos> db.runCommand({addshard:"localhost:27024",allowLocal:true})


    { "shardAdded" : "shard0001", "ok" : 1 }


    mongos>

    ```


    这会激活两个分片服务器。


    下一个命令检查分片：


    ```

    mongos> db.runCommand({listshards:1})


    {


    "shards" : [


    {


    "_id" : "shard0000",


    "host" : "localhost:27023"


    }, {


    "_id" : "shard0001",


    "host" : "localhost:27024"


    }


    ], "ok" : 1}

    ```


    ## 7.5.5.2 创建数据库和分片集合


    为了继续此示例，你将创建一个名为 `testdb` 的数据库和一个名为 `testcollection` 的集合，并将基于键 `testkey` 对其进行分片。


    连接到 `mongos` 控制台并执行以下命令以获取数据库：


    ```

    mongos> testdb=db.getSisterDB("testdb")


    testdb

    ```


    接下来，为 `testdb` 在数据库级别启用分片：


    ```

    mongos> db.runCommand({enableSharding system: "testdb"})


    { "ok" : 1 }


    mongos>

    ```


    接下来，指定需要分片的集合以及该集合将基于哪个键进行分片：


    ```

    mongos> db.runCommand({shardcollection: "testdb.testcollection", key: {testkey:1}})


    { "collectionsharded" : "testdb.testcollection", "ok" : 1 }


    mongos>

    ```


    完成以上步骤后，你现在拥有一个所有组件都已启动并运行的分片集群。你已经创建了一个数据库并启用了集合分片。


    接下来，将数据导入集合，以便检查分片上的数据分布。


    你将使用 `import` 命令将数据加载到 `testcollection` 中。连接到一个新的终端窗口并执行：


    ```

    C:\>cd C:\practicalmongodb\bin


    C:\practicalmongodb\bin>mongoimport --host ANOC9 --port 27021 --db testdb --collection
    testcollection --type csv --file c:\mongoimport.csv –-headerline


    2015-07-13T23:17:39.101-0700 connected to: ANOC9:27021


    2015-07-13T23:17:42.298-0700 [##############..........] testdb.testcollection
    1.1 MB/1.9 MB (59.6%)


    2015-07-13T23:17:44.781-0700 imported 100000 documents

    ```


    `mongoimport.csv` 文件包含两个字段。第一个是 `testkey`，它是一个随机生成的数字。第二个字段是文本字段；它用于确保文档占据足够数量的块，从而使使用分片机制变得可行。


    这会在集合中插入 100,000 个对象。


    为了验证记录是否已插入，连接到 `mongos` 的 `mongo` 控制台并发出以下命令：


    ```

    C:\Windows\system32>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongo localhost:27021


    MongoDB shell version: 3.0.4


    connecting to: localhost:27021/test


    mongos> use testdb


    switched to db testdb


    mongos> db.testcollection.count()


    100000


    mongos>

    ```


    接下来，连接到两个分片（Shard0 和 Shard1）的控制台，并查看数据是如何分布的。打开一个新的终端窗口并连接到 Shard0 的控制台：


    ```

    C:\>cd C:\practicalmongodb\bin


    C:\ practicalmongodb\bin>mongo localhost:27023


    MongoDB shell version: 3.0.4


    connecting to: localhost:27023/test

    ```


    切换到 `testdb` 并发出 `count()` 命令以检查该分片上的文档数量：


    ```

    > use testdb


    switched to db testdb


    > db.testcollection.count()


    57998

    ```


    接下来，打开一个新的终端窗口，连接到 Shard1 的控制台，并按照上述步骤操作（即切换到 `testdb` 并检查 `testcollection` 集合的计数）：


    ```

    C:\>cd c:\practicalmongodb\bin


    c:\practicalmongodb\bin>mongo localhost:27024


    MongoDB shell version: 3.0.4


    connecting to: localhost:27024/test


    > use testdb


    switched to db testdb


    > db.testcollection.count()


    42002


    >

    ```


    当你运行上述命令一段时间后，可能会看到每个分片上的文档数量存在差异。当文档加载时，所有块都由 `mongos` 放置在一个分片上。随后，通过将块均匀地分布在所有分片上来重新平衡分片集。

    '
- fmt: '#### 7.5.5.3 Adding a New Shard


    You have a sharded cluster set up and you also have sharded a collection and looked
    at how the data is distributed amongst the shards. Next, you’ll add a new shard
    to the cluster so that the load is spread out a little more.


    You will be repeating the steps mentioned above. Begin by creating a data directory
    for the new shard in a new terminal window:


    ```

    c:\>mkdir c:\db1\shard2\data

    ```


    Next, start the `mongod` at port 27025:


    ```

    c:\>cd c:\practicalmongodb\bin

    c:\ practicalmongodb\bin>mongod --port 27025 --dbpath C:\db1\shard2\data --shardsvr

    ```


    ```

    2015-07-13T23:25:49.103-0700 I CONTROL [initandlisten] MongoDB starting : pid=3744
    port=27025 dbpath=C:\db1\shard2\data 64-bit host=ANOC9

    ................................

    2015-07-13T23:25:49.183-0700 I NETWORK [initandlisten] waiting for connections
    on port 27025

    ```


    Next, the new shard server will be added to the shard cluster. In order to configure
    it, open the `mongos` mongo console in a new terminal window:


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo localhost:27021

    MongoDB shell version: 3.0.4

    connecting to: localhost:27021/test

    mongos>

    ```


    Switch to the `admin` database and run the `addshard` command. This command adds
    the shard server to the sharded cluster.


    ```

    mongos> use admin

    switched to db admin

    mongos> db.runCommand({addshard: "localhost:27025", allowlocal: true})

    { "shardAdded" : "shard0002", "ok" : 1 }

    mongos>

    ```


    In order to vet whether the addition is successful or not, run the `listshards`
    command:


    ```

    mongos> db.runCommand({listshards:1})

    {

    "shards" : [

    {

    "_id" : "shard0000",

    "host" : "localhost:27023"

    },

    {

    "_id" : "shard0001",

    "host" : "localhost:27024"

    },

    {

    "_id" : "shard0002",

    "host" : "localhost:27025"

    }

    ],

    "ok" : 1

    }

    ```


    Next, check how the `testcollection` data is distributed. Connect to the new shard’s
    console in a new terminal window:


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo localhost:27025

    MongoDB shell version: 3.0.4

    connecting to: localhost:27025/test

    ```


    Switch to `testdb` and check the collections listed on the shard:


    ```

    > use testdb

    switched to db testdb

    > show collections

    system.indexes

    testcollection

    ```


    Issue a `testcollection.count` command three times:


    ```

    > db.testcollection.count()

    6928

    > db.testcollection.count()

    12928

    > db.testcollection.count()

    16928

    ```


    Interestingly, the number of items in the collection is slowly going up. The `mongos`
    is rebalancing the cluster.


    With time, the chunks will be migrated from the shard servers Shard0 and Shard1
    to the newly added shard server, Shard2, so that the data is evenly distributed
    across all the servers. Post completion of this process the config server metadata
    is updated. This is an automatic process and it happens even if there’s no new
    data addition in the `testcollection`. This is one of the important factors you
    need to consider when deciding on the chunk size.


    If the value of `chunkSize` is very large, you will end up having less even data
    distribution. The data is more evenly distributed when the `chunkSize` is smaller.


    #### 7.5.5.4 Removing a Shard


    In the following example, you will see how to remove a shard server. For this
    example, you will be removing the server you added in the above example.


    In order to initiate the process, you need to log on to the `mongos` console,
    switch to the `admin` db, and execute the following command to remove the shard
    from the shard cluster:


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo localhost:27021

    MongoDB shell version: 3.0.4

    connecting to: localhost:27021/test

    mongos> use admin

    switched to db admin

    mongos> db.runCommand({removeShard: "localhost:27025"})

    {

    "msg" : "draining started successfully",

    "state" : "started",

    "shard" : "shard0002",

    "ok" : 1

    }

    mongos>

    ```


    As you can see, the `removeShard` command returns a message. One of the message
    fields is `state`, which indicates the process state. The message also states
    that the draining process has started. This is indicated by the field `msg`.


    You can reissue the `removeShard` command to check the progress:


    ```

    mongos> db.runCommand({removeShard: "localhost:27025"})

    {

    "msg" : "draining ongoing",

    "state" : "ongoing",

    "remaining" : {

    "chunks" : NumberLong(2),

    "dbs" : NumberLong(0)

    },

    "ok" : 1

    }

    mongos>

    ```


    The response tells you the number of chunks and databases that still need to be
    drained from the server. If you reissue the command and the process is terminated,
    the output of the command will depict the same.


    ```

    mongos> db.runCommand({removeShard: "localhost:27025"})

    {

    "msg" : "removeshard completed successfully",

    "state" : "completed",

    "shard" : "shard0002",

    "ok" : 1

    }

    mongos>

    ```


    You can use the `listshards` to vet whether `removeShard` was successful or not.


    As you can see, the data is successfully migrated to the other shards, so you
    can delete the storage files and terminate the Shard2 `mongod` process.


    This ability to modify the shard cluster without going offline is one of the critical
    components of MongoDB, which enables it to support highly available, highly scalable,
    large capacity data stores.


    #### 7.5.5.5 Listing the Sharded Cluster Status


    The `printShardingStatus()` command gives lots of insight into the sharding system
    internals.


    ```

    mongos> db.printShardingStatus()

    --- Sharding Status ---

    sharding version: {

    "_id" : 1,

    "version" : 3,

    "minCompatibleVersion" : 5,

    "currentVersion" : 6,

    "clusterId" : ObjectId("52fb7a8647e47c5884749a1a")

    }

    shards:

    { "_id" : "shard0000", "host" : "localhost:27023" }

    { "_id" : "shard0001", "host" : "localhost:27024" }

    balancer:

    Currently enabled: yes

    Currently running: no

    Failed balancer rounds in last 5 attempts: 0

    Migration Results for the last 24 hours:

    17 : Success

    databases:

    { "_id" : "admin", "partitioned" : false, "primary" : "config" }

    { "_id" : "testdb", "partitioned" : true, "primary" : "shard0000" }

    ...............

    ```


    The output lists the following:

    *   All of the shard servers of the shard cluster

    *   The configurations of each sharded database/collection

    *   All of the chunks of the sharded dataset


    Important information that can be obtained from the above command is the sharding
    keys range, which is associated with each chunk. This also shows where specific
    chunks are stored (on which shard server). The output can be used to analyse the
    shard server’s keys and chunks distribution.


    ### 7.5.6 Controlling Collection Distribution (Tag-Based Sharding)


    In the previous section, you saw how data distribution happens. In this section,
    you will learn about tag-based sharding. This feature was introduced in version
    2.2.0.


    Tagging gives operators control over which collections go to which shard.


    In order to understand tag-based sharding, let’s set up a sharded cluster. You
    will be using the shard cluster created above. For this example, you need three
    shards, so you will add Shard2 again to the cluster.'
