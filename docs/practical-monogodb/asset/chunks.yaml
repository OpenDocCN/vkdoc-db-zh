    在这种情况下，让我们看看启用日志记录后的写入。启用日志记录后，`mongod` 会进行第二次映射到一个**私有视图**。


    这就是为什么启用日志记录后，`mongod` 使用的虚拟内存量会加倍。见图 8-17。


    ![A332296_1_En_8_Fig17_HTML.jpg](img/A332296_1_En_8_Fig17_HTML.jpg)


    图 8-17. 映射到私有视图


    你可以在图 8-17 中看到数据文件如何不直接连接到私有视图，因此更改不会由操作系统从私有视图刷新到磁盘。


    让我们看看启动写操作时发生的事件序列。当启动写操作时，首先它写入私有视图（图 8-18）。


    ![A332296_1_En_8_Fig18_HTML.jpg](img/A332296_1_En_8_Fig18_HTML.jpg)


    图 8-18. 启动的写操作


    接下来，更改被写入日志文件，追加文件更改的简要描述（图 8-19）。


    ![A332296_1_En_8_Fig19_HTML.jpg](img/A332296_1_En_8_Fig19_HTML.jpg)


    图 8-19. 更新日志文件


    日志在收到更改时不断追加更改描述。如果此时 `mongod` 失败，即使数据文件尚未修改，日志也可以重放所有更改，从而使此时的写入安全。


    日志现在将在共享视图上重放记录的更改（图 8-20）。


    ![A332296_1_En_8_Fig20_HTML.jpg](img/A332296_1_En_8_Fig20_HTML.jpg)


    图 8-20. 更新共享视图


    最后，更改以非常快的速度写入磁盘。默认情况下，`mongod` 每 60 秒请求操作系统执行此操作（图 8-21）。


    ![A332296_1_En_8_Fig21_HTML.jpg](img/A332296_1_En_8_Fig21_HTML.jpg)


    图 8-21. 更新数据文件


    在最后一步中，`mongod` 将共享视图重新映射到私有视图。这样做是为了防止私有视图变得过于“脏”（图 8-22）。


    ![A332296_1_En_8_Fig22_HTML.jpg](img/A332296_1_En_8_Fig22_HTML.jpg)


    图 8-22. 重新映射


    ## 8.6 GridFS – MongoDB 文件系统


    你已经了解了底层机制。你看到 `MongoDB` 将数据存储在 `BSON` 文档中。`BSON` 文档有 16MB 的文档大小限制。


    `GridFS` 是 `MongoDB` 用于处理超出 `BSON` 文档大小限制的大文件的规范。本节将简要介绍 `GridFS`。


    这里的“规范”意味着它本身并不是 `MongoDB` 的一个特性，因此 `MongoDB` 中没有实现它的代码。它只是规定了应如何处理大文件。`PHP`、`Python`
    等语言驱动程序实现了这个规范，并向该驱动程序的用户公开一个 `API`，使他们能够在 `MongoDB` 中存储/检索大文件。'
- fmt: "### 8.6.1 The Rationale of GridFS\n\nBy design, a MongoDB document (i.e. a\
    \ BSON object) cannot be larger than 16MB. This is to keep performance at an optimum\
    \ level, and the size is well suited for our needs. For example, 4MB of space\
    \ might be sufficient for storing a sound clip or a profile picture. However,\
    \ if the requirement is to store high quality audio or movie clips, or even files\
    \ that are more than several hundred megabytes in size, MongoDB has you covered\
    \ by using GridFS.\n\nGridFS specifies a mechanism for dividing a large file among\
    \ multiple documents. The language driver that implements it, for example, the\
    \ PHP driver, takes care of the splitting of the stored files (or merging the\
    \ split chunks when files are to be retrieved) under the hood. The developer using\
    \ the driver does not need to know of such internal details. This way GridFS allows\
    \ the developer to store and manipulate files in a transparent and efficient way.\n\
    \nGridFS uses two collections for storing the file. One collection maintains the\
    \ metadata of the file and the other collection stores the file’s data by breaking\
    \ it into small pieces called chunks. This means the file is divided into smaller\
    \ chunks and each chunk is stored as a separate document. By default the chunk\
    \ size is limited to 255KB.\n\nThis approach not only makes the storing of data\
    \ scalable and easy but also makes the range queries easier to use when a specific\
    \ part of files are retrieved.\n\nWhenever a file is queried in GridFS, the chunks\
    \ are reassembled as required by the client. This also provides the user with\
    \ the capability to access arbitrary sections of the files. For example, the user\
    \ can directly move to the middle of a video file.\n\nThe GridFS specification\
    \ is useful in cases where the file size exceeds the default 16MB limitation of\
    \ MongoDB BSON document. It’s also used for storing files that you need to access\
    \ without loading the entire file in memory.\n\n### 8.6.2 GridFS under the Hood\n\
    \nGridFS is a lightweight specification used for storing files.\n\nThere’s no\
    \ “special case” handling done at the MongoDB server for the GridFS requests.\
    \ All the work is done at the client side.\n\nGridFS enables you to store large\
    \ files by splitting them up into smaller chunks and storing each of the chunks\
    \ as separate documents. In addition to these chunks, there’s one more document\
    \ that contains the metadata about the file. Using this metadata information,\
    \ the chunks are grouped together, forming the complete file.\n\nThe storage overhead\
    \ for the chunks can be kept to a minimum, as MongoDB supports storing binary\
    \ data in documents.\n\nThe two collections that are used by GridFS for storing\
    \ of large files are by default named as `fs.files` and `fs.chunks`, although\
    \ a different bucket name can be chosen than `fs`.\n\nThe chunks are stored by\
    \ default in the `fs.chunks` collection. If required, this can be overridden.\
    \ Hence all of the data is contained in the `fs.chunks` collection.\n\nThe structure\
    \ of the individual documents in the chunks collection is pretty simple:\n\n```json\n\
    {\n  \"_id\" : ObjectId(\"...\"),\n  \"n\" : 0,\n  \"data\" : BinData(\"...\"\
    ),\n  \"files_id\" : ObjectId(\"...\")\n}\n```\n\nThe chunk document has the following\
    \ important keys.\n\n*   `\"_id\"`: This is the unique identifier.\n*   `\"files_id\"\
    `: This is unique identifier of the document that contains the metadata related\
    \ to the chunk.\n*   `\"n\"`: This is basically depicting the position of the\
    \ chunk in the original file.\n*   `\"data\"`: This is the actual binary data\
    \ that constitutes this chunk.\n\nThe `fs.files` collection stores the metadata\
    \ for each file. Each document within this collection represents a single file\
    \ in GridFS. In addition to the general metadata information, each document of\
    \ the collection can contain custom metadata specific to the file it’s representing.\n\
    \nThe following are the keys that are mandated by the GridFS specification :\n\
    \n*   `_id`: This is the unique identifier of the file.\n*   `length`: This depicts\
    \ the total bytes that make up the complete content of the file.\n*   `chunkSize`:\
    \ This is the file’s chunk size, in bytes. By default it’s 255KB, but if needed\
    \ this can be adjusted.\n*   `uploadDate`: This is the timestamp when the file\
    \ was stored in GridFS.\n*   `md5`: This is generated on the server side and is\
    \ the md5 checksum of the files contents. MongoDB server generates its value by\
    \ using the `filemd5` command, which computes the md5 checksum of the uploaded\
    \ chunks. This implies that the user can check this value to ensure that the file\
    \ is uploaded correctly.\n\nA typical `fs.files` document looks as follows (see\
    \ also Figure 8-23):\n\n![A332296_1_En_8_Fig23_HTML.jpg](A332296_1_En_8_Fig23_HTML.jpg)\n\
    \nFigure 8-23.\n\nGridFS\n\n```json\n{\n  \"_id\" : ObjectId(\"...\"),\n  \"length\"\
    \ : data_number,\n  \"chunkSize\" : data_number,\n  \"uploadDate\" : data_date,\n\
    \  \"md5\" : data_string\n}\n```\n\n### 8.6.3 Using GridFS\n\nIn this section,\
    \ you will be using the PyMongo driver to see how you can start using GridFS.\n\
    \n#### Add Reference to the Filesystem\n\nThe first thing that is needed is a\
    \ reference to the GridFS filesystem :\n\n```python\n>>> import pymongo\n>>> import\
    \ gridfs\n>>> myconn = pymongo.Connection()\n>>> mydb = myconn.gridfstest\n>>>\
    \ myfs = gridfs.GridFS(db)\n```\n\n#### write( )\n\nNext you will execute a basic\
    \ write:\n\n```python\n>>> with myfs.new_file() as myfp:\n...     myfp.write('This\
    \ is my new sample file. It is just grand!')\n```\n\n#### find( )\n\nUsing the\
    \ mongo shell let’s see what the underlying collections holds:\n\n```python\n\
    >>> list(mydb.myfs.files.find())\n[{u'length': 38, u'_id': ObjectId('52fdd6189cd2fd08288d5f5c'),\
    \ u'uploadDate': datetime.datetime(2014, 11, 4, 4, 20, 41, 800000), u'md5': u'332de5ca08b73218a8777da69293576a',\
    \ u'chunkSize': 262144}]\n>>> list(mydb.myfs.chunks.find())\n[{u'files_id': ObjectId('52fdd6189cd2fd08288d5f5c'),\
    \ u'_id': ObjectId('52fdd6189cd2fd08288d5f5d'), u'data': Binary('This is my new\
    \ sample file. It is just grand!', 0), u'n': 0}]\n```\n\n#### Force Split the\
    \ File\n\nLet’s force split the file. This is done by specifying a small `chunkSize`\
    \ while file creation, like so:\n\n```python\n>>> with myfs.new_file(chunkSize=10)\
    \ as myfp:\n...     myfp.write('This is second file. I am assuming it will be\
    \ split into various chunks')\n...\n>>> myfp\n<gridfs.grid_file.GridIn object\
    \ at 0x0000000002AC79B0>\n>>> myfp._id\nObjectId('52fdd76e9cd2fd08288d5f5e')\n\
    >>> list(mydb.myfs.chunks.find(dict(files_id=myfp._id)))\n.............\nObjectId('52fdd76e9cd2fd08288d5f65'),\
    \ u'data': Binary('s', 0), u'n': 6}]\n```\n\n#### read( )\n\nYou now know how\
    \ the file is actually stored in the database. Next, using the client driver,\
    \ you will now read the file:\n\n```python\n>>> with myfs.get(myfp._id) as myfp_read:\n\
    ...     print myfp_read.read()\n...\n\"This is second file. I am assuming it will\
    \ be split into various chunks.\"\n```\n\nThe user need not be aware of the chunks\
    \ at all. You need to use the APIs exposed by the client to read and write files\
    \ from GridFS."
  raw: '### 8.6.1 The Rationale of GridFS


    By design, a MongoDB document (i.e. a BSON object) cannot be larger than 16MB.
    This is to keep performance at an optimum level, and the size is well suited for
    our needs. For example, 4MB of space might be sufficient for storing a sound clip
    or a profile picture. However, if the requirement is to store high quality audio
    or movie clips, or even files that are more than several hundred megabytes in
    size, MongoDB has you covered by using GridFS.


    GridFS specifies a mechanism for dividing a large file among multiple documents.
    The language driver that implements it, for example, the PHP driver, takes care
    of the splitting of the stored files (or merging the split chunks when files are
    to be retrieved) under the hood. The developer using the driver does not need
    to know of such internal details. This way GridFS allows the developer to store
    and manipulate files in a transparent and efficient way .


    GridFS uses two collections for storing the file. One collection maintains the
    metadata of the file and the other collection stores the file’s data by breaking
    it into small pieces called chunks. This means the file is divided into smaller
    chunks and each chunk is stored as a separate document. By default the chunk size
    is limited to 255KB.


    This approach not only makes the storing of data scalable and easy but also makes
    the range queries easier to use when a specific part of files are retrieved.


    Whenver a file is queried in GridFS, the chunks are reassembled as required by
    the client. This also provides the user with the capability to access arbitrary
    sections of the files. For example, the user can directly move to the middle of
    a video file.


    The GridFS specification is useful in cases where the file size exceeds the default
    16MB limitation of MongoDB BSON document. It’s also used for storing files that
    you need to access without loading the entire file in memory.


    ### 8.6.2 GridFSunder the Hood


    GridFS is a lightweight specification used for storing files.


    There’s no “special case” handling done at the MongoDB server for the GridFS requests.
    All the work is done at the client side.


    GridFS enables you to store large files by splitting them up into smaller chunks
    and storing each of the chunks as separate documents. In addition to these chunks,
    there’s one more document that contains the metadata about the file. Using this
    metadata information, the chunks are grouped together, forming the complete file.


    The storage overhead for the chunks can be kept to a minimum, as MongoDB supports
    storing binary data in documents.


    The two collections that are used by GridFS for storing of large files are by
    default named as `fs.files` and `fs.chunks`, although a different bucket name
    can be chosen than `fs`.


    The chunks are stored by default in the `fs.chunks` collection. If required, this
    can be overridden. Hence all of the data is contained in the `fs.chunks` collection.


    The structure of the individual documents in the chunks collection is pretty simple:


    `{`


    `"_id" : ObjectId("..."),"n" : 0,"data" : BinData("..."),`


    `"files_id" : ObjectId("...")`


    `}`


    The chunk document has the following important keys.


    *   `"_id"`: This is the unique identifier.

    *   `"files_id"`: This is unique identifier of the document that contains the
    metadata related to the chunk.

    *   `"n"`: This is basically depicting the position of the chunk in the original
    file.

    *   `"data"`: This is the actual binary data that constitutes this chunk.


    The `fs.files` collection stores the metadata for each file. Each document within
    this collection represents a single file in GridFS. In addition to the general
    metadata information, each document of the collection can contain custom metadata
    specific to the file it’s representing.


    The following are the keys that are mandated by the GridFS specification :


    *   `_id`: This is the unique identifier of the file.

    *   `Length`: This depicts the total bytes that make up the complete content of
    the file.

    *   `chunkSize`: This is the file’s chunk size, in bytes. By default it’s 255KB,
    but if needed this can be adjusted.

    *   `uploadDate`: This is the timestamp when the file was stored in GridFS.

    *   `md5`: This is generated on the server side and is the md5 checksum of the
    files contents. MongoDB server generates its value by using the `filemd5` command,
    which computes the md5 checksum of the uploaded chunks. This implies that the
    user can check this value to ensure that the file is uploaded correctly.


    A typical `fs.files` document looks as follows (see also Figure [8-23](#A332296_1_En_8_Chapter.html#Fig23))
    :


    ![A332296_1_En_8_Fig23_HTML.jpg](A332296_1_En_8_Fig23_HTML.jpg)


    Figure 8-23.


    GridFS


    `{`


    `"_id" : ObjectId("..."), "length" : data_number,`


    `"chunkSize" : data_number,`


    `"uploadDate" : data_date,`


    `"md5" : data_string`


    `}`


    ### 8.6.3 Using GridFS


    In this section, you will be using the PyMongo driver to see how you can start
    using GridFS.


    Add Reference to the Filesystem


    The first thing that is needed is a reference to the GridFS filesystem :


    `>>> import pymongo`


    `>>> import gridfs`


    `>>>myconn=pymongo.Connection()`


    `>>>mydb=myconn.gridfstest`


    `>>>myfs=gridfs.GridFS(db)`


    write(  )


    Next you will execute a basic write:


    `>>> with myfs.new_file() as myfp:`


    `myfp.write(''This is my new sample file. It is just grand!'')`


    find(  )


    Using the mongo shell let’s see what the underlying collections holds:


    `>>> list(mydb.myfs.files.find())`


    `[{u''length'': 38, u''_id'': ObjectId(''52fdd6189cd2fd08288d5f5c''), u''uploadDate'':
    datetime.datetime(2014, 11, 04, 4, 20, 41, 800000), u''md5'': u''332de5ca08b73218a8777da69293576a'',
    u''chunkSize'': 262144}]`


    `>>> list(mydb.myfs.chunks.find())`


    `[{u''files_id'': ObjectId(''52fdd6189cd2fd08288d5f5c''), u''_id'': ObjectId(''52fdd6189cd2fd08288d5f5d''),
    u''data'': Binary(''This is my new sample file. It is just grand!'', 0), u''n'':
    0}]`


    Force Split the File


    Let’s force split the file. This is done by specifying a small chunkSize while
    file creation, like so:


    `>>> with myfs.new_file(chunkSize=10) as myfp:`


    `myfp.write(''This is second file. I am assuming it will be split into various
    chunks'')`


    `>>>`


    `>>>myfp`


    `<gridfs.grid_file.GridIn object at 0x0000000002AC79B0>`


    `>>>myfp._id`


    `ObjectId(''52fdd76e9cd2fd08288d5f5e'')`


    `>>> list(mydb.myfs.chunks.find(dict(files_id=myfp._id)))`


    `.................`


    `ObjectId(''52fdd76e9cd2fd08288d5f65''), u''data'': Binary(''s'', 0), u''n'':
    6}]`


    read(  )


    You now know how the file is actually stored in the database. Next, using the
    client driver, you will now read the file:


    `>>> with myfs.get(myfp._id) as myfp_read:`


    `print myfp_read.read()`


    “This is second file. I am assuming it will be split into various chunks.”


    The user need not be aware of the chunks at all. You need to use the APIs exposed
    by the client to read and write files from GridFS.'
  trans: "\n### 8.6.1 GridFS 的设计原理\n\n根据设计，一个 MongoDB 文档（即 BSON 对象）不能大于 16MB。这样做是为了保持最佳性能，而且这个大小也完全满足我们的需求。例如，4MB\
    \ 的空间可能足以存储一段音频剪辑或一张个人资料图片。然而，如果需求是存储高质量的音频或视频剪辑，甚至是大于几百兆字节的文件，MongoDB 通过使用 GridFS\
    \ 为你提供了保障。\n\nGridFS 规定了一种将大文件分割存储到多个文档中的机制。实现它的语言驱动程序（例如 PHP 驱动程序）会在底层负责存储文件的分割（或在检索文件时合并被分割的块）。使用该驱动程序的开发人员无需了解这些内部细节。这样，GridFS\
    \ 允许开发人员以一种透明且高效的方式存储和操作文件。\n\nGridFS 使用两个集合来存储文件。一个集合维护文件的元数据，另一个集合则通过将文件数据分割成称为“块”的小片段来存储文件数据。这意味着文件被分割成更小的块，每个块作为一个独立的文档存储。默认情况下，块的大小限制为\
    \ 255KB。\n\n这种方法不仅使数据存储具有可扩展性且易于管理，而且在检索文件的特定部分时，也使得范围查询更易于使用。\n\n在 GridFS 中查询文件时，会根据客户端的需要重新组装块。这也为用户提供了访问文件任意部分的能力。例如，用户可以直接跳到视频文件的中间位置。\n\
    \nGridFS 规范在文件大小超过 MongoDB BSON 文档默认的 16MB 限制时非常有用。它也用于存储那些你无需将整个文件加载到内存中就需要访问的文件。\n\
    \n### 8.6.2 GridFS 的内部机制\n\nGridFS 是一个用于存储文件的轻量级规范。\n\nMongoDB 服务器端并不会对 GridFS\
    \ 请求进行“特殊处理”。所有工作都是在客户端完成的。\n\nGridFS 使你能够通过将大文件分割成更小的块，并将每个块作为独立文档存储的方式来存储大文件。除了这些块之外，还有一个包含文件元数据的文档。利用这些元数据信息，这些块被组合在一起，形成完整的文件。\n\
    \n由于 MongoDB 支持在文档中存储二进制数据，因此块的存储开销可以保持在最低水平。\n\nGridFS 用于存储大文件的两个集合默认命名为 `fs.files`\
    \ 和 `fs.chunks`，尽管你可以选择一个不同于 `fs` 的桶名称。\n\n块默认存储在 `fs.chunks` 集合中。如果需要，可以覆盖此设置。因此，所有数据都包含在\
    \ `fs.chunks` 集合中。\n\n块集合中各个文档的结构非常简单：\n\n```json\n{\n  \"_id\" : ObjectId(\"\
    ...\"),\n  \"n\" : 0,\n  \"data\" : BinData(\"...\"),\n  \"files_id\" : ObjectId(\"\
    ...\")\n}\n```\n\n块文档包含以下重要键：\n\n*   `\"_id\"`：这是唯一标识符。\n*   `\"files_id\"`：这是包含该块相关元数据的文档的唯一标识符。\n\
    *   `\"n\"`：这基本上表示该块在原始文件中的位置。\n*   `\"data\"`：这是构成该块的实际二进制数据。\n\n`fs.files` 集合存储每个文件的元数据。该集合中的每个文档代表\
    \ GridFS 中的一个文件。除了通用的元数据信息外，该集合的每个文档还可以包含它所代表文件特有的自定义元数据。\n\n以下是 GridFS 规范强制要求的键：\n\
    \n*   `_id`：这是文件的唯一标识符。\n*   `length`：这描述了构成文件完整内容的总字节数。\n*   `chunkSize`：这是文件的块大小，以字节为单位。默认是\
    \ 255KB，但如果需要可以调整。\n*   `uploadDate`：这是文件存储到 GridFS 中的时间戳。\n*   `md5`：这在服务器端生成，是文件内容的\
    \ md5 校验和。MongoDB 服务器通过使用 `filemd5` 命令生成其值，该命令计算已上传块的 md5 校验和。这意味着用户可以检查此值以确保文件已正确上传。\n\
    \n一个典型的 `fs.files` 文档如下所示（另见图 8-23）：\n\n![A332296_1_En_8_Fig23_HTML.jpg](img/A332296_1_En_8_Fig23_HTML.jpg)\n\
    \n图 8-23. GridFS\n\n```json\n{\n  \"_id\" : ObjectId(\"...\"),\n  \"length\" :\
    \ data_number,\n  \"chunkSize\" : data_number,\n  \"uploadDate\" : data_date,\n\
    \  \"md5\" : data_string\n}\n```\n\n### 8.6.3 使用 GridFS\n\n在本节中，你将使用 PyMongo 驱动程序来了解如何开始使用\
    \ GridFS。\n\n#### 添加对文件系统的引用\n\n首先需要的是对 GridFS 文件系统的引用：\n\n```python\n>>> import\
    \ pymongo\n>>> import gridfs\n>>> myconn = pymongo.Connection()\n>>> mydb = myconn.gridfstest\n\
    >>> myfs = gridfs.GridFS(db)\n```\n\n#### write( )\n\n接下来，你将执行一个基本的写入操作：\n\n```python\n\
    >>> with myfs.new_file() as myfp:\n...     myfp.write('This is my new sample file.\
    \ It is just grand!')\n```\n\n#### find( )\n\n使用 mongo shell，让我们看看底层集合中存储了什么：\n\
    \n```python\n>>> list(mydb.myfs.files.find())\n[{u'length': 38, u'_id': ObjectId('52fdd6189cd2fd08288d5f5c'),\
    \ u'uploadDate': datetime.datetime(2014, 11, 4, 4, 20, 41, 800000), u'md5': u'332de5ca08b73218a8777da69293576a',\
    \ u'chunkSize': 262144}]\n>>> list(mydb.myfs.chunks.find())\n[{u'files_id': ObjectId('52fdd6189cd2fd08288d5f5c'),\
    \ u'_id': ObjectId('52fdd6189cd2fd08288d5f5d'), u'data': Binary('This is my new\
    \ sample file. It is just grand!', 0), u'n': 0}]\n```\n\n#### 强制分割文件\n\n让我们强制分割文件。这可以通过在创建文件时指定一个较小的\
    \ `chunkSize` 来实现，如下所示：\n\n```python\n>>> with myfs.new_file(chunkSize=10) as\
    \ myfp:\n...     myfp.write('This is second file. I am assuming it will be split\
    \ into various chunks')\n...\n>>> myfp\n<gridfs.grid_file.GridIn object at 0x0000000002AC79B0>\n\
    >>> myfp._id\nObjectId('52fdd76e9cd2fd08288d5f5e')\n>>> list(mydb.myfs.chunks.find(dict(files_id=myfp._id)))\n\
    .............\nObjectId('52fdd76e9cd2fd08288d5f65'), u'data': Binary('s', 0),\
    \ u'n': 6}]\n```\n\n#### read( )\n\n你现在知道了文件在数据库中实际是如何存储的。接下来，使用客户端驱动程序，你将读取该文件：\n\
    \n```python\n>>> with myfs.get(myfp._id) as myfp_read:\n...     print myfp_read.read()\n\
    ...\n\"This is second file. I am assuming it will be split into various chunks.\"\
    \n```\n\n用户根本不需要意识到块的存在。你需要使用客户端暴露的 API 来从 GridFS 读写文件。\n"
- fmt: '# Treating GridFS More Like a File System


    `new_file()` - Create a new file in GridFS


    You can pass any number of keywords as arguments to the `new_file()`. This will
    be added in the `fs.files` document:


    ```

    >>> with myfs.new_file(

    ...     filename=''practicalfile.txt'',

    ...     content_type=''text/plain'',

    ...     my_other_attribute=42) as myfp:

    ...     myfp.write(''My New file'')

    ...

    >>> myfp

    <gridfs.grid_file.GridIn object at 0x0000000002AC7AC8>

    >>> db.myfs.files.find_one(dict(_id=myfp._id))

    {u''contentType'': u''text/plain'', u''chunkSize'': 262144, u''my_other_attribute'':
    42, u''filename'': u''practicalfile.txt'', u''length'': 8, u''uploadDate'': datetime.datetime(2014,
    11, 4, 9, 1, 32, 800000), u''_id'': ObjectId(''52fdd8db9cd2fd08288d5f66''), u''md5'':
    u''681e10aecbafd7dd385fa51798ca0fd6''}

    >>>

    ```


    A file can be overwritten using filenames. Since `_id` is used for indexing files
    in GridFS, the old file is not removed. Just a file version is maintained.


    ```

    >>> with myfs.new_file(filename=''practicalfile.txt'', content_type=''text/plain'')
    as myfp:

    ...     myfp.write(''Overwriting the "My New file"'')

    ...

    ```


    `get_version()` / `get_last_version()`


    In the above case, `get_version` or `get_last_version` can be used to retrieve
    the file with the filename.


    ```

    >>> myfs.get_last_version(''practicalfile.txt'').read()

    ''Overwriting the "My New file"''

    >>> myfs.get_version(''practicalfile.txt'',0).read()

    ''My New file''

    ```


    You can also list the files in GridFS:


    ```

    >>> myfs.list()

    [u''practicalfile.txt'', u''practicalfile2.txt'']

    ```


    `delete()`


    Files can also be removed:


    ```

    >>> myfp = myfs.get_last_version(''practicalfile.txt'')

    >>> myfs.delete(myfp._id)

    >>> myfs.list()

    [u''practicalfile.txt'', u''practicalfile2.txt'']

    >>> myfs.get_last_version(''practicalfile.txt'').read()

    ''My New file''

    >>>

    ```


    Note that only one version of `practicalfile.txt` was removed. You still have
    a file named `practicalfile.txt` in the filesystem.


    `exists()` and `put()`


    Next, you will use `exists()` to check if a file exists and `put()` to quickly
    write a short file into GridFS:


    ```

    >>> myfs.exists(myfp._id)

    False

    >>> myfs.exists(filename=''practicalfile.txt'')

    True

    >>> myfs.exists({''filename'':''practicalfile.txt''}) # equivalent to above

    True

    >>> myfs.put(''The red fish'', filename=''typingtest.txt'')

    ObjectId(''52fddbc69cd2fd08288d5f6a'')

    >>> myfs.get_last_version(''typingtest.txt'').read()

    ''The red fish''

    >>>

    ```


    # Indexing


    In this part of the book, you will briefly examine what an index is in the MongoDB
    context. Following that, we will highlight the various types of indexes available
    in MongoDB, concluding the section by highlighting the behavior and limitations.


    An index is a data structure that speeds up the read operations. In layman terms,
    it is comparable to a book index where you can reach any chapter by looking in
    the index for the chapter and jumping directly to the page number rather than
    scanning the entire book to reach to the chapter, which would be the case if no
    index existed.


    Similarly, an index is defined on fields, which can help in searching for information
    in a better and efficient manner.


    As in other databases, in MongoDB also it’s perceived in a similar fashion (it’s
    used for speeding up the `find()` operation). The type of queries you run help
    to create efficient indexes for the databases. For example, if most of the queries
    use a Date field, it would be beneficial to create an index on the Date field.
    It can be tricky to figure out which index is optimal for your query, but it’s
    worth a try because the queries that otherwise take minutes will return results
    instantaneously if a proper index is in place.


    In MongoDB, an index can be created on any field or sub-field of a document. Before
    you look at the various types of indexes that can be created in MongoDB, let’s
    list a few core features of the indexes:


    * The indexes are defined at the per-collection level. For each collection, there
    are different sets of indexes.

    * Like SQL indexes, a MongoDB index can also be created either on a single field
    or set of fields.

    * In SQL, although indexes enhance the query performance, you incur overhead for
    every write operation. So before creating any index, consider the type of queries,
    frequency, the size of the workload, and the insert load along with application
    requirements.

    * A BTree data structure is used by all MongoDB indexes.

    * Every query using the update operations uses only one index, which is decided
    by the query optimizer. This can be overridden by using a hint.

    * A query is said to be covered by an index if all fields are part of the index,
    irrespective of whether it’s used for querying or for projecting.

    * A covering index maximizes the MongoDB performance and throughput because the
    query can be satiated using an index only, without loading the full documents
    in memory.

    * An index will only be updated when the fields on which the index has been created
    are changed. Not all update operations on a document cause the index to be changed.
    It will only be changed if the associated fields are impacted.


    ## Types of Indexes


    In this section, you will look at the different types of indexes that are available
    in MongoDB.


    ### `_id` index


    This is the default index that is created on the `_id` field. This index cannot
    be deleted.'
