- fmt: '# 8. MongoDB Explained


    > “MongoDB explained covers deep-dive concepts of what happens under the hood
    in MongoDB.”


    In this chapter, you will learn how data is stored in MongoDB and how writes happen
    using journaling. Finally, you will learn about GridFS and the different types
    of indexes available in MongoDB.


    ## 8.1 Data Storage Engine


    In the previous chapter, you looked at the core services that are deployed as
    part of MongoDB; you also looked at replica sets and sharding. In this section,
    we will talk about the data storage engine.


    ### MMAP


    MongoDB uses MMAP as its default storage engine. This engine works with memory-mapped
    files. Memory-mapped files are data files that are placed by the operating system
    in memory using the `mmap()` system call. `mmap` is a feature of OS that maps
    a file on the disk into virtual memory.


    Virtual memory is not equivalent to physical memory. Virtual memory is space on
    the computer’s hard disk that is used in conjunction with physical RAM.


    MongoDB uses memory-mapped files for any data interaction or data management activity.
    As and when the documents are accessed, the data files are memory mapped to the
    memory. MongoDB allows the OS to control the memory mapping and allocate the maximum
    amount of RAM. Doing this results in minimal effort and coding at MongoDB level.
    The caching is done based on LRU behavior wherein the least recently used files
    are moved out to disk from the working set, making space for the new recently
    and frequently used pages.


    However, this method comes with its own drawbacks. For instance, MongoDB has no
    control over what data to keep in memory and what to remove. So every server restart
    will lead to a page fault because every page that is accessed will not be available
    in the working set, leading to a long data retrieval time.


    MongoDB also has no control over prioritizing the content of the memory. Given
    an evacuation situation, it can mention what content needs to be maintained in
    the cache and what can be removed. For example, if a read is fired on a large
    collection that is not indexed, it might result in loading the entire collection
    to memory, which might lead to evacuation of the RAM contents including removal
    of indexes of other collections that might be very important. This lack of control
    might also result in shrinking the cache assigned to MongoDB when any external
    process outside MongoDB tries to access a large portion of memory; this eventually
    will lead to slowness in the MongoDB response.


    ### Pluggable Storage Engine API


    With the release of version 3.0, MongoDB comes along with a pluggable storage
    engine API wherein it enables you to select between the storage engines based
    on the workload, application need, and available infrastructure.


    The vision behind the pluggable storage engine layer is to have one data model,
    one querying language, and one set of operational concerns, but under the hood
    many storage engine options optimized for different use cases, as shown in Figure
    8-1.


    ![A332296_1_En_8_Fig1_HTML.jpg](A332296_1_En_8_Fig1_HTML.jpg)


    **Figure 8-1.** Pluggable storage engine API


    The pluggable storage engine feature also provides flexibility in terms of deployments
    wherein multiple types of storage engines can coexist in the same deployment.


    MongoDB version 3.0 ships with two storage engines.


    The default, `MMAPv1`, is an improved version of the MMAP engine used in the prior
    versions. The updated MongoDB `MMAPv1` storage engine implements collection-level
    concurrency control. This storage engine excels at workloads with high volume
    reads, inserts, and in-place updates.


    ### WiredTiger


    The new `WiredTiger` storage engine was developed by the architects of Berkeley
    DB, the most widely deployed embedded data management software in the world. `WiredTiger`
    scales on modern multi-CPU architectures. It is designed to take advantage of
    modern hardware with multi-core CPUs and more RAM.


    `WiredTiger` stores data in compressed format on the disk. Compression reduces
    the data size by up to 70% (disk only) and index size by up to 50% (disk and memory
    both) depending on the compression algorithm used. In addition to reduced storage
    space, compression enables much higher I/O scalability as fewer bits are read
    from disk. It provides significant benefits in the areas of greater hardware utilization,
    lower storage costs, and more predictable performance.


    ### Compression Algorithms


    The following compression algorithms are available to choose from:


    *   `Snappy` is the default, which is used for documents and journals. It provides
    a good compression ratio with little CPU overhead. Depending on data types, the
    compression ratio is somewhere around 70%.

    *   `zlib` provides extremely good compression but at the expense of extra CPU
    overhead.

    *   Prefix compression is the default used for indexes, reducing the in-memory
    footprint of index storage by around 50% (workload dependent) and freeing up more
    of the working set for frequently accessed documents.


    Administrators can modify the default compression settings for all collections
    and indexes. Compression is also configurable on a per-collection and per-index
    basis during collection and index creation.


    `WiredTiger` also provides granular document-level concurrency. Writes are no
    longer blocked by other writes unless they are accessing the same document. Thus
    it supports concurrent access by readers and writers to the documents in a collection.
    Clients can read documents while write operations are in progress, and multiple
    threads can modify different documents in a collection at the same time. Thus
    it excels for write-intensive workloads (7-10X improvement in write performance).


    Higher concurrency also drives infrastructure simplification. Applications can
    fully utilize available server resources, simplifying the architecture needed
    to meet performance SLAs. With the more coarse grained database-level locking
    of previous MongoDB generations, users often had to implement sharding in order
    to scale workloads stalled by a single write lock to the database, even when sufficient
    memory, I/O bandwidth, and disk capacity was still available in the host system.
    Greater system utilization enabled by fine-grained concurrency reduces this overhead,
    eliminating unnecessary cost and management load.


    This storage engine provides control to you per collection per index level to
    decide on what to compress and what not to compress.


    The `WiredTiger` storage engine is only available with 64-bit MongoDB.


    `WiredTiger` manages data through its cache. The `WiredTiger` storage engine gives
    more control of memory by allowing you to configure how much RAM to allocate to
    the `WiredTiger` cache, defaulting to either 1GB or 50% of available memory, whichever
    is larger.


    You will next briefly look at how the data is stored on the disk.'
