    \    *   分片集群用例、`moveChunk` 命令\n\n### 性能与维护\n*   性能与特性对比\n*   时间优化\n*   固态硬盘 (`SSD`)\n\
    *   `mongodump` 和 `mongorestore`\n    *   备份实用程序、集合级备份\n    *   数据库还原、`--drop`\
