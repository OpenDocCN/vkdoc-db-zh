    `>db.students.find({"Name":/(student*)/i,"Age":{"$gte":25},"Gender":"M"})`


    `{ "_id" : ObjectId("52f89eb1e451bb7a56e59085"), "Name" : "Student1", "Age" :
    30,`


    `"Gender" : "M", "Class" : "Biology", "Score" : 90 }`


    `{ "_id" : ObjectId("52f89ecae451bb7a56e59086"), "Name" : "Student2", "Age" :
    30,`


    `"Gender" : "M", "Class" : "Chemistry", "Score" : 90 }`


    ### 6.2.3 MapReduce


    The MapReduce framework enables division of the task, which in this case is data
    aggregation across a cluster of computers in order to reduce the time it takes
    to aggregate the data set. It consists of two parts: Map and Reduce.


    Here’s a more specific description: MapReduce is a framework that is used to process
    problems that are highly distributable across enormous datasets and are run using
    multiple nodes. If all the nodes have the same hardware, these nodes are collectively
    referred as a cluster; otherwise, it’s referred as a grid. This processing can
    occur on structured data (data stored in a database) and unstructured data (data
    stored in a file system).


    *   “Map”: In this step, the node that is acting as the master takes the input
    parameter and divides the big problem into multiple small sub-problems. These
    sub-problems are then distributed across the worker nodes. The worker nodes might
    further divide the problem into sub-problems. This leads to a multi-level tree
    structure. The worker nodes will then work on the sub-problems within them and
    return the answer back to the master node.

    *   “Reduce”: In this step, all the sub-problems’ answers are available with the
    master node, which then combines all the answers and produce the final output,
    which is the answer to the big problem you were trying to solve.


    In order to understand how it works, let’s consider a small example where you
    will find out the number of male and female students in your collection.


    This involves the following steps: first you create the `map` and `reduce` functions
    and then you call the `mapReduce` function and pass the necessary arguments.


    Let’s start by defining the `map` function:


    `> var map = function(){emit(this.Gender,1);};`


    `>`


    This step takes as input the document and based on the `Gender` field it emits
    documents of the type `{"F", 1}` or `{"M", 1}` .


    Next, you create the `reduce` function:


    `> var reduce = function(key, value){return Array.sum(value);};`


    `>`


    This will group the documents emitted by the `map` function on the key field,
    which in your example is `Gender`, and will return the sum of values, which in
    the above example is emitted as “1”. The output of the reduce function defined
    above is a gender-wise count.


    Finally, you put them together using the `mapReduce` function, like so:


    `> db.students.mapReduce(map, reduce, {out: "mapreducecount1"})`


    `{`


    `"result" : "mapreducecount1",`


    `"timeMillis" : 29,`


    `"counts" : {`


    `"input" : 15,`


    `"emit" : 15,`


    `"reduce" : 2,`


    `"output" : 2`


    `},`


    `"ok" : 1,`


    `}`


    `>`


    This actually is applying the `map` , `reduce` function, which you defined on
    the `students` collection. The final result is stored in a new collection called
    `mapreducecount1`.


    In order to vet it, run the `find()` command on the `mapreducecount1` collection,
    as shown:


    `> db.mapreducecount1.find()`


    `{ "_id" : "F", "value" : 6 }`


    `{ "_id" : "M", "value" : 9 }`


    `>`


    Here’s one more example to explain the workings of `MapReduce`. Let’s use `MapReduce`
    to find out a class-wise average score. As you saw in the above example, you need
    to first create the `map` function and then the `reduce` function and finally
    you combine them to store the output in a collection in your database. The code
    snippet is


    `> var map_1 = function(){emit(this.Class,this.Score);};`


    `> var reduce_1 = function(key, value){return Array.avg(value);};`


    `>db.students.mapReduce(map_1,reduce_1, {out:"MR_ClassAvg_1"})`


    `{`


    `"result" : "MR_ClassAvg_1",`


    `"timeMillis" : 4,`


    `"counts" : {`


    `"input" : 15, "emit" : 15,`


    `"reduce" : 3 , "output" : 5`


    `},`


    `"ok" : 1,`


    `}`


    `> db.MR_ClassAvg_1.find()`


    `{ "_id" : "Biology", "value" : 90 }`


    `{ "_id" : "C1", "value" : 85 }`


    `{ "_id" : "C2", "value" : 93 }`


    `{ "_id" : "C3", "value" : 90 }`


    `{ "_id" : "Chemistry", "value" : 90 }`


    `>`'
