    \ 数据库、产品数据库\n    *   基于角色的方法、`system.users` 集合\n    *   用户与启用授权\n*   独立部署\n\n\
    ### 云管理与监控\n*   `Cloud Manager`\n    *   账户、配置、自动化代理\n    *   部署组创建、安装说明\n   \
    \ *   `MMS` 监控解决方案、审查与部署按钮\n    *   独立实例\n*   监控与分析\n    *   配置服务器、锁状态、服务分片状态\n\
