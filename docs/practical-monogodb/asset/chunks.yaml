- fmt: "### 6.3.2 MongoDB Document Data Model Approach\n\nAs you know, in MongoDB,\
    \ data is stored in documents. Fortunately for us as application designers, this\
    \ opens up some new possibilities in schema design. Unfortunately for us, it also\
    \ complicates our schema design process. Now when faced with a schema design problem\
    \ there’s no longer a fixed path of normalized database design, as there is with\
    \ relational databases. In MongoDB, the schema design depends on the problem you\
    \ are trying to solve.\n\nIf you have to model the above using the MongoDB document\
    \ model, you might store the blog data in a document as follows:\n\n```json\n\
    {\n  \"_id\" : ObjectId(\"509d27069cc1ae293b36928d\"),\n  \"title\" : \"Sample\
    \ title\",\n  \"body\" : \"Sample text.\",\n  \"tags\" : [\n    \"Tag1\",\n  \
    \  \"Tag2\",\n    \"Tag3\",\n    \"Tag4\"\n  ],\n  \"created_date\" : ISODate(\"\
    2015-07-06T12:41:39.110Z\"),\n  \"author\" : \"Author 1\",\n  \"category_id\"\
    \ : ObjectId(\"509d29709cc1ae293b369295\"),\n  \"comments\" : [\n    {\n     \
    \ \"subject\" : \"Sample comment\",\n      \"body\" : \"Comment Body\",\n    \
    \  \"author \" : \"author 2\",\n      \"created_date\":ISODate(\"2015-07-06T13:34:23.929Z\"\
    )\n    }\n  ]\n}\n```\n\nAs you can see, you have embedded the comments and tags\
    \ within a single document only. Alternatively, you could “normalize” the model\
    \ a bit by referencing the comments and tags by the `_id` field:\n\n```json\n\
    // Authors document:\n{\n  \"_id\": ObjectId(\"509d280e9cc1ae293b36928e \"),\n\
    \  \"name\": \"Author 1\",\n}\n```\n\n```json\n// Tags document:\n{\n  \"_id\"\
    : ObjectId(\"509d35349cc1ae293b369299\"),\n  \"TagName\": \"Tag1\",\n  .....\n\
    }\n```\n\n```json\n// Comments document:\n{\n  \"_id\": ObjectId(\"509d359a9cc1ae293b3692a0\"\
    ),\n  \"Author\": ObjectId(\"508d27069cc1ae293b36928d\"),\n  .......\n  \"created_date\"\
    \ : ISODate(\"2015-07-06T13:34:59.336Z\")\n}\n```\n\n```json\n//Category Document\n\
    {\n  \"_id\": ObjectId(\"509d29709cc1ae293b369295\"),\n  \"Category\": \"Catgeory1\"\
    \n  ......\n}\n```\n\n```json\n//Posts Document\n{\n  \"_id\" : ObjectId(\"509d27069cc1ae293b36928d\"\
    ),\n  \"title\" : \"Sample title\",\n  \"body\" : \"Sample text.\",\n  \"tags\"\
    \ : [ ObjectId(\"509d35349cc1ae293b369299\"),\n  ObjectId(\"509d35349cc1ae293b36929c\"\
    )\n  ],\n  \"created_date\" : ISODate(\"2015-07-06T13:41:39.110Z\"),\n  \"author_id\"\
    \ : ObjectId(\"509d280e9cc1ae293b36928e\"),\n  \"category_id\" : ObjectId(\"509d29709cc1ae293b369295\"\
    ),\n  \"comments\" : [\n    ObjectId(\"509d359a9cc1ae293b3692a0\"),\n  ]\n}\n\
    ```\n\nThe remainder of this chapter is devoted to identifying which solution\
    \ will work in your context (i.e. whether to use referencing or whether to embed).\n\
    \n#### 6.3.2.1 Embedding\n\nIn this section, you will see if embedding will have\
    \ a positive impact on the performance. Embedding can be useful when you want\
    \ to fetch some set of data and display it on the screen, such as a page that\
    \ displays comments associated with the blog; in this case the comments can be\
    \ embedded in the Blogs document.\n\nThe benefit of this approach is that since\
    \ MongoDB stores the documents contiguously on disk, all the related data can\
    \ be fetched in a single seek.\n\nApart from this, since JOINs are not supported\
    \ and you used referencing in this case, the application might do something like\
    \ the following to fetch the comments data associated with the blog.\n\n1.  Fetch\
    \ the associated `comments_id` from the blogs document.\n2.  Fetch the comments\
    \ document based on the `comments_id` found in the first step.\n\nIf you take\
    \ this approach, which is referencing, not only does the database have to do multiple\
    \ seeks to find your data, but additional latency is introduced into the lookup\
    \ since it now takes two round trips to the database to retrieve your data.\n\n\
    If the application frequently accesses the comments data along with the blogs,\
    \ then almost certainly embedding the comments within the blog documents will\
    \ have a positive impact on the performance.\n\nAnother concern that weighs in\
    \ favor of embedding is the desire for atomicity and isolation in writing data.\
    \ MongoDB is designed without multi-documents transactions. In MongoDB, the atomicity\
    \ of the operation is provided only at a single document level so data that needs\
    \ to be updated together atomically needs to be placed together in a single document.\n\
    \nWhen you update data in your database, you must ensure that your update either\
    \ succeeds or fails entirely, never having a “partial success,” and that no other\
    \ database reader ever sees an incomplete write operation."
  raw: '### 6.3.2 MongoDB Document Data Model Approach


    As you know, in MongoDB, data is stored in documents. Fortunately for us as application
    designers, this opens up some new possibilities in schema design. Unfortunately
    for us, it also complicates our schema design process. Now when faced with a schema
    design problem there’s no longer a fixed path of normalized database design, as
    there is with relational databases. In MongoDB, the schema design depends on the
    problem you are trying to solve.


    If you have to model the above using the MongoDB document model, you might store
    the blog data in a document as follows:


    `{`


    `"_id" : ObjectId("509d27069cc1ae293b36928d"),`


    `"title" : "Sample title",`


    `"body" : "Sample text.",`


    `"tags" : [`


    `"Tag1",`


    `"Tag2",`


    `"Tag3",`


    `"Tag4"`


    `],`


    `"created_date" : ISODate("2015-07-06T12:41:39.110Z"),`


    `"author" : "Author 1",`


    `"category_id" : ObjectId("509d29709cc1ae293b369295"),`


    `"comments" : [`


    `{`


    `"subject" : "Sample comment",`


    `"body" : "Comment Body",`


    `"author " : "author 2",`


    `"created_date":ISODate("2015-07-06T13:34:23.929Z")`


    `}`


    `]}`


    As you can see, you have embedded the comments and tags within a single document
    only. Alternatively, you could “normalize” the model a bit by referencing the
    comments and tags by the `_id` field:


    `// Authors document:`


    `{`


    `"_id": ObjectId("509d280e9cc1ae293b36928e "),`


    `"name": "Author 1",}`


    `// Tags document:`


    `{`


    `"_id": ObjectId("509d35349cc1ae293b369299"),`


    `"TagName": "Tag1",.....}`


    `// Comments document:`


    `{`


    `"_id": ObjectId("509d359a9cc1ae293b3692a0"),`


    `"Author": ObjectId("508d27069cc1ae293b36928d"),`


    `.......`


    `"created_date" : ISODate("2015-07-06T13:34:59.336Z")`


    `}`


    `//Category Document`


    `{`


    `"_id": ObjectId("509d29709cc1ae293b369295"),`


    `"Category": "Catgeory1"......`


    `}`


    `//Posts Document`


    `{`


    `"_id" : ObjectId("509d27069cc1ae293b36928d"),`


    `"title" : "Sample title","body" : "Sample text.",`


    `"tags" : [ ObjectId("509d35349cc1ae293b369299"),`


    `ObjectId("509d35349cc1ae293b36929c")`


    `],`


    `"created_date" : ISODate("2015-07-06T13:41:39.110Z"),`


    `"author_id" : ObjectId("509d280e9cc1ae293b36928e"),`


    `"category_id" : ObjectId("509d29709cc1ae293b369295"),`


    `"comments" : [`


    `ObjectId("509d359a9cc1ae293b3692a0"),`


    `]}`


    The remainder of this chapter is devoted to identifying which solution will work
    in your context (i.e. whether to use referencing or whether to embed).


    #### 6.3.2.1 Embedding


    In this section, you will see if embedding will have a positive impact on the
    performance. Embedding can be useful when you want to fetch some set of data and
    display it on the screen, such as a page that displays comments associated with
    the blog; in this case the comments can be embedded in the Blogs document.


    The benefit of this approach is that since MongoDB stores the documents contiguously
    on disk, all the related data can be fetched in a single seek.


    Apart from this, since JOINs are not supported and you used referencing in this
    case, the application might do something like the following to fetch the comments
    data associated with the blog.


    Fetch the associated `comments_id` from the blogs document.   Fetch the comments
    document based on the `comments_id` found in the first step.  


    If you take this approach, which is referencing, not only does the database have
    to do multiple seeks to find your data, but additional latency is introduced into
    the lookup since it now takes two round trips to the database to retrieve your
    data.


    If the application frequently accesses the comments data along with the blogs,
    then almost certainly embedding the comments within the blog documents will have
    a positive impact on the performance.


    Another concern that weighs in favor of embedding is the desire for atomicity
    and isolation in writing data. MongoDB is designed without multi-documents transactions.
    In MongoDB, the atomicity of the operation is provided only at a single document
    level so data that needs to be updated together atomically needs to be placed
    together in a single document.


    When you update data in your database, you must ensure that your update either
    succeeds or fails entirely, never having a “partial success,” and that no other
    database reader ever sees an incomplete write operation.'
  trans: "### 6.3.2 MongoDB 文档数据模型方法\n\n如你所知，在 MongoDB 中，数据存储在文档里。对我们应用设计者而言幸运的是，这为模式设计开启了新的可能性。不幸的是，这也使我们的模式设计过程变得复杂。现在，当面对一个模式设计问题时，不再像关系型数据库那样有一条固定的规范化数据库设计路径。在\
    \ MongoDB 中，模式设计取决于你想要解决的问题。\n\n如果你必须使用 MongoDB 文档模型来建模上述内容，你可能会将博客数据存储在如下文档中：\n\
    \n```json\n{\n  \"_id\" : ObjectId(\"509d27069cc1ae293b36928d\"),\n  \"title\"\
    \ : \"示例标题\",\n  \"body\" : \"示例文本。\",\n  \"tags\" : [\n    \"标签 1\",\n    \"\
    标签 2\",\n    \"标签 3\",\n    \"标签 4\"\n  ],\n  \"created_date\" : ISODate(\"2015-07-06T12:41:39.110Z\"\
    ),\n  \"author\" : \"作者 1\",\n  \"category_id\" : ObjectId(\"509d29709cc1ae293b369295\"\
    ),\n  \"comments\" : [\n    {\n      \"subject\" : \"示例评论\",\n      \"body\" :\
    \ \"评论内容\",\n      \"author \" : \"作者 2\",\n      \"created_date\":ISODate(\"\
    2015-07-06T13:34:23.929Z\")\n    }\n  ]\n}\n```\n\n如你所见，你已将评论和标签仅嵌入在一个文档中。或者，你也可以通过使用\
    \ `_id` 字段引用来对模型进行一定程度的“规范化”：\n\n```json\n// 作者文档：\n{\n  \"_id\": ObjectId(\"\
    509d280e9cc1ae293b36928e \"),\n  \"name\": \"作者 1\",\n}\n```\n\n```json\n// 标签文档：\n\
    {\n  \"_id\": ObjectId(\"509d35349cc1ae293b369299\"),\n  \"TagName\": \"标签 1\"\
    ,\n  .....\n}\n```\n\n```json\n// 评论文档：\n{\n  \"_id\": ObjectId(\"509d359a9cc1ae293b3692a0\"\
    ),\n  \"Author\": ObjectId(\"508d27069cc1ae293b36928d\"),\n  .......\n  \"created_date\"\
    \ : ISODate(\"2015-07-06T13:34:59.336Z\")\n}\n```\n\n```json\n//分类文档\n{\n  \"\
    _id\": ObjectId(\"509d29709cc1ae293b369295\"),\n  \"Category\": \"分类 1\"\n  ......\n\
    }\n```\n\n```json\n//文章文档\n{\n  \"_id\" : ObjectId(\"509d27069cc1ae293b36928d\"\
    ),\n  \"title\" : \"示例标题\",\n  \"body\" : \"示例文本。\",\n  \"tags\" : [ ObjectId(\"\
    509d35349cc1ae293b369299\"),\n  ObjectId(\"509d35349cc1ae293b36929c\")\n  ],\n\
    \  \"created_date\" : ISODate(\"2015-07-06T13:41:39.110Z\"),\n  \"author_id\"\
    \ : ObjectId(\"509d280e9cc1ae293b36928e\"),\n  \"category_id\" : ObjectId(\"509d29709cc1ae293b369295\"\
    ),\n  \"comments\" : [\n    ObjectId(\"509d359a9cc1ae293b3692a0\"),\n  ]\n}\n\
    ```\n\n本章剩余部分将致力于确定哪种方案适用于你的场景（即，是使用引用还是嵌入）。\n\n#### 6.3.2.1 嵌入\n\n在本节中，你将了解嵌入是否会带来性能上的积极影响。当你需要获取一组数据并将其显示在屏幕上时（例如一个显示博客相关评论的页面），嵌入可能很有用；在这种情况下，评论可以嵌入在博客文档中。\n\
    \n这种方法的益处在于，由于 MongoDB 在磁盘上连续存储文档，所有相关数据只需一次查找即可获取。\n\n除此之外，由于不支持 JOIN，如果你在这种情况下使用引用，应用程序可能会执行类似以下的步骤来获取与博客相关的评论数据：\n\
    \n1.  从博客文档中获取关联的 `comments_id`。\n2.  根据第一步中找到的 `comments_id` 获取评论文档。\n\n如果你采用这种引用方式，不仅数据库需要进行多次查找来定位你的数据，而且由于现在需要两次往返数据库才能检索数据，还会引入额外的延迟。\n\
    \n如果应用程序经常同时访问评论数据和博客数据，那么将评论嵌入到博客文档中几乎肯定会对性能产生积极影响。\n\n另一个倾向于嵌入的考虑因素是希望写入数据时具有原子性和隔离性。MongoDB\
    \ 设计时未包含多文档事务。在 MongoDB 中，操作的原子性仅在单个文档级别提供，因此需要原子性地一起更新的数据必须放置在同一个文档中。\n\n当你更新数据库中的数据时，你必须确保你的更新要么完全成功，要么完全失败，永远不会出现“部分成功”的情况，并且没有其他数据库读取者会看到不完整的写入操作。"
- fmt: '### 6.3.2.2 Referencing


    You have seen that embedding is the approach that will provide the best performance
    in many cases; it also provides data consistency guarantees. However, in some
    cases, a more normalized model works better in MongoDB.


    One reason for having multiple collections and adding references is the increased
    flexibility it gives when querying the data. Let’s understand this with the blogging
    example mentioned above.


    You saw how to use embedded schema, which will work very well when displaying
    all the data together on a single page (i.e. the page that displays the blog post
    followed by all of the associated comments).


    Now suppose you have a requirement to search for the comments posted by a particular
    user. The query (using this embedded schema) would be as follows:


    `db.posts.find({''comments.author'': ''author2''},{''comments'': 1})`


    The result of this query, then, would be documents of the following form:


    ```json

    {

    "_id" : ObjectId("509d27069cc1ae293b36928d"),

    "comments" : [ {

    "subject" : "Sample Comment 1 ",

    "body" : "Comment1 Body.",

    "author_id" : "author2",

    "created_date" : ISODate("2015-07-06T13:34:23.929Z")}...]

    }

    {

    "_id" : ObjectId("509d27069cc1ae293b36928d"),

    "comments" : [

    {

    "subject" : "Sample Comment 2",

    "body" : "Comments Body.",

    "author_id" : "author2",

    "created_date" : ISODate("2015-07-06T13:34:23.929Z")

    }...]

    }

    ```


    The major drawback to this approach is that you get back much more data than you
    actually need. In particular, you can’t ask for just `author2`’s comments; you
    have to ask for posts that `author2` has commented on, which includes all of the
    other comments on those posts as well. This data will require further filtering
    within the application code.


    On the other hand, suppose you decide to use a normalized schema. In this case
    you will have three documents: “Authors,” “Posts,” and “Comments.”


    The “Authors” document will have Author-specific content such as `Name`, `Age`,
    `Gender`, etc., and the “Posts” document will have posts-specific details such
    as post creation time, author of the post, actual content, and the subject of
    the post.


    The “Comments” document will have the post’s comments such as `CommentedOn` date
    time, created by author, and the text of the comment. This is depicted as follows:


    ```json

    // Authors document:

    {

    "_id": ObjectId("508d280e9cc1ae293b36928e "),

    "name": "Jenny",

    ..........

    }

    ```


    ```json

    //Posts Document

    {

    "_id" : ObjectId("508d27069cc1ae293b36928d"),....................

    }

    ```


    ```json

    // Comments document:

    {

    "_id": ObjectId("508d359a9cc1ae293b3692a0"),

    "Author": ObjectId("508d27069cc1ae293b36928d"),

    "created_date" : ISODate("2015-07-06T13:34:59.336Z"),

    "Post_id": ObjectId("508d27069cc1ae293b36928d"),

    ..........

    }

    ```


    In this scenario, the query to find the comments by “`author2`” can be fulfilled
    by a simple `find()` on the comments collection:


    `db.comments.find({"author": "author2"})`


    In general, if your application’s query pattern is well known, and data tends
    to be accessed in only one way, an embedded approach works well. Alternatively,
    if your application may query data in many different ways, or you are not able
    to anticipate the patterns in which data may be queried, a more “normalized” approach
    may be better.


    For instance, in the above schema, you will be able to sort the comments or return
    a more restricted set of comments using the `limit`, `skip` operators. In the
    embedded case, you’re stuck retrieving all the comments in the same order in which
    they are stored in the post.


    Another factor that may weigh in favor of using document references is when you
    have one-to-many relationships.


    For instance, a popular blog with a large amount of reader engagement may have
    hundreds or even thousands of comments for a given post. In this case, embedding
    carries significant penalties with it:


    *   Effect on read performance: As the document size increases, it will occupy
    more memory. The problem with memory is that a MongoDB database caches frequently
    accessed documents in memory, and the larger the documents become, the lesser
    the probability of them fitting into memory. This will lead to more page faults
    while retrieving the documents, which will lead to random disk I/O, which will
    further slow down the performance.

    *   Effect on update performance: As the size increases and an update operation
    is performed on such documents to append data, eventually MongoDB is going to
    need to move the document to an area with more space available. This movement,
    when it happens, significantly slows update performance.


    Apart from this, MongoDB documents have a hard size limit of `16MB`. Although
    this is something to be aware of, you will usually run into problems due to memory
    pressure and document copying well before you reach the `16MB` size limit.


    One final factor that weighs in favor of using document references is the case
    of many-to-many or `M:N` relationships.


    For instance, in the above example, there are tags. Each blog can have multiple
    tags and each tag can be associated to multiple blog entries.


    One approach to implement the blogs-tags `M:N` relationship is to have the following
    three collections:


    *   The `Tags` collection, which will store the tags details

    *   The `Blogs` collection, which will have blogs details

    *   A third collection, called `Tag-To-Blog Mapping`, which will map between the
    tags and the blogs


    This approach is similar to the one in relational databases, but this will negatively
    impact the application’s performance because the queries will end up doing a lot
    of application-level “joins.”


    Alternatively, you can use the embedding model where you embed the tags within
    the blogs document, but this will lead to data duplication. Although this will
    simplify the read operation a bit, it will increase the complexity of the update
    operation, because while updating a tag detail, the user needs to ensure that
    the updated tag is updated at each and every place where it has been embedded
    in other blog documents.


    Hence for many-to-many joins, a compromise approach is often best, embedding a
    list of `_id` values rather than the full document:


    ```json

    // Tags document:

    {

    "_id": ObjectId("508d35349cc1ae293b369299"),

    "TagName": "Tag1",

    ..........

    }

    ```


    ```json

    // Posts document with Tag IDs added as References

    //Posts Document

    { "_id" : ObjectId("508d27069cc1ae293b36928d"),

    "tags" : [

    ObjectId("509d35349cc1ae293b369299"),

    ObjectId("509d35349cc1ae293b36929a"),

    ObjectId("509d35349cc1ae293b36929b"),

    ObjectId("509d35349cc1ae293b36929c")

    ],....................................

    }

    ```


    Although querying will be a bit complicated, you no longer need to worry about
    updating a tag everywhere.


    In summary, schema design in MongoDB is one of the very early decisions that you
    need to make, and it is dependent on the application requirements and queries.


    As you have seen, when you need to access the data together or you need to make
    atomic updates, embedding will have a positive impact. However, if you need more
    flexibility while querying or if you have a many-to-many relationships, using
    references is a good choice.


    Ultimately, the decision depends on the access patterns of your application, and
    there are no hard-and-fast rules in MongoDB. In the next section, you will learn
    about various data modelling considerations.'
