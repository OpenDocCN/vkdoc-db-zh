    ## Preface


    Data warehousing as an industry has been around for quite a number of years now.
    Relational databases have been used to store data for decades while `SQL` has
    been the de-facto language to interact with `RDBMS`. With the emergence of Social
    Networking, Internet of Things and huge volumes of unstructured data on the internet
    the needs of data storage, processing and analytics just exploded. Traditional
    `RDBMS` systems and storage technologies were not designed to handle such vast
    variety and volumes of data.


    Thus was born the Big Data technologies which now power various internet scale
    companies and their huge amounts of data. Companies like Facebook, Twitter, Google
    and yahoo are leveraging the big data technologies to provide products and services
    at internet scale which support millions of users.


    This book will help our readers to appreciate the big data technologies, their
    emergence, need and then we will provide a deep dive technical perspective on
    architecting solutions using `MongoDB`. The book will enable our readers to understand
    the key use cases where big data technologies fit in and also provide them pointers
    on where Big Data technologies should be used carefully or combined with traditional
    `RDBMS` technologies to provide a feasible solution.


    Along with the architecture the book aims to provide a step by step guide on learning
    `MongoDB` and creating applications and solutions using `MongoDB`.


    We sincerely hope our readers will enjoy reading the book as much as we have enjoyed
    writing it.


    ### About this Book


    This book:


    *   Acts as a guide that helps the reader in grasping the various buzz words in
    Big Data technologies and getting a grip over various aspects of Big Data.

    *   Acts as a guide for people in order to understand about `NoSQL` and Document
    based database and how they are different from the traditional relational database.

    *   Provides insight into architecting solutions using `MongoDB`, it also provides
    information on the limitations of `MongoDB` as a tool.

    *   Methodically covers architecture, development, administration and data model
    of `MongoDB`.

    *   Cites examples in order to make the users comfortable in getting started with
    the technology.


    ### What you need for this book


    `MongoDB` supports the most popular platforms.


    Download the latest stable production release of `MongoDB` from the `MongoDB`
    downloads page ([`http://www.mongodb.org/downloads/`](http://www.mongodb.org/downloads/)).


    In this book we have focused on using `MongoDB` on a 64-bit `Windows` platform
    and at places have cited references on how to work with `MongoDB` running on `Linux`.


    We will be using 64-bit `Windows 2008 R2` and `LINUX` for examples of the installation
    process.


    ### Who this book for


    This book would be of interest to Programmers, Big Data Architects, Application
    Architects, Technology Enthusiasts, Students, Solution Experts and those wishing
    to choose the right big data products for their needs.


    The book covers aspects on Big Data, `NOSQL` and details on architecture and development
    on `MongoDB`. Thus it serves the use cases of developers, architects and operations
    teams who work on `MongoDB`.


    ## Acknowledgments


    Special thanks go out to the people who have helped in creation of this book Rajeev
    Pratap Singh and Amit Agrawal for helping with the code snippets and Dheeraj Raghav
    for the creative inputs in the design of this book.


    A ton of thanks go out to Stuti Awasthi for being the initiator and inspiration
    for this book.


    The authors will like to acknowledge the creators of big data technologies and
    the open source community for providing such powerful tools and technologies to
    code with and enable products and solutions which solve real business problems
    easily and quickly.'
