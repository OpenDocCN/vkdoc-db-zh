    ### 9.3.1 `mongoimport`


    MongoDB 提供了 `mongoimport` 工具，允许你将数据批量加载到数据库的集合中。它从文件中读取数据并批量加载到集合。


    这些方法不适合生产环境。


    `mongoimport` 支持以下三种文件格式：


    *   JSON：在此格式中，每行一个 JSON 块，代表一个文档。

    *   CSV：这是一个逗号分隔的文件。

    *   TSV：TSV 文件与 CSV 文件相同；唯一的区别是它使用制表符作为分隔符。


    使用 `–help` 与 `mongoimport` 将提供该工具所有可用的选项。


    `mongoimport` 非常简单。大多数时候你会用到以下选项：


    *   `-h` 或 `–host`：指定需要恢复数据的 `mongod` 主机名。如果未指定该选项，命令将默认连接到在 `localhost` 的 `27017`
    端口上运行的 `mongod`。可选地，可以指定端口号以连接到在不同端口上运行的 `mongod`。

    *   `-d` 或 `–db`：指定需要导入数据的数据库。

    *   `-c` 或 `–collection`：指定需要上传数据的集合。

    *   `--type`：这是文件类型（即 CSV、TSV 或 JSON）。

    *   `--file`：这是需要导入数据的文件路径。

    *   `--drop`：如果设置了此选项，它将删除集合并从导入的数据中重新创建集合。否则，数据将附加到集合末尾。

    *   `--headerLine`：仅用于 CSV 或 TSV 文件，用于指示第一行是标题行。


    以下命令将数据从 CSV 文件导入到 `localhost` 上的 `testimport` 集合：


    ```

    c:\practicalmongodb\bin> mongoimport --host localhost --db mydbpoc --collection
    testimport --type csv –file c:\exporteg.csv –-headerline

    2015-07-14T22:54:08.407-0700 connected to: localhost

    2015-07-14T22:54:08.483-0700 imported 15 documents

    c:\ practicalmongodb\bin>

    ```


    ### 9.3.2 `mongoexport`


    与 `mongoimport` 工具类似，MongoDB 提供了 `mongoexport` 工具，用于从 MongoDB 数据库导出数据。顾名思义，此工具从现有的
    MongoDB 集合中导出文件。


    使用 `–help` 显示 `mongoexport` 工具的可用选项。以下是你最常使用的选项：


    *   `-q`：用于指定查询，该查询将返回需要导出的记录作为输出。这类似于在 `db.CollectionName.find()` 函数中指定的、用于检索符合选择条件的记录的查询。如果未指定查询，则导出所有文档。

    *   `-f`：用于指定需要从选定文档中导出的字段。


    以下命令将数据从 `Users` 集合导出到 CSV 文件：


    ```

    c:\practicalmongodb\bin> mongoexport -d mydbpoc -c myusers -f _id,Age –type=csv
    > myusers.csv

    2015-07-14T22:54:48.604-0700 connected to: 127.0.0.1

    2015-07-14T22:54:48.604-0700 exported 22 records

    c:\practicalmongodb\bin>

    ```


    ### 9.4 管理服务器


    在本节中，你将了解作为系统管理员需要了解的各种选项。


    ### 9.4.1 启动服务器


    本节介绍如何启动服务器。之前，你通过运行 `mongod.exe` 来使用 `mongo` shell 启动服务器。


    MongoDB 服务器可以通过在 Windows 中以管理员身份打开命令提示符或在 Linux 系统中打开终端窗口，并键入以下命令来手动启动：


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\ practicalmongodb\bin>mongod

    mongod --help for help and startup options

    .........................................

    ```


    此窗口将显示所有与 `mongod` 建立的连接。它还显示可用于监控服务器的信息。


    如果未指定配置，MongoDB 将使用默认数据库路径 `C:\data\db`（在 Windows 上）和 `/data/db`（在 Linux 上）启动，并使用默认端口
    `27017` 和 `27018` 绑定到 `localhost`。


    键入 `^C` 将干净地关闭服务器。


    MongoDB 提供了两种指定用于启动服务器的配置参数的方法。


    第一种是使用命令行选项指定（参考第 tk 章）。


    第二种方法是加载配置文件。可以通过编辑文件然后重新启动服务器来更改服务器配置。


    ### 9.4.2 停止服务器


    服务器可以通过在 `mongod` 控制台中按 `CTRL+C` 来关闭。或者，你可以使用 `mongo` 控制台中的 `shutdownServer` 命令。


    打开终端窗口，并连接到 `mongo` 控制台。


    ```

    C:\> cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin> mongo

    MongoDB shell version: 3.0.4

    connecting to: test

    >

    ```


    切换到 `admin` 数据库并发出 `shutdownServer` 命令：


    ```

    > use admin

    switched to db admin

    > db.shutdownServer()

    2015-07-14T22:57:20.413-0700 I NETWORK DBClientCursor::init call() failed server
    should be down...

    2015-07-14T22:57:20.418-0700 I NETWORK trying reconnect to 127.0.0.1:27017

    2015-07-14T22:57:21.413-0700 I NETWORK 127.0.0.1:27017 failed couldn''t connect
    to server 127.0.0.1:27017

    >

    ```


    如果你检查在上一步中启动服务器的 `mongod` 控制台，你将看到服务器已成功关闭。


    ```

    .......................

    2015-07-14T22:57:30.259-0700 I COMMAND [conn1] terminating, shutdown command received

    2015-07-14T22:57:30.260-0700 I CONTROL [conn1] now exiting

    .................................................

    2015-07-14T22:57:30.380-0700 I STORAGE [conn1] shutdown: removing fs lock...

    2015-07-14T22:57:30.380-0700 I CONTROL [conn1] dbexit: rc: 0

    ```


    ### 9.4.3 查看日志文件


    默认情况下，MongoDB 的所有日志输出都写入 `stdout`，但可以通过在启动服务器时指定配置中的 `logpath` 选项来更改，将输出重定向到文件。


    日志文件内容可用于识别问题，例如可能指示某些数据问题或连接问题的异常。'
  raw: '### 9.3.1 mongoimport


    MongoDB provides the mongoimport utility that lets you bulk load data directly
    into a collection of the database. It reads from a file and bulk loads the data
    into a collection.


    These methods are not suitable for production environment.


    The following three file formats are supported by mongoimport:


    *   JSON: In this format you have JSON blocks per line, which represent a document.

    *   CSV: This is a comma-separated file.

    *   TSV: TSV files are same as CSV files; the only difference is it uses a tab
    as the separator.


    Using `–help` with `mongoimport` will provide all the options available with the
    utility.


    mongoimport is very simple. Most of the time you will end up using the following
    options:


    *   `-h` or `–host` : This specifies the mongod hostname where the data need to
    be restored. If the option is not specified, the command will connect to the mongod
    running on localhost at port 27017 by default. Optionally, a port number can be
    specified to connect to mongod running on a different port.

    *   `-d` or `–db` : Specifies the database where the data needs to be imported.

    *   `-c` or `–collection` : Specifies the collection where data need to be uploaded.

    *   `--type` : This is the file type (i.e. CSV, TSV or JSON).

    *   `--file` : This is the file path from where the data need to be imported.

    *   `--drop` : If this option is set, it will drop the collection and recreate
    the collection from the imported data. Otherwise, the data is appended at the
    end of the collection.

    *   `--headerLine` : This is used for CSV or TSV files only, and is used to indicate
    that the first line is a header line.


    The following command imports the data from a CSV file to the `testimport` collection
    on the localhost:


    `c:\practicalmongodb\bin>` `mongoimport --host localhost --db mydbpoc --collection
    testimport --type csv –file c:\exporteg.csv –-headerline`


    `2015-07-14T22:54:08.407-0700 connected to: localhost`


    `2015-07-14T22:54:08.483-0700 imported 15 documents`


    `c:\ practicalmongodb\bin>`


    ### 9.3.2 mongoexport


    Similar to the mongoimport utility, MongoDB provides a mongoexport utility that
    lets you export data from the MongoDB database. As the name suggests, this utility
    exports files from the existing MongoDB collections.


    Using `–help` shows available options with the mongoexport utility. The following
    options are the ones you will end up using most:


    *   `-q` : This is used to specify the query that will return as output the records
    that need to be exported. This is similar to what you specify in the `db.CollectionName.find()`
    function when you have to retrieve records matching the selection criteria. If
    no query is specified, all the documents are exported.

    *   `-f` : This is used to specify the fields that you need to export from the
    selected documents.


    The following command exports the data from `Users` collection to a CSV file:


    `c:\practicalmongodb\bin>` `mongoexport -d mydbpoc -c myusers -f _id,Age –type=csv
    > myusers.csv`


    `2015-07-14T22:54:48.604-0700 connected to: 127.0.0.1`


    `2015-07-14T22:54:48.604-0700 exported 22 records`


    `c:\practicalmongodb\bin>`


    ## 9.4 Managing the Server


    In this section, you will look at the various options that you need to be aware
    of as an administrator of the system.


    ### 9.4.1 Starting a Server


    This section covers how to start the server. Previously, you used the mongo shell
    to start the server by running `mongod.exe`.


    The MongoDB server can be started manually by opening a command prompt (run as
    administrator) in Windows or a terminal window on Linux systems and typing the
    following command:


    `C:\>cd c:\practicalmongodb\bin`


    `c:\ practicalmongodb\bin>mongod`


    `mongod --help for help and startup options`


    `.........................................`


    This window will display all the connections that are being made to the mongod.
    It also displays information that can be used to monitor the server.


    If no configuration is specified, MongoDB starts up with the default database
    path of `C:\data\db` on Windows and `/data/db` on Linux and binds to the localhost
    using default ports 27017 and 27018.


    Typing `^C` will shut down the server cleanly.


    MongoDB provides two methods for specifying configuration parameters for starting
    up the server.


    The first is to specify using command-line options (refer to Chapter tk).


    The second method is to load a configuration file. The server configuration can
    be changed by editing the file and then restarting the server.


    ### 9.4.2 Stopping a Server


    The server can be shut down pressing CTRL+C in the mongod console itself. Otherwise,
    you can use the `shutdownServer` command from the mongo console.


    Open a terminal window, and connect to the mongo console.


    `C:\>` `cd c:\practicalmongodb\bin`


    `c:\practicalmongodb\bin>` `mongo`


    `MongoDB shell version: 3.0.4`


    `connecting to: test`


    `>`


    Switch to admin db and issue the `shutdownServer` command:


    `>` `use admin`


    `switched to db admin`


    `>` `db.shutdownServer()`


    `2015-07-14T22:57:20.413-0700 I NETWORK DBClientCursor::init call() failed server
    should be down...`


    `2015-07-14T22:57:20.418-0700 I NETWORK trying reconnect to 127.0.0.1:27017`


    `2015-07-14T22:57:21.413-0700 I NETWORK 127.0.0.1:27017 failed couldn''t connect
    to server 127.0.0.1:27017`


    `>`


    If you check the mongod console where you started the server in the previous step,
    you will see that the server has been shut down successfully.


    `.......................`


    `2015-07-14T22:57:30.259-0700 I COMMAND [conn1] terminating, shutdown command
    received`


    `2015-07-14T22:57:30.260-0700 I CONTROL [conn1] now exiting`


    `.................................................`


    `2015-07-14T22:57:30.380-0700 I STORAGE [conn1] shutdown: removing fs lock...`


    `2015-07-14T22:57:30.380-0700 I CONTROL [conn1] dbexit: rc: 0`


    ### 9.4.3 Viewing Log Files


    By default the entire log output of MongoDB is written to `stdout` but this can
    be changed by specifying the logpath option in the configuration when starting
    the server to redirect the output to a file.


    The log file contents can be used to identify problems such as exceptions, which
    may indicate some data problem or connection issues.'
  trans: '# MongoDB 工具与服务器管理


    ### 9.3.1 `mongoimport`


    MongoDB 提供了 `mongoimport` 工具，允许你将数据批量加载到数据库的集合中。它从文件中读取数据并批量加载到集合。


    这些方法不适合生产环境。


    `mongoimport` 支持以下三种文件格式：


    *   JSON：在此格式中，每行一个 JSON 块，代表一个文档。

    *   CSV：这是一个逗号分隔的文件。

    *   TSV：TSV 文件与 CSV 文件相同；唯一的区别是它使用制表符作为分隔符。


    使用 `–help` 与 `mongoimport` 将提供该工具所有可用的选项。


    `mongoimport` 非常简单。大多数时候你会用到以下选项：


    *   `-h` 或 `–host`：指定需要恢复数据的 `mongod` 主机名。如果未指定该选项，命令将默认连接到在 `localhost` 的 `27017`
    端口上运行的 `mongod`。可选地，可以指定端口号以连接到在不同端口上运行的 `mongod`。

    *   `-d` 或 `–db`：指定需要导入数据的数据库。

    *   `-c` 或 `–collection`：指定需要上传数据的集合。

    *   `--type`：这是文件类型（即 CSV、TSV 或 JSON）。

    *   `--file`：这是需要导入数据的文件路径。

    *   `--drop`：如果设置了此选项，它将删除集合并从导入的数据中重新创建集合。否则，数据将附加到集合末尾。

    *   `--headerLine`：仅用于 CSV 或 TSV 文件，用于指示第一行是标题行。


    以下命令将数据从 CSV 文件导入到 `localhost` 上的 `testimport` 集合：


    ```

    c:\practicalmongodb\bin> mongoimport --host localhost --db mydbpoc --collection
    testimport --type csv –file c:\exporteg.csv –-headerline

    2015-07-14T22:54:08.407-0700 connected to: localhost

    2015-07-14T22:54:08.483-0700 imported 15 documents

    c:\ practicalmongodb\bin>

    ```


    ### 9.3.2 `mongoexport`


    与 `mongoimport` 工具类似，MongoDB 提供了 `mongoexport` 工具，用于从 MongoDB 数据库导出数据。顾名思义，此工具从现有的
    MongoDB 集合中导出文件。


    使用 `–help` 显示 `mongoexport` 工具的可用选项。以下是你最常使用的选项：


    *   `-q`：用于指定查询，该查询将返回需要导出的记录作为输出。这类似于在 `db.CollectionName.find()` 函数中指定的、用于检索符合选择条件的记录的查询。如果未指定查询，则导出所有文档。

    *   `-f`：用于指定需要从选定文档中导出的字段。


    以下命令将数据从 `Users` 集合导出到 CSV 文件：


    ```

    c:\practicalmongodb\bin> mongoexport -d mydbpoc -c myusers -f _id,Age –type=csv
    > myusers.csv

    2015-07-14T22:54:48.604-0700 connected to: 127.0.0.1

    2015-07-14T22:54:48.604-0700 exported 22 records

    c:\practicalmongodb\bin>

    ```


    ### 9.4 管理服务器


    在本节中，你将了解作为系统管理员需要了解的各种选项。


    ### 9.4.1 启动服务器


    本节介绍如何启动服务器。之前，你通过运行 `mongod.exe` 来使用 `mongo` shell 启动服务器。


    MongoDB 服务器可以通过在 Windows 中以管理员身份打开命令提示符或在 Linux 系统中打开终端窗口，并键入以下命令来手动启动：


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\ practicalmongodb\bin>mongod

    mongod --help for help and startup options

    .........................................

    ```


    此窗口将显示所有与 `mongod` 建立的连接。它还显示可用于监控服务器的信息。


    如果未指定配置，MongoDB 将使用默认数据库路径 `C:\data\db`（在 Windows 上）和 `/data/db`（在 Linux 上）启动，并使用默认端口
    `27017` 和 `27018` 绑定到 `localhost`。


    键入 `^C` 将干净地关闭服务器。


    MongoDB 提供了两种指定用于启动服务器的配置参数的方法。


    第一种是使用命令行选项指定（参考第 tk 章）。


    第二种方法是加载配置文件。可以通过编辑文件然后重新启动服务器来更改服务器配置。


    ### 9.4.2 停止服务器


    服务器可以通过在 `mongod` 控制台中按 `CTRL+C` 来关闭。或者，你可以使用 `mongo` 控制台中的 `shutdownServer` 命令。


    打开终端窗口，并连接到 `mongo` 控制台。


    ```

    C:\> cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin> mongo

    MongoDB shell version: 3.0.4

    connecting to: test

    >

    ```


    切换到 `admin` 数据库并发出 `shutdownServer` 命令：


    ```

    > use admin

    switched to db admin

    > db.shutdownServer()

    2015-07-14T22:57:20.413-0700 I NETWORK DBClientCursor::init call() failed server
    should be down...

    2015-07-14T22:57:20.418-0700 I NETWORK trying reconnect to 127.0.0.1:27017

    2015-07-14T22:57:21.413-0700 I NETWORK 127.0.0.1:27017 failed couldn''t connect
    to server 127.0.0.1:27017

    >

    ```


    如果你检查在上一步中启动服务器的 `mongod` 控制台，你将看到服务器已成功关闭。


    ```

    .......................

    2015-07-14T22:57:30.259-0700 I COMMAND [conn1] terminating, shutdown command received

    2015-07-14T22:57:30.260-0700 I CONTROL [conn1] now exiting

    .................................................

    2015-07-14T22:57:30.380-0700 I STORAGE [conn1] shutdown: removing fs lock...

    2015-07-14T22:57:30.380-0700 I CONTROL [conn1] dbexit: rc: 0

    ```


    ### 9.4.3 查看日志文件


    默认情况下，MongoDB 的所有日志输出都写入 `stdout`，但可以通过在启动服务器时指定配置中的 `logpath` 选项来更改，将输出重定向到文件。


    日志文件内容可用于识别问题，例如可能指示某些数据问题或连接问题的异常。'
- fmt: '### 9.4.4 Server Status


    `db.ServerStatus()` 是 MongoDB 提供的一个简单方法，用于检查服务器状态，例如连接数、运行时间等。服务器状态命令的输出取决于操作系统平台、MongoDB
    版本、使用的存储引擎以及配置类型（如独立实例、副本集和分片集群）。


    从 3.0 版本开始，输出中删除了以下部分：`workingSet`、`indexCounters` 和 `recordStats`。


    要使用 MMAPv1 存储引擎检查服务器状态，请连接到 mongo 控制台，切换到 admin 数据库，然后执行 `db.serverStatus()` 命令。


    ```

    c:\practicalmongodb\bin> mongo

    MongoDB shell version: 3.0.4

    connecting to: test

    > use admin

    switched to db admin

    > db.serverStatus()

    host" : "ANOC9",

    "version" : "3.0.4",

    "process" : "mongod",

    "pid" : NumberLong(1748),

    "uptime" : 14,

    "uptimeMillis" : NumberLong(14395),

    "uptimeEstimate" : 13,

    "localTime" : ISODate("2015-07-14T22:58:44.532Z"),

    "asserts" : {

    "regular" : 0,

    "warning" : 0,

    "msg" : 0,

    "user" : 1,

    "rollovers" : 0

    },

    .........................................................

    ```


    上述 `serverStatus` 输出还将包含一个 "backgroundflushing" 部分，其中显示 MongoDB 使用 MMAPv1 作为存储引擎将数据刷新到磁盘的相应进程报告。


    "opcounters" 和 "asserts" 部分提供了可用于分析任何问题的有用信息。


    "opcounters" 部分显示了每种类型的操作数。为了发现问题，你应该建立这些操作的基线。如果计数器开始偏离基线，则表明存在问题，需要采取措施使其恢复正常状态。


    "asserts" 部分描述了发生的客户端和服务器警告或异常的数量。如果你发现此类异常和警告增加，就需要仔细检查日志文件，以确定是否有问题正在发展。`asserts`
    数量的增加也可能表明数据存在问题，在这种情况下，应使用 MongoDB 的 `validate` 函数来检查数据是否未损坏。


    接下来，让我们使用 WiredTiger 存储引擎启动服务器，看看 `serverStatus` 输出。


    ```

    c:\practicalmongodb\bin> mongod –storageEngine wiredTiger

    2015-07-14T22:51:05.965-0700 I CONTROL Hotfix KB2731284 or later update is installed,
    no need to zero-out data files

    2015-07-29T22:51:05.965-0700 I STORAGE [initandlisten] wiredtiger_open config:
    create,cache_size=1G,session_max=20000,eviction=(threads_max=4),statistics=(fast),log=(enabled=true,archive=true,path=journal,compressor=snappy),file_manager=(close_idle_time=100000),checkpoint=(wait=60,log_size=2GB),statistics_log=(wait=0)

    ..................................................

    ```


    要检查服务器状态，请连接到 mongo 控制台，切换到 admin 数据库，然后执行 `db.serverStatus()` 命令。


    ```

    c:\practicalmongodb\bin> mongo

    MongoDB shell version: 3.0.4

    connecting to: test

    > use admin

    switched to db admin

    > db.serverStatus()

    "wiredTiger" : {

    "uri" : "statistics:",

    "LSM" : {

    "...........................................................,

    "tree maintenance operations scheduled":0,

    ............................................................,

    },

    "async" : {

    "number of allocation state races":0,

    "number of operation slots viewed for allocation":0,

    "current work queue length" : 0,

    "number of flush calls" : 0,

    "number of times operation allocation failed":0,

    "maximum work queue length" : 0,

    ............................................................,

    },

    "block-manager" : {

    "mapped bytes read" : 0,

    "bytes read" : 966656,

    "bytes written" : 253952,

    ...................................,

    "blocks written" : 45

    },

    ............................................................,

    ```


    正如你所看到的，当使用 WiredTiger 存储引擎启动时，服务器状态输出有一个名为 `wiredTiger` 统计信息的新部分。


    ### 9.4.5 Identifying and Repairing MongoDB


    在本节中，你将了解如何修复损坏的数据库。


    如果你遇到如下错误：


    *   数据库服务器拒绝启动，并指出数据文件已损坏

    *   日志文件或 `db.serverStatus()` 命令中出现 `asserts`

    *   查询结果出现奇怪或意外的情况


    这意味着数据库已损坏，必须运行修复程序以恢复数据库。


    在开始修复之前，你需要做的第一件事是使服务器离线（如果尚未离线）。你可以使用上述提到的任一选项。在此示例中，在 `mongod` 控制台中键入 `^C`，这将关闭服务器。


    接下来，使用 `–repair` 选项启动 `mongod`，如下所示：


    ```

    c:\practicalmongodb\bin> mongod --repair

    2015-07-14T22:58:31.171-0700 I CONTROL Hotfix KB2731284 or later update is installed,
    no need to zero-out data files

    2015-07-14T22:58:31.173-0700 I CONTROL [initandlisten] MongoDB starting : pid=3996
    port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9

    2015-07-14T22:58:31.174-0700 I CONTROL [initandlisten] db version v3.0.4

    .....................................

    2015-07-14T22:58:31.447-0700 I STORAGE [initandlisten] shutdown: removing fs lock...

    2015-07-14T22:58:31.449-0700 I CONTROL [initandlisten] dbexit: rc: 0

    c:\ practicalmongodb\bin>

    ```


    这将修复 `mongod`。如果你查看输出，会发现该实用程序正在修复的各种差异。修复过程结束后，它会退出。


    修复过程完成后，可以像正常一样启动服务器，然后使用最新的数据库备份来恢复丢失的数据。


    有时，你可能会注意到在修复大型数据库时，驱动器磁盘空间不足。这是因为 MongoDB 需要在与数据文件相同的驱动器上创建文件的临时副本。要解决此问题，在修复数据库时，应使用
    `–repairpath` 参数指定在修复过程中可以创建临时文件的驱动器。'
  raw: '### 9.4.4 Server Status


    `db.ServerStatus()` is a simple method provided by MongoDB for checking the server
    status, such as number of connections, uptime, and so on. The output of the server
    status command depends upon the operating system platform, MongoDB version, storage
    engine used, and type of configuration (like standalone, replica set, and sharded
    cluster).


    Starting from version 3.0, the following sections are removed from the output:
    workingSet, indexCounters, and recordStats.


    In order to check the status of a server using the MMAPv1 storage engine, connect
    to the mongo console, switch to admin db, and issue the `db.serverStatus()` command
    .


    `c:\practicalmongodb\bin>` `mongo`


    `MongoDB shell version: 3.0.4`


    `connecting to: test`


    `>` `use admin`


    `switched to db admin`


    `>` `db.serverStatus()`


    `host" : "ANOC9",`


    `"version" : "3.0.4",`


    `"process" : "mongod",`


    `"pid" : NumberLong(1748),`


    `"uptime" : 14,`


    `"uptimeMillis" : NumberLong(14395),`


    `"uptimeEstimate" : 13,`


    `"localTime" : ISODate("2015-07-14T22:58:44.532Z"),`


    `"asserts" : {`


    `"regular" : 0,`


    `"warning" : 0,`


    `"msg" : 0,`


    `"user" : 1,`


    `"rollovers" : 0`


    `},`


    `.........................................................`


    The above `serverStatus` output will also have a “backgroundflushing” section,
    which displays reports corresponding to the process used by MongoDB to flush data
    to disk using MMAPv1 as the storage engine.


    The "opcounters" and "asserts" sections provide useful information that can be
    analyzed to classify any problem.


    The “opcounters” section shows the number of operations of each type. In order
    to find out if there’s any problem, you should have a baseline of these operations.
    If the counters start deviating from the baseline, this indicates a problem and
    will require taking action to bring it back to the normal state.


    The “asserts” section depicts the number of client and server warnings or exceptions
    that have occurred. If you find a rise in such exceptions and warnings, you need
    to take a good look at the logfiles to identify if a problem is developing. A
    rise in the number of asserts may also indicate a problem with the data, and in
    such scenarios MongoDB validate functions should be used to check that the data
    is undamaged.


    Next, let’s start the server using the WiredTiger storage engine and see the serverStatus
    output.


    `c:\practicalmongodb\bin>` `mongod –storageEngine wiredTiger`


    `2015-07-14T22:51:05.965-0700 I CONTROL Hotfix KB2731284 or later update is installed,
    no need to zero-out data files`


    `2015-07-29T22:51:05.965-0700 I STORAGE [initandlisten] wiredtiger_open config:
    create,cache_size=1G,session_max=20000,eviction=(threads_max=4),statistics=(fast),log=(enabled=true,archive=true,path=journal,compressor=snappy),file_manager=(close_idle_time=100000),checkpoint=(wait=60,log_size=2GB),statistics_log=(wait=0)`


    `..................................................`


    In order to check the server status , connect to the mongo console, switch to
    admin db, and issue the `db.serverStatus()` command .


    `c:\practicalmongodb\bin>` `mongo`


    `MongoDB shell version: 3.0.4`


    `connecting to: test`


    `>` `use admin`


    `switched to db admin`


    `>` `db.serverStatus()`


    `"wiredTiger" : {`


    `"uri" : "statistics:",`


    `"LSM" : {`


    `"...........................................................,`


    `"tree maintenance operations scheduled":0,`


    `............................................................,`


    `},`


    `"async" : {`


    `"number of allocation state races":0,`


    `"number of operation slots viewed for allocation":0,`


    `"current work queue length" : 0,`


    `"number of flush calls" : 0,`


    `"number of times operation allocation failed":0,`


    `"maximum work queue length" : 0,`


    `............................................................,`


    `},`


    `"block-manager" : {`


    `"mapped bytes read" : 0,`


    `"bytes read" : 966656,`


    `"bytes written" : 253952,`


    `...................................,`


    `"blocks written" : 45`


    `},`


    `............................................................,`


    As you can see, the server status output has a new section known as wiredTiger
    statistics when started with storage engine WiredTiger.


    ### 9.4.5 Identifying and Repairing MongoDB


    In this section, you will look at how you can repair a corrupt database .


    If you are getting errors like


    *   Database server refuses to start, stating data files are corrupt

    *   Asserts are seen in the log files or `db.serverStatus()` command

    *   Strange or unexpected queries results


    this means the database is corrupt and a repair must be run in order to recover
    the database.


    The first thing you need to do before you can start the repair is to take the
    server offline if it’s not already. You can use either option mentioned above.
    In this example, type `^C` in the mongod console. This will shut down the server.


    Next, start the mongod using the `–repair` option, as shown:


    `c:\practicalmongodb\bin>` `mongod --repair`


    `2015-07-14T22:58:31.171-0700 I CONTROL Hotfix KB2731284 or later update is installed,
    no need to zero-out data files`


    `2015-07-14T22:58:31.173-0700 I CONTROL [initandlisten] MongoDB starting : pid=3996
    port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9`


    `2015-07-14T22:58:31.174-0700 I CONTROL [initandlisten] db version v3.0.4`


    `.....................................`


    `2015-07-14T22:58:31.447-0700 I STORAGE [initandlisten] shutdown: removing fs
    lock...`


    `2015-07-14T22:58:31.449-0700 I CONTROL [initandlisten] dbexit: rc: 0`


    `c:\ practicalmongodb\bin>`


    This will repair mongod. If you look at the output, you’ll find various discrepancies
    that the utility is repairing. Once the repair process is over, it exits.


    After completion of the repair process, the server can be started as normal and
    then the latest database backups can be used to restore missing data.


    At times, you may notice that the drive is running out of disk space when a large
    database is under repair. This is due to the fact that the MongoDB needs to create
    a temporary copy of the files on the same drive as the data files. To overcome
    this issue, while repairing a database you should use the `–repairpath` parameter
    to specify the drive where the temporary files can be created during the repair
    process.'
  trans: '

    ### 9.4.4 服务器状态


    `db.ServerStatus()` 是 MongoDB 提供的一个简单方法，用于检查服务器状态，例如连接数、运行时间等。服务器状态命令的输出取决于操作系统平台、MongoDB
    版本、使用的存储引擎以及配置类型（如独立实例、副本集和分片集群）。


    从 3.0 版本开始，输出中删除了以下部分：`workingSet`、`indexCounters` 和 `recordStats`。


    要使用 MMAPv1 存储引擎检查服务器状态，请连接到 mongo 控制台，切换到 admin 数据库，然后执行 `db.serverStatus()` 命令。


    ```

    c:\practicalmongodb\bin> mongo

    MongoDB shell version: 3.0.4

