    #### 6.1.8.3 Support for sort Operations


    In MongoDB, a sort operation that uses an indexed field to sort documents provides
    the greatest performance.


    As in other databases, indexes in MongoDB have an order due to this. If an index
    is used to access documents, it returns results in the same order as the index.


    A compound index needs to be created when sorting on multiple fields. In a compound
    index, the output can be in the sorted order of either an index prefix or the
    full index.


    The index prefix is a subset of the compound index, which contains one or more
    fields from the start of the index.


    For example, the following are the index prefix of the compound index: `{ x:1,
    y: 1, z: 1}`.


    The sort operation can be on any of the combinations of index prefix like `{x:
    1}, {x: 1, y: 1}`.


    A compound index can only help with sorting if it is a prefix of the sort.


    For example, a compound index on `Age` , `Name`, and `Class,` like


    `> db.testindx.ensureIndex({"Age": 1, "Name": 1, "Class": 1})`


    will be useful for the following queries:


    `> db.testindx.find().sort({"Age":1})`


    `> db.testindx.find().sort({"Age":1,"Name":1})`


    `> db.testindx.find().sort({"Age":1,"Name":1, "Class":1})`


    The above index won’t be of much help in the following query:


    `> db.testindx.find().sort({"Gender":1, "Age":1, "Name": 1})`


    You can diagnose how MongoDB is processing a query by using the `explain()` command.


    #### 6.1.8.4 Unique Index


    Creating index on a field doesn’t ensure uniqueness, so if an index is created
    on the `Name` field, then two or more documents can have the same names. However,
    if uniqueness is one of the constraints that needs to be enabled, the `unique`
    property needs to be set to true when creating the index.


    First, let’s drop the existing indexes.


    `>db.testindx.dropIndexes()`


    The following command will create a unique index on the `Name` field of the `testindx`
    collection:


    `> db.testindx.ensureIndex({"Name":1},{"unique":true})`


    Now if you try to insert duplicate names in the collection as shown below, MongoDB
    returns an error and does not allow insertion of duplicate records:


    `> db.testindx.insert({"Name":"uniquename"})`


    `> db.testindx.insert({"Name":"uniquename"})`


    `"E11000 duplicate key error index: mydbpoc.testindx.$Name_1 dup key: { : "uniquename"
    }"`


    If you check the collection, you’ll see that only the first `uniquename` was stored.


    `> db.testindx.find({"Name":"uniquename"})`


    `{ "_id" : ObjectId("52f4b3c3958073ea07f092ca"), "Name" : "uniquename" }`


    `>`


    Uniqueness can be enabled for compound indexes also, which means that although
    individual fields can have duplicate values, the combination will always be unique.


    For example, if you have a unique index on `{"name":1, "age":1}`,


    `> db.testindx.ensureIndex({"Name":1, "Age":1},{"unique":true})`


    `>`


    then the following inserts will be permissible:


    `> db.testindx.insert({"Name":"usercit"})`


    `> db.testindx.insert({"Name":"usercit", "Age":30})`


    However, if you execute


    `> db.testindx.insert({"Name":"usercit", "Age":30})`


    it’ll throw an error like


    `E11000 duplicate key error index: mydbpoc.testindx.$Name_1_Age_1 dup key: { :
    "usercit", : 30.0 }`


    You may create the collection and insert the documents first and then create an
    index on the collection. If you create a unique index on the collection that might
    have duplicate values in the fields on which the index is being created, the index
    creation will fail.


    To cater to this scenario, MongoDB provides a `dropDups` option. The `dropDups`
    option saves the first document found and remove any subsequent documents with
    duplicate values.


    The following command will create a unique index on the `name` field and will
    delete any duplicate documents:


    `>db.testindx.ensureIndex({"Name":1},{"unique":true, "dropDups":true})`


    `>`


    #### 6.1.8.5 system.indexes


    Whenever you create a database, by default a `system.indexes` collection is created.
    All of the information about a database’s indexes is stored in the `system.indexes`
    collection. This is a reserved collection, so you cannot modify its documents
    or remove documents from it. You can manipulate it only through `ensureIndex`
    and the `dropIndexes` database commands.


    Whenever an index is created, its meta information can be seen in `system.indexes`.
    The following command can be used to fetch all the index information about the
    mentioned collection:


    `db.collectionName.getIndexes()`


    For example, the following command will return all indexes created on the `testindx`
    collection:


    `> db.testindx.getIndexes()`


    #### 6.1.8.6 dropIndex


    The `dropIndex` command is used to remove the index.


    The following command will remove the `Name` field index from the `testindx` collection:


    `> db.testindx.dropIndex({"Name":1})`


    `{ "nIndexesWas" : 3, "ok" : 1 }`


    `>`'
  trans: "\n## 6.1.8.2 复合索引\n\n创建索引时，你需要记住索引应覆盖你的大多数查询。如果你有时只查询`Name`字段，而有时又同时查询`Name`和`Age`字段，那么创建一个在`Name`和`Age`字段上的复合索引，会比仅在其中一个字段上创建索引更有益，因为这个复合索引将覆盖这两种查询。\n\
    \n以下命令在集合`testindx`的字段`Name`和`Age`上创建一个复合索引。\n\n```\n> db.testindx.ensureIndex({\"\
    Name\":1, \"Age\": 1})\n```\n\n复合索引帮助 MongoDB 更高效地执行包含多个子句的查询。创建复合索引时，同样重要的是要记住，用于精确匹配的字段（例如\
    \ `Name` : `\"S1\"` ）应放在前面，随后是用于范围查询的字段（例如 `Age` : `{\"$gt\":20}`）。\n\n因此，上述索引将对以下查询有益：\n\
    \n```\n>db.testindx.find({\"Name\": \"user5\",\"Age\":{\"$gt\":25}}).explain(\"\
    allPlansExecution\")\n```\n\n```\n{\n    \"queryPlanner\" : {\n        \"plannerVersion\"\
    \ : 1,\n        \"namespace\" : \"mydbproc.testindx\",\n        \"indexFilterSet\"\
    \ : false,\n        \"parsedQuery\" : {\n            \"$and\" : [\n          \
    \      {\n                    \"Name\" : {\n                        \"$eq\" :\
    \ \"user5\"\n                    }\n                },\n                {\n  \
    \                  \"Age\" : {\n                        \"$gt\" : 25\n       \
    \             }\n                }\n            ]\n        },\n        \"winningPlan\"\
    \ : {\n            \"stage\" : \"KEEP_MUTATIONS\",\n            \"inputStage\"\
    \ : {\n                \"stage\" : \"FETCH\",\n                \"filter\" : {\n\
    \                    \"Age\" : {\n                        \"$gt\" : 25\n     \
    \               }\n                },\n                ............................\n\
    \                \"indexBounds\" : {\n                    \"Name\" : [\n     \
    \                   \"[\\\"user5\\\", \\\"user5\\\"\"\n                    }\n\
    \                },\n                \"rejectedPlans\" : [\n                 \
    \   {\n                        \"stage\" : \"FETCH\",\n                      \
    \  ......................................................\n                  \
    \      \"indexName\" : \"Name_1_Age_1\",\n                        \"isMultiKey\"\
    \ : false,\n                        \"direction\" : \"forward\",\n           \
    \             .....................................................\n        \
    \                \"executionStats\" : {\n                            \"executionSuccess\"\
    \ : true,\n                            \"nReturned\" : 1,\n                  \
    \          \"executionTimeMillis\" : 0,\n                            \"totalKeysExamined\"\
    \ : 1,\n                            \"totalDocsExamined\" : 1,\n             \
    \               .....................................................\n      \
    \                      \"inputStage\" : {\n                                \"\
    stage\" : \"FETCH\",\n                                \"filter\" : {\n       \
    \                             \"Age\" : {\n                                  \
    \      \"$gt\" : 25\n                                    }\n                 \
    \               },\n                                \"nReturned\" : 1,\n     \
    \                           \"executionTimeMillisEstimate\" : 0,\n           \
    \                     \"works\" : 2,\n                                \"advanced\"\
    \ : 1,\n                                \"allPlansExecution\" : [\n          \
    \                          {\n                                        \"nReturned\"\
    \ : 1,\n                                        \"executionTimeMillisEstimate\"\
    \ : 0,\n                                        \"totalKeysExamined\" : 1,\n \
    \                                       \"totalDocsExamined\" : 1,\n         \
    \                               \"executionStages\" : {\n                    \
    \                        .............................................................\n\
    \                                            \"serverInfo\" : {\n            \
    \                                    \"host\" : \" ANOC9\",\n                \
    \                                \"port\" : 27017,\n                         \
    \                       \"version\" : \"3.0.4\",\n                           \
    \                     \"gitVersion\" : \"534b5a3f9d10f00cd27737fbcd951032248b5952\"\
    \n                                            },\n                           \
    \                 \"ok\" : 1\n                                        }\n    \
    \                                }\n```\n\n## 6.1.8.3 支持排序操作\n\n在 MongoDB 中，使用索引字段对文档进行排序的操作能提供最佳性能。\n\
    \n与其他数据库类似，MongoDB 中的索引也具有顺序。如果使用索引来访问文档，它将按照与索引相同的顺序返回结果。\n\n当需要在多个字段上排序时，需要创建复合索引。在复合索引中，输出可以按照索引前缀或整个索引的排序顺序排列。\n\
    \n索引前缀是复合索引的一个子集，包含从索引开头的一个或多个字段。\n\n例如，复合索引 `{ x:1, y: 1, z: 1}` 的索引前缀如下所示。\n\
    \n排序操作可以是任何索引前缀的组合，例如 `{x: 1}` 或 `{x: 1, y: 1}`。\n\n复合索引只有当它是排序的前缀时，才能帮助排序。\n\n\
    例如，在 `Age` 、 `Name` 和 `Class` 上创建的复合索引，如下所示：\n\n```\n> db.testindx.ensureIndex({\"\
    Age\": 1, \"Name\": 1, \"Class\": 1})\n```\n\n将对以下查询有用：\n\n```\n> db.testindx.find().sort({\"\
    Age\":1})\n> db.testindx.find().sort({\"Age\":1,\"Name\":1})\n> db.testindx.find().sort({\"\
    Age\":1,\"Name\":1, \"Class\":1})\n```\n\n上述索引对以下查询帮助不大：\n\n```\n> db.testindx.find().sort({\"\
    Gender\":1, \"Age\":1, \"Name\": 1})\n```\n\n你可以使用`explain()`命令来诊断 MongoDB 如何处理查询。\n\
    \n## 6.1.8.4 唯一索引\n\n在某个字段上创建索引并不能保证唯一性，所以如果在`Name`字段上创建索引，那么两个或多个文档可以具有相同的名称。然而，如果需要启用唯一性约束，则在创建索引时需要将`unique`属性设置为`true`。\n\
    \n首先，让我们删除现有的索引。\n\n```\n>db.testindx.dropIndexes()\n```\n\n以下命令将在`testindx`集合的`Name`字段上创建一个唯一索引：\n\
    \n```\n> db.testindx.ensureIndex({\"Name\":1},{\"unique\":true})\n```\n\n现在，如果你尝试向集合中插入重复的名称，如下所示，MongoDB\
    \ 会返回错误并不允许插入重复记录：\n\n```\n> db.testindx.insert({\"Name\":\"uniquename\"})\n>\
    \ db.testindx.insert({\"Name\":\"uniquename\"})\n```\n\n```\n\"E11000 duplicate\
    \ key error index: mydbpoc.testindx.$Name_1 dup key: { : \"uniquename\" }\"\n\
    ```\n\n如果你检查集合，你会看到只有第一个`uniquename`被存储了。\n\n```\n> db.testindx.find({\"Name\"\
    :\"uniquename\"})\n{ \"_id\" : ObjectId(\"52f4b3c3958073ea07f092ca\"), \"Name\"\
    \ : \"uniquename\" }\n>\n```\n\n唯一性也可以为复合索引启用，这意味着虽然单个字段可以有重复值，但字段的组合将始终是唯一的。\n\
    \n例如，如果你在`{\"name\":1, \"age\":1}`上有一个唯一索引，\n\n```\n> db.testindx.ensureIndex({\"\
    Name\":1, \"Age\":1},{\"unique\":true})\n>\n```\n\n那么以下插入操作是被允许的：\n\n```\n> db.testindx.insert({\"\
    Name\":\"usercit\"})\n> db.testindx.insert({\"Name\":\"usercit\", \"Age\":30})\n\
    ```\n\n然而，如果你执行\n\n```\n> db.testindx.insert({\"Name\":\"usercit\", \"Age\":30})\n\
    ```\n\n它将抛出一个类似下面的错误\n\n```\nE11000 duplicate key error index: mydbpoc.testindx.$Name_1_Age_1\
    \ dup key: { : \"usercit\", : 30.0 }\n```\n\n你可能先创建集合并插入文档，然后在集合上创建索引。如果你在可能包含重复值的字段上为集合创建唯一索引，索引创建将会失败。\n\
    \n为了应对这种情况，MongoDB 提供了`dropDups`选项。`dropDups`选项会保存找到的第一个文档，并删除任何后续具有重复值的文档。\n\n\
    以下命令将在`name`字段上创建一个唯一索引，并删除任何重复的文档：\n\n```\n>db.testindx.ensureIndex({\"Name\"\
    :1},{\"unique\":true, \"dropDups\":true})\n>\n```\n\n## 6.1.8.5 system.indexes\n\
    \n每当你创建一个数据库时，默认会创建一个`system.indexes`集合。有关数据库索引的所有信息都存储在`system.indexes`集合中。这是一个保留集合，因此你不能修改或删除其中的文档。你只能通过`ensureIndex`和`dropIndexes`数据库命令来操作它。\n\
    \n每当创建一个索引时，其元信息可以在`system.indexes`中看到。可以使用以下命令获取指定集合的所有索引信息：\n\n```\ndb.collectionName.getIndexes()\n\
    ```\n\n例如，以下命令将返回在`testindx`集合上创建的所有索引：\n\n```\n> db.testindx.getIndexes()\n```\n\
    \n## 6.1.8.6 dropIndex\n\n`dropIndex`命令用于删除索引。\n\n以下命令将从`testindx`集合中删除`Name`字段的索引：\n\
    \n```\n> db.testindx.dropIndex({\"Name\":1})\n{ \"nIndexesWas\" : 3, \"ok\" :\
    \ 1 }\n>\n```\n"
- fmt: "## 6.1.8.7 `reIndex`\n\n当你在集合上执行了多次插入和删除操作后，可能需要重建索引，以便索引能够以最佳状态使用。`reIndex`\
    \ 命令用于重建索引。\n\n以下命令重建集合的所有索引。它会首先删除索引（包括 `_id` 字段上的默认索引），然后重建这些索引。\n\n```\ndb.collectionname.reIndex()\n\
    ```\n\n以下命令重建 `testindx` 集合的索引：\n\n```\n> db.testindx.reIndex()\n{\n    \"nIndexesWas\"\
    \ : 2,\n    \"msg\" : \"indexes dropped for collection\",\n    \"nIndexes\" :\
    \ 2,\n    ..............\n    \"ok\" : 1\n}\n>\n```\n\n我们将在下一章详细讨论 MongoDB 中可用的不同类型的索引。\n\
    \n## 6.1.8.8 索引如何工作\n\nMongoDB 将索引存储在 BTree 结构中，因此自动支持范围查询。\n\n如果在查询中使用了多个选择条件，MongoDB\
    \ 会尝试找到最佳的单一索引来选择候选集。之后，它会顺序遍历该集合以评估其他条件。\n\n当首次执行查询时，MongoDB 会为该查询可用的每个索引创建多个执行计划。它让这些计划轮流在一定数量的滴答（ticks）内执行，直到执行最快的计划完成。结果随后返回给系统，系统会记住最快执行计划所使用的索引。\n\
    \n对于后续查询，将使用记住的索引，直到集合内发生的更新次数达到某个特定限制。超过更新限制后，系统将再次遵循该过程以找出当时适用的最佳索引。\n\n当发生以下任一事件时，查询计划将重新评估：\n\
    \n*   集合接收到 1,000 次写操作。\n*   添加或删除了一个索引。\n*   `mongod` 进程重启。\n*   为重建索引而重新索引。\n\
    \n如果你想覆盖 MongoDB 的默认索引选择，可以使用 `hint()` 方法来实现。\n\n索引过滤器在 2.6 版本中引入。它由优化器将为查询评估的索引组成，包括查询、投影和排序。MongoDB\
    \ 将使用索引过滤器提供的索引，并忽略 `hint()`。\n\n在 2.6 版本之前，MongoDB 在任何时间点只使用一个索引，因此你需要确保存在复合索引以更好地匹配你的查询。这可以通过检查查询的排序和搜索条件来实现。\n\
    \n索引交集在 2.6 版本中引入。它支持通过满足复合条件的查询来交集索引，其中部分条件由一个索引满足，另一部分由另一个索引满足。\n\n通常，索引交集由两个索引组成；然而，可以使用多个索引交集来解析查询。这种能力提供了更好的优化。\n\
    \n与其他数据库一样，索引维护是有成本的。每个更改集合的操作（如创建、更新或删除）都会产生开销，因为索引也需要更新。为保持最佳平衡，你需要定期检查拥有索引的有效性，这可以通过系统上的读写比率来衡量。识别使用较少的索引并删除它们。\n\
    \n## 6.2 超越基础\n\n本节将涵盖使用条件操作符和正则表达式在选择器部分进行高级查询。这些操作符和正则表达式中的每一个都使你能够更好地控制所编写的查询，从而控制可以从\
