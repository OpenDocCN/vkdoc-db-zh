    "ok" : 1,

    }

    >

    ```


    这实际上是在 `students` 集合上应用你定义的 `map` 和 `reduce` 函数。最终结果存储在一个名为 `mapreducecount1`
    的新集合中。


    为了验证它，在 `mapreducecount1` 集合上运行 `find()` 命令，如下所示：


    ```

    > db.mapreducecount1.find()

    { "_id" : "F", "value" : 6 }

    { "_id" : "M", "value" : 9 }

    >

    ```


    这里还有一个例子来解释 `MapReduce` 的工作原理。让我们使用 `MapReduce` 来找出班级平均分。正如你在上面的例子中看到的，你需要先创建
    `map` 函数，然后是 `reduce` 函数，最后将它们组合起来，将输出存储在你数据库的一个集合中。代码片段如下：


    ```

    > var map_1 = function(){emit(this.Class,this.Score);};

    > var reduce_1 = function(key, value){return Array.avg(value);};

    > db.students.mapReduce(map_1,reduce_1, {out:"MR_ClassAvg_1"})

    {

    "result" : "MR_ClassAvg_1",

    "timeMillis" : 4,

    "counts" : {

    "input" : 15, "emit" : 15,

    "reduce" : 3 , "output" : 5

    },

    "ok" : 1,

    }

    > db.MR_ClassAvg_1.find()

    { "_id" : "Biology", "value" : 90 }

    { "_id" : "C1", "value" : 85 }

    { "_id" : "C2", "value" : 93 }

    { "_id" : "C3", "value" : 90 }

    { "_id" : "Chemistry", "value" : 90 }

    >

    ```

