    管理员可以决定忽略或应用回滚数据。应用回滚数据只能在所有节点与新主节点同步并回滚到一致状态后开始。


    可以使用`Bsondump`读取回滚文件的内容，然后需要使用`mongorestore`手动应用到新主节点上。


    对于 MongoDB，没有自动处理回滚情况的方法。因此，需要手动干预来应用回滚数据。在应用回滚时，至关重要的是确保这些数据被复制到所有或至少部分成员中，以便在发生任何故障转移时可以避免回滚。


    ### 7.4.2.7 一致性


