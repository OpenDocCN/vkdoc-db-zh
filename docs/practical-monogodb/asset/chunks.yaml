    \nFigure 9-12. `User time`\n\nTo view the `CPU Time` graphs you need to install\
    \ `munin`.\n\nThese key metrics and their combinations should be used to investigate\
    \ any performance problems.\n\n## 9.6 Summary\n\nIn this chapter you looked at\
    \ how various utilities that are packaged as part of the MongoDB distribution\
    \ can be used to manage and maintain the system.\n\nYou learned about the main\
