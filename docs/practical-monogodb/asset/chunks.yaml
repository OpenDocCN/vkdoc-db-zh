  trans: '

    ### 10.1.2.1 插入数据


    用于插入数据的方法取决于您的应用程序的写入关注级别。


    如果您追求快速的插入速度，并且可以在数据安全性上做出妥协，则可以使用以下命令：


    ```javascript

    db.perfpoc.insert({Host:"Host1", GeneratedOn: new ISODate("2015-07-15T12:02Z"),ParameterName:"CPU",Value:13.13},w=0)

    ```


    尽管此命令是可用的最快选项，但由于它不会等待操作是否成功的任何确认，您可能会面临丢失数据的风险。


    如果您只想要一个至少数据正在被保存的确认，您可以执行以下命令：


    ```javascript

    db.perfpoc.insert({Host:"Host1", GeneratedOn: new ISODate("2015-07-15T12:07Z"),ParameterName:"CPU",Value:13.23},w=1)

    ```


    尽管此命令确认了数据已保存，但它不会提供防止任何数据丢失的保护，因为它没有启用日志记录。


    如果您的主要关注点是在增加插入速度和数据安全保证之间进行权衡，您可以执行以下命令：


    ```javascript

    db.perfpoc.insert({Host:"Host1", GeneratedOn: new ISODate("2015-07-15T12:09Z"),ParameterName:"CPU",Value:30.01},j=true,w=2)

    ```


    在此代码中，您不仅确保数据正在被复制，还启用了日志记录。除了复制确认外，它还会等待成功的日志提交。


    **注意**

    虽然这是最安全的选项，但它对插入性能有严重影响，因此是最慢的操作。


    ### 10.1.2.2 批量插入


    在使用严格的写入关注级别时，批量插入事件总是有益的，正如您的情况，因为这使 MongoDB 能够将产生的性能损失分摊到一批插入中。


    如果可能，应使用批量插入来插入监控数据，因为数据量将会很大，并且在几秒钟内生成。将它们分组在一起作为一组进行插入会有更好的效果，因为在相同的等待时间内，多个事件将被保存。因此，对于此用例，您将使用批量插入将多个事件分组。


    ### 10.1.2.3 查询性能数据


    您已经看到了如何插入事件数据。维护数据的价值在于，您能够通过查询数据来响应特定的查询。


    例如，您可能希望查看与特定字段（例如 `Host`）关联的所有性能数据。


    您将查看一些用于获取数据的查询模式，然后了解如何优化这些操作。


    #### 查询 1：获取特定主机的性能数据


    ```javascript

    db.perfpoc.find({Host:"Host1"})

    ```

    ```

    { "_id" : ObjectId("553dc64009cb76075f6711f3"), "Host" : "Host1", "GeneratedOn":
    ISODate("2015-07-18T12:02:00Z"), "ParameterName" : "CPU", "Value" : 13.13 }

    { "_id" : ObjectId("553dc6cb4fd5989a8aa91b2d"), "Host" : "Host1", "GeneratedOn":
    ISODate("2015-07-18T12:07:00Z"), "ParameterName" : "CPU", "Value" : 13.23 }

    { "_id" : ObjectId("553dc7504fd5989a8aa91b2e"), "Host" : "Host1", "GeneratedOn":
    ISODate("2015-07-18T12:09:00Z"), "ParameterName" : "CPU", "Value" : 30.01 }

    ```

    如果需求是分析主机的性能，则可以使用此查询。


    在 `Host` 上创建索引将优化上述查询的性能：


    ```javascript

    db.perfpoc.ensureIndex({Host:1})

    ```


    #### 查询 2：获取 2015 年 7 月 10 日至 2015 年 7 月 20 日日期范围内的数据


    ```javascript

    db.perfpoc.find({GeneratedOn:{"$gte": ISODate("2015-07-10"), "$lte": ISODate("2015-07-20")}})

    ```

    ```

    { "_id" : ObjectId("5302fec509904770f56bd7ab"), "Host" : "Host1", "GeneratedOn"

    ...............

    ```

    如果您想要考虑和分析特定日期范围内收集的数据，这一点很重要。在这种情况下，"时间"上的索引将对性能产生积极影响。


    ```javascript

    db.perfpoc.ensureIndex({GeneratedOn:1})

    ```


    #### 查询 3：获取特定主机在 2015 年 7 月 10 日至 2015 年 7 月 20 日日期范围内的数据


    ```javascript

    db.perfpoc.find({GeneratedOn:{"$gte": ISODate("2015-07-10"), "$lte": ISODate("2015-07-20")},Host:
    "Host1"})

    ```

    ```

    { "_id" : ObjectId("5302fec509904770f56bd7ab"), "Host" : "Host1", "GeneratedOn"

    .................

    ```

    如果您想要查看特定时间段内主机的性能数据，此查询非常有用。


    在此类涉及多个字段的查询中，所使用的索引对性能有显著影响。例如，对于上述查询，创建复合索引将是有益的。


    还需注意复合索引中字段的顺序有影响。让我们通过一个示例来理解差异。创建如下复合索引：


    ```javascript

    db.perfpoc.ensureIndex({"GeneratedOn":1,"Host":1})

    ```

    接下来，对此进行解释：


    ```javascript

    db.perfpoc.find({GeneratedOn:{"$gte": ISODate("2015-07-10"), "$lte": ISODate("2015-07-20")},
    Host: "Host1"}).explain("allPlansExecution")

    ```

    ```

    .......................................................................

    "allPlansExecution" : [

    {

    "nReturned" : 4,

    "executionTimeMillisEstimate" : 0,

    "totalKeysExamined" : 4,

    "totalDocsExamined" : 4

    "indexName" : "GeneratedOn_1_Ho

    .......................................................................

    "isMultiKey" : false,

    "direction" : "forward",

    }]

    .......................................................................

    ```

    删除复合索引，如下所示：


    ```javascript

    db.perfpoc.dropIndexes()

    ```

    ```

    {

    "nIndexesWas" : 2,

    "msg" : "non-_id indexes dropped for collection",

    "ok" : 1

    }

    ```

    或者，创建字段顺序相反的复合索引：


    ```javascript

    db.perfpoc.ensureIndex({"Host":1,"GeneratedOn":1})

    ```

    进行解释：


    ```javascript

    db.perfpoc.find({GeneratedOn:{"$gte": ISODate("2015-07-10"), "$lte": ISODate("2015-07-20")},
    Host: "Host1"}).explain("allPlansExecution")

    ```

    ```

    .............................................

    "executionStats" : {

    "executionSuccess" : true,

    "nReturned" : 4,

    "executionTimeMillis" : 0,

    "totalKeysExamined" : 4,

    "totalDocsExamined" : 4,

    ......................................................

    "allPlansExecution" : [ ]

    ....................................................

    }

    ```

    您可以看到 `explain` 命令输出中的差异。


    使用 `explain()`，您可以弄清楚索引的影响，并据此根据您的应用程序使用情况决定索引策略。


    还建议使用覆盖最多查询的单个复合索引，而不是多个单键索引。


    根据您的应用程序使用情况和 `explain` 统计信息的结果，您将仅使用一个复合索引 `{''GeneratedOn'':1, ''Host'': 1}`
    来覆盖所有上述查询。


    #### 查询 4：按主机和日期获取性能数据的数量


    列出数据很好，但通常对性能数据执行查询是为了在分析时找出计数、平均值、总和或其他聚合操作。在这里，您将看到如何使用 `aggregate` 命令来选择、处理和聚合结果，以满足强大的临时查询需求。


    为了进一步解释这一点，让我们编写一个按月计数数据的查询：


    ```javascript

    db.perfpoc.aggregate(

    ... [

    ... {$project: {month_joined: {$month: "$GeneratedOn"}}},

    ... {$group: {_id: {month_joined: "$month_joined"}, number: {$sum:1}}},

    ... {$sort: {"_id.month_joined":1}}

    ... ]

    ... )

    ```

    ```

    { "_id" : { "month_joined" : 7 }, "number" : 4 }

    ```

    为了优化性能，您需要确保筛选字段有索引。您已经创建了一个覆盖相同内容的索引，因此在此场景中您无需创建任何额外的索引。

    '
- fmt: '### 10.1.3 Sharding


    The performance monitoring data set is humongous, so sooner or later it will exceed
    the capacity of a single server. As a result, you should consider using a shard
    cluster.


    In this section, you will look at which shard key suits your use case of performance
    data properly so that the load is distributed across the cluster and no one server
    is overloaded.


    The shard key controls how data is distributed and the resulting system’s capacity
    for queries and writes. Ideally, the shard key should have the following two characteristics:


    *   Insertions are balanced across the shard cluster.

    *   Most queries can be routed to a subset of shards to be satisfied.


    Let’s see which fields can be used for sharding.


    **Time field:** In choosing this option, although the data will be distributed
    evenly among the shards, neither the inserts nor the reads will be balanced. As
    in the case of performance data, the time field is in an upward direction, so
    all the inserts will end up going to a single shard and the write throughput will
    end up being same as in a standalone instance. Most reads will also end up on
    the same shard, assuming you are interested in viewing the most recent data frequently.


    **Hashes:** You can also consider using a random value to cater to the above situations;
    a hash of the `_id` field can be considered the shard key. Although this will
    cater to the write situation of the above (that is, the writes will be distributed),
    it will affect querying. In this case, the queries must be broadcasted to all
    the shards and will not be routable.


    **Use the key, which is evenly distributed, such as Host.** This has following
    advantages: if the query selects the `host` field, the reads will be selective
    and local to a single shard, and the writes will be balanced. However, the biggest
    potential drawback is that all data collected for a single host must go to the
    same chunk since all the documents in it have the same shard key. This will not
    be a problem if the data is getting collected across all the hosts, but if the
    monitoring collects a disproportionate amount of data for one host, you can end
    up with a large chunk that will be completely unsplittable, causing an unbalanced
    load on one shard.


    **Combining the best of options 2 and 3,** you can have a compound shard key,
    such as `{host:1, ssk: 1}` where `host` is the host field of the document and
    `ssk` is `_id` field’s hash value. In this case, the data is distributed largely
    by the `host` field making queries, accessing the `host` field local to either
    one shard or group of shards. At the same time, using `ssk` ensures that data
    is distributed evenly across the cluster. In most of the cases, such keys not
    only ensure ideal distribution of writes across the cluster but also ensure that
    queries access only the number of shards that are specific to them.


    Nevertheless, the best way is to analyze the application’s actual querying and
    insertions, and then select an appropriate shard key.


    ### 10.1.4 Managing the Data


    Since the performance data is humongous and it continues to grow, you can define
    a data retention policy which states that you will be maintaining the data for
    a specified period (say 6 months).


    So how do you remove the old data? You can use the following patterns:


    **Multiple collections to store the data:** The third pattern is to have a day-wise
    collection created, which contains documents that store that day’s performance
    data. This way you will end up having multiple collections within a database.
    Although this will complicate the querying (in order to fetch two days’ worth
    of data, you might need to read from two collections), dropping a collection is
    fast, and the space can be reused effectively without any data fragmentation.
    In your use case, you are using this pattern for managing the data.


    **Use a capped collection:** Although capped collections can be used to store
    the performance data, it is not possible to shard capped collections.


    **Use a TTL collection:** This pattern creates a collection similar to capped
    collection, but it can be sharded. In this case, a time-to-live index is defined
    on the collection, which enables MongoDB to periodically `remove()` old documents
    from the collection. However, this does not possess the performance advantage
    of the capped collection; in addition, the `remove()` may lead to data fragmentation.


    ## 10.2 Use Case 2 – Social Networking


    In this section, you will explore how to use MongoDB to store and retrieve data
    of a social networking site.


    This use case is basically a friendly social networking site that allows users
    to share their statuses and photos. The solution provided for this use case assumes
    the following:


    *   A user can choose whether or not to follow another user.

    *   A user can decide on the circle of users with whom he wants to share updates.
    The circle options are Friends, Friends of Friends, and Public.

    *   The updates allowed are status updates and photos.

    *   A user profile displays interests, gender, age, and relationship status.'
