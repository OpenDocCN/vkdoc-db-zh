    \ : 45, \"Gender\" : \"F\", \"Country\" : \"US\" }\n................\n{ \"_id\"\
    \ : ObjectId(\"52f48eeb74f8fdcfcae84f8c\"), \"Name\" : \"Test User18\", \"Age\"\
    \ : 28, \"Gender\" : \"F\", \"Country\" : \"India\" }\nType \"it\" for more\n\
    >\n```\n\n用户出现在集合中。在继续之前，让我们理解一下 “Type “it” for more” 这条语句。\n\n`find` 命令返回一个指向结果集的游标。它不会一次性在屏幕上显示所有文档（结果可能成千上万或数百万），而是先显示前\
    \ 20 个文档，然后等待迭代请求（输入 `it`）以显示接下来的 20 个，以此类推，直到整个结果集显示完毕。\n\n返回的游标也可以赋值给一个变量，然后使用\
    \ `while` 循环以编程方式遍历它。游标对象也可以作为数组进行操作。\n\n在你的例子中，如果输入 `it` 并按回车键，将显示以下内容：\n\n```\n\
    > it\n{ \"_id\" : ObjectId(\"52f48eeb74f8fdcfcae84f8d\"), \"Name\" : \"Test User19\"\
    , \"Age\" : 29, \"Gender\" : \"F\", \"Country\" : \"India\" }\n{ \"_id\" : ObjectId(\"\
    52f48eeb74f8fdcfcae84f8e\"), \"Name\" : \"Test User20\", \"Age\" : 30, \"Gender\"\
    \ : \"F\", \"Country\" : \"India\" }\n>\n```\n\n由于只剩两个文档，所以它显示了剩余的两个文档。\n\n###\
    \ 6.1.4 通过显式指定 `_id` 插入\n\n在之前的插入示例中，`_id` 字段未被指定，因此是隐式添加的。在下面的例子中，你将看到在向集合插入文档时如何显式指定\
    \ `_id` 字段。\n\n显式指定 `_id` 字段时，必须牢记该字段的唯一性；否则插入操作将失败。\n\n以下命令显式指定了 `_id` 字段：\n\n\
    ```\n> db.users.insert({\"_id\":10, \"Name\": \"explicit id\"})\n```\n\n插入操作在\
    \ `users` 集合中创建了如下文档：\n\n```json\n{ \"_id\" : 10, \"Name\" : \"explicit id\" }\n\
    ```\n\n这可以通过执行以下命令来确认：\n\n```\n>db.users.find()\n```\n"
- fmt: "### 6.1.5 Update\n\n在本节中，你将学习`update()`命令，该命令用于更新集合中的文档。\n\n`update()`方法默认更新单个文档。如果需要更新所有符合选择条件的文档，可以通过将`multi`选项设置为`true`来实现。\n\
    \n我们从更新现有列的值开始。`$set`操作符将用于更新记录。\n\n以下命令将所有女性用户的国家更新为英国：\n```\n> db.users.update({\"\
    Gender\":\"F\"}, {$set:{\"Country\":\"UK\"}})\n```\n\n要检查更新是否已发生，可以使用`find`命令检查所有女性用户：\n\
    ```\n> db.users.find({\"Gender\":\"F\"})\n{ \"_id\" : ObjectId(\"52f48cfb74f8fdcfcae84f7a\"\
    ), \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\" : \"F\", \"Country\" : \"\
    UK\" }\n{ \"_id\" : ObjectId(\"52f48eeb74f8fdcfcae84f7b\"), \"Name\" : \"Test\
    \ User1\", \"Age\" : 11, \"Gender\" : \"F\", \"Country\" : \"India\" }\n{ \"_id\"\
    \ : ObjectId(\"52f48eeb74f8fdcfcae84f7c\"), \"Name\" : \"Test User2\", \"Age\"\
    \ : 12, \"Gender\" : \"F\", \"Country\" : \"India\" }\n...................\nType\
    \ \"it\" for more\n>\n```\n\n检查输出，你会发现只有第一条文档记录被更新了，这是`update`命令的默认行为，因为没有指定`multi`选项。\n\
    \n现在，让我们修改`update`命令并包含`multi`选项：\n```\n>db.users.update({\"Gender\":\"F\"},{$set:{\"\
    Country\":\"UK\"}},{multi:true})\n>\n```\n\n再次执行`find`命令，检查所有女性员工的国家是否都已更新。执行`find`命令将返回以下输出：\n\
    ```\n> db.users.find({\"Gender\":\"F\"})\n{ \"_id\" : ObjectId(\"52f48cfb74f8fdcfcae84f7a\"\
    ), \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\" : \"F\", \"Country\" : \"\
    UK\" }\n..............\nType \"it\" for more\n>\n```\n\n如你所见，所有符合条件的记录中国家字段都已更新为英国。\n\
    \n在实际应用中，你可能会遇到模式演变的情况，需要向文档中添加或移除字段。下面看看如何在MongoDB数据库中执行这些更改。\n\n`update()`操作可以在文档级别使用，这有助于更新集合中的单个文档或一组文档。\n\
    \n接下来，我们看看如何向文档添加新字段。要向文档添加字段，可以结合使用带`$set`操作符和`multi`选项的`update()`命令。\n\n如果你使用的字段名在`$set`中不存在，那么该字段将被添加到文档中。以下命令将向所有文档添加`company`字段：\n\
    ```\n> db.users.update({},{$set:{\"Company\":\"TestComp\"}},{multi:true})\n>\n\
    ```\n\n对用户集合执行`find`命令，你会发现新字段已添加到所有文档中。\n```\n> db.users.find()\n{ \"Age\" :\
    \ 30, \"Company\" : \"TestComp\", \"Country\" : \"US\", \"FName\" : \"Test\",\
    \ \"Gender\" : \"M\", \"LName\" : \"User\", \"_id\" : ObjectId(\"52f48cf474f8fdcfcae84f79\"\
    ) }\n{ \"Age\" : 45, \"Company\" : \"TestComp\", \"Country\" : \"UK\", \"Gender\"\
    \ : \"F\", \"Name\" : \"Test User\", \"_id\" : ObjectId(\"52f48cfb74f8fdcfcae84f7a\"\
    ) }\n{ \"Age\" : 11, \"Company\" : \"TestComp\", \"Country\" : \"UK\", \"Gender\"\
    \ : \"F\", ....................\nType \"it\" for more\n>\n```\n\n如果`update()`命令中指定的字段在文档中已存在，它将更新该字段的值；如果该字段不存在，则会将该字段添加到文档中。\n\
    \n接下来，你将看到如何使用相同的`update()`命令配合`$unset`操作符从文档中移除字段。\n\n以下命令将从所有文档中移除`Company`字段：\n\
    ```\n> db.users.update({},{$unset:{\"Company\":\"\"}},{multi:true})\n>\n```\n\n\
    可以通过对`Users`集合执行`find()`命令来验证。你可以看到`Company`字段已从文档中删除。\n```\n> db.users.find()\n\
    { \"Age\" : 30, \"Country\" : \"US\", \"FName\" : \"Test\", \"Gender\" : \"M\"\
    , \"LName\" : \"User\", \"_id\" : ObjectId(\"52f48cf474f8fdcfcae84f79\") }\n.............\n\
    Type \"it\" for more\n```\n\n### 6.1.6 Delete\n\n要删除集合中的文档，请使用`remove()`方法。如果指定了选择条件，则仅删除符合条件的文档。如果未指定条件，则所有文档都将被删除。\n\
    \n以下命令将删除`Gender = 'M'`的文档：\n```\n> db.users.remove({\"Gender\":\"M\"})\n>\n```\n\
    \n可以通过在`Users`上执行`find()`命令进行验证：\n```\n> db.users.find({\"Gender\":\"M\"})\n>\n\
    ```\n没有文档返回。\n\n以下命令将删除所有文档：\n```\n> db.users.remove({})\n> db.users.find()\n\
    >\n```\n如你所见，没有文档返回。\n\n最后，如果你想删除整个集合，可以使用以下命令：\n```\n> db.users.drop()\ntrue\n\
    >\n```\n\n为了验证集合是否已被删除，可以执行`show collections`命令。\n```\n> show collections\nsystem.indexes\n\
    >\n```\n如你所见，集合名称没有显示，这确认了该集合已从数据库中移除。\n\n在介绍了基本的创建、更新和删除操作之后，下一节将展示如何执行读取操作。\n\
    \n### 6.1.7 Read\n\n在本章的这一部分，你将通过各种示例了解MongoDB提供的查询功能，这些功能使你能够从数据库中读取存储的数据。\n\n\
    为了从基本查询开始，首先使用`insert`命令创建`users`集合并插入数据。\n```\n> user1 = {FName: \"Test\", LName:\
    \ \"User\", Age:30, Gender: \"M\", Country: \"US\"}\n{\n    \"FName\" : \"Test\"\
    ,\n    \"LName\" : \"User\",\n    \"Age\" : 30,\n    \"Gender\" : \"M\",\n   \
    \ \"Country\" : \"US\"\n}\n> user2 = {Name: \"Test User\", Age:45, Gender: \"\
    F\", Country: \"US\"}\n{ \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\" :\
    \ \"F\", \"Country\" : \"US\" }\n> db.users.insert(user1)\n> db.users.insert(user2)\n\
    > for(var i=1; i<=20; i++) db.users.insert({\"Name\" : \"Test User\" + i, \"Age\"\
    : 10+i, \"Gender\" : \"F\", \"Country\" : \"India\"})\n```\n\n现在开始基本查询。`find()`命令用于从数据库中检索数据。\n\
    \n执行`find()`命令会返回集合中的所有文档。\n```\n> db.users.find()\n{ \"_id\" : ObjectId(\"52f4a823958073ea07e15070\"\
    ), \"FName\" : \"Test\", \"LName\" : \"User\", \"Age\" : 30, \"Gender\" : \"M\"\
    , \"Country\" : \"US\" }\n{ \"_id\" : ObjectId(\"52f4a826958073ea07e15071\"),\
    \ \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\" : \"F\", \"Country\" : \"\
    US\" }\n......\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15083\"), \"Name\" :\
    \ \"Test User18\", \"Age\" :28, \"Gender\" : \"F\", \"Country\" : \"India\" }\n\
    Type \"it\" for more\n>\n```\n\n#### 6.1.7.1 Query Documents\n\nMongoDB提供了丰富的查询系统。可以将查询文档作为参数传递给`find()`方法，以过滤集合中的文档。\n\
    \n查询文档在花括号`{`和`}`内指定。在返回结果集之前，查询文档会与集合中的所有文档进行匹配。\n\n使用不带查询文档的`find()`命令或使用空查询文档（如`find({}`）将返回集合中的所有文档。\n\
    \n查询文档可以包含选择器和投影器。\n\n选择器类似于SQL中的`where`条件或过滤器，用于过滤结果。\n\n投影器类似于`select`条件或选择列表，用于显示数据字段。"
  raw: '### 6.1.5 Update


    In this section, you will explore the `update()` command, which is used to update
    the documents in a collection.


    The `update()` method updates a single document by default. If you need to update
    all documents that match the selection criteria, you can do so by setting the
    `multi` option as true.


    Let’s begin by updating the values of existing columns. The `$set` operator will
    be used for updating the records.


    The following command updates the country to UK for all female users:


    `> db.users.update({"Gender":"F"}, {$set:{"Country":"UK"}})`


    To check whether the update has happened, issue a `find` command to check all
    the female users.


    `> db.users.find({"Gender":"F"})`


    `{ "_id" : ObjectId("52f48cfb74f8fdcfcae84f7a"), "Name" : "Test User", "Age" :
    45`


    `, "Gender" : "F", "Country" : "UK" }`


    `{ "_id" : ObjectId("52f48eeb74f8fdcfcae84f7b"), "Name" : "Test User1", "Age"
    : 11, "Gender" : "F", "Country" : "India" }`


    `{ "_id" : ObjectId("52f48eeb74f8fdcfcae84f7c"), "Name" : "Test User2", "Age"
    : 12, "Gender" : "F", "Country" : "India" }`


    `...................`


    `Type "it" for more`


    `>`


    If you check the output, you will see that only the first document record is updated,
    which is the default behavior of update since no `multi` option was specified.


    Now let’s change the `update` command and include the `multi` option:


    `>db.users.update({"Gender":"F"},{$set:{"Country":"UK"}},{multi:true})`


    `>`


    Issue the `find` command again to check whether the country has been updated for
    all the female employees or not. Issuing the `find` command will return the following
    output:


    `> db.users.find({"Gender":"F"})`


    `{ "_id" : ObjectId("52f48cfb74f8fdcfcae84f7a"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "UK" }`


    `..............`


    `Type "it" for more`


    `>`


    As you can see, the country is updated to UK for all records that matched the
    criteria.


    When working in a real-world application, you may come across a schema evolution
    where you might end up adding or removing fields from the documents. Let’s see
    how to perform these alterations in the MongoDB database.


    The `update()` operations can be used at the document level, which helps in updating
    either a single document or set of documents within a collection.


    Next, let’s look at how to add new fields to the documents. In order to add fields
    to the document, use the `update()` command with the `$set` operator and the `multi`
    option.


    If you use a field name with `$set` , which is non-existent, then the field will
    be added to the documents. The following command will add the field `company`
    to all the documents:


    `> db.users.update({},{$set:{"Company":"TestComp"}},{multi:true})`


    `>`


    Issuing `find` command against the user’s collection, you will find the new field
    added to all documents.


    `> db.users.find()`


    `{ "Age" : 30, "Company" : "TestComp", "Country" : "US", "FName" : "Test", "Gender"
    : "M", "LName" : "User", "_id" : ObjectId("52f48cf474f8fdcfcae84f79") }`


    `{ "Age" : 45, "Company" : "TestComp", "Country" : "UK", "Gender" : "F", "Name"
    : "Test User", "_id" : ObjectId("52f48cfb74f8fdcfcae84f7a") }`


    `{ "Age" : 11, "Company" : "TestComp", "Country" : "UK", "Gender" : "F", ....................`


    `Type "it" for more`


    `>`


    If you execute the `update()` command with fields existing in the document, it
    will update the field’s value; however, if the field is not present in the document,
    then the field will be added to the documents.


    You will next see how to use the same `update()` command with the `$unset` operator
    to remove fields from the documents.


    The following command will remove the field `Company` from all the documents:


    `> db.users.update({},{$unset:{"Company":""}},{multi:true})`


    `>`


    This can be checked by issuing the `find()` command against the `Users` collection.
    You can see that the `Company` field has been deleted from the documents.


    `> db.users.find()`


    `{ "Age" : 30, "Country" : "US", "FName" : "Test", "Gender" : "M", "LName" : "User",
    "_id" : ObjectId("52f48cf474f8fdcfcae84f79") }`


    `.............`


    `Type "it" for more`


    ### 6.1.6 Delete


    To delete documents in a collection, use the `remove ()` method . If you specify
    a selection criterion, only the documents meeting the criteria will be deleted.
    If no criteria is specified, all of the documents will be deleted.


    The following command will delete the documents where Gender = ‘M’:


    `> db.users.remove({"Gender":"M"})`


    `>`


    The same can be verified by issuing the `find()` command on `Users` :


    `> db.users.find({"Gender":"M"})`


    `>`


    No documents are returned.


    The following command will delete all documents:


    `> db.users.remove({})`


    `> db.users.find()`


    `>`


    As you can see, no documents are returned.


    Finally, if you want to drop the collection, the following command will drop the
    collection:


    `> db.users.drop()`


    `true`


    `>`


    In order to validate whether the collection is dropped or not, issue the `show
    collections` command.


    `> show collections`


    `system.indexes`


    `>`


    As you can see, the collection name is not displayed, confirming that the collection
    has been removed from the database.


    Having covered the basic Create, Update, and Delete operations, the next section
    will show you how to perform Read operations.


    ### 6.1.7 Read


    In this part of the chapter, you will look at various examples illustrating the
    querying functionality available as part of MongoDB that enables you to read the
    stored data from the database.


    In order to start with basic querying, first create the `users` collection and
    insert data following the `insert` command.


    `> user1 = {FName: "Test", LName: "User", Age:30, Gender: "M", Country: "US"}`


    `{`


    `"FName" : "Test",`


    `"LName" : "User",`


    `"Age" : 30,`


    `"Gender" : "M",`


    `"Country" : "US"`


    `}`


    `> user2 = {Name: "Test User", Age:45, Gender: "F", Country: "US"}`


    `{ "Name" : "Test User", "Age" : 45, "Gender" : "F", "Country" : "US" }`


    `> db.users.insert(user1)`


    `> db.users.insert(user2)`


    `> for(var i=1; i<=20; i++) db.users.insert({"Name" : "Test User" + i, "Age":
    10+i, "Gender" : "F", "Country" : "India"})`


    Now let’s start with basic querying. The `find()` command is used to retrieve
    data from the database.


    Firing a `find()` command returns all the documents wi thin the collection.


    `> db.users.find()`


    `{ "_id" : ObjectId("52f4a823958073ea07e15070"), "FName" : "Test", "LName" : "User",
    "Age" : 30, "Gender" : "M", "Country" : "US" }`


    `{ "_id" : ObjectId("52f4a826958073ea07e15071"), "Name" : "Test User", "Age" :
    45, "Gender" : "F", "Country" : "US" }`


    `......`


    `{ "_id" : ObjectId("52f4a83f958073ea07e15083"), "Name" : "Test User18", "Age"
    :28, "Gender" : "F", "Country" : "India" }`


    `Type "it" for more`


    `>`


    #### 6.1.7.1 Query Documents


    A rich query system is provided by MongoDB. Query documents can be passed as a
    parameter to the `find()` method to filter documents within a collection.


    A query document is specified within open “{” and closed “}” curly braces. A query
    document is matched against all of the documents in the collection before returning
    the result set.


    Using the `find()` command without any query document or an empty query document
    such as `find({})` returns all the documents within the collection.


    A query document can contain selectors and projectors.


    A selector is like a where condition in SQL or a filter that is used to filter
    out the results.


    A projector is like the select condition or the selection list that is used to
    display the data fields.'
