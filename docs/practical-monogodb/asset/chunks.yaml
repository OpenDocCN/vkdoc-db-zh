    You have started the server with `bind_ip`, which has one value set as 127.0.0.1,
    which is the localhost interface.


    The `bind_ip` limits the network interfaces of the incoming connections for which
    the program will listen. Comma-separated IP addresses can be specified. In your
    case, you have restricted the mongod to listen to only the localhost interface.


    When the mongod instance is started, by default it waits for any incoming connection
    on port 27017\. You can change this using `–port`.


    Just changing the port does not reduce the risk much. In order to completely secure
    the environment, you need to allow only trusted clients to connect to the port
    using firewall settings.


    Changing this port also changes the HTTP status interface port, which by default
    is 28017\. This port is available on a port that is X+1000, where X represents
    the connection port.


    This web page exposes diagnostic and monitoring information , which includes operational
    data, a variety of logs, and status reports regarding the database instances.
    It provides management-level statistics that can be used for administration purpose.
    This page is by default read-only; to make it fully interactive, you will use
    the REST settings. This configuration makes the page fully interactive, helping
    the administrators troubleshoot any performance issues. Only trusted client access
    should be allowed on this port using firewalls.


    It is recommended to disable the HTTP Status page as well as the REST configuration
    in the production environment.


    #### 5.7.2.1 Use Firewalls


    Firewalls are used to control access within a network. They can be used to allow
    access from a specific IP address to specific IP ports, or to stop any access
    from any untrusted hosts. They can be used to create a trusted environment for
    your mongod instance where you can specify what IP addresses or hosts can connect
    to which ports or interfaces of the mongod.


    On the Windows platform, use `netsh` to configure the incoming traffic for port
    27017:


    `C:\>` `netsh advfirewall firewall add rule name="Open mongod port 27017" dir=in
    action=allow protocol=TCP localport=27017`


    `Ok.`


    `C:\>`


    This code says that all of the incoming traffic is allowed on port 27017, so any
    application servers can connect to the mongod.


    #### 5.7.2.2 Encrypting Data


    You have seen that MongoDB stores all its data in a data directory that in Windows
    defaults to `C:\data\db` and `/data/db` in Linux. The files are stored unencrypted
    in the directory because there’s no provisioning of methods for automatically
    encrypting the files in Mongo. Any attacker with file system access can read the
    data stored in the files. It’s the application’s responsibility to ensure that
    sensitive information is encrypted before it’s written to the database.


    Additionally, operating system-level mechanisms such as file system-level encryption
    and permissions should be implemented in order to prevent unauthorized access
    to the files.'
