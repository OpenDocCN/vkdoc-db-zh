- fmt: '### 7.4.3 MongoDB Replica Sets


    #### 7.4.3.2 Removing a Server


    In this example, you will remove the secondary active member from the set. Let’s
    connect to the secondary member mongo instance. Open a new command prompt, like
    so:


    ```

    C:\>cd c:\practicalmongodb\bin

    c:\practicalmongodb\bin>mongo ANOC9 --port 27022

    MongoDB shell version: 3.0.4

    connecting to: 127.0.0.1:27022/ANOC9

    testset:SECONDARY>

    ```


    Issue the following command to shut down the instance:


    ```

    testset:SECONDARY> use admin

    switched to db admin

    testset:SECONDARY> db.shutdownServer()

    2015-07-13T21:48:59.009-0700 I NETWORK DBClientCursor::init call() failed server
    should be down...

    ```


    Next, you need to connect to the primary member mongo console and execute the
    following to remove the member:


    ```

    testset:PRIMARY> use admin

    switched to db admin

    testset:PRIMARY> rs.remove("ANOC9:27022")

    { "ok" : 1 }

    testset:PRIMARY>

    ```


    In order to vet whether the member is removed or not you can issue the `rs.status()`
    command.


    #### 7.4.3.3 Adding a Server


    You will next add a new active member to the replica set. As with other members,
    you begin by opening a new command prompt and creating the `data` directory first:


    ```

    C:\>mkdir C:\db1\active3\data

    C:\>

    ```


    Next, you start the `mongod` using the following command:


    ```

    c:\practicalmongodb\bin>mongod --dbpath C:\db1\active3\data --port 27024 --replSet
    testset/ANOC9:27021 --rest

    ..........

    ```


    You have the new `mongod` running, so now you need to add this to the replica
    set. For this you connect to the primary’s mongo console:


    ```

    C:\>c:\practicalmongodb\bin\mongo.exe --port 27021

    MongoDB shell version: 3.0.4

    connecting to: 127.0.0.1:27021/test

    testset:PRIMARY>

    ```


    Next, you switch to the `admin` db:


    ```

    testset:PRIMARY> use admin

    switched to db admin

    testset:PRIMARY>

    ```


    Finally, the following command needs to be issued to add the new `mongod` to the
    replica set:


    ```

    testset:PRIMARY> rs.add("ANOC9:27024")

    { "ok" : 1 }

    ```


    The replica set status can be checked to vet whether the new active member is
    added or not using `rs.status()`.


    #### 7.4.3.4 Adding an Arbiter to a Replica Set


    In this example, you will add an arbiter member to the set. As with the other
    members, you begin by creating the `data` directory for the MongoDB instance:


    ```

    C:\>mkdir c:\db1\arbiter\data

    C:\>

    ```


    You next start the `mongod` using the following command:


    ```

    c:\practicalmongodb\bin>mongod --dbpath c:\db1\arbiter\data --port 30000 --replSet
    testset/ANOC9:27021 --rest

    2015-07-13T22:05:10.205-0700 I CONTROL [initandlisten] MongoDB starting : pid=3700
    port=30000 dbpath=c:\db1\arbiter\data 64-bit host=ANOC9

    ..........................................................

    ```


    Connect to the primary’s mongo console, switch to the `admin` db, and add the
    newly created `mongod` as an arbiter to the replica set:


    ```

    C:\>c:\practicalmongodb\bin\mongo.exe --port 27021

    MongoDB shell version: 3.0.4

    connecting to: 127.0.0.1:27021/test

    testset:PRIMARY> use admin

    switched to db admin

    testset:PRIMARY> rs.addArb("ANOC9:30000")

    { "ok" : 1 }

    testset:PRIMARY>

    ```


    Whether the step is successful or not can be verified using `rs.status()`.


    #### 7.4.3.5 Inspecting the Status Using `rs.status()`


    We have been referring to `rs.status()` throughout the examples above to check
    the replica set status. In this section, you will learn what this command is all
    about.


    It enables you to check the status of the member whose console they are connected
    to and also enables them to view its role within the replica set.


    The following command is issued from the primary’s mongo console:


    ```

    testset:PRIMARY> rs.status()

    {

    "set" : "testset",

    "date" : ISODate("2015-07-13T22:15:46.222Z")

    "myState" : 1,

    "members" : [

    {

    "_id" : 0,

    ...........................

    "ok" : 1

    testset:PRIMARY>

    ```


    The `myState` field’s value indicates the status of the member and it can have
    the values shown in Table 7-3.


    Table 7-3. Replica Set Status


    | myState | Description |

    | --- | --- |

    | 0 | Phase 1, starting up |

    | 1 | Primary member |

    | 2 | Secondary member |

    | 3 | Recovering state |

    | 4 | Fatal error state |

    | 5 | Phase 2, Starting up |

    | 6 | Unknown state |

    | 7 | Arbiter member |

    | 8 | Down or unreachable |

    | 9 | This state is reached when a write operation is rolled back by the secondary
    after transitioning from primary. |

    | 10 | Members enter this state when removed from the replica set. |


    Hence the above command returns `myState` value as 1, which indicates that this
    is the primary member.


    #### 7.4.3.6 Forcing a New Election


    The current primary server can be forced to step down using the `rs.stepDown()`
    command. This force starts the election for a new primary.


    This command is useful in the following scenarios:


    *   When you are simulating the impact of a primary failure, forcing the cluster
    to fail over. This lets you test how your application responds in such a scenario.

    *   When the primary server needs to be offline. This is done for either a maintenance
    activity or for upgrading or to investigating the server.

    *   When a diagnostic process need to be run against the data structures.


    The following is the output of the command when run against the `testset` replica
    set:


    ```

    testset:PRIMARY> rs.stepDown()

    2015-07-13T22:52:32.000-0700 I NETWORK DBClientCursor::init call() failed

    2015-07-13T22:52:32.005-0700 E QUERY Error: error doing query: failed

    2015-07-13T22:52:32.009-0700 I NETWORK trying reconnect to 127.0.0.1:27021 (127.0.0.1)
    failed

    2015-07-13T22:52:32.011-0700 I NETWORK reconnect 127.0.0.1:27021 (127.0.0.1) ok
    testset:SECONDARY>

    ```


    After execution of the command the prompt changed from `testset:PRIMARY` to `testset:SECONDARY`.


    `rs.status()` can be used to check whether the `stepDown()` is successful or not.


    Please note the `myState` value it returns is 2 now, which means the “Member is
    operating as secondary.”


    #### 7.4.3.7 Inspecting Status of the Replica Set Using a Web Interface


    A web-based console is maintained by MongoDB for viewing the system status. In
    your example, the console can be accessed via `http://localhost:28021`.


    By default the web interface port number is set to X+1000 where X is the `mongod`
    instance port number. In this chapter’s example, since the primary instance is
    on 27021, the web interface is on port 28021.


    Figure 7-13 shows a link to the replica set status. Clicking the link takes you
    to the replica set dashboard shown in Figure 7-14.


    ![A332296_1_En_7_Fig13_HTML.jpg](A332296_1_En_7_Fig13_HTML.jpg)


    Figure 7-13. Web interface


    ![A332296_1_En_7_Fig14_HTML.jpg](A332296_1_En_7_Fig14_HTML.jpg)


    Figure 7-14. Replica set status report'
