    \ is not a good choice.\n\n# 10. MongoDB Use Cases\n\n> “MongoDB: Is it useful\
    \ for me or not?”\n\nIn this chapter, we will provide the much needed connection\
    \ between the features of MongoDB and the business problems that it is suited\
    \ to solve. We will be using two use cases for sharing the techniques and patterns\
    \ used for addressing such problems.\n\n## 10.1 Use Case 1 - Performance Monitoring\n\
    \nIn this section, you will explore how to use MongoDB to store and retrieve performance\
    \ data. You’ll focus on the data model that you will be using for storing the\
    \ data. Retrieving will consist of simply reading from the respective collection.\
    \ You will also be looking at how you can apply sharding and replication for better\
    \ performance and data safety.\n\nWe assume a monitoring tool that is collecting\
    \ server-defined parameter data in CSV format. In general, the monitoring tools\
    \ either store the data as text files in a designated folder on the server or\
    \ they redirect their output to any reporting database server. In this use case,\
    \ there’s a scheduler that will be reading this shared folder path and importing\
    \ the data within MongoDB database.\n\n### 10.1.1 Schema Design\n\nThe first step\
    \ in designing a solution is to decide on the schema. The schema depends on the\
    \ format of the data that the monitoring tool is capturing.\n\nA line from the\
    \ log files may resemble Table [10-1](#A332296_1_En_10_Chapter.html#Tab1).\n\n\
    Table 10-1. `Log File`\n\n| Node UUID | IP Address | Node Name | MIB | Time Stamp\
    \ (ms) | Metric Ve |\n| --- | --- | --- | --- | --- | --- |\n| 3beb1a8b-040d-4b46-932a-2d31bd353186\
    \ | 10.161.1.73 | corp_xyz_sardar | IFU | 1369221223384 | 0.2 |\n\nThe following\
    \ is the simplest way to store each line as text:\n\n```json\n{\n  \"_id\": ObjectId(...),\n\
    \  \"line\": \"10.161.1.73 - corp_xyz_sardar [15/July/2015:13:55:36 -0700] \\\"\
    Interface Util\\\" ...\"\n}\n```\n\nAlthough this captures the data, it makes\
    \ no sense to the user, so if you want to find out events are from a particular\
    \ server, you need to use regular expressions, which will lead to full scan of\
    \ the collection, which is very inefficient.\n\nInstead, you can extract the data\
    \ from the log file and store it as meaningful fields in MongoDB documents.\n\n\
    Note that when designing the structure, it’s very important to use the correct\
    \ data type. This not only saves space but also has a significant impact on the\
    \ performance.\n\nFor example, if you store the date and time field of the log\
    \ as a string, it’ll not only use more bytes but it’ll also be difficult to fire\
    \ date range queries. Instead of using strings, if you store the date as a UTC\
    \ timestamp, it will take 8 bytes as opposed to 28 bytes for a string, so it’ll\
    \ be easier to execute date range queries. As you can see, using proper types\
    \ for the data increases querying flexibility.\n\nYou will be using the following\
    \ document for storing your monitoring data:\n\n```json\n{\n  \"_id\": ObjectID(...),\n\
    \  \"Host\": \"\",\n  \"Time\": ISODate(\"\"),\n  \"ParameterName\": \"aa\",\n\
    \  \"Value\": 10.23\n}\n```\n\nNote\n\nThe actual log data might have extra fields;\
    \ if you capture it all, it’ll lead to a large document, which is an inefficient\
    \ use of storage and memory. When designing the schema, you should omit the details\
    \ that are not required. It’s very important to identify which fields you must\
    \ capture in order to meet your requirements.\n\nIn your scenario, the most important\
    \ information that meets your reporting application requirements is the following:\n\
    \n`Host` `Timestamp` `Parameter` `Value`\n\n### 10.1.2 Operations\n\nHaving designed\
    \ the document structure, next you will look at the various operations that you\
    \ need to perform on the system."
