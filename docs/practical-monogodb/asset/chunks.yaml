    ![A332296_1_En_7_Fig6_HTML.jpg](img/A332296_1_En_7_Fig6_HTML.jpg)


    **图 7-6. 包含主节点、从节点和仲裁器的成员副本集**


    副本集容错能力是指即使有指定数量的成员宕机，副本集仍有足够成员可以选举出主节点。表 7-1 说明了副本集中成员数量与其容错能力之间的关系。在决定成员数量时应考虑容错能力。


    **表 7-1. 副本集容错能力**


    | 成员数量 | 选举主节点所需的多数 | 容错能力 |

    | :--- | :--- | :--- |

