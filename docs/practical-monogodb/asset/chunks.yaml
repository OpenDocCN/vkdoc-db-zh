    \ 创建索引。\n\n### 创建新帖\n\n此代码中的基本操作序列如下：\n\n帖子首先被保存到“记录系统”，即 `user.posts` 集合。接下来，帖子被更新到\
    \ `user.wall` 集合。最后，根据帖子所属的圈子，更新所有圈子内用户的 `social.posts` 集合。\n\n```\nFunction createnewpost\n\
