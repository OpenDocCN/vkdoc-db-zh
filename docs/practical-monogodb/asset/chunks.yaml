    db1\\arbiter\\data --port 30000 --replSet testset/ANOC9:27021 --rest\n2015-07-13T22:05:10.205-0700\
    \ I CONTROL [initandlisten] MongoDB starting : pid=3700 port=30000 dbpath=c:\\\
    db1\\arbiter\\data 64-bit host=ANOC9\n..........................................................\n\
    ```\n\n连接到主成员的 mongo 控制台，切换到 `admin` 数据库，并将新创建的 `mongod` 作为仲裁器添加到副本集：\n\n```\n\
    C:\\>c:\\practicalmongodb\\bin\\mongo.exe --port 27021\nMongoDB shell version:\
    \ 3.0.4\nconnecting to: 127.0.0.1:27021/test\ntestset:PRIMARY> use admin\nswitched\
    \ to db admin\ntestset:PRIMARY> rs.addArb(\"ANOC9:30000\")\n{ \"ok\" : 1 }\ntestset:PRIMARY>\n\
    ```\n\n可以使用 `rs.status()` 命令来验证此步骤是否成功。\n\n#### 7.4.3.5 使用 `rs.status()` 检查状态\n\
    \n在上面的示例中，我们一直使用 `rs.status()` 来检查副本集状态。在本节中，你将了解这个命令的具体内容。\n\n它使你能够检查你所连接控制台对应的成员的状态，并查看其在副本集中的角色。\n\
    \n以下命令从主成员的 mongo 控制台发出：\n\n```\ntestset:PRIMARY> rs.status()\n{\n\"set\" : \"\
    testset\",\n\"date\" : ISODate(\"2015-07-13T22:15:46.222Z\")\n\"myState\" : 1,\n\
    \"members\" : \n{\n\"_id\" : 0,\n...........................\n\"ok\" : 1\ntestset:PRIMARY>\n\
    ```\n\n`myState` 字段的值表示成员的状态，它可以具有表 7-3 中所示的值。\n\n表 7-3. 副本集状态\n\n| myState |\
    \ 描述 |\n| --- | --- |\n| 0 | 阶段 1，正在启动 |\n| 1 | 主成员 |\n| 2 | 次成员 |\n| 3 | 恢复状态\
    \ |\n| 4 | 致命错误状态 |\n| 5 | 阶段 2，正在启动 |\n| 6 | 未知状态 |\n| 7 | 仲裁器成员 |\n| 8 | 宕机或不可达\
    \ |\n| 9 | 当次成员在从主成员转变后回滚写入操作时，会进入此状态。 |\n| 10 | 当成员从副本集中移除时进入此状态。 |\n\n因此，上面的命令返回的\
    \ `myState` 值为 1，这表明这是主成员。\n\n#### 7.4.3.6 强制新选举\n\n可以使用 `rs.stepDown()` 命令强制当前主服务器降级。这将强制开始选举新的主成员。\n\
    \n此命令在以下场景中很有用：\n\n*   当你模拟主节点故障的影响，强制集群进行故障转移时。这可以让你测试应用程序在此类场景下的响应。\n*   当主服务器需要离线时。这可能是为了维护活动、升级或调查服务器。\n\
    *   当需要针对数据结构运行诊断过程时。\n\n以下是在 `testset` 副本集上运行该命令的输出：\n\n```\ntestset:PRIMARY>\
    \ rs.stepDown()\n2015-07-13T22:52:32.000-0700 I NETWORK DBClientCursor::init call()\
    \ failed\n2015-07-13T22:52:32.005-0700 E QUERY Error: error doing query: failed\n\
    2015-07-13T22:52:32.009-0700 I NETWORK trying reconnect to 127.0.0.1:27021 (127.0.0.1)\
    \ failed\n2015-07-13T22:52:32.011-0700 I NETWORK reconnect 127.0.0.1:27021 (127.0.0.1)\
    \ ok testset:SECONDARY>\n```\n\n命令执行后，提示符从 `testset:PRIMARY` 变为 `testset:SECONDARY`。\n\
    \n可以使用 `rs.status()` 来检查 `stepDown()` 是否成功。\n\n请注意，它返回的 `myState` 值现在是 2，这意味着“成员正作为次成员运行”。\n\
    \n#### 7.4.3.7 使用 Web 界面检查副本集状态\n\nMongoDB 维护一个基于 Web 的控制台，用于查看系统状态。在你的示例中，可以通过\
    \ `http://localhost:28021` 访问该控制台。\n\n默认情况下，Web 界面的端口号设置为 X+1000，其中 X 是 `mongod`\
    \ 实例的端口号。在本章的示例中，由于主实例端口为 27021，因此 Web 界面位于端口 28021。\n\n图 7-13 显示了一个指向副本集状态的链接。单击该链接将转到图\
    \ 7-14 所示的副本集仪表板。\n\n![A332296_1_En_7_Fig13_HTML.jpg 图 7-13. Web 界面![A332296_1_En_7_Fig14_HTML.jpg](img/A332296_1_En_7_Fig14_HTML.jpg)\n\
    \n图 7-14. 副本集状态报告\n"
- fmt: '## 7.5 Sharding


    You saw in the previous section how replica sets in MongoDB are used to duplicate
    the data in order to protect against any adversity and to distribute the read
    load in order to increase the read efficiency.


    MongoDB uses memory extensively for low latency database operations. When you
    compare the speed of reading data from memory to reading data from disk, reading
    from memory is approximately 100,000 times faster than reading from the disk.


    In MongoDB, ideally the working set should fit in memory. The working set consists
    of the most frequently accessed data and indexes.


    A page fault happens when data which is not there in memory is accessed by MongoDB.
    If there’s free memory available, the OS will directly load the requested page
    into memory; however, in the absence of free memory, the page in memory is written
    to the disk and then the requested page is loaded in the memory, slowing down
    the process. Few operations accidentally purge large portion of the working set
    from the memory, leading to an adverse effect on the performance. One example
    is a query scanning through all documents of a database where the size exceeds
    the server memory. This leads to loading of the documents in memory and moving
    the working set out to disk.


    Ensuring you have defined the appropriate index coverage for your queries during
    the schema design phase of the project will minimize the risk of this happening.
    The MongoDB `explain` operation can be used to provide information on your query
    plan and the indexes used.


    MongoDB’s `serverStatus` command returns a `workingSet` document that provides
    an estimate of the instance’s working set size. The Operations team can track
    how many pages the instance accessed over a given period of time and the elapsed
    time between the working set’s oldest and newest document. Tracking all these
    metrics, it’s possible to detect when the working set will be hitting the current
    memory limit, so proactive actions can be taken to ensure the system is scaled
    well enough to handle that.


    In MongoDB, the scaling is handled by scaling out the data horizontally (i.e.
    partitioning the data across multiple commodity servers), which is also called
    sharding (horizontal scaling).


    Sharding addresses the challenges of scaling to support large data sets and high
    throughput by horizontally dividing the datasets across servers where each server
    is responsible for handling its part of data and no one server is burdened. These
    servers are also called shards.


    Every shard is an independent database. All the shards collectively make up a
    single logical database .


    Sharding reduces the operations count handled by each shard. For example, when
    data is inserted, only the shards responsible for storing those records need to
    be accessed.


    The processes that need to be handled by each shard reduce as the cluster grows
    because the subset of data that the shard holds reduces. This leads to an increase
    in the throughput and capacity horizontally.


    Let’s assume you have a database that is 1TB in size. If the number of shards
    is 4, you will have approximately 265GB of data handled by each shard, whereas
    if the number of shards is increased to 40, only 25GB of data will be held on
    each shard.


    Figure [7-15](#A332296_1_En_7_Chapter.html#Fig15) depicts how a collection that
    is sharded will appear when distributed across three shards.


    ![A332296_1_En_7_Fig15_HTML.jpg](A332296_1_En_7_Fig15_HTML.jpg)


    Figure 7-15.


    Sharded collection across three shards


    Although sharding is a compelling and powerful feature, it has significant infrastructure
    requirements and it increases the complexity of the overall deployment. So you
    need to understand the scenarios where you might consider using sharding.


    Use sharding in the following instances:


    *   The size of the dataset is huge and it has started challenging the capacity
    of a single system.

    *   Since memory is used by MongoDB for quickly fetching data, it becomes important
    to scale out when the active work set limits are set to reach.

    *   If the application is write-intensive, sharding can be used to spread the
    writes across multiple servers.


    ### 7.5.1 Sharding Components


    You will next look at the components that enable sharding in MongoDB. Sharding
    is enabled in MongoDB via sharded clusters.


    The following are the components of a sharded cluster:


    *   `Shards`

    *   `mongos`

    *   `Config servers`


    The shard is the component where the actual data is stored. For the sharded cluster,
    it holds a subset of data and can either be a `mongod` or a replica set. All shard’s
    data combined together forms the complete dataset for the sharded cluster.


    Sharding is enabled per collection basis, so there might be collections that are
    not sharded. In every sharded cluster there’s a primary shard where all the unsharded
    collections are placed in addition to the sharded collection data.


    When deploying a sharded cluster, by default the first shard becomes the primary
    shard although it’s configurable. See Figure [7-16](#A332296_1_En_7_Chapter.html#Fig16).


    ![A332296_1_En_7_Fig16_HTML.jpg](A332296_1_En_7_Fig16_HTML.jpg)


    Figure 7-16.


    Primary shard


    `Config servers` are special `mongods` that hold the sharded cluster’s metadata.
    This metadata depicts the sharded system state and organization.


    The config server stores data for a single sharded cluster. The `config servers`
    should be available for the proper functioning of the cluster.


    One `config server` can lead to a cluster’s single point of failure. For production
    deployment it’s recommended to have at least three `config servers`, so that the
    cluster keeps functioning even if one `config server` is not accessible.


    A `config server` stores the data in the `config` database, which enables routing
    of the client requests to the respective data. This database should not be updated.


    MongoDB writes data to the `config server` only when the data distribution has
    changed for balancing the cluster.


    The `mongos` act as the routers. They are responsible for routing the read and
    write request from the application to the shards.


    An application interacting with a mongo database need not worry about how the
    data is stored internally on the shards. For them, it’s transparent because it’s
    only the `mongos` they interact with. The `mongos`, in turn, route the reads and
    writes to the shards.


    The `mongos` cache the metadata from `config server` so that for every read and
    write request they don’t overburden the `config server`.


    However, in the following cases, the data is read from the `config server` :


    *   Either an existing `mongos` has restarted or a new `mongos` has started for
    the first time.

    *   Migration of chunks. We will explain `chunk migration` in detail later.


    ### 7.5.2 Data Distribution Process


    You will next look at how the data is distributed among the shards for the collections
    where sharding is enabled. In MongoDB, the data is sharded or distributed at the
    collection level. The collection is partitioned by the `shard key`.


    #### 7.5.2.1 Shard Key


    Any indexed single/compound field that exists within all documents of the collection
    can be a `shard key`. You specify that this is the field basis which the documents
    of the collection need to be distributed. Internally, MongoDB divides the documents
    based on the value of the field into chunks and distributes them across the shards.


    There are two ways MongoDB enables distribution of the data: `range-based partitioning`
    and `hash-based partitioning`.'
