    You have seen how to perform basic querying, sorting, limiting, etc. You also
    saw how to manipulate the result set using a while loop or as an array. In the
    next section, you will take a look at indexes and how you can use them in your
    queries.


    ### 6.1.8 Using Indexes


    Indexes are used to provide high performance read operations for queries that
    are used frequently. By default, whenever a collection is created and documents
    are added to it, an index is created on the `_id` field of the document.


    In this section, you will look at how different types of indexes can be created.
    Let’s begin by inserting 1 million documents using for loop in a new collection
    called `testindx`.


    `>for(i=0;i<1000000;i++){db.testindx.insert({"Name":"user"+i,"Age":Math.floor(Math.random()*120)})}`


