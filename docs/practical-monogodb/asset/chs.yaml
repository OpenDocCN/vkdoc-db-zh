  \ 复合索引\n\n创建索引时，你需要记住索引应覆盖你的大多数查询。如果你有时只查询`Name`字段，而有时又同时查询`Name`和`Age`字段，那么创建一个在`Name`和`Age`字段上的复合索引，会比仅在其中一个字段上创建索引更有益，因为这个复合索引将覆盖这两种查询。\n\
  \n以下命令在集合`testindx`的字段`Name`和`Age`上创建一个复合索引。\n\n```\n> db.testindx.ensureIndex({\"\
  Name\":1, \"Age\": 1})\n```\n\n复合索引帮助 MongoDB 更高效地执行包含多个子句的查询。创建复合索引时，同样重要的是要记住，用于精确匹配的字段（例如\
  \ `Name` : `\"S1\"` ）应放在前面，随后是用于范围查询的字段（例如 `Age` : `{\"$gt\":20}`）。\n\n因此，上述索引将对以下查询有益：\n\
  \n```\n>db.testindx.find({\"Name\": \"user5\",\"Age\":{\"$gt\":25}}).explain(\"\
  allPlansExecution\")\n```\n\n```\n{\n    \"queryPlanner\" : {\n        \"plannerVersion\"\
  \ : 1,\n        \"namespace\" : \"mydbproc.testindx\",\n        \"indexFilterSet\"\
