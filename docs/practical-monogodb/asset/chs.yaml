  \ : 0,\n    \"totalDocsExamined\" : 20,\n    \"executionStages\" : {\n      \"stage\"\
  \ : \"COLLSCAN\",\n      \"filter\" : {\n        \"$and\" : [ ]\n      },\n    \
  \  \"nReturned\" : 20,\n      \"executionTimeMillisEstimate\" : 0,\n      \"works\"\
  \ : 22,\n      \"advanced\" : 20,\n      \"needTime\" : 1,\n      \"needFetch\"\
  \ : 0,\n      \"saveState\" : 0,\n      \"restoreState\" : 0,\n      \"isEOF\" :\
  \ 1,\n      \"invalidates\" : 0,\n      \"direction\" : \"forward\",\n      \"docsExamined\"\
  \ : 20\n    },\n    \"allPlansExecution\" : [ ]\n  },\n  \"serverInfo\" : {\n  \
  \  \"host\" : \" ANOC9\",\n    \"port\" : 27017,\n    \"version\" : \"3.0.4\",\n\
  \    \"gitVersion\" : \"534b5a3f9d10f00cd27737fbcd951032248b5952\"\n  },\n  \"ok\"\
  \ : 1\n}\n```\n\n如您所见，`explain()` 输出返回了关于 `queryPlanner`、`executionStats` 和 `serverInfo`\
  \ 的信息。如上所示，输出返回的信息取决于所选的详细程度模式。\n\n您已经了解了如何执行基本的查询、排序、限制等。您还看到了如何使用 `while` 循环或作为数组来操作结果集。在下一节中，您将了解索引以及如何在查询中使用它们。\n\
  \n### 6.1.8 使用索引\n\n索引用于为频繁使用的查询提供高性能的读取操作。默认情况下，每当创建一个集合并向其中添加文档时，就会在文档的 `_id`\
  \ 字段上创建一个索引。\n\n在本节中，您将了解如何创建不同类型的索引。让我们从使用 `for` 循环在一个名为 `testindx` 的新集合中插入 100\
  \ 万份文档开始。\n\n```bash\n>for(i=0;i<1000000;i++){db.testindx.insert({\"Name\":\"user\"\
  +i,\"Age\":Math.floor(Math.random()*120)})}\n```\n\n接下来，发出 `find()` 命令以获取 `Name`\
  \ 值为 `user101` 的文档。运行 `explain()` 命令以检查 MongoDB 为返回结果集正在执行哪些步骤。\n\n```bash\n> db.testindx.find({\"\
  Name\":\"user101\"}).explain(\"allPlansExecution\")\n```\n\n```json\n{\n  \"queryPlanner\"\
