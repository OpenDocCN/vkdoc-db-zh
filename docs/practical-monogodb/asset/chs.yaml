  { \"collectionsharded\" : \"movies.comedy\", \"ok\" : 1 }\nmongos>\n```\n\n步骤如下：\n\
  1.  连接到 mongos 控制台。\n2.  查看连接到在端口 `30999` 上运行的 mongos 实例的数据库。\n3.  获取对 `movies`\
  \ 数据库的引用。\n4.  对 `movies` 数据库启用分片。\n5.  使用分片键 `originality` 对 `movies.drama` 集合进行分片。\n\
  6.  使用分片键 `distribution` 对 `movies.action` 集合进行分片。\n7.  使用分片键 `collections` 对 `movies.comedy`\
  \ 集合进行分片。\n\n接下来，使用以下命令序列在集合中插入一些数据：\n```\nmongos>for(var i=0;i<100000;i++){db.drama.insert({originality:Math.random(),\
  \ count:i, time:new Date()});}\nmongos>for(var i=0;i<100000;i++){db.action.insert({distribution:Math.random(),\n\
  count:i, time:new Date()});}\nmongos>for(var i=0;i<100000;i++) {db.comedy.insert({collections:Math.random(),\
  \ count:i, time:new Date()});}\nmongos>\n```\n\n完成上述步骤后，你拥有了三个分片和三个已启用分片的集合。接下来你将看到数据是如何分布在各个分片上的。\n\
  \n切换到配置数据库：\n```\nmongos> use config\nswitched to db config\nmongos>\n```\n\n你可以使用\
  \ `chunks.find` 来查看数据块是如何分布的：\n```\nmongos> db.chunks.find({ns:\"movies.drama\"\
  }, {shard:1, _id:0}).sort({shard:1})\n{ \"shard\" : \"shard0000\" }\n{ \"shard\"\
  \ : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\"\
  \ }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" :\
  \ \"shard0001\" }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\n\
  { \"shard\" : \"shard0002\" }\nmongos> db.chunks.find({ns:\"movies.action\"}, {shard:1,\
  \ _id:0}).sort({shard:1})\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\"\
  \ }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" :\
  \ \"shard0000\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n\
  { \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0002\"\
  \ }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" :\
  \ \"shard0002\" }\nmongos> db.chunks.find({ns:\"movies.comedy\"}, {shard:1, _id:0}).sort({shard:1})\n\
  { \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\"\
  \ }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" :\
  \ \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0002\" }\n\
  { \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\nmongos>\n```\n\n如你所见，数据块相当均匀地分布在各个分片之间。参见图\
  \ 7-22。\n\n![A332296_1_En_7_Fig22_HTML.jpg](img/A332296_1_En_7_Fig22_HTML.jpg)\n\
  \n图 7-22.\n\n\n\n#### 无标签的分布\n\n接下来，你将使用标签来分离集合。这样做的目的是让每个分片对应一个集合（即你的目标是实现表 7-6\
  \ 中显示的块分布）。\n\n**表 7-6。**\n\n| 集合块 | 所在分片 |\n| --- | --- |\n| `movies.drama` | `Shard0000`\
  \ |\n| `movies.action` | `Shard0001` |\n| `movies.comedy` | `Shard0002` |\n\n标签描述了分片的属性，可以是任何东西。因此，你可以将一个分片标记为\
  \ \"slow\" 或 \"fast\"，或 \"rack space\" 或 \"west coast\"。\n\n在下面的例子中，你将为每个分片添加属于各个集合的标签：\n\
  \n```\nmongos> sh.addShardTag(\"shard0000\", \"dramas\")\nmongos> sh.addShardTag(\"\
  shard0001\", \"actions\")\nmongos> sh.addShardTag(\"shard0002\", \"comedies\")\n\
  mongos>\n```\n\n这表示以下含义：\n\n*   将标记为 \"dramas\" 的块放在 `shard0000` 上。\n*   将标记为 \"\
  actions\" 的块放在 `shard0001` 上。\n*   将标记为 \"comedies\" 的块放在 `shard0002` 上。\n\n接下来，你将创建相应的规则来标记集合块。\n\
  \n规则 1：在 `movies.drama` 集合中创建的所有块都将被标记为 \"dramas\"：\n\n```\nmongos> sh.addTagRange(\"\
  movies.drama\", {originality:MinKey}, {originality:MaxKey}, \"dramas\")\nmongos>\n\
  ```\n\n该规则使用了 `MinKey`（表示负无穷大）和 `MaxKey`（表示正无穷大）。因此，上面的规则意味着将 `movies.drama` 集合的所有块标记为\
  \ \"dramas\"。\n\n类似地，你将为另外两个集合制定规则。\n\n规则 2：在 `movies.action` 集合中创建的所有块都将被标记为 \"\
  actions\"。\n\n```\nmongos> sh.addTagRange(\"movies.action\", {distribution:MinKey},\
  \ {distribution:MaxKey}, \"actions\")\nmongos>\n```\n\n规则 3：在 `movies.comedy` 集合中创建的所有块都将被标记为\
  \ \"comedies\"。\n\n```\nmongos> sh.addTagRange(\"movies.comedy\", {collection:MinKey},\
  \ {collection:MaxKey}, \"comedies\")\nmongos>\n```\n\n你需要等待集群重新平衡，以便根据上面定义的标签和规则来分布块。如前所述，块分布是一个自动过程，因此一段时间后，块将自动重新分布以实现你所做的更改。\n\
  \n接下来，执行 `chunks.find` 来检查块的组织情况：\n\n```\nmongos> use config\nswitched to db config\n\
  mongos> db.chunks.find({ns:\"movies.drama\"}, {shard:1, _id:0}).sort({shard:1})\n\
  { \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\"\
  \ }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" :\
  \ \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n\
  { \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\nmongos> db.chunks.find({ns:\"\
  movies.action\"}, {shard:1, _id:0}).sort({shard:1})\n{ \"shard\" : \"shard0001\"\
  \ }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" :\
  \ \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n\
  { \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\"\
  \ }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" :\
  \ \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\nmongos> db.chunks.find({ns:\"\
  movies.comedy\"}, {shard:1, _id:0}).sort({shard:1})\n{ \"shard\" : \"shard0002\"\
  \ }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" :\
  \ \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\n\
  { \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\"\
  \ }\n{ \"shard\" : \"shard0002\" }\nmongos>\n```\n\n因此，集合块已经根据定义的标签和规则重新分布（见图 7-23）。\n\
  \n![A332296_1_En_7_Fig23_HTML.jpg](img/A332296_1_En_7_Fig23_HTML.jpg)\n\n**图 7-23。**\n\
  \n#### 通过标签扩展\n\n接下来，你将了解如何通过标签进行扩展。让我们改变场景。假设 `movies.action` 集合的数据需要两台服务器。由于你只有三个分片，这意味着另外两个集合的数据需要移动到一个分片上。\n\
  \n在这个场景中，你将更改分片的标签。你将把 \"comedies\" 标签添加到 `Shard0`，并从 `Shard2` 上移除该标签，并进一步将 \"actions\"\
  \ 标签添加到 `Shard2`。\n\n这意味着标记为 \"comedies\" 的块将移动到 `Shard0`，而标记为 \"actions\" 的块将分散到\
  \ `Shard2`。\n\n你首先将 `movies.comedy` 集合的块移动到 `Shard0`，并从 `Shard2` 上移除：\n\n```\nmongos>\
  \ sh.addShardTag(\"shard0000\",\"comedies\")\nmongos> sh.removeShardTag(\"shard0002\"\
  ,\"comedies\")\n```\n\n接下来，你将 \"actions\" 标签添加到 `Shard2`，以便 `movies.action` 的块也分散到\
  \ `Shard2` 上：\n\n```\nmongos> sh.addShardTag(\"shard0002\",\"actions\")\n```\n\n\
  一段时间后重新执行 find 命令，将显示以下结果：\n\n```\nmongos> db.chunks.find({ns:\"movies.drama\"},\
  \ {shard:1, _id:0}).sort({shard:1})\n{ \"shard\" : \"shard0000\" }\n{ \"shard\"\
  \ : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\"\
  \ }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" :\
  \ \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n\
  { \"shard\" : \"shard0000\" }\nmongos> db.chunks.find({ns:\"movies.action\"}, {shard:1,\
  \ _id:0}).sort({shard:1})\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\"\
  \ }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" :\
  \ \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n{ \"shard\" : \"shard0001\" }\n\
  { \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\"\
  \ }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" : \"shard0002\" }\n{ \"shard\" :\
  \ \"shard0002\" }\nmongos> db.chunks.find({ns:\"movies.comedy\"}, {shard:1, _id:0}).sort({shard:1})\n\
  { \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\"\
  \ }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" :\
  \ \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\n\
  { \"shard\" : \"shard0000\" }\n{ \"shard\" : \"shard0000\" }\nmongos>\n```\n\n块已经根据所做的更改重新分布（见图\
  \ 7-24）。\n\n![A332296_1_En_7_Fig24_HTML.jpg](img/A332296_1_En_7_Fig24_HTML.jpg)\n\
  \n**图 7-24。**\n\n#### 多重标签\n\n你可以为分片关联多个标签。让我们为分片添加两个不同的标签。\n\n假设你想根据磁盘来分布写入。你有一个分片使用机械硬盘，另一个使用\
  \ SSD（固态硬盘）。你希望将 50% 的写入重定向到带有 SSD 的分片，其余的重定向到带有机械硬盘的分片。\n\n首先，根据这些属性给分片打标签：\n\n\
  ```\nmongos> sh.addShardTag(\"shard0001\", \"spinning\")\nmongos> sh.addShardTag(\"\
  shard0002\", \"ssd\")\nmongos>\n```\n\n让我们进一步假设，你有一个 `movies.action` 集合的 `distribution`\
  \ 字段，你将用它作为分片键。`distribution` 字段的值在 0 到 1 之间。接下来，你想说：“如果 `distribution` < .5，发送到机械硬盘。如果\
  \ `distribution` >= .5，发送到 SSD。” 因此你定义如下规则：\n\n```\nmongos> sh.addTagRange(\"movies.action\"\
  , {distribution:MinKey} ,{distribution:.5} ,\"spinning\")\nmongos> sh.addTagRange(\"\
  movies.action\" ,{distribution:.5} ,{distribution:MaxKey},\"ssd\")\nmongos>\n```\n\
  \n现在，`distribution` < .5 的文档将被写入机械硬盘分片，而其他文档将被写入 SSD 磁盘分片。\n\n通过标签控制，你可以控制每个新添加的服务器将承担的负载类型。\n\
  \n"
- '# 在分片环境中导入数据时的注意事项


  导入数据时需要牢记以下几点。




  ### 7.5.7 准备工作


  #### 7.5.7.1 预分裂数据


  与其让 MongoDB 决定如何创建分片块，你可以使用以下命令告诉 MongoDB 具体如何操作：


  ```

  db.runCommand( { split : "practicalmongodb.mycollection" , middle : { shardkey :
  value } } );

  ```


  之后，你还可以指定哪些分片块分配到哪个节点。


  要做到这些，你需要了解即将导入数据库的数据特性。这也取决于你想要解决的应用场景以及应用程序如何读取数据。在决定分片块的放置位置时，请考虑数据局部性等因素。


  #### 7.5.7.2 决定分片块大小


  在决定分片块大小时，需要牢记以下几点：


  如果分片块尺寸过小，数据虽能均匀分布，但会导致更频繁的迁移，这在 `mongos` 层面是一项昂贵的操作。如果尺寸过大，则会减少迁移次数，降低 `mongos`
  层面的开销，但会导致数据分布不均。


  #### 7.5.7.3 选择一个好的分片键


  为分片集群中的节点选择一个好的分片键以实现良好的数据分布至关重要。


  ### 7.5.8 分片监控


  除了对其他 MongoDB 实例进行的常规监控和分析外，分片集群还需要额外的监控，以确保其所有操作正常运行，并且数据在节点间有效分布。本节将介绍为确保分片集群正常运行应进行的监控。


  ### 7.5.9 监控配置服务器


  配置服务器存储了分片集群的元数据。`mongos` 会缓存这些数据并将请求路由到相应的分片。如果配置服务器宕机但 `mongos` 实例仍在运行，分片集群不会立即受到影响，并且会在一段时间内保持可用。然而，你将无法执行像分片块迁移或启动新
  `mongos` 这样的操作。长期来看，配置服务器的不可用会严重影响集群的可用性。为确保集群保持平衡和可用，你应该监控配置服务器。


  #### 7.5.9.1 监控分片状态、平衡与分片块分布


  为了实现最有效的分片集群部署，需要分片块在分片之间均匀分布。如前所述，这是由 MongoDB 通过后台进程自动完成的。你需要监控分片状态以确保该进程有效工作。为此，你可以在
  `mongos` 的 mongo shell 中使用 `db.printShardingStatus()` 或 `sh.status()` 命令。


  #### 7.5.9.2 监控锁状态


  在几乎所有情况下，平衡器在完成其进程后会自动释放锁，但你需要检查数据库的锁状态，以确保没有持久锁，因为这会阻碍未来的平衡操作，从而影响集群的可用性。在 `mongos`
  的 mongo shell 中执行以下命令来检查锁状态：


  ```

  use config

  db.locks.find()

  ```


  ## 7.6 生产集群架构


  本节将介绍生产集群架构。为了便于理解，我们考虑一个社交网络应用程序的非常通用的用例：用户可以创建自己的朋友圈，并在群组内分享评论或图片。用户也可以评论或点赞好友的评论或图片。用户在地理上是分布式的。


  应用程序的需求是：所有评论需在各地理区域立即可用；数据应冗余，以防用户的评论、帖子和图片丢失；并且应具备高可用性。因此，应用程序的生产集群应包含以下组件：


  *   至少两个 [`mongos`](http://docs.mongodb.org/manual/reference/mongos/#mongos%23mongos)
  实例，但可以根据需要部署更多。

  *   三个 [`config servers`](http://docs.mongodb.org/manual/administration/sharded-clusters/#sharding-config-server)，每个位于独立的系统上。

  *   两个或更多个 [`replica sets`](http://docs.mongodb.org/manual/reference/glossary/#term-replica-set)
  作为 [`shards`](http://docs.mongodb.org/manual/reference/glossary/#term-shard)。副本集分布在不同的地理区域，读关注设置为
  `nearest`。参见图 7-25。


  ![A332296_1_En_7_Fig25_HTML.jpg](img/A332296_1_En_7_Fig25_HTML.jpg)

  图 7-25. 生产集群架构


  现在，让我们看看 MongoDB 生产部署中可能出现的故障场景及其对环境的影响。


  ### 7.6.1 场景一


  `mongos` 变得不可用：承载已宕机 `mongos` 的应用服务器将无法与集群通信，但这不会导致任何数据丢失，因为 `mongos` 本身不维护任何数据。`mongos`
  可以重启，在重启过程中，它会与配置服务器同步以缓存集群元数据，应用程序通常可以恢复正常操作（图 7-26）。


  ![A332296_1_En_7_Fig26_HTML.jpg](img/A332296_1_En_7_Fig26_HTML.jpg)

  图 7-26. `mongos` 变得不可用


  ### 7.6.2 场景二


  分片中某个副本集的一个 `mongod` 变得不可用：由于你使用了副本集来提供高可用性，因此没有数据丢失。如果是主节点宕机，则会选举出新的主节点；如果是辅助节点宕机，则它会断开连接，其余功能继续正常运行（图
  7-27）。


  ![A332296_1_En_7_Fig27_HTML.jpg](img/A332296_1_En_7_Fig27_HTML.jpg)

  图 7-27. 副本集中一个 `mongod` 不可用


  唯一的区别是数据的副本数量减少了，使得系统略微变弱，因此你应该并行检查该 `mongod` 是否可恢复。如果可以，应尽快恢复并重启；如果不可恢复，你需要尽快创建一个新的副本集来替换它。


  ### 7.6.3 场景三


  如果一个分片变得不可用：在此场景下，该分片上的数据将不可用，但其他分片仍然可用，因此不会阻止应用程序运行。应用程序可以继续其读/写操作；但是，必须在应用层处理部分结果的问题。同时，应尽快尝试恢复该分片（图
  7-28）。


  ![A332296_1_En_7_Fig28_HTML.jpg](img/A332296_1_En_7_Fig28_HTML.jpg)

  图 7-28. 分片不可用


  ### 7.6.4 场景四


  三个配置服务器中只有一个可用：在此场景下，集群将变为只读，但不会服务于任何可能导致集群结构变更（例如，分片块迁移或分片块拆分）的操作，从而导致元数据变更。应尽快更换配置服务器，因为如果所有配置服务器都不可用，将导致集群无法操作（图
  7-29）。


  ![A332296_1_En_7_Fig29_HTML.jpg](img/A332296_1_En_7_Fig29_HTML.jpg)

  图 7-29. 只有一个配置服务器可用


  ## 7.7 总结


  在本章中，你学习了核心进程与工具、独立部署、分片概念、复制概念以及生产部署。你还了解了如何实现高可用性（HA）。


  在下一章中，你将了解数据在底层的存储方式、写操作如何通过日志实现、`GridFS` 的用途以及 MongoDB 中可用的不同类型的索引。



  '
- "# 8. MongoDB 详解\n\n> “《MongoDB 详解》涵盖了 MongoDB 内部工作机制的深入概念。”\n\n在本章中，你将学习数据如何在 MongoDB\
  \ 中存储，以及写入操作如何通过日志机制发生。最后，你将了解 GridFS 以及 MongoDB 中可用的不同类型的索引。\n\n## 8.1 数据存储引擎\n\
  \n在上一章中，你了解了作为 MongoDB 一部分部署的核心服务；你也了解了副本集和分片。在本节中，我们将讨论数据存储引擎。\n\n### MMAP\n\n\
  MongoDB 默认使用 MMAP 作为其存储引擎。该引擎与内存映射文件协同工作。内存映射文件是操作系统使用`mmap()`系统调用放置在内存中的数据文件。`mmap`是操作系统的一项功能，可将磁盘上的文件映射到虚拟内存。\n\
  \n虚拟内存不等同于物理内存。虚拟内存是计算机硬盘上与物理 RAM 结合使用的空间。\n\nMongoDB 使用内存映射文件进行任何数据交互或数据管理活动。当访问文档时，数据文件会被内存映射到内存中。MongoDB\
  \ 允许操作系统控制内存映射并分配最大量的 RAM。这样做可以最大限度地减少 MongoDB 层面的工作和编码。缓存基于 LRU（最近最少使用）行为完成，其中最近最少使用的文件会从工作集移出到磁盘，为新的、最近和频繁使用的页面腾出空间。\n\
  \n然而，这种方法有其自身的缺点。例如，MongoDB 无法控制将哪些数据保留在内存中，哪些数据移除。因此，每次服务器重启都会导致缺页中断，因为每次访问的页面在工作集中都不可用，从而导致数据检索时间较长。\n\
  \nMongoDB 也无法控制优先处理内存中的内容。在紧急情况下，它可以指定哪些内容需要保留在缓存中，哪些可以被移除。例如，如果对一个未建立索引的大集合执行读取操作，可能会导致将整个集合加载到内存中，这可能导致其他集合的重要索引等内容被从\
  \ RAM 中清除。这种控制缺失也可能导致当任何 MongoDB 外部进程试图访问大部分内存时，分配给 MongoDB 的缓存缩小；这最终将导致 MongoDB\
  \ 响应变慢。\n\n#### 可插拔存储引擎 API\n\n随着 3.0 版本的发布，MongoDB 附带了可插拔存储引擎 API，使你能够根据工作负载、应用程序需求和可用基础设施在存储引擎之间进行选择。\n\
  \n可插拔存储引擎层的愿景是拥有一个数据模型、一种查询语言和一组运维关注点，但底层却有许多针对不同用例优化的存储引擎选项，如图 8-1 所示。\n\n![A332296_1_En_8_Fig1_HTML.jpg](img/A332296_1_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1.** 可插拔存储引擎 API\n\n可插拔存储引擎功能在部署方面也提供了灵活性，多种类型的存储引擎可以在同一部署中共存。\n\nMongoDB\
  \ 3.0 版本附带两个存储引擎。\n\n默认的`MMAPv1`是先前版本中使用的 MMAP 引擎的改进版本。更新后的 MongoDB `MMAPv1`存储引擎实现了集合级别的并发控制。该存储引擎擅长处理高容量读取、插入和就地更新的工作负载。\n\
  \n#### WiredTiger\n\n新的`WiredTiger`存储引擎由 Berkeley DB 的架构师开发，后者是世界上部署最广泛的嵌入式数据管理软件。`WiredTiger`在现代多\
  \ CPU 架构上具有良好的扩展性。它的设计旨在利用具有多核 CPU 和更多 RAM 的现代硬件。\n\n`WiredTiger`以压缩格式在磁盘上存储数据。根据所使用的压缩算法，压缩可以将数据大小减少高达\
  \ 70%（仅磁盘），索引大小减少高达 50%（磁盘和内存两者）。除了减少存储空间外，压缩还通过从磁盘读取更少的位来实现更高的 I/O 可扩展性。它在提高硬件利用率、降低存储成本和提供更可预测的性能方面具有显著优势。\n\
  \n#### 压缩算法\n\n可选择使用以下压缩算法：\n\n*   `Snappy`是默认算法，用于文档和日志。它以较低的 CPU 开销提供良好的压缩比。根据数据类型，压缩比大约在\
  \ 70%左右。\n*   `zlib`提供极佳的压缩比，但代价是额外的 CPU 开销。\n*   前缀压缩是索引默认使用的算法，可将索引存储的内存占用减少约\
  \ 50%（取决于工作负载），并为频繁访问的文档释放更多工作集空间。\n\n管理员可以修改所有集合和索引的默认压缩设置。在创建集合和索引时，也可以按每个集合和每个索引配置压缩。\n\
  \n`WiredTiger`还提供细粒度的文档级并发。写入操作不再被其他写入操作阻塞，除非它们访问的是同一个文档。因此，它支持读写器对集合中文档的并发访问。客户端可以在写入操作进行时读取文档，并且多个线程可以同时修改集合中的不同文档。因此，它擅长处理写入密集型工作负载（写入性能提升\
  \ 7-10 倍）。\n\n更高的并发性也推动了基础设施的简化。应用程序可以充分利用可用的服务器资源，简化了满足性能 SLA 所需的架构。使用先前 MongoDB\
  \ 代的较粗粒度数据库级锁定时，用户通常必须实施分片才能扩展因单个数据库写入锁而停滞的工作负载，即使主机系统中仍有足够的内存、I/O 带宽和磁盘容量。细粒度并发实现的更高系统利用率减少了这种开销，消除了不必要的成本和管理负担。\n\
  \n该存储引擎让你可以在每个集合、每个索引级别决定压缩什么、不压缩什么。\n\n`WiredTiger`存储引擎仅适用于 64 位 MongoDB。\n\n`WiredTiger`通过其缓存管理数据。`WiredTiger`存储引擎通过允许你配置为`WiredTiger`缓存分配多少\
  \ RAM 来提供对内存的更多控制，默认为 1GB 或可用内存的 50%，以较大者为准。\n\n接下来，你将简要了解数据如何在磁盘上存储。\n\n\n## 8.2\
  \ 数据文件（与 MMAPv1 相关）\n\n首先，让我们检查一下数据文件。如你所见，在核心服务下，`mongod`使用的默认数据目录是`/data/db/`。\n\
  \n在此目录中，每个数据库都有独立的文件。每个数据库有一个`.ns`文件和多个具有单调递增数字扩展名的数据文件。\n\n例如，如果你创建一个名为`mydbpoc`的数据库，它将存储在以下文件中：`mydbpoc.ns`、`mydbpoc.1`、`mydbpoc.2`等，如图\
  \ 8-2 所示。\n\n![A332296_1_En_8_Fig2_HTML.jpg](img/A332296_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2. 数据文件\n\n对于数据库的每个新的数字数据文件，其大小将是前一个数字数据文件大小的两倍。文件大小的上限为 2GB。如果文件大小达到 2GB，所有后续的数字文件将保持\
  \ 2GB 大小。这是设计如此。这种行为确保了小型数据库不会在磁盘上浪费太多空间，并且大型数据库大部分保持在磁盘上的连续区域中。\n\n请注意，为了确保一致的性能，MongoDB\
  \ 会预分配数据文件。预分配在后台进行，并且每次数据文件被填满时启动。这意味着 MongoDB 服务器总是试图为每个数据库保留一个额外的空数据文件，以避免在文件分配时被阻塞。\n\
  \n如果磁盘上存在多个小型数据库，使用`storage.mmapv1.smallFiles`选项将减小这些文件的大小。\n\n接下来，你将看到数据实际上是如何在底层存储的。双向链表是用于存储数据的关键数据结构。\n\
  \n### 8.2.1 命名空间 (.ns 文件)\n\n在数据文件中，数据空间被划分为命名空间，其中命名空间可以对应一个集合或一个索引。\n\n这些命名空间的元数据存储在`.ns`文件中。如果你检查数据目录，你会找到一个名为`[数据库名].ns`的文件。\n\
  \n用于存储元数据的`.ns`文件大小为 16MB。这个文件可以被视为一个大的哈希表，它被划分为大约 1KB 大小的小存储桶。\n\n每个存储桶存储特定于命名空间的元数据（图\
  \ 8-3）。\n\n![A332296_1_En_8_Fig3_HTML.jpg](img/A332296_1_En_8_Fig3_HTML.jpg)\n\n\
  图 8-3. 命名空间数据结构\n\n#### 8.2.1.1 集合命名空间\n\n如图 8-4 所示，集合命名空间存储桶包含元数据，例如：\n\n![A332296_1_En_8_Fig4_HTML.jpg](img/A332296_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4. 集合命名空间详情\n\n-   集合的名称\n-   关于集合的一些统计信息，如计数、大小等。（这就是为什么每当对集合发出计数时，它都能快速响应。）\n\
  -   索引详细信息，因此它可以维护到每个已创建索引的链接\n-   一个删除列表\n-   一个存储范围详情的双向链表（它存储指向第一个和最后一个范围的指针）\n\
  \n##### Extent (范围)\n\nExtent 指的是数据文件中的一组数据记录，因此一组 extent 构成了命名空间的完整数据。一个 extent\
  \ 使用磁盘位置来引用数据实际驻留的磁盘位置。它由两部分组成：文件号和偏移量。\n\n文件号指定它指向的数据文件（0、1 等）。\n\n偏移量是文件中的位置（你需要深入文件多远来查找数据）。偏移量大小为\
  \ 4KB。因此，偏移量的最大值可达 2³¹-1，这是数据文件可以增长到的最大文件大小（2048MB 或 2GB）。\n\n如图 8-5 所示，一个 extent\
  \ 数据结构由以下部分组成：\n\n![A332296_1_En_8_Fig5_HTML.jpg](img/A332296_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5. Extent\n\n-   磁盘上的位置，即它指向的文件号。\n-   由于 extent 作为双向链表元素存储，它有一个指针指向前一个和下一个\
  \ extent。\n-   一旦有了它所引用的文件号，该文件内它指向的数据记录组进一步存储为双向链表。因此，它维护一个指针指向它指向的数据块的第一条数据记录和最后一条数据记录，这些记录不过是文件内的偏移量（数据存储在文件中的深度）。\n\
  \n##### 数据记录 (Data Record)\n\n接下来你将查看数据记录结构。该数据结构包含以下详情：\n\n-   由于数据记录结构是 extent\
  \ 双向链表的一个元素，它存储前一个和后一个记录的信息。\n-   它有带头部的长度。\n-   数据块。\n\n数据块可以有一个 BTree Bucket（如果是索引命名空间）或一个\
  \ BSON 对象。你稍后将研究 BTree 结构。\n\nBSON 对象对应于集合的实际数据。BSON 对象的大小不必与数据块相同。默认使用 2 次幂大小分配，以便每个文档都存储在一个包含文档和额外空间或填充的空间中。这个设计决策有助于避免当更新导致对象大小变化时，对象从一个块移动到另一个块。\n\
  \nMongoDB 支持多种分配策略，这些策略决定了如何为文档添加填充（图 8-6）。由于原地更新比重新定位更高效，所有填充策略都用额外的空间换取更高的效率和更少的碎片。不同的策略支持不同的工作负载。例如，完全匹配分配对于具有仅插入工作负载且大小固定且从不变化的集合是理想的，而\
  \ 2 次幂分配对于插入/更新/删除工作负载是高效的。\n\n![A332296_1_En_8_Fig6_HTML.jpg](img/A332296_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6. 记录数据结构\n\n##### 删除列表 (Deleted List)\n\n删除列表存储已删除或移动的 extent 的详细信息（当更新导致大小变化，数据无法在分配的空间中容纳时发生移动）。\n\
  \n记录的大小决定了空闲 extent 需要放置在哪个存储桶中。基本上，这些是分桶的单链表。当需要一个新的 extent 来容纳命名空间的数据时，它会首先搜索空闲列表以检查是否有任何合适大小的\
  \ extent 可用。\n\n##### 总结\n\n因此，你可以假设数据文件（具有数字扩展名的文件）被划分为不同的集合命名空间，其中命名空间的 extent\
  \ 指定了从属于该集合的数据文件中的数据范围。\n\n理解了数据是如何存储的，现在让我们看看`db.users.find()`是如何工作的。\n\n它将首先检查`mydbpoc.ns`文件以访问`users`命名空间，并找出它指向的第一个\
  \ extent。它将跟随第一个 extent 链接到第一条记录，然后跟随下一条记录指针，它将读取第一个 extent 的数据记录，直到达到最后一条记录。然后它将跟随下一个\
  \ extent 指针以类似的方式读取其数据记录。遵循这个模式，直到读取最后一个 extent 的数据记录。\n\n#### 8.2.1.2 $freelist\
  \ (空闲列表)\n\n`.ns`文件有一个名为`$freelist`的特殊命名空间，用于 extent。`$freelist`跟踪不再使用的 extent，例如已删除的索引或集合的\
  \ extent。\n\n\n\n\n#### 8.2.1.3 索引结构：B 树\n\n现在我们来看看索引是如何存储的。`B 树`（BTree）结构被用于存储索引。一个`B\
  \ 树`如图 8-7 所示。\n\n![A332296_1_En_8_Fig7_HTML.jpg](img/A332296_1_En_8_Fig7_HTML.jpg)\n\
  *图 8-7. B 树*\n\n在`B 树`的标准实现中，每当一个新的键被插入`B 树`时，默认行为如图 8-8 所示。\n\n![A332296_1_En_8_Fig8_HTML.jpg](img/A332296_1_En_8_Fig8_HTML.jpg)\n\
  *图 8-8. B 树标准实现*\n\nMongoDB 实现`B 树`的方式略有不同。\n在上述场景中，如果你的键是诸如`时间戳`（Timestamp）、`对象\
  \ ID`（ObjectID）或一个递增的数字，那么数据桶将总是半满的，导致大量空间浪费。\n\n为了克服这一点，MongoDB 对其稍作了修改。每当它识别到索引键是一个递增的键时，它不会进行\
  \ 50/50 分裂，而是进行 90/10 分裂，如图 8-9 所示。\n\n![A332296_1_En_8_Fig9_HTML.jpg](img/A332296_1_En_8_Fig9_HTML.jpg)\n\
  *图 8-9. MongoDB B 树的 90/10 分裂*\n\n图 8-10 展示了数据桶的结构。`B 树`的每个数据桶大小为 8KB。\n\n![A332296_1_En_8_Fig10_HTML.jpg](img/A332296_1_En_8_Fig10_HTML.jpg)\n\
  *图 8-10. B 树数据桶数据结构*\n\n数据桶包含以下部分：\n\n-   指向父节点的指针\n-   指向右子节点的指针\n-   指向键节点的指针\n\
  -   一个键对象列表（这些对象大小不一且以无序方式存储；这些对象实际上是索引键的值）\n\n##### 键节点\n\n键节点是固定大小的节点，并以排序方式存储。它们便于在`B\
  \ 树`的不同节点之间轻松地进行分裂和移动元素。\n一个键节点包含以下内容：\n\n-   指向左子节点的指针\n-   索引键所属的数据记录\n-   键偏移量（键对象的偏移量，基本上告诉了该键的值存储在数据桶中的什么位置）\n\
  \n## 8.3 数据文件（与 WiredTiger 相关）\n\n在本节中，你将了解当使用`WiredTiger`存储引擎启动`mongod`时，数据目录的内容。\n\
  当选择的存储选项是`WiredTiger`时，数据、日志和索引在磁盘上是压缩存储的。压缩是基于启动`mongod`时指定的压缩算法完成的。\n\n`Snappy`是默认的压缩选项。\n\
  在数据目录下，有对应于每个集合和索引的单独压缩`wt`文件。日志在数据目录下有自己的文件夹。\n\n压缩文件实际上是在数据插入集合时创建的（文件在写入时分配，没有预分配）。\n\
  例如，如果你创建一个名为`users`的集合，它将被存储在`collection-0—2259994602858926461`文件中，相关的索引将被存储在`index-1—2259994602858926461`、`index-2—2259994602858926461`等文件中。\n\
  \n除了集合和索引的压缩文件外，还有一个`_mdb_catalog`文件，用于存储将集合和索引映射到数据目录中文件的元数据。在上面的例子中，它将存储集合`users`到`wt`文件`collection-0—2259994602858926461`的映射。参见图\
  \ 8-11。\n\n![A332296_1_En_8_Fig11_HTML.jpg](img/A332296_1_En_8_Fig11_HTML.jpg)\n\
  *图 8-11. WiredTiger 数据文件夹*\n\n可以为存储索引指定单独的卷。\n在指定`DBPath`时，你需要确保该目录对应于启动`mongod`时使用`–storageEngine`选项指定的存储引擎。如果`dbpath`包含由使用`–storageEngine`选项指定的存储引擎之外的其他引擎创建的文件，`mongod`将无法启动。因此，如果在`DBPath`中找到了`MMAPv1`文件，那么`WT`（WiredTiger）将无法启动。\n\
  \n在内部，`WiredTiger`使用传统的`B+树`结构来存储和管理数据，但相似之处仅限于此。与`B+树`不同，它不支持就地更新。\n`WiredTiger`缓存用于对数据的任何读/写操作。缓存中的树结构针对内存访问进行了优化。\n\
  \n## 8.4 读与写\n\n你将简要了解读和写是如何发生的。如前所述，当 MongoDB 更新和从`DB`读取时，它实际上是在对内存进行读写。\n如果在 MongoDB\
  \ `MMAPv1`存储引擎中，一个修改操作使得记录大小增长到超过为其分配的空间，那么整个记录将被移动到一个带有额外填充字节的更大空间中。默认情况下，MongoDB\
  \ 使用 2 的幂次大小分配，以便 MongoDB 中的每个文档都存储在一个包含文档本身和额外空间（填充）的记录中。填充允许文档在更新后增长，同时最小化重新分配的可能性。记录一旦被移动，原来占用的空间将被释放，并将作为不同大小的空闲列表进行跟踪。如前所述，这就是`.ns`文件中的`$freelist`命名空间。\n\
  \n在`MMAPv1`存储引擎中，随着对象被删除、修改或创建，随时间推移会产生碎片，这将影响性能。应执行`compact`命令，将碎片化的数据移动到连续的空间中。\n\
  \n每隔 60 秒，`RAM`中的文件会被刷新到磁盘。为了防止在断电时数据丢失，默认情况下是开启日志记录来运行的。日志的行为取决于所配置的存储引擎。\n`MMAPv1`日志文件每\
  \ 100ms 刷新到磁盘一次，如果发生断电，它用于将数据库恢复到一致状态。\n\n在`WiredTiger`中，缓存中的数据以针对内存访问优化的`B+树`结构存储。缓存维护一个与索引关联的磁盘上页面映像，用于识别所请求的数据在页面中的实际位置（参见图\
  \ 8-12）。\n\n![A332296_1_En_8_Fig12_HTML.jpg](img/A332296_1_En_8_Fig12_HTML.jpg)\n\
  *图 8-12. WiredTiger 缓存*\n\n`WiredTiger`中的写操作从不进行就地更新。\n每当向`WiredTiger`发出一个操作时，它在内部会被分解成多个事务，其中每个事务都在一个内存中快照的上下文中工作。该快照是事务开始之前已提交版本的快照。写入者可以与读取者并发地创建新版本。\n\
  \n写操作不更改页面；相反，更新被叠加在页面之上。使用`跳表`（skipList）数据结构来维护所有的更新，其中最新的更新位于顶部。因此，每当用户读/写数据时，索引会检查是否存在`跳表`。如果不存在`跳表`，则从磁盘上的页面映像返回数据。如果存在`跳表`，则将列表头部的数据返回给线程，然后线程更新数据。一旦执行提交，更新后的数据将被添加到列表头部，并相应地调整指针。这样，多个用户可以并发访问数据而不会发生任何冲突。只有当多个线程试图更新同一条记录时才会发生冲突。在这种情况下，一个更新成功，另一个并发更新需要重试。\n\
  \n由于更新导致的树结构的任何更改，例如页面大小增加时的分裂、重定位等，稍后由后台进程进行调和。这解释了`WiredTiger`引擎快速写操作的原因；数据整理的任务留给了后台进程。参见图\
  \ 8-13。\n\n![A332296_1_En_8_Fig13_HTML.jpg](img/A332296_1_En_8_Fig13_HTML.jpg)\n\
  *图 8-13. 跳表*\n\n\n\n### WiredTiger 与 MongoDB 存储机制\n\nWiredTiger 采用 MVCC 方法来实现并发控制，即维护数据的多个版本。它确保每个尝试访问数据的线程都能看到最一致的数据版本。正如你所见，写操作并非就地执行；相反，它们被追加到\
  \ **skipList** 数据结构的顶部，最新的更新位于最上方。访问数据的线程获取最新副本，并在提交前持续使用该副本。一旦提交，更新就会被追加到列表顶部，之后任何访问该数据的线程都将看到该最新更新。\n\
  \n这使得多个线程能够并发访问相同数据，而无需任何锁定或争用。这也使得写入者能够与读者并发地创建新版本。冲突仅在多个线程尝试更新同一条记录时发生。在这种情况下，一个更新成功，另一个并发更新则需要重试。\n\
  \n图 8-14 展示了 MVCC 的实际运作。\n\n![A332296_1_En_8_Fig14_HTML.jpg](img/A332296_1_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14. 更新进行中\n\n`WiredTiger` 日志确保写操作在检查点之间持久化到磁盘。`WiredTiger` 默认每 60 秒或写入 2GB\
  \ 数据后使用检查点将数据刷新到磁盘。因此，在默认情况下，如果未启用日志记录，`WiredTiger` 可能会丢失最多 60 秒的写入，尽管如果使用复制来保证持久性，这种丢失的风险通常会小得多。`WiredTiger`\
  \ 事务日志并非在发生不干净关机时保持数据文件处于一致状态所必需的，因此在不启用日志记录的情况下运行是安全的，尽管为了确保耐久性，应配置“副本安全”的写关注点。`WiredTiger`\
  \ 存储引擎的另一个特性是能够压缩磁盘上的日志，从而减少存储空间。\n\n## 8.5 如何使用日志记录写入数据\n\n在本节中，你将简要了解使用日志记录如何执行写操作。\n\
  \n`MongoDB` 磁盘写入是惰性的，这意味着如果一秒钟内有 1000 次增量操作，它只会被写入一次。物理写入发生在操作之后的几秒钟。\n\n你现在将看到更新在\
  \ `mongod` 中实际是如何发生的。\n\n如你所知，在 `MongoDB` 系统中，`mongod` 是主要的守护进程。因此，磁盘上有数据文件和日志文件。见图\
  \ 8-15。\n\n![A332296_1_En_8_Fig15_HTML.jpg](img/A332296_1_En_8_Fig15_HTML.jpg)\n\
  \n图 8-15. mongod\n\n当 `mongod` 启动时，数据文件被映射到一个**共享视图**。换句话说，数据文件被映射到一个虚拟地址空间。见图 8-16。\n\
  \n![A332296_1_En_8_Fig16_HTML.jpg](img/A332296_1_En_8_Fig16_HTML.jpg)\n\n图 8-16.\
  \ 映射到共享视图\n\n基本上，操作系统识别到你的数据文件在磁盘上是 2000 字节，因此将其映射到内存地址 1,000,000 – 1,002,000。请注意，数据在访问之前不会实际加载；操作系统只是映射它并保持它。\n\
  \n到目前为止，你仍然有文件在备份内存。因此，内存中的任何更改都将由操作系统刷新到底层文件。\n\n这是在未启用日志记录时 `mongod` 的工作方式。每 60\
  \ 秒，内存中的更改会被操作系统刷新。\n\n在这种情况下，让我们看看启用日志记录后的写入。启用日志记录后，`mongod` 会进行第二次映射到一个**私有视图**。\n\
  \n这就是为什么启用日志记录后，`mongod` 使用的虚拟内存量会加倍。见图 8-17。\n\n![A332296_1_En_8_Fig17_HTML.jpg](img/A332296_1_En_8_Fig17_HTML.jpg)\n\
  \n图 8-17. 映射到私有视图\n\n你可以在图 8-17 中看到数据文件如何不直接连接到私有视图，因此更改不会由操作系统从私有视图刷新到磁盘。\n\n让我们看看启动写操作时发生的事件序列。当启动写操作时，首先它写入私有视图（图\
  \ 8-18）。\n\n![A332296_1_En_8_Fig18_HTML.jpg](img/A332296_1_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18. 启动的写操作\n\n接下来，更改被写入日志文件，追加文件更改的简要描述（图 8-19）。\n\n![A332296_1_En_8_Fig19_HTML.jpg](img/A332296_1_En_8_Fig19_HTML.jpg)\n\
  \n图 8-19. 更新日志文件\n\n日志在收到更改时不断追加更改描述。如果此时 `mongod` 失败，即使数据文件尚未修改，日志也可以重放所有更改，从而使此时的写入安全。\n\
  \n日志现在将在共享视图上重放记录的更改（图 8-20）。\n\n![A332296_1_En_8_Fig20_HTML.jpg](img/A332296_1_En_8_Fig20_HTML.jpg)\n\
  \n图 8-20. 更新共享视图\n\n最后，更改以非常快的速度写入磁盘。默认情况下，`mongod` 每 60 秒请求操作系统执行此操作（图 8-21）。\n\
  \n![A332296_1_En_8_Fig21_HTML.jpg](img/A332296_1_En_8_Fig21_HTML.jpg)\n\n图 8-21.\
  \ 更新数据文件\n\n在最后一步中，`mongod` 将共享视图重新映射到私有视图。这样做是为了防止私有视图变得过于“脏”（图 8-22）。\n\n![A332296_1_En_8_Fig22_HTML.jpg](img/A332296_1_En_8_Fig22_HTML.jpg)\n\
  \n图 8-22. 重新映射\n\n## 8.6 GridFS – MongoDB 文件系统\n\n你已经了解了底层机制。你看到 `MongoDB` 将数据存储在\
  \ `BSON` 文档中。`BSON` 文档有 16MB 的文档大小限制。\n\n`GridFS` 是 `MongoDB` 用于处理超出 `BSON` 文档大小限制的大文件的规范。本节将简要介绍\
  \ `GridFS`。\n\n这里的“规范”意味着它本身并不是 `MongoDB` 的一个特性，因此 `MongoDB` 中没有实现它的代码。它只是规定了应如何处理大文件。`PHP`、`Python`\
  \ 等语言驱动程序实现了这个规范，并向该驱动程序的用户公开一个 `API`，使他们能够在 `MongoDB` 中存储/检索大文件。\n\n\n### 8.6.1\
  \ GridFS 的设计原理\n\n根据设计，一个 MongoDB 文档（即 BSON 对象）不能大于 16MB。这样做是为了保持最佳性能，而且这个大小也完全满足我们的需求。例如，4MB\
  \ 的空间可能足以存储一段音频剪辑或一张个人资料图片。然而，如果需求是存储高质量的音频或视频剪辑，甚至是大于几百兆字节的文件，MongoDB 通过使用 GridFS\
  \ 为你提供了保障。\n\nGridFS 规定了一种将大文件分割存储到多个文档中的机制。实现它的语言驱动程序（例如 PHP 驱动程序）会在底层负责存储文件的分割（或在检索文件时合并被分割的块）。使用该驱动程序的开发人员无需了解这些内部细节。这样，GridFS\
  \ 允许开发人员以一种透明且高效的方式存储和操作文件。\n\nGridFS 使用两个集合来存储文件。一个集合维护文件的元数据，另一个集合则通过将文件数据分割成称为“块”的小片段来存储文件数据。这意味着文件被分割成更小的块，每个块作为一个独立的文档存储。默认情况下，块的大小限制为\
  \ 255KB。\n\n这种方法不仅使数据存储具有可扩展性且易于管理，而且在检索文件的特定部分时，也使得范围查询更易于使用。\n\n在 GridFS 中查询文件时，会根据客户端的需要重新组装块。这也为用户提供了访问文件任意部分的能力。例如，用户可以直接跳到视频文件的中间位置。\n\
  \nGridFS 规范在文件大小超过 MongoDB BSON 文档默认的 16MB 限制时非常有用。它也用于存储那些你无需将整个文件加载到内存中就需要访问的文件。\n\
  \n### 8.6.2 GridFS 的内部机制\n\nGridFS 是一个用于存储文件的轻量级规范。\n\nMongoDB 服务器端并不会对 GridFS 请求进行“特殊处理”。所有工作都是在客户端完成的。\n\
  \nGridFS 使你能够通过将大文件分割成更小的块，并将每个块作为独立文档存储的方式来存储大文件。除了这些块之外，还有一个包含文件元数据的文档。利用这些元数据信息，这些块被组合在一起，形成完整的文件。\n\
  \n由于 MongoDB 支持在文档中存储二进制数据，因此块的存储开销可以保持在最低水平。\n\nGridFS 用于存储大文件的两个集合默认命名为 `fs.files`\
  \ 和 `fs.chunks`，尽管你可以选择一个不同于 `fs` 的桶名称。\n\n块默认存储在 `fs.chunks` 集合中。如果需要，可以覆盖此设置。因此，所有数据都包含在\
  \ `fs.chunks` 集合中。\n\n块集合中各个文档的结构非常简单：\n\n```json\n{\n  \"_id\" : ObjectId(\"...\"\
  ),\n  \"n\" : 0,\n  \"data\" : BinData(\"...\"),\n  \"files_id\" : ObjectId(\"...\"\
  )\n}\n```\n\n块文档包含以下重要键：\n\n*   `\"_id\"`：这是唯一标识符。\n*   `\"files_id\"`：这是包含该块相关元数据的文档的唯一标识符。\n\
  *   `\"n\"`：这基本上表示该块在原始文件中的位置。\n*   `\"data\"`：这是构成该块的实际二进制数据。\n\n`fs.files` 集合存储每个文件的元数据。该集合中的每个文档代表\
  \ GridFS 中的一个文件。除了通用的元数据信息外，该集合的每个文档还可以包含它所代表文件特有的自定义元数据。\n\n以下是 GridFS 规范强制要求的键：\n\
  \n*   `_id`：这是文件的唯一标识符。\n*   `length`：这描述了构成文件完整内容的总字节数。\n*   `chunkSize`：这是文件的块大小，以字节为单位。默认是\
  \ 255KB，但如果需要可以调整。\n*   `uploadDate`：这是文件存储到 GridFS 中的时间戳。\n*   `md5`：这在服务器端生成，是文件内容的\
  \ md5 校验和。MongoDB 服务器通过使用 `filemd5` 命令生成其值，该命令计算已上传块的 md5 校验和。这意味着用户可以检查此值以确保文件已正确上传。\n\
  \n一个典型的 `fs.files` 文档如下所示（另见图 8-23）：\n\n![A332296_1_En_8_Fig23_HTML.jpg](img/A332296_1_En_8_Fig23_HTML.jpg)\n\
  \n图 8-23. GridFS\n\n```json\n{\n  \"_id\" : ObjectId(\"...\"),\n  \"length\" : data_number,\n\
  \  \"chunkSize\" : data_number,\n  \"uploadDate\" : data_date,\n  \"md5\" : data_string\n\
  }\n```\n\n### 8.6.3 使用 GridFS\n\n在本节中，你将使用 PyMongo 驱动程序来了解如何开始使用 GridFS。\n\n####\
  \ 添加对文件系统的引用\n\n首先需要的是对 GridFS 文件系统的引用：\n\n```python\n>>> import pymongo\n>>> import\
  \ gridfs\n>>> myconn = pymongo.Connection()\n>>> mydb = myconn.gridfstest\n>>> myfs\
  \ = gridfs.GridFS(db)\n```\n\n#### write( )\n\n接下来，你将执行一个基本的写入操作：\n\n```python\n\
  >>> with myfs.new_file() as myfp:\n...     myfp.write('This is my new sample file.\
  \ It is just grand!')\n```\n\n#### find( )\n\n使用 mongo shell，让我们看看底层集合中存储了什么：\n\n\
  ```python\n>>> list(mydb.myfs.files.find())\n[{u'length': 38, u'_id': ObjectId('52fdd6189cd2fd08288d5f5c'),\
  \ u'uploadDate': datetime.datetime(2014, 11, 4, 4, 20, 41, 800000), u'md5': u'332de5ca08b73218a8777da69293576a',\
  \ u'chunkSize': 262144}]\n>>> list(mydb.myfs.chunks.find())\n[{u'files_id': ObjectId('52fdd6189cd2fd08288d5f5c'),\
  \ u'_id': ObjectId('52fdd6189cd2fd08288d5f5d'), u'data': Binary('This is my new\
  \ sample file. It is just grand!', 0), u'n': 0}]\n```\n\n#### 强制分割文件\n\n让我们强制分割文件。这可以通过在创建文件时指定一个较小的\
  \ `chunkSize` 来实现，如下所示：\n\n```python\n>>> with myfs.new_file(chunkSize=10) as myfp:\n\
  ...     myfp.write('This is second file. I am assuming it will be split into various\
  \ chunks')\n...\n>>> myfp\n<gridfs.grid_file.GridIn object at 0x0000000002AC79B0>\n\
  >>> myfp._id\nObjectId('52fdd76e9cd2fd08288d5f5e')\n>>> list(mydb.myfs.chunks.find(dict(files_id=myfp._id)))\n\
  .............\nObjectId('52fdd76e9cd2fd08288d5f65'), u'data': Binary('s', 0), u'n':\
  \ 6}]\n```\n\n#### read( )\n\n你现在知道了文件在数据库中实际是如何存储的。接下来，使用客户端驱动程序，你将读取该文件：\n\n```python\n\
  >>> with myfs.get(myfp._id) as myfp_read:\n...     print myfp_read.read()\n...\n\
  \"This is second file. I am assuming it will be split into various chunks.\"\n```\n\
  \n用户根本不需要意识到块的存在。你需要使用客户端暴露的 API 来从 GridFS 读写文件。\n\n\n#### 将 GridFS 更像文件系统一样对待\n\
  \n`new_file()` - 在 GridFS 中创建新文件\n\n你可以将任意数量的关键字参数传递给 `new_file()`。这些参数将被添加到 `fs.files`\
  \ 文档中：\n\n```\n>>> with myfs.new_file(\n...     filename='practicalfile.txt',\n\
  ...     content_type='text/plain',\n...     my_other_attribute=42) as myfp:\n...\
  \     myfp.write('My New file')\n...\n>>> myfp\n<gridfs.grid_file.GridIn object\
  \ at 0x0000000002AC7AC8>\n>>> db.myfs.files.find_one(dict(_id=myfp._id))\n{u'contentType':\
  \ u'text/plain', u'chunkSize': 262144, u'my_other_attribute': 42, u'filename': u'practicalfile.txt',\
  \ u'length': 8, u'uploadDate': datetime.datetime(2014, 11, 4, 9, 1, 32, 800000),\
  \ u'_id': ObjectId('52fdd8db9cd2fd08288d5f66'), u'md5': u'681e10aecbafd7dd385fa51798ca0fd6'}\n\
  >>>\n```\n\n文件可以通过文件名被覆盖。由于 GridFS 使用 `_id` 来索引文件，旧文件并不会被移除，只是会维护一个文件版本。\n\n```\n\
  >>> with myfs.new_file(filename='practicalfile.txt', content_type='text/plain')\
  \ as myfp:\n...     myfp.write('Overwriting the \"My New file\"')\n...\n```\n\n\
  `get_version()` / `get_last_version()`\n\n在上述情况下，可以使用 `get_version` 或 `get_last_version`\
  \ 来通过文件名检索文件。\n\n```\n>>> myfs.get_last_version('practicalfile.txt').read()\n'Overwriting\
  \ the \"My New file\"'\n>>> myfs.get_version('practicalfile.txt',0).read()\n'My\
  \ New file'\n```\n\n你也可以列出 GridFS 中的文件：\n\n```\n>>> myfs.list()\n[u'practicalfile.txt',\
  \ u'practicalfile2.txt']\n```\n\n`delete()`\n\n文件也可以被删除：\n\n```\n>>> myfp = myfs.get_last_version('practicalfile.txt')\n\
  >>> myfs.delete(myfp._id)\n>>> myfs.list()\n[u'practicalfile.txt', u'practicalfile2.txt']\n\
  >>> myfs.get_last_version('practicalfile.txt').read()\n'My New file'\n>>>\n```\n\
  \n请注意，只有一个版本的 `practicalfile.txt` 被删除了。你的文件系统中仍然存在一个名为 `practicalfile.txt` 的文件。\n\
  \n`exists()` 和 `put()`\n\n接下来，你将使用 `exists()` 来检查文件是否存在，并使用 `put()` 将一个短文件快速写入 GridFS：\n\
  \n```\n>>> myfs.exists(myfp._id)\nFalse\n>>> myfs.exists(filename='practicalfile.txt')\n\
  True\n>>> myfs.exists({'filename':'practicalfile.txt'}) # equivalent to above\n\
  True\n>>> myfs.put('The red fish', filename='typingtest.txt')\nObjectId('52fddbc69cd2fd08288d5f6a')\n\
  >>> myfs.get_last_version('typingtest.txt').read()\n'The red fish'\n>>>\n```\n\n\
  ## 索引\n\n在本书的这一部分，你将简要探讨 MongoDB 上下文中的索引是什么。随后，我们将重点介绍 MongoDB 中可用的各种索引类型，最后总结索引的行为和限制。\n\
  \n索引是一种加快读取操作的数据结构。通俗地讲，它类似于书籍的索引，你可以通过在索引中查找章节并直接跳转到页码来找到任何章节，而无需扫描整本书来找到该章节——如果没有索引，情况就会是那样。\n\
  \n类似地，索引定义在字段上，可以帮助以更好、更高效的方式搜索信息。\n\n与其他数据库一样，在 MongoDB 中也以类似方式看待索引（它用于加速 `find()`\
  \ 操作）。你运行的查询类型有助于为数据库创建高效的索引。例如，如果大多数查询使用日期字段，那么在日期字段上创建索引将是有益的。确定哪个索引对你的查询最优可能很棘手，但值得一试，因为如果没有合适的索引，原本需要几分钟的查询在有正确索引的情况下可以瞬间返回结果。\n\
  \n在 MongoDB 中，可以在文档的任何字段或子字段上创建索引。在了解 MongoDB 中可以创建的各种索引类型之前，让我们先列出索引的一些核心特性：\n\n\
  *   索引是在每个集合级别定义的。对于每个集合，都有不同的索引集合。\n*   与 SQL 索引类似，MongoDB 索引也可以在单个字段或字段集上创建。\n\
  *   在 SQL 中，虽然索引提高了查询性能，但每次写入操作都会产生开销。因此在创建任何索引之前，请考虑查询的类型、频率、工作负载的大小以及插入负载，同时结合应用程序需求。\n\
  *   所有 MongoDB 索引都使用 BTree 数据结构。\n*   每个使用更新操作的查询只使用一个索引，这由查询优化器决定。这可以通过使用 `hint`\
  \ 来覆盖。\n*   如果所有字段都是索引的一部分，无论该字段是用于查询还是用于投影，都说该查询被索引覆盖。\n*   覆盖索引可以最大化 MongoDB 的性能和吞吐量，因为查询可以仅使用索引就得到满足，无需将完整文档加载到内存中。\n\
  *   只有当创建索引所依据的字段被更改时，索引才会更新。并非所有对文档的更新操作都会导致索引更改。只有当相关字段受到影响时，它才会被更改。\n\n### 索引类型\n\
  \n在本节中，你将了解 MongoDB 中可用的不同类型的索引。\n\n#### `_id` 索引\n\n这是在 `_id` 字段上创建的默认索引。此索引无法被删除。\n\
  \n\n### 8.7.1.2 二级索引\n\n在 MongoDB 中，所有用户使用 `ensureIndex()` 创建的索引都被称为二级索引。\n\n这些索引可以创建在文档或子文档的任何字段上。让我们考虑以下文档：\n\
  ```json\n{\"_id\": ObjectId(...), \"name\": \"Practical User\", \"address\": {\"\
  zipcode\": 201301, \"state\": \"UP\"}}\n```\n在此文档中，可以在 `name` 字段上创建索引，也可以在 `state`\
  \ 字段上创建索引。\n\n这些索引也可以创建在保存子文档的字段上。如果你考虑上面那个 `address` 字段保存了子文档的文档，那么也可以在 `address`\
  \ 字段上创建索引。\n\n这些索引可以创建在单个字段上，也可以创建在一组字段上。当在一组字段上创建时，它也被称为复合索引。为了进一步解释，让我们考虑一个 `products`\
  \ 集合，它保存了以下格式的文档：\n```json\n{ \"_id\": ObjectId(...),\"category\": [\"food\", \"\
  grocery\"], \"item\": \"Apple\", \"location\": \"16th Floor Store\", \"arrival\"\
  : Date(...)}\n```\n如果大多数查询都使用 `item` 和 `location` 字段，那么可以创建如下的复合索引：\n```javascript\n\
  db.products.ensureIndex ({\"item\": 1, \"location\": 1})\n```\n除了引用复合索引所有字段的查询外，上面的复合索引还支持使用任何索引前缀的查询（即，它也可以支持仅使用\
  \ `item` 字段的查询）。\n\n如果在保存数组作为其值的字段上创建索引，则会使用多键索引来分别索引数组的每个值。考虑以下文档：\n```json\n{\
  \ \"_id\" : ObjectId(\"...\"),\"tags\" : [ \"food\", \"hot\", \"pizza\", \"may\"\
  \ ] }\n```\n在 `tags` 上的索引是一个多键索引，它将包含以下条目：\n```json\n{ tags: \"food\" }\n{ tags:\
  \ \"hot\" }\n{ tags: \"pizza\" }\n{ tags: \"may\" }\n```\n也可以创建多键复合索引。但是，在任何时候，复合索引中只能有一个字段是数组类型。如果你创建了一个\
  \ `{a1: 1, b1: 1}` 的复合索引，则允许的文档如下：\n```json\n{a1: [1, 2], b1: 1}\n{a1: 1, b1: [1,\
  \ 2]}\n```\n以下文档是不允许的；实际上，MongoDB 甚至无法插入此文档：\n```json\n{a1: [21, 22], b1: [11, 12]}\n\
  ```\n如果尝试插入这样的文档，插入将被拒绝并产生以下错误结果：“cannot index parallel arrays”。\n\n接下来，你将了解在创建索引时可能有用的各个选项/属性。\n\
  \n#### 带键排序的索引\n\nMongoDB 索引维护对字段的引用。引用以升序或降序维护。这是通过在创建索引时为键指定一个数字来完成的。该数字表示索引方向。可能的选项是\
  \ 1 和 -1，其中 1 表示升序，-1 表示降序。\n\n在单键索引中，这可能不太重要；然而，在复合索引中，方向非常重要。\n\n考虑一个包含 `username`\
  \ 和 `timestamp` 的 `Events` 集合。你的查询是返回按 `username` 排序，然后最近的事件在前的事件。将使用以下索引：\n```javascript\n\
  db.events.ensureIndex({ \"username\" : 1, \"timestamp\" : -1 })\n```\n此索引包含按以下方式排序的文档的引用：\n\
  \n首先按 `username` 字段升序排列。然后，对于每个 `username`，按 `timestamp` 字段降序排列。\n\n#### 唯一索引\n\n\
  创建索引时，你需要确保索引字段中存储的值的唯一性。在这种情况下，你可以创建 `Unique` 属性设置为 true 的索引（默认为 false）。\n\n假设你想在\
  \ `userid` 字段上创建一个 `unique_index`。可以运行以下命令来创建唯一索引：\n```javascript\ndb.payroll.ensureIndex(\
  \ { \"userid\": 1 }, { unique: true } )\n```\n此命令确保 `user_id` 字段中的值是唯一的。关于唯一性约束，你需要注意以下几点：\n\
  \n*   如果唯一约束用于复合索引，则在该场景下，唯一性会在值的组合上强制执行。\n*   如果未为唯一索引的字段指定值，则存储一个空值。\n*   在任何时候，只允许一个文档没有唯一值。\n\
  \n#### dropDups\n\n如果你在已包含文档的集合上创建唯一索引，创建可能会失败，因为你可能有一些文档在索引字段中包含重复值。在这种情况下，可以使用\
  \ `dropDups` 选项来强制创建唯一索引。其工作原理是保留键值的第一次出现，并删除所有后续值。默认情况下 `dropDups` 为 false。\n\n\
  #### 稀疏索引\n\n稀疏索引是一种索引，它只保存集合中那些在索引所创建的字段上存在的文档的条目。如果你想在 `User` 集合的 `LastName` 字段上创建稀疏索引，可以发出以下命令：\n\
  ```javascript\ndb.User.ensureIndex( { \"LastName\": 1 }, { sparse: true } )\n```\n\
  此索引将包含如下文档：\n```json\n{FirstName: Test, LastName: User}\n```\n或\n```json\n{FirstName:\
  \ Test2, LastName: }\n```\n但是，以下文档不会成为稀疏索引的一部分：\n```json\n{FirstName: Test1}\n```\n\
  该索引被称为稀疏的，因为它只包含带有索引字段的文档，而缺失该字段的文档则被忽略。由于这种特性，稀疏索引可以显著节省空间。\n\n相比之下，非稀疏索引包含所有文档，无论索引字段是否在文档中可用。如果字段缺失，则存储空值。\n\
  \n#### TTL 索引（生存时间）\n\n在 2.2 版本中引入了一个新的索引属性，它使你能够在指定时间段过后自动从集合中删除文档。此属性非常适合日志、会话信息和机器生成的事件数据等场景，这些数据只需要在有限的时间内保持持久性。\n\
  \n如果你想在集合 `logs` 上设置一小时的 TTL，可以使用以下命令：\n```javascript\ndb.Logs.ensureIndex( { \"\
  Sample_Time\": 1 }, { expireAfterSeconds: 3600} )\n```\n但是，你需要注意以下限制：\n\n*   创建索引的字段必须仅为日期类型。在上面的例子中，`sample_time`\
  \ 字段必须保存日期值。\n*   它不支持复合索引。\n*   如果被索引的字段包含一个带有多个日期的数组，则当数组中的最小日期与过期阈值匹配时，文档过期。\n\
  *   无法在已有索引的字段上创建它。\n*   此索引无法在固定大小集合上创建。\n*   TTL 索引使用后台任务过期数据，该任务每分钟运行一次以删除过期的文档。因此，你无法保证过期文档不再存在于集合中。\n\
  \n#### 地理空间索引\n\n随着智能手机的普及，查询当前位置附近的事物变得非常普遍。为了支持此类基于位置的查询，MongoDB 提供了地理空间索引。\n\n\
  要创建地理空间索引，文档中必须存在以下形式之一的坐标对：\n\n*   一个包含两个元素的数组\n*   或一个包含两个键的嵌入式文档（键名可以是任意的）。\n\
  \n以下是有效示例：\n```json\n{ \"userloc\" : [ 0, 90 ] }\n{ \"loc\" : { \"x\" : 30, \"y\"\
  \ : -30 } }\n{ \"loc\" : { \"latitude\" : -30, \"longitude\" : 180 } }\n{\"loc\"\
  \ : {\"a1\" : 0, \"b1\" : 1}}\n```\n以下命令可用于在 `userloc` 字段上创建地理空间索引：\n```javascript\n\
  db.userplaces.ensureIndex( { userloc : \"2d\" } )\n```\n地理空间索引默认假设值范围从 -180 到 180。如果需要更改此范围，可以与\
  \ `ensureIndex` 一起指定，如下所示：\n\n\n\n`db.userplaces.ensureIndex({\"userloc\" : \"2d\"\
  }, {\"min\" : -1000, \"max\" : 1000})`\n\n任何字段值超出最大值和最小值的文档都将被拒绝。你还可以创建复合地理空间索引。\n\
  \n让我们通过一个例子来理解这个索引是如何工作的。假设你有以下类型的文档：\n\n```json\n{\"loc\":[0,100], \"desc\":\"\
  coffeeshop\"}\n{\"loc\":[0,1], \"desc\":\"pizzashop\"}\n```\n\n如果用户的查询是找到她位置附近的所有咖啡店，那么以下复合索引可以提供帮助：\n\
  \n`db.ensureIndex({\"userloc\" : \"2d\", \"desc\" : 1})`\n\n#### 干草堆索引\n\n干草堆索引是基于桶的地理空间索引（也称为地理空间干草堆索引）。它们对于需要在很小区域内查找位置并需要沿另一个维度进行过滤的查询非常有用，例如查找坐标在\
  \ 10 英里范围内且`type`字段值为`restaurant`的文档。\n\n在定义索引时，必须指定`bucketSize`参数，因为它决定了干草堆索引的粒度。例如，\n\
  \n`db.userplaces.ensureIndex({ userpos : \"geoHaystack\", type : 1 }, { bucketSize\
  \ : 1 })`\n\n此示例创建了一个索引，其中纬度或经度 1 个单位范围内的键存储在同一个桶中。你还可以在索引中包含一个额外的类别，这意味着在查找位置信息的同时也会查找该信息。\n\
  \n如果你的用例通常是搜索\"附近\"的位置（即\"25 英里内的餐厅\"），`haystack`索引会更高效。\n\n对于额外的索引字段（例如类别），可以在每个桶内找到并计数匹配项。\n\
  \n相反，如果你正在搜索\"最近的餐厅\"并希望不考虑距离返回结果，普通的`2d`索引会更高效。\n\n目前（截至 MongoDB 2.2.0），干草堆索引有一些限制：\n\
  \n*   干草堆索引中只能包含一个额外字段。\n*   额外的索引字段必须是单个值，不能是数组。\n*   不支持空的经度/纬度值。\n\n除了上述类型外，版本\
  \ 2.4 还引入了一种支持在集合上进行文本搜索的新索引类型。\n\n在 2.6 版本中，文本搜索功能脱离了之前的测试版，成为一项内置功能。它包括诸如支持 15\
  \ 种语言搜索等选项，以及一个可用于在电子商务网站上按产品或颜色设置分面导航的聚合选项。\n\n### 8.7.1.3 索引交叉\n\n索引交叉是在版本 2.6\
  \ 中引入的，它允许交叉使用多个索引来满足一个查询。进一步解释一下，让我们考虑一个`products`集合，它保存以下格式的文档：\n\n```json\n{\
  \ \"_id\": ObjectId(...),\"category\": [\"food\", \"grocery\"], \"item\": \"Apple\"\
  , \"location\": \"16th Floor Store\", \"arrival\": Date(...)}.\n```\n\n再假设该集合有以下两个索引：\n\
  \n```json\n{ \"item\": 1 }.\n{ \"location\": 1 }.\n```\n\n上述两个索引的交叉可用于以下查询：\n\n\
  `db.products.find ({\"item\": \"xyz\", \"location\": \"abc\"})`\n\n你可以运行`explain()`来确定上述查询是否使用了索引交叉。`explain`输出将包含以下阶段之一：`AND_SORTED`或`AND_HASH`。进行索引交叉时，可以使用整个索引或仅使用索引前缀。\n\
  \n你接下来需要了解此索引交叉功能如何影响复合索引的创建。\n\n创建复合索引时，索引中列出的键的顺序以及排序顺序（升序和降序）都很重要。因此，复合索引可能无法支持不包含索引前缀或键排序顺序不同的查询。\n\
  \n为了进一步解释，让我们考虑一个`products`集合，它有以下复合索引：\n\n`db.products.ensureIndex ({\"item\":\
  \ 1, \"location\": 1})`\n\n除了引用复合索引所有字段的查询外，上述复合索引还可以支持使用任何索引前缀的查询（它也可以支持仅使用`item`字段的查询）。但它无法支持仅使用`location`字段或使用排序顺序不同的`item`键的查询。\n\
  \n相反，如果你创建两个单独的索引，一个在`item`上，另一个在`location`上，这两个索引可以单独或通过交叉来支持上述四种查询。因此，选择创建复合索引还是依赖索引交叉，取决于系统的需求。\n\
  \n请注意，当`sort()`操作需要一个与查询谓词完全分开的索引时，索引交叉将不适用。\n\n例如，假设对于`products`集合，你有以下索引：\n\n\
  ```json\n{ \"item\": 1 }.\n{ \"location\": 1 }.\n{ \"location\": 1, \"arrival_date\"\
  :-1 }.\n{ \"arrival_date\": -1 }.\n```\n\n对于以下查询，不会使用索引交叉：\n\n`db.products.find(\
  \ { item: \"xyz\"} ).sort( { location: 1 } )`\n\n也就是说，MongoDB 不会使用`{ item: 1 }`索引进行查询，也不会使用单独的`{\
  \ location: 1 }`或`{ location: 1, arrival_date: -1 }`索引进行排序。\n\n然而，对于以下查询可以使用索引交叉，因为索引`{location:\
  \ 1,arrival_date: -1 }`可以满足部分查询谓词：\n\n`db.products.find( { item: { \"xyz\"} , location:\
  \ \"A\" } ).sort( { arrival_date: -1 } )`\n\n### 8.7.2 行为与限制\n\n最后，以下是你需要注意的一些行为和限制：\n\
  \n*   一个集合中可能不允许有超过[64 个索引](http://docs.mongodb.org/manual/reference/limits/#limit-number-of-indexes-per-collection)。\n\
  *   索引键不能大于[1024 字节](http://docs.mongodb.org/manual/reference/limits/#limit-index-size)。\n\
  *   如果文档的字段值大于此大小，则无法为该文档创建索引。\n*   以下命令可用于查询因过大而无法索引的文档：\n\n    `db.practicalCollection.find({<key>:\
  \ <too large to index>}).hint({$natural: 1})`\n\n*   索引名称（包括[命名空间](http://docs.mongodb.org/manual/reference/glossary/#term-namespace)）必须小于[128\
  \ 个字符](http://docs.mongodb.org/manual/reference/limits/#limit-index-name-length)。\n\
  *   插入/更新速度在一定程度上会受到索引的影响。\n*   不要维护未使用或将来不会使用的索引。\n*   由于[`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)查询的每个子句是并行执行的，每个子句可以使用不同的索引。\n\
  *   使用[`sort()`](http://docs.mongodb.org/manual/reference/method/cursor.sort/#cursor.sort%23cursor.sort)方法和[`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)运算符的查询将无法使用[`$or`](http://docs.mongodb.org/manual/reference/operator/or/#_S_or%23%24or)字段上的索引。\n\
  *   使用`$or`运算符的查询不受第二种[地理空间查询](http://docs.mongodb.org/manual/core/geospatial-indexes/)支持。\n\
  \n## 8.8 本章小结\n\n在本章中，你了解了数据在底层是如何存储的，以及如何通过日志记录实现写入。你还学习了 GridFS 以及 MongoDB 中可用的不同类型的索引。\n\
  \n在下一章中，你将从管理视角来审视 MongoDB。\n\n"
- '# 9. 管理 MongoDB


  > “管理 MongoDB 不同于管理传统的关系型数据库管理系统。虽然大多数管理任务并非必需或由系统自动完成，但仍有一些任务需要人工干预。”


  在本章中，你将了解用于备份与恢复、导入与导出数据、管理服务器以及监控数据库实例的基本管理操作流程。




  ## 9.1 管理工具


  在您开始进行管理任务之前，这里快速概览一下可用的工具。由于 MongoDB 没有图形用户界面风格的管理界面，大多数管理任务都是通过命令行`mongo` shell
  完成的。不过，也有一些作为独立社区项目提供的用户界面。


  ### 9.1.1 `mongo`


  `mongo` shell 是 MongoDB 发行版的一部分。它是一个用于 MongoDB 数据库的交互式 JavaScript shell。它为管理员和开发人员提供了一个强大的界面，可以直接与数据库测试查询和操作。


  在之前的章节中，您已经了解了使用 shell 进行开发。在本章中，您将学习如何使用 shell 执行系统管理任务。


  ### 9.1.2 第三方管理工具


  有许多可用于 MongoDB 的第三方工具。大多数工具是基于 Web 的。


  10gen 在 MongoDB 网站上维护了一个支持 MongoDB 的所有第三方管理工具列表：[`https://docs.mongodb.org/ecosystem/tools/administration-interfaces/`](https://docs.mongodb.org/ecosystem/tools/administration-interfaces/)。


  ## 9.2 备份与恢复


  备份是最重要的管理任务之一。它确保数据安全，并在任何紧急情况下可以恢复。


  如果数据无法恢复，备份就毫无用处。因此，在进行备份后，管理员需要确保备份是可用的格式，并且捕获了数据的一致状态。


  管理员需要学习的第一项技能是如何进行备份和恢复。


  ### 9.2.1 数据文件备份


  备份数据库最简单的方法是将数据复制到数据目录文件夹中。


  所有 MongoDB 数据都存储在一个数据目录中，默认情况下是`C:\data\db`（在 Windows 中）或`/data/db`（在 LINUX 中）。可以在启动`mongod`时使用`–dbpath`选项将默认路径更改为其他目录。


  数据目录的内容是存储在 MongoDB 数据库中数据的完整映像。因此，进行 MongoDB 备份就是简单地复制数据目录文件夹的全部内容。


  通常，在 MongoDB 运行时复制数据目录内容是不安全的。一个选择是在复制数据目录内容之前关闭 MongoDB 服务器。


  如果服务器被正常关闭，数据目录的内容就代表了 MongoDB 数据的安全快照，因此可以在服务器再次启动之前复制它。


  虽然这是一种安全有效的备份方式，但它并不理想，因为它需要停机时间。


  接下来，您将讨论不需要停机时间的备份技术。


  ### 9.2.2 `mongodump` 和 `mongorestore`


  `mongodump`是作为 MongoDB 发行版一部分提供的 MongoDB 备份工具。它作为一个常规客户端工作，通过查询 MongoDB 实例并将所有读取的文档写入磁盘。


  让我们执行一次备份，然后将其恢复，以验证备份是否可用且格式一致。


  以下代码片段来自在 Windows 平台上运行这些工具。MongoDB 服务器运行在`localhost`实例上。


  打开一个终端窗口并输入以下命令：


  ```

  C:\> cd c:\practicalmongodb\bin

  c:\practicalmongodb\bin> mongod --rest

  2015-07-15T22:26:47.288-0700 I CONTROL [initandlisten] MongoDB starting : pid=3820
  port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9

  .....................................................................................

  2015-07-15T22:28:23.563-0700 I NETWORK [websvr] admin web console waiting for connections
  on port 28017

  ```


  为了运行`mongodump`，在一个新的终端窗口中执行以下命令：


  ```

  C:\> cd c:\practicalmongodb\bin

  c:\practicalmongodb\bin> mongodump

  2015-07-15T22:29:41.538-0700 writing admin.system.indexes to dump\admin\system.indexes.bson

  ................................

  2015-07-14T22:29:46.720-0700 writing mydbproc.users to dump\mydbproc\users.bson

  c:\practicalmongodb\bin>

  ```


  这将整个数据库转储到`bin`文件夹目录下的`dump`文件夹中，如图 9-1 所示。


  ![A332296_1_En_9_Fig1_HTML.jpg](img/A332296_1_En_9_Fig1_HTML.jpg)

  *图 9-1. dump 文件夹*


  `mongodump`工具默认连接到数据库的`localhost`接口和默认端口。


  接下来，它会获取每个数据库和集合的相关数据文件，并将其存储到一个预定义的文件夹结构中，默认为`./dump/[databasename]/[collectionname].bson`。


  数据以`.bson`格式保存，这与 MongoDB 内部用于存储数据的格式类似。


  如果目录中已有内容，除非转储包含同名文件，否则这些内容将保持不变。例如，如果转储包含文件`c1.bson`和`c2.bson`，而输出目录已有文件`c3.bson`和`c1.bson`，那么`mongodump`将用其`c1.bson`文件替换文件夹中的`c1.bson`文件，并复制`c2.bson`文件，但不会删除或更改`c3.bson`文件。


  您应确保目录在用于`mongodump`之前是空的，除非您有覆盖备份数据的需求。


  #### 9.2.2.1 单数据库备份


  在上面的例子中，您使用默认设置执行了`mongodump`，它会转储 MongoDB 数据库服务器上的所有数据库。


  在现实场景中，您会在单个服务器上运行多个应用数据库，每个数据库对备份策略有不同的要求。


  在`mongodump`工具中指定`–d`参数将允许您按数据库进行备份。


  ```

  c:\practicalmongodb\bin> mongodump -d mydbpoc

  2015-07-14T22:37:49.088-0700 writing mydbproc.mapreducecount1 to dump\mydbproc\
  mapreducecount1.bson

  ......................

  2015-07-14T22:37:54.217-0700 writing mydbproc.users metadata to dump\mydbproc\users.metadata.json

  2015-07-14T22:37:54.218-0700 done dumping mydbproc.users

  c:\practicalmongodb\bin>

  ```


  从 MongoDB-2.6 开始，数据库管理员必须拥有`admin`数据库的访问权限，才能备份给定数据库的用户和用户定义的角色，因为 MongoDB 仅将这些信息存储在`admin`数据库中。


  #### 9.2.2.2 集合级别备份


  每个数据库中有两种类型的数据：变化很少的数据，例如您维护用户、其角色以及任何应用相关配置的配置数据；以及变化频繁的数据，例如事件数据（在监控应用中）、帖子数据（在博客应用中）等。


  因此，备份要求也不同。例如，完整数据库可以每周备份一次，而快速变化的集合则需要每小时备份一次。


  在`mongodump`工具中指定`–c`参数，使用户能够单独为指定集合实施备份。


  ```

  c:\practicalmongodb\bin> mongodump -d mydbpoc -c users

  2015-07-14T22:41:19.850-0700 writing mydbproc.users to dump\mydbproc\users.bson

  2015-07-14T22:41:30.710-0700 writing mydbproc.users metadata to dump\mydbproc\users.metadata.json

  ...........................................................

  2015-07-14T22:41:30.712-0700 done dumping mydbproc.users

  c:\practicalmongodb\bin>

  ```


  如果未指定数据要转储到的文件夹，默认情况下，它会将数据转储到当前工作目录中名为`dump`的目录中，在本例中为`c:\practicalmongodb\bin`。


  #### 9.2.2.3 `mongodump` –帮助


  您已经了解了执行`mongodump`的基础知识。除了上面提到的选项，`mongodump`还提供了其他选项，让您可以根据需求定制备份。与所有其他工具一样，使用`–help`选项执行该工具将提供所有可用选项的列表。




  ## 9.2.2 mongorestore


  如前所述，管理员**必须**确保备份以一致且可用的格式进行。因此，下一步是使用 `mongorestore` 将数据转储还原回去。


  此实用程序将把数据库还原到执行转储时的状态。在 3.0 版本之前，甚至允许在不启动 `mongod`/`mongos` 的情况下运行该命令。从 3.0 版本开始，如果在启动
  `mongod`/`mongos` 之前执行该命令，将显示以下错误：


  ```

  c:\> cd c:\practicalmongodb\bin

  c:\ practicalmongodb\bin> mongorestore

  2015-07-15T22:43:07.365-0700 using default ''dump'' directory

  2015-07-15T22:43:17.545-0700 Failed: error connecting to db server: no reachable
  servers

  ```


  在运行 `mongorestore` 命令之前，您必须先运行 `mongod`/`mongos` 实例。


  ```

  c:\> cd c:\practicalmongodb\bin

  c:\ practicalmongodb\bin> mongod --rest

  2015-07-15T22:43:25.765-0700 I CONTROL [initandlisten] MongoDB starting : pid=3820
  port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9

  .....................................................................................

  2015-07-15T22:43:25.865-0700 I NETWORK [websvr] admin web console waiting for connections
  on port 28017

  c:\ practicalmongodb\bin> mongorestore

  2015-07-15T22:44:09.786-0700 using default ''dump'' directory

  2015-07-15T22:44:09.792-0700 building a list of dbs and collections to restore from
  dump dir

  ...................................

  2015-07-15T22:44:09.732-0700 restoring indexes for collection mydbproc.users from
  metadata

  2015-07-15T22:44:09.864-0700 finished restoring mydbproc.users

  c:\practicalmongodb\bin>

  ```


  这会将数据**追加**到现有数据的末尾。


  要覆盖此默认行为，应在上面的代码片段中使用 `–drop`。


  `–drop` 命令指示 `mongorestore` 实用程序，它需要删除前述数据库中的所有集合和数据，然后将转储数据还原回数据库。


  如果未使用 `–drop`，则命令会将数据追加到现有数据的末尾。


  请注意，从 3.0 版本开始，`mongorestore` 命令还可以接受来自标准输入的输入。


  #### 9.2.2.5 还原单个数据库


  正如你在备份部分所看到的，备份策略可以在单个数据库级别指定。你可以通过使用 `–d` 选项运行 `mongodump` 来备份单个数据库。


  同样，你可以向 `mongorestore` 指定 `–d` 选项来还原单个数据库。


  ```

  c:\ practicalmongodb\bin> mongorestore -d mydbpocc:\practicalmongodb\bin\dump\mydbproc
  -drop

  2015-07-14T22:47:01.155-0700 building a list of collections to restore from C :\practicalmongodb\bin\dump\mydbproc
  dir

  2015-07-14T22:47:01.156-0700 reading metadata file from C :\practicalmongodb\bin\dump\mydbproc
  \users.metadata.json

  ..........................................................................

  2015-07-14T22:50:09.732-0700 restoring indexes for collection mydbproc.users from
  metadata

  2015-07-14T22:50:09.864-0700 finished restoring mydbproc.users

  c:\practicalmongodb\bin>

  ```


  #### 9.2.2.6 还原单个集合


  与 `mongodump` 可以使用 `–c` 选项指定集合级备份类似，你也可以通过将 `–c` 选项与 `mongorestore` 实用程序结合使用来还原单个集合。


  ```

  c:\ practicalmongodb\bin> mongorestore -d mydbpoc -c users C:\ practicalmongodb\bin\dum\mydb\user.bson
  -drop

  2015-07-14T22:52:14.732-0700 restoring indexes for collection mydbproc.users from
  metadata

  2015-07-14T22:52:14.864-0700 finished restoring mydbproc.users

  c:\practicalmongodb\bin>

  ```


  ### 9.2.2.7 Mongorestore –Help


  `mongorestore` 也具有多个选项，可以使用 `–help` 选项查看。也可参考以下网站：[`docs.mongodb.org/manual/core/backups/`](http://docs.mongodb.org/manual/core/backups/)。


  ## 9.2.3 fsync 和 Lock


  尽管上述两种方法（`mongodump` 和 `mongorestore`）使你能够在无需停机的情况下进行数据库备份，但它们不提供获取*时间点*数据视图的能力。


  你已经了解了如何通过复制数据文件来备份，但这需要在复制数据前关闭服务器，这在生产环境中是不可行的。


  MongoDB 的 `fsync` 命令允许你在运行 MongoDB 时不更改任何数据的情况下复制数据目录的内容。


  `fsync` 命令会强制所有挂起的写入刷新到磁盘。可选地，它会持有一个锁，以在服务器解锁前阻止进一步的写入。此锁使得 `fsync` 命令适用于备份。


  要从 shell 运行该命令，请在新的终端窗口中连接到 `mongo` 控制台。


  ```

  c:\practicalmongodb\bin> mongo

  MongoDB shell version: 3.0.4

  connecting to: test

  >

  ```


  接下来，切换到 admin 并发出 `runCommand` 以执行 `fsync`：


  ```

  > use admin

  switched to db admin

  > db.runCommand({"fsync":1, "lock":1})

  {

  "info" : "now locked against writes, use db.fsyncUnlock() to unlock",

  "seeAlso" : "http://dochub.mongodb.org/core/fsynccommand",

  "ok" : 1

  }

  >

  ```


  此时，服务器已锁定以进行任何写入，确保数据目录代表一致、时间点的数据快照。数据目录的内容可以安全地复制用作数据库备份。


  在备份活动完成后，必须解锁数据库。为此，请发出以下命令：


  ```

  > db.$cmd.sys.unlock.findOne()

  { "ok" : 1, "info" : "unlock completed" }

  >

  ```


  `currentOp` 命令可用于检查数据库锁是否已释放。


  ```

  > db.currentOp()

  { "inprog" : [ ] }

  (解锁请求首次发出后可能需要片刻。)

  ```


  `fsync` 命令使你能够在不停机且不牺牲备份的时间点性质的情况下进行备份。但是，会存在写入的短暂阻塞（也称为短暂的写入停机时间）。


  从 3.0 版本开始，当使用 WiredTiger 时，`fsync` 不能保证数据文件不会更改。因此，它不能用于确保创建备份时的一致性。


  接下来，你将了解从库备份。这是唯一一种能够在没有任何类型停机的情况下获取时间点快照的备份技术。


  ## 9.2.4 从库备份


  从库备份是 MongoDB 中推荐的数据备份方式。从库存储的数据副本几乎总是与主库同步，并且从库的可用性或性能通常不是问题。你可以在从库而非主库上应用前面讨论的任何技术：关闭、带锁的
  `fsync`，或转储和还原。


  ## 9.3 导入和导出


  当你尝试将应用程序从一个环境迁移到另一个环境时，通常需要导入数据或导出数据。



  '
- '# MongoDB 工具与服务器管理


  ### 9.3.1 `mongoimport`


  MongoDB 提供了 `mongoimport` 工具，允许你将数据批量加载到数据库的集合中。它从文件中读取数据并批量加载到集合。


  这些方法不适合生产环境。


  `mongoimport` 支持以下三种文件格式：


  *   JSON：在此格式中，每行一个 JSON 块，代表一个文档。

  *   CSV：这是一个逗号分隔的文件。

  *   TSV：TSV 文件与 CSV 文件相同；唯一的区别是它使用制表符作为分隔符。


  使用 `–help` 与 `mongoimport` 将提供该工具所有可用的选项。


  `mongoimport` 非常简单。大多数时候你会用到以下选项：


  *   `-h` 或 `–host`：指定需要恢复数据的 `mongod` 主机名。如果未指定该选项，命令将默认连接到在 `localhost` 的 `27017`
  端口上运行的 `mongod`。可选地，可以指定端口号以连接到在不同端口上运行的 `mongod`。

  *   `-d` 或 `–db`：指定需要导入数据的数据库。

  *   `-c` 或 `–collection`：指定需要上传数据的集合。

  *   `--type`：这是文件类型（即 CSV、TSV 或 JSON）。

  *   `--file`：这是需要导入数据的文件路径。

  *   `--drop`：如果设置了此选项，它将删除集合并从导入的数据中重新创建集合。否则，数据将附加到集合末尾。

  *   `--headerLine`：仅用于 CSV 或 TSV 文件，用于指示第一行是标题行。


  以下命令将数据从 CSV 文件导入到 `localhost` 上的 `testimport` 集合：


  ```

  c:\practicalmongodb\bin> mongoimport --host localhost --db mydbpoc --collection
  testimport --type csv –file c:\exporteg.csv –-headerline

  2015-07-14T22:54:08.407-0700 connected to: localhost

  2015-07-14T22:54:08.483-0700 imported 15 documents

  c:\ practicalmongodb\bin>

  ```


  ### 9.3.2 `mongoexport`


  与 `mongoimport` 工具类似，MongoDB 提供了 `mongoexport` 工具，用于从 MongoDB 数据库导出数据。顾名思义，此工具从现有的
  MongoDB 集合中导出文件。


  使用 `–help` 显示 `mongoexport` 工具的可用选项。以下是你最常使用的选项：


  *   `-q`：用于指定查询，该查询将返回需要导出的记录作为输出。这类似于在 `db.CollectionName.find()` 函数中指定的、用于检索符合选择条件的记录的查询。如果未指定查询，则导出所有文档。

  *   `-f`：用于指定需要从选定文档中导出的字段。


  以下命令将数据从 `Users` 集合导出到 CSV 文件：


  ```

  c:\practicalmongodb\bin> mongoexport -d mydbpoc -c myusers -f _id,Age –type=csv
  > myusers.csv

  2015-07-14T22:54:48.604-0700 connected to: 127.0.0.1

  2015-07-14T22:54:48.604-0700 exported 22 records

  c:\practicalmongodb\bin>

  ```


  ## 9.4 管理服务器


  在本节中，你将了解作为系统管理员需要了解的各种选项。


  ### 9.4.1 启动服务器


  本节介绍如何启动服务器。之前，你通过运行 `mongod.exe` 来使用 `mongo` shell 启动服务器。


  MongoDB 服务器可以通过在 Windows 中以管理员身份打开命令提示符或在 Linux 系统中打开终端窗口，并键入以下命令来手动启动：


  ```

  C:\>cd c:\practicalmongodb\bin

  c:\ practicalmongodb\bin>mongod

  mongod --help for help and startup options

  .........................................

  ```


  此窗口将显示所有与 `mongod` 建立的连接。它还显示可用于监控服务器的信息。


  如果未指定配置，MongoDB 将使用默认数据库路径 `C:\data\db`（在 Windows 上）和 `/data/db`（在 Linux 上）启动，并使用默认端口
  `27017` 和 `27018` 绑定到 `localhost`。


  键入 `^C` 将干净地关闭服务器。


  MongoDB 提供了两种指定用于启动服务器的配置参数的方法。


  第一种是使用命令行选项指定（参考第 tk 章）。


  第二种方法是加载配置文件。可以通过编辑文件然后重新启动服务器来更改服务器配置。


  ### 9.4.2 停止服务器


  服务器可以通过在 `mongod` 控制台中按 `CTRL+C` 来关闭。或者，你可以使用 `mongo` 控制台中的 `shutdownServer` 命令。


  打开终端窗口，并连接到 `mongo` 控制台。


  ```

  C:\> cd c:\practicalmongodb\bin

  c:\practicalmongodb\bin> mongo

  MongoDB shell version: 3.0.4

  connecting to: test

  >

  ```


  切换到 `admin` 数据库并发出 `shutdownServer` 命令：


  ```

  > use admin

  switched to db admin

  > db.shutdownServer()

  2015-07-14T22:57:20.413-0700 I NETWORK DBClientCursor::init call() failed server
  should be down...

  2015-07-14T22:57:20.418-0700 I NETWORK trying reconnect to 127.0.0.1:27017

  2015-07-14T22:57:21.413-0700 I NETWORK 127.0.0.1:27017 failed couldn''t connect
  to server 127.0.0.1:27017

  >

  ```


  如果你检查在上一步中启动服务器的 `mongod` 控制台，你将看到服务器已成功关闭。


  ```

  .......................

  2015-07-14T22:57:30.259-0700 I COMMAND [conn1] terminating, shutdown command received

  2015-07-14T22:57:30.260-0700 I CONTROL [conn1] now exiting

  .................................................

  2015-07-14T22:57:30.380-0700 I STORAGE [conn1] shutdown: removing fs lock...

  2015-07-14T22:57:30.380-0700 I CONTROL [conn1] dbexit: rc: 0

  ```


  ### 9.4.3 查看日志文件


  默认情况下，MongoDB 的所有日志输出都写入 `stdout`，但可以通过在启动服务器时指定配置中的 `logpath` 选项来更改，将输出重定向到文件。


  日志文件内容可用于识别问题，例如可能指示某些数据问题或连接问题的异常。



  ### 9.4.4 服务器状态


  `db.ServerStatus()` 是 MongoDB 提供的一个简单方法，用于检查服务器状态，例如连接数、运行时间等。服务器状态命令的输出取决于操作系统平台、MongoDB
  版本、使用的存储引擎以及配置类型（如独立实例、副本集和分片集群）。


  从 3.0 版本开始，输出中删除了以下部分：`workingSet`、`indexCounters` 和 `recordStats`。


  要使用 MMAPv1 存储引擎检查服务器状态，请连接到 mongo 控制台，切换到 admin 数据库，然后执行 `db.serverStatus()` 命令。


  ```

  c:\practicalmongodb\bin> mongo

  MongoDB shell version: 3.0.4

  connecting to: test

  > use admin

  switched to db admin

  > db.serverStatus()

  host" : "ANOC9",

  "version" : "3.0.4",

  "process" : "mongod",

  "pid" : NumberLong(1748),

  "uptime" : 14,

  "uptimeMillis" : NumberLong(14395),

  "uptimeEstimate" : 13,

  "localTime" : ISODate("2015-07-14T22:58:44.532Z"),

  "asserts" : {

  "regular" : 0,

  "warning" : 0,

  "msg" : 0,

  "user" : 1,

  "rollovers" : 0

  },

  .........................................................

  ```


  上述 `serverStatus` 输出还将包含一个 "backgroundflushing" 部分，其中显示 MongoDB 使用 MMAPv1 作为存储引擎将数据刷新到磁盘的相应进程报告。


  "opcounters" 和 "asserts" 部分提供了可用于分析任何问题的有用信息。


  "opcounters" 部分显示了每种类型的操作数。为了发现问题，你应该建立这些操作的基线。如果计数器开始偏离基线，则表明存在问题，需要采取措施使其恢复正常状态。


  "asserts" 部分描述了发生的客户端和服务器警告或异常的数量。如果你发现此类异常和警告增加，就需要仔细检查日志文件，以确定是否有问题正在发展。`asserts`
  数量的增加也可能表明数据存在问题，在这种情况下，应使用 MongoDB 的 `validate` 函数来检查数据是否未损坏。


  接下来，让我们使用 WiredTiger 存储引擎启动服务器，看看 `serverStatus` 输出。


  ```

  c:\practicalmongodb\bin> mongod –storageEngine wiredTiger

  2015-07-14T22:51:05.965-0700 I CONTROL Hotfix KB2731284 or later update is installed,
  no need to zero-out data files

  2015-07-29T22:51:05.965-0700 I STORAGE [initandlisten] wiredtiger_open config: create,cache_size=1G,session_max=20000,eviction=(threads_max=4),statistics=(fast),log=(enabled=true,archive=true,path=journal,compressor=snappy),file_manager=(close_idle_time=100000),checkpoint=(wait=60,log_size=2GB),statistics_log=(wait=0)

  ..................................................

  ```


  要检查服务器状态，请连接到 mongo 控制台，切换到 admin 数据库，然后执行 `db.serverStatus()` 命令。


  ```

  c:\practicalmongodb\bin> mongo

  MongoDB shell version: 3.0.4

  connecting to: test

  > use admin

  switched to db admin

  > db.serverStatus()

  "wiredTiger" : {

  "uri" : "statistics:",

  "LSM" : {

  "...........................................................,

  "tree maintenance operations scheduled":0,

  ............................................................,

  },

  "async" : {

  "number of allocation state races":0,

  "number of operation slots viewed for allocation":0,

  "current work queue length" : 0,

  "number of flush calls" : 0,

  "number of times operation allocation failed":0,

  "maximum work queue length" : 0,

  ............................................................,

  },

  "block-manager" : {

  "mapped bytes read" : 0,

  "bytes read" : 966656,

  "bytes written" : 253952,

  ...................................,

  "blocks written" : 45

  },

  ............................................................,

  ```


  正如你所看到的，当使用 WiredTiger 存储引擎启动时，服务器状态输出有一个名为 `wiredTiger` 统计信息的新部分。


  ### 9.4.5 识别与修复 MongoDB


  在本节中，你将了解如何修复损坏的数据库。


  如果你遇到如下错误：


  *   数据库服务器拒绝启动，并指出数据文件已损坏

  *   日志文件或 `db.serverStatus()` 命令中出现 `asserts`

  *   查询结果出现奇怪或意外的情况


  这意味着数据库已损坏，必须运行修复程序以恢复数据库。


  在开始修复之前，你需要做的第一件事是使服务器离线（如果尚未离线）。你可以使用上述提到的任一选项。在此示例中，在 `mongod` 控制台中键入 `^C`，这将关闭服务器。


  接下来，使用 `–repair` 选项启动 `mongod`，如下所示：


  ```

  c:\practicalmongodb\bin> mongod --repair

  2015-07-14T22:58:31.171-0700 I CONTROL Hotfix KB2731284 or later update is installed,
  no need to zero-out data files

  2015-07-14T22:58:31.173-0700 I CONTROL [initandlisten] MongoDB starting : pid=3996
  port=27017 dbpath=c:\data\db\ 64-bit host=ANOC9

  2015-07-14T22:58:31.174-0700 I CONTROL [initandlisten] db version v3.0.4

  .....................................

  2015-07-14T22:58:31.447-0700 I STORAGE [initandlisten] shutdown: removing fs lock...

  2015-07-14T22:58:31.449-0700 I CONTROL [initandlisten] dbexit: rc: 0

  c:\ practicalmongodb\bin>

  ```


  这将修复 `mongod`。如果你查看输出，会发现该实用程序正在修复的各种差异。修复过程结束后，它会退出。


  修复过程完成后，可以像正常一样启动服务器，然后使用最新的数据库备份来恢复丢失的数据。


  有时，你可能会注意到在修复大型数据库时，驱动器磁盘空间不足。这是因为 MongoDB 需要在与数据文件相同的驱动器上创建文件的临时副本。要解决此问题，在修复数据库时，应使用
  `–repairpath` 参数指定在修复过程中可以创建临时文件的驱动器。




  ## 9.4.6 识别和修复集合级数据


  有时你可能需要验证集合是否保存了有效的数据并拥有有效的索引。针对这种情况，MongoDB 提供了 `validate()` 方法来验证指定集合的内容。


  以下示例验证 `Users` 集合的数据：


  ```

  c:\practicalmongodb\bin> mongo


  MongoDB shell version: 3.0.4


  connecting to: test


  > use mydbpoc


  switched to db mydbpoc


  > db.myusers.validate()


  {


  "ns" : "mydbpoc.myusers",


  "firstExtent" : "1:4322000 ns:mydbpoc.myusers",


  "lastExtent" : "1:4322000 ns:mydbpoc.myusers",


  "...............


  "valid" : true,


  "errors" : [ ],


  "warning" : "Some checks omitted for speed. use {full:true} option to do more thorough
  scan.",


  "ok" : 1


  }

  ```


  默认情况下，`validate()` 选项会同时检查数据文件和相关联的索引。提供集合统计数据有助于识别数据文件或索引是否存在问题。


  如果运行 `validate()` 表明索引已损坏，那么可以使用 `reIndex` 来重建集合的索引。这会删除并重建集合的所有索引。


  以下命令重建 `Users` 集合的索引：


  ```

  > use mydbpoc


  switched to db mydbpoc


  > db.myusers.reIndex()


  {


  "nIndexesWas" : 1,


  "msg" : "indexes dropped for collection",


  "nIndexes" : 1,


  "indexes" : [


  {


  "key" : {


  "_id" : 1


  },


  "ns" : "mydbpoc.myusers",


  "name" : "_id_"


  }


  ],


  "ok" : 1


  }


  >

  ```


  如果集合的数据文件已损坏，那么运行 `–repair` 选项是修复所有数据文件的最佳方式。


  ## 9.5 监控 MongoDB


  作为 MongoDB 服务器管理员，监控系统的性能和健康状况非常重要。在本节中，你将学习监控系统的方法。


  ### 9.5.1 mongostat


  `mongostat` 是 MongoDB 发行版的一部分。该工具提供服务器的简单统计信息；虽然不全面，但它提供了一个很好的概览。以下显示了本地主机的统计信息。打开终端窗口并执行以下命令：


  ```

  c:\> cd c:\practicalmongodb\bin


  c:\practicalmongodb\bin> mongostat

  ```


  前六列显示了 `mongod` 服务器处理各种操作的速率。除这些列外，以下列也值得一提，在诊断问题时可能有用：


  *   `Conn`：此指标表示连接到 `mongod` 实例的数量。这里的值高可能表明应用程序未释放或关闭连接，这意味着应用程序虽然发出了打开连接的操作，但在操作完成后未关闭连接。


  从 3.0 版本开始，`mongostat` 也可以使用选项 `–json` 以 JSON 格式返回其响应。


  ```

  c:\> cd c:\practicalmongodb\bin


  c:\practicalmongodb\bin> mongostat –json


  {"ANOC9":{"ar|aw":"0|0","command":"1|0","conn":"1","delete":"*0","faults":"1","flushes":"0","getmore":"0","host":"ANOC9","insert":"*0","locked":"",
  "mapped":"560.0M","netIn":"79b","netOut":"10k","non mapped":"","qr|qw":"0|0","query":"*0","res":"153.0M","time":"05:16:17","update":"*0","vsize":"1.2G"}}

  ```


  ### 9.5.2 mongod Web 界面


  每当启动 `mongod` 时，它默认会创建一个 Web 端口，该端口号比 `mongod` 用于监听连接的端口号高 1000。默认情况下，HTTP 端口是 28017。


  可以通过 Web 浏览器访问这个 `mongod` Web 界面，它会显示大部分统计信息。如果 `mongod` 运行在 `localhost` 上并在端口 27017
  监听连接，则可以使用以下 URL 访问 HTTP 状态页面：`http://localhost:28017`。页面如图 9-2 所示。


  ![A332296_1_En_9_Fig2_HTML.jpg](img/A332296_1_En_9_Fig2_HTML.jpg)


  图 9-2. Web 界面


  ### 9.5.3 第三方插件


  除了此工具外，还有各种适用于 MongoDB 的第三方适配器，它们允许你使用常见的开源或商业监控系统，如 `cacti`、`Ganglia` 等。在其网站上，10gen
  维护了一个页面，分享有关可用 MongoDB 监控接口的最新信息。


  要获取最新的第三方插件列表，请访问 [`www.mongodb.org/display/DOCS/Monitoring+and+Diagnostics`](http://www.mongodb.org/display/DOCS/Monitoring+and+Diagnostics)。


  ### 9.5.4 MongoDB Cloud Manager


  除了上述用于监控和备份的工具和技术外，还有 MongoDB Cloud Manager（前身为 MMS – MongoDB Monitoring Services）。它由开发
  MongoDB 的团队开发，并且免费使用（30 天试用许可）。与上面讨论的技术相比，MongoDB Cloud Manager 提供了用户界面以及日志和性能详情，并以图形和图表的形式呈现。


  MongoDB Cloud Manager 图表是交互式的，允许用户设置自定义日期范围，如图 9-3 所示。


  ![A332296_1_En_9_Fig3_HTML.jpg](img/A332296_1_En_9_Fig3_HTML.jpg)


  图 9-3. 设置自定义日期范围


  Cloud Manager 的另一个巧妙功能是在发生不同事件时使用电子邮件和短信告警的能力。如图 9-4 所示。


  ![A332296_1_En_9_Fig4_HTML.jpg](img/A332296_1_En_9_Fig4_HTML.jpg)


  图 9-4. 电子邮件和短信告警


  Cloud Manager 不仅提供图表和告警，还允许你查看按响应时间排序的慢查询。你可以轻松地在一个地方查看查询的执行情况。图 9-5 显示了绘制查询性能的图表。


  ![A332296_1_En_9_Fig5_HTML.jpg](img/A332296_1_En_9_Fig5_HTML.jpg)


  图 9-5. 查询响应时间


  Cloud Manager 允许你执行以下操作：


  *   自动化你的 MongoDB 部署（MongoDB 节点、集群的配置以及现有部署的升级）

  *   通过持续备份保护你的数据

  *   通过 AWS 集成提供任意拓扑

  *   在仪表板中监控性能

  *   执行操作任务，例如增加容量


  对于 AWS 用户，它提供直接集成，因此可以在不离开 Cloud Manager 的情况下在 AWS 上启动 MongoDB。你已在第 tk 章中了解了如何使用
  AWS 进行配置。


  Cloud Manager 还有助于你发现系统中的低效之处并进行修正以实现平稳运行。


  它使用你安装的代理收集和报告指标。Cloud Manager 提供了对 MongoDB 系统健康状况的快速概览，并帮助你确定性能问题的根本原因。


  接下来，你将了解任何性能调查都应使用的关键指标。在此过程中，你还将了解这些指标组合的含义。




  #### 9.5.4.1 指标


  您将主要关注以下关键指标；这些指标在调查性能问题时起着关键作用。它们能即时概览 MongoDB 系统内部发生的情况，以及哪些系统资源（即 CPU、RAM 或磁盘）是瓶颈。


  -   `页面错误`

  -   `操作计数器`

  -   `锁百分比`

  -   `队列`

  -   `CPU 时间`（`I/O 等待` 和 `用户时间`）


  要查看下图所示的图表，您可以点击 `部署` 部分下的 `部署` 链接。选择已配置为由 Cloud Manager 监控的 MongoDB 实例。接下来，从 `管理图表`
  部分选择所需的图表。


  `页面错误` 显示系统中每秒发生的平均页面错误次数。图 9-6 显示了页面错误图。


  ![A332296_1_En_9_Fig6_HTML.jpg](img/A332296_1_En_9_Fig6_HTML.jpg)


  图 9-6. `页面错误`


  `操作计数器` 显示系统上每秒执行操作的平均次数。参见图 9-7。


  ![A332296_1_En_9_Fig7_HTML.jpg](img/A332296_1_En_9_Fig7_HTML.jpg)


  图 9-7. `操作计数器`


  在 `页面错误` 与 `操作计数器` 的比率中，页面错误取决于系统上执行的操作以及当前内存中的内容。因此，每秒页面错误次数与每秒 `操作计数器` 的比率可以相当准确地反映磁盘
  I/O 需求。参见图 9-8。


  ![A332296_1_En_9_Fig8_HTML.jpg](img/A332296_1_En_9_Fig8_HTML.jpg)


  图 9-8. `页面错误` 与 `操作计数器` 比率


  如果该比率是：


  -   < 1，则归类为低磁盘 I/O。

  -   接近 1，则归类为常规磁盘 I/O。

  -   > 1，则归类为高磁盘 I/O。


  `队列` 图显示了在任何给定时间等待锁释放的操作计数。参见图 9-9。


  ![A332296_1_En_9_Fig9_HTML.jpg](img/A332296_1_En_9_Fig9_HTML.jpg)


  图 9-9. `队列`


  `CPU 时间`（`I/O 等待` 和 `用户时间`）图显示了 CPU 核心如何分配其周期。参见图 9-10。


  ![A332296_1_En_9_Fig10_HTML.jpg](img/A332296_1_En_9_Fig10_HTML.jpg)


  图 9-10. `CPU 时间`


  `I/O 等待` 表示 CPU 等待其他资源（如磁盘或网络）所花费的时间。参见图 9-11。


  ![A332296_1_En_9_Fig11_HTML.jpg](img/A332296_1_En_9_Fig11_HTML.jpg)


  图 9-11. `I/O 等待`


  `用户时间` 表示执行计算所花费的时间，例如文档更新、更新和重新平衡索引、选择或排序查询结果，或运行聚合框架命令、`Map/Reduce` 或服务器端 JavaScript。参见图
  9-12。


  ![A332296_1_En_9_Fig12_HTML.jpg](img/A332296_1_En_9_Fig12_HTML.jpg)


  图 9-12. `用户时间`


  要查看 `CPU 时间` 图表，您需要安装 `munin`。


  这些关键指标及其组合应用于调查任何性能问题。


  ## 9.6 总结


  在本章中，您了解了如何使用作为 MongoDB 发行版一部分打包的各种实用程序来管理和维护系统。


  您了解了作为管理员必须了解的主要操作，以便详细理解这些实用程序。请通读参考资料。在下一章中，您将研究 MongoDB 的用例，并探讨哪些情况下 MongoDB
  不是一个好的选择。


