  接下来，您将使用 `mongo shell` 连接到上面的 `mongod`。当您使用 `–ssl` 选项运行 `mongo` 时，您需要指定 `–sslAllowInvalidCertificates`\
  \ 或 `–sslCAFile`。让我们使用 `–sslAllowInvalidCertificates`。\n\n打开终端窗口并输入以下内容：\n```\n\
  C:\\> \nC:\\practicalmongodb\\bin>mongo --ssl --sslAllowInvalidCertificates\n```\n\
  \n```\n2015-07-03T02:30:10.774-0700 I CONTROL Hotfix KB2731284 or later update is\
  \ installed, no need to zero-out data files\nMongoDB shell version: 3.0.4\nconnecting\
  \ to: test\n```\n\n\n## 5.8 使用 MongoDB Cloud Manager 进行配置\n\n在本章开始时，你学习了如何在 Windows\
  \ 和 Linux 上安装和配置 MongoDB。在本章的这一部分，你将了解如何使用 MongoDB Cloud Manager。\n\nMongoDB Cloud\
  \ Manager 是数据库开发者内置的监控解决方案。在 2.6 版本之前，MongoDB Cloud Manager（以前称为 MongoDB 监控服务或 MMS）仅用于监控和管理\
  \ MongoDB。从 2.6 版本开始，MongoDB Cloud Manager 引入了重大增强功能，包括备份、时间点恢复和自动化功能，使得操作 MongoDB\
  \ 比以往更加简单。自动化功能为管理员提供了强大的能力，只需几次点击即可快速创建、升级、扩展或关闭 MongoDB 实例。\n\n在本书的这一部分，你将了解如何开始使用\
  \ MongoDB Cloud Manager。你将使用 MongoDB Cloud Manager 在 AWS 上部署一个独立的 MongoDB 实例。\n\n\
  当你开始使用 MongoDB Cloud Manager 时，它会要求在每个服务器上安装一个自动化代理，MongoDB Cloud Manager 随后使用该代理与服务器通信。\n\
  \n为了开始配置，你首先需要在 MongoDB Cloud Manager 上创建你的个人资料。\n\n输入以下 URL：`https://cloud.mongodb.com`。根据你是否有账户，点击“登录”或“免费注册”按钮。\n\
  \n由于你是第一次开始，请点击“免费注册”按钮。这将带你到图 5-1 所描绘的页面。\n\n![A332296_1_En_5_Fig1_HTML.jpg](img/A332296_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1. 账户个人资料\n\n你将创建一个新的个人资料。不过，MongoDB 提供了一个加入现有 Cloud Manager 组的选项。\n\n输入所有相关详细信息，如图\
  \ 5-1 所示，然后点击“继续”。这将带你到提供公司信息的页面。完成个人资料和公司信息后，接受条款并点击“创建账户”按钮。这样就完成了个人资料的创建。下一步是创建一个组（图\
  \ 5-2）。\n\n![A332296_1_En_5_Fig2_HTML.jpg](img/A332296_1_En_5_Fig2_HTML.jpg)\n\n\
  图 5-2. 创建组\n\n为组提供一个唯一的名称，然后点击“创建组”。接下来是部署选择页面，如图 5-3 所示，在这里你可以选择构建新部署或管理现有部署。\n\
  \n![A332296_1_En_5_Fig3_HTML.jpg](img/A332296_1_En_5_Fig3_HTML.jpg)\n\n图 5-3. 部署\n\
  \n选择构建新部署。接下来，系统将提示你选择构建部署的位置（即本地、AWS 或其他远程环境）。在此示例中，选择 AWS。点击“在 AWS 中部署”选项，将引导你在自行配置和使用\
  \ Cloud Manager 配置之间进行选择。\n\n选择“我将配置”选项，这意味着你将使用已在 AWS 上为你配置的机器。\n\n下一个屏幕提供了部署类型的选项（即独立实例、副本集或分片集群）。你正在执行独立部署，因此点击“创建独立实例”框。这将带你到如图\
  \ 5-4 所示的屏幕。\n\n![A332296_1_En_5_Fig4_HTML.jpg](img/A332296_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4. 独立实例的详细信息\n\n提供实例名称和数据目录前缀，然后点击“继续”。接下来是如图 5-5 所示的屏幕，它提示你在每个服务器上安装自动化代理。\n\
  \n![A332296_1_En_5_Fig5_HTML.jpg](img/A332296_1_En_5_Fig5_HTML.jpg)\n\n图 5-5. 安装自动化代理\n\
  \n此屏幕有一个用于指定服务器数量的选项。在此示例中，你指定 1。\n\n接下来，你需要指定平台。选择 Ubuntu。然后会出现如图 5-6 所示的屏幕。\n\n\
  ![A332296_1_En_5_Fig6_HTML.jpg](img/A332296_1_En_5_Fig6_HTML.jpg)\n\n图 5-6. 自动化代理安装说明\n\
  \n按照步骤操作。\n\n在你实施启动代理的步骤之前，你需要确保所有相关端口都是开放的（443、4949、27000 到 27018）。\n\n一旦所有步骤完成，点击“验证代理”按钮。验证后，如果一切工作正常，你将看到一个“继续”按钮。\n\
  \n当你点击“继续”时，你将进入如图 5-7 所示的“审查和部署”页面，在这里你可以看到所有将要部署的进程。在这里，自动化代理会下载并安装监控和备份代理。\n\n\
  ![A332296_1_En_5_Fig7_HTML.jpg](img/A332296_1_En_5_Fig7_HTML.jpg)\n\n图 5-7. 审查和部署\n\
  \n点击“部署”按钮将带你到部署页面，部署更改状态为“进行中”。当安装完成时，部署状态将变为“目标状态”，已配置的服务器将出现在拓扑视图中。\n\n如果你的部署支持\
  \ SSL 或使用任何身份验证机制，你需要手动下载并安装监控代理。\n\n为了检查所有代理是否正常工作，你可以点击控制台上的“管理”选项卡。\n\nCloud\
  \ Manager 可以在任何连接到互联网的服务器上部署 MongoDB 副本集、分片集群和独立实例。服务器只需要能够向 Cloud Manager 发起出站\
  \ TCP 连接。\n\n## 5.9 小结\n\n在本章中，你学习了如何在 Windows 和 Linux 平台上安装 MongoDB。你还研究了一些确保数据库安全使用所必需的重要配置。你通过使用\
  \ MongoDB Cloud Manager 进行配置结束了本章。\n\n在下一章中，你将开始学习 MongoDB Shell。\n\n"
- "# 6. 使用 MongoDB Shell\n\n> “mongo shell 是 MongoDB 标准发行版的一部分。它提供了一个 JavaScript 环境，可以完全访问该语言和标准函数。它为\
  \ MongoDB 数据库提供了完整的接口。”\n\n在本章中，你将学习 mongo shell 的基础知识以及如何使用它来管理 MongoDB 文档。在深入研究创建与数据库交互的应用程序之前，理解\
  \ MongoDB shell 的工作原理非常重要。\n\n要感受 MongoDB 数据库，没有比从 MongoDB shell 开始更好的方法了。MongoDB\
  \ shell 的介绍分为三个部分，以便读者更容易掌握和实践这些概念。\n\n第一部分涵盖了数据库的基本功能，包括基本的 CRUD 操作符。下一部分涵盖高级查询。本章的最后一部分解释了存储和检索数据的两种方式：嵌入和引用。\n\
  \n\n## 6.1 基础查询\n\n本节将简要讨论 CRUD 操作（创建、读取、更新和删除）。通过基本示例和练习，你将学习如何在 MongoDB 中执行这些操作。同时，你也会了解查询在\
  \ MongoDB 中是如何执行的。\n\n与用于查询的传统 SQL 不同，MongoDB 使用其自身的类 JSON 查询语言从存储的数据中检索信息。\n\n\
  如第 5 章所述，成功安装 MongoDB 后，你需要导航到目录 `C:\\practicalmongodb\\bin\\`。此文件夹包含运行 MongoDB\
  \ 所需的所有可执行文件。\n\n通过执行 `mongo` 可执行文件可以启动 MongoDB shell。\n\n第一步始终是启动数据库服务器。打开命令提示符（以管理员身份运行）并发出命令\
