  \ `MySQL`。 | `MongoDB`, `HBase`, `Cassandra`。 |\n| **数据存储模型** | 数据以行和列的形式存储在表中，每列都有特定类型。表通常根据规范化原则创建。使用联接（`Join`）从多个表中检索数据。\
