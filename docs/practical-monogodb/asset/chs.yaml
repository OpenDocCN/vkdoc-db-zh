  \ shell 之前，让我们先简要了解一下如何使用导入/导出工具将数据导入和导出 MongoDB 数据库。\n\n首先，创建一个 CSV 文件来保存学生记录，结构如下：\n\
  `姓名、性别、班级、成绩、年龄。`\n\nCSV 的示例数据如图 6-1 所示。\n\n![A332296_1_En_6_Fig1_HTML.jpg](img/A332296_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1. 示例 CSV 文件\n\n接下来，将数据从 MongoDB 数据库导入到一个新集合中，以了解导入工具的工作原理。\n\n以管理员身份运行命令提示符。以下命令用于获取\
  \ `import` 命令的帮助信息：\n\n```\nC:\\>c:\\practicalmongodb\\bin\\mongoimport.exe --help\n\
  \nImport CSV, TSV or JSON data into MongoDB.\n\nWhen importing JSON documents, each\
  \ document must be a separate line of the input file.\n\nExample:\nmongoimport --host\
  \ myhost --db my_cms --collection docs < mydocfile.json\n....\n\nC:\\>\n```\n\n\
  发出以下命令，将数据从文件 `exporteg.csv` 导入到 `MyDB` 数据库中名为 `importeg` 的新集合：\n\n```\nC:\\>c:\\\
  practicalmongodb\\bin\\mongoimport.exe --host localhost --db mydb --collection importeg\
  \ --type csv --file c:\\exporteg.csv --headerline\n\n2015-07-06T01:53:23.537-0700\
  \ connected to: localhost\n2015-07-06T01:53:23.608-0700 imported 15 documents\n\
  ```\n\n为了验证集合是否已创建以及数据是否已导入，你需要使用 mongo shell 连接到数据库（本例中是 `localhost`），并发出命令来验证集合是否存在。\n\
  \n要启动 mongo shell，请以管理员身份运行命令提示符，发出命令 `C:\\PracticalMongoDB\\bin\\mongo.exe`（路径将根据安装文件夹而变化；本例中文件夹是\
  \ `C:\\PracticalMongoDB\\`），然后按 Enter 键。\n\n这默认连接到在端口 27017 上监听的 `localhost` 数据库服务器。\n\
  \n```\nC:\\>c:\\practicalmongodb\\bin\\mongo.exe\n\nMongoDB shell version: 3.0.4\n\
  connecting to: test\n\n> use mydb\nswitched to db mydb\n\n> show collections\nimporteg\n\
  system.indexes\n\n> db.importeg.find()\n{ \"_id\" : ObjectId(\"5450af58c770b7161eefd31d\"\
  ), \"Name\" : \"S1\", \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\" : 95, \"\
  Age\" : 25 }\n.......\n{ \"_id\" : ObjectId(\"5450af59c770b7161eefd31e\"), \"Name\"\
  \ : \"S2\", \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\" : 85, \"Age\" : 18\
  \ }\n\n>\n```\n\n简而言之，你在这里所做的是：\n\n1.  连接到 mongo shell。\n2.  切换到你的数据库，本例中是 `MyDB`。\n\
  3.  使用 `show collections` 检查 `MyDB` 数据库中存在的集合。\n4.  使用导入工具检查导入集合的计数。\n5.  最后，执行\
  \ `find()` 命令以检查新集合中的数据。\n\n要连接到不同的主机和端口，可以在命令中使用 `–host` 和 `–port`。\n\n如图 6-1 所示，默认情况下使用数据库\
  \ `test` 作为上下文。\n\n在任何时间点，执行 `db` 命令将显示 shell 当前连接到的数据库：\n\n```\n> db\ntest\n>\n\
  ```\n\n要显示所有数据库名称，可以运行 `show dbs` 命令。执行此命令将列出已连接服务器的所有数据库。\n\n```\n> show dbs\n\
  ```\n\n在任何时刻，都可以使用 `help()` 命令获取帮助。\n\n```\n> help\n    db.help()              \
  \      help on db methods\n    db.mycoll.help()             help on collection methods\n\
  \    sh.help()                    sharding helpers\n    rs.help()              \
  \      replica set helpers\n    help admin                   administrative help\n\
  \    help connect                 connecting to a db help\n    help keys       \
  \             key shortcuts\n    help misc                    misc things to know\n\
  \    help mr                      mapreduce\n    show dbs                    show\
  \ database names\n    show collections            show collections in current database\n\
  \    show users                  show users in current database\n    ..........\n\
  \    exit                        quit the mongo shell\n```\n\n如上所示，如果你需要关于 `db`\
  \ 或 `collection` 任何方法的帮助，可以使用 `db.help()` 或 `db.<CollectionName>.help()`。例如，如果你需要关于\
  \ `db` 命令的帮助，请执行 `db.help()`。\n\n```\n> db.help()\nDB methods:\n    db.addUser(userDocument)\n\
  \    ...\n    db.shutdownServer()\n    db.stats()\n    db.version()            current\
  \ version of the server\n>\n```\n\n到目前为止，你一直在使用默认的 `test` 数据库。可以使用命令 `use <newdbname>`\
  \ 切换到新数据库。\n\n```\n> use mydb\nswitched to db mydb\n```\n\n在你开始探索之前，让我们先简要了解一下 MongoDB\
  \ 术语和概念，它们对应于 SQL 的术语和概念。这总结在表 6-1 中。\n\n表 6-1. SQL 与 MongoDB 术语对照\n\n| SQL | MongoDB\
  \ |\n| --- | --- |\n| 数据库 | 数据库 |\n| 表 | 集合 |\n| 行 | 文档 |\n| 列 | 字段 |\n| 索引 | 索引\
  \ |\n| 表内连接 | 嵌入和引用 |\n| 主键：可指定一列或一组列 | 主键：自动设置为 _id 字段 |\n\n让我们开始探索 MongoDB 中的查询选项。切换到\
  \ `MYDBPOC` 数据库。\n\n```\n> use mydbpoc\nswitched to db mydbpoc\n>\n```\n\n这将上下文从\
  \ `test` 切换到了 `MYDBPOC`。可以使用 `db` 命令确认这一点。\n\n```\n> db\nmydbpoc\n>\n```\n\n\n\n"
- "# MongoDB 数据库与集合操作\n\n## 6.1 创建与插入\n\n尽管上下文已切换至 `MYDBPOC`，但若执行 `show dbs` 命令，数据库名称不会显示。这是因为\
  \ MongoDB 仅在数据插入数据库后才真正创建该数据库。此行为符合 MongoDB 动态分配命名空间、简化并加速开发流程的动态数据处理理念。此时若执行 `show\
  \ dbs` 命令，`MYDBPOC` 数据库将不会出现在数据库列表中。\n\n以下示例假设有一个名为 `users` 的多态集合，其中包含以下三种原型的文档：\n\
  \n```json\n{\n  \"_id\": ObjectID(),\n  \"FName\": \"First Name\",\n  \"LName\"\
  : \"Last Name\",\n  \"Age\": 30,\n  \"Gender\": \"M\",\n  \"Country\": \"Country\"\
  \n}\n```\n\n以及\n\n```json\n{\n  \"_id\": ObjectID(),\n  \"Name\": \"Full Name\"\
  ,\n  \"Age\": 30,\n  \"Gender\": \"M\",\n  \"Country\": \"Country\"\n}\n```\n\n\
  以及\n\n```json\n{\n  \"_id\": ObjectID(),\n  \"Name\": \"Full Name\",\n  \"Age\"\
  : 30\n}\n```\n\n### 6.1.1 创建与插入操作\n\n现在，我们将了解数据库和集合是如何创建的。如前所述，MongoDB 中的文档采用 JSON\
  \ 格式。\n\n首先，通过执行 `db` 命令，可以确认当前上下文是 `mydbpoc` 数据库。\n\n```\n> db\nmydbpoc\n>\n```\n\
  \n现在来看如何创建文档。\n\n第一个文档符合第一种原型，而第二个文档符合第二种原型。你创建了两个名为 `user1` 和 `user2` 的文档。\n\n\
  ```\n> user1 = {FName: \"Test\", LName: \"User\", Age:30, Gender: \"M\", Country:\
  \ \"US\"}\n{\n  \"FName\" : \"Test\",\n  \"LName\" : \"User\",\n  \"Age\" : 30,\n\
  \  \"Gender\" : \"M\",\n  \"Country\" : \"US\"\n}\n> user2 = {Name: \"Test User\"\
  , Age:45, Gender: \"F\", Country: \"US\"}\n{ \"Name\" : \"Test User\", \"Age\" :\
  \ 45, \"Gender\" : \"F\", \"Country\" : \"US\" }\n>\n```\n\n接下来，你将按以下操作顺序将这两个文档（`user1`\
  \ 和 `user2`）添加到 `users` 集合中：\n\n```\n> db.users.insert(user1)\n> db.users.insert(user2)\n\
  >\n```\n\n上述操作不仅会将两个文档插入 `users` 集合，还会创建该集合以及所属的数据库。可以使用 `show collections` 和 `show\
  \ dbs` 命令进行验证。\n\n如前所述，`show dbs` 将显示数据库列表。\n\n```\n> show dbs\nadmin   0.078GB\n\
  local   0.078GB\nmydb    0.078GB\nmydbproc 0.078GB\n```\n\n而 `show collections`\
  \ 将显示当前数据库中的集合列表。\n\n```\n> show collections\nsystem.indexes\nusers\n>\n```\n\n\
  除了 `users` 集合，还会显示 `system.indexes` 集合。这个 `system.indexes` 集合在数据库创建时默认生成，用于管理数据库内所有集合的索引信息。\n\
  \n执行命令 `db.users.find()` 将显示 `users` 集合中的文档。\n\n```\n> db.users.find()\n{ \"_id\"\
  \ : ObjectId(\"5450c048199484c9a4d26b0a\"), \"FName\" : \"Test\", \"LName\" : \"\
  User\", \"Age\" : 30, \"Gender\": \"M\", \"Country\" : \"US\" }\n{ \"_id\" : ObjectId(\"\
  5450c05d199484c9a4d26b0b\"), \"Name\" : \"Test\", User\", \"Age\" : 45,\"Gender\"\
  \ : \"F\", \"Country\" : \"US\" }\n>\n```\n\n可以看到，你创建的两个文档被显示出来。除了你添加的字段外，还有一个额外的\
  \ `_id` 字段，该字段为所有文档自动生成。\n\n所有文档必须有一个唯一的 `_id` 字段。如果未由你显式指定，MongoDB 将自动为其分配一个唯一的对象\
  \ ID，如上例所示。\n\n你没有显式插入 `_id` 字段，但当使用 `find()` 命令显示文档时，可以看到每个文档都关联了一个 `_id` 字段。\n\
  \n原因在于，默认情况下会在 `_id` 字段上创建一个索引，这可以通过在 `system.indexes` 集合上执行 `find` 命令来验证。\n\n```\n\
  >db.system.indexes.find()\n{ \"v\" : 1, \"key\" : { \"_id\" : 1 }, \"ns\" : \"mydbpoc.users\"\
  , \"name\" : \"_id_\" }\n>\n```\n\n可以使用 `ensureIndex()` 和 `dropIndex()` 命令向集合添加或删除新索引。我们将在本章后面介绍这些内容。默认情况下，所有集合的\
  \ `_id` 字段上都会创建一个索引，这个默认索引无法被删除。\n\n### 6.1.2 显式创建集合\n\n在上面的例子中，第一次插入操作隐式地创建了集合。但是，用户也可以在执行插入语句之前显式地创建集合。\n\
  \n```\ndb.createCollection(\"users\")\n```\n\n### 6.1.3 使用循环插入文档\n\n也可以使用 `for`\
  \ 循环向集合添加文档。以下代码使用 `for` 循环插入用户。\n\n```\n> for(var i=1; i<=20; i++) db.users.insert({\"\
  Name\" : \"Test User\" + i, \"Age\": 10+i, \"Gender\" : \"F\", \"Country\" : \"\
  India\"})\n>\n```\n\n为了验证插入是否成功，可以在集合上运行 `find` 命令。\n\n```\n> db.users.find()\n\
  { \"_id\" : ObjectId(\"52f48cf474f8fdcfcae84f79\"), \"FName\" : \"Test\", \"LName\"\
  \ : \"User\", \"Age\" : 30, \"Gender\" : \"M\", \"Country\" : \"US\" }\n{ \"_id\"\
  \ : ObjectId(\"52f48cfb74f8fdcfcae84f7a\"), \"Name\" : \"Test User\", \"Age\" :\
  \ 45, \"Gender\" : \"F\", \"Country\" : \"US\" }\n................\n{ \"_id\" :\
  \ ObjectId(\"52f48eeb74f8fdcfcae84f8c\"), \"Name\" : \"Test User18\", \"Age\" :\
  \ 28, \"Gender\" : \"F\", \"Country\" : \"India\" }\nType \"it\" for more\n>\n```\n\
  \n用户出现在集合中。在继续之前，让我们理解一下 “Type “it” for more” 这条语句。\n\n`find` 命令返回一个指向结果集的游标。它不会一次性在屏幕上显示所有文档（结果可能成千上万或数百万），而是先显示前\
  \ 20 个文档，然后等待迭代请求（输入 `it`）以显示接下来的 20 个，以此类推，直到整个结果集显示完毕。\n\n返回的游标也可以赋值给一个变量，然后使用\
  \ `while` 循环以编程方式遍历它。游标对象也可以作为数组进行操作。\n\n在你的例子中，如果输入 `it` 并按回车键，将显示以下内容：\n\n```\n\
  > it\n{ \"_id\" : ObjectId(\"52f48eeb74f8fdcfcae84f8d\"), \"Name\" : \"Test User19\"\
  , \"Age\" : 29, \"Gender\" : \"F\", \"Country\" : \"India\" }\n{ \"_id\" : ObjectId(\"\
  52f48eeb74f8fdcfcae84f8e\"), \"Name\" : \"Test User20\", \"Age\" : 30, \"Gender\"\
  \ : \"F\", \"Country\" : \"India\" }\n>\n```\n\n由于只剩两个文档，所以它显示了剩余的两个文档。\n\n### 6.1.4\
  \ 通过显式指定 `_id` 插入\n\n在之前的插入示例中，`_id` 字段未被指定，因此是隐式添加的。在下面的例子中，你将看到在向集合插入文档时如何显式指定\
  \ `_id` 字段。\n\n显式指定 `_id` 字段时，必须牢记该字段的唯一性；否则插入操作将失败。\n\n以下命令显式指定了 `_id` 字段：\n\n\
  ```\n> db.users.insert({\"_id\":10, \"Name\": \"explicit id\"})\n```\n\n插入操作在 `users`\
  \ 集合中创建了如下文档：\n\n```json\n{ \"_id\" : 10, \"Name\" : \"explicit id\" }\n```\n\n\
  这可以通过执行以下命令来确认：\n\n```\n>db.users.find()\n```\n\n\n\n### 6.1.5 更新\n\n在本节中，你将学习 `update()`\
  \ 命令，该命令用于更新集合中的文档。\n\n`update()` 方法默认更新单个文档。如果需要更新所有符合选择条件的文档，可以通过将 `multi` 选项设置为\
  \ `true` 来实现。\n\n我们从更新现有列的值开始。`$set` 操作符将用于更新记录。\n\n以下命令将所有女性用户的国家更新为英国：\n```\n\
  > db.users.update({\"Gender\":\"F\"}, {$set:{\"Country\":\"UK\"}})\n```\n\n要检查更新是否已发生，可以使用\
  \ `find` 命令检查所有女性用户：\n```\n> db.users.find({\"Gender\":\"F\"})\n{ \"_id\" : ObjectId(\"\
  52f48cfb74f8fdcfcae84f7a\"), \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\"\
  \ : \"F\", \"Country\" : \"UK\" }\n{ \"_id\" : ObjectId(\"52f48eeb74f8fdcfcae84f7b\"\
  ), \"Name\" : \"Test User1\", \"Age\" : 11, \"Gender\" : \"F\", \"Country\" : \"\
  India\" }\n{ \"_id\" : ObjectId(\"52f48eeb74f8fdcfcae84f7c\"), \"Name\" : \"Test\
  \ User2\", \"Age\" : 12, \"Gender\" : \"F\", \"Country\" : \"India\" }\n...................\n\
  Type \"it\" for more\n>\n```\n\n检查输出，你会发现只有第一条文档记录被更新了，这是 `update` 命令的默认行为，因为没有指定\
  \ `multi` 选项。\n\n现在，让我们修改 `update` 命令并包含 `multi` 选项：\n```\n>db.users.update({\"\
  Gender\":\"F\"},{$set:{\"Country\":\"UK\"}},{multi:true})\n>\n```\n\n再次执行 `find`\
  \ 命令，检查所有女性员工的国家是否都已更新。执行 `find` 命令将返回以下输出：\n```\n> db.users.find({\"Gender\":\"\
  F\"})\n{ \"_id\" : ObjectId(\"52f48cfb74f8fdcfcae84f7a\"), \"Name\" : \"Test User\"\
  , \"Age\" : 45, \"Gender\" : \"F\", \"Country\" : \"UK\" }\n..............\nType\
  \ \"it\" for more\n>\n```\n\n如你所见，所有符合条件的记录中国家字段都已更新为英国。\n\n在实际应用中，你可能会遇到模式演变的情况，需要向文档中添加或移除字段。下面看看如何在\
  \ MongoDB 数据库中执行这些更改。\n\n`update()` 操作可以在文档级别使用，这有助于更新集合中的单个文档或一组文档。\n\n接下来，我们看看如何向文档添加新字段。要向文档添加字段，可以结合使用带\
  \ `$set` 操作符和 `multi` 选项的 `update()` 命令。\n\n如果你使用的字段名在 `$set` 中不存在，那么该字段将被添加到文档中。以下命令将向所有文档添加\
  \ `company` 字段：\n```\n> db.users.update({},{$set:{\"Company\":\"TestComp\"}},{multi:true})\n\
  >\n```\n\n对用户集合执行 `find` 命令，你会发现新字段已添加到所有文档中。\n```\n> db.users.find()\n{ \"Age\"\
  \ : 30, \"Company\" : \"TestComp\", \"Country\" : \"US\", \"FName\" : \"Test\",\
  \ \"Gender\" : \"M\", \"LName\" : \"User\", \"_id\" : ObjectId(\"52f48cf474f8fdcfcae84f79\"\
  ) }\n{ \"Age\" : 45, \"Company\" : \"TestComp\", \"Country\" : \"UK\", \"Gender\"\
  \ : \"F\", \"Name\" : \"Test User\", \"_id\" : ObjectId(\"52f48cfb74f8fdcfcae84f7a\"\
  ) }\n{ \"Age\" : 11, \"Company\" : \"TestComp\", \"Country\" : \"UK\", \"Gender\"\
  \ : \"F\", ....................\nType \"it\" for more\n>\n```\n\n如果 `update()` 命令中指定的字段在文档中已存在，它将更新该字段的值；如果该字段不存在，则会将该字段添加到文档中。\n\
  \n接下来，你将看到如何使用相同的 `update()` 命令配合 `$unset` 操作符从文档中移除字段。\n\n以下命令将从所有文档中移除 `Company`\
  \ 字段：\n```\n> db.users.update({},{$unset:{\"Company\":\"\"}},{multi:true})\n>\n\
  ```\n\n可以通过对 `Users` 集合执行 `find()` 命令来验证。你可以看到 `Company` 字段已从文档中删除。\n```\n> db.users.find()\n\
  { \"Age\" : 30, \"Country\" : \"US\", \"FName\" : \"Test\", \"Gender\" : \"M\",\
  \ \"LName\" : \"User\", \"_id\" : ObjectId(\"52f48cf474f8fdcfcae84f79\") }\n.............\n\
  Type \"it\" for more\n```\n\n### 6.1.6 删除\n\n要删除集合中的文档，请使用 `remove()` 方法。如果指定了选择条件，则仅删除符合条件的文档。如果未指定条件，则所有文档都将被删除。\n\
  \n以下命令将删除 `Gender = 'M'` 的文档：\n```\n> db.users.remove({\"Gender\":\"M\"})\n>\n```\n\
  \n可以通过在 `Users` 上执行 `find()` 命令进行验证：\n```\n> db.users.find({\"Gender\":\"M\"})\n\
  >\n```\n没有文档返回。\n\n以下命令将删除所有文档：\n```\n> db.users.remove({})\n> db.users.find()\n\
  >\n```\n如你所见，没有文档返回。\n\n最后，如果你想删除整个集合，可以使用以下命令：\n```\n> db.users.drop()\ntrue\n\
  >\n```\n\n为了验证集合是否已被删除，可以执行 `show collections` 命令。\n```\n> show collections\nsystem.indexes\n\
  >\n```\n如你所见，集合名称没有显示，这确认了该集合已从数据库中移除。\n\n在介绍了基本的创建、更新和删除操作之后，下一节将展示如何执行读取操作。\n\n\
  ### 6.1.7 读取\n\n在本章的这一部分，你将通过各种示例了解 MongoDB 提供的查询功能，这些功能使你能够从数据库中读取存储的数据。\n\n为了从基本查询开始，首先使用\
  \ `insert` 命令创建 `users` 集合并插入数据。\n```\n> user1 = {FName: \"Test\", LName: \"User\"\
  , Age:30, Gender: \"M\", Country: \"US\"}\n{\n    \"FName\" : \"Test\",\n    \"\
  LName\" : \"User\",\n    \"Age\" : 30,\n    \"Gender\" : \"M\",\n    \"Country\"\
  \ : \"US\"\n}\n> user2 = {Name: \"Test User\", Age:45, Gender: \"F\", Country: \"\
  US\"}\n{ \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\" : \"F\", \"Country\"\
  \ : \"US\" }\n> db.users.insert(user1)\n> db.users.insert(user2)\n> for(var i=1;\
  \ i<=20; i++) db.users.insert({\"Name\" : \"Test User\" + i, \"Age\": 10+i, \"Gender\"\
  \ : \"F\", \"Country\" : \"India\"})\n```\n\n现在开始基本查询。`find()` 命令用于从数据库中检索数据。\n\n\
  执行 `find()` 命令会返回集合中的所有文档。\n```\n> db.users.find()\n{ \"_id\" : ObjectId(\"52f4a823958073ea07e15070\"\
  ), \"FName\" : \"Test\", \"LName\" : \"User\", \"Age\" : 30, \"Gender\" : \"M\"\
  , \"Country\" : \"US\" }\n{ \"_id\" : ObjectId(\"52f4a826958073ea07e15071\"), \"\
  Name\" : \"Test User\", \"Age\" : 45, \"Gender\" : \"F\", \"Country\" : \"US\" }\n\
  ......\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15083\"), \"Name\" : \"Test User18\"\
  , \"Age\" :28, \"Gender\" : \"F\", \"Country\" : \"India\" }\nType \"it\" for more\n\
  >\n```\n\n#### 6.1.7.1 查询文档\n\nMongoDB 提供了丰富的查询系统。可以将查询文档作为参数传递给 `find()` 方法，以过滤集合中的文档。\n\
  \n查询文档在花括号 `{` 和 `}` 内指定。在返回结果集之前，查询文档会与集合中的所有文档进行匹配。\n\n使用不带查询文档的 `find()` 命令或使用空查询文档（如\
  \ `find({}`）将返回集合中的所有文档。\n\n查询文档可以包含选择器和投影器。\n\n选择器类似于 SQL 中的 `where` 条件或过滤器，用于过滤结果。\n\
  \n投影器类似于 `select` 条件或选择列表，用于显示数据字段。\n\n\n## 6.1.7.2 选择器\n\n你现在将学习如何使用选择器。以下命令将返回所有女性用户：\n\
  \n```\n> db.users.find({\"Gender\":\"F\"})\n\n{ \"_id\" : ObjectId(\"52f4a826958073ea07e15071\"\
  ), \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\" : \"F\", \"Country\" : \"\
  US\" }\n.............\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15084\"), \"Name\"\
  \ : \"Test User19\", \"Age\" :29, \"Gender\" : \"F\", \"Country\" : \"India\" }\n\
  Type \"it\" for more\n>\n```\n\n让我们更进一步。MongoDB 还支持操作符，可以将不同的条件合并在一起，以便根据你的需求优化搜索。\n\
  \n让我们优化上面的查询，现在查找来自印度的女性用户。以下命令将返回相同的结果：\n\n```\n> db.users.find({\"Gender\":\"\
  F\", $or: [{\"Country\":\"India\"}]})\n\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15072\"\
  ), \"Name\" : \"Test User1\", \"Age\" : 11, \"Gender\" : \"F\", \"Country\" : \"\
  India\" }\n...........\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15085\"), \"Name\"\
  \ : \"Test User20\", \"Age\" :30, \"Gender\" : \"F\", \"Country\" : \"India\" }\n\
  >\n```\n\n接下来，如果你想找到所有属于印度或美国的女性用户，请执行以下命令：\n\n```\n>db.users.find({\"Gender\":\"\
  F\",$or:[{\"Country\":\"India\"},{\"Country\":\"US\"}]})\n\n{ \"_id\" : ObjectId(\"\
  52f4a826958073ea07e15071\"), \"Name\" : \"Test User\", \"Age\" : 45, \"Gender\"\
  \ : \"F\", \"Country\" : \"US\" }\n..............\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15084\"\
  ), \"Name\" : \"Test User19\", \"Age\" :29, \"Gender\" : \"F\", \"Country\" : \"\
  India\" }\nType \"it\" for more\n```\n\n对于聚合需求，需要使用聚合函数。接下来，你将学习如何使用`count()`函数进行聚合。\n\
  \n在上面的例子中，你不想显示文档，而是想找出居住在印度或美国的女性用户的数量。因此请执行以下命令：\n\n```\n>db.users.find({\"Gender\"\
  :\"F\",$or:[{\"Country\":\"India\"}, {\"Country\":\"US\"}]}).count()\n\n21\n>\n\
  ```\n\n如果你想查找不考虑任何选择器的用户数量，请执行以下命令：\n\n```\n> db.users.find().count()\n\n22\n>\n\
  ```\n\n## 6.1.7.3 投影器\n\n你已经学习了如何使用选择器来过滤集合中的文档。在上面的例子中，`find()`命令返回匹配选择器的文档的所有字段。\n\
  \n让我们在查询文档中添加一个投影器，在选择器之外，你还将指定需要显示的特定详情或字段。\n\n假设你想显示所有女性员工的名字和年龄。在这种情况下，除了选择器，还需要使用投影器。\n\
  \n执行以下命令以返回所需的结果集：\n\n```\n> db.users.find({\"Gender\":\"F\"}, {\"Name\":1,\"Age\"\
  :1})\n\n{ \"_id\" : ObjectId(\"52f4a826958073ea07e15071\"), \"Name\" : \"Test User\"\
  , \"Age\" : 45 }\n..........\nType \"it\" for more\n>\n```\n\n## 6.1.7.4 sort()\n\
  \n在 MongoDB 中，排序顺序指定如下：1 表示升序，-1 表示降序。\n\n如果在上面的例子中，你想按年龄升序对记录进行排序，请执行以下命令：\n\n\
  ```\n>db.users.find({\"Gender\":\"F\"}, {\"Name\":1,\"Age\":1}).sort({\"Age\":1})\n\
  \n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15072\"), \"Name\" : \"Test User1\"\
  , \"Age\" : 11 }\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15073\"), \"Name\" :\
  \ \"Test User2\", \"Age\" : 12 }\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15074\"\
  ), \"Name\" : \"Test User3\", \"Age\" : 13 }\n..............\n{ \"_id\" : ObjectId(\"\
  52f4a83f958073ea07e15085\"), \"Name\" : \"Test User20\", \"Age\" :30 }\nType \"\
  it\" for more\n```\n\n如果你想按姓名降序、年龄升序显示记录，请执行以下命令：\n\n```\n>db.users.find({\"Gender\"\
  :\"F\"},{\"Name\":1,\"Age\":1}).sort({\"Name\":-1,\"Age\":1})\n\n{ \"_id\" : ObjectId(\"\
  52f4a83f958073ea07e1507a\"), \"Name\" : \"Test User9\", \"Age\" : 19 }\n............\n\
  { \"_id\" : ObjectId(\"52f4a83f958073ea07e15072\"), \"Name\" : \"Test User1\", \"\
  Age\" : 11 }\nType \"it\" for more\n```\n\n## 6.1.7.5 limit()\n\n你现在将了解如何限制结果集中的记录数。例如，在包含数千个文档的大型集合中，如果你想只返回五个匹配的文档，就会使用`limit`命令，它正好可以让你做到这一点。\n\
  \n回到之前关于居住在印度或美国的女性用户的查询，假设你想限制结果集，只返回两个用户。需要执行以下命令：\n\n```\n>db.users.find({\"\
  Gender\":\"F\",$or:[{\"Country\":\"India\"},{\"Country\":\"US\"}]}).limit(2)\n\n\
  { \"_id\" : ObjectId(\"52f4a826958073ea07e15071\"), \"Name\" : \"Test User\", \"\
  Age\" : 45, \"Gender\" : \"F\", \"Country\" : \"US\" }\n{ \"_id\" : ObjectId(\"\
  52f4a83f958073ea07e15072\"), \"Name\" : \"Test User1\", \"Age\" : 11, \"Gender\"\
  \ : \"F\", \"Country\" : \"India\" }\n```\n\n## 6.1.7.6 skip()\n\n如果需求是跳过前两条记录并返回第三和第四个用户，则需要使用`skip`命令。需要执行以下命令：\n\
  \n```\n>db.users.find({\"Gender\":\"F\",$or:[{\"Country\":\"India\"}, {\"Country\"\
  :\"US\"}]}).limit(2).skip(2)\n\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15073\"\
  ), \"Name\" : \"Test User2\", \"Age\" : 12, \"Gender\" : \"F\", \"Country\" : \"\
  India\" }\n{ \"_id\" : ObjectId(\"52f4a83f958073ea07e15074\"), \"Name\" : \"Test\
  \ User3\", \"Age\" : 13, \"Gender\" : \"F\", \"Country\" : \"India\" }\n>\n```\n\
  \n## 6.1.7.7 findOne()\n\n与`find()`类似的是`findOne()`命令。`findOne()`方法可以接受与`find()`相同的参数，但它不返回游标，而是返回单个文档。假设你想返回一个居住在印度或美国的女性用户。这可以通过以下命令实现：\n\
  \n```\n> db.users.findOne({\"Gender\":\"F\"}, {\"Name\":1,\"Age\":1})\n\n{\n\"_id\"\
  \ : ObjectId(\"52f4a826958073ea07e15071\"),\n\"Name\" : \"Test User\",\n\"Age\"\
  \ : 45\n}\n>\n```\n\n类似地，如果你想不考虑任何选择器返回第一条记录，在这种情况下，你可以使用`findOne()`，它将返回集合中的第一个文档。\n\
  \n```\n> db.users.findOne()\n\n{\n\"_id\" : ObjectId(\"52f4a823958073ea07e15070\"\
  ),\n\"FName\" : \"Test\",\n\"LName\" : \"User\",\n\"Age\" : 30,\n\"Gender\" : \"\
  M\",\n\"Country\" : \"US\"}\n```\n\n## 6.1.7.8 使用游标\n\n当使用`find()`方法时，MongoDB 将查询结果作为游标对象返回。为了显示结果，mongo\
  \ shell 会遍历返回的游标。\n\nMongoDB 使用户能够使用`find`方法的游标对象。在下一个例子中，你将看到如何将游标对象存储到变量中，并使用\
  \ while 循环对其进行操作。\n\n假设你想返回所有在美国的用户。为此，你创建了一个变量，将`find()`的输出赋值给该变量（这是一个游标），然后使用\
  \ while 循环进行迭代并打印输出。\n\n代码片段如下：\n\n```\n> var c = db.users.find({\"Country\":\"\
  US\"})\n> while(c.hasNext()) printjson(c.next())\n\n{\n\"_id\" : ObjectId(\"52f4a823958073ea07e15070\"\
  ),\n\"FName\" : \"Test\",\n\"LName\" : \"User\",\n\"Age\" : 30,\n\"Gender\" : \"\
  M\",\n\"Country\" : \"US\"\n}\n{\n\"_id\" : ObjectId(\"52f4a826958073ea07e15071\"\
  ),\n\"Name\" : \"Test User\",\n\"Age\" : 45,\n\"Gender\" : \"F\",\n\"Country\" :\
  \ \"US\"\n}\n>\n```\n\n`next()`函数返回下一个文档。`hasNext()`函数在文档存在时返回 true，而`printjson()`以\
  \ JSON 格式呈现输出。\n\n游标对象被赋值给的变量也可以作为数组进行操作。如果你想显示数组索引 1 处的文档，而不是遍历该变量，你可以运行以下命令：\n\
  \n```\n> var c = db.users.find({\"Country\":\"US\"})\n> printjson(c[1])\n\n{\n\"\
  _id\" : ObjectId(\"52f4a826958073ea07e15071\"),\n\"Name\" : \"Test User\",\n....\
  \ \"Gender\" : \"F\",\n\"Country\" : \"US\"}\n>\n```\n\n\n### 6.1.7.9 `explain()`\n\
  \n`explain()` 函数可用于查看 MongoDB 数据库在执行查询时运行的步骤。从 3.0 版本开始，该函数的输出格式和传递给它的参数发生了变化。它接受一个名为\
  \ `verbose` 的可选参数，该参数决定解释输出的显示方式。以下是详细程度模式：`allPlansExecution`、`executionStats`\
  \ 和 `queryPlanner`。默认的详细程度模式是 `queryPlanner`，这意味着如果不指定任何参数，则默认使用 `queryPlanner`。\n\
  \n以下代码展示了在 `username` 字段上进行过滤时执行的步骤：\n\n```bash\n> db.users.find({\"Name\":\"Test\
  \ User\"}).explain(\"allPlansExecution\")\n```\n\n```json\n{\n  \"queryPlanner\"\
  \ : {\n    \"plannerVersion\" : 1,\n    \"namespace\" : \"mydbproc.users\",\n  \
