  \                            \"port\" : 27017,\n                               \
  \                 \"version\" : \"3.0.4\",\n                                   \
  \             \"gitVersion\" : \"534b5a3f9d10f00cd27737fbcd951032248b5952\"\n  \
  \                                          },\n                                \
  \            \"ok\" : 1\n                                        }\n           \
  \                         }\n```\n\n## 6.1.8.3 支持排序操作\n\n在 MongoDB 中，使用索引字段对文档进行排序的操作能提供最佳性能。\n\
  \n与其他数据库类似，MongoDB 中的索引也具有顺序。如果使用索引来访问文档，它将按照与索引相同的顺序返回结果。\n\n当需要在多个字段上排序时，需要创建复合索引。在复合索引中，输出可以按照索引前缀或整个索引的排序顺序排列。\n\
  \n索引前缀是复合索引的一个子集，包含从索引开头的一个或多个字段。\n\n例如，复合索引 `{ x:1, y: 1, z: 1}` 的索引前缀如下所示。\n\n\
  排序操作可以是任何索引前缀的组合，例如 `{x: 1}` 或 `{x: 1, y: 1}`。\n\n复合索引只有当它是排序的前缀时，才能帮助排序。\n\n例如，在\
  \ `Age` 、 `Name` 和 `Class` 上创建的复合索引，如下所示：\n\n```\n> db.testindx.ensureIndex({\"\
  Age\": 1, \"Name\": 1, \"Class\": 1})\n```\n\n将对以下查询有用：\n\n```\n> db.testindx.find().sort({\"\
  Age\":1})\n> db.testindx.find().sort({\"Age\":1,\"Name\":1})\n> db.testindx.find().sort({\"\
  Age\":1,\"Name\":1, \"Class\":1})\n```\n\n上述索引对以下查询帮助不大：\n\n```\n> db.testindx.find().sort({\"\
  Gender\":1, \"Age\":1, \"Name\": 1})\n```\n\n你可以使用`explain()`命令来诊断 MongoDB 如何处理查询。\n\
  \n## 6.1.8.4 唯一索引\n\n在某个字段上创建索引并不能保证唯一性，所以如果在`Name`字段上创建索引，那么两个或多个文档可以具有相同的名称。然而，如果需要启用唯一性约束，则在创建索引时需要将`unique`属性设置为`true`。\n\
  \n首先，让我们删除现有的索引。\n\n```\n>db.testindx.dropIndexes()\n```\n\n以下命令将在`testindx`集合的`Name`字段上创建一个唯一索引：\n\
  \n```\n> db.testindx.ensureIndex({\"Name\":1},{\"unique\":true})\n```\n\n现在，如果你尝试向集合中插入重复的名称，如下所示，MongoDB\
  \ 会返回错误并不允许插入重复记录：\n\n```\n> db.testindx.insert({\"Name\":\"uniquename\"})\n> db.testindx.insert({\"\
  Name\":\"uniquename\"})\n```\n\n```\n\"E11000 duplicate key error index: mydbpoc.testindx.$Name_1\
  \ dup key: { : \"uniquename\" }\"\n```\n\n如果你检查集合，你会看到只有第一个`uniquename`被存储了。\n\n\
  ```\n> db.testindx.find({\"Name\":\"uniquename\"})\n{ \"_id\" : ObjectId(\"52f4b3c3958073ea07f092ca\"\
  ), \"Name\" : \"uniquename\" }\n>\n```\n\n唯一性也可以为复合索引启用，这意味着虽然单个字段可以有重复值，但字段的组合将始终是唯一的。\n\
  \n例如，如果你在`{\"name\":1, \"age\":1}`上有一个唯一索引，\n\n```\n> db.testindx.ensureIndex({\"\
  Name\":1, \"Age\":1},{\"unique\":true})\n>\n```\n\n那么以下插入操作是被允许的：\n\n```\n> db.testindx.insert({\"\
  Name\":\"usercit\"})\n> db.testindx.insert({\"Name\":\"usercit\", \"Age\":30})\n\
  ```\n\n然而，如果你执行\n\n```\n> db.testindx.insert({\"Name\":\"usercit\", \"Age\":30})\n\
  ```\n\n它将抛出一个类似下面的错误\n\n```\nE11000 duplicate key error index: mydbpoc.testindx.$Name_1_Age_1\
  \ dup key: { : \"usercit\", : 30.0 }\n```\n\n你可能先创建集合并插入文档，然后在集合上创建索引。如果你在可能包含重复值的字段上为集合创建唯一索引，索引创建将会失败。\n\
  \n为了应对这种情况，MongoDB 提供了`dropDups`选项。`dropDups`选项会保存找到的第一个文档，并删除任何后续具有重复值的文档。\n\n\
  以下命令将在`name`字段上创建一个唯一索引，并删除任何重复的文档：\n\n```\n>db.testindx.ensureIndex({\"Name\":1},{\"\
  unique\":true, \"dropDups\":true})\n>\n```\n\n## 6.1.8.5 system.indexes\n\n每当你创建一个数据库时，默认会创建一个`system.indexes`集合。有关数据库索引的所有信息都存储在`system.indexes`集合中。这是一个保留集合，因此你不能修改或删除其中的文档。你只能通过`ensureIndex`和`dropIndexes`数据库命令来操作它。\n\
  \n每当创建一个索引时，其元信息可以在`system.indexes`中看到。可以使用以下命令获取指定集合的所有索引信息：\n\n```\ndb.collectionName.getIndexes()\n\
  ```\n\n例如，以下命令将返回在`testindx`集合上创建的所有索引：\n\n```\n> db.testindx.getIndexes()\n```\n\
  \n## 6.1.8.6 dropIndex\n\n`dropIndex`命令用于删除索引。\n\n以下命令将从`testindx`集合中删除`Name`字段的索引：\n\
  \n```\n> db.testindx.dropIndex({\"Name\":1})\n{ \"nIndexesWas\" : 3, \"ok\" : 1\
  \ }\n>\n```\n\n\n\n## 6.1.8.7 `reIndex`\n\n当你在集合上执行了多次插入和删除操作后，可能需要重建索引，以便索引能够以最佳状态使用。`reIndex`\
  \ 命令用于重建索引。\n\n以下命令重建集合的所有索引。它会首先删除索引（包括 `_id` 字段上的默认索引），然后重建这些索引。\n\n```\ndb.collectionname.reIndex()\n\
  ```\n\n以下命令重建 `testindx` 集合的索引：\n\n```\n> db.testindx.reIndex()\n{\n    \"nIndexesWas\"\
  \ : 2,\n    \"msg\" : \"indexes dropped for collection\",\n    \"nIndexes\" : 2,\n\
  \    ..............\n    \"ok\" : 1\n}\n>\n```\n\n我们将在下一章详细讨论 MongoDB 中可用的不同类型的索引。\n\
  \n## 6.1.8.8 索引如何工作\n\nMongoDB 将索引存储在 BTree 结构中，因此自动支持范围查询。\n\n如果在查询中使用了多个选择条件，MongoDB\
  \ 会尝试找到最佳的单一索引来选择候选集。之后，它会顺序遍历该集合以评估其他条件。\n\n当首次执行查询时，MongoDB 会为该查询可用的每个索引创建多个执行计划。它让这些计划轮流在一定数量的滴答（ticks）内执行，直到执行最快的计划完成。结果随后返回给系统，系统会记住最快执行计划所使用的索引。\n\
  \n对于后续查询，将使用记住的索引，直到集合内发生的更新次数达到某个特定限制。超过更新限制后，系统将再次遵循该过程以找出当时适用的最佳索引。\n\n当发生以下任一事件时，查询计划将重新评估：\n\
  \n*   集合接收到 1,000 次写操作。\n*   添加或删除了一个索引。\n*   `mongod` 进程重启。\n*   为重建索引而重新索引。\n\n\
  如果你想覆盖 MongoDB 的默认索引选择，可以使用 `hint()` 方法来实现。\n\n索引过滤器在 2.6 版本中引入。它由优化器将为查询评估的索引组成，包括查询、投影和排序。MongoDB\
  \ 将使用索引过滤器提供的索引，并忽略 `hint()`。\n\n在 2.6 版本之前，MongoDB 在任何时间点只使用一个索引，因此你需要确保存在复合索引以更好地匹配你的查询。这可以通过检查查询的排序和搜索条件来实现。\n\
  \n索引交集在 2.6 版本中引入。它支持通过满足复合条件的查询来交集索引，其中部分条件由一个索引满足，另一部分由另一个索引满足。\n\n通常，索引交集由两个索引组成；然而，可以使用多个索引交集来解析查询。这种能力提供了更好的优化。\n\
  \n与其他数据库一样，索引维护是有成本的。每个更改集合的操作（如创建、更新或删除）都会产生开销，因为索引也需要更新。为保持最佳平衡，你需要定期检查拥有索引的有效性，这可以通过系统上的读写比率来衡量。识别使用较少的索引并删除它们。\n\
  \n## 6.2 超越基础\n\n本节将涵盖使用条件操作符和正则表达式在选择器部分进行高级查询。这些操作符和正则表达式中的每一个都使你能够更好地控制所编写的查询，从而控制可以从\
  \ MongoDB 数据库中获取的信息。\n\n### 6.2.1 使用条件操作符\n\n条件操作符使你能够更好地控制试图从数据库中提取的数据。在本节中，你将重点关注以下操作符：`$lt`、`$lte`、`$gt`、`$gte`、`$in`、`$nin`\
  \ 和 `$not`。\n\n以下示例假设一个名为 `Students` 的集合包含以下类型的文档：\n\n```\n{\n    _id: ObjectID(),\n\
  \    Name: \"Full Name\",\n    Age: 30,\n    Gender: \"M\",\n    Class: \"C1\",\n\
  \    Score: 95\n}\n```\n\n你将首先创建集合并插入一些示例文档。\n\n```\n>db.students.insert({Name:\"\
  S1\",Age:25,Gender:\"M\",Class:\"C1\",Score:95})\n>db.students.insert({Name:\"S2\"\
  ,Age:18,Gender:\"M\",Class:\"C1\",Score:85})\n>db.students.insert({Name:\"S3\",Age:18,Gender:\"\
  F\",Class:\"C1\",Score:85})\n>db.students.insert({Name:\"S4\",Age:18,Gender:\"F\"\
  ,Class:\"C1\",Score:75})\n>db.students.insert({Name:\"S5\",Age:18,Gender:\"F\",Class:\"\
  C2\",Score:75})\n>db.students.insert({Name:\"S6\",Age:21,Gender:\"M\",Class:\"C2\"\
  ,Score:100})\n>db.students.insert({Name:\"S7\",Age:21,Gender:\"M\",Class:\"C2\"\
  ,Score:100})\n>db.students.insert({Name:\"S8\",Age:25,Gender:\"F\",Class:\"C2\"\
  ,Score:100})\n>db.students.insert({Name:\"S9\",Age:25,Gender:\"F\",Class:\"C2\"\
  ,Score:90})\n>db.students.insert({Name:\"S10\",Age:28,Gender:\"F\",Class:\"C3\"\
  ,Score:90})\n> db.students.find()\n{ \"_id\" : ObjectId(\"52f874faa13cd6a65998734d\"\
  ), \"Name\" : \"S1\", \"Age\" : 25, \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\"\
  \ : 95 }\n.......................\n{ \"_id\" : ObjectId(\"52f8758da13cd6a659987356\"\
  ), \"Name\" : \"S10\", \"Age\" : 28, \"Gender\" : \"F\", \"Class\" : \"C3\", \"\
  Score\" : 90 }\n>\n```\n\n#### 6.2.1.1 `$lt` 和 `$lte`\n\n让我们从 `$lt` 和 `$lte` 操作符开始。它们分别代表“小于”和“小于等于”。\n\
  \n如果你想找到所有年龄小于 25 岁（Age < 25）的学生，你可以执行以下带有选择器的 `find`：\n\n```\n> db.students.find({\"\
  Age\":{\"$lt\":25}})\n{ \"_id\" : ObjectId(\"52f8750ca13cd6a65998734e\"), \"Name\"\
  \ : \"S2\", \"Age\" : 18, \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\" : 85\
  \ }\n.............................\n{ \"_id\" : ObjectId(\"52f87556a13cd6a659987353\"\
  ), \"Name\" : \"S7\", \"Age\" : 21, \"Gender\" : \"M\", \"Class\" : \"C2\", \"Score\"\
  \ : 100 }\n>\n```\n\n如果你想找出所有年龄小于等于 25 岁（Age <= 25）的学生，请执行：\n\n```\n> db.students.find({\"\
  Age\":{\"$lte\":25}})\n{ \"_id\" : ObjectId(\"52f874faa13cd6a65998734d\"), \"Name\"\
  \ : \"S1\", \"Age\" : 25, \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\" : 95\
  \ }\n....................\n{ \"_id\" : ObjectId(\"52f87578a13cd6a659987355\"), \"\
  Name\" : \"S9\", \"Age\" : 25, \"Gender\" : \"F\", \"Class\" : \"C2\", \"Score\"\
  \ : 90 }\n>\n```\n\n#### 6.2.1.2 `$gt` 和 `$gte`\n\n`$gt` 和 `$gte` 操作符分别代表“大于”和“大于等于”。\n\
  \n让我们找出所有年龄大于 25 岁（Age > 25）的学生。这可以通过执行以下命令来实现：\n\n```\n> db.students.find({\"Age\"\
  :{\"$gt\":25}})\n{ \"_id\" : ObjectId(\"52f8758da13cd6a659987356\"), \"Name\" :\
  \ \"S10\", \"Age\" : 28, \"Gender\" : \"F\", \"Class\" : \"C3\", \"Score\" : 90\
  \ }\n>\n```\n\n如果你将上面的示例更改为返回年龄大于等于 25 岁（Age >= 25）的学生，那么命令是：\n\n```\n> db.students.find({\"\
  Age\":{\"$gte\":25}})\n{ \"_id\" : ObjectId(\"52f874faa13cd6a65998734d\"), \"Name\"\
  \ : \"S1\", \"Age\" : 25, \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\" : 95\
  \ }\n......................................\n{ \"_id\" : ObjectId(\"52f8758da13cd6a659987356\"\
  ), \"Name\" : \"S10\", \"Age\" : 28, \"Gender\" : \"F\", \"Class\" : \"C3\", \"\
  Score\" : 90 }\n>\n```\n\n\n\n#### 6.2.1.3 `$in` 和 `$nin`\n\n让我们找出所有属于 C1 或 C2 班的学生。相应的命令是：\n\
  \n```\n> db.students.find({\"Class\":{\"$in\":[\"C1\",\"C2\"]}})\n{ \"_id\" : ObjectId(\"\
  52f874faa13cd6a65998734d\"), \"Name\" : \"S1\", \"Age\" : 25, \"Gender\" : \"M\"\
  , \"Class\" : \"C1\", \"Score\" : 95 }\n................................\n{ \"_id\"\
  \ : ObjectId(\"52f87578a13cd6a659987355\"), \"Name\" : \"S9\", \"Age\" : 25, \"\
  Gender\" : \"F\", \"Class\" : \"C2\", \"Score\" : 90 }\n>\n```\n\n它的反向操作可以使用 `$nin`\
  \ 来完成。\n\n接下来，让我们找出不属于 C1 或 C2 班的学生。命令是：\n\n```\n> db.students.find({\"Class\":{\"\
  $nin\":[\"C1\",\"C2\"]}})\n{ \"_id\" : ObjectId(\"52f8758da13cd6a659987356\"), \"\
  Name\" : \"S10\", \"Age\" : 28, \"Gender\" : \"F\", \"Class\" : \"C3\", \"Score\"\
  \ : 90 }\n>\n```\n\n接下来，让我们看看如何组合以上所有操作符来编写查询。假设你想找出所有性别为“M”**或者**属于“C1”**或**“C2”班，并且年龄大于或等于\
  \ 25 岁的学生。这可以通过执行以下命令实现：\n\n```\n> db.students.find({$or:[{\"Gender\":\"M\",\"Class\"\
  :{\"$in\":[\"C1\",\"C2\"]}}], \"Age\":{\"$gte\":25}})\n{ \"_id\" : ObjectId(\"52f874faa13cd6a65998734d\"\
  ), \"Name\" : \"S1\", \"Age\" : 25, \"Gender\" : \"M\", \"Class\" : \"C1\", \"Score\"\
  \ : 95 }\n>\n```\n\n### 6.2.2 正则表达式\n\n在本节中，你将学习如何使用正则表达式。当你想要查找名字以“A”开头的学生时，正则表达式非常有用。\n\
  \n为了理解这一点，让我们再添加三四个名字不同的学生。\n\n```\n> db.students.insert({Name:\"Student1\", Age:30,\
  \ Gender:\"M\", Class: \"Biology\", Score:90})\n> db.students.insert({Name:\"Student2\"\
  , Age:30, Gender:\"M\", Class: \"Chemistry\", Score:90})\n> db.students.insert({Name:\"\
  Test1\", Age:30, Gender:\"M\", Class: \"Chemistry\", Score:90})\n> db.students.insert({Name:\"\
  Test2\", Age:30, Gender:\"M\", Class: \"Chemistry\", Score:90})\n> db.students.insert({Name:\"\
  Test3\", Age:30, Gender:\"M\", Class: \"Chemistry\", Score:90})\n>\n```\n\n假设你想找出所有名字以“St”或“Te”开头，并且班级以“Che”开头的学生。这可以使用正则表达式进行过滤，如下所示：\n\
  \n```\n> db.students.find({\"Name\":/(St|Te)*/i, \"Class\":/(Che)/i})\n{ \"_id\"\
  \ : ObjectId(\"52f89ecae451bb7a56e59086\"), \"Name\" : \"Student2\", \"Age\" : 30,\
  \ \"Gender\" : \"M\", \"Class\" : \"Chemistry\", \"Score\" : 90 }\n.........................\n\
  { \"_id\" : ObjectId(\"52f89f06e451bb7a56e59089\"), \"Name\" : \"Test3\", \"Age\"\
  \ : 30, \"Gender\" : \"M\", \"Class\" : \"Chemistry\", \"Score\" : 90 }\n>\n```\n\
  \n为了理解正则表达式是如何工作的，让我们以查询 `\"Name\":/(St|Te)*/i` 为例。\n\n*   `//i` 表示该正则表达式不区分大小写。\n\
  *   `(St|Te)*` 表示 `Name` 字符串必须以“St”或“Te”开头。\n*   末尾的 `*` 表示它将匹配之后的任何内容。\n\n当你将所有部分组合在一起时，你正在执行一个不区分大小写的匹配，查找名字以“St”或“Te”开头的记录。在\
  \ `Class` 的正则表达式中也使用了类似的规则。\n\n接下来，让我们把查询复杂化一点。将其与上面介绍的操作符结合起来。\n\n获取名字为 student1、student2，且为年龄\
  \ >=25 的男性学生。相应的命令如下：\n\n```\n> db.students.find({\"Name\":/(student*)/i,\"Age\"\
  :{\"$gte\":25},\"Gender\":\"M\"})\n{ \"_id\" : ObjectId(\"52f89eb1e451bb7a56e59085\"\
  ), \"Name\" : \"Student1\", \"Age\" : 30,\n\"Gender\" : \"M\", \"Class\" : \"Biology\"\
  , \"Score\" : 90 }\n{ \"_id\" : ObjectId(\"52f89ecae451bb7a56e59086\"), \"Name\"\
  \ : \"Student2\", \"Age\" : 30,\n\"Gender\" : \"M\", \"Class\" : \"Chemistry\",\
  \ \"Score\" : 90 }\n```\n\n### 6.2.3 MapReduce\n\nMapReduce 框架能够划分任务，在本例中，即跨计算机集群进行数据聚合，以减少聚合数据集所需的时间。它包含两个部分：Map\
  \ 和 Reduce。\n\n以下是更具体的描述：MapReduce 是一个用于处理那些可以在海量数据集上高度分布式、并通过多个节点运行的问题的框架。如果所有节点都具有相同的硬件，这些节点统称为集群；否则，称为网格。这种处理可以发生在结构化数据（存储在数据库中的数据）和非结构化数据（存储在文件系统中的数据）上。\n\
  \n*   **“Map”**：在此步骤中，充当主节点的节点接收输入参数，并将大问题分解为多个小问题。然后，这些子问题被分配给工作节点。工作节点可能进一步将问题分解为子问题，从而形成一个多级树结构。工作节点随后处理它们内部的子问题，并将答案返回给主节点。\n\
  *   **“Reduce”**：在此步骤中，所有子问题的答案都已汇总到主节点，主节点随后组合所有答案并生成最终输出，即你要解决的大问题的答案。\n\n为了理解其工作原理，让我们考虑一个小例子：统计集合中男性和女性学生的人数。\n\
  \n这涉及以下步骤：首先创建 `map` 和 `reduce` 函数，然后调用 `mapReduce` 函数并传递必要的参数。\n\n让我们从定义 `map`\
  \ 函数开始：\n\n```\n> var map = function(){emit(this.Gender,1);};\n>\n```\n\n此步骤以文档为输入，并根据\
  \ `Gender` 字段，发出 `{\"F\", 1}` 或 `{\"M\", 1}` 类型的文档。\n\n接下来，创建 `reduce` 函数：\n\n```\n\
  > var reduce = function(key, value){return Array.sum(value);};\n>\n```\n\n此函数将根据键字段（在你的例子中是\
  \ `Gender`）对 `map` 函数发出的文档进行分组，并返回值的总和（在上例中发出的值是“1”）。上面定义的 `reduce` 函数的输出是按性别统计的数量。\n\
  \n最后，你使用 `mapReduce` 函数将它们组合起来，如下所示：\n\n```\n> db.students.mapReduce(map, reduce,\
  \ {out: \"mapreducecount1\"})\n{\n\"result\" : \"mapreducecount1\",\n\"timeMillis\"\
  \ : 29,\n\"counts\" : {\n\"input\" : 15,\n\"emit\" : 15,\n\"reduce\" : 2,\n\"output\"\
  \ : 2\n},\n\"ok\" : 1,\n}\n>\n```\n\n这实际上是在 `students` 集合上应用你定义的 `map` 和 `reduce`\
  \ 函数。最终结果存储在一个名为 `mapreducecount1` 的新集合中。\n\n为了验证它，在 `mapreducecount1` 集合上运行 `find()`\
  \ 命令，如下所示：\n\n```\n> db.mapreducecount1.find()\n{ \"_id\" : \"F\", \"value\" : 6\
  \ }\n{ \"_id\" : \"M\", \"value\" : 9 }\n>\n```\n\n这里还有一个例子来解释 `MapReduce` 的工作原理。让我们使用\
  \ `MapReduce` 来找出班级平均分。正如你在上面的例子中看到的，你需要先创建 `map` 函数，然后是 `reduce` 函数，最后将它们组合起来，将输出存储在你数据库的一个集合中。代码片段如下：\n\
  \n```\n> var map_1 = function(){emit(this.Class,this.Score);};\n> var reduce_1 =\
  \ function(key, value){return Array.avg(value);};\n> db.students.mapReduce(map_1,reduce_1,\
  \ {out:\"MR_ClassAvg_1\"})\n{\n\"result\" : \"MR_ClassAvg_1\",\n\"timeMillis\" :\
  \ 4,\n\"counts\" : {\n\"input\" : 15, \"emit\" : 15,\n\"reduce\" : 3 , \"output\"\
  \ : 5\n},\n\"ok\" : 1,\n}\n> db.MR_ClassAvg_1.find()\n{ \"_id\" : \"Biology\", \"\
  value\" : 90 }\n{ \"_id\" : \"C1\", \"value\" : 85 }\n{ \"_id\" : \"C2\", \"value\"\
  \ : 93 }\n{ \"_id\" : \"C3\", \"value\" : 90 }\n{ \"_id\" : \"Chemistry\", \"value\"\
  \ : 90 }\n>\n```\n\n\n\n"
- '# 6.2.4 `aggregate()`


  上一节介绍了 `MapReduce` 函数。本节，你将初步了解 MongoDB 的聚合框架。


  聚合框架让你无需使用 `MapReduce` 函数即可获取聚合值。从性能上讲，聚合框架比 `MapReduce` 函数更快。你需要始终记住，`MapReduce`
  适用于批处理方法，而非实时分析。


  接下来，你将使用 `aggregate` 函数描绘上述讨论的两个输出结果。第一个输出是找出男女生的数量，可通过执行以下命令实现：


  ```

  > db.students.aggregate({$group:{_id:"$Gender", totalStudent: {$sum: 1}}})

  { "_id" : "F", "totalStudent" : 6 }

  { "_id" : "M", "totalStudent" : 9 }

  >

  ```


  类似地，要找出按班级分类的平均分，可以执行以下命令：


  ```

  > db.students.aggregate({$group:{_id:"$Class", AvgScore: {$avg: "$Score"}}})

  { "_id" : "Biology", "AvgScore" : 90 }

  { "_id" : "C3", "AvgScore" : 90 }

  { "_id" : "Chemistry", "AvgScore" : 90 }

  { "_id" : "C2", "AvgScore" : 93 }

  { "_id" : "C1", "AvgScore" : 85 }

  >

  ```


  '
- "# 6.3 设计应用程序的数据模型\n\n本节将探讨如何为应用程序设计数据模型。MongoDB 数据库为设计数据模型提供了两种选项：用户可以将相关对象嵌入彼此之中，或者通过\
  \ ID 引用彼此。本节将探索这些选项。\n\n为了理解这些选项，你将设计一个博客应用程序并演示这两种选项的用法。\n\n一个典型的博客应用程序包含以下场景：\n\
  - 人们发布关于不同主题的博客。除了主题分类外，还可以使用不同的标签。例如，如果分类是政治，帖子谈论的是某位政治家，那么该政治家的名字可以作为标签添加到帖子中。这有助于用户快速找到与其兴趣相关的帖子，并将相关帖子链接在一起。\n\
  - 查看博客的人可以对博客文章发表评论。\n\n## 6.3.1 关系数据建模与范式化\n\n在深入 MongoDB 的方法之前，让我们先简要了解一下如何在 SQL\
  \ 等关系数据库中进行建模。\n\n在关系数据库中，数据建模通常通过定义表开始，并逐渐消除数据冗余以达到范式形式。\n\n#### 6.3.1.1 什么是范式形式？\n\
  \n在关系数据库中，范式形式通常从根据应用程序需求创建表开始，然后逐步消除冗余以达到最高范式形式，也称为第三范式或 `3NF`。为了更好地理解这一点，让我们以表格形式展示博客应用程序的初始数据，如图\
  \ 6-2 所示。\n\n![A332296_1_En_6_Fig2_HTML.gif](img/A332296_1_En_6_Fig2_HTML.gif)\n\
  \n**图 6-2. 博客应用程序初始数据**\n\n这些数据实际上处于第一范式形式。你会有大量冗余，因为一篇文章可能有多个评论，也可能关联多个标签。冗余的问题在于它引入了不一致的可能性，即相同数据的不同副本可能具有不同的值。为了消除这种冗余，你需要通过将数据拆分为多个表来进一步范式化数据。在此步骤中，你必须识别一个键列来唯一标识表中的每一行，以便在表之间创建链接。使用\
  \ `3NF` 范式对上述场景建模后，将得到如图 6-3 所示的 RDBMs 图。\n\n![A332296_1_En_6_Fig3_HTML.jpg](img/A332296_1_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3. RDBMS 图**\n\n在这种情况下，你得到了一个没有冗余的数据模型，允许你更新它而无需担心更新多行。特别是，你不再需要担心数据模型中的不一致问题。\n\
  \n#### 6.3.1.2 范式形式的问题\n\n如前所述，范式化的好处是它允许轻松更新且无任何冗余（即有助于保持数据一致性）。更新用户名意味着更新 `Users`\
  \ 表中的名称。\n\n然而，当你试图取回数据时，问题就出现了。例如，要查找特定用户发布的所有帖子相关的标签和评论，关系数据库程序员会使用 `JOIN`。通过使用\
  \ `JOIN`，数据库会根据应用程序屏幕设计返回所有数据，但真正的问题在于数据库执行什么操作来获得该结果集。\n\n通常，任何 `RDBMS` 都从磁盘读取并执行寻道，这占用了读取一行所花费的\
  \ 99% 以上的时间。当涉及磁盘访问时，随机寻道是最大的障碍。这一点在此上下文中如此重要的原因是，`JOIN` 通常需要随机寻道。`JOIN` 操作是关系数据库中最昂贵的操作之一。此外，如果你最终需要将数据库扩展到多台服务器，还会引入生成分布式\
  \ `JOIN` 的问题，这是一个复杂且通常很慢的操作。\n\n**第一步是定义 `map` 函数，该函数循环遍历集合中的文档，并以 `{\"Class\":\
  \ Score}` 的格式返回输出，例如 `{\"C1\":95}`。第二步对班级进行分组并计算该班级分数的平均值。第三步组合结果；它定义了需要应用 `map`\
  \ 和 `reduce` 函数的集合，最后定义了存储输出的位置，在本例中是一个名为 `MR_ClassAvg_1` 的新集合。**\n\n**最后一步，你使用\
  \ `find` 来检查输出结果。**\n\n第一步是定义 `map` 函数，该函数循环遍历集合中的文档，并以 `{\"Class\": Score}` 的格式返回输出，例如\
  \ `{\"C1\":95}`。第二步对班级进行分组并计算该班级分数的平均值。第三步组合结果；它定义了需要应用 `map` 和 `reduce` 函数的集合，最后定义了存储输出的位置，在本例中是一个名为\
  \ `MR_ClassAvg_1` 的新集合。\n\n最后一步，你使用 `find` 来检查输出结果。\n\n\n### 6.3.2 MongoDB 文档数据模型方法\n\
  \n如你所知，在 MongoDB 中，数据存储在文档里。对我们应用设计者而言幸运的是，这为模式设计开启了新的可能性。不幸的是，这也使我们的模式设计过程变得复杂。现在，当面对一个模式设计问题时，不再像关系型数据库那样有一条固定的规范化数据库设计路径。在\
  \ MongoDB 中，模式设计取决于你想要解决的问题。\n\n如果你必须使用 MongoDB 文档模型来建模上述内容，你可能会将博客数据存储在如下文档中：\n\
  \n```json\n{\n  \"_id\" : ObjectId(\"509d27069cc1ae293b36928d\"),\n  \"title\" :\
  \ \"示例标题\",\n  \"body\" : \"示例文本。\",\n  \"tags\" : [\n    \"标签 1\",\n    \"标签 2\"\
  ,\n    \"标签 3\",\n    \"标签 4\"\n  ],\n  \"created_date\" : ISODate(\"2015-07-06T12:41:39.110Z\"\
  ),\n  \"author\" : \"作者 1\",\n  \"category_id\" : ObjectId(\"509d29709cc1ae293b369295\"\
  ),\n  \"comments\" : [\n    {\n      \"subject\" : \"示例评论\",\n      \"body\" : \"\
  评论内容\",\n      \"author \" : \"作者 2\",\n      \"created_date\":ISODate(\"2015-07-06T13:34:23.929Z\"\
  )\n    }\n  ]\n}\n```\n\n如你所见，你已将评论和标签仅嵌入在一个文档中。或者，你也可以通过使用 `_id` 字段引用来对模型进行一定程度的“规范化”：\n\
  \n```json\n// 作者文档：\n{\n  \"_id\": ObjectId(\"509d280e9cc1ae293b36928e \"),\n  \"\
  name\": \"作者 1\",\n}\n```\n\n```json\n// 标签文档：\n{\n  \"_id\": ObjectId(\"509d35349cc1ae293b369299\"\
  ),\n  \"TagName\": \"标签 1\",\n  .....\n}\n```\n\n```json\n// 评论文档：\n{\n  \"_id\"\
  : ObjectId(\"509d359a9cc1ae293b3692a0\"),\n  \"Author\": ObjectId(\"508d27069cc1ae293b36928d\"\
  ),\n  .......\n  \"created_date\" : ISODate(\"2015-07-06T13:34:59.336Z\")\n}\n```\n\
  \n```json\n//分类文档\n{\n  \"_id\": ObjectId(\"509d29709cc1ae293b369295\"),\n  \"Category\"\
  : \"分类 1\"\n  ......\n}\n```\n\n```json\n//文章文档\n{\n  \"_id\" : ObjectId(\"509d27069cc1ae293b36928d\"\
  ),\n  \"title\" : \"示例标题\",\n  \"body\" : \"示例文本。\",\n  \"tags\" : [ ObjectId(\"\
  509d35349cc1ae293b369299\"),\n  ObjectId(\"509d35349cc1ae293b36929c\")\n  ],\n \
  \ \"created_date\" : ISODate(\"2015-07-06T13:41:39.110Z\"),\n  \"author_id\" : ObjectId(\"\
  509d280e9cc1ae293b36928e\"),\n  \"category_id\" : ObjectId(\"509d29709cc1ae293b369295\"\
  ),\n  \"comments\" : [\n    ObjectId(\"509d359a9cc1ae293b3692a0\"),\n  ]\n}\n```\n\
  \n本章剩余部分将致力于确定哪种方案适用于你的场景（即，是使用引用还是嵌入）。\n\n#### 6.3.2.1 嵌入\n\n在本节中，你将了解嵌入是否会带来性能上的积极影响。当你需要获取一组数据并将其显示在屏幕上时（例如一个显示博客相关评论的页面），嵌入可能很有用；在这种情况下，评论可以嵌入在博客文档中。\n\
  \n这种方法的益处在于，由于 MongoDB 在磁盘上连续存储文档，所有相关数据只需一次查找即可获取。\n\n除此之外，由于不支持 JOIN，如果你在这种情况下使用引用，应用程序可能会执行类似以下的步骤来获取与博客相关的评论数据：\n\
  \n1.  从博客文档中获取关联的 `comments_id`。\n2.  根据第一步中找到的 `comments_id` 获取评论文档。\n\n如果你采用这种引用方式，不仅数据库需要进行多次查找来定位你的数据，而且由于现在需要两次往返数据库才能检索数据，还会引入额外的延迟。\n\
  \n如果应用程序经常同时访问评论数据和博客数据，那么将评论嵌入到博客文档中几乎肯定会对性能产生积极影响。\n\n另一个倾向于嵌入的考虑因素是希望写入数据时具有原子性和隔离性。MongoDB\
  \ 设计时未包含多文档事务。在 MongoDB 中，操作的原子性仅在单个文档级别提供，因此需要原子性地一起更新的数据必须放置在同一个文档中。\n\n当你更新数据库中的数据时，你必须确保你的更新要么完全成功，要么完全失败，永远不会出现“部分成功”的情况，并且没有其他数据库读取者会看到不完整的写入操作。\n\
  \n#### 6.3.2.2 引用\n\n你已经了解到，在许多情况下，**嵌入式**方法能提供最佳性能，同时它还能保证数据一致性。然而，在某些情况下，更**规范化**的模型在\
  \ MongoDB 中表现更佳。\n\n采用多个集合并添加引用的一个原因是，它能在查询数据时提供更大的灵活性。让我们以上面提到的博客示例来理解这一点。\n\n\
  你已经看到了如何使用嵌入式模式，这在需要在同一个页面上展示所有数据时（即显示博客文章及其所有相关评论的页面）效果非常好。\n\n现在假设你有一个需求：搜索特定用户发表的评论。使用嵌入式模式的查询如下所示：\n\
  \n`db.posts.find({'comments.author': 'author2'},{'comments': 1})`\n\n那么，此查询的结果将是以下形式的文档：\n\
  \n```json\n{\n\"_id\" : ObjectId(\"509d27069cc1ae293b36928d\"),\n\"comments\" :\
  \ [ {\n\"subject\" : \"Sample Comment 1 \",\n\"body\" : \"Comment1 Body.\",\n\"\
  author_id\" : \"author2\",\n\"created_date\" : ISODate(\"2015-07-06T13:34:23.929Z\"\
  )}...]\n}\n{\n\"_id\" : ObjectId(\"509d27069cc1ae293b36928d\"),\n\"comments\" :\
  \ [\n{\n\"subject\" : \"Sample Comment 2\",\n\"body\" : \"Comments Body.\",\n\"\
  author_id\" : \"author2\",\n\"created_date\" : ISODate(\"2015-07-06T13:34:23.929Z\"\
  )\n}...]\n}\n```\n\n这种方法的主要缺点是，你会获取到比实际需要多得多的数据。特别是，你无法只请求 `author2` 的评论；你必须请求 `author2`\
  \ 评论过的博客文章，而这些文章也包含了所有其他评论。这些数据需要在应用代码中进行进一步筛选。\n\n另一方面，假设你决定使用规范化模式。在这种情况下，你将拥有三个文档集合：\"\
  作者\"、\"文章\"和\"评论\"。\n\n\"作者\"文档将包含作者的特有内容，如 `姓名`、`年龄`、`性别` 等；\"文章\"文档将包含文章的特有细节，如文章创建时间、文章作者、实际内容和文章主题。\n\
  \n\"评论\"文档将包含对文章的评论，如 `评论日期`、评论创建者和评论文本。如下图所示：\n\n```json\n// 作者文档：\n{\n\"_id\"\
  : ObjectId(\"508d280e9cc1ae293b36928e \"),\n\"name\": \"Jenny\",\n..........\n}\n\
  ```\n\n```json\n// 文章文档\n{\n\"_id\" : ObjectId(\"508d27069cc1ae293b36928d\"),....................\n\
  }\n```\n\n```json\n// 评论文档：\n{\n\"_id\": ObjectId(\"508d359a9cc1ae293b3692a0\"),\n\
  \"Author\": ObjectId(\"508d27069cc1ae293b36928d\"),\n\"created_date\" : ISODate(\"\
  2015-07-06T13:34:59.336Z\"),\n\"Post_id\": ObjectId(\"508d27069cc1ae293b36928d\"\
  ),\n..........\n}\n```\n\n在这种场景下，查找由 \"`author2`\" 发表的评论的查询，可以通过对评论集合进行一个简单的 `find()`\
  \ 操作来完成：\n\n`db.comments.find({\"author\": \"author2\"})`\n\n总的来说，如果你的应用程序的查询模式是已知的，并且数据往往只以一种方式访问，那么嵌入式方法就很有效。反之，如果你的应用程序可能以多种不同方式查询数据，或者你无法预料数据可能被查询的模式，那么更“规范化”的方法可能更好。\n\
  \n例如，在上述规范化模式中，你将能够使用 `limit`、`skip` 操作符对评论进行排序或返回更受限的评论集合。而在嵌入式情况下，你只能按照评论在文章中的存储顺序检索所有评论。\n\
  \n另一个可能促使你使用文档引用的因素是存在**一对多**关系时。\n\n例如，一个拥有大量读者互动的流行博客，可能对某篇文章有数百甚至数千条评论。在这种情况下，嵌入式会带来显著的负面影响：\n\
  \n*   对读取性能的影响：随着文档尺寸增大，它会占用更多内存。内存的问题在于，MongoDB 数据库会将频繁访问的文档缓存在内存中，文档越大，它们能放入内存的概率就越低。这将导致检索文档时发生更多页面错误，进而引发随机磁盘\
  \ I/O，进一步拖慢性能。\n*   对更新性能的影响：随着尺寸增大，当对此类文档执行追加数据的更新操作时，MongoDB 最终需要将文档移动到有更多可用空间的区域。当这种移动发生时，会显著降低更新性能。\n\
  \n除此之外，MongoDB 文档有 `16MB` 的硬性大小限制。虽然这一点需要注意，但通常在你达到 `16MB` 的大小限制之前，就会因为内存压力和文档复制而遇到问题。\n\
  \n促使使用文档引用的最后一个因素是存在**多对多**或 `M:N` 关系的情况。\n\n例如，在上述例子中，有标签。每个博客可以有多个标签，每个标签也可以关联到多个博客条目。\n\
  \n实现博客-标签 `M:N` 关系的一种方法是拥有以下三个集合：\n\n*   `Tags` 集合，用于存储标签详情\n*   `Blogs` 集合，用于存储博客详情\n\
  *   第三个集合，称为 `标签到博客映射`，用于映射标签和博客之间的关系\n\n这种方法与关系数据库中的类似，但这会对应用程序的性能产生负面影响，因为查询最终会进行大量应用层面的“连接”操作。\n\
  \n或者，你可以使用嵌入式模型，在博客文档中嵌入标签，但这会导致数据重复。尽管这会在一定程度上简化读取操作，但它会增加更新操作的复杂性，因为在更新一个标签详情时，用户需要确保该更新后的标签在其嵌入到的所有其他博客文档中都得到更新。\n\
  \n因此，对于多对多连接，通常采用折中方案是最好的：嵌入一个 `_id` 值列表，而不是完整的文档：\n\n```json\n// 标签文档：\n{\n\"_id\"\
  : ObjectId(\"508d35349cc1ae293b369299\"),\n\"TagName\": \"Tag1\",\n..........\n\
  }\n```\n\n```json\n// 添加了标签 ID 作为引用的文章文档\n// 文章文档\n{ \"_id\" : ObjectId(\"508d27069cc1ae293b36928d\"\
  ),\n\"tags\" : [\nObjectId(\"509d35349cc1ae293b369299\"),\nObjectId(\"509d35349cc1ae293b36929a\"\
  ),\nObjectId(\"509d35349cc1ae293b36929b\"),\nObjectId(\"509d35349cc1ae293b36929c\"\
  )\n],....................................\n}\n```\n\n虽然查询会稍微复杂一些，但你不再需要担心在所有地方更新一个标签了。\n\
  \n总而言之，MongoDB 中的模式设计是你需要做出的最早期决策之一，它取决于应用程序的需求和查询模式。\n\n正如你所见，当你需要同时访问数据或需要进行原子更新时，嵌入式方法会产生积极影响。然而，如果你在查询时需要更大的灵活性，或者你有**多对多**关系，使用引用是一个不错的选择。\n\
  \n最终，决策取决于你应用程序的访问模式，在 MongoDB 中没有硬性规定。在下一节中，你将学习各种数据建模的考量因素。\n\n\n#### 6.3.2.3\
  \ 数据建模的决策\n\n这涉及到决定如何组织文档以实现有效的数据建模。一个关键的决策点是需要嵌入数据还是使用数据引用（即决定采用嵌入还是引用）。\n\n这一点通过一个例子可以更好地说明。假设你有一个书评网站，其中包含作者、书籍以及带有线程式评论的回复。\n\
  \n当前的问题是如何组织集合。这个决策取决于每本书预期的评论数量以及读操作与写操作的执行频率。\n\n#### 6.3.2.4 操作考虑因素\n\n除了元素之间的交互方式（即以嵌入方式存储文档还是使用引用）之外，在为应用程序设计数据模型时，许多其他操作因素也至关重要。这些因素将在以下各节中介绍。\n\
  \n#### 数据生命周期管理\n\n如果你的应用程序拥有需要在数据库中仅保留有限时间段的数据集，则需要使用此功能。\n\n假设你需要将评论和回复相关的数据保留一个月。可以考虑使用此功能。\n\
  \n这是通过使用集合的 `Time to Live (TTL)` 功能实现的。集合的 `TTL` 功能确保文档在指定时间后过期。\n\n此外，如果应用程序要求仅处理最近插入的文档，使用固定集合（`capped\
  \ collections`）将有助于优化性能。\n\n## 索引\n\n可以创建索引以支持常用查询，从而提高性能。默认情况下，`MongoDB` 会在 `_id`\
  \ 字段上创建索引。\n\n创建索引时需要考虑以下几点：\n\n*   每个索引至少需要 8KB 的数据空间。\n*   对于写操作，添加索引会对性能产生一些负面影响。因此，对于写操作频繁的集合，索引可能代价高昂，因为每次插入时都必须将键添加到所有索引中。\n\
  *   索引对于读操作频繁的集合（例如读写操作比例高的情况）是有益的。未建立索引的读操作不受索引影响。\n\n### 分片\n\n设计应用程序模型时的一个重要因素是是否对数据进行分区。这在\
  \ `MongoDB` 中是通过分片实现的。\n\n分片也被称为数据分区。在 `MongoDB` 中，一个集合被分区，其文档分布在称为分片（`shards`）的机器集群上。这对性能有显著影响。我们将在第\
  \ `tk` 章更详细地讨论分片。\n\n#### 大量集合\n\n使用多个集合与在单个集合中存储数据的设计考虑如下：\n\n*   选择多个集合存储数据不会带来性能损失。\n\
  *   为不同类型的数据使用不同的集合可以提高高吞吐量批处理应用程序的性能。\n\n当你设计拥有大量集合的模型时，需要考虑以下行为：\n\n*   每个集合都伴随一定的最小开销（几千字节）。\n\
  *   每个索引（包括 `_id` 索引）至少需要 8KB 的数据空间。\n\n你现在知道，每个数据库的元数据都存储在 `<database>.ns` 文件中。每个集合和索引在命名空间文件中都有自己的条目，因此在决定实施大量集合时，你需要考虑\
  \ `limits_on_the_size_of_namespace` 文件的限制。\n\n#### 文档增长\n\n少数更新操作，例如向数组中推送元素、添加新字段等，可能导致文档大小增加，进而可能导致文档从一个槽位移动到另一个槽位以适应文档。这种文档重定位的过程既消耗资源又耗时。尽管\
  \ `MongoDB` 提供了填充（`padding`）以最小化重定位的发生，但你可能需要手动处理文档增长问题。\n\n## 6.4 本章小结\n\n在本章中，你学习了基本的\
  \ `CRUD` 操作以及高级查询功能。你还研究了存储和检索数据的两种方式：嵌入和引用。\n\n在下一章中，你将学习 `MongoDB` 架构、其核心组件和特性。\n\
  \n"
- '# 7. MongoDB 架构


  > “`MongoDB` 架构涵盖了 `MongoDB` 的深度架构概念。”


  在本章中，你将学习 `MongoDB` 架构，特别是核心进程和工具、独立部署、分片概念、复制概念和生产部署。


  ## 7.1 核心进程


  `MongoDB` 软件包中的核心组件是


  *   `mongod`，即核心数据库进程

  *   `mongos`，即分片集群的控制器和查询路由器

  *   `mongo`，即交互式 `MongoDB` shell


  这些组件作为应用程序位于 `bin` 文件夹下。让我们详细讨论这些组件。


  ### 7.1.1 mongod


  `MongoDB` 系统中的主要守护进程是 `mongod`。该守护进程处理所有数据请求，管理数据格式，并执行后台管理操作。


  当不带任何参数运行 `mongod` 时，它会连接到默认数据目录（即 `C:\data\db` 或 `/data/db`）和默认端口 `27017`，并在该端口监听套接字连接。


  在启动 `mongod` 进程之前，确保数据目录存在并且你对该目录具有写权限非常重要。


  如果目录不存在或你对该目录没有写权限，此进程的启动将失败。如果默认端口 `27017` 不可用，服务器将无法启动。


  `mongod` 还有一个 `HTTP` 服务器，它监听比默认端口高 `1000` 的端口。因此，如果你使用默认端口 `27017` 启动 `mongod`，则
  `HTTP` 服务器将位于端口 `28017`，并可通过 URL `http://localhost:28017` 访问。这个基本的 `HTTP` 服务器提供有关数据库的管理信息。


  ### 7.1.2 mongo


  `mongo` 为开发者提供了一个交互式 `JavaScript` 接口，用于直接在数据库上测试查询和操作，并为系统管理员管理数据库。所有这些都通过命令行完成。当启动
  `mongo` shell 时，它将连接到名为 `test` 的默认数据库。此数据库连接值被分配给全局变量 `db`。


  作为开发者或管理员，你需要在第一次连接后将数据库从 `test` 更改为你的数据库。你可以通过使用 `<databasename>.` 来实现这一点。


  ### 7.1.3 mongos


  `mongos` 用于 `MongoDB` 分片。它充当路由服务，处理来自应用层的查询，并确定请求的数据在分片集群中的位置。


  我们将在分片部分更详细地讨论 `mongos`。现在，你可以将 `mongos` 视为将查询路由到持有数据的正确服务器的进程。




  ## 7.2 MongoDB 工具


  除了核心服务外，MongoDB 安装包还附带多种可用的工具：


  *   `mongodump`：此工具是有效备份策略的一部分。它创建数据库内容的二进制导出。

  *   `mongorestore`：使用 `mongorestore` 工具，将由 `mongodump` 工具创建的二进制数据库转储导入到新的或现有的数据库中。

  *   `bsondump`：此工具将 BSON 文件转换为人类可读的格式，如 JSON 和 CSV。例如，此工具可用于读取 `mongodump` 生成的输出文件。

  *   `mongoimport`, `mongoexport`：`mongoimport` 提供了一种将 [JSON](http://docs.mongodb.org/manual/reference/glossary/#term-json)、[CSV](http://docs.mongodb.org/manual/reference/glossary/#term-csv)
  或 [TSV](http://docs.mongodb.org/manual/reference/glossary/#term-tsv) 格式的数据导入到 `mongod`
  实例的方法。`mongoexport` 提供了一种将数据从 `mongod` 实例导出为 JSON、CSV 或 TSV 格式的方法。

  *   `mongostat`, `mongotop`, `mongosniff`：这些工具提供与 `mongod` 实例当前操作相关的诊断信息。


  ## 7.3 独立部署


  独立部署用于开发目的；它不确保任何数据冗余，也不确保在故障情况下的恢复。因此不建议在生产环境中使用。独立部署包含以下组件：一个单一的 `mongod` 和一个连接到该
  `mongod` 的客户端，如图 7-1 所示。


  ![A332296_1_En_7_Fig1_HTML.jpg](img/A332296_1_En_7_Fig1_HTML.jpg)

  图 7-1. 独立部署


  MongoDB 使用分片和复制，通过分发和复制数据来提供高可用性系统。在接下来的章节中，您将了解分片和复制。之后，您将了解推荐的生产部署架构。


  ## 7.4 复制


  在独立部署中，如果 `mongod` 不可用，您将面临丢失所有数据的风险，这在生产环境中是不可接受的。复制用于防止此类数据丢失。


  复制通过在不同节点上复制数据来提供数据冗余，从而在节点故障时保护数据。复制在 MongoDB 部署中提供高可用性。


  复制还简化了某些管理任务，例如可以将备份等常规任务卸载到副本，从而释放主副本以处理重要的应用程序请求。


  在某些情况下，它还可以通过使客户端能够从数据的不同副本来读取，从而帮助扩展读取能力。


  在本节中，您将学习复制在 MongoDB 中的工作原理及其各种组件。MongoDB 支持两种类型的复制：传统的主/从复制和副本集。


  ### 7.4.1 主/从复制


  在 MongoDB 中，传统的主/从复制是可用的，但仅建议用于超过 50 个节点的复制。首选的复制方法是副本集，我们稍后会解释。在这种类型的复制中，有一个主节点和多个从节点，它们从主节点复制数据。这种复制方式的唯一优点是集群中从节点的数量没有限制。然而，成千上万的从节点会使主节点负担过重，因此在实际场景中，最好拥有少于一打的从节点。此外，这种类型的复制不会自动进行故障转移，并且提供的冗余较少。


  在基本的主/从设置中，您有两种类型的 `mongod` 实例：一个实例处于主模式，其余处于从模式，如图 7-2 所示。由于从节点是从主节点复制数据，所有从节点都需要知道主节点的地址。


  ![A332296_1_En_7_Fig2_HTML.jpg](img/A332296_1_En_7_Fig2_HTML.jpg)

  图 7-2. 主/从复制


  主节点维护一个固定集合 (`oplog`)，该集合存储对数据库进行的逻辑写入的有序历史记录。


  从节点使用此 `oplog` 集合复制数据。由于 `oplog` 是一个固定集合，如果从节点的状态远远落后于主节点的状态，从节点可能会失去同步。在这种情况下，复制将停止，需要人工干预才能重新建立复制。


  从节点失去同步主要有两个原因：


  *   从节点关闭或停止，并在稍后重新启动。在此期间，`oplog` 可能已删除需要应用于从节点的操作日志。

  *   从节点执行来自主节点的更新的速度较慢。


  ### 7.4.2 副本集


  副本集是传统主从复制的一种复杂形式，是 MongoDB 部署中推荐的方法。


  副本集基本上是一种主从复制类型，但它们提供自动故障转移。副本集有一个主节点，在副本集上下文中称为 `primary`，多个从节点，称为 `secondary`；但是，与主从复制不同，副本集中没有固定节点是
  `primary`。


  如果副本集中的主节点发生故障，会自动将其中一个从节点提升为主节点。客户端开始连接到新的主节点，数据和应用程序都将保持可用。在副本集 中，此故障转移以自动化方式发生。我们稍后将详细解释此过程如何发生。


  主节点通过选举机制选出。如果主节点发生故障，将选出的节点将被选为主节点。


  图 7-3 展示了双成员副本集故障转移的过程。让我们讨论一下双成员副本集在故障转移期间发生的各个步骤。


  1.  主节点宕机，从节点被提升为主节点。

  2.  原主节点恢复，它充当从节点，并成为次级节点。


  ![A332296_1_En_7_Fig3_HTML.jpg](img/A332296_1_En_7_Fig3_HTML.jpg)

  图 7-3. 双成员副本集故障转移


  需要注意的要点是：


  *   副本集是 `mongod` 的集群，它们之间进行复制并确保自动故障转移。

  *   在副本集中，一个 `mongod` 将是主成员，其他将是次级成员。

  *   主成员由副本集的成员选举产生。所有写入都定向到主成员，而次级成员使用 `oplog` 异步地从主成员复制。

  *   次级成员的数据集反映了主成员的数据集，使其能够在当前主节点不可用时被提升为主节点。


  副本集复制对成员数量有限制。在 3.0 版本之前，限制是 12 个成员，但在 3.0 版本中已更改为 50 个。因此，现在副本集复制最多只能有 50 个成员，并且在任何给定时间点，在一个
  50 个成员的副本集中，只有 7 个可以参与投票。我们将详细解释副本集中的投票概念。


  从 3.0 版本开始，副本集成员可以使用不同的存储引擎。例如，次级成员可能使用 `WiredTiger` 存储引擎，而主成员可能使用 `MMAPv1` 引擎。在接下来的章节中，您将了解
  MongoDB 提供的不同存储引擎。




  #### 7.4.2.1 主节点与副节点


  在深入了解副本集的功能之前，我们先看看副本集可以包含的成员类型。成员主要有两种类型：主节点（primary members）和副节点（secondary members）。


  *   **主节点**：一个副本集只能有一个主节点，由副本集中的投票节点选举产生。任何优先级（priority）设置为 1 的节点都有资格被选为主节点。客户端的所有写操作都会被定向到主节点，然后复制到副节点。

  *   **副节点**：普通的副节点保存数据的副本。副节点可以参与投票，并且在当前主节点故障时，也有资格被提升为主节点。


  除此之外，副本集还可以拥有其他类型的副节点。


  #### 7.4.2.2 副节点的类型


  **优先级 0 成员** 是维护主节点数据副本但永远不会在故障转移中成为主节点的副节点。除此之外，它们的功能与普通副节点相同，可以参与投票并可以接受读请求。优先级
  0 成员通过将其 `priority` 设置为 0 来创建。


  这类成员在以下情况下特别有用：


  *   它们可以作为冷备（cold standby）。

  *   在硬件配置或地理分布不同的副本集中，这种配置确保只有符合条件的成员才能被选为主节点。

  *   在跨越多个数据中心、存在网络分区的副本集中，这种配置有助于确保主数据中心拥有合格的主节点。这用于确保故障转移快速完成。


  **隐藏成员** 是从客户端应用中隐藏的优先级为 0 的成员。像优先级 0 成员一样，该成员也维护主节点数据的副本，不能成为主节点，并可以参与投票。但与优先级
  0 成员不同，它不能服务任何读请求或接收除复制所需之外的任何流量。可以通过将 `hidden` 属性设置为 `true` 来将节点设置为隐藏成员。在副本集中，这些成员可以专门用于报告需求或备份。


  **延迟成员** 是从主节点的 `oplog` 复制数据时存在延迟的副节点。这有助于从人为错误中恢复，例如意外删除的数据库或由不成功的应用程序升级引起的错误。


  在决定延迟时间时，请考虑您的维护窗口大小和 `oplog` 的大小。延迟时间应大于或等于维护窗口，并且 `oplog` 的大小应设置得足够大，以确保在复制过程中不会丢失任何操作。


  请注意，由于延迟成员的数据不是最新的，因此应将其 `priority` 设置为 0，使其无法成为主节点。此外，`hidden` 属性也应设置为 `true`，以避免任何读请求。


  **仲裁节点** 是不保存主节点数据副本的副节点，因此它们永远不能成为主节点。它们仅用作参与[投票](http://docs.mongodb.org/manual/core/replication/#replica-set-elections)的成员。这使得副本集能够拥有奇数个节点，而不会产生数据复制带来的复制成本。


  **无投票权成员** 持有主节点的数据副本，它们可以接受客户端的读操作，也可以成为主节点，但它们在选举中不能投票。


  可以通过将成员的 `votes` 设置为 0 来禁用其投票能力。默认情况下，每个成员都有一票。假设你有一个包含七个成员的副本集。在 `mongo` shell
  中使用以下命令，将第四、第五和第六个成员的投票数设置为 0：


  ```

  cfg_1 = rs.conf()

  cfg_1.members[3].votes = 0

  cfg_1.members[4].votes = 0

  cfg_1.members[5].votes = 0

  rs.reconfig(cfg_1)

  ```


  尽管此设置允许第四、第五和第六个成员被选为主节点，但在投票时，它们的投票不会被计入。它们成为无投票权成员，这意味着它们可以参选，但自己不能投票。


  如何在本章后面部分介绍成员的配置。


  #### 7.4.2.3 选举


  在本节中，你将了解选举主节点的过程。为了被选中，一个服务器不仅需要获得多数票，还需要获得总票数的多数票。


  假设有 X 台服务器，每台服务器有 1 票，那么一台服务器要成为主节点，至少需要 `[(X/2) + 1]` 票。


  如果一台服务器获得了所需的票数或更多，它就会成为主节点。


  故障的主节点仍然是副本集的成员；当它恢复后，在再次获得多数票之前，它将充当副节点。


  这种投票系统的复杂之处在于，你不能只让两个节点分别作为主节点和副节点。在这种情况下，总共有两票，要成为主节点，一个节点需要获得多数票，在这种情况下就是两票。如果其中一台服务器宕机，另一台服务器最终将获得两票中的一票，永远无法晋升为主节点，因此它将保持副节点状态。


  在发生网络分区的情况下，主节点将失去多数票，因为它只有一票，将被降级为副节点；而充当副节点的节点在缺乏多数票的情况下也将保持副节点状态。最终，在两台服务器重新连接之前，你将得到两个副节点。


  副本集有多种方法来避免这种情况。最简单的方法是使用仲裁节点来帮助解决此类冲突。仲裁节点非常轻量级，只是一个投票者，因此它甚至可以运行在其中一台服务器上。


  现在让我们看看使用仲裁节点后，上述场景将如何变化。首先考虑网络分区场景。如果你有一个主节点、一个副节点和一个仲裁节点，每个节点有一票，总共三票。如果发生网络分区，主节点和仲裁节点在一个数据中心，副节点在另一个数据中心，主节点将保持主节点状态，因为它仍然拥有多数票。


  如果主节点发生故障且没有网络分区，副节点可以被提升为主节点，因为它将获得两票（副节点 + 仲裁节点）。


  这种三服务器设置提供了一个健壮的故障转移部署。



  '
- "# MongoDB 选举过程详解\n\n本节将详细解释选举是如何发生的。\n\n假设你有一个包含以下三个成员的副本集：`A1`、`B1` 和 `C1`。每个成员每隔几秒与其他成员交换一次心跳请求。成员会对此类请求响应其当前状态信息。`A1`\
  \ 向 `B1` 和 `C1` 发送心跳请求。`B1` 和 `C1` 响应它们的当前状态信息，例如它们所处的状态（`primary` 或 `secondary`）、当前时钟时间、是否有资格被提升为\
  \ `primary` 等。`A1` 接收到所有这些信息并更新其副本集“地图”，该地图维护着诸如成员状态变更、成员宕机或恢复以及往返时间等信息。\n\n在更新\
  \ `A1` 的地图变化时，它会根据其状态检查几个事项：\n\n*   `A1` 要做的第一件事是运行完整性检查，它将检查对几个问题的回答，例如：`A1` 是否认为自己已经是\
  \ `primary`？另一个成员是否认为它是 `primary`？`A1` 是否没有资格参加选举？如果它无法回答任何基本问题，`A1` 将继续按兵不动；否则，它将进行选举过程：\n\
  \    *   `A1` 向副本集的其他成员（在此例中为 `B1` 和 `C1`）发送消息，说“我打算成为 `primary`。请建议”。\n    *  \
  \ 当 `B1` 和 `C1` 收到消息时，它们将检查其周围的视图。它们将运行一长串完整性检查，例如：是否有其他节点可以成为 `primary`？`A1` 是否拥有最新的数据，或者是否有其他节点拥有最新的数据？如果所有检查看起来都正常，它们会发送一个“继续”消息；但是，如果任何检查失败，则会发送“停止选举”消息。\n\
  \    *   如果任何成员发送“停止选举”回复，选举将被取消，`A1` 保持为 `secondary` 成员。\n    *   如果从所有成员那里都收到了“继续”，`A1`\
  \ 将进入选举过程的最后阶段。\n*   在第二（最后）阶段：\n    *   `A1` 重新发送声明其候选人身份的消息给其余成员。\n    *   成员\
  \ `B1` 和 `C1` 进行最终检查，以确保所有答案仍然像以前一样成立。\n    *   如果是，`A1` 被允许获取其选举锁，这将阻止其投票能力 30\
  \ 秒，并发回一票。\n    *   如果任何检查未能成立，则发送否决票。\n    *   如果收到任何否决票，选举停止。\n    *   如果无人否决且\
  \ `A1` 获得多数票，它就成为 `primary`。\n\n*   如果 `A1` 是 `secondary` 且地图没有改变，它将偶尔检查是否应该选举自己。\n\
  \n*   **降级**：当 `A1` 经历降级时会存在问题。默认情况下，在 MongoDB 中，写操作是“发射后不管”的（即客户端发出写操作但不等待响应）。如果应用程序在\
  \ `primary` 降级时执行默认写操作，它将永远无法意识到写操作实际上没有发生，并可能最终丢失数据。因此，建议使用安全写操作。在这种情况下，当 `primary`\
  \ 降级时，它会关闭所有客户端连接，这将导致客户端出现套接字错误。客户端库然后需要重新检查新的 `primary` 是谁，从而避免丢失其写操作数据。\n\n*\
  \   如果 `A1` 是 `primary` 并且其中一个成员宕机，那么它将确保自己仍然能够连接到副本集的大多数成员。如果无法做到，它将自己降级到 `secondary`\
  \ 状态。\n\n选举受到优先级设置的影响。优先级为 `0` 的成员永远不能成为 `primary`。\n\n#### 7.4.2.4 数据复制过程\n\n让我们看看数据复制是如何工作的。副本集的成员持续复制数据。每个成员，包括\
  \ `primary` 成员，都维护一个 `oplog`。`oplog` 是一个 capped collection（固定集合），成员在其中维护在数据集上执行的所有操作的记录。\n\
  \n`secondary` 成员复制 `primary` 成员的 `oplog`，并以异步方式应用所有操作。\n\n#### Oplog\n\nOplog 代表操作日志。`oplog`\
  \ 是一个 capped collection，其中记录了所有修改数据的操作。\n\n`oplog` 维护在一个特殊的数据库中，即 `local` 数据库的 `oplog.$main`\
  \ 集合中。每个操作都维护为一个文档，其中每个文档对应在主服务器上执行的一个操作。该文档包含各种键，包括以下键：\n\n*   `ts`：存储操作执行时的时间戳。它是一个内部类型，由一个\
  \ 4 字节的时间戳和一个 4 字节的递增计数器组成。\n*   `op`：存储有关所执行操作类型的信息。该值存储为 1 字节代码（例如，对于插入操作，它将存储为“I”）。\n\
  *   `ns`：此键存储执行操作的集合命名空间。\n*   `o`：此键指定执行的操作。在插入的情况下，这将存储要插入的文档。\n\n只有更改数据的操作才会保留在\
  \ `oplog` 中，因为它是确保 `secondary` 节点数据与 `primary` 节点数据同步的机制。\n\n存储在 `oplog` 中的操作会被转换，以保持它们的幂等性，这意味着即使它在\
  \ `secondary` 上应用多次，`secondary` 节点的数据也将保持一致。由于 `oplog` 是一个 capped collection，随着每次新操作的添加，最旧的操作会自动移出。这样做是为了确保其增长不会超过预设的界限，即\
  \ `oplog` 的大小。\n\n根据操作系统的不同，每当副本集成员首次启动时，MongoDB 都会创建一个默认大小的 `oplog`。\n\n默认情况下，在\
  \ MongoDB 中，Windows 和 64 位 Linux 实例上，可用的空闲空间或 5% 用于 `oplog`。如果大小低于 1GB，则 MongoDB\
  \ 会分配 1GB 的空间。\n\n虽然默认大小在大多数情况下已足够，但你可以在启动服务器时使用 `–oplogsize` 选项来指定以 MB 为单位的 `oplog`\
  \ 大小。\n\n如果你有以下工作负载，可能需要重新考虑 `oplog` 大小：\n\n*   同时更新多个文档：由于操作需要被转换为幂等操作，此场景最终可能需要大量的\
  \ `oplog` 空间。\n*   删除和插入以相同的速率发生，涉及相同数量的数据：在此场景中，虽然数据库大小不会增加，但将操作转换为幂等操作可能导致更大的\
  \ `oplog`。\n*   大量的原地更新：虽然这些更新不会改变数据库大小，但将更新记录为 `oplog` 中的幂等操作可能导致更大的 `oplog`。\n\
  \n#### 初始同步与复制\n\n初始同步在成员处于以下两种情况之一时执行：\n\n1.  节点首次启动（即它是一个新节点且没有数据）。\n2.  节点变得陈旧，其中\
  \ `primary` 已覆盖了 `oplog` 且该节点尚未复制数据。在这种情况下，数据将被移除。\n\n在这两种情况下，初始同步涉及以下步骤：\n\n1.\
  \  首先，克隆所有数据库。\n2.  使用源节点的 `oplog`，将更改应用到其数据集。\n3.  最后，在所有集合上构建索引。\n\n初始同步之后，副本集成员持续复制更改以保持最新状态。\n\
  \n大多数同步发生在 `primary` 上，但可以启用链式复制，其中同步仅从 `secondary` 进行（即，同步目标根据其他成员复制的 `ping` 时间和状态而改变）。\n\
  \n\n#### 副本集中的同步与故障转移\n\n#### 同步 – 正常操作\n\n在正常操作中， secondary 节点会选择一个成员来同步其数据，然后从所选源的\
  \ `oplog` 集合 (`local.oplog.rs`) 中拉取操作记录。\n\n一旦获取到操作（op）， secondary 节点会执行以下步骤：\n\n\
  它首先将该操作应用到自己的数据副本上。然后，将该操作写入其本地的 `oplog`。操作一旦写入 `oplog`，它就会请求下一个操作。\n\n假设它在步骤 1\
  \ 和步骤 2 之间崩溃，然后又恢复了。在这种情况下，它会假定该操作尚未执行，并将重新应用它。\n\n由于 `oplog` 中的操作是幂等的，同一个操作可以应用任意多次，每次得到的结果文档都是相同的。\n\
  \n*   假设你有以下文档 `{I:11}`\n*   在主节点上对其执行了一个递增操作，例如 `{$inc:{I:1}}`\n*   在这种情况下，以下内容将被存储在主节点的\
  \ `oplog` 中：`{I:12}`。\n\n这将被 secondary 节点复制。因此，即使日志被应用多次，该值也保持不变。\n\n#### 启动过程\n\
  \n当一个节点启动时，它会检查其本地集合以找出 `lastOpTimeWritten`。这是应用到该 secondary 节点的最新操作的时间。\n\n以下 shell\
  \ 辅助函数可用于在 shell 中查找最新的操作：\n\n```\n> rs.debug.getLastOpWritten()\n```\n\n输出返回一个名为\
  \ `ts` 的字段，它描述了最后一次操作的时间。\n\n如果一个成员启动并找到了 `ts` 条目，它就会通过选择一个同步目标来开始，并像正常操作一样开始同步。但是，如果没有找到条目，该节点将开始初始同步过程。\n\
  \n#### 从谁同步？\n\n在本节中，您将了解如何选择同步源。截至 2.0 版本，服务器会根据平均 ping 时间自动从“最近”的节点同步。\n\n当您启动一个新节点时，它会向所有节点发送心跳并监控响应时间。根据接收到的数据，然后使用以下算法决定要同步的成员：\n\
  \n```\n对每个健康成员循环执行：\n    如果状态是 Primary\n        将该成员加入可能的同步目标集合\n    如果该成员的 lastOpTimeWritten\
  \ 大于本地的 lastOpTimeWritten\n        将该成员加入可能的同步目标集合\n设置 sync_from = MIN (到同步目标集合成员的\
  \ PING TIME)\n```\n\n注意：“健康成员”可以被认为是“正常”的主节点或 secondary 节点。\n\n在 2.0 版本中，延迟节点是否被包含在“健康”节点中曾有争议。从\
  \ 2.2 版本开始，延迟节点和隐藏节点被排除在“健康”节点之外。\n\n运行以下命令将显示被选为同步源的服务器：\n\n```\ndb.adminCommand({replSetGetStatus:1})\n\
  ```\n\n输出字段 `syncingTo` 仅存在于 secondary 节点上，提供了它正在从中同步的节点信息。\n\n#### 使写入操作与链式从节点协同工作\n\
  \n您已经看到，上述选择同步源的算法意味着从节点链式同步是半自动的。当一个服务器启动时，它很可能会选择同一数据中心内的服务器进行同步，从而减少 WAN 流量。\n\
  \n然而，这永远不会导致循环，因为节点只会从 `lastOpTimeWritten` 值比自己新的 secondary 节点同步。您永远不会陷入 N1 正在从\
  \ N2 同步，而 N2 又在从 N1 同步的情况。它总是要么 N1 从 N2 同步，要么 N2 从 N1 同步。\n\n在本节中，您将看到 `w`（写入操作）如何与从节点链式同步协同工作。如果\
  \ N1 正在从 N2 同步，而 N2 又在从 N3 同步，在这种情况下，N3 如何知道 N1 同步到了哪一点。\n\n当 N1 开始从 N2 同步时，会发送一个特殊的“握手”消息，通知\
  \ N2 它将从其 `oplog` 同步。由于 N2 不是主节点，它会将该消息转发给它正在从中同步的节点（即，它假装成 N1 打开一个到 N3 的连接）。完成上述步骤后，N2\
  \ 与 N3 之间建立了两个连接：一个用于它自己，另一个用于 N1。\n\n每当 N1 向 N2 发出操作请求时，N2 会从其 `oplog` 中发送该操作，并在\
  \ N1 的链路上向 N3 转发一个虚拟请求，如图 7-4 所示。\n\n![A332296_1_En_7_Fig4_HTML.jpg](img/A332296_1_En_7_Fig4_HTML.jpg)\n\
  图 7-4. 通过链式从节点进行写入\n\n尽管这最小化了网络流量，但它增加了写入操作到达所有成员所需的绝对时间。\n\n#### 故障转移\n\n在本节中，您将了解如何处理副本集中的主节点和\
  \ secondary 节点故障转移。副本集的所有成员都相互连接。如图 7-5 所示，它们彼此交换心跳消息。\n\n![A332296_1_En_7_Fig5_HTML.jpg](img/A332296_1_En_7_Fig5_HTML.jpg)\n\
  图 7-5. 心跳消息交换\n\n因此，一个心跳丢失的节点被视为已崩溃。\n\n#### 如果节点是 Secondary 节点\n\n如果该节点是 secondary\
  \ 节点，它将被从副本集的成员资格中移除。未来，当它恢复时，可以重新加入。一旦重新加入，它需要更新最新的更改。\n\n如果宕机时间较短，它会连接到主节点并赶上最新的更新。但是，如果宕机时间较长，该\
  \ secondary 服务器将需要与主节点重新同步，删除其所有数据，并像新服务器一样执行初始同步。\n\n#### 如果节点是 Primary 节点\n\n\
  如果该节点是主节点，在这种情况下，如果原始副本集的大多数成员能够相互连接，这些节点将根据副本集的自动故障转移能力选举出一个新的主节点。\n\n任何无法联系到主节点的节点都将发起选举过程。\n\
  \n新的主节点由副本集中的大多数节点选举产生。仲裁器可用于在诸如网络分区将参与节点分成两半且无法达成多数的情况下打破平局。\n\n优先级最高的节点将成为新的主节点。如果您有多个优先级相同的节点，则可以使用数据的新鲜度来打破平局。\n\
  \n主节点使用心跳来跟踪有多少节点对它可见。如果可见节点数量低于多数，主节点会自动回退到 secondary 状态。这种情况可防止主节点在网络分区隔离时继续运行。\n\
  \n\n\n#### 7.4.2.6 回滚\n\n在主节点变更的场景中，新主节点上的数据被假定为系统中最新的数据。当旧的主节点重新加入时，其上发生的任何操作都将被回滚。然后，它将与新主节点进行同步。\n\
  \n回滚操作会撤销所有未在副本集中复制的写操作。这样做是为了维护副本集中数据库的一致性。\n\n当连接到新主节点时，所有节点都会经历一个重新同步的过程以确保回滚完成。节点会查找在新主节点上不存在的操作，然后查询新主节点以返回受这些操作影响的文档的最新副本。节点处于重新同步过程中，被称为正在恢复；在此过程完成之前，它们不具备参与主节点选举的资格。\n\
  \n这种情况很少发生，如果发生，通常是由于存在复制滞后的网络分区，导致从节点无法跟上旧主节点上的操作吞吐量。\n\n需要注意的是，如果写操作在主节点下台之前已经复制到其他成员，并且这些成员可以被副本集中的大多数节点访问，则不会发生回滚。\n\
  \n回滚数据会被写入一个[BSON](http://docs.mongodb.org/manual/reference/glossary/#term-bson)文件，文件名格式如`<database>.<collection>.<timestamp>.bson`，存放在数据库的[`dbpath`](http://docs.mongodb.org/manual/reference/configuration-options/#dbpath%23dbpath)目录中。\n\
  \n管理员可以决定忽略或应用回滚数据。应用回滚数据只能在所有节点与新主节点同步并回滚到一致状态后开始。\n\n可以使用`Bsondump`读取回滚文件的内容，然后需要使用`mongorestore`手动应用到新主节点上。\n\
  \n对于 MongoDB，没有自动处理回滚情况的方法。因此，需要手动干预来应用回滚数据。在应用回滚时，至关重要的是确保这些数据被复制到所有或至少部分成员中，以便在发生任何故障转移时可以避免回滚。\n\
  \n#### 7.4.2.7 一致性\n\n你已经看到副本集成员通过读取`oplog`不断在彼此之间复制数据。数据的一致性是如何维护的呢？在本节中，你将了解 MongoDB\
  \ 如何确保你始终能访问到一致的数据。\n\n在 MongoDB 中，虽然读操作可以被路由到从节点，但写操作总是被路由到主节点，这消除了两个节点同时尝试更新同一数据集的情况。主节点上的数据集始终是一致的。\n\
  \n如果读请求被路由到主节点，它将始终看到最新的更改，这意味着读操作总是与最后的写操作保持一致。\n\n但是，如果应用程序更改了读取偏好以从从节点读取，则用户有可能看不到最新的更改或看到之前的状态。这是因为写操作在从节点上是异步复制的。\n\
  \n这种行为被描述为最终一致性，这意味着尽管从节点的状态与主节点状态不一致，但随着时间的推移，它最终会变得一致。\n\n没有办法保证从从节点的读取是一致的，除非通过发出写关注点来确保写操作在所有成员上成功后，操作才被实际标记为成功。我们稍后将讨论写关注点。\n\
  \n#### 7.4.2.8 可能的复制部署架构\n\n你选择部署副本集的架构会影响其能力和容量。在本节中，你将了解在决定架构时需要意识到的几个策略。我们还将讨论部署架构。\n\
  \n**奇数个成员**：这样做是为了确保选举主节点时不会出现平票。如果节点数是偶数，则可以使用一个仲裁器来确保参与选举的总节点数为奇数，如图 7-6 所示。\n\
  \n![A332296_1_En_7_Fig6_HTML.jpg](img/A332296_1_En_7_Fig6_HTML.jpg)\n\n**图 7-6.\
  \ 包含主节点、从节点和仲裁器的成员副本集**\n\n副本集容错能力是指即使有指定数量的成员宕机，副本集仍有足够成员可以选举出主节点。表 7-1 说明了副本集中成员数量与其容错能力之间的关系。在决定成员数量时应考虑容错能力。\n\
  \n**表 7-1. 副本集容错能力**\n\n| 成员数量 | 选举主节点所需的多数 | 容错能力 |\n| :--- | :--- | :--- |\n|\
  \ 3 | 2 | 1 |\n| 4 | 3 | 1 |\n| 5 | 3 | 2 |\n| 6 | 4 | 2 |\n\n如果应用程序有特定的专用需求，例如报告或备份，则可以考虑将延迟成员或隐藏成员作为副本集的一部分，如图\
  \ 7-7 所示。\n\n![A332296_1_En_7_Fig7_HTML.jpg](img/A332296_1_En_7_Fig7_HTML.jpg)\n\
  \n**图 7-7. 包含主节点、从节点和隐藏成员的成员副本集**\n\n如果应用程序读操作密集，读请求可以分布在多个从节点上。随着需求增加，可以添加更多节点以增加数据副本；这对提高读取吞吐量有积极影响。\n\
  \n成员应进行地理分布，以应对主数据中心故障。如图 7-8 所示，那些位于主数据中心之外不同地理位置的成员，其优先级可以设置为 0，这样它们就不能被选为主节点，只能作为备用节点。\n\
  \n![A332296_1_En_7_Fig8_HTML.jpg](img/A332296_1_En_7_Fig8_HTML.jpg)\n\n**图 7-8.\
  \ 包含主节点、从节点和一个跨数据中心分布的优先级为 0 成员的成员副本集**\n\n当副本集成员分布在不同数据中心时，网络分区可能导致数据中心之间无法通信。为了确保在网络分区情况下仍能形成多数，它会将大多数成员保持在一个位置。\n\
  \n\n#### 7.4.2.9 扩展读取操作\n\n尽管从节点的主要目的是确保在主节点发生故障时数据仍然可用，但它们还有其他有效的使用场景。它们可以被专门用于执行备份操作、数据处理任务，或者用于扩展读取操作。扩展读取操作的一种方式是向从节点发出读取查询；这样做可以减轻主节点上的负载。\n\
  \n当使用从节点来扩展读取操作时，你需要考虑的一个重要点是：在 MongoDB 中，复制是异步的。这意味着，如果在主节点数据上执行了任何写入或更新操作，从节点的数据将暂时过时。如果所讨论的应用程序是读取密集型的，并且通过网络访问，且不需要最新的数据，那么可以使用从节点来扩展读取，以提供良好的读取吞吐量。尽管默认情况下读取请求会被路由到主节点，但可以通过指定**读取偏好**将请求分配到从节点上。图\
  \ 7-9 描绘了默认的读取偏好。\n\n![A332296_1_En_7_Fig9_HTML.jpg](img/A332296_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9. 默认读取偏好\n\n以下是理想的应用场景，在这些场景中，将读取路由到从节点可以显著提高读取吞吐量，并有助于降低延迟：\n\n地理分布的应用程序：在这种情况下，你可以拥有一个跨地理区域分布的副本集。读取偏好应设置为从**最近的**从节点读取。这有助于减少通过网络读取时引起的延迟，从而提高读取性能。参见图\
  \ 7-10。\n\n![A332296_1_En_7_Fig10_HTML.jpg](img/A332296_1_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10. 读取偏好 – 最近节点\n\n如果应用程序总是需要最新的数据，它会使用`primaryPreferred`选项。在正常情况下，它总是从主节点读取，但在紧急情况下（如主节点不可用）会将读取路由到从节点。这在发生故障转移时很有用。参见图\
  \ 7-11。\n\n![A332296_1_En_7_Fig11_HTML.jpg](img/A332296_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11. 读取偏好 – primaryPreferred\n\n如果你有一个支持两种类型操作的应用程序，第一种操作是主要的负载，涉及读取并对数据进行某些处理，而第二种操作是使用数据生成报告。在这种情况下，你可以将报告读取操作定向到从节点。\n\
  \nMongoDB 支持以下读取偏好模式：\n\n*   `primary`：这是默认模式。所有读取请求都被路由到主节点。\n*   `primaryPreferred`：在正常情况下从主节点读取，但在紧急情况（如主节点不可用）下，从从节点读取。\n\
  *   `secondary`：从从节点成员读取。\n*   `secondaryPreferred`：从从节点成员读取。如果从节点不可用，则从主节点读取。\n\
  *   `nearest`：从最近的副本集成员读取。\n\n除了扩展读取之外，使用从节点的第二个理想用例是卸载密集的处理、聚合和管理任务，以避免降低主节点的性能。可以在从节点上执行阻塞操作，而不会影响主节点的性能。\n\
  \n#### 7.4.2.10 应用程序写关注点\n\n当客户端应用程序与 MongoDB 交互时，它通常不知道数据库是独立部署还是部署为副本集。然而，在处理副本集时，客户端应该了解**写关注点**和**读关注点**。\n\
  \n由于副本集会复制数据并将其存储在多个节点上，这两个关注点使客户端应用程序能够在执行读写操作时灵活地在节点间强制数据一致性。\n\n使用写关注点使应用程序能够从\
  \ MongoDB 获取成功或失败的响应。\n\n在 MongoDB 的副本集部署中使用时，写关注点会从服务器向应用程序发送确认，表明写入已在主节点成功。然而，可以对此进行配置，使得写关注点仅在写入被复制到所有维护数据的节点后才返回成功。\n\
  \n在实际场景中，这并不可行，因为它会降低写入性能。理想情况下，客户端可以使用写关注点确保数据在主节点之外，还被复制到至少一个其他节点，这样即使主节点下台，数据也不会丢失。\n\
  \n写关注点返回一个指示错误或无错误的对象。\n\n`w` 选项确保写入已被复制到指定数量的成员。可以指定一个数字或`majority`（多数）作为`w`选项的值。\n\
  \n如果指定了一个数字，写入在复制到该数量的节点后才会返回成功。如果指定了`majority`，写入在复制到多数成员后才会返回结果。\n\n图 7-12 展示了使用`w:\
  \ 2`时写入如何发生。\n\n![A332296_1_En_7_Fig12_HTML.jpg](img/A332296_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12. writeConcern\n\n如果在指定数字时，该数字大于实际持有数据的节点数，命令将一直等待，直到有足够多的成员可用。为了避免这种无限期的等待时间，应同时使用`w`和`wtimeout`，这将确保只等待指定的时间段，如果写入在该时间内未成功，则会超时。\n\
  \n#### 写关注点下写入如何发生\n\n为了确保写入的数据至少存在于两个成员上，可以发出以下命令：\n\n```\n>db.testprod.insert({i:”test”,\
  \ q: 50, t: “B”}, {writeConcern: {w:2}})\n```\n\n为了理解此命令将如何执行，假设你有两个成员，一个名为 primary，另一个名为\
  \ secondary，并且它正在从 primary 同步其数据。\n\n但是，primary 如何知道 secondary 同步到了哪个点？由于 secondary\
  \ 会查询 primary 的 oplog 以应用操作结果，如果 secondary 请求一个在时间`t`写入的操作，对 primary 而言，这意味着 secondary\
  \ 已经复制了所有在`t`之前写入的操作。\n\n以下是写关注点采取的步骤：\n\n1.  写操作被定向到主节点。\n2.  该操作被写入主节点的 oplog，其中`ts`表示操作时间。\n\
  3.  发出了一个`w: 2`，因此写操作需要在被标记为成功之前被写入另一个服务器。\n4.  从节点查询主节点的 oplog 以获取该操作，并应用该操作。\n\
  5.  接下来，从节点向主节点发送请求，请求`ts`大于`t`的操作。\n6.  此时，主节点发送更新，表明直到`t`的操作已被从节点应用，因为它正在请求`{ts:\
  \ {$gt: t}}`的操作。\n7.  `writeConcern`发现写入已在主节点和从节点上发生，满足了`w: 2`的条件，于是命令返回成功。\n\n\n\
  ### 7.4.3 实现高级副本集集群\n\n在了解了副本集的架构和内部工作原理之后，我们现在将重点关注副本集的管理和使用。你将聚焦于以下方面：\n\n设置副本集。\n\
  移除服务器。\n添加服务器。\n添加仲裁者。\n检查状态。\n强制重新选举主节点。\n使用 Web 界面检查副本集的状态。\n\n以下示例假设有一个名为 `testset`\
  \ 的副本集，其配置如表 7-2 所示。\n\n表 7-2. 副本集配置\n\n| 成员 | 守护进程 | 主机:端口 | 数据文件路径 |\n| --- |\
  \ --- | --- | --- |\n| Active_Member_1 | Mongod | [hostname]:27021 | C:\\db1\\active1\\\
  data |\n| Active_Member_2 | Mongod | [hostname]:27022 | C:\\db1\\active2\\data |\n\
  | Passive_Member_1 | Mongod | [hostname]:27023 | C:\\db1\\passive1\\data |\n\n上表中使用的主机名可以通过以下命令查出：\n\
  ```shell\nC:\\>hostname\nANOC9\nC:\\>\n```\n在后续示例中，需要将 `[hostname]` 替换为 `hostname`\
  \ 命令在你的系统上返回的值。在我们的例子中，返回的值是 `ANOC9`，将在以下示例中使用。\n\n在以下实现中使用默认的 (`MMAPv1`) 存储引擎。\n\
  \n#### 7.4.3.1 设置副本集\n\n为了启动并运行副本集，你需要使所有活动成员都启动并运行。\n\n第一步是启动第一个活动成员。打开一个终端窗口并创建\
  \ `data` 目录：\n```shell\nC:\\>mkdir C:\\db1\\active1\\data\nC:\\>\n```\n\n连接到 `mongod`：\n\
  ```shell\nc:\\practicalmongodb\\bin>mongod --dbpath C:\\db1\\active1\\data --port\
  \ 27021 --replSet testset/ANOC9:27021 –rest\n2015-07-13T23:48:40.543-0700 I CONTROL\
  \ ** WARNING: --rest is specified without --httpinterface,\n2015-07-13T23:48:40.543-0700\
  \ I CONTROL ** enabling http interface\n2015-07-13T23:48:40.543-0700 I CONTROL Hotfix\
  \ KB2731284 or later update is installed, no need to zero-out data files\n2015-07-13T23:48:40.563-0700\
  \ I JOURNAL [initandlisten] journal dir=C:\\db1\\active1\\data\\journal\n2015-07-13T23:48:40.564-0700\
  \ I JOURNAL [initandlisten] recover : no journal files present, no recovery needed\n\
  ..................................... port=27021 dbpath=C:\\db1\\active1\\data 64-bit\
  \ host=ANOC9\n2015-07-13T23:48:40.614-0700 I CONTROL [initandlisten] targetMinOS:\
  \ Windows 7/Windows Server 2008 R2\n2015-07-13T23:48:40.615-0700 I CONTROL [initandlisten]\
  \ db version v3.0.4\n```\n\n如你所见，`–replSet` 选项指定了该实例要加入的副本集名称以及该集合中另一成员的名称，在上面的例子中是\
  \ `Active_Member_2`。\n\n尽管你在上面的示例中只指定了一个成员，但可以通过指定逗号分隔的地址来提供多个成员，像这样：\n```shell\n\
  mongod –dbpath C:\\db1\\active1\\data –port 27021 –replset testset/[hostname]:27022,[hostname]:27023\
  \ --rest\n```\n\n下一步，你启动第二个活动成员并在新的终端窗口中为其创建 `data` 目录。\n```shell\nC:\\>mkdir C:\\\
  db1\\active2\\data\nC:\\>\n```\n\n连接到 `mongod`：\n```shell\nc:\\ practicalmongodb\
  \ \\bin>mongod --dbpath C:\\db1\\active2\\data --port 27022 –replSet testset/ANOC9:27021\
  \ –rest\n2015-07-13T00:39:11.599-0700 I CONTROL ** WARNING: --rest is specified\
  \ without --httpinterface,\n2015-07-13T00:39:11.599-0700 I CONTROL ** enabling http\
  \ interface\n2015-07-13T00:39:11.604-0700 I CONTROL Hotfix KB2731284 or later update\
  \ is installed, no need to zero-out data files\n2015-07-13T00:39:11.615-0700 I JOURNAL\
  \ [initandlisten] journal dir=C:\\db1\\active2\\data\\journal\n2015-07-13T00:39:11.615-0700\
  \ I JOURNAL [initandlisten] recover : no journal files present, no recovery needed\n\
  2015-07-13T00:39:11.664-0700 I JOURNAL [durability] Durability thread started\n\
  2015-07-13T00:39:11.664-0700 I JOURNAL [journal writer] Journal writer thread started\
  \ rs.initiate() in the shell -- if that is not already done\n```\n\n最后，你需要启动被动成员。打开一个单独的窗口并为被动成员创建\
  \ `data` 目录。\n```shell\nC:\\>mkdir C:\\db1\\passive1\\data\nC:\\>\n```\n\n连接到 `mongod`：\n\
  ```shell\nc:\\ practicalmongodb \\bin>mongod --dbpath C:\\db1\\passive1\\data --port\
  \ 27023 --replSet testset/ ANOC9:27021 –rest\n2015-07-13T05:11:43.746-0700 I CONTROL\
  \ Hotfix KB2731284 or later update is installed, no need to zero-out data files\n\
  2015-07-13T05:11:43.757-0700 I JOURNAL [initandlisten] journal dir=C:\\db1\\passive1\\\
  data\\journal\n2015-07-13T05:11:43.808-0700 I CONTROL [initandlisten] MongoDB starting\
  \ : pid=620 port=27019 dbpath=C:\\db1\\passive1\\data 64-bit host= ANOC9\n......................................................................................\n\
  2015-07-13T05:11:43.812-0700 I CONTROL [initandlisten] options: { net: { http:\n\
  { RESTInterfaceEnabled: true, enabled: true }, port: 27019 }, replication: { re\n\
  lSet: \"testset/ ANOC9:27017\" }, storage: { dbPath: \"C:\\db1\\passive1\\data\"\
  \ }\n```\n\n在前面的示例中，使用了 `--rest` 选项来在端口 +1000 上激活一个 REST 接口。激活 REST 使你能够使用 Web 界面检查副本集状态。\n\
  \n完成以上步骤后，你就有三台服务器启动并运行，并且它们相互通信；然而，副本集仍未初始化。在下一步中，你将初始化副本集并指示每个成员其职责和角色。\n\n为了初始化副本集，你需要连接到其中一台服务器。在这个例子中，是运行在端口\
  \ `27021` 上的第一台服务器。\n\n打开一个新的命令提示符并连接到第一台服务器的 `mongo` 接口：\n```shell\nC:\\>cd c:\\\
  practicalmongodb\\bin\nc:\\practicalmongodb\\bin>mongo ANOC9 --port 27021\nMongoDB\
  \ shell version: 3.0.4\nconnecting to: ANOC9:27021/test\n>\n```\n\n接下来，切换到 `admin`\
  \ 数据库。\n```shell\n> use admin\nswitched to db admin\n>\n```\n\n接着，设置一个配置数据结构，其中指明了各服务器的角色：\n\
  ```javascript\n>cfg = {\n... _id: 'testset',\n... members: [\n... {_id:0, host:\
  \ 'ANOC9:27021'},\n... {_id:1, host: 'ANOC9:27022'},\n... {_id:2, host: 'ANOC9:27023',\
  \ priority:0}\n... ]\n... }\n{ \"_id\" : \"testset\",\n\"members\" : [\n{\n\"_id\"\
  \ : 0,\n\"host\" : \"ANOC9:27021\"\n},\n..........\n{\n\"_id\" : 2,\n\"host\" :\
  \ \"ANOC9:27023\",\n\"priority\" : 0\n} ]}>\n```\n通过这一步，副本集结构就配置好了。\n\n你在定义被动成员的角色时使用了\
  \ `0` 优先级。这意味着该成员不能被提升为主节点。\n\n下一个命令初始化副本集：\n```javascript\n> rs.initiate(cfg)\n\
  { \"ok\" : 1}\n```\n\n现在让我们查看副本集状态，以验证其是否已正确设置：\n```javascript\ntestset:PRIMARY>\
  \ rs.status()\n{\n\"set\" : \"testset\",\n\"date\" : ISODate(\"2015-07-13T04:32:46.222Z\"\
  )\n\"myState\" : 1,\n\"members\" : [\n{\n\"_id\" : 0,\n...........................\n\
  testset:PRIMARY>\n```\n输出表明一切正常。副本集现已成功配置并初始化。\n\n让我们看看如何确定主节点。为此，连接到任何成员并执行以下命令来验证主节点：\n\
  ```javascript\ntestset:PRIMARY> db.isMaster()\n{\n\"setName\" : \"testset\",\n\"\
  setVersion\" : 1,\n\"ismaster\" : true,\n\"primary\" : \" ANOC9:27021\",\n\"me\"\
  \ : \"ANOC9:27021\",\n...........................................\n\"localTime\"\
  \ : ISODate(\"2015-07-13T04:36:52.365Z\"),\n.........................................................\n\
  \"ok\" : 1\n}testset:PRIMARY>\n```\n\n\n\n### 7.4.3 MongoDB 副本集\n\n#### 7.4.3.2\
  \ 移除服务器\n\n在此示例中，你将从副本集中移除一个活跃的次成员。首先，连接到该次成员的 mongo 实例。打开一个新的命令提示符，如下所示：\n\n```\n\
  C:\\>cd c:\\practicalmongodb\\bin\nc:\\practicalmongodb\\bin>mongo ANOC9 --port\
  \ 27022\nMongoDB shell version: 3.0.4\nconnecting to: 127.0.0.1:27022/ANOC9\ntestset:SECONDARY>\n\
  ```\n\n发出以下命令以关闭该实例：\n\n```\ntestset:SECONDARY> use admin\nswitched to db admin\n\
  testset:SECONDARY> db.shutdownServer()\n2015-07-13T21:48:59.009-0700 I NETWORK DBClientCursor::init\
  \ call() failed server should be down...\n```\n\n接下来，你需要连接到主成员的 mongo 控制台并执行以下命令以移除该成员：\n\
  \n```\ntestset:PRIMARY> use admin\nswitched to db admin\ntestset:PRIMARY> rs.remove(\"\
  ANOC9:27022\")\n{ \"ok\" : 1 }\ntestset:PRIMARY>\n```\n\n为了验证该成员是否已被移除，你可以发出 `rs.status()`\
  \ 命令。\n\n#### 7.4.3.3 添加服务器\n\n接下来，你将向副本集添加一个新的活跃成员。与其他成员一样，首先打开一个新的命令提示符并创建 `data`\
  \ 目录：\n\n```\nC:\\>mkdir C:\\db1\\active3\\data\nC:\\>\n```\n\n然后，使用以下命令启动 `mongod`：\n\
  \n```\nc:\\practicalmongodb\\bin>mongod --dbpath C:\\db1\\active3\\data --port 27024\
  \ --replSet testset/ANOC9:27021 --rest\n..........\n```\n\n新的 `mongod` 已经运行，现在你需要将其添加到副本集。为此，连接到主成员的\
  \ mongo 控制台：\n\n```\nC:\\>c:\\practicalmongodb\\bin\\mongo.exe --port 27021\nMongoDB\
  \ shell version: 3.0.4\nconnecting to: 127.0.0.1:27021/test\ntestset:PRIMARY>\n\
  ```\n\n接着，切换到 `admin` 数据库：\n\n```\ntestset:PRIMARY> use admin\nswitched to db admin\n\
  testset:PRIMARY>\n```\n\n最后，需要发出以下命令将新的 `mongod` 添加到副本集：\n\n```\ntestset:PRIMARY>\
  \ rs.add(\"ANOC9:27024\")\n{ \"ok\" : 1 }\n```\n\n可以检查副本集状态，以验证新的活跃成员是否已添加成功，使用\
  \ `rs.status()` 命令。\n\n#### 7.4.3.4 向副本集添加仲裁器\n\n在此示例中，你将向副本集添加一个仲裁器成员。与其他成员一样，首先为\
  \ MongoDB 实例创建 `data` 目录：\n\n```\nC:\\>mkdir c:\\db1\\arbiter\\data\nC:\\>\n```\n\
  \n然后，使用以下命令启动 `mongod`：\n\n```\nc:\\practicalmongodb\\bin>mongod --dbpath c:\\db1\\\
  arbiter\\data --port 30000 --replSet testset/ANOC9:27021 --rest\n2015-07-13T22:05:10.205-0700\
  \ I CONTROL [initandlisten] MongoDB starting : pid=3700 port=30000 dbpath=c:\\db1\\\
  arbiter\\data 64-bit host=ANOC9\n..........................................................\n\
  ```\n\n连接到主成员的 mongo 控制台，切换到 `admin` 数据库，并将新创建的 `mongod` 作为仲裁器添加到副本集：\n\n```\nC:\\\
  >c:\\practicalmongodb\\bin\\mongo.exe --port 27021\nMongoDB shell version: 3.0.4\n\
  connecting to: 127.0.0.1:27021/test\ntestset:PRIMARY> use admin\nswitched to db\
  \ admin\ntestset:PRIMARY> rs.addArb(\"ANOC9:30000\")\n{ \"ok\" : 1 }\ntestset:PRIMARY>\n\
  ```\n\n可以使用 `rs.status()` 命令来验证此步骤是否成功。\n\n#### 7.4.3.5 使用 `rs.status()` 检查状态\n\n\
  在上面的示例中，我们一直使用 `rs.status()` 来检查副本集状态。在本节中，你将了解这个命令的具体内容。\n\n它使你能够检查你所连接控制台对应的成员的状态，并查看其在副本集中的角色。\n\
  \n以下命令从主成员的 mongo 控制台发出：\n\n```\ntestset:PRIMARY> rs.status()\n{\n\"set\" : \"testset\"\
  ,\n\"date\" : ISODate(\"2015-07-13T22:15:46.222Z\")\n\"myState\" : 1,\n\"members\"\
  \ : \n{\n\"_id\" : 0,\n...........................\n\"ok\" : 1\ntestset:PRIMARY>\n\
  ```\n\n`myState` 字段的值表示成员的状态，它可以具有表 7-3 中所示的值。\n\n表 7-3. 副本集状态\n\n| myState | 描述\
  \ |\n| --- | --- |\n| 0 | 阶段 1，正在启动 |\n| 1 | 主成员 |\n| 2 | 次成员 |\n| 3 | 恢复状态 |\n\
  | 4 | 致命错误状态 |\n| 5 | 阶段 2，正在启动 |\n| 6 | 未知状态 |\n| 7 | 仲裁器成员 |\n| 8 | 宕机或不可达 |\n\
  | 9 | 当次成员在从主成员转变后回滚写入操作时，会进入此状态。 |\n| 10 | 当成员从副本集中移除时进入此状态。 |\n\n因此，上面的命令返回的 `myState`\
  \ 值为 1，这表明这是主成员。\n\n#### 7.4.3.6 强制新选举\n\n可以使用 `rs.stepDown()` 命令强制当前主服务器降级。这将强制开始选举新的主成员。\n\
  \n此命令在以下场景中很有用：\n\n*   当你模拟主节点故障的影响，强制集群进行故障转移时。这可以让你测试应用程序在此类场景下的响应。\n*   当主服务器需要离线时。这可能是为了维护活动、升级或调查服务器。\n\
  *   当需要针对数据结构运行诊断过程时。\n\n以下是在 `testset` 副本集上运行该命令的输出：\n\n```\ntestset:PRIMARY> rs.stepDown()\n\
  2015-07-13T22:52:32.000-0700 I NETWORK DBClientCursor::init call() failed\n2015-07-13T22:52:32.005-0700\
  \ E QUERY Error: error doing query: failed\n2015-07-13T22:52:32.009-0700 I NETWORK\
  \ trying reconnect to 127.0.0.1:27021 (127.0.0.1) failed\n2015-07-13T22:52:32.011-0700\
  \ I NETWORK reconnect 127.0.0.1:27021 (127.0.0.1) ok testset:SECONDARY>\n```\n\n\
  命令执行后，提示符从 `testset:PRIMARY` 变为 `testset:SECONDARY`。\n\n可以使用 `rs.status()` 来检查 `stepDown()`\
  \ 是否成功。\n\n请注意，它返回的 `myState` 值现在是 2，这意味着“成员正作为次成员运行”。\n\n#### 7.4.3.7 使用 Web 界面检查副本集状态\n\
  \nMongoDB 维护一个基于 Web 的控制台，用于查看系统状态。在你的示例中，可以通过 `http://localhost:28021` 访问该控制台。\n\
  \n默认情况下，Web 界面的端口号设置为 X+1000，其中 X 是 `mongod` 实例的端口号。在本章的示例中，由于主实例端口为 27021，因此 Web\
  \ 界面位于端口 28021。\n\n图 7-13 显示了一个指向副本集状态的链接。单击该链接将转到图 7-14 所示的副本集仪表板。\n\n![A332296_1_En_7_Fig13_HTML.jpg\
  \ 图 7-13. Web 界面![A332296_1_En_7_Fig14_HTML.jpg](img/A332296_1_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14. 副本集状态报告\n\n\n\n## 7.5 分片\n\n你在上一节中已经看到，MongoDB 如何使用**副本集**来复制数据，以防范各种意外情况，并分发读取负载以提高读取效率。\n\
  \nMongoDB 广泛使用内存来实现低延迟的数据库操作。当比较从内存读取数据与从磁盘读取数据的速度时，从内存读取大约比从磁盘读取快 100,000 倍。\n\n\
  在 MongoDB 中，理想情况下，**工作集**应完全容纳在内存中。工作集由最常访问的数据和索引组成。\n\n当 MongoDB 访问不在内存中的数据时，会发生**页面错误**。如果有空闲内存可用，操作系统会直接将请求的页面加载到内存中；然而，在没有空闲内存的情况下，内存中的页面会被写入磁盘，然后请求的页面才会被加载到内存中，这会拖慢进程。少数操作可能会意外地将工作集的大部分从内存中清除，从而对性能产生不利影响。一个例子是扫描数据库中所有文档的查询，如果其大小超过了服务器内存。这会导致文档被加载到内存中，并将工作集置换到磁盘上。\n\
  \n确保你在项目的模式设计阶段为查询定义了适当的索引覆盖范围，将最大程度地降低发生这种情况的风险。MongoDB 的 `explain` 操作可用于提供有关你的查询计划和所用索引的信息。\n\
  \nMongoDB 的 `serverStatus` 命令返回一个 `workingSet` 文档，该文档提供了实例工作集大小的估计值。运维团队可以跟踪实例在给定时间段内访问了多少页面，以及工作集中最旧文档和最新文档之间的时间间隔。通过跟踪所有这些指标，可以检测到工作集何时将达到当前内存限制，从而可以采取主动措施确保系统得到良好扩展以应对这种情况。\n\
  \n在 MongoDB 中，扩展是通过**水平扩展**数据（即在多台通用服务器之间对数据进行分区）来处理的，这也称为**分片**（水平扩展）。\n\n分片通过将数据集水平划分到多台服务器上来应对扩展以支持大型数据集和高吞吐量的挑战，每台服务器负责处理其那部分数据，没有哪一台服务器会负担过重。这些服务器也称为**分片**。\n\
  \n每个分片都是一个独立的数据库。所有分片共同组成一个逻辑数据库。\n\n分片减少了每个分片需要处理的操作数量。例如，当插入数据时，只需要访问负责存储这些记录的分片。\n\
  \n随着集群的增长，每个分片需要处理的进程会减少，因为分片所保存的数据子集变小了。这导致了吞吐量和容量的水平提升。\n\n假设你有一个大小为 1TB 的数据库。如果分片数量为\
  \ 4，那么每个分片将处理大约 265GB 的数据，而如果将分片数量增加到 40，则每个分片仅需保存 25GB 的数据。\n\n图 7-15 描绘了一个被分片的集合在三个分片上分布时的样子。\n\
  \n![A332296_1_En_7_Fig15_HTML.jpg](img/A332296_1_En_7_Fig15_HTML.jpg)\n\n图 7-15.\n\
  \n跨三个分片的分片集合\n\n尽管分片是一个引人注目且强大的特性，但它对基础设施有显著要求，并且增加了整个部署的复杂性。因此，你需要了解在哪些情况下可以考虑使用分片。\n\
  \n在以下情况下使用分片：\n\n*   数据集的大小非常庞大，并且已经开始挑战单个系统的能力。\n*   由于 MongoDB 使用内存来快速获取数据，当活动工作集的限制即将达到时，进行水平扩展就变得很重要。\n\
  *   如果应用程序是写密集型的，可以使用分片将写入分散到多台服务器上。\n\n### 7.5.1 分片组件\n\n接下来你将了解在 MongoDB 中实现分片所需的组件。分片功能在\
  \ MongoDB 中通过**分片集群**启用。\n\n分片集群的组件如下：\n\n*   `分片`\n*   `mongos`\n*   `配置服务器`\n\n\
  分片是实际存储数据的组件。对于分片集群，它保存数据的一个子集，可以是一个 `mongod` 实例或一个**副本集**。所有分片的数据组合在一起构成了分片集群的完整数据集。\n\
  \n分片是按集合启用的，因此可能存在未分片的集合。在每个分片集群中，都有一个**主分片**，除了分片集合的数据外，所有未分片的集合也放置在此处。\n\n部署分片集群时，默认情况下第一个分片成为主分片，尽管这是可配置的。见图\
  \ 7-16。\n\n![A332296_1_En_7_Fig16_HTML.jpg](img/A332296_1_En_7_Fig16_HTML.jpg)\n\
  \n图 7-16.\n\n主分片\n\n`配置服务器` 是特殊的 `mongod` 实例，它们保存分片集群的**元数据**。此元数据描述了分片系统的状态和组织结构。\n\
  \n配置服务器为单个分片集群存储数据。为了使集群正常运行，`配置服务器` 必须可用。\n\n一个 `配置服务器` 可能导致集群的**单点故障**。对于生产环境部署，建议至少使用三个\
  \ `配置服务器`，这样即使一个 `配置服务器` 无法访问，集群也能继续运行。\n\n`配置服务器` 将数据存储在 `config` 数据库中，该数据库能够将客户端请求路由到相应的数据。此数据库不应被更新。\n\
  \nMongoDB 仅在数据分布发生变化以进行集群平衡时，才会向 `配置服务器` 写入数据。\n\n`mongos` 充当**路由器**。它们负责将应用程序的读写请求路由到各个分片。\n\
  \n与 MongoDB 数据库交互的应用程序无需关心数据在分片内部的存储方式。对于它们来说，这是透明的，因为它们只与 `mongos` 交互。然后，`mongos`\
  \ 将读写操作路由到各个分片。\n\n`mongos` 会缓存来自 `配置服务器` 的元数据，这样对于每个读写请求，它们就不会过度加重 `配置服务器` 的负担。\n\
  \n然而，在以下情况下，数据是从 `配置服务器` 读取的：\n\n*   现有的 `mongos` 已重新启动，或者新的 `mongos` 首次启动。\n* \
  \  **块迁移**。我们将在后面详细解释 `chunk migration`。\n\n### 7.5.2 数据分发过程\n\n接下来你将了解在启用了分片的集合中，数据如何在分片之间分发。在\
  \ MongoDB 中，数据是在**集合级别**进行分片或分发的。集合通过 `shard key` 进行分区。\n\n#### 7.5.2.1 分片键\n\n\
  集合中所有文档中存在的任何已索引的单字段或复合字段都可以作为 `shard key`。你指定这个字段作为依据来分发集合的文档。在内部，MongoDB 根据该字段的值将文档划分成**块**，并将这些块分发到各个分片。\n\
  \nMongoDB 通过两种方式启用数据分发：`基于范围的分区` 和 `基于哈希的分区`。\n\n\n\n#### 基于范围的分区\n\n在基于范围的分区中，分片键值被划分为多个范围。假设你考虑一个\
  \ `timestamp` 字段作为分片键。在这种分区方式中，值被视为从最小值到最大值的一条直线，其中最小值是起始时期（例如，1970 年 1 月 1 日），最大值是结束时期（例如，9999\
  \ 年 12 月 31 日）。集合中的每个文档都将仅具有此范围内的某个时间戳值，它将代表这条线上的某个点。\n\n根据可用分片的数量，这条线将被划分为多个范围，文档将根据这些范围进行分发。\n\
  \n在此分区方案中，如图 7-17 所示，分片键值相近的文档很可能落在同一个分片上。这可以显著提高范围查询的性能。\n\n![A332296_1_En_7_Fig17_HTML.jpg](img/A332296_1_En_7_Fig17_HTML.jpg)\n\
  **图 7-17. 基于范围的分区**\n\n然而，其缺点在于它可能导致数据分布不均，使某个分片过载，最终可能接收大部分请求，而其他分片负载不足，因此系统无法正常扩展。\n\
  \n#### 基于哈希的分区\n\n在基于哈希的分区中，数据是根据分片字段的哈希值进行分布的。如果选择这种方式，与基于范围的分区相比，它将导致更随机的分布。\n\
  \n分片键相近的文档不太可能属于同一个块。例如，对于基于 `_id` 字段哈希的范围，将会有一条哈希值直线，这条直线将再次根据分片数量进行分区。根据哈希值，文档将分布在任一分片中。参见图\
  \ 7-18。\n\n![A332296_1_En_7_Fig18_HTML.jpg](img/A332296_1_En_7_Fig18_HTML.jpg)\n\
  **图 7-18. 基于哈希的分区**\n\n与基于范围的分区相比，这确保了数据均匀分布，但这是以高效的范围查询为代价的。\n\n#### 块\n\n数据以块的形式在分片之间移动。分片键范围被进一步划分为子范围，这些子范围也被称为块。参见图\
  \ 7-19。\n\n![A332296_1_En_7_Fig19_HTML.jpg](img/A332296_1_En_7_Fig19_HTML.jpg)\n\
  **图 7-19. 块**\n\n对于一个分片集群，`64MB` 是默认的块大小。在大多数情况下，这是一个适合进行块拆分和迁移的大小。\n\n让我们通过一个例子来讨论分片和块的执行过程。假设你有一个博客文章集合，它基于\
  \ `date` 字段进行分片。这意味着集合将根据 `date` 字段的值进行拆分。我们进一步假设你有三个分片。在此场景中，数据可能在分片上分布如下：\n\n\
  *   分片 #1：时间开始至 2009 年 7 月\n*   分片 #2：2009 年 8 月至 2009 年 12 月\n*   分片 #3：2010 年\
  \ 1 月至时间结束\n\n为了检索从 2010 年 1 月 1 日到今天的文档，查询被发送到 `mongos`。\n\n在此场景中：\n1.  客户端查询 `mongos`。\n\
  2.  `mongos` 知道哪些分片拥有数据，因此它将查询发送给分片 #3。\n3.  分片 #3 执行查询并将结果返回给 `mongos`。\n4.  `mongos`\
  \ 合并从各个分片（在此情况下仅为分片 #3）接收的数据，并将最终结果返回给客户端。\n\n应用程序不需要感知分片。它可以像查询普通的 `mongod` 一样查询\
  \ `mongos`。\n\n让我们考虑另一个场景，你插入一个新文档。新文档具有今天的日期。事件序列如下：\n1.  文档被发送到 `mongos`。\n2.\
  \  `mongos` 检查日期，并基于此将文档发送给分片 #3。\n3.  分片 #3 插入文档。\n\n从客户端的角度来看，这再次与单服务器设置相同。\n\n\
  #### 配置服务器在上述场景中的作用\n\n考虑一个场景，你开始收到数百万个日期为 2009 年 9 月的文档的插入请求。在这种情况下，分片 #2 开始变得过载。\n\
  \n一旦配置服务器意识到分片 #2 变得太大，它就会介入。它将拆分该分片上的数据并开始将其迁移到其他分片。迁移完成后，它将更新后的状态发送给 `mongos`。因此现在，分片\
  \ #2 拥有 2009 年 8 月到 2009 年 9 月 18 日的数据，而分片 #3 包含 2009 年 9 月 19 日到时间结束的数据。\n\n当向集群添加新分片时，由配置服务器负责决定如何处理它。数据可能需要立即迁移到新分片，或者新分片可能需要保留一段时间。总之，配置服务器是大脑。每当有任何数据被移动时，配置服务器都会让\
  \ `mongos` 知道最终配置，以便 `mongos` 可以继续进行正确的路由。\n\n## 7.5.3 数据平衡过程\n\n接下来你将了解如何保持集群的平衡（即\
  \ MongoDB 如何确保所有分片负载均等）。\n\n新数据的添加或现有数据的修改，或服务器的添加或移除，都可能导致数据分布不平衡，这意味着要么一个分片因块过多而过载，其他分片的块数量较少，要么可能导致某个块的大小显著大于其他块。\n\
  \nMongoDB 通过以下后台进程确保平衡：\n*   块拆分\n*   平衡器\n\n#### 7.5.3.1 块拆分\n\n块拆分是确保块保持指定大小的进程之一。如你所见，选择了一个分片键并用于标识文档将如何跨分片分布。文档进一步被分组为\
  \ `64MB` 的块（默认且可配置），并根据其托管的范围存储在分片中。\n\n如果由于插入或更新操作导致块的大小发生变化并超过默认块大小，则该块将被 `mongos`\
  \ 拆分为两个更小的块。参见图 7-20。\n\n![A332296_1_En_7_Fig20_HTML.jpg](img/A332296_1_En_7_Fig20_HTML.jpg)\n\
  **图 7-20. 块拆分**\n\n此过程使分片内的块保持指定大小或小于该大小（即它确保块为配置的大小）。\n\n插入和更新操作会触发拆分。拆分操作会导致配置服务器中的数据被修改，因为元数据被更新了。虽然拆分不会导致数据迁移，但此操作可能导致集群不平衡，其中一个分片拥有比另一个分片更多的块。\n\
  \n\n#### 7.5.3.2 平衡器\n\n平衡器是一个后台进程，用于确保所有分片负载均衡或处于平衡状态。此进程管理块（chunk）的迁移。\n\n块的拆分可能导致不平衡。文档的增加或删除也可能导致集群不平衡。在集群不平衡时，会使用平衡器（balancer）来均匀分布数据。\n\
  \n当一个分片比其他分片拥有更多块时，MongoDB 会自动在各分片间平衡这些块。此过程对应用程序和用户是透明的。\n\n集群中的任何 `mongos` 都可以启动平衡器进程。它们通过获取配置服务器（config\
  \ server）上配置数据库（config database）的锁来实现，因为平衡器涉及将块从一个分片迁移到另一个分片，这可能导致元数据变更，进而需要更改配置服务器上的数据库。平衡器进程对数据库性能可能产生巨大影响，因此它可以配置为仅在达到迁移阈值（migration\
  \ threshold）时才开始迁移。迁移阈值是分片上最大块数与最小块数之差。阈值如表 7-4 所示。\n\n表 7-4：迁移阈值\n\n| 块数量 | 迁移阈值\
  \ |\n| :--- | :--- |\n| < 20 | 2 |\n| 21-80 | 4 |\n| >80 | 8 |\n\n或者，也可以将其安排在不会影响生产流量的时间段内运行。\n\
  \n平衡器一次迁移一个块（参见图 7-21），并遵循以下步骤：\n\n![图 7-21：块迁移](img/A332296_1_En_7_Fig21_HTML.jpg)\n\
  \n1.  将 `moveChunk` 命令发送到源分片。\n2.  源分片启动一个内部的 `moveChunk` 命令，在该命令中创建块内文档的副本并将其排入队列。在此期间，由于配置数据库尚未更改，且源分片仍负责处理该块上的任何读/写请求，因此\
  \ `mongos` 将针对该块的任何操作都路由到源分片。\n3.  目标分片开始从源接收数据的副本。\n4.  一旦目标分片接收到块中的所有文档，就会启动同步过程，以确保迁移期间发生的所有数据变更都在目标分片上更新。\n\
  5.  同步完成后，下一步是在配置数据库中更新元数据，记录块的新位置。此活动由目标分片完成，它连接到配置数据库并执行必要的更新。\n6.  成功完成上述所有步骤后，源分片上维护的文档副本将被删除。\n\
  \n如果在此期间平衡器需要从源分片进行额外的块迁移，它可以开始新的迁移，而无需等待当前迁移的删除步骤完成。\n\n如果在迁移过程中出现任何错误，平衡器会中止该过程，将块留在原始分片上。成功完成后，MongoDB\
  \ 会从原始分片中删除块数据。\n\n分片的增加或删除也可能导致集群不平衡。添加新分片时，会立即开始向该分片迁移数据。但是，集群达到平衡需要时间。\n\n当移除一个分片时，平衡器确保数据被迁移到其他分片，并更新元数据信息。完成这两项活动后，该分片才会被安全移除。\n\
  \n## 7.5.4 操作\n\n接下来，我们将了解如何在分片集群上执行读和写操作。如前所述，配置服务器维护集群元数据。这些数据存储在配置数据库（config\
  \ database）中。`mongos` 使用配置数据库的这些数据来为应用程序的读和写请求提供服务。\n\n`mongos` 实例会缓存这些数据，然后用于将写和读操作路由到各个分片。这样配置服务器就不会负担过重。\n\
  \n`mongos` 仅在以下情况下从配置服务器读取：\n*   `mongos` 首次启动时\n*   现有的 `mongos` 重启后\n*   块迁移后，`mongos`\
  \ 需要用新的集群元数据更新其缓存的元数据时\n\n每当发出任何操作时，`mongos` 需要做的第一步是确定哪些分片将服务于该请求。由于分片键（shard key）用于在分片集群中分布数据，如果操作使用了分片键字段，那么就可以据此定位到特定的分片。\n\
  \n假设分片键是 `employeeid`，可能会发生以下情况：\n*   如果 `find` 查询包含 `employeeid` 字段，那么为了满足查询，`mongos`\
  \ 将只定位到特定的分片。\n*   如果单个更新操作使用 `employeeid` 来更新文档，请求将被路由到保存该员工数据的分片。\n\n但是，如果操作没有使用分片键，那么请求将被广播到所有分片。通常，多更新或删除操作会针对整个集群。\n\
  \n在查询数据时，可能存在一些场景，除了识别分片并从它们获取数据外，`mongos` 可能需要在将最终输出发送给客户端之前，对从各个分片返回的数据进行处理。\n\
  \n假设一个应用程序发出了一个带有 `sort()` 的 `find()` 请求。在这种情况下，`mongos` 会将 `$orderby` 选项传递给各个分片。分片将从它们的数据集中获取数据，并按排序顺序发送结果。一旦\
  \ `mongos` 收到所有分片的排序数据，它会对整个数据执行增量归并排序（incremental merge sort），然后将最终输出返回给客户端。\n\n\
  与 `sort` 类似的是聚合函数，例如 `limit()`、`skip()` 等，这些函数要求 `mongos` 在从分片接收数据之后、向客户端返回最终结果集之前执行操作。\n\
  \n`mongos` 消耗的系统资源极少，并且没有持久状态。因此，如果应用程序的需求是简单的 `find()` 查询，并且这些查询可以完全由分片满足，无需在 `mongos`\
  \ 层面进行操作，那么你可以将 `mongos` 运行在与你的应用程序服务器相同的系统上。\n\n### 7.5.5 实现分片\n\n在本节中，你将学习在 Windows\
  \ 平台的一台机器上配置分片。\n\n我们将通过仅使用两个分片来保持示例简单。在此配置中，你将使用表 7-5 中列出的服务。\n\n表 7-5：分片集群配置\n\
  \n| 组件 | 类型 | 端口 | 数据文件路径 |\n| :--- | :--- | :--- | :--- |\n| 分片控制器 | Mongos | 27021\
  \ | - |\n| 配置服务器 | Mongod | 27022 | C:\\db1\\config\\data |\n| 分片 0 | Mongod | 27023\
  \ | C:\\db1\\shard1\\data |\n| 分片 1 | Mongod | 27024 | C:\\db1\\shard2\\data |\n\
  \n你将重点关注以下内容：\n*   设置一个分片集群。\n*   创建一个数据库和集合，并在该集合上启用分片。\n*   使用导入命令将数据加载到分片集合中。\n\
  *   在分片间分发数据。\n*   向集群中添加和移除分片，并检查数据如何自动重新分布。\n\n\n#### 7.5.5.1 设置分片集群\n\n要设置集群，第一步是设置配置服务器。在新的终端窗口中输入以下代码，为配置服务器创建\
  \ `data` 目录并启动 `mongod`：\n\n```\nC:\\> mkdir C:\\db1\\config\\data\n\nC:\\>CD C:\\\
  practicalmongodb\\bin\n\nC:\\ practicalmongodb\\bin>mongod --port 27022 --dbpath\
  \ C:\\db1\\config\\data --configsvr\n\n2015-07-13T23:02:41.982-0700 I JOURNAL [journal\
  \ writer] Journal writer thread started\n\n2015-07-13T23:02:41.984-0700 I CONTROL\
  \ [initandlisten] MongoDB starting : pid=3084 port=27022 dbpath=C:\\db1\\config\\\
  data master=1 64-bit host=ANOC9\n\n......................................\n\n2015-07-13T23:02:42.066-0700\
  \ I REPL [initandlisten] ******\n\n2015-07-13T03:02:42.067-0700 I NETWORK [initandlisten]\
  \ waiting for connections on port 27022\n```\n\n接下来，启动 `mongos`。在新的终端窗口中输入：\n\n\
  ```\nC:\\>cd c:\\practicalmongodb\\bin\n\nc:\\practicalmongodb\\bin>mongos --configdb\
  \ localhost:27022 --port 27021 --chunkSize 1\n\n2015-07-13T23:06:07.246-0700 W SHARDING\
  \ running with 1 config server should be done only for testing purposes and is not\
  \ recommended for production\n\n...............................................................\n\
  \n2015-07-13T23:09:07.464-0700 I SHARDING [Balancer] distributed lock 'balancer/\
  \ ANOC9:27021:1429783567:41' unlocked\n```\n\n现在，分片控制器（即 `mongos`）已启动并运行。\n\n如果切换到启动了配置服务器的窗口，你会发现分片服务器已注册到配置服务器。\n\
  \n在此示例中，你使用了 1MB 的块大小。请注意，在真实场景中这并不理想，因为它小于 4MB（文档的最大大小）。然而，这仅用于演示目的，因为它无需加载大量数据就能创建必要数量的块。除非另有指定，`chunkSize`\
  \ 默认为 128MB。\n\n接下来，启动分片服务器 Shard0 和 Shard1。\n\n打开一个新的终端窗口。为第一个分片创建 `data` 目录并启动\
  \ `mongod`：\n\n```\nC:\\>mkdir C:\\db1\\shard0\\data\n\nC:\\>cd c:\\practicalmongodb\\\
  bin\n\nc:\\practicalmongodb\\bin>mongod --port 27023 --dbpath c:\\db1\\shard0\\\
  data –shardsvr\n\n2015-07-13T23:14:58.076-0700 I CONTROL [initandlisten] MongoDB\
  \ starting : pid=1996 port=27023 dbpath=c:\\db1\\shard0\\data 64-bit host=ANOC9\n\
  \n..................................................................\n\n2015-07-13T23:14:58.158-0700\
  \ I NETWORK [initandlisten] waiting for connections on port 27023\n```\n\n打开一个新的终端窗口。为第二个分片创建\
  \ `data` 目录并启动 `mongod`：\n\n```\nC:\\>mkdir c:\\db1\\shard1\\data\n\nC:\\>cd c:\\\
  practicalmongodb\\bin\n\nc:\\practicalmongodb\\bin>mongod --port 27024 --dbpath\
  \ C:\\db1\\shard1\\data --shardsvr\n\n2015-07-13T23:17:01.704-0700 I CONTROL [initandlisten]\
  \ MongoDB starting : pid=3672 port=27024 dbpath=C:\\db1\\shard1\\data 64-bit host=ANOC9\n\
  \n2015-07-13T23:17:01.704-0700 I NETWORK [initandlisten] waiting for connections\
  \ on port 27024\n```\n\n到以上步骤结束时，所有与设置相关的服务器都已启动并运行。下一步是将分片信息添加到分片控制器。\n\n尽管 `mongos`\
  \ 实际上不是一个完整的实例，但它对应用程序而言表现为一个完整的 MongoDB 实例。可以使用 `mongo` shell 连接到 `mongos` 来执行任何操作。\n\
  \n打开 `mongos` 的 `mongo` 控制台：\n\n```\nC:\\>cd c:\\practicalmongodb\\bin\n\nc:\\ practicalmongodb\\\
  bin>mongo localhost:27021\n\nMongoDB shell version: 3.0.4\n\nconnecting to: localhost:27021/test\n\
  \nmongos>\n```\n\n切换到 `admin` 数据库：\n\n```\nmongos> use admin\n\nswitched to db admin\n\
  \nmongos>\n```\n\n通过运行以下命令添加分片信息：\n\n```\nmongos> db.runCommand({addshard:\"localhost:27023\"\
  ,allowLocal:true})\n\n{ \"shardAdded\" : \"shard0000\", \"ok\" : 1 }\n\nmongos>\
  \ db.runCommand({addshard:\"localhost:27024\",allowLocal:true})\n\n{ \"shardAdded\"\
  \ : \"shard0001\", \"ok\" : 1 }\n\nmongos>\n```\n\n这会激活两个分片服务器。\n\n下一个命令检查分片：\n\n\
  ```\nmongos> db.runCommand({listshards:1})\n\n{\n\n\"shards\" : [\n\n{\n\n\"_id\"\
  \ : \"shard0000\",\n\n\"host\" : \"localhost:27023\"\n\n}, {\n\n\"_id\" : \"shard0001\"\
  ,\n\n\"host\" : \"localhost:27024\"\n\n}\n\n], \"ok\" : 1}\n```\n\n#### 7.5.5.2\
  \ 创建数据库和分片集合\n\n为了继续此示例，你将创建一个名为 `testdb` 的数据库和一个名为 `testcollection` 的集合，并将基于键 `testkey`\
  \ 对其进行分片。\n\n连接到 `mongos` 控制台并执行以下命令以获取数据库：\n\n```\nmongos> testdb=db.getSisterDB(\"\
  testdb\")\n\ntestdb\n```\n\n接下来，为 `testdb` 在数据库级别启用分片：\n\n```\nmongos> db.runCommand({enableSharding\
  \ system: \"testdb\"})\n\n{ \"ok\" : 1 }\n\nmongos>\n```\n\n接下来，指定需要分片的集合以及该集合将基于哪个键进行分片：\n\
  \n```\nmongos> db.runCommand({shardcollection: \"testdb.testcollection\", key: {testkey:1}})\n\
  \n{ \"collectionsharded\" : \"testdb.testcollection\", \"ok\" : 1 }\n\nmongos>\n\
  ```\n\n完成以上步骤后，你现在拥有一个所有组件都已启动并运行的分片集群。你已经创建了一个数据库并启用了集合分片。\n\n接下来，将数据导入集合，以便检查分片上的数据分布。\n\
  \n你将使用 `import` 命令将数据加载到 `testcollection` 中。连接到一个新的终端窗口并执行：\n\n```\nC:\\>cd C:\\\
  practicalmongodb\\bin\n\nC:\\practicalmongodb\\bin>mongoimport --host ANOC9 --port\
  \ 27021 --db testdb --collection testcollection --type csv --file c:\\mongoimport.csv\
  \ –-headerline\n\n2015-07-13T23:17:39.101-0700 connected to: ANOC9:27021\n\n2015-07-13T23:17:42.298-0700\
  \ [##############..........] testdb.testcollection 1.1 MB/1.9 MB (59.6%)\n\n2015-07-13T23:17:44.781-0700\
  \ imported 100000 documents\n```\n\n`mongoimport.csv` 文件包含两个字段。第一个是 `testkey`，它是一个随机生成的数字。第二个字段是文本字段；它用于确保文档占据足够数量的块，从而使使用分片机制变得可行。\n\
  \n这会在集合中插入 100,000 个对象。\n\n为了验证记录是否已插入，连接到 `mongos` 的 `mongo` 控制台并发出以下命令：\n\n```\n\
  C:\\Windows\\system32>cd c:\\practicalmongodb\\bin\n\nc:\\practicalmongodb\\bin>mongo\
  \ localhost:27021\n\nMongoDB shell version: 3.0.4\n\nconnecting to: localhost:27021/test\n\
  \nmongos> use testdb\n\nswitched to db testdb\n\nmongos> db.testcollection.count()\n\
  \n100000\n\nmongos>\n```\n\n接下来，连接到两个分片（Shard0 和 Shard1）的控制台，并查看数据是如何分布的。打开一个新的终端窗口并连接到\
  \ Shard0 的控制台：\n\n```\nC:\\>cd C:\\practicalmongodb\\bin\n\nC:\\ practicalmongodb\\\
  bin>mongo localhost:27023\n\nMongoDB shell version: 3.0.4\n\nconnecting to: localhost:27023/test\n\
  ```\n\n切换到 `testdb` 并发出 `count()` 命令以检查该分片上的文档数量：\n\n```\n> use testdb\n\nswitched\
  \ to db testdb\n\n> db.testcollection.count()\n\n57998\n```\n\n接下来，打开一个新的终端窗口，连接到\
  \ Shard1 的控制台，并按照上述步骤操作（即切换到 `testdb` 并检查 `testcollection` 集合的计数）：\n\n```\nC:\\\
  >cd c:\\practicalmongodb\\bin\n\nc:\\practicalmongodb\\bin>mongo localhost:27024\n\
  \nMongoDB shell version: 3.0.4\n\nconnecting to: localhost:27024/test\n\n> use testdb\n\
  \nswitched to db testdb\n\n> db.testcollection.count()\n\n42002\n\n>\n```\n\n当你运行上述命令一段时间后，可能会看到每个分片上的文档数量存在差异。当文档加载时，所有块都由\
  \ `mongos` 放置在一个分片上。随后，通过将块均匀地分布在所有分片上来重新平衡分片集。\n\n\n\n#### 7.5.5.3 添加新分片\n\n你已经设置好了一个分片集群，也已经对一个集合进行了分片，并查看了数据是如何在分片间分布的。接下来，你将向集群添加一个新分片，以便负载能更分散一些。\n\
  \n你将重复上述步骤。首先，在一个新的终端窗口中为新分片创建一个数据目录：\n\n```\nc:\\>mkdir c:\\db1\\shard2\\data\n\
  ```\n\n然后，在端口 27025 上启动 `mongod`：\n\n```\nc:\\>cd c:\\practicalmongodb\\bin\nc:\\\
  \ practicalmongodb\\bin>mongod --port 27025 --dbpath C:\\db1\\shard2\\data --shardsvr\n\
  ```\n\n```\n2015-07-13T23:25:49.103-0700 I CONTROL [initandlisten] MongoDB starting\
  \ : pid=3744 port=27025 dbpath=C:\\db1\\shard2\\data 64-bit host=ANOC9\n................................\n\
  2015-07-13T23:25:49.183-0700 I NETWORK [initandlisten] waiting for connections on\
  \ port 27025\n```\n\n接下来，新的分片服务器将被添加到分片集群中。为了配置它，在一个新的终端窗口中打开 `mongos` 的 mongo 控制台：\n\
  \n```\nC:\\>cd c:\\practicalmongodb\\bin\nc:\\practicalmongodb\\bin>mongo localhost:27021\n\
  MongoDB shell version: 3.0.4\nconnecting to: localhost:27021/test\nmongos>\n```\n\
  \n切换到 `admin` 数据库并运行 `addshard` 命令。此命令将分片服务器添加到分片集群。\n\n```\nmongos> use admin\n\
  switched to db admin\nmongos> db.runCommand({addshard: \"localhost:27025\", allowlocal:\
  \ true})\n{ \"shardAdded\" : \"shard0002\", \"ok\" : 1 }\nmongos>\n```\n\n为了验证添加是否成功，运行\
  \ `listshards` 命令：\n\n```\nmongos> db.runCommand({listshards:1})\n{\n\"shards\"\
  \ : [\n{\n\"_id\" : \"shard0000\",\n\"host\" : \"localhost:27023\"\n},\n{\n\"_id\"\
  \ : \"shard0001\",\n\"host\" : \"localhost:27024\"\n},\n{\n\"_id\" : \"shard0002\"\
  ,\n\"host\" : \"localhost:27025\"\n}\n],\n\"ok\" : 1\n}\n```\n\n接下来，检查 `testcollection`\
  \ 数据是如何分布的。在新的终端窗口中连接到新分片的控制台：\n\n```\nC:\\>cd c:\\practicalmongodb\\bin\nc:\\practicalmongodb\\\
  bin>mongo localhost:27025\nMongoDB shell version: 3.0.4\nconnecting to: localhost:27025/test\n\
  ```\n\n切换到 `testdb` 并检查该分片上列出的集合：\n\n```\n> use testdb\nswitched to db testdb\n\
  > show collections\nsystem.indexes\ntestcollection\n```\n\n执行三次 `testcollection.count`\
  \ 命令：\n\n```\n> db.testcollection.count()\n6928\n> db.testcollection.count()\n12928\n\
  > db.testcollection.count()\n16928\n```\n\n有趣的是，集合中的项目数量在缓慢上升。`mongos` 正在重新平衡集群。\n\
  \n随着时间的推移，数据块将从分片服务器 Shard0 和 Shard1 迁移到新添加的分片服务器 Shard2，以便数据均匀分布在所有服务器上。此过程完成后，配置服务器元数据将被更新。这是一个自动过程，即使\
  \ `testcollection` 没有新增数据也会发生。这是在确定数据块大小时需要考虑的重要因素之一。\n\n如果 `chunkSize` 的值非常大，最终会导致数据分布不太均匀。当\
  \ `chunkSize` 较小时，数据分布会更均匀。\n\n#### 7.5.5.4 移除分片\n\n在下面的例子中，你将看到如何移除一个分片服务器。在此示例中，你将移除你在上面示例中添加的服务器。\n\
  \n为了启动该过程，你需要登录到 `mongos` 控制台，切换到 `admin` 数据库，并执行以下命令以从分片集群中移除该分片：\n\n```\nC:\\\
  >cd c:\\practicalmongodb\\bin\nc:\\practicalmongodb\\bin>mongo localhost:27021\n\
  MongoDB shell version: 3.0.4\nconnecting to: localhost:27021/test\nmongos> use admin\n\
  switched to db admin\nmongos> db.runCommand({removeShard: \"localhost:27025\"})\n\
  {\n\"msg\" : \"draining started successfully\",\n\"state\" : \"started\",\n\"shard\"\
  \ : \"shard0002\",\n\"ok\" : 1\n}\nmongos>\n```\n\n如你所见，`removeShard` 命令返回了一条消息。其中一个消息字段是\
  \ `state`，它指示了进程状态。消息还表明排空过程已开始，这由 `msg` 字段指示。\n\n你可以重新发出 `removeShard` 命令来检查进度：\n\
  \n```\nmongos> db.runCommand({removeShard: \"localhost:27025\"})\n{\n\"msg\" : \"\
  draining ongoing\",\n\"state\" : \"ongoing\",\n\"remaining\" : {\n\"chunks\" : NumberLong(2),\n\
  \"dbs\" : NumberLong(0)\n},\n\"ok\" : 1\n}\nmongos>\n```\n\n响应告诉你仍需从该服务器排空的数据块和数据库的数量。如果你重新发出命令且进程已终止，命令的输出将显示相应状态。\n\
  \n```\nmongos> db.runCommand({removeShard: \"localhost:27025\"})\n{\n\"msg\" : \"\
  removeshard completed successfully\",\n\"state\" : \"completed\",\n\"shard\" : \"\
  shard0002\",\n\"ok\" : 1\n}\nmongos>\n```\n\n你可以使用 `listshards` 来验证 `removeShard`\
  \ 是否成功。\n\n如你所见，数据已成功迁移到其他分片，因此你可以删除存储文件并终止 Shard2 的 `mongod` 进程。\n\n这种无需停机即可修改分片集群的能力是\
  \ MongoDB 的关键组件之一，使其能够支持高可用、高可扩展性的大容量数据存储。\n\n#### 7.5.5.5 列出分片集群状态\n\n`printShardingStatus()`\
  \ 命令提供了大量关于分片系统内部的洞察。\n\n```\nmongos> db.printShardingStatus()\n--- Sharding Status\
  \ ---\nsharding version: {\n\"_id\" : 1,\n\"version\" : 3,\n\"minCompatibleVersion\"\
  \ : 5,\n\"currentVersion\" : 6,\n\"clusterId\" : ObjectId(\"52fb7a8647e47c5884749a1a\"\
  )\n}\nshards:\n{ \"_id\" : \"shard0000\", \"host\" : \"localhost:27023\" }\n{ \"\
  _id\" : \"shard0001\", \"host\" : \"localhost:27024\" }\nbalancer:\nCurrently enabled:\
  \ yes\nCurrently running: no\nFailed balancer rounds in last 5 attempts: 0\nMigration\
  \ Results for the last 24 hours:\n17 : Success\ndatabases:\n{ \"_id\" : \"admin\"\
  , \"partitioned\" : false, \"primary\" : \"config\" }\n{ \"_id\" : \"testdb\", \"\
  partitioned\" : true, \"primary\" : \"shard0000\" }\n...............\n```\n\n输出列出了以下内容：\n\
  *   分片集群的所有分片服务器\n*   每个分片数据库/集合的配置\n*   分片数据集的所有数据块\n\n从上述命令中可以获得的重要信息是与每个数据块关联的分片键范围。这还显示了特定数据块存储在何处（在哪台分片服务器上）。该输出可用于分析分片服务器的键和数据块分布情况。\n\
  \n### 7.5.6 控制集合分布（基于标签的分片）\n\n在上一节中，你了解了数据分布是如何发生的。在本节中，你将学习基于标签的分片。此功能在 2.2.0\
  \ 版本中引入。\n\n标签赋予了操作员控制哪些集合进入哪个分片的能力。\n\n为了理解基于标签的分片，让我们设置一个分片集群。你将使用上面创建的分片集群。对于此示例，你需要三个分片，因此你将再次向集群添加\
  \ Shard2。\n\n\n\n#### 7.5.6.1 先决条件\n\n你将首先启动集群。重申一下，请遵循以下步骤。\n\n启动配置服务器。在一个新的终端窗口中（如果尚未运行）输入以下命令：\n\
  ```\nC:\\> mkdir C:\\db1\\config\\data\nC:\\>cd c:\\practicalmongodb\\bin\nC:\\\
  practicalmongodb\\bin>mongod --port 27022 --dbpath C:\\db\\config\\data --configsvr\n\
  ```\n\n启动 mongos。在一个新的终端窗口中（如果尚未运行）输入以下命令：\n```\nC:\\>cd c:\\practicalmongodb\\\
  bin\nc:\\practicalmongodb\\bin>mongos --configdb localhost:27022 --port 27021\n\
  ```\n\n接下来你将启动分片服务器。\n\n启动 Shard0。在一个新的终端窗口中（如果尚未运行）输入以下命令：\n```\nC:\\>cd c:\\practicalmongodb\\\
  bin\nc:\\practicalmongodb\\bin>mongod --port 27023 --dbpath c:\\db1\\shard0\\data\
  \ --shardsvr\n```\n\n启动 Shard1。在一个新的终端窗口中（如果尚未运行）输入以下命令：\n```\nC:\\>cd c:\\practicalmongodb\\\
  bin\nC:\\practicalmongodb\\bin>mongod --port 27024 --dbpath c:\\db1\\shard1\\data\
  \ –shardsvr\n```\n\n启动 Shard2。在一个新的终端窗口中（如果尚未运行）输入以下命令：\n```\nC:\\>cd c:\\practicalmongodb\\\
  bin\nc:\\practicalmongodb\\bin>mongod --port 27025 --dbpath c:\\db1\\shard2\\data\
  \ –shardsvr\n```\n\n由于你在前面的示例中已将 Shard2 从分片集群中移除，现在必须将 Shard2 添加回分片集群，因为本示例需要三个分片。\n\
  \n为此，你需要连接到 mongos。输入以下命令：\n```\nC:\\Windows\\system32>cd c:\\practicalmongodb\\\
  bin\nc:\\practicalmongodb\\bin>mongo localhost:27021\nMongoDB shell version: 3.0.4\n\
  connecting to: localhost:27021/test\nmongos>\n```\n\n在将分片添加到集群之前，你需要删除 `testdb`\
  \ 数据库：\n```\nmongos> use testdb\nswitched to db testdb\nmongos> db.dropDatabase()\n\
  { \"dropped\" : \"testdb\", \"ok\" : 1 }\nmongos>\n```\n\n接下来，使用以下步骤添加 Shard2 分片：\n\
  ```\nmongos> use admin\nswitched to db admin\nmongos> db.runCommand({addshard: \"\
  localhost:27025\", allowlocal: true})\n{ \"shardAdded\" : \"shard0002\", \"ok\"\
  \ : 1 }\nmongos>\n```\n\n如果在未删除 `testdb` 数据库的情况下尝试添加被移除的分片，将会出现以下错误：\n```\nmongos>db.runCommand({addshard:\
  \ \"localhost:27025\", allowlocal: true})\n{\n\"ok\" : 0,\n\"errmsg\" : \"can't\
  \ add shard localhost:27025 because a local database 'testdb' exists in another\
  \ shard0000:localhost:27023\"}\n```\n\n为了确保三个分片都存在于集群中，请运行以下命令：\n```\nmongos> db.runCommand({listshards:1})\n\
  {\n\"shards\" : [\n{\n\"_id\" : \"shard0000\",\n\"host\" : \"localhost:27023\"\n\
  }, {\n\"_id\" : \"shard0001\",\n\"host\" : \"localhost:27024\"\n}, {\n\"_id\" :\
  \ \"shard0002\",\n\"host\" : \"localhost:27025\"\n}\n], \"ok\" : 1}\n```\n\n####\
  \ 7.5.6.2 标记\n\n完成上述步骤后，你的分片集群（包含一个配置服务器、三个分片和一个 mongos）已启动并运行。接下来，在一个新的终端窗口中，连接到端口\
  \ `30999` 上的 mongos 和配置数据库 `27022`：\n```\nC:\\ >cd c:\\practicalmongodb\\bin\nc:\\\
  \ practicalmongodb\\bin>mongos --port 30999 --configdb localhost:27022\n2015-07-13T23:24:39.674-0700\
  \ W SHARDING running with 1 config server should be done only for testing purposes\
