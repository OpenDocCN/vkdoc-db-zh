  \ I SHARDING [Balancer] distributed lock 'balancer /ANOC9:30999: 1429851279:41'\
  \ unlocked..\n```\n\n接下来，启动一个新的终端窗口，连接到 mongos，并在集合上启用分片：\n```\nC:\\ >cd c:\\practicalmongodb\\\
