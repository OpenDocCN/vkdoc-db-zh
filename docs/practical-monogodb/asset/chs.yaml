- "# 10. MongoDB 用例\n\n> “MongoDB：它对我有用吗？”\n\n在本章中，我们将提供 MongoDB 的特性与其适合解决的业务问题之间急需的连接。我们将使用两个用例来分享用于解决此类问题的技术和模式。\n\
  \n## 10.1 用例 1 - 性能监控\n\n在本节中，您将探索如何使用 MongoDB 存储和检索性能数据。您将重点关注用于存储数据的数据模型。检索将仅包括从相应集合中读取。您还将了解如何应用分片和复制以获得更好的性能和数据安全性。\n\
  \n我们假设有一个监控工具正在以 CSV 格式收集服务器定义的参数数据。通常，监控工具要么将数据作为文本文件存储在服务器上的指定文件夹中，要么将其输出重定向到任何报告数据库服务器。在此用例中，有一个调度程序将读取此共享文件夹路径并将数据导入\
  \ MongoDB 数据库。\n\n### 10.1.1 模式设计\n\n设计解决方案的第一步是决定模式。模式取决于监控工具捕获的数据格式。\n\n日志文件中的一行可能类似于表\
  \ 10-1。\n\n表 10-1. `日志文件`\n\n| 节点 UUID | IP 地址 | 节点名称 | MIB | 时间戳（毫秒） | 指标值 |\n\
  | --- | --- | --- | --- | --- | --- |\n| 3beb1a8b-040d-4b46-932a-2d31bd353186 |\
  \ 10.161.1.73 | corp_xyz_sardar | IFU | 1369221223384 | 0.2 |\n\n以下是将每一行存储为文本的最简单方式：\n\
  \n```json\n{\n  \"_id\": ObjectId(...),\n  \"line\": \"10.161.1.73 - corp_xyz_sardar\
  \ [15/July/2015:13:55:36 -0700] \\\"Interface Util\\\" ...\"\n}\n```\n\n虽然这捕获了数据，但对用户来说毫无意义，因此如果您想找出特定服务器的事件，则需要使用正则表达式，这将导致对集合进行全扫描，效率非常低。\n\
  \n相反，您可以从日志文件中提取数据，并将其作为有意义的字段存储在 MongoDB 文档中。\n\n请注意，在设计结构时，使用正确的数据类型非常重要。这不仅节省空间，而且对性能有显著影响。\n\
  \n例如，如果您将日志的日期和时间字段存储为字符串，它不仅会占用更多字节，而且执行日期范围查询也会很困难。如果不使用字符串，而是将日期存储为 UTC 时间戳，它将占用\
  \ 8 个字节，而字符串需要 28 个字节，因此执行日期范围查询会更容易。如您所见，为数据使用正确的类型增加了查询的灵活性。\n\n您将使用以下文档来存储您的监控数据：\n\
  \n```json\n{\n  \"_id\": ObjectID(...),\n  \"Host\": \"\",\n  \"Time\": ISODate(\"\
  \"),\n  \"ParameterName\": \"aa\",\n  \"Value\": 10.23\n}\n```\n\n注意\n\n实际的日志数据可能有额外的字段；如果您捕获所有字段，它将导致文档过大，这是对存储和内存的低效使用。在设计模式时，您应该省略不需要的详细信息。识别出为满足您的要求必须捕获哪些字段非常重要。\n\
  \n在您的场景中，满足报告应用程序要求的最重要信息是以下内容：\n\n`主机` `时间戳` `参数` `值`\n\n### 10.1.2 操作\n\n设计好文档结构后，接下来您将查看需要在系统上执行的各种操作。\n\
  \n\n\n#### 10.1.2.1 插入数据\n\n用于插入数据的方法取决于您的应用程序的写入关注级别。\n\n如果您追求快速的插入速度，并且可以在数据安全性上做出妥协，则可以使用以下命令：\n\
  \n```javascript\ndb.perfpoc.insert({Host:\"Host1\", GeneratedOn: new ISODate(\"\
  2015-07-15T12:02Z\"),ParameterName:\"CPU\",Value:13.13},w=0)\n```\n\n尽管此命令是可用的最快选项，但由于它不会等待操作是否成功的任何确认，您可能会面临丢失数据的风险。\n\
  \n如果您只想要一个至少数据正在被保存的确认，您可以执行以下命令：\n\n```javascript\ndb.perfpoc.insert({Host:\"Host1\"\
  , GeneratedOn: new ISODate(\"2015-07-15T12:07Z\"),ParameterName:\"CPU\",Value:13.23},w=1)\n\
  ```\n\n尽管此命令确认了数据已保存，但它不会提供防止任何数据丢失的保护，因为它没有启用日志记录。\n\n如果您的主要关注点是在增加插入速度和数据安全保证之间进行权衡，您可以执行以下命令：\n\
  \n```javascript\ndb.perfpoc.insert({Host:\"Host1\", GeneratedOn: new ISODate(\"\
  2015-07-15T12:09Z\"),ParameterName:\"CPU\",Value:30.01},j=true,w=2)\n```\n\n在此代码中，您不仅确保数据正在被复制，还启用了日志记录。除了复制确认外，它还会等待成功的日志提交。\n\
  \n**注意**\n虽然这是最安全的选项，但它对插入性能有严重影响，因此是最慢的操作。\n\n#### 10.1.2.2 批量插入\n\n在使用严格的写入关注级别时，批量插入事件总是有益的，正如您的情况，因为这使\
  \ MongoDB 能够将产生的性能损失分摊到一批插入中。\n\n如果可能，应使用批量插入来插入监控数据，因为数据量将会很大，并且在几秒钟内生成。将它们分组在一起作为一组进行插入会有更好的效果，因为在相同的等待时间内，多个事件将被保存。因此，对于此用例，您将使用批量插入将多个事件分组。\n\
  \n#### 10.1.2.3 查询性能数据\n\n您已经看到了如何插入事件数据。维护数据的价值在于，您能够通过查询数据来响应特定的查询。\n\n例如，您可能希望查看与特定字段（例如\
  \ `Host`）关联的所有性能数据。\n\n您将查看一些用于获取数据的查询模式，然后了解如何优化这些操作。\n\n#### 查询 1：获取特定主机的性能数据\n\
  \n```javascript\ndb.perfpoc.find({Host:\"Host1\"})\n```\n```\n{ \"_id\" : ObjectId(\"\
  553dc64009cb76075f6711f3\"), \"Host\" : \"Host1\", \"GeneratedOn\": ISODate(\"2015-07-18T12:02:00Z\"\
  ), \"ParameterName\" : \"CPU\", \"Value\" : 13.13 }\n{ \"_id\" : ObjectId(\"553dc6cb4fd5989a8aa91b2d\"\
  ), \"Host\" : \"Host1\", \"GeneratedOn\": ISODate(\"2015-07-18T12:07:00Z\"), \"\
  ParameterName\" : \"CPU\", \"Value\" : 13.23 }\n{ \"_id\" : ObjectId(\"553dc7504fd5989a8aa91b2e\"\
  ), \"Host\" : \"Host1\", \"GeneratedOn\": ISODate(\"2015-07-18T12:09:00Z\"), \"\
  ParameterName\" : \"CPU\", \"Value\" : 30.01 }\n```\n如果需求是分析主机的性能，则可以使用此查询。\n\n\
  在 `Host` 上创建索引将优化上述查询的性能：\n\n```javascript\ndb.perfpoc.ensureIndex({Host:1})\n```\n\
  \n#### 查询 2：获取 2015 年 7 月 10 日至 2015 年 7 月 20 日日期范围内的数据\n\n```javascript\ndb.perfpoc.find({GeneratedOn:{\"\
  $gte\": ISODate(\"2015-07-10\"), \"$lte\": ISODate(\"2015-07-20\")}})\n```\n```\n\
  { \"_id\" : ObjectId(\"5302fec509904770f56bd7ab\"), \"Host\" : \"Host1\", \"GeneratedOn\"\
  \n...............\n```\n如果您想要考虑和分析特定日期范围内收集的数据，这一点很重要。在这种情况下，\"时间\"上的索引将对性能产生积极影响。\n\
  \n```javascript\ndb.perfpoc.ensureIndex({GeneratedOn:1})\n```\n\n#### 查询 3：获取特定主机在\
  \ 2015 年 7 月 10 日至 2015 年 7 月 20 日日期范围内的数据\n\n```javascript\ndb.perfpoc.find({GeneratedOn:{\"\
  $gte\": ISODate(\"2015-07-10\"), \"$lte\": ISODate(\"2015-07-20\")},Host: \"Host1\"\
  })\n```\n```\n{ \"_id\" : ObjectId(\"5302fec509904770f56bd7ab\"), \"Host\" : \"\
  Host1\", \"GeneratedOn\"\n.................\n```\n如果您想要查看特定时间段内主机的性能数据，此查询非常有用。\n\
  \n在此类涉及多个字段的查询中，所使用的索引对性能有显著影响。例如，对于上述查询，创建复合索引将是有益的。\n\n还需注意复合索引中字段的顺序有影响。让我们通过一个示例来理解差异。创建如下复合索引：\n\
  \n```javascript\ndb.perfpoc.ensureIndex({\"GeneratedOn\":1,\"Host\":1})\n```\n接下来，对此进行解释：\n\
  \n```javascript\ndb.perfpoc.find({GeneratedOn:{\"$gte\": ISODate(\"2015-07-10\"\
  ), \"$lte\": ISODate(\"2015-07-20\")}, Host: \"Host1\"}).explain(\"allPlansExecution\"\
  )\n```\n```\n.......................................................................\n\
  \"allPlansExecution\" : [\n{\n\"nReturned\" : 4,\n\"executionTimeMillisEstimate\"\
  \ : 0,\n\"totalKeysExamined\" : 4,\n\"totalDocsExamined\" : 4\n\"indexName\" : \"\
  GeneratedOn_1_Ho\n.......................................................................\n\
  \"isMultiKey\" : false,\n\"direction\" : \"forward\",\n}]\n.......................................................................\n\
  ```\n删除复合索引，如下所示：\n\n```javascript\ndb.perfpoc.dropIndexes()\n```\n```\n{\n\"nIndexesWas\"\
  \ : 2,\n\"msg\" : \"non-_id indexes dropped for collection\",\n\"ok\" : 1\n}\n```\n\
  或者，创建字段顺序相反的复合索引：\n\n```javascript\ndb.perfpoc.ensureIndex({\"Host\":1,\"GeneratedOn\"\
  :1})\n```\n进行解释：\n\n```javascript\ndb.perfpoc.find({GeneratedOn:{\"$gte\": ISODate(\"\
  2015-07-10\"), \"$lte\": ISODate(\"2015-07-20\")}, Host: \"Host1\"}).explain(\"\
  allPlansExecution\")\n```\n```\n.............................................\n\"\
  executionStats\" : {\n\"executionSuccess\" : true,\n\"nReturned\" : 4,\n\"executionTimeMillis\"\
  \ : 0,\n\"totalKeysExamined\" : 4,\n\"totalDocsExamined\" : 4,\n......................................................\n\
  \"allPlansExecution\" : [ ]\n....................................................\n\
  }\n```\n您可以看到 `explain` 命令输出中的差异。\n\n使用 `explain()`，您可以弄清楚索引的影响，并据此根据您的应用程序使用情况决定索引策略。\n\
  \n还建议使用覆盖最多查询的单个复合索引，而不是多个单键索引。\n\n根据您的应用程序使用情况和 `explain` 统计信息的结果，您将仅使用一个复合索引 `{'GeneratedOn':1,\
  \ 'Host': 1}` 来覆盖所有上述查询。\n\n#### 查询 4：按主机和日期获取性能数据的数量\n\n列出数据很好，但通常对性能数据执行查询是为了在分析时找出计数、平均值、总和或其他聚合操作。在这里，您将看到如何使用\
  \ `aggregate` 命令来选择、处理和聚合结果，以满足强大的临时查询需求。\n\n为了进一步解释这一点，让我们编写一个按月计数数据的查询：\n\n```javascript\n\
  db.perfpoc.aggregate(\n... [\n... {$project: {month_joined: {$month: \"$GeneratedOn\"\
  }}},\n... {$group: {_id: {month_joined: \"$month_joined\"}, number: {$sum:1}}},\n\
  ... {$sort: {\"_id.month_joined\":1}}\n... ]\n... )\n```\n```\n{ \"_id\" : { \"\
  month_joined\" : 7 }, \"number\" : 4 }\n```\n为了优化性能，您需要确保筛选字段有索引。您已经创建了一个覆盖相同内容的索引，因此在此场景中您无需创建任何额外的索引。\n\
  \n\n\n### 10.1.3 分片\n\n性能监控数据集非常庞大，因此迟早会超过单台服务器的容量。因此，您应考虑使用分片集群。\n\n在本节中，您将了解哪种分片键适合您的性能数据使用场景，以便将负载分散到集群中，避免单台服务器过载。\n\
  \n分片键控制着数据的分布方式，并直接影响系统处理查询和写入的能力。理想的分片键应具备以下两个特点：\n\n*   插入操作在分片集群中保持平衡。\n*   大多数查询可以被定向到部分分片上得到满足。\n\
  \n让我们看看哪些字段可以用作分片键。\n\n**时间字段：** 选择此选项，虽然数据会在分片间均匀分布，但无论是插入还是读取都不会平衡。就像性能数据的情况一样，时间字段是单调递增的，因此所有插入最终都会落到单个分片上，写入吞吐量将与独立实例相同。假设您经常需要查看最新数据，那么大多数读取操作最终也会落在同一个分片上。\n\
  \n**哈希值：** 您也可以考虑使用随机值来应对上述情况；可以考虑将 `_id` 字段的哈希值作为分片键。虽然这能解决上述的写入问题（即写入会被分布开），但会影响查询。在这种情况下，查询必须广播到所有分片，无法被定向到特定分片。\n\
  \n**使用均匀分布的字段，例如主机名。** 这具有以下优点：如果查询选择了 `host` 字段，读取将是选择性的，并且仅限于单个分片，写入也是平衡的。然而，最大的潜在缺点是，由于所有文档都具有相同的分片键，为单个主机收集的所有数据必须进入同一个块。如果数据是跨所有主机收集的，这不会成为问题；但如果监控为某个主机收集了不成比例的大量数据，您最终可能会得到一个非常大的块，这个块可能完全无法再分裂，导致负载不平衡地集中在一个分片上。\n\
  \n**结合方案二和三的优点，** 您可以使用一个复合分片键，例如 `{host:1, ssk: 1}`，其中 `host` 是文档的主机字段，`ssk` 是\
  \ `_id` 字段的哈希值。在这种情况下，数据主要根据 `host` 字段进行分布，使得访问 `host` 字段的查询被局部化到单个分片或一组分片上。同时，使用\
  \ `ssk` 确保了数据在集群中均匀分布。在大多数情况下，这种键不仅能确保写入在集群中理想地分布，还能确保查询仅访问与其相关的特定数量的分片。\n\n尽管如此，最好的方法是分析应用程序实际的查询和插入模式，然后选择一个合适的分片键。\n\
  \n### 10.1.4 管理数据\n\n由于性能数据量巨大且持续增长，您可以定义一个数据保留策略，规定您将维护数据一段指定的时期（例如 6 个月）。\n\n\
  那么如何删除旧数据呢？您可以使用以下模式：\n\n**使用多个集合存储数据：** 第三种模式是创建按天分的集合，其中包含存储当天性能数据的文档。这样，您最终会在一个数据库中有多个集合。虽然这会使查询复杂化（为了获取两天的数据，您可能需要从两个集合中读取），但删除集合的操作很快，并且空间可以被有效重用，不会产生数据碎片。在您的用例中，您正在使用此模式来管理数据。\n\
  \n**使用固定集合：** 虽然固定集合可用于存储性能数据，但无法对固定集合进行分片。\n\n**使用 TTL 集合：** 此模式创建一个类似于固定集合的集合，但它可以被分片。在这种情况下，会在集合上定义一个生存时间索引，使\
  \ MongoDB 能够定期从集合中 `remove()` 旧的文档。然而，这不具备固定集合的性能优势；此外，`remove()` 操作可能导致数据碎片。\n\n\
  ## 10.2 用例二 – 社交网络\n\n在本节中，您将探讨如何使用 MongoDB 来存储和检索社交网站的数据。\n\n此用例基本是一个友好的社交网站，允许用户分享他们的状态和照片。为此用例提供的解决方案基于以下假设：\n\
  \n*   用户可以选择是否关注其他用户。\n*   用户可以决定与哪些圈子的用户分享更新。圈子选项包括：朋友、朋友的朋友、公开。\n*   允许的更新包括状态更新和照片。\n\
  *   用户资料显示兴趣、性别、年龄和感情状况。\n\n\n\n### 10.2.1 模式设计\n\n你所提供的解决方案旨在最小化展示任意给定页面所需加载的文档数量。所讨论的应用程序有两个主要页面：第一个页面展示用户的个人墙（旨在展示由特定用户创建或指向该用户的帖子），以及一个社交新闻页面，该页面展示所有关注该用户的人或该用户所关注的人的所有通知和活动。\n\
  \n除了这两个页面，还有一个用户个人资料页面，用于展示用户与个人资料相关的详细信息，并包含其好友圈（关注他的人或他关注的人）的信息。为了满足此需求，此用例的模式包含以下集合。\n\
  \n第一个集合是 `user.profile`，它存储用户的个人资料相关数据：\n\n```json\n{\n    _id: \"用户定义的唯一标识符\",\n\
  \    UserName: \"用户名\",\n    ProfilDetaile: {Age:.., Place:.., Interests: ...etc},\n\
  \    FollowerDetails: {\n        \"User_ID\":{name:..., circles: [circle1, circle2]},\
  \ ....\n    },\n    CirclesUserList: {\n        \"Circle1\": {\"User_Id\":{name:\
  \ \"username\"}, ......},\n        .......\n    },\n    ListBlockedUserIDs: [\"\
  user1\",...]\n}\n```\n\n*   在这种情况下，你是手动指定 `_id` 字段。\n*   `Follower` 列出了关注此用户的用户。\n\
  *   `CirclesUserList` 包含此用户正在关注的好友圈。\n*   `Blocked` 包含用户已阻止查看其更新的用户。\n\n第二个集合是 `user.posts`\
  \ 集合，其模式如下：\n\n```json\n{\n    _id: ObjectId(...),\n    by: {id: \"用户 id\", name:\
  \ \"用户名\"},\n    VisibleTocircles: [],\n    PostType: \"帖子类型\",\n    ts: ISODate(),\n\
  \    Postdetail: {\n        text: \"\",\n        Comments_Doc: [\n            {Commentedby:\
  \ {id: \"user_id\", name: \"用户名\"}, ts: ISODate(), Commenttext: \"评论内容\"}, .....\n\
  \        ]\n    }\n}\n```\n\n*   此集合基本上用于展示用户的所有活动。`by` 提供发布帖子的用户信息。`Circles` 控制帖子对其他用户的可见性。`Type`\
  \ 用于标识帖子内容。`ts` 是帖子创建的日期时间。`detail` 包含帖子文本，其中内嵌了评论。\n*   一个 `comment` 文档包含以下详情：`by`\
  \ 提供评论用户的用户 id 和姓名详情，`ts` 是评论时间，`text` 是用户发布的实际评论。\n\n第三个集合是 `user.wall`，它用于在瞬间渲染用户的个人墙页面。此集合从第二个集合获取数据并以汇总格式存储，以便快速渲染墙页面。该集合格式如下：\n\
  \n```json\n{\n    _id: ObjectId(...),\n    User_id: \"用户 id\",\n    PostMonth: \"\
  201507\",\n    PostDetails: [\n        {\n            _id: ObjectId(..), ts: ISODate(),\
  \ by: {_id: .., Name:.. }, circles: [..], type: ....,\n            detail: {text:\
  \ \"...\"}, comments_shown: 3,\n            comments: [\n                {by: {_id:.,\
  \ Name:....}, ts: ISODate(), text:\"\"}, ......\n            ]\n        },....\n\
  \    ]\n}\n```\n\n*   如你所见，你是按用户、按月维护此文档。首次显示的评论数量是有限的（此例中为 3 条）；如果需要为该特定帖子显示更多评论，则需要查询第二个集合。\n\
  *   换句话说，它是一种用于快速加载用户个人墙页面的汇总视图。\n\n第四个集合是 `social.posts`，它用于快速渲染社交新闻屏幕。这是显示所有帖子的屏幕。与第三个集合类似，第四个集合也是一个依赖集合。它包含了许多与\
  \ `user.wall` 信息相同的内容，因此为了清晰起见，此文档已被缩写：\n\n```json\n{\n    _id: ObjectId(...),\n\
  \    user_id: \"用户 id\",\n    postmonth: '2015_07',\n    postlists: [ ... ]\n}\n\
  ```\n\n"
- "# 10.2.2 操作\n\n这些模式针对读取性能进行了优化。\n\n#### 10.2.2.1 查看帖子\n\n由于 `social.posts` 和 `user.wall`\
  \ 集合针对在瞬间渲染新闻流或墙贴进行了优化，因此查询相当直接。这两个集合具有类似的模式，因此获取操作可以由相同的代码支持。以下是相同的伪代码。该函数接受以下参数作为参数：\n\
  \n*   需要查询的集合。\n*   需要查看其数据的用户。\n*   月份是一个可选参数；如果指定，它应列出日期小于或等于指定月份的所有帖子。\n\n```\n\
  Function Fetch_Post_Details (Parameters: CollectionName, View_User_ID, Month)\n\
  SET QueryDocument to {\"User_id\": View_User_ID}\nIF Month IS NOT NULL\nAPPEND Month\
  \ Filter [\"Month\":{\"$lte\":Month}] to QueryDocument\nSet O_Cursor = (resultset\
  \ of the collection after applying the QueryDocument filter)\nSet Cur = (sort O_Cursor\
  \ by \"month\" in reverse order)\nwhile records are present in Cur\nPrint record\n\
  End while\nEnd Function\n```\n\n上述函数以倒序时间顺序检索给定用户墙或新闻流上的所有帖子。\n\n在渲染帖子时，需要应用某些检查。以下是其中一些。\n\
  \n首先，当用户查看自己页面时，在渲染墙上的帖子时，你需要检查该帖子是否可以在其自己的墙上显示。用户墙包含他发布的帖子或他关注的用户的帖子。以下函数接受两个参数：墙所属的用户和正在渲染的帖子：\n\
  \n```\nfunction Check_VisibleOnOwnWall (Parameters: user, post)\nWhile Loop_User\
  \ IN user.Circles List\nIf post by = Loop_User\nreturn true\nelse\nreturn false\n\
  end while\nend function\n```\n\n上述循环遍历在 `user.profile` 集合中指定的好友圈，如果提到的帖子是由列表中的用户发布的，则返回\
  \ true。\n\n此外，你还需要处理用户屏蔽列表中的用户：\n\n```\nfunction ReturnBlockedOrNot(user, post)\n\
  if post by user id not in user blocked list\nreturn true\nelse\nreturn false\nendfunction\n\
  ```\n\n当用户查看另一个用户的墙时，你还需要处理权限检查：\n\n```\nFunction visibleposts(parameter user, post)\n\
  if post circles is public\nreturn true\nIf post circles is public to all followed\
  \ users\nReturn true\nset listofcircles = followers circle whose user_id is the\
  \ post's by id.\nif listofcircles in post's circles\nreturn true\nreturn false\n\
  end function\n```\n\n此函数首先检查帖子的圈组是否为公开。如果是公开的，该帖子将对所有用户显示。如果帖子的圈组未设置为公开，但如果他/她正在关注该用户，则该帖子将显示给该用户。如果两种情况都不成立，则它会检查所有关注登录用户的用户的圈组。如果圈组列表在帖子的圈组列表中，这意味着用户位于接收该帖子的圈组中，因此该帖子将可见。如果两个条件都不满足，该帖子将对该用户不可见。\n\
  \n为了获得更好的性能，你需要在 `social.posts` 和 `user.wall` 集合中对 `user_id` 和 `month` 建立索引。\n\n\
  \n\n#### 10.2.2.2 创建评论\n\n要为给定帖子创建一条包含给定文本的用户评论，你需要执行类似下面的代码：\n\n```\nFunction postcomment(\n\
  \    Parameters: commentedby, commentedonpostid, commenttext)\n    Set commentedon\
  \ to current datetime\n    Set month to month of commentedon\n    Set comment document\
  \ as {\"by\": {id: commentedby[id], \"Name\": commentedby[\"name\"]}, \"ts\": commentedon,\
  \ \"text\": commenttext}\n    Update user.posts collection. Push comment document.\n\
  \    Update user.walls collection. Push the comment document.\n    Increment the\
  \ comments_shown in user.walls collection by 1.\n    Update social.posts collection.\
  \ Push the comment document.\n    Increment the comments_shown counter in social.posts\
  \ collection by 1.\nEnd function\n```\n\n由于你在两个依赖集合（`user.wall` 和 `social.posts`\
  \ 集合）中最多只显示三条评论，你需要定期运行以下更新语句：\n\n```\nFunction MaintainComments\n    SET MaximumComments\
  \ = 3\n    Loop through social.posts\n        If posts.comments_shown > MaximumComments\n\
  \            Pop the comment which was inserted first\n            Decrement comments_shown\
  \ by 1\n        End if\n    Loop through user.wall\n        If posts.comments_shown\
  \ > MaximumComments\n            Pop the comment which was inserted first\n    \
  \        Decrement comments_shown by 1\n        End if\n    End loop\nEnd Function\n\
  ```\n\n为了快速执行这些更新，你需要为 `posts.id` 和 `posts.comments_shown` 创建索引。\n\n#### 创建新帖\n\n\
  此代码中的基本操作序列如下：\n\n帖子首先被保存到“记录系统”，即 `user.posts` 集合。接下来，帖子被更新到 `user.wall` 集合。最后，根据帖子所属的圈子，更新所有圈子内用户的\
  \ `social.posts` 集合。\n\n```\nFunction createnewpost\n    (parameter createdby, posttype,\
  \ postdetail, circles)\n    Set ts = current timestamp.\n    Set month = month of\
  \ ts\n    Set post_document = {\"ts\": ts, \"by\":{id:createdby[id], name: createdby[name]},\
  \ \"circles\":circles, \"type\":posttype, \"details\":postdetails}\n    Insert post_document\
  \ into users.post collection\n    Append post_document into user.walls collection\n\
  \    Set userlist = all users who’s circled in the post based on the posts circle\
  \ and the posted user id\n    While users in userlist\n        Append post_document\
  \ to users social.posts collection\n    End while\nEnd function\n```\n\n### 10.2.3\
  \ 分片\n\n可以通过对上述四个集合进行分片来实现扩展。由于 `user.profile`、`user.wall` 和 `social.posts` 包含特定于用户的文档，`user_id`\
  \ 是这些集合的完美分片键。`_id` 是 `users.post` 集合的最佳分片键。\n\n## 10.3 本章小结\n\n在本章中，你通过两个用例探讨了如何使用\
  \ MongoDB 来解决特定问题。下一章，我们将列出 MongoDB 的局限性以及它不太适用的用例。\n\n## 11. MongoDB 的局限性\n\n>\
  \ “开始使用一个新数据库时，你也应该了解其局限性，以便更好地使用它。”\n\n在本章中，我们将列出 MongoDB 的局限性以及它不太适用的用例。\n\n###\
  \ 11.1 MongoDB 占用空间过大（适用于 MMAPv1）\n\n让我们从磁盘空间问题开始。MongoDB（使用 MMAPv1 存储引擎）占用空间太大；换句话说，数据目录文件比数据库的实际数据大。\n\
  \n这是由于预分配的数据文件造成的。这是为了防止文件系统碎片化而设计的。\n\n数据目录中的文件被命名为 `<dbname>.0`、`<dbname>.1` 等。`mongod`\
  \ 分配的第一个文件大小为 64MB；之后所有文件的大小都以 2 的倍数增长，因此第二个文件为 128MB，第三个文件为 256MB，依此类推，直到达到 2GB，之后所有文件大小都为\
  \ 2GB。虽然空间在创建时已分配给数据文件，但有些文件可能有 90% 是空的。这种未使用的分配空间在较大的数据库中通常占比较小。\n\n*   可以使用 `--\
  \ noprealloc` 选项禁用此选项。但是，不建议在生产环境中使用，它应仅用于测试以及频繁调用 drop database 的小型数据集。\n*   Oplog：如果\
  \ `mongod` 是副本集成员，那么数据目录中将有一个名为 `oplog.rs` 的文件。此文件存在于 `local` 数据库中，是一个预分配的固定集合。在\
  \ 64 位安装中，此文件的分配默认为磁盘空间的约 5%。\n*   日志：日志文件也包含在数据目录中，用于在 MongoDB 将写入操作应用到数据库之前，先将这些写操作存储在磁盘上。\n\
  *   MongoDB 为日志预分配 3GB 的数据，这超出了实际数据库的大小，使其不适合小型安装。解决方法是在你的命令行标志或 `/etc/mongod.conf`\
  \ 文件中使用 `–smallflags`，直到你运行在有足够磁盘空间的环境中。但这个特性使其不适合小型安装。\n*   空记录：当文档或集合被删除时，空间永远不会返回给操作系统；相反，MongoDB\
  \ 会维护一个这些空记录的列表，以便重用。\n\n要回收这些已删除的空间，可以使用 `compact` 或 `repairDatabase` 选项，但请注意，这两个选项都需要额外的磁盘空间才能运行。\n\
  \n注意\n\nWiredTiger 存储引擎不存在此限制。相反，由于数据文件的压缩，存储大小减少了 50%。此外，一旦集合被删除，磁盘空间会自动回收，这与上述\
  \ MMAPv1 存储引擎不同。\n\n## 11.2 内存问题（适用于 MMAPv1 存储引擎）\n\n在 MongoDB 中，内存是通过内存映射整个数据集来管理的。它允许操作系统控制内存映射并分配最大量的\
  \ RAM。结果是性能并非最优，并且无法有效推断内存使用情况。\n\n索引是内存密集型的；换句话说，索引会占用大量 RAM。由于这些是 B 树索引，定义许多索引可能导致系统资源消耗过快。其后果是内存会在需要时自动分配。在共享环境中运行数据库更为棘手。总的来说，与所有数据库服务器一样，最好在专用服务器上运行\
  \ MongoDB。\n\n### 11.3 32 位与 64 位\n\nMongoDB 提供两个版本：32 位和 64 位。\n\n由于 MongoDB 使用内存映射文件，32\
  \ 位版本仅限存储约 2GB 的数据。如果你需要存储更多数据，应使用 64 位版本。\n\n从 3.0 版本开始，MongoDB 不再为 32 位版本提供商业支持。此外，32\
  \ 位版本的 MongoDB 不支持 WiredTiger 存储引擎。\n\n### 11.4 BSON 文档\n\n本节介绍 BSON 文档的限制。\n\n\
  *   大小限制：与其他数据库一样，文档中可存储的内容有限制。当前版本支持最大 16MB 大小的文档。此最大值确保单个文档在传输过程中不会占用过多的 RAM 或过多的带宽。\n\
  *   嵌套深度限制：在 MongoDB 中，BSON 文档的嵌套层级不超过 100 层。\n*   字段名：如果你存储 1000 个键为 “col1” 的文档，那么该键会在数据集中存储那么多次。虽然\
  \ MongoDB 支持任意文档，但实际上大多数字段名是相同的。保持简短的字段名被认为是优化空间使用的良好实践。\n\n\n\n## 11.5 命名空间限制\n\
  \n请注意从命名空间角度出发的以下限制。\n\n*   **命名空间长度**：每个命名空间的长度（包括集合和数据库名称）必须小于 123 字节。\n*   **命名空间文件大小**（适用于\
  \ MMAPv1 存储引擎）：命名空间文件大小不能大于 2047MB。默认大小为 16MB；但是，这可以通过 `nssize` 选项进行配置。\n*   **命名空间数量**（适用于\
  \ MMAPv1 存储引擎）：命名空间数量 = （命名空间文件大小 / 628）。一个 16MB 的命名空间文件将支持大约 24,000 个命名空间。\n\n\
  > **注意**\n>\n> WiredTiger 存储引擎不存在此类限制。\n\n## 11.6 索引限制\n\n本节介绍 MongoDB 中索引的限制。\n\
  \n*   **索引大小**：索引项不能大于 1024 字节。\n*   **每个集合的索引数量**：每个集合最多允许 64 个索引。\n*   **索引名称长度**：默认情况下，索引名称由字段名称和索引方向组成。包括命名空间（即数据库和集合名称）在内的索引名称不能大于\
  \ 128 字节。如果默认索引名称变得过长，您可以向 `ensureIndex()` 辅助方法显式指定一个索引名称。\n*   **分片集合中的唯一索引**：只有当完整分片键作为唯一索引的前缀包含时，才在分片间支持该唯一索引；否则，该唯一索引不在分片间支持。在这种情况下，唯一性是在整个键上强制执行的，而不是在单个字段上。\n\
  *   **复合索引中的索引字段数量**：不能超过 31 个字段。\n\n## 11.7 固定集合限制 - 固定集合中的最大文档数\n\n如果使用 `max`\
  \ 参数来指定固定集合中的最大文档数，则该值不能超过 2³² 个文档。但是，如果不使用此参数，则对文档数量没有限制。\n\n## 11.8 分片限制\n\n分片是在分片间拆分数据的机制。以下部分介绍了在处理分片时需要注意的限制。\n\
  \n### 11.8.1 尽早分片以避免问题\n\n使用分片键，数据被拆分成块，然后自动分布到各个分片上。但是，如果分片实施较晚，可能会导致服务器变慢，因为块的拆分和迁移需要时间和资源。\n\
  \n一个简单的解决方案是使用诸如 MongoDB Cloud Manager 之类的工具监控您的 MongoDB 实例容量（刷新时间、锁百分比、队列长度和故障是很好的度量指标），并在达到估计容量的\
  \ 80% 之前进行分片。\n\n### 11.8.2 分片键无法更新\n\n一旦文档插入到集合中，分片键就无法更新，因为 MongoDB 使用分片键来确定文档应路由到哪个分片。如果要更改文档的分片键，建议的解决方案是在更改完成后删除该文档并重新插入。\n\
  \n### 11.8.3 集合分片限制\n\n集合应在达到 256GB 之前进行分片。\n\n### 11.8.4 选择正确的分片键\n\n选择正确的分片键非常重要，因为一旦选定就很难更正。\n\
  \n> **注意**\n>\n> 什么是错误的分片键完全取决于应用程序。假设应用程序是一个新闻源；选择时间戳字段作为分片键将是错误的分片键，因为这将最终只向一个分片插入、查询和迁移数据，而不是整个集群。如果需要更正分片键，通常使用的过程是转储并恢复集合。\n\
  \n## 11.9 安全限制\n\n安全对于数据库来说是一个重要问题。让我们从安全角度来看 MongoDB 的限制。\n\n### 11.9.1 默认无身份验证\n\
  \n虽然默认情况下未启用身份验证，但它得到完全支持，并且可以轻松启用。\n\n### 11.9.2 与 MongoDB 的通信流量未加密\n\n默认情况下，与\
  \ MongoDB 的通信流量是未加密的。在公共网络上运行时，请考虑对通信进行加密；否则可能对您的数据构成威胁。公共网络上的通信可以使用 MongoDB 的 SSL\
  \ 支持版本进行加密，该版本仅在 64 位版本中可用。\n\n## 11.10 读写限制\n\n以下部分涵盖了重要限制。\n\n### 11.10.1 大小写敏感查询\n\
  \n默认情况下，MongoDB 是大小写敏感的。\n\n例如，以下两个命令将返回不同的结果：`db.books.find({name: 'PracticalMongoDB'})`\
  \ 和 `db.books.find({name: 'practicalmongodb'})`。您应确保知道数据以何种大小写存储。虽然可以使用正则表达式搜索，如\
  \ `db.books.find({name: /practicalmongodb/i})`，但这并不理想，因为它们相对较慢。\n\n### 11.10.2 类型敏感字段\n\
  \n由于 MongoDB 中的文档没有强制的模式，它无法知道您是否犯了错误。您必须确保对数据使用正确的类型。\n\n### 11.10.3 无 JOIN\n\n\
  MongoDB 中不支持 JOIN。如果需要从多个集合中检索数据，必须进行多次查询。但是，您可以重新设计模式，将相关数据保存在一起，以便在单个查询中检索信息。\n\
  \n### 11.10.4 事务\n\nMongoDB 仅支持单文档原子性。由于写操作可以修改多个文档，因此该操作不是原子的。但是，您可以使用隔离操作符来隔离影响多个文档的写操作。\n\
  \n#### 11.10.4.1 副本集限制 - 副本集成员数量\n\n副本集用于确保 MongoDB 中的数据冗余。一个成员充当主成员，其余成员充当次成员。由于\
  \ MongoDB 投票的工作方式，您必须使用奇数个成员。\n\n这是因为一个节点需要获得多数票才能成为主节点。如果您使用偶数个节点，最终会陷入僵局，因为没有一个成员能获得多数票，因此无法选出主节点。在这种情况下，副本集将变为只读。\n\
  \n您可以使用仲裁者来打破这种僵局。它们可以帮助支持故障转移并节省成本。要了解更多关于副本集的功能，请参考第 7 章。\n\n## 11.11 MongoDB\
  \ 不适用的范围\n\nMongoDB 不适用于以下场景：\n\n*   高度事务性的系统，如会计或银行系统。传统的关系型数据库管理系统仍然更适用于需要大量原子性复杂事务的应用程序。\n\
  *   传统的商业智能应用程序，其中针对特定问题的 BI 数据库会生成高度优化的查询。对于此类应用程序，数据仓库可能是更合适的选择。\n*   需要复杂 SQL\
  \ 查询的应用程序。\n*   MongoDB 不支持事务操作，因此银行系统肯定不能使用它。\n\n## 11.12 总结\n\n在本章中，您了解了 MongoDB\
  \ 的限制以及它不太适合的使用场景。\n\n在下一章中，我们将介绍 MongoDB 的操作指南。\n\n\n\n"
- "# 12. MongoDB 最佳实践\n\n> “入门 MongoDB 很容易，但一旦开始开发应用程序，您会遇到各种场景，此时可能需要最佳实践来实现特定用例。”\n\
  \n在之前的章节中，您已经熟悉了 MongoDB。本章旨在概述已知的问题并借鉴其他用户的经验，同时提供各种“操作指南”，帮助您顺利使用 MongoDB。\n\n\
  如您所知，MongoDB 以文档方式工作，使用 RAM 存储数据以提升性能，并使用复制和分片来进一步提供数据安全性和可扩展性。\n\n本章将涵盖您应该注意的提示，从部署策略到增强查询，再到数据安全与一致性，以及监控。\n\
  \n## 12.1 部署\n\n在决定部署策略时，请牢记以下提示，以便正确完成硬件规模评估。这些提示也将帮助您决定是否使用分片和复制。\n\n*   **数据集大小**：最重要的一点是确定当前和预期的数据集大小。这不仅能让您为单个物理节点选择资源，也有助于规划分片方案（如果有）。\n\
  *   **数据重要性**：第二重要的是确定数据的重要性，以评估数据的重要程度以及您对任何数据丢失或数据延迟（尤其是在复制情况下）的容忍度。\n*   **内存规模**：下一步是确定内存需求，并相应地处理\
  \ RAM。与其他面向数据的应用程序一样，当整个数据集可以驻留在内存中时，MongoDB 的工作效果最佳，从而避免任何磁盘 I/O。页面错误表明您可能超出了可用部署的内存，应考虑增加它。页面错误是一个可以通过监控工具（如\
  \ MongoDB Cloud Manager）衡量的指标。如果可能，您应始终选择内存大于工作集大小的平台。如果大小超过单个节点的内存，您应考虑使用分片，以便可以增加可用内存量。这可以最大化整个部署的性能。\n\
  *   **磁盘类型**：如果速度不是主要关注点，或者数据集大于任何内存策略所能支持的大小，那么选择适当的磁盘类型就非常重要。IOPS（每秒输入/输出操作次数）是选择磁盘类型的关键；IOPS\
  \ 越高，MongoDB 性能越好。如果可能，应使用本地磁盘，因为网络存储可能导致性能低下和延迟高。还建议在创建磁盘阵列时（在可能的情况下）使用 RAID 10。\n\
  *   **CPU**：如果您预计要使用 map reduce，那么时钟速度和可用处理器将成为重要的考虑因素。当您运行一个 `mongod` 且大部分数据在内存中时，时钟速度也会对整体性能产生重大影响。在您希望最大化每秒操作数的情况下，您必须考虑在部署策略中包含具有高时钟/总线速度的\
  \ CPU。\n*   如果高可用性是要求之一，则使用复制。在任何 MongoDB 部署中，设置一个至少包含三个节点的副本集应该是标准做法。2x1 部署是具有三个节点的最常见的复制配置，其中有两个节点在一个数据中心，一个备用节点在辅助数据中心，如图\
  \ 12-1 所示。\n\n    ![A332296_1_En_12_Fig1_HTML.gif](img/A332296_1_En_12_Fig1_HTML.gif)\n\
  \    *图 12-1. MongoDB 2*1 部署*\n\n### 12.1.1 MongoDB 网站提供的硬件建议\n\n以下内容仅旨在为 MongoDB\
  \ 部署提供高层指导。实际的硬件配置取决于您的数据、可用性要求、查询、性能标准和所选硬件组件的能力。\n\n*   **内存**：由于 MongoDB 广泛使用内存以获得更好的性能，内存越多，性能越好。\n\
  *   **存储**：MongoDB 可以使用 SSD（固态硬盘）或本地连接存储。由于 MongoDB 的磁盘访问模式不具有顺序特性，使用 SSD 可以让客户体验到显著的性能提升。使用\
  \ SSD 的另一个好处是，如果工作集不再适合内存，它们可以提供性能的平缓下降。大多数 MongoDB 部署应使用 RAID-10。当使用 WiredTiger\
  \ 存储引擎时，由于性能问题，强烈建议使用 XFS 文件系统。另外，不要使用大页面，因为 MongoDB 在默认虚拟内存页面下表现更好。\n*   **CPU**：由于使用\
  \ MMAPv1 存储引擎的 MongoDB 很少遇到需要大量核心的工作负载，因此优选使用具有较快速时钟速度的服务器，而不是核心较多但时钟速度较慢的服务器。然而，WiredTiger\
  \ 存储引擎是 CPU 密集型的，因此使用具有多个核心的服务器将提供显著的性能改进。\n\n### 12.1.2 需要注意的几点\n\n总结本节，为 MongoDB\
  \ 选择硬件时，请考虑以下重要点：\n\n更快的 CPU 时钟速度和更多的 RAM 对生产力很重要。由于 MongoDB 不执行大量计算，增加核心数量有帮助，但使用\
  \ MMAPv1 存储引擎时不会提供高水平的边际回报。使用 SATA SSD 和 PCI（Peripheral Component Interconnect）提供了良好的性价比和良好结果。将资金用于商用\
  \ SATA 机械硬盘更有效。**NUMA 硬件上的 MongoDB**：此点仅适用于在 Linux 中运行的 `mongod`，不适用于在 Windows 或其他类\
  \ Unix 系统上运行的实例。NUMA（非统一内存访问）和 MongoDB 不能很好地协同工作，因此在 NUMA 硬件上运行 MongoDB 时，您需要为 MongoDB\
  \ 禁用 NUMA 并使用交叉内存策略运行，因为 NUMA 会导致 MongoDB 出现许多操作问题，包括一段时间内的性能缓慢或高处理器使用率。\n\n\n\n\
  ## 12.2 编码\n\n一旦获得硬件，在编写数据库代码时请考虑以下建议：\n\n### 数据模型选择\n\n首要的一点是，根据给定的应用需求思考要使用的数据模型，并决定采用嵌入、引用还是两者混合的方式。更多相关内容，请参阅第\
  \ tk 章。在快速性能和保证即时一致性之间需要做出权衡，因此请根据您的应用程序来决定。\n\n### 避免文档无限增长\n\n应避免导致文档大小无限增长的应用程序模式。在\
  \ MongoDB 中，单个 BSON 文档的最大尺寸为 16MB。应避免使文档以无界方式增长的应用程序模式。例如，应用程序不应以导致文档显著增大的方式更新文档。当文档大小超过分配的大小时，MongoDB\
  \ 将重新定位该文档。这个过程不仅耗时，而且资源密集，并可能不必要地减慢其他数据库操作。此外，它还可能导致存储空间利用效率低下。请注意，上述限制适用于 MMAPv1\
  \ 存储引擎。使用 WiredTiger 时，每次更新都会重写文档。\n\n例如，考虑一个博客应用程序。在此应用中，很难估计一篇博客文章会收到多少回复。应用程序被设定为仅向用户显示一部分评论，比如最近的评论或前\
  \ 10 条评论。在这种情况下，与其创建一个将博客文章和用户响应维护为单个文档的嵌入模型，您应该创建一个引用模型，其中每个响应或响应组作为单独的文档维护，然后在这些文档中添加对博客文章的引用。通过这种方式，可以控制文档的无限增长——如果遵循第一种嵌入数据的模式，这种增长就会发生。\n\
  \n### 为未来设计文档\n\n您也可以为未来设计文档。尽管 MongoDB 提供了根据需要向文档中追加新字段的选项，但这有一个缺点。当引入新字段时，可能会出现文档无法容纳在当前可用空间中的情况，导致\
  \ MongoDB 为文档寻找新空间并将其移动过去，这可能需要时间。因此，如果您了解文档结构，无论当时是否有数据可用，最好一开始就创建所有字段。如上所述，空间将被分配给文档，当有值时只需进行更新。这样做，MongoDB\
  \ 就不必寻找空间；它只需更新输入的值，这样速度要快得多。\n\n### 预设文档大小\n\n在适用的情况下，也可以创建具有预期大小的文档。这一点也是为了确保为文档分配足够的空间，任何进一步的增长都不会导致为寻找空间而四处转移。这可以通过使用一个“垃圾”字段来实现，该字段在最初插入文档时包含一个预期大小的字符串，然后立即取消设置该字段：\n\
  ```javascript\n> mydbcol.insert({\"_id\" : ObjectID(..),......, \"tempField\" :\
  \ stringOfAnticipatedSize})\n> mydbcol.update({\"_id\" : ...}, {\"$unset\" : {\"\
  tempField\" : 1}})\n```\n\n### 子文档 vs 数组\n\n当您知道并且将始终知道要访问的字段名称时，应始终使用子文档。否则，请使用数组。\n\
  \n### 存储计算结果\n\n如果您想查询的信息必须经过计算而未明确存在于文档中，最佳选择是在文档中使该信息明确。由于 MongoDB 旨在仅存储和检索数据，它本身不执行任何计算。任何琐碎的计算都被推送到客户端，从而导致性能问题。\n\
  \n### 避免使用 `$Where`\n\n另外，尽可能避免使用 `$Where`，因为它是一个极其耗时且资源密集的操作。\n\n### 使用正确的数据类型\n\
  \n在设计文档时使用正确的数据类型。例如，数字应仅存储为数字数据类型，而不是字符串数据类型。使用字符串存储数据会占用更多空间，并对可以对数据执行的操作产生影响。\n\
  \n### 字符串大小写敏感性\n\n另一件需要注意的事情是，MongoDB 中的字符串是区分大小写的。因此，搜索 `\"practicalMongoDB\"\
  ` 将找不到 `\"Practicalmongodb\"`。因此，在进行字符串搜索时，您可以执行以下操作之一：\n*   以规范化大小写格式存储数据。\n* \
  \  搜索时使用带有 `/I` 的正则表达式。\n*   在聚合框架中使用 `$toUpper` 或 `$toLower`。\n\n### 自定义 _id 主键\n\
  \n使用您自己的唯一键作为 `_id` 将节省一点空间，并且如果您计划对该键建立索引，这将很有用。但是，在决定使用自己的键作为 `_id` 时，需要牢记以下几点：\n\
  *   您必须确保该键的唯一性。\n*   同时，请考虑键的插入顺序，因为插入顺序将决定维护此索引需要使用多少 RAM。\n\n### 只返回需要的字段\n\n\
  按需检索字段。当每秒需要满足成百上千个请求时，只获取所需字段无疑是有利的。\n\n### 使用 GridFS\n\n仅当数据大于单个文档所能容纳的大小或太大而无法在客户端一次性加载时（例如视频），才使用\
  \ GridFS 存储。任何将流式传输给客户端的数据都是 GridFS 的良好候选。\n\n### 使用 TTL 自动删除文档\n\n使用 TTL（生存时间）删除文档。如果集合中的文档需要在预定义的时间段后被删除，则可以使用\
  \ TTL 功能在文档达到预定义的存在时间后自动删除。\n\n假设您有一个集合，其中存储了包含用户与系统交互详细信息的文档。这些文档有一个名为 `lastActivity`\
  \ 的日期字段，用于跟踪用户与系统的交互。假设您有一个需求，要求只保留用户会话一小时。在这种情况下，您可以为 `lastActivity` 字段设置 TTL 为\
  \ 3600 秒。一个后台线程将自动运行，检查并删除闲置超过 3600 秒的文档。\n\n### 使用固定集合\n\n如果您需要基于插入顺序的高吞吐量，请使用固定集合。在某些情况下，根据数据大小，您需要在系统中维护一个数据的滚动窗口。例如，固定集合可用于存储高容量系统的日志信息，以快速检索最新的日志条目。\n\
  \n### 注意数据一致性\n\n请注意，如果不加以注意，MongoDB 的灵活模式可能导致数据不一致。例如，复制数据（嵌入文档）的能力，如果未正确更新，可能导致数据不一致，等等。因此，检查数据一致性非常重要。\n\
  \n### 处理异常与故障转移\n\n尽管 MongoDB 可以处理无缝故障转移，但根据良好的编码实践，应用程序应编写得当，以处理任何异常并优雅地应对这种情况。\n\
  \n\n## 12.3 应用程序响应时间优化\n\n一旦开始开发应用程序，最重要的需求之一就是拥有可接受的响应时间。换句话说，应用程序应该能够即时响应。你可以使用以下技巧进行优化：\n\
  \n*   尽可能避免磁盘访问和页面错误。主动估算应用程序需要处理的数据集大小，并增加内存以避免页面错误和磁盘读取。此外，以应用程序主要访问内存中可用数据的方式来编程，这样页面错误就会很少发生。\n\
  *   在查询字段上创建索引。如果你在正在执行的筛选器上创建索引，索引在内存中的存储方式将减少内存消耗，从而对查询产生积极影响。\n*   如果应用程序涉及的查询返回的字段数相对于完整文档结构较少，则创建覆盖索引。\n\
  *   使用一个能被最多查询利用的复合索引也能节省内存，因为只需加载一个索引，而非多个。\n*   在正则表达式中使用尾部通配符以获取关联索引的好处。\n* \
  \  尝试创建能大幅减少待选文档范围的索引。对“性别”字段的索引就不如对“电话号码”字段的索引有益。\n*   索引并非总是好的。你需要平衡所用索引的最佳数量。虽然你应该为支持查询创建索引，但也应记住删除不再使用的索引，因为每个索引都会为插入/更新操作带来成本。如果一个索引未被使用却仍然存在，它可能对数据库的整体容量产生不利影响。这对于写入密集型的工作负载尤其重要。\n\
  *   文档应设计为层次化结构，将相关事物分组在一起，并在适用的地方描绘为层级关系。这将使 MongoDB 能够找到所需信息，而无需扫描整个文档。\n*   应用\
  \ AND 操作符时，应始终从结果集小的查询开始，再到结果集大的查询，因为这将导致查询的文档数量较少。如果你知道最具限制性的条件，该条件应放在最前面。\n* \
  \  使用 OR 查询时，应从结果集大的查询转向结果集小的查询，因为这将限制后续查询的搜索空间。\n*   工作集应能完全放入内存。\n*   对于写入密集型和\
  \ I/O 密集型应用程序，使用 WiredTiger 存储引擎，因为它支持在块级别和索引级别进行压缩。\n\n## 12.4 数据安全性\n\n你已经学习了在决定部署方案时需要考虑的事项；也了解了一些提升性能的重要技巧。现在，让我们看看一些关于数据安全性和一致性的建议：\n\
  \n*   **复制**和**日志**是为数据安全提供的两种方法。通常建议在生产环境中使用复制功能，而不是在单台服务器上运行。并且，你应该让至少一台服务器启用日志。当无法启用复制且只能在单台服务器上运行时，日志记录可提供数据安全保障。第\
  \ `tk` 章解释了启用日志时写入操作的工作原理。\n*   在服务器崩溃的情况下，`修复`应是恢复数据的最后手段。尽管运行修复后数据库可能未损坏，但它可能不会包含所有数据。\n\
  *   在复制环境中，将 `W` 设置为安全写入的大多数节点。这是为了确保写入被复制到副本集的大多数成员。虽然这会减慢写入操作的速度，但写入操作是安全的。\n\
  *   在发出命令时，始终为 `w` 参数指定 `wtimeout`，以避免无限期的等待时间。\n*   MongoDB 应始终在受信任的环境中运行，并制定规则以阻止所有未知系统、机器或网络的访问。\n\
  \n## 12.5 管理\n\n以下是一些管理技巧：\n\n*   对持久化服务器进行**即时时间点备份**。要备份启用了日志的数据库，你可以进行文件系统快照，或者执行正常的\
  \ `fsync+lock` 然后转储。请注意，你不能在没有 `fsync` 和锁定的情况下直接复制所有文件，因为复制操作不是瞬间完成的。\n*   `修复`应用作压缩数据库的手段，因为它基本上执行一次\
  \ `mongodump` 然后 `mongorestore`，从而创建数据的干净副本，并在此过程中移除数据文件中的任何空“空洞”。\n*   MongoDB\
  \ 提供了**数据库探查器**。它会记录所有数据库操作的细粒度信息。可以将其设置为记录所有事件的信息，或者仅记录持续时间超过可配置阈值（默认为 100 毫秒）的事件。\n\
  \n注意：探查器数据存储在一个**固定集合**中。与解析日志文件相比，查询此集合可能更容易。\n\n*   可以使用 `explain` 计划来查看查询是如何被解析的。这涉及诸如使用了哪个索引、返回了多少文档、索引是否覆盖了查询、扫描了多少索引条目以及查询返回结果所花费的时间（以毫秒为单位）等信息。当查询在不到\
  \ 1 毫秒内解析完成时，`explain` 计划会显示 `0`。当你调用 `explain` 计划时，它会丢弃旧的执行计划，并启动测试可用索引的过程，以确保使用最佳的执行计划。\n\
  \n## 12.6 复制延迟\n\n**复制延迟**是监控副本集背后的主要管理问题。给定从节点的复制延迟是指操作在主节点写入的时间与该操作在从节点上复制完成的时间之间的差值。通常，复制延迟会自行恢复并且是暂时的。然而，如果延迟持续很高且不断上升，系统可能存在问题。你可能最终需要关闭系统直到问题解决，或者可能需要手动干预来协调不一致，甚至可能不得不在数据过时的情况下继续运行系统。\n\
  \n可以使用以下命令确定副本集当前的复制延迟：\n\n```\ntestset:PRIMARY> rs.printSlaveReplicationInfo()\n\
  ```\n\n此外，你可以使用 `rs.printReplicationInfo()` 命令来补全信息：\n\n```\ntestset:PRIMARY> rs.printReplicationInfo()\n\
  ```\n\n也可以使用 MongoDB Cloud Manager 来查看近期和历史的复制延迟信息。复制延迟图可从每个从节点的 `Status` 选项卡获取。\n\
  \n以下是一些有助于减少此时间的技巧：\n\n*   在写入负载很重的场景中，从节点的处理能力应与主节点相当，以便能够跟上主节点，并以相同的速率应用写入操作。同时，应有足够的网络带宽，以便能以与操作创建相同的速率从主节点获取这些操作。\n\
  *   调整应用程序的写关注级别。\n*   如果从节点用于构建索引，可以计划在主节点写入活动较少时进行。\n*   如果从节点用于进行备份，请考虑在不阻塞的情况下进行备份。\n\
  *   检查复制错误。运行 `rs.status()` 并检查 `errmsg` 字段。此外，可以检查从节点的日志文件中是否有任何错误消息。\n\n## 12.7\
  \ 分片\n\n当数据不再适合存储在单个节点上时，可以使用**分片**来确保数据在集群中均匀分布，并且操作不会因资源限制而受到影响。\n\n*   选择一个好的**分片键**。\n\
  *   在生产部署中，你必须使用三台配置服务器以提供冗余。\n*   在集合达到 256GB 之前进行分片。\n\n## 12.8 监控\n\nMongoDB\
  \ 系统需要进行主动监控，以便检测异常行为，从而可以采取必要措施来解决问题。有几种工具可用于监控 MongoDB 部署。\n\nMongoDB 开发者提供了一项名为\
  \ `MongoDB Cloud Manager` 的免费托管监控服务。`MongoDB Cloud Manager` 提供整个集群指标的仪表板视图。或者，你也可以使用\
  \ `nagios`、`SNMP` 或 `munin` 来构建自己的工具。\n\nMongoDB 还提供了多种工具，如 `mongostat` 和 `mongotop`，以深入了解性能状况。使用监控服务时，应密切关注以下指标：\n\
  \n*   `操作计数器 (Op counters)`：包括插入、删除、读取、更新和游标使用情况。\n*   `常驻内存 (Resident memory)`：必须时刻关注分配的内存。此计数器值应始终低于物理内存。如果内存耗尽，由于页面错误和索引未命中，你会经历性能下降。\n\
  *   `工作集大小 (Working set size)`：为了获得良好的性能，活跃的工作集应能完全装入内存，因此需要密切关注工作集。你可以优化查询以使工作集适应内存，或者在工作集预计会增加时增大内存。\n\
  *   `队列 (Queues)`：在 MongoDB 3.0 版本之前，使用读写器锁来实现并发读取，而写入则使用独占访问锁。在这种情况下，你可能会遇到队列积压在单个写入器之后的情况，其中可能包含读写查询。除了锁百分比，还需要监控队列指标。如果队列和锁百分比呈上升趋势，则意味着数据库内部存在争用。将操作改为批处理模式或更改数据模型可以对并发性产生显著的积极影响。从\
  \ 3.0 版本开始，引入了集合级锁（在 `MMAPv1` 存储引擎中）和文档级锁（在 `WiredTiger` 存储引擎中）。这提高了并发性，不再需要在数据库级别使用独占访问的写锁。因此，从这个版本开始，你只需要度量\
  \ `队列 (Queue)` 指标。\n*   每当应用程序出现小故障时，CRUD 行为、索引模式和索引可以帮助你更好地理解应用程序的流程。\n*   建议针对全尺寸数据库（例如生产数据库副本）运行整个性能测试，因为处理实际数据时，性能特征往往会更加明显。这也可以让你避免在处理实际性能数据库时可能出现的意外问题。\n\
  \n## 12.9 总结\n\n在本章中，我们提供了多种“如何做”的指南，以帮助你在 MongoDB 的旅程中前行。\n\n\n"
