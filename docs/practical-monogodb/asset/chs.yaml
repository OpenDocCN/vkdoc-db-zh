  \n身份验证与授权都存在于每个数据库级别。用户存在于单个逻辑数据库的上下文中。\n\n用户信息存储在名为 `system.users` 的集合中，该集合位于 `admin`\
  \ 数据库中。此集合维护着身份验证所需的凭据，其中存储了用户 ID、密码、以及创建该用户所关联的数据库，还有用于授权用户的权限信息。\n\nMongoDB 采用基于角色的方法进行授权（例如\
