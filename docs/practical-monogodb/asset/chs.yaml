  \ MongoDB，这是一个基于文档的 NoSQL 数据库。\n\n"
- '# 3. MongoDB 简介


  > “MongoDB 是领先的 NoSQL 文档存储数据库之一。它使组织能够处理大数据并从中获得有价值的洞见。”


  一些领先的企业和消费级 IT 公司已在他们的产品和解决方案中利用了 MongoDB 的能力。MongoDB 3.0 版本引入了可插拔的存储引擎和 Ops Manager，这扩展了最适合
  MongoDB 的应用程序范围。


  MongoDB 的名字源于单词“humungous”（巨大的）。与其他 NoSQL 数据库一样，MongoDB 也不遵循 RDBMS 原则。它没有表、行和列的概念。同时，它也不提供
  ACID 合规性、JOIN、外键等功能。


  MongoDB 以二进制 JSON 文档（也称为 BSON）的形式存储数据。文档可以具有不同的模式，这意味着模式可以随着应用程序的发展而改变。MongoDB 专为可扩展性、高性能和高可用性而构建。


  在本章中，我们将简要介绍 MongoDB 的创建和设计决策。我们将在后续章节中探讨 MongoDB 的关键特性、组件和架构。


  ## 3.1 历史


  2007 年下半年，Dwight Merriman、Eliot Horowitz 和他们的团队决定开发一项在线服务。该服务的意图是提供一个开发、托管和自动扩展
  Web 应用程序的平台，与 Google App Engine 或 Microsoft Azure 等产品非常相似。很快他们意识到，没有开源数据库平台能满足该服务的要求。


  “我们感觉很多现有数据库并不真正具备你希望它们拥有的‘云计算’原则：弹性、可扩展性……以及易于管理，同时对开发人员和操作人员也易于使用，”Merriman 说。“[MySQL]
  并不具备所有这些特性。”¹ 因此，他们决定构建一个不遵循 RDBMS 模型的数据库。


  一年后，用于该服务的数据库已可使用。该服务本身从未发布，但团队在 2009 年决定将该数据库作为 MongoDB 开源。2010 年 3 月，MongoDB 1.4.0
  版本的发布被认为已具备生产可用性。最新的生产版本是 3.0，于 2015 年 3 月发布。MongoDB 是在总部位于纽约的初创公司 10gen 的赞助下构建的。


  ## 3.2 MongoDB 设计哲学


  Eliot Horowitz 在一次演讲中提到，MongoDB 并非在实验室中设计，而是从构建大规模、高可用和健壮系统的经验中诞生的。在本节中，我们将简要了解一些导致
  MongoDB 如今形态的设计决策。


  ### 3.2.1 速度、可扩展性和敏捷性


  设计团队在设计 MongoDB 时的目标是创建一个快速、高度可扩展且易于使用的数据库。为了在分区数据库中实现速度和水平可扩展性，正如 CAP 定理所解释的那样，必须在一致性和事务支持上做出妥协。因此，根据该定理，MongoDB
  以牺牲一致性和事务支持为代价，提供了高可用性、可扩展性和分区能力。在实际应用中，这意味着 MongoDB 使用文档而非表和行，以使其具备灵活性、可扩展性和快速性。




  '
- "# 4. MongoDB 数据模型\n\n> “MongoDB 旨在处理文档，无需预定义列或数据类型（与关系型数据库不同），这使得其数据模型极其灵活。”\n\n\
  在本章中，你将学习 MongoDB 的数据模型。你还将了解灵活模式（或称多态模式）的含义，以及为何它是 MongoDB 数据模型设计中的一个重要考量。\n\n\
  ### 3.2.2 非关系型方法\n\n传统的 `RDBMS` 平台通过纵向扩展（scale-up）方式提供可扩展性，这需要更快的服务器来提升性能。`RDBMS`\
  \ 系统中存在的以下问题，促使了 `MongoDB` 及其他 `NoSQL` 数据库被设计成如今的形式：\n\n*   为了进行横向扩展，`RDBMS` 数据库需要将分布在两个或多个系统中的数据关联起来才能返回结果。这在\
  \ `RDBMS` 系统中难以实现，因为它们的设计前提是所有数据需一起参与计算。因此，数据必须在单一位置进行处理。\n*   在多活（Active-Active）服务器的情况下，当两台服务器都接收来自多源的更新时，判定哪个更新是正确的存在挑战。\n\
  *   当应用程序尝试从第二台服务器读取数据，而信息已在第一台服务器上更新但尚未同步到第二台时，返回的信息可能是陈旧的。\n\n`MongoDB` 团队决定采用非关系型方法来解决这些问题。如前所述，`MongoDB`\
  \ 将其数据存储在 `BSON` 文档中，所有相关数据都存放在一起，这意味着所有内容都位于一处。`MongoDB` 中的查询基于文档中的键，因此文档可以分布在多个服务器上。查询每个服务器意味着它将检查自身的文档集合并返回结果。这实现了线性可扩展性和性能提升。\n\
  \n`MongoDB` 采用主从复制，其中主节点接受写入请求。如果需要提升写入性能，则可以使用分片（sharding）；它将数据分布在多台机器上，并使这些机器能够更新数据集的不同部分。分片在\
  \ `MongoDB` 中是自动的；随着更多机器的加入，数据会被自动分配。\n\n### 3.2.3 基于 JSON 的文档存储\n\n`MongoDB` 使用基于\
  \ `JSON`（JavaScript 对象表示法）的文档存储数据。`JSON`/`BSON` 提供无模式模型，在数据库设计方面提供了灵活性。与 `RDBMS`\
  \ 不同，可以无缝地对模式进行更改。\n\n这种设计还通过在内部将相关数据分组存放并使其易于搜索来实现高性能。\n\n一个 `JSON` 文档包含实际数据，可与\
  \ `SQL` 中的一行相比较。然而，与 `RDBMS` 行相比，文档可以具有动态模式。这意味着同一集合中的文档可以有不同的字段或结构，或者公共字段可以包含不同类型的数据。\n\
  \n文档以键值对的形式包含数据。让我们通过一个例子来理解：\n\n```json\n{\n    \"Name\": \"ABC\",\n    \"Phone\"\
  : [\"1111111\",\n              \"222222\"\n             ],\n    \"Fax\":\n}\n```\n\
  \n如前所述，键值成对出现。文档中某个键的值可以留空。在上面的例子中，文档有三个键，分别是 \"Name\"、\"Phone\" 和 \"Fax\"。\"Fax\"\
  \ 键没有值。\n\n## 3.2.4 性能与功能权衡\n\n为了使 `MongoDB` 具有高性能和高速，`RDBMS` 系统中常见的一些功能在 `MongoDB`\
  \ 中并未提供。`MongoDB` 是面向文档的 `DBMS`，数据以文档形式存储。它不支持 `JOIN` 操作，也没有完全通用的事务。然而，它确实提供二级索引支持，允许用户使用查询文档进行查询，并在单文档级别提供原子更新支持。它提供副本集，这是一种具有自动故障转移的主从复制形式，并且具有内置的水平扩展能力。\n\
  \n### 3.2.5 任意位置运行数据库\n\n一个主要的设计考量是能够从任何地方运行数据库，这意味着它应该能够在服务器、`VM`（虚拟机）上运行，甚至可以在云上通过按使用付费的服务运行。实现\
  \ `MongoDB` 所用的语言是 `C++`，这使得 `MongoDB` 能够实现这一目标。`10gen` 网站为不同的 `OS` 平台提供二进制文件，使\
  \ `MongoDB` 几乎能在任何类型的机器上运行。\n\n## 3.3 SQL 比较\n\n以下是 `MongoDB` 与 `SQL` 的不同之处。\n\n\
  `MongoDB` 使用文档存储数据，提供灵活的模式（同一集合中的文档可以有不同的字段）。这使得用户能够存储嵌套或多值字段，例如数组、哈希等。相比之下，`RDBMS`\
  \ 系统提供固定模式，其中某一列的值应具有相似的数据类型。而且，在单元格中存储数组或嵌套值是不可能的。\n\n`MongoDB` 不支持像 `SQL` 中那样的\
  \ `JOIN` 操作。但是，它允许用户将所有相关数据一起存储在单个文档中，从而在边缘避免了使用 `JOIN`。它提供了一种变通方法来解决这个问题。我们将在后续章节中更详细地讨论这一点。\n\
  \n`MongoDB` 不以与 `SQL` 相同的方式支持事务。但是，它保证文档级别的原子性。此外，它使用隔离操作符来隔离影响多个文档的写入操作，但不为多文档写入操作提供“全有或全无”的原子性。\n\
  \n## 3.4 总结\n\n在本章中，你了解了 `MongoDB`、其历史以及 `MongoDB` 系统设计的简要详情。在接下来的章节中，你将学习更多关于 `MongoDB`\
  \ 数据模型的知识。\n\n**脚注**\n\n1 The Register, Cade Metz, “MongoDB 之父：我的孩子胜过 Google BigTable”，[`www.theregister.co.uk/2011/05/25/the_once_and_future_mongodb/`](http://www.theregister.co.uk/2011/05/25/the_once_and_future_mongodb/))，2011\
  \ 年 5 月 25 日。\n\n\n\n## 4.1 数据模型\n\n在上一章中，你了解到 MongoDB 是一个基于文档的数据库系统，其中的文档可以拥有灵活的模式。这意味着同一集合中的文档可以拥有不同（或相同）的字段集合。这让你在处理数据时更具灵活性。\n\
  \n本章，你将探索 MongoDB 的灵活数据模型。在需要之处，我们会演示其与关系数据库管理系统（RDBMS）方法的不同之处。\n\n一个 MongoDB 部署可以包含多个数据库。每个数据库是一组集合的集合。集合类似于\
  \ SQL 中的表的概念；然而，它们是无模式的。每个集合可以包含多个文档。可以将文档视为 SQL 中的一行。图 4-1 描述了 MongoDB 的数据库模型。\n\
  \n![A332296_1_En_4_Fig1_HTML.jpg](img/A332296_1_En_4_Fig1_HTML.jpg)\n\n图 4-1.\n\n\
  MongoDB 数据库模型\n\n在 RDBMS 系统中，由于表结构和每列的数据类型是固定的，你只能在列中添加特定数据类型的数据。在 MongoDB 中，集合是文档的集合，其中数据以键值对的形式存储。\n\
  \n让我们通过一个例子来理解数据如何在文档中存储。下面的文档保存了用户的姓名和电话号码：\n\n`{\"Name\": \"ABC\", \"Phone\":\
  \ [\"1111111\", \"222222\" ] }`\n\n动态模式意味着同一集合中的文档可以拥有相同或不同的字段集合或结构，甚至相同的字段在不同文档中可以存储不同类型的值。数据在集合文档中的存储方式没有严格的限制。\n\
  \n让我们看一个 `Region` 集合的例子：\n\n`{ \"R_ID\" : \"REG001\", \"Name\" : \"United States\"\
  \ }`\n\n`{ \"R_ID\" :1234, \"Name\" : \"New York\", \"Country\" : \"United States\"\
  \ }`\n\n在这段代码中，`Region` 集合中有两个文档。尽管两个文档属于同一个集合，但它们的结构不同：第二个文档多了一个国家信息字段。实际上，如果你观察\
  \ \"`R_ID`\" 字段，它在第一个文档中存储的是 `STRING` 值，而在第二个文档中是数字。\n\n因此，一个集合的文档可以拥有完全不同的模式。将文档存储在一个特定集合中还是使用多个集合，这取决于应用程序的设计。\n\
  \n### 4.1.1 `JSON` 和 `BSON`\n\nMongoDB 是一个基于文档的数据库。它使用二进制 JSON（Binary JSON）来存储数据。\n\
  \n在本节中，你将了解 `JSON` 和二进制 JSON（`BSON`）。`JSON` 代表 JavaScript 对象表示法。它是当今现代 Web（与 `XML`\
  \ 一起）用于数据交换的标准。该格式既对人友好，也对机器可读。它不仅是交换数据的好方法，也是存储数据的好方式。\n\n`JSON` 支持所有基本数据类型（如字符串、数字、布尔值和数组）。\n\
  \n以下代码展示了一个 `JSON` 文档的样子：\n\n```\n{\n    \"_id\" : 1,\n    \"name\" : { \"first\"\
  \ : \"John\", \"last\" : \"Doe\" },\n    \"publications\" : [\n        {\n     \
  \       \"title\" : \"First Book\",\n            \"year\" : 1989,\n            \"\
  publisher\" : \"publisher1\"\n        },\n        { \"title\" : \"Second Book\"\
  ,\n            \"year\" : 1999,\n            \"publisher\" : \"publisher2\"\n  \
  \      }\n    ]\n}\n```\n\n`JSON` 让你将所有相关信息保持在一个地方，这提供了出色的性能。它还使得更新文档能够独立进行。它是无模式的。\n\
  \n#### 4.1.1.1 二进制 `JSON` (`BSON`)\n\nMongoDB 以二进制编码格式存储 `JSON` 文档。这被称为 `BSON`。`BSON`\
  \ 数据模型是 `JSON` 数据模型的扩展形式。\n\nMongoDB 对 `BSON` 文档的实现速度快、可遍历性高且轻量级。它支持在其他数组内嵌套数组和对象，并且使\
  \ MongoDB 能够深入对象内部以构建索引并根据查询表达式匹配对象，这些操作既适用于顶级 `BSON` 键，也适用于嵌套的 `BSON` 键。\n\n###\
  \ 4.1.2 标识符 (`_id`)\n\n你已经了解到 MongoDB 将数据存储在文档中。文档由键值对组成。虽然文档可以比作 RDBMS 中的一行，但与行不同，文档具有灵活的模式。键（Key）只是一个标签，可以大致比作\
  \ RDBMS 中的列名。键用于从文档中查询数据。因此，就像 RDBMS 主键（用于唯一标识每一行）一样，你需要一个键来唯一标识集合中的每个文档。在 MongoDB\
  \ 中，这被称为 `_id`。\n\n如果你没有为某个键显式指定任何值，MongoDB 会自动生成一个唯一值并分配给它。这个键值是不可变的，并且可以是除数组之外的任何数据类型。\n\
  \n### 4.1.3 定容量集合\n\n你现在对集合和文档已经很熟悉了。让我们谈谈一种特殊类型的集合，称为定容量集合。\n\nMongoDB 有一个限制集合容量的概念。这意味着它按照插入顺序存储集合中的文档。当集合达到其大小限制时，文档将按照\
  \ `FIFO`（先进先出）顺序从集合中移除。这意味着最近插入最少的文档将首先被移除。\n\n这对于需要自动维护插入顺序，并且在达到固定大小后需要删除记录的用例来说非常有用。其中一个用例是日志文件，它们会在达到一定大小后自动截断。\n\
  \n**注意**\n\nMongoDB 本身使用定容量集合来维护其复制日志。定容量集合保证按插入顺序保留数据，因此按插入顺序检索数据的查询可以快速返回结果，并且不需要索引。不允许进行更改文档大小的更新。\n\
  \n## 4.1.2 多态模式\n\n由于你已经熟悉了 MongoDB 数据结构的无模式特性，现在让我们来探讨多态模式及其用例。\n\n多态模式是指一个集合包含不同类型或模式的文档。这种模式的一个好例子是名为\
  \ `Users` 的集合。一些用户文档可能包含额外的传真号码或电子邮件地址，而另一些可能只有电话号码，但所有这些文档都共存于同一个 `Users` 集合中。这种模式通常被称为多态模式。\n\
  \n在本章的这一部分，你将探索使用多态模式的各种原因。\n\n\n### 4.2.1 面向对象编程\n\n面向对象编程使你能够通过继承让类共享数据和行为。它还允许你在父类中定义函数，这些函数可以在子类中被重写，从而在不同的上下文中发挥不同的作用。换句话说，你可以使用相同的函数名来操作子类和父类，尽管底层的实现可能有所不同。这个特性被称为多态。\n\
  \n在这种情况下，需求是能够拥有一个模式，使得所有相关的对象集或层次结构中的对象可以一起适配，并且能够以相同的方式被检索。\n\n让我们考虑一个例子。假设你有一个应用程序，允许用户上传和分享不同类型的内容，如\
  \ HTML 页面、文档、图像、视频等。尽管上述许多内容类型之间有许多共同的字段（如名称、ID、作者、上传日期和时间），但并非所有字段都是相同的。例如，在图像的情况下，你有一个保存图像内容的二进制字段，而\
  \ HTML 页面则有一个保存 HTML 内容的大型文本字段。\n\n在这种情况下，可以使用 MongoDB 的多态模式，其中所有内容节点类型都存储在同一个集合中，例如`LoadContent`，并且每个文档只包含相关的字段。\n\
  \n```json\n// \"文档集合\" - \"HTMLPage\" 文档\n{\n    _id: 1,\n    title: \"Hello\",\n\
  \    type: \"HTMLpage\",\n    text: \"<html>Hi..Welcome to my world</html>\"\n}\n\
  ...\n// 文档集合也有一个 \"Picture\" 文档\n{\n    _id: 3,\n    title: \"Family Photo\",\n\
  \    type: \"JPEG\",\n    sizeInMB: 10\n}\n```\n\n这种模式不仅使你能够将具有不同结构的相关数据存储在同一个集合中，还简化了查询。同一个集合既可以用于查询公共字段（例如获取特定日期和时间上传的所有内容），也可以用于查询特定字段（例如查找大小超过\
  \ X MB 的图像）。\n\n因此，面向对象编程是使用多态模式有意义的用例之一。\n\n### 4.2.2 模式演进\n\n当你使用数据库时，最重要的考虑因素之一是模式演进（即模式更改对运行中应用程序的影响）。设计应尽可能减少对应用程序的影响，意味着没有或最少的停机时间、没有或极少的代码更改等。\n\
  \n通常，模式演进通过执行迁移脚本来实现，该脚本将数据库模式从旧版本升级到新版本。如果数据库未处于生产环境，脚本可以简单地删除并重新创建数据库。然而，如果数据库处于生产环境并包含实时数据，迁移脚本将很复杂，因为数据需要被保留。脚本应考虑到这一点。虽然\
  \ MongoDB 提供了一个`Update`选项，可用于更新集合中所有文档的结构（如果有新增字段），但想象一下，如果你的集合中有成千上万个文档，这样做会产生什么影响。这将非常缓慢，并对底层应用程序的性能产生负面影响。实现这一点的一种方法是，将新结构添加到集合中新增的文档中，然后在应用程序仍在运行时，逐步在后台迁移集合。这是拥有多态模式具有优势的众多用例之一。\n\
  \n例如，假设你正在处理一个`Tickets`集合，其中包含工单详细信息的文档，如下所示：\n\n```json\n// \"Ticket1\" 文档 (存储在\
  \ \"Tickets\" 集合中)\n{\n    _id: 1,\n    Priority: \"High\",\n    type: \"Incident\"\
  ,\n    text: \"Printer not working\"\n}\n```\n\n在某个时候，应用程序团队决定在工单文档结构中引入一个“简短描述”字段，因此最好的选择是在新的工单文档中引入这个新字段。在应用程序内，你嵌入一段代码来处理检索“旧式”文档（没有简短描述字段）和“新式”文档（有简短描述字段）。旧式文档可以逐渐迁移到新式文档。迁移完成后，如果需要，可以更新代码以移除为处理缺失字段而嵌入的代码片段。\n\
  \n## 4.3 小结\n\n在本章中，你学习了 MongoDB 数据模型。你还了解了标识符和固定集合。本章最后，你理解了灵活模式的优势。\n\n在下一章中，你将开始使用\
  \ MongoDB。你将进行 MongoDB 的安装和配置。\n\n"
- '# 5. MongoDB - 安装与配置


  > “MongoDB 是一个跨平台的数据库。”


  在本章中，你将了解在 Windows 和 Linux 上安装 MongoDB 的过程。


  ## 5.1 选择你的版本


  MongoDB 可以在大多数平台上运行。所有可用软件包的列表可在 MongoDB 下载页面 [`www.mongodb.org/downloads`](http://www.mongodb.org/downloads)
  上找到。


  适合你环境的正确版本取决于你的服务器操作系统和处理器类型。MongoDB 支持 32 位和 64 位架构，但建议在生产环境中使用 64 位。


  **32 位限制**


  这是由于 MongoDB 使用了内存映射文件。这限制了 32 位构建版本只能处理大约 2GB 的数据。出于性能原因，建议在生产环境中使用 64 位构建版本。


  在撰写本书时，最新的 MongoDB 生产版本是 3.0.4。适用于 Linux、Windows、Solaris 和 Mac OS X 的 MongoDB 下载包可用。


  MongoDB 下载页面分为以下部分：


  *   当前稳定版本 (3.0.4) – 2015 年 6 月 16 日

  *   先前版本 (稳定版)

  *   开发版本 (不稳定版)


  当前版本是最近可用的最稳定版本，在撰写本书时为 3.0.4。当新版本发布时，之前的稳定版本将被移至“先前版本”部分。


  开发版本，顾名思义，是仍在开发中的版本，因此被标记为不稳定。这些版本可能有额外的功能，但由于仍在开发阶段，可能不稳定。你可以使用开发版本尝试新功能，并向 10gen
  提供有关功能和遇到问题的反馈。


  ## 5.2 在 Linux 上安装 MongoDB


  本节介绍如何在 LINUX 系统上安装 MongoDB。在接下来的演示中，我们将使用 Ubuntu Linux 发行版。你可以通过手动方式或通过软件仓库安装 MongoDB。我们将引导你完成这两种选项。




  ### 5.2.1 通过软件仓库安装


  在 **LINUX** 中，软件仓库是包含软件的在线目录。**APT 包管理器**是 **Ubuntu** 上用来安装软件的程序。虽然 **MongoDB**
  可能存在于默认仓库中，但版本有可能过时，所以第一步是配置 **APT** 以使用自定义仓库。


  执行以下命令以导入 **MongoDB** 的 `public.GPG` 密钥：

  ```bash

  sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv 7F0CEB10

  ```

  接下来，使用以下命令创建 `/etc/apt/sources.list.d/mongodb-org-3.0.list` 文件：

  ```bash

  echo "deb [`http://repo.mongodb.org/apt/ubuntu`](http://repo.mongodb.org/apt/ubuntu)
  \"$(lsb_release -sc)\"/mongodb-org/3.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-3.0.list

  ```

  最后，使用以下命令重新加载软件仓库：

  ```bash

  sudo apt-get update

  ```

  现在，**APT** 已知晓手动添加的仓库。


  接下来，你需要安装软件。应在 **shell** 中执行以下命令来安装 **MongoDB** 当前的稳定版本：

  ```bash

  sudo apt-get install -y mongodb-org

  ```


  你已成功安装 **MongoDB**，整个过程就是这么简单。


  ### 5.2.2 手动安装


  本节将介绍如何手动安装 **MongoDB**。在以下情况下，这些知识很重要：


  *   当 **Linux** 发行版不使用 **APT 包管理器**时。

  *   当你需要的版本无法通过仓库获得或不属于该仓库时。

  *   当你需要同时运行多个 **MongoDB** 版本时。


  手动安装的第一步是决定要使用的 **MongoDB** 版本，然后从网站下载。接着，需要使用以下命令解压安装包：

  ```bash

  tar -xvf mongodb-linux-x86_64-3.0.4.tgz

  ```

  这将输出类似以下的内容：

  ```

  mongodb-linux-i686-3.0.4/THIRD-PARTY-NOTICES

  mongodb-linux-i686-3.0.4/GNU-AGPL-3.0

  mongodb-linux-i686-3.0.4/bin/mongodump

  ............

  mongodb-linux-i686-3.0.4/bin/mongosniff

  mongodb-linux-i686-3.0.4/bin/mongod

  mongodb-linux-i686-3.0.4/bin/mongos

  mongodb-linux-i686-3.0.4/bin/mongo

  ```

  这会将包内容解压到一个新目录，即 `mongodb-linux-x86_64-3.0.4`（位于你当前目录下）。该目录包含许多子目录和文件。主要的可执行文件位于
  `bin` 子目录下。


  至此，**MongoDB** 安装成功完成。


  ## 5.3 在 Windows 上安装 MongoDB


  在 **Windows** 上安装 **MongoDB** 很简单，只需下载适用于所选 **Windows** 版本的 **msi** 文件并运行安装程序即可。


  安装程序将引导你完成 **MongoDB** 的安装。


  按照向导操作，你将到达“选择安装类型”屏幕。有两种安装类型可供选择，你可以自定义安装。在此示例中，选择安装类型为“自定义”。


  选择“自定义”时需要指定安装目录，因此请指定目录为 `C:\PracticalMongoDB`。


  请注意，**MongoDB** 可以从用户选择的任何文件夹运行，因为它是自包含的，不依赖于系统。如果选择了“完全”安装类型，则默认选择的文件夹是 `C:\Program
  Files\MongoDB`。


  单击“下一步”将带你进入“准备安装”屏幕。单击“安装”。


  这将开始安装，并在屏幕上显示进度。安装完成后，向导将带你进入完成屏幕。


  单击“完成”即结束安装。成功完成上述步骤后，你将拥有一个名为 `C:\PracticalMongoDB` 的目录，其中 `bin` 文件夹包含所有相关应用程序。整个过程就是这么简单。


  ## 5.4 运行 MongoDB


  让我们看看如何开始运行和使用 **MongoDB**。


  ### 5.4.1 先决条件


  需要一个数据文件夹来存储文件。在 **Windows** 上默认是 `C:\data\db`，在 **LINUX** 系统上是 `/data/db`。


  这些数据目录不是由 **MongoDB** 创建的，因此在启动 **MongoDB** 之前，需要手动创建数据目录，并确保设置了适当的权限（例如，**MongoDB**
  拥有读、写和创建目录的权限）。


  如果你在创建文件夹之前启动了 **MongoDB**，它将抛出错误消息并无法运行。


  ### 5.4.2 启动服务


  一旦目录创建完毕且权限到位，执行 `mongod` 应用程序（位于 `bin` 目录下）以启动 **MongoDB** 核心数据库服务。


  延续上述安装，可以通过在 **Windows** 中打开命令提示符（需要以管理员身份运行）并执行以下命令来启动：

  ```bash

  c:\> c:\practicalmongodb\bin\mongod.exe

  ```

  在 **Linux** 的情况下，在 **shell** 中启动 `mongod` 进程。


  这将在本地主机接口上启动 **MongoDB** 数据库。它将监听来自 `mongo` **shell** 在端口 `27017` 上的连接。


  如前所述，需要在启动数据库之前创建文件夹路径，默认为 `c:\data\db`。在启动数据库服务时，也可以通过使用 `–dbpath` 参数提供替代路径。

  ```bash

  C:\> C:\practicalmongodb\bin\mongod.exe --dbpath C:\NewDBPath\DBContents

  ```


  ## 5.5 验证安装


  相关的可执行文件将位于 `bin` 子目录下。为了验证安装步骤是否成功，可以在 `bin` 目录下检查以下内容：


  *   `Mongod`：核心数据库服务器

  *   `Mongo`：数据库 **shell**

  *   `Mongos`：自动分片进程

  *   `Mongoexport`：导出实用程序

  *   `Mongoimport`：导入实用程序


  除了上述之外，`bin` 文件夹中还有其他可用的应用程序。


  `mongo` 应用程序启动 `mongo` **shell**，它提供对数据库内容的访问，并允许你对 **MongoDB** 中的数据执行选择性查询或聚合操作。


  如上所述，`mongod` 应用程序用于启动数据库服务或守护进程。


  启动应用程序时可以设置多个标志。例如，`–dbpath` 可用于指定数据库文件存储的替代路径。要获取所有可用选项的列表，在启动服务时包含 `--help` 标志。


  ## 5.6 MongoDB Shell


  `mongo` **shell** 是 **MongoDB** 标准发行版的一部分。该 **shell** 为 **MongoDB** 提供了完整的数据库接口，使你能够使用
  **JavaScript** 环境处理存储在 **MongoDB** 中的数据，该环境可以完全访问该语言及其所有标准函数。


  一旦数据库服务启动，你就可以打开 `mongo` **shell** 并开始使用 **MongoDB**。这可以在 **Linux** 中使用 **Shell**
  或在 **Windows** 中使用命令提示符（以管理员身份运行）来完成。


  你必须参考可执行文件的确切位置，例如在 **Windows** 环境中位于 `C:\practicalmongodb\bin\` 文件夹。


  打开命令提示符（以管理员身份运行）并输入 `mongo.exe`。按 **Enter** 键。这将启动 `mongo` **shell**。

  ```bash

  C:\> C:\practicalmongodb\bin\mongo.exe

  ```

  输出将类似于：

  ```

  MongoDB shell version: 3.0.4

  connecting to: test

  >

  ```

  如果在启动服务时未指定参数，它会连接到本地主机实例上名为 `test` 的默认数据库。


  当连接到一个不存在的数据库时，它将被自动创建。**MongoDB** 提供了在尝试访问尚不存在的数据库时自动创建它的功能。


  下一章提供了更多关于使用 `mongo` **shell** 的信息。


  ## 5.7 保护部署安全


  你已经知道如何通过默认配置安装和开始使用 **MongoDB**。接下来，你需要确保存储在数据库中的数据在各方面都是安全的。


  在本节中，你将了解如何保护数据安全。你将更改默认安装的配置，以确保数据库更加安全。





