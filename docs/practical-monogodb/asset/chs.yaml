  ok\" : 1\n}\n```\n\n如您所见，数据库扫描了整个表。这对性能有显著影响，发生这种情况是因为没有索引。\n\n#### 6.1.8.1 单键索引\n\
  \n让我们在文档的 `Name` 字段上创建一个索引。使用 `ensureIndex()` 创建索引。\n\n```bash\n> db.testindx.ensureIndex({\"\
  Name\":1})\n```\n\n索引创建将花费几分钟时间，具体取决于服务器和集合大小。\n\n让我们运行与之前相同的查询，并使用 `explain()`\
  \ 来检查索引创建后数据库正在执行哪些步骤。检查输出中的 `n`、`nscanned` 和 `millis` 字段。\n\n```bash\n>db.testindx.find({\"\
