  \ 实例启动时，默认情况下它会在端口 `27017` 上等待任何传入连接。您可以使用 `–port` 更改此设置。\n\n仅仅更改端口并不能大大降低风险。为了完全保护环境，您需要仅允许受信任的客户端使用防火墙设置连接到该端口。\n\
  \n更改此端口也会更改 HTTP 状态接口端口，该端口默认为 `28017`。该端口在 X+1000 的端口上可用，其中 X 代表连接端口。\n\n此网页公开了诊断和监视信息，包括操作数据、各种日志以及有关数据库实例的状态报告。它提供了可用于管理目的的管理级统计信息。默认情况下，此页面是只读的；要使其完全交互，您将使用\
  \ `REST` 设置。此配置使页面完全交互，帮助管理员排查任何性能问题。应仅允许受信任的客户端使用防火墙访问此端口。\n\n建议在生产环境中禁用 HTTP 状态页面以及\
  \ `REST` 配置。\n\n#### 5.7.2.1 使用防火墙\n\n防火墙用于控制网络内的访问。它们可用于允许从特定 IP 地址访问特定 IP 端口，或阻止来自任何不受信任主机的任何访问。它们可用于为您的\
  \ `mongod` 实例创建受信任的环境，您可以在其中指定哪些 IP 地址或主机可以连接到 `mongod` 的哪些端口或接口。\n\n在 Windows 平台上，使用\
  \ `netsh` 配置端口 `27017` 的传入流量：\n```\nC:\\>netsh advfirewall firewall add rule name=\"\
  Open mongod port 27017\" dir=in action=allow protocol=TCP localport=27017\nOk.\n\
  C:\\>\n```\n\n此代码表示允许端口 `27017` 上的所有传入流量，因此任何应用程序服务器都可以连接到 `mongod`。\n\n#### 5.7.2.2\
  \ 加密数据\n\n您已经看到 MongoDB 将其所有数据存储在数据目录中，在 Windows 中默认为 `C:\\data\\db`，在 Linux 中为\
  \ `/data/db`。文件以未加密的形式存储在目录中，因为 Mongo 中没有提供自动加密文件的方法。任何具有文件系统访问权限的攻击者都可以读取文件中存储的数据。应用程序有责任确保在将敏感信息写入数据库之前对其进行加密。\n\
  \n此外，应实施操作系统级别的机制，如文件系统级加密和权限，以防止对文件的未授权访问。\n\n\n\n#### 5.7.2.3 加密通信\n\n`mongod`\
  \ 与客户端（例如 `mongo shell`）之间的通信通常需要加密。在本节设置中，您将了解如何通过配置 SSL，为上述安装增加一层安全性，使得 `mongod`\
  \ 与 `mongo shell`（客户端）之间的通信使用 SSL 证书和密钥进行。\n\n建议在服务器与客户端的通信中使用 SSL。\n\n从 3.0 版本开始，大多数\
  \ MongoDB 发行版现已内置对 SSL 的支持。以下命令在 Windows 平台上执行。\n\n第一步是生成包含公钥证书和私钥的 `.pem` 文件。MongoDB\
  \ 可以使用自签名证书或由证书颁发机构颁发的有效证书。\n\n在本书中，您将使用以下命令生成自签名证书和私钥。\n\n根据 MongoDB 发行版和 Windows\
  \ 平台的要求，安装 OpenSSL 和 Microsoft Visual C++ 2008 可再发行组件。在本书中，您安装的是 64 位版本。\n\n运行以下命令创建公钥证书和私钥：\n\
  ```\nC:\\> cd c:\\OpenSSL-Win64\\bin\nC:\\OpenSSL-Win64\\bin\\>openssl\n```\n这将打开\
  \ OpenSSL shell，您需要在其中输入以下命令：\n```\nOpenSSL>req -new -x509 -days 365 -nodes -out\
  \ C:\\practicalmongodb\\mongodb-cert.crt -keyout C:\\practicalmongodb\\mongodb-cert.key\n\
  ```\n上述步骤生成名为 `mongodb-cert.key` 的证书密钥，并将其放置在 `C:\\practicalmongodb` 文件夹中。\n\n接下来，您需要将证书和私钥连接到\
  \ `.pem` 文件中。为此，在命令提示符下运行以下命令：\n```\nC:\\> more C:\\practicalmongodb\\mongodb-cert.key\
  \ > temp\nC:\\> copy \\b temp C:\\practicalmongodb\\mongodb-cert.crt > C:\\practicalmongodb\\\
  mongodb.pem\n```\n\n现在您有了一个 `.pem` 文件。在启动 `mongod` 时使用以下运行时选项：\n```\nC:\\> C:\\\
  practicalmongodb\\bin\\mongod –sslMode requireSSL --sslPEMKeyFile C:\\practicalmongodb\\\
  mongodb.pem\n```\n\n```\n2015-07-03T03:45:33.248-0700 I CONTROL Hotfix KB2731284\
  \ or later update is installed, no need to zero-out data files\n2015-07-03T02:54:30.630-0700\
  \ I JOURNAL [initandlisten] journal dir=C:\\data\\db\\journal\n2015-07-03T02:54:30.670-0700\
  \ I CONTROL [initandlisten] MongoDB starting : pid=2816 port=27017 dbpath=C:\\data\\\
  db\\ 64-bit host=ANOC9\n2015-07-03T02:54:30.670-0700 I CONTROL [initandlisten] targetMinOS:\
  \ Windows 7/Windows Server 2008 R2\n2015-07-03T02:54:30.670-0700 I CONTROL [initandlisten]\
  \ db version v3.0.4\n2015-07-03T02:54:30.670-0700 I CONTROL [initandlisten] OpenSSL\
  \ version: OpenSSL1.0.1j-fips 19 Mar 2015\n2015-07-03T02:54:30.670-0700 I CONTROL\
  \ [initandlisten] build info: windows sys. getwindowsversion(major=6, minor=1, build=7601,\
  \ platform=2, service_pack='Service Pack 1') BOOST_LIB_VERSION=1_49\n2015-07-03T02:54:30.671-0700\
  \ I CONTROL [initandlisten] allocator: system\n2015-07-03T02:54:30.671-0700 I CONTROL\
  \ [initandlisten] options: { net: { ssl: { PEMKeyFile: \"c:\\practicalmongodb\\\
  mongodb.pem\", mode: \"requireSSL\" } } }\n2015-07-03T02:54:30.680-0700 I NETWORK\
  \ [initandlisten] waiting for connections on port 27017 ssl\n2015-07-03T03:33:43.708-0700\
  \ I NETWORK [initandlisten] connection accepted from 127.0.0.1:49194 #2 (1 connection\
