    ## 总结


    在本章中，我们探索了如何将窗口函数与公共表表达式结合起来。我们以多种方式分析了降水数据，计算了降雨之间的平均天数，寻找数据的间隙与孤岛，甚至探讨了如何将静态列转换为主键列。


    公共表表达式和窗口函数是过去几年中引入 MariaDB 和 MySQL 的最令人兴奋的两大功能。现在你已经掌握了基础知识，可以开始在你的应用程序和数据中使用它们了。


