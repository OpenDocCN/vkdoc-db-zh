    | Asheville  | 1976-01-26 | 1976-01-17  |    9 |

    | Asheville  | 1976-01-27 | 1976-01-26  |    1 |

    | Asheville  | 1976-02-01 | 1976-01-27  |    5 |

    | Asheville  | 1976-02-02 | 1976-02-01  |    1 |

    | Asheville  | 1976-02-15 | 1976-02-02  |   13 |

    | Asheville  | 1976-02-18 | 1976-02-15  |    3 |

    ...

    +------------+------------+-------------+------+

    ```


    For our <cte_query> section, we want to `GROUP BY` our `location` column and use
    the `AVG` function to compute the average of the `diff` column. Calling our CTE
    `precip_avg`, here is our completed query:


    ```

    WITH precip_avg AS (

    SELECT

    p1.location,

    p1.day, MAX(p2.day),

    DATEDIFF(p1.day, MAX(p2.day)) AS diff

    FROM precip AS p1,

    precip AS p2

    WHERE

    p1.location = p2.location

    AND

    p2.day < p1.day

    GROUP BY p1.day,p1.location

    ORDER BY location

    )

    SELECT

    location,

    AVG(diff) AS avg_days

    FROM precip_avg

    GROUP BY location

    ORDER BY location;

    ```


    The results are:


    ```

    +------------+----------+

    | location   | avg_days |

    +------------+----------+

    | Asheville  | 3.3611   |

    | Raleigh    | 3.7423   |

    | Wilmington | 3.3645   |

    +------------+----------+

    ```


    This query is good, but we can simplify it by using the `LAG` Window Function
    to eliminate the need to do a self-join.


    As before, we’ll start with the <cte_body> section, where instead of the self-join
    we just call the `LAG` function with the `day` column as the value, partitioning
    by `location` and ordering by the `day` column. This query looks like this:


    ```

    SELECT

    location,day,

    LAG(day) OVER (

    PARTITION BY location

    ORDER BY day

    ) AS prev_day

    FROM precip;

    ```


    The output of this query is different than what we got from our self-join version:


    ```

    +------------+------------+------------+

    | location   | day        | prev_day   |

    +------------+------------+------------+

    | Asheville  | 1976-01-03 | NULL       |

    | Asheville  | 1976-01-07 | 1976-01-03 |

    | Asheville  | 1976-01-13 | 1976-01-07 |

    | Asheville  | 1976-01-16 | 1976-01-13 |

    | Asheville  | 1976-01-17 | 1976-01-16 |

    | Asheville  | 1976-01-26 | 1976-01-17 |

    | Asheville  | 1976-01-27 | 1976-01-26 |

    | Asheville  | 1976-02-01 | 1976-01-27 |

    | Asheville  | 1976-02-02 | 1976-02-01 |

    | Asheville  | 1976-02-15 | 1976-02-02 |

    ...

    +------------+------------+------------+

    ```


    The main difference is the addition of the first row with the NULL result for
    the `prev_day` column. The other main difference is that we don’t have a `diff`
    column, because we removed the `DATEDIFF` function.


    Because the output is different, we need to change the <cte_query> section a bit.
    We’ll start by adding back the `DATEDIFF` function, this time inside of the `AVG`
    function, and because it is now outside of the <cte_body> we can simply call it
    with the `day` column and the new `prev_day` column generated by the `LAG` function.


    Our much simpler query now looks like this:


    ```

    WITH precip_avg AS (

    SELECT

    location,day,

    LAG(day) OVER (

    PARTITION BY location

    ORDER BY day

    ) AS prev_day

    FROM precip

    )

    SELECT location,

    AVG(DATEDIFF(day, prev_day)) AS avg_day

    FROM precip_avg

    GROUP BY location;

    ```


    Our query has only gone from 19 lines to 13, but the readability is much better
    without the confusing self-join in place. More importantly, the result is the
    same, and a by-product of removing the self-join is a nice performance boost.
    Or at least we would see a performance boost if our table were larger; our data
    set is simply too small to see much of a difference.'
  trans: '

    ## 开始之前


    本章示例中使用的表名为 `precip`，可以通过以下查询创建：


    ```

    CREATE TABLE precip (

    location TEXT,

    day DATE,

    precip FLOAT

    );

    ```


    数据位于一个名为 `bartholomew-ch07-precip.csv` 的 CSV 文件中。可以使用类似以下的查询加载数据（假设文件位于运行 MariaDB
    或 MySQL 服务器的计算机的 `/tmp/` 文件夹中）：


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch07-precip.csv''

    INTO TABLE precip

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    注意

    有关在 Windows 上加载文件以及处理 `secure_file_priv` 问题的额外信息，请参见第 1 章的“开始之前”部分。


    现在我们已准备就绪。


    ## 计算降水日之间的平均间隔时间


    `precip` 表包含了 1976 年美国北卡罗来纳州三个城市（Asheville、Raleigh 和 Wilmington）的降雨时间和降雨量数据。数据来自美国国家海洋和大气管理局（NOAA）网站
    [`https://www.ncdc.noaa.gov/cdo-web/search`](https://www.ncdc.noaa.gov/cdo-web/search)。


    分析降水或其他基于时间的数据时，一个常见的查询是计算事件之间的平均时间是多少，对于我们的数据而言，即计算下雨日之间的平均天数。


    通过使用不带窗口函数的 CTE，我们可以用一种稍微迂回的方式从 `precip` 表中选择数据，然后在遍历结果时，使用 `DATEDIFF` 函数来确定当前日期与之前查看过的最大日期之间的天数，并使用自连接来确保我们查看的是正确的数据。


    我们完成的 `<cte_body>` 部分如下所示：


    ```

    SELECT

    p1.location,

    p1.day, MAX(p2.day),

    DATEDIFF(p1.day, MAX(p2.day)) AS diff

    FROM precip AS p1,

    precip AS p2

    WHERE

    p1.location = p2.location

    AND

    p2.day < p1.day

    GROUP BY p1.day,p1.location

    ORDER BY location;

    ```


    此查询输出的前十行如下所示：


    ```

    +------------+------------+-------------+------+

    | location   | day        | MAX(p2.day) | diff |

    +------------+------------+-------------+------+

    | Asheville  | 1976-01-07 | 1976-01-03  |    4 |

    | Asheville  | 1976-01-13 | 1976-01-07  |    6 |

    | Asheville  | 1976-01-16 | 1976-01-13  |    3 |

    | Asheville  | 1976-01-17 | 1976-01-16  |    1 |

    | Asheville  | 1976-01-26 | 1976-01-17  |    9 |

    | Asheville  | 1976-01-27 | 1976-01-26  |    1 |

    | Asheville  | 1976-02-01 | 1976-01-27  |    5 |

    | Asheville  | 1976-02-02 | 1976-02-01  |    1 |

    | Asheville  | 1976-02-15 | 1976-02-02  |   13 |

    | Asheville  | 1976-02-18 | 1976-02-15  |    3 |

    ...

    +------------+------------+-------------+------+

    ```


    对于我们的 `<cte_query>` 部分，我们希望按 `location` 列进行 `GROUP BY` 分组，并使用 `AVG` 函数计算 `diff`
    列的平均值。将我们的 CTE 命名为 `precip_avg`，这是完成的查询：


    ```

    WITH precip_avg AS (

    SELECT

    p1.location,

    p1.day, MAX(p2.day),

    DATEDIFF(p1.day, MAX(p2.day)) AS diff

    FROM precip AS p1,

    precip AS p2

    WHERE

    p1.location = p2.location

    AND

    p2.day < p1.day

    GROUP BY p1.day,p1.location

    ORDER BY location

    )

    SELECT

    location,

    AVG(diff) AS avg_days

    FROM precip_avg

    GROUP BY location

    ORDER BY location;

    ```


    结果是：


    ```

    +------------+----------+

    | location   | avg_days |

    +------------+----------+

    | Asheville  | 3.3611   |

    | Raleigh    | 3.7423   |

    | Wilmington | 3.3645   |

    +------------+----------+

    ```


    这个查询很好，但我们可以通过使用 `LAG` 窗口函数来简化它，从而消除自连接的需要。


    和之前一样，我们将从 `<cte_body>` 部分开始，这里我们不是使用自连接，而是直接调用 `LAG` 函数，以 `day` 列作为值，按 `location`
    进行分区（PARTITION BY），并按 `day` 列排序（ORDER BY）。这个查询如下所示：


    ```

    SELECT

    location,day,

    LAG(day) OVER (

    PARTITION BY location

    ORDER BY day

    ) AS prev_day

    FROM precip;

    ```


    这个查询的输出与我们自连接版本得到的结果不同：


    ```

    +------------+------------+------------+

    | location   | day        | prev_day   |

    +------------+------------+------------+

    | Asheville  | 1976-01-03 | NULL       |

    | Asheville  | 1976-01-07 | 1976-01-03 |

    | Asheville  | 1976-01-13 | 1976-01-07 |

    | Asheville  | 1976-01-16 | 1976-01-13 |

    | Asheville  | 1976-01-17 | 1976-01-16 |

    | Asheville  | 1976-01-26 | 1976-01-17 |

    | Asheville  | 1976-01-27 | 1976-01-26 |

    | Asheville  | 1976-02-01 | 1976-01-27 |

    | Asheville  | 1976-02-02 | 1976-02-01 |

    | Asheville  | 1976-02-15 | 1976-02-02 |

    ...

    +------------+------------+------------+

    ```


    主要区别是添加了第一行，其 `prev_day` 列的结果为 NULL。另一个主要区别是我们没有了 `diff` 列，因为我们移除了 `DATEDIFF`
    函数。


    由于输出不同，我们需要稍微修改 `<cte_query>` 部分。我们将在 `AVG` 函数内部重新添加 `DATEDIFF` 函数，而且因为它现在位于 `<cte_body>`
    之外，我们可以简单地使用 `day` 列和 `LAG` 函数生成的新 `prev_day` 列来调用它。


    我们更简单的查询现在看起来像这样：


    ```

    WITH precip_avg AS (

    SELECT

    location,day,

    LAG(day) OVER (

    PARTITION BY location

    ORDER BY day

    ) AS prev_day

    FROM precip

    )

    SELECT location,

    AVG(DATEDIFF(day, prev_day)) AS avg_day

    FROM precip_avg

    GROUP BY location;

    ```


    我们的查询只从 19 行减少到了 13 行，但由于没有了令人困惑的自连接，可读性大大提高。更重要的是，结果是相同的，而移除自连接的一个附带好处是性能得到了提升。或者至少，如果我们的表更大，我们会看到性能提升；我们的数据集实在太小，看不出太大差别。

    '
- fmt: '## Adding a Primary Key Column


    Not all tables are perfect. Some would say that no tables are ever truly perfect.
    It’s a fact of life that tables are modified periodically due to updated requirements,
    maintenance, errors, and a host of other reasons.


    Let’s say a request comes in while you’re away on vacation to add a `precip_id`
    column to the `precip` table, but instead of adding the column as an auto-incrementing
    primary key, a junior DBA adds it as an `INT` with a default value assigned as
    hexadecimal number `1a` for some unknown reason. Here’s the code the junior DBA
    ran that does this:


    ```sql

    ALTER TABLE precip

    ADD COLUMN precip_id INT DEFAULT 0x1a FIRST;

    ```


    Because this is a new column, when the `ALTER TABLE` goes through, the `precip_id`
    column gets assigned the value 26, the decimal equivalent of hexadecimal 1a, on
    every row. Sometime later, you discover this error, and your task is to now fix
    the mess and `ALTER` the `precip` table so that the `precip_id` column is an auto-incrementing
    primary key, like it was originally supposed to be.


    We could try to do the following:


    ```sql

    ALTER TABLE precip

    MODIFY COLUMN precip_id SERIAL PRIMARY KEY FIRST;

    ```


    But because the `precip_id` columns for every row already have values in them,
    we’ll get the following error instead of what we want:


    ```text

    ERROR 1062 (23000): ALTER TABLE causes auto_increment resequencing, resulting
    in duplicate entry ''26'' for key ''PRIMARY''

    ```


    Another option would be to drop or rename the current `precip_id` column and then
    add it back with the correct definition. For the sake of this example, let’s assume
    this solution is not an option.


    So, what do we do? Thanks to Window Functions and Common Table Expressions, there
    is a third option we can use. The idea is to combine a Common Table Expression
    with the `ROW_NUMBER()` Window Function to produce a table that looks like how
    we want the `precip` table to end up. We then use this CTE-derived table as the
    source for updating the actual `precip` table.


    Unfortunately, this trick only works on MySQL right now, but the MariaDB developers
    will probably add support for it before too long.


    We start by defining our `<cte_body>`. This will be a simple `SELECT` statement,
    ordered by the `day` column, with the `ROW_NUMBER()` Window Function there to
    give each row of output a unique number. The code looks like this:


    ```sql

    SELECT

    ROW_NUMBER() OVER(

    ORDER BY day

    ) AS rnum,

    location, day, precip

    FROM precip

    ORDER BY day;

    ```


    The first few rows of output for this query, when run by itself, look like the
    following:


    ```text

    +------+------------+------------+--------+

    | rnum | location   | day        | precip |

    +------+------------+------------+--------+

    |    1 | Asheville  | 1976-01-03 |    0.2 |

    |    2 | Wilmington | 1976-01-03 |   0.01 |

    |    3 | Raleigh    | 1976-01-03 |   0.09 |

    |    4 | Wilmington | 1976-01-04 |   0.11 |

    |    5 | Asheville  | 1976-01-07 |   0.36 |

    |    6 | Wilmington | 1976-01-07 |   0.07 |

    |    7 | Raleigh    | 1976-01-07 |   0.47 |

    |    8 | Wilmington | 1976-01-08 |   0.16 |

    |    9 | Raleigh    | 1976-01-08 |    0.1 |

    |   10 | Wilmington | 1976-01-11 |   0.01 |

    ...

    +------+------------+------------+--------+

    ```


    For a `<cte_name>`, let’s use `precip_update`, so we’ll wrap our `<cte_body>`
    with a `WITH precip_update AS` clause.


    We now come to the `<cte_query>` section. Instead of a `SELECT` statement like
    we’ve used with previous CTE examples, this time we’ll use an `UPDATE` statement.
    In this statement, we first need to refer to both our CTE and our original `precip`
    table. Then, we `SET` the `precip.precip_id` to the value of `precip_update.rnum`
    wherever both the `location` and `day` match between these two tables.


    The final code looks like this:


    ```sql

    WITH precip_update AS (

    SELECT

    ROW_NUMBER() OVER(

    ORDER BY day

    ) AS rnum,

    location, day, precip

    FROM precip

    ORDER BY day

    )

    UPDATE precip, precip_update

    SET precip.precip_id = precip_update.rnum

    WHERE

    precip.location = precip_update.location

    AND

    precip.day = precip_update.day;

    ```


    As is usual with `UPDATE` commands, the output will simply tell us how many rows
    were matched and changed and if there were any warnings.


    Note


    If you try running this query using a graphical client, such as MySQL Workbench,
    you may get an error about safe update mode being enabled. If that happens, either
    switch to using the command-line `mysql` client or disable safe mode in Preferences
    > SQL Editor and reconnect.


    To view the change, we can issue a simple `SELECT`:


    ```sql

    SELECT * FROM precip ORDER BY precip_id;

    ```


    The first few rows of output look like this:


    ```text

    +-----------+------------+------------+--------+

    | precip_id | location   | day        | precip |

    +-----------+------------+------------+--------+

    |         1 | Asheville  | 1976-01-03 |    0.2 |

    |         2 | Wilmington | 1976-01-03 |   0.01 |

    |         3 | Raleigh    | 1976-01-03 |   0.09 |

    |         4 | Wilmington | 1976-01-04 |   0.11 |

    |         5 | Asheville  | 1976-01-07 |   0.36 |

    |         6 | Wilmington | 1976-01-07 |   0.07 |

    |         7 | Raleigh    | 1976-01-07 |   0.47 |

    |         8 | Wilmington | 1976-01-08 |   0.16 |

    |         9 | Raleigh    | 1976-01-08 |    0.1 |

    |        10 | Wilmington | 1976-01-11 |   0.01 |

    ...

    +-----------+------------+------------+--------+

    ```


    We’re not done at this point, but the final step is pretty simple. If we `DESCRIBE
    precip;` we’ll see that our `precip_id` column is still not a primary key, nor
    does it auto-increment:


    ```text

    +-----------+---------+------+-----+---------+-------+

    | Field     | Type    | Null | Key | Default | Extra |

    +-----------+---------+------+-----+---------+-------+

    | precip_id | int(11) | YES  |     | 26      |       |

    | location  | text    | YES  |     | NULL    |       |

    | day       | date    | YES  |     | NULL    |       |

    | precip    | float   | YES  |     | NULL    |       |

    +-----------+---------+------+-----+---------+-------+

    ```


    However, now that every row of our `precip_id` column is a unique number, thanks
    to the `ROW_NUMBER()` Window Function, we can issue the `ALTER TABLE` command
    that failed before:


    ```sql

    ALTER TABLE precip MODIFY COLUMN precip_id SERIAL PRIMARY KEY FIRST;

    ```


    This time, `ALTER TABLE` succeeds, and if we `DESCRIBE precip;` again, we’ll see
    that our `precip_id` column is exactly what we want:


    ```text

    +-----------+---------------------+------+-----+---------+----------------+

    | Field     | Type                | Null | Key | Default | Extra          |

    +-----------+---------------------+------+-----+---------+----------------+

    | precip_id | bigint(20) unsigned | NO   | PRI | NULL    | auto_increment |

    | location  | text                | YES  |     | NULL    |                |

    | day       | date                | YES  |     | NULL    |                |

    | precip    | float               | YES  |     | NULL    |                |

    +-----------+---------------------+------+-----+---------+----------------+

    ```


    ## Finding Gaps and Islands


    Serialized and time-based data generally arrives at a pre-determined time, such
    as every time a polling process kicks off. But sometimes there are unexpected
    gaps in the data, or like in the case of weather data such as in our `precip`
    table, gaps are expected. It doesn’t rain every day, after all.


    When analyzing such data, finding these gaps and islands of data can be very useful.'
