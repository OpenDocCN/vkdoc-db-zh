- fmt: '## Working with Time-Series Data


    `beach`表包含美国北卡罗来纳州赖茨维尔海滩1984年的温度记录，温度单位为摄氏度。


    我们可以通过以下查询`SELECT`示例数据，例如选择六月的前六天，以保持输出简洁：


    ```

    SELECT day, hour, temp

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    ORDER BY day,hour;

    ```


    图[6-1](#A454556_1_En_6_Chapter.html#Fig1)显示了输出结果。


    ![A454556_1_En_6_Fig1_HTML.jpg](A454556_1_En_6_Fig1_HTML.jpg)


    图6-1：1984年6月1日至6日的温度


    这个结果缺少任何分析。我们可以依赖外部包来获取原始数据并进行分析，但窗口函数允许我们在`mysql`客户端内部完成大量分析工作。


    ### 同时使用多个窗口函数


    有几种窗口函数可以帮助我们分析数据以寻找趋势。`AVG`函数可以给出设定时间段内的平均温度，`MIN`函数可以告诉我们记录的最低温度，而`MAX`函数可以告诉我们最高温度。如果我们使用`PARTITION
    BY day`将框架设置为每一天，我们的输出将显示我们所需的信息，同时仍然显示所有单独的温度（这是一个使用常规聚合函数难以做到的技巧）。


    这是查询的首次尝试：


    ```

    SELECT day, hour, temp,

    AVG(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ) AS day_avg,

    MIN(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ) AS day_min,

    MAX(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ) AS day_max

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    ORDER BY day,hour;

    ```


    这个查询有效，但存在一些问题，首先是输出。我们查看的是温度，因此不需要计算精确到15位小数，但这正是这些函数默认所做的。图[6-2](#A454556_1_En_6_Chapter.html#Fig2)显示了输出结果。


    ![A454556_1_En_6_Fig2_HTML.jpg](A454556_1_En_6_Fig2_HTML.jpg)


    图6-2：默认精度的输出


    除了6月3日的平均值，其余结果对于我们的需求来说过于精确。因此，作为查询的第一次优化，让我们将函数包装在`ROUND`函数中，将精度四舍五入到一位小数，以匹配我们的原始数据。这是我们修改后的查询：


    ```

    SELECT day, hour, temp,

    ROUND (AVG(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),1) AS day_avg,

    ROUND (MIN(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),1) AS day_min,

    ROUND (MAX(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),1) AS day_max

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    ORDER BY day,hour;

    ```


    我们的查询对于人类解析来说变得有点过于复杂了，但如图[6-3](#A454556_1_En_6_Chapter.html#Fig3)所示，输出看起来好多了。


    ![A454556_1_En_6_Fig3_HTML.jpg](A454556_1_En_6_Fig3_HTML.jpg)


    图6-3：四舍五入后的结果


    既然我们已经处理了输出，现在是时候看看能否让查询本身看起来更美观了。幸运的是，我们有`WINDOW`子句来帮助我们清理查询。这个子句在第[4](#A454556_1_En_4_Chapter.html)章介绍过，但我们还没有使用过。现在正是使用它的完美时机。我们所有的`OVER`子句都是相同的，因此我们可以创建一个`WINDOW`子句，并让所有`OVER`子句都引用它，如下所示：


    ```

    SELECT day, hour, temp,

    ROUND (AVG(temp) OVER w1,1) AS day_avg,

    ROUND (MIN(temp) OVER w1,1) AS day_min,

    ROUND (MAX(temp) OVER w1,1) AS day_max

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    WINDOW

    w1 AS (

    PARTITION BY day

    ORDER BY day,hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY day,hour;

    ```


    有了`WINDOW`子句，查询立刻变得更容易理解了。现在特别容易看出`ROUND`函数如何包裹我们的窗口函数。而且输出结果是一样的。双赢！


    使查询更具可读性的一个额外好处是，通过向`WINDOW`子句添加第二个窗口定义，可以更容易地扩展它。例如，我们可以定义额外的列，这些列给出整个结果集上的最小、最大和平均温度，如下所示：


    ```

    SELECT day, hour, temp,

    ROUND (AVG(temp) OVER w1,1) AS day_avg,

    ROUND (MIN(temp) OVER w1,1) AS day_min,

    ROUND (MAX(temp) OVER w1,1) AS day_max,

    ROUND (AVG(temp) OVER w2,1) AS all_avg,

    ROUND (MAX(temp) OVER w2,1) AS all_max,

    ROUND (MIN(temp) OVER w2,1) AS all_min

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    WINDOW

    w1 AS (

    PARTITION BY day

    ORDER BY day,hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),

    w2 AS (

    ORDER BY day,hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY day,hour;

    ```


    考虑到我们的结果集只有六天，一个月会更有意义，结果如图[6-4](#A454556_1_En_6_Chapter.html#Fig4)所示。


    ![A454556_1_En_6_Fig4_HTML.jpg](A454556_1_En_6_Fig4_HTML.jpg)


    图6-4：向输出添加额外列


    如果我们能优化查询以消除`w1`和`w2` `WINDOW`定义中重复的<frame_definition>部分就好了，但`WINDOW`定义中排序的语法规则使这成为不可能。'
  raw: '## Working with Time-Series Data


    The `beach` table contains temperature records for the year 1984 from Wrightsville
    Beach in North Carolina, USA. The temperatures are in degrees Celsius.


    We can `SELECT` a sample of this data, say from the first six days of June, to
    keep the output brief, with the following query:


    ```

    SELECT day, hour, temp

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    ORDER BY day,hour;

    ```


    Figure [6-1](#A454556_1_En_6_Chapter.html#Fig1) shows the output.


    ![A454556_1_En_6_Fig1_HTML.jpg](A454556_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Temperatures from June 1–6, 1984


    What’s missing from this result is any sort of analysis. We could rely on an external
    package to take our raw data and do the analysis for us, but Window Functions
    allow us to do a lot of the analyzing inside the mysql client.


    ### Using Multiple Window Functions at Once


    There are several Window Functions that can assist us in analyzing our data as
    we look for trends. The `AVG` function can give us the average temperature over
    a set time period, the `MIN` function can tell us what the lowest recorded temperature
    was, and the `MAX` function can tell us what the maximum temperature was. If we
    `PARTITION BY day` to set our frame to each whole day, our output will tell us
    the information we’re looking for, while still showing us all of the individual
    temperatures (a trick that can’t be done easily using regular aggregate functions).


    Here’s a first attempt at the query:


    ```

    SELECT day, hour, temp,

    AVG(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ) AS day_avg,

    MIN(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ) AS day_min,

    MAX(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ) AS day_max

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    ORDER BY day,hour;

    ```


    This query works, but there are some issues, the first of which is the output.
    We’re looking at temperatures, so there’s no need for us to have precision on
    our calculations to 15 decimal points, but that is exactly what each of these
    functions does by default. Figure [6-2](#A454556_1_En_6_Chapter.html#Fig2) shows
    the output.


    ![A454556_1_En_6_Fig2_HTML.jpg](A454556_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    Output with default precision


    Apart from the averages for June 3, the rest of the results are too precise for
    our needs, so as a first optimization of our query, let’s wrap our functions inside
    the `ROUND` function, to round to just one decimal of precision, since that matches
    our original data. Here’s our modified query:


    ```

    SELECT day, hour, temp,

    ROUND (AVG(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),1) AS day_avg,

    ROUND (MIN(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),1) AS day_min,

    ROUND (MAX(temp) OVER (

    PARTITION BY day

    ORDER BY hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),1) AS day_max

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    ORDER BY day,hour;

    ```


    Our query is getting a little too complicated for easy parsing by humans, but
    the output, shown in Figure [6-3](#A454556_1_En_6_Chapter.html#Fig3), looks much
    better.


    ![A454556_1_En_6_Fig3_HTML.jpg](A454556_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Rounded results


    Now that we’ve dealt with the output, it’s time to see if we can make the query
    itself look as nice. Luckily, we have the `WINDOW` clause to help us clean our
    query up. This clause was introduced back in Chapter [4](#A454556_1_En_4_Chapter.html),
    but we haven’t used it yet. This is the perfect time to do so. All of our `OVER`
    clauses are identical, so we can create one `WINDOW` clause and have all of the
    `OVER` clauses just refer to it, like so:


    ```

    SELECT day, hour, temp,

    ROUND (AVG(temp) OVER w1,1) AS day_avg,

    ROUND (MIN(temp) OVER w1,1) AS day_min,

    ROUND (MAX(temp) OVER w1,1) AS day_max

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    WINDOW

    w1 AS (

    PARTITION BY day

    ORDER BY day,hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY day,hour;

    ```


    With the `WINDOW` clause in place the query is instantly more understandable.
    It is especially easy now to see how the `ROUND` function wraps around our Window
    Functions. And the output is the same. Win-win!


    A side benefit of making the query more readable is that it becomes easier to
    extend it by adding a second window definition to our `WINDOW` clause. For example,
    we can define additional columns that give the min, max, and average temperatures
    over our entire result set, like so:


    ```

    SELECT day, hour, temp,

    ROUND (AVG(temp) OVER w1,1) AS day_avg,

    ROUND (MIN(temp) OVER w1,1) AS day_min,

    ROUND (MAX(temp) OVER w1,1) AS day_max,

    ROUND (AVG(temp) OVER w2,1) AS all_avg,

    ROUND (MAX(temp) OVER w2,1) AS all_max,

    ROUND (MIN(temp) OVER w2,1) AS all_min

    FROM beach

    WHERE day BETWEEN ''1984-06-01'' AND ''1984-06-06''

    WINDOW

    w1 AS (

    PARTITION BY day

    ORDER BY day,hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),

    w2 AS (

    ORDER BY day,hour

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY day,hour;

    ```


    Keeping in mind that our result set is only six days, and that a month would be
    more meaningful, the result is shown in Figure [6-4](#A454556_1_En_6_Chapter.html#Fig4).


    ![A454556_1_En_6_Fig4_HTML.jpg](A454556_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Adding additional columns to the output


    It would be nice if we could optimize our query to get rid of the duplicated <frame_definition>
    sections in our `w1` and `w2 WINDOW` definitions, but the syntax rules of ordering
    in `WINDOW` definitions make this impossible.'
