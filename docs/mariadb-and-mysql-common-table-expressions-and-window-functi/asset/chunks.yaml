    ERROR 1054 (42S22): Unknown column ''rnk'' in ''where clause''

    ```


    On the surface, this error is very confusing. We are referencing the `rnk` column
    in both the `WHERE` and `ORDER BY` clauses, and they’re right next to each other.
    So, why does it work in the `ORDER BY` clause and not in the `WHERE` clause? The
    reason is the same one we saw before in the `ROW_NUMBER` example. It bears repeating
    here: Window Functions aren’t computed until after any and all `WHERE`, `HAVING`,
    and `GROUP BY` clauses are finished. Once they are, the function will run, and
    only then will the `rnk` column exist, so with the way our query is written, only
    the `ORDER BY` clause can see it.


    To solve our problem, we want the `WHERE` clause to be able to see the `rnk` column.
    So, we need to somehow force the `RANK` function to run prior to our `WHERE` clause.
    A simple way to do this is to use a derived table by taking our original query,
    everything from the initial `SELECT` down to just before the `WHERE` clause, and
    stuff it all into a simple `SELECT` like so:


    ```

    SELECT * FROM (


    ) AS ranks

    ```


    For the `AS ranks` part, we could have used any name, since we don’t use or refer
    to our derived table anywhere else. In this case, the name `ranks` seemed logical
    enough.


    After adding our derived table wrapper, here’s our final query:


    ```

    SELECT * FROM (

    SELECT

    RANK() OVER (

    PARTITION BY employees.office

    ORDER BY commissions.commission_amount DESC

    ) AS rnk,

    commissions.commission_date AS date,

    commissions.commission_id AS cid,

    employees.name AS salesperson,

    employees.office AS office,

    commissions.commission_amount AS amount

    FROM commissions LEFT JOIN employees

    ON (commissions.salesperson_id = employees.id)

    ) AS ranks

    WHERE rnk <= 2

    ORDER BY office,rnk;

    ```


    Now that our main query is operating as a derived table, the `WHERE` clause is
    able to see the `rnk` column, and our output is as follows:


    ```

    +-----+------------+-------+------------------+-------------+--------+

    | rnk | date       | cid   | salesperson      | office      | amount |

    +-----+------------+-------+------------------+-------------+--------+

    |   1 | 2017-09-22 | 17776 | Jack Green       | Chicago     | 497.83 |

    |   2 | 2017-05-12 | 17215 | Deborah Peterson | Chicago     | 497.29 |

    |   1 | 2017-06-15 | 17340 | Alonzo Page      | Cleveland   | 499.90 |

    |   2 | 2017-05-25 | 17261 | Alonzo Page      | Cleveland   | 499.29 |

    |   1 | 2017-03-22 | 16987 | Rene Gibbs       | Dallas      | 499.55 |

    |   2 | 2017-09-18 | 17756 | Kathryn Barnes   | Dallas      | 499.43 |

    |   1 | 2017-01-16 | 16688 | Joyce Beck       | Memphis     | 499.41 |

    |   2 | 2017-03-02 | 16890 | Tammy Castro     | Memphis     | 497.58 |

    |   1 | 2017-12-11 | 18116 | Terrance Reese   | Minneapolis | 499.31 |

    |   2 | 2017-04-05 | 17047 | Ruby Boyd        | Minneapolis | 495.98 |

    |   1 | 2017-08-30 | 17674 | Dorothy Anderson | Nauvoo      | 497.91 |

    |   2 | 2017-12-11 | 18115 | Dorothy Anderson | Nauvoo      | 468.99 |

    |   1 | 2017-01-20 | 16706 | John Conner      | Raleigh     | 499.33 |

    |   2 | 2016-08-26 | 16082 | Randal Hogan     | Raleigh     | 499.07 |

    |   1 | 2017-11-03 | 17970 | Christina Terry  | Wichita     | 499.97 |

    |   2 | 2016-10-31 | 16345 | Christina Terry  | Wichita     | 497.83 |

    +-----+------------+-------+------------------+-------------+--------+

    ```


    The only task left now is to try to find out how best to reward these hardworking
    salespeople. Maybe a gift certificate?


    ## Summary


    In this chapter, we explored how <partition_definition>, <order_definition>, and
    <frame_definition> sections are often used in the `OVER` clause. We also got to
    see the `ROW_NUMBER` and `RANK` Window Functions in practice, including how to
    work around some common issues that arise when using them and other Window Functions.


    In the next chapter, we’ll continue our exploration of Window Functions with a
    deeper dive into using them to parse and generate graphs of real-world time-series
    temperature data and analyze fruit sales across a chain of stores.


    # 6. Window Functions in Practice


    This chapter contains several examples that demonstrate using Window Functions
    in the real world. We’ll start with a demonstration of using them multiple times
    in the same query to see how the `WINDOW` clause makes this simple and easy to
    read. Next, we’ll explore using Window Functions to help us when we graph time-series
    data. Lastly, we’ll use Window Functions to analyze sales data.


    ## Before We Begin


    The examples in this chapter utilize sample data you can use to follow along with
    the text and experiment with. The first table used in this chapter is called `beach`,
    and it can be created with the following query:


    ```

    CREATE TABLE beach (

    day DATE,

    hour TIME,

    temp FLOAT

    );

    ```


    The data itself is in a CSV file called `bartholomew-ch06-beach.csv` and comes
    from NOAA’s Automated Weather Observing System (AWOS). Lots of data is available
    from them, and it can be accessed from [`https://www.ncdc.noaa.gov/data-access/land-based-station-data/land-based-datasets/automated-weather-observing-system-awos`](https://www.ncdc.noaa.gov/data-access/land-based-station-data/land-based-datasets/automated-weather-observing-system-awos)
    `.`


    The data can be loaded with a query similar to the following (assuming the file
    is on the computer running MariaDB server in the `/tmp/` folder):


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch06-beach.csv''

    INTO TABLE beach

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    The second section of this chapter utilizes a table called `fruitmart`, which
    can be created with the following query:


    ```

    CREATE TABLE fruitmart (

    store TEXT,

    month DATE,

    fruit TEXT,

    sold  INT

    );

    ```


    The data itself is in a CSV file called `bartholomew-ch06-fruitmart.csv`. It can
    be loaded with a query similar to the following (assuming the file is on the computer
    running MariaDB server in the `/tmp/` folder):


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch06-fruitmart.csv''

    INTO TABLE fruitmart

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    Note


    See the “Before We Begin” section of Chapter [1](#A454556_1_En_1_Chapter.html)
    for extra information about loading the files on Windows and working around issues
    with `secure_file_priv`.


    We’re now ready to begin.'
