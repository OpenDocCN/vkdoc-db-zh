    that looks at the current row, the previous ten rows, and the following ten rows.
    The effect of this will smooth things out, like so:


    ```

    mysql -p --column-names=0 apress -e "

    SELECT day, hour, temp,

    AVG(temp) over (

    ORDER BY day,hour

    ROWS BETWEEN

    10 PRECEDING

    AND

    10 FOLLOWING

    ) AS average

    FROM beach

    ORDER BY day,hour;

    " > /tmp/out.dat

    ```


    We can then launch gnuplot and run the following commands to generate our new
    plot:


    ```

    set xdata time

    set style data lines

    set timefmt "%Y-%m-%d  %H:%m:%s"

    set format x "%b"

    set xlabel "1984 Wrightsville Beach Temperatures"

    set ylabel "Temperature in Degrees C"

    set autoscale y

    set linetype 2 linewidth 4

    set xrange ["1984-01-01":"1984-12-31"]

    plot "/tmp/out.dat" using 1:3 title "Temperature" with lines, \

    "/tmp/out.dat" using 1:4 title "Average" with lines

    ```


    These commands are mostly identical to the previous gnuplot commands, with a couple
    of key additions. First, the `plot` command (now split over two lines to make
    it more readable) has an additional data line defined, the `average` column from
    our output. And second, there is a `set linetype` command that makes the line
    on the graph that shows the Average as thicker than the Temperature line to make
    it stand out better. The gnuplot output should look similar to Figure [6-6](#A454556_1_En_6_Chapter.html#Fig6).


    ![A454556_1_En_6_Fig6_HTML.jpg](A454556_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    1984 Wrightsville Beach Temperatures, with average


    If the average line is still too rough, we can just change the tens in our query
    to higher numbers and then rerun the gnuplot commands.'
