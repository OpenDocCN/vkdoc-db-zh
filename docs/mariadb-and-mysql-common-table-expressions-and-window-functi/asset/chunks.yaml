    ## 任务与问题


    我们的任务是将输出限制为每个办公室的前两名。一个简单的解决方案是添加一个 `WHERE rnk <=2` 子句来查找排名小于等于2的记录。对我们的查询进行快速修改后得到：


    ```sql

    SELECT

    RANK() OVER (

    PARTITION BY employees.office

    ORDER BY commissions.commission_amount DESC

    ) AS rnk,

    commissions.commission_date AS date,

    commissions.commission_id AS cid,

    employees.name AS salesperson,

    employees.office AS office,

    commissions.commission_amount AS amount

    FROM commissions LEFT JOIN employees

    ON (commissions.salesperson_id = employees.id)

    WHERE rnk <= 2

    ORDER BY office,rnk;

    ```


    然而，当我们尝试运行这个新查询时，会得到以下错误：


    ```sql

    ERROR 1054 (42S22): Unknown column ''rnk'' in ''where clause''

    ```


    表面上看，这个错误非常令人困惑。我们在 `WHERE` 和 `ORDER BY` 子句中都引用了 `rnk` 列，而且它们紧挨着。那么，为什么它在 `ORDER
    BY` 子句中有效，而在 `WHERE` 子句中无效呢？原因与我们之前在 `ROW_NUMBER` 示例中看到的一样。这里有必要重申一遍：窗口函数直到所有
    `WHERE`、`HAVING` 和 `GROUP BY` 子句执行完毕后才会被计算。计算完成后，函数才会运行，`rnk` 列才存在。因此，按照我们查询的写法，只有
    `ORDER BY` 子句能看到它。


    为了解决这个问题，我们需要让 `WHERE` 子句能够看到 `rnk` 列。因此，我们需要以某种方式强制 `RANK` 函数在 `WHERE` 子句之前运行。一个简单的方法是使用派生表：将我们原始的查询（从初始的
    `SELECT` 到 `WHERE` 子句之前的所有内容）放入一个简单的 `SELECT` 中，就像这样：


    ```sql

    SELECT * FROM (


    ) AS ranks

    ```


    对于 `AS ranks` 部分，我们可以使用任何名称，因为我们没有在其他地方使用或引用这个派生表。在这里，名称 `ranks` 看起来很合适。


    添加派生表包装器后，我们最终的查询如下：


    ```sql

    SELECT * FROM (

    SELECT

    RANK() OVER (

    PARTITION BY employees.office

    ORDER BY commissions.commission_amount DESC

    ) AS rnk,

    commissions.commission_date AS date,

    commissions.commission_id AS cid,

    employees.name AS salesperson,

    employees.office AS office,

    commissions.commission_amount AS amount

    FROM commissions LEFT JOIN employees

    ON (commissions.salesperson_id = employees.id)

    ) AS ranks

    WHERE rnk <= 2

    ORDER BY office,rnk;

    ```


    现在我们的主查询作为派生表运行，`WHERE` 子句能够看到 `rnk` 列，我们的输出结果如下：


    ```sql

