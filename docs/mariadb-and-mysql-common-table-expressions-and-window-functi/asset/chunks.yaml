    # 第一部分 公用表表达式


    # 1. 公用表表达式基础


    公用表表达式 (`CTEs`) 是在 `MariaDB 10.2` 和 `MySQL 8.0` 中引入的新 `SQL` 功能之一。本章将介绍 `CTEs`，描述其两种类型，并解释基本语法。`CTEs`
    是命名的临时结果集，其生命周期仅限于它们所在的查询。在某些方面，它们类似于派生表，但功能更强大。它们可以递归地引用自身，并且可以在同一查询中被多次引用。它们还支持列分组，并且可以作为视图的替代方案使用，而无需我们拥有
    `CREATE VIEW` 权限。`CTEs` 最初是作为 `SQL99` 标准的一部分引入的。

    '
- fmt: "## Before We Begin\n\n在深入了解`CTE`是什么以及它们能做什么之前，本章中的示例使用了你可以用于跟随文本并自己实验`CTE`的示例数据。本章使用的表名为\
    \ `employees` ，可以通过以下查询创建：\n\n```sql\nCREATE TABLE employees (\nid serial primary\
    \ key,\nname VARCHAR(150) NOT NULL,\ntitle VARCHAR(100),\noffice VARCHAR(100)\n\
    );\n```\n\n数据本身在一个名为 `bartholomew-ch01.csv` 的`CSV`文件中。可以使用类似于以下内容的查询加载（假设文件位于运行`MariaDB`或`MySQL`服务器的计算机的\
    \ `/tmp/` 文件夹中）：\n\n```sql\nLOAD DATA INFILE '/tmp/bartholomew-ch01.csv'\nINTO\
    \ TABLE employees\nFIELDS TERMINATED BY ','\nOPTIONALLY ENCLOSED BY '\"';\n```\n\
    \n如果你使用的是`MySQL 8.0`，那么 `secure_file_priv` 设置默认是开启的。在这种情况下，你需要将文件移动到配置中指定的位置，或者在你的\
    \ `my.cnf` 或 `my.ini` 文件中关闭该设置。\n\n在`Linux`上，`secure_file_priv`的默认位置是 `/var/lib/mysql-files/`，在`Windows`上是\
    \ `C:\\ProgramData\\MySQL\\MySQLServer 8.0\\Uploads\\`；在运行 `LOAD DATA` 命令之前，你需要将文件移动到该位置，然后修改命令以指向该位置而不是\
    \ `/tmp/` 文件夹。\n\n你可以使用以下命令找出本地`MySQL`安装的 `secure_file_priv` 设置是什么：\n\n```sql\n\
    SHOW VARIABLES LIKE 'secure_file_priv';\n```\n\n我们现在准备开始了。\n\n> **Tip**\n>\n>\
    \ 在`Windows`上使用`MySQL`命令行客户端时，可以在 `LOAD DATA` 命令中使用`Linux`风格的路径。值得一提的是，如果你选择使用`Windows`风格的路径，则需要使用双反斜杠（`\\\
    \\`），因为反斜杠字符用于转义其他字符。例如，以下内容是等效的：\n\n```sql\nLOAD DATA INFILE '/ProgramData/MySQL/MySQL\
    \ Server 8.0/Uploads/file.csv'\nLOAD DATA INFILE 'C:\\\\ProgramData\\\\MySQL\\\
    \\MySQL Server 8.0\\\\Uploads\\\\file.csv'\n```\n\n## What Are Common Table Expressions?\n\
    \n`Common Table Expressions`通常被称为`CTE`。可以将它们视为一个查询的结果，该结果有一个名称，你可以在查询的后面部分引用它。如果命名的结果集听起来有点像视图（`view`）或派生表（`derived\
    \ table`），那是因为它确实是，但有一些显著的区别。我们马上就会讲到这些区别。首先，`CTE`是什么样子的？\n\n## Basic CTE Syntax\n\
    \n`Common Table Expression`的通用语法如下：\n\n```sql\nWITH <cte_name> AS (\n    <cte_body>\n\
    )\n<cte_query>\n```\n\n`WITH` 和 `AS` 关键字是将`CTE`与普通查询区分开来的标志。如果你看到一个以 `WITH ...\
    \ AS` 开头的查询，那么你看到的就是一个`CTE`。尖括号 `<>` 中的部分是你需要提供的。现在让我们逐一讲解不同的部分：\n\n*   `<cte_name>`\
    \ 是我们将在查询后面部分用来引用`CTE`的名称；它可以是任何有效的名称，即不是保留字或函数名。\n*   `<cte_body>` 是一个产生结果的 `SELECT`\
    \ 语句。这部分被包裹在圆括号 `()` 中。\n*   `<cte_query>` 是我们在`SQL`查询中引用 `<cte_name>` 的地方。例如：\n\
    \n    ```sql\n    SELECT <select_criteria> FROM <cte_name> [WHERE ...]\n    ```\n\
    \n*   `<select_criteria>` 是你正常的 `SELECT` 查询标准，带有可选的 `WHERE` 和其他子句。\n\n这可能有点难以可视化，所以这里有一个基本有效的`CTE`示例，我们在其中定义了一个\
    \ `<cte_name>`，然后从它 `SELECT`。这个`CTE`使用了我们在本章开头加载的示例数据，所以请随意在你的`MariaDB`或`MySQL`服务器上运行它。\n\
    \n```sql\nWITH emp_raleigh AS (\nSELECT * FROM employees\nWHERE office='Raleigh'\n\
    )\nSELECT * FROM emp_raleigh\nWHERE title != 'salesperson'\nORDER BY title;\n\
    ```\n\n让我们分解一下这里发生了什么。我们的 `<cte_name>` 是 `emp_raleigh`，它是一个简单的 `SELECT` 语句，选择\
    \ `employees` 表中`WHERE`办公室为`Raleigh`的每一行。你可以把这个`CTE`看作是`employees`表的一个视图或过滤器。然后，在\
    \ `<cte_query>` 部分，我们将 `<cte_name>` 用作一个简单查询的一部分，该查询查找员工不是销售人员的每个条目，最后按他们的职位对结果进行排序。因为\
    \ `<cte_query>` 使用了我们的 `emp_raleigh` `<cte_name>`，所以我们的结果只来自`employees`表中 `WHERE\
    \ office='Raleigh'` 的记录。\n\n使用我们的示例数据，结果是：\n\n```sql\n+-----+-----------------+------------+---------+\n\
    | id  | name            | title      | office  |\n+-----+-----------------+------------+---------+\n\
    |  73 | Mark Hamilton   | dba        | Raleigh |\n|  77 | Nancy Porter    | dba\
    \        | Raleigh |\n| 135 | Pauline Neal    | dba        | Raleigh |\n|  68\
    \ | Edmund Hines    | manager    | Raleigh |\n|  28 | Marc Greene     | programmer\
    \ | Raleigh |\n|  96 | Mary Walker     | programmer | Raleigh |\n| 100 | Freida\
    \ Duchesne | programmer | Raleigh |\n+-----+-----------------+------------+---------+\n\
    ```\n\n因此，除了可能存在的销售人员之外，我们的`Raleigh`办公室看起来非常技术化，除了一个经理外，都是`DBA`和程序员。\n\n## The\
    \ Motivation for CTEs\n\n我们简单示例的结果看起来很像你可能使用派生表（又名内联视图）或视图来获得的东西，这两者在`MariaDB`和`MySQL`中已经存在多年了。为什么有人会想使用`CTE`而不是更熟悉的视图或派生表呢？以下是一些原因。\n\
    \n### Temporary\n\n首先，`CTE`是临时的。一个`CTE`在同一个查询中定义和使用。而视图则更持久，可以被认为是一个某种程度上持久的虚拟表。`CTE`的这种临时性可能是件好事。因为`CTE`和使用它的查询都在一起定义，所以修改它以跟上更新的业务需求很容易。这与视图形成对比，视图需要与使用它的查询分开更新。\n\
    \n这种临时性是派生表如此受欢迎的部分原因；它们让你快速生成一个有用的临时结果集，你可以对其执行操作。`CTE`在此基础上构建了更强大的功能集。\n\n###\
    \ Readable\n\n使用`CTE`的一个很大原因是它们通常更具可读性。复杂的视图或嵌套的派生表查询可能很难被普通人解析，通常需要从内到外、从后到前或以其他不自然的顺序阅读查询。与`CTE`形成对比，`CTE`通常可以从上到下阅读。\n\
    \n例如，这是我们将简单的`CTE`示例重写为派生表的版本：\n\n```sql\nSELECT * FROM (\nSELECT * FROM employees\n\
    WHERE office='Raleigh'\n) AS emp_raleigh\nWHERE title != 'salesperson'\nORDER\
    \ BY title;\n```\n\n为了方便你不必回头找，这里是`CTE`版本：\n\n```sql\nWITH emp_raleigh AS (\n\
    SELECT * FROM employees\nWHERE office='Raleigh'\n)\nSELECT * FROM emp_raleigh\n\
    WHERE title != 'salesperson'\nORDER BY title;\n```\n\n毫不奇怪，使用我们的示例数据，两个查询的输出是相同的。然而，当你比较它们时，`CTE`只需从头到尾阅读即可理解。另一方面，要理解派生表，你需要首先阅读内部的\
    \ `SELECT` 语句，然后跳到外部的 `SELECT` 语句，然后再回到末尾。在像这样的简单示例上，与`CTE`相比的额外困难是最小的，但是随着派生表查询变得更加复杂，阅读它的难度会呈指数级增长。而对于`CTE`来说，难度的增长更线性，因为你总是可以从头到尾自然地阅读。"
  raw: "## Before We Begin\n\nBefore we get into more detail on what CTEs are and\
    \ what they can do, the examples in this chapter utilize sample data you can use\
    \ to follow along with the text and experiment with CTEs yourself. The table used\
    \ in this chapter is called `employees` and it can be created with the following\
    \ query:\n\n```\nCREATE TABLE employees (\nid serial primary key,\nname VARCHAR(150)\
    \ NOT NULL,\ntitle VARCHAR(100),\noffice VARCHAR(100)\n);\n```\n\nThe data itself\
    \ is in a CSV file called `bartholomew-ch01.csv` . It can be loaded with a query\
    \ similar to the following (assuming the file is on the computer running MariaDB\
    \ or MySQL server in the `/tmp/` folder):\n\n```\nLOAD DATA INFILE '/tmp/bartholomew-ch01.csv'\n\
    INTO TABLE employees\nFIELDS TERMINATED BY ','\nOPTIONALLY ENCLOSED BY '\"';\n\
    ```\n\nIf you are using MySQL 8.0 , then the `secure_file_priv` setting is on\
    \ by default. In this case, you will either need to move the file to the location\
    \ specified in your config or turn off the setting in your `my.cnf` or `my.ini`\
    \ file.\n\nOn Linux, the default location for `secure_file_priv` is `/var/lib/mysql-files/`,\
    \ and on Windows it is `C:\\ProgramData\\MySQL\\MySQLServer 8.0\\Uploads\\`; you’ll\
    \ need to move the files to that location before running the `LOAD DATA` command\
    \ and then modify the command to point at that location instead of at the `/tmp/`\
    \ folder.\n\nYou can find out what your local MySQL installation’s `secure_file_priv`\
    \ setting is with the following command:\n\n```\nSHOW VARIABLES LIKE 'secure_file_priv';\n\
    ```\n\nWe’re now ready to begin.\n\nTip\n\nWhen using the MySQL command-line client\
    \ on Windows, you can use Linux-style paths with the `LOAD DATA` command. It’s\
    \ also worth mentioning that if you instead choose to use Windows-style paths,\
    \ you will need to use double backslashes (\\\\) because the backslash character\
    \ is used to escape other characters. For example, the following are equivalent:\n\
    \n```\nLOAD DATA INFILE '/ProgramData/MySQL/MySQL Server 8.0/Uploads/file.csv'\n\
    LOAD DATA INFILE 'C:\\\\ProgramData\\\\MySQL\\\\MySQL Server 8.0\\\\Uploads\\\\\
    file.csv'\n```\n\n## What Are Common Table Expressions?\n\nCommon Table Expressions\
    \ are commonly referred to as CTEs. Think of them as the result of a query that\
    \ has a name you can refer to later on in your query. If a named result set sounds\
    \ a little like a view or a derived table, that’s because it is, but with some\
    \ significant differences. We’ll get to those in a second. First, what does a\
    \ CTE look like?\n\n## Basic CTE Syntax\n\nThe general syntax for a Common Table\
    \ Expression is as follows:\n\n```\nWITH  AS (\n\n)\n\n```\n\nThe `WITH` and `AS`\
    \ keywords are what distinguish a CTE from a normal query. If you see a query\
    \ that begins with `WITH ... AS` then you are looking at a CTE. The parts in angle\
    \ brackets `<>` are what you provide. Let’s go over the different parts now:\n\
    \n*   <cte_name> is the name we will use to refer to the CTE later in our query;\
    \ it can be any valid name, i.e., not a reserved word or function name.\n*   <cte_body>\
    \ is just a `SELECT` statement that produces a result. This part is wrapped in\
    \ parentheses `()`.\n*   <cte_query> is where we reference the `<cte_name>` in\
    \ a SQL query. For example:\n\n    ```\n    SELECT  FROM  [WHERE ...]\n    ```\n\
    \n*   <select _criteria> is your normal `SELECT` query criteria with optional\
    \ `WHERE` and other clauses.\n\nThis might be a little difficult to visualize,\
    \ so here’s a basic valid CTE where we define a single <cte_name> and then `SELECT`\
    \ from it. This CTE uses the sample data we loaded at the beginning of the chapter,\
    \ so feel free to run it on your MariaDB or MySQL server.\n\n```\nWITH emp_raleigh\
    \ AS (\nSELECT * FROM employees\nWHERE office='Raleigh'\n)\nSELECT * FROM emp_raleigh\n\
    WHERE title != 'salesperson'\nORDER BY title;\n```\n\nLet’s break down what is\
    \ happening here. Our <cte_name> is `emp_raleigh`, and it is a simple `SELECT`\
    \ statement that selects every row in the `employees` table `WHERE` the office\
    \ is Raleigh. You can think of this CTE as a view or filter of the `employees`\
    \ table. Then, in the <cte_query> section, we use the <cte_name> as part of a\
    \ simple query that looks for every entry where the employee is not a salesperson,\
    \ and lastly it orders the results by their job title. Because the <cte_query>\
    \ uses our `emp_raleigh` <cte_name>, our results will only come from records in\
    \ the `employees` table `WHERE office='Raleigh'`.\n\nUsing our sample data, the\
    \ result is:\n\n```\n+-----+-----------------+------------+---------+\n| id  |\
    \ name            | title      | office  |\n+-----+-----------------+------------+---------+\n\
    |  73 | Mark Hamilton   | dba        | Raleigh |\n|  77 | Nancy Porter    | dba\
    \        | Raleigh |\n| 135 | Pauline Neal    | dba        | Raleigh |\n|  68\
    \ | Edmund Hines    | manager    | Raleigh |\n|  28 | Marc Greene     | programmer\
    \ | Raleigh |\n|  96 | Mary Walker     | programmer | Raleigh |\n| 100 | Freida\
    \ Duchesne | programmer | Raleigh |\n+-----+-----------------+------------+---------+\n\
    ```\n\nSo, apart from any salespeople there might be, our Raleigh office looks\
    \ to be quite technical , just DBAs and programmers, apart from a single manager.\n\
    \n## The Motivation for CTEs\n\nThe result from our simple example looks a lot\
    \ like something you might use a derived table (AKA an inline view) or a view\
    \ to get, both of which have existed in MariaDB and MySQL for years. Why would\
    \ anyone ever want to use CTEs instead of the more familiar views or derived tables?\
    \ Here are some reasons.\n\n### Temporary\n\nFirst off, CTEs are temporary. A\
    \ CTE is defined and used in the same query. A view, on the other hand, is more\
    \ permanent and can be thought of as a somewhat permanent virtual table. This\
    \ temporary nature of CTEs can be a good thing. Because the CTE and the query\
    \ that uses it are all defined together, modifying it to keep up with updated\
    \ business requirements is easy. Contrast that with a view, which needs to be\
    \ updated separately from the queries that use it.\n\nThis temporary nature is\
    \ part of the reason why derived tables are so popular; they let you quickly generate\
    \ a useful temporary result set that you can perform operations on. CTEs build\
    \ upon that usefulness with a more powerful set of features.\n\n### Readable\n\
    \nOne big reason to use CTEs is because they are often more readable. Complex\
    \ views or nested derived table queries can be hard for mere mortals to parse,\
    \ often requiring reading the query inside-out, back-to-front, or some other unnatural\
    \ order. Contrast that with CTEs, which generally can be read from top to bottom.\n\
    \nFor example, here’s our simple CTE example rewritten as a derived table:\n\n\
    ```\nSELECT * FROM (\nSELECT * FROM employees\nWHERE office='Raleigh'\n) AS emp_raleigh\n\
    WHERE title != 'salesperson'\nORDER BY title;\n```\n\nAnd so you don’t have to\
    \ go back and find it, here is the CTE version again:\n\n```\nWITH emp_raleigh\
    \ AS (\nSELECT * FROM employees\nWHERE office='Raleigh'\n)\nSELECT * FROM emp_raleigh\n\
    WHERE title != 'salesperson'\nORDER BY title;\n```\n\nUnsurprisingly, the output\
    \ of both queries, using our sample data, is the same. However, when you compare\
    \ them, the CTE can be understood by simply reading it from beginning to end.\
    \ To understand the derived table, on the other hand, you need to first read the\
    \ inner `SELECT` statement and then jump up to the outer `SELECT` statement ,\
    \ and then back down to the end. On a simple example like this, the extra difficulty\
    \ compared to the CTE is minimal, but as a derived table query becomes more complex,\
    \ the difficulty in reading it goes up exponentially. For a CTE, however, the\
    \ difficulty goes up in a more linear fashion because you can always just read\
    \ from beginning to end, naturally."
  trans: "## 开始之前\n\n在深入了解`CTE`是什么以及它们能做什么之前，本章中的示例使用了一些数据，你可以利用这些数据来跟随文本并自行实验`CTE`。本章使用的表名为\
    \ `employees` ，可以通过以下查询创建：\n\n```sql\nCREATE TABLE employees (\nid serial primary\
    \ key,\nname VARCHAR(150) NOT NULL,\ntitle VARCHAR(100),\noffice VARCHAR(100)\n\
    );\n```\n\n数据本身位于一个名为 `bartholomew-ch01.csv` 的`CSV`文件中。你可以使用类似以下内容的查询来加载它（假设文件位于运行`MariaDB`或`MySQL`服务器的计算机的\
    \ `/tmp/` 文件夹中）：\n\n```sql\nLOAD DATA INFILE '/tmp/bartholomew-ch01.csv'\nINTO\
    \ TABLE employees\nFIELDS TERMINATED BY ','\nOPTIONALLY ENCLOSED BY '\"';\n```\n\
    \n如果你使用的是`MySQL 8.0`，那么 `secure_file_priv` 设置默认是启用的。在这种情况下，你需要将文件移动到配置指定的位置，或者在你的\
    \ `my.cnf` 或 `my.ini` 文件中关闭该设置。\n\n在`Linux`上，`secure_file_priv`的默认位置是 `/var/lib/mysql-files/`，在`Windows`上是\
    \ `C:\\ProgramData\\MySQL\\MySQLServer 8.0\\Uploads\\`；在运行 `LOAD DATA` 命令之前，你需要将文件移动到该位置，然后修改命令以指向该位置，而不是\
    \ `/tmp/` 文件夹。\n\n你可以使用以下命令找出本地`MySQL`安装的 `secure_file_priv` 设置是什么：\n\n```sql\n\
    SHOW VARIABLES LIKE 'secure_file_priv';\n```\n\n我们现在准备开始了。\n\n> **提示**\n>\n> 在`Windows`上使用`MySQL`命令行客户端时，可以在\
    \ `LOAD DATA` 命令中使用`Linux`风格的路径。值得一提的是，如果你选择使用`Windows`风格的路径，则需要使用双反斜杠（`\\\\`），因为反斜杠字符用于转义其他字符。例如，以下内容是等效的：\n\
    \n```sql\nLOAD DATA INFILE '/ProgramData/MySQL/MySQL Server 8.0/Uploads/file.csv'\n\
    LOAD DATA INFILE 'C:\\\\ProgramData\\\\MySQL\\\\MySQL Server 8.0\\\\Uploads\\\\\
    file.csv'\n```\n\n## 什么是公共表表达式？\n\n`公共表表达式`通常被称为`CTE`。你可以将它们视为一个具有名称的查询结果，你可以在查询的后面部分引用该结果。如果命名结果集听起来有点像视图（`view`）或派生表（`derived\
    \ table`），那是因为它确实是，但有一些显著的区别。我们马上就会讲到这些区别。首先，`CTE`是什么样子的？\n\n## 基本 CTE 语法\n\n\
    `公共表表达式`的通用语法如下：\n\n```sql\nWITH <cte_name> AS (\n    <cte_body>\n)\n<cte_query>\n\
    ```\n\n`WITH` 和 `AS` 关键字是将`CTE`与普通查询区分开来的标志。如果你看到一个以 `WITH ... AS` 开头的查询，那么你看到的就是一个`CTE`。尖括号\
    \ `<>` 中的部分是你需要提供的。现在让我们逐一讲解不同的部分：\n\n*   `<cte_name>` 是我们将在查询后面部分用来引用`CTE`的名称；它可以是任何有效的名称，即不是保留字或函数名。\n\
    *   `<cte_body>` 是一个产生结果的 `SELECT` 语句。这部分被包裹在圆括号 `()` 中。\n*   `<cte_query>` 是我们在`SQL`查询中引用\
    \ `<cte_name>` 的地方。例如：\n\n    ```sql\n    SELECT <select_criteria> FROM <cte_name>\
    \ [WHERE ...]\n    ```\n\n*   `<select_criteria>` 是你正常的 `SELECT` 查询标准，带有可选的 `WHERE`\
    \ 和其他子句。\n\n这可能有点难以想象，所以这里有一个基本有效的`CTE`示例，我们在其中定义了一个 `<cte_name>`，然后从中 `SELECT`。这个`CTE`使用了我们在本章开头加载的示例数据，所以请随意在你的`MariaDB`或`MySQL`服务器上运行它。\n\
    \n```sql\nWITH emp_raleigh AS (\nSELECT * FROM employees\nWHERE office='Raleigh'\n\
    )\nSELECT * FROM emp_raleigh\nWHERE title != 'salesperson'\nORDER BY title;\n\
    ```\n\n让我们分解一下这里发生了什么。我们的 `<cte_name>` 是 `emp_raleigh`，它是一个简单的 `SELECT` 语句，选择\
    \ `employees` 表中`WHERE`办公室为`Raleigh`的每一行。你可以把这个`CTE`看作是`employees`表的一个视图或过滤器。然后，在\
    \ `<cte_query>` 部分，我们将 `<cte_name>` 用作一个简单查询的一部分，该查询查找职位不是销售人员的每个员工条目，最后按他们的职位对结果进行排序。因为\
    \ `<cte_query>` 使用了我们的 `emp_raleigh` `<cte_name>`，所以我们的结果只来自`employees`表中 `WHERE\
    \ office='Raleigh'` 的记录。\n\n使用我们的示例数据，结果是：\n\n```sql\n+-----+-----------------+------------+---------+\n\
    | id  | name            | title      | office  |\n+-----+-----------------+------------+---------+\n\
    |  73 | Mark Hamilton   | dba        | Raleigh |\n|  77 | Nancy Porter    | dba\
    \        | Raleigh |\n| 135 | Pauline Neal    | dba        | Raleigh |\n|  68\
    \ | Edmund Hines    | manager    | Raleigh |\n|  28 | Marc Greene     | programmer\
    \ | Raleigh |\n|  96 | Mary Walker     | programmer | Raleigh |\n| 100 | Freida\
    \ Duchesne | programmer | Raleigh |\n+-----+-----------------+------------+---------+\n\
    ```\n\n因此，除了可能存在的销售人员之外，我们的`Raleigh`办公室看起来非常技术化，除了一个经理外，都是`DBA`和程序员。\n\n## CTE\
    \ 的动机\n\n我们简单示例的结果看起来很像你可能使用派生表（又名内联视图）或视图来获得的东西，这两者在`MariaDB`和`MySQL`中已经存在多年了。为什么有人会想使用`CTE`而不是更熟悉的视图或派生表呢？以下是一些原因。\n\
    \n### 临时性\n\n首先，`CTE`是临时的。一个`CTE`在同一个查询中定义和使用。而视图则更持久，可以被认为是一个某种程度上持久的虚拟表。`CTE`的这种临时性可能是件好事。因为`CTE`和使用它的查询都在一起定义，所以修改它以跟上更新的业务需求很容易。这与视图形成对比，视图需要与使用它的查询分开更新。\n\
    \n这种临时性是派生表如此受欢迎的部分原因；它们让你快速生成一个有用的临时结果集，你可以对其执行操作。`CTE`在此基础上构建了更强大的功能集。\n\n###\
    \ 可读性\n\n使用`CTE`的一个很大原因是它们通常更具可读性。复杂的视图或嵌套的派生表查询可能很难被普通人解析，通常需要从内到外、从后到前或以其他不自然的顺序阅读查询。与`CTE`形成对比，`CTE`通常可以从上到下阅读。\n\
    \n例如，这是我们将简单的`CTE`示例重写为派生表的版本：\n\n```sql\nSELECT * FROM (\nSELECT * FROM employees\n\
    WHERE office='Raleigh'\n) AS emp_raleigh\nWHERE title != 'salesperson'\nORDER\
    \ BY title;\n```\n\n为了方便你不必回头找，这里是`CTE`版本：\n\n```sql\nWITH emp_raleigh AS (\n\
    SELECT * FROM employees\nWHERE office='Raleigh'\n)\nSELECT * FROM emp_raleigh\n\
    WHERE title != 'salesperson'\nORDER BY title;\n```\n\n毫不奇怪，使用我们的示例数据，两个查询的输出是相同的。然而，当你比较它们时，`CTE`只需从头到尾阅读即可理解。另一方面，要理解派生表，你需要首先阅读内部的\
    \ `SELECT` 语句，然后跳到外部的 `SELECT` 语句，然后再回到末尾。在像这样的简单示例上，与`CTE`相比的额外困难是最小的，但是随着派生表查询变得更加复杂，阅读它的难度会呈指数级增长。而对于`CTE`来说，难度的增长更线性，因为你总是可以从头到尾自然地阅读。"
- fmt: '## Using in One or Many Places


    Following on from the previous section, another reason to use CTEs is if you need
    something complex for just one query as opposed to something that will be used
    many times in many different queries. For example, if your underlying sales table
    stores invoice dates using a Unix timestamp, but several of your applications
    expect `YYYY-MM-DD` whenever they query the table, a view would be an excellent
    solution; just define the view and have your applications call that. On the other
    hand, a complex view only used once in a single application might be more maintainable
    if rewritten as an easier-to-read CTE.


    ## Permissions


    When working on your own personal databases on your own workstation or server,
    your database user generally has the `ALL PRIVILEGES WITH GRANT OPTION` permissions,
    which means you can do anything you need or want to your tables and databases,
    including `CREATE`, `UPDATE`, `INSERT`, `DELETE`, and so on. Or, you might regularly
    just log in as the root database user, which automatically has all permissions.
    Databases used in production, however, generally have more granular access defined.
    Some users are only able to `SELECT` from tables in certain databases, while others
    can make inserts in some tables but not in others, and yet other users are given
    more or fewer grants depending on their various job functions.


    You may find yourself in need of something like a view on a table that you do
    not have the `CREATE VIEW` permission on. CTEs only require the `SELECT` permission,
    so in this case using a CTE is a great way to get what you need without having
    to pester one of the DBAs to either create the view you need for you or asking
    them to grant you the `CREATE VIEW` permission on the table you need it on, which
    they may be unable to do because of company policies.


    ## Nesting


    CTEs bring several new tricks to our DBA toolbox, one of which is that in each
    individual `<cte_body>` we can refer to other CTEs. This solves a big problem
    with nested derived tables where every level of nesting greatly increases the
    complexity.


    For example, let’s expand upon our simple CTE example and drill further into our
    data by defining a second `<cte_name>` with its accompanying `<cte_body>` that
    selects just the DBAs in the Raleigh office:


    ```

    WITH emp_raleigh AS (

    SELECT * FROM employees

    WHERE office=''Raleigh''

    ),

    emp_raleigh_dbas AS (

    SELECT * from emp_raleigh

    WHERE title=''dba''

    )

    SELECT * FROM emp_raleigh_dbas;

    ```


    Looking at this code, we have our original `<cte_name>`, `emp_raleigh`, and its
    `<cte_body>`. We then define a second `<cte_name>`, `emp_raleigh_dbas`, and its
    `<cte_body>`. `emp_raleigh_dbas` builds upon `emp_raleigh` by only looking for
    records `WHERE title=''dba''`. Lastly, in the `<cte_query>` section we `SELECT`
    everything from `emp_raleigh_dbas`. Syntactically, this is much more readable
    than the equivalent query written using a nested derived table.


    Using our sample data, the result is as follows:


    ```

    +-----+---------------+-------+---------+

    | id  | name          | title | office  |

    +-----+---------------+-------+---------+

    |  73 | Mark Hamilton | dba   | Raleigh |

    |  77 | Nancy Porter  | dba   | Raleigh |

    | 135 | Pauline Neal  | dba   | Raleigh |

    +-----+---------------+-------+---------+

    ```


    ## Multiplexing


    Building upon the ability to define multiple `<cte_name>`s in the same query with
    their corresponding `<cte_body>`s, we have the ability to refer to a given `<cte_name>`
    multiple times, either in a following `<cte_body>` section or in the `<cte_query>`
    section. As an example of referring to a single `<cte_name>` multiple times, here
    is an anti-self-join that looks for DBAs that are the only DBA at their particular
    office:


    ```

    WITH dbas AS (

    SELECT * FROM employees

    WHERE title=''dba''

    )

    SELECT * FROM dbas A1

    WHERE NOT EXISTS (

    SELECT 1 FROM dbas A2

    WHERE

    A2.office=A1.office

    AND

    A2.name <> A1.name

    );

    ```


    Here, our `dbas` `<cte_name>` simply selects all of the DBAs in the company, then
    in our ending `<cte_query>` we refer to `dbas` two times in order to filter out
    all DBAs except those we are interested in.


    Using our sample data, the result is as follows:


    ```

    +----+---------------+-------+---------+

    | id | name          | title | office  |

    +----+---------------+-------+---------+

    |  6 | Toby Lucas    | dba   | Wichita |

    | 16 | Susan Charles | dba   | Nauvoo  |

    +----+---------------+-------+---------+

    ```


    I think management should make sure Toby and Susan visit other offices in the
    company a few times every year, just so they don’t feel isolated from the other
    DBAs in the company.


    ## Recursion


    The last reason why CTEs are so useful is that they can be recursive. Within their
    own `<cte_body>` they can call themselves. This technique provides a lot of power.
    But let’s not get ahead of ourselves—there’s a whole chapter devoted to these
    types of CTE queries, so we won’t talk about it more here.


    ## Summary


    In this chapter, we covered the basic syntax of CTEs as well as some of the reasons
    why this feature was added to the SQL standard and is now being added to MariaDB
    and MySQL. We also went through a couple of simple examples of non-recursive CTEs.


    We’ll dive deeper into non-recursive CTEs in the next chapter, then look at recursive
    CTEs in Chapter [3](#A454556_1_En_3_Chapter.html).


    # 2. Non-recursive Common Table Expressions


    You already got a taste of non-recursive CTEs in the previous chapter. This chapter
    will expand upon the previous examples and show more of the things you can do
    with non-recursive CTEs. In this chapter, we’ll cover some common uses of CTEs
    and finish with how to convert existing queries that use subqueries into queries
    that use CTEs.


    ## Before We Begin


    As with the previous chapter, the examples in this chapter utilize sample data.
    In addition to the `employees` table we used previously, in this chapter we’ll
    use a table called `commissions`. This table can be created with the following
    query:


    ```

    CREATE TABLE commissions (

    id serial primary key,

    salesperson_id BIGINT(20) NOT NULL,

    commission_id BIGINT(20) NOT NULL,

    commission_amount DECIMAL(12,2) NOT NULL,

    commission_date DATE NOT NULL

    );

    ```


    The data is in a CSV file called `bartholomew-ch02.csv`. It can be loaded with
    a query similar to the following (assuming the file is on the computer running
    MariaDB or MySQL server in the `/tmp/` folder):


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch02.csv''

    INTO TABLE commissions

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    Note


    See the “Before We Begin” section of Chapter [1](#A454556_1_En_1_Chapter.html)
    for extra information about loading the files on Windows and working around issues
    with `secure_file_priv`.


    We’re now ready to begin.'
