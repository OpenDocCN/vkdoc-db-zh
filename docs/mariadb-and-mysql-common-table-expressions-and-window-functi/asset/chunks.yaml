    # Part II

    Window Functions


    # 4. Basics of Window Functions


    The first three chapters have all been about CTEs. For this and the next two chapters,
    we are switching gears and will be exploring Window Functions. Like CTEs, these
    were introduced in MariaDB 10.2 and MySQL 8.0 (as of 8.0.2 DMR).


    At its core, a Window Function is like any other function; it operates on the
    data in the database to manipulate it in a useful way. The primary syntactic difference
    is that Window Functions are used with a custom SQL keyword, `OVER`. Practically,
    they can do things other functions can only dream of. This chapter will familiarize
    you with the basic syntax and provide a quick overview of all the various Window
    Functions.


    ## What Is a function?


    In general computer programming terms, a function can be thought of as a subprogram
    of your main program. Its logic is isolated from the main program and is referenced
    or called whenever it is needed.


    MariaDB and MySQL contain many useful built-in functions that can do a variety
    of things. There are functions like `LOWER`, `CONCAT`, `SUBSTR`, and others, which
    help manipulate strings of text. There are functions such as `ABS`, `LOG`, `ROUND`,
    and others, which help perform various mathematical operations. There are also
    aggregate functions like `SUM`, `AVG`, `MAX`, and others, which help perform actions
    on groups of rows. And there are other functions for working with dates, XML,
    JSON, GIS, and other types of data.


    Window Functions are a new class of function. When you use a regular function,
    you have access to the data from the current row and produce one result for each
    row in the result set. When you use an aggregate function, you can compute one
    result from the group of rows in the result set. Window Functions can do both
    of these tasks. They are computed over a range of rows, but they can also give
    you results for each row.


    ## Window Function Syntax


    As mentioned previously, the keyword to look for to identify Window Functions
    is `OVER`. The basic syntax for calling a Window Function within a `SELECT` statement
    is:


    ```

    ([]) OVER (

    []

    []

    []

    )

    ...

    []

    ```


    Inside the `OVER` clause are three possible optional elements, <partition_definition>,
    <order_definition>, and <frame_definition>. We’ll cover each of them separately.


    The opening and closing parentheses after `OVER` are mandatory, unless the optional
    `WINDOW` clause is used, even if no partition, order, or frame definitions are
    set. See the “WINDOW Clause Syntax” section for more information.


    ### Partition Definition Syntax


    The <partition_definition> section syntax looks like the following:


    ```

    PARTITION BY [{,}...]

    ```


    The <partition_definition> section is supported by all Window Functions. Its purpose
    is to restrict the rows a given function operates on to a specific set within
    the full result set.


    The <expression> part can be any valid expression such as would be used in the
    `GROUP BY` section of a traditional query. Multiple expressions can be specified,
    separated by commas.


    ### Order Definition Syntax


    The <order_definition> section syntax looks like the following:


    ```

    ORDER BY  [ASC|DESC] [{,}...]

    ```


    The <order_definition> section is supported by all Window Functions. Its purpose
    is to set the order of the results as seen by the function itself as the Window
    Function runs prior to any outside `ORDER BY` clause in the full query.


    The <expression> part can be any valid SQL expression as used in the `ORDER BY`
    section of a traditional query. Results can also be ordered in ascending (`ASC`)
    or descending (`DESC`) order. Multiple expressions can be specified, separated
    by commas.'
