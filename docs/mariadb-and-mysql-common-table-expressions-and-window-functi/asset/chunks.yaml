    ## 总结


    在本章中，我们探讨了递归CTE与非递归CTE的区别。我们探索了它们的一些用途：


    *   解决递归数学问题

    *   遍历家谱树以匹配子女与祖先

    *   查找两点之间的所有可能路线


    还有更多用途，但我们将在接下来的三章中转换主题，探索本书的第二个主要主题：窗口函数。然后我们将在[第7章](#A454556_1_En_7_Chapter.html)回归CTE并将其与窗口函数结合使用，为什么不呢？


    # 第二部分

    窗口函数


    # 4. 窗口函数基础


    前三章都是关于CTE的。从本章开始及接下来的两章，我们将转换主题，探讨窗口函数。与CTE类似，它们也是在MariaDB 10.2和MySQL 8.0（自8.0.2
    DMR起）中引入的。


    从本质上讲，窗口函数与任何其他函数一样；它操作数据库中的数据，以一种有用的方式进行处理。主要的语法区别在于，窗口函数与一个自定义SQL关键字`OVER`一起使用。实际上，它们能做其他函数只能梦想的事情。本章将使你熟悉基本语法，并快速概述所有各种窗口函数。


    ## 什么是函数？


    在通用的计算机编程术语中，函数可以被视为程序的子程序。它的逻辑与主程序隔离，并在需要时被引用或调用。


    MariaDB和MySQL包含许多有用的内置函数，可以执行各种操作。有像`LOWER`、`CONCAT`、`SUBSTR`等函数，帮助操作文本字符串。有像`ABS`、`LOG`、`ROUND`等函数，帮助执行各种数学运算。还有像`SUM`、`AVG`、`MAX`等聚合函数，帮助对行组执行操作。还有用于处理日期、XML、JSON、GIS和其他数据类型的函数。


    窗口函数是一个新的函数类别。当你使用常规函数时，你可以访问当前行的数据，并为结果集中的每一行产生一个结果。当你使用聚合函数时，你可以从结果集中的行组计算出一个结果。窗口函数可以同时完成这两项任务。它们在一定范围的行上计算，但也能为每一行提供结果。


    ## 窗口函数语法


    如前所述，标识窗口函数的关键字是`OVER`。在`SELECT`语句中调用窗口函数的基本语法是：


    ```

    函数名() OVER (

    [PARTITION BY ...]

    [ORDER BY ...]

    [FRAME 子句]

    )

    ...

    ```


    在`OVER`子句内部有三个可能的可选元素：<partition_definition>、<order_definition>和<frame_definition>。我们将分别介绍它们。


    `OVER`后的开括号和闭括号是强制性的，除非使用了可选的`WINDOW`子句，即使没有设置分区、排序或帧定义也是如此。有关更多信息，请参阅“WINDOW子句语法”部分。


    ### 分区定义语法


    <partition_definition>部分的语法如下所示：


    ```

    PARTITION BY {expr [, expr]...}

    ```


    <partition_definition>部分受所有窗口函数支持。其目的是将给定函数操作的行限制在完整结果集中的特定集合内。


    <expression>部分可以是任何有效的表达式，就像在传统查询的`GROUP BY`部分中使用的那样。可以指定多个表达式，用逗号分隔。


    ### 排序定义语法


    <order_definition>部分的语法如下所示：


    ```

    ORDER BY {expr [ASC|DESC]} [{, expr [ASC|DESC]}...]

    ```


    <order_definition>部分受所有窗口函数支持。其目的是设置在窗口函数运行时，函数自身看到的结果顺序，这先于完整查询中的外部`ORDER BY`子句。


    <expression>部分可以是任何有效的SQL表达式，就像在传统查询的`ORDER BY`部分中使用的那样。结果也可以按升序（`ASC`）或降序（`DESC`）排序。可以指定多个表达式，用逗号分隔。'
