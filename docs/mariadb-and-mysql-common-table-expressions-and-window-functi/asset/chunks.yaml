    ```

    SELECT value,

    SUM(value) OVER (

    ORDER BY value

    ROWS

    BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS sum

    FROM my_table

    ORDER BY value;

    ```


    上述查询的结果为：


    ```

    +-------+------+

    | value | sum  |

    +-------+------+

    |     1 | 1    |

