    让我们逐行分析结果。


    第1行，值为`1`，没有前序行，因此`SUM`函数查看的框架只包含结果的第一行，即`1`。


    第2行，值为`2`，有一个前序行，因此`SUM`函数查看的框架只包含第1行和第2行，即`(1+2)`，等于`3`。


    第3行，值为`2`，有两个前序行，因此`SUM`函数查看的框架包含结果的第1、2、3行，即`1+2+2`，等于`5`。


    第4行，值为`3`，有三个前序行，但框架只包含当前行和前两行，因此`SUM`函数查看的行包含第2、3、4行，即`(2+2+3)`，等于`7`。


    第5行的计算方式与第4行相同，但相加的值是`(2+3+4)`，等于`9`。


