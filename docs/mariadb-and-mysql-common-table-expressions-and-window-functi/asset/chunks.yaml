    ## Summary


    In this chapter, we explored how recursive CTEs differ from non-recursive CTEs.
    We explored a few of their many uses:


    *   Solving recursive math problems

    *   Walking a genealogical tree to match children with their ancestors

    *   Finding all possible routes between two points


    There are many more uses, but we’re going to switch gears for the next three chapters
