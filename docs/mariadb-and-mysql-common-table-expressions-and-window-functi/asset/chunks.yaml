    Delaware corporation. For Amy, Ila, Lizzy, Anthon & Rachel. I’m available to play
    more board games now, I promise. Introduction


    In the software world, there are standards and implementations of those standards.
    Sometimes, the implementations come first, features introduced by eager developers
    trying to advance the state of the art, and they are formally standardized later.
    Other times, the standard comes first, developed and agreed upon by vendors, developers,
    and others, and then implementations of the standard—some faithful, others not
    so much—make their way into production software later on.


    Common Table Expressions (CTEs) and Window Functions have been in the ANSI SQL
    standard for a long time. CTEs were introduced way back in the SQL99 version of
    the standard, and Window Functions were introduced in the SQL2003 version. Other
    database systems were quick(er) to implement both of them. Oracle, SQL Server,
    PostgreSQL, and even SQLite have had implementations of these features for years.


    MariaDB and MySQL were somewhat late to the game, but they now have standards-compliant
    implementations of Window Functions and Common Table Expressions. MariaDB added
    them with their MariaDB 10.2 release, which was declared stable (GA) in May 2017\.
    MySQL is introducing them as part of its upcoming 8.0 release, which as I write
    this is in its Release Candidate phase. The implementations were developed independently
    of each other, but they both stick close to the standard, so compatibility between
    them is good. Generally speaking, a query that works in MariaDB will most likely
    work in MySQL and vice versa. There are some differences, however, which this
    book notes when they come up.


    Syntax


    The syntax definitions in this book use the following conventions:


    `< >` — Angle brackets surround elements, the name of which you provide. The brackets
    themselves are not part of the syntax and should not be included.


    `[ ]` — Square brackets surround optional elements. They may be included, or not,
    depending on your choice. The brackets themselves are not part of the syntax and
    should not be included.


    `|` — The pipe, or vertical bar, character separates groups of elements. You choose
    which of the elements you want to include in your statement. The pipe itself is
    not part of the syntax and should not be included.


    `…` — An ellipsis, or three periods in a row, indicates that the prior section
    can be repeated. The ellipsis itself is not part of the syntax and should not
    be included.


    `( )` — Parentheses, where they appear, are part of the syntax and generally must
    be included in your SQL statement.


    Words written in UPPER CASE are key words. They may be written in either UPPER
    or lower case, but must be written as shown. They also should not, and in some
    cases cannot, be generally used as the names of tables, functions, and other elements
    that you name.


    Words written in lower case represent values that you provide. They may be integers,
    statements, or other elements of a SQL statement, as appropriate for the SQL statement
    being written.


    Acknowledgments


    I’d like to thank Sergey Petrunia, Vicențiu Ciorbaru, and others at MariaDB who
    were very helpful with the examples in this book. I’d also like to thank Jonathan
    Gennick, Jill Balzano, and the rest of the awesome people at Apress for shepherding
    this book from concept to completion.


    Lastly, I’d like to thank Monty, Rasmus, and the many developers and users of
    MariaDB and MySQL. Working together, we’ve created something wonderful.'
