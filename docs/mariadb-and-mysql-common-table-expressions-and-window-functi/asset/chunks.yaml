    你会注意到，这个递归 CTE 有一个`WHERE`子句，和我们之前的一样，但它没有像`WHERE tudors.id < 100`那样设置明确的停止点。那么，CTE
    如何知道何时完成呢？为了找出答案，让我们一步步分析这个查询的执行过程。


    首先，是我们的锚点部分，在第一次执行时它的结果会被输出。然后，递归部分会查找`father`或`mother`字段与`id`匹配的记录。找到的记录会被合并到结果表中。


    接着，CTE 会循环回来，再次进行相同的搜索，这次通过`UNION`将之前的结果包含进来，并忽略已在结果表中的记录。这个过程会一直重复，直到没有新结果返回。这就是触发
    CTE 停止循环的条件。


    对于我们的示例数据，循环直到没有新结果返回没有问题，因为它只循环了几次。但是，如果我们正在遍历一个巨大的数据树呢？有什么能防止我们的查询无限循环呢？


    答案取决于你使用的是 MariaDB 还是 MySQL。


    在 MariaDB 中，作为最终的保护措施，有一个`@@max_recursive_iterations`变量，它控制服务器在停止前将执行的最大循环次数。你可以用以下命令查看其当前值：


    ```

    SHOW VARIABLES LIKE ''%recursive%'';

    ```


    默认设置非常高，`4294967295`，这对于几乎所有查询来说都应该足够了，但如果需要，可以像任何其他变量一样更改它。将其设置为`0`会禁用此限制，应谨慎操作。


    截至目前，MySQL 中没有对应的变量。在那里，目前唯一的保护措施是设置`@@max_statement_time`为允许查询运行的最长时间，超过该时间查询将被终止。


    ## 查找所有可能的目的地


    本章的最后两个示例使用`routes`表。此表包含北美各城市之间假设的火车路线列表。每条路线有一个出发城市和一个到达城市。有些城市之间有两条路线——每个方向一条。其他城市的路线只朝一个方向。图
    3-1 显示了所有的路线和城市。


    ![A454556_1_En_3_Fig1_HTML.jpg](img/A454556_1_En_3_Fig1_HTML.jpg)


    图 3-1. 所有城市之间的所有路线


    从路线上可以看到，路径中存在一些循环。例如，罗利 -> 亚特兰大 -> 迈阿密 -> 罗利。


    假设我们想找出从罗利出发可以到达的所有目的地。我们该如何使用 CTE 来实现呢？这里是一套建议的步骤：


    1.  查找从罗利出发的所有目的地。

    2.  获取这些结果，并查找它们的所有目的地。

    3.  重复，直到找到所有目的地。


    第一步非常适合用作我们的锚点部分，其余两步放在递归部分。显而易见的锚点是`SELECT`每条从罗利出发的路线：


    ```

    SELECT arriving FROM routes

    WHERE departing=''Raleigh'';

    ```


    这个查询给出以下输出：


    ```

    +------------+

    | arriving   |

    +------------+

    | Washington |

    | Atlanta    |

    | Miami      |

    +------------+

    ```


    对于 CTE 的递归部分，我们需要`SELECT`那些以这些城市为出发城市的路线记录。我们可以通过查找锚点部分返回的初始出发城市（即到达城市）作为新的出发城市的路线来实现，并重复此过程，直到我们获得所有可能的目的地列表。


    这是一个名为`destinations`的递归 CTE 的完整写法：


    ```

    WITH RECURSIVE destinations AS (

    SELECT arriving

    FROM routes

    WHERE departing=''Raleigh''

    UNION

    SELECT routes.arriving

    FROM destinations, routes

    WHERE

    destinations.arriving=routes.departing

    )

    SELECT * FROM destinations;

    ```


    这个 CTE 返回的结果是：


    ```

    +------------+

    | arriving   |

    +------------+

    | Washington |

    | Atlanta    |

    | Miami      |

    | Chicago    |

    | Raleigh    |

    | New York   |

    | Toronto    |

    +------------+

    ```


    正如预期，唯一无法从罗利到达的城市是休斯顿。实际上，没有人能通过火车到达休斯顿，因为没有去休斯顿的路径，只有一条从休斯顿出来的路径。我们应该铺些铁轨来解决这个问题。


    除了没有休斯顿，关于这个结果还有两点需要注意。首先是罗利本身出现在了输出中，其次是 CTE 足够智能，没有无限循环。


    是什么为我们的 CTE 提供了终止条件，防止这些循环一直运行直到达到`@@max_recursive_iterations`或`@@max_statement_time`限制呢？是因为我们使用了`UNION`而不是`UNION
    ALL`。当`UNION`看到重复的结果时会忽略它，因此一旦所有可能的城市都被定位到，唯一被返回的城市将是它已经见过的，于是 CTE 终止。


    关于包含罗利呢？嗯，如果你回顾图 3-1，你会看到从罗利出发有几条路径最终回到了罗利。所有离开罗利的路径都有返回罗利的路径；例如，罗利 -> 迈阿密 ->
    罗利。还有一个大循环：罗利 -> 亚特兰大 -> 芝加哥 -> 纽约 -> 华盛顿 -> 罗利。因为罗利最初不在我们的列表中，它像任何其他有效目的地一样被包含在结果中，但只出现一次。罗利在新结果中再次出现时，会被忽略。


    如果我们想从结果中移除罗利，只需将最后一行改为：


    ```

    SELECT * FROM destinations WHERE arriving!=''Raleigh'';

    ```


    或者，我们也可以将罗利移动到结果的第一位，这在逻辑上更合理。毕竟，我们能到达的第一个地点就是我们当前所在的位置。为此，我们需要“取巧”一下，告诉解析器我们正在选择罗利作为到达城市，尽管我们实际上是在选择它作为出发城市。SQL
    如下：


    ```

    SELECT departing AS arriving

    FROM routes

    WHERE departing=''Raleigh'';

    ```


    单独运行这个查询会得到：


    ```

    +----------+

    | arriving |

    +----------+

    | Raleigh  |

    | Raleigh  |

    | Raleigh  |

    +----------+

    ```


    这个结果是预期的，因为有三条从罗利到其他城市的路线。我们现在可以将其插入到我们的 CTE 中：


    ```

    WITH RECURSIVE destinations AS (

    SELECT departing AS arriving

    FROM routes

    WHERE departing=''Raleigh''

    UNION

    SELECT routes.arriving

    FROM destinations, routes

    WHERE

    destinations.arriving=routes.departing

    )

    SELECT * FROM destinations;

    ```


    结果是：


    ```

    +------------+

    | arriving   |

    +------------+

    | Raleigh    |

    | Washington |

    | Atlanta    |

    | Miami      |

    | Chicago    |

    | New York   |

    | Toronto    |

    +------------+

    ```


    这仍然在输出中包含了罗利，但至少它是第一个结果，而不是令人困惑地出现在结果中间。'
- fmt: '## Finding All Possible Paths


    找到从 Raleigh 出发所有可能的目的地固然不错，但如何找出从 Raleigh 到所有可达城市的所有可能路径呢？


    以下是操作步骤：


    1.  从起点查询目的地。

    2.  从该点查找目的地并添加它们；`UNION` 将防止重复。

    3.  重复直到找到所有可能的路径。


    因为我们想从 Raleigh 出发，所以对于 `<anchor>` 部分，我们需要做类似于上一节的操作，并以某种方式发出 `SELECT` 查询，使其从 Raleigh
    开始。这是一个可能的 `<anchor>` 候选：


    ```

    SELECT departing, arriving

    FROM routes

    WHERE departing=''Raleigh'';

    ```


    这给出了我们期望的结果：


    ```

    +-----------+------------+

    | departing | arriving   |

    +-----------+------------+

    | Raleigh   | Washington |

    | Raleigh   | Atlanta    |

    | Raleigh   | Miami      |

    +-----------+------------+

    ```


    我们的 `<recursive>` 部分会更复杂一些。我们想要展示所有可能路径的完整集合，而不仅仅是终点列表。因此，我们想要将任何新增的部分（如果有的话）添加到现有路径的末尾，并用分隔符隔开。`CONCAT()`
    函数正是为此而设计，而 `departing` 列看起来是我们需要连接的列，因为那是我们的起点 Raleigh 所在的位置。


    在 `<recursive>` 部分的第一次运行后，我们应该将 `departing` 和 `arriving` 列连接起来作为新的 `departing`
    列，然后也包含我们的 `arriving` 列用于循环的下一次运行。我们应该得到一个结果，输出看起来像这样：


    ```

    +----------------------+------------+

    | departing            | arriving   |

    +----------------------+------------+

    | Raleigh > Washington | Washington |

    | Raleigh > Atlanta    | Atlanta    |

    | Raleigh > Miami      | Miami      |

    +----------------------+------------+

    ```


    实际上，`departing` 列名不太合理，因为它保存的是我们的路径，而不是初始出发城市，所以在实际的 CTE 中我们将其称为 `path`。


    我们现在准备好编写 CTE 了吗？其实，还没有！还有另一个问题我们应该先解决。再次查看图 [3-1](#A454556_1_En_3_Chapter.html#Fig1)；我们能做些什么来防止像下面这样愚蠢的结果？


    ```

    Raleigh > Washington > New York > Washington > Raleigh > Miami

    ```


    这是一个完全有效的路径，但任何理智的人都不会走这条路线。如果我们想从 Raleigh 去 Miami，我们会走那条路线；我们绝不会先去纽约，然后经由 Raleigh
    返回再去 Miami。我们能做些什么来防止这种情况？`LOCATE()` 函数提供了一个简单的方法。它在字符串中搜索给定的子字符串，如果未找到子字符串则返回
    `0`。所以，我们只需在 `<recursive>` 部分的 `WHERE` 子句中添加类似以下的内容：


    ```

    LOCATE(routes.arriving, .paths)=0

    ```


    我们当然会将 `<cte_name>` 替换为实际 CTE 的名称。


    让我们尝试将所有内容整合到一个名为 `full_routes` 的 CTE 中：


    ```

    WITH RECURSIVE full_routes AS (

    SELECT departing AS path, arriving

    FROM routes

    WHERE departing=''Raleigh''

    UNION

    SELECT

    CONCAT(full_routes.path, '' > '',

    routes.arriving),

    routes.arriving

    FROM full_routes, routes

    WHERE

    full_routes.arriving=routes.departing

    AND

    LOCATE(routes.arriving, full_routes.path)=0

    ) SELECT * FROM full_routes;

    ```


    这个 CTE 看起来合理，但当我们运行它时，结果显然是错误的：


    ```

    +-------------------------------------------+------------+

    | path                                      | arriving   |

    +-------------------------------------------+------------+

    | Raleigh                                   | Washington |

    | Raleigh                                   | Atlanta    |

    | Raleigh                                   | Miami      |

    | Raleigh > Chicago                         | Chicago    |

    | Raleigh > New York                        | New York   |

    | Raleigh > Miami                           | Miami      |

    | Raleigh > Chicago > New York              | New York   |

    | Raleigh > New York > Washington           | Washington |

    | Raleigh > New York > Toronto              | Toronto    |

    | Raleigh > Chicago > New York > Washington | Washington |

    | Raleigh > Chicago > New York > Toronto    | Toronto    |

    +-------------------------------------------+------------+

    ```


    这是怎么回事？我们期望的 Raleigh > Washington, Raleigh > Atlanta, 和 Raleigh > Miami 路径在哪里？而且，没有办法直接从
    Raleigh 到 Chicago，因为你需要先经过 Washington。实际上，所有路径都缺少一站。


    如果我们仔细看看递归 CTE 的逻辑，原因就清楚了。


    在 `<recursive>` 部分的第一次运行期间，我们的 `WHERE` 子句正在 `arriving` 列中查找那些也出现在 `routes` 表 `departing`
    列中的城市。在初始循环结果集时，我们的递归 CTE 只能访问 `<anchor>` 部分返回的内容，即 Washington、Atlanta 和 Miami
    这三个城市。正如我们所要求的，我们的递归 CTE 首先在 `routes` 表中查找 `departing` 列为 Washington 的行，它找到的第一个结果是
    Washington 到 Chicago 的条目。然后它尽职地将 Chicago 连接到 `path` 列的值（即 Raleigh）之后，作为新的结果行。这就是为什么我们输出的第四行是：


    ```

    +-------------------+----------+

    | path              | arriving |

    +-------------------+----------+

    | Raleigh > Chicago | Chicago  |

    +-------------------+----------+

    ```


    要解决这个问题，我们需要以某种方式设置我们的 `<anchor>`，使起点仅为 Raleigh。然后，在第一次运行期间，它将正确地将 Washington、Atlanta
    和 Miami 连接到路径后面。如果我们的 `<anchor>` 不返回 Raleigh 的实际连接，而是再次选择 `departing` 列并告诉 CTE
    那是 `arriving` 列会怎样？这似乎有点取巧，但 SQL 是完全有效的：


    ```

    SELECT departing AS path, departing AS arriving

    FROM routes

    WHERE departing=''Raleigh'';

    ```


    重要的是，这个查询的结果包含一个应该完全可以作为我们 `<anchor>` 的结果：


    ```

    +---------+----------+

    | path    | arriving |

    +---------+----------+

    | Raleigh | Raleigh  |

    | Raleigh | Raleigh  |

    | Raleigh | Raleigh  |

    +---------+----------+

    ```


    将我们新的 `<anchor>` 放入 `full_routes` CTE 后，它现在看起来像这样：


    ```

    WITH RECURSIVE full_routes AS (

    SELECT departing AS path, departing AS arriving

    FROM routes

    WHERE departing=''Raleigh''

    UNION

    SELECT

    CONCAT(full_routes.path, '' > '',

    routes.arriving),

    routes.arriving

    FROM full_routes, routes

    WHERE

    full_routes.arriving=routes.departing

    AND

    LOCATE(routes.arriving, full_routes.path)=0

    ) SELECT * FROM full_routes;

    ```


    而结果正是我们所期望的：'
  raw: '## Finding All Possible Paths


    Finding all of the possible destinations we can get to from Raleigh is nice, but
    what about finding all of the possible paths we could take to get from Raleigh
    to every city we can get to from Raleigh?


    Here are the steps to do this:


    1.  Look up destinations from our starting point.  

    2.  Find destinations from that point and add them; `UNION` will prevent duplicates.
     

    3.  Repeat until all possible paths are found.


    Because we want to start from Raleigh, for our <anchor> we need to do something
    similar to what we did in the previous section and issue our `SELECT` in such
    a way that it starts from Raleigh. Here’s a possible <anchor> candidate:


    ```

    SELECT departing, arriving

    FROM routes

    WHERE departing=''Raleigh'';

    ```


    This gives us what we would expect:


    ```

    +-----------+------------+

    | departing | arriving   |

    +-----------+------------+

    | Raleigh   | Washington |

    | Raleigh   | Atlanta    |

    | Raleigh   | Miami      |

    +-----------+------------+

    ```


    Our <recursive> part is going to be trickier. We want to show the complete set
    of every possible path, not just a list of end points. So, we therefore want to
    add any additions, if any, to a given path to the end of an existing path with
    a separator in between. The `CONCAT()` function was made for this sort of thing,
    and the `departing` column looks like the column we will want to concat on, because
    that’s where our starting point, Raleigh, is.


    After the first run -through of our <recursive> part, we should concat the `departing`
    and `arriving` columns together as our new `departing` column, and then also include
    our `arriving` column to use for the next run through the loop. We should end
    up with a result that outputs something that looks like this:


    ```

    +----------------------+------------+

    | departing            | arriving   |

    +----------------------+------------+

    | Raleigh > Washington | Washington |

    | Raleigh > Atlanta    | Atlanta    |

    | Raleigh > Miami      | Miami      |

    +----------------------+------------+

    ```


    Actually, the `departing` column name doesn’t make sense, because it is holding
    our path, not the initial departure city, so let’s call it `path` in our actual
    CTE.


    Are we now ready to actually write our CTE? Actually, not quite! There’s one other
    issue we should solve first. Look again at Figure [3-1](#A454556_1_En_3_Chapter.html#Fig1);
    what can we do to prevent silly results like the following?


    ```

    Raleigh > Washington > New York > Washington > Raleigh > Miami

    ```


    This is a perfectly valid path, but it isn’t one that any sane person would take.
    If we want to go from Raleigh to Miami, we would take that route; we would never
    go to New York first then back through Raleigh to Miami. What can we do to prevent
    this? The `LOCATE()` function provides an easy way. It searches a string for a
    given substring, returning `0` if the substring is not found. So, all we need
    to do is add something like the following to the `WHERE` clause of our <recursive>
    part:


    ```

    LOCATE(routes.arriving, .paths)=0

    ```


    We will, of course, replace <cte_name> with the actual name of our CTE .


    Let’s try putting everything together, finally, into a CTE named `full_routes`:


    ```

    WITH RECURSIVE full_routes AS (

    SELECT departing AS path, arriving

    FROM routes

    WHERE departing=''Raleigh''

    UNION

    SELECT

    CONCAT(full_routes.path, '' > '',

    routes.arriving),

    routes.arriving

    FROM full_routes, routes

    WHERE

    full_routes.arriving=routes.departing

    AND

    LOCATE(routes.arriving, full_routes.path)=0

    ) SELECT * FROM full_routes;

    ```


    This CTE looks reasonable, but when we run it, the result is obviously wrong:


    ```

    +-------------------------------------------+------------+

    | path                                      | arriving   |

    +-------------------------------------------+------------+

    | Raleigh                                   | Washington |

    | Raleigh                                   | Atlanta    |

    | Raleigh                                   | Miami      |

    | Raleigh > Chicago                         | Chicago    |

    | Raleigh > New York                        | New York   |

    | Raleigh > Miami                           | Miami      |

    | Raleigh > Chicago > New York              | New York   |

    | Raleigh > New York > Washington           | Washington |

    | Raleigh > New York > Toronto              | Toronto    |

    | Raleigh > Chicago > New York > Washington | Washington |

    | Raleigh > Chicago > New York > Toronto    | Toronto    |

    +-------------------------------------------+------------+

    ```


    What is going on here? Where are our expected Raleigh > Washington, Raleigh >
    Atlanta, and Raleigh > Miami paths? And there’s no way to get directly from Raleigh
    to Chicago, as you need to go through Washington first. Actually, the same is
    true with all of the paths; they’re all missing one stop.


    If we look closer at the logic of our recursive CTE, the reason becomes clear.


    During the first run-through of our <recursive> part, our `WHERE` clause is looking
    for cities in the `arriving` column that also appear in the `departing` column
    of the `routes` table. During the initial loop through the result set, our recursive
    CTE has access to only what was returned by our <anchor> part, the three cities
    Washington, Atlanta, and Miami. As we asked it to, our recursive CTE first looks
    for a row in the `routes` table that has Washington in the departing column, and
    the first result it finds is the Washington to Chicago entry. It then dutifully
    concats Chicago to the value in the path column, which is Raleigh, as a new result
    row. That’s why the fourth row of our output is:


    ```

    +-------------------+----------+

    | path              | arriving |

    +-------------------+----------+

    | Raleigh > Chicago | Chicago  |

    +-------------------+----------+

    ```


    To fix this, we need to somehow set our <anchor> so that our starting point is
    just Raleigh. Then, during the first run-through it will correctly concat Washington,
    Atlanta, and Miami to the path. What if instead of our <anchor> returning Raleigh’s
    actual connections, we just select the `departing` column again and tell the CTE
    that it is the `arriving` column? It seems a bit cheaty, but the SQL for it is
    perfectly valid:


    ```

    SELECT departing AS path, departing AS arriving

    FROM routes

    WHERE departing=''Raleigh'';

    ```


    Importantly, the result of this query contains a result that should work perfectly
    fine as our <anchor>:


    ```

    +---------+----------+

    | path    | arriving |

    +---------+----------+

    | Raleigh | Raleigh  |

    | Raleigh | Raleigh  |

    | Raleigh | Raleigh  |

    +---------+----------+

    ```


    After putting our new <anchor> into our `full_routes` CTE, it now looks like this:


    ```

    WITH RECURSIVE full_routes AS (

    SELECT departing AS path, departing AS arriving

    FROM routes

    WHERE departing=''Raleigh''

    UNION

    SELECT

    CONCAT(full_routes.path, '' > '',

    routes.arriving),

    routes.arriving

    FROM full_routes, routes

    WHERE

    full_routes.arriving=routes.departing

    AND

    LOCATE(routes.arriving, full_routes.path)=0

    ) SELECT * FROM full_routes;

    ```


    And the result is what we would expect:'
