- fmt: '## Graphing Time-Series Results


    The analysis that we’ve done so far is pretty good, but we’re still just looking
    at numbers. This makes it hard to visualize trends over time. Maybe not so much
    when we’re just looking at six days, but if we expand our query to cover a whole
    month, all the numbers start to blur together, at least they do for me. A graph
    is a good way to condense a large amount of data into something that can be understood
    at a glance. The `mysql` command-line client program doesn’t have any graphing
    capabilities of its own, but there are many external tools that can help us do
    this. One popular tool is called `gnuplot`. It is readily available on Linux from
    your distribution’s package repository, or for those on Windows it can be downloaded
    from the main `gnuplot` website at [`http://gnuplot.info/`](http://gnuplot.info/)
    .


    Before running the following examples, test your `gnuplot` installation to ensure
    it is working properly. Refer to the `gnuplot` documentation for help, if needed.


    The `gnuplot` program expects data to be in columns separated by whitespace (tabs
    and/or spaces). To export our data to a file that `gnuplot` can read, we could
    simply add the following line to any of our previous queries before the semicolon
    (`;`) :


    ```

    INTO OUTFILE ''/tmp/out.dat''

    ```


    However, there are some downsides to this. One is if the `secure_file_priv` option
    is enabled on your MariaDB or MySQL server, in which case you’re limited to writing
    files to the directory configured. If you add the preceding line to a query and
    get the following error, you’re affected:


    ```

    ERROR 1290 (HY000): The MySQL server is running with the --secure-file-priv option
    so it cannot execute this statement

    ```


    In such a case you can either disable the option in your `my.cnf` or `my.ini`
    file and restart your MySQL or MariaDB server, or direct your output to the configured
    directory. You can see what directory is configured with the following command:


    ```

    SHOW VARIABLES LIKE ''secure_file_priv'';

    ```


    Another issue with using `INTO OUTFILE` is that MySQL or MariaDB will refuse to
    overwrite a file if it already exists. This is a safety measure, but it can be
    annoying to deal with when you just want to quickly rerun a query after tweaking
    it a little.


    ## Plotting Data with gnuplot


    A way around both of these limitations, and one which is especially helpful when
    querying a database on an automated basis, is to call the `mysql` command-line
    client from the shell, wrapping the query like this:


    ```

    mysql -p --column-names=0  -e "" > /tmp/out.dat

    ```


    Replace `<database_name>` with the name of the database the table is in, and replace
    `<query>` with the actual query. In this example, we’re exporting our data to
    the file `/tmp/out.dat`, but we could put it anywhere that is convenient on our
    server. It also has the benefit, and also the danger, that every time it is run,
    the file we’re outputting to is overwritten with the new result.


    If you’re not familiar with it, the `--column-names=0` flag removes the column
    headings from the output. We don’t need them, and they will confuse `gnuplot`
    if they’re included.


    Let’s plot the data from our `beach` table. Here is a simple query that outputs
    all of the temperatures from every day in our `beach` table:


    ```

    SELECT day, hour, temp

    FROM beach

    ORDER BY day,hour

    INTO OUTFILE ''/tmp/out.dat'';

    ```


    And here’s the same query as it might be run from the shell using the `mysql`
    command-line client. It assumes the database, where all of the sample tables are,
    is named `apress`:


    ```

    mysql -p --column-names=0 apress -e "

    SELECT day, hour, temp

    FROM beach

    ORDER BY day,hour;

    " > /tmp/out.dat

    ```


    To keep the queries consistent, for the rest of this section we’ll use this variant
    of the query in our examples.


    Whichever method we use to get the results of our query into a file, we are now
    ready to plot our data using `gnuplot`. After being started from the command-line
    shell, `gnuplot` will show a `gnuplot>` prompt and will be ready to accept commands.
    We can enter the following commands to create a graph:


    ```

    set xdata time

    set style data lines

    set timefmt "%Y-%m-%d  %H:%m:%s"

    set format x "%b"

    set xlabel "1984 Wrightsville Beach Temperatures"

    set ylabel "Temperature in Degrees C"

    set autoscale y

    set xrange ["1984-01-01":"1984-12-31"]

    plot "/tmp/out.dat" using 1:3 title "Temperature" with lines

    ```


    Some of these commands, like `xlabel` and `ylabel`, which set the labels for the
    x- and y-axes, are self-explanatory, others not so much. Documentation is built
    into `gnuplot`, so if you are wondering about what any of the commands do, you
    can look them up. For example, the following will show you the documentation for
    the `set xrange` command:


    ```

    help set xrange

    ```


    After the `plot` command, `gnuplot` will open a window with a graph of the data.
    It should look similar to Figure [6-5](#A454556_1_En_6_Chapter.html#Fig5).


    ![A454556_1_En_6_Fig5_HTML.jpg](A454556_1_En_6_Fig5_HTML.jpg)


    **Figure 6-5.** 1984 Wrightsville Beach Temperatures


    If we are running `gnuplot` on a remote server, we will need to tell it to export
    our graph directly to a file. To do this, we can add the following two lines to
    our `gnuplot` commands, before the plot line:


    ```

    set terminal png size 640,480 enhanced

    set output ''output.png''

    ```


    With these two lines entered, after we run the plot line our graph will be output
    to a file called `output.png` in our current working directory.


    An alternative on Linux is to `ssh` to the remote database server with X11 forwarding
    enabled using the `-X` flag, e.g., with `ssh -X <remote_host>`. This way, when
    running the `plot` command, `gnuplot` will open the graph in a window.


    ## Smoothing the Data Line


    Looking at the graph, there are a few interesting things to see. One is how in
    February and October we’re missing some data, causing gaps in the graph. It is
    also easy to see how temperatures from morning to evening vary, sometimes by quite
    a bit. However, with all of the up and down movement of the lines, it’s hard to
    get a sense of the average temperature at Wrightsville Beach over the course of
    the year. This is easy to do by using the `AVG()` Window Function to generate
    a smoother line. We can modify the original query to include a new column, `average`,
    that looks at the current row, the previous ten rows, and the following ten rows.
    The effect of this will smooth things out, like so:


    ```

    mysql -p --column-names=0 apress -e "

    SELECT day, hour, temp,

    AVG(temp) over (

    ORDER BY day,hour

    ROWS BETWEEN

    10 PRECEDING

    AND

    10 FOLLOWING

    ) AS average

    FROM beach

    ORDER BY day,hour;

    " > /tmp/out.dat

    ```


    We can then launch `gnuplot` and run the following commands to generate our new
    plot:


    ```

    set xdata time

    set style data lines

    set timefmt "%Y-%m-%d  %H:%m:%s"

    set format x "%b"

    set xlabel "1984 Wrightsville Beach Temperatures"

    set ylabel "Temperature in Degrees C"

    set autoscale y

    set linetype 2 linewidth 4

    set xrange ["1984-01-01":"1984-12-31"]

    plot "/tmp/out.dat" using 1:3 title "Temperature" with lines, \

    "/tmp/out.dat" using 1:4 title "Average" with lines

    ```


    These commands are mostly identical to the previous `gnuplot` commands, with a
    couple of key additions. First, the `plot` command (now split over two lines to
    make it more readable) has an additional data line defined, the `average` column
    from our output. And second, there is a `set linetype` command that makes the
    line on the graph that shows the Average as thicker than the Temperature line
    to make it stand out better. The `gnuplot` output should look similar to Figure
    [6-6](#A454556_1_En_6_Chapter.html#Fig6).


    ![A454556_1_En_6_Fig6_HTML.jpg](A454556_1_En_6_Fig6_HTML.jpg)


    **Figure 6-6.** 1984 Wrightsville Beach Temperatures, with average


    If the average line is still too rough, we can just change the tens in our query
    to higher numbers and then rerun the `gnuplot` commands.'
