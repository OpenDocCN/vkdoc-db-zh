    more or fewer grants depending on their various job functions.


    You may find yourself in need of something like a view on a table that you do
    not have the `CREATE VIEW` permission on. CTEs only require the `SELECT` permission,
    so in this case using a CTE is a great way to get what you need without having
    to pester one of the DBAs to either create the view you need for you or asking
    them to grant you the `CREATE VIEW` permission on the table you need it on, which
    they may be unable to do because of company policies.


    ### Nesting


    CTEs bring several new tricks to our DBA toolbox, one of which is that in each
    individual <cte_body> we can refer to other CTEs. This solves a big problem with
    nested derived tables where every level of nesting  greatly increases the complexity.


    For example, let’s expand upon our simple CTE example and drill further into our
    data by defining a second <cte_name> with its accompanying <cte_body> that selects
    just the DBAs in the Raleigh office:


    ```

    WITH emp_raleigh AS (

    SELECT * FROM employees

    WHERE office=''Raleigh''

    ),

    emp_raleigh_dbas AS (

    SELECT * from emp_raleigh

    WHERE title=''dba''

    )

    SELECT * FROM emp_raleigh_dbas;

    ```


    Looking at this code, we have our original <cte_name>, `emp_` `raleigh` , and
    its <cte_body>. We then define a second <cte_name>, `emp_raleigh_dbas`, and its
    <cte_body>. `emp_raleigh_dbas` builds upon `emp_raleigh` by only looking for records
    `WHERE title=''dba''`. Lastly, in the <cte_query> section we `SELECT` everything
    from `emp_raleigh_dbas`. Syntactically, this is much more readable than the equivalent
    query written using a nested derived table.


    Using our sample data, the result is as follows:


    ```

    +-----+---------------+-------+---------+

    | id  | name          | title | office  |

    +-----+---------------+-------+---------+

    |  73 | Mark Hamilton | dba   | Raleigh |

    |  77 | Nancy Porter  | dba   | Raleigh |

    | 135 | Pauline Neal  | dba   | Raleigh |

    +-----+---------------+-------+---------+

    ```


    ### Multiplexing


    Building upon the ability to define multiple <cte_name>s in the same query with
    their corresponding <cte_body>s, we have the ability to refer to a given <cte_name>
    multiple times, either in a following <cte_body> section or in the <cte_query>
    section. As an example of referring to a single <cte_name> multiple times, here
    is an anti-self-join that looks for DBAs that are the only DBA at their particular
    office:


    ```

    WITH dbas AS (

    SELECT * FROM employees

    WHERE title=''dba''

    )

    SELECT * FROM dbas A1

    WHERE NOT EXISTS (

    SELECT 1 FROM dbas A2

    WHERE

    A2.office=A1.office

    AND

    A2.name  A1.name

    );

    ```


    Here, our `dbas` <cte_name> simply selects all of the DBAs in the company, then
    in our ending <cte_query> we refer to `dbas` two times in order to filter out
    all DBAs except those we are interested in.


    Using our sample data, the result is as follows:


    ```

    +----+---------------+-------+---------+

    | id | name          | title | office  |

    +----+---------------+-------+---------+

    |  6 | Toby Lucas    | dba   | Wichita |

    | 16 | Susan Charles | dba   | Nauvoo  |

    +----+---------------+-------+---------+

    ```


    I think management should make sure Toby and Susan visit other offices in the
    company a few times every year, just so they don’t feel isolated from the other
    DBAs in the company.


    ### Recursion


    The last reason why CTEs are so useful is that they can be recursive. Within their
    own <cte_body> they can call themselves. This technique provides a lot of power.
    But let’s not get ahead of ourselves—there’s a whole chapter devoted to these
    types of CTE queries, so we won’t talk about it more here.


    ## Summary


    In this chapter, we covered the basic syntax of CTEs as well as some of the reasons
    why this feature was added to the SQL standard and is now being added to MariaDB
    and MySQL. We also went through a couple of simple examples of non-recursive CTEs.


    We’ll dive deeper into non-recursive CTEs in the next chapter, then look at recursive
    CTEs in Chapter [3](#A454556_1_En_3_Chapter.html).


    # 2. Non-recursive Common Table Expressions


    You already got a taste of non-recursive CTEs in the previous chapter. This chapter
    will expand upon the previous examples and show more of the things you can do
    with non-recursive CTEs. In this chapter, we’ll cover some common uses of CTEs
    and finish with how to convert existing queries that use subqueries into queries
    that use CTEs.


    ## Before We Begin


    As with the previous chapter, the examples in this chapter utilize sample data
    . In addition to the `employees` table we used previously, in this chapter we’ll
    use a table called `commissions` . This table can be created with the following
    query :


    ```

    CREATE TABLE commissions (

    id serial primary key,

    salesperson_id BIGINT(20) NOT NULL,

    commission_id BIGINT(20) NOT NULL,

    commission_amount DECIMAL(12,2) NOT NULL,

    commission_date DATE NOT NULL

    );

    ```


    The data is in a CSV file called `bartholomew-ch02.csv` . It can be loaded with
    a query similar to the following (assuming the file is on the computer running
    MariaDB or MySQL server in the `/tmp/` folder):


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch02.csv''

    INTO TABLE commissions

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    Note


    See the “Before We Begin” section of Chapter [1](#A454556_1_En_1_Chapter.html)
    for extra information about loading the files on Windows and working around issues
    with `secure_file_priv`.


    We’re now ready to begin.'
  trans: '

    ## 在单处或多处使用


    承接上一节，使用 CTE 的另一个原因是：当你仅为**一个查询**需要某些复杂逻辑，而不是在许多不同查询中**多次复用**时。例如，如果你的底层销售表使用
    Unix 时间戳存储发票日期，但你的几个应用程序在查询该表时都期望得到 `YYYY-MM-DD` 格式，那么使用视图会是一个绝佳的解决方案；只需定义视图，然后让你的应用程序调用它即可。另一方面，一个仅在单个应用程序中使用一次的复杂视图，如果重写为一个更易于阅读的
    CTE，可能更具可维护性。


    ## 权限


    当你在自己的工作站或服务器上处理个人数据库时，你的数据库用户通常拥有 `ALL PRIVILEGES WITH GRANT OPTION` 权限，这意味着你可以对你的表和数据库执行任何需要或想要的操作，包括
    `CREATE`、`UPDATE`、`INSERT`、`DELETE` 等。或者，你可能经常直接以 root 数据库用户身份登录，该用户自动拥有所有权限。然而，生产环境中使用的数据库通常定义了更细粒度的访问控制。有些用户只能对某些数据库中的表执行
    `SELECT` 操作，而其他用户可以在一些表中插入数据但不能在另一些表中操作，还有一些用户则根据其不同的工作职能被授予或多或少的权限。


    你可能会遇到这样的情况：你需要对某个表创建视图，但你没有该表的 `CREATE VIEW` 权限。CTE 只需要 `SELECT` 权限，因此在这种情况下，使用
    CTE 是一个绝佳的方式，让你能够获得所需的功能，而无需去麻烦一位数据库管理员（DBA）来为你创建所需的视图，或者请求他们授予你在该表上的 `CREATE
    VIEW` 权限（他们可能因公司政策而无法这样做）。


    ## 嵌套


    CTE 为我们的 DBA 工具箱带来了几个新技巧，其中之一是：在每个独立的 `<cte_body>` 中，我们都可以引用其他的 CTE。这解决了一个嵌套派生表的重大难题——嵌套的每一层都会极大地增加复杂度。


    例如，让我们基于简单的 CTE 示例进一步展开，深入分析数据：定义第二个 `<cte_name>` 及其对应的 `<cte_body>`，仅选择 Raleigh
    办公室的 DBA：


    ```

    WITH emp_raleigh AS (

    SELECT * FROM employees

    WHERE office=''Raleigh''

    ),

    emp_raleigh_dbas AS (

    SELECT * from emp_raleigh

    WHERE title=''dba''

    )

    SELECT * FROM emp_raleigh_dbas;

    ```


    查看这段代码，我们有原始的 `<cte_name>` `emp_raleigh` 及其 `<cte_body>`。然后我们定义了第二个 `<cte_name>`
    `emp_raleigh_dbas` 及其 `<cte_body>`。`emp_raleigh_dbas` 建立在 `emp_raleigh` 之上，仅查找
    `WHERE title=''dba''` 的记录。最后，在 `<cte_query>` 部分，我们从 `emp_raleigh_dbas` 中 `SELECT`
    所有内容。从语法上看，这比使用嵌套派生表编写的等效查询**可读性高得多**。


    使用我们的示例数据，结果如下：


    ```

    +-----+---------------+-------+---------+

    | id  | name          | title | office  |

    +-----+---------------+-------+---------+

    |  73 | Mark Hamilton | dba   | Raleigh |

    |  77 | Nancy Porter  | dba   | Raleigh |

    | 135 | Pauline Neal  | dba   | Raleigh |

    +-----+---------------+-------+---------+

    ```


    ## 多路复用


    基于在同一查询中定义多个 `<cte_name>` 及其对应 `<cte_body>` 的能力，我们可以在后续的 `<cte_body>` 部分或 `<cte_query>`
    部分多次引用一个给定的 `<cte_name>`。作为一个多次引用单个 `<cte_name>` 的示例，下面是一个反自连接查询，用于查找在其各自办公室中**唯一的**
    DBA：


    ```

    WITH dbas AS (

    SELECT * FROM employees

    WHERE title=''dba''

    )

    SELECT * FROM dbas A1

    WHERE NOT EXISTS (

    SELECT 1 FROM dbas A2

    WHERE

    A2.office=A1.office

    AND

    A2.name <> A1.name

    );

    ```


    在这里，我们的 `dbas` `<cte_name>` 简单地选择了公司所有的 DBA，然后在我们最终的 `<cte_query>` 中，我们引用了 `dbas`
    **两次**，以便过滤掉所有我们不感兴趣的 DBA，只留下目标记录。


    使用我们的示例数据，结果如下：


    ```

    +----+---------------+-------+---------+

    | id | name          | title | office  |

    +----+---------------+-------+---------+

    |  6 | Toby Lucas    | dba   | Wichita |

    | 16 | Susan Charles | dba   | Nauvoo  |

    +----+---------------+-------+---------+

    ```


    我认为管理层应该确保 Toby 和 Susan 每年参观公司其他办公室几次，这样他们就不会感到与公司的其他 DBA 孤立了。


    ## 递归


    CTE 如此有用的最后一个原因是它们可以是**递归**的。在它们自己的 `<cte_body>` 内部，它们可以调用自身。这项技术提供了强大的能力。但我们现在先不深入讨论——有一整章专门介绍这类
    CTE 查询，因此我们这里不再赘述。


    ## 总结


    在本章中，我们介绍了 CTE 的基本语法，以及为什么该功能被添加到 SQL 标准中，并现在正被添加到 MariaDB 和 MySQL 中的一些原因。我们还通过了几个非递归
    CTE 的简单示例。


    在下一章中，我们将更深入地探讨非递归 CTE，然后在第 3 章讨论递归 CTE。


    # 2. 非递归公用表表达式


    在上一章你已经初步体验了非递归 CTE。本章将基于前面的示例进行扩展，展示更多你可以用非递归 CTE 实现的功能。在本章中，我们将介绍 CTE 的一些常见用法，并最终讲解如何将使用子查询的现有查询转换为使用
    CTE 的查询。


    ## 开始之前


    与上一章一样，本章的示例使用了示例数据。除了我们之前使用的 `employees` 表外，本章我们还将使用一个名为 `commissions` 的表。该表可以通过以下查询创建：


    ```

    CREATE TABLE commissions (

    id serial primary key,

    salesperson_id BIGINT(20) NOT NULL,

    commission_id BIGINT(20) NOT NULL,

    commission_amount DECIMAL(12,2) NOT NULL,

    commission_date DATE NOT NULL

    );

    ```


    数据在一个名为 `bartholomew-ch02.csv` 的 CSV 文件中。可以使用类似于下面的查询来加载数据（假设该文件位于运行 MariaDB 或
    MySQL 服务器的计算机的 `/tmp/` 文件夹中）：


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch02.csv''

    INTO TABLE commissions

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    注意


    有关在 Windows 上加载文件以及解决 `secure_file_priv` 问题的额外信息，请参阅第 1 章的“开始之前”部分。


    我们现在可以开始了。

    '
- fmt: "# Using CTEs for Year-over-Year Comparisons\n\n## 传统 SQL 查询方法\n\nIn the previous\
    \ chapter, we introduced the ability to refer to a CTE multiple times in a single\
    \ query. Let’s explore a more substantial example.\n\nOne thing many companies\
    \ like to track is how sales improve (or not) year-over-year. In our sample `commissions`\
    \ table, we track the commissions each of the company’s 55 salespersons have earned\
    \ and when they earned them. One day, the CEO comes to us and says that he wants\
    \ to compare how the salespersons are doing from one year to the next. A fairly\
    \ straightforward traditional SQL query can easily get us the data we want, grouped\
    \ by salesperson and year:\n\n```sql\nSELECT\n    salesperson_id,\n    YEAR(commission_date)\
    \ AS year,\n    SUM(commission_amount) AS total\nFROM\n    commissions\nGROUP\
    \ BY\n    salesperson_id, year;\n```\n\nOur sample data contains commissions data\
    \ for the years 2016 and 2017, so this query gives us 110 rows—two rows for each\
    \ of our 55 salespersons. Here’s the truncated result:\n\n```\n+----------------+------+----------+\n\
    | salesperson_id | year | total    |\n+----------------+------+----------+\n|\
    \              3 | 2016 | 2249.93  |\n|              3 | 2017 | 3449.67  |\n|\
    \              7 | 2016 | 1088.32  |\n|              7 | 2017 | 3197.25  |\n|\
    \              8 | 2016 | 4514.73  |\n|              8 | 2017 | 5178.19  |\n|\
    \             10 | 2016 | 9433.58  |\n|             10 | 2017 | 8479.05  |\n...\n\
    +----------------+------+----------+\n```\n\nWe could call this complete and send\
    \ the data to the CEO.\n\n## 使用 CTE 进行改进\n\nUsing our initial query as our `<cte_body>`,\
    \ we can select from the data twice, using a `WHERE` clause to set up the condition\
    \ to select a given year and the previous year together. Here’s what it could\
    \ look like:\n\n```sql\nWITH commissions_year AS (\n    SELECT\n        salesperson_id,\n\
    \        YEAR(commission_date) AS year,\n        SUM(commission_amount) AS total\n\
    \    FROM\n        commissions\n    GROUP BY\n        salesperson_id, year\n)\n\
    SELECT *\nFROM\n    commissions_year CUR,\n    commissions_year PREV\nWHERE\n\
    \    CUR.salesperson_id=PREV.salesperson_id AND\n    CUR.year=PREV.year + 1;\n\
    ```\n\nAfter setting up the CTE, which we called `commissions_year`, we selected\
    \ from it twice—once as `CUR` and once as `PREV`. The `WHERE` clause is where\
    \ we match the `salesperson_id` fields from both and set up the condition that\
    \ we’re comparing a year with another year that is one more (`+1`) from it.\n\n\
    This time, the output looks like the following:\n\n```\n+----------------+------+----------+----------------+------+----------+\n\
    | salesperson_id | year | total    | salesperson_id | year | total    |\n+----------------+------+----------+----------------+------+----------+\n\
    |              3 | 2017 | 3449.67  |              3 | 2016 | 2249.93  |\n|   \
    \           7 | 2017 | 3197.25  |              7 | 2016 | 1088.32  |\n|      \
    \        8 | 2017 | 5178.19  |              8 | 2016 | 4514.73  |\n|         \
    \    10 | 2017 | 8479.05  |             10 | 2016 | 9433.58  |\n...\n+----------------+------+----------+----------------+------+----------+\n\
    ```\n\nThis presentation is better, but we could do without the duplicated `salesperson_id`\
    \ columns, and while we’re at it, we should `JOIN` with the `employees` table\
    \ to get the employee name in the output.\n\n## 通过 JOIN 添加员工信息\n\nWe’ll add the\
    \ `JOIN` to the `FROM` clause in our `<cte_body>`, then we’ll select just the\
    \ columns we want from the `<cte_query>` section to be in the output. With those\
    \ modifications, our complete CTE now looks like this:\n\n```sql\nWITH commissions_year\
    \ AS (\n    SELECT\n        employees.id AS sp_id,\n        employees.name AS\
    \ salesperson,\n        YEAR(commission_date) AS year,\n        SUM(commission_amount)\
    \ AS total\n    FROM\n        commissions LEFT JOIN employees\n            ON\
    \ commissions.salesperson_id = employees.id\n    GROUP BY\n        sp_id, year\n\
    )\nSELECT CUR.sp_id, CUR.salesperson, PREV.year, PREV.total, CUR.year, CUR.total\n\
    FROM\n    commissions_year CUR,\n    commissions_year PREV\nWHERE\n    CUR.sp_id=PREV.sp_id\
    \ AND\n    CUR.year=PREV.year + 1;\n```\n\nAnd our output now looks like the following:\n\
    \n```\n+-------+---------------------+------+----------+------+----------+\n|\
    \ sp_id | salesperson         | year | total    | year | total    |\n+-------+---------------------+------+----------+------+----------+\n\
    |     3 | Evelyn Alexander    | 2016 | 2249.93  | 2017 | 3449.67  |\n|     7 |\
    \ John Conner         | 2016 | 1088.32  | 2017 | 3197.25  |\n|     8 | Leo Gutierrez\
    \       | 2016 | 4514.73  | 2017 | 5178.19  |\n|    10 | Ryan Fletcher       |\
    \ 2016 | 9433.58  | 2017 | 8479.05  |\n...\n+-------+---------------------+------+----------+------+----------+\n\
    ```\n\n## 分析结果与进一步筛选\n\nNow it is very easy for the CEO to see at a glance that\
    \ while Evelyn, John, and Leo increased their commissions from 2016 to 2017, Ryan’s\
    \ commissions are down by around $1,000 from 2016 to 2017.\n\nAnd if the CEO comes\
    \ back and wants a filtered list showing just those salespersons whose sales went\
    \ down from year to year, we can simply add the following to the end of our `<cte_query>`\
    \ section:\n\n```sql\nAND CUR.total < PREV.total;\n```\n\nAn equivalent analytical\
    \ query using derived tables would be much larger and not nearly as readable and\
    \ concise."
  raw: '## Using CTEs for Year-over-Year Comparisons


    In the previous chapter, we introduced the ability to refer to a CTE multiple
    times in a single query. Let’s explore a more substantial example.


    One thing many companies like to track is how sales improve (or not) year-over-year.
    In our sample `commissions` table , we track the commissions each of the company’s
    55 salespersons have earned and when they earned them. One day, the CEO comes
    to us and says that he wants to compare how the salespersons are doing from one
    year to the next. A fairly straightforward traditional SQL query can easily get
    us the data we want, grouped by salesperson and year:


    ```

    SELECT

    salesperson_id,

    YEAR(commission_date) AS year,

    SUM(commission_amount) AS total

    FROM

    commissions

    GROUP BY

    salesperson_id, year;

    ```


    Our sample data contains commissions data for the years 2016 and 2017, so this
    query gives us 110 rows—two rows for each of our 55 salespersons. Here’s the truncated
    result:


    ```

    +----------------+------+----------+

    | salesperson_id | year | total    |

    +----------------+------+----------+

    |              3 | 2016 | 2249.93  |

    |              3 | 2017 | 3449.67  |

    |              7 | 2016 | 1088.32  |

    |              7 | 2017 | 3197.25  |

    |              8 | 2016 | 4514.73  |

    |              8 | 2017 | 5178.19  |

    |             10 | 2016 | 9433.58  |

    |             10 | 2017 | 8479.05  |

    ...

    +----------------+------+----------+

    ```


    We could call this complete and send the data to the CEO, but by using a CTE we
    can do much better.


    Using our initial query as our <cte_body>, we can select from the data twice,
    using a `WHERE` clause to set up the condition to select a given year and the
    previous year together. Here’s what it could look like:


    ```

    WITH commissions_year AS (

    SELECT

    salesperson_id,

    YEAR(commission_date) AS year,

    SUM(commission_amount) AS total

    FROM

    commissions

    GROUP BY

    salesperson_id, year

    )

    SELECT *

    FROM

    commissions_year CUR,

    commissions_year PREV

    WHERE

    CUR.salesperson_id=PREV.salesperson_id AND

    CUR.year=PREV.year + 1;

    ```


    After setting up the CTE, which we called `commissions_year` , we selected from
    it twice—once as `CUR` and once as `PREV`. The `WHERE` clause is where we match
    the `salesperson_id` fields from both and set up the condition that we’re comparing
    a year with another year that is one more (+1) from it.


    This time, the output looks like the following:


    ```

    +----------------+------+----------+----------------+------+----------+

    | salesperson_id | year | total    | salesperson_id | year | total    |

    +----------------+------+----------+----------------+------+----------+

    |              3 | 2017 | 3449.67  |              3 | 2016 | 2249.93  |

    |              7 | 2017 | 3197.25  |              7 | 2016 | 1088.32  |

    |              8 | 2017 | 5178.19  |              8 | 2016 | 4514.73  |

    |             10 | 2017 | 8479.05  |             10 | 2016 | 9433.58  |

    ...

    +----------------+------+----------+----------------+------+----------+

    ```


    This presentation is better, but we could do without the duplicated `salesperson_id`
    columns , and while we’re at it, we should `JOIN` with the `employees` table to
    get the employee name in the output (something our CEO would appreciate).


    We’ll add the `JOIN` to the `FROM` clause in our <cte_body>, then we’ll select
    just the columns we want from the <cte_query> section to be in the output. With
    those modifications , our complete CTE now looks like this:


    ```

    WITH commissions_year AS (

    SELECT

    employees.id AS sp_id,

    employees.name AS salesperson,

    YEAR(commission_date) AS year,

    SUM(commission_amount) AS total

    FROM

    commissions LEFT JOIN employees

    ON commissions.salesperson_id = employees.id

    GROUP BY

    sp_id, year

    )

    SELECT CUR.sp_id, CUR.salesperson, PREV.year, PREV.total, CUR.year, CUR.total

    FROM

    commissions_year CUR,

    commissions_year PREV

    WHERE

    CUR.sp_id=PREV.sp_id AND

    CUR.year=PREV.year + 1;

    ```


    And our output now looks like the following:


    ```

    +-------+---------------------+------+----------+------+----------+

    | sp_id | salesperson         | year | total    | year | total    |

    +-------+---------------------+------+----------+------+----------+

    |     3 | Evelyn Alexander    | 2016 | 2249.93  | 2017 | 3449.67  |

    |     7 | John Conner         | 2016 | 1088.32  | 2017 | 3197.25  |

    |     8 | Leo Gutierrez       | 2016 | 4514.73  | 2017 | 5178.19  |

    |    10 | Ryan Fletcher       | 2016 | 9433.58  | 2017 | 8479.05  |

    ...

    +-------+---------------------+------+----------+------+----------+

    ```


    Now it is very easy for the CEO to see at a glance that while Evelyn, John, and
    Leo increased their commissions from 2016 to 2017, Ryan’s commissions are down
    by around $1,000 from 2016 to 2017\. Maybe he needs some coaching from his manager?


    And if the CEO comes back and wants a filtered list showing just those salespersons
    whose sales went down from year to year, we can simply add the following to the
    end of our <cte_query> section:


    ```

    AND CUR.total < PREV.total;

    ```


    An equivalent analytical query using derived tables would be much larger and not
    nearly as readable and concise.'
  trans: "\n# 使用 CTE 进行年度同比比较\n\n## 传统 SQL 查询方法\n\n在上一章中，我们介绍了在单个查询中多次引用 CTE 的能力。让我们来看一个更实质性的例子。\n\
    \n许多公司喜欢追踪的一项指标是销售额的年度同比增减情况。在我们的示例 `commissions` 表中，我们跟踪了公司 55 名销售人员各自赚取的佣金及赚取时间。某天，CEO\
    \ 找到我们说，他想要比较销售人员在不同年份的表现情况。一个相当直接的传统 SQL 查询就能轻松地获取我们想要的数据，并按销售人员和年份分组：\n\n```sql\n\
    SELECT\n    salesperson_id,\n    YEAR(commission_date) AS year,\n    SUM(commission_amount)\
    \ AS total\nFROM\n    commissions\nGROUP BY\n    salesperson_id, year;\n```\n\n\
    我们的示例数据包含 2016 和 2017 年的佣金数据，因此此查询会返回 110 行结果——我们 55 位销售人员每人两行。以下是截断后的结果：\n\n\
    ```\n+----------------+------+----------+\n| salesperson_id | year | total   \
    \ |\n+----------------+------+----------+\n|              3 | 2016 | 2249.93 \
    \ |\n|              3 | 2017 | 3449.67  |\n|              7 | 2016 | 1088.32 \
    \ |\n|              7 | 2017 | 3197.25  |\n|              8 | 2016 | 4514.73 \
    \ |\n|              8 | 2017 | 5178.19  |\n|             10 | 2016 | 9433.58 \
    \ |\n|             10 | 2017 | 8479.05  |\n...\n+----------------+------+----------+\n\
    ```\n\n我们可以将此视为完成，并将数据发送给 CEO。\n\n## 使用 CTE 进行改进\n\n使用我们最初的查询作为 `<cte_body>`，我们可以从中选择两次，使用\
    \ `WHERE` 子句来设定条件，以同时选择给定年份及其前一年的数据。它可能看起来像这样：\n\n```sql\nWITH commissions_year\
    \ AS (\n    SELECT\n        salesperson_id,\n        YEAR(commission_date) AS\
    \ year,\n        SUM(commission_amount) AS total\n    FROM\n        commissions\n\
    \    GROUP BY\n        salesperson_id, year\n)\nSELECT *\nFROM\n    commissions_year\
    \ CUR,\n    commissions_year PREV\nWHERE\n    CUR.salesperson_id=PREV.salesperson_id\
    \ AND\n    CUR.year=PREV.year + 1;\n```\n\n设置好名为 `commissions_year` 的 CTE 后，我们从中选择了两次——一次作为\
    \ `CUR`，一次作为 `PREV`。`WHERE` 子句用于匹配两者的 `salesperson_id` 字段，并设定条件：我们正在比较某一年与比它大一（`+1`）的另一年。\n\
    \n这一次，输出结果如下所示：\n\n```\n+----------------+------+----------+----------------+------+----------+\n\
    | salesperson_id | year | total    | salesperson_id | year | total    |\n+----------------+------+----------+----------------+------+----------+\n\
    |              3 | 2017 | 3449.67  |              3 | 2016 | 2249.93  |\n|   \
    \           7 | 2017 | 3197.25  |              7 | 2016 | 1088.32  |\n|      \
    \        8 | 2017 | 5178.19  |              8 | 2016 | 4514.73  |\n|         \
    \    10 | 2017 | 8479.05  |             10 | 2016 | 9433.58  |\n...\n+----------------+------+----------+----------------+------+----------+\n\
    ```\n\n这个呈现方式更好了，但我们可以去掉重复的 `salesperson_id` 列，同时，我们应该 `JOIN` `employees` 表以在输出中包含员工姓名。\n\
    \n## 通过 JOIN 添加员工信息\n\n我们将在 `<cte_body>` 的 `FROM` 子句中添加 `JOIN`，然后从 `<cte_query>`\
    \ 部分仅选择我们想要的列放入输出。经过这些修改后，我们完整的 CTE 现在看起来像这样：\n\n```sql\nWITH commissions_year\
    \ AS (\n    SELECT\n        employees.id AS sp_id,\n        employees.name AS\
    \ salesperson,\n        YEAR(commission_date) AS year,\n        SUM(commission_amount)\
    \ AS total\n    FROM\n        commissions LEFT JOIN employees\n            ON\
    \ commissions.salesperson_id = employees.id\n    GROUP BY\n        sp_id, year\n\
    )\nSELECT CUR.sp_id, CUR.salesperson, PREV.year, PREV.total, CUR.year, CUR.total\n\
    FROM\n    commissions_year CUR,\n    commissions_year PREV\nWHERE\n    CUR.sp_id=PREV.sp_id\
    \ AND\n    CUR.year=PREV.year + 1;\n```\n\n而我们现在的输出如下所示：\n\n```\n+-------+---------------------+------+----------+------+----------+\n\
    | sp_id | salesperson         | year | total    | year | total    |\n+-------+---------------------+------+----------+------+----------+\n\
    |     3 | Evelyn Alexander    | 2016 | 2249.93  | 2017 | 3449.67  |\n|     7 |\
    \ John Conner         | 2016 | 1088.32  | 2017 | 3197.25  |\n|     8 | Leo Gutierrez\
    \       | 2016 | 4514.73  | 2017 | 5178.19  |\n|    10 | Ryan Fletcher       |\
    \ 2016 | 9433.58  | 2017 | 8479.05  |\n...\n+-------+---------------------+------+----------+------+----------+\n\
    ```\n\n## 分析结果与进一步筛选\n\n现在，CEO 可以一目了然地看到，尽管 Evelyn、John 和 Leo 的佣金从 2016 年到 2017\
    \ 年有所增加，但 Ryan 的佣金却比 2016 年减少了约 1000 美元。\n\n如果 CEO 回来并想要一个经过筛选的列表，只显示那些销售额逐年下降的销售人员，我们只需在\
    \ `<cte_query>` 部分的末尾添加以下内容：\n\n```sql\nAND CUR.total < PREV.total;\n```\n\n使用派生表编写等效的分析查询将会庞大得多，并且远没有那么简洁易读。\n"
- fmt: "## Comparing Individuals Against Their Group\n\nOne annoying issue with using\
    \ subqueries is when you have to copy and paste them multiple times in your query.\
    \ These duplicated `FROM (SELECT ...)` statements are prime locations for errors,\
    \ especially when something changes and you need to update every single one of\
    \ them. CTEs provide a way to eliminate this duplication. A given `<cte_body>`\
    \ is defined once and tied to a single `<cte_name>`. Whenever you need it, you\
    \ just reference the `<cte_name>`, and if something needs to be updated, you just\
    \ have to update the `<cte_body>` in one place.\n\nUsing the same base CTE as\
    \ from the previous example, we can modify the `SELECT` statement after it to\
    \ easily perform a different kind of analytical query, one that traditionally\
    \ would have used duplicated `FROM (SELECT...)` statements. This time, instead\
    \ of comparing salespersons to their own performance from one year to the next,\
    \ we’ll compare them to all salespersons. In particular, in his next company-wide\
    \ email, the CEO wants to give a shout-out to all of the salespersons who made\
    \ at least 2 percent of the total commissions earned by all salespersons in the\
    \ entire company during `2017`.\n\n```sql\nWITH commissions_year AS (\n    SELECT\n\
    \        employees.id AS sp_id,\n        employees.name AS salesperson,\n    \
    \    YEAR(commission_date) AS year,\n        SUM(commission_amount) AS total\n\
    \    FROM\n        commissions LEFT JOIN employees\n            ON commissions.salesperson_id\
    \ = employees.id\n    GROUP BY\n        sp_id, year\n)\nSELECT *\nFROM\n    commissions_year\
    \ C1\nWHERE\n    total > ( SELECT\n                0.02*SUM(total)\n         \
    \     FROM\n                commissions_year C2\n              WHERE\n       \
    \         C2.year = C1.year\n                AND C2.year = 2017)\nORDER BY\n \
    \   total DESC;\n```\n\nThe `<cte_body>` for `commissions_year` is unchanged from\
    \ our previous example, so there’s no need to go over it. The difference is all\
    \ in the `<cte_query>` section. Our `SELECT` statement looks at individual totals\
    \ that make up at least 2 percent of the total of all commissions for the `2017`\
    \ year, then orders everything `DESC` so the top earner is on top.\n\nDoing this\
    \ sort of query in the traditional way would mean each `FROM` in the `<cte_query>`\
    \ section would be a copy-pasted `FROM (SELECT...)` statement.\n\nIf you’ve been\
    \ following along with the examples, the output of the preceding code looks like\
    \ the following:\n\n```\n+-------+------------------+------+----------+\n| sp_id\
    \ | salesperson      | year | total    |\n+-------+------------------+------+----------+\n\
    |   116 | Christian Reeves | 2017 | 13856.74 |\n|    69 | Luis Vaughn      | 2017\
    \ | 12570.95 |\n|   128 | Stephanie Dawson | 2017 | 12253.44 |\n|    38 | Dorothy\
    \ Anderson | 2017 | 12010.91 |\n|    78 | Louis Santiago   | 2017 | 11423.48 |\n\
    |   131 | Rene Gibbs       | 2017 | 11147.38 |\n|   121 | Christina Terry  | 2017\
    \ | 10979.07 |\n|    53 | Jennifer Moore   | 2017 | 10967.64 |\n|   114 | Veronica\
    \ Boone   | 2017 | 10651.10 |\n|    41 | Terrance Reese   | 2017 | 10219.33 |\n\
    |   132 | Alan Carroll     | 2017 | 10066.97 |\n|    34 | Bobby French     | 2017\
    \ | 9928.69  |\n|   105 | Alonzo Page      | 2017 | 9782.69  |\n|    66 | Kathryn\
    \ Barnes   | 2017 | 9433.56  |\n|   106 | Bradley Black    | 2017 | 9387.77  |\n\
    |   118 | Deborah Peterson | 2017 | 9265.96  |\n|    79 | Rafael Sandoval  | 2017\
    \ | 9055.54  |\n+-------+------------------+------+----------+\n```\n\nLet’s give\
    \ a round of applause to the members of the 2017 2 Percent Club!\n\n## Translating\
    \ Subqueries into CTEs\n\nLet’s switch gears and talk about the process for taking\
    \ an existing query and translating it into a CTE. It is fairly simple. To illustrate\
    \ this, here’s a query that is equivalent to our query from the previous example,\
    \ but instead of using a CTE, it uses subqueries in the form of two identical\
    \ `FROM (SELECT...)` statements:\n\n```sql\nSELECT *\nFROM (\n    SELECT\n   \
    \     employees.id AS sp_id,\n        employees.name AS salesperson,\n       \
    \ YEAR(commission_date) AS year,\n        SUM(commission_amount) AS total\n  \
    \  FROM\n        commissions LEFT JOIN employees\n            ON commissions.salesperson_id\
    \ = employees.id\n    GROUP BY\n        sp_id, year\n    ) AS C1\nWHERE\n    total\
    \ > ( SELECT\n                0.02*SUM(total)\n              FROM (\n        \
    \            SELECT\n                        employees.id AS sp_id,\n        \
    \                employees.name AS salesperson,\n                        YEAR(commission_date)\
    \ AS year,\n                        SUM(commission_amount) AS total\n        \
    \            FROM\n                        commissions LEFT JOIN employees\n \
    \                           ON commissions.salesperson_id = employees.id\n   \
    \                 GROUP BY\n                        sp_id, year\n            \
    \      ) AS C2\n              WHERE\n                C2.year = C1.year\n     \
    \           AND C2.year = 2017)\nORDER BY\n    total DESC;\n```\n\nBecause of\
    \ the duplicated `FROM (SELECT...)` statements, this query is 33 lines long, as\
    \ opposed to the 25-line CTE that does the same thing. An eight-line difference\
    \ isn’t much, but more-complex queries could include five, seven, eleven, or even\
    \ more duplicated subqueries, causing an almost exponential increase in the size\
    \ of the query. This could quickly turn into a maintenance nightmare if something\
    \ in the underlying table(s) changes and we need to update the query.\n\nTo convert\
    \ a query with duplicated subqueries into a CTE, there are only three steps (four\
    \ if you need to repeat the process for additional duplicated subqueries):\n1.\
    \  Locate the first occurrence of the derived table query and copy it above the\
    \ `SELECT` line, wrapping it in `WITH <cte_name> AS (` and then an ending `)`.\n\
    2.  Replace that first occurrence of the subquery with whatever we put as the\
    \ `<cte_name>`.\n3.  Go through the rest of the query and find the additional\
    \ identical subqueries and replace them with `<cte_name>` as well.\n4.  (Optional)\
    \ Repeat the process for any other duplicated subqueries in your query, if any.\n\
    \nNot every query will be a perfect fit for this process, but many queries are.\n\
    \n## Summary\n\nIn this chapter, we expanded upon the examples from the previous\
    \ chapter and went through a couple more-substantial examples that illustrated\
    \ how CTEs are superior to subqueries, particularly in how they help us avoid\
    \ duplicated subqueries that are hard to modify and maintain. We then finished\
    \ with a discussion of how to take a query that uses subqueries and convert it\
    \ into a query that uses CTEs instead.\n\nTo round out the CTE section of this\
    \ book, the next chapter will cover what I think is the most exciting part of\
    \ CTEs—recursion.\n\n# 3. Recursive Common Table Expressions\n\nRecursion is a\
    \ very useful technique in computer science. Recursive algorithms are well suited\
    \ for navigating data structures such as trees, where items contain other items\
    \ that may also contain items, and graphs, which track connections or routes between\
    \ items. SQL has historically done a poor job with these.\n\nOracle attempted\
    \ to add recursive support to SQL in the 1980s with their non-standard `CONNECT\
    \ BY` syntax, but this has now been superseded, improved upon, and standardized\
    \ in the official SQL standard, version SQL99, with recursive CTEs. Implementations\
    \ of this standard started appearing in various databases, such as Oracle and\
    \ SQL Server, starting around 2007, with MariaDB and MySQL finally catching up\
    \ and getting them about ten years after that.\n\nIn simple terms, a recursive\
    \ CTE is a CTE that refers to itself in its `<cte_body>`. Having a CTE refer to\
    \ itself might seem complicated, but once you get the hang of it, it isn’t bad,\
    \ and by using recursion there are a lot of cool things you can do. This chapter\
    \ will provide examples showing some of the things you can do with recursive CTEs."
  raw: '## Comparing Individuals Against Their Group


    One annoying issue with using subqueries is when you have to copy and paste them
    multiple times in your query. These duplicated `FROM (SELECT ...)` statements
    are prime locations for errors, especially when something changes and you need
    to update every single one of them. CTEs provide a way to eliminate this duplication.
    A given <cte_body> is defined once and tied to a single <cte_name>. Whenever you
    need it, you just reference the <cte_name>, and if something needs to be updated,
    you just have to update the <cte_body> in one place.


    Using the same base CTE as from the previous example, we can modify the `SELECT`
    statement after it to easily perform a different kind of analytical query, one
    that traditionally would have used duplicated `FROM (SELECT...)` statements. This
    time, instead of comparing salespersons to their own performance from one year
    to the next, we’ll compare them to all salespersons. In particular, in his next
    company-wide email, the CEO wants to give a shout-out to all of the salespersons
    who made at least 2 percent of the total commissions earned by all salespersons
    in the entire company during 2017.


    ```

    WITH commissions_year AS (

    SELECT

    employees.id AS sp_id,

    employees.name AS salesperson,

    YEAR(commission_date) AS year,

    SUM(commission_amount) AS total

    FROM

    commissions LEFT JOIN employees

    ON commissions.salesperson_id = employees.id

    GROUP BY

    sp_id, year

    )

    SELECT *

    FROM

    commissions_year C1

    WHERE

    total > ( SELECT

    0.02*SUM(total)

    FROM

    commissions_year C2

    WHERE

    C2.year = C1.year

    AND C2.year = 2017)

    ORDER BY

    total DESC;

    ```


    The <cte_body> for `commissions_` `year` is unchanged from our previous example,
    so there’s no need to go over it. The difference is all in the <cte_query> section.
    Our `SELECT` statement looks at individual totals that make up at least 2 percent
    of the total of all commissions for the 2017 year, then orders everything `DESC`
    so the top earner is on top.


    Doing this sort of query in the traditional way would mean each `FROM` in the
    <cte_query> section would be a copy-pasted `FROM (SELECT...)` statement.


    If you’ve been following along with the examples, the output of the preceding
    code looks like the following:


    ```

    +-------+------------------+------+----------+

    | sp_id | salesperson      | year | total    |

    +-------+------------------+------+----------+

    |   116 | Christian Reeves | 2017 | 13856.74 |

    |    69 | Luis Vaughn      | 2017 | 12570.95 |

    |   128 | Stephanie Dawson | 2017 | 12253.44 |

    |    38 | Dorothy Anderson | 2017 | 12010.91 |

    |    78 | Louis Santiago   | 2017 | 11423.48 |

    |   131 | Rene Gibbs       | 2017 | 11147.38 |

    |   121 | Christina Terry  | 2017 | 10979.07 |

    |    53 | Jennifer Moore   | 2017 | 10967.64 |

    |   114 | Veronica Boone   | 2017 | 10651.10 |

    |    41 | Terrance Reese   | 2017 | 10219.33 |

    |   132 | Alan Carroll     | 2017 | 10066.97 |

    |    34 | Bobby French     | 2017 | 9928.69  |

    |   105 | Alonzo Page      | 2017 | 9782.69  |

    |    66 | Kathryn Barnes   | 2017 | 9433.56  |

    |   106 | Bradley Black    | 2017 | 9387.77  |

    |   118 | Deborah Peterson | 2017 | 9265.96  |

    |    79 | Rafael Sandoval  | 2017 | 9055.54  |

    +-------+------------------+------+----------+

    ```


    Let’s give a round of applause to the members of the 2017 2 Percent Club !


    ## Translating Subqueries into CTEs


    Let’s switch gears and talk about the process for taking an existing query and
    translating it into a CTE. It is fairly simple. To illustrate this, here’s a query
    that is equivalent to our query from the previous example, but instead of using
    a CTE, it uses subqueries in the form of two identical `FROM (SELECT...)` statements:


    ```

    SELECT *

    FROM (

    SELECT

    employees.id AS sp_id,

    employees.name AS salesperson,

    YEAR(commission_date) AS year,

    SUM(commission_amount) AS total

    FROM

    commissions LEFT JOIN employees

    ON commissions.salesperson_id = employees.id

    GROUP BY

    sp_id, year

    ) AS C1

    WHERE

    total > ( SELECT

    0.02*SUM(total)

    FROM (

    SELECT

    employees.id AS sp_id,

    employees.name AS salesperson,

    YEAR(commission_date) AS year,

    SUM(commission_amount) AS total

    FROM

    commissions LEFT JOIN employees

    ON commissions.salesperson_id = employees.id

    GROUP BY

    sp_id, year

    ) AS C2

    WHERE

    C2.year = C1.year

    AND C2.year = 2017)

    ORDER BY

    total DESC;

    ```


    Because of the duplicated `FROM (SELECT...)` statements, this query is 33 lines
    long, as opposed to the 25-line CTE that does the same thing. An eight-line difference
    isn’t much, but more-complex queries could include five, seven, eleven, or even
    more duplicated subqueries, causing an almost exponential increase in the size
    of the query. This could quickly turn into a maintenance nightmare if something
    in the underlying table(s) changes and we need to update the query.


    To convert a query with duplicated subqueries into a CTE, there are only three
    steps (four if you need to repeat the process for additional duplicated subqueries
    ):


    1.  Locate the first occurrence of the derived table query and copy it above the
    `SELECT` line, wrapping it in `WITH <cte_name> AS (`and then an ending`)`.  

    2.  Replace that first occurrence of the subquery with whatever we put as the
    <cte_name>.  

    3.  Go through the rest of the query and find the additional identical subqueries
    and replace them with <cte_name> as well.  

    4.  (Optional) Repeat the process for any other duplicated subqueries in your
    query, if any.  


    Not every query will be a perfect fit for this process, but many queries are.


    ## Summary


    In this chapter, we expanded upon the examples from the previous chapter and went
    through a couple more-substantial examples that illustrated how CTEs are superior
    to subqueries, particularly in how they help us avoid duplicated subqueries that
    are hard to modify and maintain. We then finished with a discussion of how to
    take a query that uses subqueries and convert it into a query that uses CTEs instead.


    To round out the CTE section of this book, the next chapter will cover what I
    think is the most exciting part of CTEs—recursion.


    # 3. Recursive Common Table Expressions


    Recursion is a very useful technique in computer science. Recursive algorithms
    are well suited for navigating data structures such as trees , where items contain
    other items that may also contain items, and graphs, which track connections or
    routes between items. SQL has historically done a poor job with these.


    Oracle attempted to add recursive support to SQL in the 1980s with their non-standard
    `CONNECT BY` syntax, but this has now been superseded, improved upon, and standardized
    in the official SQL standard, version SQL99, with recursive CTEs. Implementations
    of this standard started appearing in various databases, such as Oracle and SQL
    Server, starting around 2007, with MariaDB and MySQL finally catching up and getting
    them about ten years after that.


    In simple terms, a recursive CTE is a CTE that refers to itself in its <cte_body>.
    Having a CTE refer to itself might seem complicated, but once you get the hang
    of it, it isn’t bad, and by using recursion there are a lot of cool things you
    can do. This chapter will provide examples showing some of the things you can
    do with recursive CTEs.'
