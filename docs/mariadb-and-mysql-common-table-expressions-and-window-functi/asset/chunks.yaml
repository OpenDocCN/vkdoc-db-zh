    ```

    +------------+----+-------+--------+

    | date       | sp | id    | amount |

    +------------+----+-------+--------+

    | 2016-01-21 |  3 | 15165 | 429.50 |

    | 2016-02-09 |  3 | 15231 | 142.37 |

    | 2016-02-12 |  3 | 15253 | 184.74 |

    | 2016-03-22 |  3 | 15428 | 169.62 |

    | 2016-04-01 |  3 | 15476 | 363.53 |

    | 2016-05-10 |  3 | 15644 | 358.49 |

    | 2016-07-11 |  3 | 15901 | 149.64 |

    | 2016-11-25 |  3 | 16465 | 452.04 |

    | 2017-01-25 |  3 | 16726 | 145.68 |

    | 2017-03-10 |  3 | 16927 | 216.16 |

    ...

    +------------+----+-------+--------+

    ```


    To create a running commissions total, we need to take the first amount for a
    row matching a given salesperson and output it in a column. We’ll call this column
    `total`. Then, for each subsequent row we add the previous `total` to the current
    row’s `commission` and make that the new total and so on until we come to a new
    `salesperson_id`, whereupon we will start the process over. At least, that’s my
    way of thinking through the problem. Actually solving this using traditional SQL
    is a bit different. For example, one traditional SQL way of solving the problem
    is to use a self-join and the `SUM` function like so:


    ```

    SELECT

    commission_date AS date, salesperson_id as sp,

    commission_id as id, commission_amount as amount,

    (SELECT SUM(commission_amount)

    FROM commissions AS c2

    WHERE c2.salesperson_id = c1.salesperson_id AND

    c2.commission_date <= c1.commission_date) AS total

    FROM commissions AS c1

    ORDER BY sp,date;

    ```


    Inside our main query we have a subquery that looks for every row where the salesperson
    matches and the date is less than or equal to the date of the current row. For
    those rows that match the criteria, it sums them all up and outputs the answer
    in the `total` column. So, for the row with the oldest date stamp the only other
    row that it will match is itself, so the `total` column is the same as the `commission_amount`
    column for that row. For the row with the second oldest date stamp, the rows that
    match will be the oldest row and itself, so those are what are summed together
    into the `total` column. The process continues until all the rows that match a
    given `salesperson_id` have been fetched, and then the process restarts with the
    next salesperson.


    The result is several thousand lines long, but here’s the first few rows:


    ```

    +------------+-----+-------+--------+----------+

    | date       | sp  | id    | amount | total    |

    +------------+-----+-------+--------+----------+

    | 2016-01-21 |   3 | 15165 | 429.50 | 429.50   |

    | 2016-02-09 |   3 | 15231 | 142.37 | 571.87   |

    | 2016-02-12 |   3 | 15253 | 184.74 | 756.61   |

    | 2016-03-22 |   3 | 15428 | 169.62 | 926.23   |

    | 2016-04-01 |   3 | 15476 | 363.53 | 1289.76  |

    | 2016-05-10 |   3 | 15644 | 358.49 | 1648.25  |

    | 2016-07-11 |   3 | 15901 | 149.64 | 1797.89  |

    | 2016-11-25 |   3 | 16465 | 452.04 | 2249.93  |

    | 2017-01-25 |   3 | 16726 | 145.68 | 2395.61  |

    | 2017-03-10 |   3 | 16927 | 216.16 | 2611.77  |

    | 2017-04-05 |   3 | 17046 | 277.36 | 2889.13  |

    | 2017-04-11 |   3 | 17072 | 151.36 | 3040.49  |

    | 2017-05-29 |   3 | 17272 | 368.20 | 3408.69  |

    ...

    +------------+-----+-------+--------+----------+

    ```


    All in all, it works, and you could even say it works well. It’s easy to confirm
    that the `total` column is accurately keeping a running total and that when the
    `salesperson_id` changes the count starts over.


    But the process for how we get at the total is awkward. If this were a paper ledger,
    we wouldn’t continuously re-add everything that came before; we would simply add
    the new value to the old total.


    Also, all of the adding and re-adding our query is doing means we’re constantly
    going out and fetching new groups of rows to sum together. All of this fetching
    and re-fetching takes time. Indexes can help, especially on large tables, but
    using a subquery like this doesn’t seem like the right way to go about solving
    our original task of displaying a running total.


    A Window Function can do this job much better, and it does it in a more natural
    way. First off, like our previous Window Function example where we were numbering
    employees, we need to use both the <partition_definition> and <order_definition>
    sections in our `OVER` clause. We’ll `PARTITION BY salesperson_id` and `ORDER
    BY commission_date` to match the final `ORDER BY` clause of the query.


    We then need to tell the Window Function what rows to add together for our `total`
    column. Aggregate Window Functions, like `SUM`, can use moving window frames to
    quickly identify the data they need to process. For this we’ll use a <frame_definition>
    that goes from the beginning of our result set, or `UNBOUNDED PRECEDING`, to the
    `CURRENT ROW`, so our full <frame_definition> section will be:


    ```

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    To put all of this in place, we take the previous query and replace the subquery
    part with our `SUM` Window Function, like so:


    ```

    SELECT

    commission_date AS date, salesperson_id as sp,

    commission_id as id, commission_amount as amount,

    SUM(commission_amount)

    OVER (

    PARTITION BY salesperson_id

    ORDER BY commission_date

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS total

    FROM commissions AS c1

    ORDER BY sp,date;

    ```


    The result of this query is the same as we saw for the subquery version, so there’s
    no need to show it again.


    When this query is run, on the first row the window frame is just the first row.
    As the query continues, the frame expands, and unlike subqueries, it doesn’t need
    to refetch any data; it just looks at the data that is already there. Then, when
    the frame crosses our partition boundary, it resets to just the current row and
    starts growing again. Instead of hundreds or thousands of trips back and forth
    to the database to fetch the information, which is what happens with a subquery,
    the Window Function only needs to make one pass.


    This performance difference is so dramatic it can even be seen on the relatively
    small `commissions` table. On my laptop, processing the whole 3,000+ rows in the
    table takes `2.56` seconds to run the self-join version of the query. Contrast
    that with the Window Function version, which completes instantly. Two and a half
    seconds isn’t much, but as table size increases the speed advantage of Window
    Functions keeps growing. One of the MariaDB engineers performed some tests on
    similar, but much larger, tables using a similar query. Table [5-1](#A454556_1_En_5_Chapter.html#Tab1)
    shows the results. All times are in seconds.


    Table 5-1.


    Window Functions Versus Self-joins


    | # Rows in Table | Self-join | Self-join with Index | Window Function |

    | --- | --- | --- | --- |

    | 10,000 | 0.29 | 0.01 | 0.02 |

    | 100,000 | 2.91 | 0.09 | 0.16 |

    | 1,000,000 | 29.10 | 2.86 | 3.04 |

    | 10,000,000 | 346.30 | 90.97 | 43.17 |

    | 100,000,000 | 4357.20 | 813.20 | 514.24 |


    Without an index on the table, the Window Function version of the query always
    wins by an order of magnitude over the self-join version. With an index on the
    table, the self-join version of the query can keep up with the Window Function
    version for a while, but after the table gets above a million rows, the Window
    Function takes the lead and is almost twice as fast.


    Note'
  trans: '## 维护运行总计


    另一个常见的数据库任务是维护某个值的**运行总计**。这可以是账户余额、一段时间内售出的物品数量，或其他各种数值。


    我们可以使用第 2 章中用过的 `commissions` 表来演示这个概念。该表记录了我们虚构公司销售人员的佣金。它记录了销售员 ID、佣金 ID、佣金金额以及佣金日期。


    通过以下查询可以查看一个简短的样本数据：

    ```sql

    SELECT

    commission_date AS date,

    salesperson_id as sp,

    commission_id as id,

    commission_amount as amount

    FROM commissions

    ORDER BY sp,date;

    ```


    完整的输出非常长，但以下是前 10 行输出：

    ```

    +------------+----+-------+--------+

    | date       | sp | id    | amount |

    +------------+----+-------+--------+

    | 2016-01-21 |  3 | 15165 | 429.50 |

    | 2016-02-09 |  3 | 15231 | 142.37 |

    | 2016-02-12 |  3 | 15253 | 184.74 |

    | 2016-03-22 |  3 | 15428 | 169.62 |

    | 2016-04-01 |  3 | 15476 | 363.53 |

    | 2016-05-10 |  3 | 15644 | 358.49 |

    | 2016-07-11 |  3 | 15901 | 149.64 |

    | 2016-11-25 |  3 | 16465 | 452.04 |

    | 2017-01-25 |  3 | 16726 | 145.68 |

    | 2017-03-10 |  3 | 16927 | 216.16 |

    ...

    +------------+----+-------+--------+

    ```


    要创建一个运行的佣金总计，我们需要获取匹配给定销售员的第一行金额，并将其输出在一个列中。我们将这个列称为 `total`。然后，对于每一后续行，我们将前一个
    `total` 加到当前行的 `commission_amount` 上，作为新的总计，依此类推，直到遇到一个新的 `salesperson_id`，然后我们重新开始这个过程。至少，这是我思考这个问题的方式。实际上，使用传统的
    SQL 来解决这个问题有所不同。例如，一种传统的 SQL 解决方法是使用自连接和 `SUM` 函数，如下所示：

    ```sql

    SELECT

    commission_date AS date, salesperson_id as sp,

    commission_id as id, commission_amount as amount,

    (SELECT SUM(commission_amount)

    FROM commissions AS c2

    WHERE c2.salesperson_id = c1.salesperson_id AND

    c2.commission_date <= c1.commission_date) AS total

    FROM commissions AS c1

    ORDER BY sp,date;

    ```


    在我们的主查询中，有一个子查询，它查找销售员匹配且日期小于等于当前行日期的所有行。对于那些符合条件的行，它将它们全部相加，并将结果输出到 `total` 列中。因此，对于日期戳最早的行，它唯一匹配的行就是它自己，所以对于那一行，`total`
    列与 `commission_amount` 列相同。对于日期戳第二早的行，匹配的行将是最老的行和它自己，所以这些行被求和到 `total` 列中。这个过程一直持续到所有匹配给定
    `salesperson_id` 的行都被获取，然后针对下一个销售员重新开始这个过程。


    结果有几千行长，但这里显示前几行：

    ```

    +------------+-----+-------+--------+----------+

    | date       | sp  | id    | amount | total    |

    +------------+-----+-------+--------+----------+

    | 2016-01-21 |   3 | 15165 | 429.50 | 429.50   |

    | 2016-02-09 |   3 | 15231 | 142.37 | 571.87   |

    | 2016-02-12 |   3 | 15253 | 184.74 | 756.61   |

    | 2016-03-22 |   3 | 15428 | 169.62 | 926.23   |

    | 2016-04-01 |   3 | 15476 | 363.53 | 1289.76  |

    | 2016-05-10 |   3 | 15644 | 358.49 | 1648.25  |

    | 2016-07-11 |   3 | 15901 | 149.64 | 1797.89  |

    | 2016-11-25 |   3 | 16465 | 452.04 | 2249.93  |

    | 2017-01-25 |   3 | 16726 | 145.68 | 2395.61  |

    | 2017-03-10 |   3 | 16927 | 216.16 | 2611.77  |

    | 2017-04-05 |   3 | 17046 | 277.36 | 2889.13  |

    | 2017-04-11 |   3 | 17072 | 151.36 | 3040.49  |

    | 2017-05-29 |   3 | 17272 | 368.20 | 3408.69  |

    ...

    +------------+-----+-------+--------+----------+

    ```


    总而言之，它有效，甚至可以说效果很好。很容易确认 `total` 列正在准确地维护一个运行总计，并且当 `salesperson_id` 变化时，计数会重新开始。


    但我们获取总计的过程是**笨拙**的。如果这是一个纸质账本，我们不会不断地重新添加之前的所有内容；我们只会将新值加到旧总计上。


    此外，我们查询所做的所有加法和重新加法意味着我们不断地出去获取新的行组来求和。所有这些获取和重新获取都需要时间。索引可以提供帮助，尤其是在大表上，但使用像这样的子查询似乎不是解决我们最初显示运行总计任务的正确方法。


    **窗口函数**可以更好地完成这项工作，而且它以一种更**自然的方式**来做。首先，就像我们之前为员工编号的窗口函数示例一样，我们需要在 `OVER` 子句中同时使用
    `<partition_definition>` 和 `<order_definition>` 部分。我们将 `PARTITION BY salesperson_id`
    并 `ORDER BY commission_date` 来匹配查询的最终 `ORDER BY` 子句。


    然后，我们需要告诉窗口函数为我们的 `total` 列将哪些行加在一起。聚合窗口函数（如 `SUM`）可以使用移动窗口框架来快速识别需要处理的数据。为此，我们将使用一个从结果集开始（即
    `UNBOUNDED PRECEDING`）到 `CURRENT ROW` 的 `<frame_definition>`，所以我们完整的 `<frame_definition>`
    部分将是：

    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    为了将所有这些整合到位，我们采用之前的查询，并将子查询部分替换为我们的 `SUM` 窗口函数，如下所示：

    ```sql

    SELECT

    commission_date AS date, salesperson_id as sp,

    commission_id as id, commission_amount as amount,

    SUM(commission_amount)

    OVER (

    PARTITION BY salesperson_id

    ORDER BY commission_date

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS total

    FROM commissions AS c1

    ORDER BY sp,date;

    ```


    此查询的结果与我们看到的子查询版本相同，因此无需再次显示。


    当这个查询运行时，在第一行，窗口框架只有第一行。随着查询继续，框架会扩展，并且与子查询不同，它不需要重新获取任何数据；它只查看已经存在的数据。然后，当框架跨越我们的分区边界时，它会重置为仅当前行并再次开始增长。与子查询发生的成百上千次往返数据库获取信息不同，窗口函数只需要进行一次遍历。


    这种性能差异非常显著，甚至在相对较小的 `commissions` 表上也能看出来。在我的笔记本电脑上，处理表中全部的 3000 多行，运行自连接版本的查询需要
    `2.56` 秒。与此形成对比的是，窗口函数版本**瞬间**完成。两秒半不算多，但随着表大小的增加，窗口函数的速度优势会不断增长。一位 MariaDB 工程师在类似但大得多的表上使用类似的查询进行了一些测试。表
    5-1 显示了结果。所有时间均以秒为单位。


    **表 5-1. 窗口函数与自连接**


    | 表中的行数 | 自连接 | 带索引的自连接 | 窗口函数 |

    | --- | --- | --- | --- |

    | 10,000 | 0.29 | 0.01 | 0.02 |

    | 100,000 | 2.91 | 0.09 | 0.16 |

    | 1,000,000 | 29.10 | 2.86 | 3.04 |

    | 10,000,000 | 346.30 | 90.97 | 43.17 |

    | 100,000,000 | 4357.20 | 813.20 | 514.24 |


    在没有表索引的情况下，窗口函数版本的查询总是比自连接版本快一个数量级。在表有索引的情况下，自连接版本的查询在一段时间内能跟上窗口函数版本的速度，但在表行数超过一百万后，窗口函数开始领先，速度几乎是自连接的两倍。


    注意'
- fmt: '# Window Functions


    Window Functions, because of how they operate, don’t use indexes at all. They
    don’t even look for them. This can be considered a side benefit to using Window
    Functions. If you can eliminate expensive self-joins and subqueries by using Window
    Functions, you may not need to go through the time, effort, and overhead of creating
    and maintaining indexes.


    ## Ranking Rows in a Result Set


    Another common analytical query is to find the top N numbers of something, be
    it the top five selling items, the top ten salaries, or the top three scorers
    in the youth basketball league.


    Using our `commissions` table again, it is trivial to use SQL to find the top
    five commissions earned. One way to do it is with the following SQL (with `LIMIT
    5` to keep the output small):


    ```sql

    SELECT

    id, salesperson_id AS sid,

    commission_id AS cid,

    commission_amount AS amount,

    commission_date AS date

    FROM commissions

    ORDER BY commission_amount DESC

    LIMIT 5;

    ```


    The result of this query looks like this:


    ```

    +------+-----+-------+--------+------------+

    | id   | sid | cid   | amount | date       |

    +------+-----+-------+--------+------------+

    | 2897 | 121 | 17970 | 499.97 | 2017-11-03 |

    | 2269 | 105 | 17340 | 499.90 | 2017-06-15 |

    | 1916 | 131 | 16987 | 499.55 | 2017-03-22 |

    | 2680 |  66 | 17756 | 499.43 | 2017-09-18 |

    | 1610 |  40 | 16688 | 499.41 | 2017-01-16 |

    +------+-----+-------+--------+------------+

    ```


    We could improve upon this by doing a `JOIN` with the `employees` table to display
    the name of the employee and their office alongside the commission amount. The
    following SQL does just that:


    ```sql

    SELECT

    commissions.commission_date AS date,

    commissions.commission_id AS cid,

    employees.name AS salesperson,

    employees.office AS office,

    commissions.commission_amount AS amount

    FROM commissions LEFT JOIN employees

    ON (commissions.salesperson_id = employees.id)

    ORDER BY amount DESC

    LIMIT 5;

    ```


    The result looks like the following:


    ```

    +------------+-------+-----------------+-----------+--------+

    | date       | cid   | salesperson     | office    | amount |

    +------------+-------+-----------------+-----------+--------+

    | 2017-11-03 | 17970 | Christina Terry | Wichita   | 499.97 |

    | 2017-06-15 | 17340 | Alonzo Page     | Cleveland | 499.90 |

    | 2017-03-22 | 16987 | Rene Gibbs      | Dallas    | 499.55 |

    | 2017-09-18 | 17756 | Kathryn Barnes  | Dallas    | 499.43 |

    | 2017-01-16 | 16688 | Joyce Beck      | Memphis   | 499.41 |

    +------------+-------+-----------------+-----------+--------+

    ```


    This is all well and good, and we now know who received the top commissions company-wide,
    but what if we want to find out the top two commissions from each office? It seems
    like a reasonable extension of the previous query, but it causes the complexity
    of our query to jump by quite a bit. There are probably other ways to do this,
    but here’s a query that does it:


    ```sql

    SELECT * FROM (

    SELECT

    commissions.commission_date AS date,

    commissions.commission_id AS cid,

    employees.name AS salesperson,

    employees.office AS office,

    commissions.commission_amount AS amount

    FROM commissions LEFT JOIN employees

    ON (commissions.salesperson_id = employees.id)

    ) AS c1

    WHERE (

    SELECT count(c2.amount)

    FROM (

    SELECT

    commissions.commission_id AS cid,

    commissions.salesperson_id AS sp_id,

    employees.office AS office,

    commissions.commission_amount AS amount

    FROM commissions LEFT JOIN employees

    ON (commissions.salesperson_id = employees.id)

    ) AS c2

    WHERE

    c1.cid != c2.cid

    AND

    c1.office = c2.office

    AND

    c2.amount > c1.amount) < 2

    ORDER BY office,amount desc;

    ```


    There’s a lot going on here, but basically we have our original query, some derived
    tables, and a subquery in our `WHERE` clause that uses the `COUNT` function to
    count the number of commissions in the `commissions` table that are from the same
    office `AND` where the commission amount is greater than the current row, and
    then limits those results to the top two. That probably stretches the definition
    of the word basically a bit too far. It’s quite frankly a bit of a mess, and it’s
    hard for mere humans to read and parse it. On the positive side, it does work.
    The result of this convoluted query is as follows:


    ```

    +------------+-------+------------------+-------------+--------+

    | date       | cid   | salesperson      | office      | amount |

    +------------+-------+------------------+-------------+--------+

    | 2017-09-22 | 17776 | Jack Green       | Chicago     | 497.83 |

    | 2017-05-12 | 17215 | Deborah Peterson | Chicago     | 497.29 |

    | 2017-06-15 | 17340 | Alonzo Page      | Cleveland   | 499.90 |

    | 2017-05-25 | 17261 | Alonzo Page      | Cleveland   | 499.29 |

    | 2017-03-22 | 16987 | Rene Gibbs       | Dallas      | 499.55 |

    | 2017-09-18 | 17756 | Kathryn Barnes   | Dallas      | 499.43 |

    | 2017-01-16 | 16688 | Joyce Beck       | Memphis     | 499.41 |

    | 2017-03-02 | 16890 | Tammy Castro     | Memphis     | 497.58 |

    | 2017-12-11 | 18116 | Terrance Reese   | Minneapolis | 499.31 |

    | 2017-04-05 | 17047 | Ruby Boyd        | Minneapolis | 495.98 |

    | 2017-08-30 | 17674 | Dorothy Anderson | Nauvoo      | 497.91 |

    | 2017-12-11 | 18115 | Dorothy Anderson | Nauvoo      | 468.99 |

    | 2017-01-20 | 16706 | John Conner      | Raleigh     | 499.33 |

    | 2016-08-26 | 16082 | Randal Hogan     | Raleigh     | 499.07 |

    | 2017-11-03 | 17970 | Christina Terry  | Wichita     | 499.97 |

    | 2016-10-31 | 16345 | Christina Terry  | Wichita     | 497.83 |

    +------------+-------+------------------+-------------+--------+

    ```


    Apart from the aforementioned readability issues, the primary downside to this
    query is that it is slow, especially if there are no indexes on the table. On
    my laptop, for example, this query takes over ten seconds to run. And even if
    there were indexes in place, there would be the overhead of creating and maintaining
    the indexes, which could be problematic if our tables are updated frequently.


    A much better and faster way to get at the result we’re after is to use Window
    Functions, specifically the `RANK` function. To start things off, we can simply
    take our original query with the `JOIN` and add the `RANK` function to it.


    Because we want to find out the top two commissions per office, inside the `OVER`
    clause we will `ORDER BY` the `commission_amount` column from the `commissions`
    table and `PARTITION BY` the `office` column from the `employees` table. We’ll
    call the result of the `RANK` function `rnk`, to keep things simple.


    Lastly, to get the ordering correct, we’ll `ORDER BY office` and our new `rnk`
    column.


    Putting all of that together, we end up with some SQL that looks like the following:


    ```sql

    SELECT

    RANK() OVER (

    PARTITION BY employees.office

    ORDER BY commissions.commission_amount DESC

    ) AS rnk,

    commissions.commission_date AS date,

    commissions.commission_id AS cid,

    employees.name AS salesperson,

    employees.office AS office,

    commissions.commission_amount AS amount

    FROM commissions LEFT JOIN employees

    ON (commissions.salesperson_id = employees.id)

    ORDER BY office,rnk;

    ```


    I’ve removed the `LIMIT` from this query, so it will output every row in the `commissions`
    table, which isn’t what we want, but by showing everything we can verify that
    each row is ranked and partitioned by office correctly. So, we’re close.


    Here’s what the first few rows of the output look like:'
