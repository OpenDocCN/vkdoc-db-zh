    ## 分析水果销售


    本章剩余部分将聚焦于一家名为 FruitMart 的虚构水果公司。该公司在美国北卡罗来纳州拥有十家门店，销售五种不同的水果。我们的任务是分析销售数据，以便有效地运营业务。


    ### 单店内的水果销售


    一项非常有用的分析是比较水果销售额按月的变化情况。`LEAD` 和 `LAG` 函数让我们可以直接将一个值与下个月及上个月的销售额进行比较。


    借鉴之前的例子，我们将定义一个包含 `PARTITION BY` 和 `ORDER BY` 子句的 `WINDOW` 子句。在这个例子中，我们只对将特定门店的销售与同一门店的销售进行比较感兴趣，因此我们将按门店分区
    `PARTITION BY store`。我们还将水果加入分区条件，以免将苹果与橙子进行比较（抱歉，我忍不住开了个玩笑）。


    接下来，我们将同时按 `store` 和 `month` 进行排序 `ORDER BY`，以保持输出合理。在最终的 `ORDER BY` 子句中，我们会改为按
    `fruit, store` 排序。这样做的效果是让我们先看到所有门店的苹果销售结果，然后是所有香蕉的结果，依此类推。


    遗憾的是，完整的输出相当庞大，因此为了保持输出简洁，我们将添加一个 `WHERE` 子句，将查询限制在单个门店 `Durham` 和单一水果 `oranges`。


    以下是我们完成的查询：


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)  OVER w1 AS prev,

    LEAD(sold) OVER w1 AS next

    FROM fruitmart

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    WINDOW w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    )

    ORDER BY fruit,store;

    ```


    图 [6-7](#A454556_1_En_6_Chapter.html#Fig7) 显示了输出结果。


    ![A454556_1_En_6_Fig7_HTML.jpg](A454556_1_En_6_Fig7_HTML.jpg)

    图 6-7.

    Durham 门店售出的橙子


    第一列 `prev` 为 NULL，因为 `LAG` 函数没有更早的条目可供查看。最后一列 `next` 的情况也是如此，因为没有更多的条目可供 `LEAD`
    函数查看。


    如果我们想查看所有门店的完整结果，只需从查询中删除以下两行并重新运行即可：


    ```

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    ```


    像这样按时间顺序查看结果很有用，但你可能想知道其意义何在；毕竟，`prev` 和 `next` 的值只需查看前一行和后一行就能轻易看到。


    将它们放在同一行在排名销售时非常方便。我们可以在查询中添加 `RANK` 函数，然后在最终的 `ORDER BY` 子句中按排名排序。它需要一个稍有不同的
    `OVER` 子句，因此我们不会使用另外两个窗口函数所使用的 `w1 WINDOW`。相反，我们将定义一个 `w2 WINDOW` 来与之搭配使用。


    同时，我们可以扩展新的 `w2 WINDOW` 来创建一个 `w3 WINDOW`，用于获取特定门店特定水果的平均销售额。


    以下是完整的查询：


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)       OVER w1  AS prev,

    LEAD(sold)      OVER w1  AS next,

    ROUND(AVG(sold) OVER w3) AS avg,

    RANK()          OVER w2  AS rnk

    FROM fruitmart

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    WINDOW

    w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    ),

    w2 AS (

    PARTITION BY fruit,store

    ORDER BY sold DESC

    ),

    w3 AS (w2

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY fruit,store,rnk;

    ```


    图 [6-8](#A454556_1_En_6_Chapter.html#Fig8) 所示的结果显然比之前更有趣。


    ![A454556_1_En_6_Fig8_HTML.jpg](A454556_1_En_6_Fig8_HTML.jpg)

    图 6-8.

    包含平均值和排名的 Durham 门店橙子销售情况


    首先，我们的最高销售额是 6 月份的 930，但得益于 `prev` 和 `next` 列，我们可以看到这并非一个更广泛趋势的一部分；事实上，在上个月，我们在
    Durham 的橙子销售额是全年最低的 16，而在下个月，销售额几乎正好下降到了我们的平均销售水平 323。


    同样值得探究的是，为什么我们销售额最低的三个月之前都是低于平均水平的月份。


    与之前的查询一样，我们可以移除 `WHERE` 子句来查看所有门店所有水果的销售结果，或者简单地修改它以选择不同的门店和/或水果。


    ### 比较所有门店间的水果销售


    分析单店销售表现固然很好，但进行额外的分析来比较所有门店的情况也很有用。


    将我们的查询改为比较所有门店的水果销售额所需的变化实际上非常小。


    首先，我们需要让 `rnk` 列的应用范围覆盖特定水果在所有门店的数据。这可以通过简单地从 `w2 WINDOW` 的 `PARTITION BY` 子句中移除
    `store` 来实现。


    对 `w2` 做出更改后，我们的 `avg` 列现在将计算特定水果所有销售的平均值。但可能仍然需要列出门店销售平均值。为此，我们将定义一个新的 `WINDOW`，即
    `w4`，它重新创建了之前 `w2` + `w3` 组合的功能。我们将这个新列称为门店平均值 `s_avg`，并且为了清晰起见，我们应该将 `avg` 列改为所有平均值
    `a_avg`。


    最后一个改动是从最终的 `ORDER BY` 子句中移除 `store`。这只是为了让排名正确对齐。


    以下是查询：


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)       OVER w1  AS prev,

    LEAD(sold)      OVER w1  AS next,

    ROUND(AVG(sold) OVER w4) AS s_avg,

    ROUND(AVG(sold) OVER w3) AS a_avg,

    RANK()          OVER w2  AS rnk

    FROM fruitmart

    WHERE fruit = ''oranges''

    WINDOW

    w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    ),

    w2 AS (

    PARTITION BY fruit

    ORDER BY sold DESC

    ),

    w3 AS (w2

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),

    w4 AS (

    PARTITION BY fruit,store

    ORDER BY sold DESC

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY fruit,rnk;

    ```


    和之前一样，`WHERE` 子句可以被移除以显示所有水果。它在我们的查询中只是为了减少输出量。当然，既然我们现在是查看所有门店的橙子，输出量比之前多了十倍，但图
    [6-9](#A454556_1_En_6_Chapter.html#Fig9) 展示了结果的前五行和后五行。


    ![A454556_1_En_6_Fig9_HTML.jpg](A454556_1_En_6_Fig9_HTML.jpg)

    图 6-9.

    所有门店的橙子销售情况


    从我们的结果中，有一件非常奇怪但可能有用的事情是，销售额最低的三个月都发生在五月。但五月也是 Kinston 门店年度销售额最高的时候。这是怎么发生的？是运输问题吗？Kinston
    有什么因素吸引了橙子远离其他门店？还是其他原因？这绝对值得调查。


    ## 总结


    在本章中，我们探讨了一些在现实世界中使用窗口函数的示例。我们在单个查询中使用了多个窗口函数，在处理大量数据时绘制了结果图，然后使用窗口函数在一家虚构的水果公司中以各种方式分析销售情况。下一章，我们将通过结合使用
    CTEs 和窗口函数，把本书的前半部分和后半部分联系起来。


    # 7. 结合使用窗口函数和 CTEs


    窗口函数和 CTEs 单独使用时就很棒，但结合使用时也非常有用。本章将通过一些示例来演示如何将窗口函数和 CTEs 结合使用。我们将从一个简单的降雨数据平均值计算开始，然后转向如何结合使用
    CTEs 和窗口函数来修复一个常见的模式问题。最后，我们将使用它们对降雨数据进行更深入的分析，以找出数据集中的缺口和岛屿。'
  raw: 'Being able to efficiently analyze time-series data like this is becoming more
    important with the rise of the Internet of Things. More and more sensors, all
    collecting their various bits of data, surround us every day. Aggregate Window
    Functions like `AVG` provide new tools to help analyze and work with this data.


    ## Analyzing Fruit Sales


    The rest of this chapter will focus on an imaginary fruit company named FruitMart.
    The company has ten stores scattered around North Carolina, USA, and they sell
    five different kinds of fruit. Our task is to analyze the sales data so we can
    effectively run the business.


    ### Fruit Sales Within a Single Store


    One very useful bit of analysis to perform is to compare how fruit sales change
    from month to month. The `LEAD` and `LAG` functions let us compare a value to
    the next and previous months’ sales directly.


    Learning from previous examples, we’ll define a `WINDOW` clause that contains
    our `PARTITION BY` and `ORDER BY` clauses. For this example, we’re only interested
    in comparing sales in a given store to sales in the same store, so we’ll `PARTITION
    BY store`. We’ll also add fruit to the partition so that we don’t compare apples
    to oranges (sorry, I couldn’t resist).


    Next, we’ll `ORDER BY` both `store` and `month` to keep our output sane. In our
    final `ORDER BY` clause we’ll switch this up and `ORDER BY fruit,store`. This
    has the effect of showing us all of the apples results for all stores, then all
    of the bananas, and so on.


    Unfortunately, the complete output is quite large, so to keep the output brief
    we’ll add a `WHERE` clause that restricts our query to a single store, `Durham`,
    and a single fruit, `oranges`.


    Here’s our completed query:


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)  OVER w1 AS prev,

    LEAD(sold) OVER w1 AS next

    FROM fruitmart

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    WINDOW w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    )

    ORDER BY fruit,store;

    ```


    Figure [6-7](#A454556_1_En_6_Chapter.html#Fig7) shows the output.


    ![A454556_1_En_6_Fig7_HTML.jpg](A454556_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Oranges sold from the Durham store


    The first `prev` column is NULL because there are no previous entries for the
    `LAG` function to view. The same is true for the last `next` column, where there
    are no additional entries for the `LEAD` column.


    If we want to view the complete results for all stores, we just need to remove
    the following two lines from the query and rerun it:


    ```

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    ```


    Viewing our results chronologically like this is useful, but you may wonder what
    the point is; after all, the `prev` and `next` values can be easily seen by just
    looking at the previous and next rows.


    Having them on one line comes in handy when ranking sales. We can add the `RANK`
    function to our query and then sort by the rank in our final `ORDER BY` clause.
    It needs a slightly different `OVER` clause, so we won’t use the `w1 WINDOW` the
    other two Window Functions use. Instead, we’ll define a `w2 WINDOW` to use with
    it.


    While we’re at it, we can extend the new `w2 WINDOW` to create a `w3 WINDOW` we
    can use to get the average sales for a given fruit at a given store.


    Here’s the full query:


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)       OVER w1  AS prev,

    LEAD(sold)      OVER w1  AS next,

    ROUND(AVG(sold) OVER w3) AS avg,

    RANK()          OVER w2  AS rnk

    FROM fruitmart

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    WINDOW

    w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    ),

    w2 AS (

    PARTITION BY fruit,store

    ORDER BY sold DESC

    ),

    w3 AS (w2

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY fruit,store,rnk;

    ```


    The results, shown in Figure [6-8](#A454556_1_En_6_Chapter.html#Fig8), are obviously
    more interesting than before.


    ![A454556_1_En_6_Fig8_HTML.jpg](A454556_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Oranges sold from the Durham store with averages and ranks


    For starters, our highest sales were 930 in June, but thanks to the `prev` and
    `next` columns we can see that it wasn’t really part of a broader trend; in fact,
    in the previous month we had our lowest sales of the year for oranges in Durham,
    16, and in the following month we dropped down almost exactly to our average number
    of sales, 323.


    It might also be worth investigating why our three lowest months were all preceded
    by lower-than-average months.


    As with the previous query, we can remove the `WHERE` clause to look at the results
    for all fruit sales at all of our stores, or simply modify it to select a different
    store and/or fruit.


    ### Comparing Fruit Sales Across All Stores


    Analyzing a single store’s sales performance is good, but it would also be useful
    to do additional analysis comparing all our stores.


    The changes needed to alter our query to compare fruit sales from all stores are
    actually quite minimal.


    First, we need to have the `rnk` column apply across a given fruit for all stores.
    This can be done by simply removing `store` from the `PARTITION BY` clause in
    the `w2 WINDOW`.


    With the change to `w2` in place, our `avg` column will now compute the average
    for all sales of a given fruit. But it might be useful to still list the store
    sales average. For that we will define a new `WINDOW`, `w4`, which re-creates
    what the `w2` + `w3` combination used to be. We’ll call this new column `s_avg`
    for store average, and for good measure we should change the `avg` column to `a_avg`
    for all average.


    The last change is to remove `store` from the final `ORDER BY` clause. This is
    just to get the rankings to line up properly.


    Here’s the query:


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)       OVER w1  AS prev,

    LEAD(sold)      OVER w1  AS next,

    ROUND(AVG(sold) OVER w4) AS s_avg,

    ROUND(AVG(sold) OVER w3) AS a_avg,

    RANK()          OVER w2  AS rnk

    FROM fruitmart

    WHERE fruit = ''oranges''

    WINDOW

    w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    ),

    w2 AS (

    PARTITION BY fruit

    ORDER BY sold DESC

    ),

    w3 AS (w2

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),

    w4 AS (

    PARTITION BY fruit,store

    ORDER BY sold DESC

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY fruit,rnk;

    ```


    As before, the `WHERE` clause can be removed to show all fruits. It’s just in
    our query to lessen the amount of output. Of course, now that we’re looking at
    oranges across all stores, there’s ten times more output than before, but Figure
    [6-9](#A454556_1_En_6_Chapter.html#Fig9) shows the first five and last five rows
    of the result.


    ![A454556_1_En_6_Fig9_HTML.jpg](A454556_1_En_6_Fig9_HTML.jpg)


    Figure 6-9.


    Orange sales from all stores


    One very odd but potentially useful thing from our results is that the bottom
    three sales months are all from May. But May was also when Kinston had its highest
    sales of the year. How did this happen? Were there shipping issues? Something
    in Kinston that pulled oranges away from the other stores? Something else? Definitely
    something to investigate.


    ## Summary


    In this chapter, we explored some examples of using Window Functions in the real
    world. We used multiple Window Functions in a single query, plotted results for
    when we are dealing with lots of data, and then used Window Functions to analyze
    sales in various ways at a fictional fruit company. For the next chapter, we’ll
    tie the first and second half of the book together by using both CTEs and Window
    Functions together.


    # 7. Combining Window Functions and CTEs


    Window Functions and CTEs are great in isolation, but they can also be very useful
    together. This chapter will walk through some examples that demonstrate how Window
    Functions and CTEs can be used together. We’ll start with a simple averaging of
    rainfall data, then move on to how to use CTEs and Window Functions together to
    fix a common schema issue. Lastly, we’ll use them to do some deeper analysis on
    our rainfall data to find gaps and islands in our data set.'
  trans: '

    随着物联网的兴起，能够高效地分析这类时序数据正变得越来越重要。越来越多的传感器每天都在收集各种各样的数据，环绕在我们周围。诸如 `AVG` 之类的聚合窗口函数提供了新的工具，帮助我们分析和处理这些数据。


    ## 分析水果销售


    本章剩余部分将聚焦于一家名为 FruitMart 的虚构水果公司。该公司在美国北卡罗来纳州拥有十家门店，销售五种不同的水果。我们的任务是分析销售数据，以便有效地运营业务。


    ### 单店内的水果销售


    一项非常有用的分析是比较水果销售额按月的变化情况。`LEAD` 和 `LAG` 函数让我们可以直接将一个值与下个月及上个月的销售额进行比较。


    借鉴之前的例子，我们将定义一个包含 `PARTITION BY` 和 `ORDER BY` 子句的 `WINDOW` 子句。在这个例子中，我们只对将特定门店的销售与同一门店的销售进行比较感兴趣，因此我们将按门店分区
    `PARTITION BY store`。我们还将水果加入分区条件，以免将苹果与橙子进行比较（抱歉，我忍不住开了个玩笑）。


    接下来，我们将同时按 `store` 和 `month` 进行排序 `ORDER BY`，以保持输出合理。在最终的 `ORDER BY` 子句中，我们会改为按
    `fruit, store` 排序。这样做的效果是让我们先看到所有门店的苹果销售结果，然后是所有香蕉的结果，依此类推。


    遗憾的是，完整的输出相当庞大，因此为了保持输出简洁，我们将添加一个 `WHERE` 子句，将查询限制在单个门店 `Durham` 和单一水果 `oranges`。


    以下是我们完成的查询：


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)  OVER w1 AS prev,

    LEAD(sold) OVER w1 AS next

    FROM fruitmart

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    WINDOW w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    )

    ORDER BY fruit,store;

    ```


    图 6-7 显示了输出结果。


    ![A454556_1_En_6_Fig7_HTML.jpg](img/A454556_1_En_6_Fig7_HTML.jpg)

    图 6-7.

    Durham 门店售出的橙子


    第一列 `prev` 为 NULL，因为 `LAG` 函数没有更早的条目可供查看。最后一列 `next` 的情况也是如此，因为没有更多的条目可供 `LEAD`
    函数查看。


    如果我们想查看所有门店的完整结果，只需从查询中删除以下两行并重新运行即可：


    ```

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    ```


    像这样按时间顺序查看结果很有用，但你可能想知道其意义何在；毕竟，`prev` 和 `next` 的值只需查看前一行和后一行就能轻易看到。


    将它们放在同一行在排名销售时非常方便。我们可以在查询中添加 `RANK` 函数，然后在最终的 `ORDER BY` 子句中按排名排序。它需要一个稍有不同的
    `OVER` 子句，因此我们不会使用另外两个窗口函数所使用的 `w1 WINDOW`。相反，我们将定义一个 `w2 WINDOW` 来与之搭配使用。


    同时，我们可以扩展新的 `w2 WINDOW` 来创建一个 `w3 WINDOW`，用于获取特定门店特定水果的平均销售额。


    以下是完整的查询：


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)       OVER w1  AS prev,

    LEAD(sold)      OVER w1  AS next,

    ROUND(AVG(sold) OVER w3) AS avg,

    RANK()          OVER w2  AS rnk

    FROM fruitmart

    WHERE fruit = ''oranges''

    AND store = ''Durham''

    WINDOW

    w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    ),

    w2 AS (

    PARTITION BY fruit,store

    ORDER BY sold DESC

    ),

    w3 AS (w2

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY fruit,store,rnk;

    ```


    图 6-8 所示的结果显然比之前更有趣。


    ![A454556_1_En_6_Fig8_HTML.jpg](img/A454556_1_En_6_Fig8_HTML.jpg)

    图 6-8.

    包含平均值和排名的 Durham 门店橙子销售情况


    首先，我们的最高销售额是 6 月份的 930，但得益于 `prev` 和 `next` 列，我们可以看到这并非一个更广泛趋势的一部分；事实上，在上个月，我们在
    Durham 的橙子销售额是全年最低的 16，而在下个月，销售额几乎正好下降到了我们的平均销售水平 323。


    同样值得探究的是，为什么我们销售额最低的三个月之前都是低于平均水平的月份。


    与之前的查询一样，我们可以移除 `WHERE` 子句来查看所有门店所有水果的销售结果，或者简单地修改它以选择不同的门店和/或水果。


    ### 比较所有门店间的水果销售


    分析单店销售表现固然很好，但进行额外的分析来比较所有门店的情况也很有用。


    将我们的查询改为比较所有门店的水果销售额所需的变化实际上非常小。


    首先，我们需要让 `rnk` 列的应用范围覆盖特定水果在所有门店的数据。这可以通过简单地从 `w2 WINDOW` 的 `PARTITION BY` 子句中移除
    `store` 来实现。


    对 `w2` 做出更改后，我们的 `avg` 列现在将计算特定水果所有销售的平均值。但可能仍然需要列出门店销售平均值。为此，我们将定义一个新的 `WINDOW`，即
    `w4`，它重新创建了之前 `w2` + `w3` 组合的功能。我们将这个新列称为门店平均值 `s_avg`，并且为了清晰起见，我们应该将 `avg` 列改为所有平均值
    `a_avg`。


    最后一个改动是从最终的 `ORDER BY` 子句中移除 `store`。这只是为了让排名正确对齐。


    以下是查询：


    ```

    SELECT store, month, fruit, sold,

    LAG(sold)       OVER w1  AS prev,

    LEAD(sold)      OVER w1  AS next,

    ROUND(AVG(sold) OVER w4) AS s_avg,

    ROUND(AVG(sold) OVER w3) AS a_avg,

    RANK()          OVER w2  AS rnk

    FROM fruitmart

    WHERE fruit = ''oranges''

    WINDOW

    w1 AS (

    PARTITION BY fruit,store

    ORDER BY store,month

    ),

    w2 AS (

    PARTITION BY fruit

    ORDER BY sold DESC

    ),

    w3 AS (w2

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    ),

    w4 AS (

    PARTITION BY fruit,store

    ORDER BY sold DESC

    ROWS BETWEEN

    UNBOUNDED PRECEDING

    AND

    UNBOUNDED FOLLOWING

    )

    ORDER BY fruit,rnk;

    ```


    和之前一样，`WHERE` 子句可以被移除以显示所有水果。它在我们的查询中只是为了减少输出量。当然，既然我们现在是查看所有门店的橙子，输出量比之前多了十倍，但图
    6-9 展示了结果的前五行和后五行。


    ![A454556_1_En_6_Fig9_HTML.jpg](img/A454556_1_En_6_Fig9_HTML.jpg)

    图 6-9.

    所有门店的橙子销售情况


    从我们的结果中，有一件非常奇怪但可能有用的事情是，销售额最低的三个月都发生在五月。但五月也是 Kinston 门店年度销售额最高的时候。这是怎么发生的？是运输问题吗？Kinston
    有什么因素吸引了橙子远离其他门店？还是其他原因？这绝对值得调查。


    ## 总结


    在本章中，我们探讨了一些在现实世界中使用窗口函数的示例。我们在单个查询中使用了多个窗口函数，在处理大量数据时绘制了结果图，然后使用窗口函数在一家虚构的水果公司中以各种方式分析销售情况。下一章，我们将通过结合使用
    CTEs 和窗口函数，把本书的前半部分和后半部分联系起来。


    # 7. 结合使用窗口函数和 CTEs


    窗口函数和 CTEs 单独使用时就很棒，但结合使用时也非常有用。本章将通过一些示例来演示如何将窗口函数和 CTEs 结合使用。我们将从一个简单的降雨数据平均值计算开始，然后转向如何结合使用
    CTEs 和窗口函数来修复一个常见的模式问题。最后，我们将使用它们对降雨数据进行更深入的分析，以找出数据集中的缺口和岛屿。

