    ```


    现在剩下的唯一任务就是尝试找出如何最好地奖励这些努力工作的销售人员。也许是一张礼品卡？


    ## 总结


    在本章中，我们探讨了在 `OVER` 子句中如何使用 `<partition_definition>`、`<order_definition>` 和 `<frame_definition>`
    部分。我们还看到了 `ROW_NUMBER` 和 `RANK` 窗口函数的实际应用，包括如何解决使用它们以及其他窗口函数时出现的一些常见问题。


    在下一章中，我们将继续探索窗口函数，深入研究如何使用它们来解析和生成真实世界的时间序列温度数据图表，并分析连锁店中的水果销售情况。


