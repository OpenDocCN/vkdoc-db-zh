    does it auto-increment:


    ```

    +-----------+---------+------+-----+---------+-------+

    | Field     | Type    | Null | Key | Default | Extra |

    +-----------+---------+------+-----+---------+-------+

    | precip_id | int(11) | YES  |     | 26      |       |

    | location  | text    | YES  |     | NULL    |       |

    | day       | date    | YES  |     | NULL    |       |

    | precip    | float   | YES  |     | NULL    |       |

    +-----------+---------+------+-----+---------+-------+

    ```


    However, now that every row of our `precip_id` column is a unique number, thanks
    to the `ROW_NUMBER` Window Function, we can issue the `ALTER TABLE` command that
    failed before:


    ```

    ALTER TABLE precip MODIFY COLUMN precip_id SERIAL PRIMARY KEY FIRST;

    ```


    This time, `ALTER TABLE` succeeds, and if we `DESCRIBE precip,` again, we’ll see
    that our `precip_id` column is exactly what we want:


    ```

    +-----------+---------------------+------+-----+---------+----------------+

    | Field     | Type                | Null | Key | Default | Extra          |

    +-----------+---------------------+------+-----+---------+----------------+

    | precip_id | bigint(20) unsigned | NO   | PRI | NULL    | auto_increment |

    | location  | text                | YES  |     | NULL    |                |

    | day       | date                | YES  |     | NULL    |                |

    | precip    | float               | YES  |     | NULL    |                |

    +-----------+---------------------+------+-----+---------+----------------+

    ```


    ## Finding Gaps and Islands


    Serialized and time-based data generally arrives at a pre-determined time, such
    as every time a polling process kicks off. But sometimes there are unexpected
    gaps in the data, or like in the case of weather data such as in our `precip`
    table, gaps are expected. It doesn’t rain every day, after all.


    When analyzing such data, finding these gaps and islands of data can be very useful.'
  trans: '

    ## 添加主键列


    并非所有表都是完美的。甚至可能有人会说，没有表是真正完美的。由于需求更新、维护、错误以及诸多其他原因，表会定期被修改，这是生活中的常态。


    假设在你外出度假时，收到一个请求：需要在 `precip` 表中添加一个 `precip_id` 列。但一位初级数据库管理员（DBA）并非将其添加为自增主键，而是不知出于何种原因，将其添加为一个
    `INT` 类型，并赋予了十六进制数 `1a` 作为默认值。这位初级 DBA 执行的代码如下：


    ```sql

    ALTER TABLE precip

    ADD COLUMN precip_id INT DEFAULT 0x1a FIRST;

    ```


    由于这是一个新列，当 `ALTER TABLE` 语句执行后，`precip_id` 列在每一行都被赋值为 26（即十六进制 `1a` 对应的十进制数）。一段时间后，你发现了这个错误，现在的任务就是修复这个烂摊子，`ALTER`
    `precip` 表，使 `precip_id` 列成为原本应有的自增主键。


    我们可能会尝试执行以下操作：


    ```sql

    ALTER TABLE precip

    MODIFY COLUMN precip_id SERIAL PRIMARY KEY FIRST;

    ```


    但是，由于每一行的 `precip_id` 列都已经有了值，我们将得到如下错误，而非预期结果：


    ```text

    ERROR 1062 (23000): ALTER TABLE causes auto_increment resequencing, resulting
    in duplicate entry ''26'' for key ''PRIMARY''

    ```


    另一个选项是删除或重命名当前的 `precip_id` 列，然后使用正确的定义重新添加它。为了本示例的讨论，我们假设这个方案不可行。


    那么，我们该怎么办？得益于**窗口函数**和**公共表表达式**，我们有第三种可用的方案。其思路是将一个公共表表达式与 `ROW_NUMBER()` 窗口函数结合，生成一个看起来像我们希望
    `precip` 表最终样子的表。然后，我们使用这个由 CTE 派生的表作为更新实际 `precip` 表的数据源。


    遗憾的是，这个技巧目前仅在 MySQL 上有效，但 MariaDB 的开发者们可能很快也会为其增加支持。


    我们首先定义 `<cte_body>`。这将是一个简单的 `SELECT` 语句，按 `day` 列排序，并使用 `ROW_NUMBER()` 窗口函数为输出的每一行分配一个唯一的编号。代码如下：


    ```sql

    SELECT

    ROW_NUMBER() OVER(

    ORDER BY day

    ) AS rnum,

    location, day, precip

    FROM precip

    ORDER BY day;

    ```


    当单独运行此查询时，其输出的前几行如下所示：


    ```text

    +------+------------+------------+--------+

    | rnum | location   | day        | precip |

    +------+------------+------------+--------+

    |    1 | Asheville  | 1976-01-03 |    0.2 |

    |    2 | Wilmington | 1976-01-03 |   0.01 |

    |    3 | Raleigh    | 1976-01-03 |   0.09 |

    |    4 | Wilmington | 1976-01-04 |   0.11 |

    |    5 | Asheville  | 1976-01-07 |   0.36 |

    |    6 | Wilmington | 1976-01-07 |   0.07 |

    |    7 | Raleigh    | 1976-01-07 |   0.47 |

    |    8 | Wilmington | 1976-01-08 |   0.16 |

    |    9 | Raleigh    | 1976-01-08 |    0.1 |

    |   10 | Wilmington | 1976-01-11 |   0.01 |

    ...

    +------+------------+------------+--------+

    ```


    对于 `<cte_name>`，我们使用 `precip_update`，因此我们将 `<cte_body>` 包裹在 `WITH precip_update
    AS` 子句中。


    现在我们进入 `<cte_query>` 部分。与之前 CTE 示例中使用 `SELECT` 语句不同，这次我们将使用 `UPDATE` 语句。在此语句中，我们首先需要引用我们的
    CTE 和原始的 `precip` 表。然后，在两张表的 `location` 和 `day` 均匹配的地方，我们将 `precip.precip_id`
    设置为 `precip_update.rnum` 的值。


    最终代码如下所示：


    ```sql

    WITH precip_update AS (

    SELECT

    ROW_NUMBER() OVER(

    ORDER BY day

    ) AS rnum,

    location, day, precip

    FROM precip

    ORDER BY day

    )

    UPDATE precip, precip_update

    SET precip.precip_id = precip_update.rnum

    WHERE

    precip.location = precip_update.location

    AND

    precip.day = precip_update.day;

    ```


    与通常的 `UPDATE` 命令一样，输出只会告诉我们匹配并更改了多少行，以及是否有任何警告。


    注意


    如果您尝试使用图形化客户端（如 MySQL Workbench）运行此查询，可能会遇到关于启用了安全更新模式的错误。如果发生这种情况，请改用命令行 `mysql`
    客户端，或在“首选项 > SQL 编辑器”中禁用安全模式并重新连接。


    要查看更改结果，我们可以执行一个简单的 `SELECT`：


    ```sql

    SELECT * FROM precip ORDER BY precip_id;

    ```


    输出的前几行如下所示：


    ```text

    +-----------+------------+------------+--------+

    | precip_id | location   | day        | precip |

    +-----------+------------+------------+--------+

    |         1 | Asheville  | 1976-01-03 |    0.2 |

    |         2 | Wilmington | 1976-01-03 |   0.01 |

    |         3 | Raleigh    | 1976-01-03 |   0.09 |

    |         4 | Wilmington | 1976-01-04 |   0.11 |

    |         5 | Asheville  | 1976-01-07 |   0.36 |

    |         6 | Wilmington | 1976-01-07 |   0.07 |

    |         7 | Raleigh    | 1976-01-07 |   0.47 |

    |         8 | Wilmington | 1976-01-08 |   0.16 |

    |         9 | Raleigh    | 1976-01-08 |    0.1 |

    |        10 | Wilmington | 1976-01-11 |   0.01 |

    ...

    +-----------+------------+------------+--------+

    ```


    我们还没有完成，但最后一步非常简单。如果我们执行 `DESCRIBE precip;`，会看到 `precip_id` 列仍然不是主键，也不能自动递增：


    ```text

    +-----------+---------+------+-----+---------+-------+

    | Field     | Type    | Null | Key | Default | Extra |

    +-----------+---------+------+-----+---------+-------+

    | precip_id | int(11) | YES  |     | 26      |       |

    | location  | text    | YES  |     | NULL    |       |

    | day       | date    | YES  |     | NULL    |       |

    | precip    | float   | YES  |     | NULL    |       |

    +-----------+---------+------+-----+---------+-------+

    ```


    然而，现在，多亏了 `ROW_NUMBER()` 窗口函数，我们 `precip_id` 列的每一行都是一个唯一的数字。这时，我们可以执行之前失败的那个 `ALTER
    TABLE` 命令：


    ```sql

    ALTER TABLE precip MODIFY COLUMN precip_id SERIAL PRIMARY KEY FIRST;

    ```


    这一次，`ALTER TABLE` 成功了。如果我们再次 `DESCRIBE precip;`，会看到 `precip_id` 列已经完全符合我们的要求：


    ```text

    +-----------+---------------------+------+-----+---------+----------------+

    | Field     | Type                | Null | Key | Default | Extra          |

    +-----------+---------------------+------+-----+---------+----------------+

    | precip_id | bigint(20) unsigned | NO   | PRI | NULL    | auto_increment |

    | location  | text                | YES  |     | NULL    |                |

    | day       | date                | YES  |     | NULL    |                |

    | precip    | float               | YES  |     | NULL    |                |

    +-----------+---------------------+------+-----+---------+----------------+

    ```


    ## 寻找数据缺口与连续段


    序列化数据和基于时间的数据通常在预定的时间到达，例如每次轮询进程启动时。但有时数据中会出现意外的缺口，或者像我们 `precip` 表中的天气数据那样，缺口是预料之中的。毕竟，并不是每天都下雨。


    在分析此类数据时，找到这些数据的缺口和连续段会非常有用。

    '
- fmt: '### Gaps


    要找出数据中的间隙，我们基本上需要查看那些预期时间间隔被跳过的情况。以`precip`表为例，预期间隔是一天。每天，如果有降水记录，就会向表中添加一行。


    `LEAD`窗口函数非常适合查看给定行并找出下一行的内容，因此将该函数包含在我们的`<cte_body>`中是合理的。我们还应该包含其他元素，例如使用`DAYOFYEAR`函数来简化计算，从而获得当前日期的列。同样，我们需要使用`LEAD`函数嵌套在`DAYOFYEAR`函数中来获得序列中下一个日期的正确数值。最后，我们应该选择基本的列，以便看到实际的日期。


    这是我们的`<cte_body>`查询：


    ```

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WHERE location=''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    );

    ```


    以下是查询结果的前几行：


    ```

    +----------+------------+---------+------------+------+

    | location | day        | current | day_next   | next |

    +----------+------------+---------+------------+------+

    | Raleigh  | 1976-01-03 |       3 | 1976-01-07 |    7 |

    | Raleigh  | 1976-01-07 |       7 | 1976-01-08 |    8 |

    | Raleigh  | 1976-01-08 |       8 | 1976-01-11 |   11 |

    | Raleigh  | 1976-01-11 |      11 | 1976-01-14 |   14 |

    | Raleigh  | 1976-01-14 |      14 | 1976-01-16 |   16 |

    | Raleigh  | 1976-01-16 |      16 | 1976-01-17 |   17 |

    | Raleigh  | 1976-01-17 |      17 | 1976-01-26 |   26 |

    | Raleigh  | 1976-01-26 |      26 | 1976-01-27 |   27 |

    | Raleigh  | 1976-01-27 |      27 | 1976-02-01 |   32 |

    | Raleigh  | 1976-02-01 |      32 | 1976-02-02 |   33 |

    ...

    +----------+------------+---------+------------+------+

    ```


    接下来是`<cte_query>`部分，我们保持简单，先选择基本列，然后对`current`和`next`列进行一些简单的数学计算来定义间隙所在的位置。间隙的开始是`current`加一，间隙的结束是`next`减一。


    等于1的间隙并不有趣，因为它们并不是真正的间隙。间隙为1表示数据是连续的——这不是我们在此寻找的。因此，我们需要确保间隙大于1。


    这是我们完成后的 Gaps CTE：


    ```

    WITH gaps AS (

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    )

    SELECT

    location,day,day_next,

    current + 1 AS gap_start,

    next - 1 AS gap_end

    FROM gaps

    WHERE

    next - current > 1

    AND

    location = ''Raleigh''

    ORDER BY day;

    ```


    查询结果的前几行如下：


    ```

    +----------+------------+------------+-----------+---------+

    | location | day        | day_next   | gap_start | gap_end |

    +----------+------------+------------+-----------+---------+

    | Raleigh  | 1976-01-03 | 1976-01-07 |         4 |       6 |

    | Raleigh  | 1976-01-08 | 1976-01-11 |         9 |      10 |

    | Raleigh  | 1976-01-11 | 1976-01-14 |        12 |      13 |

    | Raleigh  | 1976-01-14 | 1976-01-16 |        15 |      15 |

    | Raleigh  | 1976-01-17 | 1976-01-26 |        18 |      25 |

    | Raleigh  | 1976-01-27 | 1976-02-01 |        28 |      31 |

    | Raleigh  | 1976-02-02 | 1976-02-06 |        34 |      36 |

    | Raleigh  | 1976-02-06 | 1976-02-14 |        38 |      44 |

    | Raleigh  | 1976-02-14 | 1976-02-18 |        46 |      48 |

    | Raleigh  | 1976-02-18 | 1976-02-22 |        50 |      52 |

    ...

    +----------+------------+------------+-----------+---------+

    ```


    我们其实并不需要`gap_start`和`gap_end`列，因为我们真正感兴趣的是间隙的大小。在我们的例子中，由于表中的每一行都代表那天有降水，一个间隙就代表没有降水的天数。因此，我们应该修改查询，去掉开始和结束列，改为计算间隙的大小。


    大小等于以下表达式：


    ```

    next - current - 1

    ```


    表面上看，`- 1`有点奇怪，但这是必需的，因为我们计算的是`day`和`day_next`之间的天数，而不是`next`和`current`列之间的天数。


    在调整的同时，我们也可以修改`WHERE`子句，只显示持续时间超过一周的无降水时期。


    这是我们用于显示间隙的最终查询：


    ```

    WITH gaps AS (

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    )

    SELECT

    location,day,day_next,

    next - current - 1 AS size

    FROM gaps

    WHERE

    next - current - 1 >= 8

    AND

    location = ''Raleigh''

    ORDER BY day;

    ```


    结果如下：


    ```

    +----------+------------+------------+------+

    | location | day        | day_next   | size |

    +----------+------------+------------+------+

    | Raleigh  | 1976-01-17 | 1976-01-26 |    8 |

    | Raleigh  | 1976-02-22 | 1976-03-06 |   12 |

    | Raleigh  | 1976-03-16 | 1976-03-25 |    8 |

    | Raleigh  | 1976-04-01 | 1976-04-30 |   28 |

    | Raleigh  | 1976-06-04 | 1976-06-16 |   11 |

    | Raleigh  | 1976-07-07 | 1976-07-28 |   20 |

    | Raleigh  | 1976-09-16 | 1976-09-26 |    9 |

    | Raleigh  | 1976-10-31 | 1976-11-12 |   11 |

    | Raleigh  | 1976-11-15 | 1976-11-26 |   10 |

    +----------+------------+------------+------+

    ```


    有一点很清楚：1976年4月的罗利非常干燥，而7月的干燥时间也几乎同样长。'
  raw: '### Gaps


    To find gaps in our data, we basically have to look at times when our expected
    interval is skipped. In the case of our `precip` table, the expected interval
    is one day. Every day, if there was precipitation, a row was added to the table.


    The `LEAD` Window Function is perfect for looking at a given row and finding out
    what the next row is, so it makes sense to include that function in our <cte_body>.
    Other elements we should include are a column with the current day we are on,
    using the `DAYOFYEAR` function to make the math simpler. We’ll need the same thing
    with the column we use to hold the next day in the series, using `LEAD` inside
    of the `DAYOFYEAR` function to get the correct number. Lastly, we should select
    the basic columns so we can see the actual days.


    Here’s our <cte_body> query:


    ```

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WHERE location=''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    );

    ```


    Here is what the first few rows of the result look like:


    ```

    +----------+------------+---------+------------+------+

    | location | day        | current | day_next   | next |

    +----------+------------+---------+------------+------+

    | Raleigh  | 1976-01-03 |       3 | 1976-01-07 |    7 |

    | Raleigh  | 1976-01-07 |       7 | 1976-01-08 |    8 |

    | Raleigh  | 1976-01-08 |       8 | 1976-01-11 |   11 |

    | Raleigh  | 1976-01-11 |      11 | 1976-01-14 |   14 |

    | Raleigh  | 1976-01-14 |      14 | 1976-01-16 |   16 |

    | Raleigh  | 1976-01-16 |      16 | 1976-01-17 |   17 |

    | Raleigh  | 1976-01-17 |      17 | 1976-01-26 |   26 |

    | Raleigh  | 1976-01-26 |      26 | 1976-01-27 |   27 |

    | Raleigh  | 1976-01-27 |      27 | 1976-02-01 |   32 |

    | Raleigh  | 1976-02-01 |      32 | 1976-02-02 |   33 |

    ...

    +----------+------------+---------+------------+------+

    ```


    Moving on to the <cte_query> section, let’s keep things somewhat simple by first
    selecting our basic columns and then doing some simple math on the current and
    next columns to define where the gap is. The start of a gap is whatever is current
    plus one, and the end of a gap is whatever is next minus one.


    Gaps that are equal to 1 aren’t all that interesting, because they’re not gaps.
    A gap of 1 indicates a contiguous section of data—not what we’re looking for here.
    So, one thing we need to do is ensure that gaps are larger than 1.


    Here’s our completed Gaps CTE:


    ```

    WITH gaps AS (

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    )

    SELECT

    location,day,day_next,

    current + 1 AS gap_start,

    next - 1 AS gap_end

    FROM gaps

    WHERE

    next - current > 1

    AND

    location = ''Raleigh''

    ORDER BY day;

    ```


    The first few rows of output from this are:


    ```

    +----------+------------+------------+-----------+---------+

    | location | day        | day_next   | gap_start | gap_end |

    +----------+------------+------------+-----------+---------+

    | Raleigh  | 1976-01-03 | 1976-01-07 |         4 |       6 |

    | Raleigh  | 1976-01-08 | 1976-01-11 |         9 |      10 |

    | Raleigh  | 1976-01-11 | 1976-01-14 |        12 |      13 |

    | Raleigh  | 1976-01-14 | 1976-01-16 |        15 |      15 |

    | Raleigh  | 1976-01-17 | 1976-01-26 |        18 |      25 |

    | Raleigh  | 1976-01-27 | 1976-02-01 |        28 |      31 |

    | Raleigh  | 1976-02-02 | 1976-02-06 |        34 |      36 |

    | Raleigh  | 1976-02-06 | 1976-02-14 |        38 |      44 |

    | Raleigh  | 1976-02-14 | 1976-02-18 |        46 |      48 |

    | Raleigh  | 1976-02-18 | 1976-02-22 |        50 |      52 |

    ...

    +----------+------------+------------+-----------+---------+

    ```


    We don’t really need the `gap_start` and `gap_end` columns, since what we’re really
    interested in is the size of the gap. In our case, since every row in our table
    means it rained that day, a gap represents the number of days without rain. So,
    we should modify our query to take out the start and end columns and instead calculate
    the size of the gap.


    The size is equal to the following:


    ```

    next - current - 1

    ```


    The `- 1` looks a little funny on the surface, but is needed because we’re counting
    for the number of days between `day` and `day_next`, not between the `next` and
    `current` columns.


    While we’re tweaking things, we might as well modify our `WHERE` clause to only
    show periods of no precipitation that last longer than a week.


    Here’s our final query for showing the gaps:


    ```

    WITH gaps AS (

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    )

    SELECT

    location,day,day_next,

    next - current - 1 AS size

    FROM gaps

    WHERE

    next - current - 1 >= 8

    AND

    location = ''Raleigh''

    ORDER BY day;

    ```


    The result looks like the following:


    ```

    +----------+------------+------------+------+

    | location | day        | day_next   | size |

    +----------+------------+------------+------+

    | Raleigh  | 1976-01-17 | 1976-01-26 |    8 |

    | Raleigh  | 1976-02-22 | 1976-03-06 |   12 |

    | Raleigh  | 1976-03-16 | 1976-03-25 |    8 |

    | Raleigh  | 1976-04-01 | 1976-04-30 |   28 |

    | Raleigh  | 1976-06-04 | 1976-06-16 |   11 |

    | Raleigh  | 1976-07-07 | 1976-07-28 |   20 |

    | Raleigh  | 1976-09-16 | 1976-09-26 |    9 |

    | Raleigh  | 1976-10-31 | 1976-11-12 |   11 |

    | Raleigh  | 1976-11-15 | 1976-11-26 |   10 |

    +----------+------------+------------+------+

    ```


    One thing is clear: April 1976 was a very dry month in Raleigh, and July was dry
    for almost as much time.'
  trans: '

    ### 间隙


    要找出数据中的间隙，我们基本上需要查看那些预期时间间隔被跳过的情况。以`precip`表为例，预期间隔是一天。每天，如果有降水记录，就会向表中添加一行。


    `LEAD`窗口函数非常适合查看给定行并找出下一行的内容，因此将该函数包含在我们的`<cte_body>`中是合理的。我们还应该包含其他元素，例如使用`DAYOFYEAR`函数来简化计算，从而获得当前日期的列。同样，我们需要使用`LEAD`函数嵌套在`DAYOFYEAR`函数中来获得序列中下一个日期的正确数值。最后，我们应该选择基本的列，以便看到实际的日期。


    这是我们的`<cte_body>`查询：


    ```

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WHERE location=''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    );

    ```


    以下是查询结果的前几行：


    ```

    +----------+------------+---------+------------+------+

    | location | day        | current | day_next   | next |

    +----------+------------+---------+------------+------+

    | Raleigh  | 1976-01-03 |       3 | 1976-01-07 |    7 |

    | Raleigh  | 1976-01-07 |       7 | 1976-01-08 |    8 |

    | Raleigh  | 1976-01-08 |       8 | 1976-01-11 |   11 |

    | Raleigh  | 1976-01-11 |      11 | 1976-01-14 |   14 |

    | Raleigh  | 1976-01-14 |      14 | 1976-01-16 |   16 |

    | Raleigh  | 1976-01-16 |      16 | 1976-01-17 |   17 |

    | Raleigh  | 1976-01-17 |      17 | 1976-01-26 |   26 |

    | Raleigh  | 1976-01-26 |      26 | 1976-01-27 |   27 |

    | Raleigh  | 1976-01-27 |      27 | 1976-02-01 |   32 |

    | Raleigh  | 1976-02-01 |      32 | 1976-02-02 |   33 |

    ...

    +----------+------------+---------+------------+------+

    ```


    接下来是`<cte_query>`部分，我们保持简单，先选择基本列，然后对`current`和`next`列进行一些简单的数学计算来定义间隙所在的位置。间隙的开始是`current`加一，间隙的结束是`next`减一。


    等于 1 的间隙并不有趣，因为它们并不是真正的间隙。间隙为 1 表示数据是连续的——这不是我们在此寻找的。因此，我们需要确保间隙大于 1。


    这是我们完成后的 Gaps CTE：


    ```

    WITH gaps AS (

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    )

    SELECT

    location,day,day_next,

    current + 1 AS gap_start,

    next - 1 AS gap_end

    FROM gaps

    WHERE

    next - current > 1

    AND

    location = ''Raleigh''

    ORDER BY day;

    ```


    查询结果的前几行如下：


    ```

    +----------+------------+------------+-----------+---------+

    | location | day        | day_next   | gap_start | gap_end |

    +----------+------------+------------+-----------+---------+

    | Raleigh  | 1976-01-03 | 1976-01-07 |         4 |       6 |

    | Raleigh  | 1976-01-08 | 1976-01-11 |         9 |      10 |

    | Raleigh  | 1976-01-11 | 1976-01-14 |        12 |      13 |

    | Raleigh  | 1976-01-14 | 1976-01-16 |        15 |      15 |

    | Raleigh  | 1976-01-17 | 1976-01-26 |        18 |      25 |

    | Raleigh  | 1976-01-27 | 1976-02-01 |        28 |      31 |

    | Raleigh  | 1976-02-02 | 1976-02-06 |        34 |      36 |

    | Raleigh  | 1976-02-06 | 1976-02-14 |        38 |      44 |

    | Raleigh  | 1976-02-14 | 1976-02-18 |        46 |      48 |

    | Raleigh  | 1976-02-18 | 1976-02-22 |        50 |      52 |

    ...

    +----------+------------+------------+-----------+---------+

    ```


    我们其实并不需要`gap_start`和`gap_end`列，因为我们真正感兴趣的是间隙的大小。在我们的例子中，由于表中的每一行都代表那天有降水，一个间隙就代表没有降水的天数。因此，我们应该修改查询，去掉开始和结束列，改为计算间隙的大小。


    大小等于以下表达式：


    ```

    next - current - 1

    ```


    表面上看，`- 1`有点奇怪，但这是必需的，因为我们计算的是`day`和`day_next`之间的天数，而不是`next`和`current`列之间的天数。


    在调整的同时，我们也可以修改`WHERE`子句，只显示持续时间超过一周的无降水时期。


    这是我们用于显示间隙的最终查询：


    ```

    WITH gaps AS (

    SELECT

    location, day,

    DAYOFYEAR(day) AS current,

    LEAD(day) OVER w1 AS day_next,

    DAYOFYEAR(LEAD(day) OVER w1) AS next

    FROM precip

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    )

    SELECT

    location,day,day_next,

    next - current - 1 AS size

    FROM gaps

    WHERE

    next - current - 1 >= 8

    AND

    location = ''Raleigh''

    ORDER BY day;

    ```


    结果如下：


    ```

    +----------+------------+------------+------+

    | location | day        | day_next   | size |

    +----------+------------+------------+------+

    | Raleigh  | 1976-01-17 | 1976-01-26 |    8 |

    | Raleigh  | 1976-02-22 | 1976-03-06 |   12 |

    | Raleigh  | 1976-03-16 | 1976-03-25 |    8 |

    | Raleigh  | 1976-04-01 | 1976-04-30 |   28 |

    | Raleigh  | 1976-06-04 | 1976-06-16 |   11 |

    | Raleigh  | 1976-07-07 | 1976-07-28 |   20 |

    | Raleigh  | 1976-09-16 | 1976-09-26 |    9 |

    | Raleigh  | 1976-10-31 | 1976-11-12 |   11 |

    | Raleigh  | 1976-11-15 | 1976-11-26 |   10 |

    +----------+------------+------------+------+

    ```


    有一点很清楚：1976 年 4 月的罗利非常干燥，而 7 月的干燥时间也几乎同样长。

    '
- fmt: '# Islands


    寻找数据中缺口（gap）的反面是寻找岛屿（island）。以`precip`表为例，岛屿指的是连续的降雨日。


    在某些方面，寻找缺口是一个更容易解决的问题，但多亏了公共表表达式（CTE）和窗口函数，我们拥有识别数据岛屿所需的工具。


    `DENSE_RANK`函数具有一个非常适合此任务的特性。与`RANK`函数不同——`RANK`在遇到多个匹配值时会跳过数字——`DENSE_RANK`从不跳过。例如，给定值`1,2,2,3,4`，`RANK`和`DENSE_RANK`的结果将是：


    ```

    +-------+------+--------+

    | value | rank | d_rank |

    +-------+------+--------+

    |     1 |    1 |      1 |

    |     2 |    2 |      2 |

    |     2 |    2 |      2 |

    |     3 |    4 |      3 |

    |     4 |    5 |      4 |

    +-------+------+--------+

    ```


    所以，如果我们有数字`2,3,4,8,9,12`，并对它们使用`DENSE_RANK`，我们会得到：


    ```

    +-------+--------+

    | value | d_rank |

    +-------+--------+

    |     2 |      1 |

    |     3 |      2 |

    |     4 |      3 |

    |     8 |      4 |

    |     9 |      5 |

    |    12 |      6 |

    +-------+--------+

    ```


    如果我们然后用值减去`DENSE_RANK`，一个有用的模式就出现了：


    ```

    +-------+--------+-----+

    | value | d_rank | v-d |

    +-------+--------+-----+

    |     2 |      1 |   1 |

    |     3 |      2 |   1 |

    |     4 |      3 |   1 |

    |     8 |      4 |   4 |

    |     9 |      5 |   4 |

    |    12 |      6 |   6 |

    +-------+--------+-----+

    ```


    任何连续的数字序列都将具有相同的`value - dense_rank`（或`v-d`）值。这个值实际上成为了我们的岛屿标识符。


    你可能认为`RANK`和`ROW_NUMBER`函数也适用于此目的，但如果表中的值允许重复，它们都会出现问题。下面是之前的同一个表，但这次包含了`RANK`和`ROW_NUMBER`列，以及它们的计算方式。


    ```

    +-------+--------+-----+------+-----+-------+------+

    | value | d_rank | v-d | rank | v-r | r_num | v-rn |

    +-------+--------+-----+------+-----+-------+------+

    |     2 |      1 |   1 |    1 |   1 |     1 |    1 |

    |     3 |      2 |   1 |    2 |   1 |     2 |    1 |

    |     4 |      3 |   1 |    3 |   1 |     3 |    1 |

    |     8 |      4 |   4 |    4 |   4 |     4 |    4 |

    |     8 |      4 |   4 |    4 |   4 |     5 |    3 |

    |     9 |      5 |   4 |    6 |   3 |     6 |    3 |

    |    12 |      6 |   6 |    7 |   5 |     7 |    5 |

    |    13 |      7 |   6 |    8 |   5 |     8 |    5 |

    |    13 |      7 |   6 |    8 |   5 |     9 |    4 |

    |    14 |      8 |   6 |   10 |   4 |    10 |    4 |

    +-------+--------+-----+------+-----+-------+------+

    ```


    由于`value - rank`（`v-r`）和`value - row number`（`v-rn`），当一个值重复时，岛屿会被拆分。


    因为我们处理的是日期而不是简单的整数，我们将使用`DAYOFYEAR`函数来简化数学计算。下面的查询将范围限制在罗利（Raleigh）的记录，并将`day
    - DENSE_RANK`的结果称为岛屿（`island`）：


    ```

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day;

    ```


    为了保持`DENSE_RANK`的正确顺序，我们使用`PARTITION BY location`和`ORDER BY day`。


    结果如下所示：


    ```

    +----------+------------+--------+--------+

    | location | day        | d_rank | island |

    +----------+------------+--------+--------+

    | Raleigh  | 1976-01-03 |      1 |      2 |

    | Raleigh  | 1976-01-07 |      2 |      5 |

    | Raleigh  | 1976-01-08 |      3 |      5 |

    | Raleigh  | 1976-01-11 |      4 |      7 |

    | Raleigh  | 1976-01-14 |      5 |      9 |

    | Raleigh  | 1976-01-16 |      6 |     10 |

    | Raleigh  | 1976-01-17 |      7 |     10 |

    | Raleigh  | 1976-01-26 |      8 |     18 |

    | Raleigh  | 1976-01-27 |      9 |     18 |

    | Raleigh  | 1976-02-01 |     10 |     22 |

    | Raleigh  | 1976-02-02 |     11 |     22 |

    | Raleigh  | 1976-02-06 |     12 |     25 |

    ...

    +----------+------------+--------+--------+

    ```


    这个查询完美地充当了我们的`<cte_body>`。接下来是我们的`<cte_query>`部分，我们可以按`island`列对结果进行分组，并使用`MIN`和`MAX`函数轻松找出岛屿的开始和结束位置。我们需要定义的CTE另一部分是`<cte_name>`，而`islands`似乎很合适。以下是查询：


    ```

    WITH islands AS (

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day

    )

    SELECT

    location,

    MIN(day) AS beginning,

    MAX(day) AS ending

    FROM islands

    GROUP BY island;

    ```


    这个查询的部分结果是：


    ```

    +----------+------------+------------+

    | location | beginning  | ending     |

    +----------+------------+------------+

    | Raleigh  | 1976-01-03 | 1976-01-03 |

    | Raleigh  | 1976-01-07 | 1976-01-08 |

    | Raleigh  | 1976-01-11 | 1976-01-11 |

    | Raleigh  | 1976-01-14 | 1976-01-14 |

    | Raleigh  | 1976-01-16 | 1976-01-17 |

    | Raleigh  | 1976-01-26 | 1976-01-27 |

    | Raleigh  | 1976-02-01 | 1976-02-02 |

    | Raleigh  | 1976-02-06 | 1976-02-06 |

    | Raleigh  | 1976-02-14 | 1976-02-14 |

    | Raleigh  | 1976-02-18 | 1976-02-18 |

    ...

    +----------+------------+------------+

    ```


    事情开始有眉目了，但我们现在应该进行最后一次优化。观察结果，有很多岛屿开始和结束于同一天，这意味着某一天没下雨，接下来的一天下了雨，但再之后一天又没下。我们应该过滤掉这些单日岛屿，顺便也过滤掉两日岛屿，只保留三天及以上的岛屿。


    我们实现这一目标的第一步是添加一个新列来计算岛屿的大小，像这样：


    ```

    MAX(DAYOFYEAR(day)) - MIN(DAYOFYEAR(day)) + 1 AS size

    ```


    唯一的问题与我们在第5章遇到的问题相同。我们需要使用`WHERE`子句将输出限制为仅那些大于或等于3的岛屿，但在CTE内部，`WHERE`子句无法看到我们的新`size`列。因此，作为最后一步，我们将CTE包装在一个派生表包装器中。这是最终的查询：


    ```

    SELECT * FROM (

    WITH islands AS (

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day

    )

    SELECT

    location,

    MIN(day) AS beginning,

    MAX(day) AS ending,

    MAX(DAYOFYEAR(day)) - MIN(DAYOFYEAR(day)) + 1 AS size

    FROM islands

    GROUP BY island

    ) AS islands_wrapper

    WHERE

    size >= 3;

    ```


    输出如下：


    ```

    +----------+------------+------------+------+

    | location | beginning  | ending     | size |

    +----------+------------+------------+------+

    | Raleigh  | 1976-03-30 | 1976-04-01 |    3 |

    | Raleigh  | 1976-05-14 | 1976-05-18 |    5 |

    | Raleigh  | 1976-06-02 | 1976-06-04 |    3 |

    | Raleigh  | 1976-06-19 | 1976-06-22 |    4 |

    | Raleigh  | 1976-11-26 | 1976-11-29 |    4 |

    | Raleigh  | 1976-12-06 | 1976-12-08 |    3 |

    +----------+------------+------------+------+

    ```


    有一点是肯定的：1976年的那个黑色星期五周末（感恩节）肯定很潮湿。但至少感恩节当天没有降水。'
  raw: '### Islands


    The opposite of looking for gaps in our data is to look for islands. In the case
    of our `precip` table, this means consecutive days of precipitation.


    In some ways, looking for gaps is a much easier problem to solve, but thanks to
    CTEs and Window Functions, we have the tools we need to identify islands in our
    data.


    The `DENSE_RANK` function has a property that is perfect for this task. Unlike
    the `RANK` function, which skips numbers if there are multiple matching values,
    `DENSE_RANK` never skips. For example, given the values `1,2,2,3,4`, the results
    for `RANK` and `DENSE_RANK` would be:


    ```

    +-------+------+--------+

    | value | rank | d_rank |

    +-------+------+--------+

    |     1 |    1 |      1 |

    |     2 |    2 |      2 |

    |     2 |    2 |      2 |

    |     3 |    4 |      3 |

    |     4 |    5 |      4 |

    +-------+------+--------+

    ```


    So, if we have the numbers `2,3,4,8,9,12` and we `DENSE_RANK` them, we get the
    following:


    ```

    +-------+--------+

    | value | d_rank |

    +-------+--------+

    |     2 |      1 |

    |     3 |      2 |

    |     4 |      3 |

    |     8 |      4 |

    |     9 |      5 |

    |    12 |      6 |

    +-------+--------+

    ```


    If we then subtract the `DENSE_RANK` from the value, a useful pattern emerges:


    ```

    +-------+--------+-----+

    | value | d_rank | v-d |

    +-------+--------+-----+

    |     2 |      1 |   1 |

    |     3 |      2 |   1 |

    |     4 |      3 |   1 |

    |     8 |      4 |   4 |

    |     9 |      5 |   4 |

    |    12 |      6 |   6 |

    +-------+--------+-----+

    ```


    Any sequence of consecutive numbers will have the same `value - dense_rank` (or
    v-d) number. This number effectively becomes our island identifier.


    You may think the `RANK` and `ROW_NUMBER` functions would also be useful for this
    purpose, but they both have issues if values in our table are allowed to repeat.
    Here’s the same table from before, but this time including `RANK` and `ROW_NUMBER`
    columns, and how they would calculate it.


    ```

    +-------+--------+-----+------+-----+-------+------+

    | value | d_rank | v-d | rank | v-r | r_num | v-rn |

    +-------+--------+-----+------+-----+-------+------+

    |     2 |      1 |   1 |    1 |   1 |     1 |    1 |

    |     3 |      2 |   1 |    2 |   1 |     2 |    1 |

    |     4 |      3 |   1 |    3 |   1 |     3 |    1 |

    |     8 |      4 |   4 |    4 |   4 |     4 |    4 |

    |     8 |      4 |   4 |    4 |   4 |     5 |    3 |

    |     9 |      5 |   4 |    6 |   3 |     6 |    3 |

    |    12 |      6 |   6 |    7 |   5 |     7 |    5 |

    |    13 |      7 |   6 |    8 |   5 |     8 |    5 |

    |    13 |      7 |   6 |    8 |   5 |     9 |    4 |

    |    14 |      8 |   6 |   10 |   4 |    10 |    4 |

    +-------+--------+-----+------+-----+-------+------+

    ```


    With both `value - rank` (v-r) and `value - row number (v-rn)`, islands get split
    when a value repeats.


    Because we’re dealing with dates and not simple integers, we’ll use the `DAYOFYEAR`
    function to keep the math simple. Here’s a query that limits itself to the Raleigh
    records and calls the `day - DENSE_RANK` result island:


    ```

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day;

    ```


    To keep the `DENSE_RANK` in proper order, we `PARTITION BY location` and `ORDER
    BY day`.


    The results look like the following:


    ```

    +----------+------------+--------+--------+

    | location | day        | d_rank | island |

    +----------+------------+--------+--------+

    | Raleigh  | 1976-01-03 |      1 |      2 |

    | Raleigh  | 1976-01-07 |      2 |      5 |

    | Raleigh  | 1976-01-08 |      3 |      5 |

    | Raleigh  | 1976-01-11 |      4 |      7 |

    | Raleigh  | 1976-01-14 |      5 |      9 |

    | Raleigh  | 1976-01-16 |      6 |     10 |

    | Raleigh  | 1976-01-17 |      7 |     10 |

    | Raleigh  | 1976-01-26 |      8 |     18 |

    | Raleigh  | 1976-01-27 |      9 |     18 |

    | Raleigh  | 1976-02-01 |     10 |     22 |

    | Raleigh  | 1976-02-02 |     11 |     22 |

    | Raleigh  | 1976-02-06 |     12 |     25 |

    ...

    +----------+------------+--------+--------+

    ```


    This query works perfectly as our <cte_body>. Moving on to our <cte_query> section,
    we can group our results by the `island` column and use the `MIN` and `MAX` functions
    to easily pull out where our islands start and stop. The only other part of our
    CTE to define is the <cte_name>, and `islands` seems reasonable. Here’s the query:


    ```

    WITH islands AS (

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day

    )

    SELECT

    location,

    MIN(day) AS beginning,

    MAX(day) AS ending

    FROM islands

    GROUP BY island;

    ```


    The partial result of this query is:


    ```

    +----------+------------+------------+

    | location | beginning  | ending     |

    +----------+------------+------------+

    | Raleigh  | 1976-01-03 | 1976-01-03 |

    | Raleigh  | 1976-01-07 | 1976-01-08 |

    | Raleigh  | 1976-01-11 | 1976-01-11 |

    | Raleigh  | 1976-01-14 | 1976-01-14 |

    | Raleigh  | 1976-01-16 | 1976-01-17 |

    | Raleigh  | 1976-01-26 | 1976-01-27 |

    | Raleigh  | 1976-02-01 | 1976-02-02 |

    | Raleigh  | 1976-02-06 | 1976-02-06 |

    | Raleigh  | 1976-02-14 | 1976-02-14 |

    | Raleigh  | 1976-02-18 | 1976-02-18 |

    ...

    +----------+------------+------------+

    ```


    Things are starting to come together, but there is one final optimization we should
    make at this time. Looking at our results, there are a lot of islands that begin
    and end on the same day, meaning it didn’t rain one day, then it rained the following
    day, but it didn’t rain the day after that. We should filter out these single-day
    islands, and while we’re at it we might as well filter out the two-day islands,
    leaving just three and above in our results.


    Our first step toward doing this is to add a new column where we calculate the
    size of the island, like so:


    ```

    MAX(DAYOFYEAR(day)) - MIN(DAYOFYEAR(day)) + 1 AS size

    ```


    The only issue is the same one we ran into back in Chapter [5](#A454556_1_En_5_Chapter.html).
    We need to use a `WHERE` clause to limit output to just those islands greater
    than or equal to 3, but inside our CTE the `WHERE` clause can’t see our new `size`
    column. So, as a final step, we wrap our CTE in a derived table wrapper. Here’s
    the final query:


    ```

    SELECT * FROM (

    WITH islands AS (

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day

    )

    SELECT

    location,

    MIN(day) AS beginning,

    MAX(day) AS ending,

    MAX(DAYOFYEAR(day)) - MIN(DAYOFYEAR(day)) + 1 AS size

    FROM islands

    GROUP BY island

    ) AS islands_wrapper

    WHERE

    size >= 3;

    ```


    The output is as follows:


    ```

    +----------+------------+------------+------+

    | location | beginning  | ending     | size |

    +----------+------------+------------+------+

    | Raleigh  | 1976-03-30 | 1976-04-01 |    3 |

    | Raleigh  | 1976-05-14 | 1976-05-18 |    5 |

    | Raleigh  | 1976-06-02 | 1976-06-04 |    3 |

    | Raleigh  | 1976-06-19 | 1976-06-22 |    4 |

    | Raleigh  | 1976-11-26 | 1976-11-29 |    4 |

    | Raleigh  | 1976-12-06 | 1976-12-08 |    3 |

    +----------+------------+------------+------+

    ```


    One thing is certain: that was certainly a soggy Black Friday weekend back in
    1976\. But at least Thanksgiving was precipitation-free.'
  trans: '

    # 岛屿


    寻找数据中缺口（gap）的反面是寻找岛屿（island）。以`precip`表为例，岛屿指的是连续的降雨日。


    在某些方面，寻找缺口是一个更容易解决的问题，但多亏了公共表表达式（CTE）和窗口函数，我们拥有识别数据岛屿所需的工具。


    `DENSE_RANK`函数具有一个非常适合此任务的特性。与`RANK`函数不同——`RANK`在遇到多个匹配值时会跳过数字——`DENSE_RANK`从不跳过。例如，给定值`1,2,2,3,4`，`RANK`和`DENSE_RANK`的结果将是：


    ```

    +-------+------+--------+

    | value | rank | d_rank |

    +-------+------+--------+

    |     1 |    1 |      1 |

    |     2 |    2 |      2 |

    |     2 |    2 |      2 |

    |     3 |    4 |      3 |

    |     4 |    5 |      4 |

    +-------+------+--------+

    ```


    所以，如果我们有数字`2,3,4,8,9,12`，并对它们使用`DENSE_RANK`，我们会得到：


    ```

    +-------+--------+

    | value | d_rank |

    +-------+--------+

    |     2 |      1 |

    |     3 |      2 |

    |     4 |      3 |

    |     8 |      4 |

    |     9 |      5 |

    |    12 |      6 |

    +-------+--------+

    ```


    如果我们然后用值减去`DENSE_RANK`，一个有用的模式就出现了：


    ```

    +-------+--------+-----+

    | value | d_rank | v-d |

    +-------+--------+-----+

    |     2 |      1 |   1 |

    |     3 |      2 |   1 |

    |     4 |      3 |   1 |

    |     8 |      4 |   4 |

    |     9 |      5 |   4 |

    |    12 |      6 |   6 |

    +-------+--------+-----+

    ```


    任何连续的数字序列都将具有相同的`value - dense_rank`（或`v-d`）值。这个值实际上成为了我们的岛屿标识符。


    你可能认为`RANK`和`ROW_NUMBER`函数也适用于此目的，但如果表中的值允许重复，它们都会出现问题。下面是之前的同一个表，但这次包含了`RANK`和`ROW_NUMBER`列，以及它们的计算方式。


    ```

    +-------+--------+-----+------+-----+-------+------+

    | value | d_rank | v-d | rank | v-r | r_num | v-rn |

    +-------+--------+-----+------+-----+-------+------+

    |     2 |      1 |   1 |    1 |   1 |     1 |    1 |

    |     3 |      2 |   1 |    2 |   1 |     2 |    1 |

    |     4 |      3 |   1 |    3 |   1 |     3 |    1 |

    |     8 |      4 |   4 |    4 |   4 |     4 |    4 |

    |     8 |      4 |   4 |    4 |   4 |     5 |    3 |

    |     9 |      5 |   4 |    6 |   3 |     6 |    3 |

    |    12 |      6 |   6 |    7 |   5 |     7 |    5 |

    |    13 |      7 |   6 |    8 |   5 |     8 |    5 |

    |    13 |      7 |   6 |    8 |   5 |     9 |    4 |

    |    14 |      8 |   6 |   10 |   4 |    10 |    4 |

    +-------+--------+-----+------+-----+-------+------+

    ```


    由于`value - rank`（`v-r`）和`value - row number`（`v-rn`），当一个值重复时，岛屿会被拆分。


    因为我们处理的是日期而不是简单的整数，我们将使用`DAYOFYEAR`函数来简化数学计算。下面的查询将范围限制在罗利（Raleigh）的记录，并将`day
    - DENSE_RANK`的结果称为岛屿（`island`）：


    ```

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day;

    ```


    为了保持`DENSE_RANK`的正确顺序，我们使用`PARTITION BY location`和`ORDER BY day`。


    结果如下所示：


    ```

    +----------+------------+--------+--------+

    | location | day        | d_rank | island |

    +----------+------------+--------+--------+

    | Raleigh  | 1976-01-03 |      1 |      2 |

    | Raleigh  | 1976-01-07 |      2 |      5 |

    | Raleigh  | 1976-01-08 |      3 |      5 |

    | Raleigh  | 1976-01-11 |      4 |      7 |

    | Raleigh  | 1976-01-14 |      5 |      9 |

    | Raleigh  | 1976-01-16 |      6 |     10 |

    | Raleigh  | 1976-01-17 |      7 |     10 |

    | Raleigh  | 1976-01-26 |      8 |     18 |

    | Raleigh  | 1976-01-27 |      9 |     18 |

    | Raleigh  | 1976-02-01 |     10 |     22 |

    | Raleigh  | 1976-02-02 |     11 |     22 |

    | Raleigh  | 1976-02-06 |     12 |     25 |

    ...

    +----------+------------+--------+--------+

    ```


    这个查询完美地充当了我们的`<cte_body>`。接下来是我们的`<cte_query>`部分，我们可以按`island`列对结果进行分组，并使用`MIN`和`MAX`函数轻松找出岛屿的开始和结束位置。我们需要定义的
    CTE 另一部分是`<cte_name>`，而`islands`似乎很合适。以下是查询：


    ```

    WITH islands AS (

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day

    )

    SELECT

    location,

    MIN(day) AS beginning,

    MAX(day) AS ending

    FROM islands

    GROUP BY island;

    ```


    这个查询的部分结果是：


    ```

    +----------+------------+------------+

    | location | beginning  | ending     |

    +----------+------------+------------+

    | Raleigh  | 1976-01-03 | 1976-01-03 |

    | Raleigh  | 1976-01-07 | 1976-01-08 |

    | Raleigh  | 1976-01-11 | 1976-01-11 |

    | Raleigh  | 1976-01-14 | 1976-01-14 |

    | Raleigh  | 1976-01-16 | 1976-01-17 |

    | Raleigh  | 1976-01-26 | 1976-01-27 |

    | Raleigh  | 1976-02-01 | 1976-02-02 |

    | Raleigh  | 1976-02-06 | 1976-02-06 |

    | Raleigh  | 1976-02-14 | 1976-02-14 |

    | Raleigh  | 1976-02-18 | 1976-02-18 |

    ...

    +----------+------------+------------+

    ```


    事情开始有眉目了，但我们现在应该进行最后一次优化。观察结果，有很多岛屿开始和结束于同一天，这意味着某一天没下雨，接下来的一天下了雨，但再之后一天又没下。我们应该过滤掉这些单日岛屿，顺便也过滤掉两日岛屿，只保留三天及以上的岛屿。


    我们实现这一目标的第一步是添加一个新列来计算岛屿的大小，像这样：


    ```

    MAX(DAYOFYEAR(day)) - MIN(DAYOFYEAR(day)) + 1 AS size

    ```


    唯一的问题与我们在第 5 章遇到的问题相同。我们需要使用`WHERE`子句将输出限制为仅那些大于或等于 3 的岛屿，但在 CTE 内部，`WHERE`子句无法看到我们的新`size`列。因此，作为最后一步，我们将
    CTE 包装在一个派生表包装器中。这是最终的查询：


    ```

    SELECT * FROM (

    WITH islands AS (

    SELECT

    location, day,

    DENSE_RANK() OVER w1 AS d_rank,

    DAYOFYEAR(day) - DENSE_RANK() OVER w1 AS island

    FROM precip

    WHERE location = ''Raleigh''

    WINDOW w1 AS (

    PARTITION BY location

    ORDER BY day

    )

    ORDER BY day

    )

    SELECT

    location,

    MIN(day) AS beginning,

    MAX(day) AS ending,

    MAX(DAYOFYEAR(day)) - MIN(DAYOFYEAR(day)) + 1 AS size

    FROM islands

    GROUP BY island

    ) AS islands_wrapper

    WHERE

    size >= 3;

    ```


    输出如下：


    ```

    +----------+------------+------------+------+

    | location | beginning  | ending     | size |

    +----------+------------+------------+------+

    | Raleigh  | 1976-03-30 | 1976-04-01 |    3 |

    | Raleigh  | 1976-05-14 | 1976-05-18 |    5 |

    | Raleigh  | 1976-06-02 | 1976-06-04 |    3 |

    | Raleigh  | 1976-06-19 | 1976-06-22 |    4 |

    | Raleigh  | 1976-11-26 | 1976-11-29 |    4 |

    | Raleigh  | 1976-12-06 | 1976-12-08 |    3 |

    +----------+------------+------------+------+

    ```


    有一点是肯定的：1976 年的那个黑色星期五周末（感恩节）肯定很潮湿。但至少感恩节当天没有降水。

    '
