    \ Boone   | 2017 | 10651.10 |\n|    41 | Terrance Reese   | 2017 | 10219.33 |\n\
    |   132 | Alan Carroll     | 2017 | 10066.97 |\n|    34 | Bobby French     | 2017\
    \ | 9928.69  |\n|   105 | Alonzo Page      | 2017 | 9782.69  |\n|    66 | Kathryn\
    \ Barnes   | 2017 | 9433.56  |\n|   106 | Bradley Black    | 2017 | 9387.77  |\n\
    |   118 | Deborah Peterson | 2017 | 9265.96  |\n|    79 | Rafael Sandoval  | 2017\
    \ | 9055.54  |\n+-------+------------------+------+----------+\n```\n\n让我们为 2017\
    \ 年“2% 俱乐部”的成员们鼓掌！\n\n## 将子查询转换为 CTE\n\n让我们换个话题，谈谈将现有查询转换为 CTE 的过程。这相当简单。为了说明这一点，这里有一个查询，它与上一个示例中的查询等效，但它没有使用\
    \ CTE，而是使用了两个相同的 `FROM (SELECT...)` 语句形式的子查询：\n\n```sql\nSELECT *\nFROM (\n  \
    \  SELECT\n        employees.id AS sp_id,\n        employees.name AS salesperson,\n\
    \        YEAR(commission_date) AS year,\n        SUM(commission_amount) AS total\n\
    \    FROM\n        commissions LEFT JOIN employees\n            ON commissions.salesperson_id\
    \ = employees.id\n    GROUP BY\n        sp_id, year\n    ) AS C1\nWHERE\n    total\
    \ > ( SELECT\n                0.02*SUM(total)\n              FROM (\n        \
    \            SELECT\n                        employees.id AS sp_id,\n        \
    \                employees.name AS salesperson,\n                        YEAR(commission_date)\
    \ AS year,\n                        SUM(commission_amount) AS total\n        \
    \            FROM\n                        commissions LEFT JOIN employees\n \
    \                           ON commissions.salesperson_id = employees.id\n   \
    \                 GROUP BY\n                        sp_id, year\n            \
    \      ) AS C2\n              WHERE\n                C2.year = C1.year\n     \
    \           AND C2.year = 2017)\nORDER BY\n    total DESC;\n```\n\n由于存在重复的 `FROM\
    \ (SELECT...)` 语句，这个查询有 33 行，而执行相同功能的 CTE 版本只有 25 行。八行的差异不算大，但更复杂的查询可能包含五个、七个、十一个甚至更多重复的子查询，导致查询规模几乎呈指数级增长。如果底层表发生变化而我们需要更新查询，这可能迅速变成一场维护噩梦。\n\
    \n将包含重复子查询的查询转换为 CTE 只需三个步骤（如果你需要为额外的重复子查询重复此过程，则为四个）：\n1.  找到派生表查询的第一次出现，将其复制到\
    \ `SELECT` 行上方，用 `WITH <cte_name> AS (` 包裹开头，并以 `)` 结尾。\n2.  将该第一次出现的子查询替换为我们指定的\
    \ `<cte_name>`。\n3.  遍历查询的其余部分，找到其他相同的子查询，并将它们也替换为 `<cte_name>`。\n4.  （可选）如果查询中还有其他重复的子查询，重复此过程。\n\
    \n并非每个查询都完美适合这个过程，但许多查询是适合的。\n\n## 总结\n\n在本章中，我们扩展了前一章的示例，并通过几个更实质性的例子说明了 CTE\
    \ 相较于子查询的优势，特别是在帮助我们避免难以修改和维护的重复子查询方面。最后，我们讨论了如何将使用子查询的查询转换为使用 CTE 的查询。\n\n为了圆满结束本书关于\
    \ CTE 的部分，下一章将介绍我认为 CTE 最令人兴奋的部分——递归。\n\n# 3. 递归公共表表达式\n\n递归是计算机科学中一项非常有用的技术。递归算法非常适合于遍历树（其中项目包含其他项目，而这些项目也可能包含更多项目）和图（用于跟踪项目之间的连接或路径）等数据结构。SQL\
    \ 在历史上对此处理得并不好。\n\nOracle 在 1980 年代尝试使用其非标准的 `CONNECT BY` 语法为 SQL 添加递归支持，但现在这已被官方\
    \ SQL 标准（SQL99 版本）中的递归 CTE 所取代、改进和标准化。该标准的实现大约从 2007 年开始出现在各种数据库中，如 Oracle 和 SQL\
    \ Server，而 MariaDB 和 MySQL 大约在十年后才最终赶上并支持它们。\n\n简单来说，递归 CTE 是在其 `<cte_body>` 中引用自身的\
    \ CTE。让 CTE 引用自身可能看起来很复杂，但一旦掌握，其实并不难，而且通过使用递归，你可以做很多很酷的事情。本章将提供一些示例，展示你可以用递归 CTE\
    \ 做些什么。\n"
- fmt: "## Before We Begin\n\nAs with the other chapters, the examples in this chapter\
    \ utilize sample data. For this chapter, we’ll be using two tables, one called\
    \ `tudors` and another called `routes`. The `tudors` table can be created with\
    \ the following query:\n\n```sql\nCREATE TABLE tudors (\nid serial primary key,\n\
    name VARCHAR(100) NOT NULL,\nfather BIGINT(20),\nmother BIGINT(20)\n);\n```\n\n\
    The data is in a CSV file called `bartholomew-ch03-tudors.csv`. It can be loaded\
    \ with a query similar to the following (assuming the file is on the computer\
    \ running MariaDB or MySQL server in the `/tmp/` folder):\n\n```sql\nLOAD DATA\
    \ INFILE '/tmp/bartholomew-ch03-tudors.csv'\nINTO TABLE tudors\nFIELDS TERMINATED\
    \ BY ','\nOPTIONALLY ENCLOSED BY '\"';\n```\n\nThe `routes` table can be created\
    \ with the following query:\n\n```sql\nCREATE TABLE routes (\nid serial primary\
    \ key,\ndeparting VARCHAR(100) NOT NULL,\narriving VARCHAR(100) NOT NULL\n);\n\
    ```\n\nThe data is in a CSV file called `bartholomew-ch03-routes.csv`. It can\
    \ be loaded with a query similar to the following (assuming the file is on the\
    \ computer running MariaDB or MySQL server in the `/tmp/` folder):\n\n```sql\n\
    LOAD DATA INFILE '/tmp/bartholomew-ch03-routes.csv'\nINTO TABLE routes\nFIELDS\
    \ TERMINATED BY ','\nOPTIONALLY ENCLOSED BY '\"';\n```\n\n**Note**\nSee the “Before\
    \ We Begin” section of Chapter [1](#A454556_1_En_1_Chapter.html) for extra information\
    \ about loading the files on Windows and working around issues with `secure_file_priv`.\n\
    \nWe’re now ready to begin.\n\n## Recursive CTE Syntax\n\nThe syntax for recursive\
    \ CTE queries is similar to that for non-recursive CTEs, with a couple differences.\
    \ Here’s the basic syntax:\n\n```sql\nWITH RECURSIVE <cte_name> AS (\n    <anchor>\n\
    \    UNION [ALL]\n    <recursive>\n)\n```\n\nRight away, you’ll notice the introduction\
    \ of the `RECURSIVE` keyword. This must be included for recursive CTEs in MariaDB\
    \ and MySQL. This keyword is not required for recursive CTEs in other databases,\
    \ such as Oracle and SQL Server.\n\nThe other difference from non-recursive CTEs\
    \ is that the `<cte_body>` is split into two parts, with a `UNION` or `UNION ALL`\
    \ separating the two. The first part is the `<anchor>`. It is a non-recursive\
    \ query similar to the `<cte_body>` of a non-recursive CTE. Then, after the `UNION`\
    \ or `UNION ALL`, there is the recursive part. This part will contain references\
    \ to the `<cte_name>`, which is what makes the CTE recursive, so we’ll call this\
    \ part `<recursive>` for simplicity.\n\n## Adding Numbers\n\nThe biggest thing\
    \ to keep in mind when getting started with recursive CTEs is that the way recursion\
    \ actually works might not be exactly how we would expect it to work.\n\nWe can\
    \ illustrate this by working through a good, if artificial, example of how recursive\
    \ CTEs work: adding numbers together. Suppose we want to add all of the numbers\
    \ from 1 through 100 together. Figuring it out by hand with `1 + 2 + 3 + 4 + ...\
    \ + 100` would be very tedious. It would be much better to have a recursive loop\
    \ that does the repetitive parts for me. This example has the benefit of not requiring\
    \ us to create any tables. Don’t worry, we’ll get to our `tudors` and `routes`\
    \ tables later in the chapter.\n\nTo get us started adding our numbers together,\
    \ we want a loop that does the following:\n\n1.  Takes the current number and\
    \ adds it to the current total\n2.  Adds 1 to the current number\n3.  Repeats\
    \ until the current number equals 100\n\nTo start things out, we’ll want to have\
    \ two columns—one for the counter keeping track of the current number and another\
    \ for the total. We’ll call these `Count` and `Total`, respectively, and we’ll\
    \ start from zero. The simplest way to express this in SQL is like so:\n\n```sql\n\
    SELECT\n    0 AS Count,\n    0 AS Total\n```\n\nThis will be our `<anchor>`, the\
    \ point we start from.\n\nNow, we need to add 1 to `Count` and add the current\
    \ `Count` to the `Total`. This will be our `<recursive>` part. Here it is in SQL:\n\
    \n```sql\nSELECT\n    Count + 1,\n    Total + Count\n```\n\nBy adding a `WITH\
    \ RECURSIVE TotalSum AS` part to the front, a `UNION ALL` between the two sample\
    \ queries, a `FROM` to refer to our `<cte_name>`, a `WHERE` clause so we know\
    \ when the CTE will finish, and lastly a simple `SELECT * FROM <cte_name>` as\
    \ our output, we get a CTE query that looks like the following:\n\n```sql\nWITH\
    \ RECURSIVE TotalSum AS (\n    SELECT\n        0 AS Count,\n        0 AS Total\n\
    \    UNION ALL\n    SELECT\n        Count + 1,\n        Total + Count\n    FROM\
    \ TotalSum\n    WHERE Count <= 100\n)\nSELECT * FROM TotalSum;\n```\n\nThis looks\
    \ reasonable, but when we run this query, things don’t look exactly right:\n\n\
    ```\n+-------+-------+\n| Count | Total |\n+-------+-------+\n|     0 |     0\
    \ |\n|     1 |     0 |\n|     2 |     1 |\n|     3 |     3 |\n|     4 |     6\
    \ |\n|     5 |    10 |\n...\n|    96 |  4560 |\n|    97 |  4656 |\n|    98 | \
    \ 4753 |\n|    99 |  4851 |\n|   100 |  4950 |\n|   101 |  5050 |\n+-------+-------+\n\
    ```\n\nThe `Count` column looks fine, until we get to the end when it stops at\
    \ 101 instead of 100 like we wanted. Also, while the `Total` column ends up with\
    \ the correct answer, 5050, it’s confusing because at the beginning when `Count`\
    \ is 1, `Total` is still equal to 0, and at the end when `Count` is 101, the total\
    \ of 5050 is after adding the final 100, not after adding 101.\n\nThis behavior\
    \ can be explained with an understanding of how the database is performing the\
    \ `UNION ALL` between the `<anchor>` and `<recursive>` parts of our `TotalSum`\
    \ CTE.\n\nFirst, when we begin, `Count` and `Total` are both set to 0, and the\
    \ first line of our output reflects that:\n\n```\n+-------+-------+\n| Count |\
    \ Total |\n+-------+-------+\n|     0 |     0 |\n+-------+-------+\n```\n\nWe\
    \ then do a `UNION ALL` against this table with our `Count + 1` and `Total + Count`\
    \ expressions. `Count + 1` = `0 + 1` = `1`, but `Total + Count` = `0 + 0` = `0`,\
    \ because when the value of `Count` is calculated, the value of `Count` is being\
    \ pulled from the previous output, not the expression one line above that adds\
    \ 1 to `Count`. The `UNION ALL` is only looking at the previous row of output,\
    \ and in that row, `Count = 0`. So, our second line of output may look wrong,\
    \ but from the database’s perspective, it is completely accurate:\n\n```\n+-------+-------+\n\
    | Count | Total |\n+-------+-------+\n|     1 |     0 |\n+-------+-------+\n```\n\
    \nThe fix then, is pretty simple. When calculating the `Total` column, we add\
    \ one to it just like we do to the `Count` column. With this change, we should\
    \ also change the `WHERE Count <= 100` to `WHERE Count < 100` because by the time\
    \ `Count` actually reaches 100 we’re already done. With those modifications, our\
    \ recursive CTE now looks like the following:\n\n```sql\nWITH RECURSIVE TotalSum\
    \ AS (\n    SELECT\n        0 AS Count,\n        0 AS Total\n    UNION ALL\n \
    \   SELECT\n        Count + 1,\n        Total + Count + 1\n    FROM TotalSum\n\
    \    WHERE Count < 100\n)\nSELECT * FROM TotalSum;\n```\n\nThe output of this\
    \ version looks much better, exactly what we would expect:\n\n```\n+-------+-------+\n\
    | Count | Total |\n+-------+-------+\n|     0 |     0 |\n|     1 |     1 |\n|\
    \     2 |     3 |\n|     3 |     6 |\n|     4 |    10 |\n|     5 |    15 |\n...\n\
    |    96 |  4656 |\n|    97 |  4753 |\n|    98 |  4851 |\n|    99 |  4950 |\n|\
    \   100 |  5050 |\n+-------+-------+\n```\n\nThe key takeaway from this exercise\
    \ is to remember that the `<recursive>` part after a `UNION` or `UNION ALL` is\
    \ looking at the previously retrieved or calculated row, not the current row,\
    \ when making its calculations."
  raw: '## Before We Begin


    As with the other chapters, the examples in this chapter utilize sample data.
    For this chapter, we’ll be using two tables, one called `tudors` and another called
    `routes` . The `tudors` table can be created with the following query:


    ```

    CREATE TABLE tudors (

    id serial primary key,

    name VARCHAR(100) NOT NULL,

    father BIGINT(20),

    mother BIGINT(20)

    );

    ```


    The data is in a CSV file called `bartholomew-ch03-tudors.csv` . It can be loaded
    with a query similar to the following (assuming the file is on the computer running
    MariaDB or MySQL server in the `/tmp/` folder):


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch03-tudors.csv''

    INTO TABLE tudors

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    The `routes` table can be created with the following query:


    ```

    CREATE TABLE routes (

    id serial primary key,

    departing VARCHAR(100) NOT NULL,

    arriving VARCHAR(100) NOT NULL

    );

    ```


    The data is in a CSV file called `bartholomew-ch03-routes.csv` . It can be loaded
    with a query similar to the following (assuming the file is on the computer running
    MariaDB or MySQL server in the `/tmp/` folder):


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch03-routes.csv''

    INTO TABLE routes

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    Note


    See the “Before We Begin” section of Chapter [1](#A454556_1_En_1_Chapter.html)
    for extra information about loading the files on Windows and working around issues
    with `secure_file_priv`.


    We’re now ready to begin.


    ## Recursive CTE Syntax


    The syntax for recursive CTE queries is similar to that for non-recursive CTEs,
    with a couple differences. Here’s the basic syntax :


    ```

    WITH RECURSIVE  AS (


    UNION [ALL]


    )


    ```


    Right away, you’ll notice the introduction of the `RECURSIVE` keyword. This must
    be included for recursive CTEs in MariaDB and MySQL. This keyword is not required
    for recursive CTEs in other databases, such as Oracle and SQL Server.


    The other difference from non-recursive CTEs is that the <cte_body> is split into
    two parts, with a `UNION` or `UNION ALL` separating the two. The first part is
    the <anchor>. It is a non-recursive query similar to the <cte_body> of a non-recursive
    CTE. Then, after the `UNION` or `UNION ALL`, there is the recursive part. This
    part will contain references to the <cte_name>, which is what makes the CTE recursive,
    so we’ll call this part <recursive> for simplicity.


    ## Adding Numbers


    The biggest thing to keep in mind when getting started with recursive CTEs is
    that the way recursion actually works might not be exactly how we would expect
    it to work.


    We can illustrate this by working through a good, if artificial, example of how
    recursive CTEs work: adding numbers together. Suppose we want to add all of the
    numbers from 1 through 100 together. Figuring it out by hand with `1 + 2 + 3 +
    4 + ... + 100` would be very tedious. It would be much better to have a recursive
    loop that does the repetitive parts for me. This example has the benefit of not
    requiring us to create any tables. Don’t worry, we’ll get to our `tudors` and
    `routes` tables later in the chapter.


    To get us started adding our numbers together, we want a loop that does the following:


    1.  Takes the current number and adds it to the current total  

    2.  Adds 1 to the current number  

    3.  Repeats until the current number equals 100


    To start things out, we’ll want to have two columns—one for the counter keeping
    track of the current number and another for the total. We’ll call these `Count`
    and `Total`, respectively, and we’ll start from zero. The simplest way to express
    this in SQL is like so:


    ```

    SELECT

    0 AS Count,

    0 AS Total

    ```


    This will be our <anchor>, the point we start from.


    Now, we need to add 1 to `Count` and add the current `Count` to the `Total`. This
    will be our <recursive> part. Here it is in SQL:


    ```

    SELECT

    Count + 1,

    Total + Count

    ```


    By adding a `WITH RECURSIVE TotalSum AS` part to the front, a `UNION ALL` between
    the two sample queries, a `FROM` to refer to our <cte_name>, a `WHERE` clause
    so we know when the CTE will finish, and lastly a simple `SELECT * FROM <cte_name>`
    as our output, we get a CTE query that looks like the following:


    ```

    WITH RECURSIVE TotalSum AS (

    SELECT

    0 AS Count,

    0 AS Total

    UNION ALL

    SELECT

    Count + 1,

    Total + Count

    FROM TotalSum

    WHERE Count <= 100

    )

    SELECT * FROM TotalSum;

    ```


    This looks reasonable , but when we run this query, things don’t look exactly
    right:


    ```

    +-------+-------+

    | Count | Total |

    +-------+-------+

    |     0 |     0 |

    |     1 |     0 |

    |     2 |     1 |

    |     3 |     3 |

    |     4 |     6 |

    |     5 |    10 |

    ...

    |    96 |  4560 |

    |    97 |  4656 |

    |    98 |  4753 |

    |    99 |  4851 |

    |   100 |  4950 |

    |   101 |  5050 |

    +-------+-------+

    ```


    The `Count` column looks fine, until we get to the end when it stops at 101 instead
    of 100 like we wanted. Also, while the `Total` column ends up with the correct
    answer, 5050, it’s confusing because at the beginning when `Count` is 1, `Total`
    is still equal to 0, and at the end when `Count` is 101, the total of 5050 is
    after adding the final 100, not after adding 101.


    This behavior can be explained with an understanding of how the database is performing
    the `UNION ALL` between the <anchor> and <recursive> parts of our `TotalSum` CTE.


    First, when we begin, `Count` and `Total` are both set to 0, and the first line
    of our output reflects that:


    ```

    +-------+-------+

    | Count | Total |

    +-------+-------+

    |     0 |     0 |

    +-------+-------+

    ```


    We then do a `UNION` `ALL` against this table with our `Count + 1` and `Total
    + Count` expressions. `Count + 1` = `0 + 1` = `1`, but `Total + Count` = `0 +
    0` = `0`, because when the value of `Count` is calculated, the value of `Count`
    is being pulled from the previous output, not the expression one line above that
    adds 1 to `Count`. The `UNION ALL` is only looking at the previous row of output,
    and in that row, `Count = 0`. So, our second line of output may look wrong, but
    from the database’s perspective, it is completely accurate:


    ```

    +-------+-------+

    | Count | Total |

    +-------+-------+

    |     1 |     0 |

    +-------+-------+

    ```


    The fix then, is pretty simple. When calculating the `Total` column, we add one
    to it just like we do to the `Count` column. With this change, we should also
    change the `WHERE Count <= 100` to `WHERE Count < 100` because by the time `Count`
    actually reaches 100 we’re already done. With those modifications, our recursive
    CTE now looks like the following:


    ```

    WITH RECURSIVE TotalSum AS (

    SELECT

    0 AS Count,

    0 AS Total

    UNION ALL

    SELECT

    Count + 1,

    Total + Count + 1

    FROM TotalSum

    WHERE Count < 100

    )

    SELECT * FROM TotalSum;

    ```


    The output of this version looks much better, exactly what we would expect :


    ```

    +-------+-------+

    | Count | Total |

    +-------+-------+

    |     0 |     0 |

    |     1 |     1 |

    |     2 |     3 |

    |     3 |     6 |

    |     4 |    10 |

    |     5 |    15 |

    ...

    |    96 |  4656 |

    |    97 |  4753 |

    |    98 |  4851 |

    |    99 |  4950 |

    |   100 |  5050 |

    +-------+-------+

    ```


    The key takeaway from this exercise is to remember that the <recursive> part after
    a `UNION` or `UNION ALL` is looking at the previously retrieved or calculated
    row, not the current row, when making its calculations.'
  trans: "\n## 开始之前\n\n与其他章节一样，本章的示例使用了样本数据。本章我们将使用两个表，一个名为 `tudors`，另一个名为 `routes`。`tudors`\
