    \n*   `<frame_start>`\n*   `UNBOUNDED FOLLOWING`\n*   `<expression> FOLLOWING`\n\
    \n如果这看起来有点复杂，不用担心。在编写 `<frame_definition>` 部分积累一些经验后，就会变得自然而然。\n\n另一种整体查看 `<frame_definition>`\
    \ 完整语法的方法是使用扩展巴科斯范式（EBNF）表示法。在 EBNF 表示法中，语法如下所示：\n\n```\nframe_definition ::=\
    \ ( ROWS | RANGE ) (\nCURRENT ROW\n| ( UNBOUNDED | 'value_expr' ) PRECEDING\n\
    | ( BETWEEN (\nUNBOUNDED PRECEDING\n| CURRENT ROW\n| 'value_expr' (PREDEDING|FOLLOWING)\n\
    )\nAND (\nUNBOUNDED FOLLOWING\n| CURRENT ROW\n| 'value_expr' (PRECEDING | FOLLOWING)\n\
    )\n)\n)\n```\n\n有一些在线工具，例如 [`http://bottlecaps.de/rr/ui`](http://bottlecaps.de/rr/ui)\
    \ ，可以将 EBNF 转换为铁路图，从而更好地可视化语法。图 [4-1](#A454556_1_En_4_Chapter.html#Fig1) 展示了完整的\
    \ `<frame_definition>` 语法的铁路图。\n\n`A454556_1_En_4_Fig1_HTML.jpg`\n\n图 4-1.\n`<frame_definition>`\
    \ 语法的铁路图\n\n铁路图很有用，因为你只需沿着路径从一个元素到下一个元素，就像火车沿着铁轨行驶一样，在路径分叉时选择你想要的分支。\n\n综上所述，以下是一些有效的\
    \ `<frame_definition>` 部分示例：\n\n```\nROWS UNBOUNDED PRECEDING\nROWS CURRENT ROW\n\
    ROWS 3 PRECEDING\nROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING\nRANGE BETWEEN\
    \ 1 PRECEDING AND CURRENT ROW\nROWS BETWEEN CURRENT ROW AND 5 PRECEDING\n```\n\
    \n提示\n\n根据语法定义中的规则，某些组合似乎是可能的，但实际上是不允许的。例如，使用这样的 `<frame_definition>`：\n\n```\n\
    ROWS BETWEEN 3 FOLLOWING AND CURRENT ROW\n```\n\n将导致以下错误：\n\n```\nERROR 4014 (HY000):\
    \ Unacceptable combination of window frame bound specifications\n```\n\n这里的解决方案是交换两个边界定义的顺序，改为：\n\
    \n```\nROWS BETWEEN CURRENT ROW AND 3 FOLLOWING\n```\n\n有关窗口帧在实践中如何工作的简要介绍，请参阅本章后面关于\
    \ `SUM()` 函数的条目。在接下来的章节中，我们也将更深入地探讨它们。\n\n## WINDOW 子句语法\n\n窗口函数中 `OVER` 定义的替代方法是在\
    \ `SELECT` 语句的 `FROM` 和 `ORDER BY` 子句之间使用 `WINDOW` 子句。`WINDOW` 子句的语法如下：\n\n```\n\
    WINDOW  AS (\n[]\n[]\n[]\n)[,  AS (...)]...\n```\n\n使用 `WINDOW` 子句时，将窗口函数中 `OVER`\
    \ 后面的 `()`（包括其内部的所有内容）替换为 `<window_name>`。\n\n这是一个假设的例子：\n\n```\nSELECT\noffice,\
    \ time, amount,\nSUM(amount)OVER window1\nFROM my_table\nWINDOW window1 AS (\n\
    PARTITION BY office\nORDER BY time)\nORDER BY office,time;\n```\n\n`WINDOW` 子句的目的是帮助保持\
    \ `SELECT` 语句中 `SELECT` 和 `FROM` 之间的部分更整洁、更易读。在使用多个具有相似 `OVER` 子句的窗口函数时，它也有助于避免重复。\n\
    \n如果定义了多个 `<window_name>` 部分，则后面的可以继承前面的。例如：\n\n```\nWINDOW\nwindow1 AS (PARTITION\
    \ BY id),\nwindow2 AS (window1 ORDER BY office),\nwindow3 AS (window2 ROWS UNBOUNDED\
    \ PRECEDING)\n```\n\n所以 `window2` 实际上相当于：\n\n```\n(PARTITION BY id ORDER BY office)\n\
    ```\n\n而 `window3` 实际上相当于：\n\n```\n(\nPARTITION BY id\nORDER BY office\nROWS UNBOUNDED\
    \ PRECEDING\n)\n```\n\n添加 `<window_name>` 部分的顺序必须遵循 `OVER` 子句的规则。首先是 `<partition_definition>`，然后是\
    \ `<order_definition>`，最后是 `<frame_definition>`。\n\n同样值得注意的是，一个 `WINDOW` 子句在其定义中最多只能继承一个其他的\
    \ `WINDOW` 子句。例如，你可能逻辑上认为以下内容是有效的：\n\n```\nWINDOW\nwindow1 AS (PARTITION BY id),\n\
    window2 AS (ORDER BY office),\nwindow3 AS (window1 window2 ROWS UNBOUNDED PRECEDING)\n\
    ```\n\n但尝试这样做会给出错误消息。\n\n有关使用 `WINDOW` 子句简化查询的示例，请参见第 [6](#A454556_1_En_6_Chapter.html)\
    \ 章。\n\n## 窗口函数参考\n\n为了让你熟悉 MariaDB 和 MySQL 中所有可用的窗口函数，本章的剩余部分将逐一介绍它们及其语法。\n\n\
    本节旨在作为查找特定窗口函数时的参考。虽然你可能（并且可能应该）至少通读一遍，但它不一定是用来从头到尾阅读的。\n\n有些窗口函数作为非窗口函数的任何形式都不存在，因此它们是全新的。其他函数在引入窗口函数之前已经作为聚合函数存在于\
    \ MariaDB 或 MySQL 中，例如 `AVG`。因此，虽然你以前可能见过并使用过它们，但当使用 `OVER` 子句调用时，它们具有特殊的窗口函数形式。函数按字母顺序列出，以便于查找。\n\
    \n窗口函数在 MariaDB 10.2 和 MySQL 8.0（自 MySQL 8.0.2 DMR 起）中可用。\n\n### AVG()\n\n如果包含\
    \ `OVER` 子句，`AVG` 聚合函数可用作窗口函数。语法是：\n\n```\nAVG() OVER (\n[]\n[]\n[]\n)\n```\n\n\
    `AVG` 函数返回由 `OVER` 子句视图中的 `<expression>` 的平均值。\n\n### BIT_AND()\n\n如果包含 `OVER`\
    \ 子句，`BIT_AND` 聚合函数可用作窗口函数。语法是：\n\n```\nBIT_AND() OVER (\n[]\n[]\n[]\n)\n```\n\
    \n`BIT_AND` 函数返回由 `OVER` 子句视图中的 `<expression>` 的位的按位 `AND`。\n\n### BIT_OR()\n\n\
    如果包含 `OVER` 子句，`BIT_OR` 聚合函数可用作窗口函数。语法是：\n\n```\nBIT_OR() OVER (\n[]\n[]\n[]\n\
    )\n```\n\n`BIT_OR` 函数返回由 `OVER` 子句视图中的 `<expression>` 的位的按位 `OR`。\n\n### BIT_XOR()\n\
    \n如果包含 `OVER` 子句，`BIT_XOR` 聚合函数可用作窗口函数。语法是：\n\n```\nBIT_XOR() OVER (\n[]\n[]\n\
    []\n)\n```\n\n`BIT_XOR` 函数返回由 `OVER` 子句视图中的 `<expression>` 的位的按位 `XOR`（异或）。\n\n\
    ### COUNT()\n\n如果包含 `OVER` 子句，`COUNT` 聚合函数可用作窗口函数。语法是：\n\n```\nCOUNT() OVER (\n\
    []\n[]\n[]\n)\n```\n\n`COUNT` 函数返回由 `OVER` 子句视图中的 `<expression>` 的非 `NULL` 值的计数。"
  raw: "### Frame Definition Syntax\n\nThe <frame_definition> section syntax looks\
    \ like the following:\n\n```\n{ROWS|RANGE}\n{|}\n```\n\nThe <frame_definition>\
    \ section is not supported by all Window Functions. Its purpose is to define a\
    \ frame that is then used by the function to compute a result on the rows in the\
    \ frame. The frame moves with the current row. In addition to its own defined\
    \ boundaries, the frame is further bounded by the <partition_definition> section.\n\
    \nThe <frame_definition> section is the most powerful feature of Window Functions.\
    \ The next chapter contains several fully worked examples that show how frame-moving\
    \ works.\n\nThere are two basic parts to a <frame_definition>. First, you specify\
    \ either `ROWS` or `RANGE`, and you then specify the boundary of your frame using\
    \ a <frame_start> or <frame_between> section.\n\nA <frame_start> section contains\
    \ one of the following:\n\n*   `UNBOUNDED PRECEDING`\n*   `<expression> PRECEDING`\n\
    *   `CURRENT ROW`\n\nA <frame_between> section is a little more complicated. It\
    \ contains:\n\n```\nBETWEEN  AND \n```\n\nThe <frame_boundary1> and <frame_boundary2>\
    \ sections can each contain one of the following:\n\n*   `<frame_start>`\n*  \
    \ `UNBOUNDED FOLLOWING`\n*   `<expression> FOLLOWING`\n\nIf this seems a little\
    \ complicated, don’t worry. After a little experience with writing <frame_definition>\
    \ sections, it becomes second nature.\n\nAnother way of looking at the entire\
    \ syntax of a <frame_definition> all at once is by using Extended Backus Naur\
    \ Form (EBNF) notation. In EBNF notation, the syntax looks like this:\n\n```\n\
    frame_definition ::= ( ROWS | RANGE ) (\nCURRENT ROW\n| ( UNBOUNDED | 'value_expr'\
    \ ) PRECEDING\n| ( BETWEEN (\nUNBOUNDED PRECEDING\n| CURRENT ROW\n| 'value_expr'\
    \ (PREDEDING|FOLLOWING)\n)\nAND (\nUNBOUNDED FOLLOWING\n| CURRENT ROW\n| 'value_expr'\
    \ (PRECEDING | FOLLOWING)\n)\n)\n)\n```\n\nThere are online tools, such as those\
    \ found at [`http://bottlecaps.de/rr/ui`](http://bottlecaps.de/rr/ui) , that can\
    \ convert EBNF into a railroad diagram that even better visualizes the syntax.\
    \ Figure [4-1](#A454556_1_En_4_Chapter.html#Fig1) shows a railroad diagram for\
    \ the complete <frame_definition> syntax.\n\n![A454556_1_En_4_Fig1_HTML.jpg](A454556_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1.\n\nRailroad diagram of the <frame_definition> syntax\n\nRailroad\
    \ diagrams are useful because you can just follow the paths from one element to\
    \ the next, like a train traveling along railroad tracks, choosing the branch\
    \ you want to follow when the path forks.\n\nPutting it all together, here are\
    \ some examples of valid <frame_definition> sections:\n\n```\nROWS UNBOUNDED PRECEDING\n\
    ROWS CURRENT ROW\nROWS 3 PRECEDING\nROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING\n\
    RANGE BETWEEN 1 PRECEDING AND CURRENT ROW\nROWS BETWEEN CURRENT ROW AND 5 PRECEDING\n\
    ```\n\nTip\n\nSome combinations may seem possible, based on the rules in the syntax\
    \ definition, but are not allowed. For example, using a <frame_definition> like\
    \ this:\n\n```\nROWS BETWEEN 3 FOLLOWING AND CURRENT ROW\n```\n\nwill result in\
    \ the following error:\n\n```\nERROR 4014 (HY000): Unacceptable combination of\
    \ window frame bound specifications\n```\n\nThe solution here is to just switch\
    \ the two boundary definitions around and do this instead:\n\n```\nROWS BETWEEN\
    \ CURRENT ROW AND 3 FOLLOWING\n```\n\nSee the entry on the `SUM()` function later\
    \ in this chapter for a brief look at how window frames work in practice. We’ll\
    \ also be exploring them in greater depth in the following chapters.\n\n### WINDOW\
    \ Clause Syntax\n\nAn alternative to the `OVER` definition in a Window Function\
    \ is to use a `WINDOW` clause between the `FROM` and `ORDER BY` clauses of our\
    \ `SELECT` statement. The syntax of a `WINDOW` clause is as follows:\n\n```\n\
    WINDOW  AS (\n[]\n[]\n[]\n)[,  AS (...)]...\n```\n\nWhen using a `WINDOW` clause,\
    \ replace the `()` after `OVER` in your Window Function, including everything\
    \ that would have been inside it, with <window_name>.\n\nHere’s a hypothetical\
    \ example:\n\n```\nSELECT\noffice, time, amount,\nSUM(amount)OVER window1\nFROM\
    \ my_table\nWINDOW window1 AS (\nPARTITION BY office\nORDER BY time)\nORDER BY\
    \ office,time;\n```\n\nThe purpose of the `WINDOW` clause is to help keep the\
    \ part of the `SELECT` statement between `SELECT` and `FROM` cleaner and easier\
    \ to read. It also helps avoid duplication in cases where multiple Window Functions\
    \ are used that have similar `OVER` clauses.\n\nIf multiple <window_name> sections\
    \ are defined, the later ones are able to inherit from previous ones. For example:\n\
    \n```\nWINDOW\nwindow1 AS (PARTITION BY id),\nwindow2 AS (window1 ORDER BY office),\n\
    window3 AS (window2 ROWS UNBOUNDED PRECEDING)\n```\n\nSo `window2` will effectively\
    \ be:\n\n```\n(PARTITION BY id ORDER BY office)\n```\n\nAnd `window3` will effectively\
    \ be:\n\n```\n(\nPARTITION BY id\nORDER BY office\nROWS UNBOUNDED PRECEDING\n\
    )\n```\n\nThe order of how you add <window_name> sections must follow the rules\
    \ for `OVER` clauses. First, the <partition_definition>, then the <order_definition>,\
    \ and last of all the <frame_definition>.\n\nIt’s also worth noting that a `WINDOW`\
    \ subclause can only inherit a maximum of one other `WINDOW` subclause in its\
    \ definition. For example, you may logically think the following would be valid:\n\
    \n```\nWINDOW\nwindow1 AS (PARTITION BY id),\nwindow2 AS (ORDER BY office),\n\
    window3 AS (window1 window2 ROWS UNBOUNDED PRECEDING)\n```\n\nBut trying to do\
    \ it would give you an error message.\n\nSee Chapter [6](#A454556_1_En_6_Chapter.html)\
    \ for an example of using the `WINDOW` clause to simplify a query.\n\n## Window\
    \ Functions Reference\n\nTo familiarize you with all of the available Window Functions\
    \ in MariaDB and MySQL, the rest of this chapter will go over each of them and\
    \ their syntax.\n\nThis section is meant to be used as a reference when looking\
    \ up a specific Window Function. It is not necessarily meant to be read straight\
    \ through, though you can (and probably should) do that at least once.\n\nSome\
    \ Window Functions don’t exist in any form as a non-Window Function, so they are\
    \ wholly new. Others already existed in MariaDB or MySQL prior to the introduction\
    \ of Window Functions as aggregate functions, like `AVG`. So, while you may have\
    \ seen and used them before, they have a special Window Function form when called\
    \ with an `OVER` clause. The functions are listed alphabetically to make them\
    \ easier to look up.\n\nWindow Functions are available in MariaDB 10.2 and in\
    \ MySQL 8.0 as of the MySQL 8.0.2 DMR.\n\n### AVG()\n\nThe `AVG` aggregate function\
    \ can be used as a Window Function if the `OVER` clause is included. The syntax\
    \ is:\n\n```\nAVG() OVER (\n[]\n[]\n[]\n)\n```\n\nThe `AVG` function returns the\
    \ average of <expres sion> as viewed by the `OVER` clause.\n\n### BIT_AND()\n\n\
    The `BIT_AND` aggregate function can be used as a Window Function if the `OVER`\
    \ clause is included. The syntax is:\n\n```\nBIT_AND() OVER (\n[]\n[]\n[]\n)\n\
    ```\n\nThe `BIT_AND` function returns the bitwise `AND` of the bits of <expression>\
    \ as viewed by the `OVER` clause.\n\n### BIT_OR()\n\nThe `BIT_OR` aggregate function\
    \ can be used as a Window Function if the `OVER` clause is included. The syntax\
    \ is:\n\n```\nBIT_OR() OVER (\n[]\n[]\n[]\n)\n```\n\nThe `BIT_OR` function returns\
    \ the bitwise `OR` of the bits of <expression> as viewed by the `OVER` clause.\n\
    \n### BIT_XOR()\n\nThe `BIT_XOR` aggregate function can be used as a Window Function\
    \ if the `OVER` clause is included. The syntax is:\n\n```\nBIT_XOR() OVER (\n\
    []\n[]\n[]\n)\n```\n\nThe `BIT_XOR` function returns the bitwise `XOR` (exclusive\
    \ `OR`) of the bits of <expression> as viewed by the `OVER` clause.\n\n### COUNT()\n\
    \nThe `COUNT` aggregate function can be used as a Window Function if the `OVER`\
    \ clause is included. The syntax is:\n\n```\nCOUNT() OVER (\n[]\n[]\n[]\n)\n```\n\
    \nThe `COUNT` function returns a count of the number of non-NULL values of <expression>\
    \ as viewed by the `OVER` clause ."
  trans: "\n# 窗口函数语法\n\n## 帧定义语法\n\n`<frame_definition>` 部分的语法如下所示：\n\n```\n{ROWS|RANGE}\n\
    {|}\n```\n\n`<frame_definition>` 部分并非所有窗口函数都支持。其目的是定义一个帧，然后函数使用该帧来计算结果。帧随着当前行移动。除了自身定义的边界外，帧还进一步受\
    \ `<partition_definition>` 部分的限制。\n\n`<frame_definition>` 部分是窗口函数最强大的特性。下一章包含几个完整的示例，展示了帧移动是如何工作的。\n\
