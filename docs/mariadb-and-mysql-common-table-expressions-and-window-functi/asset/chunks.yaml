    ## 分区和排序结果


    数据库最重要的目的之一是组织我们周围堆积如山的数据。`OVER` 子句的 `<partition_definition>` 和 `<order_definition>`
    部分正是为了帮助我们做到这一点。我们在上一章介绍了它们的语法，但在掌握窗口函数的过程中，对这些部分如何工作的实际演示可能比枯燥的语法图更有用。


