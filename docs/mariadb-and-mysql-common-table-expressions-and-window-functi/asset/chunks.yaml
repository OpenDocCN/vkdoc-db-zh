    |    6 | Louise Lewis     | support     | Cleveland |

    +------+------------------+-------------+-----------+

    ```


    查看这个结果，你可能会困惑为什么 `rnum` 列是乱序的。事实上，你的结果可能有完全不同的 `rnum` 列。它可能按顺序从 1 到 15 排列，也可能有完全不同的顺序。这是怎么回事？`rnum`
    列乱序是因为窗口函数是在 `SELECT` 语句的其他部分（在我们的例子中是 `name`, `title`, `office` 列）以及任何 `WHERE`、`HAVING`
    或 `GROUP BY` 子句被获取之后，但在最终的 `ORDER BY title` 子句之前计算的。事实上，如果在 `OVER` 子句中没有 `<order_definition>`
    部分，窗口函数不保证任何特定的顺序。


    理想情况下，我们希望 `rnum` 列始终与 `ORDER BY title` 子句的最终输出匹配。为确保这一点，我们在 `OVER` 子句中添加一个 `<order_definition>`
    部分，如下所示：


    ```

    SELECT

    ROW_NUMBER()

    OVER (

    ORDER BY title

    ) AS rnum,

    name, title, office

    FROM employees

    WHERE office=''Cleveland'' OR office=''Memphis''

    ORDER BY title;

    ```


    现在，`rnum` 列和最终输出都保证按 `title` 列的内容排序，因此结果将始终在逻辑上合理：

