- fmt: '## Before We Begin


    The table used for the examples in this chapter is called `precip` and can be
    created with the following query:


    ```

    CREATE TABLE precip (

    location TEXT,

    day DATE,

    precip FLOAT

    );

    ```


    The data is in a CSV file called `bartholomew-ch07-precip.csv`. It can be loaded
    with a query similar to the following (assuming the file is on the computer running
    MariaDB or MySQL server in the `/tmp/` folder):


    ```

    LOAD DATA INFILE ''/tmp/bartholomew-ch07-precip.csv''

    INTO TABLE precip

    FIELDS TERMINATED BY '',''

    OPTIONALLY ENCLOSED BY ''"'';

    ```


    Note

    See the “Before We Begin” section of Chapter [1](#A454556_1_En_1_Chapter.html)
    for extra information about loading the files on Windows and working around issues
    with `secure_file_priv`.


    We’re now ready to begin.


    ## Compute the Average Time Between Days with Precipitation


    The `precip` table contains data on when it rained, and how much, for the year
    1976 for three cities in North Carolina, USA: Asheville, Raleigh, and Wilmington.
    The data comes from the National Oceanic and Atmospheric Administration (NOAA)
    website at [`https://www.ncdc.noaa.gov/cdo-web/search`](https://www.ncdc.noaa.gov/cdo-web/search).


    One common query when analyzing precipitation or other time-based data is to compute
    what the average time is between events, which for our data means the average
    number of days between when it rains.


    By using a CTE without a Window Function we can, in a slightly convoluted way,
    select from the `precip` table, and then as we walk through our results we use
    the `DATEDIFF` function to determine the number of days between the current date
    and the largest previous date we looked at, using a self-join to ensure that we’re
    looking at the correct data.


    Our completed `<cte_body>` section looks like this:


    ```

    SELECT

    p1.location,

    p1.day, MAX(p2.day),

    DATEDIFF(p1.day, MAX(p2.day)) AS diff

    FROM precip AS p1,

    precip AS p2

    WHERE

    p1.location = p2.location

    AND

    p2.day < p1.day

    GROUP BY p1.day,p1.location

    ORDER BY location;

    ```


    The first ten rows of the output of this query look like this:


    ```

    +------------+------------+-------------+------+

    | location   | day        | MAX(p2.day) | diff |

    +------------+------------+-------------+------+

    | Asheville  | 1976-01-07 | 1976-01-03  |    4 |

    | Asheville  | 1976-01-13 | 1976-01-07  |    6 |

    | Asheville  | 1976-01-16 | 1976-01-13  |    3 |

    | Asheville  | 1976-01-17 | 1976-01-16  |    1 |

    | Asheville  | 1976-01-26 | 1976-01-17  |    9 |

    | Asheville  | 1976-01-27 | 1976-01-26  |    1 |

    | Asheville  | 1976-02-01 | 1976-01-27  |    5 |

    | Asheville  | 1976-02-02 | 1976-02-01  |    1 |

    | Asheville  | 1976-02-15 | 1976-02-02  |   13 |

    | Asheville  | 1976-02-18 | 1976-02-15  |    3 |

    ...

    +------------+------------+-------------+------+

    ```


    For our `<cte_query>` section, we want to `GROUP BY` our `location` column and
    use the `AVG` function to compute the average of the `diff` column. Calling our
    CTE `precip_avg`, here is our completed query:


    ```

    WITH precip_avg AS (

    SELECT

    p1.location,

    p1.day, MAX(p2.day),

    DATEDIFF(p1.day, MAX(p2.day)) AS diff

    FROM precip AS p1,

    precip AS p2

    WHERE

    p1.location = p2.location

    AND

    p2.day < p1.day

    GROUP BY p1.day,p1.location

    ORDER BY location

    )

    SELECT

    location,

    AVG(diff) AS avg_days

    FROM precip_avg

    GROUP BY location

    ORDER BY location;

    ```


    The results are:


    ```

    +------------+----------+

    | location   | avg_days |

    +------------+----------+

    | Asheville  | 3.3611   |

    | Raleigh    | 3.7423   |

    | Wilmington | 3.3645   |

    +------------+----------+

    ```


    This query is good, but we can simplify it by using the `LAG` Window Function
    to eliminate the need to do a self-join.


    As before, we’ll start with the `<cte_body>` section, where instead of the self-join
    we just call the `LAG` function with the `day` column as the value, partitioning
    by `location` and ordering by the `day` column. This query looks like this:


    ```

    SELECT

    location,day,

    LAG(day) OVER (

    PARTITION BY location

    ORDER BY day

    ) AS prev_day

    FROM precip;

    ```


    The output of this query is different than what we got from our self-join version:


    ```

    +------------+------------+------------+

    | location   | day        | prev_day   |

    +------------+------------+------------+

    | Asheville  | 1976-01-03 | NULL       |

    | Asheville  | 1976-01-07 | 1976-01-03 |

    | Asheville  | 1976-01-13 | 1976-01-07 |

    | Asheville  | 1976-01-16 | 1976-01-13 |

    | Asheville  | 1976-01-17 | 1976-01-16 |

    | Asheville  | 1976-01-26 | 1976-01-17 |

    | Asheville  | 1976-01-27 | 1976-01-26 |

    | Asheville  | 1976-02-01 | 1976-01-27 |

    | Asheville  | 1976-02-02 | 1976-02-01 |

    | Asheville  | 1976-02-15 | 1976-02-02 |

    ...

    +------------+------------+------------+

    ```


    The main difference is the addition of the first row with the NULL result for
    the `prev_day` column. The other main difference is that we don’t have a `diff`
    column, because we removed the `DATEDIFF` function.


    Because the output is different, we need to change the `<cte_query>` section a
    bit. We’ll start by adding back the `DATEDIFF` function, this time inside of the
    `AVG` function, and because it is now outside of the `<cte_body>` we can simply
    call it with the `day` column and the new `prev_day` column generated by the `LAG`
    function.


    Our much simpler query now looks like this:


    ```

    WITH precip_avg AS (

    SELECT

    location,day,

    LAG(day) OVER (

    PARTITION BY location

    ORDER BY day

    ) AS prev_day

    FROM precip

    )

    SELECT location,

    AVG(DATEDIFF(day, prev_day)) AS avg_day

    FROM precip_avg

    GROUP BY location;

    ```


    Our query has only gone from 19 lines to 13, but the readability is much better
    without the confusing self-join in place. More importantly, the result is the
    same, and a by-product of removing the self-join is a nice performance boost.
    Or at least we would see a performance boost if our table were larger; our data
    set is simply too small to see much of a difference.'
