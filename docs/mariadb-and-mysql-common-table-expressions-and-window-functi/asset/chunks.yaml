    # 1. Basics of Common Table Expressions


    Common Table Expressions (CTEs) are one of the new SQL features introduced in
    MariaDB 10.2 and MySQL 8.0\. This chapter will introduce CTEs, describe the two
    types, and explain the basic syntax. CTEs are named temporary result sets that
    only last for the duration of the query they are in. In some respects, they are
    similar to derived tables, but they are more powerful. They can refer to themselves
    recursively and can be referenced multiple times in the same query. They also
    enable column grouping and can be used as an alternative to views without our
    needing the `CREATE VIEW` permission. CTEs were first introduced as part of the
    SQL99 standard.'
