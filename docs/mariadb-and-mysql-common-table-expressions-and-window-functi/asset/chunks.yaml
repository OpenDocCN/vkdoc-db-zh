    window3 AS (window1 window2 ROWS UNBOUNDED PRECEDING)\n```\n\n但尝试这样做会给出错误消息。\n\
    \n有关使用 `WINDOW` 子句简化查询的示例，请参见第 6 章。\n\n## 窗口函数参考\n\n为了让你熟悉 MariaDB 和 MySQL 中所有可用的窗口函数，本章的剩余部分将逐一介绍它们及其语法。\n\
    \n本节旨在作为查找特定窗口函数时的参考。虽然你可能（并且可能应该）至少通读一遍，但它不一定是用来从头到尾阅读的。\n\n有些窗口函数作为非窗口函数的任何形式都不存在，因此它们是全新的。其他函数在引入窗口函数之前已经作为聚合函数存在于\
    \ MariaDB 或 MySQL 中，例如 `AVG`。因此，虽然你以前可能见过并使用过它们，但当使用 `OVER` 子句调用时，它们具有特殊的窗口函数形式。函数按字母顺序列出，以便于查找。\n\
    \n窗口函数在 MariaDB 10.2 和 MySQL 8.0（自 MySQL 8.0.2 DMR 起）中可用。\n\n### AVG()\n\n如果包含\
    \ `OVER` 子句，`AVG` 聚合函数可用作窗口函数。语法是：\n\n```\nAVG() OVER (\n[]\n[]\n[]\n)\n```\n\n\
    `AVG` 函数返回由 `OVER` 子句视图中的 `<expression>` 的平均值。\n\n### BIT_AND()\n\n如果包含 `OVER`\
    \ 子句，`BIT_AND` 聚合函数可用作窗口函数。语法是：\n\n```\nBIT_AND() OVER (\n[]\n[]\n[]\n)\n```\n\
    \n`BIT_AND` 函数返回由 `OVER` 子句视图中的 `<expression>` 的位的按位 `AND`。\n\n### BIT_OR()\n\n\
    如果包含 `OVER` 子句，`BIT_OR` 聚合函数可用作窗口函数。语法是：\n\n```\nBIT_OR() OVER (\n[]\n[]\n[]\n\
    )\n```\n\n`BIT_OR` 函数返回由 `OVER` 子句视图中的 `<expression>` 的位的按位 `OR`。\n\n### BIT_XOR()\n\
    \n如果包含 `OVER` 子句，`BIT_XOR` 聚合函数可用作窗口函数。语法是：\n\n```\nBIT_XOR() OVER (\n[]\n[]\n\
    []\n)\n```\n\n`BIT_XOR` 函数返回由 `OVER` 子句视图中的 `<expression>` 的位的按位 `XOR`（异或）。\n\n\
    ### COUNT()\n\n如果包含 `OVER` 子句，`COUNT` 聚合函数可用作窗口函数。语法是：\n\n```\nCOUNT() OVER (\n\
    []\n[]\n[]\n)\n```\n\n`COUNT` 函数返回由 `OVER` 子句视图中的 `<expression>` 的非 `NULL` 值的计数。\n"
- fmt: '### `CUME_DIST()`


    `CUME_DIST()`函数的语法是：


    ```

    CUME_DIST() OVER (

    [  ]

    [  ]

    )

    ```


    `CUME_DIST()`函数返回行的累积分布值。该值使用以下公式计算：


    ```

    (行数 <= 当前行) / (总行数)

    ```


    例如，在值`''1,2,2,3,4''`上使用`CUME_DIST()`，结果如下：


    ```

    +-------+--------------+

    | value | cume_dist    |

    +-------+--------------+

    |     1 | 0.2000000000 |

    |     2 | 0.6000000000 |

    |     2 | 0.6000000000 |

    |     3 | 0.8000000000 |

    |     4 | 1.0000000000 |

    +-------+--------------+

    ```


    ### `DENSE_RANK()`


    `DENSE_RANK()`函数的语法是：


    ```

    DENSE_RANK() OVER (

    [  ]

    [  ]

    )

    ```


    `DENSE_RANK()`函数为给定行显示一个从`1`开始的编号，并遵循`<order_definition>`和`<partition_definition>`部分。相同的值会被赋予相同的结果。与`RANK()`函数不同，`DENSE_RANK()`函数在为相同值赋予相同结果后继续编号时不会跳过数字。


    例如，在值`''1,2,2,3,4''`上使用`DENSE_RANK()`，结果如下：


    ```

    +-------+------------+

    | value | dense_rank |

    +-------+------------+

    |     1 |          1 |

    |     2 |          2 |

    |     2 |          2 |

    |     3 |          3 |

    |     4 |          4 |

    +-------+------------+

    ```


    因为`DENSE_RANK()`不跳过值，所以结果最终与`value`列相同。


    ### `FIRST_VALUE()`


    `FIRST_VALUE()`函数的语法是：


    ```

    FIRST_VALUE() OVER (

    [  ]

    [  ]

    )

    ```


    `FIRST_VALUE()`函数返回`OVER`子句视图中的第一行结果。


    ### `LAG()`


    `LAG()`函数的语法是：


    ```

    LAG([,][,]) OVER (

    [  ]

    [  ]

    )

    ```


    `LAG()`函数返回`<expression>`的值，该值偏移给定的`<offset>`量至当前行之前。如果值为`NULL`，可以选择返回`<default>`值代替。如果未指定`<offset>`，则默认为`1`。


    `<default>`参数仅在MySQL 8.0.2或更高版本中可用；截至MariaDB 10.2.8，它在MariaDB中尚不可用。


    ### `LAST_VALUE()`


    `LAST_VALUE()`函数的语法是：


    ```

    LAST_VALUE() OVER (

    [  ]

    [  ]

    )

    ```


    `LAST_VALUE()`函数返回`OVER`子句视图中的最后一行结果。


    ### `LEAD()`


    `LEAD()`函数的语法是：


    ```

    LEAD([,][,]) OVER (

    [  ]

    [  ]

    )

    ```


    `LEAD()`函数返回`<expression>`的值，该值偏移给定的`<offset>`量至当前行之后。如果值为`NULL`，可以选择返回`<default>`值代替。如果未指定`<offset>`，则默认为`1`。


    `<default>`参数仅在MySQL 8.0.2或更高版本中可用；截至MariaDB 10.2.8，它在MariaDB中尚不可用。


    ### `NTH_VALUE()`


    `NTH_VALUE()`函数的语法是：


    ```

    NTH_VALUE(, ) OVER (

    [  ]

    [  ]

    )

    ```


    `NTH_VALUE()`函数返回在`OVER`子句中定义的第n行结果的值。


    例如，如果我们有一个包含`key`和`a`两列的表，其值如下：


    ```

    +-----+------+

    | key | a    |

    +-----+------+

    |   1 |    0 |

    |   2 |    0 |

    |   3 |    0 |

    |   4 |    1 |

    |   5 |    1 |

    |   6 |    1 |

    |   7 |    2 |

    |   8 |    2 |

    |   9 |    2 |

    |  10 |    2 |

    |  11 |    2 |

    +-----+------+

    ```


    如果我们调用`NTH_VALUE(key, a + 1) OVER (PARTITION BY a ORDER BY key)AS a1`，结果如下：


    ```

    +-----+------+------+

    | key | a    | a1   |

    +-----+------+------+

    |   1 |    0 |    1 |

    |   2 |    0 |    1 |

    |   3 |    0 |    1 |

    |   4 |    1 | NULL |

    |   5 |    1 |    5 |

    |   6 |    1 |    5 |

    |   7 |    2 | NULL |

    |   8 |    2 | NULL |

    |   9 |    2 |    9 |

    |  10 |    2 |    9 |

    |  11 |    2 |    9 |

    +-----+------+------+

    ```


    因为我们按列`a`分区，所以函数仅基于该分区中的行进行评估。因此，在第4行，偏移量`a + 1`等于2，但由于函数尚未处理第5行，该分区的第二行没有值，因此返回的值是`NULL`。第三个分区的情况相同，只是在该情况下`<nth_expression>`等于3，因此需要等到第三行被处理后才会返回非`NULL`结果。


    ### `NTILE`


    `NTILE()`函数的语法是：


    ```

    NTILE () OVER (

    [  ]

    [  ]

    )

    ```


    此函数返回一个整数，指示某一行所在的组。组的数量由`<ntile_expression>`部分指定，编号从1开始。分区中的有序行被划分为指定数量的组，每组的大小尽可能与其他组相等。


    例如，在值`''1,2,2,3,4''`上使用`NTILE(2)`，结果如下：


    ```

    +-------+----------+

    | value | ntile(2) |

    +-------+----------+

    |     1 |        1 |

    |     2 |        1 |

    |     2 |        1 |

    |     3 |        2 |

    |     4 |        2 |

    +-------+----------+

    ```


    在相同值上使用`NTILE(3)`的结果如下：


    ```

    +-------+----------+

    | value | ntile(3) |

    +-------+----------+

    |     1 |        1 |

    |     2 |        1 |

    |     2 |        2 |

    |     3 |        2 |

    |     4 |        3 |

    +-------+----------+

    ```


    ### `PERCENT_RANK()`


    `PERCENT_RANK()`函数的语法是：


    ```

    PERCENT_RANK() OVER (

    [  ]

    [  ]

    )

    ```


    `PERCENT_RANK()`函数返回给定行的相对百分比排名。用于计算百分比排名的公式是：


    ```

    (rank - 1) / (窗口或分区中的行数 - 1)

    ```


    例如，在值`''1,2,2,3,4''`上使用`PERCENT_RANK()`，结果如下：


    ```

    +-------+--------------+

    | value | percent_rank |

    +-------+--------------+

    |     1 | 0.0000000000 |

    |     2 | 0.2500000000 |

    |     2 | 0.2500000000 |

    |     3 | 0.7500000000 |

    |     4 | 1.0000000000 |

    +-------+--------------+

    ```


    ### `RANK()`


    `RANK()`函数的语法是：


    ```

    RANK() OVER (

    [  ]

    [  ]

    )

    ```


    `RANK()`函数为给定行显示一个从`1`开始的编号，并遵循`<order_definition>`和`<partition_definition>`部分。相同的值会被赋予相同的结果，当在赋予相同结果后恢复编号时，会跳过值，从下一个非相同结果开始编号。


    例如，在值`''1,2,2,3,4''`上使用`RANK()`，结果如下：


    ```

    +-------+------+

    | value | rank |

    +-------+------+

    |     1 |    1 |

    |     2 |    2 |

    |     2 |    2 |

    |     3 |    4 |

    |     4 |    5 |

    +-------+------+

    ```


    因为`RANK()`跳过值，所以在两行值=2之后恢复排名时，结果跳过了第三个排名，直接到第四个。


    ### `ROW_NUMBER()`


    `ROW_NUMBER()`函数的语法是：


    ```

    ROW_NUMBER() OVER (

    [  ]

    [  ]

    )

    ```


    `ROW_NUMBER()`函数类似于`RANK()`和`DENSE_RANK()`函数，但后两者会根据`ORDER BY`为匹配行分配相同的编号，而`ROW_NUMBER()`函数总是为每一行递增计数。


    例如，在值`''1,2,2,3,4''`上使用`ROW_NUMBER()`，结果如下：


    ```

    +-------+------------+

    | value | row_number |

    +-------+------------+

    |     1 |          1 |

    |     2 |          2 |

    |     2 |          3 |

    |     3 |          4 |

    |     4 |          5 |

    +-------+------------+

    ```'
  raw: '### CUME_DIST()


    The syntax for the `CUME_DIST` function is:


    ```

    CUME_DIST() OVER (

    [  ]

    [  ]

    )

    ```


    The `CUME_DIST` function returns the cumulative distribution of a row. The value
    is calculated using the following formula:


    ```

    (number of rows <= current row) / (total rows)

    ```


    For example, when using `CUME_DIST` on the values `''1,2,2,3,4''` the results
    would be as follows:


    ```

    +-------+--------------+

    | value | cume_dist    |

    +-------+--------------+

    |     1 | 0.2000000000 |

    |     2 | 0.6000000000 |

    |     2 | 0.6000000000 |

    |     3 | 0.8000000000 |

    |     4 | 1.0000000000 |

    +-------+--------------+

    ```


    ### DENSE_RANK()


    The syntax for the `DENSE_RANK` function is:


    ```

    DENSE_RANK() OVER (

    [  ]

    [  ]

    )

    ```


    The `DENSE_RANK` function displays a number for a given row, beginning with `1`,
    and following the <order_definition> and <partition_definition> sections. Identical
    values are given the same result. Unlike the `RANK` function, the `DENSE_RANK`
    function does not skip numbers when it resumes numbering results following giving
    identical values to the same result.


    For example, when using `DENSE_RANK` on the values `''1,2,2,3,4''` the results
    would be:


    ```

    +-------+------------+

    | value | dense_rank |

    +-------+------------+

    |     1 |          1 |

    |     2 |          2 |

    |     2 |          2 |

    |     3 |          3 |

    |     4 |          4 |

    +-------+------------+

    ```


    Because `DENSE_RANK` doesn’t skip values, the result ends up being identical to
    the `value` column.


    ### FIRST_VALUE()


    The syntax for the `FIRST_VALUE` function is:


    ```

    FIRST_VALUE() OVER (

    [  ]

    [  ]

    )

    ```


    The `FIRST_VALUE` function returns the first row of the results as viewed by the
    `OVER` clause.


    ### LAG()


    The syntax for the `LAG` function is:


    ```

    LAG([,][,]) OVER (

    [  ]

    [  ]

    )

    ```


    The `LAG` function returns the value of <expression> offset by the given <offset>
    amount before the current row. If the value is NULL, it can optionally return
    a <default> value instead. If <offset> is not specified, it defaults to `1`.


    The <default> argument is only available on MySQL 8.0.2 or later; it is not yet
    available in MariaDB as of MariaDB 10.2.8.


    ### LAST_VALUE()


    The syntax for the `LAST_VALUE` function is:


    ```

    LAST_VALUE() OVER (

    [  ]

    [  ]

    )

    ```


    The `LAST_VALUE` function returns the last row of the results as viewed by the
    `OVER` clause.


    ### LEAD()


    The syntax for the `LEAD` function is:


    ```

    LEAD([,][,]) OVER (

    [  ]

    [  ]

    )

    ```


    The `LEAD` function returns the value of <expression> offset by the given <offset>
    amount after the current row. If the value is NULL, it can optionally return a
    <default> value instead. If <offset> is not specified it defaults to `1`.


    The <default> argument is only available on MySQL 8.0.2 or later; it is not yet
    available in MariaDB as of MariaDB 10.2.8.


    ### NTH_VALUE()


    The syntax for the `NTH_VALUE` function is:


    ```

    NTH_VALUE(, ) OVER (

    [  ]

    [  ]

    )

    ```


    The `NTH_VALUE` function returns the value that is the nth row of the result as
    defined in the `OVER` clause.


    For example, if we have a table with two columns, `key` and `a`, which have the
    following values:


    ```

    +-----+------+

    | key | a    |

    +-----+------+

    |   1 |    0 |

    |   2 |    0 |

    |   3 |    0 |

    |   4 |    1 |

    |   5 |    1 |

    |   6 |    1 |

    |   7 |    2 |

    |   8 |    2 |

    |   9 |    2 |

    |  10 |    2 |

    |  11 |    2 |

    +-----+------+

    ```


    if we call `NTH_VALUE(key, a + 1) OVER (PARTITION BY a ORDER BY key)AS a1` the
    result is as follows:


    ```

    +-----+------+------+

    | key | a    | a1   |

    +-----+------+------+

    |   1 |    0 |    1 |

    |   2 |    0 |    1 |

    |   3 |    0 |    1 |

    |   4 |    1 | NULL |

    |   5 |    1 |    5 |

    |   6 |    1 |    5 |

    |   7 |    2 | NULL |

    |   8 |    2 | NULL |

    |   9 |    2 |    9 |

    |  10 |    2 |    9 |

    |  11 |    2 |    9 |

    +-----+------+------+

    ```


    Because we are partitioning on column `a`, the function evaluates based only on
    the rows in that partition. So, at row 4, the offset a + 1 equals 2, but because
    the function hasn’t processed row 5 yet there is no value for the second row of
    that partition, so the value returned is NULL. The same thing happens with the
    third partition, only in that case the <nth_expression> equals 3 so it takes until
    the third row is processed before a non-NULL result is returned.


    ### NTILE


    The syntax for the `NTILE` function is:


    ```

    NTILE () OVER (

    [  ]

    [  ]

    )

    ```


    This function returns an integer indicating the group a certain row is in. The
    number of groups is specified by the <ntile_expression> part, and the numbering
    starts at 1\. Ordered rows in the partition are divided into the specified number
    of groups, with each group being as equal in size to the other groups as possible.


    For example, when using `NTILE(2)` on the values `''1,2,2,3,4''` the results would
    be:


    ```

    +-------+----------+

    | value | ntile(2) |

    +-------+----------+

    |     1 |        1 |

    |     2 |        1 |

    |     2 |        1 |

    |     3 |        2 |

    |     4 |        2 |

    +-------+----------+

    ```


    And the result using `NTILE(3)` on those same values would be:


    ```

    +-------+----------+

    | value | ntile(3) |

    +-------+----------+

    |     1 |        1 |

    |     2 |        1 |

    |     2 |        2 |

    |     3 |        2 |

    |     4 |        3 |

    +-------+----------+

    ```


    ### PERCENT_RANK()


    The syntax for the `PERCENT_RANK` function is:


    ```

    PERCENT_RANK() OVER (

    [  ]

    [  ]

    )

    ```


    The `PERCENT_RANK` function returns the relative percent rank of a given row.
    The formula used to calculate the percent rank is:


    ```

    (rank - 1) / (number of rows in the window or partition - 1)

    ```


    For example, when using `PERCENT_RANK` on the values `''1,2,2,3,4''` the results
    would be:


    ```

    +-------+--------------+

    | value | percent_rank |

    +-------+--------------+

    |     1 | 0.0000000000 |

    |     2 | 0.2500000000 |

    |     2 | 0.2500000000 |

    |     3 | 0.7500000000 |

    |     4 | 1.0000000000 |

    +-------+--------------+

    ```


    ### RANK()


    The syntax for the `RANK` function is:


    ```

    RANK() OVER (

    [  ]

    [  ]

    )

    ```


    The `RANK` function displays a number for a given row, beginning with `1`, and
    following the <order_definition> and <partition_definition> sections. Identical
    values are given the same result, with numbering resuming at the next non-identical
    result, skipping values.


    For example, when using `RANK` on the values `''1,2,2,3,4''` the results would
    be:


    ```

    +-------+------+

    | value | rank |

    +-------+------+

    |     1 |    1 |

    |     2 |    2 |

    |     2 |    2 |

    |     3 |    4 |

    |     4 |    5 |

    +-------+------+

    ```


    Because `RANK` skips values, the result skips the third rank and jumps to the
    fourth when it resumes ranking after the two rows where value=2.


    ### ROW_NUMBER()


    The syntax for the `ROW_NUMBER` function is:


    ```

    ROW_NUMBER() OVER (

    [  ]

    [  ]

    )

    ```


    The `ROW_NUMBER()` function is similar to the `RANK()` and `DENSE_RANK()` functions,
    but where those functions will assign the same number to matching rows based on
    `ORDER BY`, the `ROW_NUMBER` function always increases the count for every row.


    For example, when using `ROW_NUMBER` on the values `''1,2,2,3,4''` the results
    would be:


    ```

    +-------+------------+

    | value | row_number |

    +-------+------------+

    |     1 |          1 |

    |     2 |          2 |

    |     2 |          3 |

    |     3 |          4 |

    |     4 |          5 |

    +-------+------------+

    ```'
