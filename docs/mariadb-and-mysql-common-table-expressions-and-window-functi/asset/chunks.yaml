    部分，如下所示：


    ```

    SELECT

    ROW_NUMBER()

    OVER (

    ORDER BY title

    ) AS rnum,

    name, title, office

    FROM employees

    WHERE office=''Cleveland'' OR office=''Memphis''

    ORDER BY title;

    ```


    现在，`rnum` 列和最终输出都保证按 `title` 列的内容排序，因此结果将始终在逻辑上合理：'
  raw: '### SUM()


    The `SUM` aggregate function can be used as a Window Function if the `OVER` clause
    is included. The syntax is:


    ```

    SUM() OVER (

    []

    []

    []

    )

    ```


    The `SUM` function returns the sum of the rows from <expression> as viewed by
    the `OVER` clause.


    As an example of how Window Functions like `SUM` work with <frame_definition>
    sections, here is a brief example. Given a table, `my_table`, with a column, `value`,
    that contains the values `1,2,2,3,4`, we can use the `SUM` function to easily
    add the current row with the previous two rows, if any, like so:


    ```

    SELECT value,

    SUM(value) OVER (

    ORDER BY value

    ROWS

    BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS sum

    FROM my_table

    ORDER BY value;

    ```


    The result of the preceding query is:


    ```

    +-------+------+

    | value | sum  |

    +-------+------+

    |     1 | 1    |

    |     2 | 3    |

    |     2 | 5    |

    |     3 | 7    |

    |     4 | 9    |

    +-------+------+

    ```


    Let’s step through the result line by line.


    For line 1, the value is 1, and there are no previous rows, so the frame the `SUM`
    function is looking at only contains the first line of the result, which is 1.


    For line 2, the value is 2, and there is one previous row, so the frame the `SUM`
    function is looking at only contains lines 1 and 2, or (1+2), or 3.


    For line 3, the value is 2, and there are two previous rows, so the frame the
    `SUM` function is looking at contains lines 1, 2, and 3 of the result, or 1+2+2,
    or 5.


    For line 4, the value is 3, and there are three previous rows, but the frame only
    contains the current row and the previous two rows, so the lines the `SUM` function
    is looking at contains lines 2, 3, and 4, or (2+2+3), or 7.


    Line 5 is calculated the same way as for line 4, but the values being added together
    are (2+3+4), or 9.


    ## Summary


    In this chapter, we covered the basic syntax of Window Functions, breaking them
    down into their component parts and then going through each part separately. We
    also went through all of the available Window Functions, describing each one and
    what they are used for, with simple examples where appropriate to illustrate how
    they work. We’ll cover more examples in the following chapters, including demonstrating
    frames and how they are used.


    # 5. Recognizing Opportunities for Window Functions


    The previous chapter was an overview of what Window Functions are, with details
    on the syntax. It’s time to put that knowledge into practice. This chapter expands
    upon that with some simple yet practical examples that illustrate some of the
    types of problems Window Functions are good at solving. We’ll cover organizing
    results, maintaining running totals, and ranking results.


    Caution


    If you are using MySQL 8.0, you must be on at least version 8.0.2\. This was the
    version that introduced Window Functions. Previous versions of MySQL, including
    MySQL 8.0.0 and 8.0.1, do not have Window Functions.


    All versions of MariaDB 10.2 and higher have Window Functions.


    ## Partitioning and Ordering Results


    One of the most important purposes of a database is to organize the mountains
    of data that surround us. The <partition_definition> and <order_definition> sections
    of the `OVER` clause exist to help us do just that. We covered their syntax in
    the previous chapter, but some practical demonstrations of how these sections
    work is probably more useful than a dry syntax diagram on the path to mastering
    Window Functions.


    Using the `employees` table from Chapter [1](#A454556_1_En_1_Chapter.html), here
    is a simple example of the `ROW_NUMBER` Window Function. First, we’ll call the
    function with none of the optional sections in the `OVER` clause:


    ```

    SELECT

    ROW_NUMBER() OVER() AS rnum,

    name, title, office

    FROM employees

    WHERE office=''Cleveland'' OR office=''Memphis''

    ORDER BY title;

    ```


    The result is a little unexpected:


    ```

    +------+------------------+-------------+-----------+

    | rnum | name             | title       | office    |

    +------+------------------+-------------+-----------+

    |    1 | Eileen Morrow    | dba         | Cleveland |

    |    3 | Douglas Williams | dba         | Memphis   |

    |    8 | Carol Monreal    | dba         | Cleveland |

    |   14 | Elva Garcia      | dba         | Memphis   |

    |    5 | Rosemary Bowers  | manager     | Cleveland |

    |   12 | Richard Delgado  | manager     | Memphis   |

    |    2 | Julius Ramos     | salesperson | Cleveland |

    |    7 | Tammy Castro     | salesperson | Memphis   |

    |    9 | Joyce Beck       | salesperson | Memphis   |

    |   10 | Alonzo Page      | salesperson | Cleveland |

    |   11 | Tina Jefferson   | salesperson | Cleveland |

    |   13 | Leo Gutierrez    | salesperson | Cleveland |

    |   15 | Joann Smith      | salesperson | Memphis   |

    |    4 | Janet Edwards    | support     | Memphis   |

    |    6 | Louise Lewis     | support     | Cleveland |

    +------+------------------+-------------+-----------+

    ```


    Looking at this result, you might be confused as to why the `rnum` column is out
    of order. In fact, your result may have a different `rnum` column entirely. It
    may be in order from 1 to 15, or it may have a completely different order. What
    is going on? The out-of-order `rnum` column happens because Window Functions are
    computed after the other parts of the `SELECT` statement have been fetched (the
    `name`, `title`, and `office` columns in our example) and after any `WHERE`, `HAVING`,
    or `GROUP BY` clauses, but before the final `ORDER BY title` clause. In fact,
    without an <order_definition> section in the `OVER` clause, Window Functions do
    not guarantee any particular ordering.


    Ideally, we want the `rnum` column to always match the end output of the `ORDER
    BY title` clause. To ensure this happens, we add an <order_definition> section
    to the `OVER` clause like so:


    ```

    SELECT

    ROW_NUMBER()

    OVER (

    ORDER BY title

    ) AS rnum,

    name, title, office

    FROM employees

    WHERE office=''Cleveland'' OR office=''Memphis''

    ORDER BY title;

    ```


    Now both the `rnum` column and the final output are guaranteed to be ordered by
    the contents of the `title` column, so the result will always make logical sense:'
