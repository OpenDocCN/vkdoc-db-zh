    ```


    实际上，`departing` 列名不太合理，因为它保存的是我们的路径，而不是初始出发城市，所以在实际的 CTE 中我们将其称为 `path`。


    我们现在准备好编写 CTE 了吗？其实，还没有！还有另一个问题我们应该先解决。再次查看图 3-1；我们能做些什么来防止像下面这样愚蠢的结果？


    ```

    Raleigh > Washington > New York > Washington > Raleigh > Miami

    ```


    这是一个完全有效的路径，但任何理智的人都不会走这条路线。如果我们想从 Raleigh 去 Miami，我们会走那条路线；我们绝不会先去纽约，然后经由 Raleigh
    返回再去 Miami。我们能做些什么来防止这种情况？`LOCATE()` 函数提供了一个简单的方法。它在字符串中搜索给定的子字符串，如果未找到子字符串则返回
    `0`。所以，我们只需在 `<递归>` 部分的 `WHERE` 子句中添加类似以下的内容：


    ```

    LOCATE(routes.arriving, .paths)=0

    ```


    我们当然会将 `<cte_name>` 替换为实际 CTE 的名称。


    让我们尝试将所有内容整合到一个名为 `full_routes` 的 CTE 中：


    ```

    WITH RECURSIVE full_routes AS (

    SELECT departing AS path, arriving

    FROM routes

    WHERE departing=''Raleigh''

    UNION

    SELECT

    CONCAT(full_routes.path, '' > '',

    routes.arriving),

    routes.arriving

    FROM full_routes, routes

    WHERE

    full_routes.arriving=routes.departing

    AND

    LOCATE(routes.arriving, full_routes.path)=0

    ) SELECT * FROM full_routes;

    ```


    这个 CTE 看起来合理，但当我们运行它时，结果显然是错误的：


    ```

    +-------------------------------------------+------------+

    | path                                      | arriving   |

    +-------------------------------------------+------------+

    | Raleigh                                   | Washington |

    | Raleigh                                   | Atlanta    |

    | Raleigh                                   | Miami      |

    | Raleigh > Chicago                         | Chicago    |

    | Raleigh > New York                        | New York   |

    | Raleigh > Miami                           | Miami      |

    | Raleigh > Chicago > New York              | New York   |

    | Raleigh > New York > Washington           | Washington |

    | Raleigh > New York > Toronto              | Toronto    |

    | Raleigh > Chicago > New York > Washington | Washington |

    | Raleigh > Chicago > New York > Toronto    | Toronto    |

    +-------------------------------------------+------------+

    ```


    这是怎么回事？我们期望的 Raleigh > Washington, Raleigh > Atlanta, 和 Raleigh > Miami 路径在哪里？而且，没有办法直接从
    Raleigh 到 Chicago，因为你需要先经过 Washington。实际上，所有路径都缺少一站。


    如果我们仔细看看递归 CTE 的逻辑，原因就清楚了。


    在 `<递归>` 部分的第一次运行期间，我们的 `WHERE` 子句正在 `arriving` 列中查找那些也出现在 `routes` 表 `departing`
    列中的城市。在初始循环结果集时，我们的递归 CTE 只能访问 `<锚定>` 部分返回的内容，即 Washington、Atlanta 和 Miami 这三个城市。正如我们所要求的，我们的递归
    CTE 首先在 `routes` 表中查找 `departing` 列为 Washington 的行，它找到的第一个结果是 Washington 到 Chicago
    的条目。然后它尽职地将 Chicago 连接到 `path` 列的值（即 Raleigh）之后，作为新的结果行。这就是为什么我们输出的第四行是：


    ```

    +-------------------+----------+

    | path              | arriving |

    +-------------------+----------+

    | Raleigh > Chicago | Chicago  |

    +-------------------+----------+

    ```


    要解决这个问题，我们需要以某种方式设置我们的 `<锚定>`，使起点仅为 Raleigh。然后，在第一次运行期间，它将正确地将 Washington、Atlanta
    和 Miami 连接到路径后面。如果我们的 `<锚定>` 不返回 Raleigh 的实际连接，而是再次选择 `departing` 列并告诉 CTE 那是
    `arriving` 列会怎样？这似乎有点取巧，但 SQL 是完全有效的：


    ```

    SELECT departing AS path, departing AS arriving

    FROM routes

    WHERE departing=''Raleigh'';

    ```


    重要的是，这个查询的结果包含一个应该完全可以作为我们 `<锚定>` 的结果：


    ```

    +---------+----------+

    | path    | arriving |

    +---------+----------+

    | Raleigh | Raleigh  |

    | Raleigh | Raleigh  |

    | Raleigh | Raleigh  |

    +---------+----------+

    ```


    将我们新的 `<锚定>` 放入 `full_routes` CTE 后，它现在看起来像这样：


    ```

    WITH RECURSIVE full_routes AS (

    SELECT departing AS path, departing AS arriving

    FROM routes

    WHERE departing=''Raleigh''

    UNION

    SELECT

    CONCAT(full_routes.path, '' > '',

    routes.arriving),

    routes.arriving

    FROM full_routes, routes

    WHERE

    full_routes.arriving=routes.departing

    AND

    LOCATE(routes.arriving, full_routes.path)=0

    ) SELECT * FROM full_routes;

    ```


    而结果正是我们所期望的：'
