  \n## 引言\n\n在软件领域，有标准以及这些标准的实现。有时，实现先行，由渴望推动技术发展的开发者引入特性，之后才被正式标准化。另一些时候，标准先行，由供应商、开发者等共同制定并达成一致，然后标准的实现——有些忠实，有些则不那么忠实——再进入生产软件。\n\
  \n公用表表达式（`CTE`）和窗口函数在 `ANSI SQL` 标准中已存在很长时间。`CTE` 早在 `SQL99` 版本的标准中就已引入，而窗口函数则是在\
  \ `SQL2003` 版本中引入。其他数据库系统较早地实现了这两者。`Oracle`、`SQL Server`、`PostgreSQL`，甚至 `SQLite`\
  \ 都已有多年这些特性的实现。\n\n`MariaDB` 和 `MySQL` 稍晚一些，但它们现在也有了符合标准的窗口函数和公用表表达式实现。`MariaDB`\
  \ 在其 `MariaDB 10.2` 版本中添加了这些功能，该版本于 2017 年 5 月宣布为稳定版（`GA`）。`MySQL` 正在其即将发布的 `8.0`\
  \ 版本中引入这些功能，在我撰写本文时，该版本正处于发布候选阶段。这两个实现是各自独立开发的，但都紧密遵循标准，因此它们之间的兼容性良好。一般而言，在 `MariaDB`\
  \ 中能运行的查询很可能也能在 `MySQL` 中运行，反之亦然。不过，存在一些差异，本书会在遇到时加以说明。\n\n## 语法\n\n本书中的语法定义遵循以下约定：\n\
  \n*   `< >` —— 尖括号包围元素，其名称由你提供。括号本身不是语法的一部分，不应包含在内。\n*   `[ ]` —— 方括号包围可选元素。是否包含它们取决于你的选择。括号本身不是语法的一部分，不应包含在内。\n\
  *   `|` —— 管道符或竖线分隔元素组。你选择你想在语句中包含的哪个元素。管道符本身不是语法的一部分，不应包含在内。\n*   `…` —— 省略号或连续三个句点，表示前面的部分可以重复。省略号本身不是语法的一部分，不应包含在内。\n\
  *   `( )` —— 圆括号，当它们出现时，是语法的一部分，通常必须包含在你的 SQL 语句中。\n\n以 `大写字母` 书写的单词是关键字。它们可以以 `大写`\
  \ 或 `小写` 形式书写，但必须按所示书写。它们通常也不应（在某些情况下不能）用作表、函数和其他你命名的元素的名称。\n\n以 `小写字母` 书写的单词代表你提供的值。根据所编写的\
  \ SQL 语句的需要，它们可以是整数、语句或 SQL 语句的其他元素。\n\n## 致谢\n\n我要感谢 `MariaDB` 的 Sergey Petrunia、Vicențiu\
  \ Ciorbaru 以及其他人，他们对本书中的示例提供了很大帮助。我还要感谢 `Apress` 的 Jonathan Gennick、Jill Balzano\
  \ 以及其他出色的工作人员，他们指导本书从概念到完成。\n\n最后，我要感谢 Monty、Rasmus 以及 `MariaDB` 和 `MySQL` 的众多开发者和用户。通过合作，我们创造了美好的事物。\n\
