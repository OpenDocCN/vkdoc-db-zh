  \n\n### 维护运行总计\n\n另一个常见的数据库任务是维护某个值的**运行总计**。这可以是账户余额、一段时间内售出的物品数量，或其他各种数值。\n\n\
  我们可以使用第 2 章中用过的 `commissions` 表来演示这个概念。该表记录了我们虚构公司销售人员的佣金。它记录了销售员 ID、佣金 ID、佣金金额以及佣金日期。\n\
  \n通过以下查询可以查看一个简短的样本数据：\n```sql\nSELECT\ncommission_date AS date,\nsalesperson_id\
  \ as sp,\ncommission_id as id,\ncommission_amount as amount\nFROM commissions\n\
  ORDER BY sp,date;\n```\n\n完整的输出非常长，但以下是前 10 行输出：\n```\n+------------+----+-------+--------+\n\
  | date       | sp | id    | amount |\n+------------+----+-------+--------+\n| 2016-01-21\
  \ |  3 | 15165 | 429.50 |\n| 2016-02-09 |  3 | 15231 | 142.37 |\n| 2016-02-12 |\
  \  3 | 15253 | 184.74 |\n| 2016-03-22 |  3 | 15428 | 169.62 |\n| 2016-04-01 |  3\
  \ | 15476 | 363.53 |\n| 2016-05-10 |  3 | 15644 | 358.49 |\n| 2016-07-11 |  3 |\
  \ 15901 | 149.64 |\n| 2016-11-25 |  3 | 16465 | 452.04 |\n| 2017-01-25 |  3 | 16726\
  \ | 145.68 |\n| 2017-03-10 |  3 | 16927 | 216.16 |\n...\n+------------+----+-------+--------+\n\
  ```\n\n要创建一个运行的佣金总计，我们需要获取匹配给定销售员的第一行金额，并将其输出在一个列中。我们将这个列称为 `total`。然后，对于每一后续行，我们将前一个\
  \ `total` 加到当前行的 `commission_amount` 上，作为新的总计，依此类推，直到遇到一个新的 `salesperson_id`，然后我们重新开始这个过程。至少，这是我思考这个问题的方式。实际上，使用传统的\
  \ SQL 来解决这个问题有所不同。例如，一种传统的 SQL 解决方法是使用自连接和 `SUM` 函数，如下所示：\n```sql\nSELECT\ncommission_date\
  \ AS date, salesperson_id as sp,\ncommission_id as id, commission_amount as amount,\n\
  (SELECT SUM(commission_amount)\nFROM commissions AS c2\nWHERE c2.salesperson_id\
  \ = c1.salesperson_id AND\nc2.commission_date <= c1.commission_date) AS total\n\
  FROM commissions AS c1\nORDER BY sp,date;\n```\n\n在我们的主查询中，有一个子查询，它查找销售员匹配且日期小于等于当前行日期的所有行。对于那些符合条件的行，它将它们全部相加，并将结果输出到\
  \ `total` 列中。因此，对于日期戳最早的行，它唯一匹配的行就是它自己，所以对于那一行，`total` 列与 `commission_amount` 列相同。对于日期戳第二早的行，匹配的行将是最老的行和它自己，所以这些行被求和到\
  \ `total` 列中。这个过程一直持续到所有匹配给定 `salesperson_id` 的行都被获取，然后针对下一个销售员重新开始这个过程。\n\n结果有几千行长，但这里显示前几行：\n\
  ```\n+------------+-----+-------+--------+----------+\n| date       | sp  | id \
  \   | amount | total    |\n+------------+-----+-------+--------+----------+\n| 2016-01-21\
  \ |   3 | 15165 | 429.50 | 429.50   |\n| 2016-02-09 |   3 | 15231 | 142.37 | 571.87\
  \   |\n| 2016-02-12 |   3 | 15253 | 184.74 | 756.61   |\n| 2016-03-22 |   3 | 15428\
  \ | 169.62 | 926.23   |\n| 2016-04-01 |   3 | 15476 | 363.53 | 1289.76  |\n| 2016-05-10\
  \ |   3 | 15644 | 358.49 | 1648.25  |\n| 2016-07-11 |   3 | 15901 | 149.64 | 1797.89\
  \  |\n| 2016-11-25 |   3 | 16465 | 452.04 | 2249.93  |\n| 2017-01-25 |   3 | 16726\
  \ | 145.68 | 2395.61  |\n| 2017-03-10 |   3 | 16927 | 216.16 | 2611.77  |\n| 2017-04-05\
  \ |   3 | 17046 | 277.36 | 2889.13  |\n| 2017-04-11 |   3 | 17072 | 151.36 | 3040.49\
  \  |\n| 2017-05-29 |   3 | 17272 | 368.20 | 3408.69  |\n...\n+------------+-----+-------+--------+----------+\n\
  ```\n\n总而言之，它有效，甚至可以说效果很好。很容易确认 `total` 列正在准确地维护一个运行总计，并且当 `salesperson_id` 变化时，计数会重新开始。\n\
  \n但我们获取总计的过程是**笨拙**的。如果这是一个纸质账本，我们不会不断地重新添加之前的所有内容；我们只会将新值加到旧总计上。\n\n此外，我们查询所做的所有加法和重新加法意味着我们不断地出去获取新的行组来求和。所有这些获取和重新获取都需要时间。索引可以提供帮助，尤其是在大表上，但使用像这样的子查询似乎不是解决我们最初显示运行总计任务的正确方法。\n\
  \n**窗口函数**可以更好地完成这项工作，而且它以一种更**自然的方式**来做。首先，就像我们之前为员工编号的窗口函数示例一样，我们需要在 `OVER` 子句中同时使用\
  \ `<partition_definition>` 和 `<order_definition>` 部分。我们将 `PARTITION BY salesperson_id`\
  \ 并 `ORDER BY commission_date` 来匹配查询的最终 `ORDER BY` 子句。\n\n然后，我们需要告诉窗口函数为我们的 `total`\
  \ 列将哪些行加在一起。聚合窗口函数（如 `SUM`）可以使用移动窗口框架来快速识别需要处理的数据。为此，我们将使用一个从结果集开始（即 `UNBOUNDED\
  \ PRECEDING`）到 `CURRENT ROW` 的 `<frame_definition>`，所以我们完整的 `<frame_definition>`\
  \ 部分将是：\n```sql\nROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n```\n\n为了将所有这些整合到位，我们采用之前的查询，并将子查询部分替换为我们的\
  \ `SUM` 窗口函数，如下所示：\n```sql\nSELECT\ncommission_date AS date, salesperson_id as sp,\n\
  commission_id as id, commission_amount as amount,\nSUM(commission_amount)\nOVER\
  \ (\nPARTITION BY salesperson_id\nORDER BY commission_date\nROWS BETWEEN UNBOUNDED\
  \ PRECEDING AND CURRENT ROW\n) AS total\nFROM commissions AS c1\nORDER BY sp,date;\n\
  ```\n\n此查询的结果与我们看到的子查询版本相同，因此无需再次显示。\n\n当这个查询运行时，在第一行，窗口框架只有第一行。随着查询继续，框架会扩展，并且与子查询不同，它不需要重新获取任何数据；它只查看已经存在的数据。然后，当框架跨越我们的分区边界时，它会重置为仅当前行并再次开始增长。与子查询发生的成百上千次往返数据库获取信息不同，窗口函数只需要进行一次遍历。\n\
  \n这种性能差异非常显著，甚至在相对较小的 `commissions` 表上也能看出来。在我的笔记本电脑上，处理表中全部的 3000 多行，运行自连接版本的查询需要\
  \ `2.56` 秒。与此形成对比的是，窗口函数版本**瞬间**完成。两秒半不算多，但随着表大小的增加，窗口函数的速度优势会不断增长。一位 MariaDB 工程师在类似但大得多的表上使用类似的查询进行了一些测试。表\
  \ 5-1 显示了结果。所有时间均以秒为单位。\n\n**表 5-1. 窗口函数与自连接**\n\n| 表中的行数 | 自连接 | 带索引的自连接 | 窗口函数\
  \ |\n| --- | --- | --- | --- |\n| 10,000 | 0.29 | 0.01 | 0.02 |\n| 100,000 | 2.91\
  \ | 0.09 | 0.16 |\n| 1,000,000 | 29.10 | 2.86 | 3.04 |\n| 10,000,000 | 346.30 |\
  \ 90.97 | 43.17 |\n| 100,000,000 | 4357.20 | 813.20 | 514.24 |\n\n在没有表索引的情况下，窗口函数版本的查询总是比自连接版本快一个数量级。在表有索引的情况下，自连接版本的查询在一段时间内能跟上窗口函数版本的速度，但在表行数超过一百万后，窗口函数开始领先，速度几乎是自连接的两倍。\n\
  \n注意\n\n"
- '# 窗口函数


  窗口函数由于其操作方式，根本不会使用索引。它们甚至不会去查找索引。这可以视为使用窗口函数的一个附带好处。如果你能通过使用窗口函数来消除昂贵的自连接和子查询，那么你可能就不需要花费时间、精力和开销去创建和维护索引了。


  ### 对结果集中的行进行排名


  另一个常见的分析查询是找出前 N 名的数据，无论是销售额前五的商品、薪资前十的员工，还是青年篮球联赛的前三名得分手。


  再次使用我们的 `commissions` 表，用 SQL 找出佣金收入前五名是轻而易举的事。一种方法是使用以下 SQL（使用 `LIMIT 5` 来限制输出行数）：


  ```sql

  SELECT

  id, salesperson_id AS sid,

  commission_id AS cid,

  commission_amount AS amount,

  commission_date AS date

  FROM commissions

  ORDER BY commission_amount DESC

  LIMIT 5;

  ```


  该查询的结果如下所示：


  ```

  +------+-----+-------+--------+------------+

  | id   | sid | cid   | amount | date       |

  +------+-----+-------+--------+------------+

  | 2897 | 121 | 17970 | 499.97 | 2017-11-03 |

  | 2269 | 105 | 17340 | 499.90 | 2017-06-15 |

  | 1916 | 131 | 16987 | 499.55 | 2017-03-22 |

  | 2680 |  66 | 17756 | 499.43 | 2017-09-18 |

  | 1610 |  40 | 16688 | 499.41 | 2017-01-16 |

  +------+-----+-------+--------+------------+

  ```


  我们可以通过与 `employees` 表进行 `JOIN` 操作来改进此查询，以便在显示佣金金额的同时显示员工姓名及其办公地点。以下 SQL 正是这样做的：


  ```sql

  SELECT

  commissions.commission_date AS date,

  commissions.commission_id AS cid,

  employees.name AS salesperson,

  employees.office AS office,

  commissions.commission_amount AS amount

  FROM commissions LEFT JOIN employees

  ON (commissions.salesperson_id = employees.id)

  ORDER BY amount DESC

  LIMIT 5;

  ```


  结果如下：


  ```

  +------------+-------+-----------------+-----------+--------+

  | date       | cid   | salesperson     | office    | amount |

  +------------+-------+-----------------+-----------+--------+

  | 2017-11-03 | 17970 | Christina Terry | Wichita   | 499.97 |

  | 2017-06-15 | 17340 | Alonzo Page     | Cleveland | 499.90 |

  | 2017-03-22 | 16987 | Rene Gibbs      | Dallas    | 499.55 |

  | 2017-09-18 | 17756 | Kathryn Barnes  | Dallas    | 499.43 |

  | 2017-01-16 | 16688 | Joyce Beck      | Memphis   | 499.41 |

  +------------+-------+-----------------+-----------+--------+

  ```


  这一切都很好，我们现在知道了全公司范围内获得最高佣金的人员，但如果我们想找出每个办公地点佣金最高的前两名呢？这似乎是前一个查询的合理扩展，但它使我们查询的复杂度大幅增加。可能有其他方法可以实现，但这里有一个可行的查询：


  ```sql

  SELECT * FROM (

  SELECT

  commissions.commission_date AS date,

  commissions.commission_id AS cid,

  employees.name AS salesperson,

  employees.office AS office,

  commissions.commission_amount AS amount

  FROM commissions LEFT JOIN employees

  ON (commissions.salesperson_id = employees.id)

  ) AS c1

  WHERE (

  SELECT count(c2.amount)

  FROM (

  SELECT

  commissions.commission_id AS cid,

  commissions.salesperson_id AS sp_id,

  employees.office AS office,

  commissions.commission_amount AS amount

  FROM commissions LEFT JOIN employees

  ON (commissions.salesperson_id = employees.id)

  ) AS c2

  WHERE

  c1.cid != c2.cid

  AND

  c1.office = c2.office

  AND

  c2.amount > c1.amount) < 2

  ORDER BY office,amount desc;

  ```


  这里发生了很多事情，但基本上，我们有原始的查询、一些派生表，以及 `WHERE` 子句中的一个子查询，该子查询使用 `COUNT` 函数来统计 `commissions`
  表中来自同一办公地点 (`AND`) 且佣金金额大于当前行的佣金数量，然后将结果限制为前两名。这或许有点偏离了“基本”的定义。坦率地说，这有点混乱，普通人很难阅读和解析它。从积极的一面看，它确实有效。这个复杂查询的结果如下：


  ```

  +------------+-------+------------------+-------------+--------+

  | date       | cid   | salesperson      | office      | amount |

  +------------+-------+------------------+-------------+--------+

  | 2017-09-22 | 17776 | Jack Green       | Chicago     | 497.83 |

  | 2017-05-12 | 17215 | Deborah Peterson | Chicago     | 497.29 |

  | 2017-06-15 | 17340 | Alonzo Page      | Cleveland   | 499.90 |

  | 2017-05-25 | 17261 | Alonzo Page      | Cleveland   | 499.29 |

  | 2017-03-22 | 16987 | Rene Gibbs       | Dallas      | 499.55 |

  | 2017-09-18 | 17756 | Kathryn Barnes   | Dallas      | 499.43 |

  | 2017-01-16 | 16688 | Joyce Beck       | Memphis     | 499.41 |

  | 2017-03-02 | 16890 | Tammy Castro     | Memphis     | 497.58 |

  | 2017-12-11 | 18116 | Terrance Reese   | Minneapolis | 499.31 |

  | 2017-04-05 | 17047 | Ruby Boyd        | Minneapolis | 495.98 |

  | 2017-08-30 | 17674 | Dorothy Anderson | Nauvoo      | 497.91 |

  | 2017-12-11 | 18115 | Dorothy Anderson | Nauvoo      | 468.99 |

  | 2017-01-20 | 16706 | John Conner      | Raleigh     | 499.33 |

  | 2016-08-26 | 16082 | Randal Hogan     | Raleigh     | 499.07 |

  | 2017-11-03 | 17970 | Christina Terry  | Wichita     | 499.97 |

  | 2016-10-31 | 16345 | Christina Terry  | Wichita     | 497.83 |

  +------------+-------+------------------+-------------+--------+

  ```


  除了上述的可读性问题外，该查询的主要缺点是速度慢，尤其是在表没有索引的情况下。例如，在我的笔记本电脑上，这个查询需要超过十秒钟才能运行。即使有索引存在，也会有创建和维护索引的开销，如果我们表更新频繁，这可能是个问题。


  一个更好、更快的方法来实现我们想要的结果是使用窗口函数，特别是 `RANK` 函数。首先，我们可以简单地采用带有 `JOIN` 的原始查询，并向其中添加 `RANK`
  函数。


  因为我们想找出每个办公地点佣金最高的前两名，所以在 `OVER` 子句中，我们将 `ORDER BY` `commissions` 表中的 `commission_amount`
  列，并 `PARTITION BY` `employees` 表中的 `office` 列。为了简单起见，我们将 `RANK` 函数的结果称为 `rnk`。


  最后，为了获得正确的排序，我们将 `ORDER BY office` 和我们新的 `rnk` 列。


  将所有这些放在一起，我们最终得到如下所示的 SQL：


  ```sql

  SELECT

  RANK() OVER (

  PARTITION BY employees.office

  ORDER BY commissions.commission_amount DESC

  ) AS rnk,

  commissions.commission_date AS date,

  commissions.commission_id AS cid,

  employees.name AS salesperson,

  employees.office AS office,

  commissions.commission_amount AS amount

  FROM commissions LEFT JOIN employees

  ON (commissions.salesperson_id = employees.id)

  ORDER BY office,rnk;

  ```


  我已从此查询中删除了 `LIMIT`，因此它将输出 `commissions` 表中的每一行，这并不是我们想要的，但通过显示所有内容，我们可以验证每一行是否都已正确地按办公地点进行了排名和分区。所以，我们已经很接近了。


