    ![A978-1-4842-0466-5_11_Fig10_HTML.jpg](img/A978-1-4842-0466-5_11_Fig10_HTML.jpg)


    **图 11-10.** 为 WebSheet 设置的 Application Express 账户身份验证


    当您点击“编辑身份验证”按钮时，您将被重定向到应用程序生成器中的 WebSheet 应用程序属性页面（参见图 11-11）。


    ![A978-1-4842-0466-5_11_Fig11_HTML.jpg](img/A978-1-4842-0466-5_11_Fig11_HTML.jpg)


    **图 11-11.** 应用程序生成器中显示的用户身份验证选项


    当您使用 Application Express 账户身份验证选项并且也登录到应用程序生成器时，点击“编辑身份验证”按钮会将您带出 WebSheet 并直接进入应用程序生成器。一开始您可能不明显感觉到这个转换，因为页面主体相似。您需要通过查看页面顶部和菜单来验证您的上下文。参见图
    11-11。


    如果 WebSheet 使用 SSO、LDAP 或自定义身份验证，您必须以 APEX 管理员或开发人员身份登录到 APEX Builder。登录后，导航到
    WebSheet 的应用程序属性页面，在那里您可以选择所需的身份验证方案并进行配置。图 11-11 所示示例的细节将在第 12 章中讨论。'
- fmt: "## User Authorization\n\nWebsheets have three authorization roles:\n\n*  \
    \ **Reader**: This is the read-only role. Figure 11-12 is a websheet home page\
    \ as seen by a reader. The page contains content together with navigation objects.\
    \ When you drill down into data pages, you can see the data but not the buttons\
    \ that are used to add, change, and delete data.\n\n    ![A978-1-4842-0466-5_11_Fig12_HTML.jpg](A978-1-4842-0466-5_11_Fig12_HTML.jpg)\n\
    \n    Figure 11-12. Websheet home page as seen by a reader\n\n*   **Contributor**:\
    \ This role is allowed to add, change, and delete a websheet’s content plus manipulate\
    \ the structure. Figure 11-13 is the websheet home page as seen by a contributor.\
    \ Notice the rich set of functionality that is added for this role. The top drop-down\
    \ menus contain links to the structural pages. The text sections contain `Edit`\
    \ links. The right-side sections contain links to the structural pages. When you\
    \ drill down into the data pages, you can see the buttons that allow you to add,\
    \ change, and delete the content.\n\n    ![A978-1-4842-0466-5_11_Fig13_HTML.jpg](A978-1-4842-0466-5_11_Fig13_HTML.jpg)\n\
    \n    Figure 11-13. Websheet home page as seen by a contributor\n\n*   **Administrator**:\
    \ This role can create and delete websheets. It’s responsible for maintaining\
    \ a websheet’s global properties and maintains the list of users who can access\
    \ the websheet. Figure 11-14 is the administrator’s view of the websheet home\
    \ page. The only addition to the contributor’s view is the `Administration` drop-down\
    \ menu at the top of the page.\n\n    ![A978-1-4842-0466-5_11_Fig14_HTML.jpg](A978-1-4842-0466-5_11_Fig14_HTML.jpg)\n\
    \n    Figure 11-14. Websheet home page as seen by an administrator\n\nThe websheet\
    \ administrator configures user privileges through the `Access Control list`,\
    \ which is found under the `Administration` drop-down menu (see Figure 11-15).\
    \ This task is usually done after you set up the authentication scheme.\n\n![A978-1-4842-0466-5_11_Fig15_HTML.jpg](A978-1-4842-0466-5_11_Fig15_HTML.jpg)\n\
    \nFigure 11-15. Navigating to the Access Control list\n\nThe `Access Control list`\
    \ is simple to create and maintain (see Figure 11-16). Create a new entry by clicking\
    \ the `Create Entry` button. Change an existing entry by clicking the pencil icon\
    \ in the list. In both cases, you’re taken to the `Entry Details` page, which\
    \ has only two fields: the username and the privilege level (see Figure 11-17).\n\
    \n![A978-1-4842-0466-5_11_Fig17_HTML.jpg](A978-1-4842-0466-5_11_Fig17_HTML.jpg)\n\
    \nFigure 11-17. Entry Details page\n\n![A978-1-4842-0466-5_11_Fig16_HTML.jpg](A978-1-4842-0466-5_11_Fig16_HTML.jpg)\n\
    \nFigure 11-16. Access Control list\n\nThe `Access Control list` is somewhat sensitive\
    \ to the authentication scheme that is used. When you use `SSO`, `LDAP`, or a\
    \ custom authentication scheme, the `Access Control list` is mandatory. In this\
    \ context, it’s easy to understand and build. You build the `Access Control list`\
    \ as a duplicate of the list of users in the authentication scheme. The hook between\
    \ the two lists is the username. The websheet username must match the user ID\
    \ in the authentication scheme.\n\nWhen you use the `Application Express Account`\
    \ authentication scheme, things get a little harder to understand. In this instance,\
    \ using the `Access Control list` is optional. Because the websheet is inside\
    \ an Application Express workspace, the websheet can directly use the existing\
    \ `APEX` user accounts. The websheet privileges are inferred from the `APEX` user-account\
    \ privileges. Table 11-2 illustrates the translation between the `APEX` workspace\
    \ privileges and the websheet privileges. You can override the default translation\
    \ by adding the `APEX` users to the `Access Control list`. For example, you might\
    \ want an `APEX` workspace administrator to have the `reader` privilege on a given\
    \ websheet. To do this, you add the `APEX` workspace administrator’s ID to the\
    \ `Access Control list` and set the privilege to `reader`.\n\nTable 11-2. Access\
    \ Control Configuration\n\n| Authentication Scheme | No Access Control List |\
    \ With an Access Control List |\n| --- | --- | --- |\n| `Application Express Account`\
    \ | `APEX administrator` = websheet admin<br>`APEX developer` = websheet contributor<br>`APEX\
    \ end user` = websheet reader | The `Access Control list` overrides the inferred\
    \ `APEX` websheet privileges. |\n| `Single Sign-On` | NA - `Access Control list`\
    \ is mandatory. | `Access Control ID` must match `SSO ID`. |\n| `LDAP` | NA -\
    \ `Access Control list` is mandatory. | `Access Control ID` must match `LDAP ID`.\
    \ |\n| `Custom` | NA - `Access Control list` is mandatory. | `Access Control ID`\
    \ must match custom ID. |\n\nWebsheets can be set up for public access. This means\
    \ that anyone who invokes the websheet’s URL is allowed to access the websheet\
    \ with the `reader` role. Logging in with an ID and password isn’t required. You\
    \ can set this up by going to the websheet’s `Properties` page in the `APEX Application\
    \ Builder` and changing the `Allow Public Access` control under the `Authorization`\
    \ section. See Figure 11-18.\n\n![A978-1-4842-0466-5_11_Fig18_HTML.jpg](A978-1-4842-0466-5_11_Fig18_HTML.jpg)\n\
    \nFigure 11-18. Navigating to the Application Properties page\n\nSelect `Yes`\
    \ in the `Allow Public Access` drop-down menu and click the `Apply Changes` button.\
    \ Now, when you run the websheet application, you’re automatically logged in as\
    \ the user “nobody” with `reader` privileges. Administrators and contributors\
    \ who need to update the websheet’s content can log in by using the `Sign In`\
    \ link that appears at the upper right on all the websheet’s pages (see Figure\
    \ 11-19).\n\n![A978-1-4842-0466-5_11_Fig19_HTML.jpg](A978-1-4842-0466-5_11_Fig19_HTML.jpg)\n\
    \nFigure 11-19. Public websheet with Sign In link\n\n## Sections\n\nSections contain\
    \ your content. The following chapter sections will illustrate useful features\
    \ found in the websheet structural environment by showing you the `Edit` pages\
    \ for existing objects. Step-by-step procedures for creating new websheet objects\
    \ will be covered in Chapter 12."
  raw: '## User Authorization


    Websheets have three authorization roles:


    *   Reader: This is the read-only role. Figure [11-12](#A978-1-4842-0466-5_11_Chapter.html#Fig12)
    is a websheet home page as seen by a reader. The page contains content together
    with navigation objects. When you drill down into data pages, you can see the
    data but not the buttons that are used to add, change, and delete data.


    ![A978-1-4842-0466-5_11_Fig12_HTML.jpg](A978-1-4842-0466-5_11_Fig12_HTML.jpg)


    Figure 11-12.


    Websheet home page as seen by a reader

    *   Contributor: This role is allowed to add, change, and delete a websheet’s
    content plus manipulate the structure. Figure [11-13](#A978-1-4842-0466-5_11_Chapter.html#Fig13)
    is the websheet home page as seen by a contributor. Notice the rich set of functionality
    that is added for this role. The top drop-down menus contain links to the structural
    pages. The text sections contain Edit links. The right-side sections contain links
    to the structural pages. When you drill down into the data pages, you can see
    the buttons that allow you to add, change, and delete the content.


    ![A978-1-4842-0466-5_11_Fig13_HTML.jpg](A978-1-4842-0466-5_11_Fig13_HTML.jpg)


    Figure 11-13.


    Websheet home page as seen by a contributor

    *   Administrator: This role can create and delete websheets. It’s responsible
    for maintaining a websheet’s global properties and maintains the list of users
    who can access the websheet. Figure [11-14](#A978-1-4842-0466-5_11_Chapter.html#Fig14)
    is the administrator’s view of the websheet home page. The only addition to the
    contributor’s view is the Administration drop-down menu at the top of the page.


    ![A978-1-4842-0466-5_11_Fig14_HTML.jpg](A978-1-4842-0466-5_11_Fig14_HTML.jpg)


    Figure 11-14.


    Websheet home page as seen by an administrator


    The websheet administrator configures user privileges through the Access Control
    list, which is found under the Administration drop-down menu (see Figure [11-15](#A978-1-4842-0466-5_11_Chapter.html#Fig15)).
    This task is usually done after you set up the authentication scheme.


    ![A978-1-4842-0466-5_11_Fig15_HTML.jpg](A978-1-4842-0466-5_11_Fig15_HTML.jpg)


    Figure 11-15.


    Navigating to the Access Control list


    The Access Control list is simple to create and maintain (see Figure [11-16](#A978-1-4842-0466-5_11_Chapter.html#Fig16)).
    Create a new entry by clicking the Create Entry button. Change an existing entry
    by clicking the pencil icon in the list. In both cases, you’re taken to the Entry
    Details page, which has only two fields: the username and the privilege level
    (see Figure [11-17](#A978-1-4842-0466-5_11_Chapter.html#Fig17)).


    ![A978-1-4842-0466-5_11_Fig17_HTML.jpg](A978-1-4842-0466-5_11_Fig17_HTML.jpg)


    Figure 11-17.


    Entry Details page


    ![A978-1-4842-0466-5_11_Fig16_HTML.jpg](A978-1-4842-0466-5_11_Fig16_HTML.jpg)


    Figure 11-16.


    Access Control list


    The Access Control list is somewhat sensitive to the authentication scheme that
    is used. When you use SSO, LDAP, or a custom authentication scheme, the Access
    Control list is mandatory. In this context, it’s easy to understand and build.
    You build the Access Control list as a duplicate of the list of users in the authentication
    scheme. The hook between the two lists is the username. The websheet username
    must match the user ID in the authentication scheme.


    When you use the Application Express Account authentication scheme, things get
    a little harder to understand. In this instance, using the Access Control list
    is optional. Because the websheet is inside an Application Express workspace,
    the websheet can directly use the existing APEX user accounts. The websheet privileges
    are inferred from the APEX user-account privileges. Table [11-2](#A978-1-4842-0466-5_11_Chapter.html#Tab2)
    illustrates the translation between the APEX workspace privileges and the websheet
    privileges. You can override the default translation by adding the APEX users
    to the Access Control list. For example, you might want an APEX workspace administrator
    to have the reader privilege on a given websheet. To do this, you add the APEX
    workspace administrator’s ID to the Access Control list and set the privilege
    to reader.


    Table 11-2.


    Access Control Configuration


    | Authentication Scheme | No Access Control List | With an Access Control List
    |

    | --- | --- | --- |

    | Application Express Account | APEX administrator = websheet admin APEX developer
    = websheet contributor APEX end user = websheet reader | The Access Control list
    overrides the inferred APEX websheet privileges. |

    | Single Sign-On | NA - Access Control list is mandatory. | Access Control ID
    must match SSO ID. |

    | LDAP | NA - Access Control list is mandatory. | Access Control ID must match
    LDAP ID. |

    | Custom | NA - Access Control list is mandatory. | Access Control ID must match
    custom ID. |


    Websheets can be set up for public access. This means that anyone who invokes
    the websheet’s URL is allowed to access the websheet with the reader role. Logging
    in with an ID and password isn’t required. You can set this up by going to the
    websheet’s Properties page in the APEX Application Builder and changing the Allow
    Public Access control under the Authorization section. See Figure [11-18](#A978-1-4842-0466-5_11_Chapter.html#Fig18).


    ![A978-1-4842-0466-5_11_Fig18_HTML.jpg](A978-1-4842-0466-5_11_Fig18_HTML.jpg)


    Figure 11-18.


    Navigating to the Application Properties page


    Select `Yes` in the Allow Public Access drop-down menu and click the Apply Changes
    button. Now, when you run the websheet application, you’re automatically logged
    in as the user “nobody” with reader privileges. Administrators and contributors
    who need to update the websheet’s content can log in by using the Sign In link
    that appears at the upper right on all the websheet’s pages (see Figure [11-19](#A978-1-4842-0466-5_11_Chapter.html#Fig19)).


    ![A978-1-4842-0466-5_11_Fig19_HTML.jpg](A978-1-4842-0466-5_11_Fig19_HTML.jpg)


    Figure 11-19.


    Public websheet with Sign In link


    ## Sections


    Sections contain your content. The following chapter sections will illustrate
    useful features found in the websheet structural environment by showing you the
    Edit pages for existing objects. Step-by-step procedures for creating new websheet
    objects will be covered in [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html).'
  trans: "\n## 用户授权\n\n网页表格有三种授权角色：\n\n*   **读者**：这是只读角色。图 11-12 展示了读者看到的网页表格主页。该页面包含内容以及导航对象。当你深入查看数据页面时，可以看到数据，但无法看到用于添加、更改和删除数据的按钮。\n\
    \n    ![A978-1-4842-0466-5_11_Fig12_HTML.jpg](img/A978-1-4842-0466-5_11_Fig12_HTML.jpg)\n\
    \n    图 11-12. 读者看到的网页表格主页\n\n*   **贡献者**：此角色被允许添加、更改和删除网页表格的内容，以及操作结构。图 11-13\
    \ 是贡献者看到的网页表格主页。请注意为此角色添加的丰富功能集。顶部的下拉菜单包含指向结构页面的链接。文本部分包含`编辑`链接。右侧部分包含指向结构页面的链接。当你深入查看数据页面时，可以看到允许你添加、更改和删除内容的按钮。\n\
    \n    ![A978-1-4842-0466-5_11_Fig13_HTML.jpg](img/A978-1-4842-0466-5_11_Fig13_HTML.jpg)\n\
    \n    图 11-13. 贡献者看到的网页表格主页\n\n*   **管理员**：此角色可以创建和删除网页表格。它负责维护网页表格的全局属性，并维护可以访问该网页表格的用户列表。图\
    \ 11-14 是管理员视图的网页表格主页。与贡献者视图相比，唯一的增加是页面顶部的`管理`下拉菜单。\n\n    ![A978-1-4842-0466-5_11_Fig14_HTML.jpg](img/A978-1-4842-0466-5_11_Fig14_HTML.jpg)\n\
    \n    图 11-14. 管理员看到的网页表格主页\n\n网页表格管理员通过`访问控制列表`配置用户权限，该列表位于`管理`下拉菜单下（见图 11-15）。此任务通常在设置身份验证方案后完成。\n\
    \n![A978-1-4842-0466-5_11_Fig15_HTML.jpg](img/A978-1-4842-0466-5_11_Fig15_HTML.jpg)\n\
    \n图 11-15. 导航到访问控制列表\n\n`访问控制列表`易于创建和维护（见图 11-16）。点击`创建条目`按钮可以创建新条目。点击列表中的铅笔图标可以更改现有条目。在这两种情况下，你都会被带到`条目详情`页面，该页面只有两个字段：用户名和权限级别（见图\
    \ 11-17）。\n\n![A978-1-4842-0466-5_11_Fig17_HTML.jpg](img/A978-1-4842-0466-5_11_Fig17_HTML.jpg)\n\
    \n图 11-17. 条目详情页面\n\n![A978-1-4842-0466-5_11_Fig16_HTML.jpg](img/A978-1-4842-0466-5_11_Fig16_HTML.jpg)\n\
    \n图 11-16. 访问控制列表\n\n`访问控制列表`对所使用的身份验证方案有一定敏感性。当你使用`SSO`、`LDAP`或自定义身份验证方案时，`访问控制列表`是必需的。在此上下文中，它易于理解和构建。你将`访问控制列表`构建为身份验证方案中用户列表的副本。两个列表之间的连接点是用户名。网页表格用户名必须与身份验证方案中的用户\
    \ ID 匹配。\n\n当你使用`Application Express 帐户`身份验证方案时，事情会变得有点难以理解。在这种情况下，使用`访问控制列表`是可选的。因为网页表格位于\
    \ Application Express 工作区内部，所以它可以直接使用现有的`APEX`用户帐户。网页表格权限是从`APEX`用户帐户权限推断出来的。表\
    \ 11-2 说明了`APEX`工作区权限与网页表格权限之间的转换。你可以通过将`APEX`用户添加到`访问控制列表`来覆盖默认转换。例如，你可能希望某个`APEX`工作区管理员在特定网页表格上拥有`读者`权限。为此，你将`APEX`工作区管理员的\
    \ ID 添加到`访问控制列表`，并将权限设置为`读者`。\n\n表 11-2. 访问控制配置\n\n| 身份验证方案 | 无访问控制列表 | 有访问控制列表\
    \ |\n| --- | --- | --- |\n| `Application Express 帐户` | `APEX 管理员` = 网页表格管理员<br>`APEX\
    \ 开发人员` = 网页表格贡献者<br>`APEX 终端用户` = 网页表格读者 | `访问控制列表`会覆盖推断出的`APEX`网页表格权限。 |\n|\
    \ `单点登录` | 不适用 - `访问控制列表`是必需的。 | `访问控制 ID`必须与`SSO ID`匹配。 |\n| `LDAP` | 不适用 - `访问控制列表`是必需的。\
    \ | `访问控制 ID`必须与`LDAP ID`匹配。 |\n| `自定义` | 不适用 - `访问控制列表`是必需的。 | `访问控制 ID`必须与自定义\
    \ ID 匹配。 |\n\n网页表格可以设置为公开访问。这意味着任何调用网页表格 URL 的人都被允许以`读者`角色访问该网页表格。不需要使用 ID 和密码登录。你可以通过转到`APEX\
    \ 应用程序构建器`中网页表格的`属性`页面，并更改`授权`部分下的`允许公共访问`控件来设置此功能。参见图 11-18。\n\n![A978-1-4842-0466-5_11_Fig18_HTML.jpg](img/A978-1-4842-0466-5_11_Fig18_HTML.jpg)\n\
    \n图 11-18. 导航到应用程序属性页面\n\n在`允许公共访问`下拉菜单中选择`是`，然后点击`应用更改`按钮。现在，当你运行网页表格应用程序时，你会自动以用户“nobody”登录，并拥有`读者`权限。需要更新网页表格内容的管理员和贡献者可以通过所有网页表格页面右上角出现的`登录`链接进行登录（见图\
    \ 11-19）。\n\n![A978-1-4842-0466-5_11_Fig19_HTML.jpg](img/A978-1-4842-0466-5_11_Fig19_HTML.jpg)\n\
    \n图 11-19. 带有登录链接的公开网页表格\n\n## 章节\n\n章节包含你的内容。接下来的章节将通过向你展示现有对象的`编辑`页面，来说明网页表格结构环境中的有用功能。创建新网页表格对象的分步过程将在第\
    \ 12 章中介绍。\n"
- fmt: '### Text Sections


    Text sections contain text, embedded links, and images. Text sections can be used
    to create wikis and blogs. To start a wiki, the original author creates a text
    section and then invites contributors to edit the text section’s content. To start
    a blog, the original author creates a text section and then invites contributors
    to add more text sections in reply to the first section.


    To access a text section’s Edit page, you click the `Edit` link in the upper-right
    corner of the text section (see Figure [11-20](#A978-1-4842-0466-5_11_Chapter.html#Fig20)).


    ![A978-1-4842-0466-5_11_Fig20_HTML.jpg](A978-1-4842-0466-5_11_Fig20_HTML.jpg)

    Figure 11-20. Navigating to a text section’s Edit page


    The Edit page for a text section is simple and clean when it’s invoked. By default,
    the collapsible regions are collapsed (see Figure [11-21](#A978-1-4842-0466-5_11_Chapter.html#Fig21)).
    The upper-right collapsible region link, a small arrow icon, contains the text-formatting
    controls. Expanding this section by clicking the icon displays an edit palette
    that is similar to what you might expect from your favorite word processor.


    ![A978-1-4842-0466-5_11_Fig21_HTML.jpg](A978-1-4842-0466-5_11_Fig21_HTML.jpg)

    Figure 11-21. Edit page for a text section, collapsed


    The lower-left link, `Data Grid SQL Syntax`, contains links to information on
    how to access data from the data grids in your websheet. Clicking the links presents
    a pop-up page with cut-and-paste syntax for many data queries and links.


    Finally, the section on the left contains a list of all the sections on the page.
    Clicking any one of the section names allows you to edit the properties and/or
    content for the section. This region also has a toolbar across the top that lets
    you perform various tasks. See Figure [11-22](#A978-1-4842-0466-5_11_Chapter.html#Fig22).


    ![A978-1-4842-0466-5_11_Fig22_HTML.jpg](A978-1-4842-0466-5_11_Fig22_HTML.jpg)

    Figure 11-22. The Sections toolbar on the Edit Section page


    When you expand the collapsible regions, you can see the considerable scope available
    for enhancing your content (see Figure [11-23](#A978-1-4842-0466-5_11_Chapter.html#Fig23)).
    The upper-right icon expands into a section that contains a number of formatting
    icons. We don’t describe each formatting icon’s function in detail; they’re intuitive
    because they’re similar to other tools, like a word processor, that you probably
    use regularly.


    ![A978-1-4842-0466-5_11_Fig23_HTML.jpg](A978-1-4842-0466-5_11_Fig23_HTML.jpg)

    Figure 11-23. Edit page for a text section, expanded


    Other elements available include the following:


    *   The list of page sections at the bottom of the page shows you where the current
    section fits within the page relative to the other sections.

    *   The Help section contains direct links to the Help page tabs.

    *   The Tasks section contains links to processes that automate moving the section
    to an existing or new page.


    The `Show History` link will be explained in the “Administration” section later
    in this chapter.


    **Note**

    Many pages contain collapsible regions at the bottom of the page. Some of the
    regions contain help text; others contain lists of things that help give you a
    sense of place and context, which in turn helps you to get your content right.
    In all cases, the collapsible regions found at the bottom of pages are useful.


    ### Navigation Sections


    The most important aspect of adding navigation sections to your web content is
    the fact that adding them takes very little effort or thought on your part. Navigation
    sections are easy to use because they’re declarative, and the websheet takes care
    of virtually all the details like the page links and formatting. The details of
    adding navigation sections will be discussed in [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html).


    A page-navigation section is shown in Figure [11-24](#A978-1-4842-0466-5_11_Chapter.html#Fig24).
    Clicking the `Edit` link takes you to the Edit page (see Figure [11-25](#A978-1-4842-0466-5_11_Chapter.html#Fig25)).
    The Edit page has five inputs:


    ![A978-1-4842-0466-5_11_Fig25_HTML.jpg](A978-1-4842-0466-5_11_Fig25_HTML.jpg)

    Figure 11-25. Edit page for a page-navigation section


    ![A978-1-4842-0466-5_11_Fig24_HTML.jpg](A978-1-4842-0466-5_11_Fig24_HTML.jpg)

    Figure 11-24. Page-navigation section


    *   `Sequence`: Positions the section among the other sections on the page.

    *   `Title`: The title of the section.

    *   `Starting Page`: Lets you start the navigation tree on pages that are below
    the home page in the page hierarchy. In this example, a user could add a page-navigation
    section to the top of their personal page that shows only the pages below their
    personal page in the hierarchy.

    *   `Maximum Levels`: Limits the number of levels displayed in a page-navigation
    section. In this example, if you set the `Maximum Levels` value to 3, you would
    see only the pages shown in Figure [11-24](#A978-1-4842-0466-5_11_Chapter.html#Fig24)
    even if a user adds child pages under their personal page.

    *   `Order Siblings By`: Allows you to choose the sort order of all pages at the
    same level. Options are `Page Name`, `Created Date`, and `Updated Date`.


    A section-navigation section is shown in Figure [11-26](#A978-1-4842-0466-5_11_Chapter.html#Fig26),
    and you can see the Edit page in Figure [11-27](#A978-1-4842-0466-5_11_Chapter.html#Fig27).
    The only inputs are the `Sequence` and `Title`. In this case, the websheet takes
    care of all the other details. You don’t have to do any work.


    ![A978-1-4842-0466-5_11_Fig27_HTML.jpg](A978-1-4842-0466-5_11_Fig27_HTML.jpg)

    Figure 11-27. Edit page for a section-navigation section


    ![A978-1-4842-0466-5_11_Fig26_HTML.jpg](A978-1-4842-0466-5_11_Fig26_HTML.jpg)

    Figure 11-26. Section-navigation section


    ### Data Sections


    There are two types of data sections: Data Grids and Reports. Data Grids are spreadsheet-like
    objects that you create entirely within a websheet. Reports display read-only
    data from external database tables or views that are located outside the websheet.


    We will look at data grids first because they’re native to websheets and are what
    you’ll likely use the most.'
  raw: '### Text Sections


    Text sections contain text, embedded links, and images. Text sections can be used
    to create wikis and blogs. To start a wiki, the original author creates a text
    section and then invites contributors to edit the text section’s content. To start
    a blog, the original author creates a text section and then invites contributors
    to add more text sections in reply to the first section.


    To access a text section’s Edit page, you click the Edit link in the upper-right
    corner of the text section (see Figure [11-20](#A978-1-4842-0466-5_11_Chapter.html#Fig20)).


    ![A978-1-4842-0466-5_11_Fig20_HTML.jpg](A978-1-4842-0466-5_11_Fig20_HTML.jpg)


    Figure 11-20.


    Navigating to a text section’s Edit page


    The Edit page for a text section is simple and clean when it’s invoked. By default,
    the collapsible regions are collapsed (see Figure [11-21](#A978-1-4842-0466-5_11_Chapter.html#Fig21)).
    The upper-right collapsible region link, a small arrow icon, contains the text-formatting
    controls. Expanding this section by clicking the icon displays an edit palette
    that is similar to what you might expect from your favorite word processor.


    ![A978-1-4842-0466-5_11_Fig21_HTML.jpg](A978-1-4842-0466-5_11_Fig21_HTML.jpg)


    Figure 11-21.


    Edit page for a text section, collapsed


    The lower-left link, Data Grid SQL Syntax, contains links to information on how
    to access data from the data grids in your websheet. Clicking the links presents
    a pop-up page with cut-and-paste syntax for many data queries and links.


    Finally, the section on the left contains a list of all the sections on the page.
    Clicking any one of the section names allows you to edit the properties and/or
    content for the section. This region also has a toolbar across the top that lets
    you perform various tasks. See Figure [11-22](#A978-1-4842-0466-5_11_Chapter.html#Fig22).


    ![A978-1-4842-0466-5_11_Fig22_HTML.jpg](A978-1-4842-0466-5_11_Fig22_HTML.jpg)


    Figure 11-22.


    The Sections toolbar on the Edit Section page


    When you expand the collapsible regions, you can see the considerable scope available
    for enhancing your content (see Figure [11-23](#A978-1-4842-0466-5_11_Chapter.html#Fig23)).
    The upper-right icon expands into a section that contains a number of formatting
    icons. We don’t describe each formatting icon’s function in detail; they’re intuitive
    because they’re similar to other tools, like a word processor, that you probably
    use regularly.


    ![A978-1-4842-0466-5_11_Fig23_HTML.jpg](A978-1-4842-0466-5_11_Fig23_HTML.jpg)


    Figure 11-23.


    Edit page for a text section, expanded


    Other elements available include the following:


    *   The list of page sections at the bottom of the page shows you where the current
    section fits within the page relative to the other sections.

    *   The Help section contains direct links to the Help page tabs.

    *   The Tasks section contains links to processes that automate moving the section
    to an existing or new page.


    The Show History link will be explained in the “Administration” section later
    in this chapter.


    Note


    Many pages contain collapsible regions at the bottom of the page. Some of the
    regions contain help text; others contain lists of things that help give you a
    sense of place and context, which in turn helps you to get your content right.
    In all cases, the collapsible regions found at the bottom of pages are useful.


    ### Navigation Sections


    The most important aspect of adding navigation sections to your web content is
