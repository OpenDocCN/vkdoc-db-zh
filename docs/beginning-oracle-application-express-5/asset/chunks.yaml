    ## 管理元数据


    在“管理服务”页面的右侧，有一个名为“管理元数据”的区域（参见图 14-7）。以下各小节将介绍如何使用此区域中的菜单选项。


    ![A978-1-4842-0466-5_14_Fig7_HTML.jpg](img/A978-1-4842-0466-5_14_Fig7_HTML.jpg)

    图 14-7. 管理元数据菜单


    ### 开发人员活动与点击计数日志


    “开发人员活动与点击计数日志”菜单选项允许清除两种类型的日志。一种记录开发人员在工作区中进行的更改。另一种跟踪用户在 APEX 应用程序外页面链接上的点击。


    #### 开发人员活动日志


    应用程序构建器会记录开发人员所做的所有更改。这些日志在应用程序构建器和“管理”部分的各个位置被引用。您可以通过“监控活动”部分查看这些日志，方法是单击图 14-1
    中显示的“监控活动”图标。您也可以通过以下查询获取开发人员活动日志：


    ```

    SELECT *

    FROM apex_developer_activity_log

    ```


    与前一章提到的日志类似，开发人员活动日志最多保留一个月的数据。您可以通过单击图 14-8 中显示的“清除开发人员日志”按钮来清除开发人员活动日志。


    ![A978-1-4842-0466-5_14_Fig8_HTML.jpg](img/A978-1-4842-0466-5_14_Fig8_HTML.jpg)

    图 14-8. 清除开发人员日志按钮


    #### 点击计数日志


    创建列表时（应用程序构建器 ➤ 共享组件 ➤ 列表），您可以选择跟踪外部链接的点击。这些点击记录在 `APEX_WORKSPACE_CLICKS` 日志中。您也可以在“监控活动”部分查看点击计数日志（参见图
    14-1 中的“监控活动”图标）。


    与开发人员活动日志类似，您可以通过选择“管理点击计数日志”并单击图 14-9 中显示的“清除点击日志”按钮来清除点击日志。


    ![A978-1-4842-0466-5_14_Fig9_HTML.jpg](img/A978-1-4842-0466-5_14_Fig9_HTML.jpg)

    图 14-9. 清除点击日志按钮


    ### 会话状态


    从图 14-5 的菜单中选择“会话状态”，将带您进入一个可以管理会话状态和首选项的页面。首选项与会话状态略有不同，因为它们链接到用户而不是当前会话。这意味着对首选项的更改会影响该用户的所有当前和将来的会话。


    #### 管理会话状态


    您可以从“管理会话状态”区域中的各种报告中查看所有会话值、清除这些值以及结束会话。每次用户登录 APEX 时都会自动创建一个会话。由于 APEX 构建器本身就是一个
    APEX 应用程序，因此会为开发人员和最终用户创建会话。


    在开发中，清除会话状态或终止会话可能有助于模拟不同的情况。如果您在有实际用户的生产环境中执行此操作，应格外谨慎。


    ### 应用程序缓存


    “应用程序缓存”部分提供了基于不同条件清除页面和区域缓存的工具。在 APEX 中，您可以为所有用户或按每个单独用户缓存页面和区域。缓存有助于提高性能，因为
    APEX 无需为给定区域重新生成 HTML 代码。


    ### Websheet 数据库对象


    “Websheet 数据库对象”部分允许您创建或删除 websheet 所需的表，并验证其状态。与 APEX 应用程序不同，websheet 数据存储在每个模式中的表中，而不是由
    `APEX_050000` 模式拥有的表中。这些表以 `APEX$_WS` 为前缀，通常大约有十个。


    首次创建工作区时，不会创建 websheet 对象。要创建它们，请转到“Websheet 数据库对象”部分，单击图 14-10 中显示的“创建 Websheet
    数据库对象”链接。按照向导创建 websheet 对象。创建 websheet 对象后，您就可以创建 websheet 应用程序了。


    ![A978-1-4842-0466-5_14_Fig10_HTML.jpg](img/A978-1-4842-0466-5_14_Fig10_HTML.jpg)

    图 14-10. 创建 Websheet 数据库对象链接


    创建对象后，“Websheet 数据库对象”页面如图 14-11 所示。在此屏幕中，您可以删除与 websheet 相关的数据库对象，或确保这些对象有效。


    ![A978-1-4842-0466-5_14_Fig11_HTML.jpg](img/A978-1-4842-0466-5_14_Fig11_HTML.jpg)

    图 14-11. Websheet 数据库对象页面


    ### 应用程序构建状态


    通过“应用程序构建状态”部分，您可以快速管理工作区中所有应用程序的“应用程序状态”和“构建状态”。“应用程序状态”控制应用程序的可用性。要获取每个应用程序状态的完整说明，请参考
    APEX 文档。


    “构建状态”决定应用程序是否可以被开发人员修改，还是只能运行。在生产环境中，您可能希望将构建状态设置为“仅运行应用程序”以防止任何更改。


    注意：应用程序和构建状态也可以从每个应用程序的“应用程序属性”页面设置。


    ### 文件使用情况


    “文件使用情况”页面提供了工作区中所有文件类型及其总大小的概览，如图 14-12 所示。作为 APEX 应用程序的一部分，文件可以存储在各种位置。随着时间的推移，这些文件会占用不必要的空间。


    ![A978-1-4842-0466-5_14_Fig12_HTML.jpg](img/A978-1-4842-0466-5_14_Fig12_HTML.jpg)

    图 14-12. 文件使用情况信息


    在文件使用情况页面列出的所有文件中，导出存储库往往占用最多空间。当您将应用程序导入工作区时，原始文件会存储在导出存储库中。导出存储库这个名称可能会引起误解，因为它包含的是导入到工作区的原始应用程序文件。一旦应用程序成功导入并安装，您就不需要在存储库中保留该文件，因此可以将其删除。


    以下步骤说明如何清理导出存储库：


    1.  从“管理”主页，单击位于右侧“任务”区域中的“管理导出存储库”链接。

    2.  选择您不再需要的文件，然后单击“删除选中项”按钮，如图 14-13 所示。


    ![A978-1-4842-0466-5_14_Fig13_HTML.jpg](img/A978-1-4842-0466-5_14_Fig13_HTML.jpg)

    图 14-13. 删除选中项按钮

