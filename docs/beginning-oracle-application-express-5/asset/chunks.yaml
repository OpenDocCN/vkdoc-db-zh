- fmt: "### Defining UI Defaults for Tables\n\nUI Defaults can be managed either from\
    \ SQL Workshop’s Object Browser or from SQL Workshop’s Utilities page. Here’s\
    \ what to do:\n\nNavigate to SQL Workshop’s UI Defaults page via the drop-down\
    \ menu on the SQL Workshop tab and select Utilities; then, choose User Interface\
    \ Defaults from the drop-down menu. You’re taken to the UI Defaults dashboard,\
    \ where things likely look pretty sparse. This is because you haven’t actually\
    \ created any UI Defaults yet. The first step in creating UI Defaults is to synchronize\
    \ the Table Dictionary with the database so it knows what tables are in your schema.\
    \ Click the Table Dictionary tab along the top of the page, and then click the\
    \ Synchronize button on the screen that appears. This initiates the Synchronization\
    \ Wizard. This wizard shows you the number of tables with defaults defined and\
    \ the number without. In this case, you should have zero objects with defaults\
    \ and six objects without. Click the Synchronize Defaults button to begin the\
    \ synchronization with the database. This may take a little time. Once the Table\
    \ Dictionary is synchronized with the definitions in the database, you’re presented\
    \ with the report seen in Figure [4-25](#A978-1-4842-0466-5_4_Chapter.html#Fig25),\
    \ which shows each table that now has base UI Defaults. If you have other tables\
    \ in your schema, they also appear in this report.\n\n![A978-1-4842-0466-5_4_Fig25_HTML.jpg](A978-1-4842-0466-5_4_Fig25_HTML.jpg)\n\
    *Figure 4-25. List of objects with UI Defaults defined*\n\nYou can now view or\
    \ edit the UI Defaults for each of these tables. Start by viewing the UI Defaults\
    \ for the `TICKETS` table: Click the `TICKETS` link in the report. You should\
    \ see the results shown in Figure [4-26](#A978-1-4842-0466-5_4_Chapter.html#Fig26).\n\
    \n![A978-1-4842-0466-5_4_Fig26_HTML.jpg](A978-1-4842-0466-5_4_Fig26_HTML.jpg)\n\
    *Figure 4-26. The table and column UI Defaults overview*\n\nOn the page in Figure\
    \ [4-26](#A978-1-4842-0466-5_4_Chapter.html#Fig26) you can see an overview of\
    \ the UI Defaults for the `TICKETS` table. In the upper portion of the report\
    \ are the table-level definitions, including what the Form and Report regions\
    \ based on this table will be called. In the lower portion is a list of the table’s\
    \ columns, the labels that will be used, how they will be aligned when used in\
    \ a report, whether they will be displayed in a report or a form, whether their\
    \ `REQUIRED` attribute will be set in a form, and whether they have any help text.\
    \ Next, edit both the table-level and column-level attributes: Click the Edit\
    \ Table Defaults button in the upper-right portion of the report. This allows\
    \ you to edit how Form and Report regions based on this table are named. Enter\
    \ `Manage Tickets` for the Form Region Title, leave the Report Region Title as\
    \ it is, and click Apply Changes.\n\nClicking any of the column names takes you\
    \ to a page that allows you to set UI Defaults for that specific column. As you\
    \ peruse the column UI Defaults, notice that several things have been set for\
    \ you, including the `REQUIRED` attribute. When APEX synchronized with the database,\
    \ it saw that certain fields were marked as `NOT NULL` at the database level and\
    \ translated those constraints into UI Defaults for you.\n\nAPEX also makes some\
    \ decisions based on the column’s data type, such as how to align the column when\
    \ it’s displayed in a report. Use the following information to alter the UI Defaults\
    \ for the indicated columns by clicking the link in the column name:\n\n*   Column:\
    \ `SUBJECT`\n    *   Label: `Subject`\n    *   Help Text: `A brief title for the\
    \ issue.`\n*   Column: `DESCR`\n    *   Label: `Description`\n    *   Help Text:\
    \ `Describes the ticket in detail. Please be as complete as you can.`\n    * \
    \  Resizable: `YES`\n    *   Width: `50`\n    *   Height: `5`\n*   Column: `STATUS_ID`\n\
    \    *   Label: `Status`\n\nIf you wish, you can go ahead and set the UI Defaults\
    \ for any of the other columns and/or tables. Just remember, what you do now will\
    \ affect what the wizards create for you later, so if something doesn’t look exactly\
    \ like what is shown in this book, check what you set for UI Defaults.\n\n## Summary\n\
    \nSQL Workshop may not measure up to some of the more popular GUI tools, but it\
    \ certainly has the power to do most things you need to do relating to the creation\
    \ and management of tables and data. You’ve also seen that SQL Workshop has a\
    \ few built-in but hidden gems like the Create Lookup Table Wizard. Finally, among\
    \ the many useful utilities is the UI Defaults manager, making your job as a developer\
    \ just a bit easier.\n\nSure, this chapter hasn’t covered SQL Workshop in its\
    \ entirety, but you’ve definitely gained a fair amount of insight as to what it’s\
    \ capable of. You will use SQL Workshop for a number of other things throughout\
    \ this book, but don’t wait. Go poke around in some of the dark nooks and crannies\
    \ and see what you find!\n\n# 5. Applications and Navigation\n\nElectronic supplementary\
    \ material The online version of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​5](http://dx.doi.org/10.1007/978-1-4842-0466-5_5))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    With some basic data created, you can now create the shell for your application.\
    \ APEX provides a wizard for creating applications. Several options are available\
    \ within the wizard to assist with generating a starting application. Based on\
    \ how much prior planning has been done, the result of running the initial application\
    \ wizard may vary. You will start this chapter by walking through the steps of\
    \ the wizard, as I highlight the most common features.\n\nFor the example application,\
    \ you will create the most basic shell of the application with only one page.\
    \ In other scenarios, you could create an initial draft of all your pages. To\
    \ illustrate the individual wizards for creating pages, they will be explored\
    \ in more detail in later chapters.\n\nAfter the example application has been\
    \ created, you’ll add shared components to it. Shared components are items and\
    \ structures that are common across all the pages in the application. You will\
    \ prepare breadcrumbs, lists, and lists of values (LOVs) for use; you will also\
    \ learn how the Global Page concept works. By the end of the chapter, you’ll have\
    \ some basic components for the application and a starting outline for the remaining\
    \ pages.\n\n## The Create Application Wizard\n\nApplications in APEX are created\
    \ through application imports, by copying an existing application, or by running\
    \ the Create Application wizard. The Create Application wizard is the first step\
    \ in creating an application from scratch. This chapter will walk you through\
    \ the process of creating the Help Desk application using the Create Application\
    \ wizard.\n\nTo begin, navigate to the Application Builder in APEX. You can do\
    \ this from the APEX Home page by clicking either the Application Builder menu\
    \ item or the Application Builder icon shown in Figure [5-1](#A978-1-4842-0466-5_5_Chapter.html#Fig1).\
    \ The Application Builder shows a list of the current applications. At the top\
    \ of the list is a highlighted Create button, shown in Figure [5-2](#A978-1-4842-0466-5_5_Chapter.html#Fig2).\
    \ Click the button, and the wizard starts.\n\n![A978-1-4842-0466-5_5_Fig2_HTML.jpg](A978-1-4842-0466-5_5_Fig2_HTML.jpg)\n\
    *Figure 5-2. The Create button*\n\n![A978-1-4842-0466-5_5_Fig1_HTML.jpg](A978-1-4842-0466-5_5_Fig1_HTML.jpg)\n\
    *Figure 5-1. The Application Builder icon on the APEX Home page*\n\nYou’re presented\
    \ with four choices for application type: Desktop, Mobile, Websheet, and Packaged\
    \ Application. The Application Builder will quickly become very familiar to you\
    \ when you’re working with APEX. Because of this, the shortcut menu in Figure\
    \ [5-3](#A978-1-4842-0466-5_5_Chapter.html#Fig3) is also available to assist with\
    \ quick navigation even when you’re in other sections of APEX.\n\n![A978-1-4842-0466-5_5_Fig3_HTML.jpg](A978-1-4842-0466-5_5_Fig3_HTML.jpg)\n\
    *Figure 5-3. The shortcut to creating an application*"
  raw: '### Defining UI Defaults for Tables


    UI Defaults can be managed either from SQL Workshop’s Object Browser or from SQL
    Workshop’s Utilities page. Here’s what to do:


    Navigate to SQL Workshop’s UI Defaults page via the drop-down menu on the SQL
    Workshop tab and select Utilities; then, choose User Interface Defaults from the
    drop-down menu. You’re taken to the UI Defaults dashboard, where things likely
    look pretty sparse. This is because you haven’t actually created any UI Defaults
    yet. The first step in creating UI Defaults is to synchronize the Table Dictionary
    with the database so it knows what tables are in your schema.   Click the Table
    Dictionary tab along the top of the page, and then click the Synchronize button
    on the screen that appears. This initiates the Synchronization Wizard. This wizard
    shows you the number of tables with defaults defined and the number without. In
    this case, you should have zero objects with defaults and six objects without.
      Click the Synchronize Defaults button to begin the synchronization with the
    database. This may take a little time. Once the Table Dictionary is synchronized
    with the definitions in the database, you’re presented with the report seen in
    Figure [4-25](#A978-1-4842-0466-5_4_Chapter.html#Fig25), which shows each table
    that now has base UI Defaults. If you have other tables in your schema, they also
    appear in this report.


    ![A978-1-4842-0466-5_4_Fig25_HTML.jpg](A978-1-4842-0466-5_4_Fig25_HTML.jpg)


    Figure 4-25.


    List of objects with UI Defaults defined You can now view or edit the UI Defaults
    for each of these tables. Start by viewing the UI Defaults for the `TICKETS` table:
      Click the TICKETS link in the report. You should see the results shown in Figure
    [4-26](#A978-1-4842-0466-5_4_Chapter.html#Fig26).


    ![A978-1-4842-0466-5_4_Fig26_HTML.jpg](A978-1-4842-0466-5_4_Fig26_HTML.jpg)


    Figure 4-26.


    The table and column UI Defaults overview On the page in Figure [4-26](#A978-1-4842-0466-5_4_Chapter.html#Fig26)
    you can see an overview of the UI Defaults for the `TICKETS` table. In the upper
    portion of the report are the table-level definitions, including what the Form
    and Report regions based on this table will be called. In the lower portion is
    a list of the table’s columns, the labels that will be used, how they will be
    aligned when used in a report, whether they will be displayed in a report or a
    form, whether their `REQUIRED` attribute will be set in a form, and whether they
    have any help text. Next, edit both the table-level and column-level attributes:
      Click the Edit Table Defaults button in the upper-right portion of the report.
    This allows you to edit how Form and Report regions based on this table are named.
      Enter `Manage Tickets` for the Form Region Title, leave the Report Region Title
    as it is, and click Apply Changes.


    Clicking any of the column names takes you to a page that allows you to set UI
    Defaults for that specific column. As you peruse the column UI Defaults, notice
    that several things have been set for you, including the `REQUIRED` attribute.
    When APEX synchronized with the database, it saw that certain fields were marked
    as `NOT NULL` at the database level and translated those constraints into UI Defaults
    for you.


    APEX also makes some decisions based on the column’s data type, such as how to
    align the column when it’s displayed in a report. Use the following information
    to alter the UI Defaults for the indicated columns by clicking the link in the
    column name:


    *   Column: SUBJECT

    *   Label: Subject

    *   Help Text: A brief title for the issue.

    *   Column: DESCR

    *   Label: Description

    *   Help Text: Describes the ticket in detail. Please be as complete as you can.

    *   Resizable: YES

    *   Width: 50

    *   Height: 5

    *   Column: STATUS_ID

    *   Label: Status


    If you wish, you can go ahead and set the UI Defaults for any of the other columns
    and/or tables. Just remember, what you do now will affect what the wizards create
    for you later, so if something doesn’t look exactly like what is shown in this
    book, check what you set for UI Defaults.


    ## Summary


    SQL Workshop may not measure up to some of the more popular GUI tools, but it
    certainly has the power to do most things you need to do relating to the creation
    and management of tables and data. You’ve also seen that SQL Workshop has a few
    built-in but hidden gems like the Create Lookup Table Wizard. Finally, among the
    many useful utilities is the UI Defaults manager, making your job as a developer
    just a bit easier.


    Sure, this chapter hasn’t covered SQL Workshop in its entirety, but you’ve definitely
    gained a fair amount of insight as to what it’s capable of. You will use SQL Workshop
    for a number of other things throughout this book, but don’t wait. Go poke around
    in some of the dark nooks and crannies and see what you find!


    # 5. Applications and Navigation


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​5](http://dx.doi.org/10.1007/978-1-4842-0466-5_5))
    contains supplementary material, which is available to authorized users.


    With some basic data created, you can now create the shell for your application.
    APEX provides a wizard for creating applications. Several options are available
    within the wizard to assist with generating a starting application. Based on how
    much prior planning has been done, the result of running the initial application
    wizard may vary. You will start this chapter by walking through the steps of the
    wizard, as I highlight the most common features.


    For the example application, you will create the most basic shell of the application
    with only one page. In other scenarios, you could create an initial draft of all
    your pages. To illustrate the individual wizards for creating pages, they will
    be explored in more detail in later chapters.


    After the example application has been created, you’ll add shared components to
    it. Shared components are items and structures that are common across all the
    pages in the application. You will prepare breadcrumbs, lists, and lists of values
    (LOVs) for use; you will also learn how the Global Page concept works. By the
    end of the chapter, you’ll have some basic components for the application and
    a starting outline for the remaining pages.


    ## The Create Application Wizard


    Applications in APEX are created through application imports, by copying an existing
    application, or by running the Create Application wizard. The Create Application
    wizard is the first step in creating an application from scratch. This chapter
    will walk you through the process of creating the Help Desk application using
    the Create Application wizard.


    To begin, navigate to the Application Builder in APEX. You can do this from the
    APEX Home page by clicking either the Application Builder menu item or the Application
    Builder icon shown in Figure [5-1](#A978-1-4842-0466-5_5_Chapter.html#Fig1). The
    Application Builder shows a list of the current applications. At the top of the
    list is a highlighted Create button, shown in Figure [5-2](#A978-1-4842-0466-5_5_Chapter.html#Fig2).
    Click the button, and the wizard starts.


    ![A978-1-4842-0466-5_5_Fig2_HTML.jpg](A978-1-4842-0466-5_5_Fig2_HTML.jpg)


    Figure 5-2.


    The Create button


    ![A978-1-4842-0466-5_5_Fig1_HTML.jpg](A978-1-4842-0466-5_5_Fig1_HTML.jpg)


    Figure 5-1.


    The Application Builder icon on the APEX Home page


    You’re presented with four choices for application type: Desktop, Mobile, Websheet,
    and Packaged Application. The Application Builder will quickly become very familiar
    to you when you’re working with APEX. Because of this, the shortcut menu in Figure
    [5-3](#A978-1-4842-0466-5_5_Chapter.html#Fig3) is also available to assist with
    quick navigation even when you’re in other sections of APEX.


    ![A978-1-4842-0466-5_5_Fig3_HTML.jpg](A978-1-4842-0466-5_5_Fig3_HTML.jpg)


    Figure 5-3.


    The shortcut to creating an application'
  trans: "\n### 为表格定义 UI 默认值\n\nUI 默认值既可以从 SQL Workshop 的“对象浏览器”管理，也可以从 SQL Workshop\
    \ 的“实用程序”页面管理。操作步骤如下：\n\n通过 SQL Workshop 选项卡上的下拉菜单导航至 SQL Workshop 的 UI 默认值页面，然后选择“实用程序”；接着，从下拉菜单中选择“用户界面默认值”。您将进入\
    \ UI 默认值仪表板，此时看起来可能相当空旷。这是因为您实际上尚未创建任何 UI 默认值。创建 UI 默认值的第一步是将表字典与数据库同步，以便其了解您的模式中有哪些表。点击页面顶部的“表字典”选项卡，然后在出现的屏幕上点击“同步”按钮。这将启动同步向导。此向导会显示已定义默认值的表数量和未定义默认值的表数量。在此情况下，您应该有零个具有默认值的对象和六个没有默认值的对象。点击“同步默认值”按钮以开始与数据库同步。这可能需要一点时间。一旦表字典与数据库中的定义同步完成，您将看到如图\
    \ 4-25 所示的报告，其中显示了每个现在具有基本 UI 默认值的表。如果您的模式中还有其他表，它们也会出现在此报告中。\n\n![A978-1-4842-0466-5_4_Fig25_HTML.jpg](img/A978-1-4842-0466-5_4_Fig25_HTML.jpg)\n\
    *图 4-25. 已定义 UI 默认值的对象列表*\n\n现在，您可以查看或编辑这些表中每一个的 UI 默认值。首先查看 `TICKETS` 表的 UI 默认值：点击报告中的\
    \ `TICKETS` 链接。您应该会看到如图 4-26 所示的结果。\n\n![A978-1-4842-0466-5_4_Fig26_HTML.jpg](img/A978-1-4842-0466-5_4_Fig26_HTML.jpg)\n\
    *图 4-26. 表和列 UI 默认值概览*\n\n在图 4-26 的页面上，您可以看到 `TICKETS` 表 UI 默认值的概览。报告的上半部分是表级定义，包括基于此表的表单和报告区域将被称为什么。下半部分是表的列列表、将使用的标签、它们在报告中使用时的对齐方式、是否在报告或表单中显示、是否在表单中设置其\
    \ `REQUIRED` 属性，以及它们是否有任何帮助文本。接下来，编辑表级和列级属性：点击报告右上角的“编辑表默认值”按钮。这允许您编辑基于此表的表单和报告区域的命名方式。为“表单区域标题”输入\
    \ `Manage Tickets`，将“报告区域标题”保留原样，然后点击“应用更改”。\n\n点击任何列名将转到一个页面，允许您为该特定列设置 UI 默认值。当您浏览列\
    \ UI 默认值时，请注意有些内容已为您设置好，包括 `REQUIRED` 属性。当 APEX 与数据库同步时，它会看到某些字段在数据库级别被标记为 `NOT\
    \ NULL`，并将这些约束转换为 UI 默认值供您使用。\n\nAPEX 还会根据列的数据类型做出一些决策，例如在报告中显示时如何对齐列。使用以下信息，通过点击列名中的链接来修改指定列的\
    \ UI 默认值：\n\n*   列：`SUBJECT`\n    *   标签：`Subject`\n    *   帮助文本：`A brief title\
    \ for the issue.`\n*   列：`DESCR`\n    *   标签：`Description`\n    *   帮助文本：`Describes\
    \ the ticket in detail. Please be as complete as you can.`\n    *   可调整大小：`YES`\n\
    \    *   宽度：`50`\n    *   高度：`5`\n*   列：`STATUS_ID`\n    *   标签：`Status`\n\n如果您愿意，可以继续为其他任何列和/或表设置\
    \ UI 默认值。请记住，您现在所做的操作将影响向导稍后为您创建的内容，因此如果某些内容看起来与本书中所示的不完全一致，请检查您为 UI 默认值设置了什么。\n\
    \n## 总结\n\nSQL Workshop 可能比不上一些更流行的 GUI 工具，但它无疑具备了您在创建和管理表和数据时所需的大部分功能。您也已经看到，SQL\
    \ Workshop 有一些内置但隐藏的瑰宝，比如“创建查找表向导”。最后，在众多实用工具中，UI 默认值管理器使您作为开发人员的工作变得更加轻松。\n\n\
    当然，本章并未涵盖 SQL Workshop 的全部内容，但您肯定已经对其功能有了相当多的了解。在本书的后续部分，您将使用 SQL Workshop 完成许多其他任务，但现在不必等待。去那些黑暗的角落探索一番，看看您能发现什么吧！\n\
    \n# 5. 应用程序与导航\n\n电子补充材料：本章的在线版本（doi:[10.​1007/​978-1-4842-0466-5_​5](http://dx.doi.org/10.1007/978-1-4842-0466-5_5)）包含补充材料，可供授权用户使用。\n\
    \n在创建了一些基本数据之后，您现在可以为您的应用程序创建框架。APEX 提供了一个用于创建应用程序的向导。向导内提供多个选项，以帮助生成起始应用程序。根据前期规划的多少，运行初始应用程序向导的结果可能会有所不同。本章将从逐步讲解向导的步骤开始，同时我将重点介绍最常见的功能。\n\
    \n对于示例应用程序，您将创建仅包含一个页面的最基础的应用程序框架。在其他场景中，您可以创建所有页面的初始草稿。为了说明用于创建页面的各个向导，它们将在后面的章节中更详细地探讨。\n\
    \n示例应用程序创建完成后，您将为其添加共享组件。共享组件是在应用程序所有页面中通用的项目和结构。您将准备面包屑导航、列表和值列表（LOV）以供使用；您还将了解全局页面概念的工作原理。到本章结束时，您将拥有应用程序的一些基本组件以及其余页面的起始大纲。\n\
    \n## 创建应用程序向导\n\nAPEX 中的应用程序可以通过应用程序导入、复制现有应用程序或运行“创建应用程序向导”来创建。“创建应用程序向导”是从头开始创建应用程序的第一步。本章将引导您完成使用“创建应用程序向导”创建“帮助台”应用程序的过程。\n\
    \n首先，导航到 APEX 中的“应用程序生成器”。您可以从 APEX 主页点击“应用程序生成器”菜单项或如图 5-1 所示的“应用程序生成器”图标来完成此操作。“应用程序生成器”会显示当前应用程序的列表。列表顶部是一个高亮的“创建”按钮，如图\
    \ 5-2 所示。点击该按钮，向导即启动。\n\n![A978-1-4842-0466-5_5_Fig2_HTML.jpg](img/A978-1-4842-0466-5_5_Fig2_HTML.jpg)\n\
    *图 5-2. “创建”按钮*\n\n![A978-1-4842-0466-5_5_Fig1_HTML.jpg](img/A978-1-4842-0466-5_5_Fig1_HTML.jpg)\n\
    *图 5-1. APEX 主页上的“应用程序生成器”图标*\n\n您将看到四种应用程序类型的选择：桌面、移动设备、网页表格和打包应用程序。当您使用 APEX\
    \ 时，“应用程序生成器”很快就会变得非常熟悉。因此，即使在 APEX 的其他部分，图 5-3 中的快捷菜单也可用于辅助快速导航。\n\n![A978-1-4842-0466-5_5_Fig3_HTML.jpg](img/A978-1-4842-0466-5_5_Fig3_HTML.jpg)\n\
    *图 5-3. 创建应用程序的快捷方式*\n"
- fmt: '### Sample and Packaged Applications


    If this is a new workspace, there may or may not be a sample application that
    was created automatically when the workspace was provisioned. The automatic installation
    of sample applications is a feature setting that can be configured by the `APEX`
    administrator. If a sample application isn’t installed, you can install one manually
    by choosing `Packaged Application` in the first step of the `Create Application
    wizard`, as shown in Figure [5-4](#A978-1-4842-0466-5_5_Chapter.html#Fig4).


    ![A978-1-4842-0466-5_5_Fig4_HTML.jpg](A978-1-4842-0466-5_5_Fig4_HTML.jpg)

    Figure 5-4. Choosing the type of application


    The `Packaged Apps` section is where you can install and manage the applications
    that are bundled with the `APEX` distribution. The main page, shown in Figure
    [5-5](#A978-1-4842-0466-5_5_Chapter.html#Fig5), shows the `Packaged Apps Home
    page`, available from `APEX`’s main navigation menu. From here you can see which
    applications are installed and can navigate to the three subsections.


    ![A978-1-4842-0466-5_5_Fig5_HTML.jpg](A978-1-4842-0466-5_5_Fig5_HTML.jpg)

    Figure 5-5. The Packaged Apps Home page


    #### Packaged App Gallery


    The `Packaged App Gallery` presents all of the applications that come bundled
    with the `APEX` distribution. There are 35 separate packaged apps that can belong
    to several different categories, including `Software Development`, `Tracking`,
    `Team Productivity`, `Marketing`, `Knowledge Management`, `IT Management`, `Project
    Management`, `Sample Application`, and `Sample Websheet`.


    Clicking on the icon of an application takes you to a detailed information page
    for that application. Here, you’ll be able to see a screenshot of the application,
    read its full description, and see version information for the app, as seen in
    Figure [5-6](#A978-1-4842-0466-5_5_Chapter.html#Fig6).


    ![A978-1-4842-0466-5_5_Fig6_HTML.jpg](A978-1-4842-0466-5_5_Fig6_HTML.jpg)

    Figure 5-6. The Checklist Manager Packaged Apps information page


    Clicking the `Install Application` button will step you through the process of
    installing the selected application in your current workspace. A pop-up installation
    wizard will present you with a choice of which authentication method to use; it
    normally defaults to `Application Express Accounts`. Clicking the final `Install
    Application` button in the wizard will install the application and any of its
    supporting objects, including any required database objects. Once the installation
    is complete, you’re taken back to the application’s information page where, as
    shown in Figure [5-7](#A978-1-4842-0466-5_5_Chapter.html#Fig7), you can see the
    application has been successfully installed, and you’re given the options to manage
    and run the application.


    ![A978-1-4842-0466-5_5_Fig7_HTML.jpg](A978-1-4842-0466-5_5_Fig7_HTML.jpg)

    Figure 5-7. See that the Checklist Manager App has been successfully installed


    There are a few things that you should know about Packaged Applications:


    Any application that has “Sample” in the name is there to demonstrate functionality
    available in `APEX` and therefore will be installed in an unlocked state by default.
    This means that developers will be able to edit the application and see how the
    `APEX` team developed the app. Applications that do not have “Sample” in the name
    are provided as production ready and will be installed in a locked state that
    does not allow any editing until the app is specifically unlocked. This can be
    done via the `Manage` button, as shown in Figure [5-7](#A978-1-4842-0466-5_5_Chapter.html#Fig7).
    Any of these applications that are installed and remain locked are fully supported
    by `Oracle` in a production environment. These locked applications can also be
    upgraded to more current versions that may come with future versions of `APEX`.
    The moment you unlock them, all support from `Oracle` ceases, upgradeability expires,
    and there is no way to relock an application. As of `APEX 5.0`, all Packaged Applications
    are installed into the workspace’s default “parse as” schema. Currently there
    is no direct way to install them in a secondary “parse as” schema without first
    unlocking and exporting the application, thereby voiding any support.


    Even though the sample apps were written as learning aids, there is a lot to be
    learned from many of the production-ready applications as well. I heartily suggest
    your first act after finishing this book is to take a look at the inner workings
    of some of the packaged apps.


    #### Packaged App Dashboard


    As shown in Figure [5-8](#A978-1-4842-0466-5_5_Chapter.html#Fig8), the dashboard
    page presents an overview of the utilization of `Packaged Apps` in the current
    workspace. You’re presented with the total number of available apps, the number
    installed, and whether there are any applications that can be upgraded. You can
    also see who has installed the apps and how frequently they are used.


    ![A978-1-4842-0466-5_5_Fig8_HTML.jpg](A978-1-4842-0466-5_5_Fig8_HTML.jpg)

    Figure 5-8. The Packaged Apps dashboard


    #### Packaged App Administration


    The `Packaged App Administration` page provides a list of administration tasks
    specifically related to the Packaged Applications installed in the current workspace.
    If you are logged in as a developer, you’ll only see options relating to managing
    `Interactive Report` settings and `Activity` reports. However, when logged in
    as a workspace administrator, you’ll see a section called `Manage Services` that
    shows a small subsection of what is available to you in the full `Administration`
    section.


    ### Websheet Applications


    This book will cover websheet application features in [Chapters 11](#A978-1-4842-0466-5_11_Chapter.html)
    and [12](#A978-1-4842-0466-5_12_Chapter.html). The starting point for creating
    a websheet application is the same as for a database application. The primary
    difference is the creation of predefined database objects that support websheet
    applications.


    ### Database Applications from Spreadsheets


    When creating desktop applications from the wizard, you’re quickly faced with
    a question: where is your data coming from? One of the links listed in Figure
    [5-4](#A978-1-4842-0466-5_5_Chapter.html#Fig4) lets you create an application
    based on data from an existing spreadsheet. If you choose this option, the `Create
    Application wizard` provides steps for loading data into a single table, and at
    the same time creates an application that allows you to manage and manipulate
    that data. The application is very simple, using a report and form combination
    such as that shown in Figure [5-9](#A978-1-4842-0466-5_5_Chapter.html#Fig9). Creating
    a database application from a spreadsheet is a fast and easy way to get from a
    single-page spreadsheet to a working online application that can be expanded with
    additional tools and functionality.


    ![A978-1-4842-0466-5_5_Fig9_HTML.jpg](A978-1-4842-0466-5_5_Fig9_HTML.jpg)

    Figure 5-9. The application pages from a spreadsheet application


    ### Applications from Scratch


    When you create an application from scratch, the wizard offers many interesting
    options. You can create any number of pages, and link pages to different tables
    of data. Additional steps give advanced options that, when planned for, are very
    powerful. Creating an application from scratch is the method used in the ticketing-application
    exercise. Here is what to do to begin the creation process:


    1.  Navigate to the `Application Builder`, and click the `Create` button to initiate
    the `Create Application wizard`.

    2.  Select `Desktop` as the application type, and click `Next`.


    The following subsections describe the remainder of the creation process in detail.
    Each subsection contains one or more subsequent steps in the creation process.
    Read the descriptions and follow the steps as described.'
  raw: '### Sample and Packaged Applications


    If this is a new workspace, there may or may not be a sample application that
    was created automatically when the workspace was provisioned. The automatic installation
    of sample applications is a feature setting that can be configured by the APEX
    administrator. If a sample application isn’t installed, you can install one manually
    by choosing Packaged Application in the first step of the Create Application wizard,
    as shown in Figure [5-4](#A978-1-4842-0466-5_5_Chapter.html#Fig4).


    ![A978-1-4842-0466-5_5_Fig4_HTML.jpg](A978-1-4842-0466-5_5_Fig4_HTML.jpg)


    Figure 5-4.


    Choosing the type of application


    The Packaged Apps section is where you can install and manage the applications
    that are bundled with the APEX distribution. The main page, shown in Figure [5-5](#A978-1-4842-0466-5_5_Chapter.html#Fig5),
    shows the Packaged Apps Home page, available from APEX’s main navigation menu.
    From here you can see which applications are installed and can navigate to the
    three subsections.


    ![A978-1-4842-0466-5_5_Fig5_HTML.jpg](A978-1-4842-0466-5_5_Fig5_HTML.jpg)


    Figure 5-5.


    The Packaged Apps Home page


    #### Packaged App Gallery


    The Packaged App Gallery presents all of the applications that come bundled with
    the APEX distribution. There are 35 separate packaged apps that can belong to
    several different categories, including Software Development, Tracking, Team Productivity,
    Marketing, Knowledge Management, IT Management, Project Management, Sample Application,
    and Sample Websheet.


    Clicking on the icon of an application takes you to a detailed information page
    for that application. Here, you’ll be able to see a screenshot of the application,
    read its full description, and see version information for the app, as seen in
    Figure [5-6](#A978-1-4842-0466-5_5_Chapter.html#Fig6).


    ![A978-1-4842-0466-5_5_Fig6_HTML.jpg](A978-1-4842-0466-5_5_Fig6_HTML.jpg)


    Figure 5-6.


    The Checklist Manager Packaged Apps information page


    Clicking the Install Application button will step you through the process of installing
    the selected application in your current workspace. A pop-up installation wizard
    will present you with a choice of which authentication method to use; it normally
    defaults to Application Express Accounts. Clicking the final Install Application
    button in the wizard will install the application and any of its supporting objects,
    including any required database objects. Once the installation is complete, you’re
    taken back to the application’s information page where, as shown in Figure [5-7](#A978-1-4842-0466-5_5_Chapter.html#Fig7),
    you can see the application has been successfully installed, and you’re given
    the options to manage and run the application.


    ![A978-1-4842-0466-5_5_Fig7_HTML.jpg](A978-1-4842-0466-5_5_Fig7_HTML.jpg)


    Figure 5-7.


    See that the Checklist Manager App has been successfully installed


    There are a few things that you should know about Packaged Applications:


    Any application that has “Sample” in the name is there to demonstrate functionality
    available in APEX and therefore will be installed in an unlocked state by default.
    This means that developers will be able to edit the application and see how the
    APEX team developed the app.   Applications that do not have “Sample” in the name
    are provided as production ready and will be installed in a locked state that
    does not allow any editing until the app is specifically unlocked. This can be
    done via the Manage button, as shown in Figure [5-7](#A978-1-4842-0466-5_5_Chapter.html#Fig7).
    Any of these applications that are installed and remain locked are fully supported
    by Oracle in a production environment. These locked applications can also be upgraded
    to more current versions that may come with future versions of APEX. The moment
    you unlock them, all support from Oracle ceases, upgradeability expires, and there
    is no way to relock an application.   As of APEX 5.0, all Packaged Applications
    are installed into the workspace’s default “parse as” schema. Currently there
    is no direct way to install them in a secondary “parse as” schema without first
    unlocking and exporting the application, thereby voiding any support.  


    Even though the sample apps were written as learning aids, there is a lot to be
    learned from many of the production-ready applications as well. I heartily suggest
    your first act after finishing this book is to take a look at the inner workings
    of some of the packaged apps.


    #### Packaged App Dashboard


    As shown in Figure [5-8](#A978-1-4842-0466-5_5_Chapter.html#Fig8), the dashboard
    page presents an overview of the utilization of Packaged Apps in the current workspace.
    You’re presented with the total number of available apps, the number installed,
    and whether there are any applications that can be upgraded. You can also see
    who has installed the apps and how frequently they are used.


    ![A978-1-4842-0466-5_5_Fig8_HTML.jpg](A978-1-4842-0466-5_5_Fig8_HTML.jpg)


    Figure 5-8.


    The Packaged Apps dashboard


    #### Packaged App Administration


    The Packaged App Administration page provides a list of administration tasks specifically
    related to the Packaged Applications installed in the current workspace. If you
    are logged in as a developer, you’ll only see options relating to managing Interactive
    Report settings and Activity reports. However, when logged in as a workspace administrator,
    you’ll see a section called Manage Services that shows a small subsection of what
    is available to you in the full Administration section.


    ### Websheet Applications


    This book will cover websheet application features in [Chapters 11](#A978-1-4842-0466-5_11_Chapter.html)
    and [12](#A978-1-4842-0466-5_12_Chapter.html). The starting point for creating
    a websheet application is the same as for a database application. The primary
    difference is the creation of predefined database objects that support websheet
    applications.


    ### Database Applications from Spreadsheets


    When creating desktop applications from the wizard, you’re quickly faced with
    a question: where is your data coming from? One of the links listed in Figure
    [5-4](#A978-1-4842-0466-5_5_Chapter.html#Fig4) lets you create an application
    based on data from an existing spreadsheet. If you choose this option, the Create
    Application wizard provides steps for loading data into a single table, and at
    the same time creates an application that allows you to manage and manipulate
    that data. The application is very simple, using a report and form combination
    such as that shown in Figure [5-9](#A978-1-4842-0466-5_5_Chapter.html#Fig9). Creating
    a database application from a spreadsheet is a fast and easy way to get from a
    single-page spreadsheet to a working online application that can be expanded with
    additional tools and functionality.


    ![A978-1-4842-0466-5_5_Fig9_HTML.jpg](A978-1-4842-0466-5_5_Fig9_HTML.jpg)


    Figure 5-9.


    The application pages from a spreadsheet application


    ### Applications from Scratch


    When you create an application from scratch, the wizard offers many interesting
    options. You can create any number of pages, and link pages to different tables
    of data. Additional steps give advanced options that, when planned for, are very
    powerful. Creating an application from scratch is the method used in the ticketing-application
    exercise. Here is what to do to begin the creation process:


    Navigate to the Application Builder, and click the Create button to initiate the
    Create Application wizard.   Select Desktop as the application type, and click
    Next.  


    The following subsections describe the remainder of the creation process in detail.
    Each subsection contains one or more subsequent steps in the creation process.
    Read the descriptions and follow the steps as described.'
  trans: '

    ### 示例与打包应用程序


    如果这是一个新建的工作区，可能有一个在配置工作区时自动创建的示例应用程序，也可能没有。自动安装示例应用程序是一项功能设置，可由 `APEX` 管理员配置。如果未安装示例应用程序，您可以通过在
    `创建应用程序向导` 的第一步中选择 `打包应用程序` 来手动安装一个，如图 5-4 所示。


    ![A978-1-4842-0466-5_5_Fig4_HTML.jpg](img/A978-1-4842-0466-5_5_Fig4_HTML.jpg)

    图 5-4. 选择应用程序类型


    `打包应用程序` 部分是您安装和管理随 `APEX` 发行版捆绑的应用程序的地方。如图 5-5 所示的主页，展示了可从 `APEX` 主导航菜单访问的 `打包应用程序主页`。从这里，您可以看到已安装了哪些应用程序，并可导航到三个子部分。


    ![A978-1-4842-0466-5_5_Fig5_HTML.jpg](img/A978-1-4842-0466-5_5_Fig5_HTML.jpg)

    图 5-5. 打包应用程序主页


    #### 打包应用程序库


    `打包应用程序库` 展示了所有随 `APEX` 发行版捆绑的应用程序。共有 35 个独立的打包应用程序，它们可能属于多个不同的类别，包括 `软件开发`、`跟踪`、`团队生产力`、`市场营销`、`知识管理`、`IT
    管理`、`项目管理`、`示例应用程序` 和 `示例 Web 表`。


    点击应用程序的图标将带您进入该应用程序的详细信息页面。在这里，您将能够看到应用程序的屏幕截图、阅读其完整描述并查看应用程序的版本信息，如图 5-6 所示。


    ![A978-1-4842-0466-5_5_Fig6_HTML.jpg](img/A978-1-4842-0466-5_5_Fig6_HTML.jpg)

    图 5-6. 清单管理器打包应用程序信息页面


    点击 `安装应用程序` 按钮将引导您完成在当前工作区中安装所选应用程序的过程。一个弹出式安装向导将让您选择要使用的身份验证方法；它通常默认为 `应用程序 Express
    帐户`。点击向导中的最后一个 `安装应用程序` 按钮将安装应用程序及其所有支持对象，包括任何必需的数据库对象。安装完成后，您将被带回应用程序的信息页面，如图
    5-7 所示，您可以看到应用程序已成功安装，并且会看到管理和运行该应用程序的选项。


    ![A978-1-4842-0466-5_5_Fig7_HTML.jpg](img/A978-1-4842-0466-5_5_Fig7_HTML.jpg)

    图 5-7. 查看清单管理器应用程序已成功安装


    关于打包应用程序，有几点您需要了解：


    任何名称中包含“示例”的应用程序都是为了演示 `APEX` 中可用的功能而存在的，因此默认情况下将以未锁定状态安装。这意味着开发者将能够编辑该应用程序并查看
    `APEX` 团队是如何开发该应用程序的。名称中不包含“示例”的应用程序是作为生产就绪版本提供的，并将以锁定状态安装，在应用程序被明确解锁之前不允许任何编辑。这可以通过
    `管理` 按钮完成，如图 5-7 所示。任何已安装并保持锁定的此类应用程序在生产环境中都得到 `Oracle` 的完全支持。这些锁定的应用程序也可以升级到未来
    `APEX` 版本中可能附带的更新版本。一旦您解锁它们，`Oracle` 的所有支持即告终止，升级能力失效，并且无法重新锁定应用程序。截至 `APEX 5.0`，所有打包应用程序都安装到工作区的默认“解析为”模式中。目前，没有直接的方法可以在不先解锁并导出应用程序（从而使其失去任何支持）的情况下将它们安装到次要的“解析为”模式中。


    尽管示例应用程序是作为学习辅助工具编写的，但从许多生产就绪的应用程序中也能学到很多东西。我衷心建议您在读完本书后的第一个动作，就是去看看一些打包应用程序的内部工作原理。


    #### 打包应用程序仪表板


    如图 5-8 所示，仪表板页面展示了当前工作区中 `打包应用程序` 的使用概况。您会看到可用应用程序的总数、已安装的数量以及是否有任何可以升级的应用程序。您还可以看到谁安装了这些应用程序以及它们的使用频率。


    ![A978-1-4842-0466-5_5_Fig8_HTML.jpg](img/A978-1-4842-0466-5_5_Fig8_HTML.jpg)

    图 5-8. 打包应用程序仪表板


    #### 打包应用程序管理


    `打包应用程序管理` 页面提供了与当前工作区中安装的打包应用程序特别相关的管理任务列表。如果您以开发者身份登录，您将只能看到与管理 `交互式报表` 设置和
    `活动` 报告相关的选项。但是，当以工作区管理员身份登录时，您会看到一个名为 `管理服务` 的部分，其中展示了完整 `管理` 部分中可用内容的一个小子集。


    ### Web 表应用程序


    本书将在 第 11 章 和 第 12 章 中介绍 Web 表应用程序功能。创建 Web 表应用程序的起点与创建数据库应用程序相同。主要区别在于会创建支持 Web
    表应用程序的预定义数据库对象。


    ### 从电子表格创建数据库应用程序


    通过向导创建桌面应用程序时，您很快会面临一个问题：您的数据从何而来？图 5-4 中列出的链接之一允许您基于现有电子表格中的数据创建应用程序。如果您选择此选项，`创建应用程序向导`
    将提供将数据加载到单个表中的步骤，同时创建一个允许您管理和操作该数据的应用程序。该应用程序非常简单，使用报表和表单的组合，如图 5-9 所示。从电子表格创建数据库应用程序是一种快速简便的方法，可将单页电子表格转换为可扩展并添加其他工具和功能的工作在线应用程序。


    ![A978-1-4842-0466-5_5_Fig9_HTML.jpg](img/A978-1-4842-0466-5_5_Fig9_HTML.jpg)

    图 5-9. 来自电子表格应用程序的应用程序页面


    ### 从零开始创建应用程序


    当您从零开始创建应用程序时，向导会提供许多有趣的选项。您可以创建任意数量的页面，并将页面链接到不同的数据表。额外的步骤提供了高级选项，如果提前规划好，这些选项将非常强大。从零开始创建应用程序是在票务应用程序练习中使用的方法。以下是开始创建过程的操作步骤：


    1.  导航到 `应用程序构建器`，并点击 `创建` 按钮以启动 `创建应用程序向导`。

    2.  选择 `桌面` 作为应用程序类型，然后点击 `下一步`。


    以下小节详细描述了剩余的创建过程。每个小节包含创建过程中的一个或多个后续步骤。请阅读描述并按照所述步骤操作。

    '
- fmt: '#### Naming the Application


    After selecting the Desktop application option, you’re prompted for details of
    the application, as shown in Figure [5-10](#A978-1-4842-0466-5_5_Chapter.html#Fig10).
    The `Schema` select list exists for workspaces that have been granted access to
    more than one database schema, and it allows you to choose which schema you want
    your application to use as its “parse as” schema. The `Name` value is what you
    use to identify the application inside the builder and is used as the title of
    the application.


    ![A978-1-4842-0466-5_5_Fig10_HTML.jpg](A978-1-4842-0466-5_5_Fig10_HTML.jpg)

    Figure 5-10. Entering the application properties


    Application `ID`s must be unique across the entire instance of `APEX`, so it’s
    best to leave the `ID` set to the number `APEX` has assigned.


    The next options reference the `APEX` Theme and Theme Style. `APEX` themes are
    groupings of templates that are used to establish the look and feel of pages,
    reports, buttons, and other graphical components. As `APEX` and web standards
    evolve, so do the premade themes in `APEX`. Version 5.0 offers a groundbreaking
    new theme option called the Universal Theme, as well as includes a number of HTML5/CSS3-compliant
    themes and a responsive theme, along with legacy themes, some of which have been
    around for quite a long time.


    Although `APEX` currently comes with 27 desktop themes of varying looks, it’s
    always possible to customize an existing theme or to create a completely new one.
    The `APEX` administrator also has the ability to create themes that are specific
    to their instance of `APEX`. Choosing a theme as part of the Create Application
    wizard is an easy way to apply a default theme. As you might expect, you can change
    your mind later and apply a different theme. Additional themes can be added, modified,
    and tested as part of the shared components of `APEX`.


    Figure [5-11](#A978-1-4842-0466-5_5_Chapter.html#Fig11) shows the `APEX` theme
    chooser. The select list at the top of the region dictates which themes to show.
    Your choices are as follows:


    *   Standard Themes: Currently, for `APEX` 5.0 this only shows the Universal Theme.
    All other themes within `APEX` are now considered “legacy themes.”

    *   Custom Themes: Shows any custom themes that have been installed by the workspace
    or instance administrator. By default, there are no custom themes.

    *   All Themes: Shows all available themes across all the previous sets, including
    the 26 legacy themes.


    ![A978-1-4842-0466-5_5_Fig11_HTML.jpg](A978-1-4842-0466-5_5_Fig11_HTML.jpg)

    Figure 5-11. Theme selection


    The Theme Style option is a subselection of the chosen theme and will present
    the styles available under that theme. Currently, only the Universal Theme has
    related theme styles.


    Having reviewed the themes, continue the creation process by choosing the Universal
    Theme for your example application. Follow these steps:


    Enter `Help Desk` for the `Name`, making sure your `Schema` is set. Select Universal
    Theme (42) from the Theme select list, and then choose Vita as the Theme Style
    for your application. Click Next.


    #### Laying Out Pages


    The next step in the wizard is to decide which pages you need for your application.
    The wizard requires at least one page to be created, but Figure [5-12](#A978-1-4842-0466-5_5_Chapter.html#Fig12)
    shows that you have the option to create as many pages as you like.


    ![A978-1-4842-0466-5_5_Fig12_HTML.jpg](A978-1-4842-0466-5_5_Fig12_HTML.jpg)

    Figure 5-12. Multiple pages defined in the Create Application wizard


    The Add Page Button at the bottom of this page invokes a pop-up wizard that allows
    you to define pages of varying types. Each page type calls for different information
    to be provided. For instance, adding a report page prompts you to select either
    a table name or a query on which to base the report. Choosing a chart requires
    a chart type and a query for the initial data series.


    For now, you’ll stick with the blank home page and create the rest of the pages
    later as needed. Thus, the next step is simple:


    An application home page has already been created. Accept the defaults on this
    page and click Next.


    #### Copying Shared Components


    The next screen asks whether you wish to copy shared components from another application.
    This comes in handy if you have a template application that houses components
    that are shared across applications in the same workspace. Copying shared components
    isn’t an advanced procedure, but it does lend itself to a controlled and mature
    development process. This step in the wizard is a convenience, because the same
    objects can be copied in other ways after the application has been created. You
    don’t need this step, because you’re creating an application from scratch. Skip
    the step as follows:


    Select `No` for Copy Shared Components from Another Application, and click Next.


    #### Application Attributes


    The next step in the wizard allows you to set some of the application-level attributes,
    such as the type of authentication to use and globalization attributes, including
    from where to derive the primary language, date formats, and so on. Let’s look
    at each of these individually so you can gain a full understanding of the ramifications
    of each.


    ##### Selecting an Authentication Method


    With every application, you need to make a choice about authentication, even if
    that choice is no authentication at all. This topic is discussed further in [Chapter
    9](#A978-1-4842-0466-5_9_Chapter.html). By default, the `APEX` Create Application
    wizard provides three options for authentication:


    *   Application Express Accounts: Users and passwords are local to the `APEX`
    workspace. These users are managed in the same way the developer accounts are
    managed inside the `APEX` workspace, and users only work inside the current workspace.

    *   Database Account: This option uses the Oracle Database schema user names and
    passwords for credentials. Some organizations use this type of database-driven
    authentication to keep track of users. The application still executes as the chosen
    “parse as” schema, not as the individual user in the database.

    *   No Authentication: This is like a public website. Users aren’t prompted for
    any type of authentication. This is useful for informational applications where
    the question “Who are you?” isn’t important.


    For simplicity, the default is to use the Application Express authentication scheme.
    This is the one setting that provides login security; by default, the developer
    writing the application can log in without any additional work.


    Note

    Many organizations have an existing method of authenticating users. If an `LDAP`
    server is currently available (such as Oracle Internet Directory, Microsoft Active
    Directory for network domain authentication, or even an Oracle E-Business suite),
    you may want to use this system for `APEX` authentication. The number of options
    and methods is beyond the scope of this book. Simply know that with the Oracle
    Database technology and the technology of your application server, it’s possible
    to use many of the most common authentication infrastructures.'
