  trans: '## 概要


    APEX 提供了多种工具来帮助您管理工作区，并提供有关工作区的统计报告。某些工具可能影响终端用户，因此应谨慎使用。然而，切勿因需要谨慎而放弃使用那些能让您的工作更轻松的工具。深入了解这些工具，对您的知识保持信心，行动前稍作思考。这些都是成功的关键。


    ## 15. 团队开发


    团队开发是管理 APEX 软件开发的出色工具。它内置于 APEX 开发环境中，允许您使用团队日常使用的工具（如交互式报告）来管理您的 APEX 项目。这消除了对额外项目管理工具的需求。团队开发简单、可扩展且灵活的架构，非常适合管理任何规模的项目。其简洁性适用于希望最小化项目管理开销的小型项目。其可扩展性良好，允许您通过使用其丰富的属性集构建精细的工作分解结构
    (`WBS`) 来管理大型项目。其灵活性让您可以根据组织的软件开发文化进行调整。


    APEX 和团队开发都非常适合敏捷软件开发方法。APEX 的快速应用开发 (`RAD`) 架构使团队能够快速向业务测试人员和终端用户交付定期发布的版本。团队开发的反馈机制能高效地将终端用户的问题传递回开发团队，以便将适当的更改纳入后续版本并轻松记录。团队开发让本已高效的开发平台
    APEX 变得更加高效。


    本章的主要目的是重点介绍团队开发的工作原理。次要目的是说明如何将敏捷软件开发实践与团队开发结合使用，以在满足成本和进度限制的同时交付高质量软件。到本章结束时，您应该对团队开发的内容有很好的理解，并了解一些将其整合到团队开发文化中的想法。


    团队开发是在 APEX 4.0 版本中添加的。APEX 团队在开发 APEX 时，甚至在它作为 APEX 模块发布之前，就已经使用了团队开发的一个版本。这种“用工具构建工具”的设计理念是团队开发和
    APEX 成为实用且易于使用的工具的关键原因。


    ## 团队开发概述


    团队开发由 `里程碑`、`功能`、`待办事项`、`缺陷` 和 `反馈` 组成。这些模块辅以少量称为 `团队操作` 的实用程序，用于管理团队开发环境。实体关系图
    (`ERD`) 说明了主要实体之间的关系（参见图 15-1）。


    ![A978-1-4842-0466-5_15_Fig1_HTML.gif](img/A978-1-4842-0466-5_15_Fig1_HTML.gif)

    图 15-1. 团队开发的简化实体关系图


    团队开发的实体包含在单个工作区内。当您在同一工作区内同时管理多个应用程序时，您和您的团队可以使用该工具的交互式报告轻松筛选团队开发的数据。这样，每个利益相关者只能看到与当前任务直接相关的工作。


    `里程碑` 是团队开发中的高级计划组件。它们可用于跟踪应用程序的主要和次要版本。不要将里程碑与 `功能` 和 `待办事项` 的截止日期混淆。例如，里程碑可以是产品发布的预定日期，但包含在该版本中的功能可能在里程碑日期之前很久就到期了。如果您采用敏捷软件开发策略，里程碑非常适合定义时间盒或
    `冲刺`。


    `功能` 描述了全局概况。在高层次上，它们描述并跟踪客户要求的主要功能块的进度。像 `负责人`、`开始日期`、`截止日期`、`摘要描述`、`优先级`、`状态`
    等属性易于跟踪。此外，您可以选择跟踪各个组件的状态，例如 `用户界面`、`测试`、`文档`、`全球化`、`安全` 和 `可访问性`。与功能关联的自连接允许您随着开发的进展和设计的细化，将功能进一步细分为子功能。功能的高层次特性使其成为管理状态报告的理想来源。


    `待办事项` 用于向个人或团队分配详细工作。跟踪截止日期、时间估算等。与功能类似，待办事项具有自连接功能，允许您在开发过程中获得更多信息时对其进行细分。当单个待办事项需要多个团队成员共同努力时，这非常方便。


    当发现缺陷时，它会作为 `缺陷` 被报告。缺陷有自己的生命周期，包含一组丰富的属性，如 `描述`、`解决方案`、`版本`、`负责人`、`上下文` 和 `日期`
    信息。当您发现一个缺陷实际上是设计缺陷时，团队开发允许您将该缺陷链接到多个功能、里程碑和待办事项，因为修复该缺陷可能需要跨越多个产品发布的扩展时间范围。


    `反馈` 是团队开发的主要亮点之一。反馈机制可以在几分钟内安装到应用程序中，并为整个团队提供一个高效、优雅的沟通渠道，用于评论、建议、问题、缺陷报告和响应。一旦安装到应用程序中，反馈机制就会随着应用程序从开发环境升级到测试环境，再升级到生产环境。反馈数据及相关响应通过
    APEX 导入/导出功能在各种环境之间来回复制。这使得开发人员、测试人员和终端用户能够保持紧密联系。反馈机制的另一个关键特点是，它会自动记录所有终端用户一无所知的关键“幕后”数据。应用程序上下文、环境变量，以及最重要的
    `会话状态` 都会被捕获。在诊断问题时，这些数据非常宝贵。


    乍一看，团队开发的实体似乎包含大量属性。那么，您是否必须输入所有这些属性才能使用团队开发？不。为了充分利用团队开发，您和您的团队必须规划如何使用它，着眼于以最小的努力有效管理软件开发过程。您可以挑选一小部分适合您软件开发文化的团队开发属性，并仅关注该部分数据。交互式报告可以轻松自定义，只显示对您重要的数据。


    ## 团队开发界面


    团队开发界面与整个 APEX 开发界面保持一致。它广泛使用 `仪表板` 来快速让您了解团队的进展情况。深入查看和更新数据的详细信息相当直接和直观。APEX
    开发人员在该工具内导航或自定义交互式报告不会有任何困难。经理、测试人员和业务分析师在经过简短培训后也能使用团队开发。'
- fmt: '## APEX Home Page


    The APEX home page (see Figure [15-2](#A978-1-4842-0466-5_15_Chapter.html#Fig2))
    clearly indicates how important `Team Development` is to the APEX team. The APEX
    team could have easily put `Team Development` under a minor link somewhere on
    the home page. Instead, `Team Development` has been promoted into a marquee module
    that is on an equal footing with the `Application Builder` and the `SQL Workshop`.


    ![A978-1-4842-0466-5_15_Fig2_HTML.jpg](A978-1-4842-0466-5_15_Fig2_HTML.jpg)

    Figure 15-2.


    APEX home page


    The APEX home page highlights the easy and convenient navigation. The `News and
    Messages` region, which will house workspace-level messages as well as news directly
    from `Team Development`, contains two links (`Create News Items` and `Edit News
    Items`) that enable quick changes to the region without having to drill down into
    subpages. In the `Dashboard` region to the right, you’ll see that one of the metrics
    is `Features`. The region to the right-hand side often contains either further
    information or a list of tasks available to the developer. Look for similar links
    throughout the `Team Development` interface; they’re very handy.


    ## Team Development Home Page


    The `Team Development` home page (see Figure [15-3](#A978-1-4842-0466-5_15_Chapter.html#Fig3))
    serves two purposes. First, it contains links to all the detailed entity regions;
    and second, it shows you a dashboard for each entity. You also see links to `Utilities`,
    which will be discussed near the end of this chapter in the section “`Team Development
    Utilities`.”


    ![A978-1-4842-0466-5_15_Fig3_HTML.jpg](A978-1-4842-0466-5_15_Fig3_HTML.jpg)

    Figure 15-3.


    Team Development home page


    The main `Team Development` dashboard page provides a high-level overview of activity
    in the module. From here, users can either add new items or navigate directly
    to the individual detailed dashboard for each area of `Team Development`.


    The detailed dashboards can be filtered by a combination of `assignee`, `release`,
    and `application`, depending on the area. These filters make it easy for users
    to customize the page to their needs. For example, managers can ask, “How are
    we doing?” while a developer can ask, “What do I need to do for this release?”
    This high-level filter region is found at the top of dashboard pages associated
    with each `Team Development` entity. The filter fields are tailored to each entity.
    The dashboard regions link to their underlying entities. There are `Add` and `Edit`
    icons in each header, as well as a circle graph for each item type; when you click
    any of these items, you’re taken the appropriate report, `Create` page, or `Edit`
    page for the related item.


    ## Common Design Elements


    When you drill into the individual `Team Development` entities, you will find
    several common design elements that help you navigate quickly and intuitively
    between entities. Figure [15-4](#A978-1-4842-0466-5_15_Chapter.html#Fig4) highlights
    these design elements. At the upper left is a set of tabs tailored to each entity.
    Some of the tabs—`Dashboard`, `Report`, and `Calendar`—are common to all entities.
    Others are unique to a specific entity.


    ![A978-1-4842-0466-5_15_Fig4_HTML.jpg](A978-1-4842-0466-5_15_Fig4_HTML.jpg)

    Figure 15-4.


    GUI design elements that are common to all entities


    All of the dashboard pages contain a `Filter` region that is tailored to the entity.
    The filter’s select list contains entries for only the entities that are tracked
    by `Team Development`. For example, if there is an `application` that doesn’t
    have any `features` associated with it, that `application` doesn’t appear in the
    select list.


    Many of the individual dashboard regions contain links that take you to the entity’s
    `Report` page and automatically set the filters on the `Details` page’s `interactive
    report` so you see only the entity records that are related to the dashboard item
    you selected. This navigation strategy, once you get used to it, is extremely
    convenient.


    ## Drilldown Functionality


    The `Calendar` tabs (see Figure [15-5](#A978-1-4842-0466-5_15_Chapter.html#Fig5))
    display links to individual entity records based on the entity record’s due date.
    Clicking the entry’s link takes you directly to the `Edit` page for the selected
    entity record. Clicking the `Cancel` button on the `Edit` page returns you to
    the calendar.


    ![A978-1-4842-0466-5_15_Fig5_HTML.jpg](A978-1-4842-0466-5_15_Fig5_HTML.jpg)

    Figure 15-5.


    Calendar with links to an Edit page


    Some of the entity tabs display their data graphically (see Figure [15-6](#A978-1-4842-0466-5_15_Chapter.html#Fig6)).
    Clicking a graph automatically takes you to the entity’s `Details` page and sets
    the `interactive report` to show only the data selected on the graph.


    ![A978-1-4842-0466-5_15_Fig6_HTML.jpg](A978-1-4842-0466-5_15_Fig6_HTML.jpg)

    Figure 15-6.


    Graphic data summary


    ## Tagging


    A powerful organizational attribute called `tags` is associated with all entities.
    A tag is a free-form text input that enables you to group records by a keyword.
    This is handy, because some record groupings don’t fit into the neat and tidy
    relational data model. For example, you might want to be able to find all `features`
    that contain a shuttle item across all `applications`. By adding the tag `“shuttle”`
    to these `features`, you can use the `interactive report` `Search` field to find
    all records that contain the tag of `“shuttle”`. All dashboard pages contain a
    region that displays the tag strings defined in their respective entity. This
    lets you quickly find and correct typos so the free-form tags can be kept accurate.


    ## Getting Past The Initial Discomfort


    At first, `Team Development`’s organization, layout, and navigation might appear
    a bit strange and non-intuitive. I certainly struggled with it at first. My initial
    perception was probably the result of my previous experience with project-management
    tools that use pages with a work-breakdown structure on the left and a Gantt chart
    on the right.


    The initial discomfort with `Team Development` was similar to my first experiences
    with APEX. Like many experienced developers, I came from development environments
    in which screen widgets are listed on the left and dragged onto a screen, and
    in which the X-Y coordinates are set together with a widget’s height and width,
    all at pixel-level precision.


    When I first used APEX, it took a while to get used to how APEX built pages. After
    a few tries, I learned to love the product. I believe the same will be true for
    you with `Team Development`. After a bit of experience, you’ll find that the `interactive
    reports` are, in fact, a practical alternative to Gantt charts, especially in
    an agile software-development environment in which the time boxes are short and
    the lists in the `interactive reports` are correspondingly small.'
