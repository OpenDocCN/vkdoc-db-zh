    2.  在导航部分点击 `Navigation Menu` 链接。

    3.  点击 `Desktop Navigation Menu` 链接以编辑导航条目。

    4.  通过点击其名称编辑 `Admin` 菜单项。

    5.  在 `Authorization` 下，将 `Authorization Scheme` 设置为 `access control - administrator`，然后点击
    `Apply Changes`。


    现在，运行应用程序时，如果用户没有管理员权限，菜单项将不会显示。这避免了导致用户看到访问被拒绝错误消息的事件。


