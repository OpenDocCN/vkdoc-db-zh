- fmt: "## Milestones\n\nMilestones are used to define and track event dates for both\
    \ scheduled and one-time happenings. On the surface, this appears to be a simple\
    \ concept; however, it can be a confusing area, because milestone functionality\
    \ overlaps with `releases` and can be confused with the due dates associated with\
    \ `features`, `to-dos`, and `bugs`. Fortunately, the confusion can be mitigated\
    \ with a bit of planning and organization.\n\nOne strategy you can use to organize\
    \ `milestones` and `releases` is to create one of each for the same release event.\
    \ The `milestone` contains the metadata associated with the `release`: the date,\
    \ a type, the owner, a description, and tags. The `release` is defined as a configurable\
    \ `LOV` that is shared by all Team Development entities, but it contains no descriptive\
    \ metadata. Also, `releases` are one of the handy high-level filters associated\
    \ with `features`, `to-dos`, and `bugs`. The need for both metadata and the high-level\
    \ filters is the reason a `milestone` and a `release` must be used to describe\
    \ the same event. Happily, the overhead in doing this is low.\n\nAnother suggestion\
    \ for workspaces that contain multiple applications is to prefix `features`, `milestones`,\
    \ `releases`, `to-dos`, and `feedback` with the name or code of their associated\
    \ application. In many cases, this isn’t strictly necessary, but it can make some\
    \ of the dashboards more readable, because they often contain only an entity’s\
    \ name without any supporting data.\n\n`Milestones`, of course, are used to define\
    \ and track other events in the software-development lifecycle. Important meetings,\
    \ tool software upgrades, and requirement deliveries are just a few examples.\n\
    \nThe `Milestones` interface contains a number of tabs. The `Dashboard` and `Calendar`\
    \ tabs are common to all entities and were discussed earlier.\n\n### Milestones\
    \ Report Tab\n\nThe `Report` tab in Figure [15-7](#A978-1-4842-0466-5_15_Chapter.html#Fig7)\
    \ displays an interactive report that contains a list of `milestones`. The high-level\
    \ filters let you select all or only future events as well as individual `releases`.\
    \ The `Edit` link in the interactive report takes you to the `milestone`’s Edit\
    \ page, which contains intuitive items that are documented under their labels.\n\
    \n![A978-1-4842-0466-5_15_Fig7_HTML.jpg](A978-1-4842-0466-5_15_Fig7_HTML.jpg)\n\
    \nFigure 15-7. `Milestones` tab\n\n### By Owner Tab\n\nThe `By Owner` tab (see\
    \ Figure [15-8](#A978-1-4842-0466-5_15_Chapter.html#Fig8)) is a dashboard that\
    \ summarizes the relationships between a single `milestone` and the other Team\
    \ Development entities, broken down by owner. Knowing the number and status of\
    \ the related `features`, `to-dos`, and `bugs` is a good management tool that\
    \ is useful for controlling a sprint or time box that leads up to a `release`.\n\
    \n![A978-1-4842-0466-5_15_Fig8_HTML.jpg](A978-1-4842-0466-5_15_Fig8_HTML.jpg)\n\
    \nFigure 15-8. `Milestones By Owner` tab\n\n### Features by Milestone Tab\n\n\
    The `Features by Milestone` tab (See Figure [15-9](#A978-1-4842-0466-5_15_Chapter.html#Fig9))\
    \ contains an interactive report that, in detail, illustrates the relationship\
    \ between `milestones` and the `features` associated with the `milestone`. This\
    \ is mainly a management report.\n\n![A978-1-4842-0466-5_15_Fig9_HTML.jpg](A978-1-4842-0466-5_15_Fig9_HTML.jpg)\n\
    \nFigure 15-9. `Features by Milestone` tab\n\n## Features\n\n`Features` describe\
    \ an application from a high-level perspective. They’re used at the beginning\
    \ of a development project to define the scope well enough that budgetary estimates\
    \ can be made for cost, schedule, and resource requirements. Once the project\
    \ is approved and work begins, child `features` are added to describe, control,\
    \ and track progress in more detail. `Features` are the heart of management status\
    \ reports.\n\nThe `Features` Details page contains a number of tabs. The `Dashboard`,\
    \ `Calendar`, `Focus Areas`, and `Owners` tabs aren’t discussed here because they\
    \ or their equivalents are common to all entities and their characteristics were\
    \ mentioned earlier. The `Report`, `History`, and `Progress Log` tabs are highlighted\
    \ next.\n\n### Features Report Tab\n\nThe `Report` tab (see Figure [15-10](#A978-1-4842-0466-5_15_Chapter.html#Fig10))\
    \ contains an interactive report that, in turn, links to the Edit page for individual\
    \ `feature` records. Because the data grid is an interactive report, each user\
    \ can tailor it to their needs. You can choose your columns from approximately\
    \ 50 attributes, sort to your taste, and even group related records together.\
    \ Interactive reports are discussed in detail in [Chapter 6](#A978-1-4842-0466-5_6_Chapter.html).\n\
    \n![A978-1-4842-0466-5_15_Fig10_HTML.jpg](A978-1-4842-0466-5_15_Fig10_HTML.jpg)\n\
    \nFigure 15-10. `Features` interactive report\n\nThe `Copy` link is useful when\
    \ you’re entering a number of related `features`. For example, if you’re entering\
    \ 10 or 20 `features` that belong to a single application, you might expect many\
    \ of the data attributes to be repeated on every record. The `Copy` link creates\
    \ a new `feature` as an exact copy of the existing one in the interactive report.\
    \ Only the name is changed. Once the new `feature` is created, you can then quickly\
    \ edit it and change the attributes that are unique to that record.\n\nThe `Edit`\
    \ link takes you to the `Features` Edit page (see Figure [15-11](#A978-1-4842-0466-5_15_Chapter.html#Fig11)).\
    \ You can easily explore the individual attributes on your own; their definitions\
    \ are generally self-evident and are documented by clicking an attribute’s label.\
    \ However, there are areas on the `Features` Edit page that deserve more explanation:\n\
    *   `User Interface`, `Testing`, `Documentation`, `Globalization`, `Security`,\
    \ and `Accessibility` regions: These regions are used to track sub-lifecycles\
    \ that are associated with a `feature`. For example, if a separate team is responsible\
    \ for documentation, their progress can be tracked separately from the main `feature`\
    \ (see Figure [15-12](#A978-1-4842-0466-5_15_Chapter.html#Fig12)). If the documentation\
    \ effort isn’t being tracked, then the `Documentation` region can be excluded\
    \ from the `Features` Edit page by turning it off in the Team Development settings\
    \ area. See the subsection later in this chapter on “Team Development Settings.”\n\
    \    ![A978-1-4842-0466-5_15_Fig12_HTML.jpg](A978-1-4842-0466-5_15_Fig12_HTML.jpg)\n\
    \    Figure 15-12. `Features Documentation` region\n    ![A978-1-4842-0466-5_15_Fig11_HTML.jpg](A978-1-4842-0466-5_15_Fig11_HTML.jpg)\n\
    \    Figure 15-11. `Features` Edit page\n*   Configurable lists of values (`LOVs`):\
    \ Some `LOVs`, such as `Status`, are controlled by the APEX team. Others, such\
    \ as `Owner`, are controlled by the development team. Instead of maintaining the\
    \ developer-configurable `LOVs` in a separate maintenance area, these lists are\
    \ maintained in place. For example, to add a new owner, you enter the appropriate\
    \ name in the `New Owner` item and click the `Apply Changes` button, and that\
    \ name is added to the `LOV`. Unfortunately, currently there is no easy and safe\
    \ way to edit these configurable `LOVs`; we hope this ability will be added in\
    \ a future APEX release.\n\n### History Tab\n\nThe `History` tab (see Figure [15-13](#A978-1-4842-0466-5_15_Chapter.html#Fig13))\
    \ presents a detailed audit trail of all changes made to all `features`. The tab\
    \ presents an interactive report that contains information on the `feature`, column\
    \ name, old value, new value, user who made the change, and when the change was\
    \ made. You can view the report on the `History` tab for quality-assurance purposes\
    \ or as a source of evidence if contractual disputes arise.\n\n![A978-1-4842-0466-5_15_Fig13_HTML.jpg](A978-1-4842-0466-5_15_Fig13_HTML.jpg)\n\
    \nFigure 15-13. `Features History` tab"
  raw: "## Milestones\n\nMilestonesare used to define and track event dates for both\
