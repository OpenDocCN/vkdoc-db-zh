    Note


    Dynamic actions that use SQL or PL/SQL for their conditions or body actually make
    a call back to the database server to run the code in question. Depending on the
    weight and complexity of the code, this could potentially introduce performance
    issues. Save the use of SQL and PL/SQL for actions that require interaction with
    the database to retrieve data that isn’t available from directly within the page.


    ### Dynamic Actions Using JavaScript


    In addition to PL/SQL, you can use JavaScript in dynamic actions. In this exercise,
    you will use JavaScript to determine the onscreen status of a ticket that you’re
    editing on page 210\. If the user has set the status to `CLOSED`, the dynamic
    action will automatically set the `Closed On` date to today’s date:


    Edit Page 210 of the application.   Navigate to the Dynamic Actions tab of the
    Tree Pane.   Create a new dynamic action by right-clicking the Events node in
    the tree and selecting Create Dynamic Action from the context menu.   Enter `AutoFill
    Closed_On Date` for Name.   Make sure Event is set to Change, set Selection Type
    to Item(s), and enter `P210_STATUS_ID` for Item(s).   Set Condition to JavaScript
    expression.   Locate and open the file `ch16_javascript.txt`. This file can be
    found where you unzipped the files associated with this book.


    Examine the JavaScript string that is being used as the body of the condition.
    This may seem very cryptic at first, but when it’s broken down, it’s quite straightforward.
    Let’s look at it in pieces:


    `this.triggeringElement.options[this.triggeringElement.selectedIndex].text ==
    ''CLOSED''`


    The keyword `this` references the JavaScript event that kicked off the chain of
    events to start with, and `triggeringElement` references the item on the page
    that was at the root of the event. So, in this case, `this.triggeringElement`
    is talking about `P210_STATUS_ID`.


    Here’s where a little developer knowledge has to be introduced. Being the developer,
    you know that `P210_STATUS_ID` is a select list, and that a select list has from
    one to many values the user can select. In HTML, these values are called options.


    Because of the way you’ve declaratively defined the `P210_STATUS_ID` select list,
    only one option can be selected at a time. You can access the option that is currently
    selected on the page by using the JavaScript `this.triggeringElement.selectedIndex`.
    The square brackets use that index to reference the selected option from the `P210_STATUS_ID`
    select list.


    Although you could reference the `value` of the selected option, that would only
    give you the ID of the selected status. You’d then have to make a round trip to
    the database to find out the text status. Instead, you can use the `.text` JavaScript
    method to get the text that the select list is displaying to the end user and
    see what they selected.


    Once you have that, you can then compare it to the value you’re looking for, which
    is `CLOSED`.


    Copy the contents of the file into Value, as shown in Figure [16-17](#A978-1-4842-0466-5_16_Chapter.html#Fig17),
    and click Next.


    ![A978-1-4842-0466-5_16_Fig17_HTML.jpg](A978-1-4842-0466-5_16_Fig17_HTML.jpg)


    Figure 16-17.


    Using JavaScript for the condition text of a dynamic action   In the Dynamic Actions
    Tree under the True node, click the Show action (highlighted in red) to edit its
    properties.   Set Action to Set Value, set Set Type to PL/SQL Expression, and
    enter `SYSDATE` for PL/SQL Expression.   In the Affected Elements section, set
    Selection Type to Item(s) and set Item(s) to P210_CLOSED_ON.   Make sure Fire
    on Page Load is set to No. Although you want the `CLOSED_ON` date to be set when
    you choose a status of `CLOSED`, you want anything that is currently entered in
    the `CLOSED_ON` date to be removed if you choose any status but `CLOSED`. So,
    use the False action of the dynamic action to do this.   In the Dynamic Actions
    tab of the Tree Pane, right-click on the False node of the AutoFill Closed_On_Date
    Dynamic Action and select Create FALSE action.   Set False Action to Set Value.
      Set Set Type to PL/SQL Expression, and enter `NULL` for PL/SQL Expression. Although
    `P210_STATUS_ID` triggers the dynamic action to fire, `P210_CLOSED_ON` is the
    affected element.   Set Selection Type to Item(s) and set Item(s) to P210_CLOSED_ON.
      Make sure Fire on Page Load is set to No.   Save and Run your application.


    Run your application and edit any ticket using page 210\. Change the status to
    `CLOSED` and then back again to any other status. You will see the value for the
    `Closed On` date being set and cleared according to the value you choose for the
    select list.


    ## Summary


    Dynamic actions have many uses and are extremely flexible. However, you must make
    sure that multiple dynamic actions on the same page don’t interfere with each
    other. Also, because dynamic actions run as JavaScript in the browser, try to
    do as much as you can declaratively, or with JavaScript, without resorting to
    SQL or PL/SQL. This reduces the number of calls to the database server and avoids
    potential performance bottlenecks.


    It’s probably inevitable that you’ll be required to learn at least a little JavaScript
    to achieve more-complex results. JavaScript syntax isn’t hard to learn, and it
    can be a useful addition to your skillset as a web application developer.'
  trans: '

    ## 使用 PL/SQL 实现动态操作


    动态操作被设计为一个可扩展的框架，赋予开发者完全的控制权，以编写那些在纯声明式环境中可能不可用的复杂操作。本着提升用户界面可用性的精神，你应该帮助用户遵循应用程序的业务规则，同时避免给他们带来不必要的工作。在这个练习中，你将利用
    `P2_CREATED_BY` 项需要以大写输入的要求，并使用 SQL 和 PL/SQL 创建一个动态操作，将用户输入的任何内容都转换为大写。步骤如下：


    1.  编辑应用程序的第 2 页。

    2.  在树形面板中，导航到“页面呈现”选项卡。

    3.  右键单击 `P2_CREATED_BY` 项，并从上下文菜单中选择“创建动态操作”。

    4.  在“名称”中输入 `Change Case to Upper`。

    5.  将“事件”设置为“失去焦点”，将“条件”设置为“不为空”。

    6.  在动态操作树的“真”节点下，单击“显示”操作（以红色突出显示）以编辑其属性。

    7.  将“操作”设置为“设置值”，在“设置”部分，为“设置类型”选择“PL/SQL 表达式”。

    8.  在“PL/SQL 表达式”中输入 `UPPER(:P2_CREATED_BY)`，在“要提交的页面项”中输入 `P2_CREATED_BY`。

    9.  在“受影响元素”部分，将“选择类型”设置为“触发元素”。

    10. 将“页面加载时触发”设置为“否”。参见图 16-16。


    ![A978-1-4842-0466-5_16_Fig16_HTML.jpg](img/A978-1-4842-0466-5_16_Fig16_HTML.jpg)


    图 16-16. 使用 PL/SQL 表达式作为动态操作的主体


    11. 保存并运行该页面。


    这里，你使用 PL/SQL `UPPER` 表达式来获取用户输入并将其转换为大写。你通过绑定变量 `:P2_CREATED_BY` 来引用用户输入的值。然而，由于用户输入到
    Web 浏览器的值尚未提交到 APEX，该值当前不在会话状态中。这就是为什么你需要将其包含在要提交的页面项列表中。如果你需要引用多个用户输入值，必须将它们全部以逗号分隔的列表形式输入。


    现在，当运行第 2 页时，在“创建者”字段中输入的任何文本都会在用户离开该字段时被转换为大写。


    > **注意**

    >

    > 使用 SQL 或 PL/SQL 作为条件或主体的动态操作，实际上会回调数据库服务器来运行相关代码。根据代码的权重和复杂性，这可能会引入性能问题。请将 SQL
    和 PL/SQL 的使用保留给那些需要与数据库交互以检索页面内无法直接获取数据的操作。


    ## 使用 JavaScript 实现动态操作


    除了 PL/SQL，你还可以在动态操作中使用 JavaScript。在这个练习中，你将使用 JavaScript 来确定你在第 210 页编辑的工单的屏幕状态。如果用户将状态设置为
    `CLOSED`，动态操作将自动把 `关闭日期` 设置为今天的日期：


    1.  编辑应用程序的第 210 页。

    2.  在树形面板中，导航到“动态操作”选项卡。

    3.  通过在树中右键单击“事件”节点并从上下文菜单中选择“创建动态操作”来创建一个新的动态操作。

    4.  在“名称”中输入 `AutoFill Closed_On Date`。

    5.  确保“事件”设置为“更改”，将“选择类型”设置为“项”，并在“项”中输入 `P210_STATUS_ID`。

    6.  将“条件”设置为“JavaScript 表达式”。

    7.  找到并打开文件 `ch16_javascript.txt`。该文件可以在你解压本书相关文件的位置找到。


    检查用作条件主体的 JavaScript 字符串。起初这可能看起来很晦涩，但分解开来，它相当直接。让我们分段来看：


    ```

    this.triggeringElement.options[this.triggeringElement.selectedIndex].text == ''CLOSED''

    ```


    关键字 `this` 引用最初启动事件链的 JavaScript 事件，`triggeringElement` 引用页面上处于事件根源的项。因此，在本例中，`this.triggeringElement`
    指的是 `P210_STATUS_ID`。


    这里需要引入一些开发者知识。作为开发者，你知道 `P210_STATUS_ID` 是一个选择列表，该列表有一个或多个用户可以选择的值。在 HTML 中，这些值被称为选项。


    由于你以声明方式定义了 `P210_STATUS_ID` 选择列表的方式，一次只能选择一个选项。你可以使用 JavaScript 的 `this.triggeringElement.selectedIndex`
    来访问当前在页面上选中的选项。方括号使用该索引来引用 `P210_STATUS_ID` 选择列表中选中的选项。


    尽管你可以引用选中选项的 `value`，但那只会给你所选状态的 ID。然后你必须再往返数据库一次来查找文本状态。相反，你可以使用 `.text` JavaScript
    方法来获取选择列表向最终用户显示的文本，看看他们选择了什么。


    一旦你获取到该文本，就可以将其与你寻找的值 `CLOSED` 进行比较。


    8.  将文件内容复制到“值”中，如图 16-17 所示，然后单击“下一步”。


    ![A978-1-4842-0466-5_16_Fig17_HTML.jpg](img/A978-1-4842-0466-5_16_Fig17_HTML.jpg)


    图 16-17. 为动态操作的条件文本使用 JavaScript


    9.  在动态操作树的“真”节点下，单击“显示”操作（以红色突出显示）以编辑其属性。

    10. 将“操作”设置为“设置值”，将“设置类型”设置为“PL/SQL 表达式”，并在“PL/SQL 表达式”中输入 `SYSDATE`。

    11. 在“受影响元素”部分，将“选择类型”设置为“项”，并将“项”设置为 `P210_CLOSED_ON`。

    12. 确保“页面加载时触发”设置为“否”。

    13. 虽然你希望在选择状态为 `CLOSED` 时设置 `CLOSED_ON` 日期，但如果你选择除 `CLOSED` 外的任何状态，你希望清除当前在 `CLOSED_ON`
    日期中输入的任何内容。因此，使用动态操作的“假”操作来实现这一点。

    14. 在树形面板的“动态操作”选项卡中，右键单击“自动填充 Closed_On_Date 动态操作”的“假”节点，然后选择“创建 FALSE 操作”。

    15. 将“假操作”设置为“设置值”。

    16. 将“设置类型”设置为“PL/SQL 表达式”，并在“PL/SQL 表达式”中输入 `NULL`。虽然 `P210_STATUS_ID` 触发动态操作，但受影响元素是
    `P210_CLOSED_ON`。

    17. 将“选择类型”设置为“项”，并将“项”设置为 `P210_CLOSED_ON`。

    18. 确保“页面加载时触发”设置为“否”。

    19. 保存并运行你的应用程序。


    运行你的应用程序，并使用第 210 页编辑任意工单。将状态更改为 `CLOSED`，然后再改回任何其他状态。你将看到 `关闭日期` 的值会根据你为选择列表选择的值进行设置和清除。


    ## 总结


    动态操作用途广泛且极其灵活。但是，你必须确保同一页面上的多个动态操作不会相互干扰。此外，由于动态操作作为 JavaScript 在浏览器中运行，应尽可能多地以声明方式或使用
    JavaScript 来完成，尽量避免使用 SQL 或 PL/SQL。这样可以减少对数据库服务器的调用次数，并避免潜在的性能瓶颈。


    为了实现更复杂的结果，你很可能不可避免地需要学习至少一点 JavaScript。JavaScript 语法不难学，它可以作为 Web 应用程序开发者技能中有用的补充。

    '
- fmt: '# 17. Page Designer Walkthrough and Reference


    One of the challenges to productivity in versions of `APEX` prior to 5.0 was the
    need to drill down into the specific item you wanted to edit before you could
    change any of its properties. This meant learning where these items existed in
    the `Tree View`, the context menus, and the actual edit screens. It also meant
    that editing multiple items on a page could be quite tedious.


    `APEX` 5.0 has completely reengineered the process of building and editing pages.
    The familiar `Tree View` that was introduced as part of `APEX` 4.0 has been retired
    and replaced by a new `Page Designer`. No longer do you drill down to separate
    pages to edit individual items—now everything is done on a single page.


    While this can mean a huge leap forward in productivity, at first it can be quite
    daunting, especially to those of us who have spent significant amounts of time
    becoming familiar with the methods of `APEX` 4.0.


    This section will walk you through the new `Page Designer` section by section
    and introduce the nomenclature used throughout this book to refer to its sections
    and functionality. This will also be a good place to refer back to if you’re trying
    to remember where to find something, or are wondering what a particular button
    or item does.


    ## Page Designer Overview


    While the new `Page Designer` might seem like a radical departure from the way
    things were done in previous versions of `APEX`, it’s actually a tried and tested
    design. Just think of `Visual Studio`, `Eclipse`, `NetBeans`, and the myriad other
    `IDE`s in the market. They all conform to a very similar design pattern, which
    was used to model the new `APEX` 5.0 `Page Designer`.


    Figure [A-1](#A978-1-4842-0466-5_17_Chapter.html#Fig1) depicts the `Page Designer`,
    shown editing Page 1 of the `Sample Database Application`.


    ![A978-1-4842-0466-5_17_Fig1_HTML.jpg](A978-1-4842-0466-5_17_Fig1_HTML.jpg)

    Figure A-1. The `APEX` 5.0 `Page Designer`


    The `Page Designer` is broken down into five major areas, as indicated by the
    numbers in Figure [A-1](#A978-1-4842-0466-5_17_Chapter.html#Fig1):


    - `Page Designer Toolbar` – Appears at the top of the `Page Designer`, providing
    access to page-level activities

    - `Tree Pane` – Displays a set of tabs that allow access to `Rendering`, `Dynamic
    Actions`, `Processing`, and `Shared Components`

    - `Central Pane` – Provides access to layout, messages, page-level search, and
    context-sensitive help

    - `Property Editor` – Allows editing of properties for the selected item(s) on
    the page

    - `Gallery` – Provides access to the different region, item, and button types
    available within `APEX`


    One thing that you will probably notice is that, on smaller screens such as laptops,
    the interface can look quite cramped. You can adjust the size of the sections
    by clicking and dragging on the splitters between the sections, and you can toggle
    a section’s visibility by clicking on the small triangle icon, indicated in Figure
    [A-1](#A978-1-4842-0466-5_17_Chapter.html#Fig1). However, if you’re like me, you
    may want to do most of your work on a monitor with a bit more room so you can
    stretch out the panes to a more comfortable and readable size.


    Now, let’s explore each of the five main sections in more depth.


    ## Page Designer Toolbar


    Figure [A-2](#A978-1-4842-0466-5_17_Chapter.html#Fig2) shows the `Page Designer`
    toolbar, which is designed to give you access to a number of page-level activities.


    ![A978-1-4842-0466-5_17_Fig2_HTML.jpg](A978-1-4842-0466-5_17_Fig2_HTML.jpg)

    Figure A-2. The `Page Designer` toolbar


    At the left, you see the `APEX` breadcrumbs telling you which application you’re
    currently editing and that you’re currently on the `Page Designer`. Working from
    left to right from there are the controls. Hovering over each control will present
    a tooltip with a description and, in some cases, more information about the control.'
