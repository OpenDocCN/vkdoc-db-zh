  trans: '

    ### 添加重置分页功能


    每当向页面添加一个搜索项时，非常建议同时添加一个重置分页进程。这样可以防止 APEX 报表引擎在结果集中“迷路”。在这种情况下，创建该进程只有一种方式，因为组件面板中没有现成的进程组件：


    编辑应用程序的第 200 页。

    导航到树形面板的 **处理** 选项卡。

    右键单击树中的“处理”节点，并从上下文菜单中选择“创建进程”。

    在属性编辑器中，将**名称**设置为 `Reset Pagination Process`，并将**类型**选择为“重置分页”，如图 6-49 所示。


    ![A978-1-4842-0466-5_6_Fig49_HTML.jpg](img/A978-1-4842-0466-5_6_Fig49_HTML.jpg)

    图 6-49. 指定进程选项


    保存并运行应用程序。


    搜索功能应该在用户按下回车键和点击“执行”按钮时都能工作。但让我们再进一步，修改 `Subject` 列，使搜索项以红色高亮显示：


    编辑应用程序的第 200 页。

    导航到渲染树，单击 `Subject` 列的名称进行编辑。

    在属性编辑器中，找到“列格式化”属性组，并在“突出显示词”元素中输入 `&P200_SEARCH.`。请确保包含末尾的句点 (.)。如果忘记了，变量将无法正确解析，因此值也不会被高亮显示。此过程利用
    APEX 会话状态来指示用户输入到 `P200_SEARCH` 中的值应用来高亮显示 `Subject` 列中相同的文本。继续如下操作：

    保存并运行您的应用程序。


    现在，当您输入一个搜索值时，匹配的行将被返回，并且搜索项会以红色高亮显示。仅仅几分钟内，您就为您的服务台系统创建了一个可排序、可搜索的报表。让我们看看这个报表在幕后是什么样子。图
    6-50 展示了从树形面板的各个选项卡中看到的组件。


    ![A978-1-4842-0466-5_6_Fig50_HTML.jpg](img/A978-1-4842-0466-5_6_Fig50_HTML.jpg)

    图 6-50. 从树形面板的各个选项卡看到的可搜索报表


    ### 深入幕后——APEX 报表


    让我们更仔细地看看 Tickets 报表的组件和属性。编辑第 200 页，查看应用程序构建器中的**渲染**、**处理**和**共享组件**选项卡。在**渲染**选项卡中，您有一个包含报表列的
    `Tickets` 区域、您刚刚为搜索功能添加的两个项，以及一个“创建”按钮。单击 `Tickets` 区域名称以选中它。现在，在**属性**窗格中，您可以看到如图
    6-51 所示的详细信息。


    ![A978-1-4842-0466-5_6_Fig51_HTML.jpg](img/A978-1-4842-0466-5_6_Fig51_HTML.jpg)

    图 6-51. 带有搜索过滤器的 Tickets 报表区域源


    您可以看到，区域类型是“经典报表”。此区域的源是您在 `TICKETS` 表上执行的 SQL 查询，其中修改了 `WHERE` 子句以添加对 `P200_SEARCH`
    项的过滤，并将 `P200_SEARCH` 引用为绑定变量。如果愿意，您可以使用“代码编辑器”按钮来更好地查看 SQL 语句。


    通过单击页面左侧渲染树中的“属性”子节点，您可以查看和编辑报表区域的视觉属性。此外，在渲染树中您可以看到报表列的列表。


    通过选择一列或多列，您可以调整标题、列宽、列对齐方式和标题对齐方式；您还可以决定是否显示该列、是否需要求和以及是否要对该列启用排序。可以通过拖放它们来重新排列列的顺序。


    在共享组件树中，您可以看到导航、面包屑导航和页面的预期对象，以及区域、报表、标签和按钮模板。这并不新鲜，但值得高兴的是向导已经为您构建了这些。


    接下来，让我们关注 Tickets 和 Ticket Details 表单，这是主从表单向导生成的其他组件。


    ### 深入幕后——APEX 主从表单


    编辑第 210 页，查看应用程序构建器中的**页面渲染**、**页面处理**和**共享组件**区域。您应该看到类似于图 6-52 所示的结果。


    ![A978-1-4842-0466-5_6_Fig52_HTML.jpg](img/A978-1-4842-0466-5_6_Fig52_HTML.jpg)

    图 6-52. 从树形面板的各个选项卡看到的主从页面


    在**渲染**选项卡中，您有两个“页眉后”进程、一个包含表单项的 `Manage Tickets` HTML 区域，以及一个 `Ticket Details`
    报表区域。


    两个“页眉后”进程，`Fetch Row from TICKETS` 和 `Get Next or Previous Primary Key Value`，其功能正如其名所示。当页面传递一个
    `TICKET_ID` 时，`Fetch Row from TICKETS` 进程会从 `TICKETS` 表中获取一行数据以在表单中显示。`Get Next
    or Previous Primary Key Value` 进程获取序列中的下一个或上一个 `TICKET_ID` 值，并与主从页面上的“下一个”和“上一个”按钮协同触发。


    `Manage Tickets` 区域包含一个 APEX 项，对应您选择包含在主从表单中的每个 `TICKETS` 列，以及用于取消、删除、保存、创建、下一个和上一个操作的按钮。


    `Ticket Details` 区域是一个报表区域，显示工单详细信息和一个“创建”按钮，该按钮将重定向您到第 220 页以创建额外的工单详细信息。


    在**处理**选项卡中，您可以看到两个“提交后”分支（它们都将您返回到当前页面）、一个“提交后” `P220_TICKET_DETAILS_ID` 计算、两个进程（`Process
    Row of TICKETS` 和 `Reset Page`）以及一个指向第 200 页的“处理后”分支。“提交后”计算在您点击 `Ticket Details`
    区域中的“创建”按钮时获取下一个 `TICKET_DETAILS_ID`。新的 `TICKET_DETAILS_ID` 被传递到第 220 页，即工单详细信息表单。`Process
    Row of TICKETS` 进程对 `TICKETS` 表执行数据库 DML 操作，包括插入、更新和删除。当点击“删除”按钮时，`Reset Page`
    进程会重置（清除）页面上的元素。指向第 200 页的“处理后”分支在处理成功后将用户重定向到第 200 页，即您的 `TICKETS` 列表。


    **共享组件**区域包含了您已经熟悉的 APEX 元素，用于页面选项卡、值列表、面包屑导航和模板。


    在应用程序构建器中转到第 220 页，即 `Ticket Details` 表单，您将看到与第 210 页的 `Manage Tickets` 表单相似的元素（参见图
    6-53）。


    ![A978-1-4842-0466-5_6_Fig53_HTML.jpg](img/A978-1-4842-0466-5_6_Fig53_HTML.jpg)

    图 6-53. 从树形面板的各个选项卡看到的工单详细信息表单


    **渲染**选项卡包括一个“页眉后” `Fetch Row from TICKET_DETAILS` 进程、一个 HTML 区域（该区域包含对应您选择包含在主从表单中的
    `TICKET_DETAILS` 列的项）以及用于处理的按钮。


    **处理**选项卡包括一个 `Process Row of TICKET_DETAILS` 进程（用于处理 `TICKET_DETAILS` 表上的插入、更新和删除操作）、一个
    `Reset Page` 进程（用于在删除事务中清除行）以及一个指向第 210 页的“转到页面”分支（该分支在工单详细信息事务完成后将用户返回到工单页面）。


    工单详细信息页面上的**共享组件**区域包括您的页面选项卡、面包屑导航和模板。


    哇！主从表单向导创建了这么多东西——一个功能齐全的报表及其主从表单，所有这些都不需要您编写任何代码。这个主从示例突显了 APEX 向导在生成 APEX 组件方面的省时价值，尤其是在为应用程序创建更复杂和多页面的组件时。

