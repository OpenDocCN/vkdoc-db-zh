    ![A978-1-4842-0466-5_9_Fig19_HTML.jpg](A978-1-4842-0466-5_9_Fig19_HTML.jpg)


    Figure 9-19.


    The Access Control List with user names and privileges One of the features of
    the access-control utility is the ability to enable or disable the enforcement
