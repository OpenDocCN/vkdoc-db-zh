    `或`/`，APEX 将尝试对它们进行编码以降低跨站脚本的风险。如果你信任数据源，可以编辑日历区域，在`Security`属性部分，将`Escape Special\
    \ Characters`设置为`No`。\n\n### 探索幕后\n\n既然你的日历可以工作了，让我们看看日历向导为你构建了什么。编辑第 400 页。在`Rendering`选项卡中，如图\
    \ 7-69 所示，你基本上只会看到`Calendar`区域。\n\n![A978-1-4842-0466-5_7_Fig69_HTML.jpg](img/A978-1-4842-0466-5_7_Fig69_HTML.jpg)\n\
    图 7-69.\n你的日历的页面渲染区域\n\n请注意，在页面的`Processing`选项卡中没有任何进程。这是因为日历区域使用 JavaScript 调用从数据库获取数据，并根据拖放操作更改任何移动的值。这只是\
    \ JavaScript 和 jQuery 强大功能的一个简短示例。\n\n"
- fmt: "## Charts\n\n在 APEX 4.2 中，通过整合 AnyChart 6，图表功能得到了重大改进，这一改进也延续到了 APEX 5.0。这个版本的\
    \ AnyChart 不仅生成的图表比之前的版本看起来更专业，而且图表引擎还提供了使用基于 Flash 或基于 HTML5 的图表选项。这对于面向移动市场的应用程序来说是一个巨大的进步，因为\
    \ HTML5 图表可以在大多数现代浏览器上渲染，而无需额外的插件。\n\n新图表引擎的美妙之处在于，你可以在页面开发过程中随时在渲染 Flash 和 HTML5\
    \ 图表之间切换，而声明性数据保持不变，与渲染方式的选择无关。\n\nHTML5 图表也保持了与 Flash 图表相同级别的交互性，包括悬停和点击钻取功能。\n\
    \n图 [7-70](#A978-1-4842-0466-5_7_Chapter.html#Fig70) 展示了柱状图的 Flash 版本和 HTML5 版本，表明尽管外观有所变化，但相同的代码生成了非常相似的图表。\n\
    \n![A978-1-4842-0466-5_7_Fig70_HTML.jpg](A978-1-4842-0466-5_7_Fig70_HTML.jpg)\n\
    \n图 7-70. 使用 Flash 和 HTML5 渲染的相同图表\n\nFlash 和 HTML5 图表的功能几乎相同，但 HTML5 图表能够在任何平台上原生渲染，而\
    \ Flash 图表在 Apple 的任何移动平台上都无法工作。\n\n### Writing Queries for Charts\n\nAPEX 图表通常需要这种类型的查询：\n\
    \n```sql\nSELECT\n  link,\n  label,\n  value\nFROM\n  table\nWHERE\n  where conditions\n\
    GROUP BY\n  group by column list\nORDER BY\n  Order by column list\n```\n\n其中\n\
    \n*   `link` 是指向 APEX 页面或其他 URL 的链接；\n*   `label` 是图表元素的标签；以及\n*   `value` 是要绘制的值。\n\
    \n确切的语法会根据各种图表类型的需求略有变化，但通用的链接-标签-值格式保持不变。有关每种图表类型的确切语法，请参阅 APEX 在线文档。\n\n###\
    \ Creating a Chart\n\n让我们创建一个饼图，显示每个状态的工单数量。稍后，你将把点击饼图切片的动作链接到过滤工单报告，以仅显示该状态的工单。请按照以下步骤操作：\n\
    \n1.  编辑应用程序的任何页面。\n2.  点击页面设计器工具栏中的创建（+）按钮并选择“页面”。\n3.  选择“图表”并点击“下一步”。\n4. \
    \ 从选择列表中选择“HTML5 图表”。\n5.  页面刷新后，选择“饼图和环形图”并点击“下一步”。\n6.  选择“2D 饼图”并点击“下一步”。\n\
    7.  输入 `500` 作为“页面编号”，`Tickets by Status` 作为“页面名称”和“区域名称”，并将“面包屑导航”设置为“面包屑”（参见图\
    \ [7-71](#A978-1-4842-0466-5_7_Chapter.html#Fig71)）。页面重新加载后，输入 `Tickets by Status`\
    \ 作为“条目名称”并点击“下一步”。\n\n![A978-1-4842-0466-5_7_Fig71_HTML.jpg](A978-1-4842-0466-5_7_Fig71_HTML.jpg)\n\
    \n图 7-71. 为图表设置页面编号、页面名称和区域名称属性\n8.  将“导航首选项”设置为“创建新的导航菜单条目”。页面刷新后，输入 `Chart`\
    \ 作为“选项卡标签”并点击“下一步”（参见图 [7-72](#A978-1-4842-0466-5_7_Chapter.html#Fig72)）。\n\n\
    ![A978-1-4842-0466-5_7_Fig72_HTML.jpg](A978-1-4842-0466-5_7_Fig72_HTML.jpg)\n\n\
    图 7-72. 为图表设置导航属性\n9.  设置“图表标题”为 `Ticket Statuses` 并点击“下一步”。\n10. 定位并打开文件 `ch7_chart_query.txt`，你可以在解压本书文件的位置找到它。该文件的内容应与此查询类似：\n\
    ```sql\nSELECT\n  'f?p=&APP_ID.:200:' || :APP_SESSION || '::::P200_STATUS_ID:'\
    \ || sl.status_id link,\n  sl.status label,\n  count(*) value\nFROM\n  tickets\
    \ t,\n  status_lookup sl\nWHERE\n  t.status_id = sl.status_id\nGROUP BY\n  sl.status_id,\
    \ sl.status\nORDER BY\n  3 DESC\n```\n11. 将文件 `ch7_chart_query.txt` 的内容粘贴到“输入\
    \ SQL 查询或返回 SQL 查询的 PL/SQL 函数”区域中，或者将上一个查询键入该区域，然后点击“下一步”。\n12. 点击“创建”。\n\n运行页面。你的图表应该与图\
    \ [7-73](#A978-1-4842-0466-5_7_Chapter.html#Fig73) 中的类似。\n\n![A978-1-4842-0466-5_7_Fig73_HTML.jpg](A978-1-4842-0466-5_7_Fig73_HTML.jpg)\n\
    \n图 7-73. Ticket Statuses 图表\n\n### Filtering Data for a Chart\n\n你在 SQL 语句中包含的链接将一个状态值传递到页面\
    \ 200 的 `P200_STATUS_ID` 字段。然而，你还没有创建该项。接下来的步骤在页面 200 上创建 `P200_STATUS_ID` 项，以便在点击图表切片时，报告可以根据状态进行过滤：\n\
    \n1.  编辑应用程序的页面 200。\n2.  通过将“组件库”的“项”部分中的“选择列表”项拖到“工单”区域中来创建一个新项。将其放置在 `P200_SEARCH`\
    \ 项和 `P200_GO` 按钮之间，如图 [7-74](#A978-1-4842-0466-5_7_Chapter.html#Fig74) 所示。\n\n\
    ![A978-1-4842-0466-5_7_Fig74_HTML.jpg](A978-1-4842-0466-5_7_Fig74_HTML.jpg)\n\n\
    图 7-74. 添加一个选择列表项\n3.  在“编辑属性”窗格中，设置“名称”为 `P200_STATUS_ID`，“标签”为 `Status`（参见图\
    \ [7-75](#A978-1-4842-0466-5_7_Chapter.html#Fig75)）。\n\n![A978-1-4842-0466-5_7_Fig75_HTML.jpg](A978-1-4842-0466-5_7_Fig75_HTML.jpg)\n\
    \n图 7-75. 设置名称和标签\n4.  在“值列表”属性组中，设置“类型”为“共享组件”，“值列表”为 `P210_TICKETS_STATUS_ID`，确保“显示空值”设置为“是”，为“空值显示值”输入\
    \ `- All Statuses -`，并为“空值返回值”输入 `%`。\n5.  在“默认值”属性组中，设置“类型”为“静态值”，并为“静态值”输入 `%`，如图\
    \ [7-76](#A978-1-4842-0466-5_7_Chapter.html#Fig76) 所示。\n\n![A978-1-4842-0466-5_7_Fig76_HTML.jpg](A978-1-4842-0466-5_7_Fig76_HTML.jpg)\n\
    \n图 7-76. 设置默认值\n6.  保存你的更改。\n\n同样，默认情况下，“搜索”和“描述”字段的标签被设置为占用布局网格的三列。让我们更改此设置，使它们各只占一列：\n\
    \n1.  多选 `P200_SEARCH` 和 `P200_STATUS_ID`。\n2.  在“编辑属性”窗格中，导航到“网格”属性组，并将“标签列跨度”更改为\
    \ 1。\n3.  保存你的更改。\n\n最后，你必须更改页面 200 上工单报告的查询，以考虑项 `P200_STATUS_ID` 的设置值：\n\n1.\
    \  通过单击其名称来编辑页面 200 上的工单报告。\n2.  将以下行附加到查询末尾并保存你的更改：\n```sql\nAND tickets.status_id\
    \ LIKE :P200_STATUS_ID\n```\n\n现在，运行应用程序并导航到“图表”页面。点击图表中的任何值，该值应传递到“工单”页面并进入状态过滤器。生成的报告应仅显示与图表中点击的状态相对应的记录。\n\
    \n### Looking Behind the Scenes\n\n在应用程序构建器中查看“图表”页面，你可以看到生成的唯一元素是“页面渲染”区域中的“图表”区域，如图\
    \ [7-77](#A978-1-4842-0466-5_7_Chapter.html#Fig77) 所示。这个“图表”区域很有趣，因为它包含一个“系列”元素，其中包含你的\
    \ SQL 查询。这个“图表”区域体现了将你的查询传递给 AnyChart 引擎以生成图表的逻辑。\n\n![A978-1-4842-0466-5_7_Fig77_HTML.jpg](A978-1-4842-0466-5_7_Fig77_HTML.jpg)\n\
    \n图 7-77. Ticket Statuses 图表的渲染选项卡"
  raw: '## Charts


    In APEX 4.2, charts got a major facelift with the incorporation of AnyChart 6,
    and that facelift has extended into APEX 5.0\. Not only does this release of AnyChart
    produce charts that look much more professional than in previous releases, but
    the charting engine also provides the option to use either Flash-based or HTML5-based
    charts. This is a huge leap forward for applications aimed at the mobile market,
    because HTML5 charts render on most modern browsers with no need for extra plug-ins.


    The beauty of the new charting engine is that you can flip between rendering Flash
    and HTML5 charts at any time during the development of the page, and the declarative
    data remains the same, regardless of the choice of rendering.


    HTML5 charts also maintain the same level of interactivity that Flash charts have,
    including hover and click-and-drill functionality.


    Figure [7-70](#A978-1-4842-0466-5_7_Chapter.html#Fig70) shows both the Flash version
    and the HTML5 version of a bar chart, showing that, although the look changes
    a certain amount, the same code generates very similar charts.


    ![A978-1-4842-0466-5_7_Fig70_HTML.jpg](A978-1-4842-0466-5_7_Fig70_HTML.jpg)


    Figure 7-70.


    The same chart rendered with Flash and HTML5


    Flash and HTML5 charts have almost identical functionality, but HTML5 charts are
    able to render natively on any platform, whereas Flash charts will not work on
    any of the Apple mobile platforms.


    ### Writing Queries for Charts


    APEX charts generally need a query of this type:


    `SELECT`


      `link,`


      `label,`


      `value`


    `FROM`


      `table`


    `WHERE`


      `where conditions`


    `GROUP BY`


      `group by column list`


    `ORDER BY`


      `Order by column list`


    where


    *   `link` is a link to an APEX page or other URL;

    *   `label` is the label for the chart element; and

    *   `value` is the value to be charted.


    The exact syntax changes slightly to suit the needs of the various chart types,
    but the general link-label-value format remains the same. For the correct syntax
    for each chart type, see the APEX online documentation.


    ### Creating a Chart


    Let’s create a pie chart that shows the count of tickets in each status. Later,
    you’ll link the action of clicking a pie piece to filtering the tickets report
    to show only tickets of that status. Follow these steps:


    Edit any page of the application.   Click the Create (+) button in the Page Designer
    toolbar and select Page.   Select Chart and click Next.   Select HTML5 Chart from
    the select list.   When the page refreshes, select Pie & Doughnut and click Next.
      Select 2D Pie and click Next.   Enter `500` for Page Number and `Tickets by
    Status` for both Page Name and Region Name, and set Breadcrumb to Breadcrumb (see
    Figure [7-71](#A978-1-4842-0466-5_7_Chapter.html#Fig71)). When the page reloads,
    enter `Tickets by Status` for Entry Name and click Next.


    ![A978-1-4842-0466-5_7_Fig71_HTML.jpg](A978-1-4842-0466-5_7_Fig71_HTML.jpg)


    Figure 7-71.


    Setting the Page Number, Page Name, and Region Name attributes for a chart   Set
    Navigation Preference to Create a new navigation menu entry. When the page refreshes,
    enter `Chart` for Tab Label and click Next (see Figure [7-72](#A978-1-4842-0466-5_7_Chapter.html#Fig72)).


    ![A978-1-4842-0466-5_7_Fig72_HTML.jpg](A978-1-4842-0466-5_7_Fig72_HTML.jpg)


    Figure 7-72.


    Setting the navigation attributes for a chart   Set Chart Title to `Ticket Statuses`
    and click Next.   Locate and open the file `ch7_chart_query.txt`, which you can
    find where you extracted the book files. The contents of the file should be similar
    to this query: `SELECT`   `''f?p=&APP_ID.:200:'' || :APP_SESSION || ''::::P200_STATUS_ID:''
    || sl.status_id link,`   `sl.status label,`   `count(*) value` `FROM`   `tickets
    t,`   `status_lookup sl` `WHERE`   `t.status_id = sl.status_id` `GROUP BY`   `sl.status_id,
    sl.status` `ORDER BY`   `3 DESC`   Paste the contents of the file `ch7_chart_query.txt`
    into the Enter SQL Query or PL/SQL Function Returning a SQL Query region, or type
    the previous query into the region, and click Next.   Click Create.  


    Run the page. Your chart should look similar to the one in Figure [7-73](#A978-1-4842-0466-5_7_Chapter.html#Fig73).


    ![A978-1-4842-0466-5_7_Fig73_HTML.jpg](A978-1-4842-0466-5_7_Fig73_HTML.jpg)


    Figure 7-73.


    The Ticket Statuses chart


    ### Filtering Data for a Chart


    The link that you included in your SQL statement passes a status value to the
    `P200_STATUS_ID` field on page 200\. However, you haven’t created that item yet.
    The next steps create the item `P200_STATUS_ID` on page 200 so that, when a slice
    of the chart is clicked, the report can filter based on the status:


    Edit Page 200 of the application.   Create a new item by dragging a Select List
    item from the Items section of the Component Gallery into the Tickets region.
    Place it just in between the `P200_SEARCH` item and the `P200_GO` button, as shown
    in Figure [7-74](#A978-1-4842-0466-5_7_Chapter.html#Fig74).


    ![A978-1-4842-0466-5_7_Fig74_HTML.jpg](A978-1-4842-0466-5_7_Fig74_HTML.jpg)


    Figure 7-74.


    Adding a select list item   In the Edit Attributes pane, set the Name to `P200_STATUS_ID`
    and the Label to `Status`. (See Figure [7-75](#A978-1-4842-0466-5_7_Chapter.html#Fig75)).


    ![A978-1-4842-0466-5_7_Fig75_HTML.jpg](A978-1-4842-0466-5_7_Fig75_HTML.jpg)


    Figure 7-75.


    Setting the name and label   In the List of Values attribute group, set Type to
    Shared Component and List of Values to `P210_TICKETS_STATUS_ID`, ensure that Display
    Null Values is set to Yes, enter `- All Statuses -` for Null Display Value, and
    enter `%` for Null Return Value.   In the Default attribute group, set Type to
    Static Value and enter `%` for the Static Value, as shown in Figure [7-76](#A978-1-4842-0466-5_7_Chapter.html#Fig76).


    ![A978-1-4842-0466-5_7_Fig76_HTML.jpg](A978-1-4842-0466-5_7_Fig76_HTML.jpg)


    Figure 7-76.


    Setting the default   Save your changes.  


    Again, by default, the labels of both the Search and Description fields are set
    to occupy three columns of the layout grid. Let’s change this so that they only
    take up one column each:


    Multi-select P200_SEARCH and P200_STATUS_ID.   In the Edit Attributes pane, navigate
    to the Grid attribute group and change the Label Column Span to 1.   Save your
    changes. Finally, you have to change the query for the Tickets report on page
    200 to account for the value of the item P200_STATUS_ID is set to:   Edit the
    Tickets report on page 200 by clicking its name.   Append the following line to
    the end of the query and Save your changes: `AND tickets.status_id LIKE :P200_STATUS_ID`
     


    Now, run the application and navigate to the Chart page. Click any value in the
    chart, and that value should be passed to the Tickets page and in to the Status
    filter. The resulting report should only display those records that correspond
    to the status that was clicked in the chart.


    ### Looking Behind the Scenes


    Viewing the Chart page in the Application Builder, you can see that the only element
    generated is the Chart region in the Page Rendering region, as shown in Figure
    [7-77](#A978-1-4842-0466-5_7_Chapter.html#Fig77). The Chart region is interesting
    in that it has a Series element, which contains your SQL query. The Chart region
    embodies the logic that passes your query to the AnyChart engine to produce the
    chart.


    ![A978-1-4842-0466-5_7_Fig77_HTML.jpg](A978-1-4842-0466-5_7_Fig77_HTML.jpg)


    Figure 7-77.


    Rendering tab of the Ticket Statuses chart'
  trans: "## 图表\n\n在 APEX 4.2 中，通过整合 AnyChart 6，图表功能得到了重大改进，这一改进也延续到了 APEX 5.0。这个版本的\
