  trans: '

    ### 在表上创建表单


    在本节中，你将创建帮助台系统的第 2 页，并向其添加一个表单。此表单将允许用户通过向 `TICKETS` 表插入一行来创建新的工单。你可以限制表单在 APEX
    中可以执行的 DML 操作。在这种情况下，你将其限制为仅执行插入操作。


    “表单向导”将引导你完成在表上生成表单所需的所有步骤：选择解析模式、选择作为表单基础的表、选择要包含和编辑的列、分配区域和表单标题，以及指定列标题。开始操作如下：


    导航至你的应用程序的开发主页。此页面列出了应用程序中的所有页面。

    点击屏幕右上角的 **创建页面** 按钮。

    选择 **表单**，然后点击 **下一步**。

    选择 **表或视图上的表单**，然后点击 **下一步**。

    将 **表/视图所有者** 设置为你的模式，并为 **表/视图名称** 选择 `TICKETS`（表），如图 6-2 所示。点击 **下一步**。


    ![`A978-1-4842-0466-5_6_Fig2_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig2_HTML.jpg)

    图 6-2.


    输入模式和表名

    下一步允许你设置将由向导创建的页面和区域的一些详细信息。**页面编号** 可以设置为任何你希望的值，但它必须在应用程序内唯一。**页面名称** 设置应用程序运行时在浏览器选项卡中显示的文本，**区域标题**
    设置在区域标题区域中显示的文本。**页面模式** 决定你正在创建的页面是普通的 APEX 页面，还是 APEX 5.0 内置的两种对话框之一：模态或非模态。模态对话框不允许与对话框下方的页面交互，而非模态对话框允许用户查看并与底层页面交互。**区域模板**
    决定区域容器的视觉呈现方式。每个 APEX 主题都有多个可用模板，但你会发现 **标准** 模板使用得最多。继续操作如下：


    输入 `2` 作为 **页面编号**，如图 6-3 所示。为 **页面名称** 和 **区域标题** 都输入 `创建工单`。将 **页面模式** 设置为 **正常**。将
    **面包屑** 设置为 **面包屑**。页面刷新后，将 **上级条目** 设置为 **主页**，然后点击 **下一步**。


    ![`A978-1-4842-0466-5_6_Fig3_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig3_HTML.jpg)

    图 6-3.


    指定页面、区域、模式和面包屑信息

    接下来，你可以选择此页面如何与你已经定义的菜单系统关联（如果关联的话）。我们已经为这些页面在 **导航列表** 中创建了条目，因此我们将在创建页面时使用它们：


    对于 **导航首选项**（图 6-4），选择 **为此页面标识现有导航菜单条目**。页面刷新后，将 **现有导航菜单条目** 设置为 **主页**，然后点击
    **下一步**。


    ![`A978-1-4842-0466-5_6_Fig4_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig4_HTML.jpg)

    图 6-4.


    指定导航选项

    APEX 4 引入了使用 `ROWID` 作为主键的功能。这在处理具有多列自然主键的表时很方便，但该表已经定义了单列主键，因此你将使用该主键：


    将 **主键类型** 设置为 **选择主键列**，确保 **主键** 设置为 `TICKET_ID`，然后点击 **下一步**。

    该表的主键基于数据库中的序列，并且已经存在一个触发器，如果传入记录的主键为空，则使用下一个序列值填充主键，如下所示：


    将 **源类型** 设置为 **现有触发器**，如图 6-5 所示，然后点击 **下一步**。


    ![`A978-1-4842-0466-5_6_Fig5_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig5_HTML.jpg)

    图 6-5.


    指定主键填充选项

    接下来，指定在表单上可见和可编辑的列。默认情况下，所选表中的所有列都会出现在选定列中。但是，对于这个简单的表单，你想要限制用户可以查看的列：


    使用穿梭框，确保仅选择了 `SUBJECT`、`DESCR`、`CREATED_BY` 和 `STATUS_ID` 这几列，如图 6-6 所示，然后点击 **下一步**。


    ![`A978-1-4842-0466-5_6_Fig6_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig6_HTML.jpg)

    图 6-6.


    选择要包含的列

    并非所有表单都允许人们更新或删除数据。有些仅仅是数据录入表单。在这种情况下，你希望未经认证的用户能够提交工单，但你不想让他们能够编辑或删除这些工单。向导的下一步允许开发者选择最终用户可用的操作，并为这些操作相关的按钮命名。每个表单都应该有一个
    **取消** 按钮，允许用户中止任何操作或数据录入。但其余的按钮是可选的：


    *   **创建** 按钮：保存新记录

    *   **保存** 按钮：保存对现有记录的更新

    *   **删除** 按钮：删除现有记录


    现在继续创建表单：


    为 **取消按钮标签** 输入 `取消`，为 **创建按钮标签** 输入 `创建工单`。将 **显示保存按钮** 和 **显示删除按钮** 设置为 **否**，如图
    6-7 所示，然后点击 **下一步**。


    ![`A978-1-4842-0466-5_6_Fig7_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig7_HTML.jpg)

    图 6-7.


    指定要显示的按钮

    当用户输入工单并单击按钮以取消数据录入或创建新工单时，你需要指定接下来会发生什么。APEX 是停留在同一页面？还是返回到主页？在此示例中，无论用户做出何种选择，你都希望将用户重定向到主页：


    将 **提交时分支至此** 和 **取消时分支至此** 都设置为 `1`，然后点击 **下一步**。参见图 6-8。


    ![`A978-1-4842-0466-5_6_Fig8_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig8_HTML.jpg)

    图 6-8.


    指定提交和取消的分支

    与大多数向导一样，你会看到一个总结你选择的最终页面。此时，你可以使用 **上一步** 和 **下一步** 按钮在向导步骤中来回导航以更改你的任何选择。然后执行以下操作：


    点击 **创建** 以完成向导。

    运行你的应用程序。


    恭喜！你刚刚在 `TICKETS` 表上创建了一个功能齐全的表单。该表单应与图 6-9 中的类似。


    ![`A978-1-4842-0466-5_6_Fig9_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig9_HTML.jpg)

    图 6-9.


    运行 `TICKETS` 表上的表单


    请注意，表单区域按你在步骤 6 中指定的方式标记，表单包含你在步骤 10 中选择的四个列的字段，并且 **创建工单** 按钮按你在步骤 11 中指定的方式标记。另请注意，这四个字段都是根据你在
    第 4 章 为 `TICKETS` 表创建的 UI 默认值中指定的默认元素类型创建的。你为每个列指定的帮助文本都在那里，当你点击字段末尾的问号图标时，它会在新窗口中弹出。**取消**
    按钮会带你到主页——第 1 页，正如你在步骤 12 中指定的那样。APEX 为你做了大量工作！


    ### 修改表单


    APEX 向导处理了为你创建表单的大部分工作。然而，你很少不需要对向导创建的内容进行一些小的修改。现在你已经在应用程序的第 2 页上拥有了 **创建工单**
    表单，你可以进行一些更改来稍微润色一下。

    '
- fmt: '#### Changing the Label Templates


    You’ll change the label templates for `P2_SUBJECT` and `P2_CREATED_BY` (the items
    that correspond to the `SUBJECT` and `CREATED_BY` table columns) to `Required
    with Help`. Use of the `Required with Help` label template indicates to the end
    user that this is a required field on the form. However, it doesn’t make the field
    itself mandatory. You will do that later.


    You’ll also reduce the width of `P2_CREATED_BY` so it doesn’t take up as much
    space. Begin as follows:


    Edit Page 2 of the application.

    Edit the item `P2_SUBJECT` by clicking its name in the Rendering tab of the Tree
    Pane.

    In the Property Editor, scroll to the Appearance attribute group, as shown in
    Figure [6-10](#A978-1-4842-0466-5_6_Chapter.html#Fig10), and set Template to Required,
    and click Save.


    ![A978-1-4842-0466-5_6_Fig10_HTML.jpg](A978-1-4842-0466-5_6_Fig10_HTML.jpg)

    Figure 6-10. Modifying the label templates


    Edit the item `P2_CREATED_BY` by clicking its name in the Rendering tab of the
    Tree Pane.

    In the Property Editor, scroll to the Appearance attribute group, as shown in
    Figure [6-11](#A978-1-4842-0466-5_6_Chapter.html#Fig11). Set Template to Required,
    and the Width to `20`, then click Save.


    ![A978-1-4842-0466-5_6_Fig11_HTML.jpg](A978-1-4842-0466-5_6_Fig11_HTML.jpg)

    Figure 6-11. Setting the display attributes


    Next, you want to hide the `P2_STATUS_ID` item from the user, because you don’t
    want the user to change this value. You do, however, want all new tickets to be
    created with a default value of `OPEN`. Because you can’t guarantee which `STATUS_ID`
    maps to which `STATUS`, you can call a simple function and pass in the `STATUS`.
    This function, in turn, returns the corresponding `STATUS_ID`, which is set as
    the default value for `P2_STATUS_ID`:


    Edit the item `P2_STATUS_ID` by clicking its name in the Rendering tab of the
    Tree Pane.

    In the Identification attribute group, set Type to Hidden.

    In the Default attribute group shown in Figure [6-12](#A978-1-4842-0466-5_6_Chapter.html#Fig12),
    set Type to PL/SQL Function Body and set the default value to `RETURN get_status(''OPEN'');`.
    This function was created as part of the script run in [Chapter 4](#A978-1-4842-0466-5_4_Chapter.html).


    ![A978-1-4842-0466-5_6_Fig12_HTML.jpg](A978-1-4842-0466-5_6_Fig12_HTML.jpg)

    Figure 6-12. Specifying a default value


    Click Save.


    Next, you want to set page 2 to be a public page. You want any user—authenticated
    or not—to be able to access this page:


    Edit the page attributes for Page 2 of your application by clicking its name (Page
    2: Create a Ticket) at the top of the Rendering tab of the Tree Pane.

    Set Page 2 to be a public page, and click Apply Changes. Refer back to [Chapter
    5](#A978-1-4842-0466-5_5_Chapter.html) for detailed steps.


    Finally, you need to make sure users enter values for the Subject and Created
    By fields. There are two ways to make a field mandatory in APEX. For demonstration
    purposes you’ll use a different method for each field.


    #### Making the Fields Mandatory


    For the Subject field, you’ll create a validation. Although a validation takes
    more steps, it gives you more control over how and when it’s performed. Here’s
    what to do, first for the Subject field and then for the Created By field:


    Edit Page 2 of the application.

    Create a new validation by switching to the Processing tab of the Tree Pane then
    right-clicking the Validating node in the tree and selecting Create Validation,
    as shown in Figure [6-13](#A978-1-4842-0466-5_6_Chapter.html#Fig13).


    ![A978-1-4842-0466-5_6_Fig13_HTML.jpg](A978-1-4842-0466-5_6_Fig13_HTML.jpg)

    Figure 6-13. Choosing to create a new validation


    You will see a new node in the validation tree that is highlighted and has a red
    X next to the name. This indicates that the validation has been created, but that
    there are attributes that must be filled in. Looking at the Property Editor, you’ll
    see a number of attributes highlighted in red, as seen in Figure [6-14](#A978-1-4842-0466-5_6_Chapter.html#Fig14).


    ![A978-1-4842-0466-5_6_Fig14_HTML.jpg](A978-1-4842-0466-5_6_Fig14_HTML.jpg)

    Figure 6-14. A new validation that needs to be completed


    We’ll now fill out the required attributes for our validation, as seen in Figure
    [6-15](#A978-1-4842-0466-5_6_Chapter.html#Fig15):


    ![A978-1-4842-0466-5_6_Fig15_HTML.jpg](A978-1-4842-0466-5_6_Fig15_HTML.jpg)

    Figure 6-15. Entering the details for a new validation


    In the Identification attribute group, set the name to `P2_SUBJECT is NOT NULL`.

    In the Validation attribute group, set the Type to Item is NOT NULL, then using
    the pop-up select list, set the Item to `P2_SUBJECT`.

    In the Error attribute group, set the Error Message to `#LABEL# must have some
    value` and the Associated Item to `P2_SUBJECT`.

    Click Save.


    Next, use the second method to make the Created By field mandatory. To do this,
    simply set an attribute of the input item:

    Switch to the Rendering tab of the Tree Pane and edit `P2_CREATED_BY`.

    In the Property Editor, navigate to the Validation attribute group shown in Figure
    [6-16](#A978-1-4842-0466-5_6_Chapter.html#Fig16), set Value Required to Yes, and
    click Save.


    ![A978-1-4842-0466-5_6_Fig16_HTML.jpg](A978-1-4842-0466-5_6_Fig16_HTML.jpg)

    Figure 6-16. Making a value required


    If you check the Processing tab of the tree pane, you’ll see that no new validation
    has been created. That is because you used the item-level attribute instead of
    creating a full validation. The main difference between an item-level and a full
    validation is that with the item-level validation, you can’t conditionally control
    when the attribute is applied, and you don’t have direct control over the error
    message that is displayed.


    Go ahead and run the application again. At this point, you should be able to enter
    new tickets into the system but not see them anywhere outside of SQL Workshop.'
