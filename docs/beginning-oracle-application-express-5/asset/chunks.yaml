  trans: '

    ## 添加订阅


    `订阅`操作允许用户按计划将报告以电子邮件形式发送到指定的邮箱地址。用户需要输入电子邮件地址、主题、频率以及开始和结束日期，如图 7-42 所示。此操作仅对已认证用户可用。收到的电子邮件是您报告的可搜索`HTML`版本。分组格式和高亮显示不会被保留。


    ![A978-1-4842-0466-5_7_Fig42_HTML.jpg](img/A978-1-4842-0466-5_7_Fig42_HTML.jpg)


    图 7-42. 订阅交互式报表


    如果当前用户已有一个生效的订阅，您可以通过再次使用`订阅`操作来编辑该订阅。此时表单将显示当前订阅的属性，并允许用户更改或删除订阅。界面与图 7-42 所示完全相同，只是增加了一个`删除`按钮。


    报告订阅也可以由工作区管理员通过`管理主页` ➤ `任务菜单` ➤ `交互式报表设置` ➤ `订阅`界面进行管理，如图 7-43 所示。


    ![A978-1-4842-0466-5_7_Fig43_HTML.jpg](img/A978-1-4842-0466-5_7_Fig43_HTML.jpg)


    图 7-43. 通过管理订阅界面管理订阅


    ## 下载


    `下载`操作允许用户以以下格式之一下载其报告的当前结果集：


    *   `CSV`

    *   `HTML`

    *   `电子邮件`

    *   `PDF`

    *   `XLS` (MS Excel)

    *   `RTF` (MS Word)


    后两种格式需要`Oracle BI Publisher`，这可能需要向 Oracle 申请单独的许可。仅当您的`APEX`管理员已将`APEX`配置为与外部电子邮件服务器集成时，`电子邮件`选项才可用。图
    7-44 显示了不使用和使用`BI Publisher`时的下载选项。您可以在`下载`属性区域指定可用的格式，如图 7-45 所示。


    ![A978-1-4842-0466-5_7_Fig45_HTML.jpg](img/A978-1-4842-0466-5_7_Fig45_HTML.jpg)


    图 7-45. 指定下载属性


    ![A978-1-4842-0466-5_7_Fig44_HTML.jpg](img/A978-1-4842-0466-5_7_Fig44_HTML.jpg)


    图 7-44. 选择下载选项（不使用和使用 BI Publisher）


    以`CSV`格式下载的报告是纯的、以逗号分隔的数据。结果集中数据的内容和顺序在`CSV`文件中得以保留，但分组格式和高亮显示不会被保留。


    以`HTML`格式下载的报告是结果集的可搜索`HTML`版本，如图 7-46 所示。同样，结果集内容被保留，但分组格式和高亮显示不会被保留。


    ![A978-1-4842-0466-5_7_Fig46_HTML.jpg](img/A978-1-4842-0466-5_7_Fig46_HTML.jpg)


    图 7-46. 交互式报表的可搜索 HTML 下载


    `电子邮件`下载的输出与`HTML`下载相同，但通过电子邮件发送。`XLS`和`RTF`下载格式需要与`Oracle BI Publisher`集成，这可能需要向
    Oracle 申请单独的许可。`PDF`输出可以通过`Oracle Rest Data Services`、外部`格式化对象处理器`（`FOP`）或`BI
    Publisher`来实现。关于使用`Oracle BI Publisher`生成这些格式报告的完整描述超出了本书范围。更多详情请参阅`Oracle APEX`文档的“高级打印选项和配置”部分。如果您的安装未配置这些选项，它们将不会出现在下载选项列表中。


    花些时间尝试一下交互式报表的功能。如果您迷失了方向需要重置，只需点击`操作`按钮并选择`重置`。交互式报表将被重置为其原始状态，您对它所做的所有修改都将被丢弃。


    ## 修改交互式报表


    尽管交互式报表提供了大量的功能，但您可能希望限制最终用户可用的功能。交互式报表的每个功能都可以按报告为基础进行禁用。此外，您可以为特定报告设置默认选项，使这些选项对所有最终用户可用。

    '
- fmt: '#### Adding Attributes and Removing Columns


    Let’s take another look at your interactive report. You can use a combination
    of interactive report end-user actions and developer settings to achieve modifications.
    First, remove a column from the report and add a sort attribute using the Actions
    menu:


    Run the application and navigate to the `Analysis` menu item.

    Click the `Actions` button to display the Actions menu.

    Select the `Select Columns` option, as shown in Figure [7-47](#A978-1-4842-0466-5_7_Chapter.html#Fig47).


    ![A978-1-4842-0466-5_7_Fig47_HTML.jpg](A978-1-4842-0466-5_7_Fig47_HTML.jpg)


    **Figure 7-47. Selecting the Select Columns option**


    Move `Ticket Id` to the `Do Not Display` section of the shuttle, as shown in Figure
    [7-48](#A978-1-4842-0466-5_7_Chapter.html#Fig48), by double-clicking its name.


    ![A978-1-4842-0466-5_7_Fig48_HTML.jpg](A978-1-4842-0466-5_7_Fig48_HTML.jpg)


    **Figure 7-48. Selecting columns**


    Using the up and down arrows, reorder the remaining columns so that `Status` appears
    after `Subject` and before `Description`, as shown in the `Display in Report`
    section in Figure [7-48](#A978-1-4842-0466-5_7_Chapter.html#Fig48), and click
    `Apply`. Notice that the `Ticket Id` column is no longer displayed in your report
    and that the `Status` column appears immediately after the `Subject` column.


    Next, you can set your changes as default options for the interactive report.
    These options will be applied for all end users who use the interactive report.
    The `Save As Default Report Settings` option is only available to end users who
    are APEX developers:


    Click the `Actions` button and select the `Save Report` item.

    Set `Save` to `As Default Report Settings`, as shown in Figure [7-49](#A978-1-4842-0466-5_7_Chapter.html#Fig49).


    ![A978-1-4842-0466-5_7_Fig49_HTML.jpg](A978-1-4842-0466-5_7_Fig49_HTML.jpg)


    **Figure 7-49. The Save As Default Report setting**


    The region immediately changes, allowing you to save the report either as the
    primary default or as a named alternative. Make this one the `Primary default`,
    as shown in Figure [7-50](#A978-1-4842-0466-5_7_Chapter.html#Fig50). Click `Apply`.


    ![A978-1-4842-0466-5_7_Fig50_HTML.jpg](A978-1-4842-0466-5_7_Fig50_HTML.jpg)


    **Figure 7-50. Saving a primary interactive report**


    Now, create a named alternative default report that does a control break on the
    `Status` column:


    Click the `Actions` button and navigate to `Format` ➤ `Control Break`, as shown
    in Figure [7-51](#A978-1-4842-0466-5_7_Chapter.html#Fig51).


    ![A978-1-4842-0466-5_7_Fig51_HTML.jpg](A978-1-4842-0466-5_7_Fig51_HTML.jpg)


    **Figure 7-51. Selecting the Control Break action**


    Select `Status` in the first `Column` select list and make sure it’s set to `Enabled`,
    as shown in Figure [7-52](#A978-1-4842-0466-5_7_Chapter.html#Fig52). Click `Apply`.


    ![A978-1-4842-0466-5_7_Fig52_HTML.jpg](A978-1-4842-0466-5_7_Fig52_HTML.jpg)


    **Figure 7-52. Applying a control break to an interactive report**


    Click the `Actions` button and select the `Save Report` option.

    Set `Save` to `As Default Report Settings`, as shown in Figure [7-53](#A978-1-4842-0466-5_7_Chapter.html#Fig53).


    ![A978-1-4842-0466-5_7_Fig53_HTML.jpg](A978-1-4842-0466-5_7_Fig53_HTML.jpg)


    **Figure 7-53. Saving an interactive report as a default setting**


    The region immediately changes. This time, save the report as a named alternative:
    select `Alternative` for `Default Report Type`, enter `Tickets by Status` for
    `Name`, as shown in Figure [7-54](#A978-1-4842-0466-5_7_Chapter.html#Fig54), and
    click `Apply`.


    ![A978-1-4842-0466-5_7_Fig54_HTML.jpg](A978-1-4842-0466-5_7_Fig54_HTML.jpg)


    **Figure 7-54. Saving on interactive report as an alternate report**


    The toolbar at the top of the report now has a new `Reports` select list that
    contains both your default and alternative reports, as shown in Figure [7-55](#A978-1-4842-0466-5_7_Chapter.html#Fig55).


    ![A978-1-4842-0466-5_7_Fig55_HTML.jpg](A978-1-4842-0466-5_7_Fig55_HTML.jpg)


    **Figure 7-55. Reports select list showing both the primary and named alternative
    reports**


    #### Selectively Enabling and Disabling Items


    As a developer, you can selectively enable or disable items from the `Actions`
    menu. Doing so restricts which options are available to the end user for a specific
    interactive report. Here’s an example to work through:


    Edit `Page 300` of the application.

    Edit the `Analysis` report’s interactive report properties by clicking the `Attributes`
    node in the Rendering tree.

    Scroll down to the `Actions Menu` attributes group. Set `Flashback` and `Save
    Report` to `NO` and set `Subscription` to `YES`, as shown in Figure [7-56](#A978-1-4842-0466-5_7_Chapter.html#Fig56).


    ![A978-1-4842-0466-5_7_Fig56_HTML.jpg](A978-1-4842-0466-5_7_Fig56_HTML.jpg)


    **Figure 7-56. Selecting Actions menu options**


    Save your changes.

    Run your report again, and then click the `Actions` button to expand the actions
    menu. Notice that the `Flashback` item is no longer present. And while we turned
    `Save Report` off, you can still save reports because you’re logged in as a developer
    to the underlying workspace. Standard end users won’t see this option. You should
    also see a new option for subscriptions.


    #### Limiting an Action to Specific Columns


    In addition to controlling which actions appear for an interactive report, you
    can get even more granular and determine on which columns a specific action can
    be performed. Figure [7-57](#A978-1-4842-0466-5_7_Chapter.html#Fig57) shows the
    column-level `Actions` settings for your interactive report. Proceed as follows:


    Edit `Page 300` of your application.

    Expand the `Columns` node under the `Analysis Interactive Report` node in the
    Rendering tree and select the `Description` column.

    In the `Enable Users To` attribute group, set the `Sort` and `Filter` attributes
    to `NO`.

    Save your changes.


    ![A978-1-4842-0466-5_7_Fig57_HTML.jpg](A978-1-4842-0466-5_7_Fig57_HTML.jpg)


    **Figure 7-57. Selecting column-level actions for an interactive report**


    Run `Page 300` of your application.

    Click the `Actions` button and select `Format` ➤ `Sort`. The `Sort` action interface
    should look similar to Figure [7-58](#A978-1-4842-0466-5_7_Chapter.html#Fig58).


    ![A978-1-4842-0466-5_7_Fig58_HTML.jpg](A978-1-4842-0466-5_7_Fig58_HTML.jpg)


    **Figure 7-58. Modified Select Column list**


    Notice that `Description` no longer appears as a column name in the list of columns.


    By default, the interactive report links to something called `Single Row View`.
    This view shows a read-only region that contains all the details about a specific
    row. In this case, you may want to link back to the form you created on `page
    210`. In this case, you can alter the interactive report to use a more traditional
    page link instead of the `Single Row View`. You do this by editing the `Link Column`
    attributes, as shown in Figure [7-59](#A978-1-4842-0466-5_7_Chapter.html#Fig59):


    ![A978-1-4842-0466-5_7_Fig59_HTML.jpg](A978-1-4842-0466-5_7_Fig59_HTML.jpg)


    **Figure 7-59. Setting the Link Column attributes**


    Edit `Page 300` of the application.

    Click on the `Attributes` node for the `Analysis Interactive Report`.

    In the `Link` attribute group, set `Link Column` to `Link to Custom Target`.

    Click on the `Options Dialog` button for the `Target` attribute.

    In the resulting dialog, make sure `Type` is set to `Page in This Application`,
    set `Page` to `210`, enter `P210_TICKET_ID` for the `Name` and `#TICKET_ID#` for
    the `Value` on the first line, and then click `OK` (see Figure [7-59](#A978-1-4842-0466-5_7_Chapter.html#Fig59)).

    Save your changes.


    `Name` and `Value` tell the link to pass the current ticket’s ID (identified by
    `#TICKET_ID#`) and assign it to `P210_TICKET_ID` in session state.


    Run `page 300` of your application. You should now be able to drill into the details
    of any row by clicking in the column with the `Edit` link.'
