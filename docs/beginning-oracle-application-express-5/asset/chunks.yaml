  trans: '

    ## 声明式 BLOBs


    在 Oracle 中，BLOB 代表二进制大对象，是一种设计用于存储二进制文件的数据类型。APEX 通过一项名为“声明式 BLOBs”的功能，简化了管理 BLOB
    列的方式。APEX 向导能识别 BLOB 列，并自动修改相关的 APEX 项和报表，以便与该列无缝交互。为什么你需要关心 BLOB 列？使用 BLOB 列可以让你轻松地将文件（如文档、电子表格和图像）上传到应用程序中并下载。


    使用声明式 BLOBs 功能时需提前规划。在设计时，请将这些列包含在将使用声明式 BLOBs 的表中：


    *   `FILENAME`: 存储用户上传文件时使用的实际文件名

    *   `MIME_TYPE`: 存储文件类型，以便浏览器知道应启动哪个应用程序（如用 Word 打开`.doc`，用 Excel 打开`.xls`等）

    *   `LAST_UPDATED`: 存储 BLOB 最后更新的日期

    *   `CHARACTER_SET`: 存储 BLOB 的字符集，这对于索引和处理存储在 BLOB 内的数据至关重要


    前两列对于需要时从 BLOB 中读取数据至关重要。APEX 使用 BLOB 列的“数字/日期格式”列属性，将这些属性映射到数据库中存储的 BLOB 列。


    如果你在使用向导创建报表或表单之后才添加 BLOB 列，则必须手动设置列或项属性以集成 BLOB 处理。


    由于你在运行 SQL 脚本时已向`TICKET_DETAILS`表添加了 BLOB 列，系统已为你完成了一些工作。但要正确使用声明式 BLOBs，你仍需要完成几项操作。首先，必须将`FILENAME`和`MIME_TYPE`列映射到用于上传文档的表单，以便将这些详细信息保存在数据库中。让我们先处理第
    220 页的表单。


    编辑应用程序的第 220 页。编辑项`P220_ATTACHMENT`。在“设置”部分，你将看到图 6-69 中所示的字段。


    ![A978-1-4842-0466-5_6_Fig69_HTML.jpg](img/A978-1-4842-0466-5_6_Fig69_HTML.jpg)


    图 6-69. 指定 BLOB 设置


    在“设置”属性组中，为“MIME 类型列”输入`MIME_TYPE`，为“文件名列”输入`FILE_NAME`，为“下载链接文本”输入`Download`。点击“保存”。


    接下来，修改第 210 页的报表：


    编辑应用程序的第 210 页。点击其名称编辑“工单详情”区域。找到并打开文件`ch6_blob_report.txt`（该文件位于你之前提取的类文件所在目录），将其内容复制到“SQL
    查询”属性中，替换当前的所有文本。参见图 6-70。


    ![A978-1-4842-0466-5_6_Fig70_HTML.jpg](img/A978-1-4842-0466-5_6_Fig70_HTML.jpg)


    图 6-70. 输入包含 BLOB 列的报表查询


    请注意选择列表中最后一列的变化。使用`dbms_lob.getlength`向 APEX 指示`ATTACHMENT` BLOB 列是否包含数据。如果包含，查询将返回一个大于
    0 的数字。现在你需要修改报表列以显示一个链接，允许最终用户下载任何可能已上传的文档：


    在渲染树中展开“工单详情”节点下的“列”节点。编辑`ATTACHMENT`列，将“类型”属性更改为“下载 BLOB”。在新出现的“BLOB 属性”属性组中，为“表名”输入`TICKET_DETAILS`，为“Blob
    列”输入`ATTACHMENT`，为“主键列 1”输入`TICKET_DETAILS_ID`，为“Mime 类型列”输入`MIME_TYPE`，为“文件名列”输入`FILE_NAME`，并在“外观”下为“下载文本”输入`Download`，如图
    6-71 所示。


    ![A978-1-4842-0466-5_6_Fig71_HTML.jpg](img/A978-1-4842-0466-5_6_Fig71_HTML.jpg)


    图 6-71. 修改 BLOB 列属性


    保存你的更改。


    运行应用程序。通过将文件附加到某个工单详情记录，然后从报表中下载它，来测试文件上传和下载功能。


    APEX 中这种轻松上传和下载文件的能力，在构建用户需要为任何目的上传和下载数据的 Web 应用程序时极其有用。APEX 的声明式 BLOBs 功能使开发者能够轻松地向应用程序添加上传和下载功能。


    ## 小结


    你已了解了大多数 APEX 表单和报表类型，并使用 APEX 表单和报表向导，逐步为你的 Help Desk 系统构建了各种表单和报表。在此过程中，你学习了
    APEX 项、会话状态、APEX URL 语法、向 APEX 页面添加帮助信息，以及通过使用声明式 BLOBs 功能来整合上传和下载功能。需要消化的内容很多，但
    APEX 向导已为你完成了大部分工作。


    这里的共同主题是，APEX 表单和报表向导为开发者节省了大量时间，它们创建了工作表单或报表所需的所有对象——项、按钮、分支、进程等。然后，你可以修改这些创建的对象，快速自定义表单或报表以满足你的需求。


    尽管如此，你尚未远离 APEX 为你构建的内容，并且只涵盖了最简单的表单和报表类型。下一章将探讨更复杂的 APEX 表单和报表类型，它们同样由向导生成。


    # 7. 表单与报表：高级篇


    电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0466-5_​7](http://dx.doi.org/10.1007/978-1-4842-0466-5_7)）包含补充材料，可供授权用户使用。


    本章将重点介绍更复杂的表单和报表类型；同时还将介绍图表和地图。尽管这些是更复杂的表单和报表类型，但它们最常通过使用 APEX 表单和报表向导来创建。


    在接下来的章节中，你将学习如何使用 APEX 表单和报表向导，向你的 Help Desk 应用程序添加页面，以便在单个页面上管理多个工单，允许对工单数据进行一些交互式分析，并按日期和状态可视化工单。为此，你将创建一个表格表单、一个交互式报表、一个日历和一个饼图，每个都演示一种更高级的
    APEX 表单或报表类型。


    ## 表格表单


    表格表单允许用户同时编辑数据的多行和多列，很像电子表格。开发者可以为每一列选择不同的元素类型——文本框、文本区域、选择列表、复选框、单选组等。用户可以修改多个数据元素，并将它们作为一个事务提交。APEX
    表格表单处理插入、更新和删除——全部无需代码！


    APEX 向导为功能齐全的表格表单创建了所有必需的元素。与所有 APEX 表单一样，构成表格表单的项之间没有逻辑关系。一旦向导创建了这些项，它们就与其他的
    APEX 页面项无异，并且可以独立于彼此进行修改。但是，我建议在修改由 APEX 向导生成的项时要谨慎；这样做可能会导致表格表单无法操作。


    你可以选择绕过向导，创建自己的表格表单。随着应用程序变得越来越复杂，你可能会发现手动创建表单更高效。然而，本书侧重于向导方法。

    '
- fmt: '### Creating a Tabular Form


    In this section you will create a new page that contains a tabular form based
    on the `TICKETS` table. The form allows multiple tickets to be edited on the same
    page. You will then alter the display properties of the tabular form’s columns.
    Proceed as follows:


    Navigate to the Application Builder Home Page for your application.

    Click the Create Page button at upper right on the page.

    Select Form and click Next.

    Select Tabular Form and click Next.

    Select your schema for Table/View Owner, and then select `TICKETS` (table) for
    Table/View Name.

    Make sure that Allowed Operations is set to Update, Insert and Delete.

    By default, Use User Interface Defaults and all the columns are already selected,
    as shown in Figure [7-1](#A978-1-4842-0466-5_7_Chapter.html#Fig1). Click Next.


    ![A978-1-4842-0466-5_7_Fig1_HTML.jpg](A978-1-4842-0466-5_7_Fig1_HTML.jpg)

    Figure 7-1. Selecting columns for a tabular form


    Set Primary Key Type to Select Primary Key Column(s).

    Set Primary Key Column 1 to `1. TICKET_ID (Number)`, and click Next.

    Set Source Type to Existing Trigger and click Next.

    Select all columns as Updatable Columns, as shown in Figure [7-2](#A978-1-4842-0466-5_7_Chapter.html#Fig2),
    and click Next.


    ![A978-1-4842-0466-5_7_Fig2_HTML.jpg](A978-1-4842-0466-5_7_Fig2_HTML.jpg)

    Figure 7-2. Selecting updatable columns for a tabular form


    Enter `230` for Page and `Manage Multiple Tickets` for Page Name and Region Title
    as shown in Figure [7-3](#A978-1-4842-0466-5_7_Chapter.html#Fig3).


    ![A978-1-4842-0466-5_7_Fig3_HTML.jpg](A978-1-4842-0466-5_7_Fig3_HTML.jpg)

    Figure 7-3. Identifying page and region attributes for a tabular form


    Set Page Mode to Modal Dialog.

    Set Breadcrumb to Breadcrumb.

    When the page refreshes, set Entry Name to Manage Multiple Tickets and Parent
    Entry to Tickets (Page 200), as shown in Figure [7-4](#A978-1-4842-0466-5_7_Chapter.html#Fig4),
    and click Next.


    ![A978-1-4842-0466-5_7_Fig4_HTML.jpg](A978-1-4842-0466-5_7_Fig4_HTML.jpg)

    Figure 7-4. Creating a breadcrumb entry for a tabular form


    For Navigation Preference, select Identify an existing navigation menu entry for
    this page.

    When the dialog refreshes, set Existing Navigation Menu Entry to Tickets and click
    Next.

    Change the Add Row Button Label to `Add Tickets`.

    Check your selections in the Confirmation scrollable region, as shown in Figure
    [7-5](#A978-1-4842-0466-5_7_Chapter.html#Fig5).


    ![A978-1-4842-0466-5_7_Fig5_HTML.jpg](A978-1-4842-0466-5_7_Fig5_HTML.jpg)

    Figure 7-5. Checking our choices in the Confirmation region


    Click Create.


    ### Modifying a Tabular Form


    Your tabular form will work, but currently there is no way to navigate to it.
    First, you need to create a button on page 200 that links to your new tabular
    form:


    Edit Page 200 of the application.

    Create a new button by dragging a Text[Hot] button from the Component Gallery
    to the Create button position of the Tickets region, as shown in Figure [7-6](#A978-1-4842-0466-5_7_Chapter.html#Fig6).


    ![A978-1-4842-0466-5_7_Fig6_HTML.jpg](A978-1-4842-0466-5_7_Fig6_HTML.jpg)

    Figure 7-6. Dragging a new button to the Tickets region


    Enter `MANAGE_MULTIPLE_TICKETS` for Button Name and `Manage Multiple Tickets`
    for Label, as shown in Figure [7-7](#A978-1-4842-0466-5_7_Chapter.html#Fig7).


    ![A978-1-4842-0466-5_7_Fig7_HTML.jpg](A978-1-4842-0466-5_7_Fig7_HTML.jpg)

    Figure 7-7. Specifying button attributes


    In the Behavior attribute group, set Action to Redirect to Page in This Application.

    Click the Options Dialog button next to Target.

    Once the Options Dialog appears, set Page to `230`, set Reset Pagination to YES,
    as shown in Figure [7-8](#A978-1-4842-0466-5_7_Chapter.html#Fig8), and click OK.


    ![A978-1-4842-0466-5_7_Fig8_HTML.jpg](A978-1-4842-0466-5_7_Fig8_HTML.jpg)

    Figure 7-8. Specifying button action attributes


    Save and Run your application.


    At this point, you should be able to navigate to your tabular form from page 200
    by clicking the Manage Multiple Tickets button.


    However, now you need to make some cosmetic modifications so you can better control
    data entry and the look and feel of the dialog.


    First, let’s increase the size of the dialog window so we can see all the elements
    of the form:


    Edit Page 230 of the application.

    Select Page 230: Manage Multiple Tickets in the Rendering tab of the Tree Pane.

    In the Properties Editor set the dialog `Width` property to `1200` and the `Height`
    property to `720`.

    Click Save. Next, you’ll make some changes to the columns of the Tabular Form.

    Expand the Columns node under the Manage Multiple Tickets node of the tree in
    the Rendering tab.

    Edit the `TICKET_ID_DISPLAY` column and set Type attribute to Hidden Column.

    Multi-select `SUBJECT`, `DESCR`, `CREATED_BY`, `CREATED_ON`, `CLOSED_ON`, `ASSIGNED_TO`,
    and `STATUS_ID` and make sure their `Sortable` properties are set to YES.

    Multi-select the `SUBJECT` and `DESCR` columns.

    In the Properties Editor, set Type to Text Area, `Width` to `16`, and `Height`
    to `3`.

    Edit the `ASSIGNED_TO` column.

    In the Properties Editor, set Type to Select List.

    In the List of Values attribute group, set Type to Shared Component, List of Values
    to `TECHS`, Display Extra Values to No, Display Null to Yes, and enter `- Select
    a Tech -` for Null Display Value, as shown in Figure [7-9](#A978-1-4842-0466-5_7_Chapter.html#Fig9).


    ![A978-1-4842-0466-5_7_Fig9_HTML.jpg](A978-1-4842-0466-5_7_Fig9_HTML.jpg)

    Figure 7-9. Specifying a LOV for the `ASSIGNED_TO` column


    Edit the `CREATED_BY` column.

    In the Properties Editor, set Type to Select List.

    In the List of Values section, set Type to Shared Component, List of Values to
    `USERS`, Display Extra Values to No, and Display Null to Yes, and enter `- Select
    a User -` for Null Display Value, as shown in Figure [7-10](#A978-1-4842-0466-5_7_Chapter.html#Fig10).


    ![A978-1-4842-0466-5_7_Fig10_HTML.jpg](A978-1-4842-0466-5_7_Fig10_HTML.jpg)

    Figure 7-10. Specifying LOV attributes for the `CREATED_BY` column


    Edit the `STATUS_ID` column.

    In the Properties Editor, navigate to the Default attribute group and set Type
    to PL/SQL Expression and enter `get_status (''OPEN'')` for Default.

    Save the edits you just made and then run your application. Note: Because page
    230 is a modal dialog page, you will need to run it from the button you created
    on page 200.


    ### Looking Behind the Scenes


    Let’s take a look at what the Tabular Form wizard has created for you—the contents
    of your tabular form. Edit page 230 to examine the various tabs of the Tree Pane.
    They should look similar to those shown in Figure [7-11](#A978-1-4842-0466-5_7_Chapter.html#Fig11).


    ![A978-1-4842-0466-5_7_Fig11_HTML.jpg](A978-1-4842-0466-5_7_Fig11_HTML.jpg)

    Figure 7-11. The various tabs of the Tree Pane for page 230


    In the Rendering tab, APEX has created a Report region. But you created a form,
    didn’t you? Despite its name, a tabular form is actually a SQL report with certain
    column-level options enabled and some processes added to handle data manipulation.


    In the Processing tab, in the Processing section, you see two processes: `ApplyMRU`
    and `ApplyMRD`. These special types of processes handle the multiple-row inserts
    and updates (`ApplyMRU`) and deletes (`ApplyMRD`) on the `TICKETS` table. These
    processes handle all DML operations on the `TICKETS` table for you.


    APEX has also created validations for several of the columns, which are created
    automatically based on the `TICKETS` table column definitions plus any UI Defaults
    defined on the `TICKETS` table.


    In the Shared Components tab are the usual page and tab templates that are the
    defaults for your application.


    As you can see, the `ApplyMRU` and `ApplyMRD` processes make the difference between
    the Report region being a static report region and being a fully functional tabular
    form. And it’s so much easier to let the APEX wizard create all this for you!'
