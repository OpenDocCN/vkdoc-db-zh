  trans: '

    # SQL 标签


    Websheets 允许管理员和贡献者查询 schema 中的表和视图。他们可以创建类似于数据网格的报告，但这些报告是只读的。他们还可以直接在部分中包含称为
    SQL 标签的查询结果。


    在 Players 页面上，我们添加一个部分来显示有权访问该应用程序的已注册用户数量，并在该部分中包含一个 SQL 标签。要创建该部分，请按照以下步骤操作：


    转到 Players 页面。

    点击 `新建部分` 链接。

    为 `部分类型` 选择 `文本`，然后点击 `下一步`。

    将 `顺序` 设置为 `5`，将 `标题` 设置为 `活跃的注册用户`。

    在 `内容` 部分输入以下文本，然后点击 `创建部分` 按钮：

    `我们目前有[[sqlvalue: select count(*) from tusers where active_flag = ''Y'' ]]名活跃的注册用户。他们是：[[sql:
    select initcap(user_name) "Name" from tusers order by user_name ]]`


    新部分应如图 12-22 所示。请注意前面代码中第一行的 `select count` 查询。该查询生成了图中显示的活跃用户数 3。同样，前面代码中的第二个
    `select` 语句生成了玩家名称列表。


    ![A978-1-4842-0466-5_12_Fig22_HTML.jpg](img/A978-1-4842-0466-5_12_Fig22_HTML.jpg)


    **图 12-22.** 包含 SQL 标签的部分


    使用 SQL 标签时，您需要明确定义查询是返回单个值还是多行多列。定义为 `sqlvalue:` 的 SQL 标签意味着将返回一个单值，并将其嵌入到句子中，使得该单值作为句子中的一个词出现。使用
    `sql:` 则意味着将返回多行多列。当查询返回多行时，其结果显示为类似电子表格的格式，如图 12-22 所示。


    图 12-22 中的搜索框是第二个查询返回多行的结果。每当查询结果显示为类似电子表格的网格时，该网格前面都会有一个搜索框，您可以使用它快速找到特定的结果行。


    ## 访问控制


    您需要为应用程序做的最后一件事是让团队中的其他玩家也能访问它。您在创建应用程序时已经授予了 Martin 访问权限。您需要授予其他玩家 Chris 和 Cameron
    查看该应用程序的权限。为此，请按照以下步骤操作：


    点击屏幕顶部的 `管理` 选项卡。

    点击下拉菜单中的 `访问控制` 选项。

    点击 `创建条目` 按钮。

    为 `用户名` 输入 `Chris`，并为 `权限` 选择 `读者`。点击 `创建并继续创建另一个` 按钮。

    为 `用户名` 输入 `Cameron`，并为 `权限` 选择 `读者`。点击 `创建`。


    现在，Chris 和 Cameron 可以登录该应用程序。但是，他们不能修改任何部分或数据网格。如果您需要授予某人修改应用程序的权限，可以在“访问控制”部分为他们授予
    `贡献者` 角色。


    ## 总结


    最后两章介绍了 websheets 及其功能。从这里开始，您可以继续制作复杂的 websheet 应用程序，而无需对数据库或 SQL 有太多了解。既然您已经掌握了
    websheets 的基础知识，安装并分析 websheet 示例应用程序将是理解 websheet 功能的下一步。


    # 13. 扩展开发人员工具


    在前面章节中开发示例应用程序时，您已经看到了 APEX 开发工具的许多功能。本章将重点介绍 APEX 中未在之前章节涵盖的高级开发功能。当您在企业环境中开发大型应用程序时，这些功能或工具可能会有所帮助。


    > **注意**

    > 本章假设您对 APEX 比较熟悉并且理解其基础知识。如果您对开发 APEX 应用程序还不太熟练，我们强烈建议您重新学习从第 5 章到第 9 章的示例，以便更熟练地使用
    APEX 及其开发环境。


    ## 页面锁定


    在较大团队中进行开发时，可能会发生开发冲突。开发冲突是指两个开发人员同时处理同一个对象并相互覆盖对方的更改。


    > **注意**

    > 在本章的剩余部分中，提到的 APEX 对象指的是页面项、区域、列表、页面等。


    传统的 Web 开发工具，如 ASP、PHP 和 JSP，包含多个文件，每个文件代表 Web 应用程序中的一个页面或一组功能。使用这些工具开发时，通常的做法是使用
    Subversion 等源代码控制工具来管理所有更改。源代码控制工具可以轻松管理多个开发人员之间的开发冲突，因为冲突被隔离在单个文件中。


    APEX 与刚刚提到的脚本语言不同，因为开发人员不处理文件。所有信息都存储在数据库中的表中。当您导出应用程序时，会得到一个 SQL 文件，该文件将应用程序的元数据加载到这些表中。由于
    APEX 将其内容存储在数据库中，因此在多人团队开发时，您不能使用传统的源代码控制工具来管理冲突。


    ### APEX 冲突


    为了演示 APEX 中的开发冲突，想象您有两个开发人员 Mina 和 Natalie，她们正在同一应用程序页面上工作。如果她们同时添加和修改页面组件，该页面对她们两人来说可能都无法按预期运行。


    APEX 通过执行乐观锁定来防止开发人员同时修改同一对象。表 13-1 显示了两位开发人员编辑同一对象时发生的事件序列。您可以在最后看到 APEX 如何阻止
    Natalie 覆盖 Mina 所做的更改。


    **表 13-1.** 乐观锁定场景


    | 步骤 | Mina | Natalie |

    | --- | --- | --- |

    | 1 | 编辑 `P1_EMPNO` | -- |

    | 2 | -- | 编辑 `P1_EMPNO` |

    | 3 | 将帮助文本编辑为：“Mina’s Help” | -- |

    | 4 | -- | 将帮助文本编辑为：“Natalie’s Help” |

    | 5 | 应用更改 | -- |

    | 6 | -- | 应用更改 |

    | 7 | -- | 收到错误消息：`自用户启动更新流程以来，数据库中的数据当前版本已更改。当前行版本标识符 = "A08A505E601932E33BC1074BEA1A3B4C"
    应用程序行版本标识符 = "AECE767E4BDDC737A7823083A31D564F"`。`请联系您的应用程序管理员。` |


    乐观锁定仅在开发人员修改同一对象时有效。当多个开发人员同时修改同一页面上的不同对象时，问题就会出现。修改一个对象可能会影响整个页面的流程，而其他开发人员可能并未意识到这一点。悲观锁定有助于防止这种情况下的麻烦。下一节将讨论如何进行悲观锁定。

    '
- fmt: '### 锁定 APEX 页面


    在开发由多名开发人员参与的应用程序时，防止问题发生的最简单方法是在处理某个页面之前将其锁定。锁定页面可以防止其他开发人员在您处理该页面时对其进行修改。页面锁定期间，其他开发人员仍可以查看页面及其组件；他们只是无法对页面进行任何修改。


    锁定页面的过程如下：


    在页面设计器中，单击页面设计器工具栏中的“锁定”图标，如图[13-1](#A978-1-4842-0466-5_13_Chapter.html#Fig1)所示。


    ![A978-1-4842-0466-5_13_Fig1_HTML.jpg](A978-1-4842-0466-5_13_Fig1_HTML.jpg)


    图 13-1。


    锁定页面。您将看到一个弹出对话框，允许您输入评论或锁定页面的原因。为“注释”输入一个值（所有页面锁定都需要注释）并单击“锁定”。对话框将被关闭，锁定图标将变为实心绿色并带有一个闭合的锁。


    输入有意义的页面锁定注释很重要，因为系统会维护页面锁定的历史记录。如果您使用案例管理工具，在锁定页面时引用您正在处理的案例编号是明智的。


    如果另一位开发人员查看一个已锁定的页面，他们会看到锁定图标显示为实心红色并带有一个闭合的锁。单击锁定图标将打开一个弹出对话框，显示谁锁定了页面以及他们当时输入的注释。图[13-2](#A978-1-4842-0466-5_13_Chapter.html#Fig2)显示了一个已锁定页面和弹出对话框的示例。


    ![A978-1-4842-0466-5_13_Fig2_HTML.jpg](A978-1-4842-0466-5_13_Fig2_HTML.jpg)


    图 13-2。


    已锁定页面


    ### 解锁页面


    只有 APEX 管理员、工作区管理员以及锁定页面的开发人员才能解锁它。如果您是锁定页面的开发人员，以下过程演示了如何解锁它：


    转到锁定的页面（前一个示例中的页面 1），然后单击页面设计器工具栏中的“锁定”图标。您将看到显示当前锁定注释的弹出对话框。从这里，您可以更改注释并保存更改，也可以单击“解锁”按钮来解锁页面。


    ### 管理页面锁定


    开发人员可能希望查看所有已锁定的页面，或者可能希望同时锁定/解锁多个页面。APEX 提供了处理多个页面锁定请求的工具。要查看“页面锁定”报告，请在页面设计器工具栏中转到“实用程序”
    ➤ “跨页面实用程序”，然后选择“页面锁定”，如图[13-3](#A978-1-4842-0466-5_13_Chapter.html#Fig3)所示。


    ![A978-1-4842-0466-5_13_Fig3_HTML.jpg](A978-1-4842-0466-5_13_Fig3_HTML.jpg)


    图 13-3。


    页面锁定报告


    从“页面锁定”报告中，您可以查看所有已锁定和已解锁的页面。您可以从此报告中锁定和解锁多个页面。工作区管理员可以解锁任何页面，但开发人员只能解锁他们自己锁定的页面。开发人员还可以通过单击“查看锁定”图标（看起来像一个放大镜）来查看每个页面的锁定历史记录。


    注意


    当应用程序被复制或导出时，页面锁定不会在新版本中保留。这意味着任何页面锁定和注释历史记录仅与工作区中的特定应用程序相关。如果您将应用程序复制到另一个工作区，新副本中没有任何页面被锁定。


    ## 应用程序和页面组


    开发大型 APEX 应用程序可能需要您对应用程序和页面进行分组。APEX 允许您以声明方式对应用程序以及应用程序中的页面进行分组。对页面和应用程序进行分组可以帮助您避免采用严格的应用程序和页面命名及编号方案。


    ### 应用程序组


    当工作区中有多个应用程序时，您可能希望将相关的应用程序分组，以帮助开发人员直观地了解哪些应用程序是相关的。例如，假设您开发了一个由三个模块组成的大型 CRM
    系统：市场营销、服务和销售。出于各种原因，您可能希望将每个模块创建为其自己的应用程序，并有一个链接这些应用程序的公共管理模块。


    如果您的工作区包含其他成套的应用程序，开发人员可能会对他们正在处理的套件感到困惑。要解决此问题，您可以创建应用程序组。以下是创建应用程序组的过程：


    导航到应用程序构建器。单击工作区实用程序图标。从工作区实用程序菜单中单击“应用程序组”选项。单击“创建”按钮。为组输入“名称”和“描述”值。在此示例中，使用
    `CRM`。单击“创建”。


    以下步骤演示了如何将各个应用程序添加到应用程序组：


    在“应用程序组”页面上，单击“任务”区域右侧的“管理未分配”链接。在“新建组”选择列表中选择组，然后通过选中复选框来选择应用程序。单击“分配已勾选项目”按钮，如图[13-4](#A978-1-4842-0466-5_13_Chapter.html#Fig4)所示。


    ![A978-1-4842-0466-5_13_Fig4_HTML.jpg](A978-1-4842-0466-5_13_Fig4_HTML.jpg)


    图 13-4。


    分配应用程序组。转到应用程序构建器主页，以报告格式查看应用程序。您可以使用“操作”菜单将“组”列添加到报告中。这使您可以查看应用程序列表及其应用程序组，如图[13-5](#A978-1-4842-0466-5_13_Chapter.html#Fig5)所示。


    ![A978-1-4842-0466-5_13_Fig5_HTML.jpg](A978-1-4842-0466-5_13_Fig5_HTML.jpg)


    图 13-5。


    应用程序报告


    ### 页面组


    页面组与应用程序组类似，不同之处在于它们将页面分组在一起。它们特定于应用程序，这意味着页面组仅对特定应用程序有效。页面组对于帮助对应用程序中的常见页面进行分组非常有用。


    使用页面组的另一种方法是使用编号方案将页面分组在一起。然而，页面编号方法可能并不总是有效，因为您可能会用完编号。例如，假设您将逻辑页面按 10 个一组进行分组。当一个组中有
    11 个页面时会发生什么？当然，解决方法是为每个逻辑页面组创建较大的间隔，但即便如此，您也可能会遇到页面不符合您的编号标准的情况。


    注意


    您还可以将页面组用于开发环境以外的目的。假设您将所有管理页面分组到一个“管理”页面组中。如果您有一个希望仅在管理页面上显示的“全局页面”区域，则可以添加一个条件来检查当前页面是否与“管理”页面组相关联。


    要创建和管理页面组，请从 APEX 中的“应用程序”页面转到“实用程序” ➤ “页面特定实用程序” ➤ “页面组”。在“页面组”页面上，您可以以类似于上一节创建应用程序组的方式创建和分配页面组。


    ## APEX 视图和 APEX 字典


    在传统的 Web 开发工具中，如果您需要搜索所有代码，必须梳理多个文本文件。APEX 则不同，因为它将代码存储在数据库中。因此，您可以运行查询来搜索代码。'
  raw: '### Locking an APEX Page


    The easiest way to prevent issues from occurring when developing an application
    with multiple developers is to lock a page before working on it. Locking a page
    prevents other developers from modifying the page while you’re working on it.
    Developers can still view the page and its components while a page is locked;
    they just can’t make any modifications to the page.


    The following process locks a page:


    In the Page Designer, click the Lock icon in the Page Designer Toolbar, as shown
    in Figure [13-1](#A978-1-4842-0466-5_13_Chapter.html#Fig1).


    ![A978-1-4842-0466-5_13_Fig1_HTML.jpg](A978-1-4842-0466-5_13_Fig1_HTML.jpg)


    Figure 13-1.


    Locking a page You will see a pop-up dialog that allows you to enter a comment
    or reason as to why you are locking the page.   Enter a value for Comment (all
    page locks require a comment) and click Lock. The dialog will be dismissed, and
    the lock icon will have changed to solid green with a closed padlock.  


    Entering meaningful page-lock comments is important, because a history of page
    locks is maintained. If you use a case-management tool, it’s smart to reference
    the case number that you’re working on when locking a page.


    If another developer views a locked page, they see the lock icon as solid red
    with a closed padlock. Clicking on the lock icon will open a pop-up dialog indicating
    who locked the page and the comment they entered at the time. Figure [13-2](#A978-1-4842-0466-5_13_Chapter.html#Fig2)
    shows an example of a locked page and the pop-up dialog.


    ![A978-1-4842-0466-5_13_Fig2_HTML.jpg](A978-1-4842-0466-5_13_Fig2_HTML.jpg)


    Figure 13-2.


    Locked page


    ### Unlocking a Page


    Only APEX administrators, workspace administrators, and the developer who locked
    a page can unlock it. If you’re the developer who locked a page, the following
    process demonstrates how to unlock it:


    Go to the locked page (page 1 from the previous example) and click the Lock icon
    in the Page Designer Toolbar.   You’ll see the pop-up dialog showing the current
    lock comment. From here you can either alter your comment and save the changes
    or click the Unlock button to unlock the page.


    ### Administering Page Locks


    Developers may want to see all the pages that are locked, or they may want to
    lock/unlock multiple pages at the same time. APEX provides tools to handle multiple
    page-lock requests. To view the Page Locks report, in the Page Designer Toolbar
    go to Utilities ä Cross Page Utilities and then choose Page Locks, as shown in
    Figure [13-3](#A978-1-4842-0466-5_13_Chapter.html#Fig3).


    ![A978-1-4842-0466-5_13_Fig3_HTML.jpg](A978-1-4842-0466-5_13_Fig3_HTML.jpg)


    Figure 13-3.


    Page Locks report


    From the Page Locks report, you can view all the pages that are locked and unlocked.
    You can lock and unlock multiple pages from this report. Workspace administrators
    can unlock any page, but developers can only unlock pages that they locked. Developers
    can also view the lock history for each page by clicking the View Lock icon, which
    looks like a magnifying glass.


    Note


    Page locks aren’t maintained in the new version when an application is copied
    or exported. This means any page locks and comment histories are only relevant
    to the specific application in the workspace. If you copy an application into
    another workspace, nothing is locked in that new copy.


    ## Application and Page Groups


    Developing large APEX applications may require you to group applications and pages.
    APEX allows you to declaratively group applications and pages in applications.
    Grouping pages and applications can help you avoid the need to have strict application
    and page naming and numbering schemes.


    ### Application Groups


    When you have multiple applications in a workspace, you may want to group associated
    applications to help developers visualize which applications are related. For
    example, suppose you develop a large CRM system that consists of three modules:
    Marketing, Service, and Sales. For various reasons, you may want to create each
    of these modules in its own application and have a common Admin module that links
    the applications together.


    If your workspace contains other suites of applications, developers may get confused
    about which suite of applications they’re working on. To resolve this issue, you
    can create application groups. Here is the process to create an application group:


    Navigate to the Application Builder.   Click the Workspace Utilities icon.   Click
    the Application Groups option from the Workspace Utilities menu.   Click the Create
    button.   Enter Name and Description values for the group. In this example, use
    `CRM`. Click Create.  


    The following steps demonstrate how to add individual applications to an application
    group:


    On the Application Groups page, click the Manage Unassigned link at the right
    in the Tasks region.   Select the group in the New Group select list and then
    choose the applications by selecting the checkboxes. Click the Assign Checked
    button, as shown in Figure [13-4](#A978-1-4842-0466-5_13_Chapter.html#Fig4).


    ![A978-1-4842-0466-5_13_Fig4_HTML.jpg](A978-1-4842-0466-5_13_Fig4_HTML.jpg)


    Figure 13-4.


    Assigning application groups   Go to the Application Builder main page and view
    the applications in a report format. You can use the Actions menu to add the Group
    column to the report. This allows you to view the list of applications, along
    with their application group, as shown in Figure [13-5](#A978-1-4842-0466-5_13_Chapter.html#Fig5).


    ![A978-1-4842-0466-5_13_Fig5_HTML.jpg](A978-1-4842-0466-5_13_Fig5_HTML.jpg)


    Figure 13-5.


    Application report


    ### Page Groups


    Page groups are similar to application groups except that they group pages together.
    They’re application specific, which means a page group is only valid for a particular
    application. Page groups are very useful to help group common pages in an application.


    An alternate approach to using page groups is to use a numbering scheme to group
    pages together. The page-number approach may not always work, however, because
    you may run out of numbers. For example, imagine that you group logical pages
    in sets of 10\. What happens when you have 11 pages in a group? Of course, a workaround
    is to create large intervals for each logical page group, but even so you may
    run into a situation where a page doesn’t conform to your numbering standards.


    Note


    You can also use page groups for purposes other than in the development environment.
    Suppose you grouped all the admin pages into an Admin page group. If you had a
    Global Page region that you wanted to appear only on admin pages, you could add
    a condition to check that the current page was associated with the Admin page
    group.


    To create and manage page groups, from the Application page in APEX go to Utilities
    ➤ Page Specific Utilities ➤ Page Groups. On the Page Groups page, you can create
    and assign page groups in a way similar to how you created application groups
    in the previous section.


    ## APEX Views and the APEX Dictionary


    In traditional web development tools, if you need to search through all your code,
    you must comb through multiple text files. APEX is different because it stores
    code in the database. Thus, you can run queries to search through your code.'
  trans: '### 锁定 APEX 页面


    在开发由多名开发人员参与的应用程序时，防止问题发生的最简单方法是在处理某个页面之前将其锁定。锁定页面可以防止其他开发人员在您处理该页面时对其进行修改。页面锁定期间，其他开发人员仍可以查看页面及其组件；他们只是无法对页面进行任何修改。


    锁定页面的过程如下：


    在页面设计器中，单击页面设计器工具栏中的“锁定”图标，如图 13-1 所示。


    ![A978-1-4842-0466-5_13_Fig1_HTML.jpg](img/A978-1-4842-0466-5_13_Fig1_HTML.jpg)


    图 13-1。


    锁定页面。您将看到一个弹出对话框，允许您输入评论或锁定页面的原因。为“注释”输入一个值（所有页面锁定都需要注释）并单击“锁定”。对话框将被关闭，锁定图标将变为实心绿色并带有一个闭合的锁。


    输入有意义的页面锁定注释很重要，因为系统会维护页面锁定的历史记录。如果您使用案例管理工具，在锁定页面时引用您正在处理的案例编号是明智的。


    如果另一位开发人员查看一个已锁定的页面，他们会看到锁定图标显示为实心红色并带有一个闭合的锁。单击锁定图标将打开一个弹出对话框，显示谁锁定了页面以及他们当时输入的注释。图
    13-2 显示了一个已锁定页面和弹出对话框的示例。


    ![A978-1-4842-0466-5_13_Fig2_HTML.jpg](img/A978-1-4842-0466-5_13_Fig2_HTML.jpg)


    图 13-2。


    已锁定页面


    ### 解锁页面


    只有 APEX 管理员、工作区管理员以及锁定页面的开发人员才能解锁它。如果您是锁定页面的开发人员，以下过程演示了如何解锁它：


    转到锁定的页面（前一个示例中的页面 1），然后单击页面设计器工具栏中的“锁定”图标。您将看到显示当前锁定注释的弹出对话框。从这里，您可以更改注释并保存更改，也可以单击“解锁”按钮来解锁页面。


    ### 管理页面锁定


    开发人员可能希望查看所有已锁定的页面，或者可能希望同时锁定/解锁多个页面。APEX 提供了处理多个页面锁定请求的工具。要查看“页面锁定”报告，请在页面设计器工具栏中转到“实用程序”
    ➤ “跨页面实用程序”，然后选择“页面锁定”，如图 13-3 所示。


    ![A978-1-4842-0466-5_13_Fig3_HTML.jpg](img/A978-1-4842-0466-5_13_Fig3_HTML.jpg)


    图 13-3。


    页面锁定报告


    从“页面锁定”报告中，您可以查看所有已锁定和已解锁的页面。您可以从此报告中锁定和解锁多个页面。工作区管理员可以解锁任何页面，但开发人员只能解锁他们自己锁定的页面。开发人员还可以通过单击“查看锁定”图标（看起来像一个放大镜）来查看每个页面的锁定历史记录。


    注意


    当应用程序被复制或导出时，页面锁定不会在新版本中保留。这意味着任何页面锁定和注释历史记录仅与工作区中的特定应用程序相关。如果您将应用程序复制到另一个工作区，新副本中没有任何页面被锁定。


    ## 应用程序和页面组


    开发大型 APEX 应用程序可能需要您对应用程序和页面进行分组。APEX 允许您以声明方式对应用程序以及应用程序中的页面进行分组。对页面和应用程序进行分组可以帮助您避免采用严格的应用程序和页面命名及编号方案。


    ### 应用程序组


    当工作区中有多个应用程序时，您可能希望将相关的应用程序分组，以帮助开发人员直观地了解哪些应用程序是相关的。例如，假设您开发了一个由三个模块组成的大型 CRM
    系统：市场营销、服务和销售。出于各种原因，您可能希望将每个模块创建为其自己的应用程序，并有一个链接这些应用程序的公共管理模块。


    如果您的工作区包含其他成套的应用程序，开发人员可能会对他们正在处理的套件感到困惑。要解决此问题，您可以创建应用程序组。以下是创建应用程序组的过程：


    导航到应用程序构建器。单击工作区实用程序图标。从工作区实用程序菜单中单击“应用程序组”选项。单击“创建”按钮。为组输入“名称”和“描述”值。在此示例中，使用
    `CRM`。单击“创建”。


    以下步骤演示了如何将各个应用程序添加到应用程序组：


    在“应用程序组”页面上，单击“任务”区域右侧的“管理未分配”链接。在“新建组”选择列表中选择组，然后通过选中复选框来选择应用程序。单击“分配已勾选项目”按钮，如图
    13-4 所示。


    ![A978-1-4842-0466-5_13_Fig4_HTML.jpg](img/A978-1-4842-0466-5_13_Fig4_HTML.jpg)


    图 13-4。


    分配应用程序组。转到应用程序构建器主页，以报告格式查看应用程序。您可以使用“操作”菜单将“组”列添加到报告中。这使您可以查看应用程序列表及其应用程序组，如图
    13-5 所示。


    ![A978-1-4842-0466-5_13_Fig5_HTML.jpg](img/A978-1-4842-0466-5_13_Fig5_HTML.jpg)


    图 13-5。


    应用程序报告


    ### 页面组


    页面组与应用程序组类似，不同之处在于它们将页面分组在一起。它们特定于应用程序，这意味着页面组仅对特定应用程序有效。页面组对于帮助对应用程序中的常见页面进行分组非常有用。


    使用页面组的另一种方法是使用编号方案将页面分组在一起。然而，页面编号方法可能并不总是有效，因为您可能会用完编号。例如，假设您将逻辑页面按 10 个一组进行分组。当一个组中有
    11 个页面时会发生什么？当然，解决方法是为每个逻辑页面组创建较大的间隔，但即便如此，您也可能会遇到页面不符合您的编号标准的情况。


    注意


    您还可以将页面组用于开发环境以外的目的。假设您将所有管理页面分组到一个“管理”页面组中。如果您有一个希望仅在管理页面上显示的“全局页面”区域，则可以添加一个条件来检查当前页面是否与“管理”页面组相关联。


    要创建和管理页面组，请从 APEX 中的“应用程序”页面转到“实用程序” ➤ “页面特定实用程序” ➤ “页面组”。在“页面组”页面上，您可以以类似于上一节创建应用程序组的方式创建和分配页面组。


    ## APEX 视图和 APEX 字典


    在传统的 Web 开发工具中，如果您需要搜索所有代码，必须梳理多个文本文件。APEX 则不同，因为它将代码存储在数据库中。因此，您可以运行查询来搜索代码。'
- fmt: "## The APEX Schema\n\nA common misconception about APEX is that it’s an extra\
    \ piece of software that you need to install. In fact, APEX is a framework that\
    \ is stored in a schema in the database. At a very high level, each time you request\
    \ a page, APEX queries the tables in its schema and executes many invocations\
    \ of the `HTP.P` procedure to produce the HTML that is sent to the browser.\n\n\
    Each time you create an object in APEX, it’s stored in a table in the APEX schema.\
    \ For example, when you create a page item, it’s stored in the `APEX_050000.WWV_FLOW_STEP_ITEMS`\
    \ table.\n\n**Note**\n\nAs mentioned in [Chapter 1](#A978-1-4842-0466-5_1_Chapter.html),\
    \ APEX was originally called FLOWS, and pages were originally called STEPS, which\
    \ is why some of the table names contain these references.\n\nStoring code in\
    \ the database has advantages and disadvantages. An advantage is that you can\
    \ query the database to quickly find what you’re looking for in an organized fashion.\
    \ For example, you can easily search through all your reports for a certain table\
    \ or column reference. A disadvantage is that it’s harder to search through all\
    \ the objects in an APEX application at the same time. At last count, the `APEX_050000`\
    \ schema has over 450 tables. Searching through an entire application is easier\
    \ in file-based web applications, because you can do a simple text search.\n\n\
    ## APEX Views\n\nThe APEX views give the developer visibility into the metadata\
    \ that makes up the applications in the current workspace. There are several ways\
    \ to access the data from these views. This section will discuss how to use these\
    \ views to search in the APEX development environment.\n\nTo access the APEX views\
    \ in the development environment, navigate to the Application Builder home page\
    \ and then go to Workspace Utilities ➤ Application Express Views. If you’re new\
    \ to APEX, we recommend that you change the default view mode to View Report,\
    \ which provides a detailed description of each of the reports (see Figure [13-6](#A978-1-4842-0466-5_13_Chapter.html#Fig6)).\n\
    \n![A978-1-4842-0466-5_13_Fig6_HTML.jpg](A978-1-4842-0466-5_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6. APEX views\n\nThe following example demonstrates how the APEX views\
    \ can assist you. Suppose you need to compare the help text for items that reference\
    \ `PRODUCT_ID`. Follow these steps to do this:\n\n1.  Go to Workspace Utilities\
    \ ➤ Application Express Views.\n2.  Click the `APEX_APPLICATION_PAGE_ITEMS` view.\
    \ You may need to search for this view in the interactive report or navigate to\
    \ the next page.\n3.  On the Select Columns screen, add `ITEM_NAME` and `ITEM_HELP_TEXT`\
    \ to the Selected column and click the Filter button, as shown in Figure [13-7](#A978-1-4842-0466-5_13_Chapter.html#Fig7).\n\
    \n![A978-1-4842-0466-5_13_Fig7_HTML.jpg](A978-1-4842-0466-5_13_Fig7_HTML.jpg)\n\
    \nFigure 13-7. Select Columns view\n\n4.  On the Filter page, select `ITEM_NAME`\
    \ for Column, select `LIKE` for Condition, and enter `'%TICKET_ID%'` for Value,\
    \ and click the Results button, as shown in Figure [13-8](#A978-1-4842-0466-5_13_Chapter.html#Fig8).\
    \ It’s important to include the single-quote characters around your search value\
    \ just as you would in a SQL query.\n\n![A978-1-4842-0466-5_13_Fig8_HTML.jpg](A978-1-4842-0466-5_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8. Filter view\n\n5.  You should now see the list of all page items\
    \ in the workspace that have `TICKET_ID` as part of the item name. Based on these\
    \ results, you can modify the items that need to be changed. Because the report\
    \ shows all applications in the workspace, you may want to apply an additional\
    \ filter for a specific application.\n\nAlternatively, you can view the list of\
    \ APEX views as a tree by clicking the Tree View tab shown in Figure [13-9](#A978-1-4842-0466-5_13_Chapter.html#Fig9).\
    \ The tree view provides an excellent method of understanding how one view relates\
    \ to another. Once you click your desired view, you can continue with the process\
    \ just described to display the results.\n\n![A978-1-4842-0466-5_13_Fig9_HTML.jpg](A978-1-4842-0466-5_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9. Tree view\n\n## APEX Dictionary\n\nBecause all the data resides\
    \ in the database, you can reference the APEX views from SQL queries. As you become\
    \ more familiar with the APEX views, you may prefer to query them using SQL because\
    \ you can quickly apply predicates and you don’t need to use a web browser to\
    \ run reports.\n\nAPEX provides a view called `APEX_DICTIONARY` that lists all\
    \ the APEX views. The APEX Dictionary contains all the information that is available\
    \ in the developer GUI as well as descriptions for each of the columns. The following\
    \ query lists all the APEX views:\n\n```sql\nSELECT *\n  FROM apex_dictionary\n\
    \ WHERE column_id = 0\n```\n\nThere is a slight difference when querying the APEX\
    \ views in SQL compared to the GUI. When you use the developer GUI, only applications\
    \ that reside in the workspace appear in results. When you query through SQL,\
    \ only applications whose parsing schema is the same as your connection appear\
    \ in results. If you connect as `SYS`, `SYSTEM`, or a user who has been granted\
    \ the `APEX_ADMINISTRATOR_ROLE`, you can view all the applications regardless\
    \ of the application’s parsing schema.\n\nIn the previous section, the example\
    \ described how to look at all the help text for items with `TICKET_ID` in their\
    \ name. You can view the same set of results by running the following query:\n\
    \n```sql\nSELECT workspace,\n       application_id,\n       application_name,\n\
    \       page_id,\n       page_name,\n       item_name,\n       item_help_text\n\
    \  FROM apex_application_page_items\n WHERE item_name LIKE '%TICKET_ID%'\n```\n\
    \nSearching isn’t the only use for the APEX views. You may also need to use the\
    \ APEX views when you’re creating plug-ins or adding advanced features to an application.\n\
    \n## Searching in APEX\n\nThe previous section examined how to use the APEX views\
    \ to search for items in your application. In this section, you will learn alternative\
    \ ways to search through an application.\n\n### APEX Finder\n\nAPEX provides a\
    \ tool in the application that provides some reports that use the APEX views on\
    \ common APEX objects. To access the APEX Finder, navigate to any application’s\
    \ main edit page (the one where APEX shows you the list of all pages in the application).\
    \ On this page, click the Find icon (which looks like a flashlight and is located\
    \ in the upper-right corner), as shown in Figure [13-10](#A978-1-4842-0466-5_13_Chapter.html#Fig10).\n\
    \n![A978-1-4842-0466-5_13_Fig10_HTML.jpg](A978-1-4842-0466-5_13_Fig10_HTML.jpg)\n\
    \nFigure 13-10. Find icon\n\nClicking the Find icon opens a pop-up window that\
    \ contains interactive reports for the following object types:\n\n*   Application\
    \ and page items\n*   Pages\n*   SQL queries from report regions\n*   Database\
    \ tables in the parsing schema\n*   PL/SQL packages, functions, and procedures\
    \ in the parsing schema\n*   Images, including standard images, workspace images,\
    \ application images, and Font Awesome icons\n*   A list of debug log entries\n\
    *   Application items, page items, and collections and their values in the current\
    \ session\n*   A list of errors that have occurred in this application at both\
    \ the region and page levels\n\nThe APEX finder is helpful because it allows you\
    \ to quickly search for something while you’re in the Application Builder and\
    \ doesn’t require you to leave the page. If you need more complex searches or\
    \ filters, we recommend querying the APEX views."
  raw: '### The APEX Schema


    A common misconception about APEX is that it’s an extra piece of software that
    you need to install. In fact, APEX is a framework that is stored in a schema in
    the database. At a very high level, each time you request a page, APEX queries
    the tables in its schema and executes many invocations of the `HTP.P` procedure
    to produce the HTML that is sent to the browser.


    Each time you create an object in APEX, it’s stored in a table in the APEX schema.
    For example, when you create a page item, it’s stored in the `APEX_050000.WWV_FLOW_STEP_ITEMS`
    table.


    Note


    As mentioned in [Chapter 1](#A978-1-4842-0466-5_1_Chapter.html), APEX was originally
    called FLOWS, and pages were originally called STEPS, which is why some of the
    table names contain these references.


    Storing code in the database has advantages and disadvantages. An advantage is
    that you can query the database to quickly find what you’re looking for in an
    organized fashion. For example, you can easily search through all your reports
    for a certain table or column reference. A disadvantage is that it’s harder to
    search through all the objects in an APEX application at the same time. At last
    count, the `APEX_050000` schema has over 450 tables. Searching through an entire
    application is easier in file-based web applications, because you can do a simple
    text search.


    ### APEX Views


    The APEX views give the developer visibility into the metadata that makes up the
    applications in the current workspace. There are several ways to access the data
    from these views. This section will discuss how to use these views to search in
    the APEX development environment.


    To access the APEX views in the development environment, navigate to the Application
    Builder home page and then go to Workspace Utilities ➤ Application Express Views.
    If you’re new to APEX, we recommend that you change the default view mode to View
    Report, which provides a detailed description of each of the reports (see Figure
    [13-6](#A978-1-4842-0466-5_13_Chapter.html#Fig6)).


    ![A978-1-4842-0466-5_13_Fig6_HTML.jpg](A978-1-4842-0466-5_13_Fig6_HTML.jpg)


    Figure 13-6.


    APEX views


    The following example demonstrates how the APEX views can assist you. Suppose
    you need to compare the help text for items that reference PRODUCT_ID. Follow
    these steps to do this:


    Go to Workspace Utilities ➤ Application Express Views.   Click the APEX_APPLICATION_PAGE_ITEMS
    view. You may need to search for this view in the interactive report or navigate
    to the next page.   On the Select Columns screen, add `ITEM_NAME` and `ITEM_HELP_TEXT`
    to the Selected column and click the Filter button, as shown in Figure [13-7](#A978-1-4842-0466-5_13_Chapter.html#Fig7).


    ![A978-1-4842-0466-5_13_Fig7_HTML.jpg](A978-1-4842-0466-5_13_Fig7_HTML.jpg)


    Figure 13-7.


    Select Columns view   On the Filter page, select ITEM_NAME for Column, select
    LIKE for Condition, and enter `''%TICKET_ID%''` for Value, and click the Results
    button, as shown in Figure [13-8](#A978-1-4842-0466-5_13_Chapter.html#Fig8). It’s
    important to include the single-quote characters around your search value just
    as you would in a SQL query.


    ![A978-1-4842-0466-5_13_Fig8_HTML.jpg](A978-1-4842-0466-5_13_Fig8_HTML.jpg)


    Figure 13-8.


    Filter view   You should now see the list of all page items in the workspace that
    have TICKET_ID as part of the item name. Based on these results, you can modify
    the items that need to be changed. Because the report shows all applications in
    the workspace, you may want to apply an additional filter for a specific application.
     


    Alternatively, you can view the list of APEX views as a tree by clicking the Tree
    View tab shown in Figure [13-9](#A978-1-4842-0466-5_13_Chapter.html#Fig9). The
    tree view provides an excellent method of understanding how one view relates to
    another. Once you click your desired view, you can continue with the process just
    described to display the results.


    ![A978-1-4842-0466-5_13_Fig9_HTML.jpg](A978-1-4842-0466-5_13_Fig9_HTML.jpg)


    Figure 13-9.


    Tree view


    ### APEX Dictionary


    Because all the data resides in the database, you can reference the APEX views
    from SQL queries. As you become more familiar with the APEX views, you may prefer
    to query them using SQL because you can quickly apply predicates and you don’t
    need to use a web browser to run reports.


    APEX provides a view called `APEX_DICTIONARY` that lists all the APEX views. The
    APEX Dictionary contains all the information that is available in the developer
    GUI as well as descriptions for each of the columns. The following query lists
    all the APEX views:


    `SELECT *`


      `FROM apex_dictionary`


    `WHERE column_id = 0`


    There is a slight difference when querying the APEX views in SQL compared to the
    GUI. When you use the developer GUI, only applications that reside in the workspace
    appear in results. When you query through SQL, only applications whose parsing
    schema is the same as your connection appear in results. If you connect as `SYS`,
    `SYSTEM`, or a user who has been granted the `APEX_ADMINISTRATOR_ROLE`, you can
    view all the applications regardless of the application’s parsing schema.


    In the previous section, the example described how to look at all the help text
    for items with TICKET_ID in their name. You can view the same set of results by
    running the following query:


    `SELECT workspace,`


           `application_id,`


           `application_name,`


           `page_id,`


           `page_name,`


           `item_name,`


           `item_help_text`


      `FROM apex_application_page_items`


    `WHERE item_name LIKE ''%TICKET_ID%''`


    Searching isn’t the only use for the APEX views. You may also need to use the
    APEX views when you’re creating plug-ins or adding advanced features to an application.


    ## Searching in APEX


    The previous section examined how to use the APEX views to search for items in
    your application. In this section, you will learn alternative ways to search through
    an application


    ### APEX Finder


    APEX provides a tool in the application that provides some reports that use the
    APEX views on common APEX objects. To access the APEX Finder, navigate to any
    application’s main edit page (the one where APEX shows you the list of all pages
    in the application). On this page, click the Find icon (which looks like a flashlight
    and is located in the upper-right corner), as shown in Figure [13-10](#A978-1-4842-0466-5_13_Chapter.html#Fig10).


    ![A978-1-4842-0466-5_13_Fig10_HTML.jpg](A978-1-4842-0466-5_13_Fig10_HTML.jpg)


    Figure 13-10.


    Find icon


    Clicking the Find icon opens a pop-up window that contains interactive reports
    for the following object types:


    *   Application and page items

    *   Pages

    *   SQL queries from report regions

    *   Database tables in the parsing schema

    *   PL/SQL packages, functions, and procedures in the parsing schema

    *   Images, including standard images, workspace images, application images, and
    Font Awesome icons

    *   A list of debug log entries

    *   Application items, page items, and collections and their values in the current
    session

    *   A list of errors that have occurred in this application at both the region
    and page levels


    The APEX finder is helpful because it allows you to quickly search for something
    while you’re in the Application Builder and doesn’t require you to leave the page.
    If you need more complex searches or filters, we recommend querying the APEX views.'
  trans: "## APEX 模式\n\n关于 APEX 的一个常见误解是，它是一个需要额外安装的软件。实际上，AEX 是一个存储在数据库**模式**中的框架。从很高的层面来看，每次你请求一个页面时，APEX\
    \ 都会查询其模式中的表，并多次调用 `HTP.P` 过程来生成发送到浏览器的 HTML。\n\n每次你在 APEX 中创建一个对象，它都会被存储在 APEX\
    \ 模式的一个表中。例如，当你创建一个页面项时，它会被存储在 `APEX_050000.WWV_FLOW_STEP_ITEMS` 表中。\n\n**注意**\n\
    \n如第 1 章所述，APEX 最初被称为 FLOWS，而页面最初被称为 STEPS，这就是为什么一些表名中包含这些引用。\n\n将代码存储在数据库中有优点也有缺点。优点是你可以查询数据库，以有组织的方式快速找到所需内容。例如，你可以轻松地在所有报表中搜索某个特定的表或列引用。缺点是同时搜索\
    \ APEX 应用程序中的所有对象会更困难。据最近统计，`APEX_050000` 模式拥有超过 450 张表。在基于文件的 Web 应用程序中搜索整个应用程序会更容易，因为你可以进行简单的文本搜索。\n\
    \n## APEX 视图\n\nAPEX 视图让开发者能够查看构成当前工作区中应用程序的元数据。有几种方法可以访问这些视图中的数据。本节将讨论如何在 APEX\
    \ 开发环境中使用这些视图进行搜索。\n\n要在开发环境中访问 APEX 视图，请导航到应用程序构建器主页，然后转到 **工作区实用程序 ➤ Application\
    \ Express 视图**。如果你是 APEX 新手，我们建议你将默认视图模式更改为**视图报表**，它会提供每个报表的详细描述（见图 13-6）。\n\n\
    ![A978-1-4842-0466-5_13_Fig6_HTML.jpg](img/A978-1-4842-0466-5_13_Fig6_HTML.jpg)\n\
    \n图 13-6. APEX 视图\n\n以下示例演示了 APEX 视图如何帮助你。假设你需要比较引用 `PRODUCT_ID` 的项的帮助文本。请按以下步骤操作：\n\
    \n1.  转到 **工作区实用程序 ➤ Application Express 视图**。\n2.  点击 `APEX_APPLICATION_PAGE_ITEMS`\
    \ 视图。你可能需要在交互式报表中搜索此视图，或导航到下一页。\n3.  在“选择列”屏幕上，将 `ITEM_NAME` 和 `ITEM_HELP_TEXT`\
    \ 添加到“选定列”中，然后点击“筛选器”按钮，如图 13-7 所示。\n\n![A978-1-4842-0466-5_13_Fig7_HTML.jpg](img/A978-1-4842-0466-5_13_Fig7_HTML.jpg)\n\
    \n图 13-7. 选择列视图\n\n4.  在“筛选器”页面上，为“列”选择 `ITEM_NAME`，为“条件”选择 `LIKE`，为“值”输入 `'%TICKET_ID%'`，然后点击“结果”按钮，如图\
    \ 13-8 所示。重要的是要像在 SQL 查询中一样，在你的搜索值周围包含单引号字符。\n\n![A978-1-4842-0466-5_13_Fig8_HTML.jpg](img/A978-1-4842-0466-5_13_Fig8_HTML.jpg)\n\
    \n图 13-8. 筛选器视图\n\n5.  你现在应该能看到工作区中所有项名包含 `TICKET_ID` 的页面项列表。根据这些结果，你可以修改需要更改的项。因为报表显示的是工作区中的所有应用程序，你可能希望为特定应用程序应用额外的筛选器。\n\
    \n或者，你可以通过点击图 13-9 所示的“树视图”选项卡，以树状结构查看 APEX 视图列表。树视图提供了一种极好的方法来理解视图之间的关系。点击你想要的视图后，你可以继续按照上述过程来显示结果。\n\
    \n![A978-1-4842-0466-5_13_Fig9_HTML.jpg](img/A978-1-4842-0466-5_13_Fig9_HTML.jpg)\n\
    \n图 13-9. 树视图\n\n## APEX 字典\n\n因为所有数据都驻留在数据库中，你可以在 SQL 查询中引用 APEX 视图。随着你对 APEX\
    \ 视图越来越熟悉，你可能更喜欢使用 SQL 来查询它们，因为你可以快速应用谓词，并且不需要使用 Web 浏览器来运行报表。\n\nAPEX 提供了一个名为\
    \ `APEX_DICTIONARY` 的视图，它列出了所有 APEX 视图。APEX 字典包含了开发者 GUI 中可用的所有信息以及每个列的描述。以下查询列出了所有\
    \ APEX 视图：\n\n```sql\nSELECT *\n  FROM apex_dictionary\n WHERE column_id = 0\n\
    ```\n\n在 SQL 中查询 APEX 视图与在 GUI 中查询略有不同。当你使用开发者 GUI 时，只有驻留在工作区中的应用程序会出现在结果中。当你通过\
    \ SQL 查询时，只有解析模式与你连接模式相同的应用程序会出现在结果中。如果你以 `SYS`、`SYSTEM` 或被授予了 `APEX_ADMINISTRATOR_ROLE`\
    \ 的用户身份连接，你可以查看所有应用程序，无论其解析模式如何。\n\n在上一节中，示例描述了如何查看名称中包含 `TICKET_ID` 的项的所有帮助文本。你可以通过运行以下查询来查看相同的结果集：\n\
    \n```sql\nSELECT workspace,\n       application_id,\n       application_name,\n\
    \       page_id,\n       page_name,\n       item_name,\n       item_help_text\n\
    \  FROM apex_application_page_items\n WHERE item_name LIKE '%TICKET_ID%'\n```\n\
    \n搜索并不是 APEX 视图的唯一用途。当你创建插件或向应用程序添加高级功能时，也可能需要使用 APEX 视图。\n\n## 在 APEX 中搜索\n\n\
    上一节探讨了如何使用 APEX 视图在应用程序中搜索项。在本节中，你将学习在应用程序中搜索的其他方法。\n\n### APEX 查找器\n\nAPEX 在应用程序中提供了一个工具，该工具包含一些针对常见\
    \ APEX 对象使用 APEX 视图的报表。要访问 APEX 查找器，请导航到任何应用程序的主编辑页面（即 APEX 显示应用程序中所有页面列表的页面）。在此页面上，点击“查找”图标（看起来像一个手电筒，位于右上角），如图\
    \ 13-10 所示。\n\n![A978-1-4842-0466-5_13_Fig10_HTML.jpg](img/A978-1-4842-0466-5_13_Fig10_HTML.jpg)\n\
    \n图 13-10. 查找图标\n\n点击“查找”图标会打开一个弹出窗口，其中包含针对以下对象类型的交互式报表：\n\n*   应用程序和页面项\n*  \
    \ 页面\n*   报表区域的 SQL 查询\n*   解析模式中的数据库表\n*   解析模式中的 PL/SQL 包、函数和过程\n*   图像，包括标准图像、工作区图像、应用程序图像和\
    \ Font Awesome 图标\n*   调试日志条目列表\n*   当前会话中的应用程序项、页面项、集合及其值\n*   此应用程序中在区域和页面级别发生过的错误列表\n\
    \nAPEX 查找器很有帮助，因为它允许你在使用应用程序构建器时快速搜索内容，而无需离开当前页面。如果你需要更复杂的搜索或筛选器，我们建议你查询 APEX\
    \ 视图。"
- fmt: "### Search Application\n\nThe APEX Views Utility, which queries against the\
    \ APEX views, and the APEX finder are good tools if you know exactly what you’re\
    \ searching for in an object type. For example, if you want to see whether a particular\
    \ table was referenced in a query, then you can search the `APEX_APPLICATION_PAGE_REGIONS`\
    \ view for the table name in the `REGION_SOURCE` column.\n\nWhat if you want to\
    \ search an entire application to see whether it references a specific table?\
    \ Suppose, for example, that you rename the `TICKETS` table to `ISSUES`. How can\
    \ you easily search your entire application for any reference to `TICKETS`? The\
    \ answer is to use a feature called Search Application, which searches through\
    \ the entire application.\n\nTo search the entire application, enter your search\
    \ criteria in the Search Application field by clicking the Magnifying Glass icon\
    \ (located in the upper-right corner—see Figure [13-10](#A978-1-4842-0466-5_13_Chapter.html#Fig10)).\
    \ Figure [13-11](#A978-1-4842-0466-5_13_Chapter.html#Fig11) shows the detailed\
    \ results of all occurrences of `TICKETS` in the application. For each result,\
    \ a link is provided to the exact location of the result. Using the Search Application\
    \ feature, you can easily find all references to the `TICKETS` table and replace\
    \ them with `ISSUES`.\n\n![A978-1-4842-0466-5_13_Fig11_HTML.jpg](A978-1-4842-0466-5_13_Fig11_HTML.jpg)\n\
    Figure 13-11. APEX Search Application results\n\nThe problem with the results\
    \ in Figure [13-11](#A978-1-4842-0466-5_13_Chapter.html#Fig11) is that they contain\
    \ results for all text that contains `TICKETS`. This includes labels, HTML, and\
    \ so on. Although this may not seem like a problem, consider searching for the\
    \ `EMP` table. Your results might contain things such as template, employee, empno,\
    \ and more. Because you only want references to the table with respect to SQL\
    \ queries and PL/SQL blocks, you might want to exclude all occurrences of your\
    \ search where its previous or next character is alphanumeric.\n\nRegular expressions,\
    \ which are supported by the APEX Search Application tool, can be used to accomplish\
    \ this. The search criteria must be prefixed with `regexp:` in order to use regular\
    \ expressions. Figure [13-12](#A978-1-4842-0466-5_13_Chapter.html#Fig12) shows\
    \ Search Application when a regular expression is used to filter out occurrences\
    \ of `emp` where its previous or next character is alphanumeric. To learn more\
    \ about regular expressions and Oracle’s implementation of them, refer to the\
    \ Oracle database documentation. Look in particular at the SQL Reference manual.\n\
    \n![A978-1-4842-0466-5_13_Fig12_HTML.jpg](A978-1-4842-0466-5_13_Fig12_HTML.jpg)\n\
    Figure 13-12. APEX search using a regular expression\n\n### Monitoring Your APEX\
    \ Application\n\nAPEX can log each page access and login attempt. Logging is an\
    \ excellent feature to enable, because it allows you to monitor your application\
    \ and provides a way to help reduce errors and improve performance. This section\
    \ will show you how to enable logging, some uses for the activity log, and how\
    \ to view all login attempts.\n\n### Enabling Logging\n\nBy default, logging is\
    \ enabled when you create an application. To verify that logging is enabled for\
    \ your application, go to Shared Components and click the Application Definition\
    \ Attributes link in the Application Logic region at the top left. In the Properties\
    \ section is a Logging option, as shown in Figure [13-13](#A978-1-4842-0466-5_13_Chapter.html#Fig13).\
    \ Ensure that it says Yes and click the Apply Changes button.\n\n![A978-1-4842-0466-5_13_Fig13_HTML.jpg](A978-1-4842-0466-5_13_Fig13_HTML.jpg)\n\
    Figure 13-13. Enabling logging\n\nFor an application that has many page hits,\
    \ you may want to disable logging, as it can slow down the application. Most applications\
    \ don’t have this issue, but it’s important to know that the problem might occur.\n\
    \nNote\nLogs are stored in underlying APEX-owned tables and are purged at regular\
    \ intervals. The default is to keep logs for 14 days before they’re purged, but\
    \ an instance administrator can increase this value to 180 days. It’s recommended\
    \ that if you wish to retain this data for longer periods, you set up a nightly\
    \ job to copy it to your own schemas. An example of storing a local, permanent,\
    \ log history is shown in the blog post at [`www.talkapex.com/2009/05/apex-logs-storing-log-data.html`](http://www.talkapex.com/2009/05/apex-logs-storing-log-data.html).\n\
    \n### Using the Activity Logs\n\nEach time a page is accessed, a log entry is\
    \ stored. You can reference it from the `APEX_WORKSPACE_ACTIVITY_LOG` view. A\
    \ good example of how to mine the activity log is to search for errors in an application.\
    \ No matter how hard you try, unhandled errors occur. Instead of waiting for users\
    \ to report these errors (assuming that they even report errors), you can take\
    \ a proactive approach. The following query identifies when an error occurs at\
    \ the page or region levels:\n\n```sql\nSELECT *\n  FROM apex_workspace_activity_log\n\
    \ WHERE error_message IS NOT NULL\n```\n\nOnce an application has been running\
    \ for a while, you may notice that some pages are accessed more often than others\
    \ and some pages aren’t performing as desired. The following queries identify\
    \ these two cases:\n\n```sql\n-- Find most accessed pages\n  SELECT application_id,\n\
    \         application_name,\n         page_id,\n         page_name,\n        \
    \ SUM (page_id) AS page_hit_count\n    FROM apex_workspace_activity_log\nGROUP\
    \ BY application_id,\n         application_name,\n         page_id,\n        \
    \ page_name\nORDER BY SUM (page_id) DESC\n```\n\n```sql\n-- Find slowest pages\n\
    -- Note: This depends on how you calculate slow\n  SELECT application_id,\n  \
    \       application_name,\n         page_id,\n         page_name,\n         ROUND\
    \ (AVG (elapsed_time), 5) AS avg_elapsed_time,\n         SUM (page_id) AS page_hit_count,\n\
    \         MEDIAN (elapsed_time) AS median_elapsed_time\n    FROM apex_workspace_activity_log\n\
    GROUP BY application_id,\n         application_name,\n         page_id,\n    \
    \     page_name\nORDER BY 5 DESC\n```\n\nBy identifying the most-accessed pages,\
    \ you can focus your attention on trying to speed them up. Slow pages may require\
    \ tuning, but if they’re accessed infrequently, you may not need to spend a lot\
    \ of time on them.\n\nHere are some other examples of uses for the activity log:\n\
    \n*   Top browsers: If you build your application to support Firefox and IE and\
    \ then find that half your users are using Chrome, you may want to invest some\
    \ time ensuring that your application supports Chrome.\n*   The time frame when\
    \ people are using your application: This gives you an idea of the best time for\
    \ maintenance and upgrades. You can also derive the peak usage times.\n*   Search\
    \ criteria in interactive reports: If there is a consistent search pattern, perhaps\
    \ you need a better report or preset filters.\n\n### Login Attempts\n\nThe `APEX_WORKSPACE_ACCESS_LOG`\
    \ stores all the login attempts to your APEX applications. The access log can\
    \ be extremely useful when you’re debugging user-authentication issues.\n\nAn\
    \ example of utilizing the access log is to monitor invalid login attempts. When\
    \ a user attempts to log in with invalid credentials, it’s not recommended that\
    \ you display the exact reason why their login attempt failed. You don’t want\
    \ to tell the user the exact reason, because it could reveal valuable information,\
    \ such as whether the user exists. It may still be important for your operations\
    \ team to know why a user wasn’t able to log in, in case they need to resolve\
    \ the issue. Because all login attempts are stored in the access log, for a failed\
    \ login attempt you can see exactly why a user wasn’t able to log in.\n\nNote\n\
    If you create your own authentication process, you should use the `APEX_UTIL.SET_AUTHENTICATION_RESULT`\
    \ and `APEX_UTIL.SET_CUSTOM_AUTH_STATUS` procedures to ensure that you populate\
    \ the access log with meaningful messages. For more information on these authentication\
    \ procedures, please read the APEX API documentation."
  raw: '### Search Application


    The APEX Views Utility, which queries against the APEX views, and the APEX finder
    are good tools if you know exactly what you’re searching for in an object type.
    For example, if you want to see whether a particular table was referenced in a
    query, then you can search the `APEX_APPLICATION_PAGE_REGIONS` view for the table
    name in the `REGION_SOURCE` column.


    What if you want to search an entire application to see whether it references
    a specific table? Suppose, for example, that you rename the `TICKETS` table to
    `ISSUES`. How can you easily search your entire application for any reference
    to `TICKETS`? The answer is to use a feature called Search Application, which
    searches through the entire application.


    To search the entire application, enter your search criteria in the Search Application
    field by clicking the Magnifying Glass icon (located in the upper-right corner—see
    Figure [13-10](#A978-1-4842-0466-5_13_Chapter.html#Fig10)). Figure [13-11](#A978-1-4842-0466-5_13_Chapter.html#Fig11)
    shows the detailed results of all occurrences of TICKETS in the application. For
    each result, a link is provided to the exact location of the result. Using the
    Search Application feature, you can easily find all references to the `TICKETS`
    table and replace them with `ISSUES`.


    ![A978-1-4842-0466-5_13_Fig11_HTML.jpg](A978-1-4842-0466-5_13_Fig11_HTML.jpg)


    Figure 13-11.


    APEX Search Application results


    The problem with the results in Figure [13-11](#A978-1-4842-0466-5_13_Chapter.html#Fig11)
    is that they contain results for all text that contains TICKETS. This includes
    labels, HTML, and so on. Although this may not seem like a problem, consider searching
    for the `EMP` table. Your results might contain things such as template, employee,
    empno, and more. Because you only want references to the table with respect to
    SQL queries and PL/SQL blocks, you might want to exclude all occurrences of your
    search where its previous or next character is alphanumeric.


    Regular expressions, which are supported by the APEX Search Application tool,
    can be used to accomplish this. The search criteria must be prefixed with `regexp:`
    in order to use regular expressions. Figure [13-12](#A978-1-4842-0466-5_13_Chapter.html#Fig12)
    shows Search Application when a regular expression is used to filter out occurrences
    of emp where its previous or next character is alphanumeric. To learn more about
    regular expressions and Oracle’s implementation of them, refer to the Oracle database
    documentation. Look in particular at the SQL Reference manual.


    ![A978-1-4842-0466-5_13_Fig12_HTML.jpg](A978-1-4842-0466-5_13_Fig12_HTML.jpg)


    Figure 13-12.


    APEX search using a regular expression


    ## Monitoring Your APEX Application


    APEX can log each page access and login attempt. Logging is an excellent feature
    to enable, because it allows you to monitor your application and provides a way
    to help reduce errors and improve performance. This section will show you how
    to enable logging, some uses for the activity log, and how to view all login attempts.


    ### Enabling Logging


    By default, logging is enabled when you create an application. To verify that
    logging is enabled for your application, go to Shared Components and click the
    Application Definition Attributes link in the Application Logic region at the
    top left. In the Properties section is a Logging option, as shown in Figure [13-13](#A978-1-4842-0466-5_13_Chapter.html#Fig13).
    Ensure that it says Yes and click the Apply Changes button.


    ![A978-1-4842-0466-5_13_Fig13_HTML.jpg](A978-1-4842-0466-5_13_Fig13_HTML.jpg)


    Figure 13-13.


    Enabling logging


    For an application that has many page hits, you may want to disable logging, as
    it can slow down the application. Most applications don’t have this issue, but
    it’s important to know that the problem might occur.


    Note


    Logs are stored in underlying APEX-owned tables and are purged at regular intervals.
    The default is to keep logs for 14 days before they’re purged, but an instance
    administrator can increase this value to 180 days. It’s recommended that if you
    wish to retain this data for longer periods, you set up a nightly job to copy
    it to your own schemas. An example of storing a local, permanent, log history
    is shown in the blog post at [`www.talkapex.com/2009/05/apex-logs-storing-log-data.html`](http://www.talkapex.com/2009/05/apex-logs-storing-log-data.html)
    .


    ### Using the Activity Logs


    Each time a page is accessed, a log entry is stored. You can reference it from
    the APEX_WORKSPACE_ACTIVITY_LOG view. A good example of how to mine the activity
    log is to search for errors in an application. No matter how hard you try, unhandled
    errors occur. Instead of waiting for users to report these errors (assuming that
    they even report errors), you can take a proactive approach. The following query
    identifies when an error occurs at the page or region levels:


    `SELECT *`


      `FROM apex_workspace_activity_log`


    `WHERE error_message IS NOT NULL`


    Once an application has been running for a while, you may notice that some pages
    are accessed more often than others and some pages aren’t performing as desired.
    The following queries identify these two cases:


    `-- Find most accessed pages`


      `SELECT application_id,`


             `application_name,`


             `page_id,`


             `page_name,`


             `SUM (page_id) AS page_hit_count`


        `FROM apex_workspace_activity_log`


    `GROUP BY application_id,`


             `application_name,`


             `page_id,`


             `page_name`


    `ORDER BY SUM (page_id) DESC`


    `-- Find slowest pages`


    `-- Note: This depends on how you calculate slow`


      `SELECT application_id,`


             `application_name,`


             `page_id,`


             `page_name,`


             `ROUND (AVG (elapsed_time), 5) AS avg_elapsed_time,`


             `SUM (page_id) AS page_hit_count,`


             `MEDIAN (elapsed_time) AS median_elapsed_time`


        `FROM apex_workspace_activity_log`


    `GROUP BY application_id,`


             `application_name,`


             `page_id,`


             `page_name`


    `ORDER BY 5 DESC`


    By identifying the most-accessed pages, you can focus your attention on trying
    to speed them up. Slow pages may require tuning, but if they’re accessed infrequently,
    you may not need to spend a lot of time on them.


    Here are some other examples of uses for the activity log:


    *   Top browsers: If you build your application to support Firefox and IE and
    then find that half your users are using Chrome, you may want to invest some time
    ensuring that your application supports Chrome.

    *   The time frame when people are using your application: This gives you an idea
    of the best time for maintenance and upgrades. You can also derive the peak usage
    times.

    *   Search criteria in interactive reports: If there is a consistent search pattern,
    perhaps you need a better report or preset filters.


    ### Login Attempts


    The APEX_WORKSPACE_ACCESS_LOG stores all the login attempts to your APEX applications.
    The access log can be extremely useful when you’re debugging user-authentication
    issues.


    An example of utilizing the access log is to monitor invalid login attempts. When
    a user attempts to log in with invalid credentials, it’s not recommended that
    you display the exact reason why their login attempt failed. You don’t want to
    tell the user the exact reason, because it could reveal valuable information,
    such as whether the user exists. It may still be important for your operations
    team to know why a user wasn’t able to log in, in case they need to resolve the
    issue. Because all login attempts are stored in the access log, for a failed login
    attempt you can see exactly why a user wasn’t able to log in.


    Note


    If you create your own authentication process, you should use the `APEX_UTIL.SET_AUTHENTICATION_RESULT`
    and `APEX_UTIL.SET_CUSTOM_AUTH_STATUS` procedures to ensure that you populate
    the access log with meaningful messages. For more information on these authentication
    procedures, please read the APEX API documentation.'
  trans: "### 搜索应用程序\n\n如果你确切知道自己要在对象类型中查找什么，那么 **APEX 视图实用程序**（用于查询 APEX 视图）和 **APEX\
    \ 查找器**都是不错的工具。例如，如果你想查看某个特定表是否在某个查询中被引用，你可以搜索 `APEX_APPLICATION_PAGE_REGIONS`\
    \ 视图中 `REGION_SOURCE` 列里是否包含该表名。\n\n但如果你想搜索整个应用程序，以查看它是否引用了某个特定的表呢？假设，例如，你将 `TICKETS`\
    \ 表重命名为 `ISSUES`。如何轻松地在整个应用程序中搜索所有对 `TICKETS` 的引用？答案是使用一个名为 **搜索应用程序** 的功能，它会在整个应用程序中进行搜索。\n\
    \n要搜索整个应用程序，请在“搜索应用程序”字段中输入你的搜索条件，方法是单击**放大镜**图标（位于右上角——参见图 13-10）。图 13-11 显示了应用程序中所有出现\
    \ `TICKETS` 的详细结果。每个结果都提供了一个指向结果确切位置的链接。使用“搜索应用程序”功能，你可以轻松找到所有对 `TICKETS` 表的引用，并将其替换为\
    \ `ISSUES`。\n\n![A978-1-4842-0466-5_13_Fig11_HTML.jpg](img/A978-1-4842-0466-5_13_Fig11_HTML.jpg)\n\
    图 13-11. APEX 搜索应用程序结果\n\n图 13-11 中结果的问题在于，它们包含了所有包含 `TICKETS` 的文本的结果。这包括标签、HTML\
    \ 等。虽然这看起来可能不是问题，但试想一下搜索 `EMP` 表的情况。你的结果可能包含诸如 template、employee、empno 等内容。由于你只想查找与\
    \ SQL 查询和 PL/SQL 块相关的表引用，你可能希望排除那些前一个或后一个字符是字母数字的搜索结果。\n\n正则表达式（APEX 搜索应用程序工具支持）可以用来实现这一点。搜索条件必须加上\
    \ `regexp:` 前缀才能使用正则表达式。图 13-12 展示了当使用正则表达式过滤掉其前一个或后一个字符是字母数字的 `emp` 出现时的“搜索应用程序”。要了解更多关于正则表达式以及\
    \ Oracle 对其实现的信息，请参阅 Oracle 数据库文档，特别是 SQL 参考手册。\n\n![A978-1-4842-0466-5_13_Fig12_HTML.jpg](img/A978-1-4842-0466-5_13_Fig12_HTML.jpg)\n\
    图 13-12. 使用正则表达式的 APEX 搜索\n\n### 监控你的 APEX 应用程序\n\nAPEX 可以记录每一次页面访问和登录尝试。启用日志记录是一个极好的功能，因为它允许你监控应用程序，并提供了一种帮助减少错误和提高性能的方法。本节将向你展示如何启用日志记录、活动日志的一些用途以及如何查看所有登录尝试。\n\
    \n### 启用日志记录\n\n默认情况下，创建应用程序时会启用日志记录。要验证你的应用程序是否启用了日志记录，请转到“共享组件”，然后单击左上角“应用程序逻辑”区域中的“应用程序定义属性”链接。在“属性”部分有一个“日志记录”选项，如图\
    \ 13-13 所示。确保它显示为“是”，然后单击“应用更改”按钮。\n\n![A978-1-4842-0466-5_13_Fig13_HTML.jpg](img/A978-1-4842-0466-5_13_Fig13_HTML.jpg)\n\
    图 13-13. 启用日志记录\n\n对于一个拥有大量页面访问量的应用程序，你可能希望禁用日志记录，因为它会降低应用程序的速度。大多数应用程序没有这个问题，但重要的是要知道这个问题可能会发生。\n\
    \n> 注意\n> 日志存储在底层的 APEX 所有者表中，并会定期清除。默认情况下，日志在清除前会保留 14 天，但实例管理员可以将此值增加到 180 天。建议，如果你希望将这些数据保留更长时间，请设置一个夜间作业将其复制到你自己的模式中。在博文\
    \ [`www.talkapex.com/2009/05/apex-logs-storing-log-data.html`](http://www.talkapex.com/2009/05/apex-logs-storing-log-data.html)\
    \ 中展示了一个存储本地永久日志历史的示例。\n\n### 使用活动日志\n\n每次页面被访问时，都会存储一条日志条目。你可以从 `APEX_WORKSPACE_ACTIVITY_LOG`\
    \ 视图中引用它。挖掘活动日志的一个好例子是搜索应用程序中的错误。无论你多么努力，未处理的错误还是会发生。与其等待用户报告这些错误（假设他们确实会报告错误），你可以采取主动的方法。以下查询可识别在页面或区域级别发生的错误：\n\
    \n```sql\nSELECT *\n  FROM apex_workspace_activity_log\n WHERE error_message IS\
    \ NOT NULL\n```\n\n一旦应用程序运行了一段时间，你可能会注意到某些页面比其他页面访问得更频繁，并且某些页面的性能不如预期。以下查询可识别这两种情况：\n\
    \n```sql\n-- 查找访问量最大的页面\n  SELECT application_id,\n         application_name,\n\
    \         page_id,\n         page_name,\n         SUM (page_id) AS page_hit_count\n\
    \    FROM apex_workspace_activity_log\nGROUP BY application_id,\n         application_name,\n\
    \         page_id,\n         page_name\nORDER BY SUM (page_id) DESC\n```\n\n```sql\n\
    -- 查找加载最慢的页面\n-- 注意：这取决于你如何定义“慢”\n  SELECT application_id,\n         application_name,\n\
    \         page_id,\n         page_name,\n         ROUND (AVG (elapsed_time), 5)\
    \ AS avg_elapsed_time,\n         SUM (page_id) AS page_hit_count,\n         MEDIAN\
    \ (elapsed_time) AS median_elapsed_time\n    FROM apex_workspace_activity_log\n\
    GROUP BY application_id,\n         application_name,\n         page_id,\n    \
    \     page_name\nORDER BY 5 DESC\n```\n\n通过识别访问量最大的页面，你可以集中精力尝试加速它们。加载慢的页面可能需要调优，但如果它们访问频率不高，你可能不需要在上面花费太多时间。\n\
    \n以下是活动日志的其他一些用途示例：\n\n*   **热门浏览器**：如果你的应用程序设计为支持 Firefox 和 IE，然后发现一半的用户在使用 Chrome，你可能需要投入一些时间确保你的应用程序支持\
    \ Chrome。\n*   **用户使用应用程序的时间段**：这让你了解进行维护和升级的最佳时间。你还可以推导出使用的高峰时段。\n*   **交互式报表中的搜索条件**：如果存在一致的搜索模式，也许你需要一个更好的报表或预设过滤器。\n\
    \n### 登录尝试\n\n`APEX_WORKSPACE_ACCESS_LOG` 存储了所有登录你 APEX 应用程序的尝试记录。当你在调试用户认证问题时，访问日志会非常有用。\n\
    \n利用访问日志的一个例子是监控无效的登录尝试。当用户使用无效凭证尝试登录时，不建议显示其登录失败的确切原因。你不希望告诉用户确切的原因，因为它可能泄露有价值的信息，例如用户是否存在。对于你的运维团队来说，了解用户无法登录的原因可能仍然很重要，以防他们需要解决问题。由于所有登录尝试都存储在访问日志中，对于失败的登录尝试，你可以准确地看到用户无法登录的原因。\n\
    \n> 注意\n> 如果你创建了自己的认证过程，你应该使用 `APEX_UTIL.SET_AUTHENTICATION_RESULT` 和 `APEX_UTIL.SET_CUSTOM_AUTH_STATUS`\
    \ 过程，以确保你在访问日志中填充有意义的消息。有关这些认证过程的更多信息，请阅读 APEX API 文档。"
- fmt: "# APEX Advisor\n\nThe APEX Advisor is a tool that executes predefined checks\
    \ against an application. These validations can help reduce errors in your application\
    \ before it’s tested or goes into production.\n\nNote\n\nPrior to APEX 4, the\
    \ APEX Advisor was an open-source project developed by Patrick Wolf. During the\
    \ development of APEX 4.0, Patrick joined the APEX team at Oracle and included\
    \ the Advisor as a built-in tool. The open-source version of the APEX Advisor\
    \ is available at [`http://essentials.oracleapex.info/`](http://essentials.oracleapex.info/)\
    \ .\n\nTo use the Advisor, edit an application and from the main application menu\
    \ go to `Utilities ä Advisor`. Figure [13-14](#A978-1-4842-0466-5_13_Chapter.html#Fig14)\
    \ shows all the checks you can perform. Hovering over each validation displays\
    \ a brief description of the validation. You have the option to restrict the pages\
    \ that the Advisor reviews by defining a comma-delimited list of pages to search\
    \ for in the `Check Pages` region located at the bottom of the page. Once you\
    \ select the checks to perform, click the `Perform Check` button. The results\
    \ page provides a list of detailed issues that the Advisor finds plus links to\
    \ each of the objects.\n\n![A978-1-4842-0466-5_13_Fig14_HTML.jpg](A978-1-4842-0466-5_13_Fig14_HTML.jpg)\n\
    \nFigure 13-14. APEX Advisor options\n\nThe Advisor is an excellent tool to help\
    \ you detect issues before your application is deployed to end users. It’s still\
    \ important to have development standards and a release process to help prevent\
    \ issues. You should be aware that the Advisor might produce false positives in\
    \ response to some of the business rules in your organization, so you should analyze\
    \ each suggestion before fixing it.\n\n# Build Options\n\nBuild options let the\
    \ developer conditionally include or exclude certain features of the application\
    \ at runtime. Build options are either enabled or disabled for the entire application\
    \ and can only be changed in the Application Builder. This means they aren’t runtime\
    \ configuration options.\n\n## Understanding the Need\n\nSuppose you’re working\
    \ on a custom authentication scheme and you want to verify that the appropriate\
    \ authentication results and custom status messages are populating in the activity\
    \ log for invalid login attempts. Each time you attempt a login, you could switch\
    \ programs and run a query against `APEX_WORKSPACE_ACCESS_LOG`. This process might\
    \ get cumbersome, because you’d have to toggle between two applications. An alternate\
    \ solution is to create a report on the Login page to display the most recent\
    \ login attempts. After each bad login attempt, you can return to the Login page\
    \ and see an updated `Login Attempts` report.\n\nTo build this report on page\
    \ 101, the Login page, create a report with the following query:\n\n```sql\nSELECT\
    \ user_name,\n       authentication_method,\n       access_date,\n       authentication_result,\n\
    \       custom_status_text\n  FROM apex_workspace_access_log\n WHERE application_id\
    \ = :app_id\nORDER BY access_date DESC\n```\n\nThe Login page now looks like Figure\
    \ [13-15](#A978-1-4842-0466-5_13_Chapter.html#Fig15). The report allows you to\
    \ quickly see the authentication results when testing the login process.\n\n![A978-1-4842-0466-5_13_Fig15_HTML.jpg](A978-1-4842-0466-5_13_Fig15_HTML.jpg)\n\
    \nFigure 13-15. Login page with associated Login Attempts report\n\nOnce you’re\
    \ content that your custom authentication scheme is working, you would normally\
    \ delete the extra report region, because it’s only there for debugging purposes.\
    \ Deleting the region is counterproductive, however, because you may need it in\
    \ the future when you modify the authentication scheme.\n\n## Creating a Build\
    \ Option\n\nInstead of removing the region, you should tag it as a `Development\
    \ Only` object so it’s available only while you’re developing your application\
    \ rather than when you are running in production. Follow these steps to create\
    \ a build option to support this requirement:\n\n1. In the Application Builder\
    \ for the Help Desk application, go to `Shared Components` ➤ `Build Options` (under\
    \ Security) and click the `Create` button.\n2. Fill in each section as shown in\
    \ Figure [13-16](#A978-1-4842-0466-5_13_Chapter.html#Fig16) and click the `Create\
    \ Build Option` button.\n\nYou should now see a `Development Only` build option,\
    \ as shown in Figure [13-17](#A978-1-4842-0466-5_13_Chapter.html#Fig17).\n\n![A978-1-4842-0466-5_13_Fig17_HTML.jpg](A978-1-4842-0466-5_13_Fig17_HTML.jpg)\n\
    \nFigure 13-17. Development Only build option\n\n![A978-1-4842-0466-5_13_Fig16_HTML.jpg](A978-1-4842-0466-5_13_Fig16_HTML.jpg)\n\
    \nFigure 13-16. Creating a build option\n\n## Configuring Build Options\n\nBefore\
    \ you continue with this example, it’s important to review some of the options\
    \ seen in Figure [13-16](#A978-1-4842-0466-5_13_Chapter.html#Fig16). The status\
    \ values `Include` and `Exclude` can be misleading. Build options don’t affect\
    \ what is included in the application, just what is executed or displayed at runtime.\
    \ A better description of the status options would be enable/disable or on/off.\n\
    \nThe `Default on Export` option sets the default configuration of the build option\
    \ when the application is exported and then imported. For this example, because\
    \ you’re using the build option to handle development-only features, it makes\
    \ sense to always exclude the build option and require developers to explicitly\
    \ include it.\n\nIn some cases there’s no clear default option, so the person\
    \ installing the application must choose the appropriate build-option status.\
    \ You can configure a required choice as part of the application installation\
    \ script.\n\n## Prompting for Build Option Status\n\nTo configure the application\
    \ to prompt for a build option status during installation, go to `Supporting Objects`\
    \ ➤ `Build Options` in the Application Builder. Select `Development Only (Include)`\
    \ under `Prompt for Build Options` so as to prompt for the build option as part\
    \ of the installation (see Figure [13-18](#A978-1-4842-0466-5_13_Chapter.html#Fig18)),\
    \ then click the `Apply Changes` button.\n\n![A978-1-4842-0466-5_13_Fig18_HTML.jpg](A978-1-4842-0466-5_13_Fig18_HTML.jpg)\n\
    \nFigure 13-18. Build option installation configuration\n\nWhen installing the\
    \ application, the user will have the option to include the build option as shown\
    \ in Figure [13-19](#A978-1-4842-0466-5_13_Chapter.html#Fig19). Again, `include`\
    \ is a misleading term, because the build option will be included but will be\
    \ disabled unless you specifically choose to include it during installation of\
    \ the application.\n\n![A978-1-4842-0466-5_13_Fig19_HTML.jpg](A978-1-4842-0466-5_13_Fig19_HTML.jpg)\n\
    \nFigure 13-19. Build option prompt\n\n## Applying Build Options\n\nNow that you’ve\
    \ created and configured the `Development Only` build option, you need to apply\
    \ it to the region in question—the `Login Attempts` region on page 101:\n\n1.\
    \ Edit the `Login Attempts` region.\n2. In the Property Editor, scroll down to\
    \ the `Configuration` section.\n3. Select `Development Only` in the `Build Option`\
    \ list (see Figure [13-20](#A978-1-4842-0466-5_13_Chapter.html#Fig20)) and click\
    \ the `Apply Changes` button.\n\n![A978-1-4842-0466-5_13_Fig20_HTML.jpg](A978-1-4842-0466-5_13_Fig20_HTML.jpg)\n\
    \nFigure 13-20. Applying a build option\n\nNote\n\nWhen you’re applying build\
    \ options, you can choose the opposite result by selecting the `{Not ...}` option.\
    \ This helps avoid having to create two build options that are always the reciprocal\
    \ of each other.\n\nThe `Access Log` region is now run only when the `Development\
    \ Only` build option status is set to `Include`. You can apply build options to\
    \ other APEX objects using the same process."
  raw: '## APEX Advisor


    The APEX Advisor is a tool that executes predefined checks against an application.
    These validations can help reduce errors in your application before it’s tested
    or goes into production.


    Note


    Prior to APEX 4, the APEX Advisor was an open-source project developed by Patrick
    Wolf. During the development of APEX 4.0, Patrick joined the APEX team at Oracle
    and included the Advisor as a built-in tool. The open-source version of the APEX
    Advisor is available at [`http://essentials.oracleapex.info/`](http://essentials.oracleapex.info/)
    .


    To use the Advisor, edit an application and from the main application menu go
    to Utilities ä Advisor. Figure [13-14](#A978-1-4842-0466-5_13_Chapter.html#Fig14)
    shows all the checks you can perform. Hovering over each validation displays a
    brief description of the validation. You have the option to restrict the pages
    that the Advisor reviews by defining a comma-delimited list of pages to search
    for in the Check Pages region located at the bottom of the page. Once you select
    the checks to perform, click the Perform Check button. The results page provides
    a list of detailed issues that the Advisor finds plus links to each of the objects.


    ![A978-1-4842-0466-5_13_Fig14_HTML.jpg](A978-1-4842-0466-5_13_Fig14_HTML.jpg)


    Figure 13-14.


    APEX Advisor options


    The Advisor is an excellent tool to help you detect issues before your application
    is deployed to end users. It’s still important to have development standards and
    a release process to help prevent issues. You should be aware that the Advisor
    might produce false positives in response to some of the business rules in your
    organization, so you should analyze each suggestion before fixing it.


    ## Build Options


    Build options let the developer conditionally include or exclude certain features
    of the application at runtime. Build options are either enabled or disabled for
    the entire application and can only be changed in the Application Builder. This
    means they aren’t runtime configuration options.


    ### Understanding the Need


    Suppose you’re working on a custom authentication scheme and you want to verify
    that the appropriate authentication results and custom status messages are populating
    in the activity log for invalid login attempts. Each time you attempt a login,
    you could switch programs and run a query against `APEX_WORKSPACE_ACCESS_LOG`.
    This process might get cumbersome, because you’d have to toggle between two applications.
    An alternate solution is to create a report on the Login page to display the most
    recent login attempts. After each bad login attempt, you can return to the Login
    page and see an updated Login Attempts report.


    To build this report on page 101, the Login page, create a report with the following
    query:


      `SELECT user_name,`


             `authentication_method,`


             `access_date,`


             `authentication_result,`


             `custom_status_text`


        `FROM apex_workspace_access_log`


       `WHERE application_id = :app_id`


    `ORDER BY access_date DESC`


    The Login page now looks like Figure [13-15](#A978-1-4842-0466-5_13_Chapter.html#Fig15).
    The report allows you to quickly see the authentication results when testing the
    login process.


    ![A978-1-4842-0466-5_13_Fig15_HTML.jpg](A978-1-4842-0466-5_13_Fig15_HTML.jpg)


    Figure 13-15.


    Login page with associated Login Attempts report


    Once you’re content that your custom authentication scheme is working, you would
    normally delete the extra report region, because it’s only there for debugging
    purposes. Deleting the region is counterproductive, however, because you may need
    it in the future when you modify the authentication scheme.


    ### Creating a Build Option


    Instead of removing the region, you should tag it as a Development Only object
    so it’s available only while you’re developing your application rather than when
    you are running in production. Follow these steps to create a build option to
    support this requirement:


    In the Application Builder for the Help Desk application, go to Shared Components
    ➤ Build Options (under Security) and click the Create button.   Fill in each section
    as shown in Figure [13-16](#A978-1-4842-0466-5_13_Chapter.html#Fig16) and click
    the Create Build Option button. You should now see a Development Only build option,
    as shown in Figure [13-17](#A978-1-4842-0466-5_13_Chapter.html#Fig17).


    ![A978-1-4842-0466-5_13_Fig17_HTML.jpg](A978-1-4842-0466-5_13_Fig17_HTML.jpg)


    Figure 13-17.


    Development Only build option  


    ![A978-1-4842-0466-5_13_Fig16_HTML.jpg](A978-1-4842-0466-5_13_Fig16_HTML.jpg)


    Figure 13-16.


    Creating a build option


    ### Configuring Build Options


    Before you continue with this example, it’s important to review some of the options
    seen in Figure [13-16](#A978-1-4842-0466-5_13_Chapter.html#Fig16). The status
    values `Include` and `Exclude` can be misleading. Build options don’t affect what
    is included in the application, just what is executed or displayed at runtime.
    A better description of the status options would be enable/disable or on/off.


    The Default on Export option sets the default configuration of the build option
    when the application is exported and then imported. For this example, because
    you’re using the build option to handle development-only features, it makes sense
    to always exclude the build option and require developers to explicitly include
    it.


    In some cases there’s no clear default option, so the person installing the application
    must choose the appropriate build-option status. You can configure a required
    choice as part of the application installation script.


    ### Prompting for Build Option Status


    To configure the application to prompt for a build option status during installation,
    go to Supporting Objects ➤ Build Options in the Application Builder. Select Development
    Only (Include) under Prompt for Build Options so as to prompt for the build option
    as part of the installation (see Figure [13-18](#A978-1-4842-0466-5_13_Chapter.html#Fig18)),
    then click the Apply Changes button.


    ![A978-1-4842-0466-5_13_Fig18_HTML.jpg](A978-1-4842-0466-5_13_Fig18_HTML.jpg)


    Figure 13-18.


    Build option installation configuration


    When installing the application, the user will have the option to include the
    build option as shown in Figure [13-19](#A978-1-4842-0466-5_13_Chapter.html#Fig19).
    Again, include is a misleading term, because the build option will be included
    but will be disabled unless you specifically choose to include it during installation
    of the application.


    ![A978-1-4842-0466-5_13_Fig19_HTML.jpg](A978-1-4842-0466-5_13_Fig19_HTML.jpg)


    Figure 13-19.


    Build option prompt


    ### Applying Build Options


    Now that you’ve created and configured the Development Only build option, you
    need to apply it to the region in question—the Login Attempts region on page 101:


    Edit the Login Attempts region.   In the Property Editor, scroll down to the Configuration
    section.   Select Development Only in the Build Option list (see Figure [13-20](#A978-1-4842-0466-5_13_Chapter.html#Fig20))
    and click the Apply Changes button.


    ![A978-1-4842-0466-5_13_Fig20_HTML.jpg](A978-1-4842-0466-5_13_Fig20_HTML.jpg)


    Figure 13-20.


    Applying a build option   Note


    When you’re applying build options, you can choose the opposite result by selecting
    the {Not …} option. This helps avoid having to create two build options that are
    always the reciprocal of each other.


    The Access Log region is now run only when the Development Only build option status
    is set to `Include`. You can apply build options to other APEX objects using the
    same process.'
  trans: "# APEX Advisor\n\nAPEX Advisor 是一款针对应用程序执行预定义检查的工具。这些验证有助于在您的应用程序进行测试或投入生产前减少错误。\n\
    \n**注意**\n\n在 APEX 4 之前，APEX Advisor 是由 Patrick Wolf 开发的一个开源项目。在 APEX 4.0 开发期间，Patrick\
    \ 加入了 Oracle 的 APEX 团队，并将 Advisor 作为一个内置工具包含进来。APEX Advisor 的开源版本可在 [`http://essentials.oracleapex.info/`](http://essentials.oracleapex.info/)\
    \ 获取。\n\n要使用 Advisor，请编辑一个应用程序，并从主应用程序菜单进入 `工具` ➤ `Advisor`。图 13-14 显示了您可以执行的所有检查。将鼠标悬停在每个验证上会显示其简要描述。您可以选择限制\
    \ Advisor 审核的页面，方法是在页面底部的 `检查页面` 区域中定义一个逗号分隔的页面列表进行搜索。选择要执行的检查后，点击 `执行检查` 按钮。结果页面会提供\
    \ Advisor 发现的所有详细问题列表，并附有指向每个对象的链接。\n\n![A978-1-4842-0466-5_13_Fig14_HTML.jpg](img/A978-1-4842-0466-5_13_Fig14_HTML.jpg)\n\
    \n图 13-14. APEX Advisor 选项\n\nAdvisor 是一个出色的工具，可帮助您在应用程序部署给最终用户之前检测问题。但制定开发标准和发布流程来帮助预防问题仍然很重要。您应注意，Advisor\
    \ 可能会针对您组织中的某些业务规则产生误报，因此在修复每个建议前都应进行分析。\n\n# 构建选项\n\n构建选项允许开发人员在运行时有条件地包含或排除应用程序的某些功能。构建选项对整个应用程序是启用或禁用的，并且只能在应用程序构建器中更改。这意味着它们不是运行时配置选项。\n\
    \n## 理解需求\n\n假设您正在开发一个自定义的身份验证方案，并且您想验证在活动日志中，针对无效登录尝试是否正确填充了相应的身份验证结果和自定义状态消息。每次尝试登录时，您都可以切换程序并查询\
    \ `APEX_WORKSPACE_ACCESS_LOG`。这个过程可能会变得繁琐，因为您需要在两个应用程序之间切换。另一种解决方案是在登录页面上创建一个报表来显示最近的登录尝试。每次登录失败后，您可以返回登录页面，查看更新后的\
    \ `登录尝试` 报表。\n\n要在登录页面（第 101 页）上构建此报表，请创建一个包含以下查询的报表：\n\n```sql\nSELECT user_name,\n\
    \       authentication_method,\n       access_date,\n       authentication_result,\n\
    \       custom_status_text\n  FROM apex_workspace_access_log\n WHERE application_id\
    \ = :app_id\nORDER BY access_date DESC\n```\n\n登录页面现在如图 13-15 所示。该报表允许您在测试登录过程时快速查看身份验证结果。\n\
    \n![A978-1-4842-0466-5_13_Fig15_HTML.jpg](img/A978-1-4842-0466-5_13_Fig15_HTML.jpg)\n\
    \n图 13-15. 带有关联的登录尝试报表的登录页面\n\n一旦您确认自定义的身份验证方案正常工作，通常会删除额外的报表区域，因为它只是为了调试目的而存在的。然而，删除该区域可能适得其反，因为将来修改身份验证方案时您可能还需要它。\n\
    \n## 创建构建选项\n\n与其删除区域，不如将其标记为 `仅开发` 对象，使其仅在开发应用程序时可用，而在生产环境中不可用。请按照以下步骤创建一个构建选项来支持此需求：\n\
    \n1.  在“服务台”应用程序的应用程序构建器中，转到 `共享组件` ➤ `构建选项`（位于安全下），并点击 `创建` 按钮。\n2.  按照图 13-16\
    \ 所示填写每个部分，然后点击 `创建构建选项` 按钮。\n\n您现在应该能看到一个 `仅开发` 构建选项，如图 13-17 所示。\n\n![A978-1-4842-0466-5_13_Fig17_HTML.jpg](img/A978-1-4842-0466-5_13_Fig17_HTML.jpg)\n\
    \n图 13-17. 仅开发构建选项\n\n![A978-1-4842-0466-5_13_Fig16_HTML.jpg](img/A978-1-4842-0466-5_13_Fig16_HTML.jpg)\n\
    \n图 13-16. 创建构建选项\n\n## 配置构建选项\n\n在继续本示例之前，回顾一下图 13-16 中看到的一些选项非常重要。`包含` 和 `排除`\
    \ 状态值可能会引起误解。构建选项不影响应用程序中包含的内容，只影响在运行时执行或显示的内容。对状态选项更好的描述应该是启用/禁用或开/关。\n\n`导出时默认`\
    \ 选项设置了应用程序导出后再导入时构建选项的默认配置。对于本示例，由于您使用构建选项来处理仅开发功能，因此始终排除该构建选项并要求开发人员显式包含它是合理的。\n\
    \n在某些情况下，没有明确的默认选项，因此安装应用程序的人员必须选择适当的构建选项状态。您可以将必需的选择配置为应用程序安装脚本的一部分。\n\n## 提示构建选项状态\n\
    \n要将应用程序配置为在安装过程中提示构建选项状态，请在应用程序构建器中转到 `支持对象` ➤ `构建选项`。在 `提示构建选项` 下选择 `仅开发（包含）`，以便在安装过程中提示该构建选项（见图\
    \ 13-18），然后点击 `应用更改` 按钮。\n\n![A978-1-4842-0466-5_13_Fig18_HTML.jpg](img/A978-1-4842-0466-5_13_Fig18_HTML.jpg)\n\
    \n图 13-18. 构建选项安装配置\n\n安装应用程序时，用户将可以选择包含该构建选项，如图 13-19 所示。同样，“包含”是一个容易误解的术语，因为构建选项将被包含但默认是禁用的，除非您在安装应用程序时特别选择包含它。\n\
    \n![A978-1-4842-0466-5_13_Fig19_HTML.jpg](img/A978-1-4842-0466-5_13_Fig19_HTML.jpg)\n\
    \n图 13-19. 构建选项提示\n\n## 应用构建选项\n\n现在您已经创建并配置了 `仅开发` 构建选项，需要将其应用于相关区域——第 101 页上的\
    \ `登录尝试` 区域：\n\n1.  编辑 `登录尝试` 区域。\n2.  在属性编辑器中，向下滚动到 `配置` 部分。\n3.  在 `构建选项` 列表中选择\
    \ `仅开发`（参见图 13-20），然后点击 `应用更改` 按钮。\n\n![A978-1-4842-0466-5_13_Fig20_HTML.jpg](img/A978-1-4842-0466-5_13_Fig20_HTML.jpg)\n\
    \n图 13-20. 应用构建选项\n\n**注意**\n\n应用构建选项时，您可以通过选择 `{非...}` 选项来获得相反的结果。这有助于避免创建两个始终互为反向的构建选项。\n\
    \n现在，`访问日志` 区域仅在 `仅开发` 构建选项状态设置为 `包含` 时才会运行。您可以使用相同的过程将构建选项应用于其他 APEX 对象。"
- fmt: '### Reporting on Build Option Utilization


    构建选项可以应用于大多数 APEX 对象，包括页面、区域、页面项、标签等。在应用程序中跟踪哪些对象使用了哪些构建选项可能会变得困难。构建选项使用情况报告使您可以轻松查看哪些对象正在使用特定的构建选项。当您试图了解构建选项对应用程序的影响时，此报告非常有用。


    要查看此使用情况报告，请转到“共享组件” ➤ “构建选项”。单击“使用情况”选项卡并选择“仅开发”构建选项，如图 [13-21](#A978-1-4842-0466-5_13_Chapter.html#Fig21)
    所示。描述列中的链接会将您带到使用该构建选项的具体对象。


    ![A978-1-4842-0466-5_13_Fig21_HTML.jpg](A978-1-4842-0466-5_13_Fig21_HTML.jpg)


    图 13-21. 构建选项使用情况报告


    ## 页面特定工具


    页面特定工具允许开发人员对应用程序中的 APEX 对象执行批量操作。要访问页面特定工具，请从“应用程序编辑”页面转到“工具”。位于右侧的“页面特定工具”区域包含所有可用的页面特定工具（参见图
    [13-22](#A978-1-4842-0466-5_13_Chapter.html#Fig22)）。


    ![A978-1-4842-0466-5_13_Fig22_HTML.jpg](A978-1-4842-0466-5_13_Fig22_HTML.jpg)


    图 13-22. 页面特定工具


    每个工具都提供与对象类型相关的工具。本书不涵盖每个工具，但我们鼓励您探索可用的功能。


    ## APEX 和 Oracle SQL Developer


    Oracle SQL Developer 是一个免费的数据库开发 GUI。有关 SQL Developer 的更多信息，请访问 [`http://www.oracle.com/technetwork/developer-tools/sql-developer`](http://www.oracle.com/technetwork/developer-tools/sql-developer)。


    ### 集成


    APEX 与 SQL Developer 集成。在 SQL Developer 中，您可以看到所有解析模式与您连接模式相同的 APEX 应用程序（参见图 [13-23](#A978-1-4842-0466-5_13_Chapter.html#Fig23)）。


    ![A978-1-4842-0466-5_13_Fig23_HTML.jpg](A978-1-4842-0466-5_13_Fig23_HTML.jpg)


    图 13-23. SQL Developer 中的 APEX


    在 SQL Developer 中，您可以查看对象信息并执行基本的应用程序级任务，例如导入和导出应用程序、更改应用程序别名以及重命名应用程序。


    ### 重构支持


    APEX 允许使用匿名 PL/SQL 块。我们强烈建议此类块引用已编译的代码（包、函数和过程）。将代码存储在包中有助于将业务逻辑与显示层分离，并可能带来一些性能优势。


    在某些情况下，您可能直接在应用程序中编写了大量代码块。最终，您应该将这些大块代码移至已编译的 PL/SQL 代码中。SQL Developer 提供了一个工具，可以从
    APEX 中的匿名 PL/SQL 块自动生成一个 PL/SQL 包。然后，您可以用对此包的引用来替换您的大块代码。要生成该包，请在 SQL Developer
    中右键单击应用程序并选择“（批量）重构”，如图 [13-24](#A978-1-4842-0466-5_13_Chapter.html#Fig24) 所示。


    ![A978-1-4842-0466-5_13_Fig24_HTML.jpg](A978-1-4842-0466-5_13_Fig24_HTML.jpg)


    图 13-24. 重构代码


    SQL Developer 会打开一个新的工作表，其中包含编译所需的代码。新工作表还提供了有关需要更改 APEX 应用程序的哪些部分以及用什么代码替换它们的说明。与
    APEX Advisor 类似，这些建议仅供参考；您应遵循您组织的开发标准等。


    ## 总结


    APEX 中的许多工具使您作为开发人员的生活更轻松。花些时间了解这里介绍的工具和实用程序，您无疑可以加快完成工作的速度。虽然任何 PL/SQL GUI 都可以帮助您编辑和管理数据库对象，但到现在应该清楚，Oracle
    的 SQL Developer 具有特殊钩子，使得使用 APEX 进行管理、开发和调试要简单得多。


    # 14. 管理工作区


    一旦您开始开发 APEX 应用程序并在团队环境中工作，您就需要花一些时间管理工作区。本章将介绍可用于管理工作区的各种工具和资源。


    注意


    管理工作区涵盖许多不同领域。本章并未详细讨论所有领域；一些已在其他章节中提及，另一些则因篇幅限制未被包括在内。本章假设登录用户是工作区管理员。


    ## 了解您的环境


    当您以工作区管理员身份登录 APEX 并使用页面右上角的“管理”下拉菜单导航到“管理”主页时，您会看到每个主要部分的图标（参见图 [14-1](#A978-1-4842-0466-5_14_Chapter.html#Fig1)）。本章将介绍这些部分及其相关的子部分。


    ![A978-1-4842-0466-5_14_Fig1_HTML.jpg](A978-1-4842-0466-5_14_Fig1_HTML.jpg)


    图 14-1. 管理主页


    ### 查看实例信息


    在管理主页的右侧，“任务”区域中，第二个链接是“关于 Application Express”。单击此链接会转到一个显示有关您当前 APEX 实例信息的页面（参见图
    [14-2](#A978-1-4842-0466-5_14_Chapter.html#Fig2)）。


    ![A978-1-4842-0466-5_14_Fig2_HTML.jpg](A978-1-4842-0466-5_14_Fig2_HTML.jpg)


    图 14-2. 关于 Application Express 页面


    此页面上的信息在开发和调试 APEX 应用程序时非常有用。事实上，“关于”页面是一个很好的位置，可以快速获取您特定 APEX 实例的概览。因为 APEX 存储在数据库中，所以图中的所有值也可以通过查询获得。例如，您可以从以下查询中找到数据库版本：


    ```

    SELECT *

    FROM v$version

    ```


    图 [14-2](#A978-1-4842-0466-5_14_Chapter.html#Fig2) 中的 CGI 变量列表仅对工作区管理员可用。如果开发人员需要查看
    CGI 变量及其值的完整列表，他们可以创建一个 PL/SQL 区域并使用 `OWA_UTIL.PRINT_CGI_ENV` 作为区域源。


    注意


    您只能从 Web 界面获取 CGI 变量，因为它们是基于 Web 的变量。如果开发人员尝试在 SQL*Plus 或 SQL Developer 中查询它们，他们将不会得到任何结果。以下文章包含有关
    CGI 变量的更多信息：[`http://en.wikipedia.org/wiki/Common_Gateway_Interface`](http://en.wikipedia.org/wiki/Common_Gateway_Interface)。


    ### 检查 APEX 版本


    关于 Application Express 页面显示当前 APEX 版本。您也可以使用以下查询获取版本信息：


    ```

    SELECT *

    FROM apex_release

    ```


    从查询中获取 APEX 版本对于 DBA 在升级应用程序时可能很重要。此外，开发人员有时会编写依赖于当前 APEX 版本的代码。


    ## 管理服务


    单击“管理服务”图标可更改影响 APEX 服务操作的首选项和其他设置。您可以在图 [14-1](#A978-1-4842-0466-5_14_Chapter.html#Fig1)
    所示的管理主页上找到“管理服务”图标。


    图 [14-3](#A978-1-4842-0466-5_14_Chapter.html#Fig3) 显示了主要的“管理服务”页面。


    ![A978-1-4842-0466-5_14_Fig3_HTML.jpg](A978-1-4842-0466-5_14_Fig3_HTML.jpg)


    图 14-3. 管理服务页面'
  raw: '### Reporting on Build Option Utilization


    Build options can be applied to most APEX objects, including pages, regions, page
    items, tabs, and so on. It can become difficult to keep track of which objects
    use, which build options in applications. The build option Utilization report
    enables you to easily view which objects are using a particular build option.
    This report can be very helpful when you’re trying to get an overview of the impact
    that a build option has on the application.


    To view this Utilization report, go to Shared Components ➤ Build Options. Click
    the Utilization tab and select the Development Only build option, as shown in
    Figure [13-21](#A978-1-4842-0466-5_13_Chapter.html#Fig21). The link in the description
    column brings you to the specific object that is using the build option.


    ![A978-1-4842-0466-5_13_Fig21_HTML.jpg](A978-1-4842-0466-5_13_Fig21_HTML.jpg)


    Figure 13-21.


    Build option Utilization report


    ## Page-Specific Utilities


    Page-specific utilities allow developers to perform bulk operations on APEX objects
    in an application. To access page-specific utilities, go to Utilities from the
    Application Edit page. The Page Specific Utilities region, located at the right,
    contains all the page-specific utilities available (see Figure [13-22](#A978-1-4842-0466-5_13_Chapter.html#Fig22)).


    ![A978-1-4842-0466-5_13_Fig22_HTML.jpg](A978-1-4842-0466-5_13_Fig22_HTML.jpg)


    Figure 13-22.


    Page-specific utilities


    Each of the utilities provides tools associated with the type of object. This
    book doesn’t cover each utility, but we encourage you to explore the available
    features.


    ## APEX and Oracle SQL Developer


    Oracle SQL Developer is a free database-development GUI. For more information
    about SQL Developer, go to [`http://www.oracle.com/technetwork/developer-tools/sql-developer`](http://www.oracle.com/technetwork/developer-tools/sql-developer)
    .


    ### Integration


    APEX is integrated with SQL Developer. In SQL Developer, you can see all the APEX
    applications whose parsing schema is the same as your connecting schema (see Figure
    [13-23](#A978-1-4842-0466-5_13_Chapter.html#Fig23)).


    ![A978-1-4842-0466-5_13_Fig23_HTML.jpg](A978-1-4842-0466-5_13_Fig23_HTML.jpg)


    Figure 13-23.


    APEX in SQL Developer


    In SQL Developer, you can view object information and perform basic application-level
    tasks such as importing and exporting an application, changing the application
    alias, and renaming an application.


    ### Refactoring Support


    APEX allows for anonymous blocks of PL/SQL. We strongly recommend that such blocks
    reference compiled code (packages, functions, and procedures). Storing code in
    packages helps separate the business logic from the display layer and may have
    some performance benefits.


    In some cases, you may have written large blocks of code directly in the application.
    Eventually, you should move these large blocks of code into compiled PL/SQL code.
    SQL Developer provides a tool that automatically generates a PL/SQL package from
    the anonymous blocks of PL/SQL in APEX. You can then replace your large blocks
    of code with references to this package. To generate the package, right-click
    the application in SQL Developer and select Refactor (in Bulk), as shown in Figure
    [13-24](#A978-1-4842-0466-5_13_Chapter.html#Fig24).


    ![A978-1-4842-0466-5_13_Fig24_HTML.jpg](A978-1-4842-0466-5_13_Fig24_HTML.jpg)


    Figure 13-24.


    Refactoring code


    SQL Developer opens a new worksheet with the necessary code to compile. The new
    worksheet also provides notes on what sections of your APEX applications to change
    and the code to replace them with. Similar to the APEX Advisor, these are recommendations;
    you should follow your organization’s development standards, and so on.


    ## Summary


    Many tools in APEX make your life as a developer easier. Take some time to get
    to know the tools and utilities presented here, and you can undoubtedly speed
    up your ability to get things done. And although any PL/SQL GUI can help you edit
    and manage database objects, it should be clear by now that Oracle’s SQL Developer
    has special hooks to make managing, developing, and debugging with APEX far more
    straightforward.


    # 14. Managing Workspaces


    Once you start developing APEX applications and working in a team environment,
    you will need to spend some time managing workspaces. This chapter will cover
    the various tools and resources available with which to manage a workspace.


    Note


    Administering a workspace covers many different areas. This chapter doesn’t discuss
    all areas in detail; some have been mentioned in other chapters, and others aren’t
    included because of space constraints. This chapter assumes that the user logging
    in is a workspace administrator.


    ## Learning About Your Environment


    When you log in to APEX as a workspace administrator and navigate to the Administration
    home page using the Administration drop-down menu in the upper right-hand corner
    of the page, you see icons for each of the major sections (see Figure [14-1](#A978-1-4842-0466-5_14_Chapter.html#Fig1)).
    This chapter will cover each of these sections and their associated subsections.


    ![A978-1-4842-0466-5_14_Fig1_HTML.jpg](A978-1-4842-0466-5_14_Fig1_HTML.jpg)


    Figure 14-1.


    Administration home page


    ### Viewing Instance Information


    On the right-hand side of the Administration home page, in the Tasks region, the
    second link is About Application Express. Clicking this link brings you to a page
    that shows information about your current APEX instance (see Figure [14-2](#A978-1-4842-0466-5_14_Chapter.html#Fig2)).


    ![A978-1-4842-0466-5_14_Fig2_HTML.jpg](A978-1-4842-0466-5_14_Fig2_HTML.jpg)


    Figure 14-2.


    About Application Express page


    The information on this page can be very useful when you’re developing and debugging
    APEX applications. In fact, the About page is an excellent location from which
    to quickly get an overview of your particular APEX instance. Because APEX is stored
    in the database, all the values in the figure can also be obtained from a query.
    For example, you can find the database version from the following query:


    `SELECT *`


    `FROM v$version`


    The list of CGI variables in Figure [14-2](#A978-1-4842-0466-5_14_Chapter.html#Fig2)
    is only available to workspace administrators. If developers need to see a complete
    list of CGI variables and their values, they can create a PL/SQL region and use
    `OWA_UTIL.PRINT_CGI_ENV` as the region source.


    Note


    You can only obtain CGI variables from a web interface because they’re web-based
    variables. If developers try to query them in SQL*Plus or SQL Developer, they
    won’t get any results. The following article contains more information on CGI
    variables: [`http://en.wikipedia.org/wiki/Common_Gateway_Interface`](http://en.wikipedia.org/wiki/Common_Gateway_Interface)
    .


    ### Checking the APEX Version


    The About Application Express page displays the current version of APEX. You can
    also obtain the version information using the following query:


    `SELECT *`


    `FROM apex_release`


    Obtaining the APEX version from a query can be important for DBAs when upgrading
    an application. Also, developers sometimes write code that is dependent on the
    current version of APEX.


    ## Managing the Service


    Click the Manage Service icon to change preferences and other settings affecting
    the operation of your APEX service. You can find the Manage Service icon on the
    Administration home page shown in Figure [14-1](#A978-1-4842-0466-5_14_Chapter.html#Fig1).


    Figure [14-3](#A978-1-4842-0466-5_14_Chapter.html#Fig3) shows the main Manage
    Service page.


