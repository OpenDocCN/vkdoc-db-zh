    or have access to a local instance of the Oracle database, a SQL IDE will definitely
    make your life easier.


    SQL Developer is a free SQL and PL/SQL IDE provided by Oracle. You can download
    SQL Developer from the OTN’s home page at [`http://www.oracle.com/sqldeveloper`](http://www.oracle.com/sqldeveloper)
    .


    Using SQL Developer, you can browse database objects, edit row data, develop and
    test stored PL/SQL program units, code and test SQL statements, and interactively
    debug PL/SQL code. SQL Developer also has many direct integration points with
    APEX that make reporting in, monitoring, and maintaining APEX instances and applications
    easier. This book doesn’t cover those, but it’s definitely worth your time to
    look into this tool.


    ## Summary


    Oracle Application Express has come a long way from its simple beginnings, and
    the APEX community is poised at the beginning of a new cycle of growth. APEX 5.0
    provides so much possibility and promise that it’s hard not to be excited about
    what the future holds. With that spirit, you’re ready to begin your journey to
    discover how APEX can make development easier and more fun.


    # 2. A Developer’s Overview


    You’re probably anxious to get started, but there are a few concepts you should
    understand before you jump into APEX development headfirst. This chapter will
    introduce the fundamental development architecture of APEX and then walk you through
    the different areas of the developer interface.


    You will delve deeper into the details as you go through the book and put the
    architecture to work, but it will help tremendously to know how things are structured
    ahead of time. This chapter is designed to ease you in, but it isn’t a complete
    guided tour of every nook and cranny. Be patient; you’ll get there.


    ## The Anatomy of a Workspace


    APEX was designed from the beginning to be a multi-tenant architecture where many
    different development environments (called workspaces) can exist in a single APEX
    instance. For instance, `apex.oracle.com`, Oracle’s free hosted instance, holds
    over 10,000 active workspaces, each of which is a completely separate environment
    unable to see or interact with any of the others. You can think of this as Software
    as a Service (SaaS) or a cloud-computing architecture, but basically it means
    each workspace is distinct and segregated from all others.


    In simple terms, each workspace represents a virtual private container in which
    developers create and deploy their APEX applications. The development process
    takes place in the context of a workspace, so it’s important to know how a workspace
    is structured. Figure [2-1](#A978-1-4842-0466-5_2_Chapter.html#Fig1) uses database
    entity-relationship diagram parlance to help explain the makeup of the objects
    in a workspace.


    ![A978-1-4842-0466-5_2_Fig1_HTML.gif](A978-1-4842-0466-5_2_Fig1_HTML.gif)


    Figure 2-1.


    Logical makeup of a workspace


    A workspace may have:


    *   One to many users: These users may one of three types: Administrator, Developer,
    or End User.

    *   Zero to many applications: Applications can be added from the list of packaged
    applications, imported, or created from scratch.

    *   One to many schemas: Although a workspace must be assigned at least one schema
    when it’s created, an Instance Administrator may assign multiple schemas to a
    workspace.


    There can be many applications and many schemas in a workspace, but an application
    may only parse as one (and only one) schema, which can only be set during development.
    The following sections delve more deeply into this to give you a full understanding
    of how these concepts relate.'
  trans: '# 2. 开发者概览


    ## 准备工作


    ### 访问 APEX 实例


    这绝对是一本实践性的书，因此要完成其中的示例和练习，您需要访问一个 APEX 5.0 实例。有多种不同的方式可以访问 APEX；根据您对 Oracle 的熟悉程度和专业知识，某些方式可能更适合您。以下是三种最常见场景的描述：


    *   迄今为止最简单的方式是，在 Oracle 托管的 APEX 版本上注册一个账户，地址是 [`https://apex.oracle.com`](https://apex.oracle.com/)。它对非生产应用是免费的，并且是开始学习的好地方，因为您无需担心安装数据库或
    APEX。

    *   如果您本地已经安装了 Oracle 数据库，您可以下载 APEX 5.0 并安装到该实例中。只需访问 Oracle APEX 主页 [`http://otn.oracle.com/apex`](http://otn.oracle.com/apex)，下载最新版本的软件即可。

    *   如果您还没有 Oracle 数据库，但想在本地安装一个，您可以从 Oracle 技术网络 (OTN) 下载免费的开发者许可版本数据库，地址是 [`http://otn.oracle.com/database`](http://otn.oracle.com/database)。Oracle
    11g 和 12c 都可以运行 APEX 5.0。两者都允许您在数据库安装过程中选择安装 APEX（尽管是早期版本）。


    虽然拥有一个本地可访问的 Oracle 数据库实例可以让您更直接地访问数据，但对于完成本书中的练习来说，这绝对不是必需的。所有的代码和说明都已编写好，可以在
    Oracle 的托管实例上完成，无需特殊访问权限。


    **注意**


    Oracle 为数据库和 APEX 的安装过程提供了非常好的文档，因此这里不详细介绍。但是，如果您计划在您组织的某个环境中安装 APEX，您应该与负责该实例的数据库管理员协调，以确保不会发生意外。


    ### Web 浏览器


    APEX 文档指出，要查看或开发 APEX 应用程序，您必须拥有一个支持 Cookie、JavaScript、HTML 5 和 CSS 3 的 Web 浏览器。然而，尽管您可以部署到任何支持这些特性的浏览器，但支持的浏览器列表相当窄。目前支持的浏览器有：Internet
    Explorer 9+、Firefox 35+、Apple 的 Safari 7+ 以及 Google Chrome 40+。


    不深入探讨哪种浏览器是市场上最好的这类争议，作者在开发时更倾向于使用 Firefox 或 Chrome，因为它们有大量可以帮助 APEX 开发的开发者工具和附加组件。请注意，由于每个浏览器解释
    HTML 和 JavaScript 的方式不同，您必须在目标受众可能使用的所有 Web 浏览器中测试您的应用程序。


    ### SQL Developer


    如前所述，本书中的所有练习和脚本都可以直接在 APEX 界面中加载和运行。但是，如果您选择安装或可以访问本地 Oracle 数据库实例，使用 SQL IDE
    肯定会让您的工作更轻松。


    SQL Developer 是 Oracle 提供的一个免费的 SQL 和 PL/SQL IDE。您可以从 OTN 的主页 [`http://www.oracle.com/sqldeveloper`](http://www.oracle.com/sqldeveloper)
    下载 SQL Developer。


    使用 SQL Developer，您可以浏览数据库对象、编辑行数据、开发和测试存储的 PL/SQL 程序单元、编写和测试 SQL 语句，以及交互式地调试 PL/SQL
    代码。SQL Developer 还与 APEX 有许多直接的集成点，使得报告、监控和维护 APEX 实例及应用程序变得更加容易。本书不涵盖这些内容，但花时间研究这个工具绝对值得。


    ## 总结


    Oracle Application Express 从其简单的起点一路走来，已经取得了长足的进步，而 APEX 社区正站在一个新增长周期的起点。APEX
    5.0 提供了如此多的可能性和前景，让人很难不对未来充满期待。怀着这种精神，您已准备好开始您的探索之旅，了解 APEX 如何使开发变得更轻松、更有趣。


    您可能迫不及待地想要开始，但在一头扎进 APEX 开发之前，有几个概念您应该理解。本章将介绍 APEX 的基本开发架构，然后带您浏览开发者界面的不同区域。


    随着您阅读本书并将架构付诸实践，您会更深入地了解细节，但提前了解事物的结构将大有裨益。本章旨在引导您入门，但它并非每个角落的完整导览。请保持耐心；您会达到目标的。


    ## 工作区的构成


    APEX 从一开始就被设计为多租户架构，其中许多不同的开发环境（称为工作区）可以存在于一个 APEX 实例中。例如，Oracle 的免费托管实例 `apex.oracle.com`
    拥有超过 10,000 个活跃的工作区，每个工作区都是一个完全独立的环境，无法看到或与其他任何工作区交互。您可以将其视为软件即服务 (SaaS) 或云计算架构，但基本上，这意味着每个工作区都是独特且与其他所有工作区隔离的。


    简单来说，每个工作区代表一个虚拟的私有容器，开发者在其中创建和部署他们的 APEX 应用程序。开发过程是在工作区的上下文中进行的，因此了解工作区的结构很重要。图
    2-1 使用数据库实体关系图的术语来帮助解释工作区中对象的组成。


    ![A978-1-4842-0466-5_2_Fig1_HTML.gif](img/A978-1-4842-0466-5_2_Fig1_HTML.gif)


    图 2-1. 工作区的逻辑构成


    一个工作区可能包含：


    *   一个到多个用户：这些用户可能是三种类型之一：管理员、开发者或最终用户。

    *   零个到多个应用程序：应用程序可以从打包应用程序列表中添加、导入或从头开始创建。

    *   一个到多个方案：虽然工作区在创建时必须分配至少一个方案，但实例管理员可以为一个工作区分配多个方案。


    一个工作区中可以有多个应用程序和多个方案，但一个应用程序只能解析为一个（且仅一个）方案，这个方案只能在开发期间设置。接下来的部分将更深入地探讨这一点，让您全面理解这些概念之间的关系。'
- fmt: '### APEX 用户


    要登录 APEX 工作区，您必须拥有一个有效的 APEX 用户访问权限。系统提供了多种不同的用户角色，它们决定了您登录后可以执行的操作。具体角色如下：


    *   **实例管理员**是特殊用户，负责管理和维护整个 APEX 实例。他们可以设置实例级别的首选项和消息、创建和管理工作区、监控空间利用率，以及执行与整个
    APEX 安装相关的许多其他操作。实例管理员只能登录特殊的`INTERNAL`工作区，该工作区包含 APEX 管理服务应用程序。

    *   **工作区管理员**负责管理工作区的具体细节，可以管理与该工作区相关的用户账户、监控工作区活动、查看日志文件、覆盖开发人员的锁定和设置等。尽管不是好的实践，但工作区管理员也可以充当开发人员的角色，创建和修改应用程序。

    *   **开发人员**是创建和编辑工作区中应用程序的用户。他们可以访问分配给工作区的模式中的底层表，并可以创建和修改数据库对象以及存储的 PL/SQL 单元。大多数编写
    APEX 应用程序的人只需要此级别的访问权限。

    *   **终端用户**只能运行工作区中的应用程序。他们无法直接访问任何底层数据库对象，也无法访问任何 APEX 开发模块。终端用户不能直接登录工作区。


    除了 APEX 实例管理员外，在默认安装中，APEX 用户是特定于且唯一于某个工作区的，这意味着您可以在单个 APEX 实例的多个工作区中拥有同名用户，但这些用户中的每一个都是唯一的。他们可以有自己的密码和设置，并且彼此之间没有任何关联。


    APEX 5.0 引入了使用外部存储库（如单点登录或 LDAP）作为来源来分配和验证 APEX 用户的能力，这意味着单个用户可以访问多个工作区。但是，此功能默认未设置，需要实例管理员进行配置。


    在开发时，您应该养成以开发人员身份登录的习惯，而不是以工作区管理员身份登录。系统提供了多种保护措施来防止开发人员在工作区中相互干扰。如果您以工作区管理员身份登录，这些保护措施将被绕过，您可能会意外干扰他人正在处理的内容。虽然这在只有单个开发人员的工作区中不是问题，但养成这种习惯仍然是好的。


    **注意**


    本书使用最后三种类型的用户。它假设 APEX 已安装，工作区已创建，并且您已获得工作区管理员的登录凭据。如果您使用的是 `apex.oracle.com`
    上的托管实例，那么您在注册时获得的用户名就具有工作区管理员的凭据。但是，如果您使用的是本地实例，请参考 APEX 文档或让您的实例管理员帮助您设置工作区。


    ### 应用程序、页面、区域和项目


    尽管工作区基本上从空开始，但您可以拥有多个驻留在工作区中的应用程序。没有特定的规则，但工作区中的所有应用程序很可能有一些共同点：它们可能都使用相同的底层数据库对象，针对相同的用户社区，或使用相同的用户认证方法。


    在构建应用程序时，您会添加新页面，并使用区域和项目构建这些页面。图[2-2](#A978-1-4842-0466-5_2_Chapter.html#Fig2)显示了不同类型对象之间的层次结构。


    ![A978-1-4842-0466-5_2_Fig2_HTML.gif](A978-1-4842-0466-5_2_Fig2_HTML.gif)


    图 2-2. 通用应用程序层次结构


    应用程序基本上是执行与业务功能相关的一个任务（或一组任务）的页面组。在本书的过程中，您将在单个工作区中构建一个应用程序，但重要的是要知道，在典型的开发环境中，您可能会在多个工作区中处理许多应用程序。


    页面是应用程序的基本构建块，包含用户界面（UI）组件和处理用户输入的程序逻辑。我们稍后将介绍 UI 渲染与用户输入处理的区别，但现在可以将页面大致等同于桌面
    UI 术语中的屏幕。


    区域是充当内容容器的 UI 项。一个页面上可以有任意数量的区域，并且区域可以嵌套在其他区域中。这为您提供了创建诸如仪表板之类的东西的机会，您可能会将一个数据报告区域和一个图表区域嵌套在单个父级`HTML`区域中。


    项目是用于向用户呈现 UI 的 HTML 表单元素。这些包括诸如按钮、选择列表、文本字段、复选框、单选按钮组等。项目分为两类：页面级项目和应用程序级项目的区别在于，后者是在应用程序级别定义的，并不直接呈现在页面上。您可以将它们视为全局变量。页面级项目是在特定页面上定义的，并分配给某个区域以控制它们在用户界面上的显示位置和方式。


    应用程序显然远不止这些简单的构建块，但如果您理解它们之间的基本层次关系，那么在构建您的第一个页面时将有一个良好的开端，并在执行更复杂的任务时打下坚实的基础。'
  raw: '### APEX Users


    To log in to an APEX workspace, you must have access to a valid APEX user. A number
    of different user roles are available that dictate what you can do when you log
    in. The roles are as follows:


    *   Instance Administrators are special users who manage and maintain the overall
    APEX instance. They can set instance-level preferences and messages, create and
    manage workspaces, monitor space utilization, and perform many other actions related
    to the overall APEX installation. Instance Administrators are only able to log
    in to the special INTERNAL workspace, which houses the APEX Admin Services application.

    *   Workspace Administrators are responsible for managing the details of a specific
    workspace and can manage user accounts related to the workspace, monitor workspace
    activity, view log files, override developer locks and settings, and so on. Although
    it isn’t good practice, the Workspace Administrator can also act as a Developer,
    creating and modifying applications.

    *   Developers are the users who create and edit the applications in the workspace.
    They have access to the underlying tables in the schema(s) assigned to the workspace
    and may create and modify database objects and stored PL/SQL units. Most people
    writing APEX applications only need this level of access.

    *   End Users are only able to run applications in a workspace. They don’t have
    direct access to any of the underlying database objects, nor do they have access
    to any of the APEX development modules. End users can’t log directly into a workspace.


    With the exception of the APEX Instance Administrator, in a default installation
    APEX users are specific and unique to a workspace, meaning you can have users
    with the same name in multiple workspaces in a single APEX instance, but each
    of these users is unique. They can have their own passwords and settings and aren’t
    linked together in any way.


    APEX 5.0 introduces the ability to use an external repository, such as Single
    Sign-on or LDAP, as a source to assign and validate APEX users, meaning that a
    single user could have access to multiple workspaces. However, this functionality
    is not set up by default and requires an Instance Administrator to configure.


    When you’re developing, you should get in the habit of logging in as a Developer
    as opposed to a Workspace Administrator. Several safeguards are available to help
    keep developers from stepping on each other in a workspace. If you log in as a
    Workspace Administrator, these safeguards are bypassed, and you may accidently
    interfere with something someone else is working on. Although this isn’t a problem
    in a workspace with only one developer, it’s still good to get into that habit.


    Note


    This book uses the last three types of user. It assumes that APEX has been installed,
    a workspace has been created, and you have been given the Workspace Administrator’s
    login credentials. If you’re using the hosted instance at `apex.oracle.com`, then
    the user name you were given when you signed up has the credentials of a Workspace
    Administrator. If, however, you’re using a local instance, either refer to the
    APEX documentation or get your Instance Administrator to help you set up a workspace.


    ### Applications, Pages, Regions, and Items


    Although a workspace starts off basically empty, you can have many applications
    that reside in a workspace. There is no specific rule, but it’s likely that all
    the applications in a workspace share something: they might all use the same underlying
    database objects, target the same user community, or use the same method for authenticating
    users.


    As you build an application, you add new pages and build out those pages with
    regions and items. Figure [2-2](#A978-1-4842-0466-5_2_Chapter.html#Fig2) shows
    the hierarchy of the different types of objects.


    ![A978-1-4842-0466-5_2_Fig2_HTML.gif](A978-1-4842-0466-5_2_Fig2_HTML.gif)


    Figure 2-2.


    General application hierarchy


    Applications are basically groups of pages that perform a task (or set of tasks)
    related to a business function. During the course of this book, you’ll build one
    application in a single workspace, but it’s important to know that in a typical
    development environment, you’ll probably be working on many applications across
    several workspaces.


    Pages are the basic building blocks of applications and contain both the user-interface
    (UI) components and the programming logic that processes the user’s input. We
    cover the rendering of the UI versus the processing of user input later, but for
    now consider a page to be roughly equivalent to a screen in desktop UI lingo.


    Regions are UI items that serve as content containers. You can have any number
    of regions on a page, and regions can be nested in other regions. This gives you
    the opportunity to create things like dashboards, where you might nest a data
    report region and a graph region in a single parent HTML region.


    Items are the HTML form elements that are used to present the UI to the user.
    These include things such as buttons, select lists, text fields, check boxes,
    radio groups, and so on. There are two categories of items: page-level items and
    application-level items. The difference is that the latter are defined at the
    application level and aren’t rendered directly on the page. You can think of these
    as global variables. Page-level items are defined on a specific page and are assigned
    to a region in order to control where and how they display to the user.


    There is obviously a lot more to an application than these simple building blocks,
    but if you understand the basic hierarchy between these, you’ll have a jumpstart
    when it comes to building your first pages and a solid foundation when it’s time
    to perform more intricate tasks.'
