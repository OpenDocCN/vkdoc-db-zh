  trans: '

    # APEX 5.0 简介


    欢迎来到 Oracle Application Express (APEX) 的精彩世界。你即将学习如何使用一个能彻底革新你对构建基于 Oracle 的 Web
    系统之思考和方式的工具。它确实为我带来了这样的改变。


    在 APEX 出现之前，为驻留在 Oracle 数据库中的数据开发完全交互式、基于 Web 的系统，几乎总是意味着要学习一门新的、通常很复杂的语言，比如 Java、.NET
    或 PHP，然后想办法将你选择的语言与数据无缝集成。这往往还意味着，需要整合那些已经以 `PL/SQL` 程序单元形式编码的业务规则。


    在这种情况下，可能要花费数月甚至数年的时间，才能对你选择的语言足够熟练，从而开始编写一个功能性的系统。如果你像许多开发者一样，就会因为花了过多时间在看似相对简单的任务上而感到沮丧。


    别担心！冗长复杂的 Web 开发平台的时代可能已离你而去。


    ## 什么是 APEX？


    APEX 是一个 100% 基于浏览器的快速应用程序开发（RAD）工具，它能帮助你快速、以相对较少的编程工作量，创建丰富、交互式的、基于 Oracle 的
    Web 应用程序。


    市场上有许多 RAD 开发工具和平台。如果你处理的是驻留在 Oracle 数据库中的数据，有几点让 APEX 独树一帜，从而成为一个更具吸引力的开发平台。首先，最重要的是，APEX
    构建并使用 `SQL` 和 `PL/SQL` 作为其核心语言。对于那些已经使用 Oracle 数据库的人来说，这是一个巨大的优势，因为这意味着你可以立即运用已有的知识。即使你没有
    Oracle 背景，但若将要使用 Oracle 数据库，你需要学习其特定的 `SQL` 方言，并且很可能在某个时候需要使用 `PL/SQL` 过程式语言。


    当从已经将大量业务逻辑编码到存储的 `PL/SQL` 程序单元中的、基于 Oracle 的系统进行迁移时，`PL/SQL` 程序单元会变得更加有益。在这种情况下，你几乎可以立即利用那些逻辑，只需付出很少的努力或对现有代码进行很少的改动。


    另一个巨大的优势是，APEX 是一个声明式工具，它提供了功能丰富、旨在让你的工作更轻松的核心功能。由于 APEX 处理了所有基于 Web 应用程序通用的许多底层功能，你可以专注于你的应用程序特有的逻辑。


    你所需完成的大部分工作，都可以使用作为 `APEX 应用程序构建器` 一部分提供的众多内置向导之一来完成。这些向导引导你完成定义应用程序功能的流程，然后将该信息存储为元数据。向导完成后，你可以编辑和增强其功能，甚至用你自定义的
    `SQL` 和 `PL/SQL` 例程替换它。当你熟练掌握 APEX 后，你甚至可能会完全绕过向导，直接生成更复杂的定义。


    在本书的学习过程中，你可能会发现自己需要掌握其他一些工具，但实际上，你完全可以仅使用你的 Web 浏览器和 APEX 所提供的功能，来开发一个非常丰富的应用程序。


    ## APEX 简史


    APEX 已经存在了相当长的时间——可能比大多数人知道的还要久。APEX 的第一个公开版本（当时称为 `HTML DB`）发布于 2004 年，但其历史可以追溯到更早。


    ### 远古历史


    APEX 的根源在于一项已存在相当长时间的技术。事实上，APEX 在底层用来生成发送到浏览器的 `HTML` 的 `PL/SQL Web Toolkit`
    的部分组件，最早可以追溯到 1994 年。


    在那个时期，你实际上可以手工用 `PL/SQL` 编写 Web 应用程序，不幸的是我们很多人确实这么做过。这不仅需要精通 `PL/SQL` 和 `HTML`，还需要圣人般的耐心和倔驴般的决心。最终的产物并不美观，而且以今天的标准来看绝对不安全，但它是可用的，尽管功能有限。


    此后不久，Oracle 推出了 `PL/SQL` 服务器页面（PSPs）。这涉及先编写静态 `HTML` 并包含特殊的 Oracle 标记以指示动态数据的位置。当你将输出调整到所需样式后，通过一个名为
    `LOADPSP` 的程序运行它。该程序将原始的 `HTML` 和特殊的 Oracle 标记转换成一个 `PL/SQL` 过程，该过程再次使用 `PL/SQL
    Web Toolkit` 来输出 `HTML`，包括你请求的动态数据。在当时，这是一个巨大的飞跃。我曾在一家公司工作，使用 `PSP` 技术构建了整个框架，并在多个客户那里部署了它。


    最终，在 1997 年，`WebDB` 登场了。作为现在称为 APEX 的真正鼻祖，`WebDB` 是革命性的，因为它是一个 100% 基于 Web 的工具，允许开发者设计
    Web 应用程序。尽管当时 Java 似乎正在接管世界，但它完全用 `PL/SQL` 编写。开发者可以将 `WebDB` 指向他们的数据库，并生成用于创建表单、报表、图表和日历的代码。它没有会话状态管理，也没有模板；一旦代码生成，你就无法通过该工具回溯修改。


    `WebDB` 使得许多希望加入基于 Web 浪潮的公司得以实现目标，而无需花费大量时间和精力重新培训员工。作为其成功的一个证明，我知道有好几家公司目前仍在生产环境中运行着
    `WebDB` 系统。


    不幸的是，`WebDB` 的日子是有限的。因为它生成代码（如果你不喜欢它生成的代码，那也没办法），在它被 Oracle 的 `Portal` 产品吸收时，已经开始失宠。然而，它的创造者
    Mike Hichwa 并没有忘记 `WebDB` 曾展现过的伟大曙光。

    '
- fmt: '### More Recent History


    Around 1999, Oracle CEO Larry Ellison presented Mike Hichwa (VP of Software Development)
    with the task of creating an internal calendaring and scheduling system for Oracle
    Corp. The original remit was to use WebDB to generate the initial code and then
    hand-code all the changes from that point forward. Mike, however, saw this as
    an opportunity to completely rewrite WebDB into something that could be far more
    useful. Thus, with the help of Joel Kallman and Tom Kyte, Oracle Flows was born.


    Based on the success of the internal calendaring and scheduling system, the team
    was allowed to move forward toward making Oracle Flows a product. In 2001, using
    what was then known as Flow Builder, Mike and his team began implementing systems
    for various customers, including one situation where they managed to replace a
    Java development project that was going horribly wrong.


    By 2003, the team had proven the tool’s power, and they were given permission
    to release it as a product. HTML DB 1.5 was released to the public as a no-cost
    option of Oracle 10gR1.


    Since then, various releases have been introduced, each providing improved features
    and functionality. The following is a very brief list of the releases and some
    of the more notable features:


    *   HTML DB 1.6 (2004) introduced themes, master-detail forms, page groups, page
    locking, and some multilingual capabilities.

    *   HTML DB 2.0 (2005) introduced SQL Workshop, a graphical query builder, a database
    object browser, and session-state protection.

    *   APEX 2.2 (2006) introduced packaged applications, the APEX dictionary views,
    and the access control wizard.

    *   APEX 3.0 (2007) introduced PDF printing with BI Publisher, migration from
    Microsoft Access, and page and region caching.

    *   APEX 3.1 (2008) introduced interactive reports, the runtime-only installation
    capability, and improved security.

    *   APEX 3.2 (2009) introduced a migration helper for Oracle Forms–based systems
    and various security enhancements.

    *   APEX 4.0 (2010) was a huge leap forward, introducing dynamic actions and plug-ins—declarative
    ways to introduce server-side logic and extend the core APEX environment, respectively.
    Also introduced was the new Team Development module.

    *   APEX 4.1 (2011) included a new user-facing data-uploading feature, enhanced
    error-handling capabilities, and much-improved support for tabular forms.

    *   APEX 4.2 (2012) originally introduced some new themes as well as enhancements
    to the debugging API, but over its more than two-year life span, patch releases
    introduced such changes as HTML 5 charting and deeper security enhancements.


    ### APEX 5.0 and the Future


    And so we arrive at the release of APEX 5.0. While the changes introduced with
    versions 4.0 through 4.2 undoubtedly changed the landscape of APEX development,
    the changes introduced in version 5.0 have brought APEX to a point where it can
    rightly be compared with many of the popular desktop-based development environments.


    The original focus of APEX 5.0 was to make development of rich, interactive web
    applications easier by providing the developer with a vastly enhanced development
    environment. However, the development team has introduced so many new features—indeed,
    new ways to attack problems—that it will be hard not to choose APEX as the preferred
    development platform for Oracle-based applications.


    APEX’s new Page Designer Integrated Development Environment (IDE) completely changes
    the way developers will interact with page design. Modeled after many of the popular
    desktop IDEs, developers now interact with items, placement, attributes, and actions
    all on one page. A new drag-and-drop page-layout interface has been introduced
    that allows developers to easily position regions and items. Group editing allows
    developers to edit the attributes of several items at once. The only downside
    to the new Page Designer is that you may find yourself wanting a bit more screen
    real estate due to the nature of its layout. However, with widescreen monitors
    becoming ubiquitous, this shouldn’t be an issue for most.


    Apart from the new Page Designer IDE, one of the most exciting new features of
    APEX 5.0 is the Universal Theme. This new application user interface does away
    with the need for the complex templates from days gone by and enables developers
    to build more modern, responsive, and consistent applications without needing
    to know the intricate details of HTML, CSS, or APEX template design.


    The new Universal Themes (Desktop theme 42 and Mobile theme 51) allow you to adjust
    a number of attributes with what is called a Theme Style—a Cascading Style Sheet
    (CSS) that is added to the base CSS. This can be done via the new Theme Roller
    tool, allowing you to visually alter a theme. The Universal Themes also allow
    you to easily customize how items on the page are displayed by using Template
    Options.


    After having been in the cards for quite some time, the Flexible Workspace Authentication
    has finally been implemented by the APEX team; this allows APEX administrators
    to define how APEX itself will authenticate developers. Much like APEX applications,
    workspaces may now be authenticated against Single Sign-On servers, LDAP, and
    so forth.


    Interactive Reports are no longer limited to being one-per-page, freeing you from
    the restriction that had plagued them since their inception. Interactive Reports
    also get a few new features. A Pivot View has been added that allows end users
    to select the column(s) and provide the function(s) by which to pivot the report.
    This was functionality previously available only by either a lot of hand coding
    or by creating or using plug-ins. When using the new Universal Theme, Report column
    headers can now be defined so that they remain fixed in position while the user
    scrolls down the page.


    Native support for Dialog page types has been introduced, thus allowing any page
    to be displayed either normally or as a pop-up dialog. Pages can be defined as
    either “Modal” or “Non-Modal.” Modal pages do not allow the end user to interact
    with the underlying page, whereas Non-Modal pages allow such interaction.


    New jQuery Mobile and Tablet themes have been introduced and make use of the newer
    features of the latest jQuery Mobile libraries. Panels, pop-ups, and dialogs (among
    other things) are now all available in the mobile interface.


    An improved charting engine provides enhanced performance for large datasets.
    Improvements to accessibility for the visually impaired have been added. A new
    `APEX_AUTHORIZATION` package has been added to aid in the management of authorization
    within an application. And the list goes on.


    As you can see, the APEX core functionality continues to grow with each release.
    But what you may not know is that you can help drive the future direction of APEX.
    By going to the following URL, you can not only request new features, but also
