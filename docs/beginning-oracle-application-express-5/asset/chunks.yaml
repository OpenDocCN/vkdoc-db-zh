  raw: '### More Recent History


    Around 1999, Oracle CEO Larry Ellison presented Mike Hichwa (VP of Software Development)
    with the task of creating an internal calendaring and scheduling system for Oracle
    Corp. The original remit was to use WebDB to generate the initial code and then
    hand-code all the changes from that point forward. Mike, however, saw this as
    an opportunity to completely rewrite WebDB into something that could be far more
    useful. Thus, with the help of Joel Kallman and Tom Kyte, Oracle Flows was born.


    Based on the success of the internal calendaring and scheduling system, the team
    was allowed to move forward toward making Oracle Flows a product. In 2001, using
    what was then known as Flow Builder, Mike and his team began implementing systems
    for various customers, including one situation where they managed to replace a
    Java development project that was going horribly wrong.


    By 2003, the team had proven the tool’s power, and they were given permission
    to release it as a product. HTML DB 1.5 was released to the public as a no-cost
    option of Oracle 10gR1.


    Since then, various releases have been introduced, each providing improved features
    and functionality. The following is a very brief list of the releases and some
    of the more notable features:


    *   HTML DB 1.6 (2004) introduced themes, master-detail forms, page groups, page
    locking, and some multilingual capabilities.

    *   HTML DB 2.0 (2005) introduced SQL Workshop, a graphical query builder, a database
    object browser, and session-state protection.

    *   APEX 2.2 (2006) introduced packaged applications, the APEX dictionary views,
    and the access control wizard.

    *   APEX 3.0 (2007) introduced PDF printing with BI Publisher, migration from
    Microsoft Access, and page and region caching.

    *   APEX 3.1 (2008) introduced interactive reports, the runtime-only installation
    capability, and improved security.

    *   APEX 3.2 (2009) introduced a migration helper for Oracle Forms–based systems
    and various security enhancements.

    *   APEX 4.0 (2010) was a huge leap forward, introducing dynamic actions and plug-ins—declarative
    ways to introduce server-side logic and extend the core APEX environment, respectively.
    Also introduced was the new Team Development module.

    *   APEX 4.1 (2011) included a new user-facing data-uploading feature, enhanced
    error-handling capabilities, and much-improved support for tabular forms.

    *   APEX 4.2 (2012) originally introduced some new themes as well as enhancements
    to the debugging API, but over its more than two-year life span, patch releases
    introduced such changes as HTML 5 charting and deeper security enhancements.


    ### APEX 5.0 and the Future


    And so we arrive at the release of APEX 5.0\. While the changes introduced with
    versions 4.0 through 4.2 undoubtedly changed the landscape of APEX development,
    the changes introduced in version 5.0 have brought APEX to a point where it can
    rightly be compared with many of the popular desktop-based development environments.


    The original focus of APEX 5.0 was to make development of rich, interactive web
    applications easier by providing the developer with a vastly enhanced development
    environment. However, the development team has introduced so many new features—indeed,
    new ways to attack problems—that it will be hard not to choose APEX as the preferred
    development platform for Oracle-based applications.


    APEX’s new Page Designer Integrated Development Environment (IDE) completely changes
    the way developers will interact with page design. Modeled after many of the popular
    desktop IDEs, developers now interact with items, placement, attributes, and actions
    all on one page. A new drag-and-drop page-layout interface has been introduced
    that allows developers to easily position regions and items. Group editing allows
    developers to edit the attributes of several items at once. The only downside
    to the new Page Designer is that you may find yourself wanting a bit more screen
    real estate due to the nature of its layout. However, with widescreen monitors
    becoming ubiquitous, this shouldn’t be an issue for most.


    Apart from the new Page Designer IDE, one of the most exciting new features of
    APEX 5.0 is the Universal Theme. This new application user interface does away
    with the need for the complex templates from days gone by and enables developers
    to build more modern, responsive, and consistent applications without needing
    to know the intricate details of HTML, CSS, or APEX template design.


    The new Universal Themes (Desktop theme 42 and Mobile theme 51) allow you to adjust
    a number of attributes with what is called a Theme Style—a Cascading Style Sheet
    (CSS) that is added to the base CSS. This can be done via the new Theme Roller
    tool, allowing you to visually alter a theme. The Universal Themes also allow
    you to easily customize how items on the page are displayed by using Template
    Options.


    After having been in the cards for quite some time, the Flexible Workspace Authentication
    has finally been implemented by the APEX team; this allows APEX administrators
    to define how APEX itself will authenticate developers. Much like APEX applications,
    workspaces may now be authenticated against Single Sign-On servers, LDAP, and
    so forth.


    Interactive Reports are no longer limited to being one-per-page, freeing you from
    the restriction that had plagued them since their inception. Interactive Reports
    also get a few new features. A Pivot View has been added that allows end users
    to select the column(s) and provide the function(s) by which to pivot the report.
    This was functionality previously available only by either a lot of hand coding
    or by creating or using plug-ins. When using the new Universal Theme, Report column
    headers can now be defined so that they remain fixed in position while the user
    scrolls down the page.


    Native support for Dialog page types has been introduced, thus allowing any page
    to be displayed either normally or as a pop-up dialog. Pages can be defined as
    either “Modal” or “Non-Modal.” Modal pages do not allow the end user to interact
    with the underlying page, whereas Non-Modal pages allow such interaction.


    New jQuery Mobile and Tablet themes have been introduced and make use of the newer
    features of the latest jQuery Mobile libraries. Panels, pop-ups, and dialogs (among
    other things) are now all available in the mobile interface.


    An improved charting engine provides enhanced performance for large datasets.
    Improvements to accessibility for the visually impaired have been added. A new
    `APEX_AUTHORIZATION` package has been added to aid in the management of authorization
    within an application. And the list goes on.


    As you can see, the APEX core functionality continues to grow with each release.
    But what you may not know is that you can help drive the future direction of APEX.
    By going to the following URL, you can not only request new features, but also
    view and vote on features that others have requested. You need an Oracle Technical
    Network account, but it’s free and easy to sign up:


    [`https://apex.oracle.com/pls/apex/f?p=55447:1`](https://apex.oracle.com/pls/apex/f?p=55447:1)


    To get a view of what the APEX team is committed to providing, you can read the
    most recent Statement of Direction (SoD). It may take a short time after a release
    for this to be updated, but it normally contains an overview of the main functional
    areas for the next planned release. You can find the SoD at the following URL:


    [`www.oracle.com/technetwork/developer-tools/apex/application-express/apex-sod-087560.html`](http://www.oracle.com/technetwork/developer-tools/apex/application-express/apex-sod-087560.html)


    ## What You Need to Get Started


    The goal of this book is to get you started using APEX, to launch you in a way
    that enables you to grow toward mastery of the product. To begin, you need three
    things: access to an APEX instance, access to a web browser, and a copy of SQL
    Developer.'
  trans: '### 近期历史


    大约在 1999 年，Oracle 公司首席执行官拉里·埃里森交给软件开发副总裁迈克·希瓦一项任务，为 Oracle 公司创建一个内部的日历和日程安排系统。最初的方案是使用
    WebDB 生成初始代码，然后从此处开始手动编写所有更改。然而，迈克将此视为一个机会，可以将 WebDB 完全重写成更有用的东西。因此，在乔尔·卡尔曼和汤姆·凯特的帮助下，Oracle
    Flows 诞生了。


    基于内部日历和日程安排系统的成功，该团队获准继续推进，将 Oracle Flows 打造成一个产品。2001 年，使用当时称为 Flow Builder 的工具，迈克和他的团队开始为各种客户实施系统，包括一个他们成功取代了一个严重偏离正轨的
    Java 开发项目的情况。


    到 2003 年，该团队已经证明了该工具的强大能力，并获准将其作为产品发布。HTML DB 1.5 作为 Oracle 10gR1 的一个免费选项向公众发布。


    此后，陆续推出了多个版本，每个版本都提供了改进的功能和特性。以下是版本及其一些较显著功能的简要列表：


    *   HTML DB 1.6（2004 年）引入了主题、主从表单、页面组、页面锁定以及一些多语言功能。

    *   HTML DB 2.0（2005 年）引入了 SQL 工作坊、图形化查询构建器、数据库对象浏览器和会话状态保护。

    *   APEX 2.2（2006 年）引入了打包应用程序、APEX 字典视图和访问控制向导。

    *   APEX 3.0（2007 年）引入了与 BI Publisher 集成的 PDF 打印、从 Microsoft Access 迁移的功能，以及页面和区域缓存。

    *   APEX 3.1（2008 年）引入了交互式报表、仅运行时安装能力以及改进的安全性。

    *   APEX 3.2（2009 年）引入了用于 Oracle Forms 系统的迁移助手以及各种安全增强功能。

    *   APEX 4.0（2010 年）是一次巨大的飞跃，引入了动态操作和插件——分别是声明式引入服务端逻辑和扩展核心 APEX 环境的方式。同时还引入了新的团队开发模块。

    *   APEX 4.1（2011 年）包含了新的面向用户的数据上传功能、增强的错误处理能力以及对表格化表单大幅改进的支持。

    *   APEX 4.2（2012 年）最初引入了一些新主题以及对调试 API 的增强，但在其两年多的生命周期中，补丁版本引入了诸如 HTML 5 图表和更深层次安全增强等变化。


    ### APEX 5.0 与未来


    于是我们迎来了 APEX 5.0 的发布。虽然 4.0 至 4.2 版本引入的变化无疑改变了 APEX 开发的格局，但 5.0 版本引入的变化已将 APEX
    提升到了一个可以正当地与许多流行的基于桌面的开发环境相媲美的高度。


    APEX 5.0 最初的重点是通过为开发人员提供一个大幅增强的开发环境，使开发丰富的交互式 Web 应用程序变得更加容易。然而，开发团队引入了如此多的新功能——实际上是解决问题的新方法——以至于很难不选择
    APEX 作为基于 Oracle 应用程序的首选开发平台。


    APEX 新的**页面设计器集成开发环境**完全改变了开发人员与页面设计交互的方式。它仿照许多流行的桌面 IDE，让开发人员现在可以在一个页面上同时处理项目、布局、属性和操作。引入了新的拖放式页面布局界面，允许开发人员轻松定位区域和项目。分组编辑允许开发人员一次性编辑多个项目的属性。新的页面设计器唯一的缺点是，由于其布局特性，你可能会发现自己需要更多的屏幕空间。然而，随着宽屏显示器变得普及，这对大多数人来说应该不是问题。


    除了新的页面设计器 IDE 之外，APEX 5.0 最令人兴奋的新功能之一是**通用主题**。这个新的应用程序用户界面摒弃了过去复杂的模板，使开发人员无需了解
    HTML、CSS 或 APEX 模板设计的复杂细节，就能构建更现代、响应式和一致的应用程序。


    新的通用主题允许你通过所谓的**主题样式**——一种添加到基础 CSS 上的层叠样式表来调整许多属性。这可以通过新的**主题滚轮**工具完成，让你能够直观地修改主题。通用主题还允许你通过使用**模板选项**轻松自定义页面上项目的显示方式。


    经过相当长一段时间的规划，**灵活工作区认证**终于由 APEX 团队实现；这允许 APEX 管理员定义 APEX 本身将如何认证开发人员。与 APEX 应用程序类似，工作区现在可以针对单点登录服务器、LDAP
    等进行认证。


    **交互式报表**不再局限于每页一个，这使你摆脱了自其诞生以来就困扰它们的限制。交互式报表还获得了一些新功能。添加了一个**数据透视视图**，允许最终用户选择列并提供用于透视报表的函数。这是以前只能通过大量手动编码或创建/使用插件才能实现的功能。当使用新的通用主题时，报表列头现在可以定义为在用户向下滚动页面时保持固定位置。


    引入了对**对话框页面类型**的原生支持，从而允许任何页面以正常方式显示或作为弹出对话框显示。页面可以定义为“模态”或“非模态”。模态页面不允许最终用户与底层页面交互，而非模态页面则允许此类交互。


    引入了新的**jQuery Mobile 和平板主题**，并利用了最新 jQuery Mobile 库的较新功能。面板、弹出窗口和对话框（以及其他功能）现在都在移动界面中可用。


    改进的图表引擎为大数据集提供了增强的性能。为视障人士添加了无障碍访问改进。添加了一个新的`APEX_AUTHORIZATION`程序包，以帮助管理应用程序内的授权。等等，不一而足。


    如你所见，APEX 的核心功能随着每个版本不断增长。但你可能不知道的是，你可以帮助推动 APEX 的未来发展方向。通过访问以下 URL，你不仅可以请求新功能，还可以查看并投票支持其他人请求的功能。你需要一个
    Oracle 技术网络账户，但注册是免费且简单的：


    [`https://apex.oracle.com/pls/apex/f?p=55447:1`](https://apex.oracle.com/pls/apex/f?p=55447:1)


    要了解 APEX 团队承诺提供的功能，你可以阅读最新的**发展方向声明**。发布后可能需要一小段时间才会更新此文档，但它通常包含下一个计划发布版本主要功能领域的概述。你可以在以下
    URL 找到 SoD：


    [`www.oracle.com/technetwork/developer-tools/apex/application-express/apex-sod-087560.html`](http://www.oracle.com/technetwork/developer-tools/apex/application-express/apex-sod-087560.html)


    ### 入门所需


    本书的目标是让你开始使用 APEX，以一种能够让你朝着精通该产品的目标成长的方式引导你。首先，你需要三样东西：对一个 APEX 实例的访问权限、一个网络浏览器以及一份
    SQL Developer。'
- fmt: '# 2. A Developer’s Overview


    ## 准备工作


    ### Access to an APEX Instance


    This is definitely a hands-on book, so to work through the examples and exercises
    you need access to an instance of APEX 5.0. There are a number of different ways
    you can access APEX; depending on your level of comfort and expertise with Oracle,
    some may be better for you than others. Here is a description of the three most
    common scenarios:


    *   By far the easiest is to sign up for an account on Oracle’s hosted version
    of APEX at [`https://apex.oracle.com`](https://apex.oracle.com/). It’s free for
    nonproduction applications and is a great place to get started, because you don’t
    have to worry about installing either the database or APEX.

    *   If you already have an Oracle database installed locally, you can download
    and install APEX 5.0 into that instance. Simply go to the Oracle APEX home page
    at [`http://otn.oracle.com/apex`](http://otn.oracle.com/apex) and download the
    latest version of the software.

    *   If you don’t have an Oracle database already but would like to install one
    locally, you can download a free developer’s license version of the database from
    Oracle Technology Network (OTN) at [`http://otn.oracle.com/database`](http://otn.oracle.com/database).
    Both Oracle 11g and 12c run APEX 5.0. Both allow you to install APEX (albeit an
    earlier version) as an option during the database install.


    Although having a locally accessible instance of the Oracle database gives you
    more direct access to the data, it’s definitely not necessary for completing the
    exercises in this book. All code and instructions have been written so that they
    can be completed on Oracle’s hosted instance with no special access required.


    Note


    Oracle provides very good documentation on the installation process for both the
    database and APEX, so it isn’t covered in detail here. However, if you’re planning
    to install APEX on an environment in your organization, you should coordinate
    with the database administrator responsible for that instance to ensure that no
    mishaps occur.


    ### Web Browser


    The APEX documentation states that to view or develop APEX applications, you must
    have a web browser that supports cookies, JavaScript, HTML 5, and CSS 3. However,
    although you can deploy to any browser that supports these things, the list of
    supported browsers is fairly narrow. Currently, the following browsers are supported:
    Internet Explorer 9+, Firefox 35+, Apple’s Safari 7+, and Google Chrome 40+.


    Without getting into a religious debate about which web browser is the best on
    the market, the author’s preference for development is either Firefox or Chrome
    due to the number of developer tools and add-ons that can help you with APEX development.
    Note that because of the difference in the way each browser interprets HTML and
    JavaScript, you must test your application in any and all web browsers that your
    target audience might use.


    ### SQL Developer


    As mentioned before, all the exercises and scripts in this book can be loaded
    and run directly within the APEX interface. However, if you have chosen to install
    or have access to a local instance of the Oracle database, a SQL IDE will definitely
    make your life easier.


    SQL Developer is a free SQL and PL/SQL IDE provided by Oracle. You can download
    SQL Developer from the OTN’s home page at [`http://www.oracle.com/sqldeveloper`](http://www.oracle.com/sqldeveloper).


    Using SQL Developer, you can browse database objects, edit row data, develop and
    test stored PL/SQL program units, code and test SQL statements, and interactively
    debug PL/SQL code. SQL Developer also has many direct integration points with
    APEX that make reporting in, monitoring, and maintaining APEX instances and applications
    easier. This book doesn’t cover those, but it’s definitely worth your time to
    look into this tool.


    ## Summary


    Oracle Application Express has come a long way from its simple beginnings, and
    the APEX community is poised at the beginning of a new cycle of growth. APEX 5.0
    provides so much possibility and promise that it’s hard not to be excited about
    what the future holds. With that spirit, you’re ready to begin your journey to
    discover how APEX can make development easier and more fun.


    You’re probably anxious to get started, but there are a few concepts you should
    understand before you jump into APEX development headfirst. This chapter will
    introduce the fundamental development architecture of APEX and then walk you through
    the different areas of the developer interface.


    You will delve deeper into the details as you go through the book and put the
    architecture to work, but it will help tremendously to know how things are structured
    ahead of time. This chapter is designed to ease you in, but it isn’t a complete
    guided tour of every nook and cranny. Be patient; you’ll get there.


    ## The Anatomy of a Workspace


    APEX was designed from the beginning to be a multi-tenant architecture where many
    different development environments (called workspaces) can exist in a single APEX
    instance. For instance, `apex.oracle.com`, Oracle’s free hosted instance, holds
    over 10,000 active workspaces, each of which is a completely separate environment
    unable to see or interact with any of the others. You can think of this as Software
    as a Service (SaaS) or a cloud-computing architecture, but basically it means
    each workspace is distinct and segregated from all others.


    In simple terms, each workspace represents a virtual private container in which
    developers create and deploy their APEX applications. The development process
    takes place in the context of a workspace, so it’s important to know how a workspace
    is structured. Figure [2-1](#A978-1-4842-0466-5_2_Chapter.html#Fig1) uses database
    entity-relationship diagram parlance to help explain the makeup of the objects
    in a workspace.


    ![A978-1-4842-0466-5_2_Fig1_HTML.gif](A978-1-4842-0466-5_2_Fig1_HTML.gif)


    Figure 2-1. Logical makeup of a workspace


    A workspace may have:


    *   One to many users: These users may one of three types: Administrator, Developer,
    or End User.

    *   Zero to many applications: Applications can be added from the list of packaged
    applications, imported, or created from scratch.

    *   One to many schemas: Although a workspace must be assigned at least one schema
    when it’s created, an Instance Administrator may assign multiple schemas to a
    workspace.


    There can be many applications and many schemas in a workspace, but an application
    may only parse as one (and only one) schema, which can only be set during development.
    The following sections delve more deeply into this to give you a full understanding
    of how these concepts relate.'
