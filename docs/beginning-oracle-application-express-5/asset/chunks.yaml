  trans: '

    ## APEX URL 语法


    每个 APEX 页面都是对 APEX 引擎的一次调用。每个 APEX URL 实际上都是对特定页面的调用，并传递各种参数。图 6-46 展示了 URL 语法。


    ![A978-1-4842-0466-5_6_Fig46_HTML.jpg](img/A978-1-4842-0466-5_6_Fig46_HTML.jpg)


    图 6-46. APEX URL 语法


    `f?p` 是对 `f` PL/SQL 过程的调用，传递参数 `p`。该参数实际上是九个参数的串联组合，以冒号分隔。`p` 参数的这九个元素对于所有 APEX
    页面请求都是相同的。你可以省略一个或多个参数，但必须包含冒号分隔符作为占位符。


    构成 `p` 参数的元素如下：


    *   `APP_ID`：应用程序编号或别名

    *   `APP_PAGE_ID`：页面编号或别名

    *   `APP_SESSION`：APEX 会话标识符

    *   `REQUEST`：HTML 请求

    *   `DEBUG`：调试标志，设置为 `YES` 或 `NO`，或省略以使用调试标志的当前值

    *   `Clear Cache`：要清除缓存的页面列表

    *   Item names：APEX 项名称列表，以逗号分隔

    *   Item values：APEX 项值列表，以逗号分隔，与项名称列表中指定的项顺序对应

    *   `Printer Friendly`：决定页面是否以打印机友好模式呈现的标志


    通过查看几个示例来理解 APEX URL 语法最为容易。表 6-1 展示了几个示例并进行了解释。


    表 6-1. APEX URL 示例


    | URL | 描述 |

    | --- | --- |

    | `f?p=&APP_ID.:10:&APP_SESSION.:::10` | 使用当前会话调用当前应用程序的第 10 页，并清除第 10 页的会话缓存
    |

    | `f?p=&APP_ID.:5:&APP_SESSION.::NO::P2_ID:1234` | 使用当前会话调用当前应用程序的第 5 页，不处于调试模式，将
    `P2_ID` 的值设置为 1234 |

    | `f?p=&APP_ID.:5:&APP_SESSION.::YES` | 使用当前会话以调试模式调用当前应用程序的第 5 页 |


    如你所见，APEX URL 不仅为服务器提供了指示，也是你了解正在请求哪个页面、使用什么请求以及携带什么值的关键。那么，这种 URL 语法如何与你在“服务台”应用程序中的工作联系起来呢？


    APEX 应用程序将所有值存储在 APEX 会话中，该会话安全地绑定到特定用户和用户会话。存储在此用户会话中的值可以由开发人员轻松设置或读取。任何项——应用程序级或页面级——都可以从
    APEX 应用程序内的任何位置轻松引用。这些值可以作为 `p` 参数的一部分被引用并传递给 APEX，以控制呈现哪个 APEX 页面以及该页面上显示的值。


    随着系统中数据量的增长，你需要一种快速的方法来对其进行排序并控制将什么数据传递到哪个页面。你可以添加一个页面项，然后使用该项的值来过滤应用程序第 200 页报表的
    SQL 语句。实际上，APEX 中的项可以通过使用绑定变量语法 (`:P1_ITEM_NAME`) 在 SQL 或 PL/SQL 区域中被引用，例如在查询的谓词中，也可以作为
    APEX URL 的一部分被引用。


    回到向导生成的“工单”报表，你可以应用刚刚学到的关于会话状态、APEX 项和 APEX URL 的知识，添加一个名为 `P200_SEARCH` 的新项，用户可以使用它来过滤报表。完成这些报表修改后，让我们更仔细地看看
    APEX 报表的组件和属性。


    ## 可搜索的 APEX 报表


    带有“编辑”链接的报表允许用户扫描行列表并选择一行进行修改。扫描对于较短的报表效果很好，但当报表较长，特别是超过一两页时，就需要添加一些搜索功能来帮助用户快速定位要编辑的记录。


    ### 创建可搜索的 APEX 报表


    你已经修改了由主详细信息表单向导生成的“工单”报表，添加了排序、CSV 导出功能和可读的状态值。按生成时的样式，报表的第一列有一个“编辑”链接，该链接导航到“工单—工单详情”主详细信息表单。为了让用户找到要编辑的正确工单，你需要一个搜索功能。在接下来的步骤系列中，你将添加一个搜索项和一个“执行”按钮来激活搜索，并将修改报表查询以根据搜索值进行过滤。我们将使用两种不同的方法将这些项放置在网格布局中。要知道两种方法效果相当；使用哪种取决于你更习惯哪一种。首先，让我们创建搜索字段：


    1.  编辑应用程序的第 200 页。

    2.  通过右键单击“工单”区域名称并选择“创建页面项”，在该区域中创建一个新项。

    3.  在“属性编辑器”中，为“名称”输入 `P200_SEARCH`，并将“标签”设置为 `搜索`，如图 6-47 所示。


    ![A978-1-4842-0466-5_6_Fig47_HTML.jpg](img/A978-1-4842-0466-5_6_Fig47_HTML.jpg)


    图 6-47. 设置新创建项的属性


    4.  在“设置”属性组中，将“按下回车键时提交”属性的值设置为“是”。尽管你刚刚设置了项属性以在按下 Enter 键时提交页面，但提供一种使用鼠标提交页面的方法仍然是个好习惯。接下来，你将使用组件库并通过拖放来创建一个新按钮，该按钮在被点击时处理项值，将其存储在会话状态中，然后重新加载第
    200 页：

    5.  在屏幕底部的“组件库”中，选择“按钮”作为组件类型。点击并拖动“文本”按钮，将其直接放置在你上一步创建的 `P200_SEARCH` 项旁边，如图
    6-48 所示。


    ![A978-1-4842-0466-5_6_Fig48_HTML.jpg](img/A978-1-4842-0466-5_6_Fig48_HTML.jpg)


    图 6-48. 为搜索功能创建“执行”按钮


    6.  在“属性编辑器”中，输入 `P200_GO` 作为“按钮名称”，`执行` 作为“标签”。保持所有其他属性不变。接下来，你将调整报表查询以应用 `P200_SEARCH`
    过滤器。你将在查询谓词中添加一行，使用存储在 `P200_SEARCH` 中的值作为过滤器：

    7.  通过在“渲染”树中单击其名称来编辑“工单”区域定义。

    8.  单击“SQL 查询”属性右上角的“代码编辑器”按钮。

    9.  将以下行附加到查询末尾，然后单击“确定”：


    ```

    AND UPPER(subject) LIKE ''%''||UPPER(:P200_SEARCH)||''%''

    ```


    10. 保存并运行你的报表。记得同时测试按钮和在编辑搜索字段时按回车键。两者都应能正确过滤报表。

