  trans: '# 导出设置


    *   `导出支持对象定义`：决定是否将已上传的任何支持对象随应用程序一起导出。完整描述请参见本章后面的“支持对象”部分。

    *   `导出公共交互式报表`：决定由最终用户保存并标记为公共的报表定义是否作为应用程序的一部分导出。

    *   `导出私有交互式报表`：决定由最终用户保存并标记为私有的报表定义是否作为应用程序的一部分导出。

    *   `导出交互式报表订阅`：决定交互式报表的用户订阅信息是否作为应用程序的一部分导出。

    *   `导出开发者注释`：决定开发者针对 APEX 组件输入的任何注释是否作为应用程序的一部分导出。

    *   `导出翻译`：决定翻译映射信息是否作为应用程序的一部分导出。无论此处选择何种设置，翻译文本消息和动态翻译始终包含在应用程序导出中。

    *   `使用原始 ID 导出`：决定导出文件应包含应用程序组件当前的 ID，还是包含此应用程序上次导入时的 ID。


    选择适当的设置后，单击 `导出` 按钮以生成应用程序导出。系统会提示您将其保存到本地计算机。导出文件名由字母 `f` 后跟应用程序 ID 组成，扩展名为 `.sql`。例如，ID
    为 `9239` 的应用程序命名为 `f9239.sql`。


    下载的文件包含一个大型文本脚本，定义了在 APEX 中构建的应用程序的所有内容。除了应用程序页面外，还包括共享组件，如身份验证方案、授权方案、应用程序中的主题、UI
    设置、报表等。此脚本可以导入到同一工作区、不同的工作区，甚至不同的服务器中。


    # 支持对象


    应用程序导出捕获应用程序的完整定义，包括大多数共享组件，但它不包含在另一台服务器上完全重建应用程序所需的一切。但是，APEX 提供了一项功能，允许您将诸如底层数据库表之类的脚本打包到应用程序导出中。此功能称为支持对象。


    支持对象功能实际上提供了比这更强大的功能。它还提供了创建和控制安装、以及升级和卸载任何可以使用 SQL 编写脚本的内容的能力。


    您可以通过导航到应用程序的 `共享组件` 页面，然后从 `任务` 菜单中选择 `管理支持对象` 选项来访问支持对象管理界面。图 10-10 显示了支持对象主页。


    ![A978-1-4842-0466-5_10_Fig10_HTML.jpg](img/A978-1-4842-0466-5_10_Fig10_HTML.jpg)


    *图 10-10. 支持对象管理主页*


    该页面分为几个区域。顶部的 `摘要` 区域显示了当前在支持对象中定义的内容，下方的三个区域（`安装`、`升级` 和 `卸载`）允许您编辑脚本并定义在每个阶段可用的操作。


    单击任何链接将转到带选项卡的定义页面，如图 10-11 所示。


    ![A978-1-4842-0466-5_10_Fig11_HTML.jpg](img/A978-1-4842-0466-5_10_Fig11_HTML.jpg)


    *图 10-11. 支持对象选项卡定义屏幕*


    通过此页面上的选项卡，您可以定义在三个阶段中的每个阶段要执行的操作以及应运行的任何脚本。虽然我们不会在此处显示每个选项卡内容的图片，但在本节中，我们将逐一介绍它们，讨论其内容和目的，最后介绍
    `消息` 选项卡。


    ## 先决条件


    此部分定义应运行哪些内置检查，以确保应用程序安装到的数据库架构具有适当的权限。您可以提供应用程序正常工作所需的最小空间量。在安装时，系统会检查“解析为”架构的默认表空间，以确保有足够的可用空间。您还可以检查以确保架构具有以下任何特定权限：


    `CREATE DATABASE LINK`


    `CREATE MATERIALIZED VIEW`


    `CREATE PROCEDURE`


    `CREATE SEQUENCE`


    `CREATE SYNONYM`


    `CREATE TABLE`


    `CREATE TRIGGER`


    `CREATE TYPE`


    `CREATE VIEW`


    页面底部区域允许您列出支持对象安装脚本将创建的所有对象。在安装时，如果列出的任何对象已存在，安装将不会继续，因为可能存在冲突。安装应用程序的用户会收到有关已发现哪些对象已存在的详细信息。


    此部分的范围可能看起来有点有限，但稍后讨论的 `验证` 部分允许进行更自由格式的先决条件检查。


    ## 替换


    此部分提供了允许安装用户在安装时定义应用程序级替换字符串值的能力。虽然替换字符串旨在用作静态变量，但您可能并不总是在安装前知道这些字符串的值应该是什么。通过此界面，您可以选择要让安装用户定义的替换变量以及每个变量的提示是什么。


    替换变量不常用，因此此功能也不太可能被使用。但是，如果需要，知道它存在是好的。


    ## 构建选项


    在 第 13 章 中，我们将讨论构建选项以及它们可用于排除或隐藏已分配功能的事实。此部分允许您选择您定义的构建选项是否对安装用户可用。通过选择一个构建选项，系统将提示用户是否希望包含或排除与该构建选项关联的功能。


    大多数情况下，将应用程序迁移到生产环境时，您希望排除所有构建选项。


    ## 验证


    此部分允许您定义要运行的任意数量的预安装验证。这些验证类似于普通的页面验证，并允许完全控制应用程序安装是否可以继续。您可以根据需要进行任意多个验证，并且验证也可以是有条件的。


    如果任何验证失败，安装将停止，并向用户显示失败验证中定义的错误消息。'
- fmt: '### Install


    这是支持对象的核心部分，在此处定义要运行的脚本以及安装应用程序正常工作所需的所有对象的顺序。您可以在此处创建和管理用于安装数据库对象、工作区或应用程序镜像、CSS
    文件、静态文件等的脚本。根据所包含脚本的类型，您可能能够以不同的方式创建它们。


    对于创建底层数据库对象的脚本，您可能已经使用过诸如`SQL Developer`或`SQL Workshop''s Generate DDL tool`之类的工具来生成脚本到文件。


    您可以选择上传预先创建的脚本文件、从头开始创建脚本，或基于应用程序的“parse as”模式中数据库对象的定义来创建脚本。您可以通过图[10-12](#A978-1-4842-0466-5_10_Chapter.html#Fig12)所示的`Create
    Script wizard`来完成此操作。


    ![A978-1-4842-0466-5_10_Fig12_HTML.jpg](A978-1-4842-0466-5_10_Fig12_HTML.jpg)


    图 10-12. `Create Script wizard`


    选择`Create from Scratch`会向您展示一个脚本编辑屏幕，您可以在此从头输入脚本步骤或从文本编辑器复制粘贴脚本。但是，如果脚本已存储在文件中，您可能需要使用`Create
    from File`选项，该选项允许您从本地计算机上传脚本。


    `Create from Database Object`选项会向您展示一个向导，允许您选择应用程序“parse as”模式中存在的哪些对象包含在脚本中。一旦选择了对象，向导会为您构建创建脚本并呈现以供编辑。然后，您可以将脚本保存为支持对象安装序列的一部分。


    从数据库对象创建脚本的主要区别在于，`APEX`会记录您选择了哪些对象，并允许您返回并针对底层的“parse as”模式刷新脚本，添加您可能需要的新对象，甚至删除不需要的对象。这比使用外部脚本生成工具可能更有用，因为它直接集成到应用程序导出中。但是，某些IT部门要求将底层数据库对象创建脚本与应用程序导出分开，作为控制点。再次强调，请确保您了解公司用于将应用程序迁移到生产环境的流程并遵循标准。


    无论脚本如何生成，一旦创建脚本，您都可以更改脚本的名称、其执行顺序以及运行它的条件。


    无论您是有多个脚本（每个对象或对象类型一个）还是一个创建所有所需对象的大型脚本，完全取决于您自己。只需确保如果您选择拥有多个脚本，您按界面中列出的顺序测试它们的执行，以确保任何依赖关系都被考虑在内。


    ### Upgrade


    `Upgrade`选项卡与`Install`选项卡非常相似，因为它允许您创建或上传脚本。但在这种情况下，脚本用于升级现有应用程序的支持对象（如果安装程序发现应用程序已安装在工作区中）。


    安装程序通过让您编写查询来检查模式中是否存在支持对象来实现此功能。如果查询返回一行或多行，则运行升级脚本集来代替安装脚本集。


    ### Deinstall


    此部分允许您定义单个脚本，用于删除由安装或升级脚本创建的对象。当您为支持对象文件生成安装脚本时，用于卸载这些文件的API调用会自动添加到卸载脚本中。但是，您需要手动添加必要的代码来删除相应的数据库对象。


    ### Export


    `Export`选项卡仅允许您设置在导出应用程序时是否包含支持对象的默认值。此选项也可在“支持对象”主屏幕上使用。


    ### Messages


    `Messages`页面让您能够控制在安装应用程序时向安装用户显示的文本。您可以编辑的部分文本如下：


    *   `Welcome`：成功导入并安装应用程序定义后，安装向导会提示用户为应用程序安装支持对象。此消息介绍应用程序并描述安装脚本的操作。

    *   `License`：如果使用此应用程序需要用户接受许可证，请在此处输入许可证文本。在安装支持对象之前，系统会提示用户接受该消息。如果许可证没有文本，则在安装向导中跳过此步骤。

    *   `Application Substitutions`：介绍应用程序替换提示。它应该说明这些值不易更改，并在输入前确保其值正确。如果没有应用程序替换变量需要输入，则不显示此消息。

    *   `Build Options`：介绍可供用户选择的构建选项。如果没有可用的构建选项，则跳过该步骤且不显示消息。

    *   `Validations`：介绍在安装支持对象之前将执行的验证。如果没有验证，则跳过该步骤且不显示消息。

    *   `Confirmation`：在运行安装脚本和应用配置选项之前显示。

    *   `Post-Installation Success`：在应用程序的支持对象已成功安装且无错误后显示。

    *   `Post-Installation Failure`：在应用程序的支持对象脚本运行后显示，但仅限于发生错误的情况。用户可以查看发生的错误。

    *   `Upgrade Welcome Message`：提供一条消息，告知用户安装程序检测到预先存在的支持对象，现在将运行升级向导。

    *   `Upgrade Confirmation Message`：在运行升级脚本之前呈现一条消息，允许用户选择是否继续。

    *   `Upgrade Success Message`：在支持对象升级脚本成功运行且无错误后显示。

    *   `Upgrade Failure Message`：在支持对象升级脚本运行后显示，但仅限于发生错误的情况。用户可以查看发生的错误。

    *   `Deinstallation Message`：在运行支持对象卸载脚本之前呈现。

    *   `Post-Deinstall Message`：在运行支持对象卸载脚本后立即呈现。


    注意


    由于所有脚本类型都是标准的`SQL`和`PL/SQL`，您可以选择编写相当复杂的逻辑，在脚本内部决定要采取的步骤。但是，各个脚本之间没有交互性或共享的会话状态，因此您不能在第一个脚本中决定是否运行第二个或第三个脚本。无论先前脚本的结果如何，集合中的每个脚本都将运行。仅在所有脚本运行完毕后才显示错误。


    构建包含支持对象的打包应用程序的过程可能令人生畏。好消息是，在标准的`IT`环境中，很少使用支持对象来处理迁移数据库对象的脚本。尽管支持对象非常有用，但它们倾向于适用于诸如
    shrink-wrapped 软件之类的情况，即应用程序被发送到远程站点，与安装用户几乎没有直接交互。


    对于在单个组织内开发和部署的应用程序，可能已存在用于将应用程序迁移到生产环境的规则和指南。请确保您与组织核实并遵守这些标准。'
  raw: '### Install


    This is the core of supporting objects and is where you define what scripts to
    run and in what order to install all the objects your applications need to work
    properly. Here you can create and manage scripts that install database objects,
    workspace or application images, CSS files, static files, and so on. Depending
    on the type of scripts you’re including, you may be able to create them in different
    ways.


    When it comes to scripts that create the underlying database objects, you’ve probably
    used a tool such as SQL Developer or the SQL Workshop’s Generate DDL tool to generate
    a script to a file.


    You can choose to upload a pre-created script file, to create the script from
    scratch, or to create a script based on the definition of a database object in
    the application’s “parse as” schema. You do so via the Create Script wizard shown
    in Figure [10-12](#A978-1-4842-0466-5_10_Chapter.html#Fig12).


    ![A978-1-4842-0466-5_10_Fig12_HTML.jpg](A978-1-4842-0466-5_10_Fig12_HTML.jpg)


    Figure 10-12.


    Create Script wizard


    Choosing Create from Scratch presents you with a script-editing screen where you
    can type in the script steps from scratch or copy and paste the script from a
    text editor. However, if you already have the script stored in a file, you may
    want to use the Create from File option, which allows you to upload the script
    from your local computer.


    The Create from Database Object option presents you with a wizard that allows
    you to choose which objects that exist in the application’s “parse as” schema
    to include in the script. Once you choose the objects, the wizard builds the creation
    script for you and presents it for editing. You can then save the script as part
    of the Supporting Objects installation sequence.


    The main difference when creating scripts from the database objects is that APEX
    keeps a record of which objects you chose and allows you to go back and refresh
    the script against the underlying “parse as” schema, add new objects you may need,
    or even delete ones you don’t. This is potentially much more useful that using
    an external script-generation tool as it integrates directly into the application
    export. However, some IT departments require the underlying database object–creation
    scripts to be separated from the application export as a point of control. Again,
    make sure you know what your company’s procedures are for moving applications
    to production and follow the standards.


    However it is generated, once a script has been created, you’re allowed to alter
    the script’s name, its sequence of execution, and the condition under which it
    will be run.


    Whether you have several scripts, one for each object or object type, or one large
    script that creates all the required objects is completely up to you. Just make
    sure that if you choose to have several scripts, you test their execution in the
    order they’re listed in the interface to make sure any dependencies are accounted
    for.


    ### Upgrade


    The Upgrade tab is very similar to the Install tab, as it allows you to create
    or upload scripts. But in this case, the scripts are used to upgrade an existing
    application’s supporting objects if the installer finds that the application is
    already installed in the workspace.


    The installer does this by letting you write a query to check for the preexistence
    of supporting objects in the schema. If the query returns one or more rows, then
    the upgrade script set is run in place of the install script set.


    ### Deinstall


    This section allows you to define a single script that drops the objects created
    by the install or upgrade scripts. When you generate install scripts for supporting-object
    files, API calls to deinstall these files are added to the deinstall script automatically.
    However, you need to add the necessary code to drop the appropriate database objects
    manually.


    ### Export


    The Export tab simply lets you set the default for whether the supporting objects
    are included when you export the application. This option is also available on
    the Supporting Objects main screen.


    ### Messages


    The Messages page gives you control over the verbiage presented to the installing
    user during the installation of the application. The section text that you can
    edit is as follows:


    *   Welcome: After successfully importing and installing an application definition,
    the installation wizard prompts the user to install supporting objects for the
    application. This message introduces the application and describes the actions
    of the installation scripts.

    *   License: If the use of this application requires the user to accept a license,
    enter the license text here. The user is prompted to accept the message before
    installing supporting objects. If there is no text for the license, this step
    is skipped in the installation wizard.

    *   Application Substitutions: Introduces the application-substitution prompts.
    It should probably state that these values aren’t easily changed and to be sure
    of their values before entering them. If there are no application-substitution
    variables to be entered, this message doesn’t display.

    *   Build Options: Introduces the build options that may be available for the
    user to select. If no build options are available, the step is skipped and the
    message doesn’t display.

    *   Validations: Introduces the validations that will be performed prior to installing
    the supporting objects. If there are no validations, the step is skipped and the
    message doesn’t display.

    *   Confirmation: Displayed just prior to the installation scripts being run and
    the configuration options being applied.

    *   Post-Installation Success: Shown after the application’s supporting objects
    have been installed successfully with no errors.

    *   Post-Installation Failure: Shown after the application’s supporting object
    scripts have run, but only if errors were generated. The user can view the errors
    that occurred.

    *   Upgrade Welcome Message: Provides a message informing the user that the installer
    has detected preexisting supporting objects and that the Upgrade wizard will now
    be run.

    *   Upgrade Confirmation Message: Presents a message prior to running the upgrade
    scripts to allow the user to choose whether to continue.

    *   Upgrade Success Message: Shown after the suporting objects upgrade script
    is run successfully with no errors.

    *   Upgrade Failure Message: Shown after the suporting objects upgrade script
    is run, but only if errors were generated. The user can view errors that occurred.

    *   Deinstallation Message: Presented just prior to running the supporting objects
    deinstallation script.

    *   Post-Deinstall Message: Presented just after running the suporting objects
    deinstallation Scrip.


    Note


    Because all script types are standard SQL and PL/SQL, you have the option of writing
    quite complex logic that can decide within the script what steps to take. However,
    there is no interactivity or shared session state between the individual scripts,
    so you can’t decide in the first script whether to run the second or third scripts.
    Every script in the set will be run regardless of the result of the previous scripts.
    Errors are shown only after all scripts have been run.


    The process of building a packaged application that includes supporting objects
    can be daunting. The good news is that, in a standard IT environment, the scripts
    to migrate database objects are rarely processed using supporting objects. Although
    supporting objects are very useful, they tend to lend themselves to situations,
    such as shrink-wrapped software, in which applications are sent to remote sites
    where there is little or no direct interaction with the installing user.


    For applications that are being developed and deployed in a single organization,
    rules and guidelines are probably in place for migrating applications to production.
    Make sure you check with your organization and adhere to those standards.'
  trans: '

    ### 安装


    这是支持对象的核心部分，您在此定义要运行的脚本，以及安装应用程序正常工作所需所有对象的顺序。您可以在此创建和管理用于安装数据库对象、工作区或应用程序镜像、CSS
    文件、静态文件等的脚本。根据所含脚本的类型，您可能有多种创建方式。


    对于创建底层数据库对象的脚本，您可能已经使用过诸如`SQL Developer`或`SQL Workshop''s Generate DDL tool`之类的工具来将脚本生成到文件。


    您可以选择上传预先创建的脚本文件、从零开始创建脚本，或者基于应用程序“解析为”模式中数据库对象的定义来创建脚本。您可以通过图 10-12 所示的`创建脚本向导`来完成此操作。


    ![A978-1-4842-0466-5_10_Fig12_HTML.jpg](img/A978-1-4842-0466-5_10_Fig12_HTML.jpg)


    图 10-12. `创建脚本向导`


    选择`从头创建`会显示一个脚本编辑屏幕，您可以在此从头输入脚本步骤，或从文本编辑器复制粘贴脚本。但是，如果脚本已存储在文件中，您可能需要使用`从文件创建`选项，该选项允许您从本地计算机上传脚本。


    `从数据库对象创建`选项会显示一个向导，允许您选择应用程序“解析为”模式中存在的哪些对象要包含在脚本中。一旦选择了对象，向导将为您构建创建脚本并呈现以供编辑。然后，您可以将脚本保存为支持对象安装序列的一部分。


    从数据库对象创建脚本的主要区别在于，`APEX`会记录您选择了哪些对象，并允许您返回并针对底层的“解析为”模式刷新脚本，添加您可能需要的新对象，甚至删除不需要的对象。这可能比使用外部脚本生成工具更有用，因为它直接集成到应用程序导出中。但是，某些
    IT 部门要求将底层数据库对象创建脚本与应用程序导出分开，作为一个控制点。再次强调，请确保您了解公司将应用程序迁移到生产环境所使用的流程并遵循其标准。


    无论脚本如何生成，一旦创建，您就可以更改脚本的名称、其执行顺序以及运行它的条件。


    您是有多个脚本（每个对象或对象类型一个），还是一个创建所有所需对象的大型脚本，这完全取决于您自己。只需确保，如果您选择使用多个脚本，请按照界面中列出的顺序测试它们的执行，以确保任何依赖关系都被考虑在内。


    ### 升级


    `升级`选项卡与`安装`选项卡非常相似，因为它允许您创建或上传脚本。但在这种情况下，脚本用于升级现有应用程序的支持对象（如果安装程序发现应用程序已安装在工作区中）。


    安装程序通过让您编写查询来检查模式中是否存在支持对象来实现此功能。如果查询返回一行或多行，则运行升级脚本集来代替安装脚本集。


    ### 卸载


    此部分允许您定义单个脚本，用于删除由安装或升级脚本创建的对象。当您为支持对象文件生成安装脚本时，用于卸载这些文件的 API 调用会自动添加到卸载脚本中。但是，您需要手动添加必要的代码来删除相应的数据库对象。


    ### 导出


    `导出`选项卡仅允许您设置在导出应用程序时是否包含支持对象的默认值。此选项也可在“支持对象”主屏幕上使用。


    ### 消息


    `消息`页面让您能够控制在安装应用程序时向安装用户显示的文本。您可以编辑的部分文本如下：


    *   `欢迎`：成功导入并安装应用程序定义后，安装向导会提示用户为应用程序安装支持对象。此消息介绍应用程序并描述安装脚本的操作。

    *   `许可`：如果使用此应用程序需要用户接受许可证，请在此处输入许可证文本。在安装支持对象之前，系统会提示用户接受该消息。如果许可证没有文本，则在安装向导中跳过此步骤。

    *   `应用程序替换`：介绍应用程序替换提示。它应说明这些值不易更改，并在输入前确保其值正确。如果没有应用程序替换变量需要输入，则不显示此消息。

    *   `构建选项`：介绍可供用户选择的构建选项。如果没有可用的构建选项，则跳过该步骤且不显示消息。

    *   `验证`：介绍在安装支持对象之前将执行的验证。如果没有验证，则跳过该步骤且不显示消息。

    *   `确认`：在运行安装脚本和应用配置选项之前显示。

    *   `安装后成功`：在应用程序的支持对象已成功安装且无错误后显示。

    *   `安装后失败`：在应用程序的支持对象脚本运行后显示，但仅限于发生错误的情况。用户可以查看发生的错误。

    *   `升级欢迎消息`：提供一条消息，告知用户安装程序检测到预先存在的支持对象，现在将运行升级向导。

    *   `升级确认消息`：在运行升级脚本之前呈现一条消息，允许用户选择是否继续。

    *   `升级成功消息`：在支持对象升级脚本成功运行且无错误后显示。

    *   `升级失败消息`：在支持对象升级脚本运行后显示，但仅限于发生错误的情况。用户可以查看发生的错误。

    *   `卸载消息`：在运行支持对象卸载脚本之前呈现。

    *   `卸载后消息`：在运行支持对象卸载脚本后立即呈现。


    注意


    由于所有脚本类型都是标准的`SQL`和`PL/SQL`，您可以选择编写相当复杂的逻辑，在脚本内部决定要采取的步骤。但是，各个脚本之间没有交互性或共享的会话状态，因此您不能在第一个脚本中决定是否运行第二个或第三个脚本。无论先前脚本的结果如何，集合中的每个脚本都将运行。仅在所有脚本运行完毕后才显示错误。


    构建包含支持对象的打包应用程序的过程可能令人生畏。好消息是，在标准的`IT`环境中，很少使用支持对象来处理迁移数据库对象的脚本。尽管支持对象非常有用，但它们更适用于诸如
    shrink-wrapped 软件之类的情况，即应用程序被发送到远程站点，与安装用户几乎没有直接交互。


    对于在单个组织内开发和部署的应用程序，可能已存在用于将应用程序迁移到生产环境的规则和指南。请确保您与组织核实并遵守这些标准。

