- fmt: '### Configuring Feedback


    You begin configuring the feedback mechanism by creating a new page in your application.
    The Create Page wizard contains a Feedback Page option (see Figure 15-18). Select
    this option, and click the Next button.


    ![A978-1-4842-0466-5_15_Fig18_HTML.jpg](A978-1-4842-0466-5_15_Fig18_HTML.jpg)

    Figure 15-18. Feedback Page option in the Create Page wizard


    The next page in the wizard sets up the details for the Feedback page (see Figure
    15-19). You enter the page number and page name and then select a page template,
    form region template, and label template. You can also declaratively create a
    Feedback link on the application’s global navigation bar. The defaults, in most
    cases, work well.


    ![A978-1-4842-0466-5_15_Fig19_HTML.jpg](A978-1-4842-0466-5_15_Fig19_HTML.jpg)

    Figure 15-19. Feedback page set up in the Create Page wizard


    However, one attribute requires a bit more explanation because its benefit isn’t
    immediately obvious. The Extra Attributes field allows you to add up to eight
    custom fields to your Feedback page. These are sometimes called flex fields. These
    fields can be used to prompt end users for additional information when they submit
    feedback. For example, a public APEX website requires no login; therefore, the
    user’s identity can’t be captured automatically. The extra attributes can be used
    to capture the user’s name and email so the feedback response can be sent to them.


    Click the Create button and then run the application. You now see the Feedback
    link in the navigation bar (see Figure 15-20). If you can’t use the default Feedback
    link in your design, you can move it anywhere you like in your application. The
    link uses the standard APEX `f?p` syntax.


    ![A978-1-4842-0466-5_15_Fig20_HTML.jpg](A978-1-4842-0466-5_15_Fig20_HTML.jpg)

    Figure 15-20. Application with the Feedback link


    ### Polishing the Feedback Page


    When you click the Feedback link, the Feedback popup page is displayed (see Figure
    15-21). As you can see, the page needs a bit more work to polish it. Because this
    is a standard APEX page, you can complete the polishing in one or two minutes
    by clicking the Edit Page button to navigate to the Page Designer.


    ![A978-1-4842-0466-5_15_Fig21_HTML.jpg](A978-1-4842-0466-5_15_Fig21_HTML.jpg)

    Figure 15-21. Feedback page prior to some polishing


    In this example, let’s change Attribute1, Attribute2, and Attribute3 to Name,
    Department, and Email. APEX automatically added these items to the Feedback page
    (see Figure 15-22) when you selected `3` in the Extra Attributes field in the
    Create Page wizard.


    ![A978-1-4842-0466-5_15_Fig22_HTML.jpg](A978-1-4842-0466-5_15_Fig22_HTML.jpg)

    Figure 15-22. Extra attributes on the Feedback page


    Configuring the extra attributes is a two-step process. First, rename the items
    so they describe the data, change the item types from `Textarea` to an item type
    that is appropriate for the data, and rename the label to something meaningful
    to the end users (see Figure 15-23).


    ![A978-1-4842-0466-5_15_Fig23_HTML.jpg](A978-1-4842-0466-5_15_Fig23_HTML.jpg)

    Figure 15-23. Reconfiguring extra attributes


    Second, in the Page tab of the Tree Pane (see Figure 15-24), you must edit the
    Submit Feedback process so that the API calling parameters match the renamed and
    relabeled extra attributes (see Figure 15-25).


    ![A978-1-4842-0466-5_15_Fig25_HTML.jpg](A978-1-4842-0466-5_15_Fig25_HTML.jpg)

    Figure 15-25. Feedback Page Processing changes in the Submit Feedback process
    source


    ![A978-1-4842-0466-5_15_Fig24_HTML.jpg](A978-1-4842-0466-5_15_Fig24_HTML.jpg)

    Figure 15-24. Feedback Page’s Processing region


    After you complete the changes and rerun the application, you will see the finished
    Feedback page (see Figure 15-26). Enter some feedback into the page and click
    the Submit Feedback button. Then, go on to the next section and learn how to review
    the feedback that you and others have entered.


    ![A978-1-4842-0466-5_15_Fig26_HTML.jpg](A978-1-4842-0466-5_15_Fig26_HTML.jpg)

    Figure 15-26. Finished Feedback page with three extra attributes


    ### Viewing Feedback


    You can review all feedback for an application from the Team Development page.
    Navigate to that page and then click the Feedback tab. You should see results
    similar to those in Figure 15-27.


    ![A978-1-4842-0466-5_15_Fig27_HTML.jpg](A978-1-4842-0466-5_15_Fig27_HTML.jpg)

    Figure 15-27. Feedback entry


    When you drill into an individual feedback record, you will find a wealth of data
    and information that can make your life as a developer much easier. The Feedback
    region contains a read-only description of each feedback record. The Disposition
    region is where you track feedback status, tags, developer comments, and public
    response. In addition, there are three buttons: Log as Bug, Log as To Do, and
    Log as Feature. These buttons create a new Team Development entity and copy data
    from the feedback record to the new entity, which saves time and ensures accuracy.
    The Follow Up region is like a diary; it’s a list of remarks that are added over
    time as the feedback is processed. This is handy when several people must review
    the feedback before action is taken. The extra attributes that you added to the
    Feedback page are displayed in the Additional Attributes region. The remaining
    regions display read-only data that describes the application context, the runtime
    environment (browser type and version), and the entire session state. If a bug
    is reported, the developer has all the information required to reproduce the bug,
    which is a valuable benefit.


    ### Responses to Feedback


    The feedback mechanism contains a response table. In principle, responses should
    be sent to the users who initiated the feedback. However, there is no easy and
    declarative mechanism that enables you to send responses to users. If you want
    to send responses to users, you first need to address a number of design issues.
    For example, do you want to broadcast responses to all users or send individual
    responses to individual users? Do you want to use email or create reports? Do
    you want to send responses to a team? Do you want to route the responses based
    on a feedback classification scheme?


    After you design your response strategy, you can then build a tool that fulfills
    the requirement by writing some PL/SQL code and accessing the APEX views that
    expose all of the Team Development data. The details of building this tool are
    beyond the scope of this book, however.


    ### Communication Between Workspaces


    Team Development is a property of a workspace. Many professional shops maintain
    multiple workspaces for production, testing, and development environments. This
    means that if an end user enters a feedback record, that record resides in the
    production workspace, and the developers can’t see it. This situation is easily
    remedied by using APEX’s existing export/import functionality. APEX version 4.0
    and above has added feedback to the list of entities that can be imported and
    exported to and from a workspace. This makes it possible to export the production
    feedback and import it to the testing environment, where the business analysts
    can evaluate it. If required, the feedback can be exported from the testing environment
    and imported to the development environment, where the developers can evaluate
    and then log it as a bug, to-do, or feature.'
  raw: '### Configuring Feedback


    You begin configuring the feedback mechanism by creating a new page in your application.
    The Create Page wizard contains a Feedback Page option (see Figure [15-18](#A978-1-4842-0466-5_15_Chapter.html#Fig18)).
    Select this option, and click the Next button.


    ![A978-1-4842-0466-5_15_Fig18_HTML.jpg](A978-1-4842-0466-5_15_Fig18_HTML.jpg)


    Figure 15-18.


    Feedback Page option in the Create Page wizard


    The next page in the wizard sets up the details for the Feedback page (see Figure
    [15-19](#A978-1-4842-0466-5_15_Chapter.html#Fig19)). You enter the page number
    and page name and then select a page template, form region template, and label
    template. You can also declaratively create a Feedback link on the application’s
    global navigation bar. The defaults, in most cases, work well.


    ![A978-1-4842-0466-5_15_Fig19_HTML.jpg](A978-1-4842-0466-5_15_Fig19_HTML.jpg)


    Figure 15-19.


    Feedback page set up in the Create Page wizard


    However, one attribute requires a bit more explanation because its benefit isn’t
    immediately obvious. The Extra Attributes field allows you to add up to eight
    custom fields to your Feedback page. These are sometimes called flex fields. These
    fields can be used to prompt end users for additional information when they submit
    feedback. For example, a public APEX website requires no login; therefore, the
    user’s identity can’t be captured automatically. The extra attributes can be used
    to capture the user’s name and email so the feedback response can be sent to them.


    Click the Create button and then run the application. You now see the Feedback
    link in the navigation bar (see Figure [15-20](#A978-1-4842-0466-5_15_Chapter.html#Fig20)).
    If you can’t use the default Feedback link in your design, you can move it anywhere
    you like in your application. The link uses the standard APEX `f?p` syntax.


    ![A978-1-4842-0466-5_15_Fig20_HTML.jpg](A978-1-4842-0466-5_15_Fig20_HTML.jpg)


    Figure 15-20.


    Application with the Feedback link


    ### Polishing the Feedback Page


    When you click the Feedback link, the Feedback popup page is displayed (see Figure
    [15-21](#A978-1-4842-0466-5_15_Chapter.html#Fig21)). As you can see, the page
    needs a bit more work to polish it. Because this is a standard APEX page, you
    can complete the polishing in one or two minutes by clicking the Edit Page button
    to navigate to the Page Designer.


    ![A978-1-4842-0466-5_15_Fig21_HTML.jpg](A978-1-4842-0466-5_15_Fig21_HTML.jpg)


    Figure 15-21.


    Feedback page prior to some polishing


    In this example, let’s change Attribute1, Attribute2, and Attribute3 to Name,
    Department, and Email. APEX automatically added these items to the Feedback page
    (see Figure [15-22](#A978-1-4842-0466-5_15_Chapter.html#Fig22)) when you selected
    `3` in the Extra Attributes field in the Create Page wizard.


    ![A978-1-4842-0466-5_15_Fig22_HTML.jpg](A978-1-4842-0466-5_15_Fig22_HTML.jpg)


    Figure 15-22.


    Extra attributes on the Feedback page


    Configuring the extra attributes is a two-step process. First, rename the items
    so they describe the data, change the item types from `Textarea` to an item type
    that is appropriate for the data, and rename the label to something meaningful
    to the end users (see Figure [15-23](#A978-1-4842-0466-5_15_Chapter.html#Fig23)).


    ![A978-1-4842-0466-5_15_Fig23_HTML.jpg](A978-1-4842-0466-5_15_Fig23_HTML.jpg)


    Figure 15-23.


    Reconfiguring extra attributes


    Second, in the Page tab of the Tree Pane (see Figure [15-24](#A978-1-4842-0466-5_15_Chapter.html#Fig24)),
    you must edit the Submit Feedback process so that the API calling parameters match
    the renamed and relabeled extra attributes (see Figure [15-25](#A978-1-4842-0466-5_15_Chapter.html#Fig25)).


    ![A978-1-4842-0466-5_15_Fig25_HTML.jpg](A978-1-4842-0466-5_15_Fig25_HTML.jpg)


    Figure 15-25.


    Feedback Page Processing changes in the Submit Feedback process source


    ![A978-1-4842-0466-5_15_Fig24_HTML.jpg](A978-1-4842-0466-5_15_Fig24_HTML.jpg)


    Figure 15-24.


    Feedback Page’s Processing region


    After you complete the changes and rerun the application, you will see the finished
    Feedback page (see Figure [15-26](#A978-1-4842-0466-5_15_Chapter.html#Fig26)).
    Enter some feedback into the page and click the Submit Feedback button. Then,
    go on to the next section and learn how to review the feedback that you and others
    have entered.


    ![A978-1-4842-0466-5_15_Fig26_HTML.jpg](A978-1-4842-0466-5_15_Fig26_HTML.jpg)


    Figure 15-26.


    Finished Feedback page with three extra attributes


    ### Viewing Feedback


    You can review all feedback for an application from the Team Development page.
    Navigate to that page and then click the Feedback tab. You should see results
    similar to those in Figure [15-27](#A978-1-4842-0466-5_15_Chapter.html#Fig27).


    ![A978-1-4842-0466-5_15_Fig27_HTML.jpg](A978-1-4842-0466-5_15_Fig27_HTML.jpg)


    Figure 15-27.


    Feedback entry


    When you drill into an individual feedback record, you will find a wealth of data
    and information that can make your life as a developer much easier. The Feedback
    region contains a read-only description of each feedback record. The Disposition
    region is where you track feedback status, tags, developer comments, and public
    response. In addition, there are three buttons: Log as Bug, Log as To Do, and
    Log as Feature. These buttons create a new Team Development entity and copy data
    from the feedback record to the new entity, which saves time and ensures accuracy.
    The Follow Up region is like a diary; it’s a list of remarks that are added over
    time as the feedback is processed. This is handy when several people must review
    the feedback before action is taken. The extra attributes that you added to the
    Feedback page are displayed in the Additional Attributes region. The remaining
    regions display read-only data that describes the application context, the runtime
    environment (browser type and version), and the entire session state. If a bug
    is reported, the developer has all the information required to reproduce the bug,
    which is a valuable benefit.


    ### Responses to Feedback


    The feedback mechanism contains a response table. In principle, responses should
    be sent to the users who initiated the feedback. However, there is no easy and
    declarative mechanism that enables you to send responses to users. If you want
    to send responses to users, you first need to address a number of design issues.
    For example, do you want to broadcast responses to all users or send individual
    responses to individual users? Do you want to use email or create reports? Do
    you want to send responses to a team? Do you want to route the responses based
    on a feedback classification scheme?


    After you design your response strategy, you can then build a tool that fulfills
    the requirement by writing some PL/SQL code and accessing the APEX views that
    expose all of the Team Development data. The details of building this tool are
    beyond the scope of this book, however.


    ### Communication Between Workspaces


    Team Development is a property of a workspace. Many professional shops maintain
    multiple workspaces for production, testing, and development environments. This
    means that if an end user enters a feedback record, that record resides in the
    production workspace, and the developers can’t see it. This situation is easily
    remedied by using APEX’s existing export/import functionality. APEX version 4.0
    and above has added feedback to the list of entities that can be imported and
    exported to and from a workspace. This makes it possible to export the production
    feedback and import it to the testing environment, where the business analysts
    can evaluate it. If required, the feedback can be exported from the testing environment
    and imported to the development environment, where the developers can evaluate
    and then log it as a bug, to-do, or feature.'
  trans: '### 配置反馈机制


    您可以通过在应用中创建一个新页面来开始配置反馈机制。“创建页面”向导包含一个“反馈页面”选项（见图 15-18）。选择此选项，然后单击“下一步”按钮。


    ![A978-1-4842-0466-5_15_Fig18_HTML.jpg](img/A978-1-4842-0466-5_15_Fig18_HTML.jpg)

    图 15-18. 创建页面向导中的反馈页面选项


    向导的下一页用于设置反馈页面的详细信息（见图 15-19）。您需要输入页面编号和页面名称，然后选择一个页面模板、表单区域模板和标签模板。您还可以以声明式方式在应用的全局导航栏上创建一个反馈链接。在大多数情况下，默认设置就能很好地工作。


    ![A978-1-4842-0466-5_15_Fig19_HTML.jpg](img/A978-1-4842-0466-5_15_Fig19_HTML.jpg)

    图 15-19. 在创建页面向导中设置反馈页面


    然而，有一个属性需要稍作解释，因为其好处并非显而易见。“额外属性”字段允许您向反馈页面添加最多八个自定义字段。这些字段有时被称为弹性字段。这些字段可用于在用户提交反馈时提示最终用户提供额外信息。例如，一个公共的
    APEX 网站不需要登录；因此，无法自动捕获用户身份。额外属性可用于捕获用户的姓名和电子邮件，以便将反馈响应发送给他们。


    单击“创建”按钮，然后运行该应用。您现在可以在导航栏中看到“反馈”链接（见图 15-20）。如果您的设计中无法使用默认的反馈链接，您可以将其移动到应用中的任意位置。该链接使用标准的
    APEX `f?p` 语法。


    ![A978-1-4842-0466-5_15_Fig20_HTML.jpg](img/A978-1-4842-0466-5_15_Fig20_HTML.jpg)

    图 15-20. 带有反馈链接的应用


    ### 完善反馈页面


    当您点击反馈链接时，会显示反馈弹出页面（见图 15-21）。如您所见，该页面需要稍作完善。因为这是一个标准的 APEX 页面，您可以通过单击“编辑页面”按钮导航到页面设计器，在一两分钟内完成完善工作。


    ![A978-1-4842-0466-5_15_Fig21_HTML.jpg](img/A978-1-4842-0466-5_15_Fig21_HTML.jpg)

    图 15-21. 未经完善的反馈页面


    在这个例子中，让我们将 Attribute1、Attribute2 和 Attribute3 更改为姓名、部门和电子邮件。当您在“创建页面”向导的“额外属性”字段中选择`3`时，APEX
    会自动将这些项目添加到反馈页面（见图 15-22）。


    ![A978-1-4842-0466-5_15_Fig22_HTML.jpg](img/A978-1-4842-0466-5_15_Fig22_HTML.jpg)

    图 15-22. 反馈页面上的额外属性


    配置额外属性是一个两步过程。首先，重命名这些项目以描述其数据，将项目类型从`Textarea`更改适合数据的类型，并将标签重命名为对最终用户有意义的名称（见图
    15-23）。


    ![A978-1-4842-0466-5_15_Fig23_HTML.jpg](img/A978-1-4842-0466-5_15_Fig23_HTML.jpg)

    图 15-23. 重新配置额外属性


    其次，在树形面板的“页面”选项卡中（见图 15-24），您必须编辑“提交反馈”流程，使 API 调用参数与重命名和重新标记的额外属性相匹配（见图 15-25）。


    ![A978-1-4842-0466-5_15_Fig25_HTML.jpg](img/A978-1-4842-0466-5_15_Fig25_HTML.jpg)

    图 15-25. “提交反馈”流程源中的反馈页面处理更改


    ![A978-1-4842-0466-5_15_Fig24_HTML.jpg](img/A978-1-4842-0466-5_15_Fig24_HTML.jpg)

    图 15-24. 反馈页面的处理区域


    完成更改并重新运行应用后，您将看到最终完成的反馈页面（见图 15-26）。在页面中输入一些反馈内容，然后单击“提交反馈”按钮。接着，继续下一节，学习如何查看您和他人输入的反馈。


    ![A978-1-4842-0466-5_15_Fig26_HTML.jpg](img/A978-1-4842-0466-5_15_Fig26_HTML.jpg)

    图 15-26. 包含三个额外属性的最终反馈页面


    ### 查看反馈


    您可以从“团队开发”页面查看应用的所有反馈。导航到该页面，然后单击“反馈”选项卡。您应该会看到类似于图 15-27 的结果。


    ![A978-1-4842-0466-5_15_Fig27_HTML.jpg](img/A978-1-4842-0466-5_15_Fig27_HTML.jpg)

    图 15-27. 反馈条目


    当您深入查看单个反馈记录时，您会发现大量数据和信息，这些内容可以让您作为开发人员的工作轻松许多。“反馈”区域包含每条反馈记录的只读描述。“处置”区域用于跟踪反馈状态、标签、开发者评论和公开响应。此外，还有三个按钮：“记录为缺陷”、“记录为待办事项”和“记录为功能”。这些按钮会创建一个新的团队开发实体，并将数据从反馈记录复制到新实体，从而节省时间并确保准确性。“跟进”区域就像日记；它是随着时间的推移，在处理反馈过程中添加的备注列表。这在多人需要在采取行动前审阅反馈时非常方便。您添加到反馈页面的额外属性会显示在“附加属性”区域。其余区域显示只读数据，描述应用上下文、运行时环境（浏览器类型和版本）和整个会话状态。如果报告了一个缺陷，开发者就拥有了重现该缺陷所需的所有信息，这是一个宝贵的特性。


    ### 响应反馈


    反馈机制包含一个响应表。原则上，响应应发送给发起反馈的用户。然而，目前没有简单且声明式的机制可以让您向用户发送响应。如果您想向用户发送响应，首先需要解决一些设计问题。例如，您是希望向所有用户广播响应，还是向个别用户发送个别响应？您想使用电子邮件还是创建报表？您希望向团队发送响应吗？您希望基于反馈分类方案来路由响应吗？


    在设计好响应策略后，您就可以通过编写一些 PL/SQL 代码并访问公开所有团队开发数据的 APEX 视图，来构建一个满足需求的工具。然而，构建此工具的细节超出了本书的范围。


    ### 工作区之间的通信


    团队开发是工作区的一个属性。许多专业机构会为生产、测试和开发环境维护多个工作区。这意味着，如果最终用户输入了一条反馈记录，该记录将驻留在生产工作区中，而开发者无法看到它。这种情况可以通过使用
    APEX 现有的导出/导入功能轻松解决。APEX 4.0 及以上版本已将反馈添加到可导入和导出到工作区或从工作区导出的实体列表中。这使得导出生产反馈并将其导入测试环境成为可能，业务分析师可以在那里对其进行评估。如果需要，反馈可以从测试环境导出并导入到开发环境，开发者可以在那里进行评估，然后将其记录为缺陷、待办事项或功能。'
- fmt: '## Team Development Utilities


    Team Development Utilities (see Figure [15-28](#A978-1-4842-0466-5_15_Chapter.html#Fig28))
    are a miscellaneous set of utilities that help you manage the Team Development
    environment. The links to the individual utilities are found on the right side
    of the Team Development home page. The `All Utilities` link takes you to a page
    that provides a menu of all utilities with a short description of each. Clicking
    on the individual utility links takes you directly to that utility.


    ![A978-1-4842-0466-5_15_Fig28_HTML.jpg](A978-1-4842-0466-5_15_Fig28_HTML.jpg)


    Figure 15-28. Team Development Utilities


    ### Team Development Settings


    A small number of defaults that are global to the workspace are configured on
    the Team Development Settings page (see Figure [15-29](#A978-1-4842-0466-5_15_Chapter.html#Fig29)).
    The `Enable Tracking Attributes` region is used to turn on/off the feature regions
    that track detailed work related to the user interface, testing, documentation,
    globalization, security, and accessibility. When you set these attributes to `No`,
    the corresponding region on the feature Details page isn’t displayed.


    ![A978-1-4842-0466-5_15_Fig29_HTML.jpg](A978-1-4842-0466-5_15_Fig29_HTML.jpg)


    Figure 15-29. Team Development Settings page


    ### Release Summary


    The Release Summary page is a management report. It’s organized by release name
    and can be filtered by developer and release name. Figure [15-30](#A978-1-4842-0466-5_15_Chapter.html#Fig30)
    shows a small part of this comprehensive report.


    ![A978-1-4842-0466-5_15_Fig30_HTML.jpg](A978-1-4842-0466-5_15_Fig30_HTML.jpg)


    Figure 15-30. Release Summary page


    ### Enable Files


    The `Enable Files` link is a shortcut to the Workspace Preferences screen. Here,
    you can set the value of `Enable File Repository`, which specifies whether or
    not files may be uploaded to Team Development. Selecting `Yes` will create a local
    `APEX$` table to store the files. The feature is only available if the `Instance
    Administrator` also enables it at the instance level.


    ### Feature Utilities


    The Feature Utilities (see Figure [15-31](#A978-1-4842-0466-5_15_Chapter.html#Fig31))
    perform bulk updates to the Team Development data. You can assign milestones to
    unassigned features, set feature due dates, change milestones, and push due dates
    for open features. Before you do this, having a clean backup is well advised.


    ![A978-1-4842-0466-5_15_Fig31_HTML.jpg](A978-1-4842-0466-5_15_Fig31_HTML.jpg)


    Figure 15-31. Feature Utilities


    ### Manage Focus Areas


    The Manage Focus Areas utility allows you to view the Focus Areas that have been
    created, the feature count per Focus Area, the Distinct Owners, and the last edit
    of a feature in a given Focus Area. By editing, you are also able to rename a
    Focus area.


    ### Update Assignees


    The Update Assignees utility allows you to reassign various components from one
    assignee to another. You can do this for either all releases or a specific one,
    and you can also choose the components to reassign. See Figure [15-32](#A978-1-4842-0466-5_15_Chapter.html#Fig32).


    ![A978-1-4842-0466-5_15_Fig32_HTML.jpg](A978-1-4842-0466-5_15_Fig32_HTML.jpg)


    Figure 15-32. Updating the assignee for various components


    ### View Files


    If the feature has been enabled at the workspace level, developers can attach
    files to a Feature, To-Do, or Bug. The `View Files` report will list all of the
    files that have been uploaded, and some metadata about the files. You are also
    able to download the files from this report. If the feature to do so has not been
    turned on, the link will read “Enable Files.”


    ### Purge Data


    This utility will allow you to purge data for selected component types. This will
    delete all entries for the selected types with no opportunity for recovery. This
    is useful if you’re starting a brand new development cycle or if you need to clear
    test data from Team Development.


    ### Manage News


    On both the APEX home page and the Team Development home page is a region that
    contains news messages. You can add news items (see Figure [15-33](#A978-1-4842-0466-5_15_Chapter.html#Fig33))
    by clicking the `Manage News` link or by clicking the plus-sign icon in the News
    region.


    ![A978-1-4842-0466-5_15_Fig33_HTML.jpg](A978-1-4842-0466-5_15_Fig33_HTML.jpg)


    Figure 15-33. Managing the News section


    The News region is handy for broadcasting development news when the team isn’t
    co-located; the successful or failed promotion of a release to the test environment
    is an example. Teams that are co-located and have a daily status meeting probably
    won’t use this region.


    ### Manage Links


    The Manage Links feature is a simple list of links to documentation, other systems,
    and web pages that you can easily define as any valid URL (see Figure [15-34](#A978-1-4842-0466-5_15_Chapter.html#Fig34)).
    The links let developers quickly navigate to URLs that have been approved by the
    development team. The entire team then shares common documentation, such as SQL
    or PL/SQL references that can help the team adhere to common development styles
    and standards. This, in turn, helps to encourage consistency, which greatly improves
    the software-development process.


    ![A978-1-4842-0466-5_15_Fig34_HTML.jpg](A978-1-4842-0466-5_15_Fig34_HTML.jpg)


    Figure 15-34. Manage Links feature


    ## User Roles for Team Development


    Access to Team Development is useful for stakeholders both inside and outside
    the development team. The team lead and senior developers should have access to
    Team Development. Access by junior developers depends on the team’s culture and
    trust level. Interested stakeholders who are outside the development team could
    include the project manager, test team, and business analysts.


    Access to the APEX development environment is controlled in the APEX Administration
    area under the Manage Users and Groups menu. This area maintains the list of APEX
    users, dictating what level of access each user has (see Figure [15-35](#A978-1-4842-0466-5_15_Chapter.html#Fig35)).
    An outside stakeholder is set up without administrator and developer privileges;
    however, the `Team Development Access` field is set to `Yes`. When they log in
    to the APEX development environment, they see only the Team Development area and
    nothing else. There is only one problem at this time with this scenario: outside
    stakeholders can’t see the applications in the Application drop-down lists.


    ![A978-1-4842-0466-5_15_Fig35_HTML.jpg](A978-1-4842-0466-5_15_Fig35_HTML.jpg)


    Figure 15-35. Account Privileges for a project manager, tester, or business analyst


    ## Summary


    Team Development is a software-development tool that has been tailored to work
    in the APEX development environment. The five main entities (milestones, features,
    to-dos, bugs, and feedback) work together in a framework that is simple, extensible,
    and flexible. Teams that embrace agile software-development methodologies will
    find APEX’s Team Development tool to be a comfortable fit with their culture.'
  raw: '## Team Development Utilities


    Team Development Utilities (see Figure [15-28](#A978-1-4842-0466-5_15_Chapter.html#Fig28))
    are a miscellaneous set of utilities that help you manage the Team Development
    environment. The links to the individual utilities are found on the right side
    of the Team Development home page. The All Utilities link takes you to a page
    that provides a menu of all utilities with a short description of each. Clicking
    on the individual utility links takes you directly to that utility.


    ![A978-1-4842-0466-5_15_Fig28_HTML.jpg](A978-1-4842-0466-5_15_Fig28_HTML.jpg)


    Figure 15-28.


    Team Development Utilities


    ### Team Development Settings


    A small number of defaults that are global to the workspace are configured on
    the Team Development Settings page (see Figure [15-29](#A978-1-4842-0466-5_15_Chapter.html#Fig29)).
    The Enable Tracking Attributes region is used to turn on/off the feature regions
    that track detailed work related to the user interface, testing, documentation,
    globalization, security, and accessibility. When you set these attributes to `No`,
    the corresponding region on the feature Details page isn’t displayed.


    ![A978-1-4842-0466-5_15_Fig29_HTML.jpg](A978-1-4842-0466-5_15_Fig29_HTML.jpg)


    Figure 15-29.


    Team Development Settings page


    ### Release Summary


    The Release Summary page is a management report. It’s organized by release name
    and can be filtered by developer and release name. Figure [15-30](#A978-1-4842-0466-5_15_Chapter.html#Fig30)
    shows a small part of this comprehensive report.


    ![A978-1-4842-0466-5_15_Fig30_HTML.jpg](A978-1-4842-0466-5_15_Fig30_HTML.jpg)


    Figure 15-30.


    Release Summary page


    ### Enable Files


    The Enable Files link is a shortcut to the Workspace Preferences screen. Here,
    you can set the value of Enable File Repository, which specifies whether or not
    files may be uploaded to Team Development. Selecting `Yes` will create a local
    `APEX$` table to store the files. The feature is only available if the Instance
    Administrator also enables it at the instance level.


    ### Feature Utilities


    The Feature Utilities (see Figure [15-31](#A978-1-4842-0466-5_15_Chapter.html#Fig31))
    perform bulk updates to the Team Development data. You can assign milestones to
    unassigned features, set feature due dates, change milestones, and push due dates
    for open features. Before you do this, having a clean backup is well advised.


    ![A978-1-4842-0466-5_15_Fig31_HTML.jpg](A978-1-4842-0466-5_15_Fig31_HTML.jpg)


    Figure 15-31.


    Feature Utilities


    ### Manage Focus Areas


    The Manage Focus Areas utility allows you to view the Focus Areas that have been
    created, the feature count per Focus Area, the Distinct Owners, and the last edit
    of a feature in a given Focus Area. By editing, you are also able to rename a
    Focus area.


    ### Update Assignees


    The Update Assignees utility allows you to reassign various components from one
    assignee to another. You can do this for either all releases or a specific one,
    and you can also choose the components to reassign. See Figure [15-32](#A978-1-4842-0466-5_15_Chapter.html#Fig32).


    ![A978-1-4842-0466-5_15_Fig32_HTML.jpg](A978-1-4842-0466-5_15_Fig32_HTML.jpg)


    Figure 15-32.


    Updating the assignee for various components


    ### View Files


    If the feature has been enabled at the workspace level, developers can attach
    files to a Feature, To-Do, or Bug. The View Files report will list all of the
    files that have been uploaded, and some metadata about the files. You are also
    able to download the files from this report. If the feature to do so has not been
    turned on, the link will read “Enable Files.”


    ### Purge Data


    This utility will allow you to purge data for selected component types. This will
    delete all entries for the selected types with no opportunity for recovery. This
    is useful if you’re starting a brand new development cycle or if you need to clear
    test data from Team Development.


    ### Manage News


    On both the APEX home page and the Team Development home page is a region that
    contains news messages. You can add news items (see Figure [15-33](#A978-1-4842-0466-5_15_Chapter.html#Fig33))
    by clicking the Manage News link or by clicking the plus-sign icon in the News
    region.


    ![A978-1-4842-0466-5_15_Fig33_HTML.jpg](A978-1-4842-0466-5_15_Fig33_HTML.jpg)


    Figure 15-33.


    Managing the News section


    The News region is handy for broadcasting development news when the team isn’t
    co-located; the successful or failed promotion of a release to the test environment
    is an example. Teams that are co-located and have a daily status meeting probably
    won’t use this region.


    ### Manage Links


    The Manage Links feature is a simple list of links to documentation, other systems,
    and web pages that you can easily define as any valid URL (see Figure [15-34](#A978-1-4842-0466-5_15_Chapter.html#Fig34)).
    The links let developers quickly navigate to URLs that have been approved by the
    development team. The entire team then shares common documentation, such as SQL
    or PL/SQL references that can help the team adhere to common development styles
    and standards. This, in turn, helps to encourage consistency, which greatly improves
    the software-development process.


    ![A978-1-4842-0466-5_15_Fig34_HTML.jpg](A978-1-4842-0466-5_15_Fig34_HTML.jpg)


    Figure 15-34.


    Manage Links feature


    ## User Roles for Team Development


    Access to Team Development is useful for stakeholders both inside and outside
    the development team. The team lead and senior developers should have access to
    Team Development. Access by junior developers depends on the team’s culture and
    trust level. Interested stakeholders who are outside the development team could
    include the project manager, test team, and business analysts.


    Access to the APEX development environment is controlled in the APEX Administration
    area under the Manage Users and Groups menu. This area maintains the list of APEX
    users, dictating what level of access each user has (see Figure [15-35](#A978-1-4842-0466-5_15_Chapter.html#Fig35)).
    An outside stakeholder is set up without administrator and developer privileges;
    however, the Team Development Access field is set to `Yes`. When they log in to
    the APEX development environment, they see only the Team Development area and
    nothing else. There is only one problem at this time with this scenario: outside
    stakeholders can’t see the applications in the Application drop-down lists.


    ![A978-1-4842-0466-5_15_Fig35_HTML.jpg](A978-1-4842-0466-5_15_Fig35_HTML.jpg)


    Figure 15-35.


    Account Privileges for a project manager, tester, or business analyst


    ## Summary


    Team Development is a software-development tool that has been tailored to work
    in the APEX development environment. The five main entities (milestones, features,
    to-dos, bugs, and feedback) work together in a framework that is simple, extensible,
    and flexible. Teams that embrace agile software-development methodologies will
    find APEX’s Team Development tool to be a comfortable fit with their culture.'
  trans: '

    ## 团队开发工具


    团队开发工具（参见图 15-28）是一组用于帮助您管理团队开发环境的杂项工具集。各个工具的链接位于团队开发主页的右侧。`所有工具`链接会带您到一个页面，该页面提供了所有工具的菜单及每个工具的简短描述。点击各个工具链接可直接进入相应工具。


    ![A978-1-4842-0466-5_15_Fig28_HTML.jpg](img/A978-1-4842-0466-5_15_Fig28_HTML.jpg)


    图 15-28. 团队开发工具


    ### 团队开发设置


    一些对整个工作区生效的全局默认设置在团队开发设置页面（参见图 15-29）中进行配置。`启用跟踪属性`区域用于开启/关闭跟踪与用户界面、测试、文档、全球化、安全和辅助功能相关详细工作的功能区域。当您将这些属性设置为`否`时，功能特性详情页面上对应的区域将不会显示。


    ![A978-1-4842-0466-5_15_Fig29_HTML.jpg](img/A978-1-4842-0466-5_15_Fig29_HTML.jpg)


    图 15-29. 团队开发设置页面


    ### 发布摘要


    发布摘要页面是一个管理报告。它按发布名称组织，可以按开发者和发布名称进行筛选。图 15-30 展示了这份综合报告的一小部分。


    ![A978-1-4842-0466-5_15_Fig30_HTML.jpg](img/A978-1-4842-0466-5_15_Fig30_HTML.jpg)


    图 15-30. 发布摘要页面


    ### 启用文件


    `启用文件`链接是通向工作区首选项屏幕的快捷方式。在这里，您可以设置`启用文件仓库`的值，该设置指定是否可以向团队开发上传文件。选择`是`将创建一个本地的`APEX$`表来存储文件。此功能仅在`实例管理员`也在实例级别启用它时才可用。


    ### 功能工具


    功能工具（参见图 15-31）用于对团队开发数据进行批量更新。您可以为未分配的功能特性分配里程碑、设置功能特性截止日期、更改里程碑，以及推动开放功能特性的截止日期。在此之前，强烈建议您做好完整的备份。


    ![A978-1-4842-0466-5_15_Fig31_HTML.jpg](img/A978-1-4842-0466-5_15_Fig31_HTML.jpg)


    图 15-31. 功能工具


    ### 管理焦点区域


    管理焦点区域工具允许您查看已创建的焦点区域、每个焦点区域的功能特性数量、不同负责人，以及给定焦点区域中功能特性的最后编辑情况。通过编辑，您还可以重命名一个焦点区域。


    ### 更新负责人


    更新负责人工具允许您将各种组件从一个负责人重新分配给另一个负责人。您可以对所有版本或特定版本执行此操作，还可以选择要重新分配的组件。参见图 15-32。


    ![A978-1-4842-0466-5_15_Fig32_HTML.jpg](img/A978-1-4842-0466-5_15_Fig32_HTML.jpg)


    图 15-32. 更新各种组件的负责人


    ### 查看文件


    如果已在工作区级别启用该功能，开发者可以将文件附加到功能特性、待办事项或缺陷。`查看文件`报告将列出所有已上传的文件及其一些元数据。您也可以从此报告下载文件。如果尚未启用此功能，链接将显示为“启用文件”。


    ### 清除数据


    此工具允许您清除选定组件类型的数据。这将删除所选类型的所有条目，且无法恢复。如果您要开始一个全新的开发周期，或者需要从团队开发中清除测试数据，这将非常有用。


    ### 管理新闻


    在 APEX 主页和团队开发主页上都有一个包含新闻消息的区域。您可以通过点击`管理新闻`链接或点击新闻区域中的加号图标来添加新闻项（参见图 15-33）。


    ![A978-1-4842-0466-5_15_Fig33_HTML.jpg](img/A978-1-4842-0466-5_15_Fig33_HTML.jpg)


    图 15-33. 管理新闻部分


    当团队成员不在同一地点时，新闻区域对于广播开发新闻非常方便；例如，一个版本成功或失败地提升到测试环境。坐在一起并有每日状态会议的团队可能不会使用此区域。


    ### 管理链接


    管理链接功能是一个简单的链接列表，链接指向文档、其他系统和网页，您可以轻松地将其定义为任何有效的 URL（参见图 15-34）。这些链接让开发者能够快速导航到开发团队批准的
    URL。整个团队因此可以共享共同的文档，例如 SQL 或 PL/SQL 参考，这有助于团队遵循共同的开发风格和标准。这反过来又有助于鼓励一致性，从而极大地改善软件开发过程。


    ![A978-1-4842-0466-5_15_Fig34_HTML.jpg](img/A978-1-4842-0466-5_15_Fig34_HTML.jpg)


    图 15-34. 管理链接功能


    ## 团队开发的用户角色


    团队开发的访问权限对于开发团队内部和外部的利益相关者都很有用。团队负责人和高级开发者应该拥有团队开发的访问权限。初级开发者的访问权限取决于团队文化和信任水平。开发团队外部感兴趣的利益相关者可能包括项目经理、测试团队和业务分析师。


    对 APEX 开发环境的访问在 APEX 管理区域的“管理用户和组”菜单下进行控制。此区域维护着 APEX 用户列表，规定每个用户的访问级别（参见图 15-35）。外部利益相关者设置为没有管理员和开发者权限；但是，`团队开发访问`字段设置为`是`。当他们登录
    APEX 开发环境时，他们只能看到团队开发区域，看不到其他任何内容。目前此方案只有一个问题：外部利益相关者无法在应用程序下拉列表中看到应用程序。


    ![A978-1-4842-0466-5_15_Fig35_HTML.jpg](img/A978-1-4842-0466-5_15_Fig35_HTML.jpg)


    图 15-35. 项目经理、测试人员或业务分析师的账户权限


    ## 总结


    团队开发是一个为在 APEX 开发环境中工作而量身定制的软件开发工具。五个主要实体（里程碑、功能特性、待办事项、缺陷和反馈）在一个简单、可扩展且灵活的框架中协同工作。采用敏捷软件开发方法的团队会发现
    APEX 的团队开发工具与其文化非常契合。

