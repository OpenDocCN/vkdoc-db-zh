  trans: '


    ## 创建查找表


    看看你刚刚创建的表的定义和数据。它们基本上就是技术人员之前使用的电子表格标签的镜像。如果你仔细检查数据，会发现仍有一些区域的数据规范化程度不够理想。


    例如，在 `TICKETS` 表中，`STATUS` 列只有三个值——`OPEN`、`CLOSED` 和 `PENDING`——并且不断重复。该列中的数据值表明它是创建查找表的完美候选。虽然手动使用“创建表向导”创建表并手动迁移数据很诱人，但
    APEX 可以创建一个查找表（包含其自身的序列、触发器和外键），并修改原始表使其指向新的查找表，而无需你编写一行代码。操作方法如下：


    导航到“对象浏览器”，在屏幕左侧的“对象列表”中选择 `TICKETS` 表。你应该会看到类似图 4-16 所示的结果。


    ![A978-1-4842-0466-5_4_Fig16_HTML.jpg](img/A978-1-4842-0466-5_4_Fig16_HTML.jpg)

    **图 4-16.**


    点击“创建查找表”按钮会启动“创建查找表向导”。确保选中了“表”选项卡。选项卡栏下方是一组类似按钮的链接。点击 `Create Lookup Table`（创建查找表）按钮，如图
    4-16 中鼠标箭头所示；它会启动“创建查找表向导”。向导的第一步（图 4-17）让你选择是仅显示 `VARCHAR` 列类型还是所有列类型。默认选择是 `VARCHAR`，因为它最有可能成为查找表的候选。查看向导中显示的列，你会看到其中一个
    `VARCHAR` 列就是你的 `STATUS` 列。


    ![A978-1-4842-0466-5_4_Fig17_HTML.jpg](img/A978-1-4842-0466-5_4_Fig17_HTML.jpg)

    **图 4-17.**


    选择 `STATUS` 列作为查找表的源。选择 `STATUS` 作为你想从中创建查找表的列，然后点击“下一步”。下一步允许你为查找表及其关联的序列命名。APEX
    已经为新表和序列选择了一个合理的名称，因此接受默认设置并点击“下一步”。向导的最后一个屏幕（图 4-18）提供了有关已做选择和即将执行操作的信息。很容易忽略向导区域正下方的
    SQL 语法链接。点击 SQL 链接以显示 SQL。


    ![A978-1-4842-0466-5_4_Fig18_HTML.jpg](img/A978-1-4842-0466-5_4_Fig18_HTML.jpg)

    **图 4-18.**


    点击 SQL 语法链接会显示即将执行的 SQL。检查 SQL 可以看到创建新查找表、关联序列和触发器、将数据插入表中以及更新原始表中的数据以引用新查找表的步骤。这为你节省了大量工作。点击
    `Create Lookup Table`（创建查找表）完成向导。你将返回到“对象浏览器”。`STATUS_LOOKUP` 表会被高亮显示并展示其详细信息。


    使用“对象浏览器”检查向导创建的对象。


    ## 加载并运行 SQL 脚本


    SQL Workshop 的“SQL 脚本”工具允许你创建、上传、管理和运行 SQL 脚本。这些脚本在很多方面与 `SQL*PLUS` 脚本类似。但是，如果你使用为
    `SQL*PLUS` 编写的脚本，APEX 会忽略任何 `SQL*PLUS` 特有的语法。


    脚本一旦创建或加载，就会移入脚本存储库，并一直保留，直到你决定删除它。在脚本存储库中，你可以决定编辑或运行脚本。当你运行脚本时，APEX 会保存结果供你稍后查看。例如，你可以回来检查结果以寻找可能的错误信息。


    现在，你将加载并运行一个脚本，该脚本会稍微修改底层数据。原因如下：在实际工作中，你从帮助台团队收到的电子表格中会包含当前的日期和数据；然而，随本书附带的 `.zip`
    文件下载的电子表格中的工单日期很可能不是当前的。如果你按日期搜索，这会导致你必须追溯历史记录来查找工单。此脚本将更新这些日期，使其变为近期的日期。


    另一件需要考虑的事情是，你向表中加载了大量已分配了 ID 的数据。由于 ID 是随数据一起加载的，你并没有使用数据库序列。因此，你的序列与数据不同步。你需要删除并重新创建序列，使下一个序列号大于关联表中使用的最大
    ID。


    你还需要修改在 `TICKETS` 表上自动创建的“插入前”触发器，使其自动填充 `CREATED_ON` 列。你还将创建几个数据库视图，稍后将用于检索数据，以便为你要创建的一些特定图表和日历进行格式化。


    最后，你将创建一个函数，当传入一个状态名称（如 `OPEN`）时，它会返回该状态的 ID。该函数在多个地方使用，因为你无法保证知道给定状态的 ID 值。因此，此函数是获取给定状态关联
    ID 的唯一安全方法。


    当你在任何 SQL Workshop 工具中时，可以使用 SQL Workshop 选项卡的下拉菜单作为快速导航到其他工具的方式。图 4-19 显示了此菜单并突出了“SQL
    脚本”选项。


    ![A978-1-4842-0466-5_4_Fig19_HTML.jpg](img/A978-1-4842-0466-5_4_Fig19_HTML.jpg)

    **图 4-19.**


    使用 SQL Workshop 菜单导航到基础工具。


    以下是运行脚本来相应更新你的模式对象的步骤：


    使用 SQL Workshop 菜单导航到“SQL 脚本”工具。点击屏幕右上部分的 `Upload`（上传）按钮。点击 `Browse`（浏览）或 `Choose
    File`（选择文件）按钮来搜索要上传的 SQL 文件。在弹出的文件查找窗口中，找到并选择 `ch4_schema_changes.sql` 文件，然后点击
    `Upload`（上传）。你不需要为脚本命名；它默认使用操作系统级别的文件名。文件上传后，你会看到一个 SQL 脚本报告，显示你刚刚上传的脚本。从这时起，你可以编辑或运行该脚本。如果你想查看脚本包含的内容，可以自由编辑它。你也可以从编辑屏幕运行脚本。通过点击
    `Run`（运行）按钮（如果你正在编辑脚本）或 `Run`（运行）图标（如果你仍在查看 SQL 脚本报告）来运行脚本。如图 4-20 所示，系统会要求你在
    `Run in Background`（在后台运行）和 `Run Now`（立即运行）之间做出选择。选择 `Run Now`（立即运行）。


    ![A978-1-4842-0466-5_4_Fig20_HTML.jpg](img/A978-1-4842-0466-5_4_Fig20_HTML.jpg)

    **图 4-20.**


