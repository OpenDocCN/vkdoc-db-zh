    \    *图 6-33. 选择日期格式掩码*\n10. 在“列格式”属性组中输入的 CSS 和 HTML 格式化指令在页面呈现时应用于报表列。在“列格式”属性组中，为\
    \ CSS 样式字段输入 `font-weight:bold`（图 6-34）。\n    ![A978-1-4842-0466-5_6_Fig34_HTML.jpg](img/A978-1-4842-0466-5_6_Fig34_HTML.jpg)\n\
    \    *图 6-34. 选择列格式化选项*\n11. 通过单击其名称编辑 `TICKET_ID` 列。\n12. 在“导出/打印”属性组中，将 `包含在导出/打印中`\
    \ 设置为 `否`，然后单击“保存”。\n13. 运行页面以查看您的更改。\n\n请注意，当您按日期对 APEX 报表列进行排序时，报表是根据实际日期值而非显示值进行排序的。这是\
