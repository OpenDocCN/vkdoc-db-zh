    单击组名将显示该组中的详细条目，如图 [5-46] 所示。条目可以在此处独立修改。随着应用程序变大，您可能需要将条目安排到不同的面包屑组中。


    ![A978-1-4842-0466-5_5_Fig46_HTML.jpg](img/A978-1-4842-0466-5_5_Fig46_HTML.jpg)


    图 5-46.

    面包屑组中条目的详细信息

