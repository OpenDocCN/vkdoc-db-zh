      Edit the Create button in the Manage Tickets region by clicking its name.  
    In the Security section, set Authorization Scheme to access control - edit.  
    Repeat steps 35 and 36 for the Delete and Save buttons as well as for the second
    Create button located in the Ticket Details region. Remember to Save your changes.
    Note The previous step could also be completed by using APEX 5.0’s new multi-edit
    capability. Simply multi-select the items you wish to edit and change the Authorization
    Scheme once for all selected items.   Edit Page 220 of the application.   Edit
    the Create button by clicking its name.   In the Security section, set Authorization
    Scheme to access control - edit.   Repeat steps 39 and 40 for the Delete and Save
    buttons. Remember to Save your changes.   Edit Page 230 of the application.  
    Edit the page attributes by clicking the page name.   In the Security section,
    set Authorization Scheme to access control - edit, and click Save.


    Review the application now with different users. Notice how the user Martin can
    still navigate from the Tickets report to view the details of the ticket, but
    there are no buttons to modify the records in the database. Even though the form
    elements are editable, they aren’t written back to the database without the proper
    form submission.


    ## Read-Only Items


    Normally, users can edit the contents of an item in APEX. There are instances
    where you want to prohibit them from doing so, but you don’t want to hide the
    item entirely. At the conclusion of the previous step, the user Martin doesn’t
    have the ability to save edits of the ticket information even though the form
    allows Martin to change the contents of the form items.


    To assist in preventing changes, each item in APEX has a read-only attribute that
    you can set programmatically. The approach is similar to how item conditions are
    managed. Because the read-only attribute can’t use an authorization scheme directly,
    you can use the APEX API `APEX_UTIL.PUBLIC_CHECK_AUTHORIZATION` to determine whether
    a user has the rights to edit the data. This API takes a parameter of the authorization
    scheme name and runs the verification, returning a Boolean result that can be
    used in PL/SQL logic.


    Although we could go and apply the read-only condition to each individual item
    in each region, there is a way to make an entire region read-only.


    Here are the steps to use the read-only attribute and the API just discussed:


    Navigate to and edit the regions indicated in Table [9-1](#A978-1-4842-0466-5_9_Chapter.html#Tab1)
    by clicking the region name on the respective page.


    Table 9-1.


    Items That Require the Read-Only Attribute


    | Page Number | Page 210 | Page 220 |

    | Region to Update | Manage Tickets | Ticket Details |


      In the Read Only section, set Type to PL/SQL Function Body, as shown in Figure
    [9-25](#A978-1-4842-0466-5_9_Chapter.html#Fig25). Set the value for PL/SQL Function
    Body to the following:


    ![A978-1-4842-0466-5_9_Fig25_HTML.jpg](A978-1-4842-0466-5_9_Fig25_HTML.jpg)


    Figure 9-25.


    Setting the region to be read-only using the Read Only attribute  


    `RETURN NOT APEX_UTIL.PUBLIC_CHECK_AUTHORIZATION(''access control - edit'');`


    When you run the application as Martin, information about a ticket on page 210
    shows data without the confusion of form elements. Authenticating as any other
    user shows the data in form elements and displays the corresponding buttons. Results
    of the read-only view are shown in Figure [9-26](#A978-1-4842-0466-5_9_Chapter.html#Fig26);
    compare them to the form in edit mode, shown in Figure [9-27](#A978-1-4842-0466-5_9_Chapter.html#Fig27).


    ![A978-1-4842-0466-5_9_Fig27_HTML.jpg](A978-1-4842-0466-5_9_Fig27_HTML.jpg)


    Figure 9-27.


    Ticket record in edit mode


    ![A978-1-4842-0466-5_9_Fig26_HTML.jpg](A978-1-4842-0466-5_9_Fig26_HTML.jpg)


    Figure 9-26.


    Ticket record in read-only mode'
  trans: "\n# 按钮的安全设置\n\n对 **管理多工单** 按钮重复步骤 32。为测试此更改，请使用用户名 `Martin` 登录。该用户已被授予查看权限，因此不会显示第\
    \ 200 页上的按钮。这是否意味着 `Martin` 无法创建工单？\n\n让我们回顾一下您应用到管理页面的步骤。安全性首先应用到页面本身，然后应用了额外的安全性以防止出现访问被拒绝的错误。对于创建工单的按钮，移除按钮的安全性并不能阻止页面被直接运行——无论是通过应用程序生成器，还是通过将\
    \ URL 中的页码更改为 `210` 或 `230`。\n\n**重要提示** 移除或隐藏按钮、选项卡或其他链接，并不能保护它们原本指向的目标；它仅有助于减少用户在已安全的组件上看到的错误。\n\
    \n服务台应用程序的设计使得 **管理多工单** 页面仅对具有编辑权限的用户可用，因此整个页面在编辑级别上是安全的。工单的单记录视图对所有认证用户仍然可见，但不再显示与记录操作相关的按钮：\n\
    \n1.  编辑应用程序的页面 `210`。\n2.  通过单击其名称，编辑 **管理工单** 区域中的 **创建** 按钮。\n3.  在 **安全性**\
    \ 部分，将 **授权方案** 设置为 `访问控制 - 编辑`。\n4.  对 **删除** 和 **保存** 按钮，以及位于 **工单详情** 区域的第二个\
    \ **创建** 按钮，重复步骤 35 和 36。记得 **保存** 您的更改。\n\n**注意** 前一步骤也可以通过使用 APEX 5.0 的新多重编辑功能来完成。只需多重选择您希望编辑的项目，并为所有选定项目更改一次\
    \ **授权方案** 即可。\n\n5.  编辑应用程序的页面 `220`。\n6.  通过单击其名称，编辑 **创建** 按钮。\n7.  在 **安全性**\
    \ 部分，将 **授权方案** 设置为 `访问控制 - 编辑`。\n8.  对 **删除** 和 **保存** 按钮，重复步骤 39 和 40。记得 **保存**\
    \ 您的更改。\n9.  编辑应用程序的页面 `230`。\n10. 通过单击页面名称，编辑页面属性。\n11. 在 **安全性** 部分，将 **授权方案**\
    \ 设置为 `访问控制 - 编辑`，并单击 **保存**。\n\n现在使用不同的用户复查应用程序。注意用户 `Martin` 仍然可以从 **工单** 报表导航查看工单详情，但没有修改数据库中记录的按钮。尽管表单元素是可编辑的，但没有正确的表单提交，它们不会被写回数据库。\n\
    \n## 只读项目\n\n通常，用户可以在 APEX 中编辑项目的值。在某些情况下，您希望禁止他们这样做，但又不想完全隐藏该项目。在上一步结束时，用户 `Martin`\
    \ 无法保存对工单信息的编辑，尽管表单允许 `Martin` 更改表单项目的值。\n\n为协助防止更改，APEX 中的每个项目都有一个您可以编程设置的只读属性。其方法与管理项目条件类似。因为只读属性不能直接使用授权方案，所以您可以使用\
    \ APEX API `APEX_UTIL.PUBLIC_CHECK_AUTHORIZATION` 来确定用户是否有权编辑数据。此 API 接受授权方案名称作为参数，执行验证，并返回一个可用于\
    \ PL/SQL 逻辑的布尔值结果。\n\n尽管我们可以去为每个区域中的每个单独项目应用只读条件，但有一种方法可以使整个区域变为只读。\n\n以下是使用上述只读属性和\
    \ API 的步骤：\n\n1.  通过在相应页面上单击区域名称，导航到并编辑表 9-1 中指示的区域。\n\n    **表 9-1.** 需要只读属性的项目\n\
    \n    | 页面编号 | 页面 210 | 页面 220 |\n    | :--- | :--- | :--- |\n    | 待更新区域 | 管理工单\
    \ | 工单详情 |\n\n2.  在 **只读** 部分，将 **类型** 设置为 `PL/SQL 函数体`，如图 9-25 所示。将 **PL/SQL\
    \ 函数体** 的值设置为以下内容：\n\n    **图 9-25.** 使用只读属性将区域设置为只读\n\n    ![A978-1-4842-0466-5_9_Fig25_HTML.jpg](img/A978-1-4842-0466-5_9_Fig25_HTML.jpg)\n\
    \n    ```\n    RETURN NOT APEX_UTIL.PUBLIC_CHECK_AUTHORIZATION('access control\
    \ - edit');\n    ```\n\n当您以 `Martin` 身份运行应用程序时，第 210 页上关于某个工单的信息会显示数据，而不会出现表单元素的混淆。以任何其他用户身份验证，则会在表单元素中显示数据并显示相应的按钮。只读视图的结果如图\
    \ 9-26 所示；请与编辑模式下的表单（如图 9-27 所示）进行比较。\n\n**图 9-27.** 编辑模式下的工单记录\n\n![A978-1-4842-0466-5_9_Fig27_HTML.jpg](img/A978-1-4842-0466-5_9_Fig27_HTML.jpg)\n\
    \n**图 9-26.** 只读模式下的工单记录\n\n![A978-1-4842-0466-5_9_Fig26_HTML.jpg](img/A978-1-4842-0466-5_9_Fig26_HTML.jpg)\n"
- fmt: '## Data Security


    At this point, the majority of the application is relatively secure. What you
    lack is data security applied to segregate the data between application users.
    Any authenticated user can see and make changes to any other user’s records. APEX
    doesn’t provide a built-in construct for securing data. APEX does support and
    work well with other Oracle technologies that do secure data, such as Virtual
    Private Database, Oracle Label Security, and Transparent Data Encryption.


    Although there are a number of ways to deal with data segregation and security,
    one of the simpler methods is to use a view to enforce the data available to a
    user in place of all references to the base table. This method is effective and
    works with all versions of the Oracle database. The process works by adding a
    securing function to the view that uses the current APEX user name, filtering
    out the data from other users.


    To implement this data security, you will run a script that creates a new view
    named `TICKET_SECURE_V` and then re-create the other two views, `TICKET_ACTIVITY_V`
    and `TICKET_V`, so they point to the secured view rather than to the `TICKETS`
    table directly. Then you will make modifications to the other key components of
    the pages that access ticket data so as to also use the new secure views. Here
    are the steps:


    Locate, upload, and run the script `ch9_data_security_script.sql`. Refer to [Chapter
    4](#A978-1-4842-0466-5_4_Chapter.html) if you need step-by-step instructions.
    You should see three rows in the results report, all of which complete successfully.


    Once the script completes, run the application and navigate to the Analysis page.
    You should notice that only tickets or ticket details that are assigned to the
    user you’re logged in as appear. Next, make changes to the source of several other
    pages so they reference the new secure objects you just created:


    Edit Page 200 of the application.

    Select the Tickets report by clicking its name.

    Locate and open the file `ch9_report_p200.txt`, and then copy its contents into
    the SQL Query text area, replacing everything that is there. Save your changes.

    Run Page 200 and notice that you can only see the tickets that are assigned to
    the current user. You need to make a similar change on the Manage Multiple Tickets
    page:


    Edit Page 230 of the application.

    Edit the Manage Multiple Tickets report by double-clicking it.

    Locate and open the file `ch9_report_p230.txt` and copy its contents into the
    SQL Query text area, replacing everything that is there. Save your changes.

    Run Page 230 and notice that you can only see the tickets that are assigned to
    the current user. Finally, you should also apply this rule to the chart, because
    it’s still allowing you to see the status from all records in the system, which
    is inaccurate:


    Edit Page 500 of the application.

    Under the Tickets by Status chart, edit Series 1 by clicking its name.

    Locate and open the file `ch9_report_p500.txt` and copy its contents into the
    SQL Query region, replacing everything that is there. Save your changes.

    Run Page 500 and notice that the chart only reflects the status of either unassigned
    tickets or tickets that are assigned the current user. This is a huge leap forward
    in data security, but you’re not quite finished. You may have noticed that if
    you edit one of the records on page 210, you can use the Next (>) and Previous
    (<) buttons in the lower-right corner to see records that belong to other users.
    Thus, you need to plug this security hole as well:


    Edit Page 210 of the application.

    The location of the process `Get Next or Previous Primary Key Value` is shown
    in Figure [9-28](#A978-1-4842-0466-5_9_Chapter.html#Fig28). Edit the process by
    clicking its name.


    ![A978-1-4842-0466-5_9_Fig28_HTML.jpg](A978-1-4842-0466-5_9_Fig28_HTML.jpg)


    Figure 9-28.

    The location of the `Get Next or Previous Primary Key Value` process.


    Change the value of Table Name to `TICKETS_SECURE_V`, as shown in Figure [9-29](#A978-1-4842-0466-5_9_Chapter.html#Fig29).
    If you use the LOV, make sure you search the View tab. Click Save.


    ![A978-1-4842-0466-5_9_Fig29_HTML.jpg](A978-1-4842-0466-5_9_Fig29_HTML.jpg)


    Figure 9-29.

    Update the source for fetching the next record.


    Now all of your data is secured based on who is signed on to the system. Or is
    it?


    ## Session-State Protection


    One of the most common ways to compromise a web application is through a form
    of attack known as URL tampering. You don’t need to be a programmer or hacker
    to launch this type of attack, all you need to do is alter the URL in your browser.
    APEX introduced the session-state protection feature in release 2.2. When enabled,
    it adds a checksum value to the URL. If any portion of the URL is altered, the
    resulting checksum doesn’t match what is expected, and the page simply won’t render.


    By default, APEX 5.0 enables session state protection at the application level
    and applies item-level session state protection to any forms and reports that
    are built using the wizards. Thus, if a user were to tamper with the APEX URL,
    it would prevent them from being able to see tickets assigned to other users.


    Run the Tickets report on page 200 in the application. Hover your mouse over the
    Edit icon and examine the URL. Notice the `&cs=` portion of the URL. The `&cs=`
    parameter is the checksum that was automatically generated by APEX. Alter the
    value for `P210_TICKET_ID` in the URL, or remove `&cs=` and everything to the
    right of it, and try to run the page. You will receive an error message similar
    to that shown in Figure [9-30](#A978-1-4842-0466-5_9_Chapter.html#Fig30).


    ![A978-1-4842-0466-5_9_Fig30_HTML.jpg](A978-1-4842-0466-5_9_Fig30_HTML.jpg)


    Figure 9-30.

    Checksum error message as a result of URL tampering.


    ## Summary


    In this chapter, you’ve applied new security to the Help Desk application by utilizing
    the key features of APEX. You implemented a new custom authentication scheme to
    allow control over users who access the sensitive parts of the application. You
    also reviewed conditional security with both authenticated and un-authenticated
    individuals and added parameters to allow the application to be used by both.


    Congratulations! You’ve just written your first APEX application. With the skills
    you’ve learned thus far, you have the capability to create just about any type
    of system you’ll need. Take a moment to bask in the glory of your achievement
    and then get ready to learn how to migrate your application from development to
    other systems.


    # 10. Application Bundling and Deployment


    The concept of application bundling and deployment is something developers should
    consider from the beginning when designing an application. In the case of APEX,
    built-in facilities help make the job easier. When it comes to application deployment,
    there are various ways to accomplish the same end goal, and no two IT organizations
    do it exactly the same way. This chapter will discuss the tools APEX provides
    to help you bundle and deploy applications as well as how to use them in a very
    APEX-centric way.


    Note: Your organization may already have a standardized way to achieve many of
    the things being introduced in this chapter. Before implementing any of these
    methods, check and make sure you’re not reinventing the wheel.'
