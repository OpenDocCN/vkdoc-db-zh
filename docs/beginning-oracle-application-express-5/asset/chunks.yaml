  trans: "#### 修改标签模板\n\n你将把 `P2_SUBJECT` 和 `P2_CREATED_BY`（对应于 `SUBJECT` 和 `CREATED_BY`\
    \ 表列）的标签模板修改为 **必填带帮助**。使用 **必填带帮助** 标签模板向最终用户表明此字段是表单上的必填字段。但是，这并不会使字段本身成为强制性的。你稍后会进行设置。\n\
    \n你还将减小 `P2_CREATED_BY` 的宽度，以节省显示空间。请按以下步骤操作：\n\n1.  编辑应用程序的第 2 页。\n2.  在树状窗格的“渲染”选项卡中，点击项目名称\
    \ `P2_SUBJECT` 进行编辑。\n3.  在属性编辑器中，滚动到“外观”属性组，如图 6-10 所示，将“模板”设置为 **必填**，然后点击“保存”。\n\
    \n![A978-1-4842-0466-5_6_Fig10_HTML.jpg](img/A978-1-4842-0466-5_6_Fig10_HTML.jpg)\n\
    图 6-10. 修改标签模板\n\n4.  在树状窗格的“渲染”选项卡中，点击项目名称 `P2_CREATED_BY` 进行编辑。\n5.  在属性编辑器中，滚动到“外观”属性组，如图\
    \ 6-11 所示。将“模板”设置为 **必填**，宽度设置为 `20`，然后点击“保存”。\n\n![A978-1-4842-0466-5_6_Fig11_HTML.jpg](img/A978-1-4842-0466-5_6_Fig11_HTML.jpg)\n\
    图 6-11. 设置显示属性\n\n接下来，你想对用户隐藏 `P2_STATUS_ID` 项目，因为你希望用户不能更改此值。然而，你希望所有新建工单的默认状态为\
    \ `OPEN`。由于无法保证哪个 `STATUS_ID` 对应哪个 `STATUS`，因此你可以调用一个简单函数并传入 `STATUS`。该函数会返回对应的\
    \ `STATUS_ID`，并将其设置为 `P2_STATUS_ID` 的默认值：\n\n1.  在树状窗格的“渲染”选项卡中，点击项目名称 `P2_STATUS_ID`\
    \ 进行编辑。\n2.  在“标识”属性组中，将“类型”设置为“隐藏”。\n3.  在如图 6-12 所示的“默认”属性组中，将“类型”设置为 **PL/SQL\
    \ 函数体**，并将默认值设置为 `RETURN get_status('OPEN');`。此函数是作为 第 4 章 中运行的脚本的一部分创建的。\n\n\
    ![A978-1-4842-0466-5_6_Fig12_HTML.jpg](img/A978-1-4842-0466-5_6_Fig12_HTML.jpg)\n\
    图 6-12. 指定默认值\n\n4.  点击“保存”。\n\n接下来，你希望将第 2 页设置为公共页面。你希望任何用户——无论是否经过身份验证——都能访问此页面：\n\
    \n1.  在树状窗格的“渲染”选项卡顶部，点击页面名称（第 2 页：创建工单）来编辑页面属性。\n2.  将第 2 页设置为公共页面，然后点击“应用更改”。有关详细步骤，请回顾\
    \ 第 5 章。\n\n最后，你需要确保用户为“主题”和“创建者”字段输入值。在 APEX 中有两种方法可以使字段成为必填项。出于演示目的，你将对每个字段使用不同的方法。\n\
    \n#### 使字段成为必填项\n\n对于“主题”字段，你将创建一个验证。虽然验证需要更多步骤，但它可以让你更好地控制验证的执行方式和时机。以下是你需要执行的操作，先对“主题”字段，然后对“创建者”字段：\n\
    \n1.  编辑应用程序的第 2 页。\n2.  切换到树状窗格的“处理”选项卡，在树中的“验证”节点上右键单击，然后选择“创建验证”，如图 6-13 所示，以创建新验证。\n\
    \n![A978-1-4842-0466-5_6_Fig13_HTML.jpg](img/A978-1-4842-0466-5_6_Fig13_HTML.jpg)\n\
    图 6-13. 选择创建新验证\n\n3.  你将在验证树中看到一个高亮显示的新节点，其名称旁边有一个红色 X。这表示验证已创建，但必须填写某些属性。查看属性编辑器，你会看到许多属性以红色高亮显示，如图\
    \ 6-14 所示。\n\n![A978-1-4842-0466-5_6_Fig14_HTML.jpg](img/A978-1-4842-0466-5_6_Fig14_HTML.jpg)\n\
    图 6-14. 需要完成的新验证\n\n4.  现在，我们将填写验证所需的属性，如图 6-15 所示：\n\n![A978-1-4842-0466-5_6_Fig15_HTML.jpg](img/A978-1-4842-0466-5_6_Fig15_HTML.jpg)\n\
    图 6-15. 输入新验证的详细信息\n\n    -   在“标识”属性组中，将名称设置为 `P2_SUBJECT is NOT NULL`。\n   \
    \ -   在“验证”属性组中，将“类型”设置为 **项目不为空**，然后使用弹出选择列表，将“项目”设置为 `P2_SUBJECT`。\n    -  \
    \ 在“错误”属性组中，将“错误消息”设置为 `#LABEL# 必须包含某个值`，并将“关联项目”设置为 `P2_SUBJECT`。\n    -   点击“保存”。\n\
    \n5.  接下来，使用第二种方法使“创建者”字段成为必填项。为此，只需设置输入项目的一个属性：\n    -   切换到树状窗格的“渲染”选项卡并编辑 `P2_CREATED_BY`。\n\
    \    -   在属性编辑器中，导航到如图 6-16 所示的“验证”属性组，将“值必填”设置为“是”，然后点击“保存”。\n\n![A978-1-4842-0466-5_6_Fig16_HTML.jpg](img/A978-1-4842-0466-5_6_Fig16_HTML.jpg)\n\
    图 6-16. 使值成为必填\n\n6.  如果你检查树状窗格的“处理”选项卡，会看到没有创建新的验证。这是因为你使用了项目级别的属性，而不是创建了完整的验证。项目级别验证与完整验证的主要区别在于，使用项目级别验证时，你无法有条件地控制属性何时应用，并且无法直接控制显示的错误消息。\n\
    \n继续并再次运行应用程序。此时，你应该能够将新工单输入系统，但在 SQL Workshop 之外无法看到它们。"
- fmt: '### Looking Behind the Scenes


    现在你有一个可工作的表单了，让我们来看看 APEX 表单向导到底构建了什么，以便更深入地理解表单的工作原理。如果你安装了 Web Developer Toolbar
    插件（适用于 Chrome 和 Firefox），可以使用 “Form » Display Form Details” 选项来显示表单详情。图 [6-17](#A978-1-4842-0466-5_6_Chapter.html#Fig17)
    展示了显示了表单详情的 “Create a Ticket” 表单。


    ![A978-1-4842-0466-5_6_Fig17_HTML.jpg](A978-1-4842-0466-5_6_Fig17_HTML.jpg)

    **图 6-17.** 显示了表单详情的 `TICKETS` 表单


    > 注意

    > Web Developer Toolbar 插件是一个由 Chris Pederick 编写的免费 Web 开发工具，可用于检查网页的各个方面。要了解更多关于
    Web Developer 的信息，请访问 [`http://chrispederick.com/`](http://chrispederick.com/)
    。


    高亮显示的 `input` 标签展示了表单每个字段的输入标识符和名称。这两者对于每个表单字段都是唯一的。输入标识符是在列名前加上了页码。输入名称则标识了 APEX
    在内部用于处理表单数据时使用的元素名称。请注意，那些你选择不在表单中显示的列，例如 `TICKET_ID` 和 `STATUS_ID`，仍然存在于页面的 HTML
    中。


    深入了解幕后会告诉你更多信息。编辑第 2 页，查看构成新表单的元素。


    图 [6-18](#A978-1-4842-0466-5_6_Chapter.html#Fig18) 展示了树状面板中的三个选项卡：Rendering（渲染）、Processing（处理）和
    Shared Components（共享组件）。Rendering 选项卡包含页面渲染所需的 APEX 对象。Processing 选项卡包含页面处理所需的对象，例如验证（validations）、进程（processes）和分支（branches）。Shared
    Components 选项卡包含跨页面共享的 APEX 对象，例如选项卡（tabs）、值列表（lists of values）、面包屑（breadcrumbs）、模板（templates）和安全方案（security
    schemes）。


    ![A978-1-4842-0466-5_6_Fig18_HTML.jpg](A978-1-4842-0466-5_6_Fig18_HTML.jpg)

    **图 6-18.** 从页面生成器（Page Builder）的各种树状面板中查看表单元素


    对于你的新 “Create a Ticket” 表单，在 Rendering 选项卡中，你会看到向导已经为你通过向导选择的 `TICKETS` 表的每一个列创建了一个项（item）。还有两个分别名为
    Cancel 和 Create 的按钮，以及一个 Fetch Row from TICKETS 进程。这个进程是一个自动行获取（Automated Row
    Fetch）进程，正如其名所示：它将指定表中的一行获取到当前表单中。自动行获取进程的属性指定了表所有者、表名、主键列、成功和失败消息以及一个条件。


    注意 `TICKET_ID` 项存在于树中，但并未在表单上渲染，也未出现在网格布局（Grid Layout）中。在表单的 “Display Details”
    视图（图 [6-17](#A978-1-4842-0466-5_6_Chapter.html#Fig17)）中，它作为页面上的第一个元素可见，但没有与之关联的可见元素。`TICKET_ID`
    是一个隐藏项（hidden item）。APEX 隐藏项用于保存一个值，但尽管它们在页面上被渲染，用户却不可见。在这个例子中，隐藏的 `TICKET_ID`
    列保存了 `TICKETS` 行的主键值。作为主键，`TICKET_ID` 被 APEX 进程用来从数据库提取数据，并处理对 `TICKETS` 行的插入、更新和删除操作。因为你不想让最终用户编辑主键，APEX
    会自动为你将其隐藏。


    在 Processing 选项卡中，你有一个 Process Row of TICKETS 进程、一个 Reset Page 进程和一个 Go To Page
    1 分支。Process Row of TICKETS 进程正是做这件事：它使用对应于 `TICKETS` 表各列的项中的值，来处理 `TICKETS` 表的一行。这个进程在用户点击
    Create 按钮时触发。Reset Page 进程会清除页面上的项。它在用户点击 Cancel 按钮时触发。


    在 Shared Components 选项卡中，你需要展开 Navigation Menu 树节点，才能看到此页面使用了 Desktop Navigation
    Menu。展开 Breadcrumbs 区域会显示 Breadcrumb 对象。在 Templates 下，你会看到你的表单使用了 Standard 页面模板、Title
    Bar 和 Standard 模板、两个不同的 Page Item 模板以及默认的 Button 模板。


    所有的 APEX 表单向导都会创建项、按钮和进程，但会根据表单类型的特定需求以不同的组合方式来创建。其他的 APEX 表单向导本质上以相同的方式工作，只是在进程类型和导航对象上略有差异，以适应底层数据源：表或视图、过程、查询或
    Web 服务。接下来，让我们看一个基于过程（procedure）的表单。


    ## Form on a Procedure


    在 APEX 中创建表单的另一种方式是基于 PL/SQL 过程的参数来创建。APEX 会调用关联的过程并执行其中嵌入的任何逻辑，而不是传统的 DML 进程。这种方法也被称为使用表
    API（table APIs），因为如果你工作区模式中对表的所有访问都必须通过表 API 完成，那么就应该选择这个选项。


    ### Creating a Form on a Procedure


    创建基于过程的表单与创建基于表的表单几乎相同。你将创建一个新页面，其中包含一个基于 `CONTACT_US` 存储过程的表单，该过程是在 [第 4 章](#A978-1-4842-0466-5_4_Chapter.html)
    的练习中创建的，它使用户能够通过 Help Desk 应用程序联系你：


    1.  导航到你的应用程序开发主页。

    2.  点击屏幕右上角的 Create Page 按钮。

    3.  选择 Form，然后点击 Next。

    4.  选择 Form on a Procedure，然后点击 Next。

    5.  将 Procedure Owner 设置为你的模式，为 Stored Procedure Name 输入 `CONTACT_US`，如图 [6-19](#A978-1-4842-0466-5_6_Chapter.html#Fig19)
    所示，然后点击 Next。


    ![A978-1-4842-0466-5_6_Fig19_HTML.jpg](A978-1-4842-0466-5_6_Fig19_HTML.jpg)

    **图 6-19.** 创建基于存储过程的表单


    6.  在页面的顶部区域，为 Page Number 输入 `3`，为 Page Name 和 Region Name 都输入 `Contact Us`，并将
    Breadcrumb 设置为 Breadcrumb。当区域刷新后，选择 Home (Page 1) 将其设置为 Parent Entry，如图 [6-20](#A978-1-4842-0466-5_6_Chapter.html#Fig20)
    所示，然后点击 Next。


    ![A978-1-4842-0466-5_6_Fig20_HTML.jpg](A978-1-4842-0466-5_6_Fig20_HTML.jpg)

    **图 6-20.** 选择面包屑父条目


    7.  对于 Navigation Preferences，选择 Identify an existing navigation menu entry for
    this page。页面刷新后，将 Existing Navigation Menu Entry 设置为 Home，然后点击 Next。

    8.  将 Invoking Page 和 Button Label 留空，然后点击 Next。

    9.  为 Branch here on Submit 和 Branch here on Cancel 都输入 `1`，如图 [6-21](#A978-1-4842-0466-5_6_Chapter.html#Fig21)
    所示。然后点击 Next。


    ![A978-1-4842-0466-5_6_Fig21_HTML.jpg](A978-1-4842-0466-5_6_Fig21_HTML.jpg)

    **图 6-21.** 指定分支选项


    10. 在图 [6-22](#A978-1-4842-0466-5_6_Chapter.html#Fig22) 的对话框中，将 `P_FROM` 的 Label
    设置为 From。将 P_BODY 的 Label 设置为 `Body`。将 P_BODY 的 Display Type 设置为 Textarea，然后点击
    Next。


    ![A978-1-4842-0466-5_6_Fig22_HTML.jpg](A978-1-4842-0466-5_6_Fig22_HTML.jpg)

    **图 6-22.** 指定过程参数


    11. 点击 Create。'
  raw: '### Looking Behind the Scenes


    Now that you have a working form, let’s look at just what the APEX Form wizard
    built in order to understand a bit more about how your form works. If you have
    installed the Web Developer Toolbar add-in (available for both Chrome and Firefox),
    you can use the Form ä Display Form Details option to display the form details.
    Figure [6-17](#A978-1-4842-0466-5_6_Chapter.html#Fig17) illustrates the Create
    a Ticket form with the form details exposed.


    ![A978-1-4842-0466-5_6_Fig17_HTML.jpg](A978-1-4842-0466-5_6_Fig17_HTML.jpg)


    Figure 6-17.


    Form on the `TICKETS` table with form details exposed Note


    The Web Developer Toolbar add-in is a free web-development tool, written by Chris
    Pederick, that lets you inspect various aspects of a web page. To learn more about
    Web Developer, visit [`http://chrispederick.com/`](http://chrispederick.com/)
    .


    The highlighted input tags display the input identifier and name for each field
    of the form. Both are unique for each form field. The input identifier is the
    column name prepended with the page number. The input name identifies the element
    names that APEX uses internally to process data in the form. Note that the columns
    you didn’t choose to display in the form, `TICKET_ID` and `STATUS_ID`, are still
    present in the page’s HTML.


    A look behind the scenes tells you more. Edit Page 2 to view the elements that
    make up the new form.


    Figure [6-18](#A978-1-4842-0466-5_6_Chapter.html#Fig18) shows three of the tabs
    from the tree pane: Rendering, Processing and Shared Components. The Rendering
    tab contains APEX objects required for page rendering. The Processing tab contains
    objects required for page processing, such as validations, processes, and branches.
    The Shared Components tab contains APEX objects that are shared across pages,
    such as tabs, lists of values, breadcrumbs, templates, and security schemes.


    ![A978-1-4842-0466-5_6_Fig18_HTML.jpg](A978-1-4842-0466-5_6_Fig18_HTML.jpg)


    Figure 6-18.


    Elements of a form as viewed from the Page Builder’s various tree panes


    For your new Create a Ticket form, in the Rendering tab, you see that the wizard
    has created one item for each of the columns from the `TICKETS` table that you
    selected via the wizard. There are also two buttons called Cancel and Create,
    and a Fetch Row from TICKETS process. This process is an Automated Row Fetch process,
    which does exactly what its name says: it fetches a row from the designated table
    into the current form. The attributes of the Automated Row Fetch process specify
    the table owner, the table name, the primary key column(s), success and failure
    messages, and a condition.


    Notice that the `TICKET_ID` item is present in the tree but isn’t rendered on
    the form, nor is it present in the Grid Layout. It’s visible in the Display Details
    view (Figure [6-17](#A978-1-4842-0466-5_6_Chapter.html#Fig17)) of the form as
    the first element on the page, with no visible element associated with it. `TICKET_ID`
    is a hidden item. APEX hidden items exist to hold a value, but although they’re
    rendered on the page, they aren’t visible to the user. In this case, the hidden
    `TICKET_ID` column holds the primary key value for the `TICKETS` row. As the primary
    key, `TICKET_ID` is used by the APEX processes to pull data from the database
    and to process inserts, updates, and deletes on a `TICKETS` row. Because you don’t
    want the end users to edit the primary key, APEX automatically hides it for you.


    In the Processing tab, you have a Process Row of TICKETS process, a Reset Page
    process, and a Go To Page 1 branch. The Process Row of TICKETS process does just
    that: it processes one row of the `TICKETS` table using the values from the items
    that correspond to the columns of the `TICKETS` table. This process fires when
    the user clicks the Create button. The Reset Page process clears the items on
    the page. It fires when the user clicks the Cancel button.


    In the Shared Components tab, you need to expand the Navigation Menu tree node
    to see that this page uses the Desktop Navigation Menu. Expanding the Breadcrumbs
    region shows the Breadcrumb object. Under Templates, you see that your form uses
    the Standard page template, the Title Bar and Standard templates, two different
    Page Item templates, and the default Button template.


    All APEX form wizards create items, buttons, and processes, but in different combinations
    to suit the specific needs of the form type. The other APEX form wizards perform
    essentially the same way, with slight differences in process types and navigation
    objects so as to accommodate the underlying data source: table or view, procedure,
    query, or web service. Next, let’s look at a form on a procedure.


    ## Form on a Procedure


    Another way to create a form in APEX is to create it based on the parameters of
    a PL/SQL procedure. Instead of the traditional DML processes, APEX calls the associated
    procedure and executes whatever logic is embedded within it. This method is also
    referred to as using table APIs, because this is the option to use if all access
    to tables in your workspace schema must be done through a table API.


    ### Creating a Form on a Procedure


    The process to create a form on a procedure is almost identical to that of a form
    on a table. You create a new page containing a form on the `CONTACT_US` stored
    procedure that was created as part of the exercises in [Chapter 4](#A978-1-4842-0466-5_4_Chapter.html),
    which enables users to contact you through the Help Desk application:


    Navigate to your applications development home page.   Click the Create Page button
    in the upper right of the screen.   Select Form and click Next.   Select Form
    on a Procedure and click Next.   Set Procedure Owner to your schema, enter `CONTACT_US`
    for Stored Procedure Name, as shown in Figure [6-19](#A978-1-4842-0466-5_6_Chapter.html#Fig19),
    and click Next.


    ![A978-1-4842-0466-5_6_Fig19_HTML.jpg](A978-1-4842-0466-5_6_Fig19_HTML.jpg)


    Figure 6-19.


    Creating a form on a stored procedure   In the top section of the page, enter
    `3` for Page Number, enter `Contact Us` for both Page Name and Region Name, and
    set Breadcrumb to Breadcrumb. When the region refreshes, select Home (Page 1)
    to set it as the Parent Entry, as shown in Figure [6-20](#A978-1-4842-0466-5_6_Chapter.html#Fig20),
    and click Next.


    ![A978-1-4842-0466-5_6_Fig20_HTML.jpg](A978-1-4842-0466-5_6_Fig20_HTML.jpg)


    Figure 6-20.


    Selecting the breadcrumb parent entry   For Navigation Preferences, select Identify
    an existing navigation menu entry for this page. When the page refreshes, set
    Existing Navigation Menu Entry to Home, then click Next.   Leave Invoking Page
    and Button Label blank, and click Next.   Enter `1` for both Branch here on Submit
    and Branch here on Cancel, as shown in Figure [6-21](#A978-1-4842-0466-5_6_Chapter.html#Fig21).
    Then click Next.


    ![A978-1-4842-0466-5_6_Fig21_HTML.jpg](A978-1-4842-0466-5_6_Fig21_HTML.jpg)


    Figure 6-21.


    Specifying branching options   In the dialog in Figure [6-22](#A978-1-4842-0466-5_6_Chapter.html#Fig22),
    set the Label for `P_FROM` to From. Set the Label for P_BODY to `Body`. Set the
    Display Type for P_BODY to Textarea, and then click Next.


    ![A978-1-4842-0466-5_6_Fig22_HTML.jpg](A978-1-4842-0466-5_6_Fig22_HTML.jpg)


    Figure 6-22.


    Specifying procedure arguments   Click Create.'
