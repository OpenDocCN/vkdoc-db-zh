- fmt: "## More on APEX Forms\n\nWhen creating forms, the APEX wizards do about 80\
    \ percent of what you want them to do. The last 20 percent of fine tuning is up\
    \ to you, the developer. In this section you will make a number of small changes\
    \ to the Manage Tickets and Ticket Details forms, with the overall goal of increasing\
    \ usability.\n\n### Item Layout\n\nAPEX 5.0 provides two ways to adjust item layout:\
    \ adjusting certain item attribute settings, and dragging items in the tree view.\
    \ You’ll use both of these methods to adjust the Manage Tickets and Ticket Details\
    \ forms.\n\nIn many of the older themes, APEX laid out form items using standard\
    \ HTML tables. This was somewhat limiting, as the rows and columns of a table\
    \ are fairly fixed in terms of layout. Using the new Universal Theme, APEX has\
    \ introduced the idea of a more loosely defined grid layout. Instead of HTML tables\
    \ with rows and columns, `DIV` elements are used to encapsulate each item.\n\n\
    Think of a grid as a coordinate system where items are placed either next to one\
    \ another or above one another. This grid layout may seem limiting, but you can\
    \ rearrange items using the grid attributes of items. In this section, you will\
    \ use the grid attributes of the items on your page to move the Assigned To, Created\
    \ On, and Created By items to a single row.\n\nBegin adjusting the Manage Tickets\
    \ form layout by altering the item `P210_CREATED_ON` so it’s automatically populated\
    \ with today’s date. Then, set it so it always displays in read-only mode, preventing\
    \ users from making any changes:\n\n1.  Edit Page 210 of the application.\n2.\
    \  Edit the item `P210_CREATED_ON` by clicking its name.\n3.  In the Properties\
    \ Editor navigate to the Default attribute group, as shown in Figure 6-54, set\
    \ Type to `PL/SQL Expression` and enter `SYSDATE` as the Default Value.\n\n![A978-1-4842-0466-5_6_Fig54_HTML.jpg](A978-1-4842-0466-5_6_Fig54_HTML.jpg)\n\
    \nFigure 6-54. Specifying a default value for a date\n\n4.  In the Read Only attribute\
    \ group seen in Figure 6-55, set Type to `Always`.\n\n![A978-1-4842-0466-5_6_Fig55_HTML.jpg](A978-1-4842-0466-5_6_Fig55_HTML.jpg)\n\
    \nFigure 6-55. Setting the read-only condition\n\nYou’re also going to alter `P210_CLOSED_ON`.\
    \ In order to reduce errors, you can use a little-known HTML attribute to make\
    \ the actual input field read-only. The user is then forced to use the date picker\
    \ pop-up:\n\n1.  Edit the item `P210_CLOSED_ON` by clicking its name.\n2.  In\
    \ the Appearance attribute group, enter `12` for Width.\n3.  In the Advanced attribute\
    \ group, add the following text immediately after the existing text in the Custom\
    \ Attributes field (as shown in Figure 6-56): `readonly=\"readonly\"`\n\n![A978-1-4842-0466-5_6_Fig56_HTML.jpg](A978-1-4842-0466-5_6_Fig56_HTML.jpg)\n\
    \nFigure 6-56. Setting the width and adding an HTML form element `readonly=\"\
    readonly\"`\n\n4.  Click Save.\n\n### Placing Multiple Items in the Same Row\n\
    \nNow, let’s rearrange the items on the page so they aren’t in a single column\
    \ but rather are arranged with multiple items are in the same row:\n\n1.  Edit\
    \ Page 210.\n2.  Using your mouse, click and drag `P210_CREATED_BY` in the grid\
    \ layout so it will be placed in a new grid position to the right of `P210_CREATED_ON`.\
    \ As you drag a component around the grid, a yellow box indicates an area where\
    \ it can be dropped. There is also a position indicator, in the form of a grey\
    \ box, that indicates the current drop position of the component, as shown in\
    \ Figure 6-57.\n\n![A978-1-4842-0466-5_6_Fig57_HTML.jpg](A978-1-4842-0466-5_6_Fig57_HTML.jpg)\n\
    \nFigure 6-57. Repositioning `P210_CREATED_BY` by clicking and dragging the component\n\
    \n3.  When you’ve positioned the fields correctly, the grid layout looks like\
    \ Figure 6-58.\n\n![A978-1-4842-0466-5_6_Fig58_HTML.jpg](A978-1-4842-0466-5_6_Fig58_HTML.jpg)\n\
    \nFigure 6-58. The repositioned component in the grid layout\n\nNow you need to\
    \ make sure the Assigned To, Created On, and Created By fields are displayed on\
    \ the same line:\n\n4.  Using the same techniques you just learned, reposition\
    \ `P210_ASSIGNED_TO` so that it is directly before `P210_CLOSED_ON`. When all\
    \ of the components are positioned correctly, the grid layout will look as shown\
    \ in Figure 6-59.\n\n![A978-1-4842-0466-5_6_Fig59_HTML.jpg](A978-1-4842-0466-5_6_Fig59_HTML.jpg)\n\
    \nFigure 6-59. The three repositioned components in the grid layout\n\n5.  Click\
    \ Save.\n\n### Implementing LOVs\n\nNext, you’ll tie the lists of values (LOVs)\
    \ that you created in Chapter 4 to the `P210_ASSIGNED_TO` and `P210_CREATED_BY`\
    \ items on the form:\n\n1.  Edit Page 210 of the application.\n2.  Edit the item\
    \ `P210_ASSIGNED_TO` by clicking its name.\n3.  In the Identification attribute\
    \ group, set Type to `Select List`.\n4.  In the List of Values attribute group\
    \ (see Figure 6-60), set Type to `Shared Component`, List of Values to `TECHS`,\
    \ Display Extra Values to `No`, Display Null Value to `Yes`, and enter `- Select\
    \ a Tech -` for Null Display Value.\n\n![A978-1-4842-0466-5_6_Fig60_HTML.jpg](A978-1-4842-0466-5_6_Fig60_HTML.jpg)\n\
    \nFigure 6-60. Setting LOV attributes\n\n5.  Edit the item `P210_CREATED_BY` by\
    \ double-clicking its name.\n6.  In the Identification attribute group, set Type\
    \ to `Select List`.\n7.  In the List of Values attribute group (see Figure 6-60),\
    \ set Type to `Shared Component`, List of Values to `USERS`, Display Extra Values\
    \ to `No`, Display Null Value to `Yes`, and enter `- Select a User -` for Null\
    \ Display Value.\n8.  Save and Run the application. You should see results like\
    \ those shown in Figure 6-61. Notice how the components are very small, even though\
    \ there seems to be a lot of white space.\n\n![A978-1-4842-0466-5_6_Fig61_HTML.jpg](A978-1-4842-0466-5_6_Fig61_HTML.jpg)\n\
    \nFigure 6-61. The Manage Tickets form using the new field placement\n\nClicking\
    \ the Show Grid button in the Developer Toolbar at the bottom of the page, and\
    \ then hovering your mouse over one of the field labels, will show that the label\
    \ is taking up three columns of the grid, as shown in Figure 6-62.\n\n![A978-1-4842-0466-5_6_Fig62_HTML.jpg](A978-1-4842-0466-5_6_Fig62_HTML.jpg)\n\
    \nFigure 6-62. The Manage Tickets form with Show Grid turned on\n\nThe page default\
    \ is for each label to take up three columns of the grid; when you place more\
    \ than one item on the same line, it forces the items to shrink to fit the space.\
    \ We can fix this by adjusting the Label Column Span setting. However, if you\
    \ only adjust for the three labels in question, you’ll end up with form elements\
    \ that don’t line up with the rest of the form. In our case, we want to adjust\
    \ the labels for all the enterable components on the screen:\n\n1.  Edit the following\
    \ together by using CTRL-Click (COMMAND-Click for Mac):\n    `P210_SUBJECT`\n\
    \    `P210_DESCR`\n    `P210_ASSIGNED_TO`\n    `P210_CREATED_ON`\n    `P210_CREATED_BY`\n\
    \    `P210_CLOSED_ON`\n    `P210_STATUS_ID`\n2.  In the Property Editor, navigate\
    \ to the Grid attribute group, as shown in Figure 6-63, set Label Column Span\
    \ to `2`, and click Save.\n\n![A978-1-4842-0466-5_6_Fig63_HTML.jpg](A978-1-4842-0466-5_6_Fig63_HTML.jpg)\n\
    \nFigure 6-63. Altering Label Column Span to allow for expanded item size\n\n\
    3.  Once again, run the application, and you will notice the difference in how\
    \ the items are laid out on the page. You should see results like those shown\
    \ in Figure 6-64.\n\n![A978-1-4842-0466-5_6_Fig64_HTML.jpg](A978-1-4842-0466-5_6_Fig64_HTML.jpg)\n\
    \nFigure 6-64. Corrected layout for the Manage Tickets form"
  raw: '## More on APEX Forms


    When creating forms, the APEX wizards do about 80 percent of what you want them
    to do. The last 20 percent of fine tuning is up to you, the developer. In this
    section you will make a number of small changes to the Manage Tickets and Ticket
    Details forms, with the overall goal of increasing usability.


    ### Item Layout


    APEX 5.0 provides two ways to adjust item layout: adjusting certain item attribute
    settings, and dragging items in the tree view. You’ll use both of these methods
    to adjust the Manage Tickets and Ticket Details forms.


    In many of the older themes, APEX laid out form items using standard HTML tables.
    This was somewhat limiting, as the rows and columns of a table are fairly fixed
    in terms of layout. Using the new Universal Theme, APEX has introduced the idea
    of a more loosely defined grid layout. Instead of HTML tables with rows and columns,
    DIV elements are used to encapsulate each item.


    Think of a grid as a coordinate system where items are placed either next to one
    another or above one another. This grid layout may seem limiting, but you can
    rearrange items using the grid attributes of items. In this section, you will
    use the grid attributes of the items on your page to move the Assigned To, Created
    On, and Created By items to a single row.


    Begin adjusting the Manage Tickets form layout by altering the item `P210_CREATED_ON`
    so it’s automatically populated with today’s date. Then, set it so it always displays
    in read-only mode, preventing users from making any changes:


    Edit Page 210 of the application.   Edit the item P210_CREATED_ON by clicking
    its name.   In the Properties Editor navigate to the Default attribute group,
    as shown in Figure [6-54](#A978-1-4842-0466-5_6_Chapter.html#Fig54), set Type
    to PL/SQL Expression and enter `SYSDATE` as the Default Value.


    ![A978-1-4842-0466-5_6_Fig54_HTML.jpg](A978-1-4842-0466-5_6_Fig54_HTML.jpg)


    Figure 6-54.


    Specifying a default value for a date   In the Read Only attribute group seen
    in Figure [6-55](#A978-1-4842-0466-5_6_Chapter.html#Fig55), set Type to Always.


    ![A978-1-4842-0466-5_6_Fig55_HTML.jpg](A978-1-4842-0466-5_6_Fig55_HTML.jpg)


    Figure 6-55.


    Setting the read-only condition You’re also going to alter `P210_CLOSED_ON`. In
    order to reduce errors, you can use a little-known HTML attribute to make the
    actual input field read-only. The user is then forced to use the date picker pop-up:
      Edit the item P210_CLOSED_ON by clicking its name.   In the Appearance attribute
    group, enter `12` for Width.   In the Advanced attribute group, add the following
    text immediately after the existing text in the Custom Attributes field (as shown
    in Figure [6-56](#A978-1-4842-0466-5_6_Chapter.html#Fig56)):


    ![A978-1-4842-0466-5_6_Fig56_HTML.jpg](A978-1-4842-0466-5_6_Fig56_HTML.jpg)


    Figure 6-56.


    Setting the width and adding an HTML form element `readonly="readonly"`   Click
    Save.


    ### Placing Multiple Items in the Same Row


    Now, let’s rearrange the items on the page so they aren’t in a single column but
    rather are arranged with multiple items are in the same row:


    Edit Page 210.   Using your mouse, click and drag P210_CREATED_BY in the grid
    layout so it will be placed in a new grid position to the right of `P210_CREATED_ON`.
    As you drag a component around the grid, a yellow box indicates an area where
    it can be dropped. There is also a position indicator, in the form of a grey box,
    that indicates the current drop position of the component, as shown in Figure
    [6-57](#A978-1-4842-0466-5_6_Chapter.html#Fig57).


    ![A978-1-4842-0466-5_6_Fig57_HTML.jpg](A978-1-4842-0466-5_6_Fig57_HTML.jpg)


    Figure 6-57.


    Repositioning P210_CREATED_BY by clicking and dragging the component   When you’ve
    positioned the fields correctly, the grid layout looks like Figure [6-58](#A978-1-4842-0466-5_6_Chapter.html#Fig58).


    ![A978-1-4842-0466-5_6_Fig58_HTML.jpg](A978-1-4842-0466-5_6_Fig58_HTML.jpg)


    Figure 6-58.


    The repositioned component in the grid layout Now you need to make sure the Assigned
    To, Created On, and Created By fields are displayed on the same line:   Using
    the same techniques you just learned, reposition `P210_ASSIGNED_TO` so that it
    is directly before `P210_CLOSED_ON.` When all of the components are positioned
    correctly, the grid layout will look as shown in Figure [6-59](#A978-1-4842-0466-5_6_Chapter.html#Fig59).


    ![A978-1-4842-0466-5_6_Fig59_HTML.jpg](A978-1-4842-0466-5_6_Fig59_HTML.jpg)


    Figure 6-59.


    The three repositioned components in the grid layout   Click Save.


    ### Implementing LOVs


    Next, you’ll tie the lists of values (LOVs) that you created in [Chapter 4](#A978-1-4842-0466-5_4_Chapter.html)
    to the `P210_ASSIGNED_TO` and `P210_CREATED_BY` items on the form:


    Edit Page 210 of the application.   Edit the item P210_ASSIGNED_TO by clicking
    its name.   In the Identification attribute group, set Type to Select List.  
    In the List of Values attribute group (see Figure [6-60](#A978-1-4842-0466-5_6_Chapter.html#Fig60)),
    set Type to Shared Component, List of Values to TECHS, Display Extra Values to
    No, Display Null Value to Yes, and enter `- Select a Tech -` for Null Display
    Value.


    ![A978-1-4842-0466-5_6_Fig60_HTML.jpg](A978-1-4842-0466-5_6_Fig60_HTML.jpg)


    Figure 6-60.


    Setting LOV attributes   Edit the item P210_CREATED_BY by double-clicking its
    name.   In the Identification attribute group, set Type to Select List.   In the
    List of Values attribute group (see Figure [6-60](#A978-1-4842-0466-5_6_Chapter.html#Fig60)),
    set Type to Shared Component, List of Values to USERS, Display Extra Values to
    No, Display Null Value to Yes, and enter `- Select a User -` for Null Display
    Value.   Save and Run the application. You should see results like those shown
    in Figure [6-61](#A978-1-4842-0466-5_6_Chapter.html#Fig61). Notice how the components
    are very small, even though there seems to be a lot of white space.


    ![A978-1-4842-0466-5_6_Fig61_HTML.jpg](A978-1-4842-0466-5_6_Fig61_HTML.jpg)


    Figure 6-61.


    The Manage Tickets form using the new field placement Clicking the Show Grid button
    in the Developer Toolbar at the bottom of the page, and then hovering your mouse
    over one of the field labels, will show that the label is taking up three columns
    of the grid, as shown in Figure [6-62](#A978-1-4842-0466-5_6_Chapter.html#Fig62).


    ![A978-1-4842-0466-5_6_Fig62_HTML.jpg](A978-1-4842-0466-5_6_Fig62_HTML.jpg)


    Figure 6-62.


    The Manage Tickets form with Show Grid turned on The page default is for each
    label to take up three columns of the grid; when you place more than one item
    on the same line, it forces the items to shrink to fit the space. We can fix this
    by adjusting the Label Column Span setting. However, if you only adjust for the
    three labels in question, you’ll end up with form elements that don’t line up
    with the rest of the form. In our case, we want to adjust the labels for all the
    enterable components on the screen:   Edit the following together by using CTRL-Click
    (COMMAND-Click for Mac): `P210_SUBJECT` `P210_DESCR` `P210_ASSIGNED_TO` `P210_CREATED_ON`
    `P210_CREATED_BY` `P210_CLOSED_ON` `P210_STATUS_ID`   In the Property Editor,
    navigate to the Grid attribute group, as shown in Figure [6-63](#A978-1-4842-0466-5_6_Chapter.html#Fig63),
    set Label Column Span to 2, and click Save.


    ![A978-1-4842-0466-5_6_Fig63_HTML.jpg](A978-1-4842-0466-5_6_Fig63_HTML.jpg)


    Figure 6-63.


    Altering Label Column Span to allow for expanded item size   Once again, run the
    application, and you will notice the difference in how the items are laid out
    on the page. You should see results like those shown in Figure [6-64](#A978-1-4842-0466-5_6_Chapter.html#Fig64).


    ![A978-1-4842-0466-5_6_Fig64_HTML.jpg](A978-1-4842-0466-5_6_Fig64_HTML.jpg)


    Figure 6-64.


    Corrected layout for the Manage Tickets form'
  trans: "\n## 关于 APEX 表单的更多内容\n\n在创建表单时，APEX 向导能完成你大约 80% 的期望工作。最后 20% 的微调工作则需要你——开发者——来完成。在本节中，你将对“管理工单”和“工单详情”表单进行一些小的修改，总体目标是提升可用性。\n\
    \n### 项目布局\n\nAPEX 5.0 提供了两种调整项目布局的方式：调整特定的项目属性设置，以及在树形视图中拖拽项目。你将使用这两种方法来调整“管理工单”和“工单详情”表单。\n\
    \n在许多旧主题中，APEX 使用标准的 HTML 表格来布局表单项。这有一定的局限性，因为表格的行列布局相对固定。使用新的通用主题，APEX 引入了更灵活的网格布局概念。不再使用带有行列的\
    \ HTML 表格，而是用 `DIV` 元素来封装每个项目。\n\n可以将网格想象成一个坐标系统，项目被放置在彼此旁边或上下位置。这种网格布局看起来可能有限制，但你可以利用项目的网格属性来重新排列项目。在本节中，你将使用页面上项目的网格属性，将“分配给”、“创建于”和“创建者”项目移动到同一行。\n\
    \n通过修改项目 `P210_CREATED_ON` 来开始调整“管理工单”表单的布局，使其自动填充今天的日期。然后，将其设置为始终以只读模式显示，以防止用户进行任何更改：\n\
    \n1.  编辑应用程序的第 210 页。\n2.  单击项目名称以编辑项目 `P210_CREATED_ON`。\n3.  在属性编辑器中，导航到“默认值”属性组（如图\
    \ 6-54 所示），将“类型”设置为 `PL/SQL 表达式`，并在“默认值”中输入 `SYSDATE`。\n\n![A978-1-4842-0466-5_6_Fig54_HTML.jpg](img/A978-1-4842-0466-5_6_Fig54_HTML.jpg)\n\
    \n图 6-54. 为日期指定默认值\n\n4.  在如图 6-55 所示的“只读”属性组中，将“类型”设置为 `始终`。\n\n![A978-1-4842-0466-5_6_Fig55_HTML.jpg](img/A978-1-4842-0466-5_6_Fig55_HTML.jpg)\n\
    \n图 6-55. 设置只读条件\n\n你还要修改 `P210_CLOSED_ON`。为了减少错误，你可以使用一个鲜为人知的 HTML 属性来使实际的输入字段变为只读。这样用户就只能使用日期选择器弹出窗口：\n\
    \n1.  单击项目名称以编辑项目 `P210_CLOSED_ON`。\n2.  在“外观”属性组中，为“宽度”输入 `12`。\n3.  在“高级”属性组中，在“自定义属性”字段的现有文本后立即添加以下文本（如图\
    \ 6-56 所示）：`readonly=\"readonly\"`\n\n![A978-1-4842-0466-5_6_Fig56_HTML.jpg](img/A978-1-4842-0466-5_6_Fig56_HTML.jpg)\n\
    \n图 6-56. 设置宽度并添加 HTML 表单元素 `readonly=\"readonly\"`\n\n4.  单击“保存”。\n\n### 将多个项目放置在同一行\n\
    \n现在，让我们重新排列页面上的项目，使它们不在单列中，而是将多个项目排列在同一行：\n\n1.  编辑第 210 页。\n2.  用鼠标点击并拖动网格布局中的\
    \ `P210_CREATED_BY`，将其放置在 `P210_CREATED_ON` 右侧的新网格位置。当你在网格中拖动组件时，黄色框表示可以放置的区域。还有一个位置指示器，以灰色框的形式，显示组件当前的放置位置，如图\
    \ 6-57 所示。\n\n![A978-1-4842-0466-5_6_Fig57_HTML.jpg](img/A978-1-4842-0466-5_6_Fig57_HTML.jpg)\n\
    \n图 6-57. 通过点击并拖动组件来重新定位 `P210_CREATED_BY`\n\n3.  当你正确放置字段后，网格布局看起来如图 6-58 所示。\n\
    \n![A978-1-4842-0466-5_6_Fig58_HTML.jpg](img/A978-1-4842-0466-5_6_Fig58_HTML.jpg)\n\
    \n图 6-58. 网格布局中重新定位的组件\n\n现在你需要确保“分配给”、“创建于”和“创建者”字段显示在同一行：\n\n4.  使用你刚刚学到的相同技术，重新定位\
    \ `P210_ASSIGNED_TO`，使其直接位于 `P210_CLOSED_ON` 之前。当所有组件都正确定位后，网格布局将如图 6-59 所示。\n\
    \n![A978-1-4842-0466-5_6_Fig59_HTML.jpg](img/A978-1-4842-0466-5_6_Fig59_HTML.jpg)\n\
    \n图 6-59. 网格布局中三个重新定位的组件\n\n5.  单击“保存”。\n\n### 实现值列表\n\n接下来，你将把第 4 章中创建的值列表绑定到表单上的\
    \ `P210_ASSIGNED_TO` 和 `P210_CREATED_BY` 项目：\n\n1.  编辑应用程序的第 210 页。\n2.  单击项目名称以编辑项目\
    \ `P210_ASSIGNED_TO`。\n3.  在“标识”属性组中，将“类型”设置为 `选择列表`。\n4.  在“值列表”属性组中（见图 6-60），将“类型”设置为“共享组件”，“值列表”设置为\
    \ `TECHS`，“显示额外值”设置为“否”，“显示空值”设置为“是”，并在“空值显示值”中输入 `- 选择一名技术人员 -`。\n\n![A978-1-4842-0466-5_6_Fig60_HTML.jpg](img/A978-1-4842-0466-5_6_Fig60_HTML.jpg)\n\
    \n图 6-60. 设置值列表属性\n\n5.  双击项目名称以编辑项目 `P210_CREATED_BY`。\n6.  在“标识”属性组中，将“类型”设置为\
    \ `选择列表`。\n7.  在“值列表”属性组中（见图 6-60），将“类型”设置为“共享组件”，“值列表”设置为 `USERS`，“显示额外值”设置为“否”，“显示空值”设置为“是”，并在“空值显示值”中输入\
    \ `- 选择一名用户 -`。\n8.  保存并运行应用程序。你应该会看到类似图 6-61 所示的结果。注意组件变得非常小，尽管似乎有很多空白区域。\n\n\
    ![A978-1-4842-0466-5_6_Fig61_HTML.jpg](img/A978-1-4842-0466-5_6_Fig61_HTML.jpg)\n\
    \n图 6-61. 使用新字段位置的“管理工单”表单\n\n单击页面底部的开发者工具栏中的“显示网格”按钮，然后将鼠标悬停在某个字段标签上，将显示该标签占据了网格的三列，如图\
    \ 6-62 所示。\n\n![A978-1-4842-0466-5_6_Fig62_HTML.jpg](img/A978-1-4842-0466-5_6_Fig62_HTML.jpg)\n\
    \n图 6-62. 开启“显示网格”后的“管理工单”表单\n\n页面默认每个标签占据三列网格；当你将多个项目放在同一行时，这会迫使项目缩小以适应空间。我们可以通过调整“标签列跨度”设置来解决这个问题。然而，如果你只为这三个标签进行调整，最终会导致表单元素无法与表单的其他部分对齐。在我们的例子中，我们希望调整屏幕上所有可输入组件的标签：\n\
    \n1.  使用 CTRL-单击（Mac 使用 COMMAND-单击）同时编辑以下项目：\n    `P210_SUBJECT`\n    `P210_DESCR`\n\
    \    `P210_ASSIGNED_TO`\n    `P210_CREATED_ON`\n    `P210_CREATED_BY`\n    `P210_CLOSED_ON`\n\
    \    `P210_STATUS_ID`\n2.  在属性编辑器中，导航到“网格”属性组（如图 6-63 所示），将“标签列跨度”设置为 `2`，然后单击“保存”。\n\
    \n![A978-1-4842-0466-5_6_Fig63_HTML.jpg](img/A978-1-4842-0466-5_6_Fig63_HTML.jpg)\n\
    \n图 6-63. 更改标签列跨度以允许项目尺寸扩大\n\n3.  再次运行应用程序，你会注意到页面上项目布局的变化。你应该会看到类似图 6-64 所示的结果。\n\
    \n![A978-1-4842-0466-5_6_Fig64_HTML.jpg](img/A978-1-4842-0466-5_6_Fig64_HTML.jpg)\n\
    \n图 6-64. 修正后的“管理工单”表单布局\n"
- fmt: '### Master–Detail Cleanup


    You need to make a few more minor tweaks to the master–detail report and form.
    Let’s start by hiding the `TICKET_ID` column from the detail report and form.
    At the detail level, `TICKET_ID` is the foreign key and should not be an editable
    item:


    Edit Page 210 of the application.

    Expand the Columns child node under the Ticket Details report node in the Rendering
    tree.

    Click on the `TICKET_ID` column and hide it by editing its Type attribute and
    setting the value to Hidden Column.

    Using multi-select, enable sorting for the `DETAILS`, `CREATED_ON`, and `CREATED_BY`
    columns by setting the Sortable attribute to Yes, as shown in Figure [6-65](#A978-1-4842-0466-5_6_Chapter.html#Fig65).


    ![A978-1-4842-0466-5_6_Fig65_HTML.jpg](A978-1-4842-0466-5_6_Fig65_HTML.jpg)

    Figure 6-65. Specifying whether sortable for columns


    Lastly, edit the `TICKET_DETAILS_ID` column and change its Heading attribute to
    `Edit`.

    Click Save.


    Finally, make a few small changes to the items on page 220:


    Edit Page 220 of the application.

    Edit the item `P220_TICKET_ID`.

    In the Identification attribute group, set Type to Hidden.

    Edit the item `P220_DETAILS`.

    In the Appearance attribute group, set Height to 5.

    Edit the item `P220_CREATED_ON`.

    In the Default attribute group set Type to PL/SQL Expression, then enter `SYSDATE`
    as the PL/SQL Expression.

    In the Read Only section, set Type to Always.

    Edit the item `P220_CREATED_BY`.

    Set Type to Select List. In the List of Values attribute group, set Type to Shared
    Component, List of Values to TECHS, Display Extra Values to No, Display Null Values
    to Yes, and enter `- Select a Tech -` for Null Display Value.

    Save your changes.


    Since Page 220 is set up as a modal dialog, you cannot run the page directly.
    Instead, you’ll have to navigate to either Page 200 or 210 to run the application.


    Your master–detail report and form are now complete. Using the Master Detail Form
    wizard, you generated a report and master–detail form on the `TICKETS` and `TICKET_DETAILS`
    tables. You modified the report to contain a user-friendly status value, sortable
    columns, and your preferred date formats. You modified the Manage Tickets and
    Ticket Details forms to order items on the page, use text areas, and select lists.
    Along the way, you reviewed the APEX components that make up your report and forms,
    as well as the form, report, and column attributes available for customizing forms
    and reports to suit your needs.


    ## APEX Help


    Providing help to end users is an often forgotten and typically tedious task.
    Developers typically take the easy route and skip it altogether, or the task is
    minimized or cut at the end of a project. Although APEX can’t magically incorporate
    help into your applications, it does make it a lot easier for you, as a developer,
    to do so.


    ### Adding a Help Text Region


    The APEX Help Text region automatically displays any associated help text for
    a given page and its items. It can be placed on any page, including a global page.
    Although you can choose a region template for a Help Text region, there is no
    way to change the style of the actual text. As an example, let’s add a Help Text
    region to page 210 as a sub-region to the master Edit region:


    Edit Page 210 of the application.

    Create a new Help Text region by navigating to the Regions pallet of the Component
    Gallery and dragging the Help Text icon to the Sub Regions section inside the
    Manage Tickets region, as shown in Figure [6-66](#A978-1-4842-0466-5_6_Chapter.html#Fig66).


    ![A978-1-4842-0466-5_6_Fig66_HTML.jpg](A978-1-4842-0466-5_6_Fig66_HTML.jpg)

    Figure 6-66. Creating a Help Text region


    In the Properties Editor, set the Name to Help.

    In the Appearance attributes group, set the Template to Collapsible and then click
    on the Template Options button to expand the Template Options pop-up.

    Set the Default State to Collapsed and click OK.

    Save and Run your application.


    Notice that when you run page 210, you will see the region title Help rendered
    with a > next to it at the bottom of the Manage Tickets region. The newly created
    Help region was created as a sub-region, and therefore it appears within its parent
    region. Clicking the ➤ expands the region; thus, the help text is only displayed
    when the user explicitly requests it. Currently, the Help region doesn’t have
    any help text. You seed the item-level help text in the next section. You can
    add page-level help by editing the page definition and entering text into the
    Help Text input of the Help section.


    ### Seeding Help Text


    Notice that not all the items are shown in the Help region. This is because some
    help text was added to this region when the UI Defaults were defined, but the
    other items’ help text is still empty. Help text defined in the UI Defaults is
    automatically pulled into any form that is built using those defaults. You can
    manually add help text by editing each item. You can also seed any APEX items
    that don’t have help text already assigned using yet another APEX wizard.


    At the upper right in the Application Builder, click the Utilities icon, as shown
    in Figure [6-67](#A978-1-4842-0466-5_6_Chapter.html#Fig67), and select Application
    Utilities so as to go to the Application Utilities home page.


    ![A978-1-4842-0466-5_6_Fig67_HTML.jpg](A978-1-4842-0466-5_6_Fig67_HTML.jpg)

    Figure 6-67. Locating the Application Utilities icon


    In the Page-Specific Utilities region at right of the page, click Item Utilities.

    Click Grid Edit of all Item Help Text. The report here shows only those items
    that already have help text associated with them. However, you can use one of
    the buttons on this form to seed all empty help text in your application with
    a single default value. There is no perfect value with which to seed the help
    text, but something like “Need Help Text” indicates that the help for that item
    needs to be entered:

    Click Seed Item Help Text.

    Enter `NEED HELP TEXT` for Default Help Text in the Seed Item Help section, as
    shown in Figure [6-68](#A978-1-4842-0466-5_6_Chapter.html#Fig68), and click Apply
    Changes.


    ![A978-1-4842-0466-5_6_Fig68_HTML.jpg](A978-1-4842-0466-5_6_Fig68_HTML.jpg)

    Figure 6-68. Seeding item help


    The help text has been seeded, and you’re taken back to the main report. From
    here you can narrow the items that are displayed and edit the help text directly:

    In the Report Filter section at the top of the page, enter `210` for Minimum Page
    Number, and click Go.


    At this point, you’re viewing all the help text for any item on page 210 or greater
    in a single interface. Feel free to change the values for any of the items on
    page 210 in order to see them in the Help region.


    Once you’ve altered and saved your help, run page 210. Note that if you click
    the question mark icon next to any individual item on page 210, a pop-up window
    appears, displaying the help specific to that item.


    The APEX Help Text region automatically displays the help text for a given page
    and its associated items. Display of the help text is managed by APEX behind the
    scenes. Although it isn’t very robust—there is no way to alter the look and feel
    of the region with templates or otherwise—there is now no excuse for not adding
    help to your application.'
