    A page-navigation section is shown in Figure [11-24](#A978-1-4842-0466-5_11_Chapter.html#Fig24).
    Clicking the Edit link takes you to the Edit page (see Figure [11-25](#A978-1-4842-0466-5_11_Chapter.html#Fig25)).
