    ## 授权


    认证回答的是“你是谁？”的问题，而授权则致力于回答“登录后你被允许做什么？” APEX 提供了称为授权方案的应用程序共享组件。这些授权方案可以应用于应用程序内的组件，以告知
    APEX 引擎何时应执行或渲染这些组件。


    当你创建访问控制页面时，APEX 为你创建了三个授权方案，分别对应编辑屏幕中可用的每个角色：`Admin`、`Edit` 和 `View`。图 9-21 显示了授权方案共享组件报告。


    ![A978-1-4842-0466-5_9_Fig21_HTML.jpg](A978-1-4842-0466-5_9_Fig21_HTML.jpg)

    **图 9-21.** 作为访问控制机制一部分创建的授权方案


    此过程的最后一步是开始使用这些授权方案锁定页面。首先，让我们锁定应用程序的管理员部分，以便只有具有 `Admin` 权限的用户才能使用它：


    1.  编辑页面 `620`。

    2.  通过点击页面名称编辑页面属性。

    3.  在属性编辑器的 `Security` 部分，将 `Authorization Scheme` 设置为 `access control - administrator`，如图
    9-22 所示。保存你的更改。


    ![A978-1-4842-0466-5_9_Fig22_HTML.jpg](A978-1-4842-0466-5_9_Fig22_HTML.jpg)

    **图 9-22.** 在页面级别设置授权方案


    4.  对页面 `600` 和 `610` 重复步骤 2 和 3。


    现在授权方案已在管理页面上实施，你可以测试安全行为了。只有在访问控制页面上设置为 `Administrator` 角色的用户才能使用 `600` 到 `620`
    的管理页面。以用户 `Scott` 登录应用程序，你可以导航所有管理功能。以任何其他用户登录并点击 `Admin` 父选项卡，将导致图 9-23 中所示的消息。


    ![A978-1-4842-0466-5_9_Fig23_HTML.jpg](A978-1-4842-0466-5_9_Fig23_HTML.jpg)

    **图 9-23.** 授权方案返回拒绝结果时生成的错误消息


    图 9-23 中的错误消息不太友好。应用程序应尽一切努力避免导致权限错误的事件类型。在此应用程序中，当不符合访问限制时，应从页面中删除 `Admin` 菜单项。你可以通过将相同的授权方案应用于菜单项本身来实现这一点：


