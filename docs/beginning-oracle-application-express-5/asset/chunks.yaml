    \ the script must be unique. You can’t overwrite an existing script file of the\
    \ same name with a new version without first deleting the existing script from\
    \ the script repository.\n\nOnce a script is ready to run, you can click the Run\
    \ icon in the list (or the Run button in the editor), and you’re stepped through\
    \ the Run Script wizard. This allows you to choose whether you want to run the\
    \ script immediately or run it in the background. If you choose Run in Background,\
    \ your script is entered into a queue, and it is executed when it reaches the\
    \ front of the queue.\n\nEither way, you’re taken to the Manage Script Results\
    \ page of the SQL Scripts interface, as shown in Figure [2-16](#A978-1-4842-0466-5_2_Chapter.html#Fig16).\
    \ This screen allows you to see the status and certain high-level details of the\
    \ script’s execution. In the case of scripts that have been submitted in batch\
    \ mode, you can also see the status of specific scripts in the queue.\n\n![A978-1-4842-0466-5_2_Fig16_HTML.jpg](A978-1-4842-0466-5_2_Fig16_HTML.jpg)\n\
    \nFigure 2-16.\n\nThe Manage Script Results page\n\nClicking the View Results\
    \ icon shows you the final results of running the script. In Figure [2-17](#A978-1-4842-0466-5_2_Chapter.html#Fig17),\
    \ you can see that the script had errors, the details of which are displayed in\
    \ the body of the report. If the script were successful, no errors would be shown,\
    \ and the statement results at the bottom of the page would show zero errors.\n\
    \n![A978-1-4842-0466-5_2_Fig17_HTML.jpg](A978-1-4842-0466-5_2_Fig17_HTML.jpg)\n\
    \nFigure 2-17.\n\nAn example of errors from the SQL Scripts interface Note\n\n\
    Although both the SQL Commands and the SQL Scripts interfaces can accept and run\
    \ standard SQL statements, the extended commands of SQL*PLUS aren’t valid in these\
    \ tools.\n\nThe SQL Commands interface throws an error when it encounters any\
    \ SQL*PLUS-specific commands. However, the SQL Scripts interface warns the user\
    \ of the existence of SQL*PLUS commands in a script being run and then ignores\
    \ them if the user chooses to continue. Because of this, the SQL Commands and\
    \ SQL Scripts interfaces can’t perform many of the functions of extended SQL*Plus\
    \ scripts.\n\n#### The Query Builder\n\nAlthough the Query Builder has been relegated\
    \ to the Utilities page, it merits discussion specifically because it’s helpful\
    \ to beginners. The Query Builder allows you to build SQL `select` statements\
    \ using a more graphical interface, and although it’s not quite drag and drop,\
    \ it’s fairly intuitive.\n\nWhen you first enter the Query Builder, you’re presented\
    \ with a screen that lists all the tables and views available in the currently\
    \ active schema. Figure [2-18](#A978-1-4842-0466-5_2_Chapter.html#Fig18) shows\
    \ the initial Query Builder screen.\n\n![A978-1-4842-0466-5_2_Fig18_HTML.jpg](A978-1-4842-0466-5_2_Fig18_HTML.jpg)\n\
    \nFigure 2-18.\n\nThe initial Query Builder screen\n\nFrom here, you can begin\
    \ to build your query. To include a table in your `select` statement, simply click\
    \ it in the list to the left. A representation of the table is placed in the blank\
    \ region of the screen above the Conditions region. You may add as many tables\
    \ as you like to your query, and can even include the same table more than once\
    \ by clicking it again. Notice that if you include more than one instance of the\
    \ same table, the new instance is suffixed with a sequence number differentiating\
    \ it from the original table.\n\nFigure [2-19](#A978-1-4842-0466-5_2_Chapter.html#Fig19)\
    \ shows an example graphical representation for the `DEMO_ORDERS` table and outlines\
    \ the different interactive features.\n\n![A978-1-4842-0466-5_2_Fig19_HTML.gif](A978-1-4842-0466-5_2_Fig19_HTML.gif)\n\
    \nFigure 2-19.\n\nThe `DEMO_ORDERS` table as represented in the Query Builder\n\
    \nTaken from top to bottom as they appear in Figure [2-19](#A978-1-4842-0466-5_2_Chapter.html#Fig19),\
    \ these action areas are as follows\n\n*   Table Actions displays a dialog allowing\
    \ you to do one of several things:\n    *   Check All allows you to quickly select\
    \ or deselect all columns of the object for inclusion in the query being built.\n\
    \    *   Add Parent allows you to select and add a parent table, as defined by\
    \ foreign-key relationships, to the Query Builder.\n    *   Add Child allows you\
    \ to select and add a child table, as defined by foreign-key relationships, to\
    \ the Query Builder.\n*   Show/Hide Columns expands and collapses the object so\
    \ the column definitions are shown or hidden.\n*   Remove deletes the table and\
    \ any of its related clauses from the `select` statement.\n*   Select Column for\
    \ Join is activated by clicking the blank square next to a column name. Doing\
    \ so darkens the square and puts the Query Builder into Table Link mode. Then\
    \ you can click another blank square, either in another table or in the same table,\
    \ and the Query Builder inserts an `EQUALITY where` clause between the two columns\
    \ in the SQL statement.\n*   Data Type Indicator indicates the data type of the\
    \ column, such as `number`, `character`, `date`, and so on.\n*   Column Name indicates\
    \ the column name as defined in the table description.\n*   Column Selector allows\
    \ you to individually select or deselect columns to be included in the SQL statement\
    \ for processing. This may also include columns that you want to use in the `where`\
    \ clause but not display in the output of the SQL statement. The basic rule is\
    \ that you need to select all the columns you want to display, but you don’t necessarily\
    \ have to display all the columns you select.\n\nAs you add and join tables and\
    \ select columns to operate on, the region at the bottom of the screen begins\
    \ to change. This region is subdivided into several tabs, as follows:"
  trans: "\n#### SQL 脚本界面\n\nSQL 脚本界面允许您管理和运行保存到脚本文件中的 SQL 命令集。单个脚本可以包含一个或多个 SQL 语句或\
    \ PL/SQL 块。在 APEX 外部编写的 SQL 脚本可以加载到 SQL 脚本存储库中，并在其中进行编辑或运行。您也可以使用 SQL 脚本界面从头开始创建\
    \ SQL 脚本。图 2-14 展示了主要的 SQL 脚本界面页面。\n\n![A978-1-4842-0466-5_2_Fig14_HTML.jpg](img/A978-1-4842-0466-5_2_Fig14_HTML.jpg)\n\
    \n图 2-14. 主要的 SQL 脚本界面页面\n\n在此示例中，一个名为`database_objects.sql`的脚本已加载到脚本存储库中。通过点击编辑图标，您可以编辑脚本内容，如图\
    \ 2-15 所示。很有帮助的是，APEX 在脚本编辑器中提供了语法高亮显示。编辑器还具有查找和替换功能以及自动完成能力，还有撤销和重做功能。\n\n![A978-1-4842-0466-5_2_Fig15_HTML.jpg](img/A978-1-4842-0466-5_2_Fig15_HTML.jpg)\n\
    \n图 2-15. SQL 脚本编辑器\n\n您也可以将脚本下载到本地文件，以便在您喜欢的本地文本编辑器中进行编辑。完成后，只需将其剪切并粘贴回编辑器，或作为新的脚本文件上传即可。\n\
    \n注意：当您将脚本文件上传到存储库时，脚本名称必须是唯一的。如果不先从脚本存储库中删除现有的同名脚本文件，您无法用一个新版本覆盖它。\n\n一旦脚本准备好运行，您可以点击列表中的运行图标（或编辑器中的运行按钮），系统将引导您完成运行脚本向导。这允许您选择是立即运行脚本还是在后台运行。如果选择在后台运行，您的脚本将进入队列，并在到达队列前端时执行。\n\
    \n无论哪种方式，您都会被带到 SQL 脚本界面的“管理脚本结果”页面，如图 2-16 所示。此屏幕允许您查看脚本执行的状态和某些高级详细信息。对于以批处理模式提交的脚本，您还可以查看队列中特定脚本的状态。\n\
    \n![A978-1-4842-0466-5_2_Fig16_HTML.jpg](img/A978-1-4842-0466-5_2_Fig16_HTML.jpg)\n\
    \n图 2-16. “管理脚本结果”页面\n\n点击查看结果图标会显示运行脚本的最终结果。在图 2-17 中，您可以看到脚本存在错误，错误详情显示在报告正文中。如果脚本成功，则不会显示任何错误，并且页面底部的语句结果将显示零错误。\n\
    \n![A978-1-4842-0466-5_2_Fig17_HTML.jpg](img/A978-1-4842-0466-5_2_Fig17_HTML.jpg)\n\
    \n图 2-17. SQL 脚本界面错误示例\n\n注意：尽管 SQL 命令和 SQL 脚本界面都能接受并运行标准 SQL 语句，但 SQL\\*PLUS\
    \ 的扩展命令在这些工具中无效。\n\nSQL 命令界面在遇到任何 SQL\\*PLUS 特定命令时会抛出错误。然而，SQL 脚本界面会在运行的脚本中存在\
    \ SQL\\*PLUS 命令时警告用户，如果用户选择继续，则会忽略这些命令。因此，SQL 命令和 SQL 脚本界面无法执行许多扩展 SQL\\*Plus\
    \ 脚本的功能。\n\n#### 查询构建器\n\n尽管查询构建器已被归入“实用程序”页面，但因为它很有帮助，特别是对初学者而言，值得专门讨论。查询构建器允许您使用更具图形化的界面构建\
    \ SQL `select`语句，虽然不完全的拖放操作，但相当直观。\n\n当您首次进入查询构建器时，会看到一个屏幕，其中列出了当前活动模式中所有可用的表和视图。图\
    \ 2-18 显示了初始的查询构建器屏幕。\n\n![A978-1-4842-0466-5_2_Fig18_HTML.jpg](img/A978-1-4842-0466-5_2_Fig18_HTML.jpg)\n\
    \n图 2-18. 初始的查询构建器屏幕\n\n从这里，您可以开始构建查询。要将表包含在您的`select`语句中，只需点击左侧列表中的表。该表的表示形式将放置在“条件”区域上方的屏幕空白区域。您可以根据需要添加任意多的表到查询中，甚至可以通过再次点击来包含同一个表多次。请注意，如果包含同一个表的多个实例，新实例将附加一个序列号以区别于原始表。\n\
    \n图 2-19 展示了`DEMO_ORDERS`表的图形表示示例，并概述了不同的交互功能。\n\n![A978-1-4842-0466-5_2_Fig19_HTML.gif](img/A978-1-4842-0466-5_2_Fig19_HTML.gif)\n\
    \n图 2-19. 查询构建器中表示的`DEMO_ORDERS`表\n\n如图 2-19 所示，从上到下，这些操作区域如下：\n\n*   **表操作**显示一个对话框，允许您执行以下操作之一：\n\
    \    *   **全选**允许您快速选择或取消选择对象的所有列，以包含在正在构建的查询中。\n    *   **添加父表**允许您根据外键关系选择并添加一个父表到查询构建器。\n\
    \    *   **添加子表**允许您根据外键关系选择并添加一个子表到查询构建器。\n*   **显示/隐藏列**用于展开和折叠对象，从而显示或隐藏列定义。\n\
    *   **删除**从`select`语句中删除该表及其任何相关子句。\n*   **选择连接列**通过点击列名旁边的空白方块激活。这样做会使方块变暗，并将查询构建器置于表链接模式。然后您可以点击另一个空白方块（在另一个表或同一个表中），查询构建器将在两个列之间插入一个`EQUALITY\
    \ where`子句到 SQL 语句中。\n*   **数据类型指示器**指示列的数据类型，例如`number`、`character`、`date`等。\n\
    *   **列名**指示在表描述中定义的列名。\n*   **列选择器**允许您单独选择或取消选择要包含在 SQL 语句中进行处理的列。这也可以包括您想在`where`子句中使用但不在\
    \ SQL 语句输出中显示的列。基本规则是，您需要选择所有要显示的列，但不一定必须显示所有您选择的列。\n\n当您添加并连接表以及选择要操作的列时，屏幕底部的区域开始变化。该区域细分为几个选项卡，如下所示：\n"
- fmt: '#### Utilities


    *   The Conditions tab shows one row for each column selected in the area above
    and allows you to further define its attributes. (More on this feature in just
    a moment.)

    *   The SQL tab displays the SQL statement as the wizard builds it. Although it’s
    not directly editable, you can easily highlight the statement and copy it to the
    clipboard from here.

    *   The Results tab shows the results of running the SQL statement and allows
    you to download the resulting data in CSV format.

    *   The Saved SQL tab allows you to save, recall, and manage statements that have
    been built with the Query Builder. There are also filters that allow you to search
    and limit which saved queries are displayed.


    All but the Conditions tab are self-explanatory, so let’s go over this one in
    a little more detail. Figure [2-20](#A978-1-4842-0466-5_2_Chapter.html#Fig20)
    shows an example two-table join, with five columns selected to operate on.


    ![A978-1-4842-0466-5_2_Fig20_HTML.jpg](A978-1-4842-0466-5_2_Fig20_HTML.jpg)


    Figure 2-20. An example two-table join


    In this example, the following modifications have been applied to the query:


    *   Changed the alias of the `ORDER_TOTAL` column to `SUM_OF_ORDERS`

    *   Limited the result set to only those records where `ORDER_TOTAL` is less than
    500

    *   Sorted the records returned by `CUST_LAST_NAME`, `CUST_FIRST_NAME` ascending

    *   Performed a `SUM` function on the `ORDER_TOTAL` column

    *   Grouped the query by `USER_NAME`, `CUSTOMER_ID`, `CUST_FIRST_NAME`, `CUST_LAST_NAME`


    Based on the column selections as well as the restrictions and changes introduced
    in the Conditions tab, the SQL statement (as it appears in the SQL tab) looks
    like this:


    ```sql

    select DEMO_ORDERS.USER_NAME as USER_NAME,

    DEMO_CUSTOMERS.CUSTOMER_ID as CUSTOMER_ID,

    DEMO_CUSTOMERS.CUST_FIRST_NAME as CUST_FIRST_NAME,

    DEMO_CUSTOMERS.CUST_LAST_NAME as CUST_LAST_NAME,

    sum(DEMO_ORDERS.ORDER_TOTAL) as "SUM_OF_ORDERs"

    from DEMO_ORDERS DEMO_ORDERS,

    DEMO_CUSTOMERS DEMO_CUSTOMERS

    where DEMO_CUSTOMERS.CUSTOMER_ID=DEMO_ORDERS.CUSTOMER_ID

    and DEMO_ORDERS.ORDER_TOTAL <500

    group by DEMO_ORDERS.USER_NAME,

    DEMO_CUSTOMERS.CUSTOMER_ID,

    DEMO_CUSTOMERS.CUST_FIRST_NAME,

    DEMO_CUSTOMERS.CUST_LAST_NAME

    order by DEMO_CUSTOMERS.CUST_LAST_NAME ASC,

    DEMO_CUSTOMERS.CUST_FIRST_NAME ASC

    ```


    Although the Query Builder is very useful and allows you to put together a basic
    query fairly quickly using a simple GUI, it does have its limitations, such as
    nested subqueries and complex unions. We can use the Query Builder to get the
    skeleton of a query defined; we can then take the query to the SQL Commands window
    or a SQL IDE and fine tune it from there.


    As a final note, it’s worth mentioning that the Query Builder is linked to from
    several places in APEX, so any time you’re prompted for a SQL statement (for example,
    as the basis for a report), you can open the Query Builder in a pop-up window
    and return the query to the calling form.


    ### Packaged Apps


    The Packaged Apps section is where you will install and managed the applications
    that are bundled with the APEX distribution. The main page, shown in Figure [2-22](#A978-1-4842-0466-5_2_Chapter.html#Fig22),
    shows the Packaged Apps home page. From here you can see which applications are
    installed and can navigate to the three subsections.


    ![A978-1-4842-0466-5_2_Fig22_HTML.jpg](A978-1-4842-0466-5_2_Fig22_HTML.jpg)


    Figure 2-22. The Packaged Apps home page'
