    ## Summary


    In this chapter, you created the basic shell of an application and several of
    the supporting objects that you will use in the upcoming chapters. These items
    have been created as a result of planning that was done prior to starting to create
    the application. Depending on your situation, the amount of planning you do for
    your own application will vary. The shared components outlined here can be created
    at any time during the development process. In the next section, you will start
    using some of the key structures outlined here.


    # 6. Forms and Reports: The Basics


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​6](http://dx.doi.org/10.1007/978-1-4842-0466-5_6))
    contains supplementary material, which is available to authorized users.


    Now that you have the database objects and the base application in place, you
    can get to the real work of building pages in your application. Most applications
    contain a series of forms, reports, charts, and other elements designed to display,
    edit, and collect data.


    This chapter focuses on basic forms and reports. These are the simplest, most
    standard types of forms and reports in APEX. They’re most often created by using
    the APEX wizards, which create all the elements of a form or report for you.


    In the sections that follow, you will learn how to use the APEX wizards to add
    pages to your Help Desk application. You will create some basic forms and reports
    on the `Tickets` table; you will also look at the elements created by the wizards
    for your working forms and reports.'
  trans: '

    # 6. 表单与报表：基础


    电子补充材料 本章节的在线版本（doi:[10.​1007/​978-1-4842-0466-5_​6](http://dx.doi.org/10.1007/978-1-4842-0466-5_6)）包含补充材料，授权用户可获取。


    现在，你已经准备好了数据库对象和基础应用程序，可以开始构建应用程序页面的真正工作了。大多数应用程序包含一系列用于显示、编辑和收集数据的表单、报表、图表及其他元素。


    本章将重点介绍基础的表单和报表。这些是 APEX 中最简单、最标准的表单和报表类型。它们通常通过使用 APEX 向导来创建，这些向导会为你生成表单或报表的所有元素。


    在接下来的章节中，你将学习如何使用 APEX 向导为你的“服务台”应用程序添加页面。你将在`Tickets`表上创建一些基础的表单和报表；同时，你也将了解向导为你创建的工作表单和报表的构成元素。


    ## 静态值列表


    静态值列表简单来说就是一组显示值与返回值的配对。这种类型的列表通常简短且固定不变。当你在项目层级定义静态值列表时，有两种数据选项：


    *   `STATIC`：条目会自动按字母顺序排序。

    *   `STATIC2`：条目按输入的顺序呈现。


    指定静态值列表的语法如下：


    `TYPE:显示值;返回值,显示值;返回值,...`


    其中`TYPE`可以是`STATIC`或`STATIC2`。


    如果你希望某个条目的显示值和返回值相同，可以省略分号，只指定一个值。例如，下面例子中的第二个项目，其显示值和返回值是同一个值：


    `TYPE: 值 1,值 2,值 3,...`


    值列表中的返回值会作为关联表单项的值保存。在静态列表中，使用分号作为条目的值可能会导致解析列表时出现问题。


    以下是一个静态列表的例子。列表项之间用逗号分隔。每个列表项由一个显示值和一个返回值组成，两者之间用分号分隔：


    `STATIC:C;1,A;2,D;3,B;4,`


    当你显示此列表中的值时，你只会看到显示值。因为列表类型是`STATIC`，所以值会按字母顺序显示：


    `A`

    `B`

    `C`

    `D`


    接下来是一个`STATIC2`列表的例子。请注意，条目的指定顺序与之前相同：


    `STATIC2:C;1,A;2,D;3,B;4,`


    然而，这次值会按照定义的顺序显示，而不会按字母顺序排序：


    `C`

    `A`

    `D`

    `B`


    共享组件层级的静态值列表比项目层级的静态值列表有更多的选项。由于其共享性质，可以配置条件和构建选项。这些可以在列表创建后进行编辑。因为列表作为共享组件存储方式不同，所以可以在项目值中使用分号。


    ## 动态值列表


    与静态值列表类似，动态值列表也需要有显示值和返回值的配对。不同之处在于，这些值是通过 SQL 查询获取的。你编写的 SQL 查询必须返回两列。如果两列相同，你需要使用别名来区分显示值和返回值。如果你使用连接字符串作为列，也必须使用别名。动态值列表还可以使用会话变量或应用程序中当前使用的值。这使得动态值列表具有灵活性，可以在运行时动态改变提供的选项。


    示例应用程序需要两个值列表来支持用户名的选择。为了准备构建你的表单页面，创建一个值列表来支持你的服务台系统中用户和技术人员的名字：


    导航到“服务台”应用程序的“共享组件”部分，然后转到如图 5-53 所示的“其他组件”部分，并点击“值列表”链接。


    ![A978-1-4842-0466-5_5_Fig53_HTML.jpg](img/A978-1-4842-0466-5_5_Fig53_HTML.jpg)


    图 5-53. 其他组件选项


    点击“创建”按钮以创建一个新的值列表。


    选择“从头开始”作为创建值列表的方法，如图 5-54 所示。


    ![A978-1-4842-0466-5_5_Fig54_HTML.jpg](img/A978-1-4842-0466-5_5_Fig54_HTML.jpg)


    图 5-54. 从头开始创建值列表


    点击“下一步”。


    输入`TECHS`作为“名称”值，并选择“静态”作为“类型”，如图 5-55 所示。


    ![A978-1-4842-0466-5_5_Fig55_HTML.jpg](img/A978-1-4842-0466-5_5_Fig55_HTML.jpg)


    图 5-55. 将列表指定为静态


    点击“下一步”。


    在表单中输入表 5-3 所示的值。将你自己的名字添加到列表中！


    表 5-3. 值列表的显示属性


    | 显示值 | 返回值 |

    | --- | --- |

    | Scott | SCOTT |

    | Doug | DOUG |

    | Karen | KAREN |

    | Martin | MARTIN |

    | Patrick | PATRICK |

    | Tim | TIM |

    | （你的登录名） | （YOUR LOGIN NAME） |


    完成后点击“创建值列表”。现在你已经创建了一个静态值列表，让我们再包含一个使用 SQL 查询来生成值列表的动态列表：


    重复步骤 1 到 4。


    创建第二个名为`USERS`的列表，选择“动态”选项。点击“下一步”。


    找到书籍的补充文件`ch5_lov.txt`，其中包含 SQL 查询文本。将该 SQL 查询输入作为值列表的来源。


    点击“创建值列表”。


    你现在应该有两个值列表了。如果你不小心弄错了，也不用担心。所有的设置都可以修改——只需点击你想要修改的值列表的名称即可。


    ## 总结


    在本章中，你创建了应用程序的基本框架以及将在后续章节中使用的若干支撑对象。这些项目是根据在开始创建应用程序之前所做的规划而创建的。根据你的情况，你为自己应用程序所做的规划量会有所不同。这里概述的共享组件可以在开发过程中的任何时间创建。在下一节中，你将开始使用这里概述的一些关键结构。

    '
- fmt: '## APEX Forms


    Forms are used to display, edit, and collect data, which is then sent back to
    the database for processing. Forms can interface with tables, views (via "instead
    of" triggers), procedures, and web services.


    An `APEX` form is actually a collection of `APEX` objects acting together as a
    single, cohesive unit to perform insert, update, and delete operations on data
    elements. An `APEX` form generally consists of a region, one or more items, one
    or more buttons, and one or more processes that handle interactions with the database.
    The `APEX` form wizards create all the objects necessary for a fully operational
    form.


    **Note**

    Once a form is generated, the objects in it aren’t logically associated in any
    way except that they collectively make a complete working form. Although it’s
    possible to alter or delete individual elements, doing so may cause the form to
    not work properly if an error is introduced; thus, doing so is not recommended.


    The `APEX` form wizards listed in Figure 6-1 are the fastest, most effective,
    and most accurate way to create `APEX` forms. The wizards guide you through a
    series of steps, collect the information required for the form type, and then
    generate all the required items, processes, and buttons. Using the wizards frees
    you from the tedious and error-prone task of individually creating each component.
    After a wizard creates a form, you can, and likely will, make modifications and
    enhancements to the resulting components to tailor the form to your specific requirements.


    ![A978-1-4842-0466-5_6_Fig1_HTML.jpg](A978-1-4842-0466-5_6_Fig1_HTML.jpg)

    Figure 6-1. `APEX` Create Page wizard showing form options


    The following are some of the form types that you can create using the wizards
    listed in Figure 6-1:


    *   **Form on a Table with Report**: A form built on the columns of a table or
    view, having one item for each table column and processing a single row of data
    at a time, plus a report on the contents of the table or view, with navigational
    elements between the report and form pages.

    *   **Form on a Table or View**: A form built on the columns of a table or view,
    having one item for each table column and processing a single row of data at a
    time.

    *   **Master Detail Form**: A form on a pair of tables having a master–detail
    relationship. The `APEX` Master Detail Form Wizard creates all the data, processing,
    and navigational elements required for managing master–detail data.

    *   **Tabular Form**: A multi-row, multi-column form (like a spreadsheet) that
    allows the editing of multiple rows and columns of data at once.

    *   **Form on a Procedure**: A form based on the parameters of a procedure, typically
    to collect values for passing in to a procedure for subsequent processing.

    *   **Form on a SQL Query**: A form built on the results of a `SQL` query. This
    is a very powerful form construct due to its flexibility.

    *   **Summary Page**: A display-only form showing selected items from an existing
    input form page. A summary page is often used in building a confirmation page
    for a wizard.

    *   **Form on Web Service**: A form on the arguments of a web service.

    *   **Form and Report on Web Service**: A single-row form on the arguments of
    a web service with a corresponding report of all rows of data, including navigational
    elements for moving from report to form and back.


    If you look at the available `APEX` form wizards, you can see that several of
    them create accompanying reports (the Form on a Table with Report and Form and
    Report on Web Service Wizards). It’s a common practice to use a report on a table,
    view, or web service to locate a particular row of data and then edit that data
    in a form on the same table, view, or web service. Some wizards simply create
    both the report and the form for you, including all navigation elements and database-transaction
    processes required to make everything work.


    ## Form on a Table


    One of the most common types of form in `APEX` is the form on a table. The `APEX`
    Form on a Table wizard automatically creates and maps `APEX` items to database
    columns, making it trivial to quickly create forms for database table entry and
    updates. As a developer, you can then modify the different types of controls for
    each column. All of the supported `HTML` widgets (text fields, text areas, select
    lists, radio groups, check boxes, and so on) are available, as well as several
    `APEX`-specific ones. The best way to understand just what the `APEX` Form on
    a Table wizard does is to use it, so let’s dive in and create a form on a table.'
