    \ 项目输入一个值。应用于验证的条件会在每次页面提交时进行评估。\n\n### 页面级验证\n\n页面级验证同时应用于一个或多个项目，并且通常可以是整个 PL/SQL\
    \ 代码块，必须计算为 `TRUE` 验证才算成功。Help Desk 应用程序的需求是比较 `Created On` 日期和 `Closed On` 日期，以确保它们按时间顺序发生。一个在创建之前就关闭的工单没有意义。这是一个使用验证来确保数据质量的好例子。以下是你如何创建所需验证：\n\
    \n编辑应用程序的第 210 页。导航到树状窗格的“处理”选项卡。在处理树的“验证”节点上右键单击，然后选择“创建验证”。在属性窗格中，将“名称”设置为 `Closed\
    \ Date must be after Creation Date`。为“错误消息”输入 `Closed On Date must be Later than\
    \ the Created Date`，将“类型”设置为 `PL/SQL Function Body (returning Boolean)`，然后在 PL/SQL\
    \ 表达式文本区域中输入以下代码。图 8-7 显示了完成的值。单击“下一步”继续：\n\n![A978-1-4842-0466-5_8_Fig7_HTML.jpg](img/A978-1-4842-0466-5_8_Fig7_HTML.jpg)\n\
    \n图 8-7. 验证属性\n\n```\nIF TO_DATE(:P210_CREATED_ON,'DD-MON-YYYY') >\n   TO_DATE(:P210_CLOSED_ON,'DD-MON-YYYY')\n\
    THEN\n   RETURN FALSE;\nELSE\n   RETURN TRUE;\nEND IF;\n```\n\n保存你的更改。\n\n在你的应用程序中，现在你拥有一个有助于确保输入数据质量的功能。这种数据检查确保任何从开始到结束计算时间的指标不会因为日期问题而产生负数答案。这提高了数据质量和报告中产生的指标的可靠性。\n\
    \n### 表格表单验证\n\nAPEX 5.0 中的表格表单能够比以前版本更好地执行验证。创建表格表单的向导也会为你添加验证。向导会根据数据模型自动创建验证。然而，向导只能了解你的业务流程的有限信息，数据模型可能比你应用程序中想要的更灵活。\n\
    \n查看第 230 页的定义，向导已经根据底层 `TICKETS` 表的 `NOT NULL` 属性为你创建了许多 `Not Null` 验证。但是，向导不知道当工单关闭时你需要一个\
    \ `Closed On` 日期。你可以使用列级表格表单验证来应用该验证：\n\n编辑应用程序的第 230 页。导航到树状窗格的“渲染”选项卡。展开“管理多个工单”表格表单的“列”节点。右键单击\
    \ `CLOSED_ON` 并从上下文菜单中选择“创建验证”。在属性窗格中，将“名称”设置为 `CLOSED_ON is Not Null if Ticket\
    \ is CLOSED`。将“表格表单”设置为“管理多个工单”，“类型”设置为 `Column is NOT NULL`，“列”设置为 `CLOSED_ON`，如图\
    \ 8-8 所示。\n\n![A978-1-4842-0466-5_8_Fig8_HTML.jpg](img/A978-1-4842-0466-5_8_Fig8_HTML.jpg)\n\
    \n图 8-8. 设置验证名称和验证属性\n\n对于“错误消息”，输入 `#COLUMN_HEADER# must be entered if Status\
    \ is CLOSED`，如图 8-9 所示。单击“下一步”。\n\n![A978-1-4842-0466-5_8_Fig9_HTML.jpg](img/A978-1-4842-0466-5_8_Fig9_HTML.jpg)\n\
    \n图 8-9. 使用替换变量的错误消息\n\n在“条件”属性组中，将“类型”设置为 `PL/SQL Function Body`，“执行范围”设置为 `For\
    \ Created and Modified Rows`，然后在 PL/SQL 函数体文本区域中键入以下代码：\n\n```\nIF :STATUS_ID\
    \ = get_status('CLOSED') THEN\n   RETURN TRUE;\nELSE\n   RETURN FALSE;\nEND IF;\n\
    ```\n\n保存你的更改。\n\n当你运行“管理多个工单”页面时，你可以通过添加一个状态为 `CLOSED` 且未设置 `Closed On` 日期的新工单，或者通过移除现有已关闭工单的\
    \ `Closed On` 日期并尝试保存更改来测试新的验证。在图 8-10 中，每一行不满足验证要求的行都会被高亮显示，并出现在页面顶部的错误列表中。在此示例中，没有\
    \ `Closed On` 日期的行未能通过验证，并被标记为需要注意。\n\n![A978-1-4842-0466-5_8_Fig10_HTML.jpg](img/A978-1-4842-0466-5_8_Fig10_HTML.jpg)\n\
    \n图 8-10. 未通过验证的结果被高亮显示并呈现在消息区域中\n\n注意：默认情况下，这些验证仅针对新的或更改的行执行。你可以通过设置验证的“执行范围”（位于“条件”部分）来更改此行为。\n\
    \n创建验证向导还允许在表格表单上创建行级验证。这些验证对于表格表单处理的每一行运行一次。在这个级别上，你可以轻松地创建一个类似于为第 210 页创建的验证，用于检查\
    \ `Closed On` 日期是否发生在 `Created On` 日期之后。\n\n作为对你所学内容的练习，请尝试在第 230 页的表格表单的行级别实现该验证。\n"
- fmt: "## Computations\n\nAn APEX computation is analogous to a PL/SQL function.\
    \ The intent is to act on an item in the application by setting the value using\
    \ a variety of methods. This allows information to be derived rather than just\
    \ stored in the data tables. Computations can be implemented when a page is rendered\
    \ or after a page is submitted back to the server, depending on the needs of the\
    \ application. Computations can act on any item available within an application.\
    \ Items that can be set include items on the current page, items on another page,\
    \ and even application-level items.\n\nThere is also a type of computation that\
    \ can be used at the application level. It’s available in an application’s shared\
    \ components. This type of computation has additional options for execution points,\
    \ including a computation point called On New Instance that executes when a new\
    \ session (or instance) is given to a user when they log in.\n\n### Execution\n\
    \nIt’s important to understand when a computation is executed relative to when\
    \ a value is shown on a page and to when other values are available to the computation.\
    \ When using the value of an item in a computation, the current session state\
    \ for that item is the value that is used. A computation sets an item value in\
    \ session state, and any processing (computations, validations, or processes)\
    \ that uses that item after it has been set sees the results of that computation.\
    \ When a page is rendered, it shows what is in the session state for that item\
    \ at the time it’s shown on the page. The computation point is the setting that\
    \ determines when the computation is executed.\n\nOn the page definition screen,\
    \ several computation points are shown in the page tree. You can adjust the computation\
    \ point by clicking and dragging the computation in the tree to a different computation\
    \ point, or by editing the computation and changing the values for the sequence\
    \ and computation point directly. The sequence only orders the computations within\
    \ a given computation point. In general, the page renders and processes as shown\
    \ on the page definition screen, starting at the top and going down the list to\
    \ the bottom. There are only minor exceptions, such as dynamic actions and AJAX\
    \ callbacks, which have variable points of execution.\n\n### Types\n\nComputations\
    \ have much of the same flexibility as other APEX components do. They can be complex\
    \ or simple, with the full capabilities of the Oracle database to support them.\
    \ The types of computations are as follows:\n\n*   Static Value: Simple static\
    \ text value\n*   Item: Name of another item in the application\n*   SQL Query\
    \ (Return Single Value): Any SQL statement as long as it returns a single row\
    \ and a single column\n*   SQL Query (Return Colon-Separated Values): SQL used\
    \ for multi-select items\n*   SQL Expression: Expression used in the `SELECT`\
    \ portion of an SQL statement\n*   PL/SQL Expression: Same as SQL Expression\n\
    *   PL/SQL Function Body: PL/SQL function syntax with a `RETURN` statement\n*\
    \   Preference: The value of an APEX user preference as stored in the metadata\n\
    \nComputations can be conditional in the same manner as many of the other APEX\
    \ components are. The conditions can be as complex as the business rules require,\
    \ with the ability to use the database features and APEX session items to evaluate\
    \ the condition. Conditions evaluating to `TRUE` result in the computation being\
    \ executed.\n\n### Creating a Computation\n\nThe Help Desk application has a requirement\
    \ to display the number of days a ticket has been open. The result should be a\
    \ derived value that changes depending on the day and status of the record being\
    \ reviewed. You can accomplish this by putting a new item on the page that displays\
    \ the result of the computation:\n\nEdit Page 210. From the Items section of the\
    \ Components Gallery, click and drag the Display Only item so that it appears\
    \ just to the right of `P210_SUBJECT`. See Figure [8-11](#A978-1-4842-0466-5_8_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0466-5_8_Fig11_HTML.jpg](A978-1-4842-0466-5_8_Fig11_HTML.jpg)\n\
    *Figure 8-11.*\n\nPlacing the Display Only item. In the Attributes pane enter\
    \ `P210_DAYS_OPEN` for Name and `Days Open` for the Label. Set Save Session State\
    \ to No. Now there’s a new item in the region that you use as a container for\
    \ the calculation. Next, we create the calculation so that the value is set to\
    \ the number of days the ticket has been open. However, we only want this to appear\
    \ for tickets that have already been created and not for new tickets being entered.\
    \ In the Conditions attribute group, set Type to Item Is NOT NULL. When the region\
    \ refreshes, set the value of Item to `P210_TICKET_ID`, as shown in Figure [8-12](#A978-1-4842-0466-5_8_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0466-5_8_Fig12_HTML.jpg](A978-1-4842-0466-5_8_Fig12_HTML.jpg)\n\
    *Figure 8-12.*\n\nShowing an item only when another item contains a value. In\
    \ the Source attribute group, set the Type to Null. In the Rendering tab of the\
    \ Tree Pane, right-click `P210_DAYS_OPEN`, and from the context menu, select Create\
    \ Computation, as shown in Figure [8-13](#A978-1-4842-0466-5_8_Chapter.html#Fig13).\n\
    \n![A978-1-4842-0466-5_8_Fig13_HTML.jpg](A978-1-4842-0466-5_8_Fig13_HTML.jpg)\n\
    *Figure 8-13.*\n\nUsing the right-click shortcut to create a computation. In the\
    \ Attributes pane, set Type to SQL Query (Return Single Value). In the SQL Query\
    \ text area, enter the following SQL statement (also shown in Figure [8-14](#A978-1-4842-0466-5_8_Chapter.html#Fig14)),\
    \ and then Save your changes:\n\n![A978-1-4842-0466-5_8_Fig14_HTML.jpg](A978-1-4842-0466-5_8_Fig14_HTML.jpg)\n\
    *Figure 8-14.*\n\nEntering the SQL statement for a computation.\n```sql\nSELECT\n\
    \    DECODE(status, 'CLOSED', closed, open_or_pending) days_open\nFROM\n    (\n\
    \    SELECT\n        ROUND(sysdate - t.created_on) open_or_pending,\n        NVL(ROUND(t.closed_on\
    \ - t.created_on),0) closed,\n        sl.status status\n    FROM\n        tickets\
    \ t,\n        status_lookup sl\n    WHERE\n        t.status_id = sl.status_id\n\
    \        and t.ticket_id = :P210_TICKET_ID)\n```\n\nTo see the results of adding\
    \ the new item, run the application and navigate to the Tickets report (page 200).\
    \ Click one of the Edit icons to bring up the single-record view (page 210). You\
    \ should now see the result of the computation as a number of days. When starting\
    \ the process of creating a new ticket, the field isn’t displayed, as the condition\
    \ prevents the field from showing.\n\n## Processes\n\nIf computations are analogous\
    \ to database functions, then processes are analogous to database procedures.\
    \ A process is a container for a unit of logic.\n\nProcesses are arguably the\
    \ most complex part of APEX, because they’re the construct used to deal with data\
    \ processing in the database as well as with references to APIs, such as those\
    \ used to send email and perform any other business logic required in the application.\
    \ When dealing with data forms, the APEX wizard creates built-in processes that\
    \ manage the reading and writing of data from the form. Those types of built-in\
    \ processes are called data-manipulation processes.\n\nProcesses, similar to computations,\
    \ can occur during both page rendering and page processing. Processes support\
    \ the APEX conditions feature, which allows processes to be written as individual\
    \ logic units, with conditions determining whether the logic is needed."
  raw: '## Computations


    An APEX computation is analogous to a PL/SQL function. The intent is to act on
    an item in the application by setting the value using a variety of methods. This
    allows information to be derived rather than just stored in the data tables. Computations
    can be implemented when a page is rendered or after a page is submitted back to
    the server, depending on the needs of the application. Computations can act on
    any item available within an application. Items that can be set include items
    on the current page, items on another page, and even application-level items.


    There is also a type of computation that can be used at the application level.
    It’s available in an application’s shared components. This type of computation
    has additional options for execution points, including a computation point called
    On New Instance that executes when a new session (or instance) is given to a user
    when they log in.


    ### Execution


    It’s important to understand when a computation is executed relative to when a
    value is shown on a page and to when other values are available to the computation.
    When using the value of an item in a computation, the current session state for
    that item is the value that is used. A computation sets an item value in session
    state, and any processing (computations, validations, or processes) that uses
    that item after it has been set sees the results of that computation. When a page
    is rendered, it shows what is in the session state for that item at the time it’s
    shown on the page. The computation point is the setting that determines when the
    computation is executed.


    On the page definition screen, several computation points are shown in the page
    tree. You can adjust the computation point by clicking and dragging the computation
    in the tree to a different computation point, or by editing the computation and
    changing the values for the sequence and computation point directly. The sequence
    only orders the computations within a given computation point. In general, the
    page renders and processes as shown on the page definition screen, starting at
    the top and going down the list to the bottom. There are only minor exceptions,
    such as dynamic actions and AJAX callbacks, which have variable points of execution.


    ### Types


    Computations have much of the same flexibility as other APEX components do. They
    can be complex or simple, with the full capabilities of the Oracle database to
    support them. The types of computations are as follows:


    *   Static Value: Simple static text value

    *   Item: Name of another item in the application

    *   SQL Query (Return Single Value): Any SQL statement as long as it returns a
    single row and a single column

    *   SQL Query (Return Colon-Separated Values): SQL used for multi-select items

    *   SQL Expression: Expression used in the `SELECT` portion of an SQL statement

    *   PL/SQL Expression: Same as SQL Expression

    *   PL/SQL Function Body: PL/SQL function syntax with a `RETURN` statement

    *   Preference: The value of an APEX user preference as stored in the metadata


    Computations can be conditional in the same manner as many of the other APEX components
    are. The conditions can be as complex as the business rules require, with the
    ability to use the database features and APEX session items to evaluate the condition.
    Conditions evaluating to `TRUE` result in the computation being executed.


    ### Creating a Computation


    The Help Desk application has a requirement to display the number of days a ticket
    has been open. The result should be a derived value that changes depending on
    the day and status of the record being reviewed. You can accomplish this by putting
    a new item on the page that displays the result of the computation:


    Edit Page 210.   From the Items section of the Components Gallery, click and drag
    the Display Only item so that it appears just to the right of P210_SUBJECT. See
    Figure [8-11](#A978-1-4842-0466-5_8_Chapter.html#Fig11).


    ![A978-1-4842-0466-5_8_Fig11_HTML.jpg](A978-1-4842-0466-5_8_Fig11_HTML.jpg)


    Figure 8-11.


    Placing the Display Only item   In the Attributes pane enter `P210_DAYS_OPEN`
    for Name and `Days Open` for the Label. Set Save Session State to No. Now there’s
    a new item in the region that you use as a container for the calculation. Next,
    we create the calculation so that the value is set to the number of days the ticket
    has been open. However, we only want this to appear for tickets that have already
    been created and not for new tickets being entered.   In the Conditions attribute
    group, set Type to Item Is NOT NULL.   When the region refreshes, set the value
    of Item to P210_TICKET_ID, as shown in Figure [8-12](#A978-1-4842-0466-5_8_Chapter.html#Fig12).


    ![A978-1-4842-0466-5_8_Fig12_HTML.jpg](A978-1-4842-0466-5_8_Fig12_HTML.jpg)


    Figure 8-12.


    Showing an item only when another item contains a value   In the Source attribute
    group, set the Type to Null.   In the Rendering tab of the Tree Pane, right-click
    P210_DAYS_OPEN, and from the context menu, select Create Computation, as shown
    in Figure [8-13](#A978-1-4842-0466-5_8_Chapter.html#Fig13).


    ![A978-1-4842-0466-5_8_Fig13_HTML.jpg](A978-1-4842-0466-5_8_Fig13_HTML.jpg)


    Figure 8-13.


    Using the right-click shortcut to create a computation   In the Attributes pane,
    set Type to SQL Query (Return Single Value).   In the SQL Query text area, enter
    the following SQL statement (also shown in Figure [8-14](#A978-1-4842-0466-5_8_Chapter.html#Fig14)),
    and then Save your changes:


    ![A978-1-4842-0466-5_8_Fig14_HTML.jpg](A978-1-4842-0466-5_8_Fig14_HTML.jpg)


    Figure 8-14.


    Entering the SQL statement for a computation `SELECT`   `DECODE(status, ''CLOSED'',
    closed, open_or_pending) days_open` `FROM`   `(`   `SELECT`     `ROUND(sysdate
    - t.created_on) open_or_pending,`     `NVL(ROUND(t.closed_on - t.created_on),0)
    closed,`     `sl.status status`   `FROM`     `tickets t,`     `status_lookup sl`
      `WHERE`     `t.status_id = sl.status_id`     `and t.ticket_id = :P210_TICKET_ID)`
     


    To see the results of adding the new item, run the application and navigate to
    the Tickets report (page 200). Click one of the Edit icons to bring up the single-record
    view (page 210). You should now see the result of the computation as a number
    of days. When starting the process of creating a new ticket, the field isn’t displayed,
    as the condition prevents the field from showing.


    ## Processes


    If computations are analogous to database functions, then processes are analogous
    to database procedures. A process is a container for a unit of logic.


    Processes are arguably the most complex part of APEX, because they’re the construct
    used to deal with data processing in the database as well as with references to
    APIs, such as those used to send email and perform any other business logic required
    in the application. When dealing with data forms, the APEX wizard creates built-in
    processes that manage the reading and writing of data from the form. Those types
    of built-in processes are called data-manipulation processes.


    Processes, similar to computations, can occur during both page rendering and page
    processing. Processes support the APEX conditions feature, which allows processes
    to be written as individual logic units, with conditions determining whether the
    logic is needed.'
  trans: "## 计算\n\n一项 APEX 计算类似于一个 PL/SQL 函数。其目的是通过多种方法设置值来对应用程序中的项目进行操作。这使得信息能够被推导出来，而不仅仅是存储在数据表中。根据应用程序的需求，计算可以在页面渲染时实现，也可以在页面提交回服务器后实现。计算可以作用于应用程序内可用的任何项目。可以设置的项目包括当前页面上的项目、另一个页面上的项目，甚至是应用程序级别的项目。\n\
    \n还有一种可以在应用程序级别使用的计算。它在应用程序的共享组件中可用。这种计算有额外的执行点选项，包括一个名为“新建实例时”的计算点，该点在用户登录时获得新会话（或实例）时执行。\n\
    \n### 执行\n\n理解计算相对于页面上显示值的时间点以及相对于其他值可供计算使用的时间点来执行，这一点很重要。当在计算中使用某个项目的值时，使用的是该项目的当前会话状态值。计算会在会话状态中设置一个项目值，之后任何使用该项目的处理（计算、验证或流程）都会看到该计算的结果。当页面被渲染时，它显示的是该值在页面上显示时其会话状态中的内容。计算点是决定计算何时执行的设置。\n\
    \n在页面定义屏幕中，几个计算点显示在页面树中。你可以通过在树中单击并将计算拖动到不同的计算点，或者通过编辑计算并直接更改序列和计算点的值来调整计算点。序列仅用于排序给定计算点内的计算。通常，页面按照页面定义屏幕上的显示从上到下进行渲染和处理。只有少数例外，例如动态操作和\
    \ AJAX 回调，它们具有可变的执行点。\n\n### 类型\n\n计算具有与其他 APEX 组件相同的灵活性。它们可以是复杂的，也可以是简单的，并拥有\
    \ Oracle 数据库的全部功能来支持它们。计算的类型如下：\n\n*   静态值：简单的静态文本值\n*   项目：应用程序中另一个项目的名称\n* \
    \  SQL 查询（返回单个值）：只要返回单行单列的任何 SQL 语句\n*   SQL 查询（返回冒号分隔值）：用于多选项目的 SQL\n*   SQL\
    \ 表达式：在 SQL 语句的 `SELECT` 部分使用的表达式\n*   PL/SQL 表达式：与 SQL 表达式相同\n*   PL/SQL 函数体：带有\
    \ `RETURN` 语句的 PL/SQL 函数语法\n*   首选项：存储在元数据中的 APEX 用户首选项的值\n\n计算可以像许多其他 APEX 组件一样具有条件性。条件可以像业务规则要求的那样复杂，能够使用数据库功能和\
    \ APEX 会话项目来评估条件。条件评估为 `TRUE` 会导致计算被执行。\n\n### 创建计算\n\n服务台应用程序有一个需求，需要显示一个工单已开启的天数。结果应该是一个派生值，它会根据所审查记录的日期和状态而变化。你可以通过在页面上放置一个新项目来显示计算结果来实现这一点：\n\
    \n编辑页面 210。从组件库的“项目”部分，单击并拖动“仅显示”项目，使其出现在 `P210_SUBJECT` 的右侧。参见图 8-11。\n\n![A978-1-4842-0466-5_8_Fig11_HTML.jpg](img/A978-1-4842-0466-5_8_Fig11_HTML.jpg)\n\
    *图 8-11.*\n\n放置“仅显示”项目。在“属性”窗格中，为“名称”输入 `P210_DAYS_OPEN`，为“标签”输入 `Days Open`。将“保存会话状态”设置为“否”。现在，该区域中有一个新项目，你可以将其用作计算的容器。接下来，我们创建计算，以便将值设置为工单已开启的天数。但是，我们只希望此计算针对已创建的工单显示，而不针对正在输入的新工单。在“条件”属性组中，将“类型”设置为“项目不为空”。当区域刷新时，将“项目”的值设置为\
    \ `P210_TICKET_ID`，如图 8-12 所示。\n\n![A978-1-4842-0466-5_8_Fig12_HTML.jpg](img/A978-1-4842-0466-5_8_Fig12_HTML.jpg)\n\
    *图 8-12.*\n\n仅当另一个项目包含值时才显示一个项目。在“源”属性组中，将“类型”设置为“空”。在树窗格的“渲染”选项卡中，右键单击 `P210_DAYS_OPEN`，然后从上下文菜单中选择“创建计算”，如图\
    \ 8-13 所示。\n\n![A978-1-4842-0466-5_8_Fig13_HTML.jpg](img/A978-1-4842-0466-5_8_Fig13_HTML.jpg)\n\
    *图 8-13.*\n\n使用右键快捷方式创建计算。在“属性”窗格中，将“类型”设置为“SQL 查询（返回单个值）”。在 SQL 查询文本区域中，输入以下\
    \ SQL 语句（也如图 8-14 所示），然后保存更改：\n\n![A978-1-4842-0466-5_8_Fig14_HTML.jpg](img/A978-1-4842-0466-5_8_Fig14_HTML.jpg)\n\
    *图 8-14.*\n\n输入计算的 SQL 语句。\n```sql\nSELECT\n    DECODE(status, 'CLOSED', closed,\
    \ open_or_pending) days_open\nFROM\n    (\n    SELECT\n        ROUND(sysdate -\
    \ t.created_on) open_or_pending,\n        NVL(ROUND(t.closed_on - t.created_on),0)\
    \ closed,\n        sl.status status\n    FROM\n        tickets t,\n        status_lookup\
    \ sl\n    WHERE\n        t.status_id = sl.status_id\n        and t.ticket_id =\
    \ :P210_TICKET_ID)\n```\n\n要查看添加新项目的结果，请运行应用程序并导航到“工单”报告（页面 200）。单击其中一个“编辑”图标以调出单记录视图（页面\
    \ 210）。你现在应该能看到计算的结果，即天数。在开始创建新工单的过程时，该字段不会显示，因为条件阻止了该字段的显示。\n\n## 流程\n\n如果说计算类似于数据库函数，那么流程就类似于数据库过程。流程是一个逻辑单元的容器。\n\
    \n流程可以说是 APEX 最复杂的部分，因为它们是用于处理数据库中的数据处理以及对 API（例如用于发送电子邮件和执行应用程序所需的任何其他业务逻辑的 API）的引用的结构。在处理数据表单时，APEX\
    \ 向导会创建内置流程来管理表单数据的读写。这些类型的内置流程称为数据操作流程。\n\n流程与计算类似，可以发生在页面渲染和页面处理期间。流程支持 APEX\
    \ 条件功能，这允许将流程编写为独立的逻辑单元，由条件决定是否需要该逻辑。"
- fmt: "### Execution Points\n\nProcess execution points are the same as execution\
    \ points for computations. The most commonly used execution points for processes\
    \ are `On Submit - After Computations and Validations` and `On Demand - Run This\
    \ Process When Requested by AJAX`, because these points support button-press activities\
    \ and dynamic actions. The full list is as follows:\n\n*   New Session\n*   Before\
    \ Header\n*   After Header\n*   Before Regions\n*   After Regions\n*   Before\
    \ Footer\n*   After Footer\n*   After Submit\n*   Processing\n*   AJAX Callback\n\
    \nProcesses can be defined at the individual page level or at the application\
    \ level as part of the shared components. Functionally, page processes and application\
    \ processes behave the same way. The difference is found in where business logic\
    \ is contained. For processes that need to run on all pages, you can define an\
    \ application process. Also, just as with regions, you can use Global Pages to\
    \ define processes that run on every page, but only for page rendering.\n\n##\
    \ Process Types\n\nEach different process type has a different use depending on\
    \ the requirements. The types and their uses are as follows:\n\n*   Automatic\
    \ Row Fetch: Retrieves records from a single database table or view\n*   Automatic\
    \ Row Processing (DML): Process to insert, update, or delete a record from a single\
    \ database table or view\n*   Clear Session State: Clears session state values;\
    \ also referred to as cache\n*   Close Dialog: Process to close the current modal\
    \ or non-modal dialog\n*   Form Pagination: Process to retrieve the previous or\
    \ next record from a database table or view. Most often used in master-detail\
    \ forms\n*   Load Uploaded Data: Process to load the parsed spreadsheet data into\
    \ an existing table or view\n*   Parse Uploaded Data: Process to parse the prepared\
    \ spreadsheet data in preparation for loading into an existing table\n*   PL/SQL\
    \ Code: Generally use for utilizing database PL/SQL logic\n*   Prepare Uploaded\
    \ Data: Process to prepare spreadsheet data for uploading into an existing table\n\
    *   Reset Pagination: Resets pagination for a report\n*   Send Email: Declarative\
    \ interface to easily send email\n*   Tabular Form – Add Rows: Process to add\
    \ a row into a tabular form region.\n*   Tabular Form – Multi-Row Delete: Process\
    \ to delete multiple rows from a tabular form region\n*   Tabular Form – Multi-Row\
    \ Update: Process to update multiple rows from a tabular form region\n*   User\
    \ Preference: Process to set user preferences for the end user.\n*   Web Services:\
    \ Submits a request to a web-service provider\n*   Plug-ins: Processes functionality\
    \ provided by plug-ins\n\n## Processes in the Help Desk Application\n\nThe details\
    \ behind processes can be very complex. In order to provide an adequate example,\
    \ let’s include a simple process in the Help Desk application: a requirement that\
    \ the application keep track of the last time a record was modified. You can do\
    \ this by updating a `Last Updated` date on the record every time it’s saved.\
    \ There’s more than one way to accomplish this task. Here, you will do it with\
    \ a process.\n\nFirst, you need to add the `LAST_UPDATED` field to the `TICKETS`\
    \ table. To do this you use the SQL Workshop again:\n\nFrom the SQL Workshop drop-down\
    \ menu, choose Object Browser, as shown in Figure [8-15](#A978-1-4842-0466-5_8_Chapter.html#Fig15).\n\
    \n![`A978-1-4842-0466-5_8_Fig15_HTML.jpg`](A978-1-4842-0466-5_8_Fig15_HTML.jpg)\n\
    \nFigure 8-15. Navigating to the SQL Workshop Object Browser\n\nSelect the `TICKETS`\
    \ table from the list of objects at left.\n\nClick the Add Column button above\
    \ the table definition, as shown in Figure [8-16](#A978-1-4842-0466-5_8_Chapter.html#Fig16).\n\
    \n![`A978-1-4842-0466-5_8_Fig16_HTML.jpg`](A978-1-4842-0466-5_8_Fig16_HTML.jpg)\n\
    \nFigure 8-16. Adding a column to the table\n\nEnter `LAST_UPDATED` for Add Column\
    \ and `DATE` for Type, and click Next.\n\nClick Finish. Now you can add the process\
    \ to the page:\n\nEdit Page 210 of the application.\n\nIn the Processing tab of\
    \ the Tree Pane, right-click the Processes node and choose Create from the context\
    \ menu, as shown in Figure [8-17](#A978-1-4842-0466-5_8_Chapter.html#Fig17).\n\
    \n![`A978-1-4842-0466-5_8_Fig17_HTML.jpg`](A978-1-4842-0466-5_8_Fig17_HTML.jpg)\n\
    \nFigure 8-17. Using the context menu to create a process\n\nSet the Name of the\
    \ process to `Set Last Processed` and set Point to `Processing`. Set the Type\
    \ to `PL/SQL Code`. In the next step, you will set the contents of your anonymous\
    \ PL/SQL block. If you’re unfamiliar with a PL/SQL anonymous block, it’s PL/SQL\
    \ code that has a `BEGIN` and an `END` that wrap the contents. You need to follow\
    \ PL/SQL syntax conventions, including ending statements with semicolons. It’s\
    \ possible to nest anonymous blocks of code, but that isn’t necessary for this\
    \ example:\n\nEnter the following SQL into the PL/SQL Code text area (see Figure\
    \ [8-18](#A978-1-4842-0466-5_8_Chapter.html#Fig18)):\n\n![`A978-1-4842-0466-5_8_Fig18_HTML.jpg`](A978-1-4842-0466-5_8_Fig18_HTML.jpg)\n\
    \nFigure 8-18. Entering the anonymous PL/SQL block\n\n```\nBEGIN\n    UPDATE tickets\
    \ SET last_updated = sysdate\n       WHERE ticket_id = :P210_TICKET_ID;\nEND;\n\
    ```\n\nLeave both the Success and Error messages empty. These messages will appear\
    \ at the top of a page as feedback to the user after the process completes. Your\
    \ requirements don’t call for you to notify the user that the Last Updated date\
    \ was changed.\n\nIn the Condition attribute group, change When Button Pressed\
    \ to `SAVE`.\n\nSave your changes.\n\nAt this point, the process has been created.\
    \ Currently, you don’t show the Last Updated date in the summary report. In order\
    \ to see the value on the report, you will need to add the `LAST_UPDATED` column\
    \ to the query from which the report draws data. That report resides on page 200\
    \ of your application:\n\nEdit Page 200.\n\nEdit the Tickets region by clicking\
    \ the region’s name in the tree.\n\nAdd the `LAST_UPDATED` date to the Region\
    \ Source of the report, as in the following SQL. Click Save when you’re finished:\n\
    \n```\nselect TICKET_ID,\n       SUBJECT,\n       DESCR,\n       CREATED_BY,\n\
    \       CREATED_ON,\n       CLOSED_ON,\n       ASSIGNED_TO,\n       STATUS,\n\
    \      LAST_UPDATED\n   from TICKETS,\n       STATUS_LOOKUP\n where TICKETS.STATUS_ID\
    \ = STATUS_LOOKUP.STATUS_ID\n   and UPPER(SUBJECT) LIKE '%'||UPPER(:P200_SEARCH)||'%'\n\
    \   and tickets.status_id LIKE :P200_STATUS_ID\n```\n\nTo test and review the\
    \ change, run the application and navigate to the Tickets report. Edit any ticket,\
    \ and click the Apply Changes button. You should now see a value for Last Updated\
    \ indicating the current day.\n\nThis is a quick example of how you can use a\
    \ process to apply form-based logic. When the form is used to make changes, a\
    \ brief piece of PL/SQL makes a record change automatically. Packages, procedures,\
    \ and APIs all can be reached using processes similar to this one."
  raw: '### Execution Points


    Process execution points are the same as execution points for computations. The
    most commonly used execution points for processes are On Submit - After Computations
    and Validations and On Demand - Run This Process When Requested by AJAX, because
    these points support button-press activities and dynamic actions. The full list
    is as follows:


    *   New Session

    *   Before Header

    *   After Header

    *   Before Regions

    *   After Regions

    *   Before Footer

    *   After Footer

    *   After Submit

    *   Processing

    *   AJAX Callback


    Processes can be defined at the individual page level or at the application level
    as part of the shared components. Functionally, page processes and application
    processes behave the same way. The difference is found in where business logic
    is contained. For processes that need to run on all pages, you can define an application
    process. Also, just as with regions, you can use Global Pages to define processes
    that run on every page, but only for page rendering.


    ### Process Types


    Each different process type has a different use depending on the requirements.
    The types and their uses are as follows:


    *   Automatic Row Fetch: Retrieves records from a single database table or view

    *   Automatic Row Processing (DML): Process to insert, update, or delete a record
    from a single database table or view

    *   Clear Session State: Clears session state values; also referred to as cache

    *   Close Dialog: Process to close the current modal or non-modal dialog

    *   Form Pagination: Process to retrieve the previous or next record from a database
    table or view. Most often used in master-detail forms

    *   Load Uploaded Data: Process to load the parsed spreadsheet data into an existing
    table or view

    *   Parse Uploaded Data: Process to parse the prepared spreadsheet data in preparation
    for loading into an existing table

    *   PL/SQL Code: Generally use for utilizing database PL/SQL logic

    *   Prepare Uploaded Data: Process to prepare spreadsheet data for uploading into
    an existing table

    *   Reset Pagination: Resets pagination for a report

    *   Send Email: Declarative interface to easily send email

    *   Tabular Form – Add Rows: Process to add a row into a tabular form region.

    *   Tabular Form – Multi-Row Delete: Process to delete multiple rows from a tabular
    form region

    *   Tabular Form – Multi-Row Update: Process to update multiple rows from a tabular
    form region

    *   User Preference: Process to set user preferences for the end user.

    *   Web Services: Submits a request to a web-service provider

    *   Plug-ins: Processes functionality provided by plug-ins


    ### Processes in the Help Desk Application


    The details behind processes can be very complex. In order to provide an adequate
    example, let’s include a simple process in the Help Desk application: a requirement
    that the application keep track of the last time a record was modified. You can
    do this by updating a Last Updated date on the record every time it’s saved. There’s
    more than one way to accomplish this task. Here, you will do it with a process.


    First, you need to add the `LAST_UPDATED` field to the `TICKETS` table. To do
    this you use the SQL Workshop again:


    From the SQL Workshop drop-down menu, choose Object Browser, as shown in Figure
    [8-15](#A978-1-4842-0466-5_8_Chapter.html#Fig15).


    ![A978-1-4842-0466-5_8_Fig15_HTML.jpg](A978-1-4842-0466-5_8_Fig15_HTML.jpg)


    Figure 8-15.


    Navigating to the SQL Workshop Object Browser   Select the `TICKETS` table from
    the list of objects at left.   Click the Add Column button above the table definition,
    as shown in Figure [8-16](#A978-1-4842-0466-5_8_Chapter.html#Fig16).


    ![A978-1-4842-0466-5_8_Fig16_HTML.jpg](A978-1-4842-0466-5_8_Fig16_HTML.jpg)


    Figure 8-16.


    Adding a column to the table   Enter `LAST_UPDATED` for Add Column and `DATE`
    for Type, and click Next.   Click Finish. Now you can add the process to the page:
      Edit Page 210 of the application.   In the Processing tab of the Tree Pane,
    right-click the Processes node and choose Create from the context menu, as shown
    in Figure [8-17](#A978-1-4842-0466-5_8_Chapter.html#Fig17).


    ![A978-1-4842-0466-5_8_Fig17_HTML.jpg](A978-1-4842-0466-5_8_Fig17_HTML.jpg)


    Figure 8-17.


    Using the context menu to create a process   Set the Name of the process to `Set
    Last Processed` and set Point to Processing. Set the Type to PL/SQL Code. In the
    next step, you will set the contents of your anonymous PL/SQL block. If you’re
    unfamiliar with a PL/SQL anonymous block, it’s PL/SQL code that has a `BEGIN`
    and an `END` that wrap the contents. You need to follow PL/SQL syntax conventions,
    including ending statements with semicolons. It’s possible to nest anonymous blocks
    of code, but that isn’t necessary for this example:   Enter the following SQL
    into the PL/SQL Code text area (see Figure [8-18](#A978-1-4842-0466-5_8_Chapter.html#Fig18)):


    ![A978-1-4842-0466-5_8_Fig18_HTML.jpg](A978-1-4842-0466-5_8_Fig18_HTML.jpg)


    Figure 8-18.


    Entering the anonymous PL/SQL block `BEGIN`   `UPDATE tickets SET last_updated
    = sysdate`     `WHERE ticket_id = :P210_TICKET_ID;` `END;`   Leave both the Success
    and Error messages empty. These messages will appear at the top of a page as feedback
    to the user after the process completes. Your requirements don’t call for you
    to notify the user that the Last Updated date was changed.   In the Condition
    attribute group, change When Button Pressed to SAVE.   Save your changes.


    At this point, the process has been created. Currently, you don’t show the Last
    Updated date in the summary report. In order to see the value on the report, you
    will need to add the `LAST_UPDATED` column to the query from which the report
    draws data. That report resides on page 200 of your application:


    Edit Page 200.   Edit the Tickets region by clicking the region’s name in the
    tree.   Add the `LAST_UPDATED` date to the Region Source of the report, as in
    the following SQL. Click Save when you’re finished: `select TICKET_ID,`        `SUBJECT,`
           `DESCR,`        `CREATED_BY,`        `CREATED_ON,`        `CLOSED_ON,`
           `ASSIGNED_TO,`        `STATUS,`       `LAST_UPDATED`   `from TICKETS,`
           `STATUS_LOOKUP` `where TICKETS.STATUS_ID = STATUS_LOOKUP.STATUS_ID`    `and
    UPPER(SUBJECT) LIKE ''%''||UPPER(:P200_SEARCH)||''%''`    `and tickets.status_id
    LIKE :P200_STATUS_ID`


    To test and review the change, run the application and navigate to the Tickets
    report. Edit any ticket, and click the Apply Changes button. You should now see
    a value for Last Updated indicating the current day.


    This is a quick example of how you can use a process to apply form-based logic.
    When the form is used to make changes, a brief piece of PL/SQL makes a record
    change automatically. Packages, procedures, and APIs all can be reached using
    processes similar to this one.'
  trans: "\n### 执行点\n\n进程的执行点与计算的执行点相同。进程最常用的执行点是 `提交后 - 计算和验证之后` 和 `按需 - 当 AJAX 请求时运行此进程`，因为这些点支持按钮按压活动和动态操作。完整列表如下：\n\
    \n*   新会话\n*   页头之前\n*   页头之后\n*   区域之前\n*   区域之后\n*   页脚之前\n*   页脚之后\n*   提交后\n\
    *   处理中\n*   AJAX 回调\n\n进程可以在单个页面级别定义，也可以作为共享组件的一部分在应用程序级别定义。从功能上讲，页面进程和应用程序进程的行为方式相同。区别在于业务逻辑的包含位置。对于需要在所有页面上运行的进程，您可以定义一个应用程序进程。同样，就像区域一样，您可以使用全局页面来定义在每个页面上运行的进程，但这仅适用于页面渲染。\n\
    \n## 进程类型\n\n每种不同的进程类型根据需求有不同的用途。类型及其用途如下：\n\n*   自动行获取：从单个数据库表或视图中检索记录\n*   自动行处理\
    \ (DML)：处理从单个数据库表或视图插入、更新或删除记录\n*   清除会话状态：清除会话状态值；也称为缓存\n*   关闭对话框：关闭当前模态或非模态对话框的进程\n\
    *   表单分页：从数据库表或视图中检索单条上一条或下一条记录的进程。最常用于主从表单\n*   加载上传数据：将已解析的电子表格数据加载到现有表或视图中的进程\n\
    *   解析上传数据：解析已准备的电子表格数据的进程，为加载到现有表做准备\n*   PL/SQL 代码：通常用于利用数据库 PL/SQL 逻辑\n*  \
    \ 准备上传数据：准备电子表格数据以上传到现有表中的进程\n*   重置分页：重置报表的分页\n*   发送电子邮件：用于轻松发送电子邮件的声明性界面\n\
    *   表格表单 - 添加行：向表格表单区域添加一行的进程。\n*   表格表单 - 多行删除：从表格表单区域删除多行的进程\n*   表格表单 - 多行更新：从表格表单区域更新多行的进程\n\
    *   用户首选项：为最终用户设置用户首选项的进程。\n*   Web 服务：向 Web 服务提供者提交请求\n*   插件：由插件提供的进程功能\n\n\
    ## 帮助台应用中的进程\n\n进程背后的细节可能非常复杂。为了提供一个充分的示例，我们将在帮助台应用中包含一个简单的进程：一个要求应用跟踪记录最后一次修改时间的需求。您可以通过在记录每次保存时更新其上的\
    \ `最后更新` 日期来完成此操作。有不止一种方法可以完成此任务。在这里，您将使用一个进程来实现。\n\n首先，您需要将 `LAST_UPDATED` 字段添加到\
    \ `TICKETS` 表中。为此，您再次使用 SQL 工作坊：\n\n从 SQL 工作坊下拉菜单中，选择对象浏览器，如图 8-15 所示。\n\n![`A978-1-4842-0466-5_8_Fig15_HTML.jpg`](img/A978-1-4842-0466-5_8_Fig15_HTML.jpg)\n\
    \n图 8-15. 导航到 SQL 工作坊对象浏览器\n\n从左侧的对象列表中选择 `TICKETS` 表。\n\n单击表定义上方的“添加列”按钮，如图 8-16\
    \ 所示。\n\n![`A978-1-4842-0466-5_8_Fig16_HTML.jpg`](img/A978-1-4842-0466-5_8_Fig16_HTML.jpg)\n\
    \n图 8-16. 向表中添加列\n\n在“添加列”中输入 `LAST_UPDATED`，在“类型”中输入 `DATE`，然后单击“下一步”。\n\n单击“完成”。现在您可以将进程添加到页面：\n\
    \n编辑应用程序的第 210 页。\n\n在树状面板的“处理”选项卡中，右键单击“进程”节点，然后从上下文菜单中选择“创建”，如图 8-17 所示。\n\n\
    ![`A978-1-4842-0466-5_8_Fig17_HTML.jpg`](img/A978-1-4842-0466-5_8_Fig17_HTML.jpg)\n\
    \n图 8-17. 使用上下文菜单创建进程\n\n将进程的“名称”设置为 `设置最后处理时间`，并将“点”设置为 `处理中`。将“类型”设置为 `PL/SQL\
    \ 代码`。在下一步中，您将设置匿名 PL/SQL 块的内容。如果您不熟悉 PL/SQL 匿名块，它是一段以 `BEGIN` 开始并以 `END` 结束的\
    \ PL/SQL 代码，它们包裹着内容。您需要遵循 PL/SQL 语法约定，包括用分号结束语句。可以嵌套匿名代码块，但本示例不需要：\n\n在 PL/SQL\
    \ 代码文本区域中输入以下 SQL（参见图 8-18）：\n\n![`A978-1-4842-0466-5_8_Fig18_HTML.jpg`](img/A978-1-4842-0466-5_8_Fig18_HTML.jpg)\n\
    \n图 8-18. 输入匿名 PL/SQL 块\n\n```\nBEGIN\n    UPDATE tickets SET last_updated = sysdate\n\
    \       WHERE ticket_id = :P210_TICKET_ID;\nEND;\n```\n\n将“成功消息”和“错误消息”都留空。这些消息将在进程完成后作为用户反馈显示在页面顶部。您的需求不要求您通知用户最后更新日期已被更改。\n\
    \n在“条件”属性组中，将“当按钮被按下”更改为 `SAVE`。\n\n保存您的更改。\n\n至此，进程已创建。目前，您没有在摘要报告中显示“最后更新”日期。为了在报告中看到该值，您需要将\
    \ `LAST_UPDATED` 列添加到报告获取数据的查询中。该报告位于应用程序的第 200 页：\n\n编辑第 200 页。\n\n通过在树中单击区域的名称来编辑“工单”区域。\n\
    \n将 `LAST_UPDATED` 日期添加到报告的区域源中，如下列 SQL 所示。完成后单击“保存”：\n\n```\nselect TICKET_ID,\n\
    \       SUBJECT,\n       DESCR,\n       CREATED_BY,\n       CREATED_ON,\n    \
    \   CLOSED_ON,\n       ASSIGNED_TO,\n       STATUS,\n      LAST_UPDATED\n   from\
    \ TICKETS,\n       STATUS_LOOKUP\n where TICKETS.STATUS_ID = STATUS_LOOKUP.STATUS_ID\n\
    \   and UPPER(SUBJECT) LIKE '%'||UPPER(:P200_SEARCH)||'%'\n   and tickets.status_id\
    \ LIKE :P200_STATUS_ID\n```\n\n要测试和查看更改，请运行应用程序并导航到“工单”报告。编辑任意工单，然后单击“应用更改”按钮。您现在应该会看到“最后更新”的值，显示当前日期。\n\
    \n这是一个关于如何使用进程应用基于表单的逻辑的快速示例。当表单用于进行更改时，一小段 PL/SQL 会自动进行记录更改。包、过程和 API 都可以通过类似于该示例的进程来访问。\n"
- fmt: "## PL/SQL 区域\n\nPL/SQL 区域类型本质上是一个开放的 PL/SQL 容器，并具有生成输出的附加选项。您可以使用 Oracle Web\
    \ Application (OWA) 工具包过程（如 `htp.p`）来生成输出。对 APEX 项的引用可以使用绑定变量语法（例如，`:P1_ITEM_NAME`）、`v`\
    \ 函数（例如，`v('P1_ITEM_NAME')`）或替换字符串语法（例如，`&P1_ITEM_NAME`）来实现，以支持区域中包含的逻辑。\n\nPL/SQL\
    \ 区域与过程区域的不同之处在于，PL/SQL 区域仅在页面渲染期间执行，而过程可以在页面处理和页面渲染期间运行。PL/SQL 区域的优势在于能够直接在页面上生成内容。这种输出的一个用例是需要一种超出标准报告模板能力的复杂报告格式。在这种情况下，可以编写一个生成所需\
    \ HTML 输出的 PL/SQL 包，并由 PL/SQL 区域调用。\n\n在“服务台”应用程序中，您希望通过添加个人未解决工单数量的快速摘要，使主页更有用。这仅适用于有人登录的情况。因此，如果他们未登录，简单的问候消息就足够了。您可以通过添加一个包含一些逻辑以输出相应消息的\
    \ PL/SQL 区域来完成添加摘要的任务：\n\n1.  编辑页面 1。\n2.  通过在树中单击其名称来编辑 APEX Issue Tracker 区域。目前，此区域是一个标准的静态内容区域，会发出您输入到其中的确切\
    \ HTML 代码。您希望使其动态化，因此将其切换为使用 PL/SQL：\n    *   在“标识”属性组中，将“类型”更改为“PL/SQL 动态内容”。\n\
    \    *   在“PL/SQL 代码”文本区域中输入以下代码，替换原有的静态 HTML，然后保存您的更改：\n\n```\nDECLARE\n   l_count\
    \ NUMBER;\n   l_status_id NUMBER := get_status('OPEN');\nBEGIN\n   IF :APP_USER\
    \ != 'nobody' THEN\n      SELECT count(*)\n        INTO l_count\n        FROM\
    \ tickets\n       WHERE assigned_to = :APP_USER\n         AND status_id = l_status_id;\n\
    \      htp.p('<h1>Welcome to the APEX Issue Tracking System, '\n            ||\
    \ :APP_USER || '</h1>'\n            || 'You have ' || l_count || ' Open tickets.<br\
    \ />'\n            || 'Select an option from the list');\n   ELSE\n      htp.p('<h1>Welcome\
    \ to the APEX Issue Tracking System</h1>'\n            || 'Select an option from\
    \ the list');\n   END IF;\nEND;\n```\n\n此代码实现了基于用户替换变量 `:APP_USER` 做出决策的逻辑，并根据该区分因素定制\
    \ `htp.p` 输出。当用户尚未登录时，APEX 会提供 “nobody” 作为用户名，因此逻辑会根据该值进行判断。\n\n当为尚未登录的用户生成 PL/SQL\
    \ 区域时，会产生一条简单的欢迎消息（见图 [8-19](#A978-1-4842-0466-5_8_Chapter.html#Fig19)）。当拥有凭据的用户登录到应用程序时，会产生类似于图\
    \ [8-20](#A978-1-4842-0466-5_8_Chapter.html#Fig20) 中的消息，显示特定于用户的问候语以及分配给该用户的未解决工单数量的快速计数。\n\
    \n![A978-1-4842-0466-5_8_Fig20_HTML.jpg](A978-1-4842-0466-5_8_Fig20_HTML.jpg)\n\
    \n图 8-20. 对于已验证用户，PL/SQL 区域会生成问候语和工单计数\n\n![A978-1-4842-0466-5_8_Fig19_HTML.jpg](A978-1-4842-0466-5_8_Fig19_HTML.jpg)\n\
    \n图 8-19. 用户尚未登录时的 Issue Tracker PL/SQL 区域\n\n在本节中，您创建了一个动态 PL/SQL 区域，该区域根据应用程序用户改变输出。本节的示例虽然简单，但展示了如何使用数据库中的\
    \ PL/SQL 使区域的内容根据需要变得动态。\n\n## 动态 SQL\n\n动态 SQL 是指不是在设计时确定，而是在运行时由任意数量的动态条件组装而成的\
    \ SQL 的术语。当 SQL 语句的确切要求直到运行时才知晓，或者当 SQL 需要在应用程序运行时改变时，会使用动态 SQL。动态 SQL 允许您在应用程序运行时修改列列表、`where`\
    \ 子句、连接以及 SQL 语句的任何其他部分。\n\nAPEX 支持报告中的动态 SQL，并且可以支持返回 SQL 语句作为结果的 PL/SQL 函数。但是，存在一些约束。函数必须返回有效的\
    \ SQL 语句。根据实现的不同，如果列数未知或会变化，语句可能需要返回一组通用列。\n\n“服务台”应用程序需要区分公共工单和私人工单。为了实现该目标，您可以实现一个公共标志功能。实现该标志需要对数据模型进行快速更新，然后在主页报告中实现动态\
    \ SQL。首先进行数据修改：\n\n1.  导航到 SQL Workshop。\n2.  单击 SQL Commands 图标。\n3.  在文本区域中输入以下\
    \ SQL 语句，然后单击 Run 按钮。这会将名为 `PUBLIC_FLAG` 的新列添加到 `TICKETS` 表中：\n\n```\nALTER TABLE\
    \ tickets ADD (public_flag VARCHAR2(1))\n```\n\n4.  在文本区域中输入以下 SQL 语句，替换当前语句，然后单击\
    \ Run。确保 Autocommit 复选框已选中。这会将所有当前工单更新为默认值 `N`：\n\n```\nUPDATE tickets SET public_flag\
    \ = 'N'\n```\n\n现在数据模型修改已完成，您可以转向应用程序。在工单编辑屏幕中添加查看和编辑新值的选项：\n\n1.  编辑“服务台”应用程序的页面\
    \ 210。\n2.  使用组件库中的拖放功能，向“管理工单”区域添加一个新的单选组项。将新项定位在“状态 ID”项的右侧。\n3.  输入 `P210_PUBLIC_FLAG`\
    \ 作为名称，输入 `Public Flag` 作为标签。\n4.  在“设置”属性组中，将“列数”设置为 `2`。\n5.  在“外观”属性组中，将“模板”设置为“必填”。\n\
    6.  将“需要值”字段设置为“是”。\n7.  在“值列表”属性组中，将“类型”设置为“静态值”，同时在“静态值”文本区域中输入 `STATIC:Y,N`。\n\
    8.  将“显示空值”设置为“否”，如图 [8-21](#A978-1-4842-0466-5_8_Chapter.html#Fig21) 所示。\n\n\
    ![A978-1-4842-0466-5_8_Fig21_HTML.jpg](A978-1-4842-0466-5_8_Fig21_HTML.jpg)\n\n\
    图 8-21. 公共标志的值列表\n\n当向表单添加与表单所基于的表中的数据库列相关的列时，必须更改一些设置。“源使用”和“源类型”共同作用来标识每个项如何获取其值：\n\
    \n1.  在“源”属性组中，将“类型”设置为“数据库列”，这将相应地将“源使用”设置为“始终”，替换会话状态中的任何现有值。确保“数据库列名”为 `PUBLIC_FLAG`。\n\
    2.  在“默认值”属性组中，将“类型”设置为“静态值”，并在“静态值”中输入 `N`。\n3.  保存您的更改。\n\n现在您的数据模型中有了一个 `PUBLIC_FLAG`\
    \ 列，并且能够通过“工单”表单控制它，您可以在页面 1 上创建动态 SQL 报告，以便为未验证用户显示带有“公共”选项的工单：\n\n1.  在您的应用程序中编辑页面\
    \ 1。\n2.  通过在页面设计器工具栏中单击“创建”按钮并选择“报告区域”，如图 [8-22](#A978-1-4842-0466-5_8_Chapter.html#Fig22)\
    \ 所示，来创建一个新区域。\n\n![A978-1-4842-0466-5_8_Fig22_HTML.jpg](A978-1-4842-0466-5_8_Fig22_HTML.jpg)\n\
    \n图 8-22. 为 SQL 创建区域以生成您的报告\n\n3.  选择“经典报告”，然后单击“下一步”。\n4.  输入 `Current Open Issues`\
    \ 作为标题，如图 [8-23](#A978-1-4842-0466-5_8_Chapter.html#Fig23) 所示。单击“下一步”。\n\n![A978-1-4842-0466-5_8_Fig23_HTML.jpg](A978-1-4842-0466-5_8_Fig23_HTML.jpg)\n\
    \n图 8-23."
  raw: '## PL/SQL Regions


    The PL/SQL region type is effectively an open container for PL/SQL with the additional
    option to generate output. You can use Oracle Web Application (OWA) Toolkit procedures
    such as `htp.p` to generate the output. References to APEX items can be made using
    bind variable syntax (for example, `:P1_ITEM_NAME`), the `v` function (for example,
    `v(''P1_ITEM_NAME'')`), or substitution string syntax (for example, `&P1_ITEM_NAME`.)
    to support the logic contained in the region.


    PL/SQL regions differ from process regions in that PL/SQL regions are executed
    only during page rendering, whereas processes can run during both page processing
    and page rendering. PL/SQL regions have the advantage of being able to generate
    content directly on the page. A use case for this type of output is the need for
    a complex report format that is beyond the ability of a standard report template.
    In that case, a PL/SQL package that generates the needed HTML output can be written
    and called by a PL/SQL region.


    In the Help Desk application, you want to make the home page a bit more useful
    by adding a quick summary of the number of tickets an individual has open. This
    is applicable only if someone is logged in. So if they aren’t logged in, a simple
    greeting message will suffice. You can accomplish the task of adding the summary
    by adding a PL/SQL region with some logic to output the appropriate message:


    Edit Page 1.   Edit the APEX Issue Tracker region by clicking its name in the
    tree. Currently, this region is a standard Static Content region, emitting exactly
    the HTML code you enter into it. You want to make it dynamic, so switch it so
    it uses PL/SQL:   In the Identification attribute group, change Type to PL/SQL
    Dynamic Content.   Enter the following code for the PL/SQL Code text area, replacing
    the static HTML that was there, and then Save your changes: `DECLARE`   `l_count
    NUMBER;`   `l_status_id NUMBER := get_status(''OPEN'');` `BEGIN` `IF :APP_USER
    != ''nobody'' THEN`   `SELECT count(*)`     `INTO l_count`     `FROM tickets`
        `WHERE assigned_to = :APP_USER`     `AND status_id = l_status_id;`   `htp.p(''<h1>Welcome
    to the APEX Issue Tracking System, ''`     `|| :APP_USER || ''</h1>''`     `||
    ''You have '' || l_count || '' Open tickets.<br />''`     `|| ''Select an option
    from the list'');` `ELSE`   `htp.p(''<h1>Welcome to the APEX Issue Tracking System</h1>''`
        `|| ''Select an option from the list'');` `END IF;` `END;`  


    This code implements logic that makes a decision based on the user-substitution
    variable `:APP_USER` and tailors the `htp.p` output according to that distinguishing
    factor. APEX provides “nobody” as a user name when a user isn’t yet logged in,
    so the logic keys off of that value.


    When the PL/SQL region is generated for a user who isn’t yet logged in, a simple
    welcome message is produced (see Figure [8-19](#A978-1-4842-0466-5_8_Chapter.html#Fig19)).
    When a user who has credentials is logged in to the application, a message similar
    to that in Figure [8-20](#A978-1-4842-0466-5_8_Chapter.html#Fig20) is produced
    that shows a user-specific greeting and a quick count of the number of open tickets
    assigned to that user.


    ![A978-1-4842-0466-5_8_Fig20_HTML.jpg](A978-1-4842-0466-5_8_Fig20_HTML.jpg)


    Figure 8-20.


    With an authenticated user, the PL/SQL region generates a greeting and a ticket
    count


    ![A978-1-4842-0466-5_8_Fig19_HTML.jpg](A978-1-4842-0466-5_8_Fig19_HTML.jpg)


    Figure 8-19.


    Issue Tracker PL/SQL region when the user isn’t yet logged in


    In this section, you’ve created a dynamic PL/SQL region that alters the output
    based on the application user. This section’s example, although simple, shows
    how the content of a region can be as dynamic as necessary with the use of the
    PL/SQL in the database.


    ## Dynamic SQL


    Dynamic SQL is a term for SQL that isn’t finalized at design time, but rather
    is assembled at runtime by any number of dynamic criteria. Dynamic SQL is used
    when the exact requirements of an SQL statement aren’t known until runtime, or
    when the SQL needs to change while the application is running. Dynamic SQL lets
    you modify column lists, `where` clauses, joins, and any other portion of an SQL
    statement while an application is running.


    APEX supports dynamic SQL in reports and can support PL/SQL functions returning
    SQL statements as a result. There are some constraints, however. Functions must
    return a valid SQL statement. Depending on the implementation, a statement may
    need to return a set of generic columns if the number of columns isn’t known or
    will vary.


    The Help Desk application has the requirement to differentiate public tickets
    from private ones. To accomplish that goal, you can implement a public flag feature.
    Implementing the flag requires a quick update to your data model and then an implementation
    of dynamic SQL on the Home Page report. Start by making the data modification:


    Navigate to the SQL Workshop.   Click the SQL Commands icon.   Enter the following
    SQL statement in the text area, and click the Run button. This adds the new column
    called `PUBLIC_FLAG` to the `TICKETS` table: `ALTER TABLE tickets ADD (public_flag
    VARCHAR2(1))`   Enter the following SQL statement in the text area, replacing
    the current statement, and click Run. Ensure that the Autocommit checkbox is checked.
    This updates all the current tickets to a default value of `N`: `UPDATE tickets
    SET public_flag = ''N''` Now that the data-model modifications are complete, you
    can move on to the application. Add the option to see and edit the new value in
    the ticket edit screen:   Edit Page 210 of the Help Desk application.   Add a
    new Radio Group item to the Manage Tickets region using Drag & Drop from the Component
    Gallery. Position the new item to the right of the Status ID item.   Enter `P210_PUBLIC_FLAG`
    for Name and `Public Flag` for the Label.   In the Settings attribute group set
    Number of Columns to `2`.   In the Appearance attribute group set Template to
    Required.   Set Value Required field to Yes.   In the List of Values attribute
    group, set Type to Static Values, while in the Static Values text area enter `STATIC:Y,N`
      Set Display Null Value to No, as shown in Figure [8-21](#A978-1-4842-0466-5_8_Chapter.html#Fig21).


    ![A978-1-4842-0466-5_8_Fig21_HTML.jpg](A978-1-4842-0466-5_8_Fig21_HTML.jpg)


    Figure 8-21.


    The LOV for the public flag When you add a column to a form that relates to a
    database column in the table on which the form operates, a few settings have to
    be changed. Source Used and Source Type work together to identify how each item
    gets its value:   In the Source attribute group, set Type to Database Column,
    which in turn sets Source Used to Always, replacing any existing value in session
    state. Ensure that Database Column Name is `PUBLIC_FLAG`.   In the Default attribute
    group, set the Type to Static Value and enter `N` for Static Value.   Save your
    changes.


    Now that you have a `PUBLIC_FLAG` column in your data model and the ability to
    control it through the Tickets form, you can create the dynamic SQL report on
    page 1 to display tickets with a Public option for unauthenticated users:


    Edit Page 1 in your application.   Create a new region by clicking the Create
    button in the Page Designer toolbar and selecting Report Region, as indicated
    in Figure [8-22](#A978-1-4842-0466-5_8_Chapter.html#Fig22).


    ![A978-1-4842-0466-5_8_Fig22_HTML.jpg](A978-1-4842-0466-5_8_Fig22_HTML.jpg)


    Figure 8-22.


    Creating a region for the SQL to generate your report   Select Classic Report,
    and click Next.   Enter `Current Open Issues` for Title, as shown in Figure [8-23](#A978-1-4842-0466-5_8_Chapter.html#Fig23).
    Click Next.


    ![A978-1-4842-0466-5_8_Fig23_HTML.jpg](A978-1-4842-0466-5_8_Fig23_HTML.jpg)


    Figure 8-23.'
