  trans: '

    ## 数据安全


    至此，应用程序的大部分已相对安全。你所缺乏的是应用于隔离应用程序用户间数据的**数据安全**。任何经过认证的用户都可以查看并修改其他用户的记录。APEX 没有提供内置的构建来保护数据。APEX
    确实支持并能够与 Oracle 其他确实能保护数据的技术（例如虚拟专用数据库、Oracle 标签安全和透明数据加密）良好配合。


    尽管有多种方法可以处理数据隔离和安全问题，但其中一种较简单的方法是使用视图来强制实施用户可访问的数据，以替代对基表的所有直接引用。这种方法很有效，并且适用于所有版本的
    Oracle 数据库。其工作原理是在视图中添加一个安全函数，该函数使用当前的 APEX 用户名，过滤掉其他用户的数据。


    要实施此数据安全措施，你需要运行一个脚本来创建一个名为 `TICKET_SECURE_V` 的新视图，然后重新创建另外两个视图 `TICKET_ACTIVITY_V`
    和 `TICKET_V`，使它们指向这个安全视图，而不是直接指向 `TICKETS` 表。接着，你需要修改访问工单数据的页面的其他关键组件，以同样使用新的安全视图。步骤如下：


    定位、上传并运行脚本 `ch9_data_security_script.sql`。如果需要分步说明，请参考第 4 章。你应在结果报告中看到三行，且全部成功完成。


    脚本运行完成后，运行应用程序并导航到“分析”页面。你应该会注意到，只有分配给当前登录用户的工单或工单详情才会显示。接下来，修改其他几个页面的源代码，使其引用你刚刚创建的新安全对象：


    编辑应用程序的第 200 页。

    点击名称选择“工单”报告。

    定位并打开文件 `ch9_report_p200.txt`，然后将其内容复制到 SQL 查询文本区域，替换原有内容。保存你的更改。

    运行第 200 页，注意你只能看到分配给当前用户的工单。你需要在“管理多个工单”页面进行类似的更改：


    编辑应用程序的第 230 页。

    双击“管理多个工单”报告进行编辑。

    定位并打开文件 `ch9_report_p230.txt`，将其内容复制到 SQL 查询文本区域，替换原有内容。保存你的更改。

    运行第 230 页，注意你只能看到分配给当前用户的工单。最后，你也应该将此规则应用于图表，因为它仍然允许你查看系统中所有记录的状态，这是不准确的：


    编辑应用程序的第 500 页。

    在“按状态统计的工单”图表下，点击系列 1 的名称进行编辑。

    定位并打开文件 `ch9_report_p500.txt`，将其内容复制到 SQL 查询区域，替换原有内容。保存你的更改。

    运行第 500 页，注意该图表仅反映未分配工单或分配给当前用户的工单的状态。这是数据安全方面的一个巨大进步，但你还未完全完成。你可能已经注意到，如果在第 210
    页编辑其中一条记录，你可以使用右下角的“下一个 (>)”和“上一个 (<)”按钮来查看属于其他用户的记录。因此，你需要堵住这个安全漏洞：


    编辑应用程序的第 210 页。

    `获取下一个或上一个主键值` 过程的位置如图 9-28 所示。点击其名称编辑该过程。


    ![A978-1-4842-0466-5_9_Fig28_HTML.jpg](img/A978-1-4842-0466-5_9_Fig28_HTML.jpg)


    图 9-28.

    `获取下一个或上一个主键值` 过程的位置。


    将表名的值更改为 `TICKETS_SECURE_V`，如图 9-29 所示。如果你使用值列表，请确保搜索的是“视图”选项卡。点击保存。


    ![A978-1-4842-0466-5_9_Fig29_HTML.jpg](img/A978-1-4842-0466-5_9_Fig29_HTML.jpg)


    图 9-29.

    更新用于获取下一条记录的源。


    现在，你所有的数据都根据登录系统的用户身份进行了安全保护。真的如此吗？


    ## 会话状态保护


    攻击 Web 应用程序最常见的方式之一是通过一种称为**URL 篡改**的攻击形式。你不需要是程序员或黑客就能发动此类攻击，你只需更改浏览器中的 URL 即可。APEX
    在 2.2 版本中引入了会话状态保护功能。启用后，它会在 URL 中添加一个校验和值。如果 URL 的任何部分被更改，生成的校验和将与预期值不匹配，页面将根本无法渲染。


    默认情况下，APEX 5.0 在应用程序级别启用会话状态保护，并对使用向导构建的任何表单和报告应用项目级别的会话状态保护。因此，如果用户篡改 APEX URL，系统将阻止他们查看分配给其他用户的工单。


    在应用程序的第 200 页运行工单报告。将鼠标悬停在“编辑”图标上并检查 URL。注意 URL 中的 `&cs=` 部分。`&cs=` 参数是由 APEX
    自动生成的校验和。更改 URL 中 `P210_TICKET_ID` 的值，或删除 `&cs=` 及其右侧的所有内容，然后尝试运行页面。你将收到一条类似于图
    9-30 所示的错误消息。


    ![A978-1-4842-0466-5_9_Fig30_HTML.jpg](img/A978-1-4842-0466-5_9_Fig30_HTML.jpg)


    图 9-30.

    URL 篡改导致的校验和错误消息。


    ## 本章总结


    在本章中，你通过利用 APEX 的关键功能，为“服务台”应用程序应用了新的安全措施。你实现了一个新的自定义认证方案，以控制对应用程序敏感部分的访问用户。你还检查了针对已认证和未认证人员的条件安全，并添加了参数以允许应用程序供两者使用。


    恭喜！你刚刚编写了你的第一个 APEX 应用程序。凭借迄今为止学到的技能，你有能力创建几乎任何你需要的系统。花点时间沉浸在你的成就感中，然后准备学习如何将你的应用程序从开发环境迁移到其他系统。


    # 10. 应用程序打包与部署


    应用程序打包与部署的概念是开发者在设计应用程序时应从一开始就考虑的事情。对于 APEX 而言，内置功能有助于简化这项工作。在应用程序部署方面，有多种方法可以实现相同的最终目标，没有两个
    IT 组织的做法完全相同。本章将讨论 APEX 提供的用于帮助你打包和部署应用程序的工具，以及如何以非常 APEX 中心化的方式来使用它们。


    注意：你的组织可能已有标准化的方式来实现本章介绍的许多功能。在实施任何这些方法之前，请检查并确保你不是在重复造轮子。

    '
- fmt: '## Identifying Application Components


    Your APEX application consists of more than just the application export itself.
    There are underlying database objects, images, Cascading Style Sheets (`CSS`),
    and `JavaScript`s. And these components may or may not be stored on the same server
    as APEX, let alone stored in the APEX metadata repository. In essence, you need
    to know how to assemble everything it would take to instantiate your application
    from scratch. Therefore, it’s important to understand all the components that
    make up your application, where they’re stored, and how to bundle them in a way
    that makes migration easier.


    You can break the various components into roughly four main groups:


    *   `External files`: Your application may access files that don’t reside in the
    APEX repository. For instance, your company may have a common set of `CSS` and
    image files that are used by several websites in order to maintain a standard
    look and feel.

    *   `Database objects`: These include all the tables, views, `PL/SQL` objects,
    and any other database objects used by your application. Most of these reside
    in your application’s "`parse as`" schema.

    *   `APEX-based files`: These are files that have been uploaded into the `Files`
    section of an application’s supporting objects. They may include images, `CSS`,
    `JavaScript`, static files, and so on, and are stored in the APEX repository.

    *   `APEX application export`: This is the core of the APEX application, containing
    the pages, regions, items, validations, and so on.


    When it comes time to deploy an application, each of these types of files needs
    to be treated a bit differently. The following sections address each file type
    and how to obtain the most recent version for migration to an alternate platform.
    Later, the chapter will discuss using the `Supporting Object` feature of APEX
    to bundle the appropriate items into the application export.


    ### `External Files`


    As already mentioned, `external files` exist outside of the APEX metadata repository
    and usually outside the Oracle database as well. In the majority of cases, these
    files are placed in a directory structure on the application server that provides
    the HTTP services for APEX. Usually they’re placed in a directory under the document
    root (`docroot`) of the domain that is servicing APEX requests. Because they exist
    outside of APEX, they can’t rightly be included in the supporting objects of an
    application, and thus need to be handled separately from the other file types.


    You must keep careful track of what files your application uses and whether those
    files have changed during the development of your application. Another area of
    concern is whether other applications, APEX or otherwise, use these same files.


    For instance, version 1 of your application may reference a `JavaScript` file
    that is stored on the application server. During the development of version 2
    of the application, you may have made changes to that file that need to be moved
    from the development server to `QA` or production. But what if your colleague
    is working on another application that uses the same `JavaScript` file? You must
    be very careful about what you change and how you deploy it so as not to inadvertently
    affect other systems.


    When migrating these files from a development to a `QA` or production environment,
    you likely will need to work with the people who are in charge of maintaining
    the application-server tier. They probably have a process in place for planning
    the migration from one tier to another.


    If you’re working on your own and are the sole person in charge of the file migration,
    it’s good to get into the habit of maintaining a backup copy of the files you’re
    replacing, just in case something goes wrong. You can do this simply by renaming
    the file currently in use to include some type of identifier for the version.
    Including the date in the filename works well for this. In `Linux`, the command
    looks something like this:


    ```

    mv my_old_file.js my_old_file_2015_09_17_12_37.js

    ```


    If you’re using a source code control system and are tagging the file versions
    that are moved to production, you may not need to take this extra step.


    The key is making sure you can recover from any issues that may arise from overwriting
    a file. There’s nothing worse than bringing a system to its knees with no easy
    way to get back to the previous state.


    ### `Database Objects`


    It may seem that `database objects` should be straightforward, considering that
    they exist in Oracle and the SQL code for their definition can be recreated relatively
    easily. And for a brand-new application, this assumption is fairly accurate.


    However, the minute an application goes live, if you need to change the table
    structure, you can’t simply replace the underlying tables with new versions. The
    users have probably entered or manipulated data in the system, and it’s your job
    to make sure that when new versions of the system are rolled out, the integrity
    of the data is maintained.'
  raw: '## Identifying Application Components


    Your APEX application consists of more than just the application export itself.
    There are underlying database objects, images, Cascading Style Sheets (CSS), and
    JavaScripts. And these components may or may not be stored on the same server
    as APEX, let alone stored in the APEX metadata repository. In essence, you need
    to know how to assemble everything it would take to instantiate your application
    from scratch. Therefore, it’s important to understand all the components that
    make up your application, where they’re stored, and how to bundle them in a way
    that makes migration easier.


    You can break the various components into roughly four main groups:


    *   External files: Your application may access files that don’t reside in the
    APEX repository. For instance, your company may have a common set of CSS and image
    files that are used by several websites in order to maintain a standard look and
    feel.

    *   Database objects: These include all the tables, views, PL/SQL objects, and
    any other database objects used by your application. Most of the time these reside
    in your application’s “parse as” schema.

    *   APEX-based files: These are files that have been uploaded into the Files section
    of an application’s supporting objects. They may include images, CSS, JavaScript,
    static files, and so on, and are stored in the APEX repository.

    *   APEX application export: This is the core of the APEX application, containing
    the pages, regions, items, validations, and so on.


    When it comes time to deploy an application, each of these types of files needs
    to be treated a bit differently. The following sections address each file type
    and how to obtain the most recent version for migration to an alternate platform.
    Later, the chapter will discuss using the Supporting Object feature of APEX to
    bundle the appropriate items into the application export.


    ### External Files


    As already mentioned, external files exist outside of the APEX metadata repository
    and usually outside the Oracle database as well. In the majority of cases, these
    files are placed in a directory structure on the application server that provides
    the HTTP services for APEX. Usually they’re placed in a directory under the document
    root (docroot) of the domain that is servicing APEX requests. Because they exist
    outside of APEX, they can’t rightly be included in the supporting objects of an
    application, and thus need to be handled separately from the other file types.


    You must keep careful track of what files your application uses and whether those
    files have changed during the development of your application. Another area of
    concern is whether other applications, APEX or otherwise, use these same files.


    For instance, version 1 of your application may reference a JavaScript file that
    is stored on the application server. During the development of version 2 of the
    application, you may have made changes to that file that need to be moved from
    the development server to QA or production. But what if your colleague is working
    on another application that uses the same JavaScript file? You must be very careful
    about what you change and how you deploy it so as not to inadvertently affect
    other systems.


    When migrating these files from a development to a QA or production environment,
    you likely will need to work with the people who are in charge of maintaining
    the application-server tier. They probably have a process in place for planning
    the migration from one tier to another.


    If you’re working on your own and are the sole person in charge of the file migration,
    it’s good to get into the habit of maintaining a backup copy of the files you’re
    replacing, just in case something goes wrong. You can do this simply by renaming
    the file currently in use to include some type of identifier for the version.
    Including the date in the filename works well for this. In Linux, the command
    looks something like this:


    `mv my_old_file.js my_old_file_2015_09_17_12_37.js`


    If you’re using a source code control system and are tagging the file versions
    that are moved to production, you may not need to take this extra step.


    The key is making sure you can recover from any issues that may arise from overwriting
    a file. There’s nothing worse than bringing a system to its knees with no easy
    way to get back to the previous state.


    ### Database Objects


    It may seem that database objects should be straightforward, considering that
    they exist in Oracle and the SQL code for their definition can be recreated relatively
    easily. And for a brand-new application, this assumption is fairly accurate.


    However, the minute an application goes live, if you need to change the table
    structure, you can’t simply replace the underlying tables with new versions. The
    users have probably entered or manipulated data in the system, and it’s your job
    to make sure that when new versions of the system are rolled out, the integrity
    of the data is maintained.'
  trans: '

    ## 识别应用组件


    你的 APEX 应用不仅仅是应用程序导出文件本身。它还包括底层的数据库对象、图像、层叠样式表（`CSS`）以及 `JavaScript` 脚本。而且这些组件可能存储在与
    APEX 相同或不同的服务器上，更不用说可能并未存储在 APEX 元数据存储库中。本质上，你需要了解如何组装所有内容，以便从头开始实例化你的应用。因此，理解构成你应用的所有组件、它们存储的位置以及如何将它们打包以便于迁移，是非常重要的。


    你可以将各种组件大致分为四个主要组别：


    *   `外部文件`：你的应用可能访问不存储在 APEX 存储库中的文件。例如，你的公司可能有一套通用的 `CSS` 和图像文件，被多个网站使用，以保持标准的外观和感觉。

    *   `数据库对象`：这些包括应用使用的所有表、视图、`PL/SQL` 对象以及任何其他数据库对象。其中大部分驻留在应用的“`解析为`”模式中。

    *   `基于 APEX 的文件`：这些是已上传到应用程序“支持对象”中“`文件`”部分的文件。它们可能包括图像、`CSS`、`JavaScript`、静态文件等，并存储在
    APEX 存储库中。

    *   `APEX 应用程序导出`：这是 APEX 应用程序的核心，包含页面、区域、项目、验证等。


    当需要部署应用程序时，这些类型的文件每一种都需要稍作不同的处理。以下部分将分别介绍每种文件类型，以及如何获取其最新版本以便迁移到替代平台。本章稍后将讨论如何使用
    APEX 的`支持对象`功能，将适当的项目打包到应用程序导出文件中。


    ### `外部文件`


    如前所述，`外部文件`存在于 APEX 元数据存储库之外，通常也位于 Oracle 数据库之外。在大多数情况下，这些文件被放置在为 APEX 提供 HTTP
    服务的应用服务器上的目录结构中。通常它们位于处理 APEX 请求的域名的文档根目录（`docroot`）下的某个目录中。因为它们存在于 APEX 之外，所以无法合理地将其包含在应用程序的支持对象中，因此需要与其他文件类型分开处理。


    你必须仔细跟踪你的应用使用了哪些文件，以及这些文件在应用开发过程中是否发生了变化。另一个值得关注的领域是，是否有其他应用程序（无论是 APEX 还是其他技术构建的）也在使用这些相同的文件。


    例如，你应用程序的版本 1 可能引用一个存储在应用服务器上的 `JavaScript` 文件。在开发应用程序版本 2 的过程中，你可能修改了该文件，需要将其从开发服务器迁移到
    `QA` 或生产环境。但是，如果你的同事正在开发另一个使用相同 `JavaScript` 文件的应用程序呢？你必须非常小心地处理你所做的更改以及部署方式，以免无意中影响其他系统。


    将这些文件从开发环境迁移到 `QA` 或生产环境时，你可能需要与负责维护应用服务器层的人员合作。他们可能已有既定的流程来规划从一个环境到另一个环境的迁移。


    如果你是独自工作，并且是文件迁移的唯一负责人，那么养成保留被替换文件的备份副本的习惯是好的，以防万一出现问题。你可以通过简单地重命名当前使用的文件，在文件名中包含某种版本标识符来实现。在文件名中包含日期是一个有效的方法。在
    `Linux` 中，命令类似于：


    ```

    mv my_old_file.js my_old_file_2015_09_17_12_37.js

    ```


    如果你正在使用源代码控制系统，并且对迁移到生产环境的文件版本打上了标签，那么你可能不需要采取这个额外的步骤。


    关键是要确保你能够从覆盖文件可能引发的任何问题中恢复。没有什么比让系统陷入瘫痪，却没有简单的方法恢复到之前状态更糟糕的了。


    ### `数据库对象`


    `数据库对象`看起来应该很直接，因为它们存在于 Oracle 中，并且它们的定义 SQL 代码相对容易重新创建。对于一个全新的应用程序来说，这个假设是相当准确的。


    然而，一旦应用程序上线，如果你需要更改表结构，你不能简单地用新版本替换底层表。用户可能已经在系统中输入或操作了数据，而你的职责是确保在系统新版本推出时，数据的完整性得以保持。

    '
- fmt: '## New Applications


    When you’re deploying a brand-new application, a couple of tools can help you
    generate the scripts for the underlying database objects. The `Utilities` menu
    in the `APEX SQL Workshop` contains a `Generate DDL` tool, which does exactly
    what its name implies. If you run it against your application’s “parse as” schema,
    it allows you to generate a SQL script containing the underlying database objects.


    As shown in Figure [10-1](#A978-1-4842-0466-5_10_Chapter.html#Fig1), the wizard
    asks which of the available schemas you’d like to use as the basis for the generated
    script.


    ![A978-1-4842-0466-5_10_Fig1_HTML.jpg](A978-1-4842-0466-5_10_Fig1_HTML.jpg)

    Figure 10-1. Choosing the schema for which to generate object-definition scripts


    The wizard then lets you choose what types of database objects to include in the
    script (see Figure [10-2](#A978-1-4842-0466-5_10_Chapter.html#Fig2)). Make sure
    you select all the object types that are used by the application. Selecting `Check
    All` gives you the option of generating scripts for all objects in the selected
    schema. At this point you may also decide whether you wish to show the generated
    script inline so you can copy and paste it, or save it as a script file to the
    `APEX script repository`.


    ![A978-1-4842-0466-5_10_Fig2_HTML.jpg](A978-1-4842-0466-5_10_Fig2_HTML.jpg)

    Figure 10-2. Selecting the object types in the `Generate DDL` wizard


    The next step of the wizard (see Figure [10-3](#A978-1-4842-0466-5_10_Chapter.html#Fig3))
    lists all the objects that match the types you selected in the previous step.
    You can be as selective as you’d like about which objects to include. Your particular
    application may only use a subset of the objects within a schema, so you only
    need to choose those when generating the DDL.


    ![A978-1-4842-0466-5_10_Fig3_HTML.jpg](A978-1-4842-0466-5_10_Fig3_HTML.jpg)

    Figure 10-3. Choosing the specific objects desired in the `Generate DDL` wizard


    Note: If you find yourself in a situation in which several applications are sharing
    the same underlying schema, you may want to apply a naming convention to the database
    objects so you know which objects relate to which application. A common database-object
    naming convention is to introduce a three-letter prefix to the object names. For
    instance, the table `USERS` for the Help Desk application would become `HDA_USERS`.
    Again, check with your company to see if it already has an object naming convention.


    If you’ve chosen to save the script to the `APEX script repository`, the next
    step allows you to enter the name of the file to be created and a description,
    as shown in Figure [10-4](#A978-1-4842-0466-5_10_Chapter.html#Fig4).


    ![A978-1-4842-0466-5_10_Fig4_HTML.jpg](A978-1-4842-0466-5_10_Fig4_HTML.jpg)

    Figure 10-4. Naming the script being created by the `Generate DDL` wizard


    At this point, the script is generated, containing all the chosen objects. The
    generation engine does a good job of creating objects that are dependent on other
    objects in the correct order so that no errors will occur when the script is run.
    However, it’s always a good idea to test these scripts to make sure everything
    runs smoothly.


    Oracle’s `SQL Developer` product also has a tool that lets you generate DDL for
    a selected schema. Figure [10-5](#A978-1-4842-0466-5_10_Chapter.html#Fig5) shows
    the splash screen of the `SQL Developer Database Export` tool.


    ![A978-1-4842-0466-5_10_Fig5_HTML.jpg](A978-1-4842-0466-5_10_Fig5_HTML.jpg)

    Figure 10-5. The first screen of the `SQL Developer Database Export` tool


    This tool is very similar to the `APEX` wizard, but it gives you more control
    over the format and contents of the output, including whether to include schema
    names, storage clauses, grants, and so on. Another benefit of `SQL Developer`
    is the ability to export the data that exists in the tables. This comes in very
    handy for seed data that is needed for the system to function properly.


    Whether you choose to use the `APEX`-based tool or `SQL Developer`, generating
    the object-creation scripts for a new system is straightforward.


    ## Existing Applications


    For applications that have already been released into a production environment,
    the deployment process can be much more complex. You need to take into account
    the version that is in production and how the underlying database structure may
    differ from the version you’ve created in development and are ready to deploy.


    Luckily, there are tools available to help identify the differences between two
    schemas. These tools can also generate the necessary DDL scripts to implement
    the differences.


    However, the unfortunate truth is that although the `APEX SQL Workshop` utilities
    do include a schema-compare tool, it has some severe limitations. For one, both
    schemas that are being compared must be available from the same workspace. This
    isn’t possible if your production schema exists on a separate server, as it often
    does. The second limitation is that the `APEX`-based comparison tool identifies
    the objects that are different, but it doesn’t say how they’re different, nor
    does it generate the DDL that would be required to synch up the schemas.


    For this type of functionality, you have to rely on external programs or scripts.
    The following list mentions a number of options, all of which can generate the
    scripts required to synchronize the production environment’s database objects
    structure with the changes you may have introduced in development:


    *   `SQL Developer`: Oracle’s own product can run a full schema comparison between
    two separate schemas on separate servers and generate a script that synchronizes
    one schema with another. Older versions of this tool suffered from some problems,
    but as of `SQL Developer` version 3.2, the comparison engine has been significantly
    upgraded, and the generated scripts are solid.

    *   `Oracle Enterprise Manager`: If you have the `Change Management Pack` and
    `Oracle Enterprise Manager` (`OEM`), then you can compare schemas and generate
    a synchronization script. However, developers are very rarely given access to
    `OEM` because it’s more of a database administration tool and would potentially
    give them access to several sensitive utilities administrators would rather us
    not have access to.

    *   `Schema Compare for Oracle`: Red Gate Software has taken its extensive experience
    in creating tools for the SQL Server market and turned its attention to the Oracle
    database market. The result is a tool that allows you to compare, view, and generate
    synchronization scripts between two Oracle schemas. This is probably the best
    third-party tool on the market, but the one downside is that it only runs on Windows.

    *   `TOAD for Oracle`: `TOAD` (which originally stood for Tool for Oracle Application
    Development) is a tool written and distributed by Dell’s software division (formally
    Quest Software). Although it can do a lot more, the schema-comparison tool that’s
    available as part of the `DB Admin` module is quite sophisticated and will generate
    very clean and accurate scripts.


    Whichever tool you use, the output is a script that, when run against the production
    environment, executes the required DDL to alter the underlying database objects
    and bring them in line with what was created in your development environment.


    However, none of these tools take into account the data that may reside in the
    tables that are being altered. Be very careful before you implement any of the
    generated upgrade scripts, understand what they may do to the underlying data,
    and mitigate any risks of data loss or corruption.


    This subject is huge and is beyond the scope of this book. There is no automated
    solution to the problem of data migration between versions. More often than not,
    it boils down to handwritten scripts and heavy testing.'
