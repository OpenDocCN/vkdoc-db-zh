    Messages allow workspace administrators to create messages that will be visible
    to APEX developers. Messages are displayed in key areas throughout the APEX development
    environment. These messages aren’t displayed in your APEX applications.


    To create a message, click the Edit Message menu item (see Figure [14-3](#A978-1-4842-0466-5_14_Chapter.html#Fig3)).
    Enter a message and click the Apply Changes button, as shown in Figure [14-5](#A978-1-4842-0466-5_14_Chapter.html#Fig5).
    The message appears in the announcement section, as shown in Figure [14-6](#A978-1-4842-0466-5_14_Chapter.html#Fig6).


    ![A978-1-4842-0466-5_14_Fig6_HTML.jpg](A978-1-4842-0466-5_14_Fig6_HTML.jpg)

    Figure 14-6. A workspace announcement


    ![A978-1-4842-0466-5_14_Fig5_HTML.jpg](A978-1-4842-0466-5_14_Fig5_HTML.jpg)

    Figure 14-5. Editing a workspace announcement


    ## Managing Meta Data


    On the right side of the Manage Service page is a region called Manage Meta Data
    (see Figure [14-7](#A978-1-4842-0466-5_14_Chapter.html#Fig7)). The following subsections
    will cover what you can do using the menu choices in this region.


    ![A978-1-4842-0466-5_14_Fig7_HTML.jpg](A978-1-4842-0466-5_14_Fig7_HTML.jpg)

    Figure 14-7. Manage Meta Data menu


    ### Developer Activity and Click Count Logs


    The Developer Activity and Click Count Logs menu option allows the purge of two
    types of logs. One logs changes made by developers in the workspace. The other
    tracks user clicks on links to pages outside your APEX application.


    #### Developer Activity Logs


    The Application Builder logs all changes made by developers. The logs are referenced
    in various locations throughout the Application Builder and in the Administration
    section. You can view the logs from the Monitor Activity section, which you can
    access by clicking the Monitor Activity icon shown in Figure [14-1](#A978-1-4842-0466-5_14_Chapter.html#Fig1).
    You can also obtain the developer activity logs from the following query:


    ```

    SELECT *

    FROM apex_developer_activity_log

    ```


    Like the logs mentioned in the previous chapter, the developer activity logs retain
    up to one month of data. You can purge developer activity logs by clicking the
    Purge Developer Log button shown in Figure [14-8](#A978-1-4842-0466-5_14_Chapter.html#Fig8).


    ![A978-1-4842-0466-5_14_Fig8_HTML.jpg](A978-1-4842-0466-5_14_Fig8_HTML.jpg)

    Figure 14-8. Purge Developer Log button


    #### Click Count Logs


    When creating a list (Application Builder ➤ Shared Components ➤ Lists), you can
    choose to track clicks on external links. These clicks are logged in the `APEX_WORKSPACE_CLICKS`
    log. You can also view the click count log in the Monitor Activity section (see
    the icon for Monitor Activity in Figure [14-1](#A978-1-4842-0466-5_14_Chapter.html#Fig1)).


    Similar to the developer activity logs, you can purge the click logs by selecting
    Manage Click Count Log and clicking the Purge Click Log button shown in Figure
    [14-9](#A978-1-4842-0466-5_14_Chapter.html#Fig9).


    ![A978-1-4842-0466-5_14_Fig9_HTML.jpg](A978-1-4842-0466-5_14_Fig9_HTML.jpg)

    Figure 14-9. Purge Click Log button


    ### Session State


    Choosing Session State from the menu in Figure [14-5](#A978-1-4842-0466-5_14_Chapter.html#Fig5)
    brings you to a page that lets you manage session state and preferences. Preferences
    are slightly different than session state, as they’re linked to the user and not
    the current session. This means that changes to a preference affect all current
    and future sessions for a user.


    #### Manage Session State


    You can view all the session values, clear these values, and end sessions from
    the various reports available in the Manage Session State region. A session is
    automatically created each time a user logs in to APEX. Because the APEX Builder
    is an APEX application, sessions are created for both developers and end users.


    Clearing session state or terminating a session may be useful in development to
    simulate different situations. If you’re doing this in a production environment
    with live users, you should be extremely cautious.


    ### Application Cache


    The Application Cache section provides the tools to purge page and region caches
    based on different criteria. In APEX you can cache pages and regions either for
    all users or by each individual user. Caching can help improve performance, because
    APEX doesn’t need to regenerate the HTML code for a given region.


    ### Websheet Database Objects


    The Websheet Database Objects section allows you to create or delete the tables
    required for websheets and validate their status. Unlike an APEX application,
    websheet data is stored in tables that reside in each schema instead of in tables
    owned by the `APEX_050000` schema. The tables start with the prefix `APEX$_WS`,
    and usually there are about ten of them.


    When you first create a workspace, the websheet objects aren’t created. To create
    them, go to the Websheet Database Objects section and click the Create Websheet
    Database Objects link shown in Figure [14-10](#A978-1-4842-0466-5_14_Chapter.html#Fig10).
    Follow the wizard to create the websheet objects. After you’ve created the websheet
    objects, you can create a websheet application.


    ![A978-1-4842-0466-5_14_Fig10_HTML.jpg](A978-1-4842-0466-5_14_Fig10_HTML.jpg)

    Figure 14-10. Create Websheet Database Objects link


    Once the objects are created, the Websheet Database Objects page looks like that
    in Figure [14-11](#A978-1-4842-0466-5_14_Chapter.html#Fig11). From this screen,
    you can remove the database objects that relate to websheets or ensure that these
    objects are valid.


    ![A978-1-4842-0466-5_14_Fig11_HTML.jpg](A978-1-4842-0466-5_14_Fig11_HTML.jpg)

    Figure 14-11. Websheet Database Objects page


    ### Application Build Status


    From the Application Build Status section, you can quickly manage both the Application
    Status and the Build Status for all the applications in the workspace. The Application
    Status controls the availability of the application. To get a full explanation
    of each application status, reference the APEX documentation.


    The Build Status determines whether an application can be modified by developers
    or run only. In production environments, you may want to set the Build Status
    to Run Application Only to prevent any changes.


    Note: The Application and Build statuses can also be set from the Application
    Properties page for each application.


    ### File Utilization


    The File Utilization page provides an overview of all the types of files and their
    total size in the workspace, as shown in Figure [14-12](#A978-1-4842-0466-5_14_Chapter.html#Fig12).
    There are various locations where files can be stored as part of an APEX application.
    Over time, these files can take up unnecessary space.


    ![A978-1-4842-0466-5_14_Fig12_HTML.jpg](A978-1-4842-0466-5_14_Fig12_HTML.jpg)

    Figure 14-12. File-utilization information


    The export repository tends to consume the most space out of all the files listed
    on the File Utilization page. When you import an application into your workspace,
    the original file is stored in the export repository. The name export repository
    can be misleading, because the repository contains the original application files
    that are imported into the workspace. Once an application has been successfully
    imported and installed, you don’t need to retain the file in the repository, so
    it can be removed.


    The following steps explain how to clean up the export repository:


    From the Administration home page, click the Manage Export Repository link located
    in the Tasks region at the right.

    Select the files you no longer need and click the Delete Checked button, as shown
    in Figure [14-13](#A978-1-4842-0466-5_14_Chapter.html#Fig13).


    ![A978-1-4842-0466-5_14_Fig13_HTML.jpg](A978-1-4842-0466-5_14_Fig13_HTML.jpg)

    Figure 14-13. Delete Checked button'
