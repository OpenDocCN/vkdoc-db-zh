    #### Utilities


    The SQL Workshop Utilities section gives you access to tools and reports that
    help you view and manage information about the underlying database objects and
    their data. This section introduces each tool set and its main purpose. However,
    the majority of these tools are very straightforward, so in most cases the deep
    details are left for you to explore on your own.


    The Utilities home page (as shown in Figure [2-21](#A978-1-4842-0466-5_2_Chapter.html#Fig21))
    presents a quick, icon-based menu you can use to reach the individual utility
    areas. Clicking any one of these icons will take you directly to the tools page
    for that category.


    ![A978-1-4842-0466-5_2_Fig21_HTML.jpg](A978-1-4842-0466-5_2_Fig21_HTML.jpg)


    Figure 2-21.


    The SQL Workshop Utilities home page


    You’ve already seen the Query Builder, which gives users the ability to visually
    create queries.


    The Data Workshop provides tools that import and export data in many different
    formats, including comma- or tab-separated data, XML data, or spreadsheet data.
    These tools also help you manage files that you have loaded into either the text
    or spreadsheet repository.


    The Generate DDL wizard allows you to choose a schema associated with the workspace
    and then generates a script that can be used to re-create some or all of the objects
    with that schema based on your selection. The generated script doesn’t include
    any insert statements for the data that resides in the database objects, but it’s
    a good way to easily re-create the underlying objects an application might use.


    The Methods on Tables wizard generates an Application Programming Interface (API)
    based on a specific table or set of tables. For each table selected (up to ten
    named tables), the generated package contains a procedure for each of the following
    actions: `Insert`, `Update`, `Delete`, and `Select`. The benefit of using table
    APIs instead of accessing the table directly is that any required validation logic
    can be included once, in the API, and accessed from various alternate interfaces
    including APEX.


    The Object Reports are actually a set of utilities that let you get detailed information
    about the different types of objects that live in the “parse as” schema(s) assigned
    to the workspace. Although most of the reports have to do with tables, others
    deal with PL/SQL objects, invalid objects, grants and permissions, and so on.
    This is a good place to find details of the objects in your working schema.


    The Schema Comparison utility allows you to compare the objects in two separate
    schemas and create a difference report. You may choose to compare only certain
    attributes or all attributes of the objects in the selected schemas. The limitation
    here is that both schemas must be assigned to the workspace in order for the comparison
    to take place.


    User-Interface Defaults allow you to define default display attributes for APEX
    regions and items. The utility lets you manage these UI defaults at two different
    levels: Table Dictionary and Attribute Dictionary. UI Defaults will be discussed
    in more detail later.


    About Database and Database Monitor are special utilities that require the user
    running them to have access to a database login that has been granted the DBA
    role. The Database Monitor utilities allow the privileged user to view Sessions,
    Systems Statistics, Top SQL, and Long Operations reports. The About Database report
    shows detailed information about the database instance and the APEX environment.
    Depending on the settings the Instance Administrator has chosen, these two utilities
    may not appear in the list, because they can be turned off.


    When an object is dropped, Oracle doesn’t immediately remove the space associated
    with the table, but instead renames the table and places it and its associated
    storage in the Recycle Bin. The Recycle Bin utility allows you to view and potentially
    recover objects that have been dropped from the schemas associated with a workspace.
    You may also purge the Recycle Bin, allowing the space to be reclaimed by the
    Oracle database for use somewhere else.


    ### Packaged Apps


    The Packaged Apps section is where you will install and managed the applications
    that are bundled with the APEX distribution. The main page, shown in Figure [2-22](#A978-1-4842-0466-5_2_Chapter.html#Fig22),
    shows the Packaged Apps home page. From here you can see which applications are
    installed and can navigate to the three subsections.


    ![A978-1-4842-0466-5_2_Fig22_HTML.jpg](A978-1-4842-0466-5_2_Fig22_HTML.jpg)


    Figure 2-22.


    The Packaged Apps home page'
  trans: '

    #### 实用工具


    *   **条件**选项卡为上方区域选择的每个列显示一行，并允许您进一步定义其属性。（此功能稍后将详细介绍。）

    *   **SQL**选项卡显示向导正在构建的 SQL 语句。虽然它不能直接编辑，但您可以从此处轻松高亮显示该语句并将其复制到剪贴板。

    *   **结果**选项卡显示运行 SQL 语句的结果，并允许您以 CSV 格式下载结果数据。

    *   **已保存的 SQL**选项卡允许您保存、调用和管理使用查询生成器构建的语句。其中还包含筛选器，可用于搜索和限制显示哪些已保存的查询。


    除了**条件**选项卡外，其余都一目了然，因此让我们更详细地介绍这个选项卡。图 2-20 展示了一个双表连接的示例，并选择了五个列进行操作。


    ![A978-1-4842-0466-5_2_Fig20_HTML.jpg](img/A978-1-4842-0466-5_2_Fig20_HTML.jpg)


    图 2-20. 一个双表连接示例


    在此示例中，已对查询应用了以下修改：


    *   将`ORDER_TOTAL`列的别名更改为`SUM_OF_ORDERS`

    *   将结果集限制为仅包含`ORDER_TOTAL`小于 500 的记录

    *   按`CUST_LAST_NAME`、`CUST_FIRST_NAME`升序对返回的记录排序

    *   对`ORDER_TOTAL`列执行`SUM`函数

    *   按`USER_NAME`、`CUSTOMER_ID`、`CUST_FIRST_NAME`、`CUST_LAST_NAME`对查询进行分组


    根据列选择以及在**条件**选项卡中引入的限制和更改，SQL 语句（如在**SQL**选项卡中显示）如下所示：


    ```sql

    select DEMO_ORDERS.USER_NAME as USER_NAME,

    DEMO_CUSTOMERS.CUSTOMER_ID as CUSTOMER_ID,

    DEMO_CUSTOMERS.CUST_FIRST_NAME as CUST_FIRST_NAME,

    DEMO_CUSTOMERS.CUST_LAST_NAME as CUST_LAST_NAME,

    sum(DEMO_ORDERS.ORDER_TOTAL) as "SUM_OF_ORDERs"

    from DEMO_ORDERS DEMO_ORDERS,

    DEMO_CUSTOMERS DEMO_CUSTOMERS

    where DEMO_CUSTOMERS.CUSTOMER_ID=DEMO_ORDERS.CUSTOMER_ID

    and DEMO_ORDERS.ORDER_TOTAL <500

    group by DEMO_ORDERS.USER_NAME,

    DEMO_CUSTOMERS.CUSTOMER_ID,

    DEMO_CUSTOMERS.CUST_FIRST_NAME,

    DEMO_CUSTOMERS.CUST_LAST_NAME

    order by DEMO_CUSTOMERS.CUST_LAST_NAME ASC,

    DEMO_CUSTOMERS.CUST_FIRST_NAME ASC

    ```


    虽然查询生成器非常有用，并允许您使用简单的 GUI 快速组合出基本查询，但它确实有其局限性，例如嵌套子查询和复杂的联合查询。我们可以使用查询生成器来定义查询的骨架；然后，我们可以将查询带到
    SQL 命令窗口或 SQL IDE 中，并从那里进行微调。


    最后值得一提的是，查询生成器在 APEX 的多个地方都有链接，因此，每当需要您提供 SQL 语句时（例如，作为报表的基础），您都可以在弹出窗口中打开查询生成器，并将查询返回给调用表单。


    ### 打包应用程序


    **打包应用程序**部分是您将安装和管理随 APEX 发行版捆绑的应用程序的地方。主页面如图 2-22 所示，显示了打包应用程序的主页。从这里您可以看到已安装了哪些应用程序，并可以导航到三个子部分。


    ![A978-1-4842-0466-5_2_Fig22_HTML.jpg](img/A978-1-4842-0466-5_2_Fig22_HTML.jpg)


    图 2-22. 打包应用程序主页

