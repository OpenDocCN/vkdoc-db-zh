  trans: '### 主页


    一旦登录到你的工作区，你就会看到如图 2-6 所示的**工作区主页**。主页是你通往开发环境中其他部分的门户，并提供了一些关于工作区动态的高层次信息。


    ![A978-1-4842-0466-5_2_Fig6_HTML.jpg](img/A978-1-4842-0466-5_2_Fig6_HTML.jpg)

    *图 2-6. APEX 开发主屏幕*


    页面顶部是导航栏，其中包含你在整个开发人员界面中可用的主要导航结构。它提供了对你在开发应用程序时需要快速访问的许多部分的直接访问。值得注意的是，菜单栏的每个主要选项都分为两部分。例如，如果你直接点击`应用程序构建器`项，你会立即被带到`应用程序构建器`主页。但是，如果你点击其右侧的小向下箭头，则会显示一个更详细的下拉菜单，让你可以更细致地选择目的地，如图
    2-7 所示。


    ![A978-1-4842-0466-5_2_Fig7_HTML.jpg](img/A978-1-4842-0466-5_2_Fig7_HTML.jpg)

    *图 2-7. 使用菜单栏上的下拉菜单*


    在导航栏的右侧，是一组图标表示的菜单选项，如图 2-8 所示。


    ![A978-1-4842-0466-5_2_Fig8_HTML.jpg](img/A978-1-4842-0466-5_2_Fig8_HTML.jpg)

    *图 2-8. 导航栏右侧的图标*


    第一个是搜索图标，点击后允许你执行上下文相关的搜索。搜索的上下文取决于你在`应用程序构建器`中的位置。例如，如果你在工作区主页上，你的搜索范围是整个工作区。但是，如果你在`应用程序构建器`或`管理`部分，搜索将被限制在那些特定区域。


    第二个是`管理`菜单。无论你是`工作区管理员`还是`开发人员`，此菜单都对你可用。区别在于你能访问哪些功能。`开发人员`可以监控工作区的某些活动区域并访问仪表板，而`工作区管理员`则可以完全访问所有功能，包括用户维护和服务请求。


    第三个是`帮助`菜单，它提供对在线文档、APEX 支持论坛、Oracle 技术网络站点的 APEX 部分以及一个`关于`部分的访问。


    最后一个是当前登录用户的个人资料链接。在这里，用户可以编辑他们的详细信息、更新个人资料图片和更改密码。


    在浏览器的最底部是一个信息区域，显示当前登录的用户、当前工作区、语言以及 Oracle APEX 的当前版本。


    页面的其余部分要么用于提供指向四个主要部分的快速链接，要么为你提供有关工作区内正在发生什么的信息。从左到右的前两个区域显示工作区活动的概览。它们显示了工作区中的`热门应用程序`和`热门用户`。`新闻与消息`区域允许工作区中的开发人员输入他们希望工作区中其他人看到的信息。在一个新的工作区中，这些区域可能没有任何内容，但随着你按照本书学习，你会看到这种情况开始改变。


    请注意，开发环境中每个部分的主页大多遵循这种仪表板风格的主页界面，一个显著的例外是`应用程序构建器`。让我们首先看看那个部分。


    ### 应用程序构建器


    `应用程序构建器`是 APEX 应用程序开发环境的核心。你将使用`SQL 工作室`来操作底层数据库对象，而`应用程序构建器`则用于在编写、测试和调试应用程序时完成大部分实际工作。


    #### 应用程序构建器主页


    点击`应用程序构建器`菜单选项会带你进入`应用程序构建器`主页。与大多数主页一样，它的布局是顶部为菜单栏，右侧是包含任务和快速链接的区域。


    主要区别在于`应用程序构建器`主页不包含任何仪表板风格的摘要。相反，这里是你看到工作区中包含的不同应用程序列表的地方。（图 2-9 提供了一个例子。）根据你的
    APEX 实例设置，你可能会看到一些由`工作区管理员`安装的示例应用程序，但如果完全没有看到任何应用程序，也不必担心。


    ![A978-1-4842-0466-5_2_Fig9_HTML.jpg](img/A978-1-4842-0466-5_2_Fig9_HTML.jpg)

    *图 2-9. 应用程序构建器主页*


    图 2-9 显示了工作区中的一个应用程序，名为`Sample Master Detail`。但是，除了它的名称和应用程序 ID (118) 之外，没有太多关于它的信息。从这里你开始看到
    APEX 的强大之处，不仅在开发者 UI 中，也在你的应用程序中。


    你看到的应用程序列表实际上是一种称为`交互式报表(IR)`的报表样式。`IR` 允许我们自定义报表及其内容的显示方式。`IR` 在整个 APEX 开发界面中使用，也可以在创建你自己的应用程序时使用。它们是极其强大的工具，你会经常用到它们。


    页面右侧有三个区域，显示`关于`信息、最近编辑的应用程序以及指向`应用程序迁移`向导的链接。你稍后会更多地处理这些；现在，我们将深入查看一个应用程序的详细信息。


    #### 应用程序主页


    点击列出的任何一个应用程序会深入到`应用程序`主页，如图 2-10 所示。此页面与`应用程序构建器`主页非常相似，但它显示了特定应用程序中的所有页面。同样，它使用了一个`IR`，因此你可以自定义查看此数据的方式。


    ![A978-1-4842-0466-5_2_Fig10_HTML.jpg](img/A978-1-4842-0466-5_2_Fig10_HTML.jpg)

    *图 2-10. 应用程序主页*


    请注意页面的结构方式，与页面相关的任务和最近编辑的页面显示在页面右侧。当你在界面中导航时，这种布局将成为一个熟悉的主题。


    从这里，你可以点击列出的任何页面，使用`页面设计器`编辑该页面。你还可以`运行`、`导出`和`导入`应用程序，编辑支持对象或共享组件，以及访问与应用程序相关的实用程序。'
- fmt: '#### The Page Designer


    The Page Designer is where you’ll be spending most of your time as a developer
    creating and editing pages, regions, and items. The Page Designer in APEX 5.0
    is a complete departure from previous versions and is now presented in a way that
    much more closely resembles traditional Desktop IDE layout. This change has brought
    us the ability to manage components and edit their layout and properties from
    a single-page interface.


    One of the biggest changes is that, due to the single-page interface, alterations
    to a page must now be explicitly saved. While this may seem disruptive, it actually
    brings with it some useful functionality. For instance, now multiple changes can
    be made and saved all at once, potentially reducing development time. Also, unsaved
    changes can now be easily undone.


    Another major time-saving feature is the ability to select multiple components
    on a page using `Shift+Click` (or `Cmd+Click` on Mac). Once multiple items are
    selected, you can edit their common properties in the property editor. This can
    be useful if, for instance, you want to edit the attributes of all buttons on
    a page to set their visual properties to all be the same.


    Region and item placement has been enhanced with the introduction of a drag-and-drop
    interface. All rendering components can be easily placed or rearranged on the
    page.


    The layout of the new Page Designer is quite in-depth and, if you’re not familiar
    with it, can potentially be a bit perplexing. Appendix A at the back of this book
    will give you a detailed tour of the Page Designer and its components, laying
    out the nomenclature that will be used through the rest of this book. Take a moment
    to thumb through Appendix A to familiarize yourself with the terms and the placement
    of the tools.


    It is my goal for the rest of this book to take you through the development process
    in a way that will help you naturally learn how to use the Page Designer. However,
    if you’re ever confused by an instruction or forget what a particular tool is
    called, referring to Appendix A should help clear things up.


    ### SQL Workshop


    The SQL Workshop is a suite of tools that provides developers with the ability
    to view and manage database objects in the underlying schema(s) assigned to the
    workspace. The SQL Workshop home page shown in Figure [2-11](#A978-1-4842-0466-5_2_Chapter.html#Fig11)
    lets you access each of the underlying tools and gives some high-level information
    about recently created objects and commands that that have been run.


    ![A978-1-4842-0466-5_2_Fig11_HTML.jpg](A978-1-4842-0466-5_2_Fig11_HTML.jpg)


    Figure 2-11.


    The SQL Workshop home page


    Because there may be more than one schema assigned to the workspace, a schema-selection
    dialog at right allows you to select and set the default schema for all the tools.
    You may change the schema you’re working in within each of the tools as well.


    The main tools available as part of the SQL Workshop are displayed in the toolbar
    at the top of the page. Each of the individual tools deserves its own introduction,
    so let’s spend some time now looking at what they are and what they can do. You’ll
    use this area of APEX more heavily when you create the database objects for your
    application.


    #### The Object Browser


    If you’ve been working with databases for any length of time, you’ve probably
    used one of the more popular GUI tools that allows you to browse and manage database
    objects in a schema. The APEX Object Browser is a very similar tool presented
    through your web browser. Figure [2-12](#A978-1-4842-0466-5_2_Chapter.html#Fig12)
    shows the Object Browser being used to examine the table `EBA_DEMO_MD_DEPT`.


    ![A978-1-4842-0466-5_2_Fig12_HTML.jpg](A978-1-4842-0466-5_2_Fig12_HTML.jpg)


    Figure 2-12.


    The APEX Object Browser


    The name Object Browser is somewhat of a misnomer, because the tool can be used
    not only to browse the objects in the underlying schema(s), but also to create
    new objects, browse and edit data, delete objects, and edit object definitions.
    Although there are some limitations on the types of objects it can manipulate,
    it’s powerful enough to do most of the daily tasks that an application developer
    needs to tackle.


    You choose the object type you want to work with by selecting it from the drop-down
    list in the upper-left corner. You can search the selected object type by entering
    a text string in the search box just below it and clicking the refresh icon to
    the right. Clicking the name of an object displays its properties along with links
    to drill into more details.


    Although the interface for the Object Browser is pretty intuitive, there are some
    interesting things to note. In the upper-right corner is a drop-down list that
    allows you to set the current schema. The list contains all schemas currently
    assigned to the workspace. You can switch between them simply by choosing a new
    one from the list.


    #### The SQL Commands Interface


    The SQL Commands interface allows you to interact with the underlying schema(s)
    using standard SQL commands or PL/SQL as you would in any other GUI tool or in
    SQL*Plus. The difference is that you can save the statements for use at a later
    time. Figure [2-13](#A978-1-4842-0466-5_2_Chapter.html#Fig13) shows a simple SQL
    statement as executed in the SQL Commands interface.


    ![A978-1-4842-0466-5_2_Fig13_HTML.jpg](A978-1-4842-0466-5_2_Fig13_HTML.jpg)


    Figure 2-13.


    The SQL Commands interface


    Although its core function is quite straightforward, the SQL Commands interface
    is more robust than it first appears. Beyond the ability to save and retrieve
    SQL and PL/SQL, it can also run explain plans on statements and allow you to view
    your statement history. Therefore, if you ran a script or statement that was particularly
    useful, but you forgot to save it, you still have the ability to retrieve it from
    the history buffer.


    The SQL Commands interface also integrates with the Query Builder (described later),
    allowing you to load and manipulate saved statements that were built in the Query
    Builder.


    Note


    By default, all SQL statements executed via the SQL Commands interface are automatically
    committed. To override this setting and enter into transactional mode, uncheck
    the Autocommit check box in the toolbar. Once this is done, you can manually both
    commit and roll back your SQL statement.


    There is no way to turn off Autocommit permanently, so you need to remember to
    do this any time you want to enter transactional mode.'
  raw: '#### The Page Designer


    The Page Designer is where you’ll be spending most of your time as a developer
    creating and editing pages, regions, and items. The Page Designer in APEX 5.0
    is a complete departure from previous versions and is now presented in a way that
    much more closely resembles traditional Desktop IDE layout. This change has brought
    us the ability to manage components and edit their layout and properties from
    a single-page interface.


    One of the biggest changes is that, due to the single-page interface, alterations
    to a page must now be explicitly saved. While this may seem disruptive, it actually
    brings with it some useful functionality. For instance, now multiple changes can
    be made and saved all at once, potentially reducing development time. Also, unsaved
    changes can now be easily undone.


    Another major time-saving feature is the ability to select multiple components
    on a page using `Shift+Click` (or `Cmd+Click` on Mac). Once multiple items are
    selected, you can edit their common properties in the property editor. This can
    be useful if, for instance, you want to edit the attributes of all buttons on
    a page to set their visual properties to all be the same.


    Region and item placement has been enhanced with the introduction of a drag-and-drop
    interface. All rendering components can be easily placed or rearranged on the
    page.


    The layout of the new Page Designer is quite in-depth and, if you’re not familiar
    with it, can potentially be a bit perplexing. Appendix A at the back of this book
    will give you a detailed tour of the Page Designer and its components, laying
    out the nomenclature that will be used through the rest of this book. Take a moment
    to thumb through Appendix A to familiarize yourself with the terms and the placement
    of the tools.


    It is my goal for the rest of this book to take you through the development process
    in a way that will help you naturally learn how to use the Page Designer. However,
    if you’re ever confused by an instruction or forget what a particular tool is
    called, referring to Appendix A should help clear things up.


