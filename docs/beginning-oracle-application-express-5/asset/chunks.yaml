    ## 页面查找器


    单击下拉菜单会打开“页面查找器”对话框，允许您选择要编辑的页面。您也可以直接输入页码并单击 `Go` 按钮导航到该页。如果您尝试离开当前页面，且存在任何未保存的更改，**APEX**
    将询问您是否要放弃这些更改并继续。


    ## 页面锁定


    此处显示的挂锁图标指示当前页面的锁定状态。如果页面已解锁，挂锁图标显示为打开状态；如果已锁定，挂锁图标将显示为关闭状态。单击该图标将切换锁定状态并将当前用户指定为该锁的所有者。锁定页面时，系统将要求您提供锁定注释，该注释将显示给访问该页面的其他用户。


    ## 撤销


    这会回滚对一个或多个项目的最近一次更改。将鼠标悬停在图标上将指示将被回滚的更改。


    ## 重做


    这会重新应用对一个或多个项目的最近一次更改。将鼠标悬停在图标上将指示将被重新应用的更改。


    ## 创建


    此下拉菜单提供对多种 **APEX** 对象的创建访问权限。**Create** 菜单提供以下选项：


    ### 页面


    启动“创建页面”向导。


    ### 页面副本


    启动“复制页面”向导。


    ### 表单区域


    启动“创建表单”向导。


    ### 报表区域


    启动“创建报表区域”向导。


    ### 页面组件


    打开一个帮助对话框，概述在 **APEX 5.0** 中创建页面组件的方式。


    ### 共享组件


    启动“创建应用程序组件”向导。


    ### 页面组


    导航到 **APEX** 中的“创建页面组”页面。


    ### 开发者注释


    打开“开发者注释”对话框。在这里，您可以针对当前页面或一组页面输入和查看注释。


    ### 团队开发


    提供一个子菜单，允许在团队开发工具中创建功能、错误和待办事项。


    ## 实用工具


    此下拉菜单提供对多个页面相关实用工具的访问。**Utilities** 菜单提供以下选项：


    ### 删除页面


    允许您删除当前页面。选择此选项后显示的对话框允许您确认删除，并决定是否要级联删除到任何相关的列表条目，同时显示您将删除的页面内容。


    ### 顾问


    打开一个新浏览器窗口，显示 **APEX Advisor** 并选择当前页面进行处理。从这里，您可以对应用程序或特定页面执行检查，包括查找错误、安全问题、质量保证问题和其他最佳实践。


    ### 缓存


    导航到当前页面的缓存仪表板。从这里您可以管理当前页面的页面和区域缓存。


    ### 属性字典


    导航到当前页面的属性字典仪表板。从这里您可以从属性字典更新当前页面，或使用当前页面更新属性字典。


    ### 历史记录


    导航到针对当前页面和应用程序所做的历史更改报告。该报告显示所做的更改以及进行更改的开发者。


    ### 导出


    启动“导出页面”向导，允许在进行更改之前将应用程序的单个页面导出为备份，或在实例之间传输。


    ### 跨页面实用工具


    导航到一组可在多个页面中使用的页面。


    ### 应用程序实用工具


    导航到一组应用程序级别的实用工具。


    ### 页面组


    导航到“页面组”管理和分配页面。


    ### 升级应用程序


    导航到“应用程序升级”报告和向导。在这里，您可以查看应用程序的哪些元素可能从升级到 **APEX 5.0** 提供的最新功能中受益。


    ## 组件视图


    从“页面设计器视图”切换到“组件视图”，该视图自早期 **APEX** 版本起就已可用。


    ## 团队开发


    此下拉菜单提供对“团队开发”模块功能的访问权限，并且仅当工作区内启用了团队开发时才会显示。**Team Development** 菜单提供以下选项：


    ### 功能


    导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成功能。


    ### 待办事项


    导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成待办事项。


    ### 错误


    导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成错误。


    ### 反馈


    导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未处理反馈。


    ## 开发者注释


    启动一个对话框，可以在其中针对当前页面创建开发者注释、错误或待办事项。


    ## 共享组件


    导航到 **APEX** 的“共享组件”页面，提供对所有应用程序级别共享组件的访问权限。


    ## 保存


    保存当前页面上任何未保存的更改。


    ## 保存并运行


    保存当前页面上任何未保存的更改，然后运行该页面。

    '
- fmt: '## Tree Pane


    页面设计器左侧的树形窗格通过四个选项卡：渲染、动态操作、处理和页面共享组件，提供了对当前页面所有组件的访问。图 [A-3](#A978-1-4842-0466-5_17_Chapter.html#Fig3)
    展示了树形窗格的顶部区域并指出了其通用功能。


    ![A978-1-4842-0466-5_17_Fig3_HTML.jpg](A978-1-4842-0466-5_17_Fig3_HTML.jpg)


    图 A-3.

    页面设计器的树形窗格


    点击顶部的四个选项卡之一将上下文相关地改变窗格主体中显示的树数据：


    *   `Rendering` 选项卡将树更改为显示与页面渲染相关的组件，包括区域、项目、按钮、逻辑等。

    *   `Dynamic Actions` 选项卡将树更改为显示当前页面上定义的所有动态操作，无论它们如何触发。

    *   `Processing` 选项卡将树更改为显示与页面处理相关的所有应用逻辑，包括计算、验证、过程和分支。

    *   `Page Shared Components` 选项卡将树更改为显示与此页面关联的应用级共享组件。


    注意


    在 `Rendering` 和 `Dynamic Actions` 选项卡之间存在一些重叠，因为 `Rendering` 选项卡将显示任何触发元素是已渲染组件的动态操作。不要因此误以为它们是单独的动态操作。它们是相同的，只是为了方便而在两个位置显示。


    当 `Rendering` 或 `Processing` 选项卡处于活动状态时，会显示两个额外的按钮（如图 [A-3](#A978-1-4842-0466-5_17_Chapter.html#Fig3)
    所示），允许您按处理顺序分组（默认）或按组件类型分组。


    `Dynamic Action` 和 `Page Shared Component` 选项卡分别按事件和组件类型分组，然后按用户分配的顺序排序。


    最后一个控件是操作菜单，它是一个上下文相关的菜单，镜像了您在树中右键单击组件时看到的上下文菜单。根据当前哪个选项卡处于活动状态以及在树中选择了哪个节点，两种菜单类型都提供了多种功能。


    例如，如果您当前位于 `Rendering` 选项卡并在树中选择了一个区域，单击操作菜单或在树中右键单击区域名称将生成一个可用选项的上下文菜单。


    将鼠标悬停在树中的任何节点上，无论您位于哪个选项卡，都会显示一个包含该组件基本信息的工具提示。


    您还可以使用树通过拖放来重新排序组件。重新排序表单中的项目就像单击并将项目拖动到您想要的顺序一样简单。在拖动项目时，树中会出现一个黄色的辅助节点，指示合法的放置位置。但请注意，这只会更改它们的顺序，而不会影响任何项目的布局属性。


    ## Central Pane


    中央窗格被分为四个单独的选项卡，如图 [A-4](#A978-1-4842-0466-5_17_Chapter.html#Fig4) 所示：网格布局、消息、页面搜索和帮助。每个选项卡都值得详细解释。


    ![A978-1-4842-0466-5_17_Fig4_HTML.jpg](A978-1-4842-0466-5_17_Fig4_HTML.jpg)


    图 A-4.

    中央窗格的选项卡


    ### Grid Layout


    如图 [A-5](#A978-1-4842-0466-5_17_Chapter.html#Fig5) 所示，`Grid Layout` 选项卡提供了将在页面上显示的组件的可视化表示。虽然这绝不是最终渲染的完整
    WYSIWYG 表示，但它在帮助开发人员理解组件将如何在屏幕上呈现方面做得非常好。


    ![A978-1-4842-0466-5_17_Fig5_HTML.jpg](A978-1-4842-0466-5_17_Fig5_HTML.jpg)


    图 A-5.

    网格布局和相关控件


    如前所述，您可以使用区域分隔条来调整屏幕上每个面板所占的空间量，或者您可以通过单击分隔条上的箭头来完全隐藏一个区域。然而，有时您可能希望将 `Grid Layout`
    扩展到占据整个画布。单击 `Expand/Restore` 按钮将最初展开然后恢复网格布局。


    或者，在特别大或繁忙的页面上，您可能希望专注于特定区域的布局。在 `Grid Layout` 中单击某个区域，然后单击 `Display From Here`
    按钮，将隐藏选定区域之外页面上的所有其他区域。单击 `Display From Page` 按钮将把 `Grid Layout` 恢复为其默认视图，显示整个页面的可见组件。


    可以通过拖放移动页面上的可见组件。也可以通过从图库中将新组件拖放到网格布局画布上来将它们添加到页面（参见图 [A-6](#A978-1-4842-0466-5_17_Chapter.html#Fig6)）。在拖动项目定位时，可以放置对象的区域将具有黄色背景。当您将鼠标悬停在放置区域上时，黄色背景内会出现一个灰色框（如图
    [A-6](#A978-1-4842-0466-5_17_Chapter.html#Fig6) 所示），指示对象将被放置的位置。


    ![A978-1-4842-0466-5_17_Fig6_HTML.jpg](A978-1-4842-0466-5_17_Fig6_HTML.jpg)


    图 A-6.

    使用拖放放置按钮


    与树形窗格一样，`Grid Layout` 包含一个操作菜单和所有组件可用的上下文菜单。通过在网格布局中选择组件并右键单击或单击操作菜单，您将看到该组件的可用操作。


    在 `Grid Layout` 的操作菜单和上下文菜单中有一组选项控制网格布局中显示的内容：


    *   `Hide Empty Legacy Positions`：当选择此选项时（默认），空的模板位置（被认为是“旧版的”）将从网格布局中隐藏。旧版位置被认为是那些与较旧主题相关的位置，虽然未被弃用，但不鼓励继续使用。即使选择了此选项，如果位置包含组件，它仍会显示在网格布局中。

    *   `Hide Empty Positions`：当选择此选项时，任何不包含组件的位置将被隐藏。这允许开发人员仅关注那些当前包含项目的位置。

    *   `Hide Global Page Components`：当选择此选项时（默认），网格布局会隐藏放置在当前界面全局页面上的任何组件。这允许开发人员仅关注在当前页面上定义的组件。

    *   `Hide Buttons`：当选择此选项时，所有被认为是按钮容器的区域以及任何已分配的按钮都将被隐藏。这允许开发人员专注于区域内项目的放置。

    *   `Hide Items`：当选择此选项时，所有被认为是项目容器的区域以及任何已分配的项目都将被隐藏。这允许开发人员专注于区域内按钮的放置。


    同样，与树形窗格类似，`Grid Layout` 中也提供了工具提示，提供有关您鼠标悬停组件的基本信息。


    注意


    隐藏的项目不会显示在网格布局中，但会出现在树形窗格的 `Rendering` 部分中。'
  raw: '## Tree Pane


    The Tree Pane on the left-hand side of the Page Designer gives you access to all
    of the components of the current page by providing a set of four tabs: Rendering,
    Dynamic Actions, Processing, and Page Shared Components. Figure [A-3](#A978-1-4842-0466-5_17_Chapter.html#Fig3)
    shows the top region of the Tree Pane and indicates the common features.


    ![A978-1-4842-0466-5_17_Fig3_HTML.jpg](A978-1-4842-0466-5_17_Fig3_HTML.jpg)


    Figure A-3.


    The Page Designer’s Tree Pane


    Clicking on one of the four tabs across the top will contextually change the tree
    data displayed in the body of the pane:


    *   The Rendering tab changes the tree to display the components related to page
    rendering, including Regions, Items, Buttons, Logic, and so on.

    *   The Dynamic Actions tab changes the tree to display all dynamic actions defined
    on the current page, regardless of how they are triggered.

    *   The Processing tab changes the tree to display all application logic associated
    with page processing, including Computations, Validations, Processes, and Branches.

    *   The Page Shared Components tab changes the tree to display application-level
    shared components that are associated with this page.


    Note


    There is some overlap between the Rendering and the Dynamic Actions tabs in that
    the Rendering tab will display any Dynamic Action whose triggering element is
    a rendered component. Don’t let this trick you into believing that they are separate
    Dynamic Actions. They are the same and are displayed in both places for convenience.


    When either the Rendering or Processing tabs are active, two extra buttons (as
    shown in Figure [A-3](#A978-1-4842-0466-5_17_Chapter.html#Fig3)) are displayed
    that allow you to either Group by Processing Order (the default) or Group by Component
    Type.


    The Dynamic Action and Page Shared Component tabs are grouped by Event and Component
    type, respectively, and then ordered by their user-assigned sequence.


    The final control, the Action Menu, is a context-sensitive menu that mirrors the
    context menus you see when right-clicking the components in the tree. Both menu
    types provide a multitude of functionality depending upon which tab is current
    as well as which node you have selected in the tree.


    For instance, if you’re currently on the Rendering tab and have a Region selected
    in the tree, clicking either the Action Menu or right-clicking on the region name
    in the tree will produce a context menu of available options.


    Hovering over any node in the tree, regardless of which tab you’re on, will display
    a tooltip containing basic information about the component.


    You may also use the tree to reorder components using Drag & Drop. Reordering
    the items within a form is as easy as clicking and dragging the items into the
    order you want them. While dragging an item, a yellow helper node appears in the
    tree indicating a legal drop position. Note, however, that this only changes their
    order and doesn’t affect any of the items’ layout properties.


    ## Central Pane


    The Central Pane is broken down into four separate tabs, as indicated in Figure
    [A-4](#A978-1-4842-0466-5_17_Chapter.html#Fig4): Grid Layout, Messages, Page Search,
    and Help. Each of these tabs merits its own detailed explanation.


    ![A978-1-4842-0466-5_17_Fig4_HTML.jpg](A978-1-4842-0466-5_17_Fig4_HTML.jpg)


    Figure A-4.


    Tabs of the Central Pane


    ### Grid Layout


    The Grid Layout tab, as shown in Figure [A-5](#A978-1-4842-0466-5_17_Chapter.html#Fig5),
    provides a visual representation of the components that will be displayed on the
    page. While this is definitely not a full WYSIWYG representation of the final
    rendering, it does a very good job of allowing the developer to understand how
    components will be rendered on the screen.


    ![A978-1-4842-0466-5_17_Fig5_HTML.jpg](A978-1-4842-0466-5_17_Fig5_HTML.jpg)


    Figure A-5.


    Grid Layout and associated controls


    As mentioned earlier, you can use the region splitters to resize the amount of
    space each panel takes up on the screen, or you can, by clicking the arrow on
    the splitter, hide a region completely. There are times, however, that you may
    want to expand the Grid Layout to take up the entire canvas. Clicking the Expand/Restore
    button will initially expand and then reinstate the Grid Layout.


    Alternatively, on particularly large or busy pages, you may want to focus on the
    layout of a specific region. Clicking on the region in the Grid Layout and then
    clicking the Display From Here button will hide all other regions on the page,
    outside of the selected region, from view. Clicking on the Display From Page button
    will restore the Grid Layout to its default view, displaying the entire page’s
    visible components.


    Visible components on the page can be moved around using Drag & Drop. New components
    can also be added to the page by dragging and dropping them onto the Grid Layout
    canvas from the Gallery (see Figure [A-6](#A978-1-4842-0466-5_17_Chapter.html#Fig6)).
    When dragging items into position, the areas where the object may be dropped will
    have a yellow background. As you hover over a placement area, a grey box will
    appear within the yellow background (as shown in Figure [A-6](#A978-1-4842-0466-5_17_Chapter.html#Fig6))
    indicating where the object will be dropped.


    ![A978-1-4842-0466-5_17_Fig6_HTML.jpg](A978-1-4842-0466-5_17_Fig6_HTML.jpg)


    Figure A-6.


    Using Drag & Drop to place a button


    As with the Tree Pane, the Grid Layout contains an Action Menu and context menus
    available for all components. By either selecting the component in the Grid Layout
    and right-clicking or clicking the Actions Menu you will be presented with the
    actions available for that component.


    There are a set of options in the Grid Layout’s Action Menu and context menus
    that control what is shown in the Grid Layout:


    *   Hide Empty Legacy Positions: When this option is selected (which is the default),
    empty template positions, which are deemed to be “legacy,” are hidden from the
    Grid Layout. Legacy positions are considered to be those that relate to older
    themes and, while not deprecated, are discouraged from being used moving forward.
    Even if this option is selected, if the position contains a component, it will
    be shown in the Grid Layout.

    *   Hide Empty Positions: When this option is selected, any position that does
    not contain a component will be hidden from view. This allows the developer to
    focus only on those positions that currently contain items.

    *   Hide Global Page Components: When this option is selected (default), the Grid
    Layout hides any components that are placed on the current interface’s global
    page. This allows the developer to focus only on the components that are defined
    on the current page.

    *   Hide Buttons: When this option is selected, all region areas that are considered
    button containers and any assigned buttons are hidden from view. This allows the
    developer to focus on the placement of items within a region.

    *   Hide Items: When this option is selected, all region areas that are considered
    item containers and any assigned items are hidden from view. This allows the developer
    to focus on placement of buttons within a region.


    Again, similar to the Tree Pane, tooltips are available in the Grid Layout, providing
    basic information about the component over which you’re hovering.


    Note


    Hidden items will not display in the Grid Layout but will appear in the Rendering
    section of the Tree Pane.'
  trans: '## 树形窗格


    页面设计器左侧的树形窗格，通过四个选项卡——**渲染**、**动态操作**、**处理**和**页面共享组件**，提供了对当前页面所有组件的访问。图 A-3
    展示了树形窗格的顶部区域并指出了其通用功能。


    ![A978-1-4842-0466-5_17_Fig3_HTML.jpg](img/A978-1-4842-0466-5_17_Fig3_HTML.jpg)


    图 A-3.

    页面设计器的树形窗格


    点击顶部的四个选项卡之一，将根据上下文改变窗格主体中显示的树形数据：


    *   `Rendering` 选项卡将树形数据更改为显示与页面渲染相关的组件，包括区域、项目、按钮、逻辑等。

    *   `Dynamic Actions` 选项卡将树形数据更改为显示当前页面上定义的所有动态操作，无论它们如何触发。

    *   `Processing` 选项卡将树形数据更改为显示与页面处理相关的所有应用逻辑，包括计算、验证、过程和分支。

    *   `Page Shared Components` 选项卡将树形数据更改为显示与此页面关联的应用级共享组件。


    注意


    在 `Rendering` 和 `Dynamic Actions` 选项卡之间存在一些重叠，因为 `Rendering` 选项卡会显示任何触发元素是已渲染组件的动态操作。请不要因此误以为它们是单独的动态操作。它们是相同的，只是为了方便而在两个位置显示。


    当 `Rendering` 或 `Processing` 选项卡处于活动状态时，会显示两个额外的按钮（如图 A-3 所示），允许您按处理顺序分组（默认）或按组件类型分组。


    `Dynamic Action` 和 `Page Shared Component` 选项卡分别按事件和组件类型分组，然后按用户分配的顺序排序。


    最后一个控件是操作菜单，它是一个上下文相关的菜单，镜像了您在树中右键单击组件时看到的上下文菜单。根据当前哪个选项卡处于活动状态以及在树中选择了哪个节点，两种菜单类型都提供了多种功能。


    例如，如果您当前位于 `Rendering` 选项卡并在树中选择了一个区域，单击操作菜单或在树中右键单击区域名称将生成一个可用选项的上下文菜单。


    将鼠标悬停在树中的任何节点上，无论您位于哪个选项卡，都会显示一个包含该组件基本信息的工具提示。


    您还可以使用树通过拖放来重新排序组件。重新排序表单中的项目就像单击并将项目拖动到您想要的顺序一样简单。在拖动项目时，树中会出现一个黄色的辅助节点，指示合法的放置位置。但请注意，这只会更改它们的顺序，而不会影响任何项目的布局属性。


    ## 中央窗格


    中央窗格被分为四个单独的选项卡，如图 A-4 所示：**网格布局**、**消息**、**页面搜索**和**帮助**。每个选项卡都值得详细解释。


    ![A978-1-4842-0466-5_17_Fig4_HTML.jpg](img/A978-1-4842-0466-5_17_Fig4_HTML.jpg)


    图 A-4.

    中央窗格的选项卡


    ### 网格布局


    如图 A-5 所示，`Grid Layout` 选项卡提供了将在页面上显示的组件的可视化表示。虽然这绝不是最终渲染的完整 WYSIWYG 表示，但它在帮助开发人员理解组件将如何在屏幕上呈现方面做得非常好。


    ![A978-1-4842-0466-5_17_Fig5_HTML.jpg](img/A978-1-4842-0466-5_17_Fig5_HTML.jpg)


    图 A-5.

    网格布局和相关控件


    如前所述，您可以使用区域分隔条来调整屏幕上每个面板所占的空间量，或者您可以通过单击分隔条上的箭头来完全隐藏一个区域。然而，有时您可能希望将 `Grid Layout`
    扩展到占据整个画布。单击 `Expand/Restore` 按钮将最初展开然后恢复网格布局。


    或者，在特别大或繁忙的页面上，您可能希望专注于特定区域的布局。在 `Grid Layout` 中单击某个区域，然后单击 `Display From Here`
    按钮，将隐藏选定区域之外页面上的所有其他区域。单击 `Display From Page` 按钮将把 `Grid Layout` 恢复为其默认视图，显示整个页面的可见组件。


    可以通过拖放移动页面上的可见组件。也可以通过从图库中将新组件拖放到网格布局画布上来将它们添加到页面（参见图 A-6）。在拖动项目定位时，可以放置对象的区域将具有黄色背景。当您将鼠标悬停在放置区域上时，黄色背景内会出现一个灰色框（如图
    A-6 所示），指示对象将被放置的位置。


    ![A978-1-4842-0466-5_17_Fig6_HTML.jpg](img/A978-1-4842-0466-5_17_Fig6_HTML.jpg)


    图 A-6.

    使用拖放放置按钮


    与树形窗格一样，`Grid Layout` 包含一个操作菜单和所有组件可用的上下文菜单。通过在网格布局中选择组件并右键单击或单击操作菜单，您将看到该组件的可用操作。


    在 `Grid Layout` 的操作菜单和上下文菜单中有一组选项控制网格布局中显示的内容：


    *   `Hide Empty Legacy Positions`：当选择此选项时（默认），空的模板位置（被认为是“旧版的”）将从网格布局中隐藏。旧版位置被认为是那些与较旧主题相关的位置，虽然未被弃用，但不鼓励继续使用。即使选择了此选项，如果位置包含组件，它仍会显示在网格布局中。

    *   `Hide Empty Positions`：当选择此选项时，任何不包含组件的位置将被隐藏。这允许开发人员仅关注那些当前包含项目的位置。

    *   `Hide Global Page Components`：当选择此选项时（默认），网格布局会隐藏放置在当前界面全局页面上的任何组件。这允许开发人员仅关注在当前页面上定义的组件。

    *   `Hide Buttons`：当选择此选项时，所有被认为是按钮容器的区域以及任何已分配的按钮都将被隐藏。这允许开发人员专注于区域内项目的放置。

    *   `Hide Items`：当选择此选项时，所有被认为是项目容器的区域以及任何已分配的项目都将被隐藏。这允许开发人员专注于区域内按钮的放置。


    同样，与树形窗格类似，`Grid Layout` 中也提供了工具提示，提供有关您鼠标悬停组件的基本信息。


    注意


    隐藏的项目不会显示在网格布局中，但会出现在树形窗格的 `Rendering` 部分中。'
- fmt: '### Messages


    As you develop your page by placing components and editing their attributes, you
    will inevitably see a component highlighted in either red or yellow, and the Messages
    tab will be badged to indicate the number of messages available, as shown in Figure
    [A-7](#A978-1-4842-0466-5_17_Chapter.html#Fig7).


    ![A978-1-4842-0466-5_17_Fig7_HTML.jpg](A978-1-4842-0466-5_17_Fig7_HTML.jpg)

    *Figure A-7. The Messages tab showing a message and the associated component and
    attribute*


    Messages come in two types:


    - Errors: Indicated in red, these messages must be addressed before the page can
    be saved. Clicking on the text of the error in the Messages tab will display the
    attribute in the Properties Pane associated with the error.

    - Warnings: Indicated in yellow, these messages are there to warn you of potential
    problems. You are still able to save the page without addressing the warning,
    but the page may not act properly until the warning is fully addressed. Clicking
    on the text of the warning in the messages tab will display the attribute in the
    Properties Pane associated with the warning.


    ### Page Search


    Figure [A-8](#A978-1-4842-0466-5_17_Chapter.html#Fig8) shows the Page Search tab,
    which allows you to search through the metadata of all page components.


    ![A978-1-4842-0466-5_17_Fig8_HTML.jpg](A978-1-4842-0466-5_17_Fig8_HTML.jpg)

    *Figure A-8. The Page Search tab showing search results*


    Entering any text into the search field and pressing `RETURN` will search the
    metadata of your application for the search term entered and display any references
    found, highlighting your search term. Clicking on any of the items found with
    the search will navigate to that component within the page designer.


    Using the Match Case option will require the search to match the case of the entered
    search term exactly. Using the Regular Expression option will treat the search
    term as a regular expression string.


    The Clear button will clear the search from the entire Page Search form as well
    as any results listed below it.


    ### Help


    Every attribute within the Property Editor has associated help available to the
    developer. To view the help, select a component in either the Tree Pane or the
    Grid Layout and then select an attribute. At that point, switching to the Help
    tab will display the help for the selected attribute. Figure [A-9](#A978-1-4842-0466-5_17_Chapter.html#Fig9)
    shows the help text available for the `Subtype` attribute of the `P1_SEARCH` text
    field.


    ![A978-1-4842-0466-5_17_Fig9_HTML.jpg](A978-1-4842-0466-5_17_Fig9_HTML.jpg)

    *Figure A-9. Viewing help for the `P1_SEARCH` Subtype attribute*


    This context-sensitive help will assist developers in quickly coming up to speed
    on the many new attributes that have been introduced in APEX 5.0.


    At the bottom of each help section is a Provide Feedback on Help link. Clicking
    on the link will open a new browser window and navigate to an APEX application
    that allows you to provide feedback on the help text for the attribute currently
    in context. The feedback will be used by the Oracle APEX development team to help
    refine the help text in future releases.


    ### Property Editor


    The Property Editor on the right-hand side of the Page Designer displays all of
    the attributes for the component(s) currently selected in either the Tree Pane
    or the Central Pane. Figure [A-10](#A978-1-4842-0466-5_17_Chapter.html#Fig10)
    shows the Property Editor pane and outlines the related controls.


    ![A978-1-4842-0466-5_17_Fig10_HTML.jpg](A978-1-4842-0466-5_17_Fig10_HTML.jpg)

    *Figure A-10. The Page Designer’s Property Editor pane*


    As you select components in the Tree Pane or the Grid Layout, the Property Editor
    will update to show the attributes for the currently selected component(s). Attributes
    are organized into Attribute Groups and can be expanded and collapsed by clicking
    on the triangle icon beside the group name. The Required Attribute Indicator takes
    the form of a red triangle in the upper-left corner near the attributes label.


    The amount and type of information that is displayed in the Property Editor can
    be controlled by the controls at the top of the pane:


    - Show Common: In cases where only one component is selected, choosing this option
    will show only the attributes whose values differ from those of the default. If
    more than one component is selected, this option will also show the attributes
    that have been commonly edited across the selected components.

    - Show All: In cases where only one component is selected, choosing this option
    will show all attributes for the selected component. If more than one component
    is selected, this option will also show all common attributes for the selected
    components.

    - Collapse All: Collapses all of the Attribute Groups so that only the headings
    are shown.

    - Expand All: Expands all of the Attribute Groups so that all appropriate attributes
    (as controlled by Show Common and Show All) are displayed.

    - Go To Group: Places focus on the first attribute of the group selected from
    the pull-down menu.


    As you edit the various attributes of APEX components, it is likely that you’ll
    be familiar and comfortable with most of the controls you are presented with.
    In the next sections, we’ll go over a few control types whose function might not
    be immediately apparent.


    #### Quick Picks


    The Quick Pick control appears to the left of attribute select lists, as shown
    in Figure [A-11](#A978-1-4842-0466-5_17_Chapter.html#Fig11). Clicking on the Quick
    Pick icon will produce a short list of what are considered the “most common” options
    of the full select list.


    ![A978-1-4842-0466-5_17_Fig11_HTML.jpg](A978-1-4842-0466-5_17_Fig11_HTML.jpg)

    *Figure A-11. The Quick Pick icon being clicked for a select list*


    #### Go To


    The Go To control appears when an attribute references another component on the
    page. By clicking the icon shown in Figure [A-12](#A978-1-4842-0466-5_17_Chapter.html#Fig12),
    the Page Designer’s focus is set to the component indicated by the attribute.
    This provides a quick way to navigate directly to the referenced component.


    ![A978-1-4842-0466-5_17_Fig12_HTML.jpg](A978-1-4842-0466-5_17_Fig12_HTML.jpg)

    *Figure A-12. The Go To icon associated with the Region attribute for a text field*


    #### Options Dialogue Button


    There are a number of attributes that require a more complex pop-up dialogue to
    set their values. In these cases, APEX provides an Options Dialogue Button, as
    shown for both the Template Options and the Target Page in Figure [A-13](#A978-1-4842-0466-5_17_Chapter.html#Fig13).
    Clicking on the grey box containing the text produces a dialogue that provides
    options for the attribute in question. Figure [A-14](#A978-1-4842-0466-5_17_Chapter.html#Fig14)
    is an example of the Template Options Dialogue for a button.


    ![A978-1-4842-0466-5_17_Fig14_HTML.jpg](A978-1-4842-0466-5_17_Fig14_HTML.jpg)

    *Figure A-14. Example dialogue for a button’s Template Options*


    ![A978-1-4842-0466-5_17_Fig13_HTML.jpg](A978-1-4842-0466-5_17_Fig13_HTML.jpg)

    *Figure A-13. Template Options and Target attributes with Options Dialogue Buttons*'
  raw: "### Messages\n\nAs you develop your page by placing components and editing\
    \ their attributes, you will inevitably see a component highlighted in either\
    \ red or yellow, and the Messages tab will be badged to indicate the number of\
    \ messages available, as shown in Figure [A-7](#A978-1-4842-0466-5_17_Chapter.html#Fig7).\n\
    \n![A978-1-4842-0466-5_17_Fig7_HTML.jpg](A978-1-4842-0466-5_17_Fig7_HTML.jpg)\n\
    \nFigure A-7.\n\nThe Messages tab showing a message and the associated component\
    \ and attribute\n\nMessages come in two types:\n\n*   Errors: Indicated in red,\
    \ these messages must be addressed before the page can be saved. Clicking on the\
    \ text of the error in the Messages tab will display the attribute in the Properties\
    \ Pane associated with the error.\n*   Warnings: Indicated in yellow, these messages\
    \ are there to warn you of potential problems. You are still able to save the\
    \ page without addressing the warning, but the page may not act properly until\
    \ the warning is fully addressed. Clicking on the text of the warning in the messages\
    \ tab will display the attribute in the Properties Pane associated with the warning.\n\
    \n### Page Search\n\nFigure [A-8](#A978-1-4842-0466-5_17_Chapter.html#Fig8) shows\
    \ the Page Search tab, which allows you to search through the metadata of all\
    \ page components.\n\n![A978-1-4842-0466-5_17_Fig8_HTML.jpg](A978-1-4842-0466-5_17_Fig8_HTML.jpg)\n\
    \nFigure A-8.\n\nThe Page Search tab showing search results\n\nEntering any text\
    \ into the search field and pressing `RETURN` will search the metadata of your\
    \ application for the search term entered and display any references found, highlighting\
    \ your search term. Clicking on any of the items found with the search will navigate\
    \ to that component within the page designer.\n\nUsing the Match Case option will\
    \ require the search to match the case of the entered search term exactly. Using\
    \ the Regular Expression option will treat the search term as a regular expression\
    \ string.\n\nThe Clear button will clear the search from the entire Page Search\
    \ form as well as any results listed below it.\n\n### Help\n\nEvery attribute\
    \ within the Property Editor has associated help available to the developer. To\
    \ view the help, select a component in either the Tree Pane or the Grid Layout\
    \ and then select an attribute. At that point, switching to the Help tab will\
    \ display the help for the selected attribute. Figure [A-9](#A978-1-4842-0466-5_17_Chapter.html#Fig9)\
    \ shows the help text available for the `Subtype` attribute of the `P1_SEARCH`\
    \ text field.\n\n![A978-1-4842-0466-5_17_Fig9_HTML.jpg](A978-1-4842-0466-5_17_Fig9_HTML.jpg)\n\
    \nFigure A-9.\n\nViewing help for the P1_SEARCH Subtype attribute\n\nThis context-sensitive\
    \ help will assist developers in quickly coming up to speed on the many new attributes\
    \ that have been introduced in APEX 5.0\n\nAt the bottom of each help section\
    \ is a Provide Feedback on Help link. Clicking on the link will open a new browser\
    \ window and navigate to an APEX application that allows you to provide feedback\
    \ on the help text for the attribute currently in context. The feedback will be\
    \ used by the Oracle APEX development team to help refine the help text in future\
    \ releases.\n\n## Property Editor\n\n*   The Property Editor on the right-hand\
    \ side of the Page Designer displays all of the attributes for the component(s)\
    \ currently selected in either the Tree Pane or the Central Pane. Figure [A-10](#A978-1-4842-0466-5_17_Chapter.html#Fig10)\
    \ shows the Property Editor pane and outlines the related controls.\n\n    ![A978-1-4842-0466-5_17_Fig10_HTML.jpg](A978-1-4842-0466-5_17_Fig10_HTML.jpg)\n\
    \n    Figure A-10.\n\n    The Page Designer’s Property Editor pane\n\nAs you select\
    \ components in the Tree Pane or the Grid Layout, the Property Editor will update\
    \ to show the attributes for the currently selected component(s). Attributes are\
    \ organized into Attribute Groups and can be expanded and collapsed by clicking\
    \ on the triangle icon beside the group name. The Required Attribute Indicator\
    \ takes the form of a red triangle in the upper-left corner near the attributes\
    \ label.\n\nThe amount and type of information that is displayed in the Property\
    \ Editor can be controlled by the controls at the top of the pane:\n\n*   Show\
    \ Common: In cases where only one component is selected, choosing this option\
    \ will show only the attributes whose values differ from those of the default.\
    \ If more than one component is selected, this option will also show the attributes\
    \ that have been commonly edited across the selected components.\n*   Show All:\
    \ In cases where only one component is selected, choosing this option will show\
    \ all attributes for the selected component. If more than one component is selected,\
    \ this option will also show all common attributes for the selected components.\n\
    *   Collapse All: Collapses all of the Attribute Groups so that only the headings\
    \ are shown.\n*   Expand All: Expands all of the Attribute Groups so that all\
    \ appropriate attributes (as controlled by Show Common and Show All) are displayed.\n\
    *   Go To Group: Places focus on the first attribute of the group selected from\
    \ the pull-down menu.\n\nAs you edit the various attributes of APEX components,\
    \ it is likely that you’ll be familiar and comfortable with most of the controls\
    \ you are presented with. In the next sections, we’ll go over a few control types\
    \ whose function might not be immediately apparent.\n\n### Quick Picks\n\nThe\
    \ Quick Pick control appears to the left of attribute select lists, as shown in\
    \ Figure [A-11](#A978-1-4842-0466-5_17_Chapter.html#Fig11). Clicking on the Quick\
    \ Pick icon will produce a short list of what are considered the “most common”\
    \ options of the full select list.\n\n![A978-1-4842-0466-5_17_Fig11_HTML.jpg](A978-1-4842-0466-5_17_Fig11_HTML.jpg)\n\
    \nFigure A-11.\n\nThe Quick Pick icon being clicked for a select list\n\n####\
    \ Go To\n\nThe Go To control appears when an attribute references another component\
    \ on the page. By clicking the icon shown in Figure [A-12](#A978-1-4842-0466-5_17_Chapter.html#Fig12),\
    \ the Page Designer’s focus is set to the component indicated by the attribute.\
    \ This provides a quick way to navigate directly to the referenced component.\n\
    \n![A978-1-4842-0466-5_17_Fig12_HTML.jpg](A978-1-4842-0466-5_17_Fig12_HTML.jpg)\n\
    \nFigure A-12.\n\nThe Go To icon associated with the Region attribute for a text\
    \ field\n\n#### Options Dialogue Button\n\nThere are a number of attributes that\
    \ require a more complex pop-up dialogue to set their values. In these cases,\
    \ APEX provides an Options Dialogue Button, as shown for both the Template Options\
    \ and the Target Page in Figure [A-13](#A978-1-4842-0466-5_17_Chapter.html#Fig13).\
    \ Clicking on the grey box containing the text produces a dialogue that provides\
    \ options for the attribute in question. Figure [A-14](#A978-1-4842-0466-5_17_Chapter.html#Fig14)\
    \ is an example of the Template Options Dialogue for a button.\n\n![A978-1-4842-0466-5_17_Fig14_HTML.jpg](A978-1-4842-0466-5_17_Fig14_HTML.jpg)\n\
    \nFigure A-14.\n\nExample dialogue for a button’s Template Options\n\n![A978-1-4842-0466-5_17_Fig13_HTML.jpg](A978-1-4842-0466-5_17_Fig13_HTML.jpg)\n\
    \nFigure A-13.\n\nTemplate Options and Target attributes with Options Dialogue\
    \ Buttons"
  trans: '### 消息


    在通过放置组件并编辑其属性来开发页面时，您不可避免地会看到某个组件以红色或黄色高亮显示，并且“消息”选项卡会显示徽章，指示可用消息的数量，如图 A-7 所示。


    ![A978-1-4842-0466-5_17_Fig7_HTML.jpg](img/A978-1-4842-0466-5_17_Fig7_HTML.jpg)

    *图 A-7. “消息”选项卡显示消息及其关联的组件和属性*


    消息分为两种类型：


    -   **错误**：以红色指示，这些消息必须在保存页面前得到处理。点击“消息”选项卡中的错误文本，将在属性窗格中显示与该错误关联的属性。

    -   **警告**：以黄色指示，这些消息用于提示您潜在的问题。您仍可以在未处理警告的情况下保存页面，但页面可能无法正常运行，直到警告被完全解决。点击“消息”选项卡中的警告文本，将在属性窗格中显示与该警告关联的属性。


    ### 页面搜索


    图 A-8 展示了“页面搜索”选项卡，它允许您搜索所有页面组件的元数据。


    ![A978-1-4842-0466-5_17_Fig8_HTML.jpg](img/A978-1-4842-0466-5_17_Fig8_HTML.jpg)

    *图 A-8. 显示搜索结果的“页面搜索”选项卡*


    在搜索字段中输入任意文本并按下 `回车键`，将在应用程序的元数据中搜索输入的搜索词，并显示找到的所有匹配项，同时高亮显示您的搜索词。点击搜索到的任何项目，将导航到页面设计器中的对应组件。


    使用“区分大小写”选项将要求搜索与输入的搜索词完全匹配大小写。使用“正则表达式”选项会将搜索词视为正则表达式字符串处理。


    “清除”按钮将清除整个“页面搜索”表单以及其下方列出的所有结果。


    ### 帮助


    属性编辑器中的每个属性都有相关的帮助信息可供开发人员使用。要查看帮助，请在树状窗格或网格布局中选择一个组件，然后选择一个属性。此时，切换到“帮助”选项卡将显示所选属性的帮助信息。图
    A-9 显示了 `P1_SEARCH` 文本字段的 `子类型` 属性的可用帮助文本。


    ![A978-1-4842-0466-5_17_Fig9_HTML.jpg](img/A978-1-4842-0466-5_17_Fig9_HTML.jpg)

    *图 A-9. 查看 `P1_SEARCH` 子类型属性的帮助*


    这种上下文相关的帮助将帮助开发人员快速掌握 APEX 5.0 中引入的许多新属性。


    每个帮助部分的底部都有一个“提供关于帮助的反馈”链接。点击该链接将打开一个新的浏览器窗口，并导航到一个 APEX 应用程序，允许您就当前上下文中的属性帮助文本提供反馈。Oracle
    APEX 开发团队将利用此反馈在未来的版本中优化帮助文本。


    ### 属性编辑器


    页面设计器右侧的“属性编辑器”显示了在树状窗格或中央窗格中当前选定的组件的所有属性。图 A-10 显示了“属性编辑器”窗格并概述了相关控件。


    ![A978-1-4842-0466-5_17_Fig10_HTML.jpg](img/A978-1-4842-0466-5_17_Fig10_HTML.jpg)

    *图 A-10. 页面设计器的“属性编辑器”窗格*


    当您在树状窗格或网格布局中选择组件时，“属性编辑器”将更新以显示当前选定组件的属性。属性按“属性组”组织，可以通过点击组名旁边的三角形图标进行展开和折叠。“必需属性指示器”在属性标签附近的左上角以红色三角形的形式显示。


    “属性编辑器”中显示的信息量和类型可以通过窗格顶部的控件进行控制：


    -   **显示常用**：当只选择一个组件时，选择此选项将仅显示值与默认值不同的属性。如果选择了多个组件，此选项还将显示所选组件间被共同编辑过的属性。

    -   **显示全部**：当只选择一个组件时，选择此选项将显示所选组件的所有属性。如果选择了多个组件，此选项还将显示所选组件的所有公共属性。

    -   **全部折叠**：折叠所有“属性组”，仅显示标题。

    -   **全部展开**：展开所有“属性组”，以便显示所有适用的属性（由“显示常用”和“显示全部”控制）。

    -   **转到组**：将焦点置于从下拉菜单中选择的组的第一个属性上。


    当您编辑 APEX 组件的各种属性时，您可能会对大部分呈现的控件感到熟悉和得心应手。在接下来的章节中，我们将介绍一些功能可能不会立即明了的控件类型。


    #### 快速选择


    “快速选择”控件出现在属性选择列表的左侧，如图 A-11 所示。点击“快速选择”图标将生成一个简短的列表，其中包含被认为是完整选择列表中“最常用”的选项。


    ![A978-1-4842-0466-5_17_Fig11_HTML.jpg](img/A978-1-4842-0466-5_17_Fig11_HTML.jpg)

    *图 A-11. 为选择列表点击“快速选择”图标*


    #### 转到


    “转到”控件会在一个属性引用页面上另一个组件时出现。通过点击图 A-12 中所示的图标，页面设计器的焦点将设置到该属性所指示的组件。这提供了一种快速导航到被引用组件的方法。


    ![A978-1-4842-0466-5_17_Fig12_HTML.jpg](img/A978-1-4842-0466-5_17_Fig12_HTML.jpg)

    *图 A-12. 与文本字段的“区域”属性关联的“转到”图标*


    #### 选项对话框按钮


    有许多属性需要更复杂的弹出对话框来设置其值。在这些情况下，APEX 提供了一个“选项对话框按钮”，如图 A-13 中的“模板选项”和“目标页面”所示。点击包含文本的灰色框会生成一个对话框，为相关属性提供选项。图
    A-14 是按钮的“模板选项”对话框示例。


    ![A978-1-4842-0466-5_17_Fig14_HTML.jpg](img/A978-1-4842-0466-5_17_Fig14_HTML.jpg)

    *图 A-14. 按钮的“模板选项”对话框示例*


    ![A978-1-4842-0466-5_17_Fig13_HTML.jpg](img/A978-1-4842-0466-5_17_Fig13_HTML.jpg)

    *图 A-13. 带有“选项对话框按钮”的“模板选项”和“目标”属性*'
- fmt: "## Code Editor\n\n对于需要SQL、PL/SQL或大量静态文本的属性，APEX提供了代码编辑器控件。如图[A-15](#A978-1-4842-0466-5_17_Chapter.html#Fig15)所示，该控件在一个相对较小的文本区域中显示代码，但提供了一个按钮可将文本区域展开为完整的代码编辑器，如图[A-16](#A978-1-4842-0466-5_17_Chapter.html#Fig16)所示。\n\
    \n![A978-1-4842-0466-5_17_Fig16_HTML.jpg](A978-1-4842-0466-5_17_Fig16_HTML.jpg)\n\
    *图 A-16. 代码编辑器对话框示例*\n\n![A978-1-4842-0466-5_17_Fig15_HTML.jpg](A978-1-4842-0466-5_17_Fig15_HTML.jpg)\n\
    *图 A-15. 报表的SQL查询属性，右上角显示代码编辑器按钮*\n\n代码编辑器在对话框顶部包含一个工具栏。图[A-17](#A978-1-4842-0466-5_17_Chapter.html#Fig17)展示了该工具栏并说明了每个图标的功能。\n\
    \n![A978-1-4842-0466-5_17_Fig17_HTML.jpg](A978-1-4842-0466-5_17_Fig17_HTML.jpg)\n\
    *图 A-17. 带图标说明的代码编辑器工具栏*\n\n大多数图标都相当直观，但为完整起见，其功能列举如下：\n\n*   `Undo`: 撤销对代码编辑器对话框中文本的最后一组更改。\n\
    *   `Redo`: 重新应用使用`Undo`按钮撤销的最后一次更改。\n*   `Find`: 在工具栏下方显示一个区域，允许开发人员搜索代码编辑器对话框的内容。搜索选项包括`Match\
    \ Case`（区分大小写）和`Regular Expression`（正则表达式）。\n*   `Replace`: 在工具栏下方显示一个区域，允许开发人员搜索代码编辑器的内容，并用另一个字符串替换找到的搜索字符串。搜索选项包括`Match\
    \ Case`和`Regular Expression`。替换选项包括`Replace`（替换）、`Replace All`（全部替换）和`Skip`（跳过）。\n\
    *   `Query Builder`: 打开一个新窗口，其中包含拖放查询生成器（参见[第4章](#A978-1-4842-0466-5_4_Chapter.html)）。它仅对需要SQL查询的代码编辑器对话框显示。\n\
    *   `Auto Complete`: 在编辑代码编辑器中的文本时提供上下文相关的自动完成功能。在编辑SQL或PL/SQL时，`Auto Complete`为当前“解析为”模式中的数据库对象以及Oracle定义的函数和保留字提供自动补全。在编辑HTML文本时，`Auto\
    \ Complete`提供HTML标签方面的辅助。\n*   `Validate`: 在编辑SQL或PL/SQL时，`Validate`将解析提供的代码以查找语法错误。如果遇到语法错误，错误将通过错误消息在错误行之前的代码行内联指示。如果未发现错误，则在对话框顶部显示“验证成功”消息。\n\
    *   `Settings`: 提供一组特定于对话框的设置，这些设置将在每个特定用户的多个用户会话中被记住：\n    *   `Use Plain Text\
    \ Editor`: 从语法高亮编辑器切换到纯文本编辑器。\n    *   `Tab Inserts Spaces`: 选中并按下`Tab`键时，编辑器将放置固定数量的空格而不是制表符。取消选中时，将使用制表符。\n\
    \    *   `Tab Size`: 当启用上一个选项时，用于替换制表符的空格数。\n    *   `Indent Size`: 为支持自动缩进的语言（如JavaScript）设置自动缩进大小。\n\
    \    *   `Themes`: 将多种不同视觉主题中的一种应用于代码编辑器。新主题在设置被确认且再次选择代码编辑器后才会可见。\n    *   `Show\
    \ Line Numbers`: 选中时，代码左侧将添加一个带行号的边栏。\n    *   `Show Ruler`: 选中时，代码编辑器内会在第80个字符标记处出现一条虚线。\n\
    \n## Gallery\n\nGallery窗格直接显示在Central窗格下方，提供了一个可用于在网格布局中构建页面的组件和控件面板。该窗格具有三种类型的组件，可通过左上角的按钮进行选择，如图[A-18](#A978-1-4842-0466-5_17_Chapter.html#Fig18)所示。\n\
    \n![A978-1-4842-0466-5_17_Fig18_HTML.jpg](A978-1-4842-0466-5_17_Fig18_HTML.jpg)\n\
    *图 A-18. 显示部分可用区域类型的Gallery窗格*\n\n默认情况下，仅显示当前用户界面支持的控件和组件。单击右上角的`Action Menu`，您可以选择显示不受支持的组件，使用这些组件需“自担风险”。其中一些组件被视为实验性的，并非在所有浏览器中都能工作。\n\
    \n每个组件都可以通过简单地拖放到适当区域来放置到网格布局中。将项目拖入位置时，黄色背景将指示可以放置对象的区域。当您将鼠标悬停在放置区域上时，黄色背景内会出现一个灰色框（参见图[A-6](#A978-1-4842-0466-5_17_Chapter.html#Fig6)），指示对象将被放置的位置。\n\
    \n您也可以右键单击组件并使用上下文菜单来放置项目。“添加到”上下文菜单选项允许您使用页面结构的分层菜单表示来选择放置项目的位置。\n\n## Keyboard\
    \ Shortcuts\n\n新页面设计器的另一个好处是引入了一组用于执行常见任务的键盘快捷键。表[A-1](#A978-1-4842-0466-5_17_Chapter.html#Tab1)显示了PC/Linux和Macintosh系统的键盘快捷键。\n\
    \n*表 A-1. 页面设计器中可用键盘快捷键列表*\n\n| Function | PC/Linux | Macintosh |\n| --- | ---\
    \ | --- |\n| Save | Ctrl+Alt+S | Ctrl+Option+S |\n| Save and Run Page | Ctrl+Alt+R\
    \ | Ctrl+Option+R |\n| Undo | Ctrl+Z | Ctrl+Z |\n| Redo | Ctrl+Y | Ctrl+Y |\n\
    | Go to Rendering | Alt+1 | Option+1 |\n| Go to Dynamic Actions | Alt+2 | Option+2\
    \ |\n| Go to Processing | Alt+3 | Option+3 |\n| Go to Page Shared Components |\
    \ Alt+4 | Option+4 |\n| Go to Grid Layout | Alt+5 | Option+5 |\n| Go to Property\
    \ Editor | Alt+6 | Option+6 |\n| Go to Gallery Regions | Alt+7 | Option+7 |\n\
    | Go to Gallery Items | Alt+8 | Option+8 |\n| Go to Gallery Buttons | Alt+9 |\
    \ Option+9 |\n| Display From Here | Ctrl+Alt+D | Ctrl+Option+D |\n| Display From\
    \ Page | Ctrl+Alt+T | Ctrl+Option+T |\n| Restore/Expand | Alt+F11 | Option+F11\
    \ |\n| Toggle Hide Empty Positions | Ctrl+Alt+E | Ctrl+Option+E |\n| Go to Help\
    \ | Alt+F1 | Option+F1 |\n| Go to Messages | Ctrl+F1 | Ctrl+F1 |\n| Page Search\
    \ | Ctrl+Alt+F | Ctrl+Option+F |\n| Keyboard Shortcuts | Alt+Shift+F1 | Option+Shift+F1\
    \ |\n\n注意\n某些平台（尤其是Mac）可能已经存在键盘映射，可能会干扰本表中概述的组合键功能。如果任何功能未按预期工作，请检查操作系统级别是否存在任何冲突的快捷键。\n\
    \n## Summary\n\n尽管关于新的页面设计器有很多需要学习的内容，但我相信在花些时间熟悉其布局和功能后，开发APEX应用程序将成为一项更加高效的事业。我强烈建议您在深入阅读本书的开发章节之前，花些时间熟悉本附录的内容。请记住，如果您以后遇到困难，随时可以回到本附录进行参考。"
  raw: "#### Code Editor\n\nFor attributes requiring SQL, PL/SQL, or large amounts\
    \ of static text, APEX provides a Code Editor control. As shown in Figure [A-15](#A978-1-4842-0466-5_17_Chapter.html#Fig15),\
    \ the control shows the code in a relatively small text area but provides a button\
    \ to expand the text area into the full Code Editor, as shown in Figure [A-16](#A978-1-4842-0466-5_17_Chapter.html#Fig16).\n\
    \n![A978-1-4842-0466-5_17_Fig16_HTML.jpg](A978-1-4842-0466-5_17_Fig16_HTML.jpg)\n\
    \nFigure A-16.\n\nExample Code Editor dialogue\n\n![A978-1-4842-0466-5_17_Fig15_HTML.jpg](A978-1-4842-0466-5_17_Fig15_HTML.jpg)\n\
    \nFigure A-15.\n\nThe SQL Query attribute of a report with the Code Editor button\
    \ in the upper right\n\nThe Code Editor contains a toolbar across the top of the\
    \ dialogue. Figure [A-17](#A978-1-4842-0466-5_17_Chapter.html#Fig17) shows the\
    \ toolbar and indicates the function of each of its icons.\n\n![A978-1-4842-0466-5_17_Fig17_HTML.jpg](A978-1-4842-0466-5_17_Fig17_HTML.jpg)\n\
    \nFigure A-17.\n\nThe Code Editor toolbar with icon explanations\n\nMost of the\
    \ icons are fairly self-explanatory, but for completeness their functionality\
    \ is listed below:\n\n*   Undo: Rolls back the last set of changes to the text\
    \ in the Code Editor dialogue.\n*   Redo: Reapplies the last change that was rolled\
    \ back using the Undo button.\n*   Find: Displays a region below the toolbar allowing\
    \ the developer to search the contents of the Code Editor dialogue. Search options\
    \ include Match Case and Regular Expression.\n*   Replace: Displays a region below\
    \ the toolbar allowing the developer to sear the contents of the Code Editor and\
    \ replace occurrences of the found search string with another string. Search options\
    \ include Match Case and Regular Expression. Replace options include Replace,\
    \ Replace All, and Skip.\n*   Query Builder: Opens a new window with the Drag\
    \ & Drop Query builder (See [Chapter 4](#A978-1-4842-0466-5_4_Chapter.html)).\
    \ It only displays for Code Editor dialogues expecting a SQL query.\n*   Auto\
    \ Complete: Provides context-sensitive Auto Complete functionality while editing\
    \ the text in the Code Editor. When editing SQL or PL/SQL, Auto Complete provides\
    \ autocomplete for database objects in the current “parse as” schema as well as\
    \ Oracle-defined functions and reserved words. When editing HTML text, Auto Complete\
    \ provides assistance with HTML tags.\n*   Validate: When editing SQL or PL/SQL,\
    \ Validate will parse the code provided for syntax errors. If a syntax error is\
    \ encountered, the error is indicated by an error message inline with the code\
    \ prior to the line with the error. If no errors are found, a “Validation Successful”\
    \ message is displayed at the top of the dialogue.\n*   Settings: Provides a set\
    \ of dialogue-specific settings that will be remembered across user sessions for\
    \ each specific user:\n    *   Use Plain Text Editor: Switches from the syntax-highlighting\
    \ editor to a plain text editor.\n    *   Tab Inserts Spaces: When selected and\
    \ the Tab key is pressed, the editor will place a fixed number of spaces instead\
    \ of a tab character. When deselected, a tab character will be used.\n    *  \
    \ Tab Size: Number of spaced to be used to replace a tab character when the previous\
    \ option is enabled.\n    *   Indent Size: Sets the auto-indent size for languages\
    \ (such as JavaScript) that support auto indenting.\n    *   Themes: Applies one\
    \ of a number of different visual themes to the Code Editor. The new theme will\
    \ not be visible until the setting is OK’ed and the Code Editor selected again.\n\
    \    *   Show Line Numbers: When selected, a gutter with line numbers will be\
    \ added to the left-hand side of the code.\n    *   Show Ruler: When selected,\
    \ a dotted line appears at the eighty-character mark within the Code Editor.\n\
    \n## Gallery\n\nThe Gallery Pane displays directly below the Central Pane and\
    \ provides a palette of components and controls that can be used to build the\
    \ page in the Grid Layout. The pane has three types of components selectable via\
    \ the buttons at the top left, as shown in Figure [A-18](#A978-1-4842-0466-5_17_Chapter.html#Fig18).\n\
    \n![A978-1-4842-0466-5_17_Fig18_HTML.jpg](A978-1-4842-0466-5_17_Fig18_HTML.jpg)\n\
    \nFigure A-18.\n\nThe Gallery Pane showing some of the available region types\n\
    \nBy default, only controls and components that are supported in the current user\
    \ interface are displayed. Clicking on the Action Menu in the upper right, you\
    \ can opt to show unsupported components that are to be used “at your own risk.”\
    \ Some of these components are considered experimental and may not work in all\
    \ browsers.\n\nEach component can be placed into the Grid Layout by simply dragging\
    \ and dropping the component into the appropriate area. When dragging items into\
    \ position, a yellow background will indicate the areas where the object may be\
    \ dropped. As you hover over a placement area, a grey box will appear within the\
    \ yellow background (refer to Figure [A-6](#A978-1-4842-0466-5_17_Chapter.html#Fig6))\
    \ indicating where the object will be dropped.\n\nYou may also right-click on\
    \ a component and use the context menu to place an item. The Add To context menu\
    \ option allows you to select where to place the item using a layered menu representation\
    \ of the page structure.\n\n## Keyboard Shortcuts\n\nAnother benefit of the new\
    \ Page Designer is the introduction of a set of keyboard shortcuts to perform\
    \ common tasks. Table [A-1](#A978-1-4842-0466-5_17_Chapter.html#Tab1) shows the\
    \ keyboard shortcuts for both PC/Linux and Macintosh systems.\n\nTable A-1.\n\n\
    A List of Keyboard Shortcuts Available in the Page Designer\n\n| Function | PC/Linux\
    \ | Macintosh |\n| --- | --- | --- |\n| Save | Ctrl+Alt+S | Ctrl+Option+S |\n\
    | Save and Run Page | Ctrl+Alt+R | Ctrl+Option+R |\n| Undo | Ctrl+Z | Ctrl+Z |\n\
    | Redo | Ctrl+Y | Ctrl+Y |\n| Go to Rendering | Alt+1 | Option+1 |\n| Go to Dynamic\
    \ Actions | Alt+2 | Option+2 |\n| Go to Processing | Alt+3 | Option+3 |\n| Go\
    \ to Page Shared Components | Alt+4 | Option+4 |\n| Go to Grid Layout | Alt+5\
    \ | Option+5 |\n| Go to Property Editor | Alt+6 | Option+6 |\n| Go to Gallery\
    \ Regions | Alt+7 | Option+7 |\n| Go to Gallery Items | Alt+8 | Option+8 |\n|\
    \ Go to Gallery Buttons | Alt+9 | Option+9 |\n| Display From Here | Ctrl+Alt+D\
    \ | Ctrl+Option+D |\n| Display From Page | Ctrl+Alt+T | Ctrl+Option+T |\n| Restore/Expand\
    \ | Alt+F11 | Option+F11 |\n| Toggle Hide Empty Positions | Ctrl+Alt+E | Ctrl+Option+E\
    \ |\n| Go to Help | Alt+F1 | Option+F1 |\n| Go to Messages | Ctrl+F1 | Ctrl+F1\
    \ |\n| Page Search | Ctrl+Alt+F | Ctrl+Option+F |\n| Keyboard Shortcuts | Alt+Shift+F1\
    \ | Option+Shift+F1 |\n\nNote\n\nSome platforms (especially Mac) may already have\
    \ keyboard mappings in place that might interfere with the function of the key\
    \ combinations outlined in this table. If any of the functionality doesn’t work\
    \ as expected, check to see if there are any conflicting shortcuts already in\
    \ place at the Operating System level.\n\n## Summary\n\nWhile there is a lot to\
    \ learn about the new Page Designer, after spending some time getting familiar\
    \ with its layout and functionality I believe that developing APEX applications\
    \ will become a much more efficient endeavor. I urge you to spend some time familiarizing\
    \ yourself with the contents of this appendix before you delve deeply into the\
    \ development chapters of this book. Remember, you can always come back and reference\
    \ this appendix if you ever get lost."
  trans: "\n## 代码编辑器\n\n对于需要 SQL、PL/SQL 或大量静态文本的属性，APEX 提供了代码编辑器控件。如图 A-15 所示，该控件在一个相对较小的文本区域中显示代码，但提供了一个按钮可将文本区域展开为完整的代码编辑器，如图\
    \ A-16 所示。\n\n![A978-1-4842-0466-5_17_Fig16_HTML.jpg](img/A978-1-4842-0466-5_17_Fig16_HTML.jpg)\n\
    *图 A-16. 代码编辑器对话框示例*\n\n![A978-1-4842-0466-5_17_Fig15_HTML.jpg](img/A978-1-4842-0466-5_17_Fig15_HTML.jpg)\n\
    *图 A-15. 报表的 SQL 查询属性，右上角显示代码编辑器按钮*\n\n代码编辑器在对话框顶部包含一个工具栏。图 A-17 展示了该工具栏并说明了每个图标的功能。\n\
    \n![A978-1-4842-0466-5_17_Fig17_HTML.jpg](img/A978-1-4842-0466-5_17_Fig17_HTML.jpg)\n\
    *图 A-17. 带图标说明的代码编辑器工具栏*\n\n大多数图标都相当直观，但为完整起见，其功能列举如下：\n\n*   `Undo`: 撤销对代码编辑器对话框中文本的最后一组更改。\n\
    *   `Redo`: 重新应用使用`Undo`按钮撤销的最后一次更改。\n*   `Find`: 在工具栏下方显示一个区域，允许开发人员搜索代码编辑器对话框的内容。搜索选项包括`Match\
    \ Case`（区分大小写）和`Regular Expression`（正则表达式）。\n*   `Replace`: 在工具栏下方显示一个区域，允许开发人员搜索代码编辑器的内容，并用另一个字符串替换找到的搜索字符串。搜索选项包括`Match\
    \ Case`和`Regular Expression`。替换选项包括`Replace`（替换）、`Replace All`（全部替换）和`Skip`（跳过）。\n\
    *   `Query Builder`: 打开一个新窗口，其中包含拖放查询生成器（参见第 4 章）。它仅对需要 SQL 查询的代码编辑器对话框显示。\n*\
    \   `Auto Complete`: 在编辑代码编辑器中的文本时提供上下文相关的自动完成功能。在编辑 SQL 或 PL/SQL 时，`Auto Complete`为当前“解析为”模式中的数据库对象以及\
    \ Oracle 定义的函数和保留字提供自动补全。在编辑 HTML 文本时，`Auto Complete`提供 HTML 标签方面的辅助。\n*   `Validate`:\
    \ 在编辑 SQL 或 PL/SQL 时，`Validate`将解析提供的代码以查找语法错误。如果遇到语法错误，错误将通过错误消息在错误行之前的代码行内联指示。如果未发现错误，则在对话框顶部显示“验证成功”消息。\n\
    *   `Settings`: 提供一组特定于对话框的设置，这些设置将在每个特定用户的多个用户会话中被记住：\n    *   `Use Plain Text\
    \ Editor`: 从语法高亮编辑器切换到纯文本编辑器。\n    *   `Tab Inserts Spaces`: 选中并按下`Tab`键时，编辑器将放置固定数量的空格而不是制表符。取消选中时，将使用制表符。\n\
    \    *   `Tab Size`: 当启用上一个选项时，用于替换制表符的空格数。\n    *   `Indent Size`: 为支持自动缩进的语言（如\
    \ JavaScript）设置自动缩进大小。\n    *   `Themes`: 将多种不同视觉主题中的一种应用于代码编辑器。新主题在设置被确认且再次选择代码编辑器后才会可见。\n\
    \    *   `Show Line Numbers`: 选中时，代码左侧将添加一个带行号的边栏。\n    *   `Show Ruler`: 选中时，代码编辑器内会在第\
    \ 80 个字符标记处出现一条虚线。\n\n## 画廊\n\n画廊窗格直接显示在中央窗格下方，提供了一个可用于在网格布局中构建页面的组件和控件面板。该窗格具有三种类型的组件，可通过左上角的按钮进行选择，如图\
    \ A-18 所示。\n\n![A978-1-4842-0466-5_17_Fig18_HTML.jpg](img/A978-1-4842-0466-5_17_Fig18_HTML.jpg)\n\
    *图 A-18. 显示部分可用区域类型的画廊窗格*\n\n默认情况下，仅显示当前用户界面支持的控件和组件。单击右上角的`操作菜单`，您可以选择显示不受支持的组件，使用这些组件需“自担风险”。其中一些组件被视为实验性的，并非在所有浏览器中都能工作。\n\
    \n每个组件都可以通过简单地拖放到适当区域来放置到网格布局中。将项目拖入位置时，黄色背景将指示可以放置对象的区域。当您将鼠标悬停在放置区域上时，黄色背景内会出现一个灰色框（参见图\
    \ A-6），指示对象将被放置的位置。\n\n您也可以右键单击组件并使用上下文菜单来放置项目。“添加到”上下文菜单选项允许您使用页面结构的分层菜单表示来选择放置项目的位置。\n\
    \n## 键盘快捷键\n\n新页面设计器的另一个好处是引入了一组用于执行常见任务的键盘快捷键。表 A-1 显示了 PC/Linux 和 Macintosh\
    \ 系统的键盘快捷键。\n\n*表 A-1. 页面设计器中可用键盘快捷键列表*\n\n| 功能 | PC/Linux | Macintosh |\n| ---\
    \ | --- | --- |\n| 保存 | Ctrl+Alt+S | Ctrl+Option+S |\n| 保存并运行页面 | Ctrl+Alt+R |\
    \ Ctrl+Option+R |\n| 撤销 | Ctrl+Z | Ctrl+Z |\n| 重做 | Ctrl+Y | Ctrl+Y |\n| 转到渲染\
    \ | Alt+1 | Option+1 |\n| 转到动态操作 | Alt+2 | Option+2 |\n| 转到处理 | Alt+3 | Option+3\
    \ |\n| 转到页面共享组件 | Alt+4 | Option+4 |\n| 转到网格布局 | Alt+5 | Option+5 |\n| 转到属性编辑器\
    \ | Alt+6 | Option+6 |\n| 转到画廊区域 | Alt+7 | Option+7 |\n| 转到画廊项 | Alt+8 | Option+8\
    \ |\n| 转到画廊按钮 | Alt+9 | Option+9 |\n| 从此处显示 | Ctrl+Alt+D | Ctrl+Option+D |\n|\
    \ 从此页面显示 | Ctrl+Alt+T | Ctrl+Option+T |\n| 还原/展开 | Alt+F11 | Option+F11 |\n| 切换隐藏空位置\
    \ | Ctrl+Alt+E | Ctrl+Option+E |\n| 转到帮助 | Alt+F1 | Option+F1 |\n| 转到消息 | Ctrl+F1\
    \ | Ctrl+F1 |\n| 页面搜索 | Ctrl+Alt+F | Ctrl+Option+F |\n| 键盘快捷键 | Alt+Shift+F1 |\
    \ Option+Shift+F1 |\n\n注意\n某些平台（尤其是 Mac）可能已经存在键盘映射，可能会干扰本表中概述的组合键功能。如果任何功能未按预期工作，请检查操作系统级别是否存在任何冲突的快捷键。\n\
    \n## 总结\n\n尽管关于新的页面设计器有很多需要学习的内容，但我相信在花些时间熟悉其布局和功能后，开发 APEX 应用程序将成为一项更加高效的事业。我强烈建议您在深入阅读本书的开发章节之前，花些时间熟悉本附录的内容。请记住，如果您以后遇到困难，随时可以回到本附录进行参考。\n"
