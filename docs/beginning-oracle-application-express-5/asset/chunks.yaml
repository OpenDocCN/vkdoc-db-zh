    # 17. 页面设计器演练与参考


    在 `APEX` 5.0 之前的版本中，影响工作效率的一个挑战是：在修改任何属性之前，需要先深入到要编辑的具体项中。这意味着需要学习这些项在 `树形视图`、上下文菜单和实际编辑屏幕中的位置。同时也意味着，在页面上编辑多个项目可能相当繁琐。


    `APEX` 5.0 彻底重新设计了构建和编辑页面的流程。作为 `APEX` 4.0 一部分引入的、大家熟悉的 `树形视图` 已被弃用，取而代之的是新的 `页面设计器`。你不再需要深入到单独的页面去编辑各个项目——现在一切都在一个页面上完成。


    虽然这可能意味着生产力的巨大飞跃，但起初可能会让人望而生畏，特别是对于我们这些已经花费大量时间熟悉 `APEX` 4.0 方法的人来说。


    本节将带你逐个部分地了解新的 `页面设计器`，并介绍本书中用来指代其各个部分和功能的术语。如果你试图记住某个功能的位置，或者想知道某个特定按钮或项目的作用，这里也是一个很好的参考地方。


    ## 页面设计器概述


    虽然新的 `页面设计器` 看起来与之前 `APEX` 版本的处理方式大相径庭，但它实际上是一个经过验证的设计。只需想想 `Visual Studio`、`Eclipse`、`NetBeans`
    以及市场上众多的其他 `IDE` 即可。它们都遵循非常相似的设计模式，新的 `APEX 5.0` `页面设计器` 正是以此为模型设计的。


    图 A-1 展示了正在编辑 `示例数据库应用` 第 1 页的 `页面设计器`。


    ![A978-1-4842-0466-5_17_Fig1_HTML.jpg](img/A978-1-4842-0466-5_17_Fig1_HTML.jpg)

    图 A-1. `APEX 5.0` `页面设计器`


    `页面设计器` 被划分为五个主要区域，如图 A-1 中的数字所示：


    -   `页面设计器工具栏` – 位于 `页面设计器` 顶部，用于访问页面级别的活动。

    -   `树形窗格` – 显示一组选项卡，允许访问 `渲染`、`动态操作`、`处理` 和 `共享组件`。

    -   `中央窗格` – 提供对布局、消息、页面级搜索和上下文相关帮助的访问。

    -   `属性编辑器` – 允许编辑页面上所选项的属性。

    -   `组件库` – 提供对 `APEX` 中可用的不同区域、项和按钮类型的访问。


    你可能会注意到的一点是，在笔记本电脑等较小的屏幕上，界面可能看起来相当拥挤。你可以通过点击并拖动各区域之间的分隔条来调整各区域的大小，并且可以通过点击图 A-1
    中指示的小三角图标来切换区域的可见性。不过，如果你像我一样，可能会希望在有更多空间的显示器上完成大部分工作，以便将窗格拉伸到更舒适、可读性更好的大小。


    现在，让我们更深入地探索五个主要部分。


    ## 页面设计器工具栏


    图 A-2 展示了 `页面设计器` 工具栏，它旨在让你能够访问多个页面级别的活动。


    ![A978-1-4842-0466-5_17_Fig2_HTML.jpg](img/A978-1-4842-0466-5_17_Fig2_HTML.jpg)

    图 A-2. `页面设计器` 工具栏


    在左侧，你会看到 `APEX` 面包屑导航，告诉你当前正在编辑哪个应用，并且你当前位于 `页面设计器`。从左到右依次是各个控件。将鼠标悬停在每个控件上会显示一个工具提示，其中包含描述，在某些情况下还包含有关该控件的更多信息。

    '
- fmt: '## Page Finder


    单击下拉菜单会打开“页面查找器”对话框，允许您选择要编辑的页面。您也可以直接输入页码并单击 `Go` 按钮导航到该页。如果您尝试离开当前页面，且存在任何未保存的更改，`APEX`
    将询问您是否要放弃这些更改并继续。


    ## Page Locking


    此处显示的挂锁图标指示当前页面的锁定状态。如果页面已解锁，挂锁图标显示为打开状态；如果已锁定，挂锁图标将显示为关闭状态。单击该图标将切换锁定状态并将当前用户指定为该锁的所有者。锁定页面时，系统将要求您提供锁定注释，该注释将显示给访问该页面的其他用户。


    ## Undo


    这会回滚对一个或多个项目的最近一次更改。将鼠标悬停在图标上将指示将被回滚的更改。


    ## Redo


    这会重新应用对一个或多个项目的最近一次更改。将鼠标悬停在图标上将指示将被重新应用的更改。


    ## Create


    此下拉菜单提供对多种 `APEX` 对象的创建访问权限。`Create` 菜单提供以下选项：


    ### Page


    启动“创建页面”向导。


    ### Page as Copy


    启动“复制页面”向导。


    ### Form Region


    启动“创建表单”向导。


    ### Report Region


    启动“创建报表区域”向导。


    ### Page Component


    打开一个帮助对话框，概述在 `APEX 5.0` 中创建页面组件的方式。


    ### Shared Component


    启动“创建应用程序组件”向导。


    ### Page Group


    导航到 `APEX` 中的“创建页面组”页面。


    ### Developer Comment


    打开“开发者注释”对话框。在这里，您可以针对当前页面或一组页面输入和查看注释。


    ### Team Development


    提供一个子菜单，允许在团队开发工具中创建功能、错误和待办事项。


    ## Utilities


    此下拉菜单提供对多个页面相关实用工具的访问。`Utilities` 菜单提供以下选项：


    ### Delete page


    允许您删除当前页面。选择此选项后显示的对话框允许您确认删除，并决定是否要级联删除到任何相关的列表条目，同时显示您将删除的页面内容。


    ### Advisor


    打开一个新浏览器窗口，显示 `APEX Advisor` 并选择当前页面进行处理。从这里，您可以对应用程序或特定页面执行检查，包括查找错误、安全问题、质量保证问题和其他最佳实践。


    ### Caching


    导航到当前页面的缓存仪表板。从这里您可以管理当前页面的页面和区域缓存。


    ### Attribute Dictionary


    导航到当前页面的属性字典仪表板。从这里您可以从属性字典更新当前页面，或使用当前页面更新属性字典。


    ### History


    导航到针对当前页面和应用程序所做的历史更改报告。该报告显示所做的更改以及进行更改的开发者。


    ### Export


    启动“导出页面”向导，允许在进行更改之前将应用程序的单个页面导出为备份，或在实例之间传输。


    ### Cross-Page Utilities


    导航到一组可在多个页面中使用的页面。


    ### Application Utilities


    导航到一组应用程序级别的实用工具。


    ### Page Groups


    导航到“页面组”管理和分配页面。


    ### Upgrade Application


    导航到“应用程序升级”报告和向导。在这里，您可以查看应用程序的哪些元素可能从升级到 `APEX 5.0` 提供的最新功能中受益。


    ## Component View


    从“页面设计器视图”切换到“组件视图”，该视图自早期 `APEX` 版本起就已可用。


    ## Team Development


    此下拉菜单提供对“团队开发”模块功能的访问权限，并且仅当工作区内启用了团队开发时才会显示。`Team Development` 菜单提供以下选项：


    ### Features


    导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成功能。


    ### To Dos


    导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成待办事项。


    ### Bugs


    导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成错误。


    ### Feedback


    导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未处理反馈。


    ## Developer Comments


    启动一个对话框，可以在其中针对当前页面创建开发者注释、错误或待办事项。


    ## Shared Components


    导航到 `APEX` 的“共享组件”页面，提供对所有应用程序级别共享组件的访问权限。


    ## Save


    保存当前页面上任何未保存的更改。


    ## Save & Run


    保存当前页面上任何未保存的更改，然后运行该页面。'
  raw: "*   Page Finder: Clicking on the pull-down menu opens the Page Finder dialogue,\
    \ allowing you to select a page to edit. You may also enter the page number directly\
    \ and click the Go button to navigate to that page. If you attempt to navigate\
    \ away from the current page, and there are any unsaved changes, APEX will ask\
    \ if you would like to discard those changes and continue.\n*   Page Locking:\
    \ The padlock icon displayed here indicates the locking state for the current\
    \ page. If the page is unlocked, the padlock icon appears to be opened; if locked,\
    \ the padlock icon will appear closed. Clicking on the icon will toggle the locking\
    \ state and assign the current user as the owner of that lock. When locking a\
    \ page, you will be asked to provide a lock comment that will display to other\
    \ users who access the page.\n*   Undo: This rolls back the last change(s) to\
    \ an item or set of items. Hovering over the icon will indicate the change(s)\
    \ that will be rolled back.\n*   Redo: This reapplies the last change(s) to an\
    \ item or set of items. Hovering over the icon will indicate the change(s) that\
    \ will be reapplied.\n*   Create: This pull-down menu provides access so that\
    \ you can create one of a number of APEX objects. The following options are provided\
    \ as part of the Create menu:\n    *   Page: Initiates the Create a Page wizard\n\
    \    *   Page as Copy: Initiates the Copy Page wizard\n    *   Form Region: Initiates\
    \ the Create Form wizard\n    *   Report Region: Initiates the Create Report Region\
    \ wizard\n    *   Page Component: Opens a help dialogue that outlines the ways\
    \ page components can be created in APEX 5.0\n    *   Shared Component: Initiates\
    \ the Create Application Component wizard\n    *   Page Group: Navigates to the\
    \ Create Page Group page in APEX\n    *   Developer Comment: Opens the Developer\
    \ Comments dialogue. Here, you can enter and view comments against the current\
    \ page or a set of pages.\n    *   Team Development: Provides a sub-menu allowing\
    \ the creation of Features, Bugs, and To Dos in the team-development tool.\n*\
    \   Utilities: This pull-down menu provides access to a number of page-related\
    \ utilities. The following options are provided as part of the Utilities menu:\n\
    \    *   Delete page: Allows you to delete the current page. The dialogue that\
    \ is displayed upon selecting this option allows you to confirm the deletion and\
    \ to decide whether or not you wish to cascade that delete to any related list\
    \ entries, as well as shows you the contents of the page you will be deleting.\n\
    \    *   Advisor: Opens a new browser window displaying the APEX Advisor and selects\
    \ the current page for processing. From here you may perform checks on either\
    \ your application or a specific page, including looking for errors, security\
    \ issues, QA issues, and other best practices.\n    *   Caching: Navigates to\
    \ the Caching Dashboard for the current page. From here you can manage the page-\
    \ and region-caching that is active for the current page.\n    *   Attribute Dictionary:\
    \ Navigates to the Attribute Dictionary Dashboard for the current page. From here\
    \ you can update the current page from the Attribute Dictionary or use the current\
    \ page to update the Attribute Dictionary.\n    *   History: Navigates to a report\
    \ of historical changes that have been made to the current page and application.\
    \ The report shows the changes made and the developer who made the changes.\n\
    \    *   Export: Initiates the Export Page wizard, allowing for the export of\
    \ a single page of the application as a backup prior to making changes, or to\
    \ transfer from one instance to another.\n    *   Cross-Page Utilities: Navigates\
    \ to a set of pages that can be used across multiple pages.\n    *   Application\
    \ Utilities: Navigates to a set of application-level utilities.\n    *   Page\
    \ Groups: Navigates to the Page Groups management and assignment page.\n    *\
    \   Upgrade Application: Navigates to the Application Upgrade report and wizard.\
    \ Here you can see which elements of an application could potentially benefit\
    \ from upgrading functionality to the latest provided by APEX 5.0\n*   Component\
    \ View: Switches from the Page Designer View to the Component View, which has\
    \ been available since early versions of APEX.\n*   Team Development: This pull-down\
    \ menu provides access to the features of the Team Development module and will\
    \ only appear if Team Development is enabled within the workspace. The following\
    \ options are provided as part of the Team Development menu:\n    *   Features:\
    \ Navigates to the Team Development module and displays a report that is filtered\
    \ to show incomplete Features for the current page.\n    *   To Dos: Navigates\
    \ to the Team Development module and displays a report filtered to show incomplete\
    \ To Do items for the current page.\n    *   Bugs: Navigates to the Team Development\
    \ module and displays a report filtered to show incomplete bugs for the current\
    \ page.\n    *   Feedback: Navigates to the Team Development module and displays\
    \ a report filtered to show unhandled feedback for the current page.\n*   Developer\
    \ Comments: Initiates a dialogue where developer comments, bugs, or to do items\
    \ can be created against the current page.\n*   Shared Components: Navigates to\
    \ the Shared Components page of APEX, providing access to all application-level\
    \ shared components.\n*   Save: Saves any outstanding changes on the current page\n\
    *   Save & Run: Saves any outstanding changes on the current page and then runs\
    \ the page."
