- fmt: '# 16. Dynamic Actions


    电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-0466-5_​16](http://dx.doi.org/10.1007/978-1-4842-0466-5_16)）包含补充材料，可供授权用户使用。


    近年来APEX版本引入的最令人兴奋的功能之一是动态操作，它提供了以声明方式定义复杂客户端行为的能力，例如验证、高亮显示、警报、设置页面值等，而无需手工编写大量JavaScript代码。


    自引入以来，动态操作已得到显著扩展，提供了更强大的声明式灵活性和功能性。这有助于开发者摆脱传统的服务器端脚本模型，通过在浏览器上执行动态操作逻辑，而不是产生到服务器的往返请求。


    动态操作与手动编写的JavaScript一样是事件驱动的。但APEX使用提供的声明式信息来生成所需的JavaScript代码，并在运行时实现。本章将研究和实现一系列不同的动态操作，以便您感受它们能实现什么。


    ## Dynamic Action Benefits


    使用声明式动态操作而非手工编码JavaScript的一个主要优势是，动态操作能够理解并利用APEX核心对象，如区域（regions）和项（items），从而便于引用和操作。使用声明式逻辑的另一个好处是，当您选择升级到APEX的下一个版本时，围绕动态操作的框架将确保任何生成的代码都与新版本的APEX兼容。


    但除了APEX声明式本质的基础优势之外，动态操作让您能够编写非常复杂的客户端操作，而无需学习一门全新的技术来实现。事实上，您很可能仅使用动态操作向导、SQL和PL/SQL就能完成超过80%所需的功能编码。


    然而，由于JavaScript是编写浏览器交互性的事实标准，您也很可能在某个时候被迫学习一点JavaScript。学习JavaScript超出了本书的范围。毕竟，您购买本书是为了学习APEX。但如果您确实想了解更多关于JavaScript的知识，Apress有几本关于该主题的优秀书籍。


    ## Breaking Down Dynamic Actions


    在最初的形式中，动态操作分为两类：标准（standard）和高级（advanced）。这两类之间的唯一真正区别是相关向导允许您实现什么。在底层，两种动态操作类型是相同的，一旦您离开向导，所有选项都对您开放。较新版本的APEX（包括5.0）已经摒弃了这种人为的划分。动态操作的定义可以分解为以下组件：


    *   **Identification**：定义动态操作的名称及其执行顺序。

    *   **When**：定义操作何时触发。您可以选择事件、将参与触发操作的一个或多个对象，以及适用于该事件的任何条件。

    *   **Actions**：动态操作可以包含True和False动作集。如果为所选对象定义的事件发生，并且任何应用的条件评估为`TRUE`，则执行True动作集。如果为所选对象定义的事件发生，并且任何应用的条件评估为`FALSE`，则执行False动作集。

    *   **Affected elements**：识别页面上哪些对象受动态操作影响。


    与APEX的其他部分一样，动态操作支持条件、授权和构建选项功能。


    ## Dynamic Actions in the Help Desk Application


    动态操作的核心在于让您应用程序的用户界面更便于用户使用。在以下练习中，您将实现复杂度递增的动态操作，以使应用程序的界面更加健壮。


    ### Starting Simple


    在第一个练习中，您将编辑Help Desk应用程序第3页上的"Contact Us"表单。虽然该表单目前没有问题，但您被要求在用户输入"From"电子邮件地址字段之前，禁止在"Body"文本区域中输入内容。


    要创建一个动态操作来实现此目的，请按照以下步骤操作：


    编辑应用程序的第3页。右键单击`P3_FROM`项，然后从上下文菜单中选择“创建动态操作”。使用图[16-1](#A978-1-4842-0466-5_16_Chapter.html#Fig1)所示的菜单是创建动态操作的最直接方式。


    ![A978-1-4842-0466-5_16_Fig1_HTML.jpg](A978-1-4842-0466-5_16_Fig1_HTML.jpg)


    图16-1.

    使用鼠标右键快捷方式创建动态操作


    如图[16-2](#A978-1-4842-0466-5_16_Chapter.html#Fig2)所示，为动态操作的“名称”输入`Disable Email
    Body`。与其他组件一样，名称描述性越强，越容易识别。


    ![A978-1-4842-0466-5_16_Fig2_HTML.jpg](A978-1-4842-0466-5_16_Fig2_HTML.jpg)


    图16-2.

    为动态操作指定名称


    将“事件”保持设置为“Change”，并将“条件”设置为“is null”，如图[16-3](#A978-1-4842-0466-5_16_Chapter.html#Fig3)所示。


    ![A978-1-4842-0466-5_16_Fig3_HTML.jpg](A978-1-4842-0466-5_16_Fig3_HTML.jpg)


    图16-3.

    设置动态操作的“事件”和“条件”以执行


    在左侧的“渲染树”中，在“True”节点下单击“Show”操作（以红色突出显示），如图[16-4](#A978-1-4842-0466-5_16_Chapter.html#Fig4)所示。


    ![A978-1-4842-0466-5_16_Fig4_HTML.jpg](A978-1-4842-0466-5_16_Fig4_HTML.jpg)


    图16-4.

    选择默认的True操作以便编辑


    在“属性编辑器”中，为“操作”选择“Disable”，将“项”设置为`P3_BODY`，并将“页面加载时运行”设置为“是”，如图[16-5](#A978-1-4842-0466-5_16_Chapter.html#Fig5)所示。


    ![A978-1-4842-0466-5_16_Fig5_HTML.jpg](A978-1-4842-0466-5_16_Fig5_HTML.jpg)


    图16-5.

    设置True操作的详细信息


    在“渲染树”中，右键单击动态操作的“False”节点，然后从上下文菜单中选择“创建False操作”。在“属性编辑器”中，为“操作”选择“Enable”，将“选择类型”设置为“项”，将“项”设置为`P3_BODY`，并将“页面加载时运行”设置为“是”，如图[16-6](#A978-1-4842-0466-5_16_Chapter.html#Fig6)所示。


    ![A978-1-4842-0466-5_16_Fig6_HTML.jpg](A978-1-4842-0466-5_16_Fig6_HTML.jpg)


    图16-6.

    设置False操作的详细信息


    保存并运行该页面。


    回顾练习中的步骤，您创建了一个动态操作，该操作在项`P3_FROM`的“Change”事件触发时触发。您设置了条件，使得操作仅在`P3_FROM`为null时触发。操作设置为`Disable`，这会禁用一个项，使用户无法导航到它，并且您选择在页面加载时运行动态操作。这确保受影响的项在开始时是禁用的。您还创建了相反的False操作。当“Change”事件被触发且`P3_FROM`不为null时，此操作会启用该项。在True和False操作中，您都选择`P3_BODY`作为受影响的元素。这表明是`P3_BODY`根据`P3_FROM`项的状态被启用和禁用。


    运行第3页时，请注意，在您向"From"项中输入某些内容并导航离开之前，"Body"项是禁用的。相反，如果您从"From"项中删除所有内容，则"Body"项将再次变为禁用状态，但仅在您从`P3_FROM`导航离开后才会发生。这是可以接受的，但如果您在"From"项中输入任何内容时"Body"项立即变为启用状态，体验会更好。让我们将触发事件设置为“Key
    Release”而不是默认的“Change”事件。操作如下：'
  raw: '# 16. Dynamic Actions


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​16](http://dx.doi.org/10.1007/978-1-4842-0466-5_16))
    contains supplementary material, which is available to authorized users.


    One of the most exciting features introduced in recent versions of APEX was dynamic
    actions, which provide the ability to declaratively define complex client-side
    behavior such as validations, highlighting, alerts, setting page values, and so
    on, without the need to hand code large amounts of JavaScript.


    Dynamic actions have been significantly extended since their introduction, providing
    more flexibility and functionality declaratively. This helps the developer break
    away from the traditional server-side scripting model by executing the dynamic-action
    logic on the browser instead of incurring a round trip to the server.


    Dynamic actions are event-driven just as manually written JavaScript would be.
    But APEX uses the declarative information provided to generate the required JavaScript
    code, which is then implemented at runtime. This chapter will examine and implement
    a number of different dynamic actions so you can get a feel for what they can
    achieve.


    ## Dynamic Action Benefits


    One of the major advantages of using declarative dynamic actions as opposed to
    hand-coded JavaScript is that dynamic actions understand and can take advantage
    of APEX core objects such as regions and items, allowing easy reference and manipulation.
    Another benefit of using declarative logic is that, when you choose to upgrade
    to the next release of APEX, the framework around dynamic actions will ensure
    that any code generated will be compatible with the new version of APEX.


    But beyond the base benefits of the declarative nature of APEX, dynamic actions
    let you code very complex client-side actions without having to learn a whole
    new technology to do so. In fact, it’s likely that you could code upward of 80%
    of everything you need to do with nothing more than the Dynamic Action wizard,
    SQL, and PL/SQL.


    However, because JavaScript is the de facto standard for coding browser interactivity,
    it’s also likely that at some point you’ll be forced to learn a bit about JavaScript.
    Learning JavaScript is beyond the scope of this book. After all, you bought this
    book to learn APEX. But if you do want to learn more about JavaScript, Apress
    has a number of excellent books on the topic.


    ## Breaking Down Dynamic Actions


    In their original incarnation, dynamic actions were split into two categories:
    standard and advanced. The only real difference between these two categories was
    what the related wizard let you achieve. Under the covers, both dynamic action
    types were identical, and once you left the wizard, all options were available
    to you. The more recent versions of APEX (including 5.0) have done away with this
    artificial separation. The definition of a dynamic action can be broken down into
    the following components:


    *   Identification: Defines the name of the dynamic action and its execution sequence

    *   When: Defines when the action will be fired. You can choose the event, the
    object or objects that will participate in causing the action to fire, and any
    condition that applies to the event.

    *   Actions: Dynamic actions can contain both True and False action sets. The
    True action set is executed if the defined event occurs for the selected objects
    and any condition applied evaluates to `TRUE`. The False action set executes if
    the defined event occurs for the selected objects and any condition applied evaluates
    to `FALSE`.

    *   Affected elements: Identifies which objects on the page are affected by the
    dynamic action


    As with other parts of APEX, dynamic actions support conditions, authorizations,
    and build-option features.


    ## Dynamic Actions in the Help Desk Application


    Dynamic actions are all about making your application’s user interface easier
    for the user to utilize. In the following exercises, you will implement increasingly
    complex dynamic actions to make the interface of your application more robust.


    ### Starting Simple


    In the first exercise you will edit the Contact Us form on page 3 of the Help
    Desk application. Although there is nothing wrong with the form as it stands,
    you’ve been asked to deny input into the Body text area until the user has entered
    something into the From email address field.


    To create a dynamic action to do this, follow these steps:


    Edit Page 3 of your application.   Right-click the P3_FROM item and choose Create
    Dynamic Action from the context menu. Using the menu shown in Figure [16-1](#A978-1-4842-0466-5_16_Chapter.html#Fig1)
    is the most direct way to create a dynamic action.


    ![A978-1-4842-0466-5_16_Fig1_HTML.jpg](A978-1-4842-0466-5_16_Fig1_HTML.jpg)


    Figure 16-1.


    Using the right mouse shortcut to create a dynamic action   As shown in Figure
    [16-2](#A978-1-4842-0466-5_16_Chapter.html#Fig2), enter `Disable Email Body` for
    the Name of the dynamic action. Just as with other components, the more descriptive
    the name, the easier it is to identify.


    ![A978-1-4842-0466-5_16_Fig2_HTML.jpg](A978-1-4842-0466-5_16_Fig2_HTML.jpg)


    Figure 16-2.


    Specifying a name for the dynamic action   Leave Event set to Change and set Condition
    to is null, as shown in Figure [16-3](#A978-1-4842-0466-5_16_Chapter.html#Fig3).


    ![A978-1-4842-0466-5_16_Fig3_HTML.jpg](A978-1-4842-0466-5_16_Fig3_HTML.jpg)


    Figure 16-3.


    Setting a dynamic action’s Event and Condition for execution   In the Rendering
    Tree on the left under the True node, click the Show action (highlighted in red),
    as shown in Figure [16-4](#A978-1-4842-0466-5_16_Chapter.html#Fig4).


    ![A978-1-4842-0466-5_16_Fig4_HTML.jpg](A978-1-4842-0466-5_16_Fig4_HTML.jpg)


    Figure 16-4.


    Selecting the default True action so that it can be edited   In the Properties
    Editor, select Disable for Action, set Item(s) to P3_BODY, and set Fire On Page
    Load to Yes, as shown in Figure [16-5](#A978-1-4842-0466-5_16_Chapter.html#Fig5).


    ![A978-1-4842-0466-5_16_Fig5_HTML.jpg](A978-1-4842-0466-5_16_Fig5_HTML.jpg)


    Figure 16-5.


    Setting the True action details   In the Rendering tree, right-click the False
    node for the Dynamic Action and select Create False Action from the context menu.
      In the Properties Editor, select Enable for Action, set Selection Type to Item(s),
    set Item(s) to P3_BODY, and set Fire On Page Load to Yes, as shown in Figure [16-6](#A978-1-4842-0466-5_16_Chapter.html#Fig6).


    ![A978-1-4842-0466-5_16_Fig6_HTML.jpg](A978-1-4842-0466-5_16_Fig6_HTML.jpg)


    Figure 16-6.


    Setting the False action details   Save and Run the page.


    Recapping the steps in the exercise, you created a dynamic action that fires any
    time the Change event for the item `P3_FROM` is triggered. You set the condition
    so the action fires only when `P3_FROM` is null. The action is set to `Disable`,
    which disables an item so the user can’t navigate to it, and you chose to run
    the dynamic action whenever the page is loaded. This ensures that the affected
    item is disabled to start with. You also created the opposite False action. This
    enables the item whenever the Change event is fired and `P3_FROM` is not null.
    In both the True and False actions, you chose `P3_BODY` as the affected element.
    This indicates that it’s `P3_BODY` that is enabled and disabled depending on the
    state of the `P3_FROM` item.


    When running page 3, note that the Body item is disabled until you enter something
    in the From item and navigate away. Conversely, if you delete all content from
    the From item, the Body item again becomes disabled, but only after you navigate
    away from `P3_FROM`. This is acceptable, but it would be nicer if the Body item
    became enabled as soon as you typed anything in the From item. Let’s set the triggering
    event to be Key Release instead of the default Change event. Here’s what to do:'
  trans: '# 16. 动态操作


    电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-0466-5_​16](http://dx.doi.org/10.1007/978-1-4842-0466-5_16)）包含补充材料，可供授权用户使用。


    近年来 APEX 版本引入的最令人兴奋的功能之一是动态操作，它提供了以声明方式定义复杂客户端行为的能力，例如验证、高亮显示、警报、设置页面值等，而无需手工编写大量
    JavaScript 代码。


    自引入以来，动态操作已得到显著扩展，提供了更强大的声明式灵活性和功能性。这有助于开发者摆脱传统的服务器端脚本模型，通过在浏览器上执行动态操作逻辑，而不是产生到服务器的往返请求。


    动态操作与手动编写的 JavaScript 一样是事件驱动的。但 APEX 使用提供的声明式信息来生成所需的 JavaScript 代码，并在运行时实现。本章将研究和实现一系列不同的动态操作，以便您感受它们能实现什么。


    ## 动态操作的优势


    使用声明式动态操作而非手工编码 JavaScript 的一个主要优势是，动态操作能够理解并利用 APEX 核心对象，如区域（regions）和项（items），从而便于引用和操作。使用声明式逻辑的另一个好处是，当您选择升级到
    APEX 的下一个版本时，围绕动态操作的框架将确保任何生成的代码都与新版本的 APEX 兼容。


    但除了 APEX 声明式本质的基础优势之外，动态操作让您能够编写非常复杂的客户端操作，而无需学习一门全新的技术来实现。事实上，您很可能仅使用动态操作向导、SQL
    和 PL/SQL 就能完成超过 80%所需的功能编码。


    然而，由于 JavaScript 是编写浏览器交互性的事实标准，您也很可能在某个时候被迫学习一点 JavaScript。学习 JavaScript 超出了本书的范围。毕竟，您购买本书是为了学习
    APEX。但如果您确实想了解更多关于 JavaScript 的知识，Apress 有几本关于该主题的优秀书籍。


    ## 解构动态操作


    在最初的形式中，动态操作分为两类：标准（standard）和高级（advanced）。这两类之间的唯一真正区别是相关向导允许您实现什么。在底层，两种动态操作类型是相同的，一旦您离开向导，所有选项都对您开放。较新版本的
    APEX（包括 5.0）已经摒弃了这种人为的划分。动态操作的定义可以分解为以下组件：


    *   **标识**：定义动态操作的名称及其执行顺序。

    *   **时机**：定义操作何时触发。您可以选择事件、将参与触发操作的一个或多个对象，以及适用于该事件的任何条件。

    *   **操作**：动态操作可以包含 True 和 False 动作集。如果为所选对象定义的事件发生，并且任何应用的条件评估为`TRUE`，则执行 True
    动作集。如果为所选对象定义的事件发生，并且任何应用的条件评估为`FALSE`，则执行 False 动作集。

    *   **受影响元素**：识别页面上哪些对象受动态操作影响。


    与 APEX 的其他部分一样，动态操作支持条件、授权和构建选项功能。


    ## Help Desk 应用程序中的动态操作


    动态操作的核心在于让您应用程序的用户界面更便于用户使用。在以下练习中，您将实现复杂度递增的动态操作，以使应用程序的界面更加健壮。


    ### 从简单开始


    在第一个练习中，您将编辑 Help Desk 应用程序第 3 页上的“联系我们”表单。虽然该表单目前没有问题，但您被要求在用户输入“发件人”电子邮件地址字段之前，禁止在“正文”文本区域中输入内容。


    要创建一个动态操作来实现此目的，请按照以下步骤操作：


    编辑应用程序的第 3 页。右键单击`P3_FROM`项，然后从上下文菜单中选择“创建动态操作”。使用图 16-1 所示的菜单是创建动态操作的最直接方式。


    ![A978-1-4842-0466-5_16_Fig1_HTML.jpg](img/A978-1-4842-0466-5_16_Fig1_HTML.jpg)


    图 16-1.

    使用鼠标右键快捷方式创建动态操作


    如图 16-2 所示，为动态操作的“名称”输入`禁用邮件正文`。与其他组件一样，名称描述性越强，越容易识别。


    ![A978-1-4842-0466-5_16_Fig2_HTML.jpg](img/A978-1-4842-0466-5_16_Fig2_HTML.jpg)


    图 16-2.

    为动态操作指定名称


    将“事件”保持设置为“更改”，并将“条件”设置为“为空”，如图 16-3 所示。


    ![A978-1-4842-0466-5_16_Fig3_HTML.jpg](img/A978-1-4842-0466-5_16_Fig3_HTML.jpg)


    图 16-3.

    设置动态操作的“事件”和“条件”以执行


    在左侧的“渲染树”中，在“True”节点下单击“显示”操作（以红色突出显示），如图 16-4 所示。


    ![A978-1-4842-0466-5_16_Fig4_HTML.jpg](img/A978-1-4842-0466-5_16_Fig4_HTML.jpg)


    图 16-4.

    选择默认的 True 操作以便编辑


    在“属性编辑器”中，为“操作”选择“禁用”，将“项”设置为`P3_BODY`，并将“页面加载时运行”设置为“是”，如图 16-5 所示。


    ![A978-1-4842-0466-5_16_Fig5_HTML.jpg](img/A978-1-4842-0466-5_16_Fig5_HTML.jpg)


    图 16-5.

    设置 True 操作的详细信息


    在“渲染树”中，右键单击动态操作的“False”节点，然后从上下文菜单中选择“创建 False 操作”。在“属性编辑器”中，为“操作”选择“启用”，将“选择类型”设置为“项”，将“项”设置为`P3_BODY`，并将“页面加载时运行”设置为“是”，如图
    16-6 所示。


    ![A978-1-4842-0466-5_16_Fig6_HTML.jpg](img/A978-1-4842-0466-5_16_Fig6_HTML.jpg)


    图 16-6.

    设置 False 操作的详细信息


    保存并运行该页面。


    回顾练习中的步骤，您创建了一个动态操作，该操作在项`P3_FROM`的“更改”事件触发时触发。您设置了条件，使得操作仅在`P3_FROM`为空时触发。操作设置为`禁用`，这会禁用一个项，使用户无法导航到它，并且您选择在页面加载时运行动态操作。这确保受影响的项在开始时是禁用的。您还创建了相反的
    False 操作。当“更改”事件被触发且`P3_FROM`不为空时，此操作会启用该项。在 True 和 False 操作中，您都选择`P3_BODY`作为受影响的元素。这表明是`P3_BODY`根据`P3_FROM`项的状态被启用和禁用。


    运行第 3 页时，请注意，在您向“发件人”项中输入某些内容并导航离开之前，“正文”项是禁用的。相反，如果您从“发件人”项中删除所有内容，则“正文”项将再次变为禁用状态，但仅在您从`P3_FROM`导航离开后才会发生。这是可以接受的，但如果您在“发件人”项中输入任何内容时“正文”项立即变为启用状态，体验会更好。让我们将触发事件设置为“按键释放”而不是默认的“更改”事件。操作如下：'
- fmt: "# Editing Dynamic Actions\n\nEdit Page 3 of the application. Dynamic actions\
    \ that are triggered by a form element can be edited from one of two places. First,\
    \ you can see the dynamic action defined in the tree under the triggering element,\
    \ as shown in Figure [16-7](#A978-1-4842-0466-5_16_Chapter.html#Fig7). However,\
    \ you can also navigate to the `Dynamic Actions` tab in the Tree Pane (shown in\
    \ Figure [16-8](#A978-1-4842-0466-5_16_Chapter.html#Fig8)) to see all dynamic\
    \ actions for the current page.\n\n![A978-1-4842-0466-5_16_Fig8_HTML.jpg](A978-1-4842-0466-5_16_Fig8_HTML.jpg)\n\
    \nFigure 16-8. Viewing the Dynamic Actions tab\n\n![A978-1-4842-0466-5_16_Fig7_HTML.jpg](A978-1-4842-0466-5_16_Fig7_HTML.jpg)\n\
    \nFigure 16-7. Dynamic actions as they appear in the Rendering Tree\n\nFrom either\
    \ the Rendering Tree or the Dynamic Actions Tab, click the `Disable Email Body`\
    \ dynamic action to edit it.\n\nIn the `When` section of the Properties Editor\
    \ shown in Figure [16-9](#A978-1-4842-0466-5_16_Chapter.html#Fig9), change `Event`\
    \ to `Key Release` and click `Save`.\n\n![A978-1-4842-0466-5_16_Fig9_HTML.jpg](A978-1-4842-0466-5_16_Fig9_HTML.jpg)\n\
    \nFigure 16-9. Specifying `Key Release` as the event\n\nTo test this change, run\
    \ page 3 again. The page opens and looks like Figure [16-10](#A978-1-4842-0466-5_16_Chapter.html#Fig10).\
    \ Start typing an address into the `From` item. As soon as any value is entered,\
    \ the `Body` item becomes enabled, as in Figure [16-11](#A978-1-4842-0466-5_16_Chapter.html#Fig11).\
    \ Conversely, the moment you delete all content from the `From` item, the `Body`\
    \ item becomes disabled again.\n\n![A978-1-4842-0466-5_16_Fig11_HTML.jpg](A978-1-4842-0466-5_16_Fig11_HTML.jpg)\n\
    \nFigure 16-11. After entering a value in the `From` field\n\n![A978-1-4842-0466-5_16_Fig10_HTML.jpg](A978-1-4842-0466-5_16_Fig10_HTML.jpg)\n\
    \nFigure 16-10. Before entering a value in the `From` field\n\n## Using Page-Level\
    \ Events\n\nDynamic actions give you full control over the triggering events and\
    \ actions performed. Events can be triggered at various levels, including when\
    \ the page loads, unloads, is resized, and so on.\n\nIn the next exercise you\
    \ will use the `Page Load` event to pop up a dialog reminding the user to be as\
    \ verbose as possible when they enter their ticket. Follow these steps:\n\n1.\
    \  Edit Page 2 of the application. Because this event isn’t tied to an individual\
    \ item, but instead to a page-level event, you need to create the dynamic action\
    \ accordingly.\n2.  Navigate to the `Dynamic Actions` tab of the Tree Pane.\n\
    3.  Right-click the `Page Load` node in the tree and select `Create Dynamic Action`\
    \ from the context menu, as shown in Figure [16-12](#A978-1-4842-0466-5_16_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0466-5_16_Fig12_HTML.jpg](A978-1-4842-0466-5_16_Fig12_HTML.jpg)\n\
    \nFigure 16-12. Creating a dynamic action at the page level\n\n4.  In the Properties\
    \ Editor, enter `Alert User` for `Name`.\n5.  In the Dynamic Actions Tree under\
    \ the `True` node, click the `Show` action (highlighted in red) to edit its properties.\n\
    6.  Select `Alert` for `Action` and enter `\"Please be sure to be as complete\
    \ as possible when entering the details of your issue.\"` for `Text`, as shown\
    \ in Figure [16-13](#A978-1-4842-0466-5_16_Chapter.html#Fig13).\n\n![A978-1-4842-0466-5_16_Fig13_HTML.jpg](A978-1-4842-0466-5_16_Fig13_HTML.jpg)\n\
    \nFigure 16-13. Setting `Action` and `Text` for the dynamic action\n\n7.  `Save`\
    \ and `Run` the page.\n\nRunning page 2 now generates a pop-up every time you\
    \ load the page. Figure [16-14](#A978-1-4842-0466-5_16_Chapter.html#Fig14) shows\
    \ the pop-up as seen when using the Chrome browser for Mac OS X.\n\n![A978-1-4842-0466-5_16_Fig14_HTML.jpg](A978-1-4842-0466-5_16_Fig14_HTML.jpg)\n\
    \nFigure 16-14. Alerting the user\n\nNote\n\nBoth the `Alert` and `Confirmation`\
    \ actions available to you in APEX take advantage of the native dialogs provided\
    \ by the browser being used by the end user. You have no control over the look\
    \ and feel of these dialogs, and each browser may render them differently. If\
    \ you need control over the look and feel of dialogs, you likely need to consider\
    \ using a built-in APEX Modal dialog or coding your own dialogs based on jQuery.\n\
    \n## Dynamic Actions with Multiple Triggering Elements\n\nDynamic actions also\
    \ give you the opportunity to define multiple triggering elements. Using this\
    \ method, you only need to create a single dynamic action to catch the events\
    \ of several page items.\n\nYour public ticket-entry page contains several page\
    \ items that shouldn’t be left blank. However, your APEX validations won’t fire\
    \ until the user submits the page. In this exercise, you will create a dynamic\
    \ action that checks each of these page items as you navigate through the form\
    \ to see if you left the values null. If a value is null, the background color\
    \ of the item will be set to pink using the `background` style element. If it\
    \ is not null, the background of the item will be set back to white. Follow these\
    \ steps:\n\n1.  Edit Page 2 of the application.\n2.  Navigate to the `Dynamic\
    \ Actions` tab of the Tree Pane.\n3.  Right-click the `Events` node in the tree\
    \ and select `Create Dynamic Action` from the context menu.\n4.  In the Properties\
    \ editor, enter `Highlight Null Values` for `Name`.\n5.  Set `Event` to `Lose\
    \ Focus`, set the `Selection Type` to `Item(s)`, and enter the following for the\
    \ `Items` field, as shown in Figure [16-15](#A978-1-4842-0466-5_16_Chapter.html#Fig15):\n\
    \n    ```\n    P2_SUBJECT,P2_DESCR,P2_CREATED_BY\n    ```\n\n![A978-1-4842-0466-5_16_Fig15_HTML.jpg](A978-1-4842-0466-5_16_Fig15_HTML.jpg)\n\
    \nFigure 16-15. Creating a dynamic action with multiple triggering elements\n\n\
    6.  Set `Condition` to `is null`.\n7.  In the Dynamic Actions Tree under the `True`\
    \ node, click the `Show` action (highlighted in red) to edit its properties.\n\
    8.  Set `Action` to `Set Style`.\n9.  In the `Settings` section, enter `background`\
    \ for `Style Name` and `pink` for `Value`.\n10. In the `Affected Elements` section,\
    \ set `Selection Type` to `Triggering Element`.\n11. Set `Fire On Page Load` to\
    \ `No`.\n12. In the Dynamic Actions tab of the Tree Pane, right-click on the `False`\
    \ node of the `Highlight Null values` dynamic action and select `Create FALSE\
    \ action`.\n13. Set `Action` to `Set Style`.\n14. In the `Settings` section, enter\
    \ `background` for `Style Name` and `white` for `Value`.\n15. In the `Affected\
    \ Elements` section, set `Selection Type` to `Triggering Element`.\n16. Set `Fire\
    \ On Page Load` to `No`.\n17. `Save` and `Run` the page.\n\nBy entering a comma-separated\
    \ list of page items, you indicate that the `Lose Focus` event should fire when\
    \ the user navigates away from any of these items. When the dynamic action fires,\
    \ it checks to see if that item is null and sets it to the appropriate color.\
    \ The dynamic action knows which item’s background color to set by referencing\
    \ the triggering element for the affected element.\n\nRun page 2 of the Help Desk\
    \ application and tab through each field, leaving them all blank. You should notice\
    \ that as you leave a blank field it immediately turns pink. If you go back and\
    \ enter text into a pink field and then navigate away, the background is set to\
    \ white.\n\nNote\n\nDepending on the browser you’re using, you may see that after\
    \ the pop-up message is dismissed, the `Subject` field turns pink. This has to\
    \ do with the order of precedence some browsers give to JavaScript events. Certain\
    \ browsers place the cursor in the initial page item prior to raising the `PageLoad`\
    \ event. Once the `PageLoad` event fires, the `Subject` field loses focus, and\
    \ the `LoseFocus` event fires. When you have multiple dynamic actions on a page,\
    \ which you often will, you need to make sure they don’t adversely affect one\
    \ another."
