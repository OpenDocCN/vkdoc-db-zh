  trans: '

    ## 导航栏条目


    每个 APEX 应用都有一个导航栏，其中可以包含多个条目。通常显示在每页的链接示例包括“登录”、“注销”、“帮助”和“我的账户”。作为开发者，您可以根据应用和需求创建和修改导航栏条目。导航栏不仅限于标准链接文本；还可以修改为包含图像。条目可以基于条件、授权方案和构建选项来显示。导航栏的位置由页面模板替换变量
    `#NAVIGATION_BAR#` 决定。在大多数应用中，导航栏位于页面的右上角或左上角。


    示例应用已经为您创建了一个非常简单的导航栏，如图 5-28 所示。它目前只包含一个“注销”链接。


    ![A978-1-4842-0466-5_5_Fig28_HTML.jpg](img/A978-1-4842-0466-5_5_Fig28_HTML.jpg)


    图 5-28.


    基本导航栏


    因为您已将主页修改为可公开查看的页面，所以需要添加一个导航栏条目，允许用户登录。同时，您需要使“登录”和“注销”链接具有上下文敏感性，以便它们只在有需要时才显示。（例如，“注销”链接应仅在用户实际登录时显示。）


    导航栏是应用共享组件的一部分，因此需要从应用程序构建器的“共享组件”部分创建和维护。在示例应用中按如下步骤创建一个：


    从页面设计器中，点击页面右上角“保存”按钮旁边的“共享组件”图标，如图 5-29 所示。


    ![A978-1-4842-0466-5_5_Fig29_HTML.jpg](img/A978-1-4842-0466-5_5_Fig29_HTML.jpg)


    图 5-29.


    从页面设计器导航到共享组件屏幕


    在“导航”部分下，点击“导航栏列表”，如图 5-30 所示。


    ![A978-1-4842-0466-5_5_Fig30_HTML.jpg](img/A978-1-4842-0466-5_5_Fig30_HTML.jpg)


    图 5-30.


    共享组件屏幕中的导航组件


    您将看到一个报告显示已经存在一个名为 `Desktop Navigation Bar` 的导航栏列表。您需要编辑此列表以添加“登录”条目并编辑“注销”条目。


    点击报告中的 `Desktop Navigation Bar` 链接。


    点击屏幕右上角的 `Create List Entry` 按钮。


    在页面的“条目”部分，在 `List Entry Label` 字段中输入 `Login`。


    在“目标”部分，将 `Target Type` 设置为 `Page in This Application`。


    对于 `Page`，输入 `101`。这将使用户在注销后返回到登录页面。参见图 5-31。


    ![A978-1-4842-0466-5_5_Fig31_HTML.jpg](img/A978-1-4842-0466-5_5_Fig31_HTML.jpg)


    图 5-31.


    导航栏设置


    在“条件”部分，将 `Condition Type` 设置为 `User is the Public User (user has not authenticated)`，如图
    5-32 所示。


    ![A978-1-4842-0466-5_5_Fig32_HTML.jpg](img/A978-1-4842-0466-5_5_Fig32_HTML.jpg)


    图 5-32.


    导航栏条件


    点击页面顶部的 `Create List Entry`。


    现在运行应用。如果您已登录，则只会看到“注销”导航栏条目。点击“注销”链接。一旦注销，您将看到新的导航项，如图 5-33 所示。这暴露了一个小问题：即使您已经注销，仍然可以看到“注销”链接。


    ![A978-1-4842-0466-5_5_Fig33_HTML.jpg](img/A978-1-4842-0466-5_5_Fig33_HTML.jpg)


    图 5-33.


    “登录”和“注销”链接同时显示


    显然，同时显示“登录”和“注销”选项是有问题的。毕竟，这两个选项中只有一个可以适用。让我们来解决这个问题：


    导航回 Help Desk 应用的“共享组件”部分。


    编辑“导航栏列表”，然后编辑 `Desktop Navigation Bar` 列表。


    通过点击报告中其名称来编辑“注销”导航栏条目。


    在页面的“条件”部分，将 `Condition Type` 设置为 `User is Authenticated (not public)`，如图 5-34
    所示。


    ![A978-1-4842-0466-5_5_Fig34_HTML.jpg](img/A978-1-4842-0466-5_5_Fig34_HTML.jpg)


    图 5-34.


    导航栏条件类型


    点击 `Apply Changes`。


    再次运行应用。您应该会看到“登录”和“注销”导航项是互斥的。在创建新的导航项时，您为其应用了条件，使其仅对公共用户可见。“注销”导航项是在“创建应用”向导中创建的；默认情况下没有为“注销”项设置条件。您将在第
    8 章中了解更多关于条件的信息。


    ## 全局页面


    `全局页面`是一种特殊类型的页面，用作您应用的“母版页”，并且可以为每种用户界面类型添加一个（即，您可以有一个用于桌面 UI 的 `全局页面`，另一个用于移动
    UI）。


    放置在 `全局页面` 上的项目会在其相关 UI 的每个页面上渲染，除非有条件地指定不这样做。当您发现需要在多个页面甚至应用的所有页面上显示相同区域时，这特别有用。只需将一个区域移动到您的
    `全局页面`，它就会随每个页面一起渲染。


    一个很好的使用例子是面包屑区域或包含自定义 JavaScript 代码的区域，这些代码需要每个页面都能使用。来自 `全局页面` 的区域内容会包含在该 UI
    的每个页面中，即使区域没有可见地渲染。


    虽然您可以为 `全局页面` 分配任何页码，但与桌面界面相关的 `全局页面` 的默认页码是零 (`0`)。实际上，`全局页面` 取代了以前 APEX 版本中称为
    `Page Zero` 的功能。


    在 APEX 页面设计器中查看 `全局页面` 的定义时（图 5-35），您可能会注意到“处理”选项卡的树状窗格中没有任何节点。`全局页面` 仅在页面渲染期间使用。添加到
    `全局页面` 的区域甚至会包含在登录页面上。在向 `全局页面` 添加内容时，您需要考虑应用中不同的页面类型。


    ![A978-1-4842-0466-5_5_Fig35_HTML.jpg](img/A978-1-4842-0466-5_5_Fig35_HTML.jpg)


    图 5-35.


    如 APEX 页面设计器所示，`全局页面` 没有处理节点


    创建 `全局页面` 就像在 APEX 应用中创建任何其他页面一样。但是，一旦创建，它就不再出现在该 UI 类型的 `创建选项` 列表中。让我们为桌面界面创建一个
    `全局页面`：


    从应用页面列表中，点击“创建页面”按钮。


    在弹出的向导中，从“页面类型”列表中选择 `全局页面` 并点击“下一步”。图 5-36 显示了 `全局页面` 选项，它应该位于列表的底部附近。


    ![A978-1-4842-0466-5_5_Fig36_HTML.jpg](img/A978-1-4842-0466-5_5_Fig36_HTML.jpg)


    图 5-36.


    选择创建 `全局页面`


    将 `Page Number` 保留为 `0`（零），然后点击“创建”。


    您现在应该看到您的 `全局页面` 列在应用的页面中。目前，`全局页面` 上没有任何内容。您将使用此 `全局页面` 来包含并显示下一节将介绍的面包屑区域。

    '
- fmt: '## Breadcrumb Regions


    面包屑是一种流行的导航结构。它为用户提供当前导航路径的快速直观表示，并可选择使用该结构向后导航。Oracle Application Express 在图
    [5-37] 所示的构建器中使用了此结构。


    ![A978-1-4842-0466-5_5_Fig37_HTML.jpg](A978-1-4842-0466-5_5_Fig37_HTML.jpg)


    图 5-37.

    应用程序构建器中的面包屑示例


    在 `APEX` 中，面包屑是一种具有内置行为的声明式结构。它们作为共享组件进行管理，并拥有自己的区域类型和模板。当您运行创建应用程序向导时，向导创建的页面会自动包含一个用于容纳面包屑的区域。图
    [5-38] 显示了页面面包屑栏部分中的面包屑区域。


    ![A978-1-4842-0466-5_5_Fig38_HTML.jpg](A978-1-4842-0466-5_5_Fig38_HTML.jpg)


    图 5-38.

    面包屑在页面渲染层次结构中的位置


    当您为应用程序创建新页面时，创建页面向导有一个选项可帮助创建新的面包屑条目。使用此选项时，子页面会从父页面复制面包屑区域，并在面包屑组中自动添加一个条目。如果面包屑区域不存在，则不会复制任何内容，但面包屑共享组件中的条目仍会创建。这种方法的一个问题是，如果您需要对区域的显示或其他布局考虑进行任何更改，则必须在包含面包屑区域的每个页面上手动完成。将区域添加到全局页面以使其出现在所有页面上会很有帮助，因为它为您提供了一个更改点而不是多个。


    继续使用帮助台应用程序，设计要求面包屑区域出现在所有页面上。无需手动重新创建该区域。因为创建应用程序向导已经为您创建了该区域，您可以使用 `APEX` 中的复制区域功能将该区域复制到您的全局页面。操作如下：


    使用页面设计器编辑页面 1。

    在渲染树窗格中右键单击面包屑区域以显示上下文菜单，如图 [5-39] 所示。


    ![A978-1-4842-0466-5_5_Fig39_HTML.jpg](A978-1-4842-0466-5_5_Fig39_HTML.jpg)


    图 5-39.

    面包屑区域的上下文菜单

    选择复制到其他页面...选项。

    将新区域的目标页码更改为 0，如图 [5-40] 所示，然后单击下一步。


    ![A978-1-4842-0466-5_5_Fig40_HTML.jpg](A978-1-4842-0466-5_5_Fig40_HTML.jpg)


    图 5-40.

    设置目标页面

    复制向导允许以有限的方式修改复制的内容。不适用的选项会被禁用。在当前示例中，您可以修改区域名称、序列以及一些显示放置选项。现在，保留它们的默认值：

    确认图 [5-41] 中所示的设置。单击复制以完成向导。


    ![A978-1-4842-0466-5_5_Fig41_HTML.jpg](A978-1-4842-0466-5_5_Fig41_HTML.jpg)


    图 5-41.

    确认复制操作


    在页面设计器中查看更改，注意到全局页面现在有了新的面包屑区域，但原始面包屑区域仍保留在页面 1 上。运行应用程序时，您可以看到图 [5-42] 中显示的两个面包屑区域。请注意，复制功能不会删除现有的面包屑区域。


    ![A978-1-4842-0466-5_5_Fig42_HTML.jpg](A978-1-4842-0466-5_5_Fig42_HTML.jpg)


    图 5-42.

    冗余的面包屑区域


    要更正此重复项，请执行以下操作：


    编辑页面 1。

    在渲染树中右键单击面包屑区域名称，然后从上下文菜单中选择删除，如图 [5-43] 所示。


    ![A978-1-4842-0466-5_5_Fig43_HTML.jpg](A978-1-4842-0466-5_5_Fig43_HTML.jpg)


    图 5-43.

    准备从页面 1 删除冗余的面包屑区域

    单击页面设计器右上角的保存按钮。


    现在，重新测试应用程序。您应该只看到全局页面版本的面包屑区域，如图 [5-44] 所示。


    ![A978-1-4842-0466-5_5_Fig44_HTML.jpg](A978-1-4842-0466-5_5_Fig44_HTML.jpg)


    图 5-44.

    面包屑区域迁移到全局页面完成


    实际上，您已经将面包屑区域的管理移到了全局页面。对该区域在全局页面上进行的任何设置更改都会在应用程序的所有页面上显示，而无需任何额外工作。


    ## Breadcrumb Entries


    随着应用程序中添加更多页面，页面创建向导会提示可选的面包屑设置。如果它们在页面创建时未设置，或者需要从现有设置进行修改，您可以在应用程序的共享组件部分修改驱动面包屑的数据。


    一个应用程序中可以有多个面包屑。`APEX` 创建应用程序向导会创建一个名为 `Breadcrumb` 的默认面包屑。这是面包屑条目的分组名称。`APEX`
    提供了一些实用程序来查看面包屑的使用位置，以及编辑条目的简单方法。


    要查看创建的面包屑组，请导航到共享组件部分，然后单击导航部分中的面包屑选项。图 [5-45] 显示了用于列出不同面包屑组的主屏幕。


    ![A978-1-4842-0466-5_5_Fig45_HTML.jpg](A978-1-4842-0466-5_5_Fig45_HTML.jpg)


    图 5-45.

    应用程序中可用的面包屑组


    单击组名将显示该组中的详细条目，如图 [5-46] 所示。条目可以在此处独立修改。随着应用程序变大，您可能需要将条目安排到不同的面包屑组中。


    ![A978-1-4842-0466-5_5_Fig46_HTML.jpg](A978-1-4842-0466-5_5_Fig46_HTML.jpg)


    图 5-46.

    面包屑组中条目的详细信息'
  raw: '## Breadcrumb Regions


    Breadcrumbs are a popular navigation structure. They give the user a quick and
    intuitive representation of the current navigation path with optional functionality
    to navigate back using the structure. Oracle Application Express uses the structure
    in the builder shown in Figure [5-37](#A978-1-4842-0466-5_5_Chapter.html#Fig37).


    ![A978-1-4842-0466-5_5_Fig37_HTML.jpg](A978-1-4842-0466-5_5_Fig37_HTML.jpg)


    Figure 5-37.


    Example of breadcrumbs in the Application Builder


    In APEX, breadcrumbs are a declarative structure with built-in behavior. They’re
    managed as shared components and have their own region type and template. When
    you ran the Create Application wizard, the pages that the wizard created automatically
    included a region to contain the breadcrumbs. Figure [5-38](#A978-1-4842-0466-5_5_Chapter.html#Fig38)
    shows the Breadcrumbs region in the Breadcrumb Bar section of the page.


    ![A978-1-4842-0466-5_5_Fig38_HTML.jpg](A978-1-4842-0466-5_5_Fig38_HTML.jpg)


    Figure 5-38.


    The Breadcrumbs’ position in the page-rendering hierarchy


    When you’re creating new pages for an application, the Create Page wizard has
    an option to assist in creating new breadcrumb entries. When you use this option,
    child pages receive a copy of the breadcrumb region from the parent, as well as
    an automatic entry in the Breadcrumb group. When a breadcrumb region doesn’t exist,
    nothing is copied, but the entry in the breadcrumb shared component is still created.
    An issue with this approach is that if you need to make any changes to the region’s
    display or other layout considerations, they have to be done manually on every
    page that contains a breadcrumb region. Adding the region to a Global Page to
    make it appear on all pages can be helpful, because it gives you one point of
    change instead of many.


    Continuing with the Help Desk application, the design is supposed to have a breadcrumb
    region that appears on all pages. It isn’t necessary to re-create the region manually.
    Because the Create Application wizard created the region for you, you can use
    the Copy Region feature in APEX to duplicate the region to your Global Page. Do
    the following:


    Edit Page 1 using the Page Designer.   Right-click the Breadcrumbs region in the
    Rendering Tree Pane to show the context menu, as shown in Figure [5-39](#A978-1-4842-0466-5_5_Chapter.html#Fig39).


    ![A978-1-4842-0466-5_5_Fig39_HTML.jpg](A978-1-4842-0466-5_5_Fig39_HTML.jpg)


    Figure 5-39.


    Context menu for the Breadcrumbs region   Select the Copy to other Page... option.
      Change the page number for the new region to 0, as shown in Figure [5-40](#A978-1-4842-0466-5_5_Chapter.html#Fig40),
    and click Next.


    ![A978-1-4842-0466-5_5_Fig40_HTML.jpg](A978-1-4842-0466-5_5_Fig40_HTML.jpg)


    Figure 5-40.


    Setting the destination page The Copy wizard allows the modification of what is
    copied in a limited fashion. Options that don’t apply are disabled. In the current
    example, you could modify the region name and sequence as well as some display-placement
    options. For now, leave them with their default values:   Confirm the settings
    shown in Figure [5-41](#A978-1-4842-0466-5_5_Chapter.html#Fig41). Click Copy to
    complete the wizard.


    ![A978-1-4842-0466-5_5_Fig41_HTML.jpg](A978-1-4842-0466-5_5_Fig41_HTML.jpg)


    Figure 5-41.


    Confirming the copy operation


    Reviewing the change in the Page Designer, notice that the Global Page now has
    the new breadcrumb region, but the original breadcrumb region still remains on
    page 1\. In running the application, you can see the two breadcrumb regions shown
    in Figure [5-42](#A978-1-4842-0466-5_5_Chapter.html#Fig42). Note that the Copy
    feature doesn’t remove the existing breadcrumb region.


    ![A978-1-4842-0466-5_5_Fig42_HTML.jpg](A978-1-4842-0466-5_5_Fig42_HTML.jpg)


    Figure 5-42.


    Redundant breadcrumb regions


    To correct this duplication, do the following:


    Edit Page 1.   Right-click the Breadcrumbs region name in the Rendering Tree and
    select Delete from the context menu, as shown in figure [5-43](#A978-1-4842-0466-5_5_Chapter.html#Fig43).


    ![A978-1-4842-0466-5_5_Fig43_HTML.jpg](A978-1-4842-0466-5_5_Fig43_HTML.jpg)


    Figure 5-43.


    Preparing to delete a redundant breadcrumb region from Page 1   Click the Save
    button in the upper-right area of the Page Designer.


    Now, re-test the application. You should just see the Global Page version of the
    breadcrumbs region, as shown in Figure [5-44](#A978-1-4842-0466-5_5_Chapter.html#Fig44).


    ![A978-1-4842-0466-5_5_Fig44_HTML.jpg](A978-1-4842-0466-5_5_Fig44_HTML.jpg)


    Figure 5-44.


    Completed migration of the breadcrumb region to the Global Page


    Effectively, you have moved the management of the breadcrumb region to the Global
    Page. Any setting changes to that region done on the Global Page are seen on all
    pages of the application without requiring any additional work.


    ## Breadcrumb Entries


    As additional pages are added to the application, the page-creation wizard prompts
    for optional breadcrumb settings. If they weren’t set at the time the page was
    created, or if they need to be modified from their existing settings, you can
    modify the data that drives the breadcrumbs in the Shared Components section of
    the application.


    It’s possible to have several breadcrumbs in one application. A default breadcrumb
    with the name Breadcrumb is created as part of the APEX Create Application wizard.
    This is the name of the grouping of breadcrumb entries. APEX provides some utilities
    to see where breadcrumbs are used as well as easy methods of editing entries.


    To see the breadcrumb groups created, navigate to the Shared Components section
    and click the Breadcrumbs option in the Navigation section. Figure [5-45](#A978-1-4842-0466-5_5_Chapter.html#Fig45)
    shows the main screen for listing the different breadcrumb groups.


    ![A978-1-4842-0466-5_5_Fig45_HTML.jpg](A978-1-4842-0466-5_5_Fig45_HTML.jpg)


    Figure 5-45.


    Breadcrumb groups available in the application


    Clicking the group name displays the detailed entries in that group, as shown
    in Figure [5-46](#A978-1-4842-0466-5_5_Chapter.html#Fig46). The entries can be
    modified independently here. As an application becomes larger, you may need to
    arrange the entries into different breadcrumb groups.


    ![A978-1-4842-0466-5_5_Fig46_HTML.jpg](A978-1-4842-0466-5_5_Fig46_HTML.jpg)


    Figure 5-46.


    Detail of entries in a breadcrumb group'
