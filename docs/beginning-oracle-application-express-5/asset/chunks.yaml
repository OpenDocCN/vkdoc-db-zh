- fmt: '## Lists


    ### Lists: Definition and Types


    As the name implies, a list is a structure that `APEX` uses to keep a collection
    of data for links. The list structure allows menus to be displayed consistently
    across numerous application pages, with easy maintenance performed in the `Shared
    Components` area of an application. Don’t confuse navigation lists, which we are
    discussing here, with lists of values (`LOVs`). Lists are a navigational structure
    with built-in templates for displaying information in different ways. `LOVs` are
    used to support data entry, limiting the options a user can enter.


    There are two types of lists: static and dynamic. Static lists are made up of
    list items that aren’t data driven but are instead entered at design time by the
    developer. Dynamic lists are data based, and the values returned into the list
    are based on an `SQL` query.


    ### List Templates and Customization


    List templates have a lot of capability. They support hierarchical lists, graphical
    bullets, dynamic `HTML`, and highlighting for the current page. Lists can contain
    data in a parent-child relationship; some list templates are specifically designed
    to display parent-child data. `APEX` themes contain a variety of templates for
    lists, but if the behavior you’re looking for isn’t already available, it’s possible
    to modify or create your own list template to display and behave as desired.


    ### Lists in the Universal Theme


    As briefly mentioned earlier in this chapter, the new Universal Theme uses static
    lists instead of Tabs for navigation. A list named `Desktop Navigation List` is
    created to hold the navigation for the site, and a special `List` template built
    into the Universal Theme is used to display the list, depending upon some application-level
    attributes.


    Whether using lists or tabs, as you navigate through the page-creation wizards,
    `APEX` will ask if you wish to create a navigation entry for the page you are
    creating. If you choose to create a new navigation entry while using the Universal
    Theme, a new list entry is created for you.


    ### Creating List Entries Manually


    Although we could let the page-creation wizard create all of the list entries
    for us, you’re going to create two entries in the list for pages that don’t exist
    yet to show you how it can be done manually. Don’t worry—you’ll create those pages
    in the next few chapters. Here’s the process to follow:


    1.  Navigate to the `Shared Components` section of your application.

    2.  Locate and click the `Lists` entry under `Navigation`.

    3.  Locate and click the `Desktop Navigation Menu` list in the resulting report.

    4.  To create a new list entry, click the `Create List Entry` button shown in
    `Figure 5-47`.


    ![A978-1-4842-0466-5_5_Fig47_HTML.jpg](A978-1-4842-0466-5_5_Fig47_HTML.jpg)

    `Figure 5-47`. Creating a new list entry


    The resulting page presents all the options available for a list entry. A lot
    of functionality is built into the lists structure. The key items you’re interested
    in are shown in `Table 5-1`. Fill out the page shown in `Figures 5-48` and `5-49`
    using the values from `Table 5-1`. Leave any other values at their defaults.


    ![A978-1-4842-0466-5_5_Fig49_HTML.jpg](A978-1-4842-0466-5_5_Fig49_HTML.jpg)

    `Figure 5-49`. Target definition


    ![A978-1-4842-0466-5_5_Fig48_HTML.jpg](A978-1-4842-0466-5_5_Fig48_HTML.jpg)

    `Figure 5-48`. Choosing a parent list entry and setting the label


    `Table 5-1`. Values to Use for the First List Entry


    | `Section` | `Value` | `Entry` |

    | --- | --- | --- |

    | `Entry` | `Parent` | `Home` |

    |   | `List Entry Label` | `Submit a Ticket` |

    | `Target` | `Page` | `2` |

    |   | `Clear Cache` | `2` |


    Once you’ve finished your entries for the first list item, scroll to the top of
    the page and click the `Create and Create Another` button. This brings you back
    to the same page and allows you to add another list entry. Use the information
    in `Table 5-2` to create the second list entry.


    `Table 5-2`. Values to Use in the Second List Entry


    | `Section` | `Value` | `Entry` |

    | --- | --- | --- |

    | `Entry` | `Parent` | `Home` |

    |   | `List Entry Label` | `Contact Us` |

    | `Target` | `Page` | `3` |

    |   | `Clear Cache` | `3` |


    Click `Create List Entry` to save your changes.


    You should now have a list with three entries in it, as shown in `Figure 5-50`.
    The `List Details` tab shows some important information in a single view. The
    `Sequence` value identifies the order in which the items are listed when using
    an unordered list type. Some list types are classified as ordered, in which case
    they’re sorted by name alphabetically. The `Target` value is the construction
    of a `URL` that includes the page to navigate to as well as a clear-cache instruction.
    Several of the declarative forms construct a `URL` based on the inputs provided,
    in the same way as for the list entry.


    ![A978-1-4842-0466-5_5_Fig50_HTML.jpg](A978-1-4842-0466-5_5_Fig50_HTML.jpg)

    `Figure 5-50`. List entries at a glance


    A list, as a shared component (unless it is designated as the default navigation
    list for the `UI`), doesn’t display in an application directly. Normally, a list
    region must be configured on a page in order for the list to be seen by the user.
    `APEX` has a template type defined specifically to support lists. The list templates
    contain all the intelligence required for dynamic lists and options for display.
    When you’re creating a list region, the template choice can be set, and it can
    be modified through the region settings.


    In our case, the list entries you created will be displayed as part of the navigation
    list region that is part of the Universal Theme.


    Running your application now should result in the list entries you created appearing
    on the left side of the screen as part of the `Navigation` menu (`Figure 5-51`).
    Clicking either link generates an application error. This is expected: you’ve
    asked the application to link to pages that don’t exist yet.


    ![A978-1-4842-0466-5_5_Fig51_HTML.jpg](A978-1-4842-0466-5_5_Fig51_HTML.jpg)

    `Figure 5-51`. Navigation menu with new list entries


    ## Lists of Values


    One of the fundamental benefits of writing an application on top of a database
    architecture is the ability to enforce data quality. `LOVs` are an `APEX` component
    that can be mapped to different item types, including `Select Lists`, `Multiple
    Select Lists`, `Checkboxes`, and `Radio Groups`. These types of structures help
    ensure that data collected through transactions is consistent. As with lists,
    there are two types of `LOVs` in `APEX`:


    *   Static: A set list of options in `APEX`

    *   Dynamic: Based on data in the database returned via `SQL`


    `LOVs` can be defined as shared components either at the application level or
    at the item level. `Figure 5-52` shows an item-level attribute definition for
    a static `LOV`. An `LOV` used more than once should be written as a shared component.
    This allows the maintenance of that `LOV` to be centrally located with the `Shared
    Components`. If an `LOV` is created at the item level, it’s easy to convert it
    to a shared `LOV` by using a utility that `APEX` provides. When viewing the `LOV`
    Shared Components, an `LOV` that is locally defined can be edited and converted
    to a Shared Component `LOV`.


    ![A978-1-4842-0466-5_5_Fig52_HTML.jpg](A978-1-4842-0466-5_5_Fig52_HTML.jpg)

    `Figure 5-52`. An item-level `LOV` with static options'
