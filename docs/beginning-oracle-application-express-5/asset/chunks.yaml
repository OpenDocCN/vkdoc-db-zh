  trans: '### 交互式报表设置


    交互式报表设置页面允许工作区管理员管理已保存的报表和报表订阅。只有工作区管理员可以删除已保存的报表和报表订阅。修改报表配置的唯一方式是以该用户身份登录。


    #### 已保存的报表


    “已保存的报表”部分允许您删除某些已保存的交互式报表。交互式报表有四种不同类型的已保存报表（参见图 14-14）。**主默认报表**是开发人员创建时的默认报表设置，所有用户均可访问。**备选默认报表**同样由开发人员保存，所有用户也可访问。这使开发人员能够预先创建同一报表的多个版本。


    ![A978-1-4842-0466-5_14_Fig14_HTML.jpg](img/A978-1-4842-0466-5_14_Fig14_HTML.jpg)


    图 14-14. 管理已保存的交互式报表页面


    **私有交互式报表**是自定义的交互式报表，仅对创建它们的用户可见。**公共交互式报表**是由特权终端用户保存并设为公共的报表，因此任何其他用户都可以查看。


    在“已保存的报表”页面上，您可以通过选择报表并单击“删除已勾选项”按钮来删除除“主默认报表”外的任何报表。主默认报表无法从此界面删除，只能通过直接编辑报表区域进行更改。


    #### 订阅


    与“已保存的报表”部分类似，您可以从“订阅”部分删除交互式报表订阅。订阅允许用户按照他们定义的时间表接收通过电子邮件发送的报表。订阅是 APEX 4.0 中的一项新功能，必须由开发人员显式启用。


    在“管理订阅”页面上，工作区管理员可以删除特定订阅或所有订阅，如图 14-15 所示。与已保存的报表一样，您无法修改任何订阅属性。


    ![A978-1-4842-0466-5_14_Fig15_HTML.jpg](img/A978-1-4842-0466-5_14_Fig15_HTML.jpg)


    图 14-15. 管理订阅页面


    ### 管理用户和组


    本节将介绍在图 14-1 所示的“管理”主页上单击“管理用户和组”图标时可用的大部分功能。所有参考内容均假设您从图 14-16 所示的“管理用户和组”页面开始。


    ![A978-1-4842-0466-5_14_Fig16_HTML.jpg](img/A978-1-4842-0466-5_14_Fig16_HTML.jpg)


    图 14-16. 管理用户和组页面


    主页面包含所有终端用户、开发人员和工作区管理员的列表。您可以通过单击用户名来修改用户。终端用户无法访问开发环境，并且仅当身份验证方案为默认的“Application
    Express”时，他们才能访问应用程序。


    #### 创建单个用户


    要创建单个用户，请单击图 14-16 中所示的“创建用户”按钮。如果只创建开发人员，则无需担心填写某些非必填字段，例如名字和姓氏，因为您通常通过用户名来识别用户。您还可以授予对特定模块的访问权限。例如，如果您为项目经理创建账户，可能只想授予他们对“团队开发”模块的访问权限，如图
    14-17 所示。


    ![A978-1-4842-0466-5_14_Fig17_HTML.jpg](img/A978-1-4842-0466-5_14_Fig17_HTML.jpg)


    图 14-17. 账户权限


    #### 创建多个用户


    使用“创建用户”页面一次创建一个用户可能会变得缓慢且令人沮丧。APEX 提供了一个用于创建多个用户的界面。首先单击“创建多个用户”按钮，如图 14-16 所示。


    在“创建多个用户”页面上，您需要为每个用户提供一个电子邮件地址。电子邮件地址可以用逗号、分号或换行符分隔。APEX 会根据您输入的电子邮件地址生成用户名。例如，电子邮件地址
    `doug@mycompany.com` 生成的用户名可以是 `doug@mycompany.com`，也可以只是简单的 `doug`。您可以指定是希望每个电子邮件地址直接转换为用户名，还是希望用户名排除
    `@domain` 后缀。图 14-18 显示了后一种选项的单选按钮设置。


    ![A978-1-4842-0466-5_14_Fig18_HTML.jpg](img/A978-1-4842-0466-5_14_Fig18_HTML.jpg)


    图 14-18. 创建多个用户页面


    如果您的用户名与公司电子邮件地址不对应，您可以输入带有无效域的电子邮件地址，并选择省略后缀的选项。例如，当您只想要一个名为 `jonathan` 的用户时，输入电子邮件地址
    `jonathan@example.com`。然后选择排除电子邮件地址的 `@domain` 部分。


    您输入的密码对所有用户都是相同的。当他们登录工作区时，系统将要求他们更改密码。


    在“创建多个用户”页面上输入所有信息后，单击“下一步”按钮转到如图 14-19 所示的确认页面。如果所有信息正确，请单击“创建有效用户”按钮。


    ![A978-1-4842-0466-5_14_Fig19_HTML.jpg](img/A978-1-4842-0466-5_14_Fig19_HTML.jpg)


    图 14-19. 创建多个用户确认页面


    #### 将用户组织到组中


    您可以将一个 APEX 用户关联到多个组。这些组可用于授权方案中，以授予或拒绝访问应用程序的各个部分。由于组与 APEX 用户关联，因此仅当您的身份验证方案设置为默认的“Application
    Express”方案时才能使用组。


    需要注意的是，组与单个工作区相关联。如果您拥有包含开发、测试和生产环境的典型设置，则需要在每个工作区中创建相同的组。


    #### 创建组


    要创建用户组，请单击“任务”区域中的“管理用户组”链接（如图 14-20 所示），然后单击“创建用户组”按钮。输入唯一的组名和描述，如图 14-24 所示。组可以嵌套，即包含其他组。当一个组包含其他组时，它们成为父组，因此“继承”其他组的成员身份。


    ![A978-1-4842-0466-5_14_Fig21_HTML.jpg](img/A978-1-4842-0466-5_14_Fig21_HTML.jpg)


    图 14-21. 创建用户组


    ![A978-1-4842-0466-5_14_Fig20_HTML.jpg](img/A978-1-4842-0466-5_14_Fig20_HTML.jpg)


    图 14-20. 从“任务”菜单中选择“管理用户组”选项


    #### 将用户分配到组


    将用户分配到组的操作不是很直观。单击“管理用户组”区域中的“组分配”只会显示所有用户及其组的报告。要将用户分配到组，您需要编辑该用户（用户 ➤ 编辑用户）并向下滚动到如图
    14-22 所示的“用户组”区域。


    ![A978-1-4842-0466-5_14_Fig22_HTML.jpg](img/A978-1-4842-0466-5_14_Fig22_HTML.jpg)


    图 14-22. 将用户分配到组


    ### 查看使用情况报告和仪表板


    图 14-1 中的“监控活动”和“仪表板”部分提供了许多关于您 APEX 工作区的详细报告和汇总报告。这些报告包含有关开发人员活动和终端用户活动的信息。我们鼓励您探索这些部分的每一个，以查看所有可用的报告。'
- fmt: '## Summary


    APEX provides many tools to help you manage your workspace, plus reports that
    provide statistics about your workspace. Some tools can affect end users and should
    be used cautiously. However, don’t let the need for caution deter you from using
    tools that can make your job easier. Learn the tools well. Be confident in your
    knowledge. Take a moment to think before you act. These are the keys to success.


    ## 15. Team Development


    Team Development is an excellent tool for managing APEX software development.
    It is embedded within the APEX development environment, allowing you to manage
    your APEX projects with tools that you and your team use every day, like interactive
    reports. This eliminates the need for an external project-management tool. Team
    Development’s simple, extensible, and flexible architecture is ideal for managing
    projects of any size. Its simplicity lends itself to small projects where you
    want to minimize your project-management overhead. Its extensibility scales well,
    allowing you to manage large projects by using its rich set of attributes to construct
    a sophisticated work breakdown structure (`WBS`). Its flexibility lets you adapt
    it to your organization’s software-development culture.


    APEX and Team Development are both well suited to working with agile software-development
    methodologies. APEX’s Rapid Application Development (`RAD`) architecture allows
    the team to rapidly deliver regularly scheduled releases to business testers and
    end users. Team Development’s feedback mechanism efficiently channels end-user
    issues back to the development team so that appropriate changes can be included
    in the following releases and easily documented. Team Development makes APEX,
    which is already an efficient development platform, even more efficient.


    The primary purpose of this chapter is to highlight how Team Development works.
    A secondary purpose is to illustrate how agile software-development practices
    can be used with Team Development to deliver quality software while meeting your
    cost and schedule constraints. By the end of the chapter, you should have a good
    understanding of what is in Team Development and some ideas about how to integrate
    it into your team’s development culture.


    Team Development was added to APEX in version 4.0\. The APEX team has used a version
    of Team Development while developing APEX, even before it was released as an APEX
    module. This design philosophy of using the tool to build the tool is a key reason
    why Team Development and APEX are practical and easy-to-use tools.


    ## Team Development Overview


    Team Development consists of `milestones`, `features`, `to-dos`, `bugs`, and `feedback`.
    These modules are complemented by a small number of utilities called `Team Actions`
    that are used to manage the Team Development environment. The entity-relationship
    diagram (`ERD`) illustrates the relationships between the main entities (see Figure
    15-1).


    ![A978-1-4842-0466-5_15_Fig1_HTML.gif](A978-1-4842-0466-5_15_Fig1_HTML.gif)

    Figure 15-1. A simplified entity relationship diagram of Team Development


    The Team Development entities are contained within a single workspace. When you’re
    managing several applications simultaneously within a workspace, you and your
    teams can easily filter Team Development’s data using the tool’s interactive reports.
    That way, each stakeholder sees only the work that is of immediate interest for
    the tasks at hand.


    `Milestones` are the high-level scheduling components of Team Development. They
    can be used to track major and minor releases of an application. Don’t confuse
    milestones with the due dates that are associated with `features` and `to-dos`.
    For example, a milestone could be the scheduled date for a product release, but
    a feature that is included in the release might be due well in advance of the
    milestone date. If you use an agile software-development strategy, milestones
    are well suited to define the time boxes or `sprints`.


    `Features` describe the big picture. At a high level, they describe and track
    progress for the major pieces of functionality that your client has requested.
    Attributes like `owner`, `start date`, `due date`, `summary description`, `priority`,
    `status`, and so on are easily tracked. In addition, you can optionally track
    the status of individual components, such as the `user interface`, `testing`,
    `documentation`, `globalization`, `security`, and `accessibility`. The self-join
    that is associated with features allows you to further subdivide a feature into
    child features as development progresses and the design becomes more refined.
    The high-level nature of features makes them an ideal source for management status
    reports.


    `To-dos` are used to assign detailed work to individuals or teams. Due dates,
    time estimates, and so on are tracked. Like features, to-dos have a self-join
    capability that allows you to subdivide them as more information becomes known
    during the development process. This is handy when a single to-do requires effort
    from more than one team member.


    When a defect is found, it’s reported as a `bug`. Bugs have their own lifecycle
    that includes a rich set of attributes, such as `description`, `resolution`, `release`,
    `assignee`, `context`, and `date` information. When you find a bug that turns
    out to be a design flaw, Team Development allows you to link the bug to multiple
    features, milestones, and to-dos, because the bug fix might require an extended
    timeframe that spans a number of product releases.


    `Feedback` is one of the primary sweet spots of Team Development. The feedback
    mechanism can be installed in an application in a matter of minutes and gives
    the entire team an efficient and elegant communication channel for comments, suggestions,
    issues, defect reports, and responses. Once installed in an application, the feedback
    mechanism is promoted with the application from the development environment to
    the test environment and on to the production environment. Feedback data and the
    related responses are copied back and forth between the various environments via
    the APEX import/export facility. This keeps the developers, testers, and end users
    in close touch with each other. Another key feature of the feedback mechanism
    is that it automatically records all the critical “under the hood” data that end
    users know nothing about. The application context, environment variables, and,
    most important, `session state` are all captured. This data is invaluable when
    you’re diagnosing an issue.


    At first glance, the Team Development entities seem to contain a large number
    of attributes. So, do you have to enter all these attributes in order to use Team
    Development? No. To get the most out of Team Development, you and your team must
    plan how you’re going to use it, with a view to effectively managing the software-development
    process with minimum effort. You can pick a small subset of Team Development’s
    attributes that fit your software-development culture and key into only that subset
    of the data. Interactive reports can easily be customized to display only the
    data that is important to you.


    ## Team Development Interface


    The Team Development interface is consistent with the overall APEX development
    interface. It makes extensive use of `dashboards` so as to quickly give you an
    idea of how your teams are progressing. Drilling into the details to view and
    update the data is fairly straightforward and intuitive. APEX developers will
    have no trouble navigating within the tool or customizing interactive reports.
    Managers, testers, and business analysts will also be able to use Team Development
    after a short training session.'
