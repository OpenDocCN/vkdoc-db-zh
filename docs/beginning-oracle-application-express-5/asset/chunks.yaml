    element can be edited from one of two places. First, you can see the dynamic action
    defined in the tree under the triggering element, as shown in Figure [16-7](#A978-1-4842-0466-5_16_Chapter.html#Fig7).
    However, you can also navigate to the Dynamic Actions tab in the Tree Pane (shown
