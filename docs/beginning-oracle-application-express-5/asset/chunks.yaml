- fmt: '### Adding Reset Pagination


    Any time you add a search item to a page, it’s a very good idea to also add a
    Reset Pagination process. This prevents the APEX reporting engine from losing
    its place in a result set. In this case, there is only one way to create the process,
    as there are no process components in the Gallery:


    Edit Page 200 of the application.

    Navigate to the Processing tab of the Tree Pane.

    Right click on the Processing node of the tree and select Create Process from
    the context menu.

    In the Properties Editor, set the Name to `Reset Pagination Process` and select
    Reset Pagination as the Type, as seen in Figure [6-49](#A978-1-4842-0466-5_6_Chapter.html#Fig49).


    ![A978-1-4842-0466-5_6_Fig49_HTML.jpg](A978-1-4842-0466-5_6_Fig49_HTML.jpg)

    Figure 6-49. Specifying process options


    Save and Run the application.


    The search function should work both when the user presses Enter and when the
    user clicks the Go button. But let’s go one more step and alter the `Subject`
    column so the search term is highlighted in red:


    Edit Page 200 of the application.

    Navigate to the Rendering tree and edit the Subject column by clicking its name.

    In the Properties Editor, find the Column Formatting attributes group and enter
    `&P200_SEARCH.` in the Highlight Words element. Make sure you include the period
    (.) at the end. If you forget it, the variable won’t be parsed correctly, and
    therefore the value won’t be highlighted. This process uses APEX session state
    to indicate that the value the user entered into `P200_SEARCH` should be used
    to highlight that same text in the `Subject` column. Continue as follows:

    Save and Run your application.


    Now, when you enter a search value, the matching rows are returned with the search
    term highlighted in red. In just a few minutes, you’ve created a sortable, searchable
    report for your Help Desk system. Let’s look at what the report looks like behind
    the scenes. Figure [6-50](#A978-1-4842-0466-5_6_Chapter.html#Fig50) shows the
    components as seen from the various tabs of the tree pane.


    ![A978-1-4842-0466-5_6_Fig50_HTML.jpg](A978-1-4842-0466-5_6_Fig50_HTML.jpg)

    Figure 6-50. The searchable report as seen from the various tabs of the tree pane


    ### Looking Behind the Scenes—APEX Report


    Let’s take a closer look at the components and attributes of the Tickets report.
    Edit page 200 to view the Rendering, Processing, and Shared Components tabs of
    the Application Builder. In the Rendering tab, you have a single Tickets region
    that contains report columns, the two items you just added for search capability,
    and a Create button. Click the Tickets region name to select it. Now, in the Properties
    pane, you can see the details shown in Figure [6-51](#A978-1-4842-0466-5_6_Chapter.html#Fig51).


    ![A978-1-4842-0466-5_6_Fig51_HTML.jpg](A978-1-4842-0466-5_6_Fig51_HTML.jpg)

    Figure 6-51. The Tickets report region source with the search filter


    Here you see that the region type is Classic Report. The source for this region
    is your SQL query on the `TICKETS` table with the modified `WHERE` clause to add
    the filter on the `P200_SEARCH` item, referencing `P200_SEARCH` as a bind variable.
    You can use the Code Editor button to get a better view of the SQL statement if
    you like.


    By clicking the Attributes child node in the Rendering tree at the left of the
    page, you are able to view and edit the visual attributes of the report region.
    Also, in the Rendering tree you can see the list of report columns.


    By selecting one (or many) of the columns, you can adjust the heading, column
    width, column alignment, and heading alignment; you can also decide whether the
    column is shown, whether a sum is required, and whether you want to enable sorting
    on the column. The columns may be reordered by dragging and dropping them into
    the order in which you want them.


    In the Shared Components tree, you see the expected objects for the navigation,
    the breadcrumb, and the page, as well as the region, report, label, and button
    templates. It’s nothing new, but be glad the wizard has built these for you.


    Next, let’s focus on the Tickets and Ticket Details forms, the other components
    generated by the Master Detail Form wizard.


    ### Looking Behind the Scenes—APEX Master–Detail Forms


    Edit page 210 to view the Page Rendering, Page Processing, and Shared Components
    regions of the Application Builder. You should see results similar to those shown
    in Figure [6-52](#A978-1-4842-0466-5_6_Chapter.html#Fig52).


    ![A978-1-4842-0466-5_6_Fig52_HTML.jpg](A978-1-4842-0466-5_6_Fig52_HTML.jpg)

    Figure 6-52. Master Detail page as shown from the various tabs of the tree pane


    In the Rendering tab, you have two After Header processes, a Manage Tickets HTML
    region that contains your form items, and a Ticket Details report region.


    The two After Header processes, Fetch Row from TICKETS and Get Next or Previous
    Primary Key Value, do exactly what their names imply. The Fetch Row from TICKETS
    process fetches a row from the `TICKETS` table for display in the form when the
    page passes a `TICKET_ID`. The Get Next or Previous Primary Key Value process
    gets the next or previous `TICKET_ID` value in the series and fires in conjunction
    with the Next and Previous buttons on the master–detail page.


    The Manage Tickets region holds an APEX item for each of the `TICKETS` columns
    you selected to include in the master–detail form, as well as buttons for cancel,
    delete, save, create, next, and previous operations.


    The Ticket Details region is a report region that displays the ticket details
    and a Create button, which redirects you to page 220 in order to create additional
    ticket details.


    In the Processing tab, you see two After Submit branches that return you to this
    same page, an After Submit `P220_TICKET_DETAILS_ID` computation, two processes
    (Process Row of TICKETS and Reset Page), and an After Processing branch to page
    200. The After Submit computation gets the next `TICKET_DETAILS_ID` when you click
    the Create button in the Ticket Details region. The new `TICKET_DETAILS_ID` is
    passed to page 220, the Ticket Details form. The Process Row of TICKETS process
    performs the database DML operations for insert, update, and delete operations
    on the `TICKETS` table. The Reset Page process resets (clears) the elements of
    the page when the Delete button is clicked. The After Processing branch to page
    200 redirects the user to page 200, your `TICKETS` list, on successful processing.


    The Shared Components region includes the by-now familiar APEX elements for your
    page tabs, lists of values, breadcrumbs, and templates.


    Moving to page 220, the Ticket Details form, in the Application Builder, you will
    see elements that look similar to those for the Manage Tickets form on page 210
    (see Figure [6-53](#A978-1-4842-0466-5_6_Chapter.html#Fig53)).


    ![A978-1-4842-0466-5_6_Fig53_HTML.jpg](A978-1-4842-0466-5_6_Fig53_HTML.jpg)

    Figure 6-53. The Ticket Details form as shown from the various tabs of the tree
    pane


    The Rendering tab includes an After Header Fetch Row from TICKET_DETAILS process,
    an HTML region that contains items for each of the `TICKET_DETAILS` columns you
    selected to include in your master–detail form, and buttons for processing.


    The Processing tab includes a Process Row of TICKET_DETAILS process for handling
    inserts, updates, and deletes on the `TICKET_DETAILS` table, a Reset Page process
    to clear the rows on a Delete transaction, and a Go to Page 210 branch that returns
    the user to the Tickets page upon completion of a Ticket Details transaction.


    The Shared Components region on the Ticket Details page includes your page tabs,
    breadcrumbs, and templates.


    Wow! The Master Detail Form wizard created a lot—a fully functional report with
    master–detail forms, all with no code written on your part. This master–detail
    example underlines the time-saving value of the APEX wizards in generating APEX
    components, particularly when creating more complex and multipage components for
    an application.'
