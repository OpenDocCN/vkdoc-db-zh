    \n图 7-71. 为图表设置页面编号、页面名称和区域名称属性\n8.  将“导航首选项”设置为“创建新的导航菜单条目”。页面刷新后，输入 `Chart`\
    \ 作为“选项卡标签”并点击“下一步”（参见图 7-72）。\n\n![A978-1-4842-0466-5_7_Fig72_HTML.jpg](img/A978-1-4842-0466-5_7_Fig72_HTML.jpg)\n\
    \n图 7-72. 为图表设置导航属性\n9.  设置“图表标题”为 `Ticket Statuses` 并点击“下一步”。\n10. 定位并打开文件 `ch7_chart_query.txt`，你可以在解压本书文件的位置找到它。该文件的内容应与此查询类似：\n\
    ```sql\nSELECT\n  'f?p=&APP_ID.:200:' || :APP_SESSION || '::::P200_STATUS_ID:'\
    \ || sl.status_id link,\n  sl.status label,\n  count(*) value\nFROM\n  tickets\
    \ t,\n  status_lookup sl\nWHERE\n  t.status_id = sl.status_id\nGROUP BY\n  sl.status_id,\
    \ sl.status\nORDER BY\n  3 DESC\n```\n11. 将文件 `ch7_chart_query.txt` 的内容粘贴到“输入\
    \ SQL 查询或返回 SQL 查询的 PL/SQL 函数”区域中，或者将上一个查询键入该区域，然后点击“下一步”。\n12. 点击“创建”。\n\n运行页面。你的图表应该与图\
    \ 7-73 中的类似。\n\n![A978-1-4842-0466-5_7_Fig73_HTML.jpg](img/A978-1-4842-0466-5_7_Fig73_HTML.jpg)\n\
    \n图 7-73. Ticket Statuses 图表\n\n### 过滤图表数据\n\n你在 SQL 语句中包含的链接将一个状态值传递到页面 200 的\
    \ `P200_STATUS_ID` 字段。然而，你还没有创建该项。接下来的步骤在页面 200 上创建 `P200_STATUS_ID` 项，以便在点击图表切片时，报告可以根据状态进行过滤：\n\
    \n1.  编辑应用程序的页面 200。\n2.  通过将“组件库”的“项”部分中的“选择列表”项拖到“工单”区域中来创建一个新项。将其放置在 `P200_SEARCH`\
    \ 项和 `P200_GO` 按钮之间，如图 7-74 所示。\n\n![A978-1-4842-0466-5_7_Fig74_HTML.jpg](img/A978-1-4842-0466-5_7_Fig74_HTML.jpg)\n\
    \n图 7-74. 添加一个选择列表项\n3.  在“编辑属性”窗格中，设置“名称”为 `P200_STATUS_ID`，“标签”为 `Status`（参见图\
    \ 7-75）。\n\n![A978-1-4842-0466-5_7_Fig75_HTML.jpg](img/A978-1-4842-0466-5_7_Fig75_HTML.jpg)\n\
    \n图 7-75. 设置名称和标签\n4.  在“值列表”属性组中，设置“类型”为“共享组件”，“值列表”为 `P210_TICKETS_STATUS_ID`，确保“显示空值”设置为“是”，为“空值显示值”输入\
    \ `- All Statuses -`，并为“空值返回值”输入 `%`。\n5.  在“默认值”属性组中，设置“类型”为“静态值”，并为“静态值”输入 `%`，如图\
    \ 7-76 所示。\n\n![A978-1-4842-0466-5_7_Fig76_HTML.jpg](img/A978-1-4842-0466-5_7_Fig76_HTML.jpg)\n\
    \n图 7-76. 设置默认值\n6.  保存你的更改。\n\n同样，默认情况下，“搜索”和“描述”字段的标签被设置为占用布局网格的三列。让我们更改此设置，使它们各只占一列：\n\
    \n1.  多选 `P200_SEARCH` 和 `P200_STATUS_ID`。\n2.  在“编辑属性”窗格中，导航到“网格”属性组，并将“标签列跨度”更改为\
    \ 1。\n3.  保存你的更改。\n\n最后，你必须更改页面 200 上工单报告的查询，以考虑项 `P200_STATUS_ID` 的设置值：\n\n1.\
    \  通过单击其名称来编辑页面 200 上的工单报告。\n2.  将以下行附加到查询末尾并保存你的更改：\n```sql\nAND tickets.status_id\
    \ LIKE :P200_STATUS_ID\n```\n\n现在，运行应用程序并导航到“图表”页面。点击图表中的任何值，该值应传递到“工单”页面并进入状态过滤器。生成的报告应仅显示与图表中点击的状态相对应的记录。\n\
    \n### 探究幕后原理\n\n在应用程序构建器中查看“图表”页面，你可以看到生成的唯一元素是“页面渲染”区域中的“图表”区域，如图 7-77 所示。这个“图表”区域很有趣，因为它包含一个“系列”元素，其中包含你的\
    \ SQL 查询。这个“图表”区域体现了将你的查询传递给 AnyChart 引擎以生成图表的逻辑。\n\n![A978-1-4842-0466-5_7_Fig77_HTML.jpg](img/A978-1-4842-0466-5_7_Fig77_HTML.jpg)\n\
    \n图 7-77. Ticket Statuses 图表的渲染选项卡"
- fmt: '## Summary


    You’ve reviewed most of the APEX forms and report types, and you’ve walked through
    building various forms and reports for the Help Desk system using the APEX form
    and report wizards. You have created an interactive report and made adjustments
    as both a developer and an end user. You’ve been introduced to charts, and you
    added a chart to the application to visualize your ticket status.


    The common theme here is that the APEX form and report wizards are huge time-savers
    for developers, creating all the objects—items, buttons, branches, processes,
    and so on—needed for a working form, report, calendar, or chart. You were able
    to alter the created objects to quickly customize the generated form or report
    to suit your needs. Still, you haven’t strayed far from what APEX builds for you.


    As your application becomes more complex, there will be places where you wish
    to add code to enforce business rules or to perform more complex processing logic
    than a simple insert, update, or delete. To do so, you can use the various programmatic
    elements of APEX. The next chapter will address the topics of validations, computations,
    and processes.


    # 8. Programmatic Elements


    This chapter will cover the programmatic elements that can provide both simple
    and complex features to the APEX framework. APEX provides simple declarative features
    with wizards to guide you. Because of its integration with the database, APEX
    can also use the full power of the PL/SQL engine inside the Oracle database. As
    of the implementation of APEX 4, even JavaScript interactivity has been made declarative
    and extendable in the framework.


    ## Conditions


    Throughout the building of the Help Desk application, there will be times when
    you want to take advantage of the conditional logic available with APEX components.
    Rather than try to understand every type of condition (there are around 60 in
    the list of condition types), you should focus mainly on grasping the concept
    of a condition in general.


    The condition feature provides a place where logic can turn on or off a particular
    piece of APEX technology. Before action is taken to display or execute a particular
    APEX component, the condition applied to that component is evaluated for a `TRUE`,
    or positive, result.


    The logic options available to develop a condition are very broad. The condition
    type defines the particular mechanics used to evaluate the condition, using parameters
    as appropriate. Simple page-item comparisons are the easiest to explain. For example,
    a process may only need to be run if a particular page item has a value. In the
    case of sending an email, an attempt to send a message should be made only if
    an email address is given. From that simple start, conditions can become as complex
    as you need them to be. In advanced cases, conditions can also include browser
    and web server options.


    Take time to review the condition types that are available and become familiar
    with their usage. It isn’t as important to understand the technical implementation
    or syntax of each item as much as what options make up a single condition. This
    familiarity will be helpful when you start defining APEX components and understanding
    considerations for a flexible and modular application design.


    ## Required Values


    Requiring a value is a common need, and APEX 5.0 supports required values through
    what is essentially a `NOT NULL` flag at the page-item level. You don’t need to
    create a full-blown validation (discussed next) to make an item required. You
    must simply make a choice from a toggle item.


    Continuing with the Help Desk application, let’s implement a Value Required validation
    on the Description field:


    ```

    Edit Page 210 of the application.

    Edit the P210_DESCR page item.

    In the Validation attribute group, change Value Required to Yes, as shown in Figure
    8-1. (Depending on how you set up your UI Defaults, Value Required may already
    be set to Yes.)

    ```


    ![A978-1-4842-0466-5_8_Fig1_HTML.jpg](A978-1-4842-0466-5_8_Fig1_HTML.jpg)


    Figure 8-1. Requiring a value to be present


    ```

    Save your changes.

    ```


    To test the new validation, start by creating a ticket. Before you enter any values,
    click the Create button. Figure 8-2 shows the expected results with both a consolidated
    page-validation message box and item-validation messages.


    ![A978-1-4842-0466-5_8_Fig2_HTML.jpg](A978-1-4842-0466-5_8_Fig2_HTML.jpg)


    Figure 8-2. Validation showing required values for two elements both inline and
    consolidated at the page level


    In the application, the Subject element was already set up with a value requiring
    validation. This was done because, when you created the form using the wizard,
    APEX took into account the `NOT NULL` property of the column at the table level.
    You also see that the APEX wizard chose an item label template that includes an
    asterisk (*) at the beginning of the label text. This gives the end user the visual
    clue that the column is required. Be careful, however, that you don’t mistake
    choosing a label that indicates that the field is required for actually making
    the field required using either the `VALUE_REQUIRED` attribute or a validation.


    The error messages for multiple validations are cumulative. You see all validation
    messages when a page is processed. See Figure 8-2.


    > **Note**

    >

    > The message text shown is a default and can be replaced by application-specific
    text as a feature of globalization in the Shared Components area. There is only
    a single default for the entire application per language. When you need custom
    messages in a single-language application, I recommend using standard validation
    types that allow a different message for each validation you create.


    ## Validations


    The purpose of validations is to assist in providing data quality and to ensure
    the integrity of data entered by the user. Mechanically, validations are tests
    that evaluate to `TRUE` or `FALSE`. Validations are evaluated when a page is processed
    or submitted. All of the validations are evaluated; a `FALSE` return from any
    one of them prevents additional page processes from executing and, ideally, results
    in feedback to the user. Validations can also be executed on the client side using
    JavaScript. Although the interactive nature of JavaScript can be very attractive
    in the user interface, it can also be circumvented easily. Any validations that
    are executed in JavaScript should also be supported with appropriate validations
    during page processing or at the database level.


    > **Note**

    >

    > It’s a good practice to assume that every transaction is malicious. It’s possible
    to implement validations strictly for security purposes, but sometimes it’s difficult
    to step away from a process enough to identify where weak points may exist. For
    example, in a shopping-cart application, what would happen to the total if someone
    ordered -1 of a product? Would they automatically get a credit? Take extra time
    in the development process to look at your application so as to identify where
    security weaknesses may exist and to implement features that make it generally
    more robust and secure.


    There are four types of validations: item level, page level, and, for tabular
    forms, column level and row level. Item-level validations operate against a single
    APEX item. Page-level validations are used when multiple items are involved in
    validating the condition. Tabular form validations behave similarly but are done
    against the columns and rows of the tabular form. You use an example of each in
    the Help Desk application.'
