  trans: '

    ## APEX 主页


    APEX 主页（参见图 15-2）清楚地表明了 `团队开发` 对 APEX 团队的重要性。APEX 团队本可以轻易地将 `团队开发` 放在主页某个次要链接下。相反，`团队开发`
    被提升为一个显著的模块，与 `应用程序构建器` 和 `SQL 工作坊` 处于同等重要的地位。


    ![A978-1-4842-0466-5_15_Fig2_HTML.jpg](img/A978-1-4842-0466-5_15_Fig2_HTML.jpg)

    图 15-2.


    APEX 主页


    APEX 主页突出了其便捷的导航。`新闻与消息` 区域将用于存放工作区级别的消息以及直接来自 `团队开发` 的新闻，其中包含两个链接（`创建新闻项` 和 `编辑新闻项`），使用户能够快速更改该区域内容，而无需深入子页面。在右侧的
    `仪表板` 区域中，你会看到其中一个指标是 `特性`。右侧的区域通常包含更多可用信息或开发人员可用的任务列表。在整个 `团队开发` 界面中留意类似的链接；它们非常方便。


    ## 团队开发主页


    `团队开发` 主页（参见图 15-3）有两个用途。首先，它包含指向所有详细实体区域的链接；其次，它为你展示了每个实体的仪表板。你还会看到指向 `实用工具`
    的链接，本章末尾的“`团队开发实用工具`”一节将对此进行讨论。


    ![A978-1-4842-0466-5_15_Fig3_HTML.jpg](img/A978-1-4842-0466-5_15_Fig3_HTML.jpg)

    图 15-3.


    团队开发主页


    主要的 `团队开发` 仪表板页面提供了该模块活动的高层概览。用户可以从此处添加新项目，或直接导航到 `团队开发` 各个领域的详细仪表板。


    详细仪表板可以根据 `负责人`、`版本` 和 `应用` 的组合进行筛选，具体取决于领域。这些筛选器使用户可以轻松地根据需求自定义页面。例如，经理可以问：“我们做得怎么样？”，而开发人员可以问：“我需要为这个版本做什么？”
    这个高层筛选区域位于与每个 `团队开发` 实体关联的仪表板页面顶部。筛选字段根据每个实体量身定制。仪表板区域链接到其底层实体。每个标题中都有 `添加` 和
    `编辑` 图标，以及每个项目类型的饼图；点击其中任何一项，你都会被带到相应项目的适当报告页面、`创建` 页面或 `编辑` 页面。


    ## 通用设计元素


    当你深入各个 `团队开发` 实体时，会发现一些通用的设计元素，这些元素帮助你在实体之间快速、直观地导航。图 15-4 突出了这些设计元素。左上角是一组为每个实体定制的选项卡。其中一些选项卡——`仪表板`、`报告`
    和 `日历`——是所有实体通用的。另一些则是特定实体独有的。


    ![A978-1-4842-0466-5_15_Fig4_HTML.jpg](img/A978-1-4842-0466-5_15_Fig4_HTML.jpg)

    图 15-4.


    所有实体通用的 GUI 设计元素


    所有的仪表板页面都包含一个为实体量身定制的 `筛选` 区域。筛选器的选择列表只包含 `团队开发` 正在跟踪的实体条目。例如，如果某个 `应用` 没有任何关联的
    `特性`，那么该 `应用` 就不会出现在选择列表中。


    许多独立的仪表板区域包含链接，这些链接将你带到实体的 `报告` 页面，并自动在 `详情` 页面的 `交互式报告` 上设置筛选器，以便你只能看到与所选仪表板项目相关的实体记录。一旦你习惯了这种导航策略，就会觉得它极其方便。


    ## 下钻功能


    `日历` 选项卡（参见图 15-5）根据实体记录的到期日显示指向单个实体记录的链接。点击条目的链接会直接带你到所选实体记录的 `编辑` 页面。在 `编辑`
    页面点击 `取消` 按钮会返回到日历。


    ![A978-1-4842-0466-5_15_Fig5_HTML.jpg](img/A978-1-4842-0466-5_15_Fig5_HTML.jpg)

    图 15-5.


    带有指向编辑页面链接的日历


    一些实体选项卡以图形方式显示其数据（参见图 15-6）。点击图表会自动带你进入实体的 `详情` 页面，并将 `交互式报告` 设置为仅显示图表中所选的数据。


    ![A978-1-4842-0466-5_15_Fig6_HTML.jpg](img/A978-1-4842-0466-5_15_Fig6_HTML.jpg)

    图 15-6.


    图形化数据摘要


    ## 标签


    一个名为 `标签` 的强大组织属性与所有实体相关联。标签是一种自由格式的文本输入，使你能够通过关键字对记录进行分组。这很方便，因为有些记录分组并不适合整齐划一的关系数据模型。例如，你可能希望在所有
    `应用` 中查找包含“穿梭”项的所有 `特性`。通过为这些 `特性` 添加标签“穿梭”，你可以使用 `交互式报告` 的 `搜索` 字段来查找所有包含“穿梭”标签的记录。所有仪表板页面都包含一个区域，显示其各自实体中定义的标签字符串。这使你能够快速发现并纠正拼写错误，从而保持自由格式标签的准确性。


    ## 克服最初的不适应


    起初，`团队开发` 的组织结构、布局和导航可能看起来有点奇怪且不直观。我最初也确实为此困扰过。我最初的感知可能源于我之前使用项目管理工具的经验，那些工具通常左侧是工作分解结构页面，右侧是甘特图。


    最初对 `团队开发` 的不适应感，类似于我初次使用 APEX 时的体验。和许多经验丰富的开发人员一样，我来自这样的开发环境：屏幕小部件列在左侧并拖放到屏幕上，X-Y
    坐标与小部件的高度和宽度一起设置，达到像素级的精度。


    当我第一次使用 APEX 时，花了一些时间才习惯 APEX 构建页面的方式。尝试几次后，我学会了喜爱这个产品。我相信你对 `团队开发` 也会有同样的感受。经过一些实践后，你会发现
    `交互式报告` 实际上是甘特图的一个实用替代方案，尤其是在敏捷软件开发环境中，时间盒很短，`交互式报告` 中的列表也相应较小。

