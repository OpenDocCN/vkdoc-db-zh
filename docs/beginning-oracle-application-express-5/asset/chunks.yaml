    创建基于过程的表单与创建基于表的表单几乎相同。你将创建一个新页面，其中包含一个基于 `CONTACT_US` 存储过程的表单，该过程是在 第 4 章 的练习中创建的，它使用户能够通过
    Help Desk 应用程序联系你：


    1.  导航到你的应用程序开发主页。

    2.  点击屏幕右上角的 Create Page 按钮。

    3.  选择 Form，然后点击 Next。

    4.  选择 Form on a Procedure，然后点击 Next。

    5.  将 Procedure Owner 设置为你的模式，为 Stored Procedure Name 输入 `CONTACT_US`，如图 6-19
    所示，然后点击 Next。


    ![A978-1-4842-0466-5_6_Fig19_HTML.jpg](img/A978-1-4842-0466-5_6_Fig19_HTML.jpg)

    **图 6-19.** 创建基于存储过程的表单


    6.  在页面的顶部区域，为 Page Number 输入 `3`，为 Page Name 和 Region Name 都输入 `Contact Us`，并将
    Breadcrumb 设置为 Breadcrumb。当区域刷新后，选择 Home (Page 1) 将其设置为 Parent Entry，如图 6-20 所示，然后点击
    Next。


    ![A978-1-4842-0466-5_6_Fig20_HTML.jpg](img/A978-1-4842-0466-5_6_Fig20_HTML.jpg)

    **图 6-20.** 选择面包屑父条目


    7.  对于 Navigation Preferences，选择 Identify an existing navigation menu entry for
    this page。页面刷新后，将 Existing Navigation Menu Entry 设置为 Home，然后点击 Next。

    8.  将 Invoking Page 和 Button Label 留空，然后点击 Next。

    9.  为 Branch here on Submit 和 Branch here on Cancel 都输入 `1`，如图 6-21 所示。然后点击 Next。


    ![A978-1-4842-0466-5_6_Fig21_HTML.jpg](img/A978-1-4842-0466-5_6_Fig21_HTML.jpg)

    **图 6-21.** 指定分支选项


    10. 在图 6-22 的对话框中，将 `P_FROM` 的 Label 设置为 From。将 P_BODY 的 Label 设置为 `Body`。将 P_BODY
    的 Display Type 设置为 Textarea，然后点击 Next。


    ![A978-1-4842-0466-5_6_Fig22_HTML.jpg](img/A978-1-4842-0466-5_6_Fig22_HTML.jpg)

    **图 6-22.** 指定过程参数


    11. 点击 Create。'
- fmt: '### Modifying a Form on a Procedure


    Once again, the wizard has done most of the work, but you have a few minor changes
    to make before your form on a procedure is complete. You want both the `From`
    and `Message` values to be required, so you need to change their label templates
    and set their `Value Required` attribute to `Yes`. This time we’re going to use
    a new feature in APEX 5.0 that allows us to edit the properties of multiple components
    at once. Do the following:


    Edit Page 3 of the application.

    Select `P3_FROM` by clicking its name.

    Holding the CTRL key (or Command key on Mac) select `P3_BODY` by clicking its
    name. At this point both elements should be selected. Now, if you look at the
    Properties Editor, you’ll see that there are several options that have a blue
    background and a grey Delta (Δ) symbol just to the left of the label. This indicates
    that the components you have selected have different values for these options.
    It’s simply a visual clue so that you know that the fields may not in fact be
    blank, but that APEX can’t display the varying values between the components.
    We’ll continue by change the common attributes as follows:


    In the `Appearance` attribute group, change `Template` to `Required`.

    In the `Validation` attribute group, change `Value Required` to `Yes`.

    We now want to change a few attributes only for `P3_BODY`. So we’ll have to de-select
    everything else so we don’t accidentally change their attributes as well. Remember,
    as long as you haven’t clicked the `Save` button, you can always use the `Undo`
    button to step back through what you’ve done. To select `P3_BODY` and de-select
    everything else:


    In the Rendering tab of the Tree Pane, click on `P3_BODY`.

    In the `Appearance` attribute group, set `Width` to `80` and `Height` to `5`.

    Next, set page 3 to be a public page. You want any user—authenticated or otherwise—to
    be able to send you a message through the Contact Us page:


    Set Page 3 to be a public page. Refer back to [Chapter 5](#A978-1-4842-0466-5_5_Chapter.html)
    for detailed steps.

    Finally, modify the process that was created to include a success message:


    Switch to the Processing tab of the Tree Pane.

    Edit the process `Run Stored Procedure` by clicking its name.

    In the `Success Messages` attribute group, enter the following for the `Success
    Message`: `Your message has been sent.`

    Scroll to the top and click `Save`.


    Run your application and test the Contact Us form. Each time you submit a record,
    an email is sent to `info@example.com`. If you want to change the destination
    address for the email, you can use the SQL Workshop’s Object Browser to edit the
    `CONTACT_US` procedure.


    ### Looking Behind the Scenes


    From the user perspective, there is no indication that the form you’ve just created
    was created on a procedure. Looking in the Page Builder, the objects in the Page
    Rendering sections are similar to what you saw in your form on a table on page
    2, but not exactly. Let’s take a look to see what makes your form on a procedure
    different from the form on a table. Edit page 3 of your application. The different
    tabs of the tree pane are represented in Figure [6-23](#A978-1-4842-0466-5_6_Chapter.html#Fig23).


    ![A978-1-4842-0466-5_6_Fig23_HTML.jpg](A978-1-4842-0466-5_6_Fig23_HTML.jpg)


    Figure 6-23. Elements of a form on a procedure as viewed from the Page Builder’s
    various tree panes


    In the Rendering tab, you have two items, `P3_FROM` and `P3_BODY`, corresponding
    to your two form fields, From and Body. There are two buttons, `CANCEL` and `SUBMIT`.


    In the Processing tab are a process and a branch. However, the process is a different
    type—a PL/SQL anonymous block. This powerful type of process executes the PL/SQL
    procedure specified in the Source element. The PL/SQL procedure can be a stored
    PL/SQL procedure or an anonymous PL/SQL block, as long as the code is syntactically
    correct between a `BEGIN` statement and an `END` statement. In this case, the
    process calls the `CONTACT_US` procedure using the `P3_FROM` and `P3_BODY` item
    values as input parameters. The body of the `CONTACT_US` procedure is what creates
    and sends an email. Thus, the key difference between the form on a table and the
    form on a procedure is in the page-processing process that is executed on a click
    of the Create button. The APEX wizard has automatically provided the process type
    required for the selected form type.


    The Shared Components region contains the standard entries for the table, breadcrumb
    and page, tab, region, label, and button templates, the same as for the form on
    a table. Again, it was nice of the form wizard to create all these elements for
    you.


    ## Master–Detail Report and Form


    One of the most popular features in APEX is the Master Detail Form wizard. With
    a single, simple wizard, you can quickly create a report and corresponding forms
    to manage data stored in a master–detail fashion. Let’s use this wizard to create
    a report and forms for the `TICKETS` and `TICKET_DETAILS` tables.'
