    to Existing Trigger for the detail table, and click Next.   Set Include master
    row navigation? to Yes, as shown in Figure [6-26](#A978-1-4842-0466-5_6_Chapter.html#Fig26).
    Set Master Row Navigation Order to CREATED_ON, and click Next.


    ![A978-1-4842-0466-5_6_Fig26_HTML.jpg](A978-1-4842-0466-5_6_Fig26_HTML.jpg)


    Figure 6-26.


    Defining master-row navigation options Do not click Finish at this point.   Set
    Build Master Detail with to Edit Detail on Separate Page, and click Next.   On
    the next page, set the items to the values shown in Figure [6-27](#A978-1-4842-0466-5_6_Chapter.html#Fig27).


    ![A978-1-4842-0466-5_6_Fig27_HTML.jpg](A978-1-4842-0466-5_6_Fig27_HTML.jpg)


    Figure 6-27.


    Specifying page attributes   Set Breadcrumb to Breadcrumb.   Once the region refreshes,
    in the Create Breadcrumb Entry section, set the items to the values shown in Figure
    [6-28](#A978-1-4842-0466-5_6_Chapter.html#Fig28).


    ![A978-1-4842-0466-5_6_Fig28_HTML.jpg](A978-1-4842-0466-5_6_Fig28_HTML.jpg)


    Figure 6-28.


    Creating a breadcrumb entry   Click Next.   Set the Navigation Preference in Figure
    [6-29](#A978-1-4842-0466-5_6_Chapter.html#Fig29) to Create a new navigation menu
    entry. When the page refreshes, enter `Tickets` for New Navigation Menu Entry
    and leave the Parent Navigation Menu Entry set to `- No parent selected -` then
    click Next.


    ![A978-1-4842-0466-5_6_Fig29_HTML.jpg](A978-1-4842-0466-5_6_Fig29_HTML.jpg)


    Figure 6-29.


    Setting navigation options   Confirm your selections, and click Create.


    When the wizard completes, you have a working master–detail form on the `TICKETS`
    and `TICKET_DETAILS` tables, plus a report on the `TICKETS` table. This is perhaps
    one report more than you expected, but APEX knows that in most cases, you need
    the report to select the master–detail record to be edited, so that report is
    created at the same time for convenience. The Master Detail Form wizard created
    one report and two forms, plus the links and branches for navigation and the processes
    for performing database transactions. The Tickets report has a link to the Tickets
    form, which allows editing of ticket master data and lists ticket details. The
    Ticket Details region on the Manage Tickets page has an Edit link to the Ticket
    Detail modal dialog, where the user can add, update, or delete ticket detail information.
    All the items, buttons, processes, and even the column links were created by the
    Master Detail Form wizard.


    Again, although you can build a master–detail form and report manually, the wizard
    is much faster and certainly more efficient. Now, let’s make some adjustments
    to the report and the forms to suit your requirements.'
  trans: "### 创建主从报表与表单\n\n首先，您需要在应用程序的第 200、210 和 220 页上创建报表和表单。由于您尚未创建这些页面，向导会为您完成。\n\
    \n1.  导航至您应用程序的 Application Builder 主页。\n2.  点击屏幕右上角的 **创建页面** 按钮。\n3.  选择 **表单**，然后点击\
    \ **下一步**。\n4.  选择 **主从表单**，然后点击 **下一步**。参见图 6-24。\n5.  将 **表/视图所有者** 设置为您的 schema。\n\
    6.  将 **表/视图名称** 设置为 `TICKETS`（表）。页面刷新后，默认会选中该表中的所有列。点击 **下一步**。\n\n![A978-1-4842-0466-5_6_Fig24_HTML.jpg](img/A978-1-4842-0466-5_6_Fig24_HTML.jpg)\n\
    *图 6-24. 创建主表*\n\n处理主从关系时，通常在明细表和主表之间存在外键。然而，情况并非总是如此。在明细表步骤中，向导允许您选择是否只显示通过外键关联的表。本例中，这些表确实存在关联，因此您可以保持\
    \ **仅显示相关表** 设置为 **是**。\n\n7.  为 **表/视图名称** 选择 `TICKET_DETAILS`。页面刷新后，请确保以下列被移至右侧的\
    \ **已选中** 区域。最终结果应与图 6-25 类似。\n\n    *   `TICKET_DETAILS_ID`\n    *   `TICKET_ID`\n\
    \    *   `DETAILS`\n    *   `CREATED_BY`\n    *   `CREATED_ON`\n    *   `ATTACHMENT`\n\
    \n![A978-1-4842-0466-5_6_Fig25_HTML.jpg](img/A978-1-4842-0466-5_6_Fig25_HTML.jpg)\n\
    *图 6-25. 定义明细表*\n\n8.  点击 **下一步**。\n9.  将主表的 **主键类型** 设置为 **选择主键列**。\n10. 对于 **主键列\
    \ 1**，选择 `TICKET_ID`（数字）。\n11. 将明细表的 **主键类型** 设置为 **选择主键列**。\n12. 对于 **主键列 1**，选择\
    \ `TICKET_DETAILS_ID`（数字）。\n13. 点击 **下一步**。\n14. 将主表的 **主键源** 设置为 **现有触发器**，然后点击\
    \ **下一步**。\n15. 将明细表的 **主键源** 设置为 **现有触发器**，然后点击 **下一步**。\n16. 如图 6-26 所示，将 **包含主行导航？**\
    \ 设置为 **是**。\n17. 将 **主行导航顺序** 设置为 `CREATED_ON`，然后点击 **下一步**。\n\n![A978-1-4842-0466-5_6_Fig26_HTML.jpg](img/A978-1-4842-0466-5_6_Fig26_HTML.jpg)\n\
    *图 6-26. 定义主行导航选项*\n\n**此时请勿点击完成。**\n\n18. 将 **使用以下项构建主从关系** 设置为 **在单独页面编辑明细**，然后点击\
    \ **下一步**。\n19. 在下一页，将各项设置为图 6-27 所示的值。\n\n![A978-1-4842-0466-5_6_Fig27_HTML.jpg](img/A978-1-4842-0466-5_6_Fig27_HTML.jpg)\n\
    *图 6-27. 指定页面属性*\n\n20. 将 **面包屑** 设置为 **面包屑**。\n21. 区域刷新后，在 **创建面包屑条目** 部分，将各项设置为图\
    \ 6-28 所示的值。\n\n![A978-1-4842-0466-5_6_Fig28_HTML.jpg](img/A978-1-4842-0466-5_6_Fig28_HTML.jpg)\n\
    *图 6-28. 创建面包屑条目*\n\n22. 点击 **下一步**。\n23. 将图 6-29 中的 **导航首选项** 设置为 **创建新的导航菜单项**。\n\
    24. 页面刷新后，在 **新建导航菜单项** 中输入 `Tickets`，并将 **父导航菜单项** 保持为 `- 未选择父项 -`。\n25. 点击 **下一步**。\n\
    \n![A978-1-4842-0466-5_6_Fig29_HTML.jpg](img/A978-1-4842-0466-5_6_Fig29_HTML.jpg)\n\
    *图 6-29. 设置导航选项*\n\n26. 确认您的选择，然后点击 **创建**。\n\n向导完成后，您将获得一个基于 `TICKETS` 和 `TICKET_DETAILS`\
    \ 表的可用主从表单，以及一个基于 `TICKETS` 表的报表。这可能比您预期的多了一个报表，但 APEX 知道在大多数情况下，您需要报表来选择要编辑的主从记录，因此为方便起见，同时创建了该报表。\n\
    \n主从表单向导创建了一个报表和两个表单，以及用于导航的链接和分支，还有执行数据库事务的进程。**工单** 报表有一个指向**工单** 表单的链接，该表单允许编辑工单主数据并列出工单明细。**管理工单**\
    \ 页面上的 **工单明细** 区域有一个指向**工单明细** 模态对话框的 **编辑** 链接，用户可以在其中添加、更新或删除工单明细信息。所有项目、按钮、进程甚至列链接均由主从表单向导创建。\n\
    \n再次强调，虽然您可以手动构建主从表单和报表，但向导速度更快且效率更高。现在，让我们对报表和表单进行一些调整以满足您的要求。"
- fmt: "# Modifying a Master-Detail Report\n\nNext, let’s modify the report to add\
    \ CSV export capabilities, change the sorting options, and modify the date format\
    \ mask. Then we’ll clean up the two edit forms. Here are the steps:\n\n1.  Edit\
    \ Page `200` of your application.\n2.  In the Rendering tab of the Tree Pane,\
    \ highlight all columns of the `Tickets` report except for `TICKET_ID` and `DESCR`,\
    \ as shown in Figure [6-30](#A978-1-4842-0466-5_6_Chapter.html#Fig30).\n    ![A978-1-4842-0466-5_6_Fig30_HTML.jpg](A978-1-4842-0466-5_6_Fig30_HTML.jpg)\n\
    \    *Figure 6-30. Choosing to edit report attributes*\n3.  In the Properties\
    \ Editor, navigate to the Sorting attribute group and set `Sortable` to `Yes`.\n\
    4.  Select the `DESCR` column of the report and in the Properties Editor, change\
    \ the `Type` to `Hidden Column`. See Figure [6-31](#A978-1-4842-0466-5_6_Chapter.html#Fig31).\n\
    \    ![A978-1-4842-0466-5_6_Fig31_HTML.jpg](A978-1-4842-0466-5_6_Fig31_HTML.jpg)\n\
    \    *Figure 6-31. Editing column attributes*\n5.  In the Rendering tab of the\
    \ Tree Pane, click the `Tickets` report’s Attributes child node.\n6.  In the Properties\
    \ Editor, navigate to the Pagination attribute group and set `Partial Page Refresh`\
    \ to `Yes`.\n7.  In the Download attribute group, set `CSV Export Enabled` to\
    \ `Yes`. Once the section refreshes, set the following options, which you can\
    \ also see in Figure [6-32](#A978-1-4842-0466-5_6_Chapter.html#Fig32):\n    ![A978-1-4842-0466-5_6_Fig32_HTML.jpg](A978-1-4842-0466-5_6_Fig32_HTML.jpg)\n\
    \    *Figure 6-32. Setting report export options*\n    *   `Separator`: `,`\n\
    \    *   `Enclosed By`: `\"`\n    *   `Link Text`: `Export to Excel`\n    *  \
    \ `Filename`: `tickets.csv`\n8.  In the Rendering tab of the Tree Pane, edit the\
    \ `CREATED_ON` column by clicking on its name.\n9.  In the Appearance attributes\
    \ group, use the pop-up list of values to select `Monday, 12 January, 2004` as\
    \ the `Format Mask`. Selecting it returns `fmDay,fmDD fmMonth,YYYY` into the Number/Date\
    \ Format field, as shown in Figure [6-33](#A978-1-4842-0466-5_6_Chapter.html#Fig33).\n\
    \    ![A978-1-4842-0466-5_6_Fig33_HTML.jpg](A978-1-4842-0466-5_6_Fig33_HTML.jpg)\n\
    \    *Figure 6-33. Selecting a date format mask*\n10. CSS and HTML formatting\
    \ directives entered in the Column Formatting properties group are applied to\
    \ the report column when the page is rendered. In the Column Formatting properties\
    \ group, enter `font-weight:bold` for the CSS Style field (Figure [6-34](#A978-1-4842-0466-5_6_Chapter.html#Fig34)).\n\
    \    ![A978-1-4842-0466-5_6_Fig34_HTML.jpg](A978-1-4842-0466-5_6_Fig34_HTML.jpg)\n\
    \    *Figure 6-34. Choosing column formatting options*\n11. Edit the `TICKET_ID`\
    \ column by clicking its name.\n12. In the Export/Printing attributes group, set\
    \ `Include in Export / Print` to `No` and click Save.\n13. Run the page to view\
    \ your changes.\n\nNote that when you sort an APEX report column by date, the\
    \ report sorts based on the value of the actual date, not the displayed value.\
    \ This is a built-in feature of APEX. Also, when you export to Excel, the `TICKET_ID`\
    \ column isn’t part of the resulting CSV file, which is the result of your setting\
    \ the `Include in Export` option to `No`.\n\nNext, remove `STATUS_ID` and replace\
    \ it with the corresponding value, pulled into the report by a slight adjustment\
    \ to your query:\n\n1.  Edit Page `200` in your application.\n2.  Edit the `Tickets`\
    \ report by clicking the region’s name in the Rendering tree.\n3.  In the Source\
    \ attributes group, click the Code Editor button in the upper right, near the\
    \ SQL Query definition. This will expand an editor window, allowing you to better\
    \ edit the SQL statement.\n4.  Locate and open the file `ch6_add_status_to_report.txt`,\
    \ which you can find where you extracted the class files earlier, and copy the\
    \ contents into Code Editor, replacing all text that is currently there, and click\
    \ OK to dismiss Code Editor. See Figure [6-35](#A978-1-4842-0466-5_6_Chapter.html#Fig35).\n\
    \    ![A978-1-4842-0466-5_6_Fig35_HTML.jpg](A978-1-4842-0466-5_6_Fig35_HTML.jpg)\n\
    \    *Figure 6-35. Pasting the new query text into Code Editor*\n\nNow, we’ll\
    \ reorder the columns in the report by using simple drag and drop. In this case,\
    \ we want to move the `STATUS` column just between the `TICKET_ID` and `SUBJECT`\
    \ columns. You can do this as follows:\n\n1.  In the Rendering tree, click and\
    \ drag the `STATUS` column from the bottom of the list and drop when the indicator\
    \ shows its position to be between the `TICKET_ID` and `SUBJECT`, as shown in\
    \ Figure [6-36](#A978-1-4842-0466-5_6_Chapter.html#Fig36).\n    ![A978-1-4842-0466-5_6_Fig36_HTML.jpg](A978-1-4842-0466-5_6_Fig36_HTML.jpg)\n\
    \    *Figure 6-36. Using drag and drop to re-order columns in a report*\n2.  Save\
    \ your changes.\n\nRun the application to see the changes to the `Tickets` report.\
    \ You should see results like those in Figures [6-37](#A978-1-4842-0466-5_6_Chapter.html#Fig37)\
    \ through [6-39](#A978-1-4842-0466-5_6_Chapter.html#Fig39). The Created On and\
    \ Status values are now more readable, and you can sort by column by clicking\
    \ the column heading.\n![A978-1-4842-0466-5_6_Fig37_HTML.jpg](A978-1-4842-0466-5_6_Fig37_HTML.jpg)\n\
    *Figure 6-37. The Tickets report*\n![A978-1-4842-0466-5_6_Fig38_HTML.jpg](A978-1-4842-0466-5_6_Fig38_HTML.jpg)\n\
    *Figure 6-38. The Manage Tickets form*\n![A978-1-4842-0466-5_6_Fig39_HTML.jpg](A978-1-4842-0466-5_6_Fig39_HTML.jpg)\n\
    *Figure 6-39. The Ticket Details form*\n\n## Session State\n\nNext, let’s add\
    \ a Search field to the report to allow users to filter for a specific ticket\
    \ they may be interested in. Before we do, here’s a brief explanation of session\
    \ state to help you understand how APEX keeps track of the values associated with\
    \ a user’s session.\n\n### Understanding Session State\n\nSession state is what\
    \ allows APEX to keep track of all the values that belong in a particular user’s\
    \ APEX session. Session state is particularly useful for keeping track of values\
    \ as a user moves from page to page in the application.\n\nUnlike a stateful database\
    \ application, where a connection is maintained continuously and all values are\
    \ retained until changed or removed or until the session ends, an APEX application\
    \ doesn’t maintain a continuous connection to the database. APEX is a stateless\
    \ system—the APEX engine generates HTML pages based on directives stored in the\
    \ APEX repository. Each page-rendering is a stateless transaction. An APEX session\
    \ ties the stateless HTML pages together.\n\nAn APEX session is logically and\
    \ physically distinct from the underlying database session. A database session\
    \ is stateful, and an APEX session is stateless. To illustrate the difference,\
    \ think of a database session as a phone call on a land line. The parties are\
    \ connected for the duration of the conversation. Both parties have to invest\
    \ resources to carry on a conversation. Even if no one is talking, the connection—and\
    \ the link between the two parties—remains, as shown in Figure [6-40](#A978-1-4842-0466-5_6_Chapter.html#Fig40).\n\
    ![A978-1-4842-0466-5_6_Fig40_HTML.gif](A978-1-4842-0466-5_6_Fig40_HTML.gif)\n\
    *Figure 6-40. Database session communication*\n\nThink of an APEX session as a\
    \ text message. The parties aren’t directly connected; they push information in\
    \ one direction at a time, even if the communication is an entire conversation\
    \ via a series of texts. Figure [6-41](#A978-1-4842-0466-5_6_Chapter.html#Fig41)\
    \ illustrates APEX stateless session communication.\n![A978-1-4842-0466-5_6_Fig41_HTML.gif](A978-1-4842-0466-5_6_Fig41_HTML.gif)\n\
    *Figure 6-41. APEX session communication*"
