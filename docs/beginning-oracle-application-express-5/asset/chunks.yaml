  trans: '

    #### 添加属性与移除列


    让我们再次查看您的交互式报表。您可以结合使用交互式报表的最终用户操作与开发者设置来完成修改。首先，通过操作菜单从报表中移除一列并添加排序属性：


    运行应用程序并导航至 `Analysis` 菜单项。

    单击 `Actions` 按钮以显示操作菜单。

    选择 `Select Columns` 选项，如图 7-47 所示。


    ![A978-1-4842-0466-5_7_Fig47_HTML.jpg](img/A978-1-4842-0466-5_7_Fig47_HTML.jpg)


    **图 7-47. 选择“选择列”选项**


    将 `Ticket Id` 移动到穿梭框的 `Do Not Display` 部分，如图 7-48 所示，方法是双击其名称。


    ![A978-1-4842-0466-5_7_Fig48_HTML.jpg](img/A978-1-4842-0466-5_7_Fig48_HTML.jpg)


    **图 7-48. 选择列**


    使用上下箭头，重新排序剩余列，使 `Status` 出现在 `Subject` 之后、`Description` 之前，如图 7-48 中的 `Display
    in Report` 部分所示，然后单击 `Apply`。请注意，`Ticket Id` 列不再显示在您的报表中，而 `Status` 列紧接在 `Subject`
    列之后显示。


    接下来，您可以将更改设置为交互式报表的默认选项。这些选项将应用于使用该交互式报表的所有最终用户。`Save As Default Report Settings`
    选项仅对身为 APEX 开发者的最终用户可用：


    单击 `Actions` 按钮并选择 `Save Report` 项。

    将 `Save` 设置为 `As Default Report Settings`，如图 7-49 所示。


    ![A978-1-4842-0466-5_7_Fig49_HTML.jpg](img/A978-1-4842-0466-5_7_Fig49_HTML.jpg)


    **图 7-49. “另存为默认报表设置”选项**


    该区域会立即变化，允许您将报表保存为主要默认值或命名的替代项。将其设置为 `Primary default`，如图 7-50 所示。点击 `Apply`。


    ![A978-1-4842-0466-5_7_Fig50_HTML.jpg](img/A978-1-4842-0466-5_7_Fig50_HTML.jpg)


    **图 7-50. 保存主要交互式报表**


    现在，创建一个命名的替代默认报表，该报表对 `Status` 列执行控制中断：


    单击 `Actions` 按钮并导航至 `Format` ➤ `Control Break`，如图 7-51 所示。


    ![A978-1-4842-0466-5_7_Fig51_HTML.jpg](img/A978-1-4842-0466-5_7_Fig51_HTML.jpg)


    **图 7-51. 选择“控制中断”操作**


    在第一个 `Column` 选择列表中选择 `Status`，并确保其设置为 `Enabled`，如图 7-52 所示。点击 `Apply`。


    ![A978-1-4842-0466-5_7_Fig52_HTML.jpg](img/A978-1-4842-0466-5_7_Fig52_HTML.jpg)


    **图 7-52. 向交互式报表应用控制中断**


    单击 `Actions` 按钮并选择 `Save Report` 选项。

    将 `Save` 设置为 `As Default Report Settings`，如图 7-53 所示。


    ![A978-1-4842-0466-5_7_Fig53_HTML.jpg](img/A978-1-4842-0466-5_7_Fig53_HTML.jpg)


    **图 7-53. 将交互式报表保存为默认设置**


    该区域立即变化。这次，将报表保存为命名的替代项：为 `Default Report Type` 选择 `Alternative`，在 `Name` 中输入
    `Tickets by Status`，如图 7-54 所示，然后点击 `Apply`。


    ![A978-1-4842-0466-5_7_Fig54_HTML.jpg](img/A978-1-4842-0466-5_7_Fig54_HTML.jpg)


    **图 7-54. 将交互式报表保存为替代报表**


    报表顶部的工具栏现在有一个新的 `Reports` 选择列表，其中包含您的默认报表和替代报表，如图 7-55 所示。


    ![A978-1-4842-0466-5_7_Fig55_HTML.jpg](img/A978-1-4842-0466-5_7_Fig55_HTML.jpg)


    **图 7-55. 显示主要报表和命名替代报表的“报表”选择列表**


    #### 有选择地启用和禁用项


    作为开发者，您可以有选择地启用或禁用 `Actions` 菜单中的项。这样做可以限制最终用户在特定交互式报表中可用的选项。以下是一个示例操作：


    编辑应用程序的 `Page 300`。

    通过单击渲染树中的 `Attributes` 节点来编辑 `Analysis` 报表的交互式报表属性。

    向下滚动到 `Actions Menu` 属性组。将 `Flashback` 和 `Save Report` 设置为 `NO`，并将 `Subscription`
    设置为 `YES`，如图 7-56 所示。


    ![A978-1-4842-0466-5_7_Fig56_HTML.jpg](img/A978-1-4842-0466-5_7_Fig56_HTML.jpg)


    **图 7-56. 选择操作菜单选项**


    保存您的更改。

    再次运行您的报表，然后单击 `Actions` 按钮展开操作菜单。请注意，`Flashback` 项不再存在。虽然我们关闭了 `Save Report`，但您仍然可以保存报表，因为您是以开发者身份登录到底层工作区的。标准最终用户将看不到此选项。您还应该看到一个新的订阅选项。


    #### 将操作限制于特定列


    除了控制哪些操作显示在交互式报表中外，您还可以进行更精细的设置，确定可以在哪些列上执行特定操作。图 7-57 显示了您的交互式报表的列级 `Actions`
    设置。操作如下：


    编辑应用程序的 `Page 300`。

    在渲染树中展开 `Analysis Interactive Report` 节点下的 `Columns` 节点，并选择 `Description` 列。

    在 `Enable Users To` 属性组中，将 `Sort` 和 `Filter` 属性设置为 `NO`。

    保存您的更改。


    ![A978-1-4842-0466-5_7_Fig57_HTML.jpg](img/A978-1-4842-0466-5_7_Fig57_HTML.jpg)


    **图 7-57. 为交互式报表选择列级操作**


    运行应用程序的 `Page 300`。

    单击 `Actions` 按钮并选择 `Format` ➤ `Sort`。`Sort` 操作界面应类似于图 7-58。


    ![A978-1-4842-0466-5_7_Fig58_HTML.jpg](img/A978-1-4842-0466-5_7_Fig58_HTML.jpg)


    **图 7-58. 修改后的“选择列”列表**


    请注意，`Description` 不再作为列名出现在列列表中。


    默认情况下，交互式报表链接到称为 `Single Row View` 的视图。此视图显示一个只读区域，其中包含特定行的所有详细信息。在这种情况下，您可能希望链接回您在
    `page 210` 上创建的表单。此时，您可以修改交互式报表，使其使用更传统的页面链接，而不是 `Single Row View`。您可以通过编辑 `Link
    Column` 属性来实现，如图 7-59 所示：


    ![A978-1-4842-0466-5_7_Fig59_HTML.jpg](img/A978-1-4842-0466-5_7_Fig59_HTML.jpg)


    **图 7-59. 设置链接列属性**


    编辑应用程序的 `Page 300`。

    单击 `Analysis Interactive Report` 的 `Attributes` 节点。

    在 `Link` 属性组中，将 `Link Column` 设置为 `Link to Custom Target`。

    单击 `Target` 属性的 `Options Dialog` 按钮。

    在出现的对话框中，确保 `Type` 设置为 `Page in This Application`，将 `Page` 设置为 `210`，在第一行的 `Name`
    中输入 `P210_TICKET_ID`，在 `Value` 中输入 `#TICKET_ID#`，然后单击 `OK`（参见图 7-59）。

    保存您的更改。


    `Name` 和 `Value` 告诉链接传递当前工单的 ID（由 `#TICKET_ID#` 标识），并将其分配给会话状态中的 `P210_TICKET_ID`。


    运行应用程序的 `page 300`。您现在应该能够通过单击带有 `Edit` 链接的列来深入了解任何行的详细信息。

