  trans: '## 小结


    你已审阅了大部分的 APEX 表单和报表类型，并使用 APEX 表单和报表向导，逐步实践了为帮助台系统构建各种表单和报表。你创建了一个交互式报表，并分别以开发者和最终用户的身份对其进行了调整。你已接触了图表，并向应用程序中添加了一个图表，以直观显示工单状态。


    这里的共同主题是，APEX 表单和报表向导对开发者而言是巨大的时间节省工具，它们创建了可工作的表单、报表、日历或图表所需的所有对象——包括项、按钮、分支、进程等等。你能够修改已创建的对象，从而快速定制生成的表单或报表以满足你的需求。尽管如此，你并未偏离
    APEX 为你构建的基础太远。


    随着你的应用程序变得愈发复杂，在某些情况下，你将希望添加代码来强制执行业务规则，或执行比简单的插入、更新或删除更复杂的处理逻辑。为此，你可以使用 APEX
    的各种程序化元素。下一章将探讨验证、计算和进程的主题。


    # 8. 程序化元素


    本章将介绍能为 APEX 框架提供简单和复杂功能的程序化元素。APEX 通过向导提供了简单的声明式功能来指导你。由于其与数据库的集成，APEX 还能充分利用
    Oracle 数据库内部的 PL/SQL 引擎的全部能力。自 APEX 4 版本实现以来，即使是 JavaScript 交互性也已在该框架内变得可声明和可扩展。


    ## 条件


    在整个帮助台应用程序的构建过程中，会有时候你想利用 APEX 组件可用的条件逻辑。与其试图理解每一种条件类型（条件类型列表中大约有 60 种），不如主要专注于理解条件的总体概念。


    条件特性提供了一个可以开启或关闭特定 APEX 技术逻辑的位置。在采取行动显示或执行特定 APEX 组件之前，会评估应用于该组件的条件是否为`TRUE`，即肯定结果。


    用于开发条件的逻辑选项非常广泛。条件类型定义了用于评估条件的具体机制，并酌情使用参数。简单的页面项比较是最容易解释的。例如，一个进程可能只需要在特定页面项具有值时才运行。在发送电子邮件的情况下，只有在提供了电子邮件地址时，才应尝试发送消息。从这个简单的起点开始，条件可以变得像你需要的那样复杂。在高级情况下，条件也可以包括浏览器和
    Web 服务器选项。


    花时间审阅可用的条件类型并熟悉其用法。理解每个项的技术实现或语法并不像理解构成单一条件的选项那样重要。这种熟悉度在你开始定义 APEX 组件并理解灵活且模块化应用程序设计的考虑因素时将有所帮助。


    ## 必填值


    要求提供值是一个常见的需求，APEX 5.0 通过本质上是在页面项级别设置一个`NOT NULL`标记来支持必填值。你无需创建一个完整的验证（接下来讨论）来使一个项成为必填项。你只需从一个开关项中做出选择即可。


    继续我们的帮助台应用程序，让我们为“描述”字段实现一个“值必需”验证：


    ```

    编辑应用程序的第 210 页。

    编辑 P210_DESCR 页面项。

    在“验证”属性组中，将“值必需”更改为“是”，如图 8-1 所示。（根据你的 UI 默认设置方式，“值必需”可能已经设置为“是”。）

    ```


    ![A978-1-4842-0466-5_8_Fig1_HTML.jpg](img/A978-1-4842-0466-5_8_Fig1_HTML.jpg)


    图 8-1. 要求值存在


    ```

    保存你的更改。

    ```


    要测试新的验证，首先创建一个工单。在你输入任何值之前，单击“创建”按钮。图 8-2 显示了预期的结果，其中包含一个整合的页面验证消息框和项验证消息。


    ![A978-1-4842-0466-5_8_Fig2_HTML.jpg](img/A978-1-4842-0466-5_8_Fig2_HTML.jpg)


    图 8-2. 验证显示两个元素的必填值，既在行内显示，也在页面级别整合显示


    在应用程序中，“主题”元素已经设置了值必需验证。这是因为在你使用向导创建表单时，APEX 考虑了表中该列的`NOT NULL`属性。你还会看到 APEX 向导选择了一个在标签文本开头包含星号(*)的项标签模板。这为最终用户提供了该列是必填项的视觉提示。然而，要注意不要将选择一个指示字段是必填的标签与实际使用`VALUE_REQUIRED`属性或验证使该字段成为必填项混淆。


    多个验证的错误消息是累积的。在处理页面时，你会看到所有的验证消息。参见图 8-2。


    > **注意**

    >

    > 所示的消息文本是默认的，可以被替换为应用程序特定的文本，这是“共享组件”区域中全球化功能的一个特性。整个应用程序每种语言只有一个默认值。当在单一语言应用程序中需要自定义消息时，我建议使用标准的验证类型，它允许为你创建的每个验证设置不同的消息。


    ## 验证


    验证的目的是协助提供数据质量，并确保用户输入数据的完整性。从机制上讲，验证是评估结果为`TRUE`或`FALSE`的测试。验证在页面被处理或提交时进行评估。所有的验证都会被评估；任何一个验证返回`FALSE`都会阻止额外的页面进程执行，并且理想情况下，会向用户提供反馈。验证也可以使用
    JavaScript 在客户端执行。尽管 JavaScript 的交互性在用户界面上可能非常吸引人，但它也很容易被绕过。任何在 JavaScript 中执行的验证都应该辅以在页面处理期间或数据库级别的适当验证。


    > **注意**

    >

    > 假设每个事务都是恶意的，这是一个良好的实践。完全出于安全目的实现验证是可能的，但有时很难从一个进程中抽身出来，以识别薄弱点可能存在于何处。例如，在一个购物车应用程序中，如果有人订购了-1
    个产品，总额会发生什么变化？他们会自动获得退款吗？在开发过程中，请花额外的时间审视你的应用程序，以识别可能存在的安全弱点，并实现使其整体上更健壮和安全的功能。


    验证有四种类型：项级别、页面级别，以及对于表单区域，列级别和行级别。项级别验证针对单个 APEX 项操作。当多个项参与验证条件时，使用页面级别验证。表单区域的验证行为类似，但是针对表单区域的列和行进行的。你将在帮助台应用程序中使用每种类型的一个示例。'
- fmt: "### Item-Level Validation\n\n对单个元素的验证可以具有特定于该元素的属性，并且可以根据该元素的要求自定义行为。这里你将实现的示例是一个仅在特定条件为真时才检查其条件的验证。需求是当状态为关闭时，必须输入结束日期。请按照以下步骤操作：\n\
    \n编辑应用程序的第210页。导航到树状窗格的“处理”选项卡。在处理树的“验证”节点上右键单击，然后选择“创建验证”，如图 [8-3](#A978-1-4842-0466-5_8_Chapter.html#Fig3)\
    \ 所示。\n\n![A978-1-4842-0466-5_8_Fig3_HTML.jpg](A978-1-4842-0466-5_8_Fig3_HTML.jpg)\n\
    \n图 8-3. 准备为页面创建验证\n\n在属性窗格中，将“名称”设置为 `Check CLOSED_ON date`。在“验证”属性组中，将“类型”选择为\
    \ `Item is NOT NULL`，然后为“项目”选择 `P210_CLOSED_ON`。在“错误消息”文本区域中输入 `Please enter a\
    \ value for #LABEL#.`，并将“关联项目”设置为 `P210_CLOSED_ON`，如图 [8-4](#A978-1-4842-0466-5_8_Chapter.html#Fig4)\
    \ 所示。显示的错误消息使用了一个替换变量 `#LABEL#` 来包含消息中项目的标签。这样，当将来表单项目的标签发生变化时，验证错误消息将自动引用新标签。\n\
    \n![A978-1-4842-0466-5_8_Fig4_HTML.jpg](A978-1-4842-0466-5_8_Fig4_HTML.jpg)\n\n\
    图 8-4. 设置验证属性\n\n在此步骤中，我们将使验证仅在当前工单状态为 `CLOSED` 时适用：在“条件”属性组中，将“类型”设置为 `PL/SQL\
    \ Function Body`，如图 [8-5](#A978-1-4842-0466-5_8_Chapter.html#Fig5) 所示。\n\n![A978-1-4842-0466-5_8_Fig5_HTML.jpg](A978-1-4842-0466-5_8_Fig5_HTML.jpg)\n\
    \n图 8-5. 为验证设置条件类型和函数体\n\n将以下代码输入到 PL/SQL 函数体中：\n\n```\nIF :P210_STATUS_ID = get_status('CLOSED')\
    \ THEN\n   RETURN TRUE;\nELSE\n   RETURN FALSE;\nEND IF;\n```\n\n保存你的更改。\n\n创建验证后，它会出现在\
    \ APEX 页面设计器的“渲染”和“处理”两个选项卡中，如图 [8-6](#A978-1-4842-0466-5_8_Chapter.html#Fig6)\
    \ 所示。这两个引用指向相同的实现，显示出来是为了方便导航。\n\n![A978-1-4842-0466-5_8_Fig6_HTML.jpg](A978-1-4842-0466-5_8_Fig6_HTML.jpg)\n\
    \n图 8-6. 创建的验证在应用程序生成器页面的两个位置显示\n\n现在，此验证要求当工单状态设置为 `CLOSED` 时，必须为 `Closed On`\
    \ 项目输入一个值。应用于验证的条件会在每次页面提交时进行评估。\n\n### Page-Level Validation\n\n页面级验证同时应用于一个或多个项目，并且通常可以是整个\
    \ PL/SQL 代码块，必须计算为 `TRUE` 验证才算成功。Help Desk 应用程序的需求是比较 `Created On` 日期和 `Closed\
    \ On` 日期，以确保它们按时间顺序发生。一个在创建之前就关闭的工单没有意义。这是一个使用验证来确保数据质量的好例子。以下是你如何创建所需验证：\n\n\
    编辑应用程序的第210页。导航到树状窗格的“处理”选项卡。在处理树的“验证”节点上右键单击，然后选择“创建验证”。在属性窗格中，将“名称”设置为 `Closed\
    \ Date must be after Creation Date`。为“错误消息”输入 `Closed On Date must be Later than\
    \ the Created Date`，将“类型”设置为 `PL/SQL Function Body (returning Boolean)`，然后在 PL/SQL\
    \ 表达式文本区域中输入以下代码。图 [8-7](#A978-1-4842-0466-5_8_Chapter.html#Fig7) 显示了完成的值。单击“下一步”继续：\n\
    \n![A978-1-4842-0466-5_8_Fig7_HTML.jpg](A978-1-4842-0466-5_8_Fig7_HTML.jpg)\n\n\
    图 8-7. 验证属性\n\n```\nIF TO_DATE(:P210_CREATED_ON,'DD-MON-YYYY') >\n   TO_DATE(:P210_CLOSED_ON,'DD-MON-YYYY')\n\
    THEN\n   RETURN FALSE;\nELSE\n   RETURN TRUE;\nEND IF;\n```\n\n保存你的更改。\n\n在你的应用程序中，现在你拥有一个有助于确保输入数据质量的功能。这种数据检查确保任何从开始到结束计算时间的指标不会因为日期问题而产生负数答案。这提高了数据质量和报告中产生的指标的可靠性。\n\
    \n### Tabular Form Validation\n\nAPEX 5.0 中的表格表单能够比以前版本更好地执行验证。创建表格表单的向导也会为你添加验证。向导会根据数据模型自动创建验证。然而，向导只能了解你的业务流程的有限信息，数据模型可能比你应用程序中想要的更灵活。\n\
    \n查看第230页的定义，向导已经根据底层 `TICKETS` 表的 `NOT NULL` 属性为你创建了许多 `Not Null` 验证。但是，向导不知道当工单关闭时你需要一个\
    \ `Closed On` 日期。你可以使用列级表格表单验证来应用该验证：\n\n编辑应用程序的第230页。导航到树状窗格的“渲染”选项卡。展开“管理多个工单”表格表单的“列”节点。右键单击\
    \ `CLOSED_ON` 并从上下文菜单中选择“创建验证”。在属性窗格中，将“名称”设置为 `CLOSED_ON is Not Null if Ticket\
    \ is CLOSED`。将“表格表单”设置为“管理多个工单”，“类型”设置为 `Column is NOT NULL`，“列”设置为 `CLOSED_ON`，如图\
    \ [8-8](#A978-1-4842-0466-5_8_Chapter.html#Fig8) 所示。\n\n![A978-1-4842-0466-5_8_Fig8_HTML.jpg](A978-1-4842-0466-5_8_Fig8_HTML.jpg)\n\
    \n图 8-8. 设置验证名称和验证属性\n\n对于“错误消息”，输入 `#COLUMN_HEADER# must be entered if Status\
    \ is CLOSED`，如图 [8-9](#A978-1-4842-0466-5_8_Chapter.html#Fig9) 所示。单击“下一步”。\n\n\
    ![A978-1-4842-0466-5_8_Fig9_HTML.jpg](A978-1-4842-0466-5_8_Fig9_HTML.jpg)\n\n\
    图 8-9. 使用替换变量的错误消息\n\n在“条件”属性组中，将“类型”设置为 `PL/SQL Function Body`，“执行范围”设置为 `For\
    \ Created and Modified Rows`，然后在 PL/SQL 函数体文本区域中键入以下代码：\n\n```\nIF :STATUS_ID\
    \ = get_status('CLOSED') THEN\n   RETURN TRUE;\nELSE\n   RETURN FALSE;\nEND IF;\n\
    ```\n\n保存你的更改。\n\n当你运行“管理多个工单”页面时，你可以通过添加一个状态为 `CLOSED` 且未设置 `Closed On` 日期的新工单，或者通过移除现有已关闭工单的\
    \ `Closed On` 日期并尝试保存更改来测试新的验证。在图 [8-10](#A978-1-4842-0466-5_8_Chapter.html#Fig10)\
    \ 中，每一行不满足验证要求的行都会被高亮显示，并出现在页面顶部的错误列表中。在此示例中，没有 `Closed On` 日期的行未能通过验证，并被标记为需要注意。\n\
    \n![A978-1-4842-0466-5_8_Fig10_HTML.jpg](A978-1-4842-0466-5_8_Fig10_HTML.jpg)\n\
    \n图 8-10. 未通过验证的结果被高亮显示并呈现在消息区域中\n\n注意：默认情况下，这些验证仅针对新的或更改的行执行。你可以通过设置验证的“执行范围”（位于“条件”部分）来更改此行为。\n\
    \n创建验证向导还允许在表格表单上创建行级验证。这些验证对于表格表单处理的每一行运行一次。在这个级别上，你可以轻松地创建一个类似于为第210页创建的验证，用于检查\
    \ `Closed On` 日期是否发生在 `Created On` 日期之后。\n\n作为对你所学内容的练习，请尝试在第230页的表格表单的行级别实现该验证。"
  raw: '### Item-Level Validation


    Validationson a single element can have attributes specific to that element, and
    behavior can be customized as required by that element. The example you will implement
    here is a validation that checks its condition only when a specific criterion
    is true. The requirement is to have an end date entered whenever the status is
    closed. Follow these steps:


    Edit Page 210 of the application.   Navigate to the Processing tab of the Tree
    Pane.   Right click on the Validating node of the Processing tree and select Create
    Validation, as shown in Figure [8-3](#A978-1-4842-0466-5_8_Chapter.html#Fig3).


    ![A978-1-4842-0466-5_8_Fig3_HTML.jpg](A978-1-4842-0466-5_8_Fig3_HTML.jpg)


    Figure 8-3.


    Preparing to create a validation for the page   In the Attributes pane, set the
    Name to `Check CLOSED_ON date`.   In the Validation attribute group, select Item
    is NOT NULL for the Type and then select P210_CLOSED_ON for Item.   Enter `Please
    enter a value for #LABEL#.` into the Error Message text area, and set the Associated
    Item as P210_CLOSED_ON, as shown in Figure [8-4](#A978-1-4842-0466-5_8_Chapter.html#Fig4).
    The error message shown uses a substitution variable `#LABEL#` to include the
    label of the item in the message. This way, when the label on the form item changes
    in the future, the validation error message will automatically reference the new
    label.


    ![A978-1-4842-0466-5_8_Fig4_HTML.jpg](A978-1-4842-0466-5_8_Fig4_HTML.jpg)


    Figure 8-4.


    Setting the validation properties In this step, we’ll make the validation apply
    only when the current status of the ticket is CLOSED:   In the Condition attribute
    group, set Type to PL/SQL Function Body, as shown in Figure [8-5](#A978-1-4842-0466-5_8_Chapter.html#Fig5).


    ![A978-1-4842-0466-5_8_Fig5_HTML.jpg](A978-1-4842-0466-5_8_Fig5_HTML.jpg)


    Figure 8-5.


    Setting the Condition Type and Function body for the validation   Enter the following
    code into PL/SQL Function body: `IF :P210_STATUS_ID = get_status(''CLOSED'') THEN`
      `RETURN TRUE;` `ELSE`   `RETURN FALSE;` `END IF;`   Save your changes.  


    Once the validation has been created, it appears in both the Rendering and Processing
    tabs on the APEX Page Designer, as shown in Figure [8-6](#A978-1-4842-0466-5_8_Chapter.html#Fig6).
    Both references point to the same implementation and are shown for easy navigation.


    ![A978-1-4842-0466-5_8_Fig6_HTML.jpg](A978-1-4842-0466-5_8_Fig6_HTML.jpg)


    Figure 8-6.


    Validations created appear in two places on the Application Builder page


    This validation now requires that a value be entered for the Closed On item when
    the ticket status is set to CLOSED. The condition applied to the validation is
    evaluated every time the page is submitted.


    ### Page-Level Validation


    Page-level validations apply to one or more items simultaneously and often can
    be an entire PL/SQL block of code that must evaluate to `TRUE` in order for the
    validation to be successful. The requirement for the Help Desk application is
    to compare the Created On date with the Closed On date to ensure that they occur
    in chronological order. A ticket that is closed before it’s created doesn’t make
    any sense. This is a good example of using a validation to ensure data quality.
    Here’s how to create the validation you need:


    Edit Page 210 of the application.   Navigate to the Processing tab of the Tree
    Pane.   Right click on the Validating node of the Processing tree and select Create
    Validation.   In the Attributes pane, set the Name to `Closed Date must be after
    Creation Date`.   Enter `Closed On Date must be Later than the Created Date` for
    Error Message, set the Type to PL/SQL Function Body (returning Boolean), and then
    enter the following code into the PL/SQL Expression text area. Figure [8-7](#A978-1-4842-0466-5_8_Chapter.html#Fig7)
    shows the completed values. Click Next to continue:


    ![A978-1-4842-0466-5_8_Fig7_HTML.jpg](A978-1-4842-0466-5_8_Fig7_HTML.jpg)


    Figure 8-7.


    Validation attributes   `IF TO_DATE(:P210_CREATED_ON,''DD-MON-YYYY'') >`   `TO_DATE(:P210_CLOSED_ON,''DD-MON-YYYY'')`
    `THEN`   `RETURN FALSE;` `ELSE`   `RETURN TRUE;` `END IF;`   Save your changes.
     


    In your application, you now have a feature that helps ensure the quality of the
    data being entered. This type of data check makes sure any metric that calculates
    time from start to end doesn’t produce a negative answer due to dates. This improves
    the quality of the data and the reliability of the metrics that are produced in
    reports.


    ### Tabular Form Validation


    Tabular forms in APEX 5.0 are able to perform validations better than they did
    in previous versions. The wizard that creates a tabular form also adds validations
    for you. The wizard creates validations automatically based on the data model.
    However, a wizard can only know so much about your business process, and the data
    model may have more flexibility than you want in your application.


    Looking at the definition of page 230, the wizard has created a number of Not
    Null validations for you, based on the `NOT NULL` attributes in the underlying
    `TICKETS` table. However, the wizard can’t know that you require a Closed On date
    when a ticket is closed. You can apply that validation using a column-level tabular
    form validation:


    Edit Page 230 of the application.   Navigate to the Rendering tab in the Tree
    Pane.   Expand the Columns node of the Manage Multiple Tickets tabular from.  
    Right click on CLOSED_ON and select Create Validation from the context menu.  
    In the Attributes pane, set Name to `CLOSED_ON` is Not Null if Ticket is `CLOSED`.
      Set the Tabular Form to Manage Multiple Tickets, the Type to Column is NOT NULL,
    and the Column to CLOSED_ON, as shown in Figure [8-8](#A978-1-4842-0466-5_8_Chapter.html#Fig8).


    ![A978-1-4842-0466-5_8_Fig8_HTML.jpg](A978-1-4842-0466-5_8_Fig8_HTML.jpg)


    Figure 8-8.


    Setting Validation Name and Validation attributes   For Error Message, enter `#COLUMN_HEADER#`
    must be entered if Status is CLOSED, as shown in Figure [8-9](#A978-1-4842-0466-5_8_Chapter.html#Fig9).
    Click Next.


    ![A978-1-4842-0466-5_8_Fig9_HTML.jpg](A978-1-4842-0466-5_8_Fig9_HTML.jpg)


    Figure 8-9.


    An error message using substitution variables   In the Condition attribute group,
    set Type to PL/SQL Function Body and the Execution Scope to For Created and Modified
    Rows, and then type the following code into the PL/SQL Function Body text area:
    `IF :STATUS_ID = get_status(''CLOSED'') THEN`   `RETURN TRUE;` `ELSE`   `RETURN
    FALSE;` `END IF;`   Save your changes.  


    When you run the Manage Multiple Tickets page, you can test the new validation
    either by adding a new ticket with a status of CLOSED and no Closed On date set,
    or by removing the Closed On date of an existing closed ticket and attempting
    to save the changes. In Figure [8-10](#A978-1-4842-0466-5_8_Chapter.html#Fig10),
    each row that doesn’t meet the validation requirement is highlighted and appears
    in a list of errors at the top of the page. In this example, the rows that didn’t
    have a Closed On date failed the validation and are flagged as needing attention.


    ![A978-1-4842-0466-5_8_Fig10_HTML.jpg](A978-1-4842-0466-5_8_Fig10_HTML.jpg)


    Figure 8-10.


    Results that fail validation are highlighted and presented in the message area
    Note


    By default, these validations are only executed for new or changed rows. You can
    change this behavior by setting the Execution Scope of the validation, located
    in the Conditions section.


    The Create Validation wizard also allows the creation of row-level validations
    on tabular forms. These validations are run once for each row being processed
    by the tabular form. At this level, you could easily create a validation, similar
    to the one created for page 210, that checked to see if the Closed On date occurred
    after the Created On date.


    As an exercise to see how much you’ve learned, try to implement that validation
    at the row level of the tabular form on page 230.'
