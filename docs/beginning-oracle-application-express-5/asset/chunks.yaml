- fmt: "# Security Setting for the Buttons\n\nRepeat step 32 for the **Manage Multiple\
    \ Tickets** button. To test this change, log in with the user name `Martin`. This\
    \ user has been granted view privileges, so the buttons on page 200 aren’t shown.\
    \ Does this mean that `Martin` can’t create tickets?\n\nLet’s review the steps\
    \ you applied to the Admin pages. Security was first applied to the page itself,\
    \ and then additional security was applied to prevent the access-denied error.\
    \ In the case of the buttons to create tickets, security to remove the buttons\
    \ doesn’t prevent the page from being run directly either from the Application\
    \ Builder or by changing the page number in the URL to `210` or `230`.\n\n**Important**\
    \ Removing or hiding a button, a tab, or another link doesn’t secure the target\
    \ it was pointing at; it only helps reduce errors seen by users on components\
    \ that are already secure.\n\nThe design for the Help Desk application has the\
    \ **Manage Multiple Tickets** page only available to users with edit privileges,\
    \ so the entire page is secured at the edit level. The single-record view of a\
    \ ticket continues to be visible to all authenticated users, but without the buttons\
    \ related to record manipulation:\n\n1.  Edit Page `210` of the application.\n\
    2.  Edit the **Create** button in the **Manage Tickets** region by clicking its\
    \ name.\n3.  In the **Security** section, set **Authorization Scheme** to `access\
    \ control - edit`.\n4.  Repeat steps 35 and 36 for the **Delete** and **Save**\
    \ buttons as well as for the second **Create** button located in the **Ticket\
    \ Details** region. Remember to **Save** your changes.\n\n**Note** The previous\
    \ step could also be completed by using APEX 5.0’s new multi-edit capability.\
    \ Simply multi-select the items you wish to edit and change the **Authorization\
    \ Scheme** once for all selected items.\n\n5.  Edit Page `220` of the application.\n\
    6.  Edit the **Create** button by clicking its name.\n7.  In the **Security**\
    \ section, set **Authorization Scheme** to `access control - edit`.\n8.  Repeat\
    \ steps 39 and 40 for the **Delete** and **Save** buttons. Remember to **Save**\
    \ your changes.\n9.  Edit Page `230` of the application.\n10. Edit the page attributes\
    \ by clicking the page name.\n11. In the **Security** section, set **Authorization\
    \ Scheme** to `access control - edit`, and click **Save**.\n\nReview the application\
    \ now with different users. Notice how the user `Martin` can still navigate from\
    \ the **Tickets** report to view the details of the ticket, but there are no buttons\
    \ to modify the records in the database. Even though the form elements are editable,\
    \ they aren’t written back to the database without the proper form submission.\n\
    \n## Read-Only Items\n\nNormally, users can edit the contents of an item in APEX.\
    \ There are instances where you want to prohibit them from doing so, but you don’t\
    \ want to hide the item entirely. At the conclusion of the previous step, the\
    \ user `Martin` doesn’t have the ability to save edits of the ticket information\
    \ even though the form allows `Martin` to change the contents of the form items.\n\
    \nTo assist in preventing changes, each item in APEX has a read-only attribute\
    \ that you can set programmatically. The approach is similar to how item conditions\
    \ are managed. Because the read-only attribute can’t use an authorization scheme\
    \ directly, you can use the APEX API `APEX_UTIL.PUBLIC_CHECK_AUTHORIZATION` to\
    \ determine whether a user has the rights to edit the data. This API takes a parameter\
    \ of the authorization scheme name and runs the verification, returning a Boolean\
    \ result that can be used in PL/SQL logic.\n\nAlthough we could go and apply the\
    \ read-only condition to each individual item in each region, there is a way to\
    \ make an entire region read-only.\n\nHere are the steps to use the read-only\
    \ attribute and the API just discussed:\n\n1.  Navigate to and edit the regions\
    \ indicated in Table 9-1 by clicking the region name on the respective page.\n\
    \n    **Table 9-1.** Items That Require the Read-Only Attribute\n\n    | Page\
    \ Number | Page 210 | Page 220 |\n    | :--- | :--- | :--- |\n    | Region to\
    \ Update | Manage Tickets | Ticket Details |\n\n2.  In the **Read Only** section,\
    \ set **Type** to `PL/SQL Function Body`, as shown in Figure 9-25. Set the value\
    \ for **PL/SQL Function Body** to the following:\n\n    **Figure 9-25.** Setting\
    \ the region to be read-only using the Read Only attribute\n\n    ![A978-1-4842-0466-5_9_Fig25_HTML.jpg](A978-1-4842-0466-5_9_Fig25_HTML.jpg)\n\
    \n    ```\n    RETURN NOT APEX_UTIL.PUBLIC_CHECK_AUTHORIZATION('access control\
    \ - edit');\n    ```\n\nWhen you run the application as `Martin`, information\
    \ about a ticket on page 210 shows data without the confusion of form elements.\
    \ Authenticating as any other user shows the data in form elements and displays\
    \ the corresponding buttons. Results of the read-only view are shown in Figure\
    \ 9-26; compare them to the form in edit mode, shown in Figure 9-27.\n\n**Figure\
    \ 9-27.** Ticket record in edit mode\n\n![A978-1-4842-0466-5_9_Fig27_HTML.jpg](A978-1-4842-0466-5_9_Fig27_HTML.jpg)\n\
    \n**Figure 9-26.** Ticket record in read-only mode\n\n![A978-1-4842-0466-5_9_Fig26_HTML.jpg](A978-1-4842-0466-5_9_Fig26_HTML.jpg)"
