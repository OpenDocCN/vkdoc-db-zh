    \ the themes, continue the creation process by choosing the Universal Theme for\
    \ your example application. Follow these steps:\n\nEnter `Help Desk` for the Name,\
    \ making sure your schema is set.   Select Universal Theme (42) from the Theme\
    \ select list, and then choose Vita as the Theme Style for your application.  \
    \ Click Next.\n\n#### Laying Out Pages\n\nThe next step in the wizard is to decide\
    \ which pages you need for your application. The wizard requires at least one\
    \ page to be created, but Figure [5-12](#A978-1-4842-0466-5_5_Chapter.html#Fig12)\
    \ shows that you have the option to create as many pages as you like.\n\n![A978-1-4842-0466-5_5_Fig12_HTML.jpg](A978-1-4842-0466-5_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12.\n\nMultiple pages defined in the Create Application wizard\n\n\
    The Add Page Button at the bottom of this page invokes a pop-up wizard that allows\
    \ you to define pages of varying types. Each page type calls for different information\
    \ to be provided. For instance, adding a report page prompts you to select either\
    \ a table name or a query on which to base the report. Choosing a chart requires\
    \ a chart type and a query for the initial data series.\n\nFor now, you’ll stick\
    \ with the blank home page and create the rest of the pages later as needed. Thus,\
    \ the next step is simple:\n\nAn application home page has already been created.\
    \ Accept the defaults on this page and click Next.\n\n#### Copying Shared Components\n\
    \nThe next screen asks whether you wish to copy shared components from another\
    \ application. This comes in handy if you have a template application that houses\
    \ components that are shared across applications in the same workspace. Copying\
    \ shared components isn’t an advanced procedure, but it does lend itself to a\
    \ controlled and mature development process. This step in the wizard is a convenience,\
    \ because the same objects can be copied in other ways after the application has\
    \ been created. You don’t need this step, because you’re creating an application\
    \ from scratch. Skip the step as follows:\n\nSelect No for Copy Shared Components\
    \ from Another Application, and click Next.\n\n#### Application Attributes\n\n\
    The next step in the wizard allows you to set some of the application-level attributes,\
    \ such as the type of authentication to use and globalization attributes, including\
    \ from where to derive the primary language, date formats, and so on. Let’s look\
    \ at each of these individually so you can gain a full understanding of the ramifications\
    \ of each.\n\n##### Selecting an Authentication Method\n\nWith every application,\
    \ you need to make a choice about authentication, even if that choice is no authentication\
    \ at all. This topic is discussed further in [Chapter 9](#A978-1-4842-0466-5_9_Chapter.html).\
    \ By default, the APEX Create Application wizard provides three options for authentication:\n\
    \n*   Application Express Accounts: Users and passwords are local to the APEX\
    \ workspace. These users are managed in the same way the developer accounts are\
    \ managed inside the APEX workspace, and users only work inside the current workspace.\n\
    *   Database Account: This option uses the Oracle Database schema user names and\
    \ passwords for credentials. Some organizations use this type of database-driven\
    \ authentication to keep track of users. The application still executes as the\
    \ chosen “parse as” schema, not as the individual user in the database.\n*   No\
    \ Authentication: This is like a public website. Users aren’t prompted for any\
    \ type of authentication. This is useful for informational applications where\
    \ the question “Who are you?” isn’t important.\n\nFor simplicity, the default\
    \ is to use the Application Express authentication scheme. This is the one setting\
    \ that provides login security; by default, the developer writing the application\
    \ can log in without any additional work.\n\nNote\n\nMany organizations have an\
    \ existing method of authenticating users. If an LDAP server is currently available\
    \ (such as Oracle Internet Directory, Microsoft Active Directory for network domain\
    \ authentication, or even an Oracle E-Business suite), you may want to use this\
    \ system for APEX authentication. The number of options and methods is beyond\
    \ the scope of this book. Simply know that with the Oracle Database technology\
    \ and the technology of your application server, it’s possible to use many of\
    \ the most common authentication infrastructures."
  trans: '

    #### 命名应用程序


    选择桌面应用程序选项后，系统会提示您填写应用程序的详细信息，如图 5-10 所示。`模式` 选择列表仅当工作区被授予访问多个数据库模式时才存在，它允许您选择希望应用程序用作其“解析模式”的模式。`名称`
    值是在构建器内部标识应用程序的名称，并被用作应用程序的标题。


    ![A978-1-4842-0466-5_5_Fig10_HTML.jpg](img/A978-1-4842-0466-5_5_Fig10_HTML.jpg)

    图 5-10. 输入应用程序属性


    应用程序 `ID` 必须在整个 `APEX` 实例中是唯一的，因此最好将 `ID` 保留为 `APEX` 已分配的数字。


    接下来的选项涉及 `APEX` 主题和主题样式。`APEX` 主题是模板的集合，用于建立页面、报表、按钮和其他图形组件的外观和风格。随着 `APEX` 和网络标准的发展，`APEX`
    中预制的示例主题也在发展。5.0 版本提供了一个开创性的新主题选项，称为通用主题，同时还包含多个符合 HTML5/CSS3 标准的主题和一个响应式主题，以及一些已存在相当长时间的旧版主题。


    虽然 `APEX` 目前附带 27 个外观各异的桌面主题，但始终可以自定义现有主题或创建一个全新的主题。`APEX` 管理员还能够创建特定于其实例的主题。在“创建应用程序”向导中选择主题是应用默认主题的一种简单方法。正如您所料，您以后可以更改主意并应用其他主题。作为
    `APEX` 共享组件的一部分，可以添加、修改和测试其他主题。


    图 5-11 展示了 `APEX` 主题选择器。区域顶部的下拉列表决定显示哪些主题。您的选择如下：


    *   标准主题：目前，对于 `APEX` 5.0，这仅显示通用主题。`APEX` 中的所有其他主题现在都被视为“旧版主题”。

    *   自定义主题：显示由工作区或实例管理员安装的任何自定义主题。默认情况下，没有自定义主题。

    *   所有主题：显示所有先前集合中的所有可用主题，包括 26 个旧版主题。


    ![A978-1-4842-0466-5_5_Fig11_HTML.jpg](img/A978-1-4842-0466-5_5_Fig11_HTML.jpg)

    图 5-11. 主题选择


    主题样式选项是所选主题的子选项，将展示该主题下可用的样式。目前，只有通用主题具有相关的主题样式。


    了解了主题之后，请继续创建过程，为您的示例应用程序选择通用主题。请按照以下步骤操作：


    在 `名称` 中输入 `Help Desk`，确保您的 `模式` 已设置。从主题选择列表中选择通用主题 (42)，然后为您的应用程序选择 Vita 作为主题样式。单击下一步。


    #### 布局页面


    向导的下一步是决定您的应用程序需要哪些页面。向导要求至少创建一个页面，但图 5-12 显示您可以根据需要创建任意多个页面。


    ![A978-1-4842-0466-5_5_Fig12_HTML.jpg](img/A978-1-4842-0466-5_5_Fig12_HTML.jpg)

    图 5-12. 在“创建应用程序”向导中定义多个页面


    此页面底部的“添加页面”按钮会调用一个弹出式向导，允许您定义不同类型的页面。每种页面类型都需要提供不同的信息。例如，添加报表页面会提示您选择一个表名或查询作为报表的基础。选择图表则需要指定图表类型和用于初始数据系列的查询。


    现在，我们将保留空白的主页，并在以后根据需要创建其余的页面。因此，下一步很简单：


    应用程序主页已创建。接受此页面的默认设置，然后单击下一步。


    #### 复制共享组件


    下一个屏幕询问您是否希望从另一个应用程序复制共享组件。如果您有一个模板应用程序，其中包含在同一工作区的应用程序之间共享的组件，这会非常方便。复制共享组件并不是一个高级操作，但它确实有助于实现受控和成熟的开发过程。向导中的这一步是一项便利功能，因为相同的对象可以在应用程序创建后以其他方式复制。您不需要此步骤，因为您是从头开始创建应用程序。按如下方式跳过此步骤：


    对于“从另一个应用程序复制共享组件”选择 `否`，然后单击下一步。


    #### 应用程序属性


    向导的下一步允许您设置一些应用程序级别的属性，例如要使用的身份验证类型和全球化属性，包括从何处获取主要语言、日期格式等。让我们逐一查看这些选项，以便您充分理解每个选项的影响。


    ##### 选择身份验证方法


    对于每个应用程序，您都需要选择身份验证方式，即使选择的是完全不进行身份验证。此主题将在第 9 章中进一步讨论。默认情况下，`APEX` 创建应用程序向导提供三种身份验证选项：


    *   应用程序表达账户：用户和密码在 `APEX` 工作区本地管理。这些用户的管理方式与 `APEX` 工作区内的开发者账户管理方式相同，并且用户仅在当前工作区内工作。

    *   数据库账户：此选项使用 Oracle 数据库模式用户名和密码作为凭据。一些组织使用这种类型的数据库驱动身份验证来跟踪用户。应用程序仍然以所选的“解析模式”执行，而不是以数据库中的单个用户身份执行。

    *   无身份验证：这类似于公共网站。系统不会提示用户进行任何类型的身份验证。这对于“您是谁？”这个问题不重要的信息类应用程序很有用。


    为简单起见，默认使用应用程序表达身份验证方案。这是提供登录安全性的设置；默认情况下，编写应用程序的开发者无需任何额外工作即可登录。


    注意

    许多组织已有现成的用户身份验证方法。如果当前有 `LDAP` 服务器可用（例如 Oracle Internet Directory、用于网络域身份验证的 Microsoft
    Active Directory，甚至 Oracle E-Business Suite），您可能希望将此系统用于 `APEX` 身份验证。选项和方法的数量超出了本书的范围。只需了解，利用
    Oracle 数据库技术和应用程序服务器技术，可以使用许多最常见的身份验证基础设施。

