- fmt: '#### Packaged App Gallery


    The Packaged App Gallery presents all of the applications that come bundled with
    the `APEX` distribution. There are 35 separate packaged apps that can belong to
    several different categories, including Software Development, Tracking, Team Productivity,
    Marketing, Knowledge Management, IT Management, Project Management, Sample Application
    and Sample Websheet.


    Clicking on the icon of an application takes you to a detailed information page
    for that application. Here, you’ll be able to see a screenshot of the application,
    read its full description, and see version information, as seen in Figure [2-23](#A978-1-4842-0466-5_2_Chapter.html#Fig23).


    ![A978-1-4842-0466-5_2_Fig23_HTML.jpg](A978-1-4842-0466-5_2_Fig23_HTML.jpg)

    Figure 2-23. The Checklist Manager Packaged Apps information page


    Clicking the `Install Application` button will step you through the process of
    installing the selected application in your current workspace. A pop-up installation
    wizard will present you with a choice of authentication method, which normally
    defaults to `Application Express Accounts`. Clicking the final `Install Application`
    button in the wizard will install the application and any of its supporting objects,
    including any required database objects. Once the installation is complete, you
    will be taken back to the Application’s Information page where, as shown in Figure
    [2-24](#A978-1-4842-0466-5_2_Chapter.html#Fig24), you will see the application
    has been successfully installed and you will be given the options to manage and
    run the application.


    ![A978-1-4842-0466-5_2_Fig24_HTML.jpg](A978-1-4842-0466-5_2_Fig24_HTML.jpg)

    Figure 2-24. See that the Checklist Manager App has been successfully installed


    There are a few things that you should know about Packaged Applications:


    *   Any application that has “Sample” in the name is there to demonstrate functionality
    available in `APEX` and therefore will be installed in an unlocked state by default.
    This means that developers will be able to edit the application and see how the
    `APEX` team developed the app.

    *   Applications that do not have “Sample” in the name are provided as production
    ready and will be installed in a locked state that does not allow any editing
    until the app is specifically unlocked. This can be done via the `Manage` button,
    as shown in Figure [2-24](#A978-1-4842-0466-5_2_Chapter.html#Fig24). Any of these
    applications that are installed and remain locked are fully supported by Oracle
    in a production environment. These locked applications can also be upgraded to
    more current versions that may come with future versions of `APEX`. The moment
    you unlock them, all support from Oracle ceases, upgradeability expires, and there
    is no way to re-lock the application.

    *   All Packaged Applications are installed into the workspace’s default “parse
    as” schema. Currently, there is no direct way to install them in a secondary “parse
    as” schema without first unlocking and exporting the application, thereby voiding
    any support.


    Even though the Sample apps were written as learning aids, there is a lot to be
    learned from many of the production-ready applications as well. I heartily suggest
    your first act after finishing this book is take a look at the inner workings
    of some of the Packaged Applications.


    #### Packaged App Dashboard


    As shown in Figure [2-25](#A978-1-4842-0466-5_2_Chapter.html#Fig25), the dashboard
    page presents an overview of the utilization of Packaged Applications in the current
    workspace. You’re presented with the total number of available apps, the number
    installed, and whether there are any applications that can be upgraded. You can
    also see who has installed the apps and how frequently they are used.


    ![A978-1-4842-0466-5_2_Fig25_HTML.jpg](A978-1-4842-0466-5_2_Fig25_HTML.jpg)

    Figure 2-25. The Packaged Apps Dashboard


    #### Packaged App Administration


    The Packaged App Administration page provides a list of administration tasks specifically
    related to Packaged Applications installed in the current workspace. If you are
    logged in as a developer, you’ll only see options relating to managing `Interactive
    Report` settings and `Activity reports`. However, when logged in as a workspace
    administrator, you’ll see a section called `Manage Services` that shows a small
    subsection of what is available to you in the full Administration section.


    ### Administration and Team Development


    The last two functional areas of the UI, Administration and Team Development,
    are complex enough to truly deserve their own chapters. Therefore, we refer you
    to the chapters that cover these areas in depth. [Chapter 10](#A978-1-4842-0466-5_10_Chapter.html)
    covers deploying applications, [Chapter 14](#A978-1-4842-0466-5_14_Chapter.html)
    is about managing workspaces, and [Chapter 15](#A978-1-4842-0466-5_15_Chapter.html)
    goes over Team Development.


    You will dip into administrative tasks throughout this book, so if you want to
    have a full understanding of administration before you start, you should take
    a detour and read these chapters now to get a good foundation. However, if you’re
    prepared to learn on the fly, go to the next chapter, where you start the real
    programming.


    ## Summary


    The architecture of `APEX` may seem a bit daunting at first, but once you actually
    start working with it, things will begin to fall into place, and you’ll understand
    more and more about how everything fits together. If you take away only one thing
    from this chapter, let it be that a workspace is essentially your development
    sandbox. Everything you do happens in the context of a workspace. Everything else—from
    a development standpoint—is much like any other development environment. Are you
    building a new application? Then it needs to be created in a workspace. Do you
    need access to a schema to build that app? Then it needs to be assigned to your
    workspace. You get the picture. Now, on to the fun!


    # 3. Identifying the Problem and Designing the Solution


    Every computer system is (or at least should be) the result of solving some type
    of problem. Although “Hello World” apps are great, I firmly believe that the best
    way to learn any technology is to apply it to a real problem and see how things
    actually work.


    I adhere to that principle throughout this book. This chapter will discuss a very
    common problem in most organizations that can be solved technically. You will
    also look at some of the elements you need to consider when designing web-based
    systems in general and with `APEX` specifically.


    ## Identifying System Requirements


    Almost every company, no matter the size, will at some point need to implement
    some sort of help desk. Whether it’s an internal one to track employee questions
    and problems or an external one to track client issues with commercial software
    or hardware, the basics of a help-desk system are fairly standard.


    Most help-desk systems are driven by the notion of a trouble ticket or simply
    a ticket. This term is left over from the days before computers: most problems
    were reported over the phone, and troubleshooters used a physical paper ticket
    to log a call. The information contained on that paper ticket included a description
    of the problem, the name of the person having the problem, when the problem was
    logged, and so on. Then, throughout the process of troubleshooting and, hopefully,
    solving the problem, the engineers wrote down each step of the process and included
    any documentation of the problem they gathered along the way. Today, it would
    be very surprising to see a help-desk system that wasn’t computerized, even if
    it’s only a spreadsheet of issues with notes and statuses.


    In this chapter, you will attack the help-desk system with `APEX`. Before you
    dive in, you need to clearly understand the problems you’re trying to solve. If
    nothing else, you need to review the current system.'
