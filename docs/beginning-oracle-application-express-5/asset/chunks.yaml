  trans: '## 新应用


    当您部署一个全新的应用程序时，有几种工具可以帮助您生成底层数据库对象的脚本。`APEX SQL Workshop` 中的 `Utilities` 菜单包含一个
    `Generate DDL`（生成 DDL）工具，其功能正如其名。如果您针对应用程序的“解析为”模式运行此工具，它将允许您生成一个包含底层数据库对象的 SQL
    脚本。


    如图 10-1 所示，向导会询问您希望使用哪个可用模式作为生成脚本的基础。


    ![A978-1-4842-0466-5_10_Fig1_HTML.jpg](img/A978-1-4842-0466-5_10_Fig1_HTML.jpg)

    图 10-1. 选择要为其生成对象定义脚本的模式


    随后，向导会让您选择要在脚本中包含哪些类型的数据库对象（参见图 10-2）。请确保选中应用程序使用的所有对象类型。选择 `Check All`（全选）将为您提供为所选模式中的所有对象生成脚本的选项。此时，您还可以决定是否希望内联显示生成的脚本以便复制粘贴，或者将其作为脚本文件保存到
    `APEX` 脚本库中。


    ![A978-1-4842-0466-5_10_Fig2_HTML.jpg](img/A978-1-4842-0466-5_10_Fig2_HTML.jpg)

    图 10-2. 在 `Generate DDL` 向导中选择对象类型


    向导的下一步（参见图 10-3）列出了所有符合您在上一步所选类型的对象。您可以根据意愿选择性地包含哪些对象。您的特定应用程序可能只使用模式内对象的一个子集，因此在生成
    DDL 时，您只需选择那些相关的对象即可。


    ![A978-1-4842-0466-5_10_Fig3_HTML.jpg](img/A978-1-4842-0466-5_10_Fig3_HTML.jpg)

    图 10-3. 在 `Generate DDL` 向导中选择所需的特定对象


    注意：如果您遇到多个应用程序共享同一个底层模式的情况，您可能希望对数据库对象应用一种命名约定，以便知道哪些对象与哪个应用程序相关。常见的数据库对象命名约定是在对象名称前添加一个三字母前缀。例如，Help
    Desk（服务台）应用程序的表 `USERS` 将变为 `HDA_USERS`。同样，请咨询您的公司，了解其是否已有对象命名约定。


    如果您选择将脚本保存到 `APEX` 脚本库，下一步允许您输入要创建的文件名和描述，如图 10-4 所示。


    ![A978-1-4842-0466-5_10_Fig4_HTML.jpg](img/A978-1-4842-0466-5_10_Fig4_HTML.jpg)

    图 10-4. 为 `Generate DDL` 向导正在创建的脚本命名


    至此，包含所有选定对象的脚本便生成了。生成引擎能够很好地按正确顺序创建那些依赖于其他对象的对象，从而确保脚本运行时不会发生错误。不过，测试这些脚本以确保一切运行顺畅始终是一个好习惯。


    Oracle 的 `SQL Developer` 产品也提供了一个工具，可以为您选择的模式生成 DDL。图 10-5 显示了 `SQL Developer
    Database Export`（SQL Developer 数据库导出）工具的启动画面。


    ![A978-1-4842-0466-5_10_Fig5_HTML.jpg](img/A978-1-4842-0466-5_10_Fig5_HTML.jpg)

    图 10-5. `SQL Developer Database Export` 工具的第一个屏幕


    此工具与 `APEX` 向导非常相似，但它让您对输出的格式和内容有更多的控制权，包括是否包含模式名称、存储子句、授权等。`SQL Developer` 的另一个优点是能够导出表中存在的数据。这对于系统正常运行所需的种子数据非常方便。


    无论您选择使用基于 `APEX` 的工具还是 `SQL Developer`，为新系统生成对象创建脚本都是直接了当的。


    ## 现有应用


    对于已经发布到生产环境的应用程序，部署过程可能要复杂得多。您需要考虑生产环境中的版本，以及底层数据库结构与您已在开发环境中创建并准备部署的版本之间可能存在哪些差异。


    幸运的是，有一些工具可以帮助识别两个模式之间的差异。这些工具还可以生成实现这些差异所需的 DDL 脚本。


    然而，不幸的事实是，尽管 `APEX SQL Workshop` 实用程序包含一个模式比较工具，但它有一些严重的局限性。首先，被比较的两个模式必须都可从同一个工作区访问。如果您的生产模式存在于单独的服务器上（通常如此），这就无法实现。第二个限制是，基于
    `APEX` 的比较工具能识别出不同的对象，但不会说明它们有何不同，也不会生成同步模式所需的 DDL。


    对于这类功能，您必须依赖外部程序或脚本。以下列出了几种选择，它们都可以生成所需的脚本，以将生产环境的数据库对象结构与您在开发中引入的变更同步：


    *   `SQL Developer`：Oracle 自家的产品可以运行两个独立服务器上独立模式之间的完整模式比较，并生成一个将某个模式与另一个同步的脚本。该工具的旧版本存在一些问题，但自
    `SQL Developer` 版本 3.2 起，比较引擎已显著升级，生成的脚本非常可靠。

    *   `Oracle Enterprise Manager`：如果您拥有 `Change Management Pack`（变更管理套件）和 `Oracle
    Enterprise Manager`（`OEM`），那么您可以比较模式并生成同步脚本。但是，开发人员很少被授予访问 `OEM` 的权限，因为它更像是一个数据库管理工具，并且可能会让开发人员访问到管理员们不希望他们接触的多个敏感实用程序。

    *   `Schema Compare for Oracle`：Red Gate Software 将其在为 SQL Server 市场创建工具方面的丰富经验转向了
    Oracle 数据库市场。其成果是一款允许您在两个 Oracle 模式之间进行比较、查看和生成同步脚本的工具。这可能是市场上最好的第三方工具，但唯一的缺点是它只在
    Windows 上运行。

    *   `TOAD for Oracle`：`TOAD`（最初代表 Tool for Oracle Application Development，Oracle
    应用程序开发工具）是由 Dell 软件部门（前身为 Quest Software）编写和分发的工具。尽管它能做的远不止于此，但作为 `DB Admin`（数据库管理）模块一部分提供的模式比较工具相当复杂，能够生成非常清晰准确的脚本。


    无论您使用哪种工具，输出的都是一个脚本。当该脚本在生产环境上运行时，将执行所需的 DDL 来修改底层数据库对象，使其与您在开发环境中创建的结构保持一致。


    然而，这些工具都没有考虑可能驻留在被修改表中的数据。在实施任何生成的升级脚本之前，请务必非常小心，了解它们可能对底层数据造成什么影响，并减轻任何数据丢失或损坏的风险。


    这个主题非常庞大，超出了本书的范围。在版本之间进行数据迁移的问题没有自动化解决方案。更多时候，它归结于手工编写的脚本和大量的测试。'
- fmt: '## APEX-Based Files


    APEX provides the ability for developers to upload static files into the APEX
    metadata repository as part of an application’s shared components. Figure 10-6
    shows the Files section of the Shared Components page. There are two types of
    files represented: those that are tied directly to the application and those that
    are available to all applications within the current workspace.


    ![A978-1-4842-0466-5_10_Fig6_HTML.jpg](A978-1-4842-0466-5_10_Fig6_HTML.jpg)

    *Figure 10-6. The Files section of an application’s Shared Components page*


    Static Application Files may be any file type, such as CSS files, JavaScript files,
    images, documents, and so forth, that you may need as part of your application.
    They can be referenced from within your application by prefacing them with the
    `#APP_IMAGES#` replacement variable.


    Because these items are tied directly to a specific application, they are automatically
    included when you perform an application export (as discussed later in this chapter).


    Static Workspace Files may also be any file type, but instead of being tied directly
    to an application, they are made available to all applications within the current
    workspace by using the `#WORKSPACE_IMAGES#` replacement variable.


    Even though the Static Workspace Files are considered shared components, they
    aren’t included in the application export. This means that you’ll need to migrate
    these items separately. You’ll be able to do this from the same screen that allows
    you to upload them. You can either choose to download and migrate individual files
    using the download link associated with that item, or choose to simply click the
    Download as Zip button, after which you’re presented with a dialog that lets you
    export a zip file of all the Static Workspace Files. Both options are seen in
    Figure 10-7.


    ![A978-1-4842-0466-5_10_Fig7_HTML.jpg](A978-1-4842-0466-5_10_Fig7_HTML.jpg)

    *Figure 10-7. The Static Workspace Files page allows for individual or bulk download*


    Files that are uploaded as shared components will likely be ones that you reference
    throughout your application. They may represent portions of your theme, such as
    images for tabs or buttons, or they may represent icons that you use to show status
    or that, when clicked, allow end users to edit rows of data.


    One key differentiation to make is that the files uploaded to this area should
    not be directly related to the application’s data. Things such as product images,
    images of employees, and the like should be stored in the application’s `parse
    as` schema alongside the data to which the image is related.


    ## APEX Application Exports


    Overall, the APEX application export is easy to execute. The interface includes
    a process designed to generate scripts for recreating APEX applications.


    It’s important at this point to know what an application export includes and what
    it doesn’t. We’ve already discussed the fact that the underlying database objects
    aren’t included, and neither is anything that is uploaded to the Static Workspace
    Files section of the shared components. But all other shared components, including
    Static Application Files, are included in the export file.


    It’s worth mentioning that all configured and assigned shared components are included
    in the APEX application export, whether they’re being used by the application
    or not. For instance, there can only ever be one authentication scheme current
    for an APEX application, but more than one authentication scheme may be configured
    and assigned to the application. The same is true for user-interface themes.


    Although this isn’t strictly a problem, it’s good practice to delete any shared
    components that aren’t being used by the application so that the size of the application
    export stays as small and as manageable as possible. Most shared components provide
    a utilization report so you can see whether they’re being used.


    The application export capability is located on the Application Builder main page
    in the Icon menu at top of the page, as shown in Figure 10-8.


    ![A978-1-4842-0466-5_10_Fig8_HTML.jpg](A978-1-4842-0466-5_10_Fig8_HTML.jpg)

    *Figure 10-8. The Export option is located in the Icon menu at top of the page*


    When you initiate the wizard, it first prompts you as to whether you wish to import
    or export an application. Once you select Export, you are taken to the Export
    page, as shown in Figure 10-9.


    ![A978-1-4842-0466-5_10_Fig9_HTML.jpg](A978-1-4842-0466-5_10_Fig9_HTML.jpg)

    *Figure 10-9. The Export Application page*


    You can choose the application to export by using the select list near the top
    of the page. The Export Application section allows you to dictate how, in more
    general terms, the application should be exported. It includes these options:


    *   File Format: It doesn’t relate to the target platform but instead to how the
    file is generated with regard to carriage returns and line feeds.

    *   Owner Override: Allows you to override the currently assigned `parse as` schema
    by either entering or selecting one.

    *   Build Status Override: Lets you select which build status is the default when
    the application is imported. The default is Run and Build Application, but you
    may set the status to Run Application Only.

    *   Debugging: Dictates whether the application is installed with debugging enabled
    or disabled by default. Debugging is useful for applications in development. However,
    as a best practice, you should turn off debugging for production applications
    so as to prevent users from viewing things that may only show up while in debug
    mode.

    *   As Of: Allows you to export the application as it existed a number of minutes
    ago. For this feature to work, Flashback Query must be enabled by the DBA at the
    database level. The amount of time you may flash back is controlled by the `UNDO_RETENTION`
    parameter at the database level.


    > **Note:** Although you can select default values for the settings in the Export
    Application section, it’s important to understand that they can be overridden
    when the application is imported. At this point, you’re merely setting the defaults
    for the import.


    In the Export Preferences section, several options allow you to decide what is
    included in the application export. The following options are available:'
