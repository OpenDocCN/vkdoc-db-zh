  trans: '### 创建表格表单


    在本节中，你将创建一个新页面，该页面包含基于 `TICKETS` 表的表格表单。该表单允许在同一页面上编辑多个工单。随后，你将更改表格表单各列的显示属性。请按以下步骤操作：


    导航到你的应用程序的应用程序生成器主页。

    单击页面右上角的“创建页面”按钮。

    选择“表单”并单击“下一步”。

    选择“表格表单”并单击“下一步”。

    对于“表/视图所有者”，选择你的模式，然后对于“表/视图名称”，选择 `TICKETS`（表）。

    确保“允许的操作”设置为“更新”、“插入”和“删除”。

    默认情况下，“使用用户界面默认值”以及所有列都已被选中，如图 7-1 所示。单击“下一步”。


    ![A978-1-4842-0466-5_7_Fig1_HTML.jpg](img/A978-1-4842-0466-5_7_Fig1_HTML.jpg)

    图 7-1. 为表格表单选择列


    将“主键类型”设置为“选择主键列”。

    将“主键列 1”设置为 `1. TICKET_ID (数字)`，然后单击“下一步”。

    将“源类型”设置为“现有触发器”并单击“下一步”。

    选择所有列作为“可更新列”，如图 7-2 所示，然后单击“下一步”。


    ![A978-1-4842-0466-5_7_Fig2_HTML.jpg](img/A978-1-4842-0466-5_7_Fig2_HTML.jpg)

    图 7-2. 为表格表单选择可更新列


    对于“页面”输入 `230`，对于“页面名称”和“区域标题”输入“管理多个工单”，如图 7-3 所示。


    ![A978-1-4842-0466-5_7_Fig3_HTML.jpg](img/A978-1-4842-0466-5_7_Fig3_HTML.jpg)

    图 7-3. 为表格表单标识页面和区域属性


    将“页面模式”设置为“模态对话框”。

    将“面包屑”设置为“面包屑”。

    页面刷新后，将“条目名称”设置为“管理多个工单”，将“父条目”设置为“工单（页面 200）”，如图 7-4 所示，然后单击“下一步”。


    ![A978-1-4842-0466-5_7_Fig4_HTML.jpg](img/A978-1-4842-0466-5_7_Fig4_HTML.jpg)

    图 7-4. 为表格表单创建面包屑条目


    对于“导航首选项”，选择“为此页面标识现有导航菜单条目”。

    对话框刷新后，将“现有导航菜单条目”设置为“工单”，然后单击“下一步”。

    将“添加行按钮标签”更改为 `添加工单`。

    在“确认”可滚动区域中检查你的选择，如图 7-5 所示。


    ![A978-1-4842-0466-5_7_Fig5_HTML.jpg](img/A978-1-4842-0466-5_7_Fig5_HTML.jpg)

    图 7-5. 在“确认”区域检查我们的选择


    单击“创建”。


    ### 修改表格表单


    你的表格表单可以工作，但目前无法导航到它。首先，你需要在页面 200 上创建一个按钮，以链接到你的新表格表单：


    编辑应用程序的页面 200。

    通过将“文本[热]”按钮从“组件库”拖到“工单”区域的“创建”按钮位置来创建新按钮，如图 7-6 所示。


    ![A978-1-4842-0466-5_7_Fig6_HTML.jpg](img/A978-1-4842-0466-5_7_Fig6_HTML.jpg)

    图 7-6. 将新按钮拖到“工单”区域


    对于“按钮名称”输入 `MANAGE_MULTIPLE_TICKETS`，对于“标签”输入“管理多个工单”，如图 7-7 所示。


    ![A978-1-4842-0466-5_7_Fig7_HTML.jpg](img/A978-1-4842-0466-5_7_Fig7_HTML.jpg)

    图 7-7. 指定按钮属性


    在“行为”属性组中，将“操作”设置为“重定向到此应用程序中的页面”。

    单击“目标”旁边的“选项对话框”按钮。

    “选项对话框”出现后，将“页面”设置为 `230`，将“重置分页”设置为“是”，如图 7-8 所示，然后单击“确定”。


    ![A978-1-4842-0466-5_7_Fig8_HTML.jpg](img/A978-1-4842-0466-5_7_Fig8_HTML.jpg)

    图 7-8. 指定按钮操作属性


    保存并运行你的应用程序。


    此时，你应该能够通过单击“管理多个工单”按钮从页面 200 导航到你的表格表单。


    不过，现在你需要进行一些外观修改，以便更好地控制数据输入以及对话框的观感。


    首先，增大对话框窗口的大小，以便可以看到表单的所有元素：


    编辑应用程序的页面 230。

    在树状窗格的“呈现”选项卡中，选择“页面 230：管理多个工单”。

    在“属性编辑器”中，将对话框的 `宽度` 属性设置为 `1200`，将 `高度` 属性设置为 `720`。

    单击“保存”。接下来，你将对表格表单的列进行一些更改。

    在“呈现”选项卡的树中，展开“管理多个工单”节点下的“列”节点。

    编辑 `TICKET_ID_DISPLAY` 列，并将“类型”属性设置为“隐藏列”。

    多选 `SUBJECT`、`DESCR`、`CREATED_BY`、`CREATED_ON`、`CLOSED_ON`、`ASSIGNED_TO` 和 `STATUS_ID`，并确保它们的
    `可排序` 属性设置为“是”。

    多选 `SUBJECT` 和 `DESCR` 列。

    在“属性编辑器”中，将“类型”设置为“文本区域”，`宽度` 设置为 `16`，`高度` 设置为 `3`。

    编辑 `ASSIGNED_TO` 列。

    在“属性编辑器”中，将“类型”设置为“选择列表”。

    在“值列表”属性组中，将“类型”设置为“共享组件”，“值列表”设置为 `TECHS`，“显示额外值”设置为“否”，“显示空值”设置为“是”，并为“空值显示值”输入
    `- 选择一名技术人员 -`，如图 7-9 所示。


    ![A978-1-4842-0466-5_7_Fig9_HTML.jpg](img/A978-1-4842-0466-5_7_Fig9_HTML.jpg)

    图 7-9. 为 `ASSIGNED_TO` 列指定值列表


    编辑 `CREATED_BY` 列。

    在“属性编辑器”中，将“类型”设置为“选择列表”。

    在“值列表”部分，将“类型”设置为“共享组件”，“值列表”设置为 `USERS`，“显示额外值”设置为“否”，“显示空值”设置为“是”，并为“空值显示值”输入
    `- 选择一名用户 -`，如图 7-10 所示。


    ![A978-1-4842-0466-5_7_Fig10_HTML.jpg](img/A978-1-4842-0466-5_7_Fig10_HTML.jpg)

    图 7-10. 为 `CREATED_BY` 列指定值列表属性


    编辑 `STATUS_ID` 列。

    在“属性编辑器”中，导航到“默认值”属性组，将“类型”设置为“PL/SQL 表达式”，并为“默认值”输入 `get_status (''OPEN'')`。

    保存你刚才所做的编辑，然后运行你的应用程序。注意：由于页面 230 是一个模态对话框页面，你需要通过页面 200 上创建的按钮来运行它。


    ### 深入了解幕后


    让我们看看表格表单向导为你创建了什么——你的表格表单的内容。编辑页面 230 以检查树状窗格的各个选项卡。它们应该类似于图 7-11 所示。


    ![A978-1-4842-0466-5_7_Fig11_HTML.jpg](img/A978-1-4842-0466-5_7_Fig11_HTML.jpg)

    图 7-11. 页面 230 树状窗格的各个选项卡


    在“呈现”选项卡中，APEX 已创建了一个“报表”区域。但你创建的是一个表单，不是吗？尽管名称如此，表格表单实际上是一个启用了特定列级选项并添加了一些进程来处理数据操作的
    SQL 报表。


    在“处理”选项卡的“处理”部分，你可以看到两个进程：`ApplyMRU` 和 `ApplyMRD`。这些特殊类型的进程处理 `TICKETS` 表上的多行插入和更新（`ApplyMRU`）以及删除（`ApplyMRD`）。这些进程为你处理
    `TICKETS` 表上的所有 DML 操作。


    APEX 还为多个列创建了验证，这些验证是根据 `TICKETS` 表的列定义以及在 `TICKETS` 表上定义的任何 UI 默认值自动创建的。


    在“共享组件”选项卡中，是应用程序默认的常规页面和标签页模板。


    如你所见，`ApplyMRU` 和 `ApplyMRD` 进程使得“报表”区域从静态报表区域变成了功能齐全的表格表单。而且，让 APEX 向导为你创建这一切要容易得多！'
- fmt: '## Interactive Reports


    你的工单报告通常被称为经典报告。它是APEX报告的原始样式，在需要简单数据列表且无需交互性的各种情况下仍然具有实际应用价值。然而，包括APEX自身在内的大多数应用程序，现在都采用了APEX交互式报告。


    交互式报告功能在APEX 3.1中引入，它使得APEX能够快速轻松地在你的应用程序中纳入由用户驱动的临时查询能力。交互式报告在APEX 5.0中得到了极大增强。APEX交互式报告的妙处在于，它们为最终用户提供了强大的临时查询能力，而开发者无需编写任何代码。最终用户可以自定义以下内容：


    *   搜索

    *   排序顺序

    *   列

    *   分组中断

    *   高亮显示

    *   计算

    *   聚合

    *   图表

    *   分组依据

    *   闪回时间

    *   保存的报告

    *   订阅（电子邮件通知）


    交互式报告在技术上不过是一种报告类型。创建报告向导的步骤与我们已经看到的类似，构建交互式报告所花费的努力与经典报告相同。


    经典报告可以轻松转换为交互式报告。然而，无法从交互式报告转换回经典报告。（但为什么你会想要这样做呢？）交互式报告的最终用户功能和整体价值通过一个例子最能说明，因此让我们为你的应用程序添加一个交互式报告。


    ### Creating an Interactive Report


    交互式报告只需要一个SQL查询。APEX会处理其余部分。你首先需要基于你的服务台数据视图，同时创建一个新页面、菜单项和交互式报告。开始如下：


    导航到你的应用程序的Application Builder主页。点击屏幕右上角的“Create Page”按钮。选择“Report”并点击“Next”。选择“Interactive
    Report”并点击“Next”。输入`300`作为页面编号，输入`Analysis`作为页面名称和区域名称，并将区域模板设置为“Interactive Report”。将“Breadcrumb”设置为“Breadcrumb”，页面刷新后，点击“Next”。参见图7-12。


    ![A978-1-4842-0466-5_7_Fig12_HTML.jpg](A978-1-4842-0466-5_7_Fig12_HTML.jpg)


    图7-12。指定交互式报告的页面编号、名称和面包屑


    将导航首选项设置为“Create a new navigation menu entry”。页面刷新后，应类似图7-13。点击“Next”。


    ![A978-1-4842-0466-5_7_Fig13_HTML.jpg](A978-1-4842-0466-5_7_Fig13_HTML.jpg)


    图7-13。指定交互式报告的导航选项


    对于此报告，你将使用`TICKETS_V`视图，而不是直接使用`TICKETS`表。该视图将`TICKETS`表与`STATUS_LOOKUPS`表连接起来，因此你无需稍后在列级别手动操作：将源类型设置为“Table”，然后为“Table
    / View Name”选择`TICKETS_V`（视图）。将“Uniquely Identify Rows by”设置为“Unique Column”，为“Unique
    Column”输入`TICKET_ID`，然后点击“Next”（参见图7-14）。


    ![A978-1-4842-0466-5_7_Fig14_HTML.jpg](A978-1-4842-0466-5_7_Fig14_HTML.jpg)


    图7-14。为交互式报告输入SQL SELECT语句


    点击“Create”。


    ### Running an Interactive Report


    运行应用程序并导航到“Analysis”菜单项。该页面类似于图7-15所示。乍一看，交互式报告看起来与其他APEX报告没什么不同。然而，交互式报告可以执行标准APEX报告无法完成的许多功能。


    ![A978-1-4842-0466-5_7_Fig15_HTML.jpg](A978-1-4842-0466-5_7_Fig15_HTML.jpg)


    图7-15。用于工单分析的交互式报告


    交互式报告内置了搜索栏，它是交互式报告的指挥中心。所有最终用户功能都通过位于交互式报告顶部的搜索栏访问，这是报告搜索字段的标准位置。但这远不止是一个搜索字段！搜索栏包括以下部分：


    *   查找器下拉菜单：以放大镜图标表示，此功能允许用户选择要筛选的列。

    *   搜索字段：用户可以在其中输入并查找文本字符串的字段。

    *   报告选择列表：所有已保存报告的下拉列表。仅当有多个已保存报告可用时，此列表才可见。我们稍后会讨论已保存报告。

    *   每页行数选择器：行数选项的下拉列表。默认情况下此功能是关闭的，因为它也可以在“Actions”菜单中使用。

    *   “Actions”菜单：为此报告启用的操作菜单——交互式报告的“交互式”选项。


    要使用搜索字段，请在其中输入字符串或短语，然后点击“Go”按钮。交互式报告仅列出与你在搜索字段中输入的值匹配的结果。


    要使用查找器下拉菜单，请点击搜索栏左侧放大镜图标旁边的箭头。此操作将打开报告列名的菜单。选择一个列名会导致仅在所选列上执行搜索。


    要使用报告选择列表，请选择“Report”列表选项之一以导航到所选报告。要使用每页行数选择器，请从下拉列表中选择所需显示的每页行数。


    要使用“Actions”菜单，请点击它以展开交互式报告操作菜单，然后选择所需的操作。


    ### Restricting Functionality by Report


    作为开发者，你可以通过在Page Builder的报告级别设置选项来控制“Actions”菜单上哪些选项对最终用户可用。你还可以控制搜索栏上包含哪些前述组件。如图7-16所示的搜索栏选项允许你选择是否包含搜索栏，以及选择搜索栏的哪些元素对用户可见。这在报告级别控制了最终用户的功能。


    ![A978-1-4842-0466-5_7_Fig16_HTML.jpg](A978-1-4842-0466-5_7_Fig16_HTML.jpg)


    图7-16。指定搜索栏选项


    如图7-17所示的“Actions”菜单切换按钮，允许你指定哪些“Actions”菜单选项对用户可用。其中，“Save Report”、“Save Public
    Report”和“Subscription”选项仅对经过身份验证的用户可用。这是因为APEX需要知道经过身份验证的用户信息才能保存报告和发送订阅。


    ![A978-1-4842-0466-5_7_Fig17_HTML.jpg](A978-1-4842-0466-5_7_Fig17_HTML.jpg)


    图7-17。为“Actions”菜单指定选项


    ### Restricting Functionality by Column


    特定的交互式报告操作也可以在列级别逐列限制。例如，你可以允许报告被筛选，但不允许特定列用于筛选。通过在Page Builder中编辑报告列，你可以声明性地启用或禁用“Enable
    Users To”属性组中的隐藏、排序、筛选、高亮、分组中断、聚合、计算、图表、分组依据和枢轴功能，如图7-18所示，作为各个列的报告属性页面的一部分。


    ![A978-1-4842-0466-5_7_Fig18_HTML.jpg](A978-1-4842-0466-5_7_Fig18_HTML.jpg)


    图7-18。指定单个列的选项


    你已经了解了作为开发者在报告级别和列级别可用的交互式报告设置。现在，让我们从最终用户的角度来看看交互式报告功能。以下各节将从最终用户角度探讨如何使用交互式报告的关键功能。'
  raw: '## Interactive Reports


    Your ticket report is what’s called a classic report. It’s the original style
    of APEX report and still has practical applications in a variety of situations
    where the requirement is for a simple list of data with no interactivity. Most
    applications, including APEX itself, now employ the APEX interactive report, however.


    Introduced in APEX 3.1, the interactive reports feature allows APEX to quickly
    and easily include user-driven ad hoc capabilities in your applications. Interactive
    reports are greatly enhanced in APEX 5.0\. The beauty of APEX interactive reports
    is that they give the end user powerful ad hoc query capability with exactly zero
    lines of code written by the developer. End users can customize the following:


    *   Searching

    *   Sort order

    *   Columns

    *   Breaking

    *   Highlighting

    *   Computations

    *   Aggregations

    *   Charts

    *   Group by

    *   Flashback time

    *   Saved reports

    *   Subscription (email notification)


    Interactive reports are technically nothing more than a report type. The Create
    Report wizard steps are similar to what we have already seen, and you will expend
    the same effort in building an interactive report as you would for a classic report.


    Classic reports can be easily converted to interactive reports. There is no way
    to revert from an interactive report to a classic report, however. (But why would
    you want to?) The end-user features and overall value of interactive reports are
    best illustrated with an example, so let’s add an interactive report to your application.


    ### Creating an Interactive Report


    Interactive reports require nothing more than a SQL query. APEX handles the rest.
    You start by creating a new page, menu item, and interactive report all at once
    on a view of your Help Desk data. Begin as follows:


    Navigate to the Application Builder’s Home Page for your application   Click Create
    Page button in the upper right of the screen.   Select Report and click Next.
      Select Interactive Report and click Next.   Enter `300` for Page Number and
    `Analysis` for Page Name and Region Name, and set Region Template to Interactive
    Report.   Set Breadcrumb to Breadcrumb and, when the page refreshes, click Next.
    See Figure [7-12](#A978-1-4842-0466-5_7_Chapter.html#Fig12).


    ![A978-1-4842-0466-5_7_Fig12_HTML.jpg](A978-1-4842-0466-5_7_Fig12_HTML.jpg)


    Figure 7-12.


    Specifying the page number, name, and breadcrumbs for an interactive report  
    Set Navigation Preference to Create a new navigation menu entry. When the page
    refreshes, it should look like Figure [7-13](#A978-1-4842-0466-5_7_Chapter.html#Fig13).
    Click Next.


    ![A978-1-4842-0466-5_7_Fig13_HTML.jpg](A978-1-4842-0466-5_7_Fig13_HTML.jpg)


    Figure 7-13.


    Specifying navigation options for an interactive report For this report you’re
    going to use the `TICKETS_V` view instead of the `TICKETS` table directly. The
    view joins the `TICKETS` table to the `STATUS_LOOKUPS` table so you don’t have
    to do it manually later at the column level:   Set the Source Type to Table and
    then select TICKETS_V (view) for Table / View Name. Set Uniquely Identify Rows
    by to Unique Column, enter `TICKET_ID` for Unique Column, and click Next (see
    Figure [7-14](#A978-1-4842-0466-5_7_Chapter.html#Fig14)).


    ![A978-1-4842-0466-5_7_Fig14_HTML.jpg](A978-1-4842-0466-5_7_Fig14_HTML.jpg)


    Figure 7-14.


    Entering a SQL SELECT statement for an interactive report   Click Create.


    ### Running an Interactive Report


    Run the application and navigate to the Analysis menu item. The page looks similar
    to that shown in Figure [7-15](#A978-1-4842-0466-5_7_Chapter.html#Fig15). At first
    glance, the interactive report looks no different than any other APEX report.
    However, the interactive report can perform a number of functions that a standard
    APEX report can’t.


    ![A978-1-4842-0466-5_7_Fig15_HTML.jpg](A978-1-4842-0466-5_7_Fig15_HTML.jpg)


    Figure 7-15.


    Interactive report for tickets analysis


    The interactive report has a built-in Search Bar, which is command central for
    the interactive report. All of the end-user features are accessed through the
    Search Bar, which is located on the top of the interactive report, in the standard
    location for a report search field. But this is so much more than just a search
    field! The Search Bar includes the following:


    *   Finder drop-down: Represented by the magnifying glass, this feature allows
    the user to select which column to filter on.

    *   Search field: A search field where the user can enter and find text strings.

    *   Report select list: A select list of all saved reports. This select list is
    visible only when more than one saved report is available. We’ll talk about saved
    reports in a moment.

    *   Rows-per-page selector: A select list of number-of-rows options. This function
    is turned off by default, because it’s also available from within the Actions
    menu.

    *   Actions menu: A menu of actions enabled for this report—the “interactive”
    options of the interactive report.


    To use the search field, type a string or phrase into it and click the Go button.
    The interactive report lists only results that match values you entered in the
    search field.


    To use the Finder drop-down, click the arrow next to the magnifying glass icon
    to the left of the Search Bar. This action opens a menu of the report’s column
    names. Selecting a column name causes the search to be performed on the selected
    column only.


    To use the Report select list, select one of the Report list options to navigate
    to the selected report. To use the rows-per-page selector, select the desired
    number of rows per page to display from the select list.


    To use the Actions menu, click it to expand the menu of interactive reports actions,
    and then select the desired action.


    ### Restricting Functionality by Report


    As the developer, you have control over which options on the Actions menu are
    available to the end user by setting options at the report level in the Page Builder.
    You can also control which of the preceding components are included on the Search
    Bar. The Search Bar options, shown in Figure [7-16](#A978-1-4842-0466-5_7_Chapter.html#Fig16),
    allow you to include the Search Bar or not and to elect which elements of the
    Search Bar are visible to the user. This controls end-user functionality at the
    report level.


    ![A978-1-4842-0466-5_7_Fig16_HTML.jpg](A978-1-4842-0466-5_7_Fig16_HTML.jpg)


    Figure 7-16.


    Specifying Search Bar options


    The Actions Menu toggles, shown in Figure [7-17](#A978-1-4842-0466-5_7_Chapter.html#Fig17),
    allow you to specify which Actions menu options are available to the user. Of
    these, the Save Report, Save Public Report, and Subscription options are only
    available to authenticated users. This is because APEX needs to know information
    about the authenticated user to be able to save reports and send subscriptions.


    ![A978-1-4842-0466-5_7_Fig17_HTML.jpg](A978-1-4842-0466-5_7_Fig17_HTML.jpg)


    Figure 7-17.


    Specifying the options for the Actions menu


    ### Restricting Functionality by Column


    Specific interactive report actions can also be restricted on a column-by-column
    basis. For example, you can allow the report to be filtered, but not allow a specific
    column to be used in a filter. By editing report columns in the Page Builder,
    you can declaratively enable or disable the hide, sort, filter, highlight, control
    break, aggregate, compute, chart, group by, and pivot at the column level through
    the individual column’s report attributes page, as part of the Enable Users To
    attribute group, as shown in Figure [7-18](#A978-1-4842-0466-5_7_Chapter.html#Fig18).


    ![A978-1-4842-0466-5_7_Fig18_HTML.jpg](A978-1-4842-0466-5_7_Fig18_HTML.jpg)


    Figure 7-18.


    Specifying individual column options


    You’ve examined the interactive report settings available to you as a developer
    at the report level and at the column level. Now, let’s take a look at interactive
    report features from the end-user perspective. The following sections examine
    using the key features of an interactive report as an end user.'
  trans: '

    ## 交互式报告


    你的工单报告通常被称为**经典报告**。它是 APEX 报告的原始样式，在需要简单数据列表且无需交互性的各种情况下仍然具有实际应用价值。然而，包括 APEX
    自身在内的大多数应用程序，现在都采用了**APEX 交互式报告**。


    交互式报告功能在 APEX 3.1 中引入，它使得 APEX 能够快速轻松地在你的应用程序中纳入由用户驱动的临时查询能力。交互式报告在 APEX 5.0 中得到了极大增强。APEX
    交互式报告的妙处在于，它们为最终用户提供了强大的临时查询能力，而开发者无需编写任何代码。最终用户可以自定义以下内容：


    *   搜索

    *   排序顺序

    *   列

    *   分组中断

    *   高亮显示

    *   计算

    *   聚合

    *   图表

    *   分组依据

    *   闪回时间

    *   保存的报告

    *   订阅（电子邮件通知）


    交互式报告在技术上不过是一种报告类型。创建报告向导的步骤与我们已经看到的类似，构建交互式报告所花费的努力与经典报告相同。


    经典报告可以轻松转换为交互式报告。然而，无法从交互式报告转换回经典报告。（但为什么你会想要这样做呢？）交互式报告的最终用户功能和整体价值通过一个例子最能说明，因此让我们为你的应用程序添加一个交互式报告。


    ### 创建交互式报告


    交互式报告只需要一个 SQL 查询。APEX 会处理其余部分。你首先需要基于你的服务台数据视图，同时创建一个新页面、菜单项和交互式报告。开始如下：


    导航到你的应用程序的 Application Builder 主页。点击屏幕右上角的“Create Page”按钮。选择“Report”并点击“Next”。选择“Interactive
    Report”并点击“Next”。输入`300`作为页面编号，输入`Analysis`作为页面名称和区域名称，并将区域模板设置为“Interactive Report”。将“Breadcrumb”设置为“Breadcrumb”，页面刷新后，点击“Next”。参见图
    7-12。


    ![A978-1-4842-0466-5_7_Fig12_HTML.jpg](img/A978-1-4842-0466-5_7_Fig12_HTML.jpg)


    图 7-12。指定交互式报告的页面编号、名称和面包屑


    将导航首选项设置为“Create a new navigation menu entry”。页面刷新后，应类似图 7-13。点击“Next”。


    ![A978-1-4842-0466-5_7_Fig13_HTML.jpg](img/A978-1-4842-0466-5_7_Fig13_HTML.jpg)


    图 7-13。指定交互式报告的导航选项


    对于此报告，你将使用`TICKETS_V`视图，而不是直接使用`TICKETS`表。该视图将`TICKETS`表与`STATUS_LOOKUPS`表连接起来，因此你无需稍后在列级别手动操作：将源类型设置为“Table”，然后为“Table
    / View Name”选择`TICKETS_V`（视图）。将“Uniquely Identify Rows by”设置为“Unique Column”，为“Unique
    Column”输入`TICKET_ID`，然后点击“Next”（参见图 7-14）。


    ![A978-1-4842-0466-5_7_Fig14_HTML.jpg](img/A978-1-4842-0466-5_7_Fig14_HTML.jpg)


    图 7-14。为交互式报告输入 SQL SELECT 语句


    点击“Create”。


    ### 运行交互式报告


    运行应用程序并导航到“Analysis”菜单项。该页面类似于图 7-15 所示。乍一看，交互式报告看起来与其他 APEX 报告没什么不同。然而，交互式报告可以执行标准
    APEX 报告无法完成的许多功能。


    ![A978-1-4842-0466-5_7_Fig15_HTML.jpg](img/A978-1-4842-0466-5_7_Fig15_HTML.jpg)


    图 7-15。用于工单分析的交互式报告


    交互式报告内置了搜索栏，它是交互式报告的指挥中心。所有最终用户功能都通过位于交互式报告顶部的搜索栏访问，这是报告搜索字段的标准位置。但这远不止是一个搜索字段！搜索栏包括以下部分：


    *   查找器下拉菜单：以放大镜图标表示，此功能允许用户选择要筛选的列。

    *   搜索字段：用户可以在其中输入并查找文本字符串的字段。

    *   报告选择列表：所有已保存报告的下拉列表。仅当有多个已保存报告可用时，此列表才可见。我们稍后会讨论已保存报告。

    *   每页行数选择器：行数选项的下拉列表。默认情况下此功能是关闭的，因为它也可以在“Actions”菜单中使用。

    *   “Actions”菜单：为此报告启用的操作菜单——交互式报告的“交互式”选项。


    要使用搜索字段，请在其中输入字符串或短语，然后点击“Go”按钮。交互式报告仅列出与你在搜索字段中输入的值匹配的结果。


    要使用查找器下拉菜单，请点击搜索栏左侧放大镜图标旁边的箭头。此操作将打开报告列名的菜单。选择一个列名会导致仅在所选列上执行搜索。


    要使用报告选择列表，请选择“Report”列表选项之一以导航到所选报告。要使用每页行数选择器，请从下拉列表中选择所需显示的每页行数。


    要使用“Actions”菜单，请点击它以展开交互式报告操作菜单，然后选择所需的操作。


    ### 按报告限制功能


    作为开发者，你可以通过在 Page Builder 的报告级别设置选项来控制“Actions”菜单上哪些选项对最终用户可用。你还可以控制搜索栏上包含哪些前述组件。如图
    7-16 所示的搜索栏选项允许你选择是否包含搜索栏，以及选择搜索栏的哪些元素对用户可见。这在报告级别控制了最终用户的功能。


    ![A978-1-4842-0466-5_7_Fig16_HTML.jpg](img/A978-1-4842-0466-5_7_Fig16_HTML.jpg)


    图 7-16。指定搜索栏选项


    如图 7-17 所示的“Actions”菜单切换按钮，允许你指定哪些“Actions”菜单选项对用户可用。其中，“Save Report”、“Save Public
    Report”和“Subscription”选项仅对经过身份验证的用户可用。这是因为 APEX 需要知道经过身份验证的用户信息才能保存报告和发送订阅。


    ![A978-1-4842-0466-5_7_Fig17_HTML.jpg](img/A978-1-4842-0466-5_7_Fig17_HTML.jpg)


    图 7-17。为“Actions”菜单指定选项


    ### 按列限制功能


    特定的交互式报告操作也可以在列级别逐列限制。例如，你可以允许报告被筛选，但不允许特定列用于筛选。通过在 Page Builder 中编辑报告列，你可以声明性地启用或禁用“Enable
    Users To”属性组中的隐藏、排序、筛选、高亮、分组中断、聚合、计算、图表、分组依据和枢轴功能，如图 7-18 所示，作为各个列的报告属性页面的一部分。


    ![A978-1-4842-0466-5_7_Fig18_HTML.jpg](img/A978-1-4842-0466-5_7_Fig18_HTML.jpg)


    图 7-18。指定单个列的选项


    你已经了解了作为开发者在报告级别和列级别可用的交互式报告设置。现在，让我们从最终用户的角度来看看交互式报告功能。以下各节将从最终用户角度探讨如何使用交互式报告的关键功能。

    '
- fmt: '### Using the Column Heading Menu


    When running an interactive report, the column headings contain functionality
    all their own and are perhaps the fastest way to format a single column of a report.
    Figure [7-19](#A978-1-4842-0466-5_7_Chapter.html#Fig19) illustrates the interactive
    report column-heading features. Clicking a column heading opens a column-level
    menu with icon-driven options for quick sorting, removing the column from the
    report, adding a break on the column, searching, and filtering on the selected
    column. The `Search Bar` in this menu allows the end user to search for and filter
    directly on the values in that column. The `Remove Column` option lets the user
    quickly remove the column from the report. To restore the column, the user must
    choose the `Select Columns` option of the `Actions` menu. The `Break` option adds
    a break on the column.


    ![A978-1-4842-0466-5_7_Fig19_HTML.jpg](A978-1-4842-0466-5_7_Fig19_HTML.jpg)


    Figure 7-19.


    Using the column-heading menu


    If you look below the `Filter` text field, you will see a full list of distinct
    values that occur in the column. Clicking any of these distinct values creates
    a filter on the column, showing only those rows that match the selected value.


    ### Searching by Column


    The magnifying glass icon at the left end of the `Search Bar` is actually a list
    of the visible columns in the report, which is helpful as a quick way to filter
    either on a specific column or on all columns. The selected column is the column
    to which the search text applies.


    Entering a value in the search field applies a filter to either all columns (the
    default) or the selected column. Once a filter is applied, an option appears in
    the `Control Summary` region, as shown in Figure [7-20](#A978-1-4842-0466-5_7_Chapter.html#Fig20).
    The `Control Summary` region is the area between the `Search Bar` and your report.
    This region appears only when an action is applied to the interactive report and
    serves as a key to what actions are currently being applied. The `Control Summary`
    region contains one line for each action applied. Interactive report actions are
    additive: subsequent actions are applied in addition to the existing actions.
    The user can disable an action by unchecking its check box. The user can remove
    the action by clicking the × icon for that action. Clicking an action in the `Control
    Summary` region opens that action control for editing.


    ![A978-1-4842-0466-5_7_Fig20_HTML.jpg](A978-1-4842-0466-5_7_Fig20_HTML.jpg)


    Figure 7-20.


    Control Summary region when open


    The `Control Summary` panel can be toggled open or closed. You can minimize it
    by clicking the Close (downward-pointing triangle) icon.


    The closed `Control Summary` region, shown in Figure [7-21](#A978-1-4842-0466-5_7_Chapter.html#Fig21),
    can be expanded by clicking the Open (rightward-pointing triangle) icon.


    ![A978-1-4842-0466-5_7_Fig21_HTML.jpg](A978-1-4842-0466-5_7_Fig21_HTML.jpg)


    Figure 7-21.


    Control Summary region when closed


    The `Finder` drop-down menu, accessible via the magnifying glass icon to the left
    of the `Search Bar`, displays a list of all columns in the interactive report,
    as shown in Figure [7-22](#A978-1-4842-0466-5_7_Chapter.html#Fig22). Selecting
    one of the columns limits the search function to that column.


    ![A978-1-4842-0466-5_7_Fig22_HTML.jpg](A978-1-4842-0466-5_7_Fig22_HTML.jpg)


    Figure 7-22.


    Finder drop-down menu


    The `Actions` menu, shown in Figure [7-23](#A978-1-4842-0466-5_7_Chapter.html#Fig23),
    exposes an array of column-selection, filtering, and action options. Expanding
    the menu further under the `Format` option reveals additional actions for sorting,
    breaking, highlighting, computing new columns, aggregating, charting, and grouping.
    The expanded `Format` menu is shown in Figure [7-24](#A978-1-4842-0466-5_7_Chapter.html#Fig24).


    ![A978-1-4842-0466-5_7_Fig24_HTML.jpg](A978-1-4842-0466-5_7_Fig24_HTML.jpg)


    Figure 7-24.


    Choosing a format option from the Actions menu


    ![A978-1-4842-0466-5_7_Fig23_HTML.jpg](A978-1-4842-0466-5_7_Fig23_HTML.jpg)


    Figure 7-23.


    Actions menu


    ### Selecting Columns


    The `Select Columns` action, shown in Figure [7-25](#A978-1-4842-0466-5_7_Chapter.html#Fig25),
    allows the user to select which columns to display and to reorder columns as desired.
    The shuttle control allows the user to easily add or remove columns using the
    center arrows and to order the columns that are displayed by using the up and
    down buttons to the right of the region.


    ![A978-1-4842-0466-5_7_Fig25_HTML.jpg](A978-1-4842-0466-5_7_Fig25_HTML.jpg)


    Figure 7-25.


    Selecting columns


    **Note**


    The `Select Columns` action of an interactive report always controls which columns
    are displayed. If, as a developer, you modify the SQL query to add a column to
    an interactive report, that new column won’t be visible until the new column is
    moved from the `Do Not Display` region to the `Display in Report` region of the
    shuttle.


    ### Filtering


    The `Filter` action allows the user to declaratively define filters based on the
    result of a number of operators. A user can define multiple filters per report.
    Multiple filters are combined with the logical `AND` operator. Filters defined
    through the `Search Bar` are combined with filters defined in the `Filter` action.
    Currently, there is no provision in interactive reports to implement a logical
    `OR` for filters.


    The `Filter` action offers a full set of filter operations for selection, as shown
    in Figure [7-26](#A978-1-4842-0466-5_7_Chapter.html#Fig26).


    ![A978-1-4842-0466-5_7_Fig26_HTML.jpg](A978-1-4842-0466-5_7_Fig26_HTML.jpg)


    Figure 7-26.


    Applying a filter to an interactive report


    The `Filter` action supports both column filters and row filters. Column filters
    are applied to a single column. The column filter options change interactively,
    depending on the type of the filtered column and the selected operator. For example,
    if you select a date column, such as `Created On`, and then select the `Between`
    operation, the `Expression` element now contains two fields, for the `From` and
    `To` of the between clause. In this case, the fields each have a date picker for
    ease in entering the `Date From` and `To` values. The end user can also construct
    a custom filter using the declarative `Filter`.


    Row filters allow the user to build filter conditions that are based on multiple
    columns in the same row. A simple row filter for your Analysis report might be
    a filter for all tickets that were closed on the same day they were opened. The
    `Filter` expression may be built declaratively using selections in the `Columns`
    and `Functions/Operators` regions, shown in Figure [7-27](#A978-1-4842-0466-5_7_Chapter.html#Fig27),
    or may be entered manually. Within the `Filter` expression, selected columns are
    represented by their letter alias.


    ![A978-1-4842-0466-5_7_Fig27_HTML.jpg](A978-1-4842-0466-5_7_Fig27_HTML.jpg)


    Figure 7-27.


    Building a row filter


    ### Sorting


    The `Sort` interface allows the user to specify sorts on up to six columns in
    either ascending or descending order and to specify whether `NULL`s are sorted
    first or last. The sort may be performed on both displayed and non-displayed columns
    (see Figure [7-28](#A978-1-4842-0466-5_7_Chapter.html#Fig28)).


    ![A978-1-4842-0466-5_7_Fig28_HTML.jpg](A978-1-4842-0466-5_7_Fig28_HTML.jpg)


    Figure 7-28.


    Adding sorts to an interactive report


    ### Adding Breaks


    The `Control Break` action allows the user to define break formatting on up to
    six columns. The user specifies the break column and whether the break is disabled
    or enabled. APEX automatically applies the declared break formats to the report.
    Note that break columns appear in the `Control Summary` as separate entries, letting
    the user enable, disable, or remove break columns individually. Figure [7-29](#A978-1-4842-0466-5_7_Chapter.html#Fig29)
    shows the Analysis report with breaks applied on the `Assigned To` and `Status`
    columns.


    ![A978-1-4842-0466-5_7_Fig29_HTML.jpg](A978-1-4842-0466-5_7_Fig29_HTML.jpg)


    Figure 7-29.


    Interactive report with control breaks applied'
