- fmt: "## 约束定义步骤\n\n当你点击 `Add` 按钮时，约束的定义会被添加到页面顶部的约束列表中。你可以为一个给定的表定义任意多的必要约束。完成后，继续向导即可。\n\
    \n在此我们不创建任何 `Unique` 或 `Check` 约束，因此请保持默认设置并点击 `Next`。\n\n## 完成创建表向导\n\n创建表向导的最后一步让你有机会确认你的请求，并在需要时查看将要执行的代码。如果你需要修改表的定义，可以使用区域底部的按钮在向导步骤中回退。要查看代码，请点击\
    \ `SQL` 标签左侧的箭头以展开区域，如图 [4-5](#A978-1-4842-0466-5_4_Chapter.html#Fig5) 所示。\n\n\
    ![A978-1-4842-0466-5_4_Fig5_HTML.jpg](A978-1-4842-0466-5_4_Fig5_HTML.jpg)\n图 4-5.\n\
    \n### 查看SQL代码\n\n查看创建表向导展示的 `SQL` 区域中的文本。点击 `Create Table` 以完成向导。\n\n成功完成向导后，你将被带回对象浏览器，并显示\
    \ `TICKETS` 表的定义。花点时间检查一下表的定义。你应该看到所有你定义的列。如果你点击定义区域顶部的 `Constraints` 标签，你将看到一些不同的约束，包括在\
    \ `TICKET_ID` 上的主键约束。\n\n在对象浏览器的左上角是一个定义正在浏览的对象类型的选择列表。使用此选择列表选择 `Sequences`。你会看到\
    \ APEX 创建了一个名为 `TICKETS_SEQ` 的序列，它将用于填充 `TICKET_ID`。\n\n再次使用对象类型选择列表并选择 `Triggers`。你将看到一个名为\
    \ `BI_TICKETS` 的触发器（`BI` 代表“before insert”）。在左侧选择 `BI_TICKETS` 触发器，然后点击触发器详细信息上方的\
    \ `Code` 标签，将显示该触发器的代码，它在 `TICKET_ID` 为 `null` 时使用 `TICKETS_SEQ` 序列来填充它。你应该看到类似于以下内容的代码：\n\
    \n```\ncreate or replace trigger \"BI_TICKETS\"\nbefore insert on \"TICKETS\"\n\
    for each row\nbegin\n  if :NEW.\"TICKET_ID\" is null then\n    select \"TICKETS_SEQ\"\
    .nextval into :NEW.\"TICKET_ID\" from sys.dual;\n  end if;\nend;\n```\n\n现在你已经定义了\
    \ `TICKETS` 表，让我们回去创建 `TICKET_DETAILS` 表。这次，你将创建一个到 `TICKETS` 表的外键，并设置为 `CASCADE\
    \ DELETE`。这意味着如果你删除一张票，票的详细信息也会被自动删除。\n\n使用 `Create (+)` 按钮启动创建表向导。\n\n根据 ERD\
    \ 和图 [4-6](#A978-1-4842-0466-5_4_Chapter.html#Fig6) 输入表名和列定义，然后点击 `Next`。再次确保勾选了适当的\
    \ `Not Null` 复选框。\n\n![A978-1-4842-0466-5_4_Fig6_HTML.jpg](A978-1-4842-0466-5_4_Fig6_HTML.jpg)\n\
    图 4-6.\n\n### 定义 `TICKET_DETAILS` 表\n\n接下来的步骤故意比之前的更模糊一些。你现在应该已经习惯使用创建表向导了，但如果需要复习，可以查看前面的步骤。\n\
    \n为 `Primary Key` 选择 `Populate from a new sequence`，选择 `TICKET_DETAILS_ID(NUMBER)`\
    \ 作为 `Primary Key` 列，然后点击 `Next`。\n\n在 `TICKET_DETAILS` 表中的 `TICKET_ID` 与 `TICKETS`\
    \ 表中的 `TICKET_ID` 之间添加一个外键。确保 `Delete action` 设置为 `Cascade Delete`。你的屏幕应该与图 [4-7](#A978-1-4842-0466-5_4_Chapter.html#Fig7)\
    \ 中的类似。此外，请确保你从 `References Table` 字段中跳出（Tab 键），以便 APEX 显示允许你选择引用列的穿梭控件。\n\n![A978-1-4842-0466-5_4_Fig7_HTML.jpg](A978-1-4842-0466-5_4_Fig7_HTML.jpg)\n\
    图 4-7.\n\n### 为 `TICKET_ID` 定义级联删除外键\n\n点击 `Add` 按钮以添加新的外键约束。\n\n点击 `Next`（见图\
    \ [4-8](#A978-1-4842-0466-5_4_Chapter.html#Fig8)）。\n\n![A978-1-4842-0466-5_4_Fig8_HTML.jpg](A978-1-4842-0466-5_4_Fig8_HTML.jpg)\n\
    图 4-8.\n\n### 在表向导中定义的外键\n\n此表不需要其他约束。点击 `Next`。\n\n查看 `SQL` 语句并点击 `Create Table`\
    \ 以完成向导。"
  raw: 'The constraints definition step When you click the Add button, the definition
    of the constraint is added to the list of constraints at the top of the page.
    You can define as many constraints on a given table as is necessary. Once you’re
    done, simply continue with the wizard.   You’re not going to create any Unique
    or Check constraints here, so stick with the defaults and click Next. The final
    step of the Create Table Wizard gives you the chance to confirm your request and,
    if desired, review the code that will be executed. If you need to make changes
    to the table definition, you can use the buttons at the bottom of the region to
    navigate back through the wizard steps. To view the code, click the arrow to the
    left of the SQL label to expand the region, as shown in Figure [4-5](#A978-1-4842-0466-5_4_Chapter.html#Fig5).


    ![A978-1-4842-0466-5_4_Fig5_HTML.jpg](A978-1-4842-0466-5_4_Fig5_HTML.jpg)


    Figure 4-5.


    Review the Create Table Wizard’s SQL   Review the text in the SQL region presented
    by the Create Table Wizard. Click Create Table to complete the wizard. Once you’ve
    successfully completed the wizard, you’re taken back to the Object Browser, and
    the definition of the `TICKETS` table is displayed. Take a moment to examine the
    definition of the table. You should see all the columns that you defined listed.
    If you click the Constraints tab at the top of the definition region, you will
    see a number of different constraints, including the primary-key constraint on
    `TICKET_ID`. In the upper-left corner of the Object Browser is a select list that
    defines the object type being browsed. Use this select list to choose Sequences.
    You see that APEX created a sequence called `TICKETS_SEQ` that will be used to
    fill the `TICKET_ID`. Once again, use the Object Type select list and choose Triggers.
    You will see a trigger named `BI_TICKETS` (BI stands for “before insert”). Selecting
    the `BI_TICKETS` trigger on the left-hand side and then clicking the Code tab
    above the trigger details will show the code for the trigger that is using the
    `TICKETS_SEQ` sequence to fill the `TICKET_ID` if it is null. You should see code
    similar to the following: `create or replace trigger "BI_TICKETS"`   `before insert
    on "TICKETS"`   `for each row` `begin`   `if :NEW."TICKET_ID" is null then`     `select
    "TICKETS_SEQ".nextval into :NEW."TICKET_ID" from sys.dual;`   `end if;` `end;`
    Now that you have the `TICKETS` table defined, let’s go back and create the `TICKET_DETAILS`
    table. This time, you’ll create a foreign key to the `TICKETS` table, as a `CASCADE
    DELETE`. This means that if you delete a ticket, the ticket details will automatically
    be deleted as well.   Start the Create Table Wizard using the Create (+) button.
      Enter the table name and column definitions based on the ERD and Figure [4-6](#A978-1-4842-0466-5_4_Chapter.html#Fig6),
    and click Next. Again, make sure you check the appropriate Not Null checkboxes.


    ![A978-1-4842-0466-5_4_Fig6_HTML.jpg](A978-1-4842-0466-5_4_Fig6_HTML.jpg)


    Figure 4-6.


    Defining the `TICKET_DETAILS` table The next set of steps is purposely a bit more
    vague than the previous ones. You should be used to using the Create Table Wizard
    by now, but if you need a refresher, just look at the previous steps.   Choose
    Populate from a new sequence for the primary key, select TICKET_DETAILS_ID(NUMBER)
    as the Primary Key column, and click Next.   Add a foreign key between the `TICKET_ID`
    in the `TICKET_DETAILS` table and the `TICKET_ID` in the `TICKETS` table. Make
    sure the Delete action is set to Cascade Delete. Your screen should look similar
    to that in Figure [4-7](#A978-1-4842-0466-5_4_Chapter.html#Fig7). Additionally,
    make sure you tab out of the References Table field in order to cause APEX to
    display the shuttle control that allows you to choose the referenced columns.


    ![A978-1-4842-0466-5_4_Fig7_HTML.jpg](A978-1-4842-0466-5_4_Fig7_HTML.jpg)


    Figure 4-7.


    Defining a cascade-delete foreign key for `TICKET_ID`   Click the Add button to
    add the new foreign-key constraint.   Click Next (see Figure [4-8](#A978-1-4842-0466-5_4_Chapter.html#Fig8)).


    ![A978-1-4842-0466-5_4_Fig8_HTML.jpg](A978-1-4842-0466-5_4_Fig8_HTML.jpg)


    Figure 4-8.


    Foreign key as defined in the table wizard   No constraints are required for this
    table. Click Next.   Review the SQL and click Create Table to complete the wizard.'
  trans: "\n## 定义约束的步骤\n\n当你点击 `Add` 按钮时，约束的定义就会被添加到页面顶部的约束列表中。你可以为一张给定的表定义任意数量的必需约束。完成后，请继续向导流程。\n\
    \n在此处，我们不创建任何 `唯一` 或 `检查` 约束，因此请保持默认设置并点击 `Next`。\n\n## 完成创建表向导\n\n创建表向导的最后一步让你有机会确认你的请求，并在需要时查看即将执行的代码。如果你需要修改表的定义，可以使用页面底部的按钮回退到之前的向导步骤。要查看代码，请点击\
    \ `SQL` 标签左侧的箭头以展开该区域，如图 4-5 所示。\n\n![A978-1-4842-0466-5_4_Fig5_HTML.jpg](img/A978-1-4842-0466-5_4_Fig5_HTML.jpg)\n\
    图 4-5.\n\n### 查看 SQL 代码\n\n查看创建表向导 `SQL` 区域中展示的文本。点击 `Create Table` 以完成向导。\n\n\
    成功完成向导后，你将返回到对象浏览器，并显示 `TICKETS` 表的定义。花点时间检查一下表的定义。你应该看到所有你定义的列。如果你点击定义区域顶部的 `Constraints`\
    \ 标签，你会看到几种不同的约束，包括在 `TICKET_ID` 上的主键约束。\n\n在对象浏览器的左上角是一个选择列表，用于定义正在浏览的对象类型。使用此选择列表选择\
    \ `Sequences`。你会看到 APEX 创建了一个名为 `TICKETS_SEQ` 的序列，它将用于填充 `TICKET_ID`。\n\n再次使用对象类型选择列表并选择\
    \ `Triggers`。你将看到一个名为 `BI_TICKETS` 的触发器（`BI` 代表“before insert”，即“插入前”）。在左侧选择 `BI_TICKETS`\
    \ 触发器，然后点击触发器详细信息上方的 `Code` 标签，将显示该触发器的代码。它会在 `TICKET_ID` 为 `null` 时使用 `TICKETS_SEQ`\
    \ 序列来填充它。你应该看到类似于以下内容的代码：\n\n```\ncreate or replace trigger \"BI_TICKETS\"\nbefore\
    \ insert on \"TICKETS\"\nfor each row\nbegin\n  if :NEW.\"TICKET_ID\" is null\
    \ then\n    select \"TICKETS_SEQ\".nextval into :NEW.\"TICKET_ID\" from sys.dual;\n\
    \  end if;\nend;\n```\n\n现在你已经定义了 `TICKETS` 表，让我们回去创建 `TICKET_DETAILS` 表。这次，你将创建一个指向\
    \ `TICKETS` 表的外键，并设置为 `级联删除`。这意味着如果你删除一张票，票的详细信息也会被自动删除。\n\n使用 `创建 (+)` 按钮启动创建表向导。\n\
    \n根据 ERD 和图 4-6 输入表名和列定义，然后点击 `Next`。再次确保勾选了适当的 `Not Null` 复选框。\n\n![A978-1-4842-0466-5_4_Fig6_HTML.jpg](img/A978-1-4842-0466-5_4_Fig6_HTML.jpg)\n\
    图 4-6.\n\n### 定义 `TICKET_DETAILS` 表\n\n接下来的步骤故意比之前的更模糊一些。你现在应该已经习惯使用创建表向导了，但如果需要复习，可以查看前面的步骤。\n\
    \n为 `主键` 选择 `从新序列填充`，选择 `TICKET_DETAILS_ID(NUMBER)` 作为 `主键` 列，然后点击 `Next`。\n\n\
    在 `TICKET_DETAILS` 表中的 `TICKET_ID` 与 `TICKETS` 表中的 `TICKET_ID` 之间添加一个外键。确保 `删除操作`\
    \ 设置为 `级联删除`。你的屏幕应该与图 4-7 中的类似。此外，请确保你从 `引用表` 字段中跳出（按 Tab 键），以便 APEX 显示允许你选择引用列的穿梭控件。\n\
    \n![A978-1-4842-0466-5_4_Fig7_HTML.jpg](img/A978-1-4842-0466-5_4_Fig7_HTML.jpg)\n\
    图 4-7.\n\n### 为 `TICKET_ID` 定义级联删除外键\n\n点击 `Add` 按钮以添加新的外键约束。\n\n点击 `Next`（见图\
    \ 4-8）。\n\n![A978-1-4842-0466-5_4_Fig8_HTML.jpg](img/A978-1-4842-0466-5_4_Fig8_HTML.jpg)\n\
    图 4-8.\n\n### 在表向导中定义的外键\n\n此表不需要其他约束。点击 `Next`。\n\n查看 `SQL` 语句并点击 `Create Table`\
    \ 以完成向导。\n"
- fmt: '## Loading Data with the Data Workshop Utility


    Now that you have your two base tables defined, you can begin working to migrate
    the old data into your shiny new data structure. You can use SQL Workshop’s Data
    Workshop utility to load and unload data from an Oracle schema in a number of
    ways, as shown in Figure [4-9](#A978-1-4842-0466-5_4_Chapter.html#Fig9). The Data
    Load option allows you to choose Text Data, XML Data, and Spreadsheet Data.


    ![A978-1-4842-0466-5_4_Fig9_HTML.jpg](A978-1-4842-0466-5_4_Fig9_HTML.jpg)


    Figure 4-9. Data Load and Unload methods provided by the Data Workshop utility


    Although three separate options are presented, the Text Data and Spreadsheet Data
    options actually use the same Data Load Wizard. There is little or no discernible
    difference in the actions of the wizard regardless of which option you select.


    The third option (XML Data) allows you to load data that has been exported in
    Oracle’s proprietary XML Data Transport format. The format looks like this:


    ```

    <ROWSET>

    <ROW>

    <USER_ID>2</USER_ID>

    <USER_NAME>DOUG</USER_NAME>

    <PASSWORD>A69856770A9AB9CBB0479573FCB3E2A5</PASSWORD>

    </ROW>

    <ROW>

    <USER_ID>3</USER_ID>

    <USER_NAME>DAVID</USER_NAME>

    <PASSWORD>E2E89134B8AC6E1FFC14139A6FB2C10B</PASSWORD>

    </ROW>

    </ROWSET>

    ```


    In your imaginary company, the help-desk technicians have been using Microsoft
    Excel to track tickets, so you’re going to load the data using the Spreadsheet
    Data option. A quick glance at the spreadsheet your technicians use shows you
    that they have two separate sheets in the Excel workbook: `TICKETS` and `TICKET_DETAILS`.


    Knowing that you’re using preexisting tables that already have primary and foreign
    keys in place, you need to be careful about how you load the data. `TICKET_DETAILS`
    depend on `TICKETS` for their parentage, so you need to load the `TICKETS` data
    first. Your spreadsheet should look like that in Figure [4-10](#A978-1-4842-0466-5_4_Chapter.html#Fig10).


    ![A978-1-4842-0466-5_4_Fig10_HTML.jpg](A978-1-4842-0466-5_4_Fig10_HTML.jpg)


    Figure 4-10. Spreadsheet data from the TICKETS tab of your Excel workbook


    Once you have the `TICKETS` data in the clipboard, you can switch back to APEX
    and use the Data Load Wizard to insert this data into your `TICKETS` table. Here
    are the steps to follow to load data from the spreadsheet into the database:


    Locate the `helpdesk_spreadsheet.xls` file where you downloaded the supporting
    files for this book, and open it with Microsoft Excel. Navigate to the `TICKETS`
    tab. Notice that you have a row for each ticket and a header row that contains
    the column headings for each of the columns. Select all the data, including the
    column headings, and copy it to the clipboard. Be cautious not to accidentally
    select any rows that don’t have data in them, because that may cause phantom rows
    or errors in the Data Load Wizard. Switch back to your web browser, and, using
    the pull-down menu on the SQL Workshop tab, select Data Workshop under the Utilities
    section. In the Data Load region, click Spreadsheet Data. You should see the Load
    Data dialog shown in Figure [4-11](#A978-1-4842-0466-5_4_Chapter.html#Fig11).


    ![A978-1-4842-0466-5_4_Fig11_HTML.jpg](A978-1-4842-0466-5_4_Fig11_HTML.jpg)


    Figure 4-11. Preparing to copy and paste the spreadsheet data and load it into
    the existing `TICKETS` table


    In the wizard, select Existing table for Load To and Copy and paste for Load From,
    and click Next. Select your “parse as” schema from the Table Owner select list.
    This is the same schema in which you created your tables in the Object Browser.
    Select TICKETS for the Table Name, as shown in Figure [4-12](#A978-1-4842-0466-5_4_Chapter.html#Fig12),
    and click Next. This is the table into which you’ll load the TICKETS data.


    ![A978-1-4842-0466-5_4_Fig12_HTML.jpg](A978-1-4842-0466-5_4_Fig12_HTML.jpg)


    Figure 4-12. Enter the name of the table into which you’re going to load the data


    Paste the data that you copied to the clipboard in step 2 into the Data text area.
    Change the Separator from a comma to `\t`, which stands for Tab Delimited. Now
    ensure that the First row contains column names box is checked, as shown in Figure
    [4-13](#A978-1-4842-0466-5_4_Chapter.html#Fig13). Click Next. (You may have to
    scroll within the dialog to see all the options.)


    ![A978-1-4842-0466-5_4_Fig13_HTML.jpg](A978-1-4842-0466-5_4_Fig13_HTML.jpg)


    Figure 4-13. Pasting the spreadsheet data into the Data text box


    When you click Next, APEX parses the data you’ve pasted in and does its best to
    match the column names in the first row of the spreadsheet data to the column
    names of the table into which you’re loading the data. On the next screen, you’re
    presented with column mapping so you can check its accuracy and, if necessary,
    make alterations and corrections. APEX is very good about matching column names
    as defined in the spreadsheet with those that have the same name in the table.
    However, if the names differ, it doesn’t try to guess but instead leaves the mapping
    to you. If you scroll to the right, you should see that APEX has matched all the
    column names from the spreadsheet correctly to the table columns. If, for some
    reason, the mappings aren’t right, you can adjust them using the drop-downs shown
    in Figure [4-14](#A978-1-4842-0466-5_4_Chapter.html#Fig14).


    ![A978-1-4842-0466-5_4_Fig14_HTML.jpg](A978-1-4842-0466-5_4_Fig14_HTML.jpg)


    Figure 4-14. Manually mapping the data columns to the table


    When you’re sure all the mappings are correct, click the Load Data button to load
    the data into the `TICKETS` table. After the data is loaded, you’re presented
    the Spreadsheet Repository screen shown in Figure [4-15](#A978-1-4842-0466-5_4_Chapter.html#Fig15).
    That screen shows that twenty rows were loaded into the database and zero errors
    occurred during loading.


    ![A978-1-4842-0466-5_4_Fig15_HTML.jpg](A978-1-4842-0466-5_4_Fig15_HTML.jpg)


    Figure 4-15. Data has been loaded into the `TICKETS` table


    If you navigate to the Object Browser, select the `TICKETS` table, and look at
    the data in that table, you can see that the records that were in your spreadsheet
    have been loaded into the database. To finish the job, you need to load the data
    for `TICKET_DETAILS`. Here’s what to do: Navigate to the Data Workshop, click
    the Spreadsheet Data link in the Data Load region, and click Next. In the wizard,
    select Existing Table for Load To and Copy and paste for Load From, and click
    Next. Select your “parse as” schema from the Table Owner select list. This is
    the same schema in which you created your tables in the Object Browser. Select
    TICKET_DETAILS for the Table Name, and click Next. In Microsoft Excel, navigate
    to the `TICKET_DETAILS` tab and copy all the data, including the column headings,
    in that spreadsheet to the clipboard. In your browser, paste the data you copied
    to the clipboard into the Data text area, change the Separator to `\t`, and ensure
    that First row contains column names is checked, and click Next. Review the mappings
    made by APEX in the Define Column Mapping region. It should have mapped everything
    correctly. Click Load Data to complete the data load. The summary should say that
    twenty-two records were loaded into the `TICKET_DETAILS` table with zero errors.


    You now have both of the main tables created and loaded with the legacy data.
    This alone is enough to start developing an application, but you’re not quite
    ready to begin yet.'
