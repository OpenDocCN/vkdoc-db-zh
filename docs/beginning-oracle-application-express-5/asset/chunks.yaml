- fmt: '### Selecting Tab Options


    Tabs are a common navigational structure for web applications and have been supported
    by traditional APEX themes since very early versions. They provide an intuitive
    interface for switching subjects or general areas in an application. Three options
    are available:


    *   **No Tabs**: This is a basic page style where no tabs are generated by the
    wizard and no tabs are displayed by the page template. This is often selected
    for small applications or applications where navigation is managed by a different
    method, such as lists, buttons, or other template constructs.

    *   **One-Level Tabs**: This is the most common style of tab layout; it’s useful
    for small- to mid-sized applications where functionality needs to be separated
    yet easily accessible. This is also the easiest type of tab style to manage.

    *   **Two-Level Tabs**: The construction of two-level tabs uses a parent tab construct
    and breaks the standard tabs into tab sets. It’s similar to having a controlling
    tab.


    Legacy themes within APEX support up to two-level tabs in the display templates
    provided, and the wizard builds the shared components for the tab set as part
    of the wizard. If you know your application’s page outline and can lay it out
    during the creation of the application, the wizard will do most of the tab setup.
    Designing the page at creation time can be a big timesaver if the application
    design calls for a significant number of tabs. In any case, you can create and
    modify the shared component after the initial run of the **Create Application**
    wizard.


    **Note**

    The new **Universal Theme** does not use tabs for navigation, but instead uses
    nested static lists. Therefore, when you choose to use the **Universal Theme**,
    the **Tabs** option on the **Application Attributes** page of the wizard will
    be absent.


    ### Globalization Options


    The authentication step in the wizard also includes six additional settings, as
    shown in Figure 5-13. A few of the settings have to do with the ability to translate
    the application to other languages. Multilingual applications are beyond the scope
    of this book, but for completeness the general usage descriptions of these options
    are included.


    ![A978-1-4842-0466-5_5_Fig13_HTML.jpg](A978-1-4842-0466-5_5_Fig13_HTML.jpg)

    *Figure 5-13. The Attributes page of the Create Application wizard*


    These settings are as follows:


    *   **Language**: This is the language the application uses by default. It’s also
    used as the basis for any internationalization and translation in the case of
    multilingual applications.

    *   **User Language Preference Derived From**: For multilingual applications,
    this setting determines how the application derives the translation that is necessary.

    *   **Date Format**: This option sets the default of how date elements are formatted
    within the application. Different regions of the world have assumptions about
    how dates are formatted, especially when they’re strictly numeric values. A common
    format that is used to try to alleviate this issue is the `DD-MON-YYYY` format.
    This style of format makes it clear which portion represents the day, month, and
    year (for example, `01-JAN-2010`).

    *   **Date Time Format**: This option sets the default formats of dates that include
    a time dimension.

    *   **Timestamp Format**: This option specifies the format used for timestamp
    datatypes used throughout the application.

    *   **Timestamp Time Zone Format**: This option specifies the format used for
    timestamp datatypes with time-zone data used throughout the application.


    The wizard uses these settings as starting values. You can alter them as needed
    in the shared components of the application.


    The language, date format settings, and time zone handling are classified as globalization
    settings. After the application is created, you can turn on automatic time-zone
    detection; this setting is found on the **Globalization** tab of the **Application
    Settings**. Automated time-zone detection is especially useful for applications
    whose users span different time zones.


    Continue creating the example application as follows:


    1.  Set **Authentication Scheme** to **Application Express**, **Language** to
    **English (en)**, and **User Language Preference Derived From** to **Application
    Primary Language**.

    2.  Choose `12-JAN-2004` (returns `DD-MON-YYYY`) for **Date Format** and `12-JAN-2004
    14:30:00` (returns `DD-MON-YYYY HH:MI:SS`) for **Date Time Format**, and leave
    the last two options blank.

    3.  Click **Next**.


    #### Completing the Create Application Wizard


    The last step of the wizard is a simple confirmation dialog. Clicking the **Create
    Application** button seen in Figure 5-14 commits all the settings and generates
    the application. The **Previous** button lets you walk backward through the wizard
    to make any additional changes before you complete the process.


    ![A978-1-4842-0466-5_5_Fig14_HTML.jpg](A978-1-4842-0466-5_5_Fig14_HTML.jpg)

    *Figure 5-14. Completing the Create Application wizard*


    Complete your creation of the example application by executing the final step
    in the process:


    1.  Review the wizard’s summary page and confirm the choices you’ve made by clicking
    **Create Application**.


    You now have a simple application with only two pages, as shown in Figure 5-15
    (View Report view). Run that application, and you should see the login page shown
    in Figure 5-16. That login page takes your normal APEX developer user name and
    password. Once logged in, you’ll be taken to the application’s **Home** page,
    as shown in Figure 5-17.


    ![A978-1-4842-0466-5_5_Fig17_HTML.jpg](A978-1-4842-0466-5_5_Fig17_HTML.jpg)

    *Figure 5-17. The application after you’ve logged in*


    ![A978-1-4842-0466-5_5_Fig16_HTML.jpg](A978-1-4842-0466-5_5_Fig16_HTML.jpg)

    *Figure 5-16. Login prompt when running the application*


    ![A978-1-4842-0466-5_5_Fig15_HTML.jpg](A978-1-4842-0466-5_5_Fig15_HTML.jpg)

    *Figure 5-15. Resulting pages for the Help Desk application*


    Now that you have the shell of the application created, you can move forward in
    extending it by adding other pages, regions, and items.'
