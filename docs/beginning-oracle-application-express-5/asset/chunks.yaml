- fmt: '## Markup Syntax


    用于在 Web 内容中嵌入链接的标记语法看起来有点像计算机语言。最终用户可能会觉得语法有点吓人；然而，语法结构简单、宽容，并且在帮助页面上有详细的文档说明：


    `[[ LINK_TYPE: LINK_TARGET | LINK_NAME ]]`


    起始和结束定界符是易于阅读的两个方括号。`LINK_TYPE` 是一个带有冒号的关键字。可用的链接类型在表 11-1 中描述。


    ### Table 11-1. `LINK_TYPE` 及描述


    | `page:` | 链接到 WebSheet 中的一个页面 |

    | `section:` | 链接到 WebSheet 中的一个节 |

    | `url:` 和 `popupurl:` | 链接到一个 URL |

    | `file:` | 将目标文件下载到用户的计算机 |

    | `image:` | 在文本节的页面中显示一个图像 |

    | `data grid:` 或 `datagrid` | 链接到一个数据网格的编辑页面 |

    | `report:` | 链接到一个只读的报告页面 |

    | `sql:` | 在网格中显示 SQL 语句的结果 |

    | `sqlvalue:` | 显示 SQL 语句中的单个值 |


    `LINK_TARGET` 指定点击链接时显示的对象。对于页面链接，`LINK_TARGET` 是页面别名。对于文件，`LINK_TARGET` 是文件名或别名。唯一的例外是
    `sql:` `LINK_TYPE`。`sql:` `LINK_TYPE` 的 `LINK_TARGET` 不是一个链接；它是一个返回行和列数据的 SQL
    语句。SQL 数据在页面显示时自动显示。`sql:` 语法也被称为 SQL 标签，此功能必须由管理员在应用程序属性区域中开启。这将在后面的“报告：设置”部分中介绍。


    竖线字符分隔 `LINK_TARGET` 和 `LINK_NAME`。语法中唯一挑剔的部分是竖线前后必须有单个空格。


    `LINK_NAME` 包含嵌入页面内容中的文本。用户点击此文本以跟随链接。此模式有两个例外。首先，`image` 的 `LINK_NAME` 是可选的，可以用
    HTML 标记代替。例如，您可以使用 HTML 标记来调整图像大小。其次，`sql:` `LINK_TYPE` 没有 `LINK_NAME`。`LINK_NAME`
    不是必需的，因为 SQL 数据本身会自动嵌入页面内容中。


    这种标记语法是宽容的。它不区分大小写，并且 WebSheet 代码会做出几个友好的假设。例如，如果您省略 `LINK_TYPE`，WebSheet 会扫描其元数据以查找
    `LINK_TARGET`。如果找到完全匹配项，WebSheet 会认为这就是您要找的目标。换句话说，您可以在语法上有点马虎，仍然能得到正确的结果。


    ## User Authentication


    用户身份验证管理用户如何登录 WebSheet。有四种选项：


    *   Application Express 账户：WebSheet 用户使用在托管该 WebSheet 的 APEX 工作区中设置的 ID 和密码登录
    WebSheet。

    *   单点登录 (SSO)：Oracle 的单点登录 (SSO) 技术使用户能够登录到其计算环境一次，然后访问其所有应用程序（例如 WebSheet），而无需重新输入用户名和密码。这是一个高级功能，超出了入门书籍的范围。

    *   LDAP：轻量级目录访问协议 (LDAP) 被 WebSheet 用来在使用非 Oracle 身份验证方案的计算环境中提供 SSO 能力。这是一个高级功能，超出了入门书籍的范围。

    *   自定义：此高级功能将在第 12 章中明确解释和说明。


    身份验证方法通常在工作区管理员最初创建 WebSheet 骨架时选择。如果 WebSheet 已设置为使用 Application Express 账户身份验证，并且您以
    Application Express 开发人员身份登录到工作区，则可以从 WebSheet 属性中编辑身份验证类型，如图 11-10 所示。


    ![A978-1-4842-0466-5_11_Fig10_HTML.jpg](A978-1-4842-0466-5_11_Fig10_HTML.jpg)


    **图 11-10.** 为 WebSheet 设置的 Application Express 账户身份验证


    当您点击“编辑身份验证”按钮时，您将被重定向到应用程序生成器中的 WebSheet 应用程序属性页面（参见图 11-11）。


    ![A978-1-4842-0466-5_11_Fig11_HTML.jpg](A978-1-4842-0466-5_11_Fig11_HTML.jpg)


    **图 11-11.** 应用程序生成器中显示的用户身份验证选项


    当您使用 Application Express 账户身份验证选项并且也登录到应用程序生成器时，点击“编辑身份验证”按钮会将您带出 WebSheet 并直接进入应用程序生成器。一开始您可能不明显感觉到这个转换，因为页面主体相似。您需要通过查看页面顶部和菜单来验证您的上下文。参见图
    11-11。


    如果 WebSheet 使用 SSO、LDAP 或自定义身份验证，您必须以 APEX 管理员或开发人员身份登录到 APEX Builder。登录后，导航到
    WebSheet 的应用程序属性页面，在那里您可以选择所需的身份验证方案并进行配置。图 11-11 所示示例的细节将在第 12 章中讨论。'
  raw: '## Markup Syntax


    The markup syntax that is used to embed links in your web content looks a bit
    like a computer language. End users might find the syntax a bit intimidating;
    however, the syntax structure is simple, forgiving, and well documented on the
    Help page:


    `[[ LINK_TYPE: LINK_TARGET | LINK_NAME ]]`


    The opening and closing delimiters are two square brackets that are easy to read.
    `LINK_TYPE` is a keyword with a trailing colon. The available link types are described
    in Table [11-1](#A978-1-4842-0466-5_11_Chapter.html#Tab1).


    Table 11-1.


    `LINK_TYPE`s and Descriptions


    | `page:` | Links to a page in the websheet |

    | `section:` | Links to a section in the websheet |

    | `url:` and `popupurl:` | Links to a URL |

    | `file:` | Downloads the target file to the user’s computer |

    | `image:` | Displays an image on the page in a text section |

    | `data grid:` or `datagrid` | Links to a data grid’s Edit page |

    | `report:` | Links to a read-only report page |

    | `sql:` | Displays the result of an SQL statement in a grid |

    | `sqlvalue:` | Displays a single value from an SQL statement |


    `LINK_TARGET` specifies the object that is displayed when you click the link.
    For a page link, `LINK_TARGET` is the page alias. For a file, `LINK_TARGET` is
    the file name or alias. The only exception to this pattern is the `sql: LINK_TYPE`.
    The `sql: LINK_TYPE`’s `LINK_TARGET` isn’t a link; it’s an SQL statement that
    returns data in rows and columns. The SQL data is automatically displayed when
    the page is displayed. The `sql:` syntax is also referred to as SQL tags, and
    this feature must be turned on by an administrator in the application properties
    area. This is covered later in the “Reports: Setup” section.


    A vertical bar character separates `LINK_TARGET` and `LINK_NAME`. The only fussy
    part of the syntax is the single spaces that must precede and follow the vertical
    bar.


    `LINK_NAME` contains the text that is embedded in the page’s content. The user
    clicks this text to follow the link. There are two exceptions to this pattern.
    First, the `image LINK_NAME` is optional and can be replaced by HTML markup. For
    example, you can use HTML markup to resize the image. Second, the `sql: LINK_TYPE`
    has no `LINK_NAME`. `LINK_NAME` isn’t required, because the SQL data itself is
    automatically embedded in the page content.


    The markup syntax is forgiving. It’s case insensitive, and the websheet code makes
    several friendly assumptions. For example, if you omit `LINK_TYPE`, the websheet
    scans its metadata for `LINK_TARGET`. If an exact match is found, the websheet
    assumes that this is the target for which you were looking. In other words, you
    can be a bit sloppy with the syntax and still get the correct result.


    ## User Authentication


    User authentication governs how users log on to a websheet. There are four options:


    *   Application Express Account: Websheet users log on to the websheet by using
    the IDs and passwords that have been set up in the APEX workspace that hosts the
    websheet.

    *   Single Sign-On: Oracle’s single sign-on (SSO) technology enables users to
    sign in to their computing environment one time and then access all their applications,
    such as websheets, without having to re-enter their username and password. This
    is an advanced feature that is out of scope for a beginning book.

    *   LDAP: Lightweight Directory Access Protocol (LDAP) is used by websheets to
    provide SSO capability in computer environments that use non-Oracle authentication
    schemes. This is an advanced feature that is out of scope for a beginning book.

    *   Custom: This advanced feature will be explicitly explained and illustrated
    in [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html).


    The authentication method is normally chosen when the workspace administrator
    initially creates the skeleton websheet. If the websheet has been set up using
    Application Express Account authentication and you’re logged in to the workspace
    as an Application Express developer, you can edit the authentication type from
    the Websheet Properties, as shown in Figure [11-10](#A978-1-4842-0466-5_11_Chapter.html#Fig10).


    ![A978-1-4842-0466-5_11_Fig10_HTML.jpg](A978-1-4842-0466-5_11_Fig10_HTML.jpg)


    Figure 11-10.


    Authentication set to Application Express Account for a websheet


    When you click the Edit Authentication button, you’re redirected to the websheet’s
    Application Properties page in the Application Builder (see Figure [11-11](#A978-1-4842-0466-5_11_Chapter.html#Fig11)).


    ![A978-1-4842-0466-5_11_Fig11_HTML.jpg](A978-1-4842-0466-5_11_Fig11_HTML.jpg)


    Figure 11-11.


    User-authentication options displayed in the Application Builder


    When you’re using the Application Express Account authentication option and also
    are logged in to the Application Builder, clicking the Edit Authentication button
    takes you out of the websheet and directly into the Application Builder. This
    transition may not be obvious to you at first, because the page bodies are similar.
    You need to verify your context by looking at the top of the page and the menus.
    See Figure [11-11](#A978-1-4842-0466-5_11_Chapter.html#Fig11).


    If the websheet is using SSO, LDAP, or custom authentication, you must log in
    to the APEX Builder as either an APEX administrator or a developer. After you
    log in, navigate to the websheet’s Application Properties page, where you can
    pick the desired authentication scheme and configure it. The details of the example
    shown in Figure [11-11](#A978-1-4842-0466-5_11_Chapter.html#Fig11) will be discussed
    in [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html).'
