- fmt: '## Creating a Lookup Table


    Have a look at the definitions and data of the tables you just created. They''re
    basically mirror images of the spreadsheet tabs the technicians were using before.
    If you examine the data closely, you will notice that there are still some areas
    where the data isn''t quite normalized as well as it could be.


    For instance, in the `TICKETS` table, the `STATUS` column has only three values—`OPEN`,
    `CLOSED`, and `PENDING`—which repeat over and over. The data values in this column
    indicate that it''s a perfect candidate for creating a lookup table. Although
    it''s tempting to create the table manually with the Create Table Wizard and then
    manually migrate the data, APEX can create a lookup table—complete with its own
    sequence, trigger, and foreign key—and modify the original table so it points
    to the new lookup table, all without you writing a line of code. Here''s how:


    Navigate to the Object Browser and select the `TICKETS` table in the Object List
    on the left side of the screen. You should see results similar to those shown
    in Figure 4-16.


    ![A978-1-4842-0466-5_4_Fig16_HTML.jpg](A978-1-4842-0466-5_4_Fig16_HTML.jpg)

    **Figure 4-16.**


    Clicking the Create Lookup Table button starts the Create Lookup Table Wizard.
    Make sure the Table tab is selected. Below the tab bar is a set of button-like
    links. Click the `Create Lookup Table` button, as shown by the mouse arrow in
    Figure 4-16; it starts the Create Lookup Table Wizard. The first step of the Create
    Lookup Table Wizard (Figure 4-17) gives you the option to show either only `VARCHAR`
    column types or all column types. It defaults to `VARCHAR` because that''s most
    likely to be the candidate for lookup tables. Looking at the columns presented
    in the wizard, you will see that one of the `VARCHAR` columns is your `STATUS`
    column.


    ![A978-1-4842-0466-5_4_Fig17_HTML.jpg](A978-1-4842-0466-5_4_Fig17_HTML.jpg)

    **Figure 4-17.**


    Selecting the `STATUS` column as the source of your lookup table. Select `STATUS`
    as the column from which you want to create the lookup table, and click Next.
    The next step allows you to name your lookup table and the sequence that is related
    to it. APEX has chosen a reasonable name for the new table and sequence, so take
    the defaults and click Next. The final screen of the wizard (Figure 4-18) provides
    you with information about the choices made and the action that is about to be
    performed. It''s easy to miss the SQL syntax link just below the wizard region.
    Click the SQL link to show the SQL.


    ![A978-1-4842-0466-5_4_Fig18_HTML.jpg](A978-1-4842-0466-5_4_Fig18_HTML.jpg)

    **Figure 4-18.**


    Clicking the SQL syntax link shows the SQL about to be executed. Examining the
    SQL shows the steps that will be taken to create the new lookup table, associated
    sequence, and trigger; insert the data into the table; and update the data in
    the originating table so that it references your new lookup table. That''s quite
    a lot of work saved on your part. Click `Create Lookup Table` to complete the
    wizard. You''re taken back to the Object Browser. The `STATUS_LOOKUP` table is
    highlighted and its details are shown.


    Use the Object Browser to examine the objects that the wizard created.


    ## Loading and Running SQL Scripts


    The SQL Scripts tool of SQL Workshop allows you to create, upload, manage, and
    run SQL scripts. These scripts are similar to `SQL*PLUS` scripts in many ways.
    However, if you use scripts written for `SQL*PLUS`, APEX ignores any `SQL*PLUS`-specific
    syntax.


    Once a script is created or loaded, it''s moved into the script repository, where
    it remains until you decide to remove it. From the script repository, you can
    decide to edit or run the script. When you run a script, APEX stores the results
    for you to view later. For example, you can come back to review the results for
    possible error messages.


    You''re now going to load and run a script that will modify the underlying data
    just a bit. Here''s why: In the real world, the spreadsheet you received from
    the help-desk team would have current dates and data in it; however, the ticket
    dates in the spreadsheet that is downloaded with the `.zip` file accompanying
    this book very likely aren''t current. This would cause you to have to search
    back in history for the tickets if you were searching by date. This script will
    update these dates so they''re recent.


    Another thing you need to take into consideration is that you loaded a bunch of
    data into your tables that already had IDs assigned to them. Because the IDs were
    loaded with the data, you didn''t use your database sequences. Therefore, your
    sequences are out of synch with the data. You need to drop and re-create your
    sequences so the next sequence number is greater than the largest ID used in the
    associated table.


    You''re also going to alter the Before Insert trigger that was automatically created
    on the `TICKETS` table so that it automatically fills in the `CREATED_ON` column.
    You''ll also create a couple of database views that will be used later to retrieve
    data formatted for some of the specific charts and calendars you''re going to
    create.


    Finally, you''ll create a function that, when passed a status name such as `OPEN`,
    passes back the ID for that status. This function is used in a number of places,
    because you can''t guarantee you know the ID value of a given status. Therefore,
    this function is the only safe way to get the associated ID for a given status.


    When you''re in any of the SQL Workshop tools, you can use the pull-down menu
    of the SQL Workshop tab as a quick way to navigate to each of the other tools.
    Figure 4-19 shows this menu and highlights the SQL Scripts option.


    ![A978-1-4842-0466-5_4_Fig19_HTML.jpg](A978-1-4842-0466-5_4_Fig19_HTML.jpg)

    **Figure 4-19.**


    Using the SQL Workshop menu to navigate to the underlying tools.


    Here''s what to do to run the script that will update your schema objects appropriately:


    Navigate to the SQL Scripts tool using SQL Workshop menu. Click the `Upload` button
    in the upper-right section of the screen. Click `Browse` or `Choose File` buttons
    to search for the SQL file to upload. In the pop-up file-finder window, locate
    and select the `ch4_schema_changes.sql` file and click `Upload`. You don''t need
    to give the script a name; it defaults to the name of the script as it appears
    at the OS level. Once the file has been uploaded, you''re presented with a SQL
    Scripts report showing the script that you just uploaded. From this point, you
    can either edit or run the script. If you want to see what the script contains,
    feel free to edit it. You can run the script from the edit screen as well. Run
    the script by clicking either the `Run` button (if you''re editing the script)
    or the `Run` icon (if you''re still viewing the SQL Scripts report). As shown
    in Figure 4-20, you''re asked to make a selection between `Run in Background`
    and `Run Now`. Select `Run Now`.


    ![A978-1-4842-0466-5_4_Fig20_HTML.jpg](A978-1-4842-0466-5_4_Fig20_HTML.jpg)

    **Figure 4-20.**'
