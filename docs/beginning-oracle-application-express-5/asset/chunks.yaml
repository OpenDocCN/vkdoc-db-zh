- fmt: '### Interactive Report Settings


    The Interactive Reports Settings page allows workspace administrators to manage
    saved reports and report subscriptions. Only workspace administrators can delete
    saved reports and report subscriptions. The only way to modify a report configuration
    is to log in as the user.


    #### Saved Reports


    The Saved Reports section allows you to delete certain saved interactive reports.
    Interactive reports have four different types of saved reports (see Figure [14-14](#A978-1-4842-0466-5_14_Chapter.html#Fig14)).
    Primary Default is the default report setting as created by the developer and
    is accessible to all users. Alternative Default reports are also saved by the
    developer and are accessible to all users. This gives the developer the ability
    to pre-create several versions of the same report.


    ![A978-1-4842-0466-5_14_Fig14_HTML.jpg](A978-1-4842-0466-5_14_Fig14_HTML.jpg)


    Figure 14-14. Manage Saved Interactive Reports page


    Private interactive reports are custom interactive reports that are only visible
    to the users who created them. Public interactive reports are reports saved by
    a privileged end user that have been created as public so any other user can see
    them.


    On the Saved Reports page, you can delete any report except the Primary Default
    report by selecting the report(s) and clicking the Delete Checked button. Primary
    default reports can’t be deleted from this screen. They can only be altered by
    directly editing the report region.


    #### Subscriptions


    Similar to the Saved Reports section, you can delete interactive report subscriptions
    from the Subscriptions section. Subscriptions allow users to receive emailed reports
    on a schedule that they define. Subscriptions were a new feature in APEX 4.0 and
    must be explicitly enabled by developers.


    On the Manage Subscriptions page, workspace administrators can either delete specific
    subscriptions or all subscriptions, as shown in Figure [14-15](#A978-1-4842-0466-5_14_Chapter.html#Fig15).
    Just like with saved reports, you can’t modify any of the subscription attributes.


    ![A978-1-4842-0466-5_14_Fig15_HTML.jpg](A978-1-4842-0466-5_14_Fig15_HTML.jpg)


    Figure 14-15. Manage Subscriptions page


    ### Managing Users and Groups


    This section will cover most of the features available when you click the Manage
    Users and Groups icon located on the Administration home page shown in Figure
    [14-1](#A978-1-4842-0466-5_14_Chapter.html#Fig1). All references assume that you
    start on the Manage Users and Groups page shown in Figure [14-16](#A978-1-4842-0466-5_14_Chapter.html#Fig16).


    ![A978-1-4842-0466-5_14_Fig16_HTML.jpg](A978-1-4842-0466-5_14_Fig16_HTML.jpg)


    Figure 14-16. Manage Users and Groups page


    The main page contains a list of all the end users, developers, and workspace
    administrators. You can modify a user by clicking their name. End users don’t
    have access to the development environment and have access to applications only
    if the authentication scheme is the default Application Express.


    #### Creating One User


    To create a single user, click the Create User button shown in Figure [14-16](#A978-1-4842-0466-5_14_Chapter.html#Fig16).
    If you’re only creating developers, you don’t need to worry about entering some
    of the non-required fields, such as first and last name, because you usually know
    the user based on the username. You can also grant access to specific modules.
    For example, if you create an account for a project manager, you may only want
    to give them access to the Team Development module, as shown in Figure [14-17](#A978-1-4842-0466-5_14_Chapter.html#Fig17).


    ![A978-1-4842-0466-5_14_Fig17_HTML.jpg](A978-1-4842-0466-5_14_Fig17_HTML.jpg)


    Figure 14-17. Account privileges


    #### Creating Multiple Users


    Creating multiple users one at a time using the Create User page can become slow
    and frustrating. APEX provides an interface to create multiple users. Start by
    clicking the Create Multiple Users button, as shown in Figure [14-16](#A978-1-4842-0466-5_14_Chapter.html#Fig16).


    On the Create Multiple Users page, you need to provide an email address for each
    user. The email addresses can be delimited by commas, semicolons, or new lines.
    APEX generates the usernames from the email addresses that you enter. For example,
    the email address `doug@mycompany.com` yields as a username either `doug@mycompany.com`
    or just plain `doug`. You can specify whether you wish each email address to translate
    directly into a username, or whether you want the usernames to exclude the `@domain`
    suffixes. Figure [14-18](#A978-1-4842-0466-5_14_Chapter.html#Fig18) shows the
    radio button set for the latter option.


    ![A978-1-4842-0466-5_14_Fig18_HTML.jpg](A978-1-4842-0466-5_14_Fig18_HTML.jpg)


    Figure 14-18. Create Multiple Users page


    If your usernames don’t correspond to your corporate email addresses, you can
    enter email addresses with invalid domains and select the option to omit the suffixes.
    For example, enter the email address `jonathan@example.com` when you just want
    a user named `jonathan`. Then select the option to exclude the `@domain` portion
    of the email address.


    The password that you enter is the same for all the users. When they log in to
    the workspace, they will be required to change it.


    After you enter all the information on the Create Multiple Users page, click the
    Next button to go to the confirmation page shown in Figure [14-19](#A978-1-4842-0466-5_14_Chapter.html#Fig19).
    If everything is correct, click the Create Valid Users button.


    ![A978-1-4842-0466-5_14_Fig19_HTML.jpg](A978-1-4842-0466-5_14_Fig19_HTML.jpg)


    Figure 14-19. Create Multiple Users confirmation


    #### Organizing Users into Groups


    You can associate an APEX user with multiple groups. These groups can be used
    in authorization schemes to grant or deny access to various parts of an application.
    Because groups are linked with APEX users, you can only use groups when your authentication
    scheme is set to the default Application Express scheme.


    It’s important to note that groups are associated with a single workspace. If
    you have a traditional setup with development, test, and production environments,
    you will need to create the same groups in each of the workspaces.


    #### Creating a Group


    To create a user group, click the Manage User Groups link in the Tasks region
    (shown in Figure [14-20](#A978-1-4842-0466-5_14_Chapter.html#Fig20)), and then
    click the Create User Group button. Enter a unique group name and description,
    as shown in Figure 14-24\. Groups can be nested so that they contain other groups.
    When a group contains other groups, they become a parent group and therefore “inherit”
    membership of the other groups.


    ![A978-1-4842-0466-5_14_Fig21_HTML.jpg](A978-1-4842-0466-5_14_Fig21_HTML.jpg)


    Figure 14-21. Creating a user group


    ![A978-1-4842-0466-5_14_Fig20_HTML.jpg](A978-1-4842-0466-5_14_Fig20_HTML.jpg)


    Figure 14-20. Manage User Groups option from the Tasks menu


    #### Assigning Users to a Group


    Assigning users to a group isn’t very intuitive. Clicking Group Assignments in
    the Manage User Groups region only gives you a report of all the users and their
    groups. To assign a user to a group, you need to edit the user (Users ➤ Edit User)
    and scroll down to the User Groups region shown in Figure [14-22](#A978-1-4842-0466-5_14_Chapter.html#Fig22).


    ![A978-1-4842-0466-5_14_Fig22_HTML.jpg](A978-1-4842-0466-5_14_Fig22_HTML.jpg)


    Figure 14-22. Assigning users to a group


    ### Viewing Usage Reports and Dashboards


    The Monitor Activity and Dashboard sections from Figure [14-1](#A978-1-4842-0466-5_14_Chapter.html#Fig1)
    provide many detailed and summary reports about your APEX workspace. The reports
    contain information about both developer activity and end-user activity. You’re
    encouraged to explore each of these sections to see all the available reports.'
