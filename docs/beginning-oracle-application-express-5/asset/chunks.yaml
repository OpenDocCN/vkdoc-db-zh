  trans: "## 里程碑\n\n里程碑用于定义和追踪计划内及一次性事件的日期。表面上看，这是一个简单的概念；然而，它可能是一个令人困惑的领域，因为里程碑的功能与\
    \ `发布` 重叠，并且可能与 `功能特性`、`待办事项` 和 `缺陷` 相关联的截止日期混淆。幸运的是，通过一点规划和组织，可以减轻这种困惑。\n\n一种可用于组织\
    \ `里程碑` 和 `发布` 的策略是为同一个发布事件各创建一个。`里程碑` 包含与该 `发布` 相关的元数据：日期、类型、所有者、描述和标签。`发布` 被定义为一个可配置的\
    \ `值列表`，供所有团队开发实体共享，但它不包含描述性元数据。此外，`发布` 是与 `功能特性`、`待办事项` 和 `缺陷` 相关联的便捷高级筛选器之一。对元数据和高级筛选器的双重需求，正是必须使用\
    \ `里程碑` 和 `发布` 来描述同一事件的原因。值得庆幸的是，这样做的额外开销很低。\n\n对于包含多个应用程序的工作空间，另一个建议是使用其关联应用程序的名称或代码作为前缀来命名\
    \ `功能特性`、`里程碑`、`发布`、`待办事项` 和 `反馈`。在许多情况下，这并非绝对必要，但它可以使某些仪表板更具可读性，因为它们通常只包含实体的名称，而没有任何支持数据。\n\
    \n当然，`里程碑` 也用于定义和追踪软件开发生命周期中的其他事件。重要会议、工具软件升级和需求交付只是几个例子。\n\n`里程碑` 界面包含多个选项卡。`仪表板`\
    \ 和 `日历` 选项卡对所有实体通用，并已在前面讨论过。\n\n### 里程碑报告选项卡\n\n图 15-7 中的 `报告` 选项卡显示了一个交互式报告，其中包含\
    \ `里程碑` 列表。高级筛选器允许您选择全部或仅未来事件，以及单个 `发布`。交互式报告中的 `编辑` 链接将带您进入该 `里程碑` 的编辑页面，该页面包含直观的项目，并在其标签下有文档说明。\n\
    \n![A978-1-4842-0466-5_15_Fig7_HTML.jpg](img/A978-1-4842-0466-5_15_Fig7_HTML.jpg)\n\
    \n图 15-7. `里程碑` 选项卡\n\n### 按所有者选项卡\n\n`按所有者` 选项卡（参见图 15-8）是一个仪表板，它按所有者分类，汇总了单个\
    \ `里程碑` 与其他团队开发实体之间的关系。了解相关 `功能特性`、`待办事项` 和 `缺陷` 的数量与状态，是一种有效的管理工具，对于控制导向一个 `发布`\
    \ 的冲刺或时间盒非常有用。\n\n![A978-1-4842-0466-5_15_Fig8_HTML.jpg](img/A978-1-4842-0466-5_15_Fig8_HTML.jpg)\n\
    \n图 15-8. `按所有者的里程碑` 选项卡\n\n### 按里程碑的功能特性选项卡\n\n`按里程碑的功能特性` 选项卡（参见图 15-9）包含一个交互式报告，详细说明了\
    \ `里程碑` 与其关联的 `功能特性` 之间的关系。这主要是一份管理报告。\n\n![A978-1-4842-0466-5_15_Fig9_HTML.jpg](img/A978-1-4842-0466-5_15_Fig9_HTML.jpg)\n\
    \n图 15-9. `按里程碑的功能特性` 选项卡\n\n## 功能特性\n\n`功能特性` 从高层视角描述一个应用程序。它们在开发项目开始时使用，以充分定义范围，从而可以估算成本、进度和资源需求的预算。项目获批并开始工作后，会添加子\
    \ `功能特性` 以更详细地描述、控制和追踪进度。`功能特性` 是管理状态报告的核心。\n\n`功能特性` 详情页包含多个选项卡。`仪表板`、`日历`、`关注区域`\
    \ 和 `所有者` 选项卡在此不作讨论，因为它们或其等效项对所有实体通用，其特性已在前面提及。接下来重点介绍 `报告`、`历史记录` 和 `进度日志` 选项卡。\n\
    \n### 功能特性报告选项卡\n\n`报告` 选项卡（参见图 15-10）包含一个交互式报告，该报告进而链接到单个 `功能特性` 记录的编辑页面。由于数据网格是一个交互式报告，每个用户都可以根据自己的需求定制它。您可以从大约\
    \ 50 个属性中选择列，按喜好排序，甚至可以将相关记录分组在一起。交互式报告在 第 6 章 中有详细讨论。\n\n![A978-1-4842-0466-5_15_Fig10_HTML.jpg](img/A978-1-4842-0466-5_15_Fig10_HTML.jpg)\n\
    \n图 15-10. `功能特性` 交互式报告\n\n当您要输入多个相关的 `功能特性` 时，`复制` 链接非常有用。例如，如果您要输入 10 或 20 个属于同一个应用程序的\
    \ `功能特性`，您可能预期许多数据属性在每条记录上都会重复。`复制` 链接会创建一个新的 `功能特性`，作为交互式报告中现有记录的精确副本。只有名称会被更改。新\
    \ `功能特性` 创建后，您可以快速编辑它，并更改该记录特有的属性。\n\n`编辑` 链接将带您进入 `功能特性` 编辑页面（参见图 15-11）。您可以轻松地自行浏览各个属性；它们的定义通常是自明的，并通过点击属性标签进行记录。然而，`功能特性`\
    \ 编辑页面上有一些区域需要更多解释：\n*   `用户界面`、`测试`、`文档`、`全球化`、`安全` 和 `无障碍性` 区域：这些区域用于追踪与 `功能特性`\
    \ 相关的子生命周期。例如，如果一个独立团队负责文档，他们的进度可以与主 `功能特性` 分开追踪（参见图 15-12）。如果不需要追踪文档工作，则可以通过在团队开发设置区域中关闭它，将\
    \ `文档` 区域从 `功能特性` 编辑页面中排除。请参阅本章后面的“团队开发设置”小节。\n    ![A978-1-4842-0466-5_15_Fig12_HTML.jpg](img/A978-1-4842-0466-5_15_Fig12_HTML.jpg)\n\
    \    图 15-12. `功能特性文档` 区域\n    ![A978-1-4842-0466-5_15_Fig11_HTML.jpg](img/A978-1-4842-0466-5_15_Fig11_HTML.jpg)\n\
    \    图 15-11. `功能特性` 编辑页面\n*   可配置的值列表 (`LOV`)：有些 `LOV`，如 `状态`，由 APEX 团队控制。其他，如\
    \ `所有者`，由开发团队控制。这些列表是在原地维护的，而不是在一个单独的维护区域中维护开发人员可配置的 `LOV`。例如，要添加一个新所有者，您在 `新所有者`\
    \ 项目中输入适当的名称，然后单击 `应用更改` 按钮，该名称就会被添加到 `LOV` 中。遗憾的是，目前没有简单安全的方法来编辑这些可配置的 `LOV`；我们希望在未来版本的\
    \ APEX 中能增加此功能。\n\n### 历史记录选项卡\n\n`历史记录` 选项卡（参见图 15-13）提供了对所有 `功能特性` 所有更改的详细审计跟踪。该选项卡显示了一个交互式报告，包含有关\
    \ `功能特性`、列名、旧值、新值、进行更改的用户以及更改时间的信息。您可以出于质量保证目的查看 `历史记录` 选项卡上的报告，或者在发生合同纠纷时作为证据来源。\n\
    \n![A978-1-4842-0466-5_15_Fig13_HTML.jpg](img/A978-1-4842-0466-5_15_Fig13_HTML.jpg)\n\
    \n图 15-13. `功能特性历史记录` 选项卡"
- fmt: '### Progress Log Tab


    The Progress Log tab in Figure [15-14](#A978-1-4842-0466-5_15_Chapter.html#Fig14)
    is, in effect, a diary. Stakeholders can, on the Features Edit page, enter free-form
    text into the progress log at any time. The progress log acts as a communication
    channel for the development team and can be used to record new ideas, reminders,
    a flash of brilliance, questions, and anything else that needs to be remembered.


    ![A978-1-4842-0466-5_15_Fig14_HTML.jpg](A978-1-4842-0466-5_15_Fig14_HTML.jpg)


    Figure 15-14. Features Progress Log tab


    ## To-Do Items


    To-do items are the workhorses of Team Development. Team Development uses the
    term to-do as a noun. A to-do is a specific task that is assigned to an individual
    or team along with a due date. In simple terms, a to-do describes the what, who,
    and when of the task at hand.


    To-dos can be subdivided into many child and grandchild tasks. This process of
    decomposition can be done to the point of diminishing returns. A rule of thumb
    is that the number of subtask levels should be appropriate for effectively controlling
    the tasks at hand. What is appropriate is, of course, a function of your team’s
    culture. Also, in an agile software-development shop, the subtask levels tend
    to remain shallow due to the daily face-to-face communication between team members.


    There are four tabs in the To-Dos module: Dashboard, To-Dos, Calendar, and Progress
    Log. You’ll find working with these tabs to be easy and intuitive.


    A handy navigation feature links the development environment directly to the To-Dos
    module. When a to-do has its context set to both an application and a specific
    page number within that application, a count of to-dos appears in the Team Development
    drop-down menu (see Figure [15-15](#A978-1-4842-0466-5_15_Chapter.html#Fig15)).
    In the drop-down you can see counts of to-dos, bugs, feedback, and features. When
    you click the to-do count, the link takes you directly to the To-Dos Report page
    that has the interactive report filters set to list only the open to-dos associated
    with the Development page (see Figure [15-16](#A978-1-4842-0466-5_15_Chapter.html#Fig16)).
    The developer can then quickly select one of the to-dos, see what needs to be
    done, and return to the Development page to complete the to-do task. This efficient
    navigation strategy also applies to bugs and feedback.


    ![A978-1-4842-0466-5_15_Fig16_HTML.jpg](A978-1-4842-0466-5_15_Fig16_HTML.jpg)


    Figure 15-16. To-Dos page filtered by an application’s development count link


    ![A978-1-4842-0466-5_15_Fig15_HTML.jpg](A978-1-4842-0466-5_15_Fig15_HTML.jpg)


    Figure 15-15. Development page linked directly to the To-Dos module


    ## Bugs


    In the software-development world, bugs are a fact of life. We all hope that bugs
    are found and fixed in the unit- and system-testing cycles before a product is
    released to end users. Happily, this is generally true, with the caveat that a
    small number of bugs slip through into the production environment. Team Development’s
    Bugs module is a practical environment that is used to track easy and hard bugs
    in the development, test, and production environments.


    Easy bugs are usually caused by a coding error or a programmer’s misunderstanding
    of a requirement. The symptoms are obvious, the root cause is simple to find,
    and the fix is almost trivial; for example, changing a plus sign to a minus sign
    or reorganizing an `IF` statement in the code. Easy bugs are usually found early
    in the product’s development cycle and are, in general, caught by the programmers
    or testers. However, easy bugs must be recorded and reported so that improvements
    can be made to the coding process; a large number of easy bugs can turn out to
    be surprisingly expensive.


    Hard bugs are, well, hard. They can be caused by design flaws anywhere in the
    system, subtle interactions between software systems, subtle interactions between
    software and hardware, and awkward interactions between users and the GUI. Hard
    bugs can have their own lifecycle, and the fix might be spread over several product
    releases. Team Development’s Bugs and To-Dos modules can be used together to track
    a hard bug’s resolution, even when it spans several product releases.


    The Bugs module highlights how you can take advantage of Team Development’s simplicity,
    extensibility, and flexibility. Simplicity makes tracking easy bugs almost trivial.
    A bug is found, and everything about the bug is recorded in Team Development’s
    Bugs module, including the what, who, and when data. Easy bugs can stand on their
    own, or you can associate them with a to-do depending on how you organize your
    Team Development environment.


    Extensibility and flexibility come into play when you deal with hard bugs that
    may take an extended amount of time to fix and may possibly require effort from
    several developers or teams. Team Development can handle this situation by linking
    a hard bug to a to-do (see Figure [15-17](#A978-1-4842-0466-5_15_Chapter.html#Fig17)).
    The linked to-do is then set up as the parent of several child to-dos that are
    used to track the tasks required for the fix.


    ![A978-1-4842-0466-5_15_Fig17_HTML.gif](A978-1-4842-0466-5_15_Fig17_HTML.gif)


    Figure 15-17. Linking a hard bug to a parent to-do


    ## Feedback


    Team Development’s Feedback module is an APEX “sweet spot.” Even if your team
    chooses not to use Team Development to manage its software-development efforts,
    you should at least consider using the Feedback module. The Feedback module provides
    a cost-effective channel through which end users, test team members, and even
    the developers themselves can send suggestions, comments, and bug reports directly
    to business analysts and developers. Responses to the feedback can optionally
    be communicated back to the persons who triggered the feedback. And feedback can
    be taken from all three typical environments: production, test, and development.


    Note


    The Feedback module is so cost effective because the cost-to-benefit ratio almost
    approaches zero. It takes only a few minutes to set up feedback in an APEX application,
    and it gives you a huge benefit.'
