  trans: '### 使用列标题菜单


    运行交互式报表时，列标题本身就包含各项功能，这或许是格式化报表单列最快捷的方式。图 7-19 展示了交互式报表的列标题功能。点击列标题会打开一个列级别的菜单，其中包含图标驱动的选项，可用于快速排序、从报表中移除该列、在该列上添加中断、搜索以及筛选。此菜单中的
    `Search Bar`（搜索栏）允许最终用户直接搜索和筛选该列中的值。`Remove Column`（移除列）选项让用户可以快速将该列从报表中移除。若要恢复该列，用户必须选择
    `Actions`（操作）菜单的 `Select Columns`（选择列）选项。`Break`（中断）选项可在该列上添加中断。


    ![A978-1-4842-0466-5_7_Fig19_HTML.jpg](img/A978-1-4842-0466-5_7_Fig19_HTML.jpg)


    图 7-19.


    使用列标题菜单


    如果您查看 `Filter`（筛选）文本字段下方，您会看到该列中出现的所有不同值的完整列表。点击其中任何一个不同的值都会在该列上创建一个筛选器，仅显示与所选值匹配的行。


    ### 按列搜索


    `Search Bar`（搜索栏）左端的放大镜图标实际上是报表中可见列的列表，这是按特定列或所有列进行快速筛选的便捷方式。所选列即为搜索文本所应用的列。


    在搜索字段中输入一个值，会对所有列（默认）或所选列应用筛选器。一旦应用了筛选器，`Control Summary`（控制摘要）区域就会出现一个选项，如图 7-20
    所示。`Control Summary` 区域是 `Search Bar` 和报表之间的区域。该区域仅当对交互式报表应用了操作时才会显示，用作当前正在应用哪些操作的提示。`Control
    Summary` 区域为每个已应用的操作包含一行。交互式报表的操作是叠加的：后续操作会在现有操作的基础上应用。用户可以通过取消勾选其复选框来禁用某个操作。用户可以通过点击该操作的
    × 图标来移除该操作。点击 `Control Summary` 区域中的某个操作会打开该操作控件进行编辑。


    ![A978-1-4842-0466-5_7_Fig20_HTML.jpg](img/A978-1-4842-0466-5_7_Fig20_HTML.jpg)


    图 7-20.


    打开状态下的控制摘要区域


    `Control Summary` 面板可以切换打开或关闭。您可以通过点击“关闭”（向下的三角）图标来最小化它。


    已关闭的 `Control Summary` 区域，如图 7-21 所示，可以通过点击“打开”（向右的三角）图标来展开。


    ![A978-1-4842-0466-5_7_Fig21_HTML.jpg](img/A978-1-4842-0466-5_7_Fig21_HTML.jpg)


    图 7-21.


    关闭状态下的控制摘要区域


    `Finder`（查找器）下拉菜单可通过 `Search Bar` 左侧的放大镜图标访问，它显示交互式报表中所有列的列表，如图 7-22 所示。选择其中一列会将搜索功能限制在该列。


    ![A978-1-4842-0466-5_7_Fig22_HTML.jpg](img/A978-1-4842-0466-5_7_Fig22_HTML.jpg)


    图 7-22.


    查找器下拉菜单


    `Actions`（操作）菜单，如图 7-23 所示，提供了一系列列选择、筛选和操作选项。在 `Format`（格式）选项下进一步展开菜单，会揭示用于排序、中断、高亮显示、计算新列、聚合、绘图和分组的其他操作。展开的
    `Format` 菜单如图 7-24 所示。


    ![A978-1-4842-0466-5_7_Fig24_HTML.jpg](img/A978-1-4842-0466-5_7_Fig24_HTML.jpg)


    图 7-24.


    从操作菜单中选择格式选项


    ![A978-1-4842-0466-5_7_Fig23_HTML.jpg](img/A978-1-4842-0466-5_7_Fig23_HTML.jpg)


    图 7-23.


    操作菜单


    ### 选择列


    `Select Columns`（选择列）操作，如图 7-25 所示，允许用户选择要显示的列并根据需要重新排列列顺序。穿梭框控件允许用户使用中间的箭头轻松添加或移除列，并使用区域右侧的上、下按钮对显示的列进行排序。


    ![A978-1-4842-0466-5_7_Fig25_HTML.jpg](img/A978-1-4842-0466-5_7_Fig25_HTML.jpg)


    图 7-25.


    选择列


    **注意**


    交互式报表的 `Select Columns` 操作始终控制显示哪些列。如果作为开发人员，您修改了 SQL 查询以向交互式报表添加一列，那么在将该新列从 `Do
    Not Display`（不显示）区域移动到穿梭框的 `Display in Report`（在报表中显示）区域之前，该新列将不会可见。


    ### 筛选


    `Filter`（筛选）操作允许用户声明式地根据一系列运算符的结果定义筛选器。一个用户可以为每个报表定义多个筛选器。多个筛选器使用逻辑 `AND`（与）运算符组合。通过
    `Search Bar` 定义的筛选器与通过 `Filter` 操作定义的筛选器组合使用。目前，交互式报表中没有提供实现筛选器逻辑 `OR`（或）的功能。


    `Filter` 操作提供了一套完整的筛选操作供选择，如图 7-26 所示。


    ![A978-1-4842-0466-5_7_Fig26_HTML.jpg](img/A978-1-4842-0466-5_7_Fig26_HTML.jpg)


    图 7-26.


    对交互式报表应用筛选器


    `Filter` 操作支持列筛选器和行筛选器。列筛选器应用于单个列。列筛选器选项会根据筛选列的类型和所选运算符进行交互式变化。例如，如果您选择一个日期列，如
    `Created On`（创建于），然后选择 `Between`（介于）操作，那么 `Expression`（表达式）元素现在会包含两个字段，用于 `Between`
    子句的 `From`（从）和 `To`（到）。在这种情况下，这些字段各自都有一个日期选择器，便于输入 `Date From`（日期从）和 `To`（到）的值。最终用户还可以使用声明式的
    `Filter` 构建自定义筛选器。


    行筛选器允许用户构建基于同一行中多个列的筛选条件。您的 Analysis（分析）报表的一个简单行筛选器可能是筛选出所有在同一天关闭的工单。`Filter`
    表达式可以通过在 `Columns`（列）和 `Functions/Operators`（函数/运算符）区域中进行选择来声明式构建，如图 7-27 所示，也可以手动输入。在
    `Filter` 表达式中，选定的列由其字母别名表示。


    ![A978-1-4842-0466-5_7_Fig27_HTML.jpg](img/A978-1-4842-0466-5_7_Fig27_HTML.jpg)


    图 7-27.


    构建行筛选器


    ### 排序


    `Sort`（排序）界面允许用户指定最多六个列的排序（升序或降序），并指定 `NULL` 值是排在最前还是最后。排序可以在显示的列和非显示的列上执行（参见图
    7-28）。


    ![A978-1-4842-0466-5_7_Fig28_HTML.jpg](img/A978-1-4842-0466-5_7_Fig28_HTML.jpg)


    图 7-28.


    向交互式报表添加排序


    ### 添加中断


    `Control Break`（控制中断）操作允许用户在最多六个列上定义中断格式。用户指定中断列以及中断是禁用还是启用。APEX 会自动将声明的中断格式应用于报表。请注意，中断列在
    `Control Summary` 中作为单独的条目出现，允许用户单独启用、禁用或移除中断列。图 7-29 显示了在 `Assigned To`（分配给）和
    `Status`（状态）列上应用了中断的 Analysis（分析）报表。


    ![A978-1-4842-0466-5_7_Fig29_HTML.jpg](img/A978-1-4842-0466-5_7_Fig29_HTML.jpg)


    图 7-29.


    应用了控制中断的交互式报表'
- fmt: '### Highlighting


    Highlight 操作允许用户查找匹配的数据，并按行或列高亮显示，同时指定高亮的背景和文本颜色。Highlight 操作的界面如图 [7-30](#A978-1-4842-0466-5_7_Chapter.html#Fig30)
    所示。


    ![A978-1-4842-0466-5_7_Fig30_HTML.jpg](A978-1-4842-0466-5_7_Fig30_HTML.jpg)


    图 7-30.


    使用 Highlight 操作添加高亮


    您在 Filter 操作中看到的相同运算符也适用于此。背景和文本颜色可以使用十六进制表示法或调色板来指定。Highlight 操作在控制摘要区域中显示为一个高亮的行。


    ### Computing Columns


    用户可以通过 Compute 操作界面，基于现有列和函数定义一个新列作为计算结果，该界面如图 [7-31](#A978-1-4842-0466-5_7_Chapter.html#Fig31)
    所示。


    ![A978-1-4842-0466-5_7_Fig31_HTML.jpg](A978-1-4842-0466-5_7_Fig31_HTML.jpg)


    图 7-31.


    使用 Compute 操作计算新的交互式报告列


    用户可以以声明方式或手动方式定义计算值。声明式界面与行筛选器界面非常相似。在计算中，列使用其字母别名来指定。此选项功能强大，因为它允许最终用户构建他们所需的任何列。


    ### Adding Aggregates


    Aggregate 操作对某一列执行以下聚合函数之一：


    *   Sum

    *   Average

    *   Count

    *   Count Distinct

    *   Minimum

    *   Maximum

    *   Median


    所选列的数据类型必须为 `NUMBER`。结果显示在报告的末尾。请注意，只有当对应的列也显示时，聚合结果才会显示。


    ### Adding Charts to Interactive Reports


    Chart 操作允许用户以动态 Flash 图表的形式显示报告中的数据，如图 [7-32](#A978-1-4842-0466-5_7_Chapter.html#Fig32)
    所示。数据的图表表示会替代表格数据显示。可以通过单击视图图表图标（如图 [7-32](#A978-1-4842-0466-5_7_Chapter.html#Fig32)
    所示）来切换显示方式。使用“编辑图表”链接可重新进入 Chart 操作界面。


    ![A978-1-4842-0466-5_7_Fig32_HTML.jpg](A978-1-4842-0466-5_7_Fig32_HTML.jpg)


    图 7-32.


    交互式报告饼图


    交互式报告中支持以下图表类型：


    *   Horizontal bar

    *   Vertical bar

    *   Pie

    *   Line


    简单的 Chart 操作界面（如图 [7-33](#A978-1-4842-0466-5_7_Chapter.html#Fig33) 所示）允许用户选择图表类型，并分配标签列、值列、函数以及用于排序的列。


    ![A978-1-4842-0466-5_7_Fig33_HTML.jpg](A978-1-4842-0466-5_7_Fig33_HTML.jpg)


    图 7-33.


    使用 Chart 操作添加图表


    用户在 Chart 操作中无法使用 APEX 图表的全部功能，但轻松显示这些最常见图表类型的能力非常有价值。


    ### Grouping


    Group By 操作允许用户定义分组，然后在这些分组上应用聚合函数，从而让用户以声明方式定义他们自己的报告数据摘要视图。使用 Group By 操作的示例结果如图
    [7-34](#A978-1-4842-0466-5_7_Chapter.html#Fig34) 所示。


    ![A978-1-4842-0466-5_7_Fig34_HTML.jpg](A978-1-4842-0466-5_7_Fig34_HTML.jpg)


    图 7-34.


    使用 Group By 操作进行分组


    与 Chart 视图类似，数据的 Group By 视图在搜索栏中心有一个显示图标，如图 [7-34](#A978-1-4842-0466-5_7_Chapter.html#Fig34)
    所示。用户可以通过单击相应的显示图标来显示数据视图、Group By 视图，或者（如果已定义）图表视图。


    ### Pivot


    Pivot 操作允许用户定义报告中数据的数据透视图，使用户能够完全控制要透视的列、要显示为行的列以及要使用可用聚合函数之一进行聚合的列。设置的示例及生成的透视报告如图
    [7-35](#A978-1-4842-0466-5_7_Chapter.html#Fig35) 所示。


    ![A978-1-4842-0466-5_7_Fig35_HTML.jpg](A978-1-4842-0466-5_7_Fig35_HTML.jpg)


    图 7-35.


    使用 Pivot 操作生成的透视报告


    ### Using Flashback


    Flashback 操作使用户能够将数据库闪回指定的分钟数，以查看数据在该时间点的样子。该选项基于 Oracle 数据库的 `FLASHBACK` 功能构建。必须启用数据库
    `FLASHBACK`。Flashback 操作会询问要闪回的分钟数，如图 [7-36](#A978-1-4842-0466-5_7_Chapter.html#Fig36)
    所示。


    ![A978-1-4842-0466-5_7_Fig36_HTML.jpg](A978-1-4842-0466-5_7_Fig36_HTML.jpg)


    图 7-36.


    使用 Flashback 操作


    闪回时间长度是可配置的。最大闪回周期基于数据库中的 `UNDO_RETENTION` 参数，该参数默认设置为三小时。


    ### Saving an Interactive Report


    Save Report 操作允许用户将交互式报告的当前配置保存为命名报告。如果最终用户也是 APEX 开发人员，用户将看到“另存为默认报告设置”选项，如图
    [7-37](#A978-1-4842-0466-5_7_Chapter.html#Fig37) 所示。


    ![A978-1-4842-0466-5_7_Fig37_HTML.jpg](A978-1-4842-0466-5_7_Fig37_HTML.jpg)


    图 7-37.


    使用 Save Report 操作保存交互式报告


    作为开发人员，您需要尝试预先创建您认为最广大用户群最广泛使用的报告版本。您可以将当前报告配置保存为主要或替代默认报告设置，如图 [7-38](#A978-1-4842-0466-5_7_Chapter.html#Fig38)
    所示。主报告是任何新用户登录系统时默认看到的报告。如果存在替代默认报告，用户可以从选择列表中选择它们。


    ![A978-1-4842-0466-5_7_Fig38_HTML.jpg](A978-1-4842-0466-5_7_Fig38_HTML.jpg)


    图 7-38.


    设置替代的已保存报告


    显然，您无法预先创建报告的每一个可能迭代。因此，用户可以将报告另存为私有报告。保存报告后，它会添加到搜索栏的“报告”菜单中，如图 [7-39](#A978-1-4842-0466-5_7_Chapter.html#Fig39)
    所示。


    ![A978-1-4842-0466-5_7_Fig39_HTML.jpg](A978-1-4842-0466-5_7_Fig39_HTML.jpg)


    图 7-39.


    使用默认的“报告”菜单


    ### Resetting an Interactive Report


    Reset 操作（如图 [7-40](#A978-1-4842-0466-5_7_Chapter.html#Fig40) 所示）将当前报告恢复为默认设置。格式或结果集（通过筛选）的任何更改都会丢失，当然，除非该报告是一个已保存的报告。然后可以通过从选择列表中选择报告名称来简单地恢复它。


    ![A978-1-4842-0466-5_7_Fig40_HTML.jpg](A978-1-4842-0466-5_7_Fig40_HTML.jpg)


    图 7-40.


    将交互式报告重置为其默认设置


    ### Getting Help


    Help 操作打开一个窗口，其中包含特定于交互式报告的帮助，如图 [7-41](#A978-1-4842-0466-5_7_Chapter.html#Fig41)
    所示。无论当前报告是否启用，此帮助窗口中都会显示所有交互式报告选项。


    ![A978-1-4842-0466-5_7_Fig41_HTML.jpg](A978-1-4842-0466-5_7_Fig41_HTML.jpg)


    图 7-41.


    交互式报告帮助页面'
  raw: '### Highlighting


    The Highlight action allows the user to find matching data and highlight it by
    row or column, specifying the background and text colors for the highlight. The
    Highlight action interface is shown in Figure [7-30](#A978-1-4842-0466-5_7_Chapter.html#Fig30).


    ![A978-1-4842-0466-5_7_Fig30_HTML.jpg](A978-1-4842-0466-5_7_Fig30_HTML.jpg)


    Figure 7-30.


    Adding highlighting with the Highlight action


    The same operators that you saw in the Filter action apply here. The background
    and text colors may be specified using either hex notation or the color palettes.
    The Highlight action appears in the Control Summary region as a highlighted row.


    ### Computing Columns


    The user can define a new column as a computation based on existing columns and
    functions via the Compute action interface, shown in Figure [7-31](#A978-1-4842-0466-5_7_Chapter.html#Fig31).


    ![A978-1-4842-0466-5_7_Fig31_HTML.jpg](A978-1-4842-0466-5_7_Fig31_HTML.jpg)


    Figure 7-31.


    Computing a new interactive report column using the Compute action


    The user may either declaratively or manually define the computed value. The declarative
    interface is much the same as the row filter interface. Columns are specified
    in the computation as their letter aliases. This option is quite powerful, because
    it allows the end user to build essentially any column they desire.


    ### Adding Aggregates


    The Aggregate action performs one of the following aggregation functions on a
    column:


    *   Sum

    *   Average

    *   Count

    *   Count Distinct

    *   Minimum

    *   Maximum

    *   Median


    The selected column must be of data type `NUMBER`. The results are displayed at
    the end of the report. Note that aggregate results are displayed only if the corresponding
    column is also displayed.


    ### Adding Charts to Interactive Reports


    The Chart action allows the user to display a dynamic Flash chart representation
    of the data in the report, as shown in Figure [7-32](#A978-1-4842-0466-5_7_Chapter.html#Fig32).
    The chart representation of the data is displayed instead of the tabular data
    representation. The display can be toggled by clicking the View Chart icon, as
    indicated in Figure [7-32](#A978-1-4842-0466-5_7_Chapter.html#Fig32). Use the
    Edit Chart link to reenter the Chart action interface.


    ![A978-1-4842-0466-5_7_Fig32_HTML.jpg](A978-1-4842-0466-5_7_Fig32_HTML.jpg)


    Figure 7-32.


    Interactive report pie chart


    The following chart types are supported in an interactive report:


    *   Horizontal bar

    *   Vertical bar

    *   Pie

    *   Line


    The simple Chart action interface, shown in Figure [7-33](#A978-1-4842-0466-5_7_Chapter.html#Fig33),
    allows the user to select the chart type and assign a label column, a value column,
    a function, and a column to sort by.


    ![A978-1-4842-0466-5_7_Fig33_HTML.jpg](A978-1-4842-0466-5_7_Fig33_HTML.jpg)


    Figure 7-33.


    Adding a chart using the Chart action


    The user doesn’t have the full functionality of APEX charts within the Chart action,
    but the ease of displaying these most common chart types is quite valuable.


    ### Grouping


    The Group By action allows the user to define groups and then aggregate functions
    on those groups, thus letting the user declaratively define their own summary
    views of the report data. A sample result of using the Group By action is shown
    in Figure [7-34](#A978-1-4842-0466-5_7_Chapter.html#Fig34).


    ![A978-1-4842-0466-5_7_Fig34_HTML.jpg](A978-1-4842-0466-5_7_Fig34_HTML.jpg)


    Figure 7-34.


    Grouping using the Group By action


    Like the Chart view, the Group By view of the data has a display icon in the center
    of the Search Bar, as indicated in Figure [7-34](#A978-1-4842-0466-5_7_Chapter.html#Fig34).
    The user may display the data view, the Group By view, or, if defined, the Chart
    view of the data by clicking the appropriate display icon.


    ### Pivot


    The Pivot action allows the user to define a pivot view of the data in the report,
    giving the user full control over the columns to pivot, the columns to display
    as rows, and the columns to aggregate with one of the available aggregate functions.
    A sample of the settings and the resulting Pivot report are shown in Figure [7-35](#A978-1-4842-0466-5_7_Chapter.html#Fig35).


    ![A978-1-4842-0466-5_7_Fig35_HTML.jpg](A978-1-4842-0466-5_7_Fig35_HTML.jpg)


    Figure 7-35.


    A Pivot report generated using the Pivot action


    ### Using Flashback


    The Flashback action enables the user to flash back the database by the specified
    number of minutes to see what the data looked like at that point in time. The
    option is built on the Oracle database `FLASHBACK` feature. Database `FLASHBACK`
    must be enabled. The Flashback action asks for the number of minutes to flash
    back, as shown in Figure [7-36](#A978-1-4842-0466-5_7_Chapter.html#Fig36).


    ![A978-1-4842-0466-5_7_Fig36_HTML.jpg](A978-1-4842-0466-5_7_Fig36_HTML.jpg)


    Figure 7-36.


    Using the Flashback action


    The length of flashback time is configurable. The maximum flashback period is
    based on the `UNDO_RETENTION` parameter in the database, which is set to three
    hours by default.


    ### Saving an Interactive Report


    The Save Report action allows the user to save the current configuration of the
    interactive report as a named report. If the end user is also an APEX developer,
    the user will see the Save As Default Report Settings option, shown in Figure
    [7-37](#A978-1-4842-0466-5_7_Chapter.html#Fig37).


    ![A978-1-4842-0466-5_7_Fig37_HTML.jpg](A978-1-4842-0466-5_7_Fig37_HTML.jpg)


    Figure 7-37.


    Saving an interactive report using the Save Report action


    As a developer, you want to try to pre-create the versions of the report that
    you feel will be the most widely used by the largest subsection of users. You
    may save the current report configuration as being either the primary or the alternative
    default report settings, as shown in Figure [7-38](#A978-1-4842-0466-5_7_Chapter.html#Fig38).
    The primary report is the one that any brand-new user sees by default when logging
    on to the system. If alternative default reports exist, the user is able to choose
    them from the select list.


    ![A978-1-4842-0466-5_7_Fig38_HTML.jpg](A978-1-4842-0466-5_7_Fig38_HTML.jpg)


    Figure 7-38.


    Setting an alternative saved report


    Obviously you can’t pre-create every possible iteration of a report. Therefore,
    the user may save reports as private reports. When a report is saved, it’s added
    to the Reports menu in the Search Bar, as shown in Figure [7-39](#A978-1-4842-0466-5_7_Chapter.html#Fig39).


    ![A978-1-4842-0466-5_7_Fig39_HTML.jpg](A978-1-4842-0466-5_7_Fig39_HTML.jpg)


    Figure 7-39.


    Using the default Reports menu


    ### Resetting an Interactive Report


    The Reset action, shown in Figure [7-40](#A978-1-4842-0466-5_7_Chapter.html#Fig40),
    restores the current report to the default settings. Any changes in formation
    or result set (by filtering) are lost, unless, of course, the report is a saved
    report. It may then be reinstated simply by selecting the report name from the
    select list.


    ![A978-1-4842-0466-5_7_Fig40_HTML.jpg](A978-1-4842-0466-5_7_Fig40_HTML.jpg)


    Figure 7-40.


    Resetting an interactive report to its default settings


    ### Getting Help


    The Help action opens a window that contains interactive report–specific help,
    as shown in Figure [7-41](#A978-1-4842-0466-5_7_Chapter.html#Fig41). All of the
    interactive report options are displayed in this Help window, regardless of whether
    they’re enabled for the current report.


    ![A978-1-4842-0466-5_7_Fig41_HTML.jpg](A978-1-4842-0466-5_7_Fig41_HTML.jpg)


    Figure 7-41.


    The Interactive Report Help page'
  trans: '

    ### 高亮显示


    高亮操作允许用户查找匹配的数据，并按行或列进行高亮显示，同时可指定高亮的背景色和文本颜色。高亮操作的界面如图 7-30 所示。


    ![A978-1-4842-0466-5_7_Fig30_HTML.jpg](img/A978-1-4842-0466-5_7_Fig30_HTML.jpg)


    图 7-30.


    使用高亮操作添加高亮


    您在筛选操作中看到的相同运算符也适用于此。背景色和文本颜色可以使用十六进制表示法或调色板来指定。高亮操作在控制摘要区域中显示为一个高亮的行。


    ### 计算列


    用户可以通过计算操作界面，基于现有列和函数定义一个新列作为计算结果，该界面如图 7-31 所示。


    ![A978-1-4842-0466-5_7_Fig31_HTML.jpg](img/A978-1-4842-0466-5_7_Fig31_HTML.jpg)


    图 7-31.


    使用计算操作计算新的交互式报告列


    用户可以以声明方式或手动方式定义计算值。声明式界面与行筛选器界面非常相似。在计算中，列使用其字母别名来指定。此选项功能强大，因为它允许最终用户构建他们所需的任何列。


    ### 添加聚合


    聚合操作对某一列执行以下聚合函数之一：


    *   求和

    *   平均值

    *   计数

    *   计数（去重）

    *   最小值

    *   最大值

    *   中位数


    所选列的数据类型必须为 `NUMBER`。结果显示在报告的末尾。请注意，只有当对应的列也显示时，聚合结果才会显示。


    ### 向交互式报告添加图表


    图表操作允许用户以动态 Flash 图表的形式显示报告中的数据，如图 7-32 所示。数据的图表表示会替代表格数据显示。可以通过单击视图图表图标（如图 7-32
    所示）来切换显示方式。使用“编辑图表”链接可重新进入图表操作界面。


    ![A978-1-4842-0466-5_7_Fig32_HTML.jpg](img/A978-1-4842-0466-5_7_Fig32_HTML.jpg)


    图 7-32.


    交互式报告饼图


    交互式报告中支持以下图表类型：


    *   水平条形图

    *   垂直条形图

    *   饼图

    *   折线图


    简单的图表操作界面（如图 7-33 所示）允许用户选择图表类型，并分配标签列、值列、函数以及用于排序的列。


    ![A978-1-4842-0466-5_7_Fig33_HTML.jpg](img/A978-1-4842-0466-5_7_Fig33_HTML.jpg)


    图 7-33.


    使用图表操作添加图表


    用户在图表操作中无法使用 APEX 图表的全部功能，但轻松显示这些最常见图表类型的能力非常有价值。


    ### 分组


    分组操作允许用户定义分组，然后在这些分组上应用聚合函数，从而让用户以声明方式定义他们自己的报告数据摘要视图。使用分组操作的示例结果如图 7-34 所示。


    ![A978-1-4842-0466-5_7_Fig34_HTML.jpg](img/A978-1-4842-0466-5_7_Fig34_HTML.jpg)


    图 7-34.


    使用分组操作进行分组


    与图表视图类似，数据的分组视图在搜索栏中心有一个显示图标，如图 7-34 所示。用户可以通过单击相应的显示图标来显示数据视图、分组视图，或者（如果已定义）图表视图。


    ### 数据透视


    数据透视操作允许用户定义报告中数据的数据透视图，使用户能够完全控制要透视的列、要显示为行的列以及要使用可用聚合函数之一进行聚合的列。设置的示例及生成的透视报告如图
    7-35 所示。


    ![A978-1-4842-0466-5_7_Fig35_HTML.jpg](img/A978-1-4842-0466-5_7_Fig35_HTML.jpg)


    图 7-35.


    使用数据透视操作生成的透视报告


    ### 使用闪回


    闪回操作使用户能够将数据库闪回到指定的分钟数，以查看数据在该时间点的样子。该选项基于 Oracle 数据库的 `FLASHBACK` 功能构建。必须启用数据库
    `FLASHBACK`。闪回操作会询问要闪回的分钟数，如图 7-36 所示。


    ![A978-1-4842-0466-5_7_Fig36_HTML.jpg](img/A978-1-4842-0466-5_7_Fig36_HTML.jpg)


    图 7-36.


    使用闪回操作


    闪回时间长度是可配置的。最大闪回周期基于数据库中的 `UNDO_RETENTION` 参数，该参数默认设置为三小时。


    ### 保存交互式报告


    保存报告操作允许用户将交互式报告的当前配置保存为命名报告。如果最终用户也是 APEX 开发人员，用户将看到“另存为默认报告设置”选项，如图 7-37 所示。


    ![A978-1-4842-0466-5_7_Fig37_HTML.jpg](img/A978-1-4842-0466-5_7_Fig37_HTML.jpg)


    图 7-37.


    使用保存报告操作保存交互式报告


    作为开发人员，您需要尝试预先创建您认为最广大用户群最广泛使用的报告版本。您可以将当前报告配置保存为主要或替代默认报告设置，如图 7-38 所示。主报告是任何新用户登录系统时默认看到的报告。如果存在替代默认报告，用户可以从选择列表中选择它们。


    ![A978-1-4842-0466-5_7_Fig38_HTML.jpg](img/A978-1-4842-0466-5_7_Fig38_HTML.jpg)


    图 7-38.


    设置替代的已保存报告


    显然，您无法预先创建报告的每一个可能迭代。因此，用户可以将报告另存为私有报告。保存报告后，它会添加到搜索栏的“报告”菜单中，如图 7-39 所示。


    ![A978-1-4842-0466-5_7_Fig39_HTML.jpg](img/A978-1-4842-0466-5_7_Fig39_HTML.jpg)


    图 7-39.


    使用默认的“报告”菜单


    ### 重置交互式报告


    重置操作（如图 7-40 所示）将当前报告恢复为默认设置。格式或结果集（通过筛选）的任何更改都会丢失，当然，除非该报告是一个已保存的报告。然后可以通过从选择列表中选择报告名称来简单地恢复它。


    ![A978-1-4842-0466-5_7_Fig40_HTML.jpg](img/A978-1-4842-0466-5_7_Fig40_HTML.jpg)


    图 7-40.


    将交互式报告重置为其默认设置


    ### 获取帮助


    帮助操作打开一个窗口，其中包含特定于交互式报告的帮助，如图 7-41 所示。无论当前报告是否启用，此帮助窗口中都会显示所有交互式报告选项。


    ![A978-1-4842-0466-5_7_Fig41_HTML.jpg](img/A978-1-4842-0466-5_7_Fig41_HTML.jpg)


    图 7-41.


    交互式报告帮助页面

    '
- fmt: '## Adding a Subscription


    The `Subscription` action allows the user to email a report to designated email
    addresses on a scheduled basis. The user enters the email address, subject, frequency,
    and start and end dates, as shown in Figure [7-42](#A978-1-4842-0466-5_7_Chapter.html#Fig42).
    This action is available for authenticated users only. The email received is a
    searchable `HTML` version of your report. Break formatting and highlighting aren’t
    preserved.


    ![A978-1-4842-0466-5_7_Fig42_HTML.jpg](A978-1-4842-0466-5_7_Fig42_HTML.jpg)


    Figure 7-42. Subscribing to an interactive report


    If a subscription for the current user is in effect, you can edit that subscription
    by using the `Subscription` action again. The form then presents the current subscription
    attributes and allows the user to either change or delete the subscription. The
    interface is exactly like that shown in Figure [7-42](#A978-1-4842-0466-5_7_Chapter.html#Fig42),
    the only addition being a `Delete` button.


    Report subscriptions can also be managed by a Workspace Administrator through
    the `Administration Home Page` ➤ `Tasks Menu` ➤ `Interactive Report Settings`
    ➤ `Subscriptions` interface, as shown in Figure [7-43](#A978-1-4842-0466-5_7_Chapter.html#Fig43).


    ![A978-1-4842-0466-5_7_Fig43_HTML.jpg](A978-1-4842-0466-5_7_Fig43_HTML.jpg)


    Figure 7-43. Managing subscriptions through the manage-subscriptions interface


    ## Downloading


    The `Download` action allows the user to download the current result set of their
    report in one of the following formats:


    *   `CSV`

    *   `HTML`

    *   `Email`

    *   `PDF`

    *   `XLS` (MS Excel)

    *   `RTF` (MS Word)


    The latter two formats require `Oracle BI Publisher`, which may require a separate
    license from Oracle. The email option will only be available if your `APEX` administrator
    has configured `APEX` to integrate with an external email server. Figure [7-44](#A978-1-4842-0466-5_7_Chapter.html#Fig44)
    shows the download options without and with `BI Publisher`. You can specify which
    formats are available in the `Download` attributes region, as shown in Figure
    [7-45](#A978-1-4842-0466-5_7_Chapter.html#Fig45).


    ![A978-1-4842-0466-5_7_Fig45_HTML.jpg](A978-1-4842-0466-5_7_Fig45_HTML.jpg)


    Figure 7-45. Specifying download attributes


    ![A978-1-4842-0466-5_7_Fig44_HTML.jpg](A978-1-4842-0466-5_7_Fig44_HTML.jpg)


    Figure 7-44. Choosing download options, without and with BI Publisher


    Reports downloaded in `CSV` format are plain, comma-delimited data. The content
    and order of data in the result set are retained in the `CSV` file, but break
    formatting and highlighting aren’t.


    Reports downloaded in `HTML` format are a searchable `HTML` version of the result
    set, as shown in Figure [7-46](#A978-1-4842-0466-5_7_Chapter.html#Fig46). Again,
    the result set content is preserved, but the break formatting and highlighting
    aren’t.


    ![A978-1-4842-0466-5_7_Fig46_HTML.jpg](A978-1-4842-0466-5_7_Fig46_HTML.jpg)


    Figure 7-46. The searchable HTML download of an interactive report


    The email download is the same output as the `HTML` download, but delivered in
    an email. The `XLS` and `RTF` download formats require integration with `Oracle
    BI Publisher`, which may require a separate license from Oracle. The `PDF` output
    can be accomplished via either `Oracle Rest Data Services`, an external `Formatting
    Objects Processor` (`FOP`), or `BI Publisher`. A complete description of the use
    of `Oracle BI Publisher` to produce reports in these formats is beyond the scope
    of this book. See the `Oracle APEX` documentation section “Advanced Printing Options
    and Configuration” for more details. If these options aren’t configured for your
    installation, they won’t appear in the download options list.


    Take some time to experiment with the features of the interactive report. If you
    get lost and need to start over, simply click the `Actions` button and select
    `Reset`. The interactive report will be reset to its original state, and all modifications
    that you made to it will be discarded.


    ## Modifying an Interactive Report


    Although an interactive report offers a tremendous amount of functionality, you
    may wish to limit which features are available to your end users. Each feature
    of the interactive report can be disabled on a report-by-report basis. In addition,
    you can set up default options for a specific report, making those available to
    all end users.'
