- fmt: '## Dynamic Actions Using PL/SQL


    Dynamic actions are architected to be an extensible framework, giving the developer
    full control over coding complex actions that might not be available in a purely
    declarative environment. In the spirit of UI usability, you should help the user
    adhere to the business rules of the application without introducing undue work
    for them. In this exercise, you will take the requirement for `P2_CREATED_BY`
    to be entered in uppercase and use SQL and PL/SQL to create a dynamic action that
    alters the user’s input to uppercase, no matter what they enter. Here are the
    steps:


    1.  Edit Page 2 of the application.

    2.  Navigate to the Page Rendering tab in the Tree Pane.

    3.  Right-click the `P2_CREATED_BY` item and choose Create Dynamic Action from
    the context menu.

    4.  Enter `Change Case to Upper` for Name.

    5.  Set Event to Lose Focus, set Condition to is not null.

    6.  In the Dynamic Actions Tree under the True node, click the Show action (highlighted
    in red) to edit its properties.

    7.  Set Action to Set Value, and in the Settings section, select PL/SQL Expression
    for Set Type.

    8.  Enter `UPPER(:P2_CREATED_BY)` for PL/SQL Expression and `P2_CREATED_BY` in
    Page Items to Submit.

    9.  In the Affected Elements section, set Selection Type to Triggering Element.

    10. Set Fire On Page Load to No. See Figure 16-16.


    ![A978-1-4842-0466-5_16_Fig16_HTML.jpg](A978-1-4842-0466-5_16_Fig16_HTML.jpg)


    Figure 16-16. Using a PL/SQL expression as the body of a dynamic action


    11. Save and Run the page.


    Here you use the PL/SQL `UPPER` expression to take the user’s input and convert
    it to uppercase. You reference the value the user entered by using the bind variable
    `:P2_CREATED_BY`. However, because the value the user entered into the web browser
    has not been submitted to APEX, that value isn’t currently in session state. That’s
    why you need to include it in the list of page items to submit. If you needed
    to reference several values of user input, you must enter them all as a comma-separated
    list.


    Now, when page 2 is run, any text entered in the Created By field is made uppercase
    when the user exits the field.


    > **Note**

    >

    > Dynamic actions that use SQL or PL/SQL for their conditions or body actually
    make a call back to the database server to run the code in question. Depending
    on the weight and complexity of the code, this could potentially introduce performance
    issues. Save the use of SQL and PL/SQL for actions that require interaction with
    the database to retrieve data that isn’t available from directly within the page.


    ## Dynamic Actions Using JavaScript


    In addition to PL/SQL, you can use JavaScript in dynamic actions. In this exercise,
    you will use JavaScript to determine the onscreen status of a ticket that you’re
    editing on page 210. If the user has set the status to `CLOSED`, the dynamic action
    will automatically set the `Closed On` date to today’s date:


    1.  Edit Page 210 of the application.

    2.  Navigate to the Dynamic Actions tab of the Tree Pane.

    3.  Create a new dynamic action by right-clicking the Events node in the tree
    and selecting Create Dynamic Action from the context menu.

    4.  Enter `AutoFill Closed_On Date` for Name.

    5.  Make sure Event is set to Change, set Selection Type to Item(s), and enter
    `P210_STATUS_ID` for Item(s).

    6.  Set Condition to JavaScript expression.

    7.  Locate and open the file `ch16_javascript.txt`. This file can be found where
    you unzipped the files associated with this book.


    Examine the JavaScript string that is being used as the body of the condition.
    This may seem very cryptic at first, but when it’s broken down, it’s quite straightforward.
    Let’s look at it in pieces:


    ```

    this.triggeringElement.options[this.triggeringElement.selectedIndex].text == ''CLOSED''

    ```


    The keyword `this` references the JavaScript event that kicked off the chain of
    events to start with, and `triggeringElement` references the item on the page
    that was at the root of the event. So, in this case, `this.triggeringElement`
    is talking about `P210_STATUS_ID`.


    Here’s where a little developer knowledge has to be introduced. Being the developer,
    you know that `P210_STATUS_ID` is a select list, and that a select list has from
    one to many values the user can select. In HTML, these values are called options.


    Because of the way you’ve declaratively defined the `P210_STATUS_ID` select list,
    only one option can be selected at a time. You can access the option that is currently
    selected on the page by using the JavaScript `this.triggeringElement.selectedIndex`.
    The square brackets use that index to reference the selected option from the `P210_STATUS_ID`
    select list.


    Although you could reference the `value` of the selected option, that would only
    give you the ID of the selected status. You’d then have to make a round trip to
    the database to find out the text status. Instead, you can use the `.text` JavaScript
    method to get the text that the select list is displaying to the end user and
    see what they selected.


    Once you have that, you can then compare it to the value you’re looking for, which
    is `CLOSED`.


    8.  Copy the contents of the file into Value, as shown in Figure 16-17, and click
    Next.


    ![A978-1-4842-0466-5_16_Fig17_HTML.jpg](A978-1-4842-0466-5_16_Fig17_HTML.jpg)


    Figure 16-17. Using JavaScript for the condition text of a dynamic action


    9.  In the Dynamic Actions Tree under the True node, click the Show action (highlighted
    in red) to edit its properties.

    10. Set Action to Set Value, set Set Type to PL/SQL Expression, and enter `SYSDATE`
    for PL/SQL Expression.

    11. In the Affected Elements section, set Selection Type to Item(s) and set Item(s)
    to `P210_CLOSED_ON`.

    12. Make sure Fire on Page Load is set to No.

    13. Although you want the `CLOSED_ON` date to be set when you choose a status
    of `CLOSED`, you want anything that is currently entered in the `CLOSED_ON` date
    to be removed if you choose any status but `CLOSED`. So, use the False action
    of the dynamic action to do this.

    14. In the Dynamic Actions tab of the Tree Pane, right-click on the False node
    of the AutoFill Closed_On_Date Dynamic Action and select Create FALSE action.

    15. Set False Action to Set Value.

    16. Set Set Type to PL/SQL Expression, and enter `NULL` for PL/SQL Expression.
    Although `P210_STATUS_ID` triggers the dynamic action to fire, `P210_CLOSED_ON`
    is the affected element.

    17. Set Selection Type to Item(s) and set Item(s) to `P210_CLOSED_ON`.

    18. Make sure Fire on Page Load is set to No.

    19. Save and Run your application.


    Run your application and edit any ticket using page 210. Change the status to
    `CLOSED` and then back again to any other status. You will see the value for the
    `Closed On` date being set and cleared according to the value you choose for the
    select list.


    ## Summary


    Dynamic actions have many uses and are extremely flexible. However, you must make
    sure that multiple dynamic actions on the same page don’t interfere with each
    other. Also, because dynamic actions run as JavaScript in the browser, try to
    do as much as you can declaratively, or with JavaScript, without resorting to
    SQL or PL/SQL. This reduces the number of calls to the database server and avoids
    potential performance bottlenecks.


    It’s probably inevitable that you’ll be required to learn at least a little JavaScript
    to achieve more-complex results. JavaScript syntax isn’t hard to learn, and it
    can be a useful addition to your skillset as a web application developer.'
