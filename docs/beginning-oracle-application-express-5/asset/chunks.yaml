- fmt: '## 查看脚本运行结果


    选择“在后台运行”或“立即运行”。脚本运行后，您会立即被带到“管理脚本结果”页面。您很可能会看到脚本状态为 `COMPLETED`。


    点击报告行最右侧的“查看结果”图标，以查看脚本运行的结果。图 4-21 显示了点击位置。


    ![A978-1-4842-0466-5_4_Fig21_HTML.jpg](A978-1-4842-0466-5_4_Fig21_HTML.jpg)

    **图 4-21. 点击“查看结果”图标以查看脚本运行结果**


    “查看结果”页面允许您查看脚本运行时发生的情况。默认视图通过显示每条语句的前50个左右字符、一些简要反馈以及语句影响的行数来显示概览。图 4-22 显示了某次脚本运行的结果。


    ![A978-1-4842-0466-5_4_Fig22_HTML.jpg](A978-1-4842-0466-5_4_Fig22_HTML.jpg)

    **图 4-22. 脚本结果的摘要视图**


    但是，通过将报告视图更改为“详细”，您可以获得更详细的反馈。这样做能提供更深入的洞察，特别是当您的脚本在执行过程中出现错误时。图 4-23 显示了一个详细视图。


    ![A978-1-4842-0466-5_4_Fig23_HTML.jpg](A978-1-4842-0466-5_4_Fig23_HTML.jpg)

    **图 4-23. 脚本结果的详细视图**


    在任一视图中，您都可以通过滚动到页面底部并查看报告页脚来快速查看脚本是否遇到任何错误，报告页脚显示了处理的语句总数、成功的语句数以及生成错误的语句数。图 4-24
    显示了某次脚本运行的处理语句数。


    ![A978-1-4842-0466-5_4_Fig24_HTML.jpg](A978-1-4842-0466-5_4_Fig24_HTML.jpg)

    **图 4-24. 任一报告页脚中都包含脚本的成功摘要**


    ## 用户界面默认值


    在开始编写应用程序之前，最后一件能让您后续工作更轻松的事是创建一些用户界面（UI）默认值。在我看来，这是 APEX 中最未被充分利用的功能之一。


    ### 理解用户界面默认值


    UI 默认值允许您自定义表、视图及其列的默认显示属性。它们可用于控制许多属性，包括对齐方式、可搜索性、显示顺序、为列创建的项类型、默认值等等。


    例如，当您通过向导（大多数时候都是如此）创建新表单或报告时，APEX 会询问您是否要使用 UI 默认值。如果您选择“是”且存在默认值，APEX 会根据定义属性的表或列，将这些默认值应用于相应的区域或项。UI
    默认值分为两类：属性字典和表字典。


    属性字典允许您基于属性名称创建更通用的 UI 默认值。可以将其视为更宏观级别的定义。


    假设您为任何名为 `PHONE_NUMBER` 的属性创建了一个属性级别的默认值。如果一个名为 `PHONE_NUMBER` 的列出现在表中，并且没有分配表字典默认值，则属性字典默认值将生效。


    属性字典定义还可以分配同义词，允许多个属性名称共享相同的实际定义。因此，例如，您可以为原始的 `PHONE_NUMBER` 定义创建同义词 `PHONE`、`TELEPHONE`、`PHONENUMBER`
    等。如果向导遇到具有这些名称中任何一个的列，它会将 `PHONE_NUMBER` 默认值应用于创建的 APEX 项。


    表字典允许您为特定表或列定义默认值，并且这些默认值仅应用于为这些特定项创建的 APEX 区域或项。


    以下是关于 UI 默认值需要注意的一些事项：


    *   表字典默认值始终覆盖属性字典默认值。

    *   当使用 UI 默认值创建项时，不会与 UI 默认值建立关系。因此，如果您后来更改了 UI 默认值的定义，这些更改不会传播到先前创建的项。

    *   在建立 UI 默认值之前创建的项不会继承 UI 默认值的属性。

    *   开发人员可以选择不使用 UI 默认值，即使使用了，也可以在组件创建后覆盖它们。


    话虽如此，UI 默认值确实有助于确保应用程序的一致性，并使开发人员的工作更加轻松。'
