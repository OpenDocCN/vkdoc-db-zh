    \ scratch.\n\nData grids are used to organize data in a column-and-row format.\
    \ Both the design and the data are held in the websheet environment; no external\
    \ configuration is required.\n\nBoth data grids and reports can be put into data\
    \ sections, and you can embed links to them in text sections. Figure [11-28](#A978-1-4842-0466-5_11_Chapter.html#Fig28)\
    \ shows a data grid that is displayed in a data section. In this context, the\
    \ data grid is read-only, like a report. The Edit link goes to a page that allows\
    \ you to edit the data section, but not the data grid itself.\n\n![A978-1-4842-0466-5_11_Fig28_HTML.jpg](A978-1-4842-0466-5_11_Fig28_HTML.jpg)\n\
    \nFigure 11-28.\n\nData grid displayed in a data section\n\nYou can navigate to\
    \ the context where you maintain the data grid’s data by using the Data Grid drop-down\
    \ menu (see Figure [11-29](#A978-1-4842-0466-5_11_Chapter.html#Fig29)). You can\
    \ either navigate to an individual data grid directly from the menu or click its\
    \ link from the View All report.\n\n![A978-1-4842-0466-5_11_Fig29_HTML.jpg](A978-1-4842-0466-5_11_Fig29_HTML.jpg)\n\
    \nFigure 11-29.\n\nNavigating to a data grid’s data-entry context\n\nFigure [11-30](#A978-1-4842-0466-5_11_Chapter.html#Fig30)\
    \ shows the Schedule data grid. The search text box, the Go button, the Reports\
    \ drop-down list, and the Actions drop-down menu are standard Interactive Report\
    \ features that were discussed previously.\n\n![A978-1-4842-0466-5_11_Fig30_HTML.jpg](A978-1-4842-0466-5_11_Fig30_HTML.jpg)\n\
    \nFigure 11-30.\n\nEditing data in a data grid\n\nHowever, unlike traditional\
    \ Interactive Reports, here you can change the data directly in the data grid.\
    \ When you click a cell, the cell turns into an editable item, and you can type\
    \ data directly into it. If you’ve configured a column as a date, a pop-up calendar\
    \ automatically appears to help with accurate date entry. You can also configure\
    \ a column to have a list of values; when this is defined, the cell contains a\
    \ drop-down list. In addition, you can use the pencil icon to the left of the\
    \ grid to link to a Form page that edits an individual row (see Figure [11-31](#A978-1-4842-0466-5_11_Chapter.html#Fig31)).\
    \ This is convenient when the data grid contains many columns and is too wide\
    \ for your computer screen.\n\n![A978-1-4842-0466-5_11_Fig31_HTML.jpg](A978-1-4842-0466-5_11_Fig31_HTML.jpg)\n\
    \nFigure 11-31.\n\nEditing data on a Form page for one row\n\nYou manage the structure\
    \ of a data grid by selecting options from the Manage drop-down menu. Figure [11-32](#A978-1-4842-0466-5_11_Chapter.html#Fig32)\
    \ and Figure [11-33](#A978-1-4842-0466-5_11_Chapter.html#Fig33) show all of the\
    \ data-grid configuration options.\n\n![A978-1-4842-0466-5_11_Fig33_HTML.jpg](A978-1-4842-0466-5_11_Fig33_HTML.jpg)\n\
    \nFigure 11-33.\n\nData-grid management, row options expanded\n\n![A978-1-4842-0466-5_11_Fig32_HTML.jpg](A978-1-4842-0466-5_11_Fig32_HTML.jpg)\n\
    \nFigure 11-32.\n\nData-grid management, column options expanded\n\nAn interactive\
    \ edit section is displayed as a modal dialog when you select one of the Manage\
    \ menu options. This is shown in Figure [11-34](#A978-1-4842-0466-5_11_Chapter.html#Fig34).\
    \ The edit sections all contain their own Cancel and Apply buttons. You must click\
    \ the Apply button to save your changes.\n\n![A978-1-4842-0466-5_11_Fig34_HTML.jpg](A978-1-4842-0466-5_11_Fig34_HTML.jpg)\n\
    \nFigure 11-34.\n\nData-grid management, Data Grid Properties menu option\n\n\
    The Manage drop-down menu gives you a rich set of options that allow you to use\
    \ a data grid as a simple and friendly spreadsheet-like application. Most of the\
    \ options are simple to use; they’re illustrated in more depth in [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html).\
    \ The Manage menu options are summarized next:\n\n*   Properties: Lets you edit\
    \ the overall data-grid properties.\n*   Toggle Checkboxes: Toggles the row-selection\
    \ checkboxes on and off. The row-selection checkboxes are used to perform bulk\
    \ updates on selected rows.\n*   Columns:\n    *   Add: Adds a new column to the\
    \ data grid.\n    *   Column Properties: Changes the properties of a column after\
    \ it has been created.\n    *   List of Values: Creates a named list of values.\
    \ A named list of values can be used in more than one data grid.\n    *   Column\
    \ Groups: Creates column groups.\n    *   Validation: Adds data-entry validations.\
    \ Validations are chosen from a defined list of business rules. You can use several\
    \ validations simultaneously to achieve a result. For example, to make sure a\
    \ number is greater than zero, you can use the Column Specified Is NOT Zero validation\
    \ together with the Column Specified Doesn’t Contain Any of the Characters in\
    \ Expression validation, and you would enter a minus-sign character in the Validation\
    \ Expression text area. This last point illustrates the fact that all of the underlying\
    \ data in a data grid is text, and that sometimes you need to use more than one\
    \ validation rule to achieve a single result.\n    *   Delete Columns: Deletes\
    \ one or more columns.\n*   Rows:\n    *   Add Row: Displays the data-entry page,\
    \ where you can enter new data.\n    *   Set Column Values: Enters data into many\
    \ rows in a single column. A value can be set for All Rows, Selected Rows, or\
    \ Empty Rows.\n    *   Replace: A find-and-replace feature that is similar to\
    \ that found in text editors and word processors. It can be applied to All Rows\
    \ or Selected Rows.\n    *   Fill: Fills a column’s null cells with the value\
    \ found above them.\n    *   Delete Rows: Deletes rows from the data grid. This\
    \ is done for All Rows, Selected Rows, or Rows with Empty Columns.\n*   Delete\
    \ Data Grid: Deletes the data grid from the websheet.\n*   Copy: Makes a copy\
    \ of the data grid.\n*   History: An audit trail for the data.\n\n#### Reports:\
    \ Setup\n\nThe Report feature and the related SQL Tags feature require a small\
    \ amount of setup by the administrator before contributors can use them. Start\
    \ the setup process by navigating to the APEX Application Builder and editing\
    \ the websheet’s properties. In the SQL and PL/SQL section (see Figure [11-35](#A978-1-4842-0466-5_11_Chapter.html#Fig35)),\
    \ set Allow SQL and PL/SQL to `Yes`. After you do this, click the Add Object button\
    \ to display the page shown in Figure [11-36](#A978-1-4842-0466-5_11_Chapter.html#Fig36).\
    \ This page enables you to create a list of suggested objects. The list of suggested\
    \ objects is an optional convenience that automatically creates a drop-down list\
    \ of database objects together with helpful comments.\n\n![A978-1-4842-0466-5_11_Fig36_HTML.jpg](A978-1-4842-0466-5_11_Fig36_HTML.jpg)\n\
    \nFigure 11-36.\n\nCreating the list of suggested database objects\n\n![A978-1-4842-0466-5_11_Fig35_HTML.jpg](A978-1-4842-0466-5_11_Fig35_HTML.jpg)\n\
    \nFigure 11-35.\n\nWebsheet report and SQL tag setup Note\n\nWhen you set Allow\
    \ SQL and PL/SQL to `Yes`, you’re giving contributors access to all the database\
    \ objects in the websheet’s default schema. This is a potentially serious security\
    \ issue. It’s imperative that you chat with your Oracle Database Administrator\
    \ (DBA) before you use this feature to make sure sensitive data isn’t accidentally\
    \ exposed."
  trans: "\n#### 数据网格\n\n数据网格是网络表格中最复杂的部分。不过，如果您对电子表格有所了解，那么学习如何使用网络表格中的数据网格可能会觉得相当容易。\n\
    \n本节将重点介绍数据网格的一些特性。第 12 章将引导您完成从头创建数据网格所需的步骤。\n\n数据网格用于以列行格式组织数据。设计和数据都保存在网络表格环境中；无需外部配置。\n\
    \n数据网格和报表都可以放入数据部分中，您还可以在文本部分嵌入指向它们的链接。图 11-28 显示了在数据部分中显示的数据网格。在此上下文中，数据网格是只读的，就像报表一样。“编辑”链接会转到允许您编辑数据部分的页面，但不能编辑数据网格本身。\n\
    \n![A978-1-4842-0466-5_11_Fig28_HTML.jpg](img/A978-1-4842-0466-5_11_Fig28_HTML.jpg)\n\
    图 11-28. 在数据部分中显示的数据网格\n\n您可以使用“数据网格”下拉菜单导航到维护数据网格数据的上下文（参见图 11-29）。您可以直接从菜单导航到单个数据网格，也可以从“查看全部”报表中单击其链接。\n\
    \n![A978-1-4842-0466-5_11_Fig29_HTML.jpg](img/A978-1-4842-0466-5_11_Fig29_HTML.jpg)\n\
    图 11-29. 导航到数据网格的数据录入上下文\n\n图 11-30 显示了“日程”数据网格。搜索文本框、“执行”按钮、“报表”下拉列表和“操作”下拉菜单都是前面讨论过的标准交互式报表功能。\n\
    \n![A978-1-4842-0466-5_11_Fig30_HTML.jpg](img/A978-1-4842-0466-5_11_Fig30_HTML.jpg)\n\
    图 11-30. 在数据网格中编辑数据\n\n然而，与传统的交互式报表不同，您可以在这里直接在数据网格中更改数据。当您单击某个单元格时，该单元格会变成可编辑项，您可以直接在其中键入数据。如果将某列配置为日期类型，则会自动弹出日历以帮助准确输入日期。您还可以将某列配置为具有值列表；定义此配置后，该单元格将包含一个下拉列表。此外，您可以使用网格左侧的铅笔图标链接到用于编辑单个行的表单页面（参见图\
    \ 11-31）。当数据网格包含许多列并且对于您的计算机屏幕来说太宽时，这很方便。\n\n![A978-1-4842-0466-5_11_Fig31_HTML.jpg](img/A978-1-4842-0466-5_11_Fig31_HTML.jpg)\n\
    图 11-31. 在表单页面上编辑一行数据\n\n您通过从“管理”下拉菜单中选择选项来管理数据网格的结构。图 11-32 和图 11-33 显示了所有的数据网格配置选项。\n\
    \n![A978-1-4842-0466-5_11_Fig33_HTML.jpg](img/A978-1-4842-0466-5_11_Fig33_HTML.jpg)\n\
    图 11-33. 数据网格管理，行选项已展开\n\n![A978-1-4842-0466-5_11_Fig32_HTML.jpg](img/A978-1-4842-0466-5_11_Fig32_HTML.jpg)\n\
    图 11-32. 数据网格管理，列选项已展开\n\n当您选择“管理”菜单选项之一时，将显示一个交互式编辑部分，它以模态对话框的形式呈现。如图 11-34 所示。所有编辑部分都包含自己的“取消”和“应用”按钮。您必须单击“应用”按钮才能保存更改。\n\
    \n![A978-1-4842-0466-5_11_Fig34_HTML.jpg](img/A978-1-4842-0466-5_11_Fig34_HTML.jpg)\n\
    图 11-34. 数据网格管理，“数据网格属性”菜单选项\n\n“管理”下拉菜单为您提供了一组丰富的选项，使您可以将数据网格用作简单友好的类电子表格应用程序。大多数选项都易于使用；第\
    \ 12 章中会更深入地说明这些选项。“管理”菜单选项总结如下：\n\n*   属性：编辑数据网格的整体属性。\n*   切换复选框：打开或关闭行选择复选框。行选择复选框用于对选定行执行批量更新。\n\
    *   列：\n    *   添加：向数据网格添加新列。\n    *   列属性：更改已创建列的属性。\n    *   值列表：创建命名的值列表。一个命名的值列表可以在多个数据网格中使用。\n\
    \    *   列组：创建列组。\n    *   验证：添加数据录入验证。验证是从预定义的业务规则列表中选择的。您可以同时使用多个验证来实现一个结果。例如，为确保数字大于零，您可以将“指定列不为零”验证与“指定列表达式中不包含的任何字符”验证结合使用，并在“验证表达式”文本区域中输入减号字符。最后一点说明了一个事实：数据网格中的所有底层数据都是文本，有时您需要使用多个验证规则才能实现一个结果。\n\
    \    *   删除列：删除一列或多列。\n*   行：\n    *   添加行：显示数据录入页面，您可以在其中输入新数据。\n    *   设置列值：在单个列中为多行输入数据。可以为“所有行”、“选定行”或“空行”设置值。\n\
    \    *   替换：类似于文本编辑器和文字处理器中的查找和替换功能。可应用于“所有行”或“选定行”。\n    *   填充：用其上方的值填充列中的空单元格。\n\
    \    *   删除行：从数据网格中删除行。可以针对“所有行”、“选定行”或“具有空列的行”执行此操作。\n*   删除数据网格：从网络表格中删除数据网格。\n\
    *   复制：制作数据网格的副本。\n*   历史记录：数据的审核跟踪。\n\n#### 报表：设置\n\n在贡献者能够使用报表功能以及相关的 SQL 标签功能之前，管理员需要进行少量设置。通过导航到\
    \ APEX 应用程序构建器并编辑网络表格的属性来开始设置过程。在 SQL 和 PL/SQL 部分（参见图 11-35），将“允许 SQL 和 PL/SQL”设置为\
    \ `Yes`。执行此操作后，单击“添加对象”按钮以显示图 11-36 所示的页面。此页面使您可以创建建议对象列表。建议对象列表是一个可选的便利功能，可自动创建包含有用注释的数据库对象下拉列表。\n\
    \n![A978-1-4842-0466-5_11_Fig36_HTML.jpg](img/A978-1-4842-0466-5_11_Fig36_HTML.jpg)\n\
    图 11-36. 创建建议的数据库对象列表\n\n![A978-1-4842-0466-5_11_Fig35_HTML.jpg](img/A978-1-4842-0466-5_11_Fig35_HTML.jpg)\n\
    图 11-35. 网络表格报表和 SQL 标签设置\n注意\n\n当您将“允许 SQL 和 PL/SQL”设置为 `Yes` 时，您就授予了贡献者访问网络表格默认模式中所有数据库对象的权限。这可能是一个严重的安全问题。在使用此功能之前，务必与您的\
    \ Oracle 数据库管理员（DBA）沟通，确保敏感数据不会被意外暴露。\n"
- fmt: "### Reports: Creation\n\nAfter you’ve set up the Allow SQL and PL/SQL feature\
    \ in the Application Builder, return to your websheet. You create a report by\
    \ selecting New Report from the `Report menu` (see Figure [11-37](#A978-1-4842-0466-5_11_Chapter.html#Fig37))\
    \ or by clicking the `Create Report button` from the View All report.\n\n![A978-1-4842-0466-5_11_Fig37_HTML.jpg](A978-1-4842-0466-5_11_Fig37_HTML.jpg)\n\
    Figure 11-37. Choosing the New Report option\n\nThe `Create Report page` prompts\
    \ you for one of two report sources (see Figure [11-38](#A978-1-4842-0466-5_11_Chapter.html#Fig38)).\
    \ The `Table report source` creates a report that contains all the columns in\
    \ the selected table or view. The `SQL Query report source` (see Figure [11-39](#A978-1-4842-0466-5_11_Chapter.html#Fig39))\
    \ creates a report based on an SQL statement. Using an SQL statement gives you\
    \ a tremendous amount of flexibility in tailoring a report to your needs. In both\
    \ cases, click Next to go to a confirmation page and check your input before creating\
    \ the report.\n\n![A978-1-4842-0466-5_11_Fig39_HTML.jpg](A978-1-4842-0466-5_11_Fig39_HTML.jpg)\n\
    Figure 11-39. Creating a report based on an SQL statement\n\n![A978-1-4842-0466-5_11_Fig38_HTML.jpg](A978-1-4842-0466-5_11_Fig38_HTML.jpg)\n\
    Figure 11-38. Creating a report based on a table or view\n\n### Reports: Accessing\
    \ the Data\n\nUsers want, of course, to see the report data. Report data is exposed\
    \ in three ways:\n\n*   Navigate to a report: Figure [11-40](#A978-1-4842-0466-5_11_Chapter.html#Fig40)\
    \ shows you where to find the list of reports under the `Report drop-down menu`.\
    \ Clicking the report’s `Name link` in the menu takes you to the `Report Data\
    \ page`. Figure [11-41](#A978-1-4842-0466-5_11_Chapter.html#Fig41) shows the Authorized\
    \ System Users report from this example.\n    ![A978-1-4842-0466-5_11_Fig41_HTML.jpg](A978-1-4842-0466-5_11_Fig41_HTML.jpg)\n\
    \    Figure 11-41. Report data page\n    ![A978-1-4842-0466-5_11_Fig40_HTML.jpg](A978-1-4842-0466-5_11_Fig40_HTML.jpg)\n\
    \    Figure 11-40. Navigating to a report\n*   Embed a link to the report in a\
    \ text section: The list of reports in Figure [11-40](#A978-1-4842-0466-5_11_Chapter.html#Fig40)\
    \ contains an `Embed Tag column`. This column contains the markup syntax that\
    \ you would need to add a link to the report in a text section. You simply copy\
    \ and paste the markup syntax into the text section to add a link that takes you\
    \ to the Authorized System Users report shown in Figure [11-41](#A978-1-4842-0466-5_11_Chapter.html#Fig41).\n\
    *   Create a data section: Creating a data section based on a report is easy.\
    \ A wizard walks you through the steps. You first navigate to the page that will\
    \ contain your report and click one of the `New Section links` in either the drop-down\
    \ menu or the `Control Panel` at the right side of the page (see Figure [11-42](#A978-1-4842-0466-5_11_Chapter.html#Fig42)).\
    \ This starts the `Create Section wizard`. Select the `Data icon` on the first\
    \ page and click Next (see Figure [11-43](#A978-1-4842-0466-5_11_Chapter.html#Fig43)).\
    \ Now, link the data section to its data source (see Figure [11-44](#A978-1-4842-0466-5_11_Chapter.html#Fig44)).\
    \ In this example, you’re linking the data section to the Authorized System Users\
    \ report. This page allows you to link your data section to any data grid or report\
    \ that you’ve previously created. Click Next, which takes you to the confirmation\
    \ page. Once you click the `Create button` on the confirmation page, you will\
    \ find yourself back on the content page, and your report is displayed in the\
    \ new data section (see Figure [11-45](#A978-1-4842-0466-5_11_Chapter.html#Fig45)).\n\
    \    ![A978-1-4842-0466-5_11_Fig45_HTML.jpg](A978-1-4842-0466-5_11_Fig45_HTML.jpg)\n\
    \    Figure 11-45. Data section containing a report\n    ![A978-1-4842-0466-5_11_Fig44_HTML.jpg](A978-1-4842-0466-5_11_Fig44_HTML.jpg)\n\
    \    Figure 11-44. New Section wizard: data source\n    ![A978-1-4842-0466-5_11_Fig43_HTML.jpg](A978-1-4842-0466-5_11_Fig43_HTML.jpg)\n\
    \    Figure 11-43. New Section wizard: choosing a section type\n    ![A978-1-4842-0466-5_11_Fig42_HTML.jpg](A978-1-4842-0466-5_11_Fig42_HTML.jpg)\n\
    \    Figure 11-42. New Section link\n\n### Chart Sections\n\nChart sections are\
    \ an easy way to add graphics to your content. First, you must create a report\
    \ or data grid that contains at least one numeric column. Second, you run the\
    \ `Create Chart wizard`. The wizard links the report or data grid to the chart\
    \ and sets up the axis labels. The details and visual result of this simple process\
    \ will be covered in [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html).\n\n###\
    \ Annotations\n\nAnnotations are used to add additional content to your pages\
    \ or individual rows in data grids. There are four types of annotations:\n\n*\
    \   Files: Two types of files can be uploaded into your websheet. Image files\
    \ are displayed within text sections. Other file formats, such as PDFs, can be\
    \ uploaded to a websheet and then downloaded to the end user’s computer. In both\
    \ cases, you use markup syntax to achieve the result.\n*   Tags: Tags are free-form\
    \ text words that are attached to content to enhance the websheet’s Search feature.\n\
    *   Notes: Notes are like sticky notes. When you add a note, it appears in a section\
    \ on the right side of the page.\n*   Links: Links allow users to navigate to\
    \ any valid URL. Annotation links are associated with rows in a data grid; they\
    \ can’t be associated with a page. To add a link to a page, you would use markup\
    \ syntax, not an annotation.\n\nFigure [11-46](#A978-1-4842-0466-5_11_Chapter.html#Fig46)\
    \ shows the `Annotation section` that appears on a websheet page. Clicking the\
    \ various links allows you to add, change, and delete annotations.\n\n![A978-1-4842-0466-5_11_Fig46_HTML.jpg](A978-1-4842-0466-5_11_Fig46_HTML.jpg)\n\
    Figure 11-46. Annotation section at lower right on a page\n\n### Administration\n\
    \nWebsheets, like any blog or wiki, should be reviewed periodically by a moderator\
    \ who has been given the administrator role. This allows the moderator to view\
    \ the `Dashboard` and `Monitor Activity pages` (see Figure [11-47](#A978-1-4842-0466-5_11_Chapter.html#Fig47)).\
    \ These pages and the underlying reports give the moderator the tools to see which\
    \ pages are the most and least popular, how long it takes to render a page, who\
    \ is using the websheet, and many other parameters that help the moderator make\
    \ sure the websheet is working optimally.\n\n![A978-1-4842-0466-5_11_Fig47_HTML.jpg](A978-1-4842-0466-5_11_Fig47_HTML.jpg)\n\
    Figure 11-47. Navigating to the Dashboard and Monitor Activity pages\n\nAs you\
    \ work through [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html), notice the links\
    \ that are labeled `History`. These `History links` are placed throughout the\
    \ websheet’s structural navigation areas. They take you to context-sensitive report\
    \ pages that contain comprehensive audit trails of websheet changes. Contributors,\
    \ when they know their changes are audited, will make an effort to hold their\
    \ contributions to a high standard.\n\n### Summary\n\nThis chapter has given you\
    \ a good look at websheets so that you can use them in innovative and creative\
    \ ways. [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html) complements this chapter\
    \ by working through, on a step-by-step basis, the construction of a websheet\
    \ from the ground up."
  raw: "#### Reports: Creation\n\nAfter you’ve set up the Allow SQL and PL/SQL feature\
    \ in the Application Builder, return to your websheet. You create a report by\
    \ selecting New Report from the Report menu (see Figure [11-37](#A978-1-4842-0466-5_11_Chapter.html#Fig37))\
    \ or by clicking the Create Report button from the View All report.\n\n![A978-1-4842-0466-5_11_Fig37_HTML.jpg](A978-1-4842-0466-5_11_Fig37_HTML.jpg)\n\
    \nFigure 11-37.\n\nChoosing the New Report option\n\nThe Create Report page prompts\
    \ you for one of two report sources (see Figure [11-38](#A978-1-4842-0466-5_11_Chapter.html#Fig38)).\
    \ The Table report source creates a report that contains all the columns in the\
    \ selected table or view. The SQL Query report source (see Figure [11-39](#A978-1-4842-0466-5_11_Chapter.html#Fig39))\
    \ creates a report based on an SQL statement. Using an SQL statement gives you\
    \ a tremendous amount of flexibility in tailoring a report to your needs. In both\
    \ cases, click Next to go to a confirmation page and check your input before creating\
    \ the report.\n\n![A978-1-4842-0466-5_11_Fig39_HTML.jpg](A978-1-4842-0466-5_11_Fig39_HTML.jpg)\n\
    \nFigure 11-39.\n\nCreating a report based on an SQL statement\n\n![A978-1-4842-0466-5_11_Fig38_HTML.jpg](A978-1-4842-0466-5_11_Fig38_HTML.jpg)\n\
    \nFigure 11-38.\n\nCreating a report based on a table or view\n\n#### Reports:\
    \ Accessing the Data\n\nUsers want, of course, to see the report data. Report\
    \ data is exposed in three ways:\n\n*   Navigate to a report: Figure [11-40](#A978-1-4842-0466-5_11_Chapter.html#Fig40)\
    \ shows you where to find the list of reports under the Report drop-down menu.\
    \ Clicking the report’s Name link in the menu takes you to the Report Data page.\
    \ Figure [11-41](#A978-1-4842-0466-5_11_Chapter.html#Fig41) shows the Authorized\
    \ System Users report from this example.\n\n    ![A978-1-4842-0466-5_11_Fig41_HTML.jpg](A978-1-4842-0466-5_11_Fig41_HTML.jpg)\n\
    \n    Figure 11-41.\n\n    Report data page\n\n    ![A978-1-4842-0466-5_11_Fig40_HTML.jpg](A978-1-4842-0466-5_11_Fig40_HTML.jpg)\n\
    \n    Figure 11-40.\n\n    Navigating to a report\n*   Embed a link to the report\
    \ in a text section: The list of reports in Figure [11-40](#A978-1-4842-0466-5_11_Chapter.html#Fig40)\
    \ contains an Embed Tag column. This column contains the markup syntax that you\
    \ would need to add a link to the report in a text section. You simply copy and\
    \ paste the markup syntax into the text section to add a link that takes you to\
    \ the Authorized System Users report shown in Figure [11-41](#A978-1-4842-0466-5_11_Chapter.html#Fig41).\n\
    *   Create a data section: Creating a data section based on a report is easy.\
    \ A wizard walks you through the steps. You first navigate to the page that will\
    \ contain your report and click one of the New Section links in either the drop-down\
    \ menu or the Control Panel at the right side of the page (see Figure [11-42](#A978-1-4842-0466-5_11_Chapter.html#Fig42)).\
    \ This starts the Create Section wizard. Select the Data icon on the first page\
    \ and click Next (see Figure [11-43](#A978-1-4842-0466-5_11_Chapter.html#Fig43)).\
    \ Now, link the data section to its data source (see Figure [11-44](#A978-1-4842-0466-5_11_Chapter.html#Fig44)).\
    \ In this example, you’re linking the data section to the Authorized System Users\
    \ report. This page allows you to link your data section to any data grid or report\
    \ that you’ve previously created. Click Next, which takes you to the confirmation\
    \ page. Once you click the Create button on the confirmation page, you will find\
    \ yourself back on the content page, and your report is displayed in the new data\
    \ section (see Figure [11-45](#A978-1-4842-0466-5_11_Chapter.html#Fig45)).\n\n\
    \    ![A978-1-4842-0466-5_11_Fig45_HTML.jpg](A978-1-4842-0466-5_11_Fig45_HTML.jpg)\n\
    \n    Figure 11-45.\n\n    Data section containing a report\n\n    ![A978-1-4842-0466-5_11_Fig44_HTML.jpg](A978-1-4842-0466-5_11_Fig44_HTML.jpg)\n\
    \n    Figure 11-44.\n\n    New Section wizard: data source\n\n    ![A978-1-4842-0466-5_11_Fig43_HTML.jpg](A978-1-4842-0466-5_11_Fig43_HTML.jpg)\n\
    \n    Figure 11-43.\n\n    New Section wizard: choosing a section type\n\n   \
    \ ![A978-1-4842-0466-5_11_Fig42_HTML.jpg](A978-1-4842-0466-5_11_Fig42_HTML.jpg)\n\
    \n    Figure 11-42.\n\n    New Section link\n\n### Chart Sections\n\nChart sections\
    \ are an easy way to add graphics to your content. First, you must create a report\
    \ or data grid that contains at least one numeric column. Second, you run the\
    \ Create Chart wizard. The wizard links the report or data grid to the chart and\
    \ sets up the axis labels. The details and visual result of this simple process\
    \ will be covered in [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html).\n\n##\
    \ Annotations\n\nAnnotations are used to add additional content to your pages\
    \ or individual rows in data grids. There are four types of annotations:\n\n*\
    \   Files: Two types of files can be uploaded into your websheet. Image files\
    \ are displayed within text sections. Other file formats, such as PDFs, can be\
    \ uploaded to a websheet and then downloaded to the end user’s computer. In both\
    \ cases, you use markup syntax to achieve the result.\n*   Tags: Tags are free-form\
    \ text words that are attached to content to enhance the websheet’s Search feature.\n\
    *   Notes: Notes are like sticky notes. When you add a note, it appears in a section\
    \ on the right side of the page.\n*   Links: Links allow users to navigate to\
    \ any valid URL. Annotation links are associated with rows in a data grid; they\
    \ can’t be associated with a page. To add a link to a page, you would use markup\
    \ syntax, not an annotation.\n\nFigure [11-46](#A978-1-4842-0466-5_11_Chapter.html#Fig46)\
    \ shows the Annotation section that appears on a websheet page. Clicking the various\
    \ links allows you to add, change, and delete annotations.\n\n![A978-1-4842-0466-5_11_Fig46_HTML.jpg](A978-1-4842-0466-5_11_Fig46_HTML.jpg)\n\
    \nFigure 11-46.\n\nAnnotation section at lower right on a page\n\n## Administration\n\
    \nWebsheets, like any blog or wiki, should be reviewed periodically by a moderator\
    \ who has been given the administrator role. This allows the moderator to view\
    \ the Dashboard and Monitor Activity pages (see Figure [11-47](#A978-1-4842-0466-5_11_Chapter.html#Fig47)).\
    \ These pages and the underlying reports give the moderator the tools to see which\
    \ pages are the most and least popular, how long it takes to render a page, who\
    \ is using the websheet, and many other parameters that help the moderator make\
    \ sure the websheet is working optimally.\n\n![A978-1-4842-0466-5_11_Fig47_HTML.jpg](A978-1-4842-0466-5_11_Fig47_HTML.jpg)\n\
    \nFigure 11-47.\n\nNavigating to the Dashboard and Monitor Activity pages\n\n\
    As you work through [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html), notice\
    \ the links that are labeled History. These History links are placed throughout\
    \ the websheet’s structural navigation areas. They take you to context-sensitive\
    \ report pages that contain comprehensive audit trails of websheet changes. Contributors,\
    \ when they know their changes are audited, will make an effort to hold their\
    \ contributions to a high standard.\n\n## Summary\n\nThis chapter has given you\
    \ a good look at websheets so that you can use them in innovative and creative\
    \ ways. [Chapter 12](#A978-1-4842-0466-5_12_Chapter.html) complements this chapter\
    \ by working through, on a step-by-step basis, the construction of a websheet\
    \ from the ground up."
  trans: "\n### 报表：创建\n\n在应用程序构建器中设置好“允许 SQL 和 PL/SQL”功能后，请返回到您的 WebSheet。您可以通过从`报表菜单`中选择“新建报表”（见图\
    \ 11-37），或通过点击“查看所有报表”页面上的`创建报表按钮`来创建报表。\n\n![A978-1-4842-0466-5_11_Fig37_HTML.jpg](img/A978-1-4842-0466-5_11_Fig37_HTML.jpg)\n\
    图 11-37. 选择“新建报表”选项\n\n`创建报表页面`会提示您选择两种报表源之一（见图 11-38）。`表报表源`会创建一个包含所选表或视图中所有列的报表。`SQL\
    \ 查询报表源`（见图 11-39）则基于 SQL 语句创建报表。使用 SQL 语句能让您在根据需求定制报表时拥有极大的灵活性。在两种情况下，请单击“下一步”进入确认页面，在创建报表前检查您的输入。\n\
    \n![A978-1-4842-0466-5_11_Fig39_HTML.jpg](img/A978-1-4842-0466-5_11_Fig39_HTML.jpg)\n\
    图 11-39. 基于 SQL 语句创建报表\n\n![A978-1-4842-0466-5_11_Fig38_HTML.jpg](img/A978-1-4842-0466-5_11_Fig38_HTML.jpg)\n\
    图 11-38. 基于表或视图创建报表\n\n### 报表：访问数据\n\n用户当然希望看到报表数据。报表数据通过三种方式提供：\n\n*   **导航至报表：**\
    \ 图 11-40 向您展示了在`报表下拉菜单`下找到报表列表的位置。点击菜单中报表的`名称链接`将带您进入`报表数据页面`。图 11-41 展示了本示例中的“授权系统用户”报表。\n\
    \    ![A978-1-4842-0466-5_11_Fig41_HTML.jpg](img/A978-1-4842-0466-5_11_Fig41_HTML.jpg)\n\
    \    图 11-41. 报表数据页面\n    ![A978-1-4842-0466-5_11_Fig40_HTML.jpg](img/A978-1-4842-0466-5_11_Fig40_HTML.jpg)\n\
    \    图 11-40. 导航至报表\n*   **在文本区嵌入报表链接：** 图 11-40 中的报表列表包含一个`嵌入标签列`。此列包含用于在文本区中添加指向该报表的链接的标记语法。您只需将该标记语法复制并粘贴到文本区，即可添加一个链接，该链接将带您进入图\
    \ 11-41 所示的“授权系统用户”报表。\n*   **创建数据区：** 基于报表创建数据区非常简单。向导将引导您完成步骤。首先导航到将包含您报表的页面，然后单击下拉菜单或页面右侧`控制面板`中的`新建区链接`之一（见图\
    \ 11-42）。这将启动`创建区向导`。在第一页选择`数据图标`并单击“下一步”（见图 11-43）。现在，将数据区链接到其数据源（见图 11-44）。在此示例中，您将数据区链接到“授权系统用户”报表。此页面允许您将数据区链接到任何先前创建的数据网格或报表。单击“下一步”，进入确认页面。一旦您点击确认页面上的`创建按钮`，您将返回到内容页面，并且您的报表会显示在新的数据区中（见图\
    \ 11-45）。\n    ![A978-1-4842-0466-5_11_Fig45_HTML.jpg](img/A978-1-4842-0466-5_11_Fig45_HTML.jpg)\n\
    \    图 11-45. 包含报表的数据区\n    ![A978-1-4842-0466-5_11_Fig44_HTML.jpg](img/A978-1-4842-0466-5_11_Fig44_HTML.jpg)\n\
    \    图 11-44. 新建区向导：数据源\n    ![A978-1-4842-0466-5_11_Fig43_HTML.jpg](img/A978-1-4842-0466-5_11_Fig43_HTML.jpg)\n\
    \    图 11-43. 新建区向导：选择区类型\n    ![A978-1-4842-0466-5_11_Fig42_HTML.jpg](img/A978-1-4842-0466-5_11_Fig42_HTML.jpg)\n\
    \    图 11-42. 新建区链接\n\n### 图表区\n\n图表区是向内容添加图形的简便方法。首先，您必须创建一个包含至少一个数值列的报表或数据网格。其次，运行`创建图表向导`。该向导将报表或数据网格链接到图表，并设置轴标签。这个简单过程的细节和视觉效果将在第\
    \ 12 章中介绍。\n\n### 注释\n\n注释用于向您的页面或数据网格中的单独行添加额外内容。有四种类型的注释：\n\n*   **文件：** 两种类型的文件可以上传到您的\
    \ WebSheet 中。图像文件显示在文本区内。其他文件格式（如 PDF）可以上传到 WebSheet，然后下载到最终用户的计算机上。在这两种情况下，您都使用标记语法来实现结果。\n\
    *   **标签：** 标签是附加到内容上的自由格式文本词，用于增强 WebSheet 的搜索功能。\n*   **笔记：** 笔记就像便利贴。当您添加笔记时，它会出现在页面右侧的一个区域中。\n\
    *   **链接：** 链接允许用户导航到任何有效的 URL。注释链接与数据网格中的行相关联；它们不能与页面相关联。要向页面添加链接，您应使用标记语法，而不是注释。\n\
    \n图 11-46 显示了 WebSheet 页面上的`注释区`。点击各种链接可以添加、更改和删除注释。\n\n![A978-1-4842-0466-5_11_Fig46_HTML.jpg](img/A978-1-4842-0466-5_11_Fig46_HTML.jpg)\n\
    图 11-46. 页面右下角的注释区\n\n### 管理\n\n像任何博客或 Wiki 一样，WebSheet 应定期由被授予管理员角色的审核员进行审查。这使得审核员能够查看`仪表板`和`监控活动页面`（见图\
    \ 11-47）。这些页面及其底层报表为审核员提供了工具，用以了解哪些页面最受欢迎和最不受欢迎、渲染页面需要多长时间、谁在使用 WebSheet，以及许多其他有助于审核员确保\
    \ WebSheet 以最佳状态运行的参数。\n\n![A978-1-4842-0466-5_11_Fig47_HTML.jpg](img/A978-1-4842-0466-5_11_Fig47_HTML.jpg)\n\
    图 11-47. 导航到仪表板和监控活动页面\n\n在您学习第 12 章时，请注意标有`历史记录`的链接。这些`历史记录链接`遍布于 WebSheet 的结构导航区域。它们将您带到上下文相关的报表页面，这些页面包含\
    \ WebSheet 更改的全面审计跟踪。贡献者知道他们的更改会被审核，就会努力保持其贡献的高标准。\n\n### 总结\n\n本章带您详细了解了 WebSheet，以便您能够以创新和创造性的方式使用它们。第\
    \ 12 章将通过循序渐进地指导您从头开始构建一个 WebSheet，作为对本章内容的补充。\n"
- fmt: "# 12. A Websheet Example\n\nElectronic supplementary material The online version\
    \ of this chapter (doi:[10.1007/978-1-4842-0466-5_12](http://dx.doi.org/10.1007/978-1-4842-0466-5_12))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    The previous chapter covered many of the different features of websheets. In this\
    \ chapter, you will use these features to build an application from scratch.\n\
    \nThe example application manages a corporate soccer team. Currently, the player\
    \ roster and schedules are maintained in spreadsheets. When the schedule is updated,\
    \ the spreadsheet is emailed to all the players. As you can imagine, it would\
    \ be very frustrating to manage a team this way.\n\nA websheet is a good way to\
    \ manage the soccer team, because websheets can be built with minimal developer\
    \ or DBA assistance. All the files, along with a copy of the final application,\
    \ can be found in the example download described in the introduction to this book.\n\
    \n## Setup\n\nIn order to highlight the capability of websheets to interact with\
    \ objects in your database, let’s create some database objects that are referenced\
    \ throughout the chapter. These objects simulate an existing users table and login\
    \ function for your organization:\n\nRun the following code, which is included\
    \ in the example download as a script named `ch12_database_objects.sql`, in SQL*Plus\
    \ or directly in APEX using SQL Workshop:\n```sql\n-- Create Users Table\nCREATE\
    \ TABLE tusers (\n   user_id       NUMBER (5, 0) PRIMARY KEY,\n   user_name  \
    \   VARCHAR2 (10) NOT NULL UNIQUE,\n   password      VARCHAR2 (10) NOT NULL,\n\
    \   active_flag   VARCHAR2 (1) NOT NULL\n);\n-- Create sequence for IDs\nCREATE\
    \ SEQUENCE sn_users;\n-- Create Users\n-- Note: You should not store passwords\
    \ in clear text.\n-- This was done for demonstration purposes.\nINSERT INTO tusers\
    \ ( user_id, user_name, password, active_flag)\n     VALUES (sn_users.NEXTVAL,\
    \ 'martin', 'martin', 'Y');\nINSERT INTO tusers ( user_id, user_name, password,\
    \ active_flag)\n     VALUES (sn_users.NEXTVAL, 'chris', 'chris', 'Y');\nINSERT\
    \ INTO tusers ( user_id, user_name, password, active_flag)\n     VALUES (sn_users.NEXTVAL,\
    \ 'cameron', 'cameron', 'Y');\n-- Authentication Function\nCREATE OR REPLACE FUNCTION\
    \ f_login (p_username IN VARCHAR2, p_password IN VARCHAR2)\n  RETURN BOOLEAN\n\
    AS\n  v_count   PLS_INTEGER;\nBEGIN\n  SELECT COUNT (user_id)\n    INTO v_count\n\
    \    FROM tusers\n   WHERE LOWER (user_name) = LOWER (p_username)\n     AND password\
    \ = p_password\n     AND active_flag = 'Y';\n  IF v_count = 1 THEN\n    RETURN\
    \ TRUE;\n  END IF;\n  RETURN FALSE;\nEND f_login;\n/\nCOMMIT;\n```\n\n## Creating\
    \ and Configuring a Websheet Application\n\nTo create a websheet application,\
    \ you need to have access to APEX Builder. Once you’ve logged in, proceed with\
    \ the following steps to create the websheet application:\n\n1. Navigate to the\
    \ Application Builder.\n2. Click the Create button.\n3. Select Websheet for the\
    \ application type, as shown in Figure 12-1, and click Next.\n\n![A978-1-4842-0466-5_12_Fig1_HTML.jpg](A978-1-4842-0466-5_12_Fig1_HTML.jpg)\n\
    Figure 12-1. Creating a websheet application\n\n4. On the next screen, enter `Grizzlies\
    \ Soccer` for Name and use the default ID for Websheet. Deselect the Include Getting\
    \ Started Guide checkbox.\n5. Click the Create Websheet button.\n\nYou should\
    \ now see a success page with the option to run the websheet (see Figure 12-2).\n\
    \n![A978-1-4842-0466-5_12_Fig2_HTML.jpg](A978-1-4842-0466-5_12_Fig2_HTML.jpg)\n\
    Figure 12-2. Websheet Created success page\n\nThe Grizzlies are your corporate\
    \ soccer team, so you’d like to be able to have users log in using their current\
    \ corporate accounts. To use the corporate authentication, you need to configure\
    \ the application and modify the authorization scheme.\n\nBecause you haven’t\
    \ defined an authentication scheme, you need access to APEX Builder to modify\
    \ the application properties. This is the last portion of the process which requires\
    \ APEX Builder access. The following steps describe how to modify the application\
    \ properties:\n\n1. Click the Application Builder tab at the top of the page to\
    \ return to the Application Builder home page.\n2. Edit the new application you\
    \ created (`Grizzlies Soccer`) by clicking on either the name or the icon.\n3.\
    \ Modify the items in the following sections:\n    - **Attributes**: Enter `DD-MON-YYYY`\
    \ for Application Date Format, as shown in Figure 12-3.\n        ![A978-1-4842-0466-5_12_Fig3_HTML.jpg](A978-1-4842-0466-5_12_Fig3_HTML.jpg)\n\
    \        Figure 12-3. Application date format\n    - **Authentication**: Select\
    \ Custom as the authentication type and replace `- BUILTIN -` with the statement\
    \ `return f_login` in the Authentication Function field, as shown in Figure 12-4.\
    \ Leave all the other inputs at their default values. (`f_login` refers to the\
    \ function you created in the “Setup” section of this chapter.)\n        ![A978-1-4842-0466-5_12_Fig4_HTML.jpg](A978-1-4842-0466-5_12_Fig4_HTML.jpg)\n\
    \        Figure 12-4. Custom authentication\n    - **SQL**: Select Yes for Allow\
    \ SQL. This lets you reference tables and views in the underlying schema. After\
    \ you select Yes, an Add Object button appears. Click Add Object and enter `TUSERS`\
    \ for Object Name, as shown in Figure 12-5. This will allow users to quickly select\
    \ the `TUSERS` table when creating reports. Click the Create button, which brings\
    \ you back to the application properties page.\n        ![A978-1-4842-0466-5_12_Fig5_HTML.jpg](A978-1-4842-0466-5_12_Fig5_HTML.jpg)\n\
    \        Figure 12-5. Adding an object\n    - **Authorization**: Before you can\
    \ use a custom authentication scheme, you need to define an administrator for\
    \ the application. To do so, click the Edit Access Control List button. On the\
    \ new page, click the Create Entry button. In the Username field, enter `martin`,\
    \ and select Administrator for Privilege, as shown in Figure 12-6. Click Create\
    \ to register `martin` as an administrator. You’re brought back to the Access\
    \ Control List page. Click the Cancel button to return to the application properties\
    \ page. Click Apply Changes button to save your changes.\n        ![A978-1-4842-0466-5_12_Fig6_HTML.jpg](A978-1-4842-0466-5_12_Fig6_HTML.jpg)\n\
    \        Figure 12-6. Access Control List: adding an administrator\n\n## Adding\
    \ Content to a Websheet\n\nIn the previous section, you created and configured\
    \ a websheet application to manage your corporate soccer team. In this section,\
    \ you will create data grids and add content to the application.\n\nRun the websheet\
    \ application and log in as `martin`/`martin`, the site administrator. Once you’ve\
    \ logged in, the page should look like Figure 12-7. You’re now ready to create\
    \ your first data grid.\n\n![A978-1-4842-0466-5_12_Fig7_HTML.jpg](A978-1-4842-0466-5_12_Fig7_HTML.jpg)\n\
    Figure 12-7. Initial websheet application\n\nNote: The URL to run the websheet\
    \ application is `<apex_url>/ws?p=<web_sheet_id>`. For example: [`http://www.example.com/apex/ws?p=103`](http://www.example.com/apex/ws?p=103),\
    \ where `103` is the websheet application ID."
  raw: "# 12. A Websheet Example\n\nElectronic supplementary material The online version\
    \ of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​12](http://dx.doi.org/10.1007/978-1-4842-0466-5_12))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    The previous chapter covered many of the different features of websheets. In this\
    \ chapter, you will use these features to build an application from scratch.\n\
    \nThe example application manages a corporate soccer team. Currently, the player\
    \ roster and schedules are maintained in spreadsheets. When the schedule is updated,\
    \ the spreadsheet is emailed to all the players. As you can imagine, it would\
    \ be very frustrating to manage a team this way.\n\nA websheet is a good way to\
    \ manage the soccer team, because websheets can be built with minimal developer\
    \ or DBA assistance. All the files, along with a copy of the final application,\
    \ can be found in the example download described in the introduction to this book.\n\
    \n## Setup\n\nIn order to highlight the capability of websheets to interact with\
    \ objects in your database, let’s create some database objects that are referenced\
    \ throughout the chapter. These objects simulate an existing users table and login\
    \ function for your organization:\n\nRun the following code, which is included\
    \ in the example download as a script named `ch12_database_objects.sql`, in SQL*Plus\
    \ or directly in APEX using SQL Workshop: `-- Create Users Table` `CREATE TABLE\
    \ tusers (`   `user_id       NUMBER (5, 0) PRIMARY KEY,`   `user_name     VARCHAR2\
    \ (10) NOT NULL UNIQUE,`   `password      VARCHAR2 (10) NOT NULL,`   `active_flag   VARCHAR2\
    \ (1) NOT NULL` `);` `-- Create sequence for IDs` `CREATE SEQUENCE sn_users;`\
    \ `-- Create Users` `-- Note: You should not store passwords in clear text.` `--\
    \ This was done for demonstration purposes.` `INSERT INTO tusers ( user_id, user_name,\
    \ password, active_flag)`      `VALUES (sn_users.NEXTVAL, 'martin', 'martin',\
    \ 'Y');` `INSERT INTO tusers ( user_id, user_name, password, active_flag)`      `VALUES\
    \ (sn_users.NEXTVAL, 'chris', 'chris', 'Y');` `INSERT INTO tusers ( user_id, user_name,\
    \ password, active_flag)`      `VALUES (sn_users.NEXTVAL, 'cameron', 'cameron',\
    \ 'Y');` `-- Authentication Function` `CREATE OR REPLACE FUNCTION f_login (p_username\
    \ IN VARCHAR2, p_password IN VARCHAR2)`   `RETURN BOOLEAN` `AS`   `v_count   PLS_INTEGER;`\
    \ `BEGIN`   `SELECT COUNT (user_id)`     `INTO v_count`     `FROM tusers`    `WHERE\
    \ LOWER (user_name) = LOWER (p_username)`      `AND password = p_password`      `AND\
    \ active_flag = 'Y';`   `IF v_count = 1 THEN`     `RETURN TRUE;`   `END IF;`   `RETURN\
    \ FALSE;` `END f_login;` `/` `COMMIT;`\n\n## Creating and Configuring a Websheet\
    \ Application\n\nTo create a websheet application, you need to have access to\
    \ APEX Builder. Once you’ve logged in, proceed with the following steps to create\
    \ the websheet application:\n\nNavigate to the Application Builder.   Click the\
    \ Create button.   Select Websheet for the application type, as shown in Figure\
    \ [12-1](#A978-1-4842-0466-5_12_Chapter.html#Fig1), and click Next.\n\n![A978-1-4842-0466-5_12_Fig1_HTML.jpg](A978-1-4842-0466-5_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1.\n\nCreating a websheet application   On the next screen, enter\
    \ `Grizzlies Soccer` for Name and use the default ID for Websheet. Deselect the\
    \ Include Getting Started Guide checkbox.   Click the Create Websheet button.\
    \  \n\nYou should now see a success page with the option to run the websheet (see\
    \ Figure [12-2](#A978-1-4842-0466-5_12_Chapter.html#Fig2)).\n\n![A978-1-4842-0466-5_12_Fig2_HTML.jpg](A978-1-4842-0466-5_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2.\n\nWebsheet Created success page\n\nThe Grizzlies are your corporate\
    \ soccer team, so you’d like to be able to have users log in using their current\
    \ corporate accounts. To use the corporate authentication, you need to configure\
    \ the application and modify the authorization scheme.\n\nBecause you haven’t\
    \ defined an authentication scheme, you need access to APEX Builder to modify\
    \ the application properties. This is the last portion of the process which requires\
    \ APEX Builder access. The following steps describe how to modify the application\
    \ properties:\n\nClick the Application Builder tab at the top of the page to return\
    \ to the Application Builder home page.   Edit the new application you created\
    \ (Grizzlies Soccer) by clicking on either the name or the icon.   Modify the\
    \ items in the following sections:\n\n*   Attributes: Enter `DD-MON-YYYY` for\
    \ Application Date Format, as shown in Figure [12-3](#A978-1-4842-0466-5_12_Chapter.html#Fig3).\n\
    \n    ![A978-1-4842-0466-5_12_Fig3_HTML.jpg](A978-1-4842-0466-5_12_Fig3_HTML.jpg)\n\
    \n    Figure 12-3.\n\n    Application date format\n*   Authentication: Select\
    \ Custom as the authentication type and replace - BUILTIN - with the statement\
    \ `return f_login` in the Authentication Function field, as shown in Figure [12-4](#A978-1-4842-0466-5_12_Chapter.html#Fig4).\
    \ Leave all the other inputs at their default values. (`f_login` refers to the\
    \ function you created in the “Setup” section of this chapter.)\n\n    ![A978-1-4842-0466-5_12_Fig4_HTML.jpg](A978-1-4842-0466-5_12_Fig4_HTML.jpg)\n\
    \n    Figure 12-4.\n\n    Custom authentication\n*   SQL: Select Yes for Allow\
    \ SQL. This lets you reference tables and views in the underlying schema. After\
    \ you select Yes, an Add Object button appears. Click Add Object and enter `TUSERS`\
    \ for Object Name, as shown in Figure [12-5](#A978-1-4842-0466-5_12_Chapter.html#Fig5).\
    \ This will allow users to quickly select the `TUSERS` table when creating reports.\
    \ Click the Create button, which brings you back to the application properties\
    \ page.\n\n    ![A978-1-4842-0466-5_12_Fig5_HTML.jpg](A978-1-4842-0466-5_12_Fig5_HTML.jpg)\n\
    \n    Figure 12-5.\n\n    Adding an object\n\n  Authorization: Before you can\
    \ use a custom authentication scheme, you need to define an administrator for\
    \ the application. To do so, click the Edit Access Control List button. On the\
    \ new page, click the Create Entry button. In the Username field, enter `martin`,\
    \ and select Administrator for Privilege, as shown in Figure [12-6](#A978-1-4842-0466-5_12_Chapter.html#Fig6).\
    \ Click Create to register martin as an administrator. You’re brought back to\
    \ the Access Control List page. Click the Cancel button to return to the application\
    \ properties page. Click Apply Changes button to save your changes.\n\n![A978-1-4842-0466-5_12_Fig6_HTML.jpg](A978-1-4842-0466-5_12_Fig6_HTML.jpg)\n\
    \nFigure 12-6.\n\nAccess Control List: adding an administrator\n\n## Adding Content\
    \ to a Websheet\n\nIn the previous section, you created and configured a websheet\
    \ application to manage your corporate soccer team. In this section, you will\
    \ create data grids and add content to the application.\n\nRun the websheet application\
    \ and log in as martin/martin, the site administrator. Once you’ve logged in,\
    \ the page should look like Figure [12-7](#A978-1-4842-0466-5_12_Chapter.html#Fig7).\
    \ You’re now ready to create your first data grid.\n\n![A978-1-4842-0466-5_12_Fig7_HTML.jpg](A978-1-4842-0466-5_12_Fig7_HTML.jpg)\n\
    \nFigure 12-7.\n\nInitial websheet application Note\n\nThe URL to run the websheet\
    \ application is `<apex_url>/ws?p=``<``web_sheet_id``>`. For example: [`http://www.example.com/apex/ws?p=103`](http://www.example.com/apex/ws?p=103)\
    \ , where 103 is the websheet application ID."
  trans: "\n# 12. 网页表格示例\n\n电子补充材料 本章的在线版本（doi:[10.1007/978-1-4842-0466-5_12](http://dx.doi.org/10.1007/978-1-4842-0466-5_12)）包含补充材料，可供授权用户使用。\n\
    \n前一章涵盖了网页表格的许多不同功能。在本章中，你将使用这些功能从头开始构建一个应用程序。\n\n示例应用程序管理一个公司足球队。目前，球员名单和日程安排维护在电子表格中。当日程更新时，电子表格会通过电子邮件发送给所有球员。正如你所能想象的，以这种方式管理球队会非常令人沮丧。\n\
    \n网页表格是管理足球队的好方法，因为构建网页表格只需要最少的开发人员或数据库管理员协助。所有文件以及最终应用程序的副本，都可以在本书引言中描述的示例下载中找到。\n\
    \n## 设置\n\n为了突出网页表格与数据库中的对象交互的能力，让我们创建一些在本章中会引用的数据库对象。这些对象模拟了你组织中现有的用户表和登录函数：\n\
    \n在 SQL*Plus 中或直接在 APEX 的 SQL Workshop 中运行以下代码，该代码包含在示例下载中，文件名为 `ch12_database_objects.sql`：\n\
    ```sql\n-- Create Users Table\nCREATE TABLE tusers (\n   user_id       NUMBER\
    \ (5, 0) PRIMARY KEY,\n   user_name     VARCHAR2 (10) NOT NULL UNIQUE,\n   password\
    \      VARCHAR2 (10) NOT NULL,\n   active_flag   VARCHAR2 (1) NOT NULL\n);\n--\
    \ Create sequence for IDs\nCREATE SEQUENCE sn_users;\n-- Create Users\n-- Note:\
    \ You should not store passwords in clear text.\n-- This was done for demonstration\
    \ purposes.\nINSERT INTO tusers ( user_id, user_name, password, active_flag)\n\
    \     VALUES (sn_users.NEXTVAL, 'martin', 'martin', 'Y');\nINSERT INTO tusers\
    \ ( user_id, user_name, password, active_flag)\n     VALUES (sn_users.NEXTVAL,\
    \ 'chris', 'chris', 'Y');\nINSERT INTO tusers ( user_id, user_name, password,\
    \ active_flag)\n     VALUES (sn_users.NEXTVAL, 'cameron', 'cameron', 'Y');\n--\
    \ Authentication Function\nCREATE OR REPLACE FUNCTION f_login (p_username IN VARCHAR2,\
    \ p_password IN VARCHAR2)\n  RETURN BOOLEAN\nAS\n  v_count   PLS_INTEGER;\nBEGIN\n\
    \  SELECT COUNT (user_id)\n    INTO v_count\n    FROM tusers\n   WHERE LOWER (user_name)\
    \ = LOWER (p_username)\n     AND password = p_password\n     AND active_flag =\
    \ 'Y';\n  IF v_count = 1 THEN\n    RETURN TRUE;\n  END IF;\n  RETURN FALSE;\n\
    END f_login;\n/\nCOMMIT;\n```\n\n## 创建和配置网页表格应用程序\n\n要创建网页表格应用程序，你需要有权访问 APEX\
    \ Builder。登录后，按照以下步骤创建网页表格应用程序：\n\n1.  导航到应用程序生成器。\n2.  单击“创建”按钮。\n3.  为应用程序类型选择“网页表格”，如图\
    \ 12-1 所示，然后单击“下一步”。\n\n![A978-1-4842-0466-5_12_Fig1_HTML.jpg](img/A978-1-4842-0466-5_12_Fig1_HTML.jpg)\n\
    图 12-1. 创建网页表格应用程序\n\n4.  在下一个屏幕上，为“名称”输入 `灰熊队足球`，并使用网页表格的默认 ID。取消选中“包含入门指南”复选框。\n\
    5.  单击“创建网页表格”按钮。\n\n你现在应该会看到一个成功页面，其中包含运行网页表格的选项（参见图 12-2）。\n\n![A978-1-4842-0466-5_12_Fig2_HTML.jpg](img/A978-1-4842-0466-5_12_Fig2_HTML.jpg)\n\
    图 12-2. 网页表格创建成功页面\n\n灰熊队是你的公司足球队，因此你希望用户能够使用他们当前的公司账户登录。要使用公司认证，你需要配置应用程序并修改授权方案。\n\
    \n由于你尚未定义认证方案，因此你需要访问 APEX Builder 来修改应用程序属性。这是需要 APEX Builder 访问权限的最后一个步骤。以下步骤描述了如何修改应用程序属性：\n\
    \n1.  单击页面顶部的“应用程序生成器”选项卡，以返回应用程序生成器主页。\n2.  通过单击名称或图标来编辑你创建的新应用程序（`灰熊队足球`）。\n\
    3.  修改以下部分中的项目：\n    -   **属性**：为“应用程序日期格式”输入 `DD-MON-YYYY`，如图 12-3 所示。\n    \
    \    ![A978-1-4842-0466-5_12_Fig3_HTML.jpg](img/A978-1-4842-0466-5_12_Fig3_HTML.jpg)\n\
    \        图 12-3. 应用程序日期格式\n    -   **认证**：选择“自定义”作为认证类型，并在“认证函数”字段中将 `- BUILTIN\
    \ -` 替换为语句 `return f_login`，如图 12-4 所示。将所有其他输入保留为默认值。（`f_login` 指的是你在本章“设置”部分创建的函数。）\n\
    \        ![A978-1-4842-0466-5_12_Fig4_HTML.jpg](img/A978-1-4842-0466-5_12_Fig4_HTML.jpg)\n\
    \        图 12-4. 自定义认证\n    -   **SQL**：为“允许 SQL”选择“是”。这允许你引用底层模式中的表和视图。选择“是”后，会出现一个“添加对象”按钮。单击“添加对象”并为“对象名称”输入\
    \ `TUSERS`，如图 12-5 所示。这将允许用户在创建报表时快速选择 `TUSERS` 表。单击“创建”按钮，这将带你返回应用程序属性页面。\n \
    \       ![A978-1-4842-0466-5_12_Fig5_HTML.jpg](img/A978-1-4842-0466-5_12_Fig5_HTML.jpg)\n\
    \        图 12-5. 添加对象\n    -   **授权**：在使用自定义认证方案之前，你需要为应用程序定义一个管理员。为此，单击“编辑访问控制列表”按钮。在新页面上，单击“创建条目”按钮。在“用户名”字段中输入\
    \ `martin`，并为“权限”选择“管理员”，如图 12-6 所示。单击“创建”以将 `martin` 注册为管理员。你将被带回到“访问控制列表”页面。单击“取消”按钮返回应用程序属性页面。单击“应用更改”按钮保存你的更改。\n\
    \        ![A978-1-4842-0466-5_12_Fig6_HTML.jpg](img/A978-1-4842-0466-5_12_Fig6_HTML.jpg)\n\
    \        图 12-6. 访问控制列表：添加管理员\n\n## 向网页表格添加内容\n\n在上一节中，你创建并配置了一个网页表格应用程序来管理你的公司足球队。在本节中，你将创建数据网格并向应用程序添加内容。\n\
    \n运行网页表格应用程序并以 `martin`/`martin`（站点管理员）身份登录。登录后，页面应如图 12-7 所示。现在你已准备好创建你的第一个数据网格。\n\
    \n![A978-1-4842-0466-5_12_Fig7_HTML.jpg](img/A978-1-4842-0466-5_12_Fig7_HTML.jpg)\n\
    图 12-7. 初始网页表格应用程序\n\n注意：运行网页表格应用程序的 URL 是 `<apex_url>/ws?p=<web_sheet_id>`。例如：[`http://www.example.com/apex/ws?p=103`](http://www.example.com/apex/ws?p=103)，其中\
    \ `103` 是网页表格应用程序 ID。\n"
- fmt: "## Creating Data Grids\n\nThe first thing to do is to create some custom tables\
    \ called data grids. Just a reminder: data grids exist only in the context of\
    \ the websheet application. They don’t exist as tables in a schema. There are\
    \ two ways to create data grids: by pasting in existing data from a spreadsheet\
    \ or from scratch by manually defining each column. In this section you will create\
    \ data grids with both methods.\n\nYou currently keep the game and practice schedules\
    \ in a spreadsheet. You can import data and simultaneously create a data grid\
    \ using copy and paste. Here is the process to follow:\n1.  Click the `Data Grid`\
    \ tab at the top of the application.\n2.  Click the `New Data Grid` option in\
    \ the drop-down menu.\n3.  Select `Copy and Paste` as the input method and click\
    \ `Next`.\n4.  Enter `Schedule` in the `Name` and `Alias` fields.\n5.  Open `Grizzlies_Schedule.csv`,\
    \ which can be found in the sample code for this chapter, in Microsoft Excel and\
    \ select all the fields, including the header. Copy these values and paste them\
    \ into the `Paste Spreadsheet Data` text area.\n6.  Ensure that the `First Row\
    \ Contains Column Headings` checkbox is checked and click the `Upload` button.\n\
    \nYou should now see the data in an interactive report, as shown in Figure [12-8](#A978-1-4842-0466-5_12_Chapter.html#Fig8).\n\
    \n![A978-1-4842-0466-5_12_Fig8_HTML.jpg](A978-1-4842-0466-5_12_Fig8_HTML.jpg)\n\
    Figure 12-8. Data grid result\n\nYou also need to create a data grid to keep track\
    \ of the number of goals each player scores. You don’t have any existing data\
    \ ready to copy and paste from a spreadsheet, so this time it makes sense to create\
    \ the data grid manually. Here are the steps to follow:\n1.  Click the `Data Grid`\
    \ tab at the top of the application.\n2.  Click the `New Data Grid` menu option.\n\
    3.  Select `From Scratch` as the input method and click `Next`.\n4.  Fill out\
    \ the data grid definition, as shown in Figure [12-9](#A978-1-4842-0466-5_12_Chapter.html#Fig9),\
    \ and click the `Create Data Grid` button to finish creating the data grid.\n\n\
    ![A978-1-4842-0466-5_12_Fig9_HTML.jpg](A978-1-4842-0466-5_12_Fig9_HTML.jpg)\n\
    Figure 12-9. Creating a data grid from scratch\n\n## Applying Constraints\n\n\
    Now that you have data grids, you need to add some constraints to them. Because\
    \ data grids aren’t database objects, you must use the websheet interface to apply\
    \ constraints.\n\nIn the `Players` data grid, you need to ensure that all the\
    \ fields contain data and that the default for the `Goals` column is `0`. To apply\
    \ these constraints, follow these steps:\n1.  Click the `Data Grid` tab.\n2. \
    \ Click `Players` in the drop-down menu.\n3.  Click the `Manage` button and select\
    \ `Columns` ➤ `Column Properties`, as shown in Figure [12-10](#A978-1-4842-0466-5_12_Chapter.html#Fig10).\n\
    \n![A978-1-4842-0466-5_12_Fig10_HTML.jpg](A978-1-4842-0466-5_12_Fig10_HTML.jpg)\n\
    Figure 12-10. Data grid column properties\n4.  Select `Name` in the `Column Name`\
    \ select list.\n5.  Select `Yes` for `Value Required`.\n6.  You must explicitly\
    \ save your changes before modifying another column. Click the `Apply` button\
    \ at the bottom.\n7.  Open the `Column Properties` section again (repeat Step\
    \ 3).\n8.  Select `Goals` in the `Column Name` select list.\n9.  Select `Yes`\
    \ for `Value Required`.\n10. In the `Default Text` field, enter `0`.\n11. Click\
    \ `Apply`.\n\nNow, when you create players, both `Name` and `Goals` are required\
    \ values. `Goals` defaults to `0`.\n\n## Adding Players\n\nTo add players to the\
    \ `Players` data grid, click the `Add Row` button. For this example, add the players\
    \ and their goals as shown in Figure [12-11](#A978-1-4842-0466-5_12_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0466-5_12_Fig11_HTML.jpg](A978-1-4842-0466-5_12_Fig11_HTML.jpg)\n\
    Figure 12-11. Player data\n\n## Creating Alternate Default Reports\n\nNow that\
    \ you have data in the data grids, you can create alternate default reports, which\
    \ you can reference when creating sections. Data grids allow you to save reports\
    \ just like interactive reports do. Alternate default reports are saved data grid\
    \ reports that can be displayed throughout your websheet application.\n\nNote:\
    \ Some of the reports that you’ll create are date sensitive. Normally, you’d use\
    \ `SYSDATE` as a reference point. Instead, you’ll use a static date of `10-Jun-2010`\
    \ to simulate a common `SYSDATE`. This ensures that you will see the same data\
    \ as that shown in this book.\n\nThe first alternate report highlights the games\
    \ and practices for the next two weeks. To create this report, follow these steps:\n\
    1.  Navigate to the `Schedule` data grid using the `Data Grid` tab.\n2.  Click\
    \ the `Actions` button and select `Filter`.\n3.  Select `Row` for `Filter Type`.\n\
    4.  Enter `Next Two Weeks` for `Name`.\n5.  Enter the following for `Filter Expression`:\n\
    \    `B >= to_date('10-jun-2010', 'dd-mon-yyyy') and B < to_date('10-jun-2010',\
    \ 'dd-mon-yyyy') + 14`\n6.  Click the `Apply` button.\n7.  Order the `Date` column\
    \ as ascending by clicking the `Date` column heading and choosing the `Ascending`\
    \ sort icon.\n8.  Hide the `Grizzlies` and `Opponents` columns, as you don’t have\
    \ scores for future games. To do this, choose the `Select Columns` option from\
    \ the `Actions` menu.\n9.  Choose `Actions` ➤ `Save Report`.\n10. Select `As Default\
    \ Report Settings` in the `Save` select list.\n11. Select `Alternate` for `Default\
    \ Report Type` and enter `Next Two Weeks` for `Name`.\n12. Click `Apply`.\n\n\
    The report should now look like that in Figure [12-12](#A978-1-4842-0466-5_12_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0466-5_12_Fig12_HTML.jpg](A978-1-4842-0466-5_12_Fig12_HTML.jpg)\n\
    Figure 12-12. The next two weeks\n\nBecause you’ve already learned how to manipulate\
    \ and create saved interactive reports, create the following alternate default\
    \ reports for the `Schedule` data grid:\n\n*   **Remaining Games**: This report\
    \ lists all the games left in the season.\n*   **Remaining Practices**: This report\
    \ lists all the practices left in the season.\n*   **Results**: This report lists\
    \ all the games that have been completed along with the scores."
  raw: '### Creating Data Grids


    The first thing to do is to create some custom tables called data grids. Just
    a reminder: data grids exist only in the context of the websheet application.
    They don’t exist as tables in a schema. There are two ways to create data grids:
    by pasting in existing data from a spreadsheet or from scratch by manually defining
    each column. In this section you will create data grids with both methods.


    You currently keep the game and practice schedules in a spreadsheet. You can import
    data and simultaneously create a data grid using copy and paste. Here is the process
    to follow:


    Click the Data Grid tab at the top of the application.   Click the New Data Grid
    option in the drop-down menu.   Select Copy and Paste as the input method and
    click Next.   Enter `Schedule` in the Name and Alias fields.   Open `Grizzlies_Schedule.csv`,
    which can be found in the sample code for this chapter, in Microsoft Excel and
    select all the fields, including the header. Copy these values and paste them
    into the Paste Spreadsheet Data text area. Ensure that the First Row Contains
    Column Headings checkbox is checked and click the Upload button.   You should
    now see the data in an interactive report, as shown in Figure [12-8](#A978-1-4842-0466-5_12_Chapter.html#Fig8).


    ![A978-1-4842-0466-5_12_Fig8_HTML.jpg](A978-1-4842-0466-5_12_Fig8_HTML.jpg)


    Figure 12-8.


    Data grid result  


    You also need to create a data grid to keep track of the number of goals each
    player scores. You don’t have any existing data ready to copy and paste from a
    spreadsheet, so this time it makes sense to create the data grid manually. Here
    are the steps to follow:


    Click the Data Grid tab at the top of the application.   Click the New Data Grid
    menu option.   Select From Scratch as the input method and click Next.   Fill
    out the data grid definition, as shown in Figure [12-9](#A978-1-4842-0466-5_12_Chapter.html#Fig9),
    and click the Create Data Grid button to finish creating the data grid.


    ![A978-1-4842-0466-5_12_Fig9_HTML.jpg](A978-1-4842-0466-5_12_Fig9_HTML.jpg)


    Figure 12-9.


    Creating a data grid from scratch


    ### Applying Constraints


    Now that you have data grids, you need to add some constraints to them. Because
    data grids aren’t database objects, you must use the websheet interface to apply
    constraints.


    In the Players data grid, you need to ensure that all the fields contain data
    and that the default for the Goals column is 0\. To apply these constraints, follow
    these steps:


    Click the Data Grid tab.   Click Players in the drop-down menu.   Click the Manage
    button and select Columns ➤ Column Properties, as shown in Figure [12-10](#A978-1-4842-0466-5_12_Chapter.html#Fig10).


    ![A978-1-4842-0466-5_12_Fig10_HTML.jpg](A978-1-4842-0466-5_12_Fig10_HTML.jpg)


    Figure 12-10.


    Data grid column properties   Select Name in the Column Name select list.   Select
    Yes for Value Required.   You must explicitly save your changes before modifying
    another column. Click the Apply button at the bottom.   Open the Column Properties
    section again (repeat Step 3).   Select Goals in the Column Name select list.
      Select Yes for Value Required.   In the Default Text field, enter `0`.   Click
    Apply.  


    Now, when you create players, both Name and Goals are required values. Goals defaults
    to 0.


    ### Adding Players


    To add players to the Players data grid, click the Add Row button. For this example,
    add the players and their goals as shown in Figure [12-11](#A978-1-4842-0466-5_12_Chapter.html#Fig11).


    ![A978-1-4842-0466-5_12_Fig11_HTML.jpg](A978-1-4842-0466-5_12_Fig11_HTML.jpg)


    Figure 12-11.


    Player data


    ### Creating Alternate Default Reports


    Now that you have data in the data grids, you can create alternate default reports,
    which you can reference when creating sections. Data grids allow you to save reports
    just like interactive reports do. Alternate default reports are saved data grid
    reports that can be displayed throughout your websheet application.


    Note


    Some of the reports that you’ll create are date sensitive. Normally, you’d use
    `SYSDATE` as a reference point. Instead, you’ll use a static date of 10-Jun-2010
    to simulate a common `SYSDATE`. This ensures that you will see the same data as
    that shown in this book.


    The first alternate report highlights the games and practices for the next two
    weeks. To create this report, follow these steps:


    Navigate to the Schedule data grid using the Data Grid tab.   Click the Actions
    button and select Filter.   Select Row for Filter Type.   Enter `Next Two Weeks`
    for Name.   Enter the following for Filter Expression: `B >= to_date(''10-jun-2010'',
    ''dd-mon-yyyy'')`         `and B < to_date(''10-jun-2010'', ''dd-mon-yyyy'') +
    14`   Click the Apply button.   Order the Date column as ascending by clicking
    the Date column heading and choosing the Ascending sort icon.   Hide the Grizzlies
    and Opponents columns, as you don’t have scores for future games. To do this,
    choose the Select Columns option from the Actions menu.   Choose Actions ➤ Save
    Report.   Select As Default Report Settings in the Save select list.   Select
    Alternate for Default Report Type and enter `Next Two Weeks` for Name.   Click
    Apply. The report should now look like that in Figure [12-12](#A978-1-4842-0466-5_12_Chapter.html#Fig12).


    ![A978-1-4842-0466-5_12_Fig12_HTML.jpg](A978-1-4842-0466-5_12_Fig12_HTML.jpg)


    Figure 12-12.


    The next two weeks  


    Because you’ve already learned how to manipulate and create saved interactive
    reports, create the following alternate default reports for the Schedule data
    grid:


    *   Remaining Games: This report lists all the games left in the season.

    *   Remaining Practices: This report lists all the practices left in the season.

    *   Results: This report lists all the games that have been completed along with
    the scores.'
  trans: "\n## 创建数据网格\n\n首先要做的是创建一些称为数据网格的自定义表。提醒一下：数据网格仅存在于 websheet 应用程序的上下文中。它们并不作为表存在于数据库模式中。创建数据网格有两种方法：通过粘贴来自电子表格的现有数据，或通过手动定义每个列从头开始创建。在本节中，你将使用这两种方法创建数据网格。\n\
    \n你目前将比赛和训练日程保存在电子表格中。你可以使用复制和粘贴来导入数据并同时创建数据网格。请遵循以下过程：\n1.  单击应用程序顶部的 `Data Grid`\
    \ 选项卡。\n2.  在下拉菜单中单击 `New Data Grid` 选项。\n3.  选择 `Copy and Paste` 作为输入方法，然后单击\
    \ `Next`。\n4.  在 `Name` 和 `Alias` 字段中输入 `Schedule`。\n5.  在 Microsoft Excel 中打开可在本章示例代码中找到的\
    \ `Grizzlies_Schedule.csv`，并选择所有字段，包括标题。复制这些值并将其粘贴到 `Paste Spreadsheet Data` 文本区域中。\n\
    6.  确保 `First Row Contains Column Headings` 复选框被勾选，然后单击 `Upload` 按钮。\n\n你现在应该看到交互式报表中的数据，如图\
    \ 12-8 所示。\n\n![A978-1-4842-0466-5_12_Fig8_HTML.jpg](img/A978-1-4842-0466-5_12_Fig8_HTML.jpg)\n\
    图 12-8. 数据网格结果\n\n你还需要创建一个数据网格来跟踪每个球员的进球数。你没有任何现成的电子表格数据可供复制和粘贴，因此这次手动创建数据网格是合理的。请遵循以下步骤：\n\
    1.  单击应用程序顶部的 `Data Grid` 选项卡。\n2.  单击 `New Data Grid` 菜单选项。\n3.  选择 `From Scratch`\
    \ 作为输入方法，然后单击 `Next`。\n4.  填写数据网格定义，如图 12-9 所示，然后单击 `Create Data Grid` 按钮以完成数据网格的创建。\n\
    \n![A978-1-4842-0466-5_12_Fig9_HTML.jpg](img/A978-1-4842-0466-5_12_Fig9_HTML.jpg)\n\
    图 12-9. 从头开始创建数据网格\n\n## 应用约束\n\n现在你已经有了数据网格，需要向它们添加一些约束。因为数据网格不是数据库对象，你必须使用 websheet\
    \ 界面来应用约束。\n\n在 `Players` 数据网格中，你需要确保所有字段都包含数据，并且 `Goals` 列的默认值为 `0`。要应用这些约束，请遵循以下步骤：\n\
    1.  单击 `Data Grid` 选项卡。\n2.  在下拉菜单中单击 `Players`。\n3.  单击 `Manage` 按钮，然后选择 `Columns`\
    \ ➤ `Column Properties`，如图 12-10 所示。\n\n![A978-1-4842-0466-5_12_Fig10_HTML.jpg](img/A978-1-4842-0466-5_12_Fig10_HTML.jpg)\n\
    图 12-10. 数据网格列属性\n4.  在 `Column Name` 选择列表中选择 `Name`。\n5.  将 `Value Required`\
    \ 选择为 `Yes`。\n6.  在修改另一个列之前，必须显式保存你的更改。单击底部的 `Apply` 按钮。\n7.  再次打开 `Column Properties`\
    \ 部分（重复步骤 3）。\n8.  在 `Column Name` 选择列表中选择 `Goals`。\n9.  将 `Value Required` 选择为\
    \ `Yes`。\n10. 在 `Default Text` 字段中，输入 `0`。\n11. 单击 `Apply`。\n\n现在，当你创建球员时，`Name`\
    \ 和 `Goals` 都是必填值。`Goals` 默认值为 `0`。\n\n## 添加球员\n\n要将球员添加到 `Players` 数据网格，请单击 `Add\
    \ Row` 按钮。对于本例，添加如图 12-11 所示的球员及其进球数。\n\n![A978-1-4842-0466-5_12_Fig11_HTML.jpg](img/A978-1-4842-0466-5_12_Fig11_HTML.jpg)\n\
    图 12-11. 球员数据\n\n## 创建替代默认报告\n\n现在数据网格中已有数据，你可以创建替代默认报告，在创建区域时可以引用它们。数据网格允许你保存报告，就像交互式报告一样。替代默认报告是已保存的数据网格报告，可以在整个\
    \ websheet 应用程序中显示。\n\n注意：你将创建的一些报告对日期敏感。通常，你会使用 `SYSDATE` 作为参考点。但在这里，你将使用静态日期\
    \ `10-Jun-2010` 来模拟常见的 `SYSDATE`。这确保你将看到与本书中显示的数据相同。\n\n第一个替代报告突出显示未来两周的比赛和训练。要创建此报告，请遵循以下步骤：\n\
    1.  使用 `Data Grid` 选项卡导航到 `Schedule` 数据网格。\n2.  单击 `Actions` 按钮，然后选择 `Filter`。\n\
    3.  将 `Filter Type` 选择为 `Row`。\n4.  为 `Name` 输入 `Next Two Weeks`。\n5.  为 `Filter\
    \ Expression` 输入以下内容：\n    `B >= to_date('10-jun-2010', 'dd-mon-yyyy') and B <\
    \ to_date('10-jun-2010', 'dd-mon-yyyy') + 14`\n6.  单击 `Apply` 按钮。\n7.  通过单击 `Date`\
    \ 列标题并选择 `Ascending` 排序图标，将 `Date` 列按升序排列。\n8.  隐藏 `Grizzlies` 和 `Opponents` 列，因为你没有未来比赛的分数。为此，从\
    \ `Actions` 菜单中选择 `Select Columns` 选项。\n9.  选择 `Actions` ➤ `Save Report`。\n10.\
    \ 在 `Save` 选择列表中选择 `As Default Report Settings`。\n11. 将 `Default Report Type`\
    \ 选择为 `Alternate`，并为 `Name` 输入 `Next Two Weeks`。\n12. 单击 `Apply`。\n\n该报告现在应如图\
    \ 12-12 所示。\n\n![A978-1-4842-0466-5_12_Fig12_HTML.jpg](img/A978-1-4842-0466-5_12_Fig12_HTML.jpg)\n\
    图 12-12. 未来两周\n\n因为你已经学会了如何操作和创建已保存的交互式报告，请为 `Schedule` 数据网格创建以下替代默认报告：\n\n* \
    \  **剩余比赛**：此报告列出了赛季中剩余的所有比赛。\n*   **剩余训练**：此报告列出了赛季中剩余的所有训练。\n*   **比赛结果**：此报告列出了所有已完成的比赛及其比分。\n"
- fmt: "### Creating Page Sections\n\nIn this section, you will modify existing pages\
    \ and create new sections. You will cover some of the different types of content\
    \ that you can add to websheets.\n\nTo start, you’ll modify the home page by creating\
    \ several sections that help players get the most important information right\
    \ away. Modify the Welcome section to contain important news by following these\
    \ steps:\n\nClick the `View` tab at the top. Select the `Home` page in the drop-down\
    \ list. In the `Control Panel` at the right of the page, click `New Section`.\
    \ Choose `Text` as `Section Type` and click `Next`. Enter `Important News` for\
    \ `Title`. Enter the following in the `Content` section:\n```\nFees: Don’t forget\
    \ to pay your fees before the next game (13-Jun) or else you can’t play!\nWe won\
    \ our last game and are now 2–1. Check out the[[ results | Results ]]page.\n```\n\
    The special notation involving the square brackets creates a link to the `Results`\
    \ page that you will create later in this chapter. Click the `Create Section`\
    \ button.\n\nThe home page should now look like Figure [12-13](#A978-1-4842-0466-5_12_Chapter.html#Fig13).\n\
    \n![A978-1-4842-0466-5_12_Fig13_HTML.jpg](A978-1-4842-0466-5_12_Fig13_HTML.jpg)\n\
    \nFigure 12-13. Important news\n\nNote: Notice that the link to the `Results`\
    \ page is in red. That’s because you created an invalid link. Once the `Results`\
    \ page is created, the link will turn grey.\n\nNext, you’ll create a new section\
    \ on the home page to highlight the upcoming games and practices. This section\
    \ references one of the alternate default saved reports that you created earlier.\
    \ To create the section, follow these steps:\n\nWhile viewing the `Home` page,\
    \ click the `New Section` link at the right, located in the `Control Panel` region.\
    \ Select `Data` for `Section Type` and click `Next`. Select `Schedule` for `Data\
    \ Grid` and `Next Two Weeks (Alternative Default)` for `Report Settings to Use`.\
    \ Change `Title` to `Upcoming Games and Practices`. Select a style (use `2` for\
    \ all sections in this example), and click `Next`. On the confirmation page, click\
    \ the `Create Section` button.\n\nThe new section should look like Figure [12-14](#A978-1-4842-0466-5_12_Chapter.html#Fig14).\n\
    \n![A978-1-4842-0466-5_12_Fig14_HTML.jpg](A978-1-4842-0466-5_12_Fig14_HTML.jpg)\n\
    \nFigure 12-14. Upcoming games and practices\n\nEach week, the coach likes to\
    \ highlight a player of the week. The coach wants to include a picture along with\
    \ some text in this section. This week, Martin is the lucky recipient of the Player\
    \ of the Week award. To create the Player of the Week section, follow these steps:\n\
    \nFirst, you need to upload the player’s picture. In the `File` region at the\
    \ right, click the `Plus` link, as shown in Figure [12-15](#A978-1-4842-0466-5_12_Chapter.html#Fig15).\n\
    \n![A978-1-4842-0466-5_12_Fig15_HTML.jpg](A978-1-4842-0466-5_12_Fig15_HTML.jpg)\n\
    \nFigure 12-15. Adding a file\n\nClick the `Browse/Choose File` button and select\
    \ `martin.jpg` from the files associated with this chapter. Click the `Add File`\
    \ button. You’re brought back to the home page. Click the `New Section` link.\
    \ Select `Text` as `Section Type` and click `Next`. Enter `Player of the Week`\
    \ for `Title`. Enter the following in the `Content` text area:\n```\nMartin scored\
    \ 2 goals!\n[[image: martin.jpg ]]\n```\nClick `Create Section`.\n\nThe Player\
    \ of the Week section should now contain an image, as shown in Figure [12-16](#A978-1-4842-0466-5_12_Chapter.html#Fig16).\
    \ Each week, the coach can easily upload a new picture and modify this section.\n\
    \n![A978-1-4842-0466-5_12_Fig16_HTML.jpg](A978-1-4842-0466-5_12_Fig16_HTML.jpg)\n\
    \nFigure 12-16. Player of the Week section\n\nYou also need a page to display\
    \ the list of players and that includes a graph to show the top scorers on the\
    \ team. To create and modify the player’s page, follow these steps:\n\nClick the\
    \ `New Page` link at the right. In the `Name` field, enter `Players`. For `Page\
    \ Alias`, enter `PLAYERS`. Select `Home` for `Parent Page`. Click the `Create\
    \ Page` button. Add a new section called `Players`, which is a `Chart` section\
    \ referencing the `Players` data grid. To add the graph, click the `New Section`\
    \ link. Select `Chart` for `Section Type` and click `Next`. Select `Column` for\
    \ `Chart Type` and click `Next`. Select `Players` for `Data Grid`, select `Primary\
    \ Report (Primary Default)` for `Report Setting to Use`, and enter `Goals` for\
    \ `Section Title`. Click `Next`. Modify the chart section as shown in Figure [12-17](#A978-1-4842-0466-5_12_Chapter.html#Fig17)\
    \ and click `Next`.\n\n![A978-1-4842-0466-5_12_Fig17_HTML.jpg](A978-1-4842-0466-5_12_Fig17_HTML.jpg)\n\
    \nFigure 12-17. Chart definition\n\nOn the confirmation screen, click the `Create\
    \ Section` button.\n\nThe new chart region should look like Figure [12-18](#A978-1-4842-0466-5_12_Chapter.html#Fig18).\n\
    \n![A978-1-4842-0466-5_12_Fig18_HTML.jpg](A978-1-4842-0466-5_12_Fig18_HTML.jpg)\n\
    \nFigure 12-18. Goals chart\n\nThe last modification you need to make for the\
    \ `Players` page is to add a navigation section. This allows users to quickly\
    \ go to each section on the page rather than having to scroll down the page. To\
    \ add the navigation section, follow these steps:\n\nClick the `New Section` link.\
    \ Select `Navigation` for `Section Type` and click `Next`. Select `Section Navigation`\
    \ for `Navigation Type` and click `Next`. Enter `1` for `Sequence`. Setting the\
    \ sequence to `1` makes it the first section on the page. Click the `Create Section`\
    \ button.\n\nWhen someone views the page, they can quickly navigate to each section\
    \ via the navigation section.\n\nYou should now be comfortable creating and modifying\
    \ pages. Before you create the final section, create the following pages, which\
    \ are child pages of the home page:\n\n*   `Results`: This page displays the `Results`\
    \ saved report. The `Results` page should look like Figure [12-19](#A978-1-4842-0466-5_12_Chapter.html#Fig19).\n\
    \n    ![A978-1-4842-0466-5_12_Fig19_HTML.jpg](A978-1-4842-0466-5_12_Fig19_HTML.jpg)\n\
    \n    Figure 12-19. Results page\n\n*   `Schedule`: This page contains two sections.\
    \ The first section displays the `Remaining Games` saved report, and the other\
    \ section displays the `Remaining Practices` saved report, which you created earlier.\
    \ The `Schedule` page should look like Figure [12-20](#A978-1-4842-0466-5_12_Chapter.html#Fig20).\n\
    \n    ![A978-1-4842-0466-5_12_Fig20_HTML.jpg](A978-1-4842-0466-5_12_Fig20_HTML.jpg)\n\
    \n    Figure 12-20. Schedule page\n\nThe next section you will create provides\
    \ a list of all the pages, along with links to them. To create this navigation\
    \ section, follow these steps:\n\nGo to the `Home` page. Click the `New Section`\
    \ link. Select `Navigation` for `Section Type` and click `Next`. Select `Page\
    \ Navigation` for `Navigation Type` and click `Next`. If you want to, modify `Title`\
    \ and set `Sequence` to `1`, and then click the `Create Section` button.\n\nThe\
    \ new section should look like Figure [12-21](#A978-1-4842-0466-5_12_Chapter.html#Fig21).\n\
    \n![A978-1-4842-0466-5_12_Fig21_HTML.jpg](A978-1-4842-0466-5_12_Fig21_HTML.jpg)\n\
    \nFigure 12-21. Page navigation"
  raw: '### Creating Page Sections


    In this section, you will modify existing pages and create new sections. You will
    cover some of the different types of content that you can add to websheets.


    To start, you’ll modify the home page by creating several sections that help players
    get the most important information right away. Modify the Welcome section to contain
    important news by following these steps:


    Click the View tab at the top.   Select the Home page in the drop-down list.  
    In the Control Panel at the right of the page, click New Section.   Choose Text
    as Section Type and click Next.   Enter `Important News` for Title.   Enter the
    following in the Content section: `Fees: Don’t forget to pay your fees before
    the next game (13-Jun) or else you can’t play!` `We won our last game and are
    now 2`–`1\. Check out the[[ results | Results ]]page.` The special notation involving
    the square brackets creates a link to the Results page that you will create later
    in this chapter.   Click the Create Section button.


    The home page should now look like Figure [12-13](#A978-1-4842-0466-5_12_Chapter.html#Fig13).


    ![A978-1-4842-0466-5_12_Fig13_HTML.jpg](A978-1-4842-0466-5_12_Fig13_HTML.jpg)


    Figure 12-13.


    Important news Note


    Notice that the link to the Results page is in red. That’s because you created
    an invalid link. Once the Results page is created, the link will turn grey.


    Next, you’ll create a new section on the home page to highlight the upcoming games
    and practices. This section references one of the alternate default saved reports
    that you created earlier. To create the section, follow these steps:


    While viewing the Home page, click the New Section link at the right, located
    in the Control Panel region.   Select Data for Section Type and click Next.  
    Select Schedule for Data Grid and Next Two Weeks (Alternative Default) for Report
    Settings to Use. Change Title to `Upcoming Games and Practices`.   Select a style
    (use 2 for all sections in this example), and click Next.   On the confirmation
    page, click the Create Section button.


    The new section should look like Figure [12-14](#A978-1-4842-0466-5_12_Chapter.html#Fig14).


    ![A978-1-4842-0466-5_12_Fig14_HTML.jpg](A978-1-4842-0466-5_12_Fig14_HTML.jpg)


    Figure 12-14.


    Upcoming games and practices


    Each week, the coach likes to highlight a player of the week. The coach wants
    to include a picture along with some text in this section. This week, Martin is
    the lucky recipient of the Player of the Week award. To create the Player of the
    Week section, follow these steps:


    First, you need to upload the player’s picture. In the File region at the right,
    click the Plus link, as shown in Figure [12-15](#A978-1-4842-0466-5_12_Chapter.html#Fig15).


    ![A978-1-4842-0466-5_12_Fig15_HTML.jpg](A978-1-4842-0466-5_12_Fig15_HTML.jpg)


    Figure 12-15.


    Adding a file   Click the Browse/Choose File button and select `martin.jpg` from
    the files associated with this chapter. Click the Add File button. You’re brought
    back to the home page.   Click the New Section link.   Select Text as Section
    Type and click Next.   Enter `Player of the Week` for Title.   Enter the following
    in the Content text area: `Martin scored 2 goals!` `[[image: martin.jpg ]]`  
    Click Create Section.


    The Player of the Week section should now contain an image, as shown in Figure
    [12-16](#A978-1-4842-0466-5_12_Chapter.html#Fig16). Each week, the coach can easily
    upload a new picture and modify this section.


    ![A978-1-4842-0466-5_12_Fig16_HTML.jpg](A978-1-4842-0466-5_12_Fig16_HTML.jpg)


    Figure 12-16.


    Player of the Week section


    You also need a page to display the list of players and that includes a graph
    to show the top scorers on the team. To create and modify the player’s page, follow
    these steps:


    Click the New Page link at the right.   In the Name field, enter `Players`. For
    Page Alias, enter `PLAYERS`. Select Home for Parent Page. Click the Create Page
    button.   Add a new section called Players, which is a Chart section referencing
    the Players data grid.   To add the graph, click the New Section link.   Select
    Chart for Section Type and click Next.   Select Column for Chart Type and click
    Next.   Select Players for Data Grid, select Primary Report (Primary Default)
    for Report Setting to Use, and enter `Goals` for Section Title. Click Next.  
    Modify the chart section as shown in Figure [12-17](#A978-1-4842-0466-5_12_Chapter.html#Fig17)
    and click Next.


    ![A978-1-4842-0466-5_12_Fig17_HTML.jpg](A978-1-4842-0466-5_12_Fig17_HTML.jpg)


    Figure 12-17.


    Chart definition   On the confirmation screen, click the Create Section button.


    The new chart region should look like Figure [12-18](#A978-1-4842-0466-5_12_Chapter.html#Fig18).


    ![A978-1-4842-0466-5_12_Fig18_HTML.jpg](A978-1-4842-0466-5_12_Fig18_HTML.jpg)


    Figure 12-18.


    Goals chart


    The last modification you need to make for the Players page is to add a navigation
    section. This allows users to quickly go to each section on the page rather than
    having to scroll down the page. To add the navigation section, follow these steps:


    Click the New Section link.   Select Navigation for Section Type and click Next.
      Select Section Navigation for Navigation Type and click Next.   Enter `1` for
    Sequence. Setting the sequence to 1 makes it the first section on the page. Click
    the Create Section button.


    When someone views the page, they can quickly navigate to each section via the
    navigation section.


    You should now be comfortable creating and modifying pages. Before you create
    the final section, create the following pages, which are child pages of the home
    page:


    *   Results: This page displays the Results saved report. The Results page should
    look like Figure [12-19](#A978-1-4842-0466-5_12_Chapter.html#Fig19).


    ![A978-1-4842-0466-5_12_Fig19_HTML.jpg](A978-1-4842-0466-5_12_Fig19_HTML.jpg)


    Figure 12-19.


    Results page

    *   Schedule: This page contains two sections. The first section displays the
    Remaining Games saved report, and the other section displays the Remaining Practices
    saved report, which you created earlier. The Schedule page should look like Figure
    [12-20](#A978-1-4842-0466-5_12_Chapter.html#Fig20).


    ![A978-1-4842-0466-5_12_Fig20_HTML.jpg](A978-1-4842-0466-5_12_Fig20_HTML.jpg)


    Figure 12-20.


    Schedule page


    The next section you will create provides a list of all the pages, along with
    links to them. To create this navigation section, follow these steps:


    Go to the Home page.   Click the New Section link.   Select Navigation for Section
    Type and click Next.   Select Page Navigation for Navigation Type and click Next.
      If you want to, modify Title and set Sequence to `1`, and then click the Create
    Section button.


    The new section should look like Figure [12-21](#A978-1-4842-0466-5_12_Chapter.html#Fig21).


    ![A978-1-4842-0466-5_12_Fig21_HTML.jpg](A978-1-4842-0466-5_12_Fig21_HTML.jpg)


    Figure 12-21.


    Page navigation'
  trans: "\n### 创建页面章节\n\n在本节中，你将修改现有页面并创建新的章节。你将了解可以添加到网页中的几种不同类型的内容。\n\n首先，你将通过创建几个章节来修改主页，以帮助玩家立即获取最重要的信息。请按照以下步骤修改“欢迎”章节，以包含重要新闻：\n\
    \n点击顶部的 `查看` 选项卡。在下拉列表中选择 `主页`。在页面右侧的 `控制面板` 中，点击 `新建章节`。选择 `文本` 作为 `章节类型`，然后点击\
    \ `下一步`。在 `标题` 中输入 `重要新闻`。在 `内容` 部分输入以下内容：\n```\n费用：请不要忘记在下一场比赛（6 月 13 日）之前支付费用，否则您将无法参赛！\n\
    我们赢了上一场比赛，现在战绩是 2 胜 1 负。请查看[[ 结果 | 结果 ]]页面。\n```\n这个涉及方括号的特殊符号会创建一个指向 `结果` 页面的链接，你将在本章后面创建该页面。点击\
    \ `创建章节` 按钮。\n\n现在，主页应该如图 12-13 所示。\n\n![A978-1-4842-0466-5_12_Fig13_HTML.jpg](img/A978-1-4842-0466-5_12_Fig13_HTML.jpg)\n\
    \n图 12-13. 重要新闻\n\n> 注意：请注意，指向 `结果` 页面的链接显示为红色。这是因为你创建了一个无效链接。一旦创建了 `结果` 页面，该链接将变为灰色。\n\
    \n接下来，你将在主页上创建一个新章节，以突出显示即将到来的比赛和训练。此章节引用了你之前创建的其中一个备用默认保存报告。请按照以下步骤创建该章节：\n\n\
    在查看 `主页` 时，点击右侧 `控制面板` 区域中的 `新建章节` 链接。选择 `数据` 作为 `章节类型`，然后点击 `下一步`。选择 `日程` 作为\
    \ `数据网格`，并选择 `接下来两周（备用默认）` 作为 `要使用的报告设置`。将 `标题` 改为 `即将到来的比赛和训练`。选择一个样式（本例中所有章节均使用\
    \ `2`），然后点击 `下一步`。在确认页面上，点击 `创建章节` 按钮。\n\n新章节应该如图 12-14 所示。\n\n![A978-1-4842-0466-5_12_Fig14_HTML.jpg](img/A978-1-4842-0466-5_12_Fig14_HTML.jpg)\n\
    \n图 12-14. 即将到来的比赛和训练\n\n每周，教练都喜欢突出显示一名本周最佳球员。教练希望在这个章节中包含图片和一些文字。本周，Martin 是“本周最佳球员”奖的幸运获得者。请按照以下步骤创建“本周最佳球员”章节：\n\
    \n首先，你需要上传球员的图片。在右侧的 `文件` 区域，点击 `加号` 链接，如图 12-15 所示。\n\n![A978-1-4842-0466-5_12_Fig15_HTML.jpg](img/A978-1-4842-0466-5_12_Fig15_HTML.jpg)\n\
    \n图 12-15. 添加文件\n\n点击 `浏览/选择文件` 按钮，并从本章关联的文件中选择 `martin.jpg`。点击 `添加文件` 按钮。你将被带回主页。点击\
    \ `新建章节` 链接。选择 `文本` 作为 `章节类型`，然后点击 `下一步`。在 `标题` 中输入 `本周最佳球员`。在 `内容` 文本区域输入以下内容：\n\
    ```\nMartin 打进了 2 个球！\n[[image: martin.jpg ]]\n```\n点击 `创建章节`。\n\n“本周最佳球员”章节现在应该包含一张图片，如图\
    \ 12-16 所示。每周，教练都可以轻松上传新图片并修改此章节。\n\n![A978-1-4842-0466-5_12_Fig16_HTML.jpg](img/A978-1-4842-0466-5_12_Fig16_HTML.jpg)\n\
    \n图 12-16. 本周最佳球员章节\n\n你还需要一个页面来显示球员列表，并包含一个图表以显示队内得分最高的球员。请按照以下步骤创建和修改球员页面：\n\
    \n点击右侧的 `新建页面` 链接。在 `名称` 字段中，输入 `球员`。对于 `页面别名`，输入 `PLAYERS`。选择 `主页` 作为 `父页面`。点击\
    \ `创建页面` 按钮。添加一个名为 `球员` 的新章节，这是一个 `图表` 章节，引用 `球员` 数据网格。要添加图表，点击 `新建章节` 链接。选择 `图表`\
    \ 作为 `章节类型`，然后点击 `下一步`。选择 `柱形图` 作为 `图表类型`，然后点击 `下一步`。选择 `球员` 作为 `数据网格`，选择 `主要报告（主要默认）`\
    \ 作为 `要使用的报告设置`，并在 `章节标题` 中输入 `进球数`。点击 `下一步`。如图 12-17 所示修改图表章节，然后点击 `下一步`。\n\n\
    ![A978-1-4842-0466-5_12_Fig17_HTML.jpg](img/A978-1-4842-0466-5_12_Fig17_HTML.jpg)\n\
    \n图 12-17. 图表定义\n\n在确认屏幕上，点击 `创建章节` 按钮。\n\n新的图表区域应该如图 12-18 所示。\n\n![A978-1-4842-0466-5_12_Fig18_HTML.jpg](img/A978-1-4842-0466-5_12_Fig18_HTML.jpg)\n\
    \n图 12-18. 进球数图表\n\n你需要对 `球员` 页面进行的最后一项修改是添加一个导航章节。这允许用户快速跳转到页面上的每个章节，而不必滚动整个页面。请按照以下步骤添加导航章节：\n\
    \n点击 `新建章节` 链接。选择 `导航` 作为 `章节类型`，然后点击 `下一步`。选择 `章节导航` 作为 `导航类型`，然后点击 `下一步`。在 `顺序`\
    \ 中输入 `1`。将顺序设置为 `1` 使其成为页面上的第一个章节。点击 `创建章节` 按钮。\n\n当有人查看该页面时，他们可以通过导航章节快速导航到每个章节。\n\
    \n现在你应该能够熟练地创建和修改页面了。在创建最后一个章节之前，请创建以下页面，它们是主页的子页面：\n\n*   `结果`：此页面显示 `结果` 保存报告。`结果`\
    \ 页面应如图 12-19 所示。\n\n    ![A978-1-4842-0466-5_12_Fig19_HTML.jpg](img/A978-1-4842-0466-5_12_Fig19_HTML.jpg)\n\
    \n    图 12-19. 结果页面\n\n*   `日程`：此页面包含两个章节。第一个章节显示 `剩余比赛` 保存报告，另一个章节显示你之前创建的 `剩余训练`\
    \ 保存报告。`日程` 页面应如图 12-20 所示。\n\n    ![A978-1-4842-0466-5_12_Fig20_HTML.jpg](img/A978-1-4842-0466-5_12_Fig20_HTML.jpg)\n\
    \n    图 12-20. 日程页面\n\n你将创建的下一个章节提供所有页面的列表及其链接。请按照以下步骤创建此导航章节：\n\n转到 `主页`。点击 `新建章节`\
    \ 链接。选择 `导航` 作为 `章节类型`，然后点击 `下一步`。选择 `页面导航` 作为 `导航类型`，然后点击 `下一步`。如果需要，可以修改 `标题`\
    \ 并将 `顺序` 设置为 `1`，然后点击 `创建章节` 按钮。\n\n新章节应该如图 12-21 所示。\n\n![A978-1-4842-0466-5_12_Fig21_HTML.jpg](img/A978-1-4842-0466-5_12_Fig21_HTML.jpg)\n\
    \n图 12-21. 页面导航\n"
- fmt: '# SQL Tags


    Websheets allow administrators and contributors to query tables and views in the
    schema. They can create reports that are similar to data grids, except they’re
    read-only. They can also include query results called SQL tags directly within
    sections.


    On the Players page, let’s add a section to display the number of registered users
    who have access to the application, and include a SQL tag in the section. To create
    the section, follow these steps:


    Go to the Players page.

    Click the `New Section` link.

    Select `Text` for `Section Type` and click `Next`.

    Set `Sequence` to `5` and `Title` to `Active Registered Users`.

    Enter the following text in the `Content` section and click the `Create Section`
    button:

    `We currently have[[sqlvalue: select count(*) from tusers where active_flag =
    ''Y'' ]]active registered users. They are: [[sql: select initcap(user_name) "Name"
    from tusers order by user_name ]]`


    The new section should look like Figure [12-22](#A978-1-4842-0466-5_12_Chapter.html#Fig22).
    Notice the `select count` query in the first line of the preceding code. That
    query generates the value 3 that is shown as the number of active users in the
    figure. Similarly, the second `select` statement in the preceding code generates
    the list of player names.


    ![A978-1-4842-0466-5_12_Fig22_HTML.jpg](A978-1-4842-0466-5_12_Fig22_HTML.jpg)


    **Figure 12-22.** Section with SQL tags


    When using SQL tags, you need to explicitly define whether the query will return
    a single value or multiple rows and columns. A SQL tag defined as `sqlvalue:`
    means a single value will be returned and be embedded within a sentence such that
    the single value appears as a word in the sentence. Using `sql:` means multiple
    rows and columns will be returned. When a query returns multiple rows, its results
    are displayed in the spreadsheet-like format you see in Figure [12-22](#A978-1-4842-0466-5_12_Chapter.html#Fig22).


    The search box in Figure [12-22](#A978-1-4842-0466-5_12_Chapter.html#Fig22) is
    a result of the second query returning multiple rows. Whenever a query’s results
    are displayed as a spreadsheet-like grid, that grid is preceded by a search box
    that you can use to quickly find specific result rows.


    ## Access Controls


    The last thing you need to do for the application is to give the other players
    on the team access to it. You already gave access to Martin when you created the
    application. You need to give the other players, Chris and Cameron, access to
    view the application. To do so, follow these steps:


    Click the `Administration` tab at the top of the screen.

    Click the `Access Control` option in the drop-down menu.

    Click the `Create Entry` button.

    Enter `Chris` for `Username` and select `Reader` for `Privilege`. Click the `Create
    and Create Another` button.

    Enter `Cameron` for `Username` and select `Reader` for `Privilege`. Click `Create`.


    Now Chris and Cameron can log in to the application. They can’t modify any of
    the sections or data grids, however. If you need to give someone access to modify
    the application, you can grant them the `Contributor` role in the Access Control
    section.


    ## Summary


    The last two chapters introduced websheets and what they can do. From here, you
    can go on to make complex websheet applications without having to know much about
    databases or SQL. Now that you have a base knowledge of websheets, installing
    and analyzing the websheet sample application would be a good next step to understanding
    the capabilities of a websheet.


    # 13. Extended Developer Tools


    While developing the sample application in the previous chapters, you saw many
    features of the APEX development tool. This chapter will highlight advanced development
    features in APEX that weren’t covered in the previous chapters. These features
    or tools may help when you’re developing large applications in a corporate environment.


    > **Note**

    > This chapter assumes that you’re comfortable with APEX and understand the fundamentals.
    If you’re still not comfortable developing an APEX application, we strongly recommend
    that you revisit the examples from [Chapters 5](#A978-1-4842-0466-5_5_Chapter.html)
    through [9](#A978-1-4842-0466-5_9_Chapter.html) in order to become more at ease
    with APEX and its development environment.


    ## Page Locks


    When developing in larger teams, development conflicts can occur. A development
    conflict is when two developers are working on the same object at the same time
    and overwrite each other’s changes.


    > **Note**

    > For the remainder of this chapter, references to APEX objects imply page items,
    regions, lists, pages, and so on.


    Conventional web development tools, such as ASP, PHP, and JSP, contain multiple
    files that each represent a page or a set of functions in the web application.
    When developing with these tools, it’s common practice to use a source-control
    tool, such as Subversion, to manage all the changes. Source-control tools can
    easily manage development conflicts between multiple developers, because the conflicts
    are isolated to a single file.


    APEX is different than the scripting languages just mentioned because developers
    don’t work with files. All the information is stored in tables in the database.
    When you create an export of an application, you get a single SQL file that loads
    the metadata for the application into these tables. Because APEX stores its content
    in the database, you can’t use traditional source-control tools to manage conflicts
    when developing in teams with multiple developers.


    ### APEX Conflicts


    To demonstrate a development conflict in APEX, imagine that you have two developers,
    Mina and Natalie, working on the same page in an application. If they’re both
    adding and modifying page components at the same time, the page may not behave
    as expected for either of them.


    APEX prevents developers from modifying the same object at the same time by performing
    optimistic locking. Table [13-1](#A978-1-4842-0466-5_13_Chapter.html#Tab1) shows
    the sequence of events that occurs as the two developers edit the same object.
    You can see at the end how APEX prevents Natalie from overwriting the changes
    made by Mina.


    **Table 13-1.** Optimistic Locking Scenario


    | Step | Mina | Natalie |

    | --- | --- | --- |

    | 1 | Edit `P1_EMPNO` | -- |

    | 2 | -- | Edit `P1_EMPNO` |

    | 3 | Edit help text to: “Mina’s Help” | -- |

    | 4 | -- | Edit help text to: “Natalie’s Help” |

    | 5 | Apply changes | -- |

    | 6 | -- | Apply changes |

    | 7 | -- | Receive error message: `Current version of data in database has changed
    since user initiated update process. Current row version identifier = "A08A505E601932E33BC1074BEA1A3B4C"
    application row version identifier = "AECE767E4BDDC737A7823083A31D564F"`. `Contact
    your application administrator.` |


    Optimistic locking only works when developers modify the same object. The problem
    occurs when multiple developers are modifying different objects on the same page
    at the same time. Modifying one object may affect the process of the entire page,
    which other developers may not be aware of. Pessimistic locking helps prevent
    trouble in that scenario. The next section will discuss how to do pessimistic
    locking.'
