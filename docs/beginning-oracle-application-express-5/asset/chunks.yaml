    除了 APEX 实例管理员外，在默认安装中，APEX 用户是特定于且唯一于某个工作区的，这意味着您可以在单个 APEX 实例的多个工作区中拥有同名用户，但这些用户中的每一个都是唯一的。他们可以有自己的密码和设置，并且彼此之间没有任何关联。


    APEX 5.0 引入了使用外部存储库（如单点登录或 LDAP）作为来源来分配和验证 APEX 用户的能力，这意味着单个用户可以访问多个工作区。但是，此功能默认未设置，需要实例管理员进行配置。


    在开发时，您应该养成以开发人员身份登录的习惯，而不是以工作区管理员身份登录。系统提供了多种保护措施来防止开发人员在工作区中相互干扰。如果您以工作区管理员身份登录，这些保护措施将被绕过，您可能会意外干扰他人正在处理的内容。虽然这在只有单个开发人员的工作区中不是问题，但养成这种习惯仍然是好的。


    **注意**


    本书使用最后三种类型的用户。它假设 APEX 已安装，工作区已创建，并且您已获得工作区管理员的登录凭据。如果您使用的是 `apex.oracle.com`
    上的托管实例，那么您在注册时获得的用户名就具有工作区管理员的凭据。但是，如果您使用的是本地实例，请参考 APEX 文档或让您的实例管理员帮助您设置工作区。


    ### 应用程序、页面、区域和项目


    尽管工作区基本上从空开始，但您可以拥有多个驻留在工作区中的应用程序。没有特定的规则，但工作区中的所有应用程序很可能有一些共同点：它们可能都使用相同的底层数据库对象，针对相同的用户社区，或使用相同的用户认证方法。


    在构建应用程序时，您会添加新页面，并使用区域和项目构建这些页面。图 2-2 显示了不同类型对象之间的层次结构。


    ![A978-1-4842-0466-5_2_Fig2_HTML.gif](img/A978-1-4842-0466-5_2_Fig2_HTML.gif)


    图 2-2. 通用应用程序层次结构


    应用程序基本上是执行与业务功能相关的一个任务（或一组任务）的页面组。在本书的过程中，您将在单个工作区中构建一个应用程序，但重要的是要知道，在典型的开发环境中，您可能会在多个工作区中处理许多应用程序。


    页面是应用程序的基本构建块，包含用户界面（UI）组件和处理用户输入的程序逻辑。我们稍后将介绍 UI 渲染与用户输入处理的区别，但现在可以将页面大致等同于桌面
    UI 术语中的屏幕。


    区域是充当内容容器的 UI 项。一个页面上可以有任意数量的区域，并且区域可以嵌套在其他区域中。这为您提供了创建诸如仪表板之类的东西的机会，您可能会将一个数据报告区域和一个图表区域嵌套在单个父级`HTML`区域中。


    项目是用于向用户呈现 UI 的 HTML 表单元素。这些包括诸如按钮、选择列表、文本字段、复选框、单选按钮组等。项目分为两类：页面级项目和应用程序级项目的区别在于，后者是在应用程序级别定义的，并不直接呈现在页面上。您可以将它们视为全局变量。页面级项目是在特定页面上定义的，并分配给某个区域以控制它们在用户界面上的显示位置和方式。


    应用程序显然远不止这些简单的构建块，但如果您理解它们之间的基本层次关系，那么在构建您的第一个页面时将有一个良好的开端，并在执行更复杂的任务时打下坚实的基础。'
- fmt: '## 工作区、应用与模式


    虽然工作区与应用之间的关系很直接，但当你引入数据库模式（schema）的关系时，情况就变得稍微复杂一些。图 2-3 展示了这种关系。


    ![A978-1-4842-0466-5_2_Fig3_HTML.gif](A978-1-4842-0466-5_2_Fig3_HTML.gif)


    图 2-3. 模式如何与工作区及应用关联


    当创建一个工作区时，它至少与一个（也可能多个）底层数据库模式相关联。这使得应用能够访问数据库对象，如表、视图、存储的 PL/SQL 程序单元等。


    当创建一个应用时，它会被分配一个来自该工作区关联模式列表中的单一“解析模式（parse as schema）”。所谓“解析模式”，是指该应用执行的所有 SQL
    查询和 PL/SQL 调用都在该 Oracle 数据库用户下运行。因此，如果你的应用定义的“解析模式”是 `DOUG`，那么像这样的查询：


    ```sql

    select * from emp

    ```


    在数据库中的执行效果等同于：


    ```sql

    select * from DOUG.emp

    ```


    因为 APEX 应用是可移植的，并且不一定在与开发时相同的模式中运行，所以将模式名硬编码到你的 SQL 或 PL/SQL 中不是好的实践。相反，APEX 提供了一个替换变量（本书后续会介绍多个此类变量）来代表“解析模式”。`#OWNER#`
    替换变量会在运行时被替换为应用实际的“解析模式”。因此，语句：


    ```sql

    select * from #OWNER#.emp

    ```


    会解析为：


    ```sql

    select * from DOUG.emp

    ```


    在最常见的实现中，一个工作区被创建并关联到一个单一的底层数据库模式。在该工作区中开发的应用，其“解析模式”被设置为该工作区唯一关联的模式，并使用属于该模式的数据库对象。


    如果一个工作区被分配了多个模式，情况就会变得有些复杂。你可能会想当然地认为，如果你将三个模式关联到一个工作区，该工作区中的任何应用都能自动访问这三个模式中的数据。然而，这种想法是错误的。


    因为一个应用只被分配一个（且仅有一个）“解析模式”，所有的 SQL 语句和 PL/SQL 调用都作为该模式执行。尽管工作区可能与多个模式相关联，但应用本身并非如此。如果你想访问应用“解析模式”之外的模式中的数据，你必须确保在数据库级别授予了正确的权限，就像使用任何其他
    Oracle 工具或开发环境时一样。


    看一下图 2-4 所示的例子，其中你希望在 SQL 语句中连接的两个表分别属于不同的模式。


    ![A978-1-4842-0466-5_2_Fig4_HTML.gif](A978-1-4842-0466-5_2_Fig4_HTML.gif)


    图 2-4. 跨模式连接表


    如果你的“解析模式”是 `DOUG`，那么你必须被明确授予对 `JOEY` 模式中对象的访问权限。为此，你需要以 `JOEY`（或 DBA）身份登录数据库，并将对
    `JOEY.DEPT` 的适当数据库权限授予 `DOUG`。


    在此例中，如果你需要在 `select` 语句中连接这两个表，授予 `DOUG` 对 `JOEY.DEPT` 的 `SELECT` 权限就足够了。然后，你可以这样编写你的
    `select` 语句：


    ```sql

    select e.empno,

    e.ename,

    d.dept_name,

    d.location

    from #OWNER#.emp e,

    JOEY.dept d

    where e.deptno = d.deptno

    ```


    `#OWNER#` 替换变量将被解析为你的“解析模式”（`DOUG`），只要正确的权限已到位，这个连接就能正确工作。


    **注意**


    因为允许从 `JOEY` 模式进行 `select` 的权限是在数据库级别设置的，所以没有必要将 `JOEY` 模式关联到你的工作区。你只需要在一种情况下需要将模式关联到工作区：要么你将它用作该工作区中应用的“解析模式”，要么你需要从
    SQL 工作坊直接访问该模式的对象。


    ### 关于工作区的最后一点


    如你所知，一个 APEX 实例可以有多个工作区。但应该有多少个工作区呢？答案并不简单。


    除非你是一个应用非常少的小型组织，否则你可能不应该只有一个工作区。另一方面，你也不应该为你编码的每一个新应用都创建一个新的工作区。


    对此有几种不同的看法，但我倾向于从应用套件的角度来思考。如果一些应用针对相同的数据集执行类似的任务，并且面向相同的目标用户群，那么将它们放在同一个工作区中可能会更好。


    关键在于运用你的判断力，努力使开发和维护变得简单。没有什么比登录一个工作区后，发现你不得不翻阅数十甚至数百个应用才能找到你要处理的那个更糟糕的了。


    ## APEX 模块概览


    现在你已经了解了逻辑架构的基本情况，是时候更近距离地看看 APEX 开发环境了。本节将向你介绍 APEX 环境的不同部分，并概述其布局。


    图 2-5 展示了 APEX 菜单结构的层次布局。稍后，你将看到每个主要部分并了解其内部机制；这只是一个介绍性的概览。在我们逐步学习开发流程的过程中，你会更深入地了解它。


    ![A978-1-4842-0466-5_2_Fig5_HTML.gif](A978-1-4842-0466-5_2_Fig5_HTML.gif)


    图 2-5. APEX 5.0 层次化菜单结构


    如你所见，开发环境分为五个主要部分：


    *   **Application Builder（应用构建器）** 是你创建和修改应用及页面的地方，很可能也是你花费大部分时间的地方。

    *   **SQL Workshop（SQL 工作坊）** 是你直接处理底层数据库对象及其相关数据的地方。可以把它看作是一个基于网页的 SQL*PLUS，并加入了一些图形用户界面功能以使事情更容易。

    *   **Team Development（团队开发）** 这个部分让你可以输入和跟踪与 APEX 应用开发相关的信息。

    *   **Packaged Apps（打包应用）** 提供了一种安装和管理 Oracle APEX 自带的大量应用程序的方法。其中许多应用程序可以开箱即用，以解决实际的业务问题。其他的则仅仅是示例应用程序，用于帮助展示
    APEX 的功能。

    *   **Administration（管理）** 是你可以管理工作区细节的地方——其默认设置、用户、组等等。请注意，工作区管理员比普通开发者拥有更多可用的选项。'
  raw: '### Workspaces, Applications, and Schemas


    Although the relationship between workspaces and applications is straightforward,
    it becomes a bit more complex when you introduce the relationship with database
    schemas. Figure [2-3](#A978-1-4842-0466-5_2_Chapter.html#Fig3) diagrams this relationship.


    ![A978-1-4842-0466-5_2_Fig3_HTML.gif](A978-1-4842-0466-5_2_Fig3_HTML.gif)


    Figure 2-3.


    How schemas relate to workspaces and applications


    When a workspace is created, it’s linked with at least one, and possibly many,
    underlying database schemas. This provides access to database objects such as
    tables, views, stored PL/SQL program units, and so on.


    When an application is created, it’s assigned a single “parse as” schema from
    the list of schemas associated with the workspace. A “parse as” schema is the
    Oracle database user in which all SQL queries and PL/SQL calls run by that application
    are executed. So, if your application was defined with a “parse as” schema of
    `DOUG`, a query such as


    `select * from emp`


    would execute in the database as if it were written


    `select * from DOUG.emp`


    Because APEX applications are portable and may not necessarily be run in the same
    schema they were developed in, it’s not good practice to hard code the schema
    names into your SQL or PL/SQL. Instead, APEX provides a replacement variable (one
    of many you’ll be introduced to throughout the course of this book) for the “parse
    as” schema. The `#OWNER#` replacement variable is substituted for the actual “parse
    as” schema for the application at runtime. So the statement


    `select * from #OWNER#.emp`


    resolves to


    `select * from DOUG.emp`


    In the most common implementations, a workspace is created and associated with
    a single underlying database schema. The applications developed in that workspace
    have their “parse as” schema set to the only schema associated with the workspace
    and use the database objects belonging to that schema.


    Where a workspace has more than one schema assigned to it, things can become a
    little more complex. You might be tempted to think that if you associate three
    schemas with a workspace, any application in that workspace can automatically
    access the data in all three schemas. However, you would be mistaken.


    Because an application is assigned one—and only one—“parse as” schema, all SQL
    statements and PL/SQL calls are executed as that schema. Although the workspace
    may be associated with multiple schemas, the application itself isn’t. If you
    want to access data in a schema other than the application’s “parse as” schema,
    you must make sure the correct database-level grants are in place, just as you
    would when using any other Oracle tool or development environment.


    Take a look at the example shown in Figure [2-4](#A978-1-4842-0466-5_2_Chapter.html#Fig4),
    where two tables you wish to join as part of a SQL statement are owned by separate
    schemas.


    ![A978-1-4842-0466-5_2_Fig4_HTML.gif](A978-1-4842-0466-5_2_Fig4_HTML.gif)


    Figure 2-4.


    Tables joined across schemas


    If your “parse as” schema is `DOUG`, then you must be specifically granted privileges
    on the objects in the `JOEY` schema to be able to access it. To do this, you sign
    on to the database as `JOEY` (or as a DBA) and grant the appropriate database
    privileges on `JOEY.DEPT` to `DOUG`.


    In this example, if you needed to join the two tables together in a `select` statement,
    granting the `SELECT` privilege on `JOEY.DEPT` to `DOUG` would suffice. Then,
    you could write your `select` statement as follows:


    `select e.empno,`


    `e.ename,`


    `d.dept_name,`


    `d.location`


    `from #OWNER#.emp e,`


    `JOEY.dept d`


    `where e.deptno = d.deptno`


    The `#OWNER#` substitution variable would be resolved to your “parse as” schema
    (`DOUG`), and the join would work correctly as long as the correct privileges
    were in place.


    Note


    Because the grants that allow the `select` from the `JOEY` schema are put in place
    at the database level, it isn’t necessary to associate the `JOEY` schema to your
    workspace. You only need to associate a schema to a workspace if you’ll be using
    it as the “parse as” schema for an application in that workspace or need to access
    the schema objects directly from within the SQL Workshop.


    ### A Final Word on Workspaces


    As you have learned, an APEX instance can have many workspaces. But how many workspaces
    should there be? The answer isn’t straightforward.


    Unless you’re in a very small organization with very few apps, you probably shouldn’t
    have only one workspace. On the other hand, you probably shouldn’t create a new
    workspace for every new application you code, either.


    There are a couple schools of thoughts on this, but I tend to think in terms of
    application suites. If a number of applications are performing similar tasks against
    the same underlying data sets and are aimed at the same target set of users, then
    they would probably do well in the same workspace.


    The key is to use your judgment and try to keep things easy to develop and maintain.
    There is nothing worse than logging in to a workspace to find you have to page
    through tens or even hundreds of apps to find the one you want to work on.


    ## A Tour of the APEX Modules


    Now that you have a little background on how things are logically architected,
    it’s time to get a closer look at the APEX development environment. This section
    will introduce you to the different sections of the APEX environment and give
    you an overview of how things are laid out.


    Figure [2-5](#A978-1-4842-0466-5_2_Chapter.html#Fig5) shows a hierarchical layout
    of the APEX menu structure. Later, you will look at each of the main sections
    and glimpse what’s under the covers; this is just an introductory tour. You will
    get a much deeper look as we work our way through the development processes.


    ![A978-1-4842-0466-5_2_Fig5_HTML.gif](A978-1-4842-0466-5_2_Fig5_HTML.gif)


    Figure 2-5.


    APEX 5.0 hierarchical menu structure


    As you can see, the development environment is broken into five main sections:


    *   The Application Builder is where you create and modify applications and pages,
    and it’s where you’ll probably spend most of your time.

    *   The SQL Workshop is where you deal directly with the underlying database objects
    and their related data. Think of it as a web-based version of SQL*PLUS with some
    GUI goodness thrown in to make things easier.

    *   Team Development is the section that lets you enter and track information
    related to the development of APEX applications.

    *   Packaged Apps provides a way to install and manage the myriad of applications
    that come with Oracle APEX. Many of these applications can be used out of the
    box to solve real business problems. Others are merely sample applications to
    help demonstrate the capabilities of APEX.

    *   Administration is where you can manage the details of your workspace—its defaults,
    users, groups, and so on. Be aware that a Workspace Administrator has more options
    available to them than a standard developer has.'
