  trans: '

    ### 修改基于存储过程的表单


    再次说明，向导已经完成了大部分工作，但在您的基于存储过程的表单完成之前，您还需要进行一些小的修改。您希望`发件人`和`邮件正文`这两个值都是必填的，因此需要更改它们的标签模板，并将其`值必需`属性设置为`是`。这次我们将使用
    APEX 5.0 中的一个新功能，它允许我们同时编辑多个组件的属性。请执行以下操作：


    编辑应用程序的第 3 页。

    通过单击其名称选择`P3_FROM`。

    按住 CTRL 键（在 Mac 上是 Command 键），通过单击其名称选择`P3_BODY`。此时，两个元素都应被选中。现在，如果您查看属性编辑器，您会看到有几个选项具有蓝色背景，并且标签左侧有一个灰色的三角符号（Δ）。这表示您选择的组件对于这些选项具有不同的值。这只是一个视觉提示，让您知道这些字段实际上可能并非空白，只是
    APEX 无法显示组件之间的不同值。我们将继续更改通用属性，如下所示：


    在`外观`属性组中，将`模板`更改为`必填`。

    在`验证`属性组中，将`值必需`更改为`是`。


    我们现在只想更改`P3_BODY`的几个属性。因此，我们必须取消选择所有其他内容，以免意外地也更改它们的属性。请记住，只要您没有单击`保存`按钮，您始终可以使用`撤销`按钮逐步撤回您的操作。要选择`P3_BODY`并取消选择所有其他内容：


    在树形窗格的“呈现”选项卡中，单击`P3_BODY`。

    在`外观`属性组中，将`宽度`设置为`80`，`高度`设置为`5`。


    接下来，将第 3 页设置为公共页面。您希望任何用户——无论是已认证还是未认证——都能通过“联系我们”页面向您发送消息：


    将第 3 页设置为公共页面。有关详细步骤，请回顾第 5 章。


    最后，修改已创建的流程以包含成功消息：


    切换到树形窗格的“处理”选项卡。

    通过单击其名称编辑流程`运行存储过程`。

    在`成功消息`属性组中，为`成功消息`输入以下内容：`您的消息已发送。`

    滚动到顶部并单击`保存`。


    运行您的应用程序并测试“联系我们”表单。每次您提交一条记录，一封电子邮件就会被发送到`info@example.com`。如果您想更改电子邮件的目标地址，可以使用
    SQL Workshop 的对象浏览器来编辑`CONTACT_US`存储过程。


    ### 探究幕后机制


    从用户的角度来看，没有迹象表明您刚刚创建的表单是基于存储过程创建的。在页面构建器中查看，页面呈现部分中的对象与您在第 2 页基于表的表单中看到的类似，但又不完全相同。让我们来看看是什么让您的基于存储过程的表单不同于基于表的表单。编辑应用程序的第
    3 页。树形窗格的不同选项卡如图 6-23 所示。


    ![A978-1-4842-0466-5_6_Fig23_HTML.jpg](img/A978-1-4842-0466-5_6_Fig23_HTML.jpg)


    图 6-23. 从页面构建器的各种树形窗格中查看到的基于存储过程的表单元素


    在“呈现”选项卡中，您有两个项目，`P3_FROM`和`P3_BODY`，对应于您的两个表单字段：发件人和邮件正文。有两个按钮，`取消`和`提交`。


    在“处理”选项卡中是一个流程和一个分支。但是，这个流程是不同类型——一个 PL/SQL 匿名块。这种强大的流程类型执行“源”元素中指定的 PL/SQL 过程。该
    PL/SQL 过程可以是一个存储的 PL/SQL 过程或一个匿名的 PL/SQL 块，只要代码在`BEGIN`语句和`END`语句之间语法正确即可。在这个案例中，该流程使用`P3_FROM`和`P3_BODY`项目的值作为输入参数来调用`CONTACT_US`过程。`CONTACT_US`过程的主体就是创建和发送电子邮件的部分。因此，基于表的表单与基于存储过程的表单之间的关键区别，在于点击“创建”按钮时执行的页面处理流程。APEX
    向导自动为所选的表单类型提供了所需的流程类型。


    “共享组件”区域包含表、面包屑和页面、选项卡、区域、标签以及按钮模板的标准条目，这与基于表的表单相同。同样，表单向导为您创建了所有这些元素，真是太好了。


    ## 主从报表与表单


    APEX 中最受欢迎的功能之一就是主从表单向导。通过一个简单直观的向导，您可以快速创建报表及相应的表单，以管理以主从关系存储的数据。让我们使用这个向导为`TICKETS`和`TICKET_DETAILS`表创建报表和表单。

    '
- fmt: "### Creating a Master–Detail Report and Form\n\nFirst, you create the report\
    \ and form on application pages 200, 210, and 220. Because you don’t yet have\
    \ those pages created, the wizard does that for you.\n\n1.  Navigate to the Application\
    \ Builder home page for your application.\n2.  Click the Create Page button in\
    \ the upper right of the screen.\n3.  Select Form and click Next.\n4.  Select\
    \ Master Detail Form and click Next. See Figure 6-24.\n5.  Set Table/View Owner\
    \ to your schema.\n6.  Set Table/View Name to `TICKETS` (table). When the page\
    \ refreshes, all the columns from the table are selected by default. Click Next.\n\
    \n![A978-1-4842-0466-5_6_Fig24_HTML.jpg](A978-1-4842-0466-5_6_Fig24_HTML.jpg)\n\
    *Figure 6-24. Creating the master page*\n\nWhen dealing with a master–detail relationship,\
    \ you normally have a foreign key between the detail and master tables. However,\
    \ that may not always be the case. At the detail table step, the wizard allows\
    \ you to choose whether to show only tables that are related via a foreign key.\
    \ In this case, the tables are indeed linked, so you can leave Show Only Related\
    \ Tables set to Yes.\n\n7.  Select `TICKET_DETAILS` for Table/View Name. When\
    \ the page refreshes, make sure the following columns are moved to the Selected\
    \ area to the right. You should end up with results like those in Figure 6-25.\n\
    \n    *   `TICKET_DETAILS_ID`\n    *   `TICKET_ID`\n    *   `DETAILS`\n    * \
    \  `CREATED_BY`\n    *   `CREATED_ON`\n    *   `ATTACHMENT`\n\n![A978-1-4842-0466-5_6_Fig25_HTML.jpg](A978-1-4842-0466-5_6_Fig25_HTML.jpg)\n\
    *Figure 6-25. Defining the detail table*\n\n8.  Click Next.\n9.  Set Primary Key\
    \ Type for the master table to Select Primary Key Column(s).\n10. For Primary\
    \ Key Column 1, select `TICKET_ID` (Number).\n11. Set Primary Key Type for the\
    \ detail table to Select Primary Key Column(s).\n12. For Primary Key Column 1,\
    \ select `TICKET_DETAILS_ID` (Number).\n13. Click Next.\n14. Set Primary Key Source\
    \ to Existing Trigger for the master table, and click Next.\n15. Set Primary Key\
    \ Source to Existing Trigger for the detail table, and click Next.\n16. Set Include\
    \ master row navigation? to Yes, as shown in Figure 6-26.\n17. Set Master Row\
    \ Navigation Order to `CREATED_ON`, and click Next.\n\n![A978-1-4842-0466-5_6_Fig26_HTML.jpg](A978-1-4842-0466-5_6_Fig26_HTML.jpg)\n\
    *Figure 6-26. Defining master-row navigation options*\n\n**Do not click Finish\
    \ at this point.**\n\n18. Set Build Master Detail with to Edit Detail on Separate\
    \ Page, and click Next.\n19. On the next page, set the items to the values shown\
    \ in Figure 6-27.\n\n![A978-1-4842-0466-5_6_Fig27_HTML.jpg](A978-1-4842-0466-5_6_Fig27_HTML.jpg)\n\
    *Figure 6-27. Specifying page attributes*\n\n20. Set Breadcrumb to Breadcrumb.\n\
    21. Once the region refreshes, in the Create Breadcrumb Entry section, set the\
    \ items to the values shown in Figure 6-28.\n\n![A978-1-4842-0466-5_6_Fig28_HTML.jpg](A978-1-4842-0466-5_6_Fig28_HTML.jpg)\n\
    *Figure 6-28. Creating a breadcrumb entry*\n\n22. Click Next.\n23. Set the Navigation\
    \ Preference in Figure 6-29 to Create a new navigation menu entry.\n24. When the\
    \ page refreshes, enter `Tickets` for New Navigation Menu Entry and leave the\
    \ Parent Navigation Menu Entry set to `- No parent selected -`.\n25. Click Next.\n\
    \n![A978-1-4842-0466-5_6_Fig29_HTML.jpg](A978-1-4842-0466-5_6_Fig29_HTML.jpg)\n\
    *Figure 6-29. Setting navigation options*\n\n26. Confirm your selections, and\
    \ click Create.\n\nWhen the wizard completes, you have a working master–detail\
    \ form on the `TICKETS` and `TICKET_DETAILS` tables, plus a report on the `TICKETS`\
    \ table. This is perhaps one report more than you expected, but APEX knows that\
    \ in most cases, you need the report to select the master–detail record to be\
    \ edited, so that report is created at the same time for convenience.\n\nThe Master\
    \ Detail Form wizard created one report and two forms, plus the links and branches\
    \ for navigation and the processes for performing database transactions. The Tickets\
    \ report has a link to the Tickets form, which allows editing of ticket master\
    \ data and lists ticket details. The Ticket Details region on the Manage Tickets\
    \ page has an Edit link to the Ticket Detail modal dialog, where the user can\
    \ add, update, or delete ticket detail information. All the items, buttons, processes,\
    \ and even the column links were created by the Master Detail Form wizard.\n\n\
    Again, although you can build a master–detail form and report manually, the wizard\
    \ is much faster and certainly more efficient. Now, let’s make some adjustments\
    \ to the report and the forms to suit your requirements."
