    ![A978-1-4842-0466-5_16_Fig8_HTML.jpg](A978-1-4842-0466-5_16_Fig8_HTML.jpg)


    Figure 16-8.


    Viewing the Dynamic Actions tab


    ![A978-1-4842-0466-5_16_Fig7_HTML.jpg](A978-1-4842-0466-5_16_Fig7_HTML.jpg)


    Figure 16-7.


    Dynamic actions as they appear in the Rendering Tree   From either the Rendering
    Tree or the Dynamic Actions Tab, click the Disable Email Body dynamic action to
    edit it.   In the When section of the Properties Editor shown in Figure [16-9](#A978-1-4842-0466-5_16_Chapter.html#Fig9),
    change Event to Key Release and click Save.


    ![A978-1-4842-0466-5_16_Fig9_HTML.jpg](A978-1-4842-0466-5_16_Fig9_HTML.jpg)


    Figure 16-9.


    Specifying Key Release as the event


    To test this change, run page 3 again. The page opens and looks like Figure [16-10](#A978-1-4842-0466-5_16_Chapter.html#Fig10).
    Start typing an address into the From item. As soon as any value is entered, the
    Body item becomes enabled, as in Figure [16-11](#A978-1-4842-0466-5_16_Chapter.html#Fig11).
    Conversely, the moment you delete all content from the From item, the Body item
    becomes disabled again.


    ![A978-1-4842-0466-5_16_Fig11_HTML.jpg](A978-1-4842-0466-5_16_Fig11_HTML.jpg)


    Figure 16-11.


    After entering a value in the From field


    ![A978-1-4842-0466-5_16_Fig10_HTML.jpg](A978-1-4842-0466-5_16_Fig10_HTML.jpg)


    Figure 16-10.


    Before entering a value in the From field


    ### Using Page-Level Events


    Dynamic actions give you full control over the triggering events and actions performed.
    Events can be triggered at various levels, including when the page loads, unloads,
    is resized, and so on.


    In the next exercise you will use the Page Load event to pop up a dialog reminding
    the user to be as verbose as possible when they enter their ticket. Follow these
    steps:


    Edit Page 2 of the application. Because this event isn’t tied to an individual
    item, but instead to a page-level event, you need to create the dynamic action
    accordingly.   Navigate to the Dynamic Actions tab of the Tree Pane.   Right-click
    the Page Load node in the tree and select Create Dynamic Action from the context
    menu, as shown in Figure [16-12](#A978-1-4842-0466-5_16_Chapter.html#Fig12).


    ![A978-1-4842-0466-5_16_Fig12_HTML.jpg](A978-1-4842-0466-5_16_Fig12_HTML.jpg)


    Figure 16-12.


    Creating a dynamic action at the page level   In the Properties Editor, enter
    `Alert User` for Name.   In the Dynamic Actions Tree under the True node, click
    the Show action (highlighted in red) to edit its properties.   Select Alert for
    Action and enter `"Please be sure to be as complete as possible when entering
    the details of your issue."` for Text, as shown in Figure [16-13](#A978-1-4842-0466-5_16_Chapter.html#Fig13).


    ![A978-1-4842-0466-5_16_Fig13_HTML.jpg](A978-1-4842-0466-5_16_Fig13_HTML.jpg)


    Figure 16-13.


    Setting Action and Text for the dynamic action   Save and Run the page.  


    Running page 2 now generates a pop-up every time you load the page. Figure [16-14](#A978-1-4842-0466-5_16_Chapter.html#Fig14)
    shows the pop-up as seen when using the Chrome browser for Mac OS X.


    ![A978-1-4842-0466-5_16_Fig14_HTML.jpg](A978-1-4842-0466-5_16_Fig14_HTML.jpg)


    Figure 16-14.


    Alerting the user Note


    Both the Alert and Confirmation actions available to you in APEX take advantage
    of the native dialogs provided by the browser being used by the end user. You
    have no control over the look and feel of these dialogs, and each browser may
    render them differently. If you need control over the look and feel of dialogs,
    you likely need to consider using a built-in APEX Modal dialog or coding your
    own dialogs based on jQuery.


    ### Dynamic Actions with Multiple Triggering Elements


    Dynamic actions also give you the opportunity to define multiple triggering elements.
    Using this method, you only need to create a single dynamic action to catch the
    events of several page items.


    Your public ticket-entry page contains several page items that shouldn’t be left
    blank. However, your APEX validations won’t fire until the user submits the page.
    In this exercise, you will create a dynamic action that checks each of these page
    items as you navigate through the form to see if you left the values null. If
    a value is null, the background color of the item will be set to pink using the
    background style element. If it is not null, the background of the item will be
    set back to white. Follow these steps:


    Edit Page 2 of the application.   Navigate to the Dynamic Actions tab of the Tree
    Pane.   Right-click the Events node in the tree and select Create Dynamic Action
    from the context menu.   In the Properties editor, enter `Highlight Null Values`
    for Name.   Set Event to Lose Focus, set the Selection Type to Item(s), and enter
    the following for the Items field, as shown in Figure [16-15](#A978-1-4842-0466-5_16_Chapter.html#Fig15):


    ![A978-1-4842-0466-5_16_Fig15_HTML.jpg](A978-1-4842-0466-5_16_Fig15_HTML.jpg)


    Figure 16-15.


    Creating a dynamic action with multiple triggering elements `P2_SUBJECT,P2_DESCR,P2_CREATED_BY`
      Set Condition to is null.   In the Dynamic Actions Tree under the True node,
    click the Show action (highlighted in red) to edit its properties.   Set Action
    to Set Style.   In the Settings section, enter `background` for Style Name and
    `pink` for Value.   In the Affected Elements section, set Selection Type to Triggering
    Element.   Set Fire On Page Load to No.   In the Dynamic Actions tab of the Tree
    Pane, right-click on the False node of the Highlight Null values dynamic action
    and select Create FALSE action.   Set Action to Set Style.   In the Settings section,
    enter `background` for Style Name and `white` for Value.   In the Affected Elements
    section, set Selection Type to Triggering Element.   Set Fire On Page Load to
    No.   Save and Run the page.  


    By entering a comma-separated list of page items, you indicate that the Lose Focus
    event should fire when the user navigates away from any of these items. When the
    dynamic action fires, it checks to see if that item is null and sets it to the
    appropriate color. The dynamic action knows which item’s background color to set
    by referencing the triggering element for the affected element.


    Run page 2 of the Help Desk application and tab through each field, leaving them
    all blank. You should notice that as you leave a blank field it immediately turns
    pink. If you go back and enter text into a pink field and then navigate away,
    the background is set to white.


    Note


    Depending on the browser you’re using, you may see that after the pop-up message
    is dismissed, the Subject field turns pink. This has to do with the order of precedence
    some browsers give to JavaScript events. Certain browsers place the cursor in
    the initial page item prior to raising the `PageLoad` event. Once the `PageLoad`
    event fires, the Subject field loses focus, and the `LoseFocus` event fires. When
    you have multiple dynamic actions on a page, which you often will, you need to
    make sure they don’t adversely affect one another.'
