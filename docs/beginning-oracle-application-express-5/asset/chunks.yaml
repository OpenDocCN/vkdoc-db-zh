  trans: '


    #### 打包应用画廊


    打包应用画廊展示了随`APEX`发行版捆绑提供的所有应用程序。共有 35 个独立的打包应用，它们可归属于多个不同类别，包括软件开发、跟踪、团队生产力、营销、知识管理、IT
    管理、项目管理、示例应用程序和示例工作表。


    点击某个应用程序的图标，将带你进入该应用程序的详细信息页面。在这里，你将能看到应用程序的截图、阅读其完整描述并查看版本信息，如图 2-23 所示。


    ![A978-1-4842-0466-5_2_Fig23_HTML.jpg](img/A978-1-4842-0466-5_2_Fig23_HTML.jpg)

    图 2-23. 清单管理器打包应用信息页面


    点击`Install Application`（安装应用）按钮，将引导你完成在当前工作区中安装所选应用程序的过程。一个弹出式安装向导将让你选择身份验证方法，通常默认为`Application
    Express Accounts`（应用程序快速帐户）。点击向导中最后的`Install Application`按钮，将安装该应用程序及其所有支持对象，包括任何必需的数据库对象。安装完成后，你将被带回到应用程序的信息页面，如图
    2-24 所示，你会看到应用程序已成功安装，并会获得管理和运行该应用程序的选项。


    ![A978-1-4842-0466-5_2_Fig24_HTML.jpg](img/A978-1-4842-0466-5_2_Fig24_HTML.jpg)

    图 2-24. 查看清单管理器应用已成功安装


    关于打包应用程序，有几件事你应该了解：


    *   任何名称中包含“Sample”（示例）的应用程序都是为了演示`APEX`中可用的功能，因此默认将以未锁定状态安装。这意味着开发者将能够编辑该应用程序，并查看`APEX`团队是如何开发该应用的。

    *   名称中不包含“Sample”的应用程序是作为生产就绪版本提供的，将以锁定状态安装，不允许任何编辑，直到该应用被明确解锁。这可以通过`Manage`（管理）按钮完成，如图
    2-24 所示。任何已安装并保持锁定的此类应用程序，在生产环境中均得到 Oracle 的完全支持。这些锁定的应用程序也可以升级到未来`APEX`版本可能附带的更当前版本。一旦你解锁它们，Oracle
    的所有支持即告终止，可升级性失效，并且无法重新锁定应用程序。

    *   所有打包应用程序都安装到工作区默认的“解析为”模式中。目前，没有直接的方法将它们安装到次要的“解析为”模式中，除非先解锁并导出应用程序，从而使其失去任何支持。


    尽管示例应用是作为学习辅助工具编写的，但从许多生产就绪的应用程序中同样能学到很多东西。我衷心建议你读完本书后的第一个行动，就是去看看一些打包应用程序的内部工作原理。


    #### 打包应用仪表板


    如图 2-25 所示，仪表板页面展示了当前工作区中打包应用程序的使用情况概览。你会看到可用应用的总数、已安装的数量，以及是否有可升级的应用程序。你还能看到是谁安装了这些应用以及它们的使用频率。


    ![A978-1-4842-0466-5_2_Fig25_HTML.jpg](img/A978-1-4842-0466-5_2_Fig25_HTML.jpg)

    图 2-25. 打包应用仪表板


    #### 打包应用管理


    打包应用管理页面提供了一系列专门与安装在当前工作区中的打包应用程序相关的管理任务列表。如果你以开发者身份登录，只会看到与管理`Interactive Report`（交互式报表）设置和`Activity
    reports`（活动报告）相关的选项。但是，当你以工作区管理员身份登录时，会看到一个名为`Manage Services`（管理服务）的部分，其中展示了完整管理部分中对你可用功能的一小部分。


    ### 管理与团队开发


    UI 的最后两个功能区域，管理与团队开发，其复杂程度足以独立成章。因此，我们建议你参考深入介绍这些领域的章节。第 10 章涵盖应用程序的部署，第 14 章是关于管理工作区的，而第
    15 章则讲解团队开发。


    在本书中，你会接触到各种管理任务，因此如果你希望在开始前对管理有全面的了解，应该绕道先阅读这些章节以打好基础。然而，如果你准备好边做边学，那么就进入下一章，在那里你将开始真正的编程。


    ## 总结


    `APEX`的架构起初可能看起来有点令人生畏，但一旦你真正开始使用它，事情就会变得井然有序，你会越来越理解各个部分是如何组合在一起的。如果你从本章只带走一样东西，那就是：工作区本质上是你的开发沙盒。你所做的一切都发生在工作区的上下文中。其他所有事情——从开发的角度来看——与任何其他开发环境非常相似。你要构建一个新应用程序？那么它需要在工作区中创建。你需要访问一个模式来构建那个应用？那么它需要被分配到你的工作区。你明白这个道理了。现在，开始有趣的部分吧！


    # 3. 识别问题与设计解决方案


    每个计算机系统都是（或至少应该是）解决某种问题的结果。虽然“Hello World”应用程序很棒，但我坚信，学习任何技术的最佳方式是将其应用于一个真实的问题，看看它实际是如何工作的。


    我在整本书中都遵循这一原则。本章将讨论大多数组织中一个非常普遍的、可以通过技术解决的问题。你还将探讨在设计基于 Web 的系统时，特别是使用`APEX`时，需要考虑的一些要素。


    ## 识别系统需求


    几乎每家公司，无论规模大小，在某个时候都需要实施某种帮助台系统。无论是用于跟踪员工问题和疑问的内部系统，还是用于跟踪商业软件或硬件客户问题的外部系统，帮助台系统的基本原理都相当标准。


    大多数帮助台系统都是由问题单或简称为“工单”的概念驱动的。这个术语源于计算机出现之前的日子：大多数问题是通过电话报告的，故障排查员使用纸质工单来记录通话。那张纸质工单上包含的信息有问题的描述、遇到问题的人的姓名、问题记录的时间等等。然后，在故障排查和（希望如此）解决问题的过程中，工程师们记录下每一步的操作，并包含他们在此过程中收集到的任何问题文档。如今，如果看到一个没有计算机化的帮助台系统，那将是非常令人惊讶的，即使它只是一个带有注释和状态的问题电子表格。


    在本章中，你将使用`APEX`来构建帮助台系统。在深入之前，你需要清晰地理解你试图解决的问题。至少，你需要审视当前的系统。


    '
- fmt: '# Never a Clean Slate


    Almost no computer system written today starts from scratch. There is almost always
    something in place already, even if it’s just some loose guidelines or ideas.


    For this example, let’s say your company has a very basic system in place, but
    it’s no longer meeting the needs of your growing user community. Your goal is
    to create a new system that will make the logging of issues and their solutions
    much easier for everyone involved; however, to do that, you must understand the
    needs of the users and the functionality of the system that is currently in place.


    ## A Broken System


    In general, the users of help-desk systems can be categorized into two groups:
    people who log problems (end users) and people who help solve the problems (technicians).
    Depending on which user community you fall into, it’s likely you have different
    needs, but, overall, the system should help the end users and the technicians
    communicate with each other about the problem or issue.


    The first step is to understand how your help desk is being managed today and
    why it’s not working. Speaking to both the technicians and the end users can provide
    a huge amount of information, but the challenge is that this information usually
    comes in the form of complaints about the current system.


    Quizzing the end users reveals that their main complaint is that they never know
    the status of the problems they’ve logged. They can go days, sometimes weeks,
    without communication from the technicians, and in the eyes of the users, no communication
    means no one is working on their problem. Another user complaint is that the help-desk
    technicians often don’t know how to contact them to ask further questions or communicate
    progress.


    On the other end of the issue, the technicians are overloaded. Ticket information
    is kept in an Excel spreadsheet. Originally, the help desk was only one person,
    but now there are several technicians working independently. While performing
    their daily duties, each needs to update the spreadsheet with information regarding
    the tickets assigned to them. The increasing number of people accessing a single
    spreadsheet causes problems, because only one person can open and update the spreadsheet
    at any given time. The technicians are also tired of constantly being called by
    users wanting an update on the status of their issues.


    It’s obvious that the system is broken. Neither the users nor the technicians
    are happy about the situation. It’s your job to take the information you’ve gleaned
    from these conversations and design something that will address the needs of both
    user communities.


    ## How Do You Fix Things?


    With the information you’ve gathered so far, you can now define some loose requirements
    and break them down by user type to give you a much clearer understanding of what
    each community needs. Then, from those requirements, you can begin to think about
    the database design that you’ll need to create in support of them.


    ### Defining the Requirements


    You can look at requirements from two perspectives. End users have one set of
    requirements and technicians another. Some requirements overlap between the two
    groups. Others are unique to one group or the other.


    End users should be able to


    *   create a new ticket outlining their problem

    *   see the status and progress of tickets


    Technicians should be able to


    *   easily identify and view new tickets

    *   easily identify which tickets are directly assigned to them

    *   search existing tickets

    *   create new tickets on behalf of an end user

    *   assign tickets to other technicians

    *   add details (comments, information, and attachments) to tickets

    *   update the status of a ticket


    Although you could go a lot further, these requirements form the basis of a pretty
    complete help-desk system. You can always add functionality to it later when you
    have a better understanding of what else the users and the company might need.


    ### Extrapolating to a Database Design


    Having stated the requirements, you can begin to extrapolate the database objects
    you need to create to store the data. If you’re new to database design, here’s
    a quick trick to help you identify the entities for which you need to build tables:
    go back through your requirements and look for concrete nouns that represent the
    highest-level objects you need to track. As you find these nouns, try to identify
    if they’re actually at the highest level or if they’re merely attributes of something
    bigger.


    If you follow the described process with your brief requirement specification,
    the nouns `USER` and `TICKET` jump out as being the two main things you want to
    track. It’s tempting to split users into two different sets—technicians and end
    users—but the type of user is merely an attribute of a user.


    An object that is a little harder to identify is `TICKET DETAIL`. It’s completely
    valid to think that this would merely be an attribute of a `TICKET`; however,
    the clue comes in the fact that you can’t concretely identify how many `TICKET
    DETAIL` entries there will be for any given `TICKET`. The fact that the number
    is unknown indicates that you should create a table that is a child of the `TICKET`
    entity called `TICKET DETAIL`. This way, you can enter as many detail records
    as you need.


    So, you’ve identified three major entities: `USER`s, `TICKET`s, and `TICKET DETAIL`s.
    You now need to think about the attributes of each of these entities and what
    type of data they will hold. Searching back through the statement of requirements,
    talking to the technicians about what they track today, and thinking about what
    types of things you’d want to be able to track during the process of solving a
    problem, you can identify a number of attributes about your objects. Tables [3-1](#A978-1-4842-0466-5_3_Chapter.html#Tab1)
    through [3-3](#A978-1-4842-0466-5_3_Chapter.html#Tab3) show these attributes.


    Table 3-3. `TICKET DETAIL` Attributes


    | Attribute Name | Type of Data | Comment |

    | --- | --- | --- |

    | `Ticket Details ID` | Number | A unique way to identify this detail entry |

    | `Ticket ID` | Number | Which ticket this detail is linked to |

    | `Details` | Text | A text description of any details entered by the technician
    |

    | `Created By` | Text | The user who logged the ticket |

    | `Created On` | Date | The date the user created the ticket |


    Table 3-2. `TICKET` Attributes


    | Attribute Name | Type of Data | Comment |

    | --- | --- | --- |

    | `Ticket ID` | Number | A unique way to identify the ticket |

    | `Subject` | Text | A brief one-line statement of the problem |

    | `Descr` | Text | A detailed description of the problem |

    | `Status` | Text | The status of the ticket during processing (`OPEN`, `PENDING`,
    `CLOSED`, and so on) |

    | `Created By` | Text | The user who logged the ticket |

    | `Created On` | Date | The date the user created the ticket |

    | `Closed On` | Date | The date the ticket was closed |

    | `Assigned To` | Text | The technician who is assigned to work on the ticket
    |


    Table 3-1. `USER` Attributes


    | Attribute Name | Type of Data | Comment |

    | --- | --- | --- |

    | `User ID` | Number | A unique ID for each user |

    | `User Name` | Text | A login ID for each user |

    | `Password` | Text | The password used to log in to the system |


    Although it’s good to try to be as detailed as possible as early as you can, you
    don’t have to be perfect here. You can always go back and alter or expand the
    data you wish to capture as you identify other potential attributes.'
