    the following SQL into the Region Source. Click the Create Region button when
    you’re finished to accept the defaults for all of the remaining settings: `DECLARE`
      `l_sql VARCHAR2(500);` `BEGIN` `l_sql := l_sql ||  q''!`                 `SELECT`
                      `subject,`                   `created_on,`                   `assigned_to`
                    `FROM`                   `tickets t,`                   `status_lookup
    sl`                 `WHERE`                   `t.status_id = sl.status_id`                   `AND
    sl.status = ''OPEN''`         `!'';` `IF :APP_USER = ''nobody'' THEN`   `l_sql
    := l_sql || q''! AND public_flag = ''Y'' !'';` `END IF;` `RETURN l_sql;` `END;`


    To see the results of this report fully, you need to set a few tickets with the
    new PUBLIC setting. Navigate to the ticket summary screen as a logged-in user
    and change a few OPEN tickets to have the PUBLIC option set to Yes. When you navigate
    to the home screen as a logged-in user, a full list of open tickets should appear,
    as shown in Figure [8-24](#A978-1-4842-0466-5_8_Chapter.html#Fig24). After logging
    out, you will see only the tickets that have been identified as PUBLIC.


    ![A978-1-4842-0466-5_8_Fig24_HTML.jpg](A978-1-4842-0466-5_8_Fig24_HTML.jpg)


    Figure 8-24.


    Resulting report generated from dynamic SQL Note


    The SQL statement uses a quoting syntax that you may not be familiar with. Oracle
    Database 10g introduced a quoting mechanism for string literals that allows you
    to define your own string delimiters, removing the need to double up single quotes
    in strings. Any character can be used as a delimiter, including bracket combinations
    `() {} [] <>`. The basic syntax is `q’X string X''` where `X` is any single character.
    The `q’X` opens the literal string, and the `X''` closes the literal string. You
    can find more details on the literal syntax in the Oracle Database SQL Language
    Reference.


    ## Summary


    As with any programming language or framework, learning the basics is the first
    step. This chapter touched on a lot of points that could be considered to be the
    tips of icebergs. Each section has the capability to reach into a vast set of
    technologies, with the Oracle database being primary among them. The intention
    here is to demonstrate how the APEX framework works through the example application
    and to provide a starting point for additional detail discovery.


    # 9. Security


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​9](http://dx.doi.org/10.1007/978-1-4842-0466-5_9))
    contains supplementary material, which is available to authorized users.


    Security has varying degrees of implementation; there’s never a black-and-white
    answer. The question of how much security is needed is followed up by additional
    questions regarding the value of what is being protected and the risks, repercussions,
    and likelihood of it being sought after. For every security measure, there will
    always be someone trying to circumvent it. This chapter will review basic security
    features and an approach to securing the Help Desk application. The concepts reviewed
    here apply to all APEX applications and are specific to the APEX framework.


    ## User-Maintenance Navigation


    In the Help Desk application, you have the requirement to allow users to be maintained
    in the application through the web interface. Let’s add a section to the application
    that allows for the maintenance of user accounts, and then let’s modify the tab
    structure so as to navigate to the newly created form. This time, you won’t use
    the Create Page wizard to create the menu items, but instead will create them
    from scratch in the Shared Components section so that you may gain a better understanding
    of how the menu hierarchy works.


    First, create a blank page that will be the landing page for your new tab (tabs
    require a page to reference):


    From the Application Builder home page, while editing the Help Desk application,
    click the Create Page button.   Select the option for Blank Page and click Next.
      Set Page Number to `600`, enter `Users` for the Name field, and set the Breadcrumb
    selection to Breadcrumb. When the page refreshes, ensure that Entry Name is Users
    and click Next.   Select Do not associate this page with a navigation menu entry
    for the Navigation Preference radio group. Click Next.   Click Finish to complete
    the creation of the page. The completed page should be empty, and you should not
    see any new menu item related to it, as shown in Figure [9-1](#A978-1-4842-0466-5_9_Chapter.html#Fig1).


    ![A978-1-4842-0466-5_9_Fig1_HTML.jpg](A978-1-4842-0466-5_9_Fig1_HTML.jpg)


    Figure 9-1.


    Viewing the newly created empty page with its single breadcrumb entry


    Now that you have a Users page, you need to make a modification to the navigation.
    We’ll add an Admin entry to the menu and create sub-entries for user maintenance.
    Here’s the process to follow to add the new menu items with the correct hierarchy:


    Navigate to the Shared Components page.   In the Navigation section, click Navigation
    Menu.   The interactive report shows the available menus. Click on Desktop Navigation
    Menu, as shown in Figure [9-2](#A978-1-4842-0466-5_9_Chapter.html#Fig2).


    ![A978-1-4842-0466-5_9_Fig2_HTML.jpg](A978-1-4842-0466-5_9_Fig2_HTML.jpg)


    Figure 9-2.


    Clicking the Desktop Navigation Menu Looking at the current menu structure, as
    shown in the report in Figure [9-3](#A978-1-4842-0466-5_9_Chapter.html#Fig3),
    you can see we already have seven entries, and that two of the entries (Submit
    a Ticket and Contact Us) are sub-entries of the Home menu entry. Next, we will
    add the Admin menu entry and then add the sub-entry for user maintenance.


    ![A978-1-4842-0466-5_9_Fig3_HTML.jpg](A978-1-4842-0466-5_9_Fig3_HTML.jpg)


    Figure 9-3.


    Viewing the currently existing Navigation Menu entries   To add the Admin menu
    entry, click the Create List Entry button in the upper-right corner, as indicated
    in Figure [9-4](#A978-1-4842-0466-5_9_Chapter.html#Fig4).


    ![A978-1-4842-0466-5_9_Fig4_HTML.jpg](A978-1-4842-0466-5_9_Fig4_HTML.jpg)


    Figure 9-4.


    Creating a new menu entry using the Create List Entry button   In the Entry section,
    enter `Admin` for List Entry Label.   In the Target section, enter `600` for Page
    and click Create List Entry at the top of the page. See Figure [9-5](#A978-1-4842-0466-5_9_Chapter.html#Fig5).


    ![A978-1-4842-0466-5_9_Fig5_HTML.jpg](A978-1-4842-0466-5_9_Fig5_HTML.jpg)


    Figure 9-5.


    Entering the attributes for the new Admin menu entry  To add the User Maintenance
    menu entry, click the Create List Entry button in the upper-right corner.   In
    the Entry section, set the Parent List Entry to Admin and then enter `User Maintenance`
    for List Entry Label.   In the Target section, enter `600` for Page.   In the
    Current List entry section, set List Entry Current for Pages Type to Comma Delimited
    Page List.   In the List Entry Current for Condition, enter `600,610` and click
    the Create List Entry button at the top of the page.'
  trans: "\n\n**区域标题与显示点**  将**源类型**设置为**SQL 查询**，并将以下 SQL 输入到**区域源**中。完成后，点击**创建区域**按钮，接受所有剩余设置的默认值：\n\
    \n```sql\nDECLARE\n    l_sql VARCHAR2(500);\nBEGIN\n    l_sql := l_sql ||  q'!\n\
    \                SELECT\n                  subject,\n                  created_on,\n\
    \                  assigned_to\n                FROM\n                  tickets\
    \ t,\n                  status_lookup sl\n                WHERE\n            \
    \      t.status_id = sl.status_id\n                  AND sl.status = 'OPEN'\n\
    \        !';\n    IF :APP_USER = 'nobody' THEN\n        l_sql := l_sql || q'!\
    \ AND public_flag = 'Y' !';\n    END IF;\n    RETURN l_sql;\nEND;\n```\n\n要完整查看此报告的结果，您需要将一些工单设置为新的\
    \ PUBLIC 选项。以已登录用户身份导航到工单摘要屏幕，并将几个状态为 OPEN 的工单的 PUBLIC 选项更改为“是”。当您以已登录用户身份导航到主屏幕时，应出现所有未关闭工单的完整列表，如图\
    \ 8-24 所示。注销后，您将仅看到标记为 PUBLIC 的工单。\n\n![A978-1-4842-0466-5_8_Fig24_HTML.jpg](img/A978-1-4842-0466-5_8_Fig24_HTML.jpg)\n\
    *图 8-24. 由动态 SQL 生成的报告结果*\n\n> 注意：该 SQL 语句使用了您可能不熟悉的引用语法。Oracle 数据库 10g 引入了一种用于字符串字面量的引用机制，允许您定义自己的字符串定界符，从而无需在字符串中重复单引号。可以使用任何字符作为定界符，包括括号组合\
    \ `() {} [] <>`。基本语法是 `q’X 字符串 X'`，其中 `X` 是任意单个字符。`q’X` 开启字面量字符串，`X'` 关闭字面量字符串。您可以在\
    \ Oracle 数据库 SQL 语言参考手册中找到有关字面量语法的更多详细信息。\n\n## 总结\n与任何编程语言或框架一样，学习基础知识是第一步。本章涉及的许多要点可能只是冰山一角。每一节都有能力深入到一系列广泛的技术之中，其中\
    \ Oracle 数据库是主要部分。本章的目的是通过示例应用程序演示 APEX 框架的工作原理，并为进一步探索细节提供一个起点。\n\n# 9. 安全性\n\
    电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0466-5_​9](http://dx.doi.org/10.1007/978-1-4842-0466-5_9)）包含补充材料，可供授权用户使用。\n\
    \n安全性的实施程度各不相同；从来没有一个非黑即白的答案。在确定需要多少安全性之后，会紧接着出现关于被保护对象的价值、风险、后果以及被攻击的可能性等附加问题。对于任何安全措施，总会有人试图规避它。本章将回顾基本的安全特性以及保护\
    \ Help Desk 应用程序的一种方法。这里回顾的概念适用于所有 APEX 应用程序，并且是 APEX 框架特有的。\n\n## 用户维护导航\n在 Help\
    \ Desk 应用程序中，您有通过 Web 界面在应用程序中维护用户的需求。现在，让我们向应用程序添加一个部分，用于维护用户账户，然后修改标签页结构以导航到新创建的表单。这一次，您将不使用**创建页面**向导来创建菜单项，而是将在**共享组件**部分从头开始创建它们，以便您能更好地理解菜单层次结构是如何工作的。\n\
    \n首先，创建一个空白页面，作为新标签页的目标页面（标签页需要引用一个页面）：\n\n1.  在应用程序构建器主页中，编辑 Help Desk 应用程序时，点击**创建页面**按钮。\n\
    2.  选择**空白页**选项，然后点击**下一步**。\n3.  将**页面号**设置为 `600`，在**名称**字段中输入 `Users`，并将**面包屑**选择设置为**面包屑**。页面刷新后，确保**条目名称**为\
    \ Users，然后点击**下一步**。\n4.  对于**导航首选项**单选组，选择**不要将此页面与导航菜单条目关联**。点击**下一步**。\n5.\
    \  点击**完成**以完成页面的创建。完成的页面应为空，并且您不应看到任何与之相关的新菜单项，如图 9-1 所示。\n\n![A978-1-4842-0466-5_9_Fig1_HTML.jpg](img/A978-1-4842-0466-5_9_Fig1_HTML.jpg)\n\
    *图 9-1. 查看新创建的空白页面及其单个面包屑条目*\n\n现在您已经有了一个 Users 页面，需要修改导航。我们将向菜单添加一个 Admin 条目，并为用户维护创建子条目。以下是添加具有正确层次结构的新菜单项的流程：\n\
    \n1.  导航到**共享组件**页面。\n2.  在**导航**部分，点击**导航菜单**。\n3.  此交互式报表显示了可用的菜单。点击**桌面导航菜单**，如图\
    \ 9-2 所示。\n\n![A978-1-4842-0466-5_9_Fig2_HTML.jpg](img/A978-1-4842-0466-5_9_Fig2_HTML.jpg)\n\
    *图 9-2. 点击桌面导航菜单*\n\n查看当前的菜单结构，如图 9-3 中的报表所示，我们可以看到已经有七个条目，并且其中两个条目（提交工单和联系我们）是主页菜单条目的子条目。接下来，我们将添加\
    \ Admin 菜单条目，然后添加用户维护的子条目。\n\n![A978-1-4842-0466-5_9_Fig3_HTML.jpg](img/A978-1-4842-0466-5_9_Fig3_HTML.jpg)\n\
    *图 9-3. 查看当前存在的导航菜单条目*\n\n要添加 Admin 菜单条目，点击右上角的**创建列表条目**按钮，如图 9-4 所示。\n\n![A978-1-4842-0466-5_9_Fig4_HTML.jpg](img/A978-1-4842-0466-5_9_Fig4_HTML.jpg)\n\
    *图 9-4. 使用“创建列表条目”按钮创建新菜单项*\n\n1.  在**条目**部分，为**列表条目标签**输入 `Admin`。\n2.  在**目标**部分，为**页面**输入\
