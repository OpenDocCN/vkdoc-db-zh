    Viewing the breadcrumb entries, we can see that, while there is an entry for page
    600, there is no entry for page 610\. We’ll need to add that manually:   Click
    the Create Breadcrumb Entry button in the upper-right part of the page.   In the
    Breadcrumb section, enter `610` for Page.   In the Entry section, select Users(Page
    600) as the Parent Entry and then enter `Manage Users` for the Short Name.   In
    the Target section, enter `610` for Page. These entries are shown in Figure [9-11](#A978-1-4842-0466-5_9_Chapter.html#Fig11).


    ![A978-1-4842-0466-5_9_Fig11_HTML.jpg](A978-1-4842-0466-5_9_Fig11_HTML.jpg)


    Figure 9-11.


    Entering the breadcrumb details for page 610   At the top of the page, click Create
    Breadcrumb Entry. When you’re finished, page 610 has a Shared Components breadcrumb
    entry just like page 600\. Running the application displays shows a breadcrumb
    entry for both the Users report page and the Manage Users page, as shown in Figure
    [9-12](#A978-1-4842-0466-5_9_Chapter.html#Fig12).


    ![A978-1-4842-0466-5_9_Fig12_HTML.jpg](A978-1-4842-0466-5_9_Fig12_HTML.jpg)


    Figure 9-12.


    Showing the breadcrumb entry for the Manage Users page Finally, you need to change
    the item type of P610_PASSWORD to Password, so it accepts a user’s input but displays
    asterisk (*) characters as the password is typed. This item type is designed not
    to retrieve data when a record is edited, despite being bound to a database column.
    Also, the item type doesn’t save any value in session state, meaning it doesn’t
    remember the value entered after the page processing is complete. This is a security
    feature to prevent data identified as a password from being retrieved inappropriately.
    Here are the steps:   Edit Page 610.   Edit the item P610_PASSWORD.   In the Properties
    Editor, set Type to Password, as shown in Figure [9-13](#A978-1-4842-0466-5_9_Chapter.html#Fig13).


    ![A978-1-4842-0466-5_9_Fig13_HTML.jpg](A978-1-4842-0466-5_9_Fig13_HTML.jpg)


    Figure 9-13.


    Setting the P610_PASSWORD element to a password field Although you want a password
    to be required when creating a new account, if the admin user doesn’t enter a
    password while editing an existing user, you want the system to keep the current
    password. Because of this, you need to set the Value Required attribute of the
    password field to NO and instead implement a validation that only fires when you’re
    creating a new user:   In the Validating section of P610_PASSWORD, set the Value
    Required attribute to NO.   While editing Page 610, right-click P610_PASSWORD,
    and select Create Validation.   In the Properties Editor, set Name to P610_PASSWORD
    Is Not Null.   In the Validation Section, select Item is Not Null as Type and
    set Item to P610_PASSWORD.   Enter `A password must be specified.` for Error Message.
      In the Condition section, set When Button Pressed to CREATE.   Save your changes.


    This completes the navigation and UI part of the security scheme you’re implementing.
    With the navigation and maintenance in place, you can now implement the authentication
    scheme that will use the information.


    ## Authentication


    The key to making a secure application is to understand whom the accessing user
    is. APEX refers to this as authentication. Authentication answers the question,
    “Who are you?” The APEX tool provides a series of predefined authentication mechanisms,
    including a built-in authentication framework and an extensible custom framework.
    At design time, it’s easy to switch between authentication methods by setting
    the active scheme. There can be only one active authentication scheme at a time
    for an application. The following are the major types of authentication schemes:


    *   Application Express Accounts: Users are managed in the APEX workspace and
    are maintained just like workspace developer accounts.

    *   LDAP Directory: The user is an existing LDAP-compliant server such as Active
    Directory or Oracle Internet Directory.

    *   Oracle Application Server Single Sign On: Authentication can pass between
    APEX and an existing Oracle SSO server. Logging into the SSO server once passes
    the same credentials to all APEX applications.

    *   Database Accounts: Database user names and passwords determine authentication.
    Don’t confuse this with data access in an APEX application.

    *   HTTP Header Variable: This approach supports the use of HTTP header variables
    to identify a user and to create an Application Express user session.

    *   Custom: Logic is determined by the developer. An example of usage is for Internet-facing
    applications where self-registration may be desired. Another example is when more
    than one authentication source is used simultaneously, such as using two LDAP
    servers.

    *   Open Door: Developer testing simulates logging in as different individuals.
    This isn’t intended to be used as a public authentication scheme.

    *   No Authentication: This option is intended to allow all parts of the application
    to be reachable without needing a user to log in.


    Each application has its own set of authentication schemes managed as part of
    its Shared Components. Authentication schemes can be copied between applications
    when needed. This ability to copy is especially useful when a custom authentication
    scheme has been developed and is desired in more than one application. The authenticationschemes
    also utilize the APEX subscription framework to allow a master copy to be applied
    to subscribers inside of a single workspace.'
  trans: '

    选择 `USER_NAME` 和 `PASSWORD` 作为表单中要显示的字段。将 `Insert`、`Update` 和 `Delete` 全部设置为 `Yes`，然后点击
    Next。点击 `Create`。


    完成这些步骤后，Help Desk 应用程序会新增一些对象。页面 `600` 上的区域是当前用户的报表。同时请注意，新页面允许编辑数据值，包括执行相应数据库事务的所有流程。


    不过，你仍需对页面 `610` 进行一些设置，才能使其正确显示面包屑导航：


    1.  导航至您应用程序的 `Shared Components` 区域。

    2.  在 `Navigation Section` 中，点击 `Breadcrumbs` 链接。

    3.  点击 `Breadcrumb` 图标，查看所有面包屑条目。


    查看面包屑条目，我们可以看到，虽然存在页面 `600` 的条目，但没有页面 `610` 的条目。我们需要手动添加：


    1.  点击页面右上角的 `Create Breadcrumb Entry` 按钮。

    2.  在 `Breadcrumb` 区域，为 `Page` 输入 `610`。

    3.  在 `Entry` 区域，选择 `Users (Page 600)` 作为 `Parent Entry`，然后为 `Short Name` 输入 `Manage
    Users`。

    4.  在 `Target` 区域，为 `Page` 输入 `610`。


    这些条目如图 9-11 所示。


    ![A978-1-4842-0466-5_9_Fig11_HTML.jpg](img/A978-1-4842-0466-5_9_Fig11_HTML.jpg)


    图 9-11. 为页面 610 输入面包屑详细信息


    在页面顶部，点击 `Create Breadcrumb Entry`。完成后，页面 `610` 将拥有一个与页面 `600` 类似的 `Shared Components`
    面包屑条目。运行应用程序，将显示用户报表页面和管理用户页面的面包屑条目，如图 9-12 所示。


    ![A978-1-4842-0466-5_9_Fig12_HTML.jpg](img/A978-1-4842-0466-5_9_Fig12_HTML.jpg)


    图 9-12. 显示管理用户页面的面包屑条目


    最后，你需要将 `P610_PASSWORD` 的项类型更改为 `Password`，这样它就能接受用户输入，但在键入密码时显示星号 (`*`) 字符。此项目类型设计为在编辑记录时不检索数据，尽管它绑定到数据库列。此外，此项目类型不会在会话状态中保存任何值，这意味着在页面处理完成后不会记住输入的值。这是一项安全功能，旨在防止不恰当地检索标识为密码的数据。


    步骤如下：


    1.  编辑页面 `610`。

    2.  编辑项目 `P610_PASSWORD`。

    3.  在 `Properties Editor` 中，将 `Type` 设置为 `Password`，如图 9-13 所示。


    ![A978-1-4842-0466-5_9_Fig13_HTML.jpg](img/A978-1-4842-0466-5_9_Fig13_HTML.jpg)


    图 9-13. 将 `P610_PASSWORD` 元素设置为密码字段


    尽管在创建新账户时需要密码，但如果管理员用户在编辑现有用户时不输入密码，您希望系统保留当前密码。因此，你需要将密码字段的 `Value Required`
    属性设置为 `NO`，并改为实现一个仅在创建新用户时触发的验证：


    1.  在 `P610_PASSWORD` 的 `Validating` 区域，将 `Value Required` 属性设置为 `NO`。

    2.  编辑页面 `610` 时，右键单击 `P610_PASSWORD`，然后选择 `Create Validation`。

    3.  在 `Properties Editor` 中，将 `Name` 设置为 `P610_PASSWORD Is Not Null`。

    4.  在 `Validation` 区域，选择 `Item is Not Null` 作为 `Type`，并将 `Item` 设置为 `P610_PASSWORD`。

    5.  为 `Error Message` 输入 `A password must be specified.`。

    6.  在 `Condition` 区域，将 `When Button Pressed` 设置为 `CREATE`。

    7.  保存您的更改。


    这完成了您正在实施的安全方案的导航和用户界面部分。有了导航和维护功能，您现在可以实施将使用这些信息的身份验证方案。


    ## 身份验证


    构建安全应用程序的关键在于了解访问用户是谁。APEX 将此称为身份验证。身份验证回答“您是谁？”的问题。APEX 工具提供了一系列预定义的身份验证机制，包括内置的身份验证框架和可扩展的自定义框架。在设计时，通过设置活动方案，可以轻松切换身份验证方法。一个应用程序一次只能有一个活动的身份验证方案。以下是主要的身份验证方案类型：


    *   `Application Express Accounts`：用户在 APEX 工作区中管理，其维护方式与工作区开发者账户相同。

    *   `LDAP Directory`：用户是符合 LDAP 标准的现有服务器，如 Active Directory 或 Oracle Internet
    Directory。

    *   `Oracle Application Server Single Sign On`：身份验证可以在 APEX 和现有的 Oracle SSO 服务器之间传递。登录
    SSO 服务器一次，相同的凭据将传递给所有 APEX 应用程序。

    *   `Database Accounts`：数据库用户名和密码决定身份验证。请勿将其与 APEX 应用程序中的数据访问混淆。

    *   `HTTP Header Variable`：此方法支持使用 HTTP 头变量来识别用户并创建 Application Express 用户会话。

    *   `Custom`：逻辑由开发者决定。使用示例包括面向互联网的应用程序，可能需要自注册。另一个例子是同时使用多个身份验证源，例如使用两个 LDAP 服务器。

    *   `Open Door`：开发者测试模拟以不同用户身份登录。此方案不打算用作公共身份验证方案。

    *   `No Authentication`：此选项旨在允许访问应用程序的所有部分，无需用户登录。


    每个应用程序都有其自己的一组身份验证方案，作为其 `Shared Components` 的一部分进行管理。需要时，身份验证方案可以在应用程序之间复制。当开发了自定义身份验证方案并希望在多个应用程序中使用时，此复制功能尤其有用。身份验证方案还利用
    APEX 订阅框架，允许将主副本应用于单个工作区内的订阅者。

    '
- fmt: '## Custom Authentication Schemes


    在上一节中，导入的脚本包含了表、触发器和函数的定义。你将把这些元素用作自定义认证方案的一部分。该认证方案的关键组件是一个函数，它将给定的用户名和密码与`USERS`表中存储的值进行比较。如果匹配，则用户通过认证。你应该查看
    SQL Workshop 中的数据库对象和 PL/SQL 函数代码，以了解更多关于此实现的细节。


    注意


    虽然`USERS`表包含一个名为`PASSWORD`的字段，但它不是实际的密码值；它是密码的加密哈希。密码永远不应以纯文本形式存储。


    以下是根据刚刚提到的数据库对象创建自定义认证方案的流程：


    导航到应用程序的“共享组件”。在“安全性”区域，点击“认证方案”，如图 [9-14](#A978-1-4842-0466-5_9_Chapter.html#Fig14)
    所示。


    ![A978-1-4842-0466-5_9_Fig14_HTML.jpg](A978-1-4842-0466-5_9_Fig14_HTML.jpg)


    图 9-14. 导航到“认证方案”共享组件


    在“认证方案”屏幕的右上角，点击“创建”按钮。从图库中选择“基于预配置方案”，然后点击“下一步”。为“名称”输入`Custom Authentication
    Scheme`，然后为“方案类型”选择“自定义”。页面将刷新，并根据所选的方案类型显示不同的输入选项。在“设置”部分，为“认证函数名称”输入`authenticate_user`，如图
    [9-15](#A978-1-4842-0466-5_9_Chapter.html#Fig15) 所示。你不需要填写此部分中的其他任何项目。


    ![A978-1-4842-0466-5_9_Fig15_HTML.jpg](A978-1-4842-0466-5_9_Fig15_HTML.jpg)


    图 9-15. 设置认证函数名称


    点击“创建认证方案”。注意


    这里没有使用参数，也没有使用 PL/SQL 分号。这是 APEX 处理自定义认证函数定义的一部分。之前创建的`authenticate_user`函数符合预期的签名：一个返回`BOOLEAN`值的函数，带有两个参数：`p_username
    varchar2(255)`和`p_password varchar2(255)`。


    默认情况下，当你创建一个新的认证方案时，它会自动设置为活动方案。现在你必须使用`USERS`表中存在的用户名和密码来登录你的应用程序。


    运行应用程序，如果显示已登录，请先注销。你可以作为以下任一用户登录：Scott、Doug、Martin、Karen、Patrick 或 Tim；所有密码都是小写的`apress`。


    ## Conditional Security


    APEX 的许多方面都是条件性的。有一对条件特别适用于认证状态：“用户是公共用户”和“用户已认证”。这些条件可以帮助你将 APEX 中的对象限制为仅对公共用户（尚未登录的用户）或认证用户（已登录的用户）可用。


    通过将安全规则应用于“Help Desk”应用程序，你可以通过限制显示对公众不可用的菜单选项来提高可用性。这避免了混淆，并改善了访问应用程序时的整体用户体验。让我们逐步创建这个条件：


    导航到应用程序的“共享组件”区域。在“导航”部分，点击“导航菜单”链接。点击“桌面导航菜单”链接以查看导航菜单条目。通过点击其名称来编辑“Tickets”菜单项。在“条件”部分，将“条件类型”设置为“用户已认证（非公共用户）”，然后点击“应用更改”。图
    [9-16](#A978-1-4842-0466-5_9_Chapter.html#Fig16) 显示了该条件的预期值。


    ![A978-1-4842-0466-5_9_Fig16_HTML.jpg](A978-1-4842-0466-5_9_Fig16_HTML.jpg)


    图 9-16. 设置菜单项条件


    对“Analysis”、“Calendar”、“Chart”和“Admin”菜单项重复步骤 4 和 5。


    现在运行应用程序并点击“注销”链接。“Admin”、“Tickets”、“Analysis”、“Calendar”和“Chart”菜单项应该消失，只留下“Home”菜单项及其子项。再次登录应恢复之前看到的选项卡的显示。


    ## Access Control


    APEX 包含一个内置功能，用于创建包含三个角色（管理员、编辑和查看）的访问控制框架。该向导旨在创建数据结构来存储角色、用于编辑分配的页面以及整个应用程序中使用的授权方案。这个向导使得在应用程序中创建基本安全功能变得非常容易。向导最后一步创建的汇总对象如图
    [9-18](#A978-1-4842-0466-5_9_Chapter.html#Fig18) 所示。


    然而，使用内置的访问控制机制也有缺点。如果你需要的访问控制粒度比管理员、编辑和查看角色所提供的更细，那么你可能需要从头开始创建自己的访问控制机制。对于“Help
    Desk”应用程序，这些角色已经足够。以下是如何在“Help Desk”应用程序中实现访问控制：


    导航到应用程序的应用程序构建器主页，然后点击“创建页面”。选择“访问控制”，然后点击“下一步”。为“管理页面编号”输入`620`，然后点击“下一步”。选择“创建新的导航菜单条目”，允许页面刷新，然后为“新导航菜单条目”输入`Access
    Control`。接着，将“父导航菜单条目”设置为“Admin”，如图 [9-17](#A978-1-4842-0466-5_9_Chapter.html#Fig17)
    所示。点击“下一步”。


    ![A978-1-4842-0466-5_9_Fig17_HTML.jpg](A978-1-4842-0466-5_9_Fig17_HTML.jpg)


    图 9-17. 将页面 620 分配给 Admin 条目下的新菜单条目


    点击“创建”，如图 [9-18](#A978-1-4842-0466-5_9_Chapter.html#Fig18) 所示。


    ![A978-1-4842-0466-5_9_Fig18_HTML.jpg](A978-1-4842-0466-5_9_Fig18_HTML.jpg)


    图 9-18. 作为访问控制向导一部分的对象汇总视图


    随着向导的完成，所有对象都已创建并可供使用。在启用安全实用程序之前，你需要添加一些用户以便使用管理功能。现在运行应用程序，你可能会注意到用户名只是一个开放的文本字段。你应该创建一个值列表（LOV）作为共享组件，其中包含你想要控制访问的所有用户。因为访问控制页面现在是应用程序的一部分，你可以根据需要对其进行更改。为了提高输入数据的质量，将用户字段更新为选择列表：编辑页面
    620。展开“访问控制列表”报表的“列”节点。编辑`ADMIN_USERNAME`列。在“标识”部分，将“类型”设置为“选择列表”。在“值列表”部分，将“类型”设置为“SQL
    查询”，然后在“SQL 查询”文本区域中输入以下 SQL 语句并保存你的更改：

    ```sql

    SELECT user_name d, user_name r

    FROM users

    ```


    当你运行页面 620 时，请注意没有为该页面创建面包屑。你可以按如下方式操作：'
  raw: '## Custom Authentication Schemes


    In the previous section, the script that was imported included definitions for
    tables, triggers, and functions. You will use those elements as part of your custom
    authentication scheme. The key component of the authentication scheme is a function
    that compares the given user name and password to the stored values in the `USERS`
    table. If there is a match, then the user is authenticated. You should review
    the database objects and PL/SQL function code from the SQL Workshop for more details
    on how this is implemented.


    Note


    Although the `USERS` table contains a field named `PASSWORD`, it’s not the actual
    password value; it’s an encrypted hash of the password. Passwords should never
    be stored as plain text.


    Here’s the process to follow to create a custom authentication scheme based on
    the database objects just mentioned:


    Navigate to the Shared Components of the application.   In the Security region,
    click Authentication Schemes as shown in Figure [9-14](#A978-1-4842-0466-5_9_Chapter.html#Fig14).


    ![A978-1-4842-0466-5_9_Fig14_HTML.jpg](A978-1-4842-0466-5_9_Fig14_HTML.jpg)


    Figure 9-14.


    Navigating to the Authentication Schemes shared component   Click the Create button
    at the upper right on the Authentication Schemes screen.   Select Based on a pre-configured
    scheme from the gallery and click Next.   Enter `Custom Authentication Scheme`
    for Name, and then select Custom for Scheme Type. The page refreshes and displays
    different entry options based on the scheme type selected.   In the Settings section,
    enter `authenticate_user` for Authentication Function Name, as shown in Figure
    [9-15](#A978-1-4842-0466-5_9_Chapter.html#Fig15). You don’t need to fill out any
    of the other items in this section.


    ![A978-1-4842-0466-5_9_Fig15_HTML.jpg](A978-1-4842-0466-5_9_Fig15_HTML.jpg)


    Figure 9-15.


    Setting the Authentication Function Name   Click Create Authentication Scheme.
      Note


    No parameters are used here, nor is a PL/SQL semicolon. This is part of the definition
    of how APEX handles custom authentication functions. The `authenticate_user` function
    that was created earlier conforms to the expected signature: a function returning
    a `BOOLEAN` value with two parameters: `p_username varchar2(255)` and `p_password
    varchar2(255)`.


    By default, when you create a new authentication scheme, it’s automatically set
    to be the active scheme. Now you must use the user names and passwords that exist
    in the `USERS` table to log in to your application.


    Run the application, and if it shows that you’re logged in, log out. You can sign
    on as any of the following users: Scott, Doug, Martin, Karen, Patrick, or Tim;
    all passwords are apress in lowercase.


    ## Conditional Security


    Many aspects of APEX are conditional. One pair of conditions is particularly applicable
    to the authentication status: User Is the Public User and User Is Authenticated.
    These conditions can help you limit objects in APEX to be available either to
    public users (those who haven’t logged in) or to authenticated users (those who
    have logged in).


    By applying security rules to the Help Desk application, you can improve usability
    by restricting the display of menu options that aren’t available to the public.
    This avoids confusion and improves the overall user experience when accessing
    the application. Let’s walk through the creation of this condition:


    Navigate to the Shared Components area of the application.   In the Navigation
    section click the Navigation Menu link.   Click the Desktop Navigation Menu link
    to view the Navigation Menu entries.   Edit the Tickets menu item by clicking
    on its name.   In the Condition section, set Condition Type to User is Authenticated
    (not public) and click Apply Changes. Figure [9-16](#A978-1-4842-0466-5_9_Chapter.html#Fig16)
    shows the expected value of the condition.


    ![A978-1-4842-0466-5_9_Fig16_HTML.jpg](A978-1-4842-0466-5_9_Fig16_HTML.jpg)


    Figure 9-16.


    Setting the menu item condition   Repeat steps 4 and 5 for the Analysis, Calendar,
    and Chart, and Admin menu items.  


    Run the application now and click the Logout link. The Admin, Tickets, Analysis,
    Calendar, and Chart menu items should disappear, leaving only the Home menu item
    and its children. Logging in again should restore the display of the tabs as they
    were previously seen.


    ## Access Control


    APEX includes a built-in feature for creating an access-control framework with
    three roles: Administrator, Edit, and View. The wizard is designed to create data
    structures to store the roles, pages to edit the assignments, and authorization
    schemes to be used throughout an application. This wizard makes the job of creating
    basic security capability very easy in an application. The summary of the objects
    created can be seen in Figure [9-18](#A978-1-4842-0466-5_9_Chapter.html#Fig18)
    as the last step in the wizard.


    There are, however, downsides to using the built-in access-control mechanism.
    If you require more granular access control than the Administrator, Edit, and
    View roles provide, then you’re likely going to want to create your own access-control
    mechanisms from scratch. For the Help Desk application, these roles will suffice.
    Here’s how to implement access control in the Help Desk application:


    Navigate to the Application Builder home page for your application and click Create
    Page.   Select Access Control and click Next.   Enter `620` for Administration
    Page Number and click Next.   Select Create a new navigation menu entry, allow
    the page to refresh, and then enter `Access Control` for New Navigation Menu Entry.
    Then, set the Parent Navigation Menu Entry to Admin, as shown in Figure [9-17](#A978-1-4842-0466-5_9_Chapter.html#Fig17).
    Click Next.


    ![A978-1-4842-0466-5_9_Fig17_HTML.jpg](A978-1-4842-0466-5_9_Fig17_HTML.jpg)


    Figure 9-17.


    Assign page 620 to a new menu entry under the Admin entry   Click Create, as shown
    in Figure [9-18](#A978-1-4842-0466-5_9_Chapter.html#Fig18).


    ![A978-1-4842-0466-5_9_Fig18_HTML.jpg](A978-1-4842-0466-5_9_Fig18_HTML.jpg)


    Figure 9-18.


    Viewing the object summary as part of the Access Control wizard With the completion
    of the wizard, all the objects have been created and are available for use. Before
    you enable the security utility, you need to add some users to allow you to use
    the admin functions. Running the application now, you may notice that the user
    name is simply an open text field. You should create a list of values (LOV) as
    a shared component that contains all the users for whom you want to control access.
    Because the access-control page is now part of the application, you can alter
    it as needed. To increase the quality of the data entered, update the user field
    to be a select list:   Edit Page 620.   Expand the Columns node for the Access
    Control List report.   Edit the `ADMIN_USERNAME` column.   In the Identification
    section, set Type to Select List.   In the List of Values section, set the Type
    to SQL Query and then enter the following SQL Statement in the SQL Query text
    area and save your changes: `SELECT user_name d, user_name r` `FROM users`


    When you run page 620, notice that no breadcrumb has been created for the page.
    You can do this as follows:'
  trans: "## 自定义认证方案\n\n在上一节中，导入的脚本包含了表、触发器和函数的定义。你将把这些元素用作自定义认证方案的一部分。该认证方案的关键组件是一个函数，它将给定的用户名和密码与`USERS`表中存储的值进行比较。如果匹配，则用户通过认证。你应该查看\
    \ SQL Workshop 中的数据库对象和 PL/SQL 函数代码，以了解更多关于此实现的细节。\n\n**注意**\n\n虽然`USERS`表包含一个名为`PASSWORD`的字段，但它不是实际的密码值；它是密码的加密哈希。密码永远不应以纯文本形式存储。\n\
    \n以下是根据刚刚提到的数据库对象创建自定义认证方案的流程：\n\n1.  导航到应用程序的“共享组件”。在“安全性”区域，点击“认证方案”，如图 9-14\
    \ 所示。\n\n![A978-1-4842-0466-5_9_Fig14_HTML.jpg](img/A978-1-4842-0466-5_9_Fig14_HTML.jpg)\n\
    \n*图 9-14. 导航到“认证方案”共享组件*\n\n2.  在“认证方案”屏幕的右上角，点击“创建”按钮。从图库中选择“基于预配置方案”，然后点击“下一步”。\n\
    3.  为“名称”输入`Custom Authentication Scheme`，然后为“方案类型”选择“自定义”。页面将刷新，并根据所选的方案类型显示不同的输入选项。\n\
    4.  在“设置”部分，为“认证函数名称”输入`authenticate_user`，如图 9-15 所示。你不需要填写此部分中的其他任何项目。\n\n![A978-1-4842-0466-5_9_Fig15_HTML.jpg](img/A978-1-4842-0466-5_9_Fig15_HTML.jpg)\n\
    \n*图 9-15. 设置认证函数名称*\n\n5.  点击“创建认证方案”。**注意**\n\n这里没有使用参数，也没有使用 PL/SQL 分号。这是 APEX\
    \ 处理自定义认证函数定义的一部分。之前创建的`authenticate_user`函数符合预期的签名：一个返回`BOOLEAN`值的函数，带有两个参数：`p_username\
    \ varchar2(255)`和`p_password varchar2(255)`。\n\n默认情况下，当你创建一个新的认证方案时，它会自动设置为活动方案。现在你必须使用`USERS`表中存在的用户名和密码来登录你的应用程序。\n\
    \n运行应用程序，如果显示已登录，请先注销。你可以作为以下任一用户登录：Scott、Doug、Martin、Karen、Patrick 或 Tim；所有密码都是小写的`apress`。\n\
    \n## 条件性安全\n\nAPEX 的许多方面都是条件性的。有一对条件特别适用于认证状态：“用户是公共用户”和“用户已认证”。这些条件可以帮助你将 APEX\
    \ 中的对象限制为仅对公共用户（尚未登录的用户）或认证用户（已登录的用户）可用。\n\n通过将安全规则应用于“Help Desk”应用程序，你可以通过限制显示对公众不可用的菜单选项来提高可用性。这避免了混淆，并改善了访问应用程序时的整体用户体验。让我们逐步创建这个条件：\n\
    \n1.  导航到应用程序的“共享组件”区域。在“导航”部分，点击“导航菜单”链接。\n2.  点击“桌面导航菜单”链接以查看导航菜单条目。\n3.  通过点击其名称来编辑“Tickets”菜单项。\n\
    4.  在“条件”部分，将“条件类型”设置为“用户已认证（非公共用户）”，然后点击“应用更改”。图 9-16 显示了该条件的预期值。\n\n![A978-1-4842-0466-5_9_Fig16_HTML.jpg](img/A978-1-4842-0466-5_9_Fig16_HTML.jpg)\n\
    \n*图 9-16. 设置菜单项条件*\n\n5.  对“Analysis”、“Calendar”、“Chart”和“Admin”菜单项重复步骤 4 和 5。\n\
    \n现在运行应用程序并点击“注销”链接。“Admin”、“Tickets”、“Analysis”、“Calendar”和“Chart”菜单项应该消失，只留下“Home”菜单项及其子项。再次登录应恢复之前看到的选项卡的显示。\n\
    \n## 访问控制\n\nAPEX 包含一个内置功能，用于创建包含三个角色（管理员、编辑和查看）的访问控制框架。该向导旨在创建数据结构来存储角色、用于编辑分配的页面以及整个应用程序中使用的授权方案。这个向导使得在应用程序中创建基本安全功能变得非常容易。向导最后一步创建的汇总对象如图\
    \ 9-18 所示。\n\n然而，使用内置的访问控制机制也有缺点。如果你需要的访问控制粒度比管理员、编辑和查看角色所提供的更细，那么你可能需要从头开始创建自己的访问控制机制。对于“Help\
    \ Desk”应用程序，这些角色已经足够。以下是如何在“Help Desk”应用程序中实现访问控制：\n\n1.  导航到应用程序的应用程序构建器主页，然后点击“创建页面”。\n\
    2.  选择“访问控制”，然后点击“下一步”。\n3.  为“管理页面编号”输入`620`，然后点击“下一步”。\n4.  选择“创建新的导航菜单条目”，允许页面刷新，然后为“新导航菜单条目”输入`Access\
    \ Control`。\n5.  接着，将“父导航菜单条目”设置为“Admin”，如图 9-17 所示。点击“下一步”。\n\n![A978-1-4842-0466-5_9_Fig17_HTML.jpg](img/A978-1-4842-0466-5_9_Fig17_HTML.jpg)\n\
    \n*图 9-17. 将页面 620 分配给 Admin 条目下的新菜单条目*\n\n6.  点击“创建”，如图 9-18 所示。\n\n![A978-1-4842-0466-5_9_Fig18_HTML.jpg](img/A978-1-4842-0466-5_9_Fig18_HTML.jpg)\n\
    \n*图 9-18. 作为访问控制向导一部分的对象汇总视图*\n\n随着向导的完成，所有对象都已创建并可供使用。在启用安全实用程序之前，你需要添加一些用户以便使用管理功能。现在运行应用程序，你可能会注意到用户名只是一个开放的文本字段。你应该创建一个值列表（LOV）作为共享组件，其中包含你想要控制访问的所有用户。因为访问控制页面现在是应用程序的一部分，你可以根据需要对其进行更改。为了提高输入数据的质量，将用户字段更新为选择列表：\n\
    \n1.  编辑页面 620。\n2.  展开“访问控制列表”报表的“列”节点。\n3.  编辑`ADMIN_USERNAME`列。\n4.  在“标识”部分，将“类型”设置为“选择列表”。\n\
    5.  在“值列表”部分，将“类型”设置为“SQL 查询”，然后在“SQL 查询”文本区域中输入以下 SQL 语句并保存你的更改：\n    ```sql\n\
    \    SELECT user_name d, user_name r\n    FROM users\n    ```\n\n当你运行页面 620 时，请注意没有为该页面创建面包屑。你可以按如下方式操作："
