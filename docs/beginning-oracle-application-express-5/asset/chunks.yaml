    to do the corresponding database transactions.


    However, you still need to do a few things to page `610` in order for it to display
    the breadcrumbs properly:


    1.  Navigate to the `Shared Components` region for your application.

    2.  In the `Navigation Section`, click the `Breadcrumbs` link.

    3.  Click the `Breadcrumb` icon to view all of the breadcrumb entries.


    Viewing the breadcrumb entries, we can see that, while there is an entry for page
    `600`, there is no entry for page `610`. We’ll need to add that manually:


    1.  Click the `Create Breadcrumb Entry` button in the upper-right part of the
    page.

    2.  In the `Breadcrumb` section, enter `610` for `Page`.

    3.  In the `Entry` section, select `Users (Page 600)` as the `Parent Entry` and
    then enter `Manage Users` for the `Short Name`.

    4.  In the `Target` section, enter `610` for `Page`.


    These entries are shown in Figure [9-11](#A978-1-4842-0466-5_9_Chapter.html#Fig11).


    ![A978-1-4842-0466-5_9_Fig11_HTML.jpg](A978-1-4842-0466-5_9_Fig11_HTML.jpg)


    Figure 9-11. Entering the breadcrumb details for page 610


    At the top of the page, click `Create Breadcrumb Entry`. When you’re finished,
    page `610` has a `Shared Components` breadcrumb entry just like page `600`. Running
    the application shows a breadcrumb entry for both the Users report page and the
    Manage Users page, as shown in Figure [9-12](#A978-1-4842-0466-5_9_Chapter.html#Fig12).


    ![A978-1-4842-0466-5_9_Fig12_HTML.jpg](A978-1-4842-0466-5_9_Fig12_HTML.jpg)


    Figure 9-12. Showing the breadcrumb entry for the Manage Users page


    Finally, you need to change the item type of `P610_PASSWORD` to `Password`, so
    it accepts a user’s input but displays asterisk (`*`) characters as the password
    is typed. This item type is designed not to retrieve data when a record is edited,
    despite being bound to a database column. Also, the item type doesn’t save any
    value in session state, meaning it doesn’t remember the value entered after the
    page processing is complete. This is a security feature to prevent data identified
    as a password from being retrieved inappropriately.


    Here are the steps:


    1.  Edit Page `610`.

    2.  Edit the item `P610_PASSWORD`.

    3.  In the `Properties Editor`, set `Type` to `Password`, as shown in Figure [9-13](#A978-1-4842-0466-5_9_Chapter.html#Fig13).


    ![A978-1-4842-0466-5_9_Fig13_HTML.jpg](A978-1-4842-0466-5_9_Fig13_HTML.jpg)


    Figure 9-13. Setting the `P610_PASSWORD` element to a password field


    Although you want a password to be required when creating a new account, if the
    admin user doesn’t enter a password while editing an existing user, you want the
    system to keep the current password. Because of this, you need to set the `Value
    Required` attribute of the password field to `NO` and instead implement a validation
    that only fires when you’re creating a new user:


    1.  In the `Validating` section of `P610_PASSWORD`, set the `Value Required` attribute
    to `NO`.

    2.  While editing Page `610`, right-click `P610_PASSWORD`, and select `Create
    Validation`.

    3.  In the `Properties Editor`, set `Name` to `P610_PASSWORD Is Not Null`.

    4.  In the `Validation` Section, select `Item is Not Null` as `Type` and set `Item`
    to `P610_PASSWORD`.

    5.  Enter `A password must be specified.` for `Error Message`.

    6.  In the `Condition` section, set `When Button Pressed` to `CREATE`.

    7.  Save your changes.


    This completes the navigation and UI part of the security scheme you’re implementing.
    With the navigation and maintenance in place, you can now implement the authentication
    scheme that will use the information.


    ## Authentication


    The key to making a secure application is to understand whom the accessing user
    is. APEX refers to this as authentication. Authentication answers the question,
    “Who are you?” The APEX tool provides a series of predefined authentication mechanisms,
    including a built-in authentication framework and an extensible custom framework.
    At design time, it’s easy to switch between authentication methods by setting
    the active scheme. There can be only one active authentication scheme at a time
    for an application. The following are the major types of authentication schemes:


    *   `Application Express Accounts`: Users are managed in the APEX workspace and
    are maintained just like workspace developer accounts.

    *   `LDAP Directory`: The user is an existing LDAP-compliant server such as Active
    Directory or Oracle Internet Directory.

    *   `Oracle Application Server Single Sign On`: Authentication can pass between
    APEX and an existing Oracle SSO server. Logging into the SSO server once passes
    the same credentials to all APEX applications.

    *   `Database Accounts`: Database user names and passwords determine authentication.
    Don’t confuse this with data access in an APEX application.

    *   `HTTP Header Variable`: This approach supports the use of HTTP header variables
    to identify a user and to create an Application Express user session.

    *   `Custom`: Logic is determined by the developer. An example of usage is for
    Internet-facing applications where self-registration may be desired. Another example
    is when more than one authentication source is used simultaneously, such as using
    two LDAP servers.

    *   `Open Door`: Developer testing simulates logging in as different individuals.
    This isn’t intended to be used as a public authentication scheme.

    *   `No Authentication`: This option is intended to allow all parts of the application
    to be reachable without needing a user to log in.


    Each application has its own set of authentication schemes managed as part of
    its `Shared Components`. Authentication schemes can be copied between applications
    when needed. This ability to copy is especially useful when a custom authentication
    scheme has been developed and is desired in more than one application. The authentication
    schemes also utilize the APEX subscription framework to allow a master copy to
    be applied to subscribers inside of a single workspace.'
