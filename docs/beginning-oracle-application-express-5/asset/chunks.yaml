  trans: '

    ## 列表


    ### 列表：定义与类型


    顾名思义，列表是 `APEX` 用来保存链接数据集合的一种结构。列表结构使得菜单能够在众多应用页面间保持一致的显示，且易于在应用的 `共享组件` 区域进行维护。请不要将我们在此讨论的导航列表与值列表（`LOVs`）混淆。列表是一种内置了用于以不同方式显示信息的模板的导航结构。`LOVs`
    则用于支持数据输入，限制用户可以输入的选项。


    列表有两种类型：静态和动态。静态列表由列表项组成，这些项不是数据驱动的，而是在设计时由开发者输入的。动态列表基于数据，返回到列表中的值基于一个 `SQL`
    查询。


    ### 列表模板与自定义


    列表模板功能强大。它们支持层级列表、图形项目符号、动态 `HTML` 以及当前页面的高亮显示。列表可以包含具有父子关系的数据；一些列表模板是专门为显示父子数据而设计的。`APEX`
    主题包含多种列表模板，但如果你需要的行为尚未提供，你可以修改或创建自己的列表模板，以按需显示和运作。


    ### 通用主题中的列表


    如本章前文简要提及，新的通用主题使用静态列表代替选项卡进行导航。会创建一个名为 `Desktop Navigation List` 的列表来存放站点的导航，并使用通用主题中内置的一个特殊
    `List` 模板来显示该列表，具体取决于一些应用级属性。


    无论使用列表还是选项卡，当你通过页面创建向导进行操作时，`APEX` 都会询问你是否希望为正在创建的页面创建一个导航条目。如果你在使用通用主题时选择创建一个新的导航条目，系统会为你创建一个新的列表项。


    ### 手动创建列表项


    尽管我们可以让页面创建向导为我们创建所有列表项，但你将为尚不存在的页面在列表中手动创建两个条目，以演示如何手动完成。别担心——你将在接下来的几章中创建这些页面。请遵循以下步骤：


    1.  导航到应用的 `共享组件` 部分。

    2.  找到并点击 `导航` 下的 `列表` 条目。

    3.  在结果报告中找到并点击 `Desktop Navigation Menu` 列表。

    4.  要创建新的列表项，请点击 `图 5-47` 中所示的 `创建列表项` 按钮。


    ![A978-1-4842-0466-5_5_Fig47_HTML.jpg](img/A978-1-4842-0466-5_5_Fig47_HTML.jpg)

    `图 5-47`. 创建新的列表项


    生成的页面展示了列表项的所有可用选项。列表结构内置了许多功能。你感兴趣的关键项显示在 `表 5-1` 中。请使用 `表 5-1` 中的值填写 `图 5-48`
    和 `5-49` 所示的页面。其他值保持默认。


    ![A978-1-4842-0466-5_5_Fig49_HTML.jpg](img/A978-1-4842-0466-5_5_Fig49_HTML.jpg)

    `图 5-49`. 目标定义


    ![A978-1-4842-0466-5_5_Fig48_HTML.jpg](img/A978-1-4842-0466-5_5_Fig48_HTML.jpg)

    `图 5-48`. 选择父列表项并设置标签


    `表 5-1`. 第一个列表项使用的值


    | `部分` | `值` | `条目` |

    | --- | --- | --- |

    | `条目` | `父项` | `Home` |

    |   | `列表项标签` | `提交工单` |

    | `目标` | `页面` | `2` |

    |   | `清除缓存` | `2` |


    完成第一个列表项的条目后，滚动到页面顶部并点击 `创建并创建另一个` 按钮。这将带你返回同一页面，并允许你添加另一个列表项。使用 `表 5-2` 中的信息创建第二个列表项。


    `表 5-2`. 第二个列表项使用的值


    | `部分` | `值` | `条目` |

    | --- | --- | --- |

    | `条目` | `父项` | `Home` |

    |   | `列表项标签` | `联系我们` |

    | `目标` | `页面` | `3` |

    |   | `清除缓存` | `3` |


    点击 `创建列表项` 以保存你的更改。


    你现在应该有一个包含三个条目的列表，如 `图 5-50` 所示。`列表详情` 选项卡在一个视图中显示了一些重要信息。`序号` 值标识了使用无序列表类型时项目的列出顺序。一些列表类型被归类为有序，在这种情况下，它们会按名称字母顺序排序。`目标`
    值是一个 `URL` 的构造，它包含要导航到的页面以及清除缓存的指令。几种声明性表单会根据提供的输入构造 `URL`，其方式与列表项相同。


    ![A978-1-4842-0466-5_5_Fig50_HTML.jpg](img/A978-1-4842-0466-5_5_Fig50_HTML.jpg)

    `图 5-50`. 列表项一览


    列表作为一个共享组件（除非它被指定为 `UI` 的默认导航列表），不会直接显示在应用程序中。通常，必须在页面上配置一个列表区域，用户才能看到该列表。`APEX`
    有一个专门定义的模板类型来支持列表。列表模板包含了动态列表所需的所有智能以及显示选项。当你创建列表区域时，可以设置模板选择，并且可以通过区域设置进行修改。


    在我们的例子中，你创建的列表项将作为通用主题的一部分，显示在导航列表区域中。


    现在运行你的应用程序，你应该能看到你创建的列表项出现在屏幕左侧，作为 `导航` 菜单的一部分（`图 5-51`）。点击任一链接都会产生应用程序错误。这是预期的：你要求应用程序链接到尚不存在的页面。


    ![A978-1-4842-0466-5_5_Fig51_HTML.jpg](img/A978-1-4842-0466-5_5_Fig51_HTML.jpg)

    `图 5-51`. 包含新列表项的导航菜单


    ## 值列表


    基于数据库架构编写应用程序的一个基本好处是能够强制执行数据质量。`LOVs` 是一种可以映射到不同项类型的 `APEX` 组件，包括 `选择列表`、`多选列表`、`复选框`
    和 `单选组`。这类结构有助于确保通过事务收集的数据是一致的。与列表类似，`APEX` 中也有两种类型的 `LOVs`：


    *   静态：在 `APEX` 中定义的一组固定选项

    *   动态：基于通过 `SQL` 从数据库返回的数据


    `LOVs` 可以在应用级别或项级别定义为共享组件。`图 5-52` 展示了一个静态 `LOV` 的项级别属性定义。一个使用超过一次的 `LOV` 应该被编写为共享组件。这允许在
    `共享组件` 中对该 `LOV` 进行集中维护。如果一个 `LOV` 是在项级别创建的，可以使用 `APEX` 提供的实用程序轻松将其转换为共享 `LOV`。在查看
    `LOV` 共享组件时，本地定义的 `LOV` 可以被编辑并转换为共享组件 `LOV`。


    ![A978-1-4842-0466-5_5_Fig52_HTML.jpg](img/A978-1-4842-0466-5_5_Fig52_HTML.jpg)

    `图 5-52`. 一个具有静态选项的项级别 `LOV`

    '
- fmt: '# 6. Forms and Reports: The Basics


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​6](http://dx.doi.org/10.1007/978-1-4842-0466-5_6))
    contains supplementary material, which is available to authorized users.


    Now that you have the database objects and the base application in place, you
    can get to the real work of building pages in your application. Most applications
    contain a series of forms, reports, charts, and other elements designed to display,
    edit, and collect data.


    This chapter focuses on basic forms and reports. These are the simplest, most
    standard types of forms and reports in APEX. They’re most often created by using
    the APEX wizards, which create all the elements of a form or report for you.


    In the sections that follow, you will learn how to use the APEX wizards to add
    pages to your Help Desk application. You will create some basic forms and reports
    on the `Tickets` table; you will also look at the elements created by the wizards
    for your working forms and reports.


    ## Static List of Values


    A static list of values is simply a set of display and return value pairs. This
    type of list is normally short and unchanging. When you define a static list of
    values at the item level, there are two types of data options:


    *   `STATIC`: Entries are automatically alphabetized.

    *   `STATIC2`: Entries render in the order in which they’re entered.


    The syntax for specifying a static LOV is as follows:


    `TYPE:DISPLAY;RETURN,DISPLAY;RETURN,...`


    The `TYPE` may be either `STATIC` or `STATIC2`.


    If you wish the display value and the return value for a given entry to be the
    same, omit the semicolon and specify only one value. For example, the second item
    in the following example is a single value for both display and return:


    `TYPE: VALUE1,VALUE2,VALUE3,...`


    The return value in an LOV is saved as the value of the associated form item.
    In static lists, using the semicolon as the value of an entry may cause issues
    with parsing the list.


    The following is an example of a static list. Commas separate the list items.
    Each list item is composed of a display value and a return value, with a semicolon
    separating those two values:


    `STATIC:C;1,A;2,D;3,B;4,`


    When you display the values in this list, you see only the display values. Because
    the list is type `STATIC`, the values are displayed in alphabetical order:


    `A`


    `B`


    `C`


    `D`


    Next is an example of a `STATIC2` list. Notice that the entries are specified
    in the same order as before:


    `STATIC2:C;1,A;2,D;3,B;4,`


    However, this time the values are displayed in their order of definition. They
    are not sorted alphabetically:


    `C`


    `A`


    `D`


    `B`


    Shared-component static LOVs have more options than item-level static LOVs. Due
    to their shared nature, conditions and build options can be configured. These
    can be edited after the list has been created. Because the lists are stored differently
    as shared components, it’s possible to use a semicolon in the item value.


    ## Dynamic List of Values


    As with static LOVs, dynamic LOVs have a display and return value pair requirement.
    The difference is that the values are obtained through an SQL query. The SQL query
    you write must return two columns. If the columns are the same, you need to use
    aliases to distinguish a display value and a return value. You must also use an
    alias if you’re using a concatenated string as a column. Dynamic LOVs can also
    use session variables or values currently being used in the application. This
    gives dynamic LOVs flexibility to dynamically change what is offered during runtime.


    The example application needs two LOVs to support the selection of user names.
    In preparation for building your form pages, create an LOV to support the names
    of the users and the technicians in your Help Desk system:


    Navigate to the Shared Components section of the Help Desk application, then go
    to the Other Components section shown in Figure [5-53](#A978-1-4842-0466-5_5_Chapter.html#Fig53),
    and click the Lists of Values link.


    ![A978-1-4842-0466-5_5_Fig53_HTML.jpg](A978-1-4842-0466-5_5_Fig53_HTML.jpg)


    Figure 5-53. Other Components options


    Click the Create button to create a new LOV.


    Choose From Scratch as the method of creating your LOV, as shown in Figure [5-54](#A978-1-4842-0466-5_5_Chapter.html#Fig54).


    ![A978-1-4842-0466-5_5_Fig54_HTML.jpg](A978-1-4842-0466-5_5_Fig54_HTML.jpg)


    Figure 5-54. Creating an LOV from scratch


    Click Next.


    Enter `TECHS` as the Name value and choose Static as the Type, as shown in Figure
    [5-55](#A978-1-4842-0466-5_5_Chapter.html#Fig55).


    ![A978-1-4842-0466-5_5_Fig55_HTML.jpg](A978-1-4842-0466-5_5_Fig55_HTML.jpg)


    Figure 5-55. Specifying a list as static


    Click Next.


    Enter the values shown in Table [5-3](#A978-1-4842-0466-5_5_Chapter.html#Tab3)
    into the form. Add your own name to the list!


    Table 5-3. Display Attributes for the LOV


    | Display Value | Return Value |

    | --- | --- |

    | Scott | SCOTT |

    | Doug | DOUG |

    | Karen | KAREN |

    | Martin | MARTIN |

    | Patrick | PATRICK |

    | Tim | TIM |

    | (Your Login Name) | (YOUR LOGIN NAME) |


    Click Create List of Values when you’re finished. Now that you’ve created a static
    LOV, let’s include a second one that uses an SQL query to derive the list of values:


    Repeat steps 1 through 4.


    Create a second list named USERS, selecting the Dynamic option. Click Next.


    Locate the book supplemental file `ch5_lov.txt` that includes the SQL query text.
    Enter the SQL query for the LOV source.


    Click Create List of Values.


    You should now have two LOVs. Don’t worry if you made a mistake. All the settings
    can be modified—simply click the name of the LOV you want to modify.


    ## Summary


    In this chapter, you created the basic shell of an application and several of
    the supporting objects that you will use in the upcoming chapters. These items
    have been created as a result of planning that was done prior to starting to create
    the application. Depending on your situation, the amount of planning you do for
    your own application will vary. The shared components outlined here can be created
    at any time during the development process. In the next section, you will start
    using some of the key structures outlined here.'
  raw: '### Static List of Values


    A static list of values is simply a set of display and return value pairs. This
    type of list is normally short and unchanging. When you define a static list of
    values at the item level, there are two types of data options:


    *   `STATIC`: Entries are automatically alphabetized.

    *   `STATIC2`: Entries render in the order in which they’re entered.


    The syntax for specifying a static LOV is as follows:


    `TYPE:DISPLAY;RETURN,DISPLAY;RETURN,...`


    The `TYPE` may be either `STATIC` or `STATIC2`.


    If you wish the display value and the return value for a given entry to be the
    same, omit the semicolon and specify only one value. For example, the second item
    in the following example is a single value for both display and return:


    `TYPE: VALUE1,VALUE2,VALUE3,...`


