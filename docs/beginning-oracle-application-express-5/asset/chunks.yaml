    ## 用户维护数据录入


    作为服务台设计的一部分，你应该能够从应用程序中维护用户。为此，你需要实现一些新的数据库对象。


    上传并运行脚本 `ch9_security_objects.sql`。如需分步指导，请参阅第 4 章。你应该看到 13 行结果，全部成功完成。我们简要说明一下这个脚本为你做了什么：


    第 1–16 行：创建一个名为 `hash_password` 的函数，用于对传入的任何字符串进行编码。

    第 18–24 行：创建将用于保存用户记录的 `USERS` 表。

    第 26–27 行：创建 `USER_SEQ` 序列，该序列将用作 `USERS` 表的主键。

    第 29–37 行：在 `USERS` 表上创建一个插入前触发器，该触发器自动分配下一个序列值作为主键，将用户名转换为大写，并调用 `hash_password`
    函数对用户密码进行加密。

    第 39–50 行：创建一个更新前触发器，将用户名转换为大写，如果密码已更改，则对其进行哈希处理。

    第 52–87 行：创建 `authenticate_user` 函数，用于验证传入的用户名和密码与 `USERS` 表中的现有记录是否匹配。

    第 90–103 行：在 `USERS` 表中创建六个条目，所有密码均为 apress。


    现在你已经拥有了新的数据库对象，可以继续实现安全模型：编辑应用程序的第 600 页。单击“创建”按钮并选择“表单区域”来创建一个新区域。选择“基于表的表单（含报表）”并单击“下一步”。由于该报表实际上相当小且包含的列非常少，将其创建为交互式报表可能有些过度，因此在此情况下请坚持使用经典报表：将“实现方式”设置为“经典”。输入
    `Users` 作为区域标题，并将区域模板设置为“标准”。设置如图 9-7 所示。


    ![A978-1-4842-0466-5_9_Fig7_HTML.jpg](img/A978-1-4842-0466-5_9_Fig7_HTML.jpg)


    图 9-7. 报表页面设置


    单击“下一步”。将“表/视图所有者”设置为你的模式名称，并将“表/视图名称”设置为 Users（表），如图 9-8 所示。


    ![A978-1-4842-0466-5_9_Fig8_HTML.jpg](img/A978-1-4842-0466-5_9_Fig8_HTML.jpg)


    图 9-8. 设置所有者和表名


    单击“下一步”。选择 `USER_ID` 和 `USER_NAME` 作为要在报表中显示的列。通过将其穿梭到左侧来移除 `PASSWORD` 列，然后单击“下一步”。选择任意编辑链接图像，然后单击“下一步”。为“页码”输入
    `610`，为“页面名称”和“区域标题”输入 `Manage Users`，如图 9-9 所示。单击“下一步”。


    ![A978-1-4842-0466-5_9_Fig9_HTML.jpg](img/A978-1-4842-0466-5_9_Fig9_HTML.jpg)


    图 9-9. 定义“管理用户”表单的名称


    将“主键类型”设置为“选择主键列”，页面刷新后，为“主键列 1”选择 `USER_ID`。单击“下一步”。为“主键源”选择“现有触发器”，然后单击“下一步”。选择
    `USER_NAME` 和 `PASSWORD` 作为表单上可编辑的列，如图 9-10 所示，然后单击“下一步”。


    ![A978-1-4842-0466-5_9_Fig10_HTML.jpg](img/A978-1-4842-0466-5_9_Fig10_HTML.jpg)


