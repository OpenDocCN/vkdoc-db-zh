  trans: '### 选择标签选项


    标签页是 Web 应用程序中常见的导航结构，传统的 APEX 主题从很早的版本就已支持它们。它们为切换应用程序中的主题或通用区域提供了一个直观的界面。有三种选项可供选择：


    *   **无标签页**：这是一种基本的页面样式，向导不生成任何标签页，页面模板也不显示标签页。这通常被用于小型应用程序，或导航由其他方式（如列表、按钮或其他模板结构）管理的应用程序。

    *   **一级标签页**：这是最常见的标签页布局样式；它适用于功能需要分离但又易于访问的中小型应用程序。这也是最易于管理的标签页样式类型。

    *   **二级标签页**：二级标签页的构建使用一个父标签页结构，并将标准标签页划分为标签页组。这类似于有一个控制标签页。


    APEX 中的传统主题在其提供的显示模板中最多支持两级标签页，并且向导会在向导过程中构建标签页组的共享组件。如果你了解应用程序的页面大纲，并能在创建应用程序时进行布局，向导将完成大部分的标签页设置工作。如果应用程序设计需要大量标签页，在创建时设计页面可以节省大量时间。无论如何，你都可以在初次运行**创建应用程序**向导后创建和修改共享组件。


    **注意**

    新的**通用主题**不使用标签页进行导航，而是使用嵌套的静态列表。因此，当你选择使用**通用主题**时，向导的**应用程序属性**页面上的**标签页**选项将不会出现。


    ### 全球化选项


    向导中的认证步骤还包括六个附加设置，如图 5-13 所示。其中一些设置与将应用程序翻译为其他语言的能力有关。多语言应用程序超出了本书的范围，但为了完整性，这里包含了这些选项的一般使用说明。


    ![A978-1-4842-0466-5_5_Fig13_HTML.jpg](img/A978-1-4842-0466-5_5_Fig13_HTML.jpg)

    *图 5-13. “创建应用程序”向导的“属性”页面*


    这些设置如下：


    *   **语言**：这是应用程序默认使用的语言。在多语言应用程序的情况下，它也用作任何国际化和翻译的基础。

    *   **用户语言偏好来源**：对于多语言应用程序，此设置决定了应用程序如何获取所需的翻译。

    *   **日期格式**：此选项设置应用程序内日期元素的默认格式。世界不同地区对于日期格式的表示方式有不同的习惯，特别是当它们是严格的数字值时。一种常用于尝试缓解此问题的格式是
    `DD-MON-YYYY` 格式。这种格式明确表示了哪部分代表日、月、年（例如，`01-JAN-2010`）。

    *   **日期时间格式**：此选项设置包含时间维度的日期的默认格式。

    *   **时间戳格式**：此选项指定整个应用程序中使用的时间戳数据类型的格式。

    *   **时间戳时区格式**：此选项指定整个应用程序中使用的带时区数据的时间戳数据类型的格式。


    向导使用这些设置作为起始值。你可以在应用程序的共享组件中根据需要更改它们。


    语言、日期格式设置和时区处理被归类为全球化设置。应用程序创建后，你可以开启自动时区检测；该设置位于**应用程序设置**的**全球化**选项卡中。自动时区检测对于用户分布在不同时区的应用程序尤其有用。


    按如下方式继续创建示例应用程序：


    1.  将**认证方案**设置为**Application Express**，**语言**设置为**English (en)**，**用户语言偏好来源**设置为**应用程序主语言**。

    2.  选择 `12-JAN-2004`（返回 `DD-MON-YYYY`）作为**日期格式**，选择 `12-JAN-2004 14:30:00`（返回
    `DD-MON-YYYY HH:MI:SS`）作为**日期时间格式**，并将最后两个选项留空。

    3.  点击**下一步**。


    #### 完成创建应用程序向导


    向导的最后一步是一个简单的确认对话框。点击图 5-14 中看到的**创建应用程序**按钮将提交所有设置并生成应用程序。**上一步**按钮允许你在完成过程之前回溯向导以进行任何其他更改。


    ![A978-1-4842-0466-5_5_Fig14_HTML.jpg](img/A978-1-4842-0466-5_5_Fig14_HTML.jpg)

    *图 5-14. 完成“创建应用程序”向导*


    通过执行流程的最后一步来完成示例应用程序的创建：


    1.  查看向导的摘要页面，并通过点击**创建应用程序**来确认你所做的选择。


    现在你已经有了一个只有两个页面的简单应用程序，如图 5-15（查看报告视图）所示。运行该应用程序，你应该会看到图 5-16 所示的登录页面。该登录页面需要你输入正常的
    APEX 开发者用户名和密码。登录后，你将进入应用程序的**主页**，如图 5-17 所示。


    ![A978-1-4842-0466-5_5_Fig17_HTML.jpg](img/A978-1-4842-0466-5_5_Fig17_HTML.jpg)

    *图 5-17. 登录后的应用程序*


    ![A978-1-4842-0466-5_5_Fig16_HTML.jpg](img/A978-1-4842-0466-5_5_Fig16_HTML.jpg)

    *图 5-16. 运行应用程序时的登录提示*


    ![A978-1-4842-0466-5_5_Fig15_HTML.jpg](img/A978-1-4842-0466-5_5_Fig15_HTML.jpg)

    *图 5-15. 服务台应用程序的生成页面*


    现在应用程序的框架已经创建完成，你可以继续通过添加其他页面、区域和项目来扩展它。'
- fmt: '## Static Content Regions


    静态内容区域类型是最基本但也是最灵活的区域类型之一。通过操作静态内容区域的属性（如图 [5-18](#A978-1-4842-0466-5_5_Chapter.html#Fig18)
    所示），你可以控制该区域的显示方式：


    *   `Output As`: 选择 `HTML` 会将区域源中输入的任何标记解释为HTML并呈现结果输出。选择 `Text (escape special
    characters)` 会在将区域源输出到页面时转义（不解释）特殊字符，如 `<`、`>`、`&`。例如：`<br />` 将显示为代码 `<br />`，而不是被解释为换行符。

    *   `Expand Shortcuts`: 启用或禁用对快捷键技术的支持。该技术包括一个共享组件对象，可用于使用 `SHORTCUT_NAME` 语法管理一种变量。


    ![A978-1-4842-0466-5_5_Fig18_HTML.jpg](A978-1-4842-0466-5_5_Fig18_HTML.jpg)


    图 5-18. 查看静态内容区域的属性


    静态内容区域的简单性带来了广泛的用途。静态内容区域是一个容器，可以拥有自己的值、嵌入的JavaScript或CSS定义，也可以包含其他页面项目。输入源中的任何有效HTML都会在APEX页面上呈现。替换字符串语法，如
    `&ITEM_NAME.`，也可以用于在源文本中显示项目值。


    继续处理帮助台应用程序，向第一页添加一些内容：


    ### 导航至应用程序构建器并编辑应用程序


    导航到应用程序构建器，并编辑帮助台应用程序。根据您查看应用程序报告的方式，您可能需要点击如图 [5-19](#A978-1-4842-0466-5_5_Chapter.html#Fig19)
    所示的图标，或点击应用程序的名称，如图 [5-20](#A978-1-4842-0466-5_5_Chapter.html#Fig20) 所示。


    ![A978-1-4842-0466-5_5_Fig20_HTML.jpg](A978-1-4842-0466-5_5_Fig20_HTML.jpg)


    图 5-20. 从报告视图编辑帮助台应用程序


    ![A978-1-4842-0466-5_5_Fig19_HTML.jpg](A978-1-4842-0466-5_5_Fig19_HTML.jpg)


    图 5-19. 从图标视图编辑帮助台应用程序


    ### 编辑主页


    通过点击报告中页面名称的链接来编辑主页，如图 [5-21](#A978-1-4842-0466-5_5_Chapter.html#Fig21) 所示。


    ![A978-1-4842-0466-5_5_Fig21_HTML.jpg](A978-1-4842-0466-5_5_Fig21_HTML.jpg)


    图 5-21. 编辑主页


    ### 添加静态内容区域


    从屏幕下部中心的库中，为组件类型选择 `Regions`。


    点击并拖动库中的 `Static Content` 图标到屏幕的网格布局部分，并将组件放置在 `Content Body` 内容区域中，如图 [5-22](#A978-1-4842-0466-5_5_Chapter.html#Fig22)
    所示。


    ![A978-1-4842-0466-5_5_Fig22_HTML.jpg](A978-1-4842-0466-5_5_Fig22_HTML.jpg)


    图 5-22. 将静态内容组件拖到内容主体区域


    放置组件后，视图将发生变化，显示新区域在网格布局中的位置，并在树状窗格和网格布局中被选中为当前项，如图 [5-23](#A978-1-4842-0466-5_5_Chapter.html#Fig23)
    所示。


    ![A978-1-4842-0466-5_5_Fig23_HTML.jpg](A978-1-4842-0466-5_5_Fig23_HTML.jpg)


    图 5-23. 页面设计器中显示的新静态内容区域


    ### 编辑新区域的属性


    现在，编辑新区域的属性：


    在属性窗格的“标识”部分，将 `Title` 设置为 `APEX Issue Tracker`。


    在属性窗格的“源”部分，为 `Text` 输入以下内容，然后点击页面顶部的 `Save` 按钮。参见图 [5-24](#A978-1-4842-0466-5_5_Chapter.html#Fig24)。


    ![A978-1-4842-0466-5_5_Fig24_HTML.jpg](A978-1-4842-0466-5_5_Fig24_HTML.jpg)


    图 5-24. 输入标题和文本并保存工作


    ```

    <h1>Welcome to the APEX Issue Tracking System</h1>

    <br />Select an option from the list

    ```


    ### 运行页面


    通过点击页面设计器顶部的 `Run` 按钮来运行页面。您应该看到刚刚所做的更改，表现为一个包含友好欢迎消息的新区域。您的结果应与图 [5-25](#A978-1-4842-0466-5_5_Chapter.html#Fig25)
    所示相似。


    ![A978-1-4842-0466-5_5_Fig25_HTML.jpg](A978-1-4842-0466-5_5_Fig25_HTML.jpg)


    图 5-25. 添加静态内容区域后的结果


    ## Public Pages


    如前所述，可以允许整个应用程序不使用任何认证方案。但是，如果您希望某些页面需要认证，而另一些页面是公开的呢？如何制作一个不需要登录即可查看的页面？


    如果应用程序中的任何页面需要认证，则必须对整个应用程序应用适当的身份验证方案。APEX 允许您使用页面的定义属性将各个页面定义为 `Public` 或 `Requires
    Authentication`。每个页面可以有不同的安全要求（授权），但一个应用程序只能应用一种身份验证机制。公共页面对于介绍性的登陆页面、登录页面和信息页面非常有用。


    在帮助台项目中，您希望主页面对所有访问者可用。为此，您可以修改应用程序的第一页，允许任何人查看而无需身份验证。通过以下步骤完成：


    ### 导航至页面 1 并编辑页面属性


    在帮助台应用程序中，导航至并编辑第 1 页。


    在树状窗格中，通过点击渲染树中的页面名称 (`Home`) 来编辑页面属性。页面名称显示为树的根节点，如图 [5-26](#A978-1-4842-0466-5_5_Chapter.html#Fig26)
    所示。


    ![A978-1-4842-0466-5_5_Fig26_HTML.jpg](A978-1-4842-0466-5_5_Fig26_HTML.jpg)


    图 5-26. 在渲染树中选择页面节点


    ### 将页面设置为公共


    在属性窗格中，滚动到“安全”部分，如图 [5-27](#A978-1-4842-0466-5_5_Chapter.html#Fig27) 所示。在此部分，将
    `Authentication` 更改为 `Page Is Public`。


    ![A978-1-4842-0466-5_5_Fig27_HTML.jpg](A978-1-4842-0466-5_5_Fig27_HTML.jpg)


    图 5-27. 更改页面的身份验证设置


    ### 保存更改


    在页面顶部，点击 `Save`。


    现在，当运行页面时，请求第 1 页将不会出现身份验证屏幕。您将在[第 9 章](#A978-1-4842-0466-5_9_Chapter.html)中了解更多关于身份验证和授权的信息。目前，只需知道您所做的更改允许用户在未登录的情况下查看应用程序的第一页。'
  raw: '## Static Content Regions


    The Static Content region type is one of the most basic and yet most flexible
    types of region. By manipulating the attributes of a Static Content region, as
    shown in Figure [5-18](#A978-1-4842-0466-5_5_Chapter.html#Fig18), you can control
    how that region is displayed:


    *   Output As: Selecting `HTML` will interpret any markup as entered in the region
    source as HTML and will render the resulting output. Selecting `Text (escape special
    characters)` will escape (not interpret) special characters such as `<`, `>`,
    & when emitting the region source to the page. Example: `<br />` will show up
    exactly as the code `<br />` rather than being interpreted as a break or return.

    *   Expand Shortcuts: Enables or disables support for shortcut technology. This
    technology includes a shared component object that can be used for managing a
    type of variable using `SHORTCUT_NAME` syntax.


    ![A978-1-4842-0466-5_5_Fig18_HTML.jpg](A978-1-4842-0466-5_5_Fig18_HTML.jpg)


    Figure 5-18.


    Viewing the attributes of a Static Content region


    With the Static Content region’s simplicity comes a wide variety of uses. A Static
    Content region is a container that can have its own value, embedded JavaScript,
    or CSS definitions, or it can contain other page items. Any valid HTML entered
    in the source is rendered on an APEX page. Substitution-string syntax, such as
    `&ITEM_NAME.`, can also be used to display item values in the source text.


    Continuing with the Help Desk application, add some content to the first page:


    Navigate to the Application Builder, and Edit the Help Desk application. Depending
    on how you’re viewing the applications report, you may need to click the icon
    as shown in Figure [5-19](#A978-1-4842-0466-5_5_Chapter.html#Fig19) or click the
    name of the application as shown in Figure [5-20](#A978-1-4842-0466-5_5_Chapter.html#Fig20).


    ![A978-1-4842-0466-5_5_Fig20_HTML.jpg](A978-1-4842-0466-5_5_Fig20_HTML.jpg)


    Figure 5-20.


    Edit the Help Desk application from the report view


    ![A978-1-4842-0466-5_5_Fig19_HTML.jpg](A978-1-4842-0466-5_5_Fig19_HTML.jpg)


    Figure 5-19.


    Edit the Help Desk application from the icon view   Edit the Home page by clicking
    the link for the page name in the report, as shown in Figure [5-21](#A978-1-4842-0466-5_5_Chapter.html#Fig21).


    ![A978-1-4842-0466-5_5_Fig21_HTML.jpg](A978-1-4842-0466-5_5_Fig21_HTML.jpg)


    Figure 5-21.


    Editing the Home page   From the Gallery in the lower center of the screen, select
    Regions for the component type.   Click and drag the Static Content icon from
    the Gallery into the Grid Layout section of the screen and drop the component
    in the Content Body content area, as shown in Figure [5-22](#A978-1-4842-0466-5_5_Chapter.html#Fig22).


    ![A978-1-4842-0466-5_5_Fig22_HTML.jpg](A978-1-4842-0466-5_5_Fig22_HTML.jpg)


    Figure 5-22.


    Dragging the Static Content component to the Content Body area Once you’ve dropped
    the component, the view will change, showing the new region in place within the
    Grid Layout and selected as current within both the Tree Pane and the Grid Layout,
    as shown in Figure [5-23](#A978-1-4842-0466-5_5_Chapter.html#Fig23).


    ![A978-1-4842-0466-5_5_Fig23_HTML.jpg](A978-1-4842-0466-5_5_Fig23_HTML.jpg)


    Figure 5-23.


    The new Static Content region shown in the Page Designer Now, edit the attributes
    of the new region:   In the Attributes Pane, under the Identification section,
    set the Title to `APEX Issue Tracker`.   In the Attributes Pane, under the Source
    section, enter the following for the Text and then click the Save button at the
    top of the page. See Figure [5-24](#A978-1-4842-0466-5_5_Chapter.html#Fig24).


    ![A978-1-4842-0466-5_5_Fig24_HTML.jpg](A978-1-4842-0466-5_5_Fig24_HTML.jpg)


    Figure 5-24.


    Entering the Title and Text and saving your work `<h1>Welcome to the APEX Issue
    Tracking System</h1>` `<br />Select an option from the list`


    Run the page by clicking the Run button at the top of the Page Designer. You should
    see the changes you just made indicated by a new region with a friendly welcome
    message. Your results should be similar to those shown in Figure [5-25](#A978-1-4842-0466-5_5_Chapter.html#Fig25).


    ![A978-1-4842-0466-5_5_Fig25_HTML.jpg](A978-1-4842-0466-5_5_Fig25_HTML.jpg)


    Figure 5-25.


    Results after adding the Static Content region


    ## Public Pages


    As mentioned, it’s possible to allow the entire application to use no authentication
    scheme. But what if you want some of the pages to require authentication, and
    others to be public? How can you make a page that doesn’t require a login in order
    to view it?


    If any of the pages in an application require authentication, an appropriate authentication
    scheme must be applied to the whole application. APEX lets you define individual
    pages as Public or Requires Authentication using a defining property of the page.
    Each page can have different security requirements (authorization), but only one
    authentication mechanism can be applied to an application. Public pages are useful
    for introductory landing pages, login pages, and information pages.


    In the Help Desk project, you want to have the main page available to all visitors.
    To accomplish this, you can modify the first page of the application to allow
    it to be seen by anyone without requiring authentication. Do that via the following
    steps:


    In the Help Desk application, navigate to and edit page 1.   In the Tree Pane,
    edit the page attributes by clicking the page name (Home) in the Rendering Tree.
    The page name appears as the root node of the tree, as shown in Figure [5-26](#A978-1-4842-0466-5_5_Chapter.html#Fig26).


    ![A978-1-4842-0466-5_5_Fig26_HTML.jpg](A978-1-4842-0466-5_5_Fig26_HTML.jpg)


    Figure 5-26.


    Selecting the page node in the Rendering Tree   In the Attributes Pane, scroll
    to the Security section, shown in Figure [5-27](#A978-1-4842-0466-5_5_Chapter.html#Fig27).
    In this section, change Authentication to Page Is Public.


    ![A978-1-4842-0466-5_5_Fig27_HTML.jpg](A978-1-4842-0466-5_5_Fig27_HTML.jpg)


    Figure 5-27.


    Changing a page’s authentication setting   At the top of the page, click Save.
     


    Now, when the page is run, the authentication screen doesn’t appear when page
    1 is requested. You will learn more about authentication and authorization in
    [Chapter 9](#A978-1-4842-0466-5_9_Chapter.html). For now, just know that the change
    you’ve made allows users to see the first page of the application without being
    logged in.'
  trans: '## 静态内容区域


    静态内容区域类型是最基本但也最灵活的区域类型之一。通过操作静态内容区域的属性（如图 5-18 所示），你可以控制该区域的显示方式：


    *   `输出方式`: 选择 `HTML` 会将区域源中输入的任何标记解释为 HTML 并呈现结果输出。选择 `文本（转义特殊字符）` 会在将区域源输出到页面时转义（不解释）特殊字符，如
    `<`、`>`、`&`。例如：`<br />` 将显示为代码 `<br />`，而不是被解释为换行符。

    *   `展开快捷键`: 启用或禁用对快捷键技术的支持。该技术包括一个共享组件对象，可用于使用 `SHORTCUT_NAME` 语法管理一种变量。


    ![A978-1-4842-0466-5_5_Fig18_HTML.jpg](img/A978-1-4842-0466-5_5_Fig18_HTML.jpg)


    图 5-18. 查看静态内容区域的属性


    静态内容区域的简单性带来了广泛的用途。静态内容区域是一个容器，可以拥有自己的值、嵌入的 JavaScript 或 CSS 定义，也可以包含其他页面项目。输入源中的任何有效
    HTML 都会在 APEX 页面上呈现。替换字符串语法，如 `&ITEM_NAME.`，也可以用于在源文本中显示项目值。


    继续处理帮助台应用程序，向第一页添加一些内容：


    ### 导航至应用程序构建器并编辑应用程序


    导航到应用程序构建器，并编辑帮助台应用程序。根据您查看应用程序报告的方式，您可能需要点击如图 5-19 所示的图标，或点击应用程序的名称，如图 5-20 所示。


    ![A978-1-4842-0466-5_5_Fig20_HTML.jpg](img/A978-1-4842-0466-5_5_Fig20_HTML.jpg)


    图 5-20. 从报告视图编辑帮助台应用程序


    ![A978-1-4842-0466-5_5_Fig19_HTML.jpg](img/A978-1-4842-0466-5_5_Fig19_HTML.jpg)


    图 5-19. 从图标视图编辑帮助台应用程序


    ### 编辑主页


    通过点击报告中页面名称的链接来编辑主页，如图 5-21 所示。


    ![A978-1-4842-0466-5_5_Fig21_HTML.jpg](img/A978-1-4842-0466-5_5_Fig21_HTML.jpg)


    图 5-21. 编辑主页


    ### 添加静态内容区域


    从屏幕下部中心的库中，为组件类型选择 `区域`。


    点击并拖动库中的 `静态内容` 图标到屏幕的网格布局部分，并将组件放置在 `内容主体` 内容区域中，如图 5-22 所示。


    ![A978-1-4842-0466-5_5_Fig22_HTML.jpg](img/A978-1-4842-0466-5_5_Fig22_HTML.jpg)


    图 5-22. 将静态内容组件拖到内容主体区域


    放置组件后，视图将发生变化，显示新区域在网格布局中的位置，并在树状窗格和网格布局中被选中为当前项，如图 5-23 所示。


    ![A978-1-4842-0466-5_5_Fig23_HTML.jpg](img/A978-1-4842-0466-5_5_Fig23_HTML.jpg)


    图 5-23. 页面设计器中显示的新静态内容区域


    ### 编辑新区域的属性


    现在，编辑新区域的属性：


    在属性窗格的“标识”部分，将 `标题` 设置为 `APEX Issue Tracker`。


    在属性窗格的“源”部分，为 `文本` 输入以下内容，然后点击页面顶部的 `保存` 按钮。参见图 5-24。


    ![A978-1-4842-0466-5_5_Fig24_HTML.jpg](img/A978-1-4842-0466-5_5_Fig24_HTML.jpg)


    图 5-24. 输入标题和文本并保存工作


    ```

    <h1>Welcome to the APEX Issue Tracking System</h1>

    <br />Select an option from the list

    ```


    ### 运行页面


    通过点击页面设计器顶部的 `运行` 按钮来运行页面。您应该看到刚刚所做的更改，表现为一个包含友好欢迎消息的新区域。您的结果应与图 5-25 所示相似。


    ![A978-1-4842-0466-5_5_Fig25_HTML.jpg](img/A978-1-4842-0466-5_5_Fig25_HTML.jpg)


    图 5-25. 添加静态内容区域后的结果


    ## 公共页面


    如前所述，可以允许整个应用程序不使用任何认证方案。但是，如果您希望某些页面需要认证，而另一些页面是公开的呢？如何制作一个不需要登录即可查看的页面？


    如果应用程序中的任何页面需要认证，则必须对整个应用程序应用适当的身份验证方案。APEX 允许您使用页面的定义属性将各个页面定义为 `公共` 或 `需要认证`。每个页面可以有不同的安全要求（授权），但一个应用程序只能应用一种身份验证机制。公共页面对于介绍性的登陆页面、登录页面和信息页面非常有用。


    在帮助台项目中，您希望主页面对所有访问者可用。为此，您可以修改应用程序的第一页，允许任何人查看而无需身份验证。通过以下步骤完成：


    ### 导航至页面 1 并编辑页面属性


    在帮助台应用程序中，导航至并编辑第 1 页。


    在树状窗格中，通过点击渲染树中的页面名称 (`主页`) 来编辑页面属性。页面名称显示为树的根节点，如图 5-26 所示。


    ![A978-1-4842-0466-5_5_Fig26_HTML.jpg](img/A978-1-4842-0466-5_5_Fig26_HTML.jpg)


    图 5-26. 在渲染树中选择页面节点


    ### 将页面设置为公共


    在属性窗格中，滚动到“安全”部分，如图 5-27 所示。在此部分，将 `身份验证` 更改为 `页面是公共的`。


    ![A978-1-4842-0466-5_5_Fig27_HTML.jpg](img/A978-1-4842-0466-5_5_Fig27_HTML.jpg)


    图 5-27. 更改页面的身份验证设置


    ### 保存更改


    在页面顶部，点击 `保存`。


    现在，当运行页面时，请求第 1 页将不会出现身份验证屏幕。您将在第 9 章中了解更多关于身份验证和授权的信息。目前，只需知道您所做的更改允许用户在未登录的情况下查看应用程序的第一页。'
- fmt: '## Navigation Bar Entries


    Each APEX application has one navigation bar that may contain multiple entries.
    Examples of links typically displayed on every page are Login, Logout, Help, and
    My Account. As a developer, you can create and modify navigation bar entries depending
    on the application and need. The navigation bar can also go beyond standard link
    text; it can be modified to include images. Entries can be based on conditions,
    authorization schemes, and build options. Placement of navigation bars is dictated
    by the page template substitution variable `#NAVIGATION_BAR#`. In most applications,
    the navigation bar is placed either at the upper right or upper left of the page.


    The example application already has a very simple navigation bar that has been
    created for you, as shown in Figure [5-28](#A978-1-4842-0466-5_5_Chapter.html#Fig28).
    It currently contains only a Log Out link.


    ![A978-1-4842-0466-5_5_Fig28_HTML.jpg](A978-1-4842-0466-5_5_Fig28_HTML.jpg)


    Figure 5-28.


    The basic navigation bar


    Because you’ve modified the Home page to be a publicly viewable page, you need
    to add a navigation bar entry that allows users to log in. At the same time, you
    need to make both the Login and Log Out links context sensitive so they’re only
    displayed when it makes sense. (For instance, the Log Out link should only be
    displayed when a user is actually logged in.)


    Navigation bars are part of an application’s shared components, so they’re created
    and maintained from the Shared Components section of the Application Builder.
    Create one in the example application as follows:


    From the Page Designer, click the Shared Components icon in the upper-right section
    of the page, next to the Save button, as shown in Figure [5-29](#A978-1-4842-0466-5_5_Chapter.html#Fig29).


    ![A978-1-4842-0466-5_5_Fig29_HTML.jpg](A978-1-4842-0466-5_5_Fig29_HTML.jpg)


    Figure 5-29.


    Navigating to the Shared Components screen from the Page Designer


    Under the Navigation section, click Navigation Bar List, as shown in Figure [5-30](#A978-1-4842-0466-5_5_Chapter.html#Fig30).


    ![A978-1-4842-0466-5_5_Fig30_HTML.jpg](A978-1-4842-0466-5_5_Fig30_HTML.jpg)


    Figure 5-30.


    Navigation components in the Shared Components screen


    You’ll see a report showing that a Navigation Bar List called `Desktop Navigation
    Bar` already exists. You will need to edit this list to add your Login entry and
    to edit the Log Out entry.


    Click the `Desktop Navigation Bar` link in the report.


    Click the `Create List Entry` button in the upper right of the screen.


    In the Entry section of the page enter `Login` in the `List Entry Label` field.


    In the Target section, set `Target Type` to `Page in This Application`.


    For `Page`, enter `101`. This will send the user back to the login page after
    they’ve logged out. See Figure [5-31](#A978-1-4842-0466-5_5_Chapter.html#Fig31).


    ![A978-1-4842-0466-5_5_Fig31_HTML.jpg](A978-1-4842-0466-5_5_Fig31_HTML.jpg)


    Figure 5-31.


    Navigation bar settings


    In the Conditions section, set `Condition Type` to `User is the Public User (user
    has not authenticated)`, as shown in Figure [5-32](#A978-1-4842-0466-5_5_Chapter.html#Fig32).


    ![A978-1-4842-0466-5_5_Fig32_HTML.jpg](A978-1-4842-0466-5_5_Fig32_HTML.jpg)


    Figure 5-32.


    Navigation bar conditions


    Click `Create List Entry` at the top of the page.


    Run the application now. If you’re logged in, you only see the Log Out navigation
    bar entry. Click the Log Out link. Once you’re logged out, you see the new navigation
    item, as shown in Figure [5-33](#A978-1-4842-0466-5_5_Chapter.html#Fig33). This
    identifies a small problem: the Log Out link can still be seen even though you’ve
    already logged out.


    ![A978-1-4842-0466-5_5_Fig33_HTML.jpg](A978-1-4842-0466-5_5_Fig33_HTML.jpg)


    Figure 5-33.


    Login and Log Out links both showing


    Clearly, it’s a problem to show the Login and Log Out choices at the same time.
    After all, only one of those two choices can apply. Let’s tackle that problem:


    Navigate back to the Shared Components section for the Help Desk application.


    Edit Navigation Bar List, and then edit the `Desktop Navigation Bar` list.


    Edit the Log Out navigation bar entry by clicking on its name in the report.


    In the Conditions section of the page, set `Condition Type` to `User is Authenticated
    (not public)`, as shown in Figure [5-34](#A978-1-4842-0466-5_5_Chapter.html#Fig34).


    ![A978-1-4842-0466-5_5_Fig34_HTML.jpg](A978-1-4842-0466-5_5_Fig34_HTML.jpg)


    Figure 5-34.


    Navigation bar condition type


    Click `Apply Changes`.


    Run the application again. You should see that the Login and Log Out navigation
    items are mutually exclusive. When you created the new navigation item, you applied
    the condition to allow it to be seen only by the public user. The Log Out navigation
    item was created as part of the Create Application wizard; no condition was placed
    on the Log Out item by default. You will learn more about conditions in [Chapter
    8](#A978-1-4842-0466-5_8_Chapter.html).


    ## Global Pages


    A `Global Page` is a special type of page that acts as a “master page” for your
    application and can be added one per user- interface type (that is, you may have
    one `Global Page` for the Desktop UI and another for the Mobile UI).


    Items placed on a `Global Page` are rendered on every page in its related UI for
    that application unless conditionally told to do otherwise. This is particularly
    useful when you identify the need to display the same region on multiple pages
    or even on all pages in your application. Simply move a region to your `Global
    Page`, and it’s rendered with every page.


    A good example of usage is a breadcrumb region or a region that contains custom
    JavaScript code that needs to be available to every page. Region contents from
    a `Global Page` are included on every page of that UI, even when a region doesn’t
    render visibly.


    Although you can assign any page number to a `Global Page`, the default page number
    for a `Global Page` related to a desktop interface is zero (`0`). In fact, `Global
    Pages` take the place of what used to be called `Page Zero` in previous versions
    of APEX.


    You may notice when looking at the definition of a `Global Page` in the APEX Page
    Designer (Figure [5-35](#A978-1-4842-0466-5_5_Chapter.html#Fig35)) that there
    are no nodes in the Tree Pane for the Processing tab. `Global Pages` are only
    used during page rendering. Regions that are added to a `Global Page` are included
    even on the Login page. You need to consider the different page types in an application
    when adding content to a `Global Page`.


    ![A978-1-4842-0466-5_5_Fig35_HTML.jpg](A978-1-4842-0466-5_5_Fig35_HTML.jpg)


    Figure 5-35.


    There are no Processing nodes for a `Global Page`, as shown in the APEX Page Designer


    Creating a `Global Page` is like creating any other page in an APEX application.
    However, once it’s created, it’s no longer available in the `Creation Options`
    list for that UI type. Let’s create a `Global Page` for the desktop interface:


    From the Application page list, click the Create Page button.


    In the resulting pop-up wizard, select `Global Page` from the Page Type list and
    click Next. Figure [5-36](#A978-1-4842-0466-5_5_Chapter.html#Fig36) shows the
    `Global Page` option, which should be near the bottom of the list.


    ![A978-1-4842-0466-5_5_Fig36_HTML.jpg](A978-1-4842-0466-5_5_Fig36_HTML.jpg)


    Figure 5-36.


    Choosing to create a `Global Page`


    Leave `Page Number` set to `0` (zero), and click Create.


    You should now see your `Global Page` listed in the pages for the application.
    Currently, there is no content on the `Global Page`. You will use this `Global
    Page` to contain and display the breadcrumb region covered in the next section.'
