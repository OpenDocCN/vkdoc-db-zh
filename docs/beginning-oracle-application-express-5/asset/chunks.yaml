  trans: '

    ## 基于 APEX 的文件


    APEX 为开发者提供了将静态文件作为应用程序共享组件的一部分上传到 APEX 元数据存储库的能力。图 10-6 展示了共享组件页面的文件部分。其中有两种类型的文件：直接与应用程序绑定的文件，以及当前工作区内所有应用程序都可用的文件。


    ![A978-1-4842-0466-5_10_Fig6_HTML.jpg](img/A978-1-4842-0466-5_10_Fig6_HTML.jpg)

    *图 10-6. 应用程序共享组件页面的文件部分*


    静态应用文件可以是任何文件类型，例如 CSS 文件、JavaScript 文件、图像、文档等，这些可能是你应用程序所需的一部分。在应用程序内部引用它们时，需在文件名前加上
    `#APP_IMAGES#` 替换变量。


    由于这些项目直接与特定应用程序绑定，因此在执行应用程序导出时（如本章后面所述）会自动包含它们。


    静态工作区文件同样可以是任何文件类型，但它们不是直接绑定到某个应用程序，而是通过使用 `#WORKSPACE_IMAGES#` 替换变量，使得当前工作区内的所有应用程序都能访问它们。


    尽管静态工作区文件被视为共享组件，但它们不包含在应用程序导出中。这意味着你需要单独迁移这些项目。你可以从允许上传它们的同一屏幕执行此操作。你可以选择使用与该项目关联的下载链接来下载并迁移单个文件，或者直接点击“压缩下载”按钮，随后会出现一个对话框，允许你导出包含所有静态工作区文件的压缩文件。这两种选项如图
    10-7 所示。


    ![A978-1-4842-0466-5_10_Fig7_HTML.jpg](img/A978-1-4842-0466-5_10_Fig7_HTML.jpg)

    *图 10-7. 静态工作区文件页面支持单个或批量下载*


    作为共享组件上传的文件很可能是你将在整个应用程序中引用的内容。它们可能代表你主题的一部分，例如选项卡或按钮的图像，或者可能是用于显示状态的图标，或者在被点击时允许最终用户编辑数据行的图标。


    需要明确的一个关键区别是，上传到此区域的文件不应与应用程序的数据有直接关系。诸如产品图片、员工照片之类的东西应该存储在应用程序的 `parse as` 模式中，与图片相关的数据放在一起。


    ## APEX 应用程序导出


    总的来说，APEX 应用程序导出易于执行。该界面包含一个旨在生成用于重建 APEX 应用程序的脚本的过程。


    此时，了解应用程序导出包含什么和不包含什么是重要的。我们已经讨论过，底层数据库对象不包含在内，上传到共享组件的静态工作区文件部分的任何内容也不包含在内。但是所有其他共享组件，包括静态应用文件，都包含在导出文件中。


    值得一提的是，所有已配置和已分配的共享组件都包含在 APEX 应用程序导出中，无论应用程序是否正在使用它们。例如，一个 APEX 应用程序同时只能有一个当前的身份验证方案，但可能会有多个身份验证方案被配置并分配给该应用程序。用户界面主题的情况也是如此。


    虽然这并不严格算是一个问题，但最佳实践是删除任何未被应用程序使用的共享组件，以便应用程序导出的大小保持尽可能小且易于管理。大多数共享组件都提供使用情况报告，因此你可以看到它们是否正在被使用。


    应用程序导出功能位于应用程序构建器主页顶部的图标菜单中，如图 10-8 所示。


    ![A978-1-4842-0466-5_10_Fig8_HTML.jpg](img/A978-1-4842-0466-5_10_Fig8_HTML.jpg)

    *图 10-8. 导出选项位于页面顶部的图标菜单中*


    当你启动向导时，它首先会提示你是要导入还是导出应用程序。一旦你选择“导出”，你将被带到导出页面，如图 10-9 所示。


    ![A978-1-4842-0466-5_10_Fig9_HTML.jpg](img/A978-1-4842-0466-5_10_Fig9_HTML.jpg)

    *图 10-9. 导出应用程序页面*


    你可以使用页面顶部附近的选择列表来选择要导出的应用程序。“导出应用程序”部分允许你更概括地规定应如何导出应用程序。它包括以下选项：


    *   文件格式：它不涉及目标平台，而是关于文件生成时对回车符和换行符的处理方式。

    *   所有者覆盖：允许你通过输入或选择来覆盖当前分配的 `parse as` 模式。

    *   构建状态覆盖：让你选择应用程序导入时的默认构建状态。默认是“运行和构建应用程序”，但你可以将状态设置为“仅运行应用程序”。

    *   调试：规定应用程序安装时默认是启用还是禁用调试。调试对于开发中的应用程序很有用。然而，作为最佳实践，你应该为生产应用程序关闭调试，以防止用户看到可能仅在调试模式下才会显示的内容。

    *   截至时间：允许你将应用程序导出为它在若干分钟前的状态。要使此功能生效，必须由 DBA 在数据库级别启用闪回查询。你可以闪回的时间量由数据库级别的 `UNDO_RETENTION`
    参数控制。


    > **注意：** 虽然你可以为“导出应用程序”部分中的设置选择默认值，但重要的是要理解，这些设置在应用程序导入时可以被覆盖。此时，你只是在为导入设置默认值。


    在“导出首选项”部分，有几个选项允许你决定应用程序导出中包含哪些内容。可用的选项如下：

    '
- fmt: '# Export Settings


    *   `Export Supporting Object Definitions`: Dictates whether any supporting objects
    that have been uploaded are exported with the application. See the “Supporting
    Objects” section later in this chapter for a full description.

    *   `Export Public Interactive Reports`: Dictates whether report definitions saved
    by end users and marked as public are exported as part of the application.

    *   `Export Private Interactive Reports`: Dictates whether report definitions
    saved by end users and marked as private are exported as part of the application.

    *   `Export Interactive Report Subscriptions`: Dictates whether user subscription
    information for interactive reports is exported as part of the application.

    *   `Export Developer Comments`: Dictates whether any comments developers have
    entered against APEX components are exported as part of the application.

    *   `Export Translations`: Dictates whether translation mapping information is
    exported as part of the application. Translation text messages and dynamic translations
    are always included in the application export, regardless of the setting chosen
    here.

    *   `Export with Original IDs`: Dictates whether the export file should contain
    the application component IDs as of now or as of the last import of this application.


    Once you’ve chosen the appropriate settings, click the `Export` button to produce
    the application export. You’re prompted to save it to your local machine. The
    export file name consists of the letter `f` followed by the application ID, with
    a `.sql` extension. For example, an application with an ID of `9239` is named
    `f9239.sql`.


    The downloaded file contains a large text script that defines all the contents
    of the application built in APEX. Along with the application pages are the shared
    components, including authentication schemes, authorization schemes, themes in
    the application, UI settings, reports, and so on. This script can, in turn, be
    imported into the same workspace, a different workspace, or even a different server.


    # Supporting Objects


    The application export captures the complete definition of your application, including
    most shared components, but it doesn’t contain everything you would need to completely
    reconstitute your application on another server. However, APEX provides a feature
    that allows you to bundle the scripts for things such as the underlying database
    tables inside the application export. This feature is called Supporting Objects.


    The Supporting Objects feature actually gives you a great deal more functionality
    than that. It also provides the ability to create and control the installation,
    as well as to upgrade and uninstall anything that can be scripted using SQL.


    You reach the Supporting Objects management interface by navigating to the `Shared
    Components` page for an application and selecting the `Manage Supporting Objects`
    option from the `Tasks` menu. Figure [10-10](#A978-1-4842-0466-5_10_Chapter.html#Fig10)
    shows the Supporting Objects home page.


    ![A978-1-4842-0466-5_10_Fig10_HTML.jpg](A978-1-4842-0466-5_10_Fig10_HTML.jpg)


    *Figure 10-10. Supporting Objects management home page*


    The page is broken down into several regions. The `Summary` region at the top
    shows what is currently defined in the supporting objects, and the three regions
    below (`Installation`, `Upgrade`, and `Deinstallation`) allow you to edit the
    scripts and define the actions that are available during each phase.


    Clicking any of the links takes you to a tabbed definition page, as shown in Figure
    [10-11](#A978-1-4842-0466-5_10_Chapter.html#Fig11).


    ![A978-1-4842-0466-5_10_Fig11_HTML.jpg](A978-1-4842-0466-5_10_Fig11_HTML.jpg)


    *Figure 10-11. Supporting Objects tabbed definition screen*


    Working through the tabs on this page lets you define the actions that are taken
    and any scripts that should be run during each of the three phases. Although we
    won’t show a picture of the contents of each tab here, in this section we will
    walk through each of them and discuss their contents and purpose, saving the `Messages`
    tab for last.


    ## Prerequisites


    This section defines what built-in checks should be run to ensure that the database
    schema into which the application is being installed has the appropriate privileges.
    You can provide a minimum amount of space that is required for the application
    to work correctly. At installation time, the “parse as” schema’s default tablespace
    is checked to be sure the appropriate amount of space is available. You can also
    check to make sure the schema has any of the following specific privileges:


    `CREATE DATABASE LINK`


    `CREATE MATERIALIZED VIEW`


    `CREATE PROCEDURE`


    `CREATE SEQUENCE`


    `CREATE SYNONYM`


    `CREATE TABLE`


    `CREATE TRIGGER`


    `CREATE TYPE`


    `CREATE VIEW`


    The bottom region of the page allows you to list all objects that will be created
    by the supporting object-installation scripts. At installation time, if any of
    the listed objects already exist, the install won’t proceed, because there could
    be a clash. The user installing the application is given the details of which
    objects are found to already exist.


    This section may seem a bit limited in its scope, but the `Validation` section,
    discussed later, allows for more free-form prerequisite checks.


    ## Substitutions


    This section provides the ability to allow the installing user to define the value
    for application-level substitution strings at install time. Although substitution
    strings are meant to be used like static variables, you may not always know what
    the value of these strings should be prior to installation. From this interface,
    you can choose which substitution variables you want to let the installing user
    define and what the prompt for each variable should be.


    Substitution variables aren’t used very often, so this feature is also unlikely
    to be used. However, it’s good to know that it’s there if you need it.


    ## Build Options


    In [Chapter 13](#A978-1-4842-0466-5_13_Chapter.html) we will speak about build
    options and the fact that they can be used to exclude or hide assigned functionality.
    This section allows you to select whether build options you’ve defined are available
    to the installing user. By selecting a build option, the user will be prompted
    as to whether they wish to include or exclude the functionality associated with
    the build option.


    Most of the time, when moving applications to production, you want to exclude
    all build options.


    ## Validations


    This section lets you define any number of pre-installation validations to be
    run. These validations are similar to normal page validations and allow full control
    over whether the application installation can proceed. You may have as many validations
    as you wish, and the validations may be conditional as well.


    If any validation fails, the installation is halted, and the user is presented
    with the error message(s) defined in the failing validation(s).'
