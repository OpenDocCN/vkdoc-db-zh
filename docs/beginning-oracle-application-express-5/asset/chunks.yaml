- fmt: '### The Home Page


    Once you log in to your workspace, you’re presented with the workspace Home page,
    as shown in Figure [2-6](#A978-1-4842-0466-5_2_Chapter.html#Fig6). The Home page
    is your gateway to the rest of the development environment and provides some high-level
    information about what’s going on in the workspace.


    ![A978-1-4842-0466-5_2_Fig6_HTML.jpg](A978-1-4842-0466-5_2_Fig6_HTML.jpg)

    *Figure 2-6. APEX development Home screen*


    Along the top is the navigation bar containing the main navigation structure available
    to you throughout the developer interface. It gives direct access to many of the
    sections you will need quick access to while you’re developing applications. It’s
    worth noting that each main option of the menu bar is broken down into two pieces.
    For instance, if you click directly on the `Application Builder` item, you’re
    immediately taken to the `Application Builder` home page. However, if you click
    the small downward-pointing arrow just to the right, you’re presented with a more
    detailed drop-down menu that lets you choose your destination a bit more granularly,
    as in Figure [2-7](#A978-1-4842-0466-5_2_Chapter.html#Fig7).


    ![A978-1-4842-0466-5_2_Fig7_HTML.jpg](A978-1-4842-0466-5_2_Fig7_HTML.jpg)

    *Figure 2-7. Using the drop-down menus on the menu bar*


    At the right of the navigation bar is a set of four menu options represented by
    icons, as shown in Figure [2-8](#A978-1-4842-0466-5_2_Chapter.html#Fig8).


    ![A978-1-4842-0466-5_2_Fig8_HTML.jpg](A978-1-4842-0466-5_2_Fig8_HTML.jpg)

    *Figure 2-8. Right-hand icons on the navigation bar*


    First is a search icon that, when clicked, allows you to perform context-sensitive
    searches. The context of the search depends on where you are in the `Application
    Builder`. For instance, if you’re on the workspace Home page, your search is across
    the entire workspace. However, if you’re in the `Application Builder` or the `Administration`
    section, the search is limited contextually to those specific areas.


    Second is the `Administration` menu. This menu will be available to you whether
    you are a `Workspace Administrator` or a `Developer`. The difference will be what
    functionality you have access to. `Developers` will have access to monitoring
    certain areas of the workspace activity and to the dashboards, while `Workspace
    Administrators` will have full access to all functionality including user maintenance
    and service requests.


    Third is the `help` menu, which provides access to online documentation, the APEX
    Support Forums, the APEX section of the Oracle Technical Network site, and an
    `About` section.


    Last is a link to the profile of the currently logged in user. Here, the user
    will be able to edit their details, update their profile picture, and change their
    password.


    At the very bottom of the browser is an information region that displays the currently
    logged in user, the current workspace, the language, and the current version of
    Oracle APEX.


    The rest of the page is dedicated to either giving you a quick link to the four
    main sections or providing you with information about what’s going on in the workspace.
    The first two regions, from left to right, show an overview of the activity in
    the workspace. They show the `Top Applications` and the `Top Users` in the workspace.
    The `News & Messages` region allows the developers in a workspace to enter information
    they want others in the workspace to see. In a new workspace, there probably won’t
    be anything in these regions, but as you work your way through the book, you’ll
    see that start to change.


    Notice that most of the main pages for each section of the development environment
    adhere to this dashboard-style home page interface, the notable exception being
    the `Application Builder`. Let’s look at that section first.


    ### Application Builder


    The `Application Builder` is the core of the APEX application-development environment.
    Whereas you’ll use the `SQL Workshop` to manipulate the underlying database objects,
    you’ll use the `Application Builder` to do most of the real work when it comes
    to coding, testing, and debugging your applications.


    #### The Application Builder Home Page


    Clicking the `Application Builder` menu option takes you to the `Application Builder`
    home page. Like most of the home pages, it’s laid out with the menu bar across
    the top and regions that hold tasks and quick links down the right side.


    The main difference is that `Application Builder` home page doesn’t house any
    dashboard-style summaries. Instead, this is where you see a list of the different
    applications contained in your workspace. (Figure [2-9](#A978-1-4842-0466-5_2_Chapter.html#Fig9)
    provides an example.) It’s possible, depending on your APEX instance settings,
    that you might see some sample applications installed by the `Workspace Administrator`,
    but don’t be alarmed if you don’t see any applications at all.


    ![A978-1-4842-0466-5_2_Fig9_HTML.jpg](A978-1-4842-0466-5_2_Fig9_HTML.jpg)

    *Figure 2-9. The Application Builder home page*


    Figure [2-9](#A978-1-4842-0466-5_2_Chapter.html#Fig9) shows one application in
    the workspace, named `Sample Master Detail`. However, there isn’t much information
    about it other than its name and the application ID (118). This is where you begin
    to see the beauty of what APEX can do, not only in the developer UI, but also
    in your applications.


    The list of applications you see is actually a style of report called an `Interactive
    Report (IR)`. `IRs` allow us to customize how reports and their contents are displayed.
    `IRs` are used throughout the APEX development interface and can also be used
    when creating your own applications. They’re extremely powerful tools, and you’ll
    use them a lot.


    On the right side of the page are three regions that show `About` information,
    recently edited applications, and a link to the `Application Migration` wizard.
    You will deal more with these later; for now, we will drill in to see the details
    of an application.


    #### The Application Home Page


    Clicking any one of the applications listed drills into the `Application` home
    page, as shown in Figure [2-10](#A978-1-4842-0466-5_2_Chapter.html#Fig10). This
    page is very similar to the `Application Builder` home page, but it shows all
    the pages in a specific application. Again, it uses an `IR`, so you can customize
    the way you see this data.


    ![A978-1-4842-0466-5_2_Fig10_HTML.jpg](A978-1-4842-0466-5_2_Fig10_HTML.jpg)

    *Figure 2-10. The Application home page*


    Notice the way the page is structured, with page-related tasks and recently edited
    pages presented along the right side of the page. This layout will become a familiar
    theme as you navigate through the interface.


    From here, you can click any of the listed pages to edit that page using the `Page
    Designer`. You can also `run`, `export`, and `import` the application, edit the
    supporting objects or shared components, and access the application-related utilities.'
