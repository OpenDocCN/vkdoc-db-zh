    ## User-Maintenance Data Entry


    As part of the Help Desk design, you should be able to maintain the users from
    the application. To do this, you need to implement some new database objects.


    Upload and run the script `ch9_security_objects.sql`. Refer to Chapter 4 if you
    need step-by-step instructions. You should see 13 rows, all of which complete
    successfully. Let’s walk through briefly what this script does for you:


    Lines 1–16: Create a function called `hash_password` that encodes any string passed
    to it.

    Lines 18–24: Create the `USERS` table that will hold the user records.

    Lines 26–27: Create the `USER_SEQ` sequence that will be used as the primary key
    for the `USERS` table.

    Lines 29–37: Create a Before Insert trigger on the `USERS` table that automatically
    assigns the next sequence as the primary key, converts the user name to uppercase,
    and calls the `hash_password` function to encrypt the user’s password.

    Lines 39–50: Create a Before Update trigger that converts the user name to uppercase
    and hashes the user’s password if it has changed.

    Lines 52–87: Create the `authenticate_user` function that validates whether the
    passed user name and password are valid compared to what exists in the `USERS`
    table.

    Lines 90–103: Create six entries in the `USERS` table, all with the password apress.


    Now that you have your new database objects, you can continue to implement the
    security model: Edit Page 600 of the application. Create a new region by clicking
    the Create button and selecting Form Region. Select Form on Table with Report
    and click Next. Because the report is actually quite small and contains very few
    columns, it’s probably overkill to create it as an interactive report, so stick
    to the Classic report in this instance: Set Implementation to Classic. Enter `Users`
    for Region Title and set Region Template to Standard. The settings look like those
    in Figure 9-7.


    ![A978-1-4842-0466-5_9_Fig7_HTML.jpg](A978-1-4842-0466-5_9_Fig7_HTML.jpg)


    Figure 9-7. Report page setup


    Click Next. Set Table/View Owner to your schema name and set the Table/View Name
    to Users (table), as shown in Figure 9-8.


    ![A978-1-4842-0466-5_9_Fig8_HTML.jpg](A978-1-4842-0466-5_9_Fig8_HTML.jpg)


    Figure 9-8. Setting the owner and table names


    Click Next. Select `USER_ID` and `USER_NAME` as the columns to be displayed in
    the report. Remove the `PASSWORD` column by shuttling it to the left, and then
    click Next. Select any Edit link image and click Next. Enter `610` for Page Number
    and `Manage Users` for Page Name and Region Title, as shown in Figure 9-9. Click
    Next.


    ![A978-1-4842-0466-5_9_Fig9_HTML.jpg](A978-1-4842-0466-5_9_Fig9_HTML.jpg)


    Figure 9-9. Defining the name of the Manage Users form


    Set Primary Key Type to Select Primary Key Column(s) and, when the page refreshes,
    select `USER_ID` for Primary Key Column 1. Click Next. Select Existing Trigger
    for Primary Key Source and click Next. Select `USER_NAME` and `PASSWORD` as the
    columns to be editable on the form, as shown in Figure 9-10, and click Next.


    ![A978-1-4842-0466-5_9_Fig10_HTML.jpg](A978-1-4842-0466-5_9_Fig10_HTML.jpg)


    Figure 9-10.'
