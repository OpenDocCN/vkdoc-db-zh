    \ the list');\n   END IF;\nEND;\n```\n\n此代码实现了基于用户替换变量 `:APP_USER` 做出决策的逻辑，并根据该区分因素定制\
    \ `htp.p` 输出。当用户尚未登录时，APEX 会提供 “nobody” 作为用户名，因此逻辑会根据该值进行判断。\n\n当为尚未登录的用户生成 PL/SQL\
    \ 区域时，会产生一条简单的欢迎消息（见图 8-19）。当拥有凭据的用户登录到应用程序时，会产生类似于图 8-20 中的消息，显示特定于用户的问候语以及分配给该用户的未解决工单数量的快速计数。\n\
    \n![A978-1-4842-0466-5_8_Fig20_HTML.jpg](img/A978-1-4842-0466-5_8_Fig20_HTML.jpg)\n\
    \n图 8-20. 对于已验证用户，PL/SQL 区域会生成问候语和工单计数\n\n![A978-1-4842-0466-5_8_Fig19_HTML.jpg](img/A978-1-4842-0466-5_8_Fig19_HTML.jpg)\n\
    \n图 8-19. 用户尚未登录时的 Issue Tracker PL/SQL 区域\n\n在本节中，您创建了一个动态 PL/SQL 区域，该区域根据应用程序用户改变输出。本节的示例虽然简单，但展示了如何使用数据库中的\
    \ PL/SQL 使区域的内容根据需要变得动态。\n\n## 动态 SQL\n\n动态 SQL 是指不是在设计时确定，而是在运行时由任意数量的动态条件组装而成的\
    \ SQL 的术语。当 SQL 语句的确切要求直到运行时才知晓，或者当 SQL 需要在应用程序运行时改变时，会使用动态 SQL。动态 SQL 允许您在应用程序运行时修改列列表、`where`\
    \ 子句、连接以及 SQL 语句的任何其他部分。\n\nAPEX 支持报告中的动态 SQL，并且可以支持返回 SQL 语句作为结果的 PL/SQL 函数。但是，存在一些约束。函数必须返回有效的\
    \ SQL 语句。根据实现的不同，如果列数未知或会变化，语句可能需要返回一组通用列。\n\n“服务台”应用程序需要区分公共工单和私人工单。为了实现该目标，您可以实现一个公共标志功能。实现该标志需要对数据模型进行快速更新，然后在主页报告中实现动态\
    \ SQL。首先进行数据修改：\n\n1.  导航到 SQL Workshop。\n2.  单击 SQL Commands 图标。\n3.  在文本区域中输入以下\
    \ SQL 语句，然后单击 Run 按钮。这会将名为 `PUBLIC_FLAG` 的新列添加到 `TICKETS` 表中：\n\n```\nALTER TABLE\
    \ tickets ADD (public_flag VARCHAR2(1))\n```\n\n4.  在文本区域中输入以下 SQL 语句，替换当前语句，然后单击\
    \ Run。确保 Autocommit 复选框已选中。这会将所有当前工单更新为默认值 `N`：\n\n```\nUPDATE tickets SET public_flag\
    \ = 'N'\n```\n\n现在数据模型修改已完成，您可以转向应用程序。在工单编辑屏幕中添加查看和编辑新值的选项：\n\n1.  编辑“服务台”应用程序的页面\
    \ 210。\n2.  使用组件库中的拖放功能，向“管理工单”区域添加一个新的单选组项。将新项定位在“状态 ID”项的右侧。\n3.  输入 `P210_PUBLIC_FLAG`\
    \ 作为名称，输入 `Public Flag` 作为标签。\n4.  在“设置”属性组中，将“列数”设置为 `2`。\n5.  在“外观”属性组中，将“模板”设置为“必填”。\n\
    6.  将“需要值”字段设置为“是”。\n7.  在“值列表”属性组中，将“类型”设置为“静态值”，同时在“静态值”文本区域中输入 `STATIC:Y,N`。\n\
    8.  将“显示空值”设置为“否”，如图 8-21 所示。\n\n![A978-1-4842-0466-5_8_Fig21_HTML.jpg](img/A978-1-4842-0466-5_8_Fig21_HTML.jpg)\n\
    \n图 8-21. 公共标志的值列表\n\n当向表单添加与表单所基于的表中的数据库列相关的列时，必须更改一些设置。“源使用”和“源类型”共同作用来标识每个项如何获取其值：\n\
    \n1.  在“源”属性组中，将“类型”设置为“数据库列”，这将相应地将“源使用”设置为“始终”，替换会话状态中的任何现有值。确保“数据库列名”为 `PUBLIC_FLAG`。\n\
    2.  在“默认值”属性组中，将“类型”设置为“静态值”，并在“静态值”中输入 `N`。\n3.  保存您的更改。\n\n现在您的数据模型中有了一个 `PUBLIC_FLAG`\
    \ 列，并且能够通过“工单”表单控制它，您可以在页面 1 上创建动态 SQL 报告，以便为未验证用户显示带有“公共”选项的工单：\n\n1.  在您的应用程序中编辑页面\
    \ 1。\n2.  通过在页面设计器工具栏中单击“创建”按钮并选择“报告区域”，如图 8-22 所示，来创建一个新区域。\n\n![A978-1-4842-0466-5_8_Fig22_HTML.jpg](img/A978-1-4842-0466-5_8_Fig22_HTML.jpg)\n\
    \n图 8-22. 为 SQL 创建区域以生成您的报告\n\n3.  选择“经典报告”，然后单击“下一步”。\n4.  输入 `Current Open Issues`\
    \ 作为标题，如图 8-23 所示。单击“下一步”。\n\n![A978-1-4842-0466-5_8_Fig23_HTML.jpg](img/A978-1-4842-0466-5_8_Fig23_HTML.jpg)\n\
    \n图 8-23.\n"
- fmt: "\nRegion title and display point   Set the Source Type to SQL Query and enter\
    \ the following SQL into the Region Source. Click the Create Region button when\
    \ you’re finished to accept the defaults for all of the remaining settings:\n\n\
    ```sql\nDECLARE\n    l_sql VARCHAR2(500);\nBEGIN\n    l_sql := l_sql ||  q'!\n\
    \                SELECT\n                  subject,\n                  created_on,\n\
    \                  assigned_to\n                FROM\n                  tickets\
    \ t,\n                  status_lookup sl\n                WHERE\n            \
    \      t.status_id = sl.status_id\n                  AND sl.status = 'OPEN'\n\
    \        !';\n    IF :APP_USER = 'nobody' THEN\n        l_sql := l_sql || q'!\
    \ AND public_flag = 'Y' !';\n    END IF;\n    RETURN l_sql;\nEND;\n```\n\nTo see\
    \ the results of this report fully, you need to set a few tickets with the new\
    \ PUBLIC setting. Navigate to the ticket summary screen as a logged-in user and\
    \ change a few OPEN tickets to have the PUBLIC option set to Yes. When you navigate\
    \ to the home screen as a logged-in user, a full list of open tickets should appear,\
    \ as shown in Figure [8-24](#A978-1-4842-0466-5_8_Chapter.html#Fig24). After logging\
    \ out, you will see only the tickets that have been identified as PUBLIC.\n\n\
    ![A978-1-4842-0466-5_8_Fig24_HTML.jpg](A978-1-4842-0466-5_8_Fig24_HTML.jpg)\n\
    *Figure 8-24. Resulting report generated from dynamic SQL*\n\nNote: The SQL statement\
    \ uses a quoting syntax that you may not be familiar with. Oracle Database 10g\
    \ introduced a quoting mechanism for string literals that allows you to define\
    \ your own string delimiters, removing the need to double up single quotes in\
    \ strings. Any character can be used as a delimiter, including bracket combinations\
    \ `() {} [] <>`. The basic syntax is `q’X string X'` where `X` is any single character.\
    \ The `q’X` opens the literal string, and the `X'` closes the literal string.\
    \ You can find more details on the literal syntax in the Oracle Database SQL Language\
    \ Reference.\n\n## Summary\nAs with any programming language or framework, learning\
    \ the basics is the first step. This chapter touched on a lot of points that could\
    \ be considered to be the tips of icebergs. Each section has the capability to\
    \ reach into a vast set of technologies, with the Oracle database being primary\
    \ among them. The intention here is to demonstrate how the APEX framework works\
    \ through the example application and to provide a starting point for additional\
    \ detail discovery.\n\n# 9. Security\nElectronic supplementary material The online\
    \ version of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​9](http://dx.doi.org/10.1007/978-1-4842-0466-5_9))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    Security has varying degrees of implementation; there’s never a black-and-white\
    \ answer. The question of how much security is needed is followed up by additional\
    \ questions regarding the value of what is being protected and the risks, repercussions,\
    \ and likelihood of it being sought after. For every security measure, there will\
    \ always be someone trying to circumvent it. This chapter will review basic security\
    \ features and an approach to securing the Help Desk application. The concepts\
    \ reviewed here apply to all APEX applications and are specific to the APEX framework.\n\
    \n## User-Maintenance Navigation\nIn the Help Desk application, you have the requirement\
    \ to allow users to be maintained in the application through the web interface.\
    \ Let’s add a section to the application that allows for the maintenance of user\
    \ accounts, and then let’s modify the tab structure so as to navigate to the newly\
    \ created form. This time, you won’t use the Create Page wizard to create the\
    \ menu items, but instead will create them from scratch in the Shared Components\
    \ section so that you may gain a better understanding of how the menu hierarchy\
    \ works.\n\nFirst, create a blank page that will be the landing page for your\
    \ new tab (tabs require a page to reference):\n\n1.  From the Application Builder\
    \ home page, while editing the Help Desk application, click the Create Page button.\n\
    2.  Select the option for Blank Page and click Next.\n3.  Set Page Number to `600`,\
    \ enter `Users` for the Name field, and set the Breadcrumb selection to Breadcrumb.\
    \ When the page refreshes, ensure that Entry Name is Users and click Next.\n4.\
    \  Select Do not associate this page with a navigation menu entry for the Navigation\
    \ Preference radio group. Click Next.\n5.  Click Finish to complete the creation\
    \ of the page. The completed page should be empty, and you should not see any\
    \ new menu item related to it, as shown in Figure [9-1](#A978-1-4842-0466-5_9_Chapter.html#Fig1).\n\
    \n![A978-1-4842-0466-5_9_Fig1_HTML.jpg](A978-1-4842-0466-5_9_Fig1_HTML.jpg)\n\
    *Figure 9-1. Viewing the newly created empty page with its single breadcrumb entry*\n\
    \nNow that you have a Users page, you need to make a modification to the navigation.\
    \ We’ll add an Admin entry to the menu and create sub-entries for user maintenance.\
    \ Here’s the process to follow to add the new menu items with the correct hierarchy:\n\
    \n1.  Navigate to the Shared Components page.\n2.  In the Navigation section,\
    \ click Navigation Menu.\n3.  The interactive report shows the available menus.\
    \ Click on Desktop Navigation Menu, as shown in Figure [9-2](#A978-1-4842-0466-5_9_Chapter.html#Fig2).\n\
    \n![A978-1-4842-0466-5_9_Fig2_HTML.jpg](A978-1-4842-0466-5_9_Fig2_HTML.jpg)\n\
    *Figure 9-2. Clicking the Desktop Navigation Menu*\n\nLooking at the current menu\
    \ structure, as shown in the report in Figure [9-3](#A978-1-4842-0466-5_9_Chapter.html#Fig3),\
    \ you can see we already have seven entries, and that two of the entries (Submit\
    \ a Ticket and Contact Us) are sub-entries of the Home menu entry. Next, we will\
    \ add the Admin menu entry and then add the sub-entry for user maintenance.\n\n\
    ![A978-1-4842-0466-5_9_Fig3_HTML.jpg](A978-1-4842-0466-5_9_Fig3_HTML.jpg)\n*Figure\
    \ 9-3. Viewing the currently existing Navigation Menu entries*\n\nTo add the Admin\
    \ menu entry, click the Create List Entry button in the upper-right corner, as\
    \ indicated in Figure [9-4](#A978-1-4842-0466-5_9_Chapter.html#Fig4).\n\n![A978-1-4842-0466-5_9_Fig4_HTML.jpg](A978-1-4842-0466-5_9_Fig4_HTML.jpg)\n\
    *Figure 9-4. Creating a new menu entry using the Create List Entry button*\n\n\
    1.  In the Entry section, enter `Admin` for List Entry Label.\n2.  In the Target\
    \ section, enter `600` for Page and click Create List Entry at the top of the\
    \ page. See Figure [9-5](#A978-1-4842-0466-5_9_Chapter.html#Fig5).\n\n![A978-1-4842-0466-5_9_Fig5_HTML.jpg](A978-1-4842-0466-5_9_Fig5_HTML.jpg)\n\
    *Figure 9-5. Entering the attributes for the new Admin menu entry*\n\nTo add the\
    \ User Maintenance menu entry, click the Create List Entry button in the upper-right\
    \ corner.\n1.  In the Entry section, set the Parent List Entry to Admin and then\
    \ enter `User Maintenance` for List Entry Label.\n2.  In the Target section, enter\
    \ `600` for Page.\n3.  In the Current List entry section, set List Entry Current\
    \ for Pages Type to Comma Delimited Page List.\n4.  In the List Entry Current\
    \ for Condition, enter `600,610` and click the Create List Entry button at the\
    \ top of the page.\n"
