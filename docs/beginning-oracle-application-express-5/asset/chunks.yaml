    or web service to locate a particular row of data and then edit that data in a
    form on the same table, view, or web service. Some wizards simply create both
    the report and the form for you, including all navigation elements and database-transaction
    processes required to make everything work.


    ## Form on a Table


    One of the most common types of form in APEX is the form on a table. The APEX
    Form on a Table wizard automatically creates and maps APEX items to database columns,
    making it trivial to quickly create forms for database table entry and updates.
    As a developer, you can then modify the different types of controls for each column.
    All of the supported HTML widgets (text fields, text areas, select lists, radio
    groups, check boxes, and so on) are available, as well as several APEX-specific
    ones. The best way to understand just what the APEX Form on a Table wizard does
    is to use it, so let’s dive in and create a form on a table.'
  trans: '## APEX 表单


    表单用于显示、编辑和收集数据，然后将数据发送回数据库进行处理。表单可以与表、视图（通过 `instead of` 触发器）、过程和 Web 服务进行交互。


    一个 `APEX` 表单实际上是一组 `APEX` 对象的集合，它们作为一个单一、内聚的单元协同工作，对数据元素执行插入、更新和删除操作。一个 `APEX`
    表单通常由一个区域、一个或多个项目、一个或多个按钮以及一个或多个处理与数据库交互的过程组成。`APEX` 表单向导会创建一个功能完备的表单所需的所有对象。


    **注意**

    表单生成后，其中的对象在逻辑上并无任何关联，它们只是共同构成一个完整的工作表单。虽然可以修改或删除单个元素，但如果引入错误，可能会导致表单无法正常工作；因此，不建议这样做。


    图 6-1 中列出的 `APEX` 表单向导是创建 `APEX` 表单最快、最有效且最准确的方式。向导会引导你完成一系列步骤，收集表单类型所需的信息，然后生成所有必需的项目、过程和按钮。使用向导可以让你免于繁琐且易出错地逐个创建每个组件的任务。在向导创建表单之后，你可以（而且很可能需要）对生成的组件进行修改和增强，以使表单符合你的特定需求。


    ![A978-1-4842-0466-5_6_Fig1_HTML.jpg](img/A978-1-4842-0466-5_6_Fig1_HTML.jpg)

    图 6-1. `APEX` 创建页面向导，显示表单选项


    以下是使用图 6-1 中列出的向导可以创建的一些表单类型：


    *   **基于表的带报表的表单**：一个建立在表或视图列上的表单，每个表列对应一个项目，一次处理一行数据，外加一个基于该表或视图内容的报表，并包含报表页和表单页之间的导航元素。

    *   **基于表或视图的表单**：一个建立在表或视图列上的表单，每个表列对应一个项目，一次处理一行数据。

    *   **主从表单**：建立在具有主从关系的一对表上的表单。`APEX` 主从表单向导会创建管理主从数据所需的所有数据、处理和导航元素。

    *   **表格表单**：一个多行多列的表单（类似电子表格），允许一次性编辑多行和多列数据。

    *   **基于过程的表单**：一个基于过程参数的表单，通常用于收集要传递给过程进行后续处理的数值。

    *   **基于 SQL 查询的表单**：一个建立在 `SQL` 查询结果上的表单。由于其灵活性，这是一个非常强大的表单结构。

    *   **摘要页**：一个只显示的表单，展示来自现有输入表单页面的选定项目。摘要页常用于为向导构建确认页。

    *   **基于 Web 服务的表单**：一个基于 Web 服务参数的表单。

    *   **基于 Web 服务的表单和报表**：一个基于 Web 服务参数的单行表单，附带所有数据行的相应报表，并包含在报表和表单之间来回移动的导航元素。


    如果你查看可用的 `APEX` 表单向导，会发现其中几个会创建附带的报表（例如“基于表的带报表的表单”和“基于 Web 服务的表单和报表”向导）。常见的做法是使用基于表、视图或
    Web 服务的报表来定位特定的数据行，然后在基于同一表、视图或 Web 服务的表单中编辑该数据。有些向导会直接为你创建报表和表单，包括使一切正常工作所需的所有导航元素和数据库事务处理过程。


    ## 基于表的表单


    `APEX` 中最常见的表单类型之一是基于表的表单。`APEX` 基于表的表单向导会自动创建 `APEX` 项目并将其映射到数据库列，这使得为数据库表的录入和更新快速创建表单变得非常简单。作为开发者，你随后可以修改每列不同类型的数据控件。所有支持的
    `HTML` 控件（文本框、文本区域、选择列表、单选按钮组、复选框等）都可用，此外还有一些 `APEX` 特有的控件。理解 `APEX` 基于表的表单向导功能的最佳方式就是使用它，那么让我们开始动手创建一个基于表的表单吧。'
- fmt: '### Creating a Form on a Table


    In this section you will create Page 2 of your Help Desk system and add a form
    to it. This form will allow the user to create a new ticket by inserting a row
    into the `TICKETS` table. You can limit which DML operations a form in APEX can
    perform. In this case, you restrict it to only performing inserts.


    The Form on a Table wizard walks through all the steps required to generate a
    form on a table: selecting the parsing schema, selecting the table on which to
    base the form, selecting the columns to include and edit, assigning region and
    form titles, and specifying column headings. Begin as follows:


    Navigate to your application’s development home page. This is the page that lists
    all of the pages in your application.

    Click the Create Page button in the upper right of the screen.

    Select Form, and click Next.

    Select Form on a Table or View, and click Next.

    Set Table/View Owner to your schema, and select `TICKETS` (table) for Table/View
    Name, as shown in Figure [6-2](#A978-1-4842-0466-5_6_Chapter.html#Fig2). Click
    Next.


    ![`A978-1-4842-0466-5_6_Fig2_HTML.jpg`](A978-1-4842-0466-5_6_Fig2_HTML.jpg)

    Figure 6-2.


    Entering the schema and table name

    The next step allows you to set some details about the page and region that will
    be created as a result of the wizard. The Page Number can be set to anything you
    wish, but it must be unique within an application. The Page Name sets the text
    that appears in the browser tab when the application is run, and the Region Title
    sets the text that displays in the region’s title area. The Page Mode dictates
    whether the page you are creating will be a normal APEX page or one of the two
    types of dialogs now built in to APEX 5.0: modal or non-modal. Modal dialogs disallow
    interaction with the page underneath the dialog, while non-modal ones allow the
    user to see and interact with the underlying page. The region template dictates
    how the region container is visually rendered. Each APEX theme has a number of
    templates available, but you’ll find that you use the Standard template the most.
    Continue as follows:


    Enter `2` for Page Number, as shown in Figure [6-3](#A978-1-4842-0466-5_6_Chapter.html#Fig3).
    Enter `Create a Ticket` for both Page Name and Region Title. Set the Page Mode
    to Normal. Set Breadcrumb to Breadcrumb. When the page refreshes, set Parent Entry
    to Home and click Next.


    ![`A978-1-4842-0466-5_6_Fig3_HTML.jpg`](A978-1-4842-0466-5_6_Fig3_HTML.jpg)

    Figure 6-3.


    Specifying page, region, mode, and breadcrumb information

    Next, you get to choose how this page relates to the menu system you’ve already
    defined, if it does at all. We’ve already created the entries in the Navigation
    List for these pages, so we’ll use those as we create the page:


    For Navigation Preferences (Figure [6-4](#A978-1-4842-0466-5_6_Chapter.html#Fig4)),
    select Identify an existing navigation menu entry for this page. When the page
    refreshes, set Existing Navigation Menu Entry to Home, and then click Next.


    ![`A978-1-4842-0466-5_6_Fig4_HTML.jpg`](A978-1-4842-0466-5_6_Fig4_HTML.jpg)

    Figure 6-4.


    Specifying navigation options

    APEX 4 introduced the ability to use `ROWID` as a primary key. This comes in handy
    when you’re dealing with a table that has a multi-column natural primary key,
    but the table already has a single-column primary key defined, so you’ll use that:


    Set Primary Key Type to Select Primary Key Column(s), ensure that Primary Key
    is set to `TICKET_ID`, and click Next.

    The primary key of the table is based on a sequence within the database, and there
    is already a trigger in place that fills the primary key with the next sequence
    value, if the primary key for the incoming record is null, as follows:


    Set Source Type to Existing Trigger, as shown in Figure [6-5](#A978-1-4842-0466-5_6_Chapter.html#Fig5),
    and click Next.


    ![`A978-1-4842-0466-5_6_Fig5_HTML.jpg`](A978-1-4842-0466-5_6_Fig5_HTML.jpg)

    Figure 6-5.


    Specifying the primary key population option

    Next, specify the columns that will be visible and editable on the form. By default,
    all the columns in the chosen table appear in the selected column. However, for
    this simple form, you want to restrict the columns the user can see:


    Using the shuttle, make sure `SUBJECT`,`DESCR`,`CREATED_BY`, and `STATUS_ID` are
    the only columns selected, as shown in Figure [6-6](#A978-1-4842-0466-5_6_Chapter.html#Fig6),
    and click Next.


    ![`A978-1-4842-0466-5_6_Fig6_HTML.jpg`](A978-1-4842-0466-5_6_Fig6_HTML.jpg)

    Figure 6-6.


    Selecting the columns to include

    Not all forms allow people to update or delete data. Some are simply data-entry
    forms. In this case, you want un-authenticated users to be able to submit a ticket,
    but you don’t want them to be able to edit or delete those tickets. The next step
    of the wizard allows the developer to choose which actions are available to the
    end user and to name the buttons related to those actions. Every form should have
    a Cancel button that allows the user to abort any actions or data entry. But the
    rest of the buttons are optional:


    *   Create button: Saves a new record

    *   Save button: Saves updates to an existing record

    *   Delete button: Deletes an existing record


    Continue now with creating the form:


    Enter `Cancel` for Cancel Button Label and `Create a Ticket` for Create Button
    Label. Set Show Save Button and Show Delete Button to No, as shown in Figure [6-7](#A978-1-4842-0466-5_6_Chapter.html#Fig7),
    and click Next.


    ![`A978-1-4842-0466-5_6_Fig7_HTML.jpg`](A978-1-4842-0466-5_6_Fig7_HTML.jpg)

    Figure 6-7.


    Specifying the buttons to display

    When the user enters a ticket and clicks a button to either cancel data entry
    or create the new ticket, you need to specify what happens next. Does APEX stay
    on the same page? Does it return to the home page? In this instance, you want
    the user to be redirected to the home page no matter which choice they make:


    Set both Branch here on Submit and Branch here on Cancel to 1, and click Next.
    See Figure [6-8](#A978-1-4842-0466-5_6_Chapter.html#Fig8).


    ![`A978-1-4842-0466-5_6_Fig8_HTML.jpg`](A978-1-4842-0466-5_6_Fig8_HTML.jpg)

    Figure 6-8.


    Specifying branching for Submit and Cancel

    As with most wizards, you’re presented with a final page that summarizes your
    choices. At this point you can use the Previous and Next buttons to work your
    way back and forth through the wizard steps to alter any of your choices. Then
    do the following:


    Click Create to complete the wizard.

    Run your application.


    Congratulations! You’ve just created a fully operational form on the `TICKETS`
    table. The form should look similar to that in Figure [6-9](#A978-1-4842-0466-5_6_Chapter.html#Fig9).


    ![`A978-1-4842-0466-5_6_Fig9_HTML.jpg`](A978-1-4842-0466-5_6_Fig9_HTML.jpg)

    Figure 6-9.


    Running the form on the `TICKETS` table


    Notice that the form region is labeled as you specified in step 6, the form contains
    fields for the four columns you selected in step 10, and the Create a Ticket button
    is labeled as you specified in step 11. Also notice that the four fields are each
    created as the default element type specified in the UI defaults for the `TICKETS`
    table that you created in [Chapter 4](#A978-1-4842-0466-5_4_Chapter.html). The
    help text you specified for each column is there, and it pops up in a new window
    when you click the question mark icon at the end of the field. The Cancel button
    brings you to the home page—page 1, as you specified in step 12. APEX did a lot
    of work for you!


    ### Modifying a Form on a Table


    The APEX wizards handle most of the work of creating a form for you. However,
    it’s rare that you won’t have to make some minor changes to what the wizard creates.
    Now that you have the Create a Tickets form on page 2 of your application, you
    can make a few changes to polish it up a bit.'
