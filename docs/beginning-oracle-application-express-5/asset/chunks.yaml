    how to treat the application ID. The parsing schema can be any of the database
    schemas associated with the workspace. The build status lets the application be
    set to a runtime mode, which is useful for production environments; the default
    allows run and build (or edit) mode. The final option pertains to the application
    ID values; the default option is to assign a new application ID when installed,
    which lets the same application exist in the workspace multiple times—each time
    under a different ID.


    If you choose to reuse the application ID from the export file or to change the
    application ID to one of your choosing, APEX checks to see if an application with
    that ID already exists. If an application with that ID does exist in the same
    workspace, you’re prompted as to whether you wish to replace the application currently
    assigned to that application ID with the one you’re importing. If an application
    with the selected ID exists but is in a different workspace, you’re prohibited
    from using that application ID. This protects you from accidentally overwriting
    applications in other workspaces.


    If the application has supporting objects, the next screen asks whether you want
    to install those supporting objects. It also gives you the option of previewing
    the supporting object scripts that will be run.


    To continue installing the supporting objects, select the Yes radio button and
    click the Next button. The wizard then walks through all the steps that were set
    up when you created the supporting objects. It performs any prerequisite checks
    and validations and decides whether to run the install or upgrade scripts. The
    user is presented with any choices and options related to substitution strings
    and build options.


    Finally, you’re asked to confirm the installation (or upgrade) of the supporting
    objects. Continuing with the wizard runs the appropriate scripts. If there were
    errors during the scripts, the errors are presented to you to view. If there weren’t
    any errors, you’re given the opportunity to see the installation summary or to
    edit or run the application.


    ## Summary


    As you’ve seen, APEX has a robust, built-in migration capability. The export and
    import tools are easy to use and very functional. The additional ability to construct
    installation scripts to manage the database side of an application goes a long
    way toward your being able to deploy self-standing applications in one process.
    But remember that some files may need to be migrated manually because they don’t
    fall into the realm of what APEX can handle via supporting objects.


    # 11. Understanding Websheets


    Websheets were a new marquee feature of APEX 4.0 and deliver end-user control
    over both web content and structure. In the early days of APEX, when it was still
    known as Project Marvel and later as HTML DB, some people thought that end users
    could use APEX to develop their own applications. Although this was true for simple
    spreadsheet-like applications, most end users weren’t comfortable building web
    applications that needed an underlying normalized database together with snippets
    of SQL, PL/SQL, and JavaScript. Websheets now fulfill the early promise of end-user
    development for web content like blogs, wikis, and very simple business applications.
    Websheets give end users this power without forcing them to learn how to normalize
    a database or write code. Everything in websheets, except a few optional, advanced
    features, is declarative.


    Websheets have been designed so that they’re easy to use. However, like all computer
    tools, there is an associated learning curve. That’s the bad news. The good news
    is that the learning curve is very shallow. The tool relies heavily on wizards
    that lead you intuitively through the content-creation processes.


    This chapter will outline the underlying structure of websheets, describe the
    navigation style, and highlight some of the handy features that will make you
    productive. This chapter will concentrate on what websheets can do, while [Chapter
    12](#A978-1-4842-0466-5_12_Chapter.html) will focus on how websheets are built
    by leading you through some step-by-step scenarios. After reading this chapter
    and working through the next chapter, you will be able to quickly create professional-looking
    web content.


    Note


    As you read this chapter, you may find yourself wondering how to create some of
    what is discussed. Not to worry—the examples in the next chapter will provide
    an in-depth look at the major tasks involved in creating a websheet. This chapter
    will provide the background that will enable you to follow along with and fully
    understand the upcoming examples.'
  trans: '## 导入

    通过提供应用程序导出脚本，即可导入 APEX 应用程序。您可以导入到不同的工作区，或导入回原始工作区。应用程序导入向导可从应用程序构建器主页访问。图 10-13
    展示了该向导的初始页面。


    ![A978-1-4842-0466-5_10_Fig13_HTML.jpg](img/A978-1-4842-0466-5_10_Fig13_HTML.jpg)

    图 10-13.

    识别为数据库应用程序的导入文件


    如您所见，该向导允许您导入许多不同类型的 APEX 导出脚本。请确保为您尝试导入的文件选择正确的类型。导入应用程序导出脚本时，点击 `浏览` 来选择应用程序导出文件，并务必选择
    `数据库应用程序、页面或组件导出`。


    图 10-14 中的页面表明应用程序导出文件已从您的计算机上传到服务器。请记住，应用程序文件是一个脚本。尽管在此阶段已上传，但尚未运行；因此，应用程序并未安装。


    ![A978-1-4842-0466-5_10_Fig14_HTML.jpg](img/A978-1-4842-0466-5_10_Fig14_HTML.jpg)

    图 10-14.

    文件上传成功。继续安装应用程序


    点击 `下一步` 按钮将启动将应用程序安装到当前工作区的步骤。APEX 会提示您输入一些关键信息，如图 10-15 所示。


    ![A978-1-4842-0466-5_10_Fig15_HTML.jpg](img/A978-1-4842-0466-5_10_Fig15_HTML.jpg)

    图 10-15.

    将应用程序安装到工作区


    此时，请选择 `解析方案` 和 `构建状态`，然后决定如何处理应用程序 ID。解析方案可以是与该工作区关联的任何数据库方案。`构建状态` 可将应用程序设置为
    `运行时` 模式，这对于生产环境非常有用；默认设置允许 `运行和构建`（或编辑）模式。最后一个选项涉及应用程序 ID 值；默认选项是在安装时分配新的应用程序
    ID，这允许同一个应用程序在工作区中存在多次——每次使用不同的 ID。


    如果您选择重用导出文件中的应用程序 ID，或更改为自选的应用程序 ID，APEX 会检查该 ID 的应用程序是否已存在。如果同一工作区中已存在具有该 ID
    的应用程序，系统会提示您是否希望用正在导入的应用程序替换当前分配给该应用程序 ID 的应用程序。如果所选 ID 的应用程序存在于不同的工作区中，则禁止您使用该应用程序
    ID。这可以防止您意外覆盖其他工作区中的应用程序。


    如果应用程序具有支持对象，下一个屏幕会询问您是否要安装这些支持对象。它还提供了预览将要运行的支持对象脚本的选项。


    要继续安装支持对象，请选择 `是` 单选按钮并点击 `下一步` 按钮。然后，向导将引导您完成创建支持对象时设置的所有步骤。它会执行任何先决条件检查和验证，并决定是运行安装脚本还是升级脚本。系统会向您展示与替换字符串和构建选项相关的所有选择和选项。


    最后，系统要求您确认支持对象的安装（或升级）。继续使用向导将运行相应的脚本。如果在脚本执行期间出现错误，错误将呈现给您查看。如果没有错误，您将有机会查看安装摘要，或者编辑或运行应用程序。


    ## 总结

    正如您所见，APEX 具有强大的内置迁移功能。导出和导入工具易于使用且功能强大。额外能够构建安装脚本来管理应用程序的数据库端，这极大地帮助您在一个流程中部署独立的应用程序。但请记住，有些文件可能需要手动迁移，因为它们不在
    APEX 能够通过支持对象处理的范畴内。


    # 11. 理解 Websheets


    Websheets 是 APEX 4.0 一项全新的瞩目功能，使最终用户能够完全控制网络内容和结构。在 APEX 的早期，当它还被称为 `Project Marvel`，后来被称为
    `HTML DB` 时，有些人认为最终用户可以使用 APEX 来开发他们自己的应用程序。虽然对于简单的类似电子表格的应用程序来说确实如此，但大多数最终用户对于构建需要底层规范化数据库以及
    `SQL`、`PL/SQL` 和 `JavaScript` 代码片段的 Web 应用程序感到不适。Websheets 现在实现了早期对于最终用户开发 Web
    内容（如博客、维基和非常简单的业务应用程序）的承诺。Websheets 赋予了最终用户这种能力，而无需强迫他们学习如何规范化数据库或编写代码。Websheets
    中的一切，除了一些可选的高级功能外，都是声明式的。


    Websheets 在设计上易于使用。然而，像所有计算机工具一样，它存在相关的学习曲线。这是坏消息。好消息是学习曲线非常平缓。该工具严重依赖向导，这些向导能直观地引导您完成内容创建过程。


    本章将概述 websheets 的底层结构，描述导航风格，并重点介绍一些能提高您工作效率的便捷功能。本章将集中讨论 websheets 能做什么，而第 12
    章 将通过引导您完成一些分步场景来关注 websheets 是如何构建的。阅读本章并学习完下一章后，您将能够快速创建外观专业的网络内容。


    注意

    阅读本章时，您可能会发现自己想知道如何创建所讨论的某些内容。不必担心——下一章中的示例将深入探讨创建 websheet 所涉及的主要任务。本章将提供背景知识，使您能够跟上并完全理解接下来的示例。'
- fmt: '## Websheet Structure


    The fundamental building blocks of a websheet (see `Figure 11-1`) are simple to
    envision. A websheet is a container for web pages. The web pages, in turn, are
    containers for sections. A section, which is similar to a region in an APEX database
    application, contains your content. Annotations are used to enhance both the content
    and the search functionality.


    ![`A978-1-4842-0466-5_11_Fig1_HTML.gif`](A978-1-4842-0466-5_11_Fig1_HTML.gif)


    There are five section types:


    *   Text: Text sections contain text that is easily formatted. Links to other
    content and images are embedded within the text by using very simple markup syntax.

    *   Navigation: Navigation sections help you navigate through your hierarchy of
    pages. Creating these sections requires very little thought or effort on your
    part. You can also set up navigation within a long page by using section navigation.

    *   Data: Data sections are used to display data in a row-and-column format that
    is similar to a spreadsheet. There are two types of data sections: report and
    data grid. A report is used to display read-only data from outside your websheet
    (i.e., from tables in a schema assigned to the workspace). Data grids are spreadsheet-like
    objects that you build. You’re responsible for defining the columns, adding data-entry
    business rules, providing default values, and so on. If you’ve used spreadsheets,
    you’ll find this work relatively easy to do.

    *   Chart: Chart sections are used to display graphs. Chart sections get their
    data from data sections. You link a chart section to a data section by using a
    simple and intuitive wizard.

    *   PL/SQL: Users with PL/SQL knowledge can create PL/SQL sections and write their
    own code against the associated schema. PL/SQL sections are available only if
    the websheet application developer has enabled the `Allow SQL and PL/SQL` attribute
    on the Websheet Properties page.


    ## Navigation


    We speak of websheet navigation in two contexts. First, we discuss navigating
    through a websheet’s content. Second, we discuss navigating through the pages
    that are used to build a websheet. Be mindful that, in practice, you frequently
    flip back and forth between these two contexts.


    In both contexts, there are usually several ways to navigate to a given page or
    section. The duplicate navigation choices might cause you a bit of confusion at
    first. However, after you work with websheets for a while, the navigation choices
    become helpful and intuitive. This chapter doesn’t document every possible navigation
    path; instead, it shows you where to look for navigation links so that you can
    quickly find a comfortable navigation style that works for you.


    ### Content Navigation


    Content navigation enables you to quickly go to pages and sections within a page.
    Page navigation is mandatory and is created for you as you create the websheet
    hierarchy. Section navigation is optional and is useful on long pages that require
    a lot of vertical scrolling.


    Page navigation is created by the websheet itself automatically by adding hierarchical
    breadcrumbs. In `Figure 11-2` (a screenshot of the websheet you will build—a soccer
    team management application), the hierarchical breadcrumbs are found in the drop-down
    menu at left, which contains links to `Players`, `Results`, and `Schedule`. For
    small websheets, the breadcrumbs and the right-side navigation sections might
    be all you need.


    ![`A978-1-4842-0466-5_11_Fig2_HTML.jpg`](A978-1-4842-0466-5_11_Fig2_HTML.jpg)


    Second, you can add page navigation manually by creating a page-navigation section.
    You can also embed explicit page links in the page content (see `Figure 11-3`).
    The details for adding a page-navigation section are discussed later under the
    heading “Navigation Sections.” Embedded links are discussed in detail in the “Markup
    Syntax” section.


    ![`A978-1-4842-0466-5_11_Fig3_HTML.jpg`](A978-1-4842-0466-5_11_Fig3_HTML.jpg)


    Section navigation is optional. It’s useful for content-heavy pages that require
    a great deal of scrolling to reach the bottom of the page. Section navigation
    is almost identical to page navigation (see `Figure 11-4`). The main difference
    between page and section navigation sections is the lack of hierarchy in section
    navigation; sections have no children.


    ![`A978-1-4842-0466-5_11_Fig4_HTML.jpg`](A978-1-4842-0466-5_11_Fig4_HTML.jpg)


    ### Structural Navigation


    Structural navigation is utilized to access the pages that are used to build and
    update the structure and content of websheets. On most websheet pages, two areas
    enable you to access the structural pages (see `Figure 11-5`). The first area
    contains the drop-down menus at the top of the page. These menus don’t change
    from page to page. The second area is located on the right side of every page.
    This area contains a set of sections that, in turn, contain links to the various
    structural pages. These sections and links vary from page to page and are tailored
    to the page’s context.


    ![`A978-1-4842-0466-5_11_Fig5_HTML.jpg`](A978-1-4842-0466-5_11_Fig5_HTML.jpg)


    In addition to these areas, some structural links are embedded in the content
    sections. These embedded links are convenient for getting to the Edit page for
    the content that is currently being displayed.


    ## Help


    Don’t overlook the `Help` link (see `Figure 11-6`). The help is clear, concise,
    and useful. Clicking the `Help` link invokes a context-appropriate pop-up page
    that contains mostly static information that you can read at your leisure. We
    strongly recommend that you do so; it takes only a few minutes.


    ![`A978-1-4842-0466-5_11_Fig6_HTML.jpg`](A978-1-4842-0466-5_11_Fig6_HTML.jpg)


    In addition to the static information, one tab contains dynamic information. The
    `Application Content` tab contains complete lists of all the websheet’s pages,
    sections, files, images, data grids, and reports (see `Figure 11-7`). These lists
    are presented in Interactive Reports that you can tailor to suit your needs.


    ![`A978-1-4842-0466-5_11_Fig7_HTML.jpg`](A978-1-4842-0466-5_11_Fig7_HTML.jpg)


    All of the Interactive Reports contain a column that displays the explicit markup
    syntax that enables you to embed links to the listed objects directly in your
    content. This saves you the effort of having to remember the details of the markup
    syntax and type it manually; you also avoid the aggravation of debugging typos.


    An example of how the markup syntax is used is shown in `Figure 11-8`. A link
    to the `Results` page is embedded in the content found in the `Important News`
    text section. Clicking the `Edit` link in the `Important News` text section takes
    you to the corresponding `Edit` page (see `Figure 11-9`), where the underlying
    markup syntax for this example is illustrated.


    ![`A978-1-4842-0466-5_11_Fig9_HTML.jpg`](A978-1-4842-0466-5_11_Fig9_HTML.jpg)


    ![`A978-1-4842-0466-5_11_Fig8_HTML.jpg`](A978-1-4842-0466-5_11_Fig8_HTML.jpg)'
