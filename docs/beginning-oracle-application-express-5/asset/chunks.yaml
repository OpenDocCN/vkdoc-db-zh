- fmt: '## Declarative BLOBs


    In Oracle, BLOB stands for Binary Large Object and is a data type designed to
    store binary files. APEX has streamlined how you can manage BLOB columns with
    a feature called Declarative BLOBs. The APEX wizards recognize a BLOB column and
    automatically alter the related APEX item and report so as to interact seamlessly
    with the column. Why do you care about BLOB columns? Using BLOB columns allows
    you to easily upload and download files, such as documents, spreadsheets, and
    images, into your applications.


    Plan ahead when using the Declarative BLOBs feature. At design time, include these
    columns in tables that will use Declarative BLOBs:


    *   `FILENAME`: Stores the actual file name that is used when a user uploads the
    file

    *   `MIME_TYPE`: Stores the type of the file so browsers know which application
    to launch (Word for `.doc`, Excel for `.xls`, and so on)

    *   `LAST_UPDATED`: Stores the date the BLOB was last updated

    *   `CHARACTER_SET`: Stores the character set of the BLOB, which is essential
    for indexing and processing data that resides within the BLOB


    The first two columns are essential for reading data out of the BLOB when needed.
    APEX uses the Number/Date format column attribute of the BLOB column to map these
    attributes to the BLOB column stored in the database.


    If you add a BLOB column after creating a report or form using a wizard, you have
    to manually set the column or item properties in order to integrate BLOB processing.


    Because you added a BLOB column to the `TICKET_DETAILS` table when you ran the
    SQL script, some things have been done for you. But you still need to do several
    things to use Declarative BLOBs properly. First, you have to map the `FILENAME`
    and `MIME_TYPE` columns to the form that is used to upload the document, so that
    these details are saved in the database. Let’s address the form on page 220 first.


    Edit Page 220 of the application. Edit the item `P220_ATTACHMENT`. In the Settings
    section, you will see the fields shown in Figure [6-69](#A978-1-4842-0466-5_6_Chapter.html#Fig69).


    ![A978-1-4842-0466-5_6_Fig69_HTML.jpg](A978-1-4842-0466-5_6_Fig69_HTML.jpg)


    Figure 6-69. Specifying BLOB settings


    In the Settings attribute group, enter `MIME_TYPE` for MIME Type Column, `FILE_NAME`
    for Filename Column, and `Download` for Download Link Text. Click Save.


    Next, alter the report on page 210:


    Edit Page 210 of the application. Edit the Ticket Details region by clicking its
    name. Locate and open the file `ch6_blob_report.txt`, which you can find where
    you extracted the class files from earlier, and copy the contents into the SQL
    QUERY attribute, replacing all text that is currently there. See Figure [6-70](#A978-1-4842-0466-5_6_Chapter.html#Fig70).


    ![A978-1-4842-0466-5_6_Fig70_HTML.jpg](A978-1-4842-0466-5_6_Fig70_HTML.jpg)


    Figure 6-70. Entering the report query with a BLOB column


    Notice the change in the last column in the select list. Using `dbms_lob.getlength`
    indicates to APEX whether the `ATTACHMENT` BLOB column contains any data. If it
    does, the query returns a number greater than 0. Now you need to alter the report
    column to display a link that allows the end user to download any document that
    may have been uploaded:


    Expand the Columns node under the Ticket Details node in the Rendering tree. Edit
    the `ATTACHMENT` column, changing the Type attribute to Download BLOB. In the
    newly visible BLOB Attributes attribute group, enter `TICKET_DETAILS` for Table
    Name, `ATTACHMENT` for Blob Column, `TICKET_DETAILS_ID` for Primary Key Column
    1, `MIME_TYPE` for Mime Type Column, `FILE_NAME` for Filename Column, and under
    Appearance enter `Download` for Download Text, as shown in Figure [6-71](#A978-1-4842-0466-5_6_Chapter.html#Fig71).


    ![A978-1-4842-0466-5_6_Fig71_HTML.jpg](A978-1-4842-0466-5_6_Fig71_HTML.jpg)


    Figure 6-71. Modifying the BLOB column attributes


    Save your changes.


    Run the application. Test the file upload and download capabilities by attaching
    a file to one of the Ticket Details records and then downloading it from the report.


    This ability to easily upload and download files in APEX is extremely useful in
    building web applications where users need to upload and download data for whatever
    purpose. The Declarative BLOBs feature of APEX makes it simple for developers
    to add upload and download capabilities to an application.


    ## Summary


    You’ve reviewed most of the APEX form and report types and walked through building
    various forms and reports for your Help Desk system using the APEX form and report
    wizards. Along the way, you’ve learned about APEX items, session state, the APEX
    URL syntax, adding help to APEX pages, and incorporating upload and download functionality
    by using the Declarative BLOBs feature. That’s a lot to digest, but the APEX wizards
    have done most of the work for you.


    The common theme here is that the APEX form and reports wizards are huge time-savers
    for developers, creating all the objects—items, buttons, branches, processes,
    and so on—needed for a working form or report. You can then alter the created
    objects to quickly customize the form or report to suit your needs.


    Still, you haven’t strayed far from what APEX builds for you, and you’ve covered
    only the simplest types of forms and reports. The next chapter will look at more-complex
    types of APEX forms and reports, also generated by wizards.


    # 7. Forms and Reports: Advanced


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0466-5_​7](http://dx.doi.org/10.1007/978-1-4842-0466-5_7))
    contains supplementary material, which is available to authorized users.


    This chapter will focus on more complex types of forms and reports; it will also
    introduce charts and maps. Although these are more complex types of forms and
    reports, they’re most often created by using the APEX form and report wizards.


    In the sections that follow, you will learn how to use the APEX form and report
    wizards to add pages to your Help Desk application in order to manage multiple
    tickets on a single page, allow some interactive analysis of ticket data, and
    visualize tickets by date and status. To do so, you will create a tabular form,
    an interactive report, a calendar, and a pie chart, each demonstrating one of
    the more advanced types of APEX forms and reports.


    ## Tabular Forms


    Tabular forms allow users to edit both rows and columns of data at once, much
    like a spreadsheet. The developer can choose a different element type for each
    column—text box, text area, select list, check box, radio group, and so on. Users
    can make changes to multiple data elements and submit them as a single transaction.
    APEX tabular forms handle inserts, updates, and deletes—all with no code!


    The APEX wizards create all of the required elements for a fully operational tabular
    form. Like all APEX forms, there is no logical relationship between items that
    make up a tabular form. Once the wizard creates the items, they’re indistinguishable
    from other APEX page items and can be modified independently of one another. However,
    I recommend exercising caution when making modifications to items generated by
    an APEX wizard; doing so can cause the tabular forms to become inoperable.


    You can opt to bypass the wizard and create your own tabular forms. As your application
    becomes more sophisticated, you may find it more efficient to create forms manually.
    However, this book focuses on the wizard approach.'
