- fmt: "### Looking Behind the Scenes\n\n让我们看看交互式报表的幕后。你可能会惊讶地发现在`Rendering`选项卡中，只有一个交互式报表区域，如图[7-60](#A978-1-4842-0466-5_7_Chapter.html#Fig60)所示。\n\
    \n![A978-1-4842-0466-5_7_Fig60_HTML.jpg](A978-1-4842-0466-5_7_Fig60_HTML.jpg)\n\
    图 7-60.\n交互式报表的 Application Builder 视图\n\n`Processing`选项卡不包含任何元素，`Shared Components`选项卡只包含预期的元素。\n\
    \n这是第一个无法轻松使用标准声明式APEX元素重新创建交互式报表的情况。附加功能来自于一组JavaScript函数、CSS和HTML，它们都包含在交互式报表区域类型中。虽然你可以从头开始构建这个功能，但APEX交互式报表是一个巨大的效率提升工具。\n\
    \n## Calendars\n\n有时，数据中存在一些以传统行列格式查看时不明显的趋势。通过简单地以不同的方式（例如日历报表）显示数据，趋势可能变得显而易见。APEX日历报表可以以每日、每周或每月视图显示数据，并且不需要你输入任何SQL。\n\
    \n### Understanding Calendar Types\n\nAPEX日历是一种APEX报表类型。数据在日历上渲染，而不是以传统的行列格式。对APEX日历的唯一要求是底层表或视图必须至少有一个`DATE`类型的列。\n\
    \n有两种类型的APEX日历：\n\n*   Calendar：基于一个开源的jQuery组件，开箱即用提供了相当多的功能。\n*   Legacy Calendar：使用了在APEX\
    \ 4.2及之前版本中可用的日历区域类型，功能比新的基于jQuery的日历少。\n\n日历中的数据可以像任何其他报表列一样充当列链接。这使得构建一个让用户点击日期并钻取到另一个页面或URL的日历变得简单。\n\
    \n### Creating a Calendar\n\n要实现一个APEX日历，你可以使用创建页面向导新建一个页面和一个日历区域。请遵循以下步骤：\n\n\
    1.  导航到你应用的Application Builder主页。\n2.  点击屏幕右上角的`Create Page`按钮。\n3.  选择`Calendar`并点击`Next`。\n\
    4.  再次选择`Calendar`并点击`Next`。\n5.  如图[7-61](#A978-1-4842-0466-5_7_Chapter.html#Fig61)所示，在`Page\
    \ Number`输入`400`，在`Page Name`和`Region Name`均输入`Ticket Activity Calendar`，并将`Breadcrumb`设置为`Breadcrumb`。\n\
    6.  当页面重新加载时，为`Entry Name`输入`Ticket Activity Calendar`并点击`Next`（参见图[7-62](#A978-1-4842-0466-5_7_Chapter.html#Fig62)）。\n\
    7.  将`Navigation Preference`设置为`Create a new navigation menu entry`。页面刷新后，为`New\
    \ Navigation Menu Entry`输入`Calendar`并点击`Next`（图[7-63](#A978-1-4842-0466-5_7_Chapter.html#Fig63)）。\n\
    8.  确保`Source Type`设置为`Table`，选择你的模式作为`Table/View Owner`，为`Table/View Name`选择`TICKETS_V\
    \ (view)`，如图[7-64](#A978-1-4842-0466-5_7_Chapter.html#Fig64)所示，然后点击`Next`。\n9.\
    \  向导的下一步允许你选择在日历上显示的内容，以及开始和结束日期。此外，在此页面上，你可以选择希望如何显示日期（仅日期或日期和时间）。还有一些选项可以自动生成创建页面或编辑页面，并选择是否希望能够在日历上使用拖放来更改事件的开始和结束日期。我们将使用第210页作为我们的创建和编辑页面，但我们确实希望打开`Drag\
    \ & Drop`。继续如下：\n    *   对于`Display Column`，选择`SUBJECT`。\n    *   对于`Start Date\
    \ Column`，选择`CREATED_ON`。对于`End Date Column`，选择`CLOSED_ON`。\n    *   将`Show Time`设置为`Yes`。\n\
    \    *   将`Add Create Page`和`Add Edit Page`设置为`No`。\n    *   将`Generate Drag &\
    \ Drop Code`设置为`Yes`。\n    *   点击`Next`。\n    *   将`Primary Key Type`设置为`Select\
    \ Primary Key Column(s)`。\n    *   选择`TICKET_ID(Number)`作为`Primary Key Column`。\n\
    \    *   点击`Next`。\n    *   将`Source Type`设置为`Existing Trigger`并点击`Next`。\n  \
    \  *   点击`Create`。\n\n运行日历报表，你会看到类似图[7-65](#A978-1-4842-0466-5_7_Chapter.html#Fig65)所示的内容。将鼠标悬停在任何事件条上将显示一个悬停提示，其中包含更多主题和日期信息。由于我们打开了`Drag\
    \ & Drop`，你可以点击并拖动任何事件来更改其`Created On`日期。\n\n![A978-1-4842-0466-5_7_Fig65_HTML.jpg](A978-1-4842-0466-5_7_Fig65_HTML.jpg)\n\
    图 7-65.\n由向导生成的日历报表\n\n我们可以对日历进行一些调整，以便为查看者提供更多信息，并将其与第210页上的工单编辑屏幕链接起来：\n\n1.\
    \  编辑应用的第400页。\n2.  编辑`Ticket Activity Calendar`的属性。\n3.  找到并打开文件`ch7_calendar_details.txt`（你可以在解压的书籍文件中找到它）。将该文件的内容复制并粘贴到`Settings`属性组下的`Supplemental\
    \ Information`文本区域中，如图[7-66](#A978-1-4842-0466-5_7_Chapter.html#Fig66)所示。\n4.\
    \  点击`View/Edit Link`旁边的`Options`按钮。该按钮应该显示为`No Link Defined`。\n5.  在弹出的对话框中，将`Page`设置为`210`，将`Name`设置为`P210_TICKET_ID`，将`Value`设置为`&TICKET_ID.`，将`Clear\
    \ Cache`设置为`210`，如图[7-67](#A978-1-4842-0466-5_7_Chapter.html#Fig67)所示，然后点击`OK`。保存你的更改。\n\
    \n运行该页面，你的日历应该看起来与图[7-68](#A978-1-4842-0466-5_7_Chapter.html#Fig68)相似。现在，当你将鼠标悬停在事件条上时，可以看到更多的工单详情。你现在也可以点击事件条来编辑工单详情。\n\
    \n![A978-1-4842-0466-5_7_Fig68_HTML.jpg](A978-1-4842-0466-5_7_Fig68_HTML.jpg)\n\
    图 7-68.\n修改后的工单活动日历\n\n> 注意\n>\n> 如果`Supplemental Information`中显示的数据可能包含特殊字符，如`&`、`'`、`\"\
    `或`/`，APEX将尝试对它们进行编码以降低跨站脚本的风险。如果你信任数据源，可以编辑日历区域，在`Security`属性部分，将`Escape Special\
    \ Characters`设置为`No`。\n\n### Looking Behind the Scenes\n\n既然你的日历可以工作了，让我们看看日历向导为你构建了什么。编辑第400页。在`Rendering`选项卡中，如图[7-69](#A978-1-4842-0466-5_7_Chapter.html#Fig69)所示，你基本上只会看到`Calendar`区域。\n\
    \n![A978-1-4842-0466-5_7_Fig69_HTML.jpg](A978-1-4842-0466-5_7_Fig69_HTML.jpg)\n\
    图 7-69.\n你的日历的页面渲染区域\n\n请注意，在页面的`Processing`选项卡中没有任何进程。这是因为日历区域使用JavaScript调用从数据库获取数据，并更改基于拖放操作而移动的任何值。这只是JavaScript和jQuery能做什么的一个简短示例。"
  raw: '### Looking Behind the Scenes


    Let’s look behind the scenes of the interactive report. You may be surprised to
    see that there is only a single interactive report region in the Rendering tab,
    as shown in Figure [7-60](#A978-1-4842-0466-5_7_Chapter.html#Fig60).


    ![A978-1-4842-0466-5_7_Fig60_HTML.jpg](A978-1-4842-0466-5_7_Fig60_HTML.jpg)


    Figure 7-60.


    The Application Builder view of the interactive report


    The Processing tab contains no elements, and the Shared Components tab contains
    only the expected elements.


    This is the first case where you can’t easily re-create the interactive report
    using standard declarative APEX elements. The additional functionality is from
    a collection of JavaScript functions, CSS, and HTML that are all contained within
    the interactive report region type. Although you could build this from scratch,
    the APEX interactive report is a huge timesaver.


    ## Calendars


    Sometimes there are trends in data that aren’t obvious when viewed in the traditional
    row/column format. By simply displaying data in a different way, such as in a
    calendar report, trends can become obvious. The APEX calendar report can display
    data in a daily, weekly, or monthly view and doesn’t require that you enter any
    SQL.


    ### Understanding Calendar Types


    An APEX calendar is a type of APEX report. Data is rendered on a calendar instead
    of in a traditional row/column format. The single requirement for an APEX calendar
    is that the underlying table or view must have at least one `DATE` column.


    There are two types of APEX calendars:


    *   Calendar: This is based on an open-source jQuery component and gives quite
    a lot of functionality out of the box.

    *   Legacy Calendar: This uses the calendar region type that was available up
    through APEX 4.2 and has less functionality than the new jQuery-based calendar.


    Data in a calendar can act as a column link, the same as in any other report column.
    This makes it simple to build a calendar that lets the user click a date and drill
    to another page or URL.


    ### Creating a Calendar


    To implement an APEX calendar, you can create a new page and a Calendar region
    using the Create Page wizard. Here are the steps to follow:


    Navigate to the Application Builder Home Page for your application.   Click the
    Create Page button in the upper right of the screen.   Select Calendar and click
    Next.   Again, select Calendar and click Next.   As shown in Figure [7-61](#A978-1-4842-0466-5_7_Chapter.html#Fig61),
    enter `400` for Page Number and `Ticket Activity Calendar` for both Page Name
    and Region Name, and set Breadcrumb to Breadcrumb.


    ![A978-1-4842-0466-5_7_Fig61_HTML.jpg](A978-1-4842-0466-5_7_Fig61_HTML.jpg)


    Figure 7-61.


    Creating a ticket activity calendar   When the page reloads, enter `Ticket Activity
    Calendar` for Entry Name and click Next (see Figure [7-62](#A978-1-4842-0466-5_7_Chapter.html#Fig62)).


    ![A978-1-4842-0466-5_7_Fig62_HTML.jpg](A978-1-4842-0466-5_7_Fig62_HTML.jpg)


    Figure 7-62.


    Specifying the breadcrumb entry for the calendar   Set Navigation Preference to
    Create a new navigation menu entry. When the page refreshes, enter `Calendar`
    for New Navigation Menu Entry and click Next (Figure [7-63](#A978-1-4842-0466-5_7_Chapter.html#Fig63)).


    ![A978-1-4842-0466-5_7_Fig63_HTML.jpg](A978-1-4842-0466-5_7_Fig63_HTML.jpg)


    Figure 7-63.


    Specifying tabs for a calendar   Make sure the Source Type is set to Table, select
    your schema as the Table/View Owner, select TICKETS_V (view) for Table/View Name,
    as shown in Figure [7-64](#A978-1-4842-0466-5_7_Chapter.html#Fig64), and click
    Next.


    ![A978-1-4842-0466-5_7_Fig64_HTML.jpg](A978-1-4842-0466-5_7_Fig64_HTML.jpg)


    Figure 7-64.


    Specifying the table owner and table name for a calendar The next step in the
    wizard allows you to choose what is displayed on the calendar, as well as the
    begin and end dates. Also, on this page you can choose how you want to see the
    date displayed (Date only or Date and Time). There are also options that will
    automatically generate a create page or an edit page, and choose whether or not
    you want to be able to use drag and drop on your calendar to alter the begin and
    end dates of an event. We’re going to use Page 210 for our create and edit pages,
    but we do want to turn Drag & Drop on. Continue as follows:   For Display Column,
    select `SUBJECT`.   For Start Date Column, select `CREATED_ON`. For End Date Column,
    select `CLOSED_ON`.   Set Show Time to Yes.   Set Add Create Page and Add Edit
    Page to No.   Set Generate Drag & Drop Code to Yes.   Click Next.   Set Primary
    Key Type to Select Primary Key Column(s).   Select `TICKET_ID(Number)` as the
    Primary Key Column.   Click Next.   Set Source Type to Existing Trigger and click
    Next.   Click Create.


    Run the Calendar report, and you’ll see something similar to Figure [7-65](#A978-1-4842-0466-5_7_Chapter.html#Fig65).
    Hovering over any of the event bars will show a hover-hint with more of the subject
    and date information displayed. Since we turned on Drag & Drop, you can click
    and drag any event to change its Created On date.


    ![A978-1-4842-0466-5_7_Fig65_HTML.jpg](A978-1-4842-0466-5_7_Fig65_HTML.jpg)


    Figure 7-65.


    The Calendar report as generated by the wizard


    There are a few tweaks that we can make to the calendar to provide some more information
    to the viewer and to link it with the Ticket edit screen on Page 210:


    Edit Page 400 of the application.   Edit the Attributes of the Ticket Activity
    Calendar.   Locate and open the file `ch7_calendar_details.txt`, which you can
    find where you extracted the book files. Copy and paste the contents of that file
    into the Supplemental Information text area under the Settings attributes group,
    as shown in Figure [7-66](#A978-1-4842-0466-5_7_Chapter.html#Fig66).


    ![A978-1-4842-0466-5_7_Fig66_HTML.jpg](A978-1-4842-0466-5_7_Fig66_HTML.jpg)


    Figure 7-66.


    Setting calendar Supplemental Information attribute   Click the Options button
    next to View/Edit Link. The button should say No Link Defined.   In the resulting
    pop-up dialog, set the Page to `210`, set Name to `P210_TICKET_ID`, set Value
    to `&TICKET_ID.`, set Clear Cache to `210`, as shown in Figure [7-67](#A978-1-4842-0466-5_7_Chapter.html#Fig67),
    and then click OK. Save your changes.


    ![A978-1-4842-0466-5_7_Fig67_HTML.jpg](A978-1-4842-0466-5_7_Fig67_HTML.jpg)


    Figure 7-67.


    Setting the View/Edit Link attributes


    Run the page, and your calendar should look similar to that in Figure [7-68](#A978-1-4842-0466-5_7_Chapter.html#Fig68).
    When you hover over an event bar now, you can see more of the ticket detail. You
    can now also click the event bars to edit the Ticket details.


    ![A978-1-4842-0466-5_7_Fig68_HTML.jpg](A978-1-4842-0466-5_7_Fig68_HTML.jpg)


    Figure 7-68.


    The altered ticket activity calendar Note


    If the data being shown in the Supplemental Information may contain special characters
    such as & ‘ “ or / APEX will attempt to encode them to reduce the risk of Cross-Site
    scripting. If you trust the source of the data, you can edit the Calendar region,
    and in the Security attributes section, set “Escape Special Characters” to No.


    ### Looking Behind the Scenes


    Now that your calendar works, let’s look at what the Calendar wizard built for
    you. Edit page 400\. In the Rendering tab, shown in Figure [7-69](#A978-1-4842-0466-5_7_Chapter.html#Fig69),
    you’ll basically see only the Calendar region.


    ![A978-1-4842-0466-5_7_Fig69_HTML.jpg](A978-1-4842-0466-5_7_Fig69_HTML.jpg)


    Figure 7-69.


    Page Rendering region for your calendar


    Notice that there are no processes in the Processing tab of the page. That is
    because the Calendar region uses JavaScript calls to get the data from the database
    as well as to change any values that shift based on the drag and drop action.
    This is just a brief example of what JavaScript and jQuery can do.'
