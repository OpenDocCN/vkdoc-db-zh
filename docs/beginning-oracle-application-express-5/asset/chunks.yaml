  trans: '

    ## Websheet 结构


    Websheet（参见 `Figure 11-1`）的基本构建块很容易理解。Websheet 是网页的容器。网页反过来又是节（section）的容器。一个节类似于
    APEX 数据库应用中的区域（region），用于容纳你的内容。批注（annotations）则用于增强内容和搜索功能。


    ![`A978-1-4842-0466-5_11_Fig1_HTML.gif`](img/A978-1-4842-0466-5_11_Fig1_HTML.gif)


    共有五种节类型：


    *   文本（Text）：文本节包含易于格式化的文本。指向其他内容和图像的链接通过非常简单的标记语法嵌入在文本中。

    *   导航（Navigation）：导航节帮助你在页面层次结构中导航。创建这些节几乎不需要你费心思或努力。你也可以通过使用节导航在长页面内部设置导航。

    *   数据（Data）：数据节用于以类似电子表格的行-列格式显示数据。数据节有两种类型：报表和数据网格。报表用于显示来自 Websheet 外部（即来自分配给工作区的模式中的表）的只读数据。数据网格是你构建的类似电子表格的对象。你需要负责定义列、添加数据录入业务规则、提供默认值等等。如果你使用过电子表格，你会发现这项工作相对容易完成。

    *   图表（Chart）：图表节用于显示图形。图表节从数据节获取数据。你可以通过一个简单直观的向导将图表节链接到数据节。

    *   PL/SQL：具备 PL/SQL 知识的用户可以创建 PL/SQL 节，并针对关联的模式编写自己的代码。仅当 Websheet 应用程序开发人员在
    Websheet 属性页面上启用了 `Allow SQL and PL/SQL` 属性时，PL/SQL 节才可用。


    ## 导航


    我们从两个上下文讨论 Websheet 导航。首先，我们讨论浏览 Websheet 的内容。其次，我们讨论浏览用于构建 Websheet 的页面。请注意，在实践中，你经常需要在这两个上下文之间来回切换。


    在两种上下文中，通常有几种方法可以导航到给定的页面或节。重复的导航选择一开始可能会让你有点困惑。然而，在你使用 Websheet 一段时间后，导航选择会变得有用且直观。本章并未记录所有可能的导航路径；相反，它向你展示了在哪里可以找到导航链接，以便你能快速找到一种适合你的、舒适的导航风格。


    ### 内容导航


    内容导航使你能够快速跳转到页面以及页面内的节。页面导航是强制性的，会在你创建 Websheet 层次结构时自动为你创建。节导航是可选的，在需要大量垂直滚动的长页面上非常有用。


    页面导航由 Websheet 本身通过添加分层面包屑（breadcrumbs）自动创建。在 `Figure 11-2`（你将构建的 Websheet 截图——一个足球队管理应用程序）中，分层面包屑位于左侧的下拉菜单中，其中包含指向
    `Players`（球员）、`Results`（赛果）和 `Schedule`（赛程）的链接。对于小型 Websheet，面包屑和右侧的导航节可能就是你所需要的全部。


    ![`A978-1-4842-0466-5_11_Fig2_HTML.jpg`](img/A978-1-4842-0466-5_11_Fig2_HTML.jpg)


    其次，你可以通过创建页面导航节来手动添加页面导航。你还可以在页面内容中嵌入显式的页面链接（参见 `Figure 11-3`）。添加页面导航节的详细内容将在后面的“导航节”标题下讨论。嵌入式链接在“标记语法”部分有详细说明。


    ![`A978-1-4842-0466-5_11_Fig3_HTML.jpg`](img/A978-1-4842-0466-5_11_Fig3_HTML.jpg)


    节导航是可选的。它对于内容繁重、需要大量滚动才能到达页面底部的页面非常有用。节导航与页面导航几乎完全相同（参见 `Figure 11-4`）。页面导航节和节导航节之间的主要区别在于节导航缺乏层次结构；节没有子级。


    ![`A978-1-4842-0466-5_11_Fig4_HTML.jpg`](img/A978-1-4842-0466-5_11_Fig4_HTML.jpg)


    ### 结构导航


    结构导航用于访问那些用于构建和更新 Websheet 结构及内容的页面。在大多数 Websheet 页面上，有两个区域可以让你访问结构页面（参见 `Figure
    11-5`）。第一个区域包含页面顶部的下拉菜单。这些菜单不会因页面不同而改变。第二个区域位于每个页面的右侧。该区域包含一组节，这些节又包含指向各种结构页面的链接。这些节和链接因页面而异，并根据页面的上下文量身定制。


    ![`A978-1-4842-0466-5_11_Fig5_HTML.jpg`](img/A978-1-4842-0466-5_11_Fig5_HTML.jpg)


    除了这些区域，一些结构链接也嵌入在内容节中。这些嵌入式链接便于直接访问当前显示内容的编辑页面。


    ## 帮助


    不要忽视 `Help`（帮助）链接（参见 `Figure 11-6`）。帮助内容清晰、简洁且实用。点击 `Help` 链接会调用一个与上下文相适应的弹出页面，其中主要包含静态信息，供你闲暇时阅读。我们强烈建议你这样做；这只需要几分钟时间。


    ![`A978-1-4842-0466-5_11_Fig6_HTML.jpg`](img/A978-1-4842-0466-5_11_Fig6_HTML.jpg)


    除了静态信息，还有一个选项卡包含动态信息。`Application Content`（应用程序内容）选项卡包含 Websheet 所有页面、节、文件、图像、数据网格和报表的完整列表（参见
    `Figure 11-7`）。这些列表以交互式报告（Interactive Reports）的形式呈现，你可以根据需要定制它们。


    ![`A978-1-4842-0466-5_11_Fig7_HTML.jpg`](img/A978-1-4842-0466-5_11_Fig7_HTML.jpg)


    所有交互式报告都包含一个列，该列显示显式的标记语法，使你能够直接将指向所列对象的链接嵌入到你的内容中。这省去了你必须记住标记语法细节并手动输入的麻烦；你也避免了调试拼写错误的烦恼。


    标记语法使用方法的示例如 `Figure 11-8` 所示。一个指向 `Results` 页面的链接被嵌入在 `Important News` 文本节的内容中。点击
    `Important News` 文本节中的 `Edit` 链接将带你到相应的 `Edit` 页面（参见 `Figure 11-9`），该页面展示了此示例的底层标记语法。


    ![`A978-1-4842-0466-5_11_Fig9_HTML.jpg`](img/A978-1-4842-0466-5_11_Fig9_HTML.jpg)


    ![`A978-1-4842-0466-5_11_Fig8_HTML.jpg`](img/A978-1-4842-0466-5_11_Fig8_HTML.jpg)

