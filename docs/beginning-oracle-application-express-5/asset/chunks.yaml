    \ `否` 的结果。\n\n接下来，移除 `STATUS_ID` 并通过稍微调整查询，将相应值拉入报表中以替换它：\n\n1.  编辑应用程序中的页面 `200`。\n\
    2.  通过单击渲染树中区域的名称来编辑 `Tickets` 报表。\n3.  在“源”属性组中，单击右上角靠近 SQL 查询定义的“代码编辑器”按钮。这将展开一个编辑器窗口，允许您更好地编辑\
    \ SQL 语句。\n4.  找到并打开文件 `ch6_add_status_to_report.txt`（您可以在之前提取类文件的位置找到它），将其内容复制到代码编辑器中，替换当前所有文本，然后单击“确定”关闭代码编辑器。参见图\
    \ 6-35。\n    ![A978-1-4842-0466-5_6_Fig35_HTML.jpg](img/A978-1-4842-0466-5_6_Fig35_HTML.jpg)\n\
    \    *图 6-35. 将新查询文本粘贴到代码编辑器中*\n\n现在，我们将使用简单的拖放操作重新排序报表中的列。在本例中，我们希望将 `STATUS`\
    \ 列移动到 `TICKET_ID` 和 `SUBJECT` 列之间。您可以按如下方式操作：\n\n1.  在渲染树中，单击并拖动 `STATUS` 列从列表底部，并在指示器显示其位置位于\
    \ `TICKET_ID` 和 `SUBJECT` 之间时释放，如图 6-36 所示。\n    ![A978-1-4842-0466-5_6_Fig36_HTML.jpg](img/A978-1-4842-0466-5_6_Fig36_HTML.jpg)\n\
    \    *图 6-36. 使用拖放操作重新排序报表中的列*\n2.  保存您的更改。\n\n运行应用程序以查看对 `Tickets` 报表的更改。您应该会看到如图\
    \ 6-37 至 6-39 所示的结果。“创建时间”和“状态”值现在更易读，并且您可以通过单击列标题按列排序。\n![A978-1-4842-0466-5_6_Fig37_HTML.jpg](img/A978-1-4842-0466-5_6_Fig37_HTML.jpg)\n\
    *图 6-37. Tickets 报表*\n![A978-1-4842-0466-5_6_Fig38_HTML.jpg](img/A978-1-4842-0466-5_6_Fig38_HTML.jpg)\n\
    *图 6-38. 管理 Tickets 表单*\n![A978-1-4842-0466-5_6_Fig39_HTML.jpg](img/A978-1-4842-0466-5_6_Fig39_HTML.jpg)\n\
    *图 6-39. Ticket 详情表单*\n\n## 会话状态\n\n接下来，让我们向报表添加一个搜索字段，以允许用户筛选他们可能感兴趣的特定工单。在我们开始之前，先简要解释一下会话状态，以帮助您理解\
    \ APEX 如何跟踪与用户会话关联的值。\n\n### 理解会话状态\n\n会话状态使 APEX 能够跟踪属于特定用户 APEX 会话的所有值。当用户在应用程序中从一个页面移动到另一个页面时，会话状态对于跟踪值特别有用。\n\
    \n与有状态的数据库应用程序（其中连接持续保持，所有值都会保留直到被更改或移除，或者会话结束）不同，APEX 应用程序不维护到数据库的持续连接。APEX 是一个无状态系统——APEX\
    \ 引擎根据存储在 APEX 存储库中的指令生成 HTML 页面。每个页面呈现都是一个无状态事务。APEX 会话将无状态的 HTML 页面连接在一起。\n\n\
    APEX 会话在逻辑和物理上都与底层数据库会话不同。数据库会话是有状态的，而 APEX 会话是无状态的。为了说明区别，可以将数据库会话想象成固定电话上的通话。双方在通话期间保持连接。双方都必须投入资源来进行对话。即使没有人说话，连接——以及双方之间的链接——仍然存在，如图\
    \ 6-40 所示。\n![A978-1-4842-0466-5_6_Fig40_HTML.gif](img/A978-1-4842-0466-5_6_Fig40_HTML.gif)\n\
    *图 6-40. 数据库会话通信*\n\n可以将 APEX 会话想象成短信。双方没有直接连接；他们一次向一个方向推送信息，即使整个交流是通过一系列短信进行的对话。图\
    \ 6-41 说明了 APEX 无状态会话通信。\n![A978-1-4842-0466-5_6_Fig41_HTML.gif](img/A978-1-4842-0466-5_6_Fig41_HTML.gif)\n\
    *图 6-41. APEX 会话通信*\n"
- fmt: "### Sharing Database Connections\n\nMultiple APEX users can share the same\
    \ database connection. There is a one-to-many relationship between APEX users\
    \ and database sessions. This is why APEX can scale as well as it does—it doesn’t\
    \ need dedicated database sessions, only a database session to use to process\
    \ a request from a user.\n\nAPEX, being stateless, must rely on an external mechanism\
    \ to manage session state. The APEX engine has a built-in session-state management\
    \ component. This session-state management is an integral part of APEX—it can’t\
    \ be disabled or circumvented.\n\nEach APEX user is assigned a unique session\
    \ identifier. Session-state management functions the same, regardless of how the\
    \ user authenticates to the system—APEX authentication, database authentication,\
    \ custom authentication, or public user. Yes, even unauthenticated users are assigned\
    \ a session identifier. By default, APEX purges inactive sessions older than 24\
    \ hours every 8 hours. APEX session-state values are stored in a table in the\
    \ database. The APEX engine recognizes the user by their session identifier and\
    \ retrieves the appropriate set of session-state values for the user’s session.\n\
    \nThe values of all APEX items, both page items and application items, are tied\
    \ to this unique session identifier. This identifier is referred to as the `APP_SESSION_ID`.\
    \ You can see the session identifier in the URL of most pages in an APEX application.\
    \ It’s highlighted in Figure [6-42](#A978-1-4842-0466-5_6_Chapter.html#Fig42).\n\
    \n![A978-1-4842-0466-5_6_Fig42_HTML.jpg](A978-1-4842-0466-5_6_Fig42_HTML.jpg)\n\
    \nFigure 6-42.\nAPEX session identifier in an APEX URL\n\n### Setting and Retrieving\
    \ Session State\n\nSession state is set by user-input items, computations, processes,\
    \ and PL/SQL code. In PL/SQL, when within an APEX process, you can set an item\
    \ to be equal to a value, like so:\n```\n:P1_ITEM_NAME := 'some value';\n```\n\
    \nIn PL/SQL, when in a stored procedure, you can use the `apex_util.set_session_state`\
    \ procedure to set a value in session state, as follows:\n```\napex_util.set_session_state(\
    \ 'P1_ITEM_NAME', 'some value');\n```\n\nThe syntax to retrieve session state\
    \ for an item varies according to where you’re referencing the item.\n\nIn templates\
    \ or regions, tabs, menus, or lists, use the following substitution-string syntax\
    \ (and don’t forget the trailing dot!):\n`&P1_ITEM_NAME.`\n\nUse the following\
    \ syntax in SQL statements:\n`:P1_ITEM_NAME`\n\nFrom PL/SQL, use one of the following\
    \ two options, depending on what type of block or program unit you’re in:\nAnonymous\
    \ PL/SQL block: `:P1_ITEM_NAME.`\nPL/SQL Unit Called from APEX: `V('P1_ITEM_NAME')`\n\
    \nWithin conditions, use this syntax:\n`P1_ITEM_NAME`\n\nNote\nThe `V` function\
    \ just mentioned is an APEX-provided function that retrieves the session-state\
    \ value of an APEX item. Exercise caution when using this function, because using\
    \ it in a stored program unit could introduce performance issues.\n\n### Viewing\
    \ Session State\n\nTo view session state, click the Session link on the Developer\
    \ toolbar. You should see a page like that shown in Figure [6-43](#A978-1-4842-0466-5_6_Chapter.html#Fig43).\
    \ Then use the Page, Find, and Views parameters to view session state for the\
    \ application. The drop-down View menu shown in Figure [6-44](#A978-1-4842-0466-5_6_Chapter.html#Fig44)\
    \ allows you to view Page Items, Application Items, Session State, Collections,\
    \ and All of the Above.\n\n![A978-1-4842-0466-5_6_Fig44_HTML.jpg](A978-1-4842-0466-5_6_Fig44_HTML.jpg)\n\
    Figure 6-44.\nChoosing to view session state for all items in the application\n\
    \n![A978-1-4842-0466-5_6_Fig43_HTML.jpg](A978-1-4842-0466-5_6_Fig43_HTML.jpg)\n\
    Figure 6-43.\nViewing the session state of Page Items\n\n## APEX Items\n\nThere\
    \ are two types of APEX items: page items, which are displayed to the user on\
    \ a page, and application items, which hold values in an application but aren’t\
    \ displayed. When referencing item values of either type in queries, you should\
    \ use bind variables. You may also want to reference some of the built-in items\
    \ that are available.\n\n### Page vs. Application Items\n\nAPEX page items are\
    \ the UI controls that let users view and enter data—Text Field, Textarea, Select\
    \ List, Checkbox, and so on. Page items are associated with a specific page and\
    \ have UI properties associated with them; the item is displayed to the user (or\
    \ not) according to the UI properties. Figure [6-45](#A978-1-4842-0466-5_6_Chapter.html#Fig45)\
    \ shows the available APEX page item types, as displayed as part of the components\
    \ gallery. See the APEX documentation for more information on page item types\
    \ and their attributes.\n\n![A978-1-4842-0466-5_6_Fig45_HTML.jpg](A978-1-4842-0466-5_6_Fig45_HTML.jpg)\n\
    Figure 6-45.\nAPEX page item types\n\nApplication items aren’t associated with\
    \ a page and have no UI properties. They hold values in an application that are\
    \ essential but are not necessarily displayed. You can use an application item\
    \ much like a global variable. For example, you may need to calculate sales tax\
    \ based on the state the user lives in. You could read that sales tax percentage\
    \ from a table when the user logs in and keep the value in an application item\
    \ for use throughout the user’s session.\n\n### The Importance of Bind Variables\n\
    \nWhen referencing APEX item values, particularly in SQL queries in your APEX\
    \ application, it’s important to think about SQL security basics, including SQL\
    \ injection. Consider the example of an online form that allows a user to sign\
    \ on with a username and password, which ultimately executes this query:\n```\n\
    SELECT COUNT(*) FROM users\nWHERE username = '&username'\n  AND password = '&password'\n\
    ```\n\nIf you enter this password\n`I_dont_know OR 'x' = 'x`\n\nthe resulting\
    \ SQL is\n```\nSELECT COUNT(*) FROM users\nWHERE username = 'SCOTT'\n  AND password\
    \ = 'I_dont_know' OR 'x' = 'x'\n```\n\nThis SQL statement erroneously returns\
    \ `1`, indicating `True`, rather than `No data found`. The user is allowed in!\
    \ Not good. To prevent the injection of unintended SQL, use bind variables in\
    \ the SQL query, like so:\n```\nSELECT COUNT(*) FROM users\nWHERE username = :USERNAME\n\
    \  AND password = :PASSWORD\n```\n\nNow try entering the following as your password:\n\
    `I_dont_know OR 'x' = 'x`\n\nUnless this entire string is specifically your password,\
    \ the database returns `No data found`. Your attempt to sneak past the login fails.\n\
    \nWe recommend the use of bind variables whenever possible. They prevent SQL injection\
    \ and improve SQL performance.\n\n### Built-In Items\n\nAPEX includes several\
    \ built-in items for referencing key APEX application-wide session-state values.\
    \ These are set automatically by APEX and are available for reference by the developer\
    \ throughout APEX. The most common of these are as follows:\n\n*   `APP_ID`: The\
    \ application identifier of the currently running application\n*   `APP_ALIAS`:\
    \ The application alias of the currently running application\n*   `APP_USER`:\
    \ The currently signed-on user\n*   `APP_SESSION`: The session identifier of the\
    \ currently signed-on user\n*   `APP_PAGE_ID`: The currently running page identifier"
  raw: '### Sharing Database Connections


    Multiple APEX users can share the same database connection. There is a one-to-many
    relationship between APEX users and database sessions. This is why APEX can scale
    as well as it does—it doesn’t need dedicated database sessions, only a database
    session to use to process a request from a user.


    APEX, being stateless, must rely on an external mechanism to manage session state.
    The APEX engine has a built-in session-state management component. This session-state
    management is an integral part of APEX—it can’t be disabled or circumvented.


    Each APEX user is assigned a unique session identifier. Session-state management
    functions the same, regardless of how the user authenticates to the system—APEX
    authentication, database authentication, custom authentication, or public user.
    Yes, even unauthenticated users are assigned a session identifier. By default,
    APEX purges inactive sessions older than 24 hours every 8 hours. APEX session-state
    values are stored in a table in the database. The APEX engine recognizes the user
    by their session identifier and retrieves the appropriate set of session-state
    values for the user’s session.


    The values of all APEX items, both page items and application items, are tied
    to this unique session identifier. This identifier is referred to as the `APP_SESSION_ID`.
    You can see the session identifier in the URL of most pages in an APEX application.
    It’s highlighted in Figure [6-42](#A978-1-4842-0466-5_6_Chapter.html#Fig42).


    ![A978-1-4842-0466-5_6_Fig42_HTML.jpg](A978-1-4842-0466-5_6_Fig42_HTML.jpg)


    Figure 6-42.


    APEX session identifier in an APEX URL


    ### Setting and Retrieving Session State


    Session state is set by user-input items, computations, processes, and PL/SQL
    code. In PL/SQL, when within an APEX process, you can set an item to be equal
    to a value, like so:


    `:P1_ITEM_NAME := ''some value'';`


    In PL/SQL, when in a stored procedure, you can use the `apex_util.set_session_state`
    procedure to set a value in session state, as follows:


    `apex_util.set_session_state( ''P1_ITEM_NAME'', ''some value'');`


    The syntax to retrieve session state for an item varies according to where you’re
    referencing the item.


    In templates or regions, tabs, menus, or lists, use the following substitution-string
    syntax (and don’t forget the trailing dot!):


    `&P1_ITEM_NAME.`


    Use the following syntax in SQL statements:


    `:P1_ITEM_NAME`


    From PL/SQL, use one of the following two options, depending on what type of block
    or program unit you’re in:


    `Anonymous PL/SQL block:           :P1_ITEM_NAME.`


    `PL/SQL Unit Called from APEX:     V(''P1_ITEM_NAME'')`


    Within conditions, use this syntax:


    `P1_ITEM_NAME`


    Note


    The `V` function just mentioned is an APEX-provided function that retrieves the
    session-state value of an APEX item. Exercise caution when using this function,
    because using it in a stored program unit could introduce performance issues.


    ### Viewing Session State


    To view session state, click the Session link on the Developer toolbar. You should
    see a page like that shown in Figure [6-43](#A978-1-4842-0466-5_6_Chapter.html#Fig43).
    Then use the Page, Find, and Views parameters to view session state for the application.
    The drop-down View menu shown in Figure [6-44](#A978-1-4842-0466-5_6_Chapter.html#Fig44)
    allows you to view Page Items, Application Items, Session State, Collections,
    and All of the Above.


    ![A978-1-4842-0466-5_6_Fig44_HTML.jpg](A978-1-4842-0466-5_6_Fig44_HTML.jpg)


    Figure 6-44.


    Choosing to view session state for all items in the application


    ![A978-1-4842-0466-5_6_Fig43_HTML.jpg](A978-1-4842-0466-5_6_Fig43_HTML.jpg)


    Figure 6-43.


    Viewing the session state of Page Items


    ## APEX Items


    There are two types of APEX items: page items, which are displayed to the user
    on a page, and application items, which hold values in an application but aren’t
    displayed. When referencing item values of either type in queries, you should
    use bind variables. You may also want to reference some of the built-in items
    that are available.


    ### Page vs. Application Items


    APEX page items are the UI controls that let users view and enter data—Text Field,
    Textarea, Select List, Checkbox, and so on. Page items are associated with a specific
    page and have UI properties associated with them; the item is displayed to the
    user (or not) according to the UI properties. Figure [6-45](#A978-1-4842-0466-5_6_Chapter.html#Fig45)
    shows the available APEX page item types, as displayed as part of the components
    gallery. See the APEX documentation for more information on page item types and
    their attributes.


    ![A978-1-4842-0466-5_6_Fig45_HTML.jpg](A978-1-4842-0466-5_6_Fig45_HTML.jpg)


    Figure 6-45.


    APEX page item types


    Application items aren’t associated with a page and have no UI properties. They
    hold values in an application that are essential but are not necessarily displayed.
    You can use an application item much like a global variable. For example, you
    may need to calculate sales tax based on the state the user lives in. You could
    read that sales tax percentage from a table when the user logs in and keep the
    value in an application item for use throughout the user’s session.


    ### The Importance of Bind Variables


    When referencing APEX item values, particularly in SQL queries in your APEX application,
    it’s important to think about SQL security basics, including SQL injection. Consider
    the example of an online form that allows a user to sign on with a username and
    password, which ultimately executes this query:


    `SELECT COUNT(*) FROM users`


    `WHERE username = ''&username''`


      `AND password = ''&password''`


    If you enter this password


    `I_dont_know OR ''x'' = ''x`


    the resulting SQL is


    `SELECT COUNT(*) FROM users`


    `WHERE username = ''SCOTT''`


      `AND password = ''I_dont_know'' OR ''x'' = ''x''`


    This SQL statement erroneously returns `1`, indicating `True`, rather than `No
    data found`. The user is allowed in! Not good. To prevent the injection of unintended
    SQL, use bind variables in the SQL query, like so:


    `SELECT COUNT(*) FROM users`


    `WHERE username = :USERNAME`


      `AND password = :PASSWORD`


    Now try entering the following as your password:


    `I_dont_know OR ''x'' = ''x`


    Unless this entire string is specifically your password, the database returns
    `No data found`. Your attempt to sneak past the login fails.


    We recommend the use of bind variables whenever possible. They prevent SQL injection
    and improve SQL performance.


    ### Built-In Items


    APEX includes several built-in items for referencing key APEX application-wide
    session-state values. These are set automatically by APEX and are available for
    reference by the developer throughout APEX. The most common of these are as follows:


    *   `APP_ID`: The application identifier of the currently running application

    *   `APP_ALIAS`: The application alias of the currently running application

    *   `APP_USER`: The currently signed-on user

    *   `APP_SESSION`: The session identifier of the currently signed-on user

    *   `APP_PAGE_ID`: The currently running page identifier'
  trans: "### 共享数据库连接\n\n多个 APEX 用户可以共享同一个数据库连接。APEX 用户与数据库会话之间存在一对多关系。这就是为什么 APEX\
    \ 能够如此高效地扩展——它不需要为每个用户分配专用的数据库会话，只需一个数据库会话来处理用户请求即可。\n\nAPEX 是无状态的，必须依赖外部机制来管理会话状态。APEX\
    \ 引擎内置了一个会话状态管理组件。这种会话状态管理是 APEX 不可或缺的一部分——无法被禁用或规避。\n\n每个 APEX 用户都被分配一个唯一的会话标识符。无论用户如何向系统认证——APEX\
    \ 认证、数据库认证、自定义认证或公开用户——会话状态管理的功能都是相同的。是的，即使是未认证的用户也会被分配一个会话标识符。默认情况下，APEX 每 8\
    \ 小时会清除一次超过 24 小时不活动的会话。APEX 会话状态值存储在数据库的一个表中。APEX 引擎通过会话标识符来识别用户，并检索与该用户会话对应的一组会话状态值。\n\
    \n所有 APEX 项（包括页面项和应用项）的值都与这个唯一的会话标识符绑定。该标识符被称为 `APP_SESSION_ID`。在大多数 APEX 应用程序的页面\
    \ URL 中，您都可以看到这个会话标识符。它在图 6-42 中被突出显示。\n\n![A978-1-4842-0466-5_6_Fig42_HTML.jpg](img/A978-1-4842-0466-5_6_Fig42_HTML.jpg)\n\
    图 6-42.\nAPEX URL 中的会话标识符\n\n### 设置和检索会话状态\n\n会话状态由用户输入项、计算、进程和 PL/SQL 代码设置。在\
    \ PL/SQL 中，如果在 APEX 进程内，您可以将一个项设置为等于一个值，如下所示：\n```\n:P1_ITEM_NAME := 'some value';\n\
    ```\n\n在 PL/SQL 中，如果在存储过程中，您可以使用 `apex_util.set_session_state` 过程来设置会话状态中的值，如下所示：\n\
    ```\napex_util.set_session_state( 'P1_ITEM_NAME', 'some value');\n```\n\n检索项会话状态的语法根据引用项的位置而有所不同。\n\
    \n在模板、区域、选项卡、菜单或列表中，使用以下替代字符串语法（别忘了结尾的点！）：\n`&P1_ITEM_NAME.`\n\n在 SQL 语句中使用以下语法：\n\
    `:P1_ITEM_NAME`\n\n在 PL/SQL 中，根据您所在的程序块类型，使用以下两种选项之一：\n匿名 PL/SQL 块：`:P1_ITEM_NAME.`\n\
    从 APEX 调用的 PL/SQL 单元：`V('P1_ITEM_NAME')`\n\n在条件内部，使用此语法：\n`P1_ITEM_NAME`\n\n注意\n\
    上面提到的 `V` 函数是 APEX 提供的一个函数，用于检索 APEX 项的会话状态值。使用此函数时需谨慎，因为在存储程序单元中使用它可能会引入性能问题。\n\
    \n### 查看会话状态\n\n要查看会话状态，请点击开发者工具栏上的“会话”链接。您应该会看到一个类似于图 6-43 所示的页面。然后使用页面、查找和视图参数来查看应用程序的会话状态。图\
    \ 6-44 中所示的下拉“视图”菜单允许您查看页面项、应用项、会话状态、集合以及上述所有内容。\n\n![A978-1-4842-0466-5_6_Fig44_HTML.jpg](img/A978-1-4842-0466-5_6_Fig44_HTML.jpg)\n\
    图 6-44.\n选择查看应用程序中所有项的会话状态\n\n![A978-1-4842-0466-5_6_Fig43_HTML.jpg](img/A978-1-4842-0466-5_6_Fig43_HTML.jpg)\n\
    图 6-43.\n查看页面项的会话状态\n\n## APEX 项\n\nAPEX 项有两种类型：页面项（在页面上向用户显示）和应用项（在应用程序中保存值但不显示）。在查询中引用这两种类型的项值时，您应使用绑定变量。您可能还需要引用一些可用的内置项。\n\
    \n### 页面项与应用项\n\nAPEX 页面项是让用户查看和输入数据的 UI 控件——文本字段、文本区域、选择列表、复选框等。页面项与特定页面相关联，并具有相关的\
    \ UI 属性；项根据 UI 属性向用户显示（或不显示）。图 6-45 显示了可用的 APEX 页面项类型，作为组件库的一部分展示。有关页面项类型及其属性的更多信息，请参阅\
    \ APEX 文档。\n\n![A978-1-4842-0466-5_6_Fig45_HTML.jpg](img/A978-1-4842-0466-5_6_Fig45_HTML.jpg)\n\
    图 6-45.\nAPEX 页面项类型\n\n应用项不与任何页面关联，也没有 UI 属性。它们在应用程序中保存至关重要但不一定显示的值。您可以像使用全局变量一样使用应用项。例如，您可能需要根据用户所在的州计算销售税。您可以在用户登录时从表中读取该销售税百分比，并将值保留在应用项中，供整个用户会话期间使用。\n\
    \n### 绑定变量的重要性\n\n当引用 APEX 项值时，特别是在 APEX 应用程序的 SQL 查询中，考虑 SQL 安全基础（包括 SQL 注入）非常重要。考虑一个在线表单的示例，该表单允许用户使用用户名和密码登录，最终执行以下查询：\n\
    ```\nSELECT COUNT(*) FROM users\nWHERE username = '&username'\n  AND password\
    \ = '&password'\n```\n\n如果您输入此密码\n`I_dont_know OR 'x' = 'x`\n\n产生的 SQL 是\n```\n\
    SELECT COUNT(*) FROM users\nWHERE username = 'SCOTT'\n  AND password = 'I_dont_know'\
    \ OR 'x' = 'x'\n```\n\n这条 SQL 语句错误地返回了 `1`（表示 `True`），而不是 `未找到数据`。用户被允许登录！这不好。为了防止注入非预期的\
    \ SQL，请在 SQL 查询中使用绑定变量，如下所示：\n```\nSELECT COUNT(*) FROM users\nWHERE username\
    \ = :USERNAME\n  AND password = :PASSWORD\n```\n\n现在尝试输入以下内容作为密码：\n`I_dont_know\
    \ OR 'x' = 'x`\n\n除非这整个字符串确实是您的密码，否则数据库会返回 `未找到数据`。您尝试绕过登录的企图失败了。\n\n我们建议尽可能使用绑定变量。它们可以防止\
    \ SQL 注入并提高 SQL 性能。\n\n### 内置项\n\nAPEX 包含几个用于引用关键 APEX 应用程序范围会话状态值的内置项。这些由 APEX\
    \ 自动设置，可供开发者在整个 APEX 中引用。其中最常见的如下：\n\n*   `APP_ID`：当前运行应用程序的应用标识符\n*   `APP_ALIAS`：当前运行应用程序的应用别名\n\
    *   `APP_USER`：当前登录的用户\n*   `APP_SESSION`：当前登录用户的会话标识符\n*   `APP_PAGE_ID`：当前运行的页面标识符"
- fmt: '## APEX URL Syntax


    Every APEX page is a call to the APEX engine. Every APEX URL is really a call
    to a specific page and passes various parameters. Figure [6-46](#A978-1-4842-0466-5_6_Chapter.html#Fig46)
    shows the URL syntax.


    ![A978-1-4842-0466-5_6_Fig46_HTML.jpg](A978-1-4842-0466-5_6_Fig46_HTML.jpg)


    Figure 6-46. APEX URL syntax


    `f?p` is the call to the `f` PL/SQL procedure passing the argument `p`. The argument
    is actually a concatenation of nine arguments combined into one, delimited by
    a colon. The nine elements of the `p` argument are the same for all APEX page
    requests. You may omit one or more of the arguments, but you must include the
    colon delimiters as placeholders.


    The elements that form the `p` argument are as follows:


    *   `APP_ID`: The application number or alias

    *   `APP_PAGE_ID`: The page number or alias

    *   `APP_SESSION`: The APEX session identifier

    *   `REQUEST`: The HTML request

    *   `DEBUG`: A debug flag, set to `YES` or `NO` or omitted to use the current
    value of the debug flag

    *   `Clear Cache`: A list of pages for which to clear the cache

    *   Item names: A list of APEX item names, separated by commas

    *   Item values: A list of APEX item values, separated by commas, that correspond
    in order to the items specified in the list of item names

    *   `Printer Friendly`: A flag that determines whether the page is rendered in
    Printer Friendly mode


    It’s easiest to understand the APEX URL syntax by looking at a few examples. Table
    [6-1](#A978-1-4842-0466-5_6_Chapter.html#Tab1) shows several examples and explains
    them.


    Table 6-1. APEX URL Examples


    | URL | Description |

    | --- | --- |

    | `f?p=&APP_ID.:10:&APP_SESSION.:::10` | Calls page 10 of the current application
    using the current session and clears the session cache for page 10 |

    | `f?p=&APP_ID.:5:&APP_SESSION.::NO::P2_ID:1234` | Calls page 5 of the current
    application using the current session, not in Debug mode, setting the value of
    `P2_ID` to 1234 |

    | `f?p=&APP_ID.:5:&APP_SESSION.::YES` | Calls page 5 of the current application
    using the current session in Debug mode |


    As you can see, the APEX URL not only supplies directions to the server, but is
    also your key to what page is being requested, with what request, and with what
    values. So, how does this URL syntax tie in to your work on the Help Desk application?


    APEX applications store all values in an APEX session, which is securely bound
    to a specific user and user session. Values stored in this user session can easily
    be set or read by a developer. Any item—application or page—can be easily referenced
    from anywhere within your APEX application. Values can be referenced and passed
    to APEX as part of the `p` parameter so as to control which APEX page is rendered
    and what values are displayed on that page.


    As the volume of data in your system grows, you need a quick way to sort through
    it and control what data is passed to what page. You can add a page item and then
    use the value of that item to filter the SQL statement for the report on page
    200 of the application. In fact, an item in APEX can be referenced in a SQL or
    PL/SQL region, as in the predicate of a query, by using the bind variable syntax
    (`:P1_ITEM_NAME`), and as part of the APEX URL.


    Getting back to the wizard-generated Tickets report, you can apply what you just
    learned about session state, APEX items, and the APEX URL to add a new item called
    `P200_SEARCH` that the user can use to filter the report. After you make these
    report modifications, take a closer look at the components and attributes of an
    APEX report.


    ## Searchable APEX Reports


    Reports with Edit links let users scan a list of rows and choose one to modify.
    Scanning works well for reports that are short, but when reports are long, especially
    more than a page or two, it’s time to add some search functionality to help a
    user quickly zero in on a record to edit.


    ### Creating a Searchable APEX Report


    You’ve already modified the Tickets report generated by the Master Detail Form
    wizard to add sorting, CSV export capability, and a readable status value. As
    generated, the report has an Edit link on the first column, which navigates to
    a Ticket—Ticket Details master–detail form. For the user to find the correct ticket
    to edit, you need a search function. In the next series of steps you will add
    a search item and a Go button to activate the search, and you will modify the
    report query to filter on the search value. We’ll use two different methods to
    place the items in the grid layout. Know that both methods work equally well;
    which you use depends on which you’re more comfortable with. First, let’s create
    the search field:


    1.  Edit Page 200 of the application.

    2.  Create a new item in the Tickets region by right-clicking the region name
    and selecting Create Page Item.

    3.  In the Properties Editor, enter `P200_SEARCH` for the Name and set the Label
    to `Search`, as shown in Figure [6-47](#A978-1-4842-0466-5_6_Chapter.html#Fig47).


    ![A978-1-4842-0466-5_6_Fig47_HTML.jpg](A978-1-4842-0466-5_6_Fig47_HTML.jpg)


    Figure 6-47. Setting the attributes of the newly created item


    4.  In the Settings properties group, set the value of Submit When Enter pressed
    to Yes. Although you just set the item attributes so that the page is submitted
    when the Enter key is pressed, it’s still a good practice to provide a way to
    submit the page using the mouse. Next, you’ll use the component gallery and drag
    and drop to create a new button that, when clicked, processes the item value,
    stores it in session state, and then reloads page 200:

    5.  In the Component Gallery at the bottom of the screen, select Buttons as the
    component type. Click and drag the Text button so that it is positioned directly
    beside the `P200_SEARCH` item you created in the previous steps, as shown in Figure
    [6-48](#A978-1-4842-0466-5_6_Chapter.html#Fig48).


    ![A978-1-4842-0466-5_6_Fig48_HTML.jpg](A978-1-4842-0466-5_6_Fig48_HTML.jpg)


    Figure 6-48. Creating a Go button for the search function


    6.  In the Properties Editor, enter `P200_GO` as the Button Name and `Go` as the
    Label. Leave all the other attributes alone. Next, you’ll adjust the report query
    to apply the `P200_SEARCH` filter. You’ll add a line to the query predicate that
    uses the value stored in `P200_SEARCH` as a filter:

    7.  Edit the Tickets region definition by clicking its name in the Rendering tree.

    8.  Click the Code Editor button in the upper-right portion of the SQL Query attribute.

    9.  Append the following line to the end of the query, and click OK:


    ```

    AND UPPER(subject) LIKE ''%''||UPPER(:P200_SEARCH)||''%''

    ```


    10. Save and Run your report. Remember to test both the button and pressing Enter
    while editing the search field. Both should filter the report correctly.'
