  图 7-7. 指定按钮属性\n\n在“行为”属性组中，将“操作”设置为“重定向到此应用程序中的页面”。\n单击“目标”旁边的“选项对话框”按钮。\n“选项对话框”出现后，将“页面”设置为\
  \ `230`，将“重置分页”设置为“是”，如图 7-8 所示，然后单击“确定”。\n\n![A978-1-4842-0466-5_7_Fig8_HTML.jpg](img/A978-1-4842-0466-5_7_Fig8_HTML.jpg)\n\
  图 7-8. 指定按钮操作属性\n\n保存并运行你的应用程序。\n\n此时，你应该能够通过单击“管理多个工单”按钮从页面 200 导航到你的表格表单。\n\n\
  不过，现在你需要进行一些外观修改，以便更好地控制数据输入以及对话框的观感。\n\n首先，增大对话框窗口的大小，以便可以看到表单的所有元素：\n\n编辑应用程序的页面\
  \ 230。\n在树状窗格的“呈现”选项卡中，选择“页面 230：管理多个工单”。\n在“属性编辑器”中，将对话框的 `宽度` 属性设置为 `1200`，将 `高度`\
