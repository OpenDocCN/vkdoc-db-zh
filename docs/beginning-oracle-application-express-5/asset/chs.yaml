  \n## 用户维护数据录入\n\n作为服务台设计的一部分，你应该能够从应用程序中维护用户。为此，你需要实现一些新的数据库对象。\n\n上传并运行脚本 `ch9_security_objects.sql`。如需分步指导，请参阅第\
