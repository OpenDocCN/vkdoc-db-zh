  \ APEX 表单向导到底构建了什么，以便更深入地理解表单的工作原理。如果你安装了 Web Developer Toolbar 插件（适用于 Chrome 和\
  \ Firefox），可以使用 “Form » Display Form Details” 选项来显示表单详情。图 6-17 展示了显示了表单详情的 “Create\
