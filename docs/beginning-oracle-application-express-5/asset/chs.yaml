  \n\n\n## 使用 PL/SQL 实现动态操作\n\n动态操作被设计为一个可扩展的框架，赋予开发者完全的控制权，以编写那些在纯声明式环境中可能不可用的复杂操作。本着提升用户界面可用性的精神，你应该帮助用户遵循应用程序的业务规则，同时避免给他们带来不必要的工作。在这个练习中，你将利用\
  \ `P2_CREATED_BY` 项需要以大写输入的要求，并使用 SQL 和 PL/SQL 创建一个动态操作，将用户输入的任何内容都转换为大写。步骤如下：\n\
  \n1.  编辑应用程序的第 2 页。\n2.  在树形面板中，导航到“页面呈现”选项卡。\n3.  右键单击 `P2_CREATED_BY` 项，并从上下文菜单中选择“创建动态操作”。\n\
