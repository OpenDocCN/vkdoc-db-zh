  *图 10-10. 支持对象管理主页*


  该页面分为几个区域。顶部的 `摘要` 区域显示了当前在支持对象中定义的内容，下方的三个区域（`安装`、`升级` 和 `卸载`）允许您编辑脚本并定义在每个阶段可用的操作。


