  \ 210 页上任何项目的值，以便在帮助区域中查看它们。\n\n一旦你修改并保存了帮助内容，运行第 210 页。注意，如果你点击第 210 页上任何单个项目旁边的问号图标，会弹出一个窗口，显示特定于该项目的帮助信息。\n\
  \nAPEX 帮助文本区域会自动显示给定页面及其关联项目的帮助文本。帮助文本的显示由 APEX 在后台管理。尽管它不是非常强大——无法通过模板或其他方式更改区域的外观——但现在你没有任何借口不为你的应用程序添加帮助功能了。\n\
  \n\n\n## 声明式 BLOBs\n\n在 Oracle 中，BLOB 代表二进制大对象，是一种设计用于存储二进制文件的数据类型。APEX 通过一项名为“声明式\
  \ BLOBs”的功能，简化了管理 BLOB 列的方式。APEX 向导能识别 BLOB 列，并自动修改相关的 APEX 项和报表，以便与该列无缝交互。为什么你需要关心\
  \ BLOB 列？使用 BLOB 列可以让你轻松地将文件（如文档、电子表格和图像）上传到应用程序中并下载。\n\n使用声明式 BLOBs 功能时需提前规划。在设计时，请将这些列包含在将使用声明式\
  \ BLOBs 的表中：\n\n*   `FILENAME`: 存储用户上传文件时使用的实际文件名\n*   `MIME_TYPE`: 存储文件类型，以便浏览器知道应启动哪个应用程序（如用\
  \ Word 打开`.doc`，用 Excel 打开`.xls`等）\n*   `LAST_UPDATED`: 存储 BLOB 最后更新的日期\n*   `CHARACTER_SET`:\
  \ 存储 BLOB 的字符集，这对于索引和处理存储在 BLOB 内的数据至关重要\n\n前两列对于需要时从 BLOB 中读取数据至关重要。APEX 使用 BLOB\
  \ 列的“数字/日期格式”列属性，将这些属性映射到数据库中存储的 BLOB 列。\n\n如果你在使用向导创建报表或表单之后才添加 BLOB 列，则必须手动设置列或项属性以集成\
  \ BLOB 处理。\n\n由于你在运行 SQL 脚本时已向`TICKET_DETAILS`表添加了 BLOB 列，系统已为你完成了一些工作。但要正确使用声明式\
  \ BLOBs，你仍需要完成几项操作。首先，必须将`FILENAME`和`MIME_TYPE`列映射到用于上传文档的表单，以便将这些详细信息保存在数据库中。让我们先处理第\
  \ 220 页的表单。\n\n编辑应用程序的第 220 页。编辑项`P220_ATTACHMENT`。在“设置”部分，你将看到图 6-69 中所示的字段。\n\n\
  ![A978-1-4842-0466-5_6_Fig69_HTML.jpg](img/A978-1-4842-0466-5_6_Fig69_HTML.jpg)\n\
  \n图 6-69. 指定 BLOB 设置\n\n在“设置”属性组中，为“MIME 类型列”输入`MIME_TYPE`，为“文件名列”输入`FILE_NAME`，为“下载链接文本”输入`Download`。点击“保存”。\n\
  \n接下来，修改第 210 页的报表：\n\n编辑应用程序的第 210 页。点击其名称编辑“工单详情”区域。找到并打开文件`ch6_blob_report.txt`（该文件位于你之前提取的类文件所在目录），将其内容复制到“SQL\
  \ 查询”属性中，替换当前的所有文本。参见图 6-70。\n\n![A978-1-4842-0466-5_6_Fig70_HTML.jpg](img/A978-1-4842-0466-5_6_Fig70_HTML.jpg)\n\
  \n图 6-70. 输入包含 BLOB 列的报表查询\n\n请注意选择列表中最后一列的变化。使用`dbms_lob.getlength`向 APEX 指示`ATTACHMENT`\
  \ BLOB 列是否包含数据。如果包含，查询将返回一个大于 0 的数字。现在你需要修改报表列以显示一个链接，允许最终用户下载任何可能已上传的文档：\n\n在渲染树中展开“工单详情”节点下的“列”节点。编辑`ATTACHMENT`列，将“类型”属性更改为“下载\
  \ BLOB”。在新出现的“BLOB 属性”属性组中，为“表名”输入`TICKET_DETAILS`，为“Blob 列”输入`ATTACHMENT`，为“主键列\
  \ 1”输入`TICKET_DETAILS_ID`，为“Mime 类型列”输入`MIME_TYPE`，为“文件名列”输入`FILE_NAME`，并在“外观”下为“下载文本”输入`Download`，如图\
  \ 6-71 所示。\n\n![A978-1-4842-0466-5_6_Fig71_HTML.jpg](img/A978-1-4842-0466-5_6_Fig71_HTML.jpg)\n\
  \n图 6-71. 修改 BLOB 列属性\n\n保存你的更改。\n\n运行应用程序。通过将文件附加到某个工单详情记录，然后从报表中下载它，来测试文件上传和下载功能。\n\
  \nAPEX 中这种轻松上传和下载文件的能力，在构建用户需要为任何目的上传和下载数据的 Web 应用程序时极其有用。APEX 的声明式 BLOBs 功能使开发者能够轻松地向应用程序添加上传和下载功能。\n\
  \n## 小结\n\n你已了解了大多数 APEX 表单和报表类型，并使用 APEX 表单和报表向导，逐步为你的 Help Desk 系统构建了各种表单和报表。在此过程中，你学习了\
  \ APEX 项、会话状态、APEX URL 语法、向 APEX 页面添加帮助信息，以及通过使用声明式 BLOBs 功能来整合上传和下载功能。需要消化的内容很多，但\
  \ APEX 向导已为你完成了大部分工作。\n\n这里的共同主题是，APEX 表单和报表向导为开发者节省了大量时间，它们创建了工作表单或报表所需的所有对象——项、按钮、分支、进程等。然后，你可以修改这些创建的对象，快速自定义表单或报表以满足你的需求。\n\
  \n尽管如此，你尚未远离 APEX 为你构建的内容，并且只涵盖了最简单的表单和报表类型。下一章将探讨更复杂的 APEX 表单和报表类型，它们同样由向导生成。\n\
  \n"
- "# 7. 表单与报表：高级篇\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0466-5_​7](http://dx.doi.org/10.1007/978-1-4842-0466-5_7)）包含补充材料，可供授权用户使用。\n\
  \n本章将重点介绍更复杂的表单和报表类型；同时还将介绍图表和地图。尽管这些是更复杂的表单和报表类型，但它们最常通过使用 APEX 表单和报表向导来创建。\n\n\
  在接下来的章节中，你将学习如何使用 APEX 表单和报表向导，向你的 Help Desk 应用程序添加页面，以便在单个页面上管理多个工单，允许对工单数据进行一些交互式分析，并按日期和状态可视化工单。为此，你将创建一个表格表单、一个交互式报表、一个日历和一个饼图，每个都演示一种更高级的\
  \ APEX 表单或报表类型。\n\n## 表格表单\n\n表格表单允许用户同时编辑数据的多行和多列，很像电子表格。开发者可以为每一列选择不同的元素类型——文本框、文本区域、选择列表、复选框、单选组等。用户可以修改多个数据元素，并将它们作为一个事务提交。APEX\
  \ 表格表单处理插入、更新和删除——全部无需代码！\n\nAPEX 向导为功能齐全的表格表单创建了所有必需的元素。与所有 APEX 表单一样，构成表格表单的项之间没有逻辑关系。一旦向导创建了这些项，它们就与其他的\
  \ APEX 页面项无异，并且可以独立于彼此进行修改。但是，我建议在修改由 APEX 向导生成的项时要谨慎；这样做可能会导致表格表单无法操作。\n\n你可以选择绕过向导，创建自己的表格表单。随着应用程序变得越来越复杂，你可能会发现手动创建表单更高效。然而，本书侧重于向导方法。\n\
  \n\n### 创建表格表单\n\n在本节中，你将创建一个新页面，该页面包含基于 `TICKETS` 表的表格表单。该表单允许在同一页面上编辑多个工单。随后，你将更改表格表单各列的显示属性。请按以下步骤操作：\n\
  \n导航到你的应用程序的应用程序生成器主页。\n单击页面右上角的“创建页面”按钮。\n选择“表单”并单击“下一步”。\n选择“表格表单”并单击“下一步”。\n\
  对于“表/视图所有者”，选择你的模式，然后对于“表/视图名称”，选择 `TICKETS`（表）。\n确保“允许的操作”设置为“更新”、“插入”和“删除”。\n\
  默认情况下，“使用用户界面默认值”以及所有列都已被选中，如图 7-1 所示。单击“下一步”。\n\n![A978-1-4842-0466-5_7_Fig1_HTML.jpg](img/A978-1-4842-0466-5_7_Fig1_HTML.jpg)\n\
  图 7-1. 为表格表单选择列\n\n将“主键类型”设置为“选择主键列”。\n将“主键列 1”设置为 `1. TICKET_ID (数字)`，然后单击“下一步”。\n\
  将“源类型”设置为“现有触发器”并单击“下一步”。\n选择所有列作为“可更新列”，如图 7-2 所示，然后单击“下一步”。\n\n![A978-1-4842-0466-5_7_Fig2_HTML.jpg](img/A978-1-4842-0466-5_7_Fig2_HTML.jpg)\n\
  图 7-2. 为表格表单选择可更新列\n\n对于“页面”输入 `230`，对于“页面名称”和“区域标题”输入“管理多个工单”，如图 7-3 所示。\n\n![A978-1-4842-0466-5_7_Fig3_HTML.jpg](img/A978-1-4842-0466-5_7_Fig3_HTML.jpg)\n\
