  ## 列表


  ### 列表：定义与类型


  顾名思义，列表是 `APEX` 用来保存链接数据集合的一种结构。列表结构使得菜单能够在众多应用页面间保持一致的显示，且易于在应用的 `共享组件` 区域进行维护。请不要将我们在此讨论的导航列表与值列表（`LOVs`）混淆。列表是一种内置了用于以不同方式显示信息的模板的导航结构。`LOVs`
  则用于支持数据输入，限制用户可以输入的选项。


  列表有两种类型：静态和动态。静态列表由列表项组成，这些项不是数据驱动的，而是在设计时由开发者输入的。动态列表基于数据，返回到列表中的值基于一个 `SQL` 查询。


  ### 列表模板与自定义


  列表模板功能强大。它们支持层级列表、图形项目符号、动态 `HTML` 以及当前页面的高亮显示。列表可以包含具有父子关系的数据；一些列表模板是专门为显示父子数据而设计的。`APEX`
  主题包含多种列表模板，但如果你需要的行为尚未提供，你可以修改或创建自己的列表模板，以按需显示和运作。


  ### 通用主题中的列表


  如本章前文简要提及，新的通用主题使用静态列表代替选项卡进行导航。会创建一个名为 `Desktop Navigation List` 的列表来存放站点的导航，并使用通用主题中内置的一个特殊
  `List` 模板来显示该列表，具体取决于一些应用级属性。


  无论使用列表还是选项卡，当你通过页面创建向导进行操作时，`APEX` 都会询问你是否希望为正在创建的页面创建一个导航条目。如果你在使用通用主题时选择创建一个新的导航条目，系统会为你创建一个新的列表项。


  ### 手动创建列表项


  尽管我们可以让页面创建向导为我们创建所有列表项，但你将为尚不存在的页面在列表中手动创建两个条目，以演示如何手动完成。别担心——你将在接下来的几章中创建这些页面。请遵循以下步骤：


  1.  导航到应用的 `共享组件` 部分。

  2.  找到并点击 `导航` 下的 `列表` 条目。

  3.  在结果报告中找到并点击 `Desktop Navigation Menu` 列表。

  4.  要创建新的列表项，请点击 `图 5-47` 中所示的 `创建列表项` 按钮。


