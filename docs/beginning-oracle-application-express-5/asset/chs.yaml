  *图 6-39. Ticket 详情表单*\n\n## 会话状态\n\n接下来，让我们向报表添加一个搜索字段，以允许用户筛选他们可能感兴趣的特定工单。在我们开始之前，先简要解释一下会话状态，以帮助您理解\
  \ APEX 如何跟踪与用户会话关联的值。\n\n### 理解会话状态\n\n会话状态使 APEX 能够跟踪属于特定用户 APEX 会话的所有值。当用户在应用程序中从一个页面移动到另一个页面时，会话状态对于跟踪值特别有用。\n\
  \n与有状态的数据库应用程序（其中连接持续保持，所有值都会保留直到被更改或移除，或者会话结束）不同，APEX 应用程序不维护到数据库的持续连接。APEX 是一个无状态系统——APEX\
  \ 引擎根据存储在 APEX 存储库中的指令生成 HTML 页面。每个页面呈现都是一个无状态事务。APEX 会话将无状态的 HTML 页面连接在一起。\n\n\
  APEX 会话在逻辑和物理上都与底层数据库会话不同。数据库会话是有状态的，而 APEX 会话是无状态的。为了说明区别，可以将数据库会话想象成固定电话上的通话。双方在通话期间保持连接。双方都必须投入资源来进行对话。即使没有人说话，连接——以及双方之间的链接——仍然存在，如图\
  \ 6-40 所示。\n![A978-1-4842-0466-5_6_Fig40_HTML.gif](img/A978-1-4842-0466-5_6_Fig40_HTML.gif)\n\
  *图 6-40. 数据库会话通信*\n\n可以将 APEX 会话想象成短信。双方没有直接连接；他们一次向一个方向推送信息，即使整个交流是通过一系列短信进行的对话。图\
  \ 6-41 说明了 APEX 无状态会话通信。\n![A978-1-4842-0466-5_6_Fig41_HTML.gif](img/A978-1-4842-0466-5_6_Fig41_HTML.gif)\n\
  *图 6-41. APEX 会话通信*\n\n\n### 共享数据库连接\n\n多个 APEX 用户可以共享同一个数据库连接。APEX 用户与数据库会话之间存在一对多关系。这就是为什么\
  \ APEX 能够如此高效地扩展——它不需要为每个用户分配专用的数据库会话，只需一个数据库会话来处理用户请求即可。\n\nAPEX 是无状态的，必须依赖外部机制来管理会话状态。APEX\
  \ 引擎内置了一个会话状态管理组件。这种会话状态管理是 APEX 不可或缺的一部分——无法被禁用或规避。\n\n每个 APEX 用户都被分配一个唯一的会话标识符。无论用户如何向系统认证——APEX\
  \ 认证、数据库认证、自定义认证或公开用户——会话状态管理的功能都是相同的。是的，即使是未认证的用户也会被分配一个会话标识符。默认情况下，APEX 每 8 小时会清除一次超过\
  \ 24 小时不活动的会话。APEX 会话状态值存储在数据库的一个表中。APEX 引擎通过会话标识符来识别用户，并检索与该用户会话对应的一组会话状态值。\n\n\
  所有 APEX 项（包括页面项和应用项）的值都与这个唯一的会话标识符绑定。该标识符被称为 `APP_SESSION_ID`。在大多数 APEX 应用程序的页面\
  \ URL 中，您都可以看到这个会话标识符。它在图 6-42 中被突出显示。\n\n![A978-1-4842-0466-5_6_Fig42_HTML.jpg](img/A978-1-4842-0466-5_6_Fig42_HTML.jpg)\n\
  图 6-42.\nAPEX URL 中的会话标识符\n\n### 设置和检索会话状态\n\n会话状态由用户输入项、计算、进程和 PL/SQL 代码设置。在 PL/SQL\
  \ 中，如果在 APEX 进程内，您可以将一个项设置为等于一个值，如下所示：\n```\n:P1_ITEM_NAME := 'some value';\n```\n\
  \n在 PL/SQL 中，如果在存储过程中，您可以使用 `apex_util.set_session_state` 过程来设置会话状态中的值，如下所示：\n```\n\
  apex_util.set_session_state( 'P1_ITEM_NAME', 'some value');\n```\n\n检索项会话状态的语法根据引用项的位置而有所不同。\n\
  \n在模板、区域、选项卡、菜单或列表中，使用以下替代字符串语法（别忘了结尾的点！）：\n`&P1_ITEM_NAME.`\n\n在 SQL 语句中使用以下语法：\n\
  `:P1_ITEM_NAME`\n\n在 PL/SQL 中，根据您所在的程序块类型，使用以下两种选项之一：\n匿名 PL/SQL 块：`:P1_ITEM_NAME.`\n\
  从 APEX 调用的 PL/SQL 单元：`V('P1_ITEM_NAME')`\n\n在条件内部，使用此语法：\n`P1_ITEM_NAME`\n\n注意\n\
  上面提到的 `V` 函数是 APEX 提供的一个函数，用于检索 APEX 项的会话状态值。使用此函数时需谨慎，因为在存储程序单元中使用它可能会引入性能问题。\n\
  \n### 查看会话状态\n\n要查看会话状态，请点击开发者工具栏上的“会话”链接。您应该会看到一个类似于图 6-43 所示的页面。然后使用页面、查找和视图参数来查看应用程序的会话状态。图\
  \ 6-44 中所示的下拉“视图”菜单允许您查看页面项、应用项、会话状态、集合以及上述所有内容。\n\n![A978-1-4842-0466-5_6_Fig44_HTML.jpg](img/A978-1-4842-0466-5_6_Fig44_HTML.jpg)\n\
  图 6-44.\n选择查看应用程序中所有项的会话状态\n\n![A978-1-4842-0466-5_6_Fig43_HTML.jpg](img/A978-1-4842-0466-5_6_Fig43_HTML.jpg)\n\
  图 6-43.\n查看页面项的会话状态\n\n## APEX 项\n\nAPEX 项有两种类型：页面项（在页面上向用户显示）和应用项（在应用程序中保存值但不显示）。在查询中引用这两种类型的项值时，您应使用绑定变量。您可能还需要引用一些可用的内置项。\n\
  \n### 页面项与应用项\n\nAPEX 页面项是让用户查看和输入数据的 UI 控件——文本字段、文本区域、选择列表、复选框等。页面项与特定页面相关联，并具有相关的\
  \ UI 属性；项根据 UI 属性向用户显示（或不显示）。图 6-45 显示了可用的 APEX 页面项类型，作为组件库的一部分展示。有关页面项类型及其属性的更多信息，请参阅\
  \ APEX 文档。\n\n![A978-1-4842-0466-5_6_Fig45_HTML.jpg](img/A978-1-4842-0466-5_6_Fig45_HTML.jpg)\n\
  图 6-45.\nAPEX 页面项类型\n\n应用项不与任何页面关联，也没有 UI 属性。它们在应用程序中保存至关重要但不一定显示的值。您可以像使用全局变量一样使用应用项。例如，您可能需要根据用户所在的州计算销售税。您可以在用户登录时从表中读取该销售税百分比，并将值保留在应用项中，供整个用户会话期间使用。\n\
  \n### 绑定变量的重要性\n\n当引用 APEX 项值时，特别是在 APEX 应用程序的 SQL 查询中，考虑 SQL 安全基础（包括 SQL 注入）非常重要。考虑一个在线表单的示例，该表单允许用户使用用户名和密码登录，最终执行以下查询：\n\
  ```\nSELECT COUNT(*) FROM users\nWHERE username = '&username'\n  AND password =\
  \ '&password'\n```\n\n如果您输入此密码\n`I_dont_know OR 'x' = 'x`\n\n产生的 SQL 是\n```\nSELECT\
  \ COUNT(*) FROM users\nWHERE username = 'SCOTT'\n  AND password = 'I_dont_know'\
  \ OR 'x' = 'x'\n```\n\n这条 SQL 语句错误地返回了 `1`（表示 `True`），而不是 `未找到数据`。用户被允许登录！这不好。为了防止注入非预期的\
  \ SQL，请在 SQL 查询中使用绑定变量，如下所示：\n```\nSELECT COUNT(*) FROM users\nWHERE username =\
  \ :USERNAME\n  AND password = :PASSWORD\n```\n\n现在尝试输入以下内容作为密码：\n`I_dont_know OR\
  \ 'x' = 'x`\n\n除非这整个字符串确实是您的密码，否则数据库会返回 `未找到数据`。您尝试绕过登录的企图失败了。\n\n我们建议尽可能使用绑定变量。它们可以防止\
  \ SQL 注入并提高 SQL 性能。\n\n### 内置项\n\nAPEX 包含几个用于引用关键 APEX 应用程序范围会话状态值的内置项。这些由 APEX\
  \ 自动设置，可供开发者在整个 APEX 中引用。其中最常见的如下：\n\n*   `APP_ID`：当前运行应用程序的应用标识符\n*   `APP_ALIAS`：当前运行应用程序的应用别名\n\
  *   `APP_USER`：当前登录的用户\n*   `APP_SESSION`：当前登录用户的会话标识符\n*   `APP_PAGE_ID`：当前运行的页面标识符\n\
  \n\n## APEX URL 语法\n\n每个 APEX 页面都是对 APEX 引擎的一次调用。每个 APEX URL 实际上都是对特定页面的调用，并传递各种参数。图\
  \ 6-46 展示了 URL 语法。\n\n![A978-1-4842-0466-5_6_Fig46_HTML.jpg](img/A978-1-4842-0466-5_6_Fig46_HTML.jpg)\n\
  \n图 6-46. APEX URL 语法\n\n`f?p` 是对 `f` PL/SQL 过程的调用，传递参数 `p`。该参数实际上是九个参数的串联组合，以冒号分隔。`p`\
  \ 参数的这九个元素对于所有 APEX 页面请求都是相同的。你可以省略一个或多个参数，但必须包含冒号分隔符作为占位符。\n\n构成 `p` 参数的元素如下：\n\
  \n*   `APP_ID`：应用程序编号或别名\n*   `APP_PAGE_ID`：页面编号或别名\n*   `APP_SESSION`：APEX 会话标识符\n\
  *   `REQUEST`：HTML 请求\n*   `DEBUG`：调试标志，设置为 `YES` 或 `NO`，或省略以使用调试标志的当前值\n*   `Clear\
  \ Cache`：要清除缓存的页面列表\n*   Item names：APEX 项名称列表，以逗号分隔\n*   Item values：APEX 项值列表，以逗号分隔，与项名称列表中指定的项顺序对应\n\
  *   `Printer Friendly`：决定页面是否以打印机友好模式呈现的标志\n\n通过查看几个示例来理解 APEX URL 语法最为容易。表 6-1\
  \ 展示了几个示例并进行了解释。\n\n表 6-1. APEX URL 示例\n\n| URL | 描述 |\n| --- | --- |\n| `f?p=&APP_ID.:10:&APP_SESSION.:::10`\
  \ | 使用当前会话调用当前应用程序的第 10 页，并清除第 10 页的会话缓存 |\n| `f?p=&APP_ID.:5:&APP_SESSION.::NO::P2_ID:1234`\
  \ | 使用当前会话调用当前应用程序的第 5 页，不处于调试模式，将 `P2_ID` 的值设置为 1234 |\n| `f?p=&APP_ID.:5:&APP_SESSION.::YES`\
  \ | 使用当前会话以调试模式调用当前应用程序的第 5 页 |\n\n如你所见，APEX URL 不仅为服务器提供了指示，也是你了解正在请求哪个页面、使用什么请求以及携带什么值的关键。那么，这种\
  \ URL 语法如何与你在“服务台”应用程序中的工作联系起来呢？\n\nAPEX 应用程序将所有值存储在 APEX 会话中，该会话安全地绑定到特定用户和用户会话。存储在此用户会话中的值可以由开发人员轻松设置或读取。任何项——应用程序级或页面级——都可以从\
  \ APEX 应用程序内的任何位置轻松引用。这些值可以作为 `p` 参数的一部分被引用并传递给 APEX，以控制呈现哪个 APEX 页面以及该页面上显示的值。\n\
  \n随着系统中数据量的增长，你需要一种快速的方法来对其进行排序并控制将什么数据传递到哪个页面。你可以添加一个页面项，然后使用该项的值来过滤应用程序第 200 页报表的\
  \ SQL 语句。实际上，APEX 中的项可以通过使用绑定变量语法 (`:P1_ITEM_NAME`) 在 SQL 或 PL/SQL 区域中被引用，例如在查询的谓词中，也可以作为\
  \ APEX URL 的一部分被引用。\n\n回到向导生成的“工单”报表，你可以应用刚刚学到的关于会话状态、APEX 项和 APEX URL 的知识，添加一个名为\
  \ `P200_SEARCH` 的新项，用户可以使用它来过滤报表。完成这些报表修改后，让我们更仔细地看看 APEX 报表的组件和属性。\n\n## 可搜索的 APEX\
  \ 报表\n\n带有“编辑”链接的报表允许用户扫描行列表并选择一行进行修改。扫描对于较短的报表效果很好，但当报表较长，特别是超过一两页时，就需要添加一些搜索功能来帮助用户快速定位要编辑的记录。\n\
  \n### 创建可搜索的 APEX 报表\n\n你已经修改了由主详细信息表单向导生成的“工单”报表，添加了排序、CSV 导出功能和可读的状态值。按生成时的样式，报表的第一列有一个“编辑”链接，该链接导航到“工单—工单详情”主详细信息表单。为了让用户找到要编辑的正确工单，你需要一个搜索功能。在接下来的步骤系列中，你将添加一个搜索项和一个“执行”按钮来激活搜索，并将修改报表查询以根据搜索值进行过滤。我们将使用两种不同的方法将这些项放置在网格布局中。要知道两种方法效果相当；使用哪种取决于你更习惯哪一种。首先，让我们创建搜索字段：\n\
  \n1.  编辑应用程序的第 200 页。\n2.  通过右键单击“工单”区域名称并选择“创建页面项”，在该区域中创建一个新项。\n3.  在“属性编辑器”中，为“名称”输入\
  \ `P200_SEARCH`，并将“标签”设置为 `搜索`，如图 6-47 所示。\n\n![A978-1-4842-0466-5_6_Fig47_HTML.jpg](img/A978-1-4842-0466-5_6_Fig47_HTML.jpg)\n\
  \n图 6-47. 设置新创建项的属性\n\n4.  在“设置”属性组中，将“按下回车键时提交”属性的值设置为“是”。尽管你刚刚设置了项属性以在按下 Enter\
  \ 键时提交页面，但提供一种使用鼠标提交页面的方法仍然是个好习惯。接下来，你将使用组件库并通过拖放来创建一个新按钮，该按钮在被点击时处理项值，将其存储在会话状态中，然后重新加载第\
  \ 200 页：\n5.  在屏幕底部的“组件库”中，选择“按钮”作为组件类型。点击并拖动“文本”按钮，将其直接放置在你上一步创建的 `P200_SEARCH`\
  \ 项旁边，如图 6-48 所示。\n\n![A978-1-4842-0466-5_6_Fig48_HTML.jpg](img/A978-1-4842-0466-5_6_Fig48_HTML.jpg)\n\
  \n图 6-48. 为搜索功能创建“执行”按钮\n\n6.  在“属性编辑器”中，输入 `P200_GO` 作为“按钮名称”，`执行` 作为“标签”。保持所有其他属性不变。接下来，你将调整报表查询以应用\
  \ `P200_SEARCH` 过滤器。你将在查询谓词中添加一行，使用存储在 `P200_SEARCH` 中的值作为过滤器：\n7.  通过在“渲染”树中单击其名称来编辑“工单”区域定义。\n\
  8.  单击“SQL 查询”属性右上角的“代码编辑器”按钮。\n9.  将以下行附加到查询末尾，然后单击“确定”：\n\n```\nAND UPPER(subject)\
  \ LIKE '%'||UPPER(:P200_SEARCH)||'%'\n```\n\n10. 保存并运行你的报表。记得同时测试按钮和在编辑搜索字段时按回车键。两者都应能正确过滤报表。\n\
  \n\n\n### 添加重置分页功能\n\n每当向页面添加一个搜索项时，非常建议同时添加一个重置分页进程。这样可以防止 APEX 报表引擎在结果集中“迷路”。在这种情况下，创建该进程只有一种方式，因为组件面板中没有现成的进程组件：\n\
  \n编辑应用程序的第 200 页。\n导航到树形面板的 **处理** 选项卡。\n右键单击树中的“处理”节点，并从上下文菜单中选择“创建进程”。\n在属性编辑器中，将**名称**设置为\
  \ `Reset Pagination Process`，并将**类型**选择为“重置分页”，如图 6-49 所示。\n\n![A978-1-4842-0466-5_6_Fig49_HTML.jpg](img/A978-1-4842-0466-5_6_Fig49_HTML.jpg)\n\
  图 6-49. 指定进程选项\n\n保存并运行应用程序。\n\n搜索功能应该在用户按下回车键和点击“执行”按钮时都能工作。但让我们再进一步，修改 `Subject`\
  \ 列，使搜索项以红色高亮显示：\n\n编辑应用程序的第 200 页。\n导航到渲染树，单击 `Subject` 列的名称进行编辑。\n在属性编辑器中，找到“列格式化”属性组，并在“突出显示词”元素中输入\
  \ `&P200_SEARCH.`。请确保包含末尾的句点 (.)。如果忘记了，变量将无法正确解析，因此值也不会被高亮显示。此过程利用 APEX 会话状态来指示用户输入到\
  \ `P200_SEARCH` 中的值应用来高亮显示 `Subject` 列中相同的文本。继续如下操作：\n保存并运行您的应用程序。\n\n现在，当您输入一个搜索值时，匹配的行将被返回，并且搜索项会以红色高亮显示。仅仅几分钟内，您就为您的服务台系统创建了一个可排序、可搜索的报表。让我们看看这个报表在幕后是什么样子。图\
  \ 6-50 展示了从树形面板的各个选项卡中看到的组件。\n\n![A978-1-4842-0466-5_6_Fig50_HTML.jpg](img/A978-1-4842-0466-5_6_Fig50_HTML.jpg)\n\
  图 6-50. 从树形面板的各个选项卡看到的可搜索报表\n\n### 深入幕后——APEX 报表\n\n让我们更仔细地看看 Tickets 报表的组件和属性。编辑第\
  \ 200 页，查看应用程序构建器中的**渲染**、**处理**和**共享组件**选项卡。在**渲染**选项卡中，您有一个包含报表列的 `Tickets` 区域、您刚刚为搜索功能添加的两个项，以及一个“创建”按钮。单击\
  \ `Tickets` 区域名称以选中它。现在，在**属性**窗格中，您可以看到如图 6-51 所示的详细信息。\n\n![A978-1-4842-0466-5_6_Fig51_HTML.jpg](img/A978-1-4842-0466-5_6_Fig51_HTML.jpg)\n\
  图 6-51. 带有搜索过滤器的 Tickets 报表区域源\n\n您可以看到，区域类型是“经典报表”。此区域的源是您在 `TICKETS` 表上执行的 SQL\
  \ 查询，其中修改了 `WHERE` 子句以添加对 `P200_SEARCH` 项的过滤，并将 `P200_SEARCH` 引用为绑定变量。如果愿意，您可以使用“代码编辑器”按钮来更好地查看\
  \ SQL 语句。\n\n通过单击页面左侧渲染树中的“属性”子节点，您可以查看和编辑报表区域的视觉属性。此外，在渲染树中您可以看到报表列的列表。\n\n通过选择一列或多列，您可以调整标题、列宽、列对齐方式和标题对齐方式；您还可以决定是否显示该列、是否需要求和以及是否要对该列启用排序。可以通过拖放它们来重新排列列的顺序。\n\
  \n在共享组件树中，您可以看到导航、面包屑导航和页面的预期对象，以及区域、报表、标签和按钮模板。这并不新鲜，但值得高兴的是向导已经为您构建了这些。\n\n接下来，让我们关注\
  \ Tickets 和 Ticket Details 表单，这是主从表单向导生成的其他组件。\n\n### 深入幕后——APEX 主从表单\n\n编辑第 210\
  \ 页，查看应用程序构建器中的**页面渲染**、**页面处理**和**共享组件**区域。您应该看到类似于图 6-52 所示的结果。\n\n![A978-1-4842-0466-5_6_Fig52_HTML.jpg](img/A978-1-4842-0466-5_6_Fig52_HTML.jpg)\n\
  图 6-52. 从树形面板的各个选项卡看到的主从页面\n\n在**渲染**选项卡中，您有两个“页眉后”进程、一个包含表单项的 `Manage Tickets`\
  \ HTML 区域，以及一个 `Ticket Details` 报表区域。\n\n两个“页眉后”进程，`Fetch Row from TICKETS` 和 `Get\
  \ Next or Previous Primary Key Value`，其功能正如其名所示。当页面传递一个 `TICKET_ID` 时，`Fetch Row\
  \ from TICKETS` 进程会从 `TICKETS` 表中获取一行数据以在表单中显示。`Get Next or Previous Primary Key\
  \ Value` 进程获取序列中的下一个或上一个 `TICKET_ID` 值，并与主从页面上的“下一个”和“上一个”按钮协同触发。\n\n`Manage Tickets`\
  \ 区域包含一个 APEX 项，对应您选择包含在主从表单中的每个 `TICKETS` 列，以及用于取消、删除、保存、创建、下一个和上一个操作的按钮。\n\n`Ticket\
  \ Details` 区域是一个报表区域，显示工单详细信息和一个“创建”按钮，该按钮将重定向您到第 220 页以创建额外的工单详细信息。\n\n在**处理**选项卡中，您可以看到两个“提交后”分支（它们都将您返回到当前页面）、一个“提交后”\
  \ `P220_TICKET_DETAILS_ID` 计算、两个进程（`Process Row of TICKETS` 和 `Reset Page`）以及一个指向第\
  \ 200 页的“处理后”分支。“提交后”计算在您点击 `Ticket Details` 区域中的“创建”按钮时获取下一个 `TICKET_DETAILS_ID`。新的\
  \ `TICKET_DETAILS_ID` 被传递到第 220 页，即工单详细信息表单。`Process Row of TICKETS` 进程对 `TICKETS`\
  \ 表执行数据库 DML 操作，包括插入、更新和删除。当点击“删除”按钮时，`Reset Page` 进程会重置（清除）页面上的元素。指向第 200 页的“处理后”分支在处理成功后将用户重定向到第\
  \ 200 页，即您的 `TICKETS` 列表。\n\n**共享组件**区域包含了您已经熟悉的 APEX 元素，用于页面选项卡、值列表、面包屑导航和模板。\n\
  \n在应用程序构建器中转到第 220 页，即 `Ticket Details` 表单，您将看到与第 210 页的 `Manage Tickets` 表单相似的元素（参见图\
  \ 6-53）。\n\n![A978-1-4842-0466-5_6_Fig53_HTML.jpg](img/A978-1-4842-0466-5_6_Fig53_HTML.jpg)\n\
  图 6-53. 从树形面板的各个选项卡看到的工单详细信息表单\n\n**渲染**选项卡包括一个“页眉后” `Fetch Row from TICKET_DETAILS`\
  \ 进程、一个 HTML 区域（该区域包含对应您选择包含在主从表单中的 `TICKET_DETAILS` 列的项）以及用于处理的按钮。\n\n**处理**选项卡包括一个\
