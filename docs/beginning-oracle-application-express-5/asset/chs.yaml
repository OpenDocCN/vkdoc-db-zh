  \ `600` 类似的 `Shared Components` 面包屑条目。运行应用程序，将显示用户报表页面和管理用户页面的面包屑条目，如图 9-12 所示。\n\
  \n![A978-1-4842-0466-5_9_Fig12_HTML.jpg](img/A978-1-4842-0466-5_9_Fig12_HTML.jpg)\n\
  \n图 9-12. 显示管理用户页面的面包屑条目\n\n最后，你需要将 `P610_PASSWORD` 的项类型更改为 `Password`，这样它就能接受用户输入，但在键入密码时显示星号\
  \ (`*`) 字符。此项目类型设计为在编辑记录时不检索数据，尽管它绑定到数据库列。此外，此项目类型不会在会话状态中保存任何值，这意味着在页面处理完成后不会记住输入的值。这是一项安全功能，旨在防止不恰当地检索标识为密码的数据。\n\
