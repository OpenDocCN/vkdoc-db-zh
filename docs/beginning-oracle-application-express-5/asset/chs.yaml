  将“添加行按钮标签”更改为 `添加工单`。\n在“确认”可滚动区域中检查你的选择，如图 7-5 所示。\n\n![A978-1-4842-0466-5_7_Fig5_HTML.jpg](img/A978-1-4842-0466-5_7_Fig5_HTML.jpg)\n\
