  ## 全局页面


  `全局页面`是一种特殊类型的页面，用作您应用的“母版页”，并且可以为每种用户界面类型添加一个（即，您可以有一个用于桌面 UI 的 `全局页面`，另一个用于移动
  UI）。


  放置在 `全局页面` 上的项目会在其相关 UI 的每个页面上渲染，除非有条件地指定不这样做。当您发现需要在多个页面甚至应用的所有页面上显示相同区域时，这特别有用。只需将一个区域移动到您的
  `全局页面`，它就会随每个页面一起渲染。


  一个很好的使用例子是面包屑区域或包含自定义 JavaScript 代码的区域，这些代码需要每个页面都能使用。来自 `全局页面` 的区域内容会包含在该 UI 的每个页面中，即使区域没有可见地渲染。


  虽然您可以为 `全局页面` 分配任何页码，但与桌面界面相关的 `全局页面` 的默认页码是零 (`0`)。实际上，`全局页面` 取代了以前 APEX 版本中称为
  `Page Zero` 的功能。


  在 APEX 页面设计器中查看 `全局页面` 的定义时（图 5-35），您可能会注意到“处理”选项卡的树状窗格中没有任何节点。`全局页面` 仅在页面渲染期间使用。添加到
  `全局页面` 的区域甚至会包含在登录页面上。在向 `全局页面` 添加内容时，您需要考虑应用中不同的页面类型。


  ![A978-1-4842-0466-5_5_Fig35_HTML.jpg](img/A978-1-4842-0466-5_5_Fig35_HTML.jpg)


  图 5-35.


  如 APEX 页面设计器所示，`全局页面` 没有处理节点


  创建 `全局页面` 就像在 APEX 应用中创建任何其他页面一样。但是，一旦创建，它就不再出现在该 UI 类型的 `创建选项` 列表中。让我们为桌面界面创建一个
  `全局页面`：


  从应用页面列表中，点击“创建页面”按钮。


  在弹出的向导中，从“页面类型”列表中选择 `全局页面` 并点击“下一步”。图 5-36 显示了 `全局页面` 选项，它应该位于列表的底部附近。


  ![A978-1-4842-0466-5_5_Fig36_HTML.jpg](img/A978-1-4842-0466-5_5_Fig36_HTML.jpg)


  图 5-36.


  选择创建 `全局页面`


  将 `Page Number` 保留为 `0`（零），然后点击“创建”。


  您现在应该看到您的 `全局页面` 列在应用的页面中。目前，`全局页面` 上没有任何内容。您将使用此 `全局页面` 来包含并显示下一节将介绍的面包屑区域。




  ## 面包屑区域


  面包屑是一种流行的导航结构。它为用户提供当前导航路径的快速直观表示，并可选择使用该结构向后导航。Oracle Application Express 在图 [5-37]
