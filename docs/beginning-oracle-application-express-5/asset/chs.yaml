  7.  将“操作”设置为“设置值”，在“设置”部分，为“设置类型”选择“PL/SQL 表达式”。\n8.  在“PL/SQL 表达式”中输入 `UPPER(:P2_CREATED_BY)`，在“要提交的页面项”中输入\
  \ `P2_CREATED_BY`。\n9.  在“受影响元素”部分，将“选择类型”设置为“触发元素”。\n10. 将“页面加载时触发”设置为“否”。参见图 16-16。\n\
  \n![A978-1-4842-0466-5_16_Fig16_HTML.jpg](img/A978-1-4842-0466-5_16_Fig16_HTML.jpg)\n\
  \n图 16-16. 使用 PL/SQL 表达式作为动态操作的主体\n\n11. 保存并运行该页面。\n\n这里，你使用 PL/SQL `UPPER` 表达式来获取用户输入并将其转换为大写。你通过绑定变量\
  \ `:P2_CREATED_BY` 来引用用户输入的值。然而，由于用户输入到 Web 浏览器的值尚未提交到 APEX，该值当前不在会话状态中。这就是为什么你需要将其包含在要提交的页面项列表中。如果你需要引用多个用户输入值，必须将它们全部以逗号分隔的列表形式输入。\n\
  \n现在，当运行第 2 页时，在“创建者”字段中输入的任何文本都会在用户离开该字段时被转换为大写。\n\n> **注意**\n>\n> 使用 SQL 或 PL/SQL\
  \ 作为条件或主体的动态操作，实际上会回调数据库服务器来运行相关代码。根据代码的权重和复杂性，这可能会引入性能问题。请将 SQL 和 PL/SQL 的使用保留给那些需要与数据库交互以检索页面内无法直接获取数据的操作。\n\
  \n## 使用 JavaScript 实现动态操作\n\n除了 PL/SQL，你还可以在动态操作中使用 JavaScript。在这个练习中，你将使用 JavaScript\
  \ 来确定你在第 210 页编辑的工单的屏幕状态。如果用户将状态设置为 `CLOSED`，动态操作将自动把 `关闭日期` 设置为今天的日期：\n\n1.  编辑应用程序的第\
  \ 210 页。\n2.  在树形面板中，导航到“动态操作”选项卡。\n3.  通过在树中右键单击“事件”节点并从上下文菜单中选择“创建动态操作”来创建一个新的动态操作。\n\
  4.  在“名称”中输入 `AutoFill Closed_On Date`。\n5.  确保“事件”设置为“更改”，将“选择类型”设置为“项”，并在“项”中输入\
  \ `P210_STATUS_ID`。\n6.  将“条件”设置为“JavaScript 表达式”。\n7.  找到并打开文件 `ch16_javascript.txt`。该文件可以在你解压本书相关文件的位置找到。\n\
  \n检查用作条件主体的 JavaScript 字符串。起初这可能看起来很晦涩，但分解开来，它相当直接。让我们分段来看：\n\n```\nthis.triggeringElement.options[this.triggeringElement.selectedIndex].text\
  \ == 'CLOSED'\n```\n\n关键字 `this` 引用最初启动事件链的 JavaScript 事件，`triggeringElement` 引用页面上处于事件根源的项。因此，在本例中，`this.triggeringElement`\
  \ 指的是 `P210_STATUS_ID`。\n\n这里需要引入一些开发者知识。作为开发者，你知道 `P210_STATUS_ID` 是一个选择列表，该列表有一个或多个用户可以选择的值。在\
  \ HTML 中，这些值被称为选项。\n\n由于你以声明方式定义了 `P210_STATUS_ID` 选择列表的方式，一次只能选择一个选项。你可以使用 JavaScript\
  \ 的 `this.triggeringElement.selectedIndex` 来访问当前在页面上选中的选项。方括号使用该索引来引用 `P210_STATUS_ID`\
  \ 选择列表中选中的选项。\n\n尽管你可以引用选中选项的 `value`，但那只会给你所选状态的 ID。然后你必须再往返数据库一次来查找文本状态。相反，你可以使用\
  \ `.text` JavaScript 方法来获取选择列表向最终用户显示的文本，看看他们选择了什么。\n\n一旦你获取到该文本，就可以将其与你寻找的值 `CLOSED`\
  \ 进行比较。\n\n8.  将文件内容复制到“值”中，如图 16-17 所示，然后单击“下一步”。\n\n![A978-1-4842-0466-5_16_Fig17_HTML.jpg](img/A978-1-4842-0466-5_16_Fig17_HTML.jpg)\n\
  \n图 16-17. 为动态操作的条件文本使用 JavaScript\n\n9.  在动态操作树的“真”节点下，单击“显示”操作（以红色突出显示）以编辑其属性。\n\
  10. 将“操作”设置为“设置值”，将“设置类型”设置为“PL/SQL 表达式”，并在“PL/SQL 表达式”中输入 `SYSDATE`。\n11. 在“受影响元素”部分，将“选择类型”设置为“项”，并将“项”设置为\
  \ `P210_CLOSED_ON`。\n12. 确保“页面加载时触发”设置为“否”。\n13. 虽然你希望在选择状态为 `CLOSED` 时设置 `CLOSED_ON`\
  \ 日期，但如果你选择除 `CLOSED` 外的任何状态，你希望清除当前在 `CLOSED_ON` 日期中输入的任何内容。因此，使用动态操作的“假”操作来实现这一点。\n\
  14. 在树形面板的“动态操作”选项卡中，右键单击“自动填充 Closed_On_Date 动态操作”的“假”节点，然后选择“创建 FALSE 操作”。\n15.\
  \ 将“假操作”设置为“设置值”。\n16. 将“设置类型”设置为“PL/SQL 表达式”，并在“PL/SQL 表达式”中输入 `NULL`。虽然 `P210_STATUS_ID`\
  \ 触发动态操作，但受影响元素是 `P210_CLOSED_ON`。\n17. 将“选择类型”设置为“项”，并将“项”设置为 `P210_CLOSED_ON`。\n\
  18. 确保“页面加载时触发”设置为“否”。\n19. 保存并运行你的应用程序。\n\n运行你的应用程序，并使用第 210 页编辑任意工单。将状态更改为 `CLOSED`，然后再改回任何其他状态。你将看到\
  \ `关闭日期` 的值会根据你为选择列表选择的值进行设置和清除。\n\n## 总结\n\n动态操作用途广泛且极其灵活。但是，你必须确保同一页面上的多个动态操作不会相互干扰。此外，由于动态操作作为\
  \ JavaScript 在浏览器中运行，应尽可能多地以声明方式或使用 JavaScript 来完成，尽量避免使用 SQL 或 PL/SQL。这样可以减少对数据库服务器的调用次数，并避免潜在的性能瓶颈。\n\
  \n为了实现更复杂的结果，你很可能不可避免地需要学习至少一点 JavaScript。JavaScript 语法不难学，它可以作为 Web 应用程序开发者技能中有用的补充。\n\
  \n\n\n"
- "# 17. 页面设计器演练与参考\n\n在 `APEX` 5.0 之前的版本中，影响工作效率的一个挑战是：在修改任何属性之前，需要先深入到要编辑的具体项中。这意味着需要学习这些项在\
  \ `树形视图`、上下文菜单和实际编辑屏幕中的位置。同时也意味着，在页面上编辑多个项目可能相当繁琐。\n\n`APEX` 5.0 彻底重新设计了构建和编辑页面的流程。作为\
  \ `APEX` 4.0 一部分引入的、大家熟悉的 `树形视图` 已被弃用，取而代之的是新的 `页面设计器`。你不再需要深入到单独的页面去编辑各个项目——现在一切都在一个页面上完成。\n\
  \n虽然这可能意味着生产力的巨大飞跃，但起初可能会让人望而生畏，特别是对于我们这些已经花费大量时间熟悉 `APEX` 4.0 方法的人来说。\n\n本节将带你逐个部分地了解新的\
  \ `页面设计器`，并介绍本书中用来指代其各个部分和功能的术语。如果你试图记住某个功能的位置，或者想知道某个特定按钮或项目的作用，这里也是一个很好的参考地方。\n\
  \n## 页面设计器概述\n\n虽然新的 `页面设计器` 看起来与之前 `APEX` 版本的处理方式大相径庭，但它实际上是一个经过验证的设计。只需想想 `Visual\
  \ Studio`、`Eclipse`、`NetBeans` 以及市场上众多的其他 `IDE` 即可。它们都遵循非常相似的设计模式，新的 `APEX 5.0`\
  \ `页面设计器` 正是以此为模型设计的。\n\n图 A-1 展示了正在编辑 `示例数据库应用` 第 1 页的 `页面设计器`。\n\n![A978-1-4842-0466-5_17_Fig1_HTML.jpg](img/A978-1-4842-0466-5_17_Fig1_HTML.jpg)\n\
  图 A-1. `APEX 5.0` `页面设计器`\n\n`页面设计器` 被划分为五个主要区域，如图 A-1 中的数字所示：\n\n-   `页面设计器工具栏`\
  \ – 位于 `页面设计器` 顶部，用于访问页面级别的活动。\n-   `树形窗格` – 显示一组选项卡，允许访问 `渲染`、`动态操作`、`处理` 和 `共享组件`。\n\
  -   `中央窗格` – 提供对布局、消息、页面级搜索和上下文相关帮助的访问。\n-   `属性编辑器` – 允许编辑页面上所选项的属性。\n-   `组件库`\
  \ – 提供对 `APEX` 中可用的不同区域、项和按钮类型的访问。\n\n你可能会注意到的一点是，在笔记本电脑等较小的屏幕上，界面可能看起来相当拥挤。你可以通过点击并拖动各区域之间的分隔条来调整各区域的大小，并且可以通过点击图\
  \ A-1 中指示的小三角图标来切换区域的可见性。不过，如果你像我一样，可能会希望在有更多空间的显示器上完成大部分工作，以便将窗格拉伸到更舒适、可读性更好的大小。\n\
  \n现在，让我们更深入地探索五个主要部分。\n\n## 页面设计器工具栏\n\n图 A-2 展示了 `页面设计器` 工具栏，它旨在让你能够访问多个页面级别的活动。\n\
  \n![A978-1-4842-0466-5_17_Fig2_HTML.jpg](img/A978-1-4842-0466-5_17_Fig2_HTML.jpg)\n\
  图 A-2. `页面设计器` 工具栏\n\n在左侧，你会看到 `APEX` 面包屑导航，告诉你当前正在编辑哪个应用，并且你当前位于 `页面设计器`。从左到右依次是各个控件。将鼠标悬停在每个控件上会显示一个工具提示，其中包含描述，在某些情况下还包含有关该控件的更多信息。\n\
  \n\n\n## 页面查找器\n\n单击下拉菜单会打开“页面查找器”对话框，允许您选择要编辑的页面。您也可以直接输入页码并单击 `Go` 按钮导航到该页。如果您尝试离开当前页面，且存在任何未保存的更改，**APEX**\
  \ 将询问您是否要放弃这些更改并继续。\n\n## 页面锁定\n\n此处显示的挂锁图标指示当前页面的锁定状态。如果页面已解锁，挂锁图标显示为打开状态；如果已锁定，挂锁图标将显示为关闭状态。单击该图标将切换锁定状态并将当前用户指定为该锁的所有者。锁定页面时，系统将要求您提供锁定注释，该注释将显示给访问该页面的其他用户。\n\
  \n## 撤销\n\n这会回滚对一个或多个项目的最近一次更改。将鼠标悬停在图标上将指示将被回滚的更改。\n\n## 重做\n\n这会重新应用对一个或多个项目的最近一次更改。将鼠标悬停在图标上将指示将被重新应用的更改。\n\
  \n## 创建\n\n此下拉菜单提供对多种 **APEX** 对象的创建访问权限。**Create** 菜单提供以下选项：\n\n### 页面\n\n启动“创建页面”向导。\n\
  \n### 页面副本\n\n启动“复制页面”向导。\n\n### 表单区域\n\n启动“创建表单”向导。\n\n### 报表区域\n\n启动“创建报表区域”向导。\n\
  \n### 页面组件\n\n打开一个帮助对话框，概述在 **APEX 5.0** 中创建页面组件的方式。\n\n### 共享组件\n\n启动“创建应用程序组件”向导。\n\
  \n### 页面组\n\n导航到 **APEX** 中的“创建页面组”页面。\n\n### 开发者注释\n\n打开“开发者注释”对话框。在这里，您可以针对当前页面或一组页面输入和查看注释。\n\
  \n### 团队开发\n\n提供一个子菜单，允许在团队开发工具中创建功能、错误和待办事项。\n\n## 实用工具\n\n此下拉菜单提供对多个页面相关实用工具的访问。**Utilities**\
  \ 菜单提供以下选项：\n\n### 删除页面\n\n允许您删除当前页面。选择此选项后显示的对话框允许您确认删除，并决定是否要级联删除到任何相关的列表条目，同时显示您将删除的页面内容。\n\
  \n### 顾问\n\n打开一个新浏览器窗口，显示 **APEX Advisor** 并选择当前页面进行处理。从这里，您可以对应用程序或特定页面执行检查，包括查找错误、安全问题、质量保证问题和其他最佳实践。\n\
  \n### 缓存\n\n导航到当前页面的缓存仪表板。从这里您可以管理当前页面的页面和区域缓存。\n\n### 属性字典\n\n导航到当前页面的属性字典仪表板。从这里您可以从属性字典更新当前页面，或使用当前页面更新属性字典。\n\
  \n### 历史记录\n\n导航到针对当前页面和应用程序所做的历史更改报告。该报告显示所做的更改以及进行更改的开发者。\n\n### 导出\n\n启动“导出页面”向导，允许在进行更改之前将应用程序的单个页面导出为备份，或在实例之间传输。\n\
  \n### 跨页面实用工具\n\n导航到一组可在多个页面中使用的页面。\n\n### 应用程序实用工具\n\n导航到一组应用程序级别的实用工具。\n\n###\
  \ 页面组\n\n导航到“页面组”管理和分配页面。\n\n### 升级应用程序\n\n导航到“应用程序升级”报告和向导。在这里，您可以查看应用程序的哪些元素可能从升级到\
  \ **APEX 5.0** 提供的最新功能中受益。\n\n## 组件视图\n\n从“页面设计器视图”切换到“组件视图”，该视图自早期 **APEX** 版本起就已可用。\n\
  \n## 团队开发\n\n此下拉菜单提供对“团队开发”模块功能的访问权限，并且仅当工作区内启用了团队开发时才会显示。**Team Development** 菜单提供以下选项：\n\
  \n### 功能\n\n导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成功能。\n\n### 待办事项\n\n导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成待办事项。\n\
  \n### 错误\n\n导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未完成错误。\n\n### 反馈\n\n导航到“团队开发”模块并显示一个报告，该报告经过筛选以显示当前页面的未处理反馈。\n\
  \n## 开发者注释\n\n启动一个对话框，可以在其中针对当前页面创建开发者注释、错误或待办事项。\n\n## 共享组件\n\n导航到 **APEX** 的“共享组件”页面，提供对所有应用程序级别共享组件的访问权限。\n\
  \n## 保存\n\n保存当前页面上任何未保存的更改。\n\n## 保存并运行\n\n保存当前页面上任何未保存的更改，然后运行该页面。\n\n\n## 树形窗格\n\
  \n页面设计器左侧的树形窗格，通过四个选项卡——**渲染**、**动态操作**、**处理**和**页面共享组件**，提供了对当前页面所有组件的访问。图 A-3\
  \ 展示了树形窗格的顶部区域并指出了其通用功能。\n\n![A978-1-4842-0466-5_17_Fig3_HTML.jpg](img/A978-1-4842-0466-5_17_Fig3_HTML.jpg)\n\
  \n图 A-3.\n页面设计器的树形窗格\n\n点击顶部的四个选项卡之一，将根据上下文改变窗格主体中显示的树形数据：\n\n*   `Rendering` 选项卡将树形数据更改为显示与页面渲染相关的组件，包括区域、项目、按钮、逻辑等。\n\
  *   `Dynamic Actions` 选项卡将树形数据更改为显示当前页面上定义的所有动态操作，无论它们如何触发。\n*   `Processing` 选项卡将树形数据更改为显示与页面处理相关的所有应用逻辑，包括计算、验证、过程和分支。\n\
  *   `Page Shared Components` 选项卡将树形数据更改为显示与此页面关联的应用级共享组件。\n\n注意\n\n在 `Rendering`\
  \ 和 `Dynamic Actions` 选项卡之间存在一些重叠，因为 `Rendering` 选项卡会显示任何触发元素是已渲染组件的动态操作。请不要因此误以为它们是单独的动态操作。它们是相同的，只是为了方便而在两个位置显示。\n\
  \n当 `Rendering` 或 `Processing` 选项卡处于活动状态时，会显示两个额外的按钮（如图 A-3 所示），允许您按处理顺序分组（默认）或按组件类型分组。\n\
  \n`Dynamic Action` 和 `Page Shared Component` 选项卡分别按事件和组件类型分组，然后按用户分配的顺序排序。\n\n最后一个控件是操作菜单，它是一个上下文相关的菜单，镜像了您在树中右键单击组件时看到的上下文菜单。根据当前哪个选项卡处于活动状态以及在树中选择了哪个节点，两种菜单类型都提供了多种功能。\n\
  \n例如，如果您当前位于 `Rendering` 选项卡并在树中选择了一个区域，单击操作菜单或在树中右键单击区域名称将生成一个可用选项的上下文菜单。\n\n将鼠标悬停在树中的任何节点上，无论您位于哪个选项卡，都会显示一个包含该组件基本信息的工具提示。\n\
  \n您还可以使用树通过拖放来重新排序组件。重新排序表单中的项目就像单击并将项目拖动到您想要的顺序一样简单。在拖动项目时，树中会出现一个黄色的辅助节点，指示合法的放置位置。但请注意，这只会更改它们的顺序，而不会影响任何项目的布局属性。\n\
  \n## 中央窗格\n\n中央窗格被分为四个单独的选项卡，如图 A-4 所示：**网格布局**、**消息**、**页面搜索**和**帮助**。每个选项卡都值得详细解释。\n\
  \n![A978-1-4842-0466-5_17_Fig4_HTML.jpg](img/A978-1-4842-0466-5_17_Fig4_HTML.jpg)\n\
  \n图 A-4.\n中央窗格的选项卡\n\n### 网格布局\n\n如图 A-5 所示，`Grid Layout` 选项卡提供了将在页面上显示的组件的可视化表示。虽然这绝不是最终渲染的完整\
  \ WYSIWYG 表示，但它在帮助开发人员理解组件将如何在屏幕上呈现方面做得非常好。\n\n![A978-1-4842-0466-5_17_Fig5_HTML.jpg](img/A978-1-4842-0466-5_17_Fig5_HTML.jpg)\n\
  \n图 A-5.\n网格布局和相关控件\n\n如前所述，您可以使用区域分隔条来调整屏幕上每个面板所占的空间量，或者您可以通过单击分隔条上的箭头来完全隐藏一个区域。然而，有时您可能希望将\
  \ `Grid Layout` 扩展到占据整个画布。单击 `Expand/Restore` 按钮将最初展开然后恢复网格布局。\n\n或者，在特别大或繁忙的页面上，您可能希望专注于特定区域的布局。在\
  \ `Grid Layout` 中单击某个区域，然后单击 `Display From Here` 按钮，将隐藏选定区域之外页面上的所有其他区域。单击 `Display\
  \ From Page` 按钮将把 `Grid Layout` 恢复为其默认视图，显示整个页面的可见组件。\n\n可以通过拖放移动页面上的可见组件。也可以通过从图库中将新组件拖放到网格布局画布上来将它们添加到页面（参见图\
  \ A-6）。在拖动项目定位时，可以放置对象的区域将具有黄色背景。当您将鼠标悬停在放置区域上时，黄色背景内会出现一个灰色框（如图 A-6 所示），指示对象将被放置的位置。\n\
  \n![A978-1-4842-0466-5_17_Fig6_HTML.jpg](img/A978-1-4842-0466-5_17_Fig6_HTML.jpg)\n\
  \n图 A-6.\n使用拖放放置按钮\n\n与树形窗格一样，`Grid Layout` 包含一个操作菜单和所有组件可用的上下文菜单。通过在网格布局中选择组件并右键单击或单击操作菜单，您将看到该组件的可用操作。\n\
  \n在 `Grid Layout` 的操作菜单和上下文菜单中有一组选项控制网格布局中显示的内容：\n\n*   `Hide Empty Legacy Positions`：当选择此选项时（默认），空的模板位置（被认为是“旧版的”）将从网格布局中隐藏。旧版位置被认为是那些与较旧主题相关的位置，虽然未被弃用，但不鼓励继续使用。即使选择了此选项，如果位置包含组件，它仍会显示在网格布局中。\n\
  *   `Hide Empty Positions`：当选择此选项时，任何不包含组件的位置将被隐藏。这允许开发人员仅关注那些当前包含项目的位置。\n*   `Hide\
  \ Global Page Components`：当选择此选项时（默认），网格布局会隐藏放置在当前界面全局页面上的任何组件。这允许开发人员仅关注在当前页面上定义的组件。\n\
  *   `Hide Buttons`：当选择此选项时，所有被认为是按钮容器的区域以及任何已分配的按钮都将被隐藏。这允许开发人员专注于区域内项目的放置。\n* \
  \  `Hide Items`：当选择此选项时，所有被认为是项目容器的区域以及任何已分配的项目都将被隐藏。这允许开发人员专注于区域内按钮的放置。\n\n同样，与树形窗格类似，`Grid\
  \ Layout` 中也提供了工具提示，提供有关您鼠标悬停组件的基本信息。\n\n注意\n\n隐藏的项目不会显示在网格布局中，但会出现在树形窗格的 `Rendering`\
  \ 部分中。\n\n### 消息\n\n在通过放置组件并编辑其属性来开发页面时，您不可避免地会看到某个组件以红色或黄色高亮显示，并且“消息”选项卡会显示徽章，指示可用消息的数量，如图\
  \ A-7 所示。\n\n![A978-1-4842-0466-5_17_Fig7_HTML.jpg](img/A978-1-4842-0466-5_17_Fig7_HTML.jpg)\n\
  *图 A-7. “消息”选项卡显示消息及其关联的组件和属性*\n\n消息分为两种类型：\n\n-   **错误**：以红色指示，这些消息必须在保存页面前得到处理。点击“消息”选项卡中的错误文本，将在属性窗格中显示与该错误关联的属性。\n\
  -   **警告**：以黄色指示，这些消息用于提示您潜在的问题。您仍可以在未处理警告的情况下保存页面，但页面可能无法正常运行，直到警告被完全解决。点击“消息”选项卡中的警告文本，将在属性窗格中显示与该警告关联的属性。\n\
  \n### 页面搜索\n\n图 A-8 展示了“页面搜索”选项卡，它允许您搜索所有页面组件的元数据。\n\n![A978-1-4842-0466-5_17_Fig8_HTML.jpg](img/A978-1-4842-0466-5_17_Fig8_HTML.jpg)\n\
  *图 A-8. 显示搜索结果的“页面搜索”选项卡*\n\n在搜索字段中输入任意文本并按下 `回车键`，将在应用程序的元数据中搜索输入的搜索词，并显示找到的所有匹配项，同时高亮显示您的搜索词。点击搜索到的任何项目，将导航到页面设计器中的对应组件。\n\
  \n使用“区分大小写”选项将要求搜索与输入的搜索词完全匹配大小写。使用“正则表达式”选项会将搜索词视为正则表达式字符串处理。\n\n“清除”按钮将清除整个“页面搜索”表单以及其下方列出的所有结果。\n\
  \n### 帮助\n\n属性编辑器中的每个属性都有相关的帮助信息可供开发人员使用。要查看帮助，请在树状窗格或网格布局中选择一个组件，然后选择一个属性。此时，切换到“帮助”选项卡将显示所选属性的帮助信息。图\
  \ A-9 显示了 `P1_SEARCH` 文本字段的 `子类型` 属性的可用帮助文本。\n\n![A978-1-4842-0466-5_17_Fig9_HTML.jpg](img/A978-1-4842-0466-5_17_Fig9_HTML.jpg)\n\
  *图 A-9. 查看 `P1_SEARCH` 子类型属性的帮助*\n\n这种上下文相关的帮助将帮助开发人员快速掌握 APEX 5.0 中引入的许多新属性。\n\n\
  每个帮助部分的底部都有一个“提供关于帮助的反馈”链接。点击该链接将打开一个新的浏览器窗口，并导航到一个 APEX 应用程序，允许您就当前上下文中的属性帮助文本提供反馈。Oracle\
  \ APEX 开发团队将利用此反馈在未来的版本中优化帮助文本。\n\n### 属性编辑器\n\n页面设计器右侧的“属性编辑器”显示了在树状窗格或中央窗格中当前选定的组件的所有属性。图\
  \ A-10 显示了“属性编辑器”窗格并概述了相关控件。\n\n![A978-1-4842-0466-5_17_Fig10_HTML.jpg](img/A978-1-4842-0466-5_17_Fig10_HTML.jpg)\n\
  *图 A-10. 页面设计器的“属性编辑器”窗格*\n\n当您在树状窗格或网格布局中选择组件时，“属性编辑器”将更新以显示当前选定组件的属性。属性按“属性组”组织，可以通过点击组名旁边的三角形图标进行展开和折叠。“必需属性指示器”在属性标签附近的左上角以红色三角形的形式显示。\n\
  \n“属性编辑器”中显示的信息量和类型可以通过窗格顶部的控件进行控制：\n\n-   **显示常用**：当只选择一个组件时，选择此选项将仅显示值与默认值不同的属性。如果选择了多个组件，此选项还将显示所选组件间被共同编辑过的属性。\n\
  -   **显示全部**：当只选择一个组件时，选择此选项将显示所选组件的所有属性。如果选择了多个组件，此选项还将显示所选组件的所有公共属性。\n-   **全部折叠**：折叠所有“属性组”，仅显示标题。\n\
  -   **全部展开**：展开所有“属性组”，以便显示所有适用的属性（由“显示常用”和“显示全部”控制）。\n-   **转到组**：将焦点置于从下拉菜单中选择的组的第一个属性上。\n\
  \n当您编辑 APEX 组件的各种属性时，您可能会对大部分呈现的控件感到熟悉和得心应手。在接下来的章节中，我们将介绍一些功能可能不会立即明了的控件类型。\n\n\
  #### 快速选择\n\n“快速选择”控件出现在属性选择列表的左侧，如图 A-11 所示。点击“快速选择”图标将生成一个简短的列表，其中包含被认为是完整选择列表中“最常用”的选项。\n\
  \n![A978-1-4842-0466-5_17_Fig11_HTML.jpg](img/A978-1-4842-0466-5_17_Fig11_HTML.jpg)\n\
  *图 A-11. 为选择列表点击“快速选择”图标*\n\n#### 转到\n\n“转到”控件会在一个属性引用页面上另一个组件时出现。通过点击图 A-12 中所示的图标，页面设计器的焦点将设置到该属性所指示的组件。这提供了一种快速导航到被引用组件的方法。\n\
  \n![A978-1-4842-0466-5_17_Fig12_HTML.jpg](img/A978-1-4842-0466-5_17_Fig12_HTML.jpg)\n\
  *图 A-12. 与文本字段的“区域”属性关联的“转到”图标*\n\n#### 选项对话框按钮\n\n有许多属性需要更复杂的弹出对话框来设置其值。在这些情况下，APEX\
  \ 提供了一个“选项对话框按钮”，如图 A-13 中的“模板选项”和“目标页面”所示。点击包含文本的灰色框会生成一个对话框，为相关属性提供选项。图 A-14 是按钮的“模板选项”对话框示例。\n\
  \n![A978-1-4842-0466-5_17_Fig14_HTML.jpg](img/A978-1-4842-0466-5_17_Fig14_HTML.jpg)\n\
  *图 A-14. 按钮的“模板选项”对话框示例*\n\n![A978-1-4842-0466-5_17_Fig13_HTML.jpg](img/A978-1-4842-0466-5_17_Fig13_HTML.jpg)\n\
  *图 A-13. 带有“选项对话框按钮”的“模板选项”和“目标”属性*\n\n\n## 代码编辑器\n\n对于需要 SQL、PL/SQL 或大量静态文本的属性，APEX\
  \ 提供了代码编辑器控件。如图 A-15 所示，该控件在一个相对较小的文本区域中显示代码，但提供了一个按钮可将文本区域展开为完整的代码编辑器，如图 A-16 所示。\n\
  \n![A978-1-4842-0466-5_17_Fig16_HTML.jpg](img/A978-1-4842-0466-5_17_Fig16_HTML.jpg)\n\
  *图 A-16. 代码编辑器对话框示例*\n\n![A978-1-4842-0466-5_17_Fig15_HTML.jpg](img/A978-1-4842-0466-5_17_Fig15_HTML.jpg)\n\
  *图 A-15. 报表的 SQL 查询属性，右上角显示代码编辑器按钮*\n\n代码编辑器在对话框顶部包含一个工具栏。图 A-17 展示了该工具栏并说明了每个图标的功能。\n\
  \n![A978-1-4842-0466-5_17_Fig17_HTML.jpg](img/A978-1-4842-0466-5_17_Fig17_HTML.jpg)\n\
  *图 A-17. 带图标说明的代码编辑器工具栏*\n\n大多数图标都相当直观，但为完整起见，其功能列举如下：\n\n*   `Undo`: 撤销对代码编辑器对话框中文本的最后一组更改。\n\
  *   `Redo`: 重新应用使用`Undo`按钮撤销的最后一次更改。\n*   `Find`: 在工具栏下方显示一个区域，允许开发人员搜索代码编辑器对话框的内容。搜索选项包括`Match\
  \ Case`（区分大小写）和`Regular Expression`（正则表达式）。\n*   `Replace`: 在工具栏下方显示一个区域，允许开发人员搜索代码编辑器的内容，并用另一个字符串替换找到的搜索字符串。搜索选项包括`Match\
  \ Case`和`Regular Expression`。替换选项包括`Replace`（替换）、`Replace All`（全部替换）和`Skip`（跳过）。\n\
  *   `Query Builder`: 打开一个新窗口，其中包含拖放查询生成器（参见第 4 章）。它仅对需要 SQL 查询的代码编辑器对话框显示。\n*  \
  \ `Auto Complete`: 在编辑代码编辑器中的文本时提供上下文相关的自动完成功能。在编辑 SQL 或 PL/SQL 时，`Auto Complete`为当前“解析为”模式中的数据库对象以及\
  \ Oracle 定义的函数和保留字提供自动补全。在编辑 HTML 文本时，`Auto Complete`提供 HTML 标签方面的辅助。\n*   `Validate`:\
  \ 在编辑 SQL 或 PL/SQL 时，`Validate`将解析提供的代码以查找语法错误。如果遇到语法错误，错误将通过错误消息在错误行之前的代码行内联指示。如果未发现错误，则在对话框顶部显示“验证成功”消息。\n\
  *   `Settings`: 提供一组特定于对话框的设置，这些设置将在每个特定用户的多个用户会话中被记住：\n    *   `Use Plain Text\
  \ Editor`: 从语法高亮编辑器切换到纯文本编辑器。\n    *   `Tab Inserts Spaces`: 选中并按下`Tab`键时，编辑器将放置固定数量的空格而不是制表符。取消选中时，将使用制表符。\n\
  \    *   `Tab Size`: 当启用上一个选项时，用于替换制表符的空格数。\n    *   `Indent Size`: 为支持自动缩进的语言（如\
  \ JavaScript）设置自动缩进大小。\n    *   `Themes`: 将多种不同视觉主题中的一种应用于代码编辑器。新主题在设置被确认且再次选择代码编辑器后才会可见。\n\
  \    *   `Show Line Numbers`: 选中时，代码左侧将添加一个带行号的边栏。\n    *   `Show Ruler`: 选中时，代码编辑器内会在第\
  \ 80 个字符标记处出现一条虚线。\n\n## 画廊\n\n画廊窗格直接显示在中央窗格下方，提供了一个可用于在网格布局中构建页面的组件和控件面板。该窗格具有三种类型的组件，可通过左上角的按钮进行选择，如图\
  \ A-18 所示。\n\n![A978-1-4842-0466-5_17_Fig18_HTML.jpg](img/A978-1-4842-0466-5_17_Fig18_HTML.jpg)\n\
  *图 A-18. 显示部分可用区域类型的画廊窗格*\n\n默认情况下，仅显示当前用户界面支持的控件和组件。单击右上角的`操作菜单`，您可以选择显示不受支持的组件，使用这些组件需“自担风险”。其中一些组件被视为实验性的，并非在所有浏览器中都能工作。\n\
  \n每个组件都可以通过简单地拖放到适当区域来放置到网格布局中。将项目拖入位置时，黄色背景将指示可以放置对象的区域。当您将鼠标悬停在放置区域上时，黄色背景内会出现一个灰色框（参见图\
  \ A-6），指示对象将被放置的位置。\n\n您也可以右键单击组件并使用上下文菜单来放置项目。“添加到”上下文菜单选项允许您使用页面结构的分层菜单表示来选择放置项目的位置。\n\
  \n## 键盘快捷键\n\n新页面设计器的另一个好处是引入了一组用于执行常见任务的键盘快捷键。表 A-1 显示了 PC/Linux 和 Macintosh 系统的键盘快捷键。\n\
  \n*表 A-1. 页面设计器中可用键盘快捷键列表*\n\n| 功能 | PC/Linux | Macintosh |\n| --- | --- | --- |\n\
  | 保存 | Ctrl+Alt+S | Ctrl+Option+S |\n| 保存并运行页面 | Ctrl+Alt+R | Ctrl+Option+R |\n\
  | 撤销 | Ctrl+Z | Ctrl+Z |\n| 重做 | Ctrl+Y | Ctrl+Y |\n| 转到渲染 | Alt+1 | Option+1 |\n\
  | 转到动态操作 | Alt+2 | Option+2 |\n| 转到处理 | Alt+3 | Option+3 |\n| 转到页面共享组件 | Alt+4 |\
  \ Option+4 |\n| 转到网格布局 | Alt+5 | Option+5 |\n| 转到属性编辑器 | Alt+6 | Option+6 |\n| 转到画廊区域\
  \ | Alt+7 | Option+7 |\n| 转到画廊项 | Alt+8 | Option+8 |\n| 转到画廊按钮 | Alt+9 | Option+9\
  \ |\n| 从此处显示 | Ctrl+Alt+D | Ctrl+Option+D |\n| 从此页面显示 | Ctrl+Alt+T | Ctrl+Option+T\
  \ |\n| 还原/展开 | Alt+F11 | Option+F11 |\n| 切换隐藏空位置 | Ctrl+Alt+E | Ctrl+Option+E |\n\
  | 转到帮助 | Alt+F1 | Option+F1 |\n| 转到消息 | Ctrl+F1 | Ctrl+F1 |\n| 页面搜索 | Ctrl+Alt+F\
  \ | Ctrl+Option+F |\n| 键盘快捷键 | Alt+Shift+F1 | Option+Shift+F1 |\n\n注意\n某些平台（尤其是\
  \ Mac）可能已经存在键盘映射，可能会干扰本表中概述的组合键功能。如果任何功能未按预期工作，请检查操作系统级别是否存在任何冲突的快捷键。\n\n## 总结\n\
  \n尽管关于新的页面设计器有很多需要学习的内容，但我相信在花些时间熟悉其布局和功能后，开发 APEX 应用程序将成为一项更加高效的事业。我强烈建议您在深入阅读本书的开发章节之前，花些时间熟悉本附录的内容。请记住，如果您以后遇到困难，随时可以回到本附录进行参考。\n\
