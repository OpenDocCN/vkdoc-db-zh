  \ Name 都输入 `Contact Us`，并将 Breadcrumb 设置为 Breadcrumb。当区域刷新后，选择 Home (Page 1) 将其设置为\
  \ Parent Entry，如图 6-20 所示，然后点击 Next。\n\n![A978-1-4842-0466-5_6_Fig20_HTML.jpg](img/A978-1-4842-0466-5_6_Fig20_HTML.jpg)\n\
  **图 6-20.** 选择面包屑父条目\n\n7.  对于 Navigation Preferences，选择 Identify an existing navigation\
  \ menu entry for this page。页面刷新后，将 Existing Navigation Menu Entry 设置为 Home，然后点击\
  \ Next。\n8.  将 Invoking Page 和 Button Label 留空，然后点击 Next。\n9.  为 Branch here on\
  \ Submit 和 Branch here on Cancel 都输入 `1`，如图 6-21 所示。然后点击 Next。\n\n![A978-1-4842-0466-5_6_Fig21_HTML.jpg](img/A978-1-4842-0466-5_6_Fig21_HTML.jpg)\n\
  **图 6-21.** 指定分支选项\n\n10. 在图 6-22 的对话框中，将 `P_FROM` 的 Label 设置为 From。将 P_BODY 的 Label\
  \ 设置为 `Body`。将 P_BODY 的 Display Type 设置为 Textarea，然后点击 Next。\n\n![A978-1-4842-0466-5_6_Fig22_HTML.jpg](img/A978-1-4842-0466-5_6_Fig22_HTML.jpg)\n\
  **图 6-22.** 指定过程参数\n\n11. 点击 Create。\n\n\n### 修改基于存储过程的表单\n\n再次说明，向导已经完成了大部分工作，但在您的基于存储过程的表单完成之前，您还需要进行一些小的修改。您希望`发件人`和`邮件正文`这两个值都是必填的，因此需要更改它们的标签模板，并将其`值必需`属性设置为`是`。这次我们将使用\
  \ APEX 5.0 中的一个新功能，它允许我们同时编辑多个组件的属性。请执行以下操作：\n\n编辑应用程序的第 3 页。\n通过单击其名称选择`P3_FROM`。\n\
  按住 CTRL 键（在 Mac 上是 Command 键），通过单击其名称选择`P3_BODY`。此时，两个元素都应被选中。现在，如果您查看属性编辑器，您会看到有几个选项具有蓝色背景，并且标签左侧有一个灰色的三角符号（Δ）。这表示您选择的组件对于这些选项具有不同的值。这只是一个视觉提示，让您知道这些字段实际上可能并非空白，只是\
