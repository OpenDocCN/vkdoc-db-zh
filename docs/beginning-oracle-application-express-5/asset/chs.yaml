  \ Express”时，他们才能访问应用程序。\n\n#### 创建单个用户\n\n要创建单个用户，请单击图 14-16 中所示的“创建用户”按钮。如果只创建开发人员，则无需担心填写某些非必填字段，例如名字和姓氏，因为您通常通过用户名来识别用户。您还可以授予对特定模块的访问权限。例如，如果您为项目经理创建账户，可能只想授予他们对“团队开发”模块的访问权限，如图\
