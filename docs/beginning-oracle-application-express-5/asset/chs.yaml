  **图 6-17.** 显示了表单详情的 `TICKETS` 表单\n\n> 注意\n> Web Developer Toolbar 插件是一个由 Chris\
  \ Pederick 编写的免费 Web 开发工具，可用于检查网页的各个方面。要了解更多关于 Web Developer 的信息，请访问 [`http://chrispederick.com/`](http://chrispederick.com/)\
  \ 。\n\n高亮显示的 `input` 标签展示了表单每个字段的输入标识符和名称。这两者对于每个表单字段都是唯一的。输入标识符是在列名前加上了页码。输入名称则标识了\
  \ APEX 在内部用于处理表单数据时使用的元素名称。请注意，那些你选择不在表单中显示的列，例如 `TICKET_ID` 和 `STATUS_ID`，仍然存在于页面的\
  \ HTML 中。\n\n深入了解幕后会告诉你更多信息。编辑第 2 页，查看构成新表单的元素。\n\n图 6-18 展示了树状面板中的三个选项卡：Rendering（渲染）、Processing（处理）和\
  \ Shared Components（共享组件）。Rendering 选项卡包含页面渲染所需的 APEX 对象。Processing 选项卡包含页面处理所需的对象，例如验证（validations）、进程（processes）和分支（branches）。Shared\
  \ Components 选项卡包含跨页面共享的 APEX 对象，例如选项卡（tabs）、值列表（lists of values）、面包屑（breadcrumbs）、模板（templates）和安全方案（security\
  \ schemes）。\n\n![A978-1-4842-0466-5_6_Fig18_HTML.jpg](img/A978-1-4842-0466-5_6_Fig18_HTML.jpg)\n\
  **图 6-18.** 从页面生成器（Page Builder）的各种树状面板中查看表单元素\n\n对于你的新 “Create a Ticket” 表单，在 Rendering\
  \ 选项卡中，你会看到向导已经为你通过向导选择的 `TICKETS` 表的每一个列创建了一个项（item）。还有两个分别名为 Cancel 和 Create 的按钮，以及一个\
  \ Fetch Row from TICKETS 进程。这个进程是一个自动行获取（Automated Row Fetch）进程，正如其名所示：它将指定表中的一行获取到当前表单中。自动行获取进程的属性指定了表所有者、表名、主键列、成功和失败消息以及一个条件。\n\
  \n注意 `TICKET_ID` 项存在于树中，但并未在表单上渲染，也未出现在网格布局（Grid Layout）中。在表单的 “Display Details”\
  \ 视图（图 6-17）中，它作为页面上的第一个元素可见，但没有与之关联的可见元素。`TICKET_ID` 是一个隐藏项（hidden item）。APEX 隐藏项用于保存一个值，但尽管它们在页面上被渲染，用户却不可见。在这个例子中，隐藏的\
  \ `TICKET_ID` 列保存了 `TICKETS` 行的主键值。作为主键，`TICKET_ID` 被 APEX 进程用来从数据库提取数据，并处理对 `TICKETS`\
  \ 行的插入、更新和删除操作。因为你不想让最终用户编辑主键，APEX 会自动为你将其隐藏。\n\n在 Processing 选项卡中，你有一个 Process\
  \ Row of TICKETS 进程、一个 Reset Page 进程和一个 Go To Page 1 分支。Process Row of TICKETS 进程正是做这件事：它使用对应于\
  \ `TICKETS` 表各列的项中的值，来处理 `TICKETS` 表的一行。这个进程在用户点击 Create 按钮时触发。Reset Page 进程会清除页面上的项。它在用户点击\
  \ Cancel 按钮时触发。\n\n在 Shared Components 选项卡中，你需要展开 Navigation Menu 树节点，才能看到此页面使用了\
  \ Desktop Navigation Menu。展开 Breadcrumbs 区域会显示 Breadcrumb 对象。在 Templates 下，你会看到你的表单使用了\
  \ Standard 页面模板、Title Bar 和 Standard 模板、两个不同的 Page Item 模板以及默认的 Button 模板。\n\n所有的\
  \ APEX 表单向导都会创建项、按钮和进程，但会根据表单类型的特定需求以不同的组合方式来创建。其他的 APEX 表单向导本质上以相同的方式工作，只是在进程类型和导航对象上略有差异，以适应底层数据源：表或视图、过程、查询或\
  \ Web 服务。接下来，让我们看一个基于过程（procedure）的表单。\n\n## Form on a Procedure\n\n在 APEX 中创建表单的另一种方式是基于\
  \ PL/SQL 过程的参数来创建。APEX 会调用关联的过程并执行其中嵌入的任何逻辑，而不是传统的 DML 进程。这种方法也被称为使用表 API（table\
  \ APIs），因为如果你工作区模式中对表的所有访问都必须通过表 API 完成，那么就应该选择这个选项。\n\n### Creating a Form on a\
  \ Procedure\n\n创建基于过程的表单与创建基于表的表单几乎相同。你将创建一个新页面，其中包含一个基于 `CONTACT_US` 存储过程的表单，该过程是在\
  \ 第 4 章 的练习中创建的，它使用户能够通过 Help Desk 应用程序联系你：\n\n1.  导航到你的应用程序开发主页。\n2.  点击屏幕右上角的\
  \ Create Page 按钮。\n3.  选择 Form，然后点击 Next。\n4.  选择 Form on a Procedure，然后点击 Next。\n\
  5.  将 Procedure Owner 设置为你的模式，为 Stored Procedure Name 输入 `CONTACT_US`，如图 6-19 所示，然后点击\
  \ Next。\n\n![A978-1-4842-0466-5_6_Fig19_HTML.jpg](img/A978-1-4842-0466-5_6_Fig19_HTML.jpg)\n\
