  \ `doug@mycompany.com` 生成的用户名可以是 `doug@mycompany.com`，也可以只是简单的 `doug`。您可以指定是希望每个电子邮件地址直接转换为用户名，还是希望用户名排除\
  \ `@domain` 后缀。图 14-18 显示了后一种选项的单选按钮设置。\n\n![A978-1-4842-0466-5_14_Fig18_HTML.jpg](img/A978-1-4842-0466-5_14_Fig18_HTML.jpg)\n\
