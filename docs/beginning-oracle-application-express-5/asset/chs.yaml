  \n\n\n\n### 探索幕后\n\n让我们来看看交互式报表的幕后。你可能会惊讶地发现，在`Rendering`选项卡中，只有一个交互式报表区域，如图 7-60\
  \ 所示。\n\n![A978-1-4842-0466-5_7_Fig60_HTML.jpg](img/A978-1-4842-0466-5_7_Fig60_HTML.jpg)\n\
  图 7-60.\n交互式报表的 Application Builder 视图\n\n`Processing`选项卡不包含任何元素，`Shared Components`选项卡也只包含预期的元素。\n\
  \n这是第一次出现无法轻松使用标准声明式 APEX 元素重新创建交互式报表的情况。其附加功能来自于一组 JavaScript 函数、CSS 和 HTML，这些都包含在交互式报表区域类型中。虽然你可以从头开始构建此功能，但\
  \ APEX 交互式报表无疑是一个巨大的效率提升工具。\n\n## 日历\n\n有时，数据中存在一些以传统的行列格式查看时不太明显的趋势。通过简单地以不同的方式（例如日历报表）显示数据，这些趋势可能会变得显而易见。APEX\
  \ 日历报表可以以每日、每周或每月视图显示数据，并且不需要你输入任何 SQL。\n\n### 理解日历类型\n\nAPEX 日历是一种 APEX 报表类型。数据在日历上渲染，而不是以传统的行列格式。对\
  \ APEX 日历的唯一要求是，底层表或视图必须至少有一个`DATE`类型的列。\n\n有两种类型的 APEX 日历：\n\n*   Calendar：基于一个开源的\
  \ jQuery 组件，开箱即用，提供了相当多的功能。\n*   Legacy Calendar：使用了在 APEX 4.2 及之前版本中可用的日历区域类型，其功能比新的基于\
  \ jQuery 的日历少。\n\n日历中的数据可以像任何其他报表列一样充当列链接。这使得构建一个让用户点击日期并钻取到另一个页面或 URL 的日历变得非常简单。\n\
  \n### 创建日历\n\n要实现一个 APEX 日历，你可以使用创建页面向导新建一个页面和一个日历区域。请遵循以下步骤：\n\n1.  导航到你应用的 Application\
  \ Builder 主页。\n2.  点击屏幕右上角的`Create Page`按钮。\n3.  选择`Calendar`并点击`Next`。\n4.  再次选择`Calendar`并点击`Next`。\n\
  5.  如图 7-61 所示，在`Page Number`输入`400`，在`Page Name`和`Region Name`均输入`Ticket Activity\
  \ Calendar`，并将`Breadcrumb`设置为`Breadcrumb`。\n6.  当页面重新加载时，为`Entry Name`输入`Ticket\
  \ Activity Calendar`并点击`Next`（参见图 7-62）。\n7.  将`Navigation Preference`设置为`Create\
  \ a new navigation menu entry`。页面刷新后，为`New Navigation Menu Entry`输入`Calendar`并点击`Next`（图\
  \ 7-63）。\n8.  确保`Source Type`设置为`Table`，选择你的模式作为`Table/View Owner`，为`Table/View\
  \ Name`选择`TICKETS_V (view)`，如图 7-64 所示，然后点击`Next`。\n9.  向导的下一步允许你选择在日历上显示的内容，以及开始和结束日期。此外，在此页面上，你可以选择希望如何显示日期（仅日期或日期和时间）。还有一些选项可以自动生成创建页面或编辑页面，并选择是否希望能够在日历上使用拖放来更改事件的开始和结束日期。我们将使用第\
  \ 210 页作为我们的创建和编辑页面，但我们确实希望打开`Drag & Drop`。继续如下：\n    *   对于`Display Column`，选择`SUBJECT`。\n\
  \    *   对于`Start Date Column`，选择`CREATED_ON`。对于`End Date Column`，选择`CLOSED_ON`。\n\
  \    *   将`Show Time`设置为`Yes`。\n    *   将`Add Create Page`和`Add Edit Page`设置为`No`。\n\
  \    *   将`Generate Drag & Drop Code`设置为`Yes`。\n    *   点击`Next`。\n    *   将`Primary\
  \ Key Type`设置为`Select Primary Key Column(s)`。\n    *   选择`TICKET_ID(Number)`作为`Primary\
  \ Key Column`。\n    *   点击`Next`。\n    *   将`Source Type`设置为`Existing Trigger`并点击`Next`。\n\
  \    *   点击`Create`。\n\n运行日历报表，你会看到类似图 7-65 所示的内容。将鼠标悬停在任何事件条上将显示一个悬停提示，其中包含更多主题和日期信息。由于我们打开了`Drag\
  \ & Drop`，你可以点击并拖动任何事件来更改其`Created On`日期。\n\n![A978-1-4842-0466-5_7_Fig65_HTML.jpg](img/A978-1-4842-0466-5_7_Fig65_HTML.jpg)\n\
  图 7-65.\n由向导生成的日历报表\n\n我们可以对日历进行一些调整，以便为查看者提供更多信息，并将其与第 210 页上的工单编辑屏幕链接起来：\n\n1.\
  \  编辑应用的第 400 页。\n2.  编辑`Ticket Activity Calendar`的属性。\n3.  找到并打开文件`ch7_calendar_details.txt`（你可以在解压的书籍文件中找到它）。将该文件的内容复制并粘贴到`Settings`属性组下的`Supplemental\
  \ Information`文本区域中，如图 7-66 所示。\n4.  点击`View/Edit Link`旁边的`Options`按钮。该按钮应该显示为`No\
  \ Link Defined`。\n5.  在弹出的对话框中，将`Page`设置为`210`，将`Name`设置为`P210_TICKET_ID`，将`Value`设置为`&TICKET_ID.`，将`Clear\
  \ Cache`设置为`210`，如图 7-67 所示，然后点击`OK`。保存你的更改。\n\n运行该页面，你的日历应该看起来与图 7-68 相似。现在，当你将鼠标悬停在事件条上时，可以看到更多的工单详情。你现在也可以点击事件条来编辑工单详情。\n\
  \n![A978-1-4842-0466-5_7_Fig68_HTML.jpg](img/A978-1-4842-0466-5_7_Fig68_HTML.jpg)\n\
  图 7-68.\n修改后的工单活动日历\n\n> 注意\n>\n> 如果`Supplemental Information`中显示的数据可能包含特殊字符，如`&`、`'`、`\"\
  `或`/`，APEX 将尝试对它们进行编码以降低跨站脚本的风险。如果你信任数据源，可以编辑日历区域，在`Security`属性部分，将`Escape Special\
  \ Characters`设置为`No`。\n\n### 探索幕后\n\n既然你的日历可以工作了，让我们看看日历向导为你构建了什么。编辑第 400 页。在`Rendering`选项卡中，如图\
  \ 7-69 所示，你基本上只会看到`Calendar`区域。\n\n![A978-1-4842-0466-5_7_Fig69_HTML.jpg](img/A978-1-4842-0466-5_7_Fig69_HTML.jpg)\n\
  图 7-69.\n你的日历的页面渲染区域\n\n请注意，在页面的`Processing`选项卡中没有任何进程。这是因为日历区域使用 JavaScript 调用从数据库获取数据，并根据拖放操作更改任何移动的值。这只是\
  \ JavaScript 和 jQuery 强大功能的一个简短示例。\n\n\n\n## 图表\n\n在 APEX 4.2 中，通过整合 AnyChart 6，图表功能得到了重大改进，这一改进也延续到了\
  \ APEX 5.0。这个版本的 AnyChart 不仅生成的图表比之前的版本看起来更专业，而且图表引擎还提供了基于 Flash 或基于 HTML5 的图表选项。这对于面向移动市场的应用程序来说是一个巨大的进步，因为\
  \ HTML5 图表可以在大多数现代浏览器上渲染，而无需额外的插件。\n\n新图表引擎的美妙之处在于，你可以在页面开发过程中随时在渲染 Flash 和 HTML5\
  \ 图表之间切换，而声明性数据保持不变，与渲染方式的选择无关。\n\nHTML5 图表也保持了与 Flash 图表相同级别的交互性，包括悬停和点击钻取功能。\n\
  \n图 7-70 展示了柱状图的 Flash 版本和 HTML5 版本，表明尽管外观有所变化，但相同的代码生成了非常相似的图表。\n\n![A978-1-4842-0466-5_7_Fig70_HTML.jpg](img/A978-1-4842-0466-5_7_Fig70_HTML.jpg)\n\
  \n图 7-70. 使用 Flash 和 HTML5 渲染的相同图表\n\nFlash 和 HTML5 图表的功能几乎相同，但 HTML5 图表能够在任何平台上原生渲染，而\
  \ Flash 图表在 Apple 的任何移动平台上都无法工作。\n\n### 为图表编写查询\n\nAPEX 图表通常需要这种类型的查询：\n\n```sql\n\
  SELECT\n  link,\n  label,\n  value\nFROM\n  table\nWHERE\n  where conditions\nGROUP\
  \ BY\n  group by column list\nORDER BY\n  Order by column list\n```\n\n其中\n\n* \
  \  `link` 是指向 APEX 页面或其他 URL 的链接；\n*   `label` 是图表元素的标签；以及\n*   `value` 是要绘制的值。\n\
  \n确切的语法会根据各种图表类型的需求略有变化，但通用的链接-标签-值格式保持不变。有关每种图表类型的确切语法，请参阅 APEX 在线文档。\n\n### 创建图表\n\
  \n让我们创建一个饼图，显示每个状态的工单数量。稍后，你将把点击饼图切片的动作链接到过滤工单报告，以仅显示该状态的工单。请按照以下步骤操作：\n\n1.  编辑应用程序的任何页面。\n\
  2.  点击页面设计器工具栏中的创建（+）按钮并选择“页面”。\n3.  选择“图表”并点击“下一步”。\n4.  从选择列表中选择“HTML5 图表”。\n\
  5.  页面刷新后，选择“饼图和环形图”并点击“下一步”。\n6.  选择“2D 饼图”并点击“下一步”。\n7.  输入 `500` 作为“页面编号”，`Tickets\
  \ by Status` 作为“页面名称”和“区域名称”，并将“面包屑导航”设置为“面包屑”（参见图 7-71）。页面重新加载后，输入 `Tickets by\
  \ Status` 作为“条目名称”并点击“下一步”。\n\n![A978-1-4842-0466-5_7_Fig71_HTML.jpg](img/A978-1-4842-0466-5_7_Fig71_HTML.jpg)\n\
  \n图 7-71. 为图表设置页面编号、页面名称和区域名称属性\n8.  将“导航首选项”设置为“创建新的导航菜单条目”。页面刷新后，输入 `Chart` 作为“选项卡标签”并点击“下一步”（参见图\
  \ 7-72）。\n\n![A978-1-4842-0466-5_7_Fig72_HTML.jpg](img/A978-1-4842-0466-5_7_Fig72_HTML.jpg)\n\
  \n图 7-72. 为图表设置导航属性\n9.  设置“图表标题”为 `Ticket Statuses` 并点击“下一步”。\n10. 定位并打开文件 `ch7_chart_query.txt`，你可以在解压本书文件的位置找到它。该文件的内容应与此查询类似：\n\
  ```sql\nSELECT\n  'f?p=&APP_ID.:200:' || :APP_SESSION || '::::P200_STATUS_ID:' ||\
  \ sl.status_id link,\n  sl.status label,\n  count(*) value\nFROM\n  tickets t,\n\
  \  status_lookup sl\nWHERE\n  t.status_id = sl.status_id\nGROUP BY\n  sl.status_id,\
  \ sl.status\nORDER BY\n  3 DESC\n```\n11. 将文件 `ch7_chart_query.txt` 的内容粘贴到“输入 SQL\
  \ 查询或返回 SQL 查询的 PL/SQL 函数”区域中，或者将上一个查询键入该区域，然后点击“下一步”。\n12. 点击“创建”。\n\n运行页面。你的图表应该与图\
  \ 7-73 中的类似。\n\n![A978-1-4842-0466-5_7_Fig73_HTML.jpg](img/A978-1-4842-0466-5_7_Fig73_HTML.jpg)\n\
  \n图 7-73. Ticket Statuses 图表\n\n### 过滤图表数据\n\n你在 SQL 语句中包含的链接将一个状态值传递到页面 200 的 `P200_STATUS_ID`\
  \ 字段。然而，你还没有创建该项。接下来的步骤在页面 200 上创建 `P200_STATUS_ID` 项，以便在点击图表切片时，报告可以根据状态进行过滤：\n\
  \n1.  编辑应用程序的页面 200。\n2.  通过将“组件库”的“项”部分中的“选择列表”项拖到“工单”区域中来创建一个新项。将其放置在 `P200_SEARCH`\
  \ 项和 `P200_GO` 按钮之间，如图 7-74 所示。\n\n![A978-1-4842-0466-5_7_Fig74_HTML.jpg](img/A978-1-4842-0466-5_7_Fig74_HTML.jpg)\n\
  \n图 7-74. 添加一个选择列表项\n3.  在“编辑属性”窗格中，设置“名称”为 `P200_STATUS_ID`，“标签”为 `Status`（参见图\
  \ 7-75）。\n\n![A978-1-4842-0466-5_7_Fig75_HTML.jpg](img/A978-1-4842-0466-5_7_Fig75_HTML.jpg)\n\
  \n图 7-75. 设置名称和标签\n4.  在“值列表”属性组中，设置“类型”为“共享组件”，“值列表”为 `P210_TICKETS_STATUS_ID`，确保“显示空值”设置为“是”，为“空值显示值”输入\
  \ `- All Statuses -`，并为“空值返回值”输入 `%`。\n5.  在“默认值”属性组中，设置“类型”为“静态值”，并为“静态值”输入 `%`，如图\
  \ 7-76 所示。\n\n![A978-1-4842-0466-5_7_Fig76_HTML.jpg](img/A978-1-4842-0466-5_7_Fig76_HTML.jpg)\n\
  \n图 7-76. 设置默认值\n6.  保存你的更改。\n\n同样，默认情况下，“搜索”和“描述”字段的标签被设置为占用布局网格的三列。让我们更改此设置，使它们各只占一列：\n\
  \n1.  多选 `P200_SEARCH` 和 `P200_STATUS_ID`。\n2.  在“编辑属性”窗格中，导航到“网格”属性组，并将“标签列跨度”更改为\
  \ 1。\n3.  保存你的更改。\n\n最后，你必须更改页面 200 上工单报告的查询，以考虑项 `P200_STATUS_ID` 的设置值：\n\n1. \
  \ 通过单击其名称来编辑页面 200 上的工单报告。\n2.  将以下行附加到查询末尾并保存你的更改：\n```sql\nAND tickets.status_id\
  \ LIKE :P200_STATUS_ID\n```\n\n现在，运行应用程序并导航到“图表”页面。点击图表中的任何值，该值应传递到“工单”页面并进入状态过滤器。生成的报告应仅显示与图表中点击的状态相对应的记录。\n\
  \n### 探究幕后原理\n\n在应用程序构建器中查看“图表”页面，你可以看到生成的唯一元素是“页面渲染”区域中的“图表”区域，如图 7-77 所示。这个“图表”区域很有趣，因为它包含一个“系列”元素，其中包含你的\
  \ SQL 查询。这个“图表”区域体现了将你的查询传递给 AnyChart 引擎以生成图表的逻辑。\n\n![A978-1-4842-0466-5_7_Fig77_HTML.jpg](img/A978-1-4842-0466-5_7_Fig77_HTML.jpg)\n\
  \n图 7-77. Ticket Statuses 图表的渲染选项卡\n\n## 小结\n\n你已审阅了大部分的 APEX 表单和报表类型，并使用 APEX 表单和报表向导，逐步实践了为帮助台系统构建各种表单和报表。你创建了一个交互式报表，并分别以开发者和最终用户的身份对其进行了调整。你已接触了图表，并向应用程序中添加了一个图表，以直观显示工单状态。\n\
  \n这里的共同主题是，APEX 表单和报表向导对开发者而言是巨大的时间节省工具，它们创建了可工作的表单、报表、日历或图表所需的所有对象——包括项、按钮、分支、进程等等。你能够修改已创建的对象，从而快速定制生成的表单或报表以满足你的需求。尽管如此，你并未偏离\
  \ APEX 为你构建的基础太远。\n\n随着你的应用程序变得愈发复杂，在某些情况下，你将希望添加代码来强制执行业务规则，或执行比简单的插入、更新或删除更复杂的处理逻辑。为此，你可以使用\
  \ APEX 的各种程序化元素。下一章将探讨验证、计算和进程的主题。\n\n"
- "# 8. 程序化元素\n\n本章将介绍能为 APEX 框架提供简单和复杂功能的程序化元素。APEX 通过向导提供了简单的声明式功能来指导你。由于其与数据库的集成，APEX\
  \ 还能充分利用 Oracle 数据库内部的 PL/SQL 引擎的全部能力。自 APEX 4 版本实现以来，即使是 JavaScript 交互性也已在该框架内变得可声明和可扩展。\n\
  \n## 条件\n\n在整个帮助台应用程序的构建过程中，会有时候你想利用 APEX 组件可用的条件逻辑。与其试图理解每一种条件类型（条件类型列表中大约有 60\
  \ 种），不如主要专注于理解条件的总体概念。\n\n条件特性提供了一个可以开启或关闭特定 APEX 技术逻辑的位置。在采取行动显示或执行特定 APEX 组件之前，会评估应用于该组件的条件是否为`TRUE`，即肯定结果。\n\
  \n用于开发条件的逻辑选项非常广泛。条件类型定义了用于评估条件的具体机制，并酌情使用参数。简单的页面项比较是最容易解释的。例如，一个进程可能只需要在特定页面项具有值时才运行。在发送电子邮件的情况下，只有在提供了电子邮件地址时，才应尝试发送消息。从这个简单的起点开始，条件可以变得像你需要的那样复杂。在高级情况下，条件也可以包括浏览器和\
  \ Web 服务器选项。\n\n花时间审阅可用的条件类型并熟悉其用法。理解每个项的技术实现或语法并不像理解构成单一条件的选项那样重要。这种熟悉度在你开始定义 APEX\
  \ 组件并理解灵活且模块化应用程序设计的考虑因素时将有所帮助。\n\n## 必填值\n\n要求提供值是一个常见的需求，APEX 5.0 通过本质上是在页面项级别设置一个`NOT\
  \ NULL`标记来支持必填值。你无需创建一个完整的验证（接下来讨论）来使一个项成为必填项。你只需从一个开关项中做出选择即可。\n\n继续我们的帮助台应用程序，让我们为“描述”字段实现一个“值必需”验证：\n\
  \n```\n编辑应用程序的第 210 页。\n编辑 P210_DESCR 页面项。\n在“验证”属性组中，将“值必需”更改为“是”，如图 8-1 所示。（根据你的\
  \ UI 默认设置方式，“值必需”可能已经设置为“是”。）\n```\n\n![A978-1-4842-0466-5_8_Fig1_HTML.jpg](img/A978-1-4842-0466-5_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 要求值存在\n\n```\n保存你的更改。\n```\n\n要测试新的验证，首先创建一个工单。在你输入任何值之前，单击“创建”按钮。图 8-2\
  \ 显示了预期的结果，其中包含一个整合的页面验证消息框和项验证消息。\n\n![A978-1-4842-0466-5_8_Fig2_HTML.jpg](img/A978-1-4842-0466-5_8_Fig2_HTML.jpg)\n\
  \n图 8-2. 验证显示两个元素的必填值，既在行内显示，也在页面级别整合显示\n\n在应用程序中，“主题”元素已经设置了值必需验证。这是因为在你使用向导创建表单时，APEX\
  \ 考虑了表中该列的`NOT NULL`属性。你还会看到 APEX 向导选择了一个在标签文本开头包含星号(*)的项标签模板。这为最终用户提供了该列是必填项的视觉提示。然而，要注意不要将选择一个指示字段是必填的标签与实际使用`VALUE_REQUIRED`属性或验证使该字段成为必填项混淆。\n\
  \n多个验证的错误消息是累积的。在处理页面时，你会看到所有的验证消息。参见图 8-2。\n\n> **注意**\n>\n> 所示的消息文本是默认的，可以被替换为应用程序特定的文本，这是“共享组件”区域中全球化功能的一个特性。整个应用程序每种语言只有一个默认值。当在单一语言应用程序中需要自定义消息时，我建议使用标准的验证类型，它允许为你创建的每个验证设置不同的消息。\n\
  \n## 验证\n\n验证的目的是协助提供数据质量，并确保用户输入数据的完整性。从机制上讲，验证是评估结果为`TRUE`或`FALSE`的测试。验证在页面被处理或提交时进行评估。所有的验证都会被评估；任何一个验证返回`FALSE`都会阻止额外的页面进程执行，并且理想情况下，会向用户提供反馈。验证也可以使用\
  \ JavaScript 在客户端执行。尽管 JavaScript 的交互性在用户界面上可能非常吸引人，但它也很容易被绕过。任何在 JavaScript 中执行的验证都应该辅以在页面处理期间或数据库级别的适当验证。\n\
  \n> **注意**\n>\n> 假设每个事务都是恶意的，这是一个良好的实践。完全出于安全目的实现验证是可能的，但有时很难从一个进程中抽身出来，以识别薄弱点可能存在于何处。例如，在一个购物车应用程序中，如果有人订购了-1\
  \ 个产品，总额会发生什么变化？他们会自动获得退款吗？在开发过程中，请花额外的时间审视你的应用程序，以识别可能存在的安全弱点，并实现使其整体上更健壮和安全的功能。\n\
  \n验证有四种类型：项级别、页面级别，以及对于表单区域，列级别和行级别。项级别验证针对单个 APEX 项操作。当多个项参与验证条件时，使用页面级别验证。表单区域的验证行为类似，但是针对表单区域的列和行进行的。你将在帮助台应用程序中使用每种类型的一个示例。\n\
  \n\n### 项目级验证\n\n对单个元素的验证可以具有特定于该元素的属性，并且可以根据该元素的要求自定义行为。这里你将实现的示例是一个仅在特定条件为真时才检查其条件的验证。需求是当状态为关闭时，必须输入结束日期。请按照以下步骤操作：\n\
  \n编辑应用程序的第 210 页。导航到树状窗格的“处理”选项卡。在处理树的“验证”节点上右键单击，然后选择“创建验证”，如图 8-3 所示。\n\n![A978-1-4842-0466-5_8_Fig3_HTML.jpg](img/A978-1-4842-0466-5_8_Fig3_HTML.jpg)\n\
  \n图 8-3. 准备为页面创建验证\n\n在属性窗格中，将“名称”设置为 `Check CLOSED_ON date`。在“验证”属性组中，将“类型”选择为\
  \ `Item is NOT NULL`，然后为“项目”选择 `P210_CLOSED_ON`。在“错误消息”文本区域中输入 `Please enter a value\
  \ for #LABEL#.`，并将“关联项目”设置为 `P210_CLOSED_ON`，如图 8-4 所示。显示的错误消息使用了一个替换变量 `#LABEL#`\
  \ 来包含消息中项目的标签。这样，当将来表单项目的标签发生变化时，验证错误消息将自动引用新标签。\n\n![A978-1-4842-0466-5_8_Fig4_HTML.jpg](img/A978-1-4842-0466-5_8_Fig4_HTML.jpg)\n\
  \n图 8-4. 设置验证属性\n\n在此步骤中，我们将使验证仅在当前工单状态为 `CLOSED` 时适用：在“条件”属性组中，将“类型”设置为 `PL/SQL\
  \ Function Body`，如图 8-5 所示。\n\n![A978-1-4842-0466-5_8_Fig5_HTML.jpg](img/A978-1-4842-0466-5_8_Fig5_HTML.jpg)\n\
  \n图 8-5. 为验证设置条件类型和函数体\n\n将以下代码输入到 PL/SQL 函数体中：\n\n```\nIF :P210_STATUS_ID = get_status('CLOSED')\
  \ THEN\n   RETURN TRUE;\nELSE\n   RETURN FALSE;\nEND IF;\n```\n\n保存你的更改。\n\n创建验证后，它会出现在\
  \ APEX 页面设计器的“渲染”和“处理”两个选项卡中，如图 8-6 所示。这两个引用指向相同的实现，显示出来是为了方便导航。\n\n![A978-1-4842-0466-5_8_Fig6_HTML.jpg](img/A978-1-4842-0466-5_8_Fig6_HTML.jpg)\n\
  \n图 8-6. 创建的验证在应用程序生成器页面的两个位置显示\n\n现在，此验证要求当工单状态设置为 `CLOSED` 时，必须为 `Closed On` 项目输入一个值。应用于验证的条件会在每次页面提交时进行评估。\n\
  \n### 页面级验证\n\n页面级验证同时应用于一个或多个项目，并且通常可以是整个 PL/SQL 代码块，必须计算为 `TRUE` 验证才算成功。Help Desk\
  \ 应用程序的需求是比较 `Created On` 日期和 `Closed On` 日期，以确保它们按时间顺序发生。一个在创建之前就关闭的工单没有意义。这是一个使用验证来确保数据质量的好例子。以下是你如何创建所需验证：\n\
  \n编辑应用程序的第 210 页。导航到树状窗格的“处理”选项卡。在处理树的“验证”节点上右键单击，然后选择“创建验证”。在属性窗格中，将“名称”设置为 `Closed\
  \ Date must be after Creation Date`。为“错误消息”输入 `Closed On Date must be Later than\
  \ the Created Date`，将“类型”设置为 `PL/SQL Function Body (returning Boolean)`，然后在 PL/SQL\
  \ 表达式文本区域中输入以下代码。图 8-7 显示了完成的值。单击“下一步”继续：\n\n![A978-1-4842-0466-5_8_Fig7_HTML.jpg](img/A978-1-4842-0466-5_8_Fig7_HTML.jpg)\n\
  \n图 8-7. 验证属性\n\n```\nIF TO_DATE(:P210_CREATED_ON,'DD-MON-YYYY') >\n   TO_DATE(:P210_CLOSED_ON,'DD-MON-YYYY')\n\
  THEN\n   RETURN FALSE;\nELSE\n   RETURN TRUE;\nEND IF;\n```\n\n保存你的更改。\n\n在你的应用程序中，现在你拥有一个有助于确保输入数据质量的功能。这种数据检查确保任何从开始到结束计算时间的指标不会因为日期问题而产生负数答案。这提高了数据质量和报告中产生的指标的可靠性。\n\
  \n### 表格表单验证\n\nAPEX 5.0 中的表格表单能够比以前版本更好地执行验证。创建表格表单的向导也会为你添加验证。向导会根据数据模型自动创建验证。然而，向导只能了解你的业务流程的有限信息，数据模型可能比你应用程序中想要的更灵活。\n\
  \n查看第 230 页的定义，向导已经根据底层 `TICKETS` 表的 `NOT NULL` 属性为你创建了许多 `Not Null` 验证。但是，向导不知道当工单关闭时你需要一个\
  \ `Closed On` 日期。你可以使用列级表格表单验证来应用该验证：\n\n编辑应用程序的第 230 页。导航到树状窗格的“渲染”选项卡。展开“管理多个工单”表格表单的“列”节点。右键单击\
  \ `CLOSED_ON` 并从上下文菜单中选择“创建验证”。在属性窗格中，将“名称”设置为 `CLOSED_ON is Not Null if Ticket\
  \ is CLOSED`。将“表格表单”设置为“管理多个工单”，“类型”设置为 `Column is NOT NULL`，“列”设置为 `CLOSED_ON`，如图\
  \ 8-8 所示。\n\n![A978-1-4842-0466-5_8_Fig8_HTML.jpg](img/A978-1-4842-0466-5_8_Fig8_HTML.jpg)\n\
  \n图 8-8. 设置验证名称和验证属性\n\n对于“错误消息”，输入 `#COLUMN_HEADER# must be entered if Status is\
  \ CLOSED`，如图 8-9 所示。单击“下一步”。\n\n![A978-1-4842-0466-5_8_Fig9_HTML.jpg](img/A978-1-4842-0466-5_8_Fig9_HTML.jpg)\n\
  \n图 8-9. 使用替换变量的错误消息\n\n在“条件”属性组中，将“类型”设置为 `PL/SQL Function Body`，“执行范围”设置为 `For\
  \ Created and Modified Rows`，然后在 PL/SQL 函数体文本区域中键入以下代码：\n\n```\nIF :STATUS_ID =\
  \ get_status('CLOSED') THEN\n   RETURN TRUE;\nELSE\n   RETURN FALSE;\nEND IF;\n\
  ```\n\n保存你的更改。\n\n当你运行“管理多个工单”页面时，你可以通过添加一个状态为 `CLOSED` 且未设置 `Closed On` 日期的新工单，或者通过移除现有已关闭工单的\
  \ `Closed On` 日期并尝试保存更改来测试新的验证。在图 8-10 中，每一行不满足验证要求的行都会被高亮显示，并出现在页面顶部的错误列表中。在此示例中，没有\
  \ `Closed On` 日期的行未能通过验证，并被标记为需要注意。\n\n![A978-1-4842-0466-5_8_Fig10_HTML.jpg](img/A978-1-4842-0466-5_8_Fig10_HTML.jpg)\n\
  \n图 8-10. 未通过验证的结果被高亮显示并呈现在消息区域中\n\n注意：默认情况下，这些验证仅针对新的或更改的行执行。你可以通过设置验证的“执行范围”（位于“条件”部分）来更改此行为。\n\
  \n创建验证向导还允许在表格表单上创建行级验证。这些验证对于表格表单处理的每一行运行一次。在这个级别上，你可以轻松地创建一个类似于为第 210 页创建的验证，用于检查\
  \ `Closed On` 日期是否发生在 `Created On` 日期之后。\n\n作为对你所学内容的练习，请尝试在第 230 页的表格表单的行级别实现该验证。\n\
  \n\n## 计算\n\n一项 APEX 计算类似于一个 PL/SQL 函数。其目的是通过多种方法设置值来对应用程序中的项目进行操作。这使得信息能够被推导出来，而不仅仅是存储在数据表中。根据应用程序的需求，计算可以在页面渲染时实现，也可以在页面提交回服务器后实现。计算可以作用于应用程序内可用的任何项目。可以设置的项目包括当前页面上的项目、另一个页面上的项目，甚至是应用程序级别的项目。\n\
  \n还有一种可以在应用程序级别使用的计算。它在应用程序的共享组件中可用。这种计算有额外的执行点选项，包括一个名为“新建实例时”的计算点，该点在用户登录时获得新会话（或实例）时执行。\n\
  \n### 执行\n\n理解计算相对于页面上显示值的时间点以及相对于其他值可供计算使用的时间点来执行，这一点很重要。当在计算中使用某个项目的值时，使用的是该项目的当前会话状态值。计算会在会话状态中设置一个项目值，之后任何使用该项目的处理（计算、验证或流程）都会看到该计算的结果。当页面被渲染时，它显示的是该值在页面上显示时其会话状态中的内容。计算点是决定计算何时执行的设置。\n\
  \n在页面定义屏幕中，几个计算点显示在页面树中。你可以通过在树中单击并将计算拖动到不同的计算点，或者通过编辑计算并直接更改序列和计算点的值来调整计算点。序列仅用于排序给定计算点内的计算。通常，页面按照页面定义屏幕上的显示从上到下进行渲染和处理。只有少数例外，例如动态操作和\
  \ AJAX 回调，它们具有可变的执行点。\n\n### 类型\n\n计算具有与其他 APEX 组件相同的灵活性。它们可以是复杂的，也可以是简单的，并拥有 Oracle\
  \ 数据库的全部功能来支持它们。计算的类型如下：\n\n*   静态值：简单的静态文本值\n*   项目：应用程序中另一个项目的名称\n*   SQL 查询（返回单个值）：只要返回单行单列的任何\
  \ SQL 语句\n*   SQL 查询（返回冒号分隔值）：用于多选项目的 SQL\n*   SQL 表达式：在 SQL 语句的 `SELECT` 部分使用的表达式\n\
  *   PL/SQL 表达式：与 SQL 表达式相同\n*   PL/SQL 函数体：带有 `RETURN` 语句的 PL/SQL 函数语法\n*   首选项：存储在元数据中的\
  \ APEX 用户首选项的值\n\n计算可以像许多其他 APEX 组件一样具有条件性。条件可以像业务规则要求的那样复杂，能够使用数据库功能和 APEX 会话项目来评估条件。条件评估为\
  \ `TRUE` 会导致计算被执行。\n\n### 创建计算\n\n服务台应用程序有一个需求，需要显示一个工单已开启的天数。结果应该是一个派生值，它会根据所审查记录的日期和状态而变化。你可以通过在页面上放置一个新项目来显示计算结果来实现这一点：\n\
  \n编辑页面 210。从组件库的“项目”部分，单击并拖动“仅显示”项目，使其出现在 `P210_SUBJECT` 的右侧。参见图 8-11。\n\n![A978-1-4842-0466-5_8_Fig11_HTML.jpg](img/A978-1-4842-0466-5_8_Fig11_HTML.jpg)\n\
  *图 8-11.*\n\n放置“仅显示”项目。在“属性”窗格中，为“名称”输入 `P210_DAYS_OPEN`，为“标签”输入 `Days Open`。将“保存会话状态”设置为“否”。现在，该区域中有一个新项目，你可以将其用作计算的容器。接下来，我们创建计算，以便将值设置为工单已开启的天数。但是，我们只希望此计算针对已创建的工单显示，而不针对正在输入的新工单。在“条件”属性组中，将“类型”设置为“项目不为空”。当区域刷新时，将“项目”的值设置为\
  \ `P210_TICKET_ID`，如图 8-12 所示。\n\n![A978-1-4842-0466-5_8_Fig12_HTML.jpg](img/A978-1-4842-0466-5_8_Fig12_HTML.jpg)\n\
  *图 8-12.*\n\n仅当另一个项目包含值时才显示一个项目。在“源”属性组中，将“类型”设置为“空”。在树窗格的“渲染”选项卡中，右键单击 `P210_DAYS_OPEN`，然后从上下文菜单中选择“创建计算”，如图\
  \ 8-13 所示。\n\n![A978-1-4842-0466-5_8_Fig13_HTML.jpg](img/A978-1-4842-0466-5_8_Fig13_HTML.jpg)\n\
  *图 8-13.*\n\n使用右键快捷方式创建计算。在“属性”窗格中，将“类型”设置为“SQL 查询（返回单个值）”。在 SQL 查询文本区域中，输入以下 SQL\
  \ 语句（也如图 8-14 所示），然后保存更改：\n\n![A978-1-4842-0466-5_8_Fig14_HTML.jpg](img/A978-1-4842-0466-5_8_Fig14_HTML.jpg)\n\
  *图 8-14.*\n\n输入计算的 SQL 语句。\n```sql\nSELECT\n    DECODE(status, 'CLOSED', closed,\
  \ open_or_pending) days_open\nFROM\n    (\n    SELECT\n        ROUND(sysdate - t.created_on)\
  \ open_or_pending,\n        NVL(ROUND(t.closed_on - t.created_on),0) closed,\n \
  \       sl.status status\n    FROM\n        tickets t,\n        status_lookup sl\n\
  \    WHERE\n        t.status_id = sl.status_id\n        and t.ticket_id = :P210_TICKET_ID)\n\
  ```\n\n要查看添加新项目的结果，请运行应用程序并导航到“工单”报告（页面 200）。单击其中一个“编辑”图标以调出单记录视图（页面 210）。你现在应该能看到计算的结果，即天数。在开始创建新工单的过程时，该字段不会显示，因为条件阻止了该字段的显示。\n\
  \n## 流程\n\n如果说计算类似于数据库函数，那么流程就类似于数据库过程。流程是一个逻辑单元的容器。\n\n流程可以说是 APEX 最复杂的部分，因为它们是用于处理数据库中的数据处理以及对\
  \ API（例如用于发送电子邮件和执行应用程序所需的任何其他业务逻辑的 API）的引用的结构。在处理数据表单时，APEX 向导会创建内置流程来管理表单数据的读写。这些类型的内置流程称为数据操作流程。\n\
  \n流程与计算类似，可以发生在页面渲染和页面处理期间。流程支持 APEX 条件功能，这允许将流程编写为独立的逻辑单元，由条件决定是否需要该逻辑。\n\n\n###\
  \ 执行点\n\n进程的执行点与计算的执行点相同。进程最常用的执行点是 `提交后 - 计算和验证之后` 和 `按需 - 当 AJAX 请求时运行此进程`，因为这些点支持按钮按压活动和动态操作。完整列表如下：\n\
  \n*   新会话\n*   页头之前\n*   页头之后\n*   区域之前\n*   区域之后\n*   页脚之前\n*   页脚之后\n*   提交后\n\
  *   处理中\n*   AJAX 回调\n\n进程可以在单个页面级别定义，也可以作为共享组件的一部分在应用程序级别定义。从功能上讲，页面进程和应用程序进程的行为方式相同。区别在于业务逻辑的包含位置。对于需要在所有页面上运行的进程，您可以定义一个应用程序进程。同样，就像区域一样，您可以使用全局页面来定义在每个页面上运行的进程，但这仅适用于页面渲染。\n\
  \n## 进程类型\n\n每种不同的进程类型根据需求有不同的用途。类型及其用途如下：\n\n*   自动行获取：从单个数据库表或视图中检索记录\n*   自动行处理\
  \ (DML)：处理从单个数据库表或视图插入、更新或删除记录\n*   清除会话状态：清除会话状态值；也称为缓存\n*   关闭对话框：关闭当前模态或非模态对话框的进程\n\
  *   表单分页：从数据库表或视图中检索单条上一条或下一条记录的进程。最常用于主从表单\n*   加载上传数据：将已解析的电子表格数据加载到现有表或视图中的进程\n\
  *   解析上传数据：解析已准备的电子表格数据的进程，为加载到现有表做准备\n*   PL/SQL 代码：通常用于利用数据库 PL/SQL 逻辑\n*   准备上传数据：准备电子表格数据以上传到现有表中的进程\n\
  *   重置分页：重置报表的分页\n*   发送电子邮件：用于轻松发送电子邮件的声明性界面\n*   表格表单 - 添加行：向表格表单区域添加一行的进程。\n\
  *   表格表单 - 多行删除：从表格表单区域删除多行的进程\n*   表格表单 - 多行更新：从表格表单区域更新多行的进程\n*   用户首选项：为最终用户设置用户首选项的进程。\n\
  *   Web 服务：向 Web 服务提供者提交请求\n*   插件：由插件提供的进程功能\n\n## 帮助台应用中的进程\n\n进程背后的细节可能非常复杂。为了提供一个充分的示例，我们将在帮助台应用中包含一个简单的进程：一个要求应用跟踪记录最后一次修改时间的需求。您可以通过在记录每次保存时更新其上的\
  \ `最后更新` 日期来完成此操作。有不止一种方法可以完成此任务。在这里，您将使用一个进程来实现。\n\n首先，您需要将 `LAST_UPDATED` 字段添加到\
  \ `TICKETS` 表中。为此，您再次使用 SQL 工作坊：\n\n从 SQL 工作坊下拉菜单中，选择对象浏览器，如图 8-15 所示。\n\n![`A978-1-4842-0466-5_8_Fig15_HTML.jpg`](img/A978-1-4842-0466-5_8_Fig15_HTML.jpg)\n\
  \n图 8-15. 导航到 SQL 工作坊对象浏览器\n\n从左侧的对象列表中选择 `TICKETS` 表。\n\n单击表定义上方的“添加列”按钮，如图 8-16\
  \ 所示。\n\n![`A978-1-4842-0466-5_8_Fig16_HTML.jpg`](img/A978-1-4842-0466-5_8_Fig16_HTML.jpg)\n\
  \n图 8-16. 向表中添加列\n\n在“添加列”中输入 `LAST_UPDATED`，在“类型”中输入 `DATE`，然后单击“下一步”。\n\n单击“完成”。现在您可以将进程添加到页面：\n\
  \n编辑应用程序的第 210 页。\n\n在树状面板的“处理”选项卡中，右键单击“进程”节点，然后从上下文菜单中选择“创建”，如图 8-17 所示。\n\n![`A978-1-4842-0466-5_8_Fig17_HTML.jpg`](img/A978-1-4842-0466-5_8_Fig17_HTML.jpg)\n\
  \n图 8-17. 使用上下文菜单创建进程\n\n将进程的“名称”设置为 `设置最后处理时间`，并将“点”设置为 `处理中`。将“类型”设置为 `PL/SQL\
  \ 代码`。在下一步中，您将设置匿名 PL/SQL 块的内容。如果您不熟悉 PL/SQL 匿名块，它是一段以 `BEGIN` 开始并以 `END` 结束的 PL/SQL\
  \ 代码，它们包裹着内容。您需要遵循 PL/SQL 语法约定，包括用分号结束语句。可以嵌套匿名代码块，但本示例不需要：\n\n在 PL/SQL 代码文本区域中输入以下\
  \ SQL（参见图 8-18）：\n\n![`A978-1-4842-0466-5_8_Fig18_HTML.jpg`](img/A978-1-4842-0466-5_8_Fig18_HTML.jpg)\n\
  \n图 8-18. 输入匿名 PL/SQL 块\n\n```\nBEGIN\n    UPDATE tickets SET last_updated = sysdate\n\
  \       WHERE ticket_id = :P210_TICKET_ID;\nEND;\n```\n\n将“成功消息”和“错误消息”都留空。这些消息将在进程完成后作为用户反馈显示在页面顶部。您的需求不要求您通知用户最后更新日期已被更改。\n\
  \n在“条件”属性组中，将“当按钮被按下”更改为 `SAVE`。\n\n保存您的更改。\n\n至此，进程已创建。目前，您没有在摘要报告中显示“最后更新”日期。为了在报告中看到该值，您需要将\
  \ `LAST_UPDATED` 列添加到报告获取数据的查询中。该报告位于应用程序的第 200 页：\n\n编辑第 200 页。\n\n通过在树中单击区域的名称来编辑“工单”区域。\n\
  \n将 `LAST_UPDATED` 日期添加到报告的区域源中，如下列 SQL 所示。完成后单击“保存”：\n\n```\nselect TICKET_ID,\n\
  \       SUBJECT,\n       DESCR,\n       CREATED_BY,\n       CREATED_ON,\n      \
  \ CLOSED_ON,\n       ASSIGNED_TO,\n       STATUS,\n      LAST_UPDATED\n   from TICKETS,\n\
  \       STATUS_LOOKUP\n where TICKETS.STATUS_ID = STATUS_LOOKUP.STATUS_ID\n   and\
  \ UPPER(SUBJECT) LIKE '%'||UPPER(:P200_SEARCH)||'%'\n   and tickets.status_id LIKE\
  \ :P200_STATUS_ID\n```\n\n要测试和查看更改，请运行应用程序并导航到“工单”报告。编辑任意工单，然后单击“应用更改”按钮。您现在应该会看到“最后更新”的值，显示当前日期。\n\
  \n这是一个关于如何使用进程应用基于表单的逻辑的快速示例。当表单用于进行更改时，一小段 PL/SQL 会自动进行记录更改。包、过程和 API 都可以通过类似于该示例的进程来访问。\n\
  \n\n\n## PL/SQL 区域\n\nPL/SQL 区域类型本质上是一个开放的 PL/SQL 容器，并带有生成输出的附加选项。您可以使用 Oracle Web\
  \ Application (OWA) 工具包过程（例如 `htp.p`）来生成输出。对 APEX 项的引用可以使用绑定变量语法（例如，`:P1_ITEM_NAME`）、`v`\
  \ 函数（例如，`v('P1_ITEM_NAME')`）或替换字符串语法（例如，`&P1_ITEM_NAME`）来实现，以支持区域中包含的逻辑。\n\nPL/SQL\
  \ 区域与过程区域的不同之处在于，PL/SQL 区域仅在页面渲染期间执行，而过程可以在页面处理和页面渲染期间运行。PL/SQL 区域的优势在于能够直接在页面上生成内容。这种输出的一个用例是需要一种超出标准报告模板能力的复杂报告格式。在这种情况下，可以编写一个生成所需\
  \ HTML 输出的 PL/SQL 包，并由 PL/SQL 区域调用。\n\n在“服务台”应用程序中，您希望通过添加个人未解决工单数量的快速摘要，使主页更有用。这仅适用于有人登录的情况。因此，如果他们未登录，简单的问候消息就足够了。您可以通过添加一个包含一些逻辑以输出相应消息的\
  \ PL/SQL 区域来完成添加摘要的任务：\n\n1.  编辑页面 1。\n2.  通过在树中单击其名称来编辑 APEX Issue Tracker 区域。目前，此区域是一个标准的静态内容区域，会发出您输入到其中的确切\
  \ HTML 代码。您希望使其动态化，因此将其切换为使用 PL/SQL：\n    *   在“标识”属性组中，将“类型”更改为“PL/SQL 动态内容”。\n\
  \    *   在“PL/SQL 代码”文本区域中输入以下代码，替换原有的静态 HTML，然后保存您的更改：\n\n```\nDECLARE\n   l_count\
  \ NUMBER;\n   l_status_id NUMBER := get_status('OPEN');\nBEGIN\n   IF :APP_USER\
  \ != 'nobody' THEN\n      SELECT count(*)\n        INTO l_count\n        FROM tickets\n\
  \       WHERE assigned_to = :APP_USER\n         AND status_id = l_status_id;\n \
  \     htp.p('<h1>Welcome to the APEX Issue Tracking System, '\n            || :APP_USER\
  \ || '</h1>'\n            || 'You have ' || l_count || ' Open tickets.<br />'\n\
  \            || 'Select an option from the list');\n   ELSE\n      htp.p('<h1>Welcome\
  \ to the APEX Issue Tracking System</h1>'\n            || 'Select an option from\
  \ the list');\n   END IF;\nEND;\n```\n\n此代码实现了基于用户替换变量 `:APP_USER` 做出决策的逻辑，并根据该区分因素定制\
  \ `htp.p` 输出。当用户尚未登录时，APEX 会提供 “nobody” 作为用户名，因此逻辑会根据该值进行判断。\n\n当为尚未登录的用户生成 PL/SQL\
  \ 区域时，会产生一条简单的欢迎消息（见图 8-19）。当拥有凭据的用户登录到应用程序时，会产生类似于图 8-20 中的消息，显示特定于用户的问候语以及分配给该用户的未解决工单数量的快速计数。\n\
  \n![A978-1-4842-0466-5_8_Fig20_HTML.jpg](img/A978-1-4842-0466-5_8_Fig20_HTML.jpg)\n\
  \n图 8-20. 对于已验证用户，PL/SQL 区域会生成问候语和工单计数\n\n![A978-1-4842-0466-5_8_Fig19_HTML.jpg](img/A978-1-4842-0466-5_8_Fig19_HTML.jpg)\n\
  \n图 8-19. 用户尚未登录时的 Issue Tracker PL/SQL 区域\n\n在本节中，您创建了一个动态 PL/SQL 区域，该区域根据应用程序用户改变输出。本节的示例虽然简单，但展示了如何使用数据库中的\
  \ PL/SQL 使区域的内容根据需要变得动态。\n\n## 动态 SQL\n\n动态 SQL 是指不是在设计时确定，而是在运行时由任意数量的动态条件组装而成的\
  \ SQL 的术语。当 SQL 语句的确切要求直到运行时才知晓，或者当 SQL 需要在应用程序运行时改变时，会使用动态 SQL。动态 SQL 允许您在应用程序运行时修改列列表、`where`\
  \ 子句、连接以及 SQL 语句的任何其他部分。\n\nAPEX 支持报告中的动态 SQL，并且可以支持返回 SQL 语句作为结果的 PL/SQL 函数。但是，存在一些约束。函数必须返回有效的\
  \ SQL 语句。根据实现的不同，如果列数未知或会变化，语句可能需要返回一组通用列。\n\n“服务台”应用程序需要区分公共工单和私人工单。为了实现该目标，您可以实现一个公共标志功能。实现该标志需要对数据模型进行快速更新，然后在主页报告中实现动态\
  \ SQL。首先进行数据修改：\n\n1.  导航到 SQL Workshop。\n2.  单击 SQL Commands 图标。\n3.  在文本区域中输入以下\
  \ SQL 语句，然后单击 Run 按钮。这会将名为 `PUBLIC_FLAG` 的新列添加到 `TICKETS` 表中：\n\n```\nALTER TABLE\
  \ tickets ADD (public_flag VARCHAR2(1))\n```\n\n4.  在文本区域中输入以下 SQL 语句，替换当前语句，然后单击\
  \ Run。确保 Autocommit 复选框已选中。这会将所有当前工单更新为默认值 `N`：\n\n```\nUPDATE tickets SET public_flag\
  \ = 'N'\n```\n\n现在数据模型修改已完成，您可以转向应用程序。在工单编辑屏幕中添加查看和编辑新值的选项：\n\n1.  编辑“服务台”应用程序的页面\
  \ 210。\n2.  使用组件库中的拖放功能，向“管理工单”区域添加一个新的单选组项。将新项定位在“状态 ID”项的右侧。\n3.  输入 `P210_PUBLIC_FLAG`\
  \ 作为名称，输入 `Public Flag` 作为标签。\n4.  在“设置”属性组中，将“列数”设置为 `2`。\n5.  在“外观”属性组中，将“模板”设置为“必填”。\n\
  6.  将“需要值”字段设置为“是”。\n7.  在“值列表”属性组中，将“类型”设置为“静态值”，同时在“静态值”文本区域中输入 `STATIC:Y,N`。\n\
  8.  将“显示空值”设置为“否”，如图 8-21 所示。\n\n![A978-1-4842-0466-5_8_Fig21_HTML.jpg](img/A978-1-4842-0466-5_8_Fig21_HTML.jpg)\n\
  \n图 8-21. 公共标志的值列表\n\n当向表单添加与表单所基于的表中的数据库列相关的列时，必须更改一些设置。“源使用”和“源类型”共同作用来标识每个项如何获取其值：\n\
  \n1.  在“源”属性组中，将“类型”设置为“数据库列”，这将相应地将“源使用”设置为“始终”，替换会话状态中的任何现有值。确保“数据库列名”为 `PUBLIC_FLAG`。\n\
  2.  在“默认值”属性组中，将“类型”设置为“静态值”，并在“静态值”中输入 `N`。\n3.  保存您的更改。\n\n现在您的数据模型中有了一个 `PUBLIC_FLAG`\
  \ 列，并且能够通过“工单”表单控制它，您可以在页面 1 上创建动态 SQL 报告，以便为未验证用户显示带有“公共”选项的工单：\n\n1.  在您的应用程序中编辑页面\
  \ 1。\n2.  通过在页面设计器工具栏中单击“创建”按钮并选择“报告区域”，如图 8-22 所示，来创建一个新区域。\n\n![A978-1-4842-0466-5_8_Fig22_HTML.jpg](img/A978-1-4842-0466-5_8_Fig22_HTML.jpg)\n\
  \n图 8-22. 为 SQL 创建区域以生成您的报告\n\n3.  选择“经典报告”，然后单击“下一步”。\n4.  输入 `Current Open Issues`\
  \ 作为标题，如图 8-23 所示。单击“下一步”。\n\n![A978-1-4842-0466-5_8_Fig23_HTML.jpg](img/A978-1-4842-0466-5_8_Fig23_HTML.jpg)\n\
  \n图 8-23.\n\n\n\n\n**区域标题与显示点**  将**源类型**设置为**SQL 查询**，并将以下 SQL 输入到**区域源**中。完成后，点击**创建区域**按钮，接受所有剩余设置的默认值：\n\
  \n```sql\nDECLARE\n    l_sql VARCHAR2(500);\nBEGIN\n    l_sql := l_sql ||  q'!\n\
  \                SELECT\n                  subject,\n                  created_on,\n\
  \                  assigned_to\n                FROM\n                  tickets\
  \ t,\n                  status_lookup sl\n                WHERE\n              \
  \    t.status_id = sl.status_id\n                  AND sl.status = 'OPEN'\n    \
  \    !';\n    IF :APP_USER = 'nobody' THEN\n        l_sql := l_sql || q'! AND public_flag\
  \ = 'Y' !';\n    END IF;\n    RETURN l_sql;\nEND;\n```\n\n要完整查看此报告的结果，您需要将一些工单设置为新的\
  \ PUBLIC 选项。以已登录用户身份导航到工单摘要屏幕，并将几个状态为 OPEN 的工单的 PUBLIC 选项更改为“是”。当您以已登录用户身份导航到主屏幕时，应出现所有未关闭工单的完整列表，如图\
  \ 8-24 所示。注销后，您将仅看到标记为 PUBLIC 的工单。\n\n![A978-1-4842-0466-5_8_Fig24_HTML.jpg](img/A978-1-4842-0466-5_8_Fig24_HTML.jpg)\n\
  *图 8-24. 由动态 SQL 生成的报告结果*\n\n> 注意：该 SQL 语句使用了您可能不熟悉的引用语法。Oracle 数据库 10g 引入了一种用于字符串字面量的引用机制，允许您定义自己的字符串定界符，从而无需在字符串中重复单引号。可以使用任何字符作为定界符，包括括号组合\
  \ `() {} [] <>`。基本语法是 `q’X 字符串 X'`，其中 `X` 是任意单个字符。`q’X` 开启字面量字符串，`X'` 关闭字面量字符串。您可以在\
  \ Oracle 数据库 SQL 语言参考手册中找到有关字面量语法的更多详细信息。\n\n## 总结\n与任何编程语言或框架一样，学习基础知识是第一步。本章涉及的许多要点可能只是冰山一角。每一节都有能力深入到一系列广泛的技术之中，其中\
  \ Oracle 数据库是主要部分。本章的目的是通过示例应用程序演示 APEX 框架的工作原理，并为进一步探索细节提供一个起点。\n\n"
- "# 9. 安全性\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0466-5_​9](http://dx.doi.org/10.1007/978-1-4842-0466-5_9)）包含补充材料，可供授权用户使用。\n\
  \n安全性的实施程度各不相同；从来没有一个非黑即白的答案。在确定需要多少安全性之后，会紧接着出现关于被保护对象的价值、风险、后果以及被攻击的可能性等附加问题。对于任何安全措施，总会有人试图规避它。本章将回顾基本的安全特性以及保护\
  \ Help Desk 应用程序的一种方法。这里回顾的概念适用于所有 APEX 应用程序，并且是 APEX 框架特有的。\n\n## 用户维护导航\n在 Help\
  \ Desk 应用程序中，您有通过 Web 界面在应用程序中维护用户的需求。现在，让我们向应用程序添加一个部分，用于维护用户账户，然后修改标签页结构以导航到新创建的表单。这一次，您将不使用**创建页面**向导来创建菜单项，而是将在**共享组件**部分从头开始创建它们，以便您能更好地理解菜单层次结构是如何工作的。\n\
  \n首先，创建一个空白页面，作为新标签页的目标页面（标签页需要引用一个页面）：\n\n1.  在应用程序构建器主页中，编辑 Help Desk 应用程序时，点击**创建页面**按钮。\n\
  2.  选择**空白页**选项，然后点击**下一步**。\n3.  将**页面号**设置为 `600`，在**名称**字段中输入 `Users`，并将**面包屑**选择设置为**面包屑**。页面刷新后，确保**条目名称**为\
  \ Users，然后点击**下一步**。\n4.  对于**导航首选项**单选组，选择**不要将此页面与导航菜单条目关联**。点击**下一步**。\n5.  点击**完成**以完成页面的创建。完成的页面应为空，并且您不应看到任何与之相关的新菜单项，如图\
  \ 9-1 所示。\n\n![A978-1-4842-0466-5_9_Fig1_HTML.jpg](img/A978-1-4842-0466-5_9_Fig1_HTML.jpg)\n\
