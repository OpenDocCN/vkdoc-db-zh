  \n## 工作区的构成\n\nAPEX 从一开始就被设计为多租户架构，其中许多不同的开发环境（称为工作区）可以存在于一个 APEX 实例中。例如，Oracle\
  \ 的免费托管实例 `apex.oracle.com` 拥有超过 10,000 个活跃的工作区，每个工作区都是一个完全独立的环境，无法看到或与其他任何工作区交互。您可以将其视为软件即服务\
  \ (SaaS) 或云计算架构，但基本上，这意味着每个工作区都是独特且与其他所有工作区隔离的。\n\n简单来说，每个工作区代表一个虚拟的私有容器，开发者在其中创建和部署他们的\
  \ APEX 应用程序。开发过程是在工作区的上下文中进行的，因此了解工作区的结构很重要。图 2-1 使用数据库实体关系图的术语来帮助解释工作区中对象的组成。\n\
  \n![A978-1-4842-0466-5_2_Fig1_HTML.gif](img/A978-1-4842-0466-5_2_Fig1_HTML.gif)\n\
  \n图 2-1. 工作区的逻辑构成\n\n一个工作区可能包含：\n\n*   一个到多个用户：这些用户可能是三种类型之一：管理员、开发者或最终用户。\n*  \
  \ 零个到多个应用程序：应用程序可以从打包应用程序列表中添加、导入或从头开始创建。\n*   一个到多个方案：虽然工作区在创建时必须分配至少一个方案，但实例管理员可以为一个工作区分配多个方案。\n\
  \n一个工作区中可以有多个应用程序和多个方案，但一个应用程序只能解析为一个（且仅一个）方案，这个方案只能在开发期间设置。接下来的部分将更深入地探讨这一点，让您全面理解这些概念之间的关系。\n\
  \n### APEX 用户\n\n要登录 APEX 工作区，您必须拥有一个有效的 APEX 用户访问权限。系统提供了多种不同的用户角色，它们决定了您登录后可以执行的操作。具体角色如下：\n\
  \n*   **实例管理员**是特殊用户，负责管理和维护整个 APEX 实例。他们可以设置实例级别的首选项和消息、创建和管理工作区、监控空间利用率，以及执行与整个\
  \ APEX 安装相关的许多其他操作。实例管理员只能登录特殊的`INTERNAL`工作区，该工作区包含 APEX 管理服务应用程序。\n*   **工作区管理员**负责管理工作区的具体细节，可以管理与该工作区相关的用户账户、监控工作区活动、查看日志文件、覆盖开发人员的锁定和设置等。尽管不是好的实践，但工作区管理员也可以充当开发人员的角色，创建和修改应用程序。\n\
  *   **开发人员**是创建和编辑工作区中应用程序的用户。他们可以访问分配给工作区的模式中的底层表，并可以创建和修改数据库对象以及存储的 PL/SQL 单元。大多数编写\
  \ APEX 应用程序的人只需要此级别的访问权限。\n*   **终端用户**只能运行工作区中的应用程序。他们无法直接访问任何底层数据库对象，也无法访问任何 APEX\
  \ 开发模块。终端用户不能直接登录工作区。\n\n除了 APEX 实例管理员外，在默认安装中，APEX 用户是特定于且唯一于某个工作区的，这意味着您可以在单个\
  \ APEX 实例的多个工作区中拥有同名用户，但这些用户中的每一个都是唯一的。他们可以有自己的密码和设置，并且彼此之间没有任何关联。\n\nAPEX 5.0 引入了使用外部存储库（如单点登录或\
  \ LDAP）作为来源来分配和验证 APEX 用户的能力，这意味着单个用户可以访问多个工作区。但是，此功能默认未设置，需要实例管理员进行配置。\n\n在开发时，您应该养成以开发人员身份登录的习惯，而不是以工作区管理员身份登录。系统提供了多种保护措施来防止开发人员在工作区中相互干扰。如果您以工作区管理员身份登录，这些保护措施将被绕过，您可能会意外干扰他人正在处理的内容。虽然这在只有单个开发人员的工作区中不是问题，但养成这种习惯仍然是好的。\n\
  \n**注意**\n\n本书使用最后三种类型的用户。它假设 APEX 已安装，工作区已创建，并且您已获得工作区管理员的登录凭据。如果您使用的是 `apex.oracle.com`\
  \ 上的托管实例，那么您在注册时获得的用户名就具有工作区管理员的凭据。但是，如果您使用的是本地实例，请参考 APEX 文档或让您的实例管理员帮助您设置工作区。\n\
  \n### 应用程序、页面、区域和项目\n\n尽管工作区基本上从空开始，但您可以拥有多个驻留在工作区中的应用程序。没有特定的规则，但工作区中的所有应用程序很可能有一些共同点：它们可能都使用相同的底层数据库对象，针对相同的用户社区，或使用相同的用户认证方法。\n\
  \n在构建应用程序时，您会添加新页面，并使用区域和项目构建这些页面。图 2-2 显示了不同类型对象之间的层次结构。\n\n![A978-1-4842-0466-5_2_Fig2_HTML.gif](img/A978-1-4842-0466-5_2_Fig2_HTML.gif)\n\
  \n图 2-2. 通用应用程序层次结构\n\n应用程序基本上是执行与业务功能相关的一个任务（或一组任务）的页面组。在本书的过程中，您将在单个工作区中构建一个应用程序，但重要的是要知道，在典型的开发环境中，您可能会在多个工作区中处理许多应用程序。\n\
  \n页面是应用程序的基本构建块，包含用户界面（UI）组件和处理用户输入的程序逻辑。我们稍后将介绍 UI 渲染与用户输入处理的区别，但现在可以将页面大致等同于桌面\
  \ UI 术语中的屏幕。\n\n区域是充当内容容器的 UI 项。一个页面上可以有任意数量的区域，并且区域可以嵌套在其他区域中。这为您提供了创建诸如仪表板之类的东西的机会，您可能会将一个数据报告区域和一个图表区域嵌套在单个父级`HTML`区域中。\n\
  \n项目是用于向用户呈现 UI 的 HTML 表单元素。这些包括诸如按钮、选择列表、文本字段、复选框、单选按钮组等。项目分为两类：页面级项目和应用程序级项目的区别在于，后者是在应用程序级别定义的，并不直接呈现在页面上。您可以将它们视为全局变量。页面级项目是在特定页面上定义的，并分配给某个区域以控制它们在用户界面上的显示位置和方式。\n\
  \n应用程序显然远不止这些简单的构建块，但如果您理解它们之间的基本层次关系，那么在构建您的第一个页面时将有一个良好的开端，并在执行更复杂的任务时打下坚实的基础。\n\
  \n\n## 工作区、应用与模式\n\n虽然工作区与应用之间的关系很直接，但当你引入数据库**模式**（schema）的关系时，情况就变得稍微复杂一些。图 2-3\
  \ 展示了这种关系。\n\n![A978-1-4842-0466-5_2_Fig3_HTML.gif](img/A978-1-4842-0466-5_2_Fig3_HTML.gif)\n\
  \n图 2-3. 模式如何与工作区及应用关联\n\n当创建一个工作区时，它至少与一个（也可能多个）底层数据库模式相关联。这使得应用能够访问数据库对象，如表、视图、存储的\
  \ PL/SQL 程序单元等。\n\n当创建一个应用时，它会被分配一个来自该工作区关联模式列表中的单一“解析模式（parse as schema）”。所谓“解析模式”，是指该应用执行的所有\
  \ SQL 查询和 PL/SQL 调用都在该 Oracle 数据库用户下运行。因此，如果你的应用定义的“解析模式”是 `DOUG`，那么像这样的查询：\n\n\
  ```sql\nselect * from emp\n```\n\n在数据库中的执行效果等同于：\n\n```sql\nselect * from DOUG.emp\n\
  ```\n\n因为 APEX 应用是可移植的，并且不一定在与开发时相同的模式中运行，所以将模式名硬编码到你的 SQL 或 PL/SQL 中不是好的实践。相反，APEX\
  \ 提供了一个替换变量（本书后续会介绍多个此类变量）来代表“解析模式”。`#OWNER#` 替换变量会在运行时被替换为应用实际的“解析模式”。因此，语句：\n\n\
  ```sql\nselect * from #OWNER#.emp\n```\n\n会解析为：\n\n```sql\nselect * from DOUG.emp\n\
  ```\n\n在最常见的实现中，一个工作区被创建并关联到一个单一的底层数据库模式。在该工作区中开发的应用，其“解析模式”被设置为该工作区唯一关联的模式，并使用属于该模式的数据库对象。\n\
  \n如果一个工作区被分配了多个模式，情况就会变得有些复杂。你可能会想当然地认为，如果你将三个模式关联到一个工作区，该工作区中的任何应用都能自动访问这三个模式中的数据。然而，这种想法是错误的。\n\
  \n因为一个应用只被分配一个（且仅有一个）“解析模式”，所有的 SQL 语句和 PL/SQL 调用都作为该模式执行。尽管工作区可能与多个模式相关联，但应用本身并非如此。如果你想访问应用“解析模式”之外的模式中的数据，你必须确保在数据库级别授予了正确的权限，就像使用任何其他\
  \ Oracle 工具或开发环境时一样。\n\n看一下图 2-4 所示的例子，其中你希望在 SQL 语句中连接的两个表分别属于不同的模式。\n\n![A978-1-4842-0466-5_2_Fig4_HTML.gif](img/A978-1-4842-0466-5_2_Fig4_HTML.gif)\n\
  \n图 2-4. 跨模式连接表\n\n如果你的“解析模式”是 `DOUG`，那么你必须被明确授予对 `JOEY` 模式中对象的访问权限。为此，你需要以 `JOEY`（或\
  \ DBA）身份登录数据库，并将对 `JOEY.DEPT` 的适当数据库权限授予 `DOUG`。\n\n在此例中，如果你需要在 `select` 语句中连接这两个表，授予\
  \ `DOUG` 对 `JOEY.DEPT` 的 `SELECT` 权限就足够了。然后，你可以这样编写你的 `select` 语句：\n\n```sql\nselect\
  \ e.empno,\ne.ename,\nd.dept_name,\nd.location\nfrom #OWNER#.emp e,\nJOEY.dept d\n\
  where e.deptno = d.deptno\n```\n\n`#OWNER#` 替换变量将被解析为你的“解析模式”（`DOUG`），只要正确的权限已到位，这个连接就能正确工作。\n\
  \n**注意**\n\n因为允许从 `JOEY` 模式进行 `select` 的权限是在数据库级别设置的，所以没有必要将 `JOEY` 模式关联到你的工作区。你只需要在一种情况下需要将模式关联到工作区：要么你将它用作该工作区中应用的“解析模式”，要么你需要从\
  \ SQL 工作坊直接访问该模式的对象。\n\n### 关于工作区的最后一点\n\n如你所知，一个 APEX 实例可以有多个工作区。但应该有多少个工作区呢？答案并不简单。\n\
  \n除非你是一个应用非常少的小型组织，否则你可能不应该只有一个工作区。另一方面，你也不应该为你编码的每一个新应用都创建一个新的工作区。\n\n对此有几种不同的看法，但我倾向于从应用套件的角度来思考。如果一些应用针对相同的数据集执行类似的任务，并且面向相同的目标用户群，那么将它们放在同一个工作区中可能会更好。\n\
  \n关键在于运用你的判断力，努力使开发和维护变得简单。没有什么比登录一个工作区后，发现你不得不翻阅数十甚至数百个应用才能找到你要处理的那个更糟糕的了。\n\n\
  ## APEX 模块概览\n\n现在你已经了解了逻辑架构的基本情况，是时候更近距离地看看 APEX 开发环境了。本节将向你介绍 APEX 环境的不同部分，并概述其布局。\n\
  \n图 2-5 展示了 APEX 菜单结构的层次布局。稍后，你将看到每个主要部分并了解其内部机制；这只是一个介绍性的概览。在我们逐步学习开发流程的过程中，你会更深入地了解它。\n\
  \n![A978-1-4842-0466-5_2_Fig5_HTML.gif](img/A978-1-4842-0466-5_2_Fig5_HTML.gif)\n\
  \n图 2-5. APEX 5.0 层次化菜单结构\n\n如你所见，开发环境分为五个主要部分：\n\n*   **应用构建器（Application Builder）**\
  \ 是你创建和修改应用及页面的地方，很可能也是你花费大部分时间的地方。\n*   **SQL 工作坊（SQL Workshop）** 是你直接处理底层数据库对象及其相关数据的地方。可以把它看作是一个基于网页的\
  \ SQL*PLUS，并加入了一些图形用户界面功能以使事情更容易。\n*   **团队开发（Team Development）** 这个部分让你可以输入和跟踪与\
  \ APEX 应用开发相关的信息。\n*   **打包应用（Packaged Apps）** 提供了一种安装和管理 Oracle APEX 自带的大量应用程序的方法。其中许多应用程序可以开箱即用，以解决实际的业务问题。其他的则仅仅是示例应用程序，用于帮助展示\
  \ APEX 的功能。\n*   **管理（Administration）** 是你可以管理工作区细节的地方——其默认设置、用户、组等等。请注意，工作区管理员比普通开发者拥有更多可用的选项。\n\
  \n\n### 主页\n\n一旦登录到你的工作区，你就会看到如图 2-6 所示的**工作区主页**。主页是你通往开发环境中其他部分的门户，并提供了一些关于工作区动态的高层次信息。\n\
  \n![A978-1-4842-0466-5_2_Fig6_HTML.jpg](img/A978-1-4842-0466-5_2_Fig6_HTML.jpg)\n\
  *图 2-6. APEX 开发主屏幕*\n\n页面顶部是导航栏，其中包含你在整个开发人员界面中可用的主要导航结构。它提供了对你在开发应用程序时需要快速访问的许多部分的直接访问。值得注意的是，菜单栏的每个主要选项都分为两部分。例如，如果你直接点击`应用程序构建器`项，你会立即被带到`应用程序构建器`主页。但是，如果你点击其右侧的小向下箭头，则会显示一个更详细的下拉菜单，让你可以更细致地选择目的地，如图\
  \ 2-7 所示。\n\n![A978-1-4842-0466-5_2_Fig7_HTML.jpg](img/A978-1-4842-0466-5_2_Fig7_HTML.jpg)\n\
  *图 2-7. 使用菜单栏上的下拉菜单*\n\n在导航栏的右侧，是一组图标表示的菜单选项，如图 2-8 所示。\n\n![A978-1-4842-0466-5_2_Fig8_HTML.jpg](img/A978-1-4842-0466-5_2_Fig8_HTML.jpg)\n\
  *图 2-8. 导航栏右侧的图标*\n\n第一个是搜索图标，点击后允许你执行上下文相关的搜索。搜索的上下文取决于你在`应用程序构建器`中的位置。例如，如果你在工作区主页上，你的搜索范围是整个工作区。但是，如果你在`应用程序构建器`或`管理`部分，搜索将被限制在那些特定区域。\n\
  \n第二个是`管理`菜单。无论你是`工作区管理员`还是`开发人员`，此菜单都对你可用。区别在于你能访问哪些功能。`开发人员`可以监控工作区的某些活动区域并访问仪表板，而`工作区管理员`则可以完全访问所有功能，包括用户维护和服务请求。\n\
  \n第三个是`帮助`菜单，它提供对在线文档、APEX 支持论坛、Oracle 技术网络站点的 APEX 部分以及一个`关于`部分的访问。\n\n最后一个是当前登录用户的个人资料链接。在这里，用户可以编辑他们的详细信息、更新个人资料图片和更改密码。\n\
  \n在浏览器的最底部是一个信息区域，显示当前登录的用户、当前工作区、语言以及 Oracle APEX 的当前版本。\n\n页面的其余部分要么用于提供指向四个主要部分的快速链接，要么为你提供有关工作区内正在发生什么的信息。从左到右的前两个区域显示工作区活动的概览。它们显示了工作区中的`热门应用程序`和`热门用户`。`新闻与消息`区域允许工作区中的开发人员输入他们希望工作区中其他人看到的信息。在一个新的工作区中，这些区域可能没有任何内容，但随着你按照本书学习，你会看到这种情况开始改变。\n\
  \n请注意，开发环境中每个部分的主页大多遵循这种仪表板风格的主页界面，一个显著的例外是`应用程序构建器`。让我们首先看看那个部分。\n\n### 应用程序构建器\n\
  \n`应用程序构建器`是 APEX 应用程序开发环境的核心。你将使用`SQL 工作室`来操作底层数据库对象，而`应用程序构建器`则用于在编写、测试和调试应用程序时完成大部分实际工作。\n\
  \n#### 应用程序构建器主页\n\n点击`应用程序构建器`菜单选项会带你进入`应用程序构建器`主页。与大多数主页一样，它的布局是顶部为菜单栏，右侧是包含任务和快速链接的区域。\n\
  \n主要区别在于`应用程序构建器`主页不包含任何仪表板风格的摘要。相反，这里是你看到工作区中包含的不同应用程序列表的地方。（图 2-9 提供了一个例子。）根据你的\
  \ APEX 实例设置，你可能会看到一些由`工作区管理员`安装的示例应用程序，但如果完全没有看到任何应用程序，也不必担心。\n\n![A978-1-4842-0466-5_2_Fig9_HTML.jpg](img/A978-1-4842-0466-5_2_Fig9_HTML.jpg)\n\
  *图 2-9. 应用程序构建器主页*\n\n图 2-9 显示了工作区中的一个应用程序，名为`Sample Master Detail`。但是，除了它的名称和应用程序\
  \ ID (118) 之外，没有太多关于它的信息。从这里你开始看到 APEX 的强大之处，不仅在开发者 UI 中，也在你的应用程序中。\n\n你看到的应用程序列表实际上是一种称为`交互式报表(IR)`的报表样式。`IR`\
  \ 允许我们自定义报表及其内容的显示方式。`IR` 在整个 APEX 开发界面中使用，也可以在创建你自己的应用程序时使用。它们是极其强大的工具，你会经常用到它们。\n\
  \n页面右侧有三个区域，显示`关于`信息、最近编辑的应用程序以及指向`应用程序迁移`向导的链接。你稍后会更多地处理这些；现在，我们将深入查看一个应用程序的详细信息。\n\
  \n#### 应用程序主页\n\n点击列出的任何一个应用程序会深入到`应用程序`主页，如图 2-10 所示。此页面与`应用程序构建器`主页非常相似，但它显示了特定应用程序中的所有页面。同样，它使用了一个`IR`，因此你可以自定义查看此数据的方式。\n\
  \n![A978-1-4842-0466-5_2_Fig10_HTML.jpg](img/A978-1-4842-0466-5_2_Fig10_HTML.jpg)\n\
  *图 2-10. 应用程序主页*\n\n请注意页面的结构方式，与页面相关的任务和最近编辑的页面显示在页面右侧。当你在界面中导航时，这种布局将成为一个熟悉的主题。\n\
  \n从这里，你可以点击列出的任何页面，使用`页面设计器`编辑该页面。你还可以`运行`、`导出`和`导入`应用程序，编辑支持对象或共享组件，以及访问与应用程序相关的实用程序。\n\
  \n\n#### 页面设计器\n\n页面设计器是您作为开发人员创建和编辑页面、区域和项目时将花费大部分时间的地方。APEX 5.0 中的页面设计器与之前的版本完全不同，现在呈现的方式更接近传统的桌面\
  \ IDE 布局。这一变化使我们能够从单一页面界面管理组件并编辑它们的布局和属性。\n\n最大的变化之一是，由于采用了单页面界面，对页面的修改现在必须明确保存。虽然这可能看起来有些不便，但它实际上带来了一些有用的功能。例如，现在可以进行多项修改并一次性保存，从而可能减少开发时间。此外，未保存的修改现在可以轻松撤销。\n\
  \n另一个主要的省时功能是能够使用 `Shift+Click`（在 Mac 上为 `Cmd+Click`）选择页面上的多个组件。一旦选择了多个项目，您就可以在属性编辑器中编辑它们的共同属性。例如，如果您想编辑页面上所有按钮的属性，将它们的视觉属性设置为完全相同，这会非常有用。\n\
  \n随着拖放界面的引入，区域和项目的放置得到了增强。所有的渲染组件都可以轻松地在页面上放置或重新排列。\n\n新页面设计器的布局相当深入，如果您不熟悉它，可能会有点令人困惑。本书后面的附录\
  \ A 将带您详细参观页面设计器及其组件，阐明将在本书其余部分使用的术语和命名规范。请花点时间翻阅附录 A，以熟悉这些术语和工具的位置。\n\n我的目标是，在本书的剩余部分，通过一种能帮助您自然学习如何使用页面设计器的方式来引导您完成开发过程。然而，如果您在任何时候对某个指令感到困惑，或者忘记了某个特定工具的名称，参考附录\
  \ A 应该有助于您理清思路。\n\n### SQL 工作坊\n\nSQL 工作坊是一套工具，使开发人员能够查看和管理工作区所分配底层模式中的数据库对象。如图\
  \ 2-11 所示的 SQL 工作坊主页，让您能够访问每个底层工具，并提供有关最近创建的对象和已运行命令的一些高层信息。\n\n![A978-1-4842-0466-5_2_Fig11_HTML.jpg](img/A978-1-4842-0466-5_2_Fig11_HTML.jpg)\n\
  \n图 2-11.\nSQL 工作坊主页\n\n因为工作区可能分配了不止一个模式，右侧的模式选择对话框允许您选择并设置所有工具的默认模式。您也可以在每个工具中更改当前工作的模式。\n\
  \n页面顶部的工具栏显示了作为 SQL 工作坊一部分提供的主要工具。每个独立的工具都值得单独介绍，所以现在让我们花点时间看看它们是什么以及它们能做什么。当您为应用程序创建数据库对象时，会更多地使用\
  \ APEX 的这一部分。\n\n#### 对象浏览器\n\n如果您使用数据库有一段时间了，您可能用过一些流行的 GUI 工具来浏览和管理模式中的数据库对象。APEX\
  \ 对象浏览器是一个非常相似的工具，通过您的 Web 浏览器呈现。图 2-12 显示了对象浏览器正被用来查看表 `EBA_DEMO_MD_DEPT`。\n\n\
  ![A978-1-4842-0466-5_2_Fig12_HTML.jpg](img/A978-1-4842-0466-5_2_Fig12_HTML.jpg)\n\
  \n图 2-12.\nAPEX 对象浏览器\n\n“对象浏览器”这个名称有些用词不当，因为该工具不仅可以用于浏览底层模式中的对象，还可以创建新对象、浏览和编辑数据、删除对象以及编辑对象定义。尽管它可以操作的对象类型存在一些限制，但它已经足够强大，可以完成应用程序开发人员需要处理的大多数日常任务。\n\
  \n您可以通过左上角的下拉列表选择要处理的对象类型。您可以在下面的搜索框中输入文本字符串，然后单击右侧的刷新图标来搜索选定的对象类型。单击对象的名称会显示其属性以及深入查看更多详细信息的链接。\n\
  \n虽然对象浏览器的界面相当直观，但有一些有趣的地方需要注意。右上角有一个下拉列表，允许您设置当前模式。该列表包含当前分配给工作区的所有模式。您只需从列表中选择一个新的模式即可在它们之间切换。\n\
  \n#### SQL 命令界面\n\nSQL 命令界面允许您使用标准的 SQL 命令或 PL/SQL 与底层模式进行交互，就像在任何其他 GUI 工具或 SQL*Plus\
  \ 中一样。不同之处在于您可以保存语句以供以后使用。图 2-13 显示了一个在 SQL 命令界面中执行的简单 SQL 语句。\n\n![A978-1-4842-0466-5_2_Fig13_HTML.jpg](img/A978-1-4842-0466-5_2_Fig13_HTML.jpg)\n\
  \n图 2-13.\nSQL 命令界面\n\n尽管其核心功能相当直接，但 SQL 命令界面比初看起来要强大得多。除了能够保存和检索 SQL 与 PL/SQL 外，它还可以对语句运行执行计划，并允许您查看语句历史记录。因此，如果您运行了一个特别有用的脚本或语句但忘记了保存，您仍然可以从历史缓冲区中检索它。\n\
  \nSQL 命令界面还与查询生成器（稍后描述）集成，允许您加载和操作在查询生成器中构建的已保存语句。\n\n注意\n默认情况下，通过 SQL 命令界面执行的所有\
  \ SQL 语句都会自动提交。要覆盖此设置并进入事务模式，请取消选中工具栏中的“自动提交”复选框。完成此操作后，您可以手动提交和回滚您的 SQL 语句。\n\n\
  没有办法永久关闭“自动提交”，因此每当您想进入事务模式时，都需要记得这样做。\n\n\n\n#### SQL 脚本界面\n\nSQL 脚本界面允许您管理和运行保存到脚本文件中的\
  \ SQL 命令集。单个脚本可以包含一个或多个 SQL 语句或 PL/SQL 块。在 APEX 外部编写的 SQL 脚本可以加载到 SQL 脚本存储库中，并在其中进行编辑或运行。您也可以使用\
  \ SQL 脚本界面从头开始创建 SQL 脚本。图 2-14 展示了主要的 SQL 脚本界面页面。\n\n![A978-1-4842-0466-5_2_Fig14_HTML.jpg](img/A978-1-4842-0466-5_2_Fig14_HTML.jpg)\n\
  \n图 2-14. 主要的 SQL 脚本界面页面\n\n在此示例中，一个名为`database_objects.sql`的脚本已加载到脚本存储库中。通过点击编辑图标，您可以编辑脚本内容，如图\
  \ 2-15 所示。很有帮助的是，APEX 在脚本编辑器中提供了语法高亮显示。编辑器还具有查找和替换功能以及自动完成能力，还有撤销和重做功能。\n\n![A978-1-4842-0466-5_2_Fig15_HTML.jpg](img/A978-1-4842-0466-5_2_Fig15_HTML.jpg)\n\
  \n图 2-15. SQL 脚本编辑器\n\n您也可以将脚本下载到本地文件，以便在您喜欢的本地文本编辑器中进行编辑。完成后，只需将其剪切并粘贴回编辑器，或作为新的脚本文件上传即可。\n\
  \n注意：当您将脚本文件上传到存储库时，脚本名称必须是唯一的。如果不先从脚本存储库中删除现有的同名脚本文件，您无法用一个新版本覆盖它。\n\n一旦脚本准备好运行，您可以点击列表中的运行图标（或编辑器中的运行按钮），系统将引导您完成运行脚本向导。这允许您选择是立即运行脚本还是在后台运行。如果选择在后台运行，您的脚本将进入队列，并在到达队列前端时执行。\n\
  \n无论哪种方式，您都会被带到 SQL 脚本界面的“管理脚本结果”页面，如图 2-16 所示。此屏幕允许您查看脚本执行的状态和某些高级详细信息。对于以批处理模式提交的脚本，您还可以查看队列中特定脚本的状态。\n\
  \n![A978-1-4842-0466-5_2_Fig16_HTML.jpg](img/A978-1-4842-0466-5_2_Fig16_HTML.jpg)\n\
  \n图 2-16. “管理脚本结果”页面\n\n点击查看结果图标会显示运行脚本的最终结果。在图 2-17 中，您可以看到脚本存在错误，错误详情显示在报告正文中。如果脚本成功，则不会显示任何错误，并且页面底部的语句结果将显示零错误。\n\
  \n![A978-1-4842-0466-5_2_Fig17_HTML.jpg](img/A978-1-4842-0466-5_2_Fig17_HTML.jpg)\n\
  \n图 2-17. SQL 脚本界面错误示例\n\n注意：尽管 SQL 命令和 SQL 脚本界面都能接受并运行标准 SQL 语句，但 SQL\\*PLUS 的扩展命令在这些工具中无效。\n\
  \nSQL 命令界面在遇到任何 SQL\\*PLUS 特定命令时会抛出错误。然而，SQL 脚本界面会在运行的脚本中存在 SQL\\*PLUS 命令时警告用户，如果用户选择继续，则会忽略这些命令。因此，SQL\
  \ 命令和 SQL 脚本界面无法执行许多扩展 SQL\\*Plus 脚本的功能。\n\n#### 查询构建器\n\n尽管查询构建器已被归入“实用程序”页面，但因为它很有帮助，特别是对初学者而言，值得专门讨论。查询构建器允许您使用更具图形化的界面构建\
  \ SQL `select`语句，虽然不完全的拖放操作，但相当直观。\n\n当您首次进入查询构建器时，会看到一个屏幕，其中列出了当前活动模式中所有可用的表和视图。图\
  \ 2-18 显示了初始的查询构建器屏幕。\n\n![A978-1-4842-0466-5_2_Fig18_HTML.jpg](img/A978-1-4842-0466-5_2_Fig18_HTML.jpg)\n\
  \n图 2-18. 初始的查询构建器屏幕\n\n从这里，您可以开始构建查询。要将表包含在您的`select`语句中，只需点击左侧列表中的表。该表的表示形式将放置在“条件”区域上方的屏幕空白区域。您可以根据需要添加任意多的表到查询中，甚至可以通过再次点击来包含同一个表多次。请注意，如果包含同一个表的多个实例，新实例将附加一个序列号以区别于原始表。\n\
  \n图 2-19 展示了`DEMO_ORDERS`表的图形表示示例，并概述了不同的交互功能。\n\n![A978-1-4842-0466-5_2_Fig19_HTML.gif](img/A978-1-4842-0466-5_2_Fig19_HTML.gif)\n\
  \n图 2-19. 查询构建器中表示的`DEMO_ORDERS`表\n\n如图 2-19 所示，从上到下，这些操作区域如下：\n\n*   **表操作**显示一个对话框，允许您执行以下操作之一：\n\
  \    *   **全选**允许您快速选择或取消选择对象的所有列，以包含在正在构建的查询中。\n    *   **添加父表**允许您根据外键关系选择并添加一个父表到查询构建器。\n\
  \    *   **添加子表**允许您根据外键关系选择并添加一个子表到查询构建器。\n*   **显示/隐藏列**用于展开和折叠对象，从而显示或隐藏列定义。\n\
  *   **删除**从`select`语句中删除该表及其任何相关子句。\n*   **选择连接列**通过点击列名旁边的空白方块激活。这样做会使方块变暗，并将查询构建器置于表链接模式。然后您可以点击另一个空白方块（在另一个表或同一个表中），查询构建器将在两个列之间插入一个`EQUALITY\
  \ where`子句到 SQL 语句中。\n*   **数据类型指示器**指示列的数据类型，例如`number`、`character`、`date`等。\n\
  *   **列名**指示在表描述中定义的列名。\n*   **列选择器**允许您单独选择或取消选择要包含在 SQL 语句中进行处理的列。这也可以包括您想在`where`子句中使用但不在\
  \ SQL 语句输出中显示的列。基本规则是，您需要选择所有要显示的列，但不一定必须显示所有您选择的列。\n\n当您添加并连接表以及选择要操作的列时，屏幕底部的区域开始变化。该区域细分为几个选项卡，如下所示：\n\
  \n\n\n#### 实用工具\n\n*   **条件**选项卡为上方区域选择的每个列显示一行，并允许您进一步定义其属性。（此功能稍后将详细介绍。）\n*  \
  \ **SQL**选项卡显示向导正在构建的 SQL 语句。虽然它不能直接编辑，但您可以从此处轻松高亮显示该语句并将其复制到剪贴板。\n*   **结果**选项卡显示运行\
  \ SQL 语句的结果，并允许您以 CSV 格式下载结果数据。\n*   **已保存的 SQL**选项卡允许您保存、调用和管理使用查询生成器构建的语句。其中还包含筛选器，可用于搜索和限制显示哪些已保存的查询。\n\
  \n除了**条件**选项卡外，其余都一目了然，因此让我们更详细地介绍这个选项卡。图 2-20 展示了一个双表连接的示例，并选择了五个列进行操作。\n\n![A978-1-4842-0466-5_2_Fig20_HTML.jpg](img/A978-1-4842-0466-5_2_Fig20_HTML.jpg)\n\
  \n图 2-20. 一个双表连接示例\n\n在此示例中，已对查询应用了以下修改：\n\n*   将`ORDER_TOTAL`列的别名更改为`SUM_OF_ORDERS`\n\
  *   将结果集限制为仅包含`ORDER_TOTAL`小于 500 的记录\n*   按`CUST_LAST_NAME`、`CUST_FIRST_NAME`升序对返回的记录排序\n\
  *   对`ORDER_TOTAL`列执行`SUM`函数\n*   按`USER_NAME`、`CUSTOMER_ID`、`CUST_FIRST_NAME`、`CUST_LAST_NAME`对查询进行分组\n\
  \n根据列选择以及在**条件**选项卡中引入的限制和更改，SQL 语句（如在**SQL**选项卡中显示）如下所示：\n\n```sql\nselect DEMO_ORDERS.USER_NAME\
  \ as USER_NAME,\nDEMO_CUSTOMERS.CUSTOMER_ID as CUSTOMER_ID,\nDEMO_CUSTOMERS.CUST_FIRST_NAME\
  \ as CUST_FIRST_NAME,\nDEMO_CUSTOMERS.CUST_LAST_NAME as CUST_LAST_NAME,\nsum(DEMO_ORDERS.ORDER_TOTAL)\
  \ as \"SUM_OF_ORDERs\"\nfrom DEMO_ORDERS DEMO_ORDERS,\nDEMO_CUSTOMERS DEMO_CUSTOMERS\n\
  where DEMO_CUSTOMERS.CUSTOMER_ID=DEMO_ORDERS.CUSTOMER_ID\nand DEMO_ORDERS.ORDER_TOTAL\
  \ <500\ngroup by DEMO_ORDERS.USER_NAME,\nDEMO_CUSTOMERS.CUSTOMER_ID,\nDEMO_CUSTOMERS.CUST_FIRST_NAME,\n\
  DEMO_CUSTOMERS.CUST_LAST_NAME\norder by DEMO_CUSTOMERS.CUST_LAST_NAME ASC,\nDEMO_CUSTOMERS.CUST_FIRST_NAME\
  \ ASC\n```\n\n虽然查询生成器非常有用，并允许您使用简单的 GUI 快速组合出基本查询，但它确实有其局限性，例如嵌套子查询和复杂的联合查询。我们可以使用查询生成器来定义查询的骨架；然后，我们可以将查询带到\
  \ SQL 命令窗口或 SQL IDE 中，并从那里进行微调。\n\n最后值得一提的是，查询生成器在 APEX 的多个地方都有链接，因此，每当需要您提供 SQL\
  \ 语句时（例如，作为报表的基础），您都可以在弹出窗口中打开查询生成器，并将查询返回给调用表单。\n\n### 打包应用程序\n\n**打包应用程序**部分是您将安装和管理随\
  \ APEX 发行版捆绑的应用程序的地方。主页面如图 2-22 所示，显示了打包应用程序的主页。从这里您可以看到已安装了哪些应用程序，并可以导航到三个子部分。\n\
  \n![A978-1-4842-0466-5_2_Fig22_HTML.jpg](img/A978-1-4842-0466-5_2_Fig22_HTML.jpg)\n\
  \n图 2-22. 打包应用程序主页\n\n\n\n\n#### 打包应用画廊\n\n打包应用画廊展示了随`APEX`发行版捆绑提供的所有应用程序。共有 35\
  \ 个独立的打包应用，它们可归属于多个不同类别，包括软件开发、跟踪、团队生产力、营销、知识管理、IT 管理、项目管理、示例应用程序和示例工作表。\n\n点击某个应用程序的图标，将带你进入该应用程序的详细信息页面。在这里，你将能看到应用程序的截图、阅读其完整描述并查看版本信息，如图\
  \ 2-23 所示。\n\n![A978-1-4842-0466-5_2_Fig23_HTML.jpg](img/A978-1-4842-0466-5_2_Fig23_HTML.jpg)\n\
  图 2-23. 清单管理器打包应用信息页面\n\n点击`Install Application`（安装应用）按钮，将引导你完成在当前工作区中安装所选应用程序的过程。一个弹出式安装向导将让你选择身份验证方法，通常默认为`Application\
  \ Express Accounts`（应用程序快速帐户）。点击向导中最后的`Install Application`按钮，将安装该应用程序及其所有支持对象，包括任何必需的数据库对象。安装完成后，你将被带回到应用程序的信息页面，如图\
  \ 2-24 所示，你会看到应用程序已成功安装，并会获得管理和运行该应用程序的选项。\n\n![A978-1-4842-0466-5_2_Fig24_HTML.jpg](img/A978-1-4842-0466-5_2_Fig24_HTML.jpg)\n\
  图 2-24. 查看清单管理器应用已成功安装\n\n关于打包应用程序，有几件事你应该了解：\n\n*   任何名称中包含“Sample”（示例）的应用程序都是为了演示`APEX`中可用的功能，因此默认将以未锁定状态安装。这意味着开发者将能够编辑该应用程序，并查看`APEX`团队是如何开发该应用的。\n\
  *   名称中不包含“Sample”的应用程序是作为生产就绪版本提供的，将以锁定状态安装，不允许任何编辑，直到该应用被明确解锁。这可以通过`Manage`（管理）按钮完成，如图\
  \ 2-24 所示。任何已安装并保持锁定的此类应用程序，在生产环境中均得到 Oracle 的完全支持。这些锁定的应用程序也可以升级到未来`APEX`版本可能附带的更当前版本。一旦你解锁它们，Oracle\
  \ 的所有支持即告终止，可升级性失效，并且无法重新锁定应用程序。\n*   所有打包应用程序都安装到工作区默认的“解析为”模式中。目前，没有直接的方法将它们安装到次要的“解析为”模式中，除非先解锁并导出应用程序，从而使其失去任何支持。\n\
  \n尽管示例应用是作为学习辅助工具编写的，但从许多生产就绪的应用程序中同样能学到很多东西。我衷心建议你读完本书后的第一个行动，就是去看看一些打包应用程序的内部工作原理。\n\
  \n#### 打包应用仪表板\n\n如图 2-25 所示，仪表板页面展示了当前工作区中打包应用程序的使用情况概览。你会看到可用应用的总数、已安装的数量，以及是否有可升级的应用程序。你还能看到是谁安装了这些应用以及它们的使用频率。\n\
  \n![A978-1-4842-0466-5_2_Fig25_HTML.jpg](img/A978-1-4842-0466-5_2_Fig25_HTML.jpg)\n\
  图 2-25. 打包应用仪表板\n\n#### 打包应用管理\n\n打包应用管理页面提供了一系列专门与安装在当前工作区中的打包应用程序相关的管理任务列表。如果你以开发者身份登录，只会看到与管理`Interactive\
  \ Report`（交互式报表）设置和`Activity reports`（活动报告）相关的选项。但是，当你以工作区管理员身份登录时，会看到一个名为`Manage\
  \ Services`（管理服务）的部分，其中展示了完整管理部分中对你可用功能的一小部分。\n\n### 管理与团队开发\n\nUI 的最后两个功能区域，管理与团队开发，其复杂程度足以独立成章。因此，我们建议你参考深入介绍这些领域的章节。第\
  \ 10 章涵盖应用程序的部署，第 14 章是关于管理工作区的，而第 15 章则讲解团队开发。\n\n在本书中，你会接触到各种管理任务，因此如果你希望在开始前对管理有全面的了解，应该绕道先阅读这些章节以打好基础。然而，如果你准备好边做边学，那么就进入下一章，在那里你将开始真正的编程。\n\
  \n## 总结\n\n`APEX`的架构起初可能看起来有点令人生畏，但一旦你真正开始使用它，事情就会变得井然有序，你会越来越理解各个部分是如何组合在一起的。如果你从本章只带走一样东西，那就是：工作区本质上是你的开发沙盒。你所做的一切都发生在工作区的上下文中。其他所有事情——从开发的角度来看——与任何其他开发环境非常相似。你要构建一个新应用程序？那么它需要在工作区中创建。你需要访问一个模式来构建那个应用？那么它需要被分配到你的工作区。你明白这个道理了。现在，开始有趣的部分吧！\n\
  \n"
- '# 3. 识别问题与设计解决方案


  每个计算机系统都是（或至少应该是）解决某种问题的结果。虽然“Hello World”应用程序很棒，但我坚信，学习任何技术的最佳方式是将其应用于一个真实的问题，看看它实际是如何工作的。


  我在整本书中都遵循这一原则。本章将讨论大多数组织中一个非常普遍的、可以通过技术解决的问题。你还将探讨在设计基于 Web 的系统时，特别是使用`APEX`时，需要考虑的一些要素。


  ## 识别系统需求


  几乎每家公司，无论规模大小，在某个时候都需要实施某种帮助台系统。无论是用于跟踪员工问题和疑问的内部系统，还是用于跟踪商业软件或硬件客户问题的外部系统，帮助台系统的基本原理都相当标准。


  大多数帮助台系统都是由问题单或简称为“工单”的概念驱动的。这个术语源于计算机出现之前的日子：大多数问题是通过电话报告的，故障排查员使用纸质工单来记录通话。那张纸质工单上包含的信息有问题的描述、遇到问题的人的姓名、问题记录的时间等等。然后，在故障排查和（希望如此）解决问题的过程中，工程师们记录下每一步的操作，并包含他们在此过程中收集到的任何问题文档。如今，如果看到一个没有计算机化的帮助台系统，那将是非常令人惊讶的，即使它只是一个带有注释和状态的问题电子表格。


  在本章中，你将使用`APEX`来构建帮助台系统。在深入之前，你需要清晰地理解你试图解决的问题。至少，你需要审视当前的系统。




  '
- '# 从未有白纸一张


  如今，几乎没有任何计算机系统是从零开始构建的。几乎总会存在一些已有基础，哪怕只是一些松散的指导方针或想法。


  在这个例子中，假设你的公司有一个非常基础的系统，但它已不再能满足你不断增长的用户群体的需求。你的目标是创建一个新的系统，使记录问题及其解决方案的过程对所有相关人员来说都更加容易；然而，要做到这一点，你必须理解用户的需求以及当前在用系统的功能。


  ## 一个破损的系统


  一般来说，帮助台系统的用户可以分为两类：记录问题的人（最终用户）和帮助解决问题的人（技术人员）。根据你所属的用户群体不同，你的需求可能也不同，但总的来说，系统应该帮助最终用户和技术人员就问题或事项进行沟通。


  第一步是了解你的帮助台当前是如何管理的，以及它为何不起作用。与技术人员和最终用户交谈都能提供大量信息，但挑战在于，这些信息通常以对当前系统的抱怨形式呈现。


  询问最终用户会发现，他们的主要抱怨是他们永远不知道自己所提交问题的进度状态。他们可能几天，甚至几周都收不到技术人员的回复，在用户看来，没有回复就意味着没有人处理他们的问题。另一个用户抱怨是帮助台技术人员通常不知道如何联系他们，以提出进一步问题或沟通进展。


  在问题的另一端，技术人员则不堪重负。工单信息保存在一个 Excel 电子表格中。最初，帮助台只有一个人，但现在有好几名技术人员独立工作。在执行日常工作的同时，每个人都需要在分配给他们的工单信息中更新电子表格。访问单个电子表格的人数不断增加导致了问题，因为任何时候都只有一个人能打开并更新该电子表格。技术人员也厌倦了用户不断打电话来询问他们问题状态的最新情况。


  显然，这个系统已经失效。用户和技术人员都对现状不满意。你的工作就是从这些谈话中收集信息，并设计出一个能满足两个用户群体需求的东西。


  ## 你如何修复问题？


  利用目前收集到的信息，你现在可以定义一些初步的需求，并按用户类型进行分解，以便更清晰地了解每个群体需要什么。然后，根据这些需求，你可以开始思考需要创建什么样的数据库设计来支持它们。


  ### 定义需求


  你可以从两个角度来看待需求。最终用户有一套需求，技术人员有另一套。有些需求在两个群体之间是重叠的，而另一些则是某个群体所特有的。


  最终用户应该能够


  *   创建一个概述他们问题的新工单

  *   查看工单的状态和进度


  技术人员应该能够


  *   轻松识别和查看新工单

  *   轻松识别哪些工单是直接分配给自己的

  *   搜索现有工单

  *   代表最终用户创建新工单

  *   将工单分配给其他技术人员

  *   向工单添加详情（评论、信息和附件）

  *   更新工单状态


  尽管你可以考虑得更远，但这些需求已经构成了一个相当完整的帮助台系统的基础。当你以后更清楚用户和公司可能还需要什么时，你随时可以为其添加功能。


  ### 推断数据库设计


  明确了需求之后，你就可以开始推断需要创建哪些数据库对象来存储数据。如果你是数据库设计的新手，这里有一个快速技巧可以帮助你识别需要为之建表的实体：回顾你的需求，寻找代表你需要跟踪的最高层级对象的具体名词。当你找到这些名词时，试着判断它们是否确实处于最高层级，或者它们是否只是某个更大事物的属性。


  如果你按照这个过程来处理你的简要需求规格说明，名词 `用户` 和 `工单` 就凸显出来，成为你想要跟踪的两个主要对象。很容易想把用户分成两个不同的集合——技术人员和最终用户——但用户类型仅仅是用户的一个属性。


  一个较难识别的对象是 `工单详情`。认为它仅仅是 `工单` 的一个属性是完全合理的；然而，线索在于这样一个事实：你无法具体确定任何给定的 `工单` 会有多少条
  `工单详情` 条目。这个数字未知的事实表明，你应该创建一个作为 `工单` 实体子级的表，称为 `工单详情`。这样，你就可以根据需要输入任意多条详情记录。


  因此，你已经识别出了三个主要实体：`用户`、`工单` 和 `工单详情`。你现在需要考虑每个实体的属性以及它们将包含的数据类型。通过回顾需求陈述、与技术人员讨论他们当前跟踪的信息，以及思考在解决问题过程中你希望跟踪哪些类型的信息，你可以识别出你对象的一系列属性。表
  3-1 到 3-3 展示了这些属性。


  表 3-3. `工单详情` 属性


  | 属性名称 | 数据类型 | 注释 |

  | --- | --- | --- |

  | `工单详情 ID` | 数字 | 标识此详情条目的唯一方式 |

  | `工单 ID` | 数字 | 此详情链接到的工单 |

  | `详情` | 文本 | 技术人员输入的任何详情的文本描述 |

  | `创建者` | 文本 | 记录此工单的用户 |

  | `创建时间` | 日期 | 用户创建工单的日期 |


  表 3-2. `工单` 属性


  | 属性名称 | 数据类型 | 注释 |

  | --- | --- | --- |

  | `工单 ID` | 数字 | 标识工单的唯一方式 |

  | `主题` | 文本 | 问题的简短一行陈述 |

  | `描述` | 文本 | 问题的详细描述 |

  | `状态` | 文本 | 工单在处理过程中的状态（`打开`、`待处理`、`已关闭`等） |

  | `创建者` | 文本 | 记录此工单的用户 |

  | `创建时间` | 日期 | 用户创建工单的日期 |

  | `关闭时间` | 日期 | 工单被关闭的日期 |

  | `分配给` | 文本 | 被指派处理此工单的技术人员 |


  表 3-1. `用户` 属性


  | 属性名称 | 数据类型 | 注释 |

  | --- | --- | --- |

  | `用户 ID` | 数字 | 每个用户的唯一 ID |

  | `用户名` | 文本 | 每个用户的登录 ID |

  | `密码` | 文本 | 用于登录系统的密码 |


  尽管尽早尝试做到尽可能详细是好事，但你在这里不必追求完美。当你识别出其他潜在属性时，你随时可以返回并修改或扩展你希望捕获的数据。



  ## 以 APEX 为核心进行系统设计


  由于 APEX 不仅存在于 Oracle 数据库之上，而且其本身就是构建于 Oracle 数据库之中，你可能会认为为 APEX 设计数据库对象与为任何其他使用
  Oracle 作为数据存储的系统进行设计是一样的——在某些方面你确实是对的。然而，在为 APEX 系统进行设计时，肯定有一些你需要理解的要点，这将使你的工作轻松得多。


  你在 APEX 中所做的大部分工作，至少在初始阶段，都是通过一系列向导完成的。如果数据库对象的设计考虑了 APEX 的需求，向导将为你完成更多的工作；因此，你将需要手动进行的微调工作就会大大减少。以下部分将讨论最重要的设计考量因素，以及它们如何影响向导为你所做的工作。


  ### 表定义与用户界面默认设置


  稍后你会更详细地看到的一个领域是用户界面默认设置（`UI 默认设置`）。重要的是要知道，当你使用 `UI 默认设置` 时，某些表属性会被转化为在 APEX 中通用的默认设置。以下是你在表级别可以执行的一些影响更深远的操作，以帮助使
  `UI 默认设置` 更有用：


  *   在表列上添加注释，会将该注释文本作为该项的 `UI 默认设置` 帮助文本。

  *   在数据库级别将列标记为 `NOT NULL`，会触发在 `UI 默认设置` 中设置 `必填` 标志。

  *   `Date` 和 `Timestamp` 数据类型被设置为在输入表单上显示为日期选择器。

  *   列在表中出现的顺序，就是 `UI 默认设置` 在表单或报表上显示它们的默认顺序。

  *   将列定义为 `BLOB` 会设置表单级别的 `UI 默认设置` 以使用 APEX 声明式的 `BLOB` 功能。


  你将在后面的章节中设置和修改 `UI 默认设置`，以便亲眼看到设计决策如何影响它们的设置方式。


  ### APEX 与主键


  APEX 的设计旨在充分利用不超过两列的、基于序列的代理主键。虽然你仍然可以在使用多列自然键的表结构上使用 APEX，但如果你按照 APEX 的偏好进行设计，过程会容易得多，并且你能获得更多的开箱即用功能。


  多年来我使用过许多实现了多列自然键的系统，我也成功地在这些类型的数据结构之上实施了 APEX 系统。然而，我最终不得不手动编写逻辑，而如果这些结构使用的是单列或双列代理主键，APEX
  本可以免费提供这些逻辑。


  在 APEX 4 中，引入了使用 `ROWID` 代替主键的功能，以帮助解决多列主键的问题。此功能通过使用 `ROWID` 作为主键，提供了一种绕过 APEX
  双列主键限制的方法。


  尽管以这种方式使用 `ROWID` 在技术和语法上是正确的，但当从头开始构建 APEX 应用程序时，使用基于数据库序列（Oracle 11g 及以下版本）并由数据库触发器或标识列（Oracle
  12c）分配的单列代理主键仍然被认为是最佳实践。


  以 `TICKET` 表为例，工单的 ID 只是一个用于唯一标识一张工单的任意数据。因此，它很容易符合代理主键的范畴。即使帮助台技术人员当前使用的电子表格已经为工单分配了
  ID，你也可以加载这些值，并让序列从一个高于当前最高 `TICKET ID` 的数值开始计数。`TICKET DETAILS` 表也是如此。即使在 `USER`
  表中，你有一个唯一的、单列的自然键（用户名），实现一个代理主键也是有益的，以便能够利用 APEX 内置的代码路径。


  ### 业务逻辑与用户界面逻辑


  由于 APEX 主要用 PL/SQL 编写，它充分利用了 PL/SQL 提供的一切功能。APEX 开发团队彻底利用了存储的 PL/SQL 程序单元来实现他们的业务逻辑，你可以从他们身上学到重要的一课。


  虽然首先在 APEX 内部将业务逻辑编写为匿名 PL/SQL 块进行原型设计，可以说是一种有效的开发方法，但长期将其留在那里是愚蠢的。通过将其移出到存储程序单元中，你会在多个方面获益。


  一个非常重要的收获是在性能领域。匿名 PL/SQL 块以未编译的 PL/SQL 代码形式存储在 APEX 元数据中。每次需要运行时，它们必须首先从 APEX 元数据中提取、解析、编译，然后运行。如果相关的
  PL/SQL 是每天有数千甚至数十万次点击的页面的一部分，这个过程会带来相当大的开销。如果你将该代码移入数据库中的存储程序单元，则提取、解析和编译步骤都可以跳过，代码将直接运行。


  另一个好处是可重用性。如果相同的逻辑在多个地方使用，它可以简单地被调用，而不是在两个匿名块中重复。因此，对业务逻辑的任何更改只需在一个地方进行。另一个可重用性的好处可能出现在多个系统（其中一些是非
  APEX 系统）需要访问相同的业务逻辑时。当存储在 PL/SQL 程序单元中时，调用系统是 APEX、.NET、Java 还是 PHP 都无关紧要——它们都可以使用相同的逻辑。


  最后，通过将业务逻辑代码移入存储程序单元，你获得了在 APEX 的限制之外使用你最喜欢的 PL/SQL 编码工具来编写、调试和测试这些程序单元的能力。然而，并非所有代码都需要移出到数据库中。管理和操作页面上项目的用户界面逻辑，例如计算、验证和过程，通常最好作为页面的一部分保留。这样的逻辑通常非常页面特定且占用空间很小，将其移出到数据库所带来的收益不值得付出额外的管理开销。作为一个经验法则，控制或操作
  UI 的逻辑最好放在 APEX 中，而实现业务规则或控制数据的逻辑最好放在数据库的存储程序单元中。


  ### 数据库对象的放置位置


  Oracle 数据库非常灵活，允许将来自多个模式的数据授予其他模式并由其他模式查询，甚至可以跨数据库链接进行。APEX 向导的编码旨在当数据库对象驻留在直接分配给工作区的“解析为”模式中时效果最佳。


  APEX 向导大量使用“解析为”模式中对象的数据库元数据。如果你试图针对来自另一个模式的同义词或通过跨数据库链接到另一个数据库来创建应用程序，在许多情况下向导将无法正常工作，因为这些对象的元数据不可用。某些功能将完全无法工作，例如跨数据库链接管理
  `BLOB` 数据。


  通常，在处理异构数据时，报表处理起来要容易得多，因为你可以提供一个有效的查询并创建一个报表。然而，表单会变得困难得多，因为插入、更新和删除逻辑必须手动编码，而不是依赖
  APEX 提供的自动 DML 过程。


  虽然并不总是可行，但最佳实践是在应用程序的“解析为”模式中创建底层数据库对象。这就是你构建帮助台系统的方式。




  ## 将理论转化为实践


  既然你已经对设计系统数据库对象时需要考虑的事项有了合理的理解，就可以将基于文本的表格转化为真实的模式定义了。虽然直接将前面描述的对象和属性拿到 `SQL Workshop`
  中开始输入定义非常容易，但通常建议还是遵循创建实体关系图（ERD）的步骤。通常，执行此操作的过程可以揭示其他设计考量。


  绘制 ERD 的方法有几十种，从纸笔到高端的数据库设计工具都有。不过，我倾向于采取折中方案，使用 Oracle 的 `SQL Developer Data Modeler`，这是
  Oracle 提供的一个功能强大且免费的工具。


  图 3-1 展示了使用 Data Modeler 根据初始定义中的信息创建 ERD 的结果。


  ![A978-1-4842-0466-5_3_Fig1_HTML.gif](img/A978-1-4842-0466-5_3_Fig1_HTML.gif)


  图 3-1. 数据库设计初稿


  图中显示每个表都有一个代理主键来唯一标识记录。如前一节所讨论的，这使得 `APEX` 向导能够更无缝地工作并生成更完整的对象。


  在 `TICKETS` 和 `USERS` 表之间设置了外键，以标识当前分配该工单的人员。此外，在 `USERS` 表的 `USER_NAME` 列上设置了唯一约束，以确保不会意外创建两个具有相同
  `USER_NAME` 的用户。


  虽然这可能不是数据模型的最终版本，但作为起点可能已经足够完整了。使用你的 ERD 工具，你可以继续生成数据库对象创建脚本，然后通过 `APEX SQL Workshop`
  的 `SQL Scripts` 界面上传并运行它们。然而，由于你的数据模型非常小，在下一章中，你将使用 `Object Browser` 工具从头开始创建这些对象。


  ### 总结


  识别你的 `APEX` 应用程序要解决的问题只是成功了一半。良好的数据库设计——特别是考虑到 `APEX` 的设计——是创建成功的 `APEX` 应用程序的关键。花时间确保你有一个坚实的基础，意味着你可以充分利用
  `APEX` 提供的一切，从而减少后续的工作量。


  '
- "# 4. SQL Workshop\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0466-5_​4](http://dx.doi.org/10.1007/978-1-4842-0466-5_4)）包含补充材料，可供授权用户使用。\n\
  \n现在你已经有了基础表应该是什么样子的图形化表示，即实体关系图（ERD），是时候深入研究并开始创建对象了。如前所述，你可以使用 ERD 工具来生成脚本，但为了习惯使用\
  \ `SQL Workshop`，在这里你将从头开始创建这些对象。\n\n注意\n\n对于本章以及接下来的许多章节，你需要下载随书附带的代码。如果还没有这样做，请从本书主页\
  \ [`www.apress.com`](http://www.apress.com/) 下载代码 `.zip` 文件。然后将其解压缩到一个便于检索文件的目录中。\n\
  \n## 使用 Object Browser 创建对象\n\n`SQL Workshop` 的 `Object Browser` 有些名不副实，因为它不仅允许你查看数据库对象，还允许你创建和编辑它们。现在，你将跳过\
  \ `USERS` 表；你将在本书后面的部分再回到它。现在，你将专注于 `TICKETS` 和 `TICKET_DETAILS` 表。从这一点开始，你将遵循逐步说明，其间穿插图示和讨论，说明你试图实现的目标以及为何以这种方式进行。让我们开始吧：\n\
  \n1.  登录到你的 `APEX` 工作区。你将看到工作区的主页，除非你一直在该工作区进行其他工作，否则它可能看起来有点空旷。\n2.  使用主页顶部的标签导航栏，点击标签右侧的箭头，下拉\
  \ `SQL Workshop` 子菜单（参见图 4-1）。\n\n![A978-1-4842-0466-5_4_Fig1_HTML.jpg](img/A978-1-4842-0466-5_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 导航到 Object Browser\n\n3.  点击 `Object Browser` 选项。\n4.  在 `Object Browser`\
  \ 中，点击右上角的“+”图标（代表 `Create` 按钮），并从下拉菜单中选择 `Table`。`Create Table` 向导将打开。第一个屏幕（图 4-2）允许你命名表并输入表中每一列的详细信息。使用\
  \ `Move` 列中的两个箭头，你可以按任何顺序移动列。这会影响它们在表中定义和存储的顺序。如果用完了输入列的空行，可以单击 `Add Column` 按钮向表单添加一个新的空列定义行。\n\
  \n![A978-1-4842-0466-5_4_Fig2_HTML.jpg](img/A978-1-4842-0466-5_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 定义表及其列\n\n5.  根据第 3 章末尾和图 4-2 中的 ERD 指示，输入 `TICKETS` 表的详细信息。确保在表单的 `Not\
  \ Null` 列中勾选适当的复选框。然后单击 `Next`。\n6.  向导的下一步（图 4-3）允许你选择主键的填充方式以及使用哪一列作为主键。主键的四个选项相当直观，但中间的两个可能是最常用的。你是从头开始，因此数据库中没有任何现有的序列定义。选择“`Populate\
  \ from a new sequence`”后，你会告诉 `APEX` 为你创建一个序列，并在表上创建一个数据库触发器，除非该字段已有值，否则该触发器将使用序列中的下一个值填充选定的主键列。在此步骤中，你也有机会为序列命名。在此实例中，你将使用给定的默认名称。\n\
  \n![A978-1-4842-0466-5_4_Fig3_HTML.jpg](img/A978-1-4842-0466-5_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 定义表的主键\n\n7.  选择 `Populated from a new sequence` 单选按钮。屏幕变化后，为 `Primary\
  \ Key` 选择 `TICKET_ID (NUMBER)`。将 `Sequence Name` 保留为默认设置，然后单击 `Next`。\n8.  你还不打算在此表中创建任何外键，因此保留默认值并单击\
  \ `Next`。\n9.  图 4-4 中的 `Constraints` 屏幕允许你向表定义中添加 `Unique` 或 `Check` 约束。你通过在 `Add\
  \ Constraints` 区域定义约束并单击 `Add` 按钮将其添加到列表中来添加约束。在 `Add Constraints` 区域下方有两个 `Help`\
  \ 区域。单击区域标题左侧的箭头可展开帮助信息，显示你在表中定义的列以及如何编写各种检查约束的示例。\n\n![A978-1-4842-0466-5_4_Fig4_HTML.jpg](img/A978-1-4842-0466-5_4_Fig4_HTML.jpg)\n\
  \n图 4-4.\n\n\n\n## 定义约束的步骤\n\n当你点击 `Add` 按钮时，约束的定义就会被添加到页面顶部的约束列表中。你可以为一张给定的表定义任意数量的必需约束。完成后，请继续向导流程。\n\
  \n在此处，我们不创建任何 `唯一` 或 `检查` 约束，因此请保持默认设置并点击 `Next`。\n\n## 完成创建表向导\n\n创建表向导的最后一步让你有机会确认你的请求，并在需要时查看即将执行的代码。如果你需要修改表的定义，可以使用页面底部的按钮回退到之前的向导步骤。要查看代码，请点击\
  \ `SQL` 标签左侧的箭头以展开该区域，如图 4-5 所示。\n\n![A978-1-4842-0466-5_4_Fig5_HTML.jpg](img/A978-1-4842-0466-5_4_Fig5_HTML.jpg)\n\
  图 4-5.\n\n### 查看 SQL 代码\n\n查看创建表向导 `SQL` 区域中展示的文本。点击 `Create Table` 以完成向导。\n\n成功完成向导后，你将返回到对象浏览器，并显示\
  \ `TICKETS` 表的定义。花点时间检查一下表的定义。你应该看到所有你定义的列。如果你点击定义区域顶部的 `Constraints` 标签，你会看到几种不同的约束，包括在\
  \ `TICKET_ID` 上的主键约束。\n\n在对象浏览器的左上角是一个选择列表，用于定义正在浏览的对象类型。使用此选择列表选择 `Sequences`。你会看到\
  \ APEX 创建了一个名为 `TICKETS_SEQ` 的序列，它将用于填充 `TICKET_ID`。\n\n再次使用对象类型选择列表并选择 `Triggers`。你将看到一个名为\
  \ `BI_TICKETS` 的触发器（`BI` 代表“before insert”，即“插入前”）。在左侧选择 `BI_TICKETS` 触发器，然后点击触发器详细信息上方的\
  \ `Code` 标签，将显示该触发器的代码。它会在 `TICKET_ID` 为 `null` 时使用 `TICKETS_SEQ` 序列来填充它。你应该看到类似于以下内容的代码：\n\
  \n```\ncreate or replace trigger \"BI_TICKETS\"\nbefore insert on \"TICKETS\"\n\
  for each row\nbegin\n  if :NEW.\"TICKET_ID\" is null then\n    select \"TICKETS_SEQ\"\
  .nextval into :NEW.\"TICKET_ID\" from sys.dual;\n  end if;\nend;\n```\n\n现在你已经定义了\
  \ `TICKETS` 表，让我们回去创建 `TICKET_DETAILS` 表。这次，你将创建一个指向 `TICKETS` 表的外键，并设置为 `级联删除`。这意味着如果你删除一张票，票的详细信息也会被自动删除。\n\
  \n使用 `创建 (+)` 按钮启动创建表向导。\n\n根据 ERD 和图 4-6 输入表名和列定义，然后点击 `Next`。再次确保勾选了适当的 `Not Null`\
  \ 复选框。\n\n![A978-1-4842-0466-5_4_Fig6_HTML.jpg](img/A978-1-4842-0466-5_4_Fig6_HTML.jpg)\n\
  图 4-6.\n\n### 定义 `TICKET_DETAILS` 表\n\n接下来的步骤故意比之前的更模糊一些。你现在应该已经习惯使用创建表向导了，但如果需要复习，可以查看前面的步骤。\n\
  \n为 `主键` 选择 `从新序列填充`，选择 `TICKET_DETAILS_ID(NUMBER)` 作为 `主键` 列，然后点击 `Next`。\n\n在\
  \ `TICKET_DETAILS` 表中的 `TICKET_ID` 与 `TICKETS` 表中的 `TICKET_ID` 之间添加一个外键。确保 `删除操作`\
  \ 设置为 `级联删除`。你的屏幕应该与图 4-7 中的类似。此外，请确保你从 `引用表` 字段中跳出（按 Tab 键），以便 APEX 显示允许你选择引用列的穿梭控件。\n\
  \n![A978-1-4842-0466-5_4_Fig7_HTML.jpg](img/A978-1-4842-0466-5_4_Fig7_HTML.jpg)\n\
  图 4-7.\n\n### 为 `TICKET_ID` 定义级联删除外键\n\n点击 `Add` 按钮以添加新的外键约束。\n\n点击 `Next`（见图 4-8）。\n\
  \n![A978-1-4842-0466-5_4_Fig8_HTML.jpg](img/A978-1-4842-0466-5_4_Fig8_HTML.jpg)\n\
  图 4-8.\n\n### 在表向导中定义的外键\n\n此表不需要其他约束。点击 `Next`。\n\n查看 `SQL` 语句并点击 `Create Table`\
  \ 以完成向导。\n\n\n\n## 使用数据工作坊实用程序加载数据\n\n现在您已经定义了两个基础表，可以开始将旧数据迁移到您崭新的数据结构中。您可以使用 SQL\
  \ 工作坊的数据工作坊实用程序，以多种方式从 Oracle 模式中加载和卸载数据，如图 4-9 所示。数据加载选项允许您选择文本数据、XML 数据和电子表格数据。\n\
  \n![A978-1-4842-0466-5_4_Fig9_HTML.jpg](img/A978-1-4842-0466-5_4_Fig9_HTML.jpg)\n\
  \n图 4-9. 数据工作坊实用程序提供的数据加载和卸载方法\n\n虽然呈现了三个独立的选项，但文本数据和电子表格数据选项实际上使用的是同一个数据加载向导。无论您选择哪个选项，该向导的操作几乎没有可察觉的区别。\n\
  \n第三个选项（XML 数据）允许您加载以 Oracle 专有的 XML 数据传输格式导出的数据。其格式如下所示：\n\n```\n<ROWSET>\n<ROW>\n\
  <USER_ID>2</USER_ID>\n<USER_NAME>DOUG</USER_NAME>\n<PASSWORD>A69856770A9AB9CBB0479573FCB3E2A5</PASSWORD>\n\
  </ROW>\n<ROW>\n<USER_ID>3</USER_ID>\n<USER_NAME>DAVID</USER_NAME>\n<PASSWORD>E2E89134B8AC6E1FFC14139A6FB2C10B</PASSWORD>\n\
  </ROW>\n</ROWSET>\n```\n\n在您设想的公司中，服务台技术人员一直使用 Microsoft Excel 来跟踪工单，因此您将使用电子表格数据选项加载数据。快速浏览一下技术人员使用的电子表格，您会发现\
  \ Excel 工作簿中有两个独立的工作表：`TICKETS` 和 `TICKET_DETAILS`。\n\n知道您使用的是已存在主键和外键的预置表，您需要小心处理数据加载方式。`TICKET_DETAILS`\
  \ 依赖 `TICKETS` 表作为其父级，因此您需要先加载 `TICKETS` 数据。您的电子表格应如图 4-10 所示。\n\n![A978-1-4842-0466-5_4_Fig10_HTML.jpg](img/A978-1-4842-0466-5_4_Fig10_HTML.jpg)\n\
  \n图 4-10. 来自 Excel 工作簿 TICKETS 标签页的电子表格数据\n\n一旦将 `TICKETS` 数据复制到剪贴板，您可以切换回 APEX\
  \ 并使用数据加载向导将这些数据插入到您的 `TICKETS` 表中。以下是从电子表格加载数据到数据库的步骤：\n\n在您下载的本书支持文件中找到 `helpdesk_spreadsheet.xls`\
  \ 文件，并用 Microsoft Excel 打开它。导航到 `TICKETS` 标签页。请注意，每个工单对应一行数据，还有一行包含各列标题的标题行。选择所有数据（包括列标题）并将其复制到剪贴板。小心不要意外选中那些没有数据的行，因为这可能导致数据加载向导中出现虚假行或错误。切换回您的\
  \ Web 浏览器，使用 SQL 工作坊选项卡上的下拉菜单，在实用程序部分下选择数据工作坊。在数据加载区域，单击电子表格数据。您应该会看到如图 4-11 所示的加载数据对话框。\n\
  \n![A978-1-4842-0466-5_4_Fig11_HTML.jpg](img/A978-1-4842-0466-5_4_Fig11_HTML.jpg)\n\
  \n图 4-11. 准备复制粘贴电子表格数据并将其加载到现有的 `TICKETS` 表中\n\n在向导中，对于“加载到”选择“现有表”，对于“加载自”选择“复制并粘贴”，然后单击下一步。从“表所有者”选择列表中选择您的“解析为”模式。这与您在对象浏览器中创建表的模式相同。为“表名”选择\
  \ TICKETS，如图 4-12 所示，然后单击下一步。这就是您将加载 TICKETS 数据的目标表。\n\n![A978-1-4842-0466-5_4_Fig12_HTML.jpg](img/A978-1-4842-0466-5_4_Fig12_HTML.jpg)\n\
  \n图 4-12. 输入要将数据加载到的表的名称\n\n将您在步骤 2 中复制到剪贴板的数据粘贴到“数据”文本区域。将“分隔符”从逗号更改为 `\\t`，这代表制表符分隔。现在确保“首行包含列名”复选框已勾选，如图\
  \ 4-13 所示。单击下一步。（您可能需要在对话框中滚动才能看到所有选项。）\n\n![A978-1-4842-0466-5_4_Fig13_HTML.jpg](img/A978-1-4842-0466-5_4_Fig13_HTML.jpg)\n\
  \n图 4-13. 将电子表格数据粘贴到“数据”文本框中\n\n当您单击下一步时，APEX 会解析您粘贴的数据，并尽力将电子表格数据第一行中的列名与您要加载数据的目标表的列名进行匹配。在下一个屏幕上，会呈现列映射，以便您检查其准确性，并在必要时进行更改和更正。APEX\
  \ 在将电子表格中定义的列名与表中同名列匹配方面表现得非常好。但是，如果名称不同，它不会尝试猜测，而是将映射留给您完成。如果您向右滚动，应该会看到 APEX 已将电子表格中的所有列名正确匹配到了表列。如果由于某些原因映射不正确，您可以使用图\
  \ 4-14 所示的下拉菜单进行调整。\n\n![A978-1-4842-0466-5_4_Fig14_HTML.jpg](img/A978-1-4842-0466-5_4_Fig14_HTML.jpg)\n\
  \n图 4-14. 手动将数据列映射到表\n\n当您确定所有映射都正确后，单击“加载数据”按钮将数据加载到 `TICKETS` 表中。数据加载后，将显示如图 4-15\
  \ 所示的电子表格存储库屏幕。该屏幕显示有二十行数据已加载到数据库中，加载过程中发生了零个错误。\n\n![A978-1-4842-0466-5_4_Fig15_HTML.jpg](img/A978-1-4842-0466-5_4_Fig15_HTML.jpg)\n\
  \n图 4-15. 数据已加载到 `TICKETS` 表中\n\n如果您导航到对象浏览器，选择 `TICKETS` 表并查看该表中的数据，您可以看到电子表格中的记录已被加载到数据库中。要完成工作，您还需要加载\
  \ `TICKET_DETAILS` 的数据。操作如下：导航到数据工作坊，单击数据加载区域中的电子表格数据链接，然后单击下一步。在向导中，对于“加载到”选择“现有表”，对于“加载自”选择“复制并粘贴”，然后单击下一步。从“表所有者”选择列表中选择您的“解析为”模式。这与您在对象浏览器中创建表的模式相同。为“表名”选择\
  \ TICKET_DETAILS，然后单击下一步。在 Microsoft Excel 中，导航到 `TICKET_DETAILS` 标签页，并将该电子表格中的所有数据（包括列标题）复制到剪贴板。在浏览器中，将您复制到剪贴板的数据粘贴到“数据”文本区域，将“分隔符”更改为\
  \ `\\t`，并确保“首行包含列名”已勾选，然后单击下一步。在“定义列映射”区域检查 APEX 所做的映射。它应该已经正确映射了所有内容。单击“加载数据”以完成数据加载。摘要应说明有二十二条记录已加载到\
  \ `TICKET_DETAILS` 表中，错误数为零。\n\n现在，您已经创建了两个主要表，并加载了遗留数据。仅凭这一点就足以开始开发应用程序了，但您还没有完全准备好开始。\n\
  \n\n\n\n## 创建查找表\n\n看看你刚刚创建的表的定义和数据。它们基本上就是技术人员之前使用的电子表格标签的镜像。如果你仔细检查数据，会发现仍有一些区域的数据规范化程度不够理想。\n\
  \n例如，在 `TICKETS` 表中，`STATUS` 列只有三个值——`OPEN`、`CLOSED` 和 `PENDING`——并且不断重复。该列中的数据值表明它是创建查找表的完美候选。虽然手动使用“创建表向导”创建表并手动迁移数据很诱人，但\
  \ APEX 可以创建一个查找表（包含其自身的序列、触发器和外键），并修改原始表使其指向新的查找表，而无需你编写一行代码。操作方法如下：\n\n导航到“对象浏览器”，在屏幕左侧的“对象列表”中选择\
  \ `TICKETS` 表。你应该会看到类似图 4-16 所示的结果。\n\n![A978-1-4842-0466-5_4_Fig16_HTML.jpg](img/A978-1-4842-0466-5_4_Fig16_HTML.jpg)\n\
  **图 4-16.**\n\n点击“创建查找表”按钮会启动“创建查找表向导”。确保选中了“表”选项卡。选项卡栏下方是一组类似按钮的链接。点击 `Create Lookup\
  \ Table`（创建查找表）按钮，如图 4-16 中鼠标箭头所示；它会启动“创建查找表向导”。向导的第一步（图 4-17）让你选择是仅显示 `VARCHAR`\
  \ 列类型还是所有列类型。默认选择是 `VARCHAR`，因为它最有可能成为查找表的候选。查看向导中显示的列，你会看到其中一个 `VARCHAR` 列就是你的\
  \ `STATUS` 列。\n\n![A978-1-4842-0466-5_4_Fig17_HTML.jpg](img/A978-1-4842-0466-5_4_Fig17_HTML.jpg)\n\
  **图 4-17.**\n\n选择 `STATUS` 列作为查找表的源。选择 `STATUS` 作为你想从中创建查找表的列，然后点击“下一步”。下一步允许你为查找表及其关联的序列命名。APEX\
  \ 已经为新表和序列选择了一个合理的名称，因此接受默认设置并点击“下一步”。向导的最后一个屏幕（图 4-18）提供了有关已做选择和即将执行操作的信息。很容易忽略向导区域正下方的\
  \ SQL 语法链接。点击 SQL 链接以显示 SQL。\n\n![A978-1-4842-0466-5_4_Fig18_HTML.jpg](img/A978-1-4842-0466-5_4_Fig18_HTML.jpg)\n\
  **图 4-18.**\n\n点击 SQL 语法链接会显示即将执行的 SQL。检查 SQL 可以看到创建新查找表、关联序列和触发器、将数据插入表中以及更新原始表中的数据以引用新查找表的步骤。这为你节省了大量工作。点击\
  \ `Create Lookup Table`（创建查找表）完成向导。你将返回到“对象浏览器”。`STATUS_LOOKUP` 表会被高亮显示并展示其详细信息。\n\
  \n使用“对象浏览器”检查向导创建的对象。\n\n## 加载并运行 SQL 脚本\n\nSQL Workshop 的“SQL 脚本”工具允许你创建、上传、管理和运行\
  \ SQL 脚本。这些脚本在很多方面与 `SQL*PLUS` 脚本类似。但是，如果你使用为 `SQL*PLUS` 编写的脚本，APEX 会忽略任何 `SQL*PLUS`\
  \ 特有的语法。\n\n脚本一旦创建或加载，就会移入脚本存储库，并一直保留，直到你决定删除它。在脚本存储库中，你可以决定编辑或运行脚本。当你运行脚本时，APEX\
  \ 会保存结果供你稍后查看。例如，你可以回来检查结果以寻找可能的错误信息。\n\n现在，你将加载并运行一个脚本，该脚本会稍微修改底层数据。原因如下：在实际工作中，你从帮助台团队收到的电子表格中会包含当前的日期和数据；然而，随本书附带的\
  \ `.zip` 文件下载的电子表格中的工单日期很可能不是当前的。如果你按日期搜索，这会导致你必须追溯历史记录来查找工单。此脚本将更新这些日期，使其变为近期的日期。\n\
  \n另一件需要考虑的事情是，你向表中加载了大量已分配了 ID 的数据。由于 ID 是随数据一起加载的，你并没有使用数据库序列。因此，你的序列与数据不同步。你需要删除并重新创建序列，使下一个序列号大于关联表中使用的最大\
  \ ID。\n\n你还需要修改在 `TICKETS` 表上自动创建的“插入前”触发器，使其自动填充 `CREATED_ON` 列。你还将创建几个数据库视图，稍后将用于检索数据，以便为你要创建的一些特定图表和日历进行格式化。\n\
  \n最后，你将创建一个函数，当传入一个状态名称（如 `OPEN`）时，它会返回该状态的 ID。该函数在多个地方使用，因为你无法保证知道给定状态的 ID 值。因此，此函数是获取给定状态关联\
  \ ID 的唯一安全方法。\n\n当你在任何 SQL Workshop 工具中时，可以使用 SQL Workshop 选项卡的下拉菜单作为快速导航到其他工具的方式。图\
  \ 4-19 显示了此菜单并突出了“SQL 脚本”选项。\n\n![A978-1-4842-0466-5_4_Fig19_HTML.jpg](img/A978-1-4842-0466-5_4_Fig19_HTML.jpg)\n\
