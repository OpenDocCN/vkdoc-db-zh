  编辑 `TICKET_ID_DISPLAY` 列，并将“类型”属性设置为“隐藏列”。\n多选 `SUBJECT`、`DESCR`、`CREATED_BY`、`CREATED_ON`、`CLOSED_ON`、`ASSIGNED_TO`\
  \ 和 `STATUS_ID`，并确保它们的 `可排序` 属性设置为“是”。\n多选 `SUBJECT` 和 `DESCR` 列。\n在“属性编辑器”中，将“类型”设置为“文本区域”，`宽度`\
  \ 设置为 `16`，`高度` 设置为 `3`。\n编辑 `ASSIGNED_TO` 列。\n在“属性编辑器”中，将“类型”设置为“选择列表”。\n在“值列表”属性组中，将“类型”设置为“共享组件”，“值列表”设置为\
  \ `TECHS`，“显示额外值”设置为“否”，“显示空值”设置为“是”，并为“空值显示值”输入 `- 选择一名技术人员 -`，如图 7-9 所示。\n\n![A978-1-4842-0466-5_7_Fig9_HTML.jpg](img/A978-1-4842-0466-5_7_Fig9_HTML.jpg)\n\
  图 7-9. 为 `ASSIGNED_TO` 列指定值列表\n\n编辑 `CREATED_BY` 列。\n在“属性编辑器”中，将“类型”设置为“选择列表”。\n\
  在“值列表”部分，将“类型”设置为“共享组件”，“值列表”设置为 `USERS`，“显示额外值”设置为“否”，“显示空值”设置为“是”，并为“空值显示值”输入\
  \ `- 选择一名用户 -`，如图 7-10 所示。\n\n![A978-1-4842-0466-5_7_Fig10_HTML.jpg](img/A978-1-4842-0466-5_7_Fig10_HTML.jpg)\n\
  图 7-10. 为 `CREATED_BY` 列指定值列表属性\n\n编辑 `STATUS_ID` 列。\n在“属性编辑器”中，导航到“默认值”属性组，将“类型”设置为“PL/SQL\
  \ 表达式”，并为“默认值”输入 `get_status ('OPEN')`。\n保存你刚才所做的编辑，然后运行你的应用程序。注意：由于页面 230 是一个模态对话框页面，你需要通过页面\
  \ 200 上创建的按钮来运行它。\n\n### 深入了解幕后\n\n让我们看看表格表单向导为你创建了什么——你的表格表单的内容。编辑页面 230 以检查树状窗格的各个选项卡。它们应该类似于图\
  \ 7-11 所示。\n\n![A978-1-4842-0466-5_7_Fig11_HTML.jpg](img/A978-1-4842-0466-5_7_Fig11_HTML.jpg)\n\
  图 7-11. 页面 230 树状窗格的各个选项卡\n\n在“呈现”选项卡中，APEX 已创建了一个“报表”区域。但你创建的是一个表单，不是吗？尽管名称如此，表格表单实际上是一个启用了特定列级选项并添加了一些进程来处理数据操作的\
  \ SQL 报表。\n\n在“处理”选项卡的“处理”部分，你可以看到两个进程：`ApplyMRU` 和 `ApplyMRD`。这些特殊类型的进程处理 `TICKETS`\
  \ 表上的多行插入和更新（`ApplyMRU`）以及删除（`ApplyMRD`）。这些进程为你处理 `TICKETS` 表上的所有 DML 操作。\n\nAPEX\
  \ 还为多个列创建了验证，这些验证是根据 `TICKETS` 表的列定义以及在 `TICKETS` 表上定义的任何 UI 默认值自动创建的。\n\n在“共享组件”选项卡中，是应用程序默认的常规页面和标签页模板。\n\
  \n如你所见，`ApplyMRU` 和 `ApplyMRD` 进程使得“报表”区域从静态报表区域变成了功能齐全的表格表单。而且，让 APEX 向导为你创建这一切要容易得多！\n\
  \n\n## 交互式报告\n\n你的工单报告通常被称为**经典报告**。它是 APEX 报告的原始样式，在需要简单数据列表且无需交互性的各种情况下仍然具有实际应用价值。然而，包括\
  \ APEX 自身在内的大多数应用程序，现在都采用了**APEX 交互式报告**。\n\n交互式报告功能在 APEX 3.1 中引入，它使得 APEX 能够快速轻松地在你的应用程序中纳入由用户驱动的临时查询能力。交互式报告在\
  \ APEX 5.0 中得到了极大增强。APEX 交互式报告的妙处在于，它们为最终用户提供了强大的临时查询能力，而开发者无需编写任何代码。最终用户可以自定义以下内容：\n\
  \n*   搜索\n*   排序顺序\n*   列\n*   分组中断\n*   高亮显示\n*   计算\n*   聚合\n*   图表\n*   分组依据\n\
  *   闪回时间\n*   保存的报告\n*   订阅（电子邮件通知）\n\n交互式报告在技术上不过是一种报告类型。创建报告向导的步骤与我们已经看到的类似，构建交互式报告所花费的努力与经典报告相同。\n\
  \n经典报告可以轻松转换为交互式报告。然而，无法从交互式报告转换回经典报告。（但为什么你会想要这样做呢？）交互式报告的最终用户功能和整体价值通过一个例子最能说明，因此让我们为你的应用程序添加一个交互式报告。\n\
  \n### 创建交互式报告\n\n交互式报告只需要一个 SQL 查询。APEX 会处理其余部分。你首先需要基于你的服务台数据视图，同时创建一个新页面、菜单项和交互式报告。开始如下：\n\
  \n导航到你的应用程序的 Application Builder 主页。点击屏幕右上角的“Create Page”按钮。选择“Report”并点击“Next”。选择“Interactive\
  \ Report”并点击“Next”。输入`300`作为页面编号，输入`Analysis`作为页面名称和区域名称，并将区域模板设置为“Interactive Report”。将“Breadcrumb”设置为“Breadcrumb”，页面刷新后，点击“Next”。参见图\
  \ 7-12。\n\n![A978-1-4842-0466-5_7_Fig12_HTML.jpg](img/A978-1-4842-0466-5_7_Fig12_HTML.jpg)\n\
  \n图 7-12。指定交互式报告的页面编号、名称和面包屑\n\n将导航首选项设置为“Create a new navigation menu entry”。页面刷新后，应类似图\
  \ 7-13。点击“Next”。\n\n![A978-1-4842-0466-5_7_Fig13_HTML.jpg](img/A978-1-4842-0466-5_7_Fig13_HTML.jpg)\n\
  \n图 7-13。指定交互式报告的导航选项\n\n对于此报告，你将使用`TICKETS_V`视图，而不是直接使用`TICKETS`表。该视图将`TICKETS`表与`STATUS_LOOKUPS`表连接起来，因此你无需稍后在列级别手动操作：将源类型设置为“Table”，然后为“Table\
  \ / View Name”选择`TICKETS_V`（视图）。将“Uniquely Identify Rows by”设置为“Unique Column”，为“Unique\
  \ Column”输入`TICKET_ID`，然后点击“Next”（参见图 7-14）。\n\n![A978-1-4842-0466-5_7_Fig14_HTML.jpg](img/A978-1-4842-0466-5_7_Fig14_HTML.jpg)\n\
  \n图 7-14。为交互式报告输入 SQL SELECT 语句\n\n点击“Create”。\n\n### 运行交互式报告\n\n运行应用程序并导航到“Analysis”菜单项。该页面类似于图\
  \ 7-15 所示。乍一看，交互式报告看起来与其他 APEX 报告没什么不同。然而，交互式报告可以执行标准 APEX 报告无法完成的许多功能。\n\n![A978-1-4842-0466-5_7_Fig15_HTML.jpg](img/A978-1-4842-0466-5_7_Fig15_HTML.jpg)\n\
  \n图 7-15。用于工单分析的交互式报告\n\n交互式报告内置了搜索栏，它是交互式报告的指挥中心。所有最终用户功能都通过位于交互式报告顶部的搜索栏访问，这是报告搜索字段的标准位置。但这远不止是一个搜索字段！搜索栏包括以下部分：\n\
  \n*   查找器下拉菜单：以放大镜图标表示，此功能允许用户选择要筛选的列。\n*   搜索字段：用户可以在其中输入并查找文本字符串的字段。\n*   报告选择列表：所有已保存报告的下拉列表。仅当有多个已保存报告可用时，此列表才可见。我们稍后会讨论已保存报告。\n\
  *   每页行数选择器：行数选项的下拉列表。默认情况下此功能是关闭的，因为它也可以在“Actions”菜单中使用。\n*   “Actions”菜单：为此报告启用的操作菜单——交互式报告的“交互式”选项。\n\
  \n要使用搜索字段，请在其中输入字符串或短语，然后点击“Go”按钮。交互式报告仅列出与你在搜索字段中输入的值匹配的结果。\n\n要使用查找器下拉菜单，请点击搜索栏左侧放大镜图标旁边的箭头。此操作将打开报告列名的菜单。选择一个列名会导致仅在所选列上执行搜索。\n\
  \n要使用报告选择列表，请选择“Report”列表选项之一以导航到所选报告。要使用每页行数选择器，请从下拉列表中选择所需显示的每页行数。\n\n要使用“Actions”菜单，请点击它以展开交互式报告操作菜单，然后选择所需的操作。\n\
  \n### 按报告限制功能\n\n作为开发者，你可以通过在 Page Builder 的报告级别设置选项来控制“Actions”菜单上哪些选项对最终用户可用。你还可以控制搜索栏上包含哪些前述组件。如图\
  \ 7-16 所示的搜索栏选项允许你选择是否包含搜索栏，以及选择搜索栏的哪些元素对用户可见。这在报告级别控制了最终用户的功能。\n\n![A978-1-4842-0466-5_7_Fig16_HTML.jpg](img/A978-1-4842-0466-5_7_Fig16_HTML.jpg)\n\
  \n图 7-16。指定搜索栏选项\n\n如图 7-17 所示的“Actions”菜单切换按钮，允许你指定哪些“Actions”菜单选项对用户可用。其中，“Save\
  \ Report”、“Save Public Report”和“Subscription”选项仅对经过身份验证的用户可用。这是因为 APEX 需要知道经过身份验证的用户信息才能保存报告和发送订阅。\n\
  \n![A978-1-4842-0466-5_7_Fig17_HTML.jpg](img/A978-1-4842-0466-5_7_Fig17_HTML.jpg)\n\
  \n图 7-17。为“Actions”菜单指定选项\n\n### 按列限制功能\n\n特定的交互式报告操作也可以在列级别逐列限制。例如，你可以允许报告被筛选，但不允许特定列用于筛选。通过在\
  \ Page Builder 中编辑报告列，你可以声明性地启用或禁用“Enable Users To”属性组中的隐藏、排序、筛选、高亮、分组中断、聚合、计算、图表、分组依据和枢轴功能，如图\
  \ 7-18 所示，作为各个列的报告属性页面的一部分。\n\n![A978-1-4842-0466-5_7_Fig18_HTML.jpg](img/A978-1-4842-0466-5_7_Fig18_HTML.jpg)\n\
  \n图 7-18。指定单个列的选项\n\n你已经了解了作为开发者在报告级别和列级别可用的交互式报告设置。现在，让我们从最终用户的角度来看看交互式报告功能。以下各节将从最终用户角度探讨如何使用交互式报告的关键功能。\n\
  \n\n### 使用列标题菜单\n\n运行交互式报表时，列标题本身就包含各项功能，这或许是格式化报表单列最快捷的方式。图 7-19 展示了交互式报表的列标题功能。点击列标题会打开一个列级别的菜单，其中包含图标驱动的选项，可用于快速排序、从报表中移除该列、在该列上添加中断、搜索以及筛选。此菜单中的\
  \ `Search Bar`（搜索栏）允许最终用户直接搜索和筛选该列中的值。`Remove Column`（移除列）选项让用户可以快速将该列从报表中移除。若要恢复该列，用户必须选择\
  \ `Actions`（操作）菜单的 `Select Columns`（选择列）选项。`Break`（中断）选项可在该列上添加中断。\n\n![A978-1-4842-0466-5_7_Fig19_HTML.jpg](img/A978-1-4842-0466-5_7_Fig19_HTML.jpg)\n\
  \n图 7-19.\n\n使用列标题菜单\n\n如果您查看 `Filter`（筛选）文本字段下方，您会看到该列中出现的所有不同值的完整列表。点击其中任何一个不同的值都会在该列上创建一个筛选器，仅显示与所选值匹配的行。\n\
  \n### 按列搜索\n\n`Search Bar`（搜索栏）左端的放大镜图标实际上是报表中可见列的列表，这是按特定列或所有列进行快速筛选的便捷方式。所选列即为搜索文本所应用的列。\n\
  \n在搜索字段中输入一个值，会对所有列（默认）或所选列应用筛选器。一旦应用了筛选器，`Control Summary`（控制摘要）区域就会出现一个选项，如图 7-20\
  \ 所示。`Control Summary` 区域是 `Search Bar` 和报表之间的区域。该区域仅当对交互式报表应用了操作时才会显示，用作当前正在应用哪些操作的提示。`Control\
  \ Summary` 区域为每个已应用的操作包含一行。交互式报表的操作是叠加的：后续操作会在现有操作的基础上应用。用户可以通过取消勾选其复选框来禁用某个操作。用户可以通过点击该操作的\
  \ × 图标来移除该操作。点击 `Control Summary` 区域中的某个操作会打开该操作控件进行编辑。\n\n![A978-1-4842-0466-5_7_Fig20_HTML.jpg](img/A978-1-4842-0466-5_7_Fig20_HTML.jpg)\n\
  \n图 7-20.\n\n打开状态下的控制摘要区域\n\n`Control Summary` 面板可以切换打开或关闭。您可以通过点击“关闭”（向下的三角）图标来最小化它。\n\
  \n已关闭的 `Control Summary` 区域，如图 7-21 所示，可以通过点击“打开”（向右的三角）图标来展开。\n\n![A978-1-4842-0466-5_7_Fig21_HTML.jpg](img/A978-1-4842-0466-5_7_Fig21_HTML.jpg)\n\
  \n图 7-21.\n\n关闭状态下的控制摘要区域\n\n`Finder`（查找器）下拉菜单可通过 `Search Bar` 左侧的放大镜图标访问，它显示交互式报表中所有列的列表，如图\
  \ 7-22 所示。选择其中一列会将搜索功能限制在该列。\n\n![A978-1-4842-0466-5_7_Fig22_HTML.jpg](img/A978-1-4842-0466-5_7_Fig22_HTML.jpg)\n\
  \n图 7-22.\n\n查找器下拉菜单\n\n`Actions`（操作）菜单，如图 7-23 所示，提供了一系列列选择、筛选和操作选项。在 `Format`（格式）选项下进一步展开菜单，会揭示用于排序、中断、高亮显示、计算新列、聚合、绘图和分组的其他操作。展开的\
  \ `Format` 菜单如图 7-24 所示。\n\n![A978-1-4842-0466-5_7_Fig24_HTML.jpg](img/A978-1-4842-0466-5_7_Fig24_HTML.jpg)\n\
  \n图 7-24.\n\n从操作菜单中选择格式选项\n\n![A978-1-4842-0466-5_7_Fig23_HTML.jpg](img/A978-1-4842-0466-5_7_Fig23_HTML.jpg)\n\
  \n图 7-23.\n\n操作菜单\n\n### 选择列\n\n`Select Columns`（选择列）操作，如图 7-25 所示，允许用户选择要显示的列并根据需要重新排列列顺序。穿梭框控件允许用户使用中间的箭头轻松添加或移除列，并使用区域右侧的上、下按钮对显示的列进行排序。\n\
  \n![A978-1-4842-0466-5_7_Fig25_HTML.jpg](img/A978-1-4842-0466-5_7_Fig25_HTML.jpg)\n\
  \n图 7-25.\n\n选择列\n\n**注意**\n\n交互式报表的 `Select Columns` 操作始终控制显示哪些列。如果作为开发人员，您修改了\
  \ SQL 查询以向交互式报表添加一列，那么在将该新列从 `Do Not Display`（不显示）区域移动到穿梭框的 `Display in Report`（在报表中显示）区域之前，该新列将不会可见。\n\
  \n### 筛选\n\n`Filter`（筛选）操作允许用户声明式地根据一系列运算符的结果定义筛选器。一个用户可以为每个报表定义多个筛选器。多个筛选器使用逻辑\
  \ `AND`（与）运算符组合。通过 `Search Bar` 定义的筛选器与通过 `Filter` 操作定义的筛选器组合使用。目前，交互式报表中没有提供实现筛选器逻辑\
  \ `OR`（或）的功能。\n\n`Filter` 操作提供了一套完整的筛选操作供选择，如图 7-26 所示。\n\n![A978-1-4842-0466-5_7_Fig26_HTML.jpg](img/A978-1-4842-0466-5_7_Fig26_HTML.jpg)\n\
  \n图 7-26.\n\n对交互式报表应用筛选器\n\n`Filter` 操作支持列筛选器和行筛选器。列筛选器应用于单个列。列筛选器选项会根据筛选列的类型和所选运算符进行交互式变化。例如，如果您选择一个日期列，如\
  \ `Created On`（创建于），然后选择 `Between`（介于）操作，那么 `Expression`（表达式）元素现在会包含两个字段，用于 `Between`\
  \ 子句的 `From`（从）和 `To`（到）。在这种情况下，这些字段各自都有一个日期选择器，便于输入 `Date From`（日期从）和 `To`（到）的值。最终用户还可以使用声明式的\
  \ `Filter` 构建自定义筛选器。\n\n行筛选器允许用户构建基于同一行中多个列的筛选条件。您的 Analysis（分析）报表的一个简单行筛选器可能是筛选出所有在同一天关闭的工单。`Filter`\
  \ 表达式可以通过在 `Columns`（列）和 `Functions/Operators`（函数/运算符）区域中进行选择来声明式构建，如图 7-27 所示，也可以手动输入。在\
  \ `Filter` 表达式中，选定的列由其字母别名表示。\n\n![A978-1-4842-0466-5_7_Fig27_HTML.jpg](img/A978-1-4842-0466-5_7_Fig27_HTML.jpg)\n\
  \n图 7-27.\n\n构建行筛选器\n\n### 排序\n\n`Sort`（排序）界面允许用户指定最多六个列的排序（升序或降序），并指定 `NULL` 值是排在最前还是最后。排序可以在显示的列和非显示的列上执行（参见图\
  \ 7-28）。\n\n![A978-1-4842-0466-5_7_Fig28_HTML.jpg](img/A978-1-4842-0466-5_7_Fig28_HTML.jpg)\n\
  \n图 7-28.\n\n向交互式报表添加排序\n\n### 添加中断\n\n`Control Break`（控制中断）操作允许用户在最多六个列上定义中断格式。用户指定中断列以及中断是禁用还是启用。APEX\
  \ 会自动将声明的中断格式应用于报表。请注意，中断列在 `Control Summary` 中作为单独的条目出现，允许用户单独启用、禁用或移除中断列。图 7-29\
  \ 显示了在 `Assigned To`（分配给）和 `Status`（状态）列上应用了中断的 Analysis（分析）报表。\n\n![A978-1-4842-0466-5_7_Fig29_HTML.jpg](img/A978-1-4842-0466-5_7_Fig29_HTML.jpg)\n\
  \n图 7-29.\n\n应用了控制中断的交互式报表\n\n\n### 高亮显示\n\n高亮操作允许用户查找匹配的数据，并按行或列进行高亮显示，同时可指定高亮的背景色和文本颜色。高亮操作的界面如图\
  \ 7-30 所示。\n\n![A978-1-4842-0466-5_7_Fig30_HTML.jpg](img/A978-1-4842-0466-5_7_Fig30_HTML.jpg)\n\
  \n图 7-30.\n\n使用高亮操作添加高亮\n\n您在筛选操作中看到的相同运算符也适用于此。背景色和文本颜色可以使用十六进制表示法或调色板来指定。高亮操作在控制摘要区域中显示为一个高亮的行。\n\
  \n### 计算列\n\n用户可以通过计算操作界面，基于现有列和函数定义一个新列作为计算结果，该界面如图 7-31 所示。\n\n![A978-1-4842-0466-5_7_Fig31_HTML.jpg](img/A978-1-4842-0466-5_7_Fig31_HTML.jpg)\n\
  \n图 7-31.\n\n使用计算操作计算新的交互式报告列\n\n用户可以以声明方式或手动方式定义计算值。声明式界面与行筛选器界面非常相似。在计算中，列使用其字母别名来指定。此选项功能强大，因为它允许最终用户构建他们所需的任何列。\n\
  \n### 添加聚合\n\n聚合操作对某一列执行以下聚合函数之一：\n\n*   求和\n*   平均值\n*   计数\n*   计数（去重）\n*   最小值\n\
  *   最大值\n*   中位数\n\n所选列的数据类型必须为 `NUMBER`。结果显示在报告的末尾。请注意，只有当对应的列也显示时，聚合结果才会显示。\n\n\
  ### 向交互式报告添加图表\n\n图表操作允许用户以动态 Flash 图表的形式显示报告中的数据，如图 7-32 所示。数据的图表表示会替代表格数据显示。可以通过单击视图图表图标（如图\
  \ 7-32 所示）来切换显示方式。使用“编辑图表”链接可重新进入图表操作界面。\n\n![A978-1-4842-0466-5_7_Fig32_HTML.jpg](img/A978-1-4842-0466-5_7_Fig32_HTML.jpg)\n\
  \n图 7-32.\n\n交互式报告饼图\n\n交互式报告中支持以下图表类型：\n\n*   水平条形图\n*   垂直条形图\n*   饼图\n*   折线图\n\
  \n简单的图表操作界面（如图 7-33 所示）允许用户选择图表类型，并分配标签列、值列、函数以及用于排序的列。\n\n![A978-1-4842-0466-5_7_Fig33_HTML.jpg](img/A978-1-4842-0466-5_7_Fig33_HTML.jpg)\n\
  \n图 7-33.\n\n使用图表操作添加图表\n\n用户在图表操作中无法使用 APEX 图表的全部功能，但轻松显示这些最常见图表类型的能力非常有价值。\n\n\
  ### 分组\n\n分组操作允许用户定义分组，然后在这些分组上应用聚合函数，从而让用户以声明方式定义他们自己的报告数据摘要视图。使用分组操作的示例结果如图 7-34\
  \ 所示。\n\n![A978-1-4842-0466-5_7_Fig34_HTML.jpg](img/A978-1-4842-0466-5_7_Fig34_HTML.jpg)\n\
  \n图 7-34.\n\n使用分组操作进行分组\n\n与图表视图类似，数据的分组视图在搜索栏中心有一个显示图标，如图 7-34 所示。用户可以通过单击相应的显示图标来显示数据视图、分组视图，或者（如果已定义）图表视图。\n\
  \n### 数据透视\n\n数据透视操作允许用户定义报告中数据的数据透视图，使用户能够完全控制要透视的列、要显示为行的列以及要使用可用聚合函数之一进行聚合的列。设置的示例及生成的透视报告如图\
  \ 7-35 所示。\n\n![A978-1-4842-0466-5_7_Fig35_HTML.jpg](img/A978-1-4842-0466-5_7_Fig35_HTML.jpg)\n\
  \n图 7-35.\n\n使用数据透视操作生成的透视报告\n\n### 使用闪回\n\n闪回操作使用户能够将数据库闪回到指定的分钟数，以查看数据在该时间点的样子。该选项基于\
  \ Oracle 数据库的 `FLASHBACK` 功能构建。必须启用数据库 `FLASHBACK`。闪回操作会询问要闪回的分钟数，如图 7-36 所示。\n\n\
  ![A978-1-4842-0466-5_7_Fig36_HTML.jpg](img/A978-1-4842-0466-5_7_Fig36_HTML.jpg)\n\
  \n图 7-36.\n\n使用闪回操作\n\n闪回时间长度是可配置的。最大闪回周期基于数据库中的 `UNDO_RETENTION` 参数，该参数默认设置为三小时。\n\
  \n### 保存交互式报告\n\n保存报告操作允许用户将交互式报告的当前配置保存为命名报告。如果最终用户也是 APEX 开发人员，用户将看到“另存为默认报告设置”选项，如图\
  \ 7-37 所示。\n\n![A978-1-4842-0466-5_7_Fig37_HTML.jpg](img/A978-1-4842-0466-5_7_Fig37_HTML.jpg)\n\
  \n图 7-37.\n\n使用保存报告操作保存交互式报告\n\n作为开发人员，您需要尝试预先创建您认为最广大用户群最广泛使用的报告版本。您可以将当前报告配置保存为主要或替代默认报告设置，如图\
  \ 7-38 所示。主报告是任何新用户登录系统时默认看到的报告。如果存在替代默认报告，用户可以从选择列表中选择它们。\n\n![A978-1-4842-0466-5_7_Fig38_HTML.jpg](img/A978-1-4842-0466-5_7_Fig38_HTML.jpg)\n\
  \n图 7-38.\n\n设置替代的已保存报告\n\n显然，您无法预先创建报告的每一个可能迭代。因此，用户可以将报告另存为私有报告。保存报告后，它会添加到搜索栏的“报告”菜单中，如图\
  \ 7-39 所示。\n\n![A978-1-4842-0466-5_7_Fig39_HTML.jpg](img/A978-1-4842-0466-5_7_Fig39_HTML.jpg)\n\
  \n图 7-39.\n\n使用默认的“报告”菜单\n\n### 重置交互式报告\n\n重置操作（如图 7-40 所示）将当前报告恢复为默认设置。格式或结果集（通过筛选）的任何更改都会丢失，当然，除非该报告是一个已保存的报告。然后可以通过从选择列表中选择报告名称来简单地恢复它。\n\
  \n![A978-1-4842-0466-5_7_Fig40_HTML.jpg](img/A978-1-4842-0466-5_7_Fig40_HTML.jpg)\n\
  \n图 7-40.\n\n将交互式报告重置为其默认设置\n\n### 获取帮助\n\n帮助操作打开一个窗口，其中包含特定于交互式报告的帮助，如图 7-41 所示。无论当前报告是否启用，此帮助窗口中都会显示所有交互式报告选项。\n\
  \n![A978-1-4842-0466-5_7_Fig41_HTML.jpg](img/A978-1-4842-0466-5_7_Fig41_HTML.jpg)\n\
  \n图 7-41.\n\n交互式报告帮助页面\n\n\n\n## 添加订阅\n\n`订阅`操作允许用户按计划将报告以电子邮件形式发送到指定的邮箱地址。用户需要输入电子邮件地址、主题、频率以及开始和结束日期，如图\
  \ 7-42 所示。此操作仅对已认证用户可用。收到的电子邮件是您报告的可搜索`HTML`版本。分组格式和高亮显示不会被保留。\n\n![A978-1-4842-0466-5_7_Fig42_HTML.jpg](img/A978-1-4842-0466-5_7_Fig42_HTML.jpg)\n\
