  ## 授权


  认证回答的是“你是谁？”的问题，而授权则致力于回答“登录后你被允许做什么？” APEX 提供了称为授权方案的应用程序共享组件。这些授权方案可以应用于应用程序内的组件，以告知
  APEX 引擎何时应执行或渲染这些组件。


  当你创建访问控制页面时，APEX 为你创建了三个授权方案，分别对应编辑屏幕中可用的每个角色：`管理员`、`编辑` 和 `查看`。图 9-21 显示了授权方案共享组件报告。


