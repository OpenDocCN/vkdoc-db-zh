  基于数据库架构编写应用程序的一个基本好处是能够强制执行数据质量。`LOVs` 是一种可以映射到不同项类型的 `APEX` 组件，包括 `选择列表`、`多选列表`、`复选框`
  和 `单选组`。这类结构有助于确保通过事务收集的数据是一致的。与列表类似，`APEX` 中也有两种类型的 `LOVs`：


