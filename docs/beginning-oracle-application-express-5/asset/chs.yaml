  \ `jonathan` 的用户时，输入电子邮件地址 `jonathan@example.com`。然后选择排除电子邮件地址的 `@domain` 部分。\n\n\
  您输入的密码对所有用户都是相同的。当他们登录工作区时，系统将要求他们更改密码。\n\n在“创建多个用户”页面上输入所有信息后，单击“下一步”按钮转到如图 14-19\
  \ 所示的确认页面。如果所有信息正确，请单击“创建有效用户”按钮。\n\n![A978-1-4842-0466-5_14_Fig19_HTML.jpg](img/A978-1-4842-0466-5_14_Fig19_HTML.jpg)\n\
  \n图 14-19. 创建多个用户确认页面\n\n#### 将用户组织到组中\n\n您可以将一个 APEX 用户关联到多个组。这些组可用于授权方案中，以授予或拒绝访问应用程序的各个部分。由于组与\
  \ APEX 用户关联，因此仅当您的身份验证方案设置为默认的“Application Express”方案时才能使用组。\n\n需要注意的是，组与单个工作区相关联。如果您拥有包含开发、测试和生产环境的典型设置，则需要在每个工作区中创建相同的组。\n\
  \n#### 创建组\n\n要创建用户组，请单击“任务”区域中的“管理用户组”链接（如图 14-20 所示），然后单击“创建用户组”按钮。输入唯一的组名和描述，如图\
  \ 14-24 所示。组可以嵌套，即包含其他组。当一个组包含其他组时，它们成为父组，因此“继承”其他组的成员身份。\n\n![A978-1-4842-0466-5_14_Fig21_HTML.jpg](img/A978-1-4842-0466-5_14_Fig21_HTML.jpg)\n\
  \n图 14-21. 创建用户组\n\n![A978-1-4842-0466-5_14_Fig20_HTML.jpg](img/A978-1-4842-0466-5_14_Fig20_HTML.jpg)\n\
  \n图 14-20. 从“任务”菜单中选择“管理用户组”选项\n\n#### 将用户分配到组\n\n将用户分配到组的操作不是很直观。单击“管理用户组”区域中的“组分配”只会显示所有用户及其组的报告。要将用户分配到组，您需要编辑该用户（用户\
  \ ➤ 编辑用户）并向下滚动到如图 14-22 所示的“用户组”区域。\n\n![A978-1-4842-0466-5_14_Fig22_HTML.jpg](img/A978-1-4842-0466-5_14_Fig22_HTML.jpg)\n\
  \n图 14-22. 将用户分配到组\n\n### 查看使用情况报告和仪表板\n\n图 14-1 中的“监控活动”和“仪表板”部分提供了许多关于您 APEX 工作区的详细报告和汇总报告。这些报告包含有关开发人员活动和终端用户活动的信息。我们鼓励您探索这些部分的每一个，以查看所有可用的报告。\n\
  \n## 概要\n\nAPEX 提供了多种工具来帮助您管理工作区，并提供有关工作区的统计报告。某些工具可能影响终端用户，因此应谨慎使用。然而，切勿因需要谨慎而放弃使用那些能让您的工作更轻松的工具。深入了解这些工具，对您的知识保持信心，行动前稍作思考。这些都是成功的关键。\n\
  \n## 15. 团队开发\n\n团队开发是管理 APEX 软件开发的出色工具。它内置于 APEX 开发环境中，允许您使用团队日常使用的工具（如交互式报告）来管理您的\
  \ APEX 项目。这消除了对额外项目管理工具的需求。团队开发简单、可扩展且灵活的架构，非常适合管理任何规模的项目。其简洁性适用于希望最小化项目管理开销的小型项目。其可扩展性良好，允许您通过使用其丰富的属性集构建精细的工作分解结构\
  \ (`WBS`) 来管理大型项目。其灵活性让您可以根据组织的软件开发文化进行调整。\n\nAPEX 和团队开发都非常适合敏捷软件开发方法。APEX 的快速应用开发\
  \ (`RAD`) 架构使团队能够快速向业务测试人员和终端用户交付定期发布的版本。团队开发的反馈机制能高效地将终端用户的问题传递回开发团队，以便将适当的更改纳入后续版本并轻松记录。团队开发让本已高效的开发平台\
  \ APEX 变得更加高效。\n\n本章的主要目的是重点介绍团队开发的工作原理。次要目的是说明如何将敏捷软件开发实践与团队开发结合使用，以在满足成本和进度限制的同时交付高质量软件。到本章结束时，您应该对团队开发的内容有很好的理解，并了解一些将其整合到团队开发文化中的想法。\n\
  \n团队开发是在 APEX 4.0 版本中添加的。APEX 团队在开发 APEX 时，甚至在它作为 APEX 模块发布之前，就已经使用了团队开发的一个版本。这种“用工具构建工具”的设计理念是团队开发和\
  \ APEX 成为实用且易于使用的工具的关键原因。\n\n## 团队开发概述\n\n团队开发由 `里程碑`、`功能`、`待办事项`、`缺陷` 和 `反馈` 组成。这些模块辅以少量称为\
  \ `团队操作` 的实用程序，用于管理团队开发环境。实体关系图 (`ERD`) 说明了主要实体之间的关系（参见图 15-1）。\n\n![A978-1-4842-0466-5_15_Fig1_HTML.gif](img/A978-1-4842-0466-5_15_Fig1_HTML.gif)\n\
  图 15-1. 团队开发的简化实体关系图\n\n团队开发的实体包含在单个工作区内。当您在同一工作区内同时管理多个应用程序时，您和您的团队可以使用该工具的交互式报告轻松筛选团队开发的数据。这样，每个利益相关者只能看到与当前任务直接相关的工作。\n\
  \n`里程碑` 是团队开发中的高级计划组件。它们可用于跟踪应用程序的主要和次要版本。不要将里程碑与 `功能` 和 `待办事项` 的截止日期混淆。例如，里程碑可以是产品发布的预定日期，但包含在该版本中的功能可能在里程碑日期之前很久就到期了。如果您采用敏捷软件开发策略，里程碑非常适合定义时间盒或\
  \ `冲刺`。\n\n`功能` 描述了全局概况。在高层次上，它们描述并跟踪客户要求的主要功能块的进度。像 `负责人`、`开始日期`、`截止日期`、`摘要描述`、`优先级`、`状态`\
  \ 等属性易于跟踪。此外，您可以选择跟踪各个组件的状态，例如 `用户界面`、`测试`、`文档`、`全球化`、`安全` 和 `可访问性`。与功能关联的自连接允许您随着开发的进展和设计的细化，将功能进一步细分为子功能。功能的高层次特性使其成为管理状态报告的理想来源。\n\
  \n`待办事项` 用于向个人或团队分配详细工作。跟踪截止日期、时间估算等。与功能类似，待办事项具有自连接功能，允许您在开发过程中获得更多信息时对其进行细分。当单个待办事项需要多个团队成员共同努力时，这非常方便。\n\
  \n当发现缺陷时，它会作为 `缺陷` 被报告。缺陷有自己的生命周期，包含一组丰富的属性，如 `描述`、`解决方案`、`版本`、`负责人`、`上下文` 和 `日期`\
  \ 信息。当您发现一个缺陷实际上是设计缺陷时，团队开发允许您将该缺陷链接到多个功能、里程碑和待办事项，因为修复该缺陷可能需要跨越多个产品发布的扩展时间范围。\n\
  \n`反馈` 是团队开发的主要亮点之一。反馈机制可以在几分钟内安装到应用程序中，并为整个团队提供一个高效、优雅的沟通渠道，用于评论、建议、问题、缺陷报告和响应。一旦安装到应用程序中，反馈机制就会随着应用程序从开发环境升级到测试环境，再升级到生产环境。反馈数据及相关响应通过\
  \ APEX 导入/导出功能在各种环境之间来回复制。这使得开发人员、测试人员和终端用户能够保持紧密联系。反馈机制的另一个关键特点是，它会自动记录所有终端用户一无所知的关键“幕后”数据。应用程序上下文、环境变量，以及最重要的\
  \ `会话状态` 都会被捕获。在诊断问题时，这些数据非常宝贵。\n\n乍一看，团队开发的实体似乎包含大量属性。那么，您是否必须输入所有这些属性才能使用团队开发？不。为了充分利用团队开发，您和您的团队必须规划如何使用它，着眼于以最小的努力有效管理软件开发过程。您可以挑选一小部分适合您软件开发文化的团队开发属性，并仅关注该部分数据。交互式报告可以轻松自定义，只显示对您重要的数据。\n\
  \n## 团队开发界面\n\n团队开发界面与整个 APEX 开发界面保持一致。它广泛使用 `仪表板` 来快速让您了解团队的进展情况。深入查看和更新数据的详细信息相当直接和直观。APEX\
  \ 开发人员在该工具内导航或自定义交互式报告不会有任何困难。经理、测试人员和业务分析师在经过简短培训后也能使用团队开发。\n\n\n## APEX 主页\n\n\
  APEX 主页（参见图 15-2）清楚地表明了 `团队开发` 对 APEX 团队的重要性。APEX 团队本可以轻易地将 `团队开发` 放在主页某个次要链接下。相反，`团队开发`\
  \ 被提升为一个显著的模块，与 `应用程序构建器` 和 `SQL 工作坊` 处于同等重要的地位。\n\n![A978-1-4842-0466-5_15_Fig2_HTML.jpg](img/A978-1-4842-0466-5_15_Fig2_HTML.jpg)\n\
  图 15-2.\n\nAPEX 主页\n\nAPEX 主页突出了其便捷的导航。`新闻与消息` 区域将用于存放工作区级别的消息以及直接来自 `团队开发` 的新闻，其中包含两个链接（`创建新闻项`\
  \ 和 `编辑新闻项`），使用户能够快速更改该区域内容，而无需深入子页面。在右侧的 `仪表板` 区域中，你会看到其中一个指标是 `特性`。右侧的区域通常包含更多可用信息或开发人员可用的任务列表。在整个\
  \ `团队开发` 界面中留意类似的链接；它们非常方便。\n\n## 团队开发主页\n\n`团队开发` 主页（参见图 15-3）有两个用途。首先，它包含指向所有详细实体区域的链接；其次，它为你展示了每个实体的仪表板。你还会看到指向\
  \ `实用工具` 的链接，本章末尾的“`团队开发实用工具`”一节将对此进行讨论。\n\n![A978-1-4842-0466-5_15_Fig3_HTML.jpg](img/A978-1-4842-0466-5_15_Fig3_HTML.jpg)\n\
  图 15-3.\n\n团队开发主页\n\n主要的 `团队开发` 仪表板页面提供了该模块活动的高层概览。用户可以从此处添加新项目，或直接导航到 `团队开发` 各个领域的详细仪表板。\n\
  \n详细仪表板可以根据 `负责人`、`版本` 和 `应用` 的组合进行筛选，具体取决于领域。这些筛选器使用户可以轻松地根据需求自定义页面。例如，经理可以问：“我们做得怎么样？”，而开发人员可以问：“我需要为这个版本做什么？”\
  \ 这个高层筛选区域位于与每个 `团队开发` 实体关联的仪表板页面顶部。筛选字段根据每个实体量身定制。仪表板区域链接到其底层实体。每个标题中都有 `添加` 和\
  \ `编辑` 图标，以及每个项目类型的饼图；点击其中任何一项，你都会被带到相应项目的适当报告页面、`创建` 页面或 `编辑` 页面。\n\n## 通用设计元素\n\
  \n当你深入各个 `团队开发` 实体时，会发现一些通用的设计元素，这些元素帮助你在实体之间快速、直观地导航。图 15-4 突出了这些设计元素。左上角是一组为每个实体定制的选项卡。其中一些选项卡——`仪表板`、`报告`\
  \ 和 `日历`——是所有实体通用的。另一些则是特定实体独有的。\n\n![A978-1-4842-0466-5_15_Fig4_HTML.jpg](img/A978-1-4842-0466-5_15_Fig4_HTML.jpg)\n\
  图 15-4.\n\n所有实体通用的 GUI 设计元素\n\n所有的仪表板页面都包含一个为实体量身定制的 `筛选` 区域。筛选器的选择列表只包含 `团队开发`\
  \ 正在跟踪的实体条目。例如，如果某个 `应用` 没有任何关联的 `特性`，那么该 `应用` 就不会出现在选择列表中。\n\n许多独立的仪表板区域包含链接，这些链接将你带到实体的\
  \ `报告` 页面，并自动在 `详情` 页面的 `交互式报告` 上设置筛选器，以便你只能看到与所选仪表板项目相关的实体记录。一旦你习惯了这种导航策略，就会觉得它极其方便。\n\
  \n## 下钻功能\n\n`日历` 选项卡（参见图 15-5）根据实体记录的到期日显示指向单个实体记录的链接。点击条目的链接会直接带你到所选实体记录的 `编辑`\
  \ 页面。在 `编辑` 页面点击 `取消` 按钮会返回到日历。\n\n![A978-1-4842-0466-5_15_Fig5_HTML.jpg](img/A978-1-4842-0466-5_15_Fig5_HTML.jpg)\n\
  图 15-5.\n\n带有指向编辑页面链接的日历\n\n一些实体选项卡以图形方式显示其数据（参见图 15-6）。点击图表会自动带你进入实体的 `详情` 页面，并将\
  \ `交互式报告` 设置为仅显示图表中所选的数据。\n\n![A978-1-4842-0466-5_15_Fig6_HTML.jpg](img/A978-1-4842-0466-5_15_Fig6_HTML.jpg)\n\
  图 15-6.\n\n图形化数据摘要\n\n## 标签\n\n一个名为 `标签` 的强大组织属性与所有实体相关联。标签是一种自由格式的文本输入，使你能够通过关键字对记录进行分组。这很方便，因为有些记录分组并不适合整齐划一的关系数据模型。例如，你可能希望在所有\
  \ `应用` 中查找包含“穿梭”项的所有 `特性`。通过为这些 `特性` 添加标签“穿梭”，你可以使用 `交互式报告` 的 `搜索` 字段来查找所有包含“穿梭”标签的记录。所有仪表板页面都包含一个区域，显示其各自实体中定义的标签字符串。这使你能够快速发现并纠正拼写错误，从而保持自由格式标签的准确性。\n\
  \n## 克服最初的不适应\n\n起初，`团队开发` 的组织结构、布局和导航可能看起来有点奇怪且不直观。我最初也确实为此困扰过。我最初的感知可能源于我之前使用项目管理工具的经验，那些工具通常左侧是工作分解结构页面，右侧是甘特图。\n\
  \n最初对 `团队开发` 的不适应感，类似于我初次使用 APEX 时的体验。和许多经验丰富的开发人员一样，我来自这样的开发环境：屏幕小部件列在左侧并拖放到屏幕上，X-Y\
  \ 坐标与小部件的高度和宽度一起设置，达到像素级的精度。\n\n当我第一次使用 APEX 时，花了一些时间才习惯 APEX 构建页面的方式。尝试几次后，我学会了喜爱这个产品。我相信你对\
  \ `团队开发` 也会有同样的感受。经过一些实践后，你会发现 `交互式报告` 实际上是甘特图的一个实用替代方案，尤其是在敏捷软件开发环境中，时间盒很短，`交互式报告`\
  \ 中的列表也相应较小。\n\n\n## 里程碑\n\n里程碑用于定义和追踪计划内及一次性事件的日期。表面上看，这是一个简单的概念；然而，它可能是一个令人困惑的领域，因为里程碑的功能与\
  \ `发布` 重叠，并且可能与 `功能特性`、`待办事项` 和 `缺陷` 相关联的截止日期混淆。幸运的是，通过一点规划和组织，可以减轻这种困惑。\n\n一种可用于组织\
  \ `里程碑` 和 `发布` 的策略是为同一个发布事件各创建一个。`里程碑` 包含与该 `发布` 相关的元数据：日期、类型、所有者、描述和标签。`发布` 被定义为一个可配置的\
  \ `值列表`，供所有团队开发实体共享，但它不包含描述性元数据。此外，`发布` 是与 `功能特性`、`待办事项` 和 `缺陷` 相关联的便捷高级筛选器之一。对元数据和高级筛选器的双重需求，正是必须使用\
  \ `里程碑` 和 `发布` 来描述同一事件的原因。值得庆幸的是，这样做的额外开销很低。\n\n对于包含多个应用程序的工作空间，另一个建议是使用其关联应用程序的名称或代码作为前缀来命名\
  \ `功能特性`、`里程碑`、`发布`、`待办事项` 和 `反馈`。在许多情况下，这并非绝对必要，但它可以使某些仪表板更具可读性，因为它们通常只包含实体的名称，而没有任何支持数据。\n\
  \n当然，`里程碑` 也用于定义和追踪软件开发生命周期中的其他事件。重要会议、工具软件升级和需求交付只是几个例子。\n\n`里程碑` 界面包含多个选项卡。`仪表板`\
  \ 和 `日历` 选项卡对所有实体通用，并已在前面讨论过。\n\n### 里程碑报告选项卡\n\n图 15-7 中的 `报告` 选项卡显示了一个交互式报告，其中包含\
  \ `里程碑` 列表。高级筛选器允许您选择全部或仅未来事件，以及单个 `发布`。交互式报告中的 `编辑` 链接将带您进入该 `里程碑` 的编辑页面，该页面包含直观的项目，并在其标签下有文档说明。\n\
  \n![A978-1-4842-0466-5_15_Fig7_HTML.jpg](img/A978-1-4842-0466-5_15_Fig7_HTML.jpg)\n\
  \n图 15-7. `里程碑` 选项卡\n\n### 按所有者选项卡\n\n`按所有者` 选项卡（参见图 15-8）是一个仪表板，它按所有者分类，汇总了单个 `里程碑`\
  \ 与其他团队开发实体之间的关系。了解相关 `功能特性`、`待办事项` 和 `缺陷` 的数量与状态，是一种有效的管理工具，对于控制导向一个 `发布` 的冲刺或时间盒非常有用。\n\
  \n![A978-1-4842-0466-5_15_Fig8_HTML.jpg](img/A978-1-4842-0466-5_15_Fig8_HTML.jpg)\n\
  \n图 15-8. `按所有者的里程碑` 选项卡\n\n### 按里程碑的功能特性选项卡\n\n`按里程碑的功能特性` 选项卡（参见图 15-9）包含一个交互式报告，详细说明了\
  \ `里程碑` 与其关联的 `功能特性` 之间的关系。这主要是一份管理报告。\n\n![A978-1-4842-0466-5_15_Fig9_HTML.jpg](img/A978-1-4842-0466-5_15_Fig9_HTML.jpg)\n\
  \n图 15-9. `按里程碑的功能特性` 选项卡\n\n## 功能特性\n\n`功能特性` 从高层视角描述一个应用程序。它们在开发项目开始时使用，以充分定义范围，从而可以估算成本、进度和资源需求的预算。项目获批并开始工作后，会添加子\
  \ `功能特性` 以更详细地描述、控制和追踪进度。`功能特性` 是管理状态报告的核心。\n\n`功能特性` 详情页包含多个选项卡。`仪表板`、`日历`、`关注区域`\
  \ 和 `所有者` 选项卡在此不作讨论，因为它们或其等效项对所有实体通用，其特性已在前面提及。接下来重点介绍 `报告`、`历史记录` 和 `进度日志` 选项卡。\n\
  \n### 功能特性报告选项卡\n\n`报告` 选项卡（参见图 15-10）包含一个交互式报告，该报告进而链接到单个 `功能特性` 记录的编辑页面。由于数据网格是一个交互式报告，每个用户都可以根据自己的需求定制它。您可以从大约\
  \ 50 个属性中选择列，按喜好排序，甚至可以将相关记录分组在一起。交互式报告在 第 6 章 中有详细讨论。\n\n![A978-1-4842-0466-5_15_Fig10_HTML.jpg](img/A978-1-4842-0466-5_15_Fig10_HTML.jpg)\n\
  \n图 15-10. `功能特性` 交互式报告\n\n当您要输入多个相关的 `功能特性` 时，`复制` 链接非常有用。例如，如果您要输入 10 或 20 个属于同一个应用程序的\
  \ `功能特性`，您可能预期许多数据属性在每条记录上都会重复。`复制` 链接会创建一个新的 `功能特性`，作为交互式报告中现有记录的精确副本。只有名称会被更改。新\
  \ `功能特性` 创建后，您可以快速编辑它，并更改该记录特有的属性。\n\n`编辑` 链接将带您进入 `功能特性` 编辑页面（参见图 15-11）。您可以轻松地自行浏览各个属性；它们的定义通常是自明的，并通过点击属性标签进行记录。然而，`功能特性`\
  \ 编辑页面上有一些区域需要更多解释：\n*   `用户界面`、`测试`、`文档`、`全球化`、`安全` 和 `无障碍性` 区域：这些区域用于追踪与 `功能特性`\
  \ 相关的子生命周期。例如，如果一个独立团队负责文档，他们的进度可以与主 `功能特性` 分开追踪（参见图 15-12）。如果不需要追踪文档工作，则可以通过在团队开发设置区域中关闭它，将\
  \ `文档` 区域从 `功能特性` 编辑页面中排除。请参阅本章后面的“团队开发设置”小节。\n    ![A978-1-4842-0466-5_15_Fig12_HTML.jpg](img/A978-1-4842-0466-5_15_Fig12_HTML.jpg)\n\
  \    图 15-12. `功能特性文档` 区域\n    ![A978-1-4842-0466-5_15_Fig11_HTML.jpg](img/A978-1-4842-0466-5_15_Fig11_HTML.jpg)\n\
  \    图 15-11. `功能特性` 编辑页面\n*   可配置的值列表 (`LOV`)：有些 `LOV`，如 `状态`，由 APEX 团队控制。其他，如\
  \ `所有者`，由开发团队控制。这些列表是在原地维护的，而不是在一个单独的维护区域中维护开发人员可配置的 `LOV`。例如，要添加一个新所有者，您在 `新所有者`\
  \ 项目中输入适当的名称，然后单击 `应用更改` 按钮，该名称就会被添加到 `LOV` 中。遗憾的是，目前没有简单安全的方法来编辑这些可配置的 `LOV`；我们希望在未来版本的\
  \ APEX 中能增加此功能。\n\n### 历史记录选项卡\n\n`历史记录` 选项卡（参见图 15-13）提供了对所有 `功能特性` 所有更改的详细审计跟踪。该选项卡显示了一个交互式报告，包含有关\
  \ `功能特性`、列名、旧值、新值、进行更改的用户以及更改时间的信息。您可以出于质量保证目的查看 `历史记录` 选项卡上的报告，或者在发生合同纠纷时作为证据来源。\n\
  \n![A978-1-4842-0466-5_15_Fig13_HTML.jpg](img/A978-1-4842-0466-5_15_Fig13_HTML.jpg)\n\
  \n图 15-13. `功能特性历史记录` 选项卡\n\n\n### 进度日志选项卡\n\n图 15-14 中的“进度日志”选项卡，实际上就是一个日志。相关方可以在“特性编辑”页面，随时在进度日志中输入自由格式的文本。进度日志可作为开发团队的沟通渠道，用于记录新想法、提醒、灵光一现、问题，以及其他任何需要记住的内容。\n\
  \n![A978-1-4842-0466-5_15_Fig14_HTML.jpg](img/A978-1-4842-0466-5_15_Fig14_HTML.jpg)\n\
  \n图 15-14. 特性进度日志选项卡\n\n## 待办事项\n\n待办事项是团队开发模块的核心。团队开发将“待办事项”用作名词。一个待办事项是分配给个人或团队并附有截止日期的具体任务。简而言之，一个待办事项描述了任务的内容、负责人和时间。\n\
  \n待办事项可以细分为许多子任务和孙任务。这个分解过程可以一直进行，直到收益递减。一个经验法则是，子任务的层级数量应足以有效地控制手头的任务。多少层级是合适的，当然取决于团队的文化。此外，在敏捷软件开发团队中，由于团队成员之间每日的面对面沟通，子任务层级通常保持得比较浅。\n\
  \n待办事项模块包含四个选项卡：仪表板、待办事项、日历和进度日志。你会发现使用这些选项卡既简单又直观。\n\n一个便捷的导航特性将开发环境直接链接到待办事项模块。当一个待办事项的上下文同时设置为某个应用程序和该应用程序中的特定页码时，一个待办事项计数会出现在“团队开发”下拉菜单中（参见图\
  \ 15-15）。在下拉菜单中，你可以看到待办事项、缺陷、反馈和特性的计数。当你点击待办事项计数时，该链接会直接带你到待办事项报告页面，该页面的交互式报告过滤器已设置为仅列出与开发页面关联的未完成待办事项（参见图\
  \ 15-16）。然后，开发者可以快速选择一个待办事项，查看需要做什么，然后返回开发页面完成待办任务。这种高效的导航策略也适用于缺陷和反馈。\n\n![A978-1-4842-0466-5_15_Fig16_HTML.jpg](img/A978-1-4842-0466-5_15_Fig16_HTML.jpg)\n\
  \n图 15-16. 按应用程序的开发计数链接筛选的待办事项页面\n\n![A978-1-4842-0466-5_15_Fig15_HTML.jpg](img/A978-1-4842-0466-5_15_Fig15_HTML.jpg)\n\
  \n图 15-15. 直接链接到待办事项模块的开发页面\n\n## 缺陷\n\n在软件开发领域，缺陷是生活的一部分。我们都希望缺陷在产品发布给最终用户之前，在单元测试和系统测试周期中被发现并修复。令人高兴的是，这通常是事实，但需注意有少量缺陷会漏进生产环境。团队开发的缺陷模块是一个实用的环境，用于跟踪开发、测试和生产环境中的简单缺陷和疑难缺陷。\n\
  \n简单缺陷通常由编码错误或程序员对需求的误解引起。症状明显，根本原因易于查找，修复也几乎微不足道；例如，将加号改为减号，或在代码中重新组织一个 `IF` 语句。简单缺陷通常在产品开发周期的早期被发现，并且通常由程序员或测试人员捕获。然而，简单缺陷必须被记录和报告，以便改进编码过程；大量的简单缺陷最终可能会带来惊人的成本。\n\
  \n疑难缺陷，顾名思义，很难处理。它们可能由系统中任何地方的设计缺陷、软件系统之间的微妙交互、软件与硬件之间的微妙交互，以及用户与图形用户界面之间不顺畅的交互引起。疑难缺陷可能有它们自己的生命周期，修复过程可能会跨越几个产品版本。团队开发的缺陷和待办事项模块可以一起使用，以跟踪疑难缺陷的解决过程，即使它横跨多个产品版本。\n\
  \n缺陷模块突显了你如何利用团队开发的简洁性、可扩展性和灵活性。简洁性使得跟踪简单缺陷几乎微不足道。发现缺陷后，关于该缺陷的所有信息（包括内容、负责人和时间数据）都记录在团队开发的缺陷模块中。简单缺陷可以独立存在，或者你可以根据团队开发环境的组织方式，将它们与一个待办事项关联起来。\n\
  \n当你处理那些可能需要较长时间修复，并且可能需要多个开发者或团队共同努力的疑难缺陷时，可扩展性和灵活性就发挥作用了。团队开发可以通过将一个疑难缺陷链接到一个待办事项来处理这种情况（参见图\
  \ 15-17）。然后，链接的待办事项被设置为多个子待办事项的父项，这些子待办事项用于跟踪修复所需的任务。\n\n![A978-1-4842-0466-5_15_Fig17_HTML.gif](img/A978-1-4842-0466-5_15_Fig17_HTML.gif)\n\
  \n图 15-17. 将疑难缺陷链接到父待办事项\n\n## 反馈\n\n团队开发的反馈模块是 APEX 的一个“亮点”。即使你的团队选择不使用团队开发来管理其软件开发工作，你至少应该考虑使用反馈模块。反馈模块提供了一个高性价比的渠道，最终用户、测试团队成员，甚至开发者本身都可以通过这个渠道直接向业务分析师和开发者发送建议、评论和错误报告。对反馈的回复可以选择性地传达给触发反馈的人员。并且可以从所有三种典型环境获取反馈：生产环境、测试环境和开发环境。\n\
  \n注意\n\n反馈模块之所以如此高性价比，是因为其成本效益比几乎趋近于零。在 APEX 应用程序中设置反馈只需要几分钟，却能给你带来巨大的好处。\n\n\n\
  ### 配置反馈机制\n\n您可以通过在应用中创建一个新页面来开始配置反馈机制。“创建页面”向导包含一个“反馈页面”选项（见图 15-18）。选择此选项，然后单击“下一步”按钮。\n\
  \n![A978-1-4842-0466-5_15_Fig18_HTML.jpg](img/A978-1-4842-0466-5_15_Fig18_HTML.jpg)\n\
  图 15-18. 创建页面向导中的反馈页面选项\n\n向导的下一页用于设置反馈页面的详细信息（见图 15-19）。您需要输入页面编号和页面名称，然后选择一个页面模板、表单区域模板和标签模板。您还可以以声明式方式在应用的全局导航栏上创建一个反馈链接。在大多数情况下，默认设置就能很好地工作。\n\
  \n![A978-1-4842-0466-5_15_Fig19_HTML.jpg](img/A978-1-4842-0466-5_15_Fig19_HTML.jpg)\n\
  图 15-19. 在创建页面向导中设置反馈页面\n\n然而，有一个属性需要稍作解释，因为其好处并非显而易见。“额外属性”字段允许您向反馈页面添加最多八个自定义字段。这些字段有时被称为弹性字段。这些字段可用于在用户提交反馈时提示最终用户提供额外信息。例如，一个公共的\
  \ APEX 网站不需要登录；因此，无法自动捕获用户身份。额外属性可用于捕获用户的姓名和电子邮件，以便将反馈响应发送给他们。\n\n单击“创建”按钮，然后运行该应用。您现在可以在导航栏中看到“反馈”链接（见图\
  \ 15-20）。如果您的设计中无法使用默认的反馈链接，您可以将其移动到应用中的任意位置。该链接使用标准的 APEX `f?p` 语法。\n\n![A978-1-4842-0466-5_15_Fig20_HTML.jpg](img/A978-1-4842-0466-5_15_Fig20_HTML.jpg)\n\
  图 15-20. 带有反馈链接的应用\n\n### 完善反馈页面\n\n当您点击反馈链接时，会显示反馈弹出页面（见图 15-21）。如您所见，该页面需要稍作完善。因为这是一个标准的\
  \ APEX 页面，您可以通过单击“编辑页面”按钮导航到页面设计器，在一两分钟内完成完善工作。\n\n![A978-1-4842-0466-5_15_Fig21_HTML.jpg](img/A978-1-4842-0466-5_15_Fig21_HTML.jpg)\n\
  图 15-21. 未经完善的反馈页面\n\n在这个例子中，让我们将 Attribute1、Attribute2 和 Attribute3 更改为姓名、部门和电子邮件。当您在“创建页面”向导的“额外属性”字段中选择`3`时，APEX\
  \ 会自动将这些项目添加到反馈页面（见图 15-22）。\n\n![A978-1-4842-0466-5_15_Fig22_HTML.jpg](img/A978-1-4842-0466-5_15_Fig22_HTML.jpg)\n\
  图 15-22. 反馈页面上的额外属性\n\n配置额外属性是一个两步过程。首先，重命名这些项目以描述其数据，将项目类型从`Textarea`更改适合数据的类型，并将标签重命名为对最终用户有意义的名称（见图\
  \ 15-23）。\n\n![A978-1-4842-0466-5_15_Fig23_HTML.jpg](img/A978-1-4842-0466-5_15_Fig23_HTML.jpg)\n\
  图 15-23. 重新配置额外属性\n\n其次，在树形面板的“页面”选项卡中（见图 15-24），您必须编辑“提交反馈”流程，使 API 调用参数与重命名和重新标记的额外属性相匹配（见图\
  \ 15-25）。\n\n![A978-1-4842-0466-5_15_Fig25_HTML.jpg](img/A978-1-4842-0466-5_15_Fig25_HTML.jpg)\n\
  图 15-25. “提交反馈”流程源中的反馈页面处理更改\n\n![A978-1-4842-0466-5_15_Fig24_HTML.jpg](img/A978-1-4842-0466-5_15_Fig24_HTML.jpg)\n\
  图 15-24. 反馈页面的处理区域\n\n完成更改并重新运行应用后，您将看到最终完成的反馈页面（见图 15-26）。在页面中输入一些反馈内容，然后单击“提交反馈”按钮。接着，继续下一节，学习如何查看您和他人输入的反馈。\n\
  \n![A978-1-4842-0466-5_15_Fig26_HTML.jpg](img/A978-1-4842-0466-5_15_Fig26_HTML.jpg)\n\
  图 15-26. 包含三个额外属性的最终反馈页面\n\n### 查看反馈\n\n您可以从“团队开发”页面查看应用的所有反馈。导航到该页面，然后单击“反馈”选项卡。您应该会看到类似于图\
  \ 15-27 的结果。\n\n![A978-1-4842-0466-5_15_Fig27_HTML.jpg](img/A978-1-4842-0466-5_15_Fig27_HTML.jpg)\n\
  图 15-27. 反馈条目\n\n当您深入查看单个反馈记录时，您会发现大量数据和信息，这些内容可以让您作为开发人员的工作轻松许多。“反馈”区域包含每条反馈记录的只读描述。“处置”区域用于跟踪反馈状态、标签、开发者评论和公开响应。此外，还有三个按钮：“记录为缺陷”、“记录为待办事项”和“记录为功能”。这些按钮会创建一个新的团队开发实体，并将数据从反馈记录复制到新实体，从而节省时间并确保准确性。“跟进”区域就像日记；它是随着时间的推移，在处理反馈过程中添加的备注列表。这在多人需要在采取行动前审阅反馈时非常方便。您添加到反馈页面的额外属性会显示在“附加属性”区域。其余区域显示只读数据，描述应用上下文、运行时环境（浏览器类型和版本）和整个会话状态。如果报告了一个缺陷，开发者就拥有了重现该缺陷所需的所有信息，这是一个宝贵的特性。\n\
  \n### 响应反馈\n\n反馈机制包含一个响应表。原则上，响应应发送给发起反馈的用户。然而，目前没有简单且声明式的机制可以让您向用户发送响应。如果您想向用户发送响应，首先需要解决一些设计问题。例如，您是希望向所有用户广播响应，还是向个别用户发送个别响应？您想使用电子邮件还是创建报表？您希望向团队发送响应吗？您希望基于反馈分类方案来路由响应吗？\n\
  \n在设计好响应策略后，您就可以通过编写一些 PL/SQL 代码并访问公开所有团队开发数据的 APEX 视图，来构建一个满足需求的工具。然而，构建此工具的细节超出了本书的范围。\n\
  \n### 工作区之间的通信\n\n团队开发是工作区的一个属性。许多专业机构会为生产、测试和开发环境维护多个工作区。这意味着，如果最终用户输入了一条反馈记录，该记录将驻留在生产工作区中，而开发者无法看到它。这种情况可以通过使用\
  \ APEX 现有的导出/导入功能轻松解决。APEX 4.0 及以上版本已将反馈添加到可导入和导出到工作区或从工作区导出的实体列表中。这使得导出生产反馈并将其导入测试环境成为可能，业务分析师可以在那里对其进行评估。如果需要，反馈可以从测试环境导出并导入到开发环境，开发者可以在那里进行评估，然后将其记录为缺陷、待办事项或功能。\n\
  \n\n## 团队开发工具\n\n团队开发工具（参见图 15-28）是一组用于帮助您管理团队开发环境的杂项工具集。各个工具的链接位于团队开发主页的右侧。`所有工具`链接会带您到一个页面，该页面提供了所有工具的菜单及每个工具的简短描述。点击各个工具链接可直接进入相应工具。\n\
  \n![A978-1-4842-0466-5_15_Fig28_HTML.jpg](img/A978-1-4842-0466-5_15_Fig28_HTML.jpg)\n\
  \n图 15-28. 团队开发工具\n\n### 团队开发设置\n\n一些对整个工作区生效的全局默认设置在团队开发设置页面（参见图 15-29）中进行配置。`启用跟踪属性`区域用于开启/关闭跟踪与用户界面、测试、文档、全球化、安全和辅助功能相关详细工作的功能区域。当您将这些属性设置为`否`时，功能特性详情页面上对应的区域将不会显示。\n\
  \n![A978-1-4842-0466-5_15_Fig29_HTML.jpg](img/A978-1-4842-0466-5_15_Fig29_HTML.jpg)\n\
  \n图 15-29. 团队开发设置页面\n\n### 发布摘要\n\n发布摘要页面是一个管理报告。它按发布名称组织，可以按开发者和发布名称进行筛选。图 15-30\
  \ 展示了这份综合报告的一小部分。\n\n![A978-1-4842-0466-5_15_Fig30_HTML.jpg](img/A978-1-4842-0466-5_15_Fig30_HTML.jpg)\n\
  \n图 15-30. 发布摘要页面\n\n### 启用文件\n\n`启用文件`链接是通向工作区首选项屏幕的快捷方式。在这里，您可以设置`启用文件仓库`的值，该设置指定是否可以向团队开发上传文件。选择`是`将创建一个本地的`APEX$`表来存储文件。此功能仅在`实例管理员`也在实例级别启用它时才可用。\n\
  \n### 功能工具\n\n功能工具（参见图 15-31）用于对团队开发数据进行批量更新。您可以为未分配的功能特性分配里程碑、设置功能特性截止日期、更改里程碑，以及推动开放功能特性的截止日期。在此之前，强烈建议您做好完整的备份。\n\
  \n![A978-1-4842-0466-5_15_Fig31_HTML.jpg](img/A978-1-4842-0466-5_15_Fig31_HTML.jpg)\n\
  \n图 15-31. 功能工具\n\n### 管理焦点区域\n\n管理焦点区域工具允许您查看已创建的焦点区域、每个焦点区域的功能特性数量、不同负责人，以及给定焦点区域中功能特性的最后编辑情况。通过编辑，您还可以重命名一个焦点区域。\n\
  \n### 更新负责人\n\n更新负责人工具允许您将各种组件从一个负责人重新分配给另一个负责人。您可以对所有版本或特定版本执行此操作，还可以选择要重新分配的组件。参见图\
  \ 15-32。\n\n![A978-1-4842-0466-5_15_Fig32_HTML.jpg](img/A978-1-4842-0466-5_15_Fig32_HTML.jpg)\n\
  \n图 15-32. 更新各种组件的负责人\n\n### 查看文件\n\n如果已在工作区级别启用该功能，开发者可以将文件附加到功能特性、待办事项或缺陷。`查看文件`报告将列出所有已上传的文件及其一些元数据。您也可以从此报告下载文件。如果尚未启用此功能，链接将显示为“启用文件”。\n\
  \n### 清除数据\n\n此工具允许您清除选定组件类型的数据。这将删除所选类型的所有条目，且无法恢复。如果您要开始一个全新的开发周期，或者需要从团队开发中清除测试数据，这将非常有用。\n\
  \n### 管理新闻\n\n在 APEX 主页和团队开发主页上都有一个包含新闻消息的区域。您可以通过点击`管理新闻`链接或点击新闻区域中的加号图标来添加新闻项（参见图\
  \ 15-33）。\n\n![A978-1-4842-0466-5_15_Fig33_HTML.jpg](img/A978-1-4842-0466-5_15_Fig33_HTML.jpg)\n\
  \n图 15-33. 管理新闻部分\n\n当团队成员不在同一地点时，新闻区域对于广播开发新闻非常方便；例如，一个版本成功或失败地提升到测试环境。坐在一起并有每日状态会议的团队可能不会使用此区域。\n\
  \n### 管理链接\n\n管理链接功能是一个简单的链接列表，链接指向文档、其他系统和网页，您可以轻松地将其定义为任何有效的 URL（参见图 15-34）。这些链接让开发者能够快速导航到开发团队批准的\
  \ URL。整个团队因此可以共享共同的文档，例如 SQL 或 PL/SQL 参考，这有助于团队遵循共同的开发风格和标准。这反过来又有助于鼓励一致性，从而极大地改善软件开发过程。\n\
  \n![A978-1-4842-0466-5_15_Fig34_HTML.jpg](img/A978-1-4842-0466-5_15_Fig34_HTML.jpg)\n\
  \n图 15-34. 管理链接功能\n\n## 团队开发的用户角色\n\n团队开发的访问权限对于开发团队内部和外部的利益相关者都很有用。团队负责人和高级开发者应该拥有团队开发的访问权限。初级开发者的访问权限取决于团队文化和信任水平。开发团队外部感兴趣的利益相关者可能包括项目经理、测试团队和业务分析师。\n\
  \n对 APEX 开发环境的访问在 APEX 管理区域的“管理用户和组”菜单下进行控制。此区域维护着 APEX 用户列表，规定每个用户的访问级别（参见图 15-35）。外部利益相关者设置为没有管理员和开发者权限；但是，`团队开发访问`字段设置为`是`。当他们登录\
  \ APEX 开发环境时，他们只能看到团队开发区域，看不到其他任何内容。目前此方案只有一个问题：外部利益相关者无法在应用程序下拉列表中看到应用程序。\n\n![A978-1-4842-0466-5_15_Fig35_HTML.jpg](img/A978-1-4842-0466-5_15_Fig35_HTML.jpg)\n\
  \n图 15-35. 项目经理、测试人员或业务分析师的账户权限\n\n## 总结\n\n团队开发是一个为在 APEX 开发环境中工作而量身定制的软件开发工具。五个主要实体（里程碑、功能特性、待办事项、缺陷和反馈）在一个简单、可扩展且灵活的框架中协同工作。采用敏捷软件开发方法的团队会发现\
  \ APEX 的团队开发工具与其文化非常契合。\n\n\n"
- '# 16. 动态操作


  电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-0466-5_​16](http://dx.doi.org/10.1007/978-1-4842-0466-5_16)）包含补充材料，可供授权用户使用。


  近年来 APEX 版本引入的最令人兴奋的功能之一是动态操作，它提供了以声明方式定义复杂客户端行为的能力，例如验证、高亮显示、警报、设置页面值等，而无需手工编写大量
  JavaScript 代码。


  自引入以来，动态操作已得到显著扩展，提供了更强大的声明式灵活性和功能性。这有助于开发者摆脱传统的服务器端脚本模型，通过在浏览器上执行动态操作逻辑，而不是产生到服务器的往返请求。


  动态操作与手动编写的 JavaScript 一样是事件驱动的。但 APEX 使用提供的声明式信息来生成所需的 JavaScript 代码，并在运行时实现。本章将研究和实现一系列不同的动态操作，以便您感受它们能实现什么。


  ## 动态操作的优势


  使用声明式动态操作而非手工编码 JavaScript 的一个主要优势是，动态操作能够理解并利用 APEX 核心对象，如区域（regions）和项（items），从而便于引用和操作。使用声明式逻辑的另一个好处是，当您选择升级到
  APEX 的下一个版本时，围绕动态操作的框架将确保任何生成的代码都与新版本的 APEX 兼容。


  但除了 APEX 声明式本质的基础优势之外，动态操作让您能够编写非常复杂的客户端操作，而无需学习一门全新的技术来实现。事实上，您很可能仅使用动态操作向导、SQL
  和 PL/SQL 就能完成超过 80%所需的功能编码。


  然而，由于 JavaScript 是编写浏览器交互性的事实标准，您也很可能在某个时候被迫学习一点 JavaScript。学习 JavaScript 超出了本书的范围。毕竟，您购买本书是为了学习
  APEX。但如果您确实想了解更多关于 JavaScript 的知识，Apress 有几本关于该主题的优秀书籍。


  ## 解构动态操作


  在最初的形式中，动态操作分为两类：标准（standard）和高级（advanced）。这两类之间的唯一真正区别是相关向导允许您实现什么。在底层，两种动态操作类型是相同的，一旦您离开向导，所有选项都对您开放。较新版本的
  APEX（包括 5.0）已经摒弃了这种人为的划分。动态操作的定义可以分解为以下组件：


  *   **标识**：定义动态操作的名称及其执行顺序。

  *   **时机**：定义操作何时触发。您可以选择事件、将参与触发操作的一个或多个对象，以及适用于该事件的任何条件。

  *   **操作**：动态操作可以包含 True 和 False 动作集。如果为所选对象定义的事件发生，并且任何应用的条件评估为`TRUE`，则执行 True
  动作集。如果为所选对象定义的事件发生，并且任何应用的条件评估为`FALSE`，则执行 False 动作集。

  *   **受影响元素**：识别页面上哪些对象受动态操作影响。


  与 APEX 的其他部分一样，动态操作支持条件、授权和构建选项功能。


  ## Help Desk 应用程序中的动态操作


  动态操作的核心在于让您应用程序的用户界面更便于用户使用。在以下练习中，您将实现复杂度递增的动态操作，以使应用程序的界面更加健壮。


