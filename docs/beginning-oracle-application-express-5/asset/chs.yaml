  攻击 Web 应用程序最常见的方式之一是通过一种称为**URL 篡改**的攻击形式。你不需要是程序员或黑客就能发动此类攻击，你只需更改浏览器中的 URL 即可。APEX\
  \ 在 2.2 版本中引入了会话状态保护功能。启用后，它会在 URL 中添加一个校验和值。如果 URL 的任何部分被更改，生成的校验和将与预期值不匹配，页面将根本无法渲染。\n\
