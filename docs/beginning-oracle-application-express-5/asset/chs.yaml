  \ |\n| Martin | MARTIN |\n| Patrick | PATRICK |\n| Tim | TIM |\n| （你的登录名） | （YOUR\
  \ LOGIN NAME） |\n\n完成后点击“创建值列表”。现在你已经创建了一个静态值列表，让我们再包含一个使用 SQL 查询来生成值列表的动态列表：\n\n\
