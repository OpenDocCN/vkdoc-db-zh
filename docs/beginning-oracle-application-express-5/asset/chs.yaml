  图 14-13. 删除选中项按钮\n\n\n### 交互式报表设置\n\n交互式报表设置页面允许工作区管理员管理已保存的报表和报表订阅。只有工作区管理员可以删除已保存的报表和报表订阅。修改报表配置的唯一方式是以该用户身份登录。\n\
  \n#### 已保存的报表\n\n“已保存的报表”部分允许您删除某些已保存的交互式报表。交互式报表有四种不同类型的已保存报表（参见图 14-14）。**主默认报表**是开发人员创建时的默认报表设置，所有用户均可访问。**备选默认报表**同样由开发人员保存，所有用户也可访问。这使开发人员能够预先创建同一报表的多个版本。\n\
