  \n## 总结\n\n在本章中，你创建了应用程序的基本框架以及将在后续章节中使用的若干支撑对象。这些项目是根据在开始创建应用程序之前所做的规划而创建的。根据你的情况，你为自己应用程序所做的规划量会有所不同。这里概述的共享组件可以在开发过程中的任何时间创建。在下一节中，你将开始使用这里概述的一些关键结构。\n\
  \n\n## APEX 表单\n\n表单用于显示、编辑和收集数据，然后将数据发送回数据库进行处理。表单可以与表、视图（通过 `instead of` 触发器）、过程和\
  \ Web 服务进行交互。\n\n一个 `APEX` 表单实际上是一组 `APEX` 对象的集合，它们作为一个单一、内聚的单元协同工作，对数据元素执行插入、更新和删除操作。一个\
  \ `APEX` 表单通常由一个区域、一个或多个项目、一个或多个按钮以及一个或多个处理与数据库交互的过程组成。`APEX` 表单向导会创建一个功能完备的表单所需的所有对象。\n\
  \n**注意**\n表单生成后，其中的对象在逻辑上并无任何关联，它们只是共同构成一个完整的工作表单。虽然可以修改或删除单个元素，但如果引入错误，可能会导致表单无法正常工作；因此，不建议这样做。\n\
  \n图 6-1 中列出的 `APEX` 表单向导是创建 `APEX` 表单最快、最有效且最准确的方式。向导会引导你完成一系列步骤，收集表单类型所需的信息，然后生成所有必需的项目、过程和按钮。使用向导可以让你免于繁琐且易出错地逐个创建每个组件的任务。在向导创建表单之后，你可以（而且很可能需要）对生成的组件进行修改和增强，以使表单符合你的特定需求。\n\
  \n![A978-1-4842-0466-5_6_Fig1_HTML.jpg](img/A978-1-4842-0466-5_6_Fig1_HTML.jpg)\n\
  图 6-1. `APEX` 创建页面向导，显示表单选项\n\n以下是使用图 6-1 中列出的向导可以创建的一些表单类型：\n\n*   **基于表的带报表的表单**：一个建立在表或视图列上的表单，每个表列对应一个项目，一次处理一行数据，外加一个基于该表或视图内容的报表，并包含报表页和表单页之间的导航元素。\n\
  *   **基于表或视图的表单**：一个建立在表或视图列上的表单，每个表列对应一个项目，一次处理一行数据。\n*   **主从表单**：建立在具有主从关系的一对表上的表单。`APEX`\
  \ 主从表单向导会创建管理主从数据所需的所有数据、处理和导航元素。\n*   **表格表单**：一个多行多列的表单（类似电子表格），允许一次性编辑多行和多列数据。\n\
  *   **基于过程的表单**：一个基于过程参数的表单，通常用于收集要传递给过程进行后续处理的数值。\n*   **基于 SQL 查询的表单**：一个建立在 `SQL`\
  \ 查询结果上的表单。由于其灵活性，这是一个非常强大的表单结构。\n*   **摘要页**：一个只显示的表单，展示来自现有输入表单页面的选定项目。摘要页常用于为向导构建确认页。\n\
  *   **基于 Web 服务的表单**：一个基于 Web 服务参数的表单。\n*   **基于 Web 服务的表单和报表**：一个基于 Web 服务参数的单行表单，附带所有数据行的相应报表，并包含在报表和表单之间来回移动的导航元素。\n\
  \n如果你查看可用的 `APEX` 表单向导，会发现其中几个会创建附带的报表（例如“基于表的带报表的表单”和“基于 Web 服务的表单和报表”向导）。常见的做法是使用基于表、视图或\
  \ Web 服务的报表来定位特定的数据行，然后在基于同一表、视图或 Web 服务的表单中编辑该数据。有些向导会直接为你创建报表和表单，包括使一切正常工作所需的所有导航元素和数据库事务处理过程。\n\
  \n## 基于表的表单\n\n`APEX` 中最常见的表单类型之一是基于表的表单。`APEX` 基于表的表单向导会自动创建 `APEX` 项目并将其映射到数据库列，这使得为数据库表的录入和更新快速创建表单变得非常简单。作为开发者，你随后可以修改每列不同类型的数据控件。所有支持的\
  \ `HTML` 控件（文本框、文本区域、选择列表、单选按钮组、复选框等）都可用，此外还有一些 `APEX` 特有的控件。理解 `APEX` 基于表的表单向导功能的最佳方式就是使用它，那么让我们开始动手创建一个基于表的表单吧。\n\
  \n\n### 在表上创建表单\n\n在本节中，你将创建帮助台系统的第 2 页，并向其添加一个表单。此表单将允许用户通过向 `TICKETS` 表插入一行来创建新的工单。你可以限制表单在\
  \ APEX 中可以执行的 DML 操作。在这种情况下，你将其限制为仅执行插入操作。\n\n“表单向导”将引导你完成在表上生成表单所需的所有步骤：选择解析模式、选择作为表单基础的表、选择要包含和编辑的列、分配区域和表单标题，以及指定列标题。开始操作如下：\n\
  \n导航至你的应用程序的开发主页。此页面列出了应用程序中的所有页面。\n点击屏幕右上角的 **创建页面** 按钮。\n选择 **表单**，然后点击 **下一步**。\n\
  选择 **表或视图上的表单**，然后点击 **下一步**。\n将 **表/视图所有者** 设置为你的模式，并为 **表/视图名称** 选择 `TICKETS`（表），如图\
  \ 6-2 所示。点击 **下一步**。\n\n![`A978-1-4842-0466-5_6_Fig2_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig2_HTML.jpg)\n\
  图 6-2.\n\n输入模式和表名\n下一步允许你设置将由向导创建的页面和区域的一些详细信息。**页面编号** 可以设置为任何你希望的值，但它必须在应用程序内唯一。**页面名称**\
  \ 设置应用程序运行时在浏览器选项卡中显示的文本，**区域标题** 设置在区域标题区域中显示的文本。**页面模式** 决定你正在创建的页面是普通的 APEX 页面，还是\
  \ APEX 5.0 内置的两种对话框之一：模态或非模态。模态对话框不允许与对话框下方的页面交互，而非模态对话框允许用户查看并与底层页面交互。**区域模板**\
  \ 决定区域容器的视觉呈现方式。每个 APEX 主题都有多个可用模板，但你会发现 **标准** 模板使用得最多。继续操作如下：\n\n输入 `2` 作为 **页面编号**，如图\
  \ 6-3 所示。为 **页面名称** 和 **区域标题** 都输入 `创建工单`。将 **页面模式** 设置为 **正常**。将 **面包屑** 设置为 **面包屑**。页面刷新后，将\
  \ **上级条目** 设置为 **主页**，然后点击 **下一步**。\n\n![`A978-1-4842-0466-5_6_Fig3_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig3_HTML.jpg)\n\
  图 6-3.\n\n指定页面、区域、模式和面包屑信息\n接下来，你可以选择此页面如何与你已经定义的菜单系统关联（如果关联的话）。我们已经为这些页面在 **导航列表**\
  \ 中创建了条目，因此我们将在创建页面时使用它们：\n\n对于 **导航首选项**（图 6-4），选择 **为此页面标识现有导航菜单条目**。页面刷新后，将 **现有导航菜单条目**\
  \ 设置为 **主页**，然后点击 **下一步**。\n\n![`A978-1-4842-0466-5_6_Fig4_HTML.jpg`](img/A978-1-4842-0466-5_6_Fig4_HTML.jpg)\n\
  图 6-4.\n\n指定导航选项\nAPEX 4 引入了使用 `ROWID` 作为主键的功能。这在处理具有多列自然主键的表时很方便，但该表已经定义了单列主键，因此你将使用该主键：\n\
  \n将 **主键类型** 设置为 **选择主键列**，确保 **主键** 设置为 `TICKET_ID`，然后点击 **下一步**。\n该表的主键基于数据库中的序列，并且已经存在一个触发器，如果传入记录的主键为空，则使用下一个序列值填充主键，如下所示：\n\
