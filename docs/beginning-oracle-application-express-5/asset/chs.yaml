  关于打包应用程序，有几点您需要了解：


  任何名称中包含“示例”的应用程序都是为了演示 `APEX` 中可用的功能而存在的，因此默认情况下将以未锁定状态安装。这意味着开发者将能够编辑该应用程序并查看 `APEX`
  团队是如何开发该应用程序的。名称中不包含“示例”的应用程序是作为生产就绪版本提供的，并将以锁定状态安装，在应用程序被明确解锁之前不允许任何编辑。这可以通过 `管理`
  按钮完成，如图 5-7 所示。任何已安装并保持锁定的此类应用程序在生产环境中都得到 `Oracle` 的完全支持。这些锁定的应用程序也可以升级到未来 `APEX`
  版本中可能附带的更新版本。一旦您解锁它们，`Oracle` 的所有支持即告终止，升级能力失效，并且无法重新锁定应用程序。截至 `APEX 5.0`，所有打包应用程序都安装到工作区的默认“解析为”模式中。目前，没有直接的方法可以在不先解锁并导出应用程序（从而使其失去任何支持）的情况下将它们安装到次要的“解析为”模式中。


  尽管示例应用程序是作为学习辅助工具编写的，但从许多生产就绪的应用程序中也能学到很多东西。我衷心建议您在读完本书后的第一个动作，就是去看看一些打包应用程序的内部工作原理。


