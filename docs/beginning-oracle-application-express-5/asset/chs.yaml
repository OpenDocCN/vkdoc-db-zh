  \ 区域，将 `Value Required` 属性设置为 `NO`。\n2.  编辑页面 `610` 时，右键单击 `P610_PASSWORD`，然后选择\
  \ `Create Validation`。\n3.  在 `Properties Editor` 中，将 `Name` 设置为 `P610_PASSWORD\
  \ Is Not Null`。\n4.  在 `Validation` 区域，选择 `Item is Not Null` 作为 `Type`，并将 `Item`\
