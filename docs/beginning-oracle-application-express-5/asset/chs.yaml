  \ APEX 组件，以及可用于根据需要自定义表单和报表的表单、报表和列属性。\n\n## APEX 帮助\n\n为终端用户提供帮助是一项常被遗忘且通常很繁琐的任务。开发人员通常选择简单的方式，要么完全跳过，要么在项目接近尾声时将其最小化或取消。虽然\
  \ APEX 不能神奇地将帮助功能融入你的应用程序，但它确实使你作为开发人员能够更容易地做到这一点。\n\n### 添加帮助文本区域\n\nAPEX 帮助文本区域会自动显示给定页面及其项目相关的任何帮助文本。它可以放置在任何页面上，包括全局页面。尽管你可以为帮助文本区域选择区域模板，但无法更改实际文本的样式。例如，让我们在第\
  \ 210 页添加一个帮助文本区域，作为主编辑区域的子区域：\n\n编辑应用程序的第 210 页。\n通过导航到组件库的 Regions 面板并将帮助文本图标拖动到“管理工单”区域内的“子区域”部分来创建一个新的帮助文本区域，如图\
  \ 6-66 所示。\n\n![A978-1-4842-0466-5_6_Fig66_HTML.jpg](img/A978-1-4842-0466-5_6_Fig66_HTML.jpg)\n\
  图 6-66. 创建帮助文本区域\n\n在属性编辑器中，将 Name 设置为 **Help**。\n在 Appearance 属性组中，将 Template 设置为\
  \ **Collapsible**，然后点击 **Template Options** 按钮以展开模板选项弹出窗口。\n将 Default State 设置为\
  \ **Collapsed** 并点击 OK。\n保存并运行你的应用程序。\n\n注意，当你运行第 210 页时，你会在“管理工单”区域的底部看到区域标题“Help”旁边渲染了一个\
  \ `>`。新创建的帮助区域是作为一个子区域创建的，因此它出现在其父区域内。点击 `➤` 会展开该区域；因此，帮助文本仅在用户明确请求时才会显示。目前，帮助区域没有任何帮助文本。你将在下一节中植入项目级别的帮助文本。你可以通过编辑页面定义并在“帮助”部分的“帮助文本”输入框中输入文本来添加页面级别的帮助。\n\
  \n### 植入帮助文本\n\n请注意，并非所有项目都显示在帮助区域中。这是因为定义 UI 默认值时已向该区域添加了一些帮助文本，但其他项目的帮助文本仍然为空。在\
  \ UI 默认值中定义的帮助文本会自动提取到使用这些默认值构建的任何表单中。你可以通过编辑每个项目来手动添加帮助文本。你也可以使用另一个 APEX 向导为任何尚未分配帮助文本的\
  \ APEX 项目植入帮助文本。\n\n在应用程序构建器的右上角，点击 **Utilities** 图标，如图 6-67 所示，然后选择 **Application\
  \ Utilities** 以进入应用程序实用工具主页。\n\n![A978-1-4842-0466-5_6_Fig67_HTML.jpg](img/A978-1-4842-0466-5_6_Fig67_HTML.jpg)\n\
  图 6-67. 定位应用程序实用工具图标\n\n在页面右侧的 Page-Specific Utilities 区域中，点击 **Item Utilities**。\n\
  点击 **Grid Edit of all Item Help Text**。这里的报表只显示那些已有关联帮助文本的项目。但是，你可以使用此表单上的一个按钮，用单个默认值为你的应用程序中所有空的帮助文本植入内容。没有完美的值可用于植入帮助文本，但类似“需要帮助文本”的内容可以表明该项目的帮助需要输入：\n\
  点击 **Seed Item Help Text**。\n在“植入项目帮助”部分的 Default Help Text 中输入 `NEED HELP TEXT`，如图\
  \ 6-68 所示，然后点击 **Apply Changes**。\n\n![A978-1-4842-0466-5_6_Fig68_HTML.jpg](img/A978-1-4842-0466-5_6_Fig68_HTML.jpg)\n\
  图 6-68. 植入项目帮助文本\n\n帮助文本已植入，你将返回到主报表。从这里，你可以缩小显示的项目范围并直接编辑帮助文本：\n在页面顶部的 Report Filter\
