  \ 4-24 显示了某次脚本运行的处理语句数。\n\n![A978-1-4842-0466-5_4_Fig24_HTML.jpg](img/A978-1-4842-0466-5_4_Fig24_HTML.jpg)\n\
  **图 4-24. 任一报告页脚中都包含脚本的成功摘要**\n\n## 用户界面默认值\n\n在开始编写应用程序之前，最后一件能让您后续工作更轻松的事是创建一些用户界面（UI）默认值。在我看来，这是\
  \ APEX 中最未被充分利用的功能之一。\n\n### 理解用户界面默认值\n\nUI 默认值允许您自定义表、视图及其列的默认显示属性。它们可用于控制许多属性，包括对齐方式、可搜索性、显示顺序、为列创建的项类型、默认值等等。\n\
  \n例如，当您通过向导（大多数时候都是如此）创建新表单或报告时，APEX 会询问您是否要使用 UI 默认值。如果您选择“是”且存在默认值，APEX 会根据定义属性的表或列，将这些默认值应用于相应的区域或项。UI\
  \ 默认值分为两类：属性字典和表字典。\n\n属性字典允许您基于属性名称创建更通用的 UI 默认值。可以将其视为更宏观级别的定义。\n\n假设您为任何名为 `PHONE_NUMBER`\
  \ 的属性创建了一个属性级别的默认值。如果一个名为 `PHONE_NUMBER` 的列出现在表中，并且没有分配表字典默认值，则属性字典默认值将生效。\n\n属性字典定义还可以分配同义词，允许多个属性名称共享相同的实际定义。因此，例如，您可以为原始的\
  \ `PHONE_NUMBER` 定义创建同义词 `PHONE`、`TELEPHONE`、`PHONENUMBER` 等。如果向导遇到具有这些名称中任何一个的列，它会将\
  \ `PHONE_NUMBER` 默认值应用于创建的 APEX 项。\n\n表字典允许您为特定表或列定义默认值，并且这些默认值仅应用于为这些特定项创建的 APEX\
  \ 区域或项。\n\n以下是关于 UI 默认值需要注意的一些事项：\n\n*   表字典默认值始终覆盖属性字典默认值。\n*   当使用 UI 默认值创建项时，不会与\
  \ UI 默认值建立关系。因此，如果您后来更改了 UI 默认值的定义，这些更改不会传播到先前创建的项。\n*   在建立 UI 默认值之前创建的项不会继承 UI\
  \ 默认值的属性。\n*   开发人员可以选择不使用 UI 默认值，即使使用了，也可以在组件创建后覆盖它们。\n\n话虽如此，UI 默认值确实有助于确保应用程序的一致性，并使开发人员的工作更加轻松。\n\
  \n\n\n### 为表格定义 UI 默认值\n\nUI 默认值既可以从 SQL Workshop 的“对象浏览器”管理，也可以从 SQL Workshop 的“实用程序”页面管理。操作步骤如下：\n\
  \n通过 SQL Workshop 选项卡上的下拉菜单导航至 SQL Workshop 的 UI 默认值页面，然后选择“实用程序”；接着，从下拉菜单中选择“用户界面默认值”。您将进入\
  \ UI 默认值仪表板，此时看起来可能相当空旷。这是因为您实际上尚未创建任何 UI 默认值。创建 UI 默认值的第一步是将表字典与数据库同步，以便其了解您的模式中有哪些表。点击页面顶部的“表字典”选项卡，然后在出现的屏幕上点击“同步”按钮。这将启动同步向导。此向导会显示已定义默认值的表数量和未定义默认值的表数量。在此情况下，您应该有零个具有默认值的对象和六个没有默认值的对象。点击“同步默认值”按钮以开始与数据库同步。这可能需要一点时间。一旦表字典与数据库中的定义同步完成，您将看到如图\
  \ 4-25 所示的报告，其中显示了每个现在具有基本 UI 默认值的表。如果您的模式中还有其他表，它们也会出现在此报告中。\n\n![A978-1-4842-0466-5_4_Fig25_HTML.jpg](img/A978-1-4842-0466-5_4_Fig25_HTML.jpg)\n\
  *图 4-25. 已定义 UI 默认值的对象列表*\n\n现在，您可以查看或编辑这些表中每一个的 UI 默认值。首先查看 `TICKETS` 表的 UI 默认值：点击报告中的\
  \ `TICKETS` 链接。您应该会看到如图 4-26 所示的结果。\n\n![A978-1-4842-0466-5_4_Fig26_HTML.jpg](img/A978-1-4842-0466-5_4_Fig26_HTML.jpg)\n\
  *图 4-26. 表和列 UI 默认值概览*\n\n在图 4-26 的页面上，您可以看到 `TICKETS` 表 UI 默认值的概览。报告的上半部分是表级定义，包括基于此表的表单和报告区域将被称为什么。下半部分是表的列列表、将使用的标签、它们在报告中使用时的对齐方式、是否在报告或表单中显示、是否在表单中设置其\
  \ `REQUIRED` 属性，以及它们是否有任何帮助文本。接下来，编辑表级和列级属性：点击报告右上角的“编辑表默认值”按钮。这允许您编辑基于此表的表单和报告区域的命名方式。为“表单区域标题”输入\
  \ `Manage Tickets`，将“报告区域标题”保留原样，然后点击“应用更改”。\n\n点击任何列名将转到一个页面，允许您为该特定列设置 UI 默认值。当您浏览列\
  \ UI 默认值时，请注意有些内容已为您设置好，包括 `REQUIRED` 属性。当 APEX 与数据库同步时，它会看到某些字段在数据库级别被标记为 `NOT\
  \ NULL`，并将这些约束转换为 UI 默认值供您使用。\n\nAPEX 还会根据列的数据类型做出一些决策，例如在报告中显示时如何对齐列。使用以下信息，通过点击列名中的链接来修改指定列的\
  \ UI 默认值：\n\n*   列：`SUBJECT`\n    *   标签：`Subject`\n    *   帮助文本：`A brief title\
  \ for the issue.`\n*   列：`DESCR`\n    *   标签：`Description`\n    *   帮助文本：`Describes\
  \ the ticket in detail. Please be as complete as you can.`\n    *   可调整大小：`YES`\n\
  \    *   宽度：`50`\n    *   高度：`5`\n*   列：`STATUS_ID`\n    *   标签：`Status`\n\n如果您愿意，可以继续为其他任何列和/或表设置\
  \ UI 默认值。请记住，您现在所做的操作将影响向导稍后为您创建的内容，因此如果某些内容看起来与本书中所示的不完全一致，请检查您为 UI 默认值设置了什么。\n\
  \n## 总结\n\nSQL Workshop 可能比不上一些更流行的 GUI 工具，但它无疑具备了您在创建和管理表和数据时所需的大部分功能。您也已经看到，SQL\
  \ Workshop 有一些内置但隐藏的瑰宝，比如“创建查找表向导”。最后，在众多实用工具中，UI 默认值管理器使您作为开发人员的工作变得更加轻松。\n\n当然，本章并未涵盖\
  \ SQL Workshop 的全部内容，但您肯定已经对其功能有了相当多的了解。在本书的后续部分，您将使用 SQL Workshop 完成许多其他任务，但现在不必等待。去那些黑暗的角落探索一番，看看您能发现什么吧！\n\
  \n"
- '# 5. 应用程序与导航


  电子补充材料：本章的在线版本（doi:[10.​1007/​978-1-4842-0466-5_​5](http://dx.doi.org/10.1007/978-1-4842-0466-5_5)）包含补充材料，可供授权用户使用。


  在创建了一些基本数据之后，您现在可以为您的应用程序创建框架。APEX 提供了一个用于创建应用程序的向导。向导内提供多个选项，以帮助生成起始应用程序。根据前期规划的多少，运行初始应用程序向导的结果可能会有所不同。本章将从逐步讲解向导的步骤开始，同时我将重点介绍最常见的功能。


  对于示例应用程序，您将创建仅包含一个页面的最基础的应用程序框架。在其他场景中，您可以创建所有页面的初始草稿。为了说明用于创建页面的各个向导，它们将在后面的章节中更详细地探讨。


  示例应用程序创建完成后，您将为其添加共享组件。共享组件是在应用程序所有页面中通用的项目和结构。您将准备面包屑导航、列表和值列表（LOV）以供使用；您还将了解全局页面概念的工作原理。到本章结束时，您将拥有应用程序的一些基本组件以及其余页面的起始大纲。


  ## 创建应用程序向导


  APEX 中的应用程序可以通过应用程序导入、复制现有应用程序或运行“创建应用程序向导”来创建。“创建应用程序向导”是从头开始创建应用程序的第一步。本章将引导您完成使用“创建应用程序向导”创建“帮助台”应用程序的过程。


  首先，导航到 APEX 中的“应用程序生成器”。您可以从 APEX 主页点击“应用程序生成器”菜单项或如图 5-1 所示的“应用程序生成器”图标来完成此操作。“应用程序生成器”会显示当前应用程序的列表。列表顶部是一个高亮的“创建”按钮，如图
  5-2 所示。点击该按钮，向导即启动。


  ![A978-1-4842-0466-5_5_Fig2_HTML.jpg](img/A978-1-4842-0466-5_5_Fig2_HTML.jpg)

