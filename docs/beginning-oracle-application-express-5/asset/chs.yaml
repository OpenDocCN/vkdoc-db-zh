  \ URL 中的页码更改为 `210` 或 `230`。\n\n**重要提示** 移除或隐藏按钮、选项卡或其他链接，并不能保护它们原本指向的目标；它仅有助于减少用户在已安全的组件上看到的错误。\n\
  \n服务台应用程序的设计使得 **管理多工单** 页面仅对具有编辑权限的用户可用，因此整个页面在编辑级别上是安全的。工单的单记录视图对所有认证用户仍然可见，但不再显示与记录操作相关的按钮：\n\
