  在 `APEX` 中，面包屑是一种具有内置行为的声明式结构。它们作为共享组件进行管理，并拥有自己的区域类型和模板。当您运行创建应用程序向导时，向导创建的页面会自动包含一个用于容纳面包屑的区域。图
  [5-38] 显示了页面面包屑栏部分中的面包屑区域。


