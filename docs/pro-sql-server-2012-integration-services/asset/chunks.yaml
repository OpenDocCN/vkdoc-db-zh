- fmt: '# CHAPTER 8 DATA FLOW TRANSFORMATIONS


    ## Sort Transformation


    The `Sort` transformation offers several options applicable to sorting. In the
    Sort editor, you can choose the columns that you want to sort by, and choose the
    Sort Type (ascending or descending options) and Sort Order for each column. The
    Sort Order indicates the order of the columns in the sort operation. In our example,
    we’re sorting by the State column, and then by EventYear and EventMonth.


    The `Comparison Flags` option provides several sort-related options for character
    data, such as ignoring case and symbols during the sort process. In our example,
    we chose to ignore case on the State column when sorting the inbound data. You
    can also choose to remove rows with duplicate sort values.


    Figure 8-34 shows the Sort Transformation Editor.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-285_1.jpg)


    **Figure 8-34. Editing the Sort transformation**


    ### THE ISSORTED PROPERTY


    One of the features of note in the `Sort` transformation is exposed in the `Advanced
    Editor`, via the `Input and Output Properties`. The `IsSorted` property is automatically
    set by the `Sort` transformation, as you can see in Figure 8-35.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-286_1.jpg)


    ![](index-286_2.jpg)


    **Figure 8-35. IsSorted property in Sort transformation Advanced Editor**


    This property is checked by transformations that require sorted input, such as
    `Merge Join` covered later in this chapter. If it’s not set to `True` on an output
    further up the data flow, the transformation requiring sorted input will complain
    about it.


    Closely related to the `IsSorted` output property is the column-level `SortKeyPosition`
    property, which is shown in Figure 8-36.


    **Figure 8-36. SortKeyPosition property in the Advanced Editor**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-287_1.jpg)


    For the `Sort` transformation, the `SortKeyPosition` can be set through the `Basic
    Editor`. If you presort your inbound data, as with an `ORDER BY` clause in a source
    query, you’ll have to set these properties on the source adapter manually.


    ## Pivot


    The `Pivot` transformation allows you to perform a pivot operation on your input
    data. A pivot operation means you take your data and “turn it sideways,” essentially
    turning values from a column into columns in the result set. As shown in Figure
    8-37, we added a `Pivot` transformation to the data flow to denormalize our aggregated
    aviation data, creating columns with month names.


    **Figure 8-37. Adding a Pivot transformation to pivot aggregated aviation data**


    This `Pivot` transformation takes the individual rows of input and pivots them
    based on the EventMonth. The pivot operation turns the months into columns, as
    shown in Figure 8-38.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-288_1.jpg)


    **Figure 8-38. Result of Pivot transformation**


    In previous releases of SSIS, the `Pivot Transformation Editor` was difficult
    to work with—a situation that has been corrected in this new release. The newly
    redesigned `Pivot Transformation Editor` is shown in Figure 8-39.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-289_1.png)


    ![](index-289_2.png)


    ![](index-289_3.jpg)


    ![](index-289_4.png)


    ![](index-289_5.png)


    ![](index-289_6.png)


    ![](index-289_7.png)


    **Figure 8-39. Pivot Transformation Editor**


    > **NOTE:** The `Pivot` transformation requires input data to be sorted, or incorrect
    results may be produced. Unlike other transformations that require sorted input
    data, `Pivot` doesn’t enforce this requirement. Make sure your input to `Pivot`
    is sorted.


    ## Percentage Sampling


    The `Percentage Sampling` transformation selects a given percentage of sampled
    rows from the input to generate a sample dataset. This transformation actually
    splits your input data into two separate


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-290_1.jpg)'
