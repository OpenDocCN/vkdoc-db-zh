  trans: "\n# 第 17 章：维度数据 ETL\n\n所有列都通过`BinaryWriter`写入，格式为列长度后跟实际值。对于`NULL`值，则写入长度零，后跟一个单字节值（这是入站数据中无法生成的值）。每列之后都有一个竖线分隔符。连接后的二进制字符串随后被送入`SHA1`生成函数，输出结果被赋值给`Hash`列。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-552_1.jpg)\n\
    \n## 类型 1 SCD 更新\n\n类型 1 SCD 更新的最后一步是从暂存表到维度表执行一次更新或插入（upsert）操作。T-SQL 的`MERGE`语句非常适合这项工作。`MERGE`语句允许你在单个语句中执行`UPDATE`和`INSERT`操作，如下所示：\n\
    \n```sql\nMERGE INTO dbo.DimProduct AS Target\nUSING Staging.DimProduct AS Source\n\
    ON Target.UPC = Source.UPC\nWHEN MATCHED AND Target.Hash <> Source.Hash\nTHEN\
    \ UPDATE SET Target.Category = Source.Category,\n                Target.Manufacturer\
    \ = Source.Manufacturer,\n                Target.ProductName = Source.ProductName,\n\
    \                Target.Size = Source.Size,\n                Target.Price = Source.Price,\n\
    \                Target.Hash = Source.Hash\nWHEN NOT MATCHED\nTHEN INSERT (UPC,\
    \ Category, Manufacturer, ProductName, Size, Price, Hash)\nVALUES (Source.UPC,\
    \ Source.Category, Source.Manufacturer, Source.ProductName, Source.Size, Source.Price,\
    \ Source.Hash);\n```\n\n`NOTE:` `MERGE`提供了一种在单个语句中整合`INSERT`、`UPDATE`和`DELETE`操作的方法。然而，将这些步骤分离到单独的语句中可以提高整体性能。请比较两种方法的成本，以确保使用最高效的查询。\n\
    \n类型 1 SCD 的一个显著缺点是，更新当前值会丢失历史值。但是，只要不维护长期历史记录，这种更新过程比类型 2 或类型 3 SCD 更简单，并且占用空间也更少。\n\
    \n## 类型 2 维度\n\n由于类型 2 维度维护了属性值的长期历史记录，因此管理起来比类型 1 维度稍微复杂一些。类型 2 SCD 表的模式与类型 1\
    \ SCD 的不同之处在于，它可以包含最多三个额外的列来表示当前版本或历史版本。这些额外的列允许维度表包含历史值，而不是用当前值覆盖受影响的列。维度可以包含一个单独的列来指示该行是否具有最新的值，如图\
    \ 17-9 所示。\n\n*图 17-9. 类型 2 SCD 结果集*\n\n虽然新的或更新的值总是插入到类型 2 维度中，但现有行上还有其他标志也必须更新，例如生效日期、结束日期或活动状态列。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-553_1.jpg)\n\
    \n添加一个仅指示该行是否为最新记录的列，可以确保保留所有历史更改，但无法定义特定行何时处于活动状态。同时添加一个活动状态列和一个结束日期列，则可以提供维护历史值的方法，以便随后将其与适当的时间段关联起来。\n\
    \n`Active`列表示该行是否持有当前值，但缺乏跟踪这些值何时生效的能力。维度表可以包含开始日期和结束日期列，以维护历史值及其对应的时间段，当结束日期为`NULL`时代表当前值；或者可以包含一个生效日期列和一个表示活动或历史状态的列。类型\
    \ 2 SCD 的更新过程如图 17-10 所示。\n\n*图 17-10. 类型 2 SCD 更新流程*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-554_1.jpg)\n\n`SSIS`提供了一个数据转换任务，可用于类型 1 和类型 2 SCD。为类型 2 SCD 使用\
    \ SCD 转换任务的第一步是决定是通过使用简单指示符来标识当前和过期记录，还是通过使用生效日期来跟踪表中的更改。该组件原生不允许同时使用这两种方式，但你可以自定义输出来实现这一点。图\
    \ 17-11 展示了在数据流中使用 SCD 转换任务。\n\n*图 17-11. SSIS 缓慢变化维度组件*\n\n## 类型 3 维度\n\n类型 3\
    \ SCD 通过使用单独的列来跟踪更改，这限制了历史记录的数量，取决于可以添加到维度表中的列数。这显然存在限制，维度表开始看起来更像一个 Microsoft\
    \ Excel 电子表格，如图 17-12 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-555_1.jpg)\n\n*图 17-12. 类型 3 SCD 的查询结果*\n\n实现类型 3 SCD 存在几个复杂之处——首要的是每次更新都需要修改表模式，这使其成为一种不太理想的跟踪历史属性的方法。由于类型\
    \ 3 SCD 存在限制并且需要更改维度表的模式，`SCD 转换`任务不支持它。可以使用`执行 SQL`任务来自动更新类型 3 SCD，但如果在任何时刻维度表在`数据流`任务中被引用，它将基于模式更改而无法通过验证阶段。问题不仅仅在于维度的处理过程，还包括在`SSAS`多维数据集或报表中使用该维度时，同样会因为模式不断变化而出现问题。尽管使用类型\
    \ 3 SCD 是一种选择，但更推荐使用类型 1 或类型 2 SCD。\n\n## 小结\n\n本章介绍了几种优化`SSIS`包的工具和方法。其中许多优化依赖于尽可能在源执行操作，并限制通过`ETL`过程提取的数据量。我们还讨论了不同类型的维度，并概述了每种维度的更新方法。在下一章中，我们将探讨强大的`SSIS`父子设计模式。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 18 章：构建健壮的解决方案\n\n*融入我们理论中的自我主义并不影响其真诚；相反，我们的自我主义越是得到满足，我们的信念就越是坚定。*\n\
    ——小说家 乔治·艾略特\n\n开发`SSIS`包通常侧重于已知因素——数据源、转换和目标——而未能解决未知问题——模式更改、数据类型不匹配以及不断变化的网络环境。显然，所有开发都必须从一个起点出发——即已知。然而，为了确保`SSIS`包提供可移植性、稳定性和弹性，处理未知情况并记录未识别和不一致的行为至关重要。本章概述了在`SSIS`包中计划和处理意外情况所需的步骤。\n\
    \n## 什么构成健壮的解决方案\n\n通常，创建`SSIS`解决方案是为了在特定且静态的环境中满足一个易于定义的过程。源和目标模式被认为是固定不变的，没有考虑变化或错误。这种类型的项目创建起来轻而易举，部署也很快，但开发人员往往未能在这种情况下进行`假设分析`，从而无法为以下方面提供支持：\n\
    \n- 跟踪：\n  - 性能\n  - 错误信息\n  - 历史指标\n- 处理以下方面的变化：\n  - 源\n  - 连接\n  - 模式\n- 可移植性以及轻松部署到不同环境\n\
    \n在尝试创建健壮的解决方案时，需要考虑几个因素：\n\n- **弹性**：包主动处理错误、记录错误并仍然能够完成的能力。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
- fmt: "# CHAPTER 18 BUILDING ROBUST SOLUTIONS\n\n## Key Factors\n\n*   **Dynamism**:\
    \ The capability to deal with a dynamic fluid environment based on a set of rules\
    \ and not static numbers, paths, or connections.\n*   **Accountability**: The\
    \ capability to record the behavior of steps within a package, allowing historic\
    \ performance to be tracked.\n*   **Portability**: The capability to easily deploy\
    \ a package to different environments without having to overhaul each step and\
    \ connection.\n\nTaking these factors into consideration during package development\
    \ can streamline troubleshooting and deployment/migration, as well as the tracking\
    \ of historic performance.\n\n## Resilience\n\nErrors can occur within an SSIS\
    \ task for various reasons, and how they are handled depends on the specific task.\
    \ For example, a `Script` task can handle errors easily and efficiently by using\
    \ `try-catch-finally` blocks and can provide a means of dynamic error handling,\
    \ whereas an `FTP` task has a limited means of proactive error handling. To ensure\
    \ resiliency, tasks should provide a means of preemptive error handling and a\
    \ way to reprocess tasks after an error is handled.\n\n## Data Flow Task\n\nOne\
    \ of the most commonly used SSIS tasks is also one of the more difficult to incorporate\
    \ error handling. A `Data Flow` task is the backbone of the ETL process, but lacks\
    \ true structured error handling within the data flow. A prime example of this\
    \ is the occurrence of a truncation error from source or transformation to destination.\
    \ In this situation, there is no way to dynamically handle the error, but you\
    \ can redirect the affected row to another destination, where additional evaluation\
    \ can be done to ensure a successful import.\n\nThis can be easily exhibited by\
    \ creating a package that contains an `Execute SQL` task and a `Data Flow` task\
    \ connected by the `Execute SQL` tasks with an on success precedent constraint.\
    \ The `Execute SQL` task, renamed `Create People Tbl`, will create a destination\
    \ table in the default instance by using the `AdventureWorks 2012` database with\
    \ the following query:\n\n```sql\nIF NOT EXISTS( SELECT * FROM sys.tables WHERE\
    \ name = 'People')\nBEGIN\n    CREATE TABLE People(\n        FirstName NVARCHAR(50),\n\
    \        MiddleName NVARCHAR(50),\n        LastName NVARCHAR(21)\n    )\nEND;\n\
    GO\n```\n\nAfter the `Execute SQL` task has been configured, change the name of\
    \ the `Data Flow` task to `Populate People`. The control flow pane of the package\
    \ should resemble Figure 18-1.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-558_1.jpg)\n![](index-558_2.jpg)\n\n**Figure 18-1. Data flow error\
    \ redirection in the control flow pane**\n\nIn the data flow pane, add an `OLE\
    \ DB` source, `OLE DB` destination, `Flat File` destination, and a `Data Conversion`\
    \ transformation. The `OLE DB` source should be renamed `AdventureWorks Person`\
    \ and configured to connect to the default instance of SQL and use the `AdventureWorks\
    \ 2012` database. In the table selection drop-down list, select the `Person` schema’s\
    \ `Person` table, as shown in Figure 18-2.\n\n**Figure 18-2. Data flow source**\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-559_1.jpg)\n\n\
    From the columns, only the `FirstName`, `MiddleName`, and `LastName` columns should\
    \ be selected, as depicted in Figure 18-3.\n\n**Figure 18-3. Selecting the data\
    \ flow source column**\n\nConnect the data flow path from the `OLE DB` source\
    \ to the data conversion task and rename the task `Convert LastName`. In the editor\
    \ for the transformation task, select `LastName` from the available input columns\
    \ and set the output alias to `Coverted LastName` and length to 20. This causes\
    \ a single row from the source to be truncated, as shown in Figure 18-4.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-560_1.jpg)\n\n**Figure 18-4. Data transformation task**\n\nTo configure\
    \ the error output, first open the editor by clicking the `Configure Error Output`\
    \ button of the data conversion task and change the `Error` and `Truncation` values\
    \ from “Fail componenet” to “Redirect row,” as shown in Figure 18-5.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
