- fmt: '# CHAPTER 1 INTRODUCING INTEGRATION SERVICES


    ## New Features


    *   The **analysis feature** provides metadata for locating object dependencies—for
    instance, which tables a package depends on. This new tool provides useful information
    for troubleshooting performance problems or dependency issues, or when taking
    a proactive approach to locating dependencies. We demonstrate impact and data
    lineage analysis in Chapter 12.

    *   **Improved Merge and Merge Join transformations**: The `Merge` and `Merge
    Join` transformations have been improved in SQL Server 12 SSIS by providing better
    internal controls on memory usage. We cover the new features of the `Merge` and
    `Merge Join` transformations in Chapter 6.

    *   **Data correction component**: The `Data Correction` transformation provides
    a tool to help improve data quality. We discuss this new transformation in Chapter
    7.

    *   **Custom data flow component improvements**: SQL Server 12 SSIS includes improvements
    that allow developers to more easily create custom data flow components that support
    multiple inputs. We explore these new features in the discussion of custom data
    flow components in Chapter 21.

    *   **Source and Destination Assistants**: The new `Source` and `Destination`
    Assistants are designed to guide you through the steps to create a source or destination.
    We talk about the new assistants in Chapter 6.

    *   **Simplified data viewer**: The data viewer has been simplified in SQL Server
    12 SSIS to make it easier to use. We demonstrate the data viewer in Chapter 8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


