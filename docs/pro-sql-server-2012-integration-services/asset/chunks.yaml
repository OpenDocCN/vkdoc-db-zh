    根据要添加到控制流中的项类型，我们建议在添加项之前先放置好引用的对象。例如，如果您要添加"执行 SQL 任务"，请先创建到数据库的连接管理器；或者如果您要添加"循环容器"，请先创建它可能依赖的变量。明确流程需求对于高效开发
    SSIS 包至关重要。临时以相反顺序创建对象，这几乎是您在 SSIS 中所能遇到的最接近"面条代码"的做法。利用自动格式化选项，可以最大限度地减少复杂的优先级约束流。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 5 章 控制流基础


    **注意：** 由于控制流代表包本身，因此通过右键单击控制流设计器背景可以访问包属性。控制流中的每个组件都有自己独特的一套属性，但控制流的属性即是包的属性。


    ### 用于控制流的 SSIS 工具箱


    控制流的组件包含在 Visual Studio 中一个可折叠/关闭的窗口中，称为 `SSIS 工具箱`。此窗口提供了对控制流所有可用组件的访问。需要注意，此窗口是上下文相关的，因此当您使用不同的设计器窗口时，它将显示该设计器可用的工具。不同的组件按图
    5-1 所示的组进行分类。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-110_1.jpg)


    *图 5-1. 控制流 SSIS 工具箱*


    这些分组允许您以能够快速访问最常用组件的方式组织 `SSIS 工具箱`，具体如下：


    *   **收藏夹** 代表最常用的组件。此类别将组件组织在 `SSIS 工具箱`顶部易于查找的位置。默认情况下，`数据流` 任务和 `执行 SQL` 任务位于此类别中。

    *   **常用** 组织 SSIS 开发中常用的组件。这些组件对于 ETL 过程的非 ETL 方面非常有用。这些组件允许您操作数据的源或目标，以便更轻松地提取或加载。

    *   **容器** 将不同的任务容器分组在一起。这些容器根据优先级约束执行任务。

    *   **其他任务** 存放不常使用的任务。这些任务更多地与数据库管理和非功能性需求相关，而非 ETL 本身。


    您对 `SSIS 工具箱`的自定义设置将适用于所有项目，并可随时修改。如果要恢复默认设置，可以右键单击并选择 `还原工具箱默认设置` 选项。使 `SSIS
    工具箱`在开发中高效的关键特性之一是每个组件的独特图标。这些图标以一种有意义的方式代表每个任务的目的。这些图标在组件被放置到控制流中后，也会出现在组件本身上。


    **注意：** 在早期版本的 BIDS 中，窗口窗格的名称是 *工具箱*。从 SQL Server Integration Services 12 开始，名称已更改为
    `SSIS 工具箱`。如果您为控制流创建自己的自定义组件，则必须将其添加到计算机的程序集文件夹以及 SQL Server 安装的相应组件文件夹中。第 21
    章将进一步介绍自定义组件。


    `SSIS 工具箱` 包含许多协助满足 ETL 需求的组件。在本书中，我们将列表分为基本组件和高级组件。本章涵盖的基本任务很可能成为您设计的大多数解决方案的一部分。其中一些任务将有各自的章节，因此本章不会详细描述它们。


    ### 收藏夹任务


    `收藏夹` 组中的默认任务列表是 `执行 SQL` 任务和 `数据流` 任务。您可以修改此组以包含您经常使用的任务。本节详细介绍默认列表。该组方便地显示在控制流的
    `SSIS 工具箱`的最顶部。


    #### 数据流任务


    `数据流` 任务可以描述为 ETL 过程的核心与灵魂。此可执行文件包含从不同源提取数据的组件、可以在数据流中清理和修改数据的转换组件，以及可以提交数据目标组件。SSIS
    中的数据流称为管道。`数据流` 任务有自己的设计器窗口，因此您可以根据需要自定义该过程。我们将在第 7 章和第 8 章进一步讨论 `数据流` 任务及其所有组件。图
    5-2 显示了添加到控制流时该可执行文件的外观。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-112_1.jpg)


    *图 5-2. 数据流任务*


    此可执行文件的图标显示两个圆柱体，一个绿色箭头从其中一个指向另一个。第一个圆柱体代表数据的源，绿色箭头代表转换，第二个圆柱体代表数据的目标。图标可能暗示数据只能来自一个源，但
    `数据流` 任务可以同时从多个源提取数据。同样，它也支持同时将数据输出到多个目标。


    如前所述，此组件将在后面的章节中更详细地介绍。其部分属性包括：


    *   `DelayValidation` 将元数据的验证延迟到运行时。

    *   `Disable` 防止在运行时执行 `数据流` 任务。

    *   `MaximumErrorCount` 定义 `数据流` 任务可容忍的错误数量。

    *   `Description` 提供 `数据流` 任务的简短描述。

    *   `Name` 显示 `数据流` 任务的唯一名称。

    *   `DefaultBufferMaxRows` 定义缓冲区可以容纳的最大行数。此属性与 `DefaultBufferSize` 属性相辅相成。它们共同可以解决
    `数据流` 任务性能不佳的一些问题。

    *   `DefaultBufferSize` 定义 `数据流` 任务中缓冲区的大小（以字节为单位）。`数据流` 任务中的某些转换会创建现有缓冲区的副本。这将在第
    7 章和第 8 章中更详细地介绍。

    *   `RunInOptimizedMode` 通过不为未使用的列分配空间来优化数据流路径。即使此属性设置为 `True`，它仍会发出有关从数据流路径中移除列的警告。

    *   `TransactionOption` 允许您定义可执行文件是否支持事务。如果可执行文件由父项调用并且启用了事务，则该可执行文件将成为父事务的一部分。主要出于性能原因，我们建议您将此选项保留为默认设置。


    #### 执行 SQL 任务


    `执行 SQL` 任务允许您使用各种连接管理器针对 RDBMS 运行 SQL 语句或执行存储过程。`执行 SQL` 任务可以利用的连接管理器包括 `Excel
    连接管理器`、`OLE DB 连接管理器`、`ODBC 连接管理器`、`ADO 连接管理器`、`ADO.NET 连接管理器` 和 `SQL Server Compact
    Edition 连接管理器`。图 5-3 显示了在控制流中出现的该可执行文件。图标显示一个圆柱体，其右下角叠加着一个卷轴。圆柱体代表数据库系统，而卷轴代表脚本。在此特定情况下，脚本是
    SQL 脚本。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-113_1.jpg)

    ![](img/index-113_2.jpg)


    *图 5-3. 执行 SQL 任务*


    ### 执行 SQL 任务编辑器—常规页

    '
- fmt: '# Execute SQL Task


    ## 通用页面


    The Execute SQL task can be used to truncate tables before being loaded or to
    create constraints after the data has been loaded, to verify data integrity (DDL
    statements). The Execute SQL task can also be used to retrieve data and store
    it in SSIS variables (DML statements). The data retrieved can be a single row
    or a tabular data set. The Execute SQL Task Editor allows you to set up the executable
    to perform different functions. Figure 5-4 shows the General page of the Execute
    SQL Task Editor.


    *Figure 5-4. Execute SQL Task Editor—General page*


    The following list discusses some of the key properties on the General page:


    - `Name` is a unique identifier for the task in the control flow. No two tasks
    of the same type can have the same name. This name is the label that is displayed
    in the control flow designer.

    - `Description` is a text field that provides a short explanation of the task’s
    function in the package. Modifying this attribute is not required but can help
    those who are new to the package understand the process more easily.

    - `Connection` is a required attribute that, by default, is blank. This value
    should indicate the name of the connection manager against which the SQL statement
    should be executed.

    - `ResultSet` allows you to define the type of the result that the query will
    return. There are four types of result sets: Single row, Full result set, XML,
    or none. Single row can be used for singular scalar values or for tabular datasets
    that return only one row. The Full result set option allows you to store tabular
    data in an SSIS object type variable. If an `ORDER BY` clause is defined in the
    SQL statement, the variable will maintain the data in a sorted list. XML result
    sets allow you to store XML data in a variable. None indicates that there is no
    result set returned. Successful executions of the SQL statements return values
    that indicate such. Mapping the result set to the appropriate variables can be
    performed in the Result Set page of the editor.

    - `ConnectionType` represents the type of connection manager that you will use
    to connect to the database.

    - `Connection Manager` is the name of the connection manager that will allow you
    to connect to the database.

    - `SQLSourceType` defines the method used to pass the SQL statement to the Execute
    SQL task. The choices are Direct input, File connection, and Variable. Direct
    input allows you to type the SQL statement directly into the text field `SQL statement`.
    The File connection option allows you to specify a particular file that contains
    the query to execute. Variable allows you to assign a query to a string variable
    and pass it to the task.

    - `SQLStatement` contains the SQL statements to execute on the indicated database.
    This field appears only if Direct input is selected as the source type of the
    query.

    - `FileConnection` allows you to select a connection manager to source the SQL
    statements. This option is available only if File connection is used as the source
    type.

    - `SourceVariable` is a list of variables that can store the SQL statements. This
    drop-down is available only if Variable is selected as the source type.

    - `SQLStatement` contains the DDL, DML, or DAL statements that need to be executed.
    When you modify the statement, a text editor opens in which you can type the statement.
    Without the text editor, you cannot place the `GO` on a new line and thus will
    have an error when you execute the package.


    `NOTE:` In order to execute DDL and Data Control Language, DCL, statements, you
    need to ensure that the credentials used have appropriate permissions. If you
    have multiple statements, only the first statement is allowed to return a result
    set.


    `NOTE:` We recommend using the semicolon (`;`) statement terminator if you intend
    on executing multiple statements within a singular Execute SQL task. At the end
    of the statements, you can add the `GO` batch directive on a new line in the text
    editor. When setting up a result set, ensure that the query that returns the result
    set is the final query in the `SQLStatement` field.


    The `Browse` button at the bottom allows you to import a query from a file into
    the `SQLStatement` field. It will open a Windows Explorer window to help navigate
    to the desired file. The `Build Query` button opens a graphical tool that assists
    you in constructing a query. This option is available only for the Direct input
    source type. The `Parse Query` button validates the syntax of the defined SQL
    query.


    ## 参数映射页面


    Parameters allow you to pass variables to the SQL query that is to be executed.
    Depending on the SQL connection, the parameters use different markers and names
    for mapping. Table 5-1 shows the different markers, the associated names to use
    with the markers, and a sample query for each connection. The Parameter Mapping
    page in Figure 5-5 demonstrates parameterizing the SQL statement.


    *Table 5-1. Parameter Markers and Names*


    | **Connection** | **Parameter Marker** | **Parameter Name** | **Sample** |

    | :--- | :--- | :--- | :--- |

    | ADO | `?` | `Param1`, `Param2`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME FROM
    INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA,
    t.TABLE_NAME;` |

    | ADO.NET | `@<ParamName>` | `@<ParamName>` | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME
    FROM INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = @tableSchema ORDER BY
    t.TABLE_SCHEMA, t.TABLE_NAME;` |

    | ODBC | `?` | `1`, `2`, `3`, `4`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME FROM
    INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA,
    t.TABLE_NAME;` |

    | Excel, OLE DB | `?` | `0`, `1`, `2`, `3`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME
    FROM INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA,
    t.TABLE_NAME;` |


    *Figure 5-5. Execute SQL Task Editor—Parameter Mapping page*


    Multiple markers can be used throughout the query. The marker for ADO, ODBC, Excel,
    and OLE DB connections is a question mark (`?`). The enumerator for ADO and ODBC
    begins at 1. However, the parameter must be named with `Param` prefacing the ordinal
    position. The enumerator for Excel and OLE DB connections begins at 0. The ADO.NET
    connection is the only one that uses a qualifier (`@`) and name combination for
    the parameter mapping. The same variable can be passed to the same SQL statement
    multiple times.


    To add a mapping for a parameter in the SQL statement, you need to click the `Add`
    button on the Parameter Mapping page. The columns on the mapping page specify
    all the details for each of the mappings. The `Remove` button simply removes the
    selected mapping. The properties are as follows:


    - `Variable Name` provides the particular variable that will be passed to the
    parameter in the SQL statement. The namespace of the variable is important because
    it allows for multiple variables to have the same name.

    - `Direction` indicates whether the variable is an input parameter, an output
    parameter, or a return code.

    - `Data Type` assigns a data type to the parameter. It does not automatically
    use the data type defined for the SSIS variable. The drop-down lists all the data
    types that are available to SSIS.

    - `Parameter Name` gives a name to the parameter. Depending on the connection
    type, you must name the parameter appropriately and make sure that the ordinal
    position of the marker in the query coincides with the name. The ordinal position
    plays an important role for this column when using some of the connection types.

    - `Parameter Size` defines the size of the variable length data types. This allows'
