    systems can hold data in some structure that SSIS can unravel and integrate into
    one system. However, the destination is not limited to just SQL Server. Data can
    be loaded back into an original form if the requirements specify such a need.


    This chapter covers some of the sources and destinations that SSIS can access.
    This chapter relies heavily on the information provided in Chapter 4 for its basis
    and then builds upon that foundation to provide you with examples that you can
    use in your everyday process.


    SQL Server Sources and Destinations


    The easiest of all sources and destinations for SSIS to handle is SQL Server.
    Reading from prior versions is relatively easy, but loading into a prior version
    may require some data conversions to handle newer or deprecated data types. As
    we mentioned in Chapter 4, the most efficient way to extract data from a SQL


    Server database is by using the SQL command option to write your own SQL statement.
    This is the recommended option to use on a SQL Server source component for several
    reasons. The first and foremost reason is that it allows you to limit the columns
    you extract to the ones you need. The SELECT *


    notation, used by the Table or View option, has been documented to have poor performance
    with SSIS


    source components and can cause metadata validation errors due to DDL changes.
    Specifying the necessary columns will keep your initial buffer lean. Another reason
    to write the SQL is that you can 487


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    define the data types in the SQL rather than utilizing a data conversion component
    in the data flow. The SQL Query option also allows you to define an ORDER BY clause,
    which can greatly boost your performance if you need to perform a join in the
    data flow by using the Merge Join transformation.


     **NOTE:** If you would like to see the performance of a SELECT * query in a
    source component, you can execute a package with the SQL profiler running. You
    should be able to compare the differences between the two implementations clearly.


    The source component, shown in Figure 14-1, allows you to define your extraction
    set. In order to add the source component to a package, you must have a Data Flow
    task to add it to. We chose to utilize the SQL command option to extract the data
    from the source. Even though we are extracting all the columns in the table, we
    still enumerate all the columns rather than utilizing the * option. We utilized
    the query shown in Listing 14-1 as our extraction logic. One of the advantages
    of using the SQL


    command is the ability to parameterize your query.


    *Listing 14-1\. SQL Server Source Query*


    WITH CTE


    AS


    (


    SELECT c.Alpha2


    ,c.CountryName


    ,c.Year


    ,c.TLD


    FROM dbo.Country c


    WHERE *c.Alpha2 = ?*


    AND *c.Year = ?*


    )


    SELECT Alpha2


    ,CountryName


    ,Year


    ,TLD


    FROM CTE


    WHERE *CountryName = ?*


    ;


    The common table expression (CTE) can be used inside the source query to break
    up the logic in the query as well as to make the query readable. The parameters
    are qualified by placing a question mark inside the query. The parameters can
    also be used to add a column in the query, not just limit the rows through a WHERE
    clause. The parameters can be added within different sections of the query as
    long as they are mapped appropriately by using the Parameters button in the OLE
    DB Source Editor. We highly recommend that you place your parameters right next
    to each other so you do not end up losing track of their order when you have to
    map them. The provided sample could get messy because there are some parameters
