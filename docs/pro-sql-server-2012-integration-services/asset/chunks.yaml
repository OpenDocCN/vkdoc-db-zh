    whitespace characters from strings.


     Deduplicating data, which is the elimination of data records that you consider
    to be duplicates. For a given process, you may consider entire records that are
    value-for-value matches to be duplicates; for other processes, you may determine
    that a value match on a single field (or set of fields), such as Telephone Number,


    identifies a duplicate record.


     Loading data into files, databases such as SQL Server, or other destinations.
    SSIS


    provides a wide range of stock destination adapters that allow you to output data
    to several well-defined destinations. As with data extraction, if you have a special
    destination in mind that’s not supported by the SSIS stock adapters, the built-in


    .NET support lets you output to nearly any destination you can access.'
