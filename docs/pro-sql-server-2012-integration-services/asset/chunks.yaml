- fmt: '# Management Studio 与 SQL 查询开发


    Management Studio 在为 SSIS 开发 SQL 查询方面至关重要。这些查询可被源组件、执行 SQL 任务、查找组件以及 OLE DB 命令组件使用。为
    SSIS 数据流任务从数据库检索数据最有效的方法是仅指定所需的列。这允许缓冲区填充行而非列，因为未指定的列将被丢弃。这对于查找组件同样重要，因为默认情况下它们会缓存结果集，因此
    `SELECT` 语句中应仅指定键列和输出列，而非整个数据集。


    > **注意：** 级联查找组件会在运行时堆叠创建的缓冲区。每个查找操作都会创建其前一个缓冲区的副本，并将新的查找结果列添加到该副本中。这些缓冲区直到一批行被提交或到达数据流末尾才会被释放。在数据流中堆叠多个查找操作可能导致内存溢出和性能下降。只有必要的列应通过组件引入管道。


    ## 工具窗口


    用于访问数据库引擎的查询窗口如图 2-12 所示。随着 SQL Server 2008 引入 `IntelliSense`，查询开发变得更加容易，因为它提供了关于函数的快速参考信息以及对数据库对象的自动填充功能。对于
    SQL Server 12，Management Studio 已基于 Visual Studio 框架构建，这在声明了此事实的启动屏幕上最为明显。


    默认情况下，Management Studio 环境由三个窗口组成。左侧是 `Object Explorer` 窗口；它允许您通过以服务器为根节点的树形视图查看所有已定义的对象。除了显示对象外，它还提供了用于执行管理和管理任务的向导及选项。`Object
    Explorer` 可用于连接多个实例以及 SQL Server 的不同引擎。对于数据库引擎，查询窗口是主要的访问方式。查询窗口默认位于中间，但可以拖动到屏幕上的任何位置，且不受
    Management Studio 窗口的限制。如果使用多个屏幕，可以将查询窗口移动到与 Management Studio 不同的屏幕上。


    *图 2-12. SQL Server Management Studio 的工具窗口*


    默认情况下，Management Studio 的设置有三个顶部栏：菜单栏、工具栏和上下文菜单。这些栏可以帮助您快速访问所需的对象和数据，而无需费力寻找选项。以下列表突出显示了常见的工具栏按钮：


    - `New Query`：基于 `Object Explorer` 的上下文打开一个新的查询窗口。如果所选对象是数据库引擎的成员，查询将是 SQL 查询。如果对象是
    Analysis Services 数据库，查询将是 MDX 查询。查询将自动连接到所选对象所属的服务，或者使用当前查询窗口的连接信息。

    - `Database Engine Query`：打开一个新的查询窗口并询问连接数据库所需的信息。执行和解析查询需要此连接。

    - `Analysis Services MDX Query`：创建一个可查询多维数据集数据的新查询窗口。对于非 Analysis Services 开发人员，通过
    `Object Explorer` 使用 `Browse Cube` 选项可能就足够了。

    - `Analysis Services DMX Query`：为数据挖掘表达式创建一个新的查询窗口。这些查询用于访问多维数据集上存在的数据挖掘模型。

    - `Analysis Services XMLA Query`：为定义 Analysis Services 数据库对象创建一个新的查询窗口。此查询通常使用
    BIDS 开发，并针对 Analysis Services 运行以创建多维数据集。

    - `Activity Monitor`：打开一个显示服务器状态的窗口。可以修改刷新速率以所需的速度显示信息。图 2-13 展示了监视器跟踪的各种统计数据。


    *图 2-13. Management Studio 活动监视器*


    上下文菜单特定于当前选定的查询窗口。MDX 和 DMX 查询具有相同的菜单，而数据库引擎和 XMLA 查询的菜单略有不同。多维数据集查询与 T-SQL 查询之间的主要区别在于结果显示和执行计划选项，这些选项存在于
    T-SQL 查询中，而多维数据集查询中没有。因为 XMLA 不查询数据，而是定义执行分析的对象，所以它有一套完全不同的工具集。多维数据集和 T-SQL 查询都有以下工具：


    - `Connect`：将断开的查询连接到适合查询类型的数据库。

    - `Change Connection`：提示您输入连接信息，以更改正在查询的实例。

    - `Available Databases`：是一个下拉列表，包含当前实例上所有可用的数据库。

    - `Execute`：这是迄今为止最常用的，执行当前窗口中的查询。如果高亮显示了部分代码，则仅执行高亮显示的代码。


    > **注意：** 执行中的错误通常会显示一个最有可能找到错误的行号。此行号是相对于语句开始的批处理的起始位置。第 10 行实际上可能是查询窗口中的第 30
    行。为了帮助定位错误，我们建议您通过“选项”菜单并选择“文本编辑器”来打开“行号”。

    - `Parse`：这是另一个常用的功能，将解析查询以验证其语法是否正确。它不会验证对象是否存在。如果连接到 SQL Server 2008 或更高版本的实例，`IntelliSense`
    通常会提供一些错误高亮显示。

    - `Comment Out the Selected Lines`：在当前或选定的每一行开头添加一个带有双连字符 (`--`) 的单行注释。

    - `Uncomment Out the Selected Lines`：从当前或选定的每一行开头移除任何由双连字符 (`--`) 标记的单行注释。

    - `Decrease Indent`：从当前或选定的代码行开头移除任何现有的缩进。

    - `Increase Indent`：在选定或当前代码行添加缩进。默认情况下，缩进是一个制表符，但可以通过“选项”菜单更改。

    - `Specify Values for Template Parameters`：弹出一个窗口，该窗口将用指定的值替换查询模板中的参数。该实用程序自动读取模板中定义的参数，如图
    2-14 所示。SQL Server 和 Analysis Services 都有大量可用模板。图 2-15 展示了这两者的模板。


    T-SQL 查询有几个其他查询类型没有的额外上下文选项。这些选项涉及输出结果和查询计划资源管理器。与 SQL 查询关联的按钮如下：


    - `Display Estimated Execution Plan`：显示查询窗口中查询的估计查询计划。该计划以图形方式显示在输出屏幕底部其自己的选项卡“执行计划”中。在对查询进行性能调整时，此实用程序至关重要。

    - `Query Options`：打开一个“查询选项”窗口，允许您为查询执行和结果集设置某些选项。

    - `IntelliSense Enabled`：切换 `IntelliSense` 的开启和关闭。

    - `Include Actual Execution Plan`：将查询计划与结果一起包含。此计划与估计计划的不同之处在于，它显示了查询优化器实际执行的操作。该计划显示在名为“执行计划”的选项卡中。'
  raw: 'Management Studio is critical in developing SQL queries for SSIS. These queries
    can be used by the source component, Execute SQL task,lookup component, and the
    OLE DB command component. The most efficient way to retrieve data from a database
    for SSIS Data Flow tasks is to specify only the columns that are required. This
    allows the buffers to fill with rows rather than columns, which will be disregarded.
    This is especially important for lookup components as well, because by default
    they cache the result set and thus only the key columns and the output columns
    should be specified in the select statement rather than the whole dataset.


     **NOTE:** Cascading lookup components will stack the buffers created during
    runtime. Each lookup will create a copy of the buffer preceding it and add the
    new lookup result columns to the copy of the buffer. The buffers are not released
    until the batch of rows is committed or reaches the end of the data flow. Stacking
    multiple lookups in the data flow may lead to memory overflows and poor performance.
    Only the necessary columns should be brought into the pipeline by components.


    Tool Windows


    The query window for accessing the database engine is shown in Figure 2-12\. With
    the addition of IntelliSense in SQL Server 2008, query development became easier
    because of the quick reference 33


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-37_1.jpg)


    CHAPTER 2  BIDS AND SSMS


    information that is returned on functions and the AutoFill on database objects.
    With SQL Server 12, Management Studio has been built around the Visual Studio
    framework. This is most evident with the startup screen that declares this fact.


    By default, three windows compose the Management Studio environment.On the left
    is the Object Explorer window; it allows you to see all the objects that are defined
    through a tree view with the server as the root node. In addition to displaying
    the objects, it provides wizards and options to perform management and administration
    tasks. The Object Explorer can be used to connect to multiple instances as well
    as the different engines of SQL Server. With the database engine, the query window
    is the primary mode of access. The query window by default sits in the middle,
    but can be dragged anywhere on the screen. It is not limited to the Management
    Studio window. If multiple screens are used, the query window can be moved to
    a different screen from the one with Management Studio.


    *Figure 2-12\. Tool windows for SQL Server Management Studio*


    By default, the setup of Management Studio has three bars at the top: the menu
    bar, the toolbar, and the context menu. These bars can help you quickly access
    the objects and data that you need without having to hunt around for options.
    The following list highlights the populartoolbar buttons: New Queryopens a new
    query window based on the context of the Object


    Explorer. If the selected object is a member of a database engine, the query will
    be a SQL query. Ifthe object is an Analysis Services database, the query will
    be an MDX query. The query will automatically be connected to the service that


    the selected object belongs to, or it will use the connection information of the
    current query window.


    Database Engine Query opens a new query window and asks for connection


    information needed to access the database. The connection is necessary to


    execute and parse queries.


    Analysis Services MDX Query creates a new query window that can query


    cube data. For those who are not Analysis Services developers, using the Browse
    Cube option through the Object Explorer may suffice.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-38_1.jpg)


    CHAPTER 2  BIDS AND SSMS


    Analysis Services DMX Querycreates a new query window for data-mining


    expressions. These queries are used to access the data-mining models that are


    present on a cube.


    Analysis Services XMLA Query creates a new query window for defining


    Analysis Services database objects. This query is usually developed using BIDS,
    and they run against Analysis Services to create a cube.


    Activity Monitor opens a window that shows the state of the server. The refresh
    rate can be modified to show the information at a desired pace. Figure 2-13


    demonstrates the various statistics that are tracked by the monitor.


    *Figure 2-13\. Management Studio Activity Monitor*


    The context menu is specific to the query window that is currently selected. The
    MDX and DMX


    queries have the same menu, whereas thedatabase engine and XMLA queries have a
    slightly different one. The main differences between the cube queries and the
    T-SQL queries are the result display and the execution plan options that are present
    with the T-SQL queries but not with the cube queries.Because the XMLA does not
    query the data but rather defines the objects that perform the analysis, it has
    a completely different toolset.Cube and T-SQL queries both have the following
    tools: Connect connects a disconnected query to a database that is appropriate
    for


    the query type.


    Change Connection prompts you with the connection information to allow


    you to change the instance being queried.


    Available Databases is a drop-down list of all the available databases on the


    current instance.


    Execute, which is by far the most commonly used, executes the query in the


    current window. If a section of code is highlighted, it will execute only the
    code that is highlighted.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2  BIDS AND SSMS


     **NOTE:** Errors in execution usually will display a line number where the error
    is most likely to be found. This line number is in respect to the start of the
    batch where the statement began. Line 10 might actually be line 30 in the query
    window. To help locate errors, we recommend you turn on Line Numbers through the
    Options menu and selecting Text Editor.


    Parse, which is another popular function, will parse the query to verify that
    it is syntactically correct. It will not verify that the objects exists. Usually
    IntelliSense will provide some error highlighting if a connection is made to a
    SQL Server


    2008 or later instance.


    CommentOutthe Selected Lines adds a single-line commentwith two hyphens


    (--) at the beginning of each of the current or selected lines.


    Uncomment Out the Selected Lines removes any single-line comments,


    marked by two hyphens (--), from the beginning of each of the current or


    selected lines.


    Decrease Indent removes any present indentation from the beginning of the


    current or selected lines of code.


    Increase Indent adds indentation to the selected or current line of code. By


    default, the indentation is a tab, but this can be changed in the Options menu.


    Specify Values for Template Parameterspops up a window that will replace


    the parameters in a query template with the values specified. The utility


    automatically reads in the parameters defined in the template, as shown in


    Figure 2-14\. There are a wide range of templates available for both SQL Server


    and Analysis Services. Figure 2-15 displays the templates for both.


    T-SQL queries have a few extra context options that the other query types do not.
    These involve outputting the results and query plan explorers. The buttons associated
    with the SQL queries are as follows:


    Display Estimated Execution Plan shows the estimated query plan for the


    queries in the query window. The plan is displayed graphically at the bottom in
    the output screen with its own tab, Execution Plan. This utility is essential
    when you are performance-tuning your queries.


    Query Options opens a Query Options window that allows you to set certain


    options for query execution and the result set.


    IntelliSense Enabled toggles IntelliSense on and off.


    Include Actual Execution Plan includes the query plan with the results. This


    plan differs from the estimated plan in that it displays the actual actions taken
    by the query optimizer. The plan is displayed in a tab called Execution Plan.'
  trans: '

    # Management Studio 与 SQL 查询开发


    Management Studio 对于在 SSIS 中开发 SQL 查询至关重要。这些查询可被源组件、执行 SQL 任务、查找组件以及 OLE DB 命令组件使用。为
    SSIS 数据流任务从数据库检索数据的最有效方法是指定所需的列。这允许缓冲区填充行而非列，因为未指定的列将被丢弃。这对于查找组件同样重要，因为默认情况下它们会缓存结果集，因此
    `SELECT` 语句中应仅指定键列和输出列，而非整个数据集。


    > **注意：** 级联查找组件会在运行时堆叠创建的缓冲区。每个查找操作都会创建其前一个缓冲区的副本，并将新的查找结果列添加到该副本中。这些缓冲区直到一批行被提交或到达数据流末尾才会被释放。在数据流中堆叠多个查找操作可能导致内存溢出和性能下降。仅应通过组件将必要的列引入管道。


    ## 工具窗口


    用于访问数据库引擎的查询窗口如图 2-12 所示。随着 SQL Server 2008 引入 `IntelliSense`，查询开发变得更加容易，因为它提供了关于函数的快速参考信息以及对数据库对象的自动填充功能。对于
    SQL Server 12，Management Studio 已基于 Visual Studio 框架构建，这在声明了此事实的启动屏幕上最为明显。


    默认情况下，Management Studio 环境由三个窗口组成。左侧是 `Object Explorer` 窗口；它允许您通过以服务器为根节点的树形视图查看所有已定义的对象。除了显示对象外，它还提供了用于执行管理和管理任务的向导及选项。`Object
    Explorer` 可用于连接多个实例以及 SQL Server 的不同引擎。对于数据库引擎，查询窗口是主要的访问方式。查询窗口默认位于中间，但可以拖动到屏幕上的任何位置，且不受
    Management Studio 窗口的限制。如果使用多个屏幕，可以将查询窗口移动到与 Management Studio 不同的屏幕上。


    *图 2-12. SQL Server Management Studio 的工具窗口*


    默认情况下，Management Studio 的设置有三个顶部栏：菜单栏、工具栏和上下文菜单。这些栏可以帮助您快速访问所需的对象和数据，而无需费力寻找选项。以下列表突出显示了常见的工具栏按钮：


    - `新建查询`：基于 `Object Explorer` 的上下文打开一个新的查询窗口。如果所选对象是数据库引擎的成员，查询将是 SQL 查询。如果对象是
    Analysis Services 数据库，查询将是 MDX 查询。查询将自动连接到所选对象所属的服务，或者使用当前查询窗口的连接信息。

    - `数据库引擎查询`：打开一个新的查询窗口并询问连接数据库所需的信息。执行和解析查询需要此连接。

    - `Analysis Services MDX 查询`：创建一个可查询多维数据集数据的新查询窗口。对于非 Analysis Services 开发人员，通过
    `Object Explorer` 使用 `浏览多维数据集` 选项可能就足够了。

    - `Analysis Services DMX 查询`：为数据挖掘表达式创建一个新的查询窗口。这些查询用于访问多维数据集上存在的数据挖掘模型。

    - `Analysis Services XMLA 查询`：为定义 Analysis Services 数据库对象创建一个新的查询窗口。此查询通常使用 BIDS
    开发，并针对 Analysis Services 运行以创建多维数据集。

    - `活动监视器`：打开一个显示服务器状态的窗口。可以修改刷新速率以所需的速度显示信息。图 2-13 展示了监视器跟踪的各种统计数据。


    *图 2-13. Management Studio 活动监视器*


    上下文菜单特定于当前选定的查询窗口。MDX 和 DMX 查询具有相同的菜单，而数据库引擎和 XMLA 查询的菜单略有不同。多维数据集查询与 T-SQL 查询之间的主要区别在于结果显示和执行计划选项，这些选项存在于
    T-SQL 查询中，而多维数据集查询中没有。因为 XMLA 不查询数据，而是定义执行分析的对象，所以它有一套完全不同的工具集。多维数据集和 T-SQL 查询都有以下工具：


    - `连接`：将断开的查询连接到适合查询类型的数据库。

    - `更改连接`：提示您输入连接信息，以更改正在查询的实例。

    - `可用数据库`：是一个下拉列表，包含当前实例上所有可用的数据库。

    - `执行`：这是迄今为止最常用的，执行当前窗口中的查询。如果高亮显示了部分代码，则仅执行高亮显示的代码。


    > **注意：** 执行中的错误通常会显示一个最有可能找到错误的行号。此行号是相对于语句开始的批处理的起始位置。第 10 行实际上可能是查询窗口中的第 30
    行。为了帮助定位错误，我们建议您通过“选项”菜单并选择“文本编辑器”来打开“行号”。

    - `解析`：这是另一个常用的功能，将解析查询以验证其语法是否正确。它不会验证对象是否存在。如果连接到 SQL Server 2008 或更高版本的实例，`IntelliSense`
    通常会提供一些错误高亮显示。

    - `注释掉选定行`：在当前或选定的每一行开头添加一个带有双连字符 (`--`) 的单行注释。

    - `取消注释选定行`：从当前或选定的每一行开头移除任何由双连字符 (`--`) 标记的单行注释。

    - `减少缩进`：从当前或选定的代码行开头移除任何现有的缩进。

    - `增加缩进`：在选定或当前代码行添加缩进。默认情况下，缩进是一个制表符，但可以通过“选项”菜单更改。

    - `为模板参数指定值`：弹出一个窗口，该窗口将用指定的值替换查询模板中的参数。该实用程序自动读取模板中定义的参数，如图 2-14 所示。SQL Server
    和 Analysis Services 都有大量可用模板。图 2-15 展示了这两者的模板。


    T-SQL 查询有几个其他查询类型没有的额外上下文选项。这些选项涉及输出结果和查询计划资源管理器。与 SQL 查询关联的按钮如下：


    - `显示估计的执行计划`：显示查询窗口中查询的估计查询计划。该计划以图形方式显示在输出屏幕底部其自己的选项卡“执行计划”中。在对查询进行性能调整时，此实用程序至关重要。

    - `查询选项`：打开一个“查询选项”窗口，允许您为查询执行和结果集设置某些选项。

    - `IntelliSense 已启用`：切换 `IntelliSense` 的开启和关闭。

    - `包含实际执行计划`：将查询计划与结果一起包含。此计划与估计计划的不同之处在于，它显示了查询优化器实际执行的操作。该计划显示在名为“执行计划”的选项卡中。

