    \ Services Project1\\Integration Services Project1'\n,'CH16_Apress_DynamicParentPackage'\n\
    ,20\n,0\n),\n(\n'CH16_Apress_DisabledChildPackage'\n,'C:\\Users\\SQL12\\Desktop\\\
    Integration Services Project1\\Integration Services Project1'\n,'CH16_Apress_DynamicParentPackage'\n\
    ,30\n,1\n),\n(\n'CH16_Apress_ChildPackage2'\n,'C:\\Users\\SQL12\\Desktop\\Integration\
    \ Services Project1\\Integration Services Project1'\n,'CH16_Apress_DynamicParentPackage'\n\
    ,40\n,0\n);\nGO\n```\n\n**NOTE:** The file system path is not so important if\
    \ the packages are stored on the server. In that case, the process will rely on\
    \ the project reference to locate the package. If your deployment strategy is\
    \ to store the packages on the file system, you will have modify this example\
    \ to include a `Script` task that will modify the connection string of the `Connection\
    \ Manager` used to locate the child package.\n\nAs you can see, this is the same\
    \ order of execution as we had in `CH16_Apress_StaticParentPackage`.\n\nWe kept\
    \ a gap of 10 between all the values of `ExecuteOrder`. With the data in place,\
    \ we can take a look at how the dynamic package works. Figure 16-4 shows the variables\
