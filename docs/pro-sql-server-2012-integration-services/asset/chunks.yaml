- fmt: '# CHAPTER 7 - SOURCE AND DESTINATION ADAPTERS


    We’ll choose the Flat File source and `<New>` connection manager from the Add
    New Source dialog box. Then we use the Flat File Connection Manager Editor to
    set the properties for the flat file and select a source file. As you can see
    in Figure 7-4, we chose a comma-delimited file named `zips.csv`, updated the connection
    manager name, and selected the Column Names in the First Data Row check box on
    the General page. We left the Locale, Code Page, and other options at their default
    values.


    On the Columns page of the editor, you have two options for flat files. You can
    change the row delimiter, which is the character or combination of characters
    that ends each line of the flat file, and you can change the column delimiter,
    which is the character or character combination that separates fields in the file.
    In this case, we’ve chosen the default `{CR}{LF}` (carriage return/line feed)
    combination for the row delimiter, and the Comma (`,`) for the column delimiter
    for `.csv` files. The Columns page also gives you a preview of the source data.
    Figure 7-5 highlights these options on the Columns page of the editor.


    > **NOTE:** The `{CR}{LF}` combination is a common row delimiter for Windows text
    files. Files generated on some other operating systems, such as Unix, use only
    the `{LF}` character as row delimiters. Keep this in mind when dealing with flat
    files generated by non-Windows systems.


    *Figure 7-5. Editing properties in the Columns page of the Flat File Connection
    Manager Editor*


    The Advanced page is the third page of the editor. On this page, you can change
    column-specific properties for your data source. You can change the `ColumnDelimiter`
    property for individual columns, so that one or more columns can have a special
    delimiter (useful if you have a single input column that needs to be split in
    two, for instance). You can also change the `DataType` for the column (default
    is string, or `DT_STR`) and the output column width (default is 50 for string).
    There are additional properties for `DataPrecision` and `DataScale`, which determine
    the number of total digits in a numeric (`DT_NUMERIC`) column and the number of
    digits after the decimal point, respectively. Figure 7-6 shows the Advanced page
    of the Flat File Connection Manager Editor.


    For our sample columns, properties were set as shown in Table 7-1.


    *Table 7-1. Sample Column Settings*


    | Column Name | DataType | OutputColumnWidth | ColumnDelimiter |

    | :--- | :--- | :--- | :--- |

    | ZIP | String [`DT_STR`] | | Comma (`,`) |

    | STATE | String [`DT_STR`] | | Comma (`,`) |

    | TOWN | String [`DT_STR`] | | Comma (`,`) |

    | LAT | Double-precision float [`DT_R8`] | -- | Comma (`,`) |

    | LON | Double-precision float [`DT_R8`] | -- | Comma (`,`) |


    *Figure 7-6. Editing column properties in the Advanced page of the Flat File Connection
    Manager Editor*


    ## PRECISION AND SCALE


    The `DataPrecision` and `DataScale` properties in the Flat File Connection Manager
    Editor’s Advanced page apply only to the numeric (`DT_NUMERIC`) and decimal (`DT_DECIMAL`)
    column data types. The precision of one of these columns is the total number of
    digits that can be held in a number being processed through the column. The precision
    of the number 123.45 is 5, for instance. The scale of a column is the number of
    digits allowed after the decimal point, so for 123.45, the scale is 2.


    For numeric columns, the precision can be set to a number between 0 and 38, and
    the scale can also be set to a value between 0 and 38. The precision of the decimal
    data type is always 29 (can’t be changed), and the scale can be set from 0 to
    28.


    After you configure the connection manager, the Source Assistant adds the appropriate
    type of source adapter to your data flow, as shown in Figure 7-7. The Flat File
    Connection Manager you created appears in the Connection Managers tab of the BIDS
    designer.


    *Figure 7-7. Flat File source adapter created by the Source Assistant*


    ## EDITING DATA FLOW COMPONENTS


    After you add a data flow component to the designer surface, you can edit it at
    any time by (1) double-clicking it, (2) right-clicking and choosing the Edit option,
    or (3) right-clicking and choosing the Show Advanced Editor option. The standard
    editor for most components is generally a simplified user interface that gives
    access to only the most common modified properties. The Advanced Editor provides
    access to all available properties of a data flow component, such as direct access
    to the output column and error output column properties. We cover the capabilities
    of the Advanced Editor in greater detail later in this chapter.


    ## Destination Assistant


    In addition to the new Source Assistant, SQL Server 12 SSIS also includes a new
    Destination Assistant.


    Whereas the Source Assistant guides you through adding source adapters to data
    flow, the Destination Assistant walks you through adding destination adapters.
    Just drag the Destination Assistant to the designer surface, and the Add New Destination
    dialog box, shown in Figure 7-8, appears. As in the Source Assistant dialog box,
    you can choose a type and connection manager for your new destination.


    You can also toggle the Show Installed Only check box to list only currently installed
    destination types or all supported types.


    *Figure 7-8. Add New Destination dialog box of the Destination Assistant*


    For this example, we chose the SQL Server destination type and `<New>` connection
    manager. The SQL Server destination type presents us with the OLE DB Connection
    Manager Editor, with the Native OLE DB\SQL Server Native Client 11.0 provider
    selected. This editor allows you to choose the server name, provide authentication
    credentials, and choose the database to log into, as shown in Figure 7-9.


    *Figure 7-9. Configuring the OLE DB Connection Manager*


    After you edit the connection manager properties, BIDS adds the appropriate destination
    adapter to your data flow, in this case an OLE DB destination. If there is a red
    `x` on the destination adapter, as shown in Figure 7-10, it means you need to
    configure additional properties of the destination adapter. In this case, we need
    to drag the green Flat File source adapter output path arrow and connect it to
    the OLE DB destination adapter and configure the destination adapter’s properties
    to point it at a table in a database.


    > **NOTE:** The OLE DB Connection Manager created by the Destination Assistant
    has a default name of the form `server_name.database_name`. You will probably
    want to change this to a friendlier name. Just right-click the connection manager
    in the Connection Managers tab and choose Rename from the context menu. In our
    example, we renamed the database connection manager to `Source_DB`.


    *Figure 7-10. OLE DB destination adapter created by the Destination Assistant*'
