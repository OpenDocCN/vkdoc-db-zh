    The Foreach loop container’s File Enumerator mode is very useful, but it is limited—it
    returns only file names and/or file paths. Files in the file system have a lot
    more metadata attached to them that can be useful for processing. Every file has
    a creation date and read-only flag attached to it, for instance. This information
    comes in handy if you want to process or archive files older than a specified
    date, or if you need to check whether a file is read-only before trying to delete
    it. We can get at this extra information by using a Script task.


