- fmt: '# CHAPTER 8: DATA FLOW TRANSFORMATIONS


    ## Character Map Transformation


    The Character Map transformation lets you apply string operations to inbound character
    data columns. For each selected column, you can choose one or more string operations
    to perform, such as converting a string to uppercase or lowercase. The Character
    Map Transformation Editor is relatively simple.


    In this editor, you select the columns you wish to update. You then decide whether
    the result of the operation should be placed in a new column or just replace the
    value in the same column (`in-place change`). You can change the name of the output
    column by changing the value in the `Output Alias` field.


    Finally, in the `Operation` field, you can choose the types of transformations
    to apply to the selected columns. Figure 8-7 shows the transformation editor.


    **Figure 8-7. Editing the Character Map transformation**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The Character Map transformation supports 10 string transformations you can perform
    on inbound data. You can choose more than one from the drop-down list to perform
    multiple transformations on an input column at once. In this example, we chose
    to use `Uppercase` selected string columns. The string operations you can choose
    from this transformation are listed in Table 8-3.


    **Table 8-3. Character Map Transformation Operations**


    | Operation | Description |

    | :--- | :--- |

    | Byte Reversal | Reverses byte order of Unicode characters |

    | Full Width | Changes single-byte characters to double-byte characters |

    | Half Width | Changes double-byte characters to upper-byte characters |

    | Hiragana | Maps Katakana characters to Hiragana characters |

    | Katakana | Maps Hiragana characters to Katakana characters |

    | Linguistic Casing | Applies linguistic casing rules; must be used in conjunction
    with Lowercase or Uppercase |

    | Lowercase | Changes all characters to lowercase |

    | Simplified Chinese | Maps Traditional Chinese characters to Simplified Chinese
    characters |

    | Traditional Chinese | Maps Simplified Chinese characters to Traditional Chinese
    characters |

    | Uppercase | Changes all characters to uppercase |


    Although you can choose more than one operation on a single column, some of these
    transformations are mutually exclusive, as shown in Table 8-4.


    **Table 8-4. Mutually Exclusive Character Map Operations**


    | If you choose... | You can''t also choose... |

    | :--- | :--- |

    | Full Width | Half Width, Lowercase, Uppercase |

    | Half Width | Full Width, Lowercase, Uppercase |

    | Hiragana | Katakana, Lowercase, Uppercase |

    | Katakana | Hiragana, Lowercase, Uppercase |

    | Linguistic Casing | Full Width, Half Width, Hiragana, Katakana, Simplified Chinese,
    Traditional Chinese, Byte Reversal |

    | Lowercase | Uppercase, Hiragana, Katakana, Half Width, Full Width |

    | Simplified Chinese | Traditional Chinese |

    | Traditional Chinese | Simplified Chinese |

    | Uppercase | Lowercase, Hiragana, Katakana, Half Width, Full Width |


    ## Copy Column Transformation


    The Copy Column transformation creates copies of columns you designate. Figure
    8-8 extends the example we’ve been working on to include a Copy Column transformation.


    ![](index-258_1.jpg)


    **Figure 8-8. Adding Copy Column to the data flow**


    The editor for this transformation is simple: just check off the columns you want
    to copy. The duplicated columns are named `Copy of <column name>` by default.
    You can edit the `Output Alias` field to change this to a more meaningful name
    if you choose to. The Copy Column transformation we’ve added will create a copy
    of the `Picture Name` column, as you can see in Figure 8-9.


    ![](index-259_1.jpg)


    **Figure 8-9. Editing the Copy Column transformation in the editor**


    ## Derived Column Transformation


    The Derived Column transformation is one of the most widely used, and flexible,
    row transformations available in SSIS. This transformation lets you create new
    columns, or replace existing columns, with values calculated from expressions
    that you create with the SSIS Expression Language. The `SSIS Expression Language`
    sports a powerful and flexible syntax supporting mathematical operators and functions,
    data type conversions, conditional expressions, string manipulation, and null
    handling.


    **NOTE:** We dive into the details of the `SSIS Expression Language` in Chapter
    9.


    To create a Derived Column transformation, we drag it from the toolbar and place
    it in the data flow between the source and destination. We’ll build on the previous
    example by adding a Derived Column transformation, as shown in Figure 8-10.


    ![](index-260_1.jpg)


    **Figure 8-10. Derived Column transformation in a simple data flow**


    The Derived Column transformation lets us define expressions, the results of which
    will be added to the output in new columns (or will replace existing columns).
    Figure 8-11 shows the Derived Column Transformation Editor as it appears in this
    example.


    ![](index-261_1.jpg)


    **Figure 8-11. Editing the Derived Column transformation**


    As you can see in the transformation editor, two columns have their values replaced
    with the results of expressions. The new columns are populated with the results
    of expressions, which are written in the `SSIS Expression Language`. This powerful
    language lets you perform mathematical calculations and string manipulation on
    variables, columns, and constants. The expressions we used for the `Picture Name`
    and `Copy of Picture Name` columns look like this:


    `"C:\\SampleData\\" + [Picture Name]`


    `"C:\\SampleData\\Backup\\" + [Picture Name]`


    These expressions use the string concatenation feature of `SSIS Expression Language`
    to prepend a file path to the picture name passed into the transformation. `SSIS
    Expression Language` uses C#-style syntax, including escape characters, which
    is why we had to double up the backslashes (`\`) in the expressions. The result
    is two full paths to files in the file system. Although these expressions are
    fairly simple and straightforward, we implemented a more complex derived column
    that calculates a letter grade based on the NYC Health Department grading scale.
    The result is stored in a new column that is added to the data flow, called `Grade`:


    ```

    (Restaurant_Violation_Points >= 28)?"C":(Restaurant_Violation_Points >= 14)?"B":"A"

    ```


    This expression uses the `conditional operator` (`?:`) to assign a grade to each
    restaurant based on the NYC Health Department grading scale. This scale assigns
    a grade of A to restaurants with 0 to 13 violation points, B to restaurants with
    14 to 27 violation points, and C to restaurants with 28+ points. The conditional
    operators in this example model those rules exactly.


    As you read the expression from left to right, you’ll notice the first Boolean
    expression (`Restaurant_Violation_Points >= 28`), which returns `True` or `False`.
    If the result is true, the conditional operator returns the value after the question
    mark (C, in this case). If the result is false, the second Boolean expression,
    (`Restaurant_Violation_Points >= 14`), is evaluated. If it returns `True`, B is
    returned; if `False`, A is returned.


    **NOTE:** The `SSIS Expression Language` is a powerful feature of SSIS. If you’re
    not familiar with the functions and operators we’ve used in this example, don’t
    fret. We cover these and more in a detailed discussion of the `SSIS Expression
    Language` in Chapter 9.


