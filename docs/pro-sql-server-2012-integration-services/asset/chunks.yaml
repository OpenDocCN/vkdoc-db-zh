- fmt: '# CHAPTER 3: HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    ## Package Annotations


    After taking a look at the properties set on the new package, one of the first
    things we recommend is adding an annotation to the package. This can be done by
    right-clicking on the background of the current designer view and selecting `Add
    Annotation`. Annotations can be used to document the package so that fellow developers
    can easily identify the purpose of the package without having to open and read
    through all the tasks. Thoroughly examining the packages can be saved for debugging
    time. The kind of information the annotations should contain is identified in
    Figure 3-1.


    *Figure 3-1\. Recommended annotation to control flow*


    The `Name` property represents the name of the current package. This is displayed
    in several places in Visual Studio, but with the vast improvements to the XML
    behind the SSIS packages, don’t be surprised if you have to look there for certain
    information. The annotation string itself is stored in the `CDATA` at the bottom
    of the package XML.


    The `Modified Date` simply dates the last set of changes made to the package.
    This piece will help in the absence of a code repository. The file system modified
    date is not always accurate in capturing actual changes to SSIS packages. Clicking
    the `OK` button on many of the designers as well as moving objects around in the
    designer tabs will cause Visual Studio to recognize changes even if there aren’t
    any functional changes. This can cause the file system to inaccurately represent
    functional changes to the packages.


    The `Purpose` property simply identifies the objectives of the package. Modular
    programming is characterized by having separate, interchangeable code blocks or
    modules. We cover some design patterns that will enable you to maintain this practice
    with SSIS 2012 in Section 2 of this book. The purpose covers the end state after
    the execution of the package—which data elements have been moved, which items
    have been moved around on the file system, the execution of stored procedures,
    and so forth. This is meant to be a high-level description rather than a detailed
    description but essentially will depend on your design of the ETL process.


    `Parameters` and `Variables` are related in that they can be used to pass values
    between packages. Parameters are external values that can be set prior to the
    execution of the package. Variables are internal mechanisms to pass information
    between packages. In prior versions of SQL Server Integration Services, variables
    served both purposes through configurations either by using configuration files
    to assign values or by inheriting values through parent variables. It is important
    to identify parameters because they are accessible to all the packages in a project;
    this construct becomes extremely useful when utilizing the parent-child package
    design. The parent package can automatically detect the parameters defined in
    the child package as well as assign which variables or parameters to pass along
    to it. Variables can now be used for the sole purpose of passing values among
    packages without modification from external processes. When assigning parameters
    and variables, they are available in the same drop-down list along with the system
    variables. You also have the option to write expressions to assign parameter values
    to variables. Variables are passed to a child package by reference rather than
    by value. Any modification made to the value will require a `Script` task in the
    child package to propagate the change back up to the parent package. There is
    an alternative to using the `Script` task to modify the parent package, which
    allows you to directly access the variable. However, this method also causes the
    executables accessing the variables within the child package to error during the
    runtime, when the child package is executed on its own. We discuss these options
    in Chapter 16.


    Variable listing is sensitive to the `Scope` of the variables. The scope of a
    variable can be from the package as a whole or within a specific container, task,
    or event handler. With multiple variables, you can easily lose track of them all,
    so the annotation can save a lot of digging around. The `Package Explorer` tab
    and the `Show Variables of All Scopes` option in the `Parameters and Variables`
    toolbar allow the same functionality, but with the annotation, you can document
    the role they play in the process.


    > **NOTE:** `Parameters`, `Variables`, and system variables are listed in the
    same drop-down list when they are being assigned. We recommend that you use namespaces
    to avoid any confusion. We discuss parameters and variables in complete detail
    in Chapter 10.


    ## Package Property Categories


    The package properties are divided into categories to group them by the function
    they provide. These categories are generally broad and contain a lot more configurable
    properties than the main ones outlined in the preceding section. These categories
    and their properties address some of the nonfunctional capabilities of SSIS 2012.
    We briefly introduce the categories here and provide more in-depth analysis in
    the later chapters:


    **`Checkpoint` properties** control the restart ability of SSIS package execution.
    You have to define a file path and name for the progress to be stored during execution.
    In the event of a failure, this file will be used to restart the process at the
    task at which it previously failed. This functionality by itself will not handle
    the rollback of committed data. After a successful execution, this file is automatically
    deleted.


    **`Execution` properties** define the runtime aspects of the package. These include
    the number of failures that the package can tolerate and how to treat the failures
    of nested containers with respect to the success of the parent container. Performance
    tuning can also start with the properties in this section. If memory overflows
    become an issue, the number of concurrent executables can be limited.


    **`Identification` properties** are used to uniquely recognize packages. These
    properties include some of the ones listed previously (specifically, `Name` and
    `ID`). Other information that the package can capture is the machine that it was
    executed on.


    The `ID` property provides a unique identifier for the package. This property
    becomes important when considering logging options. This `ID` will distinguish
    the packages that are run for a particular execution. A new identifier is generated
    when a new package is added to the project, but when an existing package is added
    or a package is copied and pasted in `Solution Explorer`, the identifier of the
    original package is carried over. This value is not directly modifiable, but there
    is an option to generate a new `ID`.


    `ProtectionLevel` manages the sensitive data stored in the package. By default,
    this property is set to `EncryptSensitiveWithUserKey`. This option encrypts the
    whole package with a key that will identify it with the current user. Only the
    current user will be able to load the package with all the information. Other
    users will see only blanks for usernames, passwords, and other sensitive data.
    We recommend using the `DontSaveSensitive` option, especially if multiple developers
    will be working on the same set of packages. Sensitive data can be stored in configuration
    files. We discuss the security aspects of developing and deploying packages in
    Chapter 19.


