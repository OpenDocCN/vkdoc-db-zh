    just to introduce the concept of adding .NET scripting to the control flow. The
    Script task lets you perform processing tasks that range from very simple to extremely
    complex, and they allow you to do things that are not always directly supported
    by the other stock control flow tasks. This section gives you a sample with a
    little more meat on it to demonstrate.


    For this example, we want to reference back to the Foreach loop container, discussed
    in Chapter 5.


