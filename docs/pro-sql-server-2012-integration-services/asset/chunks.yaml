    used to execute a single package in multiple environments. It is common to be
    required to develop a package in one environment, test in another, and finally
    deploy to production. This kind of scenario shows the true flexibility and power
    of using environments in SSIS.


    Parameters and environments are outlined in Chapter 19, with examples of dynamic
    package execution.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-569_1.jpg)


    CHAPTER 18  BUILDING ROBUST SOLUTIONS


    Accountability


    After a package has been deployed and running for some time, you often have to
    see how each task is fairing “in the wild.” I often get requests as to the total
    or average number of rows that are passed through a single data flow or how long
    a single task is taking. Although it can be easy to ascertain package run times
    that are scheduled within a SQL Server agent, separating task times and counts
    is not as simple.


    Log Providers


    Chapter 11 outlined configuring log providers and the saving of package execution
    information within a specific provider, XML, SQL, CSV, and so forth. Log providers
    can also be used to provide general task metrics, such as execution time. Log
    providers enable you to capture information that is raised by an event handler.
    For example, selecting the OnPreExecute and OnPostExecute events provides a means
    of tracking the general start and end time of tasks within a package.


    Configuration of log providers is done from within the control flow pane by right-clicking
    and choosing Log Providers. The initial window requires defining the executable
    to log and in which format the log is to be written, such as XML, SQL or any supported
    format. After the executable and destination is configured, the event handlers
    can be selected, as well as the specific columns to collect. Figure 18-12


    illustrates the event handlers available through the log provider.


    *Figure 18-12\. Log provider events*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-570_1.jpg)


    CHAPTER 18  BUILDING ROBUST SOLUTIONS


    Using a SQL log provider for the selected events allows querying the data to find
    the specific task durations. Each package has its own GUID, as does each task,
    so utilizing a common table expression with the DATEDIFF function quickly returns
    the associated task’s execution time. The following query uses the table created
    through the log shipping configuration to find the difference between the start
    and end time of the specific package identified by its GUID. The results are displayed
    in Figure 18-13.


    WITH eventexecution


    AS(


    SELECT sourceid ,


    starttime


    FROM sysssislog


    WHERE executionid = ''B0885A09-A1BA-4638-9999-29698F357B40''


    AND event = ''OnPreExecute''


    )


    SELECT source,


    DATEDIFF(SECOND, c.starttime, endtime) AS ''seconds''


    FROM sysssislog s JOIN eventexecution c


    ON s.sourceid = c.sourceid


    WHERE event = ''OnPostExecute'';


    GO


    *Figure 18-13\. Task duration query results*


    Custom Logging


    Although log providers can capture a great deal of information in regards to package
    execution, some measures are missed, such as data flow row counts. Another common
    request is to show the total rows affected in a Data Flow task over time. Counts
    such as this are not included in SSIS log providers but can still be captured
    using custom logging.


    The first step is creating a table that will hold the custom logged information,
    which in this example will be the package GUID, package name, task name, destination
    name, number of rows, and the date the task ran. For example:


    IF NOT EXISTS(SELECT * FROM sys.tables WHERE name = ''SSISCounts'')


    BEGIN


    CREATE TABLE SSISCounts(


    ExecGUID NVARCHAR(50),


    PackageName NVARCHAR(50),


    TaskName NVARCHAR(50),


    DestinationName NVARCHAR(50),


    NumberRows INT,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-571_1.jpg)


    ![](index-571_2.jpg)


    CHAPTER 18  BUILDING ROBUST SOLUTIONS


    DateImported DATETIME2)


    END;


    GO


    A package-level variable needs to be created that will hold the row count of all
    Data Flow tasks that is of a data type integer. Each Data Flow task should include
    a Row Count transformation immediately before the destination that uses the package-level
    variable to record imported rows.


    *Figure 18-14\. Row count transformation*


    Finally, in the PostExecute event handler of the Data Flow tasks, create an Execute
    SQL task that will insert the appropriate information using both system and user-defined
    variables. Clicking the event handlers opens the EventHandlers pane and provides
    two drop-downs, Executable and Event Handler, as shown in Figure 18-15\. After
    the executable is selected, the desired event handler can be selected and the
    specific task can be placed on the pane.


    *Figure 18-15\. Execute SQL task parameter configuration*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-572_1.jpg)


    CHAPTER 18  BUILDING ROBUST SOLUTIONS


    The Execute SQL task will be used to insert the count information from the Data
    Flow task with information that is system provided and user provided. The system-provided
    information is the package GUID, name, task, and the row count, and the database
    and time will be supplied within the query. The SQLStatement property should be
    set to utilize the parameters that will be defined in the task by using a question
    mark (?), as shown in the following code:


    INSERT SSISCounts


    VALUES(?, ?, ?, ''AdventureWorks2012DW'', ?, SYSDATETIME())


    The parameters should be organized in the same ordinal position as they appear
    in the query in the Execute SQL Task Editor. Figure 18-16 depicts the parameter
    configuration. Note that the parameter name is replaced with the index position
    of the variables as they appear in the insert statement.


    *Figure 18-16\. Execute SQL task parameter configuration*


    There is typically confusion in the mapping of the parameters to the ? in the
    SQL statement property. From the preceding figure, remember that the first parameter
    defined, in this case ExecutionInstanceGUID, will go where the first question
    mark occurs, and each parameter will follow in order. The insert statement could
    be rewritten, for demonstration purposes only, to better visualize this, as shown
    in the following code:


    INSERT SSISCounts


    VALUES(ExecutionInstanceGUID, PackageName, TaskName,


    ''AdventureWorks2012DW'', RowCount, SYSDATETIME())


    The preceding example demonstrates that using both system and user-defined variables
    in cooperation with event handlers can provide a means of custom logging. The
    information contained within the SSISCounts table can be used to establish a means
    of tracking the number of records added by the data flow and tracking the specific
    tasks.


    Summary


    This chapter presented ways to ensure durability, portability, and resiliency
    in SSIS packages and tasks.


    Many of the methods discussed in this chapter are extensions of features that
    are outlined throughout this book. The key concept to creating robust solutions
    is to do the following:


    


    Plan for the unknown.


    


    Proactively handle possible errors.


    


    Provide error redirection for data flow.


    


    Configure packages and tasks to be portable.


    


    Record error and metric package and task information.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 19**


    **Deployment Model**


    *Program testing can b e used to show the presence of bugs, but never to show
    their* *absence!*


    —Computer scientist Edsger Dijkstra


    Version 2012 of SQL Server Integration Services introduces an entirely new way
    to deploy ETL processes.'
  trans: "\n环境允许将参数映射到其变量，并可用于在多种环境中执行单个包。通常需要在一个环境中开发包，在另一个环境中测试，最后部署到生产环境。这类场景体现了在\
    \ SSIS 中使用环境的真正灵活性和强大功能。\n\n参数和环境在第 19 章概述，并提供了动态包执行的示例。\n\n## 第 18 章 – 构建健壮的解决方案\n\
    \n### 可追溯性\n\n在包部署并运行一段时间后，你经常需要查看每个任务“在实际运行中”的表现。我经常收到请求，要求查看通过单个数据流传递的总行数或平均行数，或者单个任务耗时多久。虽然对于在\
    \ SQL Server 代理中计划的包，其运行时间很容易确定，但要分离任务时间和计数却不那么简单。\n\n### 日志提供程序\n\n第 11 章概述了如何配置日志提供程序以及将包执行信息保存到特定提供程序中，如\
    \ XML、SQL、CSV 等。日志提供程序也可用于提供通用的任务指标，例如执行时间。日志使你能够捕获事件处理程序引发的信息。例如，选择 `OnPreExecute`\
    \ 和 `OnPostExecute` 事件提供了一种跟踪包内任务大致开始和结束时间的方法。\n\n日志提供程序的配置在控制流窗格中完成，方法是右键单击并选择\
    \ `日志提供程序`。初始窗口需要定义要记录的可执行文件以及日志的写入格式，例如 XML、SQL 或任何支持的格式。配置好可执行文件和目标后，可以选择事件处理程序以及要收集的特定列。图\
    \ 18-12 说明了通过日志提供程序可用的事件处理程序。\n\n*图 18-12. 日志提供程序事件*\n\n对选定事件使用 SQL 日志提供程序，可以查询数据以找到特定的任务持续时间。每个包都有自己的\
    \ `GUID`，每个任务也是如此，因此使用带有 `DATEDIFF` 函数的公用表表达式可以快速返回相关任务的执行时间。以下查询使用通过日志传送配置创建的表，查找由其\
    \ `GUID` 标识的特定包的开始和结束时间之间的差值。结果如图 18-13 所示。\n\n```sql\nWITH eventexecution\nAS(\n\
    \    SELECT sourceid,\n           starttime\n    FROM sysssislog\n    WHERE executionid\
    \ = 'B0885A09-A1BA-4638-9999-29698F357B40'\n      AND event = 'OnPreExecute'\n\
    )\nSELECT source,\n       DATEDIFF(SECOND, c.starttime, endtime) AS 'seconds'\n\
    FROM sysssislog s JOIN eventexecution c\n    ON s.sourceid = c.sourceid\nWHERE\
    \ event = 'OnPostExecute';\nGO\n```\n\n*图 18-13. 任务持续时间查询结果*\n\n### 自定义日志记录\n\n\
    尽管日志提供程序可以捕获大量有关包执行的信息，但有些指标会被遗漏，例如数据流行数。另一个常见的请求是显示 `数据流` 任务随时间影响的总行数。此类计数未包含在\
    \ SSIS 日志提供程序中，但仍然可以使用自定义日志记录来捕获。\n\n第一步是创建一个表来保存自定义日志信息，在本例中将包括包 `GUID`、包名称、任务名称、目标名称、行数以及任务运行的日期。例如：\n\
    \n```sql\nIF NOT EXISTS(SELECT * FROM sys.tables WHERE name = 'SSISCounts')\n\
    BEGIN\n    CREATE TABLE SSISCounts(\n        ExecGUID NVARCHAR(50),\n        PackageName\
    \ NVARCHAR(50),\n        TaskName NVARCHAR(50),\n        DestinationName NVARCHAR(50),\n\
    \        NumberRows INT,\n        DateImported DATETIME2)\nEND;\nGO\n```\n\n需要创建一个包级变量，该变量将保存所有\
    \ `数据流` 任务的行计数，数据类型为整数。每个 `数据流` 任务都应包含一个 `行计数` 转换，紧接在目标之前，该转换使用包级变量来记录导入的行数。\n\
    \n*图 18-14. 行计数转换*\n\n最后，在 `数据流` 任务的 `PostExecute` 事件处理程序中，创建一个 `执行 SQL` 任务，该任务将使用系统变量和用户定义变量插入适当的信息。单击事件处理程序将打开\
    \ `事件处理程序` 窗格，并提供两个下拉列表：`可执行文件` 和 `事件处理程序`，如图 18-15 所示。选择可执行文件后，可以选择所需的事件处理程序，并将特定任务放置在窗格上。\n\
    \n*图 18-15. 执行 SQL 任务参数配置*\n\n将使用 `执行 SQL` 任务，通过系统提供和用户提供的信息，从 `数据流` 任务插入计数信息。系统提供的信息是包\
    \ `GUID`、名称、任务和行计数，数据库和时间将在查询中提供。`SQLStatement` 属性应设置为使用将在任务中定义的参数，方法是使用问号 (`?`)，如下列代码所示：\n\
    \n```sql\nINSERT SSISCounts\nVALUES(?, ?, ?, 'AdventureWorks2012DW', ?, SYSDATETIME())\n\
    ```\n\n参数应按照它们在查询中出现的顺序，在 `执行 SQL 任务编辑器` 中以相同的序数位置进行组织。图 18-16 描绘了参数配置。请注意，参数名称被替换为变量在插入语句中出现的索引位置。\n\
    \n*图 18-16. 执行 SQL 任务参数配置*\n\n在将参数映射到 SQL 语句属性中的 `?` 时通常存在困惑。根据上图，请记住，定义的第一个参数（在本例中为\
    \ `ExecutionInstanceGUID`）将出现在第一个问号出现的位置，每个参数将按顺序出现。为了便于演示，插入语句可以重写，以便更好地可视化这一点，如下列代码所示：\n\
    \n```sql\nINSERT SSISCounts\nVALUES(ExecutionInstanceGUID, PackageName, TaskName,\n\
    \       'AdventureWorks2012DW', RowCount, SYSDATETIME())\n```\n\n前面的示例演示了，通过事件处理程序配合使用系统变量和用户定义变量，可以提供一种自定义日志记录的方法。`SSISCounts`\
    \ 表中的信息可用于建立跟踪数据流添加的记录数以及跟踪特定任务的方法。\n\n### 小结\n\n本章介绍了确保 SSIS 包和任务的持久性、可移植性和弹性的方法。\n\
    \n本章讨论的许多方法都是本书通篇概述的功能的扩展。创建健壮解决方案的关键概念是：\n\n-   为未知情况做计划。\n-   主动处理可能发生的错误。\n\
    -   为数据流提供错误重定向。\n-   配置包和任务以使其可移植。\n-   记录错误和度量包及任务信息。\n\n## 第 19 章 – 部署模型\n\n\
    *程序测试可用于显示错误的存在，但永远无法显示其不存在！*\n\n—计算机科学家 艾兹格·迪科斯彻\n\nSQL Server Integration Services\
    \ 2012 版引入了一种全新的部署 ETL 过程的方式。\n"
- fmt: '# 部署模型


    在之前的版本中，单个包是部署对象。而在新的部署模型中，整个项目成为了部署对象。正如前面章节所述，参数和项目级连接管理器的引入促成了这种新的部署模型。这种新模型的一个优势是，它允许您在
    SQL Server 中创建具有特定参数值的环境。正如 Edsger Dijkstra 所言，程序测试的目的不是为了证明没有错误，而利用这种新部署模型模拟环境的能力，应该能极大地加快潜在错误的检测速度。


    本章将指导您完成项目的部署。此外，它还展示了如何将传统的 SSIS 项目升级到新的部署模型。为了执行 ETL 过程，我们将演示如何使用环境。


    ## 构建过程


    `build process` 准备项目以供部署。它会创建一个部署实用程序来自动化这个过程。构建过程将包和对象复制到指定位置，以便部署实用程序在部署过程中能够识别它们。Visual
    Studio 中项目文件的属性窗口（如图 19-1 所示）允许您定义要复制对象的路径。活动配置允许您控制构建文件输出到哪个位置。每个配置都在输出路径内创建自己的文件夹结构。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-574_1.jpg)


    ![](index-574_2.jpg)


    图 19-1. 项目属性页 - 构建属性


    `Configuration Manager` 按钮会打开如图 19-2 所示的 `Configuration Manager`。此管理器允许您为构建过程创建多个配置。在您能创建的多个配置中，必须将一个分配为解决方案的默认配置。该管理器还允许您定义解决方案平台。在此特定示例中，`Development`
    配置是我们解决方案的活动配置。我们通过选中 `Build` 列中的复选框，基于此配置进行构建。


    图 19-2. 项目配置管理器


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    在所有包开发完成后，您需要使用 Visual Studio 中的 `Build` 实用程序来构建项目及其文件。`Build` 实用程序在 Visual Studio
    后台运行，可以通过在 Visual Studio 解决方案资源管理器中右键单击项目文件并选择 `Build`，或者转到 `Build` 菜单并选择 `Build
    *project name*` 来访问。当您第一次构建项目时，如果指定为输出路径的目录尚不存在，它将被创建。


    在此文件夹路径内，您会找到一个为活动解决方案配置指定的文件夹。该文件夹将包含一个 `*project name*.ispac` 文件，即 Integration
    Services 项目部署文件。此文件包含部署实用程序，可以将项目部署到 Integration Services 目录。


    除了生成 `OutputPath` 外，项目文件所在的文件夹也会创建一个文件夹路径来存储所有构建的对象。这个名为 `obj` 的文件夹包含一个活动解决方案配置的子文件夹。在此文件夹内，您会看到每个包和项目参数、项目连接管理器、项目文件以及输出日志文件对应的文件。


    ## 部署过程


    项目构建完成后，您可以选择将其部署到 SQL Server 实例上的 Integration Services 目录。双击活动解决方案配置文件夹中的 `.ispac`
    文件可确保您部署的是对象的最新构建版本。部署项目的另一种方法是，在 Visual Studio 解决方案资源管理器中右键单击项目文件并选择 `Deploy`。


    在将项目部署到 Integration Services 目录之前，您需要在 SQL Server 实例上启用公共语言运行时（`CLR`）集成。运行清单 19-1
    中显示的代码将启用 `CLR` 集成。如果您不知道 `CLR` 是否已启用，可以简单地运行 `sp_configure` 查看可用选项。


    ### 清单 19-1. 启用 CLR 集成


    ```

    sp_configure ''clr enabled'', 1;

    GO

    RECONFIGURE;

    GO

    ```


    启用 `CLR` 集成后，您可以通过在 SQL Server 实例上右键单击 `Integration Services` 文件夹并选择 `Create Catalog`
    来创建 Integration Services 目录。如图 19-3 所示的向导将指导您完成创建目录的过程。数据库的默认名称是 `SSISDB`，不能重命名。如果您没有运行清单
    19-1 中启用 `CLR` 集成的脚本，也可以使用此向导来启用此功能。目录创建在 SQL Server 实例的 `Databases` 文件夹中。


    > **注意：** 为了创建 Integration Services 目录，您必须提供密码。请务必保存此密码，并制定一些流程来定期备份加密密钥。此密码用于加密包可能包含的敏感数据，具体取决于您选择的保护级别。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-576_1.jpg)


    图 19-3. 创建目录向导


    目录创建完成后，您需要在其中创建文件夹来存储已部署的项目。您可以通过展开 `Integration Services` 树到目录级别来创建这些文件夹。在目录上，您可以右键单击并选择
    `Create Folder`。如图 19-4 所示的 `Create Folder` 向导将协助您创建每个文件夹。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-577_1.jpg)


    图 19-4. 创建文件夹向导


    在您需要的文件夹就位后，您的对象资源管理器应类似于图 19-5。`Projects` 和 `Environments` 子文件夹会在指定的文件夹内自动创建。所有部署到
    `SSIS 12` 文件夹的项目都将列在 `Projects` 子文件夹中。环境将在本章后面讨论。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-578_1.jpg)


    图 19-5. 对象资源管理器的 Integration Services 树


    文件夹结构就位后，Integration Services 部署向导将指导您完成整个部署过程。图 19-6 显示了向导的“选择源”页面。此页面允许您指定要部署的项目的位置。项目本身定义在项目部署文件或
    Integration Services 目录中。此页面允许您部署不同于解决方案资源管理器中活动项目或选定的 `.ispac` 文件的另一个项目。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-579_1.jpg)


    图 19-6. Integration Services 部署向导的“选择源”页面


    `Integration Services Catalog` 选项允许您将项目直接从一个 SQL Server 实例部署到另一个实例。`Project Deployment
    File` 选项是将项目对象从文件系统移动到 Integration Services 目录的唯一选项。指定要部署的项目后，您需要在“选择目标”页面（如图
    19-7 所示）确定该项目在目标服务器上的位置。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-580_1.jpg)'
  raw: 'In prior versions, the individual package was the deployed object. With the
    new deployment model, the entire project becomes the deployed object. As noted
    in previous chapters, the inclusion of parameters and project-level connection
    managers facilitate this new deployment model. One of the advantages of this new
    model is that it enables you to create environments within SQL Server with specific
    values to be used for parameters. Just as Edsger Dijkstra suggests that program
    testing is not meant to show the absence of bugs, the ability to emulate environments
    with this new deployment model should greatly expedite detecting potentital bugs.


    This chapter guides you through deploying a project. In addition, it shows you
    how to upgrade your legacy SSIS projects to the new deployment model. For the
    execution of the ETL process, we will demonstrate how to use environments.


    The Build Process


    The *build process* prepares your project for deployment. It creates a deployment
    utility that will automate the process. The build process copies packages and
    objects to specified locations so that the deployment utility can identify them
    during the deployment process. The properties window of the project file in Visual
    Studio, shown in Figure 19-1, allows you to define the path for the objects to
    be copied. The active configuration allows you to control which output receives
    the build files. Each configuration creates its own folder structure within the
    output path.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-574_1.jpg)


    ![](index-574_2.jpg)


    CHAPTER 19  DEPLOYMENT MODEL


    *Figure 19-1\. Project Property Pages—Build properties*


    The Configuration Manager button opens the Configuration Manager shown in Figure
    19-2\. This manager allows you to create multiple configurations to use for your
    build processes. Of the multiple configurations you can create, you must assign
    one as the default configuration for your solution. The manager also allows you
    to define the solution platform. In this particular example, the Development configuration
    is our active configuration for the solution. We base our builds on this configuration
    by selecting the check box in the Build column.


    *Figure 19-2\. Project Configuration Manager*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19  DEPLOYMENT MODEL


    After the development is complete on all the packages, you need to use the Build
    utility within Visual Studio to build the project and its files. The Build utility
    works behind the scenes of Visual Studio and can be accessed by either right-clicking
    the project file in the Visual Studio Solution Explorer and selecting Build or
    by going to the Build menu and selecting Build *project name*. When you build
    a project for the first time, the directory specified as your output path will
    be created if it does not exist already.


    Inside this folder path, you will find a folder designated for the active solution
    configuration. This folder will contain a *project name*.ispac file, or Integration
    Services Project Deployment file. This file contains the deployment utility and
    can deploy the project to an Integration Services catalog.


    In addition to the OutputPath being generated, the folder with the project file
    itself will create a folder path to store all the built objects. This folder,
    named obj, contains a subfolder for the active solution configuration. Within
    this folder, you will see a file for each of the packages and project parameters,
    the project connection managers, the project file, and the output log file.


    The Deployment Process


    After the project has been built, you will have the option to deploy to an Integration
    Services catalog on a SQL Server instance. Double-clicking the .ispac file in
    your active solution configuration’s folder will ensure that you deploy the latest
    build of your objects. The other approach to deploying your project is to right-click
    the project file in the Visual Studio Solution Explorer and select Deploy.


    Prior to deploying a project to an Integration Services catalog, you need to enable
    Common Language Runtime (CLR) integration on the SQL Server instance. Running
    the code shown in Listing 19-1 will enable CLR integration. If you do not know
    whether CLR is enabled, you can simply run sp_configure to see the available options.


    *Listing 19-1\. Enabling CLR Integration*


    sp_configure ''clr enabled'', 1;


    GO


    RECONFIGURE;


    GO


    After CLR integration is enabled, you can create the Integration Services catalog
    by right-clicking the Integration Services folder on the SQL Server instance and
    selecting Create Catalog. A wizard, shown in Figure 19-3, guides you through the
    process of creating the catalog. The default name of the database is SSISDB and
    cannot be renamed. If you did not run the script in Listing 19-1 enabling CLR
    integration, the wizard can be used to enable this feature. The catalog is created
    in the databases folder of the SQL


    Server instance.


     **CAUTION:** In order to create the Integration Services catalog, you must provide
    a password. Make sure to save the password and have some process for backing up
    the encryption key frequently. This password is used to encrypt sensitive data
    that packages may contain, depending on the protection level that you choose.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-576_1.jpg)


    CHAPTER 19  DEPLOYMENT MODEL


    *Figure 19-3\. The Create Catalog Wizard*


    With the catalog in place, you will have to create folders within it to store
    the deployed projects. You can create these folders by expanding the Integration
    Services tree to the catalog level. On the catalog, you can right-click and select
    Create Folder. The Create Folder Wizard, shown in Figure 19-4, will assist you
    in creating each folder.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-577_1.jpg)


    CHAPTER 19  DEPLOYMENT MODEL


    *Figure 19-4\. The Create Folder Wizard*


    After you have the folders that you need in place, your Object Explorer should
    look similar to Figure 19-5\. The Projects and Environments subfolders are automatically
    created within the specified folder. All the projects that are deployed to the
    SSIS 12 folder will be listed in the Projects subfolder. We discuss the environments
    later in this chapter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-578_1.jpg)


    CHAPTER 19  DEPLOYMENT MODEL


    *Figure 19-5\. Object Explorer’s Integration Services tree*


    After the folder structure is in place, the Integration Services Deployment Wizard
    will guide you through the entire deployment process. Figure 19-6 shows the Select
    Source page of the wizard. This page allows you to specify the location of the
    project you want to deploy. The project itself is defined within either a project
    deployment file or Integration Services catalog. This page allows you to deploy
    a different project than the active project in the Solution Explorer or the selected
    .ispac file.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-579_1.jpg)


    CHAPTER 19  DEPLOYMENT MODEL


    *Figure 19-6\. The Select Source page of the Integration Services Deployment Wizard*
    The Integration Services Catalog option allows you to deploy a project directly
    from one instance of SQL Server to another instance. The Project Deployment File
    option is the only option to move project objects from a file system to an Integration
    Services catalog. After you specify the project you want to deploy, you have to
    determine the destination of that project on the Select Destination page, shown
    in Figure 19-7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-580_1.jpg)


    CHAPTER 19  DEPLOYMENT MODEL'
