    as shown in Figure 7-17.


    *Figure 7-17\. Configuring the OLE DB Destination Editor to output to a table*
    222


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    With the OLE DB Destination Editor, you can configure exactly where your data
    is going as well as some of the properties that determine how that data gets there.
    Table 7-3 is a breakdown of the OLE DB


    Destination Editor.


    *Table 7-3\. OLE DB Destination Editor Dialog Box Controls*


    **Control Description**


    OLE DB Connection Manager drop-down


    Lets you choose an OLE DB Connection Manager


    to use as a destination for your data. Here we


    chose the Dest_DB connection manager.


    Data Access Mode drop-down


    Determines how the source adapter sends data to


    the OLE DB destination. This drop-down has five


    options:


    --


    Table or View mode lets you choose the name of a


    table or view in the database to send data to. This


    mode incurs a lot of overhead because it generates


    an INSERT statement for every row sent to the


    destination.


    --


    Table or View – Fast Load mode uses the OLE DB


    fast load option. The fast load option uses the OLE


    DB IRowsetFastLoad interface to perform an in-


    memory *bulk copy* of your data. In fast load mode,


    SSIS queues up rows in memory and sends them


    to the server in batches. This can be a significant


    performance boost over the normal access modes.


    --


    Table Name or View Name Variable mode lets


    you store the name of a table or view in a string


    variable, to be used at runtime. Like Table or View


    mode, this mode generates an INSERT statement


    per row.


    --


    Table Name or View Name Variable – Fast Load


    mode uses the OLE DB fast load option to send


    data to a table or view whose name is stored in a


    variable. Like the other fast load option, this access


    mode batches rows before sending them to the


    server.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    **Control Description**


    --


    SQL Command mode often trips people up when


    they first see it. You might imagine it providing you


    a way to give a parameterized INSERT or UPDATE


    statement; in reality, it gives you a way to define a


    “virtual view” to insert data into. If you use this


    option at all, it will probably be with a simple


    SELECT from a table.


    --


    In this example, we chose the commonly used


    Table or View – Fast Load mode. The Table or View


    mode is also used often. The From Variable and


    SQL Command modes are usually reserved for


    special-purpose situations.


    Keep Identity check box


    In the fast load modes, this option populates an


    identity column with values from the source.


    Keep Nulls check box


    Also a fast load option, this determines whether


    source column nulls are inserted as nulls in the


    destination column when the destination column


    has a default constraint applied to it.


    Table Lock check box


    Another fast load option to lock the destination


    table during the load. This can improve


    performance, but prevents other processes from


    accessing the table during the load.


    Check Constraints check box


    When on, the check constraints on the target table


    are checked as the data is loaded.


    Rows per Batch


    Rows per Batch is used to optimize memory usage


    during the fast load operation. We find setting this


    value to 50000–100000 generally works well,


    although you might play with the value to find an


    optimal setting for your configuration.


    Maximum Insert Commit Size


    This value sets the maximum batch size the OLE


    DB destination queues up before it tries to commit


    the data to the server. We generally set this value


    to the same as the Rows per Batch setting.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-225_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


     **NOTE:** Generally we set Rows per Batch and Maximum Insert Commit Size to
    a value between 50000 and 100000\. We recommend setting these values to something
    other than the defaults. Setting these to nondefault values will help the provider
    optimize its memory usage and avoid some issues reported with older versions of
    some OLE DB providers.


    A successful run of this package results in a screen like the one shown in Figure
    7-18.


    *Figure 7-18\. Successful OLE DB source to OLE DB destination package execution*
    225


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    ADO.NET


    The ADO.NET source and destination adapters allow you to create managed .NET SqlClient
    connections. Because they are managed code, these types of connections tend to
    provide weaker performance than their native-mode OLE DB counterparts overall.
    On the other hand, they are easier to access and manage programmatically from
    within .NET code, such as Script tasks and script components, precisely because
    they are managed. In many cases, particularly when small numbers of rows are involved,
    the performance difference between ADO.NET and OLE DB source and destination adapters
    is negligible.


    The ADO.NET source adapter has a simplified interface that allows you to choose
    an ADO.NET


    connection manager and one of two access modes: Table or View mode or SQL Command
    mode. Unlike the OLE DB source adapter, parameters are not supported with the
    ADO.NET source adapter.


     **TIP:** Although you can’t parameterize an ADO.NET source adapter, you can
    set the SqlCommand property for the component to an expression. You can access
    this property via the Data Flow task properties. We discuss SSIS


    expressions in detail in Chapter 9.


    The ADO.NET destination adapter also has a simple interface. It allows you to
    choose an ADO.NET


    Connection Manager and a table or view to send output to. There is an additional
    check box to Use Bulk Insert When Possible, which will take advantage of memory-based
    bulk copy, similar to the OLE DB


    IRowsetFastLoad interface.


    SQL Server Destination


    The SQL Server destination adapter provides high-speed bulk insert, similar to
    the Bulk Insert task. The main difference is that, unlike the Bulk Insert task
    that sits in the control flow, the SQL Server destination sits at the end of a
    data flow—so you can transform your data prior to bulk loading it. Another difference
    is that the SQL Server destination doesn’t read its source data from a file. Instead
    it bulk loads from shared memory, which means you can’t use it to load data to
    a remote server.


    SQL Server Compact


    SSIS has a SQL Server Compact destination adapter that lets you send data to a
    SQL Server Compact Edition (CE) instance. One thing to keep in mind when connecting
    to SQL Server CE is that only a 32-bit driver is available.


    Files


    Flat files and databases are arguably the most common sources and destinations
    used in SSIS packages, which is why we started this chapter with a detailed discussion
    of these two classes of adapters.


    However, there are still more file-based sources and destinations available. We
    discuss these source and destination adapters, and their properties, in this section.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-227_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    Flat Files'
