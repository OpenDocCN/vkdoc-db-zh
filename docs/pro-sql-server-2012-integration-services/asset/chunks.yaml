    CHAPTER 2  BIDS AND SSMS


    Include Client Statistics displays the client statistics in a tab called Client
    Statistics. This utility will actually record the statistics from different executions
    of the queries, showing changes from each execution as well as averages for


    each statistic.


    Results to Text outputs the results from the queries as text output. The output
    is space delimited and can be hard to read, but in the absence of a spreadsheet
    program, it is the easiest way to transmit the results of a query.


    Results to Grid displays the results in a grid format that can be easily copied
    to Excel or another spreadsheet editor. The result set can be copied entirely,


    specific columns or specific records at a time.


    Results to File outputs the results directly to a specified file. The file needs
    to be defined with each execution of the query. The default format for the result


    set is a report file (.rpt).


    For the XMLA query, the context menu is mainly composed of XML editor options.
    These are meant to help close the current tags and give information about the
    current attribute of the object.


    SQL Server Management Studio Project


    Just as in BIDS, SSMS supports projects. These projects, however, are limited
    to three types: SQL Server scripts, consisting of T-SQL scripts; Analysis Services
    scripts, consisting of MDX, DMX, and XMLA scripts; and SQL Server Compact Edition
    scripts. The projects consist of three parts: Connections, Queries, and Miscellaneous.
    The following list provides a brief description of these parts: Connections stores
    all the connections related to the project. After the


    connection has been created, queries can be created with the connection set


    without having to use the Object Explorer. If a connection isn’t created


    independently, connections made for a query in the projectare automatically


    added.


    Queries contains all the queries associated with the project. Depending on the


    type of the project, only the supported files can be added to this folder (for


    example, .sql for SQL Server).


    The connection information of the queries is stored within the project file (.ssmssqlproj
    or.ssmsasproj) itself. Just as with BIDS, the project files contain vital information.
    For Management Studio projects, they contain information such as time-out periods,
    the queries contained, and the connection information for the queries. Opening
    a query included in a project will open it with the connection to the server it
    was originally connected to.


    Templates


    SQL Server Management Studio provides many templates to store common DDL and DCL
    statements.


    These statements exist for both SQL Server and Analysis Services; the templates
    are shown in Figure 2-14\. The templates contain parameters that are easily replaceable
    using a utility known as Specify Values for Template Parameters, shown in Figure
    2-15\. This utility performs similar functionality to Search and Replace, but
    is built specifically to identify all the parameters and to display them all in
    one place. The templates are stored in a treestructure with the template type
    at the root. To access the Template Explorer, you can select View from the toolbar
    and click Template Window. At the top-left corner of the 37


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-41_1.jpg)


    CHAPTER 2  BIDS AND SSMS


    window, you will see two buttons that will allow you to open either SQL Server
    templates or Analysis Services templates. The templates open as new query windows.


    *Figure 2-14\. Code templates in Management Studio*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-42_1.jpg)


    CHAPTER 2  BIDS AND SSMS


    After expanding to the tree that you desire, you can add the template to a query
    window by simply double-clicking it. After the template is open, the Specify Values
    for Template Parameters button on the context menu can be used to prompt the utility.
    The real power behind the templates is that you can create your own set of templates
    that are specific to your needs. You can add comment blocks at the top of the
    scripts that provide details about the script and its contents, and all of this
    can be parameterized.


    The parameters have the following format:<parameter_name, data_type, value>. The
    parameter_name specifies the name of the parameter, the data_type specifies the
    data type of the parameter, and the value specifies the value that will replace
    every instance of the parameter.


    *Figure 2-15\. Specify Values for Template Parameters*


    You can also add your templates to the folder of your choosing. Becausemost objects
    have folders for their templates, you are likely to create a template in an existing
    folder rather than creating your own template folder.


    Code Snippets


    Code snippets have been present in the Visual Studio environment for a few iterations.
    With SQL Server 12, they are now available with Management Studio. They work in
    a similar fashion as the templates, but unlike the templates, they can be inserted
    directly into the current query window. Ctrl+K, Ctrl+X brings up the snippet inserter
    with a drop-down of available snippets. The best part of the snippets is the ability
    to add your own custom snippets for code packets you utilize most often. This
    feature has been 39


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2  BIDS AND SSMS


    extremely helpful with Visual Studio development and is a welcome feature in SQL
    Server 12\. Listing 2-4


    displays a custom snippet that we created to script a drop and a create statement
    for a table.


     **NOTE:** The default set of snippets consist mainly of DDL and DCL object create
    scripts. This is extremely useful because SSMS stores the actual syntax that we
    developers most likely would use to reference Microsoft Developers Network, MSDN,
    or Book Online, BOL. With the ability to create your own snippets, it is likely
    that 90


    percent of your everyday syntax can be coded for this purpose. Aside from syntax,
    common blocks for your queries (joins you perform on a majority of your queries,
    where clauses that are crucial to the business logic, and so forth) can all be
    scripted so that they can be added to your code with a few keystrokes rather than
    typing them out over and over again.


