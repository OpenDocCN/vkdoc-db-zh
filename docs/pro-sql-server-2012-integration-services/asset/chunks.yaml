- fmt: '# CHAPTER 7: SOURCE AND DESTINATION ADAPTERS


    ## Flat Files


    When you’re talking about importing and exporting files, odds are very high you’re
    talking about flat files. Because they’re so prevalent, it’s no surprise that
    `SSIS` provides extensive support and options for importing data from and exporting
    data to flat files. When we talk about flat files, we’re talking about delimited
    files, fixed-width files, and ragged-right files, which are files with fixed width-columns,
    except for the very last column, which can be of varying length.


    We demonstrated a simple flat-file import in the first sample in this chapter,
    and now we’ll circle back to discuss the advanced options with another example.
    We started by creating and configuring a `Flat File Connection Manager` and an
    `ADO.NET Connection Manager` in a new package. We configured the `Flat File Connection
    Manager` as shown in Figure 7-19.


    ![Figure 7-19\. Configuring the Flat File Connection Manager](index-228_1.jpg)


    We configured the `Flat File Connection Manager` to pull data from a delimited
    file named `states.txt`. The file holds `Unicode` data, so we selected the `Unicode`
    check box. Because we’re using `Unicode`, the `Code Page` drop-down is disabled
    because it is irrelevant. The format is delimited using a pipe delimiter for most
    columns—more on this later; and finally, the file has the column names in the
    first row.


    We also tweaked some settings on the `Advanced` page of the `Flat File Connection
    Manager Editor`.


    We set the `ColumnDelimiter`, which tells `SSIS` how to divide your file into
    columns, to the pipe character (`|`) for most of the columns. In the last field
    of the file, we have the `Longitude` and `Latitude` of each state capital, separated
    by a comma (`,`), as shown in Figure 7-20. So really we have what’s known as a
    `mixed-delimiter file`.


    When you create the flat file connection, all columns default to 50-character
    strings. In our case, we adjusted the `DataType` setting on some of the columns:
    we changed the `Long` and `Lat` columns to the double-precision float `[DT_R8]`
    data type, for instance.


    ![Figure 7-20\. Adjusting column-level settings on the Advanced page of the Flat
    File Connection Manager Editor](index-229_1.jpg)


    **NOTE:** We’re just giving a brief overview of the `Flat File Connection Manager`
    in this section. We discussed the connection managers and their configurations
    in detail in Chapter 4.


    After we configured the `Flat File Connection Manager`, we configured the `Flat
    File` source adapter to use it. Although the `Flat File` source adapter has a
    standard, simplified editor, we chose to configure this component by using the
    `Advanced Editor` that all components have by default. To access the `Advanced
    Editor`, shown in Figure 7-21, simply right-click the `Flat File` source adapter
    and choose `Show Advanced Editor` from the context menu.


    The first option we set, on the `Connection Managers` tab of the `Advanced Editor`,
    was to tell the `Flat File` source adapter to use the `Flat File Connection Manager`.


    ![Figure 7-21\. Configuring the Flat File source adapter to use the Flat File
    Connection Manager](index-230_1.jpg)


    The `Column Mappings` tab maps the `external columns` (which are the columns defined
    by the connection manager) and the `output columns` (which are the columns that
    are output by the `Flat File` source adapter). You can change column mappings
    in the top portion of the window by dragging and dropping external columns over
    to the `Output Columns` box, or you can change them in the lower portion of the
    window by choosing different columns from the drop-down lists in the grid box.
    The `Column Mappings` tab is shown in Figure 7-22.


    ![Figure 7-22\. Mapping columns in the Advanced Editor](index-231_1.jpg)


    The `Input and Output Properties` tab gives you access to advanced column-level
    metadata. In this view, you can see the individual external columns, output columns,
    and their properties, as shown in Figure 7-23.


    ![Figure 7-23\. Reviewing column-level metadata in the Input and Output Properties
    tab](index-232_1.jpg)


    After configuring the `Flat File` source adapter, we connected its output to the
    `ADO.NET` destination, and configured the `ADO.NET` destination adapter to use
    the `ADO.NET Connection Manager`. The source-to-destination connection and `ADO.NET`
    destination adapter are shown in Figure 7-24 and Figure 7-25.


    ![Figure 7-24\. Connecting the Flat File source adapter output to the ADO.NET
    destination adapter input](index-233_1.jpg)


    ![Figure 7-25\. Configuring the ADO.NET destination adapter](index-234_1.jpg)


    The `Flat File` destination adapter is the opposite of the `Flat File` source
    adapter. Instead of pulling in the contents of a flat file and outputting the
    data into your data flow, the `Flat File` destination adapter accepts the input
    from your data flow and outputs it to a flat file.


    ## Excel Files


    Business users often use spreadsheets as ad hoc databases. From a business user’s
    perspective, it makes sense because they, and all their colleagues, are familiar
    with the spreadsheet paradigm. They all understand the user interface, how to
    implement simple and even complex calculations, and how to format the interface
    exactly as they want it. From the `IT` perspective that developers and `DBAs`
    bring to the table, there are few things scarier than the thought of hundreds
    of gigabytes of business information floating around the aether, possibly unsecured,
    in ad hoc spreadsheet formats.


    The `Excel` source and destination can help you pull data out of spreadsheets
    and store it in secure, structured databases, or extract data from well-defined
    systems and put it in a format your business users can easily manipulate.


    For this example, we’ll assume a simple package with two data flows in it. One
    data flow will read the contents of an `Excel` spreadsheet and store it in a table,
    and the second will read the contents of that same table and output it to an `Excel`
    spreadsheet. Our sample `Excel` spreadsheet looks like Figure 7-26.


    ![Figure 7-26\. Source Excel spreadsheet containing ISO 3166 country codes and
    names](index-235_1.jpg)


    The first step is to create an `Excel Connection Manager`. Right-click in the
    `Connection Managers` tab and choose `New Connection`. Then choose the `EXCEL`
    connection manager type. You’ll be presented with the `Excel Connection Manager`
    dialog box, shown in Figure 7-27. In this example, we chose an `Excel` file named
    `iso3166.xls` with a list of country names and abbreviations from the `ISO 3166`
    standard, we selected `Microsoft Excel 97–2003` format, and we selected the check
    box indicating that the first row of data on the spreadsheet holds the column
    names.


    **NOTE:** `ISO 3166` is the international standard for country codes and names.
    Whenever possible, it’s a good idea to use recognized standards instead of reinventing
    the wheel.


    ![Figure 7-27\. Setting Excel Connection Manager properties in the editor dialog
    box](index-236_1.jpg)


    We also created an `OLE DB Connection Manager`, as described in the “Destination
    Assistant” section of this chapter.


    The next step is to drag the `Excel` source adapter and `OLE DB` destination adapter
    onto the `BIDS` designer surface.'
