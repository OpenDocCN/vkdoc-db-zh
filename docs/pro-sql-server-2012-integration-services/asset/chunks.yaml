    \n### 图 7-32. 新的 SSIS 目标工作簿，除列标题外为空\n\n接下来，我们将向一个空的数据流添加一个 `OLE DB 源` 适配器和一个 `Excel\
    \ 目标` 适配器。\n\n在将 `OLE DB 源` 配置为从数据库中的 `Country` 表提取数据后，我们将 `OLE DB 源` 输出链接到 `Excel\
    \ 目标` 输入。最后一步是配置 `Excel 目标`。\n\n在 `Excel 目标编辑器` 中，我们选择了新创建的 `Excel 连接管理器`，将数据访问模式设置为\
    \ `表或视图`，并选择了第一个工作表的名称 `Sheet1$`，如图 7-33 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-242_1.jpg)\n\n### 图 7-33. 在 Excel 目标编辑器中配置 Excel 目标配适器\n\n## 原始文件\n\
    \n无论何时从平面文件读取或写入平面文件，后台都在进行成千上万的数据转换。考虑一个整数，例如 `2,147,483,647`。这个数字在您的计算机中仅占用\
    \ 4 字节内存。但当您将其写入平面文件时，它会被转换为一个长度为 10 个字符的数字字符串。这不仅存储空间增加了一倍多，而且由于转换还会带来性能损失。当您从平面文件读回该数字时，您必须读取\
    \ 10 个字符，并再次承受转换带来的性能损耗。诚然，对于单个数字而言，大小差异和性能影响并不大，但如果将其乘以 10 列和 1,000,000 行（这并非不合理的例子），突然之间，您就会在性能和存储空间上看到显著的变化。\n\
    \n对于日常的文件传输以及与其他系统的导入/导出，平面文件是合适的选择。在许多情况下，平面文件并不是很大，因此大小和性能差异并不显著。但更重要的是，在系统之间传输数据时，纯文本是不会出错的选择。考虑到字符集的一些差异，每个系统都能读取文本，每个系统也都能写入文本。\n\
    \n然而，有时您可能会发现需要在处理过程中临时存储大量部分处理过的数据。一个常见的例子是：当大量行已经通过 SSIS 包处理，进行了大量加工后，您需要在另一个\
    \ SSIS 包（或同一包中的不同数据流）中获取这些数据以进行进一步处理。为了最大化 SSIS 包间处理的效率，原始文件是无与伦比的选择。\n"
- fmt: '# CHAPTER 7: SOURCE AND DESTINATION ADAPTERS


    `Raw files` are specialized binary format files that eliminate a lot of the conversion
    overhead associated with normal flat files. `Raw files` store your data in binary
    format, so that those 4-byte integers are stored in exactly 4 bytes. `Raw files`
    also store metadata about your columns, so the binary data in the raw file can’t
    be accidentally read in as the wrong format. The `Raw File` destination adapter
    lets you output data from your data flow to a raw file; the `Raw File` source
    adapter lets you read a raw file back into your data flow. The raw file provides
    an efficient intermediate format for serializing temporary results.


    Just as one example of the use of raw files, we recently ran into a situation
    where we had to dump a large amount of data from a Microsoft Access database using
    32-bit `Jet 4.0` drivers and import the data into a `SQL Server` database using
    64-bit drivers. You can’t mix 32-bit and 64-bit drivers in the same package, so
    the solution was to create two packages: one to extract the data from Access into
    a raw file and one to import the data into `SQL Server`. We ran the Access extract
    package using the `SSIS` 32-bit runtime and the `SQL Server` import package using
    the `SSIS` 64-bit runtime. This is just one example, but there are plenty more
    in which the raw file produces efficient temporary storage of your intermediate
    results. Anytime you need to temporarily store partially processed data, consider
    raw files.


    ## XML Files


    The `XML source` adapter lets you use an XML file with an XML Schema document
    (`XSD`) as a source for your data flow. The `XML Source` uses the `XSD` you provide
    to extract the data values from your XML file and output it in columns. If you
    don’t have an `XSD` file, this component will generate a simple one for you. The
    `XML source` adapter is useful for relatively simple XML files, or for extracting
    well-defined subsets of data from more-complex XML files.


    **NOTE:** We recommend the book *SSIS Design Patterns* by Matt Masson, Tim Mitchell,
    Jessica Moss, Michelle Ufford, Andy Leonard (Apress, 2012), which devotes an entire
    chapter to loading XML files with `SSIS`.


    ## Special-Purpose Adapters


    `SSIS` has two special-purpose destination adapters, which provide additional
    functionality, such as writing to in-memory recordsets or to `SQL Server Analysis
    Services` (`SSAS`). These adapters are as follows:


    **Recordset:** The `SSIS` `Recordset` destination adapter lets you populate an
    in-memory recordset. One of the most common uses of the in-memory recordset is
    to populate it via the data flow and later iterate it with a `Foreach Loop Container`.


    **DataReader:** The `DataReader` destination adapter outputs data in a format
    compatible with the `.NET DataReader` interface, which can be picked up and consumed
    by an application that can read a `DataReader`. `SQL Server Reporting Services`
    (`SSRS`) reports, for instance, can be set to consume the output of an `SSIS`
    package using the `DataReader` interface.


    ## Analysis Services


    In addition to all the source and destination adapters we’ve covered in this chapter,
    `SSIS` provides destination adapters for `SQL Server Analysis Services` (`SSAS`).
    This section provides an overview of `SSAS` capabilities, and Chapter 14 presents
    detailed information about `SSIS`’s `Analysis Services` functionality.


    Table 7-5 lists `SSIS`’s `Analysis Services` destinations.


    **Table 7-5. Analysis Services Destinations**


    | Destination Name | Description |

    | :--- | :--- |

    | Data Mining Model Training | Passes data through data mining model algorithms
    to train data mining models |

    | Dimension Processing | Loads and processes `SQL Server Analysis Services` dimensions
    |

    | Partition Processing | Loads and processes `SSAS` partitions |


    ## Summary


    In this chapter, we discussed `SSIS`’s source and destination adapters, the key
    components required to move data into and out of your `SSIS` data flows. We began
    this chapter with a discussion of `SSIS`’s Source and Destination Assistants,
    two new features designed to make creating source and destination adapters a little
    more convenient. We then detailed how to create and use different flavors of database-specific
    source and destination adapters, which are among the most commonly used types
    of data flow adapters.


    Next we discussed the various types of files that `SSIS` supports reading from
    and writing to, including flat files, Excel spreadsheets, raw files, and XML.
    We also talked about the special-purpose destinations: the `Recordset` and `DataReader`
    destination adapters, and we finished up with an introduction to the `Analysis
    Services` destinations—a conversation we will pick up again in Chapter 14.


    In the next chapter, we introduce the third type of data flow components—transformations.


    # CHAPTER 8: Data Flow Transformations


    *The goal is to transform data into information, and information into insight.*

    —Carly Fiorina


    In the previous chapter, you looked at how `SSIS` pulls data from point A and
    pushes it out to point B. In this chapter, you’ll begin exploring the different
    types of data manipulations, referred to as *transformations*, which you can perform
    on your data as it moves from its source to its destination. As Carly Fiorina
    indicated, our ultimate goal is to start with raw data and use it to reach a state
    of insight.


    Data flow transformations are the key to moving your raw data along the first
    half of that journey, turning it into usable information.


    ## High-Level Data Flow


    The `SSIS` data flow consists of sources, transformations, and destinations. Figure
    8-1 shows the high-level view of `SSIS`’s data flow.


    ![Figure 8-1. High-level overview of the SSIS data flow](index-246_1.jpg)


    As you can see from the diagram, `SSIS` source components pull data from a variety
    of sources such as databases, files, and the Web. The source component introduces
    data into the data flow, where it moves from transformation to transformation.
    After the data has been processed, it moves on to the destination component, which
    pushes it out to storage, including databases, files, the Web, or any other type
    of destination you can access. The solid black arrows in the diagram are analogous
    to the output paths (green arrows) in the `SSIS` designer. Some components, such
    as the `Multicast` transformation we discuss later in this chapter, have more
    than one output path.


    Each type of data flow component (source components, transformations, and destination
    components) can also have an error output path. These are represented by red arrows
    in the `BIDS` designer. When a component runs into a data error while processing
    a row of data, the erroneous row is redirected to the error output. Generally,
    you’ll want to connect the error output to a destination component to save error
    rows for later review, modification, and possible reprocessing.


    ## Types of Transformations


    `SSIS` comes with 30 stock transformations out of the box. These standard transformations
    give you the power to manipulate your data in any number of ways, including modifying,
    joining, routing, and performing calculations on individual rows or entire rowsets.


    Transformations can be grouped along functional lines, which we’ve done in this
    chapter. Row transformations and Split and Join transformations are two of the
    groups we cover, for instance.'
