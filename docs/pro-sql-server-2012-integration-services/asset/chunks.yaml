- fmt: "# CHAPTER 19 DEPLOYMENT MODEL\n\n*Figure 19-7. The Select Destination page\
    \ of the Integration Services Deployment Wizard*\n\nUnlike prior versions of Integration\
    \ Services, there is no option to deploy to the file system. You need to specify\
    \ a SQL Server instance with an Integration Services catalog as the destination\
    \ of the project deployment. The **Browse for Folder or Project** dialog box allows\
    \ you to navigate to the project file in the catalog that you want to associate\
    \ with this deployment. The deployment wizard will give a warning if you are about\
    \ to overwrite an existing project. After you have specified the destination server\
    \ and folder path for the destination, you get a chance to review your configuration\
    \ by using the **Review** page, as shown in *Figure 19-8*.\n\n![](index-581_1.jpg)\n\
    \n*Figure 19-8. The Review page of the Integration Services Deployment Wizard*\n\
    \nThe **Review** page provides the details of the source and destination of the\
    \ project deployment.\n\nClicking the **Deploy** button initiates the process\
    \ that installs the project to the destination. The **Results** page, shown in\
    \ *Figure 19-9*, provides feedback along each step of the deployment process.\n\
    \n![](index-582_1.jpg)\n\n*Figure 19-9. The Results page of the Integration Services\
    \ Deployment Wizard*\n\nThe **Changing Protection Level** step modifies the project\
    \ protection level to use the encryption setting on the destination server. The\
    \ key is created with the password you provided when creating the catalog. In\
    \ order to find all the encryption keys that you have for your projects, you can\
    \ query the `internal.catalog_encryption_keys` table on `SSISDB`.\n\n## Environments\n\
    \nHaving deployed your project, you may want to emulate different scenarios that\
    \ will execute the ETL processes. *Environments* allow you to provide values to\
    \ all parameters within projects through their variables. These environment variables\
    \ can also be used to configure connection managers so that data can be sourced\
    \ and loaded according to the simulation you need to run.\n\n> **NOTE:** *Environment\
    \ variable* is a misleading term that may be confused with the operating system’s\
    \ environment variables. The term simply applies to variables within environments\
    \ the Integration Services catalog can be bound to deployed projects that exist\
    \ on the catalog for execution purposes. Mappings can be created between these\
    \ variables, and the different parameters can be configured for various projects.\n\
    \nTo create an environment, navigate to the **Environments** subfolder where you\
    \ deployed your project. Right-click the subfolder and select **Create Environment**.\
    \ This opens a window that will allow you to create the environment. *Figure 19-10*\
    \ shows the **Create Environment Window**. This window asks for basic information\
    \ such as the new environment’s name and description.\n\n*Figure 19-10. The Create\
    \ Environment Wizard*\n\nThe **Script** button above the text fields enables you\
    \ to generate a T-SQL script that will create the environment. *Listing 19-2*\
    \ shows the stored procedure and its parameters that will create the **Development**\
    \ environment.\n\n![](index-584_1.jpg)\n\n*Listing 19-2. Creating an Environment*\n\
    \n```sql\nEXECUTE SSISDB.catalog.create_environment\n    @environment_name=N'Development',\n\
    \    @environment_description=N'',\n    @folder_name=N'SSIS12'\n;\nGO\n```\n\n\
    After creating the environment, you can add variables to it. Just as with creating\
    \ an environment, you can use the window shown in *Figure 19-11* or the code shown\
    \ in *Listing 19-3* to create environment variables. To open the window, you need\
    \ to right-click the environment and select **Properties**. The advantage of using\
    \ the window is that it will allow you to define multiple environment variables.\n\
    \n*Figure 19-11. Environment properties*\n\nThe T-SQL stored procedure for creating\
    \ environment variables, `catalog.create_environment_variable`, uses all the columns\
    \ shown in the window as parameters. The two parameters, `@folder_name` and `@environment_name`,\
    \ help identify the environment where the variable will belong.\n\n![](index-585_1.jpg)\n\
    \n*Listing 19-3. Creating an Environment Variable*\n\n```sql\nEXECUTE SSISDB.catalog.create_environment_variable\n\
    \    @folder_name = 'SSIS12',\n    @environment_name = 'Development',\n    @variable_name\
    \ = 'TestingVariableMapping',\n    @data_type = 'Int32',\n    @sensitive = FALSE,\n\
    \    @value = 0,\n    @description = ''\n;\nGO\n```\n\nWith the project, environment,\
    \ and environment variables ready to go, you can configure the project to associate\
    \ with the environment and its variables for specific execution simulations. The\
    \ environment variables can be mapped to the different project and package parameters\
    \ that are defined.\n\nYou can set up these dependencies by navigating to the\
    \ project in the Integration Services catalog, right-clicking it, and selecting\
    \ **Configure**. *Figure 19-12* shows the **References** page of the project’s\
    \ configuration window. This page allows you to define the different environments\
    \ that can pass values to the project during execution.\n\n*Figure 19-12. The\
    \ References page of the Configure project window*\n\n![](index-586_1.jpg)\n\n\
    > **NOTE:** Environments can be referenced from locations other than the project’s\
    \ immediate folder structure. The environments do, however, need to be on the\
    \ same SQL Server instance.\n\nAfter the environment reference is set up, you\
    \ can map project objects to variables within the environment. *Figure 19-13*\
    \ shows the **Parameters** page’s **Parameters** tab of the **Configure projects**\
    \ window. This tab allows you to map values of all the parameters contained within\
    \ the project to the environment variables’ values. The **Scope** drop-down allows\
    \ you to find the parameters more easily. It can limit the parameters list to\
    \ a specific package or parameter function. The tab also shows the default value\
    \ defined for the parameter.\n\n*Figure 19-13. The Parameters page and Parameters\
    \ tab of the Configure project window*\n\nThe actual mapping for the parameter\
    \ is generated by clicking the ellipsis button to the right of the **Value** field\
    \ for the parameter. Clicking the button opens the window shown in *Figure 19-14*.\
    \ The **Edit Value** option allows you to define a new static value for the execution\
    \ regardless of the specified environment. The **Use Environment Variable** option\
    \ will search the environments for the specified variable and map its value to\
    \ the parameter. The environment variables available in the drop-down list will\
    \ be those whose data types are compatible with the parameter’s data type.\n\n\
    ![](index-587_1.jpg)\n\n*Figure 19-14. The Set Parameter Value window*\n\n> **NOTE:**\
    \ When you define multiple environment references for the projects, we recommend\
    \ that you define variables with the same names and types in all the environments.\
    \ The drop-down list in the **Set Parameter Value** window allows you to specify\
    \ the variable to map to the parameter.\n\nIn addition to the parameters, the\
    \ connection managers defined within the project can be mapped to environment\
    \ variable values. The **Connection Manager** tab of the **Configure project**\
    \ window’s **Parameter** page, shown in *Figure 19-15*, allows you to create these\
    \ mappings. The **Scope** drop-down list is similar to the list in the **Parameters**\
    \ tab in that it will filter the connection managers defined within the project\
    \ so that you can map the values easily.\n\n![](index-588_1.jpg)"
