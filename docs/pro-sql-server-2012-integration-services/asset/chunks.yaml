    # CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    ## Task Host Controller


    The Task Host container is implicitly configured when an executable is added to
    the SSIS control flow. The configurations apply exclusively to the executables
    and their dependents in the case of containers. This container allows for variables
    and event handlers to be tied directly to the task. This container also limits
    the scope of variables across the different executables.


    ## Summary


    This chapter introduced the advanced control flow items that will allow you to
    perform many nonfunctional requirements. A majority of the advanced tasks transfer
    objects between SQL Server instances. We also introduced the advanced containers
    in the SSIS Toolbox. These containers loop through the execution differently,
    but they achieve similar goals. The implicit Task Host controller cannot be accessed
    directly but works behind the scenes to keep the package executables organized.
    Chapter 7 covers the basic components of the Data Flow task.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-203_1.jpg)


    # CHAPTER 7


    # Source and Destination Adapters


    *“All rivers flow into the sea, yet the sea is not full.”*


    —King Solomon


    In SSIS, the data flow is your primary tool for moving data from point A to point
    B and manipulating it along the way. The data flow is a powerful concept that
    allows you to encapsulate your data movement and transformation as a self-contained
    task of the control flow. The data flow moves your data from a source to a destination,
    like King Solomon’s river moves water from its source to the sea. This chapter
    introduces the data flow and discusses data flow source adapters, destination
    adapters, and the new Source and Destination Assistants.


    ## The Data Flow


    The data flow is contained within the confines of the Data Flow task, which itself
    exists in the control flow. The Data Flow task is shown in Figure 7-1.


    *Figure 7-1. The Data Flow task on the BIDS designer surface*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-204_1.jpg)


    # CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    You add a Data Flow Task to the control flow by dragging and dropping it from
    the SSIS Toolbox over to the BIDS designer surface. Because the Data Flow Task
    is a control flow task, the data flow represents a powerful self-contained subset
    of the control flow. The purpose of having a data flow is to separate data movement
    and manipulation—the primary purpose of ETL—from work flow management. As you
    can see in Figure 7-2, any given data flow can be fairly complex. You can also
    include multiple Data Flow tasks in a single control flow. We cover the sources,
    destinations, and transformations shown in the sample data flow, and many more,
    in this chapter and the next.


    *Figure 7-2. Data flow consisting of several data flow components*


    The components that make up the data flow can be divided into three categories:
    source adapters that pull data into the data flow; transformations that allow
    you to manipulate, modify, and direct your data; and destination adapters that
    allow you to push data out of the data flow to persistent storage or into other
    systems for further processing. In this chapter, we consider the sources and destinations
    that SSIS provides to pull data into and push data out of your data flows.


    Technically speaking, all data flow components derive from a single base class
    called the PipelineComponent class. This class exposes properties such as BufferManager,
    which provides access to the two-dimensional storage object (that is to say, a
    tabular rowset) holding your data as it moves through the data flow. The PipelineComponent
    class also has methods such as AcquireConnection, which establishes connectivity
    to your data sources via connection managers. In the out-of-the-box stock components
    we discuss in this chapter, these properties and methods are already fully developed
    for you, so you don’t have to deal with them directly.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    **NOTE:** We discuss the details of the PipelineComponent class and developing
    your own custom components in depth in Chapter 22.


    ## Sources and Destinations


    In the SSIS data flow, source adapters are components that pull data from well-defined
    data stores. Source adapters use connection managers to connect to, and pull data
    from, databases such as SQL Server and Oracle, flat files, XML, or just about
    any other source you can define. Destination adapters are the opposite of source
    adapters—they push data to data stores. Destination adapters use connection managers
    to send data to databases, flat files, Excel spreadsheets, or any other destination
    you can connect to.


    Although you can create extremely complex data flows in SSIS, the simplest useful
    data flow you can create might consist of a single source adapter connected to
    a single destination adapter. For this example, let’s consider a simple data flow
    that extracts data from a flat file and loads it into a SQL Server database table.
    This is considered straight pull, in that no transformations are applied to the
    data as it moves from source to destination. For the purposes of this chapter,
    assume you’re editing a brand new SSIS package in BIDS with a single data flow.


    ## Source Assistant


    The Source Assistant is new to SQL Server 12 SSIS. When you drag this component
    from the SSIS Toolbox to the designer surface, BIDS opens the Add New Source dialog
    box. This dialog asks you to choose a type of source and a connection manager
    to use. As you can see in Figure 7-3, the source assistant window lets you choose
    from several types of sources. For our simple data flow sample, we’ve selected
    a Flat File source type and a <New> connection manager.


    **NOTE:** The Show Installed Only check box limits the types shown to only those
    that are installed on your local development machine.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-206_1.jpg)


    # CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


