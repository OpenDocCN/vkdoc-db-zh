    OnProgress creates an event when the target object is in the middle of


    executing.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5  CONTROL FLOW BASICS


    OnQueryCancel creates an event when the target object is stopped in the middle


    of executing.


    OnVariableValueChanged creates an event when a variable value changes during


    the execution of the target object.


    OnCustomEvent creates an event when there are custom events that the target


    object raises during execution.


    The Hit Count Type column in the Set Breakpoints dialog box defines the criteria
    that causes the target object to suspend its execution. The options are Always,
    Hit Count Equals, Hit Count Greater Than or Equal To, and Hit Count Multiple.
    The Always hit count will always suspend the execution of the target, every time
    the enabled break condition event is raised. This option disables the Hit Count
    column. The Hit Count Equals option will suspend the target only if the condition
    event is raised enough times to match the defined hit count. The Hit Count Greater
    Than or Equal To option will suspend the execution every time the condition event
    is raised, starting when the number of event occurrences matches the hit count.
    The Hit Count Multiple option will cause the target to suspend its execution every
    time the break condition event is raised enough to be a multiple of the defined
    hit count.


    Summary'
  trans: '

    # 多重约束


    多重约束指定当可执行文件被多次约束时，其执行所需的条件。两个选项是逻辑与（Logical AND）和逻辑或（Logical OR）。


    这些选项将对指定的所有约束执行逻辑与或逻辑运算，以决定受约束的可执行文件是否执行。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-158_1.jpg)


    # 第 5 章 控制流基础


    对于图 5-41 所示的示例，执行进程任务和数据剖析任务将同时执行。只有当执行进程任务成功执行时，脚本任务才会执行。批量插入任务将在执行进程任务完成其操作后执行。


    只有当执行进程任务在执行过程中失败时，发送邮件任务才会执行。在任何一次执行中，你将会看到脚本任务和批量插入任务的组合，或者发送邮件任务和批量插入任务的组合同时执行，因为这些任务仅受执行进程任务约束。


    **注意：** 一个可执行文件可以约束多个可执行文件，也可以被多个可执行文件约束。


    约束的类型也可以变化。这将允许一个可执行文件仅在达成特定执行结果时运行。一个可执行文件不能约束或优先于自身。


    *图 5-41. 优先级约束与并行任务*


    ## 基本容器


    向控制流添加大量任务可能会使阅读 SSIS 包变得困难。避免控制流混乱的方法之一是使用容器。*容器* 允许你将多个任务甚至其他容器分组在一起。SSIS 提供了三种类型的容器：For
    Loop 容器、Foreach Loop 容器和 Sequence 容器。本节介绍 Sequence 容器。另外两种容器我们留到第 6 章介绍。SSIS 中还存在另一种组织方法，即分组。它并不是严格意义上的容器，但它使包在视觉上更易读。


    ## 容器


    默认情况下，所有三种容器都组织在 SSIS 工具箱的“容器”文件夹中。它们可以被移动到“收藏夹”和“常用”组中。容器将 SSIS 包模块化。它们可用于限制变量的作用域，以便你可以定义变量，使其仅能由父容器内包含的任务和容器访问。变量的作用域是变量定义的一部分，并存在于“参数和变量”窗口的变量列表列中。容器内的可执行文件在包内创建了一个子例程。在容器内定义的任务无法启动容器外的任务或容器的执行。容器名称右侧的箭头允许你折叠容器内容以便配置。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-159_1.jpg)


    # 第 5 章 控制流基础


    **提示：** 在包中频繁使用容器，使你能够在 Visual Studio 的调试模式下执行容器内的所有对象。你不能执行整个包，而只能执行容器内的可执行文件。为此，只需右键单击容器并选择“执行容器”。为了进入调试模式，需要将包作为项目的一部分打开。


    图 5-42 展示了 Sequence 容器的一个潜在用途。容器的图标是一个蓝色方形轮廓，内含一个实心蓝色方块和一个蓝色箭头。该图标显示了几个可能被容器包含的可执行文件。执行进程任务是第一个执行的任务，然后受其约束的脚本任务仅在第一个任务成功执行时才会执行。


    **注意：** 序列容器支持事务属性，允许执行 SQL 任务作为单个事务执行。


    *图 5-42. Sequence 容器*


    ## 分组


    SSIS 控制流中的*分组*不是容器，但它们提供了一些容器所具备的组织优势。我们不建议使用分组，因为它们可能导致 SSIS 意大利面条式代码（杂乱无章的代码）。


    与容器不同，分组不会隔离其内部的可执行文件。它们允许在分组内部和外部对象之间创建优先级约束，如图 5-43 所示。在此示例中，我们有一个执行 SQL 任务优先于一个数据流任务。看起来数据流任务和文件系统任务应该一起执行，但实际上执行
    SQL 任务和文件系统任务将同时执行。与容器类似，分组可以折叠它们包含的对象。


    **注意：** 分组不允许你执行它们包含的对象。它们仅仅允许你进行视觉上的组织。


    *图 5-43. 分组*


    ## 断点


    在包中对象执行期间，每个可执行文件都会触发事件。Visual Studio 的调试模式允许你创建*断点*，这些断点将侦听这些事件并暂停执行。


    断点可以在控制流中的任务、容器和整个包上定义。要创建断点，必须右键单击对象并选择“编辑断点”。此选项将打开如图 5-44 所示的对话框。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-161_1.jpg)


    # 第 5 章 控制流基础


    *图 5-44. 设置断点选项*


    此对话框允许你指定“断点条件”、该条件的发生次数（将增加计数）以及在执行暂停前可容忍的计数。本节介绍 SSIS 发出的事件。我们将在第 11 章更详细地讨论它们。这些事件包括：


    - `OnPreExecute` 在目标对象开始执行前立即创建一个事件。

    - `OnPostExecute` 在目标对象完成执行后立即创建一个事件。

    - `OnError` 在目标对象执行过程中发生错误时创建一个事件。

    - `OnWarning` 在目标对象未处于错误状态但设计并非最优时创建一个事件。

    - `OnInformation` 在目标对象发出有关执行的信息时创建一个事件。

    - `OnTaskFailed` 在目标对象执行失败时创建一个事件。

    - `OnProgress` 在目标对象执行过程中创建一个事件。

    - `OnQueryCancel` 在目标对象执行过程中被停止时创建一个事件。

    - `OnVariableValueChanged` 在目标对象执行期间变量值发生变化时创建一个事件。

    - `OnCustomEvent` 在目标对象执行期间引发自定义事件时创建一个事件。


    “设置断点”对话框中的“命中次数类型”列定义了导致目标对象暂停执行的条件。选项包括“始终”、“命中计数等于”、“命中计数大于或等于”和“命中计数倍数”。“始终”命中计数将始终暂停目标的执行，每次启用的断点条件事件被引发时都会如此。此选项会禁用“命中计数”列。“命中计数等于”选项仅在条件事件引发的次数达到定义的命中计数时才暂停目标。“命中计数大于或等于”选项在条件事件引发时都会暂停执行，从事件发生次数达到命中计数时开始。“命中计数倍数”选项将在断点条件事件引发的次数达到定义的命中计数的倍数时，导致目标暂停其执行。


    ## 小结

    '
- fmt: '# 第六章：高级控制流任务


    本章介绍了基本的控制流项，这些项将使您能够利用第四章介绍的一些连接管理器。控制流设计器窗口使用 SSIS 工具箱来添加可执行文件。这些可执行文件和容器按可自定义的组进行组织，以适应您的开发习惯。本章介绍了“收藏夹”和“常用”组。优先约束定义了对象执行的顺序和条件。容器可用于使包模块化。本章介绍了序列容器。断点可在调试模式下使用，具体取决于目标对象引发的事件。第六章涵盖了剩余的任务和容器。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    > 阻止历史重演是徒劳的，因为人的本性总会让重复变得无法避免。

    > ——作者 马克·吐温


    第五章向您介绍了 SQL Server 12 中最广泛使用的可执行文件、容器和优先约束。这些可执行文件和容器在 SSIS 工具箱中按可配置的组进行组织。


    我们已经介绍了“收藏夹”和“常用”组，以及其中一种容器。本章将介绍“其他任务”组中的剩余任务以及剩余的容器。这些任务和容器通常为数据库对象执行管理任务。容器被设计为重复执行其中包含的进程。正如前面的引言所暗示的，多次执行某些进程可能是
    ETL 设计的必要组成部分。本章讨论的容器支持对某些进程进行受控的、重复的执行。


    ## 高级任务


    前一章详细介绍的任务帮助我们为 ETL 过程准备源和目标。剩余的“其他任务”组由执行管理目标的任务组成。大部分任务处理在数据库之间传输数据库对象。


    > 注意：由于 DTS 包将来不再受 SQL Server 支持，ActiveX 脚本任务和执行 DTS 2000 包任务已被弃用。


    ### Analysis Services 执行 DDL 任务


    *Analysis Services 执行 DDL 任务*允许您针对 SQL Server Analysis Services (SSAS) 数据库执行 DDL
    语句。此任务能够创建、删除和更改 Analysis Services 数据库上的数据挖掘对象以及多维对象。图 6-1 展示了此任务在控制流设计器窗口中的外观。图标是一个带有绿色箭头指向的立方体，显示了
    SSIS 任务访问 Analysis Services 对象的能力。


    ![](index-164_1.jpg)


    ![](index-164_2.jpg)


    **图 6-1. Analysis Services 执行 DDL 任务**


    修改此任务主要通过 `Analysis Services Execute DDL Task Editor` 的 DDL 页面处理，如图 6-2 所示。需要一个指向
    SSAS 数据库的连接管理器来使用此任务。可以在“连接”下拉列表中指定该连接管理器。`SourceType` 允许您在“直接输入”、“文件连接”和“变量”之间进行选择。此字段指定了要执行的
    DDL 的位置。“直接输入”允许您直接在任务中填写 DDL。“文件连接”指定一个指向包含 DDL 文件的连接。“变量”选项将 DDL 存储在 SSIS 字符串变量中。使用“直接输入”选项时，`SourceDirect`
    字段允许您键入 DDL。“文件连接”和“变量”选项会将字段名称更改为 `Source`，并允许您从下拉列表中选择已定义的文件连接或 SSIS 变量。“常规”页面允许您修改任务的
    `Name` 和 `Description`。“表达式”页面允许您定义可以修改任务属性值的表达式。'
  raw: 'This chapter introduced the basic control flow items that will enable you
    to utilize some the connection managers introduced in Chapter 4\. The control
    flow designer window uses the SSIS Toolbox to add executables. These executables
    and containers are organized in groups that can be customized for your development
    habits. This chapter introduced the Favorites and the Common groups. Precedence
    constraints define the order and conditions in which the objects execute. Containers
    can be used to modularize the packages. This chapter presented the sequence container.
    Breakpoints can be used in the Debug mode, depending on the events the target
    objects raise. Chapter 6 covers the remaining tasks and containers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 6**


    **Advanced Control Flow Tasks**


    *It is not worthwhile to try to keep history from repeating itself, for man''s
    character will* *always make the preventing of the repetitions impossible.*


    —Author Mark Twain


    Chapter 5 introduced you to SQL Server 12’s most widely used executables, containers,
    and precedence constraints. The executables and containers are organized in the
    SSIS Toolbox in configurable groups.


    We already introduced the Favorites and Common groups as well as one of the containers.
    This chapter presents the remaining tasks in the Other Tasks group and the remaining
    containers. These tasks and containers generally perform administrative tasks
    for database objects. The containers are designed to repeatedly execute the contained
    processes. As the preceding quote suggests, executing certain processes multiple
    times might be a necessary component of the ETL design. The containers discussed
    in this chapter support controlled, repetitive executions of certain processes.


    Advanced Tasks


    The tasks detailed in the previous chapter assist us in preparing our sources
    and destinations for the ETL


    process. The remaining group, Other Tasks, consists of tasks that carry out administrative
    objectives. A majority of the tasks handle transferring database objects between
    databases.


     **NOTE:** Because DTS packages will no longer be supported in future versions
    of SQL Server, the ActiveX Script task and Execute DTS 2000 Package task are deprecated.


    Analysis Services Execute DDL Task


    The *Analysis Services Execute DDL task* allows you to execute DDL statements
    against a SQL Server Analysis Services (SSAS) database. This task is capable of
    creating, dropping, and altering data-mining objects as well as multidimensional
    objects on an Analysis Services database. Figure 6-1 demonstrates how this task
    appears in the control flow designer window. The icon, a cube with a green arrow
    pointing at it, shows the SSIS task’s ability to access Analysis Services objects.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-164_1.jpg)


    ![](index-164_2.jpg)


    CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    *Figure 6-1\. Analysis Services Execute DDL task*


    Modifying this task is mainly handled on the DDL page of the Analysis Services
    Execute DDL Task Editor, shown in Figure 6-2\. A connection manager pointing to
    an SSAS database is required to utilize this task. The connection manager can
    be specified in the Connection drop-down list. The SourceType allows you to select
    between Direct input, File connection, and Variable. This field specifies the
    location of the DDL to be executed.Direct input allows you fill in the DDL directly
    to the task. File connection specifies a file connection to a file that contains
    the DDL. The Variable option stores the DDL in an SSIS string variable. With the
    Direct input option, the field SourceDirect allows you to type in the DDL. The
    File connection and Variable options change the field name to Source and allow
    you to select a defined file connection or SSIS variable from a drop-down list.
    The General page allows you to modify the Name and Description of the task. The
    Expressions page allows you to define expressions that can modify the task’s property
    values.'
