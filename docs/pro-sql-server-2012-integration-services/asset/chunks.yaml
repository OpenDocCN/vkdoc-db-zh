- fmt: '# CHAPTER 7: SOURCE AND DESTINATION ADAPTERS


    After connecting the `Flat File source adapter` to the `OLE DB destination adapter`,
    we still need to configure the `OLE DB destination adapter`. By double-clicking
    the `OLE DB destination adapter`, we can pull up the `OLE DB Destination Editor`.
    With this editor, we chose the `OLE DB Connection Manager`, the `data access mode`,
    and the name of the target table. We chose `Table or View – Fast Load` as the
    `data access mode`, which lets us also set the `Rows per Batch` and `Maximum Insert
    Commit Size` options. We changed these from the default values. These options
    are shown in Figure 7-11.


    Figure 7-11. Setting properties for OLE DB destination in the editor


    The Mappings page of the editor gives you the opportunity to map the destination
    component’s input columns to its output columns. When you connect the destination
    adapter to the data flow, `BIDS` tries to automatically map the columns based
    on name. In our example, all of the columns in the source file have the same names
    as the columns in the target table, so the mapping is performed for us automatically.
    If you need to map an input column to a differently named output column, you can
    change the mappings by connecting them in the upper portion of the mapping window
    or by changing them in the grid view in the lower portion of the screen, as shown
    in Figure 7-12.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-216_1.jpg)


    Figure 7-12. Mapping page of the OLE DB destination editor


    After you’ve completed the destination configuration, the red `x` will disappear
    from the component in the data flow designer in `BIDS`. Running the package in
    `BIDS` shows that 29,470 rows are imported from the flat file to the database
    table, as you can see in Figure 7-13.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-217_1.jpg)


    Figure 7-13. Successful execution of the simple data flow created with Source
    and Destination Assistants


    ## Database Sources and Destinations


    In the previous sections, we showed you how to use the Source and Destination
    Assistants to set up a simple package to pull data out of a flat file and push
    it into a database. We chose to demonstrate with the `Flat File source` and `OLE
    DB destination adapters` because their use is a very common scenario, especially
    when using `SSIS` to pull data from legacy systems for which no direct connection
    is available and push it into a SQL Server database. This section details database
    sources and destinations and shows you how to configure their more-advanced features.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### OLE DB


    `OLE DB source and destination adapters` allow you to connect to a variety of
    OLE DB data stores, but they are commonly used for database connectivity because
    they provide good performance and support a wide variety of relational databases.
    For this example, we’ll configure an `OLE DB source adapter` and `OLE DB destination
    adapter` to both connect to a SQL Server instance and move data from one table
    to another. This will be a very simple demonstration, but will give you an opportunity
    to uncover a wide range of OLE DB configuration options.


    For our example, we have two tables: one named `LastName`, containing a list of
    the most common surnames in the United States (data obtained from US Census Bureau),
    and one called `LastName_Stage` that we’ll copy the surnames to.


    Our first step was to create two connection managers named `Source_DB` and `Dest_DB`,
    respectively.


    These two connection managers point at the same server and database in the example,
    but in the real world they would likely point at different servers or different
    databases on the same server. This is why we created two separate connection managers
    for them. Table 7-2 shows the variety of options you can choose in the `OLE DB
    Source Editor`, which is pictured in Figure 7-14.


    Table 7-2. OLE DB Source Editor Dialog Controls


    **Option Description**'
