    *Figure 8-24\. Adding the RowNumber column to the script component’s output*


    As we mentioned, this component will be a simple synchronous script component.
    Script components are synchronous. by default. Whether or not a script component
    is synchronous is determined by the SynchronousInputID property on the output
    column collection of the Inputs and Outputs page. When this property is set to
    the name of an input column collection, as shown in Figure 8-25, the component
    is synchronous. If you set this property to None, the component is asynchronous.
    In this case, we set this property to the name of the input column collection,
    SCR - Count Rows.Inputs[Input 0].


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-276_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-25\. Reviewing the SynchronousInputID property on the Inputs and Outputs
    page* Next we went to the Script page to edit the script. On this page, you can
