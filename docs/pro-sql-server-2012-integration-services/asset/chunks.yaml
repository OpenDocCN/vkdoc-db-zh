    \ flow.\n\nOne of the simplest tasks for which SSIS developers use the `Script\
    \ task` is SSIS variable initialization in the control flow. For this example,\
    \ we’ll set a string variable to the postal abbreviation for a state to limit\
    \ results returned by a query in a data flow. To start our example, we dragged\
    \ a `Script task` and a `Data Flow task` onto the designer surface, as shown in\
    \ Figure 10-1.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-362_1.jpg)\n\
    \n![](index-362_2.jpg)\n\n**Figure 10-1. Control flow with Script task**\n\nWe\
    \ then declared a string variable named `State` with package scope, as shown in\
    \ Figure 10-2.\n\n**Figure 10-2. Declaring a variable**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-363_1.jpg)\n\nAt this point, we’re ready to use the `Script task`\
    \ to initialize our variables. When you double-click the `Script task`, you’ll\
    \ see the editor shown in Figure 10-3.\n\n**Figure 10-3. Script page of the Script\
    \ Task Editor**\n\nOn the `Script` page of the editor, you can choose your preferred\
    \ scripting language with the `ScriptLanguage` parameter. The current options\
    \ are `Microsoft Visual C# 2008` and `Microsoft Visual Basic 2008`. Our preference\
    \ is for `C#`, so our script code samples will be presented in this .NET language.\n\
    \nYou can also choose the `EntryPoint` for the `Script task`, which is the name\
    \ of the function in the script that the task will execute when it runs. The default\
    \ `EntryPoint` function name is `Main`.\n\nYou can also choose to expose variables\
    \ to your script as read-only variables or read/write variables from pop-up dialog\
    \ boxes, shown in Figure 10-4. The `ReadOnlyVariables` property lets you choose\
