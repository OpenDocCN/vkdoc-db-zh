    ## About the Authors


    **Francis Rodrigues** is a computer science graduate of the Loyola University
    in Maryland. He is also an alumnus of Regis High School, a Jesuit school in New
    York City. He currently works as a business intelligence consultant based out
    of New York City. He is an expert developer of enterprise business intelligence
    projects. His specialties include extract, transform, and load (ETL) solutions
    based on SQL Server and SQL Server Integration Services (SSIS). In his spare time,
    he can be found mountain biking in various locations in the New York area.


    **Michael Coles** has more than a decade''s experience designing and administering
    SQL Server databases. A prolific writer of articles on all aspects of SQL Server,
    particularly on the expert use of T-SQL, he holds MCDBA and MCP certifications.
    He graduated magna cum laude with a bachelor of science degree in information
    technology from American Intercontinental University in Georgia. A member of the
    United States Army Reserve, he was activated for two years following 9/11.


    **David Dye** is a Microsoft SQL Server MVP, instructor, and author specializing
    in relational database management systems, business intelligence systems, reporting
    solutions, and Microsoft SharePoint. For the past 9 years David''s expertise has
    been focused on Microsoft SQL Server development and administration. His work
    has earned him recognition as: a Microsoft MVP in 2009 and 2010, a moderator for
    the Microsoft Developer Network for SQL Server forums, Innovator of the Year runner-up
    in 2009 by SQL Server Magazine, and in the Training Associates Technical Trainer
    Spotlight in April 2011. David currently serves as a technical reviewer and co-author
    with APress Publishing in the SQL Server 2012 series, and as an author with Packt
    Publishing.


    ## About the Technical Reviewer


    **Rodney Landrum** has worked with SQL Server longer than he can remember. He
    writes regularly about technologies, including Integration Services, Analysis
    Services, and Reporting Services. He has authored *SQL Server Tacklebox* and three
    Reporting Services books. He contributes regularly to SQLServerCentral, SQL Server
    Magazine, and Simple–Talk. His day job involves overseeing a large SQL Server
    infrastructure in Orlando. He swears he owns the phrase "Working with Databases
    on a Day to Day Basis". Anyone who disagrees is itching to lose an arm wrestling
    match.'
