- fmt: "# CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE\n\nBecause the Pivot\
    \ Key combines two values, Year and Statistic Name, we utilize a derived column\
    \ to split that data into two columns. Figure 3-29 demonstrates how we split the\
    \ column. We add two columns based on the data stored in the `YearAndStatisticName`\
    \ column. We use the following expressions to generate the `Year` and the `StatisticName`\
    \ columns, respectively:\n\n`LEFT(YearAndStatisticName,4)` and `SUBSTRING(YearAndStatisticName,6,LEN(YearAndStatisticName))`.\n\
    \nBecause we know that the first four characters of the column value have to be\
    \ the year, we can use the `LEFT()` string function to extract the year and store\
    \ it in a new column named `Year`. For the statistic name, we have to use the\
    \ whole string with the exception of the first five characters. The `SUBSTRING()`\
    \ string function allows us to define start and end positions of the string. The\
    \ sixth position is the first character after the underscore, and we want to get\
    \ the rest of the string, so we use the `LEN()` string function to define the\
    \ position of the last character of the string.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-82_1.jpg)\n\n## Figure 3-29. DER_SplitYearAndStatistics\n\nWith the\
    \ original column split into more-granular data, we can insert this data into\
    \ a table with the structure defined in Listing 3-3. We used the functionality\
    \ of the `OLE DB destination component` to generate create table scripts based\
    \ on the inputs to generate this script. We removed the column `YearAndStatisticName`\
    \ from the create script because it was no longer required. In the mapping of\
    \ the `OLE DB destination component`, we ignore the `YearAndStatisticName` column.\
    \ The data types of the derived columns are Unicode, but the columns that are\
    \ sourced from the flat file maintain their code page.\n\n## Listing 3-3. Create\
    \ Table Script for Census Data\n\n```sql\nCREATE TABLE dbo.CensusStatistics\n\
    (\n    [STATE_OR_REGION] varchar(50),\n    [Year] nvarchar(4),\n    [StatisticName]\
    \ nvarchar(250),\n    [Statistic] varchar(50)\n);\nGO\n```\n\nThe results of the\
    \ execution are shown in Figure 3-30. As we discussed earlier, the row count of\
    \ the output of the `Unpivot operator` is directly related to the number of distinct\
    \ records of the ignored columns in relation to the number of columns unpivoted.\
    \ The `Merge Join` also omits two records from the left input stream because they\
    \ are not contained in the Apportionment dataset. The data for the District of\
    \ Columbia and Puerto Rico is not included in the Apportionment data because these\
    \ two territories do not have representation in the US Congress. Because we performed\
    \ an inner join, only data that is common to both sets is allowed to flow further\
    \ down the pipeline.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-83_1.jpg)\n\
    \n## Figure 3-30. RealWorld.dtsxexecution\n\nThe query in Listing 3-4 shows us\
    \ the benefits of transforming the data in such a way. Without the `Unpivot component`,\
    \ we would have to include all the columns we required in the `SELECT` clause.\
    \ With this component, we simply define the proper `WHERE` clause to see only\
    \ the data that we require. The denormalized form allows us to include more statistics\
    \ and more years without having to worry about modifying the table structure to\
    \ accommodate the new columns.\n\n## Listing 3-4. Query for Denormalized Data\n\
    \n```sql\nSELECT cs.STATE_OR_REGION,\n       cs.Year,\n       cs.StatisticName,\n\
    \       cs.Statistic\nFROM dbo.CensusStatistics cs\nWHERE cs.Year = '2010'\n \
    \ AND cs.STATE_OR_REGION = 'New York';\n```\n\nThe query in Listing 3-4 shows\
    \ us all the statistics for the state of New York in the year 2010. Without the\
    \ denormalization, we would have to include six columns to account for the year\
    \ and the different statistics. If we wanted to see all the data for New York\
    \ since the data collection started, we would have to include 66 columns rather\
    \ than simply omitting the `WHERE` clause limiting the year.\n\n## Summary"
