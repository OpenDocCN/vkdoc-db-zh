    Security properties handle the sensitive information that may be stored in a package.
    The main property in this segment, `ProtectionLevel`, was listed earlier. These
    properties can be configured depending on the different environments used for
    development, testing, and production. Some settings will allow you to move the
    packages between environments without causing authentication issues.


    TIP: One option that can help speed up development of SSIS 12 packages is the
    `OfflineMode` property in the Misc category. This property prevents the package
    from opening connections to validate metadata. This property is read-only and
    can be modified by using the SSIS menu on the menu bar. Another option for modifying
    this property is handled through a file, `<project_name>.dtproj.user`. This XML-based
    file includes the property `OfflineMode`. This directly corresponds to the package
    property, but affects all the packages within that project. If you modify this
    file, you should close the project, modify the file, and then reopen the project.
    Modifying this file will allow you to avoid having to change it every time you
    need to make a project change, but there are obvious dangers associated with that.
    Once development is complete or if the structure of the source or destination
    has changed, we highly recommend that you set this property to False. It is a
    best practice to validate metadata whenever a package is modified; it will help
    to ensure that the proper source and destination are being used for development
    along with many other issues that will start to mysteriously arise during runtime.


    ## Hello World


    With a brief introduction to SSIS 12 package properties under your belt, let us
    dive right into creating a package. The first step in developing a package in
    Visual Studio requires a project. For this particular chapter, we created a project
    aptly titled Chap3_HelloWorld. Figure 3-2 demonstrates how to create a new Integration
    Services project within Visual Studio. You access the dialog box by going to the
    File menu on the toolbar and choosing New -> Project. An alternative to this is
    to use the Recent Projects pane on the Start page. There is hyperlink to create
    a Project at the bottom.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-51_1.jpg)


    *Figure 3-2. Creating a new Integration Services project*


    Following are some of the elements within the dialog box, and a brief description
    of their purpose:


    * The `Name` text field in the dialog box assigns the name to the project file.
    This name should be sufficiently broad to cover the various packages that will
    be stored. Because we are trying to demonstrate only a simple package, the project
    name refers to a simple process.

    * The `Location` field indicates the directory where the project will be stored
    on the file system during development. For simplicity, we created a short folder
    path to store our packages.

    * The `Solution Name` field is automatically populated with the same value as
    is provided in the `Name` field, but it can be changed if the name does not suit
    the solution.

    * The `Create Directory for Solution` check box is extremely useful for keeping
    the projects organized. It will create a subfolder within the defined `Location`
    and place all the files (`.database`, `.dtproj`, `.dtproj.user`, `.dtsx`, and
    so forth) and subfolders required for building and deploying within it.


    After the project is created, Visual Studio will automatically generate a package
    and name it `Package.dtsx`. One of the first steps we recommend that you perform
    is to modify this name to a more appropriate and descriptive name. If you change
    it directly through Solution Explorer, you will get a dialog box asking you to
    confirm a change to the `Name` property of the package. If you change the name
    of the package through the Properties window, you will not get a dialog box to
    confirm a change to the file name. This behavior allows the two to be out of sync,
    but there is no reason to have such a scenario. We recommend that you keep them
    in sync.


    Because we are not creating a complex package with large amounts of metadata,
    we are going to leave the `DelayValidation` property to False. This package will
    simply take data from a flat file and move it to a SQL Server 12 database without
    any transformations. This is the simplest ETL task SSIS can perform, taking data
    from a source storage platform and placing it in a destination storage platform.
    We will also skip over the ID generation because we did not copy this package
    from an existing one.


    We will set `ProtectionLevel` to `DontSaveSensitive`. This will allow us to work
    on the package without having to remember a password or having to use the same
    machine through a common user account. It will also force us to store any required
    connection information in a different file other than the package.


    We encourage you to store sensitive information in configuration files for both
    the security of storing the information only once and the ability to limit access
    to this file.


    After all the desired properties are set, we can start the actual development
    of the package. We recommend that you add an annotation like the one shown in
    Figure 3-1 that outlines the basic design we are going to implement for the ETL
    process. With the annotation in place, we know the function of all the objects
    in the package. The first step toward the ETL process is identifying the data
    you want to extract, the location of the data, and some rudimentary data (metadata)
    about the data. When handling flat files, metadata becomes crucial because a low
    estimation of column lengths will result in truncation.


    NOTE: The `ProtectionLevel` setting needs to be the same on all the packages associated
    to a project as the project’s `ProtectionLevel` property.


    ## Flat File Source Connection


    The first object we will add to the package is a flat file connection. We do this
    by right-clicking in the Connection Managers pane at the bottom of the designer
    and selecting New Flat File Connection. This opens the Flat File Connection Manager
    Editor, depicted in Figure 3-3. We recommend that you replace the default name
    of the connection with one that will enable you to easily identify the data to
    which the manager is providing access. The name of the connection must be unique.
    In addition, we also recommend writing a short description of the manager in the
    `Description` field. These two fields will reappear in all of the pages listed
    in the left panel of the editor.


