    \ functions and operators that make up the expression language. Chapter 10 will\
    \ walk you through scripting in SSIS.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 10 - Scripting\n\n*You're darn right more power!*\n—Tim Allen, *Home\
    \ Improvement*\n\nSSIS provides several stock control flow tasks and data flow\
