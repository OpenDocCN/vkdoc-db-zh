- fmt: 'Nearly any process that you can define in terms of ETL steps can be performed
    with `SSIS`. And it’s not just limited to databases (though that is our primary
    focus in this book). As an example, you can use Windows Management Instrumentation
    (`WMI`) to retrieve data about a computer system, format it to your liking, and
    store it in an Excel spreadsheet; or you can grab data from a comma-delimited
    file, transform it a bit, and write it back out to a new comma-delimited file.
    Not to put too fine a point on it, but you can perform just about any task that
    requires data movement and manipulation with `SSIS`.


    ## What Is Enterprise ETL?


    You’ve seen us refer to `SSIS` as an *enterprise ETL solution* in this chapter,
    and you may have asked yourself, “What is the difference between an enterprise
    ETL solution and any other ETL solution?” Don’t worry, it’s a common question
    that we asked once and that has since been asked of us several times. It has a
    very simple answer: enterprise ETL solutions have the ability to help you meet
    your nonfunctional requirements in addition to the standard functional requirements
    of extract, transform, and load.


    So what is a *nonfunctional requirement* and what does it have to do with ETL?
    If you’ve ever been on a development project for an application or business system,
    you’re probably familiar with the term. In the previous section, we discussed
    how `SSIS` helps you meet your ETL *functional requirements*—those requirements
    of a system that describe what it does. In the case of ETL, the functional requirements
    are generally pretty simple: (1) get data from one or more sources, (2) manipulate
    the data according to some predefined business logic, and (3) store the data somewhere.


    Nonfunctional requirements, on the other hand, deal more with the qualities of
    the system. These types of requirements deal in aspects such as robustness, performance
    and efficiency, maintainability, security, scalability, reliability, and overall
    quality of an ETL solution. We like to think of nonfunctional requirements as
    the aspects of the system that do not necessarily have a direct effect on the
    end result or output of the system; instead they work behind the scenes in support
    of the result generation.


    Here are some of the ways `SSIS` can help you meet your nonfunctional requirements:


    - **Robustness** is provided in `SSIS` primarily through built-in error-handling
    to capture and deal with bad data and execution exceptions as they occur, transactions
    that ensure consistency of your data should a process enter an unrecoverable processing
    exception, and checkpoints that allow some ability to restart packages.

    - **Performance and efficiency** are closely related, but not entirely synonymous,
    concepts. You can think of performance as the raw speed with which your ETL processes
    accomplish their tasks. Efficiency digs a bit deeper and includes minimizing resource
    (memory, CPU, and persistent storage) contention and usage. `SSIS` has many optimizations
    baked directly into its data flow components and data flow engine—for instance,
    to tweak the raw performance and resource efficiency of the data flow. Chapter
    14 covers the things you can do to get the most out of the built-in optimizations.

    - **Maintainability** can be boiled down to the ongoing cost of managing and administering
    your ETL solution after it’s in production. Maintainability is also one of the
    easiest items to measure, because you can ask questions such as, “How many hours
    each month do I have to spend fixing issues in ETL processes?” or “How many hours
    of manual intervention are required each week to deal with, or to avoid, errors
    in my ETL process?” `SSIS` provides a new project deployment model to make it
    easier to move ETL projects from one environment to the next; and `BIDS` provides
    built-in support for source control systems such as Team Foundation Server (`TFS`)
    to help minimize the maintenance costs of your solutions.

    - **Security** is provided in `SSIS` through a variety of methods and interactions
    with other systems, including Windows NT File System (`NTFS`) and SQL Server.
    Package and project deployment to SQL Server is a powerful method of securing
    your packages. In this case, SQL Server uses its robust security model to control
    access to, and encryption of, `SSIS` package contents.

    - **Scalability** can be defined as how well your ETL solution can handle increasing
    quantities of data. `SSIS` provides the ability to scale predictably with your
    increased demands, providing of course that you create your packages to maximize
    `SSIS`’s throughput. We discuss scalable ETL design patterns in Chapter 15.


    > **TIP:** For in-depth coverage of `SSIS` design patterns, we highly recommend
    picking up a copy of *SSIS Design Patterns* by Andy Leonard, Matt Masson, Tim
    Mitchell, Jessica Moss, and Michelle Ufford (Apress, 2012).


    ![](index-8_1.jpg)


    ## Reliability


    Reliability, put simply, can be defined as how resistant your ETL solution is
    to failure—and if failure does occur, how well your solution handles the situation.
    `SSIS` provides extensive logging capabilities that, when combined with `BIDS`’s
    built-in debugging capabilities, can help you quickly track down and fix the root
    cause of failure. `SSIS` can also notify you in the event of a failure situation.


    All these individual nonfunctional requirements, when taken together, help define
    the overall quality of your ETL solution. Although it’s relatively simple to put
    together a package or program that shuttles data from point A to point B, the
    nonfunctional requirements provide a layer on top of this basic functionality
    that allows you to meet your service-level agreements (`SLAs`) and other processing
    requirements.


    ## SSIS Architecture


    One of the major improvements that `SSIS` introduced over `DTS` was the separation
    of the concepts of *control flow* and *data flow*. The control flow manages the
    order of execution for packages and manages communication with support elements
    such as event handlers. The data flow engine is exposed as a component within
    the control flow and it provides high-performance data extraction, transformation,
    and loading services.


    As you can see in Figure 1-1, the relationship between control flows, data flows,
    and their respective components is straightforward.


    **Figure 1-1.** Relationship between control flow and data flow


    ![](index-9_1.jpg)


    Simply speaking, a package contains the control flow. The control flow contains
    control flow *tasks* and *containers*, both of which are discussed in detail in
    Chapter 4. The *Data Flow task* is a special type of task that contains the data
    flow. The data flow contains *data flow components*, which move and manipulate
    your data. There are three types of data flow components:


    - **Sources** can pull data from any of a variety of data stores, and feed that
    data into the data flow.

    - **Transformations** allow you to manipulate and modify data within the data
    flow one row at a time.

    - **Destinations** provide a means for the data flow to output and persist data
    after it moves through the final stage of the data flow.


    Although the simplified diagram in Figure 1-1 shows only a single data flow in
    the control flow, any given control flow can contain many data flows. As the diagram
    also illustrates, both control flows and data flows are found within the confines
    of `SSIS` packages that you can design, build, and test with Microsoft Business
    Intelligence Development Studio (`BIDS`). `BIDS` is a shell of the Visual Studio
    integrated development environment (`IDE`) that .NET programmers are familiar
    with. Figure 1-2 shows the data flow for a very simple `SSIS` package in the `BIDS`
    designer.


    **Figure 1-2.** Simple SSIS package data flow in BIDS'
