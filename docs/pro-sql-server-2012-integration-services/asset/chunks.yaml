- fmt: '# Scripting Tasks and Log Providers


    ## Scripting Task Group


    The Scripting task group includes just one task, the Script task. This group provides
    the task-specific logging event shown in Table 11-6.


    *Table 11-6. Scripting Tasks Logging Events*


    | Event Name | Task | Fired... |

    | :--- | :--- | :--- |

    | `ScriptTaskLogEntry` | Script task | ...in response to `Dts.Log()` method calls
    |


    ## Log Providers


    In SSIS terminology, a *log provider* is a component that persists details about
    your package execution.


    SSIS logs the events you choose to log providers that you select in your package.
    SSIS provides several stock log providers to cover the most commonly used types
    of logging. These log providers are selected by right-clicking on an empty area
    of the control flow within BIDS and selecting **Logging** to access the logging
    options shown in Figure 11-2.


    ![](index-412_1.jpg)


    *Figure 11-2. Choosing a log provider in an SSIS package*


    The containers and tasks are listed in the tree view on the left side of the editor.
    The **Providers and Logs** tab lets you configure the appropriate log providers.
    The stock log providers supplied by SSIS are listed in Table 11-7. Of these, the
    SQL Server provider, Text File provider, and Windows Event Log provider are the
    most commonly used log providers.


    *Table 11-7. SSIS Stock Log Providers*


    | Log Provider | Description |

    | :--- | :--- |

    | `SSIS Log Provider for Text Files` | Logs to comma-separated values (CSV) log
    files |

    | `SSIS Log Provider for SQL Server` | Logs to the `dbo.sysssislog` table in a
    SQL Server database |

    | `SSIS Log Provider for SQL Server Profiler` | Logs to SQL Server Profiler trace
    files (only available in 32-bit mode) |

    | `SSIS Log Provider for Windows Event Log` | Logs to the Windows Event log Application
    log |

    | `SSIS Log Provider for XML Files` | Logs to XML files |


    After choosing a log provider, many of them require you to choose a connection
    in the **Configuration** column. For the SQL Server provider, you need to choose
    an OLE DB Connection Manager. The text file, XML file, and SQL Server Profiler
    providers require a file connection. The Windows Event Log provider doesn’t require
    a connection. In Figure 11-3, we’ve selected the SQL Server log provider with
    an OLE DB Connection Manager named `LOG`.


    ![](index-413_1.jpg)


    *Figure 11-3. Configuring an SSIS log provider for SQL Server*


    In the **Details** tab of the editor, you can choose the events that you want
    to log, as shown in Figure 11-4. You can choose different events to log for the
    package and for individual containers and tasks, or you can choose to log the
    same events for everything in the package.


    ![](index-414_1.jpg)


    *Figure 11-4. Selecting events to log in the Details tab*


    You can even choose which elements of each event are logged by clicking the **Advanced**
    button.


    Generally speaking, you probably won’t need to change the default (log all elements)
    unless you have an event that logs very large `MessageText` or `DataBytes` entries,
    for instance. Figure 11-5 shows the Advanced options of the Details tab.


    ![](index-415_1.jpg)


    ![](index-415_2.jpg)


    *Figure 11-5. Advanced options of the logging Details editor*


    Figure 11-6 shows a sample of the log entries saved in the `dbo.sysssislog` table
    by the SQL Server log provider. The information logged includes the name of the
    event being logged; the name of the package, container, or task that fired the
    event; the start and end times; and a descriptive message of the event.


    *Figure 11-6. Sample SSIS log entries*


    When you run SSIS packages in BIDS, the events fired by the package can be viewed
    on the **Progress** tab, shown in Figure 11-7. The Progress tab is updated in
    real-time as the package runs, which is useful for package testing and debugging
    purposes.


    ![](index-416_1.jpg)


    *Figure 11-7. SSIS Progress tab in BIDS*


    ## Choosing Events to Log


    You can log dozens of events in your SSIS packages, but logging everything is
    not necessarily the best idea. Logging takes time and uses server resources. Logging
    too many events can slow down your SSIS packages and result in bloated logs that
    make it difficult to find specific events. Which events you choose to log depends
    on your environment: often you’ll need to log more-detailed events in a development
    or testing environment than in a production setting.


    Take the `OnInformation` and `OnProgress` events, for instance. These events occur
    frequently—`OnProgress` can fire up to 100 times per task. Wrap that task in a
    loop container and you can get thousands of instances of this event logged per
    package execution. While `OnInformation` and `OnProgress` are useful in a debugging
    scenario, they’re usually overkill for production environments.


    Some events, such as `OnPreExecute` and `OnPostExecute`, don’t add a lot of value
    to the logged information, but they do not generate the extensive logging activity
    of some other events. The primary events that we log in every environment include
    `OnError`, `OnWarning`, `OnTaskFailed`, and `OnQueryCancel`. These events give
    you the bare-minimum information you need to begin troubleshooting SSIS packages.


    ## Script Events


    SSIS lets you fire events from Script tasks and script components. Both options
    give you the opportunity to add context, task-specific error messaging, and additional
    debugging and performance information to your packages. We discuss firing events
    from script in this section.


    In your .NET script code, you can (and generally should) use `try-catch` exception
    handling within your code. If you need to raise an SSIS error within your component,
    you’ll want to use the events covered in the following sections.


    ### Script Task Events


    You can fire logging events with the `Dts.Log()` method in Script tasks. These
    logging events are like the built-in logging events in that they are sent to your
    log provider but do not have associated event handlers. They’re captured in your
    logging details with the `ScriptTaskLogEntry` event and are useful for sending
    user-defined informational messages to your log.


    The `Dts.Events` object also provides several **Fire** methods to fire associated
    events, which can in fact have event handlers associated with them. These methods
    are listed in Table 11-8.


    *Table 11-8. Dts.Events Event-Firing Methods*


    | Method | Fires... |

    | :--- | :--- |

    | `Dts.Events.FireCustomEvent()` | ...a user-defined custom event |

    | `Dts.Events.FireError()` | ...the `OnError` event, which indicates an error
    condition in your package |

    | `Dts.Events.FireInformation()` | ...the `OnInformation` event, which sends informational
    messages |

    | `Dts.Events.FireProgress()` | ...the `OnProgress` event, which indicates task
    progress and is useful in long-running tasks |

    | `Dts.Events.FireQueryCancel()` | ...the `OnQueryCancel` event, which checks
    for a Query Cancel state to determine whether a query should be stopped |

    | `Dts.Events.FireWarning()` | ...the `OnWarning` event, which indicates a warning
    (which is less severe than an error condition) |'
