    ## SQL Server Management Studio 简介


    SQL Server 12 内置的用于访问和维护的工具是 Management Studio。它允许你配置、管理和开发 SQL Server 的组件。连接到数据库引擎允许你使用
    T-SQL 以及通过使用 `SQLCMD` 模式的 SQL 命令实用程序来执行操作系统命令。数据库引擎允许使用 DDL 来创建对象，使用 DML 来访问对象中的数据，以及使用
    DCL 来定义用户对对象的 DDL 和 DML 访问权限。Management Studio 允许你创建和修改 T-SQL、MDX、DMX、XML 和 XML
    for Analysis (XMLA) 脚本，甚至是纯文本文件。

