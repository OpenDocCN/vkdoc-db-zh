    ## Execution


    Aside from offering an organized view of the package’s object, the `Package Explorer`
    design window also allows you to quickly navigate to the object that requires
    modification. Double-clicking the individual connection manager will open its
    editor. Double-clicking the `Data Flow` task will open that particular `Data Flow`
    task’s design window.


    We have finally arrived at the fruits of our labor. We have set up the package,
    and all the objects are in place to allow us to move data from the flat file to
    the SQL Server database. Using `Visual Studio` to execute the package requires
    opening the package as a part of a project. `Visual Studio` performs build operations
    before each debugging operation by default. This allows you to see the progress
    of each component and executable.


    ![Figure 3-20. Visual Studio Standard toolbar](index-71_1.jpg)


    ![Figure 3-21. DFT_MovePopulationDensityData—execution visuals](index-71_2.jpg)


    Figure 3-20 displays the Standard toolbar with the `Start Debugging` button highlighted.
    Another option to execute a package in `Visual Studio` is to right-click the package
    and select `Execute Package`. The solution file also starts the debug mode; to
    use this method, you have to right-click the solution name in `Solution Explorer`,
    going to the `Debug` Group and then selecting `Start New Instance`.


    There are three colors associated with the `Visual Studio` debug mode for SSIS:
    green denoting success, yellow denoting in progress, and red denoting failure.
    Figure 3-21 shows the output of the debug operation of this package. `Visual Studio`
    provides a row count for each data path; for this simple package, there is only
    one. This output informs us that 53 rows were extracted from the flat file and
    successfully inserted into the destination table.


    Another option to execute the package is to use the `Start Without Debugging`
    option in the `Debug` menu on the menu bar. This will prompt `Visual Studio` to
