    method also causes the executables accessing the variables within the child package
    to error during the runtime, when the child package is executed on its own. We
    discuss these options in Chapter 16.


    Variable listing is sensitive to the scope of the variables. The scope of a variable
    can be from the package as a whole or within a specific container, task, or event
    handler. With multiple variables, you can easily lose track of them all, so the
    annotation can save a lot of digging around. The Package Explorer tab and the
    Show Variables of All Scopes option in the Parameters and Variables toolbar allow
    the same functionality, but with the annotation, you can document the role they
    play in the process.


     **NOTE:** Parameters, variables, and system variables are listed in the same
    drop-down list when they are being assigned. We recommend that you use namespaces
    to avoid any confusion. We discuss parameters and variables in complete detail
    in Chapter 10.


    Package Property Categories


    The package properties are divided into categories to group them by the function
    they provide. These categories are generally broad and contain a lot more configurable
    properties than the main ones outlined in the preceding section. These categories
    and their properties address some of the nonfunctional capabilities of SSIS 12\.
    We briefly introduce the categories here and provide more in-depth analysis in
    the later chapters:


    Checkpoint properties control the restart ability of SSIS package execution.


    You have to define a file path and name for the progress to be stored during


    execution. In the event of a failure, this file will be used to restart the process
    at the task at which it previously failed. This functionality by itself will not
    handle the rollback of committed data. After a successful execution, this file
    is


    automatically deleted.


    Execution properties define the runtime aspects of the package. These include


    the number of failures that the package can tolerate and how to treat the


    failures of nested containers with respect to the success of the parent container.


    Performance tuning can also start with the properties in this section. If memory
    overflows become an issue, the number of concurrent executables can be


    limited.


    Identification properties are used to uniquely recognize packages. These


    properties include some of the ones listed previously (specifically, Name and
    ID).


