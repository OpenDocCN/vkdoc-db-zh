- fmt: '# CHAPTER 4 — CONNECTION MANAGERS


    ## FTP Connection Manager


    The `Server Name` and the `Server Port` fields allow you to define the FTP server
    that the connection should be made to and the port that the server will be listening
    to. The `Credentials` section stores the authentication information. By default,
    the value is `Anonymous`. The `Time-Out` field defines, in seconds, the period
    of time that a task may take before timing out. The value `0` signifies that the
    connection will not time out. The check box that enables passive mode indicates
    that the package will start the connection. By default, active mode has the server
    initiate the connection. The `Retries` field sets the number of retries; `0` indicates
    unlimited retries. The `Chunk Size` denotes the size for chunks when transmitting
    data. The `Test Connection` button allows you to test the connection parameters.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-98_1.jpg)


    **NOTE:** The FTP Connection Manager supports only anonymous and simple authentication.
    Windows authentication is not supported.


    ## HTTP Connection Manager


    Just as FTP can be used to store files, Hypertext Transfer Protocol (`HTTP`) can
    be used to store data. The `HTTP` connection allows you to connect to a web server
    to perform tasks. This connection enables you to upload and download files to
    and from a web server. This connection manager works in conjunction with a `Web
    Service` task. `Figure 4-12` shows the options that are used to configure this
    connection manager.


    `Figure 4-12. HTTP Connection Manager Editor—Server page`


    The `Server URL` stores the URL to the desired web server. If you intend to use
    Web Services Description Language (`WSDL`) on the `Web Services` task, the URL
    should end with `?wsdl`. The `Use Credentials` option allows you to specify the
    login information necessary to connect to the web server.


    The `User Name`, `Password`, and `Domain` are the key elements for the credentials
    to be recognized by the server. The `Use Client Certificate` option allows you
    to specify a certificate to authenticate the connection. Once enabled, the `Certificate`
    button allows you to select a certificate to use. The `Time-Out` setting allows
    you to define the time allotted to connect to a web server. The `Chunk Size` option
    determines the size of data to be written. The `Test Connection` button allows
    you to test your current configuration of the connection manager as illustrated
    in `Figure 4-13`.


    `Figure 4-13. HTTP Connection Manager Editor—Proxy page`


    The `Proxy` page allows you to use a proxy server to connect to the defined URL.
    The `Proxy URL` requires the URL for the proxy server being used. The `Bypass
    Proxy on Local` option allows you to bypass using the proxy server for local addresses.
    The `Use Credentials` check box allows you to provide the authentication information
    that might be needed to connect to the proxy server. The `User Name`, `Password`,
    and `Domain` are the key components necessary for access to the proxy server.
    The `Add` and `Remove` buttons allow you to modify a list of addresses defined
    to bypass the proxy server.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-100_1.jpg)


    ## MSOLAP100 Connection Manager


    The `Analysis Services` Connection Manager, `MSOLAP100`, allows you to connect
    to an `Analysis Services` engine and during design time connect to an `Analysis
    Services` project. At runtime, the connection will connect to only the server
    and the database with the deployed `Analysis Services` project. `Figure 4-14`
    shows how to add an `Analysis Services` Connection Manager.


    `Figure 4-14. Add Analysis Services Connection Manager`


    Creating a connection to an `Analysis Services` instance is as simple as providing
    the server name. By default, the provider for this connection manager is set to
    `Microsoft Online Analytical Processing (MSOLAP)`, defining the `OLAP` engine
    as the `Analysis Services` engine. The `Impersonation Level` allows you to define
    the authentication to use. The different `Impersonation Levels` are defined in
    the following list. The `Analysis Services Execute DDL` task and `Analysis Services
    Processing` task utilize this connection to access the `Analysis Services` database.
    The `Data Mining Model Training` destination component can utilize this connection
    to apply models to the data. The option to create the connection to an `Analysis
    Services` project in this solution utilizes the project only for metadata. At
    runtime, the tasks will need to utilize this connection to connect to an existing
    database.


    -   `Anonymous`: The server does not see any information about the client during
    access.

    -   `Identify`: The server knows the client’s identity and can use the client’s
    access control list.

    -   `Impersonate`: The server can impersonate the client with dependencies on
    the location of the server and the client. If the server and the client are on
    the same machine, the server can access the network resources of the client. If
    they reside on different machines, the server has access to only the resources
    available on its own machine.

    -   `Delegate`: The server can impersonate the client regardless of the machine.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-101_1.jpg)


    ## DQS Connection Manager


    The `Data Quality Services (DQS)` Connection Manager allows you to connect to
    a `Data Quality Services` server and database. The `Data Correction` transformation
    task utilizes this connection to access a set of data correction rules before
    applying them to the pipeline.


    ## MSMQ Connection Manager


    The `Microsoft Message Queuing, MSMQ`, Connection Manager allows you to connect
    to a message queue that utilizes message queuing. The connection manager will
    connect a `Message Queue` task to the specified queue in order to trigger the
    message service. `Figure 4-15` demonstrates how to set up the manager.


    `Figure 4-15. MSMQ Connection Manager Editor`


    There are two ways to define the path, depending on the type of message queue.
    For private queues, the format is `<computername>\Private$\<queuename>`. A period
    (`.`) can also be used to represent the local machine, as shown in `Figure 4-15`.
    For public queues, the format simply eliminates the private path: `<computername>\<queuename>`.


    **NOTE:** By default, message queuing is turned off on Windows installations.
    You will have to enable the service and create your own queue so that `SSIS` can
    utilize it.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-102_1.jpg)


    ## SMO Connection Manager


    `SQL Server Management Object (SMO)` Connection Manager enables the package to
    establish a connection with a `SQL Management Object` server. This connection
    manager is utilized by the transfer tasks that are present by default in `SSIS
    12`. `Figure 4-16` shows you the editor for this connection manager.


    `Figure 4-16. SMO Connection Manager Editor`


    The `SMO Connection Manager Editor` requires only the server name and the authentication
    mode to access the server. The `Refresh` button reloads the list of available
    servers. The `Test Connection` button will check the current configuration provided
    in the editor. The different transfer executables allow you to perform `Data Access
    Language (DAL)`, moving and copying databases, and other functions.


    Depending on the task you use, you will have to define the database, but transfer
    tasks will all utilize this connection to connect to a server.


    ## SMTP Connection Manager


    The `SMTP` Connection Manager allows you to connect to a `Simple Mail Transfer
    Protocol (SMTP)` server.'
  raw: 'The Server Name and the Server Port fields allow you to define the FTP server
    that the connection should be made to and the port that the server will be listening
    to. The Credentials section stores the authentication information. By default,
    the value is Anonymous. The Time-Out field defines, in seconds, the period of
    time that a task may take before timing out. The value 0 signifies that the connection
    will not time out. The check box that enables passive mode indicates that the
    package will start the connection. By default, active mode has the server initiate
    the connection. The Retries field sets the number of retries; 0 indicates unlimited
    retries. The Chunk Size denotes the size for chunks when transmitting data. The
    Test Connection button allows you to test the connection parameters.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-98_1.jpg)


    CHAPTER 4  CONNECTION MANAGERS


     **NOTE:** The FTP Connection Manager supports only anonymous and simple authentication.
    Windows authentication is not supported.


    HTTP Connection Manager


    Just as FTP can be used to store files, Hypertext Transfer Protocol (HTTP) can
    be used to store data. The HTTP connection allows you to connect to a web server
    to perform tasks. This connection enables you to upload and download files to
    and from a web server. This connection manager works in conjunction with a Web
    Service task. Figure 4-12 shows the options that are used to configure this connection
    manager.


    *Figure 4-12\. HTTP Connection Manager Editor—Server page*


    The Server URL stores the URL to the desired web server. If you intend to use
    Web Services Description Language (WSDL) on the Web Services task, the URL should
    end with ?wsdl. The Use 96


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-99_1.jpg)


    CHAPTER 4  CONNECTION MANAGERS


    Credentials option allows you to specify the login information necessary to connect
    to the web server.


    The User Name, Password, and Domain are the key elements for the credentials to
    be recognized by the server. The Use Client Certificate option allows you to specify
    a certificate to authenticate the connection. Once enabled, the Certificate button
    allows you to select a certificate to use. The Time-Out setting allows you to
    define the time allotted to connect to a web server. The Chunk Size option determines
    the size of data to be written. The Test Connection button allows you to test
    your current configuration of the connection manager as illustrated in Figure
    4-13.


    *Figure 4-13\. HTTP Connection Manager Editor—Proxy page*


    The Proxy page allows you to use a proxy server to connect to the defined URL.
    The Proxy URL


    requires the URL for the proxy server being used. The Bypass Proxy on Local option
    allows you to bypass using the proxy server for local addresses. The Use Credentials
    check box allows you to provide the authentication information that might be needed
    to connect to the proxy server. The User Name, Password, and Domain are the key
    components necessary for access to the proxy server. The Add and Remove buttons
    allow you to modify a list of addresses defined to bypass the proxy server.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-100_1.jpg)


    CHAPTER 4  CONNECTION MANAGERS


    MSOLAP100 Connection Manager


    The Analysis Services Connection Manager, MSOLAP100, allows you to connect to
    an Analysis Services engine and during design time connect to an Analysis Services
    project. At runtime, the connection will connect to only the server and the database
    with the deployed Analysis Services project. Figure 4-14


    shows how to add an Analysis Services Connection Manager.


    *Figure 4-14\. Add Analysis Services Connection Manager*


    Creating a connection to an Analysis Services instance is as simple as providing
    the server name. By default, the provider for this connection manager is set to
    Microsoft Online Analytical Processing (MSOLAP), defining the OLAP engine as the
    Analysis Services engine. The Impersonation Level allows you to define the authentication
    to use. The different Impersonation Levels are defined in the following list.
    The Analysis Services Execute DDL task and Analysis Services Processing task utilize
    this connection to access the Analysis Services database. The Data Mining Model
    Training destination component can utilize this connection to apply models to
    the data. The option to create the connection to an Analysis Services project
    in this solution utilizes the project only for metadata. At runtime, the tasks
    will need to utilize this connection to connect to an existing database.


    Anonymous: The server does not see any information about the client during


    access.


    Identify: The server knows the client’s identity and can use the client’s access
    control list.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-101_1.jpg)


    CHAPTER 4  CONNECTION MANAGERS


    Impersonate: The server can impersonate the client with dependencies on the


    location of the server and the client. If the server and the client are on the
    same machine, the server can access the network resources of the client. If they


    reside on different machines, the server has access to only the resources


    available on its own machine.


    Delegate: The server can impersonate the client regardless of the machine.


    DQS Connection Manager


    The Data Quality Services (DQS) Connection Manager allows you to connect to a
    Data Quality Services server and database. The Data Correction transformation
    task utilizes this connection to access a set of data correction rules before
    applying them to the pipeline.


    MSMQ Connection Manager


    The Microsoft Message Queuing, MSMQ, Connection Manager allows you to connect
    to a message queue that utilizes message queuing. The connection manager will
    connect a Message Queue task to the specified queue in order to trigger the message
    service. Figure 4-15 demonstrates how to set up the manager.


    *Figure 4-15\. MSMQ Connection Manager Editor*


    There are two ways to define the path, depending on the type of message queue.
    For private queues, the format is <computername>\Private$\<queuename>. A period
    can also be used to represent the local machine, as shown in Figure 4-15\. For
    public queues, the format simply eliminates the private path:


    <computername>\<queuename>.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-102_1.jpg)


    CHAPTER 4  CONNECTION MANAGERS


     **NOTE:** By default, message queuing is turned off on Windows instal ations.
    You wil have to enable the service and create your own queue so that SSIS can
    utilize it.


    SMO Connection Manager


    SQL Server Management Object (SMO) Connection Manager enables the package to establish
    a connection with a SQL Management Object server. This connection manager is utilized
    by the transfer tasks that are present by default in SSIS 12\. Figure 4-16 shows
    you the editor for this connection manager.


    *Figure 4-16\. SMO Connection Manager Editor*


    The SMO Connection Manager Editor requires only the server name and the authentication
    mode to access the server. The Refresh button reloads the list of available servers.
    The Test Connection button will check the current configuration provided in the
    editor. The different transfer executables allow you to perform Data Access Language
    (DAL), moving and copying databases, and other functions.


    Depending on the task you use, you will have to define the database, but transfer
    tasks will all utilize this connection to connect to a server.


    SMTP Connection Manager


    The SMTP Connection Manager allows you to connect to a Simple Mail Transfer Protocol
    (SMTP) server.'
