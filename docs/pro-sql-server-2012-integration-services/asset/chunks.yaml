    ```sql\nSELECT Alpha2,\n       CountryName,\n       Year,\n       TLD\nFROM [Sheet1$];\n\
    ```\n\n**注意：** Excel 源和 Excel 目标配配器使用 Microsoft OLE DB Provider for Jet 4.0 和\
