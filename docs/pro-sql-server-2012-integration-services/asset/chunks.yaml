    # 第 14 章 - 异构源和目标


    ## 图 14-14. XML 源编辑器的列页面


    图 14-14 展示了`XML 源编辑器`的`列`页面。这个源组件有趣的一点是，根据 XML 的节点层级数量，每个层级都会有自己的输出。


    图中显示，这个特定的 XML 文件有三个层级：`Property`、`Properties`和`Event`。列表是按字母顺序而非层级结构排列的，因此仅通过查看输出，你无法轻松确定其结构。每个输出的列集都基于`XSD`进行设置。


