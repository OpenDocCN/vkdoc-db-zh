- fmt: "# CHAPTER 13  LOGGING AND AUDITING\n\n## Package-Level Auditing\n\nOur package-level\
    \ auditing functionality records package identification and execution information\
    \ including an execution GUID that you can use to join back to the SSIS log table.\
    \ This adds context to the SSIS log entries and provides additional information\
    \ that can be used for troubleshooting on a per-package basis.\n\nTo store package\
    \ audit information, we create an `AuditPackage` table, which holds package information\
    \ including name, version, and a GUID that can be used to join the entries in\
    \ this table to the SSIS log entries (if you use the SSIS log provider for SQL\
    \ Server). Here’s the code for our table:\n\n```sql\nIF OBJECT_ID ('Audit.AuditPackage')\
    \ IS NOT NULL\n    DROP TABLE Audit.AuditPackage;\nGO\n\nCREATE TABLE Audit.AuditPackage\n\
    (\n    AuditPackageID BIGINT NOT NULL IDENTITY(1, 1),\n    BatchID BIGINT NOT\
    \ NULL,\n    PackageName NVARCHAR(128),\n    ExecutionInstanceGUID UNIQUEIDENTIFIER,\n\
    \    ProductVersion NVARCHAR(20),\n    MachineName NVARCHAR(128),\n    VersionMajor\
    \ INT,\n    VersionMinor INT,\n    VersionBuild INT,\n    LocaleID INT,\n    PackageStartTime\
    \ DATETIMEOFFSET,\n    PackageEndTime DATETIMEOFFSET,\n    PackageElapsedTimeMS\
    \ AS (DATEDIFF(MILLISECOND, PackageStartTime, PackageEndTime)),\n    CONSTRAINT\
    \ PK_AUDIT_AUDITPACKAGE PRIMARY KEY CLUSTERED\n    (\n        AuditPackageID\n\
    \    )\n);\nGO\n```\n\nWe created two procedures for package auditing: `StartAuditPackage`\
    \ to start the audit process, and `EndAuditPackage` to end the audit. The start\
    \ procedure returns a unique package audit ID number after each call. That same\
    \ audit ID number is passed into the end procedure to complete the audit entry.\
    \ The code is as follows:\n\n```sql\nIF OBJECT_ID('Audit.StartAuditPackage') IS\
    \ NOT NULL\n    DROP PROCEDURE Audit.StartAuditPackage;\nGO\n\nCREATE PROCEDURE\
    \ Audit.StartAuditPackage\n    @ExecutionInstanceGUID UNIQUEIDENTIFIER,\n    @ProductVersion\
    \ NVARCHAR(20),\n    @MachineName NVARCHAR(128),\n    @VersionMajor INT,\n   \
    \ @VersionMinor INT,\n    @VersionBuild INT,\n    @LocaleID INT,\n    @PackageName\
    \ NVARCHAR(128),\n    @BatchID BIGINT,\n    @AuditPackageID BIGINT OUTPUT\nAS\n\
    BEGIN\n    SET NOCOUNT ON;\n    INSERT INTO Audit.AuditPackage\n    (\n      \
    \  PackageName,\n        BatchID,\n        ExecutionInstanceGUID,\n        ProductVersion,\n\
    \        MachineName,\n        VersionMajor,\n        VersionMinor,\n        VersionBuild,\n\
    \        LocaleID,\n        PackageStartTime\n    )\n    VALUES\n    (\n     \
    \   @PackageName,\n        @BatchID,\n        @ExecutionInstanceGUID,\n      \
    \  @ProductVersion,\n        @MachineName,\n        @VersionMajor,\n        @VersionMinor,\n\
    \        @VersionBuild,\n        @LocaleID,\n        SYSDATETIMEOFFSET()\n   \
    \ );\n    SET @AuditPackageID = SCOPE_IDENTITY();\nEND;\nGO\n\nIF OBJECT_ID('Audit.EndAuditPackage')\
    \ IS NOT NULL\n    DROP PROCEDURE Audit.EndAuditPackage;\nGO\n\nCREATE PROCEDURE\
    \ Audit.EndAuditPackage\n    @AuditPackageID BIGINT\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    UPDATE Audit.AuditPackage\n    SET PackageEndTime = SYSDATETIMEOFFSET()\n\
    \    WHERE AuditPackageID = @AuditPackageID;\nEND;\nGO\n```\n\n## Adding Auditing\
    \ to Packages"
