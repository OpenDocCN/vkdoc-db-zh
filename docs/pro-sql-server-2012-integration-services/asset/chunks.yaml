    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    Accessing Variables


    After you create all the variables you need for your ETL process, you will most
    probably want to access them. SSIS provides multiple ways to access the variables.
    Only the user-defined variables are modifiable. The values stored within the variables
    can be used to either construct a new value based on the variable value or to
    divert rows in the data flow.


    To illustrate the different methods for accessing variables and parameters, we
    created two packages, CH09_Apress_ParentPackage.dtsx and CH09_Apress_ChildPackage.dtsx.
    The parent package’s sole task is to execute the child package by using the Execute
    Package task. Figure 9-11 demonstrates the contents of the parent package’s Package
    Explorer. The variable is in place to show the passing of variables to child packages
    by using parameters.


    *Figure 9-11\. CH09_Apress_ParentPackage.dtsx Package Explorer*


    The child package is a little bit more complicated, as you can see in Figure 9-12\.
    It serves to show two examples. The first example to execute is the SEQC_States
    sequence container. Its goal is to demonstrate how variables can be accessed by
    using transformations in a Data Flow task, a Foreach Loop container, and a Script
    task. The end result of this example is showing a message box displaying a string
    repeatedly until all the records have been iterated by the Foreach Loop container.
    The second example’s main purpose is to show the implementation of generating
    and executing dynamic SQL. This is done by using an Execute SQL task to retrieve
    a set of strings that will help create the different SQL


    statements, a Script task to concatenate the strings into executable SQL, and
    a final Execute SQL Task to execute the query stored within that string.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-343_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    *Figure 9-12\. CH09_Apress_ChildPackage.dtsx control flow designer window*


    Parameterized Queries


    Another excellent way that SSIS allows us to use variables is to parameterize
    source queries in Data Flow tasks. In order to parameterize queries, you need
    to use the SQL Command option as the data access mode. Listing 9-1 demonstrates
    the query we used inside the source component, SRC_GetPre20CtStates.


    *Listing 9-1\. Parameterized Source Query*


    SELECT DISTINCT Name


    ,Abbreviation


    ,Capital


    ,Flag


    ,Date


    ,Fact


    ,Long


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-344_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    ,Lat


    FROM dbo.State s


    WHERE YEAR(s.Date) < *?* ;


    The question mark is the qualifier used to mark the placement of the parameter.
    We recommend placing all the required parameters in the same area so that reading
    and maintaining the SQL does not become a nightmare. In order to map the proper
    variable value to this qualifier, we must use the Parameters button on the source
    editor. Figure 9-13 shows our configuration for the parameter mapping. We used
    the Extract::StateYearFilter variable in order to limit the data that is coming
    through. The Parameter0 name is predetermined because we are using the OLE DB
    source component.


    Refer to Chapter 7 for more information about the parameter-naming conventions
    required with the different providers.


    *Figure 9-13\. Set Query Parameters dialog box for SRC_GetPre20CtStates*


     **NOTE:** We provided a default value for the Extract::StateYearFilter variable.
    This value can be modified by using the Script task and using an assignment statement
    after listing the variable in the ReadWriteVariables field.


    Derived Column Transformations


    After the data starts flowing through the pipeline, SSIS allows you to use Derived
    Column transformations to access the value stored in the variables. The same functionality
    can be used through a Script task transformation using similar code as shown earlier.
    For this particular part of the data flow, we want to be able to replace null
    values with a default value and add this transformation as a new column to the
    pipeline. In order to achieve this requirement, we use the expression ISNULL(
    [Date] ) ?


    @[Transform::StateAcceptanceTime] : (DT_DATE) [Date]. Figure 9-14 demonstrates
    how the Derived Column transformation automatically reads in the data type information
    from the type casts. We discuss type casts in more depth later in this chapter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-345_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    The ISNULL() function returns a Boolean value similar to the SQL Server function.
    If the conditional evaluates to True, we provide the value of the Transform::StateAcceptanceTime.
    Otherwise, we maintain the original date. The only difference is that this column
    contains timestamp information.


    *Figure 9-14\. Derived column to replace missing data*


     **NOTE:** Because we used a WHERE clause with the equal operator in the source
    SQL query, the ISNULL([Date]) condition will always return False. Without that
    condition in the initial query, it is possible for ISNULL([Date]) to return True.


    Conditional Splits


    SSIS provides a Conditional Split transformation that can redirect data to multiple
    streams. In the simplest case, it can act as a WHERE clause, and in the more complicated
    cases, it can act as a CASE


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-346_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    statement. For our example, we have a very simple criterion: we want to load only
    states whose capitals are north of Oklahoma City. We set the latitude value of
    Oklahoma City as the default value of Transform::StateCapitalFilter. With this
    value in place, we use the expression Lat >


    @[Load::StateCapitalFilter] in the conditional split shown in Figure 9-15 to pass
    through only the desired records. Because the latitude values increase as we approach
    the North Pole, the Greater Than comparison operator was used to determine whether
    the record should pass through.


    *Figure 9-15\. Conditional split to exclude values based on the variable value*
