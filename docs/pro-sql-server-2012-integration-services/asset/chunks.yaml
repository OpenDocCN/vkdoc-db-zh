    Synchronous Script Component Transformation


    The Script Component synchronous transformation is extremely flexible. It differs
    from the Script Component source in that it has an input and an output. This section
    demonstrates a simple synchronous transformation with the script component. For
    this example, we expanded the previous package by adding another script component
    to the designer and selecting the transformation type, as shown in Figure 10-18\.
    This new script component will perform a commonly needed—yet simple—


    function that is not included in the stock components. It will simply number the
    columns of the data flow for us.


    *Figure 10-18\. Selecting the transformation script component type*


    After we added the new script component to the designer, we routed the data flow
    through it, as shown in Figure 10-19.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-384_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-19\. Adding the Script Component synchronous transformation to the
    data flow* **SYNCHRONOUS OR ASYNCHRONOUS?**


    We discussed the differences between synchronous and asynchronous transformations
    in Chapter 8\. The script component allows you to create both types of transformations.
    By default, the Script Component synchronous transformations are synchronous,
    and our sample is synchronous.


    The setting that determines whether a script component is synchronous or asynchronous
    is the SynchronousInputID, which can be found on the Inputs and Outputs page of
    the editor. When this property of the component is set to the name of the input
    (Input 0 by default), the component is synchronous. When it’s set to None, the
    component is asynchronous. The below figure shows how to set the SynchronousInputID
    property of the component.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-385_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-20\. Setting the SynchronousInputID of the script component*'
