- fmt: '# Chapter 6: Advanced Control Flow Tasks


    ## Transfer Database Task


    `DestinationDatabaseFiles` specifies the file names of the `.mdf` and `.ldf` files
    for the destination database. The ellipsis button allows you to use a dialog box
    to specify the location of these files. The network file share for each of the
    file locations can also be specified. The dialog box will automatically use the
    server settings to populate the folder paths for the `.mdf` and the `.ldf` files.
    You will have to specify the network file share.


    `DestinationOverwrite` specifies whether the destination database should be overwritten
    if it exists on the server.


    `Action` defines the task’s operation as either a copy or a move of the source
    database.


    `Method` defines whether the Database Transfer task will source a database that
    is in online or offline mode. For offline mode, the user who executes the package
    must have `sysadmin` authority to the server. This authority is required because
    this mode will create a copy of the present `.mdf`, `.ldf`, and `.ndf` files.
    For online mode, the user who executes the package must be either a system administrator
    or the database owner of source database. It will leave the database operational
    and will use the `.NET SMO` namespace.


    `SourceDatabaseName` specifies the name of the database that is to be copied or
    moved from the source server.


    `SourceDatabaseFiles` specifies the files associated with the specified source
    database. The ellipsis button opens a dialog box that allows you to locate the
    files. The dialog box will automatically populate the information for the files
    based on the database settings for the file locations. You need to specify the
    network file share.


    `ReattachSourceDatabase` specifies whether the task should reattach the source
    database if an error occurs during the execution.


    ## Transfer Error Messages Task


    A set of database objects that may be crucial for an ETL process are the user-defined
    error messages. The ``Transfer Error Messages task`` can be used to transfer these
    messages across servers. The task uniquely identifies the user-defined error message
    with the combination of the identifier and the language of the error message.
    Based on this combination, the task can manage existing error messages by overwriting
    existing error messages, failing the task when an existing error message is found,
    or by ignoring the existing error message. Figure 6-13 shows the task as it appears
    in the control flow. The icon shows a brief message with a caution sign and an
    arrow. The arrow indicates the transfer of such messages.


    *Figure 6-13. Transfer Error Messages task*


    **NOTE:** The Transfer Error Messages task will not copy system error messages,
    that is, messages with identifier values below 50,000.


    The Messages page of the Transfer Error Messages Task Editor allows you to modify
    the properties of the task in order to perform the transfer on the required server
    and objects. The task uses a `SQL Management Object Connection Manager` to connect
    to the required server as the source of the user-defined error messages. The General
    page allows you to modify the `Name` and `Description` of the task. The Expressions
    page, shown in Figure 6-14, allows you to define expressions that can modify the
    values of the task’s properties.


    *Figure 6-14. Transfer Error Messages Task Editor—Messages page*


    The Transfer Error Messages task’s modifiable properties are as follows:


    - `SourceConnection` lists the `SMO Connection Managers` available to be used
    as the source of the user-defined error messages.

    - `DestinationConnection` lists the `SMO Connection Managers` available to be
    used as the destination of the user-defined error messages. The user that executes
    the package must have `sysadmin` or `serveradmin` authority to the server in order
    to create user-defined error messages.

    - `IfObjectExists` lists the options that are available if the transferred error
    message exists on the destination server. The options are `FailTask`, `Overwrite`,
    and `Skip`. The `FailTask` option causes the task to error when a duplicate message
    is encountered. The `Overwrite` option overwrites the error message on the destination
    server. The `Skip` option ignores the duplicate error message on the destination
    server.

    - `TransferAllErrorMessages` defines whether the task will copy all user-defined
    error messages or just a specified list of error messages. The two options for
    this property are `True` and `False`.

    - `ErrorMessageList` allows you to create a list of user-defined error messages
    to copy.

    - `ErrorMessageLanguageList` allows you to create a list of the languages for
    which to create copies of the error messages. A message must have the `us_english`
    error message version before storing in other languages. The code page for `us_english`
    is 1033.


    ## Transfer Jobs Task


    Another set of objects that can be vital to an ETL process and that need to be
    moved between SQL Server instances are SQL Agent jobs. The ``Transfer Jobs task``
    serves this exact requirement. It utilizes the `SQL Management Object Connection
    Manager` to transfer these objects. In order to use this task, the user executing
    the package needs to have `sysadmin` access or a SQL Agent role on the `msdb`
    database on both the source and destination instances. Figure 6-15 demonstrates
    the Transfer Jobs task as it appears in the control flow. The task’s icon shows
    a process flow controlled by an application. The icon is indicative of SQL Server
    Agent jobs that run processes in a given order.


    *Figure 6-15. Transfer Jobs task*


    The Jobs page of the Transfer Jobs Task Editor allows you to configure all the
    properties necessary to copy SQL Server Agent jobs between two instances of SQL
    Server. Figure 6-16 shows all the properties that are available on this page.
    Just like the previous transfer tasks, the Transfer Jobs task uses the `SMO Connection
    Manager`. The General page allows you to modify the `Name` and `Description` of
    the task. The Expressions page allows you to define expressions that can modify
    the values of the task’s properties.


    *Figure 6-16. Transfer Jobs Task Editor—Jobs page*


    The Jobs page enables you to configure the following properties:


    - `SourceConnection` lists the `SMO Connection Managers` that are defined in the
    package. Select the connection that points to the instance you need to use as
    your source of the SQL Server Agent jobs.

    - `DestinationConnection` identifies the `SMO Connection Manager` that points
    to the instance you need to use as the destination for the SQL Server Agent jobs.

    - `TransferAllJobs` allows you to choose either transferring all the SQL Server
    Agent jobs that exist on the source instance or those on a defined list. Selecting
    `False` allows the `JobsList` property to become definable.

    - `JobsList` enumerates the specific SQL Server Agent jobs to copy to the destination
    instance.

    - `IfObjectExists` allows you to determine the action to perform if the SQL Server
    Agent job already exists on the destination instance. The choices are `FailTask`,
    `Overwrite`, and `Skip`. `FailTask` causes the task to error when it encounters
    the same job on the destination instance. `Overwrite` re-creates the duplicate
    job on the destination instance with the definition found in the source instance.
    `Skip` ignores the duplicate job altogether.

    - `EnableJobsAtDestination` allows you to enable the copied jobs to be enabled
    on the destination instance. The two options are `True` and `False`.


    ## Transfer Logins Task'
