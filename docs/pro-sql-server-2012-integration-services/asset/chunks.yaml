    # CHAPTER 2  BIDS AND SSMS


    ## Integration Services Project


    The `Integration Services project` template enables the developer to create `SSIS`
    packages. The package is the executable work unit within `SSIS`. It consists of
    smaller components that can be executed individually during development, but Integration
    Services executes at the package level. The debugging option in Visual Studio
    will execute the package as a whole, but the control flow executables can also
    be individually tested. Figure 2-3 shows a sample Integration Services project.
    This project will automatically be added to your current solution if you have
    one open. Otherwise, a temporary solution will be created.


    > **NOTE:** Even though Visual Studio has the ability to execute packages, we
    recommend using the command line to execute them when testing. Visual Studio debugging
    mode should be used during development. We discuss more options on running `SSIS`
    packages in Chapter 20.


    *Figure 2-3. Folder structure for an Integration Services project*


    The following list describes the objects and folders that will appear in your
    project:


    *   `SSIS Packages` contains all the packages associated with the project. These
    work units are the actual components that will execute the ETL. All the packages
    are added to the `.dtproj` file. This XML-based file lists all the packages and
    configurations that are part of the project.

    *   `Miscellaneous` contains all the file types other than the `.dtsx` files.
    This folder is essential for storing configuration files and will be useful for
    consolidating connections, especially when utilizing a source control application.
    Team Foundation Server is introduced later in this chapter.


    > **NOTE:** With SQL Server 12, data sources and data source views cannot be added
    to a project. Instead, these connections can be added to the individual packages.
    In prior versions, data sources could be added as connection managers and were
    allowed to refer to the included `DSV`s as the tables in source components. Using
    this methodology to access data on SQL Server was not the optimal way to extract
    data.


    The debugging option in Visual Studio executes the current package. This feature
    is useful for watching the behavior of the package (how quickly rows pass through
    the components in the Data Flow tasks, how quickly executables complete, the successful
    matches of Lookups and Merge Joins, and so forth). During the execution, three
    colors indicate the status of the executable and data flow components: yellow—in
    progress, red—failure, and green—success. This use of different colors is helpful
    during development because it shows how the precedence constraints and the Data
    Flow tasks move the data through.


    > **NOTE:** Unless a package calls another package as an executable, the current
    package is the only one that will run in Debug mode, not all the packages in the
    project. Visual Studio will open every package that is called in a parent-child
    configuration and execute them. If there are too many packages, certain ones may
    open with a Memory Overflow error displayed, but the package may execute in the
    background and continue onto the subsequent packages.


    ## TO UNDO OR REDO, THAT IS THE QUESTION


    From its introduction in SQL Server 2005, `SSIS` did not have native undo or redo
    ability. The buttons for these operations existed on the toolbar but were permanently
    grayed out regardless of the changes made in the `SSIS` Designer. The most common
    method to undo changes was to close the package without saving those changes.
    Even with source control, this was always a tricky operation to perform. With
    SQL Server 2012, `SSIS` developers now enjoy undo functionality that other Visual
    Studio developers have enjoyed for many iterations of the software. With `SSIS`,
    clicking the OK button commits the changes. To leave the code unchanged, you should
    make it a habit to click the Cancel or Close button if you are only reviewing
    the code. The undo and redo ability extends to a certain level to the editing
    of components.


    ## Report Server Project Wizard


    The `Report Server Project Wizard` allows you to automatically create a Report
    Server project. You have to specify the connections to data sources, including
    security information if necessary, queries for the reports, and so forth. After
    the project has been created, the Report Designer can be used to make all the
    modifications.


    ## Report Server Project


    The `Report Server project` allows the developer to create all the objects necessary
    for reports. The reports can be deployed on a portal, where end users can access
    them. The portal can utilize SharePoint, where users can even save their own reports
    that they frequently utilize. Usually a web browser is used to access the reports.
    Reports should use a cube if they summarize data (that is, perform counts, sums,
    and averages). If the reports display detail-level information, querying a database
    is most likely the more efficient route. Including too much detail on a report
    can impact the load time on the end user’s browser as well as the query time on
    the server. Figure 2-4 demonstrates the folder structure that is available for
    Report Server projects.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-19_1.jpg)


    *Figure 2-4. Folder structure for a Report Server project*


    The folders contain objects that perform the following tasks:


    *   `Shared Data Sources` contains necessary components of the Report Server project.
    These components allow the reports to connect to the data sources that will be
    the basis for the reports.

    *   `Shared Datasets` contains multiple reports used to source common datasets.

    *   `Reports` stores all the `.rdl` files that are the actual reports. You can
    modify the reports by using the designer.


    When you are creating reports, the Design view enables you to modify the visual
    layout of the page and the code for the data that goes into each element. Depending
    on the source for the data, you will have to use the appropriate variant of `SQL`
    or `MDX`. Sources for reports can include `RDBMS`s, report models, and `XML`.
    In addition to the Design view, there is a Preview view that can be used to run
    the report to make sure that the data renders as desired. Using this view caches
    the data locally on the developer’s machine, so clearing the cache often is recommended.


