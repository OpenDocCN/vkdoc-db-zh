    \ `Script Component` 并选择了转换类型，如图 10-18 所示。这个新的 `Script Component` 将执行一个虽简单但非常常用的功能，而这个功能在标准组件中并未提供。它将为我们数据流中的列进行编号。\n\
    \n*图 10-18. 选择转换脚本组件类型*\n\n我们将新的 `Script Component` 添加到设计器后，将数据流引导通过它，如图 10-19\
    \ 所示。\n\n![](img/index-384_1.jpg)\n\n*图 10-19. 将 Script Component 同步转换添加到数据流中*\n\
    \n## 同步还是异步？\n\n我们在第八章讨论了同步和异步转换的区别。`Script Component` 允许你创建这两种类型的转换。默认情况下，`Script\
    \ Component` 转换是同步的，我们的示例也是同步的。\n\n决定 `Script Component` 是同步还是异步的设置是 `SynchronousInputID`，可以在编辑器的\
    \ **输入和输出** 页面找到。当组件的此属性设置为输入名称时（默认为 `Input 0`），组件是同步的。当它设置为 `None` 时，组件是异步的。下图展示了如何设置组件的\
    \ `SynchronousInputID` 属性。\n\n![](img/index-385_1.jpg)\n\n*图 10-20. 设置脚本组件的 SynchronousInputID*\n\
    \n```csharp\nOutput0Buffer.FeedTitle = feed_title;\nOutput0Buffer.FeedLink = feed_link;\n\
