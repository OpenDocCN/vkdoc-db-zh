    # CHAPTER 12 DATA PROFILING AND SCRUBBING


    Does the distribution of my data fit my expectations? Answering this question
    requires industry- and business-specific domain knowledge. For instance, you might
    expect most of the prices for items in your inventory to fall between $20 and
    $50\. An analysis of your data might show that the majority of items in inventory
    are actually priced lower than $20, which could point to either (1) a bad initial
    assumption about the business, or (2) a data quality problem.


    How does my source data align with data from other systems? Consider reference
    data such as US state codes. Several types of codes could be used by any given
    source system: two-character Postal Service codes such as AL, DE, and NY; two-digit
    FIPS (Federal Information Processing Standard) numeric codes such as 01, 02, 03;
    or even integer surrogate keys. Answering this question will let you recognize
    differences in key attributes and align the values in key attributes.


    What are my business keys? Successful data integration projects, such as BI projects,
    require identification of business keys in your source data. Data warehouse updates
    and data mart slowly changing dimension (SCD) processing depend on knowledge of
    your source data business keys.


    Answering these questions might require profiling single columns or sets of columns.
    As an example, most industrialized countries implement postal code systems to
    facilitate mail delivery. The format and valid characters in postal codes vary
    from country to country. Postal codes in the United States (also known as Zone
    Improvement Plan, or ZIP, codes) consist of either five or nine numeric digits,
    such as90071 or 10104-0899\. In Canada, postal codes consist of six alphanumeric
    characters—for example, K1P 1J9\. You may need to profile country names and postal
    codes from your source data in combination with one another to validate proper
    postal code formats.


    In addition to answering questions about the quality and consistency of your source
    data, you may also isolate information about the relationships in your source
    databases. One thing that many legacy source databases seem to have in common
    is a lack of referential integrity and check constraints. Throw in an utter lack
    of documentation, and these source systems present themselves as complex puzzles,
    often requiring you to establish relationships between tables yourself.


    ## Data Profiling Task


    `Data Profiling task` is a useful way to grab statistical information about your
    source data. Much of the major functionality is comparable in many respects to
    other data-profiling software packages available on the market. The `Data Profiling
    task` grabs the specified source data, analyzes it based on the criteria you specify,
    and outputs the results to an XML file. The `Data Profiling task` is shown in
    Figure 12-1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-427_1.jpg)


    ![](index-427_2.jpg)


    # CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-1\. Data Profiling task in a package control flow*


    The `Data Profiling task` requires a `File Connection Manager` pointing to the
    XML file you want it to create or overwrite. We configured our `File Connection
    Manager` to point at a file named `C:\SampleData\ProfileOutput.xml`, as shown
    in Figure 12-2.


    *Figure 12-2\. Configuring the File Connection Manager to point at an XML output
    file* One drawback of the `Data Profiling task` is that it is limited to data
    that can be retrieved via an `ADO.NET Connection Manager`. The `Data Profiling
    task` requires a connection to SQL Server and uses the `SqlClient Data Provider`,
    shown by the `ADO.NET Connection Manager Editor` in Figure 12-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-428_1.jpg)


