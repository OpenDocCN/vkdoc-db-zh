    **图 5-32. Visual Studio Tools for Applications—脚本编辑器**


    当我们在 Visual Studio 调试模式下执行此包时，我们会收到一个消息框，显示变量的原始值，因为未对其执行任何更改。`System::TaskName`变量包含当前任务的名称。我们可以使用
    C#或 Visual Basic 赋值操作为`ReadWrite`变量赋值。我们将在第 9 章详细讨论脚本编写。


    ## 发送邮件任务


    经理和数据库管理员通常希望在进程意外失败时得到通知。ETL 流程也不例外。SSIS 提供了一个可以使用邮件服务发送电子邮件的任务。它需要一个 SMTP 连接管理器才能连接到邮件服务器。SSIS
    仅允许 Windows 身份验证和匿名身份验证。有关连接管理器的更多信息，请参阅第 4 章。在图 5-33 中，我们展示了控制流中的任务。图标是一个带有回信地址和邮寄地址的已盖邮戳信封，表示任务所需的所有组件。


    **图 5-33. 发送邮件任务**


    如图 5-34 所示的`发送邮件任务编辑器`的“邮件”页面，允许您配置发送电子邮件所需的所有属性。此任务的一个关键特性是能够附加文件。


    您可以将日志输出到文件，在发送电子邮件之前将其附加，以便为失败提供上下文。


    **图 5-34. 发送邮件任务编辑器—邮件页面**


    以下列表描述了所有可配置的属性：


    `SMTPConnection` 指定用于发送电子邮件的 SMTP 连接管理器。


    `From` 定义发件人的电子邮件地址。


    `To` 列出电子邮件的收件人，使用分号分隔不同的电子邮件地址。


    `Cc` 定义电子邮件的抄送收件人。此列表使用分号分隔每个电子邮件地址。


    `Bcc` 列出电子邮件的密送收件人。此列表也使用分号分隔。


    `Subject` 提供要发送的电子邮件的主题。


    `MessageSourceType` 列出邮件正文的选项。三个选项是：直接输入、文件连接和变量。“直接输入”允许您直接键入消息。“文件连接”选项让您选择一个文件连接管理器，指向包含邮件正文的文件。“变量”选项允许您选择一个包含邮件正文的
    SSIS 变量。


    `MessageSource` 根据所选的源类型进行填充。“文件连接”和“变量”选项会打开一个对话框，让您可以选择要作为邮件正文包含的连接管理器或变量。使用“直接输入”时，您可以直接键入消息。


    `Priority` 定义电子邮件的优先级。选项为低、中、高。


    `Attachments` 列出要附加到电子邮件的不同文件。文件使用管道字符分隔。与其他实例不同，此字段不使用文件连接管理器，而是使用执行机器文件系统上的文件路径。


    ## Web 服务任务

