    when there are other processes running on the same server. SSIS automatically
    uses metadata to tune buffer sizes before execution begins, but during execution
    it is possible to run out of memory. This is particularly true if you are running
    multiple Data Flow tasks in parallel, pushing large amounts of data through asynchronous
    or blocking transformations. As an example, it’s not uncommon to occasionally
    see packages with parallel data flows containing Lookup transformations fail because
    of a lack of memory when there is a large amount of reference data being cached.


     **TIP:** Although you can influence buffer sizes by adjusting the DefaultBufferMaxRows
    and DefaultBufferSize settings, changing them doesn’t provide much bang for the
    buck. SSIS automatically tunes your buffer sizes for you, and it does a good job.
    The other suggestions in this chapter provide much more benefit for the effort
    required.


    Database table contention is an important consideration in your parallelization
    plans as well. If you want to parallelize a destination operation, for instance,
    consider the contention that can result against the target table and plan accordingly.
    We have resolved many package performance issues and outright failures over the
    years due to multiple Data Flow tasks trying to output to the same target table
    in parallel.


    Finally, it’s important to decide which operations to parallelize. If you are
    loading a data mart, for instance, you may load multiple dimension tables in parallel.
    If one dimension table has an extremely large number of rows, you may decide to
    parallelize the destinations of that data flow path.


