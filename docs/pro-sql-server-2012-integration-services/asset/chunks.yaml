  raw: 'database allow you to access parameter values during execution:


    catalog.execution_parameter_values is a view that displays the values that will
    be used during specific executions.


    catalog.get_parameter_values is a stored procedure that displays and resolves


    parameter values of specified packages within projects stored in the Integration
    Services catalog.


    catalog.object_parameters is a view that shows the design and server defaults


    for the parameters.


    Overriding Properties


    With the new deployment model, overriding properties by using parameters instead
    of configurations streamlines development. Instead of creating configurations
    by using variables to inherit values and then using the variable values to overwrite
    properties, you can now simply bind package parameters to those properties. The
    configurations were required by the child package in anticipation of being passed
    in by the parent. This often led to the issue of executing child packages on their
    own for testing purposes or even as a one-off in the ETL process.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16  PARENT-CHILD DESIGN PATTERN


    Even the individual tasks and containers within a package can have their properties
    bound to parameters. This allows parent packages even further control of the execution
    of the child packages. The parent can pass information directly to the tasks,
    overriding the design-time property configuration. The process is the same as
    binding parameters to package properties. You have to right-click the object you
    want to parameterize and select the Parameterize option.


    Logging


    Logging the execution process with the parent-child design pattern can be a little
    tricky. The out-of-the-box package logging that is available will simply treat
    each message separately. The parent package messages and execution events will
    surround the messages and events from the child package, but there is no real
    way to tie their executions together other than by looking at their timing and
    knowing the ETL


    process. We discuss logging in great detail in Chapter 13.


    Implementing Data-Driven ETL


    One of the most flexible implementations of the parent-child design pattern is
    data-driven ETL. The easiest way to implement this is to store the data in a table
    so that it can be queried. Storing the data in a table allows you to quickly add
    or remove packages from your process. It also allows you to disable certain packages’
    execution if you do not want to permanently remove them from the process. Listing
    16-3 shows the structure of a table that can be used to drive your ETL processes.


    *Listing 16-3\. Table CH16_Apress_PackageExecution*


    CREATE TABLE dbo.CH16_Apress_PackageExecution


    (


    Package NVARCHAR(250) NOT NULL,


    PackagePath NVARCHAR(200) NOT NULL,


    ParentPackage NVARCHAR(250) NULL,


    ExecuteOrder INT NOT NULL,


    DisablePackage BIT NOT NULL,


    );


    GO


    CREATE CLUSTERED INDEX CIX_CH16_Apress_PackageExecution ON dbo.CH16_Apress_PackageExecution
    (ParentPackage);


    GO


    This table is designed to show a hierarchical view of the ETL process. You can
    see the parent-child relationships and even write queries that will give you detailed
    information about your processes. A primary key can be defined on this table if,
    for instance, you do not need to execute a package multiple times. The following
    provides a brief explanation of what each column represents: Package provides
