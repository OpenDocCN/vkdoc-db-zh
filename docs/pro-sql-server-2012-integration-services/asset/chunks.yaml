    Make sure that the redirected rows are sent to a flexible destination. Creating
    a table with an identical schema as that of the intended destination will only
    cause the redirected row to fail again for truncation or constraint errors. In
    addition to the failed rows, the error description can be included in an additional
    column.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


