  raw: 'After we perform all the transformations that are required, we need to store
    the data somewhere. The recordset destination allows us to load the data into
    an Object data type variable. This functionality works similarly to the Execute
    SQL task storing a Full result set output in a variable. Figure 9-16 shows the
    recordset destination configuration that is required to load the data into a variable.
    The essential part is to determine which variable to use.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-347_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    *Figure 9-16\. Configuration of the recordset destination*


     **NOTE:** Reusing object variables for storing data will cause them to be cleared
    before they are loaded with the new data. Object variables do not append data
    after they are loaded. This can allow you to reuse the same variable for various
    datasets, but we do not recommend this approach because you will start to lose
    track of the tabular structure of the variable. Each load can add or remove columns,
    making the reuse of the variable a development pitfall. It is pretty easy to lose
    track of the column mappings in the objects, especially with entities that have
    numerous columns. Changing the structure several times will create an even greater
    complexity. This becomes especially noticeable if you use the object as the iterator
    in multiple Foreach Loop containers. You need to go back and forth to make sure
    that you are mapping the results in the proper order based on how the latest dataset
    was loaded.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-348_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    After the variable is chosen as the destination, we need to specify the columns
    we will need to access. Figure 9-17 shows the column mapping that we can pass
    to a Foreach Loop container as we iterate through the object. After we have the
    dataset in the variable, the Foreach Loop container can read the values and assign
    them to other variables whose purpose is to hold the value during that iteration.


    This is very similar to the functionality provided by a cursor in SQL Server.


    *Figure 9-17\. Recordset destination—column mapping*


    Foreach Loop Containers


    Foreach Loop containers within SSIS can utilize Object data type variables as
    their iterators. In order to load the data, we need to first load data into the
    variable we intend to use. We demonstrated loading the data by using the recordset
    destination. As Figure 9-18 demonstrates, the Foreach Loop container utilizes
    the Foreach ADO enumerator as its iterator. We specified the Load::States variable
    as the enumerator because we populated it with the States dataset.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-349_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    *Figure 9-18\. Foreach Loop container—Collections page*


    After the enumerator has been defined, we need to ensure that every column that
    is populated in the object is mapped to a variable. As the container loops through
    the object, the Foreach Loop container will assign the data value in each column
    to a variable. Skipping mappings will result in SSIS


    throwing unfriendly error messages. The container will automatically assign the
    index value shown in Figure 9-19, so we recommend mapping the variables in the
    same order as the columns are mapped to the enumerator variable.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-350_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    *Figure 9-19\. Foreach Loop container—Variable Mappings page*


    Script Tasks


    One of the easiest ways to access variables is by using the SSIS Script tasks
    in either the control flow or the data flow. In our sample package, CH09_Apress_ChildPackage.dstx,
    we will use the Script task at the control-flow level to display a string in a
    message box. Figure 9-20 demonstrates the ability to specify the access mode of
    the variables in a Script task. In our case, we only want to be able to read the
    value of the System::PackageName variable. Because we will not be modifying any
    existing variable values, we leave the ReadWriteVariables field empty.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-351_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    *Figure 9-20\. Configuration of SCR_DisplayPackageName*


    Using Visual C#, we can access only the variables listed in the configuration
    shown in Figure 9-20.


    The code goes directly into the main method of the script. Listing 9-2 demonstrates
    the C# that we used to access the value of the variable and display it in a message
    box at runtime. The section highlighted in bold allows the Script task to access
    the variables collection in Dts. After we extract the value, we can manipulate
    it in any manner we need. The quotes around the fully qualified variable name
    are necessary to properly identify the variable. The variable is case sensitive,
    so the code needs to be very precise.


    *Listing 9-2\. Variable Accessor Script*


    MessageBox.Show("The name current state''s name is: " +


    Dts.Variables["Audit::StateName"].Value.ToString()+"\n"+


    "Its abbreviation is: " + Dts.Variables["Audit::Abbreviation"].Value.ToString()
    + "\n"


    +


    "A fact about this state: " + Dts.Variables["Audit::Fact"].Value.ToString() +
    "\n" +


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-352_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    "The state capital is: " + Dts.Variables["Audit::Capital"].Value.ToString() +
    "\n" +


    "The capital is located at: (" + Dts.Variables["Audit::Lat"].Value.ToString()
    + ", " +


    Dts.Variables["Audit::Long"].Value.ToString() + ")." + "\n" +


    "The state was accepted at: "+Dts.Variables["Audit::StateAcceptanceTime1"].


    Value.ToString());


    With Listing 9-2 code, when we execute the package, we receive a small message
    box. The code concatenates the values extracted from the object variable into
    one string that is used to populate the message box. Figure 9-21 shows the value
    that is concatenated by the code. The package will not proceed until you close
    the message box. After the message box is closed, the Foreach Loop will proceed
    to the next record in the enumerator and expose its values in a similar message
    box.


    *Figure 9-21\. Message box displaying the package name derived from the system
    variable* Execute SQL Task Result Sets


    The Execute SQL task allows you to store result sets directly from the executed
    query. The query can return a scalar value, a one-column value with one row, a
    full result set, or an XML value. These result sets can be stored in variables
    with the proper data types. In our example, we will store a full result set based
    on the query shown in Listing 9-3\. This query retrieves all the columns in the
    dbo.State table.


    With this result set, we will show a quick data-profiling process contained in


    CH09_Apress_ChildPackage.dtsx. Figure 9-22 shows the configuration of the SQL_GetStateColumns
    task that stores the result of the query.


    *Listing 9-3\. SQL_GetStateColumns—column names query*


    SELECT c.COLUMN_NAME


    FROM INFORMATION_SCHEMA.COLUMNS c


    WHERE c.TABLE_NAME = ''State'';


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-353_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    *Figure 9-22\. SQL_GetStateColumns configuration*


     **NOTE:** If the variable contains values prior to the execution of this task,
    those values will be overwritten by its results.


