    When you optimize your SSIS packages, it’s important to decide up front how good
    is good enough. At what point do you say your package is efficient enough? As
    in any software optimization, the Law of Diminishing Returns applies in SSIS optimization:
    the difficulty and complexity involved increases as you try to squeeze smaller
    and smaller kernels of *performance* out of your code. Notice we didn’t say *speed*,
    but rather *performance*. Raw speed is only a single factor in overall performance,
    which is a much more accurate measure of efficiency that includes both speed and
    resource usage.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


