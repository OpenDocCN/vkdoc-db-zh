    ## WMI 事件监视器任务


    应用程序能够运行的一个重要能力是确定主机上的条件是否适合其执行。SSIS `WMI 事件监视器任务` 提供了此功能。它利用针对 WMI 事件类的 WQL 查询来监听系统的事件。该任务可用于等待特定事件发生后才继续执行，或在可用空间低于阈值时删除文件以腾出空间，甚至可以等待应用程序的安装。图
    6-25 展示了该任务在控制流中的样子。其图标是一个带有黄色闪电符号的剪贴板，表示该任务正在监视并等待非常具体事件的发生。


    *图 6-25\. WMI 事件监视器任务*


    WMI 事件监视器任务编辑器的“WMI 选项”页（如图 6-26 所示）允许你配置监视和响应 WMI 事件所需的所有属性。此页面定义了在所需事件发生后要采取的操作。


