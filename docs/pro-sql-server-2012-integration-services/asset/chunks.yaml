    one that best suits your needs.


    Understanding the Parent-Child Design Pattern


    The *parent-child design pattern* in a nutshell refers to any ETL process that
    utilizes an SSIS package to execute another package. This can be done by using
    the Execute Package task or even the Execute Process task by calling the dtexec.exe
    utility. Our recommendation is to stick with the Execute Package task because
    it will allow you to configure the execution of the child package much easier
    than the Execute Process task. Figure 16-1 shows you what a static parent package
    would look like. We call this a *static package* because any changes in the ETL
    structure or the addition and removal of packages would require a modification
    to this package.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-522_1.jpg)


    CHAPTER 16  PARENT-CHILD DESIGN PATTERN


    *Figure 16-1\. Example of a static parent package*


    The static package is developed with each of the tasks having their own individual
    settings. This implementation of the parent-child design pattern is recommended
    only if the execution process will not change. Maintaining and updating this implementation
    can be become extremely challenging very quickly. The third executable, EPT_CH16_Apress_DisabledChildPackage,
    has different configurations than the other three executables. In order to disable
    the package during execution, we pass a Boolean variable from the parent package,
    CH16_Apress_StaticParentPackage.dtsx, to a parameter bound to the child’s Disable
    package property. We cover the parameter passing later in this chapter. The static
    implementation of the parent-child design pattern is very similar to the steps
    in a SQL agent job.


    All the packages contain one Script task that displays a simple message to show
    that the package was executed. Listing 16-1 shows the C# that is contained with
    the nondisabled child packages. It shows a simple message that informs you of
    the name of the child package that was executed. As you can infer from the variable
    that is utilized, we listed System::PackageName as the only variable available
    to the ReadOnlyVariables property of the Script task.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16  PARENT-CHILD DESIGN PATTERN


    *Listing 16-1\. Child Package Script Task*


    MessageBox.Show("The current package''s name is: " +


    Dts.Variables["System::PackageName"].Value.ToString()+"\n"); The script for the
    disabled child package is slightly different, in order to alert you that this
    package should not be executed. This example is included to demonstrate the ease
    of configuring your ETL


    process by using a dynamic parent-child design pattern. Listing 16-2 provides
    the script present in the disabled child package. There is short message contained
    within this message box, alerting you that you should not be seeing this message.


    *Listing 16-2\. Disabled Child Package Script Task*


    MessageBox.Show("The current package''s name is: " +


    Dts.Variables["System::PackageName"].Value.ToString()+"\n"+


    "This package is supposed to be disabled. If you are seeing this message,


    the parameters were not assigned the proper values.");


    The modularity behind the parent-child design packages can be described in the
    following terms: The parent package controls the entire ETL process. Its main
    duty is to execute all the necessary packages.


    Wrapper packages control a smaller subset of packages whose focus should be


    handling one particular process. Wrapper packages are either called directly by
    the parent package or by other wrapper packages. For example, a wrapper


    package can be used to execute packages that are responsible for preprocessing


    the sources or performing post-load processing.'
  trans: "\n在并行化包时，内存是另一个需要处理的约束条件，特别是当同一服务器上还有其他进程在运行时。SSIS 会在执行开始前自动使用元数据来调整缓冲区大小，但在执行过程中仍有可能耗尽内存。如果你并行运行多个数据流任务，让大量数据通过异步或阻塞转换时，情况尤其如此。例如，我们偶尔会看到包含并行数据流的包因为内存不足而失败，这并不罕见，特别是当这些数据流包含查找转换且有大量引用数据被缓存时。\n\
    \n> **提示：** 虽然你可以通过调整 `DefaultBufferMaxRows` 和 `DefaultBufferSize` 设置来影响缓冲区大小，但更改它们带来的收益并不大。SSIS\
    \ 会自动为你调整缓冲区大小，而且做得很好。本章中的其他建议以所需的工作量来说，能提供更多益处。\n\n数据库表争用也是你并行化计划中需要考虑的一个重要因素。例如，如果你想要并行化一个目标操作，请考虑这可能对目标表造成的争用，并相应地进行规划。多年来，我们解决了许多由于多个数据流任务试图并行输出到同一目标表而引起的包性能问题乃至彻底失败的情况。\n\
    \n最后，决定要并行化哪些操作也很重要。例如，如果你正在加载一个数据集市，你可能会并行加载多个维度表。如果某个维度表的行数极大，你可能会决定并行化该数据流路径的目标加载操作。\n\
    \n## 适可而止\n\n在优化 SSIS 包时，事先决定“足够好”的标准是很重要的。在什么情况下你会认为你的包已经足够高效了？如同任何软件优化一样，收益递减定律也适用于\
    \ SSIS 优化：当你试图从代码中挤出越来越小的性能提升时，所涉及的难度和复杂性也会增加。请注意，我们说的是“性能”，而不是“速度”。原始速度只是衡量整体性能的一个单一因素，而性能是一个更准确地衡量效率的指标，它包括了速度和资源使用两方面。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第十五章 数据流调优与优化\n\n在某些时候，试图从你的代码中挤出最后\
    \ 100 毫秒所付出的努力是不值得的。同时，请记住 80/20 法则：专注于优化那消耗了你 80% 处理时间的 20% 的代码。\n\n## 小结\n\n\
    本章介绍了一些用于优化 SSIS 包的工具和方法。这些优化中的许多都依赖于在可能的情况下在源头执行操作，并限制通过 ETL 过程拉取的数据量。本章还介绍了\
    \ SSIS 执行树以及通过并行化优化性能的一些关键点。在下一章中，你将了解强大的 SSIS 父母-子设计模式。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第十六章 父母-子设计模式\n\n*有一个孩子让你成为父母；有两个孩子，你就成了裁判。* —— 英国记者大卫·弗罗斯特\n\n使用 SSIS，有几种方法可以将模块化编程引入你的\
    \ ETL 过程。最灵活的方法之一是使用父母-子设计。这种模式使你能够创建包来执行非常具体的任务。如果这些任务需要被禁用，这种设计模式允许你利用参数绑定在包级别禁用功能。正如引言所暗示的，你的\
    \ ETL 过程越复杂，父包所扮演的组织角色就越重要，而不仅仅是调用另一个包的角色。\n\n当采用清晰的设计时，ETL 过程可以变得越来越透明。本章介绍使用父母-子设计模式的一些好处，并向你展示如何在自己的过程中实现它。你还将看到实现该设计模式的不同方式，让你可以选择最适合你需求的那一种。\n\
    \n### 理解父母-子设计模式\n\n简而言之，父母-子设计模式指的是任何使用一个 SSIS 包来执行另一个包的 ETL 过程。这可以通过使用“执行包任务”来完成，甚至可以通过调用\
    \ `dtexec.exe` 工具来使用“执行进程任务”。我们的建议是坚持使用“执行包任务”，因为它能让你比“执行进程任务”更容易地配置子包的执行。图 16-1\
    \ 展示了一个静态父包的样子。我们称之为 *静态包*，因为 ETL 结构的任何变更，或者包的添加和删除，都需要修改这个包。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-522_1.jpg)\n\n**图 16-1. 静态父包示例**\n\n静态包在开发时，每个任务都有自己的独立设置。只有当执行过程不会改变时，才建议使用这种父母-子设计模式的实现方式。维护和更新这种实现方式可能会很快变得极具挑战性。第三个可执行文件\
    \ `EPT_CH16_Apress_DisabledChildPackage` 与其他三个可执行文件具有不同的配置。为了在执行时禁用该包，我们从父包 `CH16_Apress_StaticParentPackage.dtsx`\
    \ 传递一个布尔变量，绑定到子包的 `Disable` 包属性参数。我们将在本章后面介绍参数传递。这种父母-子设计模式的静态实现与 SQL 代理作业中的步骤非常相似。\n\
    \n所有包都包含一个脚本任务，该任务显示一条简单的消息以表明包已执行。代码清单 16-1 显示了非禁用子包中包含的 C# 代码。它显示了一条简单的消息，通知你已执行的子包名称。正如你可以从所使用的变量推断出的那样，我们将\
    \ `System::PackageName` 列为脚本任务 `ReadOnlyVariables` 属性的唯一可用变量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 代码清单 16-1. 子包脚本任务\n\n```\nMessageBox.Show(\"The current package's name is:\
    \ \" +\n    Dts.Variables[\"System::PackageName\"].Value.ToString()+\"\\n\");\n\
    ```\n\n被禁用子包的脚本略有不同，目的是提醒你此包不应被执行。包含此示例是为了演示使用动态父母-子设计模式配置 ETL 过程的简便性。代码清单 16-2\
    \ 提供了被禁用子包中的脚本。此消息框内包含一条简短消息，提醒你不应该看到此消息。\n\n### 代码清单 16-2. 被禁用子包脚本任务\n\n```\n\
    MessageBox.Show(\"The current package's name is: \" +\n    Dts.Variables[\"System::PackageName\"\
    ].Value.ToString()+\"\\n\"+\n    \"This package is supposed to be disabled. If\
    \ you are seeing this message, the parameters were not assigned the proper values.\"\
    );\n```\n\n父母-子设计包背后的模块性可以用以下术语来描述：父包控制整个 ETL 过程。其主要职责是执行所有必要的包。包装器包控制一个较小的子集，其重点应是处理某个特定过程。包装器包要么由父包直接调用，要么由其他包装器包调用。例如，一个包装器包可用于执行负责预处理源或执行加载后处理的包。\n"
- fmt: '# CHAPTER 16 – PARENT-CHILD DESIGN PATTERN


    Child packages control the processing of the actual tasks. These packages are
    the workhorses of the parent-child design pattern. They are called by wrapper
    packages.


    In the example, we combined the concept of the parent and wrapper package for
    simplicity. The idea behind the wrapper package is to segregate the different
    processes that make up your ETL requirements.


    ## Using Parameters to Pass Values


    Parameters are absolutely essential for the parent-child design pattern. In prior
    versions of SSIS, values were passed along by using configurations. With this
    version’s deployment model, we encourage you to use parameters for passing values
    between parent and child packages. Figure 16-2 demonstrates the parameter binding
    we use to disable the child package. We bind a parameter that we defined in the
    package, `DisablePackage`, to the `Disable` package property. We can even bind
    parameters to task properties within the child package.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-524_1.jpg)


    *Figure 16-2. Parameter bindings of the disabled child package*


    After we parameterize the child package, any `Execute Package` task that is configured
    to execute this package will be able to identify the parameters that are defined
    within it. The data type of the parameter must match the property’s data type.
    Figure 16-3 demonstrates the mapping of the parameter when using the `Execute
    Package` task.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-525_1.jpg)


    *Figure 16-3. Parameter bindings for the child package*


    The `User::DisableChild` variable is a Boolean variable. It must match the data
    type of the parameter of the child package. Multiple bindings can be added to
    the package execution. We provided `True` as the default value of the `User::DisableChild`
    variable. This mapping is present only in packages that are not supposed to be
    executed.


    > **NOTE:** Even if the package property `Disable` is set to `True`, during execution
    in Debug mode, Visual Studio will open the package and validate it. The package
    itself will not execute, but it will be opened.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Working with Shared Configuration Information


    Connection managers will abound in a design pattern such as the parent-child.
    In order to keep the clutter to a minimum, you can utilize the project connection
    managers so that keeping the connection strings in sync becomes much easier. Creating
    a project connection manager will create the connection manager in every package
    within the project.


    > **CAUTION:** Deleting any project connection manager within a package will delete
    it from the project and all the packages within the project. If you find that
    you have deleted a project connection manager and cannot undo the action, you
    have an option to retrieve it. You first need to create the same connection manager
    type with the same name. After the project connection manager is created, you
    have to right-click it and select `View Code`. This opens an XML script that shows
    all the properties of the connection manager. The property you need to focus on
    is `DTS:DTSID`. When you open any package with a task or source component that
    referred to the deleted project connection manager, you will notice that the name
    is replaced by a GUID. You can copy that GUID and replace the `DTS:DTSID` of the
    new project connection manager with the GUID. After this, save the `Code` page
    of the project manager and close it. Reopen any of the open packages, and their
    contents should be able to recognize their connection manager as the newly re-created
    project connection manager.


    Certain information can be stored within project parameters. Because parameter
    values can be changed only by T-SQL, parameter values are more or less read-only.
    Catalog views and stored procedures within the `SSISDB` can be used to view the
    values. The following objects in the `SSISDB`'
