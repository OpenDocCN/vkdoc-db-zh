  trans: '# 第六章 - 高级控制流任务


    ## 数据挖掘查询任务编辑器 - 输出选项卡


    `变量名`列出了映射到特定参数的 SSIS 变量。


    `添加`按钮向参数列表添加一个映射。


    `删除`按钮从参数列表中移除选定的映射。


    `结果名称`是数据挖掘查询结果的名称。可以更改为查询提供的实际结果名称。


    `变量名`指定用于存储结果集的变量。


    `结果类型`允许您将结果定义为单行或数据集。


    `添加`按钮允许您为结果值添加映射。


    `删除`按钮允许您从结果列表中移除现有映射。


    `数据挖掘查询任务编辑器`的`输出`选项卡允许您存储数据挖掘查询的输出。存储仅由 `ADO.NET` 和 `OLE DB` 连接处理。图 6-6 显示了`数据挖掘查询任务编辑器`的`输出`选项卡。数据可以插入到
    SQL Server 表中以便进一步查询。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-169_1.jpg)


    *图 6-6. 数据挖掘查询任务编辑器 — 输出选项卡*


    `输出`选项卡支持配置以下属性：


    `连接`列出了包中已定义的所有 `ADO.NET` 和 `OLE DB` 连接。


    `新建`按钮在所需连接尚不存在时创建一个新的 `ADO.NET` 或 `OLE DB` 连接。


    `输出表`提供用于存储数据挖掘查询结果的表名。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-170_1.jpg)


    `删除并重新创建输出表`允许您通过删除并重建表来清除先前的数据。这使得可以无问题地加载元数据更新。


    ## 消息队列任务


    `消息队列任务`使用 Microsoft 消息队列 (`MSMQ`) 在 SSIS 包之间或在自定义应用程序之间发送消息。消息本身可以由文本组成，并且可以携带数据文件或
    SSIS 变量值。在 ETL 解决方案中使用`消息队列任务`有一些主要原因。利用消息队列的一种方式是暂停包的执行，直到该包收到特定消息。这允许外部的、非 ETL
    的进程完成，然后立即启动 ETL。除了可以挂起 SSIS 包之外，此任务还可以将文件作为其消息的一部分进行传输。该文件可以是 ETL 过程的输出，也可以是外部进程用来指示数据源文件已准备好供
    SSIS 访问的信号。此任务还可用于跨系统传输文件。图 6-7 显示了该任务在控制流中的外观。图标包含两个重叠的信封，一个向下的蓝色箭头指定了有序传输。


    **注意：** 默认情况下，Microsoft 消息队列服务在旧版本的 Microsoft 操作系统上未启动。在较新的操作系统（Vista 及更高版本，以及
    Server 2008 及更高版本）上，您需要安装相应的 Windows 功能才能使用该服务。


    *图 6-7. 消息队列任务*


    ### 消息队列任务编辑器 - 常规页


    `消息队列任务编辑器`的`常规`页面允许您定义任务是负责发送还是接收消息。根据任务的角色，可用页面会自动修改以允许`发送`或`接收`选项。图 6-8 显示了`消息队列任务编辑器`的`常规`页面。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-171_1.jpg)


    *图 6-8. 消息队列任务编辑器 — 常规页*


    `常规`页面上可配置的属性如下：


    `名称`为`消息队列任务`提供一个唯一的名称。


    `描述`提供关于特定`消息队列任务`目标的简要说明。


    `Use2000Format`指定是否使用 2000 版本的消息队列。


    `MSMQ 连接`列出了所有已定义的 Microsoft 消息队列连接。'
- fmt: '## CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    Managers. This field also allows you to create a connection manager if one does
    not exist.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-172_1.jpg)


    `Message` allows you to choose whether the task sends or receives a message. This
    option will modify the pages available in the editor.


    ### Message Queue Task Editor—Send Page


    The Send page of the Message Queue Task Editor becomes available only when the
    Send option is selected for the `Message` property. This particular page allows
    you to modify the properties associated with sending messages to other applications
    or packages. Figure 6-9 shows you all the properties that are available for modification.


    **Figure 6-9. Message Queue Task Editor—Send page**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The Message Queue task’s properties are as follows:


    `UseEncryption` specifies whether the message is encrypted.

    `EncryptionAlgorithm` specifies the name of the encryption algorithm to use. This
    property becomes available only if the `UseEncryption` property is set to `True`.
    The only encryption algorithms supported by MSMQ are the RC2 and RC4 algorithms.
    These are relatively weak compared to newer ones and therefore will require some
    scrutiny before implementing the Message Queue task.

    `MessageType` defines the type of message the task will transmit. The options
    are Data file message, Variable message, and String message. Choosing the different
    options will automatically alter the succeeding property displayed in the editor.

    `DataFileMessage` transmits the message stored within a file. The ellipsis button
    allows you to navigate to the desired file.

    `VariableMessage` indicates that the message is stored in an SSIS variable.

    `StringMessage` indicates that the message is stored within a string that is provided
    directly. As Figure 6-9 demonstrates, a text box can be used to type in longer
    messages.


    ### Message Queue Task Editor—Receive Page


    The Receive page of the Message Queue Task Editor is available only when the Receive
    option is selected for the `Message` property. This page allows for the modification
    of the properties that can be set when the package receives a message from MSMQ.
    Certain configurations will allow the package to receive only very specific messages.
    Figure 6-10 shows the Receive page of the Message Queue task. The Expressions
    page allows you to define expressions that can modify the task’s properties’ values.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-174_1.jpg)


    **Figure 6-10. Message Queue Task Editor—Receive page**


    The properties of the Message Queue task are as follows:


    `RemoveFromMessageQueue` indicates whether the message should be removed from
    the MSMQ service after it is received by the package.

    `ErrorIfMessageTimeOut` specifies whether the task should fail when it is timed
    out.

    `TimeoutAfter` defines the length of time, in seconds, after which the task will
    time out.

    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `MessageType` lists the types of messages the task can anticipate. Selecting the
    options will dynamically modify the properties that are available for modification
    in the editor. The options are Data file message, Variable message, String message,
    and String message to variable.

    `SaveFileAs` defines the name and location of the file to which the message will
    be stored. This property is available only with the Data file message option selected
    as the message type.

    `Overwrite` allows the previous contents of the file to be deleted before the
    new message is stored. This property is available only with the Data file message
    option selected as the message type.

    `Filter` identifies whether the package receives a message from a particular package.
    There are two options for this property, No filter and From package. No filter
    indicates that the task does not filter out messages. The From package option
    receives messages from a specific package. This property is available only for
    Data file messages and Variable messages.

    `IdentifierReadOnly` can contain the `GUID` of the package from which the message
    may originate. This option is available only with the `Filter` property set to
    No filter. It is read-only. This property is available only for Data file messages
    and Variable messages.

    `Identifier` contains the `GUID` of the package from which the task will receive
    messages. The name of the package can also be specified by using the ellipsis
    button to locate the package. This property is available only for Data file messages
    and Variable messages.

    `Compare` defines the match criteria used to compare and filter the message. The
    options available are None, Exact match, Ignore case, and Containing. Depending
    on the option chosen, the `CompareString` property becomes modifiable. The None
    option does not allow for any comparison of the message that is received. Exact
    match filters messages based on the exact match of the provided string. Ignore
    case filters out messages based on a case-insensitive match. Containing matches
    will filter messages based on the messages containing the provided string. This
    property is available only for String messages and String messages to variables.

    `CompareString` defines the string that will be used for the comparison criteria.
    This property is available only for String messages and String messages to variables.

    `Variable` specifies the variable that will receive the message. The ellipsis
    button allows you to create a new variable, if one isn’t defined, that will receive
    the message. This option is available only when the Variable message option is
    selected for the message type. This property is available only with String message
    to variable selected.


    ### Transfer Database Task


    A crucial nonfunctional task of an ETL process might be to move source databases
    to different servers with appropriate hardware that can support the ETL queries.
    The Transfer Database task allows you to move or copy databases between servers
    or even on the same server. The copy and move processes can operate on databases
    in offline and online mode. The task utilizes the SQL Management Object Connection
    Manager to move the databases. Figure 6-11 shows the task as it appears in the
    control flow designer window. The icon is a yellow cylinder with a bent arrow
    indicating that the database is being transmitted.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-176_1.jpg)


    ![](index-176_2.jpg)


    **Figure 6-11. Transfer Database task**


    The Databases page of the Transfer Database Task Editor, shown in Figure 6-12,
    contains the properties that will configure the transfer of the database. In this
    particular example, we are simply copying a database, its `.mdf`(master data file),
    and its `.ldf`(log data file) files. In addition to the location of these files,
    we need to specify the network file-share location of the files as well. The General
    page allows you to modify the Name and Description of the task. The Expressions
