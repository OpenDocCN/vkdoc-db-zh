    \ 和 `CH09_Apress_ChildPackage.dtsx`。父包的唯一任务是使用“执行包任务”来执行子包。图 9-11 展示了父包的“包资源管理器”内容。该变量用于演示通过使用参数向子包传递变量。\n\
