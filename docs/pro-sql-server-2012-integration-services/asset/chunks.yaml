    Literal defines the components of the snippet that can be replaced quickly.


    Using the Tab key traverses through the literals in the code. The literal can
    be defined as a default value that can be set as a parameter. Using parameters
    as


    the default values for literals is the key to repurposing the Specify Values for
    Template Parameters utility for code snippets.


    Codecontains the actual code that is to be inserted in the script. The code block
    will be inserted as it is in the CDATA block. It will preserve the whitespace
    and replace the literals with their specified defaults.


    After a code snippet has been inserted using the snippet inserter, you can use
    the Tab key to navigate the query by automatically highlighting the replacement
    points and replacing them with your own strings. For more-complex snippets that
    reuse code, it may be a better idea to utilize parameters, as we have shown in
    Listing 2-4\. This allows you to take advantage of the Specify Values for Template
    Parameters feature within Management Studio.


    Queries for SSIS


    The queries that are created in Management Studio can be saved on the file system
    to be easily incorporated into SSIS. For example, an OLE DB source component has
    a Browse button in the editor that will allow you to import the query saved on
    the file system as the SQL command for the source component. This option becomes
    available only if SQL Command is used as the data access mode.


    Queries can also be imported by lookup components if they are set to use the results
    of a SQL query.


    With this functionality, it becomes easier for developers to write the SQL that
    they will be using to extract the data and to import it directly to their SSIS
    packages as needed. Combining this with the code snippet functionality of Management
    Studio, convoluted joins and where clauses can be stored for easy access to any
    script.


    Summary


    SQL Server 12 offers the capabilities of an entire business intelligence endeavor
    through its Business Intelligence Development Studio. This chapter introduced
    all the new features of and enhancements to an important tool in the arsenal,
    Integration Services. We also introduced a crucial component of maintaining and
    administering the SQL Server suite, Management Studio. We concluded by describing
    how all of these components come together to build an end-to-end solution as well
    as some enhancements made for the developers’ code reusability. Chapter 3 will
    walk you through developing your very first package and introduce you to some
    of the best practices you should get in the habit of using from the start.


