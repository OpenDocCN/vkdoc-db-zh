    In this example, we used the .NET `MessageBox.Show()` method to demonstrate event
    handlers and event bubbling in SSIS. Your event handlers can be much more complex
    and might include considerable logic. It’s common, for instance, to use event
    handlers to implement customized auditing and logging processes or to send e-mails
    to alert administrators of error conditions.


    > **CAUTION:** The .NET `MessageBox.Show()` method is very handy when debugging
    and troubleshooting SSIS packages. Be careful to remove these method calls when
    you deploy a package to production, however. If your package tries to display
    a message box in an automated job, no one can click the `OK` button, and your
    package may stop responding.


    ## Summary


    This chapter presented SSIS events and error handling, including event bubbling
    and `Script` tasks and script component methods for firing events. You looked
    at the different types of events you can fire and the purpose behind each. In
