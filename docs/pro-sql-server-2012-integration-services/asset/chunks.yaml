    ## Logging Events


    SSIS supports several task-specific logging events. These logging events, with
    the exception of two we’ll talk about in a moment, are designated for logging
    additional information at the task level. These logging events do not have event
    handlers and cannot be propagated up to the container and package levels.


    The Data Flow task is arguably the most important task in SSIS. As we discussed
    in previous chapters, the data flow provides the functionality for retrieving,
    transforming, and outputting your data.


    Because of its prominence and the complexity of the data flows you can create,
    it comes as no surprise that the Data Flow task exposes several task-specific
    logging events to help you troubleshoot and optimize your data movement and manipulation.
    These logging events are listed in Table 11-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Table 11-2. Data Flow Task Logging Events


    | **Event Name** | **Task** | **Fired...** |

    | :--- | :--- | :--- |

    | `BufferSizeTuning` | Data Flow task | ...when data flow changes the size of
    a buffer during execution |

    | `PipelineComponentTime` | Data Flow task | ...to return information about validation
    and execution of each data flow component |

    | `PipelineExecutionPlan` | Data Flow task | ...to return the data flow execution
    plan |

    | `PipelineExecutionTrees` | Data Flow task | ...to return the input the scheduler
    had when creating the data plan |

    | `PipelineInitialization` | Data Flow task | ...to return data flow initialization
    information |

    | `PiplineBufferLeak` | Data Flow task | ...when buffers are left outstanding
    after data flow execution |


    Data Preparation tasks include the File System task, FTP task, Web Service task,
    and Data Profiling task. These tasks support the task-specific logging events
    listed in Table 11-3.


    ### Table 11-3. Data Preparation Tasks Logging Events


    | **Event Name** | **Task** | **Fired...** |

    | :--- | :--- | :--- |

    | `DataProfilingTaskTrace` | Data Profiling task | ...to provide descriptive information
    about the task status, such as request and query start and end |

    | `FileSystemOperation` | File System task | ...to log the start of the file system
    operation; includes source and destination information |

    | `FTPConnectingToServer` | FTP task | ...to report the start of a connection
    to FTP server |

    | `FTPOperation` | FTP task | ...to log start and type of FTP operation performed
    |

    | `WSTaskBegin` | Web Service task | ...to log start of Web service access |

    | `WSTaskEnd` | Web Service task | ...to log completion of Web service method
    |

    | `WSTaskInfo` | Web Service task | ...to log additional information about the
    task |

    | `XMLOperation` | XML task | ...to log information about the XML operation performed
    |


    The Workflow tasks group includes the Execute Package task, Execute Process task,
    Message Queue task, Send Mail task, WMI Data Reader task, and WMI Event Watcher
    task. These tasks support the logging events listed in Table 11-4.'
