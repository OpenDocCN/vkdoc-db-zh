    ## ADO.NET


    ADO.NET 源和目标适配器允许您创建托管的 .NET `SqlClient` 连接。因为它们是托管代码，这些类型的连接总体上往往比其本机模式的 OLE
    DB 对应部分提供较弱的性能。另一方面，从 .NET 代码（如脚本任务和脚本组件）中，它们更容易以编程方式访问和管理，正是因为它们是托管的。在许多情况下，特别是当涉及少量行时，ADO.NET
    与 OLE DB 源和目标适配器之间的性能差异可以忽略不计。


    ADO.NET 源适配器具有简化的接口，允许您选择一个 ADO.NET 连接管理器和两种访问模式之一：**表或视图**模式或 **SQL 命令**模式。与
    OLE DB 源适配器不同，ADO.NET 源适配器不支持参数。


    > **提示：** 虽然无法对 ADO.NET 源适配器进行参数化，但您可以将该组件的 `SqlCommand` 属性设置为一个表达式。您可以通过数据流任务属性访问此属性。我们将在第
    9 章详细讨论 SSIS 表达式。


    ADO.NET 目标适配器也具有简单的接口。它允许您选择一个 ADO.NET 连接管理器和一个用于发送输出的表或视图。还有一个额外的复选框“**尽可能使用批量插入**”，它将利用基于内存的批量复制，类似于
    OLE DB 的 `IRowsetFastLoad` 接口。


    ## SQL Server 目标


    SQL Server 目标适配器提供高速批量插入，类似于大容量插入任务。主要区别在于，与位于控制流中的大容量插入任务不同，SQL Server 目标位于数据流的末端——因此您可以在批量加载数据之前转换数据。另一个区别是，SQL
    Server 目标不是从文件读取其源数据。相反，它从共享内存进行批量加载，这意味着您不能使用它将数据加载到远程服务器。


    ## SQL Server Compact


    SSIS 有一个 SQL Server Compact 目标适配器，可让您将数据发送到 SQL Server Compact Edition (CE) 实例。连接到
    SQL Server CE 时需要记住的一件事是，只有 32 位驱动程序可用。


    ## 文件


    平面文件和数据库可以说是 SSIS 包中最常用的源和目标，这就是为什么我们从详细讨论这两类适配器开始本章的原因。


    然而，还有更多基于文件的源和目标可用。我们将在本节讨论这些源和目标适配器及其属性。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-227_1.jpg)


    ### 平面文件'
