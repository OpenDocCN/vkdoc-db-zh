    queries that can give some meaningful insight into the data. For our query, we
    chose to perform a distinct count on the values stored in each column in the dbo.State
    table. Options include loading the data into a table by using INSERT INTO. We
    included a sample value in the commented-out C# on the last line of the code sample.


    The Execute SQL task, SQL_ExecuteSQL, will run a query for every column name that
    is stored in the object. With this particular query, you can see how the values
    in each of your columns vary.


    *Listing 9-4\. StateQuery Assignment*


    Dts.Variables["Transform::StateQuery"].Value =


    "SELECT COUNT(DISTINCT " + Dts.Variables["Load::StateColumnName"].Value.ToString()


    + ") FROM dbo.State WITH (NOLOCK);";


    // SELECT COUNT(DISTINCT Name) FROM dbo.State WITH (NOLOCK);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-356_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    Passing Variables


    One of the main difficulties with parent-child design patterns in prior versions
    of SSIS was the dependency of the child packages on the parent packages. At first
    glance this may not seem like an obstacle, but in some cases the dependency would
    make it very difficult to unit-test the child package on its own. With the introduction
    of parameters in this version of SSIS, this obstacle disappears. You essentially
    have the ability to define a default value for a parameter that under normal execution
    would be overwritten.


    We begin by adding a parameter to the child package, as shown earlier in Figure
    9-4\. This will provide us with a parameter that can be accessed just like a variable
    in SSIS expressions and script components. We can provide a default if we are
    anticipating that the package may be executed on its own. With the parameter added,
    the parent package’s Execute Package task should automatically detect it. You
    can create a mapping that allows the parent value to overwrite the child value
    while configuring the other properties of the Execute Package task. The mapping
    in CH09_Apress_ParentPackage.dtsx is shown in Figure 9-25.


    *Figure 9-25\. Execute Package task parameter bindings*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    SSIS Expression Language


    The SSIS Expression Language allows you to extend the functionality of your process
    to incorporate variables. The language contains a whole set of functions and operators
    that can be used to evaluate columns, variables, or expressions. The functions
    return different data type values. They are usually grouped by their input types
    in the Expression Builder. We already covered the casting functions in the


    “SSIS Data Types” section of this chapter. The function names are not case-sensitive,
    unlike most of the other identifiers in the expression language. We recommend
    that you use a distinct case when using functions in order to make the code a
    little easier to read.


    Functions


    Mathematical functions accept numeric values as their inputs to return numeric
    values after performing operations on them. The following are the mathematical
    functions available within SSIS: ABS( «numeric_expression» ) returns the absolute
    value of the input.


    CEILING( «numeric_expression» ) returns the smallest integer greater than or


    equal to the input.


    EXP( «numeric_expression» ) returns the exponent to base e of the input.


    FLOOR( «numeric_expression» ) returns the largest integer less than or equal to
    the input.


    LN( «numeric_expression» ) returns the natural logarithm of the input.


    LOG( «numeric_expression» ) returns the base-10 logarithm of the input.


    POWER( «numeric_expression», «power» ) returns the value of raising the first


    parameter to the power specified in the second parameter.


    ROUND( «numeric_expression», «length» ) returns the first input round to the


    length specified in the second parameter.


    SIGN( «numeric_expression» ) returns the positive, negative, or zero sign of the
    input.


    SQUARE( «numeric_expression» ) returns the value of the input raised to the


    second power.


    SQRT( «numeric_expression» ) returns the square root of the input.


    String functions evaluate character expressions. These are the string functions
    available in the Expression Builder:


    CODEPOINT( «character_expression» ) returns the Unicode value of the first


    character in the input.


    FINDSTRING( «character_expression», «string», «occurrence» ) returns the


    index of the occurrence of the specified string in the input. The index values


    start at 1.


    HEX( «integer_expression» ) returns a string hexadecimal value of the input.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    LEFT( «character_expression», «number» ) returns a string that consists of the


    specified number of characters at the beginning of the first parameter.


    LEN( «character_expression» ) returns the length of the input.


    LOWER( «character_expression» ) returns a string that consists of the


    lowercase characters of the input.


    LTRIM( «character_expression» ) returns a string stripped of the leading


    whitespaces from the input.


    REPLACE( «character_expression», «search_expression»,


    «replace_expression» ) returns the character expression value after a string


    that has been replaced with another string or empty string within the original


    character expression.


    REPLICATE( «character_expression», «times» ) returns a string with the


    character expression repeated a specified number of times.'
  trans: '# 第 9 章 – 变量、参数与表达式


    访问变量的最后一种方式并非一个具体的任务或转换，而是一种出现在多个任务中的属性。这就是源类型属性，通常允许你指定为 `直接输入`、`变量` 或 `文件`。在我们的数据剖析过程示例中，我们使用了一个执行
    SQL 任务 `SQL_ExecuteSQL` 来执行存储在变量 `Transform::StateQuery` 中的查询。我们修改此变量的过程将在下面的“动态
    SQL”部分进行介绍。图 9-23 展示了访问动态生成查询的 `SQL_ExecuteSQL` 任务的配置。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-354_1.jpg)


    *图 9-23. SQL_ExecuteSQL 以 Transform::StateQuery 为源*


    ## 动态 SQL


    在我们的大多数示例中，我们只演示了读取变量值，而没有实际修改任何值。需要修改变量的最常见领域之一是生成动态 SQL 查询。在 SSIS 中，此过程通常替代游标，并运行一组数量可能变化、但具有某些结构上非常重要的相似组件的查询。如前一节所述，我们希望演示一个非常基本的数据剖析过程。我们已经向你展示了如何通过使用执行
    SQL 任务将列名存储在 `Load::StateColumns` 变量中来检索我们的控制集。我们还向你展示了如何通过在另一个执行 SQL 任务上使用 `SQLSourceType`
    选项来执行生成的查询。本节将向你展示如何设置变量的值，使其成为可执行的查询。


    我们需要采取的第一步是在遍历所有列时提取每个列的名称。我们通过使用 Foreach 循环容器 `FELC_LoopThroughColumns` 实现了这一点。由于
    `Load::StateColumns` 只有一列 `Name`，变量映射非常简单，如图 9-24 所示。此配置会逐行覆盖 `Load::StateColumnName`
    的值，一次迭代一行。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-355_1.jpg)


    *图 9-24. FELC_LoopThroughColumns 变量映射*


    随着变量值随对象中的每一行而变化，我们可以运行一些查询，以获得对数据有意义的洞察。对于我们的查询，我们选择对存储在 `dbo.State` 表中每个列的值执行
    DISTINCT 计数。选项包括使用 `INSERT INTO` 将数据加载到表中。我们在代码示例最后一行的注释掉的 C#代码中包含了一个示例值。


    执行 SQL 任务 `SQL_SQL` 将为存储在对象中的每个列名运行一个查询。通过这个特定的查询，你可以看到你每个列中的值是如何变化的。


    ### 代码清单 9-4. StateQuery 赋值


    ```csharp

    Dts.Variables["Transform::StateQuery"].Value =

    "SELECT COUNT(DISTINCT " + Dts.Variables["Load::StateColumnName"].Value.ToString()

    + ") FROM dbo.State WITH (NOLOCK);";


    // SELECT COUNT(DISTINCT Name) FROM dbo.State WITH (NOLOCK);

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-356_1.jpg)


    ## 传递变量


    在先前版本的 SSIS 中，父-子设计模式的主要困难之一是子包对父包的依赖性。乍一看，这可能不像是一个障碍，但在某些情况下，这种依赖性会使单独对子包进行单元测试变得非常困难。随着此版本
    SSIS 中引入参数，这个障碍消失了。你基本上能够为参数定义一个默认值，在正常执行时该值会被覆盖。


    我们首先向子包添加一个参数，如前面的图 9-4 所示。这将为我们提供一个参数，可以像在 SSIS 表达式和脚本组件中访问变量一样访问它。如果我们预计包可能会单独执行，我们可以提供一个默认值。添加参数后，父包的执行包任务应自动检测到它。在配置执行包任务的其他属性时，可以创建一个映射，允许父值覆盖子值。`CH09_Apress_ParentPackage.dtsx`
    中的映射如图 9-25 所示。


    *图 9-25. 执行包任务参数绑定*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## SSIS 表达式语言


    SSIS 表达式语言允许你扩展流程的功能以整合变量。该语言包含一整套函数和运算符，可用于计算列、变量或表达式。这些函数返回不同的数据类型值。它们通常在表达式生成器中按输入类型分组。我们已在本章的“SSIS
    数据类型”部分介绍了转换函数。函数名不区分大小写，这与表达式语言中的大多数其他标识符不同。我们建议你在使用函数时使用特定的大小写，以使代码更易于阅读。


    ### 函数


    数学函数接受数值作为输入，执行运算后返回数值。以下是 SSIS 中可用的数学函数：


    - `ABS(«数值表达式»)` 返回输入的绝对值。

    - `CEILING(«数值表达式»)` 返回大于或等于输入的最小整数。

    - `EXP(«数值表达式»)` 返回以 e 为底的输入指数。

    - `FLOOR(«数值表达式»)` 返回小于或等于输入的最大整数。

    - `LN(«数值表达式»)` 返回输入的自然对数。

    - `LOG(«数值表达式»)` 返回以 10 为底的输入对数。

    - `POWER(«数值表达式», «幂»)` 返回将第一个参数提升到第二个参数指定的幂后的值。

    - `ROUND(«数值表达式», «长度»)` 返回将第一个输入四舍五入到第二个参数指定长度后的值。

    - `SIGN(«数值表达式»)` 返回输入的正、负或零符号。

    - `SQUARE(«数值表达式»)` 返回输入值的平方。

    - `SQRT(«数值表达式»)` 返回输入的平方根。


    字符串函数计算字符表达式。以下是表达式生成器中可用的字符串函数：


    - `CODEPOINT(«字符表达式»)` 返回输入中第一个字符的 Unicode 值。

    - `FINDSTRING(«字符表达式», «字符串», «出现次数»)` 返回指定字符串在输入中第 `出现次数` 次出现的索引。索引值从 1 开始。

    - `HEX(«整数表达式»)` 返回输入的十六进制字符串值。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    - `LEFT(«字符表达式», «数字»)` 返回一个字符串，由第一个参数开头的指定字符数组成。

    - `LEN(«字符表达式»)` 返回输入的长度。

    - `LOWER(«字符表达式»)` 返回一个字符串，由输入的小写字符组成。

    - `LTRIM(«字符表达式»)` 返回一个字符串，去除了输入的前导空格。

    - `REPLACE(«字符表达式», «搜索表达式», «替换表达式»)` 返回在原始字符表达式中将一个字符串替换为另一个字符串或空字符串后的字符表达式值。

    - `REPLICATE(«字符表达式», «次数»)` 返回一个字符串，其中字符表达式重复指定的次数。'
- fmt: '# CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    ## Character Functions


    `REVERSE( «character_expression» )` returns a string whose characters are in the
    reverse order of the input.


    `RIGHT( «character_expression», «number» )` returns a string consisting of the
    specified number of the rightmost characters in the character expression.


    `RTRIM( «character_expression» )` returns a string stripped of the trailing whitespaces
    in the input.


    `SUBSTRING( «character_expression», «start», «length» )` returns a string consisting
    of the characters from the specified starting index to the specified length of
    the character expression.


    `TOKEN( «character_expression», «delimiter_expression», «occurrence» )` returns
    a string consisting of all the characters between the specified occurrence and
    the first delimiter expression that is encountered in the character expression.


    `TOKENCOUNT( «character_expression», «delimiter_expression» )` returns the number
    of tokens that are present in the character expression based on the delimiter
    expression as the token terminator.


    `TRIM( «character_expression» )` returns a string stripped of the leading and
    trailing whitespaces in the input.


    `UPPER( «character_expression» )` returns a string that consists of the uppercase
    of the characters of the input.


    ## Date Functions


    The date functions perform operations on date and timestamp values. The following
    are the available date functions in the Expression Builder:


    `DATEADD( «datepart», «number», «date» )` returns a date value after adding the
    specified number of time units to the specified part of the date input.


    `DATEDIFF( «datepart», «startdate», «enddate» )` returns the value of the length
    of time units between the starting date and the ending date supplied.


    `DATEPART( «datepart», «date» )` returns an integer value representing part of
    the specified date. A date in the month of January would return 1 if the datepart
    was specified as the month.


    `DAY( «date» )` returns an integer value that represents the day of month of the
    input date.


    `GETDATE()` returns the current date and time set on the host machine.


    `GETUTCDATE()` returns the current date and time set on the host machine in Universal
    Time Coordinate.


    `MONTH( «date» )` returns an integer representing the number of the month of the
    input date.


    `YEAR( «date» )` returns an integer representing the number of the year of the
    input date.


    ## NULL Functions


    The last category of functions that exists in SSIS is composed of the NULL functions.
    All but one of the functions in this category returns a NULL value type casted
    for a certain data type. In order to return a NULL of a certain data type, you
    pass the function as your expression `NULL(«data type»)` and fill in the required
    data type name. The `ISNULL(«expression»)` function will evaluate the input expression
    and return a Boolean indicating whether it evaluates to NULL.


    ## Operators


    The operators in the expression language work similarly to the operators in C#.
    There are unary operators and binary operators. The operators do have a hierarchy
    when the expression is being evaluated. To maintain clarity, we recommend using
    parentheses whenever possible, or ambiguity may appear when reading the code quickly.
    The following are the operators available in SSIS:


    `+` (Add/Concatenate) adds two expressions together. It can also be used to concatenate
    strings.


    `-` (Subtract/Negate) subtracts two expressions. It can also be used to return
    the negative value of a numeric expression.


    `*` (Multiply) multiplies two numeric expressions.


    `/` (Divide) divides two numeric expressions.


    `%` (Modulo) returns the integer remainder of the division of two numeric expressions.


    `()` (Parentheses) are used to prioritize the evaluation of expressions.


    `==` (Equal) logically evaluates two expressions for equality.


    `!=` (Unequal) logically evaluates two expressions for inequality.


    `>` (Greater Than) logically evaluates whether the expression on the left side
    of the operator is greater than the expression on the right side.'
