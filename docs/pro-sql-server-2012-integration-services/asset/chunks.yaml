- fmt: 'Clicking the Yes button on the Overview Report request allows to you review
    all the details of the package execution. Figure 19-22 provides a snippet of the
    report, which contains information such as the start and end times of the package
    execution, the duration of the execution of each executable within the package,
    and in our particular example, the execution duration of child packages. There
    is a section that also reports the property overrides that were defined for the
    execution.


    *Figure 19-22. Execution Overview Report snippet*


     `NOTE:` The Overview Report itself cannot be saved, but the history of all the
    executions is stored within the Integration Services catalog. To view the history
    of executions, navigate to the folder with the project whose history you need
    to review, right-click the folder, and select `Reports> All Executions`. This
    will provide you with a quick overview of the different executions. If you wish
    to see a catalog-wide history of SSIS package executions, right-click the catalog
    instead of a particular folder. These reports are created by using Report Definition
    Language (RDL), and as such custom reports can be created and added to allow viewing
    from within SSMS.


    With the use of `File Connection Manager`, the `Script tasks` within each package
    appended a string to a file that existed in a location where the server had access.
    Listing 19-5 shows the contents of the files after two executions of `CH19_Apress_DynamicParentPackage.dtsx`.


    *Listing 19-5. CH19_Apress_DynamicParentPackage.dtsx Result*


