    ## Foreach 循环编辑器—变量映射页面


    当容器遍历列表时，它能够从枚举器中提取信息。通过配置“变量映射”页面（如图 6-31 所示），可以将元素存储在 SSIS 变量中，这些变量将在容器迭代时被新值覆盖。需要根据枚举器的结构定义列来接收每个值。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-201_1.jpg)


    # 第 6 章  高级控制流任务


    *图 6-31. Foreach 循环编辑器—变量映射页面*


    “变量映射”页面允许您配置以下映射：


    **变量**：列出所有用户定义的、具有适用于该容器作用域的 SSIS 变量。


    **索引**：标识变量在枚举器中的位置。索引值代表枚举器内部的列编号。值从 0 开始递增，以匹配枚举器内的数据。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 6 章  高级控制流任务


    ## 任务主机控制器


    当可执行文件添加到 SSIS 控制流时，任务主机容器会被隐式配置。该配置仅适用于可执行文件及其依赖项（对于容器而言）。此容器允许将变量和事件处理程序直接绑定到任务。此容器还限制了变量在不同可执行文件之间的作用域。


    ## 本章小结


    本章介绍了高级控制流项目，它们使您能够执行许多非功能性需求。大多数高级任务在 SQL Server 实例之间传输对象。我们还介绍了 SSIS 工具箱中的高级容器。这些容器以不同的方式循环执行，但实现了相似的目标。隐式的任务主机控制器无法直接访问，但它在后台工作以保持包可执行文件的组织性。第
    7 章将介绍数据流任务的基本组件。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-203_1.jpg)


    # 第 7 章


    # 源和目标适配器


    *“江河都往海里流，海却不满。”*


    —所罗门王


    在 SSIS 中，数据流是将数据从 A 点移动到 B 点并在途中进行操作的主要工具。数据流是一个强大的概念，允许您将数据移动和转换封装为控制流中的一个独立任务。数据流将数据从源移动到目标，就像所罗门王的河流将水从源头输送到大海一样。本章介绍数据流，并讨论数据流源适配器、目标适配器以及新的源和目标向导。


    ## 数据流


    数据流包含在数据流任务的范围内，而数据流任务本身存在于控制流中。数据流任务如图 7-1 所示。


    *图 7-1. BIDS 设计器界面上的数据流任务*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-204_1.jpg)


    # 第 7 章  源和目标适配器


    您可以通过从 SSIS 工具箱中拖放数据流任务到 BIDS 设计器界面上来将其添加到控制流中。因为数据流任务是一个控制流任务，所以数据流代表了一个功能强大的、自包含的控制流子集。拥有数据流的目的是将数据移动和操作（ETL
    的主要目的）与工作流管理分开。如图 7-2 所示，任何给定的数据流都可能相当复杂。您还可以在单个控制流中包含多个数据流任务。我们将在本章和下一章中介绍示例数据流中显示的源、目标和转换，以及更多内容。


    *图 7-2. 由多个数据流组件组成的数据流*


    构成数据流的组件可分为三类：将数据拉入数据流的源适配器；允许您操作、修改和引导数据的转换；以及允许您将数据推出数据流到持久化存储或其他系统进行进一步处理的目标适配器。在本章中，我们将考虑
    SSIS 提供的用于将数据拉入和推出数据流的源和目标。


    从技术上讲，所有数据流组件都派生自一个名为 PipelineComponent 的单一基类。此类公开了诸如 BufferManager 之类的属性，该属性提供对二维存储对象（即表格行集）的访问，该对象在您的数据流经数据流时保存数据。PipelineComponent
    类还有诸如 AcquireConnection 之类的方法，该方法通过连接管理器建立到数据源的连接。在本章讨论的现成组件中，这些属性和方法已经为您完全开发，因此您无需直接处理它们。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 7 章  源和目标适配器


    **注意**：我们将在第 22 章深入讨论 PipelineComponent 类的细节以及开发您自己的自定义组件。


    ## 源和目标


    在 SSIS 数据流中，源适配器是从定义明确的数据存储中提取数据的组件。源适配器使用连接管理器连接到数据库（如 SQL Server 和 Oracle）、平面文件、XML
    或您能定义的几乎任何其他源并从中提取数据。目标适配器与源适配器相反——它们将数据推送到数据存储。目标适配器使用连接管理器将数据发送到数据库、平面文件、Excel
    电子表格或您可以连接到的任何其他目标。


    虽然您可以在 SSIS 中创建极其复杂的数据流，但您可以创建的最简单的有用数据流可能由一个连接到单个目标适配器的源适配器组成。对于此示例，让我们考虑一个简单的数据流，它从平面文件中提取数据并将其加载到
    SQL Server 数据库表中。这被认为是直接拉取，因为在数据从源移动到目标的过程中没有对数据应用任何转换。在本章中，假设您正在 BIDS 中编辑一个包含单个数据流的新
    SSIS 包。


    ## 源向导


    源向导是 SQL Server 12 SSIS 的新功能。当您将此组件从 SSIS 工具箱拖到设计器界面时，BIDS 会打开“添加新源”对话框。该对话框要求您选择源类型和要使用的连接管理器。如图
    7-3 所示，源向导窗口允许您从几种类型的源中进行选择。对于我们的简单数据流示例，我们选择了平面文件源类型和<新建>连接管理器。


    **注意**：“仅显示已安装”复选框将显示的类型限制为仅本地开发计算机上安装的那些类型。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-206_1.jpg)


    # 第 7 章  源和目标适配器


    *图 7-3. 源向导的“添加新源”对话框*


    当您选择<新建>连接管理器时，会弹出连接管理器编辑器。该编辑器特定于您要创建的连接管理器类型——平面文件连接管理器编辑器与 SQL Server 连接管理器编辑器具有不同的属性。平面文件连接管理器编辑器如图
    7-4 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-207_1.jpg)


    # 第 7 章  源和目标适配器


    *图 7-4. 平面文件连接管理器编辑器的常规属性*

