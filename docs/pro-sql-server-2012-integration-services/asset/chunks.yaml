- fmt: '# CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    as opposed to a flat file. This particular dataset uses the column name to delineate
    the data that it contains. This is a relatively denormalized dataset forcing you
    to select a particular year and statistic 69


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-73_1.jpg)


    combination to view the data. In 2020, the only way to update this data would
    be to add new columns to support the new data. With data normalization, we tend
    to prefer loading data rather than modifying existing table structures. For a
    more complex and real-world example, the next package will illustrate how we might
    go about normalizing the data on the fly by using SSIS 12.


    ## Real World


    The simple package example quickly exposed you to SSIS 12 development. However,
    in everyday situations, the requirements will not be as simple. This next example
    shows you some functional requirements you might face in the workplace. In this
    package, we will combine the Population Density data with the Apportionment data
    and store it as a query-friendly dataset in the database. To do this, we will
    build on the work we did for the Hello World example.


    In order to leverage the development on `HelloWorld.dtsx`, we simply added the
    package to a new solution, `Chap3_RealWorld`. After we created the new solution,
    we deleted the default `Package.dtsx` and then right-clicked the solution file
    and selected `Add Existing Package` in the `Add` Group. After it was added, we
    renamed it in Visual Studio to `RealWorld.dtsx`. Adding it to the new project
    simply creates a copy of the file. If you create all your solutions in one folder,
    you will create a copy named `RealWorld (1).dtsx`. Figure 3-22 shows the executables
    that we created to allow the package multiple runs without having to externally
    delete previous data.


    *Figure 3-22\. RealWorld package added to new Chap3_RealWorld solution*


    ## Control Flow


    In addition to the two connection managers we had for the first package, we added
    a third connection manager, `SRC_ApportionmentData`, so that we may be able to
    extract the Apportionment dataset. We also 70


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    added an `Execute SQL` task executable, `SQL_TruncateCensusStatistics`, in order
    to run the package without having to truncate the table between executions of
    the package. The `Data Flow` task, `DFT_TransformCensusData`, is more complex
    in comparison to `DFT_MovePopulationDensityData` because of the components we
    had to use to meet the requirements. The transformation components we will introduce
    to you are the `Derived Column`, `Sort`, `Merge Join`, and `Unpivot` components.


    CAUTION: The `Sort` component can be an extremely memory-intensive component,
    depending on the data volumes. If you are using large flat files, we recommend
    that you store the data in properly indexed staging tables and use the database
    to perform the necessary joins. Because our US Census flat files are relatively
    small, we can use a `Sort` component for our example.


    ## Execute SQL Task


    `SQL_TruncateCensusStatistics` requires an `OLE DB` connection for it to execute
    the SQL statement contained within it. This executable can be used for many purposes,
    from extracting data from a database and storing it as an object for the SSIS
    package to access to executing update statements. For our purposes, we will use
    it to truncate the table every time we run the package. The green arrow, a precedence
    constraint, ensures that the `Execute SQL` task completes execution before the
    `Data Flow` task starts executing. `DFT_TransformCensusData` will execute only
    on the successful completion of `SQL_TruncateCensusStatistics`. Figure 3-22 shows
    the configuration of the `Execute SQL` task. There are some key attributes of
    the task that we modified before we placed the executable: `Name` is a unique
    identifier for the task in the control flow. No two tasks of the same type can
    have the same name. This name is the label that is displayed in the control flow
    designer.


    `Description` is a text field that provides a short explanation of the task’s
    function in the package. It is not required to modify this attribute but it can
    help those who are new to the package understand the process more easily.


    `Connection`, a required attribute, is blank by default. Because we want to truncate
    the destination table, we use the same connection manager as the `OLE DB` destination
    component. There is no need to create a new connection manager just for the `Execute
    SQL` task.


    `SQL Statement` contains the `DDL`, `Data Manipulation Language( DML)`, or `Data
    Access Language`, `DAL`, statements that need to be executed. As you can see in
    Figure 3-23, we put in one statement followed by a batch terminator and `GO`.
    When you modify the statement, a text editor opens and you can type the statement.
    Without the text editor, you cannot place `GO` on a new line and thus will have
    an error when you execute the package.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-75_1.jpg)


    # CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    *Figure 3-23\. SQL_TruncateCensusStatistics—configuration*


    ## Data Flow Task


    The `Data Flow` task executable is the workhorse of `RealWorld.dtsx`. It extracts
    data from the flat files, joins the data in the two files, and outputs the data
    in a normalized format. This process can be done by pulling the data directly
    into SQL Server in a staging table and then using SQL to convert the data into
    the desired form. Strictly in terms of I/O, this second approach is usually inefficient
    because it requires two passes of the data. The first read extracts it from the
    flat file source, and the second one extracts it from the staging table. The process
    we implemented takes one pass of the file, and because SSIS is optimized for row-by-row
    operations, it does add extra overhead to transform the data on the fly. The only
    risk in this method is the use of the `Sort` component to sort the data from the
    flat files. The workflow of `DFT_TransformCensusData` is shown in Figure 3-24\.
    The left stream represents the Population Density data, and the right stream represents
    the Apportionment data.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-76_1.jpg)


    # CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    CAUTION: Even though some implementations perform multiple passes on the data,
    the methods we described might yield better execution times and memory utilizations
    than using some of the blocking components in SSIS.


    Even Microsoft does not recommend using the `Sort` component on large data flows.
    The *large* descriptor is directly dependent on the hardware that is available
    to help process the data.


    *Figure 3-24\. DFT_TransformCensusData*


    `FF_SRC_PopulationDensity` and `FF_SRC_Apportionment`, flat file sources, use
    the same properties as the source components of the HelloWorld package with the
    exception of the source file. Because the files contain different census data
