- fmt: '# BIDS 和 SSMS 工具详解


    ## 导入 Analysis Services 数据库项目


    *导入 Analysis Services 数据库项目*模板会自动生成 Analysis Services 项目的所有项。该向导要求你指向一个 Analysis
    Services 数据库，并将基于现有数据库反向生成所有项目项。生成的项目可用于修改对象并将其重新部署到服务器，以更新数据库。


    ## 集成服务项目向导


    *集成服务项目向导*将自动生成集成服务项目的所有项。该向导会询问现有项目的来源（`.dtproj` 文件或部署在 SQL Server 实例上的包）。此向导将从现有项目中导入所有对象。


    ## 报表模型项目


    *报表模型项目*利用 SQL Server 数据库生成报表。根据定义，报表模型存储其源数据及其关系的元数据。数据源允许你访问指定源的 DDL 并将其用于报表模型。数据源视图（DSV）允许你存储来自源数据的元数据并为报表生成模型。模型设计器可以使用
    SQL Server 或 Oracle 9.2.0.3 及更高版本的关系数据库管理系统（RDBMS）来创建报表模型。虽然基于 RDBMS 的模型可以修改，但基于
    Analysis Services 的模型则不能。数据源中的所有数据都会自动包含在模型中。图 2-5 展示了报表模型项目中可用的所有对象和文件夹。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-20_1.jpg)


    *图 2-5\. 报表模型项目的文件夹结构*


    > **注意：** 一个 `.smdl` 文件只能引用一个数据源（`.ds`）和一个数据源视图（`.dsv`）。此限制将阻止你执行跨数据库连接。


    报表模型由三部分组成：语义模型，为数据对象分配业务友好的名称；物理模型，表示数据源视图中的对象并输出其中包含的查询元数据；以及映射，用于对齐语义模型和物理模型。语义模型定义语言（`.smdl`）文件仅包含一个语义模型、一个物理模型和一个映射。如图
    2-6 所示，设计器可以读取此 DDL 并用于生成描述数据源视图对象的模型。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-21_1.jpg)


    *图 2-6\. 从数据源视图导入的模型*


    部署报表模型项目允许最终用户访问底层数据库中存在的数据。该项目需要部署到报表服务器上，用户在那里拥有访问权限。


    ## 集成服务


    SQL Server 12 中企业级 ETL 流程的基础是 SSIS 包。自 SQL Server 2008 以来，开发 Studio 在界面和一些组件的性能增强方面经历了巨大变化。开发包始于
    Visual Studio 2008 BIDS 项目。


    项目文件（`.dtproj`）将管理这些包。它枚举了将要生成和部署的包；我们将在第 19 章更详细地讨论此过程。项目文件还有助于在 Team Foundation
    Server（TFS，一个 Visual Studio 代码存储库系统）内进行开发。


    设置 TFS 并在此源代码控制框架内工作的内容在第 20 章介绍。在生成过程中，项目包含的每个包中列出的所有配置文件（`.dtsxConfig`）都将被创建。


    让开发者感到兴奋的最大变化之一是能够撤销和重做更改。在早期版本的工具集中，你必须关闭包而不保存更改，然后重新打开包。这意味着，如果你想保留一个更改，但之后又做了一个不想要的更改，你*唯一的选择*就是关闭包而不保存。另一种选择是禁用任务。'
  raw: 'The *Import Analysis Services Database project* template automatically generates
    all the items of an Analysis Services project. The wizard asks you to point to
    anAnalysis Services database. The wizard will reverse-engineer all the project
    items based on the existing database. The project can be used to modify the objects
    and redeploy them to the server to update the database.


    Integration Services Project Wizard


    The *Integration Services Project Wizard* will automatically generate all the
    items of an Integration Services project. The wizard will ask for the source of
    an existing project (either the .dtproj file or a package deployed on a SQL Server
    instance). This wizard will import all the objects from the existing project.


    Report Model Project


    The *Report Model project* utilizes SQL Server databases to generate reports.
    By definition, a report model stores the metadata of its sources and their relationships.
    The data sources allow you to access the DDL


    of the specified source and utilize it for the report models. The DSVs allow you
    to store the metadata from the sources and generate models for reporting. The
    Model Designer can create report models by using the SQL Server or Oracle 9.2.0.3
    and later versions of the RDBMSs. While models based on an RDBMS can be modified,
    those based on Analysis Services cannot. All the data within a data source is
    automatically included in the model. Figure 2-5 demonstrates all the objects and
    folders available to a Report Model project.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-20_1.jpg)


    CHAPTER 2  BIDS AND SSMS


    *Figure 2-5\. Folder structure for a ReportModel project*


     **NOTE:** An.smdl file can refer to only one data source (.ds) and one data
    source view (.dsv). This limitation will prevent you from performing cross-database
    joins.


    There are three parts to the report model: the Semantic model, which assigns business-friendly
    names to the data objects; the Physical model, which represents the objects in
    data source views and outputs metadata of queries contained within; and the mapping,
    which aligns the Semantic and Physical models. The Semantic Model Definition Language
    (.smdl) contains only one Semantic and Physical model, and mapping. As Figure
    2-6 demonstrates, the DDL can be read by the designer and used to generate a model
    that describes the objects of the data source view.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-21_1.jpg)


    CHAPTER 2  BIDS AND SSMS


    *Figure 2-6\. Model for import from a DSV*


    Deploying the Report Model project allows end users access to the data that is
    present in the underlying databases. The project needs to be deployed to a report
    server, where the users have access to it.


    Integration Services


    The basis forenterprise ETL processes in SQL Server 12 is the SSIS package.The
    Development Studio has undergone some radical changes since SQL Server 2008 in
    terms of the interface and some performance enhancements in the components. Developing
    packages begins with a Visual Studio 2008 BIDS project.


    The project file (.dtproj) will be the manager of the packages. It enumerates
    the packages that will be built and deployed; we discuss this process in greater
    length later in Chapter 19\. The project file also assists with development within
    Team Foundation Server (TFS), a Visual Studio code repository system.


    Setting up TFS and working within this framework of source control is covered
    in Chapter 20\. During the build process, all the configuration files (.dtsxConfig)
    will be created as listed in each of the packages included in the project.


    One of the biggest changes that will get developers excited is the ability to
    undo and redo changes.


    In prior versions of the toolset, you had to close the package without saving
    changes and reopen the package. This meant that if you wanted to maintain a change
    but had made an unwanted one after it, your *only option* was to close the package
    without saving. The other alternative was to disable tasks, 18'
