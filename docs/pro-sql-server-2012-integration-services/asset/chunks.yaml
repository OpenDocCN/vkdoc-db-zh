  trans: '

    # SSIS 多样性的另一关键要点


    SSIS 多样性的另一个关键要点是其能够连接到 Web 服务器并使用 Web 服务执行相应方法。`Web 服务任务`利用 `HTTP 连接管理器`来实现此类需求。图
    5-35 展示了控制流中的此任务。该任务的图标与 `FTP` 任务的图标相似，区别在于 `Web 服务任务`图标上没有一个服务器叠加在地球上的图像。


    地球图标表明该任务的操作是针对远程服务执行的。


    *图 5-35. Web 服务任务*


    ## Web 服务任务编辑器 — 常规页


    `Web 服务任务`的“常规”页允许您定义连接到 Web 服务器所需的连接信息。这主要通过 `HTTP 连接管理器`完成，在设置任务的其余属性之前需要先定义它。图
    5-36 显示了该任务编辑器的“常规”页。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-151_1.jpg)


    *图 5-36. Web 服务任务编辑器 — 常规页*


    可用属性如下：


    `HTTPConnection` 列出包中已定义的所有 `HTTP 连接管理器`。就像 `FTP` 连接一样，`HTTP` 连接仅支持 Windows 身份验证和匿名身份验证。


    `WSDLFile` 提供用于针对 Web 服务器执行方法所需的 Web 服务描述语言文件的完整路径。该文件包含 Web 服务可用的方法及其参数。文件必须在运行时存在于定义的路径中。在设计时，您可以创建一个扩展名为
    `.wsdl` 的新文件，并使用覆盖属性从 Web 服务下载它。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-152_1.jpg)


    `OverwriteWSDLFile` 指定是否应覆盖来自 Web 服务器的文件。此选项允许您从 Web 服务器下载最新文件并覆盖其本地副本。


    `Name` 指定 `Web 服务任务`的名称。


    `Description` 提供关于任务目标的简短说明。


    `Download WSDL` 使用 `HTTP 连接管理器`从 Web 服务器下载 `WSDL` 文件。仅当提供了本地文件路径时，此按钮才可用。


    ## Web 服务任务编辑器 — 输入页


    `Web 服务任务`的“输入”页允许您指定 Web 服务器上的方法及其参数。任务将使用指定的 `HTTP 连接管理器`来调用该方法。它将使用 `WSDL`
    文件来填充如图 5-37 所示的下拉列表。


    *图 5-37. Web 服务任务编辑器 — 输入页*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-153_1.jpg)


    可在“输入”页上配置以下属性：


    `Service` 是一个可用 Web 服务的下拉列表。选择执行方法所需的服务。


    `Method` 从 Web 服务可执行的方法列表中选择一个方法。


    `WebMethodDocumentation` 提供关于被调用的 Web 服务方法的描述。省略号按钮允许您输入多行描述。


    `Name` 列出方法参数的名称。


    `Type` 列出方法参数的数据类型。`Web 服务任务`支持基本数据类型，如整数和字符串。


    `Variable` 列出将存储输入参数值的变量。


    `Value` 允许您直接键入值。


    ## XML 任务


    SSIS 可用于对可扩展标记语言 (`XML`) 数据进行各种操作。数据可以以变量或文件的形式存储，甚至可以直接输入。提供的用于处理这些操作的任务是 `XML
    任务`。操作的结果可以输出到文件中以供查看或进一步处理。图 5-38 显示了控制流中的此任务。其图标是一个包含在表示语言标记格式的标签内的地球。


    *图 5-38. XML 任务*

    '
- fmt: '# XML 任务和优先级约束


    ## XML 任务常规页面


    如图 5-39 所示的 XML 任务常规页面允许您配置所有必要的属性。根据操作类型的不同，编辑器会动态变化，仅显示必要的属性。任务的一个必要组件是 XML
    输入。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-154_1.jpg)


    *图 5-39. XML 任务编辑器—常规页面*


    可用属性如下：


    `OperationType` 定义了任务将执行的操作类型。选项包括 `Validate`、`XLST`、`XPATH`、`Merge`、`Diff` 和
    `Patch`。`Validate` 可以将源输入与文档类型定义 (DTD) 或 XML 模式定义进行比较。`XLST` 将对源执行可扩展样式表语言转换。`XPATH`
    将对源执行 XPath 查询。`Merge` 将比较两个输入，取第一个输入，然后将第二个输入的内容添加到第一个中。`Diff` 比较两个输入并将它们的差异写入
    XML 差异文件 (`XML diffgram file`)。`Patch` 获取一个 XML 差异文件并将其应用于源输入，生成一个包含差异文件内容的新文档。


    `SourceType` 定义了 XML 是通过直接输入 (`Direct input`)、文件连接 (`File connection`) 还是变量 (`Variable`)
    来检索。


    如果 `SourceType` 设置为直接输入 (`Direct input`)，则 `Source` 允许您将 XML 直接输入到文本字段中。对于文件连接或变量源，此选项是一个连接或变量的下拉列表，可供使用。


    `SaveOperationResult` 允许您保存对 XML 源执行操作的结果。


    `DestinationType` 允许您将操作结果保存在由连接管理器指向的文件中，或保存在变量中。


    `Destination` 根据所选的目标类型，列出所有可用的文件连接或变量来存储输出。


    `OverwriteDestination` 指定您是否希望用新输出覆盖目标的现有值。


    `SecondOperandType` 定义了第二个 XML 输入是直接输入 (`Direct input`)、文件连接 (`File connection`)
    还是变量 (`Variable`)。


    `SecondOperand` 根据所选的操作数类型，列出所有可用的连接或变量。


    `ValidationType` 允许您在 `DTD` 和 `XSD` 之间进行选择。`DTD` 将使用文档类型定义，而 `XSD` 允许您使用 XML 模式定义作为第二个操作数。此属性仅在
    `Validate` 操作中可用。


    `FailOnValidationFail` 将在执行返回失败时使任务失败。此属性仅在 `Validate` 操作中可用。


    `PutResultSetInOneNode` 允许您将 XPath 操作的结果放入一个节点中。此属性仅在 `XPATH` 操作中可用。


    `XPathOperation` 允许您选择 XPath 结果集类型。不同的结果集类型是 `Evaluation`、`Node list` 和 `Values`。`Evaluation`
    返回 XPath 函数的结果。`Node list` 以 XML 形式返回某些节点。`Values` 仅将所选节点的值作为一个连接字符串返回。


    `XPathStringSourceType` 定义了将标识第一个 XML 输入中合并位置的源类型。选项是直接输入 (`Direct input`)、文件连接
    (`File connection`) 和变量 (`Variable`)。此属性仅在 `Merge` 操作中可用。


    `XPathStringSource` 指向将标识 XML 输入合并位置的字符串。此属性仅在 `Merge` 操作中可用。


    `DiffAlogrithm` 列出了可用于生成差异文件 (`Diffgram`) 的算法类型。`Auto` 选项允许 XML 任务确定操作的最佳算法。`Fast`
    允许快速但准确性较低的比较。`Precise` 选项以性能为代价提供更准确的结果。此属性仅在 `Diff` 操作中可用。


    `DiffOptions` 表示尝试执行 `Diff` 操作时可用的选项。`IgnoreXMLDeclaration` 允许您忽略 XML 声明。`IgnoreDTD`
    允许您忽略 DTD。`IgnoreWhiteSpaces` 在比较文档时忽略空白字符的数量。`IgnoreNamespaces` 允许您忽略 XML 的统一资源标识符
    (URI)。`IgnoreProcessingInstructions` 允许您比较多个处理指令。`IgnoreOrderOfChildElements`
    允许您比较子元素的顺序。`IgnoreComments` 定义任务是否忽略注释节点。`IgnorePrefixes` 定义是否比较元素和属性名称的前缀。


    `FailOnDifference` 定义任务在遇到 XML 输入之间的差异时是否失败。


    `SaveDiffGram` 允许您保存作为比较操作结果生成的差异文件 (`Diffgram`)。


    `DiffGramDestinationType` 允许您选择通过文件连接 (`file connection`) 或变量 (`variable`) 来保存生成的差异文件
    (`Diffgram`)。


    `DiffGramDestination` 允许您在包中定义的文件连接管理器或变量之间进行选择以存储差异文件 (`Diffgram`)。


    ## 优先级约束


    将可执行文件添加到控制流后，您可以定义执行顺序。执行顺序由您定义的*优先级约束*决定。当您未定义任何约束时，可执行文件将同时执行，例如 `Execute Process`
    任务和 `Data Profiling` 任务的情况。要添加优先级约束，请单击任务，然后单击并拖动箭头到应接下来执行的任务。在任务之间有箭头连接后，您可以右键单击箭头并从菜单中选择一种类型；默认约束是
    `Success`。约束可以在任务、容器和事件处理程序上定义。


    有三种类型的优先级约束。第一种约束由绿色箭头表示，是*成功约束* (`Success constraint`)。它仅当先前的可执行文件成功完成时，才允许受约束的可执行文件运行。第二种约束由蓝色箭头表示，是*完成约束*
    (`Completion constraint`)。完成约束仅当优先可执行文件完成其执行时，才允许受约束的可执行文件运行。完成约束不区分成功执行和返回错误的执行。第三种约束由红色箭头表示，是*失败约束*
    (`Failure constraint`)。失败约束仅当先前的可执行文件返回错误时，才会运行受约束的可执行文件。优先级约束也可以配置为使用表达式。图 5-40
    显示了优先级约束编辑器。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-157_1.jpg)


    *图 5-40. 优先级约束编辑器*


    优先级约束编辑器允许您专门配置有关受约束可执行文件执行的属性。以下是可配置属性：


    `Evaluation Operation` 指定受约束可执行文件的约束元素。此属性的选项是 `Expression`、`Constraint`、`ExpressionAndConstraint`
    和 `ExpressionOrConstraint`。`Expression` 表示仅当表达式计算结果为 `True` 时，受约束的可执行文件才会执行。`Constraint`
    选项将允许可执行文件仅受约束值的约束。`ExpressionAndConstraint` 将要求约束的结果和表达式的评估都允许可执行文件的执行。`ExpressionOrConstraint`
    选项将要求约束或表达式和表达式计算结果为 `True` 或 `FALSE`。


    `Value` 定义可执行文件的约束元素。先前可执行文件的执行必须评估为此值，受约束的可执行文件才能执行。此属性的选项是 `Completion`、`Success`
    和 `Failure`。'
  raw: 'The General page of the XML task, shown in Figure 5-39, allows you to configure
    all the necessary properties. Depending on the type of operation, the editor will
    dynamically change to allow for only the necessary properties to appear. One necessary
    component of the task is the XML input.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-154_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    *Figure 5-39\. XML Task Editor—General page*


    The available properties are as follows:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5  CONTROL FLOW BASICS


    OperationType defines the type of operation that the task will perform. The


    choices are Validate, XLST, XPATH, Merge, Diff, and Patch. Validate can compare
    a source input against Document Type Definition (DTD) or an XML schema


    definition. XLST will perform Extensible Stylesheet Language transformations


    on the sources. XPATH will perform XPath queries on the sources. Merge will


    compare two inputs, taking the first input and then adding the content of the


    second to the first. Diff compares the two inputs and writes their differences
    to an XML diffgram file. Patch takes an XML Diffgram and applies it to a source


    input and generates a new document that has the contents of the Diffgram.


    SourceType defines whether the XML is retrieved by Direct input, File


    connection, or Variable.


    Source enables you to input XML directly into the text field if the SourceType


    was set as Direct input. For file connection or variable sources, this option
    is a drop-down list of connections or variables that can be used.


    SaveOperationResult allows you to save the results of the operation on the XML


    source.


    DestinationType allows you to save the results of the operation in either a file
    pointed to by a connection manager or a variable.


    Destination lists all the available file connections or variables to store the


    output, depending on the destination type selected.


    OverwriteDestination specifies whether you want to overwrite the existing


    value of the destination with the new output.


    SecondOperandType defines whether the second XML input is Direct input, File


    connection, or a Variable.


    SecondOperand lists all the available connections or variables, depending on the
    operand type selected.


    ValidationType lets you select between DTD and XSD. DTD will use a Document


    Type Definition, whereas the XSD will allow you to use an XML Schema


    definition as the second operand. This property is available only with the


    Validate operation.


    FailOnValidationFail will fail the task if the execution returns a failure. This
    property is available only with the Validate operation.


    PutResultSetInOneNode allows you to place the results of the XPath operation


    into one node. This property is available only with the XPATH operation.


    XPathOperation allows you to select the XPath result set type. The different


    result set types are Evaluation, Node list, and Values. Evaluation returns the


    results of an XPath function. Node list returns certain nodes as XML. Values


    returns only the values of the selected nodes as one concatenated string.


    XPathStringSourceType defines the type of source that will identify the merge


    location in the first XML input. The choices are Direct input, File connection,
    and Variable. This property is available only with the Merge operation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5  CONTROL FLOW BASICS


    XPathStringSource points to the string that will identify the merge location of
    the XML input. This property is available only with the Merge operation.


    DiffAlogrithm lists the types of algorithms available for the generation of the
    Diffgram. The Auto option allows the XML task to determine the best algorithm


    for the operation. Fast allows for a quick but less-accurate comparison. The


    Precise option allows for more-accurate results at the cost of performance. This
    property is available only with the Diff operation.


    DiffOptions represents the options available when attempting to perform the


    Diff operation. IgnoreXMLDeclaration allows you to ignore the XML


    declaration. IgnoreDTD allows you to ignore the DTD. IgnoreWhiteSpaces


    ignores the amount of whitespaces when comparing documents.


    IgnoreNamespaces allows you to ignore the Uniform Resource Identifier (URI) of


    the XML. IgnoreProcessingInstructions allows you to compare multiple


    processing commands. IgnoreOrderOfChildElements allows you to compare the


    order of the child elements. IgnoreComments defines whether the task will ignore
    comment nodes. IgnorePrefixes defines whether or not you compare the


    prefixes of the elements and attribute names.


    FailOnDifference defines whether the task will fail if it encounters a difference
    between the XML inputs.


    SaveDiffGram allows you to save the Diffgram that is generated as a result of
    the comparison operation.


    DiffGramDestinationType allows you to choose the method of saving the


    generated Diffgram through either a file connection or a variable.


    DiffGramDestination allows you to pick between defined file connection


    managers or variables in the package to store the Diffgram.


    Precedence Constraints


    After you add executables to the control flow, you have the option to define the
    order of execution. The order of execution is dictated by the *precedence constraints*
    that you define. When you don’t define any constraints, the executables will execute
    at the same time, as is the case with the Execute Process task and the Data Profiling
    task. To add a precedence constraint, click the task and then click and drag the
    arrow to the task that should execute next. After you have an arrow connecting
    the tasks, you can right-click the arrow and select a type from the menu; the
    default constraint is Success. Constraints can be defined on tasks, containers,
    and event handlers.


    There are three types of precedence constraints. The first constraint, denoted
    by a green arrow, is the *Success constraint*. It allows the constrained executable
    to run only if the preceding executable completed successfully. The second constraint,
    denoted by a blue arrow, is the *Completion constraint*.


    The Completion constraint allows the constrained executable to run only if the
    precedence executable completed its execution. The Completion constraint does
    not distinguish between a successful execution and one that returns an error.
    The third constraint, denoted by a red arrow, is the *Failure* *constraint*. The
    Failure constraint will run the constrained executable only if the preceding executable
    returns an error. The precedence constraint can be configured to use expressions
    as well. Figure 5-40


    shows the Precedence Constraint Editor.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-157_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    *Figure 5-40\. Precedence Constraint Editor*


    The Precedence Constraint Editor allows you to configure properties specifically
    regarding the execution of the constrained executable. The following are the configurable
    properties: Evaluation Operation specifies the constraining element of the constrained


    executable. The options for this property are Expression, Constraint,


    ExpressionAndConstraint, and ExpressionOrConstraint. Expression indicates


    that the constrained executable will execute only when the expression evaluates
    to True. The Constraint option will allow the executable to be constrained only
    by the constraint’s value. ExpressionAndConstraint will require the results of


    the constraint and the evaluation of the expression to allow the execution of
    the executable. The ExpressionOrConstraint option will require either the


    constraint or the expression and expression to evaluate to True or FALSE.


    Value defines the constraining element of the executable. The prior


    executable’s execution has to evaluate to this value in order for the constrained
    executable to execute. The options for this property are Completion, Success,


    and Failure.'
  trans: '# XML 任务与优先级约束


    ## XML 任务常规页面


    如图 5-39 所示的 XML 任务常规页面允许您配置所有必要的属性。根据操作类型的不同，编辑器会动态变化，仅显示必要的属性。任务的一个必要组件是 XML
    输入。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-154_1.jpg)


    *图 5-39. XML 任务编辑器—常规页面*


    可用属性如下：


    `OperationType` 定义了任务将执行的操作类型。选项包括 `Validate`、`XLST`、`XPATH`、`Merge`、`Diff` 和
    `Patch`。`Validate` 可以将源输入与文档类型定义 (DTD) 或 XML 模式定义进行比较。`XLST` 将对源执行可扩展样式表语言转换。`XPATH`
    将对源执行 XPath 查询。`Merge` 将比较两个输入，取第一个输入，然后将第二个输入的内容添加到第一个中。`Diff` 比较两个输入并将它们的差异写入
    XML 差异文件 (`XML diffgram file`)。`Patch` 获取一个 XML 差异文件并将其应用于源输入，生成一个包含差异文件内容的新文档。


    `SourceType` 定义了 XML 是通过直接输入 (`Direct input`)、文件连接 (`File connection`) 还是变量 (`Variable`)
    来检索。


    如果 `SourceType` 设置为直接输入 (`Direct input`)，则 `Source` 允许您将 XML 直接输入到文本字段中。对于文件连接或变量源，此选项是一个连接或变量的下拉列表，可供使用。


    `SaveOperationResult` 允许您保存对 XML 源执行操作的结果。


    `DestinationType` 允许您将操作结果保存在由连接管理器指向的文件中，或保存在变量中。


    `Destination` 根据所选的目标类型，列出所有可用的文件连接或变量来存储输出。


    `OverwriteDestination` 指定您是否希望用新输出覆盖目标的现有值。


    `SecondOperandType` 定义了第二个 XML 输入是直接输入 (`Direct input`)、文件连接 (`File connection`)
    还是变量 (`Variable`)。


    `SecondOperand` 根据所选的操作数类型，列出所有可用的连接或变量。


    `ValidationType` 允许您在 `DTD` 和 `XSD` 之间进行选择。`DTD` 将使用文档类型定义，而 `XSD` 允许您使用 XML 模式定义作为第二个操作数。此属性仅在
    `Validate` 操作中可用。


    `FailOnValidationFail` 将在执行返回失败时使任务失败。此属性仅在 `Validate` 操作中可用。


    `PutResultSetInOneNode` 允许您将 XPath 操作的结果放入一个节点中。此属性仅在 `XPATH` 操作中可用。


    `XPathOperation` 允许您选择 XPath 结果集类型。不同的结果集类型是 `Evaluation`、`Node list` 和 `Values`。`Evaluation`
    返回 XPath 函数的结果。`Node list` 以 XML 形式返回某些节点。`Values` 仅将所选节点的值作为一个连接字符串返回。


    `XPathStringSourceType` 定义了将标识第一个 XML 输入中合并位置的源类型。选项是直接输入 (`Direct input`)、文件连接
    (`File connection`) 和变量 (`Variable`)。此属性仅在 `Merge` 操作中可用。


    `XPathStringSource` 指向将标识 XML 输入合并位置的字符串。此属性仅在 `Merge` 操作中可用。


    `DiffAlogrithm` 列出了可用于生成差异文件 (`Diffgram`) 的算法类型。`Auto` 选项允许 XML 任务确定操作的最佳算法。`Fast`
    允许快速但准确性较低的比较。`Precise` 选项以性能为代价提供更准确的结果。此属性仅在 `Diff` 操作中可用。


    `DiffOptions` 表示尝试执行 `Diff` 操作时可用的选项。`IgnoreXMLDeclaration` 允许您忽略 XML 声明。`IgnoreDTD`
    允许您忽略 DTD。`IgnoreWhiteSpaces` 在比较文档时忽略空白字符的数量。`IgnoreNamespaces` 允许您忽略 XML 的统一资源标识符
    (URI)。`IgnoreProcessingInstructions` 允许您比较多个处理指令。`IgnoreOrderOfChildElements`
    允许您比较子元素的顺序。`IgnoreComments` 定义任务是否忽略注释节点。`IgnorePrefixes` 定义是否比较元素和属性名称的前缀。


    `FailOnDifference` 定义任务在遇到 XML 输入之间的差异时是否失败。


    `SaveDiffGram` 允许您保存作为比较操作结果生成的差异文件 (`Diffgram`)。


    `DiffGramDestinationType` 允许您选择通过文件连接 (`file connection`) 或变量 (`variable`) 来保存生成的差异文件
    (`Diffgram`)。


    `DiffGramDestination` 允许您在包中定义的文件连接管理器或变量之间进行选择以存储差异文件 (`Diffgram`)。


    ## 优先级约束


    将可执行文件添加到控制流后，您可以定义执行顺序。执行顺序由您定义的*优先级约束*决定。当您未定义任何约束时，可执行文件将同时执行，例如 `Execute Process`
    任务和 `Data Profiling` 任务的情况。要添加优先级约束，请单击任务，然后单击并拖动箭头到应接下来执行的任务。在任务之间有箭头连接后，您可以右键单击箭头并从菜单中选择一种类型；默认约束是
    `Success`。约束可以在任务、容器和事件处理程序上定义。


    有三种类型的优先级约束。第一种约束由绿色箭头表示，是*成功约束* (`Success constraint`)。它仅当先前的可执行文件成功完成时，才允许受约束的可执行文件运行。第二种约束由蓝色箭头表示，是*完成约束*
    (`Completion constraint`)。完成约束仅当优先可执行文件完成其执行时，才允许受约束的可执行文件运行。完成约束不区分成功执行和返回错误的执行。第三种约束由红色箭头表示，是*失败约束*
    (`Failure constraint`)。失败约束仅当先前的可执行文件返回错误时，才会运行受约束的可执行文件。优先级约束也可以配置为使用表达式。图 5-40
    显示了优先级约束编辑器。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-157_1.jpg)


    *图 5-40. 优先级约束编辑器*


    优先级约束编辑器允许您专门配置有关受约束可执行文件执行的属性。以下是可配置属性：


    `Evaluation Operation` 指定受约束可执行文件的约束元素。此属性的选项是 `Expression`、`Constraint`、`ExpressionAndConstraint`
    和 `ExpressionOrConstraint`。`Expression` 表示仅当表达式计算结果为 `True` 时，受约束的可执行文件才会执行。`Constraint`
    选项将允许可执行文件仅受约束值的约束。`ExpressionAndConstraint` 将要求约束的结果和表达式的评估都允许可执行文件的执行。`ExpressionOrConstraint`
    选项将要求约束或表达式和表达式计算结果为 `True` 或 `FALSE`。


    `Value` 定义可执行文件的约束元素。先前可执行文件的执行必须评估为此值，受约束的可执行文件才能执行。此属性的选项是 `Completion`、`Success`
    和 `Failure`。'
- fmt: '# Multiple Constraints


    Multiple Constraints specifies the conditions of the executable’s execution if
    it is constrained multiple times. The two options are Logical AND and Logical
    OR.


    These options will either perform a logical AND or logical OR between all the
    constraints specified in order to execute the constrained executable.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-158_1.jpg)


    # CHAPTER 5 CONTROL FLOW BASICS


    For the sample shown in Figure 5-41, the Execute Process task and the Data Profiling
    task will execute at the same time. The Script task will execute only if the Execute
    Process task executes successfully. The Bulk Insert task will execute after the
    Execute Process task completes its operations.


    The Send Mail task will execute only if the Execute Process task fails in its
    execution. At any given execution, you will have the combination of the Script
    task and the Bulk Insert task, or the combination of the Send Mail task and the
    Bulk Insert task, executing at the same time because those tasks are constrained
    by only the Execute Process task.


    **NOTE:** An executable can constrain multiple executables as well as be constrained
    by multiple executables.


    The type of constraints can vary as well. This will allow an executable to run
    only if certain execution results are achieved. An executable cannot constrain
    or precede itself.


    *Figure 5-41. Precedence constraints and parallel tasks*


    ## Basic Containers


    Adding many tasks to the control flow can make reading the SSIS Package difficult.
    One of the ways that we can avoid cluttering the control flow is by utilizing
    the containers. The *containers* allow you to group together multiple tasks and
    even other containers. There are three types of containers that SSIS provides:
    For Loop container, Foreach Loop container, and Sequence container. This section
    introduces the Sequence Container. The other two, we leave for Chapter 6. There
    is one other method of organizing that is present within SSIS, and that is grouping.
    It is not a container in the strictest sense, but it allows for the package to
    be visually readable.


    ## Containers


    All three containers are organized in the SSIS Toolbox in the Containers folder
    by default. They can be moved to the Favorites and Common groups. Containers modularize
    SSIS packages. They can be used to limit the scope of variables so that you can
    define variables for access only by tasks and containers contained within the
    parent container. The scope of a variable is a part of the variable definition
    and exists in a column in the list of variables in the Parameters and Variables
    window. The executables within a container create a subroutine within the package.
    The tasks defined within a container cannot initiate the execution of a task or
    container outside the container. The arrow at the right of the container’s name
    allows you to collapse the contents of the container for configuration.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-159_1.jpg)


    # CHAPTER 5 CONTROL FLOW BASICS


    **TIP:** Using containers frequently within your packages gives you the ability
    to execute all the objects within the container in Visual Studio’s Debug mode.
    You cannot execute the entire package but rather just the executables within the
    container. To do this, you can simply right-click the container and select Execute
    Container. In order to access Debug mode, the package needs to be opened as a
    part of a project.


    Figure 5-42 demonstrates a potential use of a Sequence container. The icon for
    the container is a blue square outline containing a solid blue square and a blue
    arrow. The icon shows several potential executables being contained by the container.
    The Execute Process task is the first task to execute, and then the constrained
    Script task will execute only if the first task executes successfully.


    **NOTE:** The sequence containers support the Transaction property, allowing Execute
    SQL tasks to execute as a single transaction.


    *Figure 5-42. Sequence container*


    ## Groups


    *Groups* in the SSIS control flow are not containers, but they offer some of the
    organizing advantages that containers offer. We do not recommend using groups
    because they can lead to SSIS spaghetti code.


    Unlike containers, groups do not isolate the executables within them. They allow
    precedence constraints to be created between objects inside and outside the group,
    as shown in Figure 5-43. In this example, we have an Execute SQL task preceding
    a Data Flow task. It appears as if the Data Flow task and File System task should
    execute together, but in reality the Execute SQL task and the File System task
    will execute at the same time. Just like containers, groups can collapse the objects
    they contain.


    **NOTE:** Groups do not allow you to execute the objects they contain. They merely
    allow you to visually organize the objects.


    *Figure 5-43. Groups*


    ## Breakpoints


    During the execution of the objects in a package, each executable fires events.
    Visual Studio’s Debug mode allows you to create *breakpoints* that will listen
    for these events and suspend the execution.


    Breakpoints can be defined on tasks, containers, and the package as a whole in
    the control flow. To create breakpoints, you have to right-click the object and
    select Edit Breakpoints. This selection opens the dialog box shown in Figure 5-44.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-161_1.jpg)


    # CHAPTER 5 CONTROL FLOW BASICS


    *Figure 5-44. Set Breakpoints options*


    This dialog box allows you to specify the Break Condition, the occurrence of the
    condition that will increment the count, and the count that will be tolerated
    before the execution is suspended. This section introduces the events that SSIS
    issues. We discuss them in greater detail in Chapter 11. The events are as follows:


    - `OnPreExecute` creates an event right before the target object starts execution.

    - `OnPostExecute` creates an event right after the target object completes execution.

    - `OnError` creates an event when the target object causes an error during execution.

    - `OnWarning` creates an event when the target object is not in a state to error
    but it is not designed optimally.

    - `OnInformation` creates an event when the target object issues information about
    the execution.

    - `OnTaskFailed` creates an event when the target object fails execution.

    - `OnProgress` creates an event when the target object is in the middle of executing.

    - `OnQueryCancel` creates an event when the target object is stopped in the middle
    of executing.

    - `OnVariableValueChanged` creates an event when a variable value changes during
    the execution of the target object.

    - `OnCustomEvent` creates an event when there are custom events that the target
    object raises during execution.


    The Hit Count Type column in the Set Breakpoints dialog box defines the criteria
    that causes the target object to suspend its execution. The options are Always,
    Hit Count Equals, Hit Count Greater Than or Equal To, and Hit Count Multiple.
    The Always hit count will always suspend the execution of the target, every time
    the enabled break condition event is raised. This option disables the Hit Count
    column. The Hit Count Equals option will suspend the target only if the condition
    event is raised enough times to match the defined hit count. The Hit Count Greater
    Than or Equal To option will suspend the execution every time the condition event
    is raised, starting when the number of event occurrences matches the hit count.
    The Hit Count Multiple option will cause the target to suspend its execution every
    time the break condition event is raised enough to be a multiple of the defined
    hit count.


    ## Summary'
