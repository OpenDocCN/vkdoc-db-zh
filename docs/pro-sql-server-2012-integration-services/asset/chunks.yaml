- fmt: '# CHAPTER 9: VARIABLES, PARAMETERS, AND EXPRESSIONS


    ## Package System Variables


    | Name | Data Type | Description |

    | :--- | :--- | :--- |

    | `InteractiveMode` | `Boolean` | Indicates whether the package is being executed
    in interactive mode. Interactive mode indicates whether the `SSIS designer` (`True`)
    is used to execute or `DTExec command line` utility is used (`False`). |

    | `LocaleID` | `Int32` | Identifies the locale that the package is using. By default
    it is `English (US)`. |

    | `MachineName` | `String` | The name of the computer on which the package is
    currently being executed. |

    | `OfflineMode` | `Boolean` | Indicates whether the package is in offline mode
    and not acquiring connections to the data sources. |

    | `PackageID` | `String` | Unique identifier of the package. The string represents
    hexadecimal values. |

    | `PackageName` | `String` | The name of the package without the file extension.
    |

    | `StartTime` | `DateTime` | The timestamp indicating when the package began execution.
    |

    | `UserName` | `String` | The username of the account that is currently executing
    the package. |

    | `VersionBuild` | `Int32` | The package’s version. |

    | `VersionComment` | `String` | Displays the comments about the package’s version.
    |

    | `VersionGUID` | `String` | Uniquely identifies the package’s version. The string
    represents hexadecimal values. |

    | `VersionMajor` | `Int32` | Identifies the major version of the package. |

    | `VersionMinor` | `Int32` | Identifies the minor version of the package. |


    ## Container System Variable


    The *containers* have only one system variable that is specific to them, `LocaleID`.
    This 32-bit integer identifies the locale that the container uses. This variable
    can be used within `Sequence`, `For Loop`, and `Foreach Loop` containers. Accessing
    the `LocaleID` variable within a container will default to this value rather than
    the package’s `LocaleID`.


    ## Task System Variables


    The control flow tasks get their own set of system variables after they are created.
    These variables are usually not directly accessible for most of the tasks other
    than the `Data Flow` task. The `Data Flow` task allows you to access its variables
    by using `Script transformation tasks`, `Derived Column transformations`, and
    `Conditional Split transformations`. Using these transformations, you can access
    these variables and use their values as part of your data stream. Table 9-3 shows
    all the system variables that are available with tasks.


    **Table 9-3. Task System Variables**


    | Name | Data Type | Description |

    | :--- | :--- | :--- |

    | `CreationName` | `String` | The name of the task as recognized by `SSIS`. |

    | `LocaleID` | `Int32` | Identifies the locale the task uses. By default it is
    `English (US)`. |

    | `TaskID` | `String` | Unique identifier of the task. The string represents hexadecimal
    values. |

    | `TaskName` | `String` | The unique name given to the task at design time. |

    | `TaskTransactionOption` | `Int32` | Identifies the transaction option the task
    is utilizing. |


    ## Event Handler System Variables


    The last type of executables in `SSIS`, event handlers, also has its own set of
    system variables. These variables often do not apply to all the event handlers.
    The general rule that applied to the tasks also applies to the event handler system
    variables. Table 9-4 describes all the event handler system variables.


    **Table 9-4. Event Handler System Variables**


    | Name | Data Type | Description |

    | :--- | :--- | :--- |

    | `Cancel` | `Boolean` | Identifies whether the event handler stops execution
    after error, warning, or query cancellation. Available to only `OnError`, `OnWarning`,
    and `OnQueryCancel`. |

    | `ErrorCode` | `Int32` | Identifies the error code that occurred. Available to
    only `OnError`, `OnInformation`, and `OnWarning`. |

    | `ErrorDescription` | `String` | String that describes the error event. Available
    to only `OnError`, `OnInformation`, and `OnWarning`. |

    | `ExecutionStatus` | `Boolean` | Identifies whether the event is currently executing.
    Available to only `OnExecStatusChanged`. |

    | `ExecutionValue` | `DBNull` | Returns the execution value. Available to only
    `OnTaskFailed`. |

    | `LocaleID` | `Int32` | Identifies the locale that the event handler uses. Available
    to all event handlers. |

    | `PercentComplete` | `Int32` | Returns the progress on the completion of the
    event handler. Available to only `OnProgress`. |'
