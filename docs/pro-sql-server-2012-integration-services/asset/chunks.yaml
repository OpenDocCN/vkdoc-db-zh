    CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    The DDL for the task is written in Analysis Services Scripting Language (ASSL).
    The ASSL contains information defining the Analysis Services database and database
    objects. This includes login information and other sensitive information. The
    ASSL is stored inside an XML of Analysis (XMLA) command. The XMLA commands are
    used to create, drop, and alter objects on the server.


     **TIP:** If you place the DDL directly into the package, you may want to consider
    using the EncryptAllWithUserKey or EncryptAllWithPassword protection levels. Because
    the XMLA may contain sensitive information, encrypting it is advisable.


    Data Mining Query Task


    The *Data Mining Query task* allows you to run Data Mining Extensions (DMX) statements
    based on data-mining models defined on an Analysis Services database. The output
    for these queries usually is a predictive analysis based on the provided data.
    The DMX statement can reference multiple models, each using its own predictive
    algorithm. Figure 6-3 shows the task as it appears in the control flow designer
    window. The icon, a pickax with some files behind it, shows the basic idea behind
    data mining, which is digging through the data that is available to find the meaningful
    pieces. This task utilizes the ADO.NET


    Connection Manager to connect to the Analysis Services database.


    *Figure 6-3\. Data Mining Query task*


    Data Mining Query Task Editor—Mining Model Tab


    The Mining Model tab of the Data Mining Task Editor allows you to specify the
    database and the mining model to use for a specific query. Figure 6-4 shows the
    options that are available on this page of the editor. The UI for this particular
    task’s editor is different from the rest you have encountered so far.


    Instead of having the pages listed to the left side of the field options, the
    pages are shown as tabs.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-166_1.jpg)


    CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    *Figure 6-4\. Data Mining Task Editor—Mining Model tab*


    The following are properties that are modifiable in the Mining Model tab:


    Name uniquely defines the Data Mining task.


    Description provides a brief summary of the task’s purpose.


    Connection allows you to select a defined connection to an Analysis Services


    database.


    New creates a new SQL Server Analysis connection.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-167_1.jpg)


    CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    Mining Structure lists all the mining structures defined on the Analysis


    Services database.


    Mining Model lists all the mining models created on the selected mining


    structure.


    Data Mining Query Task Editor—Query Tab


    The Query tab of the Data Mining Task Editor allows you to either manually type
    a query or use a graphical tool to create the desired query. The query accepts
    SSIS variables as parameters. It can also store the results from the query into
    SSIS variables. The parameter mapping rules shown in Chapter 5


    apply to this task as well. The naming convention of the parameter is dependent
    on the connection manager type that is used, in this case the ADO.NET connection
    manager for Analysis Services. Each of these modifications has its own tab within
    the Query tab, as shown in Figure 6-5.


    *Figure 6-5\. Data Mining Query Task Editor—Query tab*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    These properties are configurable in the Query tab:


    Build Query contains a text field that allows you to type the data-mining query.


    Build New Query button opens a graphical tool that will assist you with


    generating the data-mining query. After the query has been generated, it will
    be imported from the tool into the text field. You can further modify it after
    it is in the field.


    Parameter Name lists the parameters used by the data-mining query.'
  trans: '# 第 6 章 - 高级控制流任务


    任务的数据定义语言（DDL）是用 Analysis Services 脚本语言（`ASSL`）编写的。`ASSL` 包含定义 Analysis Services
    数据库及数据库对象的信息。这包括登录信息和其他敏感信息。`ASSL` 存储在 Analysis XML（`XMLA`）命令的 XML 中。`XMLA` 命令用于在服务器上创建、删除和更改对象。


    **提示：** 如果你将 DDL 直接放入包中，你可能需要考虑使用 `EncryptAllWithUserKey` 或 `EncryptAllWithPassword`
    保护级别。因为 `XMLA` 可能包含敏感信息，建议对其进行加密。


    ## 数据挖掘查询任务


    `数据挖掘查询任务` 允许你运行基于 Analysis Services 数据库上定义的数据挖掘模型的数据挖掘扩展（`DMX`）语句。这些查询的输出通常是基于所提供数据的预测分析。`DMX`
    语句可以引用多个模型，每个模型使用其自己的预测算法。图 6-3 显示了该任务在控制流设计器窗口中的样子。其图标——一把鹤嘴锄和后面的一些文件——展示了数据挖掘背后的基本思想，即挖掘可用数据以找到有意义的部分。此任务利用
    `ADO.NET` 连接管理器来连接到 Analysis Services 数据库。


    *图 6-3. 数据挖掘查询任务*


    ### 数据挖掘查询任务编辑器——挖掘模型选项卡


    数据挖掘任务编辑器的“挖掘模型”选项卡允许你为特定查询指定要使用的数据库和挖掘模型。图 6-4 显示了该编辑器此页面上的可用选项。这个特定任务编辑器的用户界面（UI）与你目前遇到的其他编辑器不同。它不是将页面列在字段选项的左侧，而是以选项卡的形式显示页面。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-166_1.jpg)


    *图 6-4. 数据挖掘任务编辑器——挖掘模型选项卡*


    以下是“挖掘模型”选项卡中可修改的属性：


    - `名称` 唯一地定义数据挖掘任务。

    - `描述` 简要概述任务的用途。

    - `连接` 允许你选择一个已定义的到 Analysis Services 数据库的连接。

    - `新建` 创建一个新的 SQL Server Analysis 连接。

    - `挖掘结构` 列出在 Analysis Services 数据库上定义的所有挖掘结构。

    - `挖掘模型` 列出在所选挖掘结构上创建的所有挖掘模型。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-167_1.jpg)


    ### 数据挖掘查询任务编辑器——查询选项卡


    数据挖掘任务编辑器的“查询”选项卡允许你手动键入查询或使用图形工具来创建所需的查询。该查询接受 `SSIS` 变量作为参数。它也可以将查询结果存储到 `SSIS`
    变量中。第 5 章中显示的参数映射规则也适用于此任务。参数的命名约定取决于所使用的连接管理器类型，在此情况下是用于 Analysis Services 的
    `ADO.NET` 连接管理器。这些修改中的每一个在“查询”选项卡内都有其自己的选项卡，如图 6-5 所示。


    *图 6-5. 数据挖掘查询任务编辑器——查询选项卡*


    以下属性在“查询”选项卡中是可配置的：


    - `构建查询` 包含一个文本字段，允许你键入数据挖掘查询。

    - `构建新查询` 按钮打开一个图形工具，该工具将协助你生成数据挖掘查询。查询生成后，它将从工具导入到文本字段中。在它进入字段后，你可以进一步修改它。

    - `参数名称` 列出数据挖掘查询使用的参数。'
- fmt: '# CHAPTER 6 - ADVANCED CONTROL FLOW TASKS


    ## Data Mining Query Task Editor—Output Tab


    `Variable Name` lists the SSIS variable that is mapped to the particular parameter.


    `Add` button adds a mapping to the parameter list.


    `Remove` button removes the selected mapping from the parameter list.


    `Result Name` is the name of the result from the data-mining query. It can be
    changed to be the real result name provided by the query.


    `Variable Name` specifies the variable for storing the result set.


    `Result Type` allows you to define the result as either a single row or a dataset.


    `Add` button allows you to add a mapping for a result value.


    `Remove` button allows you to remove an existing mapping from the list of results.


    The `Output` tab of the `Data Mining Query Task Editor` allows you to store the
    output of the data-mining query. The storage is handled by `ADO.NET` and `OLE
    DB` connections only. Figure 6-6 shows the `Output` tab of the `Data Mining Query
    Task Editor`. The data can be inserted into SQL Server tables for further querying.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-169_1.jpg)


    *Figure 6-6. Data Mining Query Task Editor—Output tab*


    The `Output` tab supports the configuration of the following properties:


    `Connection` lists all the `ADO.NET` and `OLE DB` connections that have been defined
    in the package.


    `New` button creates a new `ADO.NET` or `OLE DB` connection if the desired one
    does not already exist.


    `Output Table` provides the name of the table to store the results of the data-mining
    query.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-170_1.jpg)


    `Drop and Re-create the Output Table` allows you to clear prior data by dropping
    and rebuilding the table. This enables metadata updates to be loaded without issues.


    ## Message Queue Task


    The `Message Queue task` uses Microsoft Message Queuing (`MSMQ`) to send messages
    between SSIS packages or between custom applications. The messages themselves
    can be composed of text and can carry data files or SSIS variable values. There
    are some primary reasons for using the `Message Queue task` in your ETL solutions.
    One way to utilize the message queuing is to suspend a package''s execution until
    the package receives a certain message. This allows external, non-ETL processes
    to complete and then immediately initiate the ETL. Along with suspension of the
    SSIS packages, this task can be used to transmit files as a part of its message.
    This file can be the output of the ETL process or external processes that indicate
    to the package that data source files are ready for SSIS access. The task can
    also be used to transfer files across the system. Figure 6-7 shows the task as
    it appears in the control flow. The icon contains two envelopes, one overlapping
    the other, with a downward blue arrow specifying an ordered transmission.


    **NOTE:** By default, the Microsoft Message Queuing service is not started on
    older versions of Microsoft operating systems. On the newer operating systems
    (Vista and later, and Server 2008 and later), you need to install the appropriate
    Windows features in order to use the service.


    *Figure 6-7. Message Queue task*


    ### Message Queue Task Editor—General Page


    The `General` page of the `Message Queue Task Editor` allows you to define whether
    the task is responsible for sending or receiving messages. Depending on the role
    of the task, the pages available are automatically modified to allow for `Send`
    or `Receive` options. Figure 6-8 shows the `Message Queue Task Editor`''s `General`
    page.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-171_1.jpg)


    *Figure 6-8. Message Queue Task Editor—General page*


    The following properties are configurable on the `General` page:


    `Name` provides a unique name for the `Message Queue task`.


    `Description` provides a brief statement about the object of the particular `Message
    Queue task`.


    `Use2000Format` specifies whether to use the 2000 version of Message Queuing.


    `MSMQConnection` lists all the defined Microsoft Message Queuing Connection.'
