- fmt: '# CHAPTER 5 CONTROL FLOW BASICS


    `LastRow` points to the last row to import into the destination. The default value,
    `0`, indicates that the end of file (`EOF`) should determine the last row.


    `FirstRow` points to the first row to import into the destination. This value
    will allow you to ignore header rows. It is important to skip the first row if
    it contains the names of the columns.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-131_1.jpg)


    `Options` defines some of the integrity checks that can be performed during the
    bulk insert. `Check Constraints` ensures that all the constraints defined on the
    table are not violated. `Keep Nulls` inserts nulls into the table columns as they
    appear in the source, despite any default values defined on the table. `Enable
    Identity Insert` allows you to insert values into an identity column. `Table Lock`
    performs locking operations on the table as it is being loaded by the bulk insert.
    `Fire Triggers` allows any triggers defined on the table to be executed.


    `SortedData` provides a comma-separated `ORDER’ed BY` clause of column names as
    they appear in the destination table. This specifies that the values are sorted
    in the source.


    `MaxErrors` defines the error tolerance of the Bulk Insert task. The value `0`
    indicates that an infinite number of errors are allowed to occur. Any row that
    cannot be imported is considered an error.


    ## Data Profiling Task


    `Data Profiling task` allows you to quickly get statistically significant information
    on tables or views in a database. This task can be used to determine foreign-key
    relationships, candidate keys, or even null ratios of columns. The information
    about the data can then be loaded into a flat file in XML format or an `SSIS`
    variable. Figure 5-16 shows the component as it appears in the control flow. The
    icon of bar charts indicates statistical information. The `Data-Profiling task`
    contains statistical information such as ratio of uniqueness for a possible candidate
    key or ratio of null data in a column.


    *Figure 5-16. Data Profiling task*


    ### Data Profiling Task Editor—General Page


    The General page of the Data Profiling Task Editor asks you to determine the destination
    for the data profile information. In Figure 5-17, we chose to store the information
    in a flat file that will be overwritten each time the task is executed. We would
    like to point out that unlike the General pages of some other tasks, this one
    does not allow you to provide a `Name` and a `Description`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-132_1.jpg)


    *Figure 5-17. Data Profiling Task Editor—General page*


    Instead of allowing you to modify the `Name` and `Description` properties, the
    General page of the Data Profiling Task Editor provides the following properties
    for modification:


    `Timeout` allows you to define the amount of time for the task to stop running.


    `DestinationType` provides a drop-down list that allows you to input the data-profiling
    information in either a variable or a flat file.


    `Destination` lists all the `Flat File Connection Managers` that are defined in
    the package. If none have been created or the specific destination isn’t connected
    to, you can create a new one.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-133_1.jpg)


    `OverwriteDestination` allows you to overwrite the file if it already exists.
    The default value is `False`, appending the information to the file.


    The `Quick Profile` button opens the dialog box shown in Figure 5-18. It allows
    you to quickly define the information you need to collect on a given database.
    The Quick Profile Dialog window allows only one table or view per. After you select
    all the information that needs to be computed, the selections are imported to
    the `Profile Requests` list. The Data Profiling task connects to the database
    by using an `ADO.NET` connection. After selecting the connection, you can specify
    the table or view to profile.'
