    description but essentially will depend on your design of the ETL process.


    Parameters and variables are related in that they can be used to pass values between
    packages.


    *Parameters* are external values that can be set prior to the execution of the
    package. *Variables* are internal mechanisms to pass information between packages.
    In prior versions of SQL Server Integration Services, variables served both purposes
    through configurations either by using configuration files to assign values or
    by inheriting values through parent variables. It is important to identify parameters
    because they are accessible to all the packages in a project; this construct becomes
    extremely useful when utilizing the parent-child package design. The parent package
    can automatically detect the parameters defined in the child package as well as
    assign which variables or parameters to pass along to it. Variables can now be
    used for the sole purpose of passing values among packages without modification
    from external processes. When assigning parameters and variables, they are available
    in the same drop-down list along with the system variables. You also have the
    option to write expressions to assign parameter values to variables. Variables
    are passed to a child package by reference rather than by value. Any modification
    made to the value will require a Script task in the child package to propagate
    the change back up to the parent package. There is an alternative to using the
    Script task to modify the 45


