    ## Data Viewer


    The Data Viewer shows the data during runtime. The data is shown buffer by buffer
    as it passes through the connector between two components. There are options on
    how to display the data, the most popular being the grid. The grid displays the
    data in a tabular format with the ability to copy the data to the clipboard for
    later use. The grid appears in a separate window during the Debug mode of Visual
    Studio. Figure 12-33 shows the Data Viewer after a Fuzzy Lookup component.


    *Figure 12-33\. Data Viewer of Fuzzy Lookup output*


    The name of the window helps identify its placement in the package. In this case,
    the Data Viewer is enabled after a Fuzzy Lookup component, and therefore the window’s
    derived name is Fuzzy Lookup Output Data Viewer at DFT_DataViewer. The window
    also contains a green arrow button that informs Visual Studio to proceed with
    the execution of the package and allow the data rows to pass through the connector.
    The Detach button will preserve the window and allow the package to proceed with
    its execution. The Copy Data button will copy highlighted rows and the column
    headers of the dataset to the clipboard. Clicking a particular column header will
    automatically sort the data according to the values in that particular buffer.
    Closing the Data Viewer window will also force the Visual Studio debugger to continue
    the execution of the package.


    ## Data Sampling


    The SSIS Data Flow task has some useful components that assist in viewing random
    data samples during runtime. These components are the Row Sampling and Percentage
    Sampling transformations. These transformations will extract the defined sampling
    of rows from the data stream as it passes through.


    Without a Sort transformation or ORDER BY clause, the data should be in random
    order as it passes through. The sampling transformations will reflect this by
    selecting a random sample set from the data.


    The alternative to the sampling transformations is the TOP N recordset from SQL
    Server. The main difference is that SSIS will attempt a truly random set, whereas
    TOP N will return that number or percentage of records as they are read from disk.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-461_1.jpg)


    ### Row Sampling


    The `Row Sampling transformation` allows you to define the number of rows that
    you would like to extract from the data stream as your sample set. This sample
    set is completely removed from the pipeline. The data is randomly selected unless
    you select a seed. If you specify a seed, you will use it in the random-number
    generation when selecting the rows for your row sample. Figure 12-34 demonstrates
    a Data Flow task utilizing a Row Sampling component.


    *Figure 12-34\. Row Sampling example*


    The destinations for the datasets are recordet destinations. We used object data
    type variables to store each of the outputs. The `Row Sampling transformation`
    was configured to use only 10 rows from the dataset as the sample set. The rest
    of the rows were to be ignored for the sampling exercise. In execution results,
    you can see that the Sampling Selected Output completely removed the rows from
    the original pipeline and created as a separate stream, Sampling Unselected Output.
    In this functionality, the `Row Sampling transformation` works similarly to the
    Conditional Split transformation. The Conditional Split transformation may also
    be used to extract a sample from your dataset by using a condition that will randomly
    change between True and False for certain rows. The main challenge would be defining
    the size of the sample set.


    ### Percentage Sampling


    The `Percentage Sampling transformation` works similarly to the `Row Sampling
    transformation`. Instead of relying on a predefined number of rows, the `Percentage
    Sampling transformation` relies on a required percentage of the dataset to be
    used as the sample set. Figure 12-35 demonstrates a Data Flow task utilizing a
    `Percentage Sampling transformation` to extract a sample dataset.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-462_1.jpg)


    *Figure 12-35\. Percentage Sampling example*


    For this example, we configured the `Percentage Sampling transformation` to select
    25 percent of the rows from the dataset as the sample set. The initial row count
    from the source is 15,088\. The 3,719 rows are approximately 24.64 percent of
    15,088 rows; 25 percent would have been 3,722 rows. The `Percentage Sampling transformation`
    does not provide exact percentage breaks when it comes to sampling the rows, but
    it comes very close. After executing the Data Flow task several times, you will
    realize that the number of records is not always consistent. The number will be
    around the percentage specified but will not necessarily be exact.


    ## Summary


    Data integration projects require a lot of overheard to synchronize the data from
    various systems. SSIS provides various tools to analyze this data so that a well-informed
    plan can be formalized. These tools include the Data Profiling task, Fuzzy search
    transformations, data sampling transformations, and viewers to analyze data that
    traverses your data flow. Using these built-in tools enables you to get a snapshot
    of the data’s state very quickly. The next chapter covers the logging and auditing
    options available to you as you extract, transform, and load your data from various
    systems into potentially different systems.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Logging and Auditing


    > *Uncontrolled access to data, with no audit trail of activity and no oversight
    would be going too far.*

    >

    > —US Naval Officer John Poindexter


    A couple of key advantages provided by enterprise systems, which are often overlooked
    until the auditors start poking around, are process logging, auditing, and data
    lineage. The concepts are simple: when you move data from system to system and
    manipulate it along the way, you might need to keep track of where it came from,
    maintain summary information about data processing, and know which processes touched
    that data along the way. There are a few reasons for keeping track of this additional
    information:


    - You may need to keep it for troubleshooting purposes, to trace data issues backward
    through your processes to their source.

    - The legal department may have mandated a new legal requirement to document every
    step of processing in real-time in the event of issues.

    - Your business may fall under a regulation such as Sarbanes-Oxley Act (`SOX`),
    or Health Insurance Portability and Accountability Act (`HIPAA`), that requires
    high levels of security and controls around confidential medical or consumer data.


    SSIS provides extensive standard logging functionality that captures runtime information
    about the status of ETL processing. In addition, it is relatively simple to add
    auditing capabilities to your enterprise ETL applications with SSIS. In this chapter,
    you’ll look at ways to take advantage of standard logging and ways to add auditing
    to your SSIS packages.


    ## Logging


    SSIS provides built-in `logging` capabilities that are easy to enable. In previous
    chapters, we’ve enabled this feature in some code samples to demonstrate SSIS’s
    logging capabilities. In this section, we’ll review how to enable and configure
    logging in your SSIS packages. We’ll also talk about SSIS logging best practices.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-464_1.jpg)


    ### Enabling Logging


    Logging options in SSIS are accessed at the package level by right-clicking on
    the control flow and choosing the Logging option from the pop-up context menu,
    as shown in Figure 13-1.


    *Figure 13-1\. Selecting the Logging option from the pop-up menu*


    The logging configuration screen allows you to configure SSIS logging options,
    as shown in Figure 13-2\. In this screen, you can set the following logging options:'
