    ## CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    *Figure 9-4. `Parameters` designer window*


    `Project parameters` are available to all the packages included in the project.
    Adding project parameters creates a file in the solution that allows you to view
    all the parameters that exist at the project level. Visual Studio has a designer
    window specifically for project parameters, shown in Figure 9-5.


    *Figure 9-5. Project-level parameters*


    Following are descriptions of the various parameters:


    - `Name` specifies the name of the project parameter.

    - `Data Type` specifies the data type of the parameter.

    - `Value` provides a default value for the parameter.

    - `Sensitive` specifies whether the data contained within the parameter is sensitive.
    This is so that sensitive data may be encrypted, not saved or left as is depending
    of the level of security behind the project. This field may come in handy if username
    and password information is contained within the parameter.

    - `Required` specifies that this parameter must be provided during the execution
    of the package, after it has been deployed to a server.

    - `Description` provides a short synopsis of the parameter.


    The parameters are not limited to just modifying package properties. They can
    be accessed in the `Expression Builder` just like the rest of the variables. This
    allows you to access strings or integer values set at the project level without
    having to worry about keeping multiple package variables in sync, as was the case
    in older versions. With this ability, configuration files will no longer be required
    to maintain variable values across multiple packages.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    ### SSIS Data Types


    As with most programming languages, SSIS variables also require data types. For
    the most part, these data types match up with SQL Server data types. When extracting
    data from SQL Server, each column is recognized as one of these data types. The
    `Data Conversion` task will use these data types to convert data types from other
    sources so that the data can seamlessly map into a SQL Server database.


    Table 9-1 shows the data types that SSIS uses. We included a column that shows
    the `Type Cast` function that can be used in expressions to convert a value. You
    can use the functions in expressions in the following manner: `(<<type cast function>>
    [, <<param1>>, <<param2>>, … ]) (<<expression>>)`.


    The parentheses around the expression are not required, but will make it easier
    to determine what is being type casted.


    *Table 9-1. SSIS Data Types*


    | **Data Type** | **Description** | **Domain/Size** | **Type Cast Function** |

    | :--- | :--- | :--- | :--- |

    | `DT_BOOL` | Boolean value. | True/False. | `(DT_BOOL)` |

    | `DT_BYTES` | Binary data value. | Binary data with a maximum size of 8,000 bytes.
    | `(DT_BYTES, «length»)` |

    | `DT_CY` | Currency value. | 8-byte signed integer with precision and scale of
    (19,4) | `(DT_CY)` |

    | `DT_DATE` | Date data type that supports YYYY/MM/DD HH:MM:SS. Provided by floating-point
    number whose whole-number portion represents the date and whose fractional portion
    represents the timestamp. | 0001/01/01 00:00:00–9999/12/31 23:59:59. | `(DT_DBDATE)`
    |

    | `DT_DBDATE` | Date data type that supports YYYY/MM/DD. | 0001/01/01–9999/12/31.
    | `(DT_DBDATE)` |

    | `DT_DBTIME` | Time data type that supports hh:mm:ss. | 00:00:00–23:59:59. |
    `(DT_DBTIME)` |

    | `DT_DBTIME2` | Time data type that supports hh:mm:ss[.fffffff]. | 00:00:00.0000000–23:59:59.9999999.
    | `(DT_DBTIME2, «scale»)` |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    | **Data Type** | **Description** | **Domain/Size** | **Type Cast Function** |

    | :--- | :--- | :--- | :--- |

    | `DT_DBTIMESTAMP` | Date data type that... | 1753/01/01 | `(DT_DBTIMESTAMP)`
