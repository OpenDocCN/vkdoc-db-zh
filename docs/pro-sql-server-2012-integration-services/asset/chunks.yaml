    Some key points to highlight when looking through the XML of an extremely simple
    source component includethe simplicity of the package in comparison to that of
    prior versions of SSIS, and some changes in how the objects are now tracked by
    the package. One of the key reasons for the readability improvement of the XML
    is that some default settings are not generated. If, for example, the IsSorted
    property of a source component is left at the default value of False, as was done
    in Listing 2-2, no extra XMLwill be generated to store that metadata. In prior
    versions of SSIS, all the gritty details are stored in the XML of a package. The
    following list highlights some of the more important properties: *refId* indicates
    the path to the object within the package. This property uniquely identifies the
    component within the package.


    SqlCommand is a property that usually contains the exact query that will execute
    against the RBDMS.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2  BIDS AND SSMS


    Connections contains all the connection information stored within the package


    for the data source component. It is possible to save login credentials for the
    package, but it is not recommended. Even the connection managers have


    refId.


    Output Columns the metadata about the output of the package is important to


    make sure that the data is inserted properly. If there is a failure simply with
    converting the data into something SQL Server can process, the package can be


    set to fail as a result.


    Another change that is noticeable just by looking at the XML is the way the lineageId
    is tracked in the XML. A lineageId is used by SSIS to track all columns within
    data flows, including the error columns that get added to the pipeline by components.
    Instead of hard-coding an integer value as was done in previous versions, SSIS
    now uses the names of the objects to essentially create a path to an object, and
    because objects have to have unique names within SSIS, the path itself creates
    the unique identifier for the columns.Another great improvement in the readability
    of the XML was made by replacing the &lt; and &gt; entity encodings with their
    appropriate special characters.


    A new addition to the XML of the package is a section called CDATA, which captures
    the visual layout of the components in a package. Listing 2-3 demonstrates this
    section of the package code. It captures not only the size and location coordinates
    of the package, but also the shape of the data flow path between data flow components
    and the precedence constraints in the control flow. This metadata is noncritical
    to the package itself and will be regenerated if corrupt or missing when the package
    is opened in Visual Studio.


