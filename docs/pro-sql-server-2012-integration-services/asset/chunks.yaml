    **C H A P T E R 17**


    **Dimensional Data ETL**


    *We are not in the eighth dimension; we are over New Jersey. Hope is not lost.*


    — *Adventurer Buckaroo Banzai*


    In the first decade of the 21st century, the terms *data warehouse* and *data
    mart* were suddenly—and without warning—copied and pasted all over every database
    professional’s résumé. Despite the apparent increased awareness in the professional
    community, the core components of these structures, dimension and fact tables,
    remained misunderstood. In this chapter, you’ll look at ways to load data efficiently
    into your dimensional structures. You’ll begin with an introduction to the terminology
    and concepts used throughout this chapter.


    Introducing Dimensional Data


    By now, most database professionals have had some level of exposure to *dimensional
    data*. For those who don’t use it every day, this term can be a bit misleading.
    It doesn’t really refer to any special properties of the data itself, but rather
    to the *dimensional model* used to store it. Specifically, dimensional data is
    stored in *dimensional data marts*. Data marts are relational databases that adhere
    to one of two logical structures: the *star schema* or the *snowflake schema*.
    Both of these logical structures consist of two types of tables:


    Fact tables contain business measure data, such as sales quantities and dollar


    amounts.


    Dimension tables hold attributes related to the measures stored in the fact


    tables, such as product colors and customer names.


    A star schema features a fact table (or possibly multiple fact tables) related
    to denormalized dimension tables. Figure 17-1 shows a logical design for a sample
    star schema that holds sales receipt data for a retail store.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-540_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    *Figure 17-1\. Star schema data mart*


    In a star schema, the dimensions are “flattened out” into denormalized tables.
    The snowflake schema is a logical structure similar to the star schema, but features
    normalized, or *snowflaked*, dimensions. Figure 17-2 features snowflaking of the
    Time and Geography dimensions from the previous star schema.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-541_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    *Figure 17-2\. Data mart with snowflaked dimensions*


    Because of performance and complexity star schemas are more, but are not always
    possible to model an OLAP database in such a structure.'
