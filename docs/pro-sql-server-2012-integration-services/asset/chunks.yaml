    ## 条件拆分


    “条件拆分”转换可让你将满足特定条件的数据行重定向到不同的输出。你可以将此功能用作引导数据沿不同处理路径流动的工具，非常类似于过程编程语言（如 C#或 VB）中的
    if...then...else 结构；或者将其用作过滤器，从数据集中排除数据，类似于 SQL WHERE 子句。我们扩展了前面的示例，以过滤掉任何在常规赛季期间没有发生的比赛，如图
    8-59 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-310_1.jpg)


    *图 8-59. 在数据流中添加条件拆分转换*


    “条件拆分转换编辑器”让你能够控制为此转换添加任意数量的输出。每个输出都根据你为其提供的条件重定向行。条件以 SSIS 表达式语言表达式的形式编写。通常，你会在条件中使用变量或列，以使你的数据具有自导向性。在此示例中，我们向转换添加了一个名为“常规赛季比赛”的输出。我们应用到此输出的条件是`[GameWeek]
    == “Regular Season”`，请参考下面的图 8-60。我们将在第 9 章讨论 SSIS 表达式语言。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-311_1.jpg)


    *图 8-60. 编辑条件拆分转换*


    当`GameWeek`列包含值`Regular Season`时，数据被重定向到“常规赛季比赛”输出。请注意，SSIS 表达式语言中的字符串比较区分大小写。任何不符合此条件的行都被定向到默认输出，在此示例中，我们将其命名为“季后比赛”。


    **提示：** 当你定义多个带条件的输出时，它们会按照“顺序”字段指示的顺序进行评估。一旦某行匹配了给定条件，它会立即被重定向到相应的输出，不会与后续条件进行比较。


    当你将条件拆分转换的输出连接到另一个数据流组件的输入时，将显示一个“输入输出选择”框。选择你想要发送到下一个组件的输出，如图 8-61 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-312_1.jpg)

    ![](img/index-312_2.jpg)


    *图 8-61. 连接条件拆分转换时的输入输出选择*


    在此案例中，我们没有将“季后比赛”输出连接到任何下游组件，这意味着定向到它的行不会被发送到数据流中。这实际上是对输入数据进行过滤。


    ## 多播


    “多播”转换在数据流中复制你的数据，这在很多情况下非常有用，例如当你想要对相同源数据并行应用不同的转换时，或者当你想要同时将数据发送到多个目标时。基于前面的示例，我们只是在数据流中的
    OLE DB 目标之前添加了一个多播转换。


    我们将使用多播转换将转换后的数据发送到两个目标：OLE DB 目标和一个平面文件目标，如图 8-62 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-313_1.jpg)


    *图 8-62. 多播转换将数据发送到多个目标*


    你可以使用多播转换根据需要多次复制数据，尽管它最常用于创建其输入数据的一个副本。


    ## Union All


    “Union All”转换将两个或更多数据集的行合并到单个数据集中，类似于 SQL 中的`UNION ALL`运算符。对于此示例，我们获取了两个包含每日天气数据的平面文件，并在数据流中将它们合并为一个数据集，如图
    8-63 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-314_1.jpg)


    *图 8-63. 使用 Union All 转换合并来自两个源文件的数据*


    当你将第一个输入添加到 Union All 转换时，它定义了输出数据集的结构。当你将第二个及后续输入连接到 Union All 转换时，它们会根据匹配的列名逐列对齐。你可以通过双击
    Union All 转换来显示编辑器，从而查看所有输入的列，如图 8-64 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-314_1.jpg)


    *图 8-64. Union All 转换编辑器*

