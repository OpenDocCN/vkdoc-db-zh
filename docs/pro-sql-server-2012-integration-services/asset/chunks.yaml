    \ It contains a parameterized query that is shown in Listing 16-5. The `Foreach\
    \ Loop` container, `FELC_PackageExecution`, loops through the data set that is\
    \ returned by the `Execute SQL` task. The `Execute Package` task simply executes\
    \ as the loop iterates through the table.\n\n## SQL_GetPackageList query\n\n```sql\n\
    SELECT pe.Package,\n       pe.PackagePath+'\\'+pe.Package+'.dtsx',\n       pe.ExecuteOrder,\n\
    \       pe.DisablePackage\nFROM   dbo.CH16_Apress_PackageExecution pe\nWHERE \
    \ pe.ParentPackage = ?\nORDER BY pe.ExecuteOrder;\n```\n\nThe `ORDER BY` clause\
    \ is absolutely crucial for this process. It will ensure that the packages are\
    \ executed in the proper order. Without it, there is no guarantee that they will.\
    \ Figure 16-6 shows the parameter mapping configuration of the `Execute SQL` task.\
    \ Note that the data type and parameter name need to match the query supplied."
