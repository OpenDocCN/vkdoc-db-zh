    sent to the `People Table` destination, and one row to the `Errors` flat file
    destination. Instead of the `Data Flow` task failing due to a truncation error
    of a single row, the task completes and the row is still available for later processing
    in the flat file destination.


    Although this error cannot be processed from within the `Data Flow` task, the
    fact that the redirected row contains not only the original data, but also the
    error code and error column in the flat file destination does provide a means
    of dynamic handling outside of the `Data Flow` task.


    The ability to dynamically handle data flow errors can still be implemented, although
    outside of the `Data Flow` task, by incorporating various package components.
    Adding a package-level variable and using a `Row Count` transformation between
    the `Convert LastName` data transformation and the `Error Count` Data source in
    the `Data Flow` task provides the capability of utilizing a `Script` task to later
    evaluate the error flat file. Figure 18-10 displays the tasks within the `Data
    Flow` task. Figure 18-11 illustrates the control flow pane with the precedent
    constraint using an expression to evaluate whether the variable, `Error`, is greater
    than 0.


