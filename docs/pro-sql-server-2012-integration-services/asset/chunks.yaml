    ## CHAPTER 5 CONTROL FLOW BASICS


    **NOTE:** Because the control flow represents the package itself, the package
    properties are available by right-clicking on the control flow designer background.
    Each of the components within the control flow has its own set of properties distinct
    to itself, but the control flow’s properties are the package properties.


    ### SSIS Toolbox for Control Flow


    The components for the control flow are contained within a collapsible/closable
    window in Visual Studio known as the `SSIS Toolbox`. This window gives you access
    to all the components available for the control flow. We should note that this
    window is context specific, so when you are using the different designer windows,
    it will show tools available for that designer. The different components are categorized
    in the groups shown in Figure 5-1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-110_1.jpg)


    *Figure 5-1. Control flow SSIS Toolbox*


    These groupings, which allow you to organize your `SSIS Toolbox` in a way that
    will give you quick access to the components you use most frequently, are as follows:


    *   **Favorites** represents the most frequently used components. This category
    organizes the components in an easy-to-find place at the top of the `SSIS Toolbox`.
    By default, the `Data Flow` task and the `Execute SQL` task are placed in this
    category.

    *   **Common** organizes the commonly used components utilized in SSIS development.
    These components are useful for the non-ETL aspects of the ETL process. These
    components allow you to manipulate the source or destination of the data so that
    it can be extracted or loaded more easily.

    *   **Containers** groups together the different task containers. These containers
    execute tasks as defined by precedence constraints.

    *   **Other Tasks** holds the tasks that are not usually used. These tasks are
    related more to database administration and nonfunctional requirements than they
    are to ETL.


    Your customizations to the `SSIS Toolbox` will carry forward for all projects
    and can be modified at any time. If you want to revert to the default setup, you
    can right-click and select the `Restore Toolbox Defaults` option. One of the key
    features that makes the `SSIS Toolbox` effective in development is the unique
    icon for each of the components. The icons represent the purpose of each task
    in a meaningful way. These icons also appear on the component itself after it
    has been placed in the control flow.


    **NOTE:** In prior versions of BIDS, the name of the window pane was *Toolbox*.
    With SQL Server Integration Services 12, the name has changed to `SSIS Toolbox`.
    If you create your own custom component for the control flow, you have to add
    it to the assembly folder of the machine as well as the appropriate components
    folder for the SQL Server Installation. Chapter 21 covers custom components further.


    The `SSIS Toolbox` contains many components that assist with ETL requirements.
    In this book, we are dividing the list into basic and advanced components. This
    chapter covers the basic tasks that will likely be part of most solutions you
    design. Some of these tasks will have their own chapters, so we will not describe
    them in full detail in this chapter.


    ### Favorite Tasks


    The default list of tasks in the `Favorites` group is the `Execute SQL` task and
    the `Data Flow` task. You can modify this group to include tasks that you use
    frequently. This section details the default listing. This group is conveniently
    shown at the very top of the `SSIS Toolbox` for the control flow.


    #### Data Flow Task


    The `Data Flow` task can be described as the heart and soul of the ETL process.
    This executable contains components that extract data from the disparate sources,
    transformational components that can clean and modify the data inside the data
    stream, and destination components where the data can be committed. The data stream
    within SSIS is known as the pipeline. The `Data Flow` task has its own designer
    window so that you can customize the process as much as you need. We discuss the
    `Data Flow` task and all of its components further in Chapters 7 and 8. Figure
    5-2 shows the executable as it will appear when added to the control flow.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-112_1.jpg)


    *Figure 5-2. Data Flow task*


    The icon of this executable shows two cylinders with a green arrow pointing from
    one to the other. The first cylinder represents the source of the data, the green
    arrow represents the transformations, and the second cylinder represents the destination
    of the data. The icon may suggest that data can originate from one source, but
    the `Data Flow` task can extract data from multiple sources concurrently. Likewise,
    it supports outputting the data to multiple destinations simultaneously.


    This component is covered in much greater detail in later chapters, as mentioned
    earlier. Some of its properties include the following:


    *   `DelayValidation` delays the validation of the metadata until runtime.

    *   `Disable` prevents the execution of the `Data Flow` task during runtime.

    *   `MaximumErrorCount` defines the number of errors the `Data Flow` task can
    tolerate.

    *   `Description` provides a short description of the `Data Flow` task.

    *   `Name` shows the distinct name of the `Data Flow` task.

    *   `DefaultBufferMaxRows` defines the maximum number of rows that a buffer can
    hold. This property goes hand in hand with the `DefaultBufferSize` property. Together
    they can solve some of the issues with a poorly performing `Data Flow` task.

    *   `DefaultBufferSize` defines the size in bytes of a buffer in the `Data Flow`
    task. Certain transformations within a `Data Flow` task create copies of existing
    buffers. This is covered in greater detail in Chapters 7 and 8.

    *   `RunInOptimizedMode` optimizes the data flow path by not allocating space
    for unused columns. Even though this property may be set to `True`, it will still
    give warnings about removing the columns from the Data Flow path.

    *   `TransactionOption` allows you to define whether the executable supports transactions.
    If the executable is called by a parent and transactions are enabled, the executable
    will be a part of the parent transaction. Mostly for performance reasons, we recommend
    that you leave this option set to the default.


    #### Execute SQL Task


    The `Execute SQL` task allows you to run SQL statements or execute stored procedures
    against an RDBMS by using various connection managers. The connection managers
    that the `Execute SQL` task can utilize are the `Excel Connection Manager`, `OLE
    DB Connection Manager`, `ODBC Connection Manager`, `ADO Connection Manager`, `ADO.NET
    Connection Manager`, and `SQL Server Compact Edition Connection Manager`. Figure
    5-3 shows the executable as it appears in the control flow. The icon shows a cylinder
    with a scroll overlapping its bottom right. The cylinder represents a database
    system, while the scroll represents scripts. In this particular case, the script
    is a SQL script.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-113_1.jpg)

    ![](index-113_2.jpg)


    *Figure 5-3. Execute SQL task*


    ### Execute SQL Task Editor—General Page'
