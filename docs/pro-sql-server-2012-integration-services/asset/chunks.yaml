- fmt: "# CHAPTER 10 - SCRIPTING\n\n## SCRIPT TASK EVENTS\n\nThe Script task supports\
    \ several event and logging options via the `Dts` object. Astute .NET developers\
    \ might have noticed we used the `Dts.Events.FireError()` method in the catch\
    \ part of the try-catch block instead of the usual `throw` statement to rethrow\
    \ the exception. The call looks like the following:\n\n```\nDts.Events.FireError(-1,\
    \ \"SCT - Get File Information\", ex.ToString(), \"\", 0);\n```\n\nThe parameters\
    \ are as follows:\n\n- The first parameter is an `int` named `errorCode`. This\
    \ is a user-defined identifier for the error.\n- Next is a `string` named `subComponent`.\
    \ This is normally set to the name of the Script task for reference when the `OnError`\
    \ event is logged.\n- Then we have a `string` named `description` that contains\
    \ the error description. If you use the `ToString()` method of the exception,\
    \ you’ll capture the exception information and inner exception stack in the description.\n\
    - The fourth and fifth parameters are a `string` named `helpFile` and an `int`\
    \ named `helpContext`. These represent the path to a help file and the identifier\
    \ for a topic within that file, if you have one. In our case, we set these to\
    \ an empty string and 0, respectively, because we don’t have a supporting help\
    \ file.\n\nWe also don’t assign a `Failure` value to the `Dts.TaskResult` property\
    \ of the component. There are a couple of reasons for this. First, when you use\
    \ the `FireError()` method, SSIS respects the `MaximumErrorCount` properties of\
    \ the Script task and the package. Setting `Dts.TaskResult` or using a `throw`\
    \ statement does not respect the `MaximumErrorCount` and causes the Script task\
    \ to stop immediately. `FireError()` actually fires the `OnError` event, which\
    \ means SSIS will handle logging for you, if you have logging turned on for your\
    \ package and are capturing the `OnError` event.\n\nIn addition to `FireError()`,\
    \ SSIS exposes methods to fire other events as well:\n\n- `FireWarning()` fires\
    \ an `OnWarning` event to log warning messages. Warning messages generally indicate\
    \ a potential issue, but are not as severe as error messages.\n- `FireInformation()`\
    \ fires an `OnInformation` event that logs informational messages. Informational\
    \ messages are generally softer than warning messages, in that they don’t imply\
    \ a problem or potential issue.\n- `FireProgress()` fires an `OnProgress` event\
    \ that logs progress messages. `OnProgress` events are fired when “measurable\
    \ progress” is made within a component. In a nutshell, this means `OnProgress`\
    \ events are fired for completion percentages.\n- `FireQueryCancel()` fires an\
    \ `OnQueryCancel` event, which checks whether the task should stop running. The\
    \ method returns a `bool` result: `true` means the task should stop running, and\
    \ `false` means to keep going.\n- `FireCustomEvent()` fires a custom event.\n\n\
    The Script task `Dts.Log()` method lets you write messages directly to the SSIS\
    \ log without the overhead of invoking an event. Normally you’ll want to use the\
    \ preceding event-driven methods to log information as they respect the package\
    \ and task settings such as `MaximumErrorCount`.\n\n## 示例：使用脚本任务获取文件信息\n\n// Fire\
    \ an OnInformation event that we’re starting\n```\nDts.Events.FireInformation(-1,\
    \ TaskName, \"Starting\", \"\", 0, ref b);\n```\n\n// Define our output data table\n\
    ```\nDataTable dt = new DataTable();\ndt.Columns.Add(\"Filename\", typeof(string));\n\
    dt.Columns.Add(\"Extension\", typeof(string));\ndt.Columns.Add(\"Filepath\", typeof(string));\n\
    dt.Columns.Add(\"CreatedDate\", typeof(DateTime));\ndt.Columns.Add(\"ModifiedDate\"\
    , typeof(DateTime));\ndt.Columns.Add(\"IsReadOnly\", typeof(Boolean));\n```\n\n\
    // Get the file info and add it to the data table\n```\nstring path = Dts.Variables[\"\
    User::Path\"].Value.ToString();\nDirectoryInfo di = new DirectoryInfo(path);\n\
    FileInfo[] fi = di.GetFiles(\"*.*\", SearchOption.AllDirectories);\nforeach (FileInfo\
    \ f in fi)\n{\n    dt.Rows.Add(new object[] { f.Name, f.Extension, f.DirectoryName,\
    \ f.CreationTime, f.LastWriteTime, f.IsReadOnly });\n}\n```\n\n// Output the data\
    \ table\n```\nDts.Variables[\"User::Files\"].Value = dt;\n}\ncatch (Exception\
    \ ex)\n{\n// If an error occurs fire an OnError event\nDts.Events.FireError(-1,\
    \ TaskName, ex.ToString(), \"\", 0);\n}\nfinally\n{\n// Fire a final OnInformation\
    \ event that we’re finished\nDts.Events.FireInformation(-1, TaskName, \"Finished\"\
    , \"\", 0, ref b);\n}\n```\n\n> **TIP:** It’s a good idea to use try-catch blocks\
    \ in any .NET code that accesses external resources (such as the file system in\
    \ this case). If the external resource is not accessible, you may need to set\
    \ the `TaskResult` to the `Failure` value or perform other cleanup tasks before\
    \ returning from the script.\n\n## 使用文件元数据\n\nAfter we populate the SSIS object\
    \ variable with the list of files in `DataTable` format, we need to use those\
    \ results. For this task, we pass the `User::Files` variable in to a Foreach loop\
    \ container in Foreach ADO Enumerator mode. This mode lets you iterate the rows\
    \ in an ADO.NET `DataTable` or `DataSet` or an ADO `Recordset`. We configured\
    \ the Collection tab of the Foreach Loop Editor to iterate the rows in the first\
    \ table and set the ADO object source variable to `User::Files`, as shown in Figure\
    \ 10-10.\n\n*Figure 10-10\\. Configuring the Foreach loop container to iterate\
    \ rows in a .NET DataTable*\n\nWe finished configuring the Foreach loop container\
    \ by setting the options on the Variable Mappings page of the editor, as shown\
    \ in Figure 10-11\\. This page has two columns named Variable and Index. The Index\
    \ column holds the zero-based indexes of the columns in your `DataTable`; the\
    \ Variable column holds the variables these columns are mapped to. On each iteration\
    \ of the loop, the variables listed will be populated with the values from the\
    \ columns they are mapped to for each row in the `DataTable`.\n\n*Figure 10-11\\\
    . Mapping the DataTable columns to SSIS variables in the Foreach loop container*\n\
    \nWe put a second Script task inside the Foreach loop container and passed it\
    \ the variables we populate on each loop, as shown in Figure 10-12\\. All we need\
    \ to do is read the values of these variables, so we passed them in as read-only\
    \ variables.\n\n*Figure 10-12\\. Configuring the read-only variables in the inside\
    \ Script task*\n\nThe script for this Script task is simple, as you can see here:\n\
    \n```\npublic void Main()\n{\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
    \    MessageBox.Show(String.Format(\"{0}, {1}, {2}, {3}, {4}, {5}\",\n       \
    \ Dts.Variables[\"User::Filename\"].Value.ToString(),\n        Dts.Variables[\"\
    User::Extension\"].Value.ToString(),\n        Dts.Variables[\"User::Filepath\"\
    ].Value.ToString(),\n        Dts.Variables[\"User::CreatedDate\"].Value.ToString(),\n\
    \        Dts.Variables[\"User::ModifiedDate\"].Value.ToString(),\n        Dts.Variables[\"\
    User::IsReadOnly\"].Value.ToString()));\n}\n```\n\nThis script simply takes the\
    \ values of the read-only variables passed in and displays them in a Windows message\
    \ box. The result, as you can see in Figure 10-13, is a pop-up message box displaying\
    \ the metadata for each file on each iteration.\n\n*Figure 10-13\\. Displaying\
    \ file metadata on each loop iteration*\n\nFor this example, we simplified the\
    \ result, simply displaying the file metadata in pop-up message boxes, but in\
    \ a real application, you might use this metadata to back up, delete, or choose\
    \ files to process based on some specific criteria. The important point here is\
    \ that the first Script task retrieves the data and makes it accessible to the\
    \ second Script task via variables set by the Foreach loop container."
