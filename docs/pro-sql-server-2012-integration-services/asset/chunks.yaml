  trans: "\n# 第三章  你好世界——你的第一个 SSIS 2012 包\n\n由于透视键结合了两个值——年份和统计名称，我们利用一个派生列将数据拆分成两列。图\
    \ 3-29 展示了我们如何拆分该列。我们基于存储在 `YearAndStatisticName` 列中的数据添加了两列。我们使用以下表达式分别生成 `Year`\
    \ 列和 `StatisticName` 列：\n\n`LEFT(YearAndStatisticName,4)` 和 `SUBSTRING(YearAndStatisticName,6,LEN(YearAndStatisticName))`。\n\
    \n因为我们知道该列值的前四个字符必须是年份，所以可以使用 `LEFT()` 字符串函数提取年份并将其存储到名为 `Year` 的新列中。对于统计名称，我们需要使用除了前五个字符之外的整个字符串。`SUBSTRING()`\
    \ 字符串函数允许我们定义字符串的起始和结束位置。第六个位置是下划线后的第一个字符，而我们想要获取字符串的剩余部分，因此使用 `LEN()` 字符串函数来定义字符串最后一个字符的位置。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-82_1.jpg)\n\
    \n## 图 3-29. DER_SplitYearAndStatistics\n\n将原始列拆分为更细粒度的数据后，我们可以将这些数据插入到具有清单 3-3\
    \ 所定义结构的表中。我们利用 `OLE DB 目标组件` 的功能，根据输入生成了建表脚本。由于不再需要，我们从建表脚本中移除了 `YearAndStatisticName`\
    \ 列。在 `OLE DB 目标组件` 的映射中，我们忽略了 `YearAndStatisticName` 列。派生列的数据类型是 Unicode，但源自平面文件的列保持其代码页。\n\
    \n## 清单 3-3. 人口普查数据的建表脚本\n\n```sql\nCREATE TABLE dbo.CensusStatistics\n(\n   \
    \ [STATE_OR_REGION] varchar(50),\n    [Year] nvarchar(4),\n    [StatisticName]\
    \ nvarchar(250),\n    [Statistic] varchar(50)\n);\nGO\n```\n\n执行结果如图 3-30 所示。正如我们之前讨论的，`Unpivot\
    \ 运算符` 的输出行数直接关系到被忽略列的唯一记录数与取消透视的列数。`合并连接` 还从左侧输入流中省略了两条记录，因为它们不包含在分配数据集中。哥伦比亚特区和波多黎各的数据不包含在分配数据中，因为这两个地区在美国国会中没有代表。因为我们执行的是内连接，所以只允许两组数据共有的数据继续沿管道向下流动。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-83_1.jpg)\n\
    \n## 图 3-30. RealWorld.dtsx 执行结果\n\n清单 3-4 中的查询向我们展示了以这种方式转换数据的好处。如果没有 `Unpivot\
    \ 组件`，我们就必须在 `SELECT` 子句中包含所有需要的列。使用这个组件，我们只需定义适当的 `WHERE` 子句即可只查看我们需要的数据。反规范化形式使我们能够包含更多的统计项和更多的年份，而无需担心修改表结构以容纳新列。\n\
    \n## 清单 3-4. 反规范化数据的查询\n\n```sql\nSELECT cs.STATE_OR_REGION,\n       cs.Year,\n\
    \       cs.StatisticName,\n       cs.Statistic\nFROM dbo.CensusStatistics cs\n\
    WHERE cs.Year = '2010'\n  AND cs.STATE_OR_REGION = 'New York';\n```\n\n清单 3-4\
    \ 中的查询向我们展示了 2010 年纽约州的所有统计数据。如果没有进行反规范化，我们将不得不包含六列来说明年份和不同的统计项。如果我们想查看自数据收集开始以来纽约州的所有数据，我们将不得不包含\
    \ 66 列，而不是简单地省略限制年份的 `WHERE` 子句。\n\n## 总结\n"
- fmt: '# Chapter 4: Connection Managers


    SSIS 12 enables you to extract data from a variety of sources and load them into
    a variety of destinations.


    In this chapter, we introduced you to a simple package that extracted the data
    and loaded it without any transformations. This demonstrated the simplest ETL
    task that an SSIS 12 package can perform. We then upped the ante and introduced
    you to a slightly more complex package that transformed the data as it was being
    extracted. This package demonstrated some of the demands of the real world on
    ETL processes. We walked you through the process of adding the executables and
    the components to the package designers. In the next chapter, we will show you
    all the connection managers available to you in SSIS 12.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    > *Eventually everything connects—people, ideas, objects.*

    >

    > *The quality of the connections is the key to quality per se.*

    >

    > -American designer Charles Eames


    SSIS uses `connection managers` to encapsulate, manage, and abstract away physical
    data stores.


    Connection managers allow you to read from, and write to, nearly any data store
    for which you have drivers and access. You can use connection managers to pull
    data from flat files, databases, or Excel spreadsheets and push data to databases,
    custom file formats, or web sites, for instance. In this chapter, you’ll start
    by looking at some of the most commonly used connection managers and move on to
    the more advanced, and less commonly used, connection managers SSIS supports.
    Some of the infrequently used connection managers can be used to connect to web
    servers, FTP servers, and even Windows events, to name a few examples.


    ## Commonly Used Connection Managers


    SSIS first introduced the concept of connection managers as a means of encapsulating
    and managing connection information for nearly any type of data store, provided
    of course that you have adequate drivers for your data store. You can create connection
    managers that define connections to fixed-width and delimited flat files, binary
    files, Excel spreadsheets, web sites, and SQL Server Analysis Services cubes,
    among others. You can also connect to a wide variety of database servers including
    SQL Server, Oracle, Teradata, DB2, MySQL, and any other database management system
    (`DBMS`) for which you can find Open Database Connectivity, `ODBC`, or `OLE DB`
    drivers. Each connection manager can be used by multiple tasks as well as data
    sources and destinations. After you create a connection manager, regardless of
    the creation method, they are all centrally located at the bottom of the `Control
    Flow` and `Data Flow` designer windows in the `Connection Managers` pane. This
    section introduces some of the most commonly used connection managers.


    > **NOTE:** For some `DBMS`s, such as Oracle, Teradata, and MySQL, you’ll need
    to download and install appropriate `ODBC` or `OLE DB` drivers from the `DBMS`
    vendor or a third-party vendor on your development machines and servers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Connection Managers section of the BIDS designer window, with pop-up context
    menu](index-86_1.jpg)


    The `Connection Managers` section of the `BIDS` designer is always at the bottom
    of the `Control Flow` and `Data Flow` designer windows. In this section, you can
    see all of the connection managers that are available to your SSIS package. You
    can also create new connection managers by right-clicking in this section, as
    shown in Figure 4-1.


    *Figure 4-1. Connection Managers section of the BIDS designer window, with pop-up
    context menu* The pop-up context menu of the `Connection Managers` section is
    accessed by right-clicking in the area. The context menu has options for creating
    commonly used connection managers, including `OLE DB` connections to databases,
    flat file connections to delimited and fixed-width files, `ADO.NET` managed database
    connections, and others. Selecting the `New Connection` option shows the complete
    list of connection managers supported by SSIS, as shown in Figure 4-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Add SSIS Connection Manager dialog box listing all available connection managers](index-87_1.jpg)


    *Figure 4-2. Add SSIS Connection Manager dialog box listing all available connection
    managers* The following sections describe the connection managers and the connectivity
    functionality they provide. The `Type` of the connection manager may not clearly
    describe the connectivity capabilities. To get a much clearer description, refer
    to the `Description` column of the `Add SSIS Connection Manager`. In the following
    sections, the connection managers are categorized by type because that is how
    they will be referred to by Visual Studio and the debugger.


    ## OLE DB Connection Managers


    `OLE DB` stands for `Object Linking and Embedding, Database`. It is essentially
    an API based on the Component Object Model (`COM`), providing support for a wide
    variety of data sources. `OLE DB` was designed as a successor to the older `Open
    Database Connectivity` (`ODBC`). `OLEDB` is a component-based specification that
    supports connections to relational and nonrelational data sources. Using `OLE
    DB`, you can connect to databases such as SQL Server and Oracle, Microsoft Access
    databases, e-mail servers, file systems, hierarchical databases, and more.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Generally speaking, `OLE DB` providers for relational databases come in two flavors:
    native and `OLE DB for ODBC` versions. The native `OLE DB` providers are faster
    than the `OLE DB for ODBC` versions, because they communicate with the low-level
    database APIs directly for maximum performance. The `OLEDB for ODBC` providers
    are `OLE DB` providers that sit on top of `ODBC`, so there’s another layer of
    abstraction between `OLE DB` and the database. The performance with these types
    of providers is usually not quite as good as with native `OLE DB` providers.


    > **NOTE:** Some people spell `OLE DB` as `OLEDB`, and still others use `OLE-DB`.
    As you can tell by looking at the images in this section, Microsoft chooses to
    use multiple spellings. Any of these are considered correct. We’ll stick with
    `OLE DB` throughout this book.


    When you create a new `OLE DB Connection Manager`, you will choose an `OLE DB`
    provider from the list at the top of the dialog box shown in Figure 4-3.


    *Figure 4-3. Selecting a provider in the OLE DB Connection Manager dialog box*
    Like us, you may find yourself choosing the `Microsoft OLE DB Provider for SQL
    Server` more often than any of the other providers, but when you need to connect
    to an Access database (`Jet OLE DB` provider), an Oracle RDBMS server, or even
    `Microsoft Directory Services`, SSIS can do that too.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### OLE DB vs. ODBC


    We mentioned previously that native `OLE DB` providers tend to be faster than
    `ODBC` providers. There are other differences as well.


    `OLE DB` is a component-based specification, providing a set of object-oriented
    interfaces that abstract away the source of the data. You can create an `OLE DB`
    provider to retrieve data from nearly any data source in tabular format.


    `ODBC`, on the other hand, is an older procedural API that defines a handful of
    actions you can perform against a database. Because of its lineage, `ODBC` is
    strongly tied to relational databases, whereas `OLE DB` is more abstract in its
    definition of a data source. `ODBC` also tends to be more “plain vanilla” in its
    functionality, while `OLE DB` offers flexibility for vendor-specific extensions
    such as performance-enhancing functionality. Most of the time, you’ll probably
    use `OLE DB` or one of the managed providers for data access.


    ## File Connection Managers'
