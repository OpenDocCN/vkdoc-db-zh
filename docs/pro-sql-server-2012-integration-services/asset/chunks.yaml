- fmt: '# Data Flow Transformations


    ## Classification by Data Processing


    At different levels, transformations are also classified by how they process data.
    In particular, data flow transformations can be classified as either synchronous
    or asynchronous. In addition, they can be further subdivided by their `blocking`
    behavior.


    ## Synchronous Transformations


    `Synchronous transformations` process each row of input at the time. When sending
    data through a synchronous transformation, SSIS uses the `input buffer` (an area
    of memory set aside for temporary data storage during processing) as the `output
    buffer`. This is shown in Figure 8-2.


    *Figure 8-2. Synchronous transformations use the input buffer as the output buffer.*


    Because synchronous transformations reuse the input buffers as the output buffers,
    they tend to use less memory than asynchronous transformations. Generally speaking,
    synchronous transformations also share these other properties (though these don’t
    always hold true for every component):


    - Synchronous components generally are nonblocking or only partially blocking.
    This means they tend to process rows and output them immediately after processing,
    or they process and output rows with minimal delay.

    - Synchronous components also tend to output the same number of rows that they
    receive as input. However, some synchronous components may effectively discard
    rows, resulting in fewer output rows than input rows.


    ## Asynchronous Transformations


    `Asynchronous transformations` tend to transform data in sets. Asynchronous transformations
    are used when your method for processing a single row of data is dependent on
    other rows of data in your input.


    You may need to sort or aggregate your input data, for instance. In these situations,
    the transformation needs to see all rows of data at once, and can’t transform
    each row independently.


    From a technical perspective, asynchronous transformations maintain separate `input`
    and `output buffers`. Data moves into the input buffers, is transformed, and then
    moved to the output buffers. The extra data movement between input and output
    buffers can cost you some performance, and the maintenance of two separate sets
    of buffers tends to use more memory than synchronous transformations. Figure 8-3
    shows data moving between input and output buffers of an asynchronous transformation.


    ![](index-248_1.jpg)


    *Figure 8-3. Asynchronous transformations move data from an input buffer to a
    separate output buffer.*


    In general, asynchronous transformations are designed to handle situations such
    as the following:


    - The number of input rows does not equal the number of output rows. This is the
    case with the `Aggregate` and `Row Sampling` transformations.

    - Multiple input and output buffers have to be acquired to queue up data for processing,
    as with the `Sort` transformation.

    - Multiple rows of input have to be combined, such as with the `Union All` and
    `Merge` transformations.


    ## Blocking Transformations


    In addition to grouping transformations in synchronous and asynchronous categories,
    they can also be further subdivided by their `blocking` behavior, as noted earlier.
    Transformations that are `fully blocking` have to queue up and process entire
    rowsets before they can allow data to flow through. Consider the `Sort` transformation,
    which sorts an entire rowset. Consider pushing 1,000 rows through the `Sort` transformation.
    It can’t sort just the first 100 rows and start sending rows to output—the `Sort`
    transformation must queue up all 1,000 rows in order to sort them. Because it
    stops data from flowing through the pipeline while it is queuing input, the `Sort`
    transformation is fully blocking.


    Some transformations hold up the pipeline flow for shorter periods of time while
    they queue up and process data. These transformations are classified as `partially
    blocking`. The `Merge Join` transformation is an example of a partially blocking
    transformation. The `Merge Join` accepts two sorted rowsets as inputs; performs
    a full, left, or inner join of the two inputs; and then outputs the joined rowsets.
    As data passes through the `Merge Join`, previously buffered rows can be discarded
    from the input buffers. Because it has to queue up a limited number of rows from
    each rowset to perform the join, the `Merge Join` is a partially blocking component.


    `Nonblocking` transformations don’t hold up data flows. They transform and output
    rows as quickly as they are received. The `Derived Column` transformation is an
    example of a nonblocking transformation. Table 8-1 compares the properties of
    each class of blocking transformations.


    *Table 8-1. Transformation Blocking Types*


    | Property | Fully Blocking | Semiblocking | Nonblocking |

    | :--- | :--- | :--- | :--- |

    | Communication pattern | Asynchronous | Asynchronous | Synchronous |

    | Logical processing (general) | Full rowset | Subsets of rowset | Row level |

    | # rows in must equal # rows out | No | No | Yes |

    | Queues all input rows before processing | Yes | No | No |

    | Can spawn new threads | Yes | Yes | No |

    | Input buffer is output buffer | No | No | Yes |

    | Input sort order preserved | No | No | Yes |

    | Can rename/change data types of input columns | Yes | Yes | No |


    ## Row Transformations


    Row transformations are generally the simplest and fastest type of transformation.
    They are synchronous (with the possible exception of some `Script Component` transformations)
    and operate on individual rows of data. This section presents the stock row transformations
    available in SSIS.


    **NOTE:** We discuss the script component in detail in Chapter 10.


    ### Data Conversion


    A common task in ETL is converting data from one type to another. As an example,
    you may read in Unicode strings that you need to convert to a non-Unicode encoding,
    or you may need to convert numeric data to strings, and vice versa. This is what
    the `Data Conversion` transformation was designed for.


    The `Data Conversion` transformation provides a simple way to convert the data
    type of your input columns. For our sample, we borrowed some data from the New
    York City Health Department. We took the data for selected restaurants that had
    dozens of health violations and saved it in an Excel spreadsheet. As you can see
    in Figure 8-4, we added a `Data Conversion` transformation immediately after the
    Excel source adapter.


    *Figure 8-4. Using the Data Conversion transformation on an Excel spreadsheet*


    We’re using the `Data Conversion` transformation in the data flow because the
    `Excel Connection Manager` understands only a handful of data types. For instance,
    it can read character data only as Unicode data with a length of either 255 characters
    or as a 2.1 GB character large object (`LOB`). In addition, numbers are recognized
    only as double-precision floating-point numbers, so you have to explicitly convert
    them to other data types.


    The `Data Conversion` transformation creates copies of columns that you indicate
    for conversion to a new data type. The default name for each newly created column
    takes the form `Copy of <column name>`, but as you can see in Figure 8-5, you
    can rename the columns in the `Output Alias` field of the editor. The `Data Type`
    field of the editor lets you choose the target data type for the conversion. In
    this case, we chose to convert the `Violation Points` column to a signed integer
    (`DT_I4`) and Unicode string columns to non-Unicode strings of varying lengths.


    ![](index-251_1.jpg)


    *Figure 8-5. Editing the Data Conversion transformation*'
