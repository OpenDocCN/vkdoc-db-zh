    Using Execution Trees


    Whenever you execute an SSIS package, it generates an *execution tree* behind
    the scenes. The execution tree is used to optimize performance and to build an
    execution plan for your package. Consider the sample package shown in Figure 15-5\.
    Each path shown is a branch of the execution tree.


    *Figure 15-5\. SSIS execution tree*


    To capture the execution tree, log the PipelineExecutionTrees event of the Data
    Flow task in the Logging Configuration window. You can view the execution trees
    in the Log Events window of BIDS


    when you execute the package. The execution tree shown in the preceding image
    is enumerated in the SSIS Log Events window as follows:


    Path 0


    Begin Path 0


    FFS - Game Data.Outputs[Flat File Source Output]; FFS - Game Data


    Derived Column.Inputs[Derived Column Input]; Derived Column


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


    Derived Column.Outputs[Derived Column Output]; Derived Column


    SRT - Sort Games.Inputs[Sort Input]; SRT - Sort Games


    End Path 0


    Path 0 reads in data from a flat file, adds a derived column, and pushes the


    result to the input of a Sort transformation. The same buffer is used to move


    data from the flat file source component through the Derived Column


    transformation and into the Sort transformation input.


    Path 1


    Begin Path 1


    FFS - Weather Data 1.Outputs[Flat File Source Output]; FFS - Weather


    Data 1


    SRT - Sort Weather 1.Inputs[Sort Input]; SRT - Sort Weather 1


    End Path 1


    Path 1 reads in data from another flat file and pushes it to the input of a Sort
    transformation.


    Path 2


    Begin Path 2


    FFS - Weather Data 2.Outputs[Flat File Source Output]; FFS - Weather


    Data 2


    SRT - Sort Weather 2.Inputs[Sort Input]; SRT - Sort Weather 2


    End Path 2


    Path 2 reads in data from a third flat file and pushes the data to another Sort
    transformation input.


    Path 3


    Begin Path 3


    MRG - Merge Weather.Outputs[Merge Output 1]; MRG - Merge Weather


    MRJ - Join Games to Weather.Inputs[Merge Join Right Input]; MRJ -


    Join Games to Weather


    End Path 3


    Path 3 moves data from the output of the Merge transformation and into the


    Merge Join transformation.


    Path 4


    Begin Path 4


    MRJ - Join Games to Weather.Outputs[Merge Join Output]; MRJ - Join


    Games to Weather


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


    DST - Save Game Data.Inputs[OLE DB Destination Input]; DST - Save


    Game Data


    End Path 4


    Path 4 moves the data from the Merge Join transformation output to the OLE


    DB destination component input.


    Path 5


    Begin Path 5


    SRT - Sort Games.Outputs[Sort Output]; SRT - Sort Games


    MRJ - Join Games to Weather.Inputs[Merge Join Left Input]; MRJ - Join


    Games to Weather


    End Path 5


    Path 5 moves data from a Sort transformation output to the Merge Join


    transformation input.


    Path 6


    Begin Path 6


    SRT - Sort Weather 1.Outputs[Sort Output]; SRT - Sort Weather 1


    MRG - Merge Weather.Inputs[Merge Input 1]; MRG - Merge Weather


    End Path 6


    Path 6 moves data from a Sort transformation output to the Merge


    transformation input.


    Path 7


    Begin Path 7


    SRT - Sort Weather 2.Outputs[Sort Output]; SRT - Sort Weather 2


    MRG - Merge Weather.Inputs[Merge Input 2]; MRG - Merge Weather


    End Path 7


    Path 7 moves data from another Sort transformation output to the Merge


    transformation input.


    Upon reviewing the data flow execution tree, one thing that becomes readily apparent
    is that SSIS


    generates new paths whenever it determines that new buffers are needed. This occurs
    essentially whenever an asynchronous transformation is encountered. If SSIS can
    use the same buffer for input and output around a component (synchronous transformations),
    it adds it to the existing path. If the component uses different input and output
    buffers (asynchronous transformations), it finishes off the existing path at the
    input and creates a new path beginning at the output. This is important in terms
    of performance because asynchronous transformations must allocate new buffers
    and populate them, requiring more resources and causing a performance hit. Eliminating
    extraneous asynchronous transformations and the performance hit they incur can
    be a big performance boost. As an example, if you can guarantee that the source
    data is properly sorted, you can easily eliminate the Sort transformations to
    optimize our sample package.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-518_1.jpg)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


     **NOTE:** There are some components that seem to generate multiple copies of
    buffers, but in reality they don’t.


    The Multicast, Conditional Split, and the new SQLCAT Balanced Data Distributor
    transformations all use “buffer magic” to seemingly move data between buffers
    and generate copies of data. In reality, they essentially move pointers rather
    than copying rows in the buffers—a much more efficient operation.


    **HIGHLIGHTING THE EXECUTION TREE IN BIDS**


    You can highlight an entire path of an execution tree by right-clicking a data
    flow path arrow in the BIDS


    designer and selecting the Resolve References option from the context menu. This
    pulls up the new column-mapping dialog box. If you move this dialog box out of
    the way, you will see that the path is highlighted, as shown in Figure 15-6\.
    This is a handy method of checking the data flow paths visually while you’re editing
    your package in BIDS.


    *Figure 15-6\. Highlighting an execution tree path in the BIDS editor*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


    Implementing Parallelism


    On multiprocessor servers, one of the biggest performance benefits you can implement
    is parallelism.


    Within a package, you can implement multiple data flows that execute in parallel,
    or even multiple data flow paths within the same Data Flow task. To get the most
    out of parallel execution, you have to plan around the resource limitations of
    your server.


    The MaxConcurrentExecutables package setting specifies the maximum number of threads
    SSIS will execute in parallel in the package. The default is –1, which lets SSIS
    set the value dynamically to the number of logical processors plus 2\. If the
    server you’re running SSIS on has other processes running on it (SQL Server, for
    instance), you may want to set this property to a lower value to avoid CPU resource
    conflicts.'
  trans: "\n# 第 15 章：数据流调优与优化\n\n此列并非最终输出到文本文件的一部分，实际上根本不需要被读入数据流。然而，使用 `SELECT *`\
    \ 或表/视图数据访问模式会强制 SSIS 将其读入数据流，即使它稍后将被丢弃——这可能是对资源的昂贵浪费。\n\n**提示：** 大对象（LOB）数据，例如\
    \ `varchar(max)`、`nvarchar(max)` 和 `varbinary(max)`，需要 SSIS 在后台进行特殊处理才能将其拉入数据流并进行处理。即使处理相对较小的\
    \ LOB 数据值，也会产生额外的开销。\n\n正确的查询源数据的方法先前已在图 15-3 中展示。在修改后的示例中，我们已在源查询中指定了列列表，如下所示：\n\
    \n```sql\nSELECT SalesTransactionID,\n       SalesDate,\n       StoreNumber,\n\
    \       ReceiptNumber,\n       ReceiptLineNumber,\n       ItemEAN,\n       ItemName,\n\
    \       ItemCost\nFROM dbo.SalesTransaction\nWHERE SalesDate = CAST(GETDATE()\
    \ AS DATE);\n```\n\n通过指定列列表，我们将输入列限制为仅在数据流中实际需要的列。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-515_1.jpg)\n\n## 使用执行树\n\n每当您执行 SSIS 包时，它都会在后台生成一个*执行树*。执行树用于优化性能并为您的包构建执行计划。考虑图\
    \ 15-5 所示的示例包。显示的每条路径都是执行树的一个分支。\n\n*图 15-5. SSIS 执行树*\n\n要捕获执行树，请在“日志配置”窗口中记录数据流任务的\
    \ `PipelineExecutionTrees` 事件。在 BIDS 的“日志事件”窗口中执行包时，您可以查看执行树。前面图像中显示的执行树在 SSIS\
    \ 日志事件窗口中枚举如下：\n\n```\n路径 0\n开始路径 0\nFFS - Game Data.Outputs[Flat File Source\
    \ Output]; FFS - Game Data\nDerived Column.Inputs[Derived Column Input]; Derived\
    \ Column\nDerived Column.Outputs[Derived Column Output]; Derived Column\nSRT -\
    \ Sort Games.Inputs[Sort Input]; SRT - Sort Games\n结束路径 0\n```\n\n路径 0 从平面文件读取数据，添加一个派生列，并将结果推送到排序转换的输入。使用同一个缓冲区将数据从平面文件源组件通过派生列转换移动到排序转换输入。\n\
    \n```\n路径 1\n开始路径 1\nFFS - Weather Data 1.Outputs[Flat File Source Output]; FFS\
    \ - Weather Data 1\nSRT - Sort Weather 1.Inputs[Sort Input]; SRT - Sort Weather\
    \ 1\n结束路径 1\n```\n\n路径 1 从另一个平面文件读取数据并将其推送到排序转换的输入。\n\n```\n路径 2\n开始路径 2\nFFS\
    \ - Weather Data 2.Outputs[Flat File Source Output]; FFS - Weather Data 2\nSRT\
    \ - Sort Weather 2.Inputs[Sort Input]; SRT - Sort Weather 2\n结束路径 2\n```\n\n路径\
    \ 2 从第三个平面文件读取数据并将数据推送到另一个排序转换输入。\n\n```\n路径 3\n开始路径 3\nMRG - Merge Weather.Outputs[Merge\
    \ Output 1]; MRG - Merge Weather\nMRJ - Join Games to Weather.Inputs[Merge Join\
    \ Right Input]; MRJ - Join Games to Weather\n结束路径 3\n```\n\n路径 3 将数据从合并转换的输出移动到合并联接转换的输入。\n\
    \n```\n路径 4\n开始路径 4\nMRJ - Join Games to Weather.Outputs[Merge Join Output]; MRJ\
    \ - Join Games to Weather\nDST - Save Game Data.Inputs[OLE DB Destination Input];\
    \ DST - Save Game Data\n结束路径 4\n```\n\n路径 4 将数据从合并联接转换的输出移动到 OLE DB 目标组件的输入。\n\
    \n```\n路径 5\n开始路径 5\nSRT - Sort Games.Outputs[Sort Output]; SRT - Sort Games\n\
    MRJ - Join Games to Weather.Inputs[Merge Join Left Input]; MRJ - Join Games to\
    \ Weather\n结束路径 5\n```\n\n路径 5 将数据从排序转换的输出移动到合并联接转换的输入。\n\n```\n路径 6\n开始路径 6\n\
    SRT - Sort Weather 1.Outputs[Sort Output]; SRT - Sort Weather 1\nMRG - Merge Weather.Inputs[Merge\
    \ Input 1]; MRG - Merge Weather\n结束路径 6\n```\n\n路径 6 将数据从排序转换的输出移动到合并转换的输入。\n\n\
    ```\n路径 7\n开始路径 7\nSRT - Sort Weather 2.Outputs[Sort Output]; SRT - Sort Weather\
    \ 2\nMRG - Merge Weather.Inputs[Merge Input 2]; MRG - Merge Weather\n结束路径 7\n\
    ```\n\n路径 7 将数据从另一个排序转换的输出移动到合并转换的输入。\n\n在查看数据流执行树时，一个显而易见的事情是，只要 SSIS 确定需要新的缓冲区，就会生成新的路径。这基本上发生在遇到异步转换时。如果\
    \ SSIS 可以在组件周围为输入和输出使用相同的缓冲区（同步转换），它会将其添加到现有路径。如果组件使用不同的输入和输出缓冲区（异步转换），它会在输入处结束现有路径，并在输出处创建一条新路径。这在性能方面很重要，因为异步转换必须分配新缓冲区并填充它们，这需要更多资源并导致性能下降。消除不必要的异步转换及其带来的性能损失可以大幅提升性能。例如，如果您能保证源数据已正确排序，就可以轻松移除排序转换来优化我们的示例包。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-518_1.jpg)\n\
    \n**注意：** 有些组件似乎会生成缓冲区的多个副本，但实际上并非如此。`Multicast`、`Conditional Split` 以及新的 SQLCAT\
    \ `Balanced Data Distributor` 转换都使用“缓冲区魔力”来看似在缓冲区之间移动数据并生成数据副本。实际上，它们本质上是在移动指针，而不是复制缓冲区中的行——这是一个高效得多的操作。\n\
    \n### 在 BIDS 中高亮显示执行树\n\n您可以通过在 BIDS 设计器中右键单击数据流路径箭头，并从上下文菜单中选择 **解析引用** 选项，来高亮显示执行树的整个路径。这将弹出新的列映射对话框。如果您将此对话框移开，您将看到该路径被高亮显示，如图\
    \ 15-6 所示。这是在 BIDS 中编辑包时可视检查数据流路径的一种便捷方法。\n\n*图 15-6. 在 BIDS 编辑器中高亮显示执行树路径*\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 实现并行性\n\n在多处理器服务器上，您可以实现的最大性能优势之一是并行性。在包中，您可以实现多个并行执行的数据流，甚至在同一数据流任务中实现多个数据流路径。为了充分利用并行执行，您必须围绕服务器的资源限制进行规划。\n\
    \n`MaxConcurrentExecutables` 包设置指定了 SSIS 将在包中并行执行的最大线程数。默认值为 –1，这使 SSIS 能够动态地将该值设置为逻辑处理器数加\
    \ 2。如果您运行 SSIS 的服务器上还有其他进程在运行（例如 SQL Server），您可能需要将此属性设置为较低的值，以避免 CPU 资源冲突。\n"
- fmt: "Memory is another constraint to deal with when parallelizing packages, especially\
    \ when there are other processes running on the same server. SSIS automatically\
    \ uses metadata to tune buffer sizes before execution begins, but during execution\
    \ it is possible to run out of memory. This is particularly true if you are running\
    \ multiple Data Flow tasks in parallel, pushing large amounts of data through\
    \ asynchronous or blocking transformations. As an example, it’s not uncommon to\
    \ occasionally see packages with parallel data flows containing Lookup transformations\
    \ fail because of a lack of memory when there is a large amount of reference data\
    \ being cached.\n\n> **TIP:** Although you can influence buffer sizes by adjusting\
    \ the `DefaultBufferMaxRows` and `DefaultBufferSize` settings, changing them doesn’t\
    \ provide much bang for the buck. SSIS automatically tunes your buffer sizes for\
    \ you, and it does a good job. The other suggestions in this chapter provide much\
    \ more benefit for the effort required.\n\nDatabase table contention is an important\
    \ consideration in your parallelization plans as well. If you want to parallelize\
    \ a destination operation, for instance, consider the contention that can result\
    \ against the target table and plan accordingly. We have resolved many package\
    \ performance issues and outright failures over the years due to multiple Data\
    \ Flow tasks trying to output to the same target table in parallel.\n\nFinally,\
    \ it’s important to decide which operations to parallelize. If you are loading\
    \ a data mart, for instance, you may load multiple dimension tables in parallel.\
    \ If one dimension table has an extremely large number of rows, you may decide\
    \ to parallelize the destinations of that data flow path.\n\n## KNOW WHEN TO SAY\
    \ WHEN\n\nWhen you optimize your SSIS packages, it’s important to decide up front\
    \ how good is good enough. At what point do you say your package is efficient\
    \ enough? As in any software optimization, the Law of Diminishing Returns applies\
    \ in SSIS optimization: the difficulty and complexity involved increases as you\
    \ try to squeeze smaller and smaller kernels of performance out of your code.\
    \ Notice we didn’t say speed, but rather performance. Raw speed is only a single\
    \ factor in overall performance, which is a much more accurate measure of efficiency\
    \ that includes both speed and resource usage.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 15 DATA FLOW TUNING AND OPTIMIZATION\n\nAt some point, the effort\
    \ involved in trying to squeeze a final 100 milliseconds out of your code is not\
    \ worth the effort. Also keep the 80/20 rule in mind: focus on optimizing the\
    \ 20 percent of your code that consumes 80 percent of your processing time.\n\n\
    ## Summary\n\nThis chapter has introduced several tools and methods for optimizing\
    \ your SSIS packages. Many of these optimizations rely on performing operations\
    \ at the source when possible and limiting the data pulled through the ETL process.\
    \ This chapter also covered SSIS execution trees and some of the keys to optimizing\
    \ performance through parallelism. In the next chapter, you’ll consider the powerful\
    \ SSIS parent-child design pattern.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 16 Parent-Child Design Pattern\n\n*Having one child makes you a parent;\
    \ having two, you are a referee.* —British journalist David Frost\n\nWith SSIS,\
    \ there are several ways to introduce modular programming into your ETL processes.\
    \ One of the most flexible methods is by using the parent-child design. This pattern\
    \ enables you to create packages to perform very specific tasks. If these tasks\
    \ should be disabled, this design pattern allows you to utilize parameter bindings\
    \ to disable functionality at the package level. As the quote suggests, the more\
    \ complex your ETL process becomes, the more of an organizational role the parent\
    \ package plays, rather than just the role of a package that calls another.\n\n\
    ETL processes can become increasingly transparent when a clear design is utilized.\
    \ This chapter covers some of the benefits of utilizing the parent-child design\
    \ pattern and shows you how to implement it in your own processes. You will also\
    \ see the different ways to implement the design pattern, allowing you to pick\
    \ the one that best suits your needs.\n\n### Understanding the Parent-Child Design\
    \ Pattern\n\nThe parent-child design pattern in a nutshell refers to any ETL process\
    \ that utilizes an SSIS package to execute another package. This can be done by\
    \ using the Execute Package task or even the Execute Process task by calling the\
    \ `dtexec.exe` utility. Our recommendation is to stick with the Execute Package\
    \ task because it will allow you to configure the execution of the child package\
    \ much easier than the Execute Process task. Figure 16-1 shows you what a static\
    \ parent package would look like. We call this a *static package* because any\
    \ changes in the ETL structure or the addition and removal of packages would require\
    \ a modification to this package.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-522_1.jpg)\n\n**Figure 16-1. Example of a static parent package**\n\
    \nThe static package is developed with each of the tasks having their own individual\
    \ settings. This implementation of the parent-child design pattern is recommended\
    \ only if the execution process will not change. Maintaining and updating this\
    \ implementation can be become extremely challenging very quickly. The third executable,\
    \ `EPT_CH16_Apress_DisabledChildPackage`, has different configurations than the\
    \ other three executables. In order to disable the package during execution, we\
    \ pass a Boolean variable from the parent package, `CH16_Apress_StaticParentPackage.dtsx`,\
    \ to a parameter bound to the child’s `Disable` package property. We cover the\
    \ parameter passing later in this chapter. The static implementation of the parent-child\
    \ design pattern is very similar to the steps in a SQL agent job.\n\nAll the packages\
    \ contain one Script task that displays a simple message to show that the package\
    \ was executed. Listing 16-1 shows the C# that is contained with the nondisabled\
    \ child packages. It shows a simple message that informs you of the name of the\
    \ child package that was executed. As you can infer from the variable that is\
    \ utilized, we listed `System::PackageName` as the only variable available to\
    \ the `ReadOnlyVariables` property of the Script task.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Listing 16-1. Child Package Script Task\n\n```\nMessageBox.Show(\"The current\
    \ package's name is: \" +\n    Dts.Variables[\"System::PackageName\"].Value.ToString()+\"\
    \\n\");\n```\n\nThe script for the disabled child package is slightly different,\
    \ in order to alert you that this package should not be executed. This example\
    \ is included to demonstrate the ease of configuring your ETL process by using\
    \ a dynamic parent-child design pattern. Listing 16-2 provides the script present\
    \ in the disabled child package. There is short message contained within this\
    \ message box, alerting you that you should not be seeing this message.\n\n###\
    \ Listing 16-2. Disabled Child Package Script Task\n\n```\nMessageBox.Show(\"\
    The current package's name is: \" +\n    Dts.Variables[\"System::PackageName\"\
    ].Value.ToString()+\"\\n\"+\n    \"This package is supposed to be disabled. If\
    \ you are seeing this message, the parameters were not assigned the proper values.\"\
    );\n```\n\nThe modularity behind the parent-child design packages can be described\
    \ in the following terms: The parent package controls the entire ETL process.\
    \ Its main duty is to execute all the necessary packages. Wrapper packages control\
    \ a smaller subset of packages whose focus should be handling one particular process.\
    \ Wrapper packages are either called directly by the parent package or by other\
    \ wrapper packages. For example, a wrapper package can be used to execute packages\
    \ that are responsible for preprocessing the sources or performing post-load processing."
