    Summary


    With designing ETL processes, it is very important to bear in mind the maintainability
    of the code. The parent-child design pattern offers a flexible approach that will
    modularize you ETL packages, allowing you to add or remove packages or executables
    from the process with little difficulty or code change. The static implementation
    will modularize your code but is not ideal if packages are constantly being developed.
    The dynamic parent-child implementation allows you to let the data drive your
    ETL


    processes. We used the example of a table-driven process. This concludes the design
    patterns section of the book. The next section covers the more advanced capabilities
    and functionalities of SSIS.


