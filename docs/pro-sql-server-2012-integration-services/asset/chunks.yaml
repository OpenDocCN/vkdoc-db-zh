    Script Task


    One of the best ways to manipulate the objects in the package is a *Script task*.
    The Script task can use Visual Basic or C# in order to extend the functionality
    of the SSIS package beyond the provided tasks and connection managers. The Script
    task in the control flow is different from the Script task in the Data Flow task
    in that it modifies package-level objects, whereas the data flow Script task handles
    the data at the row level. Figure 5-30 shows the Script task as it appears in
    the control flow. Its icon looks like the Execute SQL task’s icon, but without
    the cylinder representing a database. The scroll icon indicates that the purpose
    of the task is to process a script. We have a whole chapter dedicated to scripting,
    Chapter 9.


    *Figure 5-30\. Script task*


    As we mentioned, the Script task allows you to extend the processes that SSIS
    components have natively. One of those advantages is the ability to access the
    .NET libraries. Certain libraries can give you access to the file system and perform
    tasks that are beyond the functionality of the File System task or the Execute
    Process task. Figure 5-31 demonstrates the Script page of the Script Task Editor.
    In this 144


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-146_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    particular example, we simply open a message box displaying the value of a variable
    at runtime. This technique is helpful when you are tracing an issue and are unsure
    of a variable’s value.


    *Figure 5-31\. Script Task Editor—Script page*


    The following properties are configurable on the Script page:


    ScriptLanguage allows you to choose between Visual Basic and C# as your


    scripting language. Chapter 9 weighs the pros and cons of using each language.


    EntryPoint defines the initial method SSIS calls at runtime. By default, it is
    the main() method inside the ScriptMain class. Because the major code blocks are


    automatically generated when you initially create the task, you don’t need to


    worry about the basic references.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-147_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    ReadOnlyVariables is a comma-separated list of all the variables to which you


    want the script to have read-only access. Without all the variables specified,
    you will run into an error when you try to refer to its properties in the script.
    By clicking the ellipsis, you can open a dialog box that will display all the
    variables available to the scope of the Script task. After you select the variables
    you want to access in the script, you can import them into this property.


    ReadWriteVariables is a comma-separated list of all the variables to which you


    want the script to have read/write access. You can populate this field in the


    same way as for ReadOnlyVariables.


    The Edit Script button opens a script editor. The first time you open the script,
    it will automatically include the proper assemblies and create some default classes
    and methods. The script editor is based on the Visual Studio Tools for Applications
    (VSTA). Figure 5-32 shows the script editor with some of the prepopulated code
    and comments. The initial code block provides access to all the necessary assemblies.
    The only modification we made to this code is in the main() method. We added a
    line of code that pops up a message box showing you the value of a specific variable.
    The line of code is MessageBox.Show(Dts.Variables[“System::TaskName”].Value.ToString());.
    The MessageBox.Show() method creates the message box. The method’s parameter,


    Dts.Variables[“System::TaskName”].Value.ToString(), accesses the Variables collection
    of the package.


    It is important to make sure that the variable is in scope for the Script task
    and that it is at least provided as a ReadOnly variable, as shown earlier in Figure
    5-31.


    *Figure 5-32\. Visual Studio Tools for Applications—script editor*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-148_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    When we execute this package using the Visual Studio Debug mode, we receive a
    message box displaying the original value of the variable because there was no
    change performed on it. The System::TaskName variable contains the name of the
    current task. We can assign values to ReadWrite variables by using C# or Visual
    Basic assignment operations. We discuss scripting in great detail in Chapter 9.


    Send Mail Task


    It is often the case that managers and database administrators would like to know
    when a process fails unexpectedly. ETL processes are not exempt from this requirement.
    SSIS provides a task that can send e-mails by using a mail service. It requires
    an SMTP Connection Manager in order to connect to a mail server. SSIS allows only
    Windows Authentication and anonymous authentication. For more about the connection
    manager, refer to Chapter 4\. In Figure 5-33, we demonstrate the task as it appears
    in the control flow. The icon is a stamped envelope with a return address and
    mailing address, indicating all the necessary components for the task.


    *Figure 5-33\. Send Mail task*


    The Mail page of the Send Mail Task Editor, shown in Figure 5-34, allows you to
    configure all the properties you need to send an e-mail. One of the key features
    of this task is the ability to attach files.


    You can output your logging to a file to attach to an e-mail before you send it
    off to provide context for the failure.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-149_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    *Figure 5-34\. Send Mail Task Editor—Mail page*


    The following list describes all the properties that can be configured:


    SMTPConnection specifies the SMTP Connection Manager to use in order to send


    out the e-mail.


    From defines the sender’s e-mail address.


    To lists the recipients of the e-mail, using semicolons to separate the different
    e-mails.


    Cc defines the carbon-copy recipients of the e-mail. This list separates each
    e-mail address with a semicolon.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-150_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    Bcc lists the blind-carbon-copy recipients of the e-mail. This list is separated
    by using semicolons as well.


    Subject provides the subject of the e-mail that is to be sent out.


    MessageSourceType lists the options for the body of the e-mail message. The


    three options are Direct input, File connection, and Variable. Direct input


    allows you to type in the message directly. The File connection option lets you
    choose a file connection manager to the file that will contain the body of the
    e-mail. The Variable option allows you to select an SSIS variable containing the


    body of the e-mail.


    MessageSource is populated based on the source type that is selected. The File


    connection and Variable options open a dialog box that lets you select the


    connection manager or variable you wish to include as the message body. With


    Direct input, you can directly type in a message.


    Priority defines the priority of the e-mail message. The options are Low, Medium,
    and High.


    Attachments lists the different files to attach to the e-mail. The files are


    separated by the pipe character. This field, unlike other instances, does not


    utilize a file connection manager but rather a file path as it exists on the file
    system of the executing machine.


