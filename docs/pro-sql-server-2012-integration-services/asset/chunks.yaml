  trans: "\n# 第 19 章 部署模型\n\n*图 19-7. Integration Services 部署向导的“选择目标”页面*\n\n与之前的\
    \ Integration Services 版本不同，现在没有部署到文件系统的选项了。您需要指定一个装有 Integration Services 目录的\
    \ SQL Server 实例，作为项目部署的目标。**浏览文件夹或项目**对话框允许您导航到目录中您想要关联此部署的项目文件。如果您将要覆盖一个现有项目，部署向导会发出警告。在指定目标服务器和目标文件夹路径之后，您将有机会使用**审阅**页面（如*图\
    \ 19-8*所示）来查看您的配置。\n\n![](img/index-581_1.jpg)\n\n*图 19-8. Integration Services\
    \ 部署向导的“审阅”页面*\n\n**审阅**页面提供了项目部署的源和目标的详细信息。\n\n点击**部署**按钮将启动将项目安装到目标的过程。如*图 19-9*所示的**结果**页面，在部署过程的每一步都会提供反馈。\n\
    \n![](img/index-582_1.jpg)\n\n*图 19-9. Integration Services 部署向导的“结果”页面*\n\n**更改保护级别**步骤会修改项目保护级别，以使用目标服务器上的加密设置。该密钥是使用您在创建目录时提供的密码创建的。为了查找您项目的所有加密密钥，您可以查询\
    \ `SSISDB` 上的 `internal.catalog_encryption_keys` 表。\n\n## 环境\n\n项目部署完成后，您可能希望模拟不同的场景来执行\
    \ ETL 过程。*环境*允许您通过其变量为项目中的所有参数提供值。这些环境变量还可用于配置连接管理器，以便根据您需要运行的模拟来定义数据的来源和加载目标。\n\
    \n> **注意：** *环境变量*是一个容易引起混淆的术语，可能会与操作系统的环境变量混淆。该术语仅适用于 Integration Services 目录中可绑定到已部署项目的环境内的变量，这些环境变量存在于目录中用于执行目的。可以在这些变量之间创建映射，并可以为不同的项目配置各种参数。\n\
    \n要创建一个环境，请导航到您部署项目的**环境**子文件夹。右键单击该子文件夹并选择**创建环境**。这将打开一个允许您创建环境的窗口。*图 19-10*展示了**创建环境窗口**。此窗口要求提供基本信息，例如新环境的名称和描述。\n\
    \n*图 19-10. 创建环境向导*\n\n文本字段上方的**脚本**按钮使您能够生成用于创建环境的 T-SQL 脚本。*清单 19-2*展示了将创建**开发**环境的存储过程及其参数。\n\
    \n![](img/index-584_1.jpg)\n\n*清单 19-2. 创建环境*\n\n```sql\nEXECUTE SSISDB.catalog.create_environment\n\
    \    @environment_name=N'Development',\n    @environment_description=N'',\n  \
    \  @folder_name=N'SSIS12'\n;\nGO\n```\n\n创建环境后，您可以向其中添加变量。与创建环境类似，您可以使用*图 19-11*所示的窗口或*清单\
    \ 19-3*所示的代码来创建环境变量。要打开该窗口，您需要右键单击环境并选择**属性**。使用窗口的优点是它允许您定义多个环境变量。\n\n*图 19-11.\
    \ 环境属性*\n\n用于创建环境变量的 T-SQL 存储过程 `catalog.create_environment_variable`，使用窗口中显示的所有列作为参数。`@folder_name`\
    \ 和 `@environment_name` 这两个参数有助于标识变量所属的环境。\n\n![](img/index-585_1.jpg)\n\n*清单\
    \ 19-3. 创建环境变量*\n\n```sql\nEXECUTE SSISDB.catalog.create_environment_variable\n\
    \    @folder_name = 'SSIS12',\n    @environment_name = 'Development',\n    @variable_name\
    \ = 'TestingVariableMapping',\n    @data_type = 'Int32',\n    @sensitive = FALSE,\n\
    \    @value = 0,\n    @description = ''\n;\nGO\n```\n\n项目、环境和环境变量准备就绪后，您可以配置项目以关联到环境及其变量，用于特定的执行模拟。环境变量可以映射到已定义的不同项目和包参数。\n\
    \n您可以通过导航到 Integration Services 目录中的项目，右键单击它并选择**配置**来设置这些依赖关系。*图 19-12*展示了项目配置窗口的**引用**页面。此页面允许您定义在执行期间可以向项目传递值的不同环境。\n\
    \n*图 19-12. 配置项目窗口的“引用”页面*\n\n![](img/index-586_1.jpg)\n\n> **注意：** 环境可以从项目直接文件夹结构以外的位置引用。但是，环境必须位于同一\
    \ SQL Server 实例上。\n\n设置好环境引用后，您可以将项目对象映射到环境内的变量。*图 19-13*展示了**配置项目**窗口的**参数**页面的**参数**选项卡。此选项卡允许您将项目中包含的所有参数的值映射到环境变量的值。**范围**下拉列表使您更容易查找参数。它可以将参数列表限制为特定的包或参数函数。该选项卡还显示了为参数定义的默认值。\n\
    \n*图 19-13. 配置项目窗口的“参数”页面和“参数”选项卡*\n\n参数的实际映射是通过单击参数**值**字段右侧的省略号按钮生成的。单击该按钮将打开如*图\
    \ 19-14*所示的窗口。**编辑值**选项允许您为执行定义一个新的静态值，而不管指定的环境如何。**使用环境变量**选项将在环境中搜索指定的变量，并将其值映射到参数。下拉列表中可用的环境变量将是那些数据类型与参数数据类型兼容的变量。\n\
    \n![](img/index-587_1.jpg)\n\n*图 19-14. 设置参数值窗口*\n\n> **注意：** 当您为项目定义多个环境引用时，我们建议您在所有环境中定义具有相同名称和类型的变量。**设置参数值**窗口中的下拉列表允许您指定要映射到参数的变量。\n\
    \n除了参数之外，项目内定义的连接管理器也可以映射到环境变量值。**配置项目**窗口的**参数**页面的**连接管理器**选项卡（如*图 19-15*所示）允许您创建这些映射。**范围**下拉列表与**参数**选项卡中的列表类似，它将过滤项目中定义的连接管理器，以便您可以轻松地映射值。\n\
    \n![](img/index-588_1.jpg)\n"
- fmt: "# Execution\n\n`Figure 19-15. The Parameters page and Connection Managers\
    \ tab of the Configure project window` The Set Parameter Value window allows you\
    \ to map the property values of the connection managers to environment variables\
    \ as well. The window, which is accessed by clicking the ellipsis button next\
    \ to the `Value` field of the property that needs to be mapped, works the same\
    \ way as the window that maps environment variables to parameters.\n\nWith the\
    \ project deployed to the Integration Services catalog and configured, we can\
    \ finally execute the ETL process on the server. This example demonstrates the\
    \ dynamic parent-child design pattern. The versatility of this design pattern\
    \ works seamlessly with the new deployment model. For more information about the\
    \ parent-child design pattern, refer to Chapter 16.\n\nIn order to trace the execution\
    \ of the individual packages, the packages contain a `Script` task that writes\
    \ to a file on the file system. The file location is defined by the connection\
    \ manager defined in the packages. `Listing 19-4` shows the `C#` code that allows\
    \ access to the file. The `main()` method calls the method `appendToFile(string)`\
    \ in order to append the string parameter to the file. The file mode that is defined\
    \ for the file stream object is `Append`, which allows the method to automatically\
    \ add to the end of the file. The write mode allows read/write access to the file\
    \ specified by the connection manager’s connection string.\n\n`Listing 19-4. Script\
    \ Task Methods`\n```csharp\npublic void Main()\n{\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \    CHAPTER 19  DEPLOYMENT MODEL\n\n    // TODO: Add your code here\n    string\
    \ packageTime = Dts.Variables[\"System::StartTime\"].Value.ToString() + \"\\n\"\
    ;\n    string packageMessage = \"The current package's name is: \" +\n    Dts.Variables[\"\
    System::PackageName\"].Value.ToString() + \"\\n\";\n    appendToFile(\"**************************************************\"\
    );\n    appendToFile(packageTime);\n    appendToFile(packageMessage);\n    Dts.TaskResult\
    \ = (int)ScriptResults.Success;\n}\n\nprivate void appendToFile(string appendMessage)\n\
    {\n    try\n    {\n        FileStream fs = new FileStream(Dts.Connections[\"DeployedPackageOutput\"\
    ].ConnectionString.ToString(), FileMode.Append, FileAccess.Write);\n        StreamWriter\
    \ sw = new StreamWriter(fs);\n        sw.WriteLine(appendMessage);\n        sw.Close();\n\
    \    }\n    catch (IOException ex)\n    {\n        ex.ToString();\n    }\n}\n\
    ```\n\nIn order to execute a package that has been deployed as a part of a project,\
    \ navigate to the package in the Integration Services catalog, right-click the\
    \ package, and select `Run`. This pops up the Run Package window, shown in `Figure\
    \ 19-16`, which allows you to configure the details of the execution. The first\
    \ tab of the window, Parameters, allows you to configure the project-level parameters.\
    \ For our demonstration, we will leave these values as the defaults from the project\
    \ deployment. The execution of the packages takes place from the selected package’s\
    \ scope. Only the specific package’s objects are configurable. In our case, the\
    \ parameters and connection managers on `CH19_Apress_DynamicParentPackage.dtsx`\
    \ are the only configurable objects.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-590_1.png)\n![](index-590_2.png)\n![](index-590_3.png)\n\n`Figure\
    \ 19-16. The Parameters tab of the Run Package window`\n\nThe check box at the\
    \ bottom allows you to use an environment that has been referenced in the project\
    \ configuration. Selecting an environment will automatically apply the different\
    \ object mappings that have been configured.\n\nIn order to modify the values\
    \ of the parameters, the ellipsis button to the right of the `Value` field needs\
    \ to be clicked. The Edit Literal Value for Execution window, shown in `Figure\
    \ 19-17`, allows you to modify the value of any of the parameter values. Fill\
    \ in the `Value` field with the value that is required for current execution.\
    \ The values are used for only the current execution. If you need to reuse these\
    \ values, we recommend creating an environment with the appropriate environment\
    \ variables.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-591_1.jpg)\n\
