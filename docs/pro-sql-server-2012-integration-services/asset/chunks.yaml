- fmt: "# 平面文件源与目标\n\n使用平面文件作为源需要使用平面文件连接管理器。该连接管理器在第四章中有详细讨论。利用连接管理器中定义的属性，源组件获取提取数据所需的所有元数据。图\
    \ 14-7 显示了平面文件源编辑器中的可用选项。该编辑器同样利用连接管理器的配置来收集列信息。如第四章所述，平面文件连接管理器存储诸如列和行分隔符、列名、列数据类型信息以及有关文件和数据的其他信息。“预览”按钮显示使用连接管理器中定义的配置读取的行的样本。“将源中的空值保留为数据流中的空值”选项将在管道中保留空值。“列”页面从连接管理器获取其所有信息。\n\
    \n![Figure 14-7. Flat File Source Editor](index-494_1.jpg)\n\n另一方面，平面文件目标的操作方向相反。如果平面文件本身不存在，您将必须添加一个新的平面文件连接管理器来配置输出文件。\n\
    \n图 14-8 显示了平面文件目标编辑器以及它如何修改连接管理器。“新建”按钮将创建一个新的平面文件连接管理器。这将自动打开一个对话框“平面文件格式”，如图\
    \ 14-9 所示。利用此对话框中选择的选项，连接管理器大部分会自动配置，因为它从位于数据流管道末端获得信息。然而，“更新”按钮强制您直接修改连接管理器，而不是通过元数据导入配置。“映射”页面只是简单地将管道中的列映射到连接管理器中定义的列。\n\
    \n![Figure 14-8. Flat File Destination Editor](index-495_1.jpg)\n\n“平面文件格式”选项允许您定义平面文件的布局。每个选项在第四章的平面文件连接管理器部分都有介绍。所有非分隔符选项的信息由管道中存储的元数据提供。\n\
    \n![Figure 14-9. Flat File Format dialog box](index-496_1.jpg)\n\n# Excel 源与目标\n\
    \nMicrosoft Excel 的吸引力源于其工作表与数据库表的相似性。业务用户欣赏 Excel 能够快速显示和修改表格信息的能力。在后端，Excel\
    \ 使用 Jet 引擎，这与 Microsoft Access 使用的引擎相同。这允许 SSIS 在电子表格上执行某些类似 SQL 的命令。Jet 引擎的\
    \ SQL 解释远不如 SQL Server 的先进，但它确实有一些可以用于 ETL 过程的基本元素。\n\n> **注意：** `Jet` 引擎目前没有\
    \ 64 位提供程序。当您尝试使用 SSIS 操作电子表格时，这可能会导致一些问题。\n\nExcel 源组件与平面文件源组件类似，区别在于对连接管理器的依赖。Excel\
    \ 文件的连接管理器仅定义其位置的文件夹路径。图 14-10 显示了 Excel 源组件的编辑器。“连接管理器”页面允许您选择指向 Excel 文件及其内特定工作表的连接管理器，或者提供一个\
    \ SQL 查询，该查询将连接不同的工作表以返回所需数据。`Jet` 引擎在连接上的数据类型匹配或数据中的空值处理方面，不允许其他关系数据库管理系统（`RDBMS`）所允许的宽松度。\n\
    \n![Figure 14-10. Excel Source Editor—SQL command textbox](index-497_1.jpg)\n\n\
    清单 14-2 提供了用于从特定工作表中提取所需列的查询。\n\n此查询与在 `OLE DB` 源组件中使用 `SQL Command` 选项具有相同的优点，即在数据流开始时，缓冲区仅限于这四个列。图\
    \ 14-11 显示了“列”页面，该页面允许您选择希望传递到数据流中的列。这两种方法之间的区别在于，通过使用“表或视图”选项，您会拉取所有可用列，然后在 `SSIS`\
    \ 已经处理了不需要的列之后再对其进行修剪。\n\n**清单 14-2. Excel 源 SQL 命令**\n\n```sql\nSELECT Abbreviation,\n\
    \    Capital,\n    Flag,\n    Lat\nFROM [Sheet1$]\n```\n\n![Figure 14-11. Columns\
    \ page of the Excel Source Editor](index-498_1.jpg)\n\n将数据加载到 Excel 电子表格的难点之一是清除工作表（表/视图）中已存在的行。默认情况下，`SSIS`\
    \ 增量加载电子表格。为了重新加载电子表格，您必须在控制流中使用执行 SQL 任务，并将其指向目标 Excel 连接管理器。图 14-12 显示了可以实现此目的的执行\
    \ SQL 任务的配置。\n\n![Figure 14-12. Execute SQL Task—truncate Excel worksheet](index-499_1.jpg)\n\
    \n清单 14-3 显示了用于截断 Excel 工作表的实际 SQL 语句。原始的三个工作表名称末尾会显示一个美元符号（`$`）。为了将列映射到目标工作表，该表必须存在于文件中。Excel\
    \ 目标组件上的“新建”按钮将生成创建脚本，就像 `OLE DB` 目标生成创建表脚本一样。`Jet` 引擎对关键字极其敏感，并将在创建脚本中通过将单引号括在对象名称周围来转义它们。这类似于\
    \ `OLE DB` 目标组件通过在所有名称周围使用方括号来转义对象。\n\n**清单 14-3. Excel 工作表截断脚本**\n\n```sql\n\
    DROP TABLE Sheet4\nGO\nCREATE TABLE Sheet4(\n    Abbreviation LongText,\n    Capital\
    \ LongText,\n    Flag LongText,\n    Lat Double\n)\nGO\n```\n\n# XML 源\n\n元数据的一个重要存储库是可扩展标记语言（`XML`）文件。`XML`\
    \ 文件可用于描述几乎所有事物。`XML` 服务于多种目的：`SQL Server` 的 `XML` 功能可以将表记录输出为 `XML`；`SSIS` 包本质上是\
    \ `XML` 文件，由 `dtexec.exe` 和 `Business Intelligence Development Studio` 分别在运行时和设计时解释；`SQL\
    \ Server` 将对象的扩展属性存储在 `XML` 中，以及其他格式，包括不仅与 `ETL` 相关的信息。\n\n图 14-13 向您展示了 `XML`\
    \ 源编辑器，该编辑器使用 `XML` 架构定义（`XSD`）解析 `XML` 文件以返回文件中存储的元素。“使用内联架构”将尝试根据 `XML` 中的值生成\
    \ `XSD`。但是，如果 `XSD` 不存在于 `XML` 中，“生成 `XSD`”按钮将为您生成一个 `XSD` 文件。`XSD` 生成后，它会在指定路径中创建为自己的文件。在此示例中，我们使用了将\
    \ `SSIS 2008` 项目文件转换为 `SSIS 2012` 的升级日志文件，并为其生成了 `XSD`。\n\n![Figure 14-13. Connection\
    \ Manager page of the XML Source Editor](index-501_1.jpg)"
  raw: 'Using a flat file as a source requires the use of a Flat File Connection Manager.
    The connection manager is thoroughly discussed in Chapter 4\. Using the properties
    defined in the connection manager, the source component acquires all the metadata
    required to extract the data. Figure 14-7 shows the options available with the
    Flat File Source Editor. The editor uses the configuration of the connection manager
    to collect the column information as well. As described in Chapter 4, the Flat
    File Connection Manager stores information such as the column and row delimiters,
    the column names, the column data type information, and some other information
    about the file and its data. The Preview button shows a sample of the rows that
    are read by using the configuration defined in the connection manager. The Retain
    Null Values from the Source as Null Values in the Data Flow option will preserve
    nulls in the pipeline. The Columns page acquires all of its information from the
    connection manager.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-494_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    *Figure 14-7\. Flat File Source Editor*


    Flat file destinations, on the other hand, can operate in the opposite direction.
    If the flat file itself does not exist, you will have to add a new Flat File Connection
    Manager to configure the output file.


    Figure 14-8 shows the Flat File Destination Editor and how it modifies the connection
    manager. The New button will create a new Flat File Connection Manager. This will
    automatically open a dialog box, Flat File Format, which is shown in Figure 14-9\.
    Using the option chosen in this dialog box, the connection manager is automatically
    configured for the most part because of the knowledge it gains from being at the
    end of the data flow pipeline. The Update button, however, forces you to modify
    the connection manager directly rather than importing the configuration through
    the metadata. The mappings simply map the columns in the pipeline to the columns
    defined in the connection manager.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-495_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    *Figure 14-8\. Flat File Destination Editor*


    The Flat File Format options allow you to define the layout of the flat file.
    Each of the options is covered in Chapter 4 for the Flat File Connection Manager
    section. The information for all nondelimited options is provided by the metadata
    stored in the pipeline.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-496_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    *Figure 14-9\. Flat File Format dialog box*


    Excel Sources and Destinations


    The appeal of Microsoft Excel stems from its worksheets’ similarity to database
    tables. Business users appreciate Excel for its ability to quickly display and
    modify tabular information. In the back end, Excel utilizes the Jet engine, the
    same engine behind Microsoft Access. This allows SSIS to execute certain SQL-like
    commands on the spreadsheet. The SQL interpretation of the Jet engine is nowhere
    as advanced as SQL Server’s, but it does have some rudimentary elements that can
    be used for ETL


    processes.


     **NOTE:** The Jet engine does not currently have a 64-bit provider. This may
    cause some issues as you try to manipulate spreadsheets using SSIS.


    The Excel source components are similar to the flat file source components, except
    for the dependency on the connection manager. The connection manager for the Excel
    file simply defines the folder path to its location. Figure 14-10 shows the Excel
    source component’s editor. The Connection Manager page allows you to choose the
    connection manager that points to the Excel file and one particular worksheet
    within that spreadsheet, or to provide a SQL query that will join different worksheets
    to return the desired data. The Jet engine does not allow the same leniency that
    other RDBMSs allow in terms of the data type matches on joins or null handling
    in data.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-497_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    *Figure 14-10\. Excel Source Editor—SQL command textbox*


    Listing 14-2 provides the query that is used to extract the desired columns from
    a particular sheet.


    This query has the same advantages as using the SQL Command option in the OLE
    DB source component, in that the buffer is limited to only these four columns
    at the onset of the data flow. Figure 14-11 displays the Columns page, which allows
    you to choose the columns you wish to pass into the data flow. The difference
    between these two methods is that the by using the Table or View option, you are
    pulling all the available columns and then trimming them after SSIS has already
    processed the unwanted columns.


    *Listing 14-2\. Excel Source SQL Command*


    SELECT Abbreviation,


    Capital,


    Flag,


    Lat


    FROM [Sheet1$]


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-498_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    *Figure 14-11\. Columns page of the Excel Source Editor*


    One of the difficulties with loading data into an Excel spreadsheet is eliminating
    prior rows that already exist within the worksheet (table/view). SSIS loads the
    spreadsheets incrementally by default. In order to reload the spreadsheet, you
    have to use an Execute SQL task within the control flow and point it to the destination
    Excel Connection Manager. Figure 14-12 shows the configuration of an Execute SQL


    task that can achieve this end.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-499_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    *Figure 14-12\. Execute SQL Task—truncate Excel worksheet*


    Listing 14-3 shows the actual SQL that is used to truncate an Excel worksheet.
    The original three spreadsheets will appear with a dollar sign ($) at the end
    of their names. In order to map the columns to the destination worksheet, it must
    exist in the file. The New button on the Excel destination component will generate
    the create script, just as the OLE DB destination generates a create table script.
    The Jet engine is extremely sensitive to keywords and will escape all the objects
    by placing single quotes around their names in the create script. This is similar
    to the OLE DB destination component escaping the objects by using square brackets
    around all the names.


    *Listing 14-3\. Excel Worksheet Truncate Script*


    DROP TABLE Sheet4


    GO


    CREATE TABLE Sheet4(


    Abbreviation LongText,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    Capital LongText,


    Flag LongText,


    Lat Double


    )


    GO


    XML Sources


    A great repository for metadata is an Extensible Markup Language (XML) file. XML
    files can be used to describe just about anything. XML serves many purposes: SQL
    Server’s XML functionality can output table records as XML; SSIS packages are
    essentially XML files that the dtexec.exe and Business Intelligence Development
    Studio interpret at runtime and design time, respectively; SQL Server stores extended
    properties of the objects in an XML, and other formats, including information
    not just related to ETL.


    Figure 14-13 shows you the XML source editor that parses through an XML file by
    using an XML


    Schema Definition (XSD) to return the elements stored within the file. The Use
    inline schema will attempt to generate the XSD based on the values in the XML.
    However, if the XSD does not exist within the XML, the Generate XSD button will
    generate an XSD file for you. After the XSD is generated, it is created as its
    own file in the specified path. For this example, we used the upgrade log file
    of converting an SSIS 2008 project file to SSIS 2012 and generated an XSD for
    it.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-501_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    *Figure 14-13\. Connection Manager page of the XML Source Editor*'
