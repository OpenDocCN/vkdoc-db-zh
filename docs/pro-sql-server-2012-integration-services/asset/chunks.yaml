    The Script task Dts.Log() method lets you write messages directly to the SSIS
    log without the overhead of invoking an event. Normally you’ll want to use the
    preceding event-driven methods to log information as they respect the package
    and task settings such as MaximumErrorCount.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-372_1.jpg)


    CHAPTER 10  SCRIPTING


    After we populate the SSIS object variable with the list of files in DataTable
    format, we need to use those results. For this task, we pass the User::Files variable
    in to a Foreach loop container in Foreach ADO Enumerator mode. This mode lets
    you iterate the rows in an ADO.NET DataTable or DataSet or an ADO Recordset. We
    configured the Collection tab of the Foreach Loop Editor to iterate the rows in
    the first table and set the ADO object source variable to User::Files, as shown
    in Figure 10-10.


    *Figure 10-10\. Configuring the Foreach loop container to iterate rows in a .NET
    DataTable* We finished configuring the Foreach loop container by setting the options
    on the Variable Mappings page of the editor, as shown in Figure 10-11\. This page
    has two columns named Variable and Index. The Index column holds the zero-based
    indexes of the columns in your DataTable; the Variable column holds the variables
    these columns are mapped to. On each iteration of the loop, the variables listed
    will be populated with the values from the columns they are mapped to for each
    row in the DataTable.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-373_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-11\. Mapping the DataTable columns to SSIS variables in the Foreach
    loop container* We put a second Script task inside the Foreach loop container
    and passed it the variables we populate on each loop, as shown in Figure 10-12\.
    All we need to do is read the values of these variables, so we passed them in
    as read-only variables.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-374_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-12\. Configuring the read-only variables in the inside Script task*
    The script for this Script task is simple, as you can see here:


    public void Main()


    {


    Dts.TaskResult = (int)ScriptResults.Success;


    MessageBox.Show(String.Format("{0}, {1}, {2}, {3}, {4}, {5}",


    Dts.Variables["User::Filename"].Value.ToString(),


    Dts.Variables["User::Extension"].Value.ToString(),


    Dts.Variables["User::Filepath"].Value.ToString(),


    Dts.Variables["User::CreatedDate"].Value.ToString(),


    Dts.Variables["User::ModifiedDate"].Value.ToString(),


    Dts.Variables["User::IsReadOnly"].Value.ToString()));


    }


    This script simply takes the values of the read-only variables passed in and displays
    them in a Windows message box. The result, as you can see in Figure 10-13, is
    a pop-up message box displaying the metadata for each file on each iteration.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-375_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-13\. Displaying file metadata on each loop iteration*


    For this example, we simplified the result, simply displaying the file metadata
    in pop-up message boxes, but in a real application, you might use this metadata
    to back up, delete, or choose files to process based on some specific criteria.
    The important point here is that the first Script task retrieves the data and
    makes it accessible to the second Script task via variables set by the Foreach
    loop container.'
  trans: "\n# 第十章 - 脚本编写\n\n## 脚本任务事件\n\n脚本任务通过 `Dts` 对象支持多种事件和日志记录选项。敏锐的 .NET 开发人员可能已经注意到，我们在\
    \ try-catch 块的 catch 部分使用了 `Dts.Events.FireError()` 方法，而不是通常的 `throw` 语句来重新抛出异常。调用如下所示：\n\
    \n```\nDts.Events.FireError(-1, \"SCT - Get File Information\", ex.ToString(),\
    \ \"\", 0);\n```\n\n参数如下：\n\n- 第一个参数是名为 `errorCode` 的 `int`。这是用户为错误定义的标识符。\n-\
    \ 接下来是名为 `subComponent` 的 `string`。这通常设置为脚本任务的名称，以便在记录 `OnError` 事件时参考。\n- 然后我们有一个名为\
    \ `description` 的 `string`，其中包含错误描述。如果使用异常的 `ToString()` 方法，你将在描述中捕获异常信息和内部异常堆栈。\n\
    - 第四个和第五个参数是名为 `helpFile` 的 `string` 和名为 `helpContext` 的 `int`。它们分别表示帮助文件的路径和该文件中某个主题的标识符（如果你有的话）。在我们的例子中，我们将其分别设置为空字符串和\
    \ 0，因为我们没有配套的帮助文件。\n\n我们也没有为组件的 `Dts.TaskResult` 属性分配 `Failure` 值。这有几个原因。首先，当你使用\
    \ `FireError()` 方法时，SSIS 会遵守脚本任务和包的 `MaximumErrorCount` 属性。设置 `Dts.TaskResult`\
    \ 或使用 `throw` 语句则不会遵守 `MaximumErrorCount`，会导致脚本任务立即停止。`FireError()` 实际上会触发 `OnError`\
    \ 事件，这意味着如果你为包启用了日志记录并正在捕获 `OnError` 事件，SSIS 将为你处理日志记录。\n\n除了 `FireError()` 之外，SSIS\
    \ 还公开了触发其他事件的方法：\n\n- `FireWarning()` 触发 `OnWarning` 事件以记录警告消息。警告消息通常表示潜在问题，但不如错误消息严重。\n\
    - `FireInformation()` 触发 `OnInformation` 事件，记录信息性消息。信息性消息通常比警告消息更柔和，因为它们不暗示问题或潜在问题。\n\
    - `FireProgress()` 触发 `OnProgress` 事件，记录进度消息。当组件内取得“可衡量的进展”时，会触发 `OnProgress`\
    \ 事件。简而言之，这意味着 `OnProgress` 事件是针对完成百分比触发的。\n- `FireQueryCancel()` 触发 `OnQueryCancel`\
    \ 事件，用于检查任务是否应停止运行。该方法返回一个 `bool` 结果：`true` 表示任务应停止运行，`false` 表示继续运行。\n- `FireCustomEvent()`\
    \ 触发一个自定义事件。\n\n脚本任务的 `Dts.Log()` 方法让你可以直接将消息写入 SSIS 日志，而无需调用事件的开销。通常，你会希望使用前面提到的事件驱动方法来记录信息，因为它们遵守包和任务设置，例如\
    \ `MaximumErrorCount`。\n\n## 示例：使用脚本任务获取文件信息\n\n// 触发一个 OnInformation 事件，表示我们正在启动\n\
    ```\nDts.Events.FireInformation(-1, TaskName, \"Starting\", \"\", 0, ref b);\n\
    ```\n\n// 定义我们的输出数据表\n```\nDataTable dt = new DataTable();\ndt.Columns.Add(\"\
    Filename\", typeof(string));\ndt.Columns.Add(\"Extension\", typeof(string));\n\
    dt.Columns.Add(\"Filepath\", typeof(string));\ndt.Columns.Add(\"CreatedDate\"\
    , typeof(DateTime));\ndt.Columns.Add(\"ModifiedDate\", typeof(DateTime));\ndt.Columns.Add(\"\
    IsReadOnly\", typeof(Boolean));\n```\n\n// 获取文件信息并将其添加到数据表中\n```\nstring path\
    \ = Dts.Variables[\"User::Path\"].Value.ToString();\nDirectoryInfo di = new DirectoryInfo(path);\n\
    FileInfo[] fi = di.GetFiles(\"*.*\", SearchOption.AllDirectories);\nforeach (FileInfo\
    \ f in fi)\n{\n    dt.Rows.Add(new object[] { f.Name, f.Extension, f.DirectoryName,\
    \ f.CreationTime, f.LastWriteTime, f.IsReadOnly });\n}\n```\n\n// 输出数据表\n```\n\
    Dts.Variables[\"User::Files\"].Value = dt;\n}\ncatch (Exception ex)\n{\n// 如果发生错误，触发\
    \ OnError 事件\nDts.Events.FireError(-1, TaskName, ex.ToString(), \"\", 0);\n}\n\
    finally\n{\n// 触发最终的 OnInformation 事件，表示我们已完成\nDts.Events.FireInformation(-1,\
    \ TaskName, \"Finished\", \"\", 0, ref b);\n}\n```\n\n> **提示：** 在任何访问外部资源（如此处的文件系统）的\
    \ .NET 代码中使用 try-catch 块是一个好习惯。如果外部资源不可访问，你可能需要在从脚本返回之前将 `TaskResult` 设置为 `Failure`\
    \ 值或执行其他清理任务。\n\n## 使用文件元数据\n\n在我们以 `DataTable` 格式将文件列表填充到 SSIS 对象变量后，我们需要使用这些结果。为此任务，我们将\
    \ `User::Files` 变量传递到 Foreach 循环容器的 Foreach ADO Enumerator 模式中。此模式允许你遍历 ADO.NET\
    \ `DataTable` 或 `DataSet` 或 ADO `Recordset` 中的行。我们已将 Foreach 循环编辑器的“集合”选项卡配置为遍历第一个表中的行，并将\
    \ ADO 对象源变量设置为 `User::Files`，如图 10-10 所示。\n\n*图 10-10. 配置 Foreach 循环容器以遍历 .NET\
    \ DataTable 中的行*\n\n我们通过设置编辑器“变量映射”页面上的选项完成了 Foreach 循环容器的配置，如图 10-11 所示。此页面有两列，分别名为“变量”和“索引”。“索引”列保存数据表中列的基于零的索引；“变量”列保存这些列所映射到的变量。在循环的每次迭代中，列出的变量将填充数据表中每行对应列的值。\n\
    \n*图 10-11. 在 Foreach 循环容器中将 DataTable 列映射到 SSIS 变量*\n\n我们在 Foreach 循环容器内放置了第二个脚本任务，并将每次循环中填充的变量传递给它，如图\
    \ 10-12 所示。我们只需要读取这些变量的值，因此将它们作为只读变量传递。\n\n*图 10-12. 在内部脚本任务中配置只读变量*\n\n此脚本任务的脚本很简单，如下所示：\n\
    \n```\npublic void Main()\n{\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
    \    MessageBox.Show(String.Format(\"{0}, {1}, {2}, {3}, {4}, {5}\",\n       \
    \ Dts.Variables[\"User::Filename\"].Value.ToString(),\n        Dts.Variables[\"\
    User::Extension\"].Value.ToString(),\n        Dts.Variables[\"User::Filepath\"\
    ].Value.ToString(),\n        Dts.Variables[\"User::CreatedDate\"].Value.ToString(),\n\
    \        Dts.Variables[\"User::ModifiedDate\"].Value.ToString(),\n        Dts.Variables[\"\
    User::IsReadOnly\"].Value.ToString()));\n}\n```\n\n此脚本只是获取传入的只读变量的值，并在 Windows\
    \ 消息框中显示它们。结果如图 10-13 所示，是在每次迭代中显示每个文件的元数据的弹出式消息框。\n\n*图 10-13. 在每次循环迭代中显示文件元数据*\n\
    \n在这个例子中，我们简化了结果，只是在弹出式消息框中显示文件元数据，但在实际应用中，你可能会使用这些元数据来备份、删除或根据某些特定标准选择要处理的文件。这里的关键点是，第一个脚本任务检索数据，并通过\
    \ Foreach 循环容器设置的变量使其可供第二个脚本任务访问。\n"
- fmt: "## Script Component Source\n\nSSIS允许你使用**Script task**向控制流中添加.NET代码。你也可以使用**Script\
    \ Component transformation**，以其他SSIS内置组件原生不支持的方式，用.NET来操纵数据。**Script Component\
    \ transformation**有三种操作模式：你可以用它来创建基于.NET脚本的数据源、目标和转换组件。与内置数据流组件类似，**Script Component\
    \ source**检索数据并将其推入数据流，**Script Component destination**从数据流接收数据并将其推送到存储，而**Script\
    \ Component transformation**则在数据流中操纵你的数据。\n\n当你将脚本组件拖入数据流时，BIDS会弹出一个菜单让你选择组件类型，如图10-14所示。要创建**Script\
    \ Component source**，请从弹出菜单中选择`Source`。**Script Component source**没有输入，但至少有一个输出，并且在设计上始终是同步的。\n\
    \n![](index-376_1.jpg)\n\n![](index-376_2.jpg)\n\n*图 10-14. 从弹出菜单中选择脚本组件类型*\n\n\
    在我们的例子中，我们没有将数据从**Script Component source**推送到输出，而是将其推送到一个`RowCount`组件，并在源的输出上启用了数据查看器。这是测试SSIS数据流的常用方法，因为它允许你在ETL过程中“实时”查看数据，而无需将其持久化到输出。我们的数据流示例如图10-15所示。\n\
    \n![](index-377_1.jpg)\n\n*图 10-15. 带有 Script Component source 的数据流*\n\n将脚本组件拖到数据流上并选择源类型后，我们必须对其进行配置。第一步是向脚本组件输出中添加列。为此，我们打开了`Script\
    \ Component Editor`并转到`Inputs and Outputs`页面。在那里，我们点击`Output 0`下的`Output Columns`，并点击`Add\
    \ Column`按钮七次。这些列以默认名称添加，如`Column 1`、`Column 2`等，所有列的默认数据类型均为四字节有符号整数[DT_I4]。\n\
    \n我们将每个列重命名，使名称更具描述性，并将每个列的数据类型更改为字符串[DT_STR]，长度为200。唯一的例外是`Description`列，我们将其长度更改为2000。图10-16显示了编辑器的`Inputs\
    \ and Outputs`页面。\n\n■ **TIP:** 除了更改输出中列的名称外，你还可以更改输出本身的名称。在此示例中，我们保留了`Output\
    \ 0`的默认名称。\n\n![](index-376_1.jpg)\n\n*图 10-16. 向脚本组件输出添加列*\n\n**Script Component\
    \ source**继承自`UserComponent`类并实现了其三个方法。当脚本组件执行时，这些方法按以下顺序调用：\n\n1.  `PreExecute()`方法在脚本组件启动时、任何行添加到输出之前准确触发一次。\n\
    2.  `CreateNewOutputRows()`方法也针对脚本组件调用一次。正是在这个方法中，你可以向输出添加新行，通常使用某种循环。\n3.  `PostExecute()`方法在脚本组件结束时、你完成向输出添加行后触发一次。此方法对于在脚本组件完成后执行任何清理任务很有用。\n\
    \n在我们的例子中，我们获取了CNN头条新闻RSS源。*简易信息聚合（RSS）*是一种用于聚合网络内容（如博客文章和新闻报道）的XML格式。在脚本组件中，我们使用.NET获取最新的RSS源文档，并将XML分解为行和列，然后将其放入组件的输出缓冲区中。首先，我们在`ScriptMain`类级别声明了一个.NET\
    \ `XmlDocument`对象来保存我们的RSS源页面，如下所示：\n\n```csharp\n[Microsoft.SqlServer.Dts.Pipeline.SSISScriptComponentEntryPointAttribute]\n\
    public class ScriptMain : UserComponent\n{\n    // XML Document to hold RSS feed\
    \ page\n    XmlDocument RssXML = null;\n    bool b = true;\n    string ComponentName\
    \ = \"\";\n    // Method overrides will go here...\n    ...\n}\n```\n\n`PreExecute()`方法首先获取脚本组件的名称，以便稍后在日志消息中使用。然后它调用`base.PreExecute()`方法。虽然调用基方法并非总是必要，但最好调用它们以确保不会错过它们提供的任何功能。接下来，我们使用.NET内置的`HttpWebRequest`和`HttpWebResponse`类来检索CNN\
    \ RSS源并将其放入`RssXML`变量。\n\n我们在这里还使用了`ComponentMetaData.FireInformation()`方法，它触发对记录调试信息有用的`OnInformation`事件。由于我们的代码依赖于我们无法控制的外部资源（即网站），我们将Web请求包装在`try-catch`块中。如果捕获到异常，我们使用`FireError()`方法触发`OnError`事件。数据流组件中的`FireError()`方法不会停止数据流。错误会向上传播到`Data\
    \ Flow task`，此时SSIS根据包设置决定是否停止处理。对于此组件的预执行阶段，失败意味着由于某种原因我们没有好的XML数据可供处理，因此没有继续下去的意义。因此，我们通过使用`throw`语句重新抛出异常来强制硬停止。\n\
    \n```csharp\npublic override void PreExecute()\n{\n    // Get Name of Component\n\
    \    ComponentName = this.ComponentMetaData.Name;\n    // Fire OnInformation event\
    \ for starting\n    this.ComponentMetaData.FireInformation(-1, ComponentName,\
    \ \"Beginning Pre-execute\", \"\", 0, ref b);\n    // Perform base PreExecute()\
    \ method\n    base.PreExecute();\n    try\n    {\n        // Fire OnInformation\
    \ event for getting RSS feed data\n        this.ComponentMetaData.FireInformation(-1,\
    \ ComponentName, \"Start - Getting RSS Feed data (Pre-execute)\", \"\", 0, ref\
    \ b);\n        // Retrieve RSS feed\n        HttpWebRequest req = (HttpWebRequest)HttpWebRequest.Create(\"\
    http://rss.cnn.com/rss/cnn_topstories.rss\");\n        HttpWebResponse res = (HttpWebResponse)req.GetResponse();\n\
    \        Stream str = res.GetResponseStream();\n        // Put RSS feed document\
    \ into XML Document\n        RssXML = new XmlDocument();\n        RssXML.Load(str);\n\
    \        // Fire OnInformation event for getting RSS feed data\n        this.ComponentMetaData.FireInformation(-1,\
    \ ComponentName, \"Complete - Getting RSS Feed data (Pre-execute)\", \"\", 0,\
    \ ref b);\n    }\n    catch (Exception ex)\n    {\n        // Fire OnError event\
    \ if an error occurs\n        this.ComponentMetaData.FireInformation(-1, ComponentName,\
    \ ex.ToString(), \"\", 0, ref b);\n        // Rethrow exception to stop processing\n\
    \        throw (ex);\n    }\n    finally\n    {\n        // Fire OnInformation\
    \ event for finished\n        this.ComponentMetaData.FireInformation(-1, ComponentName,\
    \ \"Finished Pre-execute\", \"\", 0, ref b);\n    }\n}\n```\n\n我们没有任何特殊的后执行处理需要执行，但我们仍然必须重写`PostExecute()`方法。在这种情况下，我们在`PostExecute()`中所做的只是调用`base.PostExecute()`方法：\n\
    \n```csharp\npublic override void PostExecute()\n{\n    // Perform base PostExecute()\
    \ method\n    base.PostExecute();\n}\n```"
  raw: '■ **CAUTION:** In our example, we used a Windows message box to display variable
    values in the Script task. This is a very useful feature for SSIS script development
    and troubleshooting. Make sure you don’t use message boxes in packages that you
    deploy to production, however, because this will cause a scheduled job to hang
    or fail.


    Script Component Source


    SSIS allows you to add .NET to your control flow with the Script task. You can
    also use .NET to manipulate your data in ways the other SSIS stock components
    don’t natively support with the SSIS


    Script Component transformation. The Script Component transformation has three
    modes of operation: you can use it to create .NET script-based source, destination,
    and transformation components. As with the stock data flow components, a Script
    Component source retrieves data and pushes it into the data flow, a Script Component
    destination accepts data from the data flow and pushes it out to storage, and
    a Script Component transformation manipulates your data within the data flow.


    When you drag a script component into your data flow, BIDS presents you with a
    pop-up menu to select the component type, as shown in Figure 10-14\. To create
    a Script Component source, choose Source from the pop-up menu. The Script Component
    source has no inputs, but at least one output, and is always synchronous by design.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-376_1.jpg)


    ![](index-376_2.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-14\. Selecting the script component type from the pop-up menu*


    Instead of pushing the data from our Script Component source to an output, we
    just pushed it into a Row Count component and enabled the data viewer on the source’s
    output. This is a common method of testing SSIS data flows, because it allows
    you to review your data “in flight” during the ETL process without the hassle
    of persisting it to output. The data flow for our example looks like Figure 10-15.


    *Figure 10-15\. Data flow with Script Component source*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-377_1.jpg)


    CHAPTER 10  SCRIPTING


    After we dragged the script component onto the data flow and selected the source
    type, we had to configure it. The first step was adding columns to the script
    component output. To do this, we opened the Script Component Editor and went to
    the Inputs and Outputs page. Once there, we clicked on the Output Columns of Output
    0 and clicked the Add Column button seven times. The columns are added with default
    names such as Column 1, Column 2, and so on, all with a default data type of four-byte
    signed integer [DT_I4].


    We renamed each column to make the names more descriptive and changed the data
    type for each to string [DT_STR] with a length of 200\. The one exception is the
    Description column, which we changed to string [DT_STR] with a length of 2000\.
    Figure 10-16 shows the Inputs and Outputs page of the editor.


    ■ **TIP:** In addition to changing the name of the columns in the output, you
    can also change the name of the output itself. In this example, we kept the default
    name of Output 0.


    *Figure 10-16\. Adding columns to the script component output*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10  SCRIPTING


    The Script Component source inherits from the UserComponent class and implements
    three of its methods. The methods are called in the following order when the script
    component executes: 1\. The PreExecute() method fires exactly once when the script
    component starts, before any rows are added to the output.


    2\. The CreateNewOutputRows() method is also called once for the script


    component. It is in this method that you can add new rows to the output, most


    often with a loop of some sort.


    3\. The PostExecute() method fires once when the script component ends, after


    you have finished adding rows to the output. This method is useful for


    performing any cleanup tasks after your script component has completed.


    In our example, we grabbed the CNN Top Stories RSS feed. *Really Simple Syndication
    (RSS)* is an XML format used for syndicating web content, such as blog posts and
    news stories. In the script component, we used .NET to grab the latest RSS feed
    document and shred the XML to rows and columns, which we then placed into the
    component’s output buffer. To begin, we declared a .NET


    XmlDocument object at the ScriptMain class level to hold our RSS feed page first,
    as shown here:


    [Microsoft.SqlServer.Dts.Pipeline.SSISScriptComponentEntryPointAttribute]


    public class ScriptMain : UserComponent


    {


    // XML Document to hold RSS feed page


    XmlDocument RssXML = null;


    bool b = true;


    string ComponentName = "";


    // Method overrides will go here...


    ...


    }


    The PreExecute() method starts by grabbing the name of the script component for
    use in logging messages later. It then calls the base.PreExecute() method. Although
    it may not always be necessary to call base methods, it’s a good idea to call
    them to ensure that any functionality they provide is not missed. Next we used
    .NET’s built-in HttpWebRequest and HttpWebResponse classes to retrieve the CNN


    RSS feed and place it in the RssXML variable.


    We also used the ComponentMetaData.FireInformation() method here, which fires
    OnInformation events that are useful for logging debugging information. Because
    our code is dependent on an external resource out of our control (namely a web
    site), we wrapped the web request in a try-catch block. If an exception is caught,
    we fire an OnError event with the FireError() method. The FireError() method in
    a data flow component doesn’t stop the data flow. The error is propagated up to
    the Data Flow task, at which point SSIS decides whether to stop processing or
    not (based on package settings). In the case of the pre-execute phase of this
    component, a failure means we don’t have good XML data to process for some reason,
    so there’s no point in continuing. Therefore, we force a hard stop by rethrowing
    the exception with a throw statement.


