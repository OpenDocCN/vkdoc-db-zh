    # CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    ## Default Values


    For most programming languages, you need to initialize a variable or at the least
    assign it a value before you can use it in a statement. The `Value` column allows
    you to specify the *default values* for the variables in SSIS. Certain data types
    automatically provide a default such as the `DateTime` and `Int32`, while others
    such as the `Object` data type will not accept any default values. The `DateTime`
    variables will use the time and date that they were created as their default value,
    while the default value for `Int32` variables is `0`. If you do not provide a
    valid value when setting defaults, you will receive an error dialog box similar
    to the one shown in Figure 9-10. The most common places for the values of variables
    to change are `Execute SQL` task and `Script` tasks.


    *Figure 9-10. Invalid Variable Default Value error message*


    ## Namespaces


    *Namespaces* are one of the best ways to organize your variables. They allow you
    to group your variables in any way you see fit. The convention we showed in Figure
    9-8 groups the variables by the function they serve in the ETL process. We use
    the `Extract` namespace when we need variables that will be used during the extract
    phase, the `Transformation` namespace when we need a variable to use in the transformation
    of the data, and the `Load` namespace if we need to modify the data before we
    load it. The default namespace for a user-defined variable is `User`, and because
    we always create variables with a very specific purpose in mind, we should use
    this feature to our advantage.


    One slight drawback to using namespaces is that the lists of variables are sorted
    by the name rather than the extended name (`Namespace::Name`) in the `Expression
    Builder` or any editor that exposes the list in a drop-down. In `Expression Builder`,
    the `RunTime` variable will be referred to as `@[Audit::RunTime]`. In the drop-down
    lists that show variables, it will appear as `Audit::RunTime`. The namespaces
    are case sensitive, because they are part of the variable identifier.


    ## System Variables


    SSIS provides variables that allow you to view minute details about a package
    and its objects. These variables are known as *system variables*, and they belong
    to the `System` namespace. These variables are accessible in most of the scopes,
    but depending on the scope in which they are area accessed the values might be
    different In order to access these variables, you must use `@[System::<<variable_name>>]`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    ## Package System Variables


    System variables that belong to the package show important information about the
    package itself. All the objects defined within the package have access to these
    variables. Table 9-2 lists all the package system variables and their data types.


    *Table 9-2. Package System Variables*


    **Name** | **Data Type** | **Description**

    --- | --- | ---

    `CancelEvent` | `Int32` | Identifier for a Windows Event object that signals the
    task to stop execution.

    `CreationDate` | `DateTime` | The date on which the package was created.

    `CreatorComputerName` | `String` | The computer on which the package was created.

    `CreatorName` | `String` | The username of the package creator.

    `ExecutionInstanceGUID` | `String` | Unique identifier of the package’s execution.
    The string represents hexadecimal values.'
