    added an Execute SQL task executable, SQL_TruncateCensusStatistics, in order to
    run the package without having to truncate the table between executions of the
    package. The Data Flow task, DFT_TransformCensusData, is more complex in comparison
    to DFT_MovePopulationDensityData because of the components we had to use to meet
    the requirements. The transformation components we will introduce to you are the
    Derived Column, Sort, Merge Join, and Unpivot components.


     **CAUTION:** The Sort component can be an extremely memory-intensive component,
    depending on the data volumes. If you are using large flat files, we recommend
    that you store the data in properly indexed staging tables and use the database
    to perform the necessary joins. Because our US Census flat files are relatively
    small, we can use a Sort component for our example.


    Execute SQL Task


    SQL_TruncateCensusStatistics requires an OLE DB connection for it to execute the
    SQL statement contained within it. This executable can be used for many purposes,
    from extracting data from a database and storing it as an object for the SSIS
    package to access to executing update statements. For our purposes, we will use
    it to truncate the table every time we run the package. The green arrow, a precedence
    constraint, ensures that the Execute SQL task completes execution before the Data
    Flow task starts executing. DFT_TransformCensusData will execute only on the successful
    completion of SQL_TruncateCensusStatistics. Figure 3-22 shows the configuration
    of the Execute SQL task. There are some key attributes of the task that we modified
    before we placed the executable: Name is a unique identifier for the task in the
    control flow. No two tasks of the same type can have the same name. This name
    is the label that is displayed in


    the control flow designer.


    Description is a text field that provides a short explanation of the task’s


    function in the package. It is not required to modify this attribute but it can
    help those who are new to the package understand the process more easily.


    Connection, a required attribute, is blank by default. Because we want to


    truncate the destination table, we use the same connection manager as the OLE


    DB destination component. There is no need to create a new connection


    manager just for the Execute SQL task.


    SQL Statement contains the DDL, Data Manipulation Language( DML), or


    Data Access Language, DAL, statements that need to be executed. As you can


    see in Figure 3-23, we put in one statement followed by a batch terminator and


    GO. When you modify the statement, a text editor opens and you can type the


    statement. Without the text editor, you cannot place GO on a new line and thus


    will have an error when you execute the package.


