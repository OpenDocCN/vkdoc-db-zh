    ■ **NOTE:** You’ll notice we had to copy and paste the `script component` in this
    example to duplicate its functionality. This makes these `script components` in
    particular prime candidates for conversion to SSIS custom components. We explore
    custom components in Chapter 22.


    ## Summary


    This concludes our discussion of scripting in SSIS. In this chapter, we discussed
    the `Script task`, which lives in the control flow, and the flexible `script component`,
    which can serve multiple purposes within a data flow. The `script component` can
    act as a data flow source, a transformation, or a destination, allowing you to
    take full advantage of .NET scripting in either VB or C# to add powerful processing
    capabilities to your package, above and beyond what the stock components offer.
    The next chapter covers SSIS errors and event handling.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 11 Events and Error Handling


    *We are ready for any unforeseen event that may or may not happen.*

    —Dan Quayle, former vice president of the United States


    One of your tasks in building enterprise ETL solutions is making it ready to deal
    with unforeseen events—the kind that may or may not happen, as Dan Quayle so eloquently
    points out. Some of this planning comes in the form of infrastructure planning
    (such as hardware sizing and network and storage capacity planning), but a robust
    ETL system requires that you also focus attention on building in error handling.
    Although much of your attention will be focused on issues you can anticipate,
    unforeseen events can cause the biggest heartburn. This chapter covers SSIS events
    and event handling, as well as error handling and recovery.


    ## SSIS Events


    If you’ve written .NET Windows Forms programs or JavaScript functions for dynamic
    web pages, you are probably already familiar with the concept of *events*. Events
    are fired in response to specified activities.


    In a GUI-driven .NET application, you might capture events such as mouse clicks
    and keystrokes. In an application such as SSIS, which is not GUI driven, the events
    don’t depend on external user interface interactions but are instead driven by
    data processing activities.


    Events in SSIS come in two flavors: events with event handlers, and *logging events*,
    which simply log information but have no event handlers. Events with event handlers
    give you an opportunity to run your own customized subroutines in response to
    events. In SSIS, event handlers are simply containers that hold a control flow
    which fires in response to an event. You can add any tasks to this control flow,
    although the most commonly used tasks tend to be `Script tasks`, `Execute SQL
    tasks`, and `Data Flow tasks`.


    SSIS incorporates events into every ETL package you design. By default, SSIS raises
    several types of standard events at the task, container, and package levels. The
    built-in SSIS events are listed in Table 11-1 with the level at which they are
    fired.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Table 11-1. Common SSIS Events


    | Event | Event Is Fired... |

    | :--- | :--- |

    | `Diagnostic` | ...to log diagnostic information at the package level |

    | `OnError` | ...when an error occurs |

    | `OnExecStatusChanged` | ...when execution status changes |

    | `OnInformation` | ...when an information event occurs |

    | `OnPipelinePostEndOfRowset` | ...after the end-of-rowset signal is sent in the
    data flow |

    | `OnPipelinePostPrimeOutput` | ...after the call to the `PrimeOutput()` method
    |

    | `OnPipelinePreEndOfRowset` | ...immediately before the end-of-rowset signal
    is sent |

    | `OnPipelinePrePrimeOutput` | ...before the call to the `PreOutput()` method
    |

    | `OnPipelineRowsSent` | ...when rows are provided to a data flow component as
    input |

    | `OnPostExecute` | ...after execution completes |

    | `OnPreExecute` | ...before execution begins |

    | `OnPreValidate` | ...before validation |

    | `OnProgress` | ...at specified progress intervals |

    | `OnQueryCancel` | ...when the `QueryCancel()` event is called to determine whether
    to cancel package execution |

    | `OnTaskFailed` |'
