- fmt: '# CHAPTER 10 SCRIPTING


    The first method, which is called during package design in BIDS and when the package
    is run, is `AcquireConnections()`. We use this method to grab the full path to
    the target file from the `FileConnection` connection manager.


    ```

    public override void AcquireConnections(object Transaction)


    {


    base.AcquireConnections(Transaction);


    IDTSConnectionManager100 connmanager = this.Connections.FileConnection;


    filename = (string)connmanager.AcquireConnection(null);


    }

    ```


    Our next methods are `PreExecute()` and `PostExecute()`. These methods are called
    at the beginning and end of package execution. In the `PreExecute()` method, we
    open the output file for writing. In the `PostExecute()` method, we write the
    closing tags for our HTML table and page out to the file, and then flush and dispose
    of the `TextWriter` object.


    ```

    public override void PreExecute()


    {


    base.PreExecute();


    outputfile = new StreamWriter(filename, false);


    }


    public override void PostExecute()


    {


    base.PostExecute();


    outputfile.Write("</table></body></html>");


    outputfile.Flush();


    outputfile.Dispose();


    }

    ```


    As we showed with the previous components, the script component exposes inbound
    columns by name, by using the buffer object in the `ProcessInputRow()` method.
    For instance, we could access the `FeedTitle` columns by using syntax such as
    the following:


    `string title = Row.FeedTitle;`


    In this instance, however, we want to be a little cleverer in our solution. Partly
    because we have to create this same destination script component twice (once for
    each output of our asynchronous transformation script component), we don’t want
    to hard-code the column names into the component.


    We’d rather just copy and paste the code. This means we need to output every input
    column regardless of the inbound column metadata. To do this, we need to introduce
    a new method of the script component, the `ProcessInput()` method:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ```

    public override void ProcessInput(int InputID, string InputName, PipelineBuffer
    Buffer, OutputNameMap OutputMap)


    {


    if (!headerout)


    {


    outputfile.Write("<html>\n<body>\n<table border=\"1\">\n<tr>"); foreach (IDTSInputColumn100
    column in


    this.ComponentMetaData.InputCollection[0].InputColumnCollection)


    {


    outputfile.Write("<th>{0}</th>", column.Name);


    }


    outputfile.Write("</tr>");


    headerout = true;


    }


    while (Buffer.NextRow())


    {


    outputfile.Write("<tr>");


    for (int i = 0; i < Buffer.ColumnCount; i++)


    {


    outputfile.Write(string.Format("<td>{0}</td>", Buffer[i].ToString()));


    }


    outputfile.Write("</tr>");


    }


    }

    ```


    The `ProcessInput()` method (notice the lack of an input name prefix on this method)
    gives us direct access to the `ComponentMetadata` and the `PipelineBuffer`. This
    means we can get the column names for writing out our table header row and the
    contents of every column of every row, all accessible by indexer (essentially
    array subscripts).


    The first step in our implementation was to check whether we’d written out the
    HTML table header.


    If not, we iterate the input columns (`IDTSInputColumn`) in the `InputColumnCollection`.
    We grab the names from these and write them out to the HTML table header. We also
    set the flag indicating the header has been written, so we don’t write it out
    again. This is important because the `ProcessInput()` method may be called multiple
    times by the SSIS runtime. Finally we iterate the buffer rows with the `Buffer.NextRow()`
    method. In this loop, we iterate the input buffer columns and output the values
    as HTML table data elements.


    We copied and pasted the destination script component and put the copy at the
    end of the `KeywordOutput` to generate a second HTML file. The result looks like
    Figure 10-33.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-402_1.jpg)


    *Figure 10-33. SSIS package with two destination script components*


    The end result of our destination script components are a couple of HTML files
    with the data flow column data saved in HTML files, as shown in Figure 10-34.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-403_1.jpg)'
