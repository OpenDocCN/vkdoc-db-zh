- fmt: "# CHAPTER 2 - BIDS AND SSMS\n\n## 代码片段示例\n\n```\nIF EXISTS\n(\n    SELECT\
    \ *\n    FROM sys.objects\n    WHERE object_id = OBJECT_ID(N'[$SchemaName$].[$Tablename$]')\n\
    \    AND type in (N'U')\n)\nDROP TABLE [$SchemaName$].[$Tablename$];\nGO\n\nCREATE\
    \ TABLE $SchemaName$.$Tablename$\n(\n    $column1$ $datatype1$,\n    $column2$\
    \ $datatype2$\n);\nGO\n\n$end$]]>\n</Code>\n\n</Snippet>\n\n</CodeSnippet>\n\n\
    </CodeSnippets>\n```\n\n## 代码片段关键组件\n\n代码片段中的一些关键组件在清单2-4中突出显示，并在此详细说明：[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**Title** 是Management Studio用来唯一标识你的自定义片段的名称。将片段添加到集合的向导如果检测到与同一文件夹路径中的现有片段发生冲突，将强制重命名该片段。\n\
    \n**Literal** 定义了代码片段中可以快速替换的部分。使用 Tab 键可以在代码中的字面量之间切换。字面量可以定义为默认值，该值可以设置为参数。将参数用作字面量的默认值，是“为模板参数指定值”实用工具能被用于代码片段的关键。\n\
    \n**Code** 包含要插入到脚本中的实际代码。代码块将按原样插入到 CDATA 块中。它将保留空白字符，并用指定的默认值替换字面量。\n\n使用片段插入器插入代码片段后，你可以使用\
    \ Tab 键在查询中导航，方法是自动高亮显示替换点并用你自己的字符串替换它们。对于重用代码的更复杂片段，利用参数可能是一个更好的主意，如我们在清单2-4中所示。这使你能够利用Management\
    \ Studio中的“为模板参数指定值”功能。\n\n## 用于 SSIS 的查询\n\n在Management Studio中创建的查询可以保存在文件系统上，以便轻松地并入SSIS。例如，OLE\
    \ DB源组件在其编辑器中有一个“浏览”按钮，允许你将保存在文件系统上的查询作为源组件的SQL命令导入。仅当使用“SQL命令”作为数据访问模式时，此选项才可用。\n\
    \n如果查找组件设置为使用SQL查询的结果，也可以导入查询。\n\n通过此功能，开发人员可以更轻松地编写用于提取数据的SQL，并根据需要直接将其导入到他们的SSIS包中。将此功能与Management\
    \ Studio的代码片段功能相结合，复杂的连接和where子句可以存储起来，以便于在任何脚本中访问。\n\n## 总结\n\nSQL Server 12通过其Business\
    \ Intelligence Development Studio提供了整个商业智能工作所需的功能。本章介绍了工具库中一个重要工具——Integration\
    \ Services——的所有新功能和增强功能。我们还介绍了维护和管理SQL套件的关键组件Management Studio。最后，我们描述了所有这些组件如何共同构建一个端到端的解决方案，以及为提高开发人员代码复用性而进行的一些增强。第3章将引导你开发你的第一个包，并向你介绍一些你应该从一开始就养成的使用习惯的最佳实践。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# CHAPTER 3 - Hello World—Your\
    \ First SSIS 2012 Package\n\n> *Take the first step in faith. You don't have to\
    \ see the whole staircase, just take the first step.*\n>\n> —Civil Rights Movement\
    \ leader Martin Luther King Jr.\n\n在上一章中，我们向你介绍了SQL Server 12的开发工具BIDS和SSMS。\n\
    \n在深入讨论细节之前，我们将通过一些示例包来演示这个强大工具集的功能。作为一名开发人员，在亲自尝试这些工具之后，你更容易理解它们。本章教你如何从最简单的包开始，该包由一个仅包含源和目标的数据流任务组成。在引导你创建这个简单的包之后，我们将指导你完成一个更复杂的、现实生活中包的例子。这个包的目标将是模拟一些可能成为你ETL流程一部分的潜在需求，因此作为一个相对复杂的例子在第三章中介绍。\n\
    \n在引导你创建第一个包之前，我们没有涵盖所有细节，原因是SSIS拥有大量的工具集，其中大多数不会同时一起使用。例如，大多数项目只会使用少数几个连接管理器，而SSIS有更多可用的。根据项目的要求，由SSIS处理的流程可能必须与其他工具分开。本章快速浏览了SSIS的一些功能。\n\
    \n在本章中，我们的数据来自美国人口普查局网站，[http://2010.census.gov/2010census/data/](http://2010.census.gov/2010census/data/)。我们在本章中使用了Apportionment和Population\
    \ Density数据集。我们对数据所做的唯一更改是删除了一些页眉和页脚记录，以使开发SSIS 12包的介绍保持简单。实际数据本身未被修改。\n\n*Apportionment*\
    \ 指的是根据人口将众议院的总席位分配给50个州。*Population Density* 报告了该州每平方英里的平均人口。\n\n## Integration\
    \ Services 项目\n\n正如我们在前一章所讨论的，SSIS开发的关键是BIDS中的Integration Services项目。项目文件可以组织与ETL过程相关的所有文件。当你首次创建项目时，Visual\
    \ Studio会自动为项目创建第一个包，并将其命名为`Package.dtsx`。第一个包将完全为空，初始设计器将显示控制流。一旦生成包，你就有能力重命名它。\n\
    \n## 关键包属性\n\n包具有根据其提供的功能组织的属性。这些属性执行ETL过程的功能性和非功能性需求。功能性需求包括提取、转换和加载（ETL）的原则，而非功能性需求负责ETL过程的健壮性、性能和效率、可维护性、安全性、可扩展性、可靠性以及整体质量。在项目中创建新包时，我们建议你查看以下属性：\n\
