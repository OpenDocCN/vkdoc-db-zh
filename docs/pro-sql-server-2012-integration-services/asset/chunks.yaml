    \n### Data Access Mode drop-down\n决定源适配器如何从 OLE DB 源检索数据。共有四个选项：\n\n- **Table\
    \ or View mode**：让你选择数据库中的一个表或视图作为源。此模式返回表中的所有列，类似于`SELECT *`查询，但因源需要自行检索表元数据，开销稍大。\n\
    \n- **Table Name or View Name Variable mode**：让你将表或视图的名称存储在字符串变量中，以便在运行时检索。此模式也类似于`SELECT\
    \ *`查询，返回表的所有列，包括你可能不需要的列。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 7 – SOURCE AND DESTINATION ADAPTERS**\n\n### Option Description\n\n\
