    \ dbo.StateFactGrouping sfg2\nON sfg1._key_out = sfg2._key_in\nAND sfg1._key_in\
    \ <> sfg2._key_in\n;\nGO\n\nSELECT sfg.Name,\n       sfg.Capital,\n       sfg.Fact_clean\n\
    FROM dbo.StateFactGrouping sfg\n;\nGO\n```\n\n图 12-29 和 12-30 展示了代码清单 12-5 所示查询的结果。你甚至可能通过查看图\
    \ 12-28 就能确定用于匹配的词元。例如，对于科罗拉多州和路易斯安那州，用于匹配的词元很可能是“唯一州”。至于亚利桑那州和蒙大拿州，“国家公园”是最可能的候选词元。这些匹配的分数相对较低，因为我们设置了\
    \ 0.08 的相似度阈值。匹配到的事实通常是较短的字符串匹配到包含大量相关词元的较长字符串。\n\n*图 12-29. 模糊分组结果*\n\n此处展示的结果集仅演示了如何使用匹配后的数据，而非原始值。当试图启动数据清洗项目时，此变换可提供一些有用的见解。业务名称、地址和其他联系信息可以通过正确使用此组件轻松整合。当数据开始遵循标准化集合时，模糊分组变换的价值便开始显现。\n\
    \n*图 12-30. 模糊分组数据替换后*\n\n## 数据预览\n\nSSIS 最有用的功能之一是能够查看数据在数据流任务中流动的过程。有几种选项可让你抽样数据。数据查看器让你能以各种形式查看数据流任务中两个不同组件之间的数据。行采样和百分比采样变换则允许你直接从数据集中提取样本数据。\n\
    \n### 数据查看器\n\n*数据查看器* 选项让你能在数据流通过数据流任务时快速查看数据流的快照。查看器可以在数据流任务中任意两个组件之间启用。\n\n\
    图 12-31 展示了如何在数据流任务上定义数据查看器。要启用数据查看器，你需要右键单击两个组件之间的连接并选择“启用数据查看器”。\n\n*图 12-31.\
    \ 启用数据查看器*\n\n启用数据查看器后，所选连接上会出现一个小图标。该图标是一个小放大镜，表示对管道中某一时间点的深入查看。\n\n图 12-32 展示了一个启用了数据查看器的连接。数据查看器能在开发过程中为你提供极大帮助，因为它可以让你在不将数据提交到表或对象变量的情况下查看数据。此对象有助于数据分析的一个方面是数据转换。假设你的数据转换变换因没有非常具体的错误消息而失败。数据查看器可以帮助你识别导致错误的行，让你能够采取行动修复错误数据或忽略它。数据查看器还可用于评估查找组件或合并连接变换的成功程度。\n\
    \n*图 12-32. 已启用的数据查看器*\n"
