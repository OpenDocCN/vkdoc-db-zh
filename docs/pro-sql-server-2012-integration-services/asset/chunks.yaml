    \n这与 SQL Server 中游标提供的功能非常相似。\n\n*图 9-17. 记录集目标 — 列映射*\n\n## Foreach 循环容器\n\n\
    SSIS 中的`Foreach 循环`容器可以利用`Object`数据类型变量作为其迭代器。为了加载数据，我们首先需要将数据加载到我们打算使用的变量中。我们演示了使用记录集目标加载数据。如图\
