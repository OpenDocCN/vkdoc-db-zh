    In the Excel Destination Editor, we selected the newly created Excel Connection
    Manager, set the data access mode to Table or View, and chose the name of the
    first worksheet, Sheet1$, as shown in Figure 7-33.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-242_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    *Figure 7-33\. Configuring the Excel destination adapter in the Excel Destination
    Editor* Raw Files


    Whenever you read from or write to a flat file, there are thousands of data conversions
    taking place in the background. Consider an integer number such as 2,147,483,647\.
    This number uses only 4 bytes of memory in your computer. But when you write it
    out to a flat file, it’s converted to a string of numeric digits 10 characters
    long. That’s more than double the storage and a performance hit because of the
    conversion. When you read the number back in from a flat file, you have to read
    in 10 characters and you get hit with another conversion penalty. Granted, the
    size difference and performance impact isn’t that much for a single number, but
    multiply that by 10 columns and 1,000,000 rows (which is not an unreasonable example),
    and suddenly you’re talking about a noticeable change in both performance and
    storage space.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    For day-to-day file transfers and imports/exports from and to other systems, flat
    files are the way to go. In a lot of cases, flat files aren’t all that large,
    so the size and performance differences aren’t significant. But more important,
    when transferring data between systems, you can’t go wrong with plain text. Accounting
    for some variation between character sets, every system reads text, and every
    system writes text.


    Sometimes, however, you may find a need to temporarily store large volumes of
    partially processed data during processing. A common example is when a large number
    of rows have been pushed through an SSIS package, a lot of processing has taken
    place, and you need to pick up the data in another SSIS


    package (or a different data flow in the same package) for further processing.
    To maximize efficiency of your SSIS interpackage processing, raw files are hard
    to beat.'
