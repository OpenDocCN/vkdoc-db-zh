     `NOTE:` This dynamic parent package had a similar setup to the dynamic parent
    package demonstrated in Chapter 16\. As you can see, the disabled child package
    did not append a string to the file indicating that the package property value
    was overwritten by the parameter mapping that was configured in the parent package.


    ## The Import Process


    The `import process` refers to using the Integration Services Import Project Wizard
    to import an existing project into a new one. The wizard looks very similar to
    the deployment wizard except that it does not allow you to specify a destination
    for the imported project. After you import the project from its source, you can
    copy and paste it to the appropriate location. We discussed this process in Chapter
    2.


    ## The Migration Process


    The `migration process` has been introduced with this version of SSIS to allow
    for legacy projects to comply with the new deployment model and features. This
    process is used also because prior versions of 601


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-596_1.jpg)


    CHAPTER 19  DEPLOYMENT MODEL


    SSIS used Visual Studio 2005 and 2008, whereas the latest version uses Visual
    Studio 2010\. The Visual Studio Conversion Wizard is designed to make the process
    as painless as possible. When you attempt to open a project file from a prior
    version of SSIS, Visual Studio will automatically prompt you with the wizard shown
    in Figure 19-23\. This wizard will then guide you through the steps of upgrading
    your project files.


    *Figure 19-23. Visual Studio Conversion Wizard—Introduction*'
