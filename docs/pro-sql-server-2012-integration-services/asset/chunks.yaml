- fmt: '# Another Key Point of SSIS Versatility


    Another key point of versatility of SSIS is its ability to connect to a web server
    and execute methods against using web services. The `Web Service task` utilizes
    the `HTTP Connection Manager` to accomplish such requirements. Figure 5-35 shows
    the task in the control flow. The task’s icon is similar to that of the `FTP`
    task, except that the `Web Service task` icon does not have an image of a server
    overlapping the globe.


    The globe icon indicates that the task’s operations are done against a remote
    service.


    *Figure 5-35. Web Service task*


    ## Web Service Task Editor—General Page


    The General page of the `Web Service task` allows you to define the connection
    information necessary to connect to the web server. This is done mainly through
    the `HTTP Connection Manager` that needs to be defined before the rest of the
    properties of the task can be set. Figure 5-36 displays the General page of the
    task’s editor.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-151_1.jpg)


    *Figure 5-36. Web Service Task Editor—General page*


    The available properties are as follows:


    `HTTPConnection` lists all the `HTTP Connection Managers` defined in the package.
    Just like the `FTP` connections, the `HTTP` connections support only Windows authentication
    and anonymous authentication.


    `WSDLFile` provides the full path for the Web Services Description Language file
    that you need to use in order to execute methods against the web server. The file
    contains the methods available to the web service and their parameters. The file
    must exist in the defined path at runtime. At design time, you can create a new
    file with the `.wsdl` extension and use the overwrite property to download it
    from the web services.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-152_1.jpg)


    `OverwriteWSDLFile` specifies whether you should overwrite the file from the web
    server. This option allows you to download the latest file from the web server
    and overwrite the local copy of it.


    `Name` specifies the name of the `Web Service task`.


    `Description` provides a short explanation of the task’s objective.


    `Download WSDL` uses the `HTTP Connection Manager` to download the `WSDL` file
    from the web server. This button is enabled only when a local file path is provided.


    ## Web Service Task Editor—Input Page


    The Input page of the `Web Service task` allows you to specify the method on the
    web server and its parameters. The task will use the specified `HTTP Connection
    Manager` to call the method. It will use the `WSDL` file in order to populate
    the drop-down lists shown in Figure 5-37.


    *Figure 5-37. Web Service Task Editor—Input page*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-153_1.jpg)


    The following properties can be configured on the Input page:


    `Service` is a drop-down list of the web services available. Select the one required
    to execute the method.


    `Method` picks a method from a list that the web service can execute.


    `WebMethodDocumentation` provides a description of the web service method that
    is being called. The ellipsis button allows you to type a multiline description.


    `Name` lists the names of the method’s parameters.


    `Type` lists the data type of the method’s parameters. The `Web Service task`
    supports primitive data types such as integers and strings.


    `Variable` lists the variables that will store the values for the input parameters.


    `Value` allows you to type in the value directly.


    ## XML Task


    SSIS can be used in various operations on Extensible Markup Language (`XML`) data.
    The data can be stored in the form of variables or files, or even directly inputted.
    The task that is provided to handle these operations is the `XML task`. The results
    of the operations can be outputted into a file for review or further processing.
    Figure 5-38 shows the task as it appears in the control flow. The icon is a globe
    contained within tags denoting the markup format of the language.


    *Figure 5-38. XML task*'
