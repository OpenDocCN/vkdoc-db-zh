- fmt: '# CHAPTER 15 DATA FLOW TUNING AND OPTIMIZATION


    Let’s say this table contains 10 million rows of sales transaction data, with
    about 25,000 rows added to it daily. Let’s consider a simple ETL process that
    needs to retrieve the current day’s data from the table and export it to a flat
    file to be picked up by other processes—a common requirement when you need to
    feed legacy downstream systems. You have two options for identifying today’s records:
    (1) you can limit the data in SSIS by using the `Conditional Split` transformation
    or (2) limit the data on the server. To limit the inbound data with the `Conditional
    Split`, you’ll create a data flow like the one shown in Figure 15-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-510_1.jpg)


    Figure 15-2. Limiting inbound data with the `Conditional Split` transformation.
    We’ve added annotations to highlight how this data flow works. Notice that all
    10 million rows of data from our source table are pulled into the data flow by
    the source component. Ninety-nine percent of the rows being pulled in are unceremoniously
    discarded by the `Conditional Split` transformation to get at the 25,000 rows
    we actually want to export.


    The alternative is to limit the rows on the server by adding the `WHERE` clause
    to your `SELECT` query, as shown in Figure 15-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-511_1.jpg)


    Figure 15-3. Limiting source data at the server


    By limiting the data at the server in this example, you can eliminate millions
    of rows without pulling it all into SSIS first. If you have an index on the `SalesDate`
    column of the table, your query will be able to retrieve the data even more efficiently.
    The advantages of limiting the data on the server are twofold:


    *   You limit the number of rows being pulled into SSIS—of particular importance
    when you are pulling data across the network.

    *   You can retrieve data using fewer SSIS resources. In return, you are using
    more SQL Server resources, but by limiting the result set at the source, you can
    take advantage of many of SQL Server’s set-based optimizations—particularly if
    you are using columns with indexes or partitions to limit the data you retrieve.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-512_1.jpg)


    **TIP:** Apart from the SQL queries in the source component, SSIS data flow components
    cannot take advantage of SQL Server indexes.


    ## Performing Joins in the Database


    Performing joins on the server is an optimization that is closely related to the
    previous optimization of limiting the number of rows pulled into your data flow.
    Joins can help you efficiently limit the number of rows at the server. Picture
    the following scenario: you have 10,000 rows of data to pull into your data flow,
    and you have a million rows of lookup reference data. This type of imbalance is
    common in data warehousing applications, for instance, where a given dimension
    table is extremely large. You already know you won’t need more than 10,000 rows
    of lookup reference data (at most). If it can be avoided, there’s no point in
    pulling an extra 990,000 rows into your data flow only to discard them, as shown
    in Figure 15-4. This can easily be remedied by including selectivity at the data
    source to filter the rows that would later be discarded only after passing through
    the required memory buffers.


    Figure 15-4. Pulling large amounts of data in `Merge` task


    When there is a large imbalance in the size of the two data sets to be joined,
    it can often be done more efficiently on the server by using T-SQL join syntax.
    In addition to eliminating the extra network traffic that can be generated by
    pulling excessive data into your data flow, the SQL Server optimizer had multiple
    strategies it can use to fulfill a join request. SSIS can use only a `Merge Join`,
    which is basically a row-by-row scan of both data sets. The `Merge Join` works
    only with an equality-based join condition, and both sets of input must be presorted
    on the join columns. When you join on SQL Server, the query engine automatically
    sorts the source data as necessary, and the server will use indexes if they are
    defined on the join columns. SQL Server can also perform inequality joins (less
    than, greater than, and so forth) and supports the `CROSS JOIN` syntax.


    **NOTE:** Using a `Lookup` transformation component eliminates the need to perform
    a `Sort` operation on the lookup reference data, but incurs the same requirement
    to read all the source data. The `Lookup` transformation provides an alternative
    via its partial cache and noncached modes, but these modes can cost excessive
    round-trips to the server and might still not be as efficient as a server-side
    join. Also, like the `Merge Join` transformation, the `Lookup` transformation
    can’t use SQL indexes and table distribution statistics defined on your source
    tables.


    ## Sorting in the Database


    As we showed in the previous section, some of the data flow components—such as
    the `Merge Join` transformation—require sorted input. The `Sort` transformation
    in SSIS is a fully blocking component, meaning no rows can pass it until it has
    completed processing its entire input data set. SSIS has a single method of sorting
    data, whereas SQL Server has multiple strategies for fulfilling sort requests—the
    database can take advantage of indexes, for instance. Sorting at the database
    simply requires the addition of the `ORDER BY` clause to your `SELECT` query.
    When combined with joins and `WHERE` clause restrictions, sorting input at the
    database can significantly increase performance.


    **TIP:** If your data is coming from a different source, such as a flat file,
    and if you can guarantee that the flat file is presorted, you can eliminate the
    `Sort` transformation from your data flow.


    ## Performing Complex Preprocessing at the Database


    In some cases, you may have to do multistep preprocessing on source data, before
    it is ready for your main ETL processing. As an example, you might need to do
    some server-based calculations, joins, or other steps on your data that might
    be done more efficiently in a set-based fashion. This is especially true of processing
    that requires you to serialize intermediate result sets during preprocessing (for
    example, pushing data into temp tables), grouping with the SQL `GROUP BY` clause,
    and partitioning data (with the SQL `OVER` clause). Because SQL Server can apply
    a number of different strategies to set-based processing problems while SSIS has
    essentially a single, simple row-by-row strategy for solving them, performing
    set-based processing tasks at the database is often more efficient.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Ensuring Security and “Read Auditing”


    In some very highly secure operations, it may be a requirement to audit “read”
    operations against sensitive data. In these cases, it might make sense to require
    users and ETL processes to call stored procedures to read from critical tables.
    By using stored procedures as a source, you can deny direct access to tables and
    incorporate logic into the procedures to record all read requests being sent by
    users and processes.


    ## Pulling Too Many Columns


    In many cases, SSIS developers choose to do a good old-fashioned `SELECT *` query
    or choose the Data Access mode `Table or View` option on the OLE DB Source Editor.
    In fact, in the sample data flow in Figure 15-2, we used the query:


    ```sql

    SELECT * FROM dbo.SalesTransaction;

    ```


    in the OLE DB source component.


    You may also have noticed that the definition for the `SalesTransaction` table
    contains a `varchar(max)` column named `Notes` (shown in Figure 15-1). The `varchar(max)`
    column can hold up to 2.1 GB of data.'
  raw: 'Let’s say this table contains 10 million rows of sales transaction data, with
    about 25,000 rows added to it daily. Let’s consider a simple ETL process that
    needs to retrieve the current day’s data from the table and export it to a flat
    file to be picked up by other processes—a common requirement when you need to
    feed legacy downstream systems. You have two options for identifying today’s records:
    (1) you can limit the data in SSIS by using the Conditional Split transformation
    or (2) limit the data on the server. To limit the inbound data with the Conditional
    Split, you’ll create a data flow like the one shown in Figure 15-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-510_1.jpg)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


    *Figure 15-2\. Limiting inbound data with the Conditional Split transformation*
    We’ve added annotations to highlight how this data flow works. Notice that all
    10 million rows of data from our source table are pulled into the data flow by
    the source component. Ninety-nine percent of the rows being pulled in are unceremoniously
    discarded by the Conditional Split transformation to get at the 25,000 rows we
    actually want to export.


    The alternative is to limit the rows on the server by adding the WHERE clause
    to your SELECT query, as shown in Figure 15-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-511_1.jpg)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


    *Figure 15-3\. Limiting source data at the server*


    By limiting the data at the server in this example, you can eliminate millions
    of rows without pulling it all into SSIS first. If you have an index on the SalesDate
    column of the table, your query will be able to retrieve the data even more efficiently.
    The advantages of limiting the data on the server are twofold:


     You limit the number of rows being pulled into SSIS—of particular importance
    when you are pulling data across the network.


     You can retrieve data using fewer SSIS resources. In return, you are using more
    SQL Server resources, but by limiting the result set at the source, you can take
    advantage of many of SQL Server’s set-based optimizations— particularly if you


    are using columns with indexes or partitions to limit the data you retrieve.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-512_1.jpg)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


     **TIP:** Apart from the SQL queries in the source component, SSIS data flow
    components cannot take advantage of SQL Server indexes.


    Performing Joins in the Database


    Performing joins on the server is an optimization that is closely related to the
    previous optimization of limiting the number of rows pulled into your data flow.
    Joins can help you efficiently limit the number of rows at the server. Picture
    the following scenario: you have 10,000 rows of data to pull into your data flow,
    and you have a million rows of lookup reference data. This type of imbalance is
    common in data warehousing applications, for instance, where a given dimension
    table is extremely large. You already know you won’t need more than 10,000 rows
    of lookup reference data (at most). If it can be avoided, there’s no point in
    pulling an extra 990,000 rows into your data flow only to discard them, as shown
    in Figure 15-4\. This can easily be remedied by including selectivity at the data
    source to filter the rows that would later be discarded only after passing through
    the required memory buffers.


    *Figure 15-4\. Pulling large amounts of data in Merge task*


    When there is a large imbalance in the size of the two data sets to be joined,
    it can often be done more efficiently on the server by using T-SQL join syntax.
    In addition to eliminating the extra network traffic that can be generated by
    pulling excessive data into your data flow, the SQL Server optimizer had 515


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15  DATA FLOW TUNING AND OPTIMIZATION


    multiple strategies it can use to fulfill a join request. SSIS can use only a
    *merge join*, which is basically a row-by-row scan of both data sets. The merge
    join works only with an equality-based join condition, and both sets of input
    must be presorted on the join columns. When you join on SQL Server, the query
    engine automatically sorts the source data as necessary, and the server will use
    indexes if they are defined on the join columns. SQL Server can also perform inequality
    joins (less than, greater than, and so forth) and supports the CROSS JOIN syntax.


     **NOTE:** Using a Lookup transformation component eliminates the need to perform
    a Sort operation on the lookup reference data, but incurs the same requirement
    to read all the source data. The Lookup transformation provides an alternative
    via its partial cache and noncached modes, but these modes can cost excessive
    round-trips to the server and might still not be as efficient as a server-side
    join. Also, like the Merge Join transformation, the Lookup transformation can’t
    use SQL indexes and table distribution statistics defined on your source tables.


    Sorting in the Database


    As we showed in the previous section, some of the data flow components—such as
    the Merge Join transformation—require sorted input. The Sort transformation in
    SSIS is a fully blocking component, meaning no rows can pass it until it has completed
    processing its entire input data set. SSIS has a single method of sorting data,
    whereas SQL Server has multiple strategies for fulfilling sort requests—the database
    can take advantage of indexes, for instance. Sorting at the database simply requires
    the addition of the ORDER BY clause to your SELECT query. When combined with joins
    and WHERE clause restrictions, sorting input at the database can significantly
    increase performance.


     **TIP:** If your data is coming from a different source, such as a flat file,
    and if you can guarantee that the flat file is presorted, you can eliminate the
    Sort transformation from your data flow.


    Performing Complex Preprocessing at the Database


    In some cases, you may have to do multistep preprocessing on source data, before
    it is ready for your main ETL processing. As an example, you might need to do
    some server-based calculations, joins, or other steps on your data that might
    be done more efficiently in a set-based fashion. This is especially true of processing
    that requires you to serialize intermediate result sets during preprocessing (for
    example, pushing data into temp tables), grouping with the SQL GROUP BY clause,
    and partitioning data (with the SQL OVER clause). Because SQL Server can apply
    a number of different strategies to set-based processing problems while SSIS has
    essentially a single, simple row-by-row strategy for solving them, performing
    set-based processing tasks at the database is often more efficient.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


