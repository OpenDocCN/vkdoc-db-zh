- fmt: '# Chapter 6 - Advanced Control Flow Tasks


    ## Transfer Logins Task


    Logins are vital for access to data within a database. They can restrict access
    to different objects within a database. The `Transfer Logins` task provides for
    a quick way to copy logins between SQL Server instances. This task can copy all
    logins, specified logins, or specified logins for a particular database. The task
    uses `SMO Connection Managers` to transfer the logins. The user who executes the
    packages must have `sysadmin` access to both servers for the transfer of the logins.
    Figure 6-17 demonstrates the task as it appears in the control flow. The icon
    shows a picture of a person with a lock and an arrow. The lock and the picture
    denote the security information that will be transferred.


    *Figure 6-17. Transfer Logins task*


    The Logins page, shown in Figure 6-18, allows you to configure all the necessary
    properties in order to transfer SQL Server logins between two SQL Server instances.
    The General page allows you to modify the `Name` and `Description` of the task.
    The Expressions page allows you to define expressions that can modify the values
    of the task’s properties.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-183_1.jpg)


    *Figure 6-18. Transfer Logins Task Editor—Logins page*


    The Logins page allows the configuration of the following properties:


    - `SourceConnection` lists the `SMO Connection Managers` that can be used as the
    source for the SQL Server logins.

    - `DestinationConnection` lists the `SMO Connection Managers` that can be used
    as the destination for the SQL Server logins.

    - `LoginsToTransfer` allows you to define the logins to transfer to the destination.
    The `AllLogins` option will copy all the logins defined on the source SQL Server
    instance to the destination server SQL Server instance. `SelectedLogins` allows
    you to enumerate specific logins to transfer to the destination. `AllLoginsFromSelectedDatabase`
    requires you to specify the logins to transfer to the destination; however, the
    logins are further limited by the `DatabaseList` property.

    - `LoginsList` enumerates the specific logins to transfer to the destination,
    depending on the option chosen for `LoginsToTransfer`. The ellipsis button provides
    you with a list of all the logins on the server to select from. This list is limited
    if a database list is specified.

    - `DatabasesList` enumerates only the databases whose logins you need to transfer.

    - `IfObjectExists` defines how the task handles duplicates. The options for this
    property are `FailTask`, `Overwrite`, and `Skip`. `FailTask` causes the task to
    error when it encounters the existing login on the destination. `Overwrite` re-creates
    the login with the definition from the source. `Skip` leaves the login as is on
    the destination server.

    - `CopySids` specifies whether the copy operation should include the security
    identifiers with the logins. It is vital for this property to be set to `True`
    when transferring databases because otherwise the logins will not be recognized
    by the destination database.


    ## Transfer Master Stored Procedures Task


    The user-defined stored procedures on the master database of a SQL Server instance
    are often required when generating a new SQL Server instance. The `Transfer Master
    Stored Procedures task` allows you to perform this operation by using the `SMO
    Connection Manager`. The user executing the package needs to have read access
    to the master stored procedures on the source SQL Server instance and `sysadmin`
    authority on the destination in order to create them. Figure 6-19 shows the task
    as it appears in the control flow. The icon, an application window with an arrow,
    resembles stored procedures in the sense that procedures contain a few statements.


    *Figure 6-19. Transfer Master Stored Procedures task*


    The Stored Procedures page of the `Transfer Master Stored Procedures Task Editor`,
    shown in Figure 6-20, allows you to configure all the necessary properties in
    order to copy master stored procedures between the master databases of two SQL
    Server instances. The task will uniquely identify the master stored procedures
    based only on their names. The General page allows you to modify the `Name` and
    `Description` of the task. The Expressions page allows you to define expressions
    that can modify the values of the task’s properties.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-185_1.jpg)


    *Figure 6-20. Transfer Master Stored Procedure Task Editor—Stored Procedures page*


    The Stored Procedures page provides these properties to be configured:


    - `SourceConnection` identifies the `SMO Connection Manager` to use as the source
    for the master stored procedures.

    - `DestinationConnection` identifies the `SMO Connection Manager` to use as the
    destination for the master stored procedures.

    - `IfObjectExists` allows you to manage the existence of the master stored procedure
    on the destination SQL Server instance. The `FailTask` option causes the task
    to error when a duplicate master stored procedure is encountered on the destination
    server. Selecting `Overwrite` re-creates the master stored procedure with the
    definition on the source server. `Skip` leaves the definition of the master stored
    procedure on the destination server as it is.

    - `TransferAllStoredProcedures` allows you to choose between copying all of the
    user-defined stored procedures on the source master database or a specified set.
    Setting this property to `True` enables the `StoredProcedureList` property for
    edit.

    - `StoredProcedureList` specifies the list of the user-defined stored procedures
    you need to copy to the destination server. The ellipsis button opens a dialog
    box that lists all the available stored procedures available for transfer.


    ## Transfer SQL Server Objects Task


    One way to transfer select data and objects from a SQL Server database is to use
    the `Transfer SQL Server Objects task`. By combining a few of these tasks, you
    can copy objects from several SQL Server databases and create them in one SQL
    Server database. This functionality is extremely useful, especially if you intend
    on using a staging database to store your data in a similar system as a preprocess
    of your ETL process. We discuss more options on preprocessing your data in Chapter
    14. Figure 6-21 shows the task as it appears in the control flow designer window.
    The icon, a cylinder on a script with an arrow indicating the transfer, represents
    the scripts of the various database objects that will be used during the transfer.


    *Figure 6-21. Transfer SQL Server Objects task*


    The Objects page of the `Transfer SQL Server Objects task`, shown in Figure 6-22,
    allows you to configure all the necessary properties for transferring the required
    objects between databases. The actual transfer will utilize `SMO Connection Managers`.
    The General page allows you to modify the `Name` and `Description` of the task.
    The Expressions page allows you to define expressions that can modify the values
    of the task’s properties.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-187_1.jpg)


    *Figure 6-22. Transfer SQL Server Objects Task Editor—Objects page*


    The Objects page allows you to modify the following context-specific properties:


    - `SourceConnection` selects the `SMO Connection Manager` that will be the source
    of the database objects.

    - `SourceDatabase` lists all the databases that exist on the SQL Server instance
    to source the database objects. Select the database that has the objects you need
    to copy.

    - `DestinationConnection` selects the `SMO Connection Manager` that points to
    the destination server.'
