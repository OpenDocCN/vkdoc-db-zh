    ## 执行 SQL 任务编辑器—结果集页面


    对于结果需要被 SSIS 访问的 SQL 语句，我们可以将这些结果集分配给 SSIS 变量。最常用的结果集类型之一是`完整结果集`。这允许你将整个结果（如果
    SQL 语句中指定了排序顺序，则包含该顺序）直接存储在一个数据类型定义为`object`的变量中。根据变量的作用域，这个`object`可以被`Foreach
    循环`容器访问用作枚举器，可以被控制流中的`脚本`任务访问，或者被`数据流`任务访问。图 5-6 演示了如何为查询的结果集定义映射。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-119_1.jpg)


    第 5 章  控制流基础


    `图 5-6. 执行 SQL 任务编辑器—结果集页面`


    要将查询的值分配给变量，如果结果集是`单行`，你需要知道每列的序号位置或名称；否则，将`结果名称`设置为`0`。要添加此分配，你需要使用`添加`按钮。`完整结果集`的结果将自动定义`object`中的列。对于`单行`结果，你需要确保每列的数据类型与映射的
    SSIS 变量兼容。


    ## 执行 SQL 任务编辑器—表达式页面


    `表达式`页面允许你定义可以更改组件属性值的表达式。可以为每个组件定义多个表达式。第 9 章将更详细地介绍表达式。图 5-7 演示了`执行 SQL 任务编辑器`的`表达式`页面。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-120_1.jpg)


    第 5 章  控制流基础


    `图 5-7. 执行 SQL 任务编辑器—表达式页面`


    **注意：** 今后，我们将不再显示任务编辑器的`表达式`页面。可以通过表达式访问的属性对于特定的任务类型可能是唯一的，但也有一些重叠，包括`名称`和`描述`。


    ## 常用任务


    `SSIS 工具箱`中的`常用`分组包含一些更常用的任务。这些任务执行的操作主要支持 ETL 的非功能性需求。它们的操作可能有所不同，从为 ETL 流程准备文件到作为包执行的一部分发送电子邮件。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-121_1.jpg)


    第 5 章  控制流基础


    ### Analysis Services 处理任务


    `Analysis Services 处理任务`允许你处理 SQL Server Analysis Services (SSAS) 对象。这些对象包括多维数据集、维度和数据挖掘模型。图
    5-8 演示了该任务在控制流中的样子。这个特定示例显示了当任务未连接到多维数据集时返回的错误消息。创建`Analysis Services 处理任务`时，必须将其指向一个
    SSAS 数据库并添加需要处理的对象。如果没有向列表中添加对象，你将收到错误消息。


    `图 5-8. Analysis Services 处理任务`


    此任务的图标是一叠多维数据集，外面有一个单独的多维数据集。这些多维数据集代表 SSAS 数据库对象，特别是多维数据集。单个的多维数据集代表度量值，因为它们可以被不同的维度切片和切块。


    添加的对象将以批处理方式执行。批处理本身可以按顺序或并行处理。通常，并行处理会加快整体处理速度。你可以选择定义可以同时处理的对象数量，也可以让任务决定处理对象。维度通常在事实之前处理，以防止任何缺失键错误。解决此问题的方法是允许即使有错误也继续处理。处理多维数据集时，不忽略错误是一种最佳实践。


