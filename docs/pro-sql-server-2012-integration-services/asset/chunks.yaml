    *Figure 8-22\. Choosing the type of script component to create*


    For this sample, we’re creating a simple synchronous transformation, so we chose
    the Transformation script component type. After the script component has been
    added to the data flow, we configured it through the Script Transformation Editor.
    We went to the Input Columns page first. On this page, you can choose the input
    columns, those columns that are accessible from within the script component. You
