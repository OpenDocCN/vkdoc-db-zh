- fmt: "# CHAPTER 12: DATA PROFILING AND SCRUBBING\n\n## Connection Manager and Key\
    \ Column Selection\n\nConnection Manager, a source table or view, and columns.\
    \ Unlike the other profile requests, in which you choose only a single column\
    \ or all columns by using the wildcard (`*`), this profile request allows you\
    \ to choose many columns. This makes sense because a given candidate key can consist\
    \ of multiple columns, and you may want to test several permutations of column\
    \ sets for viability as candidate keys.\n\nThe drop-down menu for choosing `KeyColumns`\
    \ is shown in Figure 12-19. You can choose one or more columns in several combinations,\
    \ such as the following:\n\n- **Single named column**: If you choose a single\
    \ column, it will be tested for usefulness as a candidate key.\n- **Multiple named\
    \ columns**: If you choose multiple named columns, they are all tested together\
    \ for usability as a composite candidate key. For instance, if you choose the\
    \ `AirCarrier`, `AircraftCategory`, `EventDate`, and `State` columns, the Data\
    \ Profiling task will test all of the columns together for usability as a single\
    \ candidate key.\n- **Single wildcard**: If you choose the wildcard (`*`) as your\
    \ column, the Data Profiling task profiles every column in your table, testing\
    \ each individually for usability as a candidate key.\n- **Single wildcard and\
    \ named columns**: If you choose the wildcard (`*`) and one or more named columns,\
    \ the Data Profiling task will test combinations of the named columns and the\
    \ other columns in the table for candidate key viability. As an example, you might\
    \ choose `AirportCode` and (`*`) in your profile request, in which case the Data\
    \ Profiling task will test the `AirportCode` column in combination with every\
    \ other column in the table.\n- **Multiple wildcards**: If you choose multiple\
    \ wildcard (`*`) columns, the Data Profiling task tests the permutations of the\
    \ specified number of column combinations for usability as candidate keys. For\
    \ instance, if you choose two wildcards, the task profiles all combinations of\
    \ two columns in your table for uniqueness.\n\n![](index-447_1.jpg)\n\n*Figure\
    \ 12-19. Data Profiling Task Editor*\n\n## Candidate Key Profile Output\n\nFigure\
    \ 12-20 demonstrates the Candidate Key profile output. The strength of the proposed\
    \ key columns `AirCarrier`, `AircraftCategory`, `EventDate`, and `State` are approximately\
    \ 87 percent unique. The output goes even further and shows the duplicate rows\
    \ for each of the key violations as well as the count of the infractions.\n\n\
    ![](index-448_1.jpg)\n\n*Figure 12-20. Tolerances for candidate keys*\n\n## Functional\
    \ Dependency Profile\n\nThe **Functional Dependency profile** allows you to use\
    \ the profiling task to find dependencies on the table.\n\nThe dependencies test\
    \ to see how the values in the specified columns determine the values of the dependent\
    \ columns. Using the (`*`) as the `DeterminantColumns` property allows us to test\
    \ every column as the determinant of all the combinations allowed by the `DependentColumns`.\
    \ The (`*`) value in the `DependentColumn` property allows us to test every combination\
    \ of the columns in the table to be dependent on the specified determinant. Using\
    \ the (`*`) notation for both properties will pit each column against every combination\
    \ of all the columns for a dependency report. The `0.95` threshold indicates that\
    \ only 95 percent or better will define a useful data dependency, as displayed\
    \ in Figure 12-21.\n\n![](index-449_1.jpg)\n\n*Figure 12-21. Functional Dependency\
    \ profile request*\n\nFigure 12-22 demonstrates the results of the Functional\
    \ Dependency profile request. The report shows you the overall strength of each\
    \ of the tests as well as the different violations. The tab below the report shows\
    \ the individual data elements that were used for profiling the dependency and\
    \ their strengths.\n\n![](index-450_1.jpg)\n\n*Figure 12-22. Functional Dependency\
    \ profile output*\n\n## Fuzzy Searching\n\nOne of the risks of adding new data\
    \ to any set is the possibility of unclean, or nonconforming, data entering the\
    \ system. This usually comes in the form of violating the rules of a character\
    \ column’s domain—for example, alphabet characters for a US ZIP code column being\
    \ entered. SSIS provides two data flow transformations to clean up the data inconsistencies:\
    \ the `FuzzyLookup` and the `FuzzyGrouping`. They both utilize a token-based approach\
    \ to determine matches between incoming data and the reference data. After the\
    \ matches are successfully completed, you can replace the old data with the new\
    \ conforming data.\n\n## Fuzzy Lookup\n\nThe **Fuzzy Lookup** returns close matches\
    \ of reference data for the incoming data stream. This is in contrast to the `Lookup`\
    \ transformation, which returns exact matches. One of the advantages to using\
    \ the `FuzzyLookup` is its ability to return data that contains the strings stored\
    \ in the lookup table. The lookup table in this instance would be representative\
    \ of clean data. The `FuzzyLookup` task can be used to allow only data with acceptable\
    \ matches to be passed through.\n\nFor this example, we are using our `dbo.State`\
    \ table as the source of data. We set a list of lookups to isolate the states\
    \ that match any members of the list. The code in Listing 12-1 demonstrates the\
    \ table structures and the lookup list.\n\n*Listing 12-1. Table Structures and\
    \ Fuzzy Lookup Elements*\n\n```sql\nCREATE TABLE dbo.StateFuzzyMatch\n(\n    FuzzyMatchData\
    \ NVARCHAR(50) NOT NULL\n);\nGO\n\nINSERT INTO dbo.StateFuzzyMatch\n    (FuzzyMatchData)\n\
    SELECT N'Headquarters'\nUNION ALL\nSELECT N'pINEAPPLES'\nUNION ALL\nSELECT N'russia'\n\
    UNION ALL\nSELECT N'FIRST';\nGO\n\nCREATE TABLE dbo.StateFuzzyLookup\n(\n    Name\
    \ nvarchar(50) NULL,\n    Capital nvarchar(50) NULL,\n    Flag nvarchar(10) NULL,\n\
    \    Date date NULL,\n    Fact nvarchar(500) NULL,\n    Long float NULL,\n   \
    \ Lat float NULL,\n    FuzzyMatchData nvarchar(50) NULL,\n    _Similarity real\
    \ NULL,\n    _Confidence real NULL\n);\nGO\n```\n\nThe `dbo.StateFuzzyMatch` table\
    \ contains all the key words that we will be searching for in the `State` data.\
    \ We inserted some keywords that we need to find in the `Fact` attribute of the\
    \ `dbo.State` data. We will store the successful matches of the `FuzzyLookup`\
    \ operation in `dbo.StateFuzzyLookup`. This table includes additional columns\
    \ that include the fuzzy match details, including the following: `FuzzyMatchData`\
    \ is the element in the lookup table that matched the incoming data.\n- `_Similarity`\
    \ represents the level of similarity between the incoming data and the lookup\
    \ element. This value can be used to adjust the similarity threshold on the `FuzzyLookup`\
    \ component to eliminate unwanted matches. This alias can be modified for each\
    \ of the separate columns handled in the fuzzy matching.\n- `_Confidence` represents\
    \ the confidence of the match. Previous versions of SSIS have taken into account\
    \ the best similarity and the number of positive matches for a given data row\
    \ to calculate this value.\n\n![](index-452_1.jpg)\n\nPerforming a `FuzzyLookup`\
    \ and limiting the data to only rows that successfully match will result in the\
    \ data shown in Figure 12-23. Listing 12-2 shows the query that will retrieve\
    \ the positive matches and the statistics of the operation. As the results of\
    \ the query demonstrate, a direct correlation between similarity and confidence\
    \ does not necessarily exist for the matches in this dataset.\n\n*Listing 12-2.\
    \ SELECT Query for the Fuzzy Lookup Data*\n\n```sql\nSELECT Name,\n       Capital,\n\
    \       Flag,\n       Date,\n       Fact,\n       Long,\n       Lat,\n       FuzzyMatchData,\n\
    \       _Similarity,\n       _Confidence\nFROM dbo.StateFuzzyLookup\nORDER BY\
    \ _Similarity DESC,\n         _Confidence;\n```\n\n*Figure 12-23. Fuzzy Lookup\
    \ matches*"
  raw: 'Connection Manager, a source table or view, and columns. Unlike the other
    profile requests, in which you choose only a single column or all columns by using
    the wildcard (*), this profile request allows you to choose many columns. This
    makes sense because a given candidate key can consist of multiple columns, and
    you may want to test several permutations of column sets for viability as candidate
    keys.


    The drop-down menu for choosing KeyColumns is shown in Figure 12-19. You can choose
    one or more columns in several combinations, such as the following:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    Single named column: If you choose a single column, it will be tested for


    usefulness as a candidate key.


    Multiple named columns: If you choose multiple named columns, they are all


    tested together for usability as a composite candidate key. For instance, if you
    choose the AirCarrier, AircraftCategory, EventDate, and State columns, the


    Data Profiling task will test all of the columns together for usability as a single
    candidate key.


    Single wildcard: If you choose the wildcard (*) as your column, the Data


    Profiling task profiles every column in your table, testing each individually
    for usability as a candidate key.


    Single wildcard and named columns: If you choose the wildcard (*) and one


    or more named columns, the Data Profiling task will test combinations of the


    named columns and the other columns in the table for candidate key viability.


    As an example, you might choose AirportCode and (*) in your profile request,


    in which case the Data Profiling task will test the AirportCode column in


    combination with every other column in the table.


    Multiple wildcards: If you choose multiple wildcard (*) columns, the Data


    Profiling task tests the permutations of the specified number of column


    combinations for usability as candidate keys. For instance, if you choose two


    wildcards, the task profiles all combinations of two columns in your table for


    uniqueness.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-447_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-19\. Data Profiling Task Editor*


    Figure 12-20 demonstrates the Candidate Key profile output. The strength of the
    proposed key columns AirCarrier, AircraftCategory, EventDate, and State are approximately
    87 percent unique. The output goes even further and shows the duplicate rows for
    each of the key violations as well as the count of the infractions.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-448_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-20\. Tolerances for candidate keys*


    Functional Dependency Profile


    The *Functional Dependency profile* allows you to use the profiling task to find
    dependencies on the table.


    The dependencies test to see how the values in the specified columns determine
    the values of the dependent columns. Using the (*) as the DeterminantColumns property
    allows us to test every column as the determinant of all the combinations allowed
    by the DependentColumns. The (*) value in the DependentColumn property allows
    us to test every combination of the columns in the table to be dependent on the
    specified determinant. Using the (*) notation for both properties will pit each
    column against every combination of all the columns for a dependency report. The
    0.95 threshold indicates that only 95 percent or better will define a useful data
    dependency, as displayed in Figure 12-21.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-449_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-21\. Functional Dependency profile request*


    Figure 12-22 demonstrates the results of the Functional Dependency profile request.
    The report shows you the overall strength of each of the tests as well as the
    different violations. The tab below the report shows the individual data elements
    that were used for profiling the dependency and their strengths.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-450_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-22\. Functional Dependency profile output*


    Fuzzy Searching


    One of the risks of adding new data to any set is the possibility of unclean,
    or nonconforming, data entering the system. This usually comes in the form of
    violating the rules of a character column’s domain—for example, alphabet characters
    for a US ZIP code column being entered. SSIS provides two data flow transformations
    to clean up the data inconsistencies: the Fuzzy Lookup and the Fuzzy Grouping.
    They both utilize a token-based approach to determine matches between incoming
    data and the reference data. After the matches are successfully completed, you
    can replace the old data with the new conforming data.


    Fuzzy Lookup


    The *Fuzzy Lookup* returns close matches of reference data for the incoming data
    stream. This is in contrast to the Lookup transformation, which returns exact
    matches. One of the advantages to using the Fuzzy Lookup is its ability to return
    data that contains the strings stored in the lookup table. The lookup table in
    this instance would be representative of clean data. The Fuzzy Lookup task can
    be used to allow only data with acceptable matches to be passed through.


    For this example, we are using our dbo.State table as the source of data. We set
    a list of lookups to isolate the states that match any members of the list. The
    code in Listing 12-1 demonstrates the table structures and the lookup list.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Listing 12-1\. Table Structures and Fuzzy Lookup Elements*


    CREATE TABLE dbo.StateFuzzyMatch


    (


    FuzzyMatchData NVARCHAR(50) NOT NULL


    );


    GO


    INSERT INTO dbo.StateFuzzyMatch


    (FuzzyMatchData)


    SELECT N''Headquarters''


    UNION ALL


    SELECT N''pINEAPPLES''


    UNION ALL


    SELECT N''russia''


    UNION ALL


    SELECT N''FIRST'';


    GO


    CREATE TABLE dbo.StateFuzzyLookup


    (


    Name nvarchar(50) NULL,


    Capital nvarchar(50) NULL,


    Flag nvarchar(10) NULL,


    Date date NULL,


    Fact nvarchar(500) NULL,


    Long float NULL,


    Lat float NULL,


    FuzzyMatchData nvarchar(50) NULL,


    _Similarity real NULL,


    _Confidence real NULL


    );


    GO


    The dbo.StateFuzzyMatch table contains all the key words that we will be searching
    for in the State data. We inserted some keywords that we need to find in the Fact
    attribute of the dbo.State data. We will store the successful matches of the Fuzzy
    Lookup operation in dbo.StateFuzzyLookup. This table includes additional columns
    that include the fuzzy match details, including the following: FuzzyMatchData
    is the element in the lookup table that matched the incoming


    data.


    _Similarity represents the level of similarity between the incoming data and


    the lookup element. This value can be used to adjust the similarity threshold
    on the Fuzzy Lookup component to eliminate unwanted matches. This alias can


    be modified for each of the separate columns handled in the fuzzy matching.


    _Confidence represents the confidence of the match. Previous versions of SSIS


    have taken into account the best similarity and the number of positive matches


    for a given data row to calculate this value.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-452_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    Performing a Fuzzy Lookup and limiting the data to only rows that successfully
    match will result in the data shown in Figure 12-23. Listing 12-2 shows the query
    that will retrieve the positive matches and the statistics of the operation. As
    the results of the query demonstrate, a direct correlation between similarity
    and confidence does not necessarily exist for the matches in this dataset.


    *Listing 12-2\. SELECT Query for the Fuzzy Lookup Data*


    SELECT Name,


    Capital,


    Flag,


    Date,


    Fact,


    Long,


    Lat,


    FuzzyMatchData,


    _Similarity,


    _Confidence


    FROM dbo.StateFuzzyLookup


    ORDER BY _Similarity DESC,


    _Confidence;


    *Figure 12-23\. Fuzzy Lookup matches*'
  trans: "\n# 第 12 章：数据配置与清理\n\n## 连接管理器与关键列选择\n\n连接管理器、源表或视图以及列。与其他配置请求（通常您只选择单个列或使用通配符（`*`）选择所有列）不同，此配置请求允许您选择多个列。这是合理的，因为一个给定的候选键可以由多列组成，并且您可能希望测试几组列排列组合，以评估其作为候选键的可行性。\n\
    \n选择`KeyColumns`的下拉菜单如图 12-19 所示。您可以通过多种组合选择一列或多列，例如：\n\n-   **单个命名列**：如果选择单个列，将测试其作为候选键的有用性。\n\
    -   **多个命名列**：如果选择多个命名列，将作为一个复合候选键一起测试它们的可用性。例如，如果您选择`AirCarrier`、`AircraftCategory`、`EventDate`和`State`列，数据配置任务将测试所有这些列作为一个单一候选键的可用性。\n\
    -   **单个通配符**：如果您选择通配符（`*`）作为列，数据配置任务将配置表中的每一列，分别测试每列作为候选键的可用性。\n-   **单个通配符和命名列**：如果您选择通配符（`*`）和一个或多个命名列，数据配置任务将测试命名列与表中其他列的组合作为候选键的可行性。例如，您可以在配置请求中选择`AirportCode`和（`*`），这种情况下，数据配置任务将测试`AirportCode`列与表中其他每一列的组合。\n\
    -   **多个通配符**：如果您选择多个通配符（`*`）列，数据配置任务将测试指定数量的列排列组合作为候选键的可用性。例如，如果您选择两个通配符，该任务将配置表中所有两列的组合以检查唯一性。\n\
    \n![](img/index-447_1.jpg)\n\n*图 12-19. 数据配置任务编辑器*\n\n## 候选键配置文件输出\n\n图 12-20\
    \ 展示了候选键配置文件的输出。建议的关键列`AirCarrier`、`AircraftCategory`、`EventDate`和`State`的强度约为\
    \ 87%唯一。输出甚至更进一步，显示了每个违反键规则的重复行以及违规计数。\n\n![](img/index-448_1.jpg)\n\n*图 12-20.\
    \ 候选键的容忍度*\n\n## 函数依赖配置文件\n\n**函数依赖配置文件**允许您使用配置任务来发现表中的依赖关系。\n\n依赖关系测试用于查看指定列中的值如何决定依赖列的值。使用（`*`）作为`DeterminantColumns`属性，允许我们将每一列作为`DependentColumns`属性所允许的所有组合的决定因素进行测试。`DependentColumn`属性中的（`*`）值允许我们测试表中每一列组合作为依赖于指定决定因素的关系。对两个属性都使用（`*`）符号，将使每一列与所有列的每一组合进行对比，以生成依赖关系报告。`0.95`阈值表示只有\
    \ 95%或更高的关系才能定义有用的数据依赖关系，如图 12-21 所示。\n\n![](img/index-449_1.jpg)\n\n*图 12-21.\
    \ 函数依赖配置文件请求*\n\n图 12-22 展示了函数依赖配置文件请求的结果。报告向您显示了每个测试的整体强度以及各种违规情况。报告下方的选项卡显示了用于配置依赖关系的各个数据元素及其强度。\n\
    \n![](img/index-450_1.jpg)\n\n*图 12-22. 函数依赖配置文件输出*\n\n## 模糊查找\n\n向任何数据集添加新数据的风险之一是可能有不干净或不符合规则的数据进入系统。这通常表现为违反字符列域规则——例如，在美国邮政编码列中输入了字母字符。SSIS\
    \ 提供了两种数据流转换来清理数据不一致性：`FuzzyLookup`和`FuzzyGrouping`。它们都采用基于令牌的方法来确定传入数据与参考数据之间的匹配。成功匹配后，您可以用新的符合规则的数据替换旧数据。\n\
    \n## 模糊查找\n\n**模糊查找**返回与传入数据流匹配的参考数据的近似结果。这与`Lookup`转换形成对比，后者返回精确匹配。使用`FuzzyLookup`的优点之一是它能够返回包含查找表中存储的字符串的数据。在此情况下，查找表代表干净的数据。`FuzzyLookup`任务可用于仅允许通过可接受匹配的数据。\n\
    \n在本例中，我们使用`dbo.State`表作为数据源。我们设置了一个查找列表，以筛选出与该列表中任何成员匹配的州。清单 12-1 展示了表结构和查找列表。\n\
    \n*清单 12-1. 表结构和模糊查找元素*\n\n```sql\nCREATE TABLE dbo.StateFuzzyMatch\n(\n    FuzzyMatchData\
    \ NVARCHAR(50) NOT NULL\n);\nGO\n\nINSERT INTO dbo.StateFuzzyMatch\n    (FuzzyMatchData)\n\
    SELECT N'Headquarters'\nUNION ALL\nSELECT N'pINEAPPLES'\nUNION ALL\nSELECT N'russia'\n\
    UNION ALL\nSELECT N'FIRST';\nGO\n\nCREATE TABLE dbo.StateFuzzyLookup\n(\n    Name\
    \ nvarchar(50) NULL,\n    Capital nvarchar(50) NULL,\n    Flag nvarchar(10) NULL,\n\
    \    Date date NULL,\n    Fact nvarchar(500) NULL,\n    Long float NULL,\n   \
    \ Lat float NULL,\n    FuzzyMatchData nvarchar(50) NULL,\n    _Similarity real\
    \ NULL,\n    _Confidence real NULL\n);\nGO\n```\n\n`dbo.StateFuzzyMatch`表包含我们将在`State`数据中搜索的所有关键词。我们插入了一些需要在`dbo.State`数据的`Fact`属性中查找的关键词。我们将把`FuzzyLookup`操作的成功匹配结果存储在`dbo.StateFuzzyLookup`中。该表包含额外的列，其中包括模糊匹配的详细信息，例如：\n\
    -   `FuzzyMatchData`是查找表中与传入数据匹配的元素。\n-   `_Similarity`表示传入数据与查找元素之间的相似度水平。此值可用于调整`FuzzyLookup`组件上的相似度阈值，以消除不希望的匹配。对于模糊匹配中处理的每个单独列，此别名可以修改。\n\
    -   `_Confidence`表示匹配的置信度。SSIS 的先前版本会考虑最佳相似度和给定数据行的正面匹配数量来计算此值。\n\n![](img/index-452_1.jpg)\n\
    \n执行`FuzzyLookup`并将数据限制为仅成功匹配的行，将得到如图 12-23 所示的数据。清单 12-2 展示了将检索正面匹配及其操作统计信息的查询。如查询结果所示，在此数据集中，相似度与置信度之间并不一定存在直接相关性。\n\
    \n*清单 12-2. 用于模糊查找数据的 SELECT 查询*\n\n```sql\nSELECT Name,\n       Capital,\n  \
    \     Flag,\n       Date,\n       Fact,\n       Long,\n       Lat,\n       FuzzyMatchData,\n\
    \       _Similarity,\n       _Confidence\nFROM dbo.StateFuzzyLookup\nORDER BY\
    \ _Similarity DESC,\n         _Confidence;\n```\n\n*图 12-23. 模糊查找匹配结果*\n"
- fmt: "Having seen the output and the SQL Server table set up, let us tie back to\
    \ the SSIS package development that is required for implementing the Fuzzy Lookup.\
    \ The Fuzzy Lookup is a `Data Flow` task component and requires a data stream\
    \ for the matching. The `OLE DB` source we utilize contains the query in Listing\
    \ 12-3 to extract all the data that we have on the states that make up the United\
    \ States of America.\n\n**Listing 12-3. State Data**\n\n```sql\nSELECT DISTINCT\
    \ s.Name,\n    s.Capital,\n    s.Flag,\n    s.Date,\n    s.Fact,\n    s.Long,\n\
    \    s.Lat\nFROM dbo.State s;\n```\n\nAt the onset of development, our requirement\
    \ was to isolate states whose fact contained some very specific tokens. We loaded\
    \ these tokens in `dbo.StateFuzzyMatch`. Unlike the `Lookup` component, which\
    \ can use a query to create the lookup list, the Fuzzy Lookup must point to the\
    \ table in order to perform its matches. The component creates indexes on the\
    \ table in order to expedite the match operations. Figure 12-24 demonstrates the\
    \ options we used for the Fuzzy Lookup. We did not choose to save the index but\
    \ instead allow the component to regenerate a new index at each execution. The\
    \ index used for that execution is not saved. For static tables, it is recommended\
    \ that the index is saved.\n\n**Figure 12-24. FZL_MatchFact—Reference table configuration**\n\
    \n**NOTE:** In case you choose to save the index and need to remove it later on,\
    \ the `sp_FuzzyLookupTableMaintenanceUnInstall` stored procedure allows you to\
    \ remove the index. It will take the index name specified in the Fuzzy Lookup\
    \ as its parameter.\n\nAfter the table is specified for the component, you can\
    \ select the column mapping for the lookup matching, as shown in Figure 12-25.\
    \ If you are required to do matches on multiple columns, you can perform the matches\
    \ here. The editor draws lines to easily identify the mappings between the input\
    \ columns and the lookup columns. In our sample, the match is performed on one\
    \ column, but just like the `Lookup` component, the Fuzzy Lookup component can\
    \ utilize multiple columns for its matching criteria.\n\n**Figure 12-25. FZL_MatchFact—Columns**\n\
    \nThe `Create Relationships Editor`, shown in Figure 12-26, allows you to specify\
    \ the criteria for each of the mappings involved in the lookup. To open this editor,\
    \ you have to right-click on the background of the Columns mapping area and select\
    \ `Edit Mappings`. The key fields in this editor are `Mapping Type`, `Comparison\
    \ Flags`, and `Minimum Similarity`. The options for `Mapping Type` are `Fuzzy`\
    \ and `Exact`.\n\nSelecting `Exact` is the same as forcing `Lookup` component\
    \ restrictions on the Fuzzy Lookup. It will forcibly change the `Minimum Similarity`\
    \ to be 1, a 100 percent match. The `Comparison Flags` allow flexibility in terms\
    \ of how the matches are performed. In our example, we were concerned with ignoring\
    \ only the case of the characters of the data. The `Minimum Similarity` sets the\
    \ threshold for the match to be successful for each of the relationships. The\
    \ `Similarity Output Alias` allows you to store the similarity information for\
    \ each relationship. In our example, we are storing only the overall similarity\
    \ of the lookup. Because it is a one-column match, the similarity matches the\
    \ relationship similarity. Just like the `Lookup` component, the lookup column\
    \ can be added to the pipeline and sent to the destination. The editor allows\
    \ you to alias the lookup column if you need to add it to the pipeline.\n\n**Figure\
    \ 12-26. FZL_MatchFactCreate Relationships**\n\nThe `Advanced` tab of the Fuzzy\
    \ Lookup Editor, shown in Figure 12-27, allows you to define the delimiters and\
    \ the overall similarity threshold for each of the matches. The option that allows\
    \ you to define the maximum number of matches will duplicate data rows for each\
    \ successful match. For this example, we are using only whitespaces as delimiters\
    \ for the tokens. By default, a few punctuation characters are defined as delimiters.\n\
    \n**Figure 12-27. FZL_MatchFact—Advanced**\n\nThe entire `Data Flow` task is shown\
    \ in Figure 12-28. The Fuzzy Lookup component has a warning message because the\
    \ sizes of the `Fact` column and the `FuzzyMatchData` column do not match. We\
    \ added the `Conditional Split` component so that only rows with matching data\
    \ pass through to the table. The `FuzzyMatch` output uses `!ISNULL(FuzzyMatchData)`\
    \ as the splitting condition.\n\n**Figure 12-28. DFT_FuzzyLookupSample**\n\n#\
    \ CHAPTER 12 – DATA PROFILING AND SCRUBBING\n\n## Fuzzy Grouping\n\nThe Fuzzy\
    \ Grouping component attempts to reduce the number of duplicates within a dataset\
    \ based on the match criteria. The component will accept only the string data\
    \ types, Unicode and Code page, to perform the matching operations. The transformation\
    \ itself will create temporary tables and indexes on the server in order to perform\
    \ the matching operations efficiently. For this example, we will use the same\
    \ source component that we used for the Fuzzy Lookup example. The configuration\
    \ of the Fuzzy Grouping transformation is very similar to Fuzzy Lookup in that\
    \ it allows you to choose the `Match Type`, the `Minimum Similarity`, `Comparison\
    \ Flags`, and other options as well. In addition, Fuzzy Grouping allows you to\
    \ specify whether data may contain numeric characters by providing the `Numerals`\
    \ option. The `Numerals` option enables you to perform better matches on alphanumeric\
    \ information for which the numeric data poses significant implications at the\
    \ beginning or end of the string. This option becomes useful for street address\
    \ information or alphanumeric postal codes. For our example of Fuzzy Grouping,\
    \ we will utilize the table shown in Listing 12-4 as the destination table for\
    \ the results of the match.\n\n**TIP:** For some performance gains, let the host\
    \ machine executing the package be the `OLE DB` connection for the Fuzzy Grouping\
    \ transformation, if possible. The factors that directly impact the performance\
    \ of the Fuzzy matching transformations are the dataset size (number of rows and\
    \ columns) and the average token appearance in the matched column.\n\n**Listing\
    \ 12-4. Fuzzy Grouping Destination**\n\n```sql\nCREATE TABLE dbo.StateFactGrouping\n\
    (\n    _key_in int,\n    _key_out int,\n    _score real,\n    Name nvarchar(50),\n\
    \    Capital nvarchar(50),\n    Flag nvarchar(10),\n    Date date,\n    Fact nvarchar(500),\n\
    \    Long float,\n    Lat float,\n    Fact_clean nvarchar(500),\n    _Similarity_Fact\
    \ real\n);\nGO\n```\n\nThe Fuzzy Grouping transformation adds a few columns to\
    \ the pipeline in order to track the grouping. Some of the columns track the statistics\
    \ behind the grouping, while others trace the records as they come through the\
    \ pipeline:\n\n`_key_in` traces the original record as it comes through the Data\
    \ Flow task. This column is for all intents and purposes an identity column. Every\
    \ row in the dataset receives its own unique value.\n\n`_key_out` connects a grouped\
    \ row to the `_key_in` value of the matching row that it most closely resembles.\n\
    \n`_score` displays the similarity between the row and the matching row.\n\n`Fact_clean`\
    \ represents the matching row’s value for the `Fact` column.\n\n`_Similarity_Fact`\
    \ shows the similarity between the `Fact` column of the row and the matching row’s\
    \ `Fact` value.\n\nListing 12-5 shows how the grouping matched the states based\
    \ on the facts recorded about them."
  raw: 'Having seen the output and the SQL Server table set up, let us tie back to
    the SSIS package development that is required for implementing the Fuzzy Lookup.
    The Fuzzy Lookup is a Data Flow task component and requires a data stream for
    the matching. The OLE DB source we utilize contains the query in Listing 12-3
    to extract all the data that we have on the states that make up the United States
    of America.


    *Listing 12-3\. State Data*


    SELECT DISTINCT s.Name,


    s.Capital,


    s.Flag,


    s.Date,


    s.Fact,


    s.Long,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-453_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    s.Lat


    FROM dbo.State s;


    At the onset of development, our requirement was to isolate states whose fact
    contained some very specific tokens. We loaded these tokens in dbo.StateFuzzyMatch.
    Unlike the Lookup component, which can use a query to create the lookup list,
    the Fuzzy Lookup must point to the table in order to perform its matches. The
    component creates indexes on the table in order to expedite the match operations.
    Figure 12-24 demonstrates the options we used for the Fuzzy Lookup. We did not
    choose to save the index but instead allow the component to regenerate a new index
    at each execution. The index used for that execution is not saved. For static
    tables, it is recommended that the index is saved.


    *Figure 12-24\. FZL_MatchFact—Reference table configuration*


     **NOTE:** In case you choose to save the index and need to remove it later on,
    the sp_FuzzyLookupTableMaintenanceUnInstall stored procedure allows you to remove
    the index. It will take the index name specified in the Fuzzy Lookup as its parameter.


    After the table is specified for the component, you can select the column mapping
    for the lookup matching, as shown in Figure 12-25\. If you are required to do
    matches on multiple columns, you can perform the matches here. The editor draws
    lines to easily identify the mappings between the input columns and the lookup
    columns. In our sample, the match is performed on one column, but just like the
    Lookup component, the Fuzzy Lookup component can utilize multiple columns for
    its matching criteria.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-454_1.jpg)


    ![](index-454_2.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-25\. FZL_MatchFact—Columns*


    The Create Relationships Editor, shown in Figure 12-26, allows you to specify
    the criteria for each of the mappings involved in the lookup. To open this editor,
    you have to right-click on the background of the Columns mapping area and select
    Edit Mappings. The key fields in this editor are Mapping Type, Comparison Flags,
    and Minimum Similarity. The options for Mapping Type are Fuzzy and Exact.


    Selecting Exact is the same as forcing Lookup component restrictions on the Fuzzy
    Lookup. It will forcibly change the Minimum Similarity to be 1, a 100 percent
    match. The Comparison Flags allow flexibility in terms of how the matches are
    performed. In our example, we were concerned with ignoring only the case of the
    characters of the data. The Minimum Similarity sets the threshold for the match
    to be successful for each of the relationships. The Similarity Output Alias allows
    you to store the similarity information for each relationship. In our example,
    we are storing only the overall similarity of the lookup. Because it is a one-column
    match, the similarity matches the relationship similarity. Just like the Lookup
    component, the lookup column can be added to the pipeline and sent to the destination.
    The editor allows you to alias the lookup column if you need to add it to the
    pipeline.


    *Figure 12-26\. FZL_MatchFactCreate Relationships*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-455_1.jpg)


    ![](index-455_2.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    The Advanced tab of the Fuzzy Lookup Editor, shown in Figure 12-27, allows you
    to define the delimiters and the overall similarity threshold for each of the
    matches. The option that allows you to define the maximum number of matches will
    duplicate data rows for each successful match. For this example, we are using
    only whitespaces as delimiters for the tokens. By default, a few punctuation characters
    are defined as delimiters.


    *Figure 12-27\. FZL_MatchFact—Advanced*


    The entire Data Flow task is shown in Figure 12-28\. The Fuzzy Lookup component
    has a warning message because the sizes of the Fact column and the FuzzyMatchData
    column do not match. We added the Conditional Split component so that only rows
    with matching data pass through to the table. The FuzzyMatch output uses !ISNULL(FuzzyMatchData)
    as the splitting condition.


    *Figure 12-28\. DFT_FuzzyLookupSample*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    Fuzzy Grouping


    The *Fuzzy Grouping* component attempts to reduce the number of duplicates within
    a dataset based on the match criteria. The component will accept only the string
    data types, Unicode and Code page, to perform the matching operations. The transformation
    itself will create temporary tables and indexes on the server in order to perform
    the matching operations efficiently. For this example, we will use the same source
    component that we used for the Fuzzy Lookup example. The configuration of the
    Fuzzy Grouping transformation is very similar to Fuzzy Lookup in that it allows
    you to choose the Match Type, the Minimum Similarity, Comparison Flags, and other
    options as well. In addition, Fuzzy Grouping allows you to specify whether data
    may contain numeric characters by providing the Numerals option. The Numerals
    option enables you to perform better matches on alphanumeric information for which
    the numeric data poses significant implications at the beginning or end of the
    string. This option becomes useful for street address information or alphanumeric
    postal codes. For our example of Fuzzy Grouping, we will utilize the table shown
    in Listing 12-4 as the destination table for the results of the match.


     **TIP:** For some performance gains, let the host machine executing the package
    be the OLE DB connection for the Fuzzy Grouping transformation, if possible. The
    factors that directly impact the performance of the Fuzzy matching transformations
    are the dataset size (number of rows and columns) and the average token appearance
    in the matched column.


    *Listing 12-4\. Fuzzy Grouping Destination*


    CREATE TABLE dbo.StateFactGrouping


    (


    _key_in int,


    _key_out int,


    _score real,


    Name nvarchar(50),


    Capital nvarchar(50),


    Flag nvarchar(10),


    Date date,


    Fact nvarchar(500),


    Long float,


    Lat float,


    Fact_clean nvarchar(500),


    _Similarity_Fact real


    );


    GO


    The Fuzzy Grouping transformation adds a few columns to the pipeline in order
    to track the grouping. Some of the columns track the statistics behind the grouping,
    while others trace the records as they come through the pipeline:


    _key_in traces the original record as it comes through the Data Flow task. This
    column is for all intents and purposes an identity column. Every row in the


    dataset receives its own unique value.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-457_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    _key_out connects a grouped row to the _key_in value of the matching row that


    it most closely resembles.


    _score displays the similarity between the row and the matching row.


    Fact_clean represents the matching row’s value for the Fact column.


    _Similarity_Fact shows the similarity between the Fact column of the row and


    the matching row’s Fact value.


    Listing 12-5 shows how the grouping matched the states based on the facts recorded
    about them.'
  trans: "\n在查看了输出结果和 SQL Server 表的设置后，让我们回到实现模糊查找所需的 SSIS 包开发工作。模糊查找是一个`数据流`任务组件，需要数据流来进行匹配。我们使用的`OLE\
    \ DB`源包含清单 12-3 中的查询，用于提取我们所拥有的、构成美利坚合众国的所有州的数据。\n\n**清单 12-3. 州数据**\n\n```sql\n\
    SELECT DISTINCT s.Name,\n    s.Capital,\n    s.Flag,\n    s.Date,\n    s.Fact,\n\
    \    s.Long,\n    s.Lat\nFROM dbo.State s;\n```\n\n在开发之初，我们的需求是筛选出 `Fact` 字段包含某些非常特定词项的州。我们将这些词项加载到了\
    \ `dbo.StateFuzzyMatch` 表中。与可以使用查询来创建查找列表的`查找`组件不同，模糊查找必须指向一个表才能执行其匹配操作。该组件会在表上创建索引以加速匹配操作。图\
    \ 12-24 展示了我们为模糊查找使用的选项。我们选择不保存索引，而是允许组件在每次执行时重新生成新索引。该次执行所使用的索引不会被保存。对于静态表，建议保存索引。\n\
    \n**图 12-24. FZL_MatchFact—引用表配置**\n\n**注意：** 如果您选择保存索引但之后需要移除它，存储过程 `sp_FuzzyLookupTableMaintenanceUnInstall`\
    \ 允许您删除该索引。它将接受在模糊查找中指定的索引名作为其参数。\n\n为组件指定表后，您可以选择查找匹配的列映射，如图 12-25 所示。如果您需要在多个列上执行匹配，可以在此处进行。编辑器会绘制连线，以便轻松识别输入列和查找列之间的映射关系。在我们的示例中，匹配是在一个列上执行的，但就像`查找`组件一样，模糊查找组件可以使用多个列作为其匹配条件。\n\
    \n**图 12-25. FZL_MatchFact—列**\n\n如图 12-26 所示的`创建关系编辑器`允许您为查找中涉及的每个映射指定条件。要打开此编辑器，您必须在列映射区域的背景处右键单击并选择`编辑映射`。此编辑器中的关键字段是`映射类型`、`比较标志`和`最低相似度`。`映射类型`的选项是`模糊`和`精确`。\n\
    \n选择`精确`等同于对模糊查找强制实施`查找`组件的限制。它将强制将`最低相似度`更改为 1，即 100% 匹配。`比较标志`在匹配执行方式方面提供了灵活性。在我们的示例中，我们只关心忽略数据字符的大小写。`最低相似度`为每个关系的匹配成功设置阈值。`相似度输出别名`允许您存储每个关系的相似度信息。在我们的示例中，我们只存储查找的整体相似度。因为是单列匹配，所以相似度与关系相似度一致。就像`查找`组件一样，查找列可以添加到管道中并发送到目标。如果您需要将查找列添加到管道中，编辑器允许您为其指定别名。\n\
    \n**图 12-26. FZL_MatchFactCreate 关系**\n\n模糊查找编辑器的`高级`选项卡（如图 12-27 所示）允许您为每次匹配定义分隔符和整体相似度阈值。允许您定义最大匹配数的选项会为每次成功匹配复制数据行。对于此示例，我们仅使用空格作为词项的分隔符。默认情况下，会将几个标点字符定义为分隔符。\n\
    \n**图 12-27. FZL_MatchFact—高级**\n\n整个`数据流`任务如图 12-28 所示。模糊查找组件有一条警告消息，因为 `Fact`\
    \ 列和 `FuzzyMatchData` 列的大小不匹配。我们添加了`条件性拆分`组件，以便只有匹配数据的行才能传递到表中。`FuzzyMatch` 输出使用\
    \ `!ISNULL(FuzzyMatchData)` 作为拆分条件。\n\n**图 12-28. DFT_FuzzyLookupSample**\n\n\
    # 第 12 章 – 数据剖析与清洗\n\n## 模糊分组\n\n模糊分组组件尝试基于匹配条件减少数据集中的重复项数量。该组件仅接受字符串数据类型（Unicode\
    \ 和代码页）来执行匹配操作。转换本身将在服务器上创建临时表和索引，以便高效地执行匹配操作。对于此示例，我们将使用与模糊查找示例相同的源组件。模糊分组转换的配置与模糊查找非常相似，因为它允许您选择`匹配类型`、`最低相似度`、`比较标志`以及其他选项。此外，模糊分组允许您通过提供`数字`选项来指定数据是否可能包含数字字符。`数字`选项使您能够对字母数字信息执行更好的匹配，其中数字数据在字符串开头或结尾具有重要影响。此选项对于街道地址信息或字母数字邮政编码非常有用。对于我们的模糊分组示例，我们将使用清单\
    \ 12-4 中所示的表作为匹配结果的目标表。\n\n**提示：** 为了获得一些性能提升，如果可能，让执行包的主机作为模糊分组转换的 `OLE DB` 连接。直接影响模糊匹配转换性能的因素是数据集大小（行数和列数）以及匹配列中词项的平均出现频率。\n\
    \n**清单 12-4. 模糊分组目标**\n\n```sql\nCREATE TABLE dbo.StateFactGrouping\n(\n    _key_in\
    \ int,\n    _key_out int,\n    _score real,\n    Name nvarchar(50),\n    Capital\
    \ nvarchar(50),\n    Flag nvarchar(10),\n    Date date,\n    Fact nvarchar(500),\n\
    \    Long float,\n    Lat float,\n    Fact_clean nvarchar(500),\n    _Similarity_Fact\
    \ real\n);\nGO\n```\n\n模糊分组转换在管道中添加了一些列来跟踪分组。一些列跟踪分组背后的统计信息，而另一些则在记录流经管道时跟踪它们：\n\
    \n`_key_in` 跟踪原始记录流经数据流任务时的情况。此列实际上是一个标识列。数据集中的每一行都接收其自己唯一的值。\n\n`_key_out` 将一个分组行连接到它最相似的匹配行的\
    \ `_key_in` 值。\n\n`_score` 显示该行与匹配行之间的相似度。\n\n`Fact_clean` 代表匹配行的 `Fact` 列的值。\n\
    \n`_Similarity_Fact` 显示该行的 `Fact` 列与匹配行的 `Fact` 值之间的相似度。\n\n清单 12-5 显示了分组如何根据关于各州的事实记录来匹配它们。\n"
- fmt: "The join conditions in the first query show how the columns added by the Fuzzy\
    \ Grouping allow you to trace back the data to their original form. The second\
    \ query allows you to replace the state's original fact with the fact that the\
    \ Fuzzy Grouping transformation calculated to be the closest.\n\n### Listing 12-5\\\
    . Fuzzy Grouping Results\n\n```sql\nSELECT sfg1.Name AS GroupedState,\n      \
    \ sfg1.Fact AS GroupedFact,\n       sfg1._score AS GroupedScore,\n       sfg2.Name\
    \ AS MatchingState,\n       sfg2.Fact AS MatchingFact\nFROM dbo.StateFactGrouping\
    \ sfg1\nINNER JOIN dbo.StateFactGrouping sfg2\nON sfg1._key_out = sfg2._key_in\n\
    AND sfg1._key_in <> sfg2._key_in\n;\nGO\n\nSELECT sfg.Name,\n       sfg.Capital,\n\
    \       sfg.Fact_clean\nFROM dbo.StateFactGrouping sfg\n;\nGO\n```\n\nFigures\
    \ 12-29 and 12-30 demonstrate the results of the queries shown in Listing 12-5\\\
    . You may even be able to determine the tokens used to determine the matches just\
    \ by looking at Figure 12-28\\. For example, for Colorado and Louisiana, the tokens\
    \ used for the matching were most likely the only state. As for Arizona and Montana,\
    \ National Park was the most likely candidate. The scores for these matches are\
    \ relatively low because we set the similarity threshold to 0.08\\. The facts\
    \ that match are usually shorter strings matching to longer strings that contain\
    \ a significant number of the tokens.\n\n*Figure 12-29\\. Fuzzy Grouping results*\n\
    \nThe result set shown here simply demonstrates how the matched data is used rather\
    \ than the original values. This transformation can provide some useful insight\
    \ when attempting to initiate a data cleansing project. Business names, addresses,\
    \ and other contact information can be easily consolidated with the proper use\
    \ of this component. The value of the Fuzzy Grouping transformation begins to\
    \ show itself when the data starts following a standardized set.\n\n*Figure 12-30\\\
    . Fuzzy Grouping data replaced*\n\n## Data Previews\n\nOne of the most useful\
    \ features of SSIS is the ability to see the data as it flows through the Data\
    \ Flow task. There are a few options that allow you to sample the data. Data Viewers\
    \ allow you to see the data in various forms between two different components\
    \ of the Data Flow task. The Row Sampling and Percentage Sampling transformations\
    \ allow you to extract sample data directly from the dataset.\n\n### Data Viewer\n\
    \nThe *Data Viewer* option allows you to get a quick snapshot of your data stream\
    \ as it moves through your Data Flow task. The viewers can be enabled between\
    \ any two components within your Data Flow task.\n\nFigure 12-31 demonstrates\
    \ how the Data Viewer is defined on a Data Flow task. In order to enable a Data\
    \ Viewer, you have to right-click a connector between two components and select\
    \ Enable Data Viewer.\n\n*Figure 12-31\\. Enabling the Data Viewer*\n\nAfter the\
    \ Data Viewer has been enabled, a small icon will appear on the connector you\
    \ chose. The icon is a small magnifying glass indicating an in-depth look at the\
    \ pipeline at a singular point in time.\n\nFigure 12-32 demonstrates a connector\
    \ with a Data Viewer enabled. The Data Viewer can greatly assist you during development\
    \ because it can allow you to look at data without having to commit it to a table\
    \ or an object variable. One of the areas this object helps in data profiling\
    \ is during data conversions. Suppose your Data Conversion transformation is failing\
    \ without very specific error messages. The Data Viewer can help you identify\
    \ the rows that are causing the error, allowing you to initiate actions to either\
    \ fix the bad data or to ignore it. The Data Viewer can also be utilized to gauge\
    \ the success of Lookup components or Merge Join transformations.\n\n*Figure 12-32\\\
    . Enabled Data Viewer*"
