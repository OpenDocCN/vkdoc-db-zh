    \ the columns in the `dbo.State` table.\n\nWith this result set, we will show\
    \ a quick data-profiling process contained in `CH09_Apress_ChildPackage.dtsx`.\
    \ Figure 9-22 shows the configuration of the `SQL_GetStateColumns` task that stores\
