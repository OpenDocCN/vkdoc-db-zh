- fmt: '# 数据流转换


    ## 百分比采样


    **百分比采样转换**会创建两个输出数据集——一个代表选定的行样本，另一个包含数据集中未被选作样本的行。图 8-40 展示了一个简单的数据流，该数据流从本节示例中使用的航空平文件中对行进行采样。


    ### 图 8-40. 数据流中的百分比采样转换


    如数据流所示，`Percentage Sampling`转换将你的输入数据集拆分为两个独立的输出：

    - **采样选择输出**：包含组件为样本集选择的所有行。

    - **采样未选择输出**：包含组件未选入样本集的剩余行。


    `Percentage Sampling Transformation Editor`使得编辑此转换变得非常简单。只需选择你希望采样的行百分比（默认是 10%），并根据需要更改输出名称。你还可以为转换设置随机种子。如果不设置随机种子，组件将使用操作系统计时器计数器来随机选择输入数据中的样本行，因此样本数据集在每次运行时都会改变。如果你设置了随机种子，那么每次运行都会生成相同的样本数据集（当然，假设源数据在运行之间没有变化）。图
    8-41 展示了`Percentage Sampling Transformation Editor`。


    ### 图 8-41. 编辑百分比采样转换


    当你想要训练和测试数据挖掘模型，或者想要使用输入数据的代表性样本来高效测试你的 ETL 过程时，百分比采样非常有用。


    > **提示**：`Percentage Sampling Transformation Editor`允许你选择要包含在样本中的行百分比，但请记住，由于
    SSIS 使用的采样算法，你的样本数据集可能会比这个百分比略大或略小。此转换类似于带有`PERCENT`选项的`T-SQL TABLESAMPLE`。


    ## 行采样


    **行采样转换**类似于百分比采样转换，不同之处在于你选择要采样的行数，而不是行的百分比。图 8-42 展示了数据流中的行采样转换。


    ### 图 8-42. 数据流中的行采样转换


    图 8-43 所示的`Row Sampling Transformation Editor`与百分比采样编辑器非常相似。唯一的真正区别在于，对于行采样，你选择的是行数而不是采样的行百分比。


    ### 图 8-43. 行采样转换编辑器


    百分比采样和行采样转换之间存在细微的行为差异。使用百分比采样，你最终得到的样本集可能比你请求的百分比样本大小略大或略小。然而，使用行采样，只要你请求的样本大小小于输入数据集中的行数，你将获得恰好你所请求的行数。如果你的样本大小等于（或大于）输入数据集中的行数，则所有行都会被选入样本。行采样转换在功能上类似于带有`ROWS`选项的`T-SQL
    TABLESAMPLE`子句。


    ## 逆透视


    **逆透视转换**用于规范化非规范化的数据集。此转换从输入数据集中获取选定的列，并将它们逆透视为更规范化的行。以我们在透视转换示例中使用的非规范化航空数据为例，我们可以将其逆透视回更规范化的版本，如图
    8-44 所示。


    ### 图 8-44. 对非规范化数据集进行逆透视


    图 8-45 所示的示例数据流中展示了逆透视转换。


    ### 图 8-45. 示例数据流中的逆透视转换


    配置逆透视转换需要选择要逆透视的列，并为新逆透视的目标列和透视键值列命名。图 8-46 展示了`Unpivot Transformation Editor`。


    ### 图 8-46. 逆透视转换编辑器


    在编辑器中，你从“可用输入列”部分选择要进行透视的列。任何你不想透视的列会被勾选为“直通”列。在右下角，你选择一个透视键值列名——这是你希望放置透视键值的列的名称。在此示例中，我们选择了列名`Month`，透视键值是各列对应的月份名称。


    如果你愿意，可以将透视键值更改为其他内容，但它们必须都是唯一的。在我们的示例中，我们使用了默认值，即与输入列名相同的值。例如，我们可以使用完整的月份名称（January、February
    等）作为透视键值。


    **目标列**是你希望放置逆透视值的列的名称。在本例中，名称是`TotalMinorInjuries`。每个逆透视列的值都添加在这个新创建的列中。


    > **提示**：所有输入列的目标列名必须相同。


    ## 拆分与联接


    SSIS 包含多种转换，允许你在数据流中拆分、合并和联接数据集。这些转换对于组合多个数据集、复制数据集、执行查找以及创建数据集副本非常有用。


    ### 查找


    **查找转换**允许你通过从参考数据集中检索相关数据来丰富你的数据。查找在功能上类似于 SQL Server 中的联接操作。在`Lookup Transformation
    Editor`中，你选择源数据列和来自参考数据集的相关列。你还选择希望从参考数据集添加到数据流中的列。图 8-47 是一个示例数据流，它从平文件中提取国家橄榄球联盟（NFL）比赛数据，并针对存储在
    SQL Server 数据库表中的球队数据进行查找。


    ### 图 8-47. 示例数据流中的查找转换


    此数据流中有两个查找：一个查找获胜球队的名称，另一个查找失败球队的名称。`LKP – Winner`查找是使用图 8-48 所示的`Lookup Transformation
    Editor`配置的。


    > **提示**：如果你的参考数据在联接键列中有多个具有相同值的行，则会删除重复项。遇到重复项时，SSIS 将生成警告消息。参考数据行按查找组件检索它们的顺序进行考虑。


    **查找与大小写敏感性**'
  raw: 'datasets—one representing the selected sampling of rows and another containing
    the rows from your dataset that were not selected for sampling. Figure 8-40 demonstrates
    a simple data flow that samples rows from the aviation flat file we’ve used in
    the examples in this section.


    *Figure 8-40\. Percentage Sampling transformation in the data flow*


    As you can see in the data flow, the Percentage Sampling transformation splits
    your inbound dataset into two separate outputs:


    Sampling Selected Output contains all the rows selected by the component for


    the sample set


    Sampling Unselected Output contains the remaining rows that were not


    selected by the component for the sample set


    The Percentage Sampling Transformation Editor makes it very easy to edit this
    transformation.


    Simply select the Percentage of Rows you wish to sample (the default is 10%),
    and change the names of the outputs if you want to. You can also set the random
    seed for the transformation. If you do not set the random seed, the component
    uses the operating system tick counter to randomly seed a selection of sample
    rows from your input data, so the sample dataset will change during each run.
    If you do set a 290


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-291_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    random seed, the same sample dataset is generated each time (assuming the source
    data does not change between runs, of course). Figure 8-41 shows the Percentage
    Sampling Transformation Editor.


    *Figure 8-41\. Editing the Percentage Sampling transformation*


    Percentage Sampling is useful when you want to train and test data-mining models,
    or if you want to efficiently test your ETL processes with a representative sample
    of input data.


    ■ **TIP:** The Percentage Sampling Transformation Editor allows you to choose
    the percentage of rows to include in your sample, but keep in mind that because
    of the sampling algorithm used by SSIS, your sample dataset may be slightly larger
    or smaller than this percentage. This transformation is similar to the T-SQL TABLESAMPLE
    with PERCENT option.


    Row Sampling


    The Row Sampling transformation is similar to the Percentage Sampling transformation,
    except that you choose the number of rows to sample instead of the percentage
    of rows to sample. Figure 8-42 shows the Row Sampling transformation in the data
    flow.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-292_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-42\. Row Sampling transformation in the data flow*


    The Row Sampling Transformation Editor, shown in Figure 8-43, is very similar
    to the Percentage Sampling editor. The only real difference is that with Row Sampling,
    you choose a number of rows instead of a percentage of rows to sample.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-293_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-43\. Row Sampling Transformation Editor*


    There is a slight behavior difference between the Percentage Sampling and Row
    Sampling transformations. With Percentage Sampling, you may end up with a sample
    set that is slightly larger or smaller than the percentage sample size you’ve
    requested. With Row Sampling, however, you’ll get exactly the number of rows you
    request, assuming you request a sample size that is less than the number of rows
    in the input dataset. If your sample size is equal to (or greater than) the number
    of rows in your input dataset, all rows are selected in the sample. The Row Sampling
    transformation is similar in functionality to the T-SQL TABLESAMPLE clause with
    ROWS option.


    Unpivot


    The Unpivot transformation normalizes denormalized datasets. This transformation
    takes selected columns from an input dataset and unpivots them into more-normalized
    rows. Taking the example of denormalized aviation data we used in the Pivot transformation
    example, we can Unpivot it back into a more normalized version, as shown in Figure
    8-44.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-294_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-44\. Unpivoting a denormalized dataset*


    The Unpivot transformation is shown in the sample data flow in Figure 8-45.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-295_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-45\. Unpivot transformation in sample data flow*


    Configuring the Unpivot transformation requires choosing the columns to unpivot
    and giving the newly unpivoted destination column and the pivot key value column
    names. Figure 8-46 shows the Unpivot Transformation Editor.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-296_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-46\. Unpivot Transformation Editor*


    In the editor, you select the columns you want to pivot from the Available Input
    Columns section.


    Any columns you don’t want to be pivoted are checked off as Pass Through columns.
    In the bottom-right corner, you choose a pivot key value column name—this is the
    name of the column you wish to place your pivot key values into. In this example,
    we chose the column name Month, and the pivot key values are the month names for
    each column.


    If you choose to, you can change the pivot key values to something else, although
    they must all be unique. In our example, we went with the default, which is the
    same value as the Input Column name.


    We could, for instance, use the full month names (January, February, and so forth)
    as pivot key values.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    The Destination Column is the name of the column you wish to place the unpivoted
    values into. In this case, the name is TotalMinorInjuries. The values for each
    unpivoted column are added in this newly created column.


    ■ **TIP:** The Destination Column name must be the same for all your input columns.


    Splits and Joins


    SSIS includes several transformations that allow you to split, merge, and join
    datasets in the data flow.


    These transformations are useful for combining multiple datasets, duplicating
    datasets, performing lookups, and creating copies of datasets.


    Lookup


    The Lookup transformation lets you enrich your data by retrieving related data
    from a reference dataset.


    Lookup is similar in functionality to a join operation in SQL Server. In the Lookup
    Transformation Editor, you choose the source data columns and the related columns
    from the reference dataset. You also choose the columns you wish to add to your
    data flow from the reference dataset. Figure 8-47 is a sample data flow that pulls
    in National Football League game data from a flat file and performs lookups against
    team data stored in a SQL Server database table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-298_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-47\. Lookup transformations in a sample data flow*


    There are two lookups in this data flow: one looks up the winning team’s name,
    and the other looks up the losing team’s name. The LKP – Winner lookup was configured
    with the Lookup Transformation Editor, shown in Figure 8-48.


    ■ **TIP:** If your reference data has multiple rows with the same values in the
    join key columns, duplicates are removed. SSIS will generate warning messages
    when duplicates are encountered. The reference data rows are considered in the
    order in which they are retrieved by the lookup component.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-299_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    **LOOKUPS AND CASE SENSITIVITY**'
