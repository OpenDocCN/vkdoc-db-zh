    output. The names are editable, so you can change them to your liking. If you
    have different names for columns that should be matched in the outputs, you can
    choose them from drop-down lists in the `Union All Input` lists.


    Choosing `<ignore>` will put a `null` in the column for that input.


    **TIP:** The output from the `Union All` transformation is not guaranteed to be
    in order when more than one input is involved. To guarantee order, you’ll need
    to perform a `Sort` after the `Union All`.


    ## Merge


    The `Merge` transformation is similar to the `Union All`, except that it guarantees
    ordered output. To provide this guarantee, the `Merge` transformation requires
    all inputs to be sorted. This is particularly useful when you have to merge inputs
    from two separate sources and then perform a `Merge Join` with the resulting dataset.


    ![](index-315_1.jpg)

    *Figure 8-65. Merge transformation with two sorted inputs*


    In our example, we sorted the weather data from both sources by the `GameID` field
    and then performed a merge on them. The `Merge Transformation Editor` can be viewed
    by double-clicking the transformation. The editor is very similar to the `Union
    All Transformation Editor`, with one minor difference: the Sort key fields are
    all labeled in the `Merge Input` and `Output Column` lists.


    ![](index-316_1.jpg)

    *Figure 8-66. Viewing the Merge Transformation Editor*


    When properly configured, the `Merge` transformation guarantees that the output
    will be sorted based on the sort keys.


    ## Merge Join


    The `Merge Join` transformation lets you perform joins on two input datasets,
    much like SQL joins. The major difference is that unlike SQL Server, which handles
    data sorting/ordering for you when performing joins, the `Merge Join` transformation
    required you to presort your inputs on the join key columns.


    ![](index-317_1.jpg)

    *Figure 8-67. Merge Join added to the data flow*


    The `Merge Join Transformation Editor`, shown in Figure 8-68, lets you choose
    the join type. You can select an `inner join`, `left outer join`, or `full outer
    join`. All of these joins work as you’d expect from working with SQL:


    *   `Inner Join` returns only rows where the left input key and right input keys
    match. If there are rows from either input with join key values that don’t match
    the other input, the rows are not returned.

    *   `Left Outer Join` returns all the rows from the left input and rows from the
    right input where the join keys match. If there are rows in the left input that
    don’t have matching rows in the right input, nulls are returned in the right-hand
    columns.

    *   `Full Outer Join` performs all rows from the left and right inputs. Where
    the join keys don’t match on either the right or left side, nulls are returned
    in the columns on the other side.


    ![](index-318_1.jpg)


    One thing you might notice is that the `Merge Join` doesn’t support the SQL equivalent
    of the cross-join or the right outer join. You can simulate the right join by
    selecting `Left Outer Join` as the join type and then clicking the `Swap Inputs`
    button. This moves your left input to the right, and vice versa. The cross-join
    could be simulated by adding a derived column to both sides with a constant value
    in it and then joining on those two columns. The cross-join functionality isn’t
    as useful, though, except for generating large datasets (for testing purposes,
    for instance).


    In the editor, you can link the join key columns and choose the columns from both
    sides to return. You can also rename the output columns in the `Output Alias`
    list at the bottom of the editor.


    ![](index-319_1.jpg)

    *Figure 8-68. Setting attributes in the Merge Join editor*


    ## Auditing


    SSIS includes a handful of transformations that perform “auditing” functions.
    Essentially, these tasks allow you to capture metadata about your package or the
    data flow itself. You can use this metadata to analyze various aspects of your
    ETL process at a granular level.


    ### Row Count


    The `Row Count` transformation does just what its name says—it counts the rows
    that pass through it. `Row Count` sets a variable that you specify to the result
    of its count.


    ![](index-320_1.jpg)

    *Figure 8-69. Row Count transformation in the data flow*


    After you’ve added the `Row Count` transformation to the data flow, you need to
    create a variable on the `Parameters and Variables` tab and add an integer variable
    to the package. In this case, we’ve chosen to add a variable named `RowCount`.


    **NOTE:** If you’re not familiar with SSIS variables, don’t fret. We cover them
    in detail in Chapter 9. For now, it’s just important to know that SSIS variables
    are named temporary storage locations in memory, as in other programming languages.
    You can access variables in expressions, which we also discuss in Chapter 9.


    ![](index-321_1.jpg)

    *Figure 8-70. Adding a variable to the Parameters and Variables tab*


    The final step in configuring the `Row Count` transformation is to choose the
    variable it will transform. You associate the variable with the `Row Count` transformation
    by using the `VariableName` property of the `Row Count` editor.


    ![](index-322_1.jpg)

    *Figure 8-71. Associating a variable with the Row Count transformation*


    **TIP:** Don’t try to access the value of the variable set by your `Row Count`
    transformation until the data flow is finished. The value is not updated until
    after the last row has passed through the data flow.


    ### Audit


    The `Audit` transformation gives you a shortcut to add various system variables
    as columns in your data flow.


    ![](index-323_1.jpg)

    *Figure 8-72. Audit transformation in the data flow*


    After you add the `Audit` transformation to your data flow, double-click it to
    edit the properties in the editor. In the editor, you can choose the audit columns
    to add to your data flow. You can also rename the default output column names.


    ![](index-324_1.jpg)

    *Figure 8-73. Choosing audit columns in the Audit Transformation Editor*


    **TIP:** The `Audit` transformation is a convenience transformation. As an alternative,
    you can access all of the same system variables and add them to columns in your
    data flow with the `Derived Column` transformation.


    ## Business Intelligence Transformations


    In addition to the transformations covered so far, SSIS provides a handful of
    Business Intelligence transformations. One of these transformation, the `Slowly
    Changing Dimension` transformation, is specific to Dimensional Data ETL. We present
    this component and efficient alternatives to it in Chapter 17. The remaining components
    are designed for data scrubbing and validation. We cover these transformations
    in detail in Chapter 12.


