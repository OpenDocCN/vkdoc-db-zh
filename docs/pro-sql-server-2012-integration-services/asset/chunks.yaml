- fmt: '# CHAPTER 6 - ADVANCED CONTROL FLOW TASKS


    ## Foreach Loop Editor—Collection Page


    The `Collection` page of the `Foreach Loop Editor`, shown in Figure 6-30, allows
    you to configure many of the properties that will determine the looping structure
    of the container. The page will dynamically modify the properties that are available,
    depending on the type of enumerator you need to use. The enumerator types are
    `Foreach File enumerator`, `Foreach Item enumerator`, `Foreach ADO enumerator`,
    `Foreach ADO.NET Schema Rowset enumerator`, `Foreach From Variable enumerator`,
    `Foreach Nodelist enumerator`, and `Foreach SMO enumerator`.


    The `Collection` page allows you to configure the following context-specific properties:


    `Enumerator` lists all the types of enumerators available for the `Foreach Loop`
    container to traverse.


    ### Foreach File Enumerator


    `Foreach File Enumerator` allows the container to traverse a list of files.


    `Folder` specifies the working folder within which the files to be enumerated
    are located.


    `Browse` allows you to navigate the file system to easily find the file folder.


    `Files` lists the files to be used as the enumerator in a comma-separated format.
    Wildcards can be used to identify files by extension or common naming standards.


    `Fully Qualified` retrieves the folder path, file name, and file extension as
    the container traverses the file list. This value can be assigned to a variable
    to be used by an executable within the container.


    `Name and Extension` retrieves the file name and the file extension as the container
    traverses the file list. This value can be assigned to a variable to be used by
    an executable within the container.


    `NameOnly` retrieves the file name as the container traverses the file list. This
    value can be assigned to a variable to be used by an executable within the container.


    `TraverseSubfolders` allows you to include files inside subfolders for the file
    list.


    ### Foreach Item Enumerator


    `Foreach Item Enumerator` allows you to define a custom list of items for the
    container to loop through. A window on the `Collection` page allows you to identify
    the different elements of the list. The `Column` button is used to add columns
    to the enumerator. A new row is added to the list after the last row is populated
    with values.


    `Columns` button opens a dialog box that allows you to add columns to the enumerator
    and define their data types.


    `Remove` deletes an element from the enumerator.


    ### Foreach ADO Enumerator


    `Foreach ADO Enumerator` allows the usage of `ADO` or `ADO.NET` objects as the
    enumerators of the container. The `ADO` objects will enumerate the rows of a singular
    data table, whereas the `ADO.NET` objects may enumerate rows in multiple data
    tables or the data tables themselves.


    `ADO Object Source` lists all the user-created variables within the scope of the
    container. This variable will be traversed as a data table or a set of data tables.


    `Rows in First Table` traverses the rows that appear in the first data table only.
    This option can be applied to both `ADO` and `ADO.NET` objects.


    `Rows in All Tables (ADO.NET Dataset Only)` traverses all the rows in all the
    data tables.'
