- fmt: '# CHAPTER 17 DIMENSIONAL DATA ETL


    Data marts are usually fed by upstream systems such as normalized data warehouses
    and other databases. The data mart, in turn, is used to feed OLAP databases such
    as SQL Server Analysis Services cubes or is queried directly for reporting and
    analysis.


    ## DATA WAREHOUSE, OPERATIONAL DATA STORE, AND OTHER BUZZWORDS


    In addition to *data mart*, many other business intelligence–related buzzwords
    are out there. These include *data warehouse (DW)* and *operational data store
    (ODS)*, to name a couple. A data warehouse is a centralized repository of data
    from operational systems, specifically designed for analysis and reporting.


    Depending on the school of thought you subscribe to, you might build data warehouses
    in third normal form (the `top-down approach` espoused by Bill Inmon) or you might
    build several dimensional data marts with shared dimensions (the `bottom-up approach`
    favored by Ralph Kimball).


    Data warehouses are meant to hold high-quality organization-wide historical data,
    often at a higher level than the lowest transactional details, and on a very long
    timeline. An operational data store, on the other hand, is designed to hold more-volatile
    operational data for shorter periods of time. An ODS is often used to feed a data
    warehouse.


    The important aspect, in terms of dimensional data, is that an ODS and a data
    warehouse are generally used to feed dimensional data marts (except in the Kimball
    model, in which the data warehouse is the union of multiple data marts). The details
    of implementing data warehouses and operational data stores are out of the scope
    of this chapter, but you can find out more in Bill Inmon’s book *Building the
    Data Warehouse* (John Wiley & Sons, 2005) and Ralph Kimball’s book *The Data Warehouse
    Toolkit* (John Wiley & Sons, 2002).


    ## Creating Quick Wins


    When your boss says she wants you to optimize an ETL process (or any system for
    that matter), you can often translate this to mean “tweak it around the edges.”
    With that in mind, we’ll present some quick changes to give you the biggest bang
    for the buck.


    ### Run in Optimized Mode


    Data Flow tasks in SSIS have a setting called `RunInOptimizedMode`. Setting this
    property to `True` results in the data flow optimizing the task by automatically
    removing unused columns, outputs, and components from the data flow. In production
    packages, this property should always be set to `True`. This should only be set
    to `False` when debugging or in very specific troubleshooting scenarios. You can
    also set `RunInOptimizedMode` in the SSDT Project Properties. This property setting
    in SSDT overrides the individual Data Flow task setting when you run the package
    in SSDT—but only in SSDT. The default package property is `False`, enabling you
    to apply the Data Flow property to either `True` or `False`.


    Changing the project property to `True` will avoid having to update any or all
    data task properties. Figure 17-3 shows the property page for the Data Flow task.


    ![Figure 17-3. Setting the RunInOptimizedMode property to True](index-543_1.jpg)


    ### Remove “Dead-End” Components


    When debugging SSIS components, it’s common to use the Row Count component in
    place of a destination for error outputs. In many cases, the value returned by
    the Row Count is never used.


    Consider the sample data flow shown in Figure 17-4.


    ![Figure 17-4. Data flow with dead-end components](index-544_1.jpg)


    In this sample data flow, we’re sending the error rows from the Lookup transformations
    to Row Count transformations. In this case, we aren’t using the values returned
    by the Row Counts, but SSIS still has to move the unmatched rows down that branch
    of the data flow and into the components. This is an unnecessary inefficiency
    in this data flow. Fixing this is as simple as deleting the dead-end Row Counts.


    ### Keep Package Size Small


    Owing in large part to the overhead involved in initializing a package, including
    allocating buffers and automated validations and optimizations, executing a large
    package can take considerably more time and resources than executing multiple
    smaller packages to get the same end result. By keeping your packages small, SSIS
    can execute them more efficiently. There is no hard rule on package size, but
    SSIS expert Andy Leonard recommends keeping individual packages to a file size
    of 5 MB or lower. It is also possible to identify common SSIS tasks that run in
    multiple packages and create smaller packages of these tasks to be used as child
    packages that can then be called from one or many parent packages. This helps
    to encapsulate logic and provide reusable components reducing development. This
    topic is covered in more depth in Chapter 18. Note that by keeping your SSIS packages
    small, you also gain the benefit of faster loading and validation in SSDT.


    ### Optimize Lookups


    There are three main methods of optimizing Lookup transformations in your data
    flows. The first optimization technique is to use a SQL query to populate your
    Lookup transformation, instead of the Table or View population mode. The Table
    or View mode pulls all rows and columns from a table in the database. In many
    cases, the Lookup transformation doesn’t need all those columns. With the SQL
    Query mode, you can limit the results to include only a specified list of columns.
    There’s no point in pulling megabytes (or more) of extraneous data, only to discard
    it immediately.


    The second optimization technique for Lookup transformations involves reusing
    your Lookup reference data. If you have to perform multiple lookups against the
    same set of reference data, round-tripping to the database to pull this data two,
    three, or more times in a single package is a waste of resources. Instead, use
    the Cache transformation and load that reference data once.


    Our third optimization technique for Lookup transformations is to get rid of them.
    You can do this by performing a join on the server side—in your source query—or
    by using a Merge Join transformation.


    Although the Lookup transformation is not technically classified as a *blocking*
    transformation, it can actually be *worse* for performance than a transformation
    in this group. The issue with the Lookup transformation is that your data flow
    will not even begin moving data until the Lookup finishes caching its reference
    data. The Merge Join transformation, which is partially blocking, allows data
    to move through in a more efficient fashion.


    ### Keep Your Data Moving


    The Golden Rule of ETL efficiency is “keep your data moving.” Every second that
    data is not moving through your data flow is lost processing time that can never
    be reclaimed. As we discussed in Chapter 15, to keep your data moving, you should
    minimize the use of blocking transformations and consider performing joins, sorting,
    and aggregations on the server when possible.


    In addition, consider using the SQL Server `FAST` query hint. By applying the
    `FAST` query hint to long-running source queries, SQL Server will send a burst
    of initial rows to SSIS, allowing your data flow to proceed. Ideally, while those
    initial rows are winding their way through your data flow, SQL Server will supply
    more rows to your source component. This hint is particularly useful for long-running
    queries that feed complex data flows.


    **TIP:** You can find out more about SQL Server query hints at http://msdn.microsoft.com/en-us/library/ms181714.aspx.


    ### Minimize Logging'
  raw: 'Data marts are usually fed by upstream systems such as normalized data warehouses
    and other databases. The data mart, in turn, is used to feed OLAP databases such
    as SQL Server Analysis Services cubes or is queried directly for reporting and
    analysis.


    **DATA WAREHOUSE, OPERATIONAL DATA STORE, AND OTHER BUZZWORDS**


    In addition to *data mart*, many other business intelligence–related buzzwords
    are out there. These include *data warehouse (DW)* and *operational data store
    (ODS)*, to name a couple. A data warehouse is a centralized repository of data
    from operational systems, specifically designed for analysis and reporting.


    Depending on the school of thought you subscribe to, you might build data warehouses
    in third normal 545


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17  DIMENSIONAL DATA ETL


    form (the *top-down approach* espoused by Bill Inmon) or you might build several
    dimensional data marts with shared dimensions (the *bottom-up approach* favored
    by Ralph Kimball).


    Data warehouses are meant to hold high-quality organization-wide historical data,
    often at a higher level than the lowest transactional details, and on a very long
    timeline. An operational data store, on the other hand, is designed to hold more-volatile
    operational data for shorter periods of time. An ODS is often used to feed a data
    warehouse.


    The important aspect, in terms of dimensional data, is that an ODS and a data
    warehouse are generally used to feed dimensional data marts (except in the Kimball
    model, in which the data warehouse is the union of multiple data marts). The details
    of implementing data warehouses and operational data stores are out of the scope
    of this chapter, but you can find out more in Bill Inmon’s book *Building the
    Data* *Warehouse* (John Wiley & Sons, 2005) and Ralph Kimball’s book *The Data
    Warehouse Toolkit* (John Wiley


    & Sons, 2002).


    Creating Quick Wins


    When your boss says she wants you to optimize an ETL process (or any system for
    that matter), you can often translate this to mean “tweak it around the edges.”
    With that in mind, we’ll present some quick changes to give you the biggest bang
    for the buck.


    Run in Optimized Mode


    Data Flow tasks in SSIS have a setting called RunInOptimizedMode. Setting this
    property to True results in the data flow optimizing the task by automatically
    removing unused columns, outputs, and components from the data flow. In production
    packages, this property should always be set to True. This should only be set
    to False when debugging or in very specific troubleshooting scenarios. You can
    also set RunInOptimizedMode in the SSDT Project Properties. This property setting
    in SSDT overrides the individual Data Flow task setting when you run the package
    in SSDT—but only in SSDT. The default package property is False, enabling you
    to apply the Data Flow property to either True or False.


    Changing the project property to True will avoid having to update any or all data
    task properties. Figure 17-3 shows the property page for the Data Flow task.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-543_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    *Figure 17-3\. Setting the RunInOptimizedMode property to True*


    Remove “Dead-End” Components


    When debugging SSIS components, it’s common to use the Row Count component in
    place of a destination for error outputs. In many cases, the value returned by
    the Row Count is never used.


    Consider the sample data flow shown in Figure 17-4.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-544_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    *Figure 17-4\. Data flow with dead-end components*


    In this sample data flow, we’re sending the error rows from the Lookup transformations
    to Row Count transformations. In this case, we aren’t using the values returned
    by the Row Counts, but SSIS still has to move the unmatched rows down that branch
    of the data flow and into the components. This is an unnecessary inefficiency
    in this data flow. Fixing this is as simple as deleting the dead-end Row Counts.


    Keep Package Size Small


    Owing in large part to the overhead involved in initializing a package, including
    allocating buffers and automated validations and optimizations, executing a large
    package can take considerably more time and resources than executing multiple
    smaller packages to get the same end result. By keeping your packages small, SSIS
    can execute them more efficiently. There is no hard rule on package size, but
    SSIS


    expert Andy Leonard recommends keeping individual packages to a file size of 5
    MB or lower. It is also possible to identify common SSIS tasks that run in multiple
    packages and create smaller packages of these tasks to be used as child packages
    that can then be called from one or many parent packages. This helps to encapsulate
    logic and provide reusable components reducing development. This topic is covered
    in more depth in Chapter 18\. Note that by keeping your SSIS packages small, you
    also gain the benefit of faster loading and validation in SSDT.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17  DIMENSIONAL DATA ETL


    Optimize Lookups


    There are three main methods of optimizing Lookup transformations in your data
    flows. The first optimization technique is to use a SQL query to populate your
    Lookup transformation, instead of the Table or View population mode. The Table
    or View mode pulls all rows and columns from a table in the database. In many
    cases, the Lookup transformation doesn’t need all those columns. With the SQL


    Query mode, you can limit the results to include only a specified list of columns.
    There’s no point in pulling megabytes (or more) of extraneous data, only to discard
    it immediately.


    The second optimization technique for Lookup transformations involves reusing
    your Lookup reference data. If you have to perform multiple lookups against the
    same set of reference data, round-tripping to the database to pull this data two,
    three, or more times in a single package is a waste of resources. Instead, use
    the Cache transformation and load that reference data once.


    Our third optimization technique for Lookup transformations is to get rid of them.
    You can do this by performing a join on the server side—in your source query—or
    by using a Merge Join transformation.


    Although the Lookup transformation is not technically classified as a *blocking*
    transformation, it can actually be *worse* for performance than a transformation
    in this group. The issue with the Lookup transformation is that your data flow
    will not even begin moving data until the Lookup finishes caching its reference
    data. The Merge Join transformation, which is partially blocking, allows data
    to move through in a more efficient fashion.


    Keep Your Data Moving


    The Golden Rule of ETL efficiency is “keep your data moving.” Every second that
    data is not moving through your data flow is lost processing time that can never
    be reclaimed. As we discussed in Chapter 15, to keep your data moving, you should
    minimize the use of blocking transformations and consider performing joins, sorting,
    and aggregations on the server when possible.


    In addition, consider using the SQL Server FAST query hint. By applying the FAST
    query hint to long-running source queries, SQL Server will send a burst of initial
    rows to SSIS, allowing your data flow to proceed. Ideally, while those initial
    rows are winding their way through your data flow, SQL Server will supply more
    rows to your source component. This hint is particularly useful for long-running
    queries that feed complex data flows.


     **TIP:** You can find out more about SQL Server query hints at http://msdn.microsoft.com/en-us/library/ms181714.aspx.


