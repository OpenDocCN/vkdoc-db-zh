    SQL Server Management Studio


    SQL Server 12’s built-in tool for access and maintenance is the Management Studio.
    It allows you to configure, administer, and develop components of SQL Server.
    Connecting to the database engine allows you to use T-SQL as well as the SQL Command
    utility by using SQLCMD mode for operating-system commands. The database engine
    allows the use of DDL to create the objects, DML to access the data in the objects,
    and DCL to define user access to the objects for DDL and DML.Management Studio
    allows you to create and modify T-SQL, MDX, DMX, XML,and XML for Analysis(XMLA)
