    # SSIS 中的连接管理器


    ## SSIS 支持的文件类型


    ETL 过程中经常使用各种格式的文件。无论你是从分隔符或固定宽度的平面文件、二进制文件、Excel 电子表格文件，还是文件的组合中提取数据，SSIS 都能应对自如。以下是
    SSIS 原生支持的文件类型快速解析：


    ### 平面文件 (FLATFILE)


    平面文件是结构为分隔符文件、固定宽度文件或右侧参差不齐文件的文本文件。平面文件可以使用逗号 (`.csv`)、Tab 键或管道符 (`|`) 字符 (`.txt`)，或者你决定使用的任何其他分隔符进行分隔。


    ### 文件 (FILE)


    `文件连接管理器` 允许你选择任何文件作为输入或输出，包括文本文件、二进制文件、XML 文件或你偏好的任何其他格式。请注意，如果你选择结构化文件作为输入，例如分隔符文本文件或
    XML 文件，你需要负责识别和管理数据流中的结构化数据。


    ### EXCEL


    `Excel 文件连接管理器` 将你的数据流连接到 Excel 工作簿。


    ### 多文件 (MULTIFILE)


    如果你有多个格式相同的文件，`多文件连接管理器` 非常有用。如果你想将其用于多个格式不同的文件，则会稍微复杂一些，需要进行一些数据流处理的技巧。


    ### 多平面文件 (MULTIFLATFILE)


    `多平面文件连接管理器` 可以连接到多个格式相同的平面文件。如果你的文件格式不同，通过使用不同的业务逻辑尝试处理文件，你的数据流很容易被消耗掉。


    ## 文件连接管理器的通用信息


    凭借这多种多样的文件连接管理器，你几乎可以从任何格式的任何文件中检索数据。对于 SSIS 数据流原生不支持的文件格式，例如二进制文件，你将需要编写自定义代码来处理该文件格式。如图
    4-4 所示，`平面文件连接管理器编辑器` 的“常规”页面允许你选择源文件的名称、格式和代码页。你还可以选择源数据的区域设置、源数据是否为 Unicode
    以及其他选项，包括要跳过的标题行数（如果有）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-90_1.jpg)


    *图 4-4. 在编辑器中为平面文件连接管理器设置属性*


    `平面文件连接管理器编辑器` 允许你查看源文件中的列，并可选择行尾分隔符和列分隔符。如图 4-5 所示，编辑器还显示源文件中数据的预览。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-91_1.jpg)


    *图 4-5. 平面文件连接管理器编辑器的“列”页面，含数据预览*


    `平面文件连接管理器编辑器` 的“高级”页面为你提供了更改列级属性的机会，例如列的数据类型和大小。图 4-6 显示了“高级”页面上的列属性。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-92_1.jpg)


    *图 4-6. 平面文件连接管理器编辑器的“高级”页面，含列属性配置*


    ## ADO.NET 连接管理器


    `ADO.NET 连接管理器` 使用托管的 .NET 提供程序来访问你的数据。托管连接管理器的最大优势之一是，你可以轻松地从托管代码（例如控制流中的脚本任务或数据流中的脚本组件）内部访问此类连接管理器。最常用的
    .NET 提供程序之一是 `SqlClient` 数据提供程序，它专用于 SQL Server。其他托管提供程序选项包括 `OracleClient`、`Odbc`
    和 SQL Server Compact Edition。


    `OleDb` 选项的 .NET 提供程序让你可以通过托管代码访问多个 OLE DB 提供程序。使用这些提供程序时，SSIS 使用 .NET COM 互操作在你的
    OLE DB 提供程序周围创建一个托管包装器。这使得这些连接管理器在 .NET 代码中更易于访问，但可能会影响性能，因为在托管包装器和非托管 OLE DB
    提供程序之间存在额外的通信层。图 4-7 显示了 `ADO.NET 连接管理器` 可用的提供程序。


    *图 4-7. 在 ADO.NET 连接管理器编辑器中选择 .NET 提供程序*


    `ADO.NET 连接管理器编辑器` 允许你编辑连接的属性。对于常用的 `SqlClient` 提供程序，选项很简单：服务器名称、要连接的数据库和身份验证凭据。在“全部”页面上，你可以设置包括加密和复制支持在内的高级功能。图
    4-8 显示了 `SqlClient` 提供程序的连接编辑器属性。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-94_1.jpg)


    *图 4-8. ADO.NET SqlClient 连接管理器编辑器*


    ## 缓存连接管理器


    `缓存连接管理器` 是在 SQL Server 2008 中引入的。此类连接管理器允许你预先将查找数据缓存到内存中。考虑这样的场景：你有两个查找组件，且两者都从同一张表中读取大量相同的行。你可以使用
    `缓存连接管理器` 预先缓存查找数据，并将两个查找组件都连接到使用同一个 `缓存连接管理器`。这意味着你只需读取数据一次，并且它比两个独立的、缓存相同数据的查找组件消耗更少的内存。


    `缓存连接管理器` 可以通过缓存文件 (`.caw`) 填充，也可以通过缓存转换（我们将在本章后面介绍）填充。图 4-9 显示了 `缓存连接管理器编辑器`
    的“常规”选项卡。此选项卡允许你设置连接管理器的名称，并在你选择时，选择一个缓存文件作为连接管理器的源。


    *图 4-9. 缓存连接管理器编辑器“常规”选项卡选项*


    `缓存连接管理器编辑器` 的“列”选项卡允许你设置 `缓存连接管理器` 各列的属性。例如，你可以设置每列的数据类型、长度、精度/小数位数或代码页。图 4-10
    显示了“列”选项卡属性。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-96_1.jpg)


    *图 4-10. 缓存连接管理器编辑器“列”选项卡属性*


    ## 其他连接管理器


    在上一节中，你了解了一些最常用的连接管理器。SSIS 还提供了其他几种连接管理器（例如，FTP 和 HTTP 连接管理器、Analysis Services
    连接管理器和 Data Quality Services 连接管理器），以便访问那些不一定支持直接数据访问的系统。例如，FTP 服务器通常不包含原始数据，但它们可能存储文件，而这些文件又可能包含所需数据。这些连接管理器允许你访问这些不同的存储系统，从而检索数据。


    ### FTP 连接管理器


    `FTP 连接管理器` 允许你连接到文件传输协议 (FTP) 服务器。连接编辑器允许你定义超时、端口和若干其他属性，如图 4-11 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-97_1.jpg)


    *图 4-11. FTP 连接管理器编辑器*

