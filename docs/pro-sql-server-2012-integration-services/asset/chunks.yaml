- fmt: 'This portion of a simple project file contains all the essential elements
    to developing and using an SSIS ETL process. As you may have guessed, this information
    is stored as Extensible Markup Language (XML). This makes it feasible to modify
    the project directly by editing the XML.


    We would like to highlight the following key tags/properties (further details
    are discussed in later chapters):


    `ProtectionLevel` allows you to secure sensitive information such as credentials.
    This property can be set at the project level as well as the package level. However,
    both settings should be the same. All the packages within a project need to have
    the same protection level set as the project file when building the project. We
    discuss this property at greater length in Chapter 19.


    `Packages` contains all the packages that are associated with the project. Copying
    and pasting this tag and modifying the name to reflect a package that exists in
    the working directory will forcibly add the package to the project. When the project
    is opened in Visual Studio, the package will be listed in the packages folder.
    Modifying the project file directly can sometimes help avoid the hassle of creating
    clean file names as opposed to using the Visual Studio wizard to add existing
    packages.


    `Parameters` can be used at runtime to set values in the package. This property
    allows for certain components of the package to change values. The most notable
    place for this is in the OLE DB source component that can parameterize a SQL statement.
    Parameterizing a package is covered in greater detail in Chapter 16.


    `Configuration` determines whether you build or deploy the project. By default,
    the property is set to build the project. Different settings can be used for the
    various configurations that you create, depending on the purpose for each configuration.
    The configuration manager on the Project Settings allows you to create different
    configurations.


    `OutputPath` sets the folder path to the objects that will be built for the project.
    By default, it is set to the bin directory. When the deployment utility needs
    to be created, a different path can be defined. In 2005 and 2008, creating the
    deployment utility used the default folder path of `bin\Deployment`.


    ## Tool Windows


    The BIDS environment provides tools that organize all the components into easy-to-find
    sections. To begin, a Start page contains some important reference items. The
    Recent Projects panel contains a history of some of the projects that were opened.
    At the bottom of this pane are links to open existing projects and a link to create
    BIDS projects and other Visual Studio projects. The Getting Started pane contains
    links to BOL topics that can help developers learn the toolsets. If the Team Foundation
    Server Team Explorer utility is installed, a Source Control page is available.
    This page allows the developer to quickly access the projects assigned to him
    or her and refresh the copies of the code with specific versions stored on the
    repository.


    The Tool window within BIDS assists with the development, as shown in Figure 2-8.
    The middle section is the actual designer for SSIS packages. An addition to the
    designer comes in the form of a Zoom tool that is clear when it is inactive, but
    when the mouse hovers over it, it becomes opaque. Right below the Zoom scale is
    a Zoom-to-Fit button that will automatically determine the best zoom level to
    show the contents while maintaining the current arrangement.


    Below the designer are the connection managers. These are the sources and destinations
    for the ETL process. They contain the connection information such as server name,
    database name, and depending on the protection level that is defined, security
    credentials. Drivers might be needed for certain connections to be created. Only
    certain drivers come by default. Others can be obtained from Microsoft. Most of
    the drivers are free to download from Microsoft; other companies may charge for
    them. Certain practices should be followed when using or naming connection managers;
    we discuss them in Part 2 of the book.


    **NOTE:** If the BIDS tools are installed on a 32-bit operating system, only the
    32-bit version of the drivers will be installed. On a 64-bit operating system,
    both 32-bit and 64-bit tools will be installed. It is also important to note that
    not all 32-bit tools are available in 64-bit. The Microsoft OLE DB Provider for
    Jet (Office Access and Excel engine) and the SQL Server Compact Provider (SQL
    Server Compact) are not available in 64-bit. In a 64-bit environment, the default
    execution of the packages in Visual Studio utilizes the 64-bit tools. If these
    are unavailable, the package will either hang or fail. The `Run64BitRuntime` project
    property controls this execution. When set to True, all the packages associated
    with the project will be run in 64-bit mode. False results in 32-bit execution.


    ![](index-26_1.jpg)


    *Figure 2-8. Tool window for SSIS 2012*


    ## Designer Window


    The tabs across the top of the designer show the controls for the ETL process.
    The control flow consists of the three distinct types of components: containers
    that can logically group tasks together, tasks for the package’s functional requirements,
    and the precedence constraints that control and order the flow between the executables,
    containers, and tasks. We cover the control flow in detail in Chapters 5 and 6.


    The Data Flow tab is the designer that allows the developer to take control of
    the actual data processing. The Data Flow task is the component that moves data
    from the sources to the destinations, while allowing for transformations to occur
    in flight.


    The Event Handlers tab allows for actions to be designed for runtime events according
    to the triggers that are activated (OnError, OnExecStatusChanged, and so forth).
    The triggers can be attached to all the executables and tasks in the package.
    We give an in-depth walk-through of event handling in Chapter 10.


    The Package Explorer tab provides a quick glance at the entire package. It shows
    all the contents of the package in tree view, as shown earlier in Figure 2-8.
    As you can see in the figure, the variables appear in different places; this is
    due to the defined scope of the variable. Variables are discussed in Chapter 11.


    One of the new features that has been added with regards to variables is the addition
    of a variable property, `RaiseChangedEvent`. This allows for certain change criteria
    to trigger events that can be captured by the event handlers. It also allows for
    SSIS logging to capture this event through the log provider you use. Figure 2-9
    shows the tree diagram view of the objects in a package.


    **NOTE:** When developing SSIS packages, the concept of focus plays an important
    role. Focus basically means which component is currently selected. This is critical
    to keep in mind when creating variables. Having a container or an executable accidentally
    selected when creating a variable will limit it to that particular object. BIDS
    allows you to “move” variables between scopes. However, all Visual Studio does
    is create a new variable in the new scope with the name of the original variable
    having a 1 appended, and then Visual Studio deletes the original variable.


    ![](index-27_1.jpg)


    *Figure 2-9. The Package Explorer*


    During the execution of the package, a Progress tab appears to the right of the
    Package Explorer tab.'
