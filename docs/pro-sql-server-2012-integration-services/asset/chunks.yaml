  trans: "\n# 第 10 章 - 脚本编写\n\n`CreateNewOutputRow()`方法是实际进行处理的地方。首先，我们获取了 RSS 源的头部信息，包括源标题、链接和发布日期，并将其放入字符串变量中。然后，我们循环遍历\
    \ RSS 源中的`<item>`标签，每个标签代表一篇联合发布的文章，并将文章标题、链接和描述放入字符串变量中。在循环中，我们调用了输出缓冲区的`AddRow()`方法，并将从\
    \ XML 文档中提取的字符串值分配给输出缓冲区列。循环完成后，并且所有行都已添加到输出后，我们在缓冲区上调用`SetEndOfRowset()`方法，以通知\
    \ SSIS 不再有更多行传入。\n\n**提示：** 即使你现在认为不需要任何特殊的错误处理，在 .NET 代码周围放置 try-catch 块将使将来更容易地添加针对错误的特殊处理。\n\
    \n## 脚本组件事件\n\n与脚本任务类似，脚本组件允许您引发 SSIS 根据您的设置可能记录的事件。在脚本任务中，事件引发方法通过`Dts.Events`对象访问。在脚本组件中，它们通过`ComponentMetaData`对象访问。`ComponentMetaData`对象公开的方法包括：\n\
    \n-   `FireError()`引发`OnError`事件，该事件指示一个影响处理并可能阻止包运行的严重状况。请注意，`FireError()`本身不会停止数据流运行，但当错误向上传播回数据流任务时，SSIS\
    \ 将根据其属性决定控制流是否会失败。要在数据流中强制硬停止，您应该像我们在示例中所做的那样抛出异常。\n-   `FireWarning()`引发`OnWarning`事件，该事件指示一个不如错误严重但仍可能影响处理的问题。\n\
    -   `FireInformation()`引发`OnInformation`事件，其中包含信息性消息。这些消息通常对调试和排除故障问题很有用。\n- \
    \  `FireProgress()`引发`OnProgress`事件，这本身指示组件进度。我们在示例中使用了`FireProgress()`事件。\n-\
    \   `FireCustomEvent()`引发您在包内创建的自定义事件。\n\n`ComponentMetaData`对象公开的事件引发方法在调试时极其有用，我们强烈建议您在脚本组件中广泛使用它们。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n在此过程中，我们持续记录已处理的行数，并通过使用`FireProgress()`方法引发`OnProgress`事件来报告进度。与`OnInformation`类似，这些事件对排除故障和调试代码很有用。如果在此代码中遇到异常，通常涉及单行，因此我们调用`FireError()`来记录错误，并让\
    \ SSIS 决定是否在任务级别停止处理。代码清单如下：\n\n```csharp\npublic override void CreateNewOutputRows()\n\
    {\n    // 为启动引发 OnInformation 事件\n    this.ComponentMetaData.FireInformation(-1,\
    \ ComponentName,\n        \"Start - Create new output rows\", \"\", 0, ref b);\n\
    \n    try\n    {\n        // 获取源属性\n        string feed_title = RssXML.SelectSingleNode(\"\
    (/rss/channel/title)[1]\").InnerText;\n        string feed_link = RssXML.SelectSingleNode(\"\
    (/rss/channel/link)[1]\").InnerText;\n        string feed_language = RssXML.SelectSingleNode(\"\
    (/rss/channel/language)[1]\").InnerText;\n        string feed_pubDate = RssXML.SelectSingleNode(\"\
    (/rss/channel/pubDate)[1]\").InnerText;\n\n        // 初始化计数器并解析文章\n        int\
    \ CurrentRowCount = 0;\n        int CurrentPercent = 0;\n        int LastPercent\
    \ = 0;\n        XmlNodeList xl = RssXML.SelectNodes(\"/rss/channel/item\");\n\
    \        int TotalRows = xl.Count;\n\n        // 遍历文章\n        foreach (XmlNode\
    \ xn in xl)\n        {\n            // 获取文章属性\n            string title = xn.SelectSingleNode(\"\
    (title)[1]\").InnerText;\n            string link = xn.SelectSingleNode(\"(link)[1]\"\
    ).InnerText;\n            string description = xn.SelectSingleNode(\"(description)[1]\"\
    ).InnerText;\n\n            // 创建新的输出行\n            Output0Buffer.AddRow();\n\n\
    \            // 为输出缓冲区列赋值\n```\n"
- fmt: "# CHAPTER 10  SCRIPTING\n\n## Synchronous Script Component Transformation\n\
    \nThe `Script Component` synchronous transformation is extremely flexible. It\
    \ differs from the `Script Component` source in that it has an input and an output.\
    \ This section demonstrates a simple synchronous transformation with the script\
    \ component. For this example, we expanded the previous package by adding another\
    \ `Script Component` to the designer and selecting the transformation type, as\
    \ shown in Figure 10-18. This new `Script Component` will perform a commonly needed—yet\
    \ simple—function that is not included in the stock components. It will simply\
    \ number the columns of the data flow for us.\n\n*Figure 10-18. Selecting the\
    \ transformation script component type*\n\nAfter we added the new `Script Component`\
    \ to the designer, we routed the data flow through it, as shown in Figure 10-19.\n\
    \n![](index-384_1.jpg)\n\n*Figure 10-19. Adding the Script Component synchronous\
    \ transformation to the data flow*\n\n## SYNCHRONOUS OR ASYNCHRONOUS?\n\nWe discussed\
    \ the differences between synchronous and asynchronous transformations in Chapter\
    \ 8. The `Script Component` allows you to create both types of transformations.\
    \ By default, the `Script Component` synchronous transformations are synchronous,\
    \ and our sample is synchronous.\n\nThe setting that determines whether a `Script\
    \ Component` is synchronous or asynchronous is the `SynchronousInputID`, which\
    \ can be found on the **Inputs and Outputs** page of the editor. When this property\
    \ of the component is set to the name of the input (`Input 0` by default), the\
    \ component is synchronous. When it’s set to `None`, the component is asynchronous.\
    \ The below figure shows how to set the `SynchronousInputID` property of the component.\n\
    \n![](index-385_1.jpg)\n\n*Figure 10-20. Setting the SynchronousInputID of the\
    \ script component*\n\n```csharp\nOutput0Buffer.FeedTitle = feed_title;\nOutput0Buffer.FeedLink\
    \ = feed_link;\nOutput0Buffer.FeedLanguage = feed_language;\nOutput0Buffer.FeedPubDate\
    \ = feed_pubDate;\nOutput0Buffer.Title = title;\nOutput0Buffer.Link = link;\n\
