    建议改用 OLE DB 组件。该组件的编辑器与 OLE DB 目标非常相似，只是它除了连接管理器、要加载数据的表或视图以及映射页面外，不提供任何其他选项。


    ## 其他 RDBMS 源和目标


    对于 SQL Server 以外的其他关系数据库管理系统，Microsoft 提供了专门为提取数据而调整的驱动程序。对于 SSIS，这些其他系统的提供程序由
    Attunity 开发。（在早期版本中，Attunity 为 Oracle 连接提供驱动程序。）如图 14-6 所示的源助手为您提供有关如何获取默认不附带的连接提供程序的信息。对于其中一些提供程序，所有者可能会收取驱动程序使用费。


