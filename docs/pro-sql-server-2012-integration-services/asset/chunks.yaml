  trans: '## Types 窗格与连接管理器


    Types 窗格包含了当前机器支持的所有连接管理器。其他连接管理器（例如 DB2）的驱动程序可以从 Microsoft 网站下载。对于我们的示例包，我们只关注
    `Flat File` 源。在连接管理器窗格中，列出了该类型的所有管理器。在这个名为 `HelloWorld.dtsx` 的包中，只有一个这样的管理器。


    底部窗格显示了此特定平面文件的连接信息，因此您甚至可以看到文件名和路径。在 SSIS 的早期版本中，您必须在添加源组件之前就了解每个管理器的连接信息。当时不存在源助理来为您显示不同管理器的连接字符串。在这方面，为连接管理器使用的命名约定非常重要。单击
    **确定** 按钮后，您将自动将该组件添加到 `DFT_MovePopulationDensityData` 中。默认情况下，组件的名称是 `Flat File
    Source`，但通过使用定义的命名约定，我们将其名称更改为 `FF_SRC_PopulationDensity`。当您键入名称时，组件会自动调整大小，以便您清楚了解该组件将在窗口中占用多少空间。


    ## 添加目标组件


    源组件就位后，我们现在可以添加数据的目标。添加到 SSIS 12 的另一个新助理是目标助理。该助理提供了与源助理相同的组织帮助。该助理的一个关键特性是窗格底部显示的连接信息，如图
    3-12 所示。通过助理可以使用添加新连接管理器的选项。为连接管理器适当命名将使识别正确的连接变得更加容易。


    *图 3-12. 目标助理*


    选择我们想要的连接管理器 `DES_Chap3_CensusData` 后，我们可以通过单击 **确定** 按钮将其添加到数据流中。该组件将以默认名称 `OLE
    DB Destination` 添加。我们将遵守命名约定并将其重命名为 `OLE_DST_CensusData`。与源组件的情况一样，它会自动调整大小以适应提供的名称。


    ## 创建数据流路径


    在数据流任务中同时拥有源和目标组件后，我们需要指示 SSIS 将数据从源移动到目标。这是通过为数据流定义路径来完成的。要添加路径，您必须单击源组件。您将看到组件底部出现两个箭头。绿色箭头表示成功读取后的数据流，红色箭头则重定向读取期间失败的行。SSIS
    将绿色箭头识别为 `Flat File Source` 输出，红色箭头被称为 `Flat File Source Error Output`。这两个箭头如图
    3-13 所示。


    *图 3-13. 源组件——输出*


    数据流路径可以通过从源组件单击并拖动绿色箭头到目标组件来简单创建。另一种选择是使用数据流中的添加路径向导。可以通过右键单击源组件并选择 **添加路径** 来访问此向导。这将打开一个对话框，使您能够选择组件和路径的方向，如图
    3-14 所示。


    *图 3-14. 数据流 创建新连接器*


    使用此连接器向导，我们可以定义数据流的方向。此连接器向导将影响之后出现的向导的设置，如图 3-15 所示。


    *图 3-15. 输入输出选择*


    在向导完成后，您需要为路径命名。我们将其命名为 `FF_SRC_PopulationDensity to OLE_DST_CensusData`。路径连接了源的
    `Flat File Source Output` 和目标的 `OLE DB Destination Input`。在数据流设计器中，路径将显示为连接两个组件的箭头。'
- fmt: "# 第三章 你好世界——你的第一个 SSIS 2012 包\n\n## 映射\n\n此向导允许你匹配源组件和目标组件的输入和输出。对于输出，你有两个选项：`Flat\
    \ File Source Output` 和 `Flat File Source Error Output`。因为我们想要文件中的实际数据，所以我们选择了\
    \ `Flat File Source Output`。`OLE DB` 目标组件只能接受一个输入。单击“确定”后，将使用定义的输出和输入在这两个组件之间创建数据流路径。但创建数据流路径并不是最后一步；我们还需要映射源和目标之间的列。\n\
    \n如你所记，我们必须定义所有预期从源获得的列。将数据移动到目标时也需要相同的过程。在源和目标之间创建数据流路径后，Visual Studio 通过目标组件上的一个小红色\
    \ *x*（如图 3-16 所示）对此事实提供了一个小提醒。该错误将传播到控制流级别的可执行文件，因此你也会在 `DFT_MovePopulationDensityData`\
    \ 上看到 *x*。\n\n### 图 3-16. 数据流任务——映射错误 OLE DB 目标\n\n你可以通过将光标悬停在 *x* 标记上来识别错误的原因。在我们的案例中，我们没有为数据定义目标表。要解决此问题，我们必须双击目标组件以打开\
    \ `OLE DB` 目标编辑器。如图 3-17 所示，此编辑器允许你修改要用作连接管理器的内容以及有关实际将数据插入数据库的一些选项。\n\n![图 3-17](index-67_1.jpg)\n\
    \n## 第三章 你好世界——你的第一个 SSIS 2012 包\n\n### 图 3-17. 使用 OLE DB 目标编辑器修复错误\n\n`OLE DB`\
    \ 连接管理器下拉列表允许你更改在使用目标助手时选择的连接管理器。“数据访问模式”列表为你提供了有关如何加载数据的几个选项。“表或视图”选项将数据加载到目标数据库中定义的表或视图中。此选项为每一行触发插入语句。对于小型数据集，这些事务可能看起来很快，但随着数据量开始增加，使用此选项你将遇到瓶颈。“表或视图\
    \ – 快速加载”选项针对批量插入进行了优化。设置目标组件时，此选项是默认选项。“表名或视图名变量”选项使用一个变量，该变量的值是目标表的名称。此选项也仅使用逐行插入语句来加载数据。“表名或视图名变量\
    \ – 快速加载”也利用变量的值来确定目标表，但它针对批量插入进行了优化。\n\n## 第三章 你好世界——你的第一个 SSIS 2012 包\n\n`SQL`\
    \ 命令选项利用 `SQL` 查询来加载数据。此查询将为目标组件输入中出现的每条记录执行。\n\n我们没有准备好用于从源加载数据的表，但 `OLE DB`\
    \ 目标编辑器能够根据传递到其输入的元数据生成 `CREATE TABLE` 脚本。为此特定数据集生成的表脚本如清单 3-1 所示。如果我们在将列传递给目标组件之前从管道中删除了它们，则它们不会被添加到此创建脚本中。粗体代码表示我们为符合命名标准而对脚本所做的更改。默认情况下，表名为\
    \ `OLE_DST_CensusData`，这是赋予组件的名称。编辑器在生成创建表脚本时不指定表架构。如果要加载数据的表已经创建，则它会在下拉列表中可用。\n\
    \n### 清单 3-1. 人口密度数据的创建表脚本\n\n```sql\nCREATE TABLE dbo.PopulationDensity (\n \
    \   [STATE_OR_REGION] varchar(50),\n    [1910_POPULATION] varchar(50),\n    [1920_POPULATION]\
    \ varchar(50),\n    [1930_POPULATION] varchar(50),\n    [1940_POPULATION] varchar(50),\n\
    \    [1950_POPULATION] varchar(50),\n    [1960_POPULATION] varchar(50),\n    [1970_POPULATION]\
    \ varchar(50),\n    [1980_POPULATION] varchar(50),\n    [1990_POPULATION] varchar(50),\n\
    \    [2000_POPULATION] varchar(50),\n    [2010_POPULATION] varchar(50),\n    [1910_DENSITY]\
    \ varchar(50),\n    [1920_DENSITY] varchar(50),\n    [1930_DENSITY] varchar(50),\n\
    \    [1940_DENSITY] varchar(50),\n    [1950_DENSITY] varchar(50),\n    [1960_DENSITY]\
    \ varchar(50),\n    [1970_DENSITY] varchar(50),\n    [1980_DENSITY] varchar(50),\n\
    \    [1990_DENSITY] varchar(50),\n    [2000_DENSITY] varchar(50),\n    [2010_DENSITY]\
    \ varchar(50),\n    [1910_RANK] varchar(50),\n    [1920_RANK] varchar(50),\n \
    \   [1930_RANK] varchar(50),\n    [1940_RANK] varchar(50),\n    [1950_RANK] varchar(50),\n\
    \    [1960_RANK] varchar(50),\n    [1970_RANK] varchar(50),\n    [1980_RANK] varchar(50),\n\
    \    [1990_RANK] varchar(50),\n    [2000_RANK] varchar(50),\n    [2010_RANK] varchar(50)\n\
    );\n\nGO\n```\n\n![图 3-18](index-69_1.jpg)\n\n## 第三章 你好世界——你的第一个 SSIS 2012 包\n\
    \n列名和长度是基于在 `Flat File` 连接管理器中定义的元数据定义的。由于我们未将列定义为 Unicode，因此所有列的默认数据类型都是 `varchar`。此创建脚本通过一个可编辑的文本框提供，当你为目标表选择单击“新建”按钮时，该文本框会打开。将脚本修改为满足我们的需求后，我们需要在目标数据库上执行它以创建表。\n\
    \n在数据库上创建表后，它将出现在目标表下拉列表中。\n\n由于列名和数据类型与目标输入中的列完全匹配，因此映射由 `SSIS` 自动创建，如图 3-18\
    \ 所示。为了查看映射，你需要单击编辑器左侧窗格中的“映射”选项。\n\n### 图 3-18. OLE DB 目标编辑器映射页\n\n要从输入列创建到目标的映射，你有两个选项。你可以使用编辑器上半部分的\
    \ `UI`，它允许你将输入列单击并拖动到其匹配的目标列。或者，你可以使用屏幕的下半部分，其中输入列显示在每列目标列旁边的下拉列表中。你可以将一个输入列映射到仅一个目标列。如果要将同一列映射到多个目标，则必须使用管道中的一个组件来添加重复列。\n\
    \n在 `Visual Studio` 中运行此包之前，我们必须确保项目的 `ProtectionLevel` 属性与包中设置的值 `DontSaveSensitive`\
    \ 相匹配。不更改此属性，`Visual Studio` 将报告生成错误，并且不允许我们执行包。在创建所有组件并设置属性后，我们可以快速查看“包资源管理器”窗口，以快速审阅包中的对象。`HelloWorld.dtsx`\
    \ 的包资源管理器如图 3-19 所示。\n\n### 图 3-19. HelloWorld.dtsx — 包资源管理器\n\n图 3-19 中的“变量”文件夹是可展开的，因为为所有包创建了默认系统变量。它们以\
    \ `Package` 作用域创建，因此所有定义的可执行文件和容器都可以访问它们。由于此包设计得尽可能简单，因此大多数对象已被跳过。我们在控制流上只有一个可执行文件\
    \ `DFT_MovePopulationDensityData`，因此我们看不到任何优先约束。"
  raw: 'CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    This wizard allows you to match the inputs and the outputs of the source and destination
    components. For the output, you have two options: the Flat File Source Output
    and the Flat File Source Error Output. Because we want the actual data from the
    file, we selected the Flat File Source Output. The OLE DB destination component
    can accept only one input. After you click OK, the data path will be created between
    these two components using the outputs and inputs that were defined. But creating
    the data path is not the final step; we need to map the columns between the source
    and the destination.


    Mapping


    As you recall, we had to define all the columns that we were expecting from the
    source. The same process is required when moving the data to a destination. After
    we create the data path between the source and the destination, Visual Studio
    provides a small reminder of this fact through a small red *x* on the destination
    component, as can be seen in Figure 3-16\. The error will propagate to the control-flow-level
    executable, so you will see the *x* on DFT_MovePopulationDensityData as well.


    *Figure 3-16\. Data Flow task—mapping error OLE DB destination*


    You can identify the reason behind the errors by holding your cursor on top of
    the *x* mark. In our case, we did not define the destination table for our data.
    To fix this issue, we have to double-click the destination component to open the
    OLE DB Destination Editor. The editor, shown in Figure 3-17, allows you to modify
    the connection manager to be used as well as some options regarding the actual
    insertion of data into the database.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-67_1.jpg)


    CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    *Figure 3-17\. Fixing the error by using the OLE DB Destination Editor*


    The OLE DB Connection Manager drop-down list allows you to change the connection
    manager from the one selected when the Destination Assistant was used. The Data
    Access Mode list provides you with a few options on how to load the data. The
    Table or View option loads data into a table or view defined in the destination
    database. This option fires insert statements for each individual row. For small
    datasets, these transactions may seem fast, but as soon as the data volumes start
    increasing, you will experience a bottleneck using this option. The Table or View
    – Fast Load option is optimized for bulk inserts. This option is the default when
    setting up the destination component. The Table Name or View Name Variable option
    uses a variable whose value is the name of the destination table. This option
    also uses only row-by-row insert statements to load the data. Table Name or View
    Name Variable – Fast Load also utilizes the value of a variable to determine the
    destination table but it is optimized for bulk insert.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    The SQL Command option utilizes a SQL query to load the data. This query will
    execute for each record that appears in the input of the destination component.


    We do not have a table ready to load the data from the source, but the OLE DB
    Destination Editor has the ability to generate a CREATE TABLE script based on
    the metadata passed to its input. The table script it generates for this particular
    dataset is shown in Listing 3-1\. If we had removed columns from the pipeline
    prior to passing them to the destination component, they would not have been added
    to this create script. The bold code denotes the changes we made to the script
    to conform to our naming standards. By default, the table name was OLE_DST_CensusData,
    the name given to the component. The editor does not specify table schema when
    it generates the create table script. If the table you want to load the data into
    is already created, it is available in the drop-down list.


    *Listing 3-1\. Create Table Script for Population Density Data*


    CREATE TABLE *dbo.PopulationDensity* (


    [STATE_OR_REGION] varchar(50),


    [1910_POPULATION] varchar(50),


    [1920_POPULATION] varchar(50),


    [1930_POPULATION] varchar(50),


    [1940_POPULATION] varchar(50),


    [1950_POPULATION] varchar(50),


    [1960_POPULATION] varchar(50),


    [1970_POPULATION] varchar(50),


    [1980_POPULATION] varchar(50),


    [1990_POPULATION] varchar(50),


    [2000_POPULATION] varchar(50),


    [2010_POPULATION] varchar(50),


    [1910_DENSITY] varchar(50),


    [1920_DENSITY] varchar(50),


    [1930_DENSITY] varchar(50),


    [1940_DENSITY] varchar(50),


    [1950_DENSITY] varchar(50),


    [1960_DENSITY] varchar(50),


    [1970_DENSITY] varchar(50),


    [1980_DENSITY] varchar(50),


    [1990_DENSITY] varchar(50),


    [2000_DENSITY] varchar(50),


    [2010_DENSITY] varchar(50),


    [1910_RANK] varchar(50),


    [1920_RANK] varchar(50),


    [1930_RANK] varchar(50),


    [1940_RANK] varchar(50),


    [1950_RANK] varchar(50),


    [1960_RANK] varchar(50),


    [1970_RANK] varchar(50),


    [1980_RANK] varchar(50),


    [1990_RANK] varchar(50),


    [2000_RANK] varchar(50),


    [2010_RANK] varchar(50)


    ) *;*


    *GO*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-69_1.jpg)


    CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    The column names and lengths were defined based on the metadata defined in the
    Flat File Connection Manager. Because we did not define the columns as Unicode,
    the default data types for all the columns are varchar. This create script is
    made available through an editable text box that opens when you click the New
    button for the destination table selection. With the script modified to meet our
    needs, we need to execute it on the destination database to create the table.


    After we create the table on the database, it will appear in the drop-down list
    of destination tables.


    Because the column names and data types match exactly for the columns in the destination
    input, the mapping is automatically created by SSIS, as shown in Figure 3-18\.
    In order to see the mapping, you need to click the Mappings option in the left
    pane of the editor.


    —


    *Figure 3-18\. OLE DB Destination EditorMappings page*


    To create mappings from the input columns to the destination, you have two options.
    You can use the UI on the top half of the editor, which allows you to click and
    drag the input column to its matching 66


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-70_1.jpg)


    CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    destination column. Alternatively, you can use the bottom half of the screen,
    where the input columns are shown in drop-down lists next to each destination
    column. You can map an input column to only one destination column. If you want
    to map the same column to multiple destinations, you will have to use a component
    in the pipeline that will add the duplicate column.


    Before we run this package in Visual Studio, we have to make sure that the project
    ProtectionLevel property matches the value set in the package, DontSaveSensitive.
    Without changing this property, Visual Studio will report build errors and will
    not allow us to execute the package. After all the components have been created
    and the properties set, we can take a quick look at the Package Explorer window
    to quickly review the objects in the package. The Package Explorer for HelloWorld.dtsx
    is shown in Figure 3-19.


    *Figure 3-19\. HelloWorld.dtsx—Package Explorer*


    The Variables folder in Figure 3-19 is expandable because there are default system
    variables that are created for all the packages. They are created with Package
    scope, so all defined executables and containers will have access to them. Because
    this package is designed to be as simple as possible, a majority of the objects
    have been skipped. We have only one executable,


    DFT_MovePopulationDensityData, on the control flow so we do not see any precedence
    constraints.'
