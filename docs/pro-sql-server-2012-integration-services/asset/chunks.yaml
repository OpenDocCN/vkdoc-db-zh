- fmt: '# CHAPTER 12 — DATA PROFILING AND SCRUBBING


    ## Column Pattern Profile


    *Column Pattern profile* 在识别字符串数据中的模式时很有用，例如识别那些不符合给定国家格式标准的邮政编码。此配置文件返回与你的字符串数据匹配的正则表达式模式，可以让你轻松识别不符合预期模式的字符串数据。例如，一个美国的五位邮政编码应该符合正则表达式模式：


    ```

    \d{5}

    ```


    它代表一个恰好由五个数字组成的字符串。任何不符合此模式的五位美国邮政编码都是无效的。


    **注意：** 关于正则表达式和正则表达式语法的详细讨论超出了本书的范围。然而，MSDN 在 http://bit.ly/dotnetregex 对 .NET
    Framework 正则表达式有非常详细的介绍。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    与其他配置文件请求类似，列模式配置文件请求需要一个 ADO.NET 连接管理器、一个表或视图以及一个源列。此外，列模式配置文件请求比我们目前介绍的其他配置文件请求有更多的可用选项。以下选项允许你细化列模式配置文件请求：


    `MaxNumberOfPatterns`: 你希望数据剖析任务计算的最大模式数量。默认为 10，最大值为 99。


    `PercentageDataCoverageDesired`: 计算模式时要采样的行百分比。默认为 95。


    `CaseSensitive`: 一个标志，指示生成的模式是否区分大小写。默认为 False。


    在计算模式以匹配字符串数据的过程中，数据剖析任务会对字符串进行分词（将它们分解为单个的“单词”或子字符串）。有两个选项用于控制此分词行为：


    `Delimiters`: 这是一个字符列表，在分词时被视为分隔符。默认情况下，分隔符是空格、制表符 (`\t`)、回车符 (`\r`) 和换行符 (`\n`)。


    `Symbols`: 分词时要保留的符号列表。默认情况下，此列表包括以下字符：`,.;:-"''`~=&/\@!?()<>[]{}|#*^%`。


    列模式配置文件请求还允许你标记或分组词元。标签存储在数据库表中，该表具有名为 `Tag` 和 `Term` 的两个字符数据列。`Tag` 列保存词元组的名称，`Term`
    列保存属于该组的各个词元。出于性能原因，建议如果你使用此选项，使用 10 个或更少的标签，并且每个标签不超过 100 个词元。以下选项控制标记行为：


    `TagTableConnectionManager`: 一个使用 `SqlClient` 提供程序连接到 SQL Server 数据库的 ADO.NET
    连接管理器。


    `TagTableName`: 保存标签和词元的表的名称。必须有两个名为 `Tag` 和 `Term` 的列。


    图 12-13 展示了我们如何为示例配置列模式配置文件请求。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-440_1.jpg)


    *图 12-13. 配置列模式配置文件请求*


    列模式配置文件的结果如图 12-14 所示。我们关注了 `EventYear` 列，发现所有数据都匹配模式 `\d\d\d\d`，这是预期的连续四个数字字符的模式。由于此列中的所有字符串值都匹配有效模式，我们进一步确认了这些值可能是有效的。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-441_1.jpg)


    *图 12-14. 查看列模式配置文件结果*


    ## Column Statistics Profile


    *Column Statistics profile* 有助于快速评估超出给定列正常范围（或*容差*）的数据。例如，你可能会发现你的列包含未来的出生日期。你也可以使用提供的基本统计信息来确定你的数据是否符合统计正态分布。


    配置列统计配置文件请求与前面描述的配置文件请求类似。你需要选择一个连接管理器、表或视图以及一个源列。和之前一样，你可以使用 `(*)` 来分析所有列。我们将列统计配置文件请求配置为使用
    `AviationData` 表，如图 12-15 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-442_1.jpg)


    *图 12-15. 配置列统计配置文件请求*


    列统计配置文件将分析包含日期/时间和数值数据的列，例如 `DATETIME`、`INT`、`FLOAT` 和 `DECIMAL` 列。对于日期/时间数据，配置文件计算最小值和最大值；对于数值数据，它计算最小值、最大值、平均值（均值）和标准偏差。我们样本列统计配置文件的结果如图
    12-16 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-443_1.jpg)


    *图 12-16. 查看列统计配置文件请求的结果*


    ## Column Value Distribution Profile


    *Column Value Distribution profile* 报告列中的所有不同值以及表中每个值所占的行百分比。你可以使用此信息来确定不同值的出现频率是否符合预期。例如，你可能会发现某个列的默认值出现的次数远超你的预期。


    列值分布配置文件请求有多个选项需要配置。常见的选项在这里：你需要配置一个 ADO.NET 连接管理器，选择源表或视图，并选择要分析的列。你还需要选择一个 `ValueDistributionOption`:
    `FrequentValues`（默认）将报告结果限制为满足或超过给定阈值的值，而 `AllValues` 无论出现次数多少都报告所有结果。`FrequentValueThreshold`
    选项是一个数值——当选择 `FrequentValues` 选项时，用于限制返回结果的最小阈值。图 12-17 展示了我们如何通过使用 `AllValues`
    选项来配置列值分布配置文件请求。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-444_1.jpg)


    *图 12-17. 配置列值分布配置文件请求*


    对 `AviationData` 表各列进行分析的结果如图 12-18 所示。显示的列是 `State` 列，并显示了出现次数和出现百分比。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-445_1.jpg)


    *图 12-18. State 列的列值分布配置文件结果*


    ## Candidate Key Profile


    *Candidate Key profile* 分析一个或多个列，以确定某一列（或列集）成为表的良好键或近似键的可能性。当你试图识别*业务键*（唯一标识业务事务或对象的属性）时，候选键配置文件是一个有用的工具。


    **注意：** *候选键*是一个或一组列，可用于唯一标识表中的行。虽然一个表可以有多个候选键，但你通常会将其中之一标识为*主键*。


    与其他配置文件请求一样，你必须使用 ADO.NET 连接管理器配置候选键配置文件请求...（内容截断，已保留原文所有可见信息）'
  raw: 'The *Column Pattern profile* is useful for identifying patterns in string
    data, such as postal codes that aren’t formatted according to the standards for
    a given country. This profile returns regular expression patterns that match your
    string data, which can make it easy to identify string data that does not fit
    expected patterns. As an example, a US five-digit ZIP code should fit the regular
    expression pattern


    \d{5}”, which represents a string of exactly five numeric digits. Any five-digit
    US ZIP codes that do not match this pattern are invalid.


     **NOTE:** A detailed discussion of regular expressions and regular expression
    syntax is beyond the scope of this book. However, MSDN covers .NET Framework regular
    expressions in great detail at http://bit.ly/dotnetregex.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    Like the other profile requests, the Column Pattern profile request requires an
    ADO.NET


    Connection Manager, a table or view, and a source column. In addition, the Column
    Pattern profile request has many more options available than the other profile
    requests we’ve covered so far. The following options allow you to refine your
    Column Pattern profile request:


    MaxNumberOfPatterns: The maximum number of patterns that you want the


    Data Profiling task to compute. The default is 10, and the maximum value is 99.


    PercentageDataCoverageDesired: The percentage of rows to sample when


    computing patterns. The default is 95.


    CaseSensitive: A flag indicating whether the generated patterns should be case-


    sensitive. The default is False.


    During the process of computing patterns to fit your string data, the Data Profiling
    task tokenizes your strings (breaks them into individual “words” or substrings).
    Two options are included for controlling this tokenization behavior:


    Delimiters: This is a list of characters that are treated as spaces when


    tokenizing strings. By default, the delimiters are the space, the tab (\t), carriage
    return (“\r”), and newline (“\n”).


    Symbols: The list of symbols to keep when tokenizing data. By default, this list
    includes the following characters: ,.;:-"''`~=&/\@!?()<>[]{}|#*^%.


    The Column Pattern profile request also allows you to tag, or group, tokens. Tags
    are stored in a database table with two-character data columns named Tag and Term.
    The Tag column holds the name of the token group, and the Term column holds the
    individual tokens that belong to the group. For performance reasons, it’s recommended
    that if you use this option, use 10 tags or fewer and no more than 100 terms per
    tag. The following options control the tagging behavior:


    TagTableConnectionManager: An ADO.NET Connection Manager using the


    SqlClient provider to connect to a SQL Server database.


    TagTableName: The name of the table holding the tags and terms. Must have two


    columns named Tag and Term.


    Figure 12-13 shows how we configured the Column Pattern profile request for our
    sample.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-440_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-13\. Configuring the Column Pattern profile request*


    The results of the Column Pattern profile are shown in Figure 12-14. We focused
    on the EventYear column and found that all data matched the pattern \d\d\d\d,
    which is the expected pattern of four numeric characters in a row. Because all
    of the string values in this column match the valid pattern, we are a little closer
    to confirming that the values are valid.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-441_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-14\. Reviewing the Column Pattern profile results*


    Column Statistics Profile


    The *Column Statistics profile* helps to quickly assess data that is outside of
    the normal range, or *tolerances*, for a given column. You might find that your
    column contains dates of birth that are in the future, for example. You can also
    use the basic statistical information provided to determine whether your data
    fits the statistical normal distribution.


    Configuring the Column Statistics profile request is similar to the previously
    described profile requests. You need to choose a connection manager, table or
    view, and a source column. As before, you can you can use (*) to profile all columns.
    We configured our Column Statistics profile request to use the AviationData table,
    as shown in Figure 12-15.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-442_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-15\. Configuring the Column Statistics profile request*


    The Column Statistics profile will profile columns that hold date/time and numeric
    data, such as DATETIME, INT, FLOAT, and DECIMAL columns, for example. For date/time
    data, the profile calculates the minimum and maximum; for numeric data, it calculates
    the minimum, maximum, mean (average), and standard deviation. Results of our sample
    Column Statistics profile are shown in Figure 12-16.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-443_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-16\. Reviewing the results of the Column Statistics profile request*
    Column Value Distribution Profile


    The *Column Value Distribution profile* reports all the distinct values in a column
    and the percentage of rows in the table that each value represents. You can use
    this information to determine whether different values occur with the expected
    frequency. You may find, for instance, that a column’s default value occurs far
    more often than you anticipated.


    The Column Value Distribution profile request has several options to configure.
    The usual suspects are here: you need to configure an ADO.NET Connection Manager,
    choose the source table or view, and select the column to profile. You also need
    to choose a ValueDistributionOption: FrequentValues (the default) limits the results
    reported to those that meet or exceed a given threshold, and AllValues reports
    all the results regardless of how many times they occur. The FrequentValueThreshold
    option is a numeric value—the minimum threshold used to limit the results returned
    when the FrequentValues option is selected. Figure 12-17 shows how we configured
    the Column Value Distribution profile request by using the AllValues options.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-444_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-17\. Configuring the Column Value Distribution profile request*


    The results of profiling the columns of the AviationData table are shown in Figure
    12-18\. The column displayed is the State column, with occurrence counts and occurrence
    percentages shown.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-445_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-18\. Results of Column Value Distribution profile of the State column*
    Candidate Key Profile


    The *Candidate Key profile* profiles one or more columns to determine the likelihood
    that a column (or set of columns) would be a good key, or approximate key, for
    your table. The Candidate Key profile is a useful tool when you are trying to
    identify your *business keys* (attributes that uniquely identify business transactions
    or objects).


     **NOTE:** A *candidate key* is a column, or set of columns, that can be used
    to uniquely identify rows in a table.


    Although a table can have many candidate keys, you’ll usually identify one of
    them as the *primary key*.


    As with the other profile requests, you must configure the Candidate Key profile
    with an ADO.NET'
