- fmt: '# CHAPTER 8: DATA FLOW TRANSFORMATIONS


    ## Lookup Transformation


    One thing to keep in mind with the `Lookup` transformation is that it is case-sensitive,
    accent-sensitive, Kana-sensitive, and so forth. This is true regardless of the
    collation and sensitivity settings of the source of your input or reference data.
    That is to say, if you are pulling your reference data from a database with a
    case-insensitive collation and pulling your input data from a database with a
    case-insensitive collation, it doesn’t matter to the `Lookup` transformation—the
    string comparisons performed by the `Lookup` transformation are still case-sensitive.
    If you want to simulate case sensitivity, convert your input string data and related
    reference data to all uppercase or all lowercase prior to the comparison.


    **Figure 8-48. General page of the Lookup Transformation Editor**


    ### General Page


    The General page of the editor lets you choose the connection manager that will
    be the source of the reference data. Your options are an `OLE DB Connection Manager`
    or a `Cache Connection Manager`. For this sample, we went with the default `OLE
    DB Connection Manager`.


    You can also choose the cache mode on this page. You have three options for cache
    mode:


    - **Full Cache** mode preloads and caches the entire reference dataset into memory.
    This is the most commonly used mode, and it works well for small reference datasets
    or datasets for which you expect a large number of reference rows to match.

    - **Partial Cache** mode doesn’t preload any reference data into memory. With
    this cache mode, reference data rows are retrieved from the database as they are
    needed and then cached for future lookups. Individual `SELECT` statements are
    issued to retrieve each data row. This mode is useful when you have a small reference
    dataset, or when you expect very few reference rows to match many records in the
    input dataset.

    - **No Cache** mode doesn’t preload any reference data. In `No Cache` mode, reference
    data rows are retrieved as needed, one at a time using individual `SELECT` statements.
    Technically speaking, the `No Cache` mode does in fact cache the last reference
    row it retrieved, but discards it as soon as a new reference row is needed. This
    mode is normally not recommended unless you have a very small reference dataset
    and expect very few rows to match. The overhead incurred by this cache mode can
    hurt your performance.


    The `Lookup` transformation is generally closely tied to the `OLE DB Connection
    Manager`. By default, the lookup wants to pull its reference data from an OLE
    DB source, such as a SQL Server or other relational database. When you want to
    pull reference data from another source, such as a flat file or Excel spreadsheet,
    you need to store it in a `Cache` transformation first. We cover the `Cache` transformation
    in the next section.


    The final option on this first page lets you specify how to handle rows with no
    matching entries. You have four options:


    1.  **Fail Component** (default): If an input row passes through that does not
    have a matching row in the reference dataset, the component fails.

    2.  **Ignore Failure**: If an input row passes through that does not have a matching
    reference row, the component continues processing, setting the value of reference
    data output columns to null.

    3.  **Redirect Rows to No Match Output**: When this option is set, the transformation
    creates a “no match” output and directs any rows that don’t have matching reference
    rows to the new output.

    4.  **Redirect Rows to Error Output**: When this option is set, the component
    directs any rows with no matching reference rows to the transformation’s standard
    error output.


    ### Connection Page


    The Connection page of the editor lets you select an `OLE DB Connection Manager`
    that points to the database where your reference data is stored. On this tab,
    you also choose the source table or a SQL query, as shown in **Figure 8-49**.


    > **TIP:** Specifying a SQL query instead of a table as your source is a best
    practice. There is less overhead involved when you specify a SQL query, because
    SSIS doesn’t have to retrieve table metadata. You can also minimize the amount
    of data retrieved with a SQL query (both columns and rows), and you can’t do that
    if you specify a table.


    ![](index-301_1.jpg)


    **Figure 8-49. Connection page of the Lookup Transformation Editor**


    ### Columns Page


    The third page of the editor—the Columns page—is where you define the join between
    your input dataset and your reference dataset. Simply click on a column in the
    `Available Input Columns` box and drag it to the corresponding column in the `Available
    Lookup Columns` box. Select the check boxes next to the reference data columns
    you wish to add to your data flow. **Figure 8-50** shows the Columns page.


    ![](index-302_1.jpg)


    **Figure 8-50. Columns page of the Lookup Transformation Editor**


    In this example, we joined the `WinnerTeamID` column of the input dataset to the
    `TeamID` column of the reference data, and chose to add `TeamName` and `TeamLocationID`
    to the destination. The columns you select from the `Available Lookup Columns`
    box are added to the grid in the lower portion of the editor.


    Each `Lookup Column` has a `Lookup Operation` assigned to it that can be set to
    `<add as new column>` or `Replace ‘Column`*, indicating whether the column values
    should be added to the data flow as new columns or if they should replace existing
    columns. Finally, the `Output Alias` column allows you to change the name of the
    output column in the data flow.


    ### Advanced Page


    The Advanced page lets you set `Lookup` caching properties. The `Cache Size` property
    indicates how much memory should be used for caching reference data. The maximum
    32-bit cache size is 3,072 MB, and the maximum 64-bit cache size is 17,592,186,044,416
    MB.


    In `Partial Cache` mode, you can also set the `Enable Cache for Rows with No Matching
    Entries` option and set a percentage of allocation from the cache (default is
    20%) on this tab. This option caches data values that don’t have matching reference
    rows, minimizing round-trip queries to the database server.


    The `Custom Query` option lets you change the SQL query used to perform database
    lookups in `Partial Cache` or `No Cache` mode, as referenced in the figure below.


    ![](index-303_1.jpg)


    **Figure 8-51. Advanced page of the Lookup Transformation Editor**


    ## Cache Transformation


    As we mentioned in the previous section, the `Lookup` transformation, by default,
    looks for an `OLE DB Connection Manager` as its source for reference data. Other
    sources can be used, but they must be used indirectly via a `Cache` transformation.
    The `Cache` transformation can read data from a wide variety of sources, including
    flat files and ADO.NET data sources that aren’t supported directly by the `Lookup`
    transformation as illustrated in **Figure 8-52**.


    ![](index-304_1.jpg)


    **Figure 8-52. Populating the Cache transformation**


    As you can see in the figure, the `Cache` transformation accepts the output of
    a source component in the data flow as its input. It uses a `Cache Connection
    Manager` to cache the reference data in memory for use by the lookup component.
    Because the `Cache` transformation has to be populated before your lookup executes,
    you generally want to populate it in a separate data flow that precedes the data
    flow containing your lookups. In our sample, we populated the `Cache` transformation
    in one data flow, performed the lookup in a second data flow, and linked them
    with a precedence constraint, as shown in **Figure 8-53**.


    ![](index-305_1.jpg)


    ![](index-305_2.jpg)


    **Figure 8-53. Separate data flows for Cache and Lookup**'
  raw: 'One thing to keep in mind with the Lookup transformation is that it is case-sensitive,
    accent-sensitive, Kana-sensitive, and so forth. This is true regardless of the
    collation and sensitivity settings of the source of your input or reference data.
    That is to say, if you are pulling your reference data from a database with a
    case-insensitive collation and pulling your input data from a database with a
    case-insensitive collation, it doesn’t matter to the Lookup transformation—the
    string comparisons performed by the Lookup transformation are still case-sensitive.
    If you want to simulate case sensitivity, convert your input string data and related
    reference data to all uppercase or all lowercase prior to the comparison.


    *Figure 8-48\. General page of the Lookup Transformation Editor*


    The General page of the editor lets you choose the connection manager that will
    be the source of the reference data. Your options are an OLE DB Connection Manager
    or a Cache Connection Manager. For this sample, we went with the default OLE DB
    Connection Manager.


    You can also choose the cache mode on this page. You have three options for cache
    mode: 299


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    Full Cache mode preloads and caches the entire reference dataset into


    memory. This is the most commonly used mode, and it works well for small


    reference datasets or datasets for which you expect a large number of reference
    rows to match.


    Partial Cache mode doesn’t preload any reference data into memory. With this


    cache mode, reference data rows are retrieved from the database as they are


    needed and then cached for future lookups. Individual SELECT statements are


    issued to retrieve each data row. This mode is useful when you have a small


    reference dataset, or when you expect very few reference rows to match many


    records in the input dataset.


    No Cache mode doesn’t preload any reference data. In No Cache mode,


    reference data rows are retrieved as needed, one at a time using individual


    SELECT statements. Technically speaking, the No Cache mode does in fact cache


    the last reference row it retrieved, but discards it as soon as a new reference
    row is needed. This mode is normally not recommended unless you have a very


    small reference dataset and expect very few rows to match. The overhead


    incurred by this cache mode can hurt your performance.


    The Lookup transformation is generally closely tied to the OLE DB Connection Manager.
    By default, the lookup wants to pull its reference data from an OLE DB source,
    such as a SQL Server or other relational database. When you want to pull reference
    data from another source, such as a flat file or Excel spreadsheet, you need to
    store it in a Cache transformation first. We cover the Cache transformation in
    the next section.


    The final option on this first page lets you specify how to handle rows with no
    matching entries. You have four options:


    Fail Component (default): If an input row passes through that does not have a


    matching row in the reference dataset, the component fails.


    Ignore Failure: If an input row passes through that does not have a matching


    reference row, the component continues processing, setting the value of


    reference data output columns to null.


    Redirect Rows to No Match Output: When this option is set, the


    transformation creates a “no match” output and directs any rows that don’t


    have matching reference rows to the new output.


    Redirect Rows to Error Output: When this option is set, the component directs


    any rows with no matching reference rows to the transformation’s standard


    error output.


    The Connection page of the editor lets you select an OLE DB Connection Manager
    that points to the database where your reference data is stored. On this tab,
    you also choose the source table or a SQL


    query, as shown in Figure 8-49.


    ■ **TIP:** Specifying a SQL query instead of a table as your source is a best
    practice. There is less overhead involved when you specify a SQL query, because
    SSIS doesn’t have to retrieve table metadata. You can also minimize the amount
    of data retrieved with a SQL query (both columns and rows), and you can’t do that
    if you specify a table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-301_1.jpg)


