    *Figure 7-22\. Mapping columns in the Advanced Editor*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-231_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    The Input and Output Properties tab gives you access to advanced column-level
    metadata. In this view, you can see the individual external columns, output columns,
    and their properties, as shown in Figure 7-23.


    *Figure 7-23\. Reviewing column-level metadata in the Input and Output Properties
    tab* After configuring the Flat File source adapter, we connected its output to
    the ADO.NET destination, and configured the ADO.NET destination adapter to use
    the ADO.NET Connection Manager. The source-to-destination connection and ADO.NET
    destination adapter are shown in Figure 7-24 and Figure 7-25.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-232_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    *Figure 7-24\. Connecting the Flat File source adapter output to the ADO.NET destination
    adapter input* 232


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-233_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    *Figure 7-25\. Configuring the ADO.NET destination adapter*


    The Flat File destination adapter is the opposite of the Flat File source adapter.
    Instead of pulling in the contents of a flat file and outputting the data into
    your data flow, the Flat File destination adapter accepts the input from your
    data flow and outputs it to a flat file.


    Excel Files


    Business users often use spreadsheets as ad hoc databases. From a business user’s
    perspective, it makes sense because they, and all their colleagues, are familiar
    with the spreadsheet paradigm. They all understand the user interface, how to
    implement simple and even complex calculations, and how to format the interface
    exactly as they want it. From the IT perspective that developers and DBAs bring
    to 233


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-234_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    the table, there are few things scarier than the thought of hundreds of gigabytes
    of business information floating around the aether, possibly unsecured, in ad
    hoc spreadsheet formats.


    The Excel source and destination can help you pull data out of spreadsheets and
    store it in secure, structured databases, or extract data from well-defined systems
    and put it in a format your business users can easily manipulate.


    For this example, we’ll assume a simple package with two data flows in it. One
    data flow will read the contents of an Excel spreadsheet and store it in a table,
    and the second will read the contents of that same table and output it to an Excel
    spreadsheet. Our sample Excel spreadsheet looks like Figure 7-26.


    *Figure 7-26\. Source Excel spreadsheet containing ISO 3166 country codes and
    names* The first step is to create an Excel Connection Manager. Right-click in
    the Connection Managers tab and choose New Connection. Then choose the EXCEL connection
    manager type. You’ll be presented with the Excel Connection Manager dialog box,
    shown in Figure 7-27\. In this example, we chose an Excel file named iso3166.xls
    with a list of country names and abbreviations from the ISO 3166 standard, we
    234


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-235_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    selected Microsoft Excel 97–2003 format, and we selected the check box indicating
    that the first row of data on the spreadsheet holds the column names.


     **NOTE:** ISO 3166 is the international standard for country codes and names.
    Whenever possible, it’s a good idea to use recognized standards instead of reinventing
    the wheel.


    *Figure 7-27\. Setting Excel Connection Manager properties in the editor dialog
    box* We also created an OLE DB Connection Manager, as described in the “Destination
    Assistant”


    section of this chapter.


    The next step is to drag the Excel source adapter and OLE DB destination adapter
    onto the BIDS'
  trans: '# 第七章：源和目标适配器


    ## 平展文件


    当谈论导入和导出文件时，极大概率谈论的是**平展文件**。由于其非常普遍，`SSIS` 为从平展文件导入数据和平展文件导出数据提供了广泛的支持和选项也就不足为奇了。当我们谈论平展文件时，我们指的是分隔符文件、固定宽度文件和*参差右对齐文件*（即除最后一列长度可变外，其他列均为固定宽度的文件）。


    我们在本章的第一个示例中演示了一个简单的平展文件导入，现在我们将通过另一个示例，回头讨论其高级选项。我们首先在一个新包中创建并配置了一个`平展文件连接管理器`和一个`ADO.NET
    连接管理器`。我们按照图 7-19 所示配置了`平展文件连接管理器`。


    ![图 7-19. 配置平展文件连接管理器](img/index-228_1.jpg)


    我们配置`平展文件连接管理器`，从名为`states.txt`的分隔符文件中提取数据。该文件包含`Unicode`数据，因此我们勾选了`Unicode`复选框。因为我们使用了`Unicode`，所以`代码页`下拉框被禁用，因为它与此无关。格式是分隔符格式，大多数列使用管道符分隔——稍后会详细说明；最后，文件的第一行包含列名。


    我们还在`平展文件连接管理器编辑器`的`高级`页面上调整了一些设置。


    我们将`列分隔符`（它告诉`SSIS`如何将文件分割成列）设置为管道字符(`|`)，适用于大多数列。在文件的最后一个字段中，我们有每个州首府的`经度`和`纬度`，以逗号(`,`)分隔，如图
    7-20 所示。所以实际上，我们拥有的是一个所谓的`混合分隔符文件`。


    当你创建平展文件连接时，所有列默认都是 50 个字符的字符串。在我们的案例中，我们调整了一些列的`数据类型`设置：例如，我们将`经度`和`纬度`列更改为双精度浮点`[DT_R8]`数据类型。


    ![图 7-20. 在平展文件连接管理器编辑器的高级页面调整列级设置](img/index-229_1.jpg)


    **注意：** 本节我们只是对`平展文件连接管理器`做了简要概述。我们在第 4 章详细讨论了连接管理器及其配置。


    配置好`平展文件连接管理器`后，我们配置了`平展文件`源适配器以使用它。虽然`平展文件`源适配器有一个标准的简化编辑器，但我们选择使用所有组件默认都有的`高级编辑器`来配置此组件。要访问如图
    7-21 所示的`高级编辑器`，只需右键单击`平展文件`源适配器，然后从上下文菜单中选择`显示高级编辑器`。


    我们在`高级编辑器`的`连接管理器`选项卡上设置的第一个选项，是告诉`平展文件`源适配器使用`平展文件连接管理器`。


    ![图 7-21. 配置平展文件源适配器使用平展文件连接管理器](img/index-230_1.jpg)


    `列映射`选项卡用于映射`外部列`（由连接管理器定义的列）和`输出列`（由`平展文件`源适配器输出的列）。您可以通过在上部窗口中将外部列拖放到`输出列`框中来更改列映射，也可以通过在下部窗口的网格框中从下拉列表选择不同的列来进行更改。`列映射`选项卡如图
    7-22 所示。


    ![图 7-22. 在高级编辑器中映射列](img/index-231_1.jpg)


    `输入和输出属性`选项卡提供了对高级列级元数据的访问。在此视图中，您可以看到各个外部列、输出列及其属性，如图 7-23 所示。


    ![图 7-23. 在输入和输出属性选项卡中查看列级元数据](img/index-232_1.jpg)


    配置好`平展文件`源适配器后，我们将其输出连接到`ADO.NET`目标，并配置`ADO.NET`目标适配器以使用`ADO.NET 连接管理器`。源到目标的连接以及`ADO.NET`目标适配器如图
    7-24 和图 7-25 所示。


    ![图 7-24. 将平展文件源适配器输出连接到 ADO.NET 目标适配器输入](img/index-233_1.jpg)


    ![图 7-25. 配置 ADO.NET 目标适配器](img/index-234_1.jpg)


    `平展文件`目标适配器与`平展文件`源适配器的功能相反。`平展文件`目标适配器不是将平展文件的内容拉入并输出到您的数据流中，而是接受来自数据流的输入并将其输出到平展文件。


    ## Excel 文件


    业务用户经常将电子表格用作临时数据库。从业务用户的角度来看，这很有道理，因为他们和他们的同事都熟悉电子表格范式。他们都理解用户界面，知道如何实现简单甚至复杂的计算，以及如何完全按照他们想要的方式格式化界面。从开发人员和`DBA`带来的`IT`视角来看，没有什么比想到数百
    GB 的业务信息以临时的电子表格格式在虚拟空间中漂浮（可能未受保护）更可怕的事情了。


    `Excel`源和目标可以帮助您将数据从电子表格中提取出来，并将其存储在安全、结构化的数据库中，或者从定义良好的系统中提取数据，并将其放入业务用户易于操作的格式中。


    在这个例子中，我们假设一个简单的包中有两个数据流。一个数据流将读取`Excel`电子表格的内容并将其存储在表中，第二个数据流将读取同一张表的内容并将其输出到`Excel`电子表格。我们的示例`Excel`电子表格如图
    7-26 所示。


    ![图 7-26. 包含 ISO 3166 国家代码和名称的源 Excel 电子表格](img/index-235_1.jpg)


    第一步是创建一个`Excel 连接管理器`。在`连接管理器`选项卡中右键单击并选择`新建连接`。然后选择`EXCEL`连接管理器类型。您将看到`Excel
    连接管理器`对话框，如图 7-27 所示。在此示例中，我们选择了一个名为`iso3166.xls`的`Excel`文件，其中包含来自`ISO 3166`标准的国家名称和缩写列表，我们选择了`Microsoft
    Excel 97–2003`格式，并勾选了表示电子表格的第一行数据包含列名的复选框。


    **注意：** `ISO 3166`是国家代码和名称的国际标准。如果可能，使用公认的标准而不是重新发明轮子是个好主意。


    ![图 7-27. 在编辑器对话框中设置 Excel 连接管理器属性](img/index-236_1.jpg)


    我们还创建了一个`OLE DB 连接管理器`，如本章“目标助手”部分所述。


    下一步是将`Excel`源适配器和`OLE DB`目标适配器拖到`BIDS`设计器界面。'
- fmt: "# CHAPTER 7 - SOURCE AND DESTINATION ADAPTERS\n\ndesigner surface and connect\
    \ them. We then edited the Excel source by double-clicking it to pull up the `Excel\
    \ Source Editor`. In the editor, we chose the `Excel Connection Manager` we just\
    \ created, chose a data access mode of `Table or View`, and selected the first\
    \ spreadsheet in the Excel workbook, named `Sheet1$`, as you can see in Figure\
    \ 7-28.\n\n**NOTE:** The `Excel Source Editor` lets you choose entire worksheets\
    \ or named ranges of cells from an Excel workbook.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-236_1.jpg)\n\n### Figure 7-28. Configuring the Excel source in the\
    \ editor\n\nYou can look at the source columns by selecting the `Columns` tab\
    \ of the `Excel Source Editor`. The `Columns` page gives you a list of available\
    \ `external columns` (the columns in the physical Excel file) with a check box\
    \ next to each one. You can deselect a given column if you don’t want it included\
    \ in your data flow. Figure 7-29 shows the `Columns` page of the `Excel Source\
    \ Editor`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-237_1.jpg)\n\
    \n### Figure 7-29. Viewing the Columns page of the Excel Source Editor\n\nAs an\
    \ alternative to choosing the `Table or View` access mode and selecting a worksheet\
    \ name, you can choose `SQL Command` mode and enter a SQL-style query to get the\
    \ same data from your Excel spreadsheet. The following query retrieves the same\
    \ data from your worksheet that we’re grabbing in the current example:\n\n```sql\n\
    SELECT Alpha2,\n       CountryName,\n       Year,\n       TLD\nFROM [Sheet1$];\n\
    ```\n\n**NOTE:** The Excel source and Excel destination adapters use the Microsoft\
    \ OLE DB Provider for Jet 4.0 and the Excel Indexed Sequential Access Method (ISAM)\
    \ driver to read from and write to Excel spreadsheets. Bear in mind that this\
    \ driver provides a very limited subset of SQL-style query syntax, and it does\
    \ not support many T-SQL features you may be used to.\n\nWhen you set up an Excel\
    \ source adapter, it tries to automatically determine the data types of the `external\
    \ columns` by sampling the data in the spreadsheet. There is currently no way\
    \ to force or coerce the data type of an Excel column to a more appropriate type,\
    \ apart from modifying the data in your spreadsheet. Table 7-4 shows all of the\
    \ data types supported by the Excel ISAM driver.\n\n### Table 7-4. Excel to SSIS\
    \ to SQL Server Data Type Conversions\n\n| **Excel Data Type** | **SSIS Data Type**\
    \ | **SQL Server Data Type** |\n| :--- | :--- | :--- |\n| Boolean | `Boolean [DT_BOOL]`\
    \ | `bit` |\n| Currency | `Currency [DT_CY]` | `money` |\n| Date/time | `Datetime\
    \ [DT_DATE]` | `datetime` |\n| Memo | `Unicode text stream [DT_NTEXT]` | `nvarchar(max)`\
    \ |\n| Numeric | `Double-precision float [DT_R8]` | `float` |\n| String | `Unicode\
    \ string, length 255 [DT_WSTR]` | `nvarchar(255)` |\n\nIf SSIS overestimates the\
    \ size or data type of your Excel columns—for instance, `nvarchar(255)` for an\
    \ `nvarchar(2)` column—you may need to add a `Derived Column` transformation (which\
    \ we cover in the next chapter) to your data flow to convert your columns to the\
    \ appropriate types. To complete the data flow, we simply configured the `OLE\
    \ DB destination` to point at a database table and mapped the columns as we described\
    \ in the “Destination Assistant” section of this chapter. A successful run of\
    \ this sample package looks like Figure 7-30.\n\n## JET DRIVERS AND 64-BIT\n\n\
    Before you run a package that connects to Microsoft Office files, such as Excel\
    \ spreadsheets and Access databases, you need to know that the Microsoft Jet 4.0\
    \ drivers come in only 32-bit (x86) flavors. If you’re developing on a 64-bit\
    \ machine, you’ll need to set your project to run using the 32-bit runtime so\
    \ that it will use the 32-bit Jet 4.0 drivers to connect to the Excel workbook.\
    \ You can access this option by right-clicking your project in the BIDS Solution\
    \ Explorer and choosing `Properties`. Under the `Debugging` properties, change\
    \ the `Run64BitRuntime` option to `False`, as shown in Figure 7-30.\n\nThis setting\
    \ makes BIDS use the 32-bit runtime instead of the 64-bit runtime to execute your\
    \ packages for this project. The setting is good only at design time in BIDS,\
    \ however. If you execute your package from the command line or by using another\
    \ tool, you’ll have to ensure that the 32-bit runtime is used.\n\n### Figure 7-30.\
    \ Setting the SSIS project to run in 32-bit mode\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-239_1.jpg)\n\n### Figure 7-31. Successful run of Excel spreadsheet\
    \ import to SQL Server table\n\nWhereas the Excel source adapter lets you pull\
    \ data from Excel spreadsheets into your data flow, the Excel destination allows\
    \ you to output data from a data flow to an Excel spreadsheet. To demonstrate,\
    \ we’ll pull the contents of the `Country` table we just populated from the database\
    \ and output it to a new spreadsheet.\n\nWe’ll add a new `Excel Connection Manager`\
    \ to the SSIS package and point it at a new, mostly empty spreadsheet. The new\
    \ spreadsheet will have only the names of the columns in the first row, as shown\
    \ in Figure 7-32.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-241_1.jpg)\n\
    \n### Figure 7-32. New SSIS destination workbook, empty except for column headings\n\
    \nNext we’ll add an `OLE DB source` adapter and an `Excel destination` adapter\
    \ to an empty data flow.\n\nAfter we configure the `OLE DB source` to pull data\
    \ from the `Country` table in the database, we link the `OLE DB source` output\
    \ to the `Excel destination` input. The final step is to configure the `Excel\
    \ destination`.\n\nIn the `Excel Destination Editor`, we selected the newly created\
    \ `Excel Connection Manager`, set the data access mode to `Table or View`, and\
    \ chose the name of the first worksheet, `Sheet1$`, as shown in Figure 7-33.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-242_1.jpg)\n\n\
    ### Figure 7-33. Configuring the Excel destination adapter in the Excel Destination\
    \ Editor\n\n## Raw Files\n\nWhenever you read from or write to a flat file, there\
    \ are thousands of data conversions taking place in the background. Consider an\
    \ integer number such as `2,147,483,647`. This number uses only 4 bytes of memory\
    \ in your computer. But when you write it out to a flat file, it’s converted to\
    \ a string of numeric digits 10 characters long. That’s more than double the storage\
    \ and a performance hit because of the conversion. When you read the number back\
    \ in from a flat file, you have to read in 10 characters and you get hit with\
    \ another conversion penalty. Granted, the size difference and performance impact\
    \ isn’t that much for a single number, but multiply that by 10 columns and 1,000,000\
    \ rows (which is not an unreasonable example), and suddenly you’re talking about\
    \ a noticeable change in both performance and storage space.\n\nFor day-to-day\
    \ file transfers and imports/exports from and to other systems, flat files are\
    \ the way to go. In a lot of cases, flat files aren’t all that large, so the size\
    \ and performance differences aren’t significant. But more important, when transferring\
    \ data between systems, you can’t go wrong with plain text. Accounting for some\
    \ variation between character sets, every system reads text, and every system\
    \ writes text.\n\nSometimes, however, you may find a need to temporarily store\
    \ large volumes of partially processed data during processing. A common example\
    \ is when a large number of rows have been pushed through an SSIS package, a lot\
    \ of processing has taken place, and you need to pick up the data in another SSIS\
    \ package (or a different data flow in the same package) for further processing.\
    \ To maximize efficiency of your SSIS interpackage processing, raw files are hard\
    \ to beat."
