    ## WMI Event Watcher Task


    An important ability enabling an application to run is determining whether the
    conditions on the host machine are suitable for its execution. The SSIS `WMI Event
    Watcher task` allows for this functionality. It utilizes WQL queries directed
    at WMI event classes to listen to the system’s events. The task can be used to
    wait until a certain event occurs to continue the execution, to delete files to
    create space if the amount of free space goes below a threshold, or even to await
    the installation of an application. Figure 6-25 demonstrates the task as it appears
    in the control flow. The icon is a clipboard with a yellow lightning bolt on it.
    It shows that the task is watching and waiting for firing of very specific events.


    *Figure 6-25\. WMI Event Watcher task*


    The WMI Options page of the WMI Event Watcher Task Editor, shown in Figure 6-26,
    allows you to configure all the necessary properties to watch for and respond
    to WMI events. This page defines the actions to take after the required event
    takes place.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-193_1.jpg)


    CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    *Figure 6-26\. WMI Event Watcher Task Editor—WMI Options page*


    The WMI Options page of the WMI Event Watcher task allows the modification of
    the following properties:


    `WMIConnectionName` lists all the WMI Connection Managers defined in the package.
    Select the one pointing to the target machine.


    `WQLQuerySourceType` defines the method of passing the query to the task. The
    `Direct input` option allows you to type the WQL query into the `WQLQuerySource`
    field. `File connection` indicates that the query is stored within a file that
    can be accessed through a file connection manager. The `Variable` option allows
    the query to be stored in an SSIS variable.


    `WQLQuerySource` identifies the access method for the query. With `Direct input`,
    you can type the query into this field.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    `ActionAtEvent` defines the action to take when the WQL query returns a result
    set indicative of the target event. The options are `Log the event`, and `Log
    the event and fire the SSIS event`. The `Log the event` option causes the event
    to be logged without causing SSIS to issue its own event. The second option logs
    the event as well as have SSIS issue an event as a result.


    `AfterEvent` defines the action the task takes after detecting the required event.
    The `Return with failure` option causes the task to error when it receives the
    result from the WQL query. The `Return with success` option results in the task
    completing with success after the required event occurs. `Watch for the event
    again` continues listening for the event for the number of times specified in
    the `NumberOfEvents` field.


    `ActionAtTimeout` defines the action to take when the WQL query times out. The
    `Log the time-out` option causes the event to be logged without causing SSIS to
    issue its own event. The `Log the time-out and fire the SSIS event` option logs
    the time-out as well as has SSIS issue an event as a result.


    `AfterTimeout` defines the action the task takes after reaching the time-out period.
    The `Return with failure` option causes the task to error when the time-out is
    reached. The `Return with success` option causes the task to complete with success
    even if the required event does not occur. The `Watch for the event again` option
    restarts the time-out counter, and the task will continue to wait for the event.


    `NumberOfEvents` defines the number of times the event the task watches for the
    event occurrence before the task completes.


    `Time-out`, a nonzero value, sets the number of seconds without the WQL query
    returning a result set, after which the task will stop listening for that iteration.


    ## Advanced Containers


    The previous chapter introduced the `Sequence` container as a way of organizing
    your control flow to make it easier to read. This chapter introduces the other
    two default containers: the `For Loop` container and the `Foreach Loop` container.
    As their names suggest, these two containers are used to run a set of executables
    repeatedly. The `For Loop` container executes a predetermined number of times,
    whereas the `Foreach Loop` container relies on an enumerator to dictate its iterations.
    The containers limit precedence constraints from crossing multiple containers.
    The iteration commences when the last executable or concurrent executables within
    the container complete execution. In order to add executables to a container,
    you need to click and drag them from the SSIS Toolbox onto the space inside the
    container. The `Task Host` container cannot be directly accessed, but it keeps
    the control flow executables organized.


    ### For Loop Container


    The `For Loop container`, which should be used when the number of executions is
    predetermined, does not rely on objects to determine the number of iterations.
    The `For Loop` container utilizes expressions to set, evaluate, and increment
    the iterator. Figure 6-27 shows the container as it appears in the control flow
    without any executables. The task’s icon is a square with an arrow forming a loop
    around it. The square represents the process being continuously executed. This
    loop can also behave as `while` or a `do while` loop, depending on the expressions
    provided. The arrow on the right side of the name tag allows you to collapse the
    container to minimize the space used in the control flow.


    *Figure 6-27\. For Loop container*


    The `For Loop` page of the `For Loop Editor`, shown in Figure 6-28, allows you
    to configure the `For Loop` control. The configuration consists of defining expressions
    that will initialize, evaluate, and increment the iterator.


    *Figure 6-28\. For Loop Editor—For Loop page*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-196_1.jpg)


    CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    The `For Loop` page of the Editor allows you to modify the following properties:


    `InitExpression` provides the expression that will set the initial value of the
    loop iterator. The expression does not need an assignment value; providing a numeric
    variable will automatically evaluate to its value. This property is optional for
    some types of loops.


    `EvalExpression` provides a logical expression whose evaluation determines the
    continuation of the loop.


    `AssignExpression` provides an expression that will increment the iterator. This
    field is optional.


    `Name` provides a unique name for the `For Loop` container.


    `Description` provides a brief explanation of the looping executables.


    **NOTE:** Because the `For Loop` container can be implemented as a `while` or
    `do while` loop, take extra precautions with the expressions and SSIS variable
    values used. It is possible for this loop to continue indefinitely.


    ### Foreach Loop Container


    The `Foreach Loop container` utilizes enumerators to control its looping behavior.
    The enumerator itself can consist of various types of objects. Unlike the `For
    Loop` container, this loop cannot run indefinitely.'
