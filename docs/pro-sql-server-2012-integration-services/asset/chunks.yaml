    Event handlers are containers for control flows that are executed in response
    to SSIS events. Generally speaking, the SSIS stock events whose names begin with
    On, such as OnError and OnWarning, can have event handlers associated with them.
    For our example, we extended the previous sample to include OnError event handlers.


    We created an event handler for the Data Flow task by highlighting it on the design
    surface and selecting the Event Handlers tab in BIDS. Then we selected the OnError
    event from the Event Handler drop-down list. We were presented with the window
    shown in Figure 11-13.


    *Figure 11-13\. Adding an event handler to a task*


