    在将`平面文件源适配器`连接到`OLE DB 目标适配器`之后，我们仍然需要配置`OLE DB 目标适配器`。双击`OLE DB 目标适配器`，可以打开`OLE
    DB 目标编辑器`。通过此编辑器，我们选择了`OLE DB 连接管理器`、`数据访问模式`以及目标表的名称。我们选择了`表或视图 - 快速加载`作为`数据访问模式`，这让我们也可以设置`每批行数`和`最大插入提交大小`选项。我们将这些选项从默认值更改了。这些选项如图
    7-11 所示。


    图 7-11. 在编辑器中为 OLE DB 目标设置属性


    编辑器的"映射"页面为您提供了将目标组件的输入列映射到其输出列的机会。当您将目标适配器连接到数据流时，`BIDS`会尝试根据列名自动进行映射。在我们的示例中，源文件中的所有列都与目标表中的列同名，因此映射为我们自动执行。如果您需要将输入列映射到名称不同的输出列，可以通过在映射窗口的上半部分连接它们，或者在屏幕下半部分的网格视图中更改它们来修改映射，如图
    7-12 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-216_1.jpg)


    图 7-12. OLE DB 目标编辑器的"映射"页面


    完成目标配置后，`BIDS`中数据流设计器里组件上的红色`x`将会消失。在`BIDS`中运行包，可以看到如图 7-13 所示，有 29,470 行数据从平面文件导入到了数据库表中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-217_1.jpg)


    图 7-13. 使用源和目标助手创建的简单数据流成功执行


    ## 数据库源和目标


    在前面的章节中，我们向您展示了如何使用源和目标助手来设置一个简单的包，将数据从平面文件提取并推送到数据库中。我们选择使用`平面文件源`和`OLE DB 目标适配器`进行演示，因为它们的使用是一个非常常见的场景，尤其是在使用`SSIS`从无法直接连接的遗留系统中提取数据并将其推送到
    SQL Server 数据库时。本节将详细介绍数据库源和目标，并向您展示如何配置它们更高级的功能。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### OLE DB


    `OLE DB 源和目标适配器`允许您连接到各种 OLE DB 数据存储，但通常用于数据库连接，因为它们提供良好的性能并支持多种关系数据库。在这个示例中，我们将配置一个`OLE
    DB 源适配器`和一个`OLE DB 目标适配器`，两者都连接到同一个 SQL Server 实例，并将数据从一个表移动到另一个表。这将是一个非常简单的演示，但将让您有机会探索各种
    OLE DB 配置选项。


    对于我们的示例，我们有两个表：一个名为`LastName`，包含美国最常见的姓氏列表（数据来自美国人口普查局）；另一个名为`LastName_Stage`，我们将把姓氏复制到这个表中。


    我们的第一步是创建两个连接管理器，分别名为`Source_DB`和`Dest_DB`。


    在这个示例中，这两个连接管理器指向同一台服务器和同一个数据库，但在现实世界中，它们很可能指向不同的服务器，或者同一服务器上的不同数据库。这就是为什么我们要为它们创建两个独立的连接管理器。表
    7-2 显示了您可以在`OLE DB 源编辑器`中选择的各种选项，该编辑器如图 7-14 所示。


    表 7-2. OLE DB 源编辑器对话框控件


    **选项  描述**'
