    `Schema` defines the scheme to be used as the enumerator.


    `Set Restrictions` creates restrictions for each of the schema’s properties. A
    dialog box allows you to define the restriction based on a string value or a variable
    value.


    Foreach From Variable Enumerator allows you to enumerate the data in an object
    variable.


    `Variable` lists all the user-created variables.


    Foreach Nodelist Enumerator allows you to enumerate specific nodes of an XML statement
    resulting from an XPath expression.


    `DocumentSourceType` defines the input method of the XML statement. The `FileConnection`
    option allows you to specify a connection manager that points to the XML file
    with the nodes you need. The `Variable` option indicates that the XML is stored
    within an SSIS variable. The `DirectInput` option requires you to type the XML
    directly into the editor.


    `DocumentSource` specifies the XML source depending on its type. For the `FileConnection`
    and `Variable` options, you get a drop-down list that either contains file connections
    or SSIS variables, respectively. For `DirectInput`, the editor provides a text
    field to type in the XML.


    `EnumerationType` defines the type of enumeration of the XML nodes. The `Navigator`
    option utilizes the `XPathNavigator` to enumerate the XML. The `Node` option uses
    XPath expressions to retrieve the XML nodes. The `NodeText` option uses XPath
    expressions to retrieve text nodes. The `ElementCollection` option uses XPath
    expressions to retrieve element nodes. The first three options require the use
    of the outer XPath expression that is applied to the XML. The last option uses
    an outer XPath expression and can apply an inner XPath expression to the element
    collection.


    `OuterXPathStringSourceType` provides the source type for the XPath expression
    that is applied to the XML statement. The `FileConnection` option allows you to
    specify a connection manager that points to the XPath expression. The `Variable`
    option indicates that the XPath expression is stored within an SSIS variable.
    The `DirectInput` option requires you to type the XPath expression directly into
    the editor.


    `OuterXPathString` specifies the XPath expression source depending on its type.
    For the `FileConnection` and `Variable` options, you get a drop-down list that
    either contains file connections or SSIS variables, respectively. For `DirectInput`,
    the editor provides a text field to type in the XPath expression.


    `InnerElementType` specifies the type of inner element in the list. The options
    for the types are `Navigator`, `Node`, and `NodeText`.


    `InnerXPathSourceType` provides the source type for the XPath expression that
    is applied to the element collection. The `FileConnection` option allows you to
    specify a connection manager that points to the XPath expression. The `Variable`
    option indicates that the XPath expression is stored within an SSIS variable.
    The `DirectInput` option requires you to type the XPath expression directly into
    the editor.


    `InnerXPathString` specifies the XPath expression source depending on its type.
    For the `FileConnection` and `Variable` option, you get a drop-down list that
    either contains file connections or SSIS variables, respectively. For `DirectInput`,
    the editor provides a text field to type in the XPath expression.


