    Choosing Log Events


    When configuring logging, one of the things to keep in mind is that each logged
    event consumes some resources. In the case of the SSIS log provider for SQL Server,
    each event requires a call to a SQL Server stored procedure, which then writes
    to a table in the database. Logging large quantities of events can slow down packages
    and require large amounts of storage.


    Although all of the SSIS events provide some level of insight into your package
    executions, some are better saved for specialized debugging situations. Therefore,
    we recommend limiting the events you log in production settings. There is a performance
    and storage hit associated with logging too much information, and when troubleshooting,
    you can encounter “information overload” if you choose to log too much information.
