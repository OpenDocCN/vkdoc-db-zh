    # 第 6 章 高级控制流任务


    ## 传输登录名任务


    登录名对于访问数据库中的数据至关重要。它们可以限制对数据库中不同对象的访问。`传输登录名`任务提供了一种在 SQL Server 实例之间快速复制登录名的方法。此任务可以复制所有登录名、指定的登录名，或特定数据库的登录名。该任务使用`SMO
    连接管理器`来传输登录名。执行该包的用户必须在两台服务器上都具有`sysadmin`访问权限才能传输登录名。图 6-17 展示了该任务在控制流中的样子。图标显示了一个人物、一个锁和一个箭头。锁和人物图标代表了将要传输的安全信息。


    *图 6-17. 传输登录名任务*


    如图 6-18 所示的“登录名”页面，允许您配置所有必要的属性，以便在两个 SQL Server 实例之间传输 SQL Server 登录名。“常规”页面允许您修改任务的`名称`和`描述`。“表达式”页面允许您定义可以修改任务属性值的表达式。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-183_1.jpg)


    *图 6-18. 传输登录名任务编辑器—登录名页面*


    “登录名”页面允许配置以下属性：


    - `源连接`列出了可用作 SQL Server 登录名源的`SMO 连接管理器`。

    - `目标连接`列出了可用作 SQL Server 登录名目标的`SMO 连接管理器`。

    - `要传输的登录名`允许您定义要传输到目标的登录名。`所有登录名`选项会将源 SQL Server 实例上定义的所有登录名复制到目标服务器 SQL Server
    实例。`选定的登录名`允许您枚举要传输到目标的特定登录名。`选定数据库的所有登录名`要求您指定要传输到目标的登录名；但是，登录名会受到`数据库列表`属性的进一步限制。

    - `登录名列表`根据为`要传输的登录名`选择的选项，枚举要传输到目标的特定登录名。省略号按钮为您提供服务器上所有登录名的列表以供选择。如果指定了数据库列表，此列表将受到限制。

    - `数据库列表`仅枚举您需要传输其登录名的数据库。

    - `如果对象存在`定义了任务如何处理重复项。此属性的选项是`失败任务`、`覆盖`和`跳过`。`失败任务`导致任务在目标服务器上遇到现有登录名时出错。`覆盖`使用源定义重新创建登录名。`跳过`则保持目标服务器上的登录名不变。

    - `复制 SID`指定复制操作是否应包含登录名的安全标识符。在传输数据库时，将此属性设置为`True`至关重要，否则登录名将不被目标数据库识别。


    ## 传输 Master 存储过程任务


    在生成新的 SQL Server 实例时，通常需要源 SQL Server 实例的 master 数据库上的用户定义存储过程。`传输 Master 存储过程任务`允许您使用`SMO
    连接管理器`执行此操作。执行包的用户需要对源 SQL Server 实例上的 master 存储过程具有读取访问权限，并且在目标服务器上具有`sysadmin`权限才能创建它们。图
    6-19 显示了该任务在控制流中的样子。图标是一个带有箭头的应用程序窗口，类似于存储过程，因为过程包含若干语句。


    *图 6-19. 传输 Master 存储过程任务*


    如图 6-20 所示的`传输 Master 存储过程任务编辑器`的“存储过程”页面，允许您配置所有必要的属性，以便在两个 SQL Server 实例的 master
    数据库之间复制 master 存储过程。该任务将仅根据名称唯一标识 master 存储过程。“常规”页面允许您修改任务的`名称`和`描述`。“表达式”页面允许您定义可以修改任务属性值的表达式。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-185_1.jpg)


    *图 6-20. 传输 Master 存储过程任务编辑器—存储过程页面*


    “存储过程”页面提供以下属性供配置：


    - `源连接`标识要用作 master 存储过程源的`SMO 连接管理器`。

    - `目标连接`标识要用作 master 存储过程目标的`SMO 连接管理器`。

    - `如果对象存在`允许您管理目标 SQL Server 实例上是否存在该 master 存储过程。`失败任务`选项导致任务在目标服务器上遇到重复的 master
    存储过程时出错。选择`覆盖`会使用源服务器上的定义重新创建该 master 存储过程。`跳过`则保持目标服务器上的 master 存储过程定义不变。

    - `传输所有存储过程`允许您选择复制源 master 数据库上的所有用户定义存储过程还是指定集合。将此属性设置为`True`可启用`存储过程列表`属性以进行编辑。

    - `存储过程列表`指定您需要复制到目标服务器的用户定义存储过程列表。省略号按钮打开一个对话框，列出所有可供传输的可用存储过程。


    ## 传输 SQL Server 对象任务


    从 SQL Server 数据库传输选定数据和对象的一种方法是使用`传输 SQL Server 对象任务`。通过组合多个此类任务，您可以从多个 SQL Server
    数据库复制对象，并在一个 SQL Server 数据库中创建它们。此功能非常有用，特别是当您打算使用一个暂存数据库在类似系统中存储数据作为 ETL 过程的预处理步骤时。我们将在第
    14 章中讨论更多关于预处理数据的选项。图 6-21 显示了该任务在控制流设计器窗口中的样子。图标是一个带有指示传输箭头的脚本上的圆柱体，代表了传输过程中将使用的各种数据库对象的脚本。


    *图 6-21. 传输 SQL Server 对象任务*


    如图 6-22 所示的`传输 SQL Server 对象任务`的“对象”页面，允许您配置所有必要的属性，以便在数据库之间传输所需的对象。实际的传输将利用`SMO
    连接管理器`。“常规”页面允许您修改任务的`名称`和`描述`。“表达式”页面允许您定义可以修改任务属性值的表达式。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-187_1.jpg)


    *图 6-22. 传输 SQL Server 对象任务编辑器—对象页面*


    “对象”页面允许您修改以下上下文相关的属性：


    - `源连接`选择将作为数据库对象源的`SMO 连接管理器`。

    - `源数据库`列出源 SQL Server 实例上存在的所有数据库以获取数据库对象。选择包含您需要复制的对象的数据库。

    - `目标连接`选择指向目标服务器的`SMO 连接管理器`。

