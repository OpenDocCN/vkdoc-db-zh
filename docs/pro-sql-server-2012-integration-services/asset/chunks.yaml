    The top panes allow you to easily reference the available inputs for the derived
    column as well as the functions that can perform the derivations. The Variables
    tree displays all the variables that are available to the scope of the data flow
    that the component belongs to. Because we did not define any variables for this
    example, the only variables available are the system variables that are a part
