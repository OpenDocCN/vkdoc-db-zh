    We highly recommend visiting these sites as you learn `SSIS` or encounter questions
    about best practices or need guidance on how to accomplish very specific tasks
    in your packages.


    ## Summary


    `SSIS` is a powerful and flexible enterprise `ETL` solution, designed to meet
    your most demanding data movement and manipulation needs. This chapter introduced
    some of the basic concepts of `ETL` and how `SSIS` fits into the SQL Server `ETL`
    world. We presented some of the core concepts of the `SSIS` architecture and talked
    about the newest features in SQL Server 12 `SSIS`. We wrapped up with a listing
    of a few of our favorite people and resource sites. In Chapter 2 we introduce
    `BIDS` and `SSMS`, with an emphasis on the newest features designed to make your
    `ETL` package design, build, and testing easier than ever.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 2


    ## BIDS and SSMS


    *At each increase of knowledge, as well as on the contrivance of every new tool,
    human labour becomes abridged.*


    —Inventor Charles Babbage


    After gathering the requirements and specifications for the new processes, it
    is time to design the `ETL` flow. This includes deciding the tools to use, the
    time frames for data processing, the criteria for success and failure, and so
    forth. One of the integral parts of deciding which tools to use is determining
    the sources for the data and the capability of the tools to gain access to it
    with ease and to extract it efficiently. As we discussed in Chapter 1, efficiently
    describes the taxing of the network, hardware, and overall resources optimally.
    One of the best characteristics of `SSIS` is its ease of development and maintenance
    (when best practices and standards are followed), the wide range of sources it
    can access, the transformations that it can handle in-flight, and most important,
    cost, as it comes out of the box with SQL Server 12.


    When installing SQL Server 12, you have options to install three toolsets essential
    for developing `ETL` processes: Business Intelligence Development Studio (`BIDS`),
    SQL Server Management Studio (`SSMS`)—Basic, and Management Studio—Complete. `BIDS`
    uses the Visual Studio 2010 platform for the development of `SSIS` packages as
    well as the creation of projects that cater to the components of the SQL Server
    12 suite. Management tools include `SSMS`, the SQL Server command-line utility
    (`SQLCMD`), and a few other features. With these core components, developers can
    issue Data Definition Language (`DDL`) statements to create and alter database
    objects. They can also issue Data Manipulation Language (`DML`) statements to
    query the database objects using Microsoft’s flavor of the Standard Query Language
    (`SQL`), Transact-SQL (`T-SQL`). Data Control Language (`DCL`) allows users to
    configure access to the database objects.


    This chapter covers the project templates that `BIDS` supports. It also provides
    a brief overview of the elements of the SQL Server 12 suite.


    ### SQL Server Business Intelligence Development Studio


    `BIDS`, which utilizes Visual Studio 2008 as the development platform, supports
    a few project templates whose sole purpose is to provide insight into data. This
    insight can come from moving pertinent data from a source to a database (`ETL`
    processes using `SSIS` projects), from developing cubes that can provide optimal
    high-level summaries of data (cubes developed using SQL Server Analysis Services,
    `SSAS` projects), and from creating reports that can be run directly against databases
    or cubes (reports designed using SQL Server Reporting Services, `SSRS` projects).
    Figure 2-1 shows the business intelligence projects that are available within
    Visual Studio.


    *Figure 2-1. Projects available with `BIDS`*


    For SQL Server 12, the projects require the installation of `.NET Framework 3.5`.
    Visual Studio solutions can maintain multiple projects that address the different
    disciplines within the SQL Server suite. A few elements carry across multiple
    projects. These elements are listed next, and logically tie together at a solution
    level:


    - Data sources are the disparate sources that have the data that will be imported
    by the members. These sources can be created by using a wizard and edited through
    the designer. Various components within the project can access these connections.

    - Data source views (`DSVs`) are essentially ad hoc queries that can be used to
    extract data from the source. Their main purpose is to store the metadata of the
    source. As part of the metadata, key information is also stored to help create
    the appropriate relationships within the Analysis Services database.

    - Miscellaneous is a category including all files that serve a support function
    but are not integral. This includes configuration files for Integration Services.


    ### Analysis Services Project


    The *Analysis Services project* is used to design, develop, and deploy a SQL Server
    12 Analysis Services database. More often than not, the purpose of `ETL` projects
    is to consolidate several systems into one report-friendly form in order to summarize
    activity at a high level. Analysis Services cubes perform roll-up calculations
    against dimensions for quick and efficient reporting. This project template provides
    a folder structure depicted in Figure 2-2 that is needed to develop an Analysis
    Services database. After development, the cube can be deployed directly to Analysis
    Services.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-16_1.jpg)


    *Figure 2-2. Folder structure for an Analysis Services project*


    These folders organize the files in a developer-friendly format. This format also
    helps with building and deploying projects. A partial list of the folders is listed
    below:


    - Cubes contains all the cubes that are part of the Analysis Services database.
    The dimensions can be created using a wizard, utilizing the metadata stored within
    the `DSVs`.

    - Mining Structures apply data-mining algorithms on the data from the `DSVs`.
    They can help create a level of predictive analysis depending on the quality of
    the data and the usage of the appropriate algorithm. You can use the Mining Model
    Wizard to help create these as well as the Mining Model Designer to edit them.

    - Roles contains all the database roles for the Analysis Services database. These
    roles can vary from administrative permissions to restrictions based on the dimensional
    data.

    - Assemblies holds all the references to Component Object Model, `COM`, libraries
    and Microsoft `.NET` assemblies.


    **TIP:** `SSIS` packages can be used to process cubes. These packages can be executed
    at the end of a successful `ETL` process.


    The Analysis Services database, like Integration Services, can source data from
    a variety of locations and physical storage formats. The `DSVs` use the same drivers
    and are not necessarily limited to the SQL'
