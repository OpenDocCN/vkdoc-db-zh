    # 数据概览与清洗


    ## 数据查看器


    数据查看器用于在运行时显示数据。当数据流经两个组件之间的连接器时，数据会按缓冲区逐块显示。有多种选项可控制数据的显示方式，其中最常用的是网格视图。网格以表格形式展示数据，并支持将数据复制到剪贴板供后续使用。在
    Visual Studio 的调试模式下，网格会显示在一个单独的窗口中。图 12-33 展示了模糊查找组件之后的数据查看器。


    *图 12-33\. 模糊查找输出的数据查看器*


    窗口的名称有助于识别其在包中的位置。在本例中，数据查看器在模糊查找组件之后启用，因此窗口的派生命名为 DFT_DataViewer 上的模糊查找输出数据查看器。该窗口还包含一个绿色箭头按钮，用于通知
    Visual Studio 继续执行包，并允许数据行通过连接器。“分离”按钮将保留窗口并允许包继续执行。“复制数据”按钮会将高亮显示的行和数据集的列标题复制到剪贴板。点击特定列标题会自动根据该缓冲区内的值对数据进行排序。关闭数据查看器窗口也会强制
    Visual Studio 调试器继续执行包。


    ## 数据采样


    SSIS 数据流任务提供了一些实用的组件，可在运行时查看随机数据样本。这些组件是行采样和百分比采样转换。它们将在数据流经时提取预定义的行样本。


    如果没有排序转换或 ORDER BY 子句，数据在通过时应为随机顺序。采样转换将通过从数据中随机选择样本来反映这一点。


    采样转换的替代方案是 SQL Server 的 TOP N 记录集。主要区别在于 SSIS 会尝试生成真正的随机集合，而 TOP N 会按从磁盘读取的顺序返回指定数量或百分比的记录。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-461_1.jpg)


    ### 行采样


    `行采样转换`允许您定义要从数据流中提取的行数作为样本集。此样本集将从管道中完全移除。除非您选择种子值，否则数据是随机选择的。如果指定了种子值，您将在选择行样本时使用它生成随机数。图
    12-34 演示了使用行采样组件的数据流任务。


    *图 12-34\. 行采样示例*


    数据集的目的是记录集目标。我们使用对象数据类型变量来存储每个输出。`行采样转换`被配置为仅使用数据集中的 10 行作为样本集。其余行在此采样练习中将被忽略。在执行结果中，您可以看到“采样选定输出”将行从原始管道中完全移除，并创建为单独的流“采样未选定输出”。在此功能上，`行采样转换`的工作方式类似于条件拆分转换。条件拆分转换也可用于从数据集中提取样本，方法是使用一个条件，该条件会对某些行在
    True 和 False 之间随机变化。主要挑战在于定义样本集的大小。


    ### 百分比采样


    `百分比采样转换`的工作方式类似于`行采样转换`。它不依赖于预定义的行数，而是依赖于数据集所需百分比作为样本集。图 12-35 演示了使用`百分比采样转换`来提取样本数据集的数据流任务。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-462_1.jpg)


    *图 12-35\. 百分比采样示例*


    在此示例中，我们配置`百分比采样转换`从数据集中选择 25% 的行作为样本集。来自源的初始行数为 15,088。3,719 行约占 15,088 行的 24.64%；25%
    应该是 3,722 行。`百分比采样转换`在采样行时不会提供精确的百分比分割，但非常接近。多次执行数据流任务后，您会发现记录数并不总是相同的。该数字会在指定的百分比附近波动，但不一定完全精确。


    ## 总结


    数据集成项目需要大量开销来同步来自不同系统的数据。SSIS 提供了各种工具来分析这些数据，以便制定出充分知情的计划。这些工具包括数据概览任务、模糊查找转换、数据采样转换以及用于分析流经数据流的数据的查看器。使用这些内置工具可以让您非常快速地获取数据状态的快照。下一章将介绍在从各种系统提取、转换和加载数据到可能不同的系统时，可用于记录日志和审计的选项。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 日志记录与审计


    > *对数据的无控制访问，没有活动审计跟踪且缺乏监督，将过于危险。*

    >

    > ——美国海军军官约翰·波因德克斯特


    企业系统提供的几个关键优势（在审计师开始仔细检查之前往往被忽视）是流程日志记录、审计和数据沿袭。概念很简单：当您将数据从一个系统移动到另一个系统并在过程中进行操作时，您可能需要跟踪数据的来源，维护有关数据处理的摘要信息，并了解哪些过程在此过程中接触了该数据。保留此附加信息的原因有几个：


    - 您可能需要将其用于故障排除目的，以将数据问题向后追溯到其来源。

    - 法律部门可能强制要求一项新的法律规定，要求在发生问题时实时记录处理的每个步骤。

    - 您的业务可能受到萨班斯-奥克斯利法案 (`SOX`) 或健康保险流通与责任法案 (`HIPAA`) 等法规的约束，这些法规要求对机密医疗或消费者数据实施高水平的安全和控制。


    SSIS 提供了广泛的标准日志记录功能，可捕获有关 ETL 处理状态的运行时信息。此外，使用 SSIS 为企业 ETL 应用程序添加审计功能相对简单。在本章中，您将了解利用标准日志记录以及向
    SSIS 包添加审计的方法。


    ## 日志记录


    SSIS 提供了易于启用的内置`日志记录`功能。在前面的章节中，我们已在一些代码示例中启用此功能以演示 SSIS 的日志记录能力。在本节中，我们将回顾如何在
    SSIS 包中启用和配置日志记录。我们还将讨论 SSIS 日志记录的最佳实践。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-464_1.jpg)


    ### 启用日志记录


    SSIS 中的日志记录选项可在包级别访问，方法是右键单击控制流，并从弹出的上下文菜单中选择“日志记录”选项，如图 13-1 所示。


    *图 13-1\. 从弹出菜单中选择日志记录选项*


    日志记录配置屏幕允许您配置 SSIS 日志记录选项，如图 13-2 所示。在此屏幕中，您可以设置以下日志记录选项：

    '
- fmt: "# CHAPTER 13 – LOGGING AND AUDITING\n\n- The SSIS log provider to use. The\
    \ most common options are the SSIS log provider for SQL Server, which logs to\
    \ a SQL Server table, and the SSIS log provider for text files, which outputs\
    \ logging information to text files. You can, however, choose to log information\
    \ to the Windows event log, XML files, or SQL Server profiler trace files. The\
    \ latter options are generally used for specialized troubleshooting tasks.\n-\
    \ The containers for which events should be logged. You can configure logging\
    \ of specific events at the package, container, and Data Flow task levels. In\
    \ our example, we’re going to configure at both the package and Data Flow task\
    \ levels.\n- The details you would like logged at the event level. You choose\
    \ these details from the Details tab.\n\n**NOTE:** As a general rule, we tend\
    \ to prefer the SSIS log provider for SQL Server over other logging methods. Because\
    \ this log provider logs to a SQL Server database table, the logged information\
    \ is easy to query, simplifying troubleshooting exercises. When you designate\
    \ the SSIS log provider for SQL Server, it will automatically generate the `dbo.sysssislog`\
    \ table and `dbo.sp_ssis_addlogentry` procedure in your database (if they don’t\
    \ exist), both of which it marks as system objects.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-465_1.jpg)\n\n*Figure 13-2. SSIS logging configuration screen*\n\n\
    To configure logging, choose the package, or the containers or tasks in the package,\
    \ for which you want logging turned on. Then choose a log provider and click the\
    \ Add button. In Figure 13-3, we’ve added the SSIS log provider for SQL Server\
    \ to a package and turned on logging at the package level. For many log providers,\
    \ you must choose a connection from the Configuration drop-down. In the figure,\
    \ we’ve selected an OLE DB connection named `LOG`, which is pointed at a SQL Server\
    \ database we wish to log to.\n\n**NOTE:** When we configure the SSIS log provider\
    \ for SQL Server, we prefer to create an OLE DB Connection Manager specifically\
    \ for the log provider connection. This keeps the logging information and data\
    \ connections separate. One of the main reasons to do this is to avoid the occasional\
    \ “Connection is busy with results for another command” error, which can be difficult\
    \ to troubleshoot in some cases.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-466_1.jpg)\n\n*Figure 13-3. Configuring the SSIS log provider for\
    \ SQL Server*\n\nIn our example, we’ve enabled logging at the package level, but\
    \ we did not change settings for the Data Flow task contained in the package.\
    \ In this case, all containers and tasks in the package inherit their logging\
    \ settings from the package as indicated by the grayed-out checkboxes. To configure\
    \ the events that are logged, choose the Details tab of the logging configuration\
    \ page. All the events you can log are listed, as shown in Figure 13-4.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-467_1.jpg)\n\n*Figure 13-4. Selecting events to log*\n\nYou can also\
    \ choose the detailed information to log for each event by clicking the Advanced\
    \ button, as shown in Figure 13-5. The default logs all relevant information for\
    \ every event. Unless you have a specific reason to eliminate some data from the\
    \ logs, the default is normally adequate.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-468_1.jpg)\n\n*Figure 13-5. Selecting data to log for each event*\n\
    \n## Choosing Log Events\n\nWhen configuring logging, one of the things to keep\
    \ in mind is that each logged event consumes some resources. In the case of the\
    \ SSIS log provider for SQL Server, each event requires a call to a SQL Server\
    \ stored procedure, which then writes to a table in the database. Logging large\
    \ quantities of events can slow down packages and require large amounts of storage.\n\
    \nAlthough all of the SSIS events provide some level of insight into your package\
    \ executions, some are better saved for specialized debugging situations. Therefore,\
    \ we recommend limiting the events you log in production settings. There is a\
    \ performance and storage hit associated with logging too much information, and\
    \ when troubleshooting, you can encounter “information overload” if you choose\
    \ to log too much information. The following list indicates the core events we\
    \ recommend capturing in a production environment. Note that this list is just\
    \ a starting point, and you may encounter a need to capture other events in your\
    \ production environments:\n\n- `OnError`\n- `OnExecStatusChanged`\n- `OnPipelinePostComponentCall`\n\
    - `OnPipelinePreComponentCall`\n- `OnPostExecute`\n- `OnPostValidate`\n- `OnPreExecute`\n\
    - `OnPreValidate`\n- `OnQueryCancel`\n- `OnTaskFailed`\n- `OnWarning`\n\nEvents\
    \ we recommend avoiding include `OnInformation`, `OnProgress`, and `Diagnostic`,\
    \ among others. Although often useful in debugging and test scenarios, these events\
    \ in particular log a very high ratio of “noise” to useful information. They tend\
    \ to clutter up the log and complicate troubleshooting while adversely affecting\
    \ performance to varying degrees.\n\n## On SQL Logging\n\nAs mentioned previously\
    \ in this chapter, we tend to handle our SSIS logging needs with the SSIS log\
    \ provider for SQL Server. This log provider relies on two database objects to\
    \ log information: a stored procedure named `dbo.sp_ssis_addlogentry` and a table\
    \ named `dbo.sysssislog`, both marked as system objects. SSIS calls the stored\
    \ procedure every time an event occurs. The procedure, in turn, writes an entry\
    \ to the `dbo.sysssislog` table. The SSIS log table can be queried to retrieve\
    \ relevant information with a query similar to the one shown in Figure 13-6.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-470_1.jpg)\n\n\
    *Figure 13-6. Querying the SSIS log table*\n\n## Summary Auditing\n\n*Summary\
    \ auditing* encompasses grabbing and storing abridged processing information for\
    \ the SSIS packages. As part of auditing, we generally store package auditing\
    \ information that can be grabbed from system variables in the SSIS package, start\
    \ and end times, and other summary execution information.\n\nThe easiest way to\
    \ enable auditing is to create and call stored procedures that start and end your\
    \ auditing processes. In the model the authors normally employ, we like to divide\
    \ the process into batch-level and package-level auditing. Figure 13-7 is a logical\
    \ representation of this two-part batch/package auditing process. Note that a\
    \ *batch* can encompass one or more packages.\n\n**NOTE:** Multiple packages can\
    \ be wrapped in a single batch by using the Execute Package task to implement\
    \ the parent-child SSIS design pattern.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-471_1.jpg)\n\n*Figure 13-7. Logical view of batch/package auditing*\n\
    \n## Batch-Level Auditing\n\n*Batch-level auditing* encompasses all of the packages\
    \ executed during a given run. At the batch level, we record the start time and\
    \ end time of the entire batch, as well as summary information about the tables\
    \ in the database. For security purposes, and for simplified management, the implementation\
    \ of our auditing processes puts its database objects in a new schema. In this\
    \ instance, we named it `Audit`:\n\n```sql\nIF SCHEMA_ID(N'Audit') IS NULL\n \
    \   EXEC(N'CREATE SCHEMA Audit;');\nGO\n```\n\nWe first create a table named `AuditBatch`,\
    \ which contains batch-level auditing information including the start and end\
    \ times for a given batch. You can use the information stored in the `AuditBatch`\
    \ table to determine the performance of an entire batch of packages, and to wrap\
    \ up log entries that belong to a single batch execution. Here is the code we\
    \ are executing:\n\n```sql\nIF OBJECT_ID(N'Audit.AuditBatch') IS NOT NULL\n  \
    \  DROP TABLE Audit.AuditBatch;\nGO\n\nCREATE TABLE Audit.AuditBatch\n(\n    BatchID\
    \ BIGINT NOT NULL IDENTITY(1, 1),\n```"
