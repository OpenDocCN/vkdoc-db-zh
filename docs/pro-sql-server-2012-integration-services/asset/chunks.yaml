    # 第四章 — 连接管理器


    ## FTP 连接管理器


    `Server Name`（服务器名称）和 `Server Port`（服务器端口）字段用于定义连接所指向的 FTP 服务器以及服务器监听的端口。`Credentials`（凭据）部分存储身份验证信息。默认情况下，其值为
    `Anonymous`（匿名）。`Time-Out`（超时）字段定义了任务在超时前可能花费的时间段，单位为秒。值 `0` 表示连接不会超时。启用被动模式的复选框表示数据包将启动连接。默认情况下，活动模式由服务器启动连接。`Retries`（重试次数）字段设置重试次数；`0`
    表示无限次重试。`Chunk Size`（块大小）表示传输数据时块的大小。`Test Connection`（测试连接）按钮允许您测试连接参数。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-98_1.jpg)


    **注意：** FTP 连接管理器仅支持匿名和简单身份验证。不支持 Windows 身份验证。


    ## HTTP 连接管理器


    正如 FTP 可用于存储文件，超文本传输协议（`HTTP`）也可用于存储数据。`HTTP` 连接允许您连接到 Web 服务器以执行任务。此连接使您能够向 Web
    服务器上传文件以及从中下载文件。此连接管理器与 `Web Service`（Web 服务）任务协同工作。`图 4-12` 显示了用于配置此连接管理器的选项。


    `图 4-12. HTTP 连接管理器编辑器—服务器页面`


    `Server URL`（服务器 URL）存储目标 Web 服务器的 URL。如果您打算在 `Web Services` 任务上使用 Web 服务描述语言（`WSDL`），则
    URL 应以 `?wsdl` 结尾。`Use Credentials`（使用凭据）选项允许您指定连接到 Web 服务器所需的登录信息。


    `User Name`（用户名）、`Password`（密码）和 `Domain`（域）是服务器识别凭据的关键元素。`Use Client Certificate`（使用客户端证书）选项允许您指定一个证书来验证连接。启用后，`Certificate`（证书）按钮允许您选择要使用的证书。`Time-Out`（超时）设置允许您定义连接到
    Web 服务器的分配时间。`Chunk Size`（块大小）选项决定要写入的数据大小。`Test Connection`（测试连接）按钮允许您测试连接管理器的当前配置，如
    `图 4-13` 所示。


    `图 4-13. HTTP 连接管理器编辑器—代理页面`


    `Proxy`（代理）页面允许您使用代理服务器连接到定义的 URL。`Proxy URL`（代理 URL）需要所用代理服务器的 URL。`Bypass Proxy
    on Local`（本地地址绕过代理）选项允许您对本地地址绕过使用代理服务器。`Use Credentials`（使用凭据）复选框允许您提供连接到代理服务器可能需要的身份验证信息。`User
    Name`（用户名）、`Password`（密码）和 `Domain`（域）是访问代理服务器必要的关键组件。`Add`（添加）和 `Remove`（删除）按钮允许您修改定义的要绕过代理服务器的地址列表。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-100_1.jpg)


    ## MSOLAP100 连接管理器


    `Analysis Services`（分析服务）连接管理器 `MSOLAP100` 允许您连接到 `Analysis Services` 引擎，并在设计时连接到
    `Analysis Services` 项目。在运行时，连接将仅连接到部署了 `Analysis Services` 项目的服务器和数据库。`图 4-14`
    展示了如何添加 `Analysis Services` 连接管理器。


    `图 4-14. 添加分析服务连接管理器`


    创建到 `Analysis Services` 实例的连接与提供服务器名称一样简单。默认情况下，此连接管理器的提供程序设置为 `Microsoft Online
    Analytical Processing (MSOLAP)`（Microsoft 联机分析处理），将 `OLAP` 引擎定义为 `Analysis Services`
    引擎。`Impersonation Level`（模拟级别）允许您定义要使用的身份验证。不同的 `Impersonation Levels`（模拟级别）在以下列表中定义。`Analysis
    Services Execute DDL`（分析服务执行 DDL）任务和 `Analysis Services Processing`（分析服务处理）任务利用此连接访问
    `Analysis Services` 数据库。`Data Mining Model Training`（数据挖掘模型训练）目的地组件可利用此连接将模型应用于数据。在此解决方案中创建到
    `Analysis Services` 项目的选项仅将项目用于元数据。在运行时，任务将需要利用此连接连接到现有数据库。


    -   `Anonymous`（匿名）：服务器在访问期间看不到有关客户端的任何信息。

    -   `Identify`（识别）：服务器知道客户端的身份，并且可以使用客户端的访问控制列表。

    -   `Impersonate`（模拟）：服务器可以模拟客户端，其能力取决于服务器和客户端的位置。如果服务器和客户端在同一台机器上，服务器可以访问客户端的网络资源。如果它们位于不同的机器上，服务器只能访问其自身机器上的可用资源。

    -   `Delegate`（委派）：服务器可以模拟客户端，而不受机器的限制。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-101_1.jpg)


    ## DQS 连接管理器


    `Data Quality Services (DQS)`（数据质量服务）连接管理器允许您连接到 `Data Quality Services` 服务器和数据库。`Data
    Correction`（数据更正）转换任务利用此连接在将一组数据更正规则应用于数据流之前访问它们。


    ## MSMQ 连接管理器


    `Microsoft Message Queuing, MSMQ`（Microsoft 消息队列）连接管理器允许您连接到使用消息队列的消息队列。连接管理器将把
    `Message Queue`（消息队列）任务连接到指定的队列，以触发消息服务。`图 4-15` 演示了如何设置此管理器。


    `图 4-15. MSMQ 连接管理器编辑器`


    根据消息队列的类型，有两种定义路径的方法。对于专用队列，格式为 `<computername>\Private$\<queuename>`。也可以使用句点（`.`）表示本地计算机，如
    `图 4-15` 所示。对于公共队列，格式只需省略专用路径：`<computername>\<queuename>`。


    **注意：** 默认情况下，Windows 安装上消息队列服务是关闭的。您必须启用该服务并创建自己的队列，以便 `SSIS` 能够使用它。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-102_1.jpg)


    ## SMO 连接管理器


    `SQL Server Management Object (SMO)`（SQL Server 管理对象）连接管理器使包能够与 `SQL Management
    Object`（SQL 管理对象）服务器建立连接。此连接管理器由 `SSIS 12` 中默认存在的传输任务使用。`图 4-16` 显示了此连接管理器的编辑器。


    `图 4-16. SMO 连接管理器编辑器`


    `SMO Connection Manager Editor`（SMO 连接管理器编辑器）仅需要服务器名称和访问服务器的身份验证模式。`Refresh`（刷新）按钮重新加载可用服务器列表。`Test
    Connection`（测试连接）按钮将检查编辑器中提供的当前配置。不同的传输可执行文件允许您执行 `Data Access Language (DAL)`（数据访问语言）、移动和复制数据库以及其他功能。


    根据您使用的任务，您需要定义数据库，但所有传输任务都将利用此连接连接到服务器。


    ## SMTP 连接管理器


    `SMTP` 连接管理器允许您连接到 `Simple Mail Transfer Protocol (SMTP)`（简单邮件传输协议）服务器。

