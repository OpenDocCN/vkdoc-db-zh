    ## 第 2 章  BIDS 与 SSMS


    ## XML 可读性改进


    通过查看一个极其简单的源组件的 XML，需要强调的一些关键点包括与之前版本的 SSIS 相比包的简洁性，以及包跟踪对象方式的一些变化。XML 可读性改进的关键原因之一在于一些默认设置不会生成。例如，如果源组件的`IsSorted`属性保持默认值`False`（如清单
    2-2 中所示），则不会生成额外的 XML 来存储该元数据。在以前的 SSIS 版本中，所有的细节都存储在包的 XML 中。


    以下列表重点介绍了一些更重要的属性：

    *   `refId`：指示包内对象的路径。此属性在包中唯一标识组件。

    *   `SqlCommand`：通常包含将针对关系数据库管理系统执行的确切查询。

    *   `Connections`：包含包中为数据源组件存储的所有连接信息。可以保存包的登录凭据，但不建议这样做。连接管理器也有`refId`。

    *   `Output Columns`：关于包输出的元数据对于确保数据正确插入非常重要。如果仅仅在将数据转换为 SQL Server 可处理格式时失败，包可以被设置为因此失败。


    ## 数据行 ID 跟踪方式变更


    另一个仅通过查看 XML 就能注意到的变更是在 XML 中跟踪`lineageId`的方式。`lineageId`被 SSIS 用来跟踪数据流中的所有列，包括由组件添加到管道中的错误列。SSIS
    不再像以前版本那样硬编码整数值，而是使用对象的名称来实质上创建到对象的路径，并且由于对象在 SSIS 中必须具有唯一名称，该路径本身就为列创建了唯一标识符。


    XML 可读性的另一个重大改进是将`&lt;`和`&gt;`实体编码替换为它们对应的特殊字符。


    ## CDATA 部分


    包 XML 的一个新增部分称为`CDATA`，它捕获包中组件的视觉布局。清单 2-3 演示了包代码的这一部分。它不仅捕获包的尺寸和位置坐标，还捕获数据流组件之间的数据流路径形状以及控制流中的优先级约束。这些元数据对包本身并不关键，如果在
    Visual Studio 中打开包时损坏或丢失，将会被重新生成。


