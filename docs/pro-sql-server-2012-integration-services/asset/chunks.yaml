    Prior versions of SQL Server as well as other relational database management systems
    (RDBMSs) are available as sources. The languages for querying SQL Server cubes
    are called Multidimensional Expressions (`MDX`) and Data Mining Extensions (`DMX`).
    Some of the objects that can be defined in a cube for analytic purposes are measures,
