    *Figure 9-8\. Variables defined in CH09_Apress_ChildPackage.dtsx*


     **NOTE:** The variable SSIS data types map to the SSIS data types that are used
    in the ETL. For example, the Int32


    data type refers to a 32-bit signed integer, the String data type maps to a Unicode
    character string, and Decimal refers to the DT_NUMERIC data type. The data type
    names shown in Figure 9-8 are more reader friendly than the names that appear
    in a metadata viewer inside a data flow.'
