    ![](index-483_1.jpg)


    CHAPTER 13  LOGGING AND AUDITING


    *Figure 13-11\. Adding lineage data to the data flow with a Derived Column transformation*
    The lineage data can be joined to the auditing data with the BatchID and AuditPackageID,
    as shown in the following sample query. Sample results from our test run are shown
    in Figure 13-12.


    SELECT lm.BatchID,


    lm.AuditPackageID,


    lm.LineageKey,


    lm.LineageValue,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-484_1.jpg)


    CHAPTER 13  LOGGING AND AUDITING


    au.PackageName,


    au.PackageStartTime,


    au.PackageEndTime


    FROM Audit.LineageMetadata lm


    INNER JOIN Audit.AuditPackage au


    ON lm.BatchID = au.BatchID


    AND lm.AuditPackageID = au.AuditPackageID;


    GO


    *Figure 13-12\. Sample lineage and audit data*


    As you can see in the results in Figure 13-12, we have captured enough metadata
    information to trace every row of data from the source file it started in, through
    the package that manipulated it, and finally to the destination table it ended
    up in.


     **NOTE:** As we noted previously, this is a simple data lineage solution, but
    it can be used to build much more complex solutions. The authors have, on occasion,
    implemented custom data lineage solutions requiring a much finer grain of detail,
    such as capturing the state of individual rows and columns of data as it is processed.
    As you can imagine, we’re enthusiastically looking forward to the release of Project
    Barcelona.


    Summary


    In many enterprise systems that are currently in production use around the world—in
    many industries—logging and auditing features are often overlooked. In some scenarios,
    lack of proper logging and auditing processes can result in countless hours of
    reverseengineering thousands of lines of code to uncover and fix even the simplest
    of errors. In the worst case, failure to implement these enterprise features could
    end in trouble with auditors and regulatory agencies followed by big fines and
    people losing their jobs. This chapter presentedSSIS’s built-in logging capabilities
    and showed you how to extend them to add standardized auditing features to your
    ETL processes.'
  trans: '# 第十三章 日志记录与审计


    为此，我们创建了一个简单的表，用于存储与特定批次和包执行相关的键值对。这个设计不限制您使用一组预定义的条目，而是允许您在流程的任何节点存储任何必要的元数据。为此创建的表是
    `LineageMetadata` 表，如下所示：


    ```

    IF OBJECT_ID(N''Audit.LineageMetadata'') IS NOT NULL

    DROP TABLE Audit.LineageMetadata;

    GO


    CREATE TABLE Audit.LineageMetadata

    (

    LineageMetaID int not null identity(1, 1),

    BatchID int not null,

    AuditPackageID int not null,

    LineageKey varchar(1000) not null,

    LineageValue varchar(1000),

    CONSTRAINT PK_AUDIT_LINEAGEMETADATA PRIMARY KEY CLUSTERED

    (

    LineageMetaID

    )

    );

    GO

    ```


    我们还提供了一个简单的存储过程，可根据需要向表中添加条目，如下所示：


    ```

    IF OBJECT_ID(N''Audit.AddLineageMetadata'') IS NOT NULL

    DROP PROCEDURE Audit.AddLineageMetadata;

    GO


    CREATE PROCEDURE Audit.AddLineageMetadata @BatchID int,

    @AuditPackageID int,

    @LineageKey varchar(1000),

    @LineageValue varchar(1000)

    AS

    BEGIN

    INSERT INTO Audit.LineageMetadata

    (

    BatchID,

    AuditPackageID,

    LineageKey,

    LineageValue

    )

    VALUES

    (

    @BatchID,

    @AuditPackageID,

    @LineageKey,

    @LineageValue

    );

    END;

    GO

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    一个实现了我们简单数据血缘解决方案的示例包，扩展了之前的审计包以包含血缘实体，例如存储源文件名，如图 13-10 所示。


    ![](img/index-482_1.jpg)


    *图 13-10. 包含附加数据血缘的 SSIS 包*


    为了获得行级数据血缘，我们需要将批次 ID 和包 ID 作为列添加到我们的数据流中，并与数据一起存储在目标表中。在我们的示例中，这是通过 `派生列` 转换完成的，如图
    13-11 所示。


    ![](img/index-483_1.jpg)


    *图 13-11. 使用“派生列”转换将血缘数据添加到数据流*


    血缘数据可以通过 `BatchID` 和 `AuditPackageID` 与审计数据进行联接，如下面的示例查询所示。我们测试运行的样本结果如图 13-12
    所示。


    ```

    SELECT lm.BatchID,

    lm.AuditPackageID,

    lm.LineageKey,

    lm.LineageValue,

    au.PackageName,

    au.PackageStartTime,

    au.PackageEndTime

    FROM Audit.LineageMetadata lm

    INNER JOIN Audit.AuditPackage au

    ON lm.BatchID = au.BatchID

    AND lm.AuditPackageID = au.AuditPackageID;

    GO

    ```


    ![](img/index-484_1.jpg)


    *图 13-12. 血缘与审计数据示例*


    如图 13-12 中的结果所示，我们捕获了足够的元数据信息，可以追溯每一行数据从其开始的源文件，经过处理它的包，最终到达其结束的目标表。


    **注意：** 如前所述，这是一个简单的数据血缘解决方案，但它可用于构建更复杂的解决方案。作者曾偶尔实施过需要更精细粒度的自定义数据血缘解决方案，例如捕获数据在被处理时的单个行和列的状态。可以想象，我们热切期待着
    Project Barcelona 的发布。


    ## 总结


    在世界各地当前投入生产的许多企业系统中——涵盖众多行业——日志记录和审计功能常常被忽视。在某些场景下，缺乏适当的日志记录和审计流程可能导致花费无数小时逆向工程数千行代码，以发现并修复即使是最简单的错误。在最坏的情况下，未能实现这些企业级功能可能最终导致与审计机构和监管机构发生麻烦，随之而来的是巨额罚款和人员失业。本章介绍了
    SSIS 的内置日志记录功能，并展示了如何扩展它们，为您的 ETL 流程添加标准化的审计功能。'
- fmt: "In addition, it’s becoming increasingly important to store data lineage information\
    \ that allows you to track data moving from one system to another as it makes\
    \ its way to your data warehouses, data marts, and other data repositories. Although\
    \ `SSIS` does not currently offer enterprise data lineage facilities out of the\
    \ box, we demonstrated how to extend your auditing system to implement a basic\
    \ data lineage solution that will allow you to track data at the row level back\
    \ through the packages that manipulated it, all the way back to its source.\n\n\
    The next chapter presents `ETL` in a heterogeneous environment—one in which source\
    \ data comes in many forms and formats.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 14 Heterogeneous Sources and Destinations\n\n> We want to further\
    \ eliminate friction among heterogeneous architectures and applications without\
    \ compromising their distinctive underlying capabilities.\n>\n> —Microsoft cofounder\
    \ Bill Gates\n\nOne of the key elements of a data integration tool is the ability\
    \ to handle disparate sources and destinations. `SQL Server Integration Services\
    \ 2012` allows you to extract from any storage method and load data into just\
    \ as many data storage systems. The toolset provided by `Integration Services`\
    \ truly attempts to achieve the goal outlined by Bill Gates to allow various systems\
    \ to mesh well together. As discussed in previous chapters, data integrity is\
    \ a key element to success of integration projects, and `SSIS` provides transformations\
    \ and components that allow you to handle the nonconforming data.\n\nData storage\
    \ comes in various forms. This includes text files that cannot inherently enforce\
    \ data quality (such as data types or foreign keys), other `RDBMS`s (including\
    \ `Oracle` or `DB2`), `XML` files, web services, or even the `Active Directory`.\
    \ All these systems can hold data in some structure that `SSIS` can unravel and\
    \ integrate into one system. However, the destination is not limited to just `SQL\
    \ Server`. Data can be loaded back into an original form if the requirements specify\
    \ such a need.\n\nThis chapter covers some of the sources and destinations that\
    \ `SSIS` can access. This chapter relies heavily on the information provided in\
    \ Chapter 4 for its basis and then builds upon that foundation to provide you\
    \ with examples that you can use in your everyday process.\n\n## SQL Server Sources\
    \ and Destinations\n\nThe easiest of all sources and destinations for `SSIS` to\
    \ handle is `SQL Server`. Reading from prior versions is relatively easy, but\
    \ loading into a prior version may require some data conversions to handle newer\
    \ or deprecated data types. As we mentioned in Chapter 4, the most efficient way\
    \ to extract data from a `SQL Server` database is by using the `SQL command` option\
    \ to write your own `SQL` statement. This is the recommended option to use on\
    \ a `SQL Server` source component for several reasons. The first and foremost\
    \ reason is that it allows you to limit the columns you extract to the ones you\
    \ need. The `SELECT *` notation, used by the `Table or View` option, has been\
    \ documented to have poor performance with `SSIS` source components and can cause\
    \ metadata validation errors due to `DDL` changes. Specifying the necessary columns\
    \ will keep your initial buffer lean. Another reason to write the `SQL` is that\
    \ you can define the data types in the `SQL` rather than utilizing a data conversion\
    \ component in the data flow. The `SQL Query` option also allows you to define\
    \ an `ORDER BY` clause, which can greatly boost your performance if you need to\
    \ perform a join in the data flow by using the `Merge Join` transformation.\n\n\
    **NOTE:** If you would like to see the performance of a `SELECT *` query in a\
    \ source component, you can execute a package with the `SQL profiler` running.\
    \ You should be able to compare the differences between the two implementations\
    \ clearly.\n\nThe source component, shown in Figure 14-1, allows you to define\
    \ your extraction set. In order to add the source component to a package, you\
    \ must have a `Data Flow task` to add it to. We chose to utilize the `SQL command`\
    \ option to extract the data from the source. Even though we are extracting all\
    \ the columns in the table, we still enumerate all the columns rather than utilizing\
    \ the `*` option. We utilized the query shown in Listing 14-1 as our extraction\
    \ logic. One of the advantages of using the `SQL command` is the ability to parameterize\
    \ your query.\n\n*Listing 14-1. SQL Server Source Query*\n\n```\nWITH CTE\nAS\n\
    (\n    SELECT c.Alpha2\n        ,c.CountryName\n        ,c.Year\n        ,c.TLD\n\
    \    FROM dbo.Country c\n    WHERE c.Alpha2 = ?\n      AND c.Year = ?\n)\nSELECT\
    \ Alpha2\n    ,CountryName\n    ,Year\n    ,TLD\nFROM CTE\nWHERE CountryName =\
    \ ?\n;\n```\n\nThe common table expression (`CTE`) can be used inside the source\
    \ query to break up the logic in the query as well as to make the query readable.\
    \ The parameters are qualified by placing a question mark inside the query. The\
    \ parameters can also be used to add a column in the query, not just limit the\
    \ rows through a `WHERE` clause. The parameters can be added within different\
    \ sections of the query as long as they are mapped appropriately by using the\
    \ `Parameters` button in the `OLE DB Source Editor`. We highly recommend that\
    \ you place your parameters right next to each other so you do not end up losing\
    \ track of their order when you have to map them. The provided sample could get\
    \ messy because there are some parameters in the `CTE` as well as another parameter\
    \ in the final query.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ![](index-487_1.jpg)\n\n*Figure 14-1. OLE DB Source Editor*\n\nThe buttons to\
    \ the right side of the `SQL Command Text` box allow you to modify the query in\
    \ the following ways:\n\n- `Parameters` allows you to assign a mapping to parameters\
    \ listed in the query. The naming convention behind the mapping depends on the\
    \ type of the connection manager. The Connection Manager chapter outlines all\
    \ the mapping rules.\n- `Build Query` opens a `GUI` that allows you to construct\
    \ a `SQL` query.\n- `Browse` allows you to import the text from a file as your\
    \ query. When you click the `OK` button, the query will be parsed and the metadata\
    \ will be verified.\n- `Parse Query` parses the query that is supplied in the\
    \ text field.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-488_1.jpg)\n\
    \nFigure 14-2 demonstrates the mappings that can assign variable values to the\
    \ parameters defined in the `SQL` statement. The data types can vary depending\
    \ on the data type of the context in the query. The `Parameters` column is crucial\
    \ in assigning the values because it relies on the order of appearance of the\
    \ qualifier in the query. The `Param direction` column determines whether the\
    \ variable should be assigned a value through the statement (`Output`) or whether\
    \ the variable is passing in a value to the statement (`Input`). Because the source\
    \ component anticipates a tabular result set, `Input` is the direction that is\
    \ most likely to be used. This is the reason for our recommendation of gathering\
    \ the parameters as closely as possible.\n\n*Figure 14-2. Set Query Parameters\
    \ dialog box*"
