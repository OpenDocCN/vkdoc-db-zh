    Builder or any editor that exposes the list in a drop-down. In Expression Builder,
    the RunTime variable will be referred to as @[Audit::RunTime]. In the drop-down
    lists that show variables, it will appear as Audit::RunTime. The namespaces are
    case sensitive, because they are part of the variable identifier.


    System Variables


    SSIS provides variables that allow you to view minute details about a package
    and its objects. These variables are known as *system variables*, and they belong
    to the System namespace. These variables are accessible in most of the scopes,
    but depending on the scope in which they are area accessed the values might be
    different In order to access these variables, you must use @[System::<<variable_name>>].


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    Package System Variables


    System variables that belong to the package show important information about the
    package itself. All the objects defined within the package have access to these
    variables. Table 9-2 lists all the package system variables and their data types.


    *Table 9-2\. Package System Variables*


    **Name Data**


    **Type**


    **Description**


    CancelEvent


    Int32


    Identifier for a Windows Event object that


    signals the task to stop execution.


    CreationDate


    DateTime


    The date on which the package was created.


    CreatorComputerName


    String


    The computer on which the package was


    created.


    CreatorName


    String


    The username of the package creator.


    ExecutionInstanceGUID


    String


    Unique identifier of the package’s execution.


    The string represents hexadecimal values.'
