    cs.Year,


    cs.StatisticName,


    cs.Statistic


    FROM dbo.CensusStatistics cs


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3  HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    WHERE cs.Year = ''2010''


    AND cs.STATE_OR_REGION = ''New York'';


    The query in Listing 3-4 shows us all the statistics for the state of New York
    in the year 2010\. Without the denormalization, we would have to include six columns
    to account for the year and the different statistics. If we wanted to see all
    the data for New York since the data collection started, we would have to include
