    ## Project Files


    Some of the changes in SSIS 2012 are the properties available for project files.
    The properties of the project file allow for the configuration of build process—
    namely, the folder path of the packages. The folder path property also allows
    the user to directly deploy the project onto a SQL Server database, an Integration
    Services catalog. The Integration Services catalog is discussed in further detail
    in Chapter 18.


    Manually adding or deleting package (`.dtsx`) files in the file system will not
    modify or update the project file. In fact, deleting packages from the file system
    will actually corrupt the project. `Listing 2-1` demonstrates the XML tags that
    can be modified to add or remove packages from the project.


    `NOTE:` We recommend adding existing packages within Visual Studio. However, if
    a package already exists in the project folder, a copy of the original package
    will be created and the copy will be added to the project by Visual Studio. Usually
    the copy package name will be appended with “(1)”.


