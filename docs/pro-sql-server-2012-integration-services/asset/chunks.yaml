    # 第 5 章 控制流基础


    ## 数据配置文件任务编辑器 — 配置文件请求页面


    这些复选框允许你配置要分析的具体信息。我们将在第 12 章讨论每个选项的细节。


    **图 5-18. 单表快速配置文件表单对话框**


    如图 5-19 所示的数据配置文件任务编辑器的“配置文件请求”页面，允许你为每个配置文件请求配置选项。“所有请求”列表显示每个请求的配置文件类型和请求 ID。“视图”下拉菜单允许你按配置文件类型筛选请求。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-134_1.jpg)


    诸如 `ConnectionManager` 和 `TableOrView` 值等信息是从“单表快速配置文件表单”导入的。`RequestID` 是自动生成的，但在添加到“配置文件请求”页面后可以修改。`ThresholdSetting`
    选项允许你设置所需的阈值类型，作为配置文件的成功标准。使用此字段可以帮助你发现近乎唯一的键。`MaxNumberOfViolations` 属性可以定义你希望容忍的键重复或失败的次数。


    **图 5-19. 数据配置文件任务编辑器 — 配置文件请求页面**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-135_1.jpg)


    ## 执行包任务


    最灵活的 ETL 设计模式之一是使用一个包来调用其他包。这种设计需要使用 `执行包任务`，这是一个可执行组件，允许一个包在执行过程中调用另一个包。原始包的变量可以被被调用的包访问。原始包还可以传递任何可访问它的参数。图
    5-20 显示了控制流中的这个组件。其图标是一个带有蓝色方块的文件——三个在文件上，一个在文件外。三个蓝色方块代表文件本身包含的可执行文件，文件外的一个方块表示可以访问当前包之外的可执行文件。


    **图 5-20. 执行包任务**


    ### 执行包任务编辑器 — 包页面


    执行包任务编辑器的“包”页面允许你指定包的位置和名称。可以通过访问当前包所属的项目来指示包的位置。这将使用当前项目中包含的所有包来填充 `PackageNameFromProjectReference`
    列表。图 5-21 显示了该任务利用项目引用包的情况。这种 ETL 设计模式被称为 `父子设计`。我们将在第 16 章更详细地介绍它。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-136_1.jpg)


    **图 5-21. 执行包任务编辑器 — 包页面**


    根据所需的 `ReferenceType`，出现在“包”页面上的属性会有所不同，但 `ExecuteOutOfProcess` 和 `Password` 除外。属性如下：


    -   `ReferenceType` 允许你选择包的位置。`Project Reference` 表示子包作为对象存在于当前项目中。`External Reference`
    允许你访问文件系统或 SQL Server 上的包。

    -   `PackageNameFromProjectReference` 列出当前项目中包含的所有包。此属性仅适用于 `Project Reference`
    类型。

    -   `Password` 是用于加密子包的密码。尽管在图 5-21 中看起来有密码，但包并未加密。默认情况下，SSIS 会填写此字段。点击该字段会打开一个对话框，要求你指定并验证密码。

    -   `ExecuteOutOfProcess` 指定该包可以作为一个新的 Windows 进程执行。

    -   `Location` 定义包存在于文件系统还是 SQL Server 上。此属性仅适用于 `External Reference` 类型。

    '
- fmt: 'Connection specifies the connection manager to use to access the package.
    For the file system location, the connection lists all the file connection managers
    defined in the package. The SQL Server location lists all the `OLE DB Connection
    Managers` created in the package.


    `PackageName` appears only for packages stored on SQL Server. It opens a dialog
    box that allows you to pick a package that exists on the server.


    `PackageNameReadOnly` imports the value from the file connection manager used
    to connect to the package.


    ## Execute Package Task Editor—Parameter Bindings Page


    To facilitate the new deployment model, parameters are allowed to be passed between
    the parent and child packages. Figure 5-22 shows the `Parameter Bindings` page
    that allows you to specify the parameters to pass on to the child package. The
    `Add` button adds bindings to the task. The parent package will connect to the
    specified package and read in all the defined parameters. For the example in Figure
    5-22, we created two parameters, `ParentCreatorName` and `ParentStartTime`, in
    `ChildPackage.dtsx`.


    The parameters can be added in the `Parameters and Variables` window. As with
    the variables, you have to specify a name and data type for the parameter. The
    parameter does not have a namespace as variables do.


    This is a new functionality added to this version of SSIS. In the prior versions,
    configurations had to be added to the child package to pass variable values by
    reference. The parameters allow you to pass values from the parent to the child
    packages without adding explicit configurations to the child packages. The parameters
    are a part of the execution of the child packages. This is useful when you deploy
    packages to different environments and each environment requires a different set
    of values of the variables or connection strings of the connection managers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-138_1.jpg)


    **Figure 5-22.** `Execute Package Task EditorParameter Bindings` page


    > **TIP:** If the `Execute Package Task Editor` does not automatically detect
    the parameters defined in the child package, we recommend saving your changes,
    closing Visual Studio, and reopening the parent package. This lack of automatic
    detection can occur if you add new parameters to the child package while the parent
    package is open.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-139_1.jpg)


    ## Execute Process Task


    One of the most useful functionalities of SSIS is its ability to perform tasks
    that are not strictly ETL. One of the tasks that allow this functionality is the
    `Execute Process task`. This executable allows you to call batch files or applications
    from within the package. This task can also run command-line utilities or other
    applications. It even provides properties that will accept parameters that should
    be used when calling the process. Figure 5-23 demonstrates this task in the control
    flow. The icon for this task is an application window, showing that the purpose
    of this task is to run other programs. This task can be used to run `dtexec.exe`
    to call another package, but those packages will not be run in the Visual Studio
    Debug mode.


    **Figure 5-23.** `Execute Process task`


