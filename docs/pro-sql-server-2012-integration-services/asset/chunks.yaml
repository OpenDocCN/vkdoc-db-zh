    ## 你好世界


    在简要了解了 SSIS 12 包属性之后，让我们直接开始创建一个包。在 Visual Studio 中开发包的第一步需要一个工程。在本章中，我们创建了一个恰当地命名为
    Chap3_HelloWorld 的工程。图 3-2 展示了如何在 Visual Studio 中创建新的 Integration Services 工程。你可以通过工具栏上的“文件”菜单并选择“新建”->“工程”来访问此对话框。另一种方法是使用“开始”页面上的“最近的工程”面板。底部有一个创建工程的超链接。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-51_1.jpg)


    *图 3-2. 创建新的 Integration Services 工程*


    以下是对话框中的一些元素及其用途的简要说明：


    *   对话框中的 `Name` 文本字段为工程文件分配名称。这个名称应该足够广泛，以覆盖将要存储的各种包。因为我们仅试图演示一个简单的包，所以工程名称指的是一个简单的流程。

    *   `Location` 字段指示在开发期间工程在文件系统上存储的目录。为简单起见，我们创建了一个简短的文件夹路径来存储我们的包。

    *   `Solution Name` 字段会自动填充为 `Name` 字段中提供的相同值，但如果该名称不适合解决方案，可以更改。

    *   `Create Directory for Solution` 复选框对于保持工程组织性非常有用。它将在定义的 `Location` 内创建一个子文件夹，并将构建和部署所需的所有文件（`.database`、`.dtproj`、`.dtproj.user`、`.dtsx`
    等）和子文件夹放置其中。


    创建工程后，Visual Studio 将自动生成一个包并将其命名为 `Package.dtsx`。我们建议你执行的第一步是将此名称修改为更合适和描述性的名称。如果你通过解决方案资源管理器直接更改它，将会弹出一个对话框，要求你确认更改包的
    `Name` 属性。如果你通过属性窗口更改包的名称，则不会弹出对话框来确认对文件名的更改。这种行为允许两者不同步，但没有理由出现这种情况。我们建议你保持它们同步。


    因为我们不是在创建具有大量元数据的复杂包，所以我们将 `DelayValidation` 属性保留为 False。这个包只是简单地从平面文件获取数据并将其移动到
    SQL Server 12 数据库，没有任何转换。这是 SSIS 可以执行的最简单的 ETL（提取、转换和加载）任务，从源存储平台获取数据并将其放置到目标存储平台。我们也将跳过
    ID 生成，因为我们没有从现有包复制此包。


    我们将 `ProtectionLevel` 设置为 `DontSaveSensitive`。这将允许我们在处理包时无需记住密码，也无需通过公共用户帐户使用同一台机器。它还将强制我们将任何必需的连接信息存储在包之外的其他文件中。


    我们鼓励你将敏感信息存储在配置文件中，既为了安全地只存储一次信息，也为了限制对该文件的访问权限。


    在设置了所有所需的属性之后，我们可以开始包的实际开发。我们建议你添加一个如图 3-1 所示的注释，概述我们将要为 ETL 流程实现的基本设计。有了这个注释，我们就知道包中所有对象的功能。ETL
    流程的第一步是确定你要提取的数据、数据的位置以及关于数据的一些基本数据（元数据）。处理平面文件时，元数据变得至关重要，因为对列长度的低估将导致截断。


    **注意：** 工程中所有相关包的 `ProtectionLevel` 设置必须与工程的 `ProtectionLevel` 属性相同。


    ## 平面文件源连接


    我们将添加到包中的第一个对象是一个平面文件连接。我们通过右键单击设计器底部的“连接管理器”窗格并选择“新建平面文件连接”来完成此操作。这将打开“平面文件连接管理器编辑器”，如图
    3-3 所示。我们建议你用能够让你轻松识别该管理器所访问数据的名称替换连接的默认名称。连接名称必须是唯一的。此外，我们还建议在 `Description`
    字段中写下管理器的简短说明。这两个字段将在编辑器左侧面板中列出的所有页面中重新出现。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-53_1.jpg)


    *图 3-3. 平面文件连接管理器编辑器 — 常规属性*

    '
- fmt: '# CHAPTER 3 - HELLO WORLD—YOUR FIRST SSIS 2012 PACKAGE


    ## Flat File Connection Manager Editor


    ### General Page


    The `File Name` field stores the folder path and the file name that will be associated
    with this particular data set. The `Browse` button allows you to use Windows Explorer
    to locate the file and automatically populate the path into the field. When using
    the `Browse` option, it is important to note that the default file type selected
    is `.txt`. In our case, we are using a `.csv` file for our data, so we had to
    change the file type to be able to view it in Windows Explorer. The `Locale` drop-down
    provides a list of regions for language-specific ordering of time formats. The
    `Unicode` check box defines the dataset to use Unicode and will disable the `Code
    Page` ability. The `Code Page` option enables you to define non-Unicode code pages
    for the flat file.


    The `Format` section of the Flat File Connection Manager Editor’s `General` page
    allows you to define how SSIS will read in the file. There are three formats to
    choose from: `Delimited`, `Fixed Width`, and `Ragged Right`. `Delimited`, the
    default format, enables you to define the delimiter in the `Columns` tab. For
    `.csv` (comma-separated values) files, the delimiter is a comma. `Fixed Width`
    defines the columns in the flat file as having a determined column length for
    each of the columns. The length is measured in characters. A ruler helps you define
    the individual characters for each column. You can choose from 50 various fonts
    in order to accurately display the characters. `Ragged Right` follows the same
    rules as `Fixed Width` except for the last column. The last column has a row delimiter
    rather than a fixed width.


    The `Text Qualifier` text box allows you to specify the qualifiers that denote
    text data. The most common way to qualify text is by using quotes. The `Header
    Row Delimiter` list defines the characters that mark the first row of data. Usually,
    this is the same as the row delimiter. For `.csv` files, the row delimiter is
    a carriage return immediately followed by a line feed. When we downloaded the
    data from the Census Bureau’s web site, we cleaned up some of the header records
    so that only the column names and the actual data remained. The check box labeled
    `Column Names in the First Data Row` allows SSIS to easily read in the file and
    capture the column names defined in the `.csv` file, as demonstrated by `Figure
    3-4`.


    This cleans up the names so that you don’t see names such as `Column1`, `Column2`,
    and so forth, and replaces those generic names with the actual column headers
    defined in the `.csv` file.


    `NOTE:` We will not create a configuration file this early in the book, but this
    folder path will be a critical piece of information that is stored within the
    connection string property of the connection. When looping through a list of files
    with the same metadata, it is also possible to change the connection string during
    runtime.


    `Figure 3-4\. Flat File Connection Manager Editor—Columns page`


    ### Columns Page


    The `Columns` page of the Flat File Connection Manager Editor allows you to define
    the row delimiter and the column delimiter. With `.csv` files, the rows are delimited
    with carriage returns and line feeds, and the columns are delimited with commas.
    After setting these values, you can preview a sample of the rows using the delimiter
    values defined. If you need to make any changes to the delimiter, you can refresh
    the `Preview` pane to see how the changes will impact the connection manager’s
    reading of the file. The `Reset Columns` button will remove all the columns except
    the original columns.


    With the `Fixed Width` option, the `Preview` pane has a ruler at the top. In this
    mode, the preview will ignore the new line characters in the actual file. The
    marks along the ruler will demarcate the columns’ widths. Each column can have
    its width defined using the ruler. The `Preview` pane will visually assist with
    how the connection manager will read in the data. The `Ragged Right` option will
    have an extra field that will allow you to define the row delimiters.


    ### Advanced Page


    The `Advanced` page of the Flat File Connection Manager Editor, shown in `Figure
    3-5`, allows you to modify the metadata of each column. The columns represented
    here are dependent on the columns defined through the `Columns` page. In the `Advanced`
    page, you can modify each of the columns’ names, column delimiter, data type,
    output column width, and text qualified. For the last column in the flat file,
    the column delimiter will be the row delimiter. Depending on the data type chosen
    (numeric data), data precision and data scale become available. The column type
    determines these options, and for the delimited formats these are the columns
    available. For the other two formats, you can define the input column widths individually.
    Changes here will be reflected in the `Preview` pane on the `Columns` page.


    `Figure 3-5\. Flat File Connection Manager Editor—Advanced page`


    ### Preview Page


    The `Preview` page displays a sample dataset from the source according to the
    metadata defined in the other pages. `Figure 3-6` demonstrates this page of the
    Flat File Connection Manager Editor. It also has the option to skip data rows
    in the source. This is a different option than the one on the `General` page.
    The `General` page option allows header rows to be ignored so that the appropriate
    row can be used as the source for the column names. This `Preview` page option
    will ignore rows that immediately follow the row containing the column headers.


    `Figure 3-6\. Flat File Connection Manager Editor—Preview page`


    ## OLE DB Destination Connection


    With the source of our data ready for extraction, we need to set up the destination
    for loading. For this example, we will be using a SQL Server 12 database as the
    destination. We will create a table that will fit the metadata of the source,
    essentially taking the data from a file system flat file and storing it in a relational
    database management system (`RDBMS`). The first step in creating an Object Linking
    and Embedding Database (`OLE DB`) Connection Manager is to right-click in the
    `Connection Managers` pane in the designer window. Here you will have to add a
    data connection to a server, using the dialog box shown in `Figure 3-7`, if you
    do not already have one. You will need the login information ready when you are
    creating the data connection. If you do not have the server name, you can put
    in the `IP` address of the server, or if you want to load the data in a local
    instance on your machine, you can call it by using the `(local)\instance name`.


    `Figure 3-7\. Configuring the OLE DB Connection Manager`


    This manager allows you to store data connections that you use in `SSIS`. This
    is not limited to connections used within a particular project. You can configure
    the new connections by using the wizard shown in `Figure 3-8`. By default, the
    connections stored within the connection manager will have names in the following
    format: `DataSource.InitialCatalog`. The `Data Connection Properties` pane will
    show the connection string information and the default values for that particular
    connection. Clicking the `New` button will prompt the Connection Manager Wizard
    depicted in `Figure 3-8`. Connection managers are not limited to extract or load
    duties; they can perform both tasks, although doing both simultaneously may risk
    contention issues.'
