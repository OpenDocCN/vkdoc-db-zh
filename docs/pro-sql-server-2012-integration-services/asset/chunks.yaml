    `ActionAtEvent` 定义了当 WQL 查询返回指示目标事件的结果集时要采取的操作。选项为 `记录事件` 和 `记录事件并引发 SSIS 事件`。`记录事件`
    选项会导致事件被记录，而不会引起 SSIS 发出其自身事件。第二个选项在记录事件的同时，也会导致 SSIS 发出事件作为结果。


    `AfterEvent` 定义了任务在检测到所需事件后采取的操作。`返回失败` 选项导致任务在收到 WQL 查询的结果时出错。`返回成功` 选项导致任务在所需事件发生后成功完成。`再次监视事件`
    则按照 `NumberOfEvents` 字段中指定的次数继续监听该事件。


    `ActionAtTimeout` 定义了当 WQL 查询超时时要采取的操作。`记录超时` 选项会导致事件被记录，而不会引起 SSIS 发出其自身事件。`记录超时并引发
    SSIS 事件` 选项在记录超时的同时，也会导致 SSIS 发出事件作为结果。


    `AfterTimeout` 定义了任务在达到超时期限后采取的操作。`返回失败` 选项导致任务在达到超时时出错。`返回成功` 即使所需事件未发生，也导致任务成功完成。`再次监视事件`
    选项会重新启动超时计数器，任务将继续等待该事件。


    `NumberOfEvents` 定义了任务在完成前监视事件发生的次数。


    `超时`（Time-out）是一个非零值，用于设置在 WQL 查询未返回结果集的情况下，任务在该次迭代中停止监听前的秒数。


    ## 高级容器


    前一章介绍了 `Sequence`（序列）容器，作为一种组织控制流以使其更易读的方法。本章介绍另外两个默认容器：`For Loop`（For 循环）容器和
    `Foreach Loop`（Foreach 循环）容器。顾名思义，这两个容器用于重复运行一组可执行文件。`For Loop` 容器执行预设的次数，而 `Foreach
    Loop` 容器则依赖一个枚举器来控制其迭代。这些容器限制了优先约束跨越多个容器。当容器内的最后一个可执行文件或并发可执行文件完成执行时，迭代开始。要将可执行文件添加到容器中，你需要点击并从
    SSIS 工具箱中将它们拖到容器内部的空间中。`Task Host`（任务宿主）容器不能直接访问，但它有助于组织控制流可执行文件。


    ### For Loop 容器


    `For Loop 容器` 应在执行次数预先确定时使用，它不依赖于对象来确定迭代次数。`For Loop` 容器利用表达式来设置、评估和递增迭代器。图 6-27
    展示了该容器在没有任何可执行文件时在控制流中的样子。其图标是一个方形，周围有一个形成循环的箭头。方形代表被持续执行的过程。根据提供的表达式，此循环也可以表现为
    `while` 或 `do while` 循环。名称标签右侧的箭头允许你折叠容器以最小化其在控制流中占用的空间。


    *图 6-27\. For Loop 容器*


    `For Loop` 编辑器的 `For Loop` 页（如图 6-28 所示）允许你配置 `For Loop` 控制。配置包括定义用于初始化、评估和递增迭代器的表达式。


    *图 6-28\. For Loop 编辑器—For Loop 页*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-196_1.jpg)


    第 6 章  高级控制流任务


    编辑器的 `For Loop` 页允许你修改以下属性：


    `InitExpression` 提供了将用于设置循环迭代器初始值的表达式。该表达式不需要赋值；提供一个数值变量将自动求值为其值。对于某些类型的循环，此属性是可选的。


    `EvalExpression` 提供了一个逻辑表达式，其求值结果决定循环是否继续。


    `AssignExpression` 提供了将用于递增迭代器的表达式。此字段是可选的。


    `Name` 为 `For Loop` 容器提供一个唯一的名称。


    `Description` 对循环可执行文件进行简要说明。


    **注意：** 由于 `For Loop` 容器可以实现为 `while` 或 `do while` 循环，因此对使用的表达式和 SSIS 变量值要格外小心。此循环有可能无限期地持续下去。


    ### Foreach Loop 容器


    `Foreach Loop 容器` 利用枚举器来控制其循环行为。枚举器本身可以由各种类型的对象组成。与 `For Loop` 容器不同，此循环不能无限期运行。

