- fmt: '# CHAPTER 13 LOGGING AND AUDITING


    For this purpose, we create a simple table that allows you to store key-value
    pairs related to a specific batch and package execution. Rather than limit you
    to a specific set of predefined entries, this design lets you store any necessary
    metadata at any point in your process. The table we created for this purpose is
    the `LineageMetadata` table, shown here:


    ```

    IF OBJECT_ID(N''Audit.LineageMetadata'') IS NOT NULL

    DROP TABLE Audit.LineageMetadata;

    GO


    CREATE TABLE Audit.LineageMetadata

    (

    LineageMetaID int not null identity(1, 1),

    BatchID int not null,

    AuditPackageID int not null,

    LineageKey varchar(1000) not null,

    LineageValue varchar(1000),

    CONSTRAINT PK_AUDIT_LINEAGEMETADATA PRIMARY KEY CLUSTERED

    (

    LineageMetaID

    )

    );

    GO

    ```


    We also provide a simple procedure to add entries to the table on demand, as shown
    here:


    ```

    IF OBJECT_ID(N''Audit.AddLineageMetadata'') IS NOT NULL

    DROP PROCEDURE Audit.AddLineageMetadata;

    GO


    CREATE PROCEDURE Audit.AddLineageMetadata @BatchID int,

    @AuditPackageID int,

    @LineageKey varchar(1000),

    @LineageValue varchar(1000)

    AS

    BEGIN

    INSERT INTO Audit.LineageMetadata

    (

    BatchID,

    AuditPackageID,

    LineageKey,

    LineageValue

    )

    VALUES

    (

    @BatchID,

    @AuditPackageID,

    @LineageKey,

    @LineageValue

    );

    END;

    GO

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    A sample package that implements our simple data lineage solution extends the
    previous auditing package to include lineage entities, such as storing the source
    file name, as shown in Figure 13-10.


    ![](index-482_1.jpg)


    *Figure 13-10. SSIS package with additional data lineage*


    To get row-level data lineage, we need to add the batch ID and package ID as columns
    to our data flow, and store them in the target table with the data. In our example,
    we’ve done this with a `Derived Column` transformation, shown in Figure 13-11.


    ![](index-483_1.jpg)


    *Figure 13-11. Adding lineage data to the data flow with a Derived Column transformation*


    The lineage data can be joined to the auditing data with the `BatchID` and `AuditPackageID`,
    as shown in the following sample query. Sample results from our test run are shown
    in Figure 13-12.


    ```

    SELECT lm.BatchID,

    lm.AuditPackageID,

    lm.LineageKey,

    lm.LineageValue,

    au.PackageName,

    au.PackageStartTime,

    au.PackageEndTime

    FROM Audit.LineageMetadata lm

    INNER JOIN Audit.AuditPackage au

    ON lm.BatchID = au.BatchID

    AND lm.AuditPackageID = au.AuditPackageID;

    GO

    ```


    ![](index-484_1.jpg)


    *Figure 13-12. Sample lineage and audit data*


    As you can see in the results in Figure 13-12, we have captured enough metadata
    information to trace every row of data from the source file it started in, through
    the package that manipulated it, and finally to the destination table it ended
    up in.


    **NOTE:** As we noted previously, this is a simple data lineage solution, but
    it can be used to build much more complex solutions. The authors have, on occasion,
    implemented custom data lineage solutions requiring a much finer grain of detail,
    such as capturing the state of individual rows and columns of data as it is processed.
    As you can imagine, we’re enthusiastically looking forward to the release of Project
    Barcelona.


    ## Summary


    In many enterprise systems that are currently in production use around the world—in
    many industries—logging and auditing features are often overlooked. In some scenarios,
    lack of proper logging and auditing processes can result in countless hours of
    reverse-engineering thousands of lines of code to uncover and fix even the simplest
    of errors. In the worst case, failure to implement these enterprise features could
    end in trouble with auditors and regulatory agencies followed by big fines and
    people losing their jobs. This chapter presented SSIS’s built-in logging capabilities
    and showed you how to extend them to add standardized auditing features to your
    ETL processes.'
