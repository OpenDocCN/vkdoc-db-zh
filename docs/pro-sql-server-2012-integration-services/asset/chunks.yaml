- fmt: "# CHAPTER 10 - SCRIPTING\n\n## Input Columns Page\n\n在编辑器的 Input Columns 页面，您可以选择输入列和输出列。您选择的输入列可以在脚本内部访问；所有其他列都将“传递通过”组件到数据流中的下一个组件。您也可以在此选项卡上向数据流添加输出列。在我们的简单示例中，我们添加了一个名为\
    \ `RowNumber` 的四字节有符号整数 (`DT_I4`) 类型列到输出中，如图 10-21 所示。这个新列将保存分配给每一行的编号，从 1 开始。\n\
    \n图 10-21. 向脚本组件输出添加新列\n\n## Script Component 同步转换\n\nScript Component 同步转换重写了三个方法：\n\
    \n- 与 Script Component 源类似，异步转换类型重写了 ` PreExecute()` 方法。此方法在脚本组件的开头、任何数据处理之前精确执行一次。此方法对于在转换中执行初始化任务非常有用。\n\
    - Script Component 同步转换也支持 `PostExecute()` 方法。此方法在组件处理完所有数据后精确执行一次。此方法允许您在转换完成后执行任何清理步骤。\n\
    - 最后，转换提供了 `ProcessInputRow()` 方法，其名称前缀是您的输入名称。在我们的示例中，输入名为 Input 0，`ProcessInputRow()`\
    \ 方法被命名为 `Input0_ProcessInputRow()`。在同步转换中，对于通过它的每一行数据，都会调用一次此方法。此方法是转换中“发生魔法”的地方。\n\
    \n## 示例脚本分析\n\n我们在此脚本组件中使用的脚本首先声明了一个名为 `row_number` 的类级整数变量来跟踪行数，如下所示：\n\n```csharp\n\
    [Microsoft.SqlServer.Dts.Pipeline.SSISScriptComponentEntryPointAttribute]\npublic\
    \ class ScriptMain : UserComponent\n{\n    int row_number;\n    ...\n}\n```\n\n\
    ` PreExecute()` 方法调用了 `base.PreExecute()` 方法并将 `row_number` 变量初始化为 1：\n\n```csharp\n\
    public override void PreExecute()\n{\n    // Execute base PreExecute() method\n\
    \    base.PreExecute();\n    // Initialize row number\n    row_number = 1;\n}\n\
    ```\n\n`PostExecute()` 方法只是调用了 `base.PostExecute()` 方法：\n\n```csharp\npublic override\
    \ void PostExecute()\n{\n    base.PostExecute();\n}\n```\n\n`Input0_ProcessRow()`\
    \ 方法对输入中的每一行调用一次。对于传入的每一行，我们将 `row_number` 变量的值分配给数据流的 `RowNumber` 列，然后将 `row_number`\
    \ 递增 1。\n\n```csharp\npublic override void Input0_ProcessInputRow(Input0Buffer\
    \ Row)\n{\n    // Assign row_number to RowNumber column\n    Row.RowNumber = row_number;\n\
    \    // Increment row_number\n    row_number++;\n}\n```\n\n我们简单的行编号脚本组件的结果如图 10-22\
    \ 所示。\n\n图 10-22. 行编号脚本组件的结果\n\n## 异步 Script Component 转换\n\n除了同步转换，脚本组件还允许您创建强大的异步转换。正如我们在第\
    \ 8 章讨论的，当您想通过透视、聚合或添加和删除行来更改数据集的“形状”时，异步转换非常有用。此示例扩展了先前的包，将一个新的异步脚本组件集成到数据流中。我们将解析文章的\
    \ Title 和 Description 列为单个单词，并将它们输出到单个列中，同时为每个单词提供一个出现计数。在现实世界中，这种类型的转换可用于执行文本数据挖掘和分析。\n\
    \n我们通过向任务添加另一个脚本组件开始此示例，就像添加同步 Script Component 转换时一样。与之前一样，我们从对话框中选择了 Transformation\
    \ 选项。我们将数据流从同步行编号脚本组件定向到新的脚本组件。我们还添加了一个新的 Row Count 转换来捕获第二个输出的输入，并在其输出上启用了数据查看器。结果如图\
    \ 10-23 所示。\n\n图 10-23. 将新的单词解析脚本组件添加到数据流\n\n在此示例中，我们将介绍脚本转换的两个特性：(1) 使用异步转换处理输入数据，以及\
    \ (2) 多个输出。对于其中一个输出，我们将其重命名为 `RssFeedOutput`，我们将以检索时的相同形式输出 RSS 源文章。该转换还将从 RSS\
    \ 源的 `Description` 列中提取关键词，并计算该词在每篇文章中的出现次数。结果被发送到第二个输出，我们将其重命名为 `KeywordOutput`。\n\
    \n将新的脚本组件拖到设计器界面后，我们进入了编辑器的 Input Columns 页面。我们选择了来自数据流的所有入站列，使它们可用于脚本组件，如图 10-24\
    \ 所示。\n\n图 10-24. 将入站列添加到脚本组件的输入列中\n\n将入站列添加到脚本组件的输入列后，我们转到了 Inputs and Outputs\
    \ 页面。在那里，我们向 Inputs and Outputs 页面添加了第二个输出。然后我们将两个输出上的 `SynchronousOutputID` 更改为\
    \ `None`。这会将它们与输入断开连接并使它们成为异步。\n\n**提示**：虽然您可以向 Script Component 转换添加多个输出，但您只能有一个输入。如果您需要多个输入（一个例子是\
    \ Union All 组件），您将需要创建一个自定义组件，这将在第 22 章讨论。\n\n默认情况下，输出名为 Output 0 和 Output 1——对于此示例，我们将它们重命名为\
    \ `RssFeedOutput` 和 `KeywordOutput`，以更好地反映我们将要推入其中的数据。然后我们在每个输出下创建了输出列。`RssFeedOutput`\
    \ 将包含 RSS 源内容，就像它们进入组件时一样，而 `KeywordOutput` 将保存所有解析的关键词。您可以在图 10-25 中看到具有两个异步输出的\
    \ Inputs and Outputs 页面。\n\n图 10-25. 向脚本组件添加两个异步输出\n\n在构建 Script Component 同步转换时，如我们之前所见，默认情况下，入站列会流向输出。这是因为在同步转换中，输入和输出缓冲区是相同的。您只需要显式命名那些您的转换添加到输出的列。在异步转换中，输入和输出是断开的，因此您需要为您想要在每个输出中出现的每一个列显式创建。在我们的示例中，`RssFeedOutput`\
    \ 列镜像输入列，而 `KeywordOutput` 仅包含四列，如图 10-26 所示。表 10-1 列出了 `KeywordOutput` 列的详细信息。\n\
    \n图 10-26. 向脚本组件的两个输出添加列\n\n表 10-1. KeywordOutput 列列表\n\n| 列名 | 数据类型 | 内容 |\n\
    | :--- | :--- | :--- |\n| `RowNumber` | 四字节有符号整数 (`DT_I4`) | 分配给输入每一行的 `RowNumber`\
    \ 值的副本 |\n| `KeyWordNumber` | 四字节有符号整数 (`DT_I4`) | 分配给在 RSS 数据 `Description` 列中找到的每个关键词的唯一编号\
    \ |"
  raw: 'On the Input Columns page of the editor, you can choose Input Columns and
    Output Columns. The Input Columns you choose are accessible from within the script;
    all other columns are “passed through”


    the component to the next component in the data flow. You can add Output Columns
    to the data flow on this tab as well. In our simple example, we’ve added a four-byte
    signed integer [DT_I4] type column named RowNumber to the output, as shown in
    Figure 10-21\. This new column will hold the number assigned to each row, beginning
    with 1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-386_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-21\. Adding a new column to the script component output*


    The Script Component synchronous transformation overrides three methods:


     Like the Script Component source, the asynchronous transformation type


    overrides the PreExecute() method. This method is executed exactly once at the


    start of the script component, before any data is processed. This method is useful
    for performing initialization tasks in your transformation.


     The Script Component synchronous transformation also supports the


    PostExecute() method. This method is executed exactly once, when all data has


    been processed by the component. This method allows you to perform any


    cleanup steps after the transformation is complete.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10  SCRIPTING


     Finally, the transformation provides the ProcessInputRow() method, which has
    the name of your input prepended to it. In our example, where the input is named
    Input 0, the ProcessInputRow() method is named Input0_ProcessInputRow(). In a


    synchronous transformation, this method is called once for every single row of


    data that passes through it. This method is “where the magic happens” in your


    transformation.


    The script we used in this script component starts by declaring a class-level
    integer variable named row_number to keep track of our row count, as shown here:


    [Microsoft.SqlServer.Dts.Pipeline.SSISScriptComponentEntryPointAttribute]


    public class ScriptMain : UserComponent


    {


    int row_number;


    ...


    }


    The PreExecute() method calls the base.PreExecute() method and initializes the
    row_number variable to 1:


    public override void PreExecute()


    {


    // Execute base PreExecute() method


    base.PreExecute();


    // Initialize row number


    row_number = 1;


    }


    The PostExecute() method simply calls the base.PostExecute() method:


    public override void PostExecute()


    {


    base.PostExecute();


    }


    The Input0_ProcessRow() method is called once for each row of the input. For each
    row passed in, we assign the value of the row_number variable to the RowNumber
    column of the data flow and then increment the row_number by 1.


    public override void Input0_ProcessInputRow(Input0Buffer Row)


    {


    // Assign row_number to RowNumber column


    Row.RowNumber = row_number;


    // Increment row_number


    row_number++;


    }


    The results of our simple row-numbering script component are shown in Figure 10-22.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-388_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-22\. Results of row-numbering script component*


    Asynchronous Script Component Transformation


    In addition to synchronous transformations, the script component allows you to
    create powerful asynchronous transformations. As we discussed in Chapter 8, asynchronous
    transformations are useful when you want to change the “shape” of your dataset
    by pivoting it, aggregating it, or by adding and removing rows. This example extends
    the previous package to incorporate a new asynchronous script component into the
    data flow. We will parse the article Title and Description columns into individual
    words and output them in a single column, along with an occurrence count for each
    word. In the real world, this type of transformation can be useful for performing
    text data mining and analysis.


    We begin this sample by adding another script component to the task, as we did
    when adding a syncronous Script Component transformation. As before, we chose
    the Transformation option from the dialog box. We directed the data flow from
    the synchronous row-numbering script component to the new script component. We
    also added a new Row Count transformation to catch the input of the second output
    and enabled the data viewer on the output. The result looks like Figure 10-23.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-389_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-23\. Adding the new word-parsing script component to the data flow*
    In this example, we’re going to introduce two features of script transformations:
    (1) processing input data by using asynchronous transformations and (2) multiple
    outputs. For one of the outputs, which we’ve renamed RssFeedOutput, we’ll output
    the RSS feed articles in the same form that we retrieved them in. The transformation
    will also extract the keywords out of the RSS feed Description column and count
    the number of occurrences of that word in each article. The results are sent to
    the second output, which we renamed KeywordOutput.


    After dragging the new script component onto the designer surface, we went into
    the Input Columns page of the editor. We selected all inbound columns from the
    data flow, making them available to the script component, as you can see in Figure
    10-24.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-390_1.jpg)


    CHAPTER 10  SCRIPTING


    *Figure 10-24\. Adding inbound columns to the script component’s input columns*
    After we added the inbound columns to the script component’s input columns, we
    went to the Inputs and Outputs page. Once there, we added a second output to the
    Inputs and Outputs page. We then changed the SynchronousOutputID to None on both
    outputs. This disconnects them from the input and makes them asynchronous.


    ■ **TIP:** Although you can add multiple outputs to a Script Component transformation,
    you can have only one input.


    If you need multiple inputs (one example is the stock Union All component), you’ll
    need to create a custom component, which we discuss in Chapter 22.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-391_1.jpg)


    CHAPTER 10  SCRIPTING


    By default, the outputs are named Output 0 and Output 1—for this sample, we renamed
    them to RssFeedOutput and KeywordOutput to better reflect the data we’ll push
    into it. We then created the output columns under each output. RssFeedOutput will
    contain the RSS feed contents exactly as they come into the component, while KeywordOutput
    will hold all the parsed keywords. You can see the Inputs and Outputs page with
    two asynchronous outputs in Figure 10-25.


    *Figure 10-25\. Adding two asynchronous outputs to the script component*


    When building a Script Component synchronous transformation, as we saw previously,
    the inbound columns flow through to the output by default. This is because in
    synchronous transformations, the input and output buffer are one and the same.
    You need to explicitly name only those columns that your transformation adds to
    the output. In an asynchronous transformation, the input and outputs are disconnected,
    so you need to explicitly create every single column you want in every output.
    In our example, the RssFeedOutput columns mirror the input columns, while the
    KeywordOutput contains only four columns, as shown in Figure 10-26\. Table 10-1
    lists the details of the KeywordOutput columns.


