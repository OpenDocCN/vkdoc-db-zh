    # CHAPTER 12


    ## Data Profiling and Scrubbing


    *Code, load, and explode.*

    —Steve Hitchman


    Projects that require bringing together data from multiple sources—for example,
    data warehouse, data mart, or operational data store (ODS) projects—are extremely
    common. You could spend months gathering business requirements, putting together
    technical specifications, designing target databases, and coding and testing your
    ETL process. You could spend an eternity in “ad hoc maintenance mode” rewriting
    large sections of code that don’t handle unanticipated bad or nonconforming data.
    This scenario is the result of a failure to properly plan and execute data integration
    projects—a phenomenon known as *code, load, and explode*.


    Anytime you need to bring together data from two or more systems, you have a *data
    integration* project on your hands. Proper data integration requires a lot of
    grunt work. Unfortunately, it’s one of the least exciting and glamorous parts
    of any project—thorough planning and process formalization, investigation of source
    systems, interrogation of source data, generation of large amounts of documentation.
    By accident or by choice, the scope of data integration requirements and the cost
    of not doing it right are often underestimated in enterprise projects. Data integration
    requires a lot of generally low-profile analysis, but failure to do it properly
    can result in high-profile project failures. This chapter shows how SSIS can help
    you properly profile and cleanse your data.


    ## Data Profiling


    *Data profiling*, at its core, is the process of gathering statistical information
    about your data. The purpose is to ensure that your source data meets your expectations
    by answering questions such as the following:


    Does my source data contain nulls? You may expect certain source data columns
    to contain no nulls, or to contain a certain number of nulls (fewer than 10 percent,
    for instance). Profiling your source data will reveal whether the number of nulls
    meets your expectations.


    Does my source data contain all valid values? This involves defining *domains*,
    or sets of valid values, for your source data. As examples, you might expect a
    `Gender` column to contain only `Male` or `Female` values, or you might expect
    a `Price` column to contain only positive numeric values between 0.01'
