    about the differences between synchronous and asynchronous transformations, as
    well as blocking, nonblocking, and partially blocking transformations. You looked
    at the individual transformations you can apply in your data flow, including the
    wide variety of settings available to each, with examples. The next chapter introduces
    SSIS variables and the SSIS Expression Language.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 9

    ## Variables, Parameters, and Expressions


    > Old expressions are the best, and short ones even better.

    > —Prime Minister Winston Churchill


    In order to create modular and robust solutions, developers will often create
    variables and routines to access those variables. Integration Services is no different
    in this regard. The variables available to SSIS have their own data types that
    often correlate to SQL Server data types. Parameters are used to pass values between
    parent and child packages to extend the modularity of an ETL project. And an expression
    language is provided to allow the ETL process to read or modify the values of
    both during runtime. The expression language can certainly get convoluted, so
    it is recommended that you take Churchill’s words to heart and keep the logic
    minimal, readable, and easily modifiable.


    Variables allow flexibility when running packages by allowing you to evaluate
    conditions, modify data in the stream, parameterize SQL, and many other options.
    These variables can be used to store scalar values or tabular values, depending
    on their data types. Scalar values are useful for parameterizing SQL, whereas
    tabular values can control loop containers. This chapter covers the data types
    that SSIS variables can have and shows how they interact with the package during
    runtime.


    ### What Are Variables and Expressions?


    *Variables* are used to store values that SSIS executables can access at runtime.
    Defaults can be provided at design time for variables of certain data types, but
    it is during runtime that they truly shine. There are two kinds of variables:
    system variables and user-defined variables.


    The *system variables* capture the status of the package during runtime. They
    are defined by SSIS and in some cases will automatically update. You can neither
    modify the values of system variables nor define any system variables. You can,
    however, access the values of the system variables such as `System::StartTime`
    in order to store the execution information for tracing the process. `System::`
    denotes the namespace that the variable belongs to; we introduce namespaces later
    in this chapter. Variable names are case sensitive in SSIS.


    *User-defined variables* are extremely useful because they can extend the functionality
    of SSIS by making processes modular. Scalar variables defined as `String` and
    `Date` data types, among others, can be used to parameterize `Execute SQL tasks`
    and source queries. Tabular variables defined as `Object` data types can be used
    to control loop containers as well as allow script components access to the data.
    You can create user-defined variables and can define the level of access, read-only
    or read/write, that individual components may have to the variables. In order
    to add variables to a package, you can use the `Variables` window. The window
    can be opened by right-clicking on the control flow of the package and selecting
    the `Variables` option, as shown in Figure 9-1. The other option is to use the
    `View` menu to choose `Other Windows` ➤ `Variables`.


    ![Figure 9-1. Variables window in Visual Studio](index-326_1.jpg)


    *Expressions* are used in SSIS to return a value based on the evaluation of criteria.
    The expression language itself consists of identifiers, literals, functions, and
    operators. Some expressions can be written to assign values to variables, return
    the value of a calculation, or be used as conditional statements. The expressions,
    just like most programming languages, adhere to a strict grammar. The grammar
    determines the proper usage of the identifiers, literals, functions, and operators.
    In order to assist you with writing expressions, SSIS provides an expression evaluator
    and builder. Figure 9-2 shows the Expression Builder with the expression evaluator.
    The evaluator will parse and validate the expression’s adherence to the grammar.
    The Expression Builder provides quick access to all the available variables, functions,
    type casts, and operators. You can click and drag the item you need from its respective
    position into the expression text box to add it to the expression.


    ![Figure 9-2. Expression Builder](index-327_1.jpg)


    The expression

    ```

    GETDATE() > DATEADD( "Second", 2, @[System::StartTime] ) ? TRUE : FALSE

    ```

    evaluates to a Boolean value. It performs a simple check to determine whether
    2 seconds have passed since the package’s execution began. This particular expression
    uses the `? :` syntax to handle an `IF THEN` statement. The `DATEADD` function
    allows us to adjust the time interval for our check. We use this expression to
    modify the values of control flow task properties such as `DelayValidation`. This
    expression can be set only to properties that have Boolean definitions.


    > **NOTE:** The system variables will store the values once the package is opened
    for design time evaluation. For example, the `System::StartTime` variable will
    maintain the timestamp from when the package was initially opened. This value
    will not update even if the package is run using Debug mode. It will update only
    if you close and reopen the package.


    ### What Are Parameters?


    In order to support the new deployment model for SSIS, parameters have been introduced
    in this version. *Parameters* basically replace the need for configurations to
    specify values. Parameters can be used at the package level or at the project
    level.


    *Package-level parameters* are extremely useful for the parent-child package design.
    They allow you to pass specific values between the parent packages in order to
    configure the child packages. Prior to passing the parameters to the child package,
    you need to create the package parameters. Certain objects within a package can
    be bound to properties so that when a value is inherited from the parent, it will
    directly impact the child package’s property. Bindings can also be created to
    map to the objects’ properties that exist within the child package.


    Figure 9-3 demonstrates how to bind the parameter to a package property. You can
    either create a new parameter by using the wizard or you can use a project parameter
    whose value is available to all the packages in the project. Parameter names are
    case sensitive. We discuss parameterizing packages later in this chapter. All
    the executables, containers, and event handlers can be parameterized as well.
    The package parameters that are created can be bound to the specific properties
    of each of these objects in the package. Connection managers cannot be parameterized
    directly but properties such as `ConnectionString` can be modified by using `Script
    tasks` and variables that inherited values from parent packages.


    ![Figure 9-3. Parameterizing a package](index-329_1.jpg)'
