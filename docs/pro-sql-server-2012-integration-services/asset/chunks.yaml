- fmt: 'This tab continuously updates with the current state of the execution process
    until the end with either a success or failure. This tab will show which executable(s)
    is currently running, the number of rows that lookup components have cached, and
    more. It also captures the progress of the pre-execute processing as well as the
    post-execute processing. After the execution, it renames itself to the Execution
    Results tab.


    The Execution Results tab contains the same output as the very end of the Progress
    tab. One of the most critical pieces of information stored in the Execution Results
    tab is the number of rows committed to the destinations.


    At the top-right corner of the Designer window, there are two buttons. These buttons
    are shortcuts to the Parameters and Variableswindow pane and the SSIS Toolbox
    window pane. They come in handy when trying to quickly look at the parameters
    and variables and the tools available for the selected context.


    ## Resolve References


    An exciting new feature for the data flow is the Resolve References utility. This
    is available by right-clicking on a data flow path between two components and
    selecting Resolve References. This is a powerful tool because it allows mappings
    to be generated and maintained in an Excel spreadsheet and then simply be added
    as the mapping between the source and the input of the destination. This is a
    vast improvement on the previous version’s Restore Invalid Column References Editor
    that usually caused worry among developers when it was used. Figure 2-10 displays
    the Resolve References utility as it appears in Visual Studio.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-28_1.jpg)


    ### Figure 2-10. Resolve References utility


    This tool can quickly update the metadata due to DDL changes or source/destination
    changes. Its usefulness comes in the ability to see all the columns in the pipeline
    at once as opposed to seeing them in a drop-down list, one column mapping at a
    time. In the Mapped Columns pane of the utility, the buttons perform the following
    functions from left to right:


    - `Automap Columns` attempts to best match the columns in the source and the columns
    in the destination based on the name. This feature has been present in SSIS in
    previous versions, usually generating the mappings in destination components.

    - `Insert Cell` allows you to stagger present mappings without losing all the
    mapped columns currently present. It will shift the cells down from the currently
    selected cell in either the Source or the Destination column.

    - `Insert Row` inserts a whole row so that entirely new mappings can be constructed.
    As in set theory, order is not important. The order that the mappings present
    themselves does not matter, just as long as the mappings exist.

    - `Delete Cell` shifts the cells up to the current highlighted cell. This can
    be used to shift the mappings from their correct position.

    - `Delete Row` deletes an entire row of unwanted mappings. Use this to remove
    column mappings—for example, if the Automap feature created a relationship between
    unrelated columns.

    - `Eliminate Blank Rows` deletes all the rows that do not contain both sides of
    the mapping. It will not delete a row if there is a Source or a Destination column
    populated.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    - `Copy Mappings to Clipboard` copies the contents of the entire mapping table
    in Excel format. This can be used to store the mappings in a spreadsheet for documentation
    purposes.

    - `Paste from Clipboard` pastes the contents of the Clipboard into the utility.
    It will allow you to paste columns that don’t exist in the metadata, but after
    the grid is populated, it will validate the mappings. If the columns do not exist,
    error messages will appear at the bottom of the pane informing you that the column
    specified does not exist. Also, pasting always appends to the existing mappings;
    you cannot overwrite a mapping if it is already present in the table. The only
    prerequisite to using this button is making sure that there are only two columns
    in the Clipboard.

    - `Clear All Mappings` wipes away the contents of the mapping table and moves
    the columns back to their respective panes, Unmapped Output Columns and Unmapped
    Input Columns.


    **NOTE:** If columns are removed from the source of a data flow, they will be
    recognized as still existing upstream in the pipeline when a component downstream
    is still using it in its mapping. After the dependencies are removed, the column
    will be removed from the pipeline.


    In order to keep the packages organized and readable, a menu item named Format
    allows you to line up the elements of the control flow and the data flow according
    to your desires. For simple flows, the Auto Layout should suffice to make the
    package presentable. For more-complex packages, there are options to align the
    components, to modify the distance between them, and to make them the same size.


    For these options, the components to which the formatting is to be applied need
    to be selected prior to applying these changes. The first component selected will
    be the reference for the rest of the components. For example, the other components
    will have their alignment determined with respect to the first selected component.


    ## SSIS Toolbox


    To the left of the Designer window is the SSIS Toolbox. This is a name change
    from prior versions of BIDS, where it was known as just Toolbox. There is a Toolbox
    still present in Visual Studio, but it does not have any components for the SSIS
    Designer. The SSIS Toolbox changes to show only the components that are pertinent
    to the current view of the designer.


    At the bottom of the SSIS Toolbox, there is a brief description of the selected
    component that can be helpful for first-time developers. Right-clicking the description
    shows the option to Show Type Information. This option gives detailed information
    about the selected tool, such as the assembly name and the location of the .dll.
    With this description, there are two reference points, a Help button in the top-right
    corner of this section and the Find Samples hyperlink, which takes you to CodePlex
    with a prepopulated search.


    The SSIS Toolbox is organized in a completely different way than previous versions.
    The new organization of the Control Flow components is organized into four groups:
    Favorites, Common, Containers, and Other Tasks. The Favorites by default include
    the workhorses of the SSIS world, the Data Flow task and the Execute SQL task.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-30_1.jpg)


    **TIP:** By default, SSIS 12 has its own grouping of components, but this grouping
    can be changed according to your needs. Tasks can be moved to the other groupings
    by right-clicking the component and moving it to the desired grouping. Containers
    are the exception; they can be moved only to Favorites or Common.


    The SSIS Toolbox for the data flow is organized in a similar fashion to the control
    flow. The components are divided into categories: Favorites, Common, Other Transforms,
    Other Sources, and Other Destinations. Just as with the control flow tasks, this
    grouping is modifiable to a degree for personal preferences. The default favorites
    for the data flow are new to SSIS: the Destination Assistant and Source Assistant.
    These assistants organize the connection managers defined in the package by their
    storage type, as shown in Figure 2-11. By default, they show only the data storage
    applications that have drivers installed on the machine. The assistants can be
    used to create new connection managers if the desired ones do not already exist.


    ### Figure 2-11. Destination Assistant


    ## Package Code View'
