- fmt: '# CHAPTER 14 - HETEROGENEOUS SOURCES AND DESTINATIONS


    ## Figure 14-14. Columns page of the XML Source Editor


    Figure 14-14 shows the `Columns` page of the `XML Source Editor`. The interesting
    thing about this source component is that depending on the number of node levels
    of the XML, each gets its own output.


    The figure shows that this particular XML file has three levels: `Property`, `Properties`,
    and `Event`. The list is alphabetical and not hierarchical, so you cannot easily
    determine the structure just by looking at the outputs. Each output will have
    its column set based on the `XSD`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-502_1.jpg)


    > **NOTE:** Along with an output for each of the node levels defined in the `XSD`,
    each of these outputs comes with its own error output that can be redirected as
    well.


    ## Raw File Sources and Destinations


    The raw file source and destinations provide an efficient method of storing data
    that doesn’t need to keep returning to the server at every request, such as `Lookup
    transformations` using the same dataset.


    These files should ideally be created on the local machine that is executing the
    package. One of the greatest advantages that these files provide is that if a
    query is used to return the same dataset multiple times, the query can be executed
    once and the result set stored in a file. At runtime, instead of each of the `Lookup
    transformations` querying the database, the result can be acquired directly off
    the machine.


    Figure 14-15 shows the editor of the `raw file destination`. This component works
    in a slightly different way from the other sources and destinations in that the
    file needs to be loaded before it can provide any metadata as a source. It also
    does not utilize a connection manager in order to connect to a file.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-503_1.jpg)


    > *Figure 14-15. Raw File Destination Editor*


    After the data is loaded into the file, you can freely access it as a part of
    your process. Figure 14-16 shows the source component for the raw file. Just like
    the destination component, this component does not rely on a connection manager
    to identify the file it needs to reference. It can read the data right off the
    local machine and load into other destinations.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-504_1.jpg)


    > *Figure 14-16. Raw File Source Editor*


    ## SQL Server Analysis Services Sources


    `Analysis Services` cubes are analytical structures often used in the business
    intelligence field. Their greatest asset is the ability to store large numbers
    of aggregations so that querying might be faster. The cube itself can be queried
    only by using `Multidimensional Expressions (MDX)`. The data types returned by
    these expressions do not always translate easily into database data types, so
    it is often the case that `SSIS` will simply cast them as character fields. There
    is an `SSAS OLE DB provider` that allows you to connect to a cube and extract
    certain values from the defined connection. Figure 14-17 shows the `OLE DB source
    component` that was used to query a cube.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-505_1.jpg)


    > *Figure 14-17. SSAS OLE DB Editor with MDX*


    The expression in the source component, replicated as Listing 14-4, is a simple
    `MDX` query that shows the number of calls that were placed to each call center.
    This query does not use any filters (`MDX WHERE` clauses) or cross joins to slice
    by multiple items. This query objective is simple and can translate into a `GROUP
    BY` `SQL` statement with a `COUNT (DISTINCT CallID)` column.


    > *Listing 14-4. MDX Sample from an SSAS Source Component*


    ```

    SELECT {[Measures].[Calls]} ON COLUMNS,

    {[Fact Call Center].[Fact Call Center ID].[Fact Call Center ID]} ON ROWS

    FROM [Adventure Works DW Denali]

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    > **CAUTION:** Unlike an `SQL` query, `SSIS` can get metadata from an `MDX` query
    only if it returns a dataset. If you use a filter with no data or return an empty
    set, `SSIS` will throw a metadata validation error. This can happen at design
    time as well as at runtime.


    ## Recordset Destination


    `SSIS variables` can often be used to hold data. In most cases, this data takes
    the form of scalar values, but in some instances an `ADO.NET in-memory recordset`
    is required. The `SSIS Object type variables` can be used to store tabular datasets
    to enumerate through the loop containers and provide additional functionality
    in conjunction with `script components`, as well as quick debugging assistants.
    After the recordset is stored inside the variable, the `script component` can
    be used to access the data with either `C#` or `VB`.


    Figure 14-18 shows the editor of the `recordset destination`. The only editor
    for this component is the `Advanced Editor`. The `VariableName` property selects
    which `SSIS variable` will store the incoming data.


    The `Input Columns` tab is important as well because you need to identify the
    columns you wish to include in the variable. `SSIS` will not select all the columns
    by default. It will give you a warning until you specify the columns you require.
    This may sound cumbersome at first, but when used properly, it will prevent the
    variables from being bloated by unnecessary data.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-507_1.jpg)


    > *Figure 14-18. Advanced Editor for Recordset Destination*


    ## Summary


    `SQL Server Integration Services 12` offers the capabilities to access data that
    is stored in many forms. Using the different providers, you can extract your data
    from a wide range of `RDBMSs` or flat files. The providers also allow you to insert
    the data in just about any storage form. This chapter introduced you to the methods
    of storage that `SSIS` can extract from and load. The next chapter dives into
    optimizing and tuning your data flows.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


