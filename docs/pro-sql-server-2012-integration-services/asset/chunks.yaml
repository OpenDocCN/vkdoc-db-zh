    **Analysis Services 处理**任务的**常规**页（如图 5-9 所示）非常直观。它允许你重命名可执行文件并为任务提供简短描述。`名称`和`描述`属性将自动反映在设计器或属性窗口中提供的值。只有`名称`属性可在设计器窗口中修改。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-122_1.jpg)


    *图 5-9. Analysis Services 处理任务编辑器—常规页*


    > **注意：** 从现在起，除非可访问的属性除了简单的`名称`和`描述`外还包括其他属性，否则我们将不再展示任务编辑器的常规页。


    ## Analysis Services 处理任务编辑器—处理设置页


    **Analysis Services 处理**任务的**处理设置**页（如图 5-10 所示）允许你指定连接到 Analysis Services 数据库的连接管理器以及你需要处理的对象。它还使你能够精确配置每个对象的处理方式。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-123_1.jpg)


    *图 5-10. Analysis Services 处理任务编辑器—处理设置页*


    `Analysis Services 连接管理器`下拉列表提供了包中所有现有的 Analysis Services 连接管理器。如果包中尚不存在连接管理器，`新建`按钮允许你创建一个。**对象列表**部分显示了设置为由该任务处理的所有对象。


    示例如下：

    *   `对象名称`指定要处理的对象的名称。

    *   `类型`显示对象的类型。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `处理选项`包含一个处理选项的下拉列表，其中包括`处理默认值`、`完全处理`、`取消处理`、`处理数据`、`处理索引`和`处理更新`。

    `处理默认值`、`完全处理`和`取消处理`是唯一对所有对象类型都可用的选项。`处理默认值`仅执行初始化对象所必需的任务。引擎会分析对象的状态以确定要使用的最佳选项。`完全处理`会删除并重建对象，并在处理对象时更新元数据。`取消处理`对象包含的所有数据。只有维度、多维数据集、度量值组和分区可以使用`处理数据`和`处理索引`选项。`处理数据`将数据加载到对象中，但不构建索引或聚合。`处理索引`仅重建索引和聚合，而不修改现有数据。`处理更新`仅对维度可用。它对维度数据执行插入、更新和删除操作。


    `设置`提供对象的处理设置。


    `添加`按钮允许你将数据库中的对象添加到**对象列表**。`删除`按钮将它们从列表中删除。`影响分析`按钮显示处理选定对象所影响的所有对象。当任务执行分析时，它会考虑所选的处理选项。影响分析提供了其自身的受影响对象的**对象列表**，如下所示：

    *   `对象名称`标识受已定义对象处理影响的对象。

    *   `类型`显示受影响对象的类型。

    *   `影响类型`显示处理选定对象的影响。显示以下影响：`对象将被清除(未处理)`、`对象将无效`、`聚合将被删除`、`灵活聚合将被删除`、`索引将被删除`和`非子对象将被处理`。除`对象将无效`外，所有影响都会提供错误消息。其余的仅是警告。

    *   `处理对象`是一个复选框，允许你将此对象添加到处理对象列表中。


    `更改设置`按钮打开如图 5-11 所示的对话框。它允许你更改**处理设置**页上显示的所有设置。'
- fmt: '# CHAPTER 5 CONTROL FLOW BASICS


    ![Figure 5-11](index-125_1.jpg)


    **Figure 5-11. Processing Options tab of the Change Settings dialog box**


    In this dialog box, the radio buttons for `Processing Order` allow you to choose
    between processing the objects together or sequentially. When you are processing
    the objects together, you can either let the server decide the number of objects
    it can concurrently process or you can pick a number from the drop-down list.
    The numbers range from 1 to 128, doubling at each interval. When you process sequentially,
    you can choose to process the data as one transaction or many transactions, even
    the dependent objects.


    The `Writeback Table Option` list allows you to choose the handling of the writeback
    table. This option is meant to record changes that occur to the data in the cube
    as it is being processed. There are three options available for writeback tables:


    - `Create` creates a writeback table if it does not already exist, throwing an
    error if it already exists.

    - `Create Always` creates a writeback table if it does not exist, or overwrites
    it if it does exist.

    - `Use Existing` uses the writeback table that already exists, throwing an error
    if it does not exist.


    ![Figure 5-12](index-126_1.jpg)


    The `Affected Objects` section allows you to process the affected objects through
    a check box. This goes hand in hand with the Object list displayed by the `Impact
    Analysis` button.


    ## Dimension Key Errors Tab


    ![Figure 5-12](index-127_1.jpg)


    **Figure 5-12. Dimension Key Errors tab of the Change Settings dialog box**


    The `Dimension Key Errors` tab allows you to change the processing operation’s
    error configuration. The `Use Default Error Configuration` option will use the
    server’s error configuration while processing. We recommend that you do not configure
    your own settings for processing unless there is a specific need to do so. Modifying
    this property may result in different outcomes than from processing a cube using
    an SSIS package than processing a cube through management studio.


    The custom error configurations are divided into sections of possible errors and
    options for handling them. The different sections are as follows:


    `Key Error Action` allows you to handle a new key that cannot be referenced from
    the appropriate dimension. The two options to handle this error are `Convert to
    Unknown` and `Discard Record`. `Convert to Unknown` attributes all the data associated
    with this key to the unknown grouping. This functionality is similar to `COALESCE()`
    or `ISNULL()` in SQL. The second option, `Discard Record`, completely eliminates
    all data associated with this record in the object.


    `Ignore Error Count` enables you to ignore errors entirely while processing.


    `Stop on Error` allows you to define the number of errors that the task can tolerate
    as well as the action to take after the tolerance is reached. The `Number of Errors`
    field specifies the number of errors that the task will support. `On Error Action`
    gives you two options in case the number of errors is exceeded, `Stop Processing`
    and `Stop Logging`. `Stop Processing` terminates the processing of the objects.
    `Stop Logging` stops logging errors but continues to process the data.


    `Specific Error Conditions` gives you the flexibility to handle certain errors.
    The options to handle each scenario are `Ignore Error`, `Report and Continue`,
    and `Report and Stop`. `Ignore Error` simply continues without taking any action.
    `Report and Continue` reports the error but continues processing. `Report and
    Stop` reports the error and stops processing.


    The different conditions that cause errors while processing are `Key Not Found`,
    `Duplicate Key`, `Null Key Converted to Unknown`, and `Null Key Not Allowed`.
    The `Key Not Found` error indicates that a key was not found in the referenced
    data, usually a dimension. The `Duplicate Key` error is thrown when the same key
    references multiple attributes.'
