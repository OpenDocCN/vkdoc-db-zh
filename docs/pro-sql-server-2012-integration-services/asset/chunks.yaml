    );


    GO


    We created two procedures for package auditing:StartAuditPackage to start the
    audit process, and EndAuditPackage to end the audit. The start procedure returns
    a unique package audit ID number after each call. That same audit ID number is
    passed into the end procedure to complete the audit entry. The code is as follows:


    IF OBJECT_ID(''Audit.StartAuditPackage'') IS NOT NULL


    DROP PROCEDURE Audit.StartAuditPackage;


    GO


    CREATE PROCEDURE Audit.StartAuditPackage @ExecutionInstanceGUID UNIQUEIDENTIFIER,


    @ProductVersion NVARCHAR(20),


    @MachineName NVARCHAR(128),


    @VersionMajor INT,


    @VersionMinor INT,


    @VersionBuild INT,


    @LocaleID INT,


    @PackageName NVARCHAR(128),


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13  LOGGING AND AUDITING


    @BatchID BIGINT,


    @AuditPackageID BIGINT OUTPUT


    AS


    BEGIN


    SET NOCOUNT ON;


    INSERT INTO Audit.AuditPackage


    (


    PackageName,


    BatchID,


    ExecutionInstanceGUID,


    ProductVersion,


    MachineName,


    VersionMajor,


    VersionMinor,


    VersionBuild,


    LocaleID,


    PackageStartTime


    )


    VALUES


    (


    @PackageName,


    @BatchID,


    @ExecutionInstanceGUID,


    @ProductVersion,


    @MachineName,


    @VersionMajor,


    @VersionMinor,


    @VersionBuild,


    @LocaleID,


    SYSDATETIMEOFFSET()


    );


    SET @AuditPackageID = SCOPE_IDENTITY();


    END;


    GO


    IF OBJECT_ID(''Audit.EndAuditPackage'') IS NOT NULL


    DROP PROCEDURE Audit.EndAuditPackage;


    GO


    CREATE PROCEDURE Audit.EndAuditPackage @AuditPackageID BIGINT


    AS


    BEGIN


