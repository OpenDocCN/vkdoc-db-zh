  trans: '# 执行 SQL 任务


    ## 通用页面


    执行 SQL 任务可用于在数据加载前截断表，或在数据加载后创建约束以验证数据完整性（DDL 语句）。执行 SQL 任务也可用于检索数据并将其存储在 SSIS
    变量中（DML 语句）。检索到的数据可以是单行数据，也可以是表格数据集。通过“执行 SQL 任务编辑器”，您可以设置该可执行文件以执行不同的功能。图 5-4
    展示了“执行 SQL 任务编辑器”的通用页面。


    *图 5-4. 执行 SQL 任务编辑器——通用页面*


    以下列表讨论了通用页面上的一些关键属性：


    -   `名称` 是任务在控制流中的唯一标识符。同一类型的两个任务不能拥有相同的名称。此名称是控制流设计器中显示的标签。

    -   `描述` 是一个文本字段，用于简要说明任务在包中的功能。修改此属性不是必须的，但可以帮助不熟悉该包的人员更容易地理解流程。

    -   `连接` 是一个必需的属性，默认为空。此值应指示应针对哪个连接管理器执行 SQL 语句。

    -   `结果集` 允许您定义查询将返回的结果类型。结果集有四种类型：单行、完整结果集、XML 或 无。“单行”可用于单个标量值或仅返回一行的表格数据集。“完整结果集”选项允许您将表格数据存储在
    SSIS 对象类型变量中。如果 SQL 语句中定义了 `ORDER BY` 子句，变量将按排序列表维护数据。XML 结果集允许您将 XML 数据存储在变量中。“无”表示不返回结果集。SQL
    语句的成功执行会返回指示此类情况的值。可在编辑器的“结果集”页面中将结果集映射到相应的变量。

    -   `连接类型` 表示您将用于连接到数据库的连接管理器类型。

    -   `连接管理器` 是将允许您连接到数据库的连接管理器的名称。

    -   `SQL 源类型` 定义了向执行 SQL 任务传递 SQL 语句的方法。选项包括：直接输入、文件连接和变量。“直接输入”允许您将 SQL 语句直接键入
    `SQL 语句` 文本字段。“文件连接”选项允许您指定一个包含要执行的查询的特定文件。“变量”允许您将查询分配给字符串变量并将其传递给任务。

    -   `SQL 语句` 包含要在指定数据库上执行的 SQL 语句。仅当选择“直接输入”作为查询源类型时，此字段才会出现。

    -   `文件连接` 允许您选择一个连接管理器作为 SQL 语句的源。仅当使用“文件连接”作为源类型时，此选项才可用。

    -   `源变量` 是可以存储 SQL 语句的变量列表。仅当选择“变量”作为源类型时，此下拉列表才可用。

    -   `SQL 语句` 包含需要执行的 DDL、DML 或 DAL 语句。当您修改语句时，会打开一个文本编辑器，您可以在其中键入语句。如果没有文本编辑器，您将无法将
    `GO` 放在新的一行，因此在执行包时会出现错误。


    `注意：` 为了执行 DDL 和数据控制语言（DCL）语句，您需要确保使用的凭据具有适当的权限。如果您有多个语句，则只允许第一个语句返回结果集。


    `注意：` 如果您打算在单个执行 SQL 任务中执行多个语句，我们建议使用分号 (`;`) 作为语句终止符。在语句末尾，您可以在文本编辑器中将 `GO` 批处理指令添加到新的一行。在设置结果集时，请确保返回结果集的查询是
    `SQL 语句` 字段中的最后一个查询。


    底部的 `浏览` 按钮允许您将查询从文件导入到 `SQL 语句` 字段。它将打开一个 Windows 资源管理器窗口，帮助导航到所需文件。`生成查询` 按钮打开一个图形化工具，帮助您构建查询。此选项仅适用于“直接输入”源类型。`解析查询`
    按钮用于验证已定义 SQL 查询的语法。


    ## 参数映射页面


    参数允许您将变量传递给要执行的 SQL 查询。根据 SQL 连接的不同，参数使用不同的标记和名称进行映射。表 5-1 显示了不同的标记、与标记关联的名称以及每种连接的示例查询。图
    5-5 中的参数映射页面演示了如何对 SQL 语句进行参数化。


    *表 5-1. 参数标记和名称*


    | **连接** | **参数标记** | **参数名称** | **示例** |

    | :--- | :--- | :--- | :--- |

    | ADO | `?` | `Param1`, `Param2`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME FROM
    INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA,
    t.TABLE_NAME;` |

    | ADO.NET | `@<ParamName>` | `@<ParamName>` | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME
    FROM INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = @tableSchema ORDER BY
    t.TABLE_SCHEMA, t.TABLE_NAME;` |

    | ODBC | `?` | `1`, `2`, `3`, `4`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME FROM
    INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA,
    t.TABLE_NAME;` |

    | Excel, OLE DB | `?` | `0`, `1`, `2`, `3`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME
    FROM INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA,
    t.TABLE_NAME;` |


    *图 5-5. 执行 SQL 任务编辑器——参数映射页面*


    可以在整个查询中使用多个标记。ADO、ODBC、Excel 和 OLE DB 连接的标记是问号 (`?`)。ADO 和 ODBC 的枚举器从 1 开始。但是，参数必须以
    `Param` 为前缀加上序数位置来命名。Excel 和 OLE DB 连接的枚举器从 0 开始。ADO.NET 连接是唯一使用限定符 (`@`) 和名称组合进行参数映射的连接类型。同一个变量可以多次传递给同一条
    SQL 语句。


    要为 SQL 语句中的参数添加映射，您需要单击参数映射页面上的 `添加` 按钮。映射页面上的列指定了每个映射的所有详细信息。`删除` 按钮仅用于移除选定的映射。属性如下：


    -   `变量名称` 提供了将传递给 SQL 语句中参数的特定变量。变量的命名空间很重要，因为它允许多个变量拥有相同的名称。

    -   `方向` 指示变量是输入参数、输出参数还是返回代码。

    -   `数据类型` 为参数分配数据类型。它不会自动使用为 SSIS 变量定义的数据类型。下拉列表列出了 SSIS 可用的所有数据类型。

    -   `参数名称` 给参数一个名称。根据连接类型，您必须适当地命名参数，并确保查询中标记的序数位置与名称相符。在使用某些连接类型时，此列的序数位置起着重要作用。

    -   `参数大小` 定义了可变长度数据类型的大小。这允许'
- fmt: 'the provider to allocate the appropriate space for the parameter value.


    ## Execute SQL Task Editor—Result Set Page


    For SQL statements whose results need to be accessed by SSIS, we can assign those
    result sets to SSIS variables. One of the most frequently used result set types
    is the `Full result set`. This allows you to store the whole result, with a sort
    order if specified in the SQL statement, directly in a variable whose data type
    is defined as `object`. This `object` can be accessed by a `Foreach Loop` container
    to be used as the enumerator, by `Script` tasks in the control flow, or by a `Data
    Flow` task, depending on the scope of the variable. Figure 5-6 demonstrates defining
    the mapping for a result set of a query.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-119_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    `Figure 5-6. Execute SQL Task Editor—Result Set page`


    To assign values from the query to variables, you need to know the ordinal position
    or name of each column if the result set is a `Single row`; otherwise set the
    `Result Name` to `0`. To add this assignment, you need to use the `Add` button.
    The results for a `Full result set` will automatically define the columns in the
    `object`. For `Single row` results, you need to make sure that the data type for
    each column is compatible with the mapped SSIS variable.


    ## Execute SQL Task Editor—Expressions Page


    The `Expressions` page allows you to define expressions that can change the value
    of the component’s properties. Multiple expressions can be defined for each component.
    Chapter 9 covers expressions further. Figure 5-7 demonstrates the `Expressions`
    page of the `Execute SQL Task Editor`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-120_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    `Figure 5-7. Execute SQL Task Editor—Expressions page`


    **NOTE:** Henceforth, we will not display the `Expressions` page of task editors.
    Each of the properties that are accessible to the expressions may be unique to
    the particular task type, but there will be some overlap including `Name` and
    `Description`.


    ## Common Tasks


    The `Common` grouping in the `SSIS Toolbox` contains some of the more commonly
    used tasks. These tasks perform operations that mainly support the ETL nonfunctional
    requirements. They can vary in operations such as preparing files for the ETL
    process to sending e-mails as a part of the package execution.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-121_1.jpg)


    CHAPTER 5  CONTROL FLOW BASICS


    ### Analysis Services Processing Task


    The `Analysis Services Processing task` allows you to process SQL Server Analysis
    Services (SSAS) objects. The objects include cubes, dimensions, and data-mining
    models. Figure 5-8 demonstrates the object as it appears in the control flow.
    This particular example shows the error message returned when a task is not connected
    to a cube. When you create an `Analysis Services Processing task`, you must point
    it to an SSAS database and add the objects you need to process. Without the objects
    added to the list, you will receive an error message.


    `Figure 5-8. Analysis Services Processing task`


    The icon for this task is a stack of cubes, with one cube alone on the outside.
    The cubes represent the SSAS database objects, specifically cubes. The single
    cube represents the measures as they can be sliced and diced by the different
    dimensions.


    The objects added will be executed in a batch. The batch itself can be processed
    sequentially or in parallel. Generally, parallel processing will speed up the
    overall processing time. You have the option to define the number of objects that
    can be processed simultaneously, or you can let the task determine the objects.
    The dimensions are usually processed prior to the facts in order to prevent any
    missing key errors. The workaround for this is to allow processing to continue
    even with errors. It is a best practice to not ignore errors when processing a
    cube.


    ### Analysis Services Processing Task Editor—General Page'
