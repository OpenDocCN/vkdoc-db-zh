    \ 循环容器”和“脚本任务”中使用转换来访问变量。此示例的最终结果是显示一个消息框，重复显示一个字符串，直到`Foreach 循环容器`遍历完所有记录。第二个示例的主要目的是展示生成和执行动态\
    \ SQL 的实现。这是通过使用“执行 SQL 任务”检索一组字符串来帮助创建不同的 SQL 语句，使用“脚本任务”将字符串连接成可执行 SQL，以及使用最后的“执行\
    \ SQL 任务”执行存储在该字符串中的查询来完成的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-343_1.jpg)\n\n*图 9-12. `CH09_Apress_ChildPackage.dtsx` 控制流设计器窗口*\n\
    \n## 参数化查询\n\nSSIS 允许我们使用变量的另一个绝佳方式是对“数据流任务”中的源查询进行参数化。为了参数化查询，你需要将“数据访问模式”设置为“SQL\
    \ 命令”。清单 9-1 展示了我们在源组件`SRC_GetPre20CtStates`内部使用的查询。\n\n*清单 9-1. 参数化源查询*\n```sql\n\
    SELECT DISTINCT\n    Name,\n    Abbreviation,\n    Capital,\n    Flag,\n    Date,\n\
    \    Fact,\n    Long,\n    Lat\nFROM dbo.State s\nWHERE YEAR(s.Date) < ? ;\n```\n\
    \n问号是用来标记参数位置的限定符。我们建议将所有必需的参数放在同一区域，这样阅读和维护 SQL 就不会变成噩梦。为了将正确的变量值映射到这个限定符，我们必须使用源编辑器上的“参数”按钮。图\
    \ 9-13 展示了我们的参数映射配置。我们使用了`Extract::StateYearFilter`变量来限制传入的数据。`Parameter0`这个名称是预先确定的，因为我们使用的是\
    \ OLE DB 源组件。\n\n有关不同提供程序所需的参数命名约定的更多信息，请参阅第 7 章。\n\n*图 9-13. `SRC_GetPre20CtStates`的“设置查询参数”对话框*\n\
    \n> **注意：** 我们为`Extract::StateYearFilter`变量提供了一个默认值。该值可以通过使用“脚本任务”并将其列在`ReadWriteVariables`字段后，使用赋值语句进行修改。\n\
    \n## 派生列转换\n\n在数据开始在管道中流动后，SSIS 允许你使用“派生列”转换来访问存储在变量中的值。相同的功能可以通过使用与前面所示类似代码的“脚本任务”转换来使用。对于数据流的这个特定部分，我们希望能够用默认值替换\
    \ null 值，并将此转换作为新列添加到管道中。为了实现这个需求，我们使用了表达式 `ISNULL( [Date] ) ? @[Transform::StateAcceptanceTime]\
    \ : (DT_DATE) [Date]`。图 9-14 演示了“派生列”转换如何自动从类型转换中读取数据类型信息。我们将在本章后面更深入地讨论类型转换。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-345_1.jpg)\n\
    \n`ISNULL()`函数返回一个类似于 SQL Server 函数的布尔值。如果条件计算结果为`True`，我们提供`Transform::StateAcceptanceTime`的值。否则，我们保留原始日期。唯一的区别是此列包含时间戳信息。\n\
    \n*图 9-14. 用于替换缺失数据的派生列*\n\n> **注意：** 因为我们在源 SQL 查询的`WHERE`子句中使用了等于运算符，所以`ISNULL([Date])`条件将始终返回`False`。如果初始查询中没有该条件，`ISNULL([Date])`可能返回`True`。\n\
    \n## 条件性拆分\n\nSSIS 提供了“条件性拆分”转换，可以将数据重定向到多个流。在最简单的情况下，它可以充当`WHERE`子句，在更复杂的情况下，它可以充当`CASE`语句。对于我们的示例，我们有一个非常简单的标准：我们只想加载首府位于俄克拉荷马城以北的州。我们将俄克拉荷马城的纬度值设置为`Transform::StateCapitalFilter`的默认值。有了这个值，我们在图\
    \ 9-15 所示的条件性拆分中使用表达式 `Lat > @[Load::StateCapitalFilter]` 来仅传递所需的记录。因为纬度值随着我们接近北极而增加，所以使用“大于”比较运算符来确定记录是否应通过。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-346_1.jpg)\n\
    \n*图 9-15. 基于变量值排除值的条件性拆分*\n\n## 记录集目标\n"
- fmt: "# CHAPTER 9 – VARIABLES, PARAMETERS, AND EXPRESSIONS\n\n## Recordset Destination\n\
    \nAfter we perform all the transformations that are required, we need to store\
    \ the data somewhere. The recordset destination allows us to load the data into\
    \ an `Object` data type variable. This functionality works similarly to the `Execute\
    \ SQL` task storing a `Full result set` output in a variable. Figure 9-16 shows\
    \ the recordset destination configuration that is required to load the data into\
    \ a variable. The essential part is to determine which variable to use.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-347_1.jpg)\n\n*Figure 9-16. Configuration of the recordset destination*\n\
    \n> **NOTE:** Reusing object variables for storing data will cause them to be\
    \ cleared before they are loaded with the new data. Object variables do not append\
    \ data after they are loaded. This can allow you to reuse the same variable for\
    \ various datasets, but we do not recommend this approach because you will start\
    \ to lose track of the tabular structure of the variable. Each load can add or\
    \ remove columns, making the reuse of the variable a development pitfall. It is\
    \ pretty easy to lose track of the column mappings in the objects, especially\
    \ with entities that have numerous columns. Changing the structure several times\
    \ will create an even greater complexity. This becomes especially noticeable if\
    \ you use the object as the iterator in multiple `Foreach Loop` containers. You\
    \ need to go back and forth to make sure that you are mapping the results in the\
    \ proper order based on how the latest dataset was loaded.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-348_1.jpg)\n\nAfter the variable is chosen as the destination, we\
    \ need to specify the columns we will need to access. Figure 9-17 shows the column\
    \ mapping that we can pass to a `Foreach Loop` container as we iterate through\
    \ the object. After we have the dataset in the variable, the `Foreach Loop` container\
    \ can read the values and assign them to other variables whose purpose is to hold\
    \ the value during that iteration.\n\nThis is very similar to the functionality\
    \ provided by a cursor in SQL Server.\n\n*Figure 9-17. Recordset destination—column\
    \ mapping*\n\n## Foreach Loop Containers\n\n`Foreach Loop` containers within SSIS\
    \ can utilize `Object` data type variables as their iterators. In order to load\
    \ the data, we need to first load data into the variable we intend to use. We\
    \ demonstrated loading the data by using the recordset destination. As Figure\
    \ 9-18 demonstrates, the `Foreach Loop` container utilizes the `Foreach ADO` enumerator\
    \ as its iterator. We specified the `Load::States` variable as the enumerator\
    \ because we populated it with the `States` dataset.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-349_1.jpg)\n\n*Figure 9-18. Foreach Loop container—Collections page*\n\
    \nAfter the enumerator has been defined, we need to ensure that every column that\
    \ is populated in the object is mapped to a variable. As the container loops through\
    \ the object, the `Foreach Loop` container will assign the data value in each\
    \ column to a variable. Skipping mappings will result in SSIS throwing unfriendly\
    \ error messages. The container will automatically assign the index value shown\
    \ in Figure 9-19, so we recommend mapping the variables in the same order as the\
    \ columns are mapped to the enumerator variable.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-350_1.jpg)\n\n*Figure 9-19. Foreach Loop container—Variable Mappings\
    \ page*\n\n## Script Tasks\n\nOne of the easiest ways to access variables is by\
    \ using the SSIS `Script` tasks in either the control flow or the data flow. In\
    \ our sample package, `CH09_Apress_ChildPackage.dstx`, we will use the `Script`\
    \ task at the control-flow level to display a string in a message box. Figure\
    \ 9-20 demonstrates the ability to specify the access mode of the variables in\
    \ a `Script` task. In our case, we only want to be able to read the value of the\
    \ `System::PackageName` variable. Because we will not be modifying any existing\
    \ variable values, we leave the `ReadWriteVariables` field empty.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-351_1.jpg)\n\n*Figure 9-20. Configuration of SCR_DisplayPackageName*\n\
    \nUsing Visual C#, we can access only the variables listed in the configuration\
    \ shown in Figure 9-20.\n\nThe code goes directly into the main method of the\
    \ script. Listing 9-2 demonstrates the C# that we used to access the value of\
    \ the variable and display it in a message box at runtime. The section highlighted\
    \ in bold allows the `Script` task to access the variables collection in `Dts`.\
    \ After we extract the value, we can manipulate it in any manner we need. The\
    \ quotes around the fully qualified variable name are necessary to properly identify\
    \ the variable. The variable is case sensitive, so the code needs to be very precise.\n\
    \n*Listing 9-2. Variable Accessor Script*\n\n```csharp\nMessageBox.Show(\"The\
    \ name current state's name is: \" +\n    Dts.Variables[\"Audit::StateName\"].Value.ToString()+\"\
    \\n\"+\n    \"Its abbreviation is: \" + Dts.Variables[\"Audit::Abbreviation\"\
    ].Value.ToString() + \"\\n\" +\n    \"A fact about this state: \" + Dts.Variables[\"\
    Audit::Fact\"].Value.ToString() + \"\\n\" +\n    \"The state capital is: \" +\
    \ Dts.Variables[\"Audit::Capital\"].Value.ToString() + \"\\n\" +\n    \"The capital\
    \ is located at: (\" + Dts.Variables[\"Audit::Lat\"].Value.ToString() + \", \"\
    \ +\n    Dts.Variables[\"Audit::Long\"].Value.ToString() + \").\" + \"\\n\" +\n\
    \    \"The state was accepted at: \"+Dts.Variables[\"Audit::StateAcceptanceTime1\"\
    ].Value.ToString());\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-352_1.jpg)\n\nWith the Listing 9-2 code, when we execute the package,\
    \ we receive a small message box. The code concatenates the values extracted from\
    \ the object variable into one string that is used to populate the message box.\
    \ Figure 9-21 shows the value that is concatenated by the code. The package will\
    \ not proceed until you close the message box. After the message box is closed,\
    \ the `Foreach Loop` will proceed to the next record in the enumerator and expose\
    \ its values in a similar message box.\n\n*Figure 9-21. Message box displaying\
    \ the package name derived from the system variable*\n\n## Execute SQL Task Result\
    \ Sets\n\nThe `Execute SQL` task allows you to store result sets directly from\
    \ the executed query. The query can return a scalar value, a one-column value\
