  trans: '

    本章介绍了 SSIS 数据流转换组件。我们讨论了同步与异步转换之间的区别，以及阻塞、非阻塞和部分阻塞转换。你了解了可以在数据流中应用的各个转换，包括每个转换可用的各种设置，并附有示例。下一章将介绍
    SSIS 变量和 SSIS 表达式语言。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 9 章

    ## 变量、参数与表达式


    > 老话是最好的，简短的老话更佳。

    > ——温斯顿·丘吉尔 首相


    为了创建模块化和健壮的解决方案，开发人员通常会创建变量和访问这些变量的例程。集成服务在这方面也不例外。SSIS 中可用的变量拥有自己的数据类型，这些类型通常与
    SQL Server 数据类型相关联。参数用于在父包和子包之间传递值，以扩展 ETL 项目的模块化。此外，还提供了一种表达式语言，允许 ETL 过程在运行时读取或修改这两者的值。表达式语言当然可能变得很复杂，因此建议你铭记丘吉尔的话，保持逻辑尽可能简洁、可读且易于修改。


    变量通过允许你评估条件、修改数据流中的数据、参数化 SQL 以及许多其他选项，为运行包提供了灵活性。根据其数据类型，这些变量可用于存储标量值或表值。标量值对于参数化
    SQL 很有用，而表值则可以控制循环容器。本章涵盖了 SSIS 变量可以具有的数据类型，并展示了它们在运行时如何与包进行交互。


    ### 什么是变量与表达式？


    *变量* 用于存储 SSIS 可执行文件在运行时可以访问的值。某些数据类型的变量可以在设计时提供默认值，但它们真正在运行时发挥作用。变量有两种：系统变量和用户定义变量。


    *系统变量* 捕获包在运行时的状态。它们由 SSIS 定义，在某些情况下会自动更新。你既不能修改系统变量的值，也不能定义任何系统变量。但是，你可以访问系统变量的值，例如
    `System::StartTime`，以便为跟踪过程存储执行信息。`System::` 表示变量所属的命名空间；我们将在本章后面介绍命名空间。在 SSIS
    中，变量名区分大小写。


    *用户定义变量* 非常有用，因为它们可以通过使流程模块化来扩展 SSIS 的功能。定义为 `String` 和 `Date` 等数据类型的标量变量可用于参数化
    `Execute SQL 任务` 和源查询。定义为 `Object` 数据类型的表变量可用于控制循环容器，并允许脚本组件访问数据。你可以创建用户定义变量，并可以定义各个组件对这些变量的访问级别（只读或读/写）。要将变量添加到包中，可以使用
    `变量` 窗口。右键单击包的控制流并选择 `变量` 选项即可打开该窗口，如图 9-1 所示。另一种方法是使用 `视图` 菜单选择 `其他窗口` ➤ `变量`。


    ![图 9-1. Visual Studio 中的变量窗口](img/index-326_1.jpg)


    *表达式* 在 SSIS 中用于根据条件的评估返回一个值。表达式语言本身由标识符、字面量、函数和运算符组成。一些表达式可以编写为给变量赋值、返回计算结果，或者用作条件语句。与大多数编程语言一样，表达式遵循严格的语法。该语法决定了标识符、字面量、函数和运算符的正确用法。为了帮助你编写表达式，SSIS
    提供了表达式求值器和生成器。图 9-2 显示了带有表达式求值器的表达式生成器。求值器将解析并验证表达式是否符合语法。表达式生成器可快速访问所有可用的变量、函数、类型转换和运算符。你可以单击并拖动所需项目从其各自的位置到表达式文本框中，以将其添加到表达式中。


    ![图 9-2. 表达式生成器](img/index-327_1.jpg)


    表达式

    ```

    GETDATE() > DATEADD( "Second", 2, @[System::StartTime] ) ? TRUE : FALSE

    ```

    评估为一个布尔值。它执行一个简单的检查，以确定自包开始执行以来是否已经过去了 2 秒。这个特定表达式使用 `? :` 语法来处理 `IF THEN` 语句。`DATEADD`
    函数允许我们调整检查的时间间隔。我们使用此表达式来修改控制流任务属性（如 `DelayValidation`）的值。此表达式只能设置为具有布尔定义的属性。


    > **注意：** 一旦包被打开用于设计时评估，系统变量就会存储值。例如，`System::StartTime` 变量将保留包最初打开时的时间戳。即使使用调试模式运行包，此值也不会更新。只有关闭并重新打开包时，它才会更新。


    ### 什么是参数？


    为了支持 SSIS 的新部署模型，此版本引入了参数。*参数* 基本上取代了使用配置来指定值的需要。参数可以在包级别或项目级别使用。


    *包级别参数* 对于父包-子包设计非常有用。它们允许你在父包之间传递特定值以配置子包。在将参数传递给子包之前，你需要创建包参数。包内的某些对象可以绑定到属性，这样当从父包继承值时，它会直接影响子包的属性。也可以创建绑定来映射到子包内存在的对象属性。


    图 9-3 展示了如何将参数绑定到包属性。你可以使用向导创建新参数，也可以使用项目参数，其值对项目中的所有包都可用。参数名区分大小写。我们将在本章后面讨论参数化包。所有的可执行文件、容器和事件处理器也可以被参数化。已创建的包参数可以绑定到包中每个这些对象的特定属性。连接管理器不能直接参数化，但诸如
    `ConnectionString` 之类的属性可以通过使用 `脚本任务` 和从父包继承值的变量来修改。


    ![图 9-3. 参数化一个包](img/index-329_1.jpg)

    '
