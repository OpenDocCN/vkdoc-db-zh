    ## Data Profiling Task Editor


    The General page of the Data Profiling Task Editor lets you choose destination
    options including the destination type, the destination connection manager, whether
    the destination should be overwritten if it exists already, and the source time-out
    (in seconds). Figure 12-4 shows the editor’s General page.


    ![Figure 12-4. General page of the Data Profiling Task Editor](index-429_1.jpg)


    On the Profile Requests page, you can choose and configure profile requests, each
    representing a specific type of analysis to perform and a set of statistics to
    collect about your source data. Figure 12-5 shows many of the types of profile
    requests that can be selected. Table 12-1 describes the profile requests you can
    choose. You’ll look at configuring individual data profile requests in the following
    sections.


    ![Figure 12-5. Profile Requests page of the Data Profiling Task Editor](index-430_1.jpg)


    ### Table 12-1. Data Profile Request Types


    | Profile Request | Description |

    | :--- | :--- |

    | Column Length Distribution Profile | Returns distinct lengths of string values
    in selected columns. This can help to quickly identify string data that is too
    long or too short for the columns containing it. |

    | Column Null Ratio Profile | Returns percentage of nulls in selected columns.
    This helps identify issues such as large numbers of unexpected missing data values.
    |

    | Column Pattern Profile | Returns a set of regular expressions that match a percentage
    of values in selected columns. This profile helps identify problems with string
    data formatting. |

    | Column Statistics Profile | Returns statistics such as minimum, maximum, mean,
    and standard deviation for selected columns. |

    | Column Value Distribution Profile | Returns all distinct values in selected
    columns and the percentage of times those values occur. |

    | Candidate Key Profile | Attempts to determine whether a column, or set of columns,
    is a candidate key for the selected table. |

    | Functional Dependency Profile | Attempts to determine the dependency relationship
    between the values in one column and those in another column (or set of columns).
    As an example, a given airport code should always be associated with a given state;
    the airport code is functionally dependent on the state. |

    | Value Inclusion Profile | Computes the union, or overlap, between the values
    of two columns or two sets of columns. This is useful for determining whether
    a foreign-key relationship can be established between the columns of two tables.
    |


    ## Data Profile Viewer


    After the Data Profiling task generates an XML output file, you can view the results
    by using a tool called the `Data Profile Viewer`, which is found in the SQL Server
    Integration Services folder on the Windows Start menu. Figure 12-6 shows the Data
    Profile Viewer on the Start menu.


    ![Figure 12-6. Data Profile Viewer on the Start menu](index-432_1.jpg)


    After you launch the `Data Profile Viewer`, you can open the XML file generated
    by the Data Profiling task by clicking the Open button and selecting the file,
    as shown in Figure 12-7.


    ![Figure 12-7. Opening the Data Profiling task output in the Data Profile Viewer](index-433_1.jpg)


    After you open the Data Profiling task output file in the `Data Profile Viewer`,
    you’ll see a list of all the profile requests you selected on the left side of
    the window. Clicking one of the profile requests displays the details on the right
    side of the window. You can click the detail rows on the right side to show even
    more detail. In Figure 12-8, we’ve selected the Candidate Key profile request
    and drilled into the details of the `EventId` column.


    ![Figure 12-8. Viewing the results of a Data Profiling task Candidate Key profile
    request](index-434_1.jpg)


    **TIP:** You’ll look at the results of the profile requests in the following sections.


    ### Column Length Distribution Profile


    The `Column Length Distribution profile` reports the distinct lengths of string
    values in the columns you select, and the percent of rows in the table that each
    length represents. As an example, US ZIP codes must be five to ten characters
    in length (ZIP+4, including the hyphen); any other string length for these data
    values may be considered invalid. When analyzing your data, you may find that
    some of your ZIP codes are the wrong length. After choosing the Column Length
    Distribution profile request, you can configure it as shown in Figure 12-9.


    ![Figure 12-9. Configuring the Column Length Distribution profile request](index-435_1.jpg)


    For the Column Length Distribution profile request, you need to configure the
    source connection manager and choose the table and columns you wish to profile.
    Choosing wildcard (`*`) as the column indicates that you want to use all the columns
    in the table (nonstring columns are ignored). You can also choose to ignore leading
    or trailing spaces in your data.


    **NOTE:** Every profile request is assigned a unique `RequestID`. You can rename
    the `RequestID` to suit your needs.


    After you run the Data Profiling task, the Column Length Distribution profile
    request generates a list of string-value columns. Selecting one of these columns
    shows you the distribution of string data lengths in that column. Clicking one
    of the lengths in the Length Distribution list shows the details, listing the
    values that match that length.


    In Figure 12-10, we’ve selected the `AccidentNumber` column, which has data in
    three lengths: 9 characters, 10 characters, and 11 characters. We then drilled
    into the 9-character values to see the rows containing these values. After viewing
    the column-length distributions, we can see that the `AccidentNumber` column generally
    holds 10-character lengths. The small percentage of 9-character and 11-character
    values may represent a data quality issue with the source data.


    ![Figure 12-10. Reviewing details of the Column Length Distribution profile](index-436_1.jpg)


    ### Column Null Ratio Profile


    The `Column Null Ratio profile` helps you identify columns that contain more (or
    fewer) nulls than expected. If you have a column for which you expect very few
    nulls, but discover a very large number of nulls, it could indicate a data quality
    issue (or it may mean that the assumptions about your data need to be changed).
    The Column Null Ratio profile is simple to configure. Like the Column Length Distribution
    profile request, you must choose an `ADO.NET Connection Manager`, a table or view,
    and the column you want to profile. Like the Column Null Ratio profile request,
    the Column Null Ratio request lets you choose (`*`) to profile all columns. In
    Figure 12-11, we’ve chosen to profile all columns in the `AviationData` table.


    ![Figure 12-11. Configuring the Column Null Ratio profile request](index-437_1.jpg)


    The results can be viewed in the `Data Profile Viewer`. In our example, we’ve
    focused on the `AircraftDamage` column, which contains no nulls, as shown in Figure
    12-12.


    ![Figure 12-12. Reviewing the results of the Column Null Ratio profile](index-438_1.jpg)'
