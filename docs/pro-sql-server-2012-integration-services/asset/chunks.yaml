    ## 记录集目标


    `SSIS 变量`通常可用于保存数据。在大多数情况下，这些数据采用标量值的形式，但在某些情况下需要一个`ADO.NET 内存记录集`。`SSIS 对象类型变量`可用于存储表格数据集，以便在循环容器中进行枚举，并与`脚本组件`结合提供附加功能，以及作为快速调试助手。记录集存储在变量中后，可以使用`脚本组件`通过`C#`或`VB`访问数据。


    图 14-18 展示了`记录集目标`的编辑器。此组件的唯一编辑器是`高级编辑器`。`VariableName`属性用于选择哪个`SSIS 变量`将存储传入的数据。


    `输入列`选项卡也很重要，因为你需要标识希望包含在变量中的列。`SSIS`默认不会选择所有列。在你指定所需列之前，它会一直给出警告。乍听之下这可能有些麻烦，但如果使用得当，它可以防止变量因不必要的数据而膨胀。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-507_1.jpg)


    > *图 14-18. 记录集目标的高级编辑器*


    ## 小结


    `SQL Server Integration Services 12`提供了访问以多种形式存储的数据的功能。使用不同的提供程序，你可以从各种`RDBMS`或平面文件中提取数据。这些提供程序还允许你将数据插入几乎任何形式的存储中。本章向你介绍了`SSIS`可以从中提取和加载数据的存储方法。下一章将深入探讨优化和调整你的数据流。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 15 章 - 数据流调优与优化


    *我感觉到有一种需要，对速度的需要。* ——演员汤姆·克鲁斯在《壮志凌云》中


    询问任意一组`IT 经理`，让他们列出`ETL`流程最重要的方面，十有八九会把*原始速度*放在首位。尽管原始吞吐量在任何`ETL`流程中都很重要，但这种“对速度的需求”必须与其他要求相平衡，例如与其他进程的资源争用；正确且一致的结果；以及解决方案的可维护性、可管理性和健壮性。


    当人们听说调整`数据流`时，通常会想到提高原始速度。处理速度固然重要，但唯速度论的观点是非常片面的。`ETL`速度慢通常只是症状而非病因。`ETL`缓慢的根本原因通常在于设计和实现。在本章中，你将专注于优化你的`数据流`，以消除那些以速度慢和资源消耗过大为症状的问题。


    ## 在数据库端限制行数


    当你将数据拉入`SSIS 数据流`时，特别是从`SQL Server`数据库（或其他关系型`DBMS`）拉取时，你可以通过简单地限制检索的行数来提高`ETL`处理速度。


    在`SQL Server`数据库或其他`RDBMS`上，这是通过向`SELECT`查询添加`WHERE`子句来实现的。


    例如，考虑一个简单的数据库表，它存储一家大型连锁百货商店的每日交易记录。该表具有如图 15-1 所示的设计。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-509_1.jpg)


    > *图 15-1. 销售交易表设计*

