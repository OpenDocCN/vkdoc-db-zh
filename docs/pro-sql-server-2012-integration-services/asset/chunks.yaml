    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    You can edit the Cache Connection Manager by clicking the Edit button to pull
    up the Connection Manager Editor. On the General tab of the editor, shown in Figure
    8-55, you can change the name of the connection manager and choose to use a file
    cache. If you choose to use a file cache, the connection manager will write cached
    data to a file. You can also use an existing cache file as a source instead of
    pulling data from an upstream source in the data flow.


    *Figure 8-55\. General tab of the Cache Connection Manager Editor*


    The Columns tab shows a list of the columns in the cache and their data types
    and related information. The Index Position column must be configured to reflect
    the columns you want to join in the lookup component. Columns that are not part
    of the index have an Index Position of 0; index columns should be numbered sequentially,
    beginning with 1. In our example, the LocationID column is the only index column,
    and is set to an Index Position of 1\. Figure 8-56 shows the Columns tab.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-307_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-56\. Columns tab of the Cache Connection Manager Editor*


    Our sample package demonstrating the Cache transformation expands on the previous
    example by performing a lookup against the Cache transformation, as shown in Figure
    8-57.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-308_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-57\. Data flow with Llokup against Cache transformation*


    The Lookup transformation against a cache is configured similarly to the lookup
    against an OLE DB


    source. The main differences are as follows:


     You must choose Full Cache mode. Partial Cache and No Cache are not valid


    options for lookups against a cache.


     The Connection type must be set to Cache Connection Manager.


     On the Connection tab of the Lookup transformation, you must choose a Cache


    Connection Manager instead of an OLE DB Connection Manager.


    On the Columns tab, you’ll also notice a magnifying glass icon in the Index column
    of the Available Lookup Columns box, as shown in Figure 8-58\. These columns are
    the columns you will map to your 308


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-309_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    input data. Other than these minor differences, the operation of the lookup against
    a Cache Connection Manager is exactly the same as against an OLE DB source.


    *Figure 8-58\. Columns tab of the Lookup transformation against a Cache Connection
    Manager* Conditional Split


    The Conditional Split transformation lets you redirect rows of data that meet
    specific conditions to different outputs. You can use this functionality as a
    tool to direct data down different processing paths, much like an if...then...else
    construct in procedural programming languages (such as C# or VB), or as a filter
    to eliminate data from your dataset, as with the SQL WHERE clause. We’ve expanded
    the previous example to filter out any games that did not occur during the regular
    season, as shown in Figure 8-59.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-310_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-59\. Adding a Conditional Split transformation to the data flow*


    The Conditional Split Transformation Editor gives you control to add as many outputs
    as you like to the transformation. Each output has rows redirected to it based
    on the condition you provide for it. The condition is written in the form of an
    SSIS Expression Language expression. Often you’ll use variables or columns in
    your conditions, to make your data self-directing. In this example, we’ve added
    one output to the transformation called Regular Season Games. The condition we
    applied to this output is


    [GameWeek] == “Regular Season”, refer to Figure 8-60 below. We discuss the SSIS
    Expression Language in Chapter 9.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-311_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-60\. Editing the Conditional Split transformation*


    When the GameWeek column contains the value Regular Season, data is redirected
    to the Regular Season Games output. Note that string comparisons in SSIS Expression
    Language are case-sensitive. Any rows that do not match this condition are directed
    to the default output, which we’ve named Post Season Games in this example.


    ■ **TIP:** When you define multiple outputs with conditions, they are evaluated
    in the order indicated by the Order field. As soon as a row matches a given condition,
    it is immediately redirected to the appropriate output, and no comparisons are
    made against subsequent conditions.


    When you connect the output of the Conditional Split transformation to the input
    of another data flow component, you’ll be presented with an Input Output Selection
    box. Choose which output you want to send to the next component, as shown in Figure
    8-61.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-312_1.jpg)


    ![](index-312_2.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-61\. Input Output Selection when connecting the Conditional Split transformation*
    We didn’t connect the Post Season Games output to any downstream components in
    this case, which means the rows directed to it won’t be sent down the data flow.
    This is effectively a filter on the input data.


    Multicast


    The Multicast transformation duplicates your data in the data flow, which comes
    in very handy in many situations where you want to apply different transformations
    to the same source data in parallel, or when you want to send your data to multiple
    destinations simultaneously. To build on the previous sample, we’ve added a Multicast
    transformation just before the OLE DB destination in our data flow.


    We’ll use the Multicast transformation to send the transformed data to two destinations:
    the OLE DB


    destination and a flat file destination, as shown in Figure 8-62.


    *Figure 8-62\. Multicast transformation sending data to multiple destinations*
    312


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-313_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    You can use the Multicast transformation to duplicate your data as many times
    as necessary, although it’s most often used to create one copy of its input data.


    Union All


    The Union All transformation combines the rows of two or more datasets into a
    single dataset, like the UNION ALL operator in SQL. For this sample, we’ve taken
    two flat files with daily weather data in them and combined them into a single
    dataset in the data flow, as shown in Figure 8-63.


    *Figure 8-63\. Combining data from two source files with the Union All transformation*
    When you add the first input to the Union All transformation, it defines the structure
    of the output dataset. When you connect the second and subsequent inputs to the
    Union All transformation, they are lined up, column by column, based on matching
    column names. You can view the columns from all the inputs by double-clicking
    the Union All transformation to reveal the editor, as shown in Figure 8-64.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-314_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-64\. Union All Transformation Editor*'
