- fmt: '# CHAPTER 9 – VARIABLES, PARAMETERS, AND EXPRESSIONS


    The final way to access variables is not exactly a single task or transformation
    but rather a property that appears in several tasks. This is the source type property
    that usually allows you to specify `Direct input`, `Variable`, or `File`. In our
    example for the profiling process, we use an Execute SQL task, `SQL_ExecuteSQL`,
    to execute a query stored within the variable, `Transform::StateQuery`. The process
    we use to modify this variable is covered in the following “Dynamic SQL” section.
    Figure 9-23 shows the configuration of the `SQL_ExecuteSQL` task that accesses
    the dynamically generated query.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-354_1.jpg)


    *Figure 9-23. SQL_ExecuteSQL sourcing Transform::StateQuery*


    ## Dynamic SQL


    In most of our examples, we have demonstrated only reading the variable values
    without actually modifying any values. One of the most frequent areas that require
    variable modification is in generating dynamic SQL queries. In SSIS, this process
    usually replaces cursors and runs a set of queries that can vary in number, but
    have some very important components that are similar in structure. As mentioned
    in the preceding section, we want to demonstrate a very basic data-profiling process.
    We already showed you how we retrieved our controller set by using the Execute
    SQL task to store the column names in the `Load::StateColumns` variable. We also
    showed you how we executed the resulting query by using the `SQLSourceType` option
    on a separate Execute SQL task. This section shows you how the variable’s value
    is set so that it becomes an executable query.


    The first step we need to take is to extract the name of each column as we iterate
    through all the columns. We implemented this by using a Foreach Loop container,
    `FELC_LoopThroughColumns`. Because `Load::StateColumns` has only one column, `Name`,
    the variable mappings are very simple, as we demonstrate in Figure 9-24. This
    configuration overwrites the value of `Load::StateColumnName` with every row in
    the object, one iteration at a time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-355_1.jpg)


    *Figure 9-24. FELC_LoopThroughColumns variable mappings*


    With the variable value changing with every row in the object, we can run some
    queries that can give some meaningful insight into the data. For our query, we
    chose to perform a distinct count on the values stored in each column in the `dbo.State`
    table. Options include loading the data into a table by using `INSERT INTO`. We
    included a sample value in the commented-out C# on the last line of the code sample.


    The Execute SQL task, `SQL_ExecuteSQL`, will run a query for every column name
    that is stored in the object. With this particular query, you can see how the
    values in each of your columns vary.


    ### Listing 9-4. StateQuery Assignment


    ```csharp

    Dts.Variables["Transform::StateQuery"].Value =

    "SELECT COUNT(DISTINCT " + Dts.Variables["Load::StateColumnName"].Value.ToString()

    + ") FROM dbo.State WITH (NOLOCK);";


    // SELECT COUNT(DISTINCT Name) FROM dbo.State WITH (NOLOCK);

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-356_1.jpg)


    ## Passing Variables


    One of the main difficulties with parent-child design patterns in prior versions
    of SSIS was the dependency of the child packages on the parent packages. At first
    glance this may not seem like an obstacle, but in some cases the dependency would
    make it very difficult to unit-test the child package on its own. With the introduction
    of parameters in this version of SSIS, this obstacle disappears. You essentially
    have the ability to define a default value for a parameter that under normal execution
    would be overwritten.


    We begin by adding a parameter to the child package, as shown earlier in Figure
    9-4. This will provide us with a parameter that can be accessed just like a variable
    in SSIS expressions and script components. We can provide a default if we are
    anticipating that the package may be executed on its own. With the parameter added,
    the parent package’s Execute Package task should automatically detect it. You
    can create a mapping that allows the parent value to overwrite the child value
    while configuring the other properties of the Execute Package task. The mapping
    in `CH09_Apress_ParentPackage.dtsx` is shown in Figure 9-25.


    *Figure 9-25. Execute Package task parameter bindings*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## SSIS Expression Language


    The SSIS Expression Language allows you to extend the functionality of your process
    to incorporate variables. The language contains a whole set of functions and operators
    that can be used to evaluate columns, variables, or expressions. The functions
    return different data type values. They are usually grouped by their input types
    in the Expression Builder. We already covered the casting functions in the “SSIS
    Data Types” section of this chapter. The function names are not case-sensitive,
    unlike most of the other identifiers in the expression language. We recommend
    that you use a distinct case when using functions in order to make the code a
    little easier to read.


    ### Functions


    Mathematical functions accept numeric values as their inputs to return numeric
    values after performing operations on them. The following are the mathematical
    functions available within SSIS:


    - `ABS(«numeric_expression»)` returns the absolute value of the input.

    - `CEILING(«numeric_expression»)` returns the smallest integer greater than or
    equal to the input.

    - `EXP(«numeric_expression»)` returns the exponent to base e of the input.

    - `FLOOR(«numeric_expression»)` returns the largest integer less than or equal
    to the input.

    - `LN(«numeric_expression»)` returns the natural logarithm of the input.

    - `LOG(«numeric_expression»)` returns the base-10 logarithm of the input.

    - `POWER(«numeric_expression», «power»)` returns the value of raising the first
    parameter to the power specified in the second parameter.

    - `ROUND(«numeric_expression», «length»)` returns the first input round to the
    length specified in the second parameter.

    - `SIGN(«numeric_expression»)` returns the positive, negative, or zero sign of
    the input.

    - `SQUARE(«numeric_expression»)` returns the value of the input raised to the
    second power.

    - `SQRT(«numeric_expression»)` returns the square root of the input.


    String functions evaluate character expressions. These are the string functions
    available in the Expression Builder:


    - `CODEPOINT(«character_expression»)` returns the Unicode value of the first character
    in the input.

    - `FINDSTRING(«character_expression», «string», «occurrence»)` returns the index
    of the occurrence of the specified string in the input. The index values start
    at 1.

    - `HEX(«integer_expression»)` returns a string hexadecimal value of the input.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    - `LEFT(«character_expression», «number»)` returns a string that consists of the
    specified number of characters at the beginning of the first parameter.

    - `LEN(«character_expression»)` returns the length of the input.

    - `LOWER(«character_expression»)` returns a string that consists of the lowercase
    characters of the input.

    - `LTRIM(«character_expression»)` returns a string stripped of the leading whitespaces
    from the input.

    - `REPLACE(«character_expression», «search_expression», «replace_expression»)`
    returns the character expression value after a string that has been replaced with
    another string or empty string within the original character expression.

    - `REPLICATE(«character_expression», «times»)` returns a string with the character
    expression repeated a specified number of times.'
