    \ 32 位运行时。\n\n### 图 7-30. 将 SSIS 项目设置为以 32 位模式运行\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-239_1.jpg)\n\n### 图 7-31. Excel 电子表格成功导入到 SQL Server 表\n\nExcel\
    \ 源适配器允许您将数据从 Excel 电子表格提取到数据流中，而 Excel 目标则允许您将数据流中的数据输出到 Excel 电子表格。为了演示，我们将从刚刚填充的数据库中提取\
    \ `Country` 表的内容，并将其输出到一个新的电子表格。\n\n我们将在 SSIS 包中添加一个新的 `Excel 连接管理器`，并将其指向一个新的、基本为空的工作簿。新工作簿将仅在第一行包含列名，如图\
