    # 第 18 章 - 构建健壮的解决方案


    ![图 18-5. 数据转换错误输出](img/index-561_1.jpg)


    将数据转换任务的错误流连接到平面文件目标，并将该目标命名为`Errors`。配置一个新的名为`Errors File`的`平面文件连接管理器`，以写入路径`C:\Robust\PeopleErrors.txt`，如图
    18-6 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 18-6. 平面文件连接管理器](img/index-562_1.jpg)


    为确保不会因为从转换到`Errors`文件目标的截断而引发错误，请选择`高级`配置，并确保`LastName`列设置为`Unicode String`，列宽为
    50，如图 18-7 所示。


    ### 注意

    根据需要调整目标的文件名，以确保路径有效。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 18-7. 高级目标编辑器](img/index-563_1.jpg)


    最后，将数据流从`转换 LastName`转换任务连接到`OLE DB`目标。打开目标编辑器，将名称更改为`People Table`，并选择`dbo.People`表作为目标表。在映射编辑器中，将`LastName`输入映射列更改为`转换后的
    LastName`列，如图 18-8 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 18-8. OLE DB 目标编辑器](img/index-564_1.jpg)


    最终的数据流窗格应类似于图 18-9。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 18-9. 数据流编辑器窗格](img/index-565_1.jpg)


    运行包时，数据流应显示有 19,971 行数据成功发送到`People Table`目标，一行数据发送到`Errors`平面文件目标。这样，`数据流`任务就不会因为单行数据的截断错误而失败，任务得以完成，该行数据仍可在平面文件目标中用于后续处理。


    虽然此错误无法在`数据流`任务内部处理，但重定向的行不仅包含原始数据，还在平面文件目标中包含了错误代码和错误列，这确实提供了一种在`数据流`任务外部进行动态处理的方法。


    通过整合各种包组件，仍然可以实现动态处理数据流错误的能力，尽管是在`数据流`任务外部。在`数据流`任务中，添加一个包级别的变量，并在`转换 LastName`数据转换和`错误计数`数据源之间使用一个`行计数`转换，这样就能利用`脚本`任务来后续评估错误平面文件。图
    18-10 显示了`数据流`任务内的各个任务。图 18-11 展示了控制流窗格，其中使用表达式作为优先级约束来评估变量`Error`是否大于 0。


    ### 提示

    确保重定向的行被发送到一个灵活的目标。创建一个与目标表模式相同的表，只会导致重定向的行再次因截断或约束错误而失败。除了失败的行之外，还可以将错误描述包含在一个额外的列中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 18-10. 数据流编辑器窗格](img/index-566_1.jpg)

    ![图 18-11. 控制流编辑器窗格](img/index-566_2.jpg)


    如图 18-11 所示，只有当`填充人员数据流`任务成功完成，并且`行计数`转换递增了`Error`变量时，脚本组件才会执行。


    以下代码展示了如何使用`脚本`任务，通过`TextFieldParser`类从文本文件解析重定向的错误行：


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ```vb

    Public Sub Main()

    ```

    '
- fmt: "# 构建健壮的解决方案\n\n```vb\nDim rdr As New TextFieldParser(\"C:\\Robust\\PeopleErrors.txt\"\
    )\n\nrdr.TextFieldType = FileIO.FieldType.Delimited\n\nrdr.SetDelimiters(\",\"\
    )\n\nDim row As String()\n\nWhile Not rdr.EndOfData\n\n    Try\n\n        row\
    \ = rdr.ReadFields()\n\n        MessageBox.Show(row(0).ToString)\n\n    Catch\
    \ ex As Microsoft.VisualBasic.FileIO.MalformedLineException\n\n        MsgBox(\"\
    Line \" & ex.Message & _\n\n        \"is not valid and will be skipped.\")\n\n\
    \    End Try\n\nEnd While\n\nDts.TaskResult = ScriptResults.Success\n\nEnd Sub\n\
    ```\n\n`MessageBox` 返回行字符串数组中错误编号的索引值，可用于识别具体原因。显然，要动态处理错误需要额外代码，但有了错误代码和描述（在后续的\
    \ Tip 中提供），可以包含一个 `VB.NET Select Case` 语句来遍历错误代码，并根据错误采取适当的操作。\n\n## 事件处理程序\n\n\
    事件处理程序提供了一种主动处理包和可执行文件上事件的方法，可用于为以下事件捕获任务特定信息：\n\n- `OnError`\n- `OnExecStatusChange`\n\
    - `OnExecution`\n- `OnPostExecute`\n- `OnPostValidate`\n- `OnPreExecute`\n- `OnPreValidate`\n\
    - `OnQueryCancel`\n- `OnTaskFailed`\n- `OnVariableValueChanged`\n- `OnWarning`\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`OnError` 事件处理程序可用于捕获错误描述和代码，然后这些信息可用于动态处理错误以及记录有关特定问题的更深入信息。\n\
    \n由于事件处理程序仅在可执行文件和包上可用，这排除了在数据流内部使用它们的可能性，但可以捕获数据流可执行文件的失败。为了使 `OnError` 事件处理程序能够被触发，数据流任务必须首先失败，这将清空缓冲区中的所有数据，使其无法用于后续调查。\n\
    \n在事件处理程序内处理错误信息，最简单的方法是通过脚本任务传入 `System:ErrorCode` 和 `System:ErrorDescription`\
    \ 作为只读变量。第 11 章概述了如何创建脚本任务来捕获错误信息，并演示了 `OnError` 事件从任务级别一直向上冒泡到包级别。显然，需要在脚本组件中纳入更复杂的逻辑类型，以主动处理特定错误。\n\
    \n上一节概述的包在数据流任务中使用了错误重定向，以防止错误出现并确保所有行都被定向到目标。如果不重定向行而创建相同的包，则可以使用 `OnError` 事件处理程序来捕获错误信息。在\
    \ `OnError` 事件中添加一个脚本任务，并将 `System:ErrorDescripton` 设置为 `ReadOnly` 变量，将允许捕获整个错误消息，并更深入地了解真正原因。使用以下\
    \ `VB.NET` 代码将显示数据流任务中发生的任何错误的消息：\n\n```vb\nMessageBox.Show(Dts.Variables(0).Value.ToString)\n\
    ```\n\n生成的消息框指定了截断错误以及受影响的具体列。错误重定向和 `OnError` 事件处理程序之间的主要区别在于，如果使用了错误重定向，则不会引发\
    \ `OnError` 事件处理程序。在前面的示例中，数据流任务在截断错误发生后停止，并且失败的行信息将不会被存储以供后续评估。\n\n`TIP:` SSIS\
    \ 错误消息和编号概述在 http://msdn.microsoft.com/en-us/library/ms345164.aspx。\n\n## 动态性\n\
    \n从 SSIS 2005 开始，配置使包更具可移植性，并可以轻松地将包导入到 SQL 的多个实例中，而无需创建多个包或专门为环境配置包。在 SSIS 2012\
    \ 中，随着参数的引入，这一功能得到了进一步优化。"
