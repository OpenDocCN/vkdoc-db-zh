- fmt: "## CHAPTER 4 - CONNECTION MANAGERS\n\nThe Send Mail task utilizes this connection\
    \ manager to send e-mails when certain conditions are met in the execution of\
    \ the package. Figure 4-17 demonstrates the options available in the connection\
    \ manager’s editor.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-103_1.jpg)\n\
    \n**Figure 4-17. SMTP Connection Manager Editor**\n\nThe `Name` uniquely identifies\
    \ the connection. The `Description` should be filled in to help fellow developers\
    \ understand the role of this connection. The `SMTP Server` field is used to indicate\
    \ the server name. By default, the connection manager utilizes `Anonymous` authentication\
    \ but it does allow you to choose `Windows Authentication` via a check box. Selecting\
    \ the `Enable Secure Sockets Layer (SSL)` option allows you to encrypt the data\
    \ when you are sending e-mails. The `Timeout` field defines in milliseconds the\
    \ amount of time you have to connect to the server.\n\n**CAUTION:** When connecting\
    \ to Microsoft Exchange, use `Windows Authentication`, because the exchange servers\
    \ can deny unauthenticated SMTP connections.\n\n### SQLMOBILE Connection Manager\n\
    \nThe SQLMOBILE Connection Manager allows you to connect to a SQL Server Compact\
    \ database. The SQL Server Compact destination uses this connection manager to\
    \ load data into the SQL Server Compact database. Figures 4-18 and 4-19 demonstrate\
    \ the configuration of the connection manager.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-104_1.jpg)\n\n**Figure 4-18. SQL Server Compact Connection Manager\
    \ Editor—Connection page**\n\n**NOTE:** The provider that enables you to connect\
    \ to a SQL Server Compact database is available in only 32-bit mode. If you are\
    \ developing or executing on a 64-bit machine, you will have to use 32-bit mode.\n\
    \nThe database file name and path indicates the location of the SQL Server Compact\
    \ database. The `Browse` button opens Windows Explorer to help look for the file\
    \ location. The password to the database can be stored in the `Enter the Database\
    \ Password` field. The `All` page in Figure 4-19 shows all the options available\
    \ when using this connection manager.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-105_1.jpg)\n\n**Figure 4-19. SQL Server Compact Connection Manager\
    \ Editor—All page**\n\nThe properties exposed by the `All` page allow you to configure\
    \ the minute details of the connection manager. Some of these properties include\
    \ the growth size and time-out settings. All of the properties are as follows:\n\
    \n*   `AutoShrink Threshold`: The percent of free space allowed before autoshrink\
    \ is allowed to execute.\n*   `Default Lock Escalation`: The number of locks SQL\
    \ Server Compact is allowed before it escalates the locks.\n*   `Default Lock\
    \ Timeout`: The interval during which a transaction will wait for a lock. This\
    \ is measured in milliseconds.\n*   `Flush Interval`: The interval during which\
    \ committed transactions are flushed to disk. This is measured in seconds.\n*\
    \   `Locale Identifier`: Specifies the Locale ID of the SQL Server Compact database.\n\
    *   `Max Buffer Size`: Specifies the amount of memory SQL Server Compact uses\
    \ before flushing data to disk. This is measured in kilobytes (KB).\n*   `Max\
    \ Database Size`: Defines the maximum size of the SQL Server Compact database.\
    \ This is measured in megabytes (MB).\n*   `Mode`: Specifies the access mode for\
    \ the SQL Server Compact database. By default, it is set to `Read Write`. `Read\
    \ Write` gives you permission to both read from and write to the database. `Read\
    \ Only` specifies that you can only read from the database. `Exclusive` provides\
    \ exclusive access to the database. `Shared Read` allows multiple users to read\
    \ from the database simultaneously.\n*   `Persist Security Info`: Allows the connection\
    \ information to be stored as part of the connection’s string.\n*   `Temp File\
    \ Directory`: Specifies the location of the temporary database file for the SQL\
    \ Server Compact database.\n*   `Datasource`: Specifies the name of the SQL Server\
    \ Compact database to access.\n*   `Password`: Specifies the password of the SQL\
    \ Server Compact.\n\n### WMI Connection Manager\n\nThe WMI Connection Manager\
    \ enables access to Windows Management Instrumentation. The Web Services task\
    \ utilizes this connection manager. Figure 4-20 displays the configuration of\
    \ the WMI Connection Manager Editor.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-107_1.jpg)\n\n**Figure 4-20. WMI Connection Manager Editor**\n\nThe\
    \ `Name` field uniquely defines the connection manager. The `Description` should\
    \ be used so that other developers will know the exact purpose of the connection\
    \ manager. The `Server Name` denotes the location of the management instrument.\
    \ The `Namespace` defines the WMI namespace to use. The check box will enable\
    \ the usage of `Windows Authentication`. If you use this option, you do not need\
    \ to provide the user name and password. The `Test` button will test the current\
    \ configurations set in the editor.\n\n### Summary\n\nThe connection managers\
    \ that SSIS can access are the backbone of the ETL process that the packages carry\
    \ out. They allow both the extraction of data as well as its insertion. Certain\
    \ connection managers have a rather simple configuration, while others have a\
    \ much more complex set of properties. In this chapter, you looked in great detail\
    \ at the most frequently used connections. You also were introduced to some of\
    \ the more sparingly used connection managers. The next chapter will guide you\
    \ through the basic executables, containers, and precedence constraints available\
    \ for the control flow.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ## CHAPTER 5 - Control Flow Basics\n\n*You cannot always control what goes on\
    \ outside. But you can always control what goes on inside.*  \n—Self-help advocate\
    \ Wayne Dyer\n\nThe previous chapter introduced you to SQL Server 12’s connection\
    \ managers. The purpose of this chapter is to introduce some of the basic control\
    \ flow items that will enable you to utilize those connection managers. The control\
    \ flow has its own designer page in the Designer window in Visual Studio. In this\
    \ chapter, we detail the control flow tasks that you are most likely to use on\
    \ a daily basis. Chapter 6 covers the less frequently used executables. The control\
    \ flow defines the operations that a package performs, and the order and conditions\
    \ required to execute them.\n\n### What Is a Control Flow?\n\nThe *control flow*\
    \ is the backbone of any SQL Server Integration Services 12 package. It consists\
    \ of executables, containers, and precedence constraints. *Executables* are the\
    \ most versatile component of an SSIS package. They include such tasks as the\
    \ `Execute SQL task`, `Data Flow task`, and `Script task`. These tasks can be\
    \ used to start stored procedures, extract and load data, and change the states\
    \ of variables.\n\n*Containers* are used to logically organize the tasks. The\
    \ containers can be used to simply organize or to loop through the tasks. *Precedence\
    \ constraints* determine the execution path or flow. They allow you to determine\
    \ the order of the tasks’ execution. By not defining certain constraints, you\
    \ can take advantage of concurrent task execution.\n\nThe control flow designer\
    \ pane has a zoom tool that allows you to zoom in and out to see all the components.\
    \ The SSIS Toolbox also changes to allow you to access only the context-specific\
    \ items. The data flow components are not available in the control flow. When\
    \ adding items to the control flow, you have two choices: you can either click\
    \ and drag the item from the SSIS Toolbox onto the control flow, or you can double-click\
    \ the item."
