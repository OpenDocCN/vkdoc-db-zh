    character data columns. For each selected column, you can choose one or more string
    operations to perform, such as converting a string to uppercase or lowercase.
    The Character Map Transformation Editor is relatively simple.


    In this editor, you select the columns you wish to update. You then decide whether
    the result of the operation should be placed in a new column or just replace the
    value in the same column ( *in-place* *change*). You can change the name of the
    output column by changing the value in the Output Alias field.


    Finally, in the Operation field, you can choose the types of transformations to
    apply to the selected columns. Figure 8-7 shows the transformation editor.


    *Figure 8-7\. Editing the Character Map transformation*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    The Character Map transformation supports 10 string transformations you can perform
    on inbound data. You can choose more than one from the drop-down list to perform
    multiple transformations on an input column at once. In this example, we chose
    to use Uppercase selected string columns. The string operations you can choose
    from this transformation are listed in Table 8-3.


    *Table 8-3\. Character Map Transformation Operations*


