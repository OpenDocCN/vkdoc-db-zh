  trans: "## 脚本组件源\n\nSSIS 允许你使用**脚本任务**向控制流中添加 .NET 代码。你也可以使用**脚本组件转换**，以其他 SSIS\
    \ 内置组件原生不支持的方式，用 .NET 来操纵数据。**脚本组件转换**有三种操作模式：你可以用它来创建基于 .NET 脚本的数据源、目标和转换组件。与内置数据流组件类似，**脚本组件源**检索数据并将其推入数据流，**脚本组件目标**从数据流接收数据并将其推送到存储，而**脚本组件转换**则在数据流中操纵你的数据。\n\
    \n当你将脚本组件拖入数据流时，BIDS 会弹出一个菜单让你选择组件类型，如图 10-14 所示。要创建**脚本组件源**，请从弹出菜单中选择`Source`。**脚本组件源**没有输入，但至少有一个输出，并且在设计上始终是同步的。\n\
    \n![](img/index-376_1.jpg)\n\n![](img/index-376_2.jpg)\n\n*图 10-14. 从弹出菜单中选择脚本组件类型*\n\
    \n在我们的例子中，我们没有将数据从**脚本组件源**推送到输出，而是将其推送到一个`RowCount`组件，并在源的输出上启用了数据查看器。这是测试 SSIS\
    \ 数据流的常用方法，因为它允许你在 ETL 过程中“实时”查看数据，而无需将其持久化到输出。我们的数据流示例如图 10-15 所示。\n\n![](img/index-377_1.jpg)\n\
    \n*图 10-15. 带有脚本组件源的数据流*\n\n将脚本组件拖到数据流上并选择源类型后，我们必须对其进行配置。第一步是向脚本组件输出中添加列。为此，我们打开了`Script\
    \ Component Editor`并转到`Inputs and Outputs`页面。在那里，我们点击`Output 0`下的`Output Columns`，并点击`Add\
    \ Column`按钮七次。这些列以默认名称添加，如`Column 1`、`Column 2`等，所有列的默认数据类型均为四字节有符号整数[DT_I4]。\n\
    \n我们将每个列重命名，使名称更具描述性，并将每个列的数据类型更改为字符串[DT_STR]，长度为 200。唯一的例外是`Description`列，我们将其长度更改为\
    \ 2000。图 10-16 显示了编辑器的`Inputs and Outputs`页面。\n\n■ **提示：** 除了更改输出中列的名称外，你还可以更改输出本身的名称。在此示例中，我们保留了`Output\
    \ 0`的默认名称。\n\n![](img/index-376_1.jpg)\n\n*图 10-16. 向脚本组件输出添加列*\n\n**脚本组件源**继承自`UserComponent`类并实现了其三个方法。当脚本组件执行时，这些方法按以下顺序调用：\n\
    \n1.  `PreExecute()`方法在脚本组件启动时、任何行添加到输出之前准确触发一次。\n2.  `CreateNewOutputRows()`方法也针对脚本组件调用一次。正是在这个方法中，你可以向输出添加新行，通常使用某种循环。\n\
    3.  `PostExecute()`方法在脚本组件结束时、你完成向输出添加行后触发一次。此方法对于在脚本组件完成后执行任何清理任务很有用。\n\n在我们的例子中，我们获取了\
    \ CNN 头条新闻 RSS 源。*简易信息聚合（RSS）*是一种用于聚合网络内容（如博客文章和新闻报道）的 XML 格式。在脚本组件中，我们使用 .NET\
    \ 获取最新的 RSS 源文档，并将 XML 分解为行和列，然后将其放入组件的输出缓冲区中。首先，我们在`ScriptMain`类级别声明了一个 .NET\
    \ `XmlDocument`对象来保存我们的 RSS 源页面，如下所示：\n\n```csharp\n[Microsoft.SqlServer.Dts.Pipeline.SSISScriptComponentEntryPointAttribute]\n\
    public class ScriptMain : UserComponent\n{\n    // XML Document to hold RSS feed\
    \ page\n    XmlDocument RssXML = null;\n    bool b = true;\n    string ComponentName\
    \ = \"\";\n    // Method overrides will go here...\n    ...\n}\n```\n\n`PreExecute()`方法首先获取脚本组件的名称，以便稍后在日志消息中使用。然后它调用`base.PreExecute()`方法。虽然调用基方法并非总是必要，但最好调用它们以确保不会错过它们提供的任何功能。接下来，我们使用\
    \ .NET 内置的`HttpWebRequest`和`HttpWebResponse`类来检索 CNN RSS 源并将其放入`RssXML`变量。\n\n\
    我们在这里还使用了`ComponentMetaData.FireInformation()`方法，它触发对记录调试信息有用的`OnInformation`事件。由于我们的代码依赖于我们无法控制的外部资源（即网站），我们将\
    \ Web 请求包装在`try-catch`块中。如果捕获到异常，我们使用`FireError()`方法触发`OnError`事件。数据流组件中的`FireError()`方法不会停止数据流。错误会向上传播到`Data\
    \ Flow task`，此时 SSIS 根据包设置决定是否停止处理。对于此组件的预执行阶段，失败意味着由于某种原因我们没有好的 XML 数据可供处理，因此没有继续下去的意义。因此，我们通过使用`throw`语句重新抛出异常来强制硬停止。\n\
    \n```csharp\npublic override void PreExecute()\n{\n    // Get Name of Component\n\
    \    ComponentName = this.ComponentMetaData.Name;\n    // Fire OnInformation event\
    \ for starting\n    this.ComponentMetaData.FireInformation(-1, ComponentName,\
    \ \"Beginning Pre-execute\", \"\", 0, ref b);\n    // Perform base PreExecute()\
    \ method\n    base.PreExecute();\n    try\n    {\n        // Fire OnInformation\
    \ event for getting RSS feed data\n        this.ComponentMetaData.FireInformation(-1,\
    \ ComponentName, \"Start - Getting RSS Feed data (Pre-execute)\", \"\", 0, ref\
    \ b);\n        // Retrieve RSS feed\n        HttpWebRequest req = (HttpWebRequest)HttpWebRequest.Create(\"\
    http://rss.cnn.com/rss/cnn_topstories.rss\");\n        HttpWebResponse res = (HttpWebResponse)req.GetResponse();\n\
    \        Stream str = res.GetResponseStream();\n        // Put RSS feed document\
    \ into XML Document\n        RssXML = new XmlDocument();\n        RssXML.Load(str);\n\
    \        // Fire OnInformation event for getting RSS feed data\n        this.ComponentMetaData.FireInformation(-1,\
    \ ComponentName, \"Complete - Getting RSS Feed data (Pre-execute)\", \"\", 0,\
    \ ref b);\n    }\n    catch (Exception ex)\n    {\n        // Fire OnError event\
    \ if an error occurs\n        this.ComponentMetaData.FireInformation(-1, ComponentName,\
    \ ex.ToString(), \"\", 0, ref b);\n        // Rethrow exception to stop processing\n\
    \        throw (ex);\n    }\n    finally\n    {\n        // Fire OnInformation\
    \ event for finished\n        this.ComponentMetaData.FireInformation(-1, ComponentName,\
    \ \"Finished Pre-execute\", \"\", 0, ref b);\n    }\n}\n```\n\n我们没有任何特殊的后执行处理需要执行，但我们仍然必须重写`PostExecute()`方法。在这种情况下，我们在`PostExecute()`中所做的只是调用`base.PostExecute()`方法：\n\
    \n```csharp\npublic override void PostExecute()\n{\n    // Perform base PostExecute()\
    \ method\n    base.PostExecute();\n}\n```"
- fmt: "# CHAPTER 10 - SCRIPTING\n\nThe `CreateNewOutputRow()` method is where the\
    \ real processing takes place. First we grabbed the RSS feed header information\
    \ including feed title, link, and publication date and placed it in string variables.\
    \ Then we looped over the `<item>` tags in the RSS feed, each one representing\
    \ a syndicated article, and put the article title, link, and description in string\
    \ variables. In the loop, we called the `AddRow()` method of the output buffer\
    \ and assigned our string values pulled from the XML document to the output buffer\
    \ columns. After the loop completed, and all rows were added to the output, we\
    \ called the `SetEndOfRowset()` method on the buffer to signal SSIS that no more\
    \ rows were coming.\n\n**TIP:** Even if you don’t think you need any special error\
    \ handling right now, putting try-catch blocks around your .NET code will make\
    \ it easier to add special handling for errors in the future.\n\n## SCRIPT COMPONENT\
    \ EVENTS\n\nLike the Script task, the Script component allows you to fire events\
    \ that SSIS may log based on your settings. In the Script task, event-firing methods\
    \ are accessed through the `Dts.Events` object. In the Script component, they\
    \ are accessed via the `ComponentMetaData` object. The methods that `ComponentMetaData`\
    \ exposes include the following:\n\n- `FireError()` fires an `OnError` event,\
    \ which indicates a serious condition that affects processing and could stop a\
    \ package from running. Note that `FireError()` by itself does not stop a data\
    \ flow from running, but when the error propagates back up to the Data Flow task,\
    \ SSIS will decide whether the control flow will fail based on its properties.\
    \ To force a hard stop in the data flow, you should throw an exception as we do\
    \ in our sample.\n- `FireWarning()` fires an `OnWarning` event, which indicates\
    \ an issue that is not as serious as an error but could affect processing nonetheless.\n\
    - `FireInformation()` fires an `OnInformation` event that contains informational\
    \ messages. These messages are generally useful for debugging and troubleshooting\
    \ issues.\n- `FireProgress()` fires the `OnProgress` event, which in itself indicates\
    \ component progress. We use the `FireProgress()` event in our sample.\n- `FireCustomEvent()`\
    \ fires a custom event of your creation within the package.\n\nThe event-firing\
    \ methods exposed by the `ComponentMetaData` object are extremely useful when\
    \ debugging, and we highly recommend using them liberally in your script components.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nAlong the way, we keep a\
    \ count of processed rows, and report our progress by firing `OnProgress` events\
    \ with the `FireProgress()` method. Like `OnInformation`, these events are useful\
    \ for troubleshooting and debugging code. If we encounter an exception in this\
    \ code, it’s with a single row, so we call `FireError()` to log the error and\
    \ let SSIS decide whether to stop processing at the task level. The code listing\
    \ is as follows:\n\n```csharp\npublic override void CreateNewOutputRows()\n{\n\
    \    // Fire OnInformation event for starting\n    this.ComponentMetaData.FireInformation(-1,\
    \ ComponentName,\n        \"Start - Create new output rows\", \"\", 0, ref b);\n\
    \n    try\n    {\n        // Get feed properties\n        string feed_title =\
    \ RssXML.SelectSingleNode(\"(/rss/channel/title)[1]\").InnerText;\n        string\
    \ feed_link = RssXML.SelectSingleNode(\"(/rss/channel/link)[1]\").InnerText;\n\
    \        string feed_language = RssXML.SelectSingleNode(\"(/rss/channel/language)[1]\"\
    ).InnerText;\n        string feed_pubDate = RssXML.SelectSingleNode(\"(/rss/channel/pubDate)[1]\"\
    ).InnerText;\n\n        // Initialize counters and shred articles\n        int\
    \ CurrentRowCount = 0;\n        int CurrentPercent = 0;\n        int LastPercent\
    \ = 0;\n        XmlNodeList xl = RssXML.SelectNodes(\"/rss/channel/item\");\n\
    \        int TotalRows = xl.Count;\n\n        // Iterate articles\n        foreach\
    \ (XmlNode xn in xl)\n        {\n            // Get article properties\n     \
    \       string title = xn.SelectSingleNode(\"(title)[1]\").InnerText;\n      \
    \      string link = xn.SelectSingleNode(\"(link)[1]\").InnerText;\n         \
    \   string description = xn.SelectSingleNode(\"(description)[1]\").InnerText;\n\
    \n            // Create new output row\n            Output0Buffer.AddRow();\n\n\
    \            // Assign values to the output buffer columns\n```"
