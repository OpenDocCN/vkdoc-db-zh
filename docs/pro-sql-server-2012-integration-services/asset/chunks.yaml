    Line \" & ex.Message & _\n\n        \"is not valid and will be skipped.\")\n\n\
    \    End Try\n\nEnd While\n\nDts.TaskResult = ScriptResults.Success\n\nEnd Sub\n\
    ```\n\n`MessageBox` 返回行字符串数组中错误编号的索引值，可用于识别具体原因。显然，要动态处理错误需要额外代码，但有了错误代码和描述（在后续的\
    \ Tip 中提供），可以包含一个 `VB.NET Select Case` 语句来遍历错误代码，并根据错误采取适当的操作。\n\n## 事件处理程序\n\n\
    事件处理程序提供了一种主动处理包和可执行文件上事件的方法，可用于为以下事件捕获任务特定信息：\n\n- `OnError`\n- `OnExecStatusChange`\n\
    - `OnExecution`\n- `OnPostExecute`\n- `OnPostValidate`\n- `OnPreExecute`\n- `OnPreValidate`\n\
    - `OnQueryCancel`\n- `OnTaskFailed`\n- `OnVariableValueChanged`\n- `OnWarning`\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`OnError` 事件处理程序可用于捕获错误描述和代码，然后这些信息可用于动态处理错误以及记录有关特定问题的更深入信息。\n\
    \n由于事件处理程序仅在可执行文件和包上可用，这排除了在数据流内部使用它们的可能性，但可以捕获数据流可执行文件的失败。为了使 `OnError` 事件处理程序能够被触发，数据流任务必须首先失败，这将清空缓冲区中的所有数据，使其无法用于后续调查。\n\
    \n在事件处理程序内处理错误信息，最简单的方法是通过脚本任务传入 `System:ErrorCode` 和 `System:ErrorDescription`\
    \ 作为只读变量。第 11 章概述了如何创建脚本任务来捕获错误信息，并演示了 `OnError` 事件从任务级别一直向上冒泡到包级别。显然，需要在脚本组件中纳入更复杂的逻辑类型，以主动处理特定错误。\n\
    \n上一节概述的包在数据流任务中使用了错误重定向，以防止错误出现并确保所有行都被定向到目标。如果不重定向行而创建相同的包，则可以使用 `OnError` 事件处理程序来捕获错误信息。在\
    \ `OnError` 事件中添加一个脚本任务，并将 `System:ErrorDescripton` 设置为 `ReadOnly` 变量，将允许捕获整个错误消息，并更深入地了解真正原因。使用以下\
    \ `VB.NET` 代码将显示数据流任务中发生的任何错误的消息：\n\n```vb\nMessageBox.Show(Dts.Variables(0).Value.ToString)\n\
    ```\n\n生成的消息框指定了截断错误以及受影响的具体列。错误重定向和 `OnError` 事件处理程序之间的主要区别在于，如果使用了错误重定向，则不会引发\
    \ `OnError` 事件处理程序。在前面的示例中，数据流任务在截断错误发生后停止，并且失败的行信息将不会被存储以供后续评估。\n\n`TIP:` SSIS\
    \ 错误消息和编号概述在 http://msdn.microsoft.com/en-us/library/ms345164.aspx。\n\n## 动态性\n\
    \n从 SSIS 2005 开始，配置使包更具可移植性，并可以轻松地将包导入到 SQL 的多个实例中，而无需创建多个包或专门为环境配置包。在 SSIS 2012\
    \ 中，随着参数的引入，这一功能得到了进一步优化。"
- fmt: "Environments allow the mapping of parameters to their variables and can be\
    \ used to execute a single package in multiple environments. It is common to be\
    \ required to develop a package in one environment, test in another, and finally\
    \ deploy to production. This kind of scenario shows the true flexibility and power\
    \ of using environments in SSIS.\n\nParameters and environments are outlined in\
    \ Chapter 19, with examples of dynamic package execution.\n\n## CHAPTER 18 – BUILDING\
    \ ROBUST SOLUTIONS\n\n### Accountability\n\nAfter a package has been deployed\
    \ and running for some time, you often have to see how each task is fairing “in\
    \ the wild.” I often get requests as to the total or average number of rows that\
    \ are passed through a single data flow or how long a single task is taking. Although\
    \ it can be easy to ascertain package run times that are scheduled within a SQL\
    \ Server agent, separating task times and counts is not as simple.\n\n### Log\
    \ Providers\n\nChapter 11 outlined configuring log providers and the saving of\
    \ package execution information within a specific provider, XML, SQL, CSV, and\
    \ so forth. Log providers can also be used to provide general task metrics, such\
    \ as execution time. Log providers enable you to capture information that is raised\
    \ by an event handler. For example, selecting the `OnPreExecute` and `OnPostExecute`\
    \ events provides a means of tracking the general start and end time of tasks\
    \ within a package.\n\nConfiguration of log providers is done from within the\
    \ control flow pane by right-clicking and choosing `Log Providers`. The initial\
    \ window requires defining the executable to log and in which format the log is\
    \ to be written, such as XML, SQL or any supported format. After the executable\
    \ and destination is configured, the event handlers can be selected, as well as\
    \ the specific columns to collect. Figure 18-12 illustrates the event handlers\
    \ available through the log provider.\n\n*Figure 18-12. Log provider events*\n\
    \nUsing a SQL log provider for the selected events allows querying the data to\
    \ find the specific task durations. Each package has its own `GUID`, as does each\
    \ task, so utilizing a common table expression with the `DATEDIFF` function quickly\
    \ returns the associated task’s execution time. The following query uses the table\
    \ created through the log shipping configuration to find the difference between\
    \ the start and end time of the specific package identified by its `GUID`. The\
    \ results are displayed in Figure 18-13.\n\n```sql\nWITH eventexecution\nAS(\n\
    \    SELECT sourceid,\n           starttime\n    FROM sysssislog\n    WHERE executionid\
    \ = 'B0885A09-A1BA-4638-9999-29698F357B40'\n      AND event = 'OnPreExecute'\n\
    )\nSELECT source,\n       DATEDIFF(SECOND, c.starttime, endtime) AS 'seconds'\n\
    FROM sysssislog s JOIN eventexecution c\n    ON s.sourceid = c.sourceid\nWHERE\
    \ event = 'OnPostExecute';\nGO\n```\n\n*Figure 18-13. Task duration query results*\n\
    \n### Custom Logging\n\nAlthough log providers can capture a great deal of information\
    \ in regards to package execution, some measures are missed, such as data flow\
    \ row counts. Another common request is to show the total rows affected in a `Data\
    \ Flow` task over time. Counts such as this are not included in SSIS log providers\
    \ but can still be captured using custom logging.\n\nThe first step is creating\
    \ a table that will hold the custom logged information, which in this example\
    \ will be the package `GUID`, package name, task name, destination name, number\
    \ of rows, and the date the task ran. For example:\n\n```sql\nIF NOT EXISTS(SELECT\
    \ * FROM sys.tables WHERE name = 'SSISCounts')\nBEGIN\n    CREATE TABLE SSISCounts(\n\
    \        ExecGUID NVARCHAR(50),\n        PackageName NVARCHAR(50),\n        TaskName\
    \ NVARCHAR(50),\n        DestinationName NVARCHAR(50),\n        NumberRows INT,\n\
    \        DateImported DATETIME2)\nEND;\nGO\n```\n\nA package-level variable needs\
    \ to be created that will hold the row count of all `Data Flow` tasks that is\
    \ of a data type integer. Each `Data Flow` task should include a `Row Count` transformation\
    \ immediately before the destination that uses the package-level variable to record\
    \ imported rows.\n\n*Figure 18-14. Row count transformation*\n\nFinally, in the\
    \ `PostExecute` event handler of the `Data Flow` tasks, create an `Execute SQL`\
    \ task that will insert the appropriate information using both system and user-defined\
    \ variables. Clicking the event handlers opens the `EventHandlers` pane and provides\
    \ two drop-downs, `Executable` and `Event Handler`, as shown in Figure 18-15.\
    \ After the executable is selected, the desired event handler can be selected\
    \ and the specific task can be placed on the pane.\n\n*Figure 18-15. Execute SQL\
    \ task parameter configuration*\n\nThe `Execute SQL` task will be used to insert\
    \ the count information from the `Data Flow` task with information that is system\
    \ provided and user provided. The system-provided information is the package `GUID`,\
    \ name, task, and the row count, and the database and time will be supplied within\
    \ the query. The `SQLStatement` property should be set to utilize the parameters\
    \ that will be defined in the task by using a question mark (`?`), as shown in\
    \ the following code:\n\n```sql\nINSERT SSISCounts\nVALUES(?, ?, ?, 'AdventureWorks2012DW',\
    \ ?, SYSDATETIME())\n```\n\nThe parameters should be organized in the same ordinal\
    \ position as they appear in the query in the `Execute SQL Task Editor`. Figure\
    \ 18-16 depicts the parameter configuration. Note that the parameter name is replaced\
    \ with the index position of the variables as they appear in the insert statement.\n\
    \n*Figure 18-16. Execute SQL task parameter configuration*\n\nThere is typically\
    \ confusion in the mapping of the parameters to the `?` in the SQL statement property.\
    \ From the preceding figure, remember that the first parameter defined, in this\
    \ case `ExecutionInstanceGUID`, will go where the first question mark occurs,\
    \ and each parameter will follow in order. The insert statement could be rewritten,\
    \ for demonstration purposes only, to better visualize this, as shown in the following\
    \ code:\n\n```sql\nINSERT SSISCounts\nVALUES(ExecutionInstanceGUID, PackageName,\
    \ TaskName,\n       'AdventureWorks2012DW', RowCount, SYSDATETIME())\n```\n\n\
    The preceding example demonstrates that using both system and user-defined variables\
    \ in cooperation with event handlers can provide a means of custom logging. The\
    \ information contained within the `SSISCounts` table can be used to establish\
    \ a means of tracking the number of records added by the data flow and tracking\
    \ the specific tasks.\n\n### Summary\n\nThis chapter presented ways to ensure\
    \ durability, portability, and resiliency in SSIS packages and tasks.\n\nMany\
    \ of the methods discussed in this chapter are extensions of features that are\
    \ outlined throughout this book. The key concept to creating robust solutions\
    \ is to do the following:\n\n- Plan for the unknown.\n- Proactively handle possible\
    \ errors.\n- Provide error redirection for data flow.\n- Configure packages and\
    \ tasks to be portable.\n- Record error and metric package and task information.\n\
    \n## CHAPTER 19 – Deployment Model\n\n*Program testing can be used to show the\
    \ presence of bugs, but never to show their absence!*\n\n—Computer scientist Edsger\
    \ Dijkstra\n\nVersion 2012 of SQL Server Integration Services introduces an entirely\
    \ new way to deploy ETL processes."
