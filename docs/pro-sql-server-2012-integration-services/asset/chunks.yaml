    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-487_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    *Figure 14-1\. OLE DB Source Editor*


    The buttons to the right side of the SQL Command Text box allow you to modify
    the query in the following ways:


    Parameters allows you to assign a mapping to parameters listed in the query.


    The naming convention behind the mapping depends on the type of the


    connection manager. The Connection Manager chapter outlines all the


    mapping rules.


    Build Query opens a GUI that allows you to construct a SQL query.


    Browse allows you to import the text from a file as your query. When you click


    the OK button, the query will be parsed and the metadata will be verified.


    Parse Query parses the query that is supplied in the text field.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-488_1.jpg)


    CHAPTER 14  HETEROGENEOUS SOURCES AND DESTINATIONS


    Figure 14-2 demonstrates the mappings that can assign variable values to the parameters
    defined in the SQL statement. The data types can vary depending on the data type
    of the context in the query. The Parameters column is crucial in assigning the
    values because it relies on the order of appearance of the qualifier in the query.
    The Param direction column determines whether the variable should be assigned
    a value through the statement (Output) or whether the variable is passing in a
    value to the statement (Input). Because the source component anticipates a tabular
    result set, Input is the direction that is most likely to be used. This is the
