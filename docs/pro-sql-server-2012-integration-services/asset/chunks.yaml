    Data Viewer


    The *Data Viewer* option allows you to get a quick snapshot of your data stream
    as it moves through your Data Flow task. The viewers can be enabled between any
    two components within your Data Flow task.


    Figure 12-31 demonstrates how the Data Viewer is defined on a Data Flow task.
    In order to enable a Data Viewer, you have to right-click a connector between
    two components and select Enable Data Viewer.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-459_1.jpg)


    ![](index-459_2.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-31\. Enabling the Data Viewer*


    After the Data Viewer has been enabled, a small icon will appear on the connector
    you chose. The icon is a small magnifying glass indicating an in-depth look at
    the pipeline at a singular point in time.


    Figure 12-32 demonstrates a connector with a Data Viewer enabled. The Data Viewer
    can greatly assist you during development because it can allow you to look at
    data without having to commit it to a table or an object variable. One of the
    areas this object helps in data profiling is during data conversions.


    Suppose your Data Conversion transformation is failing without very specific error
    messages. The Data Viewer can help you identify the rows that are causing the
    error, allowing you to initiate actions to either fix the bad data or to ignore
    it. The Data Viewer can also be utilized to gauge the success of Lookup components
    or Merge Join transformations.


    *Figure 12-32\. Enabled Data Viewer*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


