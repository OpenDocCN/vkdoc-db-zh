    Variable Scope, Default Values, and Namespaces


    SSIS provides several ways to group variables so that you do not end up with a
    confusing mass. Your naming conventions will assist you greatly in keeping the
    variables in order. If you do not have these standards, the methods that come
    by default in SSIS should assist in providing some semblance.. The variable’s
    scope physically limits your variable from being accessed by all methods. Namespaces
    assist you in grouping variables that serve a particular purpose. Assigning a
    default value insures that a user defined variable will have a value other than
    NULL. The default values will be used during Debug mode and runtime unless they
    are modified by using expressions or Script tasks.


    Scope


    Most programming languages provide scope for their variables. *Scope* is defined
    as the context of the variables with relation to the values and expressions. For
    SSIS, this translates to which executables, containers, and event handlers have
    access to the variables. To define a variable at the package implies that all
    the objects within the package will have access to the variable. In order to limit
    the variable’s scope to a particular executable, you should select the object
    in the control flow designer window when you add the variable. If you do not select
    any object, the default is the package scope. The variable window has several
    icons at the top that allow you to modify the variables, as shown in Figure 9-6.


    *Figure 9-6\. Variable options*


    The following list describes the functions of each of the buttons on the Variables
    toolbar: Add Variable adds a variable to the collection by using selected objects
    as the defined scope of the variable.


    Move Variable moves the variable to a different scope.


    Delete Variable deletes the highlighted variables.


    Show System Variables displays all the system variables.


    Show Variables of All Scopes displays all the user-defined variables defined in
    the package. By default, only the variables of the selected object are shown.
    This helps to quickly identify only the available variables.


    Choose Variable Columns opens a dialog box that allows you to quickly look at


    all the available columns.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-335_1.jpg)


    CHAPTER 9  VARIABLES, PARAMETERS, AND EXPRESSIONS


    The Choose Variable Columns icon is important because it allows you to gain control
    over all the aspects of a variable. By default, the only columns provided are
    Name, Scope, Data Type, and Value, as shown earlier in Figure 9-1\. Figure 9-7
    shows all the available columns that you can modify for the user-defined variables.
    The Namespace and Description columns are left out, but with the dialog box, you
    can add them back. The Raise Event When Variable Value Changes check box shows
    whether the specific variable is tied to an event that will fire when the value
    changes.


    *Figure 9-7\. Choose Variable Columns dialog box*


     **NOTE:** You have to add the Namespace and Description column back every time
    you restart Visual Studio. The columns reset to the default after the Visual Studio
    window is closed.


    Figure 9-8 shows the Variables window after we add all the variables we will need
    for this package.


    The objective of the CH09_Apress_ChildPackage is to extract the states that were
    accepted after 1900, convert the Date column into a DateTime column, and load
    only the states whose capitals lie north of 35.493259\. The purpose of using two
    variables for row filtering is to demonstrate that a SQL query in a source component
    can be parameterized and to show that a conditional split can be used to filter
    out based on a variable value after the data has entered the data stream.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-336_1.jpg)


    ![](index-336_2.jpg)


