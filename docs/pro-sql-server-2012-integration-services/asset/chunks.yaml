    ## Analysis Services Processing Task Editor—General page


    The **General** page of the **Analysis Services Processing** task, shown in Figure
    5-9, is extremely straightforward. It allows you to rename the executable and
    provide a short description of the task. The `Name` and `Description` properties
    will automatically reflect the values that are provided in the designer or the
    properties window. Only the `Name` property is modifiable in the designer window.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-122_1.jpg)


    *Figure 5-9. Analysis Services Processing Task Editor—General page*


    > **NOTE:** Henceforth, we will not show the General page of task editors unless
    the accessible properties include others besides simply `Name` and `Description`.


    ## Analysis Services Processing Task Editor—Processing Settings Page


    The **Processing Settings** page of the **Analysis Services Processing** task,
    shown in Figure 5-10, allows you to specify your connection manager to the Analysis
    Services database and the objects you need to process. It also enables you to
    configure exactly how each of the objects can be processed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-123_1.jpg)


    *Figure 5-10. Analysis Services Processing Task Editor—Processing Settings page*


    The `Analysis Services Connection Manager` drop-down list provides all the existing
    Analysis Services connection managers in the package. The `New` button allows
    you to create one if it does not exist in the package already. The **Object List**
    section displays all the objects that are set to be processed by the task.


    These are examples:

    *   `Object Name` specifies the name of the object to be processed.

    *   `Type` displays the type of the object.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `Process Options` contains a drop-down of the processing options, which include
    `Process Default`, `Process Full`, `Unprocess`, `Process Data`, `Process Index`,
    and `Process Update`.

    `Process Default`, `Process Full`, and `Unprocess` are the only options available
    to all the object types. `Process Default` performs only the necessary tasks to
    initialize the object. The engine analyzes the state of the object to determine
    the best option to use. `Process Full` drops and rebuilds the object, updating
    the metadata as the object is being processed. `Unprocess` all the data that the
    object contains. Dimensions, cubes, measure groups, and partitions are the only
    objects with access to the `Process Data` and `Process Index` options. `Process
    Data` loads data into the objects without building indexes or aggregations. `Process
    Index` rebuilds only the indexes and aggregations without modifying the existing
    data. `Process Update` is available only to dimensions. It performs inserts, updates,
    and deletes on the dimensional data.


    `Settings` provides the processing settings for the object.


    The `Add` button allows you to add the objects in the database to the **Object
    list**. The `Remove` button deletes them from the list. The `Impact Analysis`
    button displays all the objects affected by processing the selected object. When
    the task performs the analysis, it takes into account the processing option that
    is selected. The impact analysis provides its own **Object list** of affected
    objects, which are as follows:

    *   `Object Name` identifies the object that is affected by the defined object’s
    processing.

    *   `Type` displays the affected object’s type.

    *   `Impact Type` shows the effects of processing the selected object. The following
    impacts are shown: `Object Will Be Cleared (Unprocessed)`, `Object Would Be Invalid`,
    `Aggregation Would Be Dropped`, `Flexible Aggregation Would Be Dropped`, `Indexes
    Will Be Dropped`, and `Nonchild Object Will Be Processed`. All except `Object
    Will Be Invalid` will provide an error message. The rest are simply warnings.

    *   `Process Object` is a check box that allows you to add this object to the
    process object list.


    The `Change Settings` button opens the dialog box displayed in Figure 5-11. It
    allows you to change all the settings displayed on the **Processing Settings**
    page.'
