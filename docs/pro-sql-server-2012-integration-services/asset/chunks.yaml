- fmt: '# Import Column Transformation


    The **Import Column** transformation provides a way to enrich your rows in the
    data flow with LOB data from the file system. **Import Column** allows you to
    add image, binary, and text files to your data. We added an **Import Column**
    transformation to the data flow in Figure 8-12 to import images of restaurants
    on this list.


    *Figure 8-12. Import Column transformation in the data flow*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-263_1.jpg)


    ## CHAPTER 8 - DATA FLOW TRANSFORMATIONS


    The **Import Column** transformation is useful when you need to tie LOB data to
    rows of other data and store both in the database together. One caveat though—this
    transformation has one of the more arcane editors of any transformation.


    ### Configuring Import Column


    The first step to configuring **Import Column** is to select a string column on
    the **Input Columns** tab. We selected the **Picture Name** column that we previously
    populated with a full path to each image coming through the data flow (in the
    **Derived Column** transformation). You can see this in Figure 8-13.


    *Figure 8-13. Choosing the input column that points to the file to be imported*


    The input column you choose in the first step tells the **Import Column** transformation
    which file to import into the data flow. As in our example, the task should contain
    a full path to the file.


    The next step to configure this transformation is to add an output column to the
    **Input and Output Properties**. This column will hold the contents of the file
    after the **Import Column** reads it in. The following are appropriate data types
    for this new output column:


    *   `image [DT_IMAGE]` for binary data such as images, word processing files,
    or spreadsheets

    *   `text stream [DT_TEXT]` for text data such as ASCII text files

    *   `Unicode text stream [DT_NTEXT]` for Unicode text data such as Unicode text
    files and UTF-16 encoded XML files


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-264_1.jpg)


    ## CHAPTER 8 - DATA FLOW TRANSFORMATIONS


    One of the more arcane aspects of **Import Column** is the configuration of the
    input column on the **Input and Output Properties** tab. To configure the input
    column, grab a pen and paper (yes, a pen and paper!) and write down the number
    you see next to the **ID** property for your output column. In our example, the
    number is `201`.


    Then edit the input column on the same tab. Scroll to the bottom of the page and
    type the number you just wrote down into the **FileDataColumnID** property. If
    you’re loading Unicode data, you can set the **ExpectBOM** property to `True`
    if your data has a byte order mark (BOM), or `False` if it doesn’t. This is shown
    in Figure 8-14.


    *Figure 8-14. Finishing up configuration of the Import Column transformation*


    Finally, if you expect your input column to have nulls in it, you may want to
    change the **ErrorRowDisposition** property from the default `RD_FailComponent`
    to `RD_IgnoreFailure` or `RD_RedirectRow`. If `RD_IgnoreFailure` or `RD_RedirectRow`
    is set, the component will not throw an exception if it hits a null. Unfortunately,
    there’s no way for this component to handle nulls separately from actual file
    paths that don’t exist (you can handle this separately with additional data flow
    components if you want). The end result of properly configuring **Import Column**
    is that the data contained in the image files referenced by the input column are
    added to the data flow’s new output column.


    ## HANDLING ERROR ROWS


    Data Flow transformations in SSIS give you considerable flexibility in handling
    error rows. Many of the components give you granular error handling, allowing
    you to choose different error handling for different types of exceptions that
    can occur. In some components, for instance, you can handle truncation differently
    from other errors.


    The **Import Column** transformation error has less-granular error handling—rows
    either error out (for any reason) or they don’t. Regardless of the error-handling
    granularity of the transformation you’re using, you will have a few options for
    dealing with error rows:


    *   `RD_FailComponent` causes the component to fail when an error is encountered;
    this is the default error handling for most transformations.

    *   `RD_IgnoreFailure` simply ignores errors as they occur.

    *   `RD_RedirectRow` redirects error-causing rows to the error output of a component.


    In other components with less-arcane interfaces, you’ll see these same choices
    in their editors, but with friendlier names. In these components, you’ll see the
    options listed as *Ignore Failure*, *Redirect Row*, and *Fail Component*. These
    choices are equivalent to the `RD_` options in the preceding list.


    ## OLE DB Command


    The **OLE DB Command** transformation is an interesting row transformation that
    executes a SQL statement for each and every row that passes through the transformation.
    Most often, you’ll see the **OLE DB Command** transformation used to issue update
    statements against individual rows, primarily because SSIS doesn’t yet have a
    **Merge Destination** that will do the job for you in a bulk update.


    **NOTE:** The **OLE DB Command** transformation uses a processing model known
    as Row by Agonizing Row, or RBAR (a term popularized by SQL guru and Microsoft
    MVP Jeff Moden). In terms of SQL, this is not considered a best practice for large
    sets of data.


    To demonstrate, we set up a data flow that reads an Excel spreadsheet containing
    updates to the restaurant information we loaded earlier and then applies the updates
    to the database. Figure 8-15 shows **OLE DB Command** in the data flow.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-266_1.jpg)


    ## CHAPTER 8 - DATA FLOW TRANSFORMATIONS


    *Figure 8-15. Data flow with an OLE DB Command transformation*


    All changes to the **OLE DB Command** transformation are made in an **Advanced
    Editor** window with four tabs. The **Connection Managers** tab lets you choose
    the **OLE DB Connection Manager** the transformation will issue SQL statements
    against. In Figure 8-16, the **Restaurant_DB** connection manager is selected.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-267_1.jpg)


    ## CHAPTER 8 - DATA FLOW TRANSFORMATIONS


    *Figure 8-16. Connection Managers tab of the Advanced Editor for OLE*


    The **Component Properties** tab lets you set the **SqlCommand** property of the
    **OLE DB Command** transformation. The **SqlCommand** property holds the SQL statement
    you want executed against each row passing through the transformation. You can
    edit the **SqlCommand** property with the **String Value Editor** dialog box,
    accessed from the **Component Properties** tab, as shown in Figure 8-17. In this
    instance, we’ve set it to a simple parameterized `UPDATE` statement.


    ### PARAMETERIZED SQL STATEMENTS


    Parameterization allows you to dynamically replace values in your SQL statements.
    When you parameterize SQL, the statement and parameter values are sent to the
    server separately. The server dynamically substitutes the parameterized values
    in the SQL statement at execution time. Parameterized SQL is safer than building
    SQL statements by concatenating strings, which can leave your code susceptible
    to SQL injection attacks. Parameterized SQL can also provide performance benefits
    due to cached query plan reuse.


    The OLE DB providers, in particular, use a question mark (`?`) as a parameter
    placeholder (some other providers use different parameter placeholders). In our
    example, we used the following parameterized SQL statement:


    ```sql

    UPDATE dbo.Restaurant

    SET Restaurant_Address = ?

    WHERE Restaurant_Name = ?;

    ```


    SQL Server substitutes the parameter markers with actual values at execution time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-268_1.jpg)


    ## CHAPTER 8 - DATA FLOW TRANSFORMATIONS


    *Figure 8-17. Component Properties tab of the Advanced Editor for OLE*'
