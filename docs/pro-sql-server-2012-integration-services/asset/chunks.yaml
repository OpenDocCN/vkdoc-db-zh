    task grabs the specified source data, analyzes it based on the criteria you specify,
    and outputs the results to an XML file. The Data Profiling task is shown in Figure
    12-1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-427_1.jpg)


    ![](index-427_2.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-1\. Data Profiling task in a package control flow*


    The Data Profiling task requires a File Connection Manager pointing to the XML
    file you want it to create or overwrite. We configured our File Connection Manager
    to point at a file named C:\SampleData\ProfileOutput.xml, as shown in Figure 12-2.


    *Figure 12-2\. Configuring the File Connection Manager to point at an XML output
    file* One drawback of the Data Profiling task is that it is limited to data that
    can be retrieved via an ADO.NET Connection Manager. The Data Profiling task requires
    a connection to SQL Server and uses the *SqlClient Data Provider*, shown by the
    ADO.NET Connection Manager Editor in Figure 12-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-428_1.jpg)


    CHAPTER 12 DATA PROFILING AND SCRUBBING


    *Figure 12-3\. Connection Manager editor providers*'
