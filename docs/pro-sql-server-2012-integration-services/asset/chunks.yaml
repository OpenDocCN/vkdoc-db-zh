    ![](index-552_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    The final step of the Type 1 SCD update is a single update-or-insert (upsert)
    operation from the staging table to the dimension table. The T-SQL MERGE statement
    is perfectly suited for this job. The MERGE statement lets you perform UPDATE
    and INSERT operations in a single statement, as shown here: MERGE INTO dbo.DimProduct
    AS Target


    USING Staging.DimProduct AS Source


    ON Target.UPC = Source.UPC


    WHEN MATCHED AND Target.Hash <> Source.Hash


    THEN UPDATE SET Target.Category = Source.Category,


    Target.Manufacturer = Source.Manufacturer,


    Target.ProductName = Source.ProductName,


    Target.Size = Source.Size,


    Target.Price = Source.Price,


    Target.Hash = Source.Hash


    WHEN NOT MATCHED


    THEN INSERT (UPC, Category, Manufacturer, ProductName, Size, Price, Hash)


    VALUES (Source.UPC, Source.Category, Source.Manufacturer, Source.ProductName,
    Source.Size, Source.Price, Source.Hash);


     **NOTE:** MERGE provides a means to incorporate INSERT, UPDATE, and DELETE in
    one statement. However, separating these steps into individual statements can
    improve overall performance. Compare the costs of both methods to ensure that
    the most efficient query is used.


    The notable shortcoming of a Type 1 SCD is that historical values will be lost
    to an update of the current value. However, the update process is easier than
    a Type 2 or Type 3 SCD and also uses less space, as long-term history is not maintained.


    Type 2 Dimensions


    Because they maintain a long-term history of attribute values, *Type 2 dimensions*
    are slightly more complex to manage than Type 1 dimensions. The schema of a Type
    2 SCD table differs from a Type 1


    SCD in that it can contain up to three extra columns to denote a current or historic
    version. The additional column(s) allow the dimension table to contain the historic
    values rather than overwriting the affected column(s) with the current value.
    The dimension could contain a single column that indicates whether the row has
    the most current value, as displayed in Figure 17-9.


    *Figure 17-9\. Type 2 SCD result set*


    While new or updated values are always inserted into Type 2 dimensions, there
    are additional flags on existing rows that must also be updated, such as the effective
    date, end date, or active column.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-553_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    Adding a column to indicate only whether the row is the most current enables you
    to ensure that all historic changes are kept, but not to define when the specific
    row was active. The addition of both an active column and an end-date column would
    provide the means of maintaining historic values that can then be associated with
    the proper time frame.


    The Active column denotes whether the row holds the current value, but lacks the
    ability to track when the value(s) were in effect. The dimension table could include
    a start- and end-date column, which could maintain the historic values and times,
    when the end date is NULL this represents the current value, or an effective date
    column and a column representing active or historic. The process of updating a
    Type 2 SCD is shown in Figure 17-10.


    *Figure 17-10\. Type 2 SCD update flow*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-554_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    SSIS provides a Data Transformation task that can be used for both Type 1 and
    Type 2 SCDs. The first step in using the SCD transformation task for a Type 2
    SCD is to decide whether you are going to track changes in your table by either
    using a simple indicator to identify current and expired records, or using effective
    dates. The component doesn’t natively allow you to use both, although you can
    customize the output to do so. Figure 17-11 demonstrates using a SCD transformation
    task in a data flow.


    *Figure 17-11\. SSIS slowly changing dimension component*


    Type 3 Dimensions


    A Type 3 SCD tracks changes by using separate columns, which limits the history
    to the number of columns that can be added to the dimension table. This obviously
    provides limitations, and the dimension table will begin to look more like a Microsoft
    Excel spreadsheet, as shown in Figure 17-12.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-555_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    *Figure 17-12\. Query results of a Type 3 SCD*


    There are several complexities in implementing a Type 3 SCD—first and foremost
    modifying the table schema for each update, which make this a less than desirable
    means of tracking historic attributes, As a Type 3 SCD is limiting and requires
    changing the schema of the dimension table, it is not supported in the SCD Transformation
    task. It is possible to use an Execute SQL task to automate updating a Type 3


    SCD, but if at any point the dimension table was referenced in a Data Flow task,
    it would fail the validation phase based on the schema change. The issues don’t
    end with the processing of the dimension, but also include using the dimension
    in an SSAS cube or for a report, again as based on the ever-changing schema. Although
    utilizing a Type 3 SCD is an option, utilizing a Type 1 or 2 SCD is preferable.


    Summary


    This chapter introduced several tools and methods for optimizing your SSIS packages.
    Many of these optimizations rely on performing operations at the source when possible
    and limiting the data pulled through the ETL process. We also discussed the different
    types of dimensions and outlined ways that each dimension could be updated. In
    the next chapter, we’ll consider the powerful SSIS parent-child design pattern.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 18**


    **Building Robust Solutions**


    *The egoism which enters into our theories does not affect their sincerity; rather,
    the* *more our egoism is satisfied, the more robust is our belief.*


    —Novelist George Eliot


    Developing an SSIS package typically focuses on the known—the data source, transformations,
    and destinations—and fails to address the unknown—schema changes, data type mismatches,
    and a changing network environment. Obviously, all development must come from
    a starting point—the known. However, in order to ensure that an SSIS package provides
    portability, stability, and resilience, it is critical to handle the unknown and
    to record the unidentified and inconsistent behavior. This chapter outlines the
    steps necessary to plan and handle the unexpected within an SSIS package.


    What Makes a Solution Robust


    Quite often an SSIS solution is created to fulfill an easily defined process in
    a specific and static environment. The source and destination schema are considered
    immutable and unchanging, and there is no accounting for change or error. This
    type of project is effortlessly created and quickly deployed, but frequently the
    developer fails to play *what if* in such cases and thus provides little means
    for the following:


     Tracking of:


    o Performance


    o Error information


    o Historic metrics


     Handling variations to:


    o Sources


    o Connections


    o Schema


     Portability and ease of deploying to different environments


    There are several factors to be considered when attempting to create a robust
    solution: Resilience: The capability of a package to proactively deal with errors,


    document them, and still complete


