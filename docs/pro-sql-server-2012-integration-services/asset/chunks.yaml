    右键单击控制流背景，或右键单击某个对象并选择`参数化`时，会出现`参数化`对话框。使用此对话框可以创建您所需的任何新参数。所有包参数都可以在已添加到`BIDS`的新`参数`设计器窗口中查看。该设计器窗口如图
    9-4 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-330_1.jpg)


    ![](img/index-330_2.jpg)


    ## 第九章  变量、参数与表达式


    *图 9-4. `参数`设计器窗口*


    `项目参数`可用于项目中包含的所有包。添加项目参数会在解决方案中创建一个文件，允许您查看项目级别的所有参数。Visual Studio 有一个专门用于项目参数的设计器窗口，如图
    9-5 所示。


    *图 9-5. 项目级参数*


    以下是各种参数的说明：


    -   `名称` 指定项目参数的名称。

    -   `数据类型` 指定参数的数据类型。

    -   `值` 为参数提供默认值。

    -   `敏感` 指定参数中包含的数据是否敏感。这样，敏感数据可以根据项目的安全级别进行加密、不保存或保持原样。如果参数中包含用户名和密码信息，此字段可能会派上用场。

    -   `必需` 指定在包部署到服务器后，其执行期间必须提供此参数。

    -   `描述` 提供参数的简短概要。


    参数不仅仅局限于修改包属性。它们可以像其他变量一样在`表达式生成器`中访问。这使得您可以访问在项目级别设置的字符串或整数值，而无需像旧版本那样担心保持多个包变量同步。借助此功能，将不再需要配置文件来跨多个包维护变量值。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第九章  变量、参数与表达式


    ### SSIS 数据类型


    与大多数编程语言一样，SSIS 变量也需要数据类型。这些数据类型大部分与 SQL Server 数据类型相对应。从 SQL Server 提取数据时，每列都被识别为这些数据类型之一。`数据转换`任务将使用这些数据类型来转换来自其他源的数据，以便数据可以无缝映射到
    SQL Server 数据库。


    表 9-1 显示了 SSIS 使用的数据类型。我们包含了一列，展示了可在表达式中用于转换值的`类型转换`函数。您可以按以下方式在表达式中使用这些函数：`(<</*类型转换函数*/>>
    [, <</*参数 1*/>>, <</*参数 2*/>>, … ]) (<</*表达式*/>>)`。


    表达式周围的括号不是必需的，但将更容易确定正在被类型转换的内容。


    *表 9-1. SSIS 数据类型*


    | **数据类型** | **描述** | **范围/大小** | **类型转换函数** |

    | :--- | :--- | :--- | :--- |

    | `DT_BOOL` | 布尔值。 | True/False。 | `(DT_BOOL)` |

    | `DT_BYTES` | 二进制数据值。 | 最大大小为 8,000 字节的二进制数据。 | `(DT_BYTES, «长度»)` |

    | `DT_CY` | 货币值。 | 精度和小数位数为 (19,4) 的 8 字节有符号整数。 | `(DT_CY)` |

    | `DT_DATE` | 支持 YYYY/MM/DD HH:MM:SS 的日期数据类型。由浮点数提供，其整数部分代表日期，小数部分代表时间戳。 | 0001/01/01
    00:00:00–9999/12/31 23:59:59。 | `(DT_DBDATE)` |

    | `DT_DBDATE` | 支持 YYYY/MM/DD 的日期数据类型。 | 0001/01/01–9999/12/31。 | `(DT_DBDATE)`
    |

    | `DT_DBTIME` | 支持 hh:mm:ss 的时间数据类型。 | 00:00:00–23:59:59。 | `(DT_DBTIME)` |

    | `DT_DBTIME2` | 支持 hh:mm:ss[.fffffff] 的时间数据类型。 | 00:00:00.0000000–23:59:59.9999999。
    | `(DT_DBTIME2, «小数位数»)` |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第九章  变量、参数与表达式


    | **数据类型** | **描述** | **范围/大小** | **类型转换函数** |

    | :--- | :--- | :--- | :--- |

    | `DT_DBTIMESTAMP` | 日期数据类型... | 1753/01/01 | `(DT_DBTIMESTAMP)` |

