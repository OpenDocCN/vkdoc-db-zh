    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-364_1.jpg)\n\n\
    **Figure 10-4. Choosing variables from the Select Variables dialog box**\n\nTo\
    \ write your script, click the `Edit Script` button to open the Visual Studio\
