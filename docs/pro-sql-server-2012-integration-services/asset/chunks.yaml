    ## Chapter 1: Introducing Integration Services


    *I’m the glue that holds everything together.*

    —Singer Otis Williams


    Your business analysts have finished gathering business requirements. The database
    architect has designed and built a database that can be described only as a work
    of art. The BI architects are designing their OLAP cubes and the dimensional data
    marts that feed them. On the other hand, maybe you’re a one-man show and have
    designed and built everything yourself. Either way, the only piece that’s missing
    is a tool to bring it all together. Enter SQL Server Integration Services (SSIS).


    Like Otis Williams, cofounder of the Motown group the Temptations, SSIS is the
    glue that holds it all together. More than that, SSIS is the circulatory system
    of your data warehousing and BI solutions. SSIS breathes life into your technical
    solutions by moving data—the lifeblood of your organization—from disparate sources,
    along well-known paths, and injecting it directly into the heart of your system.
    Along the way, SSIS can validate, cleanse, manipulate, transform, and enrich your
    data for maximum effectiveness.


    In this book, we’ll take you on a tour of SSIS, from building your very first
    SSIS package to implementing complex multipackage design patterns seamlessly.
    This chapter introduces you to SSIS and the concepts behind extract, transform,
    and load (ETL) processes in general. We begin at the beginning, with a brief history
    of ETL, Microsoft-style.


    ### A Brief History of Microsoft ETL


    Before we dive headfirst into the details of Microsoft’s current-generation ETL
    processing solution, it’s important to understand just what ETL is. As we have
    stated, *ETL* is an acronym for *extract, transform,* *and load*, which is a very
    literal description of modern data manipulation and movement processes.


    When we talk about ETL, we are specifically talking about (1) *extracting* data
    from a source, such as a database or flat files; (2) *transforming* data, or manipulating
    and enriching it en route to its destination; and (3) *loading* data into its
    destination, often a database.


    Over the years, business requirements for data processing in nearly any industry
    you can point to have grown more complex, even as the amount of data that needs
    to be processed has increased exponentially. Unfortunately, the number of hours
    in a day has remained fairly constant over the same time period, meaning you’re
    stuck with the same limited processing window each day to transport and manipulate
    an ever-growing magnitude of data. ETL solutions have become increasingly sophisticated
    and robust in response to these increased data processing demands of performance,
    flexibility, and quality.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    So we’ll begin our journey into SSIS by looking at how ETL has evolved in the
    SQL Server world. Up to SQL Server 6.5, the *bulk copy program (bcp)* was the
    primary tool for loading data into SQL Server databases. A command-line utility,
    `bcp` made loading basic text files into database tables fairly simple.


    Unfortunately, the flip side of that simplicity was that you could use `bcp` only
    to load data from flat files, and you couldn’t perform additional validations
    or transformations on the data during the load. A common database-to-database
    ETL scenario with `bcp` might include extracting data from a database server to
    a delimited text file, importing the file into a SQL Server database, and finally
    using T-SQL to perform transformations on the data in the database. The `bcp`
    utility is still provided with all versions of SQL Server, and is still used for
    simple one-off data loads from flat files on occasion.


    In response to the increasing demands of ETL processing, Data Transformation Services
    (DTS) made its first appearance in SQL Server 7. With DTS, you could grab data
    from a variety of sources, transform it on the fly, and load it into the database.
    Although DTS was a much more sophisticated tool than `bcp`, it still lacked much
    of the functionality required to develop enterprise-class ETL solutions.'
