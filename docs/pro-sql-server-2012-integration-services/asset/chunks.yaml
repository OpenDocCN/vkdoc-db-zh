    `WQLQuerySourceType` 定义了将查询传递给任务的方法。`直接输入` 选项允许你在 `WQLQuerySource` 字段中键入 WQL 查询。`文件连接`
    表示查询存储在一个可通过文件连接管理器访问的文件中。`变量` 选项允许查询存储在 SSIS 变量中。


