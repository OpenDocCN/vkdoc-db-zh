  trans: "\n# 第 13 章 日志记录与审计\n\n## 包级别审计\n\n我们的包级别审计功能记录了包标识和执行信息，包括一个执行 GUID，您可以用它关联回\
    \ SSIS 日志表。这为 SSIS 日志条目添加了上下文，并提供了可用于按包进行故障排除的额外信息。\n\n为了存储包审计信息，我们创建了一个 `AuditPackage`\
    \ 表，其中包含包信息，包括名称、版本和一个 GUID，该 GUID 可用于将此表中的条目与 SSIS 日志条目关联（如果您使用适用于 SQL Server\
    \ 的 SSIS 日志提供程序）。以下是创建该表的代码：\n\n```sql\nIF OBJECT_ID ('Audit.AuditPackage') IS\
    \ NOT NULL\n    DROP TABLE Audit.AuditPackage;\nGO\n\nCREATE TABLE Audit.AuditPackage\n\
    (\n    AuditPackageID BIGINT NOT NULL IDENTITY(1, 1),\n    BatchID BIGINT NOT\
    \ NULL,\n    PackageName NVARCHAR(128),\n    ExecutionInstanceGUID UNIQUEIDENTIFIER,\n\
    \    ProductVersion NVARCHAR(20),\n    MachineName NVARCHAR(128),\n    VersionMajor\
    \ INT,\n    VersionMinor INT,\n    VersionBuild INT,\n    LocaleID INT,\n    PackageStartTime\
    \ DATETIMEOFFSET,\n    PackageEndTime DATETIMEOFFSET,\n    PackageElapsedTimeMS\
    \ AS (DATEDIFF(MILLISECOND, PackageStartTime, PackageEndTime)),\n    CONSTRAINT\
    \ PK_AUDIT_AUDITPACKAGE PRIMARY KEY CLUSTERED\n    (\n        AuditPackageID\n\
    \    )\n);\nGO\n```\n\n我们为包审计创建了两个过程：`StartAuditPackage` 用于启动审计过程，`EndAuditPackage`\
    \ 用于结束审计。启动过程在每次调用后返回一个唯一的包审计 ID 号。同一个审计 ID 号被传入结束过程以完成审计条目。代码如下：\n\n```sql\n\
    IF OBJECT_ID('Audit.StartAuditPackage') IS NOT NULL\n    DROP PROCEDURE Audit.StartAuditPackage;\n\
    GO\n\nCREATE PROCEDURE Audit.StartAuditPackage\n    @ExecutionInstanceGUID UNIQUEIDENTIFIER,\n\
    \    @ProductVersion NVARCHAR(20),\n    @MachineName NVARCHAR(128),\n    @VersionMajor\
    \ INT,\n    @VersionMinor INT,\n    @VersionBuild INT,\n    @LocaleID INT,\n \
    \   @PackageName NVARCHAR(128),\n    @BatchID BIGINT,\n    @AuditPackageID BIGINT\
    \ OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    INSERT INTO Audit.AuditPackage\n\
    \    (\n        PackageName,\n        BatchID,\n        ExecutionInstanceGUID,\n\
    \        ProductVersion,\n        MachineName,\n        VersionMajor,\n      \
    \  VersionMinor,\n        VersionBuild,\n        LocaleID,\n        PackageStartTime\n\
    \    )\n    VALUES\n    (\n        @PackageName,\n        @BatchID,\n        @ExecutionInstanceGUID,\n\
    \        @ProductVersion,\n        @MachineName,\n        @VersionMajor,\n   \
    \     @VersionMinor,\n        @VersionBuild,\n        @LocaleID,\n        SYSDATETIMEOFFSET()\n\
    \    );\n    SET @AuditPackageID = SCOPE_IDENTITY();\nEND;\nGO\n\nIF OBJECT_ID('Audit.EndAuditPackage')\
    \ IS NOT NULL\n    DROP PROCEDURE Audit.EndAuditPackage;\nGO\n\nCREATE PROCEDURE\
    \ Audit.EndAuditPackage\n    @AuditPackageID BIGINT\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    UPDATE Audit.AuditPackage\n    SET PackageEndTime = SYSDATETIMEOFFSET()\n\
    \    WHERE AuditPackageID = @AuditPackageID;\nEND;\nGO\n```\n\n## 向包添加审计\n"
- fmt: "# 日志与审计\n\n## 带有审计调用的示例包\n\n审计可以通过在流程中加入执行 SQL 任务来调用相应的存储过程来添加到您的流程中。在我们的示例包中，我们创建了两个\
    \ 64 位整型（Int64）变量，分别命名为`User::AuditBatchID`和`User::AuditPackageID`。我们按照图 13-8\
    \ 所示设置我们的示例包。\n\n*图 13-8. 带有审计调用的示例包*\n\n此示例中的数据流任务被起始和结束审计调用所包装，顺序如下：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-479_1.jpg)\n\n- **SQL – Start Batch Audit**：开始批处理审计过程。调用起始批处理审计过程并返回唯一的批处理审计\
    \ ID。此 ID 用于设置包中的变量。\n- **SQL – Start Package Audit**：开始包审计过程。调用起始包审计过程并返回唯一的包审计\
    \ ID，该 ID 用于设置相应的包变量。我们将几个系统变量传递给此过程，以便将它们保存在包审计表中。\n- **SQL – End Package Audit**：结束包审计过程。此过程在包级别关闭审计循环，记录审计完成信息。\n\
    - **SQL – End Batch Audit**：完成批处理审计过程。在所有包完成后，调用结束批处理审计过程以完成批处理级别的审计。记录的批处理审计信息包括表大小变化信息。\n\
    \n正如我们提到的，您捕获的审计信息可以通过`Execution Instance GUID`连接回标准的 SSIS 日志表。此 GUID 将为您提供与任何给定包执行相关的所有日志消息，使用类似于以下的查询。示例结果如图\
    \ 13-9 所示。\n\n```sql\nSELECT au.AuditPackageID,\n       au.BatchID,\n       au.PackageName,\n\
    \       au.MachineName,\n       au.PackageStartTime,\n       au.PackageEndTime,\n\
    \       s.event,\n       s.source,\n       s.message\nFROM Audit.AuditPackage\
    \ au\nINNER JOIN dbo.sysssislog s\nON au.ExecutionInstanceGUID = s.executionid;\n\
    GO\n```\n\n*图 13-9. 连接到 SSIS 日志表的审计数据示例结果*\n\n## 简单的数据血缘\n\n我们在本章中描述的审计过程的一个优点是，您可以轻松地扩展它以包含简单的数据血缘流程。*数据血缘*\
    \ 是一个过程，通过它可以追溯数据的来源，本质上是逆向工程数据到达其当前状态所经历的过程。在本节展示的最简单形式中，您可以使用数据血缘信息来确定哪些 ETL\
    \ 流程处理了您的数据，并确定其衍生的确切来源。\n\n> **注意：** Microsoft 在 SQL Server Denali 的早期预发布版本中引入了一项名为\
    \ *影响和数据分析 (IAL)* 的新功能。IAL 本应开箱即用地提供企业级数据血缘功能。可惜的是，该功能在发布到市场 (RTM) 之前因“大修”而被撤回。因此，在\
    \ Microsoft 的解决方案发布之前，我们必须实现自己的数据血缘流程。经过改进的 IAL 预计将在 SQL Server Denali 之后不久作为\
    \ Project Barcelona 的一部分发布（更多信息请访问 http://blogs.msdn.com/b/project_barcelona_team_blog/）。\n\
    \n我们为简单数据血缘解决方案需要记录的大部分信息已经存储在批处理和包审计表中。这包括开始和停止时间、特定的包和平台标识信息以及相关的标准日志条目。所有这些信息都可以用来逆向工程您的流程，但缺少一些项目。在您逐步回溯流程后，您需要最终确定数据的来源，并且您可能实际上需要审计解决方案未捕获的额外支持数据。"
  raw: 'Auditing can be added to your process by including Execute SQL tasks to call
    the appropriate stored procedures. In our sample package, we created two 64-bit
    integer (Int64) variables named User::AuditBatchID and User::AuditPackageID. We
    set up our sample package as shown in Figure 13-8.


    *Figure 13-8.Sample package with auditing calls*


    The Data Flow task in this example is wrapped with start and end audit calls,
    in the following order: 480


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-479_1.jpg)


    CHAPTER 13  LOGGING AND AUDITING


     SQL – Start Batch Audit begins the batch audit process. Calls the start batch
    audit procedure and returns a unique batch audit ID. This is used to set the variable
    in the package.


     SQL – Start Package Auditbegins the package audit process. Calls the start


    package audit procedure and returns a unique package audit ID, which sets the


    appropriate package variable. We pass several system variables to this procedure
    so they can be saved in the package audit table.


     SQL – End Package Audit ends the package audit process. This procedure closes
    up the auditing loop at the package level, recording audit finalization information.


     SQL – End Batch Audit completes the batch audit process. Calls the end batch
    audit procedure to finish auditing at the batch level after all packages are


    complete. The batch audit information recorded includes the change in table size
    information.


    As we mentioned, the audit information you capture can be joined back to the standard
    SSIS log tables via the Execution Instance GUID. This GUID will give you all the
    log messages relevant to any given package execution, using a query such as the
    following.Sample results are shown in Figure 13-9.


    SELECT au.AuditPackageID,


    au.BatchID,


    au.PackageName,


    au.MachineName,


    au.PackageStartTime,


    au.PackageEndTime,


    s.event,


    s.source,


    s.message


    FROM Audit.AuditPackage au


    INNER JOIN dbo.sysssislog s


    ON au.ExecutionInstanceGUID = s.executionid;


    GO


    *Figure 13-9\. Sample results of audit data joined to the SSIS log table*


    Simple Data Lineage


    One of the advantages of an auditing process as we’ve described it in this chapter
    is that you can easily extend it to include simple data lineage processes. *Data
    lineage* is a process by which you can trace data 481


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13  LOGGING AND AUDITING


    back to its source, essentially reverseengineering the processes by which your
    data arrived in its current state. In its simplest form, which we demonstrate
    in this section, you can use data lineage information to determine which ETL processes
    manipulated your data and determine the precise source from which it is derived.


     **NOTE:** Microsoft introduced a new feature known as *Impact and Data Lineage
    Analysis (IAL)* in early prerelease versions of SQL Server Denali. IAL was supposed
    to provide enterprise data lineage features out of the box. Alas, this feature
    was pulled prior to Release to Market, RTM, for an “overhaul.” So for now we must
    implement our own data lineage process until Microsoft’s offering is released.
    The revamped IAL is expected to be released shortly after SQL Server Denali as
    part of Project Barcelona (more information is available at http://blogs.msdn.com/b/project_barcelona_team_blog/).


    The majority of the information we’ll need to record for our simple data lineage
    solution is already stored in the batch and package auditing tables. This includes
    the start and stop times, specific package and platform identification information,
    and related standard log entries. All of this information can be used to reverseengineer
    your process, but there are a few items missing. After you’ve stepped backward
    through your process, you need to ultimately determine where your data came from,
    and you may in fact need additional supporting data that’s not captured by the
    auditing solution.'
