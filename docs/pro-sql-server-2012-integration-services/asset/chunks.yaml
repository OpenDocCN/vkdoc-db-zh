    to the `Errors` file destination, select the `Advanced` configuration and make
    sure that the `LastName` column is set to `Unicode String` with a column width
    of 50, as shown in Figure 18-7.


    ### NOTE

    Adjust the target filename of the destination as needed to ensure that the path
