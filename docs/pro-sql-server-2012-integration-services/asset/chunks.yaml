- fmt: '# CHAPTER 5  CONTROL FLOW BASICS


    ## Bulk Insert Task


    The `Bulk Insert task` provides an extremely efficient option for EL processing.
    By circumventing the transform capabilities of the Data Flow task, the `Bulk Insert
    task` can quickly load vast amounts of data from a flat file source into a SQL
    Server table. This task supplies functionality similar to the `BCP` command available
    in SQL Server but imports data only into SQL Server. Figure 5-13 demonstrates
    what the component looks like in the control flow. The icon shows the database
    cylinder with some binary data overlapping it.


    *Figure 5-13. Bulk Insert task*


    `www.it-ebooks.info`


    ### Considerations Before Using the Bulk Insert Task


    The source data file must exist on a server accessible by the host server, because
    it is the host server that will execute the `Bulk Insert task`. When accessing
    a remote server, Universal Naming Convention (`UNC`) must be used to indicate
    the file path and name. The task will use only the file’s connection manager for
    the location of the file. The delimiter information and the header row information
    needs to be specified to the task. A format file can be used in conjunction with
    the `Bulk Insert task`, but that file must exist on the server. Only an `OLE DB
    Connection Manager` can be used to connect to the destination database.


    The account used to execute the `Bulk Insert task` needs to have system administrator
    (`sysadmin`) rights to the server. The `Bulk Insert task` will “map” the columns
    based on the order of appearance in the source file and the ordinal position in
    the table definition.


    ### Bulk Insert Task Editor—Connection Page


    The Connection page of the Bulk Insert Task Editor allows you to define the source
    and destination of the data, as well as the format of the source data file. The
    connection for the destination must be an `OLE DB Connection Manager`. To specify
    the format information, you can either define it directly in the task itself or
    you can point the task to a format file stored on the file system. The `Format`
    list enables you to choose the formatting options. `RowDelimiter` provides the
    character combination that marks the end of a data row. `ColumnDelimiter` allows
    the task to identify the character combination that signifies the end of a column.
    Even though you may have defined the format information on the file connection
    manager, it will be ignored by the `Bulk Insert task`, as Figure 5-14 demonstrates.
    The `File` is a drop-down list of all the file connection managers that exist
    in the package.


    `www.it-ebooks.info`


    ![](index-129_1.jpg)


    *Figure 5-14. Bulk Insert Task Editor—Connection page*


    ### Bulk Insert Task Editor—Options Page


    The Options page of the Bulk Insert Task Editor allows you to define the properties
    of the actual process itself. The configuration enables you to specify properties
    of the source as well as the destination. As Figure 5-15 shows, the options are
    divided into two groups: Advanced Options and Options.


    `www.it-ebooks.info`


    ![](index-130_1.jpg)


    *Figure 5-15. Bulk Insert Task Editor—Options page*


    Following are the options and what they control:


    `CodePage` identifies the code page of the source data in the file.


    `DataFileType` defines the data type to use during the load into the destination.


    `BatchSize` defines the number of rows per batch. The default value, `0`, indicates
    that the entire load operation should be part of one batch.'
