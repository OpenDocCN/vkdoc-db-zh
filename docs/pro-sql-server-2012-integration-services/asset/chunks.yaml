    When you choose the <New> connection manager, the Connection Manager Editor pops
    up. The editor is specific to the type of connection manager you want to create—the
    Flat File Connection Manager Editor has different properties from the SQL Server
    Connection Manager Editor. The Flat File Connection Manager Editor is shown in
    Figure 7-4.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-207_1.jpg)


