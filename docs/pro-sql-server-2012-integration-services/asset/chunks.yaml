    Copy Column


    The Copy Column transformation creates copies of columns you designate. Figure
    8-8 extends the example we’ve been working on to include a Copy Column transformation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-258_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-8\. Adding Copy Column to the data flow*


    The editor for this transformation is simple: just check off the columns you want
    to copy. The duplicated columns are named Copy of *<column name>* by default.
    You can edit the Output Alias field to change this to a more meaningful name if
    you choose to. The Copy Column transformation we’ve added will create a copy of
    the Picture Name column, as you can see in Figure 8-9.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-259_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-9\. Editing the Copy Column transformation in the editor*


    Derived Column


    The Derived Column transformation is one of the most widely used, and flexible,
    row transformations available in SSIS. This transformation lets you create new
    columns, or replace existing columns, with values calculated from expressions
    that you create with the SSIS Expression Language. The *SSIS*


    *Expression Language* sports a powerful and flexible syntax supporting mathematical
    operators and functions, data type conversions, conditional expressions, string
    manipulation, and null handling.


    ■ **NOTE:** We dive into the details of the SSIS Expression Language in Chapter
    9.


    To create a Derived Column transformation, we drag it from the toolbar and place
    it in the data flow between the source and destination. We’ll build on the previous
    example by adding a Derived Column transformation, as shown in Figure 8-10.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-260_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-10\. Derived Column transformation in a simple data flow*


    The Derived Column transformation lets us define expressions, the results of which
    will be added to the output in new columns (or will replace existing columns).
    Figure 8-11 shows the Derived Column Transformation Editor as it appears in this
    example.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-261_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    *Figure 8-11\. Editing the Derived Column transformation*


    As you can see in the transformation editor, two columns have their values replaced
    with the results of expressions. The new columns are populated with the results
    of expressions, which are written in the SSIS Expression Language. This powerful
    language lets you perform mathematical calculations and string manipulation on
    variables, columns, and constants. The expressions we used for the Picture Name
    and Copy of Picture Name columns look like this:


    Picture Name  "C:\\SampleData\\" + [Picture Name]


    Backup Picture Name  "C:\\SampleData\\Backup\\" + [Picture Name]


    These expressions use the string concatenation feature of SSIS Expression Language
    to prepend a file path to the picture name passed into the transformation. SSIS
    Expression Language uses C#-style syntax, including escape characters, which is
    why we had to double up the backslashes (\) in the expressions. The result is
    two full paths to files in the file system. Although these expressions are fairly
    simple and straightforward, we implemented a more complex derived column that
    calculates a letter grade based on the NYC Health Department grading scale. The
    result is stored in a new column that is added to the data flow, called Grade:


    Grade  (Restaurant_Violation_Points >= 28)?"C":(Restaurant_Violation_Points >=
    14)?"B":"A"


    This expression uses the *conditional operator* (?:) to assign a grade to each
    restaurant based on the NYC Health Department grading scale. This scale assigns
    a grade of A to restaurants with 0 to 13


    violation points, B to restaurants with 14 to 27 violation points, and C to restaurants
    with 28+ points. The conditional operators in this example model those rules exactly.


    As you read the expression from left to right, you’ll notice the first Boolean
    expression (Restaurant_Violation_Points >= 28), which returns True or False. If
    the result is true, the conditional operator returns the value after the question
    mark (C, in this case). If the result is false, the second 261


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-262_1.jpg)


    CHAPTER 8  DATA FLOW TRANSFORMATIONS


    Boolean expression, (Restaurant_Violation_Points >= 14), is evaluated. If it returns
    True, B is returned; if False, A is returned.


    ■ **NOTE:** The SSIS Expression Language is a powerful feature of SSIS. If you’re
    not familiar with the functions and operators we’ve used in this example, don’t
    fret. We cover these and more in a detailed discussion of the SSIS


    Expression Language in Chapter 9.


