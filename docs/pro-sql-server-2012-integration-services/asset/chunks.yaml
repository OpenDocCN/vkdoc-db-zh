    Script Component Events


    Script components in the data flow also allow you to fire events. Within script
    components, you can log entries by using the Log() method. This is the script
    component equivalent of the Script task’s Dts.Log() method. Like the Dts.Event
    object, the ComponentMetaData object exposes a handful of Fire methods to fire
    events. These methods are listed in Table 11-9.


    *Table 11-9\. Script Component Event-Firing Methods*


    **Method Fires...**


    ComponentMetaData.FireCustomEvent()


    ... a custom event


    ComponentMetaData.FireError()


    ... an OnError event


    ComponentMetaData.FireInformation()


    ... an OnInformation event


    ComponentMetaData.FireProgress()


    ... an OnProgress event


    ComponentMetaData.FireWarning()


    ... an OnWarning event


    **FIREERROR() AND MAXIMUMERRORCOUNT**


    Script component event methods are similar to Script task event methods in most
    respects. The events raised in a component are passed along to the containing
    Data Flow task. There’s one big difference, though. When you invoke the FireError()
    method on a Script task, the method immediately counts against the MaximumErrorCount
    property for the task, any containers holding the task, and the package itself.
    If you reach the MaximumErrorCount value, the package halts immediately.


    In a script component, the FireError() method immediately fires an OnError event
    that bubbles up to the higher levels. When fired at the component level, however,
    the FireError() method does not immediately count against your MaximumErrorCount.
    Instead, the data flow keeps moving data despite the error event. The OnError
    events you raise in the script component are accumulated and counted against the
    MaximumErrorCount properties after the data flow has completed processing.


    If you encounter an error within the data flow that you want to stop processing
    immediately, use the .NET


    throw method. As an example, a script component source that can’t establish a
    connection to an external data store might halt processing immediately.


    In the example shown in Figure 11-11, we created a simple package with a Data
    Flow task in a Sequence container. We then added a script component source and
    script component destination to the data flow. The script component source logs
    two messages, one each in the PreExecute() and PostExecute() methods, and fires
    an OnError event in the CreateNewOutputRows() method, as shown here:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-421_1.jpg)


    CHAPTER 11  EVENTS AND ERROR HANDLING


    public override void PreExecute()


    {


    base.PreExecute();


    this.Log("Logging the first sample message.", -1, new byte[0]);


    }


    public override void PostExecute()


    {


    base.PostExecute();


    this.Log("Logging the second sample message.", -1, new byte[0]);


    }


    public override void CreateNewOutputRows()


    {


    bool b = false;


    this.ComponentMetaData.FireError


    (


    -1,


    this.ComponentMetaData.Name,


    "Firing an OnError event.",


    "",


    0,


    out b


    );


    }


    *Figure 11-11\. Raising events in script components*


    A quick query of the SSIS log shows that the two log entries and the OnError event
    were all logged in the correct order. Figure 11-12 shows the results as logged
    to the dbo.sysssislog table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-422_1.jpg)


    ![](index-422_2.jpg)


