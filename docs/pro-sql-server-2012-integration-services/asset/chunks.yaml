    (MDX)`进行查询。这些表达式返回的数据类型并不总是能轻松转换为数据库数据类型，因此`SSIS`通常会将它们简单地转换为字符字段。有一个`SSAS OLE
    DB 提供程序`，允许你连接到多维数据集并从已定义的连接中提取特定值。图 14-17 展示了用于查询多维数据集的`OLE DB 源组件`。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


