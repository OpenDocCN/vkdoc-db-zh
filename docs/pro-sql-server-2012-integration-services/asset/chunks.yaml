    ### WMI Data Reader Task


    An extremely useful functionality of SQL Server Integration Services is the ability
    to query the Windows log of the host computer or another computer. The `WMI Data
    Reader task` uses the Windows Management Instrumentation Query Language (`WQL`)
    to return data from the WMI about a machine.


    The queries can return information about the machine’s Windows event log, the
    machine’s hardware, and the applications installed on the machine. Figure 6-23
    shows the task as it appears in the control flow. The icon, a clipboard with some
    tools on it, indicates a diagnostic or checklist.


    `Figure 6-23. WMI Data Reader task`


    The WMI Options page of the WMI Data Reader task, shown in Figure 6-24, allows
    you to configure all the necessary properties to query and store the relevant
    machine information. As the page demonstrates, `WQL` queries are very similar
    to `SQL` queries. The General page allows you to modify the Name and Description
    of the task. The Expressions page allows you to define expressions that can modify
    the values of the task’s properties.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-191_1.jpg)


    ## CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    `Figure 6-24. WMI Data Reader Task Editor—WMI Options page`


    The WMI Options page provides for the configuration of the following properties:

    - `WMIConnectionName` lists the WMI Connection Manager that points to the Windows
    machine you need to query.

    - `WQLQuerySourceType` defines the method of passing the query to the task. The
    `Direct input` option allows you to type the `WQL` query into the `WQLQuerySource`
    field. `File connection` indicates that the query is stored within a file that
    can be accessed through a file connection manager. The `Variable` option allows
    the query to be stored in an SSIS variable.

    - `WQLQuerySource` identifies the access method for the query. With `Direct input`,
    you can type the query into this field.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-192_1.jpg)


    ## CHAPTER 6  ADVANCED CONTROL FLOW TASKS


    - `OutputType` defines the result set of the query. There are three options for
    this property: `Data table`, `Property name and value`, and `Property value`.
    These options show different ways to output the same dataset. The `Data table`
    option outputs the data in a relational format, with the first row as the column
    names and the subsequent tuples as the actual information. `Property name and
    value` shows the information in a more denormalized format. The properties are
    listed as the rows, with a comma and whitespace separating them from their values.'
