    Max Buffer Size: Specifies the amount of memory SQL Server Compact uses


    before flushing data to disk. This is measured in kilobytes (KB).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4  CONNECTION MANAGERS


    Max Database Size: Defines the maximum size of the SQL Server Compact


    database. This is measured in megabytes (MB).


    Mode: Specifies the access mode for the SQL Server Compact database. By


    default, it is set to Read Write. Read Write gives you permission to both read


    from and write to the database. Read Only specifies that you can only read from
    the database. Exclusive provides exclusive access to the database. Shared Read


    allows multiple users to read from the database simultaneously.


    Persist Security Info: Allows the connection information to be stored as part
    of the connection’s string.


    Temp File Directory: Specifies the location of the temporary database file for


    the SQL Server Compact database.


    Datasource: Specifies the name of the SQL Server Compact database to access.


    Password: Specifies the password of the SQL Server Compact.


    WMI Connection Manager


    The WMI Connection Manager enables access to Windows Management Instrumentation.
    The Web Services task utilizes this connection manager. Figure 4-20 displays the
    configuration of the WMI Connection Manager Editor.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-107_1.jpg)


    CHAPTER 4  CONNECTION MANAGERS


    *Figure 4-20\. WMI Connection Manager Editor*


    The Name field uniquely defines the connection manager. The Description should
    be used so that other developers will know the exact purpose of the connection
    manager. The Server Name denotes the location of the management instrument. The
    Namespace defines the WMI namespace to use. The check box will enable the usage
    of Windows Authentication. If you use this option, you do not need to provide
    the user name and password. The Test button will test the current configurations
    set in the editor.


    Summary


    The connection managers that SSIS can access are the backbone of the ETL process
    that the packages carry out. They allow both the extraction of data as well as
    its insertion. Certain connection managers have a rather simple configuration,
    while others have a much more complex set of properties. In this chapter, you
    looked in great detail at the most frequently used connections. You also were
    introduced to some of the more sparingly used connection managers. The next chapter
    will guide you through the basic executables, containers, and precedence constraints
    available for the control flow.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 5**


    **Control Flow Basics**


    *You cannot always control what g oes on outside. But you can always contr ol
    what* *goes on inside.*


    —Self-help advocate Wayne Dyer


    The previous chapter introduced you to SQL Server 12’s connection managers. The
    purpose of this chapter is to introduce some of the basic control flow items that
    will enable you to utilize those connection managers. The control flow has its
    own designer page in the Designer window in Visual Studio. In this chapter, we
    detail the control flow tasks that you are most likely to use on a daily basis.


    Chapter 6 covers the less frequently used executables. The control flow defines
    the operations that a package performs, and the order and conditions required
    to execute them.


    What Is a Control Flow?


    The *control flow* is the backbone of any SQL Server Integration Services 12 package.
    It consists of executables, containers, and precedence constraints. *Executables*
    are the most versatile component of an SSIS package. They include such tasks as
    the Execute SQL task, Data Flow task, and Script task. These tasks can be used
    to start stored procedures, extract and load data, and change the states of variables.


    *Containers* are used to logically organize the tasks. The containers can be used
    to simply organize or to loop through the tasks. *Precedence constraints* determine
    the execution path or flow. They allow you to determine the order of the tasks’
    execution. By not defining certain constraints, you can take advantage of concurrent
    task execution.


    The control flow designer pane has a zoom tool that allows you to zoom in and
    out to see all the components. The SSIS Toolbox also changes to allow you to access
    only the context-specific items. The data flow components are not available in
    the control flow. When adding items to the control flow, you have two choices:
    you can either click and drag the item from the SSIS Toolbox onto the control
    flow, or you can double-click the item.'
