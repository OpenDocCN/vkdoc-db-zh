- fmt: '# Connection Managers in SSIS


    ## File Types Supported by SSIS


    Files of various formats are often used to feed ETL processes. Whether you’re
    pulling data from delimited or fixed-width flat files, binary files, Excel spreadsheet
    files, or combinations of files, SSIS has got you covered. Here’s a quick breakdown
    of the types of files that SSIS supports natively:


    ### FLATFILE


    Flat files are text files structured as delimited files, fixed-width files, or
    ragged-right files. Flat files can be delimited by using commas (`.csv`), Tab
    or pipe (`|`) characters (`.txt`), or any other delimiter you decide to use.


    ### FILE


    The `File Connection Manager` lets you choose any file as input or output, including
    text files, binary files, XML files, or any other format you prefer. Note that
    if you choose a structured file for input, such as a delimited text file or XML
    file, you are responsible for recognizing and managing the structured data in
    your data flow.


    ### EXCEL


    The `Excel File Connection Manager` connects your data flow to an Excel workbook.


    ### MULTIFILE


    The `Multifile Connection Manager` is useful if you have several files that are
    of the same format. It’s a little trickier, requiring some data flow gymnastics,
    if you want to use it with several files of differing formats.


    ### MULTIFLATFILE


    The `Multiflat File Connection Manager` can connect to several flat files of the
    same format. If your files are of differing formats, your data flow can easily
    be consumed with trying to process the files by using different business logic.


    ## General Information on File Connection Managers


    With this variety of File Connection Managers, you can retrieve data from literally
    any file in any format. For file formats whose structure is not natively supported
    by the SSIS data flow, such as binary files, you will have to write custom code
    to handle the file format. The General page of the `Flat File Connection Manager
    Editor`, shown in Figure 4-4, allows you to choose the name, format, and code
    page for the source file. You can also choose the locale for the source data,
    whether or not the source data is Unicode, and other options including the number
    of header rows to skip (if any).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-90_1.jpg)


    *Figure 4-4. Setting properties for a Flat File Connection Manager in the editor*


    The `Flat File Connection Manager Editor` allows you to see the columns in the
    source file, with options to choose the end-of-row delimiter and the column delimiter.
    As you can see in Figure 4-5, the editor also shows a preview of the data in your
    source file.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-91_1.jpg)


    *Figure 4-5. Columns page of the Flat File Connection Manager Editor, with data
    preview*


    The Advanced page of the `Flat File Connection Manager Editor` gives you an opportunity
    to change column-level properties, such as the data type and size of the column.
    Figure 4-6 shows the column properties on the Advanced page.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-92_1.jpg)


    *Figure 4-6. Advanced page of the Flat File Connection Manager Editor, with column
    property configurations*


    ## ADO.NET Connection Manager


    The `ADO.NET Connection Manager` uses a managed .NET provider to give you access
    to your data. One of the biggest benefits of the managed connection managers is
    that you can easily access this type of connection manager from within managed
    code, such as in a Script task in the control flow or script component in the
    data flow. One of the most commonly used .NET providers is the `SqlClient` data
    provider, which is specific to SQL Server. Other managed provider options include
    the `OracleClient`, `Odbc`, and SQL Server Compact Edition.


    The .NET Providers for `OleDb` options give you the choice to access several OLE
    DB providers via managed code. When using these providers, SSIS uses .NET COM
    interop to create a managed wrapper around your OLE DB provider. This makes these
    connection managers easier to access in .NET code, but can affect performance
    because there’s an extra layer of communication between the managed wrapper and
    the unmanaged OLE DB provider. Figure 4-7 shows the providers available to the
    `ADO.NET Connection Manager`.


    *Figure 4-7. Choosing a .NET Provider in the ADO.NET Connection Manager Editor*


    The `ADO.NET Connection Manager Editor` enables you to edit the properties of
    the connection. For the commonly used `SqlClient` provider, the options are simple:
    a server name, a database to connect to, and authentication credentials. On the
    All page, you can set advanced features including encryption and replication support.
    Figure 4-8 shows the connection editor properties for the `SqlClient` provider.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-94_1.jpg)


    *Figure 4-8. ADO.NET SqlClient Connection Manager Editor*


    ## Cache Connection Manager


    The `Cache Connection Manager` was introduced in SQL Server 2008. This type of
    connection manager allows you to cache lookup data in memory in advance. Consider
    a scenario like this: you have two lookup components, and both are reading the
    same large number of rows from the same table. You can use a `Cache Connection
    Manager` to cache the lookup data in advance and connect both lookup components
    to use the same `Cache Connection Manager`. This means you have to read the data
    in only once, and it will consume less memory than two separate lookups caching
    the same data.


    The `Cache Connection Manager` can be populated with a cache file (`.caw`) or
    by a Cache transformation, which we cover later in this chapter. Figure 4-9 shows
    the `Cache Connection Manager Editor`’s General tab. This tab lets you set the
    name of the connection manager and select a cache file as the source for the connection
    manager if you choose.


    *Figure 4-9. Cache Connection Manager Editor General tab options*


    The Columns tab of the `Cache Connection Manager Editor` lets you set properties
    of the individual columns of the `Cache Connection Manager`. You can set each
    column’s data type, length, precision/scale, or code page, for instance. Figure
    4-10 shows the Columns tab properties.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-96_1.jpg)


    *Figure 4-10. Cache Connection Manager Editor Columns tab properties*


    ## Other Connection Managers


    In the previous section, you looked at some of the most commonly used connection
    managers. SSIS supplies several others (for example, the FTP and HTTP Connection
    Managers, Analysis Services Connection Manager, and Data Quality Services Connection
    Manager) in order to access systems that do not necessarily lend themselves to
    direct data access. For example, FTP servers usually don’t contain raw data, but
    they may store files that in turn may have the required data. These connection
    managers allow you to access these different storage systems so that you can retrieve
    data.


    ### FTP Connection Manager


    The `FTP Connection Manager` allows you to connect to File Transfer Protocol (FTP)
    servers. The connection editor allows you to define time-outs, ports, and several
    other properties, as shown in Figure 4-11.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-97_1.jpg)


    *Figure 4-11. FTP Connection Manager Editor*'
