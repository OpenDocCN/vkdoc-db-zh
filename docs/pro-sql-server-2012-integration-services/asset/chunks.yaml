- fmt: '# CHAPTER 19 DEPLOYMENT MODEL


    Because Visual Studio already knows the project you are trying to upgrade, it
    will not bother asking you for the location of the project file and items that
    belong to the project. The next page of the wizard, shown in Figure 19-24, gives
    you the option of creating a backup of the files before you convert. We highly
    recommend that you take redundant backups before you proceed. You can always go
    back and clean up, but if the only copy is corrupted, it is corrupted. Having
    a source code versioning system can also provide some peace of mind. The second
    page of the wizard allows you to specify the location of the backup.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-597_1.jpg)


    *Figure 19-24. The Visual Studio Conversion Wizard’s backup options*


    Before Visual Studio converts the files, it provides one last warning about version
    control. The last page of the wizard is shown in Figure 19-25. It shows a summary
    of the location of the project and the backup. Clicking Finish will prompt a message
    reporting a successful completion of the process. After you close the wizard,
    you will leave the project and all the items loaded in the Solution Explorer of
    that specific Visual Studio window.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-598_1.jpg)


    *Figure 19-25. Visual Studio Conversion Wizard—Summary*


    **CAUTION:** Visual Studio 2010 will not open project files from prior versions
    without upgrading the files. Ensure that you have proper backups of the legacy
    code before attempting to upgrade to the latest version.


    ## Summary


    With the introduction of the new deployment model in SSIS, you can now deploy
    your ETL processes to SQL Server without the overhead that existed in prior versions.
    The new environments and the environment variables remove the need for maintaining
    configurations for the deployment to different testing and production environments.
    We showed you how to build and deploy your SSIS project to SQL Server as well
    as how to migrate your legacy SSIS packages to the new model. The next chapter
    covers source control and SSIS administration and security.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


