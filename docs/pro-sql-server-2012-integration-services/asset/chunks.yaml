    \ visually while you’re editing your package in BIDS.\n\n*Figure 15-6. Highlighting\
    \ an execution tree path in the BIDS editor*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Implementing Parallelism\n\nOn multiprocessor servers, one of the biggest\
    \ performance benefits you can implement is parallelism. Within a package, you\
    \ can implement multiple data flows that execute in parallel, or even multiple\
    \ data flow paths within the same Data Flow task. To get the most out of parallel\
    \ execution, you have to plan around the resource limitations of your server.\n\
    \nThe `MaxConcurrentExecutables` package setting specifies the maximum number\
    \ of threads SSIS will execute in parallel in the package. The default is –1,\
    \ which lets SSIS set the value dynamically to the number of logical processors\
    \ plus 2. If the server you’re running SSIS on has other processes running on\
    \ it (SQL Server, for instance), you may want to set this property to a lower\
    \ value to avoid CPU resource conflicts."
