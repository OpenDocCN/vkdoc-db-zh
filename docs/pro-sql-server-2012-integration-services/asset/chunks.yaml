- fmt: "# 日志记录最佳实践与维度数据ETL\n\n我们已经在第13章讨论了日志记录的最佳实践。其核心思想是：记录处理信息需要消耗资源。日志记录会占用I/O、网络带宽、内存，甚至一点CPU。虽然你不希望完全消除日志记录，但你的生产环境日志设置应以记录监控和排查ETL流程所需的最少信息为目标。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 使用快速加载选项\n\n我们在第7章讨论了适用于`OLE\
    \ DB`和`SQL Server`目标适配器的快速加载和批量插入选项。在向`SQL Server`表插入行时，尽可能使用这些选项。快速加载选项比单次一行往返服务器的效率高得多。\n\
    \n## 理解缓慢变化维度\n\n*缓慢变化维度（SCDs）* 是本章前面讨论的维度在物理上的实现。基本上，`SCDs` 将 *维度* 放入你的维度数据中。`SCDs`\
    \ 主要分为四种类型，我们将在以下各节中讨论。\n\n### 类型0维度\n\n*类型0维度*，也称为 *非变化维度* 或 *变化极其缓慢的维度*，有两种形式：\n\
    \n- 属性 *从不* 变化的维度（如性别维度）\n- 属性 *极少* 变化的维度（如美国州维度）\n\n类型0维度通常通过加载脚本一次性填充。对这些维度的偶尔更新通常只是添加记录的操作，也可以通过一次性脚本来执行。例如，考虑一个包含10年日期的日期维度。你可能需要向该维度再添加10年的日期属性，但这不会影响现有条目。考虑到这一点，我们对类型0维度的最佳建议是：用静态的一次性脚本填充它们，并在必要时用脚本更新。\n\
    \n### 类型1维度\n\n除了非变化维度，*类型1 SCDs* 是最简单的维度实现类型——它们不需要存储历史属性值。当类型1 `SCD` 中的属性发生变化时，你只需用新值覆盖旧值。标准的类型1\
    \ `SCD` 实现包括存储一个代理键（`SQL Server`中的`IDENTITY`列非常适合此目的，`SQL 2012`中引入的`SEQUENCE`同样适用）、传入维度属性的业务键以及维度属性值本身。考虑如图17-5所示的`DimProduct`类型1\
    \ `SCD`表。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-547_1.jpg)\n\
    \n![](index-547_2.jpg)\n\n**图17-5. DimProduct类型1维度表**\n\n`DimProduct`表保存描述所有产品的条目。在此示例中，`ProductID`是代理键，`UPC`是业务键，其余列保存属性值。类型1\
    \ `SCD`的更新模式很简单，如图17-6的流程图所示。\n\n**图17-6. 类型1 SCD更新流程图**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n更新类型1 `SCD`的过程是一个基于业务键的简单 *upsert*（更新或插入）操作。如果传入行的业务键在维度表中存在，则更新；如果键不存在，则插入。有几种实现类型1\
    \ `SCD`更新的方法：\n\n- 你可以手动构建自己的数据流，执行必要的比较以及单独的更新和插入。\n- 你可以创建一个`SSIS`自定义组件，或使用预先构建的自定义组件来完成这项困难的工作。\n\
    - 你可以将原始数据插入到暂存表中，然后使用基于集合的`MERGE`语句合并到维度表中。\n- 你可以使用`SSIS`缓慢变化维度向导来构建你的`SCD`更新数据流。\n\
    \n决定使用哪种方法时，你需要回答的主要问题是：在哪里可以最有效地执行必要的维度成员比较——在数据流中还是在服务器上？一般来说，最有效的比较可以在`SQL\
    \ Server`端执行。\n\n考虑到这一点，我们将跳过手动构建数据流的方法，因为它往往是效率最低且最容易出错的方法。如果你对此选项感兴趣，我们建议使用缓慢变化维度向导来构建一个原型。这将使你更好地理解如何使用数据流来更新你的`SCD`。我们将在本节后面考虑缓慢变化维度向导。\n\
    \n使用预先构建的`SSIS`自定义组件（或构建你自己的）是另一个可行的选择，但它超出了本章的范围。我们建议查看`CodePlex` (www.codeplex.com)\
    \ 上的一些示例，以了解这些组件如何工作。\n\n我们（在没有自定义组件的情况下）首选的方法是将你的维度加载到暂存表中，并直接在服务器上执行维度更新。基于集合的更新是更新维度数据最有效的方法。图17-7中的控制流显示了基于集合的类型1\
    \ `SCD`更新的基本布局。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-549_1.jpg)\n\
    \n**图17-7. 基于集合的类型1 SCD更新包**\n\n该过程的第一步是使用执行SQL任务截断暂存表：`TRUNCATE TABLE Staging.DimProduct;`\n\
    \n下一步是数据流，它只是将产品维度数据从源移动到暂存表，如图17-8所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-550_1.jpg)\n\n**图17-8. 加载暂存表的数据流**\n\n平面文件源从平面文件提取产品维度，`OLE DB`目标将数据推送到暂存表。在这之间，有一个额外的步骤，在数据流中为每一行数据生成一个`SHA1`哈希码。\n\
    \n### 哈希码\n\n*哈希码* 是数据的固定长度“指纹”。当你将数据推送到单向哈希算法时，它会生成一个唯一的代码，可用于比较目的。与单向哈希的比较比逐个比较传入数据的多个列要高效且易于管理得多。`SHA1`哈希函数生成一个160位的哈希码，并被认为是“无碰撞的”。这意味着从不同数据生成重复哈希码的情况极其罕见（实际上，几率是2^80分之一）。为了获得更低的碰撞几率，你可以使用`SHA2`家族的哈希函数，其范围从2^128分之一到2^256分之一。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n我们用来生成哈希码的`.NET`代码非常高效，使用了`MemoryStream`和`BinaryWriter`，如下面的代码片段所示。\n\
    \n```csharp\npublic class ScriptMain : UserComponent\n{\n    MemoryStream ms;\n\
    \    BinaryWriter bw;\n    SHA1Managed sha1;\n\n    public override void PreExecute()\n\
    \    {\n        base.PreExecute();\n        sha1 = new SHA1Managed();\n    }\n\
    \n    public override void PostExecute()\n    {\n        base.PostExecute();\n\
    \    }\n\n    public override void Input0_ProcessInputRow(Input0Buffer Row)\n\
    \    {\n        ms = new MemoryStream();\n        bw = new BinaryWriter(ms);\n\
    \n        if (Row.UPC_IsNull)\n        {\n            bw.Write((Int32)0);\n  \
    \          bw.Write((byte)255);\n        }\n        else\n        {\n        \
    \    bw.Write(Row.UPC.Length);\n            bw.Write(Row.UPC);\n        }\n\n\
    \        bw.Write('|');\n        // ...Write additional columns to BinaryWriter\n\
    \n        byte[] hash = sha1.ComputeHash(ms.ToArray());\n        Row.Hash = hash;\n\
    \n        ms.Dispose();\n        bw.Dispose();\n    }\n```"
  raw: 'We talked about logging best practices in Chapter 13\. The idea is simple:
    logging processing information requires resources. It takes I/O, network bandwidth,
    memory, and even a bit of CPU to log. Although you don’t want to eliminate logging
    completely, you should target your production logging settings to record the minimal
    amount of information you need to monitor and troubleshoot your ETL processes.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17  DIMENSIONAL DATA ETL


    Use the Fast Load Option


    We discussed the fast load and bulk insert options available for OLE DB and SQL
    Server destination adapters in Chapter 7\. When inserting rows into SQL Server
    tables, use these options when possible. The fast load options are much more efficient
    than individual, one-row-at-a-time round-trips to the server.


    Understanding Slowly Changing Dimensions


    *Slowly changing dimensions (SCDs)* are the physical implementation of the dimensions
    we discussed earlier in this chapter. Basically, SCDs put the *dimensional* in
    your dimensional data. SCDs are divided into four major types, which we discuss
    in the following sections.


    Type 0 Dimensions


    *Type 0 dimensions*, also known as *nonchanging dimensions* or *very slowly changing
    dimensions* come in two flavors:


     Dimensions with attributes that *never* change (such as a Gender dimension)


     Dimensions with attributes that *very rarely* change (such as a US States dimension)


    Type 0 dimensions are generally populated one time with load scripts. The occasional
    update to these dimensions is usually just an operation that adds records, which
    can also be performed with one-off scripts. As an example, consider a Date dimension
    with 10 years’ worth of dates in it. You might need to add another 10 years’ worth
    of date attributes to the dimension, but this doesn’t affect the existing entries.
    With this in mind, our best advice for Type 0 dimensions is to populate them and
    update them as necessary with static one-off scripts.


    Type 1 Dimensions


    Apart from nonchanging dimensions, *Type 1 SCDs* are the simplest type of dimension
    to implement—


    they have no requirement to store historical attribute values. When attributes
    in a Type 1 SCD change, you simply overwrite the old ones with the new values.
    A standard Type 1 SCD implementation involves storing a surrogate key (the IDENTITY
    column in SQL Server serves this purpose well, as will using a SEQUENCE that is
    introduced in SQL 2012), the business key for the inbound dimension attributes,
    and the dimension attribute values themselves. Consider the DimProduct Type 1
    SCD table shown in Figure 17-5.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-547_1.jpg)


    ![](index-547_2.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    *Figure 17-5\. DimProduct type 1 dimension table*


    The DimProduct table holds entries describing all the products. In this example,
    the ProductID is the surrogate key, UPC is the business key, and the remaining
    columns hold the attribute values. The update pattern for the Type 1 SCD is simple,
    as shown in the flowchart in Figure 17-6.


    *Figure 17-6\. Type 1 SCD update flowchart*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17  DIMENSIONAL DATA ETL


    The process for updating the Type 1 SCD is a simple *upsert* (update-or-insert)
    operation based on the business key. If the business key of the inbound row exists
    in the dimension table, it’s updated; if the key doesn’t exist, it’s inserted.
    There are several ways to implement Type 1 SCD updates:


     You can build out your own data flow by hand, which will perform the necessary
    comparisons and individual updates and inserts.


     You can create an SSIS custom component, or use a prebuilt custom component,
    to do the hard work for you.


     You can insert the raw data into a staging table and follow up with a set-based
    MERGE into the dimension table.


     You can use the SSIS Slowly Changing Dimension Wizard to build out your SCD


    update data flow.


    The main question you need to answer when deciding which method to use is, where
    can you perform the necessary dimension member comparisons most efficiently—in
    the data flow or on the server? In general, the most efficient comparisons can
    be performed on the SQL Server side.


    With that in mind, we’ll skip building out a data flow by hand as it tends to
    be the most inefficient and error-prone method. If you’re interested in pursuing
    this option, we recommend using the Slowly Changing Dimension Wizard instead to
    build out a prototype. This will give you a better understanding of how the data
    flow can be used to update your SCD. We’ll consider the Slowly Changing Dimension
    Wizard later in this section.


    Using a prebuilt SSIS custom component (or building your own) is another viable
    option, but it’s outside the scope of this chapter. We recommend looking at some
    of the samples on CodePlex (www.codeplex.com) to understand how these components
    work.


    Our preferred method (without custom components) is loading your dimensions into
    a staging table and performing the dimension updates on the server directly. Set-based
    updates are the most efficient method of updating dimensional data. The control
    flow in Figure 17-7 shows the basic layout of the Type 1 SCD set-based update.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-549_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    *Figure 17-7\. Set-based Type 1 SCD update package*


    The first step of the process is to truncate the staging table with an Execute
    SQL task: TRUNCATE TABLE Staging.DimProduct;


    The next step is the data flow, which simply moves the Product dimension data
    from the source to the staging table, as shown in Figure 17-8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-550_1.jpg)


    CHAPTER 17  DIMENSIONAL DATA ETL


    *Figure 17-8\. Data flow to load the staging table*


    The Flat File Source pulls the Product dimension from a flat file, and the OLE
    DB Destination pushes the data to the staging table. In between, there’s an additional
    step that generates an SHA1 hash code for each row of data as it moves through
    the data flow.


    **HASH CODES**


    *Hash codes* are fixed-length “fingerprints” for data. When you push data through
    a one-way hash algorithm, it generates a unique code that can be used for comparison
    purposes. Comparisons with one-way hashes are much more efficient and easier to
    manage than comparisons of several columns of inbound data on an individual basis.
    The SHA1 hash function generates a 160-bit hash code and is considered “collision-free.”
    This means that duplicate hash codes generated from different data are extremely
    rare (in fact, the odds are 1 in 280). For even lower odds of generating a collision,
    you can use an SHA2 family hash function, which range from 1 in 2128 to 1 in 2256.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17  DIMENSIONAL DATA ETL


    The .NET code we use to generate a hash code is very efficient, utilizing MemoryStream
    and BinaryWriter, as shown in the following code snippet.


    public class ScriptMain : UserComponent


    {


    MemoryStream ms;


    BinaryWriter bw;


    SHA1Managed sha1;


    public override void PreExecute()


    {


    base.PreExecute();


    sha1 = new SHA1Managed();


    }


    public override void PostExecute()


    {


    base.PostExecute();


    }


    public override void Input0_ProcessInputRow(Input0Buffer Row)


    {


    ms = new MemoryStream();


    bw = new BinaryWriter(ms);


    if (Row.UPC_IsNull)


    {


    bw.Write((Int32)0);


    bw.Write((byte)255);


    }


    else


    {


    bw.Write(Row.UPC.Length);


    bw.Write(Row.UPC);


    }


    bw.Write(''|'');


    // ...Write additional columns to BinaryWriter


    byte[] hash = sha1.ComputeHash(ms.ToArray());


    Row.Hash = hash;


    ms.Dispose();


    bw.Dispose();


    }'
  trans: "# 日志记录最佳实践与维度数据 ETL\n\n我们已经在第 13 章讨论了日志记录的最佳实践。其核心思想是：记录处理信息需要消耗资源。日志记录会占用\
    \ I/O、网络带宽、内存，甚至一点 CPU。虽然你不希望完全消除日志记录，但你的生产环境日志设置应以记录监控和排查 ETL 流程所需的最少信息为目标。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 使用快速加载选项\n\n我们在第 7 章讨论了适用于`OLE\
    \ DB`和`SQL Server`目标适配器的快速加载和批量插入选项。在向`SQL Server`表插入行时，尽可能使用这些选项。快速加载选项比单次一行往返服务器的效率高得多。\n\
    \n## 理解缓慢变化维度\n\n*缓慢变化维度（SCDs）* 是本章前面讨论的维度在物理上的实现。基本上，`SCDs` 将 *维度* 放入你的维度数据中。`SCDs`\
    \ 主要分为四种类型，我们将在以下各节中讨论。\n\n### 类型 0 维度\n\n*类型 0 维度*，也称为 *非变化维度* 或 *变化极其缓慢的维度*，有两种形式：\n\
    \n- 属性 *从不* 变化的维度（如性别维度）\n- 属性 *极少* 变化的维度（如美国州维度）\n\n类型 0 维度通常通过加载脚本一次性填充。对这些维度的偶尔更新通常只是添加记录的操作，也可以通过一次性脚本来执行。例如，考虑一个包含\
    \ 10 年日期的日期维度。你可能需要向该维度再添加 10 年的日期属性，但这不会影响现有条目。考虑到这一点，我们对类型 0 维度的最佳建议是：用静态的一次性脚本填充它们，并在必要时用脚本更新。\n\
    \n### 类型 1 维度\n\n除了非变化维度，*类型 1 SCDs* 是最简单的维度实现类型——它们不需要存储历史属性值。当类型 1 `SCD` 中的属性发生变化时，你只需用新值覆盖旧值。标准的类型\
    \ 1 `SCD` 实现包括存储一个代理键（`SQL Server`中的`IDENTITY`列非常适合此目的，`SQL 2012`中引入的`SEQUENCE`同样适用）、传入维度属性的业务键以及维度属性值本身。考虑如图\
    \ 17-5 所示的`DimProduct`类型 1 `SCD`表。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-547_1.jpg)\n\n![](img/index-547_2.jpg)\n\n**图 17-5. DimProduct\
    \ 类型 1 维度表**\n\n`DimProduct`表保存描述所有产品的条目。在此示例中，`ProductID`是代理键，`UPC`是业务键，其余列保存属性值。类型\
    \ 1 `SCD`的更新模式很简单，如图 17-6 的流程图所示。\n\n**图 17-6. 类型 1 SCD 更新流程图**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n更新类型 1 `SCD`的过程是一个基于业务键的简单 *upsert*（更新或插入）操作。如果传入行的业务键在维度表中存在，则更新；如果键不存在，则插入。有几种实现类型\
    \ 1 `SCD`更新的方法：\n\n- 你可以手动构建自己的数据流，执行必要的比较以及单独的更新和插入。\n- 你可以创建一个`SSIS`自定义组件，或使用预先构建的自定义组件来完成这项困难的工作。\n\
    - 你可以将原始数据插入到暂存表中，然后使用基于集合的`MERGE`语句合并到维度表中。\n- 你可以使用`SSIS`缓慢变化维度向导来构建你的`SCD`更新数据流。\n\
    \n决定使用哪种方法时，你需要回答的主要问题是：在哪里可以最有效地执行必要的维度成员比较——在数据流中还是在服务器上？一般来说，最有效的比较可以在`SQL\
    \ Server`端执行。\n\n考虑到这一点，我们将跳过手动构建数据流的方法，因为它往往是效率最低且最容易出错的方法。如果你对此选项感兴趣，我们建议使用缓慢变化维度向导来构建一个原型。这将使你更好地理解如何使用数据流来更新你的`SCD`。我们将在本节后面考虑缓慢变化维度向导。\n\
    \n使用预先构建的`SSIS`自定义组件（或构建你自己的）是另一个可行的选择，但它超出了本章的范围。我们建议查看`CodePlex` (www.codeplex.com)\
    \ 上的一些示例，以了解这些组件如何工作。\n\n我们（在没有自定义组件的情况下）首选的方法是将你的维度加载到暂存表中，并直接在服务器上执行维度更新。基于集合的更新是更新维度数据最有效的方法。图\
    \ 17-7 中的控制流显示了基于集合的类型 1 `SCD`更新的基本布局。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-549_1.jpg)\n\n**图 17-7. 基于集合的类型 1 SCD 更新包**\n\n该过程的第一步是使用执行 SQL\
    \ 任务截断暂存表：`TRUNCATE TABLE Staging.DimProduct;`\n\n下一步是数据流，它只是将产品维度数据从源移动到暂存表，如图\
    \ 17-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-550_1.jpg)\n\
    \n**图 17-8. 加载暂存表的数据流**\n\n平面文件源从平面文件提取产品维度，`OLE DB`目标将数据推送到暂存表。在这之间，有一个额外的步骤，在数据流中为每一行数据生成一个`SHA1`哈希码。\n\
    \n### 哈希码\n\n*哈希码* 是数据的固定长度“指纹”。当你将数据推送到单向哈希算法时，它会生成一个唯一的代码，可用于比较目的。与单向哈希的比较比逐个比较传入数据的多个列要高效且易于管理得多。`SHA1`哈希函数生成一个\
    \ 160 位的哈希码，并被认为是“无碰撞的”。这意味着从不同数据生成重复哈希码的情况极其罕见（实际上，几率是 2⁸⁰ 分之一）。为了获得更低的碰撞几率，你可以使用`SHA2`家族的哈希函数，其范围从\
    \ 2¹²⁸ 分之一到 2²⁵⁶ 分之一。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    我们用来生成哈希码的`.NET`代码非常高效，使用了`MemoryStream`和`BinaryWriter`，如下面的代码片段所示。\n\n```csharp\n\
    public class ScriptMain : UserComponent\n{\n    MemoryStream ms;\n    BinaryWriter\
    \ bw;\n    SHA1Managed sha1;\n\n    public override void PreExecute()\n    {\n\
    \        base.PreExecute();\n        sha1 = new SHA1Managed();\n    }\n\n    public\
    \ override void PostExecute()\n    {\n        base.PostExecute();\n    }\n\n \
    \   public override void Input0_ProcessInputRow(Input0Buffer Row)\n    {\n   \
    \     ms = new MemoryStream();\n        bw = new BinaryWriter(ms);\n\n       \
    \ if (Row.UPC_IsNull)\n        {\n            bw.Write((Int32)0);\n          \
    \  bw.Write((byte)255);\n        }\n        else\n        {\n            bw.Write(Row.UPC.Length);\n\
    \            bw.Write(Row.UPC);\n        }\n\n        bw.Write('|');\n       \
    \ // ...将额外列写入 BinaryWriter\n\n        byte[] hash = sha1.ComputeHash(ms.ToArray());\n\
    \        Row.Hash = hash;\n\n        ms.Dispose();\n        bw.Dispose();\n  \
    \  }\n```"
- fmt: "# CHAPTER 17: DIMENSIONAL DATA ETL\n\nAll the columns are written to `BinaryWriter`\
    \ with the length of the column followed by the value. In the case of a `NULL`\
    \ value, a length of zero is written, followed by a single byte value (this is\
    \ a value that can’t be generated in inbound data). Each column is followed by\
    \ a vertical bar separator character. The concatenated binary string is then fed\
    \ into an `SHA1` generation function, and the output is assigned to the `Hash`\
    \ column.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-552_1.jpg)\n\
    \n## Type 1 SCD Update\n\nThe final step of the Type 1 SCD update is a single\
    \ update-or-insert (upsert) operation from the staging table to the dimension\
    \ table. The T-SQL `MERGE` statement is perfectly suited for this job. The `MERGE`\
    \ statement lets you perform `UPDATE` and `INSERT` operations in a single statement,\
    \ as shown here:\n\n```sql\nMERGE INTO dbo.DimProduct AS Target\nUSING Staging.DimProduct\
    \ AS Source\nON Target.UPC = Source.UPC\nWHEN MATCHED AND Target.Hash <> Source.Hash\n\
    THEN UPDATE SET Target.Category = Source.Category,\n                Target.Manufacturer\
    \ = Source.Manufacturer,\n                Target.ProductName = Source.ProductName,\n\
    \                Target.Size = Source.Size,\n                Target.Price = Source.Price,\n\
    \                Target.Hash = Source.Hash\nWHEN NOT MATCHED\nTHEN INSERT (UPC,\
    \ Category, Manufacturer, ProductName, Size, Price, Hash)\nVALUES (Source.UPC,\
    \ Source.Category, Source.Manufacturer, Source.ProductName, Source.Size, Source.Price,\
    \ Source.Hash);\n```\n\n`NOTE:` `MERGE` provides a means to incorporate `INSERT`,\
    \ `UPDATE`, and `DELETE` in one statement. However, separating these steps into\
    \ individual statements can improve overall performance. Compare the costs of\
    \ both methods to ensure that the most efficient query is used.\n\nThe notable\
    \ shortcoming of a Type 1 SCD is that historical values will be lost to an update\
    \ of the current value. However, the update process is easier than a Type 2 or\
    \ Type 3 SCD and also uses less space, as long-term history is not maintained.\n\
    \n## Type 2 Dimensions\n\nBecause they maintain a long-term history of attribute\
    \ values, `Type 2 dimensions` are slightly more complex to manage than Type 1\
    \ dimensions. The schema of a Type 2 SCD table differs from a Type 1 SCD in that\
    \ it can contain up to three extra columns to denote a current or historic version.\
    \ The additional column(s) allow the dimension table to contain the historic values\
    \ rather than overwriting the affected column(s) with the current value. The dimension\
    \ could contain a single column that indicates whether the row has the most current\
    \ value, as displayed in Figure 17-9.\n\n*Figure 17-9. Type 2 SCD result set*\n\
    \nWhile new or updated values are always inserted into Type 2 dimensions, there\
    \ are additional flags on existing rows that must also be updated, such as the\
    \ effective date, end date, or active column.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-553_1.jpg)\n\nAdding a column to indicate only whether the row is\
    \ the most current enables you to ensure that all historic changes are kept, but\
    \ not to define when the specific row was active. The addition of both an active\
    \ column and an end-date column would provide the means of maintaining historic\
    \ values that can then be associated with the proper time frame.\n\nThe `Active`\
    \ column denotes whether the row holds the current value, but lacks the ability\
    \ to track when the value(s) were in effect. The dimension table could include\
    \ a start- and end-date column, which could maintain the historic values and times,\
    \ when the end date is `NULL` this represents the current value, or an effective\
    \ date column and a column representing active or historic. The process of updating\
    \ a Type 2 SCD is shown in Figure 17-10.\n\n*Figure 17-10. Type 2 SCD update flow*\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-554_1.jpg)\n\n\
    `SSIS` provides a Data Transformation task that can be used for both Type 1 and\
    \ Type 2 SCDs. The first step in using the SCD transformation task for a Type\
    \ 2 SCD is to decide whether you are going to track changes in your table by either\
    \ using a simple indicator to identify current and expired records, or using effective\
    \ dates. The component doesn’t natively allow you to use both, although you can\
    \ customize the output to do so. Figure 17-11 demonstrates using a SCD transformation\
    \ task in a data flow.\n\n*Figure 17-11. SSIS slowly changing dimension component*\n\
    \n## Type 3 Dimensions\n\nA Type 3 SCD tracks changes by using separate columns,\
    \ which limits the history to the number of columns that can be added to the dimension\
    \ table. This obviously provides limitations, and the dimension table will begin\
    \ to look more like a Microsoft Excel spreadsheet, as shown in Figure 17-12.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-555_1.jpg)\n\n\
    *Figure 17-12. Query results of a Type 3 SCD*\n\nThere are several complexities\
    \ in implementing a Type 3 SCD—first and foremost modifying the table schema for\
    \ each update, which make this a less than desirable means of tracking historic\
    \ attributes. As a Type 3 SCD is limiting and requires changing the schema of\
    \ the dimension table, it is not supported in the `SCD Transformation` task. It\
    \ is possible to use an `Execute SQL` task to automate updating a Type 3 SCD,\
    \ but if at any point the dimension table was referenced in a `Data Flow` task,\
    \ it would fail the validation phase based on the schema change. The issues don’t\
    \ end with the processing of the dimension, but also include using the dimension\
    \ in an `SSAS` cube or for a report, again as based on the ever-changing schema.\
    \ Although utilizing a Type 3 SCD is an option, utilizing a Type 1 or 2 SCD is\
    \ preferable.\n\n## Summary\n\nThis chapter introduced several tools and methods\
    \ for optimizing your `SSIS` packages. Many of these optimizations rely on performing\
    \ operations at the source when possible and limiting the data pulled through\
    \ the `ETL` process. We also discussed the different types of dimensions and outlined\
    \ ways that each dimension could be updated. In the next chapter, we’ll consider\
    \ the powerful `SSIS` parent-child design pattern.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 18: Building Robust Solutions\n\n*The egoism which enters into our\
    \ theories does not affect their sincerity; rather, the more our egoism is satisfied,\
    \ the more robust is our belief.*\n—Novelist George Eliot\n\nDeveloping an `SSIS`\
    \ package typically focuses on the known—the data source, transformations, and\
    \ destinations—and fails to address the unknown—schema changes, data type mismatches,\
    \ and a changing network environment. Obviously, all development must come from\
    \ a starting point—the known. However, in order to ensure that an `SSIS` package\
    \ provides portability, stability, and resilience, it is critical to handle the\
    \ unknown and to record the unidentified and inconsistent behavior. This chapter\
    \ outlines the steps necessary to plan and handle the unexpected within an `SSIS`\
    \ package.\n\n## What Makes a Solution Robust\n\nQuite often an `SSIS` solution\
    \ is created to fulfill an easily defined process in a specific and static environment.\
    \ The source and destination schema are considered immutable and unchanging, and\
    \ there is no accounting for change or error. This type of project is effortlessly\
    \ created and quickly deployed, but frequently the developer fails to play `what\
    \ if` in such cases and thus provides little means for the following:\n\n- Tracking\
    \ of:\n  - Performance\n  - Error information\n  - Historic metrics\n- Handling\
    \ variations to:\n  - Sources\n  - Connections\n  - Schema\n- Portability and\
    \ ease of deploying to different environments\n\nThere are several factors to\
    \ be considered when attempting to create a robust solution:\n\n- **Resilience**:\
    \ The capability of a package to proactively deal with errors, document them,\
    \ and still complete.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
