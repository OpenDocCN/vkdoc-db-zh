- fmt: '# CHAPTER 5 CONTROL FLOW BASICS


    ## Data Profiling Task Editor — Profile Requests Page


    The check boxes allow you to profile specific information. We discuss the details
    of each option in Chapter 12.


    **Figure 5-18. Single Table Quick Profile Form dialog box**


    The Profile Requests page of the Data Profiling Task Editor, shown in Figure 5-19,
    allows you to configure the options for each of the profile requests. The All
    Requests list shows the Profile Type and the Request ID of each request. The View
    drop-down allows you to filter the requests by profile type.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-134_1.jpg)


    Information such as the `ConnectionManager` and the `TableOrView` values are imported
    from the Single Table Quick Profile Form. The `RequestID` is automatically generated
    but can be modified after it has been added to the Profile Requests page. The
    `ThresholdSetting` option allows you to set the type of threshold you want as
    the success criteria of your profile. Using this field will allow you to discover
    keys that are nearly unique. The `MaxNumberOfViolations` property can define the
    number of duplicates or failures of the key you want to tolerate.


    **Figure 5-19. Data Profiling Task Editor — Profile Requests page**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-135_1.jpg)


    ## Execute Package Task


    One of the most flexible ETL design patterns uses one package to call other packages.
    This design requires the use of the `Execute Package task`, an executable that
    allows a package to call another package as a part of its execution. The original
    package’s variables can be accessed by the called package. The original package
    can also pass along any parameters that have access to it. Figure 5-20 shows the
    component in a control flow. Its icon is a file with blue squares—three on the
    file, and one outside it. The three blue squares represent executables contained
    within the file itself, and a single square outside the file indicates access
    to executables outside the immediate package.


    **Figure 5-20. Execute Package task**


    ### Execute Package Task Editor — Package Page


    The Package page of the Execute Package Task Editor allows you to specify the
    location and name of the package. The location of the package can be indicated
    by accessing the project that the current package belongs to. This will populate
    the `PackageNameFromProjectReference` list with all the packages contained within
    the current project. Figure 5-21 shows the task utilizing the project to reference
    the package. This ETL design pattern is called `parent-child design`. We cover
    it in more detail in Chapter 16.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-136_1.jpg)


    **Figure 5-21. Execute Package Task Editor — Package page**


    Depending on the `ReferenceType` required, the properties that appear on the Package
    page will vary, with the exception of `ExecuteOutOfProcess` and `Password`. The
    properties are as follows:


    - `ReferenceType` allows you to select the location of the package. `Project Reference`
    indicates that the child package exists as an object within the current project.
    `External Reference` allows you to access a package on the file system or SQL
    Server.

    - `PackageNameFromProjectReference` lists all the packages that are a part of
    the current project. This property is available only with the `Project Reference`
    type.

    - `Password` is the password that is used to encrypt the child package. Even though
    in Figure 5-21 it appears that there is a password, the package is not encrypted.
    By default, SSIS fills in this field. Clicking the field opens a dialog box that
    asks you to specify and verify the password.

    - `ExecuteOutOfProcess` specifies that the package can be executed as a new Windows
    process.

    - `Location` defines whether the package exists on the file system or SQL Server.
    This property is available only for the `External Reference` type.'
