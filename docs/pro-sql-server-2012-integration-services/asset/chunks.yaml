- fmt: '# CHAPTER 8 - DATA FLOW TRANSFORMATIONS


    The `Aggregate` transformation can be configured in `Basic` mode or `Advanced`
    mode. In `Basic` mode, the transformation has one output; in `Advanced` mode,
    it can have more than one output, each containing the result of a different aggregation.
    In this example, we have configured two aggregations:


    *   The first aggregation is called `AggByMonth`. This aggregation sums the injury
    count fields in the input, and groups by `EventYear` and `EventMonth`.

    *   The second aggregation is called `AggByState`. This aggregation sums the injury
    count fields, grouping by `State`, `EventYear`, and `EventMonth`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-282_1.jpg)


    ## Figure 8-32. Editing the Aggregate transformation in Advanced mode


    The `Advanced/Basic` button reveals or hides the multiple aggregation configuration
    box at the top of the editor. You can choose columns from the input column list
    and select the operations to perform on those columns in the lower portion of
    the editor. The operations you can choose include the following:


    *   `Group By` groups results based on this column, just like the `GROUP BY` clause
    in SQL `SELECT` queries.

    *   `Count` returns the count of values in this column. Nulls are included in
    the count if you select `(*)` as the input column. Otherwise, nulls are ignored.
    This operation is equivalent to the SQL `COUNT` aggregate function.

    *   `Count Distinct` returns the count of distinct values in this column. Equivalent
    to the SQL `COUNT(DISTINCT ...)` aggregate function.

    *   `Sum` returns the sum of the values in this column. Equivalent to the SQL
    `SUM` aggregate function.

    *   `Average` returns the average of the values in the selected column. Equivalent
    to the SQL `AVG` aggregate function.

    *   `Minimum` returns the minimum of values from the column. Equivalent to the
    SQL `MIN` aggregate function.

    *   `Maximum` returns the maximum of values from the column. Equivalent to the
    SQL `MAX` aggregate function.


    The `Group By`, `Count`, and `Count Distinct` operations can be performed on numeric
    or string data. The `Sum`, `Average`, `Minimum`, and `Maximum` operations can
    be performed on only numeric data.


    **TIP:** The `Aggregate` transformation does not require inbound data to be sorted.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Sort


    The `Sort` transformation sorts inbound rows based on the values from columns
    that you select in the designer. There are several reasons you may need to sort
    your input data in the data flow, including the following:


    *   Some transformations, such as `Merge Join` presented later in this chapter,
    require input data to be sorted.

    *   Under some circumstances, you can achieve better performance when saving data
    to a relational database when the data is presorted.

    *   In some instances, data needs to be processed in a specific order, or sorted
    before being handed off to another data flow or ETL process.


    In any of these instances, you’ll need to sort your data prior to passing it on,
    as shown in Figure 8-33.


    **TIP:** Because `Sort` is a fully blocking asynchronous transformation, it will
    hold up the data flow until it has completed the sort operation. It’s a good idea
    to sort data at the source when possible. If you’re pulling data from a relational
    database, consider putting an `ORDER BY` clause on your query to guarantee order,
    for instance. If the order of your input is not guaranteed—for instance, when
    you pull data from a flat file or perform transformations on your data that could
    change the order of your data in the data flow, the `Sort` transformation may
    be the best option. If your data is not indexed on the sort columns in SQL Server,
    an `ORDER BY` clause might use a lot of server-side resources. If, however, your
    data is indexed, the `SSIS` `Sort` transformation will not be able to take advantage
    of the index.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-284_1.jpg)


    ## Figure 8-33. Sort transformation in data flow'
