    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-241_1.jpg)


    CHAPTER 7  SOURCE AND DESTINATION ADAPTERS


    *Figure 7-32\. New SSIS destination workbook, empty except for column headings*
    Next we’ll add an OLE DB source adapter and an Excel destination adapter to an
    empty data flow.


    After we configure the OLE DB source to pull data from the Country table in the
