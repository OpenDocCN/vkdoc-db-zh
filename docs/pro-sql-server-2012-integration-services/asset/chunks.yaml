- fmt: '# CHAPTER 1 - INTRODUCING INTEGRATION SERVICES


    Since the introduction of SSIS, Microsoft has made significant investments in
    the infrastructure required to support package execution and enterprise ETL management.
    In addition to data movement and manipulation, the SSIS infrastructure supports
    logging, event handling, connection management, and enumeration activities. Figure
    1-3 is a simplified pyramid showing the major components of the SSIS infrastructure.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-10_1.jpg)


    **NOTE:** We introduce `BIDS` and discuss the new designer features in Chapter
    2.


    *Figure 1-3. SSIS architectural components (simplified)*


    At the base of the pyramid lie the command-line utilities, custom applications,
    the SSIS designer, and wizards such as the import/export wizard that provide interaction
    with SSIS. These applications and utilities are developed in either managed or
    unmanaged code. The object model layer exposes interfaces that allow these utilities
    and applications to interact with the Integration Services runtime. The Integration
    Services runtime, in turn, executes packages and provides support for logging,
    breakpoints and debugging, connection management and configuration, and transaction
    control. At the very top of the pyramid is the SSIS package itself, which you
    design and build in the `BIDS` environment, to contain the control flow and data
    flows discussed earlier in this chapter.


    ## BYE-BYE, DATA TRANSFORMATION SERVICES


    Back in SQL Server 2005, Microsoft announced the deprecation of Data Transformation
    Services (DTS).


    DTS was supported as a legacy application in SQL Server 2005, 2008, and 2008 R2\.
    But because SSIS is a full-fledged enterprise-class replacement for DTS, it should
    come as no surprise that DTS is no longer supported with this newest release of
    SQL Server. This means that the `Execute DTS 2000 Package` task, the DTS runtime
    and API, and `Package Migration Wizard` are all going away. Fortunately, the learning
    curve to convert DTS packages to SSIS is not too steep, and the process is relatively
    simple in most cases. If you have legacy DTS packages lying around, now’s the
    time to plan to migrate them to SSIS.


    Additionally, the `ActiveX Script` task, which was provided strictly for DTS support,
    will be removed. Many of the tasks that `ActiveX Script` tasks were used for can
    be handled with precedence constraints, while more-complex tasks can be rewritten
    as `Script` tasks. We explore precedence constraints and `Script` tasks in detail
    in Chapters 4 and 5.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 1 - INTRODUCING INTEGRATION SERVICES


    ## New SSIS Features


    There are a number of improvements in the SQL Server 12 release of SSIS. We discuss
    these new features and enhancements throughout the book. Before we dig into the
    details in later chapters, we are summarizing the new features here for your convenience:


    *   Project deployment model: The new project deployment model is new to SQL Server
    12 SSIS. The key features of this new deployment model are the Integration Services
    catalog, environments, and parameters. The new deployment model is designed to
    make deployment and administration of SSIS packages and ETL systems easier across
    multiple environments. We discuss the project deployment model in Chapter 17.

    *   T-SQL views and stored procedures: The new project deployment model includes
    several new SSIS-specific views and stored procedures for SQL Server. We present
    these views and stored procedures in Chapter 17, during the discussion of the
    project deployment model.

    *   `BIDS` usability enhancements: `BIDS` has been improved to make package development
    and editing simpler. The `BIDS` designers are now more flexible, and UI enhancements
    such as the `Integration Services` toolbox make it easier to use. We present the
    new features in `BIDS` and `SQL Server Management Studio (SSMS)` in Chapter 3.

    *   Object impact and data lineage analysis: The object impact and data lineage'
