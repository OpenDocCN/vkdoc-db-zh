    The MessageBox returns the indexed value of the error number from the row string
    array, which can be used to identify the specific cause. Obviously, to dynamically
    handle the error requires additional code, but armed with the error codes and
    descriptions (provided in the following Tip), a VB.NET Select Case statement can
    be included to iterate through the error codes, and based on the error, the appropriate
    action can be taken.


    Event Handlers


    Event handlers provide a means to proactively handle events on packages and executables
    and can be used to capture task-specific information for the following events:


     OnError


     OnExecStatusChange


     OnExecution


     OnPostExecute


     OnPostValidate


     OnPreExecute


     OnPreValidate


     OnQueryCancel


     OnTaskFailed


     OnVariableValueChanged


     OnWarning


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18  BUILDING ROBUST SOLUTIONS


    An OnError event handler can be used to capture the error description and code,
    which can then be used to dynamically handle errors as well as record more in-depth
    information into the specific issue.


    Because event handlers are available only on executables and packages, this precludes
    their use from within the data flow, but can capture the failure of the data flow
    executable. In order for the OnError event handler to be reached, the Data Flow
    task must first fail, which will expel all data from the buffers, making it unavailable
    for later investigation.


    Processing the error information within the event handler can be done most easily
    with a Script task passing in System:ErrorCode and System:ErrorDescription as
    read-only variables. Chapter 11 outlined how to create a Script task to capture
    error information and provided a demonstration of the OnError event bubbling up
    from the task level all the way to the package level. Obviously, a more complex
    type of logic would need to be incorporated within the script component to proactively
    address the specific error.


    The package outlined in the preceeding sectionabove uses error redirection in
    the Data Flow task to prevent errors from arising and to ensure that all rows
    are directed to a destination. If the same package was created without redirecting
    the row, an OnError event handler could be used to capture the error information.
    Adding a Script task to the OnError event and setting the System:ErrorDescripton
    as a ReadOnly variable will allow the ability to capture the entire error message
    and provides more insight into the true cause. Using the following VB.NET code
    will display the message of any error that occurs within the Data Flow task:


    MessageBox.Show(Dts.Variables(0).Value.ToString)


    The resulting message box specifies the truncation error as well as the specific
    affected column. The primary difference between error redirection and the OnError
    event handler is that if error redirection is used, the OnError event handler
    will not be raised. In the preceding example, the Data Flow task stops after the
    truncation error occurs, and the failing row information would not be stored for
    later evaluation.


     **TIP:** SSIS error messages and numbers are outlined at http://msdn.microsoft.com/en-us/library/ms345164.aspx.


    Dynamism


    Beginning with SSIS 2005, configuration enabled you to make a package more portable
    and to easily import a package into multiple instances of SQL without requiring
    you to create multiple packages or to specifically configure a package for its
    environment. This capability has been streamlined even more in SSIS 2012 with
    the introduction of parameters.'
