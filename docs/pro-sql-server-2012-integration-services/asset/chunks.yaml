  trans: "# 第 10 章 – 脚本编写\n\n## 列定义\n\n| 列名          | 数据类型                      \
    \  | 内容                                           |\n| :------------ | :------------------------------\
    \ | :--------------------------------------------- |\n| **KeyWord**   | 字符串 [DT_STR],\
    \ 长度 100       | 在描述列中找到的关键词                         |\n| **Occurrences** | 四字节有符号整数\
    \ [DT_I4]       | 每篇文章的描述列中该关键词出现的次数           |\n\n## 脚本组件方法\n\n在脚本组件异步转换中，我们需要重写四个主要方法：\n\
    \n*   `PreExecute()` 方法在处理任何行之前，为组件触发一次。\n*   `PostExecute()` 方法在所有行处理完毕后，为组件触发一次。\n\
    *   `ProcessInput()` 方法在组件执行期间触发一次。该方法遍历缓冲区中的行，并调用另一个方法 `ProcessInputRow()` 来处理它们。`ProcessInput()`\
    \ 方法以输入名称为前缀；在我们的示例中，它是 `Input0_ProcessInput()`。\n*   `ProcessInputRow()` 方法为传递给它的每一行触发一次。通常，这将是输入缓冲区中的每一行触发一次，但这取决于\
    \ `ProcessInput()` 方法。`ProcessInputRow()` 方法也以输入名称为前缀。在我们的示例中，它被命名为 `Input0_ProcessInputRow()`。\n\
    \n我们的示例中的 `PreExecute()` 和 `PostExecute()` 方法只是调用此处显示的基础方法：\n\n```csharp\npublic\
    \ override void PreExecute()\n{\n    // 调用基方法\n    base.PreExecute();\n}\n\npublic\
    \ override void PostExecute()\n{\n    // 调用基方法\n    base.PostExecute();\n}\n```\n\
    \n`Input0_ProcessInput()` 方法使用 while 循环和输入缓冲区的 `NextRow()` 方法来遍历传入的行。它沿途为每一行调用\
    \ `Input0_ProcessInputRow()` 方法。\n\n在输入缓冲区完全处理完毕后，调用基 `ProcessInput()` 方法，然后为两个输出缓冲区调用\
    \ `SetEndOfRowset()` 方法，以向 SSIS 运行时发出信号，表明所有行都已通过脚本组件处理完毕。\n\n```csharp\npublic\
    \ override void Input0_ProcessInput(Input0Buffer Buffer)\n{\n    // 获取组件名称\n \
    \   ComponentName = this.ComponentMetaData.Name;\n\n    // 遍历行并一次处理一行\n    while\
    \ (Buffer.NextRow())\n    {\n        Input0_ProcessInputRow(Buffer);\n    }\n\n\
    \    // 调用基方法\n    base.Input0_ProcessInput(Buffer);\n\n    // 在输入缓冲区结束时，为两个输出设置行集结束标记\n\
    \    if (Buffer.EndOfRowset())\n    {\n        KeywordOutputBuffer.SetEndOfRowset();\n\
    \        RssFeedOutputBuffer.SetEndOfRowset();\n    }\n}\n```\n\n最后，`Input0_ProcessInputRow()`\
    \ 方法处理缓冲区中的每一传入行。在我们的示例中，我们为每一行向 `RssFeedOutputBuffer` 添加一个新行，然后将传入的值分配给输出缓冲区的相应列。对于\
    \ `KeywordOutputBuffer`，我们做了更多的工作。\n\n首先，我们清理传入的 `Description` 列，消除除空格外的所有标点符号。然后，我们使用\
    \ .NET 的 `Regex`（正则表达式）类将文本拆分为单个单词。接着，我们遍历这些单词并进行计数，将单词及其出现次数存储在 .NET 的 `Hashtable`\
    \ 中。\n\n最后一步是遍历哈希表中的条目并将它们添加到输出中。\n\n> **注意**：关于 .NET `Regex` 和 `Hashtable` 类的详细讨论超出了本书的范围。详细信息可以在\
    \ MSDN（网址为 `http://msdn.microsoft.com`）上搜索找到。\n\n```csharp\npublic override void\
    \ Input0_ProcessInputRow(Input0Buffer Row)\n{\n    bool b = true;\n\n    try\n\
    \    {\n        // 向 RssFeedOutputBuffer 添加一个新行\n        RssFeedOutputBuffer.AddRow();\n\
    \n        // 在输出上设置新行的列\n        RssFeedOutputBuffer.Description = Row.Description;\n\
    \        RssFeedOutputBuffer.FeedLanguage = Row.FeedLanguage;\n        RssFeedOutputBuffer.FeedLink\
    \ = Row.FeedLink;\n        RssFeedOutputBuffer.FeedPubDate = Row.FeedPubDate;\n\
    \        RssFeedOutputBuffer.FeedTitle = Row.FeedTitle;\n        RssFeedOutputBuffer.Link\
    \ = Row.Link;\n        RssFeedOutputBuffer.RowNumber = Row.RowNumber;\n      \
    \  RssFeedOutputBuffer.Title = Row.Title;\n\n        // 从描述中消除除空格外的所有标点符号\n```"
- fmt: "# CHAPTER 10\n\n```csharp\nStringBuilder sb = new StringBuilder(2200);\nforeach\
    \ (char c in Row.Description)\n{\n    if (Char.IsLetterOrDigit(c) || c == ' ')\n\
    \        sb.Append(c);\n    else\n        sb.Append(' ');\n}\n// Split the clean\
    \ string\nstring[] words = Regex.Split(sb.ToString(), \" \");\nint i = 1;\n//\
    \ Loop iterate keywords and count occurrences; store in hash table\nHashtable\
    \ occurrence = new Hashtable(100);\nforeach (string keyword in words)\n{\n   \
    \ if (occurrence.ContainsKey(keyword))\n        occurrence[keyword] = ((int)occurrence[keyword])\
    \ + 1;\n    else\n        occurrence.Add(keyword, 1);\n}\n// Send results stored\
    \ in hash table out to second output\nforeach (DictionaryEntry d in occurrence)\n\
    {\n    if (d.Key != \"\")\n    {\n        KeywordOutputBuffer.AddRow();\n    \
    \    KeywordOutputBuffer.RowNumber = Row.RowNumber;\n        KeywordOutputBuffer.KeyWordNumber\
    \ = i;\n        KeywordOutputBuffer.KeyWord = (string)d.Key;\n        KeywordOutputBuffer.Occurrences\
    \ = (int)d.Value;\n        i++;\n    }\n}\n}\ncatch (Exception ex)\n{\n    this.ComponentMetaData.FireError(-1,\
