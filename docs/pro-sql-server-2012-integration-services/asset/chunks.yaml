    \ Command`和`SQL Command from Variable`模式是从 SQL 数据库或其他 OLE DB 源检索数据的最有效方法。我们在本例中选择了`SQL\
    \ Command`模式。\n\n### SQL Command text box\n`SQL Command`模式提供了一个文本框，你可以在其中输入`SELECT`或其他生成行集的语句。在我们的示例中，我们从`LastName`表抓取行。其他访问模式则提供下拉框来选择表名或变量。\n\
    \n### Parameters button\n如果你在查询中使用了参数，该按钮让你可以将变量映射到参数。\n\n### Build Query button\n\
    允许你在“查询生成器”图形用户界面中编辑你的查询。\n\n### Browse button\n让你可以将 SQL 查询脚本文件加载到`SQL Command`文本框中。\n\
    \n### Parse Query button\n解析并验证你的 SQL 语句的语法。\n\n### Preview button\n让你预览你的 SQL\
    \ 命令文本生成的数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-220_1.jpg)\n\
    \n**CHAPTER 7 – SOURCE AND DESTINATION ADAPTERS**\n\n> **注意：** 当从源表提取数据时，使用 SQL\
