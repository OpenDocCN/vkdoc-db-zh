- fmt: '# CHAPTER 6 - ADVANCED CONTROL FLOW TASKS


    The DDL for the task is written in Analysis Services Scripting Language (`ASSL`).
    The `ASSL` contains information defining the Analysis Services database and database
    objects. This includes login information and other sensitive information. The
    `ASSL` is stored inside an XML of Analysis (`XMLA`) command. The `XMLA` commands
    are used to create, drop, and alter objects on the server.


    **TIP:** If you place the DDL directly into the package, you may want to consider
    using the `EncryptAllWithUserKey` or `EncryptAllWithPassword` protection levels.
    Because the `XMLA` may contain sensitive information, encrypting it is advisable.


    ## Data Mining Query Task


    The `Data Mining Query task` allows you to run Data Mining Extensions (`DMX`)
    statements based on data-mining models defined on an Analysis Services database.
    The output for these queries usually is a predictive analysis based on the provided
    data. The `DMX` statement can reference multiple models, each using its own predictive
    algorithm. Figure 6-3 shows the task as it appears in the control flow designer
    window. The icon, a pickax with some files behind it, shows the basic idea behind
    data mining, which is digging through the data that is available to find the meaningful
    pieces. This task utilizes the `ADO.NET` Connection Manager to connect to the
    Analysis Services database.


    *Figure 6-3. Data Mining Query task*


    ### Data Mining Query Task Editor—Mining Model Tab


    The Mining Model tab of the Data Mining Task Editor allows you to specify the
    database and the mining model to use for a specific query. Figure 6-4 shows the
    options that are available on this page of the editor. The UI for this particular
    task’s editor is different from the rest you have encountered so far. Instead
    of having the pages listed to the left side of the field options, the pages are
    shown as tabs.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-166_1.jpg)


    *Figure 6-4. Data Mining Task Editor—Mining Model tab*


    The following are properties that are modifiable in the Mining Model tab:


    - `Name` uniquely defines the Data Mining task.

    - `Description` provides a brief summary of the task’s purpose.

    - `Connection` allows you to select a defined connection to an Analysis Services
    database.

    - `New` creates a new SQL Server Analysis connection.

    - `Mining Structure` lists all the mining structures defined on the Analysis Services
    database.

    - `Mining Model` lists all the mining models created on the selected mining structure.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-167_1.jpg)


    ### Data Mining Query Task Editor—Query Tab


    The Query tab of the Data Mining Task Editor allows you to either manually type
    a query or use a graphical tool to create the desired query. The query accepts
    `SSIS` variables as parameters. It can also store the results from the query into
    `SSIS` variables. The parameter mapping rules shown in Chapter 5 apply to this
    task as well. The naming convention of the parameter is dependent on the connection
    manager type that is used, in this case the `ADO.NET` connection manager for Analysis
    Services. Each of these modifications has its own tab within the Query tab, as
    shown in Figure 6-5.


    *Figure 6-5. Data Mining Query Task Editor—Query tab*


    These properties are configurable in the Query tab:


    - `Build Query` contains a text field that allows you to type the data-mining
    query.

    - `Build New Query` button opens a graphical tool that will assist you with generating
    the data-mining query. After the query has been generated, it will be imported
    from the tool into the text field. You can further modify it after it is in the
    field.

    - `Parameter Name` lists the parameters used by the data-mining query.'
