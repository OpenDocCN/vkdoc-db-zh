  \n `注意：`这个动态父包的设置与第 16 章演示的动态父包类似。如您所见，已禁用的子包并未向文件追加字符串来指示其包属性值已被父包中配置的参数映射所覆盖。\n\
  \n### 导入过程\n\n`导入过程`指的是使用 Integration Services 导入项目向导将现有项目导入到一个新项目中。该向导看起来与部署向导非常相似，只是不允许您为导入的项目指定目标位置。将项目从其源导入后，您可以将其复制并粘贴到适当的位置。我们在第\
  \ 2 章讨论过此过程。\n\n### 迁移过程\n\n`迁移过程`是随着此版本的 SSIS 引入的，旨在使遗留项目能够符合新的部署模型和功能。此过程也被使用，因为先前版本的\
  \ 601\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-596_1.jpg)\n\
  \nCHAPTER 19  DEPLOYMENT MODEL\n\nSSIS 使用的是 Visual Studio 2005 和 2008，而最新版本使用的是\
  \ Visual Studio 2010。Visual Studio 转换向导旨在使该过程尽可能轻松。当您尝试打开来自先前版本 SSIS 的项目文件时，Visual\
  \ Studio 会自动提示您如图 19-23 所示的向导。然后，该向导将引导您完成升级项目文件的步骤。\n\n*图 19-23. Visual Studio\
