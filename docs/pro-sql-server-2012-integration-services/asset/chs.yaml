  ![](img/index-402_1.jpg)


  *图 10-33. 包含两个目标脚本组件的 SSIS 包*


  我们的目标脚本组件的最终结果是几个 HTML 文件，数据流列数据保存在 HTML 文件中，如图 10-34 所示。


