  不要依赖 Windows 路径的设置。这将避免在不同环境中出现部署问题。路径本身可以通过表达式页面根据你的需要修改变量来设置。


  `Executable` 指定你需要运行的进程。你可以在此字段中指定完整路径。


  `Arguments` 会传递给可执行文件。


  `WorkingDirectory` 定义可执行文件所在的文件夹路径。单击“浏览”按钮将打开 Windows 资源管理器对话框，帮助你定义路径。如果路径可能会因环境而异，我们建议使用表达式来设置此属性。


