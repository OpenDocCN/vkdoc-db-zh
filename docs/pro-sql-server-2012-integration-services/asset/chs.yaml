  \ 7-32 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-241_1.jpg)\n\
  \n##### 图 7-32. 新的 SSIS 目标工作簿，除列标题外为空\n\n接下来，我们将向一个空的数据流添加一个 `OLE DB 源` 适配器和一个 `Excel\
  \ 目标` 适配器。\n\n在将 `OLE DB 源` 配置为从数据库中的 `Country` 表提取数据后，我们将 `OLE DB 源` 输出链接到 `Excel\
  \ 目标` 输入。最后一步是配置 `Excel 目标`。\n\n在 `Excel 目标编辑器` 中，我们选择了新创建的 `Excel 连接管理器`，将数据访问模式设置为\
  \ `表或视图`，并选择了第一个工作表的名称 `Sheet1$`，如图 7-33 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-242_1.jpg)\n\n##### 图 7-33. 在 Excel 目标编辑器中配置 Excel 目标配适器\n\n####\
  \ 原始文件\n\n无论何时从平面文件读取或写入平面文件，后台都在进行成千上万的数据转换。考虑一个整数，例如 `2,147,483,647`。这个数字在您的计算机中仅占用\
  \ 4 字节内存。但当您将其写入平面文件时，它会被转换为一个长度为 10 个字符的数字字符串。这不仅存储空间增加了一倍多，而且由于转换还会带来性能损失。当您从平面文件读回该数字时，您必须读取\
  \ 10 个字符，并再次承受转换带来的性能损耗。诚然，对于单个数字而言，大小差异和性能影响并不大，但如果将其乘以 10 列和 1,000,000 行（这并非不合理的例子），突然之间，您就会在性能和存储空间上看到显著的变化。\n\
  \n对于日常的文件传输以及与其他系统的导入/导出，平面文件是合适的选择。在许多情况下，平面文件并不是很大，因此大小和性能差异并不显著。但更重要的是，在系统之间传输数据时，纯文本是不会出错的选择。考虑到字符集的一些差异，每个系统都能读取文本，每个系统也都能写入文本。\n\
  \n然而，有时您可能会发现需要在处理过程中临时存储大量部分处理过的数据。一个常见的例子是：当大量行已经通过 SSIS 包处理，进行了大量加工后，您需要在另一个\
  \ SSIS 包（或同一包中的不同数据流）中获取这些数据以进行进一步处理。为了最大化 SSIS 包间处理的效率，原始文件是无与伦比的选择。\n\n\n\n"
- '# 第 7 章：源适配器与目标适配器


  `原始文件`是一种专门的二进制格式文件，它消除了与普通平面文件相关的许多转换开销。`原始文件`以二进制格式存储您的数据，使得那些 4 字节整数恰好存储在 4 个字节中。`原始文件`还存储有关列的元数据，因此原始文件中的二进制数据不会意外地被错误格式读入。`原始文件`目标适配器允许您将数据流中的数据输出到原始文件；`原始文件`源适配器则允许您将原始文件读回数据流。原始文件为序列化临时结果提供了一种高效的中间格式。


  仅举一个使用原始文件的例子，我们最近遇到一种情况：必须使用 32 位`Jet 4.0`驱动程序从 Microsoft Access 数据库转储大量数据，然后使用
  64 位驱动程序将数据导入`SQL Server`数据库。您不能在同一个包中混合使用 32 位和 64 位驱动程序，因此解决方案是创建两个包：一个用于从 Access
  提取数据到原始文件，另一个用于将数据导入`SQL Server`。我们使用`SSIS` 32 位运行时运行 Access 提取包，并使用`SSIS` 64 位运行时运行`SQL
  Server`导入包。这只是其中一个例子，但还有很多其他情况，原始文件可以高效地临时存储中间结果。每当您需要临时存储部分处理过的数据时，请考虑使用原始文件。


  #### XML 文件


  `XML 源`适配器允许您使用带有 XML 架构文档（`XSD`）的 XML 文件作为数据流的源。`XML 源`使用您提供的`XSD`从 XML 文件中提取数据值，并将其作为列输出。如果您没有`XSD`文件，此组件将为您生成一个简单的。`XML
  源`适配器对于相对简单的 XML 文件，或者从更复杂的 XML 文件中提取定义良好的数据子集非常有用。


  **注意：** 我们推荐 Matt Masson、Tim Mitchell、Jessica Moss、Michelle Ufford 和 Andy Leonard
  所著的*SSIS 设计模式*（Apress，2012）一书，该书专门用一整章介绍如何使用`SSIS`加载 XML 文件。


  ### 专用适配器


  `SSIS`有两个专用目标适配器，它们提供额外的功能，例如写入内存记录集或`SQL Server Analysis Services`（`SSAS`）。这些适配器如下：


  **记录集：** `SSIS`的`记录集`目标适配器允许您填充内存记录集。内存记录集最常见的用途之一是通过数据流填充它，然后使用`Foreach 循环容器`对其进行迭代。


  **DataReader：** `DataReader`目标适配器以与`.NET DataReader`接口兼容的格式输出数据，该格式可以被能够读取`DataReader`的应用程序接收和使用。例如，`SQL
  Server Reporting Services`（`SSRS`）报表可以设置为使用`DataReader`接口接收`SSIS`包的输出。


  #### Analysis Services


  除了本章介绍的所有源和目标适配器外，`SSIS`还提供了用于`SQL Server Analysis Services`（`SSAS`）的目标适配器。本节概述了`SSAS`的功能，第
  14 章将详细介绍`SSIS`的`Analysis Services`功能。


  表 7-5 列出了`SSIS`的`Analysis Services`目标。


  **表 7-5. Analysis Services 目标**


  | 目标名称 | 描述 |

  | :--- | :--- |

  | 数据挖掘模型训练 | 将数据传递通过数据挖掘模型算法以训练数据挖掘模型 |

  | 维度处理 | 加载和处理`SQL Server Analysis Services`维度 |

  | 分区处理 | 加载和处理`SSAS`分区 |


  ### 小结


  在本章中，我们讨论了`SSIS`的源适配器和目标适配器，这些是将数据移入和移出`SSIS`数据流所需的关键组件。本章开头我们讨论了`SSIS`的源助手和目标助手，这两个新功能旨在使创建源适配器和目标适配器更加方便。然后我们详细介绍了如何创建和使用特定于数据库的各种源适配器和目标适配器，这些是最常用的数据流适配器类型。


  接下来我们讨论了`SSIS`支持读取和写入的各种文件类型，包括平面文件、Excel 电子表格、原始文件和 XML。我们还介绍了专用目标：`记录集`和`DataReader`目标适配器，最后我们介绍了`Analysis
  Services`目标——我们将在第 14 章再次讨论这个话题。


  在下一章中，我们将介绍第三种类型的数据流组件——转换。


  '
- '# 第 8 章：数据流转换


  *目标是将数据转化为信息，将信息转化为洞见。*

  ——卡莉·菲奥莉娜


  在上一章中，您了解了`SSIS`如何从 A 点提取数据并将其推送到 B 点。在本章中，您将开始探索不同类型的**数据操作**，即**转换**，您可以在数据从源移动到目标的过程中对数据执行这些操作。正如卡莉·菲奥莉娜所指出的，我们的最终目标是从原始数据开始，并利用它达到洞见的状态。


  数据流转换是将原始数据沿着这一旅程的前半部分推进、将其转化为可用信息的关键。


  ### 高层次数据流


  `SSIS`数据流由源、转换和目标组成。图 8-1 显示了`SSIS`数据流的高层次视图。


  ![图 8-1. SSIS 数据流的高层次概述](img/index-246_1.jpg)


  如图所示，`SSIS`源组件从各种来源（如数据库、文件和网络）提取数据。源组件将数据引入数据流，数据在数据流中从一种转换移动到另一种转换。数据处理完毕后，它会移动到目标组件，目标组件将其推送到存储，包括数据库、文件、网络或您可以访问的任何其他类型的目标。图中的实心黑箭头类似于`SSIS`设计器中的输出路径（绿色箭头）。某些组件（如我们将在本章后面讨论的`多播`转换）具有多个输出路径。


  每种数据流组件（源组件、转换和目标组件）也可以有一个错误输出路径。在`BIDS`设计器中，这些由红色箭头表示。当组件在处理一行数据时遇到数据错误，该错误行将被重定向到错误输出。通常，您需要将错误输出连接到目标组件，以便保存错误行供后续审阅、修改和可能的重新处理。


  ### 转换类型


  `SSIS`自带了 30 种开箱即用的标准转换。这些标准转换使您能够以多种方式操作数据，包括修改、连接、路由以及对单个行或整个行集执行计算。


  转换可以按功能线分组，我们在本章中就是这样做的。例如，行转换以及拆分和连接转换是我们涵盖的两个组。



  '
- '# 数据流转换


  ## 按数据处理分类


  在不同的层级上，转换也可以根据其处理数据的方式进行分类。具体来说，数据流转换可以分为同步或异步。此外，还可以根据其 `阻塞` 行为进一步细分。


  ### 同步转换


  `同步转换` 一次处理输入的每一行。当通过同步转换发送数据时，SSIS 使用 `输入缓冲区`（在处理期间为临时数据存储预留的内存区域）作为 `输出缓冲区`。如图
  8-2 所示。


  *图 8-2. 同步转换使用输入缓冲区作为输出缓冲区。*


  由于同步转换将输入缓冲区重新用作输出缓冲区，它们往往比异步转换使用更少的内存。一般来说，同步转换也具有以下其他属性（尽管这些属性并非对每个组件都始终成立）：


  -   同步组件通常是非阻塞的或仅部分阻塞的。这意味着它们往往在处理行后立即输出它们，或者在最小延迟下处理和输出行。

  -   同步组件也倾向于输出与接收输入相同数量的行。然而，一些同步组件可能会有效地丢弃行，导致输出行少于输入行。


  ### 异步转换


  `异步转换` 倾向于以集合方式转换数据。当处理单行数据的方法依赖于输入中的其他行数据时，就会使用异步转换。


  例如，你可能需要对输入数据进行排序或聚合。在这些情况下，转换需要一次查看所有数据行，无法独立转换每一行。


  从技术角度来看，异步转换维护独立的 `输入` 和 `输出` 缓冲区。数据移入输入缓冲区，经过转换，然后移动到输出缓冲区。输入和输出缓冲区之间额外的数据移动可能会损失一些性能，并且维护两套独立的缓冲区往往比同步转换使用更多的内存。图
  8-3 显示了数据在异步转换的输入和输出缓冲区之间移动。


  ![](img/index-248_1.jpg)


  *图 8-3. 异步转换将数据从输入缓冲区移动到单独的输出缓冲区。*


  一般来说，异步转换旨在处理以下情况：


  -   输入行的数量不等于输出行的数量。`聚合` 和 `行采样` 转换就是这种情况。

  -   必须获取多个输入和输出缓冲区来排队数据以进行处理，如 `排序` 转换。

  -   必须组合多个输入行，例如 `Union All` 和 `Merge` 转换。


  ### 阻塞转换


  除了将转换分组为同步和异步类别外，如前所述，还可以根据其 `阻塞` 行为进一步细分。`完全阻塞` 的转换必须排队并处理整个行集，然后才能允许数据流通过。考虑 `排序`
  转换，它对整个行集进行排序。考虑将 1000 行推入 `排序` 转换。它不能只排序前 100 行并开始向输出发送行——`排序` 转换必须将所有 1000 行排队以便对它们进行排序。因为它在对输入进行排队时阻止数据流过管道，所以
  `排序` 转换是完全阻塞的。


  一些转换在排队和处理数据时会短暂地阻塞管道流。这些转换被归类为 `部分阻塞`。`合并连接` 转换是一个部分阻塞转换的例子。`合并连接` 接受两个已排序的行集作为输入；执行两个输入的完全、左或内连接；然后输出连接后的行集。当数据通过
  `合并连接` 时，先前缓冲的行可以从输入缓冲区中丢弃。因为它必须从每个行集中排队有限数量的行来执行连接，所以 `合并连接` 是一个部分阻塞组件。


  `非阻塞` 转换不会阻塞数据流。它们在接收数据时尽可能快地转换和输出行。`派生列` 转换是一个非阻塞转换的例子。表 8-1 比较了每类阻塞转换的属性。


  *表 8-1. 转换阻塞类型*


  | 属性 | 完全阻塞 | 部分阻塞 | 非阻塞 |

  | :--- | :--- | :--- | :--- |

  | 通信模式 | 异步 | 异步 | 同步 |

  | 逻辑处理（通用） | 完整行集 | 行集子集 | 行级别 |

  | 输入行数必须等于输出行数 | 否 | 否 | 是 |

  | 处理前排队所有输入行 | 是 | 否 | 否 |

  | 可以生成新线程 | 是 | 是 | 否 |

  | 输入缓冲区是输出缓冲区 | 否 | 否 | 是 |

  | 输入排序顺序保留 | 否 | 否 | 是 |

  | 可以重命名/更改输入列的数据类型 | 是 | 是 | 否 |


  ### 行转换


  行转换通常是类型中最简单、最快的。它们是同步的（某些 `脚本组件` 转换可能除外），并操作于单个数据行。本节介绍 SSIS 中可用的内置行转换。


  **注意：** 我们将在第 10 章详细讨论脚本组件。


  #### 数据转换


  ETL 中的一个常见任务是将数据从一种类型转换为另一种类型。例如，你可能读入 Unicode 字符串，需要将其转换为非 Unicode 编码，或者可能需要将数字数据转换为字符串，反之亦然。这就是
  `数据转换` 转换的设计目的。


  `数据转换` 转换提供了一种简单的方法来转换输入列的数据类型。对于我们的示例，我们借用了一些来自纽约市卫生部的数据。我们选取了选定的有数十项违规的餐厅数据，并将其保存在
  Excel 电子表格中。如图 8-4 所示，我们在 Excel 源适配器之后立即添加了一个 `数据转换` 转换。


  *图 8-4. 在 Excel 电子表格上使用数据转换转换*


  我们在数据流中使用 `数据转换` 转换，因为 `Excel 连接管理器` 只理解少数几种数据类型。例如，它只能将字符数据读取为长度为 255 个字符的 Unicode
  数据或 2.1 GB 的字符大型对象 (`LOB`)。此外，数字只能识别为双精度浮点数，因此你必须将它们显式转换为其他数据类型。


  `数据转换` 转换会为你指定要转换为新数据类型的列创建副本。每个新创建列的默认名称采用 `Copy of <列名>` 的形式，但如图 8-5 所示，你可以在编辑器的
  `输出别名` 字段中重命名列。编辑器的 `数据类型` 字段允许你选择转换的目标数据类型。在本例中，我们选择将 `违规点数` 列转换为有符号整数 (`DT_I4`)，并将
  Unicode 字符串列转换为可变长度的非 Unicode 字符串。


  ![](img/index-251_1.jpg)


  *图 8-5. 编辑数据转换转换*



  '
- '# 第 8 章：数据流转换


  ##### 数据类型映射


  特别是在进行数据转换时，理解 SSIS 数据类型如何映射到目标数据类型非常重要。Microsoft 联机丛刊 (BOL) 文档记录了 SSIS 数据类型与少数几种
