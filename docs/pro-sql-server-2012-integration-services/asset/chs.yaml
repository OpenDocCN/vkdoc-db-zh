  #### 执行进程任务


  SSIS 最有用的功能之一是其能够执行并非严格意义上的 ETL 的任务。`执行进程任务` 就是实现此功能的任务之一。此可执行文件允许您从包内部调用批处理文件或应用程序。此任务还可以运行命令行实用工具或其他应用程序。它甚至提供了属性来接受调用进程时应使用的参数。图
  5-23 在控制流中演示了此任务。此任务的图标是一个应用程序窗口，表明此任务的用途是运行其他程序。此任务可用于运行 `dtexec.exe` 来调用另一个包，但这些包不会在
  Visual Studio 调试模式下运行。


  **图 5-23.** `执行进程任务`


  > **注意：** 如果通过 `SQL Server Agent` 执行包时需要用户输入，包将会失败。


  `执行进程任务编辑器` 的 `进程` 页面（如图 5-24 所示）允许您传入运行外部进程所需的所有相关信息。它还允许您将执行输出传递到 SSIS 变量。在图 5-24
  所示的示例中，我们简单地使用 Windows 中的 `findstr` 实用工具来提取包含字符串 `New` 的行，并将结果存储在 `User::ProcessOutput`
  变量中。`执行进程任务` 的可修改属性如下：`RequireFullFileName` 允许您在指定文件路径中不存在可执行文件时使任务失败。我们强烈建议您定义路径并




