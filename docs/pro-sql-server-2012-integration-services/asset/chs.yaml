- '# 第七章 - 源和目标适配器


  我们将从“添加新源”对话框中选择“平面文件”源和`<新建>`连接管理器。然后使用平面文件连接管理器编辑器来设置平面文件的属性并选择一个源文件。如图 7-4 所示，我们选择了一个名为`zips.csv`的逗号分隔文件，更新了连接管理器名称，并在“常规”页面上勾选了“首行数据包含列名”复选框。我们将区域设置、代码页和其他选项保留为默认值。


  在编辑器的“列”页面上，对于平面文件有两个选项。你可以更改行分隔符（即结束平面文件每一行的字符或字符组合），也可以更改列分隔符（即分隔文件中字段的字符或字符组合）。在本例中，我们选择了默认的`{CR}{LF}`（回车/换行）组合作为行分隔符，并为`.csv`文件选择了逗号（`,`）作为列分隔符。“列”页面还提供了源数据的预览。图
  7-5 在编辑器的“列”页面上突出显示了这些选项。


  > **注意：** `{CR}{LF}` 组合是 Windows 文本文件常见的行分隔符。在其他一些操作系统（如 Unix）上生成的文件仅使用 `{LF}` 字符作为行分隔符。处理由非
  Windows 系统生成的平面文件时，请记住这一点。


  *图 7-5. 在平面文件连接管理器编辑器的“列”页面中编辑属性*


  “高级”页面是编辑器的第三个页面。在此页面上，你可以更改数据源的列特定属性。你可以为单个列更改 `ColumnDelimiter` 属性，以便一个或多个列可以使用特殊的分隔符（例如，当你有一个需要拆分为两部分的输入列时，这很有用）。你还可以更改列的
  `DataType`（默认为字符串，即 `DT_STR`）和输出列宽度（字符串的默认值为 50）。还有 `DataPrecision` 和 `DataScale`
  附加属性，它们分别决定数值列（`DT_NUMERIC`）中的总位数和小数点后的位数。图 7-6 展示了平面文件连接管理器编辑器的“高级”页面。


  对于我们示例中的列，属性设置如表 7-1 所示。


  *表 7-1. 示例列设置*


  | 列名 | 数据类型 | 输出列宽度 | 列分隔符 |

  | :--- | :--- | :--- | :--- |

  | ZIP | 字符串 [`DT_STR`] | | 逗号 (`,`) |

  | STATE | 字符串 [`DT_STR`] | | 逗号 (`,`) |

  | TOWN | 字符串 [`DT_STR`] | | 逗号 (`,`) |

  | LAT | 双精度浮点数 [`DT_R8`] | -- | 逗号 (`,`) |

  | LON | 双精度浮点数 [`DT_R8`] | -- | 逗号 (`,`) |


  *图 7-6. 在平面文件连接管理器编辑器的“高级”页面中编辑列属性*


  ### 精度和小数位数


  平面文件连接管理器编辑器“高级”页面中的 `DataPrecision` 和 `DataScale` 属性仅适用于数值列（`DT_NUMERIC`）和小数列（`DT_DECIMAL`）数据类型。这些列的精度是可以通过该列处理的数字所包含的总位数。例如，数字
  123.45 的精度是 5。列的小数位数是小数点后允许的位数，因此对于 123.45，小数位数是 2。


  对于数值列，精度可以设置为 0 到 38 之间的数字，小数位数也可以设置为 0 到 38 之间的值。小数数据类型的精度始终为 29（无法更改），小数位数可以设置为
  0 到 28。


  配置好连接管理器后，源助手会向数据流中添加适当的源适配器，如图 7-7 所示。你创建的平面文件连接管理器会出现在 BIDS 设计器的“连接管理器”选项卡中。


  *图 7-7. 由源助手创建的平面文件源适配器*


  ### 编辑数据流组件


  将数据流组件添加到设计器界面后，你可以随时通过以下方式对其进行编辑：(1) 双击它，(2) 右键单击并选择“编辑”选项，或 (3) 右键单击并选择“显示高级编辑器”选项。大多数组件的标准编辑器通常是一个简化的用户界面，只提供对最常修改属性的访问。而高级编辑器则提供对数据流组件所有可用属性的访问，例如直接访问输出列和错误输出列属性。我们将在本章后面更详细地介绍高级编辑器的功能。


  ### 目标助手


  除了新的源助手，SQL Server 12 SSIS 还包含一个新的目标助手。


  源助手指导你将源适配器添加到数据流，而目标助手则引导你添加目标适配器。只需将目标助手拖到设计器界面，就会出现“添加新目标”对话框，如图 7-8 所示。与源助手对话框一样，你可以为新目标选择类型和连接管理器。


  你还可以切换“仅显示已安装项”复选框，以列出仅当前已安装的目标类型或所有支持的类型。


  *图 7-8. 目标助手的“添加新目标”对话框*


  在此示例中，我们选择了 SQL Server 目标类型和`<新建>`连接管理器。SQL Server 目标类型为我们提供了 OLE DB 连接管理器编辑器，并选择了
  Native OLE DB\SQL Server Native Client 11.0 提供程序。此编辑器允许你选择服务器名称、提供身份验证凭据并选择要登录的数据库，如图
  7-9 所示。


  *图 7-9. 配置 OLE DB 连接管理器*


  编辑连接管理器属性后，BIDS 会将适当的目标适配器添加到数据流中，本例中是一个 OLE DB 目标。如果目标适配器上有一个红色`x`，如图 7-10 所示，则意味着你需要配置目标适配器的其他属性。在本例中，我们需要将绿色的平面文件源适配器输出路径箭头拖动并连接到
  OLE DB 目标适配器，并配置目标适配器的属性以指向数据库中的表。


  > **注意：** 由目标助手创建的 OLE DB 连接管理器的默认名称格式为`server_name.database_name`。你可能希望将其更改为更友好的名称。只需在“连接管理器”选项卡中右键单击连接管理器，然后从上下文菜单中选择“重命名”。在我们的示例中，我们将数据库连接管理器重命名为`Source_DB`。


  *图 7-10. 由目标助手创建的 OLE DB 目标适配器*



  '
- "# 第七章：源适配器和目标适配器\n\n在将`平面文件源适配器`连接到`OLE DB 目标适配器`之后，我们仍然需要配置`OLE DB 目标适配器`。双击`OLE\
  \ DB 目标适配器`，可以打开`OLE DB 目标编辑器`。通过此编辑器，我们选择了`OLE DB 连接管理器`、`数据访问模式`以及目标表的名称。我们选择了`表或视图\
  \ - 快速加载`作为`数据访问模式`，这让我们也可以设置`每批行数`和`最大插入提交大小`选项。我们将这些选项从默认值更改了。这些选项如图 7-11 所示。\n\
  \n图 7-11. 在编辑器中为 OLE DB 目标设置属性\n\n编辑器的\"映射\"页面为您提供了将目标组件的输入列映射到其输出列的机会。当您将目标适配器连接到数据流时，`BIDS`会尝试根据列名自动进行映射。在我们的示例中，源文件中的所有列都与目标表中的列同名，因此映射为我们自动执行。如果您需要将输入列映射到名称不同的输出列，可以通过在映射窗口的上半部分连接它们，或者在屏幕下半部分的网格视图中更改它们来修改映射，如图\
  \ 7-12 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-216_1.jpg)\n\
  \n图 7-12. OLE DB 目标编辑器的\"映射\"页面\n\n完成目标配置后，`BIDS`中数据流设计器里组件上的红色`x`将会消失。在`BIDS`中运行包，可以看到如图\
  \ 7-13 所示，有 29,470 行数据从平面文件导入到了数据库表中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-217_1.jpg)\n\n图 7-13. 使用源和目标助手创建的简单数据流成功执行\n\n### 数据库源和目标\n\n在前面的章节中，我们向您展示了如何使用源和目标助手来设置一个简单的包，将数据从平面文件提取并推送到数据库中。我们选择使用`平面文件源`和`OLE\
  \ DB 目标适配器`进行演示，因为它们的使用是一个非常常见的场景，尤其是在使用`SSIS`从无法直接连接的遗留系统中提取数据并将其推送到 SQL Server\
  \ 数据库时。本节将详细介绍数据库源和目标，并向您展示如何配置它们更高级的功能。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n#### OLE DB\n\n`OLE DB 源和目标适配器`允许您连接到各种 OLE DB 数据存储，但通常用于数据库连接，因为它们提供良好的性能并支持多种关系数据库。在这个示例中，我们将配置一个`OLE\
  \ DB 源适配器`和一个`OLE DB 目标适配器`，两者都连接到同一个 SQL Server 实例，并将数据从一个表移动到另一个表。这将是一个非常简单的演示，但将让您有机会探索各种\
  \ OLE DB 配置选项。\n\n对于我们的示例，我们有两个表：一个名为`LastName`，包含美国最常见的姓氏列表（数据来自美国人口普查局）；另一个名为`LastName_Stage`，我们将把姓氏复制到这个表中。\n\
  \n我们的第一步是创建两个连接管理器，分别名为`Source_DB`和`Dest_DB`。\n\n在这个示例中，这两个连接管理器指向同一台服务器和同一个数据库，但在现实世界中，它们很可能指向不同的服务器，或者同一服务器上的不同数据库。这就是为什么我们要为它们创建两个独立的连接管理器。表\
  \ 7-2 显示了您可以在`OLE DB 源编辑器`中选择的各种选项，该编辑器如图 7-14 所示。\n\n表 7-2. OLE DB 源编辑器对话框控件\n\n\
  **选项  描述**\n\n##### OLE DB 连接管理器下拉列表\n让你为数据源选择一个 OLE DB 连接管理器。在我们的示例中，我们选择了先前创建的\
  \ `Source_DB` 连接管理器。\n\n##### 数据访问模式下拉列表\n决定源适配器如何从 OLE DB 源检索数据。共有四个选项：\n\n-  \
  \ **表或视图模式**：让你选择数据库中的一个表或视图作为源。此模式返回表中的所有列，类似于 `SELECT *` 查询，但因源需要自行检索表元数据，开销稍大。\n\
  \n-   **表名或视图名变量模式**：让你将表或视图的名称存储在字符串变量中，以便在运行时检索。此模式也类似于 `SELECT *` 查询，返回表的所有列，包括你可能不需要的列。\n\
