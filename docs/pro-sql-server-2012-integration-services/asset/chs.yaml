  ## 第五章  控制流基础


  #### 文件系统任务


  对于某些 ETL 项目，会使用来自文件系统的文件作为数据源或项目控制器。为了能够在 SSIS 中操作文件系统以恰当处理这些文件，SSIS 提供了 `文件系统任务`。此任务（如图
  5-25 所示）执行对文件和目录的操作。该任务的图标显示了两个文件，代表了此任务操作的元素。


  *图 5-25. 文件系统任务*


  文件系统任务编辑器的“常规”页（如图 5-26 所示）允许你配置需要该任务执行的操作。该任务将根据所选操作动态更改可供编辑的属性。在我们演示的示例中，我们只是简单地将一个文件复制到另一个位置。


  *图 5-26. 文件系统任务编辑器—常规页*


  [www.it-ebooks.info](http://www.it-ebooks.info/)


