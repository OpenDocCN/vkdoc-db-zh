  ### 高级容器


  前一章介绍了 `Sequence`（序列）容器，作为一种组织控制流以使其更易读的方法。本章介绍另外两个默认容器：`For Loop`（For 循环）容器和 `Foreach
  Loop`（Foreach 循环）容器。顾名思义，这两个容器用于重复运行一组可执行文件。`For Loop` 容器执行预设的次数，而 `Foreach Loop`
  容器则依赖一个枚举器来控制其迭代。这些容器限制了优先约束跨越多个容器。当容器内的最后一个可执行文件或并发可执行文件完成执行时，迭代开始。要将可执行文件添加到容器中，你需要点击并从
  SSIS 工具箱中将它们拖到容器内部的空间中。`Task Host`（任务宿主）容器不能直接访问，但它有助于组织控制流可执行文件。


  #### For Loop 容器


  `For Loop 容器` 应在执行次数预先确定时使用，它不依赖于对象来确定迭代次数。`For Loop` 容器利用表达式来设置、评估和递增迭代器。图 6-27
  展示了该容器在没有任何可执行文件时在控制流中的样子。其图标是一个方形，周围有一个形成循环的箭头。方形代表被持续执行的过程。根据提供的表达式，此循环也可以表现为
  `while` 或 `do while` 循环。名称标签右侧的箭头允许你折叠容器以最小化其在控制流中占用的空间。


  *图 6-27\. For Loop 容器*


