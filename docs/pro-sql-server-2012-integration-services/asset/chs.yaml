- '# 第 1 章 集成服务简介


  我们强烈建议你在学习`SSIS`或遇到关于最佳实践的问题，或需要就如何在你的包中完成非常具体的任务寻求指导时，访问这些网站。


  ### 小结


  `SSIS`是一个强大且灵活的企业级`ETL`解决方案，旨在满足你最苛刻的数据移动和操作需求。本章介绍了一些`ETL`的基本概念，以及`SSIS`如何融入 SQL
  Server 的`ETL`体系。我们介绍了`SSIS`架构的一些核心概念，并讨论了 SQL Server 12 `SSIS`中的最新特性。最后，我们列出了一些我们最喜欢的人和资源网站。在第
  2 章中，我们将介绍`BIDS`和`SSMS`，重点介绍那些旨在让你的`ETL`包设计、构建和测试比以往任何时候都更容易的新特性。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


