  ## 第 8 章 - 数据流转换


  当你需要将大型对象数据与其他数据行绑定并一起存储在数据库中时，**导入列**转换非常有用。但有一个注意事项——这个转换的编辑器是所有转换中较为晦涩的之一。


  ##### 配置导入列


  配置**导入列**的第一步是在**输入列**选项卡上选择一个字符串列。我们选择了**图片名称**列，该列之前我们已填充了从数据流传入的每个图片的完整路径（在**派生列**转换中）。你可以在图
  8-13 中看到这一点。


  *图 8-13. 选择指向要导入文件的输入列*


  你在第一步中选择的输入列会告诉**导入列**转换要将哪个文件导入数据流。正如我们的示例所示，该任务应包含文件的完整路径。


  配置此转换的下一步是在**输入和输出属性**中添加一个输出列。该列将在**导入列**读取文件后保存其内容。以下为此新输出列的合适数据类型：


  *   `image [DT_IMAGE]` 用于图像、文字处理文件或电子表格等二进制数据

  *   `text stream [DT_TEXT]` 用于 ASCII 文本文件等文本数据

  *   `Unicode text stream [DT_NTEXT]` 用于 Unicode 文本文件和 UTF-16 编码的 XML 文件等 Unicode
  文本数据


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-264_1.jpg)


  ## 第 8 章 - 数据流转换


  **导入列**较为晦涩的方面之一是在**输入和输出属性**选项卡上配置输入列。要配置输入列，请拿一支笔和一张纸（是的，笔和纸！）并记下你的输出列 **ID**
  属性旁边的数字。在我们的示例中，该数字是 `201`。


  然后在同一选项卡上编辑输入列。滚动到页面底部，将你刚刚记下的数字输入到 **FileDataColumnID** 属性中。如果你正在加载 Unicode 数据，并且你的数据具有字节顺序标记（BOM），则可以将
  **ExpectBOM** 属性设置为 `True`，否则设置为 `False`。如图 8-14 所示。


  *图 8-14. 完成导入列转换的配置*


  最后，如果你的输入列可能包含空值，你可能需要将 **ErrorRowDisposition** 属性从默认值 `RD_FailComponent` 更改为 `RD_IgnoreFailure`
  或 `RD_RedirectRow`。如果设置了 `RD_IgnoreFailure` 或 `RD_RedirectRow`，则组件在遇到空值时不会引发异常。不幸的是，此组件无法将空值与不存在的实际文件路径分开处理（如果你愿意，可以使用额外的数据流组件单独处理此问题）。正确配置**导入列**的最终结果是，输入列引用的图像文件中包含的数据被添加到数据流的新输出列中。


  ## 处理错误行


  SSIS 中的数据流转换在处理错误行方面提供了相当大的灵活性。许多组件提供了细粒度的错误处理，允许你为可能发生的不同类型异常选择不同的错误处理方式。例如，在某些组件中，你可以将截断错误与其他错误区别处理。


  **导入列**转换错误的错误处理粒度较低——行要么（因任何原因）出错，要么不出错。无论你使用的转换具有何种错误处理粒度，你都有几个选项来处理错误行：


  *   `RD_FailComponent` 在遇到错误时导致组件失败；这是大多数转换的默认错误处理方式。

  *   `RD_IgnoreFailure` 简单地忽略发生的错误。

  *   `RD_RedirectRow` 将导致错误的行重定向到组件的错误输出。


  在其他界面不那么晦涩的组件中，你会在它们的编辑器中看到相同的选项，但名称更友好。在这些组件中，你会看到选项列为 *忽略失败*、*重定向行* 和 *失败组件*。这些选择与前面列表中的
  `RD_` 选项等效。


  #### OLE DB 命令


  **OLE DB 命令**转换是一种有趣的行转换，它为通过转换的每一行执行一条 SQL 语句。最常见的情况是，你会看到**OLE DB 命令**转换用于对单个行发出更新语句，主要是因为
  SSIS 目前还没有一个**合并目标**可以为你完成批量更新的工作。


  **注意：** **OLE DB 命令**转换使用一种称为“逐行痛苦处理”（Row by Agonizing Row， RBAR）的处理模型（该术语由 SQL
  专家和 Microsoft MVP Jeff Moden 推广）。在 SQL 方面，这对于大型数据集不被视为最佳实践。


  为了演示，我们设置了一个数据流，该数据流读取一个 Excel 电子表格，其中包含对我们之前加载的餐厅信息的更新，然后将更新应用到数据库。图 8-15 显示了数据流中的
  **OLE DB 命令**。


