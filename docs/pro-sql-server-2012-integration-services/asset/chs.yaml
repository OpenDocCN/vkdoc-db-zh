  ### SQL Server Management Studio 简介


  SQL Server 12 内置的用于访问和维护的工具是 Management Studio。它允许你配置、管理和开发 SQL Server 的组件。连接到数据库引擎允许你使用
  T-SQL 以及通过使用 `SQLCMD` 模式的 SQL 命令实用程序来执行操作系统命令。数据库引擎允许使用 DDL 来创建对象，使用 DML 来访问对象中的数据，以及使用
  DCL 来定义用户对对象的 DDL 和 DML 访问权限。Management Studio 允许你创建和修改 T-SQL、MDX、DMX、XML 和 XML
  for Analysis (XMLA) 脚本，甚至是纯文本文件。




  ### Management Studio 与 SQL 查询开发


  Management Studio 对于在 SSIS 中开发 SQL 查询至关重要。这些查询可被源组件、执行 SQL 任务、查找组件以及 OLE DB 命令组件使用。为
  SSIS 数据流任务从数据库检索数据的最有效方法是指定所需的列。这允许缓冲区填充行而非列，因为未指定的列将被丢弃。这对于查找组件同样重要，因为默认情况下它们会缓存结果集，因此
  `SELECT` 语句中应仅指定键列和输出列，而非整个数据集。


  > **注意：** 级联查找组件会在运行时堆叠创建的缓冲区。每个查找操作都会创建其前一个缓冲区的副本，并将新的查找结果列添加到该副本中。这些缓冲区直到一批行被提交或到达数据流末尾才会被释放。在数据流中堆叠多个查找操作可能导致内存溢出和性能下降。仅应通过组件将必要的列引入管道。


  #### 工具窗口


  用于访问数据库引擎的查询窗口如图 2-12 所示。随着 SQL Server 2008 引入 `IntelliSense`，查询开发变得更加容易，因为它提供了关于函数的快速参考信息以及对数据库对象的自动填充功能。对于
  SQL Server 12，Management Studio 已基于 Visual Studio 框架构建，这在声明了此事实的启动屏幕上最为明显。


  默认情况下，Management Studio 环境由三个窗口组成。左侧是 `Object Explorer` 窗口；它允许您通过以服务器为根节点的树形视图查看所有已定义的对象。除了显示对象外，它还提供了用于执行管理和管理任务的向导及选项。`Object
  Explorer` 可用于连接多个实例以及 SQL Server 的不同引擎。对于数据库引擎，查询窗口是主要的访问方式。查询窗口默认位于中间，但可以拖动到屏幕上的任何位置，且不受
  Management Studio 窗口的限制。如果使用多个屏幕，可以将查询窗口移动到与 Management Studio 不同的屏幕上。


  *图 2-12. SQL Server Management Studio 的工具窗口*


  默认情况下，Management Studio 的设置有三个顶部栏：菜单栏、工具栏和上下文菜单。这些栏可以帮助您快速访问所需的对象和数据，而无需费力寻找选项。以下列表突出显示了常见的工具栏按钮：


  - `新建查询`：基于 `Object Explorer` 的上下文打开一个新的查询窗口。如果所选对象是数据库引擎的成员，查询将是 SQL 查询。如果对象是 Analysis
  Services 数据库，查询将是 MDX 查询。查询将自动连接到所选对象所属的服务，或者使用当前查询窗口的连接信息。

  - `数据库引擎查询`：打开一个新的查询窗口并询问连接数据库所需的信息。执行和解析查询需要此连接。

  - `Analysis Services MDX 查询`：创建一个可查询多维数据集数据的新查询窗口。对于非 Analysis Services 开发人员，通过
  `Object Explorer` 使用 `浏览多维数据集` 选项可能就足够了。

  - `Analysis Services DMX 查询`：为数据挖掘表达式创建一个新的查询窗口。这些查询用于访问多维数据集上存在的数据挖掘模型。

  - `Analysis Services XMLA 查询`：为定义 Analysis Services 数据库对象创建一个新的查询窗口。此查询通常使用 BIDS
  开发，并针对 Analysis Services 运行以创建多维数据集。

  - `活动监视器`：打开一个显示服务器状态的窗口。可以修改刷新速率以所需的速度显示信息。图 2-13 展示了监视器跟踪的各种统计数据。


  *图 2-13. Management Studio 活动监视器*


  上下文菜单特定于当前选定的查询窗口。MDX 和 DMX 查询具有相同的菜单，而数据库引擎和 XMLA 查询的菜单略有不同。多维数据集查询与 T-SQL 查询之间的主要区别在于结果显示和执行计划选项，这些选项存在于
  T-SQL 查询中，而多维数据集查询中没有。因为 XMLA 不查询数据，而是定义执行分析的对象，所以它有一套完全不同的工具集。多维数据集和 T-SQL 查询都有以下工具：


  - `连接`：将断开的查询连接到适合查询类型的数据库。

  - `更改连接`：提示您输入连接信息，以更改正在查询的实例。

  - `可用数据库`：是一个下拉列表，包含当前实例上所有可用的数据库。

  - `执行`：这是迄今为止最常用的，执行当前窗口中的查询。如果高亮显示了部分代码，则仅执行高亮显示的代码。


  > **注意：** 执行中的错误通常会显示一个最有可能找到错误的行号。此行号是相对于语句开始的批处理的起始位置。第 10 行实际上可能是查询窗口中的第 30 行。为了帮助定位错误，我们建议您通过“选项”菜单并选择“文本编辑器”来打开“行号”。

  - `解析`：这是另一个常用的功能，将解析查询以验证其语法是否正确。它不会验证对象是否存在。如果连接到 SQL Server 2008 或更高版本的实例，`IntelliSense`
  通常会提供一些错误高亮显示。

  - `注释掉选定行`：在当前或选定的每一行开头添加一个带有双连字符 (`--`) 的单行注释。

  - `取消注释选定行`：从当前或选定的每一行开头移除任何由双连字符 (`--`) 标记的单行注释。

  - `减少缩进`：从当前或选定的代码行开头移除任何现有的缩进。

  - `增加缩进`：在选定或当前代码行添加缩进。默认情况下，缩进是一个制表符，但可以通过“选项”菜单更改。

  - `为模板参数指定值`：弹出一个窗口，该窗口将用指定的值替换查询模板中的参数。该实用程序自动读取模板中定义的参数，如图 2-14 所示。SQL Server
  和 Analysis Services 都有大量可用模板。图 2-15 展示了这两者的模板。


  T-SQL 查询有几个其他查询类型没有的额外上下文选项。这些选项涉及输出结果和查询计划资源管理器。与 SQL 查询关联的按钮如下：


  - `显示估计的执行计划`：显示查询窗口中查询的估计查询计划。该计划以图形方式显示在输出屏幕底部其自己的选项卡“执行计划”中。在对查询进行性能调整时，此实用程序至关重要。

  - `查询选项`：打开一个“查询选项”窗口，允许您为查询执行和结果集设置某些选项。

  - `IntelliSense 已启用`：切换 `IntelliSense` 的开启和关闭。

  - `包含实际执行计划`：将查询计划与结果一起包含。此计划与估计计划的不同之处在于，它显示了查询优化器实际执行的操作。该计划显示在名为“执行计划”的选项卡中。




