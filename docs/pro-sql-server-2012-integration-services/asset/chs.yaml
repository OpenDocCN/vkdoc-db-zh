- '# 第六章：高级控制流任务


  本章介绍了基本的控制流项，这些项将使您能够利用第四章介绍的一些连接管理器。控制流设计器窗口使用 SSIS 工具箱来添加可执行文件。这些可执行文件和容器按可自定义的组进行组织，以适应您的开发习惯。本章介绍了“收藏夹”和“常用”组。优先约束定义了对象执行的顺序和条件。容器可用于使包模块化。本章介绍了序列容器。断点可在调试模式下使用，具体取决于目标对象引发的事件。第六章涵盖了剩余的任务和容器。


