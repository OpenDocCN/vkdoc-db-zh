  表达式的连接管理器。`变量`选项表示 XPath 表达式存储在 SSIS 变量中。`直接输入`选项要求您直接在编辑器中键入 XPath 表达式。


  `OuterXPathString`根据其类型指定 XPath 表达式源。对于`文件连接`和`变量`选项，您会得到一个下拉列表，分别包含文件连接或 SSIS 变量。对于`直接输入`，编辑器提供一个文本字段用于键入
  XPath 表达式。


  `InnerElementType`指定列表中内部元素的类型。类型选项包括`导航器`、`节点`和`节点文本`。


  `InnerXPathSourceType`为应用于元素集合的 XPath 表达式提供源类型。`文件连接`选项允许您指定一个指向 XPath 表达式的连接管理器。`变量`选项表示
  XPath 表达式存储在 SSIS 变量中。`直接输入`选项要求您直接在编辑器中键入 XPath 表达式。


  `InnerXPathString`根据其类型指定 XPath 表达式源。对于`文件连接`和`变量`选项，您会得到一个下拉列表，分别包含文件连接或 SSIS 变量。对于`直接输入`，编辑器提供一个文本字段用于键入
  XPath 表达式。


