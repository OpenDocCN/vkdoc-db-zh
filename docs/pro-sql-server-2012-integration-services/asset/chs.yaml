  #### 项目文件


  SSIS 2012 中的一些变化涉及项目文件可用的属性。项目文件的属性允许配置构建过程——具体来说，是包的文件夹路径。文件夹路径属性还允许用户直接将项目部署到
  SQL Server 数据库，即 Integration Services 目录。Integration Services 目录将在第 18 章中详细讨论。


  在文件系统中手动添加或删除包（`.dtsx`）文件不会修改或更新项目文件。实际上，从文件系统中删除包会损坏项目。`代码清单 2-1`演示了可修改以添加或移除项目中包的
  XML 标签。


  `注意：` 我们建议在 Visual Studio 中添加现有包。但是，如果一个包已经存在于项目文件夹中，Visual Studio 将创建该原始包的副本，并将该副本添加到项目中。通常，复制的包名称会附加“(1)”。


  `代码清单 2-1. 项目文件示例`


