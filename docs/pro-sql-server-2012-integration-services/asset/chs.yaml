  #### HTTP 连接管理器


  正如 FTP 可用于存储文件，超文本传输协议（`HTTP`）也可用于存储数据。`HTTP` 连接允许您连接到 Web 服务器以执行任务。此连接使您能够向 Web
  服务器上传文件以及从中下载文件。此连接管理器与 `Web Service`（Web 服务）任务协同工作。`图 4-12` 显示了用于配置此连接管理器的选项。


  `图 4-12. HTTP 连接管理器编辑器—服务器页面`


  `Server URL`（服务器 URL）存储目标 Web 服务器的 URL。如果您打算在 `Web Services` 任务上使用 Web 服务描述语言（`WSDL`），则
  URL 应以 `?wsdl` 结尾。`Use Credentials`（使用凭据）选项允许您指定连接到 Web 服务器所需的登录信息。


  `User Name`（用户名）、`Password`（密码）和 `Domain`（域）是服务器识别凭据的关键元素。`Use Client Certificate`（使用客户端证书）选项允许您指定一个证书来验证连接。启用后，`Certificate`（证书）按钮允许您选择要使用的证书。`Time-Out`（超时）设置允许您定义连接到
  Web 服务器的分配时间。`Chunk Size`（块大小）选项决定要写入的数据大小。`Test Connection`（测试连接）按钮允许您测试连接管理器的当前配置，如
  `图 4-13` 所示。


  `图 4-13. HTTP 连接管理器编辑器—代理页面`


  `Proxy`（代理）页面允许您使用代理服务器连接到定义的 URL。`Proxy URL`（代理 URL）需要所用代理服务器的 URL。`Bypass Proxy
  on Local`（本地地址绕过代理）选项允许您对本地地址绕过使用代理服务器。`Use Credentials`（使用凭据）复选框允许您提供连接到代理服务器可能需要的身份验证信息。`User
  Name`（用户名）、`Password`（密码）和 `Domain`（域）是访问代理服务器必要的关键组件。`Add`（添加）和 `Remove`（删除）按钮允许您修改定义的要绕过代理服务器的地址列表。


