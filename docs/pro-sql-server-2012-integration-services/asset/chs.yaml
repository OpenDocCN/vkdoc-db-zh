  '
- "# 第二章 - BIDS 与 SSMS\n\n**Include Client Statistics** 在名为“Client Statistics”的选项卡中显示客户端统计信息。此实用工具实际上会记录不同查询执行的统计信息，显示每次执行的变化以及每个统计信息的平均值。\n\
  \n**Results to Text** 将查询结果以文本形式输出。输出以空格分隔，可能难以阅读，但在没有电子表格程序的情况下，这是传输查询结果最简单的方法。\n\
  \n**Results to Grid** 以网格格式显示结果，可以轻松复制到 Excel 或其他电子表格编辑器中。可以一次复制整个结果集、特定列或特定记录。\n\
  \n**Results to File** 将结果直接输出到指定文件。每次执行查询时都需要定义文件。结果集的默认格式是报表文件（`.rpt`）。\n\n对于 XMLA\
  \ 查询，上下文菜单主要由 XML 编辑器选项组成，旨在帮助闭合当前标签并提供有关对象当前属性的信息。\n\n### SQL Server Management\
  \ Studio 项目\n\n与 BIDS 一样，SSMS 支持项目。然而，这些项目仅限于三种类型：由 T-SQL 脚本组成的 SQL Server 脚本；由\
  \ MDX、DMX 和 XMLA 脚本组成的 Analysis Services 脚本；以及 SQL Server Compact Edition 脚本。这些项目由三部分组成：连接、查询和杂项。以下列表提供了这些部分的简要描述：\n\
  \n- **Connections** 存储与项目相关的所有连接。创建连接后，即可使用该连接创建查询，而无需使用对象资源管理器。如果未独立创建连接，则为项目中查询建立的连接将自动添加。\n\
  - **Queries** 包含与项目关联的所有查询。根据项目类型，只有受支持的文件才能添加到此文件夹中（例如，SQL Server 项目的 `.sql` 文件）。\n\
  - 查询的连接信息存储在项目文件（`.ssmssqlproj` 或 `.ssmsasproj`）本身中。与 BIDS 一样，项目文件包含重要信息。对于 Management\
  \ Studio 项目，它们包含诸如超时时间、包含的查询以及查询的连接信息等信息。打开项目中包含的查询将使用其最初连接到的服务器的连接来打开它。\n\n###\
  \ 模板\n\nSQL Server Management Studio 提供了许多模板来存储常见的 DDL 和 DCL 语句。\n\n这些语句同时适用于 SQL\
  \ Server 和 Analysis Services；模板如图 2-14 所示。这些模板包含可使用名为“Specify Values for Template\
  \ Parameters”（如图 2-15 所示）的实用工具轻松替换的参数。此实用工具执行类似于“查找和替换”的功能，但专门用于识别所有参数并将其全部显示在一个位置。模板以树形结构存储，模板类型位于根目录。要访问模板资源管理器，可以从工具栏中选择“视图”，然后单击“模板窗口”。在窗口的左上角，您将看到两个按钮，允许您打开\
  \ SQL Server 模板或 Analysis Services 模板。模板将作为新的查询窗口打开。\n\n![Management Studio 中的代码模板](img/index-41_1.jpg)\n\
  \n*图 2-14. Management Studio 中的代码模板*\n\n![指定模板参数值](img/index-42_1.jpg)\n\n*图 2-15.\
  \ 指定模板参数值*\n\n展开到所需的树后，只需双击即可将模板添加到查询窗口。模板打开后，可以使用上下文菜单上的“指定模板参数值”按钮来调用该实用工具。模板的真正强大之处在于您可以创建自己的一组模板以满足您的特定需求。您可以在脚本顶部添加注释块，提供有关脚本及其内容的详细信息，并且所有这些都可以参数化。\n\
  \n参数具有以下格式：`<parameter_name, data_type, value>`。`parameter_name` 指定参数的名称，`data_type`\
  \ 指定参数的数据类型，`value` 指定将替换参数每个实例的值。\n\n您还可以将模板添加到您选择的文件夹中。因为大多数对象都有其模板的文件夹，所以您更可能在现有文件夹中创建模板，而不是创建自己的模板文件夹。\n\
  \n### 代码片段\n\n代码片段在 Visual Studio 环境中已经存在了几个版本。随着 SQL Server 12 的推出，它们现在也可用于 Management\
  \ Studio。它们的工作方式与模板类似，但与模板不同的是，它们可以直接插入到当前查询窗口中。`Ctrl+K, Ctrl+X` 会调出片段插入器，其中包含可用片段的下拉列表。片段最棒的部分是能够为您最常使用的代码包添加自己的自定义片段。此功能在\
  \ Visual Studio 开发中非常有用，也是 SQL Server 12 中一个受欢迎的功能。清单 2-4 显示了我们创建的一个自定义片段，用于编写表的删除和创建语句脚本。\n\
  \n> **注意：** 默认的片段集主要由 DDL 和 DCL 对象创建脚本组成。这非常有用，因为 SSMS 存储了我们开发人员最可能使用的实际语法，以参考 Microsoft\
  \ 开发者网络 (MSDN) 或联机丛书 (BOL)。通过创建自己的片段的能力，您 90% 的日常语法都可以为此目的进行编码。除了语法之外，查询的常见代码块（您在大多数查询上执行的连接、对业务逻辑至关重要的\
  \ where 子句等）都可以编写脚本，以便只需按几下键就可以将它们添加到代码中，而无需一遍又一遍地输入。\n\n*清单 2-4. 用于删除和创建表的片段*\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\" ?>\n<CodeSnippets>\n    <_locDefinition>\n\
  \        <_locDefault _loc=\"locNone\" />\n        <_locTag _loc=\"locData\">Title</_locTag>\n\
  \        <_locTag _loc=\"locData\">Description</_locTag>\n        <_locTag _loc=\"\
  locData\">Author</_locTag>\n        <_locTag _loc=\"locData\">ToolTip</_locTag>\n\
  \    </_locDefinition>\n    <CodeSnippet Format=\"1.0.0\">\n        <Header>\n \
  \           <Title>Drop and Create Table</Title>\n            <Shortcut></Shortcut>\n\
  \            <Description>Drops a table if it exists, then creates a table.</Description>\n\
  \            <Author>Rodrigues, Coles</Author>\n            <SnippetTypes>\n   \
  \             <SnippetType>Expansion</SnippetType>\n            </SnippetTypes>\n\
  \        </Header>\n        <Snippet>\n            <Declarations>\n            \
  \    <Literal>\n                    <ID>SchemaName</ID>\n                    <ToolTip>Name\
  \ of the schema</ToolTip>\n                    <Default><![CDATA[<schema_name, sysname,\
  \ dbo>]]></Default>\n                </Literal>\n                <Literal>\n   \
  \                 <ID>Tablename</ID>\n                    <ToolTip>Name of the table</ToolTip>\n\
  \                    <Default>Sample_Table</Default>\n                </Literal>\n\
  \                <Literal>\n                    <ID>column1</ID>\n             \
  \       <ToolTip>Name of the column</ToolTip>\n                    <Default>ID</Default>\n\
  \                </Literal>\n                <Literal>\n                    <ID>datatype1</ID>\n\
  \                    <ToolTip>Data type of the column</ToolTip>\n              \
  \      <Default>INT IDENTITY(1,1) NOT NULL</Default>\n                </Literal>\n\
  \                <Literal>\n                    <ID>column2</ID>\n             \
  \       <ToolTip>Name of the column</ToolTip>\n                    <Default>Desc</Default>\n\
  \                </Literal>\n                <Literal>\n                    <ID>datatype2</ID>\n\
  \                    <ToolTip>Data type of the column</ToolTip>\n              \
  \      <Default>NVARCHAR(50) NULL</Default>\n                </Literal>\n      \
  \      </Declarations>\n            <Code Language=\"SQL\">\n                <\n\
  ```\n\n\n\n"
- "# 第 2 章 - BIDS 与 SSMS\n\n### 代码片段示例\n\n```\nIF EXISTS\n(\n    SELECT *\n    FROM\
  \ sys.objects\n    WHERE object_id = OBJECT_ID(N'[$SchemaName$].[$Tablename$]')\n\
  \    AND type in (N'U')\n)\nDROP TABLE [$SchemaName$].[$Tablename$];\nGO\n\nCREATE\
  \ TABLE $SchemaName$.$Tablename$\n(\n    $column1$ $datatype1$,\n    $column2$ $datatype2$\n\
  );\nGO\n\n$end$]]>\n</Code>\n\n</Snippet>\n\n</CodeSnippet>\n\n</CodeSnippets>\n\
  ```\n\n### 代码片段关键组件\n\n代码片段中的一些关键组件在清单 2-4 中突出显示，并在此详细说明：[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**标题** 是 Management Studio 用来唯一标识你的自定义片段的名称。将片段添加到集合的向导如果检测到与同一文件夹路径中的现有片段发生冲突，将强制重命名该片段。\n\
  \n**字面量** 定义了代码片段中可以快速替换的部分。使用 Tab 键可以在代码中的字面量之间切换。字面量可以定义为默认值，该值可以设置为参数。将参数用作字面量的默认值，是“为模板参数指定值”实用工具能被用于代码片段的关键。\n\
  \n**代码** 包含要插入到脚本中的实际代码。代码块将按原样插入到 CDATA 块中。它将保留空白字符，并用指定的默认值替换字面量。\n\n使用片段插入器插入代码片段后，你可以使用\
  \ Tab 键在查询中导航，方法是自动高亮显示替换点并用你自己的字符串替换它们。对于重用代码的更复杂片段，利用参数可能是一个更好的主意，如我们在清单 2-4 中所示。这使你能够利用\
  \ Management Studio 中的“为模板参数指定值”功能。\n\n### 用于 SSIS 的查询\n\n在 Management Studio 中创建的查询可以保存在文件系统上，以便轻松地并入\
  \ SSIS。例如，OLE DB 源组件在其编辑器中有一个“浏览”按钮，允许你将保存在文件系统上的查询作为源组件的 SQL 命令导入。仅当使用“SQL 命令”作为数据访问模式时，此选项才可用。\n\
  \n如果查找组件设置为使用 SQL 查询的结果，也可以导入查询。\n\n通过此功能，开发人员可以更轻松地编写用于提取数据的 SQL，并根据需要直接将其导入到他们的\
  \ SSIS 包中。将此功能与 Management Studio 的代码片段功能相结合，复杂的连接和 where 子句可以存储起来，以便于在任何脚本中访问。\n\
  \n### 总结\n\nSQL Server 12 通过其 Business Intelligence Development Studio 提供了整个商业智能工作所需的功能。本章介绍了工具库中一个重要工具——Integration\
  \ Services——的所有新功能和增强功能。我们还介绍了维护和管理 SQL 套件的关键组件 Management Studio。最后，我们描述了所有这些组件如何共同构建一个端到端的解决方案，以及为提高开发人员代码复用性而进行的一些增强。第\
  \ 3 章将引导你开发你的第一个包，并向你介绍一些你应该从一开始就养成的使用习惯的最佳实践。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 第 3 章 - Hello World——你的第一个 SSIS 2012 包


  > *怀着信念迈出第一步。你不必看清整个阶梯，只需迈出第一步。*

  >

  > ——民权运动领袖马丁·路德·金


  在上一章中，我们向你介绍了 SQL Server 12 的开发工具 BIDS 和 SSMS。


  在深入讨论细节之前，我们将通过一些示例包来演示这个强大工具集的功能。作为一名开发人员，在亲自尝试这些工具之后，你更容易理解它们。本章教你如何从最简单的包开始，该包由一个仅包含源和目标的数据流任务组成。在引导你创建这个简单的包之后，我们将指导你完成一个更复杂的、现实生活中包的例子。这个包的目标将是模拟一些可能成为你
  ETL 流程一部分的潜在需求，因此作为一个相对复杂的例子在第三章中介绍。


  在引导你创建第一个包之前，我们没有涵盖所有细节，原因是 SSIS 拥有大量的工具集，其中大多数不会同时一起使用。例如，大多数项目只会使用少数几个连接管理器，而
  SSIS 有更多可用的。根据项目的要求，由 SSIS 处理的流程可能必须与其他工具分开。本章快速浏览了 SSIS 的一些功能。


  在本章中，我们的数据来自美国人口普查局网站，[`2010.census.gov/2010census/data/`](http://2010.census.gov/2010census/data/)。我们在本章中使用了
  Apportionment 和 Population Density 数据集。我们对数据所做的唯一更改是删除了一些页眉和页脚记录，以使开发 SSIS 12 包的介绍保持简单。实际数据本身未被修改。


  *Apportionment* 指的是根据人口将众议院的总席位分配给 50 个州。*Population Density* 报告了该州每平方英里的平均人口。


  ### Integration Services 项目


  正如我们在前一章所讨论的，SSIS 开发的关键是 BIDS 中的 Integration Services 项目。项目文件可以组织与 ETL 过程相关的所有文件。当你首次创建项目时，Visual
  Studio 会自动为项目创建第一个包，并将其命名为 `Package.dtsx`。第一个包将完全为空，初始设计器将显示控制流。一旦生成包，你就有能力重命名它。


  ### 关键包属性


  包具有根据其提供的功能组织的属性。这些属性执行 ETL 过程的功能性和非功能性需求。功能性需求包括提取、转换和加载（ETL）的原则，而非功能性需求负责 ETL
  过程的健壮性、性能和效率、可维护性、安全性、可扩展性、可靠性以及整体质量。在项目中创建新包时，我们建议你查看以下属性：


  **名称** 可以通过 Visual Studio 的解决方案资源管理器修改。通过 Visual Studio 的解决方案资源管理器修改的好处，与通过文件系统或包中的属性字段修改相比，包括项目文件的自动识别和包名称属性的自动重命名。创建时，该值默认为
  Visual Studio 分配的名称。


  **DelayValidation** 确定包对象是否在包打开进行编辑时进行验证。默认情况下，此属性设置为 `False`，意味着所有对象在包打开时都将验证。通过将此属性设置为
  `True`，你将仅在运行时进行验证。如果在开发阶段存在数据定义语言（DDL）更改或源或目标的结构更改，这样做可能是危险的。在开发大型包时，通过允许包在运行时验证，它可能很有用。




  '
- '# 第三章：HELLO WORLD——您的第一个 SSIS 2012 包


  ### 包注释


  在查看新包上设置的属性之后，我们建议首先做的一件事就是为包添加注释。这可以通过在当前设计器视图的背景处右键单击并选择 `Add Annotation` 来完成。注释可用于记录包的信息，以便其他开发人员无需打开并通读所有任务就能轻松识别包的用途。彻底检查包的工作可以留到调试时进行。注释应包含的信息类型如图
  3-1 所示。


  *图 3-1\. 控制流推荐注释*


  `Name` 属性代表当前包的名称。这在 Visual Studio 的多个地方显示，但由于 SSIS 包背后的 XML 得到了极大改进，如果您需要去那里查找某些信息，请不要惊讶。注释字符串本身存储在包
  XML 底部的 `CDATA` 中。


  `Modified Date` 仅仅是记录对包所做最后一次更改的日期。在没有代码库的情况下，这部分信息会有所帮助。文件系统的修改日期在捕捉 SSIS 包的实际更改方面并不总是准确的。在许多设计器上单击
  `OK` 按钮以及在设计器选项卡中移动对象，都会导致 Visual Studio 识别为更改，即使没有任何功能上的变化。这可能导致文件系统不准确地反映包的功能性更改。


  `Purpose` 属性仅用于标识包的目标。模块化编程的特点是拥有独立的、可互换的代码块或模块。本书第 2 部分将介绍一些设计模式，使您能够在 SSIS 2012
  中保持这种实践。用途涵盖了包执行后的最终状态——哪些数据元素已被移动、哪些项目已在文件系统上移动、存储过程的执行等等。这旨在是一个高级描述而非详细描述，但本质上取决于您的
  ETL 过程设计。


  `Parameters`（参数）和 `Variables`（变量）是相关的，因为它们可用于在包之间传递值。参数是可以在包执行前设置的外部值。变量是在包之间传递信息的内部机制。在之前的
  SQL Server Integration Services 版本中，变量通过配置服务于这两种目的，无论是使用配置文件分配值还是通过父变量继承值。识别参数很重要，因为它们对项目中的所有包都是可访问的；在采用父子包设计时，这种结构变得极其有用。父包可以自动检测子包中定义的参数，并分配要传递给它的变量或参数。现在，变量可以仅用于在包之间传递值，而无需外部进程修改。在分配参数和变量时，它们与系统变量出现在同一个下拉列表中。您还可以选择编写表达式将参数值分配给变量。变量是通过引用而不是通过值传递给子包的。对值进行的任何修改都需要子包中的一个
  `Script` 任务才能将更改传播回父包。有一个替代使用 `Script` 任务修改父包的方法，允许您直接访问变量。然而，当子包独立执行时，此方法也会导致访问子包内变量的可执行文件在运行时出错。我们将在第
  16 章讨论这些选项。


  变量列表对变量的 `Scope`（作用域）敏感。变量的作用域可以是整个包，也可以是特定的容器、任务或事件处理程序内。面对多个变量，您很容易忘记它们全部，因此注释可以节省大量查找时间。`Package
  Explorer` 选项卡和 `Parameters and Variables` 工具栏中的 `Show Variables of All Scopes` 选项提供了相同的功能，但通过注释，您可以记录它们在过程中扮演的角色。


  > **注意：** 在分配时，`Parameters`、`Variables` 和系统变量列在同一个下拉列表中。我们建议使用命名空间以避免混淆。我们将在第 10
  章详细讨论参数和变量。


  ### 包属性类别


  包属性按其提供的功能分为类别。这些类别通常比较宽泛，并且包含比前一节概述的主要属性更多的可配置属性。这些类别及其属性涉及 SSIS 2012 的一些非功能性能力。我们在此简要介绍这些类别，并在后续章节中进行更深入的分析：


  **`Checkpoint`（检查点）属性** 控制 SSIS 包执行的重新启动能力。您必须为进度存储定义一个文件路径和名称，以便在执行期间使用。如果发生故障，该文件将用于在之前失败的任务处重新启动过程。此功能本身不会处理已提交数据的回滚。成功执行后，此文件会自动删除。


  **`Execution`（执行）属性** 定义包的运行时方面。这些包括包可以容忍的失败次数，以及如何处理嵌套容器相对于父容器成功的失败。性能调优也可以从本节中的属性开始。如果内存溢出成为问题，可以限制并发可执行文件的数量。


  **`Identification`（标识）属性** 用于唯一地识别包。这些属性包括前面列出的一些（特别是 `Name` 和 `ID`）。包可以捕获的其他信息是它曾在其上执行的计算机。


  `ID` 属性为包提供唯一标识符。在考虑日志记录选项时，此属性变得很重要。此 `ID` 将区分特定执行中运行的包。当新包添加到项目时，会生成一个新的标识符，但当现有包被添加或在
  `Solution Explorer` 中复制粘贴包时，原始包的标识符会被保留。此值不能直接修改，但有一个选项可以生成新的 `ID`。


  `ProtectionLevel` 管理存储在包中的敏感数据。默认情况下，此属性设置为 `EncryptSensitiveWithUserKey`。此选项使用一个标识当前用户的密钥加密整个包。只有当前用户才能加载包含所有信息的包。其他用户将只看到用户名、密码和其他敏感数据为空白。我们建议使用
  `DontSaveSensitive` 选项，特别是当多个开发人员将处理同一组包时。敏感数据可以存储在配置文件中。我们将在第 19 章讨论开发和部署包的安全方面。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-48_1.jpg)




  创建日期以及创建它的用户。此处归类的另一个重要属性是“描述”，这是自由格式的文本。


  杂项属性是那些无法在其他类别中清晰分类的属性的混合体。此类别包含各种不同的属性，其功能从记录包执行的日志行为到列出为包创建的配置，各不相同。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


