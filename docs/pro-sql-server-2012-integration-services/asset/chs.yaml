  ### 脚本任务


  操作包中对象的最佳方法之一是使用`脚本任务`。`脚本任务`可以使用 Visual Basic 或 C#来扩展 SSIS 包的功能，超越所提供的任务和连接管理器。控制流中的`脚本任务`与数据流任务中的`脚本任务`不同，前者修改包级别的对象，而后者在行级别处理数据。图
  5-30 展示了控制流中的`脚本任务`。它的图标看起来像“执行 SQL 任务”的图标，但没有代表数据库的圆柱体。卷轴图标表明该任务的目的是处理脚本。我们有一整章专门讨论脚本，即第
  9 章。


  **图 5-30. 脚本任务**


  如前所述，`脚本任务`允许您扩展 SSIS 组件原生提供的流程。其中一个优势是能够访问.NET 库。某些库可以让您访问文件系统，并执行超出“文件系统任务”或“执行进程任务”功能的任务。图
  5-31 展示了`脚本任务编辑器`的“脚本”页面。在这个特定的示例中，我们只是简单地打开一个消息框，显示运行时某个变量的值。当您跟踪问题并不确定某个变量的值时，这种技术很有帮助。


  **图 5-31. 脚本任务编辑器—脚本页面**


  以下属性可在“脚本”页面上进行配置：


  `ScriptLanguage` 允许您在 Visual Basic 和 C#之间选择一种作为您的脚本语言。第 9 章权衡了使用每种语言的利弊。


  `EntryPoint` 定义了 SSIS 在运行时调用的初始方法。默认情况下，它是`ScriptMain`类中的`main()`方法。因为主要代码块在您最初创建任务时会自动生成，所以您不必担心基本的引用。


  `ReadOnlyVariables` 是一个逗号分隔的列表，包含所有您希望脚本具有只读访问权限的变量。如果没有指定所有变量，当您尝试在脚本中引用其属性时，将会遇到错误。点击省略号，可以打开一个对话框，显示`脚本任务`作用域内可用的所有变量。选择要在脚本中访问的变量后，可以将它们导入到此属性中。


  `ReadWriteVariables` 是一个逗号分隔的列表，包含所有您希望脚本具有读/写访问权限的变量。您可以像填充`ReadOnlyVariables`一样填充此字段。


  `编辑脚本` 按钮打开脚本编辑器。第一次打开脚本时，它会自动包含正确的程序集并创建一些默认的类和方法。脚本编辑器基于 Visual Studio Tools for
  Applications (VSTA)。图 5-32 显示了包含一些预填充代码和注释的脚本编辑器。初始代码块提供了对所有必要程序集的访问。我们对此代码的唯一修改是在`main()`方法中。我们添加了一行代码，弹出一个消息框显示特定变量的值。这行代码是：

  ```

  MessageBox.Show(Dts.Variables["System::TaskName"].Value.ToString());

  ```

  `MessageBox.Show()`方法创建消息框。该方法的参数 `Dts.Variables["System::TaskName"].Value.ToString()`
  访问包的`Variables`集合。


  重要的是要确保该变量在`脚本任务`的作用域内，并且至少作为`ReadOnly`变量提供，如前面的图 5-31 所示。


  **图 5-32. Visual Studio Tools for Applications—脚本编辑器**


  当我们在 Visual Studio 调试模式下执行此包时，我们会收到一个消息框，显示变量的原始值，因为未对其执行任何更改。`System::TaskName`变量包含当前任务的名称。我们可以使用
  C#或 Visual Basic 赋值操作为`ReadWrite`变量赋值。我们将在第 9 章详细讨论脚本编写。


  #### 发送邮件任务


  经理和数据库管理员通常希望在进程意外失败时得到通知。ETL 流程也不例外。SSIS 提供了一个可以使用邮件服务发送电子邮件的任务。它需要一个 SMTP 连接管理器才能连接到邮件服务器。SSIS
  仅允许 Windows 身份验证和匿名身份验证。有关连接管理器的更多信息，请参阅第 4 章。在图 5-33 中，我们展示了控制流中的任务。图标是一个带有回信地址和邮寄地址的已盖邮戳信封，表示任务所需的所有组件。


  **图 5-33. 发送邮件任务**


  如图 5-34 所示的`发送邮件任务编辑器`的“邮件”页面，允许您配置发送电子邮件所需的所有属性。此任务的一个关键特性是能够附加文件。


  您可以将日志输出到文件，在发送电子邮件之前将其附加，以便为失败提供上下文。


  **图 5-34. 发送邮件任务编辑器—邮件页面**


  以下列表描述了所有可配置的属性：


  `SMTPConnection` 指定用于发送电子邮件的 SMTP 连接管理器。


  `From` 定义发件人的电子邮件地址。


  `To` 列出电子邮件的收件人，使用分号分隔不同的电子邮件地址。


  `Cc` 定义电子邮件的抄送收件人。此列表使用分号分隔每个电子邮件地址。


  `Bcc` 列出电子邮件的密送收件人。此列表也使用分号分隔。


  `Subject` 提供要发送的电子邮件的主题。


  `MessageSourceType` 列出邮件正文的选项。三个选项是：直接输入、文件连接和变量。“直接输入”允许您直接键入消息。“文件连接”选项让您选择一个文件连接管理器，指向包含邮件正文的文件。“变量”选项允许您选择一个包含邮件正文的
  SSIS 变量。


  `MessageSource` 根据所选的源类型进行填充。“文件连接”和“变量”选项会打开一个对话框，让您可以选择要作为邮件正文包含的连接管理器或变量。使用“直接输入”时，您可以直接键入消息。


  `Priority` 定义电子邮件的优先级。选项为低、中、高。


  `Attachments` 列出要附加到电子邮件的不同文件。文件使用管道字符分隔。与其他实例不同，此字段不使用文件连接管理器，而是使用执行机器文件系统上的文件路径。


