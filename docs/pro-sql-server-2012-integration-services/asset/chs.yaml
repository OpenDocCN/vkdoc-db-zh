- '# 第 9 章  变量、参数和表达式


  #### 默认值


  对于大多数编程语言，您需要初始化变量，或至少在语句中使用前为其赋值。`值`列允许您为 SSIS 中的变量指定*默认值*。某些数据类型会自动提供默认值，例如`DateTime`和`Int32`，而其他类型如`Object`数据类型则不接受任何默认值。`DateTime`变量将使用其创建时的日期和时间作为默认值，而`Int32`变量的默认值是`0`。如果在设置默认值时未提供有效值，您将收到类似图
  9-10 所示的错误对话框。变量值最常发生变化的位置是`执行 SQL`任务和`脚本`任务。


  *图 9-10. 无效变量默认值错误消息*


  #### 命名空间


  *命名空间*是组织变量的最佳方式之一。它们允许您以任何您认为合适的方式对变量进行分组。我们在图 9-8 中展示的约定，根据变量在 ETL 流程中所起的作用对它们进行了分组。当需要在提取阶段使用的变量时，我们使用`Extract`命名空间；当需要用于数据转换的变量时，使用`Transformation`命名空间；如果在加载数据前需要修改数据，则使用`Load`命名空间。用户定义变量的默认命名空间是`User`，并且由于我们创建变量时总是带有非常明确的目的，我们应该充分利用这一特性。


  使用命名空间的一个小缺点是，在`表达式生成器`或任何以下拉列表形式显示变量列表的编辑器中，变量列表是按名称而非扩展名称（`命名空间::名称`）排序的。在`表达式生成器`中，`RunTime`变量将被称为`@[Audit::RunTime]`。在显示变量的下拉列表中，它将显示为`Audit::RunTime`。命名空间区分大小写，因为它们是变量标识符的一部分。


  ### 系统变量


  SSIS 提供了变量，使您可以查看包及其对象的细微详情。这些变量称为*系统变量*，它们属于`System`命名空间。这些变量在大多数作用域中都可访问，但根据访问它们的作用域不同，值可能会有所不同。要访问这些变量，您必须使用`@[System::<<变量名>>]`。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 9 章  变量、参数和表达式


  #### 包系统变量


  属于包的系统变量显示有关包本身的重要信息。包内定义的所有对象都可以访问这些变量。表 9-2 列出了所有包系统变量及其数据类型。


  *表 9-2. 包系统变量*


  **名称** | **数据类型** | **描述**

  --- | --- | ---

  `CancelEvent` | `Int32` | 一个 Windows 事件对象的标识符，用于向任务发出停止执行的信号。

  `CreationDate` | `DateTime` | 包的创建日期。

  `CreatorComputerName` | `String` | 创建包时所使用的计算机。

  `CreatorName` | `String` | 包创建者的用户名。

  `ExecutionInstanceGUID` | `String` | 包执行的唯一标识符。该字符串表示十六进制值。



  '
- '# 第九章：变量、参数和表达式


  #### 包系统变量


  | 名称 | 数据类型 | 描述 |

  | :--- | :--- | :--- |

  | `InteractiveMode` | `Boolean` | 指示包是否以交互模式执行。交互模式指使用 `SSIS 设计器` (`True`) 执行还是使用
  `DTExec 命令行` 工具 (`False`)。 |

  | `LocaleID` | `Int32` | 标识包正在使用的区域设置。默认为 `英语(美国)`。 |

  | `MachineName` | `String` | 正在执行包的计算机的名称。 |

  | `OfflineMode` | `Boolean` | 指示包是否处于脱机模式且未获取数据源的连接。 |

  | `PackageID` | `String` | 包的唯一标识符。该字符串表示十六进制值。 |

  | `PackageName` | `String` | 不含文件扩展名的包名称。 |

  | `StartTime` | `DateTime` | 指示包开始执行的时间戳。 |

  | `UserName` | `String` | 当前执行包的帐户用户名。 |

  | `VersionBuild` | `Int32` | 包的版本。 |

  | `VersionComment` | `String` | 显示有关包版本的注释。 |

  | `VersionGUID` | `String` | 唯一标识包的版本。该字符串表示十六进制值。 |

  | `VersionMajor` | `Int32` | 标识包的主版本。 |

  | `VersionMinor` | `Int32` | 标识包的次版本。 |


  #### 容器系统变量


  *容器* 只有一个特定于它们的系统变量，即 `LocaleID`。这个 32 位整数标识容器使用的区域设置。此变量可用于 `Sequence`、`For Loop`
  和 `Foreach Loop` 容器中。在容器内访问 `LocaleID` 变量将默认为此值，而不是包的 `LocaleID`。


  #### 任务系统变量


  控制流任务在创建后会获得自己的一组系统变量。除了 `Data Flow` 任务外，大多数任务通常不能直接访问这些变量。`Data Flow` 任务允许你通过使用
  `Script 转换任务`、`派生列转换` 和 `条件拆分转换` 来访问其变量。使用这些转换，你可以访问这些变量并将其值用作数据流的一部分。表 9-3 显示了任务可用的所有系统变量。


  **表 9-3. 任务系统变量**


  | 名称 | 数据类型 | 描述 |

  | :--- | :--- | :--- |

  | `CreationName` | `String` | `SSIS` 所识别的任务名称。 |

  | `LocaleID` | `Int32` | 标识任务使用的区域设置。默认为 `英语(美国)`。 |

  | `TaskID` | `String` | 任务的唯一标识符。该字符串表示十六进制值。 |

  | `TaskName` | `String` | 在设计时赋予任务的唯一名称。 |

  | `TaskTransactionOption` | `Int32` | 标识任务正在使用的事务选项。 |


  #### 事件处理程序系统变量


  `SSIS` 中最后一类可执行文件，即事件处理程序，也有自己的一组系统变量。这些变量通常不适用于所有事件处理程序。适用于任务的一般规则也适用于事件处理程序系统变量。表
  9-4 描述了所有事件处理程序系统变量。


  **表 9-4. 事件处理程序系统变量**


  | 名称 | 数据类型 | 描述 |

  | :--- | :--- | :--- |

  | `Cancel` | `Boolean` | 标识事件处理程序是否在错误、警告或查询取消后停止执行。仅适用于 `OnError`、`OnWarning` 和
  `OnQueryCancel`。 |

  | `ErrorCode` | `Int32` | 标识发生的错误代码。仅适用于 `OnError`、`OnInformation` 和 `OnWarning`。
  |

  | `ErrorDescription` | `String` | 描述错误事件的字符串。仅适用于 `OnError`、`OnInformation` 和 `OnWarning`。
  |

  | `ExecutionStatus` | `Boolean` | 标识事件当前是否正在执行。仅适用于 `OnExecStatusChanged`。 |

  | `ExecutionValue` | `DBNull` | 返回执行值。仅适用于 `OnTaskFailed`。 |

  | `LocaleID` | `Int32` | 标识事件处理程序使用的区域设置。适用于所有事件处理程序。 |

  | `PercentComplete` | `Int32` | 返回事件处理程序完成的进度。仅适用于 `OnProgress`。 |



