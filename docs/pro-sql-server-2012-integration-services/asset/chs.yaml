  \n![](img/index-363_1.jpg)\n\n此时，我们已准备好使用 `脚本任务` 来初始化我们的变量。双击 `脚本任务`，您将看到如图 10-3\
  \ 所示的编辑器。\n\n**图 10-3. 脚本任务编辑器的脚本页面**\n\n在编辑器的 `脚本` 页面，您可以使用 `ScriptLanguage` 参数选择您首选的脚本语言。当前选项是\
  \ `Microsoft Visual C# 2008` 和 `Microsoft Visual Basic 2008`。我们更喜欢 `C#`，因此我们的脚本代码示例将使用这种\
