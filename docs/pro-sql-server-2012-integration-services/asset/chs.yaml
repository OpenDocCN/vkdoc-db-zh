  \n## 第 17 章 维度数据 ETL\n\n*我们不在第八维度；我们在新泽西州上空。希望尚未破灭。*\n— *冒险家 Buckaroo Banzai*\n\n\
  在 21 世纪的第一个十年里，“数据仓库”和“数据集市”这些术语突然且毫无预警地被复制粘贴到每个数据库专业人士的简历上。尽管专业社区的认知度明显提高，但这些结构的核心组件——维度表和事实表——仍然被误解。在本章中，您将了解如何高效地将数据加载到维度结构中。您将从本章通篇使用的术语和概念介绍开始。\n\
  \n### 介绍维度数据\n\n到目前为止，大多数数据库专业人士都接触过*维度数据*。对于那些不是每天使用它的人来说，这个术语可能有点误导性。它并不是真正指数据本身的任何特殊属性，而是指用于存储它的*维度模型*。具体来说，维度数据存储在*维度数据集市*中。数据集市是关系数据库，遵循以下两种逻辑结构之一：*星型模式*或*雪花模式*。这两种逻辑结构都由两种类型的表组成：\n\
  \n事实表包含业务度量数据，例如销售数量和金额。\n维度表保存与存储在事实表中的度量相关的属性，例如产品颜色和客户名称。\n\n星型模式的特点是有一个事实表（或可能是多个事实表）与非规范化的维度表相关联。图\
  \ 17-1 展示了一个示例星型模式的逻辑设计，该模式保存零售店的销售收据数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-540_1.jpg)\n\n*图 17-1. 星型模式数据集市*\n\n在星型模式中，维度被“展平”为非规范化的表。雪花模式是一种类似于星型模式的逻辑结构，但具有规范化或*雪花化*的维度。图\
  \ 17-2 展示了前一个星型模式中时间和地理维度的雪花化。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-541_1.jpg)\n\n*图 17-2. 具有雪花化维度的数据集市*\n\n由于性能和复杂性，星型模式更受青睐，但并非总是可能将\
  \ OLAP 数据库建模为此类结构。\n\n\n\n"
- '# 第 17 章 维度数据 ETL


  数据集市通常由上游系统（如规范化数据仓库和其他数据库）提供数据。反过来，数据集市又用于为 OLAP 数据库（如 SQL Server Analysis Services
  多维数据集）提供数据，或直接用于报告和分析查询。


  ### 数据仓库、操作数据存储及其他流行术语


  除了*数据集市*之外，还有许多其他与商业智能相关的流行术语。例如，*数据仓库（DW）*和*操作数据存储（ODS）*就是其中两个。数据仓库是一个集中的数据存储库，数据来自操作系统，专为分析和报告而设计。


  根据你所遵循的理论体系，你可能会以第三范式构建数据仓库（这是 Bill Inmon 提倡的`自上而下方法`），或者你可能会构建几个共享维度的维度数据集市（这是
  Ralph Kimball 偏好的`自下而上方法`）。


  数据仓库旨在保存整个组织的高质量历史数据，通常比最低级别的交易细节更高一级，并且时间跨度非常长。而另一方面，操作数据存储则设计用于在较短时间内保存变化更频繁的操作型数据。ODS
  常用于为数据仓库提供数据。


  就维度数据而言，重要的一点是，ODS 和数据仓库通常用于向维度数据集市提供数据（Kimball 模型除外，在该模型中，数据仓库是多个数据集市的并集）。实现数据仓库和操作数据存储的细节超出了本章的范围，但你可以在
  Bill Inmon 的著作*《Building the Data Warehouse》*（John Wiley & Sons, 2005）和 Ralph Kimball
  的著作*《The Data Warehouse Toolkit》*（John Wiley & Sons, 2002）中了解更多信息。


  ### 快速见效


  当你的老板说希望你优化一个 ETL 过程（或任何系统）时，你通常可以将其理解为“进行边缘调整”。考虑到这一点，我们将介绍一些能带来最大收益的快速更改。


  #### 以优化模式运行


  SSIS 中的数据流任务有一个名为`RunInOptimizedMode`的设置。将此属性设置为`True`会导致数据流通过自动移除未使用的列、输出和组件来优化任务。在生产包中，此属性应始终设置为`True`。仅在调试或非常特定的故障排除场景中才应设置为`False`。你也可以在
  SSDT 项目属性中设置`RunInOptimizedMode`。在 SSDT 中的此属性设置会覆盖单个数据流任务的设置（当你在 SSDT 中运行包时）——但仅在
  SSDT 中有效。包的默认属性为`False`，允许你将数据流属性设置为`True`或`False`。


  将项目属性改为`True`将避免更新任何或所有数据任务属性。图 17-3 显示了数据流任务的属性页。


  ![图 17-3. 将 RunInOptimizedMode 属性设置为 True](img/index-543_1.jpg)


  #### 移除“死端”组件


  在调试 SSIS 组件时，通常使用行计数组件代替错误输出的目的地。在许多情况下，行计数返回的值从未被使用。


  考虑如图 17-4 所示的示例数据流。


  ![图 17-4. 带有死端组件的数据流](img/index-544_1.jpg)


  在此示例数据流中，我们将查找转换的错误行发送到行计数转换。在这种情况下，我们并未使用行计数返回的值，但 SSIS 仍然必须将不匹配的行沿着该分支移动到组件中。这是此数据流中不必要的低效。修复这个问题很简单，只需删除这些死端行计数组件即可。


  #### 保持包体积小巧


  主要由于初始化包所涉及的开销（包括分配缓冲区以及自动验证和优化），执行一个大型包可能比执行多个小型包以达到相同最终结果消耗更多的时间和资源。通过保持包体积小巧，SSIS
  可以更高效地执行它们。关于包大小没有硬性规定，但 SSIS 专家 Andy Leonard 建议将单个包的文件大小保持在 5 MB 或以下。也可以识别在多个包中运行的常见
  SSIS 任务，并将这些任务创建成更小的包，作为子包使用，然后可以从一个或多个父包中调用。这有助于封装逻辑并提供可重用组件，从而减少开发工作。第 18 章将更深入地讨论这个主题。请注意，保持
  SSIS 包体积小巧，你还能获得在 SSDT 中更快加载和验证的好处。


  #### 优化查找


  优化数据流中的查找转换主要有三种方法。第一种优化技术是使用 SQL 查询来填充查找转换，而不是使用“表或视图”填充模式。“表或视图”模式会从数据库表中提取所有行和列。在许多情况下，查找转换不需要所有这些列。使用
  SQL 查询模式，你可以将结果限制为仅包含指定的列列表。提取数兆字节（或更多）无关数据然后立即丢弃，这是毫无意义的。


  查找转换的第二种优化技术涉及重用你的查找参考数据。如果你需要对同一组参考数据进行多次查找，在一个包中往返数据库两、三或多次来拉取此数据是资源的浪费。相反，使用缓存转换并加载一次该参考数据。


  我们针对查找转换的第三种优化技术是将其移除。你可以通过在服务器端（在你的源查询中）执行连接，或使用合并连接转换来实现这一点。


  虽然查找转换在技术上不被归类为*阻塞*转换，但它对性能的影响实际上可能比此组中的转换更*糟糕*。查找转换的问题在于，你的数据流甚至要在查找完成其参考数据的缓存后才会开始移动数据。而合并连接转换是部分阻塞的，允许数据以更高效的方式流动。


  #### 保持数据持续流动


  ETL 效率的黄金法则是“保持你的数据持续流动”。数据不流动于数据流中的每一秒，都是永远无法挽回的处理时间损失。正如我们在第 15 章讨论的，要保持数据流动，你应该最小化阻塞转换的使用，并考虑在可能的情况下在服务器端执行连接、排序和聚合操作。


  此外，考虑使用 SQL Server 的`FAST`查询提示。通过对长时间运行的源查询应用`FAST`查询提示，SQL Server 将向 SSIS 发送一批初始行，让数据流得以继续。理想情况下，当这些初始行在你的数据流中穿行时，SQL
  Server 会向源组件提供更多行。此提示对于为复杂数据流提供数据的长时间运行查询特别有用。


  **提示：** 你可以在 http://msdn.microsoft.com/en-us/library/ms181714.aspx 了解更多关于 SQL Server
  查询提示的信息。


  #### 最小化日志记录



  '
- "# 日志记录最佳实践与维度数据 ETL\n\n我们已经在第 13 章讨论了日志记录的最佳实践。其核心思想是：记录处理信息需要消耗资源。日志记录会占用 I/O、网络带宽、内存，甚至一点\
  \ CPU。虽然你不希望完全消除日志记录，但你的生产环境日志设置应以记录监控和排查 ETL 流程所需的最少信息为目标。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 使用快速加载选项\n\n我们在第 7 章讨论了适用于`OLE DB`和`SQL Server`目标适配器的快速加载和批量插入选项。在向`SQL Server`表插入行时，尽可能使用这些选项。快速加载选项比单次一行往返服务器的效率高得多。\n\
  \n### 理解缓慢变化维度\n\n*缓慢变化维度（SCDs）* 是本章前面讨论的维度在物理上的实现。基本上，`SCDs` 将 *维度* 放入你的维度数据中。`SCDs`\
  \ 主要分为四种类型，我们将在以下各节中讨论。\n\n#### 类型 0 维度\n\n*类型 0 维度*，也称为 *非变化维度* 或 *变化极其缓慢的维度*，有两种形式：\n\
  \n- 属性 *从不* 变化的维度（如性别维度）\n- 属性 *极少* 变化的维度（如美国州维度）\n\n类型 0 维度通常通过加载脚本一次性填充。对这些维度的偶尔更新通常只是添加记录的操作，也可以通过一次性脚本来执行。例如，考虑一个包含\
  \ 10 年日期的日期维度。你可能需要向该维度再添加 10 年的日期属性，但这不会影响现有条目。考虑到这一点，我们对类型 0 维度的最佳建议是：用静态的一次性脚本填充它们，并在必要时用脚本更新。\n\
  \n#### 类型 1 维度\n\n除了非变化维度，*类型 1 SCDs* 是最简单的维度实现类型——它们不需要存储历史属性值。当类型 1 `SCD` 中的属性发生变化时，你只需用新值覆盖旧值。标准的类型\
  \ 1 `SCD` 实现包括存储一个代理键（`SQL Server`中的`IDENTITY`列非常适合此目的，`SQL 2012`中引入的`SEQUENCE`同样适用）、传入维度属性的业务键以及维度属性值本身。考虑如图\
  \ 17-5 所示的`DimProduct`类型 1 `SCD`表。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-547_1.jpg)\n\n![](img/index-547_2.jpg)\n\n**图 17-5. DimProduct 类型\
  \ 1 维度表**\n\n`DimProduct`表保存描述所有产品的条目。在此示例中，`ProductID`是代理键，`UPC`是业务键，其余列保存属性值。类型\
  \ 1 `SCD`的更新模式很简单，如图 17-6 的流程图所示。\n\n**图 17-6. 类型 1 SCD 更新流程图**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n更新类型 1 `SCD`的过程是一个基于业务键的简单 *upsert*（更新或插入）操作。如果传入行的业务键在维度表中存在，则更新；如果键不存在，则插入。有几种实现类型\
  \ 1 `SCD`更新的方法：\n\n- 你可以手动构建自己的数据流，执行必要的比较以及单独的更新和插入。\n- 你可以创建一个`SSIS`自定义组件，或使用预先构建的自定义组件来完成这项困难的工作。\n\
  - 你可以将原始数据插入到暂存表中，然后使用基于集合的`MERGE`语句合并到维度表中。\n- 你可以使用`SSIS`缓慢变化维度向导来构建你的`SCD`更新数据流。\n\
  \n决定使用哪种方法时，你需要回答的主要问题是：在哪里可以最有效地执行必要的维度成员比较——在数据流中还是在服务器上？一般来说，最有效的比较可以在`SQL Server`端执行。\n\
  \n考虑到这一点，我们将跳过手动构建数据流的方法，因为它往往是效率最低且最容易出错的方法。如果你对此选项感兴趣，我们建议使用缓慢变化维度向导来构建一个原型。这将使你更好地理解如何使用数据流来更新你的`SCD`。我们将在本节后面考虑缓慢变化维度向导。\n\
  \n使用预先构建的`SSIS`自定义组件（或构建你自己的）是另一个可行的选择，但它超出了本章的范围。我们建议查看`CodePlex` (www.codeplex.com)\
  \ 上的一些示例，以了解这些组件如何工作。\n\n我们（在没有自定义组件的情况下）首选的方法是将你的维度加载到暂存表中，并直接在服务器上执行维度更新。基于集合的更新是更新维度数据最有效的方法。图\
  \ 17-7 中的控制流显示了基于集合的类型 1 `SCD`更新的基本布局。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-549_1.jpg)\n\n**图 17-7. 基于集合的类型 1 SCD 更新包**\n\n该过程的第一步是使用执行 SQL\
  \ 任务截断暂存表：`TRUNCATE TABLE Staging.DimProduct;`\n\n下一步是数据流，它只是将产品维度数据从源移动到暂存表，如图\
  \ 17-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-550_1.jpg)\n\
  \n**图 17-8. 加载暂存表的数据流**\n\n平面文件源从平面文件提取产品维度，`OLE DB`目标将数据推送到暂存表。在这之间，有一个额外的步骤，在数据流中为每一行数据生成一个`SHA1`哈希码。\n\
  \n#### 哈希码\n\n*哈希码* 是数据的固定长度“指纹”。当你将数据推送到单向哈希算法时，它会生成一个唯一的代码，可用于比较目的。与单向哈希的比较比逐个比较传入数据的多个列要高效且易于管理得多。`SHA1`哈希函数生成一个\
  \ 160 位的哈希码，并被认为是“无碰撞的”。这意味着从不同数据生成重复哈希码的情况极其罕见（实际上，几率是 2⁸⁰ 分之一）。为了获得更低的碰撞几率，你可以使用`SHA2`家族的哈希函数，其范围从\
  \ 2¹²⁸ 分之一到 2²⁵⁶ 分之一。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n我们用来生成哈希码的`.NET`代码非常高效，使用了`MemoryStream`和`BinaryWriter`，如下面的代码片段所示。\n\
  \n```csharp\npublic class ScriptMain : UserComponent\n{\n    MemoryStream ms;\n\
  \    BinaryWriter bw;\n    SHA1Managed sha1;\n\n    public override void PreExecute()\n\
  \    {\n        base.PreExecute();\n        sha1 = new SHA1Managed();\n    }\n\n\
  \    public override void PostExecute()\n    {\n        base.PostExecute();\n  \
  \  }\n\n    public override void Input0_ProcessInputRow(Input0Buffer Row)\n    {\n\
  \        ms = new MemoryStream();\n        bw = new BinaryWriter(ms);\n\n      \
  \  if (Row.UPC_IsNull)\n        {\n            bw.Write((Int32)0);\n           \
  \ bw.Write((byte)255);\n        }\n        else\n        {\n            bw.Write(Row.UPC.Length);\n\
  \            bw.Write(Row.UPC);\n        }\n\n        bw.Write('|');\n        //\
  \ ...将额外列写入 BinaryWriter\n\n        byte[] hash = sha1.ComputeHash(ms.ToArray());\n\
  \        Row.Hash = hash;\n\n        ms.Dispose();\n        bw.Dispose();\n    }\n\
  ```\n\n\n"
- "# 第 17 章：维度数据 ETL\n\n所有列都通过`BinaryWriter`写入，格式为列长度后跟实际值。对于`NULL`值，则写入长度零，后跟一个单字节值（这是入站数据中无法生成的值）。每列之后都有一个竖线分隔符。连接后的二进制字符串随后被送入`SHA1`生成函数，输出结果被赋值给`Hash`列。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-552_1.jpg)\n\
  \n### 类型 1 SCD 更新\n\n类型 1 SCD 更新的最后一步是从暂存表到维度表执行一次更新或插入（upsert）操作。T-SQL 的`MERGE`语句非常适合这项工作。`MERGE`语句允许你在单个语句中执行`UPDATE`和`INSERT`操作，如下所示：\n\
  \n```sql\nMERGE INTO dbo.DimProduct AS Target\nUSING Staging.DimProduct AS Source\n\
  ON Target.UPC = Source.UPC\nWHEN MATCHED AND Target.Hash <> Source.Hash\nTHEN UPDATE\
  \ SET Target.Category = Source.Category,\n                Target.Manufacturer =\
  \ Source.Manufacturer,\n                Target.ProductName = Source.ProductName,\n\
  \                Target.Size = Source.Size,\n                Target.Price = Source.Price,\n\
  \                Target.Hash = Source.Hash\nWHEN NOT MATCHED\nTHEN INSERT (UPC,\
  \ Category, Manufacturer, ProductName, Size, Price, Hash)\nVALUES (Source.UPC, Source.Category,\
  \ Source.Manufacturer, Source.ProductName, Source.Size, Source.Price, Source.Hash);\n\
  ```\n\n`NOTE:` `MERGE`提供了一种在单个语句中整合`INSERT`、`UPDATE`和`DELETE`操作的方法。然而，将这些步骤分离到单独的语句中可以提高整体性能。请比较两种方法的成本，以确保使用最高效的查询。\n\
  \n类型 1 SCD 的一个显著缺点是，更新当前值会丢失历史值。但是，只要不维护长期历史记录，这种更新过程比类型 2 或类型 3 SCD 更简单，并且占用空间也更少。\n\
  \n### 类型 2 维度\n\n由于类型 2 维度维护了属性值的长期历史记录，因此管理起来比类型 1 维度稍微复杂一些。类型 2 SCD 表的模式与类型 1\
  \ SCD 的不同之处在于，它可以包含最多三个额外的列来表示当前版本或历史版本。这些额外的列允许维度表包含历史值，而不是用当前值覆盖受影响的列。维度可以包含一个单独的列来指示该行是否具有最新的值，如图\
  \ 17-9 所示。\n\n*图 17-9. 类型 2 SCD 结果集*\n\n虽然新的或更新的值总是插入到类型 2 维度中，但现有行上还有其他标志也必须更新，例如生效日期、结束日期或活动状态列。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-553_1.jpg)\n\
  \n添加一个仅指示该行是否为最新记录的列，可以确保保留所有历史更改，但无法定义特定行何时处于活动状态。同时添加一个活动状态列和一个结束日期列，则可以提供维护历史值的方法，以便随后将其与适当的时间段关联起来。\n\
  \n`Active`列表示该行是否持有当前值，但缺乏跟踪这些值何时生效的能力。维度表可以包含开始日期和结束日期列，以维护历史值及其对应的时间段，当结束日期为`NULL`时代表当前值；或者可以包含一个生效日期列和一个表示活动或历史状态的列。类型\
  \ 2 SCD 的更新过程如图 17-10 所示。\n\n*图 17-10. 类型 2 SCD 更新流程*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-554_1.jpg)\n\n`SSIS`提供了一个数据转换任务，可用于类型 1 和类型 2 SCD。为类型 2 SCD 使用 SCD\
  \ 转换任务的第一步是决定是通过使用简单指示符来标识当前和过期记录，还是通过使用生效日期来跟踪表中的更改。该组件原生不允许同时使用这两种方式，但你可以自定义输出来实现这一点。图\
  \ 17-11 展示了在数据流中使用 SCD 转换任务。\n\n*图 17-11. SSIS 缓慢变化维度组件*\n\n### 类型 3 维度\n\n类型 3\
  \ SCD 通过使用单独的列来跟踪更改，这限制了历史记录的数量，取决于可以添加到维度表中的列数。这显然存在限制，维度表开始看起来更像一个 Microsoft Excel\
  \ 电子表格，如图 17-12 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-555_1.jpg)\n\
  \n*图 17-12. 类型 3 SCD 的查询结果*\n\n实现类型 3 SCD 存在几个复杂之处——首要的是每次更新都需要修改表模式，这使其成为一种不太理想的跟踪历史属性的方法。由于类型\
  \ 3 SCD 存在限制并且需要更改维度表的模式，`SCD 转换`任务不支持它。可以使用`执行 SQL`任务来自动更新类型 3 SCD，但如果在任何时刻维度表在`数据流`任务中被引用，它将基于模式更改而无法通过验证阶段。问题不仅仅在于维度的处理过程，还包括在`SSAS`多维数据集或报表中使用该维度时，同样会因为模式不断变化而出现问题。尽管使用类型\
  \ 3 SCD 是一种选择，但更推荐使用类型 1 或类型 2 SCD。\n\n### 小结\n\n本章介绍了几种优化`SSIS`包的工具和方法。其中许多优化依赖于尽可能在源执行操作，并限制通过`ETL`过程提取的数据量。我们还讨论了不同类型的维度，并概述了每种维度的更新方法。在下一章中，我们将探讨强大的`SSIS`父子设计模式。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 18 章：构建健壮的解决方案\n\n*融入我们理论中的自我主义并不影响其真诚；相反，我们的自我主义越是得到满足，我们的信念就越是坚定。*\n——小说家\
  \ 乔治·艾略特\n\n开发`SSIS`包通常侧重于已知因素——数据源、转换和目标——而未能解决未知问题——模式更改、数据类型不匹配以及不断变化的网络环境。显然，所有开发都必须从一个起点出发——即已知。然而，为了确保`SSIS`包提供可移植性、稳定性和弹性，处理未知情况并记录未识别和不一致的行为至关重要。本章概述了在`SSIS`包中计划和处理意外情况所需的步骤。\n\
  \n### 什么构成健壮的解决方案\n\n通常，创建`SSIS`解决方案是为了在特定且静态的环境中满足一个易于定义的过程。源和目标模式被认为是固定不变的，没有考虑变化或错误。这种类型的项目创建起来轻而易举，部署也很快，但开发人员往往未能在这种情况下进行`假设分析`，从而无法为以下方面提供支持：\n\
  \n- 跟踪：\n  - 性能\n  - 错误信息\n  - 历史指标\n- 处理以下方面的变化：\n  - 源\n  - 连接\n  - 模式\n- 可移植性以及轻松部署到不同环境\n\
  \n在尝试创建健壮的解决方案时，需要考虑几个因素：\n\n- **弹性**：包主动处理错误、记录错误并仍然能够完成的能力。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n"
- "# 第 18 章 构建稳健的解决方案\n\n### 关键因素\n\n*   **动态性**：基于一组规则而非静态数字、路径或连接，处理动态流体环境的能力。\n\
  *   **问责制**：记录包内步骤行为的能力，允许跟踪历史性能。\n*   **可移植性**：轻松将包部署到不同环境，而无需彻底检修每个步骤和连接的能力。\n\
  \n在包开发期间考虑这些因素，可以简化故障排除、部署/迁移以及历史性能跟踪。\n\n### 弹性\n\n错误可能因各种原因在 SSIS 任务中发生，其处理方式取决于具体任务。例如，`脚本`任务可以使用`try-catch-finally`块轻松高效地处理错误，并能提供动态错误处理手段，而`FTP`任务的主动错误处理手段则有限。为确保弹性，任务应提供先发制人的错误处理手段，以及在错误处理后重新处理任务的方法。\n\
  \n### 数据流任务\n\n最常用的 SSIS 任务之一，也是较难融入错误处理的任务之一。`数据流`任务是 ETL 过程的支柱，但在数据流内部缺乏真正的结构化错误处理。一个典型的例子就是从源或转换到目标时发生的截断错误。在这种情况下，无法动态处理错误，但可以将受影响的行重定向到另一个目标，在那里可以进行额外的评估以确保成功导入。\n\
  \n这可以通过创建一个包含`执行 SQL`任务和`数据流`任务的包来轻松演示，这两个任务通过`执行 SQL`任务的“成功时”优先约束连接。`执行 SQL`任务（重命名为`创建人员表`）将使用以下查询在默认实例中使用`AdventureWorks\
  \ 2012`数据库创建一个目标表：\n\n```sql\nIF NOT EXISTS( SELECT * FROM sys.tables WHERE name\
  \ = 'People')\nBEGIN\n    CREATE TABLE People(\n        FirstName NVARCHAR(50),\n\
  \        MiddleName NVARCHAR(50),\n        LastName NVARCHAR(21)\n    )\nEND;\n\
  GO\n```\n\n配置完`执行 SQL`任务后，将`数据流`任务的名称更改为`填充人员`。包的控制流窗格应类似于图 18-1。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-558_1.jpg)\n![](img/index-558_2.jpg)\n\n**图 18-1. 控制流窗格中的数据流错误重定向**\n\
  \n在数据流窗格中，添加一个`OLE DB`源、`OLE DB`目标、`平面文件`目标和一个`数据转换`转换。`OLE DB`源应重命名为`AdventureWorks\
  \ 人员`，并配置为连接到 SQL 的默认实例并使用`AdventureWorks 2012`数据库。在表选择下拉列表中，选择`Person`架构的`Person`表，如图\
  \ 18-2 所示。\n\n**图 18-2. 数据流源**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-559_1.jpg)\n\n在列中，应仅选择`FirstName`、`MiddleName`和`LastName`列，如图 18-3\
  \ 所示。\n\n**图 18-3. 选择数据流源列**\n\n将数据流路径从`OLE DB`源连接到数据转换任务，并将该任务重命名为`转换姓氏`。在转换任务的编辑器中，从可用输入列中选择`LastName`，并将输出别名设置为`转换后的姓氏`，长度设置为\
  \ 20。这将导致源中的一行被截断，如图 18-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
