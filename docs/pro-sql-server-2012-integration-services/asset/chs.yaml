  以下是可能属性的完整列表：


  *   `IsLocalPathVariable` 定义本地文件的位置是存储在变量中，还是可以通过已定义的文件连接管理器访问。

  *   `LocalPath` 列出包中创建的所有文件连接管理器。

  *   `LocalVariable` 列出存储文件路径的变量。

  *   `Operation` 列出 FTP 任务可以执行的操作。`Send files` 将本地位置指定的文件发送到远程位置。`Receive files`
