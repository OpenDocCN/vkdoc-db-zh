  #### FTP 连接管理器


  `Server Name`（服务器名称）和 `Server Port`（服务器端口）字段用于定义连接所指向的 FTP 服务器以及服务器监听的端口。`Credentials`（凭据）部分存储身份验证信息。默认情况下，其值为
  `Anonymous`（匿名）。`Time-Out`（超时）字段定义了任务在超时前可能花费的时间段，单位为秒。值 `0` 表示连接不会超时。启用被动模式的复选框表示数据包将启动连接。默认情况下，活动模式由服务器启动连接。`Retries`（重试次数）字段设置重试次数；`0`
  表示无限次重试。`Chunk Size`（块大小）表示传输数据时块的大小。`Test Connection`（测试连接）按钮允许您测试连接参数。


