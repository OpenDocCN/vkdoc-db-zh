  #### 执行 SQL 任务


  `SQL_TruncateCensusStatistics` 需要一个 `OLE DB` 连接来执行其中包含的 SQL 语句。此可执行文件可用于多种目的，从从数据库提取数据并将其存储为
  SSIS 包可访问的对象，到执行更新语句。就我们的目的而言，我们将使用它在每次运行包时截断表。绿色箭头，即优先约束，确保在 `数据流` 任务开始执行之前，`执行
  SQL` 任务已完成执行。只有当 `SQL_TruncateCensusStatistics` 成功完成后，`DFT_TransformCensusData`
