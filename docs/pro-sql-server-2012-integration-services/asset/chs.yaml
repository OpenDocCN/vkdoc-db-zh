- "# 第三章 你好世界——你的第一个 SSIS 2012 包\n\n### 映射\n\n此向导允许你匹配源组件和目标组件的输入和输出。对于输出，你有两个选项：`Flat\
  \ File Source Output` 和 `Flat File Source Error Output`。因为我们想要文件中的实际数据，所以我们选择了 `Flat\
  \ File Source Output`。`OLE DB` 目标组件只能接受一个输入。单击“确定”后，将使用定义的输出和输入在这两个组件之间创建数据流路径。但创建数据流路径并不是最后一步；我们还需要映射源和目标之间的列。\n\
