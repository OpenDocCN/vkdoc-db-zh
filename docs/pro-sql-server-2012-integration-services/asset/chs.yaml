- '# 第 9 章 – 变量、参数与表达式


  访问变量的最后一种方式并非一个具体的任务或转换，而是一种出现在多个任务中的属性。这就是源类型属性，通常允许你指定为 `直接输入`、`变量` 或 `文件`。在我们的数据剖析过程示例中，我们使用了一个执行
  SQL 任务 `SQL_ExecuteSQL` 来执行存储在变量 `Transform::StateQuery` 中的查询。我们修改此变量的过程将在下面的“动态
  SQL”部分进行介绍。图 9-23 展示了访问动态生成查询的 `SQL_ExecuteSQL` 任务的配置。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-354_1.jpg)


  *图 9-23. SQL_ExecuteSQL 以 Transform::StateQuery 为源*


  ### 动态 SQL


  在我们的大多数示例中，我们只演示了读取变量值，而没有实际修改任何值。需要修改变量的最常见领域之一是生成动态 SQL 查询。在 SSIS 中，此过程通常替代游标，并运行一组数量可能变化、但具有某些结构上非常重要的相似组件的查询。如前一节所述，我们希望演示一个非常基本的数据剖析过程。我们已经向你展示了如何通过使用执行
  SQL 任务将列名存储在 `Load::StateColumns` 变量中来检索我们的控制集。我们还向你展示了如何通过在另一个执行 SQL 任务上使用 `SQLSourceType`
  选项来执行生成的查询。本节将向你展示如何设置变量的值，使其成为可执行的查询。


  我们需要采取的第一步是在遍历所有列时提取每个列的名称。我们通过使用 Foreach 循环容器 `FELC_LoopThroughColumns` 实现了这一点。由于
  `Load::StateColumns` 只有一列 `Name`，变量映射非常简单，如图 9-24 所示。此配置会逐行覆盖 `Load::StateColumnName`
  的值，一次迭代一行。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-355_1.jpg)


  *图 9-24. FELC_LoopThroughColumns 变量映射*


  随着变量值随对象中的每一行而变化，我们可以运行一些查询，以获得对数据有意义的洞察。对于我们的查询，我们选择对存储在 `dbo.State` 表中每个列的值执行
  DISTINCT 计数。选项包括使用 `INSERT INTO` 将数据加载到表中。我们在代码示例最后一行的注释掉的 C#代码中包含了一个示例值。


  执行 SQL 任务 `SQL_SQL` 将为存储在对象中的每个列名运行一个查询。通过这个特定的查询，你可以看到你每个列中的值是如何变化的。


  #### 代码清单 9-4. StateQuery 赋值


  ```csharp

  Dts.Variables["Transform::StateQuery"].Value =

  "SELECT COUNT(DISTINCT " + Dts.Variables["Load::StateColumnName"].Value.ToString()

  + ") FROM dbo.State WITH (NOLOCK);";


  // SELECT COUNT(DISTINCT Name) FROM dbo.State WITH (NOLOCK);

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-356_1.jpg)


  ### 传递变量


  在先前版本的 SSIS 中，父-子设计模式的主要困难之一是子包对父包的依赖性。乍一看，这可能不像是一个障碍，但在某些情况下，这种依赖性会使单独对子包进行单元测试变得非常困难。随着此版本
  SSIS 中引入参数，这个障碍消失了。你基本上能够为参数定义一个默认值，在正常执行时该值会被覆盖。


  我们首先向子包添加一个参数，如前面的图 9-4 所示。这将为我们提供一个参数，可以像在 SSIS 表达式和脚本组件中访问变量一样访问它。如果我们预计包可能会单独执行，我们可以提供一个默认值。添加参数后，父包的执行包任务应自动检测到它。在配置执行包任务的其他属性时，可以创建一个映射，允许父值覆盖子值。`CH09_Apress_ParentPackage.dtsx`
  中的映射如图 9-25 所示。


  *图 9-25. 执行包任务参数绑定*


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ### SSIS 表达式语言


  SSIS 表达式语言允许你扩展流程的功能以整合变量。该语言包含一整套函数和运算符，可用于计算列、变量或表达式。这些函数返回不同的数据类型值。它们通常在表达式生成器中按输入类型分组。我们已在本章的“SSIS
  数据类型”部分介绍了转换函数。函数名不区分大小写，这与表达式语言中的大多数其他标识符不同。我们建议你在使用函数时使用特定的大小写，以使代码更易于阅读。


  #### 函数


  数学函数接受数值作为输入，执行运算后返回数值。以下是 SSIS 中可用的数学函数：


  - `ABS(«数值表达式»)` 返回输入的绝对值。

  - `CEILING(«数值表达式»)` 返回大于或等于输入的最小整数。

  - `EXP(«数值表达式»)` 返回以 e 为底的输入指数。

  - `FLOOR(«数值表达式»)` 返回小于或等于输入的最大整数。

  - `LN(«数值表达式»)` 返回输入的自然对数。

  - `LOG(«数值表达式»)` 返回以 10 为底的输入对数。

  - `POWER(«数值表达式», «幂»)` 返回将第一个参数提升到第二个参数指定的幂后的值。

  - `ROUND(«数值表达式», «长度»)` 返回将第一个输入四舍五入到第二个参数指定长度后的值。

  - `SIGN(«数值表达式»)` 返回输入的正、负或零符号。

  - `SQUARE(«数值表达式»)` 返回输入值的平方。

  - `SQRT(«数值表达式»)` 返回输入的平方根。


  字符串函数计算字符表达式。以下是表达式生成器中可用的字符串函数：


  - `CODEPOINT(«字符表达式»)` 返回输入中第一个字符的 Unicode 值。

  - `FINDSTRING(«字符表达式», «字符串», «出现次数»)` 返回指定字符串在输入中第 `出现次数` 次出现的索引。索引值从 1 开始。

  - `HEX(«整数表达式»)` 返回输入的十六进制字符串值。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  - `LEFT(«字符表达式», «数字»)` 返回一个字符串，由第一个参数开头的指定字符数组成。

  - `LEN(«字符表达式»)` 返回输入的长度。

  - `LOWER(«字符表达式»)` 返回一个字符串，由输入的小写字符组成。

  - `LTRIM(«字符表达式»)` 返回一个字符串，去除了输入的前导空格。

  - `REPLACE(«字符表达式», «搜索表达式», «替换表达式»)` 返回在原始字符表达式中将一个字符串替换为另一个字符串或空字符串后的字符表达式值。

  - `REPLICATE(«字符表达式», «次数»)` 返回一个字符串，其中字符表达式重复指定的次数。



  '
- '# 第 9 章 变量、参数与表达式


  #### 字符函数


  `REVERSE( «character_expression» )` 返回一个字符串，其字符顺序与输入字符串相反。


  `RIGHT( «character_expression», «number» )` 返回一个字符串，由字符表达式中最右侧指定数量的字符组成。


  `RTRIM( «character_expression» )` 返回一个字符串，去除了输入字符串末尾的空白字符。


  `SUBSTRING( «character_expression», «start», «length» )` 返回一个字符串，由字符表达式中从指定起始索引开始、指定长度的字符组成。


  `TOKEN( «character_expression», «delimiter_expression», «occurrence» )` 返回一个字符串，由字符表达式中从指定出现次数到首次遇到的分隔符表达式之间的所有字符组成。


  `TOKENCOUNT( «character_expression», «delimiter_expression» )` 返回基于分隔符表达式作为令牌终止符，字符表达式中存在的令牌数量。


  `TRIM( «character_expression» )` 返回一个字符串，去除了输入字符串开头和末尾的空白字符。


  `UPPER( «character_expression» )` 返回一个字符串，由输入字符的大写形式组成。


  #### 日期函数


  日期函数对日期和时间戳值执行操作。以下是表达式生成器中可用的日期函数：


  `DATEADD( «datepart», «number», «date» )` 返回一个日期值，该值是在日期输入的指定部分添加指定数量的时间单位后得到的。


  `DATEDIFF( «datepart», «startdate», «enddate» )` 返回起始日期和结束日期之间指定时间单位的长度值。


  `DATEPART( «datepart», «date» )` 返回一个整数值，表示指定日期的一部分。如果日期部分指定为月份，则一月份的日期将返回 1。


  `DAY( «date» )` 返回一个整数值，表示输入日期的日。


  `GETDATE()` 返回主机上设置的当前日期和时间。


  `GETUTCDATE()` 返回主机上设置的当前日期和时间（协调世界时）。


  `MONTH( «date» )` 返回一个整数，表示输入日期的月份编号。


  `YEAR( «date» )` 返回一个整数，表示输入日期的年份编号。


  #### NULL 函数


  SSIS 中存在的最后一类函数是 NULL 函数。此类别中除一个函数外，其余函数都返回针对特定数据类型转换的 NULL 值。为了返回特定数据类型的 NULL，你需要将函数
  `NULL(«data type»)` 作为表达式传入，并填写所需的数据类型名称。`ISNULL(«expression»)` 函数将对输入表达式进行求值，并返回一个布尔值，指示其是否计算为
  NULL。


  #### 运算符


  表达式语言中的运算符与 C# 中的运算符工作方式类似。有单目运算符和双目运算符。在表达式求值时，运算符确实具有优先级顺序。为了保持清晰，我们建议尽可能使用括号，否则在快速阅读代码时可能会出现歧义。以下是
  SSIS 中可用的运算符：


  `+` （加/连接）将两个表达式相加。也可用于连接字符串。


  `-` （减/取负）将两个表达式相减。也可用于返回数值表达式的负值。


  `*` （乘）将两个数值表达式相乘。


  `/` （除）将两个数值表达式相除。


  `%` （取模）返回两个数值表达式相除的整数余数。


  `()` （括号）用于优先计算表达式。


  `==` （等于）逻辑上评估两个表达式是否相等。


  `!=` （不等于）逻辑上评估两个表达式是否不相等。


  `>` （大于）逻辑上评估运算符左侧的表达式是否大于右侧的表达式。




  '
- '# 第 9 章 - 变量、参数和表达式


  `<` (小于) 在逻辑上评估运算符左侧的表达式是否小于右侧的表达式。


  [IT 电子书](http://www.it-ebooks.info/)


  `>=` (大于或等于) 在逻辑上评估运算符左侧的表达式是否大于或等于右侧的表达式。


  `<=` (小于或等于) 在逻辑上评估运算符左侧的表达式是否小于或等于右侧的表达式。


  `&&` (逻辑与) 对运算符左右两侧的表达式执行逻辑与操作。


  `||` (逻辑或) 对运算符左右两侧的表达式执行逻辑或操作。


  `? :` (条件) 对问号前的表达式进行条件检查。如果表达式求值为真，则返回问号和冒号之间的表达式。如果表达式求值为假，则返回冒号后的表达式。


  `&` (按位与) 对运算符两侧的两个整数值执行按位与操作。


  `|` (按位或) 对运算符两侧的两个整数值执行按位或操作。


  `^` (按位异或) 对运算符两侧的两个整数值执行按位异或操作。


  `~` (按位非) 对整数值执行按位取反。


  `!` (逻辑非) 对布尔表达式的值进行取反。


  ### 总结


  SQL Server 12 提供了许多方法使您的 ETL 流程变得动态和模块化。本章介绍了 SSIS 变量、参数和表达式语言。我们提供的代码让您能够深入理解变量和参数在
  ETL 流程中可以扮演的不同角色。我们还介绍了如何在包之间传递变量值。最后，我们描述了构成表达式语言的所有函数和运算符。第 10 章将引导您在 SSIS 中使用脚本。


  [IT 电子书](http://www.it-ebooks.info/)


  '
- "# 第 10 章 - 脚本\n\n*你完全正确，更强大！*\n——蒂姆·艾伦，《家居装饰》\n\nSSIS 开箱即用提供了多个内置的控制流任务和数据流组件，前几章已全部描述。尽管有这些强大的工具，您仍会不可避免地遇到一些情况，需要执行内置工具包未涵盖的操作。`脚本任务`和脚本组件是两个能为您提供额外能力提升的工具。借助\
  \ `脚本任务` 和脚本组件，您可以使用 .NET 代码来增强您的 SSIS 包，并以内置组件无法实现的方式来操作和转换数据。\n\n### 脚本任务\n\n\
  SSIS 提供了 20 多个内置控制流任务，执行各种功能。无论您需要通过文件传输协议 `FTP` 上传或获取文件，执行另一个包或流程，还是执行常见的 `DBA`\
  \ 数据库维护任务，SSIS 控制流任务都能满足您的需求。然而，有时您需要更大的灵活性。在这种时候，您可以拿出 `脚本任务`，直接将 .NET 代码嵌入到控制流中。\n\
  \nSSIS 开发人员使用 `脚本任务` 最简单的任务之一是在控制流中初始化 SSIS 变量。在这个例子中，我们将把一个字符串变量设置为一个州的邮政缩写，以限制数据流中查询返回的结果。开始我们的示例，我们拖放了一个\
  \ `脚本任务` 和一个 `数据流任务` 到设计器表面，如图 10-1 所示。\n\n[IT 电子书](http://www.it-ebooks.info/)\n\
