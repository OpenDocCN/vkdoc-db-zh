- "# 第 10 章：脚本\n\n### 脚本任务概述\n我们的第一个 `Script` 任务示例虽然简单，但其目的只是为了向控制流中引入 .NET 脚本的概念。`Script`\
  \ 任务允许你执行从非常简单到极其复杂的处理任务，它能够实现其他标准控制流任务不总是直接支持的功能。本节将提供一个内容更充实的示例来演示其用法。\n\n###\
  \ Foreach 循环容器的限制\n在这个例子中，我们想回溯参考第 5 章讨论的 `Foreach` 循环容器。\n\n`Foreach` 循环容器有一种“`Foreach`\
  \ 文件枚举器”模式，它可以为你遍历目录中的文件，并依次用文件名和/或完整限定的文件路径填充一个字符串变量。图 10-6 展示了处于 `Foreach` 文件枚举器模式下的\
  \ `Foreach` 循环容器编辑器。\n\n*图 10-6. 处于文件枚举器模式的 Foreach 循环容器*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-367_1.jpg)\n\n`Foreach` 循环容器的文件枚举器模式非常有用，但它有限制——它只返回文件名和/或文件路径。文件系统中的文件附带了更多可能对处理有用的元数据。例如，每个文件都有创建日期和只读标志附加信息。如果你想处理或归档早于指定日期的文件，或者在尝试删除文件之前需要检查它是否为只读，这些信息就派上用场了。我们可以通过使用\
  \ `Script` 任务来获取这些额外信息。\n\n### 创建示例包\n为了创建我们的示例包，我们将一个 `Script` 任务拖到设计器表面，然后在其后放置一个\
  \ `Foreach` 循环容器，容器内包含另一个 `Script` 任务，如图 10-7 所示。\n\n*图 10-7. 包含 Foreach 循环容器的脚本任务包*\n\
  \n我们还创建了一些包级别作用域的变量和一些 `Foreach` 循环容器级别作用域的变量。包级别的两个变量如下：\n\n- `User::Path`：一个字符串，包含我们希望枚举文件的目录的完整路径。\n\
  - `User::Files`：一个对象，将保存文件枚举的结果，存储为一个 `ADO.NET` `DataTable` 对象。\n\n在循环的每次迭代中，`Foreach`\
  \ 循环容器级别的变量会被填充文件名、日期和其他相关信息。图 10-8 显示了我们在两个级别声明的变量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-368_1.jpg)\n\n**注意：** 我们在第 9 章详细讨论了变量和变量作用域。\n\n*图 10-8. 示例包中两个级别的变量*\n\
