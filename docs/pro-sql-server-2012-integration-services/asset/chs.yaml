  ![](img/index-113_1.jpg)

  ![](img/index-113_2.jpg)


  *图 5-3. 执行 SQL 任务*


  ### 执行 SQL 任务编辑器—常规页



  #### 执行 SQL 任务


  #### 通用页面


  执行 SQL 任务可用于在数据加载前截断表，或在数据加载后创建约束以验证数据完整性（DDL 语句）。执行 SQL 任务也可用于检索数据并将其存储在 SSIS 变量中（DML
  语句）。检索到的数据可以是单行数据，也可以是表格数据集。通过“执行 SQL 任务编辑器”，您可以设置该可执行文件以执行不同的功能。图 5-4 展示了“执行 SQL
  任务编辑器”的通用页面。


  *图 5-4. 执行 SQL 任务编辑器——通用页面*


  以下列表讨论了通用页面上的一些关键属性：


  -   `名称` 是任务在控制流中的唯一标识符。同一类型的两个任务不能拥有相同的名称。此名称是控制流设计器中显示的标签。

  -   `描述` 是一个文本字段，用于简要说明任务在包中的功能。修改此属性不是必须的，但可以帮助不熟悉该包的人员更容易地理解流程。

  -   `连接` 是一个必需的属性，默认为空。此值应指示应针对哪个连接管理器执行 SQL 语句。

  -   `结果集` 允许您定义查询将返回的结果类型。结果集有四种类型：单行、完整结果集、XML 或 无。“单行”可用于单个标量值或仅返回一行的表格数据集。“完整结果集”选项允许您将表格数据存储在
  SSIS 对象类型变量中。如果 SQL 语句中定义了 `ORDER BY` 子句，变量将按排序列表维护数据。XML 结果集允许您将 XML 数据存储在变量中。“无”表示不返回结果集。SQL
  语句的成功执行会返回指示此类情况的值。可在编辑器的“结果集”页面中将结果集映射到相应的变量。

  -   `连接类型` 表示您将用于连接到数据库的连接管理器类型。

  -   `连接管理器` 是将允许您连接到数据库的连接管理器的名称。

  -   `SQL 源类型` 定义了向执行 SQL 任务传递 SQL 语句的方法。选项包括：直接输入、文件连接和变量。“直接输入”允许您将 SQL 语句直接键入
  `SQL 语句` 文本字段。“文件连接”选项允许您指定一个包含要执行的查询的特定文件。“变量”允许您将查询分配给字符串变量并将其传递给任务。

  -   `SQL 语句` 包含要在指定数据库上执行的 SQL 语句。仅当选择“直接输入”作为查询源类型时，此字段才会出现。

  -   `文件连接` 允许您选择一个连接管理器作为 SQL 语句的源。仅当使用“文件连接”作为源类型时，此选项才可用。

  -   `源变量` 是可以存储 SQL 语句的变量列表。仅当选择“变量”作为源类型时，此下拉列表才可用。

  -   `SQL 语句` 包含需要执行的 DDL、DML 或 DAL 语句。当您修改语句时，会打开一个文本编辑器，您可以在其中键入语句。如果没有文本编辑器，您将无法将
  `GO` 放在新的一行，因此在执行包时会出现错误。


  `注意：` 为了执行 DDL 和数据控制语言（DCL）语句，您需要确保使用的凭据具有适当的权限。如果您有多个语句，则只允许第一个语句返回结果集。


  `注意：` 如果您打算在单个执行 SQL 任务中执行多个语句，我们建议使用分号 (`;`) 作为语句终止符。在语句末尾，您可以在文本编辑器中将 `GO` 批处理指令添加到新的一行。在设置结果集时，请确保返回结果集的查询是
  `SQL 语句` 字段中的最后一个查询。


  底部的 `浏览` 按钮允许您将查询从文件导入到 `SQL 语句` 字段。它将打开一个 Windows 资源管理器窗口，帮助导航到所需文件。`生成查询` 按钮打开一个图形化工具，帮助您构建查询。此选项仅适用于“直接输入”源类型。`解析查询`
  按钮用于验证已定义 SQL 查询的语法。


  #### 参数映射页面


  参数允许您将变量传递给要执行的 SQL 查询。根据 SQL 连接的不同，参数使用不同的标记和名称进行映射。表 5-1 显示了不同的标记、与标记关联的名称以及每种连接的示例查询。图
  5-5 中的参数映射页面演示了如何对 SQL 语句进行参数化。


  *表 5-1. 参数标记和名称*


  | **连接** | **参数标记** | **参数名称** | **示例** |

  | :--- | :--- | :--- | :--- |

  | ADO | `?` | `Param1`, `Param2`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME FROM
  INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA, t.TABLE_NAME;`
  |

  | ADO.NET | `@<ParamName>` | `@<ParamName>` | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME
  FROM INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = @tableSchema ORDER BY t.TABLE_SCHEMA,
  t.TABLE_NAME;` |

  | ODBC | `?` | `1`, `2`, `3`, `4`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME FROM
  INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA, t.TABLE_NAME;`
  |

  | Excel, OLE DB | `?` | `0`, `1`, `2`, `3`, … | `SELECT t.TABLE_SCHEMA, t.TABLE_NAME
  FROM INFORMATION_SCHEMA.TABLES t WHERE t.TABLE_SCHEMA = ? ORDER BY t.TABLE_SCHEMA,
  t.TABLE_NAME;` |


  *图 5-5. 执行 SQL 任务编辑器——参数映射页面*


  可以在整个查询中使用多个标记。ADO、ODBC、Excel 和 OLE DB 连接的标记是问号 (`?`)。ADO 和 ODBC 的枚举器从 1 开始。但是，参数必须以
  `Param` 为前缀加上序数位置来命名。Excel 和 OLE DB 连接的枚举器从 0 开始。ADO.NET 连接是唯一使用限定符 (`@`) 和名称组合进行参数映射的连接类型。同一个变量可以多次传递给同一条
  SQL 语句。


  要为 SQL 语句中的参数添加映射，您需要单击参数映射页面上的 `添加` 按钮。映射页面上的列指定了每个映射的所有详细信息。`删除` 按钮仅用于移除选定的映射。属性如下：


  -   `变量名称` 提供了将传递给 SQL 语句中参数的特定变量。变量的命名空间很重要，因为它允许多个变量拥有相同的名称。

  -   `方向` 指示变量是输入参数、输出参数还是返回代码。

  -   `数据类型` 为参数分配数据类型。它不会自动使用为 SSIS 变量定义的数据类型。下拉列表列出了 SSIS 可用的所有数据类型。

  -   `参数名称` 给参数一个名称。根据连接类型，您必须适当地命名参数，并确保查询中标记的序数位置与名称相符。在使用某些连接类型时，此列的序数位置起着重要作用。

  -   `参数大小` 定义了可变长度数据类型的大小。这允许


  供程序为参数值分配适当的空间。


  #### 执行 SQL 任务编辑器—结果集页面


  对于结果需要被 SSIS 访问的 SQL 语句，我们可以将这些结果集分配给 SSIS 变量。最常用的结果集类型之一是`完整结果集`。这允许你将整个结果（如果 SQL
  语句中指定了排序顺序，则包含该顺序）直接存储在一个数据类型定义为`object`的变量中。根据变量的作用域，这个`object`可以被`Foreach 循环`容器访问用作枚举器，可以被控制流中的`脚本`任务访问，或者被`数据流`任务访问。图
  5-6 演示了如何为查询的结果集定义映射。


