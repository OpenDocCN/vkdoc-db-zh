- '# 第 12 章


  ## 数据画像与清洗


  *编码，加载，然后爆炸。*

  —史蒂夫·希契曼


  需要将来自多个来源的数据整合在一起的项目——例如，数据仓库、数据集市或操作数据存储（ODS）项目——极为常见。你可能会花费数月时间收集业务需求、整理技术规范、设计目标数据库、并对
  ETL 流程进行编码和测试。你也可能会在“临时维护模式”中花费大量时间，重写那些无法处理意外的坏数据或不合规数据的大段代码。这种场景是由于未能正确规划和执行数据集成项目而导致的结果——这种现象被称为*编码，加载，然后爆炸*。


  任何时候，当你需要将来自两个或多个系统的数据整合在一起时，你就面临一个*数据集成*项目。正确的数据集成需要大量基础工作。不幸的是，这是任何项目中最不令人兴奋和缺乏魅力的环节之一——全面的规划和流程形式化、源系统调查、源数据探查、生成大量文档。由于偶然或有意为之，在企业项目中，数据集成需求的范围以及未正确执行的成本常常被低估。数据集成需要大量通常较为低调的分析，但未能正确执行可能导致高调的项目失败。本章将展示
  SSIS 如何帮助你正确地画像和清洗你的数据。


  ## 数据画像


  *数据画像*，其核心是收集关于你数据的统计信息的过程。目的是通过回答以下类似问题，确保你的源数据符合你的预期：


  我的源数据包含空值吗？你可能期望某些源数据列不包含空值，或包含特定数量的空值（例如，少于 10%）。对源数据进行画像将揭示空值数量是否符合你的期望。


  我的源数据是否全部为有效值？这涉及为你的源数据定义*域*，即有效值的集合。例如，你可能期望一个`Gender`（性别）列只包含`Male`（男性）或`Female`（女性）值，或者你可能期望一个`Price`（价格）列只包含介于
  0.01 到……之间的正数值



  以及 500.00。数据画像将告诉你源数据是否落在其预期域内。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 12 章 数据画像与清洗


  我的数据分布是否符合预期？回答这个问题需要行业及业务特定的领域知识。例如，你可能期望库存中大多数商品的价格在 20 至 50 美元之间。数据分析可能显示，库存中的大部分商品定价实际低于
  20 美元，这可能指向（1）对业务的初始假设错误，或（2）数据质量问题。


  我的源数据如何与其他系统的数据对齐？考虑参考数据，如美国州代码。任何给定的源系统都可能使用几种类型的代码：双字符邮政服务代码，如 AL、DE 和 NY；两位数的
  FIPS（联邦信息处理标准）数字代码，如 01、02、03；甚至整数代理键。回答这个问题将使你能够识别关键属性中的差异，并对齐关键属性中的值。


  我的业务键是什么？成功的数据集成项目（如 BI 项目）需要识别源数据中的业务键。数据仓库更新和数据集市缓慢变化维度（SCD）处理依赖于对源数据业务键的了解。


  回答这些问题可能需要分析单列或列组。例如，大多数工业化国家都实施邮政编码系统以方便邮件投递。邮政编码的格式和有效字符因国家而异。美国的邮政编码（也称为区域改善计划或
  ZIP 代码）由五位或九位数字组成，例如 90071 或 10104-0899。在加拿大，邮政代码由六个字母数字字符组成——例如，K1P 1J9。你可能需要结合分析源数据中的国家和邮政编码，以验证邮政编码格式是否正确。


  除了回答有关源数据质量和一致性的问题外，你还可以提取有关源数据库中关系的信息。许多遗留源数据库似乎有一个共同点，即缺乏引用完整性和检查约束。再加上完全缺乏文档记录，这些源系统就像复杂的谜题，通常需要你自己建立表之间的关系。


  ## 数据画像任务


  `数据画像任务`是获取源数据统计信息的有效方法。其主要功能在许多方面与市场上其他数据画像软件包相当。`数据画像任务`获取指定的源数据，根据你指定的准则进行分析，并将结果输出到
  XML 文件。`数据画像任务`如图 12-1 所示。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-427_1.jpg)


  ![](img/index-427_2.jpg)


