- "# 第三章  你好世界——你的第一个 SSIS 2012 包\n\n由于透视键结合了两个值——年份和统计名称，我们利用一个派生列将数据拆分成两列。图 3-29\
  \ 展示了我们如何拆分该列。我们基于存储在 `YearAndStatisticName` 列中的数据添加了两列。我们使用以下表达式分别生成 `Year` 列和\
  \ `StatisticName` 列：\n\n`LEFT(YearAndStatisticName,4)` 和 `SUBSTRING(YearAndStatisticName,6,LEN(YearAndStatisticName))`。\n\
  \n因为我们知道该列值的前四个字符必须是年份，所以可以使用 `LEFT()` 字符串函数提取年份并将其存储到名为 `Year` 的新列中。对于统计名称，我们需要使用除了前五个字符之外的整个字符串。`SUBSTRING()`\
  \ 字符串函数允许我们定义字符串的起始和结束位置。第六个位置是下划线后的第一个字符，而我们想要获取字符串的剩余部分，因此使用 `LEN()` 字符串函数来定义字符串最后一个字符的位置。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-82_1.jpg)\n\n\
  #### 图 3-29. DER_SplitYearAndStatistics\n\n将原始列拆分为更细粒度的数据后，我们可以将这些数据插入到具有清单 3-3\
  \ 所定义结构的表中。我们利用 `OLE DB 目标组件` 的功能，根据输入生成了建表脚本。由于不再需要，我们从建表脚本中移除了 `YearAndStatisticName`\
  \ 列。在 `OLE DB 目标组件` 的映射中，我们忽略了 `YearAndStatisticName` 列。派生列的数据类型是 Unicode，但源自平面文件的列保持其代码页。\n\
  \n#### 清单 3-3. 人口普查数据的建表脚本\n\n```sql\nCREATE TABLE dbo.CensusStatistics\n(\n   \
  \ [STATE_OR_REGION] varchar(50),\n    [Year] nvarchar(4),\n    [StatisticName] nvarchar(250),\n\
  \    [Statistic] varchar(50)\n);\nGO\n```\n\n执行结果如图 3-30 所示。正如我们之前讨论的，`Unpivot 运算符`\
  \ 的输出行数直接关系到被忽略列的唯一记录数与取消透视的列数。`合并连接` 还从左侧输入流中省略了两条记录，因为它们不包含在分配数据集中。哥伦比亚特区和波多黎各的数据不包含在分配数据中，因为这两个地区在美国国会中没有代表。因为我们执行的是内连接，所以只允许两组数据共有的数据继续沿管道向下流动。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-83_1.jpg)\n\n\
  #### 图 3-30. RealWorld.dtsx 执行结果\n\n清单 3-4 中的查询向我们展示了以这种方式转换数据的好处。如果没有 `Unpivot\
  \ 组件`，我们就必须在 `SELECT` 子句中包含所有需要的列。使用这个组件，我们只需定义适当的 `WHERE` 子句即可只查看我们需要的数据。反规范化形式使我们能够包含更多的统计项和更多的年份，而无需担心修改表结构以容纳新列。\n\
  \n#### 清单 3-4. 反规范化数据的查询\n\n```sql\nSELECT cs.STATE_OR_REGION,\n       cs.Year,\n\
  \       cs.StatisticName,\n       cs.Statistic\nFROM dbo.CensusStatistics cs\nWHERE\
  \ cs.Year = '2010'\n  AND cs.STATE_OR_REGION = 'New York';\n```\n\n清单 3-4 中的查询向我们展示了\
