- "# 构建健壮的解决方案\n\n```vb\nDim rdr As New TextFieldParser(\"C:\\Robust\\PeopleErrors.txt\"\
  )\n\nrdr.TextFieldType = FileIO.FieldType.Delimited\n\nrdr.SetDelimiters(\",\")\n\
  \nDim row As String()\n\nWhile Not rdr.EndOfData\n\n    Try\n\n        row = rdr.ReadFields()\n\
  \n        MessageBox.Show(row(0).ToString)\n\n    Catch ex As Microsoft.VisualBasic.FileIO.MalformedLineException\n\
  \n        MsgBox(\"Line \" & ex.Message & _\n\n        \"is not valid and will be\
  \ skipped.\")\n\n    End Try\n\nEnd While\n\nDts.TaskResult = ScriptResults.Success\n\
  \nEnd Sub\n```\n\n`MessageBox` 返回行字符串数组中错误编号的索引值，可用于识别具体原因。显然，要动态处理错误需要额外代码，但有了错误代码和描述（在后续的\
  \ Tip 中提供），可以包含一个 `VB.NET Select Case` 语句来遍历错误代码，并根据错误采取适当的操作。\n\n### 事件处理程序\n\n\
  事件处理程序提供了一种主动处理包和可执行文件上事件的方法，可用于为以下事件捕获任务特定信息：\n\n- `OnError`\n- `OnExecStatusChange`\n\
  - `OnExecution`\n- `OnPostExecute`\n- `OnPostValidate`\n- `OnPreExecute`\n- `OnPreValidate`\n\
  - `OnQueryCancel`\n- `OnTaskFailed`\n- `OnVariableValueChanged`\n- `OnWarning`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`OnError` 事件处理程序可用于捕获错误描述和代码，然后这些信息可用于动态处理错误以及记录有关特定问题的更深入信息。\n\
  \n由于事件处理程序仅在可执行文件和包上可用，这排除了在数据流内部使用它们的可能性，但可以捕获数据流可执行文件的失败。为了使 `OnError` 事件处理程序能够被触发，数据流任务必须首先失败，这将清空缓冲区中的所有数据，使其无法用于后续调查。\n\
  \n在事件处理程序内处理错误信息，最简单的方法是通过脚本任务传入 `System:ErrorCode` 和 `System:ErrorDescription`\
  \ 作为只读变量。第 11 章概述了如何创建脚本任务来捕获错误信息，并演示了 `OnError` 事件从任务级别一直向上冒泡到包级别。显然，需要在脚本组件中纳入更复杂的逻辑类型，以主动处理特定错误。\n\
  \n上一节概述的包在数据流任务中使用了错误重定向，以防止错误出现并确保所有行都被定向到目标。如果不重定向行而创建相同的包，则可以使用 `OnError` 事件处理程序来捕获错误信息。在\
  \ `OnError` 事件中添加一个脚本任务，并将 `System:ErrorDescripton` 设置为 `ReadOnly` 变量，将允许捕获整个错误消息，并更深入地了解真正原因。使用以下\
  \ `VB.NET` 代码将显示数据流任务中发生的任何错误的消息：\n\n```vb\nMessageBox.Show(Dts.Variables(0).Value.ToString)\n\
  ```\n\n生成的消息框指定了截断错误以及受影响的具体列。错误重定向和 `OnError` 事件处理程序之间的主要区别在于，如果使用了错误重定向，则不会引发\
  \ `OnError` 事件处理程序。在前面的示例中，数据流任务在截断错误发生后停止，并且失败的行信息将不会被存储以供后续评估。\n\n`TIP:` SSIS\
  \ 错误消息和编号概述在 http://msdn.microsoft.com/en-us/library/ms345164.aspx。\n\n### 动态性\n\
  \n从 SSIS 2005 开始，配置使包更具可移植性，并可以轻松地将包导入到 SQL 的多个实例中，而无需创建多个包或专门为环境配置包。在 SSIS 2012\
  \ 中，随着参数的引入，这一功能得到了进一步优化。\n\n\n环境允许将参数映射到其变量，并可用于在多种环境中执行单个包。通常需要在一个环境中开发包，在另一个环境中测试，最后部署到生产环境。这类场景体现了在\
  \ SSIS 中使用环境的真正灵活性和强大功能。\n\n参数和环境在第 19 章概述，并提供了动态包执行的示例。\n\n## 第 18 章 – 构建健壮的解决方案\n\
  \n### 可追溯性\n\n在包部署并运行一段时间后，你经常需要查看每个任务“在实际运行中”的表现。我经常收到请求，要求查看通过单个数据流传递的总行数或平均行数，或者单个任务耗时多久。虽然对于在\
  \ SQL Server 代理中计划的包，其运行时间很容易确定，但要分离任务时间和计数却不那么简单。\n\n#### 日志提供程序\n\n第 11 章概述了如何配置日志提供程序以及将包执行信息保存到特定提供程序中，如\
  \ XML、SQL、CSV 等。日志提供程序也可用于提供通用的任务指标，例如执行时间。日志使你能够捕获事件处理程序引发的信息。例如，选择 `OnPreExecute`\
  \ 和 `OnPostExecute` 事件提供了一种跟踪包内任务大致开始和结束时间的方法。\n\n日志提供程序的配置在控制流窗格中完成，方法是右键单击并选择\
  \ `日志提供程序`。初始窗口需要定义要记录的可执行文件以及日志的写入格式，例如 XML、SQL 或任何支持的格式。配置好可执行文件和目标后，可以选择事件处理程序以及要收集的特定列。图\
  \ 18-12 说明了通过日志提供程序可用的事件处理程序。\n\n*图 18-12. 日志提供程序事件*\n\n对选定事件使用 SQL 日志提供程序，可以查询数据以找到特定的任务持续时间。每个包都有自己的\
  \ `GUID`，每个任务也是如此，因此使用带有 `DATEDIFF` 函数的公用表表达式可以快速返回相关任务的执行时间。以下查询使用通过日志传送配置创建的表，查找由其\
  \ `GUID` 标识的特定包的开始和结束时间之间的差值。结果如图 18-13 所示。\n\n```sql\nWITH eventexecution\nAS(\n\
  \    SELECT sourceid,\n           starttime\n    FROM sysssislog\n    WHERE executionid\
  \ = 'B0885A09-A1BA-4638-9999-29698F357B40'\n      AND event = 'OnPreExecute'\n)\n\
  SELECT source,\n       DATEDIFF(SECOND, c.starttime, endtime) AS 'seconds'\nFROM\
  \ sysssislog s JOIN eventexecution c\n    ON s.sourceid = c.sourceid\nWHERE event\
  \ = 'OnPostExecute';\nGO\n```\n\n*图 18-13. 任务持续时间查询结果*\n\n#### 自定义日志记录\n\n尽管日志提供程序可以捕获大量有关包执行的信息，但有些指标会被遗漏，例如数据流行数。另一个常见的请求是显示\
  \ `数据流` 任务随时间影响的总行数。此类计数未包含在 SSIS 日志提供程序中，但仍然可以使用自定义日志记录来捕获。\n\n第一步是创建一个表来保存自定义日志信息，在本例中将包括包\
  \ `GUID`、包名称、任务名称、目标名称、行数以及任务运行的日期。例如：\n\n```sql\nIF NOT EXISTS(SELECT * FROM sys.tables\
  \ WHERE name = 'SSISCounts')\nBEGIN\n    CREATE TABLE SSISCounts(\n        ExecGUID\
  \ NVARCHAR(50),\n        PackageName NVARCHAR(50),\n        TaskName NVARCHAR(50),\n\
  \        DestinationName NVARCHAR(50),\n        NumberRows INT,\n        DateImported\
  \ DATETIME2)\nEND;\nGO\n```\n\n需要创建一个包级变量，该变量将保存所有 `数据流` 任务的行计数，数据类型为整数。每个 `数据流`\
  \ 任务都应包含一个 `行计数` 转换，紧接在目标之前，该转换使用包级变量来记录导入的行数。\n\n*图 18-14. 行计数转换*\n\n最后，在 `数据流`\
  \ 任务的 `PostExecute` 事件处理程序中，创建一个 `执行 SQL` 任务，该任务将使用系统变量和用户定义变量插入适当的信息。单击事件处理程序将打开\
  \ `事件处理程序` 窗格，并提供两个下拉列表：`可执行文件` 和 `事件处理程序`，如图 18-15 所示。选择可执行文件后，可以选择所需的事件处理程序，并将特定任务放置在窗格上。\n\
  \n*图 18-15. 执行 SQL 任务参数配置*\n\n将使用 `执行 SQL` 任务，通过系统提供和用户提供的信息，从 `数据流` 任务插入计数信息。系统提供的信息是包\
  \ `GUID`、名称、任务和行计数，数据库和时间将在查询中提供。`SQLStatement` 属性应设置为使用将在任务中定义的参数，方法是使用问号 (`?`)，如下列代码所示：\n\
  \n```sql\nINSERT SSISCounts\nVALUES(?, ?, ?, 'AdventureWorks2012DW', ?, SYSDATETIME())\n\
  ```\n\n参数应按照它们在查询中出现的顺序，在 `执行 SQL 任务编辑器` 中以相同的序数位置进行组织。图 18-16 描绘了参数配置。请注意，参数名称被替换为变量在插入语句中出现的索引位置。\n\
  \n*图 18-16. 执行 SQL 任务参数配置*\n\n在将参数映射到 SQL 语句属性中的 `?` 时通常存在困惑。根据上图，请记住，定义的第一个参数（在本例中为\
  \ `ExecutionInstanceGUID`）将出现在第一个问号出现的位置，每个参数将按顺序出现。为了便于演示，插入语句可以重写，以便更好地可视化这一点，如下列代码所示：\n\
  \n```sql\nINSERT SSISCounts\nVALUES(ExecutionInstanceGUID, PackageName, TaskName,\n\
  \       'AdventureWorks2012DW', RowCount, SYSDATETIME())\n```\n\n前面的示例演示了，通过事件处理程序配合使用系统变量和用户定义变量，可以提供一种自定义日志记录的方法。`SSISCounts`\
  \ 表中的信息可用于建立跟踪数据流添加的记录数以及跟踪特定任务的方法。\n\n### 小结\n\n本章介绍了确保 SSIS 包和任务的持久性、可移植性和弹性的方法。\n\
  \n本章讨论的许多方法都是本书通篇概述的功能的扩展。创建健壮解决方案的关键概念是：\n\n-   为未知情况做计划。\n-   主动处理可能发生的错误。\n-\
  \   为数据流提供错误重定向。\n-   配置包和任务以使其可移植。\n-   记录错误和度量包及任务信息。\n\n## 第 19 章 – 部署模型\n\n\
  *程序测试可用于显示错误的存在，但永远无法显示其不存在！*\n\n—计算机科学家 艾兹格·迪科斯彻\n\nSQL Server Integration Services\
  \ 2012 版引入了一种全新的部署 ETL 过程的方式。\n\n\n\n"
- '# 部署模型


  在之前的版本中，单个包是部署对象。而在新的部署模型中，整个项目成为了部署对象。正如前面章节所述，参数和项目级连接管理器的引入促成了这种新的部署模型。这种新模型的一个优势是，它允许您在
  SQL Server 中创建具有特定参数值的环境。正如 Edsger Dijkstra 所言，程序测试的目的不是为了证明没有错误，而利用这种新部署模型模拟环境的能力，应该能极大地加快潜在错误的检测速度。


  本章将指导您完成项目的部署。此外，它还展示了如何将传统的 SSIS 项目升级到新的部署模型。为了执行 ETL 过程，我们将演示如何使用环境。


  ### 生成过程


  `build process` 为部署准备项目。它会创建一个部署实用程序来自动化这个过程。生成过程将包和对象复制到指定位置，以便部署实用程序在部署过程中能够识别它们。Visual
  Studio 中项目文件的属性窗口（如图 19-1 所示）允许您定义要复制对象的路径。活动配置允许您控制生成文件输出到哪个位置。每个配置都在输出路径内创建自己的文件夹结构。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-574_1.jpg)


  ![](img/index-574_2.jpg)


  图 19-1. 项目属性页 - 生成属性


  `Configuration Manager` 按钮会打开如图 19-2 所示的 `Configuration Manager`。此管理器允许您为生成过程创建多个配置。在您能创建的多个配置中，必须将一个分配为解决方案的默认配置。该管理器还允许您定义解决方案平台。在此特定示例中，`Development`
  配置是我们解决方案的活动配置。我们通过选中 `Build` 列中的复选框，基于此配置进行生成。


  图 19-2. 项目配置管理器


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  在所有包开发完成后，您需要使用 Visual Studio 中的 `Build` 实用程序来生成项目及其文件。`Build` 实用程序在 Visual Studio
  后台运行，可以通过在 Visual Studio 解决方案资源管理器中右键单击项目文件并选择 `Build`，或者转到 `Build` 菜单并选择 `Build
  *project name*` 来访问。当您第一次生成项目时，如果指定为输出路径的目录尚不存在，它将被创建。


  在此文件夹路径内，您会找到一个为活动解决方案配置指定的文件夹。该文件夹将包含一个 `*project name*.ispac` 文件，即 Integration
  Services 项目部署文件。此文件包含部署实用程序，可以将项目部署到 Integration Services 目录。


  除了生成 `OutputPath` 外，项目文件所在的文件夹也会创建一个文件夹路径来存储所有生成的对象。这个名为 `obj` 的文件夹包含一个活动解决方案配置的子文件夹。在此文件夹内，您会看到每个包和项目参数、项目连接管理器、项目文件以及输出日志文件对应的文件。


  ### 部署过程


  项目生成完成后，您可以选择将其部署到 SQL Server 实例上的 Integration Services 目录。双击活动解决方案配置文件夹中的 `.ispac`
  文件可确保您部署的是对象的最新生成版本。部署项目的另一种方法是，在 Visual Studio 解决方案资源管理器中右键单击项目文件并选择 `Deploy`。


  在将项目部署到 Integration Services 目录之前，您需要在 SQL Server 实例上启用公共语言运行时（`CLR`）集成。运行清单 19-1
  中显示的代码将启用 `CLR` 集成。如果您不知道 `CLR` 是否已启用，可以简单地运行 `sp_configure` 查看可用选项。


  #### 清单 19-1. 启用 CLR 集成


  ```

  sp_configure ''clr enabled'', 1;

  GO

  RECONFIGURE;

  GO

  ```


  启用 `CLR` 集成后，您可以通过在 SQL Server 实例上右键单击 `Integration Services` 文件夹并选择 `Create Catalog`
  来创建 Integration Services 目录。如图 19-3 所示的向导将指导您完成创建目录的过程。数据库的默认名称是 `SSISDB`，不能重命名。如果您没有运行清单
  19-1 中启用 `CLR` 集成的脚本，也可以使用此向导来启用此功能。目录创建在 SQL Server 实例的 `Databases` 文件夹中。


  > **注意：** 为了创建 Integration Services 目录，您必须提供密码。请务必保存此密码，并制定一些流程来定期备份加密密钥。此密码用于加密包可能包含的敏感数据，具体取决于您选择的保护级别。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-576_1.jpg)


  图 19-3. 创建目录向导


