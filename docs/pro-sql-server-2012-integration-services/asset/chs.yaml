  ### 缓存连接管理器


  `缓存连接管理器` 是在 SQL Server 2008 中引入的。此类连接管理器允许你预先将查找数据缓存到内存中。考虑这样的场景：你有两个查找组件，且两者都从同一张表中读取大量相同的行。你可以使用
  `缓存连接管理器` 预先缓存查找数据，并将两个查找组件都连接到使用同一个 `缓存连接管理器`。这意味着你只需读取数据一次，并且它比两个独立的、缓存相同数据的查找组件消耗更少的内存。


  `缓存连接管理器` 可以通过缓存文件 (`.caw`) 填充，也可以通过缓存转换（我们将在本章后面介绍）填充。图 4-9 显示了 `缓存连接管理器编辑器` 的“常规”选项卡。此选项卡允许你设置连接管理器的名称，并在你选择时，选择一个缓存文件作为连接管理器的源。


  *图 4-9. 缓存连接管理器编辑器“常规”选项卡选项*


  `缓存连接管理器编辑器` 的“列”选项卡允许你设置 `缓存连接管理器` 各列的属性。例如，你可以设置每列的数据类型、长度、精度/小数位数或代码页。图 4-10
  显示了“列”选项卡属性。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-96_1.jpg)


  *图 4-10. 缓存连接管理器编辑器“列”选项卡属性*


  ### 其他连接管理器


  在上一节中，你了解了一些最常用的连接管理器。SSIS 还提供了其他几种连接管理器（例如，FTP 和 HTTP 连接管理器、Analysis Services 连接管理器和
  Data Quality Services 连接管理器），以便访问那些不一定支持直接数据访问的系统。例如，FTP 服务器通常不包含原始数据，但它们可能存储文件，而这些文件又可能包含所需数据。这些连接管理器允许你访问这些不同的存储系统，从而检索数据。


