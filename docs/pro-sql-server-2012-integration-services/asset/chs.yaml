  `MessageType` 列出任务可以预期的消息类型。选择选项将动态修改编辑器中可供修改的属性。选项有：数据文件消息、变量消息、字符串消息以及字符串消息到变量。

  `SaveFileAs` 定义消息将存储到的文件的名称和位置。仅当消息类型选择“数据文件消息”选项时，此属性才可用。

