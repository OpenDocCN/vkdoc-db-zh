  #### 文件系统任务


  复制整个源目录到目标路径。复制文件将源文件复制到指定目标路径。在指定位置创建目录。删除目录删除指定目录。删除目录内容删除指定位置的所有内容。删除文件删除指定文件。移动目录将源目录移动到指定目标。移动文件将源文件移动到目标路径。重命名文件将源文件重命名为指定目标名称。


  设置属性允许修改指定源文件的属性。


  隐藏属性允许指定源文件是否应设置为隐藏。


  只读属性允许设置指定文件的只读属性。存档属性允许文件被存档。系统属性允许将文件设置为系统文件。


  #### FTP 任务


  *FTP 任务*允许您连接到 FTP 服务器，下载或上传您的 ETL 过程所需的文件。此外，它还允许您执行与文件系统任务相同的一些操作，但是是在服务器上而不是在本地文件系统上执行。图
  5-27 显示了该任务在控制流中的样子。该任务的图标是一个前面带有服务器塔的地球仪，表示可以远程访问的文件系统。


