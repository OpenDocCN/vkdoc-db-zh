- '# 第 1 章 集成服务导论


  ## 新功能


  *   **分析功能**可提供元数据以定位对象依赖关系——例如，某个包依赖于哪些表。此新工具为解决性能问题或依赖关系问题，或在主动定位依赖关系时提供了有用信息。我们将在第
  12 章演示影响分析和数据沿袭分析。

  *   **改进的合并和合并联接转换**：SQL Server 12 SSIS 中的 `Merge` 和 `Merge Join` 转换通过提供更好的内存使用内部控制得到了改进。我们将在第
  6 章介绍 `Merge` 和 `Merge Join` 转换的新特性。

  *   **数据更正组件**：`Data Correction` 转换提供了一个有助于提高数据质量的工具。我们将在第 7 章讨论这个新的转换。

  *   **自定义数据流组件改进**：SQL Server 12 SSIS 包含多项改进，使开发人员能更轻松地创建支持多输入的自定义数据流组件。我们将在第 21
  章关于自定义数据流组件的讨论中探索这些新功能。

  *   **源和目标助手**：新的 `Source` 和 `Destination` 助手旨在指导您完成创建源或目标的步骤。我们将在第 6 章讨论这些新助手。

  *   **简化的数据查看器**：SQL Server 12 SSIS 中的数据查看器已简化，使其更易于使用。我们将在第 8 章演示数据查看器。


