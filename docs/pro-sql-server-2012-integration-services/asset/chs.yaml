- "# 第 12 章：数据配置与清理\n\n### 连接管理器与关键列选择\n\n连接管理器、源表或视图以及列。与其他配置请求（通常您只选择单个列或使用通配符（`*`）选择所有列）不同，此配置请求允许您选择多个列。这是合理的，因为一个给定的候选键可以由多列组成，并且您可能希望测试几组列排列组合，以评估其作为候选键的可行性。\n\
  \n选择`KeyColumns`的下拉菜单如图 12-19 所示。您可以通过多种组合选择一列或多列，例如：\n\n-   **单个命名列**：如果选择单个列，将测试其作为候选键的有用性。\n\
  -   **多个命名列**：如果选择多个命名列，将作为一个复合候选键一起测试它们的可用性。例如，如果您选择`AirCarrier`、`AircraftCategory`、`EventDate`和`State`列，数据配置任务将测试所有这些列作为一个单一候选键的可用性。\n\
  -   **单个通配符**：如果您选择通配符（`*`）作为列，数据配置任务将配置表中的每一列，分别测试每列作为候选键的可用性。\n-   **单个通配符和命名列**：如果您选择通配符（`*`）和一个或多个命名列，数据配置任务将测试命名列与表中其他列的组合作为候选键的可行性。例如，您可以在配置请求中选择`AirportCode`和（`*`），这种情况下，数据配置任务将测试`AirportCode`列与表中其他每一列的组合。\n\
  -   **多个通配符**：如果您选择多个通配符（`*`）列，数据配置任务将测试指定数量的列排列组合作为候选键的可用性。例如，如果您选择两个通配符，该任务将配置表中所有两列的组合以检查唯一性。\n\
  \n![](img/index-447_1.jpg)\n\n*图 12-19. 数据配置任务编辑器*\n\n### 候选键配置文件输出\n\n图 12-20 展示了候选键配置文件的输出。建议的关键列`AirCarrier`、`AircraftCategory`、`EventDate`和`State`的强度约为\
  \ 87%唯一。输出甚至更进一步，显示了每个违反键规则的重复行以及违规计数。\n\n![](img/index-448_1.jpg)\n\n*图 12-20.\
  \ 候选键的容忍度*\n\n### 函数依赖配置文件\n\n**函数依赖配置文件**允许您使用配置任务来发现表中的依赖关系。\n\n依赖关系测试用于查看指定列中的值如何决定依赖列的值。使用（`*`）作为`DeterminantColumns`属性，允许我们将每一列作为`DependentColumns`属性所允许的所有组合的决定因素进行测试。`DependentColumn`属性中的（`*`）值允许我们测试表中每一列组合作为依赖于指定决定因素的关系。对两个属性都使用（`*`）符号，将使每一列与所有列的每一组合进行对比，以生成依赖关系报告。`0.95`阈值表示只有\
  \ 95%或更高的关系才能定义有用的数据依赖关系，如图 12-21 所示。\n\n![](img/index-449_1.jpg)\n\n*图 12-21. 函数依赖配置文件请求*\n\
  \n图 12-22 展示了函数依赖配置文件请求的结果。报告向您显示了每个测试的整体强度以及各种违规情况。报告下方的选项卡显示了用于配置依赖关系的各个数据元素及其强度。\n\
  \n![](img/index-450_1.jpg)\n\n*图 12-22. 函数依赖配置文件输出*\n\n### 模糊查找\n\n向任何数据集添加新数据的风险之一是可能有不干净或不符合规则的数据进入系统。这通常表现为违反字符列域规则——例如，在美国邮政编码列中输入了字母字符。SSIS\
  \ 提供了两种数据流转换来清理数据不一致性：`FuzzyLookup`和`FuzzyGrouping`。它们都采用基于令牌的方法来确定传入数据与参考数据之间的匹配。成功匹配后，您可以用新的符合规则的数据替换旧数据。\n\
  \n### 模糊查找\n\n**模糊查找**返回与传入数据流匹配的参考数据的近似结果。这与`Lookup`转换形成对比，后者返回精确匹配。使用`FuzzyLookup`的优点之一是它能够返回包含查找表中存储的字符串的数据。在此情况下，查找表代表干净的数据。`FuzzyLookup`任务可用于仅允许通过可接受匹配的数据。\n\
  \n在本例中，我们使用`dbo.State`表作为数据源。我们设置了一个查找列表，以筛选出与该列表中任何成员匹配的州。清单 12-1 展示了表结构和查找列表。\n\
  \n*清单 12-1. 表结构和模糊查找元素*\n\n```sql\nCREATE TABLE dbo.StateFuzzyMatch\n(\n    FuzzyMatchData\
  \ NVARCHAR(50) NOT NULL\n);\nGO\n\nINSERT INTO dbo.StateFuzzyMatch\n    (FuzzyMatchData)\n\
  SELECT N'Headquarters'\nUNION ALL\nSELECT N'pINEAPPLES'\nUNION ALL\nSELECT N'russia'\n\
  UNION ALL\nSELECT N'FIRST';\nGO\n\nCREATE TABLE dbo.StateFuzzyLookup\n(\n    Name\
  \ nvarchar(50) NULL,\n    Capital nvarchar(50) NULL,\n    Flag nvarchar(10) NULL,\n\
  \    Date date NULL,\n    Fact nvarchar(500) NULL,\n    Long float NULL,\n    Lat\
  \ float NULL,\n    FuzzyMatchData nvarchar(50) NULL,\n    _Similarity real NULL,\n\
  \    _Confidence real NULL\n);\nGO\n```\n\n`dbo.StateFuzzyMatch`表包含我们将在`State`数据中搜索的所有关键词。我们插入了一些需要在`dbo.State`数据的`Fact`属性中查找的关键词。我们将把`FuzzyLookup`操作的成功匹配结果存储在`dbo.StateFuzzyLookup`中。该表包含额外的列，其中包括模糊匹配的详细信息，例如：\n\
  -   `FuzzyMatchData`是查找表中与传入数据匹配的元素。\n-   `_Similarity`表示传入数据与查找元素之间的相似度水平。此值可用于调整`FuzzyLookup`组件上的相似度阈值，以消除不希望的匹配。对于模糊匹配中处理的每个单独列，此别名可以修改。\n\
  -   `_Confidence`表示匹配的置信度。SSIS 的先前版本会考虑最佳相似度和给定数据行的正面匹配数量来计算此值。\n\n![](img/index-452_1.jpg)\n\
  \n执行`FuzzyLookup`并将数据限制为仅成功匹配的行，将得到如图 12-23 所示的数据。清单 12-2 展示了将检索正面匹配及其操作统计信息的查询。如查询结果所示，在此数据集中，相似度与置信度之间并不一定存在直接相关性。\n\
  \n*清单 12-2. 用于模糊查找数据的 SELECT 查询*\n\n```sql\nSELECT Name,\n       Capital,\n    \
  \   Flag,\n       Date,\n       Fact,\n       Long,\n       Lat,\n       FuzzyMatchData,\n\
  \       _Similarity,\n       _Confidence\nFROM dbo.StateFuzzyLookup\nORDER BY _Similarity\
  \ DESC,\n         _Confidence;\n```\n\n*图 12-23. 模糊查找匹配结果*\n\n\n\n在查看了输出结果和 SQL\
  \ Server 表的设置后，让我们回到实现模糊查找所需的 SSIS 包开发工作。模糊查找是一个`数据流`任务组件，需要数据流来进行匹配。我们使用的`OLE DB`源包含清单\
  \ 12-3 中的查询，用于提取我们所拥有的、构成美利坚合众国的所有州的数据。\n\n**清单 12-3. 州数据**\n\n```sql\nSELECT DISTINCT\
  \ s.Name,\n    s.Capital,\n    s.Flag,\n    s.Date,\n    s.Fact,\n    s.Long,\n\
  \    s.Lat\nFROM dbo.State s;\n```\n\n在开发之初，我们的需求是筛选出 `Fact` 字段包含某些非常特定词项的州。我们将这些词项加载到了\
  \ `dbo.StateFuzzyMatch` 表中。与可以使用查询来创建查找列表的`查找`组件不同，模糊查找必须指向一个表才能执行其匹配操作。该组件会在表上创建索引以加速匹配操作。图\
  \ 12-24 展示了我们为模糊查找使用的选项。我们选择不保存索引，而是允许组件在每次执行时重新生成新索引。该次执行所使用的索引不会被保存。对于静态表，建议保存索引。\n\
  \n**图 12-24. FZL_MatchFact—引用表配置**\n\n**注意：** 如果您选择保存索引但之后需要移除它，存储过程 `sp_FuzzyLookupTableMaintenanceUnInstall`\
  \ 允许您删除该索引。它将接受在模糊查找中指定的索引名作为其参数。\n\n为组件指定表后，您可以选择查找匹配的列映射，如图 12-25 所示。如果您需要在多个列上执行匹配，可以在此处进行。编辑器会绘制连线，以便轻松识别输入列和查找列之间的映射关系。在我们的示例中，匹配是在一个列上执行的，但就像`查找`组件一样，模糊查找组件可以使用多个列作为其匹配条件。\n\
  \n**图 12-25. FZL_MatchFact—列**\n\n如图 12-26 所示的`创建关系编辑器`允许您为查找中涉及的每个映射指定条件。要打开此编辑器，您必须在列映射区域的背景处右键单击并选择`编辑映射`。此编辑器中的关键字段是`映射类型`、`比较标志`和`最低相似度`。`映射类型`的选项是`模糊`和`精确`。\n\
  \n选择`精确`等同于对模糊查找强制实施`查找`组件的限制。它将强制将`最低相似度`更改为 1，即 100% 匹配。`比较标志`在匹配执行方式方面提供了灵活性。在我们的示例中，我们只关心忽略数据字符的大小写。`最低相似度`为每个关系的匹配成功设置阈值。`相似度输出别名`允许您存储每个关系的相似度信息。在我们的示例中，我们只存储查找的整体相似度。因为是单列匹配，所以相似度与关系相似度一致。就像`查找`组件一样，查找列可以添加到管道中并发送到目标。如果您需要将查找列添加到管道中，编辑器允许您为其指定别名。\n\
  \n**图 12-26. FZL_MatchFactCreate 关系**\n\n模糊查找编辑器的`高级`选项卡（如图 12-27 所示）允许您为每次匹配定义分隔符和整体相似度阈值。允许您定义最大匹配数的选项会为每次成功匹配复制数据行。对于此示例，我们仅使用空格作为词项的分隔符。默认情况下，会将几个标点字符定义为分隔符。\n\
  \n**图 12-27. FZL_MatchFact—高级**\n\n整个`数据流`任务如图 12-28 所示。模糊查找组件有一条警告消息，因为 `Fact`\
  \ 列和 `FuzzyMatchData` 列的大小不匹配。我们添加了`条件性拆分`组件，以便只有匹配数据的行才能传递到表中。`FuzzyMatch` 输出使用\
  \ `!ISNULL(FuzzyMatchData)` 作为拆分条件。\n\n**图 12-28. DFT_FuzzyLookupSample**\n\n"
- "# 第 12 章 – 数据剖析与清洗\n\n### 模糊分组\n\n模糊分组组件尝试基于匹配条件减少数据集中的重复项数量。该组件仅接受字符串数据类型（Unicode\
  \ 和代码页）来执行匹配操作。转换本身将在服务器上创建临时表和索引，以便高效地执行匹配操作。对于此示例，我们将使用与模糊查找示例相同的源组件。模糊分组转换的配置与模糊查找非常相似，因为它允许您选择`匹配类型`、`最低相似度`、`比较标志`以及其他选项。此外，模糊分组允许您通过提供`数字`选项来指定数据是否可能包含数字字符。`数字`选项使您能够对字母数字信息执行更好的匹配，其中数字数据在字符串开头或结尾具有重要影响。此选项对于街道地址信息或字母数字邮政编码非常有用。对于我们的模糊分组示例，我们将使用清单\
  \ 12-4 中所示的表作为匹配结果的目标表。\n\n**提示：** 为了获得一些性能提升，如果可能，让执行包的主机作为模糊分组转换的 `OLE DB` 连接。直接影响模糊匹配转换性能的因素是数据集大小（行数和列数）以及匹配列中词项的平均出现频率。\n\
  \n**清单 12-4. 模糊分组目标**\n\n```sql\nCREATE TABLE dbo.StateFactGrouping\n(\n    _key_in\
  \ int,\n    _key_out int,\n    _score real,\n    Name nvarchar(50),\n    Capital\
  \ nvarchar(50),\n    Flag nvarchar(10),\n    Date date,\n    Fact nvarchar(500),\n\
  \    Long float,\n    Lat float,\n    Fact_clean nvarchar(500),\n    _Similarity_Fact\
  \ real\n);\nGO\n```\n\n模糊分组转换在管道中添加了一些列来跟踪分组。一些列跟踪分组背后的统计信息，而另一些则在记录流经管道时跟踪它们：\n\
  \n`_key_in` 跟踪原始记录流经数据流任务时的情况。此列实际上是一个标识列。数据集中的每一行都接收其自己唯一的值。\n\n`_key_out` 将一个分组行连接到它最相似的匹配行的\
  \ `_key_in` 值。\n\n`_score` 显示该行与匹配行之间的相似度。\n\n`Fact_clean` 代表匹配行的 `Fact` 列的值。\n\n\
  `_Similarity_Fact` 显示该行的 `Fact` 列与匹配行的 `Fact` 值之间的相似度。\n\n清单 12-5 显示了分组如何根据关于各州的事实记录来匹配它们。\n\
  \n\n\n第一个查询中的连接条件展示了模糊分组添加的列如何让你将数据追溯到其原始形式。第二个查询允许你用模糊分组变换计算出的最接近结果替换原始州事实。\n\n\
  #### 代码清单 12-5. 模糊分组结果\n\n```sql\nSELECT sfg1.Name AS GroupedState,\n       sfg1.Fact\
  \ AS GroupedFact,\n       sfg1._score AS GroupedScore,\n       sfg2.Name AS MatchingState,\n\
  \       sfg2.Fact AS MatchingFact\nFROM dbo.StateFactGrouping sfg1\nINNER JOIN dbo.StateFactGrouping\
  \ sfg2\nON sfg1._key_out = sfg2._key_in\nAND sfg1._key_in <> sfg2._key_in\n;\nGO\n\
  \nSELECT sfg.Name,\n       sfg.Capital,\n       sfg.Fact_clean\nFROM dbo.StateFactGrouping\
  \ sfg\n;\nGO\n```\n\n图 12-29 和 12-30 展示了代码清单 12-5 所示查询的结果。你甚至可能通过查看图 12-28 就能确定用于匹配的词元。例如，对于科罗拉多州和路易斯安那州，用于匹配的词元很可能是“唯一州”。至于亚利桑那州和蒙大拿州，“国家公园”是最可能的候选词元。这些匹配的分数相对较低，因为我们设置了\
  \ 0.08 的相似度阈值。匹配到的事实通常是较短的字符串匹配到包含大量相关词元的较长字符串。\n\n*图 12-29. 模糊分组结果*\n\n此处展示的结果集仅演示了如何使用匹配后的数据，而非原始值。当试图启动数据清洗项目时，此变换可提供一些有用的见解。业务名称、地址和其他联系信息可以通过正确使用此组件轻松整合。当数据开始遵循标准化集合时，模糊分组变换的价值便开始显现。\n\
  \n*图 12-30. 模糊分组数据替换后*\n\n### 数据预览\n\nSSIS 最有用的功能之一是能够查看数据在数据流任务中流动的过程。有几种选项可让你抽样数据。数据查看器让你能以各种形式查看数据流任务中两个不同组件之间的数据。行采样和百分比采样变换则允许你直接从数据集中提取样本数据。\n\
  \n#### 数据查看器\n\n*数据查看器* 选项让你能在数据流通过数据流任务时快速查看数据流的快照。查看器可以在数据流任务中任意两个组件之间启用。\n\n\
  图 12-31 展示了如何在数据流任务上定义数据查看器。要启用数据查看器，你需要右键单击两个组件之间的连接并选择“启用数据查看器”。\n\n*图 12-31.\
  \ 启用数据查看器*\n\n启用数据查看器后，所选连接上会出现一个小图标。该图标是一个小放大镜，表示对管道中某一时间点的深入查看。\n\n图 12-32 展示了一个启用了数据查看器的连接。数据查看器能在开发过程中为你提供极大帮助，因为它可以让你在不将数据提交到表或对象变量的情况下查看数据。此对象有助于数据分析的一个方面是数据转换。假设你的数据转换变换因没有非常具体的错误消息而失败。数据查看器可以帮助你识别导致错误的行，让你能够采取行动修复错误数据或忽略它。数据查看器还可用于评估查找组件或合并连接变换的成功程度。\n\
  \n*图 12-32. 已启用的数据查看器*\n\n\n\n"
- '# 数据概览与清洗


  #### 数据查看器


  数据查看器用于在运行时显示数据。当数据流经两个组件之间的连接器时，数据会按缓冲区逐块显示。有多种选项可控制数据的显示方式，其中最常用的是网格视图。网格以表格形式展示数据，并支持将数据复制到剪贴板供后续使用。在
  Visual Studio 的调试模式下，网格会显示在一个单独的窗口中。图 12-33 展示了模糊查找组件之后的数据查看器。


  *图 12-33\. 模糊查找输出的数据查看器*


  窗口的名称有助于识别其在包中的位置。在本例中，数据查看器在模糊查找组件之后启用，因此窗口的派生命名为 DFT_DataViewer 上的模糊查找输出数据查看器。该窗口还包含一个绿色箭头按钮，用于通知
  Visual Studio 继续执行包，并允许数据行通过连接器。“分离”按钮将保留窗口并允许包继续执行。“复制数据”按钮会将高亮显示的行和数据集的列标题复制到剪贴板。点击特定列标题会自动根据该缓冲区内的值对数据进行排序。关闭数据查看器窗口也会强制
  Visual Studio 调试器继续执行包。


  #### 数据采样


  SSIS 数据流任务提供了一些实用的组件，可在运行时查看随机数据样本。这些组件是行采样和百分比采样转换。它们将在数据流经时提取预定义的行样本。


  如果没有排序转换或 ORDER BY 子句，数据在通过时应为随机顺序。采样转换将通过从数据中随机选择样本来反映这一点。


  采样转换的替代方案是 SQL Server 的 TOP N 记录集。主要区别在于 SSIS 会尝试生成真正的随机集合，而 TOP N 会按从磁盘读取的顺序返回指定数量或百分比的记录。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-461_1.jpg)


  ##### 行采样


  `行采样转换`允许您定义要从数据流中提取的行数作为样本集。此样本集将从管道中完全移除。除非您选择种子值，否则数据是随机选择的。如果指定了种子值，您将在选择行样本时使用它生成随机数。图
  12-34 演示了使用行采样组件的数据流任务。


  *图 12-34\. 行采样示例*


  数据集的目的是记录集目标。我们使用对象数据类型变量来存储每个输出。`行采样转换`被配置为仅使用数据集中的 10 行作为样本集。其余行在此采样练习中将被忽略。在执行结果中，您可以看到“采样选定输出”将行从原始管道中完全移除，并创建为单独的流“采样未选定输出”。在此功能上，`行采样转换`的工作方式类似于条件拆分转换。条件拆分转换也可用于从数据集中提取样本，方法是使用一个条件，该条件会对某些行在
  True 和 False 之间随机变化。主要挑战在于定义样本集的大小。


  ##### 百分比采样


  `百分比采样转换`的工作方式类似于`行采样转换`。它不依赖于预定义的行数，而是依赖于数据集所需百分比作为样本集。图 12-35 演示了使用`百分比采样转换`来提取样本数据集的数据流任务。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-462_1.jpg)


  *图 12-35\. 百分比采样示例*


  在此示例中，我们配置`百分比采样转换`从数据集中选择 25% 的行作为样本集。来自源的初始行数为 15,088。3,719 行约占 15,088 行的 24.64%；25%
  应该是 3,722 行。`百分比采样转换`在采样行时不会提供精确的百分比分割，但非常接近。多次执行数据流任务后，您会发现记录数并不总是相同的。该数字会在指定的百分比附近波动，但不一定完全精确。


  ### 总结


  数据集成项目需要大量开销来同步来自不同系统的数据。SSIS 提供了各种工具来分析这些数据，以便制定出充分知情的计划。这些工具包括数据概览任务、模糊查找转换、数据采样转换以及用于分析流经数据流的数据的查看器。使用这些内置工具可以让您非常快速地获取数据状态的快照。下一章将介绍在从各种系统提取、转换和加载数据到可能不同的系统时，可用于记录日志和审计的选项。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 日志记录与审计


  > *对数据的无控制访问，没有活动审计跟踪且缺乏监督，将过于危险。*

  >

  > ——美国海军军官约翰·波因德克斯特


  企业系统提供的几个关键优势（在审计师开始仔细检查之前往往被忽视）是流程日志记录、审计和数据沿袭。概念很简单：当您将数据从一个系统移动到另一个系统并在过程中进行操作时，您可能需要跟踪数据的来源，维护有关数据处理的摘要信息，并了解哪些过程在此过程中接触了该数据。保留此附加信息的原因有几个：


  - 您可能需要将其用于故障排除目的，以将数据问题向后追溯到其来源。

  - 法律部门可能强制要求一项新的法律规定，要求在发生问题时实时记录处理的每个步骤。

  - 您的业务可能受到萨班斯-奥克斯利法案 (`SOX`) 或健康保险流通与责任法案 (`HIPAA`) 等法规的约束，这些法规要求对机密医疗或消费者数据实施高水平的安全和控制。


  SSIS 提供了广泛的标准日志记录功能，可捕获有关 ETL 处理状态的运行时信息。此外，使用 SSIS 为企业 ETL 应用程序添加审计功能相对简单。在本章中，您将了解利用标准日志记录以及向
  SSIS 包添加审计的方法。


  ### 日志记录


  SSIS 提供了易于启用的内置`日志记录`功能。在前面的章节中，我们已在一些代码示例中启用此功能以演示 SSIS 的日志记录能力。在本节中，我们将回顾如何在 SSIS
  包中启用和配置日志记录。我们还将讨论 SSIS 日志记录的最佳实践。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-464_1.jpg)


  #### 启用日志记录


  SSIS 中的日志记录选项可在包级别访问，方法是右键单击控制流，并从弹出的上下文菜单中选择“日志记录”选项，如图 13-1 所示。


  *图 13-1\. 从弹出菜单中选择日志记录选项*


  日志记录配置屏幕允许您配置 SSIS 日志记录选项，如图 13-2 所示。在此屏幕中，您可以设置以下日志记录选项：




  '
- "# 第 13 章 – 日志记录与审计\n\n-   要使用的 SSIS 日志提供程序。最常见的选项是用于 SQL Server 的 SSIS 日志提供程序（将日志记录到\
  \ SQL Server 表中）和用于文本文件的 SSIS 日志提供程序（将日志信息输出到文本文件）。不过，您也可以选择将信息记录到 Windows 事件日志、XML\
  \ 文件或 SQL Server Profiler 跟踪文件中。后几种选项通常用于专门的故障排除任务。\n-   需要记录事件的容器。您可以在包、容器和数据流任务级别配置特定事件的日志记录。在我们的示例中，我们将在包和数据流任务两个级别进行配置。\n\
  -   您希望在事件级别记录的详细信息。您可以从 **详细信息** 选项卡中选择这些详细信息。\n\n**注意：** 通常，我们倾向于使用用于 SQL Server\
  \ 的 SSIS 日志提供程序，而非其他日志记录方法。因为此日志提供程序将信息记录到 SQL Server 数据库表中，记录的信息易于查询，从而简化了故障排除工作。当您指定使用用于\
  \ SQL Server 的 SSIS 日志提供程序时，它会自动在您的数据库中生成 `dbo.sysssislog` 表和 `dbo.sp_ssis_addlogentry`\
  \ 存储过程（如果它们不存在），并将这两者都标记为系统对象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-465_1.jpg)\n\n*图 13-2. SSIS 日志记录配置屏幕*\n\n要配置日志记录，请选择您希望为其启用日志记录的包，或包中的容器或任务。然后选择一个日志提供程序，并单击\
  \ **添加** 按钮。在图 13-3 中，我们将用于 SQL Server 的 SSIS 日志提供程序添加到了一个包中，并在包级别启用了日志记录。对于许多日志提供程序，您必须从\
  \ **配置** 下拉列表中选择一个连接。在图中，我们选择了一个名为 `LOG` 的 OLE DB 连接，该连接指向我们希望记录到的 SQL Server 数据库。\n\
  \n**注意：** 当我们配置用于 SQL Server 的 SSIS 日志提供程序时，我们更倾向于专门为日志提供程序连接创建一个 OLE DB 连接管理器。这样可以将日志记录信息与数据连接分开。这样做的一个主要原因是避免偶尔出现的“连接正忙于处理另一命令的结果”错误，这种错误在某些情况下可能难以排查。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-466_1.jpg)\n\
  \n*图 13-3. 配置用于 SQL Server 的 SSIS 日志提供程序*\n\n在我们的示例中，我们已在包级别启用了日志记录，但没有更改包中包含的数据流任务的设置。在这种情况下，包中的所有容器和任务都会从包继承其日志记录设置，如灰色复选框所示。要配置记录的事件，请选择日志记录配置页面的\
  \ **详细信息** 选项卡。所有可以记录的事件都会列出，如图 13-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-467_1.jpg)\n\n*图 13-4. 选择要记录的事件*\n\n您还可以通过单击 **高级** 按钮（如图 13-5 所示）来选择为每个事件记录的详细信息。默认情况下，它会记录每个事件的所有相关信息。除非您有特定原因需要从日志中排除某些数据，否则默认设置通常是足够的。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-468_1.jpg)\n\
  \n*图 13-5. 选择为每个事件记录的数据*\n\n#### 选择日志事件\n\n配置日志记录时，需要记住的一点是，每个记录的事件都会消耗一些资源。以用于\
  \ SQL Server 的 SSIS 日志提供程序为例，每个事件都需要调用一个 SQL Server 存储过程，然后该过程将数据写入数据库中的表。记录大量事件会降低包的速度并需要大量存储空间。\n\
  \n尽管所有的 SSIS 事件都提供了一些关于包执行情况的洞察，但有些事件更适合留作专门的调试场景。因此，我们建议在生产环境中限制记录的事件。记录过多信息会对性能和存储造成影响，而且在故障排除时，如果您选择记录过多信息，可能会遇到“信息过载”的问题。以下列表指出了我们建议在生产环境中捕获的核心事件。请注意，此列表只是一个起点，您在生产环境中可能还需要捕获其他事件：\n\
  \n-   `OnError`\n-   `OnExecStatusChanged`\n-   `OnPipelinePostComponentCall`\n\
  -   `OnPipelinePreComponentCall`\n-   `OnPostExecute`\n-   `OnPostValidate`\n- \
  \  `OnPreExecute`\n-   `OnPreValidate`\n-   `OnQueryCancel`\n-   `OnTaskFailed`\n\
  -   `OnWarning`\n\n我们建议避免的事件包括 `OnInformation`、`OnProgress` 和 `Diagnostic` 等。尽管这些事件在调试和测试场景中通常很有用，但它们记录的“噪声信息”与有用信息的比例非常高。它们往往会混淆日志，使故障排除复杂化，并在不同程度上对性能产生不利影响。\n\
  \n#### 关于 SQL 日志记录\n\n如本章前面所述，我们倾向于使用用于 SQL Server 的 SSIS 日志提供程序来处理 SSIS 日志记录需求。此日志提供程序依赖两个数据库对象来记录信息：一个名为\
  \ `dbo.sp_ssis_addlogentry` 的存储过程和一个名为 `dbo.sysssislog` 的表，两者都被标记为系统对象。每当发生事件时，SSIS\
  \ 就会调用该存储过程。该过程继而向 `dbo.sysssislog` 表中写入一条记录。可以使用类似于图 13-6 所示的查询来查询 SSIS 日志表以检索相关信息。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-470_1.jpg)\n\
  \n*图 13-6. 查询 SSIS 日志表*\n\n### 摘要审计\n\n*摘要审计* 包括获取和存储 SSIS 包的简要处理信息。作为审计的一部分，我们通常存储可以从\
  \ SSIS 包中的系统变量获取的包审计信息、开始和结束时间以及其他摘要执行信息。\n\n启用审计的最简单方法是创建并调用存储过程来启动和结束您的审计过程。在作者通常采用的模型中，我们喜欢将过程分为批次级别和包级别审计。图\
  \ 13-7 是此两部分批次/包审计过程的逻辑表示。请注意，一个*批次*可以包含一个或多个包。\n\n**注意：** 可以通过使用执行包任务来实现父子 SSIS\
  \ 设计模式，将多个包包装在一个批次中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-471_1.jpg)\n\
  \n*图 13-7. 批次/包审计的逻辑视图*\n\n#### 批次级别审计\n\n*批次级别审计* 涵盖在给定运行期间执行的所有包。在批次级别，我们记录整个批次的开始时间和结束时间，以及数据库中表的摘要信息。出于安全考虑并为了简化管理，我们审计过程的实现将其数据库对象放在一个新的架构中。在此实例中，我们将其命名为\
  \ `Audit`：\n\n```sql\nIF SCHEMA_ID(N'Audit') IS NULL\n    EXEC(N'CREATE SCHEMA Audit;');\n\
  GO\n```\n\n我们首先创建一个名为 `AuditBatch` 的表，其中包含批次级别的审计信息，包括给定批次的开始和结束时间。您可以使用存储在 `AuditBatch`\
  \ 表中的信息来确定整个批次包的性能，并归档属于单个批次执行的日志条目。以下是我们执行的代码：\n\n```sql\nIF OBJECT_ID(N'Audit.AuditBatch')\
  \ IS NOT NULL\n    DROP TABLE Audit.AuditBatch;\nGO\n\nCREATE TABLE Audit.AuditBatch\n\
  (\n    BatchID BIGINT NOT NULL IDENTITY(1, 1),\n```\n\n\n## 第 13 章 日志记录与审计\n\n```sql\n\
  BatchStartTime DATETIMEOFFSET,\nBatchEndTime DATETIMEOFFSET,\nBatchElapsedTimeMS\
  \ AS (DATEDIFF(MILLISECOND, BatchStartTime, BatchEndTime)),\nBatchStatus NVARCHAR(20),\n\
  CONSTRAINT PK_AUDIT_AUDITBATCH PRIMARY KEY CLUSTERED\n(\nBatchID\n)\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```sql\n);\nGO\n```\n\n在下一个示例中，我们还创建了一个名为 `Audit.AuditTable` 的批处理级别的审计表，该表捕获数据库中表的状态信息，包括每个表中的行数以及每个表消耗的空间。存储在此表中的信息可用于确定给定批处理进程的资源使用情况。例如，你可以使用这些原始数据来估算长期存储需求。\n\
  \n```sql\nIF OBJECT_ID(N'Audit.AuditTable') IS NOT NULL\n    DROP TABLE Audit.AuditTable;\n\
  GO\n\nCREATE TABLE Audit.AuditTable\n(\nTableAuditID BIGINT NOT NULL IDENTITY(1,\
  \ 1),\nBatchID BIGINT NOT NULL,\nBatchStartFlag BIT NOT NULL,\nTableSchema NVARCHAR(128),\n\
  TableName NVARCHAR(128),\nTableObjectID INT,\nTableReservedKB FLOAT,\nTableDataKB\
  \ FLOAT,\nTableIndexKB FLOAT,\nTableUnusedKB FLOAT,\nTableRows INT,\nTableDataBytesPerRow\
  \ INT,\nCONSTRAINT PK_AUDIT_AUDITTABLE PRIMARY KEY CLUSTERED\n(\nTableAuditID\n\
  )\n);\nGO\n```\n\n为了简化我们即将编写的存储过程代码，我们通过一个名为 `Audit.SummaryTableData` 的视图来捕获表大小数据。为了提高速度，我们使用\
  \ `sys.partitions` 目录视图来获取表的行数：\n\n```sql\nIF OBJECT_ID(N'Audit.SummaryTableData')\
  \ IS NOT NULL\n    DROP VIEW Audit.SummaryTableData;\nGO\n\nCREATE VIEW Audit.SummaryTableData\n\
  AS\nWITH CTE\nAS\n(\nSELECT OBJECT_SCHEMA_NAME(p.object_id) AS table_schema,\n \
  \      OBJECT_NAME(p.object_id) AS table_name,\n       p.object_id,\n       SUM(a.total_pages)\
  \ AS reserved_pages,\n       SUM(a.used_pages) AS used_pages,\n       SUM(\n   \
  \        CASE\n               WHEN it.internal_type IN (202, 204, 207, 211, 212,\
  \ 213, 214, 215, 216, 221, 222) THEN 0\n               WHEN a.type <> 1 AND p.index_id\
  \ < 2 THEN a.used_pages\n               WHEN p.index_id < 2 THEN a.data_pages\n\
  \               ELSE 0\n           END\n       ) AS pages,\n       (\n         \
  \  SELECT SUM(p1.rows)\n           FROM sys.partitions p1\n           WHERE p1.index_id\
  \ in (0,1)\n             AND p1.object_id = p.object_id\n       ) AS rows\nFROM\
  \ sys.partitions p\nINNER JOIN sys.tables t\n    ON p.object_id = t.object_id\n\
  INNER JOIN sys.allocation_units a\n    ON p.partition_id = a.container_id\nLEFT\
  \ JOIN sys.internal_tables it\n    ON p.object_id = it.object_id\nGROUP BY OBJECT_SCHEMA_NAME(p.object_id),\n\
  \         OBJECT_NAME(p.object_id),\n         p.object_id\n)\nSELECT table_schema,\n\
  \       table_name,\n       object_id,\n       reserved_pages * 8192 / 1024.0 AS\
  \ reserved_kb,\n       pages * 8192 / 1024.0 AS data_kb,\n       (used_pages - pages)\
  \ * 8192 / 1024.0 AS index_kb,\n       (reserved_pages - used_pages) * 8192 / 1024.0\
  \ AS unused_kb,\n       rows,\n       pages * 8192 / CASE rows\n               \
  \            WHEN 0.0 THEN NULL\n                           ELSE rows\n        \
  \               END AS data_bytes_per_row\nFROM CTE;\nGO\n```\n\n**提示：** `sys.partitions`\
  \ 目录视图中的行数在技术上是一种近似值，但据指出，它们可能出错的情况非常罕见。我们有可靠的信息表明，如果你的 `sys.partitions` 行数偏差较大，应该向\
  \ Microsoft 报告，因为它可能是一个需要调查的问题。我们在这里使用它是因为它比通过 `SELECT COUNT(*)` 方法获取表行数要快得多。\n\n\
  我们的视图使用与旧式 `sp_spaceused` 系统存储过程非常相似的方法来计算表所使用的空间。最后，我们创建两个过程来启动和结束批处理审计（`StartAuditBatch`\
  \ 和 `EndAuditBatch`）。对 `StartAuditBatch` 的初始调用在每次调用后返回一个唯一的批处理 ID 号，并存储数据库中表的初始状态信息。以下示例中的\
  \ `EndAuditBatch` 过程接受这个先前生成的批处理 ID 号并关闭批处理信息。\n\n```sql\nIF OBJECT_ID(N'Audit.StartAuditBatch')\
  \ IS NOT NULL\n    DROP PROCEDURE Audit.StartAuditBatch;\nGO\n\nCREATE PROCEDURE\
  \ Audit.StartAuditBatch @BatchID BIGINT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\
  \n    INSERT INTO Audit.AuditBatch\n    (\n        BatchStartTime,\n        BatchStatus\n\
  \    )\n    VALUES\n```\n\n\n"
- "# 第 13 章 日志记录与审计\n\n#### 包级别审计\n\n我们的包级别审计功能记录了包标识和执行信息，包括一个执行 GUID，您可以用它关联回 SSIS\
  \ 日志表。这为 SSIS 日志条目添加了上下文，并提供了可用于按包进行故障排除的额外信息。\n\n为了存储包审计信息，我们创建了一个 `AuditPackage`\
  \ 表，其中包含包信息，包括名称、版本和一个 GUID，该 GUID 可用于将此表中的条目与 SSIS 日志条目关联（如果您使用适用于 SQL Server 的\
  \ SSIS 日志提供程序）。以下是创建该表的代码：\n\n```sql\nIF OBJECT_ID ('Audit.AuditPackage') IS NOT\
  \ NULL\n    DROP TABLE Audit.AuditPackage;\nGO\n\nCREATE TABLE Audit.AuditPackage\n\
  (\n    AuditPackageID BIGINT NOT NULL IDENTITY(1, 1),\n    BatchID BIGINT NOT NULL,\n\
  \    PackageName NVARCHAR(128),\n    ExecutionInstanceGUID UNIQUEIDENTIFIER,\n \
  \   ProductVersion NVARCHAR(20),\n    MachineName NVARCHAR(128),\n    VersionMajor\
  \ INT,\n    VersionMinor INT,\n    VersionBuild INT,\n    LocaleID INT,\n    PackageStartTime\
  \ DATETIMEOFFSET,\n    PackageEndTime DATETIMEOFFSET,\n    PackageElapsedTimeMS\
  \ AS (DATEDIFF(MILLISECOND, PackageStartTime, PackageEndTime)),\n    CONSTRAINT\
  \ PK_AUDIT_AUDITPACKAGE PRIMARY KEY CLUSTERED\n    (\n        AuditPackageID\n \
  \   )\n);\nGO\n```\n\n我们为包审计创建了两个过程：`StartAuditPackage` 用于启动审计过程，`EndAuditPackage`\
  \ 用于结束审计。启动过程在每次调用后返回一个唯一的包审计 ID 号。同一个审计 ID 号被传入结束过程以完成审计条目。代码如下：\n\n```sql\nIF\
  \ OBJECT_ID('Audit.StartAuditPackage') IS NOT NULL\n    DROP PROCEDURE Audit.StartAuditPackage;\n\
  GO\n\nCREATE PROCEDURE Audit.StartAuditPackage\n    @ExecutionInstanceGUID UNIQUEIDENTIFIER,\n\
  \    @ProductVersion NVARCHAR(20),\n    @MachineName NVARCHAR(128),\n    @VersionMajor\
  \ INT,\n    @VersionMinor INT,\n    @VersionBuild INT,\n    @LocaleID INT,\n   \
  \ @PackageName NVARCHAR(128),\n    @BatchID BIGINT,\n    @AuditPackageID BIGINT\
  \ OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    INSERT INTO Audit.AuditPackage\n \
  \   (\n        PackageName,\n        BatchID,\n        ExecutionInstanceGUID,\n\
  \        ProductVersion,\n        MachineName,\n        VersionMajor,\n        VersionMinor,\n\
  \        VersionBuild,\n        LocaleID,\n        PackageStartTime\n    )\n   \
  \ VALUES\n    (\n        @PackageName,\n        @BatchID,\n        @ExecutionInstanceGUID,\n\
  \        @ProductVersion,\n        @MachineName,\n        @VersionMajor,\n     \
  \   @VersionMinor,\n        @VersionBuild,\n        @LocaleID,\n        SYSDATETIMEOFFSET()\n\
  \    );\n    SET @AuditPackageID = SCOPE_IDENTITY();\nEND;\nGO\n\nIF OBJECT_ID('Audit.EndAuditPackage')\
  \ IS NOT NULL\n    DROP PROCEDURE Audit.EndAuditPackage;\nGO\n\nCREATE PROCEDURE\
  \ Audit.EndAuditPackage\n    @AuditPackageID BIGINT\nAS\nBEGIN\n    SET NOCOUNT\
  \ ON;\n    UPDATE Audit.AuditPackage\n    SET PackageEndTime = SYSDATETIMEOFFSET()\n\
  \    WHERE AuditPackageID = @AuditPackageID;\nEND;\nGO\n```\n\n#### 向包添加审计\n\n\n"
- "# 日志与审计\n\n### 带有审计调用的示例包\n\n审计可以通过在流程中加入执行 SQL 任务来调用相应的存储过程来添加到您的流程中。在我们的示例包中，我们创建了两个\
  \ 64 位整型（Int64）变量，分别命名为`User::AuditBatchID`和`User::AuditPackageID`。我们按照图 13-8 所示设置我们的示例包。\n\
  \n*图 13-8. 带有审计调用的示例包*\n\n此示例中的数据流任务被起始和结束审计调用所包装，顺序如下：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-479_1.jpg)\n\n- **SQL – Start Batch Audit**：开始批处理审计过程。调用起始批处理审计过程并返回唯一的批处理审计\
  \ ID。此 ID 用于设置包中的变量。\n- **SQL – Start Package Audit**：开始包审计过程。调用起始包审计过程并返回唯一的包审计\
  \ ID，该 ID 用于设置相应的包变量。我们将几个系统变量传递给此过程，以便将它们保存在包审计表中。\n- **SQL – End Package Audit**：结束包审计过程。此过程在包级别关闭审计循环，记录审计完成信息。\n\
  - **SQL – End Batch Audit**：完成批处理审计过程。在所有包完成后，调用结束批处理审计过程以完成批处理级别的审计。记录的批处理审计信息包括表大小变化信息。\n\
  \n正如我们提到的，您捕获的审计信息可以通过`Execution Instance GUID`连接回标准的 SSIS 日志表。此 GUID 将为您提供与任何给定包执行相关的所有日志消息，使用类似于以下的查询。示例结果如图\
  \ 13-9 所示。\n\n```sql\nSELECT au.AuditPackageID,\n       au.BatchID,\n       au.PackageName,\n\
  \       au.MachineName,\n       au.PackageStartTime,\n       au.PackageEndTime,\n\
  \       s.event,\n       s.source,\n       s.message\nFROM Audit.AuditPackage au\n\
  INNER JOIN dbo.sysssislog s\nON au.ExecutionInstanceGUID = s.executionid;\nGO\n\
  ```\n\n*图 13-9. 连接到 SSIS 日志表的审计数据示例结果*\n\n### 简单的数据血缘\n\n我们在本章中描述的审计过程的一个优点是，您可以轻松地扩展它以包含简单的数据血缘流程。*数据血缘*\
  \ 是一个过程，通过它可以追溯数据的来源，本质上是逆向工程数据到达其当前状态所经历的过程。在本节展示的最简单形式中，您可以使用数据血缘信息来确定哪些 ETL 流程处理了您的数据，并确定其衍生的确切来源。\n\
  \n> **注意：** Microsoft 在 SQL Server Denali 的早期预发布版本中引入了一项名为 *影响和数据分析 (IAL)* 的新功能。IAL\
  \ 本应开箱即用地提供企业级数据血缘功能。可惜的是，该功能在发布到市场 (RTM) 之前因“大修”而被撤回。因此，在 Microsoft 的解决方案发布之前，我们必须实现自己的数据血缘流程。经过改进的\
  \ IAL 预计将在 SQL Server Denali 之后不久作为 Project Barcelona 的一部分发布（更多信息请访问 http://blogs.msdn.com/b/project_barcelona_team_blog/）。\n\
  \n我们为简单数据血缘解决方案需要记录的大部分信息已经存储在批处理和包审计表中。这包括开始和停止时间、特定的包和平台标识信息以及相关的标准日志条目。所有这些信息都可以用来逆向工程您的流程，但缺少一些项目。在您逐步回溯流程后，您需要最终确定数据的来源，并且您可能实际上需要审计解决方案未捕获的额外支持数据。\n\
  \n"
- '# 第十三章 日志记录与审计


  为此，我们创建了一个简单的表，用于存储与特定批次和包执行相关的键值对。这个设计不限制您使用一组预定义的条目，而是允许您在流程的任何节点存储任何必要的元数据。为此创建的表是
  `LineageMetadata` 表，如下所示：


  ```

  IF OBJECT_ID(N''Audit.LineageMetadata'') IS NOT NULL

  DROP TABLE Audit.LineageMetadata;

  GO


  CREATE TABLE Audit.LineageMetadata

  (

  LineageMetaID int not null identity(1, 1),

  BatchID int not null,

  AuditPackageID int not null,

  LineageKey varchar(1000) not null,

  LineageValue varchar(1000),

  CONSTRAINT PK_AUDIT_LINEAGEMETADATA PRIMARY KEY CLUSTERED

  (

  LineageMetaID

  )

  );

  GO

  ```


  我们还提供了一个简单的存储过程，可根据需要向表中添加条目，如下所示：


  ```

  IF OBJECT_ID(N''Audit.AddLineageMetadata'') IS NOT NULL

  DROP PROCEDURE Audit.AddLineageMetadata;

  GO


  CREATE PROCEDURE Audit.AddLineageMetadata @BatchID int,

  @AuditPackageID int,

  @LineageKey varchar(1000),

  @LineageValue varchar(1000)

  AS

  BEGIN

  INSERT INTO Audit.LineageMetadata

  (

  BatchID,

  AuditPackageID,

  LineageKey,

  LineageValue

  )

  VALUES

  (

  @BatchID,

  @AuditPackageID,

  @LineageKey,

  @LineageValue

  );

  END;

  GO

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  一个实现了我们简单数据血缘解决方案的示例包，扩展了之前的审计包以包含血缘实体，例如存储源文件名，如图 13-10 所示。


  ![](img/index-482_1.jpg)


  *图 13-10. 包含附加数据血缘的 SSIS 包*


  为了获得行级数据血缘，我们需要将批次 ID 和包 ID 作为列添加到我们的数据流中，并与数据一起存储在目标表中。在我们的示例中，这是通过 `派生列` 转换完成的，如图
  13-11 所示。


  ![](img/index-483_1.jpg)


  *图 13-11. 使用“派生列”转换将血缘数据添加到数据流*


  血缘数据可以通过 `BatchID` 和 `AuditPackageID` 与审计数据进行联接，如下面的示例查询所示。我们测试运行的样本结果如图 13-12 所示。


  ```

  SELECT lm.BatchID,

  lm.AuditPackageID,

  lm.LineageKey,

  lm.LineageValue,

  au.PackageName,

  au.PackageStartTime,

  au.PackageEndTime

  FROM Audit.LineageMetadata lm

  INNER JOIN Audit.AuditPackage au

  ON lm.BatchID = au.BatchID

  AND lm.AuditPackageID = au.AuditPackageID;

  GO

  ```


  ![](img/index-484_1.jpg)


  *图 13-12. 血缘与审计数据示例*


  如图 13-12 中的结果所示，我们捕获了足够的元数据信息，可以追溯每一行数据从其开始的源文件，经过处理它的包，最终到达其结束的目标表。


  **注意：** 如前所述，这是一个简单的数据血缘解决方案，但它可用于构建更复杂的解决方案。作者曾偶尔实施过需要更精细粒度的自定义数据血缘解决方案，例如捕获数据在被处理时的单个行和列的状态。可以想象，我们热切期待着
  Project Barcelona 的发布。


  ### 总结


  在世界各地当前投入生产的许多企业系统中——涵盖众多行业——日志记录和审计功能常常被忽视。在某些场景下，缺乏适当的日志记录和审计流程可能导致花费无数小时逆向工程数千行代码，以发现并修复即使是最简单的错误。在最坏的情况下，未能实现这些企业级功能可能最终导致与审计机构和监管机构发生麻烦，随之而来的是巨额罚款和人员失业。本章介绍了
  SSIS 的内置日志记录功能，并展示了如何扩展它们，为您的 ETL 流程添加标准化的审计功能。



  此外，存储**数据血缘**信息正变得越来越重要，它使你能够跟踪数据从一个系统移动到另一个系统的过程，直至进入你的数据仓库、数据集市和其他数据存储库。尽管`SSIS`目前并未提供开箱即用的企业级数据血缘功能，但我们已经演示了如何扩展你的审计系统以实现一个基本的数据血缘解决方案，该方案将允许你在行级别跟踪数据，回溯处理过它的所有数据包，一直追溯到其源头。


  下一章将介绍异构环境中的`ETL`——即源数据以多种形式和格式呈现的环境。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


