  *   `保持安全信息`：允许将连接信息作为连接字符串的一部分存储。

  *   `临时文件目录`：指定 SQL Server Compact 数据库的临时数据库文件位置。

  *   `数据源`：指定要访问的 SQL Server Compact 数据库的名称。

  *   `密码`：指定 SQL Server Compact 的密码。


