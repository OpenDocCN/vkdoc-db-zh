  \ | 消息队列任务 | ...记录有关任务的信息 |\n| `MSMQTaskTimeOut` | 消息队列任务 | ...如果任务超时 |\n| `SendMailTaskBegin`\
  \ | 发送邮件任务 | ...当开始发送电子邮件时 |\n| `SendMailTaskEnd` | 发送邮件任务 | ...当完成电子邮件发送时 |\n|\
  \ `SendMailTaskInfo` | 发送邮件任务 | ...记录有关任务的附加信息 |\n| `WMIDataReaderGettingWMIData`\
  \ | WMI 数据读取器任务 | ...指示 WMI 数据读取已开始 |\n| `WMIDataReaderOperation` | WMI 数据读取器任务\
  \ | ...记录已运行的 WMI 查询 |\n| `WMIEventWatcherEventOccurred` | WMI 事件查看器任务 | ...当受监视的事件发生时\
  \ |\n| `WMIEventWatcherEventTimedout` | WMI 事件查看器任务 | ...如果任务超时 |\n| `WMIEventWatcherWatchingForWMIEvents`\
  \ | WMI 事件查看器任务 | ...指示 WMI 查询语言 (`WQL`) 查询的开始，包括实际查询文本 |\n\n**提示：** 执行包任务没有任何特定于任务的日志记录事件。但是，子包会将日志详细信息转发到父包，父包可能会记录这些详细信息。\n\
  \nSQL Server 任务组包括大容量插入任务、执行 SQL 任务、传输数据库任务、传输错误消息任务、传输作业任务、传输登录任务、传输存储过程任务和传输 SQL\
  \ Server 对象任务。表 11-5 列出了这些任务支持的特定于任务的日志记录事件。\n\n#### 表 11-5. SQL Server 任务日志事件\n\
  \n| **事件名称** | **任务** | **触发时机...** |\n| --- | --- | --- |\n| `BulkInsertBegin`\
  \ | 大容量插入任务 | ...表示大容量插入操作开始 |\n| `BulkInsertEnd` | 大容量插入任务 | ...表示大容量插入操作结束 |\n\
  | `BulkInsertTaskInfo` | 大容量插入任务 | ...提供有关大容量插入操作的附加信息 |\n| `DestSQLServer` | 传输数据库任务\
  \ | ...记录目标 SQL Server 的名称 |\n| `ExecuteSQLExecutingQuery` | 执行 SQL 任务 | ...提供有关正在执行的\
  \ SQL 查询的信息 |\n| `SourceDB` | 传输数据库任务 | ...记录源数据库的名称 |\n| `SourceSQLServer` | 传输数据库任务\
  \ | ...记录源 SQL Server 的名称 |\n| `TransferErrorMessagesTaskFinishedTransferringObjects`\
  \ | 传输错误消息任务 | ...记录传输任务的结束 |\n| `TransferErrorMessagesTaskStartTransferringObjects`\
