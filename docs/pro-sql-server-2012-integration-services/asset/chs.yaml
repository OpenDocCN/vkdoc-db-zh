  ### 小结


  SSIS 可以访问的连接管理器是包执行的 ETL 过程的支柱。它们允许数据的提取和插入。某些连接管理器的配置相当简单，而另一些则具有更复杂的属性集。在本章中，您详细研究了最常用的连接。还介绍了一些较少使用的连接管理器。下一章将指导您了解控制流可用的可执行文件、容器和优先级约束。


