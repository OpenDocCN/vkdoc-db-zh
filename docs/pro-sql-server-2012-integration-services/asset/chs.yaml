- "# 第十章 - 脚本编写\n\n#### 脚本任务事件\n\n脚本任务通过 `Dts` 对象支持多种事件和日志记录选项。敏锐的 .NET 开发人员可能已经注意到，我们在\
  \ try-catch 块的 catch 部分使用了 `Dts.Events.FireError()` 方法，而不是通常的 `throw` 语句来重新抛出异常。调用如下所示：\n\
  \n```\nDts.Events.FireError(-1, \"SCT - Get File Information\", ex.ToString(), \"\
  \", 0);\n```\n\n参数如下：\n\n- 第一个参数是名为 `errorCode` 的 `int`。这是用户为错误定义的标识符。\n- 接下来是名为\
  \ `subComponent` 的 `string`。这通常设置为脚本任务的名称，以便在记录 `OnError` 事件时参考。\n- 然后我们有一个名为 `description`\
  \ 的 `string`，其中包含错误描述。如果使用异常的 `ToString()` 方法，你将在描述中捕获异常信息和内部异常堆栈。\n- 第四个和第五个参数是名为\
  \ `helpFile` 的 `string` 和名为 `helpContext` 的 `int`。它们分别表示帮助文件的路径和该文件中某个主题的标识符（如果你有的话）。在我们的例子中，我们将其分别设置为空字符串和\
  \ 0，因为我们没有配套的帮助文件。\n\n我们也没有为组件的 `Dts.TaskResult` 属性分配 `Failure` 值。这有几个原因。首先，当你使用\
  \ `FireError()` 方法时，SSIS 会遵守脚本任务和包的 `MaximumErrorCount` 属性。设置 `Dts.TaskResult` 或使用\
  \ `throw` 语句则不会遵守 `MaximumErrorCount`，会导致脚本任务立即停止。`FireError()` 实际上会触发 `OnError`\
  \ 事件，这意味着如果你为包启用了日志记录并正在捕获 `OnError` 事件，SSIS 将为你处理日志记录。\n\n除了 `FireError()` 之外，SSIS\
  \ 还公开了触发其他事件的方法：\n\n- `FireWarning()` 触发 `OnWarning` 事件以记录警告消息。警告消息通常表示潜在问题，但不如错误消息严重。\n\
  - `FireInformation()` 触发 `OnInformation` 事件，记录信息性消息。信息性消息通常比警告消息更柔和，因为它们不暗示问题或潜在问题。\n\
  - `FireProgress()` 触发 `OnProgress` 事件，记录进度消息。当组件内取得“可衡量的进展”时，会触发 `OnProgress` 事件。简而言之，这意味着\
  \ `OnProgress` 事件是针对完成百分比触发的。\n- `FireQueryCancel()` 触发 `OnQueryCancel` 事件，用于检查任务是否应停止运行。该方法返回一个\
  \ `bool` 结果：`true` 表示任务应停止运行，`false` 表示继续运行。\n- `FireCustomEvent()` 触发一个自定义事件。\n\
  \n脚本任务的 `Dts.Log()` 方法让你可以直接将消息写入 SSIS 日志，而无需调用事件的开销。通常，你会希望使用前面提到的事件驱动方法来记录信息，因为它们遵守包和任务设置，例如\
  \ `MaximumErrorCount`。\n\n### 示例：使用脚本任务获取文件信息\n\n// 触发一个 OnInformation 事件，表示我们正在启动\n\
  ```\nDts.Events.FireInformation(-1, TaskName, \"Starting\", \"\", 0, ref b);\n```\n\
  \n// 定义我们的输出数据表\n```\nDataTable dt = new DataTable();\ndt.Columns.Add(\"Filename\"\
  , typeof(string));\ndt.Columns.Add(\"Extension\", typeof(string));\ndt.Columns.Add(\"\
  Filepath\", typeof(string));\ndt.Columns.Add(\"CreatedDate\", typeof(DateTime));\n\
  dt.Columns.Add(\"ModifiedDate\", typeof(DateTime));\ndt.Columns.Add(\"IsReadOnly\"\
  , typeof(Boolean));\n```\n\n// 获取文件信息并将其添加到数据表中\n```\nstring path = Dts.Variables[\"\
  User::Path\"].Value.ToString();\nDirectoryInfo di = new DirectoryInfo(path);\nFileInfo[]\
  \ fi = di.GetFiles(\"*.*\", SearchOption.AllDirectories);\nforeach (FileInfo f in\
  \ fi)\n{\n    dt.Rows.Add(new object[] { f.Name, f.Extension, f.DirectoryName, f.CreationTime,\
  \ f.LastWriteTime, f.IsReadOnly });\n}\n```\n\n// 输出数据表\n```\nDts.Variables[\"User::Files\"\
  ].Value = dt;\n}\ncatch (Exception ex)\n{\n// 如果发生错误，触发 OnError 事件\nDts.Events.FireError(-1,\
  \ TaskName, ex.ToString(), \"\", 0);\n}\nfinally\n{\n// 触发最终的 OnInformation 事件，表示我们已完成\n\
  Dts.Events.FireInformation(-1, TaskName, \"Finished\", \"\", 0, ref b);\n}\n```\n\
  \n> **提示：** 在任何访问外部资源（如此处的文件系统）的 .NET 代码中使用 try-catch 块是一个好习惯。如果外部资源不可访问，你可能需要在从脚本返回之前将\
  \ `TaskResult` 设置为 `Failure` 值或执行其他清理任务。\n\n### 使用文件元数据\n\n在我们以 `DataTable` 格式将文件列表填充到\
  \ SSIS 对象变量后，我们需要使用这些结果。为此任务，我们将 `User::Files` 变量传递到 Foreach 循环容器的 Foreach ADO Enumerator\
  \ 模式中。此模式允许你遍历 ADO.NET `DataTable` 或 `DataSet` 或 ADO `Recordset` 中的行。我们已将 Foreach\
  \ 循环编辑器的“集合”选项卡配置为遍历第一个表中的行，并将 ADO 对象源变量设置为 `User::Files`，如图 10-10 所示。\n\n*图 10-10.\
  \ 配置 Foreach 循环容器以遍历 .NET DataTable 中的行*\n\n我们通过设置编辑器“变量映射”页面上的选项完成了 Foreach 循环容器的配置，如图\
  \ 10-11 所示。此页面有两列，分别名为“变量”和“索引”。“索引”列保存数据表中列的基于零的索引；“变量”列保存这些列所映射到的变量。在循环的每次迭代中，列出的变量将填充数据表中每行对应列的值。\n\
  \n*图 10-11. 在 Foreach 循环容器中将 DataTable 列映射到 SSIS 变量*\n\n我们在 Foreach 循环容器内放置了第二个脚本任务，并将每次循环中填充的变量传递给它，如图\
  \ 10-12 所示。我们只需要读取这些变量的值，因此将它们作为只读变量传递。\n\n*图 10-12. 在内部脚本任务中配置只读变量*\n\n此脚本任务的脚本很简单，如下所示：\n\
  \n```\npublic void Main()\n{\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
  \    MessageBox.Show(String.Format(\"{0}, {1}, {2}, {3}, {4}, {5}\",\n        Dts.Variables[\"\
  User::Filename\"].Value.ToString(),\n        Dts.Variables[\"User::Extension\"].Value.ToString(),\n\
  \        Dts.Variables[\"User::Filepath\"].Value.ToString(),\n        Dts.Variables[\"\
  User::CreatedDate\"].Value.ToString(),\n        Dts.Variables[\"User::ModifiedDate\"\
  ].Value.ToString(),\n        Dts.Variables[\"User::IsReadOnly\"].Value.ToString()));\n\
  }\n```\n\n此脚本只是获取传入的只读变量的值，并在 Windows 消息框中显示它们。结果如图 10-13 所示，是在每次迭代中显示每个文件的元数据的弹出式消息框。\n\
  \n*图 10-13. 在每次循环迭代中显示文件元数据*\n\n在这个例子中，我们简化了结果，只是在弹出式消息框中显示文件元数据，但在实际应用中，你可能会使用这些元数据来备份、删除或根据某些特定标准选择要处理的文件。这里的关键点是，第一个脚本任务检索数据，并通过\
  \ Foreach 循环容器设置的变量使其可供第二个脚本任务访问。\n\n\n### 脚本组件源\n\nSSIS 允许你使用**脚本任务**向控制流中添加 .NET\
  \ 代码。你也可以使用**脚本组件转换**，以其他 SSIS 内置组件原生不支持的方式，用 .NET 来操纵数据。**脚本组件转换**有三种操作模式：你可以用它来创建基于\
  \ .NET 脚本的数据源、目标和转换组件。与内置数据流组件类似，**脚本组件源**检索数据并将其推入数据流，**脚本组件目标**从数据流接收数据并将其推送到存储，而**脚本组件转换**则在数据流中操纵你的数据。\n\
  \n当你将脚本组件拖入数据流时，BIDS 会弹出一个菜单让你选择组件类型，如图 10-14 所示。要创建**脚本组件源**，请从弹出菜单中选择`Source`。**脚本组件源**没有输入，但至少有一个输出，并且在设计上始终是同步的。\n\
  \n![](img/index-376_1.jpg)\n\n![](img/index-376_2.jpg)\n\n*图 10-14. 从弹出菜单中选择脚本组件类型*\n\
  \n在我们的例子中，我们没有将数据从**脚本组件源**推送到输出，而是将其推送到一个`RowCount`组件，并在源的输出上启用了数据查看器。这是测试 SSIS\
  \ 数据流的常用方法，因为它允许你在 ETL 过程中“实时”查看数据，而无需将其持久化到输出。我们的数据流示例如图 10-15 所示。\n\n![](img/index-377_1.jpg)\n\
  \n*图 10-15. 带有脚本组件源的数据流*\n\n将脚本组件拖到数据流上并选择源类型后，我们必须对其进行配置。第一步是向脚本组件输出中添加列。为此，我们打开了`Script\
  \ Component Editor`并转到`Inputs and Outputs`页面。在那里，我们点击`Output 0`下的`Output Columns`，并点击`Add\
  \ Column`按钮七次。这些列以默认名称添加，如`Column 1`、`Column 2`等，所有列的默认数据类型均为四字节有符号整数[DT_I4]。\n\n\
  我们将每个列重命名，使名称更具描述性，并将每个列的数据类型更改为字符串[DT_STR]，长度为 200。唯一的例外是`Description`列，我们将其长度更改为\
  \ 2000。图 10-16 显示了编辑器的`Inputs and Outputs`页面。\n\n■ **提示：** 除了更改输出中列的名称外，你还可以更改输出本身的名称。在此示例中，我们保留了`Output\
  \ 0`的默认名称。\n\n![](img/index-376_1.jpg)\n\n*图 10-16. 向脚本组件输出添加列*\n\n**脚本组件源**继承自`UserComponent`类并实现了其三个方法。当脚本组件执行时，这些方法按以下顺序调用：\n\
  \n1.  `PreExecute()`方法在脚本组件启动时、任何行添加到输出之前准确触发一次。\n2.  `CreateNewOutputRows()`方法也针对脚本组件调用一次。正是在这个方法中，你可以向输出添加新行，通常使用某种循环。\n\
  3.  `PostExecute()`方法在脚本组件结束时、你完成向输出添加行后触发一次。此方法对于在脚本组件完成后执行任何清理任务很有用。\n\n在我们的例子中，我们获取了\
  \ CNN 头条新闻 RSS 源。*简易信息聚合（RSS）*是一种用于聚合网络内容（如博客文章和新闻报道）的 XML 格式。在脚本组件中，我们使用 .NET 获取最新的\
  \ RSS 源文档，并将 XML 分解为行和列，然后将其放入组件的输出缓冲区中。首先，我们在`ScriptMain`类级别声明了一个 .NET `XmlDocument`对象来保存我们的\
  \ RSS 源页面，如下所示：\n\n```csharp\n[Microsoft.SqlServer.Dts.Pipeline.SSISScriptComponentEntryPointAttribute]\n\
  public class ScriptMain : UserComponent\n{\n    // XML Document to hold RSS feed\
  \ page\n    XmlDocument RssXML = null;\n    bool b = true;\n    string ComponentName\
  \ = \"\";\n    // Method overrides will go here...\n    ...\n}\n```\n\n`PreExecute()`方法首先获取脚本组件的名称，以便稍后在日志消息中使用。然后它调用`base.PreExecute()`方法。虽然调用基方法并非总是必要，但最好调用它们以确保不会错过它们提供的任何功能。接下来，我们使用\
  \ .NET 内置的`HttpWebRequest`和`HttpWebResponse`类来检索 CNN RSS 源并将其放入`RssXML`变量。\n\n我们在这里还使用了`ComponentMetaData.FireInformation()`方法，它触发对记录调试信息有用的`OnInformation`事件。由于我们的代码依赖于我们无法控制的外部资源（即网站），我们将\
  \ Web 请求包装在`try-catch`块中。如果捕获到异常，我们使用`FireError()`方法触发`OnError`事件。数据流组件中的`FireError()`方法不会停止数据流。错误会向上传播到`Data\
  \ Flow task`，此时 SSIS 根据包设置决定是否停止处理。对于此组件的预执行阶段，失败意味着由于某种原因我们没有好的 XML 数据可供处理，因此没有继续下去的意义。因此，我们通过使用`throw`语句重新抛出异常来强制硬停止。\n\
  \n```csharp\npublic override void PreExecute()\n{\n    // Get Name of Component\n\
  \    ComponentName = this.ComponentMetaData.Name;\n    // Fire OnInformation event\
  \ for starting\n    this.ComponentMetaData.FireInformation(-1, ComponentName, \"\
  Beginning Pre-execute\", \"\", 0, ref b);\n    // Perform base PreExecute() method\n\
  \    base.PreExecute();\n    try\n    {\n        // Fire OnInformation event for\
  \ getting RSS feed data\n        this.ComponentMetaData.FireInformation(-1, ComponentName,\
  \ \"Start - Getting RSS Feed data (Pre-execute)\", \"\", 0, ref b);\n        //\
  \ Retrieve RSS feed\n        HttpWebRequest req = (HttpWebRequest)HttpWebRequest.Create(\"\
  http://rss.cnn.com/rss/cnn_topstories.rss\");\n        HttpWebResponse res = (HttpWebResponse)req.GetResponse();\n\
  \        Stream str = res.GetResponseStream();\n        // Put RSS feed document\
  \ into XML Document\n        RssXML = new XmlDocument();\n        RssXML.Load(str);\n\
  \        // Fire OnInformation event for getting RSS feed data\n        this.ComponentMetaData.FireInformation(-1,\
  \ ComponentName, \"Complete - Getting RSS Feed data (Pre-execute)\", \"\", 0, ref\
  \ b);\n    }\n    catch (Exception ex)\n    {\n        // Fire OnError event if\
  \ an error occurs\n        this.ComponentMetaData.FireInformation(-1, ComponentName,\
  \ ex.ToString(), \"\", 0, ref b);\n        // Rethrow exception to stop processing\n\
  \        throw (ex);\n    }\n    finally\n    {\n        // Fire OnInformation event\
  \ for finished\n        this.ComponentMetaData.FireInformation(-1, ComponentName,\
  \ \"Finished Pre-execute\", \"\", 0, ref b);\n    }\n}\n```\n\n我们没有任何特殊的后执行处理需要执行，但我们仍然必须重写`PostExecute()`方法。在这种情况下，我们在`PostExecute()`中所做的只是调用`base.PostExecute()`方法：\n\
  \n```csharp\npublic override void PostExecute()\n{\n    // Perform base PostExecute()\
  \ method\n    base.PostExecute();\n}\n```\n\n\n"
- "# 第 10 章 - 脚本编写\n\n`CreateNewOutputRow()`方法是实际进行处理的地方。首先，我们获取了 RSS 源的头部信息，包括源标题、链接和发布日期，并将其放入字符串变量中。然后，我们循环遍历\
  \ RSS 源中的`<item>`标签，每个标签代表一篇联合发布的文章，并将文章标题、链接和描述放入字符串变量中。在循环中，我们调用了输出缓冲区的`AddRow()`方法，并将从\
  \ XML 文档中提取的字符串值分配给输出缓冲区列。循环完成后，并且所有行都已添加到输出后，我们在缓冲区上调用`SetEndOfRowset()`方法，以通知\
  \ SSIS 不再有更多行传入。\n\n**提示：** 即使你现在认为不需要任何特殊的错误处理，在 .NET 代码周围放置 try-catch 块将使将来更容易地添加针对错误的特殊处理。\n\
  \n#### 脚本组件事件\n\n与脚本任务类似，脚本组件允许您引发 SSIS 根据您的设置可能记录的事件。在脚本任务中，事件引发方法通过`Dts.Events`对象访问。在脚本组件中，它们通过`ComponentMetaData`对象访问。`ComponentMetaData`对象公开的方法包括：\n\
  \n-   `FireError()`引发`OnError`事件，该事件指示一个影响处理并可能阻止包运行的严重状况。请注意，`FireError()`本身不会停止数据流运行，但当错误向上传播回数据流任务时，SSIS\
  \ 将根据其属性决定控制流是否会失败。要在数据流中强制硬停止，您应该像我们在示例中所做的那样抛出异常。\n-   `FireWarning()`引发`OnWarning`事件，该事件指示一个不如错误严重但仍可能影响处理的问题。\n\
  -   `FireInformation()`引发`OnInformation`事件，其中包含信息性消息。这些消息通常对调试和排除故障问题很有用。\n-   `FireProgress()`引发`OnProgress`事件，这本身指示组件进度。我们在示例中使用了`FireProgress()`事件。\n\
  -   `FireCustomEvent()`引发您在包内创建的自定义事件。\n\n`ComponentMetaData`对象公开的事件引发方法在调试时极其有用，我们强烈建议您在脚本组件中广泛使用它们。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n在此过程中，我们持续记录已处理的行数，并通过使用`FireProgress()`方法引发`OnProgress`事件来报告进度。与`OnInformation`类似，这些事件对排除故障和调试代码很有用。如果在此代码中遇到异常，通常涉及单行，因此我们调用`FireError()`来记录错误，并让\
  \ SSIS 决定是否在任务级别停止处理。代码清单如下：\n\n```csharp\npublic override void CreateNewOutputRows()\n\
  {\n    // 为启动引发 OnInformation 事件\n    this.ComponentMetaData.FireInformation(-1,\
  \ ComponentName,\n        \"Start - Create new output rows\", \"\", 0, ref b);\n\
  \n    try\n    {\n        // 获取源属性\n        string feed_title = RssXML.SelectSingleNode(\"\
  (/rss/channel/title)[1]\").InnerText;\n        string feed_link = RssXML.SelectSingleNode(\"\
  (/rss/channel/link)[1]\").InnerText;\n        string feed_language = RssXML.SelectSingleNode(\"\
  (/rss/channel/language)[1]\").InnerText;\n        string feed_pubDate = RssXML.SelectSingleNode(\"\
  (/rss/channel/pubDate)[1]\").InnerText;\n\n        // 初始化计数器并解析文章\n        int CurrentRowCount\
  \ = 0;\n        int CurrentPercent = 0;\n        int LastPercent = 0;\n        XmlNodeList\
  \ xl = RssXML.SelectNodes(\"/rss/channel/item\");\n        int TotalRows = xl.Count;\n\
  \n        // 遍历文章\n        foreach (XmlNode xn in xl)\n        {\n            //\
  \ 获取文章属性\n            string title = xn.SelectSingleNode(\"(title)[1]\").InnerText;\n\
  \            string link = xn.SelectSingleNode(\"(link)[1]\").InnerText;\n     \
  \       string description = xn.SelectSingleNode(\"(description)[1]\").InnerText;\n\
  \n            // 创建新的输出行\n            Output0Buffer.AddRow();\n\n            //\
  \ 为输出缓冲区列赋值\n```\n\n\n\n"
- "# 第十章  脚本编写\n\n### 同步脚本组件转换\n\n`Script Component` 同步转换具有极高的灵活性。它与 `Script Component`\
  \ 源的区别在于它既有输入又有输出。本节将演示一个使用脚本组件的简单同步转换示例。在这个示例中，我们在之前程序包的基础上进行了扩展，在设计器中添加了另一个 `Script\
  \ Component` 并选择了转换类型，如图 10-18 所示。这个新的 `Script Component` 将执行一个虽简单但非常常用的功能，而这个功能在标准组件中并未提供。它将为我们数据流中的列进行编号。\n\
  \n*图 10-18. 选择转换脚本组件类型*\n\n我们将新的 `Script Component` 添加到设计器后，将数据流引导通过它，如图 10-19 所示。\n\
  \n![](img/index-384_1.jpg)\n\n*图 10-19. 将 Script Component 同步转换添加到数据流中*\n\n### 同步还是异步？\n\
  \n我们在第八章讨论了同步和异步转换的区别。`Script Component` 允许你创建这两种类型的转换。默认情况下，`Script Component`\
  \ 转换是同步的，我们的示例也是同步的。\n\n决定 `Script Component` 是同步还是异步的设置是 `SynchronousInputID`，可以在编辑器的\
  \ **输入和输出** 页面找到。当组件的此属性设置为输入名称时（默认为 `Input 0`），组件是同步的。当它设置为 `None` 时，组件是异步的。下图展示了如何设置组件的\
  \ `SynchronousInputID` 属性。\n\n![](img/index-385_1.jpg)\n\n*图 10-20. 设置脚本组件的 SynchronousInputID*\n\
  \n```csharp\nOutput0Buffer.FeedTitle = feed_title;\nOutput0Buffer.FeedLink = feed_link;\n\
  Output0Buffer.FeedLanguage = feed_language;\nOutput0Buffer.FeedPubDate = feed_pubDate;\n\
  Output0Buffer.Title = title;\nOutput0Buffer.Link = link;\nOutput0Buffer.Description\
  \ = description;\n\n// 增加行计数器，记录进度\nCurrentRowCount++;\nCurrentPercent = CurrentRowCount\
  \ * 100 / TotalRows;\n\n// 每当百分比变化时记录进度\nif (LastPercent != CurrentPercent)\n{\n\
  \    // 触发 OnProgress 事件\n    this.ComponentMetaData.FireProgress(string.Format(\"\
  已处理 {0} 行，共 {1} 行。\", CurrentRowCount, TotalRows), CurrentPercent, CurrentRowCount,\
  \ 0, ComponentName, ref b);\n    // 更新完成百分比\n    LastPercent = CurrentPercent;\n\
  }\n}\n}\ncatch (Exception ex)\n{\n    // 如果发生错误，则触发 OnError 事件\n    this.ComponentMetaData.FireInformation(-1,\
  \ ComponentName, ex.ToString(), \"\", 0, ref b);\n}\nfinally\n{\n    // 执行基类的 CreateNewOutputRows()\
  \ 方法\n    base.CreateNewOutputRows();\n    // 行结束\n    Output0Buffer.SetEndOfRowset();\n\
  \    // 触发起始的 OnInformation 事件\n    this.ComponentMetaData.FireInformation(-1, ComponentName,\
  \ \"完成 - 创建新输出行\", \"\", 0, ref b);\n}\n}\n```\n\n**注意：** 我们在这个示例中使用的 .NET `SelectNodes()`\
  \ 和 `SelectSingleNode()` 方法接受一个 `XPath` 表达式并返回 XML 节点。`XPath` 是一种允许你从 XML 文档中定位和检索单个节点或节点集合的语言。详细讨论\
  \ `XPath` 超出了本书的范围。\n\n不过，如果你想了解更多关于这项技术的细节，请查阅 .NET `XPath` 参考手册：[`msdn.microsoft.com/en-us/library/ms256115.aspx`](http://msdn.microsoft.com/en-us/library/ms256115.aspx)。\n\
  \n当这个程序包执行时，数据查看器会显示结果——CNN 头条新闻 RSS 源的内容，如图 10-17 所示。请注意，由于 CNN 会不断更新其新闻源，你的结果内容可能与图中所示有所不同。\n\
  \n![](img/index-383_1.jpg)\n\n![](img/index-383_2.jpg)\n\n*图 10-17. 数据查看器中的 RSS\
  \ 源内容*\n\n\n"
- "# 第十章 - 脚本编写\n\n### 输入列页面\n\n在编辑器的“输入列”页面中，您可以选择输入列和输出列。您选择的输入列可在脚本内部访问；所有其他列将“传递通过”该组件，到达数据流中的下一个组件。您也可以在此选项卡上向数据流添加输出列。在我们的简单示例中，我们向输出添加了一个名为\
  \ `RowNumber` 的四字节有符号整数 (`DT_I4`) 类型列，如图 10-21 所示。这个新列将保存分配给每一行的编号，从 1 开始。\n\n图\
  \ 10-21. 向脚本组件输出添加新列\n\n### 脚本组件同步转换\n\n脚本组件同步转换重写了三个方法：\n\n-   与脚本组件源类似，异步转换类型重写了\
  \ ` PreExecute()` 方法。此方法在脚本组件的开头、任何数据处理之前精确执行一次。此方法对于在转换中执行初始化任务非常有用。\n-   脚本组件同步转换也支持\
  \ `PostExecute()` 方法。此方法在组件处理完所有数据后精确执行一次。此方法允许您在转换完成后执行任何清理步骤。\n-   最后，转换提供了 `ProcessInputRow()`\
  \ 方法，其名称前缀是您的输入名称。在我们的示例中，输入名为 Input 0，`ProcessInputRow()` 方法被命名为 `Input0_ProcessInputRow()`。在同步转换中，对于通过它的每一行数据，都会调用一次此方法。此方法是转换中“发生魔法”的地方。\n\
  \n### 示例脚本分析\n\n我们在此脚本组件中使用的脚本首先声明了一个名为 `row_number` 的类级整数变量来跟踪行数，如下所示：\n\n```csharp\n\
  [Microsoft.SqlServer.Dts.Pipeline.SSISScriptComponentEntryPointAttribute]\npublic\
  \ class ScriptMain : UserComponent\n{\n    int row_number;\n    ...\n}\n```\n\n\
  ` PreExecute()` 方法调用了 `base.PreExecute()` 方法并将 `row_number` 变量初始化为 1：\n\n```csharp\n\
  public override void PreExecute()\n{\n    // Execute base PreExecute() method\n\
  \    base.PreExecute();\n    // Initialize row number\n    row_number = 1;\n}\n\
  ```\n\n`PostExecute()` 方法只是调用了 `base.PostExecute()` 方法：\n\n```csharp\npublic override\
  \ void PostExecute()\n{\n    base.PostExecute();\n}\n```\n\n`Input0_ProcessRow()`\
  \ 方法对输入中的每一行调用一次。对于传入的每一行，我们将 `row_number` 变量的值分配给数据流的 `RowNumber` 列，然后将 `row_number`\
  \ 递增 1。\n\n```csharp\npublic override void Input0_ProcessInputRow(Input0Buffer Row)\n\
  {\n    // Assign row_number to RowNumber column\n    Row.RowNumber = row_number;\n\
  \    // Increment row_number\n    row_number++;\n}\n```\n\n我们简单的行编号脚本组件的结果如图 10-22\
  \ 所示。\n\n图 10-22. 行编号脚本组件的结果\n\n### 异步脚本组件转换\n\n除了同步转换，脚本组件还允许您创建强大的异步转换。正如我们在第\
  \ 8 章讨论的，当您想通过透视、聚合或添加和删除行来更改数据集的“形状”时，异步转换非常有用。此示例扩展了先前的包，将一个新的异步脚本组件集成到数据流中。我们将解析文章的\
  \ `Title` 和 `Description` 列为单个单词，并将它们输出到单个列中，同时为每个单词提供一个出现计数。在现实世界中，这种类型的转换可用于执行文本数据挖掘和分析。\n\
  \n我们通过向任务添加另一个脚本组件开始此示例，就像添加同步脚本组件转换时一样。与之前一样，我们从对话框中选择了“转换”选项。我们将数据流从同步行编号脚本组件定向到新的脚本组件。我们还添加了一个新的“行数”转换来捕获第二个输出的输入，并在其输出上启用了数据查看器。结果如图\
  \ 10-23 所示。\n\n图 10-23. 将新的单词解析脚本组件添加到数据流\n\n在此示例中，我们将介绍脚本转换的两个特性：(1) 使用异步转换处理输入数据，以及\
  \ (2) 多个输出。对于其中一个输出，我们将其重命名为 `RssFeedOutput`，我们将以检索时的相同形式输出 RSS 源文章。该转换还将从 RSS 源的\
  \ `Description` 列中提取关键词，并计算该词在每篇文章中的出现次数。结果被发送到第二个输出，我们将其重命名为 `KeywordOutput`。\n\
  \n将新的脚本组件拖到设计器界面后，我们进入了编辑器的“输入列”页面。我们选择了来自数据流的所有入站列，使它们可用于脚本组件，如图 10-24 所示。\n\n\
  图 10-24. 将入站列添加到脚本组件的输入列中\n\n将入站列添加到脚本组件的输入列后，我们转到了“输入和输出”页面。在那里，我们向“输入和输出”页面添加了第二个输出。然后我们将两个输出上的\
  \ `SynchronousOutputID` 更改为 `None`。这会将它们与输入断开连接并使它们成为异步。\n\n**提示**：虽然您可以向脚本组件转换添加多个输出，但您只能有一个输入。如果您需要多个输入（一个例子是\
  \ Union All 组件），您将需要创建一个自定义组件，这将在第 22 章讨论。\n\n默认情况下，输出名为 Output 0 和 Output 1——对于此示例，我们将它们重命名为\
  \ `RssFeedOutput` 和 `KeywordOutput`，以更好地反映我们将要推入其中的数据。然后我们在每个输出下创建了输出列。`RssFeedOutput`\
  \ 将包含 RSS 源内容，就像它们进入组件时一样，而 `KeywordOutput` 将保存所有解析的关键词。您可以在图 10-25 中看到具有两个异步输出的“输入和输出”页面。\n\
  \n图 10-25. 向脚本组件添加两个异步输出\n\n在构建脚本组件同步转换时，如我们之前所见，默认情况下，入站列会流向输出。这是因为在同步转换中，输入和输出缓冲区是相同的。您只需要显式命名那些您的转换添加到输出的列。在异步转换中，输入和输出是断开的，因此您需要为您想要在每个输出中出现的每一个列显式创建。在我们的示例中，`RssFeedOutput`\
  \ 列镜像输入列，而 `KeywordOutput` 仅包含四列，如图 10-26 所示。表 10-1 列出了 `KeywordOutput` 列的详细信息。\n\
  \n图 10-26. 向脚本组件的两个输出添加列\n\n表 10-1. KeywordOutput 列列表\n\n| 列名 | 数据类型 | 内容 |\n| :---\
  \ | :--- | :--- |\n| `RowNumber` | 四字节有符号整数 (`DT_I4`) | 分配给输入每一行的 `RowNumber` 值的副本\
  \ |\n| `KeyWordNumber` | 四字节有符号整数 (`DT_I4`) | 分配给在 RSS 数据 `Description` 列中找到的每个关键词的唯一编号\
  \ |\n\n"
- "# 第 10 章 – 脚本编写\n\n### 列定义\n\n| 列名          | 数据类型                        | 内容\
  \                                           |\n| :------------ | :------------------------------\
  \ | :--------------------------------------------- |\n| **KeyWord**   | 字符串 [DT_STR],\
  \ 长度 100       | 在描述列中找到的关键词                         |\n| **Occurrences** | 四字节有符号整数\
  \ [DT_I4]       | 每篇文章的描述列中该关键词出现的次数           |\n\n### 脚本组件方法\n\n在脚本组件异步转换中，我们需要重写四个主要方法：\n\
  \n*   `PreExecute()` 方法在处理任何行之前，为组件触发一次。\n*   `PostExecute()` 方法在所有行处理完毕后，为组件触发一次。\n\
  *   `ProcessInput()` 方法在组件执行期间触发一次。该方法遍历缓冲区中的行，并调用另一个方法 `ProcessInputRow()` 来处理它们。`ProcessInput()`\
  \ 方法以输入名称为前缀；在我们的示例中，它是 `Input0_ProcessInput()`。\n*   `ProcessInputRow()` 方法为传递给它的每一行触发一次。通常，这将是输入缓冲区中的每一行触发一次，但这取决于\
  \ `ProcessInput()` 方法。`ProcessInputRow()` 方法也以输入名称为前缀。在我们的示例中，它被命名为 `Input0_ProcessInputRow()`。\n\
  \n我们的示例中的 `PreExecute()` 和 `PostExecute()` 方法只是调用此处显示的基础方法：\n\n```csharp\npublic\
  \ override void PreExecute()\n{\n    // 调用基方法\n    base.PreExecute();\n}\n\npublic\
  \ override void PostExecute()\n{\n    // 调用基方法\n    base.PostExecute();\n}\n```\n\
  \n`Input0_ProcessInput()` 方法使用 while 循环和输入缓冲区的 `NextRow()` 方法来遍历传入的行。它沿途为每一行调用 `Input0_ProcessInputRow()`\
  \ 方法。\n\n在输入缓冲区完全处理完毕后，调用基 `ProcessInput()` 方法，然后为两个输出缓冲区调用 `SetEndOfRowset()` 方法，以向\
  \ SSIS 运行时发出信号，表明所有行都已通过脚本组件处理完毕。\n\n```csharp\npublic override void Input0_ProcessInput(Input0Buffer\
