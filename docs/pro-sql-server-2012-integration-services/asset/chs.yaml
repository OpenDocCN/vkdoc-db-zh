  \ `派生列` 转换（我们将在下一章介绍）以将列转换为适当的类型。为了完成数据流，我们只需将 `OLE DB 目标` 配置为指向一个数据库表，并像本章“目标助手”部分描述的那样进行列映射。这个示例包的成功运行如图\
