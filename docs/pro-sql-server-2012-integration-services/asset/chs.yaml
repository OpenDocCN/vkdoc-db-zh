  ## 第 5 章 控制流基础


  *你无法总是控制外界发生什么，但你总能控制内心发生什么。*

  —自助倡导者 韦恩·戴尔


  前一章向您介绍了 SQL Server 12 的连接管理器。本章的目的是介绍一些基本的控制流项，使您能够利用这些连接管理器。在 Visual Studio 的设计器窗口中，控制流有自己的设计器页面。在本章中，我们将详细介绍您日常最有可能使用的控制流任务。第
  6 章涵盖了较少使用的可执行文件。控制流定义了包执行的操作，以及执行这些操作所需的顺序和条件。


  ### 什么是控制流？


  *控制流*是任何 SQL Server Integration Services 12 包的核心。它由可执行文件、容器和优先级约束组成。*可执行文件*是 SSIS
  包中最通用的组件。它们包括诸如`执行 SQL 任务`、`数据流任务`和`脚本任务`等任务。这些任务可用于启动存储过程、提取和加载数据以及更改变量的状态。


  *容器*用于对任务进行逻辑组织。容器可用于简单地组织任务或循环遍历任务。*优先级约束*决定了执行路径或流程。它们允许您确定任务的执行顺序。通过不定义某些约束，您可以利用并发任务执行。


  控制流设计器窗格具有缩放工具，允许您放大和缩小以查看所有组件。SSIS 工具箱也会随之更改，允许您仅访问上下文相关的项。数据流组件在控制流中不可用。向控制流添加项时，您有两个选择：可以单击并将项从
  SSIS 工具箱拖到控制流上，也可以双击该项。




  根据要添加到控制流中的项类型，我们建议在添加项之前先放置好引用的对象。例如，如果您要添加"执行 SQL 任务"，请先创建到数据库的连接管理器；或者如果您要添加"循环容器"，请先创建它可能依赖的变量。明确流程需求对于高效开发
  SSIS 包至关重要。临时以相反顺序创建对象，这几乎是您在 SSIS 中所能遇到的最接近"面条代码"的做法。利用自动格式化选项，可以最大限度地减少复杂的优先级约束流。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ## 第 5 章 控制流基础


  **注意：** 由于控制流代表包本身，因此通过右键单击控制流设计器背景可以访问包属性。控制流中的每个组件都有自己独特的一套属性，但控制流的属性即是包的属性。


  ### 用于控制流的 SSIS 工具箱


  控制流的组件包含在 Visual Studio 中一个可折叠/关闭的窗口中，称为 `SSIS 工具箱`。此窗口提供了对控制流所有可用组件的访问。需要注意，此窗口是上下文相关的，因此当您使用不同的设计器窗口时，它将显示该设计器可用的工具。不同的组件按图
  5-1 所示的组进行分类。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-110_1.jpg)


  *图 5-1. 控制流 SSIS 工具箱*


  这些分组允许您以能够快速访问最常用组件的方式组织 `SSIS 工具箱`，具体如下：


  *   **收藏夹** 代表最常用的组件。此类别将组件组织在 `SSIS 工具箱`顶部易于查找的位置。默认情况下，`数据流` 任务和 `执行 SQL` 任务位于此类别中。

  *   **常用** 组织 SSIS 开发中常用的组件。这些组件对于 ETL 过程的非 ETL 方面非常有用。这些组件允许您操作数据的源或目标，以便更轻松地提取或加载。

  *   **容器** 将不同的任务容器分组在一起。这些容器根据优先级约束执行任务。

  *   **其他任务** 存放不常使用的任务。这些任务更多地与数据库管理和非功能性需求相关，而非 ETL 本身。


  您对 `SSIS 工具箱`的自定义设置将适用于所有项目，并可随时修改。如果要恢复默认设置，可以右键单击并选择 `还原工具箱默认设置` 选项。使 `SSIS 工具箱`在开发中高效的关键特性之一是每个组件的独特图标。这些图标以一种有意义的方式代表每个任务的目的。这些图标在组件被放置到控制流中后，也会出现在组件本身上。


  **注意：** 在早期版本的 BIDS 中，窗口窗格的名称是 *工具箱*。从 SQL Server Integration Services 12 开始，名称已更改为
  `SSIS 工具箱`。如果您为控制流创建自己的自定义组件，则必须将其添加到计算机的程序集文件夹以及 SQL Server 安装的相应组件文件夹中。第 21 章将进一步介绍自定义组件。


  `SSIS 工具箱` 包含许多协助满足 ETL 需求的组件。在本书中，我们将列表分为基本组件和高级组件。本章涵盖的基本任务很可能成为您设计的大多数解决方案的一部分。其中一些任务将有各自的章节，因此本章不会详细描述它们。


  ### 收藏夹任务


  `收藏夹` 组中的默认任务列表是 `执行 SQL` 任务和 `数据流` 任务。您可以修改此组以包含您经常使用的任务。本节详细介绍默认列表。该组方便地显示在控制流的
  `SSIS 工具箱`的最顶部。


  ### 数据流任务


  `数据流` 任务可以描述为 ETL 过程的核心与灵魂。此可执行文件包含从不同源提取数据的组件、可以在数据流中清理和修改数据的转换组件，以及可以提交数据目标组件。SSIS
  中的数据流称为管道。`数据流` 任务有自己的设计器窗口，因此您可以根据需要自定义该过程。我们将在第 7 章和第 8 章进一步讨论 `数据流` 任务及其所有组件。图
  5-2 显示了添加到控制流时该可执行文件的外观。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-112_1.jpg)


  *图 5-2. 数据流任务*


  此可执行文件的图标显示两个圆柱体，一个绿色箭头从其中一个指向另一个。第一个圆柱体代表数据的源，绿色箭头代表转换，第二个圆柱体代表数据的目标。图标可能暗示数据只能来自一个源，但
  `数据流` 任务可以同时从多个源提取数据。同样，它也支持同时将数据输出到多个目标。


  如前所述，此组件将在后面的章节中更详细地介绍。其部分属性包括：


  *   `DelayValidation` 将元数据的验证延迟到运行时。

  *   `Disable` 防止在运行时执行 `数据流` 任务。

  *   `MaximumErrorCount` 定义 `数据流` 任务可容忍的错误数量。

  *   `Description` 提供 `数据流` 任务的简短描述。

  *   `Name` 显示 `数据流` 任务的唯一名称。

  *   `DefaultBufferMaxRows` 定义缓冲区可以容纳的最大行数。此属性与 `DefaultBufferSize` 属性相辅相成。它们共同可以解决
  `数据流` 任务性能不佳的一些问题。

  *   `DefaultBufferSize` 定义 `数据流` 任务中缓冲区的大小（以字节为单位）。`数据流` 任务中的某些转换会创建现有缓冲区的副本。这将在第
  7 章和第 8 章中更详细地介绍。

  *   `RunInOptimizedMode` 通过不为未使用的列分配空间来优化数据流路径。即使此属性设置为 `True`，它仍会发出有关从数据流路径中移除列的警告。

  *   `TransactionOption` 允许您定义可执行文件是否支持事务。如果可执行文件由父项调用并且启用了事务，则该可执行文件将成为父事务的一部分。主要出于性能原因，我们建议您将此选项保留为默认设置。


  #### 执行 SQL 任务


  `执行 SQL` 任务允许您使用各种连接管理器针对 RDBMS 运行 SQL 语句或执行存储过程。`执行 SQL` 任务可以利用的连接管理器包括 `Excel
  连接管理器`、`OLE DB 连接管理器`、`ODBC 连接管理器`、`ADO 连接管理器`、`ADO.NET 连接管理器` 和 `SQL Server Compact
  Edition 连接管理器`。图 5-3 显示了在控制流中出现的该可执行文件。图标显示一个圆柱体，其右下角叠加着一个卷轴。圆柱体代表数据库系统，而卷轴代表脚本。在此特定情况下，脚本是
  SQL 脚本。


