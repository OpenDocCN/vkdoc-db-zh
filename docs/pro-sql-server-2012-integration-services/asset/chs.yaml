- "# 第 14 章 异构源和目标\n\n> 我们希望在不损害其独特底层能力的前提下，进一步消除异构架构和应用程序之间的摩擦。\n>\n> ——微软联合创始人 比尔·盖茨\n\
  \n数据集成工具的关键要素之一是处理不同源和目标的能力。`SQL Server Integration Services 2012`允许你从任何存储方法中提取数据，并将其加载到同样众多的数据存储系统中。`Integration\
  \ Services`提供的工具集真正试图实现比尔·盖茨概述的目标，即让各种系统能够很好地协同工作。如前几章所讨论的，数据完整性是集成项目成功的关键要素，而`SSIS`提供了转换和组件，使你能够处理不符合规范的数据。\n\
  \n数据存储以各种形式存在。这包括本身无法强制保证数据质量（例如数据类型或外键）的文本文件、其他`RDBMS`（包括`Oracle`或`DB2`）、`XML`文件、Web\
  \ 服务，甚至是`Active Directory`。所有这些系统都能以`SSIS`可以解析并集成到一个系统中的某种结构来保存数据。然而，目标并不仅限于`SQL\
  \ Server`。如果需求指明，数据也可以加载回原始形式。\n\n本章涵盖了`SSIS`可以访问的一些源和目标。本章在很大程度上依赖于第 4 章提供的信息作为基础，并在此基础上为你提供了可用于日常流程的示例。\n\
  \n### SQL Server 源和目标\n\n`SSIS`最容易处理的源和目标是`SQL Server`。从早期版本读取相对容易，但加载到早期版本可能需要一些数据转换来处理新的或已弃用的数据类型。正如我们在第\
  \ 4 章提到的，从`SQL Server`数据库提取数据的最有效方法是使用`SQL 命令`选项编写你自己的`SQL`语句。这是建议在`SQL Server`源组件上使用的选项，原因有几个。首要原因是它允许你将提取的列限制为你需要的那些。`Table\
  \ or View`选项使用的`SELECT *`表示法已被记录在案，在`SSIS`源组件中性能较差，并且可能由于`DDL`更改而导致元数据验证错误。指定必要的列将保持你的初始缓冲区精简。编写`SQL`的另一个原因是，你可以在`SQL`中定义数据类型，而不是在数据流中使用数据转换组件。`SQL\
  \ 查询`选项还允许你定义`ORDER BY`子句，如果你需要在数据流中使用`Merge Join`转换执行连接，这可以极大地提升性能。\n\n**注意：**\
  \ 如果你想查看源组件中`SELECT *`查询的性能，可以在运行`SQL profiler`的情况下执行一个数据包。你应该能够清晰地比较两种实现之间的差异。\n\
  \n如图 14-1 所示的源组件允许你定义提取集。为了将源组件添加到数据包中，你必须有一个`Data Flow Task`来添加它。我们选择利用`SQL 命令`选项从源中提取数据。尽管我们正在提取表中的所有列，但我们仍然枚举了所有列，而不是使用`*`选项。我们使用清单\
  \ 14-1 所示的查询作为我们的提取逻辑。使用`SQL 命令`的优势之一是能够对查询进行参数化。\n\n*清单 14-1. SQL Server 源查询*\n\
  \n```\nWITH CTE\nAS\n(\n    SELECT c.Alpha2\n        ,c.CountryName\n        ,c.Year\n\
  \        ,c.TLD\n    FROM dbo.Country c\n    WHERE c.Alpha2 = ?\n      AND c.Year\
  \ = ?\n)\nSELECT Alpha2\n    ,CountryName\n    ,Year\n    ,TLD\nFROM CTE\nWHERE\
  \ CountryName = ?\n;\n```\n\n公共表表达式（`CTE`）可用于源查询内部，以分解查询逻辑并使查询更具可读性。通过在查询中放置问号来限定参数。参数不仅可以用于通过`WHERE`子句限制行，还可以用于在查询中添加列。只要使用`OLE\
  \ DB Source Editor`中的`Parameters`按钮进行了适当的映射，参数可以添加到查询的不同部分。我们强烈建议你将参数彼此紧挨着放置，这样在必须映射它们时，就不会最终弄乱它们的顺序。提供的示例可能会变得混乱，因为`CTE`中有一些参数，而最终查询中还有另一个参数。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-487_1.jpg)\n\
  \n*图 14-1. OLE DB 源编辑器*\n\n`SQL Command Text`框右侧的按钮允许你通过以下方式修改查询：\n\n- `Parameters`\
  \ 允许你为查询中列出的参数分配映射。映射背后的命名约定取决于连接管理器的类型。连接管理器章节概述了所有映射规则。\n- `Build Query` 打开一个`GUI`，允许你构建`SQL`查询。\n\
  - `Browse` 允许你从文件导入文本作为查询。单击`OK`按钮后，将解析查询并验证元数据。\n- `Parse Query` 解析文本字段中提供的查询。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-488_1.jpg)\n\
  \n图 14-2 展示了可以将变量值分配给`SQL`语句中定义的参数的映射。数据类型可能因查询中上下文的类型而异。`Parameters`列对于分配值至关重要，因为它依赖于限定符在查询中出现的顺序。`Param\
  \ direction`列决定了是通过语句为变量赋值（`Output`），还是变量正在向语句传入一个值（`Input`）。由于源组件预期一个表格形式的结果集，`Input`是最可能使用的方向。这就是我们建议尽可能将参数集中放置的原因。\n\
  \n*图 14-2. 设置查询参数对话框*\n\n\n\n"
- '# 第 14 章 - 异构源和目标


  ### 高级属性编辑器


  源组件的一个重要组成部分是高级属性编辑器。“输入和输出属性”选项卡（如图 14-3 所示）尤其允许您调整提取的数据。运行时常见的一个错误是字符串截断错误。当列长度超过
  SSIS 分配的缓冲区时，通常会发生此错误。使用高级编辑器，您可以手动修改字符串列的长度，或数值列的精度和小数位数。


  另一个可以使用高级编辑器修改的关键属性是 `IsSorted` 属性。该属性通知 SSIS 即将到达的数据是已排序的。除非查询中包含 `ORDER BY` 子句，否则我们不建议修改此属性。在
  OLE DB 源输出级别设置该属性后，您可以修改 `ORDER BY` 子句中枚举列的 `SortKeyPosition` 属性。第一列应将该属性设置为 1，第二列设置为
  2，依此类推。如果有任何列被定义为按降序排序，则需使用其排序位置的负值来通知 SSIS。例如，如果 `ORDER BY` 子句中的第二列按降序排序，则 `SortKeyPosition`
  属性的适当值是 -2。


  **图 14-3. OLE DB 源的高级编辑器 — 输入和输出属性**


  > **提示：** 对于显式数据转换，我们建议在源查询中使用 `CAST()` 或 `CONVERT()` 函数。另一个选项是使用数据转换转换组件。


  ### 将数据加载到 SQL Server


  从 SQL Server 数据库提取数据后，通常希望将数据加载到另一个 SQL Server 数据库，甚至是同一数据库中。SSIS 为 SQL Server 数据库提供了目标组件。对于
  SQL Server 数据库，连接管理器几乎总是 OLE DB 连接管理器。加载数据时，该目标组件提供了根据所有可见列的元数据在数据库上创建表的能力。


  该组件甚至允许您预览目标表（即要加载数据的表）中已有的数据。图 14-4 显示了 OLE DB 目标编辑器及其允许的选项。


  **图 14-4. OLE DB 目标编辑器**


  目标编辑器上的按钮用于确保您为数据集使用了正确的目标。这些按钮执行以下功能：


  *   **新建表或视图** 根据传递到目标组件的元数据，生成用于创建对象的脚本。

  *   **查看现有数据** 打开一个对话框，显示指定为目标表中的 200 个样本行。

  *   **快速加载** 选项允许 SSIS 在行通过缓冲区时进行批量加载。**表或视图** 选项实际上为到达目标组件的每一行执行一条 `INSERT` 语句。**行批处理大小**
  和 **最大插入提交大小** 是可以在数据提交期间修改以提升性能的选项。


  > **注意：** 如果您单击 **表或视图名称** 下拉列表旁边的 **新建** 按钮，然后在包含 `CREATE TABLE` 脚本的模式窗口上单击 **确定**，Visual
  Studio 将尝试在数据库上创建表。这依赖于用户帐户拥有对数据库的适当权限。


  目标组件的另一个可用选项是能够执行 SQL 命令。此 SQL 语句将对通过管道的每一行执行。它可用于 `UPDATE` 或 `INSERT` 功能。根据数据量，可能有其他方法可以优化该数据的加载。


  目标组件的“映射”页面（如图 14-5 所示）显示输入列如何与 SQL 中的目标列匹配。此映射将左侧的输入列与右侧的目标表列配对。如果存在数据类型或定义不匹配，您可以选择修改映射以允许不同的列。在处理数据转换转换组件时，此页面特别方便。因为
  SSIS 尝试基于列名自动匹配，所以转换后的列通常不是那些被映射到目标列的列。


  **图 14-5. OLE DB 目标编辑器的映射页面**


  除了 OLE DB 目标外，SSIS 还提供了一个 SQL Server 特定的批量加载目标组件，即 SQL Server 目标。该组件将数据批量加载到表和视图中，但前提是它们位于执行包的同一台机器上。这是一个巨大的限制，因此在该目标的说明中，Microsoft
  建议改用 OLE DB 组件。该组件的编辑器与 OLE DB 目标非常相似，只是它除了连接管理器、要加载数据的表或视图以及映射页面外，不提供任何其他选项。


  ### 其他 RDBMS 源和目标


  对于 SQL Server 以外的其他关系数据库管理系统，Microsoft 提供了专门为提取数据而调整的驱动程序。对于 SSIS，这些其他系统的提供程序由 Attunity
  开发。（在早期版本中，Attunity 为 Oracle 连接提供驱动程序。）如图 14-6 所示的源助手为您提供有关如何获取默认不附带的连接提供程序的信息。对于其中一些提供程序，所有者可能会收取驱动程序使用费。


  **图 14-6. 异构源的提供程序**


  使用非 SQL Server 连接的一个陷阱是忘记确保提供程序能识别 SQL 方言。一些提供程序不识别语句终止符（`;`），而其他提供程序则解析提供的查询时，会将其视为单行代码，即使文本编辑器显示了换行和格式。在第二种情况下，您必须注意如何注释掉代码行。您将必须使用多行注释而不是单行注释。


  当使用不同的存储系统作为数据源时，我们建议在源组件后立即使用数据转换转换组件。这将允许您使用 Union All 转换和其他转换，而不必担心数据集之间的数据类型不匹配。


  ### 平面文件源和目标


  平面文件通常作为数据转储的输出过程生成。这些平面文件可用作数据存储，但它们缺乏关系数据库管理系统提供的许多优势。然而，保留平面文件的一个吸引力在于安全性不一定像数据库系统那样严格。它们可以提供对数据的快速访问，而不会对托管数据库系统中的数据的服务器产生影响。平面文件的缺点是它们不能被查询，无法维护数据完整性，并且不存在数据质量维护措施。如果存在此类系统，所有这些优势都必须在作为平面文件来源的数据库系统上强制执行。




  '
- "# 平面文件源与目标\n\n使用平面文件作为源需要平面文件连接管理器。该连接管理器在第四章中有详细讨论。利用连接管理器中定义的属性，源组件获取提取数据所需的所有元数据。图\
  \ 14-7 显示了平面文件源编辑器中的可用选项。该编辑器同样利用连接管理器的配置来收集列信息。如第四章所述，平面文件连接管理器存储诸如列和行分隔符、列名、列数据类型信息以及有关文件和数据的其他信息。“预览”按钮显示使用连接管理器中定义的配置读取的行的样本。“将源中的空值保留为数据流中的空值”选项将在管道中保留空值。“列”页面从连接管理器获取其所有信息。\n\
  \n![Figure 14-7. Flat File Source Editor](img/index-494_1.jpg)\n\n另一方面，平面文件目标的操作方向相反。如果平面文件本身不存在，您将必须添加一个新的平面文件连接管理器来配置输出文件。\n\
  \n图 14-8 显示了平面文件目标编辑器以及它如何修改连接管理器。“新建”按钮将创建一个新的平面文件连接管理器。这将自动打开一个对话框“平面文件格式”，如图\
  \ 14-9 所示。利用此对话框中选择的选项，连接管理器大部分会自动配置，因为它从位于数据流管道末端获得信息。然而，“更新”按钮强制您直接修改连接管理器，而不是通过元数据导入配置。“映射”页面只是简单地将管道中的列映射到连接管理器中定义的列。\n\
  \n![Figure 14-8. Flat File Destination Editor](img/index-495_1.jpg)\n\n“平面文件格式”选项允许您定义平面文件的布局。每个选项在第四章的平面文件连接管理器部分都有介绍。所有非分隔符选项的信息由管道中存储的元数据提供。\n\
  \n![Figure 14-9. Flat File Format dialog box](img/index-496_1.jpg)\n\n### Excel\
  \ 源与目标\n\nMicrosoft Excel 的吸引力源于其工作表与数据库表的相似性。业务用户欣赏 Excel 能够快速显示和修改表格信息的能力。在后端，Excel\
  \ 使用 Jet 引擎，这与 Microsoft Access 使用的引擎相同。这允许 SSIS 在电子表格上执行某些类似 SQL 的命令。Jet 引擎的 SQL\
  \ 解释远不如 SQL Server 的先进，但它确实有一些可以用于 ETL 过程的基本元素。\n\n> **注意：** `Jet` 引擎目前没有 64 位提供程序。当您尝试使用\
  \ SSIS 操作电子表格时，这可能会导致一些问题。\n\nExcel 源组件与平面文件源组件类似，区别在于对连接管理器的依赖。Excel 文件的连接管理器仅定义其位置的文件夹路径。图\
  \ 14-10 显示了 Excel 源组件的编辑器。“连接管理器”页面允许您选择指向 Excel 文件及其内特定工作表的连接管理器，或者提供一个 SQL 查询，该查询将连接不同的工作表以返回所需数据。`Jet`\
  \ 引擎在连接上的数据类型匹配或数据中的空值处理方面，不允许其他关系数据库管理系统（`RDBMS`）所允许的宽松度。\n\n![Figure 14-10. Excel\
  \ Source Editor—SQL command textbox](img/index-497_1.jpg)\n\n清单 14-2 提供了用于从特定工作表中提取所需列的查询。\n\
  \n此查询与在 `OLE DB` 源组件中使用 `SQL Command` 选项具有相同的优点，即在数据流开始时，缓冲区仅限于这四个列。图 14-11 显示了“列”页面，该页面允许您选择希望传递到数据流中的列。这两种方法之间的区别在于，通过使用“表或视图”选项，您会拉取所有可用列，然后在\
  \ `SSIS` 已经处理了不需要的列之后再对其进行修剪。\n\n**清单 14-2. Excel 源 SQL 命令**\n\n```sql\nSELECT Abbreviation,\n\
  \    Capital,\n    Flag,\n    Lat\nFROM [Sheet1$]\n```\n\n![Figure 14-11. Columns\
  \ page of the Excel Source Editor](img/index-498_1.jpg)\n\n将数据加载到 Excel 电子表格的难点之一是清除工作表（表/视图）中已存在的行。默认情况下，`SSIS`\
