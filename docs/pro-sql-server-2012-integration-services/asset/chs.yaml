  至此，我们结束了对 SSIS 中脚本的讨论。在本章中，我们讨论了位于控制流中的`脚本任务`，以及灵活的、可在数据流中充当多种用途的`脚本组件`。`脚本组件`可以充当数据流源、转换或目标，使你能够充分利用
  VB 或 C#的.NET 脚本功能，为你的包增添超越内置组件的强大处理能力。下一章将介绍 SSIS 错误和事件处理。


