  #### 执行包任务


  最灵活的 ETL 设计模式之一是使用一个包来调用其他包。这种设计需要使用 `执行包任务`，这是一个可执行组件，允许一个包在执行过程中调用另一个包。原始包的变量可以被被调用的包访问。原始包还可以传递任何可访问它的参数。图
  5-20 显示了控制流中的这个组件。其图标是一个带有蓝色方块的文件——三个在文件上，一个在文件外。三个蓝色方块代表文件本身包含的可执行文件，文件外的一个方块表示可以访问当前包之外的可执行文件。


  **图 5-20. 执行包任务**


  ##### 执行包任务编辑器 — 包页面


  执行包任务编辑器的“包”页面允许你指定包的位置和名称。可以通过访问当前包所属的项目来指示包的位置。这将使用当前项目中包含的所有包来填充 `PackageNameFromProjectReference`
  列表。图 5-21 显示了该任务利用项目引用包的情况。这种 ETL 设计模式被称为 `父子设计`。我们将在第 16 章更详细地介绍它。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-136_1.jpg)


  **图 5-21. 执行包任务编辑器 — 包页面**


  根据所需的 `ReferenceType`，出现在“包”页面上的属性会有所不同，但 `ExecuteOutOfProcess` 和 `Password` 除外。属性如下：


  -   `ReferenceType` 允许你选择包的位置。`Project Reference` 表示子包作为对象存在于当前项目中。`External Reference`
  允许你访问文件系统或 SQL Server 上的包。

  -   `PackageNameFromProjectReference` 列出当前项目中包含的所有包。此属性仅适用于 `Project Reference`
  类型。

  -   `Password` 是用于加密子包的密码。尽管在图 5-21 中看起来有密码，但包并未加密。默认情况下，SSIS 会填写此字段。点击该字段会打开一个对话框，要求你指定并验证密码。

  -   `ExecuteOutOfProcess` 指定该包可以作为一个新的 Windows 进程执行。

  -   `Location` 定义包存在于文件系统还是 SQL Server 上。此属性仅适用于 `External Reference` 类型。




  “连接”指定用于访问包的连接管理器。对于文件系统位置，该连接会列出包中定义的所有文件连接管理器。SQL Server 位置则列出包中创建的所有 `OLE DB
  连接管理器`。


  `PackageName` 仅对存储在 SQL Server 上的包显示。它会打开一个对话框，允许您选择服务器上存在的某个包。


  `PackageNameReadOnly` 从用于连接到包的文件连接管理器导入值。


  ##### 执行包任务编辑器 — 参数绑定页面


  为支持新的部署模型，允许在父包和子包之间传递参数。图 5-22 显示了 `参数绑定` 页面，您可以在该页面指定要传递给子包的参数。`添加` 按钮向任务添加绑定。父包将连接到指定的包并读入所有已定义的参数。对于图
  5-22 中的示例，我们在 `ChildPackage.dtsx` 中创建了两个参数：`ParentCreatorName` 和 `ParentStartTime`。


  可以在 `参数和变量` 窗口中添加参数。与变量类似，您必须为参数指定名称和数据类型。参数不具备像变量那样的命名空间。


  这是此版本 SSIS 新增的功能。在之前的版本中，必须向子包添加配置才能以引用方式传递变量值。使用参数，您无需向子包添加显式配置即可将值从父包传递给子包。参数是子包执行的一部分。这在将包部署到不同环境且每个环境需要一组不同的变量值或连接管理器的连接字符串时非常有用。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-138_1.jpg)


  **图 5-22.** `执行包任务编辑器参数绑定` 页面


