  这个简单项目文件的一部分包含了开发和使用 SSIS ETL 过程的所有基本要素。正如您可能猜到的，这些信息以可扩展标记语言 (XML) 的形式存储。这使得通过直接编辑
  XML 来修改项目成为可能。


  我们想重点强调以下几个关键标签/属性（更多细节将在后续章节中讨论）：


  `ProtectionLevel` 允许您保护敏感信息，例如凭据。此属性可以在项目级别以及包级别设置。但是，两者的设置应保持一致。在构建项目时，项目中的所有包都需要设置与项目文件相同的保护级别。我们将在第
  19 章更详细地讨论此属性。


  `Packages` 包含与项目关联的所有包。复制并粘贴此标签，并将名称修改为工作目录中存在的某个包，将强制将该包添加到项目中。在 Visual Studio
  中打开项目时，该包将列在“包”文件夹中。直接修改项目文件有时可以避免创建整洁文件名的麻烦，而不是使用 Visual Studio 向导来添加现有包。


  `Parameters` 可以在运行时用于设置包中的值。此属性允许包中的某些组件更改值。最显著的应用是在 OLE DB 源组件中，它可以对 SQL 语句进行参数化。对包进行参数化将在第
  16 章更详细地介绍。


  `Configuration` 决定您是构建还是部署项目。默认情况下，该属性设置为构建项目。根据每个配置的目的，您创建的不同配置可以使用不同的设置。项目设置中的配置管理器允许您创建不同的配置。


  `OutputPath` 设置将为项目构建的对象的文件夹路径。默认情况下，它设置为 bin 目录。当需要创建部署实用程序时，可以定义不同的路径。在 2005 和
  2008 版本中，创建部署实用程序使用了默认的文件夹路径 `bin\Deployment`。


  #### 工具窗口


  BIDS 环境提供了将所有组件组织成易于查找部分的工具。首先，开始页面包含一些重要的参考项目。“最近的项目”面板包含一些已打开项目的历史记录。此面板底部是打开现有项目的链接以及创建
  BIDS 项目和其他 Visual Studio 项目的链接。“入门”窗格包含指向 BOL（联机丛书）主题的链接，这些主题可以帮助开发人员学习工具集。如果安装了
  Team Foundation Server 团队资源管理器实用程序，则会提供“源代码管理”页面。此页面允许开发人员快速访问分配给他/她的项目，并使用存储在存储库中的特定版本刷新代码副本。


  BIDS 中的工具窗口有助于开发，如图 2-8 所示。中间部分是 SSIS 包的实际设计器。设计器的一个附加功能是缩放工具，当它不活动时是透明的，但当鼠标悬停在其上时，它会变为不透明。缩放比例下方是一个“缩放到适应”按钮，该按钮将自动确定最佳缩放级别以显示内容，同时保持当前布局。


  设计器下方是连接管理器。这些是 ETL 过程的数据源和目标。它们包含连接信息，例如服务器名称、数据库名称，并且根据定义的保护级别，还包含安全凭据。可能需要某些驱动程序才能创建连接。默认情况下仅附带某些驱动程序。其他驱动程序可以从
  Microsoft 获取。大多数驱动程序可从 Microsoft 免费下载；其他公司可能会收费。使用或命名连接管理器时应遵循某些惯例；我们将在本书的第二部分讨论它们。


  **注意：** 如果 BIDS 工具安装在 32 位操作系统上，则只会安装 32 位版本的驱动程序。在 64 位操作系统上，将同时安装 32 位和 64 位工具。同样重要的是要注意，并非所有
  32 位工具在 64 位环境下都可用。Microsoft OLE DB Provider for Jet（Office Access 和 Excel 引擎）和
  SQL Server Compact Provider（SQL Server Compact）在 64 位环境中不可用。在 64 位环境中，Visual Studio
  中包的默认执行使用 64 位工具。如果这些工具不可用，包可能会挂起或失败。`Run64BitRuntime` 项目属性控制此执行。当设置为 True 时，与项目关联的所有包都将以
  64 位模式运行。设置为 False 则导致 32 位执行。


  ![](img/index-26_1.jpg)


  *图 2-8. SSIS 2012 的工具窗口*


  #### 设计器窗口


  设计器顶部的选项卡显示了 ETL 过程的控件。控制流由三种不同类型的组件组成：可以将任务逻辑分组在一起的容器、用于满足包功能需求的任务，以及控制可执行文件、容器和任务之间流程顺序的优先级约束。我们将在第
  5 章和第 6 章详细介绍控制流。


  “数据流”选项卡是允许开发人员控制实际数据处理的设计器。数据流任务是将数据从源移动到目标的组件，同时允许在传输过程中进行转换。


  “事件处理程序”选项卡允许根据触发的运行时事件（如 OnError、OnExecStatusChanged 等）来设计操作。这些触发器可以附加到包中的所有可执行文件和任务。我们将在第
  10 章深入介绍事件处理。


  “包资源管理器”选项卡提供对整个包的快速浏览。它以树状视图显示包的所有内容，如前面的图 2-8 所示。如图所示，变量出现在不同的位置；这是由于变量定义的范围所致。变量将在第
  11 章讨论。


  关于变量新增的功能之一是添加了一个变量属性 `RaiseChangedEvent`。这允许特定的更改标准触发事件，这些事件可以被事件处理程序捕获。它还允许 SSIS
  日志记录通过您使用的日志提供程序捕获此事件。图 2-9 显示了包中对象的树状图视图。


  **注意：** 在开发 SSIS 包时，焦点的概念起着重要作用。焦点基本上意味着当前选择了哪个组件。在创建变量时，记住这一点至关重要。如果在创建变量时意外选择了某个容器或可执行文件，则会将该变量限制在该特定对象内。BIDS
  允许您在作用域之间“移动”变量。然而，Visual Studio 所做的只是在新作用域中创建一个新变量，其名称是原始变量的名称后附加一个 1，然后 Visual
  Studio 会删除原始变量。


  ![](img/index-27_1.jpg)


  *图 2-9. 包资源管理器*


  在包执行期间，“进度”选项卡会出现在“包资源管理器”选项卡的右侧。




  此选项卡会持续更新，显示执行过程的当前状态，直至最终以成功或失败结束。该选项卡将显示当前正在运行的执行程序、查找组件已缓存的行数等信息。它还会捕获执行前处理以及执行后处理的进度。执行完成后，它会将自身重命名为“执行结果”选项卡。


  “执行结果”选项卡包含的内容与“进度”选项卡最末端的内容相同。其中存储的最关键信息之一就是提交到目标的行数。


  在设计器窗口的右上角有两个按钮。它们是“参数和变量”窗口窗格以及“SSIS 工具箱”窗口窗格的快捷方式。当需要快速查看参数、变量以及当前上下文可用的工具时，这些按钮非常方便。


  #### 解析引用


  数据流的一项令人兴奋的新功能是**解析引用**实用工具。通过在数据流中两个组件之间的路径上右键单击并选择“解析引用”即可使用。这是一个强大的工具，因为它允许在
  Excel 电子表格中生成和维护映射关系，然后只需将其添加为源与目标输入之间的映射即可。这相比之前版本的“恢复无效列引用编辑器”是一个巨大的改进，后者在使用时常常让开发人员感到担忧。图
  2-10 展示了在 Visual Studio 中出现的“解析引用”实用工具。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-28_1.jpg)


  ##### 图 2-10. 解析引用实用工具


  由于 DDL 更改或源/目标更改，此工具可以快速更新元数据。它的实用性在于能够一次性查看流水线中的所有列，而不是像以前那样在下拉列表中一次查看一个列映射。在该实用工具的“映射列”窗格中，按钮从左到右执行以下功能：


  - `自动映射列` 会尝试根据名称最佳匹配源中的列和目标中的列。此功能在 SSIS 的先前版本中已存在，通常在目标组件中生成映射。

  - `插入单元格` 允许您错开当前的映射，而不会丢失当前存在的所有已映射列。它会将所选单元格（无论在“源”列还是“目标”列）下方的单元格向下移动。

  - `插入行` 插入整行，以便可以构建全新的映射。如同集合理论一样，顺序并不重要。映射呈现的顺序无关紧要，只要映射存在即可。

  - `删除单元格` 将单元格向上移动至当前高亮显示的单元格。此操作可用于将映射从其正确位置移开。

  - `删除行` 删除整行不需要的映射。使用此选项移除列映射——例如，如果自动映射功能在不相关的列之间建立了关联。

  - `消除空白行` 删除所有不包含映射关系两侧（源和目标）的行。如果某一行有“源列”或“目标列”已填充，则不会删除该行。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  - `将映射复制到剪贴板` 以 Excel 格式复制整个映射表的内容。这可用于将映射存储在电子表格中用于文档目的。

  - `从剪贴板粘贴` 将剪贴板的内容粘贴到实用工具中。它允许您粘贴元数据中不存在的列，但在网格填充后，它将验证映射。如果列不存在，窗格底部会出现错误消息，提示您指定的列不存在。此外，粘贴操作始终会附加到现有的映射；如果映射已存在于表中，则无法覆盖它。使用此按钮的唯一先决条件是确保剪贴板中只有两列。

  - `清除所有映射` 清除映射表的内容，并将列移回它们各自的窗格，即“未映射的输出列”和“未映射的输入列”。


  **注意：** 如果从数据流的源中移除了列，当下游组件在其映射中仍在使用该列时，系统仍会识别为该列存在于上游流水线中。待依赖关系移除后，该列才会从流水线中移除。


  为了保持包的组织性和可读性，一个名为“格式”的菜单项允许您根据需要排列控制流和数据流的元素。对于简单的流，自动布局应足以使包显得美观。对于更复杂的包，还有选项可以对齐组件、调整它们之间的距离以及使它们大小相同。


  对于这些选项，在应用这些更改之前，需要先选择要应用格式的组件。首先选择的组件将成为其余组件的参考。例如，其他组件的对齐方式将相对于第一个选定的组件来确定。


  #### SSIS 工具箱


  设计器窗口的左侧是 SSIS 工具箱。这是对先前 BIDS 版本的名称更改，之前仅称为“工具箱”。Visual Studio 中仍然存在一个“工具箱”，但它不包含任何用于
  SSIS 设计器的组件。SSIS 工具箱会变化，仅显示与设计器当前视图相关的组件。


  在 SSIS 工具箱的底部，有一个对所选组件的简要描述，对初次开发的开发人员很有帮助。右键单击该描述会显示“显示类型信息”选项。此选项提供有关所选工具的详细信息，例如程序集名称和.dll
  的位置。除了此描述外，还有两个参考点：该部分右上角的“帮助”按钮和“查找示例”超链接，后者会带您到 CodePlex 并预填搜索条件。


  SSIS 工具箱的组织方式与先前版本完全不同。控制流组件的新组织方式分为四组：收藏夹、常用、容器和其他任务。默认情况下，收藏夹包含 SSIS 领域的核心任务，即“数据流任务”和“执行
  SQL 任务”。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-30_1.jpg)


  **提示：** 默认情况下，SSIS 12 有其自己的组件分组，但此分组可以根据您的需要进行更改。可以通过右键单击任务并将其移动到所需的分组来将其移至其他分组。容器是例外；它们只能移动到收藏夹或常用分组。


  数据流的 SSIS 工具箱的组织方式与控制流类似。组件分为几类：收藏夹、常用、其他转换、其他源和其他目标。与控制流任务一样，此分组在某种程度上可以根据个人喜好进行修改。数据流的默认收藏夹对于
  SSIS 是新的：目标助手和源助手。这些助手根据存储类型组织包中定义的连接管理器，如图 2-11 所示。默认情况下，它们只显示机器上安装了驱动程序的数据存储应用程序。如果所需的应用程序不存在，可以使用助手创建新的连接管理器。


  ##### 图 2-11. 目标助手


  #### 包代码视图




  SSIS 包背后的实际代码存储为基于 XML 的`.dtsx`文件。通过在文本编辑器中打开包文件，或在包打开时点击`Visual Studio`中的`View`菜单并选择`View
  Code`，即可查看此 XML。`SQL Server 2008`和`SQL Server 12`中`.dtsx`文件所包含的 XML 差异巨大。每个标签的属性都位于新行上，使得代码更易于人类阅读。此特性也使得这些包可以通过`diff
  工具`进行修改。在`TFS`中，`Compare Files`工具现在成为一个可行的选项，用于识别包版本之间的差异。这也使得`TFS`中的`Merge`工具更易于操作，以合并两个版本的包。


