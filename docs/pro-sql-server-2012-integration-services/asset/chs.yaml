  **图 8-39. 透视转换编辑器**


  > **注意：** `透视`转换要求输入数据已排序，否则可能产生不正确的结果。与其他需要排序输入数据的转换不同，`透视`转换并不强制执行此要求。请确保您输入到`透视`转换的数据是已排序的。


  #### 百分比采样转换


  `百分比采样`转换从输入中选取给定百分比的采样行来生成样本数据集。此转换实际上将您的输入数据分成两个独立的


