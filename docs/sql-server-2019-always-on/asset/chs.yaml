  \ |\n| `availability_replica_automatic_failover_validation` | 当故障转移验证副本作为主副本的就绪状态时触发\
  \ |\n| `availability_replica_database_fault_reporting` | 当数据库向可用性副本管理器报告故障时触发 |\n\
