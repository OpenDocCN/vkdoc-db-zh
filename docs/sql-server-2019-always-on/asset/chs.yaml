  \ | 当只读路由操作成功完成时触发 |\n| `read_only_route_fail` | 当只读路由操作失败时触发 |\n\n\n\n#### 目标\n\
  \n目标是事件的消费者；本质上，它是跟踪数据将被写入的设备。SQL Server 2016 中可用的目标详见表 9-3。\n\n**表 9-3**\n目标\n\n\
  | 目标 | 同步/异步 | 描述 |\n| --- | --- | --- |\n| 事件计数器 | 同步 | 统计会话期间发生的事件数量 |\n| 事件文件\
  \ | 异步 | 将事件输出写入内存缓冲区，然后刷新到磁盘 |\n| 事件配对 | 异步 | 确定一个配对事件是否在其匹配事件缺失的情况下发生，例如，一个语句开始但从未完成\
  \ |\n| ETW (Windows 事件跟踪) | 同步 | 用于将扩展事件与操作系统数据关联 |\n| 直方图 | 异步 | 根据操作或事件列，统计会话期间发生的事件数量\
  \ |\n| 环形缓冲区 | 异步 | 使用先进先出（FIFO）方法将数据存储在内存缓冲区中 |\n\n#### 操作\n\n也称为全局字段，操作是当事件触发时允许捕获附加信息的命令。操作在事件发生时同步触发，且事件并不知晓操作的存在。共有\
  \ 50 个可用操作，允许你捕获丰富的信息，包括导致事件触发的语句、语句运行的安全上下文、事务 ID、CPU ID 以及调用堆栈。\n\n#### 谓词\n\n\
  谓词是系统在将事件发送到目标之前可以应用的过滤条件。可以创建简单的谓词，例如根据数据库 ID 过滤完成的语句，但也可以创建更复杂的谓词，例如仅捕获 AlwaysOn\
  \ 可用性组副本的角色变更，且该变更发生超过两次的情况。\n\n谓词还完全支持短路求值。这意味着如果你在一个谓词中使用多个条件，那么谓词的顺序很重要，因为如果第一个谓词的求值失败，第二个谓词将不会被求值。由于谓词是同步求值的，这可能会影响性能。因此，明智的做法是设计你的谓词，将最不可能求值为\
  \ true 的谓词放在非常可能求值为 true 的谓词之前。\n\n例如，假设你计划基于特定数据库（数据库 ID 为 `6`）进行过滤，但该数据库在实例活动中占比很高。你还计划基于特定用户\
  \ ID（`UserA`）进行过滤，该用户负责的活动占比很低。在此场景中，你会使用以下谓词，首先过滤掉与 `UserA` 无关的活动，然后再过滤掉与数据库 ID\
  \ `6` 无关的活动。\n\n```\nWHERE (([sqlserver].[username]='UserA') AND ([sqlserver].[database_id]=(6)))\n\
  ```\n\n#### 类型\n\n包中的所有对象都被分配了一个类型。此类型用于解释存储在对象字节集合中的数据。对象被分配为以下类型之一：\n\n*   操作\n\
  *   事件\n*   谓词比较（从事件中检索数据）\n*   谓词源（比较数据类型）\n*   目标\n*   类型\n\n#### 映射\n\n映射是一种字典，它将内部\
  \ ID 值映射为数据库管理员可以理解的字符串。映射键仅在其上下文中唯一，并在不同上下文之间重复。例如，在 `statement_recompile_cause`\
  \ 上下文中，`map_key` 为 1 对应于 `map_value` 为 `Schema Changed`。然而，在 `database_sql_statement`\
  \ 类型的上下文中，`map_key` 为 1 对应于 `map_value` 为 `CREATE DATABASE`。你可以使用 `sys.dm_xe_map_values`\
  \ 动态管理视图查找完整的映射列表。\n\n#### 会话\n\n会话本质上是一个跟踪。它可以包含来自多个包、操作、目标和谓词的事件。当你启动或停止会话时，就是在打开或关闭跟踪。当会话启动时，事件被写入内存缓冲区，并在发送到目标之前应用谓词。因此，在创建会话时，你需要配置属性，例如会话可用于缓冲的内存量、在会话遇到内存压力时可以丢弃哪些事件，以及事件发送到目标之前的最大延迟。\n\
  \n\n\n### 创建事件会话以监控可用性组\n\n你可以使用新建会话向导、新建会话对话框或通过 T-SQL 来创建事件会话。若要使用新建会话向导创建会话，请在对象资源管理器中依次展开\
  \ `Management` ➤ `Extended Events`，然后从 `Sessions` 的上下文菜单中选择 `新建会话向导`。这将显示新建会话向导的“简介”页面。\n\
  \n### 设置会话属性页面\n\n通过“简介”页面后，你将看到“设置会话属性”页面，如图 9-5 所示。在此处，你可以配置会话的名称，并指定会话是否应在创建时自动启动。\n\
  \n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig5_HTML.jpg](img/394392_3_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5：设置属性页面\n\n### 选择模板页面\n\n在向导的“选择模板”页面（如图 9-6 所示）上，你可以选择预定义的模板（这将为你提供常用会话的起点），也可以从空白画布开始手动定义整个会话。我们将选择后者。\n\
  \n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig6_HTML.jpg](img/394392_3_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6：选择模板页面\n\n### 选择要捕获的事件页面\n\n图 9-7 展示了“选择要捕获的事件”页面。在这里，我们可以选择要包含在会话中的事件。为了本次演示的目的，假设我们经常看到辅助副本落后于主副本，并且我们正在尝试确定原因。具体来说，是否存在\
  \ I/O 瓶颈？由于我们试图回答一个非常具体的问题，因此要选择的事件就很明确了。我们需要 `hadr_db_marked_for_reseed` 事件来确定辅助副本何时落后，还需要\
  \ `long_io_detected` 事件，以便我们可以关联时间点，看看是否存在某种模式。\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig7_HTML.jpg](img/394392_3_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7：选择要捕获的事件页面\n\n### 捕获全局字段页面\n\n“捕获全局字段”页面允许我们指定希望捕获的任何操作。在我们的场景中，我们将捕获 `NT\
  \ 用户名` 和 `SQL 文本` 操作。这将使我们能够追溯任何长时间的 I/O 操作，以查看它们是否由低效的查询引起。“捕获全局字段”页面如图 9-8 所示。\n\
  \n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig8_HTML.jpg](img/394392_3_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8：捕获全局字段页面\n\n### 设置会话事件筛选器页面\n\n“设置会话事件筛选器”页面（如图 9-9 所示）允许你为会话配置谓词。我们将配置一个筛选系统数据库上操作的谓词。\n\
  \n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig9_HTML.jpg](img/394392_3_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9：设置会话事件筛选器页面\n\n### 指定会话数据存储页面\n\n向导的“指定会话数据存储”页面是我们可以配置目标的位置。向导提供了 `文件`\
  \ 或 `环形缓冲区` 目标的选项，以及指定大小和回滚选项。我们将配置 `文件` 目标，如图 9-10 所示。\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig10_HTML.jpg](img/394392_3_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10：指定会话数据存储\n\n### 摘要与完成\n\n向导的“摘要”页面将确认向导将执行的操作。创建会话后，“完成”页面将提供退出时查看实时数据的选项。\n\
  \n### 通过 T-SQL 创建相同的会话\n\n若要使用 T-SQL 创建相同的会话，你可以使用清单 9-1 中的脚本。\n\n```\nCREATE EVENT\
  \ SESSION AlwaysOnTrace ON SERVER\nADD EVENT sqlserver.hadr_db_marked_for_reseed(\n\
  \    ACTION(sqlserver.nt_username,sqlserver.sql_text)\n    WHERE (sqlserver.database_id>(4))),\n\
  ADD EVENT sqlserver.long_io_detected(\n    ACTION(sqlserver.nt_username,sqlserver.sql_text)\n\
  \    WHERE (sqlserver.database_id>(4)))\nADD TARGET package0.event_file(SET filename='C:\\\
  MSSQL\\ASlwaysOnTrace.xel')\nWITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
  \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)\
  \ ;\n```\n\n清单 9-1：创建事件会话\n\n### CREATE EVENT SESSION 参数\n\n`CREATE EVENT SESSION`\
  \ DDL 语句接受表 9-4 中详述的参数。\n\n表 9-4：CREATE EVENT SESSION 参数\n\n| 参数 | 描述 |\n| --- |\
  \ --- |\n| `event_session_name` | 指定你正在创建的事件会话的名称 |\n| `ADD EVENT` / `SET` | 为添加到会话的每个事件重复此操作，后跟事件名称，格式为\
  \ `package.event`。你可以使用 `SET` 语句设置事件特定的自定义，例如包含非强制性事件字段 |\n| `ACTION` | 如果需要为该事件捕获全局字段，则在每个\
  \ `ADD EVENT` 参数后指定 |\n| `WHERE` | 如果该事件应有关联的谓词，则在每个 `ADD EVENT` 参数后指定 |\n| `ADD\
  \ TARGET` / `SET` | 为将添加到会话的每个目标指定。你可以使用 `SET` 语句来填充目标特定的参数，例如 `event_file` 目标的\
  \ `filename` 参数 |\n\n### CREATE EVENT SESSION WITH 选项\n\n`CREATE EVENT SESSION`\
  \ 语句还接受许多 `WITH` 选项，这些选项在表 9-5 中有详细说明。\n\n表 9-5：CREATE EVENT SESSION WITH 选项\n\n\
  | WITH 选项 | 描述 |\n| --- | --- |\n| `MAX_MEMORY` | 指定事件会话在将事件分派到目标之前可用于缓冲事件的最大内存量\
  \ |\n| `EVENT_RETENTION_MODE` | 指定缓冲区变满时的行为。可接受的值包括：`ALLOW_SINGLE_EVENT_LOSS`，表示如果所有缓冲区已满，则可能丢失单个事件；`ALLOW_MULTIPLE_EVENT_LOSS`，表示如果所有缓冲区已满，则可能丢失整个缓冲区；`NO_EVENT_LOSS`，表示导致事件触发的任务将等待，直到缓冲区中有空间\
  \ |\n| `MAX_DISPATCH_LATENCY` | 指定事件在刷新到目标之前可以在会话缓冲区中驻留的最长时间，以秒为单位 |\n| `MAX_EVENT_SIZE`\
  \ | 指定来自任何单个事件的事件数据的最大可能大小。可以千字节或兆字节为单位指定，且应仅配置为允许大于 `MAX_MEMORY` 设置的事件 |\n| `MEMORY_PARTITION_MODE`\
  \ | 指定事件缓冲区的创建位置。可接受的值包括：`NONE` – 表示将在实例内创建缓冲区；`PER_NODE` – 表示将为每个 NUMA 节点创建缓冲区；`PER_CPU`\
  \ – 表示将为每个 CPU 创建缓冲区 |\n| `TRACK_CAUSALITY` | 指定将为每个事件存储一个额外的 GUID 和序列号，以便可以关联事件\
  \ |\n| `STARTUP_STATE` | 指定会话是否在实例启动时自动启动。`ON` 表示启动；`OFF` 表示不启动 |\n\n**提示**  \n\
  关于扩展事件的更深入讨论，我强烈推荐 Apress 出版的书籍《*Pro SQL Server 2019 Administration*》，可从 [`www.apress.com/gp/book/9781484250884`](http://www.apress.com/gp/book/9781484250884)\
  \ 购买。\n\n\n\n## 概述\n\nSQL Server 为监控 AlwaysOn 可用性组的运行状况提供了丰富的工具。AlwaysOn 仪表板是 SQL\
  \ Server Management Studio 中的一个交互式报告，它可以让您评估可用性组和副本的运行状况。它还提供了查看仲裁配置信息和实时运行状况数据的链接。\n\
  \n实时运行状况数据由扩展事件会话捕获，该会话在您在实例上创建第一个可用性组时创建，并在后台运行，捕获预先配置的事件。可以自定义此跟踪；如果您需要自定义捕获，我建议保留默认配置并创建一个新的事件会话。\n\
  \n创建事件会话允许您根据需求捕获非常细粒度的关注点，或者仅捕获较粗粒度的信息。扩展事件使用 WMI 实现，是一个非常轻量级的框架，这意味着您可以在不影响实例性能的情况下识别问题和趋势。\n\
  \n# 10. 故障排除 AlwaysOn\n\nSQL Server 提供了大量与高可用性和灾难恢复对象相关的元数据，尤其是围绕 AlwaysOn 功能集。这些元数据可用于快速识别配置、查找问题的根本原因，或为可能发生的事件编写自动化响应脚本。以下部分将讨论可用的元数据，并提供如何使用它的示例。\n\
  \n## AlwaysOn 故障转移群集实例元数据\n\n从数据库引擎内部，可以查看有关群集实例及其承载它的 Windows 群集的大量元数据。这些信息对 DBA\
  \ 来说非常有价值。以下部分将介绍一些最有用和最有趣的元数据对象。\n\n### 发现实例所在的节点\n\nDBA 自然需要知道群集中哪个节点承载着故障转移群集实例，尤其是在尝试诊断连接或性能问题时。但是，如果贵组织有策略规定\
  \ DBA 不允许访问操作系统，则无法使用故障转移管理器。幸运的是，SQL Server 中有一个 DMV（动态管理视图）可以公开此信息。`sys.dm_os_cluster_nodes`\
  \ DMV 将返回表 10-1 中详述的列。\n\n表 10-1\n`sys.dm_os_cluster_nodes` 的列\n\n| 列 | 描述 |\n|\
  \ --- | --- |\n| `NodeName` | 群集节点的名称 |\n| `status` | 节点的当前状态。可能的值有：• 0 – 表示节点已启动• 1\
  \ – 表示节点已关闭• 2 – 表示节点已暂停• 3 – 表示节点当前正在加入群集• 4 – 表示状态未知 |\n| `status_description`\
  \ | 状态的文字描述。可能的值有：• 已启动• 已关闭• 已暂停• 正在加入• 未知 |\n| `is_current_owner` | 指示实例当前是否由此节点承载。可能的值有：• 0\
  \ – 表示节点不拥有该实例• 1 – 表示节点拥有该实例 |\n\n清单 10-1 中的查询将返回当前承载实例的群集节点的名称。\n\n```sql\nSELECT\
  \ NodeName\nFROM sys.dm_os_cluster_nodes\nWHERE is_current_owner = 1 ;\n```\n清单\
  \ 10-1\n发现承载实例的节点\n\n### 查看运行状况检查配置\n\n如果 DBA 正在协助 Windows 管理团队处理群集实例的重复故障转移，他可能希望公开哪些条件可能导致故障转移的详细信息，以确保配置了适当的级别。这可以通过使用\
  \ `sys.dm_os_cluster_properties` DMV 实现，该 DMV 返回表 10-2 中详述的列。\n\n表 10-2\n`sys.dm_os_cluster_properties`\
  \ 的列\n\n| 列 | 描述 |\n| --- | --- |\n| `VerboseLogging` | 指示群集使用的日志记录级别。可能的值有：• 0\
  \ – 表示日志记录已关闭• 1 – 表示仅记录错误• 2 – 表示记录错误和警告 |\n| `SQLDumperDumpFlags` | 指定 SQLDumper\
  \ 将生成的转储文件类型。可能的值有：• 0x0120 – 表示小型转储• 0x0110 – 表示完整转储• 0x8100 – 表示筛选的转储 |\n| `SQLDumperDumpPath`\
  \ | 指定 SQLDumper 将输出转储文件的文件路径 |\n| `SQLDumperDumpTimeOut` | SQLDumper 创建转储文件时的超时值。以毫秒为单位指定\
  \ |\n| `FailureConditionLevel` | 将导致发生故障转移的故障级别。故障条件级别的完整说明可在表 10-3 中找到 |\n| `HealthCheckTimeout`\
  \ | 数据库引擎在判定实例无响应之前，等待返回运行状况信息的持续时间 |\n\n`FailureConditionLevel` 列返回的可能的故障条件级别在表\
  \ 10-3 中详述。\n\n表 10-3\n故障条件级别\n\n| 条件级别 | 描述 |\n| --- | --- |\n| 0 | 不会发生自动故障转移\
  \ |\n| 1 | 当 SQL Server 服务关闭时发生自动故障转移 |\n| 2 | 当满足以下条件时将发生自动故障转移：• 满足级别 1 的条件• 超过\
  \ `HealthCheckTimeout` 值 |\n| 3 | 当满足以下条件时将发生自动故障转移：• 满足级别 2 的条件• 运行状况检查返回系统错误 |\n\
  | 4 | 当满足以下条件时将发生自动故障转移：• 满足级别 3 的条件• 运行状况检查返回资源错误 |\n| 5 | 当满足以下条件时将发生自动故障转移：• 满足级别\
  \ 4 的条件• 运行状况检查返回查询处理错误 |\n\n清单 10-2 中的查询将返回当前的故障转移条件级别和当前的运行状况检查超时值。\n\n```sql\n\
  SELECT\nFailureConditionLevel\n, HealthCheckTimeout\nFROM sys.dm_os_cluster_properties\
  \ ;\n```\n清单 10-2\n返回运行状况检查配置\n\n可以使用 `sp_server_diagnostics` 系统存储过程手动确定实例的当前运行状况。该过程接受一个参数：`@repeat_interval`，它指定过程应返回结果的频率，以秒为单位。如果省略该参数，则结果将仅返回一次。如果为该参数传递了一个值，则该值必须大于\
  \ 5。该过程返回表 10-4 中详述的结果集。\n\n表 10-4\n`sp_server_diagnostics` 返回的列\n\n\n\n| 列 | 说明\
  \ |\n| --- | --- |\n| `creation_time` | 指示行创建的时间 |\n| `component_type` | 指示组件的类型。可能的值为：• 实例\
  \ • AlwaysOn：可用性组 |\n| `component_name` | 指示组件的名称。可能的值为：• system • resource • query_processing\
  \ • io_subsystem • events • [可用性组名称] |\n| `state` | 组件的运行状况状态。可能的值为：• 0 – 状态未知 • 1\
  \ – 状态为正常（意味着运行状况良好） • 2 – 存在警告 • 3 – 存在错误 |\n| `state_desc` | 组件状态的文本描述。可能的值为：• Unknown\
  \ • Clean • Warnings • Errors |\n| `data` | 组件特定数据的 XML 表示形式。例如，资源组件包含指定可用物理内存和可用虚拟内存的元素。它还包括诸如内存不足异常计数之类的属性\
  \ |\n\n清单 10-3 中的脚本将返回 `sp_server_diagnostics` 系统存储过程的完整结果集，以及从 XML 列中提取（Shredding）出来的值，以便快速查看服务器整体\
  \ CPU 利用率、实例的 CPU 利用率以及可能已发生的内存不足异常计数。\n\n提示\n\n关于 XML 提取（Shredding）的讨论超出了本书的范围。不过，我推荐\
  \ Apress 出版的 `《SQL Server DBA 高级脚本与自动化实战》`（Expert Scripting and Automation for SQL\
  \ Server DBAs），其中可以找到关于为管理目的使用 XML 的讨论。该书可在 `www.apress.com/9781484219423` 购买。\n\
  \n```\nCREATE TABLE #Server_Diagnostics\n(\ncreation_time      DATETIME,\ncomponent_type\
  \     NVARCHAR(8),\ncomponent_name     NVARCHAR(128),\n[state]            TINYINT,\n\
  state_desc         NVARCHAR(8),\n[data]             XML\n) ;\nINSERT INTO #Server_Diagnostics\n\
  EXEC sp_server_diagnostics ;\nSELECT *,\ndata.value('(/system/@systemCpuUtilization)[1]','int')\
  \ AS SystemCPUUtilization\n,data.value('(/system/@sqlCpuUtilization)[1]','int')\
  \ AS SQLServerCPU\n,data.value('(/resource/@outOfMemoryExceptions)[1]','int') AS\
  \ OutOfMemoryExceptions\nFROM ##Server_Diagnostics ;\nDROP TABLE #Server_Diagnostics\
  \ ;\n```\n\n清单 10-3 检索诊断信息\n\n## AlwaysOn 可用性组元数据\n\n元数据也可用于排查可用性组的问题。以下部分将讨论一些与可用性组相关且最有用和有趣的元数据对象。\n\
  \n### 确定上次故障转移的原因\n\n如果一个可用性组发生了故障转移，您可能首先想回答的问题之一就是“何时以及为何发生？”。这个问题可以使用 `sys.dm_hadr_availability_replica_states`\
  \ DMV 来回答。此对象返回表 10-5 中详述的列。\n\n表 10-5 sys.dm_hadr_availability_replica_states\n\
  \n| 列 | 说明 |\n| --- | --- |\n| `replica_id` | 副本的 GUID |\n| `group_id` | 可用性组的 GUID\
  \ |\n| `is_local` | 指示副本是本地还是远程。可能的值为：• 0 – 指示远程辅助副本 • 1 – 指示本地副本 |\n| `role` |\
  \ 指示当前分配给副本的角色。可能的值为：• 0 – 角色当前正在解析中 • 1 – 副本具有主角色 • 2 – 副本当前具有辅助角色 |\n| `role_desc`\
  \ | 副本当前角色的文本描述。可能的值为：• RESOLVING • PRIMARY • SECONDARY |\n| `operational_state`\
  \ | 指示副本的当前操作状态。可能的值为：• 0 – 故障转移挂起 • 1 – 状态挂起 • 2 – 联机 • 3 – 脱机 • 4 – 失败 • 5 – 失败，且无仲裁\
  \ • NULL – 副本不是本地 |\n| `operational_state_desc` | 操作状态的文本描述。可能的值为：• PENDING_FAILOVER\
  \ • PENDING • ONLINE • OFFLINE • FAILED • FAILED_NO_QUORUM • NULL |\n| `connected_state`\
  \ | 指示辅助副本当前是否已连接到主副本。可能的值为：• 0 – 副本与主副本断开连接 • 1 – 副本已连接到主副本 |\n| `connected_state_desc`\
  \ | 连接状态的文本描述。可能的值为：• DISCONNECTED • CONNECTED |\n| `recovery_health` | 指示可用性组内的数据库是否联机。可能的值为：• 0\
  \ – 至少有一个数据库未联机 • 1 – 所有数据库都联机 • NULL – 可用性组不是本地 |\n| `recovery_health_desc` | recovery_health\
  \ 的文本描述。可能的值为：• ONLINE_IN_PROGRESS • ONLINE • NULL |\n| `synchronization_health`\
  \ | 指示可用性组数据库的同步状态。可能的值为：• 0 – 至少有一个数据库处于“未同步”状态。这称为“不健康” • 1 – 至少有一个数据库未处于理想同步状态。这称为“部分健康”。理想状态为：\
  \ • SYNCHRONIZED – 对于同步提交副本 • SYNCHRONIZING – 对于异步提交副本 • 2 – 所有数据库都处于理想状态。这称为“健康”\
  \ |\n| `synchronization_health_desc` | 同步运行状况状态的文本描述。可能的值为：• NOT_HEALTHY • PARTIALLY_HEALTHY\
  \ • HEALTHY |\n| `last_connect_error_number` | 上次连接错误的错误号 |\n| `last_connect_error_description`\
  \ | 上次连接错误的描述 |\n| `last_connect_error_timestamp` | 上次连接错误的日期和时间 |\n\n清单 10-4 中的查询演示了如何返回上次连接错误的时间和原因。这将指示故障转移发生的时间和原因。每个副本和可用性组的组合将返回一行。您会注意到，我们将\
  \ `sys.dm_hadr_availability_replica_states` DMV 与 `sys.availability_replicas` 和\
  \ `sys.availability_groups` DMV 进行联接，以检索承载副本的节点名称和可用性组的名称。\n\n```\nSELECT\nar.replica_server_name\n\
  ,ag.name\n,ars.last_connect_error_description\n,ars.last_connect_error_timestamp\n\
  FROM sys.dm_hadr_availability_replica_states ars\nINNER JOIN sys.availability_replicas\
  \ ar\nON ar.group_id = ars.group_id\nAND ars.replica_id = ar.replica_id\nINNER JOIN\
  \ sys.availability_groups ag\nON ag.group_id = ar.group_id ;\n```\n\n清单 10-4 确定上次故障转移的时间和原因\n\
  \n### 评估可用性数据库的状态\n\n您可能已经注意到，`sys.dm_hadr_availability_replica_states` DMV 会提供包含不健康数据库的可用性组的详细信息。然而，其结果不够细致，无法让您发现具体哪些数据库不健康。这些信息可以从\
  \ `sys.dm_hadr_database_replica_states` DMV 检索，该 DMV 返回表 10-6 中详述的列。\n\n表 10-6 sys.dm_hadr_database_replica_states\
  \ 列\n\n\n\n# 数据库可用性状态参考\n\n| 列名 | 描述 |\n| --- | --- |\n| `database_id` | 数据库的 ID\
  \ |\n| `group_id` | 可用性组 GUID |\n| `replica_id` | 可用性副本 GUID |\n| `group_database_id`\
  \ | 数据库在可用性组内的 ID |\n| `is_local` | 指示数据库是本地的还是远程的。可能的取值为：• 0 – 指示数据库不是此实例本地的• 1\
  \ – 指示数据库是此实例本地的 |\n| `is_primary_replica` | 指示数据库副本当前的角色是主副本还是辅助副本。可能的取值为：• 0 –\
  \ 指示辅助数据库副本• 1 – 指示主数据库副本 |\n| `synchronization_state` | 指示数据库同步的状态。可能的取值为：• 0 –\
  \ 指示未同步• 1 – 指示正在同步• 2 – 指示已同步• 3 – 指示状态正在还原。这意味着辅助副本正处于撤销阶段的一部分，正在从主副本检索页面• 4 –\
  \ 指示状态正在初始化。这意味着辅助副本正处于撤销阶段的一部分，此时所需的日志记录正在传输和硬化 |\n| `synchronization_state_desc`\
  \ | 同步状态的文本描述。可能的取值为：• NOT SYNCHRONIZING• SYNCHRONIZING• SYNCHRONIZED• REVERTING• INITIALIZING\
  \ |\n| `is_commit_participant` | 指示事务提交是否同步。异步副本上的数据库将始终报告 0，并且该值仅对同步副本上的主数据库准确。可能的取值为：• 0\
  \ – 指示事务提交未同步• 1 – 指示事务提交已同步 |\n| `synchronization_health` | 指示数据库的同步运行状况。可能的取值为：• 0\
  \ – 指示不正常。这意味着数据库未同步• 1 – 指示部分正常。这意味着数据库正在同步• 2 – 指示正常。这意味着数据库已同步 |\n| `synchronization_health_desc`\
  \ | 同步运行状况的文本描述。可能的取值为：• NOT_HEALTHY• PARTIALLY_HEALTHY• HEALTHY |\n| `database_state`\
  \ | 指示数据库的当前状态。该值反映 `sys.databases` 目录视图中的值。可能的取值为：• 0 – 指示数据库联机• 1 – 指示数据库正在还原• 2\
  \ – 指示数据库正在恢复• 3 – 指示数据库处于等待恢复的状态• 4 – 指示数据库疑似• 5 – 指示数据库处于紧急模式• 6 – 指示数据库脱机 |\n\
  | `database_state_desc` | 数据库状态的文本描述。可能的取值为：• ONLINE• RESTORING• RECOVERING• RECOVERY_PENDING• SUSPECT• EMERGENCY• OFFLINE\
  \ |\n| `is_suspended` | 指示数据库是否已挂起。可能的取值为：• 0 – 指示已恢复• 1 – 指示已挂起 |\n| `suspend_reason`\
  \ | 如果数据库已挂起，`suspend_reason` 列将指示原因。可能的取值为：• 0 – 指示用户手动挂起了数据移动• 1 – 指示在强制故障转移后挂起• 2\
  \ – 指示在重做阶段发生错误• 3 – 指示在日志捕获期间发生错误• 4 – 指示在写入日志时发生错误• 5 – 指示在重启前数据库已挂起• 6 – 指示在撤销阶段发生错误• 7\
  \ – 指示日志链不匹配错误• 8 – 指示在计算辅助副本的同步点时发生错误 |\n| `suspend_reason_desc` | `suspend_reason`\
  \ 列的文本描述。可能的取值为：• SUSPEND_FROM_USER• SUSPEND_FROM_PARTNER• SUSPEND_FROM_REDO• SUSPEND_FROM_CAPTURE• SUSPEND_FROM_APPLY• SUSPEND_FROM_RESTART• SUSPEND_FROM_UNDO• SUSPEND_FROM_REVALIDATION• SUSPEND_FROM_XRF_UPDATE\
  \ |\n| `recovery_lsn` | 在主副本上，`recovery_lsn` 指示事务日志的结尾（事务日志中用于时间点恢复的最终点）。在辅助副本上，此列指示需要重新同步的点。但是，如果该值大于或等于\
  \ `last_hardened_lsn`，则表示不需要重新同步 |\n| `truncation_lsn` | 对于主副本，此列指示所有辅助副本中的最小日志截断\
  \ LSN。对于辅助副本，此列指示该特定数据库副本的日志截断点 |\n| `last_sent_lsn` | 指示已发送的最后一个日志块的结尾 |\n| `last_sent_time`\
  \ | 发送最后一个日志块的日期和时间 |\n| `last_recieved_lsn` | 指示已接收的最后一个日志块的结尾 |\n| `last_hardened_lsn`\
  \ | 指示已硬化的最后一个日志块的开始。对于异步提交副本，该值将为 `NULL` |\n| `last_hardened_time` | 已硬化 LSN 的日期和时间\
  \ |\n| `last_redone_lsn` | 在辅助副本上重做的最后一个日志记录的 LSN |\n| `last_redone_time` | 在辅助副本上重做的最后一个\
  \ LSN 的时间戳 |\n| `log_send_queue_size` | 尚未发送到辅助副本的日志记录的大小（以千字节为单位） |\n| `log_send_rate`\
  \ | 日志记录被发送到辅助副本的速度（以千字节/秒为单位） |\n| `filestream_send_rate` | FILESTREAM 文件被发送到辅助副本的速度（以千字节/秒为单位）\
  \ |\n| `end_of_log_lsn` | 日志缓存中最终日志记录的 LSN |\n| `last_commit_lsn` | 事务日志中最后一个已提交事务的\
  \ LSN |\n| `last_commit_time` | 事务日志中最后一个已提交 LSN 的时间戳 |\n| `low_water_mark_for_ghosts`\
  \ | 幽灵清理任务（物理删除已逻辑删除的行）使用此列在所有数据库副本中的最小值来确定从何处开始清理记录 |\n| `secondary_log_seconds`\
  \ | 辅助副本落后于主副本的秒数 |\n\n清单 10-5 中的脚本演示了如何评估 HR 可用性组内的可用性数据库运行状况。您会注意到，我们使用 `DB_NAME()`\
  \ 函数返回数据库的名称，并将 `sys.dm_hadr_database_replica_states` DMV 与 `sys.availability_groups`\
  \ 和 `sys.availability_replicas` 目录视图联接，以返回可用性组和副本的名称。\n\n```sql\nSELECT\nDB_NAME(database_id)\n\
  ,ag.name\n,ar.replica_server_name\n,is_primary_replica\n,synchronization_state_desc\n\
  ,synchronization_health_desc\n,database_state_desc\nFROM sys.dm_hadr_database_replica_states\
  \ drs\nINNER JOIN sys.availability_groups ag\nON drs.group_id = ag.group_id\nINNER\
  \ JOIN sys.availability_replicas ar\nON drs.replica_id = ar.replica_id\nWHERE ag.name\
  \ = 'HR';\n清单 10-5\n评估可用性数据库的状态\n```\n\n\n\n## 总结\n\nSQL Server 提供了大量元数据，可帮助您进行故障排除并审核配置。虽然本章节讨论了一些最有用的元数据，但我强烈建议您进一步探索\
  \ `hadr` 相关的 DMV。\n\n对于故障转移群集实例，`sys.dm_os_cluster_nodes` DMV 可显示群集中各节点的运行状况状态。更详细的故障排除信息可通过调用系统存储过程\
  \ `sp_server_diagnostics` 获取。\n\n## 提示\n\n系统存储过程 `sp_server_diagnostics` 也可用于故障排除\
  \ AlwaysOn 可用性组，并会为实例上承载的每个可用性组返回一行。\n\n`sys.dm_hadr_availability_replica_states`\
  \ DMV 提供承载 AlwaysOn 可用性组的副本的详细运行状况状态。若要深入查看参与可用性组的数据库的运行状况状态，可查询 `sys.dm_hadr_database_replica_states`\
  \ DMV。\n\n前面提到的两个 DMV 均可与 `sys.availability_groups` 和 `sys.availability_replicas`\
  \ DMV 进行联接，以获取有关配置的文本信息（而非 GUID）。`sys.dm_hadr_database_replica_states` DMV 也可与 `sys.databases`\
  \ 联接，以获取有关数据库配置的更多信息。\n\n\n# 索引与术语\n\n索引 A 访问密钥 帐户 可用性组，T-SQL 添加侦听器（`ADD LISTERNER`）选项\
