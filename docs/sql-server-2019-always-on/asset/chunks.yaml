- fmt: '# 设置副本属性


    现在可以开始设置副本属性了。我们在创建`HR`可用性组时已经讨论过角色、可用性模式、故障转移模式、可读辅助副本和终结点URL属性。“连接在主角色中”属性定义了当副本处于主角色时，可以建立哪些连接。可以将其配置为“允许所有连接”或“允许读写连接”。当指定为“读写”时，连接字符串中使用`Application
    Intent = Read only`参数的应用程序将无法连接到该副本。


    “会话超时”属性设置了副本在多长时间内没有收到彼此的心跳后会进入`DISCONNECTED`状态并结束会话。虽然可以将此值设置为低至5秒，但通常建议将设置保持在60秒；否则，可能会遇到误报响应的风险，导致不必要的故障转移。如果副本超时，则需要重新同步，因为即使辅助副本运行在同步提交模式下，主副本上的事务也将不再等待它。


    在对话框的“备份首选项”选项卡中，我们定义了用于自动备份作业的首选副本，如图[5-10](#394392_3_En_5_Chapter.xhtml#Fig10)所示。就像使用向导时一样，我们可以指定“主副本”，也可以选择强制或偏好在辅助副本上进行备份。我们还可以为每个副本配置一个介于0到100之间的权重，并使用“排除副本”复选框来避免在特定节点上进行备份。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig10_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig10_HTML.jpg)


    图 5-10


    备份首选项选项卡


    在“只读路由”选项卡上（如图[5-11](#394392_3_En_5_Chapter.xhtml#Fig11)所示），我们将配置`CLUSTERNODE4\READSCALE`实例为可读辅助副本。发送到侦听器的只读请求将被重定向到此实例，而不是发送到主副本（主副本将驻留在其他三个实例之一上）。此配置的第一步是为可读辅助副本添加一个“只读路由URL”。这类似于我们为每个节点配置的“终结点URL”，不同之处在于它将服务于只读请求。只读URL可以是IP地址或FQDN，并且必须包含实例正在侦听的端口。这意味着在进行此配置之前，必须确保实例正在静态端口上侦听。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig11_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig11_HTML.jpg)


    图 5-11


    只读路由选项卡 – 配置只读路由URL


    一旦将只读路由URL添加到您计划配置的每个可读辅助副本，该可读辅助副本就会出现在选项卡下部的“可用副本”窗口中。现在，您可以为每个您希望能够路由到该可读辅助副本的副本选择“只读路由列表”单元格，然后单击选项卡下半部分的“添加”按钮，将其添加到“只读路由列表”中，如图[5-12](#394392_3_En_5_Chapter.xhtml#Fig12)所示。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig12_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig12_HTML.jpg)


    图 5-12


    只读路由选项卡 – 配置只读路由列表


    此示例展示了一个简单的配置，其中所有节点（当它们托管主副本时）都可以将读取请求卸载到单个可读辅助副本。然而，更复杂的排列也是可能的。例如，您可以将每个节点配置为路由到一个单独的可读辅助副本。如果您的可用性组分布在多个站点之间，并且您希望确保每个节点将只读请求路由到同一站点中的副本，以提高读取横向扩展的冗余性，这将非常有用。


    或者，您可以允许每个节点将只读请求路由到多个可读辅助副本。在此场景中，您有两个选择。默认实现将始终将读取请求发送到第一个可用的副本，因此您只是为可读辅助副本增加了冗余。如果这是意图，那么路由列表中的每个可读辅助副本将用逗号分隔。更高级的实现是将可读辅助副本配置为负载平衡只读请求。在此场景中，只读请求将使用循环方式在负载平衡集内路由。负载平衡集内的节点将用逗号分隔，该集将用括号括起来。


    您还可以在同一路由列表中配置多个负载平衡集。这里，请求将在第一个负载平衡集内循环路由，除非该集中的节点变得不可用，在这种情况下，请求将在下一个集内循环路由。


    例如，假设您希望只读请求在ServerA和ServerB之间负载平衡，但如果这些服务器变得不可用，则希望请求在ServerC和ServerD之间负载平衡。您的只读路由列表将采用以下形式：`((ServerA,ServerB),(ServerC,ServerD))`。


    创建可用性组后，我们需要创建可用性组侦听器。为此，我们在`Sales`可用性组的上下文菜单中选择“新建侦听器”，该组现在应该在对象资源管理器中可见。这将调用“新建可用性组侦听器”对话框，如图[5-13](#394392_3_En_5_Chapter.xhtml#Fig13)所示。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig13_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig13_HTML.jpg)


    图 5-13


    新建可用性组侦听器对话框


    在此对话框中，我们首先输入侦听器的虚拟名称。然后，定义它将侦听的端口以及将分配给它的IP地址。


    提示

    我们能够为两个侦听器以及SQL Server实例使用相同的端口，因为三者使用不同的IP地址。'
  raw: 'Now we can begin to set the replica properties. We discussed the Role, Availability
    Mode, Failover Mode, Readable Secondary, and Endpoint URL properties when we created
    the `HR` availability group. The Connection in Primary Role property defines what
    connections can be made to the replica if the replica is in the primary role.
    You can configure this as either Allow All Connections or Allow Read/Write connections.
    When Read/Write is specified, applications using the `Application Intent = Read
    only` parameter in their connection string will not be able to connect to the
    replica.


    The Session Timeout property sets how long the replicas can go without receiving
    a ping from one another before they enter the `DISCONNECTED` state and the session
    ends. Although it is possible to set this value to as low as 5 seconds, it is
    usually a good idea to keep the setting at 60 seconds; otherwise, you run the
    risk of a false-positive response, resulting in unnecessary failover. If a replica
    times out, it needs to be resynchronized, since transactions on the primary will
    no longer wait for the secondary, even if the secondary is running in Synchronous
    Commit mode.


    On the Backup Preferences tab of the dialog box, we define the preferred replica
    to use for automated backup jobs, as shown in Figure [5-10](#394392_3_En_5_Chapter.xhtml#Fig10).
    Just like when using the wizard, we can specify Primary, or we can choose between
    enforcing and preferring backups to occur on a secondary replica. We can also
    configure a weight, between 0 and 100 for each replica, and use the Exclude Replica
    check box to avoid backups being taken on a specific node.


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig10_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig10_HTML.jpg)


    Figure 5-10


    The Backup Preferences Tab


    On the Read-Only Routing tab, which is illustrated in Figure [5-11](#394392_3_En_5_Chapter.xhtml#Fig11),
    we will configure the `CLUSTERNODE4\READSCALE` instance as a readable secondary.
    Read-only requests that are sent to the listener will be redirected to this instance,
    instead of being sent to the primary replica, which will reside on one of the
    other three instances. The first step in this configuration is to add a Read-Only
    Routing URL for the readable secondary. This is similar to the Endpoint URL that
    we configured for each node, the difference is that this will service the read-only
    requests. The Read-Only URL can be an IP address or a FQDN and must include the
    port that the instance is listening on. This means you must ensure that the instance
    is listening on a static port, before performing this configuration.


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig11_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Read-Only Routing Tab – Configure the Read-Only Routing URL


    Once the Read-Only routing URL has been added to each readable secondary that
    you plan to configure, the readable secondary will appear in the Available Replicas
    window in the lower section of the tab. You can now select the Read-Only Routing
    List cell for each replica that you wish to be able to route to the readable secondary
    and click the Add button in the lower half of the tab, to add it to the Read-Only
    Routing List, as shown in Figure [5-12](#394392_3_En_5_Chapter.xhtml#Fig12).


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig12_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Read-Only Routing Tab – Configure the Read-Only Routing List


    This example shows a simple configuration, where all nodes (when they are hosting
    the primary replica) can offload read requests to a single readable secondary.
    More complex permutations are also possible, however. For example, you could configure
    each node to route to an individual readable secondary. This could prove useful
    if your Availability Group is split between multiple sites and you want to ensure
    that each node will route read-only requests to a replica in the same site, improving
    redundancy for the read scale-out.


    Alternatively, you could allow each node to route read-only requests to multiple
    readable secondaries. In this scenario, you have two options. The default implementation
    will always send read request to the first available replica, so you are simply
    adding redundancy for your readable secondaries. If this is the intention, then
    each readable secondary in the routing list will be separated by a comma. A more
    advanced implementation is to configure readable secondaries to load balance read-only
    requests. In this scenario, read-only requests will be routed across the load
    balanced set, using a round-robin approach. Nodes within the load balanced set
    will be separated with a comma and the set will be enclosed in parenthesis.


    You can also configure multiple load balanced sets within the same routing list.
    Here, requests will be routed round-robin around the first load balanced set,
    unless the nodes within that set become unavailable, in which case, requests will
    be routed round-robin around the next set.


    For example, imagine that you wanted read-only requests to be load balanced between
    ServerA and ServerB, but if those servers became unavailable, you wanted requests
    to be load balanced between ServerC and ServerD. Your read-only routing list would
    take the form: `((ServerA,ServerB),(ServerC,ServerD))`.


    Once we have created the availability group, we need to create the Availability
    Group Listener. To do this, we select New Listener from the context menu of the
    `Sales` Availability Group, which should now be visible in Object Explorer. This
    invokes the New Availability Group Listener dialog box, which can be seen in Figure
    [5-13](#394392_3_En_5_Chapter.xhtml#Fig13).


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig13_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig13_HTML.jpg)


    Figure 5-13


    The New Availability Group Listener Dialog Box


    In this dialog box, we start by entering the virtual name for the listener. We
    then define the port that it will listen on and the IP address that will be assigned
    to it.


    Tip


    We are able to use the same port for both of the listeners, as well as the SQL
    Server instance, because all three use different IP addresses.'
  trans: '# 设置副本属性


    现在可以开始设置副本属性了。我们在创建`HR`可用性组时已经讨论过角色、可用性模式、故障转移模式、可读辅助副本和终结点 URL 属性。“连接在主角色中”属性定义了当副本处于主角色时，可以建立哪些连接。可以将其配置为“允许所有连接”或“允许读写连接”。当指定为“允许读写连接”时，连接字符串中使用`Application
    Intent = Read only`参数的应用程序将无法连接到该副本。


    “会话超时”属性设置了副本在多长时间内没有收到彼此的心跳后会进入`DISCONNECTED`状态并结束会话。虽然可以将此值设置为低至 5 秒，但通常建议将设置保持在
    60 秒；否则，可能会遇到误报响应的风险，导致不必要的故障转移。如果副本超时，则需要重新同步，因为即使辅助副本运行在同步提交模式下，主副本上的事务也将不再等待它。


    在对话框的“备份首选项”选项卡中，我们定义了用于自动备份作业的首选副本，如图 5-10 所示。就像使用向导时一样，我们可以指定“主副本”，也可以选择强制或偏好在辅助副本上进行备份。我们还可以为每个副本配置一个介于
    0 到 100 之间的权重，并使用“排除副本”复选框来避免在特定节点上进行备份。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig10_HTML.jpg](img/394392_3_En_5_Fig10_HTML.jpg)


    图 5-10


    备份首选项选项卡


    在“只读路由”选项卡上（如图 5-11 所示），我们将配置`CLUSTERNODE4\READSCALE`实例为可读辅助副本。发送到侦听器的只读请求将被重定向到此实例，而不是发送到主副本（主副本将驻留在其他三个实例之一上）。此配置的第一步是为可读辅助副本添加一个“只读路由
    URL”。这类似于我们为每个节点配置的“终结点 URL”，不同之处在于它将服务于只读请求。只读 URL 可以是 IP 地址或 FQDN，并且必须包含实例正在侦听的端口。这意味着在进行此配置之前，必须确保实例正在静态端口上侦听。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig11_HTML.jpg](img/394392_3_En_5_Fig11_HTML.jpg)


    图 5-11


    只读路由选项卡 – 配置只读路由 URL


    一旦将只读路由 URL 添加到您计划配置的每个可读辅助副本，该可读辅助副本就会出现在选项卡下部的“可用副本”窗口中。现在，您可以为每个您希望能够路由到该可读辅助副本的副本选择“只读路由列表”单元格，然后单击选项卡下半部分的“添加”按钮，将其添加到“只读路由列表”中，如图
    5-12 所示。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig12_HTML.jpg](img/394392_3_En_5_Fig12_HTML.jpg)


    图 5-12


    只读路由选项卡 – 配置只读路由列表


    此示例展示了一个简单的配置，其中所有节点（当它们托管主副本时）都可以将读取请求卸载到单个可读辅助副本。然而，更复杂的排列也是可能的。例如，您可以将每个节点配置为路由到一个单独的可读辅助副本。如果您的可用性组分布在多个站点之间，并且您希望确保每个节点将只读请求路由到同一站点中的副本，以提高读取横向扩展的冗余性，这将非常有用。


    或者，您可以允许每个节点将只读请求路由到多个可读辅助副本。在此场景中，您有两个选择。默认实现将始终将读取请求发送到第一个可用的副本，因此您只是为可读辅助副本增加了冗余。如果这是意图，那么路由列表中的每个可读辅助副本将用逗号分隔。更高级的实现是将可读辅助副本配置为负载平衡只读请求。在此场景中，只读请求将使用循环方式在负载平衡集内路由。负载平衡集内的节点将用逗号分隔，该集将用括号括起来。


    您还可以在同一路由列表中配置多个负载平衡集。这里，请求将在第一个负载平衡集内循环路由，除非该集中的节点变得不可用，在这种情况下，请求将在下一个集内循环路由。


    例如，假设您希望只读请求在 ServerA 和 ServerB 之间负载平衡，但如果这些服务器变得不可用，则希望请求在 ServerC 和 ServerD
    之间负载平衡。您的只读路由列表将采用以下形式：`((ServerA,ServerB),(ServerC,ServerD))`。


    创建可用性组后，我们需要创建可用性组侦听器。为此，我们在`Sales`可用性组的上下文菜单中选择“新建侦听器”，该组现在应该在对象资源管理器中可见。这将调用“新建可用性组侦听器”对话框，如图
    5-13 所示。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig13_HTML.jpg](img/394392_3_En_5_Fig13_HTML.jpg)


    图 5-13


    新建可用性组侦听器对话框


    在此对话框中，我们首先输入侦听器的虚拟名称。然后，定义它将侦听的端口以及将分配给它的 IP 地址。


    提示

    我们能够为两个侦听器以及 SQL Server 实例使用相同的端口，因为三者使用不同的 IP 地址。'
- fmt: '## Using T-SQL


    Now that we have created Availability Groups using both GUI methods, in SSMS,
    let’s see how to create an Availability Group using T-SQL. In this section, we
    will create an Availability Group called `Accounts`, which will provide both HA
    and DR for the `Accounts` database. As always, the first thing we need to do is
    to take a full backup of the database. We can achieve this using the script in
    Listing [5-5](#394392_3_En_5_Chapter.xhtml#PC5).


    ```

    BACKUP DATABASE HR

    TO  DISK = N''C:\Backups\HR.bak''

    WITH NAME = N''HR-Full Database Backup'' ;

    GO

    ```

    **Listing 5-5** Backup the Accounts Database


    To create the Availability Group, we will use the `CREATE AVAILABLILITY GROUP`
    T-SQL command. The `WITH` options supported by this command are detailed in Table
    [5-1](#394392_3_En_5_Chapter.xhtml#Tab1).


    **Table 5-1** CREATE AVAILABILITY GROUP with Options


    | Option | Description |

    | --- | --- |

    | `AUTOMATED_BACKUP_PREFERENCE` | Specifies which replica should be used for backups.
    Possible options are `PRIMARY`, meaning the Primary Replica will always be used;
    `SECONDARY_ONLY`, meaning that backup should never be performed on the Primary
    Replica; `SECONDARY`, meaning backups should not be taken on the Primary Replica,
    unless the Primary Replica is the only Replica online; and `NONE`, meaning that
    the role of each Replica will be ignored, when selecting which Replica to take
    the backup from. |

    | `FAILURE_CONDITION_LEVEL` | Specifies the events that should cause an Availability
    Group to automatically fail over. Acceptable levels are 1–5. |

    | `HEALTH_CHECK_TIMEOUT` | Specified in milliseconds, the duration the cluster
    will wait for a response from the health check procedure, before assuming that
    the node is unresponsive and fails over. |

    | `DB_FAILOVER` | When an Availability Group has multiple databases, determines
    if a single database within the Availability Group moving out of the `ONLINE`
    state triggers a failover. |

    | `DTC_SUPPORT` | Specifies if cross-database transactions are supported within
    the Availability Group, using DTC (Distributed Transaction Coordinator). Acceptable
    values are `PER_DB` or `NONE`. |

    | `BASIC` | Used to create a basic Availability Group. Basic Availability Groups
    are discussed in [Chapter 7](#394392_3_En_7_Chapter.xhtml). |

    | `DISTRIBUTED` | Used to create a Distributed Availability Group. This is discussed
    in [Chapter 7](#394392_3_En_7_Chapter.xhtml). |

    | `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT` | Can be used to ensure a zero
    RPO, by enforcing a commit on secondary Replica(s) before proceeding. `0` indicates
    that transactions will be marked as `NOT SYNCHRONIZED`, but the Replica will continue
    to process transactions. |

    | `CLUSTER_TYPE` | Specifies the type of cluster that the Availability Group resides
    on. Possible values are `WSFC`, indicating a Windows Failover cluster; `EXTERNAL`,
    indicating a non-Windows cluster, such as Linux Pacemaker; or `NONE`, indicating
    clusterless Availability Groups. |


    Please see Table [5-2](#394392_3_En_5_Chapter.xhtml#Tab2) for details of each
    failure level.


    Table [5-2](#394392_3_En_5_Chapter.xhtml#Tab2) details the events that will trigger
    an automatic failover, based on the failure condition level specified.


    **Table 5-2** Failure Condition Levels


    | Level | Events That Trigger Failover |

    | --- | --- |

    | 1 | • The SQL Server service is stopped.<br>• The SQL Server instance’s lease
    in the cluster has expired, because no acknowledgment has been received. |

    | 2 | • Any Level 1 condition.<br>• The SQL instance is not connected to the cluster
    and the health check threshold is exceeded.<br>• The availability replica is in
    a `FAILED` state. |

    | 3 (Default) | • Any Level 1–2 condition.<br>• Critical internal errors within
    the SQL Server instance. |

    | 4 | • Any Level 1–3 condition.<br>• Moderate internal errors within the SQL
    Server instance. |

    | 5 | • Any Level 1–4 condition.<br>• Any internal failure within the SQL Server
    instance. |


    When adding Replicas with the `REPLICA ON` clause, additional `WITH OPTIONS` are
    available. These are detailed in Table [5-3](#394392_3_En_5_Chapter.xhtml#Tab3).


    **Table 5-3** ON REPLICA WITH Options


    | Option | Description |

    | --- | --- |

    | `ENDPOINT_URL` | The URL of the endpoint on the SQL Server instance that hosts
    the Replica. |

    | `FAILOVER_MODE` | Specifies if the Replica should support automatic or manual
    failover. |

    | `AVAILABILITY_MODE` | Specifies if transactions on the Replica should be committed
    synchronously or asynchronously. The availability mode can also be set to `CONFIGURATION_ONLY`
    mode, to support external cluster mode. This will be discussed in [Chapter 6](#394392_3_En_6_Chapter.xhtml).
    |

    | `SESSION_TIMEOUT` | Specifies the session timeout period in seconds. |

    | `BACKUP_PRIORITY` | Provides a weighting for the Replica, which will be used
    to decide which Replica backups should be taken from. `0` indicates backups cannot
    be taken from the replica. |

    | `SEEDING_MODE` | Specifies how the Replica is seeded. Acceptable values are
    `AUTOMATIC` and `MANUAL`. |

    | `PRIMARY_ROLE` | Used to specify the `ALLOW_CONNECTIONS` setting and pass a
    `READ_ONLY_ROUTING_LIST`. |

    | `SECONDARY_ROLE` | Used to specify a value for `ALLOW_CONNECTIONS` and pass
    a `READ_ONLY_ROUTING_URL`. |


    Therefore, the script in Listing [5-6](#394392_3_En_5_Chapter.xhtml#PC6) will
    create the `Accounts` Availability Group. Note that we have chosen to seed the
    replicas manually.


    ```

    CREATE AVAILABILITY GROUP Accounts

    WITH (

    AUTOMATED_BACKUP_PREFERENCE = PRIMARY,

    DB_FAILOVER = OFF,

    DTC_SUPPORT = NONE,

    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0

    )

    FOR

    REPLICA ON

    ''CLUSTERNODE1\PROD'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE1.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    ),

    ''CLUSTERNODE2\SYNCHA'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE2.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    ),

    ''CLUSTERNODE3\ASYNCDR'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE3.AlwaysOn.com:5022'',

    FAILOVER_MODE = MANUAL,

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    );

    GO

    ```

    **Listing 5-6** Create the Accounts Availability Group


    Now that we have created the `Accounts` Availability Group, we will need to create
    an Availability Group Listener, so that the cluster knows where to direct requests.
    We will do this using the `ALTER AVAILABILITY GROUP` command with the `ADD LISTENER`
    clause. The `ADD LISTENER` clause has the `WITH` options specified in Table [5-4](#394392_3_En_5_Chapter.xhtml#Tab4).


    **Table 5-4** ADD LISTERNER WITH Options


    | Option | Description |

    | --- | --- |

    | `IP` | Specify the IP Address(s) that the Listener will listen on, along with
    the subnet masks of the network relating to each IP address. |

    | `PORT` | The Port that the Listener will listen on. |


    Because our `CLUSTERNODE3\ASYNCDR` instance is in a different subnet to `CLUSTERNODE1\PROD`
    and `CLUSTERNODE2\SYNCHA`, we need to specify two IP addresses, one for each subnet.
    Therefore, the script in Listing [5-7](#394392_3_En_5_Chapter.xhtml#PC7) will
    create the Availability Group Listener for the `Accounts` Availability Group.


    ```

    ALTER AVAILABILITY GROUP Accounts

    ADD LISTENER ''Accounts'' (

    WITH IP

    (

    (N''10.0.0.8'', N''255.255.255.0''),

    (N''10.0.1.8'', N''255.255.255.0'')

    ),

    PORT=1433

    );

    GO

    ```

    **Listing 5-7** Create an Availability Group Listener'
  raw: '## Using T-SQL


    Now that we have created Availability Groups using both GUI methods, in SSMS,
    let’s see how to create an Availability Group using T-SQL. In this section, we
    will create an Availability Group called Accounts, which will provide both HA
    and DR for the Accounts database. As always, the first thing we need to do is
    to take a full backup of the database. We can achieve this using the script in
    Listing [5-5](#394392_3_En_5_Chapter.xhtml#PC5).


    ```

    BACKUP DATABASE HR

    TO  DISK = N''C:\Backups\HR.bak''

    WITH NAME = N''HR-Full Database Backup'' ;

    GO

    Listing 5-5

    Backup the Accounts Database

    ```


    To create the Availability Group, we will use the `CREATE AVAILABLILITY GROUP`
    T-SQL command. The `WITH` options supported by this command are detailed in Table
    [5-1](#394392_3_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    CREATE AVAILABILITY GROUP with Options


    | Option | Description |

    | --- | --- |

    | AUTOMATED_BACKUP_PREFERENCE | Specifies which replica should be used for backups.
    Possible options are PRIMARY, meaning the Primary Replica will always be used;
    SECONDARY_ONLY, meaning that backup should never be performed on the Primary Replica;
    SECONDARY, meaning backups should not be taken on the Primary Replica, unless
    the Primary Replica is the only Replica online; and NONE, meaning that the role
    of each Replica will be ignored, when selecting which Replica to take the backup
    from. |

    | FAILURE_CONDITION_LEVEL | Specifies the events that should cause an Availability
    Group to automatically fail over. Acceptable levels are 1–5*. |

    | HEALTH_CHECK_TIMEOUT | Specified in milliseconds, the duration the cluster will
    wait for a response from the health check procedure, before assuming that the
    node is unresponsive and fails over. |

    | DB_FAILOVER | When an Availability Group has multiple databases, determines
    if a single database within the Availability Group moving out of the `ONLINE`
    state triggers a failover. |

    | DTC_SUPPORT | Specifies if cross-database transactions are supported within
    the Availability Group, using DTC (Distributed Transaction Coordinator). Acceptable
    values are `PER_DB` or `NONE`. |

    | BASIC | Used to create a basic Availability Group. Basic Availability Groups
    are discussed in Chapter [7](#394392_3_En_7_Chapter.xhtml). |

    | DISTRIBUTED | Used to create a Distributed Availability Group. This is discussed
    in Chapter [7](#394392_3_En_7_Chapter.xhtml). |

    | REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT | Can be used to ensure a zero RPO,
    by enforcing a commit on secondary Replica(s) before proceeding. 0 indicates that
    transactions will be marked as NOT SYNCHRONIZED, but the Replica will continue
    to process transactions. |

    | CLUSTER_TYPE | Specifies the type of cluster that the Availability Group resides
    on. Possible values are WSFC, indicating a Windows Failover cluster; EXTERNAL,
    indicating a non-Windows cluster, such as Linux Pacemaker; or NONE, indicating
    clusterless Availability Groups. |


    **Please see Table* [*5-2*](#394392_3_En_5_Chapter.xhtml#Tab2) *for details of
    each failure level* *.*


    Table [5-2](#394392_3_En_5_Chapter.xhtml#Tab2) details the events that will trigger
    an automatic failover, based on the failure condition level specified.


    Table 5-2


    Failure Condition Levels


    | Level | Events That Trigger Failover |

    | --- | --- |

    | 1 | • The SQL Server service is stopped.• The SQL Server instance’s lease in
    the cluster has expired, because no acknowledgment has been received. |

    | 2 | • Any Level 1 condition.• The SQL instance is not connected to the cluster
    and the health check threshold is exceeded.• The availability replica is in a
    FAILED state. |

    | 3 (Default) | • Any Level 1–2 condition.• Critical internal errors within the
    SQL Server instance. |

    | 4 | • Any Level 1–3 condition.• Moderate internal errors within the SQL Server
    instance. |

    | 5 | • Any Level 1–4 condition.• Any internal failure within the SQL Server instance.
    |


    When adding Replicas with the `REPLICA ON` clause, additional `WITH OPTIONS` are
    available. These are detailed in Table [5-3](#394392_3_En_5_Chapter.xhtml#Tab3).


    Table 5-3


    ON REPLICA WITH Options


    | Option | Description |

    | --- | --- |

    | ENDPOINT_URL | The URL of the endpoint on the SQL Server instance that hosts
    the Replica. |

    | FAILOVER_MODE | Specifies if the Replica should support automatic or manual
    failover. |

    | AVAILABILITY_MODE | Specifies if transactions on the Replica should be committed
    synchronously or asynchronously. The availability mode can also be set to `CONFIGURATION_ONLY`
    mode, to support external cluster mode. This will be discussed in Chapter [6](#394392_3_En_6_Chapter.xhtml).
    |

    | SESSION_TIMEOUT | Specifies the session timeout period in seconds. |

    | BACKUP_PRIORITY | Provides a weighting for the Replica, which will be used to
    decide which Replica backups should be taken from. 0 indicates backups cannot
    be taken from the replica. |

    | SEEDING_MODE | Specifies how the Replica is seeded. Acceptable values are `AUTOMATIC`
    and `MANUAL`. |

    | PRIMARY_ROLE | Used to specify the `ALLOW_CONNECTIONS` setting and pass a `READ_ONLY_ROUTING_LIST`.
    |

    | SECONDARY_ROLE | Used to specify a value for `ALLOW_CONNECTIONS` and pass a
    `READ_ONLY_ROUTING_URL`. |


    Therefore, the script in Listing [5-6](#394392_3_En_5_Chapter.xhtml#PC6) will
    create the `Accounts` Availability Group. Note that we have chosen to seed the
    replicas manually.


    ```

    CREATE AVAILABILITY GROUP Accounts

    WITH (

    AUTOMATED_BACKUP_PREFERENCE = PRIMARY,

    DB_FAILOVER = OFF,

    DTC_SUPPORT = NONE,

    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0

    )

    FOR

    REPLICA ON

    ''CLUSTERNODE1\PROD'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE1.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    ),

    ''CLUSTERNODE2\SYNCHA'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE2.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    ),

    ''CLUSTERNODE3\ASYNCDR'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE3.AlwaysOn.com:5022'',

    FAILOVER_MODE = MANUAL,

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    );

    GO

    Listing 5-6

    Create the Accounts Availability Group

    ```


    Now that we have created the Accounts Availability Group, we will need to create
    an Availability Group Listener, so that the cluster knows where to direct requests.
    We will do this using the `ALTER AVAILABILITY GROUP` command with the `ADD LISTENER`
    clause. The ADD LISTENER clause has the WITH options specified in Table [5-4](#394392_3_En_5_Chapter.xhtml#Tab4).


    Table 5-4


    ADD LISTERNER WITH Options


    | Option | Description |

    | --- | --- |

    | IP | Specify the IP Address(s) that the Listener will listen on, along with
    the subnet masks of the network relating to each IP address |

    | PORT | The Port that the Listener will listen on |


    Because our `CLUSTERNODE3\ASYNCDR` instance is in a different subnet to `CLUSTERNODE1\PROD`
    and `CLUSTERNODE2\SYNCHA`, we need to specify two IP addresses, one for each subnet.
    Therefore, the script in Listing [5-7](#394392_3_En_5_Chapter.xhtml#PC7) will
    create the Availability Group Listener for the `Accounts` Availability Group.


    ```

    ALTER AVAILABILITY GROUP Accounts

    ADD LISTENER ''Accounts'' (

    WITH IP

    (

    (N''10.0.0.8'', N''255.255.255.0''),

    (N''10.0.1.8'', N''255.255.255.0'')

    ),

    PORT=1433

    );

    GO

    Listing 5-7

    Create an Availability Group Listener

    ```'
  trans: '

    ## 使用 T-SQL


    既然我们已经通过 SSMS 中的 GUI 方法创建了可用性组，现在来看看如何使用 T-SQL 创建一个可用性组。在本节中，我们将创建一个名为 `Accounts`
    的可用性组，它将为 `Accounts` 数据库提供高可用性（HA）和灾难恢复（DR）。和往常一样，我们需要做的第一件事是对数据库进行完整备份。我们可以使用清单
    5-5 中的脚本来实现这一点。


    ```

    BACKUP DATABASE HR

    TO  DISK = N''C:\Backups\HR.bak''

    WITH NAME = N''HR-Full Database Backup'' ;

    GO

    ```

    **清单 5-5** 备份 Accounts 数据库


    要创建可用性组，我们将使用 `CREATE AVAILABILITY GROUP` T-SQL 命令。此命令支持的 `WITH` 选项详见表 5-1。


    **表 5-1** CREATE AVAILABILITY GROUP 及其选项


    | 选项 | 描述 |

    | --- | --- |

    | `AUTOMATED_BACKUP_PREFERENCE` | 指定应使用哪个副本进行备份。可能的选项有 `PRIMARY`，表示始终使用主副本；`SECONDARY_ONLY`，表示绝不在主副本上执行备份；`SECONDARY`，表示不应在主副本上进行备份，除非主副本是唯一在线副本；以及
    `NONE`，表示在选择从哪个副本进行备份时，将忽略每个副本的角色。 |

    | `FAILURE_CONDITION_LEVEL` | 指定应导致可用性组自动故障转移的事件。可接受的级别为 1-5。 |

    | `HEALTH_CHECK_TIMEOUT` | 以毫秒为单位指定持续时间，集群将在此时间内等待运行状况检查过程的响应，之后才认为节点无响应并进行故障转移。
    |

    | `DB_FAILOVER` | 当可用性组有多个数据库时，确定组内单个数据库脱离 `ONLINE` 状态是否触发故障转移。 |

    | `DTC_SUPPORT` | 指定在可用性组内是否支持使用 DTC（分布式事务协调器）的跨数据库事务。可接受的值为 `PER_DB` 或 `NONE`。
    |

    | `BASIC` | 用于创建基本可用性组。基本可用性组在 第 7 章 中讨论。 |

    | `DISTRIBUTED` | 用于创建分布式可用性组。这在 第 7 章 中讨论。 |

    | `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT` | 可用于确保零 RPO，方法是在继续之前强制在辅助副本上提交。`0`
    表示事务将被标记为 `NOT SYNCHRONIZED`，但副本将继续处理事务。 |

    | `CLUSTER_TYPE` | 指定可用性组驻留的集群类型。可能的值有 `WSFC`，表示 Windows 故障转移集群；`EXTERNAL`，表示非
    Windows 集群，如 Linux Pacemaker；或 `NONE`，表示无集群可用性组。 |


    有关每个故障级别的详细信息，请参见表 5-2。


    表 5-2 详细说明了将根据指定的故障条件级别触发自动故障转移的事件。


    **表 5-2** 故障条件级别


    | 级别 | 触发故障转移的事件 |

    | --- | --- |

    | 1 | • SQL Server 服务停止。<br>• 由于未收到确认，SQL Server 实例在集群中的租约已过期。 |

    | 2 | • 任何级别 1 的条件。<br>• SQL 实例未连接到集群，且运行状况检查阈值超出。<br>• 可用性副本处于 `FAILED` 状态。 |

    | 3 (默认) | • 任何级别 1-2 的条件。<br>• SQL Server 实例内部出现严重错误。 |

    | 4 | • 任何级别 1-3 的条件。<br>• SQL Server 实例内部出现中等错误。 |

    | 5 | • 任何级别 1-4 的条件。<br>• SQL Server 实例内部出现任何故障。 |


    使用 `REPLICA ON` 子句添加副本时，还可以使用额外的 `WITH OPTIONS`。这些选项详见表 5-3。


    **表 5-3** ON REPLICA WITH 选项


    | 选项 | 描述 |

    | --- | --- |

    | `ENDPOINT_URL` | 托管副本的 SQL Server 实例上的终结点 URL。 |

    | `FAILOVER_MODE` | 指定副本应支持自动还是手动故障转移。 |

    | `AVAILABILITY_MODE` | 指定副本上的事务应同步还是异步提交。可用性模式也可以设置为 `CONFIGURATION_ONLY` 模式，以支持外部集群模式。这将在
    第 6 章 中讨论。 |

    | `SESSION_TIMEOUT` | 指定会话超时时间（以秒为单位）。 |

    | `BACKUP_PRIORITY` | 为副本提供一个权重值，用于决定应从哪个副本进行备份。`0` 表示不能从该副本进行备份。 |

    | `SEEDING_MODE` | 指定如何对副本进行播种。可接受的值为 `AUTOMATIC` 和 `MANUAL`。 |

    | `PRIMARY_ROLE` | 用于指定 `ALLOW_CONNECTIONS` 设置并传递 `READ_ONLY_ROUTING_LIST`。 |

    | `SECONDARY_ROLE` | 用于为 `ALLOW_CONNECTIONS` 指定一个值并传递 `READ_ONLY_ROUTING_URL`。
    |


    因此，清单 5-6 中的脚本将创建 `Accounts` 可用性组。请注意，我们选择手动播种副本。


    ```

    CREATE AVAILABILITY GROUP Accounts

    WITH (

    AUTOMATED_BACKUP_PREFERENCE = PRIMARY,

    DB_FAILOVER = OFF,

    DTC_SUPPORT = NONE,

    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0

    )

    FOR

    REPLICA ON

    ''CLUSTERNODE1\PROD'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE1.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    ),

    ''CLUSTERNODE2\SYNCHA'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE2.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    ),

    ''CLUSTERNODE3\ASYNCDR'' WITH (

    ENDPOINT_URL = N''TCP://CLUSTERNODE3.AlwaysOn.com:5022'',

    FAILOVER_MODE = MANUAL,

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    );

    GO

    ```

    **清单 5-6** 创建 Accounts 可用性组


    现在我们已经创建了 `Accounts` 可用性组，我们需要创建一个可用性组侦听器，以便集群知道将请求定向到哪里。我们将使用带有 `ADD LISTENER`
    子句的 `ALTER AVAILABILITY GROUP` 命令来完成此操作。`ADD LISTENER` 子句具有表 5-4 中指定的 `WITH` 选项。


    **表 5-4** ADD LISTENER WITH 选项


    | 选项 | 描述 |

    | --- | --- |

    | `IP` | 指定侦听器将侦听的 IP 地址，以及与每个 IP 地址相关的网络子网掩码。 |

    | `PORT` | 侦听器将侦听的端口。 |


    因为我们的 `CLUSTERNODE3\ASYNCDR` 实例与 `CLUSTERNODE1\PROD` 和 `CLUSTERNODE2\SYNCHA` 位于不同的子网中，我们需要指定两个
    IP 地址，每个子网一个。因此，清单 5-7 中的脚本将为 `Accounts` 可用性组创建可用性组侦听器。


    ```

    ALTER AVAILABILITY GROUP Accounts

    ADD LISTENER ''Accounts'' (

    WITH IP

    (

    (N''10.0.0.8'', N''255.255.255.0''),

    (N''10.0.1.8'', N''255.255.255.0'')

    ),

    PORT=1433

    );

    GO

    ```

    **清单 5-7** 创建可用性组侦听器

    '
- fmt: '# Implementing Availability Groups with PowerShell


    As you might expect, Microsoft offers PowerShell cmdlets that can be used to create
    and manage SQL Server Availability Groups and Availability Group Listeners. This
    is becoming increasingly important, as the world moves toward a DevOps culture,
    with PowerShell being the language of choice for many organizations looking to
    implement build automation.


    The `sqlserver` PowerShell module is installed along with the SQL Server Management
    Studio, but can also be installed by using the command in Listing [5-8](#394392_3_En_5_Chapter.xhtml#PC8).


    ```

    Install-Module sqlserver

    Listing 5-8

    Install the sqlserver PowerShell Module

    ```


    Note


    If this is the first time you have installed a PowerShell module on the server,
    then you will be prompted to install the NuGet provider.


    Once the `sqlserver` module is installed, you will have access to cmdlets which
    allow you to create and manage Availability Groups via PowerShell. The `New-AvailabilityReplica`
    cmdlet allows you to create an object which specifies the properties for each
    Replica. These objects can then be passed to the `New-SqlAvailabilityGroup` cmdlet,
    which will create the Availability Group.


    For example, imagine we want to create an Availability Group called `Foo`, which
    will contain the `Foo` database, with `CLUSTERNODE1\PROD` hosting the initial
    primary Replica and `CLUSTERNODE2\SYNCHA` hosting a secondary Replica, for high
    availability. We could achieve this using the script in Listing [5-9](#394392_3_En_5_Chapter.xhtml#PC9).


    ```

    #Create connection to CLSUETERNODE1\PROD

    $PrimaryServer = Get-Item "SQLSERVER:\SQL\CLUSTERNODE1\PROD" -Verbose

    #Create connection to CLUSTERNODE2\SYNCHA

    $SecondaryServer = Get-Item "SQLSERVER:\SQL\CLUSTERNODE2\SYNCHA"

    #Set the properties of the primary Replica

    $PrimaryReplicaOptions = @{

    Name             = "CLUSTERNODE1\PROD"

    EndpointUrl      = "TCP://CLUSTERNODE1.ALWAYSON.COM:5022"

    FailoverMode     = "Automatic"

    AvailabilityMode = "SynchronousCommit"

    Version          = ($PrimaryServer.Version)

    }

    #Create the primary Replica Object

    $PrimaryReplica = New-SqlAvailabilityReplica @PrimaryReplicaOptions  -AsTemplate

    #Set the properties of the secondary Replica

    $SecondaryReplicaOptions = @{

    Name             = "CLUSTERNODE2\SYNCHA"

    EndpointUrl      = "TCP://CLUSTERNODE2.ALWAYSON.COM:5022"

    FailoverMode     = "Automatic"

    AvailabilityMode = "SynchronousCommit"

    Version          = ($SecondaryServer.Version)

    }

    #Create the secondary replica object

    $SecondaryReplica = New-SqlAvailabilityReplica @SecondaryReplicaOption -AsTemplate

    $AvailabilityGroupOptions = @{

    InputObject         = $PrimaryServer

    Name =              = "Foo"

    AvailabilityReplica = ($PrimaryReplica, $SecondaryReplica)

    Database            = @("Foo")

    }

    New-SqlAvailabilityGroup @AvailabilityGroupOptions

    Listing 5-9

    Create to Foo Availability Group

    ```


    We could then create an Availability Group Listener by using the `New-SqlAvailabilityGroupListener`
    cmdlet. This is demonstrated in Listing [5-10](#394392_3_En_5_Chapter.xhtml#PC10).


    ```

    #Specify the options for the Listener

    $ListenerOptions = @{

    Name = "Foo"

    StaticIp = "10.0.0.14/255.255.255.0"

    Path = "SQLSERVER:\Sql\CLUSTERNODE1\PROD\AvailabilityGroups\Foo"

    }

    #Create the Listener

    New-SqlAvailabilityGroupListener @ListenerOptions

    Listing 5-10

    Create an Availability Group Listener

    ```


    ## Summary


    AlwaysOn Availability Groups can be implemented with up to eight secondary replicas,
    combining both Synchronous and Asynchronous Commit modes. When implementing high
    availability with availability groups, you always use Synchronous Commit mode,
    because Asynchronous Commit mode does not support automatic failover. When implementing
    Synchronous Commit mode, however, you must be aware of the associated performance
    penalty caused by committing the transaction on the secondary replica before it
    is committed on the primary replica. For disaster recovery, you will normally
    choose to implement Asynchronous Commit mode.


    The availability group can be created via the New Availability Group wizard, through
    dialog boxes, through T-SQL, or even through PowerShell. If you create an availability
    group using dialog boxes, then some aspects, such as the endpoint and associated
    permissions, must be scripted using T-SQL or PowerShell.


    If you implement disaster recovery with availability groups, then you need to
    configure a multi-subnet cluster. This does not mean that you must have SAN replication
    between the sites, however, since availability groups do not rely on shared storage.
    What you do need to do is add additional IP addresses for the administrative cluster
    access point and also for the Availability Group Listener. You also need to pay
    attention to the properties of the cluster that support client reconnection to
    ensure that clients do not experience a high number of timeouts.


    # 6. Implementing AlwaysOn Availability Groups On Linux


    Since SQL Server 2017, it has been possible to install SQL Server on Linux as
    well as Windows. AlwaysOn Availability Groups can be configured on Linux with
    much of the same functionality, as when the instances are hosted on Windows. The
    installation and configuration of SQL Server on Linux is beyond the scope of this
    book, but full details can be found in the Apress title *Pro SQL Server 2019 Administration*,
    which can be found at [`www.apress.com/gb/book/9781484250884#otherversion=9781484250891`](http://www.apress.com/gb/book/9781484250884%2523otherversion%253D9781484250891).


    This chapter focuses on configuring Availability Groups on Linux, for the purpose
    of providing high availability (HA). We will first have a brief overview of the
    technologies involved in implementing pacemaker clusters (Pacemaker is a Linux-based
    clustering technology), before configuring a two-node Availability Group, with
    automatic failover.


    Note


    For the demonstrations in this chapter, we will use three servers, namely, LinuxProd,
    LinuxSyncHA, and LinuxConfig. A default instance of SQL Server 2019 is installed
    on each of the servers. The servers are built with the Ubuntu 18.04 operating
    system and are not joined to a domain.


    In this chapter, we will perform the following activities:


    *   Create the Sales Databases.


    *   Enable Availability Groups on our instances and prepare the instances to support
    Availability Groups.


    *   Create an Availability group for the Sales database.


    *   Create the cluster.


    *   Configure the cluster.


    ## Linux Cluster Technologies


    The following sections will provide a high-level overview of the technologies
    that are used to configure a cluster in Linux. Before we begin, however, it is
    important to understand that unlike building Availability Groups on a Windows
    cluster, when building Availability Groups on a Linux pacemaker cluster, the Availability
    Group is not integrated with the cluster to the same degree. Specifically, the
    Availability Group is not aware of the cluster’s state, or even existence. Therefore,
    failover operations must be performed at the cluster level. Additionally, while
    it is still possible to create a listener, the functionality is limited. You need
    to manually register the listener’s name in DNS and there is no support for read-only
    routing.


    ### Pcs


    When you install `pcs`, the package will also install Pacemaker and Corosync.
    The `pcs` component itself, however, is a command-line utility, which is used
    to manage the Pacemaker cluster.'
