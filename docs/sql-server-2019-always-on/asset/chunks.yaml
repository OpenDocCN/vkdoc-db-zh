    In this chapter, we will perform the following activities:


    *   Create Sales, Customers, Accounts, and HR Databases.


    *   Enable Availability Groups on our instances.


    *   Create an Availability group for the HR Database, using the New Availability
    Group wizard. This Availability Group will be configured for HA only.


    *   Create an Availability Group for the Sales and Customers database using the
    New Availability Group dialog box. This will be configured for HA, DR, and read-scaling.


    *   Create an Availability Group for the Accounts database using T-SQL. This Availability
    Group will be configured for HA and DR without any read-scaling.


    *   We will also discuss how PowerShell can be used to create Availability Groups.


    ## Preparing to Implement AlwaysOn Availability Groups


    Before implementing AlwaysOn Availability Groups, we first create four databases,
    which we will use during the demonstrations in this chapter. Each contains a single
    table, which we populate with data. Each database is configured with Recovery
    mode set to `FULL`. This is a hard requirement for a database to use AlwaysOn
    Availability Groups because data is synchronized via a log stream. The script
    in Listing [5-1](#394392_3_En_5_Chapter.xhtml#PC1) creates these databases.'
