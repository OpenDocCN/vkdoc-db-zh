    清单 5-1：创建数据库


    # 配置 SQL Server


    配置 AlwaysOn 可用性组的第一步是在 SQL Server 服务上启用此功能。要从 GUI 启用此功能，我们打开 SQL Server 配置管理器，浏览到
    `SQL Server 服务`，并从 SQL Server 服务的上下文菜单中选择 `属性`。当我们这样做时，会显示服务属性，我们导航到 `Always On
    可用性组` 选项卡，如图 5-1 所示。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig1_HTML.jpg](img/394392_3_En_5_Fig1_HTML.jpg)


    图 5-1：`Always On 可用性组` 选项卡


    在此选项卡上，我们勾选 `启用 AlwaysOn 可用性组` 复选框，并确保 `Windows 故障转移群集名称` 框中显示的群集名称正确。然后我们需要重新启动
    SQL Server 服务。因为 AlwaysOn 可用性组使用独立实例（这些实例本地安装在每个群集节点上），而不是跨越多个节点的故障转移群集实例，所以我们需要对群集上托管的每个独立实例重复这些步骤。


    我们也可以使用 PowerShell 来启用 AlwaysOn 可用性组。为此，我们使用清单 5-2 中的 PowerShell 命令。该脚本假定 `CLUSTERNODE1`
    是服务器名称，`PROD` 是 SQL Server 实例名称。


    ```powershell

    Enable-SqlAlwaysOn -Path SQLSERVER:\SQL\CLUSTERNODE1\PROD

    ```


    清单 5-2：启用 AlwaysOn 可用性组


    下一步是对将成为可用性组一部分的所有数据库进行完整备份。在完成此操作之前，我们将无法将它们添加到可用性组。在本章中，我们将创建三个独立的可用性组。然而，在第一个例子中，我们将创建一个名为
    `HR` 的可用性组，它将为 `HR` 数据库提供高可用性。因此，我们需要备份 `HR` 数据库。我们通过运行清单 5-3 中的脚本来实现这一点。


    ```sql

    BACKUP DATABASE HR

    TO  DISK = N''C:\Backups\HR.bak''

    WITH NAME = N''HR-完整数据库备份'' ;

    GO

    ```


    清单 5-3：备份数据库'
- fmt: '## 使用新建可用性组向导


    当备份成功完成后，我们通过 SSMS 中“对象资源管理器”里的“AlwaysOn 高可用性”进行导航，并从“可用性组”文件夹的上下文菜单中选择“新建可用性组向导”来启动该向导。向导的“简介”页面随即显示，为我们概述了需要执行的步骤。


    在“指定名称”页面（参见图 [5-2](#394392_3_En_5_Chapter.xhtml#Fig2)），系统会提示我们为可用性组输入一个名称。我们还需要选择“Windows
    Server 故障转移群集”作为“群集类型”。其他群集类型选项包括“外部”（支持 Linux 上的 Pacemaker）和“无”（用于无群集的可用性组）。“数据库级别运行状况检测”选项将导致可用性组在组内任何数据库脱机时发生故障转移。“每数据库
    DTC 支持”选项将指定是否支持使用 MSDTC（Microsoft 分布式事务处理协调器）的跨数据库事务。完整讨论配置 DTC 超出了本书范围，但更多详细信息可在
    [`https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291(v=vs.85)`](https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291%2528v%253Dvs.85%2529)
    找到。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig2_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig2_HTML.jpg)


    图 5-2：指定名称页面


    在“选择数据库”页面，系统会提示我们选择希望参与可用性组的数据库，如图 [5-3](#394392_3_En_5_Chapter.xhtml#Fig3) 所示。在此屏幕上，请注意我们无法选择
    `Sales`、`Customers` 或 `Accounts` 数据库，因为我们尚未对这些数据库进行完整备份。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig3_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig3_HTML.jpg)


    图 5-3：选择数据库页面


    “指定副本”页面包含五个选项卡。我们使用第一个选项卡“副本”来向拓扑中添加辅助副本。选中“同步提交”选项会导致数据在提交到主副本之前先在辅助副本上提交。（这也被称为在辅助副本上先于主副本“固化日志”）。这意味着在发生故障转移时，不会发生数据丢失，即我们可以满足
    SLA（服务级别协议）中 RPO（恢复点目标）为零的要求。然而，这也意味着性能会有所下降。如果选择“异步提交”，则副本将以异步提交模式运行。这意味着数据在提交到辅助副本之前先在主副本上提交。这避免了性能下降，但也意味着在发生故障转移时，RPO
    是不确定的。


    当我们选中“自动故障转移”选项时，如果我们尚未选择“同步提交”，它也会被自动选中。这是因为自动故障转移仅在同步提交模式下才可能实现。我们可以将“可读辅助副本”下拉菜单设置为“否”、“是”或“仅意向读”。当设置为“否”时，处于辅助角色的副本上的数据库不可访问。当设置为“仅意向读”时，可用性组侦听器可以将只读工作负载重定向到此辅助副本，但前提是应用程序在连接字符串中指定了
    `Application Intent=Read-only`。将其设置为“是”则使侦听器能够重定向只读流量，无论应用程序的连接字符串中是否包含 `Application
    Intent` 参数。尽管我们可以同时通过 GUI 更改“可读辅助副本”的值并配置副本进行自动故障转移而不报错，但这只是向导的一个特性。实际上，该副本是不可访问的，因为在配置为自动故障转移时不支持活动辅助副本。“副本”选项卡如图
    [5-4](#394392_3_En_5_Chapter.xhtml#Fig4) 所示。为了满足我们为 HR 数据库实现高可用性的要求，我们将同一站点内的辅助服务器配置为同步副本。这意味着数据中心之间的延迟不会加剧与同步提交相关的性能下降。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig4_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig4_HTML.jpg)


    图 5-4：“副本”选项卡


    在“指定副本”页面的“端点”选项卡上（如图 [5-5](#394392_3_En_5_Chapter.xhtml#Fig5) 所示），我们为每个端点指定端口号。默认端口为
    `5022`，但如果需要，我们可以指定不同的端口。在此选项卡上，我们还指定在端点之间发送数据时是否应进行加密。选中此选项通常是个好主意，如果选中，则使用 AES（高级加密标准）作为加密算法。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig5_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig5_HTML.jpg)


    图 5-5：“端点”选项卡


    （可选）您还可以更改所创建端点的名称。但是，由于每个实例只允许一个数据库镜像端点，而且默认名称具有相当的描述性，因此并不总是需要更改它。一些 DBA 选择重命名它以包含实例名称，因为这可以简化多服务器的管理。如果您的企业在同一群集的多个实例上拆分了多个可用性组，这是一个好主意。


    每个实例使用的服务帐户出于信息目的而显示。如果您确保两个实例使用相同的服务帐户，则可以简化安全管理。如果未能做到这一点，您将需要为每个实例授予对每个服务帐户的权限。这意味着，您不是通过仅将一个服务帐户用于一个实例来减小其安全影响范围，而是将其影响范围简单地从操作系统级别提升到
    SQL Server 级别。


    端点 URL 指定了可用性组将用于通信的端点的 URL。URL 的格式为 `[传输协议]://[路径]:[端口]`。数据库镜像端点的传输协议始终是 TCP（传输控制协议）。路径可以是服务器的完全限定域名
    (FQDN)、单独的服务器名称，或是网络中唯一的 IP 地址。我建议使用服务器的 FQDN，因为这始终保证可以工作。它也是默认填写的数值。端口应与您为端点指定的端口号匹配。


    注意'
  raw: '## Using the New Availability Group Wizard


    When the backups complete successfully, we invoke the New Availability Group wizard
    by drilling through AlwaysOn High Availability in Object Explorer, within SSMS
    and selecting the New Availability Group wizard from the context menu of the Availability
    Groups folder. The Introduction page of the wizard is displayed, giving us an
    overview of the steps that we need to undertake.


    On the Specify Name page (see Figure [5-2](#394392_3_En_5_Chapter.xhtml#Fig2)),
    we are prompted to enter a name for our availability group. We will also select
    Windows Server Failover Cluster as the Cluster Type. Other options for cluster
    type are external, which supports Pacemaker on Linux, and None, which is used
    for Clusterless Availability Groups. The Database Level Health Detection option
    will cause the Availability Group to fail over, should any database within the
    group go offline. The Per Database DTC Support option will specify if cross-database
    transactions are supported, using MSDTC (Microsoft Distributed Transaction Coordinator).
    A full discussion of configuring DTC is beyond the scope of this book, but further
    details can be found at [`https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291(v=vs.85)`](https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291%2528v%253Dvs.85%2529).


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig2_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The Specify Name Page


    On the Select Databases page, we are prompted to select the database(s) that we
    wish to participate in the availability group, as illustrated in Figure [5-3](#394392_3_En_5_Chapter.xhtml#Fig3).
    On this screen, notice that we cannot select the `Sales`, `Customers,` or `Accounts`
    databases, because we have not yet taken a full backup of these databases.


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig3_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig3_HTML.jpg)


    Figure 5-3


    The Select Database Page


    The Specify Replicas page consists of five tabs. We use the first tab, Replicas,
    to add the secondary replicas to the topology. Checking the Synchronous Commit
    option causes data to be committed on the secondary replica before it is committed
    on the primary replica. (This is also referred to as *hardening the log* on the
    secondary before the primary.) This means that, in the event of a failover, data
    loss is not possible, meaning that we can meet an SLA (service-level agreement)
    with an RPO (recovery point objective) of zero. It also means that there will
    be a performance degradation, however. If we choose Asynchronous Commit, then
    the replica operates in Asynchronous Commit mode. This means that data is committed
    on the primary replica before being committed on the secondary replica. This stops
    us from suffering performance degradation, but it also means that, in the event
    of failover, the RPO is nondeterministic.


    When we check the Automatic Failover option, the Synchronous Commit option is
    also selected automatically if we have not already selected it. This is because
    automatic failover is only possible in Synchronous Commit mode. We can set the
    Readable Secondary drop-down to No, Yes, or Read-intent. When we set it to No,
    the database is not accessible on replicas that are in a secondary role. When
    we set it to Read-intent, the Availability Group Listener can redirect read-only
    workloads to this secondary replica, but only if the application has specified
    `Application Intent=Read-only` in the connection string. Setting it to Yes enables
    the listener to redirect read-only traffic, regardless of whether the `Application
    Intent` parameter is present in the application’s connection string. Although
    we can change the value of Readable Secondary through the GUI while at the same
    time configuring a replica for automatic failover without error, this is simply
    a quirk of the wizard. In fact, the replica is not accessible, since active secondaries
    are not supported when configured for automatic failover. The Replicas tab is
    illustrated in Figure [5-4](#394392_3_En_5_Chapter.xhtml#Fig4). To meet our requirement
    of achieving high availability for the HR database, we have configured the secondary
    server within the same site as a synchronous replica. This means that the latency
    between data centers will not compound the performance degradation, which is associated
    with synchronous commits.


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig4_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig4_HTML.jpg)


    Figure 5-4


    The Replicas Tab


    On the Endpoints tab of the Specify Replicas page, illustrated in Figure [5-5](#394392_3_En_5_Chapter.xhtml#Fig5),
    we specify the port number for each endpoint. The default port is 5022, but we
    can specify a different port if we need to. On this tab, we also specify if data
    should be encrypted when it is sent between the endpoints. It is usually a good
    idea to check this option, and if we do, then AES (Advanced Encryption Standard)
    is used as the encryption algorithm.


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig5_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig5_HTML.jpg)


    Figure 5-5


    The Endpoints Tab


    Optionally, you can also change the name of the endpoint that is created. Because
    only one database mirroring endpoint is allowed per instance, however, and because
    the default name is fairly descriptive, there is not always a reason to change
    it. Some DBAs choose to rename it to include the name of the instance, since this
    can simplify the management of multiple servers. This is a good idea if your enterprise
    has multiple availability groups, split across multiple instances on the same
    cluster.


    The service account each instance uses is displayed for informational purposes.
    It simplifies security administration if you ensure that the same service account
    is used by both instances. If you fail to do this, you will need to grant each
    instance permissions to each service account. This means that instead of reducing
    the security footprint of each service account by using it for one instance only,
    you simply push the footprint up to the SQL Server level instead of the operating
    system level.


    The endpoint URL specifies the URL of the endpoint that availability groups will
    use to communicate. The format of the URL is `[Transport Protocol]://[Path]:[Port]`.
    The transport protocol for a database mirroring endpoint is always TCP (Transmission
    Control Protocol). The path can either be the fully qualified domain name (FQDN)
    of the server, the server name on its own, or an IP address, which is unique across
    the network. I recommend using the FQDN of the server, because this is always
    guaranteed to work. It is also the default value populated. The port should match
    the port number that you specify for the endpoint.


