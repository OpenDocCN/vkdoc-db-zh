    如果您有一个超过两个节点的集群，那么在应用 SQL Server 更新时，请考虑执行滚动补丁升级。在此场景中，您可以降低运行不同版本或补丁级别的 SQL Server
    的不同节点（这些节点可能是角色的所有者）的风险。


    您应该做的第一件事是制作角色可能所有者的所有节点列表。然后，选择其中 50% 的节点，并从“可能的所有者”列表中移除它们。您可以通过从“名称”资源的上下文菜单中选择“属性”，然后在“高级策略”选项卡中取消选中可能所有者列表中的节点来完成此操作，如图
    8-2 所示。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig2_HTML.jpg](img/394392_3_En_8_Fig2_HTML.jpg)


    **图 8-2** 移除可能的所有者


    要使用 PowerShell 实现相同的结果，我们可以使用 `Get-Resource` cmdlet 导航到名称资源，然后通过管道传递 `Set-ClusterOwnerNode`
    来配置可能的所有者列表。清单 8-2 演示了这一点。如果配置了多个可能的所有者，则可能所有者列表以逗号分隔。


    ```

    Get-ClusterResource "SQL Network Name (ALWAYSON-SQL-C)" | Set-ClusterOwnerNode
    -Owners clusternode1

    清单 8-2 配置可能的所有者

    ```


    一旦 50% 的节点被移除作为可能的所有者，您应该将更新应用到这些节点。在此半数节点上验证更新后，您应重新配置它们以再次允许它们成为可能的所有者。


    下一步是将角色移动到您已升级的节点之一。故障转移成功完成后，在将更新应用到其他半数节点之前，将它们从可能的所有者列表中移除。在此半数节点上验证更新后，您可以将它们放回可能的所有者列表。


    > **提示**

    >

    > 可能的所有者只能在资源上设置。如果您对角色运行 `Set-ClusterOwnerNode` 并使用 `-Group` 参数，那么您正在配置的是首选所有者，而不是可能的所有者。

    '
- fmt: '### Removing a Node from the Cluster


    > **Note**

    >

    > Do not follow the demonstration in this section, if you wish to follow the subsequent
    demonstrations in this book.


    If you wish to uninstall an AlwaysOn failover cluster instance, then you cannot
    perform this action from Control Panel as you would a stand-alone instance. Instead,
    you must run the Remove Node Wizard on each of the nodes of the cluster. You can
    invoke this wizard by selecting **Remove Node from a SQL Server Failover Cluster**
    option from the Maintenance tab in SQL Server Installation Center.


    The wizard starts by running a global rules check, followed by a rules check for
    removing a node. Then, on the Cluster Node Configuration page shown in Figure
    [8-3](#394392_3_En_8_Chapter.xhtml#Fig3), you are asked to confirm the instance
    for which you wish to remove a node. If the cluster hosts multiple instances,
    you can select the appropriate instance from the drop-down box.


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig3_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig3_HTML.jpg)

    *Figure 8-3. The Cluster Node Configuration Page*


    On the Ready to Remove Node page, you are given a summary of the tasks that will
    be performed. After confirming the details, the instance is removed. This process
    should be repeated on all passive nodes and then finally on the active node. When
    the instance is removed from the final node, the cluster role is also removed.


    To remove a node using PowerShell, we need to run SQL Server’s `setup.exe` application,
    with the action parameter configured as `RemoveNode`. When you use PowerShell
    to remove a node, the parameters in Table [8-1](#394392_3_En_8_Chapter.xhtml#Tab1)
    are mandatory.


    *Table 8-1. Mandatory Parameters When Removing a Node from a Cluster*


    | Parameter | Usage |

    | :--- | :--- |

    | `/ACTION` | Must be configured as `RemoveNode`. |

    | `/INSTANCENAME` | The instance that you are adding the extra node to support.
    |

    | `/CONFIRMIPDEPENDENCYCHANGE` | Allows multiple IP addresses to be specified
    for multi-subnet clusters. Pass in a value of `1` for `True` or `0` for `False`.
    |


    The script in Listing [8-3](#394392_3_En_8_Chapter.xhtml#PC3) removes a node from
    our cluster when we run it from the root directory of the SQL Server installation
    media.


    ```

    .\setup.exe /ACTION="RemoveNode" /INSTANCENAME="ALWAYSON-SQL-C" /CONFIRMIPDEPENDENCYCHANGE=0
    /qs

    ```

    *Listing 8-3. Removing a Node*


    ## Managing AlwaysOn Availability Groups


    Once the initial setup of your availability group is complete, you still need
    to perform administrative tasks. These include failing over the availability group,
    monitoring, and on rare occasions, adding additional listeners. These topics are
    discussed in the following sections.


    ### Failover


    If a replica is in Synchronous Commit mode and is configured for automatic failover,
    then the availability group automatically moves to a redundant replica in the
    event of an error condition being met on the primary replica. There are occasions,
    however, when you will want to manually fail over an availability group. This
    could be because of DR testing, proactive maintenance, or because you need to
    bring up an asynchronous replica following a failure of the primary replica or
    the primary data center.


    #### Synchronous Failover


    If you wish to fail over a replica that is in Synchronous Commit mode, launch
    the Failover Availability Group wizard by selecting **Failover** from the context
    menu of your availability group in Object Explorer. After moving past the Introduction
    page, you find the Select New Primary Replica page (see Figure [8-4](#394392_3_En_8_Chapter.xhtml#Fig4)).
    On this page, check the box of the replica to which you want to fail over. Before
    doing so, however, review the Failover Readiness column to ensure that the replicas
    are synchronized and that no data loss will occur.


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig4_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig4_HTML.jpg)

    *Figure 8-4. The Select New Primary Replica Page*


    On the Connect to Replica page, illustrated in Figure [8-5](#394392_3_En_8_Chapter.xhtml#Fig5),
    use the **Connect** button to establish a connection to the new primary replica.


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig5_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig5_HTML.jpg)

    *Figure 8-5. The Connect to Replica Page*


    On the Summary page, you are given details of the task to be performed, followed
    by a progress indicator on the Results page. Once the failover completes, check
    that all tasks were successful, and investigate any errors or warnings that you
    receive.


    We can also use T-SQL to fail over the availability group. The command in Listing
    [8-4](#394392_3_En_8_Chapter.xhtml#PC4) achieves the same results. Make sure to
    run this script from the replica that will be the new primary replica. If you
    run it from the current primary replica, use SQLCMD mode and connect to the new
    primary within the script.


    ```

    ALTER AVAILABILITY GROUP HR FAILOVER ;

    GO

    ```

    *Listing 8-4. Failing Over an Availability Group*'
