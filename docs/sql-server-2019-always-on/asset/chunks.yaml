    ## 概述


    SQL Server 为监控 AlwaysOn 可用性组的运行状况提供了丰富的工具。AlwaysOn 仪表板是 SQL Server Management
    Studio 中的一个交互式报告，它可以让您评估可用性组和副本的运行状况。它还提供了查看仲裁配置信息和实时运行状况数据的链接。


    实时运行状况数据由扩展事件会话捕获，该会话在您在实例上创建第一个可用性组时创建，并在后台运行，捕获预先配置的事件。可以自定义此跟踪；如果您需要自定义捕获，我建议保留默认配置并创建一个新的事件会话。


    创建事件会话允许您根据需求捕获非常细粒度的关注点，或者仅捕获较粗粒度的信息。扩展事件使用 WMI 实现，是一个非常轻量级的框架，这意味着您可以在不影响实例性能的情况下识别问题和趋势。


    # 10. 故障排除 AlwaysOn


    SQL Server 提供了大量与高可用性和灾难恢复对象相关的元数据，尤其是围绕 AlwaysOn 功能集。这些元数据可用于快速识别配置、查找问题的根本原因，或为可能发生的事件编写自动化响应脚本。以下部分将讨论可用的元数据，并提供如何使用它的示例。


    ## AlwaysOn 故障转移群集实例元数据


    从数据库引擎内部，可以查看有关群集实例及其承载它的 Windows 群集的大量元数据。这些信息对 DBA 来说非常有价值。以下部分将介绍一些最有用和最有趣的元数据对象。


    ### 发现实例所在的节点


    DBA 自然需要知道群集中哪个节点承载着故障转移群集实例，尤其是在尝试诊断连接或性能问题时。但是，如果贵组织有策略规定 DBA 不允许访问操作系统，则无法使用故障转移管理器。幸运的是，SQL
    Server 中有一个 DMV（动态管理视图）可以公开此信息。`sys.dm_os_cluster_nodes` DMV 将返回表 10-1 中详述的列。


    表 10-1

    `sys.dm_os_cluster_nodes` 的列


    | 列 | 描述 |

    | --- | --- |

    | `NodeName` | 群集节点的名称 |

    | `status` | 节点的当前状态。可能的值有：• 0 – 表示节点已启动• 1 – 表示节点已关闭• 2 – 表示节点已暂停• 3 – 表示节点当前正在加入群集• 4
    – 表示状态未知 |

    | `status_description` | 状态的文字描述。可能的值有：• 已启动• 已关闭• 已暂停• 正在加入• 未知 |

    | `is_current_owner` | 指示实例当前是否由此节点承载。可能的值有：• 0 – 表示节点不拥有该实例• 1 – 表示节点拥有该实例 |


    清单 10-1 中的查询将返回当前承载实例的群集节点的名称。


    ```sql

    SELECT NodeName

    FROM sys.dm_os_cluster_nodes

    WHERE is_current_owner = 1 ;

    ```

    清单 10-1

    发现承载实例的节点


    ### 查看运行状况检查配置


    如果 DBA 正在协助 Windows 管理团队处理群集实例的重复故障转移，他可能希望公开哪些条件可能导致故障转移的详细信息，以确保配置了适当的级别。这可以通过使用
    `sys.dm_os_cluster_properties` DMV 实现，该 DMV 返回表 10-2 中详述的列。


    表 10-2

    `sys.dm_os_cluster_properties` 的列


    | 列 | 描述 |

    | --- | --- |

    | `VerboseLogging` | 指示群集使用的日志记录级别。可能的值有：• 0 – 表示日志记录已关闭• 1 – 表示仅记录错误• 2 – 表示记录错误和警告
    |

    | `SQLDumperDumpFlags` | 指定 SQLDumper 将生成的转储文件类型。可能的值有：• 0x0120 – 表示小型转储• 0x0110
    – 表示完整转储• 0x8100 – 表示筛选的转储 |

    | `SQLDumperDumpPath` | 指定 SQLDumper 将输出转储文件的文件路径 |

    | `SQLDumperDumpTimeOut` | SQLDumper 创建转储文件时的超时值。以毫秒为单位指定 |

    | `FailureConditionLevel` | 将导致发生故障转移的故障级别。故障条件级别的完整说明可在表 10-3 中找到 |

    | `HealthCheckTimeout` | 数据库引擎在判定实例无响应之前，等待返回运行状况信息的持续时间 |


    `FailureConditionLevel` 列返回的可能的故障条件级别在表 10-3 中详述。


    表 10-3

    故障条件级别


    | 条件级别 | 描述 |

    | --- | --- |

    | 0 | 不会发生自动故障转移 |

    | 1 | 当 SQL Server 服务关闭时发生自动故障转移 |

    | 2 | 当满足以下条件时将发生自动故障转移：• 满足级别 1 的条件• 超过 `HealthCheckTimeout` 值 |

    | 3 | 当满足以下条件时将发生自动故障转移：• 满足级别 2 的条件• 运行状况检查返回系统错误 |

    | 4 | 当满足以下条件时将发生自动故障转移：• 满足级别 3 的条件• 运行状况检查返回资源错误 |

    | 5 | 当满足以下条件时将发生自动故障转移：• 满足级别 4 的条件• 运行状况检查返回查询处理错误 |


    清单 10-2 中的查询将返回当前的故障转移条件级别和当前的运行状况检查超时值。


    ```sql

    SELECT

    FailureConditionLevel

    , HealthCheckTimeout

    FROM sys.dm_os_cluster_properties ;

    ```

    清单 10-2

    返回运行状况检查配置


    可以使用 `sp_server_diagnostics` 系统存储过程手动确定实例的当前运行状况。该过程接受一个参数：`@repeat_interval`，它指定过程应返回结果的频率，以秒为单位。如果省略该参数，则结果将仅返回一次。如果为该参数传递了一个值，则该值必须大于
    5。该过程返回表 10-4 中详述的结果集。


    表 10-4

    `sp_server_diagnostics` 返回的列

    '
- fmt: '| Column | Description |

    | --- | --- |

    | `creation_time` | Indicates the time that the row was created |

    | `component_type` | Indicates the type of component. Possible values are • Instance
    • AlwaysOn: Availability Group |

    | `component_name` | Indicates the name of the component. Possible values are
    • system • resource • query_processing • io_subsystem • events • [Availability
    Group name] |

    | `state` | The health status of the component. Possible values are • 0 – Indicates
    that the state is unknown • 1 – Indicates that the state is clean (meaning healthy)
    • 2 – Indicates that there are warnings • 3 – Indicates that there are errors
    |

    | `state_desc` | A textual description of the component’s state. Possible values
    are • Unknown • Clean • Warnings • Errors |

    | `data` | An XML representation of component-specific data. For example, the
    resource component includes element specifying the available physical and available
    virtual memory. It also includes attributes including a count of out of memory
    exceptions |


    The script in Listing 10-3 will return the complete result set of the `sp_server_diagnostics`
    system stored procedure, alongside values which have been shredded from the XML
    column, to provide a quick view of the overall server CPU utilization, the CPU
    utilization of the instance, and a count of any out of memory exceptions that
    may have occurred.


    Tip


    A discussion around shredding XML is beyond the scope of this book. However, I
    recommend the Apress title `Expert Scripting and Automation for SQL Server DBAs`,
    where a discussion around working with XML for administrative purposes can be
    found. The book can be purchased at `www.apress.com/9781484219423`.


    ```

    CREATE TABLE #Server_Diagnostics

    (

    creation_time      DATETIME,

    component_type     NVARCHAR(8),

    component_name     NVARCHAR(128),

    [state]            TINYINT,

    state_desc         NVARCHAR(8),

    [data]             XML

    ) ;

    INSERT INTO #Server_Diagnostics

    EXEC sp_server_diagnostics ;

    SELECT *,

    data.value(''(/system/@systemCpuUtilization)[1]'',''int'') AS SystemCPUUtilization

    ,data.value(''(/system/@sqlCpuUtilization)[1]'',''int'') AS SQLServerCPU

    ,data.value(''(/resource/@outOfMemoryExceptions)[1]'',''int'') AS OutOfMemoryExceptions

    FROM ##Server_Diagnostics ;

    DROP TABLE #Server_Diagnostics ;

    ```


    Listing 10-3 Retrieving Diagnostic Information


    ## AlwaysOn Availability Group Metadata


    Metadata can also be used to troubleshoot issues with Availability Groups. The
    following sections will discuss some of the most useful and interesting metadata
    objects, relating the Availability Groups.


    ### Determining the Last Failover Reason


    If an Availability Group has failed over, one of the first questions you are likely
    to want to answer is “when and why?”. This question can be answered using the
    `sys.dm_hadr_availability_replica_states` DMV. This object returns the columns
    detailed in Table 10-5.


    Table 10-5 sys.dm_hadr_availability_replica_states


    | Column | Description |

    | --- | --- |

    | `replica_id` | The GUID of the Replica |

    | `group_id` | The GUID of the Availability Group |

    | `is_local` | Indicates if the Replica is local or remote. Possible values are
    • 0 – Indicates a remote secondary • 1 – Indicates a local Replica |

    | `role` | Indicates the role that is currently assigned to the Replica. Possible
    values are • 0 – Indicates that the role is currently being resolved • 1 – Indicates
    that the Replica has the Primary role • 2 – Indicates that the Replica currently
    has the Secondary role |

    | `role_desc` | A textual description of the Replica’s current role. Possible
    values are • RESOLVING • PRIMARY • SECONDARY |

    | `operational_state` | Indicates the current operational state of the replica.
    Possible values are • 0 – Indicates a failover is pending • 1 – Indicates the
    state is pending • 2 – Indicates online • 3 – Indicates offline • 4 – Indicates
    failed • 5 – Indicates failed, with no quorum • NULL – Indicates the Replica is
    not local |

    | `operational_state_desc` | A textual description of the operational state. Possible
    values are • PENDING_FAILOVER • PENDING • ONLINE • OFFLINE • FAILED • FAILED_NO_QUORUM
    • NULL |

    | `connected_state` | Indicates if a Secondary Replica is currently connected
    to the Primary Replica. Possible values are • 0 – Indicates the Replica is disconnected
    from the Primary • 1 – Indicates that the Replica is connected to the Primary
    |

    | `connected_state_desc` | A textual description of the connected state. Possible
    values are • DISCONNECTED • CONNECTED |

    | `recovery_health` | Indicates if databases within the Availability Group are
    online. Possible values are • 0 – Indicates that at least one of the databases
    is not online • 1 – Indicates that all of the databases are online • NULL – Indicates
    the Availability Group is not local |

    | `recovery_health_desc` | A textual description of the recovery_health. Possible
    values are • ONLINE_IN_PROGRESS • ONLINE • NULL |

    | `synchronization_health` | Indicates the synchronization state of the Availability
    Group’s databases. Possible values are • 0 – Indicates that at least one database
    is in the NOT SYNCHRONIZING state. This is known as Not Healthy • 1 – Indicates
    that at least one database is not in the ideal synchronization state. This is
    known as Partially Healthy The ideal state will be • SYNCHRONIZED – For synchronous-commit
    Replicas • SYNCHRONIZING – For asynchronous-commit Replicas • 2 – Indicates that
    all databases are in the ideal state. This is known as Healthy |

    | `synchronization_health_desc` | A textual description of the synchronization
    health state. Possible values are • NOT_HEALTHY • PARTIALLY_HEALTHY • HEALTHY
    |

    | `last_connect_error_number` | The error number of the last connection error
    |

    | `last_connect_error_description` | The description of the last connection error
    |

    | `last_connect_error_timestamp` | The date and time of the last connection error
    |


    The query in Listing 10-4 demonstrates how to return the time and reason of the
    last connection error. This will indicate when and why failover occurred. One
    row will be returned for each combination of Replica and Availability Group. You
    will notice that we join the `sys.dm_hadr_availability_replica_states` DMV to
    the `sys.availability_replicas` and `sys.availability_groups` DMVs, to retrieve
    the names of the nodes that host the Replicas and the names of the Availability
    Groups.


    ```

    SELECT

    ar.replica_server_name

    ,ag.name

    ,ars.last_connect_error_description

    ,ars.last_connect_error_timestamp

    FROM sys.dm_hadr_availability_replica_states ars

    INNER JOIN sys.availability_replicas ar

    ON ar.group_id = ars.group_id

    AND ars.replica_id = ar.replica_id

    INNER JOIN sys.availability_groups ag

    ON ag.group_id = ar.group_id ;

    ```


    Listing 10-4 Determine Last Failover Time and Reason


    ### Assessing the State of Availability Databases


    You may have noticed that the `sys.dm_hadr_availability_replica_states` DMV will
    provide details of Availability Groups that contain databases that are not in
