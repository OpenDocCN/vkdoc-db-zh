  trans: '

    # 创建虚拟机


    首先，我们需要三台虚拟机，用于安装 SQL Server。在 Azure 中，实现这一目标有多种方式，具体取决于你的需求。第一种选项是前往 Azure 市场，查找已安装
    SQL Server 的虚拟机镜像。如果选择这种方式，则必须了解有两种不同的许可条款。第一种是 `SPLA`（服务提供商许可协议）。采用 `SPLA` 许可时，虚拟机的成本已包含
    SQL Server 许可费用。这意味着你的许可基于 `按需付费` 模式，避免了前期采购许可的成本，但如果虚拟机需要长期运行，长期来看费用会更高。


    第二种选项是 `BYOL`（自带许可）。采用此许可模式时，SQL Server 许可费用不包含在虚拟机成本中。相反，你必须使用已采购的现有许可。选择此选项后，必须在
    10 天内向 Microsoft 报告你的许可使用情况。


    当你构建已安装 SQL Server 的虚拟机时，它会附带完整的 SQL Server 安装，包括所有功能。（除非你选择标记为 `仅数据库引擎` 的镜像。）这在大多数使用场景中并不理想，因为与仅安装所需功能相比，它的安全影响面和资源占用更大。因此，如果你使用预装
    SQL Server 的虚拟机镜像（无论许可模式如何），都应花时间自定义镜像以满足你的需求。


    或者，你可以直接从纯净的 Windows Server 镜像构建虚拟机并自行安装 SQL Server。这是最灵活的选择，但采用此方式时，你必须 `自带许可`。不会有
    `SPLA` 选项可用。


    在本例中，我们将使用 `Windows Server 2019 上的 SQL Server 2019` 镜像，采用 `SPLA` 许可。图 7-4 显示了此虚拟机镜像在
    Azure 市场中的图标。


    ![图 7-4：Windows Server 2019 上的 SQL Server 2019 虚拟机镜像](img/394392_3_En_7_Fig4_HTML.jpg)


    在 `创建虚拟机` 页面的第一部分（如图 7-5 所示），我们将指定虚拟机应创建在其中的 `订阅` 和 `资源组`，然后为服务器指定名称及其应创建在的 `区域`。


    ![图 7-5：创建虚拟机（第 1 部分）](img/394392_3_En_7_Fig5_HTML.jpg)


    接着，我们继续指定虚拟机所需的 `可用性选项`。这在规划可用性组时至关重要。在 `可用性选项` 对话框中，我们可以选择 `无需基础结构冗余`、`可用性集`
    或 `可用性区域`。如果我们选择了 `可用性集`，那么我们可以选择使用之前创建的 `可用性集` 或创建一个新的 `可用性集`。然而，我们选择了 `可用性区域`，因此可以指定服务器应创建在哪个
    `可用性区域` 中。每个区域至少有三个 `可用性区域`。


    > **注意**

    >

    > 但必须注意，创建虚拟机后无法更改 `可用性选项`。例如，你不能创建一个没有可用性选项的虚拟机，然后再将其添加到 `可用性集` 中。


    接下来，我们可以选择更改构建所用的镜像，并指定是否要使用 `Spot 实例`。`Spot 实例` 通常不适用于 SQL Server，在生产环境中更是如此。`Spot
    实例` 基于 Azure 中的闲置容量构建，成本效益很高。但是，如果 Azure 需要该容量，它们可能会在极短的通知内被终止。因此，`Spot 实例` 通常最适用于
    `规模集` 内的无状态应用程序，或测试环境中的无状态应用程序。


    我们还指定了要构建的虚拟机的大小。每月成本（基于服务器 24x7 运行）将显示在虚拟机规模配置文件的右侧。


    我们现在可以继续填写表单的下半部分，如图 7-6 所示。在这里，我们指定虚拟机 `管理员` 用户的用户名和密码，以及是否应为服务器在公共 IP 地址上打开端口。如果需要，我们可以指定应打开哪些端口。


    ![图 7-6：创建虚拟机（第 2 部分）](img/394392_3_En_7_Fig6_HTML.jpg)


    > **注意**

    >

    > 公共端口应仅出于开发/测试目的打开，即使如此，也强烈建议创建 VPN 或改用 `Bastion`。


    最后，我们指定要使用的许可模式。请注意，这仅适用于操作系统，不适用于 SQL Server，但我们仍然有相同的两种选择。我们可以为 Windows 许可 `按需付费`，或者
    `自带许可`。


    在 `磁盘` 页面（如图 7-7 所示），我们可以配置虚拟机的存储选项。在页面的第一部分，我们可以从 `标准 HDD`、`标准 SSD` 或 `高级 SSD`
    中选择想要使用的存储层。我建议为托管 SQL Server 的虚拟机使用 `高级 SSD`，这应该不足为奇，尽管你的选择可能受其他因素影响，例如公司政策或预算限制。


    ![图 7-7：创建虚拟机 – 磁盘页面](img/394392_3_En_7_Fig7_HTML.jpg)


    在页面的 `高级` 部分，我们可以指定是使用 `托管` 磁盘还是 `非托管` 磁盘，以及操作系统磁盘是否应为 `临时` 磁盘。通常推荐使用 `托管磁盘`，因为它们具有自动跨
    `容错` 域和 `更新` 域分布等优势。如果你的虚拟机构建在 `可用性集` 上，这些域还可以与 `可用性集` 的域对齐。在我们的情况下，必须使用 `托管磁盘`，因为这是
    `可用性选项` 配置为 `可用性区域` 时的唯一选项。


    `临时磁盘` 使用速度非常快的存储，但不具备终止容错能力。因此，它们适用于无状态应用程序，但不适用于运行 SQL Server 的虚拟机。在我们的情况下，我们甚至没有为操作系统选择
    `临时磁盘` 的选项，因为我们的镜像太大，无法支持它。


    在 `网络` 页面（图 7-8），我们可以指定虚拟机应连接到的 `虚拟网络` 和 `子网`，以及配置应使用的公共 IP 地址和安全组。在此页面上，还有一些选项（未图示）允许你配置
    `加速网络`，这是一项可实现虚拟机 `网卡`（网络接口卡）低延迟和高吞吐量的功能，但仅适用于较大的虚拟机，还可以让你将虚拟机置于预配置的 `负载均衡器` 后面。此选项不适用于
    SQL Server。


    ![图 7-8：创建虚拟机 – 网络](img/394392_3_En_7_Fig8_HTML.jpg)


    在 `管理` 页面（如图 7-9 所示），我们可以配置虚拟机的诊断设置。具体来说，我们可以选择是否捕获 `启动诊断` 和 `来自客户操作系统的诊断`，以及诊断数据应保存到哪个存储账户。


    ![图 7-9：创建虚拟机 – 管理页面](img/394392_3_En_7_Fig9_HTML.jpg)

    '
- fmt: 'We can also specify if we want a system-assigned managed identity to be used.
    If we select this option, then the VM can authenticate to native Azure services,
    such as `Key Vault`, without the need to store the service credentials in code.
    Finally, we can specify if we want the VM to shut down at a specific time. If
    we select this option, then additional dialog boxes appear, allowing us to specify
    the shutdown schedule and if we want to be notified of the shutdown.


    **Tip**


    When creating the VM, only a shutdown schedule can be added, but there is no option
    to create a startup schedule. This can be achieved by using an `Azure Automation
    account`.


    For our purposes, there is nothing that we need to configure on the **Advanced**
    page. However, this page can be used for passing configuration files to a known
    location within the VM, installing extensions of the VM, such as `Puppet Agent`,
    to allow for configuration management of the VM. If you want your VM to be placed
    on a **Proximity Group**, or you want it to reside on an existing dedicated host,
    then these options can also be configured on this page.


    ## SQL Server Settings


    Because we are building a `SQL Server` VM, we have a page for `SQL Server` settings,
    which would not appear if we were building a VM from a standard `Windows Server`
    image. In the first part of this page (Figure 7-10), we can configure the `SQL
    connectivity`. This will give us the option of making the `SQL Server` instance
    available within the VM only, within our `vnet`, or publicly accessible on the
    Internet. It goes without saying that making an instance available to the Internet
    is undesirable, usually even in dev/test scenarios.


    ![Figure 7-10](images/394392_3_En_7_Chapter/394392_3_En_7_Fig10_HTML.jpg)


    Create a Virtual Machine – `SQL Server` Settings (Part 1)


    We can also specify the port that the instance should listen on and if we want
    `SQL Server authentication` to be enabled (instead of just `Windows authentication`).
    If we choose this option, we can then specify the username and password of our
    desired administrator account.


    We can also select if we want the instance to be integrated with `Azure Key Vault`.
    If we choose this option, then we must provide the URL and credential information
    for the `Key Vault` service.


    In the next section of the page, we are presented with the default storage options
    for `SQL Server`. Using the **Change Configuration** link will cause the **Configure
    Storage** page to be invoked, as shown in Figure 7-11. On this page, there are
    presets, for **General**, **OLTP**, and **Data warehousing** workload profiles,
    which can be customized to meet your requirements. You can specify if `TempDB`
    and log files should use the same drive or share the data drive. You can also
    specify the size and storage type of each disk.


    ![Figure 7-11](images/394392_3_En_7_Chapter/394392_3_En_7_Fig11_HTML.jpg)


    Create a Virtual Machine – `SQL Server` Settings (Part 2)


    In the last section of the page, which is illustrated in Figure 7-12, we can specify
    the license model that we want to use for `SQL Server` (`BYOL` or `SPLA`), as
    well as specifying a patching window and choosing if we want automated backups.
    Finally, we can specify if we want `R Services` to be installed, which provides
    in-database machine learning features, which have been available since `SQL Server
    2017`.


    ![Figure 7-12](images/394392_3_En_7_Chapter/394392_3_En_7_Fig12_HTML.jpg)


    Create a Virtual Machine – `SQL Server` Settings (Part 3)


    On the **Tags** page, we can add tags in key/value pairs, as described in the
    “Creating an Availability Set” section of this chapter. On the **Review** page,
    we can review our chosen configuration, before creating the virtual machine.


    For our purposes, we should repeat this process to create a second VM, this time
    in `Availability Zone 2` and residing on the other subnet within the `vnet`.


    ## Configuring the Availability Group


    Once the two servers have been built, you will need to join the servers to your
    domain and configure settings such as firewall rules. You can then create a cluster
    using the methods demonstrated in Chapter 3 of this book. Because we are implementing
    **Availability Groups** and not a **Failover Clustered Instance**, then there
    is no requirement for any shared storage in the Cluster.


    After the Cluster has been configured, we can then build the Availability group
    by creating the `Sales database`, before configuring **Availability Groups** by
    using the methods discussed in Chapter 5 of this book. For the purpose of this
    exercise, the nodes should be configured with synchronous replication and automatic
    failover. Note that you should not create the **Availability Group Listener**
    at this point.


    In Azure, the **Availability Group Listener** will require an `Azure Load Balancer`,
    to hold the IP Addresses for the **Availability Group Listener** and **Failover
    Cluster**. We should create the **Load Balancer** before creating the **Availability
    Group Listener**.


    ## Creating the Azure Load Balancer


    The `Azure Load Balancer` has two tiers, with differing functionality. **Basic**
    is the cheaper of the tiers, with more limited functionality, and **Standard**
    being the higher of the tiers. Because our servers are in `Availability Zones`,
    we must use a **Standard Load Balancer**.


    To create the **Load Balancer**, navigate to the **Load Balancers** blade in Azure
    and select the **Add** button, to create a new **Load Balancer**. In the first
    section of the **Create Load Balancer** page, shown in Figure 7-13, we specify
    the **Subscription** and **Resource Group** that we want to create the **Load
    Balancer** in. This should match the **Resource Group** that your VMs are in.


    ![Figure 7-13](images/394392_3_En_7_Chapter/394392_3_En_7_Fig13_HTML.jpg)


    Create a Load Balancer (Part 1)


    We then provide a name for the **Load Balancer** and specify the region it should
    be created in. This should match the location of your VMs. We also select the
    tier of **Load Balancer** that we wish to create.


    In the next section of the page (Figure 7-14), we specify the network details
    for the **Load Balancer**. Specifically, we specify the `vnet` that it should
    reside in, which should match the `vnet` of your VMs. We also specify if it should
    use a **static** or **dynamic** IP Address. For our purposes, we need a **static**
    IP Address, so we need to specify what that address should be. Finally, we specify
    if the public IP address of the **Load Balancer** should be created in an `Availability
    Zone`, or if it should use a **zone-redundant** path.


    ![Figure 7-14](images/394392_3_En_7_Chapter/394392_3_En_7_Fig14_HTML.jpg)


    Create a Load Balancer (Part 2)


    On the **Tags** page, we can specify key/value pairs in line with company policies,
    before reviewing our configuration on the **Review** page.


    ## Adding a Backend Pool


    We now need to create a **Backend Pool** for the **Load Balancer**. This can be
    achieved by navigating to the **Backend Pools** tab of the **Load Balancer’s**
    blade in the Azure Portal and using the **Add** button, to invoke the **Add Backend
    Pool** page, shown in Figure 7-15.


    ![Figure 7-15](images/394392_3_En_7_Chapter/394392_3_En_7_Fig15_HTML.jpg)


    Add a Backend Pool'
