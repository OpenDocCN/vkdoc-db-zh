    ## 使用 PowerShell 添加节点


    若要使用 PowerShell 而非 GUI 添加节点，可以运行 SQL Server 的 `setup.exe` 应用程序，并指定 `AddNode` 操作。通过命令行添加节点时，表
    4-2 中详述的参数是必需的。


    表 4-2

    AddNode 操作的必需参数


    | 参数 | 用法 |

    | --- | --- |

    | `/ACTION` | 必须设置为 `AddNode`。 |

    | `/IACCEPTSQLSERVERLICENSETERMS` | 在 Windows Server Core 上安装时是必需的，因为 Windows
    Server Core 上必须指定 `/qs` 开关。 |

    | `/INSTANCENAME` | 您要添加额外节点以支持的实例。 |

    | `/CONFIRMIPDEPENDENCYCHANGE` | 允许为多子网群集指定多个 IP 地址。传入 `1` 表示 `True`，传入 `0` 表示
    `False`。 |

    | `/FAILOVERCLUSTERIPADDRESSES` | 指定要用于该实例的 IP 地址，格式为 *<IP 类型>;<地址>;<网络名称>;<子网掩码>*。对于多子网群集，IP
    地址以空格分隔。 |

    | `/FAILOVERCLUSTERNETWORKNAME` | 群集实例的虚拟名称。 |

    | `/INSTALLSQLDATADIR` | 放置 SQL Server 数据文件的文件夹。这必须是一个群集磁盘。 |

    | `/SQLSVCACCOUNT` | 用于运行数据库引擎的服务帐户。 |

    | `/SQLSVCPASSWORD` | 用于运行数据库引擎的服务帐户的密码。 |

    | `/AGTSVCACCOUNT` | 用于运行 SQL Server 代理的服务帐户。 |

    | `/AGTSVCPASSWORD` | 用于运行 SQL Server 代理的服务帐户的密码。 |


    清单 4-2 中的脚本在从安装介质的根文件夹运行时，会将 `ClusterNode2` 添加到该角色。


    ```

    .\setup.exe /IACCEPTSQLSERVERLICENSETERMS /ACTION="AddNode" /INSTANCENAME="MSSQLSERVER"
    /SQLSVCACCOUNT="ALWAYSON\SQLServiceAccount" /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="ALWAYSON\SQLServiceAccount"
    /AGTSVCPASSWORD="Pa$$w0rd" /FAILOVERCLUSTERIPADDRESSES="IPv4;10.0.0.9;Cluster
    Network 2;255.255.255.0" /CONFIRMIPDEPENDENCYCHANGE=0 /qs

    ```

