  trans: '

    ## AlwaysOn 可用性组


    AlwaysOn 可用性组 (AOAG) 取代了数据库镜像，本质上是数据库镜像和群集技术的合并。在群集的每个节点上，SQL Server 作为独立实例安装（与
    AlwaysOn 故障转移群集实例相对）。然后，在群集上安装一个群集感知应用程序，称为 `可用性组侦听器`；它用于将流量定向到正确的节点。然而，AOAG 不依赖于共享磁盘，而是压缩日志流并将其发送到其他节点，其方式类似于数据库镜像。


    AOAG 是处理数据库较小且写入负载较低场景中高可用性的最合适技术。这是因为，在同步使用时，它要求在数据提交到主数据库之前，所有同步副本都已提交该数据。你最多可以拥有八个副本，其中包括三个同步副本。AOAG
    也可能是虚拟化环境中实现高可用性的最合适技术。这是因为群集所需的共享磁盘可能与虚拟化环境的某些功能不兼容。例如，当虚拟机 (VM) 使用通过 `光纤通道`
    呈现的共享磁盘时，`VMware` 不支持使用 `vMotion`（用于在物理服务器之间手动移动虚拟机）和 `分布式资源调度器 (DRS)`（用于根据资源利用率在物理服务器之间自动移动虚拟机）。


    提示


    可以通过 `iSCSI` 连接将存储直接呈现给来宾操作系统来规避 VMware 功能对共享磁盘的限制，但代价是性能下降。


    当你需要主动故障转移但不需要实现负载延迟时，AOAG 是灾难恢复 (DR) 的最合适技术。在你希望利用 DR 服务器卸载报表负载的场景中，AOAG 也可能适用于灾难恢复。这使得冗余服务器能够被利用。当用于灾难恢复时，AOAG
    以异步模式工作。这意味着在发生故障转移时有可能丢失数据。恢复点目标 (`RPO`) 是不确定的，并且基于最后一个未提交事务的时间。


    在过去数据库镜像的时代，辅助数据库始终处于脱机状态。这意味着你不能使用辅助数据库来卸载任何报表或其他只读活动。可以通过针对辅助数据库创建数据库快照并将只读活动指向该快照来解决这个问题。然而，这仍然很复杂，因为你必须配置你的应用程序针对不同的网络名称和
    IP 地址发出只读语句。另一方面，可用性组允许你将一个或多个副本配置为可读。唯一的限制是，可读副本和自动故障转移不能配置在同一个辅助副本上。然而，通常的做法是将可读的辅助副本配置为异步提交模式，以免损害性能。


    为了进一步简化这一点，`可用性组副本` 会检查应用程序的 `连接字符串` 中的 `只读` 或 `读意图` 属性，并将应用程序定向到适当的节点。这意味着你可以轻松地横向扩展报表和数据库维护例程，只需极少的开发工作，并且应用程序能够使用单个连接字符串。


    因为 AOAG 允许你组合同步副本（带或不带自动故障转移）、异步副本和用于只读访问的副本，所以它允许你使用单一技术来满足高可用性、灾难恢复和报表横向扩展的需求。如果你的唯一需求是读取扩展，而不是高可用性或灾难恢复，那么实际上可以从
    `SQL Server 2017` 开始配置不带群集的可用性组。在这种情况下，没有群集服务，因此也没有自动重定向。可用性组内的副本在相互通信时使用证书。如果你在没有
    Active Directory 的情况下、在工作组中或跨域配置可用性组，也是如此。


    当你使用 AOAG 时，故障转移既不发生在数据库级别，也不发生在实例级别。相反，故障转移发生在可用性组级别。可用性组是一个概念，允许你将相关的数据库分组在一起，以便它们可以作为一个原子单元进行故障转移。这在整合环境中特别有用，因为它允许你将映射到单个应用程序的数据库分组在一起。然后，出于灾难恢复测试等目的，你可以将此应用程序故障转移到另一个副本，而不会影响托管在同一实例上的其他数据层应用程序。


    对于实例上可以配置的可用性组数量没有硬性限制，对于实例上可以参与 AOAG 的数据库数量也没有硬性限制。然而，微软已经测试并官方推荐每个实例最多 100 个数据库和
    10 个可用性组。扩展数据库数量的主要限制因素是 AOAG 使用数据库镜像端点，并且每个实例只能有一个。这意味着所有数据修改的日志流都通过同一个端点发送。


    图 2-5 描绘了如何将数据层应用程序映射到可用性组以实现独立故障转移。在此示例中，单个实例托管两个数据层应用程序。每个应用程序都已添加到单独的可用性组中。第一个可用性组已故障转移到
    Node2。因此，可用性组侦听器将 Application1 的流量指向 Node2，将 Application2 的流量指向 Node1。因为每个可用性组都有自己的网络名称和
    IP 地址，并且这些资源随 AOAG 一起故障转移，所以应用程序能够在故障转移后无缝地重新连接到数据库。


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig5_HTML.jpg](img/394392_3_En_2_Fig5_HTML.jpg)


    图 2-5


    可用性组故障转移


    图 2-6 中的图表描述了一个 AlwaysOn 可用性组拓扑。在此示例中，群集中有四个节点和一个磁盘见证。Node1 承载数据库的主副本，Node2 用于自动故障转移，Node3
    用于卸载报表，Node4 用于灾难恢复。由于群集跨两个数据中心延伸，因此已实现多子网群集。然而，由于没有共享存储，因此站点之间不需要 `SAN` 复制。


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig6_HTML.jpg](img/394392_3_En_2_Fig6_HTML.jpg)


    图 2-6


    AlwaysOn 可用性组拓扑

    '
- fmt: "### Automatic Page Repair\n\nIf a page becomes corrupt in a database configured\
    \ as a replica in an AlwaysOn Availability Group topology, then SQL Server attempts\
    \ to fix the corruption by obtaining a copy of the pages from one of the secondary\
    \ replicas. This means that a logical corruption can be resolved without you needing\
    \ to perform a restore or for you to run `DBCC CHECKDB` with a repair option.\
    \ However, automatic page repair does not work for the following page types:\n\
    \n*   File Header page\n*   Database Boot page\n*   Allocation pages\n    *  \
    \ GAM (Global Allocation Map)\n    *   SGAM (Shared Global Allocation Map)\n \
    \   *   PFS (Page Free Space)\n\nIf the primary replica fails to read a page because\
    \ it is corrupt, it first logs the page in the `MSDB.dbo.suspect_pages` table.\
    \ It then checks that at least one replica is in the `SYNCHRONIZED` state and\
    \ that transactions are still being sent to the replica. If these conditions are\
    \ met, then the primary sends a broadcast to all replicas, specifying the `PageID`\
    \ and LSN (log sequence number) at the end of the flushed log. The page is then\
    \ marked as restore pending, meaning that any attempts to access it will fail,\
    \ with error code 829.\n\nAfter receiving the broadcast, the secondary replicas\
    \ wait, until they have redone transactions up to the LSN specified in the broadcast\
    \ message. At this point, they try to access the page. If they cannot access it,\
    \ they return an error. If they `can` access the page, they send the page back\
    \ to the primary replica. The primary replica accepts the page from the first\
    \ secondary to respond.\n\nThe primary replica will then replace the corrupt copy\
    \ of the page with the version that it received from the secondary replica. When\
    \ this process completes, it updates the page in the `MSDB.dbo.suspect_pages`\
    \ table to reflect that it has been repaired by setting the `event_type` column\
    \ to a value of `5 (Repaired)`.\n\nIf the secondary replica fails to read a page\
    \ while redoing the log because it is corrupt, it places the secondary into the\
    \ `SUSPENDED` state. It then logs the page in the `MSDB.dbo.suspect_pages` table\
    \ and requests a copy of the page from the primary replica. The primary replica\
    \ attempts to access the page. If it is inaccessible, then it returns an error\
    \ and the secondary replica remains in the `SUSPENDED` state.\n\nIf it can access\
    \ the page, then it sends it to the secondary replica that requested it. The secondary\
    \ replica replaces the corrupt page with the version that it obtained from the\
    \ primary replica. It then updates the `MSDB.dbo.suspect_pages` table with an\
    \ `event_id` of `5`. Finally, it attempts to resume the AOAG session .\n\n**Note**\n\
    It is possible to manually resume the session, but if you do, the corrupt page\
    \ is hit again during the synchronization. Make sure you repair or restore the\
    \ page on the primary replica first.\n\n## Log Shipping\n\nLog shipping is a technology\
    \ that you can use to implement disaster recovery. It works by backing up the\
    \ transaction log on the principle server, copying it to the secondary server,\
    \ and then restoring it. It is most appropriate to use log shipping in DR scenarios\
    \ in which you require a load delay, because this is not possible with AOAG. As\
    \ an example of where a load delay may be useful, consider a scenario in which\
    \ a user accidently deletes all of the data from a table. If there is a delay\
    \ before the database on the DR server is updated, then it is possible to recover\
    \ the data for this table, from the DR server, and then repopulate the production\
    \ server. This means that you do not need to restore a backup to recover the data.\
    \ Log shipping is not appropriate for high availability, since there is no automatic\
    \ failover functionality. The diagram in Figure 2-7 illustrates a log shipping\
    \ topology.\n\n![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig7_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7 Log Shipping Topology\n\n### Recovery Modes\n\nIn a log shipping\
    \ topology, there is always exactly one principle server, which is the production\
    \ server. It is possible to have multiple secondary servers, however, and these\
    \ servers can be a mix of DR servers and servers used to offload reporting.\n\n\
    When you restore a transaction log, you can specify three recovery modes: Recovery,\
    \ NoRecovery, and Standby. The Recovery mode brings the database online, which\
    \ is not supported with log shipping. The NoRecovery mode keeps the database offline\
    \ so that more backups can be restored. This is the normal configuration for log\
    \ shipping and is the appropriate choice for DR scenarios.\n\nThe Standby option\
    \ brings the database online, but in a read-only state so that you can restore\
    \ further backups. This functionality works by maintaining a `TUF` (Transaction\
    \ Undo File). The `TUF` file records any uncommitted transactions in the transaction\
    \ log. This means that you can roll back these uncommitted transactions in the\
    \ transaction log, which allows the database to be more accessible (although it\
    \ is read-only). The next time a restore needs to be applied, you can reapply\
    \ the uncommitted transaction in the `TUF` file to the log before the redo phase\
    \ of the next log restore begins.\n\nFigure 2-8 illustrates a log shipping topology\
    \ that uses both a DR server and a reporting server.\n\n![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig8_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8 Log Shipping with DR and Reporting Servers\n\n### Remote Monitor\
    \ Server\n\nOptionally, you can configure a monitor server in your log shipping\
    \ topology. This helps you centralize monitoring and alerting. When you implement\
    \ a monitor server, the history and status of all backup, copy, and restore operations\
    \ are stored on the monitor server. A monitor server also allows you to have a\
    \ single alert job, which is configured to monitor the backup, copy, and restore\
    \ operations on all servers, as opposed to it needing separate alerts on each\
    \ server in the topology .\n\n**Caution**\nIf you wish to use a monitor server,\
    \ it is important to configure it when you set up log shipping. After log shipping\
    \ has been configured, the only way to add a monitor server is to tear down and\
    \ reconfigure log shipping.\n\n### Failover\n\nUnlike other high availability\
    \ and disaster recovery technologies, an amount of administrative effort is associated\
    \ with failing over log shipping. To fail over log shipping, you must back up\
    \ the tail end of the transaction log and copy it, along with any other uncopied\
    \ backup files, to the secondary server.\n\nYou now need to apply the remaining\
    \ transaction log backups to the secondary server in sequence, finishing with\
    \ the tail-log backup. All of the restores are applied with the `WITH NORECOVERY`,\
    \ expect for the final restore, which you apply using the `WITH RECOVERY` option\
    \ to bring the database back online in a consistent state. If you are not planning\
    \ to fail back, you can reconfigure log shipping with the secondary server as\
    \ the new primary server."
  raw: "### Automatic Page Repair\n\nIf a page becomes corrupt in a database configured\
    \ as a replica in an AlwaysOn Availability Group topology, then SQL Server attempts\
    \ to fix the corruption by obtaining a copy of the pages from one of the secondary\
    \ replicas. This means that a logical corruption can be resolved without you needing\
    \ to perform a restore or for you to run `DBCC CHECKDB` with a repair option.\
    \ However, automatic page repair does not work for the following page types:\n\
    \n*   File Header page\n\n*   Database Boot page\n\n*   Allocation pages\n   \
    \ *   GAM (Global Allocation Map)\n\n    *   SGAM (Shared Global Allocation Map)\n\
    \n    *   PFS (Page Free Space)\n\nIf the primary replica fails to read a page\
    \ because it is corrupt, it first logs the page in the `MSDB.dbo.suspect_pages`\
    \ table. It then checks that at least one replica is in the `SYNCHRONIZED` state\
    \ and that transactions are still being sent to the replica. If these conditions\
    \ are met, then the primary sends a broadcast to all replicas, specifying the\
    \ `PageID` and LSN (log sequence number) at the end of the flushed log. The page\
    \ is then marked as restore pending, meaning that any attempts to access it will\
    \ fail, with error code 829.\n\nAfter receiving the broadcast, the secondary replicas\
    \ wait, until they have redone transactions up to the LSN specified in the broadcast\
    \ message. At this point, they try to access the page. If they cannot access it,\
    \ they return an error. If they *can* access the page, they send the page back\
    \ to the primary replica. The primary replica accepts the page from the first\
    \ secondary to respond.\n\nThe primary replica will then replace the corrupt copy\
    \ of the page with the version that it received from the secondary replica. When\
    \ this process completes, it updates the page in the `MSDB.dbo.suspect_pages`\
    \ table to reflect that it has been repaired by setting the `event_type` column\
    \ to a value of `5 (Repaired)`.\n\nIf the secondary replica fails to read a page\
    \ while redoing the log because it is corrupt, it places the secondary into the\
    \ `SUSPENDED` state. It then logs the page in the `MSDB.dbo.suspect_pages` table\
    \ and requests a copy of the page from the primary replica. The primary replica\
    \ attempts to access the page. If it is inaccessible, then it returns an error\
    \ and the secondary replica remains in the `SUSPENDED` state.\n\nIf it can access\
    \ the page, then it sends it to the secondary replica that requested it. The secondary\
    \ replica replaces the corrupt page with the version that it obtained from the\
    \ primary replica. It then updates the `MSDB.dbo.suspect_pages` table with an\
    \ `event_id` of `5`. Finally, it attempts to resume the AOAG session .\n\nNote\n\
    \nIt is possible to manually resume the session, but if you do, the corrupt page\
    \ is hit again during the synchronization. Make sure you repair or restore the\
    \ page on the primary replica first.\n\n## Log Shipping\n\nLog shipping is a technology\
    \ that you can use to implement disaster recovery. It works by backing up the\
    \ transaction log on the principle server, copying it to the secondary server,\
    \ and then restoring it. It is most appropriate to use log shipping in DR scenarios\
    \ in which you require a load delay, because this is not possible with AOAG. As\
    \ an example of where a load delay may be useful, consider a scenario in which\
    \ a user accidently deletes all of the data from a table. If there is a delay\
    \ before the database on the DR server is updated, then it is possible to recover\
    \ the data for this table, from the DR server, and then repopulate the production\
    \ server. This means that you do not need to restore a backup to recover the data.\
    \ Log shipping is not appropriate for high availability, since there is no automatic\
    \ failover functionality. The diagram in Figure [2-7](#394392_3_En_2_Chapter.xhtml#Fig7)\
    \ illustrates a log shipping topology.\n\n![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig7_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7\n\nLog Shipping Topology\n\n### Recovery Modes\n\nIn a log shipping\
    \ topology , there is always exactly one principle server, which is the production\
    \ server. It is possible to have multiple secondary servers, however, and these\
    \ servers can be a mix of DR servers and servers used to offload reporting.\n\n\
    When you restore a transaction log, you can specify three recovery modes: Recovery,\
    \ NoRecovery, and Standby. The Recovery mode brings the database online, which\
    \ is not supported with log shipping. The NoRecovery mode keeps the database offline\
    \ so that more backups can be restored. This is the normal configuration for log\
    \ shipping and is the appropriate choice for DR scenarios.\n\nThe Standby option\
    \ brings the database online, but in a read-only state so that you can restore\
    \ further backups. This functionality works by maintaining a `TUF` (Transaction\
    \ Undo File). The `TUF` file records any uncommitted transactions in the transaction\
    \ log. This means that you can roll back these uncommitted transactions in the\
    \ transaction log, which allows the database to be more accessible (although it\
    \ is read-only). The next time a restore needs to be applied, you can reapply\
    \ the uncommitted transaction in the `TUF` file to the log before the redo phase\
    \ of the next log restore begins.\n\nFigure [2-8](#394392_3_En_2_Chapter.xhtml#Fig8)\
    \ illustrates a log shipping topology that uses both a DR server and a reporting\
    \ server.\n\n![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig8_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8\n\nLog Shipping with DR and Reporting Servers\n\n### Remote Monitor\
    \ Server\n\nOptionally , you can configure a monitor server in your log shipping\
    \ topology. This helps you centralize monitoring and alerting. When you implement\
    \ a monitor server, the history and status of all backup, copy, and restore operations\
    \ are stored on the monitor server. A monitor server also allows you to have a\
    \ single alert job, which is configured to monitor the backup, copy, and restore\
    \ operations on all servers, as opposed to it needing separate alerts on each\
    \ server in the topology .\n\nCaution\n\nIf you wish to use a monitor server,\
    \ it is important to configure it when you set up log shipping. After log shipping\
    \ has been configured, the only way to add a monitor server is to tear down and\
    \ reconfigure log shipping.\n\n### Failover\n\nUnlike other high availability\
    \ and disaster recovery technologies, an amount of administrative effort is associated\
    \ with failing over log shipping. To fail over log shipping, you must back up\
    \ the tail end of the transaction log and copy it, along with any other uncopied\
    \ backup files, to the secondary server.\n\nYou now need to apply the remaining\
    \ transaction log backups to the secondary server in sequence, finishing with\
    \ the tail-log backup. All of the restores are applied with the `WITH NORECOVERY`,\
    \ expect for the final restore, which you apply using the `WITH RECOVERY` option\
    \ to bring the database back online in a consistent state. If you are not planning\
    \ to fail back, you can reconfigure log shipping with the secondary server as\
    \ the new primary server."
  trans: "\n\n### 自动页面修复\n\n如果在一个配置为 **AlwaysOn 可用性组**拓扑结构中的副本的数据库中，某个页面损坏，那么 SQL\
    \ Server 会尝试通过从某个辅助副本获取该页面的副本来修复损坏。这意味着逻辑损坏可以在无需你执行还原操作或运行带有修复选项的 `DBCC CHECKDB`\
    \ 的情况下得到解决。但是，自动页面修复不适用于以下页面类型：\n\n*   文件头页面\n*   数据库引导页面\n*   分配页面\n    *   GAM（全局分配映射）\n\
    \    *   SGAM（共享全局分配映射）\n    *   PFS（页面可用空间）\n\n如果主副本因为页面损坏而无法读取该页面，它会首先将该页面记录在\
    \ `MSDB.dbo.suspect_pages` 表中。然后，它会检查是否至少有一个副本处于 `SYNCHRONIZED` 状态，并且事务是否仍在发送到该副本。如果满足这些条件，主副本会向所有副本发送一个广播，指定已刷出日志末尾的\
    \ `PageID` 和 LSN（日志序列号）。然后，该页面被标记为“还原挂起”，这意味着任何访问它的尝试都将失败，并返回错误代码 829。\n\n收到广播后，辅助副本会等待，直到它们已重做的事务达到广播消息中指定的\
    \ LSN。此时，它们尝试访问该页面。如果无法访问，则返回错误。如果它们 `可以` 访问该页面，它们会将该页面发送回主副本。主副本接受第一个响应的辅助副本发来的页面。\n\
    \n然后，主副本将用从辅助副本收到的版本替换损坏的页面副本。此过程完成后，它会更新 `MSDB.dbo.suspect_pages` 表中的页面记录，通过将\
    \ `event_type` 列设置为值 `5（已修复）` 来反映该页面已被修复。\n\n如果辅助副本在重做日志时因为页面损坏而无法读取该页面，它会将该辅助副本置于\
    \ `SUSPENDED` 状态。然后，它会将该页面记录在 `MSDB.dbo.suspect_pages` 表中，并向主副本请求该页面的副本。主副本尝试访问该页面。如果无法访问，则返回错误，并且辅助副本保持\
    \ `SUSPENDED` 状态。\n\n如果主副本可以访问该页面，则将其发送到发出请求的辅助副本。辅助副本用从主副本获取的版本替换损坏的页面。然后，它使用\
    \ `event_id` 为 `5` 更新 `MSDB.dbo.suspect_pages` 表。最后，它尝试恢复 AOAG 会话。\n\n**注意**\n\
    可以手动恢复会话，但如果你这样做，在同步过程中会再次遇到损坏的页面。请确保首先在主副本上修复或还原该页面。\n\n## 日志传送\n\n日志传送是一种可用于实现灾难恢复的技术。它的工作原理是在主体服务器上备份事务日志，将其复制到辅助服务器，然后还原它。日志传送最适用于需要加载延迟的灾难恢复场景，因为这在\
    \ AOAG 中无法实现。例如，在用户意外删除表中所有数据的情况下，如果灾难恢复服务器上的数据库更新存在延迟，那么就有可能从该灾难恢复服务器恢复此表的数据，然后重新填充生产服务器。这意味着你无需还原备份来恢复数据。日志传送不适用于高可用性，因为它没有自动故障转移功能。图\
    \ 2-7 中的图表展示了一个日志传送拓扑。\n\n![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig7_HTML.jpg](img/394392_3_En_2_Fig7_HTML.jpg)\n\
    \n图 2-7 日志传送拓扑\n\n### 恢复模式\n\n在日志传送拓扑中，始终恰好有一个主体服务器，即生产服务器。但是，可以有多个辅助服务器，并且这些服务器可以是灾难恢复服务器和用于卸载报表负载的服务器的混合体。\n\
    \n还原事务日志时，可以指定三种恢复模式：`Recovery`（恢复）、`NoRecovery`（不恢复）和 `Standby`（待机）。`Recovery`\
    \ 模式使数据库处于在线状态，这在日志传送中不受支持。`NoRecovery` 模式使数据库保持离线状态，以便可以还原更多备份。这是日志传送的常规配置，也是灾难恢复场景的合适选择。\n\
    \n`Standby` 选项使数据库处于在线状态，但为只读状态，以便可以还原更多备份。此功能通过维护一个 `TUF`（事务撤销文件）来实现。`TUF` 文件记录事务日志中任何未提交的事务。这意味着你可以回滚事务日志中的这些未提交事务，从而使数据库更易于访问（尽管是只读的）。下次需要应用还原时，你可以在下一个日志还原的重做阶段开始之前，将\
    \ `TUF` 文件中的未提交事务重新应用到日志中。\n\n图 2-8 展示了一个同时使用灾难恢复服务器和报表服务器的日志传送拓扑。\n\n![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig8_HTML.jpg](img/394392_3_En_2_Fig8_HTML.jpg)\n\
    \n图 2-8 带有灾难恢复和报表服务器的日志传送\n\n### 远程监视服务器\n\n可选地，你可以在日志传送拓扑中配置一个监视服务器。这有助于集中监控和警报。当你实现监视服务器时，所有备份、复制和还原操作的历史和状态都存储在监视服务器上。监视服务器还允许你拥有单个警报作业，该作业配置为监控所有服务器上的备份、复制和还原操作，而无需在拓扑中的每个服务器上配置单独的警报。\n\
    \n**警告**\n如果希望使用监视服务器，在设置日志传送时进行配置至关重要。日志传送配置完成后，添加监视服务器的唯一方法是拆除并重新配置日志传送。\n\n\
    ### 故障转移\n\n与其他高可用性和灾难恢复技术不同，日志传送的故障转移涉及一定量的管理操作。要对日志传送进行故障转移，你必须备份事务日志的尾部，并将其与任何其他未复制的备份文件一起复制到辅助服务器。\n\
    \n现在你需要按顺序将剩余的事务日志备份应用到辅助服务器，最后应用尾日志备份。除最后一次还原外，所有还原都使用 `WITH NORECOVERY` 选项应用；最后一次还原使用\
    \ `WITH RECOVERY` 选项应用，以使数据库以一致状态重新上线。如果不计划故障回复，你可以使用辅助服务器作为新的主服务器重新配置日志传送。\n\n"
- fmt: '## Combining Technologies


    To meet your business objectives and nonfunctional requirements (NFRs), you need
    to combine multiple high availability and disaster recovery technologies together
    to create a reliable, scalable platform. A classic example of this is the requirement
    to combine an `AlwaysOn Failover Cluster` with `AlwaysOn Availability Groups`.


    The reason you may need to combine these technologies is that when you use `AlwaysOn
    Availability Groups` in synchronous mode, which you must do for automatic failover,
    it can cause a performance impediment. As discussed earlier in this chapter, the
    performance issue is caused by the transaction being committed on the secondary
    server before being committed on the primary server. Clustering does not suffer
    from this issue, however, because it relies on a `shared disk resource`, and therefore
    the transaction is only committed once.


    Therefore, it is common practice to first use a cluster to achieve high availability
    and then use `AlwaysOn Availability Groups` to perform `DR` and/or offload reporting.
    The diagram in Figure [2-9](#394392_3_En_2_Chapter.xhtml#Fig9) illustrates a `HA/DR`
    topology that combines clustering and `AOAG` to achieve high availability and
    disaster recovery, respectively.


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig9_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig9_HTML.jpg)

    **Figure 2-9** Clustering and AlwaysOn Availability Groups Combined


    The diagram in Figure [2-9](#394392_3_En_2_Chapter.xhtml#Fig9) shows that the
    primary replica of the database is hosted on a two-node active/passive cluster.
    If the active node fails, the rules of clustering apply, and the `shared storage`,
    `network name`, and `IP address` are reattached to the passive node, which then
    becomes the active node. If both nodes are inaccessible, however, the availability
    group listener points the traffic to the third node of the cluster, which is situated
    in the `DR` site and is synchronized using log stream replication. Of course,
    when asynchronous mode is used, the database must be failed over manually by a
    `DBA`.


    Another common scenario is the combination of a cluster and `log shipping` to
    achieve high availability and disaster recovery, respectively. This combination
    works in much the same way as clustering combined with `AlwaysOn Availability
    Groups` and is illustrated in Figure [2-10](#394392_3_En_2_Chapter.xhtml#Fig10).


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig10_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig10_HTML.jpg)

    **Figure 2-10** Clustering Combined with Log Shipping


    The diagram shows that a two-node active/passive cluster has been configured in
    the primary data center. The `transaction log(s)` of the database(s) hosted on
    this instance are then shipped to a stand-alone server in the `DR` data center.
    Because the cluster uses `shared storage`, you should also use `shared storage`
    for the `backup volume` and add the `backup volume` as a resource in the role.
    This means that when the instance fails over to the other node, the `backup share`
    also fails over, and `log shipping` continues to synchronize, uninterrupted.


    **Caution**

    If failover occurs while the `log shipping backup` or `copy jobs` are in progress,
    then `log shipping` may become unsynchronized and require manual intervention.
    This means that after a failover, you should check the health of your `log shipping`
    jobs.


    ## Summary


    Understanding the concepts of availability is key to making the correct implementation
    choices for your applications that require high availability and disaster recovery.
    You should calculate the cost of downtime and compare this to the cost of implementing
    choices of `HA/DR` solutions to help the business understand the cost/benefit
    profile of each option (as discussed in Chapter [1](#394392_3_En_1_Chapter.xhtml)).
    You should also be mindful of `SLAs` when choosing the technology implementation,
    since there could be financial penalties if `SLAs` are not met.


    `SQL Server` provides a full suite of high availability and disaster recovery
    technologies, giving you the flexibility to implement a solution that best fits
    the needs of your `data-tier applications`. For high availability, you can implement
    either clustering or `AlwaysOn Availability Groups (AOAG)`. Clustering uses a
    `shared disk resource` and failover occurs at the `instance level`. `AOAG`, on
    the other hand, synchronizes data at the `database level` by maintaining a redundant
    copy of the database with a synchronous log stream.


    To implement disaster recovery, you can choose to implement `AOAG` or `log shipping`.
    `Log shipping` works by backing up, copying, and restoring the `transaction logs`
    of the databases, whereas `AOAG` synchronizes the data using an asynchronous log
    stream.


    It is also possible to combine multiple `HA` and `DR` technologies together in
    order to implement the most appropriate availability strategy. Common examples
    of this are combining clustering for high availability with `AOAG` or `log shipping`
    to provide `DR`.'
