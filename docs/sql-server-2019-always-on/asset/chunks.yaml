    # 配置 SQL Server


    配置 AlwaysOn Availability Groups 的第一步是在 SQL Server 服务上启用此功能。要从 GUI 启用此功能，我们打开 SQL
    Server Configuration Manager，浏览到 `SQL Server Services`，并从 SQL Server 服务的上下文菜单中选择
    `Properties`。当我们这样做时，会显示服务属性，我们导航到 `Always On Availability Groups` 选项卡，如图 [5-1](#394392_3_En_5_Chapter.xhtml#Fig1)
    所示。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig1_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig1_HTML.jpg)


    图 5-1：`Always On Availability Groups` 选项卡


    在此选项卡上，我们勾选 `Enable AlwaysOn Availability Groups` 复选框，并确保 `Windows Failover Cluster
    Name` 框中显示的集群名称正确。然后我们需要重新启动 SQL Server 服务。因为 AlwaysOn Availability Groups 使用独立实例（这些实例本地安装在每个集群节点上），而不是跨越多个节点的故障转移群集实例，所以我们需要对集群上托管的每个独立实例重复这些步骤。


    我们也可以使用 PowerShell 来启用 AlwaysOn Availability Groups。为此，我们使用清单 [5-2](#394392_3_En_5_Chapter.xhtml#PC2)
    中的 PowerShell 命令。该脚本假定 `CLUSTERNODE1` 是服务器名称，`PROD` 是 SQL Server 实例名称。


    ```powershell

    Enable-SqlAlwaysOn -Path SQLSERVER:\SQL\CLUSTERNODE1\PROD

    ```


    清单 5-2：启用 AlwaysOn Availability Groups


    下一步是对将成为可用性组一部分的所有数据库进行完整备份。在完成此操作之前，我们将无法将它们添加到可用性组。在本章中，我们将创建三个独立的可用性组。然而，在第一个例子中，我们将创建一个名为
    `HR` 的可用性组，它将为 `HR` 数据库提供高可用性。因此，我们需要备份 `HR` 数据库。我们通过运行清单 [5-3](#394392_3_En_5_Chapter.xhtml#PC3)
    中的脚本来实现这一点。


    ```sql

    BACKUP DATABASE HR

    TO  DISK = N''C:\Backups\HR.bak''

    WITH NAME = N''HR-Full Database Backup'' ;

    GO

    ```


