    ## 引言


    `SQL Server 2019 AlwaysOn` 旨在为需要为其 SQL Server 工作负载实施高可用性和灾难恢复的数据库管理员（DBA）提供一本快速入门指南。


    本书首先讨论高可用性的概念和方法，然后对高可用性/灾难恢复技术进行概述。接着深入细节。我们将讨论如何创建 Windows 集群，然后再介绍如何创建 SQL
    Server `AlwaysOn 故障转移群集实例`。


    然后，本书的重点转向 `AlwaysOn 可用性组`。在此部分，本书讨论了如何在 Windows 和 Linux 操作系统上创建和配置可用性组，以实现高可用性和灾难恢复。


    接着，我们探讨了 `AlwaysOn 可用性组` 的非典型用例，例如无群集和独立于域的可用性组，以及在 Azure IaaS 上配置可用性组，和针对 SQL
    Server 标准版的“基本可用性组”。


    最后，本书着眼于 AlwaysOn 的运维方面，包含涵盖该技术的管理、监控和故障排除的章节。


    ## 致谢


    我要衷心感谢杰出的 Chris Dent，他再次为我提供了本书相关的网络配置帮助。


    我还要感谢 Ian Stirk，他的技术评审总是能提升我书籍的质量，本书也不例外。


    ## 关于作者 关于技术评审者


    ## 1. 高可用性与灾难恢复概念


    在当今运行关键业务应用的 24×7 环境中，企业严重依赖于其数据的可用性。虽然服务器及其软件通常很可靠，但始终存在硬件故障或软件错误的风险，其中任何一项都可能导致服务器宕机。为了减轻这些风险，关键业务应用通常依赖冗余硬件来提供容错能力。如果主系统发生故障，应用可以自动故障转移到冗余系统。这是
    `高可用性（HA）` 的基本原则。


    即使实施了 HA 技术，仍然存在导致应用不可用的小概率事件的风险。这可能是由于重大事件，例如自然灾害或恐怖行为导致的数据中心损毁。也可能是由于数据损坏或人为错误，导致应用数据丢失或损坏到无法修复的程度。


    在这些情况下，一些应用可能依赖于恢复最新的备份以尽可能多地找回数据。然而，更关键的应用可能需要一个冗余服务器在次要位置保存数据的同步副本。这是 `灾难恢复（DR）`
    的核心概念。本章将讨论 HA 和 DR 背后的概念。

    '
- fmt: '## Level of Availability


    一个解决方案可供最终用户使用的时间量被称为 `level of availability`，或 `uptime`。为了提供真实准确的正常运行时间图像，公司应该从用户的桌面测量解决方案的可用性。换句话说，即使你的
    SQL Server 已经不间断地运行了一个多月，用户仍可能因为其他因素而经历其解决方案的中断。这些因素可能包括网络中断或应用服务器故障。


    然而，在某些情况下，你别无选择，只能在 SQL Server 级别测量可用性水平。这可能是因为你缺乏企业内的整体监控工具。但最常见的情况是，在实例级别测量可用性水平的要求是政治性的，而非技术性的。在
    IT 行业，将数据中心管理外包给第三方提供商已成为一种趋势。在这种情况下，负责管理 SQL 服务器的提供商不一定就是负责网络或应用服务器的提供商。在这种场景下，你需要监控
    SQL Server 级别的正常运行时间，以准确判断服务提供商的性能。


    可用性水平是以应用或服务器可用时间的百分比来衡量的。公司通常努力实现 99%、99.9%、99.99% 或 99.999% 的可用性。因此，可用性水平通常以“9”的个数来指代。例如，“五个9”的可用性意味着
    99.999% 的正常运行时间，“三个9”意味着 99.9% 的正常运行时间。


    表 1-1 详细列出了每个可用性级别每周、每月和每年可接受的停机时间。


    表 1-1


    可用性级别


    | Level of Availability | Downtime per Week | Downtime per Month | Downtime per
    Year |

    | --- | --- | --- | --- |

    | 99% | 1 hour, 40 minutes, 48 seconds | 7 hours, 18 minutes, 17 seconds | 3 days,
    15 hours, 39 minutes, 28 seconds |

    | 99.9% | 10 minutes, 4 seconds | 43 minutes, 49 seconds | 8 hours, 45 minutes,
    56 seconds |

    | 99.99% | 1 minute | 4 minutes, 23 seconds | 52 minutes, 35 seconds |

    | 99.999% | 6 seconds | 26 seconds | 5 minutes, 15 seconds |


    *所有值均向下取整到最近的秒。*


    要计算其他可用性级别，你可以使用代码清单 1-1 中的脚本。在运行此脚本之前，请将 `@Uptime` 的值替换为你希望计算的正常运行时间级别。你还应该将
    `@UptimeInterval` 的值替换为每周、每月或每年的正常运行时间。


    ```sql

    DECLARE @Uptime    DECIMAL(5,3) ;

    --Specify the uptime level to calculate

    SET @Uptime = 99.9 ;

    DECLARE @UptimeInterval VARCHAR(5) ;

    --Specify WEEK, MONTH, or YEAR

    SET @UptimeInterval = ''YEAR'' ;

    DECLARE @SecondsPerInterval FLOAT ;

    --Calculate seconds per interval

    SET @SecondsPerInterval =

    (

    SELECT CASE

    WHEN @UptimeInterval = ''YEAR''

    THEN 60*60*24*365.243

    WHEN @UptimeInterval = ''MONTH''

    THEN 60*60*24*30.437

    WHEN @UptimeInterval = ''WEEK''

    THEN 60*60*24*7

    END

    ) ;

    DECLARE @UptimeSeconds DECIMAL(12,4) ;

    --Calculate uptime

    SET @UptimeSeconds = @SecondsPerInterval * (100-@Uptime) / 100 ;

    --Format results

    SELECT

    CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60/24))   + '' Day(s), ''

    + CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60 % 24)) + '' Hour(s), ''

    + CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds /60 % 60))    + '' Minute(s), ''

    + CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds % 60))        + '' Second(s).'' ;

    ```


    代码清单 1-1

    计算可用性级别


    ### Actual Availability


    现在我们了解了如何计算应用程序所需的可用性级别，我们还应该了解如何计算应用程序的实际可用性。我们可以通过获取 MTBF（平均故障间隔时间）和 MTTR（平均恢复时间）指标来实现。


    `MTBF` 指标描述了故障之间的平均时间长度。例如，假设我们正在审查过去一周的服务日志，发现 `Foo` 应用程序遭受了三次中断。一周有 168 小时，并且发生了三次故障。我们只需要将时间段内的小时数除以故障次数。这将得出我们的
    `MTBF`。在这个例子中，我们的 `MTBF` 是 56 小时。


    `MTTR` 实际上可以有两种不同的含义：平均恢复时间或平均修复时间。当没有高可用性或灾难恢复计划时，`MTTR` 指标描述了修复损坏物品所需的平均时间长度。这可能是一个较长的时间，因为我们可能需要等待服务工程师来更换故障硬件。然而，当考虑到高可用性和灾难恢复时，我们使用
    `MTTR` 指标来表示“平均恢复时间”，以记录中断的持续时间。例如，如果我们有一个三节点集群，其中一个节点发生硬件故障，我们当然需要修复这台服务器，但从应用程序停机的角度来看，我们只会有几秒钟或几分钟的中断，同时服务会故障转移，我们仍然具有弹性，这意味着应用程序的非功能性需求不会受到影响。因此，在这个例子中，我将假设
    `MTTR` 指的是“平均恢复时间”。


    我们可以通过将时间段内的总停机时间相加，然后除以故障次数来计算 `MTTR`。在这个例子中，在我们的 168 小时期间内，我们有三次故障，总停机时间为 12
    分钟。因此，我们的 `Foo` 应用程序的 `MTTR` 是 4 分钟。


    现在我们知道了应用程序的 `MTBF` 和 `MTTR`，我们可以使用这些指标来计算应用程序的实际可用性。公式是 `(MTBF/(MTBF+MTTR))*100`。因此，在这个例子中，我们首先需要将
    `MTTR` 值转换为小时，以便单位一致。4 分钟是 0.06667 小时。因此，我们的计算将是 `(56/(56+0.6667))*100`。这使得我们应用程序的实际可用性为
    99.8811%。


    ### Service-Level Agreements and Service-Level Objectives


    当第三方提供商负责管理服务器时，合同通常包括服务级别协议（SLA）。这些 SLA 定义了许多参数，包括可接受的停机时间、故障发生时服务器可以宕机的最长时间，以及发生故障时可接受的数据丢失量。通常，如果未满足这些
    SLA，提供商将面临经济处罚。


    如果服务器是内部管理的，数据库管理员仍然有“客户”的概念。这些通常是应用程序的最终用户，主要联系人是业务负责人。应用程序的业务负责人是企业内委托该应用程序并负责签署资金增强等事项的利益相关者。


    在内部场景中，仍然可以定义 SLA，在这种情况下，如果未能满足这些 SLA，IT 基础架构或平台部门可能会向业务团队承担费用。然而，在内部场景中，IT 部门与业务团队协商服务级别目标（SLO）要比
    SLA 常见得多。SLO 在性质上与 SLA 非常相似，但它们的使用意味着业务团队不会因未能满足目标而对 IT 部门实施经济处罚。'
  raw: '## Level of Availability


    The amount of time that a solution is available to end users is known as the *level
    of availability*, or *uptime*. To provide a true picture of uptime, a company
    should measure the availability of a solution from a user’s desktop. In other
    words, even if your SQL Server has been running uninterrupted for over a month,
    users may still experience outages to their solution caused by other factors.
    These factors can include network outages or an application server failure.


    In some instances, however, you have no choice but to measure the level of availability
    at the SQL Server level. This may be because you lack holistic monitoring tools
    within the enterprise. Most often, however, the requirement to measure the level
    of availability at the instance level is political, as opposed to technical. In
    the IT industry, it has become a trend to outsource the management of data centers
    to third-party providers. In such cases, the provider responsible for managing
    the SQL servers may not necessarily be the provider responsible for the network
    or application servers. In this scenario, you need to monitor uptime at the SQL
    Server level to accurately judge the performance of the service provider.


    The level of availability is measured as a percentage of the time that the application
    or server is available. Companies often strive to achieve 99%, 99.9%, 99.99%,
    or 99.999% availability. As a result, the level of availability is often referred
    to in 9s. For example, five 9s of availability means 99.999% uptime and three
    9s means 99.9% uptime.


    Table [1-1](#394392_3_En_1_Chapter.xhtml#Tab1) details the amount of acceptable
    downtime per week, per month, and per year for each level of availability.


    Table 1-1


    Levels of Availability


    | Level of Availability | Downtime per Week | Downtime per Month | Downtime per
    Year |

    | --- | --- | --- | --- |

    | 99% | 1 hour, 40 minutes, 48 seconds | 7 hours, 18 minutes, 17 seconds | 3 days,
    15 hours, 39 minutes, 28 seconds |

    | 99.9% | 10 minutes, 4 seconds | 43 minutes, 49 seconds | 8 hours, 45 minutes,
    56 seconds |

    | 99.99% | 1 minute | 4 minutes, 23 seconds | 52 minutes, 35 seconds |

    | 99.999% | 6 seconds | 26 seconds | 5 minutes, 15 seconds |


    *All values are rounded down to the nearest second.*


    To calculate other levels of availability, you can use the script in Listing [1-1](#394392_3_En_1_Chapter.xhtml#PC1).
    Before running this script, replace the value of `@Uptime` to represent the level
    of uptime that you wish to calculate. You should also replace the value of `@UptimeInterval`
    to reflect uptime per week, month, or year.


    ```

    DECLARE @Uptime    DECIMAL(5,3) ;

    --Specify the uptime level to calculate

    SET @Uptime = 99.9 ;

    DECLARE @UptimeInterval VARCHAR(5) ;

    --Specify WEEK, MONTH, or YEAR

    SET @UptimeInterval = ''YEAR'' ;

    DECLARE @SecondsPerInterval FLOAT ;

    --Calculate seconds per interval

    SET @SecondsPerInterval =

    (

    SELECT CASE

    WHEN @UptimeInterval = ''YEAR''

    THEN 60*60*24*365.243

    WHEN @UptimeInterval = ''MONTH''

    THEN 60*60*24*30.437

    WHEN @UptimeInterval = ''WEEK''

    THEN 60*60*24*7

    END

    ) ;

    DECLARE @UptimeSeconds DECIMAL(12,4) ;

    --Calculate uptime

    SET @UptimeSeconds = @SecondsPerInterval * (100-@Uptime) / 100 ;

    --Format results

    SELECT

    CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60/24))   + '' Day(s), ''

    + CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60 % 24)) + '' Hour(s), ''

    + CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds /60 % 60))    + '' Minute(s), ''

    + CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds % 60))        + '' Second(s).'' ;

    Listing 1-1

    Calculating the Level of Availability

    ```


    ### Actual Availability


    Now that we understand how to calculate the level of availability required by
    an application, we should also understand how to calculate the actual availability
    of an application. We can do this by discovering the MTBF (Mean Time Between Failures)
    and MTTR (Mean Time to Recover) metrics.


    The MTBF metric describes the average length of time between failures. For example,
    imagine that we were reviewing the service logs for the past week and discovered
    that the Foo application has suffered three outages. There are 168 hours in a
    week and there have been three failures. We simply need to divide the number of
    hours within our time period by the number of failures. This will produce our
    MTBF. In this case, we have an MTBF of 56 hours.


    MTTR can actually have two different meanings: Mean Time to Recover or Mean Time
    to Repair. When there is no HA or DR in place, then the MTTR metric describes
    the average length of time it takes for something that is broken to be repaired.
    This could potentially be an extended period of time, as we may need to wait for
    a service engineer to replace faulty hardware. When thinking about HA and DR,
    however, we use MTTR metric to mean Mean Time to Recover to record the duration
    of the outage. For example, if we have a three-node cluster and one of the nodes
    experiences a hardware failure, of course we need to fix this server, but from
    an application downtime perspective, we will only have an outage of a matter of
    seconds or minutes, while the service fails over and we still have resilience,
    meaning that the application’s nonfunctional requirements are not impacted. Therefore,
    in this example, I will assume that MTTR is referring to “Mean Time to Recover.”


    We can calculate the MTTR by taking a sum of the total downtime duration within
    our period and dividing it by the number of failures. In this case, during our
    168-hour period, we have had three failures and the total duration of downtime
    has been 12 minutes. Therefore, the MTTR for our Foo application is 4 minutes.


    Now that we know our application’s MTBF and MTTR, we can use these metrics to
    calculate the actual availability of our application. The formula for this is
    `(MTBF/(MTBF+MTTR))*100`. So in this case, we first need to convert our MTTR value
    to hours, so we have hours as our consistent unit. Four minutes is 0.06667 hours.
    Therefore, our calculation would be `(56/(56+0.6667))*100`. This makes our actual
    application availability 99.8811% .


    ### Service-Level Agreements and Service-Level Objectives


    When a third-party provider is responsible for managing servers, the contract
    usually includes service-level agreements (SLAs). These SLAs define many parameters,
    including how much downtime is acceptable, the maximum length of time a server
    can be down in the event of failure, and how much data loss is acceptable if failure
    occurs. Normally, there are financial penalties for the provider if these SLAs
    are not met.


    In the event that servers are managed in-house, DBAs still have the concept of
    customers. These are usually the end users of the application, with the primary
    contact being the business owner. An application’s business owner is the stakeholder
    within the business who commissioned the application and who is responsible for
    signing off on funding enhancements, among other things.


    In an in-house scenario, it is still possible to define SLAs, and in such a case,
    the IT Infrastructure or Platform departments may be liable for charge-back to
    the business teams if these SLAs are not being met. However, in internal scenarios,
    it is much more common for IT departments to negotiate service-level objectives
    (SLOs) with the business teams, as opposed to SLAs. SLOs are very similar in nature
    to SLAs, but their use implies that the business do not impose financial penalties
    on the IT department in the event that they are not met.'
  trans: '## 可用性级别


    一个解决方案可供最终用户使用的时间量被称为 `level of availability` 或 `uptime`。为了提供真实准确的正常运行时间视图，公司应该从用户的桌面测量解决方案的可用性。换句话说，即使你的
    SQL Server 已经不间断运行了一个多月，用户仍可能因为其他因素而经历其解决方案的中断。这些因素可能包括网络中断或应用服务器故障。


    然而，在某些情况下，你别无选择，只能在 SQL Server 级别测量可用性水平。这可能是因为你缺乏企业内的整体监控工具。但最常见的情况是，在实例级别测量可用性水平的要求是政治性的，而非技术性的。在
    IT 行业，将数据中心管理外包给第三方提供商已成为一种趋势。在这种情况下，负责管理 SQL 服务器的提供商不一定就是负责网络或应用服务器的提供商。在这种场景下，你需要监控
    SQL Server 级别的正常运行时间，以准确判断服务提供商的性能。


    可用性水平是以应用或服务器可用时间的百分比来衡量的。公司通常努力实现 99%、99.9%、99.99% 或 99.999% 的可用性。因此，可用性水平通常以“9”的个数来指代。例如，“五个
    9”的可用性意味着 99.999% 的正常运行时间，“三个 9”意味着 99.9% 的正常运行时间。


    表 1-1 详细列出了每个可用性级别每周、每月和每年可接受的停机时间。


    表 1-1

    可用性级别


    | 可用性级别 | 每周停机时间 | 每月停机时间 | 每年停机时间 |

    | --- | --- | --- | --- |

    | 99% | 1 小时, 40 分钟, 48 秒 | 7 小时, 18 分钟, 17 秒 | 3 天, 15 小时, 39 分钟, 28 秒 |

    | 99.9% | 10 分钟, 4 秒 | 43 分钟, 49 秒 | 8 小时, 45 分钟, 56 秒 |

    | 99.99% | 1 分钟 | 4 分钟, 23 秒 | 52 分钟, 35 秒 |

    | 99.999% | 6 秒 | 26 秒 | 5 分钟, 15 秒 |


    *所有值均向下取整到最近的秒。*


    要计算其他可用性级别，你可以使用代码清单 1-1 中的脚本。在运行此脚本之前，请将 `@Uptime` 的值替换为你希望计算的正常运行时间级别。你还应该将
    `@UptimeInterval` 的值替换为每周、每月或每年的正常运行时间。


    ```sql

    DECLARE @Uptime    DECIMAL(5,3) ;

    --指定要计算的可用性级别

    SET @Uptime = 99.9 ;

    DECLARE @UptimeInterval VARCHAR(5) ;

    --指定 WEEK, MONTH, 或 YEAR

    SET @UptimeInterval = ''YEAR'' ;

    DECLARE @SecondsPerInterval FLOAT ;

    --计算每个时间间隔的秒数

    SET @SecondsPerInterval =

    (

    SELECT CASE

    WHEN @UptimeInterval = ''YEAR''

    THEN 60*60*24*365.243

    WHEN @UptimeInterval = ''MONTH''

    THEN 60*60*24*30.437

    WHEN @UptimeInterval = ''WEEK''

    THEN 60*60*24*7

    END

    ) ;

    DECLARE @UptimeSeconds DECIMAL(12,4) ;

    --计算正常运行时间

    SET @UptimeSeconds = @SecondsPerInterval * (100-@Uptime) / 100 ;

    --格式化结果

    SELECT

    CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60/24))   + '' 天, ''

    + CONVERT(VARCHAR(12), FLOOR(@UptimeSeconds /60/60 % 24)) + '' 小时, ''

    + CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds /60 % 60))    + '' 分钟, ''

    + CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds % 60))        + '' 秒.'' ;

    ```


    代码清单 1-1

    计算可用性级别


    ### 实际可用性


    现在我们了解了如何计算应用程序所需的可用性级别，我们还应该了解如何计算应用程序的实际可用性。我们可以通过获取 MTBF（平均故障间隔时间）和 MTTR（平均恢复时间）指标来实现。


    `MTBF` 指标描述了故障之间的平均时间长度。例如，假设我们正在审查过去一周的服务日志，发现 `Foo` 应用程序遭受了三次中断。一周有 168 小时，并且发生了三次故障。我们只需要将时间段内的小时数除以故障次数。这将得出我们的
    `MTBF`。在这个例子中，我们的 `MTBF` 是 56 小时。


    `MTTR` 实际上可以有两种不同的含义：平均恢复时间或平均修复时间。当没有高可用性或灾难恢复计划时，`MTTR` 指标描述了修复损坏物品所需的平均时间长度。这可能是一个较长的时间，因为我们可能需要等待服务工程师来更换故障硬件。然而，当考虑到高可用性和灾难恢复时，我们使用
    `MTTR` 指标来表示“平均恢复时间”，以记录中断的持续时间。例如，如果我们有一个三节点集群，其中一个节点发生硬件故障，我们当然需要修复这台服务器，但从应用程序停机的角度来看，我们只会有几秒钟或几分钟的中断，同时服务会故障转移，我们仍然具有弹性，这意味着应用程序的非功能性需求不会受到影响。因此，在这个例子中，我将假设
    `MTTR` 指的是“平均恢复时间”。


    我们可以通过将时间段内的总停机时间相加，然后除以故障次数来计算 `MTTR`。在这个例子中，在我们的 168 小时期间内，我们有三次故障，总停机时间为 12
    分钟。因此，我们的 `Foo` 应用程序的 `MTTR` 是 4 分钟。


    现在我们知道了应用程序的 `MTBF` 和 `MTTR`，我们可以使用这些指标来计算应用程序的实际可用性。公式是 `(MTBF/(MTBF+MTTR))*100`。因此，在这个例子中，我们首先需要将
    `MTTR` 值转换为小时，以便单位一致。4 分钟是 0.06667 小时。因此，我们的计算将是 `(56/(56+0.06667))*100`。这使得我们应用程序的实际可用性为
    99.8811%。


    ### 服务级别协议与服务级别目标


    当第三方提供商负责管理服务器时，合同通常包括服务级别协议。这些 SLA 定义了许多参数，包括可接受的停机时间、故障发生时服务器可以宕机的最长时间，以及发生故障时可接受的数据丢失量。通常，如果未满足这些
    SLA，提供商将面临经济处罚。


    如果服务器是内部管理的，数据库管理员仍然有“客户”的概念。这些通常是应用程序的最终用户，主要联系人是业务负责人。应用程序的业务负责人是企业内委托该应用程序并负责签署资金增强等事项的利益相关者。


    在内部场景中，仍然可以定义 SLA，在这种情况下，如果未能满足这些 SLA，IT 基础架构或平台部门可能会向业务团队承担费用。然而，在内部场景中，IT 部门与业务团队协商服务级别目标要比
    SLA 常见得多。SLO 在性质上与 SLA 非常相似，但它们的使用意味着业务团队不会因未能满足目标而对 IT 部门实施经济处罚。'
- fmt: '### Proactive Maintenance


    It is important to remember that downtime is not only caused by failure but also
    by proactive maintenance. For example, if you need to patch the operating system,
    or SQL Server itself, with the latest service pack, then you must have some downtime
    during installation.


    Depending on the upgrade you are applying, the downtime in such a scenario could
    be substantial – several hours for a stand-alone server. In this situation, high
    availability is essential for many business-critical applications – not to protect
    against unplanned downtime, but to avoid prolonged outages during planned maintenance.


    ### Recovery Point Objective and Recovery Time Objective


    The recovery point objective (`RPO`) of an application indicates how much data
    loss is acceptable in the event of a failure. For a data warehouse that supports
    a reporting application, for example, this may be an extended period, such as
    24 hours, given that it may only be updated once per day by an ETL process and
    all other activity is read-only reporting. For highly transactional systems, however,
    such as an OLTP database supporting trading platforms or web applications, the
    `RPO` will be zero. An `RPO` of zero means that no data loss is acceptable.


    Applications may have different `RPO`s for high availability and for disaster
    recovery. For example, for reasons of cost or application performance, an `RPO`
    of zero may be required for a failover within the site. If the same application
    fails over to a DR data center, however, five or ten minutes of data loss may
    be acceptable. This is because of technology differences used to implement intra-site
    availability and inter-site recovery.


    The recovery time objective (`RTO`) for an application specifies the maximum amount
    of time an application can be down before recovery is complete and users can reconnect.
    When calculating the achievable `RTO` for an application, you need to consider
    many aspects. For example, it may take less than a minute for a cluster to fail
    over from one node to another and for the SQL Server service to come back up;
    however, it may take far longer for the databases to recover. The time it takes
    for databases to recover depends on many factors, including the size of the databases,
    the quantity of databases within an instance, and how many transactions were in-flight
    when the failover occurred. This is because all noncommitted transactions need
    to be rolled back.


    Just like `RPO`, it is common for there to be different `RTO`s depending on whether
    you have an intra-site or inter-site failover. Again, this is primarily due to
    differences in technologies, but it also factors in the amount of time you need
    to bring up the entire estate in the DR data center if the primary data center
    is lost.


    The `RPO` and `RTO` of an application may also vary in the event of data corruption.
    Depending on the nature of the corruption and the HA/DR technologies that have
    been implemented, data corruption may result in you needing to restore a database
    from a backup.


    If you must restore a database, the worst-case scenario is that the achievable
    point of recovery may be the time of the last backup. This means that you must
    factor a hard business requirement for a specific `RPO` into your backup strategy.
    If only part of the database is corrupt, however, you may be able to salvage some
    data from the live database and restore only the corrupt data from the restored
    database.


    Data corruption is also likely to have an impact on the `RTO`. One of the biggest
    influencing factors is if backups are stored locally on the server, or if you
    need to retrieve them from tape. Retrieving backup files from tape, or even from
    off-site locations, is likely to add significant time to the recovery process.


    **Note**

    Backups directly to tape from SQL Server are deprecated. When this section refers
    to retrieving backups from tape, it is assuming a tape drive as the target for
    an enterprise backup solution that your database backups have been offloaded too.


    Another influencing factor is what caused the corruption. If it is caused by a
    faulty IO subsystem, then you may need to factor in time for the Windows administrators
    to run the check disk command (`CHKDSK`) against the volume and potentially more
    time for disks to be replaced. If the corruption is caused by a user accidently
    truncating a table or deleting a data file, however, then this is not of concern.


    ### Cost of Downtime


    If you ask any business owners how much downtime is acceptable for their applications
    and how much data loss is acceptable, the answers invariably come back as zero
    and zero, respectively. Of course, it is never possible to guarantee zero downtime,
    and once you begin to explain the costs associated with the different levels of
    availability, it starts to get easier to negotiate a mutually acceptable level
    of service.


    The key factor in deciding how many 9s you should try to achieve is the cost of
    downtime. Two categories of cost are associated with downtime: tangible costs
    and intangible costs. Tangible costs are usually fairly straightforward to calculate.
    Let’s use a sales application as an example. In this case, the most obvious tangible
    cost is lost revenue because the sales staff cannot take orders. Intangible costs
    are more difficult to quantify but can be far more expensive. For example, if
    a customer is unable to place an order with your company, they may place their
    order with a rival company and never return. Other intangible costs can include
    loss of staff morale, which leads to higher staff turnover, or even loss of company
    reputation. Because intangible costs, by their very nature, can only be estimated,
    the industry rule of thumb is to multiply the tangible costs by three and use
    this figure to represent your intangible costs.


    Once you have an hourly figure for the total cost of downtime for your application,
    you can scale this figure out, across the predicted life cycle of your application,
    and compare the costs of implementing different availability levels. For example,
    imagine that you calculate that your total cost of downtime is $2,000/hour and
    the predicted life cycle of your application is three years. Table [1-2](#394392_3_En_1_Chapter.xhtml#Tab2)
    illustrates the cost of downtime for your application, comparing the costs that
    you have calculated for implementing each level of availability, after you have
    factored in hardware, licenses, power, cabling, additional storage, and additional
    supporting equipment, such as new racks, administrative costs, and so on. This
    is known as the total cost of ownership (`TCO`) of a solution.


    **Table 1-2**

    Cost of Downtime


    | Level of Availability | Cost of Downtime (Three Years) | Cost of Availability
    Solution |

    | --- | --- | --- |

    | 99% | $525,600 | $108,000 |

    | 99.9% | $52,560 | $224,000 |

    | 99.99% | $5,256 | $462,000 |

    | 99.999% | $526 | $910,000 |


    In this table, you can see that implementing five 9s of availability saves $525,074
    over a two-9s solution, but the cost of implementing the solution is an additional
    $802,000, meaning that it is not economical to implement. Four 9s of availability
    saves $520,344 over a two-9s solution and only costs an additional $354,000 to
    implement. Therefore, for this particular application, a four-9s solution is the
    most appropriate level of service to design for.'
