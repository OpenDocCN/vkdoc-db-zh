- fmt: 'If you receive a generic error, asking you to confirm storage account details
    and connectivity over HTTPS, I have found that the most common reason is connectivity.
    The cloud witness requires `Port 443` to be open, from all cluster nodes, to the
    Azure storage account.


    To configure the node weight of a node, you can use the script in Listing [3-4](#394392_3_En_3_Chapter.xhtml#PC4).


    ```

    Import-Module FailoverClusters

    (Get-ClusterNode CLUSTERNODE2).NodeWeight = 0

    Listing 3-4

    Set Node Weight

    ```


    To configure a cloud witness using PowerShell, use the script in Listing [3-5](#394392_3_En_3_Chapter.xhtml#PC5).


    Tip


    Make sure you change the account name and access key to match your own.


    ```

    Import-Module FailoverClusters

    Set-ClusterQuorum -CloudWitness -AccountName aoag3eds  -AccessKey +6lqzNKVpLnDZCrLA0Haz0W8VhoYdW2k==

    Listing 3-5

    Configure a Cloud Witness with PowerShell

    ```


    Note


    Examples in the rest of this book assume both nodes have a vote and that a disk
    witness is used.


    ## Configuring MSDTC


    If your instance of SQL Server uses distributed transactions, or if you are installing
    SQL Server Integration Services (SSIS), then it relies on `MSDTC` (Microsoft Distributed
    Transaction Coordinator). If your instance will use `MSDTC`, then you need to
    ensure that it is properly configured. If it is not, then setup will succeed,
    but transactions that rely on it may fail.


    When installed on a cluster, SQL Server automatically uses the instance of `MSDTC`
    that is installed in the same role, if one exists. If it does not, then it uses
    the instance of `MSDTC` to which it has been mapped (if this mapping has been
    performed). If there is no mapping, it uses the cluster’s default instance of
    `MSDTC`, and if there is not one, it uses the local machine’s instance of `MSDTC`.


    Many DBAs choose to install `MSDTC` within the same role as SQL Server; however,
    this introduces a problem. If `MSDTC` fails, it can also bring down the instance
    of SQL Server. Of course, the cluster attempts to bring both of the applications
    up on a different node, but this still involves downtime, including the time it
    takes to recover the databases on the new node, which takes a nondeterministic
    duration. For this reason, I recommend installing `MSDTC` in a separate role.
    If you do, the SQL Server instance still utilizes `MSDTC`, since it is the cluster’s
    default instance, and it removes the possibility of `MSDTC` causing an outage
    to SQL Server. This is also preferable to using a mapped instance or the local
    machine instance since it avoids unnecessary configuration, and the `MSDTC` instance
    should be clustered when a clustered instance of SQL Server is using it.


    To create an `MSDTC` role, start by selecting the **Configure Role** option from
    the **Roles** context menu in **Failover Cluster Manager**. This invokes the **High
    Availability Wizard**. On the **Select A Role** page of the wizard, select the
    **Distributed Transaction Coordinator (DTC)** role type, as shown in Figure [3-26](#394392_3_En_3_Chapter.xhtml#Fig26).


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig26_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig26_HTML.jpg)


    Figure 3-26


    The Select Role Page


    On the **Client Access Point** page, illustrated in Figure [3-27](#394392_3_En_3_Chapter.xhtml#Fig27),
    you need to enter a virtual name and IP address for `MSDTC`. In our case, we name
    it `` `ALWAYSON-MSDTC-C` `` and assign `` `10.0.0.21` `` as the IP address. On
    a multi-subnet cluster, you need to provide an IP address for each network.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig27_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig27_HTML.jpg)


    Figure 3-27


    The Client Access Point Page


    On the **Select Storage** page of the wizard, select the cluster disk on which
    you plan to store the `MSDTC` files, as shown in Figure [3-28](#394392_3_En_3_Chapter.xhtml#Fig28).
    In our case, this is Disk 4.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig28_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig28_HTML.jpg)


    Figure 3-28


    The Select Storage Page


    The **Confirmation** page displays an overview of the role that is about to be
    created.


    Alternatively, we could create this role in PowerShell. The script in Listing
    [3-6](#394392_3_En_3_Chapter.xhtml#PC6) first uses the `` `Add-ClusterServerRole`
    `` cmdlet to create the role. We pass the virtual name to use for the role into
    the `` `-Name` `` parameter, the name of the cluster disk to use into the `` `-Storage`
    `` parameter, and the IP address for the role into the `` `-StaticAddress` ``
    parameter.


    We then use the `` `Add-ClusterResource` `` cmdlet to add the DTC resource. The
    `` `-Name` `` parameter names the resource and the `` `-ResourceType` `` parameter
    specifies that it is a DTC resource. We then need to create the dependencies between
    the resources within the role. We did not need to do this when using the GUI,
    as the dependencies were created for us automatically. Resource dependencies specify
    the resource or resources on which other resources depend. A resource failing
    propagates through the chain and could take a role offline. For example, in the
    case of our `` `ALWAYSON-MSDTC-C` `` role, if either the disk or the virtual name
    becomes unavailable, the DTC resource goes offline. Windows Server supports multiple
    dependencies with both `` `AND` `` and `` `OR` `` constraints. It is the `` `OR`
    `` constraints that make multi-subnet clustering possible, because a resource
    can be dependent on IP address A `` `OR` `` IP address B. Finally, we need to
    bring the role online by using the `` `Start-ClusterGroup` `` cmdlet.


    ```

    #Create the Role

    Add-ClusterServerRole -Name ALWAYSON-MSDTC-C -Storage "Cluster Disk 3" -StaticAddress
    192.168.0.50

    #Create the DTC Resource

    Add-ClusterResource -Name MSDTC-ALWAYSON-MSDTC-C -ResourceType "Distributed Transaction
    Coordinator" -Group ALWAYSON-MSDTC-C

    #Create the dependencies

    Add-ClusterResourceDependency MSDTC-ALWAYSON-MSDTC-C ALWAYSON-MSDTC-C

    Add-ClusterResourceDependency MSDTC-ALWAYSON-MSDTC-C "Cluster Disk 3"

    #Bring the Role online

    Start-ClusterGroup ALWAYSON-MSDTC-C

    Listing 3-6

    Creating an MSDTC Role

    ```'
