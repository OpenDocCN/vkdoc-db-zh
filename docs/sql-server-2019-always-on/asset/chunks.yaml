- fmt: '# Create the VMs


    The first thing that we will require is three VMs, which will have SQL Server
    installed on them. There are various ways to achieve this in Azure, depending
    on your requirements. The first option is to go to the Azure Marketplace and find
    a machine image, with SQL Server installed. If you take this approach, then it
    is important to understand that there are two different types of license terms.
    The first is `SPLA` (Service Provide License Agreement). With `SPLA` licensing,
    the cost of the VM includes the cost of the SQL Server license. This means that
    your license is on a `pay-as-you-go` basis and avoids the upfront cost of license
    procurement, but does work out more expensive over time, if the VM will be long
    lived.


    The second option type is `BYOL` (bring your own license). With this license model,
    the SQL Server license is not included in the cost of the VM. Instead, you must
    use an existing license that has already been procured. When you chose this option,
    then you must report your license usage to Microsoft within 10 days.


    When you build a VM with SQL Server already installed, it arrives with a full
    installation of SQL Server, including all features. (Unless you choose an image
    marked `Database Engine Only`.) This is not ideal is most use cases, as it has
    a larger security footprint and resource utilization than installing just the
    features that you require. Therefore, if you use a VM image with SQL Server preinstalled
    (regardless of the licensing model), you should take the time to customize the
    image to meet your requirements.


    Alternatively, you could simply build a VM from a vanilla Windows Server image
    and install SQL Server yourself. This is the most flexibly option, but if you
    take this approach, then you must `bring your own license`. No `SPLA` option will
    be available.


    In this example, we will use the `SQL Server 2019 on Windows Server 2019` image,
    with `SPLA` licensing. Figure 7-4 shows the Marketplace icon for this VM image.


    ![Figure 7-4: SQL Server 2019 on Windows Server 2019 VM Image](images/394392_3_En_7_Chapter/394392_3_En_7_Fig4_HTML.jpg)


    In the first section of the `Create Virtual Machine` page, illustrated in Figure
    7-5, we will specify the `Subscription` and `Resource Group` that the VM should
    be created in, before specifying a name for the server and the `Region` it should
    be created in.


    ![Figure 7-5: Create a Virtual Machine (Part 1)](images/394392_3_En_7_Chapter/394392_3_En_7_Fig5_HTML.jpg)


    We then go on to specify the `Availability Options` that we would like for the
    VM. This is critical when planning Availability Groups. In the `Availability Options`
    dialog box, we can choose between `No infrastructure redundancy required`, `Availability
    Set`, or `Availability Zone`. If we had chosen `Availability Set`, then we would
    have had the option either to use the `Availability Set` we created earlier or
    to create a new `Availability Set`. We have chosen `Availability Zone`, however,
    so we can specify which `Availability Zone` the server should be created in. Each
    Region has a minimum of three `Availability Zones`.


    > **Caution**

    >

    > It is important to note, however, that the `Availability Option` cannot be changed
    after creating the VM. For example, you cannot create a VM with no availability
    option and then add it to an `Availability Set` later.


    We then have the option to choose change the image that we are building from and
    specify if we want to use `Spot instances`. `Spot instances` are rarely suitable
    for SQL Server and never in a production environment. `Spot instances` are built
    from spare capacity within Azure and are very cost effective. However, Azure can
    terminate them at very short notice, if they need the capacity. Therefore, `Spot
    instances` are usually most applicable for stateless applications, within `Scale
    Sets`, or for stateless applications in test environments.


    We also specify the size of VM that we would like to build. The monthly cost (based
    on the server being up 24x7) will be displayed to the right of the VMs size profile.


    We can now continue to populate the second half of the form, as shown in Figure
    7-6. Here, we specify the username and password for the VMs `Admin` user and if
    ports should be opened on a public IP address for the server. If so, we can specify
    which ports should be open.


    ![Figure 7-6: Create a Virtual Machine (Part 2)](images/394392_3_En_7_Chapter/394392_3_En_7_Fig6_HTML.jpg)


    > **Caution**

    >

    > Public ports should only ever be opened for dev/test purposes and even then
    it is highly advisable to create a VPN, or use a `Bastion` instead.


    Finally, we specify the licensing model we want to use. Note that this is just
    for the operating system, not for SQL Server, but we still have the same two options.
    We can either `pay as you go` for the Windows license or `bring your own`.


    On the `Disks` page, illustrated in Figure 7-7, we can configure the storage options
    for the VM. In the first section of the page, we can specify the storage tier
    that we want to use, from a choice of `Standard HDD`, `Standard SSD`, or `Premium
    SSD`. It will probably be unsurprising that I recommend using `Premium SSD` for
    VMs hosting SQL Server, although your choice may have other factors, such as company
    policy or budgetary constraints.


    ![Figure 7-7: Create a Virtual Machine – Disks Page](images/394392_3_En_7_Chapter/394392_3_En_7_Fig7_HTML.jpg)


    In the `Advanced` section of the page, we can specify if we want to use `Managed`
    or `Unmanaged` disks and if we want the OS disk to be `ephemeral`. `Managed disks`
    are usually recommended as they bring advantages such as automatically being split
    across `Fault` and `Update` domains. If your VM is being built on an `Availability
    Set`, these domains can also be aligned with the domains of the `Availability
    Set`. In our case, we must use `Managed disks`, as this is the only option when
    the `Availability Option` is configured as `Availability Zone`.


    `Ephemeral disks` use very fast storage, which is not termination resistant. Therefore,
    they are applicable for stateless applications but not suitable for VMs running
    SQL Server. In our case, we do not even have the option to choose an `ephemeral
    disk` for the operating system, as our image is too large to support it.


    On the `Networking` page (Figure 7-8), we can specify the `vnet` and `subnet`
    that the VM should be attached to, as well as configuring the public IP address
    and security groups that should be used. On this page, there are also options
    (unillustrated) that allow you to configure `Accelerated Networking`, which is
    a feature that allows low latency and high throughput to the VMs `NIC` (network
    interface card), but is only available for larger VMs, and also allows you to
    put the VM behind a preconfigured `Load Balancer`. This option is not suitable
    for SQL Server.


    ![Figure 7-8: Create a Virtual Machine – Networking](images/394392_3_En_7_Chapter/394392_3_En_7_Fig8_HTML.jpg)


    On the `Management` page, shown in Figure 7-9, we can configure the diagnostic
    settings for the VM. Specifically, we can select if we want `boot diagnostics`
    and `diagnostics from the guest operating system` to be captured, alongside which
    storage account the diagnostics should be saved to.


    ![Figure 7-9: Create a Virtual Machine – Management Page](images/394392_3_En_7_Chapter/394392_3_En_7_Fig9_HTML.jpg)'
