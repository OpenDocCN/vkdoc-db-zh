    使用 PowerShell 添加节点


    ## 小结


    AlwaysOn 故障转移群集实例可以使用 SQL Server 安装中心或通过 PowerShell 来安装。使用 SQL Server 安装中心时，该过程与独立实例的安装非常相似；但是，您需要指定其他详细信息，例如网络名称、IP
    地址和资源组配置。


    使用 PowerShell 安装实例时，将使用 `InstallFailoverCluster` 操作，除了独立实例构建所需的参数外，还需指定 `/FAILOVERCLUSTERIPADDRESSES`、`/FAILOVERCLUSTERNETWORKNAME`
    和 `/INSTALLSQLDATADIR` 参数。


    # 5. 在 Windows 上实现 AlwaysOn 可用性组


    AlwaysOn 可用性组为实现高可用性、灾难恢复和扩展只读工作负载提供了一个灵活的选择。该技术在数据库级别同步数据，健康监控和仲裁通常由 Windows
    群集提供，尽管 Windows 群集不是必需的。


    AlwaysOn 可用性组有不同的变体。传统的类型基于 Windows 故障转移群集，但如果 SQL Server 安装在 Linux 上，则可以使用 Pacemaker。AlwaysOn
    可用性组也可以在完全没有群集的情况下配置。这对于卸载报告工作负载是可以接受的，但不是有效的高可用性 (HA) 或灾难恢复 (DR) 配置。当使用 SQL Server
    2019 和 Windows Server 2019 时，可用性组甚至可以配置为容器化的 SQL，与 Kubernetes 一起使用。


    本章重点介绍如何在 Windows 故障转移群集上配置可用性组，以实现 HA 和 DR，并扩展只读工作负载。第 6 章将探讨 Linux 上的可用性组。


    注意

    在本章的演示中，我们将使用第 3 章中构建的群集，但已向该群集添加了两个额外的节点：`CLUSTERNODE3` 和 `CLUSTERNODE4`。我们将不使用在第
    4 章中配置的故障转移群集实例。相反，在每个节点上都安装了 SQL Server 的独立实例，名称如下：`CLUSTERNODE1\PROD`、`CLUSTERNODE2\SYNCHA`、`CLUSTERNODE3\ASYNCDR`
    和 `CLUSTERNODE4\READSCALE`。群集节点 1 和 2 位于名为 `Site1` 的子网中，群集节点 3 和 4 位于名为 `Site2`
    的不同子网中。这些实例将数据库数据和日志文件存储在 C:\ 卷上。群集内的共享存储未用于这些实例。


    在本章中，我们将执行以下活动：

    *   创建 Sales、Customers、Accounts 和 HR 数据库。

    *   在我们的实例上启用可用性组。

    *   使用“新建可用性组”向导为 HR 数据库创建一个可用性组。此可用性组将仅配置为 HA。

    *   使用“新建可用性组”对话框为 Sales 和 Customers 数据库创建一个可用性组。这将配置为 HA、DR 和读取扩展。

    *   使用 T-SQL 为 Accounts 数据库创建一个可用性组。此可用性组将配置为 HA 和 DR，没有任何读取扩展。

    *   我们还将讨论如何使用 PowerShell 创建可用性组。


    ## 准备实现 AlwaysOn 可用性组


    在实现 AlwaysOn 可用性组之前，我们首先创建四个数据库，这些数据库将在本章的演示中使用。每个数据库包含一个表，其中填充了数据。每个数据库都配置为恢复模式设置为
    `FULL`。这是数据库使用 AlwaysOn 可用性组的硬性要求，因为数据是通过日志流同步的。清单 5-1 中的脚本创建了这些数据库。

