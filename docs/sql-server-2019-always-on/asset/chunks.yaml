- fmt: '## Configuring the Cluster


    Many cluster configurations can be altered, depending on the needs of your environment.
    This section demonstrates how to change some of the more common configurations.


    ### Changing the Quorum


    If we examine our cluster storage in the Failover Cluster Manager, by drilling
    through `ALWAYSON-C` ➤ `Storage` ➤ `Disks` and highlighting the disk assigned
    to quorum, we can see that the witness has been correctly configured to use the
    Quorum volume. This is illustrated in Figure [3-18](#394392_3_En_3_Chapter.xhtml#Fig18).


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig18_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig18_HTML.jpg)


    Figure 3-18 Cluster Volumes


    We can modify this by entering the context menu of the cluster and by selecting
    `More Actions` ➤ `Configure Cluster Quorum Settings`, which causes the `Configure
    Cluster Quorum Wizard` to be invoked. On the `Select Quorum Configuration Option`
    page, shown in Figure [3-19](#394392_3_En_3_Chapter.xhtml#Fig19), we choose the
    `Select the Quorum Witness` option.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig19_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig19_HTML.jpg)


    Figure 3-19 The Select Quorum Configuration Option Page


    On the `Select Quorum Witness` page, we select the type of quorum that we want
    to configure. A disk witness is most appropriate when there are an even number
    of nodes in the cluster and all nodes reside in the same data center, or when
    there are an even number of nodes in the primary data center and another node
    in a secondary data center.


    A file share witness is most appropriate when there are nodes split across two
    data centers, and you have access to a third data center, where a file share is
    available to act as a quorum. Windows Server 2019 supports file shares on any
    device that supports `SMB 2.0` or above. This includes `USB` keys which can be
    attached to network routers.


    A cloud witness is most appropriate when there are nodes spread across two data
    centers and there is not a third data center available to set up a file share
    witness. To use a cloud witness, you must have an `Azure` storage account, as
    the witness will be created in `Azure BLOB` storage.


    It is most appropriate to not configure a witness, where there are an odd number
    of nodes in a single data center.


    For our scenario, we will select the option to configure a disk witness. This
    is illustrated in Figure [3-20](#394392_3_En_3_Chapter.xhtml#Fig20).


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig20_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig20_HTML.jpg)


    Figure 3-20 The Select Quorum Witness Page


    On the `Configure Storage Witness` page of the wizard, we can select the correct
    disk to use as a quorum. In our case, this is `Disk 4`, as illustrated in Figure
    [3-21](#394392_3_En_3_Chapter.xhtml#Fig21).


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig21_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig21_HTML.jpg)


    Figure 3-21 The Configure Storage Witness Page


    The `Summary` page of the wizard details the configuration changes that will be
    made to the cluster. It also highlights that dynamic quorum management is enabled
    and that all nodes, plus the quorum disk, have a vote in the quorum.


    We can also perform this configuration from the command line by using the `PowerShell`
    command in Listing [3-3](#394392_3_En_3_Chapter.xhtml#PC3). Here, we use the `Set-ClusterQuorum`
    cmdlet and pass in the name of the cluster, followed by the quorum type that we
    wish to configure. Because `disk` is included in this quorum type, we can also
    pass in the name of the cluster disk that we plan to use, and it is this aspect
    that allows us to change the quorum disk.


    Tip


    If following the demos using `PowerShell`, remember to change the disk number
    to match your own configuration.


    ```

    Set-ClusterQuorum -Cluster ALWAYSON-C -NodeAndDiskMajority "Cluster Disk 4"

    Listing 3-3 Configuring the Quorum Disk

    ```


    ### Advanced Quorum Configuration


    Recent versions of Windows Server allow you to configure advanced quorum configuration,
    such as voting weight and cluster witness. In this section, we will explore how
    to configure the vote weight of a node.


    Node weight is generally useful if you have a *multi-subnet cluster* . In this
    scenario, it is recommended that you use a file share witness in a third site.
    This helps you avoid a cluster outage as a result of network failure between data
    centers. If you have an odd number of nodes in the quorum, however, then adding
    a file share witness leaves you with an even number of votes, which is dangerous.
    Removing the vote from one of the nodes in the secondary data center eliminates
    this issue.


    You can also use node weight to temporarily remove the vote from a failed node,
    to avoid it impacting the quorum. I have also seen some people configure all nodes
    to have no vote, leaving the only vote with the disk witness. The idea here is
    to avoid having to dynamically changing the vote configuration should different
    nodes fail at different times. I would avoid this approach, however, as it introduces
    connectivity to the quorum disk as a single point of failure. If your quorum disk
    loses connectivity to the cluster, the cluster will become unavailable.


    The vote weight of each node can be modified by using the `Configure Cluster Quorum
    Wizard` and choosing the `Advanced Quorum` configuration option on the `Select
    Quorum Configuration Option` page. This causes the `Select Voting Configuration`
    page to be displayed, as illustrated in Figure [3-22](#394392_3_En_3_Chapter.xhtml#Fig22).


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig22_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig22_HTML.jpg)


    Figure 3-22 Select Voting Configuration Page


    In this example, we have removed the vote from `ClusterNode2`, assuming that the
    node has failed and we do not want it to impact our quorum.


    Note


    To follow the rest of this example, you must have an `Azure` storage account.
    The account must be of the type “General Purpose” and should be configured on
    the standard performance tier and have locally redundant storage.


    To change our disk witness to a cloud witness, we will then select the `Configure
    a Cloud Witness` option from the `Configure Cluster Quorum` page of the wizard,
    as shown in Figure [3-23](#394392_3_En_3_Chapter.xhtml#Fig23).


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig23_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig23_HTML.jpg)


    Figure 3-23 Select Quorum Witness Page


    Because of our selection, we will next be presented with the `Configure Cloud
    Witness` page of the wizard, as illustrated in Figure [3-24](#394392_3_En_3_Chapter.xhtml#Fig24).
    Here, we need to enter the name of our `Azure` storage account and primary access
    key of the storage account. The access key can be located in the `Azure Portal`,
    by drilling through `Storage Accounts` ➤ `<Name of storage account>` ➤ `Access
    keys` and copying `Key 1`. Generally, the service endpoint will remain with the
    default value; however, there are some occasions where you may need to change
    it. For example, `Azure` storage accounts in `China` use a different endpoint.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig24_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig24_HTML.jpg)


    Figure 3-24 Configure Cloud Witness Page


    Note


    The access key is not held within the cluster configuration. Instead, a `SAS`
    (shared access signature) is generated.


    The final page of the wizard (Figure [3-25](#394392_3_En_3_Chapter.xhtml#Fig25))
    shows the `Confirmation` page. Here, you should check the details before choosing
    `Next` to apply the settings.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig25_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig25_HTML.jpg)


    Figure 3-25 Confirmation Page


    Tip'
