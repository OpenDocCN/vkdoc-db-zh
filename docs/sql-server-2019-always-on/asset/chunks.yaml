- fmt: '## Summary


    SQL Server exposes a large amount of metadata that can help you troubleshoot issues
    and audit your configuration. While this chapter discusses some of the most helpful
    metadata, I strongly encourage you to explore the `hadr` DMVs further.


    For failover clustered instances, the `sys.dm_os_cluster_nodes` DMV exposes the
    health status of nodes within a cluster. Further troubleshooting detail can be
    found by calling the `sp_server_diagnostics` system stored procedure.


    ## Tip


    The `sp_server_diagnostics` system stored procedure can also be used for troubleshooting
    AlwaysOn Availability Groups and returns a row for each Availability Group hosted
    on the instance.


    The `sys.dm_hadr_availability_replica_states` DMV exposes details of the health
    status of Replicas, which host AlwaysOn Availability Groups. To drill down to
    view the health status of databases that participate within an Availability Group,
    the `sys.dm_hadr_database_replica_states` DMV can be queried.


    Both of the DMVs mentioned earlier can be joined to the `sys.availability_groups`
    and `sys.availability_replicas` DMVs to obtain the textual information regarding
    the configuration, as opposed to GUIDs. The `sys.dm_hadr_database_replica_states`
    DMV can also be joined to `sys.databases` to obtain further information regarding
    database configuration.'
  raw: '## Summary


    SQL Server exposes a large amount of metadata that can help you troubleshoot issues
    and audit your configuration. While this chapter discusses some of the most helpful
    metadata, I strongly encourage you to explore the `hadr` DMVs further.


    For failover clustered instances, the `sys.dm_os_cluster_nodes` DMV exposes the
    health status of nodes within a cluster. Further troubleshooting detail can be
    found by calling the `sp_server_diagnostics` system stored procedure.


    Tip


    The `sp_server_diagnostics` system stored procedure can also be used for troubleshooting
    AlwaysOn Availability Groups and returns a row for each Availability Group hosted
    on the instance.


    The `sys.dm_hadr_availability_replica_states` DMV exposes details of the health
    status of Replicas, which host AlwaysOn Availability Groups. To drill down to
    view the health status of databases that participate within an Availability Group,
    the `sys.dm_hadr_database_replica_states` DMV can be queried.


    Both of the DMVs mentioned earlier can be joined to the `sys.availability_groups`
    and `sys.availability_replicas` DMVs to obtain the textual information regarding
    the configuration, as opposed to GUIDs. The `sys.dm_hadr_database_replica_states`
    DMV can also be joined to sys.databases to obtain further information regarding
    database configuration.'
  trans: '

    ## 总结


    SQL Server 提供了大量元数据，可帮助您进行故障排除并审核配置。虽然本章节讨论了一些最有用的元数据，但我强烈建议您进一步探索 `hadr` 相关的
    DMV。


    对于故障转移群集实例，`sys.dm_os_cluster_nodes` DMV 可显示群集中各节点的运行状况状态。更详细的故障排除信息可通过调用系统存储过程
    `sp_server_diagnostics` 获取。


    ## 提示


    系统存储过程 `sp_server_diagnostics` 也可用于故障排除 AlwaysOn 可用性组，并会为实例上承载的每个可用性组返回一行。


    `sys.dm_hadr_availability_replica_states` DMV 提供承载 AlwaysOn 可用性组的副本的详细运行状况状态。若要深入查看参与可用性组的数据库的运行状况状态，可查询
    `sys.dm_hadr_database_replica_states` DMV。


    前面提到的两个 DMV 均可与 `sys.availability_groups` 和 `sys.availability_replicas` DMV 进行联接，以获取有关配置的文本信息（而非
    GUID）。`sys.dm_hadr_database_replica_states` DMV 也可与 `sys.databases` 联接，以获取有关数据库配置的更多信息。

    '
