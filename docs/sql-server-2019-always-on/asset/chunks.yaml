  trans: '

    # 可用性组概述


    可用性组通过一个数据库镜像端点进行通信。尽管数据库镜像功能已被弃用，但这些端点本身并未被弃用。


    # 备份首选项选项卡


    在“备份首选项”选项卡（见图 5-6）上，我们可以指定将对哪个副本执行自动备份。`AlwaysOn 可用性组`的一大优势在于，使用时您可以将维护任务（如备份）扩展到辅助服务器。因此，自动备份可以无缝地定向到活动辅助副本。可能的选项包括`首选辅助副本`、`仅限辅助副本`、`首选主副本`或`任何副本`。还可以为每个副本设置优先级。当决定对哪个副本运行备份作业时，`SQL
    Server` 会评估每个节点的备份优先级，并更有可能选择优先级最高的副本。


    ![图 5-6：备份首选项选项卡](img/394392_3_En_5_Fig6_HTML.jpg)


    # 扩展自动备份的考虑因素


    虽然减少主副本上的 `IO` 优势明显，但我有些争议性地建议在许多情况下不要将自动备份扩展到辅助副本。特别是当 `RTO`（恢复时间目标）因操作可支持性问题而成为应用程序的优先事项时。想象这样一个场景：备份正在辅助副本上执行，用户致电说他们不小心删除了一个关键表中的所有数据。您现在需要还原数据库副本并重新填充该表。然而，备份文件却存放在辅助副本上。因此，在开始还原数据库（或通过网络执行还原）之前，您需要先将备份文件复制到主副本。这立即使您的
    `RTO` 增加。


    此外，当配置为允许在多台服务器上执行备份时，`SQL Server` 仍然只在执行备份的实例上维护备份历史记录。这意味着您可能需要在服务器之间匆忙尝试检索所有备份文件，却不知道每个文件存放在哪里。如果其中一台服务器发生完全系统中断，情况会变得更糟。您可能会陷入日志链断裂的境地。


    对于我刚提到的大多数问题，解决方法是使用文件服务器上的共享文件夹，并将每个实例配置为备份到同一共享位置。这可能带来中性、正面或负面的影响。负面影响在于，如果您使用的是本地连接存储。通过这种方式设置备份，您现在是将所有备份通过网络传输，而不是在本地备份。这可能会增加备份的持续时间并增加网络流量。正面影响则体现在您使用的是云
    `IaaS`（基础设施即服务）环境时。通常，附加到您的 `VM`（虚拟机）的存储比用于创建文件共享的存储更昂贵。然而，在许多现代本地场景中，其影响是中性的。这是因为文件共享和服务器存储很可能位于同一个
    `SAN`（存储区域网络）或 `NAS`（网络附加存储）设备上。这意味着，如果您以这种方式配置备份，网络流量或延迟没有区别。


    # 监听器选项卡


    在“监听器”选项卡（如图 5-7 所示）上，我们选择是创建可用性组侦听器，还是将此任务推迟到以后。如果选择创建侦听器，则需要指定侦听器的名称、其应监听的端口以及它应使用的
    `IP` 地址。在多子网集群中，我们需要为每个子网指定一个地址。此处提供的详细信息用于在可用性组的集群角色中创建客户端访问点资源。您可能会注意到，我们为侦听器指定了端口
    `1433`，而我们的实例也运行在端口 `1433` 上。这是一个有效的配置，因为侦听器配置在与 `SQL Server` 实例不同的 `IP` 地址上。使用相同的端口号并非强制要求，但如果您是在现有实例上实施
    `AlwaysOn 可用性组`，这可能是有益的，因为指定端口号连接的应用程序可能需要更少的应用程序更改。请记住，服务器名称仍将不同，因为应用程序将连接到侦听器的虚拟名称，而不是物理服务器\实例的名称。在我们的示例中，应用程序连接到
    `HR` 而不是 `CLUSTERNODE1\PROD`。尽管通过 `CLUSTERNODE1` 的连接仍然允许，但它们无法受益于高可用性或扩展我们的报表功能。


    ![图 5-7：监听器选项卡](img/394392_3_En_5_Fig7_HTML.jpg)


    > **提示**：子网是网络的一个网段，包含来自更大网络的一部分 `IP` 地址。


    因为我们的 `HR` 可用性组不跨越多个子网，所以我们的侦听器将只有一个 `IP` 地址。


    > **提示**：如果您在组织单位（`OU`）内没有`创建计算机对象`权限，那么侦听器的 `VCO`（虚拟计算机对象）必须已存在于 `AD`（活动目录）中，并且您必须被分配对该对象的`完全控制`权限。


    > **提示**：由于 `HR` 可用性组不会配置为可读辅助副本，因此我们不需要配置`只读路由`选项卡；但是，我们将在本章的“使用新建可用性组对话框”一节中探讨只读路由。


    # 选择初始数据同步页面


    在“选择初始数据同步”屏幕（如图 5-8 所示）上，我们选择如何执行副本的初始数据同步。如果选择`完全同步`，则参与可用性组的每个数据库都将执行完整备份，然后是日志备份。备份文件备份到您指定的共享位置，然后还原到辅助服务器。共享路径可以使用
    Windows 或 Linux 格式指定，具体取决于您的要求。还原完成后，通过日志流的数据同步开始。


    ![图 5-8：选择数据同步页面](img/394392_3_En_5_Fig8_HTML.jpg)


    如果您已经备份了数据库并将其还原到辅助副本上，则可以选择`仅加入`选项。这将启动可用性组内数据库通过日志流的数据同步。选择`跳过初始数据同步`允许您在完成设置后自行备份和还原数据库。


    如果您选择`自动种子设定`选项，则最初会在每个副本上创建一个空数据库。然后，数据通过日志流传输使用 `VDI`（虚拟设备接口）进行种子设定。此选项比使用备份初始化慢，但避免了在共享位置之间传输大型备份文件。


    > **提示**：如果您的可用性组将包含许多数据库，那么最好自行执行备份/还原操作。这是因为内置工具将按顺序执行操作，因此可能需要很长时间才能完成。

    '
- fmt: '# 验证与配置过程


    在验证页面，将检查可能导致设置失败的规则。如果任何一项结果为失败，则需要在尝试继续之前解决它们。


    提示


    在验证过程中，一个常见的陷阱会在使用命名实例时被发现。可用性组的要求是数据库必须位于所有副本上相同的文件路径中。然而，SQL Server 数据文件的默认文件位置包含实例名称。这对于默认实例无关紧要，因为文件路径中的实例名称始终是`MSSQLSERVER`。但对于命名实例，请确保数据库文件存储在所有服务器上都存在的文件路径中。


    验证测试完成后，我们会转到摘要页面，其中列出了在设置期间要执行的任务。


    随着设置的进行，每个配置任务的结果会显示在结果页面上。如果在此页面上出现任何错误，请务必调查，但这不一定意味着需要重新配置整个可用性组。例如，如果创建可用性组侦听器失败是因为`VCO`未在`AD`中呈现，那么您可以重新创建侦听器，而无需重新创建整个可用性组。


    作为使用新建可用性组向导的替代方法，您可以使用新建可用性组对话框，然后使用添加侦听器对话框来执行可用性组的配置。下一节将研究这种创建可用性组的方法。


    ## 使用新建可用性组对话框


    既然我们已经成功创建了第一个可用性组，现在让我们为`Sales`创建第二个可用性组。此可用性组将包含`Sales`和`Customer`数据库。这次，我们使用新建可用性组和添加侦听器对话框。我们通过备份`两个数据库`来开始此过程。就像我们创建`HR`可用性组时一样，在执行备份之前，数据库是不可选择的。与使用向导不同，我们无法使用备份/恢复选项让
    SQL Server 执行初始数据库同步。因此，我们必须要么将数据库备份到我们在先前演示中创建的共享，然后将该备份以及一个事务日志备份还原到辅助实例，要么使用自动暂存。在此示例中，我们将使用自动暂存，因此无需提前将数据库还原到辅助副本。清单[5-4](#394392_3_En_5_Chapter.xhtml#PC4)中的脚本将执行数据库的完整备份。


    提示


    要使自动暂存工作，必须授予可用性组在辅助服务器上的`CREATE ANY DATABASE`权限。


    ```

    --Back Up Sales Database

    BACKUP DATABASE Sales

    TO  DISK = N''C:\Backups\Sales.bak''

    WITH NAME = N''Sales-Full Database Backup'' ;

    GO

    --Back Up Customers Database

    BACKUP DATABASE Customers

    TO  DISK = N''C:\Backups\Customers.bak''

    WITH NAME = N''Customers-Full Database Backup'' ;

    GO

    ```

    清单 5-4

    备份和还原数据库


    如果我们尚未创建可用性组，那么我们的下一步工作将是创建一个`TCP`端点，以便实例可以通信。然后，我们需要在每个实例上为服务帐户创建一个登录名，并授予其在端点上的连接权限。然而，由于每个实例只能有一个数据库镜像端点，因此我们不需要创建一个新的端点，而且显然我们也没有理由授予服务帐户额外的权限。因此，我们继续创建可用性组。为此，我们在对象资源管理器中浏览
    AlwaysOn 高可用性，并从可用性组的上下文菜单中选择新建可用性组。


    这将显示新建可用性组对话框的常规选项卡，如图[5-9](#394392_3_En_5_Chapter.xhtml#Fig9)所示。在此屏幕上，我们在第一个字段中键入可用性组的名称。然后，我们在可用性数据库窗口下单击添加按钮，再键入要添加到组中的数据库的名称。然后，我们需要在可用性副本窗口下单击添加按钮，再在新行中键入辅助副本的服务器\实例名称。然而，我们将`Required
    Synchronized Secondaries to Commit`设置为`1`。此设置在 SQL Server 2017 中引入，它保证在主副本提交每个事务之前，指定数量的辅助副本将事务数据写入日志。在我们的场景中，我们只有一个同步辅助副本，如果主副本发生故障，故障转移将自动发生，但在原始主副本重新联机之前，辅助副本将不允许用户事务写入数据库。这绝对保证了在任何情况下都不会发生数据丢失。如果我们将其保留为`0`（正如我们在本章第一个示例中所做的那样），那么在主副本发生故障且用户在其他副本也发生故障之前将事务写入辅助副本的情况下，就可能发生数据丢失，因为其他副本配置为异步提交模式。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig9_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig9_HTML.jpg)


    图 5-9

    新建可用性组对话框'
  raw: 'On the Validation page, rules that may cause the setup to fail are checked.
    If any of the results come back as Failed, then you need to resolve them before
    you attempt to continue.


    Tip


    A common gotcha is discovered during the validation process, when you are using
    named instances. A requirement of availability groups is that the databases must
    reside in the same file path on all replicas. The default file location for SQL
    Server data files includes the name of the instance, however. This does not matter
    for default instances, because the instance name within the file path is always
    MSSQLSERVER. For named instances, however, ensure that the database files are
    stored in a file path that exists on all servers.


    Once validation tests are complete and we move to the Summary page, we are presented
    with a list of the tasks that are to be carried out during the setup.


    As setup progresses, the results of each configuration task display on the Results
    page . If any errors occur on this page, be sure to investigate them, but this
    does not necessarily mean that the entire availability group needs to be reconfigured.
    For example, if the creation of the availability group listener fails because
    the VCO had not been presented in AD, then you can re-create the listener without
    needing to re-create the entire availability group.


    As an alternative to using the New Availability Group wizard, you can perform
    the configuration of the availability group using the New Availability Group dialog
    box, followed by the Add Listener dialog box. This method of creating an availability
    group is examined in the next section.


    ## Using the New Availability Group Dialog Box


    Now that we have successfully created our first availability group, let’s create
    a second availability group for `Sales`. This availability group will contain
    the `Sales` and `Customer` databases. This time, we use the New Availability Group
    and Add Listener dialog boxes. We begin this process by backing up the `two databases`.
    Just like when we created the `HR` availability group, the databases are not selectable
    until we perform the backup. Unlike when we used the wizard, however, we have
    no way to make SQL Server perform the initial database synchronization using a
    backup/restore option. Therefore, we must either back up the database to the share
    that we created during the previous demonstration and then restore the backup,
    along with a transaction log backup, to the secondary instance, or use Automatic
    Seeding. In this example, we will use Automatic Seeding, so there is no need to
    restore the databases to the secondary Replicas in advance. The script in Listing
    [5-4](#394392_3_En_5_Chapter.xhtml#PC4) will perform the Full backup of the databases.


    Tip


    For Automatic Seeding to work, the Availability Group must be granted the `CREATE
    ANY DATABASE` permission on the secondary servers.


    ```

    --Back Up Sales Database

    BACKUP DATABASE Sales

    TO  DISK = N''C:\Backups\Sales.bak''

    WITH NAME = N''Sales-Full Database Backup'' ;

    GO

    --Back Up Customers Database

    BACKUP DATABASE Customers

    TO  DISK = N''C:\Backups\Customers.bak''

    WITH NAME = N''Customers-Full Database Backup'' ;

    GO

    Listing 5-4

    Backing Up and Restoring the Database

    ```


    If we had not already created an availability group, then our next job would be
    to create a TCP endpoint so the instances could communicate. We would then need
    to create a login for the service account on each instance and grant it the connect
    permissions on the endpoints. Because we can only ever have one database mirroring
    endpoint per instance, however, we are not required to create a new one, and obviously
    we have no reason to grant the service account additional privileges. Therefore,
    we continue by creating the availability group. To do this, we drill through AlwaysOn
    High Availability in Object Explorer and select New Availability Group from the
    context menu of availability groups.


    This causes the General tab of the New Availability Group dialog box to display,
    as illustrated in Figure [5-9](#394392_3_En_5_Chapter.xhtml#Fig9). On this screen,
    we type the name of the availability group in the first field. Then, we click
    the Add button under the Availability Databases window before we type the name
    of the database that we wish to add to the group. We then need to click the Add
    button under the Availability Replicas window before we type the server\instance
    name of the secondary replica in the new row. We have set Required Synchronized
    Secondaries to Commit to 1, however. This setting, which was introduced in SQL
    Server 2017, guarantees that the specified number of secondary replicas writes
    the transaction data to log before the primary replica commits each transaction.
    In our scenario, where we only have a single synchronous secondary, that in the
    event of a failure on the Primary Replica, failover will happen automatically,
    but the Secondary Replica will not allow user transactions to be written to the
    database, until the original Primary Replica comes back online. This absolutely
    guarantees that there can be no data loss in any circumstances. If we had left
    this setting as 0 (as we did in the first example in this chapter), then in the
    event that the Primary Replica failed and users wrote transactions to the Secondary
    Replica, before this Replica also failed, then data loss could occur, as the other
    Replicas are configured in asynchronous commit mode.


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig9_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig9_HTML.jpg)


    Figure 5-9


    The New Availability Group Dialog Box'
