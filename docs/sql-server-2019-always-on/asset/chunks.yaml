  trans: '

    ## 三节点及以上的配置


    如前所述，一个集群中最多可容纳 64 个节点。当拥有三个或更多节点时，考虑到相关成本，您可能不希望仅有一个活动节点和两个冗余节点。相反，您可以选择实施 N+1
    或 N+M 配置。


    在 N+1 配置中，您拥有多个活动节点和一个被动节点。如果任何一个活动节点发生故障，它们会故障转移到被动节点。图 2-3 中的示意图描绘了一个三节点的 N+1
    集群。


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig3_HTML.jpg](img/394392_3_En_2_Fig3_HTML.jpg)


    **图 2-3** 三节点 N+1 配置


    在 N+1 配置中，发生多重故障的场景下，多个节点可能会故障转移到同一个被动节点。因此，在规划资源时必须非常谨慎，以确保被动节点能够支持多个实例。不过，您可以通过使用
    N+M 配置来缓解此问题。


    N+1 配置拥有多个活动节点和一个被动节点，而 N+M 集群则拥有多个活动节点和多个被动节点，尽管被动节点的数量通常少于活动节点。图 2-4 中的示意图展示了一个五节点的
    N+M 配置。该图显示，实例 3 被配置为始终故障转移到其中一个被动节点，而实例 1 和实例 2 则被配置为始终故障转移到另一个被动节点。这使您可以灵活地控制被动节点上的资源，但您也可以将集群配置为允许任何活动节点故障转移到任一被动节点——如果这对您的环境来说是更合适的设计。


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig4_HTML.jpg](img/394392_3_En_2_Fig4_HTML.jpg)


    **图 2-4** 五节点 N+M 配置


    ## 仲裁


    为了实现自动故障转移，集群服务需要知晓节点是否宕机。为此，您必须形成仲裁。仲裁的定义是“开展业务所需的最少成员数量”。在高可用性的语境下，这意味着集群内的每个节点，以及可选的见证设备（可以是集群磁盘、集群外部的文件共享或
    Azure BLOB 存储），都会获得一票投票权。如果超过半数的投票成员无法与某个节点通信，集群服务便知道该节点已宕机，并将该服务器上任何集群感知的应用程序故障转移到另一个节点。之所以需要超过半数的投票成员无法与该节点通信，是为了避免一种称为
    `脑裂` 的情况。


    为解释脑裂场景，想象您在数据中心 1 有三个节点，在数据中心 2 也有三个节点。现在假设两个数据中心之间的网络连接中断，但所有六个节点仍保持在线。数据中心
    1 的三个节点认为数据中心 2 的所有节点都不可用。反之，数据中心 2 的节点认为数据中心 1 的节点不可用。这导致集群的两侧（称为分区）都认为自己应该取得控制权。这对于成功连接到任一分区的任何应用程序都可能产生不可预测且不希望的后果。`仲裁
    = (投票成员数 / 2) + 1` 这个公式正是为了防止这种场景。


    **提示**

    如果您的集群失去仲裁，可以通过使用 `/fq` 开关启动集群服务来强制一个分区联机。如果您使用的是 Windows Server 2012 R2 或更高版本，则您强制联机的分区将被视为
    `权威分区`。这意味着当连接恢复时，其他分区可以自动重新加入集群。


    有多种仲裁模型可用，最合适的模型取决于您的环境。表 2-1 列出了您可以使用的模型，并详述了其最适用的方式。


    **表 2-1** 仲裁模型


    | 仲裁模型 | 适用场景 |

    | --- | --- |

    | 节点多数 | 当集群中的节点数为奇数时 |

    | 节点+磁盘见证多数 | 当集群中的节点数为偶数时 |

    | 节点+文件共享见证多数 | 当节点分布在多个站点时，或当节点数为偶数且需要避免使用共享磁盘时* |


    \* *由于虚拟化而需要避免共享磁盘的原因将在本章后面讨论。*


    虽然默认选项是“一个节点，一票”，但可以通过将 `NodeWeight` 属性更改为零来手动移除节点的投票权。这在您拥有 `多子网集群`（节点分布在多个站点的集群）时非常有用。在此场景中，建议您在第三个站点使用文件共享见证。这有助于避免因数据中心之间的网络故障而导致集群中断。然而，如果您的仲裁节点数为奇数，那么添加文件共享见证会导致投票数为偶数，这是危险的。移除辅助数据中心中某个节点的投票权即可消除此问题。从
    Windows Server 2019 开始，文件共享见证可以是任何支持 SMB（服务器消息块）2.0 或更高版本的文件共享。这包括连接到网络路由器的 USB
    密钥、NAS（网络附加存储设备）以及加入工作组的 Windows 计算机。


    **注意**

    文件共享见证不存储完整的仲裁数据库副本。这意味着带有文件共享见证的双节点集群容易受到一种称为 `时间分区` 的场景影响。在此场景中，如果您在为第二个节点打补丁或更改集群服务的过程中有一个节点发生故障，那么将没有最新的仲裁数据库副本。这会使您处于需要销毁并重建集群的境地。


    现代版本的 Windows Server 还支持动态仲裁和 50% 节点拆分裁决器的概念。启用动态仲裁后，集群服务会根据集群中的节点数量自动决定是否赋予仲裁见证投票权。如果您有偶数个节点，则会为其分配一票。如果您有奇数个节点，则不为其分配投票权。50%
    节点拆分裁决器扩展了这个概念。如果您有偶数个节点和一个见证，而见证发生故障，那么集群服务会自动移除集群中某个随机节点的一票。这维持了仲裁中投票数为奇数，降低了因见证故障导致集群离线的风险。


    **提示**

    如果您的集群运行在 Windows Server 2016 或更高版本的数据中心版上，则支持存储空间直通。它允许使用本地连接的物理存储，并在其上构建软件定义的存储层来实现高可用性。关于存储空间直通的完整讨论超出了本书范围，但您可以在
    [`docs.microsoft.com/en-us/windows-server/storage/storage-spaces/storage-spaces-direct-overview`](http://docs.microsoft.com/en-us/windows-server/storage/storage-spaces/storage-spaces-direct-overview)
    找到更多详细信息。

    '
- fmt: '## AlwaysOn Availability Groups


    AlwaysOn Availability Groups (AOAG) replaces database mirroring and is essentially
    a merger of database mirroring and clustering technologies. SQL Server is installed
    as a stand-alone instance (as opposed to an AlwaysOn Failover Clustered Instance)
    on each node of a cluster. A cluster-aware application, called an `Availability
    Group Listener`, is then installed on the cluster; it is used to direct traffic
    to the correct node. Instead of relying on shared disks, however, AOAG compresses
    the log stream and sends it to the other nodes, in a similar fashion to database
    mirroring.


    AOAG is the most appropriate technology for high availability in scenarios where
    you have small databases with low write profiles. This is because, when used synchronously,
    it requires that the data is committed on all synchronous replicas before it is
    committed on the primary database. You can have up to eight replicas, including
    three synchronous replicas. AOAG may also be the most appropriate technology for
    implementing high availability in a virtualized environment. This is because the
    shared disk required by clustering may not be compatible with some features of
    the virtual estate. As an example, `VMware` does not support the use of `vMotion`,
    which is used to manually move virtual machines (VMs) between physical servers,
    and the `Distributed Resource Scheduler (DRS)`, which is used to automatically
    move VMs between physical servers, based on resource utilization, when the VMs
    use shared disks, presented over `Fiber Channel`.


    Tip


    The limitations surrounding shared disks with VMware features can be worked around
    by presenting the storage directly to the guest OS over an `iSCSI` connection
    at the expense of performance degradation.


    AOAG is the most appropriate technology for DR when you have a proactive failover
    requirement but when you do not need to implement a load delay. AOAG may also
    be suitable for disaster recovery in scenarios where you wish to utilize your
    DR server for offloading reporting. This allows the redundant servers to be utilized.
    When used for disaster recovery, AOAG works in an asynchronous mode. This means
    that it is possible to lose data in the event of a failover. The `RPO` is nondeterministic
    and is based on the time of the last uncommitted transaction.


    In the old days, of database mirroring, the secondary database was always offline.
    This means that you cannot use the secondary database to offload any reporting
    or other read-only activity. It is possible to work around this by creating a
    database snapshot against the secondary database and pointing read-only activity
    to the snapshot. This can still be complicated, however, because you must configure
    your application to issue read-only statements against a different network name
    and IP address. Availability Groups, on the other hand, allow you to configure
    one or more replicas as readable. The only limitation is that readable replicas
    and automatic failover cannot be configured on the same secondaries. The norm,
    however, would be to configure readable secondary replicas in asynchronous commit
    mode so that they do not impair performance.


    To further simplify this, the `Availability Group Replica` checks for the `read-only`
    or `read-intent` properties in an applications `connection string` and points
    the application to the appropriate node. This means that you can easily scale
    reporting and database maintenance routines horizontally with very little development
    effort and with the applications being able to use a single connection string.


    Because AOAG allows you to combine synchronous replicas (with or without automatic
    failover), asynchronous replicas, and replicas for read-only access, it allows
    you to satisfy high availability, disaster recovery, and reporting scale-out requirements
    using a single technology. If you’re sole requirement is read-scaling, as opposed
    to HA or DR, then it is actually possible to configure Availability Groups with
    no cluster, from `SQL Server 2017` onward. In this case, there is no cluster service
    and hence no automatic redirection. Replicas within the Availability Groups use
    certificate when communicating with each other. This is also true if you configure
    Availability Groups without AD, in a workgroup, or cross-domain.


    When you are using AOAG, failover does not occur at the database level, nor at
    the instance level. Instead, failover occurs at the level of the availability
    group. The availability group is a concept that allows you to group related databases
    together so that they can fail over as an atomic unit. This is particularly useful
    in consolidated environments, because it allows you to group together the databases
    that map to a single application. You can then fail over this application to another
    replica for the purposes of DR testing, among other reasons, without having an
    impact on the other data-tier applications that are hosted on the instance.


    No hard limits are imposed for the number of availability groups you can configure
    on an instance, nor are there any hard limits for the number of databases on an
    instance that can take part in AOAG. Microsoft, however, has tested up to, and
    officially recommends, a maximum of 100 databases and 10 availability groups per
    instance. The main limiting factor in scaling the number of databases is that
    AOAG uses a database mirroring endpoint and there can only be one per instance.
    This means that the log stream for all data modifications is sent over the same
    endpoint.


    Figure [2-5](#394392_3_En_2_Chapter.xhtml#Fig5) depicts how you can map data-tier
    applications to availability groups for independent failover. In this example,
    a single instance hosts two data-tier applications. Each application has been
    added to a separate availability group. The first availability group has failed
    over to Node2. Therefore, the availability group listeners point traffic for Application1
    to Node2 and traffic for Application2 to Node1. Because each availability group
    has its own network name and IP address, and because these resources fail over
    with the AOAG, the application is able to seamlessly reconnect to the databases
    after failover.


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig5_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Availability Groups Failover


    The diagram in Figure [2-6](#394392_3_En_2_Chapter.xhtml#Fig6) depicts an AlwaysOn
    Availability Group topology. In this example, there are four nodes in the cluster
    and a disk witness. Node1 is hosting the primary replicas of the databases, Node2
    is being used for automatic failover, Node3 is being used to offload reporting,
    and Node4 is being used for DR. Because the cluster is stretched across two data
    centers, multi-subnet clustering has been implemented. Because there is no shared
    storage, however, there is no need for `SAN` replication between the sites.


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig6_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig6_HTML.jpg)


    Figure 2-6


    AlwaysOn Availability Group Topology'
