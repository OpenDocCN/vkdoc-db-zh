  trans: '## 技术整合


    为满足业务目标与非功能性需求（NFRs），您需要将多种高可用性与灾难恢复技术整合在一起，以构建可靠、可扩展的平台。一个经典的例子便是需要将`AlwaysOn
    故障转移群集`与`AlwaysOn 可用性组`结合使用。


    之所以需要整合这些技术，是因为当您使用同步模式的`AlwaysOn 可用性组`（这是实现自动故障转移所必需的）时，可能会引发性能瓶颈。正如本章前面所讨论的，性能问题源于事务在辅助服务器上提交后，才在主服务器上提交。然而，群集技术不会遇到此问题，因为它依赖于`共享磁盘资源`，因此事务仅被提交一次。


    因此，通常的做法是先利用群集实现高可用性，再使用`AlwaysOn 可用性组`来执行`灾难恢复（DR）`和/或卸载报表负载。图 2-9 中的示意图展示了一种`HA/DR`拓扑结构，它结合了群集与`AOAG`，分别实现高可用性和灾难恢复。


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig9_HTML.jpg](img/394392_3_En_2_Fig9_HTML.jpg)

    **图 2-9** 故障转移群集与 AlwaysOn 可用性组结合


    图 2-9 的示意图显示，数据库的主副本托管在一个双节点主动/被动群集上。如果主动节点发生故障，则应用群集规则，`共享存储`、`网络名称`和`IP 地址`将重新附加到被动节点，使其成为新的主动节点。然而，如果两个节点均无法访问，可用性组侦听器会将流量指向群集的第三个节点，该节点位于`灾难恢复（DR）`站点，并通过日志流复制进行同步。当然，当使用异步模式时，数据库必须由`数据库管理员（DBA）`手动进行故障转移。


    另一种常见场景是结合使用群集与`日志传送`来分别实现高可用性和灾难恢复。这种组合的工作方式与群集结合`AlwaysOn 可用性组`非常相似，如图 2-10
    所示。


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig10_HTML.jpg](img/394392_3_En_2_Fig10_HTML.jpg)

    **图 2-10** 故障转移群集与日志传送给合


    示意图显示，在主数据中心已配置了一个双节点主动/被动群集。托管在此实例上的数据库的`事务日志`随后被传送到`灾难恢复（DR）`数据中心的一台独立服务器。由于群集使用`共享存储`，您也应为`备份卷`使用`共享存储`，并将`备份卷`作为资源添加到角色中。这意味着当实例故障转移到另一个节点时，`备份共享`也会随之故障转移，`日志传送`得以继续同步，不会中断。


    **注意**

    如果在`日志传送备份`或`复制作业`正在进行时发生故障转移，`日志传送`可能会失去同步并需要手动干预。这意味着故障转移后，您应检查`日志传送`作业的运行状况。


    ## 总结


    理解可用性的概念是为需要高可用性和灾难恢复的应用程序做出正确实现选择的关键。您应计算停机成本，并将其与实现不同`HA/DR`解决方案选择的成本进行比较，以帮助企业了解每个选项的成本/效益概况（如第
    1 章所述）。在选择技术实现时，您还应注意`服务级别协议（SLAs）`，因为未能满足`SLAs`可能会带来财务处罚。


    `SQL Server`提供了一套完整的高可用性和灾难恢复技术，使您能够灵活地实现最适合`数据层应用程序`需求的解决方案。对于高可用性，您可以选择实现故障转移群集或`AlwaysOn
    可用性组（AOAG）`。故障转移群集使用`共享磁盘资源`，故障转移发生在`实例级别`。而`AOAG`则通过维护数据库的冗余副本及同步日志流，在`数据库级别`同步数据。


    要实现灾难恢复，您可以选择实现`AOAG`或`日志传送`。`日志传送`的工作原理是对数据库的`事务日志`进行备份、复制和还原，而`AOAG`则使用异步日志流同步数据。


    也可以将多种`高可用性（HA）`和`灾难恢复（DR）`技术组合在一起，以实现最合适的可用性策略。常见的例子包括将用于高可用性的故障转移群集与`AOAG`或`日志传送`结合，以提供`灾难恢复（DR）`功能。'
- fmt: '# 3. Implementing a Cluster


    Engineers may find the process of building and configuring a cluster to be complex
    and that they can implement many variations of the pattern. Although DBAs may
    not always need to build a cluster themselves, they do need to be comfortable
    with the technology and often need to provide their input into the process. They
    may also take part in troubleshooting issues discovered with the cluster.


    For these reasons, this chapter discusses how to build a cluster at the Windows
    level and discusses some of the possible configurations. The demonstrations in
    this chapter use a prebuilt environment, consisting of two servers; `ClusterNode1`
    and `ClusterNode2`. Both servers reside in a domain, named `AlwaysOn.com`. Five
    volumes have been presented to the nodes from a SAN and have been brought online
    and formatted on `ClusterNode1`, with the configuration detailed in Table `3-1`.


    Table 3-1 Disk Configuration


    | Drive Letter | Volume Label | Size | Comments |

    | --- | --- | --- | --- |

    | F | Data | 10GB | Host SQL Server data files |

    | L | Logs | 3GB | Host SQL Server log files |

    | T | TempDB | 3GB | Host the TempDB data and log files |

    | M | MSDTC | 1GB | Host files associated with the MSDTC role |

    | H | Quorum | 1GB | Host a disk-based quorum witness |


    **Tip**


    You may be surprised that there is a single volume allocated for data and log
    files, as a DBA’s natural instinct is to separate these files onto separate drives.
    The important thing to remember here is that we are working with a SAN, and there
    is a very strong chance that even if we used separate volumes, those volumes would
    reside on the same physical spindles, meaning that separation is logical only.
    Also, if SAN snapshots are to be used, some SANs may require the data and log
    files to be stored on the same volume to ensure data consistency.


    The scenario in this chapter requires us to build a two-node failover cluster,
    with a disk witness. Before we can do this, we will need to configure the Windows
    Cluster Service (`WCS`). We also need to configure an `MSDTC` (Microsoft Distributed
    Transaction Coordinator) Cluster Role, which will provide distributed transaction
    coordination for `SSIS` (SQL Server Integration Services). Additionally, we need
    to configure:


    *   The `MSDTC` role to failover with High priority (compared to other roles on
    the same cluster).

    *   Three failovers are allowed within any 24-hour period.

    *   Immediate failback is permitted.


    Therefore, the complete list of tasks that we will perform is as follows:


    *   Install the failover cluster feature.

    *   Build a Windows Cluster, called `ALWAYSON-C`.

    *   Correctly configure the Quorum.

    *   Create a cluster role for `MSDTC`, called `ALWAYSON-MSDTC-C`.

    *   Configure the properties of the `MSDTC` role.

    *   Configure the Failover properties of the `MSDTC` role.


    **Tip**


    If you wish to build a cluster for learning purposes, but you do not have access
    to a domain, or a SAN, then the newer features of clustering allow you to simulate
    a very similar topology. Two virtual machines can be used as the cluster nodes.
    A third virtual machine, running the `iSCSI Target` feature of windows, can be
    used to present shared storage to each of these nodes. Even better – Windows Server
    2016 and above allow for a cluster to be created on a workgroup, meaning that
    there is no need to create an additional VM to use as a domain controller. Be
    warned, however, that creating a cluster within a workgroup is only supported
    in `PowerShell` and not through `Failover Cluster Manager`. It is also important
    to be aware that from a SQL Server perspective, Availability Groups are supported
    on a workgroup cluster, but failover clustered instances are not.


    ## Building the Cluster


    Before you install a SQL Server AlwaysOn failover cluster instance, you must prepare
    the servers that form the cluster (known as nodes) and build a Windows cluster
    across them. The following sections demonstrate how to perform these activities.


    ### Installing the Failover Cluster Feature


    In order to build the cluster, the first thing we need to do is install the failover
    cluster feature on each of the nodes. To do this, we need to select the `Add Roles
    and Features` option in `Server Manager`. This causes the `Add Roles and Features
    Wizard` to display. The first page of this wizard offers guidance on prerequisites,
    as shown in Figure `3-1`.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig1_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig1_HTML.jpg)


    Figure 3-1 The Before You Begin Page


    On the `Installation Type` page, ensure that `Role-based or feature-based installation`
    is selected, as illustrated in Figure `3-2`.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig2_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig2_HTML.jpg)


    Figure 3-2 The Installation Type Page


    On the `Server Selection` page, ensure that the cluster node that you are currently
    configuring is selected. This is illustrated in Figure `3-3`.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig3_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig3_HTML.jpg)


    Figure 3-3 The Server Selection Page


    The `Server Roles` page of the wizard allows you to select any server roles that
    you wish to configure. As shown in Figure `3-4`, this can include roles such as
    `Application Server` or `DNS Server`, but in our case, this is not appropriate,
    so we simply move to the next screen.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig4_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig4_HTML.jpg)


    Figure 3-4 The Server Roles Page


    On the `Features` page of the wizard, we need to select `Failover Clustering`,
    as shown in Figure `3-5`. This satisfies the prerequisites for building the Windows
    cluster.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig5_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig5_HTML.jpg)


    Figure 3-5 The Features Page


    When you select `Failover Clustering`, the wizard presents you with a screen (Figure
    `3-6`) that asks if you want to install the management tools in the form of a
    check box. If you are planning to manage the cluster directly from the nodes,
    check this option.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig6_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig6_HTML.jpg)


    Figure 3-6 Selecting Management Tools


    On the final page of the wizard, you see a summary of the features that are to
    be installed, as shown in Figure `3-7`. Here, you can specify the location of
    the Windows media if you need to. You can also choose whether the server should
    automatically restart, if required. If you are building out a new server, it makes
    sense to check this box. However, if the server is already in production when
    you add the feature, make sure you consider what is currently running on the box,
    and whether you should wait for a maintenance window to perform a restart if one
    is needed.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig7_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig7_HTML.jpg)


    Figure 3-7 The Confirmation Page


    As well as installation through `Server Manager`, cluster services can also be
    installed from `PowerShell`. The `PowerShell` command in Listing `3-1` achieves
    the same result as the preceding steps.


    ```

    Install-WindowsFeature -Name Failover-Clustering –IncludeManagementTools -Verbose

    ```


    Listing 3-1 Installing Cluster Services'
