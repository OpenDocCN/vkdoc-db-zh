  trans: '

    #### 目标


    目标是事件的消费者；本质上，它是跟踪数据将被写入的设备。SQL Server 2016 中可用的目标详见表 9-3。


    **表 9-3**

    目标


    | 目标 | 同步/异步 | 描述 |

    | --- | --- | --- |

    | 事件计数器 | 同步 | 统计会话期间发生的事件数量 |

    | 事件文件 | 异步 | 将事件输出写入内存缓冲区，然后刷新到磁盘 |

    | 事件配对 | 异步 | 确定一个配对事件是否在其匹配事件缺失的情况下发生，例如，一个语句开始但从未完成 |

    | ETW (Windows 事件跟踪) | 同步 | 用于将扩展事件与操作系统数据关联 |

    | 直方图 | 异步 | 根据操作或事件列，统计会话期间发生的事件数量 |

    | 环形缓冲区 | 异步 | 使用先进先出（FIFO）方法将数据存储在内存缓冲区中 |


    #### 操作


    也称为全局字段，操作是当事件触发时允许捕获附加信息的命令。操作在事件发生时同步触发，且事件并不知晓操作的存在。共有 50 个可用操作，允许你捕获丰富的信息，包括导致事件触发的语句、语句运行的安全上下文、事务
    ID、CPU ID 以及调用堆栈。


    #### 谓词


    谓词是系统在将事件发送到目标之前可以应用的过滤条件。可以创建简单的谓词，例如根据数据库 ID 过滤完成的语句，但也可以创建更复杂的谓词，例如仅捕获 AlwaysOn
    可用性组副本的角色变更，且该变更发生超过两次的情况。


    谓词还完全支持短路求值。这意味着如果你在一个谓词中使用多个条件，那么谓词的顺序很重要，因为如果第一个谓词的求值失败，第二个谓词将不会被求值。由于谓词是同步求值的，这可能会影响性能。因此，明智的做法是设计你的谓词，将最不可能求值为
    true 的谓词放在非常可能求值为 true 的谓词之前。


    例如，假设你计划基于特定数据库（数据库 ID 为 `6`）进行过滤，但该数据库在实例活动中占比很高。你还计划基于特定用户 ID（`UserA`）进行过滤，该用户负责的活动占比很低。在此场景中，你会使用以下谓词，首先过滤掉与
    `UserA` 无关的活动，然后再过滤掉与数据库 ID `6` 无关的活动。


    ```

    WHERE (([sqlserver].[username]=''UserA'') AND ([sqlserver].[database_id]=(6)))

    ```


    #### 类型


    包中的所有对象都被分配了一个类型。此类型用于解释存储在对象字节集合中的数据。对象被分配为以下类型之一：


    *   操作

    *   事件

    *   谓词比较（从事件中检索数据）

    *   谓词源（比较数据类型）

    *   目标

    *   类型


    #### 映射


    映射是一种字典，它将内部 ID 值映射为数据库管理员可以理解的字符串。映射键仅在其上下文中唯一，并在不同上下文之间重复。例如，在 `statement_recompile_cause`
    上下文中，`map_key` 为 1 对应于 `map_value` 为 `Schema Changed`。然而，在 `database_sql_statement`
    类型的上下文中，`map_key` 为 1 对应于 `map_value` 为 `CREATE DATABASE`。你可以使用 `sys.dm_xe_map_values`
    动态管理视图查找完整的映射列表。


    #### 会话


    会话本质上是一个跟踪。它可以包含来自多个包、操作、目标和谓词的事件。当你启动或停止会话时，就是在打开或关闭跟踪。当会话启动时，事件被写入内存缓冲区，并在发送到目标之前应用谓词。因此，在创建会话时，你需要配置属性，例如会话可用于缓冲的内存量、在会话遇到内存压力时可以丢弃哪些事件，以及事件发送到目标之前的最大延迟。

    '
- fmt: "## Creating an Event Session to Monitor Availability Group\n\nYou can create\
    \ an event session using either the New Session Wizard, the New Session Dialog\
    \ Box, or via T-SQL. To create a session using the New Session Wizard, drill through\
    \ `Management` ➤ `Extended Events` in Object Explorer, and select `New Session\
    \ Wizard` from the context menu of `Sessions`. This will cause the Introduction\
    \ page of the New Session Wizard to be displayed.\n\n### Set Session Properties\
    \ Page\n\nAfter passing through the Introduction page, you will find the Set Session\
    \ Properties page, as displayed in Figure 9-5. Here, you can configure a name\
    \ for the Session and also specify if the Session should automatically be started\
    \ on creation.\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig5_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5: Set Properties Page\n\n### Choose Template Page\n\nOn the Choose\
    \ Template page of the wizard, which is illustrated in Figure 9-6, you can either\
    \ select a predefined template, which will give you a starting point for commonly\
    \ required sessions, or you can start with a blank canvas and define the entire\
    \ session manually. We will choose the latter option.\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig6_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6: Choose Template Page\n\n### Select Events To Capture Page\n\nFigure\
    \ 9-7 shows the Select Events To Capture page. Here, we can choose what events\
    \ we want to include in our session. For the purposes of this demonstration, imagine\
    \ that we are frequently seeing the secondary fall behind the primary, and we\
    \ are trying to determine the cause. Specifically, do we have an IO bottleneck?\
    \ Because we are trying to answer a very narrow question, the choice of events\
    \ to select is clear. We will need the `hadr_db_marked_for_reseed` event to determine\
    \ when the secondary falls behind, and we will need the `long_io_detected` event,\
    \ so that we can correlate the times, and see if there is a pattern.\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig7_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7: Select Events To Capture Page\n\n### Capture Global Fields Page\n\
    \nThe Capture Global Fields page will allow us to specify any Actions that we\
    \ wish to capture. In our scenario, we will capture the `NT Username` and `SQLText`\
    \ actions. This will allow us to trace any long IOs back through, to see if they\
    \ are caused by an inefficient query. The Capture Global Fields page is illustrated\
    \ in Figure 9-8.\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig8_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8: Capture Global Fields Page\n\n### Set Session Event Filters Page\n\
    \nThe Set Session Event Filters page, shown in Figure 9-9, allows you to configure\
    \ Predicates on the Session. We will configure a Predicate which filters operations\
    \ on system databases.\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig9_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig9_HTML.jpg)\n\
    \nFigure 9-9: Set Session Event Filters Page\n\n### Specify Session Data Storage\
    \ Page\n\nThe Specify Session Data Storage page of the wizard is where we can\
    \ configure the Target. The wizard provides the choice of a `file` or `ring buffer`\
    \ target, along with the option to specify size and rollover options. We will\
    \ configure a `file` target, as illustrated in Figure 9-10.\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig10_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9-10: Specify Session Data Storage\n\n### Summary and Completion\n\n\
    The Summary page of the wizard will confirm the actions that the wizard will perform.\
    \ After the Session has been created, the Completion page will provide the option\
    \ of watching live data upon exit.\n\n### Creating the Same Session via T-SQL\n\
    \nTo create the same Session using T-SQL, you could use the script in Listing\
    \ 9-1.\n\n```\nCREATE EVENT SESSION AlwaysOnTrace ON SERVER\nADD EVENT sqlserver.hadr_db_marked_for_reseed(\n\
    \    ACTION(sqlserver.nt_username,sqlserver.sql_text)\n    WHERE (sqlserver.database_id>(4))),\n\
    ADD EVENT sqlserver.long_io_detected(\n    ACTION(sqlserver.nt_username,sqlserver.sql_text)\n\
    \    WHERE (sqlserver.database_id>(4)))\nADD TARGET package0.event_file(SET filename='C:\\\
    MSSQL\\ASlwaysOnTrace.xel')\nWITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
    \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)\
    \ ;\n```\n\nListing 9-1: Create an Event Session\n\n### CREATE EVENT SESSION Arguments\n\
    \nThe `CREATE EVENT SESSION` DDL statement accepts the arguments detailed in Table\
    \ 9-4.\n\nTable 9-4: CREATE EVENT SESSION Arguments\n\n| Argument | Description\
    \ |\n| --- | --- |\n| `event_session_name` | Specifies the name of the event session\
    \ that you are creating |\n| `ADD EVENT` / `SET` | Repeating for every event that\
    \ is added to the session, followed by the name of the event, in the format `package.event`.\
    \ You can use the `SET` statement to set event-specific customizations, such as\
    \ including nonmandatory event fields |\n| `ACTION` | Specified after each `ADD\
    \ EVENT` argument if there are global fields which should be captured for that\
    \ event |\n| `WHERE` | Specified after each `ADD EVENT` argument if the event\
    \ should have a predicate associated with it |\n| `ADD TARGET` / `SET` | Specified\
    \ for each target that will be added to the session. You can use the `SET` statement\
    \ to populate target-specific parameters, such as the `filename` parameter for\
    \ the `event_file` target |\n\n### CREATE EVENT SESSION WITH Options\n\nThe `CREATE\
    \ EVENT SESSION` statement also accepts a number of `WITH` options, which are\
    \ detailed in Table 9-5.\n\nTable 9-5: CREATE EVENT SESSION WITH Options\n\n|\
    \ WITH Option | Description |\n| --- | --- |\n| `MAX_MEMORY` | Specifies the maximum\
    \ amount of memory that the event session can use for buffering events before\
    \ dispatching them to the target(s) |\n| `EVENT_RETENTION_MODE` | Specifies the\
    \ behavior if the buffers become full. Acceptable values are `ALLOW_SINGLE_EVENT_LOSS`,\
    \ which indicates that a single event can be dropped if all buffers are full;\
    \ `ALLOW_MULTIPLE_EVENT_LOSS`, which indicates that an entire buffer can be dropped\
    \ if all buffers are full; and `NO_EVENT_LOSS`, which indicates that tasks that\
    \ cause events to fire are to wait until there is space in the buffer |\n| `MAX_DISPATCH_LATENCY`\
    \ | Specifies the maximum amount of time that events can reside in the session’s\
    \ buffers before being flushed to the target(s), specified in seconds |\n| `MAX_EVENT_SIZE`\
    \ | Specifies the maximum possible size for event data from any single event.\
    \ It can be specified in kilobytes or megabytes and should only be configured\
    \ to allow events that are larger than the `MAX_MEMORY` setting |\n| `MEMORY_PARTITION_MODE`\
    \ | Specifies where event buffers are created. Acceptable values are: `NONE` –\
    \ Which indicates that the buffers will be created within the instance; `PER_NODE`\
    \ – Which indicates that the buffers will be created for each NUMA node; `PER_CPU`\
    \ – Which means that buffers will be created for each CPU |\n| `TRACK_CAUSALITY`\
    \ | Specifies that an additional GUID and sequence number will be stored with\
    \ each event so that events can be correlated |\n| `STARTUP_STATE` | Specifies\
    \ if the session automatically starts when the instance starts. `ON` indicates\
    \ it does; `OFF` indicates it does not |\n\n**Tip**  \nFor a deeper discussion\
    \ around Extended Events, I highly recommend the Apress book *Pro SQL Server 2019\
    \ Administration*, which can be purchased from [`www.apress.com/gp/book/9781484250884`](http://www.apress.com/gp/book/9781484250884)."
  raw: '### Creating an Event Session to Monitor Availability Group


    You can create an event session using either the New Session Wizard, the New Session
    Dialog Box, or via T-SQL. To create a session using the New Session Wizard, drill
    through Management ➤ Extended Events in Object Explorer, and select New Session
    Wizard from the context menu of Sessions. This will cause the Introduction page
    of the New Session Wizard to be displayed.


    After passing through the Introduction page, you will find the Set Session Properties
    page, as displayed in Figure [9-5](#394392_3_En_9_Chapter.xhtml#Fig5). Here, you
    can configure a name for the Session and also specify if the Session should automatically
    be started on creation.


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig5_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Set Properties Page


    On the Choose Template page of the wizard, which is illustrated in Figure [9-6](#394392_3_En_9_Chapter.xhtml#Fig6),
    you can either select a predefined template, which will give you a starting point
    for commonly required sessions, or you can start with a blank canvas and define
    the entire session manually. We will choose the latter option.


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig6_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Choose Template Page


    Figure [9-7](#394392_3_En_9_Chapter.xhtml#Fig7) shows the Select Events To Capture
    page. Here, we can choose what events we want to include in our session. For the
    purposes of this demonstration, imagine that we are frequently seeing the secondary
    fall behind the primary, and we are trying to determine the cause. Specifically,
    do we have an IO bottleneck? Because we are trying to answer a very narrow question,
    the choice of events to select is clear. We will need the `hadr_db_marked_for_reseed`
    event to determine when the secondary falls behind, and we will need the `long_io_detected`
    event, so that we can correlate the times, and see if there is a pattern.


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig7_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Select Events To Capture Page


    The Capture Global Fields page will allow us to specify any Actions that we wish
    to capture. In our scenario, we will capture the NT Username and SQLText actions.
    This will allow us to trace any long IOs back through, to see if they are caused
    by an inefficient query. The Capture Global Fields page is illustrated in Figure
    [9-8](#394392_3_En_9_Chapter.xhtml#Fig8).


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig8_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Capture Global Fields Page


    The Set Session Event Filters page, shown in Figure [9-9](#394392_3_En_9_Chapter.xhtml#Fig9),
    allows you to configure Predicates on the Session. We will configure a Predicate
    which filters operations on system databases.


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig9_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Set Session Event Filters Page


    The Specify Session Data Storage page of the wizard is where we can configure
    the Target. The wizard provides the choice of a file or ring buffer target, along
    with the option to specify size and rollover options. We will configure a file
    target, as illustrated in Figure [9-10](#394392_3_En_9_Chapter.xhtml#Fig10).


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig10_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Specify Session Data Storage


    The Summary page of the wizard will confirm the actions that the wizard will perform.
    After the Session has been created, the Completion page will provide the option
    of watching live data upon exit. To create the same Session using T-SQL, you could
    use the script in Listing [9-1](#394392_3_En_9_Chapter.xhtml#PC1).


    ```

    CREATE EVENT SESSION AlwaysOnTrace ON SERVER

    ADD EVENT sqlserver.hadr_db_marked_for_reseed(

    ACTION(sqlserver.nt_username,sqlserver.sql_text)

    WHERE (sqlserver.database_id>(4))),

    ADD EVENT sqlserver.long_io_detected(

    ACTION(sqlserver.nt_username,sqlserver.sql_text)

    WHERE (sqlserver.database_id>(4)))

    ADD TARGET package0.event_file(SET filename=''C:\MSSQL\ASlwaysOnTrace.xel'')

    WITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30
    SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)
    ;

    Listing 9-1

    Create an Event Session

    ```


    The CREATE EVENT SESSION DDL statement accepts the arguments detailed in Table
    [9-4](#394392_3_En_9_Chapter.xhtml#Tab4).


    Table 9-4


    CREATE EVENT SESSION Arguments


    | Argument | Description |

    | --- | --- |

    | `event_session_name` | Specifies the name of the event session that you are
    creating |

    | `ADD EVENT &#124; SET` | Repeating for every event that is added to the session,
    followed by the name of the event, in the format package.event. You can use the
    `SET` statement to set event-specific customizations, such as including nonmandatory
    event fields |

    | `ACTION` | Specified after each `ADD EVENT` argument if there are global fields
    which should be captured for that event |

    | `WHERE` | Specified after each `ADD EVENT` argument if the event should have
    a predicate associated with it |

    | `ADD TARGET &#124; SET` | Specified for each target that will be added to the
    session. You can use the `SET` statement to populate target-specific parameters,
    such as the filename parameter for the event_file target |


    The CREATE EVENT SESSION statement also accepts a number of WITH options, which
    are detailed in Table [9-5](#394392_3_En_9_Chapter.xhtml#Tab5).


    Table 9-5


    CREATE EVENT SESSION WITH Options


    | WITH Option | Description |

    | --- | --- |

    | `MAX_MEMORY` | Specifies the maximum amount of memory that the event session
    can use for buffering events before dispatching them to the target(s) |

    | `EVENT_RETENTION_MODE` | Specifies the behavior if the buffers become full.
    Acceptable values are `ALLOW_SINGLE_EVENT_LOSS`, which indicates that a single
    event can be dropped if all buffers are full; `ALLOW_MULTIPLE_EVENT_LOSS`, which
    indicates that an entire buffer can be dropped if all buffers are full; and `NO_EVENT_LOSS`,
    which indicates that tasks that cause events to fire are to wait until there is
    space in the buffer |

    | `MAX_DISPATCH_LATENCY` | Specifies the maximum amount of time that events can
    reside in the session’s buffers before being flushed to the target(s), specified
    in seconds |

    | `MAX_EVENT_SIZE` | Specifies the maximum possible size for event data from any
    single event. It can be specified in kilobytes or megabytes and should only be
    configured to allow events that are larger than the `MAX_MEMORY` setting |

    | `MEMORY_PARTITION_MODE` | Specifies where event buffers are created. Acceptable
    values are• `NONE` – Which indicates that the buffers will be created within the
    instance• `PER_NODE` – Which indicates that the buffers will be created for each
    NUMA node• `PER_CPU` – Which means that buffers will be created for each CPU |

    | `TRACK_CAUSALITY` | Specifies that an additional GUID and sequence number will
    be stored with each event so that events can be correlated |

    | `STARTUP_STATE` | • Specifies if the session automatically starts when the instance
    starts. `ON` indicates it does• `OFF` indicates it does not |


    Tip


    For a deeper discussion around Extended Events, I highly recommend the Apress
    book *Pro SQL Server 2019 Administration*, which can be purchased from [`www.apress.com/gp/book/9781484250884`](http://www.apress.com/gp/book/9781484250884).'
  trans: "\n## 创建事件会话以监控可用性组\n\n你可以使用新建会话向导、新建会话对话框或通过 T-SQL 来创建事件会话。若要使用新建会话向导创建会话，请在对象资源管理器中依次展开\
    \ `Management` ➤ `Extended Events`，然后从 `Sessions` 的上下文菜单中选择 `新建会话向导`。这将显示新建会话向导的“简介”页面。\n\
    \n### 设置会话属性页面\n\n通过“简介”页面后，你将看到“设置会话属性”页面，如图 9-5 所示。在此处，你可以配置会话的名称，并指定会话是否应在创建时自动启动。\n\
    \n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig5_HTML.jpg](img/394392_3_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5：设置属性页面\n\n### 选择模板页面\n\n在向导的“选择模板”页面（如图 9-6 所示）上，你可以选择预定义的模板（这将为你提供常用会话的起点），也可以从空白画布开始手动定义整个会话。我们将选择后者。\n\
    \n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig6_HTML.jpg](img/394392_3_En_9_Fig6_HTML.jpg)\n\
    \n图 9-6：选择模板页面\n\n### 选择要捕获的事件页面\n\n图 9-7 展示了“选择要捕获的事件”页面。在这里，我们可以选择要包含在会话中的事件。为了本次演示的目的，假设我们经常看到辅助副本落后于主副本，并且我们正在尝试确定原因。具体来说，是否存在\
    \ I/O 瓶颈？由于我们试图回答一个非常具体的问题，因此要选择的事件就很明确了。我们需要 `hadr_db_marked_for_reseed` 事件来确定辅助副本何时落后，还需要\
    \ `long_io_detected` 事件，以便我们可以关联时间点，看看是否存在某种模式。\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig7_HTML.jpg](img/394392_3_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7：选择要捕获的事件页面\n\n### 捕获全局字段页面\n\n“捕获全局字段”页面允许我们指定希望捕获的任何操作。在我们的场景中，我们将捕获\
    \ `NT 用户名` 和 `SQL 文本` 操作。这将使我们能够追溯任何长时间的 I/O 操作，以查看它们是否由低效的查询引起。“捕获全局字段”页面如图 9-8\
    \ 所示。\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig8_HTML.jpg](img/394392_3_En_9_Fig8_HTML.jpg)\n\
    \n图 9-8：捕获全局字段页面\n\n### 设置会话事件筛选器页面\n\n“设置会话事件筛选器”页面（如图 9-9 所示）允许你为会话配置谓词。我们将配置一个筛选系统数据库上操作的谓词。\n\
    \n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig9_HTML.jpg](img/394392_3_En_9_Fig9_HTML.jpg)\n\
    \n图 9-9：设置会话事件筛选器页面\n\n### 指定会话数据存储页面\n\n向导的“指定会话数据存储”页面是我们可以配置目标的位置。向导提供了 `文件`\
    \ 或 `环形缓冲区` 目标的选项，以及指定大小和回滚选项。我们将配置 `文件` 目标，如图 9-10 所示。\n\n![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig10_HTML.jpg](img/394392_3_En_9_Fig10_HTML.jpg)\n\
    \n图 9-10：指定会话数据存储\n\n### 摘要与完成\n\n向导的“摘要”页面将确认向导将执行的操作。创建会话后，“完成”页面将提供退出时查看实时数据的选项。\n\
    \n### 通过 T-SQL 创建相同的会话\n\n若要使用 T-SQL 创建相同的会话，你可以使用清单 9-1 中的脚本。\n\n```\nCREATE\
    \ EVENT SESSION AlwaysOnTrace ON SERVER\nADD EVENT sqlserver.hadr_db_marked_for_reseed(\n\
    \    ACTION(sqlserver.nt_username,sqlserver.sql_text)\n    WHERE (sqlserver.database_id>(4))),\n\
    ADD EVENT sqlserver.long_io_detected(\n    ACTION(sqlserver.nt_username,sqlserver.sql_text)\n\
    \    WHERE (sqlserver.database_id>(4)))\nADD TARGET package0.event_file(SET filename='C:\\\
    MSSQL\\ASlwaysOnTrace.xel')\nWITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
    \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)\
    \ ;\n```\n\n清单 9-1：创建事件会话\n\n### CREATE EVENT SESSION 参数\n\n`CREATE EVENT SESSION`\
    \ DDL 语句接受表 9-4 中详述的参数。\n\n表 9-4：CREATE EVENT SESSION 参数\n\n| 参数 | 描述 |\n| ---\
    \ | --- |\n| `event_session_name` | 指定你正在创建的事件会话的名称 |\n| `ADD EVENT` / `SET` |\
    \ 为添加到会话的每个事件重复此操作，后跟事件名称，格式为 `package.event`。你可以使用 `SET` 语句设置事件特定的自定义，例如包含非强制性事件字段\
    \ |\n| `ACTION` | 如果需要为该事件捕获全局字段，则在每个 `ADD EVENT` 参数后指定 |\n| `WHERE` | 如果该事件应有关联的谓词，则在每个\
    \ `ADD EVENT` 参数后指定 |\n| `ADD TARGET` / `SET` | 为将添加到会话的每个目标指定。你可以使用 `SET` 语句来填充目标特定的参数，例如\
    \ `event_file` 目标的 `filename` 参数 |\n\n### CREATE EVENT SESSION WITH 选项\n\n`CREATE\
    \ EVENT SESSION` 语句还接受许多 `WITH` 选项，这些选项在表 9-5 中有详细说明。\n\n表 9-5：CREATE EVENT SESSION\
    \ WITH 选项\n\n| WITH 选项 | 描述 |\n| --- | --- |\n| `MAX_MEMORY` | 指定事件会话在将事件分派到目标之前可用于缓冲事件的最大内存量\
    \ |\n| `EVENT_RETENTION_MODE` | 指定缓冲区变满时的行为。可接受的值包括：`ALLOW_SINGLE_EVENT_LOSS`，表示如果所有缓冲区已满，则可能丢失单个事件；`ALLOW_MULTIPLE_EVENT_LOSS`，表示如果所有缓冲区已满，则可能丢失整个缓冲区；`NO_EVENT_LOSS`，表示导致事件触发的任务将等待，直到缓冲区中有空间\
    \ |\n| `MAX_DISPATCH_LATENCY` | 指定事件在刷新到目标之前可以在会话缓冲区中驻留的最长时间，以秒为单位 |\n| `MAX_EVENT_SIZE`\
    \ | 指定来自任何单个事件的事件数据的最大可能大小。可以千字节或兆字节为单位指定，且应仅配置为允许大于 `MAX_MEMORY` 设置的事件 |\n| `MEMORY_PARTITION_MODE`\
    \ | 指定事件缓冲区的创建位置。可接受的值包括：`NONE` – 表示将在实例内创建缓冲区；`PER_NODE` – 表示将为每个 NUMA 节点创建缓冲区；`PER_CPU`\
    \ – 表示将为每个 CPU 创建缓冲区 |\n| `TRACK_CAUSALITY` | 指定将为每个事件存储一个额外的 GUID 和序列号，以便可以关联事件\
    \ |\n| `STARTUP_STATE` | 指定会话是否在实例启动时自动启动。`ON` 表示启动；`OFF` 表示不启动 |\n\n**提示**  \n\
    关于扩展事件的更深入讨论，我强烈推荐 Apress 出版的书籍《*Pro SQL Server 2019 Administration*》，可从 [`www.apress.com/gp/book/9781484250884`](http://www.apress.com/gp/book/9781484250884)\
    \ 购买。\n"
- fmt: '## Summary


    SQL Server provides rich tools for monitoring the health of AlwaysOn Availability
    Groups. The AlwaysOn Dashboard is an interactive report within SQL Server Management
    Studio, which will allow you to assess the health of your Availability Groups
    and Replicas. It also provides links to view quorum configuration information
    and live health data.


    Live health data is captured by an extended events session, which is created when
    you create the first Availability Group on an instance, and runs in the background,
    capturing preconfigured events. It is possible to customize this trace; I would
    recommend leaving it with default configurations and creating a new Event Session,
    if you require a custom capture.


    Creating an Event Session allows you to capture either very fine-grain points
    of interest, or just courser-grain information, depending on your requirements.
    Extended Events are implemented using WMI and are a very lightweight framework,
    meaning you can identify issues and trend, without compromising the performance
    of your instance.


    # 10. Troubleshooting AlwaysOn


    SQL Server exposes a wealth of metadata, pertaining to high availability and disaster
    recovery objects, especially around the AlwaysOn feature set. This metadata can
    be used to quickly identify a configuration, find the root cause of an issue,
    or script automated responses to events that may occur. The following sections
    will discuss the metadata that is available and provide examples of how it can
    be used.


    ## AlwaysOn Failover Clustered Instance Metadata


    From inside the database engine, it is possible to view a large amount of metadata
    regarding a clustered instance, and the Windows Cluster that hosts it. This information
    can prove invaluable to a DBA. The following section will introduce some of the
    most useful and interesting metadata objects.


    ### Discovering the Node That Hosts an Instance


    Naturally, a DBA will need to know which node within a cluster is hosting a failover
    clustered instance, especially when attempting to diagnose connectivity or performance
    issues. If your organization has a policy that DBAs are not allowed operating
    system access, however, then Failover Manager can’t be used. Luckily, there is
    a DMV (Dynamic Management View) within SQL Server that will expose this information.
    The `sys.dm_os_cluster_nodes` DMV will return the columns detailed in Table [10-1](#394392_3_En_10_Chapter.xhtml#Tab1).


    Table 10-1

    `sys.dm_os_cluster_nodes` Columns


    | Column | Description |

    | --- | --- |

    | `NodeName` | The name of the cluster node |

    | `status` | The current status of the node. Possible values are• 0 – Indicates
    the node is up• 1 – Indicates the node is down• 2 – Indicates the node is paused• 3
    – Indicates the node is currently joining the cluster• 4 – Indicates that the
    status is unknown |

    | `status_description` | A textual description of the status. Possible values
    are• Up• Down• Paused• Joining• Unknown |

    | `is_current_owner` | Indicates if the instance is currently hosted by the node.
    Possible values are• 0 – Indicates the node does not own the instance• 1 – Indicates
    that the node does own the instance |


    The query in Listing [10-1](#394392_3_En_10_Chapter.xhtml#PC1) will return the
    name of the cluster node that currently hosts the instance.


    ```sql

    SELECT NodeName

    FROM sys.dm_os_cluster_nodes

    WHERE is_current_owner = 1 ;

    ```

    Listing 10-1

    Discover the Node That Hosts the Instance


    ### Viewing Health Check Configuration


    If assisting the Windows administration team, with the repeated failover of a
    clustered instance, a DBA may wish to expose details of what conditions can cause
    a failover, to ensure that an appropriate level is configured. This can be achieved
    by using the `sys.dm_os_cluster_properties` DMV, which returns the columns detailed
    in Table [10-2](#394392_3_En_10_Chapter.xhtml#Tab2).


    Table 10-2

    `sys.dm_os_cluster_properties` Columns


    | Column | Description |

    | --- | --- |

    | `VerboseLogging` | Indicates the logging level used by the cluster. Possible
    values are• 0 – Indicates that logging is turned off• 1 – Indicates that only
    errors are logged• 2 – Indicates that errors and warning are logged |

    | `SQLDumperDumpFlags` | Specifies the type of dump file that SQLDumper will generate.
    Possible values are• 0x0120 – Indicates a Minidump• 0x0110 – Indicates a Full
    Dump• 0x8100 – Indicates a Filtered Dump |

    | `SQLDumperDumpPath` | Specifies the file path where SQLDumper will output the
    dump files |

    | `SQLDumperDumpTimeOut` | The timeout value for SQLDumper, when creating a dump
    file. Specified in milliseconds |

    | `FailureConditionLevel` | The level of failure that will cause a failover to
    occur. A full description of failure condition levels can be found in Table [10-3](#394392_3_En_10_Chapter.xhtml#Tab3)
    |

    | `HealthCheckTimeout` | The duration that the database engine will wait for health
    information to be returned before it will decide that the instance is unresponsive
    |


    The possible failure condition levels, returned by the `FailureConditionLevel`
    column, are detailed in Table [10-3](#394392_3_En_10_Chapter.xhtml#Tab3).


    Table 10-3

    Failure Condition Levels


    | Condition Level | Description |

    | --- | --- |

    | 0 | Automatic failover does not occur |

    | 1 | Automatic failover occurs when the SQL Server service is down |

    | 2 | Automatic failover will occur when• Level 1 conditions are met• The `HealthCheckTimeout`
    value is exceeded |

    | 3 | Automatic failover will occur when• Level 2 conditions are met• The health
    check returns System Error |

    | 4 | Automatic failover will occur when• Level 3 conditions are met• The health
    check returns Resource Error |

    | 5 | Automatic failover will occur when• Level 4 conditions are met• The health
    check returns Query_Processing_Error |


