    $PrimaryReplicaOptions = @{

    Name             = "CLUSTERNODE1\PROD"

    EndpointUrl      = "TCP://CLUSTERNODE1.ALWAYSON.COM:5022"

    FailoverMode     = "Automatic"

    AvailabilityMode = "SynchronousCommit"

    Version          = ($PrimaryServer.Version)

    }

    #Create the primary Replica Object

    $PrimaryReplica = New-SqlAvailabilityReplica @PrimaryReplicaOptions  -AsTemplate

    #Set the properties of the secondary Replica

    $SecondaryReplicaOptions = @{

    Name             = "CLUSTERNODE2\SYNCHA"

    EndpointUrl      = "TCP://CLUSTERNODE2.ALWAYSON.COM:5022"

    FailoverMode     = "Automatic"

    AvailabilityMode = "SynchronousCommit"

    Version          = ($SecondaryServer.Version)

    }

    #Create the secondary replica object

    $SecondaryReplica = New-SqlAvailabilityReplica @SecondaryReplicaOption -AsTemplate

    $AvailabilityGroupOptions = @{

    InputObject         = $PrimaryServer

    Name =              = "Foo"

    AvailabilityReplica = ($PrimaryReplica, $SecondaryReplica)

    Database            = @("Foo")

    }

    New-SqlAvailabilityGroup @AvailabilityGroupOptions

    Listing 5-9

    Create to Foo Availability Group

    ```


    We could then create an Availability Group Listener by using the `New-SqlAvailabilityGroupListener`
    cmdlet. This is demonstrated in Listing [5-10](#394392_3_En_5_Chapter.xhtml#PC10).


    ```

    #Specify the options for the Listener

    $ListenerOptions = @{

    Name = "Foo"

    StaticIp = "10.0.0.14/255.255.255.0"

    Path = "SQLSERVER:\Sql\CLUSTERNODE1\PROD\AvailabilityGroups\Foo"

    }

    #Create the Listener

    New-SqlAvailabilityGroupListener @ListenerOptions

    Listing 5-10

    Create an Availability Group Listener

    ```


    ## Summary


    AlwaysOn Availability Groups can be implemented with up to eight secondary replicas,
    combining both Synchronous and Asynchronous Commit modes. When implementing high
    availability with availability groups, you always use Synchronous Commit mode,
    because Asynchronous Commit mode does not support automatic failover. When implementing
    Synchronous Commit mode, however, you must be aware of the associated performance
    penalty caused by committing the transaction on the secondary replica before it
    is committed on the primary replica. For disaster recovery, you will normally
    choose to implement Asynchronous Commit mode.


    The availability group can be created via the New Availability Group wizard, through
    dialog boxes, through T-SQL, or even through PowerShell. If you create an availability
    group using dialog boxes, then some aspects, such as the endpoint and associated
    permissions, must be scripted using T-SQL or PowerShell.


    If you implement disaster recovery with availability groups, then you need to
    configure a multi-subnet cluster. This does not mean that you must have SAN replication
    between the sites, however, since availability groups do not rely on shared storage.
    What you do need to do is add additional IP addresses for the administrative cluster
    access point and also for the Availability Group Listener. You also need to pay
    attention to the properties of the cluster that support client reconnection to
    ensure that clients do not experience a high number of timeouts.


    # 6. Implementing AlwaysOn Availability Groups On Linux


    Since SQL Server 2017, it has been possible to install SQL Server on Linux as
    well as Windows. AlwaysOn Availability Groups can be configured on Linux with
    much of the same functionality, as when the instances are hosted on Windows. The
    installation and configuration of SQL Server on Linux is beyond the scope of this
    book, but full details can be found in the Apress title *Pro SQL Server 2019 Administration*,
    which can be found at [`www.apress.com/gb/book/9781484250884#otherversion=9781484250891`](http://www.apress.com/gb/book/9781484250884%2523otherversion%253D9781484250891).


    This chapter focuses on configuring Availability Groups on Linux, for the purpose
    of providing high availability (HA). We will first have a brief overview of the
    technologies involved in implementing pacemaker clusters (Pacemaker is a Linux-based
    clustering technology), before configuring a two-node Availability Group, with
    automatic failover.


    Note


    For the demonstrations in this chapter, we will use three servers, namely, LinuxProd,
    LinuxSyncHA, and LinuxConfig. A default instance of SQL Server 2019 is installed
    on each of the servers. The servers are built with the Ubuntu 18.04 operating
    system and are not joined to a domain.


    In this chapter, we will perform the following activities:


    *   Create the Sales Databases.


    *   Enable Availability Groups on our instances and prepare the instances to support
    Availability Groups.


    *   Create an Availability group for the Sales database.


    *   Create the cluster.


    *   Configure the cluster.


    ## Linux Cluster Technologies


    The following sections will provide a high-level overview of the technologies
    that are used to configure a cluster in Linux. Before we begin, however, it is
    important to understand that unlike building Availability Groups on a Windows
    cluster, when building Availability Groups on a Linux pacemaker cluster, the Availability
    Group is not integrated with the cluster to the same degree. Specifically, the
    Availability Group is not aware of the cluster’s state, or even existence. Therefore,
    failover operations must be performed at the cluster level. Additionally, while
    it is still possible to create a listener, the functionality is limited. You need
    to manually register the listener’s name in DNS and there is no support for read-only
    routing.


    ### Pcs


    When you install pcs, the package will also install Pacemaker and Corosync. The
    pcs component itself, however, is a command-line utility, which is used to manage
    the Pacemaker cluster.'
  trans: '

    # 使用 PowerShell 实现可用性组


    正如您所料，Microsoft 提供了 PowerShell cmdlet，可用于创建和管理 SQL Server 可用性组和可用性组侦听器。这一点正变得越来越重要，因为世界正朝着
    DevOps 文化迈进，而对于许多希望实现构建自动化的组织来说，PowerShell 是首选语言。


    `sqlserver` PowerShell 模块随 SQL Server Management Studio 一起安装，但也可以通过使用清单 5-8 中的命令来安装。


    ```

    Install-Module sqlserver

    清单 5-8

    安装 sqlserver PowerShell 模块

    ```


    注意


    如果这是您第一次在服务器上安装 PowerShell 模块，则系统会提示您安装 NuGet 提供程序。


    一旦安装了 `sqlserver` 模块，您就可以访问允许您通过 PowerShell 创建和管理可用性组的 cmdlet。`New-AvailabilityReplica`
    cmdlet 允许您创建一个对象，该对象指定每个副本的属性。然后，这些对象可以传递给 `New-SqlAvailabilityGroup` cmdlet，由它来创建可用性组。


    例如，假设我们想要创建一个名为 `Foo` 的可用性组，其中包含 `Foo` 数据库，`CLUSTERNODE1\PROD` 托管初始的主副本，`CLUSTERNODE2\SYNCHA`
    托管一个辅助副本，以实现高可用性。我们可以使用清单 5-9 中的脚本来实现这一点。


    ```

    #创建到 CLSUETERNODE1\PROD 的连接

    $PrimaryServer = Get-Item "SQLSERVER:\SQL\CLUSTERNODE1\PROD" -Verbose

    #创建到 CLUSTERNODE2\SYNCHA 的连接

    $SecondaryServer = Get-Item "SQLSERVER:\SQL\CLUSTERNODE2\SYNCHA"

    #设置主副本的属性

    $PrimaryReplicaOptions = @{

    Name             = "CLUSTERNODE1\PROD"

    EndpointUrl      = "TCP://CLUSTERNODE1.ALWAYSON.COM:5022"

    FailoverMode     = "Automatic"

    AvailabilityMode = "SynchronousCommit"

    Version          = ($PrimaryServer.Version)

    }

    #创建主副本对象

    $PrimaryReplica = New-SqlAvailabilityReplica @PrimaryReplicaOptions  -AsTemplate

    #设置辅助副本的属性

    $SecondaryReplicaOptions = @{

    Name             = "CLUSTERNODE2\SYNCHA"

    EndpointUrl      = "TCP://CLUSTERNODE2.ALWAYSON.COM:5022"

    FailoverMode     = "Automatic"

    AvailabilityMode = "SynchronousCommit"

    Version          = ($SecondaryServer.Version)

    }

    #创建辅助副本对象

    $SecondaryReplica = New-SqlAvailabilityReplica @SecondaryReplicaOption -AsTemplate

    $AvailabilityGroupOptions = @{

    InputObject         = $PrimaryServer

    Name =              = "Foo"

    AvailabilityReplica = ($PrimaryReplica, $SecondaryReplica)

    Database            = @("Foo")

    }

    New-SqlAvailabilityGroup @AvailabilityGroupOptions

    清单 5-9

    创建 Foo 可用性组

    ```


    然后，我们可以使用 `New-SqlAvailabilityGroupListener` cmdlet 来创建一个可用性组侦听器。这在清单 5-10 中进行了演示。


    ```

    #指定侦听器的选项

    $ListenerOptions = @{

    Name = "Foo"

    StaticIp = "10.0.0.14/255.255.255.0"

    Path = "SQLSERVER:\Sql\CLUSTERNODE1\PROD\AvailabilityGroups\Foo"

    }

    #创建侦听器

    New-SqlAvailabilityGroupListener @ListenerOptions

    清单 5-10

    创建一个可用性组侦听器

    ```


    ## 总结


    AlwaysOn 可用性组最多可以实现八个辅助副本，结合了同步和异步提交模式。在使用可用性组实现高可用性时，您总是使用同步提交模式，因为异步提交模式不支持自动故障转移。然而，在实施同步提交模式时，您必须意识到相关的性能损失，这是因为在事务提交到主副本之前，它必须先提交到辅助副本。对于灾难恢复，您通常会选择实施异步提交模式。


    可用性组可以通过“新建可用性组”向导、对话框、T-SQL 甚至 PowerShell 来创建。如果您使用对话框创建可用性组，那么某些方面（例如端点及相关权限）必须使用
    T-SQL 或 PowerShell 编写脚本。


    如果您使用可用性组实现灾难恢复，则需要配置一个多子网故障转移群集。然而，这并不意味着您必须在站点之间拥有 SAN 复制，因为可用性组不依赖于共享存储。您需要做的是为管理群集访问点以及可用性组侦听器添加额外的
    IP 地址。您还需要注意支持客户端重新连接的群集属性，以确保客户端不会遇到大量的超时。


    # 6. 在 Linux 上实现 AlwaysOn 可用性组


    自 SQL Server 2017 起，除了 Windows 外，也可以在 Linux 上安装 SQL Server。在 Linux 上配置 AlwaysOn
    可用性组时，其功能与托管在 Windows 实例上时大部分相同。在 Linux 上安装和配置 SQL Server 超出了本书的范围，但可以在 Apress
    图书 *Pro SQL Server 2019 Administration* 中找到完整详细信息，网址为 [`www.apress.com/gb/book/9781484250884#otherversion=9781484250891`](http://www.apress.com/gb/book/9781484250884%2523otherversion%253D9781484250891)。


    本章重点介绍在 Linux 上配置可用性组，以提供高可用性 (HA)。我们将首先简要概述实现 Pacemaker 群集（Pacemaker 是一种基于 Linux
    的群集技术）所涉及的技术，然后配置一个具有自动故障转移功能的双节点可用性组。


    注意


    对于本章的演示，我们将使用三台服务器，即 LinuxProd、LinuxSyncHA 和 LinuxConfig。每台服务器上都安装了 SQL Server
    2019 的默认实例。服务器使用 Ubuntu 18.04 操作系统构建，并且未加入域。


    在本章中，我们将执行以下活动：


    *   创建销售数据库。


    *   在我们的实例上启用可用性组，并准备实例以支持可用性组。


    *   为销售数据库创建一个可用性组。


    *   创建群集。


    *   配置群集。


    ## Linux 群集技术


    以下各节将提供用于在 Linux 中配置群集的技术的高级概述。但在开始之前，重要的是要理解，与在 Windows 群集上构建可用性组不同，在 Linux Pacemaker
    群集上构建可用性组时，可用性组与群集的集成程度并不相同。具体来说，可用性组并不知晓群集的状态甚至存在。因此，故障转移操作必须在群集级别执行。此外，虽然仍然可以创建侦听器，但其功能有限。您需要手动在
    DNS 中注册侦听器的名称，并且不支持只读路由。


    ### Pcs


    当您安装 `pcs` 时，该软件包还会安装 Pacemaker 和 Corosync。然而，`pcs` 组件本身是一个命令行实用程序，用于管理 Pacemaker
    群集。

    '
- fmt: '### Pacemaker


    Pacemaker 是集群的心脏。它负责管理集群维护事件，例如节点的添加和移除。它还负责管理集群事件，并在节点之间移动资源，以确保在节点发生故障后资源仍然可用。


    Pacemaker 支持所有标准的集群配置，包括主动/主动、主动/被动、N+1 和 N+M。对高级 Pacemaker 配置的讨论超出了本书的范围；但是，可以在
    Apress 的 *Pro Linux High Availability Clustering* 一书中找到更多详细信息，该书可在 [`www.apress.com/gp/book/9781484200803`](http://www.apress.com/gp/book/9781484200803)
    找到。


    ### Corosync


    Corosync 为集群提供消息传递层。它通过在节点之间发送消息来检查健康状态，从而实现仲裁系统，并在失去仲裁时通知 Pacemaker。


    ### STONITH


    Pacemaker 集群的支持配置必须使用隔离，这有助于在节点或资源状态未知时，将集群带到已知的良好状态。隔离有两种类型：资源隔离和节点隔离。资源隔离用于防止资源在节点上启动。这可以避免在资源配置期间发生故障时导致数据损坏。节点隔离可防止节点运行任何资源。如果节点变得无响应，通常需要这样做。节点隔离需要一个隔离设备和一个隔离代理。隔离设备可能是一个不间断电源、一个配电单元，或一个管理接口，例如
    lights-out 设备或刀片电源控制设备。与这些设备交互的代理是 STONITH（Shoot The Other Node In The Head）。由于
    STONITH 的实现非常依赖于您使用的隔离设备，因此我们不会在本章中配置它。这对于开发或测试目的是可以的，但生产集群应始终配置 STONITH。


    ## 准备实施 AlwaysOn 可用性组


    在创建可用性组之前，需要执行几项先决任务。即，我们在 SQL Server 实例上启用可用性组，创建并备份我们希望实现高可用性的数据库，并且由于 Linux
    服务器无法相互验证，我们将需要创建可用于身份验证的证书。以下各节演示如何执行这些任务中的每一项。


    ### 启用可用性组


    正如在 Windows 环境中所要求的那样，在 Linux 上配置可用性组的第一步是在服务级别启用该功能。清单 [6-1](#394392_3_En_6_Chapter.xhtml#PC1)
    中的脚本演示了如何启用可用性组，然后重新启动服务。此脚本需要在将托管副本的每个服务器上执行。


    提示


    `sudo` 用于在运行命令时提升您的权限。


    ```

    sudo /opt/mssql/bin/mssql-conf set hadr.hadrenabled  1

    sudo systemctl restart mssql-server

    ```

    清单 6-1

    启用可用性组


    ### 创建 Sales 数据库


    下一步是创建我们希望实现高可用性的数据库，并备份该数据库，该备份可用于初始化辅助副本。这可以通过清单 [6-2](#394392_3_En_6_Chapter.xhtml#PC2)
    中的脚本来实现。


    ```

    --Create Sales Database

    CREATE DATABASE Sales ;

    GO

    USE Sales ;

    GO

    CREATE TABLE [dbo].[Orders](

    [OrderNumber] [int] IDENTITY(1,1) NOT NULL PRIMARY KEY CLUSTERED,

    [OrderDate] [date]  NOT NULL,

    [CustomerID] [int]  NOT NULL,

    [ProductID] [int]   NOT NULL,

    [Quantity] [int]    NOT NULL,

    [NetAmount] [money] NOT NULL,

    [TaxAmount] [money] NOT NULL,

    [InvoiceAddressID] [int] NOT NULL,

    [DeliveryAddressID] [int] NOT NULL,

    [DeliveryDate] [date] NULL,

    ) ;

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    --Populate ExistingOrders with data

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    INSERT INTO Orders

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),getdate())as DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),getdate()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b ;

    --SET FULL recovery mode on the database - required for Availability Groups

    ALTER DATABASE Sales SET RECOVERY FULL ;

    GO

    --Backup the Sales Database

    BACKUP DATABASE Sales

    TO  DISK = N''/var/opt/mssql/data/Sales.bak''

    WITH NAME = N''Sales-Full Database Backup'' ;

    GO

    ```

    清单 6-2

    创建 Sales 数据库


    ### 创建证书


    由于我们的 Linux 服务器不是域的一部分，并且无法使用 AD 身份验证相互进行身份验证，因此下一步是创建证书，这些证书可用于实例身份验证。您可以通过连接到主服务器并运行清单
    [6-3](#394392_3_En_6_Chapter.xhtml#PC3) 中的脚本来创建证书。该脚本在 SQL Server 实例中创建证书，然后将其备份到操作系统，以便我们可以将其复制到辅助服务器。请记住，您可以使用
    `sqlcmd` 或通过从 Windows 机器上安装的 `SSMS` 连接，来连接到在 Linux 上运行的 SQL Server 实例。


    ```

    USE Master

    GO

    CREATE MASTER KEY

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE CERTIFICATE aoag_certificate

    WITH SUBJECT = ''AvailabilityGroups'';

    GO

    BACKUP CERTIFICATE aoag_certificate

    TO FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    );

    GO

    ```

    清单 6-3

    创建证书


    我们现在需要将密钥复制到辅助服务器。为此，我们首先需要授予用户对 `/var/opt/mssql/` 数据文件夹的权限。我们可以使用清单 [6-4](#394392_3_En_6_Chapter.xhtml#PC4)
    中的命令来完成此操作，该命令需要在将参与可用性组的所有服务器上运行。


    ```

    sudo chmod -R 777 /var/opt/mssql

    ```

    清单 6-4

    授予权限


    如果在主服务器上运行清单 [6-5](#394392_3_En_6_Chapter.xhtml#PC5) 中的命令，将使用 `scp`（一个远程文件复制程序）将证书的公钥和私钥复制到辅助服务器。为了使此命令正常工作，应在每个服务器上安装和配置
    SSH。SSH 提供对另一台机器的安全访问，但完整的讨论超出了本书的范围。但是，可以在 [`http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/`](http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/)
    找到指南。


    提示


    您应更改用户和服务器名称以匹配您自己的配置。


    ```

    scp /var/opt/mssql/data/aoag_certificate.* pete@linuxsyncha:/var/opt/mssql/data

    scp /var/opt/mssql/data/aoag_certificate.* pete@linuxconfig:/var/opt/mssql/data

    ```

    清单 6-5

    复制密钥


    提示


    如果您没有配置名称服务器，则需要指定 IP 地址，而不是服务器名称。


    我们现在需要通过从文件系统导入证书和密钥在辅助服务器上创建证书。这可以使用清单 [6-6](#394392_3_En_6_Chapter.xhtml#PC6)
    中的脚本来实现。


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'' ;

    GO

    CREATE CERTIFICATE aoag_certificate

    FROM FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    ) ;

    GO

    ```

    清单 6-6

    在辅助服务器上创建证书'
  raw: '### Pacemaker


    Pacemaker is the heart of the cluster. It is responsible for managing cluster
    maintenance events, such as nodes being added and removed. It is also responsible
    for managing cluster events and moving resources between nodes to ensure the resources
    remain available after a failure occurs on a node.


    Pacemaker supports all standard cluster configurations, including active/active,
    active/passive, N+1, and N+M. A discussion of advanced Pacemaker configurations
    is beyond the scope of this book; however, further details can be found in the
    Apress title *Pro Linux High Availability Clustering*, which can be found at [`www.apress.com/gp/book/9781484200803`](http://www.apress.com/gp/book/9781484200803).


    ### Corosync


    Corosync provides the messaging layer for the cluster. It implements the quorum
    system by sending messages between nodes to check the health status and notifies
    Pacemaker if the quorum is lost.


    ### STONITH


    A supported configuration of a Pacemaker cluster must use fencing, which helps
    bring the cluster to a known good state, in the event of a node, or resources
    state being unknown. There are two types of fencing: resource fencing and node
    fencing. Resource fencing is used to prevent a resource from starting on a node.
    This can avoid data corruption, in the event of an outage while a resource is
    being configured. Node fencing prevents a node from running any resources. This
    is usually required if a node becomes unresponsive. Node fencing requires a fencing
    device and a fencing agent. The fencing device may be an uninterrupted power supply,
    a power distribution unit, or a management interface, such as lights-out device
    or blade power control device. The agent that interacts with these devices is
    STONITH (shoot the other node in the head). Because the implementation of STONITH
    is very specific to the fencing device you use, we will not configure it in this
    chapter. That is fine for development or testing purposes, but a production cluster
    should always have STONITH configured.


    ## Preparing to Implement AlwaysOn Availability Groups


    Before creating an Availability Group, there are several prerequisite tasks that
    need to be performed. Namely, we enable Availability Groups on the SQL Server
    instances and create and backup the database that we want to be made highly available,
    and because Linux servers cannot authenticate with each other, we will need to
    create certificates that can be used for authentication. The following sections
    demonstrate how to perform each of these tasks.


    ### Enable Availability Groups


    Just as is required in a Windows environment, the first step in configuring Availability
    Groups on Linux is to enable the feature at the service level. The script in Listing
    [6-1](#394392_3_En_6_Chapter.xhtml#PC1) demonstrates how to enable Availability
    Groups and then restart the service. This script needs to be executed on each
    server that will host a Replica.


    Tip


    `sudo` is used to elevate your permission when running a command.


    ```

    sudo /opt/mssql/bin/mssql-conf set hadr.hadrenabled  1

    sudo systemctl restart mssql-server

    Listing 6-1

    Enable Availability Groups

    ```


    ### Create the Sales Database


    The next step is to create the database that we wish to make highly available
    and take a backup of the database that can be used to seed the secondary. This
    can be achieved with the script in Listing [6-2](#394392_3_En_6_Chapter.xhtml#PC2).


    ```

    --Create Sales Database

    CREATE DATABASE Sales ;

    GO

    USE Sales ;

    GO

    CREATE TABLE [dbo].[Orders](

    [OrderNumber] [int] IDENTITY(1,1) NOT NULL PRIMARY KEY CLUSTERED,

    [OrderDate] [date]  NOT NULL,

    [CustomerID] [int]  NOT NULL,

    [ProductID] [int]   NOT NULL,

    [Quantity] [int]    NOT NULL,

    [NetAmount] [money] NOT NULL,

    [TaxAmount] [money] NOT NULL,

    [InvoiceAddressID] [int] NOT NULL,

    [DeliveryAddressID] [int] NOT NULL,

    [DeliveryDate] [date] NULL,

    ) ;

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    --Populate ExistingOrders with data

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    INSERT INTO Orders

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),getdate())as DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),getdate()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b ;

    --SET FULL recovery mode on the database - required for Availability Groups

    ALTER DATABASE Sales SET RECOVERY FULL ;

    GO

    --Backup the Sales Database

    BACKUP DATABASE Sales

    TO  DISK = N''/var/opt/mssql/data/Sales.bak''

    WITH NAME = N''Sales-Full Database Backup'' ;

    GO

    Listing 6-2

    Create the Sales Database

    ```


    ### Create the Certificates


    Because our Linux servers are not part of a domain and cannot authenticate with
    each other, using AD authentication, the next step is to create certificates,
    which can be used for instance authentication. You can create the certificates
    by connecting to the primary server and running the script in Listing [6-3](#394392_3_En_6_Chapter.xhtml#PC3).
    The script creates a certificate in the SQL Server instance and then backs it
    up to the operating system, so that we can copy it to the secondary server. Remember
    that you can connect to a SQL Server instance, running on Linux by using sqlcmd
    or by connecting from SSMS, installed on a Windows-based machine.


    ```

    USE Master

    GO

    CREATE MASTER KEY

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE CERTIFICATE aoag_certificate

    WITH SUBJECT = ''AvailabilityGroups'';

    GO

    BACKUP CERTIFICATE aoag_certificate

    TO FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    );

    GO

    Listing 6-3

    Create the Certificate

    ```


    We now need to copy the keys to the secondary server. To do this, we first need
    to grant the user permissions to the /var/opt/mssql/ data folder. We can do this
    with the command in Listing [6-4](#394392_3_En_6_Chapter.xhtml#PC4), which needs
    to be run on all servers that will participate in the Availability Group.


    ```

    sudo chmod -R 777 /var/opt/mssql

    Listing 6-4

    Grant Permissions

    ```


    The command in Listing [6-5](#394392_3_En_6_Chapter.xhtml#PC5), if run on the
    primary server, will use `scp`, a remote file copy program, to copy the public
    and private key of the certificate to the secondary server. For this command to
    work, SSH should be installed and configured on each server. SSH provides secure
    access to another machine, but a full discussion is beyond the scope of this book.
    A guide, however, can be found at [`http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/`](http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/).


    Tip


    You should change the user and server names to match your own configuration.


    ```

    scp /var/opt/mssql/data/aoag_certificate.* pete@linuxsyncha:/var/opt/mssql/data

    scp /var/opt/mssql/data/aoag_certificate.* pete@linuxconfig:/var/opt/mssql/data

    Listing 6-5

    Copy the Keys

    ```


    Tip


    If you don’t have a name server configured, you will need to specify an IP Address,
    rather than a server name.


    We now need to create the certificate on the secondary server by importing the
    certificate and key from the file system. This can be achieved using the script
    in Listing [6-6](#394392_3_En_6_Chapter.xhtml#PC6).


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'' ;

    GO

    CREATE CERTIFICATE aoag_certificate

    FROM FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    ) ;

    GO

    Listing 6-6

    Create the Certificate on the Secondary Server

    ```'
  trans: '### Pacemaker


    Pacemaker 是集群的心脏。它负责管理集群维护事件，例如节点的添加和移除。它还负责管理集群事件，并在节点之间移动资源，以确保在节点发生故障后资源仍然可用。


    Pacemaker 支持所有标准的集群配置，包括主动/主动、主动/被动、N+1 和 N+M。对高级 Pacemaker 配置的讨论超出了本书的范围；但是，可以在
    Apress 的 *Pro Linux High Availability Clustering* 一书中找到更多详细信息，该书可在 [`www.apress.com/gp/book/9781484200803`](http://www.apress.com/gp/book/9781484200803)
    找到。


    ### Corosync


    Corosync 为集群提供消息传递层。它通过在节点之间发送消息来检查健康状态，从而实现仲裁系统，并在失去仲裁时通知 Pacemaker。


    ### STONITH


    Pacemaker 集群的支持配置必须使用隔离，这有助于在节点或资源状态未知时，将集群带到已知的良好状态。隔离有两种类型：资源隔离和节点隔离。资源隔离用于防止资源在节点上启动。这可以避免在资源配置期间发生故障时导致数据损坏。节点隔离可防止节点运行任何资源。如果节点变得无响应，通常需要这样做。节点隔离需要一个隔离设备和一个隔离代理。隔离设备可能是一个不间断电源、一个配电单元，或一个管理接口，例如
    lights-out 设备或刀片电源控制设备。与这些设备交互的代理是 STONITH（Shoot The Other Node In The Head）。由于
    STONITH 的实现非常依赖于您使用的隔离设备，因此我们不会在本章中配置它。这对于开发或测试目的是可以的，但生产集群应始终配置 STONITH。


    ## 准备实施 AlwaysOn 可用性组


    在创建可用性组之前，需要执行几项先决任务。即，我们在 SQL Server 实例上启用可用性组，创建并备份我们希望实现高可用性的数据库，并且由于 Linux
    服务器无法相互验证，我们将需要创建可用于身份验证的证书。以下各节演示如何执行这些任务中的每一项。


    ### 启用可用性组


    正如在 Windows 环境中所要求的那样，在 Linux 上配置可用性组的第一步是在服务级别启用该功能。清单 6-1 中的脚本演示了如何启用可用性组，然后重新启动服务。此脚本需要在将托管副本的每个服务器上执行。


    提示


    `sudo` 用于在运行命令时提升您的权限。


    ```

    sudo /opt/mssql/bin/mssql-conf set hadr.hadrenabled  1

    sudo systemctl restart mssql-server

    ```

    清单 6-1

    启用可用性组


    ### 创建 Sales 数据库


    下一步是创建我们希望实现高可用性的数据库，并备份该数据库，该备份可用于初始化辅助副本。这可以通过清单 6-2 中的脚本来实现。


    ```

    --Create Sales Database

    CREATE DATABASE Sales ;

    GO

    USE Sales ;

    GO

    CREATE TABLE [dbo].Orders NOT NULL PRIMARY KEY CLUSTERED,

    [OrderDate] [date]  NOT NULL,

    [CustomerID] [int]  NOT NULL,

    [ProductID] [int]   NOT NULL,

    [Quantity] [int]    NOT NULL,

    [NetAmount] [money] NOT NULL,

    [TaxAmount] [money] NOT NULL,

    [InvoiceAddressID] [int] NOT NULL,

    [DeliveryAddressID] [int] NOT NULL,

    [DeliveryDate] [date] NULL,

    ) ;

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    --Populate ExistingOrders with data

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    INSERT INTO Orders

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),getdate())as DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),getdate()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b ;

    --SET FULL recovery mode on the database - required for Availability Groups

    ALTER DATABASE Sales SET RECOVERY FULL ;

    GO

    --Backup the Sales Database

    BACKUP DATABASE Sales

    TO  DISK = N''/var/opt/mssql/data/Sales.bak''

    WITH NAME = N''Sales-Full Database Backup'' ;

    GO

    ```

    清单 6-2

    创建 Sales 数据库


    ### 创建证书


    由于我们的 Linux 服务器不是域的一部分，并且无法使用 AD 身份验证相互进行身份验证，因此下一步是创建证书，这些证书可用于实例身份验证。您可以通过连接到主服务器并运行清单
    6-3 中的脚本来创建证书。该脚本在 SQL Server 实例中创建证书，然后将其备份到操作系统，以便我们可以将其复制到辅助服务器。请记住，您可以使用 `sqlcmd`
    或通过从 Windows 机器上安装的 `SSMS` 连接，来连接到在 Linux 上运行的 SQL Server 实例。


    ```

    USE Master

    GO

    CREATE MASTER KEY

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE CERTIFICATE aoag_certificate

    WITH SUBJECT = ''AvailabilityGroups'';

    GO

    BACKUP CERTIFICATE aoag_certificate

    TO FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    );

    GO

    ```

    清单 6-3

    创建证书


    我们现在需要将密钥复制到辅助服务器。为此，我们首先需要授予用户对 `/var/opt/mssql/` 数据文件夹的权限。我们可以使用清单 6-4 中的命令来完成此操作，该命令需要在将参与可用性组的所有服务器上运行。


    ```

    sudo chmod -R 777 /var/opt/mssql

    ```

    清单 6-4

    授予权限


    如果在主服务器上运行清单 6-5 中的命令，将使用 `scp`（一个远程文件复制程序）将证书的公钥和私钥复制到辅助服务器。为了使此命令正常工作，应在每个服务器上安装和配置
    SSH。SSH 提供对另一台机器的安全访问，但完整的讨论超出了本书的范围。但是，可以在 [`http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/`](http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/)
    找到指南。


    提示


    您应更改用户和服务器名称以匹配您自己的配置。


    ```

    scp /var/opt/mssql/data/aoag_certificate.* pete@linuxsyncha:/var/opt/mssql/data

    scp /var/opt/mssql/data/aoag_certificate.* pete@linuxconfig:/var/opt/mssql/data

    ```

    清单 6-5

    复制密钥


    提示


    如果您没有配置名称服务器，则需要指定 IP 地址，而不是服务器名称。


    我们现在需要通过从文件系统导入证书和密钥在辅助服务器上创建证书。这可以使用清单 6-6 中的脚本来实现。


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'' ;

    GO

    CREATE CERTIFICATE aoag_certificate

    FROM FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    ) ;

    GO

    ```

    清单 6-6

    在辅助服务器上创建证书'
- fmt: "## Configuring the Availability Group\n\nNow that our certificates are in\
    \ place, we need to create the endpoints, which will be used for connections.\
    \ The script in Listing [6-7](#394392_3_En_6_Chapter.xhtml#PC7) will create an\
    \ endpoint called `AOAG_Endpoint`, which listens on port `5022` and uses our certificate\
    \ for authentication. This script should be run all instances that will participate\
    \ in the Availability Group.\n\n```\nCREATE ENDPOINT AOAG_Endpoint\nSTATE = STARTED\n\
    AS TCP (LISTENER_PORT = 5022)\nFOR DATABASE_MIRRORING (\n    ROLE = ALL,\n   \
    \ AUTHENTICATION = CERTIFICATE aoag_certificate,\n    ENCRYPTION = REQUIRED ALGORITHM\
    \ AES\n);\nListing 6-7\nCreate the Endpoints\n```\n\nEverything is now in place\
    \ for us to create the Availability Group. We will perform these actions on the\
    \ `linuxprod` server. We could use `sqlcmd` on the server, or connect to the server\
    \ using SSMS on a management node, to allow us to use the GUI. Figure [6-1](#394392_3_En_6_Chapter.xhtml#Fig1)\
    \ illustrates the General page of the New Availability Group dialog box, running\
    \ on a management node.\n\n![../images/394392_3_En_6_Chapter/394392_3_En_6_Fig1_HTML.jpg](images/394392_3_En_6_Chapter/394392_3_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nNew Availability Group Dialog Box – General Page\n\nThere are\
    \ two main differences to note in the configuration, compared to the Availability\
    \ Groups that we configured in Chapter [5](#394392_3_En_5_Chapter.xhtml). Firstly,\
    \ the Cluster Type and Failover mode is set to `EXTERNAL`. This indicates that\
    \ the Availability Group will reside on a cluster that is not a Windows Failover\
    \ Cluster. In this case, specifically, it will reside on a Pacemaker cluster.\
    \ When building an Availability Group on Linux, we can choose to set the cluster\
    \ type as `EXTERNAL` or `NONE`. If we select `NONE`, however, then it would not\
    \ be suitable for high availability.\n\nThe second point of note is that the `linuxconfig`\
    \ node is configured as configuration only. Because our Availability Group will\
    \ not be running on a Windows Failover Cluster, then failover needs to be arbitrated\
    \ by the Availability Group, instead of the cluster.\n\nIf we had three or more\
    \ nodes, then a configuration-only node would not be required, as the failure\
    \ of the primary node could still be arbitrated by the two (or more) secondaries.\
    \ Because we only have a two-node cluster, however, a third node is required to\
    \ act as a witness and maintain quorum in the event of a node failure.\n\nThe\
    \ configuration-only node does not contain a copy of the user databases, but the\
    \ Availability Group metadata is synchronized, using synchronous commit mode.\
    \ The configuration-only node can use any version of SQL Server, including SQL\
    \ Server Express edition, to avoid additional costs. A single instance can also\
    \ act as the witness for multiple Availability Groups. However, a single Availability\
    \ Group can only ever have a single configuration-only node.\n\nFigure [6-2](#394392_3_En_6_Chapter.xhtml#Fig2)\
    \ shows the Backup Preferences page of the New Availability Group dialog box.\
    \ Here, we have configured backups to be taken from the Primary node.\n\n![../images/394392_3_En_6_Chapter/394392_3_En_6_Fig2_HTML.jpg](images/394392_3_En_6_Chapter/394392_3_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nNew Availability Group Dialog Box – Backup Preferences Tab\n\n\
    Because we are only configuring high availability, there is no need to configure\
    \ the Read-only Routing. A discussion of Read-only Routing and other configuration\
    \ options not discussed here can be found in Chapter [5](#394392_3_En_5_Chapter.xhtml),\
    \ however.\n\nAlternatively, we could create the Availability Group via T-SQL,\
    \ using the script in Listing [6-8](#394392_3_En_6_Chapter.xhtml#PC8).\n\n```\n\
    USE master\nGO\nCREATE AVAILABILITY GROUP LinuxAOAG WITH (\n    AUTOMATED_BACKUP_PREFERENCE\
    \ = PRIMARY,\n    DB_FAILOVER = OFF,\n    DTC_SUPPORT = NONE,\n    CLUSTER_TYPE\
    \ = EXTERNAL,\n    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0\n)\nFOR DATABASE\
    \ Sales\nREPLICA ON\n    'linuxconfig' WITH (\n        ENDPOINT_URL = 'TCP://linuxconfig.AlwaysOn.com:5022',\n\
    \        AVAILABILITY_MODE = CONFIGURATION_ONLY\n    ),\n    'linuxprod' WITH\
    \ (\n        ENDPOINT_URL = 'TCP://linuxprod.AlwaysOn.com:5022',\n        FAILOVER_MODE\
    \ = EXTERNAL,\n        AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n        SESSION_TIMEOUT\
    \ = 10,\n        BACKUP_PRIORITY = 50,\n        SEEDING_MODE = MANUAL,\n     \
    \   PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),\n        SECONDARY_ROLE(ALLOW_CONNECTIONS\
    \ = NO)\n    ),\n    'linuxsyncha' WITH (\n        ENDPOINT_URL = 'TCP://linuxsyncha.AlwaysOn.com:5022',\n\
    \        FAILOVER_MODE = EXTERNAL,\n        AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n\
    \        SESSION_TIMEOUT = 10,\n        BACKUP_PRIORITY = 0,\n        SEEDING_MODE\
    \ = MANUAL,\n        PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),\n        SECONDARY_ROLE(ALLOW_CONNECTIONS\
    \ = NO)\n    ) ;\nGO\nListing 6-8\nCreate the Availability Group\n```\n\nTo manually\
    \ seed the `Sales` database with a backup, you can copy the backup file to the\
    \ secondary server by running the command in Listing [6-9](#394392_3_En_6_Chapter.xhtml#PC9)\
    \ from the primary server.\n\n```\nScp /var/opt/mssql/data/sales.bak pete@linuxprod:/var/opt/mssql/data\n\
    Listing 6-9\nCopy the Backup of the Sales Database\n```\n\nThe database can be\
    \ restored using the command in Listing [6-10](#394392_3_En_6_Chapter.xhtml#PC10).\n\
    \n```\nUSE master\nGO\nRESTORE DATABASE Sales\nFROM  DISK = '/var/opt/mssql/data/Sales.bak'\n\
    WITH\n    FILE = 1,\n    MOVE N'Sales' TO N'/var/opt/mssql/data/Sales.mdf',\n\
    \    MOVE N'Sales_log' TO N'/var/opt/mssql/data/Sales_log.ldf',\n    NORECOVERY\
    \ ;\nGO\nListing 6-10\nRestore the Sales Database\n```\n\nRunning the script in\
    \ Listing [6-11](#394392_3_En_6_Chapter.xhtml#PC11) will join our secondary replica\
    \ to the Availability Group and ensure that it has the appropriate permissions.\
    \ This script needs to be run against all instances that will participate in the\
    \ Availability Group.\n\n```\nALTER AVAILABILITY GROUP LinuxAOAG JOIN WITH (CLUSTER_TYPE\
    \ = EXTERNAL) ;\nGO\nALTER AVAILABILITY GROUP LinuxAOAG GRANT CREATE ANY DATABASE\
    \ ;\nGO\nListing 6-11\nJoin the Secondary to the Availability Group\n```"
  raw: '## Configuring the Availability Group


    Now that our certificates are in place, we need to create the endpoints, which
    will be used for connections. The script in Listing [6-7](#394392_3_En_6_Chapter.xhtml#PC7)
    will create an endpoint called AOAG_Endpoint, which listens on port 5022 and uses
    our certificate for authentication. This script should be run all instances that
    will participate in the Availability Group.


    ```

    CREATE ENDPOINT AOAG_Endpoint

    STATE = STARTED

    AS TCP (LISTENER_PORT = 5022)

    FOR DATABASE_MIRRORING (

    ROLE = ALL,

    AUTHENTICATION = CERTIFICATE aoag_certificate,

    ENCRYPTION = REQUIRED ALGORITHM AES

    );

    Listing 6-7

    Create the Endpoints

    ```


    Everything is now in place for us to create the Availability Group. We will perform
    these actions on the `linuxprod` server. We could use `sqlcmd` on the server,
    or connect to the server using SSMS on a management node, to allow us to use the
    GUI. Figure [6-1](#394392_3_En_6_Chapter.xhtml#Fig1) illustrates the General page
    of the New Availability Group dialog box, running on a management node.


    ![../images/394392_3_En_6_Chapter/394392_3_En_6_Fig1_HTML.jpg](images/394392_3_En_6_Chapter/394392_3_En_6_Fig1_HTML.jpg)


    Figure 6-1


    New Availability Group Dialog Box – General Page


    There are two main differences to note in the configuration, compared to the Availability
    Groups that we configured in Chapter [5](#394392_3_En_5_Chapter.xhtml). Firstly,
    the Cluster Type and Failover mode is set to `EXTERNAL`. This indicates that the
    Availability Group will reside on a cluster that is not a Windows Failover Cluster.
    In this case, specifically, it will reside on a Pacemaker cluster. When building
    an Availability Group on Linux, we can choose to set the cluster type as `EXTERNAL`
    or `NONE`. If we select `NONE`, however, then it would not be suitable for high
    availability.


    The second point of note is that the `linuxconfig` node is configured as configuration
    only. Because our Availability Group will not be running on a Windows Failover
    Cluster, then failover needs to be arbitrated by the Availability Group, instead
    of the cluster.


    If we had three or more nodes, then a configuration-only node would not be required,
    as the failure of the primary node could still be arbitrated by the two (or more)
    secondaries. Because we only have a two-node cluster, however, a third node is
    required to act as a witness and maintain quorum in the event of a node failure.


    The configuration-only node does not contain a copy of the user databases, but
    the Availability Group metadata is synchronized, using synchronous commit mode.
    The configuration-only node can use any version of SQL Server, including SQL Server
    Express edition, to avoid additional costs. A single instance can also act as
    the witness for multiple Availability Groups. However, a single Availability Group
    can only ever have a single configuration-only node.


    Figure [6-2](#394392_3_En_6_Chapter.xhtml#Fig2) shows the Backup Preferences page
    of the New Availability Group dialog box. Here, we have configured backups to
    be taken from the Primary node.


    ![../images/394392_3_En_6_Chapter/394392_3_En_6_Fig2_HTML.jpg](images/394392_3_En_6_Chapter/394392_3_En_6_Fig2_HTML.jpg)


    Figure 6-2


    New Availability Group Dialog Box – Backup Preferences Tab


    Because we are only configuring high availability, there is no need to configure
    the Read-only Routing. A discussion of Read-only Routing and other configuration
    options not discussed here can be found in Chapter [5](#394392_3_En_5_Chapter.xhtml),
    however.


    Alternatively, we could create the Availability Group via T-SQL, using the script
    in Listing [6-8](#394392_3_En_6_Chapter.xhtml#PC8).


    ```

    USE master

    GO

    CREATE AVAILABILITY GROUP LinuxAOAG WITH (

    AUTOMATED_BACKUP_PREFERENCE = PRIMARY,

    DB_FAILOVER = OFF,

    DTC_SUPPORT = NONE,

    CLUSTER_TYPE = EXTERNAL,

    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0

    )

    FOR DATABASE Sales

    REPLICA ON

    ''linuxconfig'' WITH (

    ENDPOINT_URL = ''TCP://linuxconfig.AlwaysOn.com:5022'',

    AVAILABILITY_MODE = CONFIGURATION_ONLY

    ),

    ''linuxprod'' WITH (

    ENDPOINT_URL = ''TCP://linuxprod.AlwaysOn.com:5022'',

    FAILOVER_MODE = EXTERNAL,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 50,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    ),

    ''linuxsyncha'' WITH (

    ENDPOINT_URL = ''TCP://linuxsyncha.AlwaysOn.com:5022'',

    FAILOVER_MODE = EXTERNAL,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SESSION_TIMEOUT = 10,

    BACKUP_PRIORITY = 0,

    SEEDING_MODE = MANUAL,

    PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),

    SECONDARY_ROLE(ALLOW_CONNECTIONS = NO)

    ) ;

    GO

    Listing 6-8

    Create the Availability Group

    ```


    To manually seed the Sales database with a backup, you can copy the backup file
    to the secondary server by running the command in Listing [6-9](#394392_3_En_6_Chapter.xhtml#PC9)
    from the primary server.


    ```

    Scp /var/opt/mssql/data/sales.bak pete@linuxprod:/var/opt/mssql/data

    Listing 6-9

    Copy the Backup of the Sales Database

    ```


    The database can be restored using the command in Listing [6-10](#394392_3_En_6_Chapter.xhtml#PC10).


    ```

    USE master

    GO

    RESTORE DATABASE Sales

    FROM  DISK = ''/var/opt/mssql/data/Sales.bak''

    WITH

    FILE = 1,

    MOVE N''Sales'' TO N''/var/opt/mssql/data/Sales.mdf'',

    MOVE N''Sales_log'' TO N''/var/opt/mssql/data/Sales_log.ldf'',

    NORECOVERY ;

    GO

    Listing 6-10

    Restore the Sales Database

    ```


    Running the script in Listing [6-11](#394392_3_En_6_Chapter.xhtml#PC11) will join
    our secondary replica to the Availability Group and ensure that it has the appropriate
    permissions. This script needs to be run against all instances that will participate
    in the Availability Group.


    ```

    ALTER AVAILABILITY GROUP LinuxAOAG JOIN WITH (CLUSTER_TYPE = EXTERNAL) ;

    GO

    ALTER AVAILABILITY GROUP LinuxAOAG GRANT CREATE ANY DATABASE ;

    GO

    Listing 6-11

    Join the Secondary to the Availability Group

    ```'
  trans: "\n## 配置可用性组\n\n现在我们的证书已就位，接下来需要创建用于连接的端点。清单 6-7 中的脚本将创建一个名为 `AOAG_Endpoint`\
    \ 的端点，该端点监听端口 `5022`，并使用我们的证书进行身份验证。此脚本应在所有将参与可用性组的实例上运行。\n\n```\nCREATE ENDPOINT\
    \ AOAG_Endpoint\nSTATE = STARTED\nAS TCP (LISTENER_PORT = 5022)\nFOR DATABASE_MIRRORING\
    \ (\n    ROLE = ALL,\n    AUTHENTICATION = CERTIFICATE aoag_certificate,\n   \
    \ ENCRYPTION = REQUIRED ALGORITHM AES\n);\n清单 6-7\n创建端点\n```\n\n现在一切就绪，可以创建可用性组了。我们将在\
    \ `linuxprod` 服务器上执行这些操作。我们可以直接在服务器上使用 `sqlcmd`，或者从管理节点使用 SSMS 连接到服务器，以便使用 GUI\
    \ 界面。图 6-1 展示了在管理节点上运行的“新建可用性组”对话框的“常规”页面。\n\n![../images/394392_3_En_6_Chapter/394392_3_En_6_Fig1_HTML.jpg](img/394392_3_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1\n\n新建可用性组对话框 – 常规页面\n\n与我们在第 5 章配置的可用性组相比，此配置中有两个主要区别需要注意。首先，集群类型和故障转移模式设置为\
    \ `EXTERNAL`。这表明该可用性组将驻留在非 Windows 故障转移集群的集群上。在此具体情况下，它将驻留在 Pacemaker 集群上。在 Linux\
    \ 上构建可用性组时，我们可以选择将集群类型设置为 `EXTERNAL` 或 `NONE`。但是，如果我们选择 `NONE`，则该配置将不适用于高可用性。\n\
    \n第二个需要注意的点是 `linuxconfig` 节点被配置为仅配置节点。由于我们的可用性组不会运行在 Windows 故障转移集群上，因此故障转移需要由可用性组而非集群来仲裁。\n\
    \n如果我们有三个或更多节点，则不需要仅配置节点，因为主节点的故障仍然可以由两个（或多个）辅助节点仲裁。但是，由于我们只有两个节点的集群，因此需要第三个节点充当见证者，并在节点故障时维持仲裁。\n\
    \n仅配置节点不包含用户数据库的副本，但会使用同步提交模式同步可用性组元数据。仅配置节点可以使用任何版本的 SQL Server，包括 SQL Server\
    \ Express 版，以避免额外成本。单个实例也可以充当多个可用性组的见证者。但是，一个可用性组只能有一个仅配置节点。\n\n图 6-2 显示了“新建可用性组”对话框的“备份首选项”页面。在这里，我们配置了从主节点执行备份。\n\
    \n![../images/394392_3_En_6_Chapter/394392_3_En_6_Fig2_HTML.jpg](img/394392_3_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2\n\n新建可用性组对话框 – 备份首选项选项卡\n\n因为我们只配置高可用性，所以无需配置只读路由。但是，关于只读路由以及此处未讨论的其他配置选项的讨论，请参阅第\
    \ 5 章。\n\n或者，我们可以通过 T-SQL 使用清单 6-8 中的脚本来创建可用性组。\n\n```\nUSE master\nGO\nCREATE\
    \ AVAILABILITY GROUP LinuxAOAG WITH (\n    AUTOMATED_BACKUP_PREFERENCE = PRIMARY,\n\
    \    DB_FAILOVER = OFF,\n    DTC_SUPPORT = NONE,\n    CLUSTER_TYPE = EXTERNAL,\n\
    \    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0\n)\nFOR DATABASE Sales\n\
    REPLICA ON\n    'linuxconfig' WITH (\n        ENDPOINT_URL = 'TCP://linuxconfig.AlwaysOn.com:5022',\n\
    \        AVAILABILITY_MODE = CONFIGURATION_ONLY\n    ),\n    'linuxprod' WITH\
    \ (\n        ENDPOINT_URL = 'TCP://linuxprod.AlwaysOn.com:5022',\n        FAILOVER_MODE\
    \ = EXTERNAL,\n        AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n        SESSION_TIMEOUT\
    \ = 10,\n        BACKUP_PRIORITY = 50,\n        SEEDING_MODE = MANUAL,\n     \
    \   PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),\n        SECONDARY_ROLE(ALLOW_CONNECTIONS\
    \ = NO)\n    ),\n    'linuxsyncha' WITH (\n        ENDPOINT_URL = 'TCP://linuxsyncha.AlwaysOn.com:5022',\n\
    \        FAILOVER_MODE = EXTERNAL,\n        AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n\
    \        SESSION_TIMEOUT = 10,\n        BACKUP_PRIORITY = 0,\n        SEEDING_MODE\
    \ = MANUAL,\n        PRIMARY_ROLE(ALLOW_CONNECTIONS = ALL),\n        SECONDARY_ROLE(ALLOW_CONNECTIONS\
    \ = NO)\n    ) ;\nGO\n清单 6-8\n创建可用性组\n```\n\n要通过备份手动初始化 `Sales` 数据库，您可以从主服务器运行清单\
    \ 6-9 中的命令，将备份文件复制到辅助服务器。\n\n```\nScp /var/opt/mssql/data/sales.bak pete@linuxprod:/var/opt/mssql/data\n\
    清单 6-9\n复制 Sales 数据库的备份\n```\n\n可以使用清单 6-10 中的命令还原数据库。\n\n```\nUSE master\nGO\n\
    RESTORE DATABASE Sales\nFROM  DISK = '/var/opt/mssql/data/Sales.bak'\nWITH\n \
    \   FILE = 1,\n    MOVE N'Sales' TO N'/var/opt/mssql/data/Sales.mdf',\n    MOVE\
    \ N'Sales_log' TO N'/var/opt/mssql/data/Sales_log.ldf',\n    NORECOVERY ;\nGO\n\
    清单 6-10\n还原 Sales 数据库\n```\n\n运行清单 6-11 中的脚本会将我们的辅助副本加入可用性组，并确保其拥有适当的权限。此脚本需要针对所有将参与可用性组的实例运行。\n\
    \n```\nALTER AVAILABILITY GROUP LinuxAOAG JOIN WITH (CLUSTER_TYPE = EXTERNAL)\
    \ ;\nGO\nALTER AVAILABILITY GROUP LinuxAOAG GRANT CREATE ANY DATABASE ;\nGO\n\
    清单 6-11\n将辅助副本加入可用性组\n```\n"
- fmt: '# Configuring the Cluster


    Before creating the cluster, we will need to create a login that will be used
    by the Pacemaker account and assign it the permissions that it requires, in each
    of the SQL Server instances that will be participating in the Availability Group.
    This can be achieved by using the script in Listing 6-12.


    ```sql

    CREATE LOGIN Pacemaker

    WITH PASSWORD = ''Pa$$w0rd''

    GO

    GRANT ALTER, CONTROL, VIEW DEFINITION ON AVAILABILITY GROUP::LinuxAOAG

    TO Pacemaker ;

    GRANT VIEW SERVER STATE TO Pacemaker

    ```

    Listing 6-12: Configure the Pacemaker Login


    ## Configure the Firewall


    Next, we will need to configure the firewall. The ports that the cluster will
    require are detailed in Table 6-1.


    Table 6-1: Ports Required by Cluster


    | Port | Description |

    | --- | --- |

    | TCP 2224 | Required on all nodes. `pcsd` Web UI and node-to-node communication
    |

    | TCP 3121 | Required on all nodes if Pacemaker has remote nodes. Used for communication
    between the `crmd` and `pacemaker_remoted` daemons |

    | TCP 21064 | Required on all nodes. Used by resources requiring DLM |

    | UDP 5405 | Required on all nodes. Used by Corosync |

    | TCP 1433 | Required on all nodes. The examples in this chapter have the SQL
    instances listen on `1433`; however, you should change this to match your own
    environment |

    | TCP 5022 | Required on all nodes. The examples in this chapter have the AlwaysOn
    endpoints on `5022`; however, you should change this to match your own environment
    |


    Listing 6-13 provides an example of how to configure firewall rules in Ubuntu.


    ```bash

    sudo ufw allow 2224/tcp

    sudo ufw allow 3121/tcp

    sudo ufw allow 21064/tcp

    sudo ufw allow 5405/udp

    sudo ufw allow 1433/tcp

    sudo ufw allow 5022/tcp

    sudo ufw reload

    ```

    Listing 6-13: Configure Firewall Rules


    ## Install Pacemaker Components


    Next, we will install the Pacemaker components. We can do this with the command
    in Listing 6-14. This command should be run on all server participating in the
    Availability Group.


    ```bash

    sudo apt-get install pacemaker pcs resource-agents

    ```

    Listing 6-14: Install Pacemaker Components


    **Caution**

    For a production system, be sure to also install `fence-agents` for node fencing.


    During the installation of the `pcs` components, a `hacluster` will be created.
    You should set a password for this user using the `passwd` command, as shown in
    Listing 6-15. After running the command, you will be prompted to enter and then
    confirm the new password.


    **Note**

    It is important that you set the same password on each node.


    ```bash

    sudo passwd hacluster

    ```

    Listing 6-15: Set `hacluster` Password


    ## Enable Cluster Services


    We can now enable the `pcsd` and `pacemaker` services, using the script in Listing
    6-16. You will notice that before enabling `pacemaker`, we issue a command to
    destroy any existing cluster. This is because a file called `/etc/cluster/corosync.conf`
    was created during the install of `pcs`, however, enabling `pacemaker` attempts
    to create this file. Using the `cluster destroy` command removes this file to
    avoid a failure when `pacemaker` is enabled.


    ```bash

    sudo systemctl enable pcsd

    sudo systemctl start pcsd

    sudo pcs cluster destroy

    sudo systemctl enable pacemaker

    ```

    Listing 6-16: Enable `pcsd` and `pacemaker`


    ## Build the Cluster


    Now that `pacemaker` is enabled, we can build the cluster. The process for this
    consists of running five `pcs cluster` commands.


    The first is `auth`. This is used to authenticate `pcs` to the `pcs` daemon on
    all of the nodes. The command expects a list of nodes, followed by the username
    and password of the `pcs` user that was created during install. Listing 6-17 demonstrates
    how to use the command in our scenario.


    ```bash

    sudo pcs cluster auth LinuxProd LinuxSyncHA LinuxConfig –u hacluster

    ```

    Listing 6-17: Authenticate Against `pcs` Daemon


    Because we have not specified the `–p` parameter when you run this command, you
    will be prompted to enter the password for `hacluster`.


    The second command is `set up`. This command is used to register the cluster name
    and each node within the cluster. The cluster name is specified using the `–name`
    parameter, followed by a node list. Listing 6-18 illustrates how to use the `setup`
    command in our scenario.


    **Tip**

    It is also possible to specify the `–start` parameter to start the cluster service,
    but we will choose to start the cluster using a separate command, to help illustrate
    the full process.


    ```bash

    sudo pcs cluster setup --name LinuxCluster LinuxProd LinuxSyncHA LinuxConfig

    ```

    Listing 6-18: Set Up the Cluster


    The next command is `start`. As you would expect, this is used to start the cluster
    service. The command either accepts the `–-all` parameter to start the service
    on all nodes (demonstrated in Listing 6-19) or a node list of nodes where the
    cluster service should be started.


    ```bash

    sudo pcs cluster start –-all

    ```

    Listing 6-19: Start the Cluster Service


    After running this command, there can be a delay before the service is started.
    Therefore, you should run the `status` command before continuing to ensure that
    the cluster is up, as shown in Listing 6-20.


    ```bash

    sudo pcs cluster status

    ```

    Listing 6-20: Check Cluster Status


    Finally, we will configure the cluster service to run on startup, for each of
    the nodes. This can be achieved using the `enable` command, as shown in Listing
    6-21. The command accepts either the `–-all` parameter or a node list.


    ```bash

    sudo pcs cluster enable --all

    ```

    Listing 6-21: Enabling the Cluster Service


    ## Install the Resource Agent


    Now that the cluster has been created, we can install the SQL Server resource
    agent. This allows `pacemaker` to loosely integrate with Availability Groups.
    Specifically, it increments a sequence number in the `sys.available_groups` catalog
    view, each time configuration change, such as a failover or a new replica being
    added. It then interrogates this sequence number on failover, to identify if a
    node is up to date, before failover occurs. This allows the failover to be rejected
    if the sequence number is not the highest. Listing 6-22 demonstrates how to install
    the resource agent.


    ```bash

    sudo apt-get install mssql-server-ha

    ```

    Listing 6-22: Install the Resource Agent


    ## Save Credentials and Create Resources


    Next, we need to give `pacemaker` permissions to the Availability Group. We created
    a login for `pacemaker` in Listing 6-12. Now we need to save the credentials in
    the operating system by running the script in Listing 6-23 on all nodes in the
    cluster.


    ```bash

    echo ''pacemakerLogin'' >> ~/pacemaker-passwd

    echo ''Pa$$w0rd'' >> ~/pacemaker-passwd

    sudo mv ~/pacemaker-passwd /var/opt/mssql/secrets/passwd

    sudo chown root:root /var/opt/mssql/secrets/passwd

    sudo chmod 400 /var/opt/mssql/secrets/passwd

    ```

    Listing 6-23: Save the Pacemaker Credentials


    We now need to create cluster resources, both for the Availability Group and for
    the virtual IP Address. This can be achieved by running the script in Listing
    6-24. The first command in the script creates an Availability Group resource for
    the `LinuxAOAG` Availability Group.


    The second command in the script creates a resource for the IP Address that we
    wish to use. Notice that we specify both the IP Address and the network mask of
    the network. The network mask is specified using CIDR notation. CIDR notation
    is beyond the scope of this book, but a CIDR tutorial can be found at [`www.controltechnology.com/Files/common-documents/application_notes/CIDR-Notation-Tutorial`](http://www.controltechnology.com/Files/common-documents/application_notes/CIDR-Notation-Tutorial).'
