    Another important consideration is the placement of database and log files. These
    files must be in the same location on each replica. This means that if you use
    named instances, it is a hard technical requirement that you change the default
    file locations for data and logs, because the default location includes the name
    of the instance. This is assuming, of course, that you do not use the same instance
    name on each node, which would defy many of the benefits of having a named instance.


    ## Summary


    Failover to a synchronous replica in the event of a failure of the primary replica
    is automatic. There are instances, however, in which you will also need to fail
    over manually. This could be because of a disaster that requires failover to the
    DR site, or it could be for proactive maintenance. Although it is possible to
    fail over to an asynchronous replica with the possibility of data loss, it is
    good practice to place the databases in a safe-state first. Because you cannot
    place a database in `read-only` or `single_user` mode, if it is participating
    in an availability group, safe-stating usually consists of disabling the logins
    and then switching to Synchronous Commit mode before failover.


    To monitor availability groups throughout the enterprise, you need to use a monitoring
    tool, such as Systems Operation Center. If you need to monitor a small number
    of availability groups or troubleshoot a specific issue, however, use one of the
    tools included with SQL Server, such as a dashboard for monitoring the health
    of the topology, and an extended events session, called the AlwaysOn Health Trace.


    One benefit of achieving high availability for SQL Server is that doing so allows
    you to minimize downtime during planned maintenance. On a two-node cluster, you
    can upgrade the passive node, fail over, and then upgrade the active node. For
    larger clusters, you can perform a rolling patch upgrade, which involves removing
    half of the nodes from the possible owners list and upgrading them. You then fail
    over the instance to one of the upgraded nodes and repeat the process for the
    remaining nodes. This mitigates the risk of mixed version, across the possible
    owners.


    # 9. Monitoring AlwaysOn Availability Groups


    Once you have implemented Availability Groups, you need to monitor them and respond
    to any errors or warnings that could affect the availability of your data. If
    you have many availability groups implemented throughout the enterprise, then
    the only way to monitor them effectively and holistically is by using an enterprise
    monitoring tool, such as SOC (Systems Operations Center). If you only have a small
    number of availability groups, however, or if you are troubleshooting a specific
    issue, then SQL Server provides the AlwaysOn Dashboard and the AlwaysOn Health
    Trace. You can also create your own Extended Events sessions to monitor Availability
    Groups. This chapter will discuss each of these monitoring possibilities.'
  trans: '

    ### 添加多个侦听器


    通常，每个可用性组只有一个可用性组侦听器，但在某些罕见情况下，您可能需要为同一个可用性组创建多个侦听器。一种可能需要此操作的场景是，如果您有使用硬编码连接字符串的旧版应用程序。此时，您可以创建一个额外的侦听器，其客户端访问点名称与硬编码的连接字符串名称相匹配。


    如本章前面所述，无法通过 `SQL Server Management Studio`、`T-SQL` 甚至 `PowerShell` 创建第二个可用性组侦听器。相反，我们必须使用故障转移群集管理器。在这里，我们在
    `HR` 角色中创建一个新的 `客户端访问点` 资源。为此，我们从 `HR` 角色的上下文菜单中选择 `添加资源`，然后选择 `客户端访问点`。这将调用 `新建资源向导`。该向导的
    `客户端访问点` 页面如图 8-6 所示。您可以看到我们已输入了客户端访问点的 DNS 名称，并为每个子网指定了一个 IP 地址。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig6_HTML.jpg](img/394392_3_En_8_Fig6_HTML.jpg)


    图 8-6：客户端访问点页面


    在 `确认` 页面上，显示了将执行的配置摘要。在 `配置客户端访问点` 页面上，我们会看到一个进度指示器，最后在 `摘要` 页面上显示完成摘要，如图 8-7
    所示。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig7_HTML.jpg](img/394392_3_En_8_Fig7_HTML.jpg)


    图 8-7：确认页面


    现在，我们需要配置可用性组资源，使其依赖于新的客户端访问点。为此，我们从 `HR` 资源的上下文菜单中选择 `属性`，然后导航到 `依赖项` 选项卡。在这里，我们将新的客户端访问点添加为依赖项，并在两个侦听器之间配置一个
    `OR` 约束，如图 8-8 所示。应用此更改后，客户端就能够使用这两个侦听器名称中的任何一个进行连接。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig8_HTML.jpg](img/394392_3_En_8_Fig8_HTML.jpg)


    图 8-8：依赖项选项卡


    ### 其他管理注意事项


    当使用 AlwaysOn 可用性组使数据库具有高可用性时，会施加一些限制。其中最严格的一个是，数据库不能被置于 `单用户` 模式或设为 `只读`。当您需要为了维护而使应用程序进入安全状态时，这可能会产生影响。这就是为什么在本章的“故障转移”部分，我们禁用了映射到这些数据库的用户的登录。如果您必须将数据库置于
    `单用户` 模式，则必须首先将其从可用性组中移除。


    可以通过运行清单 8-8 中的命令将数据库从可用性组中移除。此命令将 `Customers` 数据库从 `Sales` 可用性组中移除。


    ```

    ALTER DATABASE Customers SET HADR OFF ;

    ```

    清单 8-8：从可用性组中移除数据库


    也可能有这样的情况：您希望数据库保留在可用性组中，但希望暂停到其他副本的数据移动。这通常是因为可用性组处于同步提交模式，并且您正处于高使用期，需要提升性能。您可以使用清单
    8-9 中的命令暂停数据库的数据移动，该命令暂停然后恢复 `Sales` 数据库的数据移动。


    > **注意**

    >

    > 如果暂停数据移动，主副本上的事务日志会继续增长，并且在数据移动恢复且数据库同步之前，您无法对其进行截断。


    ```

    ALTER DATABASE Sales SET HADR SUSPEND ;

    GO

    ALTER DATABASE Sales SET HADR RESUME ;

    GO

    ```

    清单 8-9：暂停数据移动


    另一个重要的注意事项是数据库和日志文件的位置。这些文件在每个副本上必须位于相同的位置。这意味着，如果您使用命名实例，那么更改数据和日志的默认文件位置是一个硬性的技术要求，因为默认位置包含实例名称。当然，这是假设您没有在每个节点上使用相同的实例名，否则将违背使用命名实例的许多优势。


    ### 小结


    当主副本发生故障时，自动故障转移到同步副本。然而，有些情况下您也需要手动进行故障转移。这可能是由于需要故障转移到灾难恢复站点的灾难，或者是为了进行主动维护。虽然可以故障转移到异步副本并有可能丢失数据，但最佳实践是首先使数据库进入安全状态。因为如果数据库参与了可用性组，您就不能将其置于
    `只读` 或 `单用户` 模式，所以安全状态通常包括禁用登录，然后在故障转移前切换到同步提交模式。


    为了在整个企业中监控可用性组，您需要使用监控工具，例如系统操作中心。但是，如果您需要监控少量可用性组或排查特定问题，请使用 SQL Server 附带的工具之一，例如用于监控拓扑运行状况的仪表板，以及一个名为
    `AlwaysOn 运行状况跟踪` 的扩展事件会话。


    为 SQL Server 实现高可用性的一个好处是，它可以在计划维护期间最大限度地减少停机时间。在双节点集群上，您可以升级被动节点，进行故障转移，然后升级主动节点。对于更大的集群，您可以执行滚动修补升级，这包括将一半节点从可能所有者列表中移除并进行升级。然后将实例故障转移到其中一个已升级的节点，并对剩余节点重复此过程。这降低了跨可能所有者存在混合版本的风险。


    ## 9. 监控 AlwaysOn 可用性组


    一旦实现了可用性组，您就需要监控它们，并对可能影响数据可用性的任何错误或警告做出响应。如果您在整个企业中实施了许多可用性组，那么有效且全面监控它们的唯一方法是使用企业监控工具，例如
    `SOC（系统操作中心）`。但是，如果您只有少量可用性组，或者您正在排查特定问题，那么 SQL Server 提供了 `AlwaysOn 仪表板` 和 `AlwaysOn
    运行状况跟踪`。您还可以创建自己的 `扩展事件` 会话来监控可用性组。本章将讨论这些监控可能性中的每一种。

    '
- fmt: '## AlwaysOn Dashboard


    AlwaysOn Dashboard 是一个交互式报告，可用于查看 AlwaysOn 环境的运行状况，并对拓扑中的元素进行深入分析或汇总。您可以从对象资源管理器中“可用性组”文件夹的上下文菜单，或者从可用性组本身的上下文菜单调用此报告。图
    9-1 显示了从 `HR` 可用性组的上下文菜单生成的报告。您可以看到当前同步状态是健康的。已使用“添加/删除列”按钮添加了“估计恢复时间”和“估计数据丢失”指标。“估计数据丢失”在有异步副本时很有帮助，以便在发生事件时评估影响。


    数据库可能处于三种同步状态：`SYNCHRONIZED`、`SYNCHRONIZING` 和 `NOT SYNCHRONIZING`。同步副本应处于 `SYNCHRONIZED`
    状态，任何其他状态都表示不健康。然而，异步副本永远不会处于 `SYNCHRONIZED` 状态，`SYNCHRONIZING` 状态被认为是健康的。无论采用何种模式，`NOT
    SYNCHRONIZING` 都表示副本未连接。


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig1_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig1_HTML.jpg)


    **图 9-1 可用性组仪表板**


    注意：除了同步状态外，副本还具有以下操作状态之一：`PENDING_FAILOVER`、`PENDING`、`ONLINE`、`OFFLINE`、`FAILED`、`FAILED_NO_QUORUM`
    和 `NULL`（当副本断开连接时）。可以使用 DMV `sys.dm_hadr_availability_replica_states` 查看副本的操作状态。


    在报告的右上角，有指向故障转移向导（本章前面已讨论）、AlwaysOn 运行状况事件（下一节讨论）的链接，以及一个查看群集仲裁信息的链接。通过此链接调用的“群集仲裁信息”屏幕如图
    9-2 所示。


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig2_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig2_HTML.jpg)


    **图 9-2 群集仲裁信息屏幕**


    “添加/删除列”链接将显示一个上下文菜单，您可以在其中动态地向显示中添加或删除列。图 9-3 显示已添加了“挂起”和“挂起原因”。


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig3_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig3_HTML.jpg)


    **图 9-3 添加/删除列**


    您还可以在“可用性副本”窗口中深入查看每个副本，以查看特定于副本的详细信息。“分组依据”按钮允许您按副本、数据库、同步状态、故障转移准备情况或问题对可用性数据库进行分组。


    ## AlwaysOn 运行状况跟踪


    AlwaysOn 运行状况跟踪是一个扩展事件会话，在您创建第一个可用性组时创建。它可以在 SQL Server Management Studio 中找到，位于“扩展事件”->“会话”下。通过其上下文菜单，您可以查看正在捕获的实时数据，也可以进入会话属性以更改捕获事件的配置。也可以通过
    AlwaysOn 仪表板中的“查看 AlwaysOn 运行状况事件”链接访问。


    深入查看该会话会显示会话包，从包的上下文菜单中，您可以查看先前捕获的事件。图 9-4 显示捕获的最新事件是数据库 5（在我们的例子中是 `HR`），它正在等待日志在同步副本上固化。


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig4_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig4_HTML.jpg)


    **图 9-4 目标数据**


    在窗口顶部窗格中右键单击列标题将显示一个上下文菜单，该菜单允许您在特定列中搜索文本或值、按列中的值对结果集进行分组或按特定列对结果集进行排序。您还可以使用上下文菜单向结果集中添加或删除列。


    ## 使用扩展事件监控 AlwaysOn


    扩展事件是 SQL Server 中的一个轻量级监控系统，它使用 WMI 捕获事件。由于其架构使用的系统资源非常少，因此扩展性很好，允许您在监控实例的同时对用户活动的影响最小。它们还具有高度可配置性，为您提供了从非常细粒度（例如页面拆分）到较粗粒度（例如
    CPU 利用率）的捕获详细信息的广泛选项。您还可以将扩展事件与操作系统数据相关联，以便在排除问题时提供整体视图。扩展事件的前身是 SQL Trace 及其
    GUI 工具 Profiler，该工具已弃用。


    ### 扩展事件概念


    扩展事件具有丰富的架构，由事件、目标、操作、谓词、类型、映射和会话组成。这些对象存储在包内，而包又存储在模块中，该模块可以是 .dll 或可执行文件。我们将在以下部分讨论这些概念。


    #### 包


    包是扩展事件中使用的对象的容器。以下是 SQL Server 包的四种类型：


    *   `Package0` – 默认包，用于扩展事件系统对象。

    *   `Sqlserver` – 用于与 SQL Server 相关的对象。

    *   `Sqlos` – 用于与 SQLOS 相关的对象。

    *   `SecAudit` – 由 SQL 审核使用；但是，其对象未被公开。


    #### 事件


    事件是您感兴趣的发生现象，可以对其进行跟踪。它可能是一个 SQL 批处理完成、缓存未命中、页面拆分，或者根据您配置的跟踪性质，数据库引擎内可能发生的几乎任何其他事情。每个事件按通道和关键字（也称为类别）进行分类。通道是一个高级分类，SQL
    Server 2016 中的所有事件都属于表 9-1 中描述的通道之一。


    **表 9-1 通道**


    | 通道 | 描述 |

    | --- | --- |

    | Admin | 具有众所周知解决方案的众所周知的事件。例如，死锁、服务器启动、超过 CPU 阈值以及使用已弃用的功能。 |

    | Operational | 用于排除问题。例如，检测到不良内存、AlwaysOn 可用性组副本更改其状态、检测到长时间 I/O，这些都是属于“操作”通道的事件。
    |

    | Analytic | 大量事件，您可用于排除性能等问题。例如，事务开始、获取锁、文件读取完成，这些都是属于“分析”通道的事件。 |

    | Debug | 供开发人员通过返回内部数据来诊断问题。“调试”通道中的事件在 SQL Server 的未来版本中可能会更改，因此应尽可能避免使用它们。
    |


    关键字（或类别）则要细粒度得多。所有与 AlwaysOn 相关的事件都属于 `AlwaysOn` 和 `HADR` 类别。SQL Server 公开了 122
    个与 AlwaysOn 相关的事件。这些事件列于表 9-2 中。


    **表 9-2 AlwaysOn 事件**'
  raw: '## AlwaysOn Dashboard


    The AlwaysOn Dashboard is an interactive report that allows you to view the health
    of your AlwaysOn environment and drill through, or roll up elements within the
    topology. You can invoke the report from the context menu of the Availability
    Groups folder in Object Explorer, or from the context menu of the availability
    group itself. Figure [9-1](#394392_3_En_9_Chapter.xhtml#Fig1) shows the report
    that is generated from the context menu of the `HR` availability group. You can
    see that currently synchronization is in a healthy state. The Add/Remove columns
    button has been used to add the Estimated Recovery Time and Estimated Data Loss
    measures. Estimated Data Loss is helpful when you have asynchronous replicas,
    so that gauge impact in the event of an incident.


    The three possible synchronization states that a database can be in are `SYNCHRONIZED`,
    `SYNCHRONIZING`, and `NOT SYNCHRONIZING`. A synchronous replica should be in the
    `SYNCHRONIZED` state, and any other state is unhealthy. An asynchronous replica,
    however, will never be in the `SYNCHRONIZED` state, and a state of `SYNCHRONIZING`
    is considered healthy. Regardless of the mode, `NOT SYNCHRONIZING` indicates that
    the replica is not connected.


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig1_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig1_HTML.jpg)


    Figure 9-1


    The Availability Group Dashboard


    Note


    In addition to the synchronization states, a replica also has one of the following
    operational states: `PENDING_FAILOVER`, `PENDING`, `ONLINE`, `OFFLINE`, `FAILED`,
    `FAILED_NO_QUORUM`, and `NULL` (when the replica is disconnected). The operational
    state of a replica can be viewed using the `sys.dm_hadr_availability_replica_states`
    DMV.


    At the top right of the report, there are links to the failover wizard, which
    we discussed earlier in this chapter; the AlwaysOn Health events, which we discussed
    in the next section; and also a link to view cluster quorum information. The Cluster
    Quorum Information screen, which is invoked by this link, is displayed in Figure
    [9-2](#394392_3_En_9_Chapter.xhtml#Fig2).


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig2_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig2_HTML.jpg)


    Figure 9-2


    The Cluster Quorum Information Screen


    The Add/Remove Columns link will display a context menu, where you can dynamically
    add or remove columns from the display. Figure [9-3](#394392_3_En_9_Chapter.xhtml#Fig3)
    shows that Suspend and Suspend Reason have been added.


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig3_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Add/Remove Columns


    You can also drill through each replica in the Availability Replicas window to
    see replica-specific details. The Group by button will allow you to group Availability
    Databases by Replica, Database, Synchronization state, Failover Readiness, or
    Issue.


    ## AlwaysOn Health Trace


    The AlwaysOn Health Trace is an Extended Events session, which is created when
    you create you first availability group. It can be located in SQL Server Management
    Studio, under Extended Events ➤ Sessions, and via its context menu, you can view
    live data that is being captured, or you can enter the session’s properties to
    change the configuration of the events that are captured. It can also be accessed
    by using the View AlwaysOn Health Events link in the AlwaysOn Dashboard.


    Drilling through the session exposes the session’s package, and from the context
    menu of the package, you can view previously captured events. Figure [9-4](#394392_3_En_9_Chapter.xhtml#Fig4)
    shows that the latest event captured was Database 5 (which, in our case, is `HR`),
    which was waiting for the log to be hardened on the synchronous replica.


    ![../images/394392_3_En_9_Chapter/394392_3_En_9_Fig4_HTML.jpg](images/394392_3_En_9_Chapter/394392_3_En_9_Fig4_HTML.jpg)


    Figure 9-4


    The Target Data


    Right-clicking a column header in the top pane of the window will expose a context
    menu, which allows you to search for a text or a value in a specific column, group
    by the values within a column or sort the results sets by a specific column. You
    can also use the context menu to add or remove columns from the result set.


    ## Monitoring AlwaysOn with Extended Events


    Extended Events are a lightweight monitoring system in SQL Server, which capture
    events using WMI. Because the architecture uses so few system resources, they
    scale very well and allow you to monitor instances, with minimal impact on user
    activity. They are also highly configurable, giving you a wide range of options
    for capturing details from a very fine grain, such as page splits, to courser-grain
    information, such as CPU utilization. You can also correlate Extended Events with
    operating system data to provide a holistic picture when troubleshooting issues.
    The predecessor to Extended Events was SQL Trace and its GUI, called Profiler,
    which is deprecated.


    ### Extended Events Concepts


    Extended Events have a rich architecture, which consists of Events, Targets, Actions,
    Predicates, Types, Maps, and Sessions. These artifacts are stored within a Package,
    which is, in turn, stored within a module, which can be either a .dll or an executable.
    We discuss these concepts in the following sections.


    #### Packages


    A package is a container for the objects used within Extended Events. Here are
    the four types of SQL Server package:


    *   Package0 – The default package, used for Extended Events system objects.


    *   Sqlserver – Used for SQL Server–related objects.


    *   Sqlos – Used for SQLOS-related objects.


    *   SecAudit – Used by SQL Audit; however, its objects are not exposed.


    #### Events


    An event is an occurrence of interest that you can trace. It may be a SQL batch
    completing, a cache miss, or a page split, or virtually anything else that can
    happen within the Database Engine, depending on the nature of the trace that you
    are configuring. Each event is categorized by channel and keyword (also known
    as category). A channel is a high-level categorization, and all events in SQL
    Server 2016 fall into one of the channels described in Table [9-1](#394392_3_En_9_Chapter.xhtml#Tab1).


    Table 9-1


    Channels


    | Channel | Description |

    | --- | --- |

    | Admin | Well-known events with well-known resolutions. For example, deadlocks,
    server starts, CPU thresholds being exceeded, and the use of deprecated features.
    |

    | Operational | Used for troubleshooting issues. For example, bad memory being
    detected, an AlwaysOn Availability Group replica changing its state, and a long
    IO being detected are all events that fall within the Operational channel. |

    | Analytic | High-volume events that you can use for troubleshooting issues such
    as performance. For example, a transaction beginning, a lock being acquired, and
    a file read completing are all events that fall within the Analytic channel. |

    | Debug | Used by developers to diagnose issues by returning internal data. The
    events in the Debug channel are subject to change in future versions of SQL Server,
    so you should avoid them when possible. |


    Keywords (or categories) are much more fine grain. All events relating to AlwaysOn
    fall into the `AlwaysOn` and `HADR` categories. SQL Server exposes 122 events
    relating to AlwaysOn. These events are listed in Table [9-2](#394392_3_En_9_Chapter.xhtml#Tab2).


