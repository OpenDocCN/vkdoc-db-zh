    ## Introduction


    `SQL Server 2019 AlwaysOn` is intended to be a quick start guide for DBAs who
    need to implement high availability and disaster recovery for their SQL Server
    workloads.


    The book begins with a discussion of high availability concepts and methodologies,
    before a high-level overview of HA/DR technologies. Then, it’s into the detail.
    We will discuss how to create Windows clusters, before looking at how to create
    SQL Server `AlwaysOn Failover Clustered Instances`.


    The focus of the book then turns to `AlwaysOn Availability Groups`. Here, the
    book discusses how to create and configure Availability Groups for high availability
    and disaster recovery, both on Windows and Linux operating systems.


    We then look at atypical use cases for `AlwaysOn Availability Groups`, such as
    clusterless and domain-independent availability groups, as well as configuring
    Availability Groups on Azure IaaS and Basic Availability Groups, for SQL Server
    Standard Edition.


    Finally, the book looks at the operational side of AlwaysOn, with chapters covering
    the administration, monitoring, and troubleshooting of the technology.


    ## Acknowledgments


    I want to offer my thanks to the amazing Chris Dent, who once again helped me
    with my network configuration for this book.


    I would also like to thank Ian Stirk, whose tech reviews always increase the quality
    of my books, with this book being no exception.


    ## About the Author About the Technical Reviewer


    ## 1. High Availability and Disaster Recovery Concepts


    In today’s 24×7 environments that are running mission-critical applications, businesses
    rely heavily on the availability of their data. Although servers and their software
    are generally reliable, there is always the risk of a hardware failure or a software
    bug, each of which could bring a server down. To mitigate these risks, business-critical
    applications often rely on redundant hardware to provide fault tolerance. If the
    primary system fails, then the application can automatically fail over to the
    redundant system. This is the underlying principle of `high availability (HA)`.


    Even with the implementation of HA technologies, there is always a small risk
    of an event that causes the application to become unavailable. This could be due
    to a major incident, such as the loss of a data center, due to a natural disaster,
    or due to an act of terrorism. It could also be caused by data corruption or human
    error, resulting in the application’s data becoming lost or damaged beyond repair.


    In these situations, some applications may rely on restoring the latest backup
    to recover as much data as possible. However, more critical applications may require
    a redundant server to hold a synchronized copy of the data in a secondary location.
    This is the underpinning concept of `disaster recovery (DR)`. This chapter discusses
    the concepts behind HA and DR.'
