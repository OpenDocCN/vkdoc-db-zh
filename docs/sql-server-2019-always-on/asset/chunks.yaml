- fmt: '## Adding a Node Using PowerShell


    To add a node using PowerShell instead of the GUI, you can run SQL Server’s `setup.exe`
    application with an `AddNode` action. When you add a node from the command line,
    the parameters detailed in Table 4-2 are mandatory.


    Table 4-2

    Mandatory Parameters for the AddNode Action


    | Parameter | Usage |

    | --- | --- |

    | `/ACTION` | Must be configured as `AddNode`. |

    | `/IACCEPTSQLSERVERLICENSETERMS` | Mandatory when installing on Windows Server
    Core, since the `/qs` switch must be specified on Windows Server Core. |

    | `/INSTANCENAME` | The instance that you are adding the extra node to support.
    |

    | `/CONFIRMIPDEPENDENCYCHANGE` | Allows multiple IP addresses to be specified
    for multi-subnet clusters. Pass in a value of `1` for `True` or `0` for `False.`
    |

    | `/FAILOVERCLUSTERIPADDRESSES` | Specifies the IP address(es) to use for the
    instance in the format *<IP Type>;<address>;<network name>;<subnet mask>*. For
    multi-subnet clusters, the IP addresses are space delimited. |

    | `/FAILOVERCLUSTERNETWORKNAME` | The virtual name of the clustered instance.
    |

    | `/INSTALLSQLDATADIR` | The folder in which to place SQL Server data files. This
    must be a cluster disk. |

    | `/SQLSVCACCOUNT` | The service account that is used to run the Database Engine.
    |

    | `/SQLSVCPASSWORD` | The password of the service account that is used to run
    the Database Engine. |

    | `/AGTSVCACCOUNT` | The service account that issued to run SQL Server Agent.
    |

    | `/AGTSVCPASSWORD` | The password of the service account that is used to run
    SQL Server Agent. |


    The script in Listing 4-2 adds `ClusterNode2` to the role when you run it from
    the root folder of the install media.


    ```

    .\setup.exe /IACCEPTSQLSERVERLICENSETERMS /ACTION="AddNode" /INSTANCENAME="MSSQLSERVER"
    /SQLSVCACCOUNT="ALWAYSON\SQLServiceAccount" /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="ALWAYSON\SQLServiceAccount"
    /AGTSVCPASSWORD="Pa$$w0rd" /FAILOVERCLUSTERIPADDRESSES="IPv4;10.0.0.9;Cluster
    Network 2;255.255.255.0" /CONFIRMIPDEPENDENCYCHANGE=0 /qs

    ```

    Listing 4-2

    Adding a Node Using PowerShell


    ## Summary


    An AlwaysOn Failover Clustered Instance can be installed using SQL Server Installation
    Center or via PowerShell. When using the SQL Server Installation Center, the process
    is very similar to the installation of a stand-alone instance; however, you will
    need to specify additional details, such as the network name, IP Address, and
    resource group configuration.


    When using PowerShell to install the Instance, you will use the `InstallFailoverCluster`
    action, specifying the `/FAILOVERCLUSTERIPADDRESSES`, `/FAILOVERCLUSTERNETWORKNAME`,
    and `/INSTALLSQLDATADIR` parameters, in addition to the parameters required for
    a stand-alone instance build.


    # 5. Implementing AlwaysOn Availability Groups On Windows


    AlwaysOn Availability Groups provide a flexible option for achieving high availability,
    recovering from disasters, and scaling out read-only workloads. The technology
    synchronizes data at the database level, with health monitoring and quorum often
    provided by a Windows cluster, although a Windows cluster is not mandatory.


    There are different variations of AlwaysOn Availability Groups. The traditional
    flavor sits on a Windows Failover Cluster, but if SQL Server is installed on Linux,
    then Pacemaker can be used. AlwaysOn Availability Groups can also be configured
    with no cluster at all. This is acceptable for offloading reporting but is not
    a valid high availability (HA) or disaster recovery (DR) configuration. When using
    SQL Server 2019 with Windows Server 2019, Availability Groups can even be configured
    for containerized SQL, with Kubernetes.


    This chapter focuses on configuring Availability Groups on a Windows Failover
    Cluster, for the purpose of providing both HA and DR, and scaling read-only workloads.
    Availability Groups on Linux will be explored in Chapter 6.


    Note

    For the demonstrations in this chapter, we will use the cluster built in Chapter
    3, but two additional nodes have been added to the cluster: `CLUSTERNODE3` and
    `CLUSTERNODE4`. We will not use the Failover Clustered Instance that we configured
    in Chapter 4. Instead, stand-alone instances of SQL Server have been installed
    on each of the nodes, with the following names: `CLUSTERNODE1\PROD`, `CLUSTERNODE2\SYNCHA`,
    `CLUSTERNODE3\ASYNCDR`, and `CLUSTERNODE4\READSCALE`. Cluster nodes 1 and 2 sit
    within a subnet called `Site1` and Cluster nodes 3 and 4 sit within a different
    subnet, called `Site2`. The instances are storing the Database data and log files
    on the C:\ volume. The shared storage within the cluster is not being used for
    these instances.


    In this chapter, we will perform the following activities:

    *   Create Sales, Customers, Accounts, and HR Databases.

    *   Enable Availability Groups on our instances.

    *   Create an Availability group for the HR Database, using the New Availability
    Group wizard. This Availability Group will be configured for HA only.

    *   Create an Availability Group for the Sales and Customers database using the
    New Availability Group dialog box. This will be configured for HA, DR, and read-scaling.

    *   Create an Availability Group for the Accounts database using T-SQL. This Availability
    Group will be configured for HA and DR without any read-scaling.

    *   We will also discuss how PowerShell can be used to create Availability Groups.


    ## Preparing to Implement AlwaysOn Availability Groups


    Before implementing AlwaysOn Availability Groups, we first create four databases,
    which we will use during the demonstrations in this chapter. Each contains a single
    table, which we populate with data. Each database is configured with Recovery
    mode set to `FULL`. This is a hard requirement for a database to use AlwaysOn
    Availability Groups because data is synchronized via a log stream. The script
    in Listing 5-1 creates these databases.'
