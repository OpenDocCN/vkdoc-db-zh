  raw: 'The rules for installing the selected features are checked, and if all rules
    pass, then the Instance Configuration page will be displayed, as illustrated in
    Figure [4-7](#394392_3_En_4_Chapter.xhtml#Fig7). On this page of the wizard, you
    will specify a name for the instance. Because the instance will be clustered,
    this page will also ask you to specify the network name for the instance. In this
    scenario, we will install a default instance of SQL Server, meaning that we do
    not need to specify an instance name. We will assign `ALWAYSON-SQL-C` as the network
    name.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig7_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Install a SQL Server Failover Cluster Wizard – Instance Configuration Page


    Tip


    SQL Server uses the term cluster resource group to describe a cluster role. A
    cluster role is Microsoft’s newer term, and within this chapter, the terms should
    be treated synonymously.


    On the Cluster Resource Group page of the wizard, we have the option of either
    selecting an existing cluster resource group (which gives the option of a Windows
    administrator pre-creating the resource group) or entering the name of a new resource
    group, which will then be created by setup. In our case, we will specify `ALWAYSON-SQL-C`
    as a name for a new resource group. This is illustrated in Figure [4-8](#394392_3_En_4_Chapter.xhtml#Fig8).


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig8_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Install a SQL Server Failover Cluster Wizard – Cluster Resource Group Page


    Tip


    Existing resource groups will be marked with a red or green indicator in the Qualified
    column. If the marker is red, it means that it is not possible to use that resource
    group for the SQL Server instance. In this case, the Message column will indicate
    the reason.


    On the Cluster Disk Selection page, illustrated in Figure [4-9](#394392_3_En_4_Chapter.xhtml#Fig9),
    you can select the disk resources that should be associated with the resource
    group. The page will list all disks that are associated with the cluster and indicate
    which disks can be selected with red or green indicators in the Qualified column.
    Disks that are already associated with other resource groups cannot be selected,
    because a disk can only be associated with a single resource group. We will specify
    that all available disks (Data, Logs, and TempDB) should be associated with the
    `ALWAYSON-SQL-C` resource group.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig9_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Install a SQL Server Failover Cluster Wizard – Cluster Disk Selection Page


    On the Cluster Network Configuration page (Figure [4-10](#394392_3_En_4_Chapter.xhtml#Fig10)),
    we can configure the IP Address of the cluster role. We can either choose DHCP,
    which means that the IP address will be attained automatically, or we can specify
    a static IP address. In our case, we will specify a static IP address. If our
    cluster were a stretch cluster (spread across multiple subnets), we would need
    to specify an IP address for each subnet.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig10_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Install a SQL Server Failover Cluster – Cluster Network Configuration Page


    The Server Configuration page has two tabs. The first tab is Service Accounts.
    On this tab, which is illustrated in Figure [4-11](#394392_3_En_4_Chapter.xhtml#Fig11),
    we will specify the service account that will be used as the security context
    for each SQL Server service and also specify the startup mode for each of the
    services. This is worthy of note because when installing a stand-alone instance,
    you will usually set each service to start automatically. When installing a cluster,
    however, cluster-aware services should be configured to start manually. This is
    because they will be managed by the cluster service.'
  trans: "\n安装所选功能的规则将被检查，如果所有规则都通过，系统将显示**实例配置**页面，如图 4-7 所示。在此向导页面中，您将为实例指定一个名称。由于实例将被集群化，此页面还会要求您指定实例的网络名称。在本场景中，我们将安装\
    \ SQL Server 的默认实例，这意味着我们无需指定实例名称。我们将分配 `ALWAYSON-SQL-C` 作为网络名称。\n\n![图 4-7](img/394392_3_En_4_Fig7_HTML.jpg)\n\
    \n**图 4-7**  \n安装 SQL Server 故障转移集群向导 – 实例配置页面\n\n> **提示**  \n> SQL Server 使用术语“集群资源组”来描述集群角色。“集群角色”是微软较新的术语，在本章中，这两个术语应视为同义。\n\
    \n在向导的**集群资源组**页面上，我们可以选择现有的集群资源组（这提供了由 Windows 管理员预先创建资源组的选项），或者输入新资源组的名称，该资源组将由安装程序创建。在我们的案例中，我们将指定\
    \ `ALWAYSON-SQL-C` 作为新资源组的名称。如图 4-8 所示。\n\n![图 4-8](img/394392_3_En_4_Fig8_HTML.jpg)\n\
    \n**图 4-8**  \n安装 SQL Server 故障转移集群向导 – 集群资源组页面\n\n> **提示**  \n> 现有资源组将在 `合格`\
    \ 列中标有红色或绿色指示器。如果指示器为红色，则表示无法将该资源组用于 SQL Server 实例。在这种情况下，`消息` 列将说明原因。\n\n在**集群磁盘选择**页面（如图\
    \ 4-9 所示）上，您可以选择应与资源组关联的磁盘资源。该页面将列出与集群关联的所有磁盘，并通过 `合格` 列中的红色或绿色指示器标明哪些磁盘可被选择。已与其他资源组关联的磁盘无法被选择，因为一个磁盘只能与一个资源组关联。我们将指定所有可用磁盘（数据、日志和\
    \ TempDB）都应与 `ALWAYSON-SQL-C` 资源组关联。\n\n![图 4-9](img/394392_3_En_4_Fig9_HTML.jpg)\n\
    \n**图 4-9**  \n安装 SQL Server 故障转移集群向导 – 集群磁盘选择页面\n\n在**集群网络配置**页面（图 4-10）上，我们可以配置集群角色的\
    \ IP 地址。我们可以选择 `DHCP`（这意味着 IP 地址将自动获取），也可以指定一个静态 IP 地址。在我们的案例中，我们将指定一个静态 IP 地址。如果我们的集群是延伸集群（跨多个子网分布），则需要为每个子网指定一个\
    \ IP 地址。\n\n![图 4-10](img/394392_3_En_4_Fig10_HTML.jpg)\n\n**图 4-10**  \n安装 SQL\
    \ Server 故障转移集群 – 集群网络配置页面\n\n**服务器配置**页面有两个选项卡。第一个选项卡是 `服务账户`。在此选项卡上（如图 4-11\
    \ 所示），我们将指定用作每个 SQL Server 服务安全上下文的服务账户，并指定每个服务的启动模式。这一点值得注意，因为在安装独立实例时，通常会将每个服务设置为自动启动。然而，在安装集群时，应将集群感知服务配置为手动启动。这是因为它们将由集群服务管理。\n"
- fmt: '![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig11_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig11_HTML.jpg)

    **Figure 4-11** Install a SQL Server Failover Cluster – Service Accounts Tab


    ## Service Accounts Tab


    In recent versions of SQL Server, it is possible to enable `Perform Volume Maintenance
    Tasks` during setup, and this is implemented as a simple check box of the Service
    Accounts tab. The consideration here is security vs. performance. If you choose
    to perform volume maintenance tasks, then data files will not be zeroed out when
    they are created or expanded; however, an attacker with specialist software could
    potentially retrieve data that was previously stored on the allocated disk blocks.
    `Perform Volume Maintenance Tasks` does not apply to transaction log files.


    **Tip**


    For a full discussion on SQL Server security considerations, I recommend the Apress
    title *Securing SQL Server 2nd Edition: DBAs Defending the Database*, which can
    be purchased from [`www.apress.com/gb/book/9781484241608`](http://www.apress.com/gb/book/9781484241608).


    ## Collation Tab


    On the Collation tab, shown in Figure [4-12](#394392_3_En_4_Chapter.xhtml#Fig12),
    you can specify the collation that will be configured for the instance. Wherever
    possible, it is a good idea to use a consistent collation throughout the enterprise
    or, at a minimum, throughout the instances that make up a data-tier application.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig12_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig12_HTML.jpg)

    **Figure 4-12** Install a SQL Server Failover Cluster – Collation Tab


    ## Server Configuration Tab


    The Database Engine Configuration page consists of six tabs. The first of these
    is the Server Configuration tab, which is illustrated in Figure [4-13](#394392_3_En_4_Chapter.xhtml#Fig13).
    Here, we specify the authentication mode that the instance will use.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig13_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig13_HTML.jpg)

    **Figure 4-13** Install a SQL Server Failover Cluster – Server Configuration Tab


    `Windows Authentication Mode` means that the credentials that a user supplies
    when logging into Windows will be passed to SQL Server, and the user does not
    require any additional credentials to gain access to the instance. With `mixed
    mode`, although Windows credentials can still be used to access the instance,
    users can also be given second-tier credentials. If this option is selected, then
    SQL Server will hold its own login names and passwords for login created inside
    the instance, and users can supply these, in order to gain access, even if their
    Windows identity does not have permissions.


    For security best practice, it is a good idea to only allow Windows authentication
    to your instance. This is for two reasons. First, with Windows authentication
    only, if an attacker were to gain access to your network, then they would still
    not be able to access SQL Server, since they would not have a valid Windows account
    with the correct permissions. With mixed-mode authentication, however, once inside
    the network, attackers could use brute-force attacks or other hacking methodologies
    to attempt to gain access via a second-tier SQL Server Login. Second, if you specify
    mixed-mode authentication, then you are required to create an `SA` account. The
    `SA` account is a SQL Server user account that has administrative privileges over
    the instance. If the password for this account became compromised, then an attacker
    could gain administrative control over SQL Server. If mixed-mode authentication
    must be used, it is a good idea to disable the `SA` account.


    Mixed-mode authentication is a necessity in some cases, however. For example,
    you may have a legacy application that does not support Windows authentication,
    or a third-party application that has a hard-coded connection that uses second-tier
    authentication. These would be two valid reasons why mixed-mode authentication
    may be required. Another valid reason would be if you have users that need to
    access the instance from a nontrusted domain.


    Additionally, on the Server Configuration tab, you can specify Windows users that
    will be added to the `sysadmin` fixed server role, giving them unrestricted access
    to the instance. In our scenario, we will add the `AlwaysOn\SQLAdmin` user as
    an instance administrator and use Windows Authentication only.


    ## Data Directories Tab


    On the Data Directories tab, illustrated in Figure [4-14](#394392_3_En_4_Chapter.xhtml#Fig14),
    you can alter the default location of the data root directory. On this screen,
    you can also change the default location for user databases and their log files.
    Finally, this tab allows you to specify a default location for backups of databases
    that will be taken. In our scenario, we must ensure that the data root is pointing
    at the `Data` volume, with log files pointing at the `Logs` volume.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig14_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig14_HTML.jpg)

    **Figure 4-14** Install a SQL Server Failover Cluster – Data Directories Tab


    ## TempDB Tab


    The TempDB tab is shown in Figure [4-15](#394392_3_En_4_Chapter.xhtml#Fig15).
    This tab allows you to configure the properties of the `TempDB` database. This
    is important as `TempDB` requires the correct size and processor settings to avoid
    becoming a bottleneck for the instance. The settings will default to the recommended
    configuration, which is one file per processor core, to a maximum of eight. This
    is considered to be the best number of files to avoid contention on system pages,
    such as `GAM`, `SGAM`, and `PFS` pages. The correct size of `TempDB` should be
    estimated through a capacity planning exercise. We will configure `TempDB` to
    have an initial size of 60MB per file (240MB in total). We have also configured
    `TempDB` to reside on the `TempDB` volume. In our scenario, we will also be setting
    the file location to point at our `TempDB` volume.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig15_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig15_HTML.jpg)

    **Figure 4-15** Install a SQL Server Failover Cluster – TempDB Tab


    ## MaxDOP Tab


    The MaxDOP tab, shown in Figure [4-16](#394392_3_En_4_Chapter.xhtml#Fig16), allows
    you to configure the default `Maximum Degree of Parallelism` for queries run within
    the instance. The default value is calculated based on the number of cores available,
    to a maximum of eight. This can be overridden, if required, however. For example,
    for an instance hosting small databases with an `OLTP` (Online Transactional Processing)
    workload profile, where many small, simultaneous queries are running at the same
    time, it can sometimes be preferable to reduce the `MaxDOP` value.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig16_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig16_HTML.jpg)

    **Figure 4-16** Install a SQL Server Failover Cluster – MaxDOP Tab


    **Tip**


    Setting a `MaxDOP` of `0` allows all available processors to be used to process
    a query running with a parallel query plan.


    ## Memory Tab


    Figure [4-17](#394392_3_En_4_Chapter.xhtml#Fig17) illustrates the Memory tab.
    Here, you are able to specify if you would like to use the default configuration,
    for the minimum and maximum amount of memory that can be allocated to the instance;
    use the recommended values, calculated by the setup wizard; or specify your own
    values. To specify your own preferred values, choose the recommended option, enter
    your values, and check the **Click here to accept the recommended memory configurations
    for the SQL Server database engine** check box. This check box must also be used,
    if you wish to adhere to the setup program’s recommendations.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig17_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig17_HTML.jpg)

    **Figure 4-17** Install a SQL Server Failover Cluster – Memory Tab


