    \ resource group.\n\n![Figure 4-9](images/394392_3_En_4_Chapter/394392_3_En_4_Fig9_HTML.jpg)\n\
    \n**Figure 4-9**  \nInstall a SQL Server Failover Cluster Wizard – Cluster Disk\
    \ Selection Page\n\nOn the Cluster Network Configuration page (Figure 4-10), we\
