    ### Configuring SQL Server


    The first step in configuring AlwaysOn Availability Groups is enabling this feature
    on the SQL Server service. To enable the feature from the GUI, we open SQL Server
    Configuration Manager, drill through SQL Server Services, and select Properties
    from the context menu of the SQL Server service. When we do this, the service
    properties display and we navigate to the Always On Availability Groups tab, shown
    in Figure [5-1](#394392_3_En_5_Chapter.xhtml#Fig1).


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig1_HTML.jpg](images/394392_3_En_5_Chapter/394392_3_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The Always On Availability Groups Tab


    On this tab, we check the Enable AlwaysOn Availability Groups box and ensure that
    the cluster name displayed in the Windows Failover Cluster Name box is correct.
    We then need to restart the SQL Server service. Because AlwaysOn Availability
    Groups uses stand-alone instances, which are installed locally on each cluster
    node, as opposed to a failover clustered instance, which spans multiple nodes,
    we need to repeat these steps for each stand-alone instance hosted on the cluster.


    We can also use PowerShell to enable AlwaysOn Availability Groups. To do this,
    we use the PowerShell command in Listing [5-2](#394392_3_En_5_Chapter.xhtml#PC2).
    The script assumes that `CLUSTERNODE1` is the name of the server and that `PROD`
    is the name of the SQL Server instance.


    ```

    Enable-SqlAlwaysOn -Path SQLSERVER:\SQL\CLUSTERNODE1\PROD

    Listing 5-2

    Enabling AlwaysOn Availability Groups

    ```


    The next step is to take a full backup of all databases that will be part of the
    availability group. We will not be able to add them to an Availability Group until
    this has been done. In this chapter, we will be creating three separate availability
    groups. In the first example, however, we will be creating an Availability Group
    called `HR`, which will provide high availability for the HR database. Therefore,
    we need to back up the `HR` database. We do this by running the script in Listing
    [5-3](#394392_3_En_5_Chapter.xhtml#PC3).


    ```

    BACKUP DATABASE HR

    TO  DISK = N''C:\Backups\HR.bak''

    WITH NAME = N''HR-Full Database Backup'' ;

    GO

    Listing 5-3

    Backing Up the Databases

    ```'
