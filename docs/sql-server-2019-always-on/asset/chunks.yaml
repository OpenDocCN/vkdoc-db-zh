    column, across all replicas of the database, to determine where to start cleaning
    up records |

    | `secondary_log_seconds` | The number of seconds that the secondary replica is
    behind the primary replica |


    The script in Listing [10-5](#394392_3_En_10_Chapter.xhtml#PC5) demonstrates how
    to assess the health availability database, within the HR Availability Group.
    You will notice that we use the `DB_NAME()` function to return the name of the
    database and join the `sys.dm_hadr_database_replica_states` DMV to the `sys.availability_groups`
    and `sys.availability_replicas` catalog views to return the names of the Availability
    Groups and Replicas.


    ```

    SELECT

    DB_NAME(database_id)

    ,ag.name

    ,ar.replica_server_name

    ,is_primary_replica

    ,synchronization_state_desc

    ,synchronization_health_desc

    ,database_state_desc

    FROM sys.dm_hadr_database_replica_states drs

    INNER JOIN sys.availability_groups ag

    ON drs.group_id = ag.group_id

    INNER JOIN sys.availability_replicas ar

    ON drs.replica_id = ar.replica_id

    WHERE ag.name = ''HR'';

    Listing 10-5

    Assessing the State of an Availability Database

    ```'
