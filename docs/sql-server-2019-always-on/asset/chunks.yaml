- fmt: '## Three-Plus Node Configurations


    As previously mentioned, it is possible to have up to 64 nodes in a cluster. When
    you have three or more nodes, it is unlikely that you will want to have a single
    active node and two redundant nodes, due to the associated costs. Instead, you
    can choose to implement an N+1 or N+M configuration.


    In an N+1 configuration, you have multiple active nodes and a single passive node.
    If a failure occurs on any of the active nodes, they fail over to the passive
    node. The diagram in Figure [2-3](#394392_3_En_2_Chapter.xhtml#Fig3) depicts a
    three-node N+1 cluster.


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig3_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig3_HTML.jpg)


    **Figure 2-3** Three-Node N+1 Configuration


    In an N+1 configuration, in a multifailure scenario, multiple nodes may fail over
    to the passive node. For this reason, you must be very careful when you plan resources
    to ensure that the passive node is able to support multiple instances. However,
    you can mitigate this issue by using an N+M configuration.


    Whereas an N+1 configuration has multiple active nodes and a single passive node,
    an N+M cluster has multiple active nodes and multiple passive nodes, although
    there are usually fewer passive nodes than there are active nodes. The diagram
    in Figure [2-4](#394392_3_En_2_Chapter.xhtml#Fig4) shows a five-node N+M configuration.
    The diagram shows that Instance3 is configured to always fail over to one of the
    passive nodes, whereas Instance1 and Instance2 are configured to always fail over
    to the other passive node. This gives you the flexibility to control resources
    on the passive nodes, but you can also configure the cluster to allow any of the
    active nodes to fail over to either of the passive nodes, if this is a more appropriate
    design for your environment.


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig4_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig4_HTML.jpg)


    **Figure 2-4** Five-Node N+M Configuration


    ## Quorum


    So that automatic failover can occur, the cluster service needs to know if a node
    goes down. In order to achieve this, you must form a quorum. The definition of
    a quorum is "The minimum number of members required in order for business to be
    carried out." In terms of high availability, this means that each node within
    a cluster, and optionally a witness device (which may be a cluster disk, a file
    share that is external to the cluster or Azure BLOB storage), receives a vote.
    If more than half of the voting members are unable to communicate with a node,
    then the cluster service knows that it has gone down and any cluster-aware applications
    on the server fail over to another node. The reason that more than half of the
    voting members need to be unable to communicate with the node is to avoid a situation
    known as a `split brain`.


    To explain a split-brain scenario, imagine that you have three nodes in Data Center
    1 and three nodes in Data Center 2. Now imagine that you lose network connectivity
    between the two data centers, yet all six nodes remain online. The three nodes
    in Data Center 1 believe that all of the nodes in Data Center 2 are unavailable.
    Conversely, the nodes in Data Center 2 believe that the nodes in Data Center 1
    are unavailable. This leaves both sides (known as partitions) of the cluster thinking
    that they should take control. This can have unpredictable and undesirable consequences
    for any application that successfully connects to one or the other partition.
    The `Quorum = (Voting Members / 2) + 1` formula protects against this scenario.


    **Tip**

    If your cluster loses quorum, then you can force one partition online, by starting
    the cluster service using the `/fq` switch. If you are using Windows Server 2012
    R2 or higher, then the partition that you force online is considered the `authoritative
    partition`. This means that other partitions can automatically rejoin the cluster
    when connectivity is reestablished.


    Various quorum models are available and the most appropriate model depends on
    your environment. Table [2-1](#394392_3_En_2_Chapter.xhtml#Tab1) lists the models
    that you can utilize and details the most appropriate way to use them.


    **Table 2-1** Quorum Models


    | Quorum Model | Appropriate Usage |

    | --- | --- |

    | Node Majority | When you have an odd number of nodes in the cluster |

    | Node + Disk Witness Majority | When you have an even number of nodes in the
    cluster |

    | Node + File Share Witness Majority | When you have nodes split across multiple
    sites or when you have an even number of nodes and are required to avoid shared
    disks* |


    \* *Reasons for needing to avoid shared disks due to virtualization are discussed
    later in this chapter.*


    Although the default option is one node, one vote, it is possible to manually
    remove a node’s vote by changing the `NodeWeight` property to zero. This is useful
    if you have a `multi-subnet cluster` (a cluster in which the nodes are split across
    multiple sites). In this scenario, it is recommended that you use a file share
    witness in a third site. This helps you avoid a cluster outage as a result of
    network failure between data centers. If you have an odd number of nodes in the
    quorum, however, then adding a file share witness leaves you with an even number
    of votes, which is dangerous. Removing the vote from one of the nodes in the secondary
    data center eliminates this issue. From Windows Server 2019 onward, a file share
    witness can be any file share that supports SMB (Server Message Block) 2.0 or
    above. This includes USB keys attached to a network router, NAS (network-attached
    storage devices), and workgroup-joined computers running Windows.


    **Caution**

    A file share witness does not store a full copy of the quorum database. This means
    that a two-node cluster with a file share witness is vulnerable to a scenario
    known as `partition in time`. In this scenario, if one node fails while you are
    in the process of patching or altering the cluster service on the second node,
    then there is no up-to-date copy of the quorum database. This leaves you in a
    position in which you need to destroy and rebuild the cluster.


    Modern versions of Windows Server also support the concepts of Dynamic Quorum
    and Tie Breaker for 50% Node Split. When Dynamic Quorum is enabled, the cluster
    service automatically decides whether or not to give the quorum witness a vote,
    depending on the number of nodes in the cluster. If you have an even number of
    nodes, then it is assigned a vote. If you have an odd number of nodes, it is not
    assigned a vote. Tie Breaker for 50% Node Split expands on this concept. If you
    have an even number of nodes and a witness and the witness fails, then the cluster
    service automatically removes a vote from one random node within the cluster.
    This maintains an odd number of votes in the quorum and reduces the risk of a
    cluster going offline, due to a witness failure.


    **Tip**

    If your cluster is running in Windows Server 2016 or higher, with Datacenter Edition,
    then Storage Spaces Direct is supported. This allows high availability to be realized,
    using locally attached physical storage, with a software-defined storage layer
    on top. A full conversation around Storage Spaces Direct is beyond the scope of
    this book, but further details can be found at [`docs.microsoft.com/en-us/windows-server/storage/storage-spaces/storage-spaces-direct-overview`](http://docs.microsoft.com/en-us/windows-server/storage/storage-spaces/storage-spaces-direct-overview).'
