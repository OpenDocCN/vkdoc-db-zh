    如果你遇到一个通用错误，要求你确认存储帐户详细信息以及通过 HTTPS 的连接性，根据我的经验，最常见的原因是连接性问题。云见证要求从所有群集节点到 Azure
    存储帐户的 `Port 443` 端口必须开放。


    要配置一个节点的节点权重，你可以使用清单 3-4 中的脚本。


    ```

    Import-Module FailoverClusters

    (Get-ClusterNode CLUSTERNODE2).NodeWeight = 0

    清单 3-4

    设置节点权重

    ```


    要使用 PowerShell 配置云见证，请使用清单 3-5 中的脚本。


    提示


    请务必将帐户名称和访问密钥更改为与你自己的相匹配。


    ```

    Import-Module FailoverClusters

    Set-ClusterQuorum -CloudWitness -AccountName aoag3eds  -AccessKey +6lqzNKVpLnDZCrLA0Haz0W8VhoYdW2k==

    清单 3-5

    使用 PowerShell 配置云见证

    注意


    本书其余部分的示例均假设两个节点都拥有投票权，并且使用磁盘见证。


    ## 配置 MSDTC


    如果你的 SQL Server 实例使用分布式事务，或者你正在安装 SQL Server Integration Services (SSIS)，那么它依赖于
    `MSDTC`（Microsoft 分布式事务处理协调器）。如果你的实例将使用 `MSDTC`，那么你需要确保其配置正确。如果配置不当，安装将会成功，但依赖于它的事务可能会失败。


    在群集上安装时，SQL Server 会自动使用安装在同一角色中的 `MSDTC` 实例（如果存在的话）。如果不存在，则使用已映射到的 `MSDTC` 实例（如果已执行此映射）。如果没有映射，则使用群集的默认
    `MSDTC` 实例；如果连默认实例也没有，则使用本地计算机的 `MSDTC` 实例。


    许多 DBA 选择在 SQL Server 所在的同一角色中安装 `MSDTC`；然而，这引入了一个问题。如果 `MSDTC` 故障，它也可能导致 SQL
    Server 实例宕机。当然，群集会尝试在另一个节点上启动这两个应用程序，但这仍然会涉及停机时间，包括在新节点上恢复数据库所需的时间，这个时间长度是不确定的。因此，我建议将
    `MSDTC` 安装在一个单独的角色中。如果你这样做，SQL Server 实例仍然可以使用 `MSDTC`（因为它是群集的默认实例），并且消除了 `MSDTC`
    导致 SQL Server 中断的可能性。这比使用映射实例或本地计算机实例更可取，因为它避免了不必要的配置，并且当群集化的 SQL Server 实例使用
    `MSDTC` 时，该 `MSDTC` 实例也应进行群集化。


    要创建 `MSDTC` 角色，首先在 **故障转移群集管理器** 的 **角色** 上下文菜单中选择 **配置角色** 选项。这将调用 **高可用性向导**。在向导的
    **选择角色** 页面上，选择 **分布式事务处理协调器 (DTC)** 角色类型，如图 3-26 所示。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig26_HTML.jpg](img/394392_3_En_3_Fig26_HTML.jpg)


    图 3-26


    选择角色页面


    在 **客户端访问点** 页面（如图 3-27 所示），你需要为 `MSDTC` 输入一个虚拟名称和 IP 地址。在我们的示例中，我们将其命名为 `` `ALWAYSON-MSDTC-C`
    ``，并将 `` `10.0.0.21` `` 分配为 IP 地址。在多子网群集上，你需要为每个网络提供一个 IP 地址。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig27_HTML.jpg](img/394392_3_En_3_Fig27_HTML.jpg)


    图 3-27


    客户端访问点页面


    在向导的 **选择存储** 页面上，选择你计划用于存储 `MSDTC` 文件的群集磁盘，如图 3-28 所示。在我们的示例中，这是磁盘 4。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig28_HTML.jpg](img/394392_3_En_3_Fig28_HTML.jpg)


    图 3-28


    选择存储页面


    **确认** 页面显示了即将创建的角色的概述。


    或者，我们可以在 PowerShell 中创建此角色。清单 3-6 中的脚本首先使用 `` `Add-ClusterServerRole` `` cmdlet
    来创建角色。我们将用于角色的虚拟名称传递给 `` `-Name` `` 参数，要使用的群集磁盘名称传递给 `` `-Storage` `` 参数，角色的 IP
    地址传递给 `` `-StaticAddress` `` 参数。


    然后，我们使用 `` `Add-ClusterResource` `` cmdlet 来添加 DTC 资源。`` `-Name` `` 参数为资源命名，``
    `-ResourceType` `` 参数指定它是一个 DTC 资源。接着，我们需要创建角色内资源之间的依赖关系。使用 GUI 时我们不需要这样做，因为依赖关系是自动为我们创建的。资源依赖关系指定了其他资源所依赖的资源。一个资源失败会通过依赖链传播，并可能导致角色脱机。例如，在我们的
    `` `ALWAYSON-MSDTC-C` `` 角色中，如果磁盘或虚拟名称中的任何一个变得不可用，DTC 资源就会脱机。Windows Server 支持具有
    `` `AND` `` 和 `` `OR` `` 约束的多重依赖关系。正是 `` `OR` `` 约束使得多子网群集成为可能，因为一个资源可以依赖于 IP
    地址 A `` `OR` `` IP 地址 B。最后，我们需要使用 `` `Start-ClusterGroup` `` cmdlet 使角色联机。


    ```

    #创建角色

    Add-ClusterServerRole -Name ALWAYSON-MSDTC-C -Storage "Cluster Disk 3" -StaticAddress
    192.168.0.50

    #创建 DTC 资源

    Add-ClusterResource -Name MSDTC-ALWAYSON-MSDTC-C -ResourceType "Distributed Transaction
    Coordinator" -Group ALWAYSON-MSDTC-C

    #创建依赖关系

    Add-ClusterResourceDependency MSDTC-ALWAYSON-MSDTC-C ALWAYSON-MSDTC-C

    Add-ClusterResourceDependency MSDTC-ALWAYSON-MSDTC-C "Cluster Disk 3"

    #使角色联机

    Start-ClusterGroup ALWAYSON-MSDTC-C

    清单 3-6

    创建 MSDTC 角色

    ```

