- fmt: '# 配置 Azure 负载均衡器与可用性组


    ## 创建运行状况探测


    我们现在可以创建一个运行状况探测，它将执行到每个节点的连接性检查。导航到负载均衡器边栏选项卡中的“运行状况探测”选项卡（如图[7-16](#394392_3_En_7_Chapter.xhtml#Fig16)所示），即可进行此操作。在这里，我们需要为探测指定名称，并提供运行状况检查将用于连接到节点的协议和未使用的端口。然后，我们指定运行状况检查应运行的频率，以及导致节点被标记为不正常的并发失败次数。如果节点被标记为不正常，负载均衡器将不会向其发送任何请求。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig16_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig16_HTML.jpg)


    *图 7-16 添加运行状况探测*


    ## 配置负载均衡规则


    接下来，我们将通过使用负载均衡器边栏选项卡的“负载均衡器规则”选项卡上的“添加”按钮来配置新的负载均衡规则。在此边栏选项卡的第一部分（图[7-17](#394392_3_En_7_Chapter.xhtml#Fig17)），我们将指定规则的名称、负载均衡器应使用
    IPv4 还是 IPv6。前端 IP 地址是我们之前配置的负载均衡器的 IP 地址。HA 端口允许负载均衡后端池上的所有端口，但我们不想这样做，因此我们将保持该框未选中，并选择
    `TCP` 作为协议。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig17_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig17_HTML.jpg)


    *图 7-17 配置负载均衡规则（第 1 部分）*


    在此页面的第二部分，如图[7-18](#394392_3_En_7_Chapter.xhtml#Fig18)所示，我们将配置负载均衡器将侦听的端口，然后是后端池中的服务器将侦听的端口。在我们的案例中，两者都将是端口
    `1433`。我们将选择后端服务器池和刚刚创建的运行状况探测。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig18_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig18_HTML.jpg)


    *图 7-18 配置负载均衡器规则（第 2 部分）*


    会话持久性指定应如何处理来自客户端的连续请求。如果我们选择“客户端 IP”，则来自同一 IP 地址的连续请求将由同一服务器处理。如果我们选择“客户端 IP
    和协议”，则来自同一客户端的连续请求将由同一服务器处理，但前提是使用相同的协议进行连接。然而，对于可用性组，不需要会话持久性，因此我们将选择“无”。这表示来自同一客户端的连续请求可以由后端池中的任何服务器处理。


    空闲超时指示连接在没有客户端发送消息的情况下将保持打开状态的最短时间，我们将保持 `TCP` 重置为禁用状态。最后，我们将选择“浮动 IP”，它会更改 IP
    地址映射模式，允许多个侦听器，这是可用性组侦听器所必需的。


    您应重复此过程，为核心群集添加前端端口和负载均衡规则。


    ## 配置可用性组侦听器


    然后，我们将能够配置可用性组侦听器。我们将从群集管理器中执行此操作。从“销售角色”的上下文菜单中，依次选择“添加资源”和“客户端访问点”。这将显示“新建资源客户端访问点”向导。在此向导的第一页，提供客户端访问点的名称，并分配一个
    IP 地址。由于我们在不同的子网上创建了每个 VM，因此我们需要为每个子网提供一个 IP 地址，如图[7-19](#394392_3_En_7_Chapter.xhtml#Fig19)所示。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig19_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig19_HTML.jpg)


    *图 7-19 创建新的客户端访问点 – 客户端访问点页面*


    当我们转到向导的确认页面时，将验证我们的网络设置。确认页面显示了我们将要配置的内容摘要。


    创建客户端访问点后，我们应使用“可用性组”资源的“属性”对话框的“依赖项”选项卡（在角色的“资源”选项卡下的“其他资源”中显示），添加对客户端访问点的依赖关系，如图[7-20](#394392_3_En_7_Chapter.xhtml#Fig20)所示。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig20_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig20_HTML.jpg)


    *图 7-20 添加依赖项*


    您还应重复此过程，使客户端访问点依赖于 IP 地址资源。


    ## 使群集与 Azure 负载均衡器协同工作


    接下来，我们需要配置群集以与 Azure 负载均衡器协同工作。我们可以使用清单[7-2](#394392_3_En_7_Chapter.xhtml#PC2)中的脚本来完成此操作。此脚本使用负载均衡器
    IP 和运行状况探测端口更新每个 IP 地址资源。


    > **注意**

    >

    > 在运行脚本之前，请务必更新脚本以匹配您自己的配置。


    ```

    $ClusterNetworkName = ''AlwaysOnAzure''

    $LoadBalancerIP = ''10.0.10.10''

    [int]$LoadBalancerProbePort = 50001

    Get-ClusterResource ''IP Address 10.0.0.35'' | Set-ClusterParameter -Multiple
    @{"Address"="$LoadBalancerIP";"ProbePort"=$LoadBalancerProbePort;"SubnetMask"="255.255.255.0";"Network"="$ClusterNetworkName";"EnableDhcp"=0}

    Get-ClusterResource ''IP Address 10.0.0.35'' | Set-ClusterParameter -Multiple
    @{"Address"="$LoadBalancerIP";"ProbePort"=$LoadBalancerProbePort;"SubnetMask"="255.255.255.0";"Network"="$ClusterNetworkName";"EnableDhcp"=0}

    ```


    *清单 7-2 使群集与负载均衡器集成*


    > **提示**

    >

    > 创建客户端访问点后，可用性组侦听器将被添加到可用性组中，默认端口为 `1433`。如果您计划使用不同的端口，可以在 `SQL Server Management
    Studio` 中的侦听器中更新此设置。'
  raw: 'We can now create a Health Probe, which will perform connectivity checks to
    each node. We can do this by navigating to the Health Probes tab on the Load Balancer’s
    blade, shown in Figure [7-16](#394392_3_En_7_Chapter.xhtml#Fig16). Here, we are
    specifying a name for the probe and providing a protocol and unused port that
    the health check will use to connect to the nodes. We then specify how frequently
    the health check should run and how many concurrent failures result in a node
    as being marked unhealthy. If a node is marked as unhealthy, the Load Balancer
    will not send it any requests.


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig16_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Add a Health Probe


    Next, we will configure a new load balancing rule by using the Add button on the
    Load Balancer Rules tab of the Load Balancer blade. In the first section of this
    blade (Figure [7-17](#394392_3_En_7_Chapter.xhtml#Fig17)), we will specify a name
    for the rule, whether the Load Balancer should use IPv4 or IPv6\. The Frontend
    IP address is the IP Address of the Load Balancer that we configured earlier.
    HA ports allow all ports on the backend pool to be load balanced, but we don’t
    want to do this, so we will leave the box unchecked and select TCP as the protocol.


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig17_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig17_HTML.jpg)


    Figure 7-17


    Configure a Load Balancing Rule (Part 1)


    In the second section of this page, shown in Figure [7-18](#394392_3_En_7_Chapter.xhtml#Fig18),
    we will configure the port that the Load Balancer will be listening on, followed
    by the port that the servers in the backend pool will be listening on. In our
    case, this will be port 1433 for both. We will choose the backend pool of servers
    and the health probe that we just created.


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig18_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig18_HTML.jpg)


    Figure 7-18


    Configure a Load Balancer Rule (Part 2)


    Session persistence specifies how successive requests from clients should be handled.
    If we select Client IP, then successive requests from the same IP address will
    be handled by the same server. If we choose Client IP and protocol, then successive
    requests from the same client will be handled by the same server, but only if
    the same protocol is used to connect. For Availability Groups, however, session
    persistence is not required, so we will choose None. This indicates that successive
    requests by the same client can be handled by any server in the backend pool.


    The Idle Timeout indicates the minimum length of time that a connection will be
    kept open, without clients sending messages, and we will leave TCP reset disabled.
    Finally, we will select Floating IP, which changes the IP address mapping schema,
    allowing for multiple listeners, which is required for the Availability Group
    Listener.


    You should repeat this process to add a frontend port and load balancing rule
    for the core Cluster.


    We will then be in a position where we can configure our Availability Group Listener.
    We will do this from within the Cluster Manager. From the context menu of the
    Sales Role, drill through Add Resource and choose Client Access Point. This will
    cause the New Resource Client Access Point wizard to be displayed. On the first
    page of this wizard, provide a name for the Client Access Point, and assign an
    IP Address. Because we created each VM on a different subnet, we will need to
    provide an IP Address for each subnet, as shown in Figure [7-19](#394392_3_En_7_Chapter.xhtml#Fig19).


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig19_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig19_HTML.jpg)


    Figure 7-19


    Create New Client Access Point – Client Access Point Page


    When we move to the confirmation page of the wizard, our network settings will
    be validated. The Confirmation page displays a summary of what we are going to
    configure.


    Once the Client Access Point has been created, we should use the Dependencies
    tab of Properties dialog box, of the Availability Group resource (shown under
    Other Resources in the Resource tab of the role) to add a dependency on the Client
    Access Point, as shown in Figure [7-20](#394392_3_En_7_Chapter.xhtml#Fig20).


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig20_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig20_HTML.jpg)


    Figure 7-20


    Add a Dependency


    You should also repeat this process to make the Client Access Point dependent
    on the IP Address resources.


    Next, we need to configure the Cluster to work with the Azure Load Balancer. We
    can do that using the script in Listing [7-2](#394392_3_En_7_Chapter.xhtml#PC2).
    This script updates each of the IP Address resources, with the Load Balancer IP
    and health probe port.


    Note


    Be sure to update the script to match your own configuration before running it.


    ```

    $ClusterNetworkName = ''AlwaysOnAzure''

    $LoadBalancerIP = ''10.0.10.10''

    [int]$LoadBalancerProbePort = 50001

    Get-ClusterResource ''IP Address 10.0.0.35'' | Set-ClusterParameter -Multiple
    @{"Address"="$LoadBalancerIP";"ProbePort"=$LoadBalancerProbePort;"SubnetMask"="255.255.255.0";"Network"="$ClusterNetworkName";"EnableDhcp"=0}

    Get-ClusterResource ''IP Address 10.0.0.35'' | Set-ClusterParameter -Multiple
    @{"Address"="$LoadBalancerIP";"ProbePort"=$LoadBalancerProbePort;"SubnetMask"="255.255.255.0";"Network"="$ClusterNetworkName";"EnableDhcp"=0}

    Listing 7-2

    Integrate the Cluster with the Load Balancer

    ```


    Tip


    After creating the Client Access Point, an Availability Group Listener will have
    been added to the Availability Group, with a default port of 1433\. If you plan
    to use a different port, this can be updated in the Listener, in SQL Server Management
    Studio.'
  trans: '

    # 配置 Azure 负载均衡器与可用性组


    ## 创建运行状况探测


    我们现在可以创建一个运行状况探测，它将执行到每个节点的连接性检查。导航到负载均衡器边栏选项卡中的“运行状况探测”选项卡（如图 7-16 所示），即可进行此操作。在这里，我们需要为探测指定名称，并提供运行状况检查将用于连接到节点的协议和未使用的端口。然后，我们指定运行状况检查应运行的频率，以及导致节点被标记为不正常的并发失败次数。如果节点被标记为不正常，负载均衡器将不会向其发送任何请求。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig16_HTML.jpg](img/394392_3_En_7_Fig16_HTML.jpg)


    *图 7-16 添加运行状况探测*


    ## 配置负载均衡规则


    接下来，我们将通过使用负载均衡器边栏选项卡的“负载均衡器规则”选项卡上的“添加”按钮来配置新的负载均衡规则。在此边栏选项卡的第一部分（图 7-17），我们将指定规则的名称、负载均衡器应使用
    IPv4 还是 IPv6。前端 IP 地址是我们之前配置的负载均衡器的 IP 地址。HA 端口允许负载均衡后端池上的所有端口，但我们不想这样做，因此我们将保持该框未选中，并选择
    `TCP` 作为协议。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig17_HTML.jpg](img/394392_3_En_7_Fig17_HTML.jpg)


    *图 7-17 配置负载均衡规则（第 1 部分）*


    在此页面的第二部分，如图 7-18 所示，我们将配置负载均衡器将侦听的端口，然后是后端池中的服务器将侦听的端口。在我们的案例中，两者都将是端口 `1433`。我们将选择后端服务器池和刚刚创建的运行状况探测。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig18_HTML.jpg](img/394392_3_En_7_Fig18_HTML.jpg)


    *图 7-18 配置负载均衡器规则（第 2 部分）*


    会话持久性指定应如何处理来自客户端的连续请求。如果我们选择“客户端 IP”，则来自同一 IP 地址的连续请求将由同一服务器处理。如果我们选择“客户端 IP
    和协议”，则来自同一客户端的连续请求将由同一服务器处理，但前提是使用相同的协议进行连接。然而，对于可用性组，不需要会话持久性，因此我们将选择“无”。这表示来自同一客户端的连续请求可以由后端池中的任何服务器处理。


    空闲超时指示连接在没有客户端发送消息的情况下将保持打开状态的最短时间，我们将保持 `TCP` 重置为禁用状态。最后，我们将选择“浮动 IP”，它会更改 IP
    地址映射模式，允许多个侦听器，这是可用性组侦听器所必需的。


    您应重复此过程，为核心群集添加前端端口和负载均衡规则。


    ## 配置可用性组侦听器


    然后，我们将能够配置可用性组侦听器。我们将从群集管理器中执行此操作。从“销售角色”的上下文菜单中，依次选择“添加资源”和“客户端访问点”。这将显示“新建资源客户端访问点”向导。在此向导的第一页，提供客户端访问点的名称，并分配一个
    IP 地址。由于我们在不同的子网上创建了每个 VM，因此我们需要为每个子网提供一个 IP 地址，如图 7-19 所示。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig19_HTML.jpg](img/394392_3_En_7_Fig19_HTML.jpg)


    *图 7-19 创建新的客户端访问点 – 客户端访问点页面*


    当我们转到向导的确认页面时，将验证我们的网络设置。确认页面显示了我们将要配置的内容摘要。


    创建客户端访问点后，我们应使用“可用性组”资源的“属性”对话框的“依赖项”选项卡（在角色的“资源”选项卡下的“其他资源”中显示），添加对客户端访问点的依赖关系，如图
    7-20 所示。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig20_HTML.jpg](img/394392_3_En_7_Fig20_HTML.jpg)


    *图 7-20 添加依赖项*


    您还应重复此过程，使客户端访问点依赖于 IP 地址资源。


    ## 使群集与 Azure 负载均衡器协同工作


    接下来，我们需要配置群集以与 Azure 负载均衡器协同工作。我们可以使用清单 7-2 中的脚本来完成此操作。此脚本使用负载均衡器 IP 和运行状况探测端口更新每个
    IP 地址资源。


    > **注意**

    >

    > 在运行脚本之前，请务必更新脚本以匹配您自己的配置。


    ```

    $ClusterNetworkName = ''AlwaysOnAzure''

    $LoadBalancerIP = ''10.0.10.10''

    [int]$LoadBalancerProbePort = 50001

    Get-ClusterResource ''IP Address 10.0.0.35'' | Set-ClusterParameter -Multiple
    @{"Address"="$LoadBalancerIP";"ProbePort"=$LoadBalancerProbePort;"SubnetMask"="255.255.255.0";"Network"="$ClusterNetworkName";"EnableDhcp"=0}

    Get-ClusterResource ''IP Address 10.0.0.35'' | Set-ClusterParameter -Multiple
    @{"Address"="$LoadBalancerIP";"ProbePort"=$LoadBalancerProbePort;"SubnetMask"="255.255.255.0";"Network"="$ClusterNetworkName";"EnableDhcp"=0}

    ```


    *清单 7-2 使群集与负载均衡器集成*


    > **提示**

    >

    > 创建客户端访问点后，可用性组侦听器将被添加到可用性组中，默认端口为 `1433`。如果您计划使用不同的端口，可以在 `SQL Server Management
    Studio` 中的侦听器中更新此设置。

    '
- fmt: '## Clusterless Availability Groups


    Clusterless Availability Groups appeared in SQL Server 2017, as a by-product of
    Linux support, but can also prove valuable to SQL Server DBAs supporting instances
    on Windows environments.


    A clusterless implementation is not suitable for high availability scenarios.
    This is for several reasons. Firstly, because there is no cluster, there are no
    health checks. This means that there is no way to automatically arbitrate a failover.
    Secondly, although it is possible to use synchronous commit between the replicas,
    to failover without data loss, you will need to prepare the failover by taking
    the Availability Group offline on the primary Replica. This means that there will
    be an outage during failover. Finally, because there is no cluster, it is not
    possible to have a Listener. This means that applications connecting to the primary
    Replica will need to flip connection strings to point at the secondary Replica
    in the event of failover.


    **Tip**

    It is possible to create a C-NAME record in DNS that points to the Primary replica.
    You can then update the C-NAME record to point to the secondary replica at point
    of failover. While this is a manual process, usually involving teams external
    to the DBA function, it can avoid the need for a client to change its connection
    string.


    Clusterless Availability Groups have most benefit in read-scale scenarios. For
    this reason, they are also known as Read-scale Availability Groups. Imagine a
    scenario where you have a SQL Server workload with a high read throughput, from
    multiple applications, but no HA requirement. You can remove the complexity of
    clustering while still keeping your databases synchronized. Some client applications
    can be configured to point to the primary Replica, while other client applications
    can be configured to point at secondary Replicas.


    In this section, we will work on a scenario where we have two servers called `Prod`
    and `ReadScale`. Each server has a default instance of SQL Server 2019 Enterprise
    Edition installed. Both servers are in Site 1 and are both members of the `AlwaysOn.com`
    domain, but there is no cluster. We will configure an Availability Group to provide
    read-scaling for the `Customers` database, which is accessed by two applications,
    but one of the applications only performs read-only operations.


    ### Preparing the Instances


    As with all Availability Group scenarios, there are preparation tasks that we
    need to work through before configuring the Availability Group. The following
    sections describe how to prepare the instances.


    #### Enable Availability Groups


    As always, the first step in preparing an instance for Availability Groups is
    to enable Availability Groups on the database engine service. We can perform this
    task with PowerShell or SQL Server Configuration Manager, as demonstrated in Chapter
    [5](#394392_3_En_5_Chapter.xhtml). In this instance, we will use Configuration
    Manager, as shown in Figure [7-21](#394392_3_En_7_Chapter.xhtml#Fig21). You will
    notice that because there is no underlying cluster, the dialog box informs us
    of this, rather than displaying the underlying cluster name. This task needs to
    be performed on all instances that will participate in the Availability Group.


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig21_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig21_HTML.jpg)


    Figure 7-21


    Enable Availability Groups


    After enabling Availability Groups, the service needs to be restated for the change
    to take effect.


    #### Create the Customers Database


    The aim in this scenario is to provide read-scaling for the `Customers` database.
    Therefore, we can create the `Customers` database by using the script in Listing
    [7-3](#394392_3_En_7_Chapter.xhtml#PC3).


    ```sql

    --Create Customers Database

    CREATE DATABASE Customers ;

    GO

    USE Customers ;

    GO

    CREATE TABLE dbo.Customers

    (

    ID                INT                PRIMARY KEY        IDENTITY,

    FirstName         NVARCHAR(30),

    LastName          NVARCHAR(30),

    CreditCardNumber  VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName         VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'')

    INSERT INTO Customers(Firstname, LastName, CreditCardNumber)

    SELECT

    FirstName

    , LastName

    , CreditCardNumber

    FROM (

    SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    , (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    , (SELECT TOP 1 CONVERT(VARBINARY(8000), (

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()

    ) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()

    ) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()

    ) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID())))

    FROM @Numbers a

    ) CreditCardNumber) d

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c;

    --SET FULL recovery mode on the database - required for Availability Groups

    ALTER DATABASE Customers SET RECOVERY FULL ;

    GO

    Listing 7-3

    Create the Customers Database

    ```


    We also need to take a full backup of the database before it can be added to an
    Availability Group. We can achieve this using the script in Listing [7-4](#394392_3_En_7_Chapter.xhtml#PC4).


    ```sql

    --Back Up Customers Database

    BACKUP DATABASE Customers

    TO  DISK = ''C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\Backup\Customers.bak''

    WITH NAME = ''Customers-Full Database Backup'' ;

    GO

    Listing 7-4

    Back Up the Customers Database

    ```


    #### Create Logins


    Data synchronization will be performed by the service account(s) that are running
    the database engine services. Therefore, the service account(s) will require logins
    on all of the instances that will become Replicas in the Availability Group. In
    our scenario, both of the instance are running under the `ALWAYSON\SqlServiceAccount`
    domain account. Therefore, running the script in Listing [7-5](#394392_3_En_7_Chapter.xhtml#PC5)
    on all participating instances will create the required logins.


    ```sql

    CREATE LOGIN [ALWAYSON\SQLServiceAccount]

    FROM WINDOWS ;

    GO

    Listing 7-5

    Create the Logins

    ```


    **Tip**

    If the servers were not members of the domain, then we could configure authentication
    using SQL logins and certificates.'
