    ## Installing a SQL Server Failover Clustered Instance with FILESTREAM


    The `FILESTREAM` tab of the Database Engine Configuration page allows you to enable
    and configure the level of access for SQL Server `FILESTREAM` functionality, as
    illustrated in Figure 4-18. `FILESTREAM` must also be enabled if you wish to use
    the `FileTable` feature of SQL Server. `FILESTREAM` and `FileTable` provide the
    ability to store data in an unstructured manner within the Windows folder structure,
    while retaining the ability to manage and interrogate this data from SQL Server.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig18_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig18_HTML.jpg)


    *Figure 4-18: Install a SQL Server Failover Clustered Instance – FILESTREAM Tab*


    After the Feature Configuration Rules have been checked, the Ready to Install
    page of the wizard will be displayed. This page of the wizard provides a summary
    of actions that will be performed by the setup utility. Selecting `Install` on
    this page will cause the instance installation to begin. After installation is
    complete, the `Complete` page should be reviewed.


    ## Installing the Instance with PowerShell


    Of course, we can use PowerShell to install the AlwaysOn failover cluster instance
    instead of using the GUI. To install an AlwaysOn failover cluster instance from
    PowerShell, we can use SQL Server’s `setup.exe` application with the `InstallFailoverCluster`
    action specified.


    When you perform a command-line installation of a clustered instance, you need
    the parameters in Table 4-1, in addition to the parameters that are mandatory
    when you install a stand-alone instance of SQL Server.


    *Table 4-1: Required Parameters for the Installation of a Clustered Instance*


    | Parameter | Usage |

    | --- | --- |

    | `/FAILOVERCLUSTERIPADDRESSES` | Specifies the IP address(s) to use for the instance
    in the format `<IP Type>;<address>;<network name>;<subnet mask>.` For multi-subnet
    clusters, the IP addresses are space delimited. |

    | `/FAILOVERCLUSTERNETWORKNAME` | The virtual name of the clustered instance.
    |

    | `/INSTALLSQLDATADIR` | The folder in which to place SQL Server data files. This
    must be a cluster disk. |


    The script in Listing 4-1 performs the same installation that has just been demonstrated
    when you run it from the root directory of the installation media.


    ```

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="InstallFailoverCluster" /FEATURES=SQL,IS  /INSTANCENAME="MSSQLSERVER"
    /SQLSVCACCOUNT="ALWAYSON\SQLServiceAccount" /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="ALWAYSON\SQLServiceAccount"
    /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="ALWAYSO\SQLAdmin" /SQLMAXDOP="1"
    /FAILOVERCLUSTERIPADDRESSES="IPv4;10.0.0.9;Cluster Network 2;255.255.255.0" /FAILOVERCLUSTERDISKS="Cluster
    Disk 1" "Cluster Disk 2" "Cluster Disk 3" /FAILOVERCLUSTERNETWORKNAME="ALWAYSON-SQL-C"
    /INSTALLSQLDATADIR="F:\" /SQLUSERDBLOGDIR="L:\MSSQL15.MSSQLSERVER\MSSQL\Logs"
    /SQLTEMPDBDIR="T:\MSSQL15.MSSQLSERVER\MSSQL\TempDB" /SQLTEMPDBLOGDIR="T:\MSSQL15.MSSQLSERVER\MSSQL\TempDB"
    /SQLMAXMEMORY="2048" /SQLMINMEMORY="1024" /qs

    ```

    *Listing 4-1: Installing an AlwaysOn Failover Cluster Instance with PowerShell*


    ## Adding a Node


    The next step you should take when installing the cluster is to add the second
    node. Failure to add the second node results in the instance staying online, but
    with no high availability, since the second node is unable to take ownership of
    the role. To configure the second node, you need to log in to the passive cluster
    node and select the `Add Node to SQL Server Failover Cluster` option from the
    Installation tab of SQL Server Installation Center. This invokes the `Add a Failover
    Cluster Node Wizard`. The first page of this wizard is the `Product Key` page.
    Just like when you install an instance, you need to use this screen to provide
    the product key for SQL Server. Not specifying a product key only leaves you the
    option of installing the `Evaluation Edition`, and since this expires after 180
    days, it’s probably not the wisest choice for high availability.


    The following `License Terms` page of the wizard asks you to read and accept the
    license terms of SQL Server. Additionally, you need to specify if you wish to
    participate in Microsoft’s `Customer Experience Improvement Program`. If you select
    this option, then error reporting is captured and sent to Microsoft.


    After you accept the license terms, a rules check runs to ensure that all of the
    conditions are met so you can continue with the installation. After the wizard
    checks for Microsoft updates and installing the setup files required for installation,
    another rules check is carried out to ensure that the rules for adding the node
    to the cluster are met.


    On the `Cluster Node Configuration` page, illustrated in Figure 4-19, you are
    asked to confirm the instance name to which you are adding a node. If you have
    multiple instances on the cluster, then you can use the drop-down box to select
    the appropriate instance.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig19_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig19_HTML.jpg)


    *Figure 4-19: Add a Failover Cluster Node Wizard – Cluster Node Configuration
    Page*


    On the `Cluster Network Configuration` page, shown in Figure 4-20, you confirm
    the network details. These should be identical to the first node in the cluster,
    including the same IP address, since this is, of course, shared between the two
    nodes.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig20_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig20_HTML.jpg)


    *Figure 4-20: The Cluster Network Configuration Page*


    On the `Service Accounts` page of the wizard, most of the information is in read-only
    mode and you are not able to modify it. This is because the service accounts you
    use must be the same for each node of the cluster. You need to reenter the service
    account passwords, however. This page is shown in Figure 4-21.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig21_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig21_HTML.jpg)


    *Figure 4-21: The Service Accounts Page*


    Now that the wizard has all of the required information, an additional rules check
    is carried out before the summary page displays. The summary page, known as the
    `Ready to Add Node` page, provides a summary of the activities that take place
    during the installation.'
  raw: 'A full discussion of approaches for MaxDOP and Memory configuration can be
    found in the Apress title *Pro SQL Server 2019 Administration*, which can be purchased
    at [`www.apress.com/gb/book/9781484250884#otherversion=9781484250891`](http://www.apress.com/gb/book/9781484250884%2523otherversion%253D9781484250891).


    The FILESTREAM tab of the Database Engine Configuration page allows you to enable
    and configure the level of access for SQL Server FILESTREAM functionality, as
    illustrated in Figure [4-18](#394392_3_En_4_Chapter.xhtml#Fig18). FILESTREAM must
    also be enabled if you wish to use the FileTable feature of SQL Server. FILESTREAM
    and FileTable provide the ability to store data in an unstructured manner within
    the Windows folder structure, while retaining the ability to manage and interrogate
    this data from SQL Server.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig18_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Install a SQL Server Failover Clustered Instance – FILESTREAM Tab


    After the Feature Configuration Rules have been checked, the Ready to Install
    page of the wizard will be displayed. This page of the wizard provides a summary
    of actions that will be performed by the setup utility. Selecting Install on this
    page will cause the instance installation to begin. After installation is complete,
    the Complete page should be reviewed.


    ## Installing the Instance with PowerShell


    Of course, we can use PowerShell to install the AlwaysOn failover cluster instance
    instead of using the GUI. To install an AlwaysOn failover cluster instance from
    PowerShell, we can use SQL Server’s `setup.exe` application with the `InstallFailoverCluster`
    action specified.


    When you perform a command-line installation of a clustered instance, you need
    the parameters in Table [4-1](#394392_3_En_4_Chapter.xhtml#Tab1), in addition
    to the parameters that are mandatory when you install a stand-alone instance of
    SQL Server.


    Table 4-1


    Required Parameters for the Installation of a Clustered Instance


    | Parameter | Usage |

    | --- | --- |

    | `/FAILOVERCLUSTERIPADDRESSES` | Specifies the IP address(s) to use for the instance
    in the format *<IP Type>;<address>;<network name>;<subnet mask>.* For multi-subnet
    clusters, the IP addresses are space delimited. |

    | `/FAILOVERCLUSTERNETWORKNAME` | The virtual name of the clustered instance.
    |

    | `/INSTALLSQLDATADIR` | The folder in which to place SQL Server data files. This
    must be a cluster disk. |


    The script in Listing [4-1](#394392_3_En_4_Chapter.xhtml#PC1) performs the same
    installation that has just been demonstrated when you run it from the root directory
    of the installation media.


    ```

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="InstallFailoverCluster" /FEATURES=SQL,IS  /INSTANCENAME="MSSQLSERVER"
    /SQLSVCACCOUNT="ALWAYSON\SQLServiceAccount" /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="ALWAYSON\SQLServiceAccount"
    /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="ALWAYSO\SQLAdmin" /SQLMAXDOP="1"
    /FAILOVERCLUSTERIPADDRESSES="IPv4;10.0.0.9;Cluster Network 2;255.255.255.0" /FAILOVERCLUSTERDISKS="Cluster
    Disk 1" "Cluster Disk 2" "Cluster Disk 3" /FAILOVERCLUSTERNETWORKNAME="ALWAYSON-SQL-C"
    /INSTALLSQLDATADIR="F:\" /SQLUSERDBLOGDIR="L:\MSSQL15.MSSQLSERVER\MSSQL\Logs"
    /SQLTEMPDBDIR="T:\MSSQL15.MSSQLSERVER\MSSQL\TempDB" /SQLTEMPDBLOGDIR="T:\MSSQL15.MSSQLSERVER\MSSQL\TempDB"
    /SQLMAXMEMORY="2048" /SQLMINMEMORY="1024" /qs

    Listing 4-1

    Installing an AlwaysOn Failover Cluster Instance with PowerShell

    ```


    ## Adding a Node


    The next step you should take when installing the cluster is to add the second
    node. Failure to add the second node results in the instance staying online, but
    with no high availability, since the second node is unable to take ownership of
    the role. To configure the second node, you need to log in to the passive cluster
    node and select the Add Node to SQL Server Failover Cluster option from the Installation
    tab of SQL Server Installation Center. This invokes the Add a Failover Cluster
    Node Wizard. The first page of this wizard is the Product Key page. Just like
    when you install an instance, you need to use this screen to provide the product
    key for SQL Server. Not specifying a product key only leaves you the option of
    installing the Evaluation Edition, and since this expires after 180 days, it’s
    probably not the wisest choice for high availability.


    The following License Terms page of the wizard asks you to read and accept the
    license terms of SQL Server. Additionally, you need to specify if you wish to
    participate in Microsoft’s Customer Experience Improvement Program. If you select
    this option, then error reporting is captured and sent to Microsoft.


    After you accept the license terms, a rules check runs to ensure that all of the
    conditions are met so you can continue with the installation. After the wizard
    checks for Microsoft updates and installing the setup files required for installation,
    another rules check is carried out to ensure that the rules for adding the node
    to the cluster are met.


    On the Cluster Node Configuration page, illustrated in Figure [4-19](#394392_3_En_4_Chapter.xhtml#Fig19),
    you are asked to confirm the instance name to which you are adding a node. If
    you have multiple instances on the cluster, then you can use the drop-down box
    to select the appropriate instance.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig19_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig19_HTML.jpg)


    Figure 4-19


    Add a Failover Cluster Node Wizard – Cluster Node Configuration Page


    On the Cluster Network Configuration page, shown in Figure [4-20](#394392_3_En_4_Chapter.xhtml#Fig20),
    you confirm the network details. These should be identical to the first node in
    the cluster, including the same IP address, since this is, of course, shared between
    the two nodes.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig20_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig20_HTML.jpg)


    Figure 4-20


    The Cluster Network Configuration Page


    On the Service Accounts page of the wizard, most of the information is in read-only
    mode and you are not able to modify it. This is because the service accounts you
    use must be the same for each node of the cluster. You need to reenter the service
    account passwords, however. This page is shown in Figure [4-21](#394392_3_En_4_Chapter.xhtml#Fig21).


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig21_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig21_HTML.jpg)


    Figure 4-21


    The Service Accounts Page


    Now that the wizard has all of the required information, an additional rules check
    is carried out before the summary page displays. The summary page, known as the
    Ready to Add Node page, provides a summary of the activities that take place during
    the installation.'
  trans: '

    关于 `MaxDOP` 和 `Memory` 配置方法的完整讨论，可以参考 Apress 出版的书籍 *《SQL Server 2019 高级管理实战》*，该书可在
    [`www.apress.com/gb/book/9781484250884#otherversion=9781484250891`](http://www.apress.com/gb/book/9781484250884%2523otherversion%253D9781484250891)
    购买。


    ## 安装带有 FILESTREAM 的 SQL Server 故障转移集群实例


    数据库引擎配置页面上的 `FILESTREAM` 选项卡允许您启用和配置 SQL Server `FILESTREAM` 功能的访问级别，如图 4-18 所示。如果您希望使用
    SQL Server 的 `FileTable` 功能，则也必须启用 `FILESTREAM`。`FILESTREAM` 和 `FileTable` 提供了在
    Windows 文件夹结构中以非结构化方式存储数据的能力，同时保留从 SQL Server 管理和查询此数据的功能。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig18_HTML.jpg](img/394392_3_En_4_Fig18_HTML.jpg)


    *图 4-18：安装 SQL Server 故障转移集群实例 - FILESTREAM 选项卡*


    在检查完“功能配置规则”后，向导的“准备安装”页面将会显示。向导的此页面提供了安装程序将执行的操作摘要。在此页面上选择“安装”将开始实例的安装。安装完成后，应查看“完成”页面。


    ## 使用 PowerShell 安装实例


    当然，我们可以使用 PowerShell 来安装 AlwaysOn 故障转移集群实例，而不是使用 GUI。要从 PowerShell 安装 AlwaysOn
    故障转移集群实例，我们可以使用 SQL Server 的 `setup.exe` 应用程序并指定 `InstallFailoverCluster` 操作。


    执行集群实例的命令行安装时，除了安装独立 SQL Server 实例时必需的参数外，还需要表 4-1 中的参数。


    *表 4-1：安装集群实例所需的参数*


    | 参数 | 用法 |

    | --- | --- |

    | `/FAILOVERCLUSTERIPADDRESSES` | 指定实例使用的 IP 地址，格式为 `<IP 类型>;<地址>;<网络名称>;<子网掩码>`。对于多子网集群，IP
    地址以空格分隔。 |

    | `/FAILOVERCLUSTERNETWORKNAME` | 集群实例的虚拟名称。 |

    | `/INSTALLSQLDATADIR` | 放置 SQL Server 数据文件的文件夹。这必须是集群磁盘。 |


    清单 4-1 中的脚本执行与刚才演示的相同安装，当您从安装介质的根目录运行它时。


    ```

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="InstallFailoverCluster" /FEATURES=SQL,IS  /INSTANCENAME="MSSQLSERVER"
    /SQLSVCACCOUNT="ALWAYSON\SQLServiceAccount" /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="ALWAYSON\SQLServiceAccount"
    /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="ALWAYSO\SQLAdmin" /SQLMAXDOP="1"
    /FAILOVERCLUSTERIPADDRESSES="IPv4;10.0.0.9;Cluster Network 2;255.255.255.0" /FAILOVERCLUSTERDISKS="Cluster
    Disk 1" "Cluster Disk 2" "Cluster Disk 3" /FAILOVERCLUSTERNETWORKNAME="ALWAYSON-SQL-C"
    /INSTALLSQLDATADIR="F:\" /SQLUSERDBLOGDIR="L:\MSSQL15.MSSQLSERVER\MSSQL\Logs"
    /SQLTEMPDBDIR="T:\MSSQL15.MSSQLSERVER\MSSQL\TempDB" /SQLTEMPDBLOGDIR="T:\MSSQL15.MSSQLSERVER\MSSQL\TempDB"
    /SQLMAXMEMORY="2048" /SQLMINMEMORY="1024" /qs

    ```

    *清单 4-1：使用 PowerShell 安装 AlwaysOn 故障转移集群实例*


    ## 添加节点


    安装集群时，您应该采取的下一步是添加第二个节点。未能添加第二个节点会导致实例保持在线，但没有高可用性，因为第二个节点无法接管角色所有权。要配置第二个节点，您需要登录到被动集群节点，并从
    SQL Server 安装中心的“安装”选项卡中选择“将节点添加到 SQL Server 故障转移集群”选项。这将调用“添加故障转移集群节点向导”。此向导的第一页是“产品密钥”页面。就像安装实例时一样，您需要使用此屏幕提供
    SQL Server 的产品密钥。不指定产品密钥将只让您选择安装“评估版”，而由于此版本在 180 天后过期，对于高可用性来说这可能不是最明智的选择。


    向导的下一页“许可条款”要求您阅读并接受 SQL Server 的许可条款。此外，您需要指定是否希望参加 Microsoft 的“客户体验改善计划”。如果您选择此选项，则错误报告会被捕获并发送给
    Microsoft。


    接受许可条款后，将运行规则检查以确保满足所有条件，以便您可以继续安装。向导检查 Microsoft 更新并安装安装所需的文件后，将进行另一次规则检查，以确保满足将节点添加到集群的规则。


    在“集群节点配置”页面（如图 4-19 所示），系统要求您确认要向其添加节点的实例名称。如果集群上有多个实例，则可以使用下拉框选择适当的实例。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig19_HTML.jpg](img/394392_3_En_4_Fig19_HTML.jpg)


    *图 4-19：添加故障转移集群节点向导 - 集群节点配置页面*


    在“集群网络配置”页面（如图 4-20 所示），您确认网络详细信息。这些信息应与集群中的第一个节点相同，包括相同的 IP 地址，因为这当然是两个节点之间共享的。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig20_HTML.jpg](img/394392_3_En_4_Fig20_HTML.jpg)


    *图 4-20：集群网络配置页面*


    在向导的“服务账户”页面上，大部分信息为只读模式，您无法修改。这是因为您使用的服务账户对于集群的每个节点必须是相同的。但是，您需要重新输入服务账户密码。此页面如图
    4-21 所示。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig21_HTML.jpg](img/394392_3_En_4_Fig21_HTML.jpg)


    *图 4-21：服务账户页面*


    现在向导已获得所有必需信息，在显示摘要页面之前会进行额外的规则检查。摘要页面（称为“准备添加节点”页面）提供了安装期间发生的活动摘要。

