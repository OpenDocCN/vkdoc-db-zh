  trans: '

    # 准备可用性组


    准备可用性组的第一步，是在所有将参与的节点上的 SQL Server 服务中启用可用性组。关于如何执行此操作的信息，可以在本章的“无集群可用性组”部分找到。


    由于在此拓扑中无法进行 Active Directory 身份验证，`database_mirroring` 端点将需要证书来相互通信。我们还需要 SQL
    登录名，这些登录名将被授予连接到端点的权限。因此，我们首先需要创建证书。这可以使用清单 7-11 中的脚本来完成。在此脚本中，我们首先在 `master`
    数据库中创建一个数据库主密钥。然后，我们创建一个证书，并将该证书备份到操作系统。应在所有将参与可用性组的节点上重复此操作，为每个实例使用不同的证书名称。


    ```sql

    USE master

    GO

    --创建数据库主密钥

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    -- 创建证书

    CREATE CERTIFICATE Node1Cert

    WITH SUBJECT = ''ClusterNode1 Certificate'';

    GO

    --备份证书

    BACKUP CERTIFICATE Node1Cert

    TO FILE = ''c:\Certificates\Node1Cert.cer'';

    GO

    ```


    **清单 7-11** 创建证书


    我们现在需要为每个节点创建一个登录名，该登录名将被授予连接到端点的权限。我们可以使用清单 7-12 中的脚本来实现这一点。这些登录名应在所有将参与可用性组的实例上创建。因此，应对所有实例运行该脚本。


    ```sql

    CREATE LOGIN ClusterNode1_AOAG

    WITH PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE USER ClusterNode1_AOAG

    FOR LOGIN ClusterNode1_AOAG;

    GO

    CREATE LOGIN ClusterNode2_AOAG

    WITH PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE USER ClusterNode2_AOAG

    FOR LOGIN ClusterNode2_AOAG;

    GO

    ```


    **清单 7-12** 创建登录名


    我们现在可以将每个实例的证书复制到所有其他实例，并使用清单 7-13 中的命令还原它们。对于每个实例，您应相应地更改证书和用户名。此清单显示了在我们的拓扑中，应在
    `CLUSTERNODE1` 上运行的命令。


    ```sql

    CREATE CERTIFICATE Node2Cert

    AUTHORIZATION ClusterNode2_AOAG

    FROM FILE = ''C:\Certificates\Node2Cert.cer''

    ```


    **清单 7-13** 还原证书


    最后，既然证书已存在于每个节点上，我们就可以继续在每个节点上创建 `database_mirroring` 端点。这可以使用清单 7-14 中的脚本来完成。此脚本需要在每个节点上运行，并更改证书以匹配该节点。


    ```sql

    --创建端点

    CREATE ENDPOINT AOAG_Endpoint

    STATE = STARTED

    AS TCP (

    LISTENER_PORT = 5022,

    LISTENER_IP = ALL

    )

    FOR DATABASE_MIRRORING (

    AUTHENTICATION = CERTIFICATE Node1Cert,

    ROLE = ALL

    )

    --授予每个用户连接到端点的权限

    GRANT CONNECT ON ENDPOINT::AOAG_Endpoint TO ClusterNode1_AOAG;

    GO

    GRANT CONNECT ON ENDPOINT::AOAG_Endpoint TO ClusterNode2_AOAG;

    GO

    ```


    **清单 7-14** 创建端点


    您现在可以使用本书第 5 章讨论的技术来创建可用性组。


    # 分布式可用性组


    分布式可用性组是可用性组的扩展，允许在两个独立的可用性组之间同步数据。这是一项令人兴奋的技术，具有许多不同的用例。例如，它允许在基于 Windows 和基于
    Linux 的可用性组之间进行数据同步；它允许将可读的辅助副本数量扩展到 8 个以上（这是标准可用性组的限制）；并且它允许跨站点复制，而无需复杂延伸集群。分布式可用性组还可以通过在无法进行就地升级而需要并行迁移时提供数据同步来帮助进行服务器迁移。当您有位于不同域中的服务器时，它们也可以用作域独立可用性组的替代方案。


    虽然分布式可用性组的每一侧都可以是 Windows 故障转移集群，但这并不是必需的，因为重点主要在于维护数据库，不会发生集群配置。


    在本节中，我们将通过为我们第 5 章创建的 HR 可用性组配置分布式可用性组来说明该技术，配置在我们的 ALWAYSON-C 集群和一个名为 `Linux_AOAG`
    的基于 Linux 的可用性组之间，该可用性组托管在两台参与 Pacemaker 集群的 Linux 服务器上。


    第一步是在 Linux 集群上创建分布式可用性组。这可以通过使用清单 7-15 中的脚本来完成。注意 `WITH (DISTRIBUTED)` 语法，后跟每个可用性组的规范。


    > 注意

    > 在开始之前，您应该从 HR 可用性组中移除现有数据库；否则，它将无法加入分布式可用性组，因为辅助可用性组必须为空。


    ```sql

    CREATE AVAILABILITY GROUP DistributedAG

    WITH (DISTRIBUTED)

    AVAILABILITY GROUP ON

    ''HR'' WITH

    (

    LISTENER_URL = ''tcp://HRListener.alwayson.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    ```


    **清单 7-15** 创建分布式可用性组


    我们现在可以针对 PROSQLADMIN-C 集群运行清单 7-16 中的命令，以将其加入到分布式可用性组中。


    ```sql

    ALTER AVAILABILITY GROUP DistributedAG

    JOIN

    AVAILABILITY GROUP ON

    ''HR'' WITH

    (

    LISTENER_URL = ''tcp://HRListener.alwayson.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ) ;

    GO

    ```


    **清单 7-16** 加入第二个可用性组


    > 提示

    > 数据库需要手动加入到辅助可用性组内的辅助副本中。

    '
- fmt: '## Summary


    Availability Groups 提供了大量的灵活性，使数据库管理员几乎能在任何情况下配置高可用性、灾难恢复或读取扩展。典型的可用性组拓扑示例包括跨
    Azure VM 配置可用性组、在没有底层集群的情况下配置可用性组，以及跨域或完全没有域配置可用性组。


    在 Azure VM 中创建可用性组时，通过将虚拟机分散在可用性集和可用性区域中可以实现最佳的高可用性，而通过将灾难恢复节点放置在不同的 Azure 区域则可以实现最佳的灾难恢复。在此场景中，使用
    Azure 配对区域可以维护数据主权，这些区域位于同一政治地理区域内，同时仍然实现了地理分散的解决方案。


    无集群可用性组不能用于实现高可用性。这是因为没有集群来执行节点健康状况检查。然而，它们非常适合读取扩展场景，因为可以避免集群组件的复杂性。


    独立于域的可用性组（也称为工作组可用性组）允许跨多个域或在完全没有域的情况下配置可用性组。它们特别适合混合云场景，即您的组织选择在云中创建一个单独的域，而不是扩展其本地域。


    分布式可用性组可以作为混合云场景中独立于域可用性组的替代方案。此外，它们提供了跨平台分布数据的灵活性。例如，可以在基于 Windows 的可用性组和基于 Linux
    的可用性组之间复制数据。


    基本可用性组提供了在运行 SQL Server 标准版的实例上配置可用性组的选项。但是，如果选择使用此功能，则功能是有限的。仅支持两个副本，并且每个可用性组只能有一个数据库。此外，没有使用只读路由的选项。


    ## 8. Administering AlwaysOn


    本章将讨论如何管理 AlwaysOn 功能。我们将首先了解集群维护，包括滚动补丁升级和移除实例。然后我们将讨论管理可用性组，包括如何进行同步和异步故障转移。我们还将探讨如何对分布式可用性组进行故障转移。


    还将讨论其他维护任务，例如同步实例级对象、使应用程序安全停止以及向可用性组添加多个`Listeners`。本章最后将讨论如何暂停数据移动以及如何从可用性组中移除数据库。


    ### Managing a Cluster


    从管理角度来看，安装集群并不是终点。您仍然需要定期执行维护任务。以下各节描述了一些最常见的维护任务。


    #### Moving the Instance Between Nodes


    除了防止计划外中断之外，实施高可用性技术的好处之一是，它显著减少了维护任务（例如打补丁）的停机时间。这可以在操作系统级别或 SQL Server 级别进行。


    如果您有一个双节点集群，请先将补丁应用到被动节点。确认更新成功后，对实例进行故障转移，然后将补丁应用到另一个节点。此时，根据环境的需求，您可能希望也可能不希望故障转移回原始节点。例如，如果首要优先级是实例的可用性级别，那么您可能不希望故障转移回去，因为这将导致另一次短暂的停机。


    要使用故障转移集群管理器将实例移动到不同的节点，请从包含该实例的角色的上下文菜单中选择“移动”➤“选择节点”。这将显示“移动集群角色”对话框。在这里，您可以选择要将角色移动到的节点，如图[8-1](#394392_3_En_8_Chapter.xhtml#Fig1)所示。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig1_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig1_HTML.jpg)


    **Figure 8-1** The Move Clustered Role Dialog Box


    然后角色被移动到新节点。如果您在`Failover Cluster Manager`中观察角色的资源窗口，您会看到每个资源依次经历“联机”➤“正在挂起脱机”➤“脱机”的状态。在资源依次移动到“脱机”➤“正在挂起联机”➤“联机”的状态之前，新节点会显示为所有者。资源按其依赖关系顺序脱机并重新联机。


    我们也可以使用 PowerShell 对角色进行故障转移。为此，我们需要使用 `Move-ClusterGroup` cmdlet。清单 [8-1](#394392_3_En_8_Chapter.xhtml#PC1)
    通过使用该 cmdlet 将 MSDTC 集群角色故障转移到 `ClusterNode2` 来演示此操作。我们使用 `-Name` 参数指定要移动的角色，并使用
    `-Node` 参数指定要移动到的节点。


    ```

    Move-ClusterGroup -Name ALWAYSON-MSDTC-C -Node ClusterNode2

    Listing 8-1 Moving the Role Between Nodes

    ```


    #### Rolling Patch Upgrade


    如果您有一个超过两个节点的集群，那么在应用 SQL Server 更新时，请考虑执行滚动补丁升级。在此场景中，您可以降低运行不同版本或补丁级别的 SQL Server
    的不同节点（这些节点可能是角色的所有者）的风险。


    您应该做的第一件事是制作角色可能所有者的所有节点列表。然后，选择其中 50% 的节点，并从“可能的所有者”列表中移除它们。您可以通过从“名称”资源的上下文菜单中选择“属性”，然后在“高级策略”选项卡中取消选中可能所有者列表中的节点来完成此操作，如图
    [8-2](#394392_3_En_8_Chapter.xhtml#Fig2)所示。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig2_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig2_HTML.jpg)


    **Figure 8-2** Remove Possible Owners


    要使用 PowerShell 实现相同的结果，我们可以使用 `Get-Resource` cmdlet 导航到名称资源，然后通过管道传递 `Set-ClusterOwnerNode`
    来配置可能的所有者列表。清单 [8-2](#394392_3_En_8_Chapter.xhtml#PC2) 演示了这一点。如果配置了多个可能的所有者，则可能所有者列表以逗号分隔。


    ```

    Get-ClusterResource "SQL Network Name (ALWAYSON-SQL-C)" | Set-ClusterOwnerNode
    -Owners clusternode1

    Listing 8-2 Configuring Possible Owners

    ```


    一旦 50% 的节点被移除作为可能的所有者，您应该将更新应用到这些节点。在此半数节点上验证更新后，您应重新配置它们以再次允许它们成为可能的所有者。


    下一步是将角色移动到您已升级的节点之一。故障转移成功完成后，在将更新应用到其他半数节点之前，将它们从可能的所有者列表中移除。在此半数节点上验证更新后，您可以将它们放回可能的所有者列表。


    > **Tip**

    >

    > 可能的所有者只能在资源上设置。如果您对角色运行 `Set-ClusterOwnerNode` 并使用 `-Group` 参数，那么您正在配置的是首选所有者，而不是可能的所有者。'
  raw: '## Summary


    Availability Groups offer a large amount of flexibility, enabling DBAs to configure
    high availability, disaster recovery, or read-scaling in almost any situation.
    Examples of atypical Availability Group topologies include configuring Availability
    Groups across Azure VMs, configuring Availability Groups with no underlying cluster,
    and configuring Availability Groups across domains, or with no domain at all.


    When creating Availability Groups in Azure VMs, high availability can best be
    achieved by splitting the VMs across Availability Sets and Availability Zones,
    while DR can best be achieved by placing the DR node in a different Azure Region.
    In this scenario, data sovereignty can be maintained by using Azure paired regions,
    which are inside the same political geography while still geographically dispersing
    the solution.


    Clusterless Availability Groups cannot be used to achieve high availability. This
    is because there is no cluster to perform node health checks. They are very well
    suited to read-scale scenarios, however, where the complexity of the clustering
    components can be avoided.


    Domain-independent Availability Groups (also known as workgroup availability groups)
    allow for Availability Groups to be configured across multiple domains, or where
    there is no domain at all. They are especially well suited to hybrid cloud scenarios,
    where your organization has chosen to create a separate domain in the cloud, as
    opposed to stretching their on-premise domain.


    Distributed Availability Groups can be used as an alternative to domain-independent
    Availability groups in hybrid cloud scenarios. Additionally, they provide the
    flexibility to distributed data across platforms. For example, data can be replicated
    between a Windows-based Availability Group and a Linux-based Availability Group.


    Basic Availability Groups provide the option to configure Availability Groups
    on instances running SQL Server Standard Edition. If you choose to use this feature,
    however, then the functionality is limited. Only two replicas are supported and
    there can only be a single database per Availability Group. Additionally, there
    is no option to use read-only routing.


    # 8. Administering AlwaysOn


    This chapter will discuss how to administer AlwaysOn features. We will first look
    at cluster maintenance, including rolling patch upgrades and removing an instance.
    We will then discuss managing Availability Groups, including how to fail over
    synchronously and asynchronously. We will also examine how to fail over a Distributed
    Availability Group.


    Additional maintenance tasks, such as synchronizing instance-level objects, safe-stating
    an application, and adding multiple Listeners to an Availability Group will also
    be discussed. The chapter will end by discussing how to suspend data movement
    and how to remove a database from an Availability Group.


    ## Managing a Cluster


    Installing the cluster is not the end of the road from an administrative perspective.
    You still need to periodically perform maintenance tasks. The following sections
    describe some of the most common maintenance tasks.


    ### Moving the Instance Between Nodes


    Other than protecting against unplanned outages, one of the benefits of implementing
    high availability technologies is that doing so significantly reduces downtime
    for maintenance tasks, such as patching. This can be at the operating system level
    or the SQL Server level.


    If you have a two-node cluster, apply the patch to the passive node first. Once
    you are happy that the update was successful, fail over the instance and then
    apply the patch to the other node. At this point, you may or may not wish to fail
    back to the original node, depending on the needs of your environment. For example,
    if the overriding priority is the level of availability of the instance, then
    you may not wish to fail back, because this will incur another short outage.


    To move an instance to a different node using Failover Cluster Manager, select
    Move ➤ Select Node from the context menu of the role that contains the instance.
    This causes the Move Clustered Role dialog box to display. Here, you can select
    the node to which you wish to move the role, as illustrated in Figure [8-1](#394392_3_En_8_Chapter.xhtml#Fig1).


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig1_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig1_HTML.jpg)


    Figure 8-1


    The Move Clustered Role Dialog Box


    The role is then moved to the new node. If you watch the role’s resources window
    in Failover Cluster Manager, then you see each resource move through the states
    of Online ➤ Offline Pending ➤ Offline. The new node is now displayed as the owner
    before the resources move in turn through the states of Offline ➤ Online Pending
    ➤ Online. The resources are taken offline and placed back online in order of their
    dependencies.


    We can also fail over a role using PowerShell. To do this, we need to use the
    `Move-ClusterGroup` cmdlet. Listing [8-1](#394392_3_En_8_Chapter.xhtml#PC1) demonstrates
    this by using the cmdlet to fail over the MSDTC cluster role to `ClusterNode2`.
    We use the `-Name` parameter to specify the role that we wish to move and the
    `-Node` parameter to specify the node to which we wish to move it.


    ```

    Move-ClusterGroup -Name ALWAYSON-MSDTC-C -Node ClusterNode2

    Listing 8-1

    Moving the Role Between Nodes

    ```


    ### Rolling Patch Upgrade


    If you have a cluster with more than two nodes, then consider performing a rolling
    patch upgrade when you are applying updates for SQL Server. In this scenario,
    you mitigate the risk of having different nodes, which are possible owners of
    the role, running different versions or patch levels of SQL Server.


    The first thing that you should do is make a list of all nodes that are possible
    owners of the role. Then, select 50% of these nodes and remove them from the Possible
    Owners list. You can do this by selecting Properties from the context menu of
    the Name resource and then, in the Advanced Policies tab, unchecking the nodes
    in the possible owners list, as illustrated in Figure [8-2](#394392_3_En_8_Chapter.xhtml#Fig2).


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig2_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Remove Possible Owners


    To achieve the same result using PowerShell, we can use the `Get-Resource` cmdlet
    to navigate to the name resource and then pipe in the `Set-ClusterOwnerNode` to
    configure the possible owners list. This is demonstrated in Listing [8-2](#394392_3_En_8_Chapter.xhtml#PC2).
    The possible owners list is comma separated in the event that you are configuring
    multiple possible owners.


    ```

    Get-ClusterResource "SQL Network Name (ALWAYSON-SQL-C)" | Set-ClusterOwnerNode
    -Owners clusternode1

    Listing 8-2

    Configuring Possible Owners

    ```


    Once 50% of the nodes have been removed as possible owners, you should apply the
    update to these nodes. After the update has been verified on this half of the
    nodes, you should reconfigure them to allow them to be possible owners once more.


    The next step is to move the role to one of the nodes that you have upgraded.
    After failover has successfully completed, remove the other half of the nodes
    from the preferred owners list before applying the update to these nodes. Once
    the update has been verified on this half of the nodes, you can return them to
    the possible owners list.


    Tip


    The possible owners can only be set on a resource. If you run `Set-ClusterOwnerNode`
    against a role using the `-Group` parameter, then you are configuring preferred
    owners rather than possible owners.'
