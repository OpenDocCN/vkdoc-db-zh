  trans: '### 主动维护


    重要的是要记住，停机不仅由故障引起，还可能源于主动维护。例如，如果您需要为操作系统或 SQL Server 本身打上最新的服务包，那么在安装过程中必然会有一段停机时间。


    根据您所应用的升级类型，这种情况下的停机时间可能相当可观——对于一台独立服务器可能长达数小时。在这种情况下，高可用性对于许多业务关键型应用程序至关重要——不是为了防范计划外停机，而是为了避免在计划维护期间出现长时间的服务中断。


    ### 恢复点目标与恢复时间目标


    应用程序的**恢复点目标** (`RPO`) 表明在发生故障时可接受的数据丢失量。例如，对于一个支持报表应用程序的数据仓库，鉴于它可能仅由 ETL 过程每天更新一次且所有其他活动都是只读报表，这个
    `RPO` 可能是一个较长的周期，比如 24 小时。然而，对于高度事务性的系统，例如支持交易平台或 Web 应用程序的 OLTP 数据库，`RPO` 将为零。`RPO`
    为零意味着不允许任何数据丢失。


    应用程序针对高可用性和灾难恢复可能有不同的 `RPO`。例如，出于成本或应用程序性能的考虑，站点内的故障转移可能需要零 `RPO`。然而，如果同一应用程序故障转移到灾难恢复
    (DR) 数据中心，五到十分钟的数据丢失可能是可以接受的。这是因为实现站点内可用性和站点间恢复所采用的技术存在差异。


    应用程序的**恢复时间目标** (`RTO`) 指定了在恢复完成且用户可以重新连接之前，应用程序可以停机的最大时间。在计算可实现的 `RTO` 时，您需要考虑许多方面。例如，集群从一个节点故障转移到另一个节点以及
    SQL Server 服务重新启动可能只需要不到一分钟；然而，数据库恢复可能需要更长的时间。数据库恢复所需的时间取决于许多因素，包括数据库的大小、实例中的数据库数量以及故障转移发生时正在进行中的事务数量。这是因为所有未提交的事务都需要回滚。


    就像 `RPO` 一样，根据是站点内还是站点间故障转移，通常存在不同的 `RTO`。同样，这主要是由于技术差异，但也取决于如果主数据中心丢失，您需要在灾难恢复数据中心启动整个环境所需的时间。


    在发生数据损坏的情况下，应用程序的 `RPO` 和 `RTO` 也可能有所不同。根据损坏的性质以及已实施的高可用性/灾难恢复 (HA/DR) 技术，数据损坏可能导致您需要从备份中还原数据库。


    如果必须还原数据库，最坏的情况是可实现的恢复点可能是上次备份的时间。这意味着您必须将特定 `RPO` 的硬性业务要求纳入您的备份策略中。但是，如果只有部分数据库损坏，您或许可以从活动数据库中挽救一些数据，并且只从还原的数据库中还原损坏的数据。


    数据损坏也可能对 `RTO` 产生影响。最大的影响因素之一是备份是本地存储在服务器上，还是需要从磁带中检索。从磁带，甚至从异地位置检索备份文件，可能会大大增加恢复过程的时间。


    **注意**

    直接从 SQL Server 备份到磁带已弃用。当本节提到从磁带检索备份时，是假设以磁带驱动器作为企业备份解决方案的目标，您的数据库备份已被卸载到该解决方案。


    另一个影响因素是导致损坏的原因。如果是由有故障的 I/O 子系统引起的，那么您可能需要考虑让 Windows 管理员对卷运行磁盘检查命令 (`CHKDSK`)
    的时间，以及可能更换磁盘所需的时间。但是，如果损坏是由用户意外截断表或删除数据文件引起的，则无需担心。


    ### 停机成本


    如果您询问任何业务负责人，他们的应用程序可以接受多少停机时间和数据丢失，答案无一例外地分别是零和零。当然，永远无法保证零停机时间，而且一旦您开始解释与不同可用性级别相关的成本，就更容易协商出双方可接受的服务水平。


    决定应争取达到几个 9 的关键因素是停机成本。停机相关的成本分为两类：有形成本和无形成本。有形成本通常比较容易计算。让我们以一个销售应用程序为例。在这种情况下，最明显的有形成本是因销售人员无法接受订单而导致的收入损失。无形成本更难量化，但可能昂贵得多。例如，如果客户无法向您的公司下订单，他们可能会将订单交给竞争对手公司，并且可能一去不复返。其他无形成本可能包括员工士气低落导致员工流动率上升，甚至公司声誉损失。由于无形成本的本质决定了它们只能估算，行业的经验法则是将有形成本乘以三，用这个数字来代表您的无形成本。


    一旦您获得了应用程序每小时的总停机成本数字，就可以在整个应用程序的预测生命周期内按比例扩展这个数字，并比较实施不同可用性级别的成本。例如，假设您计算出总停机成本为每小时
    2,000 美元，应用程序的预测生命周期为三年。表 **1-2** 说明了您的应用程序的停机成本，比较了您在考虑硬件、许可证、电力、布线、额外存储以及额外支持设备（如新机架）、管理成本等之后计算出的实施每个可用性级别的成本。这被称为解决方案的**总拥有成本**
    (`TCO`)。


    **表 1-2**

    停机成本


    | 可用性级别 | 停机成本（三年） | 可用性解决方案成本 |

    | --- | --- | --- |

    | 99% | $525,600 | $108,000 |

    | 99.9% | $52,560 | $224,000 |

    | 99.99% | $5,256 | $462,000 |

    | 99.999% | $526 | $910,000 |


    在此表中，您可以看到，实施五个 9 的可用性比两个 9 的解决方案节省了 $525,074，但实施该解决方案的额外成本是 $802,000，这意味着它并不经济。四个
    9 的可用性比两个 9 的解决方案节省了 $520,344，而实施成本仅增加了 $354,000。因此，对于此特定应用程序，四个 9 的解决方案是最适合设计的服务级别。'
- fmt: '## Classification of Standby Servers


    There are three classes of standby solution. You can implement each using different
    technologies, although you can use some technologies to implement multiple classes
    of standby server. Table [1-3](#394392_3_En_1_Chapter.xhtml#Tab3) outlines the
    different classes of standby that you can implement.


    Table 1-3 Standby Classifications


    | Class | Description | Example Technologies |

    | --- | --- | --- |

    | Hot | A synchronized solution where failover can occur automatically or manually.
    Often used for high availability. | Clustering, AlwaysOn Availability Groups (Synchronous)
    |

    | Warm | A synchronized solution where failover can only occur manually. Often
    used for disaster recovery. | Log Shipping, AlwaysOn Availability Groups (Asynchronous)
    |

    | Cold | An unsynchronized solution where failover can only occur manually. This
    is only suitable for read-only data, which is never modified. | – |


    Note

    Cold standby does not show an example technology because no synchronization is
    required and, thus, no technology implementation is required.


    ## Summary


    Your application’s level of availability is measured as a percentage of time that
    the application is available to users. The level of availability is often referred
    in nines. For example, 99.9% uptime requirement is known as three 9s of availability.
    The higher the uptime requirement, the higher the cost of implementing the solution.
    Therefore, the level of uptime that you strive to achieve should be driven by
    SLAs and the cost of downtime.


    Recovery point objective is a measure of how much data it is acceptable to lose
    in the event of a disaster. For example, if your only DR solution is backups and
    backups are scheduled to be taken every hour, you can achieve a recovery point
    objective of one hour. Recovery time objective is a measure of how long it will
    take to recover a solution after a failure. For example, if you have a recovery
    time objective of 30 minutes, then you must be able to restore service within
    half an hour.


    It is important to determine the cost of downtime for your application, as this
    is one of the main drivers to determine your level of availability. The cost of
    downtime consists of both tangible and intangible costs. Tangible costs can be
    calculated, whereas intangible costs need to be estimated.


    Redundant infrastructure helps you to maintain availability of your applications
    and services. A redundant server will be classified as hot, warm, or cold. A hot
    standby server is one which is kept synchronized with the live server and configured
    to allow automatic failover. This is suitable for HA scenarios. A warm standby
    server is one which is kept synchronized with the live server, but is not configured
    to failover automatically. Instead, an engineer must perform the failover manually.
    This is suitable for DR scenarios. A cold standby server is not kept synchronized
    with the live server and therefore cannot be failed over automatically. A cold
    standby server is suitable for DR scenarios where all data is read-only and never
    modified.


    ## 2. Understanding High Availability and Disaster Recovery Technologies


    SQL Server provides a full suite of technologies for implementing high availability
    and disaster recovery. The following sections provide an overview of these technologies
    and discuss their most appropriate uses.


    ### AlwaysOn Failover Clustering


    A Windows cluster is a technology for providing high availability in which a group
    of up to 64 servers works together to provide redundancy. An `AlwaysOn Failover
    Clustered Instance (FCI)` is an instance of SQL Server that spans the servers
    within this group. If one of the servers within this group fails, another server
    takes ownership of the instance. Its most appropriate usage is for high availability
    scenarios where the databases are large or have high write profiles. This is because
    clustering relies on shared storage, meaning the data is only written to disk
    once. With SQL Server–level HA technologies, write operations occur on the primary
    database and then again on all secondary databases, before the commit on the primary
    completes. This can cause performance issues. Even though it is possible to stretch
    a cluster across multiple sites, this involves SAN replication, which means that
    a cluster is normally configured within a single site.


    Each server within a cluster is called a `node`. Therefore, if a cluster consists
    of three servers, it is known as a three-node cluster. Each node within the cluster
    has the SQL Server binaries installed, but the SQL Server service is only started
    on one of the nodes, which is known as the `active node`. Each node within the
    cluster also shares the same storage for the SQL Server data and log files. The
    storage, however, is only attached to the active node.


    Tip

    In geographically dispersed clusters (known as geoclusters or stretch clusters),
    each server is attached to different storage. The volumes are updated by SAN replication
    or Windows Storage Replica (a Windows Server technology, introduced in Windows
    Server 2016, which performs storage replication). The cluster regards the two
    volumes as a single, shared volume, which can only be attached to one node at
    a time.


    If the active node fails, then the SQL Server service is stopped and the storage
    is detached. The storage is then reattached to one of the other nodes in the cluster,
    and the SQL Server service is started on this node, which is now the active node.
    The instance is also assigned its own network name and IP address, which are also
    bound to the active node. This means that applications can connect seamlessly
    to the instance, regardless of which node has ownership.


    The diagram in Figure [2-1](#394392_3_En_2_Chapter.xhtml#Fig1) illustrates a two-node
    cluster. It shows that although the databases are stored on a shared storage array,
    each node still has a dedicated system volume. This volume contains the SQL Server
    binaries. It also illustrates how the shared storage, IP address, and network
    name are rebound to the passive node in the event of failover.


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig1_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig1_HTML.jpg)

    Figure 2-1 Two-Node Cluster


    #### Active/Active Configuration


    Although the diagram in Figure [2-1](#394392_3_En_2_Chapter.xhtml#Fig1) illustrates
    an `active/passive configuration`, it is also possible to have an `active/active
    configuration`. Although it is not possible for more than one node at a time to
    own a single instance, and therefore it is not possible to implement load balancing,
    it is, however, possible to install multiple instances on a cluster, and a different
    node may own each instance. In this scenario, each node has its own unique network
    name and IP address. Each instance’s shared storage also consists of a unique
    set of volumes.


    Therefore, in an `active/active configuration`, during normal operations, `Node1`
    may host `Instance1` and `Node2` may host `Instance2`. If `Node1` fails, both
    instances are then hosted by `Node2`, and vice versa. The diagram in Figure [2-2](#394392_3_En_2_Chapter.xhtml#Fig2)
    illustrates a two-node `active/active` cluster.


    ![../images/394392_3_En_2_Chapter/394392_3_En_2_Fig2_HTML.jpg](images/394392_3_En_2_Chapter/394392_3_En_2_Fig2_HTML.jpg)

    Figure 2-2 Active/Active Cluster


    Caution

    In an `active/active` cluster, it is important to consider resources in the event
    of failover. For example, if each node has 128GB of RAM and the instance hosted
    on each node is using 96GB of RAM and locking pages in memory, then when one node
    fails over to the other node, this node fails as well, because it does not have
    enough memory to allocate to both instances. Make sure you plan both memory and
    processor requirements as if the two nodes are a single server. For this reason,
    `active/active` clusters are not generally recommended for SQL Server.'
