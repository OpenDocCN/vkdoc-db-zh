    is beyond the scope of this book, but a CIDR tutorial can be found at [`www.controltechnology.com/Files/common-documents/application_notes/CIDR-Notation-Tutorial`](http://www.controltechnology.com/Files/common-documents/application_notes/CIDR-Notation-Tutorial).'
  trans: '# 配置集群


    在创建集群之前，我们需要先创建一个登录名，供 Pacemaker 账户使用，并为其分配所需的权限。这个操作需要在所有将参与可用性组的 SQL Server
    实例中执行。可以通过清单 6-12 中的脚本完成此操作。


    ```sql

    CREATE LOGIN Pacemaker

    WITH PASSWORD = ''Pa$$w0rd''

    GO

    GRANT ALTER, CONTROL, VIEW DEFINITION ON AVAILABILITY GROUP::LinuxAOAG

    TO Pacemaker ;

    GRANT VIEW SERVER STATE TO Pacemaker

    ```

    清单 6-12：配置 Pacemaker 登录名


    ## 配置防火墙


    接下来，我们需要配置防火墙。集群所需的端口详见表 6-1。


    表 6-1：集群所需端口


    | 端口 | 描述 |

    | --- | --- |

    | TCP 2224 | 所有节点都需要。`pcsd` Web UI 和节点间通信 |

    | TCP 3121 | 如果 Pacemaker 有远程节点，则所有节点都需要。用于 `crmd` 和 `pacemaker_remoted` 守护进程之间的通信
    |

    | TCP 21064 | 所有节点都需要。由需要 DLM 的资源使用 |

    | UDP 5405 | 所有节点都需要。由 Corosync 使用 |

    | TCP 1433 | 所有节点都需要。本章示例中 SQL 实例监听 `1433` 端口；但是，您应根据自己的环境进行更改 |

    | TCP 5022 | 所有节点都需要。本章示例中 AlwaysOn 端点位于 `5022` 端口；但是，您应根据自己的环境进行更改 |


    清单 6-13 提供了如何在 Ubuntu 中配置防火墙规则的示例。


    ```bash

    sudo ufw allow 2224/tcp

    sudo ufw allow 3121/tcp

    sudo ufw allow 21064/tcp

    sudo ufw allow 5405/udp

    sudo ufw allow 1433/tcp

    sudo ufw allow 5022/tcp

    sudo ufw reload

    ```

    清单 6-13：配置防火墙规则


    ## 安装 Pacemaker 组件


    接下来，我们将安装 Pacemaker 组件。我们可以使用清单 6-14 中的命令来完成此操作。此命令应在参与可用性组的所有服务器上运行。


    ```bash

    sudo apt-get install pacemaker pcs resource-agents

    ```

    清单 6-14：安装 Pacemaker 组件


    **注意**

    对于生产系统，请务必同时安装 `fence-agents` 以实现节点隔离。


    在安装 `pcs` 组件期间，将创建一个 `hacluster` 用户。您应该使用 `passwd` 命令为该用户设置密码，如清单 6-15 所示。运行命令后，系统将提示您输入新密码并确认。


    **注意**

    重要的是，您需要在每个节点上设置相同的密码。


    ```bash

    sudo passwd hacluster

    ```

    清单 6-15：设置 `hacluster` 密码


    ## 启用集群服务


    现在，我们可以使用清单 6-16 中的脚本启用 `pcsd` 和 `pacemaker` 服务。您会注意到，在启用 `pacemaker` 之前，我们执行了一个命令来销毁任何现有的集群。这是因为在安装
    `pcs` 期间创建了一个名为 `/etc/cluster/corosync.conf` 的文件，然而启用 `pacemaker` 时会尝试创建此文件。使用
    `cluster destroy` 命令删除此文件可以避免在启用 `pacemaker` 时出现失败。


    ```bash

    sudo systemctl enable pcsd

    sudo systemctl start pcsd

    sudo pcs cluster destroy

    sudo systemctl enable pacemaker

    ```

    清单 6-16：启用 `pcsd` 和 `pacemaker`


    ## 构建集群


    现在 `pacemaker` 已启用，我们可以构建集群了。此过程包括运行五个 `pcs cluster` 命令。


    第一个是 `auth`。此命令用于向所有节点上的 `pcs` 守护进程验证 `pcs` 的身份。该命令需要一个节点列表，后跟安装期间创建的 `pcs` 用户的用户名和密码。清单
    6-17 演示了在我们的场景中如何使用该命令。


    ```bash

    sudo pcs cluster auth LinuxProd LinuxSyncHA LinuxConfig –u hacluster

    ```

    清单 6-17：向 `pcs` 守护进程进行身份验证


    由于我们在运行此命令时未指定 `–p` 参数，因此系统将提示您输入 `hacluster` 的密码。


    第二个命令是 `set up`。此命令用于注册集群名称和集群中的每个节点。集群名称使用 `–name` 参数指定，后跟一个节点列表。清单 6-18 说明了在我们的场景中如何使用
    `setup` 命令。


    **提示**

    也可以指定 `–start` 参数来启动集群服务，但我们选择使用单独的命令来启动集群，以帮助说明整个过程。


    ```bash

    sudo pcs cluster setup --name LinuxCluster LinuxProd LinuxSyncHA LinuxConfig

    ```

    清单 6-18：设置集群


    下一个命令是 `start`。顾名思义，此命令用于启动集群服务。该命令可以接受 `–-all` 参数以在所有节点上启动服务（如清单 6-19 所示），或者接受一个节点列表，指定应在哪些节点上启动集群服务。


    ```bash

    sudo pcs cluster start –-all

    ```

    清单 6-19：启动集群服务


    运行此命令后，服务启动前可能会有延迟。因此，在继续之前，您应该运行 `status` 命令以确保集群已启动，如清单 6-20 所示。


    ```bash

    sudo pcs cluster status

    ```

    清单 6-20：检查集群状态


    最后，我们将为每个节点配置集群服务在启动时运行。这可以通过 `enable` 命令完成，如清单 6-21 所示。该命令接受 `–-all` 参数或节点列表。


    ```bash

    sudo pcs cluster enable --all

    ```

    清单 6-21：启用集群服务


    ## 安装资源代理


    集群创建完成后，我们就可以安装 SQL Server 资源代理了。这允许 `pacemaker` 与可用性组进行松散集成。具体来说，每次发生配置更改（例如故障转移或添加新副本）时，它都会在
    `sys.available_groups` 目录视图中递增一个序列号。然后，在故障转移前检查此序列号，以确定节点是否已更新。如果序列号不是最新的，则可以拒绝故障转移。清单
    6-22 演示了如何安装资源代理。


    ```bash

    sudo apt-get install mssql-server-ha

    ```

    清单 6-22：安装资源代理


    ## 保存凭据并创建资源


    接下来，我们需要授予 `pacemaker` 对可用性组的权限。我们在清单 6-12 中为 `pacemaker` 创建了一个登录名。现在我们需要通过在集群中的所有节点上运行清单
    6-23 中的脚本，将凭据保存在操作系统中。


    ```bash

    echo ''pacemakerLogin'' >> ~/pacemaker-passwd

    echo ''Pa$$w0rd'' >> ~/pacemaker-passwd

    sudo mv ~/pacemaker-passwd /var/opt/mssql/secrets/passwd

    sudo chown root:root /var/opt/mssql/secrets/passwd

    sudo chmod 400 /var/opt/mssql/secrets/passwd

    ```

    清单 6-23：保存 Pacemaker 凭据


    我们现在需要创建集群资源，包括可用性组资源和虚拟 IP 地址资源。这可以通过运行清单 6-24 中的脚本来完成。脚本中的第一个命令为 `LinuxAOAG`
    可用性组创建一个可用性组资源。


    脚本中的第二个命令为我们希望使用的 IP 地址创建一个资源。请注意，我们同时指定了 IP 地址和网络的子网掩码。子网掩码使用 CIDR 表示法指定。CIDR
    表示法超出了本书的范围，但可以在 [`www.controltechnology.com/Files/common-documents/application_notes/CIDR-Notation-Tutorial`](http://www.controltechnology.com/Files/common-documents/application_notes/CIDR-Notation-Tutorial)
    找到 CIDR 教程。'
- fmt: '# 7. 非典型可用性组实现


    到目前为止，我们已经讨论了 AlwaysOn 可用性组和 AlwaysOn 故障转移群集实例在典型的本地企业工作负载场景中的应用。然而，AlwaysOn 是一套非常灵活的技术，其中有许多组合可能值得您利用。因此，本章将概述您可能需要支持的一些不太典型的
    AlwaysOn 场景。这包括基础可用性组、Azure 中的可用性组、分布式可用性组，以及在没有群集或域的情况下创建可用性组。


    在本章中，我们将执行以下活动：


    *   在 Azure IaaS 中创建可用性组。

    *   创建无群集可用性组。

    *   创建域独立可用性组。

    *   创建分布式可用性组。


    ## 基础可用性组


    到目前为止，本书中的所有可用性组演示都需要 SQL Server 企业版，但可用性组在 SQL Server 标准版中也可用。然而，在标准版中，可用性组的功能有限，因此它们被称为基础可用性组。


    最明显的限制是基础可用性组仅支持两个副本。不过，副本可以配置为同步或异步提交模式。这意味着您仍然可以实现高可用性或灾难恢复。


    > 注意：Linux 上的基础可用性组支持第三个仅配置副本，这是实现高可用性所必需的。更多详细信息请参见第 6 章。


    辅助副本不支持只读连接。这意味着基础可用性组不仅不支持读取扩展，也不支持在辅助副本上进行备份或完整性检查。


    另一个限制是基础可用性组只能包含一个数据库。这意味着无法一起故障转移多个数据库，这使得大型实例的管理变得困难得多。


    其他高级可用性组功能，如分布式可用性组，也不受支持，并且一旦构建了基础可用性组，就无法将其升级为完整的可用性组。相反，必须将其销毁并重新创建。


    要实现基础可用性组，您可以使用本书前面讨论的相同语法，明显区别在于无法实现不支持的功能。唯一专属于基础可用性组的语法是在 `WITH` 子句中添加 `BASIC`
    标记，这会减少可用功能。例如，脚本清单 7-1 将在名为 `SQLStdProd` 和 `SQLStdSyncHA` 的两个服务器之间创建一个可用性组，并且这两个服务器都安装了
    SQL Server 标准版的默认实例。


    ```sql

    CREATE AVAILABILITY GROUP BasicAGAG

    WITH (

    AUTOMATED_BACKUP_PREFERENCE = PRIMARY,

    BASIC,

    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0

    )

    FOR DATABASE Sales

    REPLICA ON ''SQLSTDPROD'' WITH (

    ENDPOINT_URL = ''TCP://SQLSTDPROD.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC

    ),

    ''SQLSTDSYNCHA'' WITH (

    ENDPOINT_URL = N''TCP://SQLSTDSYNCHA.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    ```

    清单 7-1 创建基础可用性组


    ```

    sudo pcs resource create LinuxAOAG ocf:mssql:ag ag_name=LinuxAOAG meta failure-timeout=60s
    master meta notify=true

    sudo pcs resource create VirtualIP ocf:heartbeat:IPaddr2 ip=10.0.0.25 cidr_netmask=24

    ```

    清单 6-24 创建群集资源


    > 注意：由于 `pacemaker` 没有网络名称的概念，因此必须在 DNS 中手动注册 IP 地址和期望的名称。


    资源应运行在哪个节点上的决策基于分数，这些分数是在资源级别计算的。这意味着虚拟 IP 地址有可能被移动到不同的节点，即可用性组资源所在的节点。为了减轻这种风险，我们需要添加一个位置约束，以确保资源始终位于同一节点上。约束也有分数，任何低于无限大的数字表示偏好，无限大表示绑定要求。清单
    6-25 中的命令将创建所需的约束。


    ```

    sudo pcs constraint colocation add VirtualIP LimuxAOAG INFINITY with-rsc-role=Master

    ```

    清单 6-25 创建位置约束


    因为此命令将虚拟 IP 地址资源列在可用性组资源之前，所以在资源移动时，虚拟 IP 地址将被移动并上线，然后可用性组资源才会被移动并上线。这意味着虚拟 IP
    地址可能暂时指向错误的节点。可以通过添加一个排序约束来减轻这种风险，该约束强制可用性组资源在虚拟 IP 地址上线之前移动。清单 6-26 演示了如何配置此约束。


    ```

    sudo pcs constraint order promote LinuxAOAG then start VirtualIP

    ```

    清单 6-26 创建排序约束


    最后，我们可以创建可用性组侦听器。侦听器将使用我们在 `pacemaker` 群集中创建的虚拟 IP 地址资源的 IP 地址。重要的是要记住，当在 `pacemaker`
    群集上配置可用性组时，可用性组侦听器的唯一目的是提供一个抽象，作为副本的单一入口点。它不能掩盖中断，因为在故障转移期间，当虚拟 IP 地址资源在另一个群集节点上启动时，它将暂时变得不可用。我们可以使用清单
    6-27 中的脚本来创建可用性组侦听器。


    ```sql

    USE master

    GO

    ALTER AVAILABILITY GROUP LinuxAOAG

    ADD LISTENER ''LinuxAOListener'' (

    WITH IP (

    (N''10.0.0.25'', N''255.255.255.0'')

    )

    , PORT=1433

    );

    GO

    ```

    清单 6-27 创建可用性组侦听器


    ## 总结


    可以在基于 Linux 的实例上配置可用性组，其方式与在基于 Windows 的实例上配置可用性组类似。它们可以在没有底层群集的情况下配置，也可以利用基于
    Linux 的群集技术。


    如果需要高可用性或灾难恢复，则必须使用 Linux 群集技术，例如 `pacemaker`。`pacemaker` 群集由多个组件组成，包括 `pcs`（用于管理
    `pacemaker` 群集的命令行实用程序）、`Corosync`（提供节点之间的心跳）、`STONITH`（用于隔离），以及 `Pacemaker`（核心群集管理器）。


    可用性组侦听器在 `pacemaker` 群集中受支持，但其功能有限。IP 地址资源在移动到新节点时会暂时离线。因此，可用性组侦听器提供了一种抽象，但不能掩盖故障，因为它将在一段时间内变得无法访问。'
  raw: '```

    sudo pcs resource create LinuxAOAG ocf:mssql:ag ag_name=LinuxAOAG meta failure-timeout=60s
    master meta notify=true

    sudo pcs resource create VirtualIP ocf:heartbeat:IPaddr2 ip=10.0.0.25 cidr_netmask=24

    Listing 6-24

    Create the Cluster Resources

    ```


    Caution


    Because pacemaker does not have the concept of network name, the IP Address and
    desired name must be manually registered in DNS.


    The decision of what node a resource should run on is based on scores, which are
    calculated at the resource level. This means that there is a risk that the virtual
    IP Address could be moved to a different node, to the availability group resource.
    To mitigate this risk, we need to add a colocation constraint, which ensures the
    resources are always on the same node. Constraints also have scores, with any
    number lower than infinity being a preference and infinite being a binding requirement.
    The command in Listing [6-25](#394392_3_En_6_Chapter.xhtml#PC25) will create the
    required constraint.


    ```

    sudo pcs constraint colocation add VirtualIP LimuxAOAG INFINITY with-rsc-role=Master

    Listing 6-25

    Create the Colocation Constraint

    ```


    Because this command lists the virtual IP Address resource before the Availability
    Group resource, when resources are moved, the virtual IP Address will be moved
    and brought online, before the Availability Group resource is moved and brought
    online. This means that the virtual IP address could temporarily be pointing to
    the wrong node. This risk can be mitigated by adding an ordering constraint, which
    forces the Availability Group resource to be moved before the virtual IP Address
    is brought online. Listing [6-26](#394392_3_En_6_Chapter.xhtml#PC26) demonstrates
    how to configure this constraint.


    ```

    sudo pcs constraint order promote LinuxAOAG then start VirtualIP

    Listing 6-26

    Create Ordering Constraint

    ```


    Finally, we can create the Availability Group Listener. The Listener will use
    the IP Address of the virtual IP Address resource that we created in the Pacemaker
    cluster. It is important to remember that when Availability Groups are configured
    on a pacemaker cluster, the sole purpose of the Availability Group Listener is
    to provide an abstraction, with a single point of entry to the Replicas. It does
    not mask outages, because during failover, it will temporarily become unavailable
    while the virtual IP Address resource is started on another cluster node. We can
    create the Availability Group Listener by using the script in Listing [6-27](#394392_3_En_6_Chapter.xhtml#PC27).


    ```

    USE master

    GO

    ALTER AVAILABILITY GROUP LinuxAOAG

    ADD LISTENER ''LinuxAOListener'' (

    WITH IP (

    (N''10.0.0.25'', N''255.255.255.0'')

    )

    , PORT=1433

    );

    GO

    Listing 6-27

    Create the Availability Group Listener

    ```


    ## Summary


    Availability Groups can be configured on Linux-based instances in a similar way
    to configuring Availability Groups on Windows-based instances. They can be configured
    without an underlying cluster or can make use of Linux-based clustering technology.


    If high availability or disaster recovery is required, then a Linux clustering
    technology, such as pacemaker, must be used. A pacemaker cluster is made up of
    multiple components, including pcs, a command-line utility for managing pacemaker
    clusters; Corosync, which provides the heartbeat between the nodes; STONITH which
    is used for fencing; and then Pacemaker, the core cluster manager.


    Availability Group Listeners are supported in a pacemaker cluster, but their functionality
    is limited. The IP Address resource temporarily goes offline when being moved
    to a new node. Therefore, the Availability Group Listener provides an abstraction,
    but does not mask the failure, as it will become inaccessible for a period.


    # 7. Atypical Availability Group Implementations


    So far, we have discussed the typical, on-premise, enterprise workload scenarios
    for AlwaysOn Availability Groups and AlwaysOn Failover Clustered Instances. AlwaysOn
    is such a flexible suite of technologies, however, that there are many permutations
    that you may wish to take advantage of. Therefore, this chapter will provide an
    overview of some of the less typical AlwaysOn scenarios that you may need to support.
    This includes Basic Availability Groups, Availability Groups in Azure, Distributed
    Availability Groups, and creating Availability Groups without a cluster or a domain.


    In this chapter, we will perform the following activities:


    *   Create an Availability Group in Azure IaaS.


    *   Create a Clusterless Availability Group.


    *   Create a domain-independent availability group.


    *   Create a distributed Availability Group.


    ## Basic Availability Groups


    All of the Availability Group demonstrations so far in this book have required
    SQL Server Enterprise Edition, but Availability Groups are also available in SQL
    Server Standard Edition. In Standard Edition, however, the functionality of Availability
    Groups is limited, hence why they are known as Basic Availability Groups.


    The most noticeable limitation is that Basic Availability Groups only support
    two replicas. The replicas can, however, be configured as either in synchronous
    or asynchronous commit mode. This means that you can still achieve either high
    availability or disaster recovery.


    Note


    Basic Availability Group on Linux supports a third, configuration-only replica,
    which is required to achieve high availability. Please see Chapter [6](#394392_3_En_6_Chapter.xhtml)
    for further details.


    The secondary replica does not support read-only connections. This means that
    not only do Basic Availability Groups not support read-scaling, they also do not
    support backups or integrity checks being taken on the secondary.


    Another limitation is that a Basic Availability Group can only contain a single
    database. This means that it is not possible to fail over multiple databases together,
    making administration of large instances far more difficult.


    Other advanced Availability Group functionalities, such as Distributed Availability
    Groups, are also not supported, and once a Basic Availability Group has been built,
    it cannot be upgraded to a full-fat Availability Group. Instead, it must be destroyed
    and re-created.


    To implement Basic Availability Groups, you can use the same syntax, as discussed
    earlier in this book, with the obvious exception being that you cannot implement
    unsupported features. The only syntax that is solely for Basic Availability Groups
    is the addition of the BASIC marker in the WITH clause, which reduces that available
    functionality. For example, the script in Listing [7-1](#394392_3_En_7_Chapter.xhtml#PC1)
    would create an Availability Group across two servers, named SQLStdProd and SQLStdSyncHA,
    and both servers have a default instance of SQL Server Standard Edition installed.


    ```

    CREATE AVAILABILITY GROUP BasicAGAG

    WITH (

    AUTOMATED_BACKUP_PREFERENCE = PRIMARY,

    BASIC,

    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0

    )

    FOR DATABASE Sales

    REPLICA ON ''SQLSTDPROD'' WITH (

    ENDPOINT_URL = ''TCP://SQLSTDPROD.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT, 7

    SEEDING_MODE = AUTOMATIC

    ),

    ''SQLSTDSYNCHA'' WITH (

    ENDPOINT_URL = N''TCP://SQLSTDSYNCHA.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    Listing 7-1

    Create a Basic Availability Group

    ```'
  trans: '

    # 7. 非典型可用性组实现


    到目前为止，我们已经讨论了 AlwaysOn 可用性组和 AlwaysOn 故障转移群集实例在典型的本地企业工作负载场景中的应用。然而，AlwaysOn 是一套非常灵活的技术，其中有许多组合可能值得您利用。因此，本章将概述您可能需要支持的一些不太典型的
    AlwaysOn 场景。这包括基础可用性组、Azure 中的可用性组、分布式可用性组，以及在没有群集或域的情况下创建可用性组。


    在本章中，我们将执行以下活动：


    *   在 Azure IaaS 中创建可用性组。

    *   创建无群集可用性组。

    *   创建域独立可用性组。

    *   创建分布式可用性组。


    ## 基础可用性组


    到目前为止，本书中的所有可用性组演示都需要 SQL Server 企业版，但可用性组在 SQL Server 标准版中也可用。然而，在标准版中，可用性组的功能有限，因此它们被称为基础可用性组。


    最明显的限制是基础可用性组仅支持两个副本。不过，副本可以配置为同步或异步提交模式。这意味着您仍然可以实现高可用性或灾难恢复。


    > 注意：Linux 上的基础可用性组支持第三个仅配置副本，这是实现高可用性所必需的。更多详细信息请参见第 6 章。


    辅助副本不支持只读连接。这意味着基础可用性组不仅不支持读取扩展，也不支持在辅助副本上进行备份或完整性检查。


    另一个限制是基础可用性组只能包含一个数据库。这意味着无法一起故障转移多个数据库，这使得大型实例的管理变得困难得多。


    其他高级可用性组功能，如分布式可用性组，也不受支持，并且一旦构建了基础可用性组，就无法将其升级为完整的可用性组。相反，必须将其销毁并重新创建。


    要实现基础可用性组，您可以使用本书前面讨论的相同语法，明显区别在于无法实现不支持的功能。唯一专属于基础可用性组的语法是在 `WITH` 子句中添加 `BASIC`
    标记，这会减少可用功能。例如，脚本清单 7-1 将在名为 `SQLStdProd` 和 `SQLStdSyncHA` 的两个服务器之间创建一个可用性组，并且这两个服务器都安装了
    SQL Server 标准版的默认实例。


    ```sql

    CREATE AVAILABILITY GROUP BasicAGAG

    WITH (

    AUTOMATED_BACKUP_PREFERENCE = PRIMARY,

    BASIC,

    REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT = 0

    )

    FOR DATABASE Sales

    REPLICA ON ''SQLSTDPROD'' WITH (

    ENDPOINT_URL = ''TCP://SQLSTDPROD.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC

    ),

    ''SQLSTDSYNCHA'' WITH (

    ENDPOINT_URL = N''TCP://SQLSTDSYNCHA.AlwaysOn.com:5022'',

    FAILOVER_MODE = AUTOMATIC,

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    ```

    清单 7-1 创建基础可用性组


    ```

    sudo pcs resource create LinuxAOAG ocf:mssql:ag ag_name=LinuxAOAG meta failure-timeout=60s
    master meta notify=true

    sudo pcs resource create VirtualIP ocf:heartbeat:IPaddr2 ip=10.0.0.25 cidr_netmask=24

    ```

    清单 6-24 创建群集资源


    > 注意：由于 `pacemaker` 没有网络名称的概念，因此必须在 DNS 中手动注册 IP 地址和期望的名称。


    资源应运行在哪个节点上的决策基于分数，这些分数是在资源级别计算的。这意味着虚拟 IP 地址有可能被移动到不同的节点，即可用性组资源所在的节点。为了减轻这种风险，我们需要添加一个位置约束，以确保资源始终位于同一节点上。约束也有分数，任何低于无限大的数字表示偏好，无限大表示绑定要求。清单
    6-25 中的命令将创建所需的约束。


    ```

    sudo pcs constraint colocation add VirtualIP LimuxAOAG INFINITY with-rsc-role=Master

    ```

    清单 6-25 创建位置约束


    因为此命令将虚拟 IP 地址资源列在可用性组资源之前，所以在资源移动时，虚拟 IP 地址将被移动并上线，然后可用性组资源才会被移动并上线。这意味着虚拟 IP
    地址可能暂时指向错误的节点。可以通过添加一个排序约束来减轻这种风险，该约束强制可用性组资源在虚拟 IP 地址上线之前移动。清单 6-26 演示了如何配置此约束。


    ```

    sudo pcs constraint order promote LinuxAOAG then start VirtualIP

    ```

    清单 6-26 创建排序约束


    最后，我们可以创建可用性组侦听器。侦听器将使用我们在 `pacemaker` 群集中创建的虚拟 IP 地址资源的 IP 地址。重要的是要记住，当在 `pacemaker`
    群集上配置可用性组时，可用性组侦听器的唯一目的是提供一个抽象，作为副本的单一入口点。它不能掩盖中断，因为在故障转移期间，当虚拟 IP 地址资源在另一个群集节点上启动时，它将暂时变得不可用。我们可以使用清单
    6-27 中的脚本来创建可用性组侦听器。


    ```sql

    USE master

    GO

    ALTER AVAILABILITY GROUP LinuxAOAG

    ADD LISTENER ''LinuxAOListener'' (

    WITH IP (

    (N''10.0.0.25'', N''255.255.255.0'')

    )

    , PORT=1433

    );

    GO

    ```

    清单 6-27 创建可用性组侦听器


    ## 总结


    可以在基于 Linux 的实例上配置可用性组，其方式与在基于 Windows 的实例上配置可用性组类似。它们可以在没有底层群集的情况下配置，也可以利用基于
    Linux 的群集技术。


    如果需要高可用性或灾难恢复，则必须使用 Linux 群集技术，例如 `pacemaker`。`pacemaker` 群集由多个组件组成，包括 `pcs`（用于管理
    `pacemaker` 群集的命令行实用程序）、`Corosync`（提供节点之间的心跳）、`STONITH`（用于隔离），以及 `Pacemaker`（核心群集管理器）。


    可用性组侦听器在 `pacemaker` 群集中受支持，但其功能有限。IP 地址资源在移动到新节点时会暂时离线。因此，可用性组侦听器提供了一种抽象，但不能掩盖故障，因为它将在一段时间内变得无法访问。

    '
- fmt: '## Availability Groups on Azure IaaS


    When migrating databases to the cloud, you have various options for the target.
    Azure SQL Database and Elastic Database Pools provide a database as a service
    offering, while Azure Managed Instances provide a SQL Server as a service. Both
    of these offerings provide high availability, based on Availability Groups. If
    your application requires access to the operating system, however, then you must
    use Azure VMs. With this solution, you must manually configure Availability Groups,
    as you would on-premise. In the following sections, we will look at some of the
    Azure Availability options that you should be aware of before designing your Availability
    Group topology, before exploring how to configure Availability Groups in Azure.


    ### Azure Availability Concepts


    A key principle of cloud is to design applications for failure. Therefore, implementing
    Availability Groups for SQL Server in cloud is a very important topic. Before
    discussing the implementation, you should be familiar with the concepts of Availability
    Sets, Availability Zones, and Regions. The following sections will provide an
    overview of each of these topics.


    #### Availability Sets


    `Availability Sets` are a construct that place VMs within the same data center
    on different fault domains and update domains. A fault domain indicates hardware
    that shares a common power supply and network switch. An `Availability Set` can
    be configured to stretch across three fault domains. Therefore, if you place three
    VMs in the same `Availability Set`, you know that each VM has a unique power supply
    and network switch to the other VMs in the `Availability Set`.


    An update domain indicates physical hardware that is rebooted for either planned
    or unplanned maintenance. An `Availability Set` is split across five update domains
    by default, and this can be increased to a maximum of 20. If you place VMs in
    the same `Availability Set`, you know that they are on different hardware from
    each other and will not be rebooted at the same time.


    **Tip**

    When making use of `Availability Sets`, you should also ensure that you use `Managed
    Disks`. When using `Managed Disks`, the physical disks are split across fault
    domains that align with attached VMs, avoiding single points of failure.


    #### Availability Zones


    While an `Availability Set` protects against hardware issues and downtime within
    a data center, it does not protect against data center failure. To protect against
    data center failure, you must place your VMs in separate `Availability Zones`.
    Each `Availability Zone` is in a different building, with separate power, networking,
    and cooling.


    #### Regions


    `Regions` provide a mean of dispersing your servers geographical, in order to
    protect against a large-scale disaster that takes an entire `Region` offline.
    `Regions` within Azure are paired within a Geography, where a Geography is a political
    region. For example, `Regions` in the United States are paired with other regions
    physically located in the United States. The same applies for other territories,
    such as Europe and the United Kingdom. This allows you to protect against a disaster
    while still maintaining data sovereignty.


    While I am aware of some companies, who have taken the stance that for DR, they
    only need to protect against the loss of a data center and have therefore decided
    to avoid the complexity and cost overhead of having a footprint in multiple regions,
    in cloud terms, you only have DR if your DR servers are in a different `Region`
    to your production servers.


    ### Implementing Availability Groups in Azure


    In this section, we will explore how to configure Availability Groups on Azure
    VMs. In this section, we will build an Availability Group for the `Sales` database
    across two `Availability Zones`, within the same region, for the purpose of providing
    high availability. We will build each of the VMs on different subnets, within
    the same vnet. Before that, however, we will briefly discuss `Availability Sets`.


    #### Creating an Availability Set


    To create an `Availability Set` from the `Azure Portal`, navigate to the `Availability
    Sets` blade and use the `Add` button to launch the `Create Availability Set` page,
    which is illustrated in Figure 7-1. You will notice that we have selected the
    `Subscription` that we want the `Availability Set` to be created in and selected
    the `Resource Group` in which it should be created. We have also given it a name
    and selected the `Region` that it should be created in. Because we plan to have
    two servers within the `Availability Set`, then both `Update Domains` and `Fault
    Domains` have been configured as two. Each of the two servers will reside in a
    different `Fault Domain` and `Update Domain`. If we added additional servers to
    the `Availability Set`, then they would be allocated to `Fault Domains` and `Update
    Domains` in a round-robin fashion.


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig1_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig1_HTML.jpg)


    Figure 7-1: Create an Availability Set


    On the `Advanced` page, illustrated in Figure 7-2, we have the option to assign
    a `Proximity Placement Group` to the `Availability Group`. A `Proximity Placement
    Group` helps ensure the lowest possible latency, by using hardware that is located
    physically close, within the data center. To use this option, you must create
    the `Proximity Group` before creating the `Availability Set`.


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig2_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig2_HTML.jpg)


    Figure 7-2: Create an Availability Set Advanced Page


    The `Tags` page allows you to assign key/value pairs of tags. Using tags is always
    good practice for cloud as it helps not only with resource management but also
    with cost control, such as producing show-back or charge-back mechanisms to business
    divisions that consume cloud resources. As shown in Figure 7-3, we have configured
    tags for `environment` and `application`.


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig3_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig3_HTML.jpg)


    Figure 7-3: Create an Availability Set – Tags Page


    **Tip**

    You can use `Azure Policies` to enforce specific tags are used when resources
    are created.


    On the `Review` page, you have the opportunity to review the settings that you
    have configured, before creating the resource.


    #### Create Availability Groups on Azure VMs


    In the following sections, we will discuss building and configuring an Availability
    Group solution on Azure.


    **Note**

    To follow demonstrations in the following sections, you will need an Azure subscription.
    This must be at least a pay-as-you-go subscription, as a free trial subscription
    will not give you enough cores to build the two servers. You will also need a
    vnet, with two subnets. The chapter also assumes that the either the vet contains
    a domain controller, or you have configured `Azure Domain Services`.'
