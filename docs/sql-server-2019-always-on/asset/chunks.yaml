    The Database Engine Configuration page consists of six tabs. The first of these
    is the Server Configuration tab, which is illustrated in Figure [4-13](#394392_3_En_4_Chapter.xhtml#Fig13).
    Here, we specify the authentication mode that the instance will use.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig13_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Install a SQL Server Failover Cluster – Server Configuration Tab


    Windows Authentication Mode means that the credentials that a user supplies when
    logging into Windows will be passed to SQL Server, and the user does not require
    any additional credentials to gain access to the instance. With mixed mode, although
    Windows credentials can still be used to access the instance, users can also be
    given second-tier credentials. If this option is selected, then SQL Server will
    hold its own login names and passwords for login created inside the instance,
    and users can supply these, in order to gain access, even if their Windows identity
    does not have permissions.


    For security best practice, it is a good idea to only allow Windows authentication
    to your instance. This is for two reasons. First, with Windows authentication
    only, if an attacker were to gain access to your network, then they would still
    not be able to access SQL Server, since they would not have a valid Windows account
    with the correct permissions. With mixed-mode authentication, however, once inside
    the network, attackers could use brute-force attacks or other hacking methodologies
    to attempt to gain access via a second-tier SQL Server Login. Second, if you specify
    mixed-mode authentication, then you are required to create an SA account. The
    SA account is a SQL Server user account that has administrative privileges over
    the instance. If the password for this account became compromised, then an attacker
    could gain administrative control over SQL Server. If mixed-mode authentication
    must be used, it is a good idea to disable the SA account.


    Mixed-mode authentication is a necessity in some cases, however. For example,
    you may have a legacy application that does not support Windows authentication,
    or a third-party application that has a hard-coded connection that uses second-tier
    authentication. These would be two valid reasons why mixed-mode authentication
    may be required. Another valid reason would be if you have users that need to
    access the instance from a nontrusted domain.


