  trans: '# 第 3 章 集群实施


    工程师可能会觉得构建和配置集群的过程很复杂，并且他们可以实现该模式的许多变体。虽然数据库管理员（DBA）可能并不总是需要自己构建集群，但他们确实需要熟悉相关技术，并且经常需要在此过程中提供意见。他们可能还会参与解决集群中发现的问题。


    基于这些原因，本章将讨论如何在 Windows 层面构建集群，并探讨一些可能的配置方案。本章的演示使用一个预构建的环境，该环境由两台服务器组成：`ClusterNode1`
    和 `ClusterNode2`。这两台服务器都位于名为 `AlwaysOn.com` 的域中。一个存储区域网络（SAN）向这两个节点提供了五个卷，这些卷已在
    `ClusterNode1` 上联机并格式化，具体配置详见表 `3-1`。


    表 3-1 磁盘配置


    | 驱动器号 | 卷标 | 大小 | 注释 |

    | --- | --- | --- | --- |

    | F | 数据 | 10GB | 托管 SQL Server 数据文件 |

    | L | 日志 | 3GB | 托管 SQL Server 日志文件 |

    | T | TempDB | 3GB | 托管 TempDB 数据和日志文件 |

    | M | MSDTC | 1GB | 托管与 MSDTC 角色相关的文件 |

    | H | 仲裁 | 1GB | 托管基于磁盘的仲裁见证 |


    **提示**


    您可能会惊讶于数据和日志文件只分配了一个卷，因为 DBA 的本能反应是将这些文件分开放置到不同的驱动器上。这里需要记住的重要一点是，我们使用的是 SAN，并且极有可能即使我们使用了不同的卷，这些卷也位于相同的物理磁盘轴上，这意味着这种分离仅仅是逻辑上的。此外，如果要使用
    SAN 快照，某些 SAN 可能要求数据和日志文件存储在同一卷上以确保数据一致性。


    本章的场景要求我们构建一个具有磁盘见证的双节点故障转移集群。在此之前，我们需要配置 Windows 集群服务（`WCS`）。我们还需要配置一个`MSDTC`（Microsoft
    分布式事务处理协调器）集群角色，以为`SSIS`（SQL Server Integration Services）提供分布式事务协调。此外，我们还需要配置：


    *   `MSDTC`角色在故障转移时具有高优先级（相对于同一集群上的其他角色）。

    *   在任意 24 小时期内允许进行三次故障转移。

    *   允许立即故障恢复。


    因此，我们将执行的任务完整列表如下：


    *   安装故障转移集群功能。

    *   构建一个名为`ALWAYSON-C`的 Windows 集群。

    *   正确配置仲裁。

    *   创建一个名为`ALWAYSON-MSDTC-C`的`MSDTC`集群角色。

    *   配置`MSDTC`角色的属性。

    *   配置`MSDTC`角色的故障转移属性。


    **提示**


    如果您希望出于学习目的构建集群，但无法访问域或 SAN，那么集群的新功能允许您模拟一个非常相似的拓扑。可以使用两台虚拟机作为集群节点。第三台运行 Windows
    `iSCSI Target`功能的虚拟机可以用来向这两个节点呈现共享存储。更佳的选择是——Windows Server 2016 及更高版本允许在工作组上创建集群，这意味着无需额外创建一台虚拟机作为域控制器。但请注意，在工作组内创建集群仅在`PowerShell`中受支持，无法通过故障转移集群管理器完成。同样重要的是要意识到，从
    SQL Server 的角度来看，可用性组在工作组集群上是受支持的，但故障转移集群实例则不受支持。


    ## 构建集群


    在安装 SQL Server AlwaysOn 故障转移集群实例之前，您必须准备组成集群的服务器（称为节点），并在它们之上构建一个 Windows 集群。以下部分将演示如何执行这些活动。


    ### 安装故障转移集群功能


    为了构建集群，我们首先需要在每个节点上安装故障转移集群功能。为此，我们需要在`服务器管理器`中选择`添加角色和功能`选项。这将打开`添加角色和功能向导`。该向导的第一页提供了先决条件指南，如图`3-1`所示。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig1_HTML.jpg](img/394392_3_En_3_Fig1_HTML.jpg)


    图 3-1 “开始之前”页面


    在`安装类型`页面上，确保选中`基于角色或基于功能的安装`，如图`3-2`所示。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig2_HTML.jpg](img/394392_3_En_3_Fig2_HTML.jpg)


    图 3-2 “安装类型”页面


    在`服务器选择`页面上，确保选中了您当前正在配置的集群节点，如图`3-3`所示。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig3_HTML.jpg](img/394392_3_En_3_Fig3_HTML.jpg)


    图 3-3 “服务器选择”页面


    向导的`服务器角色`页面允许您选择任何想要配置的服务器角色。如图`3-4`所示，这可以包括`应用程序服务器`或`DNS 服务器`等角色，但在我们的情况下，这并不适用，因此我们直接转到下一个界面。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig4_HTML.jpg](img/394392_3_En_3_Fig4_HTML.jpg)


    图 3-4 “服务器角色”页面


    在向导的`功能`页面上，我们需要选择`故障转移集群`，如图`3-5`所示。这就满足了构建 Windows 集群的先决条件。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig5_HTML.jpg](img/394392_3_En_3_Fig5_HTML.jpg)


    图 3-5 “功能”页面


    当您选择`故障转移集群`时，向导会显示一个屏幕（图`3-6`），询问您是否要安装管理工具，表现为一个复选框。如果您计划直接从节点管理集群，请勾选此选项。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig6_HTML.jpg](img/394392_3_En_3_Fig6_HTML.jpg)


    图 3-6 选择管理工具


    在向导的最后一页，您可以看到将要安装的功能摘要，如图`3-7`所示。在这里，您可以根据需要指定 Windows 安装介质的位置。您还可以选择服务器是否应在需要时自动重启。如果您正在配置一台新服务器，勾选此框是合理的。但是，如果服务器已在生产环境中运行，当您添加此功能时，请确保考虑服务器上当前运行的内容，以及是否应该等待维护窗口再执行重启（如果需要的话）。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig7_HTML.jpg](img/394392_3_En_3_Fig7_HTML.jpg)


    图 3-7 “确认”页面


    除了通过`服务器管理器`安装，集群服务也可以通过`PowerShell`安装。清单`3-1`中的`PowerShell`命令可实现与上述步骤相同的结果。


    ```

    Install-WindowsFeature -Name Failover-Clustering –IncludeManagementTools -Verbose

    ```


    清单 3-1 安装集群服务'
- fmt: '### Creating the Cluster


    Once clustering has been installed on both nodes, you can begin building the cluster.
    To do this, connect to the server that you intended to be the active node, and
    run Failover Cluster Manager from Administrative Tools.


    The Before You Begin page of the Create Cluster Wizard warns that Microsoft only
    supports clusters that pass all verification tests, as shown in Figure 3-8. The
    message also warns that you must be a local administrator on each node of the
    cluster. In previous versions of Windows Server, this meant that you must use
    a domain account that has local administrator rights on each server that will
    participate in the cluster. From Windows Server 2016 onward, however, the reliance
    on domain authentication has been removed, and the only requirement is that an
    account with local administrator rights exists on each node that has a consistent
    name and password. This allows for the creation of a cluster on a workgroup, or
    across multiple domains. Neither of these options were available in previous versions
    of Windows Server.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig8_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig8_HTML.jpg)

    Figure 3-8

    The Before You Begin Page


    On the Select Servers screen of the wizard, you need to enter the names of the
    cluster nodes. This is illustrated in Figure 3-9. In our case, our cluster nodes
    are named `ClusterNode1` and `ClusterNode2`, respectively. If they were part of
    a domain, however, then the domain name and suffix would be appended to the server
    name.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig9_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig9_HTML.jpg)

    Figure 3-9

    The Select Servers Page


    On the Validation Warnings page, you are asked if you wish to run the validation
    tests against the cluster. You should always choose to run this validation for
    production servers, because Microsoft will not offer support for the cluster unless
    it has been validated. Choosing to run the validation tests invokes the Validate
    a Configuration Wizard. You can also run this wizard independently from the Management
    pane of Failover Cluster Manager. The Validation Warnings page is shown in Figure
    3-10.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig10_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig10_HTML.jpg)

    Figure 3-10

    The Validation Warning Page


    Tip

    There are some situations in which validation is not possible, and in these instances,
    you need to select the No, I Do Not Require Support… option. For example, some
    DBAs choose to install one-node clusters instead of stand-alone instances so that
    they can be scaled up to full clusters in the future, if need be. This approach
    can cause operational challenges for Windows administrators, however, so use it
    with extreme caution.


    After you pass through the Before You Begin page of the Validate a Configuration
    Wizard, you see the Testing Options page. Here, you are given the option of either
    running all validation tests or selecting a subset of tests to run, as illustrated
    in Figure 3-11. Normally when you are installing a new cluster, you want to run
    all validation tests, but it is useful to be able to select a subset of tests
    if you invoke the Validate a Configuration Wizard independently after you make
    a configuration change to the cluster.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig11_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig11_HTML.jpg)

    Figure 3-11

    The Testing Options Page


    On the Confirmation page of the wizard, illustrated in Figure 3-12, you are presented
    with a summary of tests that will run and the cluster nodes that they will run
    against. The list of tests is comprehensive and includes the following categories:


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig12_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig12_HTML.jpg)

    Figure 3-12

    The Confirmation Page


    *   Inventory (such as identifying any unsigned drivers)

    *   Network (such as checking for a valid IP configuration)

    *   Storage (such as validating the ability to fail disks over, between nodes)

    *   System Configuration (such as validating the configuration of Active Directory)


    The Summary page, shown in Figure 3-13, provides the results of the tests and
    also a link to an HTML version of the report. Make sure to examine the results
    for any errors or warnings. You should always resolve errors before continuing,
    but some warnings may be acceptable. For example, if you are building your cluster
    to host AlwaysOn Availability Groups, you may not have any shared storage. This
    will generate a warning but is not an issue in this scenario. Configuring AlwaysOn
    Availability Groups on Windows will be discussed in further detail in Chapter
    5.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig13_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig13_HTML.jpg)

    Figure 3-13

    The Summary Page


    The View Report button displays the full version of the validation report, as
    shown in Figure 3-14. The hyperlinks take you to a specific category within the
    report, where further hyperlinks are available for each test. These allow you
    to drill down to messages generated for the specific test, making it easy to identify
    errors.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig14_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig14_HTML.jpg)

    Figure 3-14

    The Failover Cluster Validation Report


    Clicking Finish on the Summary page returns you to the Create Cluster Wizard,
    where you are greeted with the Access Point for Administering the Cluster page.
    This screen is illustrated in Figure 3-15. On this page, you need to enter the
    virtual name of your cluster. We will name our cluster `ALWAYSON-C`. If the network
    card is configured to acquire an IP Address automatically, then an IP Address
    will be assigned using DHCP. Otherwise, you will be required to enter an IP Address
    manually. This is known as a static IP, as it will remain constant, whereas an
    IP Address assigned through DHCP may change. I strongly recommend using a static
    IP for cluster access points to avoid dynamic routing issues, but this can be
    changed after the cluster has been created.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig15_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig15_HTML.jpg)

    Figure 3-15

    The Access Point for Administering the Cluster Page


    Note

    The virtual name and IP address are bound to whichever node is active, meaning
    that the cluster is always accessible in the event of failover.


    In our case, the cluster resides within a simple domain, a single site, and a
    single subnet. If you are configuring a multi-subnet cluster, however, then the
    wizard detects this, and IP Addresses will be required for each subnet. In this
    scenario, you need to enter an IP address for each subnet.


    Note

    Each of the two NICs within a node is configured on a separate subnet so that
    the heartbeat between the nodes is segregated from the public network. However,
    a cluster is only regarded as multi-subnet if the data NICs of the cluster nodes
    reside in different subnets.


    Tip

    If your cluster will reside within a domain, and if you do not have permissions
    to create AD (Active Directory) objects in the OU (organizational unit) that contains
    your cluster, then the VCO (virtual computer object) for the cluster must already
    exist and you must have the Full Control permission assigned.


    The Confirmation page displays a summary of the cluster that is created. You can
    also use this screen to specify whether or not all eligible storage should be
    added to the cluster, which is generally a useful feature. This screen is displayed
    in Figure 3-16.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig16_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig16_HTML.jpg)

    Figure 3-16

    The Confirmation Page


    After the cluster has been built, the Summary page shown in Figure 3-17 displays.
    This screen summarizes the cluster name, IP address, nodes, the quorum model that
    have been configured, and details of any warnings regarding the cluster. It also
    provides a link to an HTML (Hypertext Markup Language) version of the report.


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig17_HTML.jpg](images/394392_3_En_3_Chapter/394392_3_En_3_Fig17_HTML.jpg)

    Figure 3-17

    The Summary Page


    The Create Cluster report displays a complete list of tasks that have been completed
    during the cluster build.


    We could also have used PowerShell to create the cluster. The script in Listing
    3-2 runs the cluster validation tests using the `Test-Cluster` cmdlet, before
    using the `New-Cluster` cmdlet to configure the cluster.


    ```

    #Run the validation tests

    Test-Cluster -Node Clusternode1,Clusternode2

    #Create the cluster

    New-Cluster -Node ClusterNode1,ClusterNode2 -Name ALWAYSON-C

    Listing 3-2

    Validating and Creating the Cluster

    ```'
