  trans: '

    ### 从集群中移除节点


    > **注意**

    >

    > 如果您希望遵循本书后续的演示操作，请勿按照本节中的演示进行操作。


    如果您希望卸载一个 AlwaysOn 故障转移群集实例，您无法像处理独立实例那样从控制面板执行此操作。相反，您必须在集群的每个节点上运行“移除节点向导”。您可以通过在
    SQL Server 安装中心的“维护”选项卡中选择 **从 SQL Server 故障转移群集中移除节点** 选项来调用此向导。


    该向导首先运行全局规则检查，然后是移除节点的规则检查。接着，在如图 8-3 所示的“群集节点配置”页面上，系统会要求您确认要从中移除节点的实例。如果群集承载多个实例，您可以从下拉框中选择适当的实例。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig3_HTML.jpg](img/394392_3_En_8_Fig3_HTML.jpg)

    *图 8-3. 群集节点配置页面*


    在“准备移除节点”页面上，系统会提供将要执行的任务摘要。确认详情后，实例将被移除。此过程应在所有被动节点上重复，最后在活动节点上执行。当实例从最后一个节点移除时，群集角色也会被移除。


    要使用 PowerShell 移除节点，我们需要运行 SQL Server 的 `setup.exe` 应用程序，并将操作参数配置为 `RemoveNode`。当您使用
    PowerShell 移除节点时，表 8-1 中的参数是必需的。


    *表 8-1. 从集群中移除节点时的必需参数*


    | 参数 | 用法 |

    | :--- | :--- |

    | `/ACTION` | 必须配置为 `RemoveNode`。 |

    | `/INSTANCENAME` | 您正在添加额外节点以支持的实例。 |

    | `/CONFIRMIPDEPENDENCYCHANGE` | 允许为多子网群集指定多个 IP 地址。传入值 `1` 表示 `True`，`0` 表示 `False`。
    |


    清单 8-3 中的脚本在从 SQL Server 安装介质的根目录运行时，会从我们的集群中移除一个节点。


    ```

    .\setup.exe /ACTION="RemoveNode" /INSTANCENAME="ALWAYSON-SQL-C" /CONFIRMIPDEPENDENCYCHANGE=0
    /qs

    ```

    *清单 8-3. 移除节点*


    ## 管理 AlwaysOn 可用性组


    一旦您的可用性组初始设置完成，您仍然需要执行管理任务。这些任务包括故障转移可用性组、进行监控，以及在极少数情况下添加额外的监听器。以下各节将讨论这些主题。


    ### 故障转移


    如果一个副本处于同步提交模式并配置为自动故障转移，那么当满足主副本上的错误条件时，可用性组会自动转移到冗余副本。然而，有些时候您可能希望手动故障转移可用性组。这可能是因为灾难恢复测试、主动维护，或者由于主副本或主数据中心发生故障后需要启动异步副本。


    #### 同步故障转移


    如果您希望故障转移一个处于同步提交模式的副本，请通过在对象资源管理器中右键单击可用性组并选择 **故障转移** 来启动“故障转移可用性组向导”。在跳过“简介”页面后，您将找到“选择新的主副本”页面（参见图
    8-4）。在此页面上，勾选您希望故障转移到的副本对应的复选框。但在执行此操作之前，请检查“故障转移就绪”列，以确保副本已同步且不会发生数据丢失。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig4_HTML.jpg](img/394392_3_En_8_Fig4_HTML.jpg)

    *图 8-4. 选择新的主副本页面*


    在如图 8-5 所示的“连接到副本”页面上，使用 **连接** 按钮建立到新主副本的连接。


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig5_HTML.jpg](img/394392_3_En_8_Fig5_HTML.jpg)

    *图 8-5. 连接到副本页面*


    在“摘要”页面上，系统会提供将要执行的任务详情，随后在“结果”页面上显示进度指示器。故障转移完成后，请检查所有任务是否成功，并调查收到的任何错误或警告。


    我们也可以使用 T-SQL 来故障转移可用性组。清单 8-4 中的命令可以达到相同的效果。请确保从将成为新主副本的副本运行此脚本。如果您从当前主副本运行，请使用
    SQLCMD 模式并在脚本内连接到新的主副本。


    ```

    ALTER AVAILABILITY GROUP HR FAILOVER ;

    GO

    ```

    *清单 8-4. 故障转移可用性组*

    '
- fmt: '### 异步故障转移


    如果您的可用性组处于异步提交模式，那么从技术角度来看，您可以按照与同步提交模式副本类似的方式进行故障转移，区别在于您需要强制故障转移，从而承担数据丢失的风险。您可以使用清单
    [8-5](#394392_3_En_8_Chapter.xhtml#PC5) 中的命令强制进行故障转移。您应该在将成为新主副本的实例上运行此脚本。要使其工作，集群必须具有仲裁。如果没有，则需要在强制可用性组联机之前强制集群联机。


    ```sql

    ALTER AVAILABILITY GROUP HR FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    ```


    清单 8-5

    强制故障转移


    从流程角度来看，仅当您的主站点完全不可用时才应执行此操作。如果不是这种情况，首先应将应用程序置于安全状态。这避免了任何数据丢失的可能性。我在生产环境中通常通过执行以下步骤来实现：


    1.  禁用登录。

    2.  将副本的模式更改为同步提交模式。

    3.  进行故障转移。

    4.  将副本更改回异步提交模式。

    5.  启用登录。


    您可以使用清单 [8-6](#394392_3_En_8_Chapter.xhtml#PC6) 中的脚本执行这些步骤。当从 DR 实例运行时，此脚本在故障转移前将
    `HR` 中的数据库置于安全状态，然后重新配置应用程序以在正常操作下工作。


    ```sql

    --DISABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''HR'' ;

    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    UserName NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings ;

    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] DISABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName <> SUSER_NAME()

    FOR XML PATH ('''')

    )

    EXEC(@SQL)

    GO

    --SWITCH TO SYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP HR

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = SYNCHRONOUS_COMMIT)
    ;

    GO

    --FAIL OVER

    ALTER AVAILABILITY GROUP HR FAILOVER

    GO

    --SWITCH BACK TO ASYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP HR

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT)
    ;

    GO

    --ENABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''HR'' ;

    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings

    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] ENABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName <> SUSER_NAME()

    FOR XML PATH ('''')

    ) ;

    EXEC(@SQL)

    ```


    清单 8-6

    将应用程序置于安全状态并进行故障转移


    ### 故障转移分布式可用性组


    分布式可用性组不支持自动故障转移；仅支持手动故障转移。当您需要在分布式可用性组内故障转移到辅助可用性组时，应执行以下步骤：


    *   将同步模式设置为同步提交。

    *   等待辅助可用性组变为同步状态。

    *   将主可用性组设置为承担辅助角色。

    *   强制故障转移。


    清单 [8-7](#394392_3_En_8_Chapter.xhtml#PC7) 中的脚本将强制故障转移第 [6](#394392_3_En_6_Chapter.xhtml)
    章讨论的分布式可用性组。


    ```sql

    --Set the secondary Availability Group to synchronous commit mode

    ALTER AVAILABILITY GROUP DistributedAG

    MODIFY

    AVAILABILITY GROUP ON

    ''HR'' WITH

    (

    LISTENER_URL = ''tcp://HRListener.alwayson.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = MANUAL

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = MANUAL

    );

    --Wait until the Availability Groups are synchronized

    WHILE (SELECT COUNT(DISTINCT synchronization_state_desc)

    FROM (

    SELECT

    ag.name

    , drs.database_id

    , drs.group_id

    , drs.replica_id

    , drs.synchronization_state_desc

    , drs.end_of_log_lsn

    FROM sys.dm_hadr_database_replica_states drs

    INNER JOIN sys.availability_groups ag

    ON drs.group_id = ag.group_id

    WHERE ag.name = ''HR''

    AND synchronization_state_desc = ''synchronized''

    ) a

    ) > 1

    BEGIN

    WAITFOR DELAY''00:00:05'' ;

    END

    --Assign the primary Availability Group, the secondary role

    ALTER AVAILABILITY GROUP DistributedAG SET (ROLE = SECONDARY) ;

    --Force the failover

    ALTER AVAILABILITY GROUP DistributedAG FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    ```


    清单 8-7

    故障转移分布式可用性组


    ### 同步未包含对象


    无论您使用哪种方法进行故障转移，假设可用性组中的所有数据库都未包含，则需要确保实例级对象已同步。保持实例级对象同步的最直接方法是实现一个 SSIS 包，该包被调度为定期运行。


    无论您选择调度 SSIS 包执行还是选择其他方法（例如在辅助服务器上编写脚本并重新创建对象的 SQL Server Agent 作业），这些都是您应考虑同步的对象：


    *   登录名

    *   凭据

    *   SQL Server Agent 作业

    *   自定义错误消息

    *   链接服务器

    *   服务器级事件通知

    *   `master` 数据库中的存储过程

    *   服务器级触发器

    *   加密密钥和证书'
  raw: '#### Asynchronous Failover


    If your availability group is in Asynchronous Commit mode, then from a technical
    standpoint, you can fail over in a similar way to the way you can for a replica
    running in Synchronous Commit mode, except for the fact that you need to force
    the failover, thereby accepting the risk of data loss. You can force failover
    by using the command in Listing [8-5](#394392_3_En_8_Chapter.xhtml#PC5). You should
    run this script on the instance that will be the new primary. For it to work,
    the cluster must have quorum. If it doesn’t, then you need to force the cluster
    online before you force the availability group online.


    ```

    ALTER AVAILABILITY GROUP HR FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    Listing 8-5

    Forcing Failover

    ```


    From a process perspective, you should only ever do this if your primary site
    is completely unavailable. If this is not the case, first put the application
    into a safe state. This avoids any possibility of data loss. The way that I normally
    achieve this in a production environment is by performing the following steps:


    1.  Disable logins.


    2.  Change the mode of the replica to Synchronous Commit mode.


    3.  Fail over.


    4.  Change the replica back to Asynchronous Commit mode.


    5.  Enable the logins.


    You can perform these steps with the script in Listing [8-6](#394392_3_En_8_Chapter.xhtml#PC6).
    When run from the DR instance, this script places the databases in `HR` into a
    safe state before failing over, and then it reconfigures the application to work
    under normal operations.


    ```

    --DISABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''HR'' ;

    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    UserName NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings ;

    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] DISABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName  SUSER_NAME()

    FOR XML PATH ('''')

    )

    EXEC(@SQL)

    GO

    --SWITCH TO SYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP HR

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = SYNCHRONOUS_COMMIT)
    ;

    GO

    --FAIL OVER

    ALTER AVAILABILITY GROUP HR FAILOVER

    GO

    --SWITCH BACK TO ASYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP HR

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT)
    ;

    GO

    --ENABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''HR'' ;

    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings

    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] ENABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName  SUSER_NAME()

    FOR XML PATH ('''')

    ) ;

    EXEC(@SQL)

    Listing 8-6

    Safe-Stating an Application and Failing Over

    ```


    #### Failing Over a Distributed Availability Group


    Distributed availability groups do not support automatic failover; only manual
    failover is supported. When you need to fail over to a secondary Availability
    Group, within a Distributed Availability Group, you should perform the following
    steps:


    *   Set the synchronization mode to synchronous commit.


    *   Wait for the secondary Availability Group to become synchronized.


    *   Set the primary Availability Group to take the role of the secondary.


    *   Force Failover.


    The script in Listing [8-7](#394392_3_En_8_Chapter.xhtml#PC7) will force failover
    for the Distributed Availability Group discussed in Chapter [6](#394392_3_En_6_Chapter.xhtml).


    ```

    --Set the secondary Availability Group to synchronous commit mode

    ALTER AVAILABILITY GROUP DistributedAG

    MODIFY

    AVAILABILITY GROUP ON

    ''HR'' WITH

    (

    LISTENER_URL = ''tcp://HRListener.alwayson.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = MANUAL

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = MANUAL

    );

    --Wait until the Availability Groups are synchronized

    WHILE (SELECT COUNT(DISTINCT synchronization_state_desc)

    FROM (

    SELECT

    ag.name

    , drs.database_id

    , drs.group_id

    , drs.replica_id

    , drs.synchronization_state_desc

    , drs.end_of_log_lsn

    FROM sys.dm_hadr_database_replica_states drs

    INNER JOIN sys.availability_groups ag

    ON drs.group_id = ag.group_id

    WHERE ag.name = ''HR''

    AND synchronization_state_desc = ''synchronized''

    ) a

    ) > 1

    BEGIN

    WAITFOR DELAY''00:00:05'' ;

    END

    --Assign the primary Availability Group, the secondary role

    ALTER AVAILABILITY GROUP DistributedAG SET (ROLE = SECONDARY) ;

    --Force the failover

    ALTER AVAILABILITY GROUP DistributedAG FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    Listing 8-7

    Fail Over a Distributed Availability Group

    ```


    ### Synchronizing Uncontained Objects


    Regardless of the method you use to fail over, assuming that all of the databases
    within the availability group are not contained, then you need to ensure that
    instance-level objects are synchronized. The most straightforward way to keep
    your instance-level objects synchronized is by implementing an SSIS package, which
    is scheduled to run on a periodic basis.


    Whether you choose to schedule a SSIS package to execute or you choose a different
    approach, such as a SQL Server Agent job that scripts and re-creates the objects
    on the secondary servers, these are the objects that you should consider synchronizing:


    *   Logins


    *   Credentials


    *   SQL Server Agent jobs


    *   Custom error messages


    *   Linked servers


    *   Server-level event notifications


    *   Stored procedures in Master


    *   Server-level triggers


    *   Encryption keys and certificates'
  trans: '### 异步故障转移


    如果您的可用性组处于异步提交模式，那么从技术角度来看，您可以按照与同步提交模式副本类似的方式进行故障转移，区别在于您需要强制故障转移，从而承担数据丢失的风险。您可以使用清单
    8-5 中的命令强制进行故障转移。您应该在将成为新主副本的实例上运行此脚本。要使其工作，集群必须具有仲裁。如果没有，则需要在强制可用性组联机之前强制集群联机。


    ```sql

    ALTER AVAILABILITY GROUP HR FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    ```

    清单 8-5

    强制故障转移


    从流程角度来看，仅当您的主站点完全不可用时才应执行此操作。如果不是这种情况，首先应将应用程序置于安全状态。这避免了任何数据丢失的可能性。我在生产环境中通常通过执行以下步骤来实现：


    1.  禁用登录。

    2.  将副本的模式更改为同步提交模式。

    3.  进行故障转移。

    4.  将副本更改回异步提交模式。

    5.  启用登录。


    您可以使用清单 8-6 中的脚本执行这些步骤。当从 DR 实例运行时，此脚本在故障转移前将 `HR` 中的数据库置于安全状态，然后重新配置应用程序以在正常操作下工作。


    ```sql

    --DISABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''HR'' ;

    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    UserName NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings ;

    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] DISABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName <> SUSER_NAME()

    FOR XML PATH ('''')

    )

    EXEC(@SQL)

    GO

    --SWITCH TO SYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP HR

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = SYNCHRONOUS_COMMIT)
    ;

    GO

    --FAIL OVER

    ALTER AVAILABILITY GROUP HR FAILOVER

    GO

    --SWITCH BACK TO ASYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP HR

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT)
    ;

    GO

    --ENABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''HR'' ;

    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings

    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] ENABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName <> SUSER_NAME()

    FOR XML PATH ('''')

    ) ;

    EXEC(@SQL)

    ```

    清单 8-6

    将应用程序置于安全状态并进行故障转移


    ### 故障转移分布式可用性组


    分布式可用性组不支持自动故障转移；仅支持手动故障转移。当您需要在分布式可用性组内故障转移到辅助可用性组时，应执行以下步骤：


    *   将同步模式设置为同步提交。

    *   等待辅助可用性组变为同步状态。

    *   将主可用性组设置为承担辅助角色。

    *   强制故障转移。


    清单 8-7 中的脚本将强制故障转移第 6 章讨论的分布式可用性组。


    ```sql

    --Set the secondary Availability Group to synchronous commit mode

    ALTER AVAILABILITY GROUP DistributedAG

    MODIFY

    AVAILABILITY GROUP ON

    ''HR'' WITH

    (

    LISTENER_URL = ''tcp://HRListener.alwayson.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = MANUAL

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = MANUAL

    );

    --Wait until the Availability Groups are synchronized

    WHILE (SELECT COUNT(DISTINCT synchronization_state_desc)

    FROM (

    SELECT

    ag.name

    , drs.database_id

    , drs.group_id

    , drs.replica_id

    , drs.synchronization_state_desc

    , drs.end_of_log_lsn

    FROM sys.dm_hadr_database_replica_states drs

    INNER JOIN sys.availability_groups ag

    ON drs.group_id = ag.group_id

    WHERE ag.name = ''HR''

    AND synchronization_state_desc = ''synchronized''

    ) a

    ) > 1

    BEGIN

    WAITFOR DELAY''00:00:05'' ;

    END

    --Assign the primary Availability Group, the secondary role

    ALTER AVAILABILITY GROUP DistributedAG SET (ROLE = SECONDARY) ;

    --Force the failover

    ALTER AVAILABILITY GROUP DistributedAG FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    ```

    清单 8-7

    故障转移分布式可用性组


    ### 同步未包含对象


    无论您使用哪种方法进行故障转移，假设可用性组中的所有数据库都未包含，则需要确保实例级对象已同步。保持实例级对象同步的最直接方法是实现一个 SSIS 包，该包被调度为定期运行。


    无论您选择调度 SSIS 包执行还是选择其他方法（例如在辅助服务器上编写脚本并重新创建对象的 SQL Server Agent 作业），这些都是您应考虑同步的对象：


    *   登录名

    *   凭据

    *   SQL Server Agent 作业

    *   自定义错误消息

    *   链接服务器

    *   服务器级事件通知

    *   `master` 数据库中的存储过程

    *   服务器级触发器

    *   加密密钥和证书'
- fmt: '### Adding Multiple Listeners


    Usually, each availability group has a single Availability Group Listener, but
    there are some rare instances in which you may need to create multiple listeners
    for the same availability group. One scenario in which this may be required is
    if you have legacy applications with hard-coded connection strings. Here, you
    can create an extra listener with a client access point that matches the name
    of the hard-coded connection string.


    As mentioned earlier in this chapter, it is not possible to create a second Availability
    Group Listener through `SQL Server Management Studio`, `T-SQL`, or even `PowerShell`.
    Instead, we must use Failover Cluster Manager. Here, we create a new `Client Access
    Point` resource within our `HR` role. To do this, we select `Add Resource` from
    the context menu of the `HR` role and then select `Client Access Point`. This
    causes the `New Resource Wizard` to be invoked. The `Client Access Point` page
    of the wizard is illustrated in Figure 8-6. You can see that we have entered the
    DNS name for the client access point and specified an IP address from each subnet.


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig6_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig6_HTML.jpg)


    Figure 8-6: The Client Access Point Page


    On the `Confirmation` page, we are shown a summary of the configuration that will
    be performed. On the `Configure Client Access Point` page, we see a progress indicator,
    before we are finally shown a completion summary on the `Summary` page, which
    is illustrated in Figure 8-7.


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig7_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig7_HTML.jpg)


    Figure 8-7: The Confirmation Page


    Now, we need to configure the Availability Group resource to be dependent upon
    the new client access point. To do this, we select `Properties` from the context
    menu of the `HR` resource and then navigate to the `Dependencies` tab. Here, we
    add the new client access point as a dependency and configure an `OR` constraint
    between the two listeners, as illustrated in Figure 8-8. Once we apply this change,
    clients are able to connect using either of the two listener names.


    ![../images/394392_3_En_8_Chapter/394392_3_En_8_Fig8_HTML.jpg](images/394392_3_En_8_Chapter/394392_3_En_8_Fig8_HTML.jpg)


    Figure 8-8: The Dependencies Tab


    ### Other Administrative Considerations


    When databases are made highly available with AlwaysOn Availability Groups, several
    limitations are imposed. One of the most restrictive of these is that databases
    cannot be placed in `single_user` mode or be made `read_only`. This can have an
    impact when you need to safe-state your application for maintenance. This is why
    in the “Failover” section of this chapter, we disabled the logins that have users
    mapped to the databases. If you must place your database in `single-user` mode,
    then you must first remove it from the availability group.


    A database can be removed from an availability group by running the command in
    Listing 8-8. This command removes the `Customers` database from the `Sales` availability
    group.


    ```

    ALTER DATABASE Customers SET HADR OFF ;

    ```

    Listing 8-8: Removing a Database from an Availability Group


    There may also be occasions in which you want a database to remain in an availability
    group, but you wish to suspend data movement to other replicas. This is usually
    because the availability group is in Synchronous Commit mode and you have a period
    of high utilization, where you need a performance improvement. You can suspend
    the data movement to a database by using the command in Listing 8-9, which suspends
    data movement for the `Sales` database and then resumes it.


    > **Caution**

    >

    > If you suspend data movement, the transaction log on the primary replica continues
    to grow, and you are not able to truncate it until data movement resumes and the
    databases are synchronized.


    ```

    ALTER DATABASE Sales SET HADR SUSPEND ;

    GO

    ALTER DATABASE Sales SET HADR RESUME ;

    GO

    ```

    Listing 8-9: Suspending Data Movement


    Another important consideration is the placement of database and log files. These
    files must be in the same location on each replica. This means that if you use
    named instances, it is a hard technical requirement that you change the default
    file locations for data and logs, because the default location includes the name
    of the instance. This is assuming, of course, that you do not use the same instance
    name on each node, which would defy many of the benefits of having a named instance.


    ### Summary


    Failover to a synchronous replica in the event of a failure of the primary replica
    is automatic. There are instances, however, in which you will also need to fail
    over manually. This could be because of a disaster that requires failover to the
    DR site, or it could be for proactive maintenance. Although it is possible to
    fail over to an asynchronous replica with the possibility of data loss, it is
    good practice to place the databases in a safe-state first. Because you cannot
    place a database in `read-only` or `single_user` mode, if it is participating
    in an availability group, safe-stating usually consists of disabling the logins
    and then switching to Synchronous Commit mode before failover.


    To monitor availability groups throughout the enterprise, you need to use a monitoring
    tool, such as Systems Operation Center. If you need to monitor a small number
    of availability groups or troubleshoot a specific issue, however, use one of the
    tools included with SQL Server, such as a dashboard for monitoring the health
    of the topology, and an extended events session, called the `AlwaysOn Health Trace`.


    One benefit of achieving high availability for SQL Server is that doing so allows
    you to minimize downtime during planned maintenance. On a two-node cluster, you
    can upgrade the passive node, fail over, and then upgrade the active node. For
    larger clusters, you can perform a rolling patch upgrade, which involves removing
    half of the nodes from the possible owners list and upgrading them. You then fail
    over the instance to one of the upgraded nodes and repeat the process for the
    remaining nodes. This mitigates the risk of mixed version, across the possible
    owners.


    ## 9. Monitoring AlwaysOn Availability Groups


    Once you have implemented Availability Groups, you need to monitor them and respond
    to any errors or warnings that could affect the availability of your data. If
    you have many availability groups implemented throughout the enterprise, then
    the only way to monitor them effectively and holistically is by using an enterprise
    monitoring tool, such as `SOC (Systems Operations Center)`. If you only have a
    small number of availability groups, however, or if you are troubleshooting a
    specific issue, then SQL Server provides the `AlwaysOn Dashboard` and the `AlwaysOn
    Health Trace`. You can also create your own `Extended Events` sessions to monitor
    Availability Groups. This chapter will discuss each of these monitoring possibilities.'
