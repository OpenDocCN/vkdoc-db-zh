    ## 无集群可用性组


    无集群可用性组首次出现于 SQL Server 2017，是支持 Linux 的副产品，但对于在 Windows 环境中支持实例的 SQL Server 数据库管理员也同样有价值。


    无集群实现不适合高可用性场景。这有几个原因。首先，因为没有集群，所以没有运行状况检查。这意味着无法自动仲裁故障转移。其次，虽然可以在副本之间使用同步提交来实现无数据丢失的故障转移，但你需要通过在主副本上使可用性组脱机来准备故障转移。这意味着故障转移期间会出现停机。最后，因为没有集群，所以无法拥有监听器。这意味着连接到主副本的应用程序在故障转移时需要更改连接字符串以指向辅助副本。


    **提示**

    可以在 DNS 中创建一个指向主副本的 CNAME 记录。然后你可以在故障转移时更新该 CNAME 记录指向辅助副本。虽然这通常是一个手动过程，且可能需要
    DBA 职能之外的团队参与，但可以避免客户端更改其连接字符串的需要。


    无集群可用性组在读取扩展场景中最具价值。因此，它们也被称为读取扩展可用性组。想象这样一个场景：你有一个 SQL Server 工作负载，来自多个应用程序的读取吞吐量很高，但没有高可用性要求。你可以移除集群的复杂性，同时仍保持数据库同步。一些客户端应用程序可以配置为指向主副本，而其他客户端应用程序可以配置为指向辅助副本。


    在本节中，我们将基于一个场景进行操作，其中有两个名为 `Prod` 和 `ReadScale` 的服务器。每个服务器都安装了 SQL Server 2019
    Enterprise Edition 的默认实例。两台服务器都位于站点 1，并且都是 `AlwaysOn.com` 域的成员，但没有集群。我们将配置一个可用性组，为
    `Customers` 数据库提供读取扩展功能，该数据库由两个应用程序访问，但其中一个应用程序只执行只读操作。


    ### 准备实例


    与所有可用性组场景一样，在配置可用性组之前，我们需要完成一些准备任务。以下部分描述了如何准备实例。


    #### 启用可用性组


    一如既往，为实例准备可用性组的第一步是在数据库引擎服务上启用可用性组。我们可以使用 PowerShell 或 SQL Server 配置管理器来执行此任务，如第
    5 章所示。在本例中，我们将使用配置管理器，如图 7-21 所示。你会注意到，因为没有底层集群，对话框会告知我们这一点，而不是显示底层集群名称。需要在所有将参与可用性组的实例上执行此任务。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig21_HTML.jpg](img/394392_3_En_7_Fig21_HTML.jpg)


    图 7-21


    启用可用性组


    启用可用性组后，需要重新启动服务才能使更改生效。


    #### 创建 Customers 数据库


    本场景的目标是为 `Customers` 数据库提供读取扩展功能。因此，我们可以使用清单 7-3 中的脚本创建 `Customers` 数据库。


    ```sql

    --创建 Customers 数据库

    CREATE DATABASE Customers ;

    GO

    USE Customers ;

    GO

    CREATE TABLE dbo.Customers

    (

    ID                INT                PRIMARY KEY        IDENTITY,

    FirstName         NVARCHAR(30),

    LastName          NVARCHAR(30),

    CreditCardNumber  VARBINARY(8000)

    ) ;

    GO

    --填充表

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName         VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'')

    INSERT INTO Customers(Firstname, LastName, CreditCardNumber)

    SELECT

    FirstName

    , LastName

    , CreditCardNumber

    FROM (

    SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    , (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    , (SELECT TOP 1 CONVERT(VARBINARY(8000), (

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()

    ) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()

    ) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()

    ) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID())))

    FROM @Numbers a

    ) CreditCardNumber) d

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c;

    --为数据库设置完整恢复模式 - 可用性组所需

    ALTER DATABASE Customers SET RECOVERY FULL ;

    GO

    清单 7-3

    创建 Customers 数据库

    ```


    在将数据库添加到可用性组之前，我们还需要对数据库进行完整备份。我们可以使用清单 7-4 中的脚本来实现这一点。


    ```sql

    --备份 Customers 数据库

    BACKUP DATABASE Customers

    TO  DISK = ''C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\Backup\Customers.bak''

    WITH NAME = ''Customers-完整数据库备份'' ;

    GO

    清单 7-4

    备份 Customers 数据库

    ```


    #### 创建登录名


    数据同步将由运行数据库引擎服务的服务帐户执行。因此，服务帐户需要在所有将成为可用性组中副本的实例上拥有登录名。在我们的场景中，两个实例都在 `ALWAYSON\SqlServiceAccount`
    域帐户下运行。因此，在所有参与的实例上运行清单 7-5 中的脚本将创建所需的登录名。


    ```sql

    CREATE LOGIN [ALWAYSON\SQLServiceAccount]

    FROM WINDOWS ;

    GO

    清单 7-5

    创建登录名

    ```


    **提示**

    如果服务器不是域成员，那么我们可以使用 SQL 登录名和证书配置身份验证。

    '
- fmt: '#### Create and Configure the Availability Group


    The first step in creating the Availability Group is to create the endpoint, which
    the Availability Group will use for sending messages between the Replicas. We
    also need to give the service account permissions to connect to the Endpoint.
    This can be achieved with the script in Listing [7-6](#394392_3_En_7_Chapter.xhtml#PC6).


    ```

    --Create the Endpoint

    CREATE ENDPOINT ClusterlessEndpoint

    AS TCP (LISTENER_PORT = 5022)

    FOR DATA_MIRRORING (

    ROLE = ALL,

    ENCRYPTION = REQUIRED ALGORITHM AES

    ) ;

    GO

    --Start the Endpoint

    ALTER ENDPOINT ClusterlessEndpoint STATE = STARTED ;

    GO

    --Grant Permissions to the Service Account

    GRANT CONNECT ON ENDPOINT::ClusterlessEndpoint TO [ALWAYSON\SQLServiceAccount];

    GO

    Listing 7-6

    Create the Endpoint

    ```


    With the Endpoint in place, we can now go ahead and create the Availability Group.
    As always, we have a choice of using T-SQL, the New Availability Group wizard,
    or the New Availability Group dialog box. In this instance, we will use T-SQL
    by running the script in Listing [7-7](#394392_3_En_7_Chapter.xhtml#PC7). Note
    that the `CLUSTER_TYPE` option is set to `NONE`.


    ```

    USE master

    GO

    CREATE AVAILABILITY GROUP Customers_Clusterless

    WITH (

    AUTOMATED_BACKUP_PREFERENCE = SECONDARY,

    CLUSTER_TYPE = NONE

    )

    FOR DATABASE Customers

    REPLICA ON ''PROD'' WITH (

    ENDPOINT_URL = ''TCP://PROD.AlwaysOn.com:5022'',

    FAILOVER_MODE = MANUAL,

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC,

    SECONDARY_ROLE(ALLOW_CONNECTIONS = ALL)

    ),

    ''READSCALE'' WITH (

    ENDPOINT_URL = ''TCP://READSCALE.AlwaysOn.com:5022'',

    FAILOVER_MODE = MANUAL,

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC,

    SECONDARY_ROLE(ALLOW_CONNECTIONS = ALL)

    ) ;

    GO

    Listing 7-7

    Create the Availability Group

    ```


    Finally, we can join the secondary Replica to the Availability Group by running
    the script in Listing [7-8](#394392_3_En_7_Chapter.xhtml#PC8), against the secondary
    instance.


    ```

    ALTER AVAILABILITY GROUP Customers_Clusterless JOIN WITH (CLUSTER_TYPE = NONE)
    ;

    GO

    ALTER AVAILABILITY GROUP Customers_Clusterless GRANT CREATE ANY DATABASE ;

    GO

    Listing 7-8

    Join the Secondary Replica to the Availability Group

    ```


    Another use case for clusterless Availability Groups is migrations. If you have
    a database that you need to migrate to a new server, you can easily configure
    a clusterless Availability Group to support a side-by-side migration.


    Once the Availability Group is configured, users can check their application with
    read-only operations against the new instance while continuing to use their existing
    database. Once they are happy, the Availability Group can be failed over and the
    old instance decommissioned.


    ### Domain-Independent Availability Groups


    On the surface, domain-independent Clusters, also known as Workgroup Clusters
    and Availability Groups, may seem a little odd. If a company is large enough that
    it needs to run SQL Server Enterprise (or even Standard), then it is surely large
    enough and very likely to have a domain and the ability to create standard clusters.
    But if you think harder, there are many more use cases where enterprises may benefit
    from domain-independent high availability and disaster recovery. For example,
    imagine that you have a hybrid cloud environment. Instead of stretching your domain
    into Azure, or AWS, your company has decided to create a new domain in the cloud
    and form a trust relationship between the two. You then decide that you would
    like to use Availability Groups to synchronize a database between on-premise and
    the cloud, so that your databases supporting your online sales application are
    in the cloud, for the lowest latency, but you also want DR back to on-premise.
    Without domain-independent clusters or Availability Groups, this would only be
    possible using clusterless Availability Groups, meaning that you could not make
    use of the Listener.


    In this section, we will explore how to create a domain-independent cluster and
    Availability Group. For networking simplicity, we will configure this between
    two servers in a workgroup within our Site1 subnet. In this scenario, there will
    be no domain. However, it is worthy of note that this method can also be used
    to create a cluster (and Availability Group) between two separate domains, or
    between a domain and a workgroup.


    We will build the cluster and Availability Group across two nodes, named `ClusterNode1`
    and `ClusterNode2`, in the same workgroup for the purpose of offloading read-only
    reporting. A default instance of SQL Server is installed on each node.


    #### Preparing for the Cluster


    It is a requirement that all nodes within the cluster need to add a common Primary
    DNS Suffix. This can be achieved by navigating to Control Panel ➤ System and Security
    ➤ System and selecting Change Settings in the Computer Name, Domain and Workgroup
    Settings area of the screen, to invoke the System Properties dialog box, where
    the Change button can be used to invoke the Computer Name/Domain Changes dialog
    box. You can now use the More button to invoke the DNS Suffix and NetBIOS Computer
    Name dialog box, shown in Figure [7-22](#394392_3_En_7_Chapter.xhtml#Fig22). Here,
    we will enter our common DNS Suffix.


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig22_HTML.jpg](images/394392_3_En_7_Chapter/394392_3_En_7_Fig22_HTML.jpg)

    *Figure 7-22 DNS Suffix and NetBIOS Computer Name*


    We also need to ensure that an account exists on all cluster nodes that has the
    same username and the same password and has local administrator permissions. In
    our scenario, we will use the built-in Administrator, but if we were to use any
    other account, then we must also set the value of `LocalAccountTokenFilterPolicy`
    to `1` in the registry. This can be achieved by using the PowerShell command in
    Listing [7-9](#394392_3_En_7_Chapter.xhtml#PC9).


    ```

    New-ItemProperty -path HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
    -Name LocalAccountTokenFilterPolicy -Value 1

    Listing 7-9

    Set LocalAccountTokenFilterPolicy

    ```


    #### Create the Cluster


    We can now create the cluster by using the script in Listing [7-10](#394392_3_En_7_Chapter.xhtml#PC10).
    There are two interesting points to note here. Firstly, we are using the `AdministrativeAccessPoint`
    parameter, with a configuration value of `DNS`. This will create the Cluster Name
    Object but not attempt to create computer objects in Active Directory, which of
    course is not supported in a domain-independent cluster.


    The second interesting point is that we have chosen to use a cluster disk as the
    witness. This is because a file share witness is not supported in domain-independent
    clusters.


    ```

    New-Cluster -Name AOAGWorkGroupCluster -Node ClusterNode1,ClusterNode2 -StaticAddress
    10.0.0.52 -AdministrativeAccessPoint DNS

    Set-ClusterQuorum -DiskWitness "Cluster Disk 1"

    Listing 7-10

    Create the Cluster

    ```'
