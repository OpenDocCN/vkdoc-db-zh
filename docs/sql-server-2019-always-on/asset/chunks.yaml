    which will be the default location for backups of databases; and a folder called
    Data, which will be the default location of the system databases.


    The default folders for TempDB, user databases, and backups can be modified later
    in the installation process, and splitting these databases into separate volumes
    is often a good practice, but may not be necessary (or even possible) if your
    data will be located on a SAN, as discussed in Chapter [3](#394392_3_En_3_Chapter.xhtml).
    Other folders will also be created here, including a folder called LOGS, which
    will be the default location for the files for both the Error Logs and the default
    Extended Event health trace.


    If you are installing SQL Server in a 64-bit environment, you will be asked to
    enter folders for both 32-bit and 64-bit versions of the shared features directory.
    This is because some SQL Server components are always installed as 32-bit processes.
    The 32-bit and 64-bit components cannot share a directory, so for installation
    to continue, you must specify different folders for each of these options. The
    Shared Features directory becomes a root-level directory for features that are
    shared by all instances of SQL Server, such as SDKs and management tools.'
  trans: '

    ## 构建实例


    可以使用 `安装 SQL Server 故障转移集群` 向导来构建 AlwaysOn 故障转移集群实例。该向导可通过在承载集群核心资源的节点上打开 `SQL
    Server 安装中心`，并从 `安装` 选项中选择 `新建 SQL Server 故障转移集群安装` 来启动。`SQL Server 安装中心` 的 `安装`
    选项卡如图 4-1 所示。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig1_HTML.jpg](img/394392_3_En_4_Fig1_HTML.jpg)


    图 4-1：SQL Server 安装中心 - 安装选项卡


    ### 产品密钥页面


    向导首先显示的是 `产品密钥` 页面，如图 4-2 所示。在此页面上，您将选择安装免费的 SQL Server 版本，或输入产品密钥（或批量许可密钥），这将自动确定要安装的正确
    SQL Server 版本。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig2_HTML.jpg](img/394392_3_En_4_Fig2_HTML.jpg)


    图 4-2：安装 SQL Server 故障转移集群向导 - 产品密钥页面


    > **提示**

    >

    > 在 SQL Server 2019 中，功能上等同于企业版的开发者版是免费的。在 SQL Server 2016 之前，此非商业许可曾收取少量费用。


    ### 许可条款页面


    在向导的 `许可条款` 页面（图 4-3），系统将通过一个复选框邀请您接受 Microsoft 的许可条款。不同意则无法继续安装。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig3_HTML.jpg](img/394392_3_En_4_Fig3_HTML.jpg)


    图 4-3：安装 SQL Server 故障转移集群向导 - 许可条款页面


    ### 全局规则和 Microsoft 更新


    现在将检查 `全局规则` 以确保可以成功安装安装支持文件。当所有检查通过后，向导的 `Microsoft 更新` 页面（如图 4-4 所示）将提示您选择是否希望
    Windows Update 检查 SQL Server 的补丁和修复程序。此处的选择取决于您组织的修补策略。一些组织对补丁的测试和接受实施严格的修补制度，然后是修补周期，这通常得到诸如
    `WSUS (Windows Server Update Services)` 之类的软件支持。如果您的组织存在此类制度，则不应选择此选项。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig4_HTML.jpg](img/394392_3_En_4_Fig4_HTML.jpg)


    图 4-4：安装 SQL Server 故障转移集群向导 - Microsoft 更新页面


    如果您选择检查更新，并且发现任何可用更新，则向导的 `产品更新` 页面将列出所有找到的可用更新。您需要使用复选框确认是否应安装它们。


    在安装支持文件和任何产品更新（如适用）下载、解压并安装后，将检查用于安装故障转移集群实例的 `安装规则`，结果将显示在向导的 `安装故障转移集群规则` 页面上，如图
    4-5 所示。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig5_HTML.jpg](img/394392_3_En_4_Fig5_HTML.jpg)


    图 4-5：安装 SQL Server 故障转移集群向导 - 安装故障转移集群规则


    如果您看到 `Windows 防火墙` 的警告，这可能仅仅是因为防火墙已开启。这并不表示所需端口未打开。有关为 SQL Server 配置防火墙的更多信息，我推荐
    Apress 的书籍 *Securing SQL Server 2nd Edition: DBAs Defending the Database*，该书可从
    [`www.apress.com/gb/book/9781484241608`](http://www.apress.com/gb/book/9781484241608)
    获取。


    在此实例中，我们看到一个关于 `集群验证` 的警告。当集群验证通过但带有警告时会出现此情况。在我们的案例中，这具体是因为集群节点上的补丁未更新到最新。理想情况下，应在继续之前解决此问题。


    ### 功能选择页面


    在向导的 `功能选择` 页面（如图 4-6 所示），您将选择要安装的 SQL Server 2019 产品套件的功能。出于本书的目的，我们将选择安装 `数据库引擎`
    和 `SQL Server Integration Services (SSIS)`。


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig6_HTML.jpg](img/394392_3_En_4_Fig6_HTML.jpg)


    图 4-6：安装 SQL Server 故障转移集群向导 - 功能选择页面


    值得注意的是，`SSIS` 不是集群感知的，也并非设计为集群服务。在某些情况下，您可能决定对 `Integration Services` 服务进行集群化，如果是这种情况，则可以通过创建类型为
    `通用` 的集群角色，并将 `Integration Services` 服务添加为依赖项来绕过此限制。然而，在大多数场景中，在集群实例上管理 `SSIS`
    的最合适方法是在集群的每个节点上将 `Integration Services` 服务作为独立服务安装。


    此外，向导的 `功能选择` 页面要求您指定 `实例根目录` 和 `共享功能目录` 的文件夹位置。您可能希望将这些位置移动到不同的驱动器，以便将 `C:\`
    驱动器留给操作系统。这可能是出于空间考虑，或者仅仅是为了将 SQL Server 二进制文件与其他应用程序隔离。


    ### 实例根目录结构


    `实例根目录` 通常将包含服务器上创建的每个实例的一个文件夹，并且 `数据库引擎`、`SSAS` 和 `SSRS` 的安装会有单独的文件夹。与 `数据库引擎`
    关联的文件夹将命名为 `MSSQL15.[InstanceName]`，其中实例名称是您的实例名称，对于默认实例则是 `MSSQLSERVER`。文件夹名称中的数字
    15 对应于 SQL Server 的版本，SQL Server 2019 的版本号是 15。


    此文件夹将包含一个名为 `MSSQL` 的子文件夹，该子文件夹又将包含存储与实例关联文件的文件夹，包括一个名为 `Binn` 的文件夹（用于存储与实例关联的应用程序文件、应用程序扩展和
    XML 配置）、一个名为 `Backup` 的文件夹（作为数据库备份的默认位置）和一个名为 `Data` 的文件夹（作为系统数据库的默认位置）。


    `TempDB`、用户数据库和备份的默认文件夹可以在安装过程的后期修改，将这些数据库拆分到单独的卷通常是一个好的做法，但如果您的数据将位于 `SAN` 上（如第
    3 章所述），则可能不必要（甚至不可能）。这里还将创建其他文件夹，包括一个名为 `LOGS` 的文件夹，它将作为错误日志和默认扩展事件运行状况跟踪文件的默认位置。


    如果您在 64 位环境中安装 SQL Server，系统将要求您同时输入 32 位和 64 位版本的 `共享功能目录` 文件夹。这是因为某些 SQL Server
    组件始终作为 32 位进程安装。32 位和 64 位组件不能共享一个目录，因此为了继续安装，您必须为每个选项指定不同的文件夹。`共享功能` 目录成为所有 SQL
    Server 实例共享的功能（如 `SDK` 和管理工具）的根级目录。

    '
