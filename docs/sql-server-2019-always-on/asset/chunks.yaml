    Figure 3-30


    The Failover Tab


    ## Summary


    Before creating the cluster, the Microsoft Cluster Service (MCS) must be installed
    on all nodes. This can be achieved by installing the Cluster Feature, using the
    Add Roles and Features Wizard.


    Once the cluster feature has been installed, clustering can be configured on each
    node by using the Create Cluster Wizard. Before building the cluster, this wizard
    will prompt you to run the Cluster Validation Wizard. The Cluster Validation Wizard
    will validate that environment meets the requirements for a cluster. If you find
    that your environment does not meet the requirements, you can continue to building
    the cluster, but the installation will not be supported by Microsoft.


    Once the cluster has been built, it will also need to be configured. This will
    include configuring the quorum mode and may also include configuring MSDTC. After
    creating a role on the cluster, you may also wish to configure the role with failover
    policies or preferred owners.


    # 4. Implementing an AlwaysOn Failover Clustered Instance


    Once the cluster has been built and configured, it is time to install the SQL
    Server AlwaysOn failover cluster instance. In our scenario, we want to build a
    clustered instance, which spans both nodes of the Windows cluster that we built
    in Chapter [3](#394392_3_En_3_Chapter.xhtml). We will also discuss how to build
    the failover clustered instance using PowerShell. To do this, we will need to
    use the Install a SQL Server Failover Cluster wizard on the primary node of the
    cluster. We will then need to run the Add Node wizard to allow the passive node
    to host the instance in the event of a failover. Therefore, in this chapter, we
    will perform the following tasks:


    *   Install a SQL Server failover clustered instance on the active cluster node.


    *   Configure the passive node of the wizard to support the failover clustered
    instance.'
  trans: '

    ### 配置角色


    创建角色后，您可能需要对其进行配置，以更改故障转移策略或将节点配置为首选所有者。要配置角色，请从角色的上下文菜单中选择“属性”。在如图 3-29 所示的“属性”对话框的“常规”选项卡上，您可以将一个节点配置为角色的首选所有者。您还可以通过在“首选所有者”窗口中上下移动节点来更改节点优先级的顺序。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig29_HTML.jpg](img/394392_3_En_3_Fig29_HTML.jpg)

    图 3-29 常规选项卡


    您还可以为角色选择在发生多个角色同时故障转移到另一个节点时的优先级。此设置的选项如下：

    *   高

    *   中

    *   低

    *   不自动启动


    我们将配置 `ALWAYSON-MSDTC-C` 角色以高优先级进行故障转移。


    在“属性”对话框的“故障转移”选项卡上，您可以配置角色在给定时间段内可以故障转移的次数，超过此次数后角色将被置于脱机状态。此设置的默认值是 6 小时内允许
    1 次故障。这样做的问题是，如果一个角色发生了故障转移，并且在您修复了原始节点上的问题之后，您又将该角色故障恢复，那么在 6 小时的时间窗口内将不再允许任何故障转移。这显然存在风险，我通常建议您更改此设置。在我们的案例中，我们已将角色配置为在
    24 小时的时间窗口内最多允许三次故障转移，如图 3-30 所示。我们还配置了该角色，使其在首选所有者再次可用时故障恢复回去。请记住，设置自动故障恢复时，故障恢复也会像故障转移一样导致停机。如果您追求非常高的可用性级别，例如五个
    9，那么此选项可能不合适。我们将配置 `ALWAYSON-MSDTC-C` 角色，允许在 24 小时期限内进行三次故障转移。我们还将配置该角色以允许立即故障恢复。


    ![../images/394392_3_En_3_Chapter/394392_3_En_3_Fig30_HTML.jpg](img/394392_3_En_3_Fig30_HTML.jpg)

    图 3-30 故障转移选项卡


    ## 总结


    在创建集群之前，必须在所有节点上安装 Microsoft 集群服务 (`MCS`)。这可以通过使用“添加角色和功能向导”安装“故障转移群集”功能来实现。


    安装集群功能后，可以使用“创建群集向导”在每个节点上配置群集。在构建群集之前，此向导将提示您运行“验证群集向导”。“验证群集向导”将验证环境是否满足群集要求。如果发现环境不符合要求，您可以继续构建群集，但安装将不受
    Microsoft 支持。


    构建群集后，还需要进行配置。这包括配置仲裁模式，也可能包括配置 `MSDTC`。在群集上创建角色后，您可能还希望使用故障转移策略或首选所有者来配置该角色。


    # 4. 实现 AlwaysOn 故障转移群集实例


    构建并配置群集后，就可以安装 SQL Server AlwaysOn 故障转移群集实例了。在我们的场景中，我们希望构建一个跨越我们在第 3 章中构建的 Windows
    群集两个节点的群集实例。我们还将讨论如何使用 PowerShell 构建故障转移群集实例。为此，我们需要在群集的主节点上使用“安装 SQL Server 故障转移群集”向导。然后，我们需要运行“添加节点”向导，以允许被动节点在发生故障转移时承载该实例。因此，在本章中，我们将执行以下任务：

    *   在活动群集节点上安装 SQL Server 故障转移群集实例。

    *   配置向导的被动节点以支持故障转移群集实例。

    '
- fmt: '## Building the Instance


    An AlwaysOn Failover Clustered Instance can be built using the `Install A SQL
    Server Failover Cluster` wizard, which can be invoked by opening the `SQL Server
    Installation Center`, on the node hosting the cluster core resources, and selecting
    the `New SQL Server Failover Cluster Installation` option from the `Installation`.
    The `Installation` tab of the `SQL Server Installation Center` is illustrated
    in Figure [4-1](#394392_3_En_4_Chapter.xhtml#Fig1).


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig1_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig1_HTML.jpg)


    Figure 4-1: SQL Server Installation Center – Installation Tab


    ### Product Key Page


    The `Product Key` page of the wizard is the first to be displayed and is illustrated
    in Figure [4-2](#394392_3_En_4_Chapter.xhtml#Fig2). On this page of the wizard,
    you will either select one of the free versions of SQL Server to install, or enter
    a product key, or volume licensing key, which will automatically determine the
    correct version of SQL Server to install.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig2_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig2_HTML.jpg)


    Figure 4-2: Install a SQL Server Failover Cluster Wizard – Product Key Page


    > **Tip**

    >

    > In SQL Server 2019, Developer Edition, which is functionally equivalent to Enterprise
    Edition, is free. Prior to SQL Server 2016, there was a nominal charge associated
    with this noncommercial license.


    ### License Terms Page


    On the `License Terms` page of the wizard (Figure [4-3](#394392_3_En_4_Chapter.xhtml#Fig3)),
    you will be invited to accept Microsoft’s license terms, via a check box. The
    installation cannot proceed without agreement.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig3_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig3_HTML.jpg)


    Figure 4-3: Install a SQL Server Failover Cluster Wizard – License Terms Page


    ### Global Rules and Microsoft Update


    `Global Rules` will now be checked to ensure that the setup support files can
    be successfully installed. When all checks are passed, the `Microsoft Update`
    page of the wizard, illustrated in Figure [4-4](#394392_3_En_4_Chapter.xhtml#Fig4),
    will prompt you to choose if you want Windows Update to check for SQL Server patches
    and hotfixes. The choice here will depend on your organization’s patching policy.
    Some organizations implement a ridged patching regime for the testing and acceptance
    of patches, followed by a patching cycle, which is often supported with software
    such as `WSUS (Windows Server Update Services)`. If such a regime exists in your
    organization, then you should not select this option.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig4_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig4_HTML.jpg)


    Figure 4-4: Install a SQL Server Failover Cluster Wizard – Microsoft Update Page


    If you have chosen to check for updates, and if any available updates are discovered,
    then the `Product Updates` page of the wizard will list any available updates
    that have been found. You should confirm if they should be installed or not, using
    the check box.


    After the setup support files and any product updates have been downloaded (if
    applicable), extracted, and installed, `installation rules` for the installation
    of a failover clustered instance will be checked and the results displayed on
    the `Install Failover Cluster Rules` page of the wizard, which is shown in Figure
    [4-5](#394392_3_En_4_Chapter.xhtml#Fig5).


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig5_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig5_HTML.jpg)


    Figure 4-5: Install a SQL Server Failover Cluster Wizard – Install Failover Cluster
    Rules


    If you see a warning for `Windows Firewall`, this may simply because the Firewall
    is turned on. It does not indicate that the required ports are not open. For further
    information on configuring firewalls for SQL Server, I recommend the Apress book
    *Securing SQL Server 2nd Edition: DBAs Defending the Database*, which is available
    from [`www.apress.com/gb/book/9781484241608`](http://www.apress.com/gb/book/9781484241608).


    In this instance, we see a warning against `cluster verification`. This is caused
    when cluster validation passes, but with warnings. In our case, this is specifically
    because patching is not up to date on the cluster nodes. Ideally, this should
    be resolved before continuing.


    ### Feature Selection Page


    On the `Feature Selection` page of the wizard, which is shown in Figure [4-6](#394392_3_En_4_Chapter.xhtml#Fig6),
    you will select the features of the SQL Server 2019 product suite that you wish
    to install. For the purpose of this book, we will choose to install the `Database
    Engine` and `SQL Server Integration Services (SSIS)`.


    ![../images/394392_3_En_4_Chapter/394392_3_En_4_Fig6_HTML.jpg](images/394392_3_En_4_Chapter/394392_3_En_4_Fig6_HTML.jpg)


    Figure 4-6: Install a SQL Server Failover Cluster Wizard – Feature Selection Page


    It is worthy of note that `SSIS` is not cluster-aware and is not designed to be
    clustered. There are some circumstances where you may decide to cluster the `Integration
    Services` service, and if this is the case, then you can work around the limitation,
    by creating a cluster role, with the `Generic` type, and adding the `Integration
    Services` service as a dependency. In most scenarios, however, the most appropriate
    way to manage `SSIS` on a clustered instance is simply to install the `Integration
    Services` service, as a stand-alone service, on each node of the cluster.


    Additionally, the `Feature Selection` page of the wizard requires you to specify
    folder locations for the `instance root folder` and the `shared features folder`.
    You may want to move these to a different drive in order to leave the `C:\` drive
    for the operating system. This may be a consideration for space reasons, or just
    to isolate the SQL Server binaries from other applications.


    ### Instance Root Directory Structure


    The `instance root directory` will typically contain a folder for each instance
    that you create on the server, and there will be separate folders for the `Database
    Engine`, `SSAS`, and `SSRS` installations. A folder associated with the `Database
    Engine` will be called `MSSQL15.[InstanceName]`, where instance name is either
    the name of your instance or `MSSQLSERVER` for a default instance. The number
    15 in the folder name relates to the version of SQL Server, which is 15 for SQL
    Server 2019.


    This folder will contain a subfolder called `MSSQL`, which in turn will contain
    folders that will store files associated with your instance, including a folder
    called `Binn`, which will contain the application files, application extensions,
    and XML configurations associated with your instance; a folder called `Backup`,
    which will be the default location for backups of databases; and a folder called
    `Data`, which will be the default location of the system databases.


    The default folders for `TempDB`, user databases, and backups can be modified
    later in the installation process, and splitting these databases into separate
    volumes is often a good practice, but may not be necessary (or even possible)
    if your data will be located on a `SAN`, as discussed in Chapter [3](#394392_3_En_3_Chapter.xhtml).
    Other folders will also be created here, including a folder called `LOGS`, which
    will be the default location for the files for both the Error Logs and the default
    Extended Event health trace.


    If you are installing SQL Server in a 64-bit environment, you will be asked to
    enter folders for both 32-bit and 64-bit versions of the `shared features directory`.
    This is because some SQL Server components are always installed as 32-bit processes.
    The 32-bit and 64-bit components cannot share a directory, so for installation
    to continue, you must specify different folders for each of these options. The
    `Shared Features` directory becomes a root-level directory for features that are
    shared by all instances of SQL Server, such as `SDKs` and management tools.'
