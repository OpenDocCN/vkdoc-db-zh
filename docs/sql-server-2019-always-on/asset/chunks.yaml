    In recent versions of SQL Server, it is possible to enable Perform Volume Maintenance
    Tasks during setup, and this is implemented as a simple check box of the Service
    Accounts tab. The consideration here is security vs. performance. If you choose
    to perform volume maintenance tasks, then data files will not be zeroed out when
    they are created or expanded; however, an attacker with specialist software could
    potentially retrieve data that was previously stored on the allocated disk blocks.
    Perform Volume Maintenance Tasks does not apply to transaction log files.


    Tip


    For a full discussion on SQL Server security considerations, I recommend the Apress
    title *Securing SQL Server 2nd Edition: DBAs Defending the Database*, which can
