  trans: '## 使用新建可用性组向导


    当备份成功完成后，我们通过 SSMS 中“对象资源管理器”里的“AlwaysOn 高可用性”进行导航，并从“可用性组”文件夹的上下文菜单中选择“新建可用性组向导”来启动该向导。向导的“简介”页面随即显示，为我们概述了需要执行的步骤。


    在“指定名称”页面（参见图 5-2），系统会提示我们为可用性组输入一个名称。我们还需要选择“Windows Server 故障转移群集”作为“群集类型”。其他群集类型选项包括“外部”（支持
    Linux 上的 Pacemaker）和“无”（用于无群集的可用性组）。“数据库级别运行状况检测”选项将导致可用性组在组内任何数据库脱机时发生故障转移。“每数据库
    DTC 支持”选项将指定是否支持使用 MSDTC（Microsoft 分布式事务处理协调器）的跨数据库事务。完整讨论配置 DTC 超出了本书范围，但更多详细信息可在
    [`https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291(v=vs.85)`](https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291%2528v%253Dvs.85%2529)
    找到。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig2_HTML.jpg](img/394392_3_En_5_Fig2_HTML.jpg)


    图 5-2：指定名称页面


    在“选择数据库”页面，系统会提示我们选择希望参与可用性组的数据库，如图 5-3 所示。在此屏幕上，请注意我们无法选择 `Sales`、`Customers`
    或 `Accounts` 数据库，因为我们尚未对这些数据库进行完整备份。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig3_HTML.jpg](img/394392_3_En_5_Fig3_HTML.jpg)


    图 5-3：选择数据库页面


    “指定副本”页面包含五个选项卡。我们使用第一个选项卡“副本”来向拓扑中添加辅助副本。选中“同步提交”选项会导致数据在提交到主副本之前先在辅助副本上提交。（这也被称为在辅助副本上先于主副本“固化日志”）。这意味着在发生故障转移时，不会发生数据丢失，即我们可以满足
    SLA（服务级别协议）中 RPO（恢复点目标）为零的要求。然而，这也意味着性能会有所下降。如果选择“异步提交”，则副本将以异步提交模式运行。这意味着数据在提交到辅助副本之前先在主副本上提交。这避免了性能下降，但也意味着在发生故障转移时，RPO
    是不确定的。


    当我们选中“自动故障转移”选项时，如果我们尚未选择“同步提交”，它也会被自动选中。这是因为自动故障转移仅在同步提交模式下才可能实现。我们可以将“可读辅助副本”下拉菜单设置为“否”、“是”或“仅意向读”。当设置为“否”时，处于辅助角色的副本上的数据库不可访问。当设置为“仅意向读”时，可用性组侦听器可以将只读工作负载重定向到此辅助副本，但前提是应用程序在连接字符串中指定了
    `Application Intent=Read-only`。将其设置为“是”则使侦听器能够重定向只读流量，无论应用程序的连接字符串中是否包含 `Application
    Intent` 参数。尽管我们可以同时通过 GUI 更改“可读辅助副本”的值并配置副本进行自动故障转移而不报错，但这只是向导的一个特性。实际上，该副本是不可访问的，因为在配置为自动故障转移时不支持活动辅助副本。“副本”选项卡如图
    5-4 所示。为了满足我们为 HR 数据库实现高可用性的要求，我们将同一站点内的辅助服务器配置为同步副本。这意味着数据中心之间的延迟不会加剧与同步提交相关的性能下降。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig4_HTML.jpg](img/394392_3_En_5_Fig4_HTML.jpg)


    图 5-4：“副本”选项卡


    在“指定副本”页面的“端点”选项卡上（如图 5-5 所示），我们为每个端点指定端口号。默认端口为 `5022`，但如果需要，我们可以指定不同的端口。在此选项卡上，我们还指定在端点之间发送数据时是否应进行加密。选中此选项通常是个好主意，如果选中，则使用
    AES（高级加密标准）作为加密算法。


    ![../images/394392_3_En_5_Chapter/394392_3_En_5_Fig5_HTML.jpg](img/394392_3_En_5_Fig5_HTML.jpg)


    图 5-5：“端点”选项卡


    （可选）您还可以更改所创建端点的名称。但是，由于每个实例只允许一个数据库镜像端点，而且默认名称具有相当的描述性，因此并不总是需要更改它。一些 DBA 选择重命名它以包含实例名称，因为这可以简化多服务器的管理。如果您的企业在同一群集的多个实例上拆分了多个可用性组，这是一个好主意。


    每个实例使用的服务帐户出于信息目的而显示。如果您确保两个实例使用相同的服务帐户，则可以简化安全管理。如果未能做到这一点，您将需要为每个实例授予对每个服务帐户的权限。这意味着，您不是通过仅将一个服务帐户用于一个实例来减小其安全影响范围，而是将其影响范围简单地从操作系统级别提升到
    SQL Server 级别。


    端点 URL 指定了可用性组将用于通信的端点的 URL。URL 的格式为 `[传输协议]://[路径]:[端口]`。数据库镜像端点的传输协议始终是 TCP（传输控制协议）。路径可以是服务器的完全限定域名
    (FQDN)、单独的服务器名称，或是网络中唯一的 IP 地址。我建议使用服务器的 FQDN，因为这始终保证可以工作。它也是默认填写的数值。端口应与您为端点指定的端口号匹配。


    注意'
- fmt: '# Availability Groups Overview


    Availability groups communicate with a database mirroring endpoint. Although database
    mirroring is deprecated, the endpoints are not.


    # The Backup Preferences Tab


    On the Backup Preferences tab (see Figure 5-6), we can specify the replica on
    which automated backups will be taken. One of the big advantages of `AlwaysOn
    Availability Groups` is that when you use them, you can scale out maintenance
    tasks, such as backups, to secondary servers. Therefore, automated backups can
    seamlessly be directed to active secondaries. The possible options are `Prefer
    Secondary`, `Secondary Only`, `Primary`, or `Any Replica`. It is also possible
    to set priorities for each replica. When determining which replica to run the
    backup job against, `SQL Server` evaluates the backup priorities of each node
    and is more likely to choose the replica with the highest priority.


    ![Figure 5-6: The Backup Preferences Tab](images/394392_3_En_5_Chapter/394392_3_En_5_Fig6_HTML.jpg)


    # Considerations for Scaling Automated Backups


    Although the advantages of reducing `IO` on the primary replica are obvious, I,
    somewhat controversially, recommend against scaling automated backups to secondary
    replicas in many cases. This is especially the case when `RTO` (recovery time
    objective) is a priority for the application because of operational supportability
    issues. Imagine a scenario in which backups are being taken against a secondary
    replica and a user calls to say that they have accidently deleted all data from
    a critical table. You now need to restore a copy of the database and repopulate
    the table. The backup files, however, sit on the secondary replica. As a result,
    you need to copy the backup files over to the primary replica before you can begin
    to restore the database (or perform the restore over the network). This instantly
    increases your `RTO`.


    Also, when configured to allow backups against multiple servers, `SQL Server`
    still only maintains the backup history on the instance where the backup was taken.
    This means that you may be scrambling between servers, trying to retrieve all
    of your backup files, not knowing where each one resides. This becomes even worse
    if one of the servers has a complete system outage. You can find yourself in a
    scenario in which you have a broken log chain.


    The workaround for most of the issues that I just mentioned is to use a share
    on a file server and configure each instance to back up to the same share. This
    can have neutral, positive, or negative consequences. The negative consequence
    of this is where you have locally attached storage. By setting backups up in this
    manner, you are now sending all of your backups across the network rather than
    backing them up locally. This can increase the duration of your backups as well
    as increase network traffic. The positive consequence is if you are a cloud `IaaS`
    (Infrastructure as a Service) environment. It is likely that the storage attached
    to your `VM` will be more expensive than the storage used to create the file share.
    In many modern, on-premise scenarios, however, the consequences are neutral. This
    is because it is likely that both the file share and your server’s storage reside
    on the same `SAN` or `NAS` device. This means that there is no difference in network
    traffic or latency if you configure backups in this way.


    # The Listener Tab


    On the Listener tab, shown in Figure 5-7, we choose if we want to create an availability
    group listener or if we want to defer this task until later. If we choose to create
    the listener, then we need to specify the listener’s name, the port that it should
    listen on, and the `IP` address(es) that it should use. We specify one address
    for each subnet, in multi-subnet clusters. The details provided here are used
    to create the client access point resource in the availability group’s cluster
    role. You may notice that we have specified port `1433` for the listener, although
    our instance is also running on port `1433`. This is a valid configuration, because
    the listener is configured on a different `IP` address than the `SQL Server` instance.
    It is also not mandatory to use the same port number, but it can be beneficial,
    if you are implementing `AlwaysOn Availability Groups` on an existing instance
    because applications that specify the port number to connect may need fewer application
    changes. Remember that the server name will still be different, however, because
    applications will be connecting to the virtual name of the listener, as opposed
    to the name of the physical server\instance. In our example, applications connect
    to `HR` instead of `CLUSTERNODE1\PROD`. Although connections via `CLUSTERNODE1`
    are still permitted, they do not benefit from high availability or scale our reporting.


    ![Figure 5-7: The Listener Tab](images/394392_3_En_5_Chapter/394392_3_En_5_Fig7_HTML.jpg)


    > **Tip**: A subnet is a segment of a network containing a partition of `IP` Addresses
    from a larger network.


    Because our `HR` Availability Group does not span multiple subnets, then our Listener
    will only have a single `IP` Address.


    > **Tip**: If you do not have `Create Computer Objects` permission within the
    organizational unit (`OU`), then the listener’s `VCO` (virtual computer object)
    must be present in `AD` and you must be assigned `Full Control` permissions on
    the object.


    > **Tip**: Because the `HR` Availability Group will not be configured with readable
    secondaries, we do not need to configure the `Read-Only Routing` tab; however,
    we will explore read-only routing in the “Using the New Availability Group Dialog
    Box” section of this chapter.


    # The Select Initial Data Synchronization Page


    On the Select Initial Data Synchronization screen, shown in Figure 5-8, we choose
    how the initial data synchronization of the replicas is performed. If you choose
    `Full`, then each database that participates in the availability group is subject
    to a full backup, followed by a log backup. The backup files are backed up to
    a share, which you specify, before they are restored to the secondary servers.
    The share path can be specified using either Windows or Linux formats, depending
    on your requirements. After the restore is complete, data synchronization, via
    log stream, commences.


    ![Figure 5-8: The Select Data Synchronization Page](images/394392_3_En_5_Chapter/394392_3_En_5_Fig8_HTML.jpg)


    If you have already backed up your databases and restored them onto the secondaries,
    then you can select the `Join Only` option. This starts the data synchronization,
    via log stream, on the databases within the availability group. Selecting `Skip
    Initial Data Synchronization` allows you to back up and restore the databases
    yourself after you complete the setup.


    If you select the `Automatic Seeding` option, then an empty database is initially
    created on each Replica. The data is then seeding using `VDI` (Virtual Device
    Interface) over the log stream transport. This option is slower than initializing
    with a backup but avoids transferring large backup files between shares.


    > **Tip**: If your availability group will contain many databases, then it may
    be best to perform the backup/restore yourself. This is because the inbuilt utility
    will perform the actions sequentially, and therefore, it may take a long time
    to complete.'
