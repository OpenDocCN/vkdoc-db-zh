    ## AlwaysOn 可用性组元数据


    元数据也可用于排查可用性组的问题。以下部分将讨论一些与可用性组相关且最有用和有趣的元数据对象。


    ### 确定上次故障转移的原因


    如果一个可用性组发生了故障转移，您可能首先想回答的问题之一就是“何时以及为何发生？”。这个问题可以使用 `sys.dm_hadr_availability_replica_states`
    DMV 来回答。此对象返回表 10-5 中详述的列。


    表 10-5 sys.dm_hadr_availability_replica_states


    | 列 | 说明 |

    | --- | --- |

    | `replica_id` | 副本的 GUID |

    | `group_id` | 可用性组的 GUID |

    | `is_local` | 指示副本是本地还是远程。可能的值为：• 0 – 指示远程辅助副本 • 1 – 指示本地副本 |

    | `role` | 指示当前分配给副本的角色。可能的值为：• 0 – 角色当前正在解析中 • 1 – 副本具有主角色 • 2 – 副本当前具有辅助角色 |

    | `role_desc` | 副本当前角色的文本描述。可能的值为：• RESOLVING • PRIMARY • SECONDARY |

    | `operational_state` | 指示副本的当前操作状态。可能的值为：• 0 – 故障转移挂起 • 1 – 状态挂起 • 2 – 联机 • 3
    – 脱机 • 4 – 失败 • 5 – 失败，且无仲裁 • NULL – 副本不是本地 |

    | `operational_state_desc` | 操作状态的文本描述。可能的值为：• PENDING_FAILOVER • PENDING • ONLINE
    • OFFLINE • FAILED • FAILED_NO_QUORUM • NULL |

    | `connected_state` | 指示辅助副本当前是否已连接到主副本。可能的值为：• 0 – 副本与主副本断开连接 • 1 – 副本已连接到主副本
    |

    | `connected_state_desc` | 连接状态的文本描述。可能的值为：• DISCONNECTED • CONNECTED |

    | `recovery_health` | 指示可用性组内的数据库是否联机。可能的值为：• 0 – 至少有一个数据库未联机 • 1 – 所有数据库都联机 • NULL
    – 可用性组不是本地 |

    | `recovery_health_desc` | recovery_health 的文本描述。可能的值为：• ONLINE_IN_PROGRESS • ONLINE
    • NULL |

    | `synchronization_health` | 指示可用性组数据库的同步状态。可能的值为：• 0 – 至少有一个数据库处于“未同步”状态。这称为“不健康”
    • 1 – 至少有一个数据库未处于理想同步状态。这称为“部分健康”。理想状态为： • SYNCHRONIZED – 对于同步提交副本 • SYNCHRONIZING
    – 对于异步提交副本 • 2 – 所有数据库都处于理想状态。这称为“健康” |

    | `synchronization_health_desc` | 同步运行状况状态的文本描述。可能的值为：• NOT_HEALTHY • PARTIALLY_HEALTHY
    • HEALTHY |

    | `last_connect_error_number` | 上次连接错误的错误号 |

    | `last_connect_error_description` | 上次连接错误的描述 |

    | `last_connect_error_timestamp` | 上次连接错误的日期和时间 |


    清单 10-4 中的查询演示了如何返回上次连接错误的时间和原因。这将指示故障转移发生的时间和原因。每个副本和可用性组的组合将返回一行。您会注意到，我们将 `sys.dm_hadr_availability_replica_states`
    DMV 与 `sys.availability_replicas` 和 `sys.availability_groups` DMV 进行联接，以检索承载副本的节点名称和可用性组的名称。


    ```

    SELECT

    ar.replica_server_name

    ,ag.name

    ,ars.last_connect_error_description

    ,ars.last_connect_error_timestamp

    FROM sys.dm_hadr_availability_replica_states ars

    INNER JOIN sys.availability_replicas ar

    ON ar.group_id = ars.group_id

    AND ars.replica_id = ar.replica_id

    INNER JOIN sys.availability_groups ag

    ON ag.group_id = ar.group_id ;

    ```


