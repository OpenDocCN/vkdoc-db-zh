    There are two interesting points to note here. Firstly, we are using the AdministrativeAccessPoint
    parameter, with a configuration value of DNS. This will create the Cluster Name
    Object but not attempt to create computer objects in Active Directory, which of
    course is not supported in a domain-independent cluster.


    The second interesting point is that we have chosen to use a cluster disk as the
    witness. This is because a file share witness is not supported in domain-independent
    clusters.


    ```

    New-Cluster -Name AOAGWorkGroupCluster -Node ClusterNode1,ClusterNode2 -StaticAddress
    10.0.0.52 -AdministrativeAccessPoint DNS

    Set-ClusterQuorum -DiskWitness "Cluster Disk 1"

    Listing 7-10

    Create the Cluster

    ```'
  trans: '

    #### 创建并配置可用性组


    创建可用性组的第一步是创建端点，可用性组将使用该端点在副本之间发送消息。我们还需要授予服务账户连接到该端点的权限。这可以通过清单 7-6 中的脚本实现。


    ```

    --Create the Endpoint

    CREATE ENDPOINT ClusterlessEndpoint

    AS TCP (LISTENER_PORT = 5022)

    FOR DATA_MIRRORING (

    ROLE = ALL,

    ENCRYPTION = REQUIRED ALGORITHM AES

    ) ;

    GO

    --Start the Endpoint

    ALTER ENDPOINT ClusterlessEndpoint STATE = STARTED ;

    GO

    --Grant Permissions to the Service Account

    GRANT CONNECT ON ENDPOINT::ClusterlessEndpoint TO [ALWAYSON\SQLServiceAccount];

    GO

    清单 7-6

    创建端点

    ```


    端点就位后，我们现在就可以继续创建可用性组。和往常一样，我们可以选择使用 T-SQL、新建可用性组向导或新建可用性组对话框。在本例中，我们将通过运行清单 7-7
    中的脚本来使用 T-SQL。请注意，`CLUSTER_TYPE` 选项被设置为 `NONE`。


    ```

    USE master

    GO

    CREATE AVAILABILITY GROUP Customers_Clusterless

    WITH (

    AUTOMATED_BACKUP_PREFERENCE = SECONDARY,

    CLUSTER_TYPE = NONE

    )

    FOR DATABASE Customers

    REPLICA ON ''PROD'' WITH (

    ENDPOINT_URL = ''TCP://PROD.AlwaysOn.com:5022'',

    FAILOVER_MODE = MANUAL,

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC,

    SECONDARY_ROLE(ALLOW_CONNECTIONS = ALL)

    ),

    ''READSCALE'' WITH (

    ENDPOINT_URL = ''TCP://READSCALE.AlwaysOn.com:5022'',

    FAILOVER_MODE = MANUAL,

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    SEEDING_MODE = AUTOMATIC,

    SECONDARY_ROLE(ALLOW_CONNECTIONS = ALL)

    ) ;

    GO

    清单 7-7

    创建可用性组

    ```


    最后，我们可以通过在辅助副本实例上运行清单 7-8 中的脚本，将辅助副本加入可用性组。


    ```

    ALTER AVAILABILITY GROUP Customers_Clusterless JOIN WITH (CLUSTER_TYPE = NONE)
    ;

    GO

    ALTER AVAILABILITY GROUP Customers_Clusterless GRANT CREATE ANY DATABASE ;

    GO

    清单 7-8

    将辅助副本加入可用性组

    ```


    无集群可用性组的另一个用例是迁移。如果你有一个需要迁移到新服务器的数据库，你可以轻松配置一个无集群可用性组来支持并排迁移。


    一旦配置好可用性组，用户就可以在继续使用现有数据库的同时，通过对新实例的只读操作来检查他们的应用程序。当他们满意后，可以将可用性组进行故障转移，并淘汰旧实例。


    ### 域独立可用性组


    表面上，域独立集群（也称为工作组集群和可用性组）可能看起来有点奇怪。如果一个公司规模足够大，需要运行 SQL Server 企业版（甚至标准版），那么它肯定也足够大并且很可能拥有一个域和创建标准集群的能力。但如果你深入思考，会发现有很多用例可以让企业从域独立的高可用性和灾难恢复中受益。例如，想象一下你有一个混合云环境。你的公司没有选择将现有域扩展到
    Azure 或 AWS，而是决定在云中创建一个新域，并在两个域之间建立信任关系。然后你决定希望使用可用性组在本地和云之间同步数据库，以便支持在线销售应用程序的数据库位于云中以获得最低延迟，但同时也希望灾难恢复（DR）回本地。如果没有域独立集群或可用性组，这只能通过无集群可用性组来实现，这意味着你无法利用侦听器。


    在本节中，我们将探讨如何创建一个域独立集群和可用性组。为了简化网络配置，我们将在 Site1 子网内的两个工作组服务器之间进行配置。在此场景中，将不存在域。然而值得注意的是，此方法也可用于在两个独立域之间，或在一个域与一个工作组之间创建集群（和可用性组）。


    我们将跨两个节点（名为 `ClusterNode1` 和 `ClusterNode2`）构建集群和可用性组，这两个节点位于同一工作组中，目的是卸载只读报告负载。每个节点上都安装了
    SQL Server 的默认实例。


    #### 准备集群


    要求集群中的所有节点都需要添加一个共同的主要 DNS 后缀。这可以通过导航到“控制面板” ➤ “系统和安全” ➤ “系统”，然后在“计算机名、域和工作组设置”区域中选择“更改设置”来调用“系统属性”对话框，在其中使用“更改”按钮调用“计算机名/域更改”对话框。现在你可以使用“其他”按钮调用“DNS
    后缀和 NetBIOS 计算机名”对话框，如图 7-22 所示。在这里，我们将输入我们共同的 DNS 后缀。


    ![../images/394392_3_En_7_Chapter/394392_3_En_7_Fig22_HTML.jpg](img/394392_3_En_7_Fig22_HTML.jpg)

    *图 7-22 DNS 后缀和 NetBIOS 计算机名*


    我们还需要确保在所有集群节点上存在一个具有相同用户名和相同密码并且拥有本地管理员权限的账户。在我们的场景中，我们将使用内置的 Administrator 账户，但如果我们使用任何其他账户，那么我们还必须在注册表中将
    `LocalAccountTokenFilterPolicy` 的值设置为 `1`。这可以通过使用清单 7-9 中的 PowerShell 命令实现。


    ```

    New-ItemProperty -path HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
    -Name LocalAccountTokenFilterPolicy -Value 1

    清单 7-9

    设置 LocalAccountTokenFilterPolicy

    ```


    #### 创建集群


    我们现在可以使用清单 7-10 中的脚本来创建集群。这里有两点值得注意。首先，我们使用了 `AdministrativeAccessPoint` 参数，其配置值为
    `DNS`。这将创建集群名称对象（CNO），但不会尝试在 Active Directory 中创建计算机对象，这在域独立集群中当然是不受支持的。


    第二个有趣的一点是，我们选择使用集群磁盘作为见证。这是因为在域独立集群中不支持文件共享见证。


    ```

    New-Cluster -Name AOAGWorkGroupCluster -Node ClusterNode1,ClusterNode2 -StaticAddress
    10.0.0.52 -AdministrativeAccessPoint DNS

    Set-ClusterQuorum -DiskWitness "Cluster Disk 1"

    清单 7-10

    创建集群

    ```

    '
- fmt: '# Preparing for the Availability Group


    The first step in preparing for the Availability Group is to enable Availability
    Groups on the SQL Server service of all nodes that will participate. Information
    on how to do this can be found in the “Clusterless Availability Groups” section
    of this chapter.


    Because there is no Active Directory authentication possible in this topology,
    the `database_mirroring` endpoints will require certificates to communicate with
    each other. We will also need SQL logins, which will be granted permissions to
    connect to the endpoint. Therefore, we will first need to create the certificates.
    This can be achieved using the script in Listing 7-11. Here, we first create a
    Database Master Key in the `master` database. We then create a certificate and
    back up that certificate to the operating system. This should be repeated on all
    nodes that will participate in the Availability Group, using a different certificate
    name for each instance.


    ```sql

    USE master

    GO

    --Create the Database Master key

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    -- Create the certificate

    CREATE CERTIFICATE Node1Cert

    WITH SUBJECT = ''ClusterNode1 Certificate'';

    GO

    --Back up the certificate

    BACKUP CERTIFICATE Node1Cert

    TO FILE = ''c:\Certificates\Node1Cert.cer'';

    GO

    ```


    **Listing 7-11** Create the Certificates


    We now need to create a login for every node, which will be granted permissions
    to connect to the endpoint. We can achieve this using the script in Listing 7-12.
    These logins should be created on all instances that will participate in the Availability
    Group. Therefore, the script should be run against all instances.


    ```sql

    CREATE LOGIN ClusterNode1_AOAG

    WITH PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE USER ClusterNode1_AOAG

    FOR LOGIN ClusterNode1_AOAG;

    GO

    CREATE LOGIN ClusterNode2_AOAG

    WITH PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE USER ClusterNode2_AOAG

    FOR LOGIN ClusterNode2_AOAG;

    GO

    ```


    **Listing 7-12** Create the Logins


    We can now copy the certificate for each instance to all other instances and restore
    them using the command in Listing 7-13. For each instance, you should change the
    certificate and usernames appropriately. This listing shows the command that should
    be run on `CLUSTERNODE1`, in our topology.


    ```sql

    CREATE CERTIFICATE Node2Cert

    AUTHORIZATION ClusterNode2_AOAG

    FROM FILE = ''C:\Certificates\Node2Cert.cer''

    ```


    **Listing 7-13** Restore the Certificates


    Finally, now that the certificates exist on each of the nodes, we can go ahead
    and create the `database_mirroring` endpoint, on each of the nodes. This can be
    achieved using the script in Listing 7-14. This script needs to be run on each
    of the nodes, with the certificate changed to match the node.


    ```sql

    --Create the endpoint

    CREATE ENDPOINT AOAG_Endpoint

    STATE = STARTED

    AS TCP (

    LISTENER_PORT = 5022,

    LISTENER_IP = ALL

    )

    FOR DATABASE_MIRRORING (

    AUTHENTICATION = CERTIFICATE Node1Cert,

    ROLE = ALL

    )

    --Grant each user permissions to connect to the endpoint

    GRANT CONNECT ON ENDPOINT::AOAG_Endpoint TO ClusterNode1_AOAG;

    GO

    GRANT CONNECT ON ENDPOINT::AOAG_Endpoint TO ClusterNode2_AOAG;

    GO

    ```


    **Listing 7-14** Create the Endpoint


    You can now create an Availability Group using the techniques discussed in Chapter
    5 of this book.


    # Distributed Availability Groups


    Distributed Availability Groups (DAG) are an extension of Availability Groups,
    which allow for data to be synchronized between two separate Availability Groups.
    This is an exciting technology, with many different use cases. For example, it
    allows data synchronization between Windows- and Linux-based Availability Groups,
    it allows the number of readable secondary replicas to be extended beyond 8 (which
    is the limit for a standard Availability Group), and it allows cross-site replication,
    without the complexity of a stretch cluster. Distributed Availability Groups can
    also help server migrations by providing data synchronization when an in-place
    upgrade is not possible and a side-by-side migration is required. They can also
    be used as an alternative to domain-independent Availability Groups when you have
    servers in different domains.


    While each side of the Distributed Availability Group can be a Windows Failover
    Cluster, this is not a requirement, as the focus is very much on maintaining the
    databases, and no cluster configuration occurs.


    In this section, we will illustrate the technology by configuring DAGs for our
    HR Availability Group that we created in Chapter 5, between our ALWAYSON-C Cluster
    and a Linux-based Availability Group called `Linux_AOAG` which is hosted on two
    Linux servers, participating in a Pacemaker cluster.


    The first step is to create the Distributed Availability Group on the Linux cluster.
    This can be achieved by using the script in Listing 7-15. Note the `WITH (DISTRIBUTED)`
    syntax, followed by the specifications of each Availability Group.


    > Note

    > Before starting, you should remove existing databases from the HR Availability
    Group; otherwise, it will not be able to join the Distributed Availability Group
    as the secondary Availability Group must be empty.


    ```sql

    CREATE AVAILABILITY GROUP DistributedAG

    WITH (DISTRIBUTED)

    AVAILABILITY GROUP ON

    ''HR'' WITH

    (

    LISTENER_URL = ''tcp://HRListener.alwayson.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    ```


    **Listing 7-15** Create the Distributed Availability Group


    We can now run the command in Listing 7-16, against the PROSQLADMIN-C cluster,
    to join it to the Distributed Availability Group.


    ```sql

    ALTER AVAILABILITY GROUP DistributedAG

    JOIN

    AVAILABILITY GROUP ON

    ''HR'' WITH

    (

    LISTENER_URL = ''tcp://HRListener.alwayson.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ) ;

    GO

    ```


    **Listing 7-16** Join the Second Availability Group


    > Tip

    > Databases will need to be manually joined to secondary replicas within the secondary
    Availability Group.'
