    property (collection) for the `ChildPackage` file connection manager, and note
    the `ConnectionString` property is now managed by the value of the `User::PackagePath`
    SSIS variable. Note also the `ChildPackage` file connection manager contains Expressions
    as indicated by the `f(x)` decoration, as shown in Figure [6-62](#497846_1_En_6_Chapter.xhtml#Fig62).


