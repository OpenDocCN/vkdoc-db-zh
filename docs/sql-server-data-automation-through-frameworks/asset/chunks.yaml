- fmt: '## Upload SSIS Packages


    Uploading SSIS packages is straightforward using Storage Explorer. Click the Upload
    button to begin, as shown in Figure [9-22](#497846_1_En_9_Chapter.xhtml#Fig22).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig22_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig22_HTML.jpg)

    *Figure 9-22: Preparing to upload SSIS packages to the file share*


    You may upload a folder or files, as shown in Figure [9-22](#497846_1_En_9_Chapter.xhtml#Fig22).


    Click "Upload Files…" to open the Upload Files dialog. First, select a file or
    files to be uploaded – such as the `ReportAndSucceed.dtsx` and `ReportAndFail.dtsx`
    SSIS packages developed as described in Chapter [5](#497846_1_En_5_Chapter.xhtml).
    Second, accept the default Destination directory (`"/"`). Third, click the Upload
    button, as shown in Figure [9-23](#497846_1_En_9_Chapter.xhtml#Fig23).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig23_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig23_HTML.jpg)

    *Figure 9-23: Configuring the upload to the file share*


    When the upload completes, you may view the results of the operation in the Azure
    Storage Explorer Activities window, as shown in Figure [9-24](#497846_1_En_9_Chapter.xhtml#Fig24).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig24_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig24_HTML.jpg)

    *Figure 9-24: Viewing activities associated with the upload*


    `ReportAndSucceed.dtsx` and `ReportAndFail.dtsx` SSIS packages have been uploaded
    and are now visible in the `fs-ssis` file share, as shown in Figure [9-25](#497846_1_En_9_Chapter.xhtml#Fig25).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig25_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig25_HTML.jpg)

    *Figure 9-25: `ReportAndSucceed.dtsx` and `ReportAndFail.dtsx` SSIS packages uploaded*


    The next step is to update the metadata in the `SSISConfig` `config.Packages`
    table to reflect the file share location of the packages.


    ## Update `PackageLocation` Values


    Question: What is the difference between a simple, custom, file-based SSIS framework
    that executes SSIS packages stored in an on-premises file store and a simple,
    custom, file-based SSIS framework that executes SSIS packages stored in an Azure
    file share?


    Answer: One metadata value.


    Execute the T-SQL Update statement shown in Listing [9-5](#497846_1_En_9_Chapter.xhtml#PC5)
    to update the `PackageLocation` values stored in the `config.Packages` table.


    ```sql

    Select p.PackageLocation + p.PackageName As PackagePath

    From [config].[Packages] p

    Update [config].[Packages]

    Set PackageLocation  = N''\\stframeworks.file.core.windows.net\fs-ssis\''

    Where PackageLocation  = N''E:\Projects\TestSSISSolution\TestSSISProject\''

    Select p.PackageLocation + p.PackageName As PackagePath

    From [config].[Packages] p

    ```

    *Listing 9-5: Updating the `config.Packages`'' `PackageLocation` values*


    Results from executing the T-SQL shown in Listing [9-5](#497846_1_En_9_Chapter.xhtml#PC5)
    should appear similar to Figure [9-26](#497846_1_En_9_Chapter.xhtml#Fig26).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig26_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig26_HTML.jpg)

    *Figure 9-26: Updating the `config.Packages` metadata*


    We are now ready to build the SSIS framework execution engine, Azure Data Factory
    edition.


    ## Build the SSIS Framework ADF Execution Engine


    Until this point, deploying a simple, custom, file-based SSIS framework that executes
    SSIS packages stored in an Azure file share required no changes to the underlying
    architecture of the SSIS framework metadata database, only metadata was changed,
    and then only the values stored in a single field.


    The SSIS framework execution engine is an Azure Data Factory pipeline, and pipelines
    are different from SSIS packages. These differences will drive changes in the
    database and elsewhere.


    ### Retrieve a List of SSIS Packages


    To begin building the SSIS framework execution engine in ADF, connect to the Author
    and Monitor site for the Azure Data Factory instance, click the “+” beside the
    “Filter resources by name” textbox, and then click “Pipeline” to create a new
    pipeline, as shown in Figure [9-27](#497846_1_En_9_Chapter.xhtml#Fig27).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig27_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig27_HTML.jpg)

    *Figure 9-27: Creating a new ADF pipeline*


    When the new pipeline opens, change the name to “parent,” as shown in Figure [9-28](#497846_1_En_9_Chapter.xhtml#Fig28).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig28_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig28_HTML.jpg)

    *Figure 9-28: Renaming the new pipeline "parent"*


    In the Activities blade, expand the General category, and then drag a Lookup activity
    onto the pipeline canvas. Rename the Lookup activity to “Get Application Packages,”
    as shown in Figure [9-29](#497846_1_En_9_Chapter.xhtml#Fig29).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig29_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig29_HTML.jpg)

    *Figure 9-29: Adding and renaming a Lookup activity to the parent pipeline*


    One nice feature of Azure Data Factory is flexible order of authoring, or “FOA.”
    FOA means one may approach ADF development from either direction, bottom up or
    top down.


    Bottom-up ADF development involves building Linked Services *first* – to allow
    pipeline artifacts to communicate with data stores and services that reside outside
    the pipeline. Once Linked Services are built in bottom-up fashion, Datasets are
    developed. Datasets consume Linked Services and surface collections of data to
    pipeline artifacts. If you are familiar with SSIS, ADF Linked Services are analogous
    to SSIS Connection Managers, and ADF Datasets are (less) analogous to SSIS Data
    Flow source and destination adapters.


    For this example, I will leverage FOA for top-down development. What does top-down
    ADF development look like? I will click and select “New” buttons, links, and options
    to construct ADF artifacts like Datasets and Linked Services in the next few sections.


    On the “Get Application Packages” lookup activity’s Settings tab, click the “+
    New” link to configure the “Source dataset” property, as shown in Figure [9-30](#497846_1_En_9_Chapter.xhtml#Fig30).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig30_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig30_HTML.jpg)

    *Figure 9-30: Add a new Source dataset*


    When the New dataset blade displays, select “Azure SQL Database,” and then click
    the Continue button, as shown in Figure [9-31](#497846_1_En_9_Chapter.xhtml#Fig31).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig31_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig31_HTML.jpg)

    *Figure 9-31: Configuring the New dataset''s data store type*


    Set the dataset’s Name property; I named my dataset `ssisFrameworkDataSet`. Click
    the Linked Service drop-down, and then click the “+ New” option as shown in Figure
    [9-32](#497846_1_En_9_Chapter.xhtml#Fig32).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig32_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig32_HTML.jpg)

    *Figure 9-32: Configuring the dataset Name and Linked service properties*


    When the “New linked service (Azure SQL Database)” page displays, enter a Name
    and optional Description. Leave the “Connect via integration runtime” option set
    to its default value, which is `AutoResolveIntegrationRuntime`.


    For the purposes of this example, select the “Connection string” connection source,
    and then select the “From Azure subscription” option for the “Account selection
    method” property. Select your “Azure subscription” in the subscription drop-down,
    select the name of the server you created when provisioning the Azure SQL database
    from the “Server name” drop-down, and then select the name of the Azure SQL database
    you provisioned from the “Database name” drop-down.'
