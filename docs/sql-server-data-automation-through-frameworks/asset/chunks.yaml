    2.  The FailApplicationOnPackageFailure bit is set to true for the application
    package.


    If one or both of these conditions are false, the desired behavior is that Parent.dtsx
    continues executing. To configure the *always-keep-running* functionality, click
    the FOREACH Application Package foreach loop container, and press the F4 key to
    display its properties, as shown in Figure [7-40](#497846_1_En_7_Chapter.xhtml#Fig40).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig40_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig40_HTML.jpg)


    Figure 7-40


    Displaying properties of the FOREACH Application Package foreach loop container


    In Figure [7-40](#497846_1_En_7_Chapter.xhtml#Fig40), the MaximumErrorCount property
    is highlighted. The net effect of the default MaximumErrorCount property value
    of 1 is as follows: if one error occurs within the FOREACH Application Package
    foreach loop container at execution time, the FOREACH Application Package foreach
    loop container execution will fail.


    The FOREACH Application Package foreach loop container’s MaximumErrorCount property
    may be increased but, if so, to what new value? Suppose 10, 20, or 300 application
    packages are configured to execute as part of an SSIS framework application. While
    there is actually a way to manage this very scenario, there exists a more elegant
    solution.


    A more elegant solution is to ignore *all* the execution errors. Change the FOREACH
    Application Package foreach loop container’s MaximumErrorCount property value
    to 0 to configure the FOREACH Application Package foreach loop container to ignore
    all errors during execution.


    Credit is due to Julie Smith (@juliechix on Twitter) for teaching me about setting
    MaximumErrorCount to 0.


    Because events *bubble* in SSIS, any error that occurs inside the FOREACH Application
    Package foreach loop container will “bubble up” to the Parent.dtsx SSIS package,
    which is the FOREACH Application Package foreach loop container’s container. Click
    anywhere in the whitespace of the Parent.dtsx’s control flow to display the Parent.dtsx
    package’s properties, and change the MaximumErrorCount property to 0, as shown
    in Figure [7-41](#497846_1_En_7_Chapter.xhtml#Fig41).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig41_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig41_HTML.jpg)


    Figure 7-41


    Changing the Parent.dtsx package’s MaximumErrorCount property


    As *currently* configured, SSIS framework application packages will continue to
    execute until the last application package is executed, regardless of whether
    the application package instance fails *and* regardless of the setting of the
    application package’s FailApplicationOnPackageFailure bit.


    The next step is to configure the Parent.dtsx SSIS package to *stop* executing
    if and only if two conditions are met:


    1.  An application package execution fails.


    2.  The FailApplicationOnPackageFailure bit is set to true for the application
    package.


    Click the SCR Log Package Execution Failure script task. In properties, change
    the SCR Log Package Execution Failure script task’s FailPackageOnFailure property
    to True, as shown in Figure [7-42](#497846_1_En_7_Chapter.xhtml#Fig42).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig42_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig42_HTML.jpg)


    Figure 7-42


    Changing the SCR Log Package Execution Failure script task’s FailPackageOnFailure
    property to True


    Testing execution now reveals the desired functionality; SSIS framework application
    package execution instances behave as configure, and fault tolerance is working
    as designed, as shown in Figure [7-43](#497846_1_En_7_Chapter.xhtml#Fig43).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig43_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig43_HTML.jpg)


    Figure 7-43'
