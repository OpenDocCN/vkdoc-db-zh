    set up/scheduling now has additional layers of precedence and also a timing factor.
    Scheduling and monitoring have become more critical, and there are more places
    that require attention in order for everything to operate smoothly.


    ## Summary


    A system has been built that consists of two daily and two monthly processes.
    Dependencies exist that require the successful execution of all prior processes
    before initiating the execution of the next process. These dependencies must be
    applied in the scheduling of the processes in the course of regular production
    and also in troubleshooting and problem remediation. All of these “moving parts”
    not only add complexity but also points of vulnerability to the system due to
    the need for outside attention.


    # 2. Automation with Stored Procedures


    Now that we see all the pieces that need to be coordinated day in and day out
    for executing the processes defined in Chapter [1](#497846_1_En_1_Chapter.xhtml),
    let''s introduce the idea of controllers. A controller is the most basic element
    in our demonstration of the framework concept. The examples that follow demonstrate
    how controllers can make your job easier while also reducing the overhead that
    your operations staff must deal with.'
