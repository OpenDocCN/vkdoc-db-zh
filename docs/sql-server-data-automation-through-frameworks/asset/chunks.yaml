- fmt: '## Conclusion


    In this chapter, we added logging functionality to the parent pipeline, modified
    the `SSISConfig` log tables, and encapsulated logging logic in stored procedures.
    We decoupled the execution of SSIS framework application packages by adding a
    child pipeline to perform application package execution.


    # 11. Fault Tolerance in the ADF Framework


    The previous chapter covered logging functionality for the Azure Data Factory
    version of the SSIS framework’s execution engine. Differences in functionality
    available to SSIS packages and functionality available to Azure Data Factory pipelines
    drove design changes.


    In this chapter, we complete ADF execution engine functionality by implementing
    fault tolerance to programmatically stop pipeline execution based on `SSISConfig`
    metadata configurations.


    ## A Brief Introduction to Fault Tolerance


    In the author’s humble opinion, *fault tolerance* is a different way of describing
    graceful failure. Thinking “what happens when this fails?” is one difference between
    a technician and an engineer. Technicians complete projects that accomplish some
    task, while engineers build solutions that manage issue domains. It comes down
    to what an individual considers *done*. Technicians work through failures and
    stop when the project works. Engineers do not stop until the solution does not
    fail; and – when the solution *does fail* – engineers make certain the failure
    is graceful.


    You may recall fault tolerance was the most complex portion of the design of the
    on-premises SSIS framework execution engine (the `Parent.dtsx` package) designed
    in Chapters 5-7. The design of the Azure Data Factory version of the SSIS framework
    execution engine (the parent and child pipelines) is no different. To achieve
    fault tolerance, the ADF execution strategy requires radical redesign.


    The example has already implemented some of the required redesign by building
    the child pipeline. Why did application package execution need to move to the
    child pipeline? We answer this question in this chapter.


    ## Add ADF Managed Identity to Contributor Role


    In this section, we will use the Azure Data Factory REST API. If that concerns
    you, don’t worry; using the ADF REST API is interesting and will level up your
    Azure Data Factory automation skills!


    The first step is to add the Azure Data Factory Managed Identity to the Contributor
    role in the Azure Data Factory Access control blade. Begin by logging into the
    Azure portal and navigating to Azure Data Factory blade. Click “Access control
    (IAM),” as shown in Figure 11-1.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig1_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig1_HTML.jpg)


    Figure 11-1

    Navigating to the Access control (IAM) blade


    When the Access control (IAM) blade displays, click the “Add a role assignment”
    Add button, as shown in Figure 11-2.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig2_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig2_HTML.jpg)


    Figure 11-2

    Preparing to assign a role


    When the “Add role assignment” blade displays, select “Contributor” from the Role
    drop-down. Leave the “Assign access to” drop-down set to the default value (“Azure
    AD user, group, or service principal”), and enter the name of your Azure Data
    Factory in the Select textbox, as shown in Figure 11-3.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig3_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig3_HTML.jpg)


    Figure 11-3

    Finding the Azure Data Factory managed identity


    In the “Add role assignment” blade, click the Azure Data Factory managed identity.
    The “Selected members” list reflects the current selection, and the Save button
    is enabled indicating the role assignment is ready to store, as shown in Figure
    11-4.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig4_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig4_HTML.jpg)


    Figure 11-4

    Ready to complete the role assignment


    Click the “Role assignments” tab to view role assignments for ADF, as shown in
    Figure 11-5.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig5_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig5_HTML.jpg)


    Figure 11-5

    ADF managed identity assigned to Contributor role


    Now that the Azure Data Factory managed identity is assigned to the Contributor
    role, ADF Web activities may interact with the many methods hosted within the
    Azure Data Factory REST API.


    ## Add Application Package Fault Tolerance


    How is fault tolerance implemented within the Azure Data Factory version of the
    SSIS framework?


    ### About Fail Application on Package Failure


    `FailApplicationOnPackageFailure` is stored along with the application package
    metadata in the `SSISConfig` database. The value of `FailApplicationOnPackageFailure`
    is returned to the “Get Application Packages” lookup activity in the parent pipeline,
    and then `FailApplicationOnPackageFailure` is passed to the child pipeline parameter
    (named `FailApplicationOnPackageFailure`) in the “Execute Child Pipeline” execute
    pipeline activity inside the “ForEach Application Package” foreach activity’s
    inner Activities.


    ### Implementing Application Package Fault Tolerance


    Begin implementing application package fault tolerance in the child pipeline by
    right-clicking the “Execute Application Package” execute SSIS package activity’s
    Failure output and then clicking Delete, as shown in Figure 11-6.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig6_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig6_HTML.jpg)


    Figure 11-6

    Deleting the “Execute Application Package” execute SSIS package activity’s Failure
    output


    Drag an If Condition activity onto the child pipeline canvas and rename the If
    Condition “If Fail Application On Package Failure,” as shown in Figure 11-7.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig7_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig7_HTML.jpg)


    Figure 11-7

    Adding the “If Fail Application On Package Failure” if condition activity


    Connect a Failure output from the “Execute Application Package” execute SSIS activity
    to the “If Fail Application On Package Failure” if condition activity, as shown
    in Figure 11-8.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig8_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig8_HTML.jpg)


    Figure 11-8

    Connecting a Failure output to the “If Fail Application On Package Failure” if
    condition activity


    Click the “If Fail Application On Package Failure” if condition activity’s Activities
    tab, and then click inside the expression textbox. Click the “Add dynamic content
    [Alt + P]” link beneath the expression textbox. When the “Add dynamic content”
    blade displays, expand the Parameters category and select the `FailApplicationOnPackageFailure`
    child pipeline parameter. The expression textbox will display `pipeline().parameters.FailApplicationOnPackageFailure`.
    Prefix the expression with `@bool(`, and add a closing parenthesis `)` to complete
    the expression, as shown in Figure 11-9.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig9_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig9_HTML.jpg)


    Figure 11-9

    Configuring the expression property for the “If Fail Application On Package Failure”
    if condition activity


    Click the Finish to complete this portion of the configuration.'
