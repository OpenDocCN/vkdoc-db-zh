- fmt: '## Log Application Package Values


    与记录包启动时的初始值类似，在包执行前记录所有包数据对于故障排除很有帮助。向`Parent.dtsx`包添加一个新的脚本任务。将新脚本任务放置在`FOREACH
    Application Package Foreach Loop Container`内，并将该脚本任务重命名为“SCR Log Application Package
    Values”，如图[6-41](#497846_1_En_6_Chapter.xhtml#Fig41)所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig41_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig41_HTML.jpg)

    *图 6-41 添加 SCR Log Application Package Values 脚本任务*


    打开脚本任务编辑器，并将以下 SSIS 变量添加到 `ReadOnlyVariables` 属性中：

    - `System::PackageName`

    - `System::TaskName`

    - `User::PackagePath`

    - `User::ExecutionOrder`

    - `User::FailApplicationOnPackageFailure`


    脚本任务的“脚本”页面应如图[6-42](#497846_1_En_6_Chapter.xhtml#Fig42)所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig42_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig42_HTML.jpg)

    *图 6-42 已配置的 Script Task ReadOnlyVariables*


    打开 .Net 代码编辑器，并将清单[6-4](#497846_1_En_6_Chapter.xhtml#PC4)中所示的 C# .Net 代码放入 `public
    void Main()` 方法中。


    ```csharp

    public void Main()

    {

    // System::PackageName, System::TaskName

    // User::PackagePath, User::ExecutionOrder, ➤ User::FailApplicationOnPackageFailure

    string packageName = ➤ Dts.Variables["System::PackageName"].Value.ToString();

    string taskName = ➤ Dts.Variables["System::TaskName"].Value.ToString();

    string subComponent = packageName + "." + taskName;

    int informationCode = 1001;

    bool fireAgain = true;

    string packagePath = ➤ Dts.Variables["User::PackagePath"].Value.ToString();

    string description = "PackagePath: " + packagePath;

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    int executionOrder = ➤ Convert.ToInt32(Dts.Variables["User::ExecutionOrder"].Value);

    description = "ExecutionOrder: " + executionOrder.ToString();

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    bool failApplicationOnPackageFailure = ➤ Convert.ToBoolean(Dts.Variables["User::FailApplicationOnPackageFailure"]➤

    .Value);

    description = "FailApplicationOnPackageFailure: " + ➤ failApplicationOnPackageFailure.ToString();

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    Dts.TaskResult = (int)ScriptResults.Success;

    }

    ```

    *清单 6-4 记录应用程序包值*


    当 C# .Net 代码被添加到 SCR Log Application Package Values 脚本任务的 VstaProjects 编辑器后，它应如图[6-43](#497846_1_En_6_Chapter.xhtml#Fig43)所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig43_HTML.png](images/497846_1_En_6_Chapter/497846_1_En_6_Fig43_HTML.png)

    *图 6-43 SCR Log Application Package Values C# .Net 代码*


    关闭 `VstaProjects` 窗口并单击 `OK` 按钮以关闭脚本任务编辑器。`Parent.dtsx` 的控制流应如图[6-44](#497846_1_En_6_Chapter.xhtml#Fig44)所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig44_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig44_HTML.jpg)

    *图 6-44 添加 SCR Log Application Package Values 后的 Parent.dtsx 控制流*


    通过在调试器中执行 `Parent.dtsx` 包来测试新功能。按 `F5` 键，然后在调试执行完成后观察“进度”选项卡，如图[6-45](#497846_1_En_6_Chapter.xhtml#Fig45)所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig45_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig45_HTML.jpg)

    *图 6-45 查看由 SCR Log Application Package Values 引发的仪表板消息*


    `Parent.dtsx` 包（即 SSIS 框架执行引擎）的仪表板已接近完成。下一步是执行那些已从 SSIS 框架数据库返回了元数据的子包。'
  raw: '## Log Application Package Values


    As with logging initial values when the package starts, logging all package data
    before the package executes is helpful for troubleshooting purposes. Add a new
    Script Task to the Parent.dtsx package. Place the new Script Task inside the FOREACH
    Application Package Foreach Loop Container and rename the Script Task to “SCR
    Log Application Package Values” as shown in Figure [6-41](#497846_1_En_6_Chapter.xhtml#Fig41).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig41_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig41_HTML.jpg)


    Figure 6-41


    Adding the SCR Log Application Package Values Script Task


    Open the Script Task Editor and add the following SSIS variables to the ReadOnlyVariables
    property:


    *   System::PackageName


    *   System::TaskName


    *   User::PackagePath


    *   User::ExecutionOrder


    *   User::FailApplicationOnPackageFailure


    The Script Task’s Script page should appear as shown in Figure [6-42](#497846_1_En_6_Chapter.xhtml#Fig42).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig42_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig42_HTML.jpg)


    Figure 6-42


    Script Task ReadOnlyVariables configured


    Open the .Net code editor, and place the C# .Net code shown in Listing [6-4](#497846_1_En_6_Chapter.xhtml#PC4)
    into the `public void Main()` method.


    ```

    public void Main()

    {

    // System::PackageName, System::TaskName

    // User::PackagePath, User::ExecutionOrder, ➤ User::FailApplicationOnPackageFailure

    string packageName = ➤ Dts.Variables["System::PackageName"].Value.ToString();

    string taskName = ➤ Dts.Variables["System::TaskName"].Value.ToString();

    string subComponent = packageName + "." + taskName;

    int informationCode = 1001;

    bool fireAgain = true;

    string packagePath = ➤ Dts.Variables["User::PackagePath"].Value.ToString();

    string description = "PackagePath: " + packagePath;

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    int executionOrder = ➤ Convert.ToInt32(Dts.Variables["User::ExecutionOrder"].Value);

    description = "ExecutionOrder: " + executionOrder.ToString();

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    bool failApplicationOnPackageFailure = ➤ Convert.ToBoolean(Dts.Variables["User::FailApplicationOnPackageFailure"]➤

    .Value);

    description = "FailApplicationOnPackageFailure: " + ➤ failApplicationOnPackageFailure.ToString();

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    Dts.TaskResult = (int)ScriptResults.Success;

    }

    Listing 6-4

    Logging Application Package Values

    ```


    When the C# .Net code is added to the VstaProjects editor for the SCR Log Application
    Package Values script task, it should appear as shown in Figure [6-43](#497846_1_En_6_Chapter.xhtml#Fig43).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig43_HTML.png](images/497846_1_En_6_Chapter/497846_1_En_6_Fig43_HTML.png)


    Figure 6-43


    SCR Log Application Package Values C# .Net code


    Close the VstaProjects window and click the OK button to close the Script Task
    Editor. The control flow for Parent.dtsx should appear as shown in Figure [6-44](#497846_1_En_6_Chapter.xhtml#Fig44).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig44_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig44_HTML.jpg)


    Figure 6-44


    Parent.dtsx control flow after adding SCR Log Application Package Values


    Test the new functionality by executing the Parent.dtsx package in the debugger.
    Press the F5 key, and then observe the Progress tab once debug execution completes,
    as shown in Figure [6-45](#497846_1_En_6_Chapter.xhtml#Fig45).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig45_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig45_HTML.jpg)


    Figure 6-45


    Viewing instrumentation messages raised by SCR Log Application Package Values


    Instrumentation is nearly complete for the Parent.dtsx package, the SSIS framework
    execution engine. The next step is to execute the child packages for which metadata
    has been returned from the SSIS framework database.'
