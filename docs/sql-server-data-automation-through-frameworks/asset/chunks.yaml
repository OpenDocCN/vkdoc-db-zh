    # 6. 框架执行引擎


    既然在上一章中已经构建了元数据数据库和测试应用程序，现在是时候专注于执行引擎了。回想一下，在上一章开头附近，我强调了同理心在软件架构和设计中的重要性。我写道


    > *我假设 SSIS 开发人员或 SSIS 开发团队会熟悉 SSIS，因此我在 SSIS 中构建 SSIS 框架。我希望开发人员或团队能够管理和维护他们的框架。*


    第 5 章介绍了构建框架和管理元数据。现在，是时候考虑我们的 SSIS 包将如何执行了。


    ## 创建父 SSIS 包


