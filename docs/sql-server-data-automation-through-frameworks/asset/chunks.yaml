- fmt: '## 配置 SSIS 变量并映射数据集


    按照之前的操作，确保在“添加变量”对话框显示时，将“容器”设置为 SSIS 包作用域（`“Parent”`）。输入 `“PackagePath”` 作为变量名称，其余设置保持各自的默认值，如图
    [6-32](#497846_1_En_6_Chapter.xhtml#Fig32) 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig32_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig32_HTML.jpg)

    图 6-32 添加 `PackagePath` 变量


    单击“确定”按钮关闭“添加变量”对话框。请注意，对于这第一个变量分配，“索引”列默认为 `“0”`，如图 [6-33](#497846_1_En_6_Chapter.xhtml#Fig33)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig33_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig33_HTML.jpg)

    图 6-33 `User::PackagePath` 分配给序数 `“0”`


    `“0”` 表示什么？很高兴你问到这个问题。`“0”` 表示 `User::ApplicationPackages` 数据集中列的序数。请回忆 ADO.Net
    数据集中 `Tables(0)` 的内容，如图 [6-34](#497846_1_En_6_Chapter.xhtml#Fig34) 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig34_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig34_HTML.jpg)

    图 6-34 `User::ApplicationPackages` 中 ADO.Net 数据集的列序数 `“0”`


    我们的包中已经`具有`此字段的值——`ApplicationName` 是通过名为 `$Package::ApplicationName` 的参数传递给 `Parent.dtsx`
    SSIS 包的。我们刚刚创建的 SSIS 变量名为 `“User::PackagePath”`。我们想要在此处分配的值位于第二个字段中，序数为 1（在这个从
    0 开始的数组中）。


