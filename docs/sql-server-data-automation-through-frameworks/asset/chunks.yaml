    包数量。


    Azure-SSIS 集成运行时可包含自定义配置和/或第三方工具，例如 SentryOne 的 `Task Factory` (sentryone.com/products/task-factory)
    和 COZYROC 的 `SSIS+ Components Suite` (cozyroc.com/products)。


    大多数使用云的企业采用 `混合` 架构，将部分而非全部数据存储在云中。`VNet` 是一种访问本地企业数据的方式。在撰写本文时，经典的 Azure 虚拟网络正在被弃用，并由
    `VNet` 替代。对于正在使用或希望使用以下功能的企业，推荐使用 `VNet`：


