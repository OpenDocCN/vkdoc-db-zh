  trans: '## 上传 SSIS 包


    使用存储资源管理器上传 SSIS 包非常简单。如图 9-22 所示，点击“上传”按钮开始操作。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig22_HTML.jpg](img/497846_1_En_9_Fig22_HTML.jpg)

    *图 9-22: 准备将 SSIS 包上传到文件共享*


    如图 9-22 所示，您可以上传文件夹或文件。


    点击“上传文件...”以打开“上传文件”对话框。首先，选择要上传的一个或多个文件——例如第[5]章(#497846_1_En_5_Chapter.xhtml)中开发的
    `ReportAndSucceed.dtsx` 和 `ReportAndFail.dtsx` SSIS 包。其次，接受默认的目标目录（`"/"`）。第三，如图
    9-23 所示，点击“上传”按钮。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig23_HTML.jpg](img/497846_1_En_9_Fig23_HTML.jpg)

    *图 9-23: 配置向文件共享的上传*


    上传完成后，您可以在 Azure 存储资源管理器的“活动”窗口中查看操作结果，如图 9-24 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig24_HTML.jpg](img/497846_1_En_9_Fig24_HTML.jpg)

    *图 9-24: 查看与上传相关的活动*


    `ReportAndSucceed.dtsx` 和 `ReportAndFail.dtsx` SSIS 包已上传，现在在 `fs-ssis` 文件共享中可见，如图
    9-25 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig25_HTML.jpg](img/497846_1_En_9_Fig25_HTML.jpg)

    *图 9-25: 已上传的 `ReportAndSucceed.dtsx` 和 `ReportAndFail.dtsx` SSIS 包*


    下一步是更新 `SSISConfig` 数据库 `config.Packages` 表中的元数据，以反映包所在的文件共享位置。


    ## 更新 `PackageLocation` 值


    问题：一个执行存储在本地文件存储中的 SSIS 包的简单、自定义、基于文件的 SSIS 框架，与一个执行存储在 Azure 文件共享中的 SSIS 包的简单、自定义、基于文件的
    SSIS 框架，有何区别？


    答案：一个元数据值。


    执行清单 9-5 中所示的 T-SQL Update 语句，以更新存储在 `config.Packages` 表中的 `PackageLocation` 值。


    ```sql

    Select p.PackageLocation + p.PackageName As PackagePath

    From [config].[Packages] p

    Update [config].[Packages]

    Set PackageLocation  = N''\\stframeworks.file.core.windows.net\fs-ssis\''

    Where PackageLocation  = N''E:\Projects\TestSSISSolution\TestSSISProject\''

    Select p.PackageLocation + p.PackageName As PackagePath

    From [config].[Packages] p

    ```

    *清单 9-5: 更新 `config.Packages` 表的 `PackageLocation` 值*


    执行清单 9-5 中所示的 T-SQL 后，结果应与图 9-26 类似。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig26_HTML.jpg](img/497846_1_En_9_Fig26_HTML.jpg)

    *图 9-26: 更新 `config.Packages` 元数据*


    现在我们已经准备好构建 SSIS 框架执行引擎——Azure 数据工厂版本。


    ## 构建 SSIS 框架 ADF 执行引擎


    到目前为止，部署一个执行存储在 Azure 文件共享中的 SSIS 包的简单、自定义、基于文件的 SSIS 框架，无需更改 SSIS 框架元数据数据库的基础架构，只需更改元数据，并且仅限于更改单个字段中存储的值。


    SSIS 框架执行引擎是一个 Azure 数据工厂管道，而管道与 SSIS 包不同。这些差异将导致数据库及其他地方的更改。


    ### 检索 SSIS 包列表


    要开始在 ADF 中构建 SSIS 框架执行引擎，请连接到 Azure 数据工厂实例的“创作和监视”站点，点击“按名称筛选资源”文本框旁的“+”，然后点击“管道”以创建新管道，如图
    9-27 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig27_HTML.jpg](img/497846_1_En_9_Fig27_HTML.jpg)

    *图 9-27: 创建新的 ADF 管道*


    新管道打开后，将其名称更改为“parent”，如图 9-28 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig28_HTML.jpg](img/497846_1_En_9_Fig28_HTML.jpg)

    *图 9-28: 将新管道重命名为 "parent"*


    在“活动”窗格中，展开“常规”类别，然后将一个“查找”活动拖到管道画布上。将此查找活动重命名为“获取应用程序包”，如图 9-29 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig29_HTML.jpg](img/497846_1_En_9_Fig29_HTML.jpg)

    *图 9-29: 向父管道添加并重命名一个查找活动*


    Azure 数据工厂的一个很棒的特性是灵活的创作顺序，或称为“FOA”。FOA 意味着可以从任一方向进行 ADF 开发：自底向上或自顶向下。


    自底向上的 ADF 开发涉及*首先*构建链接服务——以允许管道构件与位于管道外部的数据存储和服务进行通信。以自底向上方式构建链接服务后，再开发数据集。数据集使用链接服务并向管道构件呈现数据集合。如果您熟悉
    SSIS，那么 ADF 链接服务类似于 SSIS 连接管理器，而 ADF 数据集则（不太准确地）类似于 SSIS 数据流源和目标适配器。


    对于本示例，我将利用 FOA 进行自顶向下的开发。自顶向下的 ADF 开发是什么样的呢？在接下来的几节中，我将点击并选择“新建”按钮、链接和选项，来构建如数据集和链接服务等
    ADF 构件。


    在“获取应用程序包”查找活动的“设置”选项卡上，点击“+ 新建”链接以配置“源数据集”属性，如图 9-30 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig30_HTML.jpg](img/497846_1_En_9_Fig30_HTML.jpg)

    *图 9-30: 添加新的源数据集*


    当“新建数据集”窗格显示时，选择“Azure SQL 数据库”，然后点击“继续”按钮，如图 9-31 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig31_HTML.jpg](img/497846_1_En_9_Fig31_HTML.jpg)

    *图 9-31: 配置新数据集的数据存储类型*


    设置数据集的“名称”属性；我将我的数据集命名为 `ssisFrameworkDataSet`。点击“链接服务”下拉列表，然后点击“+ 新建”选项，如图 9-32
    所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig32_HTML.jpg](img/497846_1_En_9_Fig32_HTML.jpg)

    *图 9-32: 配置数据集名称和链接服务属性*


    当“新建链接服务 (Azure SQL 数据库)”页面显示时，输入一个名称和可选的描述。将“通过集成运行时连接”选项保留为其默认值，即 `AutoResolveIntegrationRuntime`。


    出于本示例的目的，选择“连接字符串”作为连接源，然后为“帐户选择方法”属性选择“从 Azure 订阅”选项。在订阅下拉列表中选择您的“Azure 订阅”，在“服务器名称”下拉列表中选择您在预配
    Azure SQL 数据库时创建的服务器名称，然后在“数据库名称”下拉列表中选择您预配的 Azure SQL 数据库的名称。'
- fmt: '# 配置Azure SQL连接并解决常见错误


    ## 步骤一：配置连接与测试


    在“Authentication type”下拉菜单中选择“SQL authentication”，然后分别在“User name”和“Password”文本框中输入你的Azure
    SQL数据库用户名和密码。


    现在可以测试连接了。单击“Test connection”链接以测试连接性。连接测试应该会失败，如图[9-33](#497846_1_En_9_Chapter.xhtml#Fig33)所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig33_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig33_HTML.jpg)

    **图 9-33** 连接测试失败


    在此示例中包含此错误的原因是它非常常见。要解决此错误，请在新浏览器选项卡中打开Azure门户，将鼠标悬停在Azure左侧菜单中的“SQL databases”上，以提示显示SQL数据库的“悬停卡片”，如图[9-34](#497846_1_En_9_Chapter.xhtml#Fig34)所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig34_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig34_HTML.jpg)

    **图 9-34** 查看SQL数据库


    单击最近预配的`SSISConfig`数据库以打开`SSISConfig`页面，如图[9-35](#497846_1_En_9_Chapter.xhtml#Fig35)所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig35_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig35_HTML.jpg)

    **图 9-35** `SSISConfig` Azure SQL数据库界面


    在“Overview”页面上，单击服务器名称链接（本例中为“svssis.database.windows.net”）——如图[9-35](#497846_1_En_9_Chapter.xhtml#Fig35)所示——以打开服务器界面，如图[9-36](#497846_1_En_9_Chapter.xhtml#Fig36)所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig36_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig36_HTML.jpg)

    **图 9-36** 托管`SSISConfig` Azure SQL数据库的服务器


    当服务器概览页面显示时，单击“Show firewall settings”链接以打开“Firewalls and virtual networks”页面。将“Allow
    Azure services and resources to access this server”更改为“Yes”，如图[9-37](#497846_1_En_9_Chapter.xhtml#Fig37)所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig37_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig37_HTML.jpg)

    **图 9-37** 更新“Allow Azure services and resources to access this server”


    单击图[9-37](#497846_1_En_9_Chapter.xhtml#Fig37)中所示的“Save”按钮，将“Allow Azure services
    and resources to access this server”的更新存储起来，然后返回到Azure Data Factory中的“New linked
    service”配置。确保完成链接服务配置（在下图中，“User name”属性值已被编辑隐藏）。单击“Test connection”以重新测试到`SSISConfig`数据库的连接，结果应与图[9-38](#497846_1_En_9_Chapter.xhtml#Fig38)类似。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig38_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig38_HTML.jpg)

    **图 9-38** 连接测试成功


    ## 步骤二：配置查找活动


    前面的部分不仅作为FOA（灵活的编写顺序）的示例，还提供了一个非常常见的Azure安全障碍的解决方案。


    继续配置“Get Application Packages”查找活动的“Settings”选项卡，将“Use query”属性更改为“Query”。使用清单[9-6](#497846_1_En_9_Chapter.xhtml#PC6)中所示的T-SQL语句初始化“Query”属性。


    ```sql

    Select a.ApplicationName

    , p.PackageLocation + p.PackageName As PackagePath

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From [config].[ApplicationPackages] ap

    Join [config].[Applications] a

    On a.ApplicationId = ap.ApplicationId

    Join [config].Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test''

    And ap.ApplicationPackageEnabled = 1

    Order By ap.ExecutionOrder

    ```

    **清单 9-6** 用于选择“Framework Test” SSIS应用程序包的T-SQL


    出于本示例的目的，将“Query timeout (minutes)”和“Isolation level”属性保留为其默认值。确保“First row only”复选框未被选中，如图[9-39](#497846_1_En_9_Chapter.xhtml#Fig39)所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig39_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig39_HTML.jpg)

    **图 9-39** 完成“Get Application Packages”查找活动设置


    ## 步骤三：测试与查看结果


    现在可以通过单击工具栏中的“Debug”项来测试“Get Application Packages”查找活动，如图[9-40](#497846_1_En_9_Chapter.xhtml#Fig40)所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig40_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig40_HTML.jpg)

    **图 9-40** 调试执行（红色圆圈）后查看输出（蓝色框）


    调试执行完成后，单击“Get Application Packages”查找活动“Output”选项卡上显示的输出查看器（图[9-40](#497846_1_En_9_Chapter.xhtml#Fig40)中的“蓝色框”），以查看Lookup活动返回的JSON，如图[9-41](#497846_1_En_9_Chapter.xhtml#Fig41)所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig41_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig41_HTML.jpg)

    **图 9-41** “Get Application Packages”查找活动返回的JSON


    现在我们有了SSIS包列表，下一步就是执行列表中包含的SSIS包。'
