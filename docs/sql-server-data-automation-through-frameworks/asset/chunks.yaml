  trans: '# 协调器


    控制器本身就是一种流程，与我们已构建的每日和每月流程一样。我们可能会发现不同控制器的处理之间存在依赖关系。这正是协调器的用武之地。协调器可以像控制器一样精确地处理这些依赖关系。代码清单
    3-1 展示了创建名为 `FWDemo.ProcessOrchestrator` 的存储过程的代码。此存储过程执行 `每日控制器` 存储过程，并根据日期（如适用）执行
    `每月控制器` 存储过程。


    ```sql

    IF EXISTS (SELECT s.name + ''.'' + p.name

    FROM sys.procedures p

    JOIN sys.schemas s

    ON s.schema_id = p.schema_id

    WHERE s.name = ''FWDemo''

    AND p.name = ''ProcessOrchestrator'')

    BEGIN

    PRINT '' - 正在删除 FWDemo.ProcessOrchestrator 存储过程''

    DROP PROCEDURE FWDemo.ProcessOrchestrator

    PRINT '' - FWDemo.ProcessOrchestrator 存储过程已删除''

    END

    GO

    CREATE PROCEDURE FWDemo.ProcessOrchestrator

    @RunDate smalldatetime = null

    AS


    --

    -- 目的：此过程是存储过程框架演示的一部分。                        --    它是执行控制器过程的协调器过程。

    --


    SET NOCOUNT ON

    /*******************************************************/

    /*  将过程开始信息记录到过程日志  */

    /*******************************************************/

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''过程 FWDemo.ProcessOrchestrator - 开始'',

    GETDATE()

    )

    IF @RunDate is null

    SET @RunDate = GETDATE()

    DECLARE @RetStat int

    SET @RetStat = 0

    /******************************************/

    /*  执行每日流程控制器  */

    /******************************************/

    EXEC @RetStat = FWDemo.DailyProcessController

    IF @RetStat <> 0

    GOTO EndOrchestrator

    /**********************************************************************/

    /*  如果 @RunDate 是某月的第一天，则执行每月流程控制器                    */      /*                                                                    */

    /**********************************************************************/

    IF DATEPART(DAY, @RunDate) = 1

    BEGIN

    EXEC @RetStat = FWDemo.MonthlyProcessController

    IF @RetStat <> 0

    GOTO EndOrchestrator

    END

    /************************************************************/

    /*  将过程完成信息记录到过程日志  */

    /************************************************************/

    EndOrchestrator:

    IF @RetStat = 0

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''过程 FWDemo.ProcessOrchestrator - 已完成'',

    GETDATE()

    )

    END

    ELSE

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''过程 FWDemo.ProcessOrchestrator - 错误'',

    GETDATE()

    )

    END

    RETURN @RetStat

    GO

    代码清单 3-1

    流程协调器存储过程

    ```


    正如我们已经见过的各种存储过程一样，协调器通过记录到 `FWDemo.ProcessLog` 来显示执行进度。返回状态用于检查控制器是否成功完成。此外，还包括用于确定是否为每月第一天的代码，这是执行
    `月度流程` 的优先规则之一。有一个名为 `@RunDate` 的输入参数，其默认值为 `null`。`null` 值导致存储过程使用当前日期进行处理。然而，为了便于试验演示系统，可以在执行时提供日期来设定
    `@RunDate` 的值。代码清单 3-2 展示了协调器的执行语句，分别用于使用当前日期和覆盖日期的情况。从所有实际目的来看，运维人员需要做的全部事情就是设置/安排
    `FWDemo.ProcessOrchestrator` 的执行，其他一切都由已构建的模式处理。


    ```sql

    --如果运行日期是当前日期：

    EXECUTE FWDemo.ProcessOrchestrator

    --如果运行日期不是当前日期：

    EXECUTE FWDemo.ProcessOrchestrator

    @RunDate = ''<CCYYMMDD>''

    --注意：<CCYYMMDD> 的格式为 CCYYMMDD

    代码清单 3-2

    流程协调器执行语句

    ```


    # 流程快速概览


    至此，让我们回顾一下目前已构建的内容。有一个 `每日流程`，由两个存储过程组成；还有一个 `每月流程`，也由两个存储过程组成。每日流程控制器 `FWDemo.DailyProcessController`
    执行每日流程，并确保存储过程 `FWDemo.DailyProcess1` 成功完成后再执行 `FWDemo.DailyProcess2` 存储过程。每月流程控制器
    `FWDemo.MonthlyProcessController` 执行每月流程，并确保存储过程 `FWDemo.MonthlyProcess1` 成功完成后再执行
    `FWDemo.MontlyProcess2` 存储过程。包裹这一切的是 `FWDemo.ProcessOrchestrator`，它执行每日流程控制器，并在成功完成后检查运行日期是否为某月的第一天，如果是，则执行每月流程控制器。单个执行语句驱动整个流程。


    # 问题排查初探


    到目前为止，我们的注意力一直集中在如何成功完成已构建的流程上。所以，是时候进行现实检验了。我们如何处理错误情况？如果序列中的某个流程出错并未成功完成，我们该怎么办？这种情况有时会伴随着深夜的电话，需要采取一些行动。于是便开始了深入调查和问题排查。查看
    `FWDemo.ProcessLog` 是开始识别问题位置和原因以进行纠正的绝佳起点。一旦确定了解决方案并纠正了问题，我们如何完成序列中剩余的步骤？按照我们当前的模式，唯一的选择似乎是解构出错的流程并手动完成它。之后，我们在模式的最高层级找到一次执行，并从那里手动执行。


    例如，生产流程的存储过程 `FWDemo.DailyProcess2` 出现问题。我们研究并纠正了问题。此时，需要手动执行 `FWDemo.DailyProcess2`。成功完成后，我们知道
    `FWDemo.DailyProcessController` 中的所有内容都已完成。下一个最高层级是 `FWDemo.ProcessOrchestrator`
    存储过程。在每日流程控制器执行后，协调器会检查 `@RunDate` 参数中的值是否等于某月的第一天。如果是这种情况，那么我们需要手动执行 `FWDemo.MonthlyProcessController`。如果不是某月的第一天，则无需其他操作。在我们的系统中，这相当简单。但实际上，解决方案可能包含更多变动部分和大量手动干预。流程越复杂，问题解决就越复杂。


    # 总结


    协调器不过是更高级别的控制器。它管理多个控制器的执行，同时整合控制器之间可能存在的任何依赖关系。它可以进一步简化调度，同时提供更完整的流程视图，有助于成功进行问题补救。


    # 4. 基于存储过程的元数据驱动框架


    为了增加灵活性和对框架内所有流程执行的控制，可以在环境中添加元数据。它可以标识存储过程、控制器和协调器，以及它们之间的关系。元数据将用作驱动流程执行的通信媒介。'
- fmt: '## Building the Metadata


    ### 简介


    If we’re going to create metadata, then we need a place in which to store it.
    We can create a table or a set of tables for that purpose. The metadata for this
    chapter’s example is stored in a set of tables used to control executions. The
    first table is `FWDemo.ProcessProcedure`, seen in Listing [4-1](#497846_1_En_4_Chapter.xhtml#PC1).


    ### 创建元数据表


    ```sql

    IF EXISTS (SELECT * FROM sys.objects

    WHERE object_id = OBJECT_ID(N''FWDemo.ProcessProcedure'')

    AND type in (N''U''))

    DROP TABLE FWDemo.ProcessProcedure

    GO

    SET ANSI_NULLS ON

    GO

    SET QUOTED_IDENTIFIER ON

    GO

    SET ANSI_PADDING ON

    GO

    CREATE TABLE [FWDemo].[ProcessProcedure](

    [ProcessProcedureID]    [int] IDENTITY(1,1) NOT NULL,

    [ProcessProcedureName]  [nvarchar](255)     NOT NULL

    )

    GO

    SET ANSI_PADDING OFF

    GO

    ```

    Listing 4-1

    ProcessProcedure table creation


    This table identifies all of the stored procedures available for execution in
    the framework. The stored procedures become the building blocks that are collected
    together in what we will call framework applications. To establish the application,
    we use the `FWDemo.Application` table seen in Listing [4-2](#497846_1_En_4_Chapter.xhtml#PC2).


    ```sql

    IF EXISTS (SELECT * FROM sys.objects

    WHERE object_id = OBJECT_ID(N''FWDemo.Application'')

    AND type in (N''U''))

    DROP TABLE FWDemo.Application

    GO

    SET ANSI_NULLS ON

    GO

    SET QUOTED_IDENTIFIER ON

    GO

    SET ANSI_PADDING ON

    GO

    CREATE TABLE [FWDemo].[Application](

    [ApplicationID]   [int] IDENTITY(1,1) NOT NULL,

    [ApplicationName] [nvarchar](255)     NOT NULL

    )

    GO

    SET ANSI_PADDING OFF

    GO

    ```

    Listing 4-2

    Application table creation


    Now it is necessary to identify which of the stored procedures are going to be
    included in each of the defined applications. For that, we use the table, seen
    in Listing [4-3](#497846_1_En_4_Chapter.xhtml#PC3), called `FWDemo.ApplicationProcessProcedure`.
    This table contains the metadata that will define the execution of the process.
    As we discussed in Chapter [1](#497846_1_En_1_Chapter.xhtml), building small unit
    of work stored procedures allows for code reuse. Using the metadata tables allows
    relating a single stored procedure to multiple applications. A data archive stored
    procedure would be a good example of where this might be helpful.


    ```sql

    IF EXISTS (SELECT * FROM sys.objects

    WHERE object_id = OBJECT_ID(N''FWDemo.ApplicationProcessProcedure'')

    AND type in (N''U''))

    DROP TABLE FWDemo.ApplicationProcessProcedure

    GO

    SET ANSI_NULLS ON

    GO

    SET QUOTED_IDENTIFIER ON

    GO

    SET ANSI_PADDING ON

    GO

    CREATE TABLE [FWDemo].[ApplicationProcessProcedure](

    [ApplicationProcessProcedureID] [int] IDENTITY(1,1) NOT NULL,

    [ApplicationID]         [int]  NOT NULL,

    [ProcessProcedureID]    [int]  NOT NULL,

    [ExecutionOrder]        [int]  NOT NULL,

    [Active]                [bit]  NOT NULL

    )

    GO

    SET ANSI_PADDING OFF

    GO

    ```

    Listing 4-3

    ApplicationProcessProcedure table creation


    There is a column named `ExecutionOrder` which will determine where in the process
    sequence its associated stored procedure will be executed. Also, the `Active`
    column indicates that a stored procedure is enabled for execution. It is used
    to disable procedures that, for some reason, are not to be executed in the process.
    This is great if you want to temporarily bypass a procedure and will be discussed
    later in this chapter.


    ### 加载元数据


    With the metadata tables created, let’s load the data for our processes. Listing
    [4-4](#497846_1_En_4_Chapter.xhtml#PC4) shows the code that loads all of our stored
    procedures into the `FWDemo.ProcessProcedure` table. Only the name is inserted
    because the value for `ProcessProcedureID`, being an `IDENTITY` column, will be
    automatically generated.


    ```sql

    --Load First Daily Procedure

    INSERT INTO FWDemo.ProcessProcedure (ProcessProcedureName)

    VALUES (''FWDemo.DailyProcess1'')

    GO

    --Load Second Daily Procedure

    INSERT INTO FWDemo.ProcessProcedure (ProcessProcedureName)

    VALUES (''FWDemo.DailyProcess2'')

    GO

    --Load First Monthly Procedure

    INSERT INTO FWDemo.ProcessProcedure (ProcessProcedureName)

    VALUES (''FWDemo.MonthlyProcess1'')

    GO

    --Load Second Monthly Procedure

    INSERT INTO FWDemo.ProcessProcedure (ProcessProcedureName)

    VALUES (''FWDemo.MonthlyProcess2'')

    GO

    ```

    Listing 4-4

    Load data to the ProcessProcedure table


    Listing [4-5](#497846_1_En_4_Chapter.xhtml#PC5) has the code to define the applications
    for our demonstration into the table `FWDemo.Application`. For our basic framework,
    we are defining our daily and monthly processes. Again, the value of the `IDENTITY`
    column `ApplicationID` will be automatically generated.


    ```sql

    --Load Application for Daily Process

    INSERT INTO FWDemo.Application (ApplicationName)

    VALUES (''DailyProcessControllerMD'')

    GO

    --Load Application for Monthly Process

    INSERT INTO FWDemo.Application (ApplicationName)

    VALUES (''MonthlyProcessControllerMD'')

    GO

    ```

    Listing 4-5

    Load data to the Application table


    ### 关联存储过程与应用程序


    To put all of the pieces together, Listing [4-6](#497846_1_En_4_Chapter.xhtml#PC6)
    contains the code to relate the stored procedures to their intended application.
    Notice the values used for the execution order. Using values in a scale, in this
    case a scale of ten, leaves gaps between the initially defined execution order.
    This way, if a new procedure is added later on that needs to execute between existing
    stored procedures, there is room to add a value, and the existing execution order
    values do not have to be renumbered. Also, notice that a value of `"1"` is used
    for the `Active` column. This enables the procedure for execution within the application.
    A value of `"0"` will disable the procedure in the context of the application.


    ```sql

    DECLARE @AppID    int,

    @ProcID     int

    /********************************/

    /*  Daily Process Application   */

    /********************************/

    SET @AppID = (SELECT ApplicationID

    FROM FWDemo.Application

    WHERE ApplicationName = ''DailyProcessControllerMD'')

    SET @ProcID = (SELECT ProcessProcedureID

    FROM FWDemo.ProcessProcedure

    WHERE ProcessProcedureName = ''FWDemo.DailyProcess1'')

    INSERT INTO FWDemo.ApplicationProcessProcedure (

    ApplicationID,

    ProcessProcedureID,

    ExecutionOrder,

    Active

    )

    VALUES (@AppID,

    @ProcID,

    10,

    1

    )

    SET @ProcID = (SELECT ProcessProcedureID

    FROM FWDemo.ProcessProcedure

    WHERE ProcessProcedureName = ''FWDemo.DailyProcess2'')

    INSERT INTO FWDemo.ApplicationProcessProcedure (

    ApplicationID,

    ProcessProcedureID,

    ExecutionOrder,

    Active

    )

    VALUES (@AppID,

    @ProcID,

    20,

    1

    )

    /**********************************/

    /*  Monthly Process Application   */

    /**********************************/

    SET @AppID = (SELECT ApplicationID

    FROM FWDemo.Application

    WHERE ApplicationName = ''MonthlyProcessControllerMD'')

    SET @ProcID = (SELECT ProcessProcedureID

    FROM FWDemo.ProcessProcedure

    WHERE ProcessProcedureName = ''FWDemo.MonthlyProcess1'')

    INSERT INTO FWDemo.ApplicationProcessProcedure (

    ApplicationID,

    ProcessProcedureID,

    ExecutionOrder,

    Active

    )

    VALUES (@AppID,

    @ProcID,

    10,

    1

    )

    SET @ProcID = (SELECT ProcessProcedureID

    FROM FWDemo.ProcessProcedure

    WHERE ProcessProcedureName = ''FWDemo.MonthlyProcess2'')

    INSERT INTO FWDemo.ApplicationProcessProcedure (

    ApplicationID,

    ProcessProcedureID,

    ExecutionOrder,

    Active

    )

    VALUES (@AppID,

    @ProcID,

    20,

    1

    )

    ```

    Listing 4-6

    Load metadata for framework'
