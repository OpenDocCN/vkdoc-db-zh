    enterprises execute SSIS packages stored in the file system on-premises. In the
    past, migrating SSIS packages executed in an on-premises file system meant changing
    enterprise SSIS storage and execution patterns. With the advent of Azure-SSIS
    File Share–based execution, executing SSIS packages from files in Azure is no
    longer an issue.


    In fact, the SSIS framework from the previous chapter works well in Azure-SSIS.
    In this chapter, we will discuss and demonstrate


    *   Getting Started with Azure


    *   Provisioning an Azure Data Factory


    *   Provisioning Azure Storage


    *   Provisioning Azure-SSIS


    ## Getting Started with Azure


    Before creating and interacting with resources in Azure, one must first create
    an Azure account at azure.com, as shown in Figure [8-1](#497846_1_En_8_Chapter.xhtml#Fig1).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig1_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Azure.com


    Please note the text on the link button in Figure [8-1](#497846_1_En_8_Chapter.xhtml#Fig1)
    reads, “Try Azure for free.” To date, the good people at Microsoft have consistently
    offered free introductory access to some Azure services. Free introductory offers
    lie solely with Microsoft and are subject to changes at Microsoft’s discretion.


    After an account has been created, the next step is to provision an Azure Data
    Factory.


    Azure changes daily. Some of the screenshots and procedures in this book will
    be out of date before publication.'
  trans: '

    ## 结论


    本章介绍了 SSIS 框架日志记录，它扩展了我们在第 6 章中构建的仪表化功能。接下来的几章将探讨如何将这个简单的 SSIS 框架迁移并适配到更多场景中，包括
    Azure Data Factory。


    # 8. Azure-SSIS 集成运行时


    微软 Azure-SSIS 团队一直在努力，致力于减少在本地执行 SSIS 包与在 Azure 中执行 SSIS 包之间的摩擦。许多企业在本地执行存储在文件系统中的
    SSIS 包。过去，迁移在本地文件系统中执行的 SSIS 包意味着要改变企业的 SSIS 存储和执行模式。随着基于 Azure-SSIS 文件共享执行的出现，从
    Azure 文件执行 SSIS 包已不再是个问题。


    实际上，前一章介绍的 SSIS 框架在 Azure-SSIS 中运行良好。在本章中，我们将讨论并演示：


    *   Azure 入门

    *   配置 Azure Data Factory

    *   配置 Azure 存储

    *   配置 Azure-SSIS


    ## Azure 入门


    在 Azure 中创建资源并与之交互之前，必须首先在 azure.com 上创建一个 Azure 帐户，如图 8-1 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig1_HTML.jpg](img/497846_1_En_8_Fig1_HTML.jpg)


    图 8-1: Azure.com


    请注意，图 8-1 中链接按钮上的文字是“Try Azure for free”。迄今为止，微软的优秀员工一直持续提供某些 Azure 服务的免费入门访问权限。免费的入门优惠完全由微软提供，并可能根据微软的决定进行更改。


    创建帐户后，下一步是配置 Azure Data Factory。


    Azure 每天都在变化。本书中的一些截图和操作步骤在出版前可能就会过时。


    SSIS 应用程序包容错按设计工作


    请记住，`ReportAndFail.dtsx`应用程序包执行`应该`失败，但一个`ReportAndFail.dtsx`应用程序包执行实例的失败`不应`导致应用程序失败（在其当前配置下）。


    使用清单 7-14 中的 T-SQL 更新`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位配置。


    ```sql

    Select p.PackageName

    , ap.FailApplicationOnPackageFailure

    From [SSISConfig].[config].[ApplicationPackages] ap

    Join [SSISConfig].[config].[Packages] p

    On p.PackageId = ap.PackageId

    Where p.PackageName = N''ReportAndFail.dtsx''


    Update ap

    Set ap.FailApplicationOnPackageFailure = 1

    From [SSISConfig].[config].[ApplicationPackages] ap

    Join [SSISConfig].[config].[Packages] p

    On p.PackageId = ap.PackageId

    Where p.PackageName = N''ReportAndFail.dtsx''


    Select p.PackageName

    , ap.FailApplicationOnPackageFailure

    From [SSISConfig].[config].[ApplicationPackages] ap

    Join [SSISConfig].[config].[Packages] p

    On p.PackageId = ap.PackageId

    Where p.PackageName = N''ReportAndFail.dtsx''


    Listing 7-14: 更新 ReportAndFail.dtsx 的 FailApplicationOnPackageFailure 位

    ```


    更新`ReportAndFail.dtsx`应用程序包的 SSIS 框架应用程序包元数据后，结果如图 7-44 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig44_HTML.jpg](img/497846_1_En_7_Fig44_HTML.jpg)


    图 7-44: 更新 ReportAndFail.dtsx 应用程序包元数据的结果


    重新执行`Parent.dtsx`确认了我们可以在需要时失败，如图 7-45 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig45_HTML.jpg](img/497846_1_En_7_Fig45_HTML.jpg)


    图 7-45: 由 SSIS 框架元数据管理的应用程序包失败


    `Parent.dtsx` SSIS 包的当前状态代表了一个相当健壮的 SSIS 框架执行引擎。


    然而，仍然存在一个问题：重新执行清单 7-11 中所示的查询，返回的`ApplicationPackageStatus`结果为“Running”，类似于图
    7-46 所示的结果。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig46_HTML.jpg](img/497846_1_En_7_Fig46_HTML.jpg)


    图 7-46: ApplicationPackageStatus 为 “Running”


    为什么`ApplicationPackageStatus`是“Running”？查看图 7-45 中的截图，注意“SQL Log Application Package
    Instance Failure”执行 SQL 任务*没有执行*，因为连接“SCR Log Package Execution Failure”脚本任务和“SQL
    Log Application Package Instance Failure”执行 SQL 任务的优先约束被配置为仅在*成功*时评估。回顾清单 7-13，应用程序包失败可能导致“SQL
    Log Application Package Instance Failure”执行 SQL 任务成功*或*失败，具体取决于`[config].[ApplicationPackages]`表中应用程序包的`FailApplicationOnPackageFailure`位值。


    清单 7-14 和图 7-44 显示我们将`FailApplicationOnPackageFailure`位设置为 1（true），这通知了“SCR Log
    Package Execution Failure”脚本任务。“SCR Log Package Execution Failure”脚本任务随后按照清单 7-13
    中规定的.Net C#代码引发了错误。


    幸运的是，修复方法简单明了——删除连接“SCR Log Package Execution Failure”脚本任务和“SQL Log Application
    Package Instance Failure”执行 SQL 任务的优先约束。从“EPT Execute Child Package”执行包任务到“SQL
    Log Application Package Instance Failure”执行 SQL 任务连接一个新的*失败*优先约束。在调试器中重新执行`Parent.dtsx`会执行“SQL
    Log Application Package Instance Failure”执行 SQL 任务，如图 7-47 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig47_HTML.jpg](img/497846_1_En_7_Fig47_HTML.jpg)


    图 7-47: “SQL Log Application Package Instance Failure” 执行 SQL 任务得以执行


    重新执行清单 7-11 中的应用程序包状态查询，返回的`ApplicationPackageStatus`结果为“Failed”，类似于图 7-48 所示的结果。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig48_HTML.jpg](img/497846_1_En_7_Fig48_HTML.jpg)


    图 7-48: ApplicationPackageStatus 为 “Failed”


    我们的 SSIS 框架执行引擎现已准备好部署到其他地方。

    '
- fmt: '## Provisioning an Azure Data Factory


    Azure hosts lots of services. In general, Azure services may be categorized as:


    1.  Infrastructure as a Service, or IaaS, in which Azure hosts enterprise infrastructure
    such as virtual machines (VM''s).

    2.  Platform as a Service, or PaaS, in which Azure surfaces enterprise platforms
    such as SQL Server or `Azure Data Factory`.


    Azure users begin by `provisioning` – or creating instances of – Azure service
    offerings. Begin provisioning an instance of `Azure Data Factory` – or ADF – by
    clicking "Create a resource" in the left menu, as shown in Figure [8-2](#497846_1_En_8_Chapter.xhtml#Fig2).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig2_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig2_HTML.jpg)

    *Figure 8-2: Create a resource in Azure’s left menu*


    When the New page displays, search for "Data Factory," as shown in Figure [8-3](#497846_1_En_8_Chapter.xhtml#Fig3).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig3_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig3_HTML.jpg)

    *Figure 8-3: Searching for Data Factory on the New page*


    On the New page, click "Data Factory" beneath the search textbox on the New page
    to open the Data Factory page, as shown in Figure [8-4](#497846_1_En_8_Chapter.xhtml#Fig4).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig4_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig4_HTML.jpg)

    *Figure 8-4: The Data Factory page*


    Click the Create button on the Data Factory page to open the New data factory
    page, as shown in Figure [8-5](#497846_1_En_8_Chapter.xhtml#Fig5).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig5_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig5_HTML.jpg)

    *Figure 8-5: Adding a new instance of an Azure Data Factory*


    Enter values for the required fields on the New data factory page.


    `Azure Data Factory`, `Resource Group`, and `Storage Account` names are globally
    unique and case insensitive, according to `Azure Data Factory` – naming rules
    (`docs.microsoft.com/en-us/azure/data-factory/naming-rules`).


    Resource groups are one way to group related Azure resources. When using Azure
    resources to learn Azure, resource groups allow students to `delete` the resource
    group and all constituents from a single screen.


    You may select an existing resource group from the Resource Group drop-down, or
    create a new resource group by clicking the “Create new” link beneath the Resource
    Group drop-down, as shown in Figure [8-6](#497846_1_En_8_Chapter.xhtml#Fig6).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig6_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig6_HTML.jpg)

    *Figure 8-6: Creating a new Resource Group*


    At the time of this writing, Microsoft maintains more than 20 data center locations
    around the globe. The locations exist to help get your applications and data closer
    to clients. Multiple locations also facilitate backups and redundancy.


    For best response, select a location near you from the Locations drop-down, as
    shown in Figure [8-7](#497846_1_En_8_Chapter.xhtml#Fig7).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig7_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig7_HTML.jpg)

    *Figure 8-7: Selecting a Location*


    The “Enable GIT” is checked by default and this is awesome, and shown in Figure
    [8-8](#497846_1_En_8_Chapter.xhtml#Fig8).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig8_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig8_HTML.jpg)

    *Figure 8-8: The Enable GIT checkbox*


    This chapter does not cover source control, so please uncheck the Enable GIT checkbox.


    Click the Create button to provision an instance of `ADF` configured as specified.


    After a few minutes, the `Azure Data Factory` is provisioned. You may visit the
    resource, or pin it to a dashboard using the buttons in the notification, as shown
    in Figure [8-9](#497846_1_En_8_Chapter.xhtml#Fig9).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig9_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig9_HTML.jpg)

    *Figure 8-9: Azure Data Factory, provisioned*


    If you click the “Pin to dashboard” button from the notification “toast,” a Data
    Factory tile appears on the last Azure dashboard you visited, and appears as shown
    in Figure [8-10](#497846_1_En_8_Chapter.xhtml#Fig10).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig10_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig10_HTML.jpg)

    *Figure 8-10: An Azure Data Factory instance pinned to an Azure dashboard*


    Like resource groups, Azure dashboards offer a way to group Azure resources. Azure
    dashboards allow visual grouping of Azure resources from many resource groups
    – and even subscriptions for those who manage more than one Azure subscription.


    Click the tile to visit the page for the `Azure Data Factory`. The Overview displays
    by default, as shown in Figure [8-11](#497846_1_En_8_Chapter.xhtml#Fig11).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig11_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig11_HTML.jpg)

    *Figure 8-11: The Azure Data Factory page*


    The “pushpin” in the upper right corner of the `Azure Data Factory` page allows
    you to pin a tile for this ADF instance to an Azure Dashboard. Remember, you may
    configure more than one Azure dashboard, and the ADF instance tile will pin to
    the last dashboard visited.


    Click the Author & Monitor link button to visit `adf.azure.com` for this instance
    of `Azure Data Factory`, as shown in Figure [8-12](#497846_1_En_8_Chapter.xhtml#Fig12).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig12_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig12_HTML.jpg)

    *Figure 8-12: The Data Factory Overview page*


    At the time of this writing, the Data Factory Overview page includes shortcut
    links for the following operations:


    *   Create pipeline

    *   Create data flow

    *   Create pipeline from template

    *   Copy data

    *   Configure SSIS integration

    *   Set up code repository


    Now that an `Azure Data Factory` is provisioned, the next step is to add `Azure
    Storage`.'
