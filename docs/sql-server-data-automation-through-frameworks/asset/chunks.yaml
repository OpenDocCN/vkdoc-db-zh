    SQL 任务之间的优先级约束。连接新的优先级约束 – 第一个在 SCR 日志初始值脚本任务和新的执行 SQL 任务之间，第二个在新的执行 SQL 任务和 SQL
    获取应用程序包执行 SQL 任务之间。将新的执行 SQL 任务重命名为“SQL 日志应用程序实例开始”，如 `图 7-4` 所示。


