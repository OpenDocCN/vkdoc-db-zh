    ### 日常流程


    清单 1-2 展示了将构成我们演示的“日常流程”的两个存储过程的创建代码。我们在示例中提供两个过程是因为这很常见，而且有两个过程可以让我们展示如何使后续过程的执行依赖于前面过程的成功——因为需要执行一系列过程并在出错时停止或采取其他措施，正是我们大多数人面临的现实场景。


    这些过程（以及我们将要使用的所有其他过程）都可以被编译和执行以供你自行测试。你会注意到每个过程中都有一些被注释掉的代码（以 `--` 开头的行），这些代码可以被调用（移除
    `--`，然后重新编译）以创建错误条件。这种创建错误条件的能力允许测试成功和未成功的完成情况，随着我们在后续章节中进行演示迭代，这将变得更加重要。


