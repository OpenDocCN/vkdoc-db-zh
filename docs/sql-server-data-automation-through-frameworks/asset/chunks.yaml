  raw: 'As before, make sure the Container is set to the SSIS package scope (“Parent”)
    when the Add Variable dialog displays. Enter “PackagePath” as the variable name,
    and leave all other settings at their respective defaults, as shown in Figure
    [6-32](#497846_1_En_6_Chapter.xhtml#Fig32).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig32_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig32_HTML.jpg)


    Figure 6-32


    Adding the PackagePath variable


    Click the OK button to close the Add Variable dialog. Note the Index column defaults
    to “0” for this first variable assignment as shown in Figure [6-33](#497846_1_En_6_Chapter.xhtml#Fig33).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig33_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig33_HTML.jpg)


    Figure 6-33


    User::PackagePath assigned to ordinal “0”


    What does “0” mean? I’m glad you asked. “0” indicates the ordinal of the column
    in the User::ApplicationPackages dataset. Please recall the contents of Tables(0)
    in the ADO.Net dataset as shown in Figure [6-34](#497846_1_En_6_Chapter.xhtml#Fig34).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig34_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig34_HTML.jpg)


    Figure 6-34


    Column Ordinal “0” in the ADO.Net dataset in User::ApplicationPackages


    Our package already *has* the value in this field – ApplicationName is passed
    to the Parent.dtsx SSIS package in the parameter named $Package::ApplicationName.
    The SSIS variable we just created is named “User::PackagePath”. The value we want
    to assign here is in the second field, ordinal 1 (of this 0-based array).


    Change the “0” to “1” in the Index column, as shown in Figure [6-35](#497846_1_En_6_Chapter.xhtml#Fig35).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig35_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig35_HTML.jpg)


    Figure 6-35


    Changing the ordinal to “1”


    The User::PackagePath will now be assigned the value of the second column – 1
    in zero-based ordinals – in the dataset.


    Create a new SSIS Int32 variable named User::ExecutionOrder to map the value of
    the ExecutionOrder from the dataset in the User::ApplicationPackages variable
    using the following settings on the Add Variable dialog, as shown in Figure [6-36](#497846_1_En_6_Chapter.xhtml#Fig36).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig36_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig36_HTML.jpg)


