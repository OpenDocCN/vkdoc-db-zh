    ## 步骤二：配置查找活动


    前面的部分不仅作为 FOA（灵活的编写顺序）的示例，还提供了一个非常常见的 Azure 安全障碍的解决方案。


    继续配置“获取应用程序包”查找活动的“设置”选项卡，将“使用查询”属性更改为“查询”。使用清单 9-6 中所示的 T-SQL 语句初始化“查询”属性。


