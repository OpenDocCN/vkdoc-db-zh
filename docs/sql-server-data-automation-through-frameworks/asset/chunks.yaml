- fmt: 'When the parent pipeline is executed, both application packages – `ReportAndFail.dtsx`
    and `ReportAndSucceed.dtsx` – are retrieved from the `SSISConfig` database and
    dumped into the parent pipeline’s “ForEach Application Package” ForEach activity’s
    iterator. Because the `ExecutionOrder` of `ReportAndFail.dtsx` is 10 and the `ExecutionOrder`
    of `ReportAndSucceed.dtsx` is 20, `ReportAndFail.dtsx` executes first. By design,
    when the execution of `ReportAndFail.dtsx` fails in the child pipeline and the
    `FailApplicationOnPackageFailure` bit is true, the parent pipeline is cancelled.


    What happens if `ReportAndFail.dtsx` fails in the child pipeline and the `FailApplicationOnPackageFailure`
    bit is `false`? To test, update the `FailApplicationOnPackageFailure` bit for
    the `ReportAndFail.dtsx` application package using the T-SQL in Listing 11-4.


    ```sql

    Select ap.ApplicationPackageId

    , a.ApplicationName

    , p.PackageName

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From config.Applications a

    Join config.ApplicationPackages ap

    On ap.ApplicationId = a.ApplicationId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test''

    Order By ap.ExecutionOrder


    Update config.ApplicationPackages

    Set FailApplicationOnPackageFailure = 0

    Where ApplicationPackageId = 2


    Select ap.ApplicationPackageId

    , a.ApplicationName

    , p.PackageName

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From config.Applications a

    Join config.ApplicationPackages ap

    On ap.ApplicationId = a.ApplicationId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test''

    Order By ap.ExecutionOrder

    ```


    Listing 11-4

    Updating the `FailApplicationOnPackageFailure` bit for the `ReportAndFail.dtsx`
    application package


    The results of executing the T-SQL query in Listing 11-4 should appear similar
    to Figure 11-34.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig34_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig34_HTML.jpg)


    Figure 11-34

    `FailApplicationOnPackageFailure` bit for the `ReportAndFail.dtsx` application
    package, updated


    To test the implications of changing the `FailApplicationOnPackageFailure` bit
    for the `ReportAndFail.dtsx` application package, re-trigger the parent pipeline.
    The Monitor page surfaces the fault-tolerant results: `ReportAndFail.dtsx` failed
    but did not stop execution of the SSIS framework application. `ReportAndSucceed.dtsx`
    executed and succeeded, as shown in Figure 11-35.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig35_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig35_HTML.jpg)


    Figure 11-35

    Fault tolerance in action; an application package failure does not stop application
    execution


    My only complaint is that the parent pipeline reports failure.


    ## Conclusion


    In this chapter, we added fault tolerance to the Azure Data Factory version of
    the SSIS framework. In the process, we learned about configuring security for
    the Azure Data Factory Managed Identity so web activities in the data factory’s
    pipelines could invoke methods in the Azure Data Factory REST API. We also learned
    more about the default behavior of the ForEach activity.'
