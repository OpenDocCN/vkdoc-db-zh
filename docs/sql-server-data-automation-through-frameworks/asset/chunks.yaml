    # Introduction


    Frameworks have existed for as long as people have been building things. When
    people began developing solutions using computers, frameworks soon followed. Like
    woodworking jigs, frameworks exist to simplify work and speed up the process of
    developing a solution, whether the problem is to complete a woodworking project
    or deliver an enterprise data integration solution.


    ## Who Is This Book For?


    Anyone who is interested in data-related automation or executing multiple chunks
    of code with a single command will find value in these pages. Three audiences
    will particularly benefit from this book:


    1.  Database developers

    2.  Data engineers and data integration developers

    3.  Business Intelligence Markup Language (`Biml`) developers


    Database developers will learn about driving database object execution from stored
    procedures and will see one example of a database framework.


    Data engineers and data integration developers will learn how to use `SQL Server
    Integration Services` (`SSIS`) to implement a metadata-driven data integration
    framework.


    `Biml` developers will see one example of using `BimlExpress` and metadata to
    rapidly produce several `SSIS` packages in selected design patterns *and* an example
    of interrogating flat files to generate flat file formats and flat file connection
    managers via `Biml`.


    ## How This Book Is Structured


    In the following sections, we will explore the chapter layout of this book. There
    are two parts that guide you through the process of building a database framework
    using stored procedures and an `SSIS` framework. Each of those parts is composed
    of several chapters.


    ### Part I: Stored Procedure–Based Database Frameworks


    In the first part of this book, we will focus on building a database framework
    using stored procedures. These chapters are targeted primarily at those who develop
    database solutions. We do not endeavor to create the most comprehensive primer
    for every aspect of database development; we cover the basics well.


    #### Chapter 1: Stored Procedures 101


    Before we dive into database development, let’s cover some basics of stored procedures.


    #### Chapter 2: Automation with Stored Procedures


    Once you have a solid grasp on stored procedures, we will use what we’ve learned
    about stored procedures to automate execution using the controller pattern, which
    executes one or more stored procedures.


    #### Chapter 3: Stored Procedure Orchestrators


    In this chapter, we examine high-level execution management using the orchestrator
    pattern, which executes one or more controller stored procedures.


    #### Chapter 4: A Stored Procedure–Based Metadata-Driven Framework


    Metadata-driven frameworks are a recurring theme in this book. In this chapter,
    we store information about stored procedures, controllers, and orchestrators to
    execute framework applications.


    ### Part II: SSIS Frameworks


    If your enterprise is executing a few `SSIS` packages, there is no need for an
    `SSIS` framework. However, if your enterprise is executing several hundred (or
    several thousand) `SSIS` packages, you *definitely* need an `SSIS` framework.


    #### Chapter 5: A Simple, Custom, File-Based SSIS Framework


    In this chapter, we define a data integration/engineering framework metadata database
    that manages configuration and execution. We introduce a version of an `SSIS`
    framework that manages these subject areas for `SSIS` executed on-premises.


    #### Chapter 6: Framework Execution Engine


    In this chapter, we add instrumentation in the form of `Information` and `Error`
    events. Built-in `SSIS` logging will surface these messages, which are useful
    when troubleshooting `SSIS` framework application issues.


    #### Chapter 7: Framework Logging


    In this chapter, we persist execution metadata to “Instance” tables. The `ApplicationInstance`
    table stores one record for each instance of an `SSIS` framework application execution.
    The `ApplicationPackageInstance` table stores one record for each instance of
    an `SSIS` framework application package execution. Important execution instance
    attributes – such as start and end times and execution status – are maintained
    in the “Instance” tables.


    #### Chapter 8: Azure-SSIS Integration Runtime


    In this chapter, we introduce `Azure Data Factory` (`ADF`) and the `Azure-SSIS`
    integration runtime by walking through the provisioning processes.


    #### Chapter 9: Deploy a Simple, Custom, File-Based Azure-SSIS Framework


    In Chapters 5–7, we designed and constructed an `SSIS` framework aimed at on-premises
    `SSIS` execution, configuration, and logging. In this chapter, we begin migrating
    the `SSIS` framework designed in Chapters 5–7 by provisioning a new `Azure SQL`
    database and then deploying the metadata database to our new `Azure SQL` database.
    We provision an `Azure File Share` and migrate test `SSIS` packages to the `Azure
    File Share`. Finally, we begin building the `Azure Data Factory` parent pipeline
    that serves as the execution engine for the `ADF` version of the `SSIS` framework.


    #### Chapter 10: Framework Logging in ADF


    In this chapter, we add logging functionality to the parent `ADF` pipeline, much
    like the functionality we added to the on-premises version of the `SSIS` framework
    in Chapter 7.


    #### Chapter 11: Fault Tolerance in the ADF Framework


    In this chapter, we complete `ADF` execution engine functionality by implementing
    fault tolerance to programmatically stop (or not stop) pipeline execution based
    on `SSISConfig` metadata configurations.'
