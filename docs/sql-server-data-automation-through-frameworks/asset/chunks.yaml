- fmt: '# 配置 Execute SQL Task 记录应用程序实例状态


    ## 在控制流中添加成功日志任务


    将 Execute SQL Task 拖放到 `Parent.dtsx` 控制流中 `FOREACH Application Package` foreach
    循环容器的下方，并将该 Execute SQL Task 重命名为 "SQL Log Application Instance Success"，如图 [7-11](#497846_1_En_7_Chapter.xhtml#Fig11)
    所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig11_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig11_HTML.jpg)


    **图 7-11** 添加 SQL Log Application Instance Success Execute SQL Task


    ### 配置成功日志任务


    打开 SQL Log Application Instance Success Execute SQL Task 编辑器。将 `ConnectionType`
    属性更改为 `ADO.NET`，并选择 `SSISConfig` 连接。点击 `SQLStatement` 属性旁边的省略号。当“输入 SQL 查询”对话框显示时，输入如清单
    [7-5](#497846_1_En_7_Chapter.xhtml#PC5) 所示的 T-SQL。


    ```sql

    Update [log].ApplicationInstance

    Set ApplicationEndTime = sysdatetimeoffset()

    , ApplicationStatus = ''Succeeded''

    Where ApplicationInstanceId = @ApplicationInstanceId

    ```


    **清单 7-5** 当 SSIS 应用程序成功时更新 `[log].[ApplicationInstance]` 表的 T-SQL


    “输入 SQL查询”对话框应如图 [7-12](#497846_1_En_7_Chapter.xhtml#Fig12) 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig12_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig12_HTML.jpg)


    **图 7-12** 添加用于更新 `[log].[ApplicationInstance]` 表的 T-SQL


    点击“确定”按钮关闭“输入 SQL 查询”对话框。


    点击“参数映射”页面，然后点击“添加”按钮。将变量名 `User::ApplicationInstanceID` 映射到参数名 `ApplicationInstanceId`，如图
    [7-13](#497846_1_En_7_Chapter.xhtml#Fig13) 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig13_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig13_HTML.jpg)


    **图 7-13** 将 `User:ApplicationInstanceID` 变量映射到 `ApplicationInstanceId` 参数


    点击“确定”按钮关闭 Execute SQL Task 编器。


    现在，SQL Log Application Instance Success Execute SQL Task 已配置为更新 `[log].[ApplicationInstance]`
    表中的行，该行是在 `Parent.dtsx` SSIS 包中早先执行 SQL Log Application Instance Start Execute
    SQL Task 时插入的。它将更新该行的 `ApplicationEndTime` 和 `ApplicationStatus` 字段，以指示 SSIS 框架应用程序实例在某个时间成功完成。


    ## 在事件处理器中添加失败日志任务


    下一步是在 SSIS 框架应用程序实例*失败*时更新 `[log].[ApplicationInstance]` 中行的 `ApplicationEndTime`
    和 `ApplicationStatus` 字段。


    点击 `Parent.dtsx` SSIS 包中的“事件处理器”选项卡，如图 [7-14](#497846_1_En_7_Chapter.xhtml#Fig14)
    所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig14_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig14_HTML.jpg)


    **图 7-14** `Parent.dtsx` OnError 事件处理器


    如果 `Executable` 未设置为 `Parent`，请点击 `Executable` 下拉列表，并选择 `Parent`，如图 [7-15](#497846_1_En_7_Chapter.xhtml#Fig15)
    所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig15_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig15_HTML.jpg)


    **图 7-15** 选择 `Parent` 可执行文件


    点击 OnError 事件处理器中标记为“Click here to create an ''OnError'' event handler for the
    executable ''Parent''.”的链接。将 Execute SQL Task 拖放到事件处理器界面，并将其重命名为 "SQL Log Application
    Instance Failure"，如图 [7-16](#497846_1_En_7_Chapter.xhtml#Fig16) 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig16_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig16_HTML.jpg)


    **图 7-16** 将 SQL Log Application Instance Failure Execute SQL Task 添加到 Parent
    OnError 事件处理器


    ### 配置失败日志任务


    将 `ConnectionType` 属性设置为 `ADO.NET`，并选择 `SSISConfig` 连接，如图 [7-17](#497846_1_En_7_Chapter.xhtml#Fig17)
    所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig17_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig17_HTML.jpg)


