    # 2. Automation with Stored Procedures


    Now that we see all the pieces that need to be coordinated day in and day out
    for executing the processes defined in Chapter [1](#497846_1_En_1_Chapter.xhtml),
    let’s introduce the idea of controllers. A controller is the most basic element
    in our demonstration of the framework concept. The examples that follow demonstrate
    how controllers can make your job easier while also reducing the overhead that
    your operations staff must deal with.'
  trans: '


    ### 执行日常流程


    既然环境已搭建完毕且流程也已创建，现在让我们转向执行环节。运维人员需要设置或安排这些流程的运行，并监控是否有错误状况产生，或者如果使用的调度工具支持此功能，则需设置好执行的先后顺序规则。从基本意义上讲，我们现在已拥有一个可供投产的**日常流程**。清单
    1-3 展示了可用于执行**日常流程**的语句，以及一条可运行的 `SELECT` 语句，用于查看写入到 `FWDemo.ProcessLog` 的输出。你会注意到我们按降序对输出进行了排序。这将把最新的消息显示在顶部，避免了需要向下滚动才能找到当前执行消息的麻烦，一旦日志内容变得非常多时，这会使查看变得容易得多。


    ```

    EXECUTE FWDemo.DailyProcess1

    EXECUTE FWDemo.DailyProcess2

    SELECT ProcessLogID

    ,ProcessLogMessage

    ,CreateDate

    FROM FWDemo.ProcessLog

    ORDER BY ProcessLogID desc

