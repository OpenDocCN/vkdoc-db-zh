    Re-executing the Add SSIS Application Packages T-SQL shown in Listing [5-12](#497846_1_En_5_Chapter.xhtml#PC13)
    produces the messages shown in Figure [5-27](#497846_1_En_5_Chapter.xhtml#Fig27).


