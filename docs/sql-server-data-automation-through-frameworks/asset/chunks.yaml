- fmt: '## Metadata-Ready Orchestrator


    With the new versions of the controllers in place, a new version of the orchestrator,
    also with the name suffixed with “MD”, is needed to execute them. Listing 4-8
    has the code for the new orchestrator. Note, separate versions of the controllers
    and orchestrator were created to keep the original versions in place and operational
    so that all aspects of the framework demonstration remain intact and functional.


    ```sql

    IF EXISTS (SELECT s.name + ''.'' + p.name

    FROM sys.procedures p

    JOIN sys.schemas s

    ON s.schema_id = p.schema_id

    WHERE s.name = ''FWDemo''

    AND p.name = ''ProcessOrchestratorMD'')

    BEGIN

    PRINT '' - Dropping FWDemo.ProcessOrchestratorMD stored procedure''

    DROP PROCEDURE FWDemo.ProcessOrchestratorMD

    PRINT '' - FWDemo.ProcessOrchestratorMD stored procedure dropped''

    END

    GO

    CREATE PROCEDURE FWDemo.ProcessOrchestratorMD

    @RunDate smalldatetime = null

    AS


    --

    -- Purpose: This procedure is part of the Stored Procedure Framework Demo.

    --    It is the Orchestrator Procedure that executes the Metadate version

    --    of the Controller Procedures.

    --


    SET NOCOUNT ON

    /*******************************************************/

    /*  Log the START of the procedure to the process log  */

    /*******************************************************/

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    Values (''Procedure FWDemo.ProcessOrchestratorMD - STARTING'',

    GETDATE()

    )

    IF @RunDate is null

    SET @RunDate = GETDATE()

    DECLARE @RetStat int

    SET @RetStat = 0

    /*******************************************/

    /*  Execute the DailyProcessControllerMD   */

    /*******************************************/

    EXEC @RetStat = FWDemo.DailyProcessControllerMD

    IF @RetStat  0

    GOTO EndOrchestratorMD

    /************************************************************************/

    /*  Execute the MonthlyProcessControllerMD IF @RunDate is the first day */

    /*  of a month                                                          */

    /************************************************************************/

    IF DATEPART(DAY, @RunDate) = 1

    BEGIN

    EXEC @RetStat = FWDemo.MonthlyProcessControllerMD

    IF @RetStat  0

    GOTO EndOrchestratorMD

    END

    /************************************************************/

    /*  Log the COMPLETION of the procedure to the process log  */

    /************************************************************/

    EndOrchestratorMD:

    IF @RetStat = 0

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.ProcessOrchestratorMD - COMPLETED'',

    GETDATE()

    )

    END

    ELSE

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.ProcessOrchestratorMD - ERROR'',

    GETDATE()

    )

    END

    RETURN @RetStat

    GO

    ```


    Listing 4-8 New metadata orchestrator


    Just like the original version, the only thing that needs to be set up/scheduled
    for execution is the orchestrator with the optional `@RunDate` parameter override.
    Listing 4-9 has the execution commands.


    ```sql

