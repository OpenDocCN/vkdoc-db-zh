    Azure Data Factory 自动化技能！


    第一步是将 Azure Data Factory 托管标识添加到 Azure Data Factory 访问控制边栏选项卡中的“参与者”角色。首先登录 Azure
    门户并导航到 Azure Data Factory 边栏选项卡。单击“访问控制 (IAM)”，如图 11-1 所示。


