    ## 结论


    在本章中，我们为父管道添加了日志记录功能，修改了 `SSISConfig` 日志表，并将日志记录逻辑封装在存储过程中。通过添加一个子管道来执行应用程序包的执行，我们解耦了
    SSIS 框架应用程序包的执行。


    # 11. ADF 框架中的容错


    前一章介绍了针对 SSIS 框架执行引擎的 Azure Data Factory 版本的日志记录功能。SSIS 包可用的功能与 Azure Data Factory
    管道可用的功能之间的差异驱动了设计上的变更。


    在本章中，我们通过实现容错来完善 ADF 执行引擎的功能，该容错功能可根据 `SSISConfig` 元数据配置以编程方式停止管道执行。


    ## 容错简介


    依作者愚见，*容错* 是描述优雅失败（graceful failure）的另一种方式。思考“这个失败时会发生什么？”是技术人员与工程师之间的一个区别。技术人员完成能实现某些任务的项目，而工程师则构建能管理问题域的解决方案。这归结于个人对“完成”的定义。技术人员处理故障，并在项目能运行时停止。工程师则不会停止，直到解决方案不会失败；而且——当解决方案*确实失败*时——工程师确保失败是优雅的。


    您可能还记得，容错是第 5-7 章设计的本地 SSIS 框架执行引擎（`Parent.dtsx` 包）中最复杂的部分。Azure Data Factory
    版本的 SSIS 框架执行引擎（父管道和子管道）的设计也不例外。为了实现容错，ADF 执行策略需要彻底重新设计。


    该示例已经通过构建子管道实现了部分所需的重新设计。为什么应用程序包的执行需要移到子管道？我们将在本章回答这个问题。


    ## 将 ADF 托管标识添加到参与者角色


