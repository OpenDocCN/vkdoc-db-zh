  trans: '# 配置 Execute SQL Task 记录应用程序实例状态


    ## 在控制流中添加成功日志任务


    将 Execute SQL Task 拖放到 `Parent.dtsx` 控制流中 `FOREACH Application Package` foreach
    循环容器的下方，并将该 Execute SQL Task 重命名为 "SQL Log Application Instance Success"，如图 7-11
    所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig11_HTML.jpg](img/497846_1_En_7_Fig11_HTML.jpg)


    **图 7-11** 添加 SQL Log Application Instance Success Execute SQL Task


    ### 配置成功日志任务


    打开 SQL Log Application Instance Success Execute SQL Task 编辑器。将 `ConnectionType`
    属性更改为 `ADO.NET`，并选择 `SSISConfig` 连接。点击 `SQLStatement` 属性旁边的省略号。当“输入 SQL 查询”对话框显示时，输入如清单
    7-5 所示的 T-SQL。


    ```sql

    Update [log].ApplicationInstance

    Set ApplicationEndTime = sysdatetimeoffset()

    , ApplicationStatus = ''Succeeded''

    Where ApplicationInstanceId = @ApplicationInstanceId

    ```


    **清单 7-5** 当 SSIS 应用程序成功时更新 `[log].[ApplicationInstance]` 表的 T-SQL


    “输入 SQL 查询”对话框应如图 7-12 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig12_HTML.jpg](img/497846_1_En_7_Fig12_HTML.jpg)


    **图 7-12** 添加用于更新 `[log].[ApplicationInstance]` 表的 T-SQL


    点击“确定”按钮关闭“输入 SQL 查询”对话框。


    点击“参数映射”页面，然后点击“添加”按钮。将变量名 `User::ApplicationInstanceID` 映射到参数名 `ApplicationInstanceId`，如图
    7-13 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig13_HTML.jpg](img/497846_1_En_7_Fig13_HTML.jpg)


    **图 7-13** 将 `User:ApplicationInstanceID` 变量映射到 `ApplicationInstanceId` 参数


    点击“确定”按钮关闭 Execute SQL Task 编器。


    现在，SQL Log Application Instance Success Execute SQL Task 已配置为更新 `[log].[ApplicationInstance]`
    表中的行，该行是在 `Parent.dtsx` SSIS 包中早先执行 SQL Log Application Instance Start Execute
    SQL Task 时插入的。它将更新该行的 `ApplicationEndTime` 和 `ApplicationStatus` 字段，以指示 SSIS 框架应用程序实例在某个时间成功完成。


    ## 在事件处理器中添加失败日志任务


    下一步是在 SSIS 框架应用程序实例*失败*时更新 `[log].[ApplicationInstance]` 中行的 `ApplicationEndTime`
    和 `ApplicationStatus` 字段。


    点击 `Parent.dtsx` SSIS 包中的“事件处理器”选项卡，如图 7-14 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig14_HTML.jpg](img/497846_1_En_7_Fig14_HTML.jpg)


    **图 7-14** `Parent.dtsx` OnError 事件处理器


    如果 `Executable` 未设置为 `Parent`，请点击 `Executable` 下拉列表，并选择 `Parent`，如图 7-15 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig15_HTML.jpg](img/497846_1_En_7_Fig15_HTML.jpg)


    **图 7-15** 选择 `Parent` 可执行文件


    点击 OnError 事件处理器中标记为“Click here to create an ''OnError'' event handler for the
    executable ''Parent''.”的链接。将 Execute SQL Task 拖放到事件处理器界面，并将其重命名为 "SQL Log Application
    Instance Failure"，如图 7-16 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig16_HTML.jpg](img/497846_1_En_7_Fig16_HTML.jpg)


    **图 7-16** 将 SQL Log Application Instance Failure Execute SQL Task 添加到 Parent
    OnError 事件处理器


    ### 配置失败日志任务


    将 `ConnectionType` 属性设置为 `ADO.NET`，并选择 `SSISConfig` 连接，如图 7-17 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig17_HTML.jpg](img/497846_1_En_7_Fig17_HTML.jpg)


    **图 7-17** 配置 `ConnectionType` 和 `Connection` 属性


    点击 `SQLStatement` 属性中的省略号以打开“输入 SQL 查询”对话框，并输入如清单 7-6 所示的 T-SQL，以便在 SSIS 应用程序实例失败时更新
    `[log].[ApplicationInstance]` 行。


    ```sql

    Update [log].ApplicationInstance

    Set ApplicationEndTime = sysdatetimeoffset()

    , ApplicationStatus = ''Failed''

    Where ApplicationInstanceId = @ApplicationInstanceId

    ```


    **清单 7-6** 当 SSIS 应用程序失败时更新 `[log].[ApplicationInstance]` 的 T-SQL


    “输入 SQL 查询”对话框应如图 7-18 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig18_HTML.jpg](img/497846_1_En_7_Fig18_HTML.jpg)


    **图 7-18** 更新 `[log].[ApplicationInstance]` 行


    点击“确定”按钮关闭“输入 SQL 查询”对话框。


    点击“参数映射”页面，然后点击“添加”按钮。将变量名 `User::ApplicationInstanceID` 映射到参数名 `ApplicationInstanceId`，如图
    7-19 所示。


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig19_HTML.jpg](img/497846_1_En_7_Fig19_HTML.jpg)


    **图 7-19** 将 `User:ApplicationInstanceID` 变量映射到 `ApplicationInstanceId` 参数


    点击“确定”按钮关闭 Execute SQL Task 编辑器。


    现在，SQL Log Application Instance Failure Execute SQL Task 已配置为更新 `[log].[ApplicationInstance]`
    表中的行，该行是在 `Parent.dtsx` SSIS 包的控制流中早先执行 SQL Log Application Instance Start Execute
    SQL Task 时插入的。它将更新该行的 `ApplicationEndTime` 和 `ApplicationStatus` 字段，以指示 SSIS 框架应用程序实例执行在某个时间失败。'
- fmt: '## Add Application Package Instance Logging to Parent.dtsx


    Drag a new `Execute SQL Task` into the `FOREACH Application Package` foreach loop
    container. Delete the precedence constraint between the `SCR Log Application Package
    Values` script task and the `EPT Execute Child Package` execute package task.
    Connect new precedence constraints – the first between `SCR Log Application Package
    Values` script task and the new execute SQL task, and the second between the new
    `Execute SQL Task` and the `EPT Execute Child Package` execute package task. Rename
    the new `Execute SQL Task` “`SQL Log Application Package Instance Start`,” as
    shown in Figure [7-20](#497846_1_En_7_Chapter.xhtml#Fig20).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig20_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig20_HTML.jpg)


    Figure 7-20


    Adding the `SQL Log Application Package Instance Start` execute SQL task


    Open the `SQL Log Application Package Instance Start` execute SQL task editor,
    and set the `ConnectionType` property to `ADO.NET`. Set the `Connection` property
    to the `SSISConfig` ADO.Net connection manager. Set the `ResultSet` property to
    “`Single row`,” as shown in Figure [7-21](#497846_1_En_7_Chapter.xhtml#Fig21).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig21_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig21_HTML.jpg)


    Figure 7-21


    Configuring the `SQL Log Application Package Instance Start` execute SQL task’s
    `ResultSet`, `ConnectionType`, and `Connection` properties


    Click the ellipsis in the `SQLStatement` property, and paste the T-SQL from Listing
    [7-7](#497846_1_En_7_Chapter.xhtml#PC7) into the `Enter SQL Query` dialog.


    ```sql

    declare @ApplicationPackageId int = (

    Select ap.ApplicationPackageId

    From config.ApplicationPackages ap

    Join config.Applications a

    On a.ApplicationId = ap.ApplicationId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where ApplicationName = @ApplicationName

    And p.PackageLocation + p.PackageName = @PackagePath

    )

    Insert Into [log].ApplicationPackageInstance

    (ApplicationInstanceId, ApplicationPackageId)

    Output inserted.ApplicationPackageInstanceId

    Values (@ApplicationInstanceId, @ApplicationPackageId)

    ```


    Listing 7-7

    Inserting a row into the `[log].[ApplicationPackageInstance]` table


    The `Enter SQL Query` dialog should appear as shown in Figure [7-22](#497846_1_En_7_Chapter.xhtml#Fig22).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig22_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig22_HTML.jpg)


    Figure 7-22


    Inserting a row into the `[log].[ApplicationPackageInstance]` table


    Click the OK button to close the `Enter SQL Query` dialog.


    Click the `Parameter Mapping` page, and map the following parameters (Variable
    Name, Data Type, Parameter Name):


    *   `$Package::ApplicationName`, String, `ApplicationName`

    *   `User::PackagePath`, String, `PackagePath`

    *   `User::ApplicationInstanceID`, Int32, `ApplicationInstanceId`


    When complete, the `Parameter Mapping` page will appear as shown in Figure [7-23](#497846_1_En_7_Chapter.xhtml#Fig23).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig23_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig23_HTML.jpg)


    Figure 7-23


    Mapping `ApplicationPackageInstance` parameters


    Click the `Result Set` page, and click the Add button. Set the `Result Name` to
    “`0`” and select “`<New variable…>`” from the `Variable Name` drop-down, as shown
    in Figure [7-24](#497846_1_En_7_Chapter.xhtml#Fig24).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig24_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig24_HTML.jpg)


    Figure 7-24


    Creating a new SSIS variable for the single-row result set


    When the `Add Variable` dialog displays, configure the new SSIS variable properties
    as shown in Figure [7-25](#497846_1_En_7_Chapter.xhtml#Fig25).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig25_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig25_HTML.jpg)


    Figure 7-25


    Configuring the `User::ApplicationPackageInstanceID` SSIS variable


    *   Container: `Parent`

    *   Name: `ApplicationPackageInstanceID`

    *   Namespace: `User`

    *   Value type: `Int32`

    *   Value: `-1`


    Click the OK button to close the `Execute SQL Task Editor`. The `FOREACH Application
    Package` foreach loop container should now appear as shown in Figure [7-26](#497846_1_En_7_Chapter.xhtml#Fig26).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig26_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig26_HTML.jpg)


    Figure 7-26


    `SQL Log Application Package Instance Start` execute SQL task configured


    Drag an `Execute SQL Task` onto the `Parent.dtsx` control flow below the `SCR
    Log Package Execution Success` script task in the `FOREACH Application Package`
    foreach loop container. Rename the `Execute SQL Task` “`SQL Log Application Package
    Instance Success`,” as shown in Figure [7-27](#497846_1_En_7_Chapter.xhtml#Fig27).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig27_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig27_HTML.jpg)


    Figure 7-27


    Adding the `SQL Log Application Package Instance Success` execute SQL task


    Connect a precedence constraint from the `SCR Log Package Execution Success` script
    task to the `SQL Log Application Package Instance Success` execute SQL task. Open
    the `SQL Log Application Package Instance Success` execute SQL task editor. Change
    the `ConnectionType` property to `ADO.NET`, and select the `SSISConfig` Connection.
    Click the ellipsis in the `SQLStatement` property. When the `Enter SQL Query`
    dialog displays, enter the T-SQL shown in Listing [7-8](#497846_1_En_7_Chapter.xhtml#PC8).


    ```sql

    Update [log].ApplicationPackageInstance

    Set ApplicationPackageEndTime = sysdatetimeoffset()

    , ApplicationPackageStatus = ''Succeeded''

    Where ApplicationPackageInstanceId = @ApplicationPackageInstanceId

    ```


    Listing 7-8

    T-SQL to update the `[log].[ApplicationPackageInstance]` table when the SSIS application
    package succeeds


    The `Enter SQL Query` dialog should appear as shown in Figure [7-28](#497846_1_En_7_Chapter.xhtml#Fig28).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig28_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig28_HTML.jpg)


    Figure 7-28


    Adding T-SQL to update the `[log].[ApplicationPackageInstance]` table


    Click the OK button to close the `Enter SQL Query` dialog.


    Click the `Parameter Mapping` page, and then click the Add button. Map the Variable
    Name “`User::ApplicationPackageInstanceID`” to the Parameter Name “`ApplicationPackageInstanceId`,”
    as shown in Figure [7-29](#497846_1_En_7_Chapter.xhtml#Fig29).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig29_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig29_HTML.jpg)


    Figure 7-29


    Mapping the `User:ApplicationPackageInstanceID` variable to the `ApplicationPackageInstanceId`
    parameter


    Click the OK button to close the `Execute SQL Task Editor`.


    The `SQL Log Application Package Instance Success` execute SQL task is now configured
    to update the row in the `[log].[ApplicationPackageInstance]` table that was inserted
    when the `SQL Log Application Package Instance Start` execute SQL task executed
    earlier in the `FOREACH Application Package` foreach loop container, updating
    the row’s `ApplicationPackageEndTime` and `ApplicationPackageStatus` fields to
    indicate the SSIS framework application package instance completed successfully
    at such and such a time.


    The next step is to update the `ApplicationPackageEndTime` and `ApplicationPackageStatus`
    fields in the row in `[log].[ApplicationPackageInstance]` when the SSIS framework
    application package instance *fails*.


    Drag an `Execute SQL Task` onto the `Parent.dtsx` control flow below the `SCR
    Log Package Execution Failure` script task in the `FOREACH Application Package`
    foreach loop container. Rename the `Execute SQL Task` “`SQL Log Application Package
    Instance Failure`,” as shown in Figure [7-30](#497846_1_En_7_Chapter.xhtml#Fig30).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig30_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig30_HTML.jpg)


    Figure 7-30


    Adding the `SQL Log Application Package Instance Failure` execute SQL task'
