    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig3_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Viewing the config schema'
  trans: '

    # 5. 一个简单、自定义、基于文件的 SSIS 框架


    如果你调研使用 SSIS 进行数据集成/工程的企业，你会发现大多数企业并不使用 SSIS 目录。大多数企业从文件系统执行 SSIS。为什么？拥有少量 SSIS
    包的企业数量远多于拥有大量 SSIS 包的企业。执行几十个 SSIS 包与管理成千上万个 SSIS 包的执行是不同的——确实非常不同。别只听我说；去问问管理大型企业的任何数据工程师。


    在 SSIS 2012 和 SSIS 目录发布之前，SSIS 开发人员必须构建自己的 SSIS 框架。在本章中，我将分享一种构建自定义的基于文件的 SSIS
    框架的方法。


    拥有 45 年软件开发经验的好处相对较少。其中一个好处是经历了几个架构模式的周期，看着它们从流行到衰落。旧模式涂上一层新的虚拟漆，又变成了新的。（这让我想起我的大女儿们在
    20 世纪 90 年代问我，是否听过一支名为空中铁匠的超棒新乐队。）在后续章节中，当我们部署一个与 Azure Data Factory 的 Azure-SSIS
    集成运行时极其相似的 SSIS 框架时，我们将看到一个例子。


    ## SSIS 框架的定义与设计


    我们根据以下几个原则来构建 SSIS 框架：


    1.  功能性

    2.  共情

    3.  简洁性


    ### 功能性


    在我看来，一个 SSIS 框架必须完成执行、日志记录和配置。SSIS 包的执行包括 *分组* 执行。执行分组是指按指定顺序执行一组 SSIS 包的能力。日志记录的目标是呈现足够关于
    SSIS 包执行的操作信息，以使有经验的操作员或开发人员能够排查任何执行错误。配置通过允许开发人员和操作员在运行时配置 SSIS 包的属性、参数和变量，来促进代码重用并支持
    SSIS 设计模式。


    ### 共情


    “安迪，你说的‘共情’是什么意思？” 很高兴你问了。软件开发中的共情体现在用户体验或 UX 设计考量上。在 SSIS 设计和开发中，共情表现为考虑用户的技能水平。在这种情况下，用户包括
    SSIS 开发人员和操作员。SSIS 框架应遵循 KISS（“保持简单，傻瓜”）原则。我假设 SSIS 开发人员或 SSIS 开发团队会熟悉 SSIS，因此我
    *用* SSIS 来构建 SSIS 框架。我希望开发人员或团队能够管理和维护他们自己的框架。


    ### 简洁性


    > 软件应该像为了达成目标所必需的那样复杂，而不应比必要更复杂。

    >

    > —安迪·伦纳德，约 2007 年


    管理复杂性对软件开发人员来说是困难的。最终，管理复杂性是在功能性、可扩展性和可维护性之间的一种平衡行为。SSIS 框架由于其本质，需要一定量的复杂性来运作。通过“扩展点”支持扩展总是会失败，因为框架作者无法预见每个企业的每一个用例。设计任何软件——包括
    SSIS 框架——都应包含对维护的思考。可维护性有助于在最大功能性和最小复杂性之间取得平衡。


    总的来说，功能性、共情和简洁性是相对直接的概念，易于理解但难以实现。


    ## 构建基于文件的 SSIS 框架


    在本书的这一部分，在接下来的几章中，我们将构建一个 SSIS 框架的组件，该框架将执行存储在文件系统中的 SSIS 包。SSIS 框架的组件包括：


    *   一个用于存储执行和配置元数据、日志以及业务逻辑的数据库

    *   一个用 SSIS 构建的执行管理引擎


    在本章中，我们重点讨论：


    *   构建元数据库

    *   构建一个测试用的 SSIS 项目

    *   向元数据库添加元数据


    ### 获取代码


    要获取本书的代码，请访问 Apress 网站上本书的目录页面（[`www.apress.com`](http://www.apress.com)）或连接到
    GitHub 仓库：


    ```

    github.com/aleonard763/FrameworksBook

    ```


    将代码保存到一个你可以轻松访问的位置。


    ### 元数据驱动的执行管理


    元数据驱动的执行管理并不是一个复杂的主题，尽管乍看之下可能显得复杂。接下来的例子将构建一个名为 `SSISConfig` 的数据库以及如图 5-1 所示的执行元数据表。


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig1_HTML.jpg](img/497846_1_En_5_Fig1_HTML.jpg)


    图 5-1：用于执行管理的元数据表


    ### `SSISConfig` 数据库


    `SSISConfig` 数据库设计用于包含框架的元数据。


    使用清单 5-1 所示的 T-SQL 创建 `SSISConfig` 数据库。


    ```sql

    Use [master]

    go

    print ''SSISConfig database''

    If Not Exists(Select [databases].[name]

    From [sys].[databases]

    Where [databases].[name] = N''SSISConfig'')

    begin

    print '' - Create SSISConfig database''

    Create Database SSISConfig

    print '' - SSISConfig database created''

    end

    Else

    begin

    print '' - SSISConfig database already exists.''

    end

    print ''''

    go

    Listing 5-1: Creating the SSISConfig database

    ```


    SQL Server Management Studio (`SSMS`) 的 `对象资源管理器` 应该与图 5-2 相似。


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig2_HTML.jpg](img/497846_1_En_5_Fig2_HTML.jpg)


    图 5-2：`SSISConfig` 数据库已创建


    ### `config` 架构


    在软件开发最佳实践列表的顶部是“关注点分离”。分离关注点的一种方式是解耦。有人认为数据库开发不是软件开发。另一些人则认为，一些软件开发最佳实践可以——或许*应该*——用于数据库开发。我属于这第二类人。


    使用清单 5-2 所示的 T-SQL 向 `SSISConfig` 数据库添加第一个架构——`config`。


    ```sql

    use [SSISConfig]

    go

    print ''Config schema''

    If Not Exists(Select [schemas].[name]

    From [sys].[schemas]

    Where [schemas].[name] = N''config'')

    begin

    print '' - Create config schema''

    declare @sql nvarchar(100) = N''Create Schema config''

    exec(@sql)

    print '' - Config schema created''

    end

    Else

    begin

    print '' - Config schema already exists.''

    end

    print ''''

    go

    Listing 5-2: Creating the config schema

    ```


    `config` 架构创建后，可以在 `SSMS` 的 `对象资源管理器` 中查看。导航到 `SSISConfig` ➤ `安全性` ➤ `架构` 节点，如图
    5-3 所示。


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig3_HTML.jpg](img/497846_1_En_5_Fig3_HTML.jpg)


    图 5-3：查看 `config` 架构

