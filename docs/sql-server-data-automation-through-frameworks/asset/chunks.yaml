    单击 `停止` 按钮将触发一个确认对话框，如图 8-42 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig42_HTML.jpg](img/497846_1_En_8_Fig42_HTML.jpg)


    *图 8-42. 确认停止命令*


