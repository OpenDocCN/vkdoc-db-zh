- fmt: '### Executing the Daily Process


    Now that an environment has been built and a process created, let''s turn to the
    execution. Operations staff will have to set up or schedule the procedures to
    run and either monitor for any error conditions that are raised or set up precedence
    rules if such a function exists in any scheduling tool used. In a basic sense,
    we now have a Daily Process that is ready for production. Listing [1-3](#497846_1_En_1_Chapter.xhtml#PC3)
    shows the statements that can be used to execute the Daily Process procedures
    and also a `SELECT` statement that can be run to view the output written to `FWDemo.ProcessLog`.
    You will notice that we are ordering the output in a descending order. This will
    show the most recent messages at the top and eliminate the need to scroll down
    to get to the messages for the current execution and much easier once the log
    starts to become heavily populated.


    ```

    EXECUTE FWDemo.DailyProcess1

    EXECUTE FWDemo.DailyProcess2

    SELECT ProcessLogID

    ,ProcessLogMessage

    ,CreateDate

    FROM FWDemo.ProcessLog

    ORDER BY ProcessLogID desc

