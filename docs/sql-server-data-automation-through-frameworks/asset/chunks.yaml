- fmt: 'On the **Set Cancel Parent Pipeline Command** set variable activity’s **Variables**
    tab, click the **Name** property’s drop-down, and select **StopParentPipelineRunIdString**.
    Click inside the **Value** textbox, and then click the **Add dynamic content [Alt
    + P]** link. When the **Add dynamic content** blade displays, enter an expression
    similar to `@concat(''https://management.azure.com/subscriptions/<subcription
    id>/resourcegroups/<resource group name>/providers/Microsoft.DataFactory/factories'',pipeline().DataFactory,''/pipelineruns/'',pipeline().parameters.ParentRunId,''/cancel?api-version=2018-06-01'')`,
    as shown in Figure [11-24](#497846_1_En_11_Chapter.xhtml#Fig24).


    In the expression shown in Figure [11-24](#497846_1_En_11_Chapter.xhtml#Fig24),
    replace `<subscription id>` with your Subscription Id value and `<resource group
    name>` with your Azure Data Factory’s Resource Group Name.


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig24_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig24_HTML.jpg)

    *Figure 11-24. Building the value of the “StopParentPipelineRunIdString” variable*


    The preceding completes the third step for responding to a failed child package
    execution when the **FailApplicationOnPackageFailure** bit is configured to true
    (1): set the command to cancel the parent pipeline.


    The fourth step for responding to a failed child package execution when the **FailApplicationOnPackageFailure**
    bit is configured to true (1) is as follows: execute the command to cancel the
    parent pipeline.


    To begin adding the functionality to execute the cancel-pipeline run command,
    add a web activity to the **If Fail Application On Package Failure** if condition
    activity’s **True activities** canvas, connect a Success output from the **Set
    Cancel Parent Pipeline Command** set variable activity and the new web activity,
    and then rename the new web activity **Stop Parent Execution**, as shown in Figure
    [11-25](#497846_1_En_11_Chapter.xhtml#Fig25).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig25_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig25_HTML.jpg)

    *Figure 11-25. Adding the “Stop Parent Execution” web activity*


    On the **Stop Parent Execution** web activity’s **Settings** tab, click inside
    the **URL** property’s textbox and click the **Add dynamic content [Alt + P]**
    link. When the **Add dynamic content** blade displays, enter the expression `@variables(''StopParentPipelineRunIdString'')`,
    as shown in Figure [11-26](#497846_1_En_11_Chapter.xhtml#Fig26).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig26_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig26_HTML.jpg)

    *Figure 11-26. Configuring the URL property of the “Stop Parent Execution” web
    activity*


    Complete configuration of the properties on the **Stop Parent Execution** web
    activity’s **Settings** tab as follows (and as shown in Figure [11-27](#497846_1_En_11_Chapter.xhtml#Fig27)):


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig27_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig27_HTML.jpg)

    *Figure 11-27. “Stop Parent Execution” web activity Settings configurations*


    - Method: `POST`

    - Body: `{"message":"Stopping the parent pipeline"}`

    - Advanced ➤ Authentication: `MSI`

    - Advanced ➤ Resource: `https://management.azure.com`


    The preceding completes the fourth and final step for responding to a failed child
    package execution when the **FailApplicationOnPackageFailure** bit is configured
    to true (1): set the command to cancel the parent pipeline.


    The activities inside the **If Fail Application On Package Failure** if condition
    activity’s **True activities**, as configured, work together to update the statuses
    of the application package instance and application instance and then invoke the
    Azure Data Factory’s REST API Pipeline Runs Cancel method for the ongoing execution
    of the parent pipeline.


    Before testing the changes, delete the (now orphaned) **Log Application Package
    Instance Failure** stored procedure activity, as shown in Figure [11-28](#497846_1_En_11_Chapter.xhtml#Fig28).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig28_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig28_HTML.jpg)

    *Figure 11-28. Deleting the old “Log Application Package Instance Failure” stored
    procedure activity*


    ### Let’s Test It!


    Deploy the parent and child pipelines by clicking the **Publish all** button in
    the Data Factory toolbar, as shown in Figure [11-29](#497846_1_En_11_Chapter.xhtml#Fig29).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig29_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig29_HTML.jpg)

    *Figure 11-29. Publishing changes to the pipelines and ADF artifacts*


    In the parent pipeline, click the **Add trigger** menu item, and then click **Trigger
    now**, as shown in Figure [11-30](#497846_1_En_11_Chapter.xhtml#Fig30).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig30_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig30_HTML.jpg)

    *Figure 11-30. Triggering the parent pipeline*


    When the parent pipeline execution completes, the Monitor page should display
    results similar to Figure [11-31](#497846_1_En_11_Chapter.xhtml#Fig31).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig31_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig31_HTML.jpg)

    *Figure 11-31. Parent and child pipeline execution results*


    Execute the T-SQL query shown in Listing [11-2](#497846_1_En_11_Chapter.xhtml#PC2)
    to confirm the application instance and application package instance results.


    ```sql

    Select top 1

    a.ApplicationName

    , ai.ApplicationInstanceId

    , ai.ApplicationStatus

    From log.ApplicationInstance ai

    Join config.Applications a

    On a.ApplicationId = ai.ApplicationId

    Order By ApplicationInstanceId Desc

    declare @ApplicationInstanceId int = (Select top 1 ApplicationInstanceId

    From log.ApplicationInstance

    Order By ApplicationInstanceId DESC)

    Select p.PackageName

    , ai.ApplicationInstanceId

    , api.ApplicationPackageInstanceId

    , api.ApplicationPackageStatus

    , ap.FailApplicationOnPackageFailure

    From log.ApplicationPackageInstance api

    Join log.ApplicationInstance ai

    On ai.ApplicationInstanceId = api.ApplicationInstanceId

    Join config.ApplicationPackages ap

    On ap.ApplicationPackageId = api.ApplicationPackageId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where ai.ApplicationInstanceId = @ApplicationInstanceId

    Order By ApplicationPackageInstanceId

    ```

    *Listing 11-2. Application and application package execution results*


    The results should appear similar to Figure [11-32](#497846_1_En_11_Chapter.xhtml#Fig32).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig32_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig32_HTML.jpg)

    *Figure 11-32. Application and application package execution results*


    The **Framework Test** SSIS framework application contains two application packages,
    **ReportAndFail.dtsx** and **ReportAndSucceed.dtsx**. As advertised, **ReportAndFail.dtsx**
    execution fails every single time it is executed. In the SSIS framework metadata,
    the **FailApplicationOnPackageFailure** bit is set to 1 (true) for both application
    packages, as seen when executing the T-SQL query in Listing [11-3](#497846_1_En_11_Chapter.xhtml#PC3)
    (with results shown in Figure [11-33](#497846_1_En_11_Chapter.xhtml#Fig33)).


    ```sql

    Select ap.ApplicationPackageId

    , a.ApplicationName

    , p.PackageName

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From config.Applications a

    Join config.ApplicationPackages ap

    On ap.ApplicationId = a.ApplicationId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test''

    Order By ap.ExecutionOrder

    ```

    *Listing 11-3. Viewing SSIS framework metadata*


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig33_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig33_HTML.jpg)

    *Figure 11-33. Viewing SSIS framework metadata T-SQL query results*'
