  trans: '

    ### 修改 `log.ApplicationPackageInstance` 表


    如之前在 `log.ApplicationInstance` 部分所述，当 ADF 活动执行时，会生成一个 `RunId` 值用于操作日志记录。与记录 Azure
    Data Factory 父管道执行时的父管道 Run Id 类似，记录子管道的 `RunId` 是一个很好的做法。子 `RunId` 值可用于将内部 ADF
    管道日志与管道活动日志关联起来。


    通过执行清单 10-6 中的 T-SQL 来修改 `log.ApplicationPackageInstance` 表。


    ```sql

    print ''Log.ApplicationPackageInstance.ApplicationPackageRunId column''

    If Not Exists(Select s.[name]

    + ''.'' + t.[name]

    + ''.'' + c.[name]

    From [sys].[schemas] s

    Join [sys].[tables] t

    On t.[schema_id] = s.[schema_id]

    Join [sys].[columns] c

    On c.[object_id] = t.[object_id]

    Where s.[name] = N''log''

    And t.[name] = N''ApplicationPackageInstance''

    And c.[name] = N''ApplicationPackageRunId'')

    begin

    print '' - Adding log.ApplicationPackageInstance.ApplicationPackageRunId column''

    Alter Table log.ApplicationPackageInstance

    Add ApplicationPackageRunId nvarchar(55) NULL

    print '' - Log.ApplicationPackageInstance.ApplicationPackageRunId column added''

    end

    Else

    begin

    print '' - Log.ApplicationPackageInstance.ApplicationPackageRunId column already
    exists.''

    end

    ```

    清单 10-6

    将 `ApplicationPackageRunId` 列添加到 `ApplicationPackageInstance` 表


    接下来，让我们将用于添加应用程序包实例行的 T-SQL 封装到存储过程中。


    ### 添加 `log.InsertApplicationPackageInstance` 存储过程


    在 SSIS 执行引擎（`Parent.dtsx` SSIS 包）中，曾使用执行 SQL 任务将初始的 `ApplicationPackageInstance`
    记录插入 `log.ApplicationPackageInstance` 表并返回 `ApplicationPackageInstanceId` 值。在
    Azure Data Factory 执行引擎（现在是父管道和子管道）中，将使用 Lookup 活动来调用一个存储过程，该存储过程插入记录并返回 `ApplicationPackageInstanceId`
    值。`ApplicationPackageInstanceId` 值将在管道后续用于更新 `ApplicationPackageInstance` 记录。


    在 Azure Data Studio（或 SSMS）中，连接到名为 `SSISConfig` 的 Azure SQL 数据库。从第 7 章的清单 7-7
    中的 T-SQL 代码开始，编辑 T-SQL，以幂等（可重复执行）的方式创建名为 `log.InsertApplicationPackageInstance`
    的新存储过程，如清单 10-7 所示。


    ```sql

    print ''log.InsertApplicationPackageInstance stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

    Where s.[name] = N''log''

    And p.[name] = N''InsertApplicationPackageInstance'')

    begin

    print '' - Dropping log.InsertApplicationPackageInstance stored procedure''

    Drop Procedure log.InsertApplicationPackageInstance

    print '' - Log.InsertApplicationPackageInstance stored procedure dropped''

    end

    print '' - Creating log.InsertApplicationPackageInstance stored procedure''

    go

    Create Procedure log.InsertApplicationPackageInstance

    @ApplicationInstanceId int

    , @ApplicationPackageId int

    , @ApplicationPackageRunId nvarchar(55) = NULL

    As

    Insert Into [log].ApplicationPackageInstance

    ( ApplicationInstanceId

    , ApplicationPackageId

    , ApplicationPackageRunId)

    Output inserted.ApplicationPackageInstanceId

    Values

    ( @ApplicationInstanceId

    , @ApplicationPackageId

    , @ApplicationPackageRunId)

    go

    print '' - Log.InsertApplicationPackageInstance stored procedure created''

    go

    ```

    清单 10-7

    用于幂等创建 `log.InsertApplicationPackageInstance` 存储过程的 T-SQL


    `log.InsertApplicationPackageInstance` 存储过程需要将应用程序实例的应用程序实例 id 发送到 `@ApplicationInstanceId`
    int 参数，以便将应用程序实例与应用程序包实例关联起来。请记住，`ApplicationInstanceId` 是一个子管道参数，由父管道发送给子管道。另一个由父管道传递的子管道参数是
    `ApplicationPackageId`。我们将 `ApplicationPackageId` 管道参数的值传递给 `log.InsertApplicationPackageInstance`
    存储过程。


    `log.InsertApplicationPackageInstance` 存储过程还接受一个名为 `@ApplicationPackageRunId`
    的参数，当未提供值时，其默认为 `NULL`。`@ApplicationPackageRunId` 用于存储 Azure Data Factory 子管道的
    `RunId` 值。如前所述，在 SSIS 框架中存储 `RunId` 允许企业 DevOps 团队将 SSIS 框架中的操作日志数据与 ADF 日志中捕获的操作数据关联起来，这在
    ADF 管道执行期间发生不幸情况时极为有用。


    T-SQL `Insert` 语句通过将新的 `@ApplicationInstanceId`、`@ApplicationPackageId` 和 `@ApplicationPackageRunId`
    值插入 `log.ApplicationPackageInstance` 表来初始化 `ApplicationPackageInstance` 记录。配置在
    `log.ApplicationPackageInstance` 表上的默认值会在行中插入以下值：


    *   `ApplicationPackageStartTime` 由 `DF_log_ApplicationPackageInstance_ApplicationPackageStartTime`
    设置为 `sysdatetimeoffset()`。

    *   `ApplicationPackageStatus` 由 `DF_log_ApplicationPackageInstance_ApplicationPackageStatus`
    设置为 `N''Running''`。


    如果一切按计划进行，Azure Data Studio 应返回如图 10-37 所示的消息。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig37_HTML.jpg](img/497846_1_En_10_Fig37_HTML.jpg)

    图 10-37

    创建 `log.InsertApplicationPackageInstance` 存储过程产生的消息


    创建 `log.InsertApplicationPackageInstance` 存储过程后，下一步是向管道添加一个活动以执行该存储过程。

    '
- fmt: '### Logging Application Package Instance


    ADF 执行引擎需要执行一个名为 `log.InsertApplicationPackageInstance` 的存储过程，该过程返回一个名为 `ApplicationPackageInstanceId`
    的值。一个 Lookup 活动为此而构建！


    返回到子 ADF 管道。将一个新的 Lookup 活动拖到画布上，并将这个新的 Lookup 活动重命名为 "Log Application Package
    Instance Start"，如图 10-38 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig38_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig38_HTML.jpg)


    图 10-38


    添加 Log Application Package Instance Start 查找活动


    单击 Log Application Instance Start 查找活动的 "Settings" 选项卡以继续配置。单击 "Source dataset"
    属性下拉菜单，选择 "ssisFrameworkDataSet"，然后将 Log Application Package Instance Start 查找活动的
    "Use query" 属性选项设置为 "Stored procedure"。从 "Name" 属性下拉菜单中选择 `log.InsertApplicationPackageInstance`，如图
    10-39 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig39_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig39_HTML.jpg)


    图 10-39


    选择 log.InsertApplicationPackageInstance 存储过程


    接下来，单击 "Import parameter" 按钮，从 `log.InsertApplicationPackageInstance` 存储过程导入 `@ApplicationInstanceId`、`@ApplicationPackageId`
    和 `@ApplicationPackageRunId`（Int32 和 String 类型）参数。单击 `@ApplicationInstanceId`
    参数的 Value 属性文本框内部，然后单击 "Add dynamic content [Alt + P]" 链接，如图 10-40 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig40_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig40_HTML.jpg)


    图 10-40


    准备向参数值属性添加动态内容


    当 "Add dynamic content" 面板显示时，展开 Parameters 表达式类别，然后单击 "ApplicationInstanceId"，将参数值
    ADF 表达式设置为 `@pipeline.parameters.ApplicationInstanceId`，如图 10-41 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig41_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig41_HTML.jpg)


    图 10-41


    设置 ApplicationInstanceId 参数值表达式


    单击 Finish 按钮继续。


    重复前述步骤，将 `@ApplicationPackageId` 存储过程参数分配给子管道的 `ApplicationPackageId` 参数，如图 10-42
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig42_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig42_HTML.jpg)


    图 10-42


    设置 ApplicationPackageId 参数值表达式


    单击 `@ApplicationPackageRunId` 参数的 Value 属性文本框内部，然后单击 "Add dynamic content [Alt
    + P]" 链接。当 "Add dynamic content" 面板显示时，展开 "System variables" 表达式类别，然后单击 "Pipeline
    run ID"，将参数值 ADF 表达式设置为 `@pipeline().RunId`，如图 10-43 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig43_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig43_HTML.jpg)


    图 10-43


    设置 ApplicationPackageRunId 参数值表达式


    将 "Query timeout (minutes)" 属性保留为其默认值（120 分钟），"Isolation level" 属性设置为 "None"（默认值），并保持
    "First row only" 属性为选中状态（默认值）。


    至此，Log Application Package Instance Start 查找活动已配置为调用 `log.InsertApplicationPackageInstance`
    存储过程，向其传递子管道的 `ApplicationInstanceId`、`ApplicationPackageId` 和 `ApplicationPackageRunId`
    参数值，并返回 `ApplicationPackageInstanceId` 值。


    将 Log Application Package Instance Start 查找活动的 Success 输出连接到 Execute Application
    Package 执行 SSIS 活动。


    ### Adding the Log.UpdateApplicationPackageInstanceStatus Stored Procedure


    按照当前配置，当子管道被调用以执行 ReportAndFail.dtsx SSIS 包时，它将失败，因为 ReportAndFail.dtsx SSIS 包被设计为失败。需要更新
    `log.ApplicationPackageInstance` 行以反映 SSIS 框架应用程序包实例失败的状态。


    首先，向 SSISConfig 数据库添加一个名为 `log.UpdateApplicationPackageInstanceStatus` 的新存储过程，如代码清单
    10-8 所示。


    ```

    print ''log.UpdateApplicationPackageInstanceStatus stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

