    *图 10-32 添加“Execute Child Pipeline”执行管道活动*\n\n点击“Execute Child Pipeline”执行管道活动的“设置”选项卡，并配置以下属性：\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig33_HTML.jpg](img/497846_1_En_10_Fig33_HTML.jpg)\n\
    *图 10-33 为子管道配置 PackagePath 参数*\n\n*   调用的管道: `child`\n*   等待完成: [已选中]\n*   参数:\n\
    \    *   `PackagePath` / string / `@item().PackagePath`\n        *   添加动态内容 [Alt\
    \ + P]，选择 ForEach 迭代器 ➤ `ForEach Application Package`，然后追加“`.PackagePath`”，如图\
    \ 10-33 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig34_HTML.jpg](img/497846_1_En_10_Fig34_HTML.jpg)\n\
    *图 10-34 为子管道配置 ParentRunId 参数*\n\n*   `ApplicationPackageId` / int / `@item().ApplicationPackageId`\n\
    *   `ApplicationInstanceId` / int / `@variables('ApplicationInstanceId')`\n* \
    \  `FailApplicationOnPackageFailure` / bool / `@item().FailApplicationOnPackageFailure`\n\
    *   `ParentRunId` / string / `@pipeline().RunId`\n    *   添加动态内容 [Alt + P]，然后选择\
    \ 系统变量 ➤ Pipeline run ID，如图 10-34 所示。\n\n配置完成后，“Execute Child Pipeline”执行管道活动在“设置”选项卡上的属性应类似于图\
    \ 10-35。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig35_HTML.jpg](img/497846_1_En_10_Fig35_HTML.jpg)\n\
    *图 10-35 已配置的“Execute Child Pipeline”执行管道活动属性*\n\n“Execute Child Pipeline”执行管道活动现在被配置为调用子管道，并传递执行一个应用程序包所需的参数值，该包的元数据存储在\
    \ SSIS 框架中。\n\n## 测试一下！\n\n点击“调试”以测试执行父管道。“Execute Child Pipeline”执行管道活动应执行两次，失败一次，成功一次，这正是我们在执行后查看父管道的“输出”选项卡时看到的结果，如图\
    \ 10-36 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig36_HTML.jpg](img/497846_1_En_10_Fig36_HTML.jpg)\n\
    *图 10-36 查看父管道的调试执行输出*\n\n更新后的 SSIS 框架执行引擎按设计工作，但要实现针对 `FailApplicationOnPackageFailure`\
    \ 的容错，还有更多工作要做，我们将在下一步（添加应用程序实例日志记录）之后进行管理。\n\n## 添加应用程序包实例日志记录\n\n应用程序实例日志记录发生在父管道中。应用程序实例日志记录的模式是：\n\
    \n1.  记录应用程序实例开始\n2.  执行一些操作\n3.  记录应用程序实例状态（成功或失败）\n\n应用程序实例日志记录是一个可靠的模式。应用程序包实例日志记录应遵循相同的模式。"
- fmt: '### Modifying the `log.ApplicationPackageInstance` Table


    As mentioned earlier in the `log.ApplicationInstance` section, when ADF activities
    execute, a `RunId` value is generated for use in operational logging. As with
    logging the parent pipeline’s Run Id when an Azure Data Factory parent pipeline
    executes, logging the child pipeline’s `RunId` is a great idea. The child `RunId`
    value may be used to connect internal ADF pipeline logs to pipeline activity logs.


    Modify the `log.ApplicationPackageInstance` table by executing the T-SQL in Listing
    10-6.


    ```sql

    print ''Log.ApplicationPackageInstance.ApplicationPackageRunId column''

    If Not Exists(Select s.[name]

    + ''.'' + t.[name]

    + ''.'' + c.[name]

    From [sys].[schemas] s

    Join [sys].[tables] t

    On t.[schema_id] = s.[schema_id]

    Join [sys].[columns] c

    On c.[object_id] = t.[object_id]

    Where s.[name] = N''log''

    And t.[name] = N''ApplicationPackageInstance''

    And c.[name] = N''ApplicationPackageRunId'')

    begin

    print '' - Adding log.ApplicationPackageInstance.ApplicationPackageRunId column''

    Alter Table log.ApplicationPackageInstance

    Add ApplicationPackageRunId nvarchar(55) NULL

    print '' - Log.ApplicationPackageInstance.ApplicationPackageRunId column added''

    end

    Else

    begin

    print '' - Log.ApplicationPackageInstance.ApplicationPackageRunId column already
    exists.''

    end

    ```

    Listing 10-6

    Adding the `ApplicationPackageRunId` column to the `ApplicationPackageInstance`
    table


    Let’s next encapsulate the T-SQL for adding Application Package Instance rows
    in a stored procedure.


    ### Adding the `log.InsertApplicationPackageInstance` Stored Procedure


    In the SSIS execution engine (the `Parent.dtsx` SSIS package), an Execute SQL
    Task was used to insert the initial `ApplicationPackageInstance` record into the
    `log.ApplicationPackageInstance` table and return an `ApplicationPackageInstanceId`
    value. In the Azure Data Factory execution engine (now the parent and child pipelines),
    a Lookup activity will call a stored procedure that inserts the record and returns
    an `ApplicationPackageInstanceId` value. The `ApplicationPackageInstanceId` value
    will be used later in the pipeline to update the `ApplicationPackageInstance`
    record.


    In Azure Data Studio (or SSMS), connect to the Azure SQL database named `SSISConfig`.
    Starting with the T-SQL code from Listing 7-7 in Chapter 7, edit the T-SQL to
    create a new stored procedure named `log.InsertApplicationPackageInstance` in
    an idempotent (re-executable) manner, as shown in Listing 10-7.


    ```sql

    print ''log.InsertApplicationPackageInstance stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

    Where s.[name] = N''log''

    And p.[name] = N''InsertApplicationPackageInstance'')

    begin

    print '' - Dropping log.InsertApplicationPackageInstance stored procedure''

    Drop Procedure log.InsertApplicationPackageInstance

    print '' - Log.InsertApplicationPackageInstance stored procedure dropped''

    end

    print '' - Creating log.InsertApplicationPackageInstance stored procedure''

    go

    Create Procedure log.InsertApplicationPackageInstance

    @ApplicationInstanceId int

    , @ApplicationPackageId int

    , @ApplicationPackageRunId nvarchar(55) = NULL

    As

    Insert Into [log].ApplicationPackageInstance

    ( ApplicationInstanceId

    , ApplicationPackageId

    , ApplicationPackageRunId)

    Output inserted.ApplicationPackageInstanceId

    Values

    ( @ApplicationInstanceId

    , @ApplicationPackageId

    , @ApplicationPackageRunId)

    go

    print '' - Log.InsertApplicationPackageInstance stored procedure created''

    go

    ```

    Listing 10-7

    Idempotent T-SQL to create the `log.InsertApplicationPackageInstance` stored procedure


    The `log.InsertApplicationPackageInstance` stored procedure requires the application
    instance id of the application instance be sent to the `@ApplicationInstanceId`
    int parameter in order to correlate the application instance with the application
    package instance. Remember, `ApplicationInstanceId` is a child pipeline parameter
    sent to the child pipeline from the parent pipeline. Another child pipeline parameter
    passed from the parent pipeline is `ApplicationPackageId`. We pass the value of
    the `ApplicationPackageId` pipeline parameter to the `log.InsertApplicationPackageInstance`
    stored procedure.


    The `log.InsertApplicationPackageInstance` stored procedure also accepts a parameter
    named `@ApplicationPackageRunId` which defaults to `NULL` when no value is supplied.
    `@ApplicationPackageRunId` is used to store the Azure Data Factory child pipeline’s
    `RunId` value. As stated earlier, storing the `RunId` in the SSIS framework allows
    enterprise DevOps teams to relate operational log data in the SSIS framework to
    operational data captured in ADF logs, which is extremely useful when something
    unfortunate happens during ADF pipeline execution.


    The T-SQL `Insert` statement initializes the `ApplicationPackageInstance` record
    by inserting new `@ApplicationInstanceId`, `@ApplicationPackageId`, and `@ApplicationPackageRunId`
    values into the `log.ApplicationPackageInstance` table. Defaults configured on
    the `log.ApplicationPackageInstance` table insert the following values in the
    row:


    *   `ApplicationPackageStartTime` is set to `sysdatetimeoffset()` by `DF_log_ApplicationPackageInstance_ApplicationPackageStartTime`.

    *   `ApplicationPackageStatus` is set to `N''Running''` by `DF_log_ApplicationPackageInstance_ApplicationPackageStatus`.


    If all goes as planned, Azure Data Studio should return Messages that appear as
    shown in Figure 10-37.


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig37_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig37_HTML.jpg)

    Figure 10-37

    Messages from creating the `log.InsertApplicationPackageInstance` stored procedure


    After the `log.InsertApplicationPackageInstance` stored procedure has been created,
    the next step is to add an activity to the pipeline to execute the stored procedure.'
