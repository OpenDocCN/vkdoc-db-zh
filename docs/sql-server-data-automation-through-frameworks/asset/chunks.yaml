    From sys.procedures p

    Join sys.schemas s

    On s.schema_id = p.schema_id

    Where s.name = ''FWDemo''

    And p.name = ''DailyProcess1'')

    begin

    print '' - Dropping FWDemo.DailyProcess1 stored procedure''

