  trans: '

    ### ForEach 活动默认行为及其应用


    应用于 SSIS 框架的容错机制，“ForEach 应用程序包” ForEach 活动（其“内部活动”在父管道中配置为执行子管道）默认已配置为无论子包执行结果如何都继续执行子包。因此，下一步是添加逻辑，以便在我们的用例需要时——即当应用程序包执行失败
    **且** `FailApplicationOnPackageFailure` 为 true（用例 3）时——*停止*执行应用程序包。


    要配置“如果在包失败时应用程序失败”条件活动的“True 活动”，请点击“True 活动”旁边的编辑图标（铅笔），如图 11-15 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig15_HTML.jpg](img/497846_1_En_11_Fig15_HTML.jpg)

    *图 11-15：准备配置“True 活动”*


    当 `FailApplicationOnPackageFailure` 位配置为 true（1，这是默认值）时，响应失败的子包执行的操作顺序如下：

    1.  记录应用程序包实例失败

    2.  记录应用程序实例已取消

    3.  设置取消父管道的命令

    4.  执行取消父管道的命令


    当 `FailApplicationOnPackageFailure` 位配置为 true（1）时，响应失败的子包执行的第一步如下：记录应用程序包实例失败。


    要开始添加记录应用程序包实例失败的功能，请在“如果在包失败时应用程序失败”条件活动的“True 活动”画布上添加一个存储过程活动，并将新的存储过程活动重命名为“记录应用程序包实例失败
    1”，如图 11-16 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig16_HTML.jpg](img/497846_1_En_11_Fig16_HTML.jpg)

    *图 11-16：添加“记录应用程序包实例失败 1”存储过程活动*


    在“记录应用程序包实例失败 1”存储过程活动的“设置”选项卡上，单击“链接服务”属性的下拉菜单，选择“ssisFrameworkLinkedService”。在“存储过程名称”下拉菜单中，选择“[log].[UpdateApplicationPackageInstanceStatus]”，如图
    11-17 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig17_HTML.jpg](img/497846_1_En_11_Fig17_HTML.jpg)

    *图 11-17：配置“记录应用程序包实例失败 1”存储过程活动设置*


    单击“导入参数”按钮。当显示 `ApplicationPackageInstanceId` 和 `ApplicationPackageStatus` 参数时，通过单击值文本框内部，然后单击“添加动态内容
    [Alt + P]”链接，再输入表达式“`@activity(''Log Application Package Instance Start'').output.firstrow.ApplicationPackageInstanceId`”来配置
    `ApplicationPackageInstanceId`。在 `ApplicationPackageStatus` 参数值文本框中，输入文本“Failed
    (FailAppOnPkgFail: 1)”，如图 11-18 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig18_HTML.jpg](img/497846_1_En_11_Fig18_HTML.jpg)

    *图 11-18：配置“记录应用程序包实例失败 1”存储过程活动设置的参数值*


    以上完成了当 `FailApplicationOnPackageFailure` 位配置为 true（1）时响应失败的子包执行的第一步：记录应用程序包实例失败。


    当 `FailApplicationOnPackageFailure` 位配置为 true（1）时响应失败的子包执行的第二步如下：记录应用程序实例已取消。


    要开始添加记录应用程序实例已取消的功能，请在“如果在包失败时应用程序失败”条件活动的“True 活动”画布上添加一个存储过程活动，将“记录应用程序包实例失败
    1”存储过程活动的成功输出连接到新的存储过程活动，然后将新的存储过程活动重命名为“记录应用程序实例已取消”，如图 11-19 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig19_HTML.jpg](img/497846_1_En_11_Fig19_HTML.jpg)

    *图 11-19：添加“记录应用程序实例已取消”存储过程活动*


    将“记录应用程序包实例失败 1”存储过程活动的成功输出连接到“记录应用程序实例已取消”存储过程活动。在“记录应用程序实例已取消”存储过程活动的“设置”选项卡上，单击“链接服务”属性的下拉菜单，选择“ssisFrameworkLinkedService”。在“存储过程名称”下拉菜单中，选择“[log].[UpdateApplicationIntanceStatus]”，如图
    11-20 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig20_HTML.jpg](img/497846_1_En_11_Fig20_HTML.jpg)

    *图 11-20：配置“记录应用程序实例已取消”存储过程活动设置*


    单击“导入参数”按钮。当显示 `ApplicationInstanceId` 和 `ApplicationStatus` 参数时，通过单击值文本框内部，然后单击“添加动态内容
    [Alt + P]”链接，再输入表达式“`@pipeline().parameters.ApplicationInstanceId`”来配置 `ApplicationInstanceId`。在
    `ApplicationStatus` 参数值文本框中，输入文本“Cancelled”，如图 11-21 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig21_HTML.jpg](img/497846_1_En_11_Fig21_HTML.jpg)

    *图 11-21：配置“记录应用程序实例已取消”存储过程活动设置的参数值*


    以上完成了当 `FailApplicationOnPackageFailure` 位配置为 true（1）时响应失败的子包执行的第二步：记录应用程序实例已取消。


    在我们开始此部分过程之前，请导航到子管道设置，并单击“变量”选项卡。单击“+ 新建”按钮，添加一个名为“StopParentPipelineRunIdString”的字符串变量，如图
    11-22 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig22_HTML.jpg](img/497846_1_En_11_Fig22_HTML.jpg)

    *图 11-22：向子管道添加 StopParentPipelineRunIdString 变量*


    要开始添加构建取消管道运行命令的功能，请在“如果在包失败时应用程序失败”条件活动的“True 活动”画布上添加一个设置变量活动，将“记录应用程序实例已取消”存储过程活动的成功输出连接到新的设置变量活动，然后将新的设置变量活动重命名为“设置取消父管道命令”，如图
    11-23 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig23_HTML.jpg](img/497846_1_En_11_Fig23_HTML.jpg)

    *图 11-23：添加“设置取消父管道命令”设置变量活动*

