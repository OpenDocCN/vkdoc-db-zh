    Execution Success` script task editor. Connect an on-success precedence constraint
    from the `EPT Execute Child Package` execute package task to the `SCR Log Package
    Execution Success` script task, as shown in Figure [6-68](#497846_1_En_6_Chapter.xhtml#Fig68).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig68_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig68_HTML.jpg)

    **Figure 6-68** SCR Log Package Execution Success configured


