  trans: '## 一个日常处理控制器


    就我们的目的而言，控制器是一个存储过程，它本身执行一个流程的所有元素，并能处理该流程内的业务规则。`清单 2-1` 展示了创建名为 `FWDemo.DailyProcessController`
    的存储过程的代码。此存储过程执行我们的两个 `日常处理` 存储过程。它记录自身的进度，并检查每个存储过程的返回状态，以确保每个过程都成功完成。


    ```

    If Exists(Select s.name + ''.'' + p.name

    From sys.procedures p

    Join sys.schemas s

    On s.schema_id = p.schema_id

    Where s.name = ''FWDemo''

    And p.name = ''DailyProcessController'')

    begin

    print '' - 正在删除 FWDemo.DailyProcessController 存储过程''

    Drop Procedure FWDemo.DailyProcessController

    print '' - FWDemo.DailyProcessController 存储过程已删除''

    end

    GO

    CREATE PROCEDURE FWDemo.DailyProcessController

    AS


    --

    -- 目的：此过程是存储过程框架演示的一部分。

    --          它是日常处理存储过程的控制器。

    --


    SET NOCOUNT ON

    /*********************************************/

    /*  将过程的 开始 记录到处理日志  */

    /*********************************************/

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    Values (''过程 FWDemo.DailyProcessController - 开始'',

    GETDATE()

    )

    DECLARE @RetStat int

    SET @RetStat = 0

    /*****************************************/

    /*  执行 DailyProcess1 存储过程  */

    /*****************************************/

    EXEC @RetStat = FWDemo.DailyProcess1

    IF @RetStat  0

    GOTO EndController

    /*****************************************/

    /*  执行 DailyProcess2 存储过程  */

    /*****************************************/

    EXEC @RetStat = FWDemo.DailyProcess2

    IF @RetStat  0

    GOTO EndController

    /****************************************************/

    /*  将过程的 完成 状态记录到处理日志      */

    /****************************************************/

    EndController:

    IF @RetStat = 0

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''过程 FWDemo.DailyProcessController - 已完成'',

    GETDATE()

    )

    END

    ELSE

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''过程 FWDemo.DailyProcessController - 错误'',

    GETDATE()

    )

    END

    RETURN @RetStat

    GO

    清单 2-1

    日常处理控制器存储过程

    ```


    借助 `清单 2-1` 中的控制器，运维人员的执行工作变得简单多了。无需再同时调度多个存储过程并处理调度中的优先规则，只需设置好控制器的执行，现在监控成功完成情况也更容易。`清单
    2-2` 展示了用于执行 `日常处理` 控制器的代码。一如既往，`FWDemo.ProcessLog` 显示了执行的进度。


    ```

    EXECUTE FWDemo.DailyProcessController

    清单 2-2

    日常处理控制器执行语句

    ```


    使用控制器模式的另一个优点是，当需要向流程中添加新的存储过程和/或新的业务规则时。如果没有控制器，新的存储过程需要编译，而运维人员负责在流程中的正确位置执行它，并在设置过程中考虑新的业务规则要求。这是在开发/测试结束后需要发生的许多步骤，因此是出错的机会。有了控制器，开发和测试将不仅包括新的存储过程，还包括对控制器存储过程的必要修改，以执行新的存储过程。然后，业务规则成为开发/测试工作的一部分，部署到生产环境就变得像编译新的存储过程和新版本的控制器存储过程一样简单。由于控制器执行已经调度好，运维人员无需进行其他更改。我们在部署到生产环境时消除了许多手动干预，从而减少了出错的机会。


    ## 月度处理控制器


    接下来，我们将为我们的 `月度处理` 添加一个控制器。`清单 2-3` 包含名为 `FWDemo.MonthlyProcessController` 的存储过程的代码。此存储过程执行两个月度处理存储过程，并在
    `FWDemo.ProgressLog` 中记录进度的同时处理流程内的优先规则。运维人员只需执行此控制器即可启动流程。


    ```

    If Exists(Select s.name + ''.'' + p.name

    From sys.procedures p

    Join sys.schemas s

    On s.schema_id = p.schema_id

    Where s.name = ''FWDemo''

    And p.name = ''MonthlyProcessController'')

    begin

    print '' - 正在删除 FWDemo.MonthlyProcessController 存储过程''

    Drop Procedure FWDemo.MonthlyProcessController

    print '' - FWDemo.MonthlyProcessController 存储过程已删除''

    end

    GO

    CREATE PROCEDURE FWDemo.MonthlyProcessController

    AS


    --

    -- 目的：此过程是存储过程框架演示的一部分。

    --          它是月度处理存储过程的控制器。

    --


    SET NOCOUNT ON

    /*********************************************/

    /*  将过程的 开始 记录到处理日志      */

    /*********************************************/

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    Values (''过程 FWDemo.MonthlyProcessController - 开始'',

    GETDATE()

    )

    DECLARE @RetStat int

    SET @RetStat = 0

    /********************************************/

    /*  执行 MonthlyProcess1 存储过程      */

    /********************************************/

    EXEC @RetStat = FWDemo.MonthlyProcess1

    IF @RetStat  0

    GOTO EndController

    /********************************************/

    /*  执行 MonthlyProcess2 存储过程  */

    /********************************************/

    EXEC @RetStat = FWDemo.MonthlyProcess2

    IF @RetStat  0

    GOTO EndController

    /****************************************************/

    /*  将过程的 完成 状态记录到处理日志    */

    /****************************************************/

    EndController:

    IF @RetStat = 0

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''过程 FWDemo.MonthlyProcessController - 已完成'',

    GETDATE()

    )

    END

    ELSE

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''过程 FWDemo.MonthlyProcessController - 错误'',

    GETDATE()

    )

    END

    RETURN @RetStat

    GO

    清单 2-3

    月度处理控制器存储过程

    ```


    `清单 2-4` 包含用于执行新的 `月度处理控制器` 的语句。


    ```

    EXECUTE FWDemo.MonthlyProcessController

    清单 2-4

    月度处理控制器执行语句

    ```


    然而，这里没有涉及的是控制器之间的业务优先规则，即 1) `月度处理` 在每月第一天执行，以及 2) 在 `日常处理` 成功完成后执行。但是，随着控制器模式的引入，运维人员需要处理的这些细节已经变得简单得多。


    ## 总结


    控制器融合了由业务规则定义的依赖关系，并协调流程的执行。这样做有两个主要优点。首先，它使调度变得容易得多，因为依赖关系是内置的。其次，在排查流程问题时，它便于随时访问和参考流程流。


    # 3. 存储过程协调器


    基于第 2 章中的控制器模式，框架的下一个逻辑进展是协调器的概念。它基本上是控制器的控制器，可以解决控制器之间的优先规则问题。'
- fmt: '# The Orchestrator


    Controllers are themselves a type of process just as the daily and monthly processes
    that have been built. We may find that dependencies exist between the processing
    of different controllers. That is where an orchestrator comes in. Orchestrators
    can address those dependencies in exactly the same way as controllers. Listing
    3-1 shows the code to create a stored procedure called `FWDemo.ProcessOrchestrator`.
    This stored procedure executes the `Daily Controller` stored procedure and, when
    appropriate based on the date, the `Monthly Controller` stored procedure.


    ```sql

    IF EXISTS (SELECT s.name + ''.'' + p.name

    FROM sys.procedures p

    JOIN sys.schemas s

    ON s.schema_id = p.schema_id

    WHERE s.name = ''FWDemo''

    AND p.name = ''ProcessOrchestrator'')

    BEGIN

    PRINT '' - Dropping FWDemo.ProcessOrchestrator stored procedure''

    DROP PROCEDURE FWDemo.ProcessOrchestrator

    PRINT '' - FWDemo.ProcessOrchestrator stored procedure dropped''

    END

    GO

    CREATE PROCEDURE FWDemo.ProcessOrchestrator

    @RunDate smalldatetime = null

    AS


    --

    -- Purpose: This procedure is part of the Stored Procedure Framework Demo.                        --    It
    is the Orchestrator Procedure that executes the Controller             --    Procedures.

    --


    SET NOCOUNT ON

    /*******************************************************/

    /*  Log the START of the procedure to the process log  */

    /*******************************************************/

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.ProcessOrchestrator - STARTING'',

    GETDATE()

    )

    IF @RunDate is null

    SET @RunDate = GETDATE()

    DECLARE @RetStat int

    SET @RetStat = 0

    /******************************************/

    /*  Execute the Daily Process Controller  */

    /******************************************/

    EXEC @RetStat = FWDemo.DailyProcessController

    IF @RetStat  0

    GOTO EndOrchestrator

    /**********************************************************************/

    /*  Execute the MonthlyProcessController IF @RunDate is the first day */      /*    of
    a month                                                      */

    /**********************************************************************/

    IF DATEPART(DAY, @RunDate) = 1

    BEGIN

    EXEC @RetStat = FWDemo.MonthlyProcessController

    IF @RetStat  0

    GOTO EndOrchestrator

    END

    /************************************************************/

    /*  Log the COMPLETION of the procedure to the process log  */

    /************************************************************/

    EndOrchestrator:

    IF @RetStat = 0

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.ProcessOrchestrator - COMPLETED'',

    GETDATE()

    )

    END

    ELSE

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.ProcessOrchestrator - ERROR'',

    GETDATE()

    )

    END

    RETURN @RetStat

    GO

    Listing 3-1

    Process Orchestrator stored procedure

    ```


    As with the various stored procedures we have already seen, the orchestrator shows
    execution progress by logging to `FWDemo.ProcessLog`. The return status is used
    to check for successful completion of the controllers. Also, there is code included
    to determine if it is the first day of the month which is one of the precedence
    rules for the execution of the `Monthly Process`. There is an input parameter
    called `@RunDate` which has a default value of `null`. The `null` value causes
    the stored procedure to use the current date for processing. However, to make
    it easy to experiment with the demonstration system, a date can be supplied at
    execution time to establish the value of `@RunDate`. Listing 3-2 shows the execute
    statements for the orchestrator for using both the current date and a date override.
    For all practical purposes, all that the operations staff needs to do is set up/schedule
    the execution of `FWDemo.ProcessOrchestrator`, and everything else is handled
    within the patterns that have been built.


    ```sql

    --IF rundate is current date:

    EXECUTE FWDemo.ProcessOrchestrator

    --IF rundate is not current date:

    EXECUTE FWDemo.ProcessOrchestrator

    @RunDate = ''''

    --NOTE:  is in the format of CCYYMMDD

    Listing 3-2

    Process Orchestrator execute statements

    ```


    # A Quick Process Overview


    At this point, let’s review what has been built up until now. There is a `Daily
    Process` comprised of two stored procedures and a `Monthly Process` also comprised
    of two stored procedures. The daily process controller, `FWDemo.DailyProcessController`,
    executes the daily process and ensures that the stored procedure `FWDemo.DailyProcess1`
    completes successfully before executing the `FWDemo.DailyProcess2` stored procedure.
    The monthly process controller, `FWDemo.MonthlyProcessController`, executes the
    monthly process and ensures that the stored procedure `FWDemo.MonthlyProcess1`
    completes successfully before executing the `FWDemo.MontlyProcess2` stored procedure.
    Wrapped around it all is `FWDemo.ProcessOrchestrator` that executes the daily
    process controller and, upon successful completion, checks for a run date that
    is the first day of the month and, if true, executes the monthly process controller.
    A single execute statement drives the entire process.


    # A Look at Troubleshooting Issues


    Up until now, our attention has been focused on following the successful completion
    of the processes that have been built. So, it’s time for a reality check. How
    do we handle error situations? What do we do if one of the processes in the sequence
    has an error and doesn’t complete successfully? That can sometimes be accompanied
    by a phone call in the middle of the night and some action needs to be taken.
    Diving in and troubleshooting the problem begins. Looking at `FWDemo.ProcessLog`
    is a great place to start in order to identify the location and cause of the problem
    in order for correction to begin. Once the solution is determined and the problem
    corrected, how do we complete the remaining steps in the sequence? With our current
    patterns in place, about the only option is to deconstruct the process where the
    error occurred and finish manually. After that, we find an execution at the next
    highest level of our patterns and manually execute from there.


    For example, the production process has a problem with the stored procedure `FWDemo.DailyProcess2`.
    We research and correct the issue. At this point, `FWDemo.DailyProcess2` needs
    to be manually executed. Upon successful completion, we know that everything in
    `FWDemo.DailyProcessController` has finished. The next highest level is the `FWDemo.ProcessOrchestrator`
    stored procedure. After the execution of the daily process controller, the orchestrator
    checks to see if the value in the `@RunDate` parameter equals the first of the
    month. If that is the case, then we would need to manually execute `FWDemo.MonthlyProcessController`.
    If it is not the first of the month, nothing else is necessary. In our system,
    it is pretty simple. But, in reality, the resolution could have a lot more moving
    parts and a lot of manual intervention. The more complex the process becomes,
    the more complex the problem resolution becomes.


    # Summary


    Orchestrators are simply a higher level of controller. It manages the execution
    of multiple controllers while incorporating any dependencies that may exist between
    the controllers. It can further simplify scheduling while providing a more complete
    picture of process requirements that can aid in successful problem remediation.


    # 4. A Stored Procedure–Based Metadata-Driven Framework


    In order to add flexibility and control over the execution of all of the processes
    within the framework, metadata can be added to the environment. It can identify
    the stored procedures, controllers, and orchestrators as well as the relationships
    between each. The metadata will be used as the communication that drives the execution
    of the processes.'
