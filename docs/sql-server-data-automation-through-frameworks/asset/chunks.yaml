    packages are executed in a specified order. SSIS packages with a specified order
    within an SSIS application are application packages. What if we would like it
    very much if an SSIS package executed, completed, and succeeded, but if the package
    fails for some reason, it’s not vital for this particular SSIS application execution?
    What if we just don’t care so much if this particular package fails? The FailApplicationOnPackageFailure
    attribute will permit the package to fail *without* stopping the SSIS application
    execution.


    #### Default Constraints


    A default constraint manages the initial value of a column when a new record is
    added to a table and the value for field is not supplied an explicit value:


    *   DF_config_ApplicationPackages_FailApplicationOnPackageFailure is a default
    constraint that sets the value of the FailApplicationOnPackageFailure bit to True
    (1) if no value is supplied when the config.ApplicationPackages record is first
    added to the table.


    *   DF_config_ApplicationPackages_ApplicationPackageEnabled is a default constraint
    that sets the value of the ApplicationPackageEnabled bit to True (1) if no value
    is supplied when the config.ApplicationPackages record is first added to the table.


    *   DF_config_ApplicationPackages_ExecutionOrder is a default constraint that
    sets the value of the ExecutionOrder integer to 10 if no value is supplied when
    the config.ApplicationPackages record is first added to the table.


    #### Relationships


    Keys manage relationships between entities in the SSISConfig database and therefore
    in the SSIS framework:


    *   Config.ApplicationPackages is configured with PK_config_ApplicationPackages.
    Each table has a primary key for relationship management. In this framework, PK_config_ApplicationPackages
