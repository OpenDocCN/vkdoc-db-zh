    If your SSISConfig database query results appear as shown in Figure [9-10](#497846_1_En_9_Chapter.xhtml#Fig10),
    congratulations! You followed the instructions correctly. But there’s an issue
    with the instructions: how will the Azure Data Factory version of the SSIS execution
    engine find my – or your – local drive (my E drive, in this case)? The short answer
    is, “That would be difficult.”


    Before we update the PackagePath metadata, let’s first provision an Azure File
    Share.


    ## Provision an Azure File Share


    Begin by downloading Microsoft Azure Storage Explorer at storageexplorer.com,
    as shown in Figure [9-16](#497846_1_En_9_Chapter.xhtml#Fig16).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig16_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig16_HTML.jpg)

    Figure 9-16: Browse to StorageExplorer.com to download Azure Storage Explorer


    Install Azure Storage Explorer, and connect to the Azure Storage account provisioned
    in the previous chapter. When connected, storage explorer surfaces an Explorer
    window that appears similar to Figure [9-17](#497846_1_En_9_Chapter.xhtml#Fig17).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig17_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig17_HTML.jpg)

    Figure 9-17: Viewing Explorer in Azure Storage Explorer


    In Chapter [8](#497846_1_En_8_Chapter.xhtml), we provisioned a storage account
    named “stframeworks” which we see in the screenshot of Microsoft Azure Storage
    Explorer in Figure [9-17](#497846_1_En_9_Chapter.xhtml#Fig17). Expand the stframeworks
    storage account to surface virtual folders for Blob Containers, File Shares, Queries,
    and Tables, as shown in Figure [9-18](#497846_1_En_9_Chapter.xhtml#Fig18).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig18_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig18_HTML.jpg)

    Figure 9-18: stframeworks virtual folders


    Right-click the File Shares virtual folder, and click “Create File Share” as shown
    in Figure [9-19](#497846_1_En_9_Chapter.xhtml#Fig19).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig19_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig19_HTML.jpg)

    Figure 9-19: Creating a new File Share


    When the new file share displays, enter a name for the file share – such as “fs-ssis,”
    as shown in Figure [9-20](#497846_1_En_9_Chapter.xhtml#Fig20).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig20_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig20_HTML.jpg)

    Figure 9-20: Naming the new file share


