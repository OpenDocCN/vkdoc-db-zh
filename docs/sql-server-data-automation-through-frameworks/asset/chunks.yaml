    category, and click “Log Application Instance Start.” The dynamic content textbox
    will display `@activity(''Log Application Instance Start'').output`. Append “`.firstrow.ApplicationInstanceId`”
    to the expression to map the value of the `ApplicationInstanceId` returned from
    the execution of the “Log Application Instance Start” lookup activity into the
    `ApplicationInstanceId` parameter’s value property, as shown in Figure [10-15](#497846_1_En_10_Chapter.xhtml#Fig15).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig15_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Mapping the “Log Application Instance Start” lookup activity into the ApplicationInstanceId
    parameter’s value property


    Click the Finish button to proceed.


    Type “Failed” into the `ApplicationStatus` parameter’s value property, as shown
    in Figure [10-16](#497846_1_En_10_Chapter.xhtml#Fig16).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig16_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig16_HTML.jpg)


    Figure 10-16


    Setting the ApplicationStatus property to Failed


    The ADF version of the SSIS framework execution engine (the parent pipeline) is
    now configured to execute an SSIS application and record a failed application
    instance.


    The next step is to test-execute the pipeline.


    ### Let’s Test It!


    Click the Debug item on the parent pipeline’s toolbar. The Output tab displays
    and, after some time, reveals the parent pipeline activities executed, as shown
    in Figure [10-17](#497846_1_En_10_Chapter.xhtml#Fig17).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig17_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig17_HTML.jpg)


    Figure 10-17


    Results of a text execution of the parent pipeline


    Execute the T-SQL query shown in Listing [10-4](#497846_1_En_10_Chapter.xhtml#PC4)
    to examine the Application Instance results.


    ```

    Select a.ApplicationName

    , ai.ApplicationStartTime

    , ai.ApplicationStatus

    From log.ApplicationInstance ai

    Join config.Applications a

    On a.ApplicationId = ai.ApplicationId

    Order By ApplicationInstanceId Desc

    Listing 10-4

    Application Instance results

    ```


    The results should appear similar to Figure [10-18](#497846_1_En_10_Chapter.xhtml#Fig18).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig18_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig18_HTML.jpg)


    Figure 10-18


    Application Instance results


    While the results match what was expected, something is missing: there is no Stored
    Procedure Activity that updates the Application Instance on Success.


    ### Updating Application Instance on Success


    The parent pipeline needs a way to log Application Instance success. Begin by
    clicking the Clone icon on the “Log Application Instance Failure” stored procedure
    activity as shown in Figure [10-19](#497846_1_En_10_Chapter.xhtml#Fig19).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig19_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig19_HTML.jpg)


    Figure 10-19


    Preparing to clone the “Log Application Instance Success” stored procedure activity
    from the “Log Application Instance Failure” stored procedure activity


    Cloning the “Log Application Instance Failure” stored procedure activity makes
    sense because the new Stored Procedure Activity will be calling the *same* stored
    procedure – log.UpdateApplicationInstanceStatus – and *only one* parameter value
    configuration will change.


    Connect a Success output from the “ForEach Application Package” ForEach activity
    to the cloned Stored Procedure Activity, and then rename the cloned Stored Procedure
    Activity to “Log Application Instance Success,” as shown in Figure [10-20](#497846_1_En_10_Chapter.xhtml#Fig20).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig20_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig20_HTML.jpg)


    Figure 10-20


    Adding the “Log Application Instance Success” stored procedure activity


    Next, click the Settings tab for the “Log Application Instance Success” stored
    procedure activity. The only change required on the Settings tab is the value
    of the ApplicationStatus parameter’s value property, which needs to be updated
    from “Failed” to “Succeeded,” as shown in Figure [10-21](#497846_1_En_10_Chapter.xhtml#Fig21).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig21_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig21_HTML.jpg)


    Figure 10-21


    Updating the ApplicationStatus parameter value


    A fresh test execution confirms the parent pipeline logs SSIS framework application
    failures as designed. The Azure Data Factory version of the SSIS framework needs
    similar instance logging at the application package scope.


    The next step is implementing Application Package Instance logging.


    Before proceeding, we need to make two changes to the parent pipeline:


    *   Add the ApplicationPackageId field to the query in the “Get Application Packages”
    lookup activity.


    *   Add the ApplicationInstanceId variable (and store the ApplicationInstanceId
    value in the ApplicationInstanceId variable).


    ### Adding the ApplicationPackageId Field


    To add the ApplicationPackageId field to the metadata dataset returned from the
    SSISConfig database, select the “Get Application Packages” lookup activity, and
    then click the Settings tab. Modify the Query property using the T-SQL in Listing
    [10-5](#497846_1_En_10_Chapter.xhtml#PC5).


    ```

    Select a.ApplicationName

    , p.PackageLocation + p.PackageName As PackagePath

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    , ap.ApplicationPackageId

    From [config].[ApplicationPackages] ap

    Join [config].[Applications] a

    On a.ApplicationId = ap.ApplicationId

    Join [config].Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test''

    And ap.ApplicationPackageEnabled = 1

    Order By ap.ExecutionOrder

    Listing 10-5

    Modified query to retrieve application package metadata

    ```


    After the T-SQL has been modified, the next step is to add a variable to hold
    the ApplicationInstanceId pipeline variable.'
  trans: '

    ### 更新应用程序实例


    ADF 执行引擎需要执行一个名为 `log.UpdateApplicationInstanceStatus` 的存储过程，该过程接受 `ApplicationInstanceId`
    和 `ApplicationStatus` 值，然后更新当前应用程序实例的状态。存储过程活动非常适合这个任务！


    返回到父级 ADF 管道。将一个存储过程活动拖放到画布上。从 `ForEach Application Package` 活动添加一个失败输出连接到新的存储过程活动。将新的存储过程活动重命名为“记录应用程序实例失败”，如图
    10-12 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig12_HTML.jpg](img/497846_1_En_10_Fig12_HTML.jpg)


    *图 10-12: 添加“记录应用程序实例失败”存储过程活动*


    在“设置”选项卡上，从“链接服务”属性下拉菜单中选择 `ssisFrameworkLinkedService`，然后从“存储过程名称”下拉菜单中选择 `[log].[UpdateApplicationInstanceStatus]`，如图
    10-13 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig13_HTML.jpg](img/497846_1_En_10_Fig13_HTML.jpg)


    *图 10-13: 配置“链接服务”和“存储过程名称”属性*


    单击“导入参数”按钮以从 `log.UpdateApplicationInstanceStatus` 存储过程导入参数。单击 `ApplicationInstanceId`
    参数的值文本框内，然后单击“添加动态内容 [Alt + P]”链接，如图 10-14 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig14_HTML.jpg](img/497846_1_En_10_Fig14_HTML.jpg)


    *图 10-14: 准备为 ApplicationInstanceId 参数输入动态内容*


    当“添加动态内容”面板显示时，展开“活动输出”表达式类别，并单击“记录应用程序实例启动”。动态内容文本框将显示 `@activity(''Log Application
    Instance Start'').output`。在该表达式后追加 `.firstrow.ApplicationInstanceId`，以将“记录应用程序实例启动”查找活动执行返回的
    `ApplicationInstanceId` 值映射到 `ApplicationInstanceId` 参数的值属性中，如图 10-15 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig15_HTML.jpg](img/497846_1_En_10_Fig15_HTML.jpg)


    *图 10-15: 将“记录应用程序实例启动”查找活动映射到 ApplicationInstanceId 参数的值属性*


    单击“完成”按钮继续。


    在 `ApplicationStatus` 参数的值属性中键入“Failed”，如图 10-16 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig16_HTML.jpg](img/497846_1_En_10_Fig16_HTML.jpg)


    *图 10-16: 将 ApplicationStatus 属性设置为 Failed*


    至此，SSIS 框架执行引擎（父级管道）的 ADF 版本已配置为执行 SSIS 应用程序并记录失败的应用程序实例。


    下一步是测试执行该管道。


    ### 让我们测试一下！


    单击父级管道工具栏上的“调试”项。“输出”选项卡会显示，片刻之后，会显示已执行的父级管道活动，如图 10-17 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig17_HTML.jpg](img/497846_1_En_10_Fig17_HTML.jpg)


    *图 10-17: 父级管道测试执行的结果*


    执行清单 10-4 中所示的 T-SQL 查询以检查应用程序实例结果。


    ```sql

    Select a.ApplicationName

    , ai.ApplicationStartTime

    , ai.ApplicationStatus

    From log.ApplicationInstance ai

    Join config.Applications a

    On a.ApplicationId = ai.ApplicationId

    Order By ApplicationInstanceId Desc

    ```


    *清单 10-4: 应用程序实例结果*


    结果应类似于图 10-18。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig18_HTML.jpg](img/497846_1_En_10_Fig18_HTML.jpg)


    *图 10-18: 应用程序实例结果*


    虽然结果符合预期，但缺少了点东西：没有一个在成功时更新应用程序实例的存储过程活动。


    ### 成功时更新应用程序实例


    父级管道需要一种方式来记录应用程序实例的成功。首先单击“记录应用程序实例失败”存储过程活动上的“克隆”图标，如图 10-19 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig19_HTML.jpg](img/497846_1_En_10_Fig19_HTML.jpg)


    *图 10-19: 准备从“记录应用程序实例失败”存储过程活动克隆“记录应用程序实例成功”存储过程活动*


    克隆“记录应用程序实例失败”存储过程活动是合理的，因为新的存储过程活动将调用*同一个*存储过程——`log.UpdateApplicationInstanceStatus`——并且*只有*一个参数值配置需要更改。


    将“ForEach Application Package” ForEach 活动的一个成功输出连接到克隆的存储过程活动，然后将克隆的存储过程活动重命名为“记录应用程序实例成功”，如图
    10-20 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig20_HTML.jpg](img/497846_1_En_10_Fig20_HTML.jpg)


    *图 10-20: 添加“记录应用程序实例成功”存储过程活动*


    接下来，单击“记录应用程序实例成功”存储过程活动的“设置”选项卡。在“设置”选项卡上唯一需要的更改是 `ApplicationStatus` 参数值属性的值，需要将其从“Failed”更新为“Succeeded”，如图
    10-21 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig21_HTML.jpg](img/497846_1_En_10_Fig21_HTML.jpg)


    *图 10-21: 更新 ApplicationStatus 参数值*


    新的测试执行确认父级管道按预期记录了 SSIS 框架应用程序故障。Azure Data Factory 版本的 SSIS 框架需要在应用程序包范围内进行类似的实例记录。


    下一步是实现应用程序包实例记录。


    在继续之前，我们需要对父级管道进行两处更改：


    *   将 `ApplicationPackageId` 字段添加到“获取应用程序包”查找活动的查询中。

    *   添加 `ApplicationInstanceId` 变量（并将 `ApplicationInstanceId` 值存储到 `ApplicationInstanceId`
    变量中）。


    ### 添加 ApplicationPackageId 字段


    要将 `ApplicationPackageId` 字段添加到从 SSISConfig 数据库返回的元数据数据集中，请选择“获取应用程序包”查找活动，然后单击“设置”选项卡。使用清单
    10-5 中的 T-SQL 修改查询属性。


    ```sql

    Select a.ApplicationName

    , p.PackageLocation + p.PackageName As PackagePath

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    , ap.ApplicationPackageId

    From [config].[ApplicationPackages] ap

    Join [config].[Applications] a

    On a.ApplicationId = ap.ApplicationId

    Join [config].Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test''

    And ap.ApplicationPackageEnabled = 1

    Order By ap.ExecutionOrder

    ```


    *清单 10-5: 用于检索应用程序包元数据的已修改查询*


    修改 T-SQL 后，下一步是添加一个变量来保存 `ApplicationInstanceId` 管道变量。

    '
- fmt: '### Adding the ApplicationInstanceId Pipeline Variable


    To add the ApplicationInstanceId pipeline variable, click the pipeline, and then
    select the **Variables** tab. Click the “+ New” button and name the new variable
    `ApplicationInstanceId` as shown in Figure [10-22](#497846_1_En_10_Chapter.xhtml#Fig22).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig22_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig22_HTML.jpg)


    *Figure 10-22: Adding the ApplicationInstanceId pipeline variable*


    “Why is the `ApplicationInstanceId` variable – an integer – declared as a String
    variable?” That’s a fair question. At the time of this writing, the other variable
    type options are Boolean and Array. The `ApplicationInstanceId` is neither a Boolean
    nor an Array.


    ### Configuring the Set Variable Activity


    The next step is to add a **Set variable** activity to set the value of the `ApplicationInstanceId`
    pipeline parameter to the `ApplicationInstanceId` value returned from the **“Log
    Application Instance Start”** lookup activity. To begin, select the **Success**
    output of the “Log Application Instance Start” lookup activity, right-click the
    **Success** output, and then click **Delete**, as shown in Figure [10-23](#497846_1_En_10_Chapter.xhtml#Fig23).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig23_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig23_HTML.jpg)


    *Figure 10-23: Deleting the Success output from the “Log Application Instance
    Start” lookup activity*


    To add a new **Success** output to the “Log Application Instance Start” lookup
    activity, click the **“Add Output”** icon, and then click **“Success,”** as shown
    in Figure [10-24](#497846_1_En_10_Chapter.xhtml#Fig24).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig24_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig24_HTML.jpg)


    *Figure 10-24: Adding a new Success output to the “Log Application Instance Start”
    lookup activity*


    Drag a **Set variable** activity onto the pipeline canvas, and rename it to `Set
    ApplicationInstanceId`. Click the **Variables** tab, and select `ApplicationInstanceId`
    from the **Name** property drop-down. Click inside the **Value** property textbox,
    and then click the **“Add dynamic content [Alt + P]”** link to open the **Set
    dynamic content** blade. Scroll to the **Activity outputs** category, and click
    **“Log Application Instance Start”** to add `@activity(''Log Application Instance
    Start'').output` to the expression textbox. Edit `@activity(` to read `@string(activity(`.
    Append `.firstrow.ApplicationInstanceId)` to the expression to assign the `ApplicationInstanceId`
    value returned in the first row of the output from the “Log Application Instance
    Start” lookup activity, as shown in Figure [10-25](#497846_1_En_10_Chapter.xhtml#Fig25).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig25_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig25_HTML.jpg)


    *Figure 10-25: Configuring the “Set ApplicationInstanceId” set variable activity*


    Connect a **Success** output from the `Set ApplicationInstanceId` set variable
    activity to the **“Get Application Packages”** lookup activity.


    The `Set ApplicationInstanceId` set variable activity is now configured to read
    the `ApplicationInstanceId` value returned from the “Log Application Instance
    Start” lookup activity and store the value in the `ApplicationInstanceId` pipeline
    variable.


    ### Updating the Stored Procedure Activities


    Finally, update the **“Log Application Instance Success”** and **“Log Application
    Instance Failure”** stored procedure activities to use `@int(variables(''ApplicationInstanceId''))`
    for the `ApplicationInstanceId` stored procedure parameters instead of the output
    from the “Log Application Instance Start” lookup activity, as shown in Figure
    [10-26](#497846_1_En_10_Chapter.xhtml#Fig26).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig26_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig26_HTML.jpg)


    *Figure 10-26: Using @variables(''ApplicationInstanceId'')*


    As stated earlier, the `ApplicationInstanceId` pipeline variable is a string.
    At the time of this writing, the value would be implicitly converted to an integer
    here and elsewhere. That said, please be *intentional* in your coding. Here, “intentional”
    means explicit conversion to an integer value.


    The next step is to add a child pipeline to execute the application packages.'
