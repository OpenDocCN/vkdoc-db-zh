    # Test Execution and Results


    Test the operation of `Parent.dtsx` by starting the SSIS debugger (`F5`). At first
    glance, the results may appear askew, as shown in Figure [6-63](#497846_1_En_6_Chapter.xhtml#Fig63).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig63_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig63_HTML.jpg)

    **Figure 6-63** Test Execution Results


    Note the test execution of `Parent.dtsx` failed. The lower package execution message
    affirms package execution failure, as does task-failed indications on the `EPT
    Execute Child Package` execute package task and the `FOREACH Application Package`
    foreach loop container.


    What happened? Great question! Open the Progress/Execution Results tab on the
    `Parent.dtsx` package tab and view the messages recorded during execution, as
    shown in Figure [6-64](#497846_1_En_6_Chapter.xhtml#Fig64).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig64_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig64_HTML.jpg)

    **Figure 6-64** Viewing the Progress/Execution Results tab


    Figure [6-64](#497846_1_En_6_Chapter.xhtml#Fig64) shows the messages raised during
    the failed execution of `Parent.dtsx`. We see metadata from both files in the
    SSIS application – `ReportAndSucceed.dtsx` and `ReportAndFail.dtsx` – logged by
    the `SCR Log Application Package Values` script task. What’s missing is an indication
    of whether each SSIS package execution succeeded or failed.


    ## Log Execution Results


    To begin logging execution results, drag a new Script Task into the `FOREACH Application
    Package` foreach loop container, and then rename the new Script Task to “`SCR
    Log Package Execution Success`,” as shown in Figure [6-65](#497846_1_En_6_Chapter.xhtml#Fig65).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig65_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig65_HTML.jpg)

    **Figure 6-65** Adding the SCR Log Package Execution Success script task


    Open the `SCR Log Package Execution Success` script task editor. As before, add
    `System::PackageName`, `System::TaskName`, and `User::PackagePath` SSIS variables
    to the `ReadOnlyVariables` property, as shown in Figure [6-66](#497846_1_En_6_Chapter.xhtml#Fig66).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig66_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig66_HTML.jpg)

    **Figure 6-66** Populating the ReadOnlyVariables property


    Click the Edit Script button to open the `VstaProjects` editor. Add the C# .Net
    code shown in Listing [6-5](#497846_1_En_6_Chapter.xhtml#PC5) to the `public void
    Main()` method to log the successful execution of an SSIS application package
    in the framework.


    ```

    public void Main()

    {

    // System::PackageName, System::TaskName

    // User::PackagePath

    string packageName = ➤ Dts.Variables["System::PackageName"].Value.ToString();

    string taskName = Dts.Variables["System::TaskName"].Value.ToString();

    string subComponent = packageName + "." + taskName;

    int informationCode = 1001;

    bool fireAgain = true;

    string packagePath = Dts.Variables["User::PackagePath"].Value.ToString();

    string description = packagePath + " execution succeeded";

    Dts.Events.FireInformation(informationCode, subComponent, description, ➤ "", 0,
    ref fireAgain);

    Dts.TaskResult = (int)ScriptResults.Success;

    }

    ```

    **Listing 6-5** C# .Net code to log a successful SSIS application package execution


    The code in Listing [6-5](#497846_1_En_6_Chapter.xhtml#PC5) raises an `Information`
    event that builds a message informing operators and developers the SSIS framework
    application package execution has succeeded, as shown in Figure [6-67](#497846_1_En_6_Chapter.xhtml#Fig67).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig67_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig67_HTML.jpg)

    **Figure 6-67** Raising an Information event on successful SSIS framework application
    package execution


