  trans: '

    ## SSIS 框架应用程序与包快速回顾


    一个 SSIS 框架应用程序是多个 SSIS 包的集合，这些包按照预定顺序执行（一个 SSIS 应用程序可配置为执行一个或多个 SSIS 包）。SSIS 应用程序的元数据存储在
    `config.Applications` 表中，而 SSIS 包位置的元数据则存储在 `config.Packages` 表中。由于 SSIS 应用程序和
    SSIS 包之间的基数关系是多对多的（一个 SSIS 包可配置为在一个或多个 SSIS 应用程序中运行），因此存在 `config.ApplicationPackages`
    表来解析应用程序和包之间的关系。


    ## 添加应用程序实例日志记录


    在本章的引言中，我提到 ADF 和 SSIS 在实现类似功能的方式上存在差异，这些差异将推动 Azure Data Factory 中 SSIS 框架设计的变化。在配置应用程序实例日志记录时，我们遇到了第一个差异。


    SSIS 框架在 `log.ApplicationInstance` 表中收集有关应用程序执行实例的操作数据。有关应用程序包执行实例的操作数据存储在 `log.ApplicationPackageInstance`
    表中。


    ### 修改 log.ApplicationInstance 表


    一个 Azure Data Factory (ADF) 管道由许多组成对象和构件构成，包括 ADF 活动。当 ADF 活动执行时，会生成一个 *RunId*
    值用于操作日志记录。当 Azure Data Factory 管道执行时，会生成一个 RunId 值，并用于将内部 ADF 管道日志与管道活动日志关联起来。


    通过执行清单 10-1 中的 T-SQL 来修改 `log.ApplicationInstance` 表。


    ```sql

    print ''Log.ApplicationInstance.ApplicationRunId column''

    If Not Exists(Select s.[name]

    + ''.'' + t.[name]

    + ''.'' + c.[name]

    From [sys].[schemas] s

    Join [sys].[tables] t

    On t.[schema_id] = s.[schema_id]

    Join [sys].[columns] c

    On c.[object_id] = t.[object_id]

    Where s.[name] = N''log''

    And t.[name] = N''ApplicationInstance''

    And c.[name] = N''ApplicationRunId'')

    begin

    print '' - Adding log.ApplicationInstance.ApplicationRunId column''

    Alter Table log.ApplicationInstance

    Add ApplicationRunId nvarchar(55) NULL

    print '' - Log.ApplicationInstance.ApplicationRunId column added''

    end

    Else

    begin

    print '' - Log.ApplicationInstance.ApplicationRunId column already exists.''

    end

    ```

    清单 10-1

    向 ApplicationInstance 表添加 ApplicationRunId 列


    接下来，我们将用于添加应用程序实例行的 T-SQL 封装到一个存储过程中。


    ### 添加 log.InsertApplicationInstance 存储过程


    在 SSIS 执行引擎（即 `Parent.dtsx` SSIS 包）中，使用了执行 SQL 任务将初始的 `ApplicationInstance` 记录插入
    `log.ApplicationInstance` 表并返回一个 `ApplicationInstanceId` 值。在 Azure Data Factory
    执行引擎（即父管道）中，将使用一个 Lookup 活动来调用一个存储过程，该存储过程插入记录并返回一个 `ApplicationInstanceId` 值。该
    `ApplicationInstanceId` 值将在管道后续步骤中用于更新 `ApplicationInstance` 记录。


    在 Azure Data Studio（或 SSMS）中，连接到名为 `SSISConfig` 的 Azure SQL 数据库。从第 7 章的清单 7-4
    中的 T-SQL 代码开始，以幂等（可重复执行）的方式执行 T-SQL 来创建一个名为 `log.InsertApplicationInstance` 的新存储过程，如清单
    10-2 所示。


    ```sql

    print ''log.InsertApplicationInstance stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

    Where s.[name] = N''log''

    And p.[name] = N''InsertApplicationInstance'')

    begin

    print '' - Dropping log.InsertApplicationInstance stored procedure''

    Drop Procedure log.InsertApplicationInstance

    print '' - Log.InsertApplicationInstance stored procedure dropped''

    end

    print '' - Creating log.InsertApplicationInstance stored procedure''

    go

    Create Procedure log.InsertApplicationInstance

    @ApplicationName nvarchar(255)

    , @ApplicationRunId nvarchar(55) = NULL

    As

    declare @ApplicationId int = (Select ApplicationId

    From config.Applications

    Where ApplicationName = @ApplicationName)

    Insert Into [log].ApplicationInstance (ApplicationId, ApplicationRunId)

    Output inserted.ApplicationInstanceId

    Values (@ApplicationId, @ApplicationRunId)

    go

    print '' - Log.InsertApplicationInstance stored procedure created''

    go

    ```

    清单 10-2

    用于创建 `log.InsertApplicationInstance` 存储过程的幂等 T-SQL


    `log.InsertApplicationInstance` 存储过程需要将 SSIS 框架应用程序的名称发送到 `@ApplicationName` 字符串（`nvarchar(255)`）参数。一个名为
    `@ApplicationId` 的内部 T-SQL `int` 参数，会在 `config.Applications` 表中查找给定的 `@ApplicationName`
    值所对应的 `ApplicationId` 值。


    `log.InsertApplicationInstance` 存储过程还接受一个名为 `@ApplicationRunId` 的参数，该参数在未提供值时默认为
    `NULL`。`@ApplicationRunId` 用于存储 Azure Data Factory 管道的 `RunId` 值。在 SSIS 框架中存储
    `RunId` 使得企业 DevOps 团队能够将 SSIS 框架中的操作日志数据与 ADF 日志中捕获的操作数据关联起来，这在 ADF 管道执行过程中发生意外情况时非常有用。


    T-SQL `Insert` 语句通过将新的 `@ApplicationId` 和 `@ApplicationRunId` 值插入到 `log.ApplicationInstance`
    表中来初始化 `ApplicationInstance` 记录。在 `log.ApplicationInstance` 表上配置的默认值会在该行中插入以下值：


    *   `ApplicationStartTime` 由 `DF_log_ApplicationInstance_ApplicationStartTime`
    设置为 `sysdatetimeoffset()`。

    *   `ApplicationStatus` 由 `DF_log_ApplicationInstance_ApplicationStatus` 设置为 `N''Running''`。


    如果一切按计划进行，Azure Data Studio 应返回如图 10-3 所示的消息。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig3_HTML.jpg](img/497846_1_En_10_Fig3_HTML.jpg)

    图 10-3

    创建 `log.InsertApplicationInstance` 存储过程后返回的消息


    创建 `log.InsertApplicationInstance` 存储过程后，下一步是在管道中添加一个活动来执行该存储过程。

    '
- fmt: '### Logging Application Instance


    ADF 执行引擎需要执行一个名为 `log.InsertApplicationInstance` 的存储过程，该过程返回一个名为 `ApplicationInstanceId`
    的值。为此，我们创建了一个 Lookup 活动！


    返回父级 ADF 管道。将新的 Lookup 活动拖拽到设计界面。将新 Lookup 活动的成功输出连接到“Get Application Packages”查找活动。将此新的
    Lookup 活动重命名为“Log Application Instance Start”，如图 [10-4](#497846_1_En_10_Chapter.xhtml#Fig4)
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig4_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig4_HTML.jpg)


    图 10-4 添加 Log Application Instance Start 查找活动


    点击 Log Application Instance Start 查找活动的 `Settings` 选项卡以继续配置。点击 `Source dataset`
    属性下拉菜单，选择 `ssisFrameworkDataSet`，如图 [10-5](#497846_1_En_10_Chapter.xhtml#Fig5)
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig5_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig5_HTML.jpg)


    图 10-5 为 Log Application Instance Start 查找活动的 `Source dataset` 属性选择 `ssisFrameworkDataSet`


    接下来，将 Log Application Instance Start 查找活动的 `Use query` 属性选项设置为 `Stored procedure`。从
    `Name` 属性下拉菜单中选择 `log.InsertApplicationInstance`，如图 [10-6](#497846_1_En_10_Chapter.xhtml#Fig6)
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig6_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig6_HTML.jpg)


    图 10-6 选择 `log.InsertApplicationInstance` 存储过程


    接下来，点击 `Import parameter` 按钮，从 `log.InsertApplicationInstance` 存储过程导入 `@ApplicationName`
    和 `@ApplicationRunId` 字符串参数。点击 `@ApplicationName` 参数的 `Value` 属性文本框内部，然后点击 `Add
    dynamic content [Alt + P]` 链接，如图 [10-7](#497846_1_En_10_Chapter.xhtml#Fig7) 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig7_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig7_HTML.jpg)


    图 10-7 准备向参数值属性添加动态内容


    当 `Add dynamic content` 面板显示时，展开 `Parameters` 表达式类别，点击 `ApplicationName`，将参数值
    ADF 表达式设置为 `@pipeline.parameters.ApplicationName`，如图 [10-8](#497846_1_En_10_Chapter.xhtml#Fig8)
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig8_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig8_HTML.jpg)


    图 10-8 设置 ApplicationName 参数值表达式


    点击 `Finish` 按钮继续。


    点击 `@ApplicationRunId` 参数的 `Value` 属性文本框内部，然后点击 `Add dynamic content [Alt + P]`
    链接。当 `Add dynamic content` 面板显示时，展开 `System variables` 表达式类别，点击 `Pipeline run
    ID`，将参数值 ADF 表达式设置为 `@pipeline().RunId`，如图 [10-9](#497846_1_En_10_Chapter.xhtml#Fig9)
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig9_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig9_HTML.jpg)


    图 10-9 设置 ApplicationRunId 参数值表达式


    保持 `Query timeout (minutes)` 属性为其默认值（120 分钟），`Isolation level` 属性为 `None`（默认值），并保持
    `First row only` 属性为选中状态（默认值），如图 [10-10](#497846_1_En_10_Chapter.xhtml#Fig10)
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig10_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig10_HTML.jpg)


    图 10-10 保留 `Query timeout`、`Isolation level` 和 `First row only` 属性的默认值


    至此，Log Application Instance Start 查找活动已配置为调用 `log.InsertApplicationInstance` 存储过程，向该存储过程传递管道的
    `ApplicationName` 和 `ApplicationRunId` 参数值，并返回 `ApplicationInstanceId` 值。


    ### 添加 Log.UpdateApplicationInstanceStatus 存储过程


    按当前配置，父管道会执行失败，因为 `ReportAndFail.dtsx` SSIS 包（按设计）会失败。应更新 `log.ApplicationInstance`
    行以反映 SSIS 框架应用程序实例失败。


    首先，向 SSISConfig 数据库添加一个名为 `log.UpdateApplicationInstanceStatus` 的新存储过程，如清单 [10-3](#497846_1_En_10_Chapter.xhtml#PC3)
    所示。


    ```

    print ''log.UpdateApplicationInstanceStatus stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

    Where s.[name] = N''log''

    And p.[name] = N''UpdateApplicationInstanceStatus'')

    begin

    print '' - Dropping log.UpdateApplicationInstanceStatus stored procedure''

    Drop Procedure log.UpdateApplicationInstanceStatus

    print '' - Log.UpdateApplicationInstanceStatus stored procedure dropped''

    end

    print '' - Creating log.UpdateApplicationInstanceStatus stored procedure''

    go

    Create Procedure log.UpdateApplicationInstanceStatus

    @ApplicationInstanceId int

    , @ApplicationStatus nvarchar(55) = ''Succeeded''

    As

    Update [log].ApplicationInstance

    Set ApplicationEndTime = sysdatetimeoffset()

    , ApplicationStatus = @ApplicationStatus

    Where ApplicationInstanceId = @ApplicationInstanceId

    go

    print '' - Log.UpdateApplicationInstanceStatus stored procedure created''

    go

    Listing 10-3

    Idempotent T-SQL to create the log.UpdateApplicationInstanceStatus stored procedure

    ```


    如果一切按计划进行，Azure Data Studio 消息应类似于图 [10-11](#497846_1_En_10_Chapter.xhtml#Fig11)
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig11_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig11_HTML.jpg)


    图 10-11 Azure Data Studio 消息反映成功创建了 `log.UpdateApplicationInstanceStatus` 存储过程


    下一步是添加一个存储过程活动，用于在失败时调用 `log.UpdateApplicationInstanceStatus` 存储过程。'
  raw: '### Logging Application Instance


    The ADF execution engine needs to execute a stored procedure, log.InsertApplicationInstance,
    that returns a value named ApplicationInstanceId. A Lookup activity is built for
    this!


    Return to the parent ADF pipeline. Drag a new Lookup activity onto the surface.
    Add a Success output from the new Lookup activity to the Get Application Packages
    lookup activity. Rename the new Lookup activity to “Log Application Instance Start,”
    as shown in Figure [10-4](#497846_1_En_10_Chapter.xhtml#Fig4).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig4_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Adding the Log Application Instance Start lookup activity


    Click the Log Application Instance Start lookup activity’s Settings tab to continue
    configuration. Click the “Source dataset” property drop-down, and select “ssisFrameworkDataSet,”
    as shown in Figure [10-5](#497846_1_En_10_Chapter.xhtml#Fig5).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig5_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Selecting “ssisFrameworkDataSet” for the Log Application Instance Start lookup
    activity’s “Source dataset” property


    Next, set the Log Application Instance Start lookup activity’s “Use query” property
    option to “Stored procedure.” Select “log.InsertApplicationInstance” from the
    “Name” property drop-down, as shown in Figure [10-6](#497846_1_En_10_Chapter.xhtml#Fig6).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig6_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Selecting the log.InsertApplicationInstance stored procedure


    Next, click the “Import parameter” button to import the `@ApplicationName` and
    `@ApplicationRunId` String parameters from the log.InsertApplicationInstance stored
    procedure. Click inside the `@ApplicationName` parameter’s Value property textbox,
    and then click the “Add dynamic content [Alt + P]” link, as shown in Figure [10-7](#497846_1_En_10_Chapter.xhtml#Fig7).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig7_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Preparing to add dynamic content to the parameter value property


    When the “Add dynamic content” blade displays, expand the Parameters expression
    category, and click “ApplicationName” to set the parameter value ADF expression
    to `@pipeline.parameters.ApplicationName`, as shown in Figure [10-8](#497846_1_En_10_Chapter.xhtml#Fig8).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig8_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Setting the ApplicationName parameter value expression


    Click the Finish button to proceed.


    Click inside the `@ApplicationRunId` parameter’s Value property textbox, and then
    click the “Add dynamic content [Alt + P]” link. When the “Add dynamic content”
    blade displays, expand the “System variables” expression category, and click “Pipeline
    run ID” to set the parameter value ADF expression to `@pipeline().RunId`, as shown
    in Figure [10-9](#497846_1_En_10_Chapter.xhtml#Fig9).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig9_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Setting the ApplicationRunId parameter value expression


    Leave the “Query timeout (minutes)” property set to its default (120 minutes),
    the “Isolation level” property set to “None” (default), and the “First row only”
    property checked (default), as shown in Figure [10-10](#497846_1_En_10_Chapter.xhtml#Fig10).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig10_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Leaving default values for Query timeout, Isolation level, and First row only
    properties


    The Log Application Instance Start lookup activity is now configured to call the
    log.InsertApplicationInstance stored procedure, passing the stored procedure the
    pipeline’s `ApplicationName` and `ApplicationRunId` parameter values and returning
    the `ApplicationInstanceId` value.


    ### Adding the Log.UpdateApplicationInstanceStatus Stored Procedure


    As configured, the parent pipeline fails execution because the ReportAndFail.dtsx
    SSIS package fails (by design). The log.ApplicationInstance row should be updated
    to reflect the SSIS framework application instance failed.


    Begin by adding a new stored procedure named “log.UpdateApplicationInstanceStatus”
    to the SSISConfig database, as shown in Listing [10-3](#497846_1_En_10_Chapter.xhtml#PC3).


    ```

    print ''log.UpdateApplicationInstanceStatus stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

    Where s.[name] = N''log''

    And p.[name] = N''UpdateApplicationInstanceStatus'')

    begin

    print '' - Dropping log.UpdateApplicationInstanceStatus stored procedure''

    Drop Procedure log.UpdateApplicationInstanceStatus

    print '' - Log.UpdateApplicationInstanceStatus stored procedure dropped''

    end

    print '' - Creating log.UpdateApplicationInstanceStatus stored procedure''

    go

    Create Procedure log.UpdateApplicationInstanceStatus

    @ApplicationInstanceId int

    , @ApplicationStatus nvarchar(55) = ''Succeeded''

    As

    Update [log].ApplicationInstance

    Set ApplicationEndTime = sysdatetimeoffset()

    , ApplicationStatus = @ApplicationStatus

    Where ApplicationInstanceId = @ApplicationInstanceId

    go

    print '' - Log.UpdateApplicationInstanceStatus stored procedure created''

    go

    Listing 10-3

    Idempotent T-SQL to create the log.UpdateApplicationInstanceStatus stored procedure

    ```


    If all goes as planned, Azure Data Studio messages should appear similar to Figure
    [10-11](#497846_1_En_10_Chapter.xhtml#Fig11).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig11_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Azure Data Studio messages reflecting successful creation of the log.UpdateApplicationInstanceStatus
    stored procedure


    The next step is to add a Stored Procedure Activity that calls the log.UpdateApplicationInstanceStatus
    stored procedure on failure.'
