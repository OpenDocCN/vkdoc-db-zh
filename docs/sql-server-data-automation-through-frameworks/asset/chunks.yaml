- fmt: '# Provisioning an Azure-SSIS Integration Runtime for SSIS Package Files


    On 30 June 2019, Microsoft released a new version of the ADF Azure-SSIS integration
    runtime. Enterprises could execute SSIS packages in the cloud previously using
    an SSIS Catalog hosted by an Azure database; the new release allowed SSIS package
    execution from an Azure file share.


    ## Getting Started


    To begin creating an Azure-SSIS integration runtime, navigate to an instance of
    Azure Data Factory’s Manage page, and click “Integration runtimes” in the Connections
    category, as shown in Figure [8-24](#497846_1_En_8_Chapter.xhtml#Fig24).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig24_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig24_HTML.jpg)


    Figure 8-24: Opening ADF Connections


    When the Connections page displays, click the “Integration runtimes” tab as shown
    in Figure [8-25](#497846_1_En_8_Chapter.xhtml#Fig25).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig25_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig25_HTML.jpg)


    Figure 8-25: ADF Connections “Integration runtimes” tab


    Click the “New” button – circled in Figure [8-25](#497846_1_En_8_Chapter.xhtml#Fig25)
    – to open the “Integration runtime setup” blade and select the “Azure-SSIS” option
    as shown in Figure [8-26](#497846_1_En_8_Chapter.xhtml#Fig26).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig26_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig26_HTML.jpg)


    Figure 8-26: Selecting Azure-SSIS in the Integration runtime setup blade


    The other option displayed in Figure [8-26](#497846_1_En_8_Chapter.xhtml#Fig26)
    is “Azure, Self-Hosted.” You may learn more about *all* Azure Data Factory integration
    runtimes by visiting `docs.microsoft.com/en-us/azure/data-factory/concepts-integration-runtime#self-hosted-integration-runtime`.
    For the purposes of this example, we will configure a “stand-alone” Azure-SSIS
    Integration Runtime – or IR – an IR that requires minimal security configuration.
    More information is available about joining an Azure-SSIS IR to a virtual network
    at `docs.microsoft.com/en-us/azure/data-factory/join-azure-ssis-integration-runtime-virtual-network`.


    ## Configuring General Settings


    Click the Continue button to open the General settings page on the Integration
    runtime setup blade. Configure the name and optional description of the Azure-SSIS
    IR, and then set the Location property. For this example, set the Location property
    to the same location as the Azure Data Factory (which is the default), as shown
    in Figure [8-27](#497846_1_En_8_Chapter.xhtml#Fig27).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig27_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig27_HTML.jpg)


    Figure 8-27: Configuring Name, Description, and Location properties


    ### Node Configuration


    The next two steps configure virtual machines (VMs) upon which Azure-SSIS will
    execute SSIS packages. “Node size” represents the configuration of *each node*
    configured, and there are some beefy options, such as those listed in Figure [8-28](#497846_1_En_8_Chapter.xhtml#Fig28).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig28_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig28_HTML.jpg)


    Figure 8-28: Some Node size options for Azure-SSIS


    The first letter of the VM series indicates the general class and purpose of the
    virtual machine. A-Series VMs are specifically designed to save money during the
    testing and development phases of a project. To learn more about Azure virtual
    machine series and costs, please visit `azure.microsoft.com/en-us/pricing/details/virtual-machines/series/`.


    Select the “A8_v2 (8 Core(s), 16384 MB)” Node size from the drop-down, as shown
    in Figure [8-29](#497846_1_En_8_Chapter.xhtml#Fig29).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig29_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig29_HTML.jpg)


    Figure 8-29: Selecting a Node size for Azure-SSIS


    The “Node number” slider indicates the number of virtual machines available to
    Azure-SSIS. Each node will be configured according to the Node size selected in
    the previous drop-down. Node number is the number of nodes, configured in the
    Node size property, available to the Azure-SSIS IR. For this example, leave the
    Node number property set at 2 (the default), as shown in Figure [8-30](#497846_1_En_8_Chapter.xhtml#Fig30).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig30_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig30_HTML.jpg)


    Figure 8-30: Configuring the “Node number” property to 2


    ## Licensing and Cost Management


    The next step is to configure the “Edition/license” property. Select “Standard”
    for now, as shown in Figure [8-31](#497846_1_En_8_Chapter.xhtml#Fig31).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig31_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig31_HTML.jpg)


    Figure 8-31: Setting the Edition/license property


    A feature known as Bring Your Own License, or “BYOL,” is another way to reduce
    spending in Azure. If you or your enterprise already own a SQL Server license,
    click “Yes” to reduce the cost of running the VMs behind Azure-SSIS, as shown
    in Figure [8-32](#497846_1_En_8_Chapter.xhtml#Fig32).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig32_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig32_HTML.jpg)


    Figure 8-32: Reduce Azure costs with BYOL


    Note changing the Edition/license property does *not* impact the Azure-SSIS cost,
    as shown in Figure [8-33](#497846_1_En_8_Chapter.xhtml#Fig33).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig33_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig33_HTML.jpg)


    Figure 8-33: Selecting Enterprise Edition does not impact Azure-SSIS cost


    Read `azure.microsoft.com/en-us/pricing/details/data-factory/ssis/` to learn more
    about Azure-SSIS costs. You may also wish to try different variations to manage
    performance and costs, such as the “D2_v3 (2 Core(s), 8192 MB)” Enterprise configuration
    shown in Figure [8-34](#497846_1_En_8_Chapter.xhtml#Fig34).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig34_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig34_HTML.jpg)


    Figure 8-34: Testing other combinations of Node size


    $0.58 is around 31 percent of $1.89.


    *Please* visit `azure.microsoft.com/en-us/pricing/details/data-factory/ssis/`
    to learn more about the cost of Azure-SSIS instances. One way to manage Azure-SSIS
    costs is to schedule an Azure Data Factory pipeline to shut down each Azure-SSIS
    instance nightly, in case you forget or are called away while learning. `andyleonard.blog/2020/05/stop-an-azure-ssis-files-integration-runtime-safely/`
    is one detailed blog post about how to stop an Azure-SSIS IR.


    **The author and/or publisher is not responsible for any costs incurred.**


    ## Configuring Deployment Settings


    Once General settings are configured, click the Continue button to open the “Deployment
    settings” page in the Integration runtime setup blade, as shown in Figure [8-35](#497846_1_En_8_Chapter.xhtml#Fig35).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig35_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig35_HTML.jpg)


    Figure 8-35: The “Deployment settings” page in the Integration runtime setup blade


    I can hear you thinking, “Gosh, Andy! That’s a lot of stuff to configure. Plus,
    you wrote *nothing* about creating an Azure database. What gives?” Simmer down.
    We are creating an instance of Azure-SSIS for *files*, remember? Uncheck the “Create
    SSIS catalog (SSISDB) hosted by Azure SQL Database server/Managed Instance to
    store your projects/packages/environments/execution logs” checkbox – circled in
    Figure [8-35](#497846_1_En_8_Chapter.xhtml#Fig35). The “Deployment settings” page
    in the Integration runtime setup blade now appears similar to that shown in Figure
    [8-36](#497846_1_En_8_Chapter.xhtml#Fig36).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig36_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig36_HTML.jpg)


    Figure 8-36'
  raw: '## Provisioning an Azure-SSIS Integration Runtime for SSIS Package Files


    On 30 June 2019, Microsoft released a new version of the ADF Azure-SSIS integration
    runtime. Enterprises could execute SSIS packages in the cloud previously using
    an SSIS Catalog hosted by an Azure database; the new release allowed SSIS package
    execution from an Azure file share.


    To begin creating an Azure-SSIS integration runtime, navigate to an instance of
    Azure Data Factory’s Manage page, and click “Integration runtimes” in the Connections
    category, as shown in Figure [8-24](#497846_1_En_8_Chapter.xhtml#Fig24).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig24_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig24_HTML.jpg)


    Figure 8-24


    Opening ADF Connections


    When the Connections page displays, click the “Integration runtimes” tab as shown
    in Figure [8-25](#497846_1_En_8_Chapter.xhtml#Fig25).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig25_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig25_HTML.jpg)


    Figure 8-25


    ADF Connections “Integration runtimes” tab


    Click the “New” button – circled in Figure [8-25](#497846_1_En_8_Chapter.xhtml#Fig25) –
    to open the “Integration runtime setup” blade and select the “Azure-SSIS” option
    as shown in Figure [8-26](#497846_1_En_8_Chapter.xhtml#Fig26).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig26_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig26_HTML.jpg)


    Figure 8-26


    Selecting Azure-SSIS in the Integration runtime setup blade


    The other option displayed in Figure [8-26](#497846_1_En_8_Chapter.xhtml#Fig26)
    is “Azure, Self-Hosted.” You may learn more about *all* Azure Data Factory integration
    runtimes by visiting docs.microsoft.com/en-us/azure/data-factory/concepts-integration-runtime#self-hosted-integration-runtime.
    For the purposes of this example, we will configure a “stand-alone” Azure-SSIS
    Integration Runtime – or IR – an IR that requires minimal security configuration.
    More information is available about joining an Azure-SSIS IR to a virtual network
    at docs.microsoft.com/en-us/azure/data-factory/join-azure-ssis-integration-runtime-virtual-network.


    Click the Continue button to open the General settings page on the Integration
    runtime setup blade. Configure the name and optional description of the Azure-SSIS
    IR, and then set the Location property. For this example, set the Location property
    to the same location as the Azure Data Factory (which is the default), as shown
    in Figure [8-27](#497846_1_En_8_Chapter.xhtml#Fig27).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig27_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig27_HTML.jpg)


    Figure 8-27


    Configuring Name, Description, and Location properties


    The next two steps configure virtual machines (VMs) upon which Azure-SSIS will
    execute SSIS packages. “Node size” represents the configuration of *each node*
    configured, and there are some beefy options, such as those listed in Figure [8-28](#497846_1_En_8_Chapter.xhtml#Fig28).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig28_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig28_HTML.jpg)


    Figure 8-28


    Some Node size options for Azure-SSIS


    The first letter of the VM series indicates the general class and purpose of the
    virtual machine. A-Series VMs are specifically designed to save money during the
    testing and development phases of a project. To learn more about Azure virtual
    machine series and costs, please visit azure.microsoft.com/en-us/pricing/details/virtual-machines/series/.


    Select the “A8_v2 (8 Core(s), 16384 MB)” Node size from the drop-down, as shown
    in Figure [8-29](#497846_1_En_8_Chapter.xhtml#Fig29).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig29_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig29_HTML.jpg)


    Figure 8-29


    Selecting a Node size for Azure-SSIS


    The “Node number” slider indicates the number of virtual machines available to
    Azure-SSIS. Each node will be configured according to the Node size selected in
    the previous drop-down. Node number is the number of nodes, configured in the
    Node size property, available to the Azure-SSIS IR. For this example, leave the
    Node number property set at 2 (the default), as shown in Figure [8-30](#497846_1_En_8_Chapter.xhtml#Fig30).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig30_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig30_HTML.jpg)


    Figure 8-30


    Configuring the “Node number” property to 2


    The next step is to configure the “Edition/license” property. Select “Standard”
    for now, as shown in Figure [8-31](#497846_1_En_8_Chapter.xhtml#Fig31).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig31_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig31_HTML.jpg)


    Figure 8-31


    Setting the Edition/license property


    A feature known as Bring Your Own License, or “BYOL,” is another way to reduce
    spending n Azure. If you or your enterprise already own a SQL Server license,
    click the “Yes” to reduce the cost of running the VMs behind Azure-SSIS, as shown
    in Figure [8-32](#497846_1_En_8_Chapter.xhtml#Fig32).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig32_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig32_HTML.jpg)


    Figure 8-32


    Reduce Azure costs with BYOL


    Note changing the Edition/license property does *not* impact the Azure-SSIS cost,
    as shown in Figure [8-33](#497846_1_En_8_Chapter.xhtml#Fig33).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig33_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig33_HTML.jpg)


    Figure 8-33


    Select Enterprise Edition does not impact Azure-SSIS cost


    Read azure.microsoft.com/en-us/pricing/details/data-factory/ssis/ to learn more
    about Azure-SSIS costs. You may also wish to try different variations to manage
    performance and costs, such as the “D2_v3 (2 Core(s), 8192 MB)” Enterprise configuration
    shown in Figure [8-34](#497846_1_En_8_Chapter.xhtml#Fig34).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig34_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig34_HTML.jpg)


    Figure 8-34


    Testing other combinations of Node size


    $0.58 is around 31 percent of $1.89.


    *Please* visit azure.microsoft.com/en-us/pricing/details/data-factory/ssis/ to
    learn more about the cost of Azure-SSIS instances. One way to manage Azure-SSIS
    costs is to schedule an Azure Data Factory pipeline to shut down each Azure-SSIS
    instance nightly, in case you forget or are called away while learning. andyleonard.blog/2020/05/stop-an-azure-ssis-files-integration-runtime-safely/
    is one detailed blog post about how to stop an Azure-SSIS IR.


    **The author and/or publisher is  not responsible for any costs incurred.**


    Once General settings are configured, click the Continue button to open the “Deployment
    settings” page in the Integration runtime setup blade, as shown in Figure [8-35](#497846_1_En_8_Chapter.xhtml#Fig35).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig35_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig35_HTML.jpg)


    Figure 8-35


    The “Deployment settings” page in the Integration runtime setup blade


    I can hear you thinking, “Gosh, Andy! That’s a lot of stuff to configure. Plus,
    you wrote *nothing* about creating an Azure database. What gives?” Simmer down.
    We are creating an instance of Azure-SSIS for *files*, remember? Uncheck the “Create
    SSIS catalog (SSISDB) hosted by Azure SQL Database server/Managed Instance to
    store your projects/packages/environments/execution logs” checkbox – circled in
    Figure [8-35](#497846_1_En_8_Chapter.xhtml#Fig35). The “Deployment settings” page
    in the Integration runtime setup blade now appears similar to that shown in Figure
    [8-36](#497846_1_En_8_Chapter.xhtml#Fig36).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig36_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig36_HTML.jpg)


