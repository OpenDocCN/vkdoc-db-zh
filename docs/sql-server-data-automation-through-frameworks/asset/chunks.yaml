    单击 Azure-SSIS IR 的名称——在本例中为 `Azure-SSIS-Files`——以打开详细信息仪表板，如图 8-46 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig46_HTML.jpg](img/497846_1_En_8_Fig46_HTML.jpg)


