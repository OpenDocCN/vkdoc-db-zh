    ### 检查逻辑


    让我们在此稍作停顿，梳理一下目前的逻辑。应用程序包执行有两种可能的结果：要么成功，要么失败。


    如果应用程序包执行成功，则会执行“记录应用程序包实例成功”存储过程活动，并为当前的`ApplicationPackageInstanceID`更新`log.ApplicationPackageInstance`表中的`ApplicationPackageStatus`值为"Succeeded"（成功）。


    成功路径——即第一个用例——已经实现。容错逻辑仅在应用程序包执行失败时才需要。


    如果应用程序包执行失败，“若包失败则应用程序失败”条件活动将对子包管道的`FailApplicationOnPackageFailure`参数的值进行求值（通过表达式转换为布尔值）。


    当应用程序包执行失败**且**`FailApplicationOnPackageFailure`为 false（假）时，发生第二个用例。在这种情况下，我们需要：

    *   记录应用程序包执行的状态（失败及信息）

    *   **继续**执行 SSIS 框架应用程序的应用程序包


    当应用程序包执行失败**且**`FailApplicationOnPackageFailure`为 true（真）时，发生第三个用例。在这种情况下，我们需要：

    *   记录应用程序包执行的状态（失败及信息）

    *   记录应用程序执行的状态（失败）

    *   **停止**应用程序包的执行


    ### 实现容错逻辑


    要开始实现容错逻辑，请点击“若包失败则应用程序失败”条件活动的 False（假）活动编辑器，如图 11-10 所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig10_HTML.jpg`](img/497846_1_En_11_Fig10_HTML.jpg)


    图 11-10

    打开“若包失败则应用程序失败”条件活动的 False 活动编辑器


    将一个存储过程活动拖放到画布上，并将新的存储过程活动重命名为“记录应用程序包实例失败 0”，如图 11-11 所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig11_HTML.jpg`](img/497846_1_En_11_Fig11_HTML.jpg)


    图 11-11

    添加“记录应用程序包实例失败 0”存储过程活动


    点击“设置”选项卡，并将“链接服务”属性设置为`ssisFrameworkLinkedService`。从“存储过程名称”下拉列表中选择`log.UpdateApplicationPackageInstanceStatus`，如图
    11-12 所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig12_HTML.jpg`](img/497846_1_En_11_Fig12_HTML.jpg)


    图 11-12

    配置链接服务和存储过程名称


    点击“导入参数”按钮开始配置`log.UpdateApplicationPackageInstanceStatus`存储过程参数值。通过点击“添加动态内容[Alt
    + P]”链接并选择“记录应用程序包实例开始”活动来配置`ApplicationPackageInstanceId`存储过程参数，这将在表达式文本框中输入表达式`@activity(''Log
    Application Package Instance Start'').output`。将`".firstrow.ApplicationPackageInstanceId"`附加到表达式。在`ApplicationPackageStatus`值文本框中，输入`"Failed
    (FailAppOnPkgFail: 0)"`，如图 11-13 所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig13_HTML.jpg`](img/497846_1_En_11_Fig13_HTML.jpg)


    图 11-13

    配置`ApplicationPackageInstanceId`和`ApplicationPackageStatus`参数值


    一旦存储过程参数值设置完毕，“记录应用程序包实例失败 0”存储过程活动的配置即告完成。请注意，`ApplicationPackageStatus`包含了附加信息：`"(FailAppOnPkgFail:
    0)"`。“记录应用程序包实例失败 0”存储过程用于处理用例 2。


    `log.ApplicationPackageInstance`表中的`ApplicationPackageStatus`列当前配置为`nvarchar(25)`，不足以容纳文本`"Failed
    (FailAppOnPkgFail: 0)"`。请执行清单 11-1 中的 T-SQL 来扩展列的大小。


    ```sql

    Alter Table [log].[ApplicationPackageInstance]

    Alter Column ApplicationPackageStatus nvarchar(55) Not NULL

    ```

    清单 11-1

    扩展`ApplicationPackageStatus`列


    在讨论和添加支持用例 3 的代码之前，快速回顾一下 ForEach 活动的默认行为是个好主意。


    #### ForEach 活动的默认行为


    ForEach 活动的默认迭代行为是继续遍历已配置的集合，执行“内部活动”，直到集合中的所有项目都被遍历完毕。一个副作用是，“内部活动”中发生的错误**不会**停止迭代。无论执行结果如何，“内部活动”都会在集合被遍历时执行。


    **在**迭代完成后，迭代期间发生的任何失败都会导致 ForEach 活动失败。


    假设一个名为“ForEach Array Item”的 ForEach 活动包含一个“内部活动”，即一个名为“Wait”的等待活动（我知道这名字很有创意）。假设一个包含四个项目的数组变量被提供给
    ForEach 活动的 Items 属性。考虑以下 ForEach“内部活动”执行的场景，其中 Wait 活动的第二次迭代失败，按迭代编号如下：

    1.  Wait 执行成功。

    2.  Wait 执行失败。

    3.  Wait 执行成功。

    4.  Wait 执行成功。


    每次迭代都将执行，导致 Wait 活动执行四次。ForEach 活动将失败。调试输出将如图 11-14 所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig14_HTML.jpg`](img/497846_1_En_11_Fig14_HTML.jpg)


    图 11-14

    ForEach 活动执行的输出


    图 11-14 显示了 Wait 活动的四次执行。三次成功，一次失败。请注意，每个 Wait 活动都执行了，并且在第二次迭代中的 Wait 活动**失败后**，又执行了两次
    Wait 活动。另请注意，ForEach 活动失败了。

    '
- fmt: '### ForEach Activity Default Behavior, Applied


    Applied to the SSIS framework’s fault tolerance, the “ForEach Application Package”
    ForEach activity – whose “inner activities” are configured in the parent pipeline
    to execute the child pipeline – is already configured to continue executing the
    child package regardless of the outcome of the child package execution. The next
    step, therefore, is to add logic to *stop* application package execution when
    our use case calls for it – when the application package execution fails *and*
    `FailApplicationOnPackageFailure` is true (use case 3).


    To configure the “If Fail Application On Package Failure” if condition activity’s
    “True activities,” click the Edit icon (pencil) beside “True activities,” as shown
    in Figure [11-15](#497846_1_En_11_Chapter.xhtml#Fig15).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig15_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig15_HTML.jpg)

    *Figure 11-15: Preparing to configure the “True activities”*


    The order of operations for responding to a failed child package execution when
    the `FailApplicationOnPackageFailure` bit is configured to true (1, which is the
    default) is as follows:

    1.  Log application package instance failure

    2.  Log application instance cancelled

    3.  Set the command to cancel the parent pipeline

    4.  Execute the command to cancel the parent pipeline


    The first step for responding to a failed child package execution when the `FailApplicationOnPackageFailure`
    bit is configured to true (1) is as follows: log application package instance
    failure.


    To begin adding the functionality to log application package instance failure,
    add a Stored Procedure Activity to the “If Fail Application On Package Failure”
    if condition activity’s “True activities” canvas and rename the new Stored Procedure
    Activity “Log Application Package Instance Failed 1,” as shown in Figure [11-16](#497846_1_En_11_Chapter.xhtml#Fig16).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig16_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig16_HTML.jpg)

    *Figure 11-16: Adding the “Log Application Package Instance Failed 1” stored procedure
    activity*


    On the “Log Application Package Instance Failed 1” stored procedure activity’s
    Settings tab, click the “Linked service” property’s drop-down, and select “ssisFrameworkLinkedService”.
    In the “Stored procedure name” drop-down, select “[log].[UpdateApplicationPackageInstanceStatus],”
    as shown in Figure [11-17](#497846_1_En_11_Chapter.xhtml#Fig17).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig17_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig17_HTML.jpg)

    *Figure 11-17: Configuring “Log Application Package Instance Failed 1” stored
    procedure activity Settings*


    Click the Import parameter button. When the `ApplicationPackageInstanceId` and
    `ApplicationPackageStatus` parameters are displayed, configure the `ApplicationPackageInstanceId`
    by clicking inside the value textbox, and then clicking the “Add dynamic content
    [Alt + P]” link, and then entering the expression “`@activity(''Log Application
    Package Instance Start'').output.firstrow.ApplicationPackageInstanceId`”. In the
    `ApplicationPackageStatus` parameter value textbox, enter the text “Failed (FailAppOnPkgFail:
    1),” as shown in Figure [11-18](#497846_1_En_11_Chapter.xhtml#Fig18).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig18_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig18_HTML.jpg)

    *Figure 11-18: Configuring “Log Application Package Instance Failed 1” stored
    procedure activity Settings parameter values*


    The preceding completes the first step for responding to a failed child package
    execution when the `FailApplicationOnPackageFailure` bit is configured to true
    (1): log application package instance failure.


    The second step for responding to a failed child package execution when the `FailApplicationOnPackageFailure`
    bit is configured to true (1) is as follows: log application instance cancelled.


    To begin adding the functionality to log application instance cancelled, add a
    Stored Procedure Activity to the “If Fail Application On Package Failure” if condition
    activity’s “True activities” canvas, connect a Success output from the “Log Application
    Package Instance Failed 1” stored procedure activity and the new Stored Procedure
    Activity, and then rename the new Stored Procedure Activity “Log Application Instance
    Cancelled,” as shown in Figure [11-19](#497846_1_En_11_Chapter.xhtml#Fig19).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig19_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig19_HTML.jpg)

    *Figure 11-19: Adding the “Log Application Instance Cancelled” stored procedure
    activity*


    Connect a Success output from the “Log Application Package Instance Failed 1”
    stored procedure activity to the “Log Application Instance Cancelled” stored procedure
    activity. On the “Log Application Instance Cancelled” stored procedure activity’s
    Settings tab, click the “Linked service” property’s drop-down, and select “ssisFrameworkLinkedService”.
    In the “Stored procedure name” drop-down, select “[log].[UpdateApplicationIntanceStatus],”
    as shown in Figure [11-20](#497846_1_En_11_Chapter.xhtml#Fig20).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig20_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig20_HTML.jpg)

    *Figure 11-20: Configuring “Log Application Instance Cancelled” stored procedure
    activity Settings*


    Click the Import parameter button. When the `ApplicationInstanceId` and `ApplicationStatus`
    parameters are displayed, configure the `ApplicationInstanceId` by clicking inside
    the value textbox, and then clicking the “Add dynamic content [Alt + P]” link,
    and then entering the expression “`@pipeline().parameters.ApplicationInstanceId`”.
    In the `ApplicationStatus` parameter value textbox, enter the text “Cancelled,”
    as shown in Figure [11-21](#497846_1_En_11_Chapter.xhtml#Fig21).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig21_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig21_HTML.jpg)

    *Figure 11-21: Configuring “Log Application Instance Cancelled” stored procedure
    activity Settings parameter values*


    The preceding completes the second step for responding to a failed child package
    execution when the `FailApplicationOnPackageFailure` bit is configured to true
    (1): log application instance cancelled.


    Before we begin this portion of the procedure, navigate to the child pipeline
    settings, and click the Variables tab. Click the “+ New” button, and add a String
    variable named “StopParentPipelineRunIdString,” as shown in Figure [11-22](#497846_1_En_11_Chapter.xhtml#Fig22).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig22_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig22_HTML.jpg)

    *Figure 11-22: Adding the StopParentPipelineRunIdString variable to the child
    pipeline*


    To begin adding the functionality to build the cancel-pipeline run command, add
    a set variable activity to the “If Fail Application On Package Failure” if condition
    activity’s “True activities” canvas, connect a Success output from the “Log Application
    Instance Cancelled” stored procedure activity and the new set variable activity,
    and then rename the new set variable activity “Set Cancel Parent Pipeline Command,”
    as shown in Figure [11-23](#497846_1_En_11_Chapter.xhtml#Fig23).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig23_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig23_HTML.jpg)

    *Figure 11-23: Adding the “Set Cancel Parent Pipeline Command” set variable activity*'
