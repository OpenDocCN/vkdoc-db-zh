- fmt: '### 执行检索到的 SSIS 包


    在简单自定义 SSIS 框架的 SSIS 版本中，使用 `Foreach` 循环容器枚举 SSIS 包集合。在 Azure Data Factory 中，`ForEach`
    活动执行相同的功能。


    #### 添加并配置 ForEach 活动


    展开名为“Iteration & conditionals”的“活动”类别，并将一个 `ForEach` 活动拖到管道画布上。从“`Get Application
    Packages`”查找活动向 `ForEach` 活动连接一条“成功”管道，然后将该 `ForEach` 活动重命名为“`ForEach Application
    Package`”，如图 [9-42](#497846_1_En_9_Chapter.xhtml#Fig42) 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig42_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig42_HTML.jpg)


    图 9-42 添加 `ForEach` 活动


    在“设置”选项卡中，单击“项”属性文本框内部。此时会在“项”文本框下方显示“`Add dynamic content [Alt + P]`”链接，如图 [9-43](#497846_1_En_9_Chapter.xhtml#Fig43)
    所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig43_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig43_HTML.jpg)


    图 9-43 `ForEach Application Package` `ForEach` 活动的“设置”选项卡上的“`Add dynamic content
    [Alt + P]`”链接


    单击“`Add dynamic content [Alt + P]`”链接以打开“添加动态内容”窗格。在“活动输出”类别中，单击 `Get Application
    Packages`。表达式 `@activity(''Get Application Packages'').output` 会出现在“添加动态内容”文本框中。在表达式末尾追加“`.value`”，使
    Azure Data Factory 表达式变为 `@activity(''Get Application Packages'').output.value`，如图
    [9-44](#497846_1_En_9_Chapter.xhtml#Fig44) 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig44_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig44_HTML.jpg)


    图 9-44 为 `ForEach Application Packages` 活动设置项属性的动态值


    单击“完成”按钮以完成属性配置。`ForEach Application Packages` 的“项”属性现在应类似于图 [9-45](#497846_1_En_9_Chapter.xhtml#Fig45)。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig45_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig45_HTML.jpg)


    图 9-45 已配置的 `ForEach Application Packages` 项属性


    枚举器现已配置完成。下一步是为每个应用程序包配置父管道要执行的活动。


    #### 编辑 ForEach 活动的内容


    单击 `ForEach Application Package` 活动的“编辑”图标（铅笔），如图 [9-46](#497846_1_En_9_Chapter.xhtml#Fig46)
    所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig46_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig46_HTML.jpg)


    图 9-46 编辑 `ForEach Application Package` 活动的内容


    当显示 `父级 ➤ ForEach Application Package ➤ 活动` 页面时，从“活动” ➤ “常规管道活动”中拖放一个“执行 SSIS
    包”活动，然后将新的“执行 SSIS 包”活动重命名为“`Execute Application Package`”，如图 [9-47](#497846_1_En_9_Chapter.xhtml#Fig47)
    所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig47_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig47_HTML.jpg)


    图 9-47 添加并重命名“`Execute Application Package`”执行 SSIS 包活动


    #### 配置 Execute SSIS 包活动


    配置“`Execute Application Package`”执行 SSIS 活动的“设置”选项卡中的“Azure-SSIS IR”属性，从下拉列表中选择“`Azure-SSIS-Files`”集成运行时，如图
    [9-48](#497846_1_En_9_Chapter.xhtml#Fig48) 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig48_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig48_HTML.jpg)


    图 9-48 选择 `Azure-SSIS-Files` 集成运行时


    出于本示例的目的，请确保“Windows 身份验证”和“32 位运行时”属性复选框均未选中。单击“包路径”属性的文本框内部，然后单击“`Add dynamic
    content [Alt + P]`”链接以显示“添加动态内容”窗格，展开 `ForEach` 迭代器类别，单击 `ForEach Application
    Package Current Item` 选项，然后在动态内容文本框中的“`@item()`”后追加“`.PackagePath`”，如图 [9-49](#497846_1_En_9_Chapter.xhtml#Fig49)
    所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig49_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig49_HTML.jpg)


    图 9-49 在 `ForEach Application Package` 活动中配置 `PackagePath` 值


    单击“完成”按钮返回到“设置”选项卡，如图 [9-50](#497846_1_En_9_Chapter.xhtml#Fig50) 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig50_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig50_HTML.jpg)


    图 9-50 已配置的 `Execute Application Package` 的包路径属性


    出于本示例的目的，将“配置路径”属性留空，尽管它包含“示例”配置元数据。将“域”属性设置为“`Azure`”，并将“用户名”属性设置为 Azure 文件共享的名称——本例中为“`stframeworks`”，如图
    [9-51](#497846_1_En_9_Chapter.xhtml#Fig51) 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig51_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig51_HTML.jpg)


    图 9-51 配置执行 SSIS 包活动的配置路径、域和用户名属性


    下一步是配置“密码”属性，这也许是所有属性中最不直观的一个。执行 SSIS 包活动所需的值不是一个*密码*，而是一个用于访问 Azure 文件共享的*密钥*。要获取此值，请打开
    Microsoft Azure Storage Explorer 并连接到 Azure 文件共享。在资源管理器窗格中，右键单击 Azure 文件共享，然后单击“复制主密钥”，如图
    [9-52](#497846_1_En_9_Chapter.xhtml#Fig52) 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig52_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig52_HTML.jpg)


    图 9-52 复制 Azure 文件共享的主密钥以供访问


    Azure 文件共享主密钥就是密码属性所需的值。返回到 Azure Data Factory 门户，并将 Azure 文件共享主密钥粘贴到“密码”属性文本框中，如图
    [9-53](#497846_1_En_9_Chapter.xhtml#Fig53) 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig53_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig53_HTML.jpg)


    图 9-53 将 Azure 文件共享主密钥粘贴到执行 SSIS 包活动的密码属性中


    如果 SSIS 包的“包保护级别”属性设置为 `EncryptAllWithPassword` 或 `EncryptSensitiveWithPassword`，则必须将
    SSIS 包的“包密码”属性中的密码提供给执行 SSIS 包活动的“加密密码”属性（图 [9-54](#497846_1_En_9_Chapter.xhtml#Fig54)
    中的 #1）。由于我们的测试 SSIS 项目包使用默认保护级别 `EncryptSensitiveWithUserKey`，因此我们可以将“加密密码”属性留空。出于本示例的目的，接受默认的“日志记录级别”属性设置（基本
    - 图 [9-54](#497846_1_En_9_Chapter.xhtml#Fig54) 中的 #2），并将“日志记录路径”属性设置为 Azure 文件共享路径加上“`\logs`”（图
    [9-54](#497846_1_En_9_Chapter.xhtml#Fig54) 中的 #3）。通过选中“与包访问凭据相同”复选框（图 [9-54](#497846_1_En_9_Chapter.xhtml#Fig54)
    中的 #4）来设置“日志记录访问凭据”属性。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig54_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig54_HTML.jpg)


    图 9-54 为执行 SSIS 包活动配置加密密码、日志记录级别、日志记录路径和日志记录访问凭据属性'
  raw: '### Execute the Retrieved SSIS Packages


    In the SSIS version of the simple, custom SSIS framework, a Foreach Loop Container
    enumerates the collection of SSIS packages. In Azure Data Factory, a ForEach activity
    performs the same function.


    Expand the Activities category named “Iteration & conditionals,” and drag a ForEach
    activity onto the pipeline canvas. Connect a Success pipe from the “Get Application
    Packages” lookup activity to the ForEach activity, and then rename the ForEach
    activity to “ForEach Application Package,” as shown in Figure [9-42](#497846_1_En_9_Chapter.xhtml#Fig42).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig42_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig42_HTML.jpg)


    Figure 9-42


    Adding a ForEach activity


    On the Settings tab, click inside the Items property textbox. The “Add dynamic
    content [Alt + P]” link is displayed just below the Items textbox, as shown in
    Figure [9-43](#497846_1_En_9_Chapter.xhtml#Fig43).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig43_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig43_HTML.jpg)


    Figure 9-43


    The “Add dynamic content [Alt + P]” link on the “ForEach Application Package”
    ForEach activity’s Settings tab


    Click the “Add dynamic content [Alt + P]” link to open the “Add dynamic content”
    blade. In the “Activity outputs” category, click Get Application Packages. `@activity(''Get
    Application Packages'').output` appears in the Add dynamic content textbox. Append
    “`.value`” to the expression so that the Azure Data Factory expression reads `@activity(''Get
    Application Packages'').output.value`, as shown in Figure [9-44](#497846_1_En_9_Chapter.xhtml#Fig44).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig44_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig44_HTML.jpg)


    Figure 9-44


    Setting the items property dynamic value for the ForEach Application Packages
    activity


    Click the Finish button to complete the property configuration. The ForEach Application
    Packages Items property should now appear similar to Figure [9-45](#497846_1_En_9_Chapter.xhtml#Fig45).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig45_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig45_HTML.jpg)


    Figure 9-45


    The ForEach Application Packages Items property, configured


    The enumerator is now configured. The next step is to configure the activities
    we wish the parent pipeline to perform for each application package.


    Click ForEach Application Package’s activities Edit icon (the pencil), shown in
    Figure [9-46](#497846_1_En_9_Chapter.xhtml#Fig46).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig46_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig46_HTML.jpg)


    Figure 9-46


    Edit the ForEach Application Package’s activities


    When the parent ➤ ForEach Application Package ➤ Activities page displays, drag
    an “Execute SSIS package” activity from the Activities ➤ General pipeline activities,
    and then rename the new Execute SSIS package activity to “Execute Application
    Package,” as shown in Figure [9-47](#497846_1_En_9_Chapter.xhtml#Fig47).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig47_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig47_HTML.jpg)


    Figure 9-47


    Adding and renaming the “Execute Application Package” execute SSIS package activity


    Configure the “Execute Application Package” execute SSIS activity’s Settings tab
    Azure-SSIS IR property, selecting the “Azure-SSIS-Files” integration runtime from
    the drop-down, as shown in Figure [9-48](#497846_1_En_9_Chapter.xhtml#Fig48).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig48_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig48_HTML.jpg)


    Figure 9-48


    Selecting the Azure-SSIS-Files integration runtime


    For the purposes of this example, ensure the Windows authentication and 32-bit
    runtime property checkboxes are unchecked. Click inside the “Package path” property’s
    textbox, and then click the “Add dynamic content [Alt + P]” link to surface the
    Add dynamic content blade, expand the ForEach iterator category, click the ForEach
    Application Package Current Item option, and then append “`.PackagePath`” to “`@item()`”
    in the dynamic content textbox, as shown in Figure [9-49](#497846_1_En_9_Chapter.xhtml#Fig49).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig49_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig49_HTML.jpg)


    Figure 9-49


    Configuring the PackagePath value in ForEach Application Package activities


    Click the Finish button to return to the Settings tab, as shown in Figure [9-50](#497846_1_En_9_Chapter.xhtml#Fig50).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig50_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig50_HTML.jpg)


    Figure 9-50


    Execute Application Package’s Package path property, configured


    For the purposes of this example, leave the “Configuration path” property empty,
    although it contains “sample” configuration metadata, set the Domain property
    to “Azure,” and set the Username property to the name of the Azure File Share –
    “stframeworks” in this case, as shown in Figure [9-51](#497846_1_En_9_Chapter.xhtml#Fig51).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig51_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig51_HTML.jpg)


    Figure 9-51


    Configuring the Execute SSIS package Configuration path, Domain, and Username
    properties


    Configuring the Password property is the next step, and it is perhaps the most
    unintuitive property of all. The value required for the Execute SSIS package activity
    is not a *password,* it is a *key* for accessing the Azure file share. To obtain
    this value, open Microsoft Azure Storage Explorer and connect to the Azure file
    share. In the Explorer pane, right-click the Azure file share, and then click
    “Copy Primary Key,” as shown in Figure [9-52](#497846_1_En_9_Chapter.xhtml#Fig52).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig52_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig52_HTML.jpg)


    Figure 9-52


    Copying the Azure file share’s primary key for access


    The Azure file share primary key is the value required for the password property.
    Return to the Azure Data Factory portal, and paste the Azure file share primary
    key into the Password property textbox, as shown in Figure [9-53](#497846_1_En_9_Chapter.xhtml#Fig53).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig53_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig53_HTML.jpg)


    Figure 9-53


    Pasting the Azure file share primary key into the Execute SSIS package activity’s
    Password property


    If the SSIS package’s Package Protection Level property is set to `EncryptAllWithPassword`
    or `EncryptSensitiveWithPassword`, the password in the SSIS package’s Package
    Password property must be supplied to the Execute SSIS package activity’s “Encryption
    password” property (#1 in Figure [9-54](#497846_1_En_9_Chapter.xhtml#Fig54)).
    Since our test SSIS project packages use the default Protection Level, `EncryptSensitiveWithUserKey`,
    we may leave the Encryption password property empty. For the purposes of this
    example, accept the default “Logging level” property setting (Basic - #2 in Figure
    [9-54](#497846_1_En_9_Chapter.xhtml#Fig54)) and set the “Logging path” property
    to the Azure file share path plus “\logs” (#3 in Figure [9-54](#497846_1_En_9_Chapter.xhtml#Fig54)).
    Set the “Logging access credentials” property by checking the “Same as package
    access credentials” checkbox (#4 in Figure [9-54](#497846_1_En_9_Chapter.xhtml#Fig54)).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig54_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig54_HTML.jpg)


    Figure 9-54


    Configuring the Encryption password, Logging level, Logging path, and Logging
    access credentials properties for the Execute SSIS package activity'
