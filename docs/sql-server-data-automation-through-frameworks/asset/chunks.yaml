  raw: '### Logging Application Package Instance


    The ADF execution engine needs to execute a stored procedure, log.InsertApplicationPackageInstance,
    that returns a value named ApplicationPackageInstanceId. A Lookup activity is
    built for this!


    Return to the child ADF pipeline. Drag a new Lookup activity onto the surface
    and rename the new Lookup activity to “Log Application Package Instance Start,”
    as shown in Figure [10-38](#497846_1_En_10_Chapter.xhtml#Fig38).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig38_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig38_HTML.jpg)


    Figure 10-38


    Adding the Log Application Package Instance Start lookup activity


    Click the Log Application Instance Start lookup activity’s Settings tab to continue
    configuration. Click the “Source dataset” property drop-down, and select “ssisFrameworkDataSet,”
    and then set the Log Application Package Instance Start lookup activity’s “Use
    query” property option to “Stored procedure.” Select “log.InsertApplicationPackageInstance”
    from the “Name” property drop-down, as shown in Figure [10-39](#497846_1_En_10_Chapter.xhtml#Fig39).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig39_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig39_HTML.jpg)


    Figure 10-39


    Selecting the log.InsertApplicationPackageInstance stored procedure


    Next, click the “Import parameter” button to import the `@ApplicationInstanceId`,
    `@ApplicationPackageId`, and `@ApplicationPackageRunId` Int32 and String parameters
    from the log.InsertApplicationPackageInstance stored procedure. Click inside the
    `@ApplicationInstanceId` parameter’s Value property textbox, and then click the
    “Add dynamic content [Alt + P]” link, as shown in Figure [10-40](#497846_1_En_10_Chapter.xhtml#Fig40).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig40_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig40_HTML.jpg)


    Figure 10-40


    Preparing to add dynamic content to the parameter value property


    When the “Add dynamic content” blade displays, expand the Parameters expression
    category and click “ApplicationInstanceId” to set the parameter value ADF expression
    to `@pipeline.parameters.ApplicationInstanceId`, as shown in Figure [10-41](#497846_1_En_10_Chapter.xhtml#Fig41).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig41_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig41_HTML.jpg)


    Figure 10-41


    Setting the ApplicationInstanceId parameter value expression


    Click the Finish button to proceed.


    Repeat the preceding procedure to assign the `@ApplicationPackageId` stored procedure
    parameter to the child pipeline’s `ApplicationPackageId` parameter as shown in
    Figure [10-42](#497846_1_En_10_Chapter.xhtml#Fig42).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig42_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig42_HTML.jpg)


    Figure 10-42


    Setting the ApplicationPackageId parameter value expression


    Click inside the `@ApplicationPackageRunId` parameter’s Value property textbox,
    and then click the “Add dynamic content [Alt + P]” link. When the “Add dynamic
    content” blade displays, expand the “System variables” expression category, and
    click “Pipeline run ID” to set the parameter value ADF expression to `@pipeline().RunId`,
    as shown in Figure [10-43](#497846_1_En_10_Chapter.xhtml#Fig43).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig43_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig43_HTML.jpg)


    Figure 10-43


    Setting the ApplicationPackageRunId parameter value expression


    Leave the “Query timeout (minutes)” property set to its default (120 minutes),
    the “Isolation level” property set to “None” (default), and the “First row only”
    property checked (default).


    The Log Application Package Instance Start lookup activity is now configured to
    call the log.InsertApplicationPackageInstance stored procedure, passing the stored
    procedure the child pipeline’s `ApplicationInstanceId`, `ApplicationPackageId`,
    and `ApplicationPackageRunId` parameter values and returning the `ApplicationPackageInstanceId`
    value.


    Connect a Success output from the Log Application Package Instance Start lookup
    activity to the Execute Application Package execute SSIS activity.


    ### Adding the Log.UpdateApplicationPackageInstanceStatus Stored Procedure


    As configured, the child pipeline fails execution when called to execute the ReportAndFail.dtsx
    SSIS package because the ReportAndFail.dtsx SSIS package is designed to fail.
    The log.ApplicationPackageInstance row needs to be updated to reflect the SSIS
    framework application package instance failed.


    Begin by adding a new stored procedure named “log.UpdateApplicationPackageInstanceStatus”
    to the SSISConfig database, as shown in Listing [10-8](#497846_1_En_10_Chapter.xhtml#PC8).


    ```

    print ''log.UpdateApplicationPackageInstanceStatus stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

    Where s.[name] = N''log''

    And p.[name] = N''UpdateApplicationPackageInstanceStatus'')

    begin

    print '' - Dropping log.UpdateApplicationPackageInstanceStatus stored  procedure''

    Drop Procedure log.UpdateApplicationPackageInstanceStatus

    print '' - Log.UpdateApplicationPackageInstanceStatus stored procedure dropped''

    end

    print '' - Creating log.UpdateApplicationPackageInstanceStatus stored procedure''

    go

    Create Procedure log.UpdateApplicationPackageInstanceStatus

    @ApplicationPackageInstanceId int

    , @ApplicationPackageStatus nvarchar(55) = ''Succeeded''

    As

    Update [log].ApplicationPackageInstance

    Set ApplicationPackageEndTime = sysdatetimeoffset()

    , ApplicationPackageStatus = @ApplicationPackageStatus

    Where ApplicationPackageInstanceId = @ApplicationPackageInstanceId

    go

    print '' - Log.UpdateApplicationPackageInstanceStatus stored procedure created''

    go

    Listing 10-8

    Idempotent T-SQL to create the log.UpdateApplicationPackageInstanceStatus stored
    procedure

    ```


    If all goes as planned, Azure Data Studio messages should appear similar to Figure
    [10-44](#497846_1_En_10_Chapter.xhtml#Fig44).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig44_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig44_HTML.jpg)


    Figure 10-44


    Azure Data Studio messages reflecting successful creation of the log.UpdateApplicationPackageInstanceStatus
    stored procedure


    The next step is to add a Stored Procedure Activity that calls the log.UpdateApplicationPackageInstanceStatus
    stored procedure on failure.'
  trans: '

    ### 记录应用程序包实例


    ADF 执行引擎需要运行一个名为 `log.InsertApplicationPackageInstance` 的存储过程，该过程将返回一个名为 `ApplicationPackageInstanceId`
    的值。为此构建了一个查找活动！


    返回到子 ADF 管道。将一个新的查找活动拖到画布上，并将其重命名为“记录应用程序包实例开始”，如图 10-38 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig38_HTML.jpg](img/497846_1_En_10_Fig38_HTML.jpg)


    图 10-38


    添加“记录应用程序包实例开始”查找活动


    单击“记录应用程序实例开始”查找活动的“设置”选项卡以继续配置。单击“源数据集”属性下拉菜单，选择“ssisFrameworkDataSet”，然后将“记录应用程序包实例开始”查找活动的“使用查询”属性选项设置为“存储过程”。从“名称”属性下拉菜单中选择
    `log.InsertApplicationPackageInstance`，如图 10-39 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig39_HTML.jpg](img/497846_1_En_10_Fig39_HTML.jpg)


    图 10-39


    选择 log.InsertApplicationPackageInstance 存储过程


    接下来，单击“导入参数”按钮，从 `log.InsertApplicationPackageInstance` 存储过程导入 `@ApplicationInstanceId`、`@ApplicationPackageId`
    和 `@ApplicationPackageRunId`（Int32 和 String 类型）参数。单击 `@ApplicationInstanceId`
    参数的“值”属性文本框内部，然后单击“添加动态内容 [Alt + P]”链接，如图 10-40 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig40_HTML.jpg](img/497846_1_En_10_Fig40_HTML.jpg)


    图 10-40


    准备向参数值属性添加动态内容


    当“添加动态内容”面板显示时，展开“参数”表达式类别，然后单击“ApplicationInstanceId”，将参数值 ADF 表达式设置为 `@pipeline.parameters.ApplicationInstanceId`，如图
    10-41 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig41_HTML.jpg](img/497846_1_En_10_Fig41_HTML.jpg)


    图 10-41


    设置 ApplicationInstanceId 参数值表达式


    单击“完成”按钮继续。


    重复前述步骤，将 `@ApplicationPackageId` 存储过程参数分配给子管道的 `ApplicationPackageId` 参数，如图 10-42
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig42_HTML.jpg](img/497846_1_En_10_Fig42_HTML.jpg)


    图 10-42


    设置 ApplicationPackageId 参数值表达式


    单击 `@ApplicationPackageRunId` 参数的“值”属性文本框内部，然后单击“添加动态内容 [Alt + P]”链接。当“添加动态内容”面板显示时，展开“系统变量”表达式类别，然后单击“管道运行
    ID”，将参数值 ADF 表达式设置为 `@pipeline().RunId`，如图 10-43 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig43_HTML.jpg](img/497846_1_En_10_Fig43_HTML.jpg)


    图 10-43


    设置 ApplicationPackageRunId 参数值表达式


    将“查询超时（分钟）”属性保留为其默认值（120 分钟），“隔离级别”属性设置为“无”（默认值），并保持“仅限第一行”属性为选中状态（默认值）。


    至此，“记录应用程序包实例开始”查找活动已配置为调用 `log.InsertApplicationPackageInstance` 存储过程，向其传递子管道的
    `ApplicationInstanceId`、`ApplicationPackageId` 和 `ApplicationPackageRunId` 参数值，并返回
    `ApplicationPackageInstanceId` 值。


    将“记录应用程序包实例开始”查找活动的“成功”输出连接到“执行应用程序包”执行 SSIS 活动。


    ### 添加 log.UpdateApplicationPackageInstanceStatus 存储过程


    按照当前配置，当子管道被调用以执行 ReportAndFail.dtsx SSIS 包时，它将失败，因为 ReportAndFail.dtsx SSIS 包被设计为失败。需要更新
    `log.ApplicationPackageInstance` 行以反映 SSIS 框架应用程序包实例失败的状态。


    首先，向 SSISConfig 数据库添加一个名为 `log.UpdateApplicationPackageInstanceStatus` 的新存储过程，如代码清单
    10-8 所示。


    ```

    print ''log.UpdateApplicationPackageInstanceStatus stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

    Where s.[name] = N''log''

    And p.[name] = N''UpdateApplicationPackageInstanceStatus'')

    begin

    print '' - Dropping log.UpdateApplicationPackageInstanceStatus stored  procedure''

    Drop Procedure log.UpdateApplicationPackageInstanceStatus

    print '' - Log.UpdateApplicationPackageInstanceStatus stored procedure dropped''

    end

    print '' - Creating log.UpdateApplicationPackageInstanceStatus stored procedure''

    go

    Create Procedure log.UpdateApplicationPackageInstanceStatus

    @ApplicationPackageInstanceId int

    , @ApplicationPackageStatus nvarchar(55) = ''Succeeded''

    As

    Update [log].ApplicationPackageInstance

    Set ApplicationPackageEndTime = sysdatetimeoffset()

    , ApplicationPackageStatus = @ApplicationPackageStatus

    Where ApplicationPackageInstanceId = @ApplicationPackageInstanceId

    go

    print '' - Log.UpdateApplicationPackageInstanceStatus stored procedure created''

    go

    ```


    代码清单 10-8

    用于创建 log.UpdateApplicationPackageInstanceStatus 存储过程的幂等 T-SQL


    如果一切顺利，Azure Data Studio 的消息应该与图 10-44 相似。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig44_HTML.jpg](img/497846_1_En_10_Fig44_HTML.jpg)


    图 10-44


    反映 log.UpdateApplicationPackageInstanceStatus 存储过程成功创建的 Azure Data Studio 消息


    下一步是添加一个存储过程活动，用于在失败时调用 `log.UpdateApplicationPackageInstanceStatus` 存储过程。

    '
- fmt: '### Updating Application Package Instance


    The ADF execution engine needs to execute a stored procedure, `log.UpdateApplicationPackageInstanceStatus`,
    that accepts `ApplicationPackageInstanceId` and `ApplicationPackageStatus` values
    and then updates the status of the current Application Package Instance. A Stored
    Procedure Activity is perfect for this!


    Return to the child ADF pipeline. Drag a Stored Procedure Activity onto the surface.
    Add a Failure output from the Execute Application Package activity to the new
    Stored Procedure Activity. Rename the new Stored Procedure Activity to “Log Application
    Package Instance Failure,” as shown in Figure [10-45](#497846_1_En_10_Chapter.xhtml#Fig45).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig45_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig45_HTML.jpg)


    *Figure 10-45*

    Adding the “Log Application Package Instance Failure” stored procedure activity


    On the Settings tab, select `ssisFrameworkLinkedService` from the “Linked service”
    property drop-down, and then select `[log].[UpdateApplicationPackageInstanceStatus]`
    from the “Stored procedure name” drop-down. Click the “Import parameter” button
    to import parameters from the `log.UpdateApplicationPackageInstanceStatus` stored
    procedure. Click inside the value textbox for the `ApplicationPackageInstanceId`
    parameter, and then click the “Add dynamic content [Alt + P]” link. When the “Add
    dynamic content” blade displays, expand the “Activity outputs” expressions category,
    and click “Log Application Package Instance Start.” The dynamic content textbox
    will display `@activity(''Log Application Package Instance Start'').output`. Append
    `.firstrow.ApplicationPackageInstanceId` to the expression to map the value of
    the `ApplicationPackageInstanceId` returned from the execution of the “Log Application
    Package Instance Start” lookup activity into the `ApplicationPackageInstanceId`
    parameter’s value property, as shown in Figure [10-46](#497846_1_En_10_Chapter.xhtml#Fig46).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig46_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig46_HTML.jpg)


    *Figure 10-46*

    Mapping the “Log Application Package Instance Start” lookup activity into the
    ApplicationPackageInstanceId parameter’s value property


    Click the Finish button to proceed.


    Type “Failed” into the `ApplicationStatus` parameter’s value property, as shown
    in Figure [10-47](#497846_1_En_10_Chapter.xhtml#Fig47).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig47_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig47_HTML.jpg)


    *Figure 10-47*

    Setting the ApplicationPackageStatus property to Failed


    The child pipeline for the ADF version of the SSIS framework execution engine
    is now configured to execute an SSIS application package and record a failed application
    package instance.


    The next step is to test-execute the pipeline.


    ### Let’s Test It!


    Return to the parent pipeline to test the execution engine. Click the Debug item
    on the parent pipeline’s toolbar. The Output tab displays and, after some time,
    reveals the parent pipeline activities executed, as shown in Figure [10-48](#497846_1_En_10_Chapter.xhtml#Fig48).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig48_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig48_HTML.jpg)


    *Figure 10-48*

    Results of a text execution of the parent pipeline


    Execute the T-SQL query shown in Listing [10-9](#497846_1_En_10_Chapter.xhtml#PC9)
    to examine the Application Instance results.


    ```sql

    Select top 1

    a.ApplicationName

    , ai.ApplicationInstanceId

    , ai.ApplicationStatus

    From log.ApplicationInstance ai

    Join config.Applications a

    On a.ApplicationId = ai.ApplicationId

    Order By ApplicationInstanceId Desc


    declare @ApplicationInstanceId int = (Select top 1 ApplicationInstanceId

    From log.ApplicationInstance

    Order By ApplicationInstanceId DESC)


    Select p.PackageName

    , ai.ApplicationInstanceId

    , api.ApplicationPackageInstanceId

    , api.ApplicationPackageStatus

    , ap.FailApplicationOnPackageFailure

    From log.ApplicationPackageInstance api

    Join log.ApplicationInstance ai

    On ai.ApplicationInstanceId = api.ApplicationInstanceId

    Join config.ApplicationPackages ap

    On ap.ApplicationPackageId = api.ApplicationPackageId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where ai.ApplicationInstanceId = @ApplicationInstanceId

    Order By ApplicationPackageInstanceId

    ```

    *Listing 10-9*

    Application execution results


    The results should appear similar to Figure [10-49](#497846_1_En_10_Chapter.xhtml#Fig49):


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig49_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig49_HTML.jpg)


    *Figure 10-49*

    Application execution results


    While the results match what was expected, something is missing: there is currently
    no Stored Procedure Activity that updates the Application Package Instance on
    Success, which is why the results of the query in Listing [10-9](#497846_1_En_10_Chapter.xhtml#PC9),
    shown in Figure [10-49](#497846_1_En_10_Chapter.xhtml#Fig49), display the `ReportAndSucceed.dtsx`
    SSIS ApplicationPackageStatus as “Running.”


    ### Updating Application Package Instance on Success


    The child pipeline needs a way to log Application Package Instance success. Begin
    by clicking the Clone icon on the “Log Application Package Instance Failure” stored
    procedure activity as shown in Figure [10-50](#497846_1_En_10_Chapter.xhtml#Fig50).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig50_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig50_HTML.jpg)


    *Figure 10-50*

    Preparing to clone the “Log Application Package Instance Success” stored procedure
    activity from the “Log Application Package Instance Failure” stored procedure
    activity


    As with cloning the “Log Application Instance Failure” stored procedure activity
    earlier, cloning the “Log Application Package Instance Failure” stored procedure
    activity makes sense because the new Stored Procedure Activity will be calling
    the *same* stored procedure – `log.UpdateApplicationPackageInstanceStatus` – and
    *only one* parameter value configuration will change.


    Connect a Success output from the “Execute Application Package” execute SSIS package
    activity to the cloned Stored Procedure Activity, and then rename the cloned Stored
    Procedure Activity to “Log Application Package Instance Success,” as shown in
    Figure [10-51](#497846_1_En_10_Chapter.xhtml#Fig51).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig51_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig51_HTML.jpg)


    *Figure 10-51*

    Adding the “Log Application Package Instance Success” stored procedure activity


    Next, click the Settings tab for the “Log Application Package Instance Success”
    stored procedure activity. The only change required on the Settings tab is the
    value of the ApplicationPackageStatus parameter’s value property, which needs
    to be updated from “Failed” to “Succeeded,” as shown in Figure [10-52](#497846_1_En_10_Chapter.xhtml#Fig52).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig52_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig52_HTML.jpg)


    *Figure 10-52*

    Updating the ApplicationPackageStatus parameter value


    A fresh test execution confirms the parent pipeline logs SSIS framework application
    failures as designed, and re-executing the query in Listing [10-9](#497846_1_En_10_Chapter.xhtml#PC9)
    confirms – as shown in Figure [10-53](#497846_1_En_10_Chapter.xhtml#Fig53).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig53_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig53_HTML.jpg)


    *Figure 10-53*

    `ReportAndSucceed.dtsx` application package succeeds


    In our examples thus far, each application instance fails because a child package
    (named `ReportAndFail.dtsx`) fails each time it is executed. The next step is
    to add fault tolerance to the SSIS framework, ADF version, and that is the topic
    of the next chapter.'
