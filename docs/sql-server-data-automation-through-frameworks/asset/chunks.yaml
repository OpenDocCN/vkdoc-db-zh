    # 7. Framework Logging


    In our journey to build a simple, custom, file-based SSIS framework, we have built
    a metadata database (named SSISDB), a test SSIS project, loaded some sample metadata
    (for the test SSIS project), created the execution engine (Parent.dtsx), and added
    instrumentation.


    This chapter covers persisting instrumentation messages that are generated in
    the execution engine to the SSISConfig database.


    ## Create a Log Schema


    The information messages raised by the execution Parent.dtsx and displayed on
    the Progress/Execution Results tab are helpful, especially for troubleshooting.
    How may we store these messages for future access – especially when “something
    bad” has happened?


    Return to your favorite T-SQL development editor (I am switching to Azure Data
    Studio version 1.17.1 for the remainder of this chapter), and connect to the SQL
    Server instance that hosts the SSISConfig database. Create a new schema named
    “log” in the SSISConfig database using the T-SQL in Listing [7-1](#497846_1_En_7_Chapter.xhtml#PC1).


    ```sql

    Use [SSISConfig]

    go

    print ''Log schema''

    If Not Exists(Select [schemas].[name]

    From [sys].[schemas]

    Where [schemas].[name] = N''log'')

    begin

    print '' - Create log schema''

    declare @sql nvarchar(100) = N''Create Schema log''

    exec(@sql)

    print '' - Log schema created''

    end

    Else

    begin

    print '' - Log schema already exists.''

    end

    print ''''

    go

    ```

    Listing 7-1

    Create the SSISConfig.log schema


    Messages appear a little different in Azure Data Studio, as shown in Figure [7-1](#497846_1_En_7_Chapter.xhtml#Fig1).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig1_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig1_HTML.jpg)

    Figure 7-1

    Viewing messages from creating a log schema


    Messages we would expect in SQL Server Management Studio (SSMS) are highlighted
    in the “box” in Figure [7-1](#497846_1_En_7_Chapter.xhtml#Fig1).


    Before adding a table to capture “instances of application package execution”
    in the log schema, add a table to capture “instances of application execution”
    in the log schema. The first new table is named log.ApplicationInstance, and the
    T-SQL code to build this table is found in Listing [7-2](#497846_1_En_7_Chapter.xhtml#PC2).


    ```sql

    use [SSISConfig]

    go

    print ''Log.ApplicationInstance table''

    If Not Exists(Select [schemas].[name]

    + ''.'' + [tables].[name] As [Schema.Table]

    From [sys].[tables]

    Join [sys].[schemas]

    On [schemas].[schema_id] = [tables].[schema_id]

    Where [schemas].[name] = N''log''

    And [tables].[name] = N''ApplicationInstance'')

    begin

    print '' - Create log.ApplicationInstance table''

    Create Table [log].[ApplicationInstance]

    (

    ApplicationInstanceId int identity(1, 1)

    Constraint PK_log_ApplicationInstance Primary Key Clustered

    , ApplicationId int Not NULL

    Constraint FK_log_ApplicationInstance_config_Applications

    Foreign Key References [config].[Applications](ApplicationId)

    , ApplicationStartTime datetimeoffset(7) Not NULL

    Constraint DF_log_ApplicationInstance_ApplicationStartTime

    Default(sysdatetimeoffset())

    , ApplicationEndTime datetimeoffset(7) NULL

    , ApplicationStatus nvarchar(25) Not NULL

    Constraint DF_log_ApplicationInstance_ApplicationStatus

    Default(N''Running'')

    )

    print '' - Log.ApplicationInstance table created''

    end

    Else

    begin

    print '' - Log.ApplicationInstance table already exists.''

    end

    print ''''

    go

    ```

    Listing 7-2

    Create the log.ApplicationInstance table in the SSISConfig database


    When the T-SQL in Listing [7-2](#497846_1_En_7_Chapter.xhtml#PC2) is executed
    in Azure Data Factory, the messages shown in Figure [7-2](#497846_1_En_7_Chapter.xhtml#Fig2)
    are displayed.


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig2_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig2_HTML.jpg)

    Figure 7-2

    Log.ApplicationInstance table creation messages


    A new record will be inserted into the log.ApplicationInstance table when an SSIS
    framework application starts executing in the Parent.dtsx package. When the SSIS
    framework application completes executing, the record will be updated. But wait,
    there’s more!


    The second new table is named log.ApplicationPackageInstance, and the T-SQL code
    to build this table is found in Listing [7-3](#497846_1_En_7_Chapter.xhtml#PC3).'
