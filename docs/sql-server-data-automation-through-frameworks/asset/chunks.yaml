    ### The Daily Process


    [Listing 1-2](#497846_1_En_1_Chapter.xhtml#PC2) shows the code to create two stored
    procedures that will make up our demonstration Daily Process. We are providing
    two procedures in our example because it’s common to have more than one, and having
    two allows us to show how to make the execution of subsequent procedures depend
    upon the success of earlier ones – because the need to execute a series of procedures
    and halt or take other actions when an error occurs is the real-life scenario
    that most of us face.


    These procedures (as well as all others that we will be using) can be compiled
    and executed for your own testing. You will notice that there is some code commented
    out (lines that are preceded with `--`) in each procedure that can be invoked
    (remove the `--`, then recompile) to create an error condition. This ability to
    create an error condition allows testing for successful and unsuccessful completions
    that will become more important as we progress through demonstration iterations
    in later chapters.


    For the sake of this exercise, we will declare a business rule for the Daily Process
    stating that `FWDemo.DailyProcess1` must complete successfully before `FWDemo.DailyProcess2`
    can be executed. `FWDemo.DailyProcess2` must then complete successfully before
    the Daily Process can be deemed successfully executed.


    ```sql

