  trans: "\n父管道现已完成最小化配置，足以让我们点击“调试”菜单项并执行测试运行（请确保 `Azure-SSIS-Files` 集成运行时已预先启动！）。根据设计（在此阶段），管道调试运行应当会失败，如图\
    \ 9-55 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig55_HTML.jpg](img/497846_1_En_9_Fig55_HTML.jpg)\n\
    **图 9-55**\n父管道的测试运行失败\n\n测试运行失败了，但原因是什么？\n\n在图 9-55 中，首次执行的 `执行应用程序包` 执行 SSIS\
    \ 活动失败了，但第二次执行的 `执行应用程序包` 执行 SSIS 活动却成功了。您可能看到*两次*执行都失败。最可能的原因是 `Azure-SSIS-Files`\
    \ 集成运行时未运行。\n\n下一步是查看在 Azure 文件共享的 logs 文件夹中生成的日志文件。\n\n### 查看测试运行日志\n\n返回存储资源管理器，日志文件夹很可能*未*显示。从“更多”下拉菜单项刷新\
    \ Azure 文件共享。点击“刷新”，如图 9-56 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig56_HTML.jpg](img/497846_1_En_9_Fig56_HTML.jpg)\n\
    **图 9-56**\n点击“更多”➤“刷新”以查看日志文件夹\n\n日志文件夹（如图 9-57 所示）应当是在测试运行发生时创建的（如果日志文件夹事先不存在的话）。\n\
    \n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig57_HTML.jpg](img/497846_1_En_9_Fig57_HTML.jpg)\n\
    **图 9-57**\n已显示的日志文件夹\n\n双击日志文件夹查看内容。每次 SSIS 包执行都会生成一个运行 ID，该 ID 在 ADF 管道的“输出”选项卡中可见，如图\
    \ 9-58 所示，同时在存储资源管理器中有对应的日志\\文件夹名称。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig58_HTML.jpg](img/497846_1_En_9_Fig58_HTML.jpg)\n\
    **图 9-58**\n管道运行的“输出”选项卡与存储资源管理器的日志文件夹内容对齐\n\n`执行应用程序包` 执行了两次，一次运行名为 `ReportAndSucceed.dtsx`\
    \ 的 SSIS 包，另一次运行名为 `ReportAndFail.dtsx` 的 SSIS 包。图 9-55 显示了最顶部的 `执行应用程序包` 实例成功，而下一个\
    \ `执行应用程序包` 实例失败。\n\n图 9-58 是父管道“输出”选项卡与 Azure 文件共享中日志文件夹内容*对齐*的截图。请注意管道的输出运行\
    \ ID 值与日志子文件夹的名称相似。在存储资源管理器中进入最顶部的日志子文件夹，会显示一组日志文件，如图 9-59 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig59_HTML.jpg](img/497846_1_En_9_Fig59_HTML.jpg)\n\
    **图 9-59**\n存储在 Azure 文件共享 `fs-ssis\\logs` 文件夹中的日志文件\n\n右键点击以 “event_messages_”\
    \ 开头的文件，然后点击“打开”，如图 9-60 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig60_HTML.jpg](img/497846_1_En_9_Fig60_HTML.jpg)\n\
    **图 9-60**\n打开 event_messages 日志\n\n由于我的服务器配置为使用记事本打开扩展名为 “.log” 的文件，因此 event_messages\
    \ 文件在记事本中打开，如图 9-61 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig61_HTML.jpg](img/497846_1_En_9_Fig61_HTML.jpg)\n\
    **图 9-61**\n查看 `ReportAndSucceed.dtsx` 测试运行的 event_messages 日志文件\n\n这是执行 `ReportAndSucceed.dtsx`\
    \ SSIS 包的 event_messages 日志文件。打开另一个文件夹中的 event_messages 日志文件会显示执行 `ReportAndFail.dtsx`\
    \ SSIS 包的 event_messages，如图 9-62 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig62_HTML.jpg](img/497846_1_En_9_Fig62_HTML.jpg)\n\
    **图 9-62**\n查看 `ReportAndFail.dtsx` 测试运行的 event_messages 日志文件\n\n## 本章小结\n\n本章涵盖了以下内容：\n\
    \n*   配置 Azure SQL 数据库实例\n    *   将 `SSISConfig` 数据库部署到 Azure SQL DB 实例\n\n* \
    \  配置 Azure 文件共享\n    *   将测试用的 SSIS 包部署（复制）到 Azure 文件共享\n\n*   构建 SSIS 框架执行引擎\n\
    \    *   测试运行父管道并查看运行日志\n\n下一步是将应用程序和应用程序包的操作数据持久化存储在 `SSISConfig` 数据库中。\n\n#\
    \ 10. ADF 中的框架日志记录\n\n第 5–7 章介绍了如何使用名为 `SSISConfig` 的 SQL Server 数据库和一个 SSIS 包（`Parent.dtsx`\
    \ SSIS 包）作为执行引擎，来设计和构建一个用于执行存储在本地服务器文件系统中的 SSIS 包的 SSIS 框架。第 8 章介绍了如何配置 Azure\
    \ Data Factory (ADF) 实例、Azure 存储账户以及一个配置为执行存储在 Azure 文件共享中的 SSIS 包的 `Azure-SSIS`\
    \ 集成运行时。第 9 章介绍了如何配置 Azure SQL 数据库、将 `SSISConfig` 数据库部署到 Azure SQL DB、配置 Azure\
    \ 文件共享 (`fs-ssis`)，然后在 ADF 中构建执行引擎（父管道）。\n\n在本章中，我们将为父 ADF 管道添加日志记录功能，这非常类似于我们在第\
    \ 7 章中为本地版 SSIS 框架添加的功能。日志架构及相关构件已经部署，但我们将对与日志记录相关的表进行一些调整和修改。\n\n尽管执行的操作相似，但\
    \ Azure Data Factory 管道与 SSIS 包是*不同*的。这些差异将推动 SSIS 框架设计的变更。\n\n## 添加 ApplicationName\
    \ 参数\n\n父管道将执行 SSIS 框架应用程序。为了使 ADF 管道具有通用性，能够执行存储在 `SSISConfig` 数据库元数据中的*任何*应用程序，该管道需要一个\
    \ `ApplicationName` 参数。\n\n打开父管道，点击管道的空白区域，然后点击“参数”选项卡。当“参数”选项卡显示时，点击图 10-1 中高亮的“+\
    \ 新建”链接。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig1_HTML.jpg](img/497846_1_En_10_Fig1_HTML.jpg)\n\
    **图 10-1**\n开始添加新参数\n\n当参数配置界面显示时，设置以下参数属性，如图 10-2 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig2_HTML.jpg](img/497846_1_En_10_Fig2_HTML.jpg)\n\
    **图 10-2**\n配置 `ApplicationName` 父管道参数\n\n*   名称：`ApplicationName`\n*   类型：`String`\n\
    *   默认值：`Framework Test`\n\n现在，父 ADF 管道中的活动可以访问 `ApplicationName` 参数了。\n"
- fmt: '## A Quick Review of SSIS Framework Applications and Packages


    An SSIS framework application is a collection of SSIS packages that execute in
    a prescribed order (one SSIS application may be configured to execute one or many
    SSIS packages). Metadata for the SSIS application is stored in the `config.Applications`
    table and metadata for SSIS package location is stored in the `config.Packages`
    table. Because the cardinality between SSIS applications and SSIS packages is
    many-to-many (one SSIS package may be configured to run in one or many SSIS applications),
    the `config.ApplicationPackages` table exists to resolve relationships between
    applications and packages.


    ## Add Application Instance Logging


    In the introduction to this chapter, I mentioned there are differences between
    the way ADF and SSIS accomplish similar functions, and these differences will
    drive changes in the SSIS framework design in Azure Data Factory. We encounter
    the first difference here as we configure Application Instance logging.


    The SSIS framework collects operational data about instances of application execution
    in the `log.ApplicationInstance` table. Operational data regarding instances of
    application package execution are stored in the `log.ApplicationPackageInstance`
    table.


    ### Modifying the Log.ApplicationInstance Table


    An Azure Data Factory (ADF) pipeline is made up of many constituent objects and
    artifacts, including ADF activities. When ADF activities execute, a *RunId* value
    is generated for use in operational logging. When an Azure Data Factory pipeline
    executes, a RunId value is generated and used to connect internal ADF pipeline
    logs to pipeline activity logs.


    Modify the `log.ApplicationInstance` table by executing the T-SQL in Listing 10-1.


    ```sql

    print ''Log.ApplicationInstance.ApplicationRunId column''

    If Not Exists(Select s.[name]

    + ''.'' + t.[name]

    + ''.'' + c.[name]

    From [sys].[schemas] s

    Join [sys].[tables] t

    On t.[schema_id] = s.[schema_id]

    Join [sys].[columns] c

    On c.[object_id] = t.[object_id]

    Where s.[name] = N''log''

    And t.[name] = N''ApplicationInstance''

    And c.[name] = N''ApplicationRunId'')

    begin

    print '' - Adding log.ApplicationInstance.ApplicationRunId column''

    Alter Table log.ApplicationInstance

    Add ApplicationRunId nvarchar(55) NULL

    print '' - Log.ApplicationInstance.ApplicationRunId column added''

    end

    Else

    begin

    print '' - Log.ApplicationInstance.ApplicationRunId column already exists.''

    end

    ```

    Listing 10-1

    Adding the ApplicationRunId column to the ApplicationInstance table


    Let’s next encapsulate the T-SQL for adding Application Instance rows in a stored
    procedure.


    ### Adding the Log.InsertApplicationInstance Stored Procedure


    In the SSIS execution engine (the `Parent.dtsx` SSIS package), an Execute SQL
    Task was used to insert the initial `ApplicationInstance` record into the `log.ApplicationInstance`
    table and return an `ApplicationInstanceId` value. In the Azure Data Factory execution
    engine (the parent pipeline), a Lookup activity will call a stored procedure that
    inserts the record and returns an `ApplicationInstanceId` value. The `ApplicationInstanceId`
    value will be used later in the pipeline to update the `ApplicationInstance` record.


    In Azure Data Studio (or SSMS), connect to the Azure SQL database named `SSISConfig`.
    Starting with the T-SQL code from Listing 7-4 in Chapter 7, execute the T-SQL
    to create a new stored procedure named `log.InsertApplicationInstance` in an idempotent
    (re-executable) manner, as shown in Listing 10-2.


    ```sql

    print ''log.InsertApplicationInstance stored procedure''

    If Exists(Select s.[name] + ''.'' + p.[name]

    From [sys].[procedures] p

    Join [sys].[schemas] s

    On s.[schema_id] = p.[schema_id]

    Where s.[name] = N''log''

    And p.[name] = N''InsertApplicationInstance'')

    begin

    print '' - Dropping log.InsertApplicationInstance stored procedure''

    Drop Procedure log.InsertApplicationInstance

    print '' - Log.InsertApplicationInstance stored procedure dropped''

    end

    print '' - Creating log.InsertApplicationInstance stored procedure''

    go

    Create Procedure log.InsertApplicationInstance

    @ApplicationName nvarchar(255)

    , @ApplicationRunId nvarchar(55) = NULL

    As

    declare @ApplicationId int = (Select ApplicationId

    From config.Applications

    Where ApplicationName = @ApplicationName)

    Insert Into [log].ApplicationInstance (ApplicationId, ApplicationRunId)

    Output inserted.ApplicationInstanceId

    Values (@ApplicationId, @ApplicationRunId)

    go

    print '' - Log.InsertApplicationInstance stored procedure created''

    go

    ```

    Listing 10-2

    Idempotent T-SQL to create the `log.InsertApplicationInstance` stored procedure


    The `log.InsertApplicationInstance` stored procedure requires the name of an SSIS
    framework application be sent to the `@ApplicationName` string (`nvarchar(255)`)
    parameter. An internal T-SQL `int` parameter named `@ApplicationId` looks up the
    value of the `ApplicationId` in the `config.Applications` table for the given
    `@ApplicationName` value.


    The `log.InsertApplicationInstance` stored procedure also accepts a parameter
    named `@ApplicationRunId` which defaults to `NULL` when no value is supplied.
    `@ApplicationRunId` is used to store the Azure Data Factory pipeline `RunId` value.
    Storing the `RunId` in the SSIS framework allows enterprise DevOps teams to relate
    operational log data in the SSIS framework to operational data captured in ADF
    logs, which is extremely useful when something unfortunate happens during ADF
    pipeline execution.


    The T-SQL `Insert` statement initializes the `ApplicationInstance` record by inserting
    new `@ApplicationId` and `@ApplicationRunId` values into the `log.ApplicationInstance`
    table. Defaults configured on the `log.ApplicationInstance` table insert the following
    values in the row:


    *   `ApplicationStartTime` is set to `sysdatetimeoffset()` by `DF_log_ApplicationInstance_ApplicationStartTime`.

    *   `ApplicationStatus` is set to `N''Running''` by `DF_log_ApplicationInstance_ApplicationStatus`.


    If all goes as planned, Azure Data Studio should return Messages that appear as
    shown in Figure 10-3.


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig3_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig3_HTML.jpg)

    Figure 10-3

    Messages from creating the `log.InsertApplicationInstance` stored procedure


    After the `log.InsertApplicationInstance` stored procedure has been created, the
    next step is to add an activity to the pipeline to execute the stored procedure.'
