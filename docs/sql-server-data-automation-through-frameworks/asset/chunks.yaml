    On a.ApplicationId = ai.ApplicationId

    Order By ApplicationInstanceId Desc

    declare @ApplicationInstanceId int = (Select top 1 ApplicationInstanceId

    From log.ApplicationInstance

    Order By ApplicationInstanceId DESC)

    Select p.PackageName

    , ai.ApplicationInstanceId

    , api.ApplicationPackageInstanceId

    , api.ApplicationPackageStatus

    , ap.FailApplicationOnPackageFailure

    From log.ApplicationPackageInstance api

    Join log.ApplicationInstance ai

    On ai.ApplicationInstanceId = api.ApplicationInstanceId

    Join config.ApplicationPackages ap

    On ap.ApplicationPackageId = api.ApplicationPackageId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where ai.ApplicationInstanceId = @ApplicationInstanceId

    Order By ApplicationPackageInstanceId

    Listing 10-9

    Application execution results

    ```


    The results should appear similar to Figure [10-49](#497846_1_En_10_Chapter.xhtml#Fig49):


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig49_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig49_HTML.jpg)


    Figure 10-49


    Application execution results


    While the results match what was expected, something is missing: there is currently
    no Stored Procedure Activity that updates the Application Package Instance on
    Success, which is why the results of the query in Listing [10-9](#497846_1_En_10_Chapter.xhtml#PC9),
    shown in Figure [10-49](#497846_1_En_10_Chapter.xhtml#Fig49), display the ReportAndSucceed.dtsx
    SSIS ApplicationPackageStatus as “Running.”


    ### Updating Application Package Instance on Success


    The child pipeline needs a way to log Application Package Instance success. Begin
    by clicking the Clone icon on the “Log Application Package Instance Failure” stored
    procedure activity as shown in Figure [10-50](#497846_1_En_10_Chapter.xhtml#Fig50).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig50_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig50_HTML.jpg)


    Figure 10-50


    Preparing to clone the “Log Application Package Instance Success” stored procedure
    activity from the “Log Application Package Instance Failure” stored procedure
    activity


    As with cloning the “Log Application Instance Failure” stored procedure activity
    earlier, cloning the “Log Application Package Instance Failure” stored procedure
    activity makes sense because the new Stored Procedure Activity will be calling
    the *same* stored procedure – log.UpdateApplicationPackageInstanceStatus – and
    *only one* parameter value configuration will change.


    Connect a Success output from the “Execute Application Package” execute SSIS package
    activity to the cloned Stored Procedure Activity, and then rename the cloned Stored
    Procedure Activity to “Log Application Package Instance Success,” as shown in
    Figure [10-51](#497846_1_En_10_Chapter.xhtml#Fig51).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig51_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig51_HTML.jpg)


    Figure 10-51


    Adding the “Log Application Package Instance Success” stored procedure activity


    Next, click the Settings tab for the “Log Application Package Instance Success”
    stored procedure activity. The only change required on the Settings tab is the
    value of the ApplicationPackageStatus parameter’s value property, which needs
    to be updated from “Failed” to “Succeeded,” as shown in Figure [10-52](#497846_1_En_10_Chapter.xhtml#Fig52).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig52_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig52_HTML.jpg)


    Figure 10-52


    Updating the ApplicationPackageStatus parameter value


    A fresh test execution confirms the parent pipeline logs SSIS framework application
    failures as designed, and re-executing the query in Listing [10-9](#497846_1_En_10_Chapter.xhtml#PC9)
    confirms – as shown in Figure [10-53](#497846_1_En_10_Chapter.xhtml#Fig53).


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig53_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig53_HTML.jpg)


    Figure 10-53


    ReportAndSucceed.dtsx application package succeeds


    In our examples thus far, each application instance fails because a child package
    (named “ReportAndFail.dtsx”) fails each time it is executed. The next step is
    to add fault tolerance to the SSIS framework, ADF version, and that is the topic
    of the next chapter.'
  trans: '

    ### 更新应用程序包实例


    ADF 执行引擎需要执行一个名为 `log.UpdateApplicationPackageInstanceStatus` 的存储过程，该过程接受 `ApplicationPackageInstanceId`
    和 `ApplicationPackageStatus` 值，然后更新当前应用程序包实例的状态。存储过程活动非常适合这个任务！


    返回子 ADF 管道。将一个存储过程活动拖放到设计界面上。从执行应用程序包活动添加一个失败输出到新的存储过程活动。将新的存储过程活动重命名为“记录应用程序包实例失败”，如图
    10-45 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig45_HTML.jpg](img/497846_1_En_10_Fig45_HTML.jpg)


    *图 10-45*

    添加“记录应用程序包实例失败”存储过程活动


    在“设置”选项卡上，从“链接服务”属性下拉菜单中选择 `ssisFrameworkLinkedService`，然后从“存储过程名称”下拉菜单中选择 `[log].[UpdateApplicationPackageInstanceStatus]`。单击“导入参数”按钮以从
    `log.UpdateApplicationPackageInstanceStatus` 存储过程导入参数。单击 `ApplicationPackageInstanceId`
    参数的值文本框内部，然后单击“添加动态内容 [Alt + P]”链接。当“添加动态内容”面板显示时，展开“活动输出”表达式类别，并单击“记录应用程序包实例启动”。动态内容文本框将显示
    `@activity(''Log Application Package Instance Start'').output`。在表达式后追加 `.firstrow.ApplicationPackageInstanceId`，以将“记录应用程序包实例启动”查找活动执行返回的
    `ApplicationPackageInstanceId` 值映射到 `ApplicationPackageInstanceId` 参数的值属性中，如图
    10-46 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig46_HTML.jpg](img/497846_1_En_10_Fig46_HTML.jpg)


    *图 10-46*

    将“记录应用程序包实例启动”查找活动映射到 ApplicationPackageInstanceId 参数的值属性


    单击“完成”按钮继续。


    在 `ApplicationStatus` 参数的值属性中键入“失败”，如图 10-47 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig47_HTML.jpg](img/497846_1_En_10_Fig47_HTML.jpg)


    *图 10-47*

    将 ApplicationPackageStatus 属性设置为“失败”


    至此，SSIS 框架执行引擎 ADF 版本的子管道已配置为执行 SSIS 应用程序包并记录失败的应用程序包实例。


    下一步是测试执行该管道。


    ### 测试执行！


    返回父管道以测试执行引擎。单击父管道工具栏上的“调试”项。“输出”选项卡会显示，一段时间后，会显示出已执行的父管道活动，如图 10-48 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig48_HTML.jpg](img/497846_1_En_10_Fig48_HTML.jpg)


    *图 10-48*

    父管道测试执行的结果


    执行清单 10-9 中所示的 T-SQL 查询以检查应用程序实例结果。


    ```sql

    Select top 1

    a.ApplicationName

    , ai.ApplicationInstanceId

    , ai.ApplicationStatus

    From log.ApplicationInstance ai

    Join config.Applications a

    On a.ApplicationId = ai.ApplicationId

    Order By ApplicationInstanceId Desc


    declare @ApplicationInstanceId int = (Select top 1 ApplicationInstanceId

    From log.ApplicationInstance

    Order By ApplicationInstanceId DESC)


    Select p.PackageName

    , ai.ApplicationInstanceId

    , api.ApplicationPackageInstanceId

    , api.ApplicationPackageStatus

    , ap.FailApplicationOnPackageFailure

    From log.ApplicationPackageInstance api

    Join log.ApplicationInstance ai

    On ai.ApplicationInstanceId = api.ApplicationInstanceId

    Join config.ApplicationPackages ap

    On ap.ApplicationPackageId = api.ApplicationPackageId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where ai.ApplicationInstanceId = @ApplicationInstanceId

    Order By ApplicationPackageInstanceId

    ```

    *清单 10-9*

    应用程序执行结果


    结果应类似于图 10-49：


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig49_HTML.jpg](img/497846_1_En_10_Fig49_HTML.jpg)


    *图 10-49*

    应用程序执行结果


    尽管结果符合预期，但缺少了点什么：目前没有存储过程活动在成功时更新应用程序包实例，这就是为什么清单 10-9 中查询的结果（如图 10-49 所示）将 `ReportAndSucceed.dtsx`
    SSIS 的 ApplicationPackageStatus 显示为“正在运行”。


    ### 在成功时更新应用程序包实例


    子管道需要一种记录应用程序包实例成功的方法。首先，单击“记录应用程序包实例失败”存储过程活动上的“克隆”图标，如图 10-50 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig50_HTML.jpg](img/497846_1_En_10_Fig50_HTML.jpg)


    *图 10-50*

    准备从“记录应用程序包实例失败”存储过程活动克隆“记录应用程序包实例成功”存储过程活动


    与之前克隆“记录应用程序实例失败”存储过程活动类似，克隆“记录应用程序包实例失败”存储过程活动是合理的，因为新的存储过程活动将调用*相同*的存储过程——`log.UpdateApplicationPackageInstanceStatus`——并且*只有*一个参数值配置会发生变化。


    从“执行应用程序包”执行 SSIS 包活动添加一个成功输出到克隆的存储过程活动，然后将克隆的存储过程活动重命名为“记录应用程序包实例成功”，如图 10-51
    所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig51_HTML.jpg](img/497846_1_En_10_Fig51_HTML.jpg)


    *图 10-51*

    添加“记录应用程序包实例成功”存储过程活动


    接下来，单击“记录应用程序包实例成功”存储过程活动的“设置”选项卡。“设置”选项卡上唯一需要的更改是 ApplicationPackageStatus 参数的值属性的值，需要从“失败”更新为“成功”，如图
    10-52 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig52_HTML.jpg](img/497846_1_En_10_Fig52_HTML.jpg)


    *图 10-52*

    更新 ApplicationPackageStatus 参数值


    一次新的测试执行确认父管道按设计记录了 SSIS 框架应用程序失败，并且重新执行清单 10-9 中的查询确认了——如图 10-53 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig53_HTML.jpg](img/497846_1_En_10_Fig53_HTML.jpg)


    *图 10-53*

    `ReportAndSucceed.dtsx` 应用程序包成功


    在我们目前的示例中，每个应用程序实例都会失败，因为一个名为 `ReportAndFail.dtsx` 的子包每次执行都会失败。下一步是为 ADF 版本的 SSIS
    框架添加容错能力，这将是下一章的主题。

