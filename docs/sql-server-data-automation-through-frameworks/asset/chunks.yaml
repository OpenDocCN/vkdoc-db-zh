  trans: '

    ### Config.Applications 表


    在此框架中，一个 `SSIS application`（SSIS 应用程序）被定义为“配置为按预定顺序执行的 SSIS 包的集合”。每个应用程序由一个 `ApplicationId`（非空
    `int`）来标识。


    每个应用程序都有一个 `name` 属性，并且 `ApplicationName` 必须是唯一的。通过 `ApplicationId` 来标识应用程序对于参照完整性至关重要。观察
    `config` 架构中表的 T-SQL —— 特别是 `config.ApplicationPackages` 表 —— 您会注意到其设计符合第三范式。


    执行清单 5-3 中的 T-SQL，将 `Applications` 表添加到 `SSISConfig` 数据库的 `config` 架构中。


    ```sql

    use [SSISConfig]

    go

    print ''Config.Applications table''

    If Not Exists(Select [schemas].[name] + ''.'' + [tables].[name] As ➤ [Schema.Table]

    From [sys].[tables]

    Join [sys].[schemas]

    On [schemas].[schema_id] = [tables].[schema_id]

    Where [schemas].[name] = N''config''

    And [tables].[name] = N''Applications'')

    begin

    print '' - Create config.Applications table''

    Create Table [config].[Applications]

    (

    ApplicationId int identity(1, 1)

    Constraint PK_config_Applications Primary Key Clustered

    , ApplicationName nvarchar(255) Not NULL

    Constraint UQ_config_Applications_ApplicationName

    Unique

    )

    print '' - Config.Applications table created''

    end

    Else

    begin

    print '' - Config.Applications table already exists.''

    end

    print ''''

    go

    Listing 5-3

    添加 config.Applications

    ```


    执行后，`config.Applications` 表将出现在对象资源管理器中，如图 5-4 所示。


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig4_HTML.jpg](img/497846_1_En_5_Fig4_HTML.jpg)


    图 5-4

    Config.Applications 表


    ### Config.Packages 表


    包位置元数据存储在 `config.Packages` 表中。当我们构建此 SSIS 框架的其他版本时，将会看到这是会变化的表。这些变化基于 SSIS 包在企业中的存放位置。


    执行清单 5-4 所示的 T-SQL 来创建 `config.Packages` 表。


    ```sql

    use [SSISConfig]

    go

    print ''Config.Packages table''

    If Not Exists(Select [schemas].[name] + ''.'' + [tables].[name] As ➤ [Schema.Table]

    From [sys].[tables]

    Join [sys].[schemas]

    On [schemas].[schema_id] = [tables].[schema_id]

    Where [schemas].[name] = N''config''

    And [tables].[name] = N''Packages'')

    begin

    print '' - Create config.Packages table''

    Create Table [config].[Packages]

    (

    PackageId int identity(1, 1)

    Constraint PK_config_Packages Primary Key Clustered

    , PackageLocation nvarchar(255) Not NULL

    , PackageName nvarchar(255) Not NULL

    , Constraint UQ_config_Packages_PackageName

    Unique(PackageLocation, PackageName)

    )

    print '' - Config.Packages table created''

    end

    Else

    begin

    print '' - Config.Packages table already exists.''

    end

    print ''''

    go

    Listing 5-4

    创建 config.Packages 表

    ```


    创建后，`config.Packages` 表将出现在对象资源管理器中，如图 5-5 所示。


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig5_HTML.jpg](img/497846_1_En_5_Fig5_HTML.jpg)


    图 5-5

    创建 config.Packages 表


    如前所述，框架中的一个 `SSIS application` 是配置为按特定顺序执行的包的集合。考虑到应用程序与包之间的基数关系，显然答案是至少部分为一对多。


    考虑实用工具 SSIS 包，例如在文件中的数据成功加载或暂存到数据库后存档平面文件的包。这样的包——可能命名为 `ArchiveFile.dtsx`——可以通过诸如
    `SourceFilePath` 和 `DestinationLocation` 之类的参数进行参数化。然后，`ArchiveFile.dtsx` 可以在多个
    SSIS 应用程序中重用。


    这些应用程序与 `ArchiveFile.dtsx` 包之间的基数是多对一。将一对多和多对一的基数关系结合起来，就得到了多对多。在第三范式设计中解决多对多关系需要一个额外的表：本例中就是
    `config.ApplicationPackages`。使用清单 5-5 所示的 T-SQL 创建 `config.ApplicationPackages`。


    ```sql

    use [SSISConfig]

    go

    print ''Config.ApplicationPackages table''

    If Not Exists(Select [schemas].[name] + ''.'' + [tables].[name] As ➤ [Schema.Table]

    From [sys].[tables]

    Join [sys].[schemas]

    On [schemas].[schema_id] = [tables].[schema_id]

    Where [schemas].[name] = N''config''

    And [tables].[name] = N''ApplicationPackages'')

    begin

    print '' - Create config.ApplicationPackages table''

    Create Table [config].[ApplicationPackages]

    (

    ApplicationPackageId int identity(1, 1)

    Constraint PK_config_ApplicationPackages Primary Key Clustered

    , ApplicationId int Not NULL

    Constraint FK_config_ApplicationPackages_config_Applications

    Foreign Key References [config].Applications

    , PackageId int Not NULL

    Constraint FK_config_ApplicationPackages_config_Packages

    Foreign Key References [config].Packages

    , ExecutionOrder int Not NULL

    Constraint DF_config_ApplicationPackages_ExecutionOrder

    Default(10)

    , ApplicationPackageEnabled bit Not NULL

    Constraint DF_config_ApplicationPackages_ApplicationPackageEnabled

    Default(1)

    , FailApplicationOnPackageFailure bit Not NULL

    Constraint ➤ DF_config_ApplicationPackages_FailApplicationOnPackageFailure

    Default(1)

    , Constraint ➤ UQ_config_ApplicationPackages_ApplicationId_PackageId_ExecutionOrder

    Unique(ApplicationId, PackageId, ExecutionOrder)

    )

    print '' - Config.ApplicationPackages table created''

    end

    Else

    begin

    print '' - Config.ApplicationPackages table already exists.''

    end

    print ''''

    go

    Listing 5-5

    创建 config.ApplicationPackages 表

    ```


    当 `config.ApplicationPackages` 表创建后，对象资源管理器中的 `SSISConfig` 表如图 5-6 所示。


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig6_HTML.jpg](img/497846_1_En_5_Fig6_HTML.jpg)


    图 5-6

    config.ApplicationPackages 表


    通过展开“列”、“键”和“约束”虚拟文件夹，在对象资源管理器中检查 `config.ApplicationPackages` 表，如图 5-7 所示。


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig7_HTML.jpg](img/497846_1_En_5_Fig7_HTML.jpg)


    图 5-7

    检查 config.ApplicationPackages 表


    `config.ApplicationPackages` 表的列被设计用于解决 `config.Applications` 表和 `config.Packages`
    表之间的多对多基数关系。每个条目通过一个标识列 `ApplicationPackageId`，将 SSIS 包元数据（通过 `PackageId`）映射到
    SSIS 应用程序元数据（通过 `ApplicationId`），从而 `解决`（或 `桥接`）了多对多关系。解决后，此 `SSISConfig` 数据库设计支持
    `Application Packages`（应用程序包）的执行，`Application Packages` 被定义为映射到 SSIS 应用程序的 SSIS
    包的实例。因此，根据设计，`Application Packages` 是此 SSIS 框架中最小的工作单元。

    '
- fmt: '#### Attributes of Execution


    One implication of Application Packages being the smallest unit of work is Application
    Packages are where we define `attributes of execution`. The application package
    attributes of execution in this framework are:


    *   `ExecutionOrder`

    *   `ApplicationPackageEnabled`

    *   `FailApplicationOnPackageFailure`


    `ExecutionOrder` is an integer that represents the “in a specified order” part
    of the SSIS application definition.


    `ApplicationPackageEnabled` is a bit field that indicates whether the individual
    application package is configured to execute when the SSIS application is executed.


    `FailApplicationOnPackageFailure` is a bit that configures fault tolerance. Consider
    what happens when one executes an SSIS application: a number of SSIS packages
    are executed in a specified order. SSIS packages with a specified order within
    an SSIS application are application packages. What if we would like it very much
    if an SSIS package executed, completed, and succeeded, but if the package fails
    for some reason, it’s not vital for this particular SSIS application execution?
    What if we just don’t care so much if this particular package fails? The `FailApplicationOnPackageFailure`
    attribute will permit the package to fail `without` stopping the SSIS application
    execution.


    #### Default Constraints


    A default constraint manages the initial value of a column when a new record is
    added to a table and the value for field is not supplied an explicit value:


    *   `DF_config_ApplicationPackages_FailApplicationOnPackageFailure` is a default
    constraint that sets the value of the `FailApplicationOnPackageFailure` bit to
    True (1) if no value is supplied when the `config.ApplicationPackages` record
    is first added to the table.

    *   `DF_config_ApplicationPackages_ApplicationPackageEnabled` is a default constraint
    that sets the value of the `ApplicationPackageEnabled` bit to True (1) if no value
    is supplied when the `config.ApplicationPackages` record is first added to the
    table.

    *   `DF_config_ApplicationPackages_ExecutionOrder` is a default constraint that
    sets the value of the `ExecutionOrder` integer to 10 if no value is supplied when
    the `config.ApplicationPackages` record is first added to the table.


    #### Relationships


    Keys manage relationships between entities in the SSISConfig database and therefore
    in the SSIS framework:


    *   `config.ApplicationPackages` is configured with `PK_config_ApplicationPackages`.
    Each table has a primary key for relationship management. In this framework, `PK_config_ApplicationPackages`
    serves to help identify each Application-Package-Execution Order combination.

    *   `FK_config_ApplicationPackages_config_Applications` is a foreign key between
    the `config.ApplicationPackages.ApplicationId` field and the `config.Applications.ApplicationId`
    field. Before a row is added to `config.ApplicationPackages`, a corresponding
    row `must` already exist in the `config.Applications` table. The Application is
    mapped to a Package that executes at this `position` – denoted by the value of
    `ExecutionOrder` – in the application.

    *   `FK_config_ApplicationPackages_config_Packages` is a foreign key between the
    `config.ApplicationPackages.PackageId` field and the `config.Packages.PackageId`
    field. Before a row is added to `config.ApplicationPackages`, a corresponding
    row `must` already exist in the `config.Packages` table. A Package that executes
    at a `position` – denoted by the value of `ExecutionOrder` – is mapped into an
    Application.

    *   `UQ_config_ApplicationPackages_ApplicationId_PackageId_ExecutionOrder` is
    a unique constraint that guarantees the distinctness – across the `ApplicationId`,
    `PackageId`, and `ExecutionOrder` fields – of each application package stored
    in the `config.ApplicationPackages` table. This means two (or more) records in
    the `config.ApplicationPackages` table `may not have identical` `ApplicationId`,
    `PackageId`, and `ExecutionOrder` field values.


    #### Frequently Asked Questions


    Frameworks are new to many data users, and there are several questions we hear
    regularly:


    *   Is it possible for two (or more) records in the `config.ApplicationPackages`
    table to have the same `ApplicationId`? Yes. In fact, the framework is designed
    for this use case. Several `config.ApplicationPackages` records with the same
    `ApplicationId` value is how the framework is used to configure an SSIS application.

    *   Is it possible for two (or more) records in the `config.ApplicationPackages`
    table to have the same `PackageId`? Yes. This supports code reuse, such as executing
    the `ArchiveFile.dtsx` SSIS package in several applications. This also supports
    an SSIS Design Pattern called “Range-Based Load.” In a Range-Based Load, the *same*
    SSIS package executes several times. New minimum and maximum range values, or
    other mathematical functions, are passed to the package for each execution. For
    example, the same SSIS package could execute ten times. The first execution could
    load records in which a numeric value begins with the numeral “0.” Subsequent
    executions could load data where the numeric value starts with the numerals “1,”
    “2,” and so on.


    We will return to SSMS and development of the SSISConfig database in a bit. Let’s
    next build a sample SSIS solution to use to test the framework.


    ## A Sample SSIS Solution


    Testing is hard. Testing requires thinking, differently, about how users will
    interact with an application. Developers are notoriously bad at testing their
    own code. Why? I believe it’s because development focuses on delivering functionality
    that just works. For some (like me), it’s difficult to change gears and begin
    thinking about all the permutations a user may enter – or *forget* to enter –
    when interacting with our code.


    A first thought for building a sample SSIS solution for testing is, “I can do
    this with one SSIS package.” That’s incorrect. Testing requires at least two SSIS
    packages, one package that succeeds and another that fails.'
  raw: '#### Attributes of Execution


    One implication of Application Packages being the smallest unit of work is Application
    Packages are where we define *attributes of execution* . The application package
    attributes of execution in this framework are


    *   ExecutionOrder


    *   ApplicationPackageEnabled


    *   FailApplicationOnPackageFailure


    Execution Order is an integer that represents the “in a specified order” part
    of the SSIS application definition.


    Application Package Enabled is a bit field that indicates whether the individual
    application package is configured to execute when the SSIS application is executed.


    Fail Application On Package Failure is a bit that configures fault tolerance.
