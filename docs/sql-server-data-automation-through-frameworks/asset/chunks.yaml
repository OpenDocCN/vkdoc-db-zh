    control flow. Delete the precedence constraint between the SCR Log Initial Values
    script task and the SQL Get Application Packages execute SQL task. Connect new
    precedence constraints – the first between SCR Log initial Values script task
    and the new execute SQL task, and the second between the new Execute SQL Task
    and the SQL Get Application Packages execute SQL task. Rename the new Execute
    SQL Task “SQL Log Application Instance Start,” as shown in `Figure 7-4`.


