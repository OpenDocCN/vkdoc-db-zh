- fmt: '### Checking the Logic


    让我们在此暂停，梳理一下目前的逻辑。应用程序包执行有两种可能的结果：要么成功，要么失败。


    如果应用程序包执行成功，则会执行“Log Application Package Instance Success”存储过程活动，并为当前的`ApplicationPackageInstanceID`更新`log.ApplicationPackageInstance`表中的`ApplicationPackageStatus`值为"Succeeded"。


    成功路径——即第一个用例——已经实现。容错逻辑仅在应用程序包执行失败时才需要。


    如果应用程序包执行失败，“If Fail Application On Package Failure”条件活动将对子包管道的`FailApplicationOnPackageFailure`参数的值进行求值（通过表达式转换为布尔值）。


    当应用程序包执行失败**且**`FailApplicationOnPackageFailure`为false时，发生第二个用例。在这种情况下，我们需要：

    *   记录应用程序包执行的状态（失败及信息）

    *   **继续**执行SSIS框架应用程序的应用程序包


    当应用程序包执行失败**且**`FailApplicationOnPackageFailure`为true时，发生第三个用例。在这种情况下，我们需要：

    *   记录应用程序包执行的状态（失败及信息）

    *   记录应用程序执行的状态（失败）

    *   **停止**应用程序包的执行


    ### Implementing the Fault Tolerance Logic


    要开始实现容错逻辑，请点击“If Fail Application On Package Failure”条件活动的False活动编辑器，如图11-10所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig10_HTML.jpg`](images/497846_1_En_11_Chapter/497846_1_En_11_Fig10_HTML.jpg)


    图 11-10

    打开“If Fail Application On Package Failure”条件活动的False活动编辑器


    将一个存储过程活动拖放到画布上，并将新的存储过程活动重命名为“Log Application Package Instance Failed 0”，如图11-11所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig11_HTML.jpg`](images/497846_1_En_11_Chapter/497846_1_En_11_Fig11_HTML.jpg)


    图 11-11

    添加“Log Application Package Instance Failed 0”存储过程活动


    点击“设置”选项卡，并将“链接服务”属性设置为`ssisFrameworkLinkedService`。从“存储过程名称”下拉列表中选择`log.UpdateApplicationPackageInstanceStatus`，如图11-12所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig12_HTML.jpg`](images/497846_1_En_11_Chapter/497846_1_En_11_Fig12_HTML.jpg)


    图 11-12

    配置链接服务和存储过程名称


    点击“导入参数”按钮开始配置`log.UpdateApplicationPackageInstanceStatus`存储过程参数值。通过点击“添加动态内容[Alt
    + P]”链接并选择“Log Application Package Instance Start”活动来配置`ApplicationPackageInstanceId`存储过程参数，这将在表达式文本框中输入表达式`@activity(''Log
    Application Package Instance Start'').output`。将`".firstrow.ApplicationPackageInstanceId"`附加到表达式。在`ApplicationPackageStatus`值文本框中，输入`"Failed
    (FailAppOnPkgFail: 0)"`，如图11-13所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig13_HTML.jpg`](images/497846_1_En_11_Chapter/497846_1_En_11_Fig13_HTML.jpg)


    图 11-13

    配置`ApplicationPackageInstanceId`和`ApplicationPackageStatus`参数值


    一旦存储过程参数值设置完毕，“Log Application Package Instance Failed 0”存储过程活动的配置即告完成。请注意，`ApplicationPackageStatus`包含了附加信息：`"(FailAppOnPkgFail:
    0)"`。“Log Application Package Instance Failed 0”存储过程用于处理用例2。


    `log.ApplicationPackageInstance`表中的`ApplicationPackageStatus`列当前配置为`nvarchar(25)`，不足以容纳文本`"Failed
    (FailAppOnPkgFail: 0)"`。请执行清单11-1中的T-SQL来扩展列的大小。


    ```sql

    Alter Table [log].[ApplicationPackageInstance]

    Alter Column ApplicationPackageStatus nvarchar(55) Not NULL

    ```

    清单 11-1

    扩展`ApplicationPackageStatus`列


    在讨论和添加支持用例3的代码之前，快速回顾一下ForEach活动的默认行为是个好主意。


    #### ForEach Activity Default Behavior


    ForEach活动的默认迭代行为是继续遍历已配置的集合，执行“内部活动”，直到集合中的所有项目都被遍历完毕。一个副作用是，“内部活动”中发生的错误**不会**停止迭代。无论执行结果如何，“内部活动”都会在集合被遍历时执行。


    **在**迭代完成后，迭代期间发生的任何失败都会导致ForEach活动失败。


    假设一个名为“ForEach Array Item”的ForEach活动包含一个“内部活动”，即一个名为“Wait”的等待活动（我知道这名字很有创意）。假设一个包含四个项目的数组变量被提供给ForEach活动的Items属性。考虑以下ForEach“内部活动”执行的场景，其中Wait活动的第二次迭代失败，按迭代编号如下：

    1.  Wait 执行成功。

    2.  Wait 执行失败。

    3.  Wait 执行成功。

    4.  Wait 执行成功。


    每次迭代都将执行，导致Wait活动执行四次。ForEach活动将失败。调试输出将如图11-14所示。


    ![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig14_HTML.jpg`](images/497846_1_En_11_Chapter/497846_1_En_11_Fig14_HTML.jpg)


    图 11-14

    ForEach活动执行的输出


    图11-14显示了Wait活动的四次执行。三次成功，一次失败。请注意，每个Wait活动都执行了，并且在第二次迭代中的Wait活动**失败后**，又执行了两次Wait活动。另请注意，ForEach活动失败了。'
  raw: '### Checking the Logic


    Let’s pause here and think through the logic so far. There are two application
    package execution possible outcomes: the application package execution will either
    succeed or fail.


    If the application package execution succeeds, the “Log Application Package Instance
    Success” stored procedure activity executes and updates the log.ApplicationPackageInstance
    table’s `ApplicationPackageStatus` value to “Succeeded” for the current `ApplicationPackageInstanceID`.


    The on-success – first use case – is already implemented. Fault tolerance logic
    is required *if and only if* the application package execution fails.


    If the application package execution fails, the “If Fail Application On Package
    Failure” if condition activity evaluates the value of the child package pipeline’s
    FailApplicationOnPackageFailure parameter (converted by the expression to a Boolean
    value).


    The second use case occurs when the application package execution fails *and*
    FailApplicationOnPackageFailure is false. In this case, we want to


    *   Log the status (failure with information) of the application package execution


    *   *Continue* the execution of the SSIS framework application’s application packages


    The third use case occurs when the application package execution fails *and* FailApplicationOnPackageFailure
    is true. In this case, we want to


    *   Log the status (failure with information) of the application package execution


    *   Log the status (failure) of the application execution


    *   *Stop* the execution of application packages


    ### Implementing the Fault Tolerance Logic


    To begin implementing the fault tolerance logic, click the “If Fail Application
    On Package Failure” if condition activity’s False activities editor, as shown
    in Figure [11-10](#497846_1_En_11_Chapter.xhtml#Fig10).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig10_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig10_HTML.jpg)


    Figure 11-10


    Opening the “If Fail Application On Package Failure” if condition activity’s False
    activities editor


    Drag a Stored Procedure Activity onto the canvas and rename the new Stored Procedure
    Activity “Log Application Package Instance Failed 0,” as shown in Figure [11-11](#497846_1_En_11_Chapter.xhtml#Fig11).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig11_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig11_HTML.jpg)


    Figure 11-11


    Adding the “Log Application Package Instance Failed 0” stored procedure activity


    Click the Settings tab and set the Linked service property to ssisFrameworkLinkedService.
    Select log.UpdateApplicationPackageInstanceStatus from the Stored procedure name
    drop-down, as shown in Figure [11-12](#497846_1_En_11_Chapter.xhtml#Fig12).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig12_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig12_HTML.jpg)


    Figure 11-12


    Configuring Linked service and Stored procedure name


    Click the Import parameter button to begin configuring the log.UpdateApplicationPackageInstanceStatus
    stored procedure parameter values. Configure the `ApplicationPackageInstanceId`
    stored procedure parameter by clicking the “Add dynamic content [Alt + P]” link
    and selecting the “Log Application Package Instance Start” activity, which will
    enter the expression `@activity(''Log Application Package Instance Start'').output`
    into the expression textbox. Append `".firstrow.ApplicationPackageInstanceId"`
    to the expression. In the `ApplicationPackageStatus` value textbox, enter “`Failed
    (FailAppOnPkgFail: 0)`,” as shown in Figure [11-13](#497846_1_En_11_Chapter.xhtml#Fig13).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig13_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig13_HTML.jpg)


    Figure 11-13


    Configuring the ApplicationPackageInstanceId and ApplicationPackageStatus parameter
    values


    Once stored procedure parameter values are set, configuration of the “Log Application
    Package Instance Failed 0” stored procedure activity is complete. Please note
    the ApplicationPackageStatus includes additional information: “`(FailAppOnPkgFail:
    0)`”. The “Log Application Package Instance Failed 0” stored procedure addresses
    use case 2.


    The `ApplicationPackageStatus` column in the `log.ApplicationPackageInstance`
    table is currently configured as nvarchar(25), which is not large enough to contain
    the text “`Failed (FailAppOnPkgFail: 0)`”. Execute the T-SQL in Listing [11-1](#497846_1_En_11_Chapter.xhtml#PC1)
    to expand the column size.


    ```

    Alter Table [log].[ApplicationPackageInstance]

    Alter Column ApplicationPackageStatus nvarchar(55) Not NULL

    Listing 11-1

    Expanding ApplicationPackageStatus

    ```


    Before discussing and adding code to support use case 3, a quick review of the
    ForEach activity’s default behavior is a good idea.


    #### ForEach Activity Default Behavior


    The ForEach activity’s default iterating behavior is to continue iterating over
    the configured collection, executing “inner activities,” until the items in the
    collection have all been iterated. One side effect is that errors occurring in
    the “inner activities” do *not* stop iteration. “Inner activities” are executed
    as the collection is iterated regardless of the outcome of said execution.


    *After* iteration completes, any failures that occurred during iteration cause
    the ForEach activity to fail.


    Assume a ForEach activity named “ForEach Array Item” contains a single “inner
    activity,” a Wait activity named “Wait” (creative, I know). Assume an array variable
    containing four items is supplied to the ForEach activity’s Items property. Consider
    the following scenario for ForEach “inner activities” execution in which the second
    iteration of the Wait activity fails, numbered by iteration:


    1.  Wait executes successfully.


    2.  Wait execution fails.


    3.  Wait executes successfully.


    4.  Wait executes successfully.


    Each iteration will execute, resulting in four executions of the wait activity.
    The ForEach activity will fail. A Debug output will appear as shown in Figure
    [11-14](#497846_1_En_11_Chapter.xhtml#Fig14).


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig14_HTML.jpg](images/497846_1_En_11_Chapter/497846_1_En_11_Fig14_HTML.jpg)


    Figure 11-14


    Output of a ForEach activity execution


    Figure [11-14](#497846_1_En_11_Chapter.xhtml#Fig14) shows four executions of the
    Wait activity. Three succeeded, one failed. Please note each Wait activity executed,
    and two Wait activity executions fired *after* the Wait activity in the second
    iteration *failed*. Also note the ForEach activity failed.'
