  trans: '# 为 SSIS 包文件配置 Azure-SSIS 集成运行时


    2019 年 6 月 30 日，Microsoft 发布了 ADF Azure-SSIS 集成运行时的新版本。以往，企业可以使用 Azure 数据库托管的
    SSIS 目录在云中执行 SSIS 包；而新版本则允许从 Azure 文件共享执行 SSIS 包。


    ## 入门


    要开始创建 Azure-SSIS 集成运行时，请导航到 Azure 数据工厂实例的“管理”页面，并在“连接”类别下点击“集成运行时”，如图 8-24 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig24_HTML.jpg](img/497846_1_En_8_Fig24_HTML.jpg)


    图 8-24：打开 ADF 连接


    当“连接”页面显示时，点击“集成运行时”选项卡，如图 8-25 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig25_HTML.jpg](img/497846_1_En_8_Fig25_HTML.jpg)


    图 8-25：ADF 连接的“集成运行时”选项卡


    点击图 8-25 中圈出的“新建”按钮，以打开“集成运行时设置”窗格，并选择“Azure-SSIS”选项，如图 8-26 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig26_HTML.jpg](img/497846_1_En_8_Fig26_HTML.jpg)


    图 8-26：在集成运行时设置窗格中选择 Azure-SSIS


    图 8-26 中显示的另一个选项是“Azure、Self-Hosted”。你可以访问 `docs.microsoft.com/en-us/azure/data-factory/concepts-integration-runtime#self-hosted-integration-runtime`
    来了解有关 *所有* Azure 数据工厂集成运行时的更多信息。出于本示例的目的，我们将配置一个“独立”的 Azure-SSIS 集成运行时——即 IR——这是一种需要最少安全配置的
    IR。有关将 Azure-SSIS IR 加入虚拟网络的更多信息，请访问 `docs.microsoft.com/en-us/azure/data-factory/join-azure-ssis-integration-runtime-virtual-network`。


    ## 配置常规设置


    点击“继续”按钮，打开集成运行时设置窗格上的“常规设置”页面。配置 Azure-SSIS IR 的名称和可选的描述，然后设置“位置”属性。在本例中，将“位置”属性设置为与
    Azure 数据工厂相同的位置（此为默认值），如图 8-27 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig27_HTML.jpg](img/497846_1_En_8_Fig27_HTML.jpg)


    图 8-27：配置名称、描述和位置属性


    ### 节点配置


    接下来的两个步骤将配置 Azure-SSIS 用以执行 SSIS 包的虚拟机（VM）。“节点大小”代表 *每个节点* 的配置，有一些性能强劲的选项，例如图
    8-28 中列出的那些。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig28_HTML.jpg](img/497846_1_En_8_Fig28_HTML.jpg)


    图 8-28：Azure-SSIS 的一些节点大小选项


    VM 系列的首字母表示虚拟机的通用类别和用途。A 系列 VM 专门设计用于在项目的测试和开发阶段节省成本。要了解有关 Azure 虚拟机系列和成本的更多信息，请访问
    `azure.microsoft.com/en-us/pricing/details/virtual-machines/series/`。


    从下拉列表中选择“A8_v2 (8 Core(s), 16384 MB)”节点大小，如图 8-29 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig29_HTML.jpg](img/497846_1_En_8_Fig29_HTML.jpg)


    图 8-29：为 Azure-SSIS 选择节点大小


    “节点数”滑块指示 Azure-SSIS 可用的虚拟机数量。每个节点将根据上一个下拉列表中选择的节点大小进行配置。节点数是指 Azure-SSIS IR 可用的、在“节点大小”属性中配置的节点数量。本例中，将“节点数”属性保留为默认值
    2，如图 8-30 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig30_HTML.jpg](img/497846_1_En_8_Fig30_HTML.jpg)


    图 8-30：将“节点数”属性配置为 2


    ## 许可与成本管理


    下一步是配置“版本/许可证”属性。现在先选择“标准”，如图 8-31 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig31_HTML.jpg](img/497846_1_En_8_Fig31_HTML.jpg)


    图 8-31：设置版本/许可证属性


    一项名为“自带许可”或“BYOL”的功能是在 Azure 中减少支出的另一种方式。如果你或你的企业已经拥有 SQL Server 许可证，请点击“是”以降低运行
    Azure-SSIS 后端 VM 的成本，如图 8-32 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig32_HTML.jpg](img/497846_1_En_8_Fig32_HTML.jpg)


    图 8-32：使用 BYOL 降低 Azure 成本


    请注意，更改“版本/许可证”属性并 *不会* 影响 Azure-SSIS 的成本，如图 8-33 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig33_HTML.jpg](img/497846_1_En_8_Fig33_HTML.jpg)


    图 8-33：选择企业版不会影响 Azure-SSIS 成本


    阅读 `azure.microsoft.com/en-us/pricing/details/data-factory/ssis/` 以了解有关 Azure-SSIS
    成本的更多信息。你也可以尝试不同的组合来平衡性能和成本，例如图 8-34 中显示的“D2_v3 (2 Core(s), 8192 MB)”企业配置。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig34_HTML.jpg](img/497846_1_En_8_Fig34_HTML.jpg)


    图 8-34：测试其他节点大小组合


    $0.58 大约是 $1.89 的 31%。


    *请* 访问 `azure.microsoft.com/en-us/pricing/details/data-factory/ssis/` 以了解有关 Azure-SSIS
    实例成本的更多信息。管理 Azure-SSIS 成本的一种方法是安排 Azure 数据工厂管道在每晚关闭每个 Azure-SSIS 实例，以防你在学习时忘记或被叫走。`andyleonard.blog/2020/05/stop-an-azure-ssis-files-integration-runtime-safely/`
    是一篇详细介绍如何停止 Azure-SSIS IR 的博客文章。


    **作者和/或出版商对产生的任何费用概不负责。**


    ## 配置部署设置


    常规设置配置完毕后，点击“继续”按钮，打开集成运行时设置窗格中的“部署设置”页面，如图 8-35 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig35_HTML.jpg](img/497846_1_En_8_Fig35_HTML.jpg)


    图 8-35：集成运行时设置窗格中的“部署设置”页面


    我能听到你在想：“天哪，Andy！要配置的东西真多。而且你 *只字未提* 创建 Azure 数据库的事。怎么回事？”别急。我们正在为 *文件* 创建 Azure-SSIS
    实例，记得吗？取消选中图 8-35 中圈出的“创建由 Azure SQL 数据库服务器/托管实例托管的 SSIS 目录 (SSISDB) 以存储你的项目/包/环境/执行日志”复选框。集成运行时设置窗格中的“部署设置”页面现在看起来与图
    8-36 所示相似。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig36_HTML.jpg](img/497846_1_En_8_Fig36_HTML.jpg)


    图 8-36'
- fmt: 'The `Deployment settings` page in the Integration runtime setup blade after
    unchecking the `Create SSIS catalog…` checkbox.


    Click the `Continue` button to open the Integration runtime setup blade’s `Advanced
    settings` page. Four options are available on the `Advanced settings` page:


    1.  `Maximum parallel executions per node`

    2.  `Azure-SSIS integration runtime customization`

    3.  `VNet`

    4.  `Self-hosted integration runtime`


    The `Maximum parallel executions per node` drop-down does what it says. Each Azure-SSIS
    node (VM) may execute the number of SSIS packages configured by the `Maximum parallel
    executions per node` property.


    Azure-SSIS integration runtimes may include custom configurations and/or third-party
    tools such as SentryOne’s `Task Factory` (sentryone.com/products/task-factory)
    and `SSIS+ Components Suite` by COZYROC (cozyroc.com/products).


    Most enterprises using the cloud store some, but not all, of their data in the
    cloud in a `hybrid` architecture. `VNet` is one way to access on-premises enterprise
    data. At the time of this writing, classic Azure virtual network is being deprecated
    and replaced with `VNet`. `VNet` is recommended for enterprises using or desiring
    to use


    -   Classic Azure virtual network

    -   Public IP addresses with Azure-SSIS IR

    -   Customized Azure-SSIS


    Learn more by visiting the article `Join an Azure-SSIS integration runtime to
    a virtual network` at docs.microsoft.com/en-us/azure/data-factory/join-azure-ssis-integration-runtime-virtual-network.


    A `self-hosted` Azure-SSIS integration runtime permits access to on-premises enterprise
    data *without* requiring `VNet`.


    For the purposes of this example, accept the defaults – no checkboxes checked
    – as shown in Figure 8-37.


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig37_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig37_HTML.jpg)


    *Figure 8-37. Configuring Azure-SSIS Advanced settings*


    Click the `Continue` button to proceed to the Integration runtime setup’s `Summary`
    page. The `Summary` page displays Azure-SSIS configuration choices, as shown in
    Figure 8-38.


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig38_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig38_HTML.jpg)


    *Figure 8-38. Azure-SSIS configuration choices*


    Click the `Create` button to provision the Azure-SSIS integration runtime. `Connections`
    ➤ `Integration runtimes` displays the new Azure-SSIS integration runtime in the
    `Starting` status, as shown in Figure 8-39.


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig39_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig39_HTML.jpg)


    *Figure 8-39. Azure-SSIS-Files is starting*


    After some time – usually 3–5 minutes (maximum) at the time of this writing –
    the Azure-SSIS IR is started and `Connections` ➤ `Integration runtimes` displays
    `Running` status, as shown in Figure 8-40.


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig40_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig40_HTML.jpg)


    *Figure 8-40. Azure-SSIS-Files has started*


    ## Stopping the Azure-SSIS Integration Runtime


    One way to stop an Azure-SSIS IR is using the `Stop` button (the Stop button displays
    a Pause icon) found on `Connections` ➤ `Integration runtimes`, as shown in Figure
    8-41.


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig41_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig41_HTML.jpg)


    *Figure 8-41. Stopping the Azure-SSIS IR*


    Clicking the `Stop` button triggers a confirmation dialog, as shown in Figure
    8-42.


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig42_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig42_HTML.jpg)


    *Figure 8-42. Confirming the stop command*


    At the time of this writing, clicking the `Stop` button on the confirmation dialog
    triggers the survey form shown in Figure 8-43.


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig43_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig43_HTML.jpg)


    *Figure 8-43. A survey dialog triggered by the confirmation dialog*


    Once the survey form is submitted (or cancelled), the Azure-SSIS integration runtime
    enters a `Stopping` state, as shown in Figure 8-44.


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig44_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig44_HTML.jpg)


