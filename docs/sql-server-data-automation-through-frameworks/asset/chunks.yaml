- fmt: '# 5. A Simple, Custom, File-Based SSIS Framework


    If you survey enterprises using SSIS for data integration/engineering, you will
    learn most enterprises do not use the SSIS catalog. Most enterprises execute SSIS
    from the file system. Why? Enterprises with a smaller number of SSIS packages
    outnumber enterprises with large numbers of SSIS packages. Executing a few dozen
    SSIS packages is different – really different – from managing the execution of
    thousands of SSIS packages. Don’t take my word for it; ask any data engineer managing
    a larger enterprise.


    Before the release of SSIS 2012 and the SSIS catalog, SSIS developers had to build
    their own SSIS frameworks. In this chapter, I share one way to build a custom
    file-based SSIS framework.


    There are relatively few benefits to having 45 years’ experience developing software.
    One benefit is living through several architecture pattern cycles, watching them
    wax and then wane in popularity. Old patterns get a fresh coat of virtual paint
    and become new again. (It reminds me of my older daughters asking me, in the 1990s,
    if I’d heard an awesome new band named Aerosmith.) We will see an example in a
    subsequent chapter when we deploy a remarkably similar SSIS framework to Azure
    Data Factory’s Azure-SSIS integration runtime.


    ## An SSIS Framework, Defined and Designed


    We author SSIS frameworks according to a few principles:


    1.  Functionality

    2.  Empathy

    3.  Simplicity


    ### Functionality


    In my opinion, an SSIS framework must accomplish execution, logging, and configuration.
    Execution of SSIS packages includes *grouped* execution. Execution grouping is
    the ability to execute a collection of SSIS packages in a specified order. The
    goal of logging is to surface enough operational information about an SSIS package
    execution to allow an experienced operator or developer to troubleshoot any execution
    error. Configuration promotes code reuse and supports SSIS Design Patterns by
    allowing developers and operators to configure SSIS package properties, parameters,
    and variables at runtime.


    ### Empathy


    “What do you mean by ‘empathy,’ Andy?” I am glad you asked. Empathy in software
    development shows up in user experience, or UX, design considerations. In SSIS
    design and development, empathy manifests by considering the skills of the user.
    In this case, the users consist of SSIS developers and operators. SSIS frameworks
    should employ the KISS (“keep it simple, stupid”) principle. I assume the SSIS
    developer, or SSIS Developer Team, will be familiar with SSIS, so I build the
    SSIS framework *in* SSIS. I want the developer or team to manage and maintain
    their framework.


    ### Simplicity


    > Software should be as complex as required to accomplish the goal, and not more
    complex than necessary.

    >

    > —Andy Leonard, circa 2007


    Managing complexity is hard for software developers. In the end, managing complexity
    is a balancing act between functionality, extensibility, and maintainability.
    An SSIS framework requires some amount of complexity to function, by its very
    nature. Supporting extensions via “extension points” always fails because framework
    authors cannot anticipate every use case in every enterprise. Designing any software
    – including an SSIS framework – should include thoughts about maintenance. Maintainability
    helps strike the balance between maximum functionality and minimum complexity.


    Taken together, functionality, empathy, and simplicity are relatively straightforward
    concepts that are easy to comprehend but difficult to accomplish.


    ## Building a File-Based SSIS Framework


    In this portion of the book, over the next several chapters, we will build the
    components of an SSIS framework that will execute SSIS packages stored in the
    file system. The components of an SSIS framework are


    *   A database for execution and configuration metadata storage, log storage,
    and business logic

    *   An execution management engine built in SSIS


    In this chapter, we focus on


    *   Building the metadata database

    *   Building a test SSIS project

    *   Adding metadata to the metadata database


    ### Obtain the Code


    To obtain the code for this book, visit the catalog page for this book on the
    Apress website ([`www.apress.com`](http://www.apress.com)) or connect to the GitHub
    repository at


    ```

    github.com/aleonard763/FrameworksBook

    ```


    Save the code to a location you can readily access.


    ### Metadata-Driven Execution Management


    Metadata-driven execution management is not a complex topic even though it may
    appear complex at first blush. The example to follow builds a database named `SSISConfig`
    and the execution metadata tables shown in Figure 5-1.


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig1_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig1_HTML.jpg)


    Figure 5-1: Metadata tables for execution management


    ### The `SSISConfig` Database


    The `SSISConfig` database is designed to contain metadata for the framework.


    Create the `SSISConfig` database using the T-SQL shown in Listing 5-1.


    ```sql

    Use [master]

    go

    print ''SSISConfig database''

    If Not Exists(Select [databases].[name]

    From [sys].[databases]

    Where [databases].[name] = N''SSISConfig'')

    begin

    print '' - Create SSISConfig database''

    Create Database SSISConfig

    print '' - SSISConfig database created''

    end

    Else

    begin

    print '' - SSISConfig database already exists.''

    end

    print ''''

    go

    Listing 5-1: Creating the SSISConfig database

    ```


    SQL Server Management Studio (`SSMS`) `Object Explorer` should appear similar
    to Figure 5-2.


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig2_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig2_HTML.jpg)


    Figure 5-2: `SSISConfig` database created


    ### `config` Schema


    At the top of the list of software development best practices is “separation of
    concerns.” One way to separate concerns is decoupling. One can argue database
    development is not software development. Others will argue some software development
    best practices may – perhaps *should* – be used in database development. I am
    in this second camp.


    Add the first schema – `config` – to the `SSISConfig` database using the T-SQL
    shown in Listing 5-2.


    ```sql

    use [SSISConfig]

    go

    print ''Config schema''

    If Not Exists(Select [schemas].[name]

    From [sys].[schemas]

    Where [schemas].[name] = N''config'')

    begin

    print '' - Create config schema''

    declare @sql nvarchar(100) = N''Create Schema config''

    exec(@sql)

    print '' - Config schema created''

    end

    Else

    begin

    print '' - Config schema already exists.''

    end

    print ''''

    go

    Listing 5-2: Creating the config schema

    ```


    Once the `config` schema is created, it can be viewed in the `SSMS` `Object Explorer`.
    Navigate to the `SSISConfig` ➤ `Security` ➤ `Schemas` node as shown in Figure
    5-3.


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig3_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig3_HTML.jpg)


    Figure 5-3: Viewing the `config` schema'
