    As you can see, these new versions of the controllers use a cursor to retrieve
    all of the active stored procedures related to the respective applications, sorted
    by the execution order. The procedure names, along with the values of all of the
    associated keys, are loaded into variables. The stored procedure name is used
    to direct the execution while the key values are used in the messages written
    to `FWDemo.ProcessLog` to track execution and aid in monitoring or troubleshooting.
