- fmt: '### The Config.Applications Table


    In this framework, an `SSIS application` is defined as "a collection of SSIS packages
    configured to execute in a prescribed order." Each application is identified by
    an `ApplicationId` (non-null `int`).


    Each application has a `name` attribute, and the `ApplicationName` must be unique.
    Identifying the application by `ApplicationId` is important for referential integrity.
    Observing the T-SQL for tables in the `config` schema – especially the `config.ApplicationPackages`
    table – you will note the design is third normal form.


    Execute the T-SQL in Listing [5-3](#497846_1_En_5_Chapter.xhtml#PC4) to add the
    `Applications` table to the `config` schema in the `SSISConfig` database.


    ```sql

    use [SSISConfig]

    go

    print ''Config.Applications table''

    If Not Exists(Select [schemas].[name] + ''.'' + [tables].[name] As ➤ [Schema.Table]

    From [sys].[tables]

    Join [sys].[schemas]

    On [schemas].[schema_id] = [tables].[schema_id]

    Where [schemas].[name] = N''config''

    And [tables].[name] = N''Applications'')

    begin

    print '' - Create config.Applications table''

    Create Table [config].[Applications]

    (

    ApplicationId int identity(1, 1)

    Constraint PK_config_Applications Primary Key Clustered

    , ApplicationName nvarchar(255) Not NULL

    Constraint UQ_config_Applications_ApplicationName

    Unique

    )

    print '' - Config.Applications table created''

    end

    Else

    begin

    print '' - Config.Applications table already exists.''

    end

    print ''''

    go

    Listing 5-3

    Adding config.Applications

    ```


    Once executed, the `config.Applications` table appears in Object Explorer as shown
    in Figure [5-4](#497846_1_En_5_Chapter.xhtml#Fig4).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig4_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Config.Applications table


    ### The Config.Packages Table


    Package location metadata is stored in the `config.Packages` table. As we build
    out other versions of this SSIS framework, we will see this is the table that
    changes. The changes are based on where SSIS packages reside in the enterprise.


    Create the `config.Packages` table by executing the T-SQL shown in Listing [5-4](#497846_1_En_5_Chapter.xhtml#PC5).


    ```sql

    use [SSISConfig]

    go

    print ''Config.Packages table''

    If Not Exists(Select [schemas].[name] + ''.'' + [tables].[name] As ➤ [Schema.Table]

    From [sys].[tables]

    Join [sys].[schemas]

    On [schemas].[schema_id] = [tables].[schema_id]

    Where [schemas].[name] = N''config''

    And [tables].[name] = N''Packages'')

    begin

    print '' - Create config.Packages table''

    Create Table [config].[Packages]

    (

    PackageId int identity(1, 1)

    Constraint PK_config_Packages Primary Key Clustered

    , PackageLocation nvarchar(255) Not NULL

    , PackageName nvarchar(255) Not NULL

    , Constraint UQ_config_Packages_PackageName

    Unique(PackageLocation, PackageName)

    )

    print '' - Config.Packages table created''

    end

    Else

    begin

    print '' - Config.Packages table already exists.''

    end

    print ''''

    go

    Listing 5-4

    Creating the config.Packages table

    ```


    Once created, the `config.Packages` table appears in Object Explorer as shown
    in Figure [5-5](#497846_1_En_5_Chapter.xhtml#Fig5).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig5_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Creating config.Packages table


    As mentioned earlier, an `SSIS application` in the framework is a collection of
    packages configured to execute in a specific order. Considering the cardinality
    of applications to packages, it’s obvious the answer is one to many, at least
    in part.


    Consider utility SSIS packages, such as a package that archives flat files after
    the data contained in them has been successfully loaded or staged in a database.
    Such a package – perhaps named `ArchiveFile.dtsx` – could be parameterized with
    parameters like `SourceFilePath` and `DestinationLocation`. `ArchiveFile.dtsx`
    could then be reused in several SSIS applications.


    The cardinality of these applications to the `ArchiveFile.dtsx` package is many-to-one.
    Combining the cardinalities one-to-many and many-to-one, one gets many-to-many.
    Resolving many-to-many in a third normal form design requires an additional table:
    `config.ApplicationPackages` in this case. Create `config.ApplicationPackages`
    using the T-SQL shown in Listing [5-5](#497846_1_En_5_Chapter.xhtml#PC6).


    ```sql

    use [SSISConfig]

    go

    print ''Config.ApplicationPackages table''

    If Not Exists(Select [schemas].[name] + ''.'' + [tables].[name] As ➤ [Schema.Table]

    From [sys].[tables]

    Join [sys].[schemas]

    On [schemas].[schema_id] = [tables].[schema_id]

    Where [schemas].[name] = N''config''

    And [tables].[name] = N''ApplicationPackages'')

    begin

    print '' - Create config.ApplicationPackages table''

    Create Table [config].[ApplicationPackages]

    (

    ApplicationPackageId int identity(1, 1)

    Constraint PK_config_ApplicationPackages Primary Key Clustered

    , ApplicationId int Not NULL

    Constraint FK_config_ApplicationPackages_config_Applications

    Foreign Key References [config].[Applications](ApplicationId)

    , PackageId int Not NULL

    Constraint FK_config_ApplicationPackages_config_Packages

    Foreign Key References [config].[Packages](PackageId)

    , ExecutionOrder int Not NULL

    Constraint DF_config_ApplicationPackages_ExecutionOrder

    Default(10)

    , ApplicationPackageEnabled bit Not NULL

    Constraint DF_config_ApplicationPackages_ApplicationPackageEnabled

    Default(1)

    , FailApplicationOnPackageFailure bit Not NULL

    Constraint ➤ DF_config_ApplicationPackages_FailApplicationOnPackageFailure

    Default(1)

    , Constraint ➤ UQ_config_ApplicationPackages_ApplicationId_PackageId_ExecutionOrder

    Unique(ApplicationId, PackageId, ExecutionOrder)

    )

    print '' - Config.ApplicationPackages table created''

    end

    Else

    begin

    print '' - Config.ApplicationPackages table already exists.''

    end

    print ''''

    go

    Listing 5-5

    Creating the config.ApplicationPackages table

    ```


    When the `config.ApplicationPackages` is created, Object Explorer shows the `SSISConfig`
    tables as shown in Figure [5-6](#497846_1_En_5_Chapter.xhtml#Fig6).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig6_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    The config.ApplicationPackages table


    Examine the `config.ApplicationPackages` table in Object Explorer by expanding
    the Columns, Keys, and Constraints virtual folders as shown in Figure [5-7](#497846_1_En_5_Chapter.xhtml#Fig7).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig7_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Examining the config.ApplicationPackages table


    The `config.ApplicationPackages` table columns are designed to resolve the many-to-many
    cardinality between the `config.Applications` and `config.Packages` tables. Each
    entry maps SSIS package metadata (via `PackageId`) to SSIS application metadata
    (via `ApplicationId`) to an identity column, `ApplicationPackageId`, thereby `resolving`
    (or `bridging`) the many-to-many relationship. Once resolved, this `SSISConfig`
    database design supports the execution of `Application Packages`, which are defined
    as an instance of an SSIS package mapped to an SSIS application. `Application
    Packages` are then, by design, the smallest unit of work in this SSIS framework.'
