    Package Foreach Loop Container’s Variable Mappings page should appear similar
    to Figure [6-37](#497846_1_En_6_Chapter.xhtml#Fig37).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig37_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig37_HTML.jpg)


    Figure 6-37


