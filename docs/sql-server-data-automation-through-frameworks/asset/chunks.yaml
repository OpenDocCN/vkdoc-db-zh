  trans: '

    ## 预配 Azure Data Factory


    Azure 托管了大量服务。通常，Azure 服务可归类为：


    1.  基础设施即服务（IaaS），其中 Azure 托管企业级基础设施，例如虚拟机（VM）。

    2.  平台即服务（PaaS），其中 Azure 提供企业级平台，例如 SQL Server 或 `Azure Data Factory`。


    Azure 用户首先需要 **预配**（provisioning）——即创建——Azure 服务产品的实例。要开始预配一个 `Azure Data Factory`（简称
    ADF）实例，请点击左侧菜单中的“创建资源”，如图 8-2 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig2_HTML.jpg](img/497846_1_En_8_Fig2_HTML.jpg)

    *图 8-2：在 Azure 左侧菜单中创建资源*


    当“新建”页面显示时，搜索“Data Factory”，如图 8-3 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig3_HTML.jpg](img/497846_1_En_8_Fig3_HTML.jpg)

    *图 8-3：在“新建”页面上搜索 Data Factory*


    在“新建”页面上，点击搜索文本框下方的“Data Factory”以打开 Data Factory 页面，如图 8-4 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig4_HTML.jpg](img/497846_1_En_8_Fig4_HTML.jpg)

    *图 8-4：Data Factory 页面*


    点击 Data Factory 页面上的“创建”按钮，打开“新建数据工厂”页面，如图 8-5 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig5_HTML.jpg](img/497846_1_En_8_Fig5_HTML.jpg)

    *图 8-5：添加新的 Azure Data Factory 实例*


    在“新建数据工厂”页面上填写必填字段的值。


    根据 `Azure Data Factory` 的命名规则（`docs.microsoft.com/en-us/azure/data-factory/naming-rules`），`Azure
    Data Factory`、`资源组` 和 `存储帐户` 的名称是全局唯一且不区分大小写的。


    资源组是将相关 Azure 资源进行分组的一种方式。当使用 Azure 资源来学习 Azure 时，资源组允许学生从一个屏幕**删除**该资源组及其所有组成部分。


    您可以从“资源组”下拉菜单中选择一个现有的资源组，或者通过点击“资源组”下拉菜单下方的“新建”链接来创建一个新的资源组，如图 8-6 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig6_HTML.jpg](img/497846_1_En_8_Fig6_HTML.jpg)

    *图 8-6：创建新的资源组*


    在撰写本文时，微软在全球维护着超过 20 个数据中心位置。这些位置旨在帮助使您的应用程序和数据更靠近客户端。多个位置也有助于备份和冗余。


    为了获得最佳响应，请从“位置”下拉菜单中选择一个靠近您的位置，如图 8-7 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig7_HTML.jpg](img/497846_1_En_8_Fig7_HTML.jpg)

    *图 8-7：选择一个位置*


    “启用 GIT”默认是选中的，这非常棒，如图 8-8 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig8_HTML.jpg](img/497846_1_En_8_Fig8_HTML.jpg)

    *图 8-8：启用 GIT 复选框*


    本章不涉及源代码控制，因此请取消选中“启用 GIT”复选框。


    点击“创建”按钮，以按指定配置预配一个 `ADF` 实例。


    几分钟后，`Azure Data Factory` 就预配好了。您可以点击通知中的按钮访问该资源，或将其固定到仪表板，如图 8-9 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig9_HTML.jpg](img/497846_1_En_8_Fig9_HTML.jpg)

    *图 8-9：Azure Data Factory 已预配*


    如果您从通知“提示框”中点击“固定到仪表板”按钮，一个 Data Factory 磁贴将出现在您上次访问的 Azure 仪表板上，显示效果如图 8-10 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig10_HTML.jpg](img/497846_1_En_8_Fig10_HTML.jpg)

    *图 8-10：固定到 Azure 仪表板的 Azure Data Factory 实例*


    与资源组类似，Azure 仪表板也提供了一种对 Azure 资源进行分组的方式。Azure 仪表板允许对来自许多资源组（甚至对管理多个 Azure 订阅的用户来说，还可以跨订阅）的
    Azure 资源进行可视化分组。


    点击磁贴以访问 `Azure Data Factory` 的页面。默认显示“概述”，如图 8-11 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig11_HTML.jpg](img/497846_1_En_8_Fig11_HTML.jpg)

    *图 8-11：Azure Data Factory 页面*


    `Azure Data Factory` 页面右上角的“图钉”图标允许您将此 ADF 实例的磁贴固定到 Azure 仪表板。请记住，您可以配置多个 Azure
    仪表板，ADF 实例磁贴将固定到您最后访问的仪表板。


    点击“创作和监视”链接按钮，访问此 `Azure Data Factory` 实例的 `adf.azure.com`，如图 8-12 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig12_HTML.jpg](img/497846_1_En_8_Fig12_HTML.jpg)

    *图 8-12：Data Factory 概述页面*


    在撰写本文时，Data Factory 概述页面包含以下操作的快捷链接：


    *   创建管道

    *   创建数据流

    *   从模板创建管道

    *   复制数据

    *   配置 SSIS 集成

    *   设置代码存储库


    既然 `Azure Data Factory` 已预配好，下一步就是添加 `Azure 存储`。

    '
- fmt: '## Provisioning Azure Storage


    Azure Blob Storage is a file system available to Azure resources and services.
    Like the file system on servers and laptops, Azure Blob Storage plays a vital
    role in all things Azure. The goal of this section is to describe provisioning
    a simple Azure Storage account. Later, we will use an Azure File Share in this
    account to store SSIS packages and ISPAC files. To learn more about Azure file
    share, please see `docs.microsoft.com/en-us/azure/storage/files/storage-how-to-create-file-share`.


    As when provisioning an ADF instance, click `Create a resource` in the Azure left
    menu. Click `Storage`, and then click `Storage account – blob, file, table, queue`,
    as shown in Figure [8-13](#497846_1_En_8_Chapter.xhtml#Fig13).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig13_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig13_HTML.jpg)

    *Figure 8-13 Provisioning Azure Storage*


    When the `Create storage account` page displays, configure the subscription and
    resource group in the `Project details` section, as shown in Figure [8-14](#497846_1_En_8_Chapter.xhtml#Fig14).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig14_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig14_HTML.jpg)

    *Figure 8-14 Configuring the storage account subscription and resource group*


    In the `Instance details` section, configure the `Storage account name` property,
    as shown in Figure [8-15](#497846_1_En_8_Chapter.xhtml#Fig15).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig15_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig15_HTML.jpg)

    *Figure 8-15 Configuring the Storage account name property*


    The next step is to configure the `Location` property in the `Instance details`
    section, as shown in Figure [8-16](#497846_1_En_8_Chapter.xhtml#Fig16).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig16_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig16_HTML.jpg)

    *Figure 8-16 Configuring the Location property*


    For the purposes of this example, `Standard` Performance will suffice, as shown
    in Figure [8-17](#497846_1_En_8_Chapter.xhtml#Fig17).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig17_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig17_HTML.jpg)

    *Figure 8-17 Configuring the Performance property*


    Configure the `Account kind` property next. Set `Account kind` to `StorageV2 (general
    purpose v2)`, as shown in Figure [8-18](#497846_1_En_8_Chapter.xhtml#Fig18).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig18_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig18_HTML.jpg)

    *Figure 8-18 Configuring the Account kind property*


    For the purposes of the example, setting the `Replication` property to `Locally-redundant
    storage (LRS)` will suffice, as shown in Figure [8-19](#497846_1_En_8_Chapter.xhtml#Fig19).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig19_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig19_HTML.jpg)

    *Figure 8-19 Configuring the Replication property of the Storage account*


    Accept the default `Access tier` property setting – `Hot` – as shown in Figure
    [8-20](#497846_1_En_8_Chapter.xhtml#Fig20).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig20_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig20_HTML.jpg)

    *Figure 8-20 Configuring the Access tier property*


    The `Basics` tab of the `Create storage account` page is configured as shown in
    Figure [8-21](#497846_1_En_8_Chapter.xhtml#Fig21).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig21_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig21_HTML.jpg)

    *Figure 8-21 The Basics tab, configured*


    For the purposes of this example, leave settings on the `Networking`, `Advanced`,
    and `Tags` tabs set to default. At the bottom of the `Basics` tab, click the `Review
    + create` button (shown in Figure [8-21](#497846_1_En_8_Chapter.xhtml#Fig21)).


    Storage account settings are validated, and the results are displayed, as shown
    in Figure [8-22](#497846_1_En_8_Chapter.xhtml#Fig22).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig22_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig22_HTML.jpg)

    *Figure 8-22 Storage account configuration validation results*


    Note also the text on the button at the bottom of the `Create storage account`
    page changes to `Create`. Click the `Create` button to create the new Storage
    account. Once deployment is complete, the Storage account page and notification
    will display as shown in Figure [8-23](#497846_1_En_8_Chapter.xhtml#Fig23).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig23_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig23_HTML.jpg)

    *Figure 8-23 Storage account, created*


    Now that an Azure Data Factory and Storage account are provisioned, the next step
    is to add an Azure-SSIS integration runtime.'
