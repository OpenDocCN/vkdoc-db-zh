    ## 支持元数据的协调器


    随着控制器新版本的就绪，协调器也需要一个新版本（同样以“MD”为后缀）来执行它们。代码清单 4-8 展示了新协调器的代码。请注意，创建控制器和协调器的独立版本是为了保留原始版本并使其继续运行，以确保框架演示的所有方面保持完整和可用。


    ```sql

    IF EXISTS (SELECT s.name + ''.'' + p.name

    FROM sys.procedures p

    JOIN sys.schemas s

    ON s.schema_id = p.schema_id

    WHERE s.name = ''FWDemo''

    AND p.name = ''ProcessOrchestratorMD'')

    BEGIN

    PRINT '' - 正在删除 FWDemo.ProcessOrchestratorMD 存储过程''

    DROP PROCEDURE FWDemo.ProcessOrchestratorMD

    PRINT '' - FWDemo.ProcessOrchestratorMD 存储过程已删除''

    END

    GO

    CREATE PROCEDURE FWDemo.ProcessOrchestratorMD

    @RunDate smalldatetime = null

    AS


    --

    -- 目的：此存储过程是存储过程框架演示的一部分。

    --      它是执行元数据版本的控制器存储过程的协调器存储过程。

    --


    SET NOCOUNT ON

    /*******************************************************/

    /*           将过程开始记录到过程日志                   */

    /*******************************************************/

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    Values (''Procedure FWDemo.ProcessOrchestratorMD - STARTING'',

    GETDATE()

    )

    IF @RunDate is null

    SET @RunDate = GETDATE()

    DECLARE @RetStat int

    SET @RetStat = 0

    /*******************************************/

    /*           执行 DailyProcessControllerMD */

    /*******************************************/

    EXEC @RetStat = FWDemo.DailyProcessControllerMD

    IF @RetStat <> 0

    GOTO EndOrchestratorMD

    /************************************************************************/

    /*  如果 @RunDate 是某月的第一天，则执行 MonthlyProcessControllerMD */

    /************************************************************************/

    IF DATEPART(DAY, @RunDate) = 1

    BEGIN

    EXEC @RetStat = FWDemo.MonthlyProcessControllerMD

    IF @RetStat <> 0

    GOTO EndOrchestratorMD

    END

    /************************************************************/

    /*           将过程完成记录到过程日志                       */

    /************************************************************/

    EndOrchestratorMD:

    IF @RetStat = 0

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.ProcessOrchestratorMD - COMPLETED'',

    GETDATE()

    )

    END

    ELSE

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.ProcessOrchestratorMD - ERROR'',

    GETDATE()

    )

    END

    RETURN @RetStat

    GO

    ```


    **代码清单 4-8** 新的元数据协调器


    与原始版本一样，唯一需要设置/计划执行的是带有可选 `@RunDate` 参数覆盖的协调器。代码清单 4-9 展示了执行命令。


    ```sql

    -- 如果运行日期是当前日期：

    EXECUTE FWDemo.ProcessOrchestratorMD

    -- 如果运行日期不是当前日期：

    EXECUTE FWDemo.ProcessOrchestratorMD

    @RunDate = ''''

    -- 注意：<rundate> 格式为 CCYYMMDD

    ```


    **代码清单 4-9** 过程协调器的元数据版本执行语句


    ## 利用元数据进行故障排除


    这是我们已构建系统最基本的元数据设置。那么，像我们在第 3 章最终遇到的错误情况下，如何完成执行呢？假设 `FWDemo.DailyProcess2` 未能成功执行。代码清单
    4-10 显示了来自 `FWDemo.ProcessLog` 的消息，指出了错误发生的位置。


    ```

    ProcessLogID      ProcessLogMessage                                                                                  CreateDate

    39                Procedure FWDemo.ProcessOrchestratorMD – ERROR                         2018-09-17
    20:47:00

    38                Procedure FWDemo.DailyProcessControllerMD – ERROR                    2018-09-17
    20:47:00

    37                Procedure FWDemo.DailyProcess2 – 遇到问题                               2018-09-17
    20:47:00

    36                Procedure FWDemo.DailyProcess2 – 启动中                                 2018-09-17
    20:46:00

    35                正在执行 FWDemo.DailyProcess2 ApplicatonID = 1                          2018-09-17
    20:46:00

    ApplicatonProcessProcedureID = 2

    34                Procedure FWDemo.DailyProcess1 – 已完成                                2018-09-17
    20:46:00

    33                Procedure FWDemo.DailyProcess1 – 启动中                                 2018-09-17
    20:45:00

    32                正在执行 FWDemo.DailyProcess1 ApplicatonID = 1                          2018-09-17
    20:45:00

    ApplicatonProcessProcedureID = 1

    31                Procedure FWDemo.DailyProcessControllerMD – 启动中              2018-09-17
    20:45:00

    30                Procedure FWDemo.ProcessOrchestratorMD – 启动中                   2018-09-17
    20:45:00

    ```


    **代码清单 4-10** 过程日志的输出


    一旦确定解决方案，我们可以从消息中看出 `FWDemo.DailyProcess1` 已经成功运行，因此无需重新运行。我们在消息中看到 `ApplicationProcessProcedureID`
    值是 1。我们可以使用代码清单 4-11 中的代码来禁用 `FWDemo.DailyProcess1`，以便在应用程序执行时它不会运行。


    ```sql

    -- 为重启禁用存储过程的执行

    UPDATE FWDemo.ApplicationProcessProcedure

    SET Active = 0

    WHERE ApplicationProcessProcedureID = 1    -- 或使用过程日志中的值

    ```


    **代码清单 4-11** 禁用执行的代码


    此时，可以像之前一样重新启动计划任务，执行将从 `FWDemo.DailyProcess2` 开始，如代码清单 4-12 所示。任务完成后，只需使用类似代码清单
    4-13 中的代码重置 `FWDemo.DailyProcess1` 的 `Active` 列。


    ```sql

    -- 为下一次执行启用已禁用的存储过程

    UPDATE FWDemo.ApplicationProcessProcedure

    SET Active = 1

    WHERE ApplicationProcessProcedureID = 1    -- 或使用过程日志中的值

    ```


    **代码清单 4-13** 启用已禁用存储过程执行的代码

