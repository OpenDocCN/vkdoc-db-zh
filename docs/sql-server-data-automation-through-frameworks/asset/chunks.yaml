  trans: '

    ### 添加 ApplicationInstanceId 管道变量


    要添加 ApplicationInstanceId 管道变量，请点击管道，然后选择 **“变量”** 选项卡。点击“+ 新建”按钮，并将新变量命名为 `ApplicationInstanceId`，如图
    10-22 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig22_HTML.jpg](img/497846_1_En_10_Fig22_HTML.jpg)


    *图 10-22：添加 ApplicationInstanceId 管道变量*


    “为什么 `ApplicationInstanceId` 变量——一个整数——被声明为字符串变量？”这是一个合理的问题。在撰写本文时，其他变量类型选项是布尔值和数组。`ApplicationInstanceId`
    既不是布尔值，也不是数组。


    ### 配置设置变量活动


    下一步是添加一个 **设置变量** 活动，将 `ApplicationInstanceId` 管道参数的值设置为从 **“记录应用程序实例启动”** 查找活动返回的
    `ApplicationInstanceId` 值。首先，选择“记录应用程序实例启动”查找活动的 **成功** 输出，右键点击 **成功** 输出，然后点击
    **删除**，如图 10-23 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig23_HTML.jpg](img/497846_1_En_10_Fig23_HTML.jpg)


    *图 10-23：从“记录应用程序实例启动”查找活动中删除成功输出*


    要为“记录应用程序实例启动”查找活动添加一个新的 **成功** 输出，请点击 **“添加输出”** 图标，然后点击 **“成功”**，如图 10-24 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig24_HTML.jpg](img/497846_1_En_10_Fig24_HTML.jpg)


    *图 10-24：向“记录应用程序实例启动”查找活动添加新的成功输出*


    将一个 **设置变量** 活动拖到管道画布上，并将其重命名为 `Set ApplicationInstanceId`。点击 **变量** 选项卡，从 **名称**
    属性下拉菜单中选择 `ApplicationInstanceId`。点击 **值** 属性文本框内部，然后点击 **“添加动态内容 [Alt + P]”**
    链接以打开 **设置动态内容** 刃窗。滚动到 **活动输出** 类别，点击 **“记录应用程序实例启动”** 将 `@activity(''Log Application
    Instance Start'').output` 添加到表达式文本框中。将 `@activity(` 编辑为 `@string(activity(`。在表达式末尾追加
    `.firstrow.ApplicationInstanceId)`，以分配从“记录应用程序实例启动”查找活动输出中第一行返回的 `ApplicationInstanceId`
    值，如图 10-25 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig25_HTML.jpg](img/497846_1_En_10_Fig25_HTML.jpg)


    *图 10-25：配置“Set ApplicationInstanceId”设置变量活动*


    将 `Set ApplicationInstanceId` 设置变量活动的 **成功** 输出连接到 **“获取应用程序包”** 查找活动。


    现在，`Set ApplicationInstanceId` 设置变量活动已配置为读取从“记录应用程序实例启动”查找活动返回的 `ApplicationInstanceId`
    值，并将该值存储在 `ApplicationInstanceId` 管道变量中。


    ### 更新存储过程活动


    最后，更新 **“记录应用程序实例成功”** 和 **“记录应用程序实例失败”** 存储过程活动，以使用 `@int(variables(''ApplicationInstanceId''))`
    作为 `ApplicationInstanceId` 存储过程参数，而不是使用“记录应用程序实例启动”查找活动的输出，如图 10-26 所示。


    ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig26_HTML.jpg](img/497846_1_En_10_Fig26_HTML.jpg)


    *图 10-26：使用 @variables(''ApplicationInstanceId'')*


    如前所述，`ApplicationInstanceId` 管道变量是一个字符串。在撰写本文时，在此处和其他地方，该值将被隐式转换为整数。也就是说，在编码时请*有意为之*。这里的“有意为之”指的是显式转换为整数值。


    下一步是添加一个子管道来执行应用程序包。

