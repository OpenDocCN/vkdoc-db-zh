    Subsequent re-executions of the Add SSIS Application Packages T-SQL produce the
    same result.


    The SSIS framework metadata database contains a schema named config. The config
    schema contains three tables:


    1.  Config.Applications


    2.  Config.Packages


    3.  Config.ApplicationPackages


    The tables contain metadata for an application named Framework Test, which is
    related to two SSIS packages named ReportAndSucceed.dtsx and ReportAndFail.dtsx.
    It’s possible to retrieve the metadata by executing the T-SQL shown in Listing
    [5-14](#497846_1_En_5_Chapter.xhtml#PC15).


    ```

    Use [SSISConfig]

    go

    declare @ApplicationName nvarchar(255) = N''Framework Test''

    Select a.ApplicationName

    , p.PackageLocation + p.PackageName As PackagePath

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From [config].[ApplicationPackages] ap

    Join [config].[Applications] a

    On a.ApplicationId = ap.ApplicationId

    Join [config].Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = @ApplicationName

    And ap.ApplicationPackageEnabled = 1

    Order By ap.ExecutionOrder

    Listing 5-14

    Viewing the framework application contents

    ```


    The SSIS framework metadata returned from the T-SQL query shown in Listing [5-14](#497846_1_En_5_Chapter.xhtml#PC15)
    is shown in Figure [5-28](#497846_1_En_5_Chapter.xhtml#Fig28).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig28_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig28_HTML.jpg)


    Figure 5-28


    Results from the SSIS framework metadata query


    The metadata returned from the SSIS framework metadata is more than enough to
    execute in the SSIS framework execution engine. Our next step is to build the
    execution engine for the SSIS framework.


    ## Conclusion


    In this chapter, we focused on


    *   Building the metadata database


    *   Building a test SSIS project


    *   Adding metadata to the metadata database


    The next step is building the execution engine, which we accomplish in the next
    chapter.


    # 6. Framework Execution Engine


    Now that the metadata database and test application have been built in the previous
    chapter, it’s time to focus on the execution engine. Recall that in the previous
    chapter, near the beginning, I emphasized the importance of empathy in software
    architecture and design. I wrote


    > *I assume the SSIS developer, or SSIS Developer Team, will be familiar with
    SSIS, so I build the SSIS framework in SSIS. I want the developer or team to manage
    and maintain their framework.*


    Chapter [5](#497846_1_En_5_Chapter.xhtml) covered building out the framework and
    managing the metadata. Now it’s time to think about how our SSIS packages will
    be executed.


    ## Create a Parent SSIS Package


    Create a new SSIS project named “SSISFrameworkProject” in a new SSIS solution
    named “SSISFrameworkSolution.” Rename the default SSIS package to “Parent.dtsx”
    as shown in Figure [6-1](#497846_1_En_6_Chapter.xhtml#Fig1).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig1_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Renaming the Parent.dtsx SSIS package in the SSISFrameworkProject in SSISFrameworkSolution


    Parent.dtsx will


    *   Log execution values


    *   Retrieve a list of SSIS application packages from the SSISConfig database –
    application packages that belong to an SSIS application


    *   Iterate the retrieved list of application packages


    *   Log metadata about each application package


    *   Execute each application package


    *   Log execution results'
