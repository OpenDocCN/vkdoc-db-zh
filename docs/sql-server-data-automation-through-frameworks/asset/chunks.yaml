    # Parent.dtsx 配置与测试


    图 6-61 展示了 `ChildPackage` 文件连接管理器的 `ConnectionString` 属性，该属性现在是动态的，并由 `User::PackagePath`
    SSIS 变量的值驱动。请记住，`User::PackagePath` SSIS 变量的值是在 `FOREACH Application Package`
    forEach 循环容器中管理的，在该容器中，`User::PackagePath` SSIS 变量由从存储在 `SSISConfig` 数据库中的元数据查询返回的
    ADO.Net 数据集中的每个 `PackagePath` 值填充。因此，一旦配置完成（点击“确定”按钮后），`Parent.dtsx` 将会执行与 SSIS
    应用程序关联的每一个（已启用的）SSIS 框架应用程序包。


    点击“确定”按钮关闭“属性表达式编辑器”。展开 `ChildPackage` 文件连接管理器的“表达式”属性（集合），注意 `ConnectionString`
    属性现在由 `User::PackagePath` SSIS 变量的值管理。同时请注意，`ChildPackage` 文件连接管理器包含表达式，这由 `f(x)`
    装饰所指示，如图 6-62 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig62_HTML.jpg](img/497846_1_En_6_Fig62_HTML.jpg)

    **图 6-62** ChildPackage 文件连接管理器的 ConnectionString 覆盖与表达式装饰


    # 测试执行与结果


    通过启动 SSIS 调试器（`F5`）来测试 `Parent.dtsx` 的操作。乍一看，结果可能显得有些混乱，如图 6-63 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig63_HTML.jpg](img/497846_1_En_6_Fig63_HTML.jpg)

    **图 6-63** 测试执行结果


    注意 `Parent.dtsx` 的测试执行失败了。下方的包执行消息确认了包执行失败，`EPT Execute Child Package` 执行包任务和
    `FOREACH Application Package` forEach 循环容器上的任务失败指示也证实了这一点。


    发生了什么？问得好！打开 `Parent.dtsx` 包选项卡上的“进度/执行结果”选项卡，查看执行期间记录的消息，如图 6-64 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig64_HTML.jpg](img/497846_1_En_6_Fig64_HTML.jpg)

    **图 6-64** 查看“进度/执行结果”选项卡


    图 6-64 显示了 `Parent.dtsx` 执行失败时引发的消息。我们看到了来自 SSIS 应用程序中两个文件的元数据 – `ReportAndSucceed.dtsx`
    和 `ReportAndFail.dtsx` – 由 `SCR Log Application Package Values` 脚本任务记录。缺少的是关于每个
    SSIS 包执行是成功还是失败的指示。


    ## 记录执行结果


    要开始记录执行结果，将一个新的“脚本任务”拖到 `FOREACH Application Package` forEach 循环容器中，然后将新脚本任务重命名为“`SCR
    Log Package Execution Success`”，如图 6-65 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig65_HTML.jpg](img/497846_1_En_6_Fig65_HTML.jpg)

    **图 6-65** 添加 SCR Log Package Execution Success 脚本任务


    打开 `SCR Log Package Execution Success` 脚本任务编辑器。和之前一样，将 `System::PackageName`、`System::TaskName`
    和 `User::PackagePath` SSIS 变量添加到 `ReadOnlyVariables` 属性中，如图 6-66 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig66_HTML.jpg](img/497846_1_En_6_Fig66_HTML.jpg)

    **图 6-66** 填充 ReadOnlyVariables 属性


    点击“编辑脚本”按钮打开 `VstaProjects` 编辑器。将清单 6-5 中所示的 C# .Net 代码添加到 `public void Main()`
    方法中，以在框架中记录 SSIS 应用程序包的成功执行。


    ```

    public void Main()

    {

    // System::PackageName, System::TaskName

    // User::PackagePath

    string packageName = ➤ Dts.Variables["System::PackageName"].Value.ToString();

    string taskName = Dts.Variables["System::TaskName"].Value.ToString();

    string subComponent = packageName + "." + taskName;

    int informationCode = 1001;

    bool fireAgain = true;

    string packagePath = Dts.Variables["User::PackagePath"].Value.ToString();

    string description = packagePath + " execution succeeded";

    Dts.Events.FireInformation(informationCode, subComponent, description, ➤ "", 0,
    ref fireAgain);

    Dts.TaskResult = (int)ScriptResults.Success;

    }

    ```

    **清单 6-5** 用于记录成功的 SSIS 应用程序包执行的 C# .Net 代码


    清单 6-5 中的代码引发了一个 `Information` 事件，该事件构建了一条消息，通知操作员和开发人员 SSIS 框架应用程序包执行已成功，如图 6-67
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig67_HTML.jpg](img/497846_1_En_6_Fig67_HTML.jpg)

    **图 6-67** 在 SSIS 框架应用程序包成功执行时引发 Information 事件


    关闭 `VstaProjects` 窗口，然后点击 `SCR Log Package Execution Success` 脚本任务编辑器上的“确定”按钮。从
    `EPT Execute Child Package` 执行包任务连接一个“成功”优先级约束到 `SCR Log Package Execution Success`
    脚本任务，如图 6-68 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig68_HTML.jpg](img/497846_1_En_6_Fig68_HTML.jpg)

