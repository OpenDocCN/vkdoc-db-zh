    停止 Azure-SSIS IR 的一种方法是使用 `连接` ➤ `集成运行时` 页面上的 `停止` 按钮（停止按钮显示为暂停图标），如图 8-41 所示。


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig41_HTML.jpg](img/497846_1_En_8_Fig41_HTML.jpg)


