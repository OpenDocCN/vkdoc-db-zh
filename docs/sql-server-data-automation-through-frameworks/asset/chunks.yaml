    *   FK_config_ApplicationPackages_config_Applications is a foreign key between
    the config.ApplicationPackages.ApplicationId field and the config.Applications.ApplicationId
    field. Before a row is added to config.ApplicationPackages, a corresponding row
    *must* already exist in the config.Applications table. The Application is mapped
    to a Package that executes at this *position* – denoted by the value of ExecutionOrder –
    in the application.


    *   FK_config_ApplicationPackages_config_Packages is a foreign key between the
    config.ApplicationPackages.PackageId field and the config.Packages.PackageId field.
    Before a row is added to config.ApplicationPackages, a corresponding row *must*
    already exist in the config.Packages table. A Package that executes at a *position* –
    denoted by the value of ExecutionOrder – is mapped into an Application.


    *   UQ_config_ApplicationPackages_ApplicationId_PackageId_ExecutionOrder is a
    unique constraint that guarantees the distinctness – across the ApplicationId,
    PackageId, and ExecutionOrder fields – of each application package stored in the
    config.ApplicationPackages table. This means two (or more) records in the config.ApplicationPackages
    table *may not have identical* ApplicationId, PackageId, and ExecutionOrder field
    values.


    #### Frequently Asked Questions


    Frameworks are new to many data users, and there are several questions we hear
    regularly:


    *   Is it possible for two (or more) records in the config.ApplicationPackages
    table to have the same ApplicationId? Yes. In fact, the framework is designed
    for this use case. Several config.ApplicationPackages records with the same ApplicationId
    value is how the framework is used to configure an SSIS application.


    *   Is it possible for two (or more) records in the config.ApplicationPackages
    table to have the same PackageId? Yes. This supports code reuse, such as executing
    the ArchiveFile.dtsx SSIS package in several applications. This also supports
    an SSIS Design Pattern called “Range-Based Load.” In a Range-Based Load, the *same*
    SSIS package executes several times. New minimum and maximum range values, or
    other mathematical functions, are passed to the package for each execution. For
    example, the same SSIS package could execute ten times. The first execution could
    load records in which a numeric value begins with the numeral “0.” Subsequent
    executions could load data where the numeric value starts with the numerals “1,”
    “2,” and so on.


    We will return to SSMS and development of the SSISConfig database in a bit. Let’s
    next build a sample SSIS solution to use to test the framework.


    ## A Sample SSIS Solution


    Testing is hard. Testing requires thinking, differently, about how users will
    interact with an application. Developers are notoriously bad at testing their
    own code. Why? I believe it’s because development focuses on delivering functionality
    that just works. For some (like me), it’s difficult to change gears and begin
    thinking about all the permutations a user may enter – or *forget* to enter –
    when interacting with our code.


    A first thought for building a sample SSIS solution for testing is, “I can do
    this with one SSIS package.” That’s incorrect. Testing requires at least two SSIS
    packages, one package that succeeds and another that fails.'
  trans: '#### 执行属性


    应用程序包作为最小的工作单元，其一个引申含义是：应用程序包正是我们定义`执行属性`的地方。在此框架中，应用程序包的执行属性包括：


    *   `ExecutionOrder`

    *   `ApplicationPackageEnabled`

    *   `FailApplicationOnPackageFailure`


    `ExecutionOrder` 是一个整数，代表了 SSIS 应用程序定义中“按指定顺序”执行的部分。


    `ApplicationPackageEnabled` 是一个位字段，用于指示当执行 SSIS 应用程序时，单个应用程序包是否被配置为执行。


    `FailApplicationOnPackageFailure` 是一个位，用于配置容错性。设想一下执行一个 SSIS 应用程序时会发生什么：多个 SSIS
    包会按指定顺序执行。在 SSIS 应用程序中具有指定执行顺序的 SSIS 包就是应用程序包。如果我们非常希望一个 SSIS 包能执行、完成并成功，但如果该包因某种原因失败，对于本次特定的
    SSIS 应用程序执行来说并非至关重要，那该怎么办？如果我们只是不太在意这个特定的包是否失败呢？`FailApplicationOnPackageFailure`
    属性将允许该包失败`而不会`终止整个 SSIS 应用程序的执行。


    #### 默认约束


    默认约束管理向表中添加新记录时，如果字段未提供显式值，则列的初始值：


    *   `DF_config_ApplicationPackages_FailApplicationOnPackageFailure` 是一个默认约束，当首次向
    `config.ApplicationPackages` 表添加记录时未提供值，则将 `FailApplicationOnPackageFailure` 位的值设置为
    True (1)。

    *   `DF_config_ApplicationPackages_ApplicationPackageEnabled` 是一个默认约束，当首次向 `config.ApplicationPackages`
    表添加记录时未提供值，则将 `ApplicationPackageEnabled` 位的值设置为 True (1)。

    *   `DF_config_ApplicationPackages_ExecutionOrder` 是一个默认约束，当首次向 `config.ApplicationPackages`
    表添加记录时未提供值，则将 `ExecutionOrder` 整数值设置为 10。


    #### 关系


    键管理着 SSISConfig 数据库中实体之间的关系，也因此管理着 SSIS 框架中的关系：


    *   `config.ApplicationPackages` 表配置了 `PK_config_ApplicationPackages`。每个表都有一个主键用于关系管理。在此框架中，`PK_config_ApplicationPackages`
    有助于标识每个“应用程序-包-执行顺序”的组合。

    *   `FK_config_ApplicationPackages_config_Applications` 是 `config.ApplicationPackages.ApplicationId`
    字段与 `config.Applications.ApplicationId` 字段之间的外键。在向 `config.ApplicationPackages`
    添加行之前，`config.Applications` 表中`必须`已存在对应的行。应用程序映射到在此`位置`（由 `ExecutionOrder` 的值表示）执行的包。

    *   `FK_config_ApplicationPackages_config_Packages` 是 `config.ApplicationPackages.PackageId`
    字段与 `config.Packages.PackageId` 字段之间的外键。在向 `config.ApplicationPackages` 添加行之前，`config.Packages`
    表中`必须`已存在对应的行。一个在某个`位置`（由 `ExecutionOrder` 的值表示）执行的包被映射到一个应用程序中。

    *   `UQ_config_ApplicationPackages_ApplicationId_PackageId_ExecutionOrder` 是一个唯一约束，它保证了存储在
    `config.ApplicationPackages` 表中的每个应用程序包在 `ApplicationId`、`PackageId` 和 `ExecutionOrder`
    字段组合上的唯一性。这意味着 `config.ApplicationPackages` 表中的两个（或多个）记录`可能不具有相同的` `ApplicationId`、`PackageId`
    和 `ExecutionOrder` 字段值。


    #### 常见问题


    框架对许多数据用户来说是新事物，我们经常听到以下几个问题：


    *   `config.ApplicationPackages` 表中两个（或多个）记录是否可能具有相同的 `ApplicationId`？ 是的。实际上，框架就是为此用例设计的。多个具有相同
    `ApplicationId` 值的 `config.ApplicationPackages` 记录正是框架用来配置一个 SSIS 应用程序的方式。

    *   `config.ApplicationPackages` 表中两个（或多个）记录是否可能具有相同的 `PackageId`？ 是的。这支持代码重用，例如在多个应用程序中执行
    `ArchiveFile.dtsx` SSIS 包。这也支持一种称为“基于范围的加载”的 SSIS 设计模式。在基于范围的加载中，*相同的* SSIS 包会执行多次。每次执行时，新的最小和最大范围值，或其他数学函数，会被传递给该包。例如，同一个
    SSIS 包可能执行十次。第一次执行可能加载数值以“0”开头的记录。后续执行可能加载数值以“1”、“2”等开头的数据。


    我们稍后会回到 SSMS 和 SSISConfig 数据库的开发。接下来，让我们先构建一个示例 SSIS 解决方案来测试该框架。


    ## 一个示例 SSIS 解决方案


    测试是困难的。测试需要我们以不同的方式思考用户将如何与应用程序交互。开发人员以不擅长测试自己的代码而闻名。为什么？我相信这是因为开发侧重于交付能正常工作的功能。对于有些人（比如我）来说，要转换思维，开始考虑用户在与我们代码交互时可能输入——或者*忘记*输入——的所有排列组合是很困难的。


    构建用于测试的示例 SSIS 解决方案时，第一个想法可能是：“我可以用一个 SSIS 包来完成。”这是不正确的。测试至少需要两个 SSIS 包，一个包用于成功场景，另一个用于失败场景。'
- fmt: "### Configure Visual Studio 2019 for SSIS Development\n\nBefore you build\
    \ an SSIS 2019 sample solution, you need to download and install Visual Studio\
    \ 2019. To begin, browse to `visualstudio.microsoft.com` and select a version\
    \ of `Visual Studio 2019` to install, as shown in Figure [5-8](#497846_1_En_5_Chapter.xhtml#Fig8).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig8_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig8_HTML.jpg)\n\
    Figure 5-8 Preparing to download Visual Studio 2019\n\nFor the purposes of the\
    \ example used in this book, the `Community 2019` edition will suffice (plus,\
    \ it’s free).\n\nThe next step is to install the `Integration Services` extension.\
    \ `Visual Studio` is an *integrated development environment*, or `IDE`. The `IDE`\
    \ serves as a host, or shell, for various and sundry templates that enable software\
    \ development experiences in different languages and platforms.\n\nBefore `Visual\
    \ Studio 2019`, `SSIS` templates were installed by executing a `SQL Server Data\
    \ Tools`, or `SSDT`, stand-alone installer. Starting with `Visual Studio 2019`,\
    \ `SSIS` templates are managed in the `Visual Studio Marketplace` as another available\
    \ `Visual Studio` extension.\n\nTo find and install the `Integration Services`\
    \ extension in `Visual Studio 2019`, open `Visual Studio` and click `Extensions`\
    \ ➤ `Manage Extensions`, as shown in Figure [5-9](#497846_1_En_5_Chapter.xhtml#Fig9).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig9_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig9_HTML.jpg)\n\
    Figure 5-9 Preparing to install the Integration Services extension\n\nWhen the\
    \ `Manage Extensions` dialog displays, search for “`Integration Services`” in\
    \ the search textbox. Select the “`SQL Server Integration Services Projects`”\
    \ extension, and then click the `Download` button, as shown in Figure [5-10](#497846_1_En_5_Chapter.xhtml#Fig10).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig10_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig10_HTML.jpg)\n\
    Figure 5-10 Downloading the “SQL Server Integration Services Projects” extension\n\
    \nWhen the new extension is downloaded, follow the instructions presented from\
    \ the `Visual Studio 2019` extension process. The extension installation process\
    \ likely begins with closing the `Visual Studio IDE`. When the extension installation\
    \ is complete, `Visual Studio 2019` may be used to develop `SSIS` projects.\n\n\
    ### Create the Sample SSIS Solution\n\nTo begin, create a new `SSIS` solution\
    \ named `TestSSISSolution` – containing a new `SSIS` project named `TestSSISProject`\
    \ – as shown in Figure [5-11](#497846_1_En_5_Chapter.xhtml#Fig11).\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig11_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig11_HTML.jpg)\n\
    Figure 5-11 Creating the TestSSISProject in TestSSISSolution\n\nWhen the project\
    \ opens, rename the default `SSIS` package to “`ReportAndSucceed.dtsx`” as shown\
    \ in Figure [5-12](#497846_1_En_5_Chapter.xhtml#Fig12).\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig12_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig12_HTML.jpg)\n\
    Figure 5-12 Renaming the package “ReportAndSucceed.dtsx”\n\nAdd a `Script Task`\
    \ to the `ReportAndSucceed`’s Control Flow by dragging a `Script Task` from the\
    \ `SSIS Toolbox` onto the Control canvas, and then rename it to “`SCR Log Values`,”\
    \ as shown in Figure [5-13](#497846_1_En_5_Chapter.xhtml#Fig13).\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig13_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig13_HTML.jpg)\n\
    Figure 5-13 Adding and renaming “SCR Log Values” script task\n\nOpen the `Script\
    \ Task Editor` by right-clicking the “`SCR Log Values`” script task and clicking\
    \ “`Edit`.” When the “`SCR Log Values`” script task editor displays, add the following\
    \ variables to the `ReadOnlyVariables` property list:\n*   `System::PackageName`\n\
    *   `System::TaskName`\n\nThe `Script Task Editor` will appear as shown in Figure\
    \ [5-14](#497846_1_En_5_Chapter.xhtml#Fig14).\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig14_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig14_HTML.jpg)\n\
    Figure 5-14 Adding System::PackageName and System::TaskName to ReadOnlyVariables\n\
    \nClick the `Edit Script` button, and enter the `C#` shown in Listing [5-6](#497846_1_En_5_Chapter.xhtml#PC7)\
    \ into the `public void Main()` method.\n\n```\npublic void Main()\n{\n    string\
    \ packageName = Dts.Variables[\"System::PackageName\"].Value.ToString();\n   \
    \ string taskName = Dts.Variables[\"System::TaskName\"].Value.ToString();\n  \
    \  string subComponent = packageName + \".\" + taskName;\n    int informationCode\
    \ = 1001;\n    bool fireAgain = true;\n    string description = \"I am \" + packageName;\n\
    \    Dts.Events.FireInformation(informationCode, subComponent, description, \"\
    \", 0, ref fireAgain);\n    Dts.TaskResult = (int)ScriptResults.Success;\n}\n\
    ```\nListing 5-6 `Main()` method `C#` to configure raising an Information event\
    \ in the ReportAndSucceed SSIS package\n\nWhen the code has been entered into\
    \ the `Main()` method, it will appear as shown in Figure [5-15](#497846_1_En_5_Chapter.xhtml#Fig15).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig15_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig15_HTML.jpg)\n\
    Figure 5-15 Main() method C# that raises an Information event\n\nClose the Script\
    \ editor window, and click the `OK` button on the `SCR Log Values` script task.\
    \ Click `Debug` ➤ `Start Debugging` as shown in Figure [5-16](#497846_1_En_5_Chapter.xhtml#Fig16).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig16_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig16_HTML.jpg)\n\
    Figure 5-16 Starting a debug execution of the ReportAndSucceed package\n\nWhen\
    \ execution completes – and hopefully succeeds – click the `Progress` (or `Execution\
    \ Results`, if you stop the debugger) to view the `Information` event we configure\
    \ in the `SCR Log Values` script task as shown in Figure [5-17](#497846_1_En_5_Chapter.xhtml#Fig17).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig17_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig17_HTML.jpg)\n\
    Figure 5-17 The Information event\n\nThe `Information` event reads: “`[ReportAndSucceed.SCR\
    \ Log Values] Information: I am ReportAndSucceed`”.\n\nThe first part of the message\
    \ is the `subComponent` and is enclosed in square brackets (“`[]`”). The `subComponent`\
    \ is built from the `Package` name and `Task` name variables: “`ReportAndSucceed.SCR\
    \ Log Values`”. The event name – `Information` – follows the `subComponent`. The\
    \ description is next and reads “`I am ReportAndSucceed`”."
  raw: '### Configure Visual Studio 2019 for SSIS Development


    Before you build an SSIS 2019 sample solution, you need to download and install
    Visual Studio 2019\. To begin, browse to visualstudio.microsoft.com and select
    a version of Visual Studio 2019 to install, as shown in Figure [5-8](#497846_1_En_5_Chapter.xhtml#Fig8).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig8_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Preparing to download Visual Studio 2019


    For the purposes of the example used in this book, the Community 2019 edition
    will suffice (plus, it’s free).


    The next step is to install the Integration Services extension. Visual Studio
    is an *integrated development environment* , or IDE. The IDE serves as a host,
    or shell, for various and sundry templates that enable software development experiences
    in different languages and platforms.


    Before Visual Studio 2019, SSIS templates were installed by executing a SQL Server
    Data Tools, or SSDT, stand-alone installer. Starting with Visual Studio 2019,
    SSIS templates are managed in the Visual Studio Marketplace as another available
    Visual Studio extension.


    To find and install the Integration Services extension in Visual Studio 2019,
    open Visual Studio and click Extensions ➤ Manage Extensions, as shown in Figure
    [5-9](#497846_1_En_5_Chapter.xhtml#Fig9).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig9_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Preparing to install the Integration Services extension


    When the Manage Extensions dialog displays, search for “Integration Services”
    in the search textbox. Select the “SQL Server Integration Services Projects” extension,
    and then click the Download button, as shown in in Figure [5-10](#497846_1_En_5_Chapter.xhtml#Fig10).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig10_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Downloading the “SQL Server Integration Services Projects” extension


    When the new extension is downloaded, follow the instructions presented from the
    Visual Studio 2019 extension process. The extension installation process likely
    begins with closing the Visual Studio IDE. When the extension installation is
    complete, Visual Studio 2019 may be used to develop SSIS projects.


    ### Create the Sample SSIS Solution


    To begin, create a new SSIS solution named TestSSISSolution – containing a new
    SSIS project named TestSSISProject – as shown in Figure [5-11](#497846_1_En_5_Chapter.xhtml#Fig11).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig11_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Creating the TestSSISProject in TestSSISSolution


    When the project opens, rename the default SSIS package to “ReportAndSucceed.dtsx”
    as shown in Figure [5-12](#497846_1_En_5_Chapter.xhtml#Fig12).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig12_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Renaming the package “ReportAndSucceed.dtsx”


    Add a Script Task to the ReportAndSucceed’s Control Flow by dragging a Script
    Task from the SSIS Toolbox onto the Control canvas, and then rename it to “SCR
    Log Values,” as shown in Figure [5-13](#497846_1_En_5_Chapter.xhtml#Fig13).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig13_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Adding and renaming “SCR Log Values” script task


    Open the Script Task Editor by right-clicking the “SCR Log Values” script task
    and clicking “Edit.” When the “SCR Log Values” script task editor displays, add
    the following variables to the ReadOnlyVariables property list:


    *   System::PackageName


    *   System::TaskName


    The Script Task Editor will appear as shown in Figure [5-14](#497846_1_En_5_Chapter.xhtml#Fig14).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig14_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Adding System::PackageName and System::TaskName to ReadOnlyVariables


    Click the Edit Script button, and enter the C# shown in Listing [5-6](#497846_1_En_5_Chapter.xhtml#PC7)
    into the public void `Main()` method.


    ```

    public void Main()

    {

    string packageName = ➤ Dts.Variables["System::PackageName"].Value.ToString();

    string taskName = ➤ Dts.Variables["System::TaskName"].Value.ToString();

    string subComponent = packageName + "." + taskName;

    int informationCode = 1001;

    bool fireAgain = true;

    string description = "I am " + packageName;

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    Dts.TaskResult = (int)ScriptResults.Success;

    }

    Listing 5-6

    Main() method C# to configure raising an Information event in the ReportAndSucceed
    SSIS package

    ```


    When the code has been entered into the `Main()` method, it will appear as shown
    in Figure [5-15](#497846_1_En_5_Chapter.xhtml#Fig15).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig15_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Main() method C# that raises an Information event


    Close the Script editor window, and click the OK button on the SCR Log Values
    script task. Click Debug ➤ Start Debugging as shown in Figure [5-16](#497846_1_En_5_Chapter.xhtml#Fig16).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig16_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Starting a debug execution of the ReportAndSucceed package


    When execution completes – and hopefully succeeds – click the Progress (or Execution
    Results, if you stop the debugger) to view the Information event we configure
    in the SCR Log Values script task as shown in Figure [5-17](#497846_1_En_5_Chapter.xhtml#Fig17).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig17_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    The Information event


    The Information event reads: “`[ReportAndSucceed.SCR Log Values] Information:
    I am ReportAndSucceed`”.


    The first part of the message is the `subComponent` and is enclosed in square
    brackets (“[]”). The subComponent is built from the Package name and Task name
    variables: “`ReportAndSucceed.SCR Log Values`”. The event name – `Information` –
    follows the subComponent. The description is next and reads “`I am ReportAndSucceed`”.'
  trans: "### 配置 Visual Studio 2019 进行 SSIS 开发\n\n在构建 SSIS 2019 示例解决方案之前，您需要下载并安装\
    \ Visual Studio 2019。首先，浏览到 `visualstudio.microsoft.com` 并选择要安装的 `Visual Studio\
    \ 2019` 版本，如图 5-8 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig8_HTML.jpg](img/497846_1_En_5_Fig8_HTML.jpg)\n\
    图 5-8 准备下载 Visual Studio 2019\n\n出于本书示例的目的，`Community 2019` 版本已经足够（而且它是免费的）。\n\
    \n下一步是安装 `Integration Services` 扩展。`Visual Studio` 是一个*集成开发环境*，或称 `IDE`。该 `IDE`\
    \ 作为一个宿主或外壳，承载着各种各样的模板，使得在不同语言和平台上进行软件开发成为可能。\n\n在 `Visual Studio 2019` 之前，`SSIS`\
    \ 模板是通过执行一个 `SQL Server Data Tools`（即 `SSDT`）独立安装程序来安装的。从 `Visual Studio 2019`\
    \ 开始，`SSIS` 模板在 `Visual Studio Marketplace` 中作为另一个可用的 `Visual Studio` 扩展进行管理。\n\
    \n要在 `Visual Studio 2019` 中找到并安装 `Integration Services` 扩展，请打开 `Visual Studio`\
    \ 并单击 `扩展` ➤ `管理扩展`，如图 5-9 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig9_HTML.jpg](img/497846_1_En_5_Fig9_HTML.jpg)\n\
    图 5-9 准备安装 Integration Services 扩展\n\n当 `管理扩展` 对话框显示时，在搜索框中搜索“`Integration Services`”。选择“`SQL\
    \ Server Integration Services Projects`”扩展，然后单击 `下载` 按钮，如图 5-10 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig10_HTML.jpg](img/497846_1_En_5_Fig10_HTML.jpg)\n\
    图 5-10 下载“SQL Server Integration Services Projects”扩展\n\n当新扩展下载完成后，按照 `Visual\
    \ Studio 2019` 扩展安装程序提供的说明进行操作。扩展安装过程可能会首先关闭 `Visual Studio IDE`。当扩展安装完成后，就可以使用\
    \ `Visual Studio 2019` 来开发 `SSIS` 项目了。\n\n### 创建示例 SSIS 解决方案\n\n首先，创建一个新的名为 `TestSSISSolution`\
    \ 的 `SSIS` 解决方案——其中包含一个名为 `TestSSISProject` 的新 `SSIS` 项目——如图 5-11 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig11_HTML.jpg](img/497846_1_En_5_Fig11_HTML.jpg)\n\
    图 5-11 在 TestSSISSolution 中创建 TestSSISProject\n\n当项目打开后，将默认的 `SSIS` 包重命名为“`ReportAndSucceed.dtsx`”，如图\
    \ 5-12 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig12_HTML.jpg](img/497846_1_En_5_Fig12_HTML.jpg)\n\
    图 5-12 将包重命名为“ReportAndSucceed.dtsx”\n\n通过从 `SSIS 工具箱` 中将一个 `脚本任务` 拖到控制流画布上，将其添加到\
    \ `ReportAndSucceed` 的控制流中，然后将其重命名为“`SCR Log Values`”，如图 5-13 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig13_HTML.jpg](img/497846_1_En_5_Fig13_HTML.jpg)\n\
    图 5-13 添加并重命名“SCR Log Values”脚本任务\n\n右键单击“`SCR Log Values`”脚本任务并单击“`编辑`”以打开 `脚本任务编辑器`。当“`SCR\
    \ Log Values`”脚本任务编辑器显示时，将以下变量添加到 `ReadOnlyVariables` 属性列表中：\n*   `System::PackageName`\n\
    *   `System::TaskName`\n\n`脚本任务编辑器` 将如图 5-14 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig14_HTML.jpg](img/497846_1_En_5_Fig14_HTML.jpg)\n\
    图 5-14 将 System::PackageName 和 System::TaskName 添加到 ReadOnlyVariables\n\n单击 `编辑脚本`\
    \ 按钮，并将清单 5-6 中所示的 `C#` 代码输入到 `public void Main()` 方法中。\n\n```\npublic void Main()\n\
    {\n    string packageName = Dts.Variables[\"System::PackageName\"].Value.ToString();\n\
    \    string taskName = Dts.Variables[\"System::TaskName\"].Value.ToString();\n\
    \    string subComponent = packageName + \".\" + taskName;\n    int informationCode\
    \ = 1001;\n    bool fireAgain = true;\n    string description = \"I am \" + packageName;\n\
    \    Dts.Events.FireInformation(informationCode, subComponent, description, \"\
    \", 0, ref fireAgain);\n    Dts.TaskResult = (int)ScriptResults.Success;\n}\n\
    ```\n清单 5-6 用于在 ReportAndSucceed SSIS 包中配置引发信息事件的 `Main()` 方法 `C#` 代码\n\n代码输入到\
    \ `Main()` 方法后，将如图 5-15 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig15_HTML.jpg](img/497846_1_En_5_Fig15_HTML.jpg)\n\
    图 5-15 引发信息事件的 Main() 方法 C# 代码\n\n关闭脚本编辑器窗口，并在 `SCR Log Values` 脚本任务上单击 `确定` 按钮。单击\
    \ `调试` ➤ `开始调试`，如图 5-16 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig16_HTML.jpg](img/497846_1_En_5_Fig16_HTML.jpg)\n\
    图 5-16 开始调试执行 ReportAndSucceed 包\n\n当执行完成（并且希望成功）后，单击 `进度`（或如果您停止了调试器，则为 `执行结果`）以查看我们在\
    \ `SCR Log Values` 脚本任务中配置的 `信息` 事件，如图 5-17 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig17_HTML.jpg](img/497846_1_En_5_Fig17_HTML.jpg)\n\
    图 5-17 信息事件\n\n`信息` 事件内容为：“`[ReportAndSucceed.SCR Log Values] Information: I am\
    \ ReportAndSucceed`”。\n\n消息的第一部分是 `subComponent`，并包含在方括号（“`[]`”）中。`subComponent`\
    \ 由包名称和任务名称变量构建而成：“`ReportAndSucceed.SCR Log Values`”。事件名称——`Information`——紧随\
    \ `subComponent` 之后。接下来是描述内容：“`I am ReportAndSucceed`”。"
- fmt: "Report and succeed is exactly what happens when this package executes.\n\n\
    Add another SSIS package to the `TestSSISProject` SSIS project, and rename it\
    \ to `ReportAndFail`, as shown in Figure [5-18](#497846_1_En_5_Chapter.xhtml#Fig18).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig18_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig18_HTML.jpg)\n\
    **Figure 5-18** Adding the `ReportAndFail` SSIS package\n\nAs before, add a Script\
    \ Task named `SCR Log Values` to the `ReportAndFail` package. Add the `System::PackageName`\
    \ and `System::TaskName` variables to the `ReadOnlyVariables` property, and then\
    \ click the `Edit Script` button. Add the C# in Listing [5-7](#497846_1_En_5_Chapter.xhtml#PC8)\
    \ to the `Main()` method.\n\n```csharp\npublic void Main()\n{\n    string packageName\
    \ = Dts.Variables[\"System::PackageName\"].Value.ToString();\n    string taskName\
    \ = Dts.Variables[\"System::TaskName\"].Value.ToString();\n    string subComponent\
    \ = packageName + \".\" + taskName;\n    int errorCode = -1001;\n    string description\
    \ = packageName + \" execution failed\";\n    Dts.Events.FireError(errorCode,\
    \ subComponent, description, \"\", 0);\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
    }\n```\n**Listing 5-7** `Main()` method C# to configure and raise an Error event\
    \ in the `ReportAndFail` SSIS package\n\nWhen the code has been entered into the\
    \ `Main()` method, it will appear as shown in Figure [5-19](#497846_1_En_5_Chapter.xhtml#Fig19).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig19_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig19_HTML.jpg)\n\
    **Figure 5-19** `Main()` method C# that raises an Error event\n\nClose the Script\
    \ editor window by clicking the \"X\" in the upper-right corner of the VstaProjects\
    \ .Net code editor, or by clicking `File` > `Exit`, and then click the `OK` button\
    \ on the `SCR Log Values` script task. Click `Debug` > `Start Debugging` to start\
    \ debug execution of the `ReportAndFail` SSIS package.\n\nWhen execution completes\
    \ – and hopefully *fails* – click the Progress (or Execution Results, if you stop\
    \ the debugger) to view the Information event we configure in the `SCR Log Values`\
    \ script task as shown in Figure [5-20](#497846_1_En_5_Chapter.xhtml#Fig20).\n\
    \n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig20_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig20_HTML.jpg)\n\
    **Figure 5-20** The Error event\n\nThe error event reads: \"`[ReportAndFail.SCR\
    \ Log Values] Error: ReportAndFail execution failed`\".\n\nThe first part of the\
    \ message is the `subComponent` and is enclosed in square brackets (\"[]\"). The\
    \ `subComponent` is built from the Package name and Task name variables: \"`ReportAndFail.SCR\
    \ Log Values`\". The event name – `Error` – follows the `subComponent`. The description\
    \ is next and reads \"`ReportAndFail execution failed`\".\n\nReport and fail is\
    \ exactly what happens when this package executes.\n\nAt a minimum, a test project\
    \ should include components that succeed *and* fail.\n\n## SSIS Framework Metadata\
    \ Management\n\nIn enterprise architecture or any flavor of development, solving\
    \ one problem often creates a new problem, or problems. I call this \"there’s\
    \ no free lunch.\" Growing through the \"there’s no free lunch\" phase is a rite\
    \ of passage for developers, it’s a natural part of maturing, and it’s a *requirement*\
    \ for technology architects.\n\nFor example, the SSIS framework described in this\
    \ chapter will simplify the execution of several SSIS packages in a specified\
    \ order by using metadata. There will be lots of metadata to manage.\n\nThere’s\
    \ no free lunch.\n\nAll people who write T-SQL have preferences regarding capitalization\
    \ and indentation. I am no different. I find my T-SQL capitalization and indentation\
    \ helps me think about the problem I am trying to solve.\n\nAsking yourself or\
    \ your team, \"What is the problem I am/we are trying to solve?\" is potent. Try\
    \ it and see.\n\n### Add an SSIS Application\n\nAdd an SSIS application to the\
    \ SSIS framework by executing the T-SQL shown in Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9).\n\
    \n```sql\nuse [SSISConfig]\ngo\nSet NoCount ON\ndeclare @ApplicationName nvarchar(255)\
    \ = N'Framework Test'\nprint @ApplicationName\ndeclare @ApplicationId int = (Select\
    \ [Applications].[ApplicationId]\n    From [config].[Applications]\n    Where\
    \ [Applications].[ApplicationName] = @ApplicationName)\nIf (@ApplicationId Is\
    \ NULL)\nbegin\n    print ' - Adding ' + @ApplicationName + ' application to config.Applications\
    \ table'\n    declare @AppTbl table(ApplicationId int)\n    Insert Into [config].[Applications]\n\
    \        (ApplicationName)\n    Output inserted.ApplicationId into @AppTbl\n \
    \   Values (@ApplicationName)\n    Set @ApplicationId = (Select ApplicationId\n\
    \        From @AppTbl)\n    print ' - ' + @ApplicationName + ' application added\
    \ to config.Applications table'\nend\nElse\nbegin\n    print ' - ' + @ApplicationName\
    \ + ' application already exists in the config.Applications table.'\nend\nSelect\
    \ @ApplicationId As ApplicationId\nprint ''\n```\n**Listing 5-8** Adding an SSIS\
    \ application\n\nThe T-SQL in Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9)\
    \ is *idempotent*. Idempotence is a mathematical term that means an operation\
    \ may be applied multiple times and produce the same result. Idempotence is another\
