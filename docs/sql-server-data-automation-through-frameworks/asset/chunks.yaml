    int executionOrder = ➤ Convert.ToInt32(Dts.Variables["User::ExecutionOrder"].Value);

    description = "ExecutionOrder: " + executionOrder.ToString();

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    bool failApplicationOnPackageFailure = ➤ Convert.ToBoolean(Dts.Variables["User::FailApplicationOnPackageFailure"]➤

    .Value);

    description = "FailApplicationOnPackageFailure: " + ➤ failApplicationOnPackageFailure.ToString();

    Dts.Events.FireInformation(informationCode, subComponent, ➤ description, "", 0,
    ref fireAgain);

    Dts.TaskResult = (int)ScriptResults.Success;

    }

    ```

    *清单 6-4 记录应用程序包值的代码*


    当 C# .Net 代码被添加到 SCR Log Application Package Values 脚本任务的 VstaProjects 编辑器后，它应如图
    6-43 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig43_HTML.png](img/497846_1_En_6_Fig43_HTML.png)

    *图 6-43 SCR Log Application Package Values 的 C# .Net 代码*


    关闭 `VstaProjects` 窗口并单击 `OK` 按钮以关闭脚本任务编辑器。`Parent.dtsx` 的控制流应如图 6-44 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig44_HTML.jpg](img/497846_1_En_6_Fig44_HTML.jpg)

    *图 6-44 添加 SCR Log Application Package Values 后的 Parent.dtsx 控制流*


    通过在调试器中执行 `Parent.dtsx` 包来测试新功能。按 `F5` 键，然后在调试执行完成后观察“进度”选项卡，如图 6-45 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig45_HTML.jpg](img/497846_1_En_6_Fig45_HTML.jpg)

    *图 6-45 查看由 SCR Log Application Package Values 引发的仪表板消息*


    `Parent.dtsx` 包（即 SSIS 框架执行引擎）的仪表板已接近完成。下一步是执行那些已从 SSIS 框架数据库返回了元数据的子包。'
- fmt: '## Execute Application Packages


    有许多机制可用于执行 SSIS 包，包括：


    *   .NET（C# 和 Visual Basic）

    *   PowerShell

    *   DtExec 命令行

    *   SQL Agent

    *   SSIS 执行包任务


    在此示例中，我们将使用 SSIS 执行包任务。将一个“执行包任务”拖到 `FOREACH Application Package` 循环容器中。从 `SCR
    Log Application Package Values` 向“执行包任务”连接一个优先约束，然后将执行包任务重命名为 `EPT Execute Child
    Package`，如图 [6-46](#497846_1_En_6_Chapter.xhtml#Fig46) 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig46_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig46_HTML.jpg)

    **图 6-46** 添加 EPT Execute Child Package 执行包任务


    打开“执行包任务编辑器”并导航到“包”选项卡。将 `ReferenceType` 属性更改为 `External Reference`，如图 [6-47](#497846_1_En_6_Chapter.xhtml#Fig47)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig47_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig47_HTML.jpg)

    **图 6-47** 将执行包任务的 `ReferenceType` 属性更改为 `External Reference`


    将 `EPT Execute Child Package` 执行包任务的 `Location` 属性更改为 `File system`，如图 [6-48](#497846_1_En_6_Chapter.xhtml#Fig48)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig48_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig48_HTML.jpg)

    **图 6-48** 设置 `EPT Execute Child Package` 执行包任务的 `Location` 属性


    一旦 `EPT Execute Child Package` 执行包任务的 `Location` 属性被更改为 `File system`，编辑器中会显示一个新属性
    — `Connection`。通过点击下拉菜单并选择 `<New connection…>` 开始配置新连接，如图 [6-49](#497846_1_En_6_Chapter.xhtml#Fig49)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig49_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig49_HTML.jpg)

    **图 6-49** 选择 `<New connection…>` 以创建新连接


    由于 `ReferenceType` 属性被设置为 `External Reference` 且 `Location` 属性被设置为 `File system`，`EPT
    Execute Child Package` 执行包任务的 `Connection` 属性期望连接到一个文件 — 一个 *SSIS 包文件* 或 `.dtsx`
    文件 — 因此“新建连接”操作会创建一个新的“文件连接管理器”并打开其编辑器，如图 [6-50](#497846_1_En_6_Chapter.xhtml#Fig50)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig50_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig50_HTML.jpg)

    **图 6-50** 准备配置的文件连接管理器


    将文件连接管理器的 `Usage type` 属性保留为 `Existing file`。点击“浏览”按钮并导航到 `TestSSISSolution\TestSSISProject`
    文件夹中的 `ReportAndSucceed.dtsx` 文件，如图 [6-51](#497846_1_En_6_Chapter.xhtml#Fig51)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig51_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig51_HTML.jpg)

    **图 6-51** 浏览到 `TestSSISSolution\TestSSISProject` 文件夹中的 `ReportAndSucceed.dtsx`
    文件


    一旦选择了 `TestSSISSolution\TestSSISProject\ReportAndSucceed.dtsx` 文件，“文件连接管理器编辑器”将如图
    [6-52](#497846_1_En_6_Chapter.xhtml#Fig52) 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig52_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig52_HTML.jpg)

    **图 6-52** 已选择 `TestSSISSolution\TestSSISProject\ReportAndSucceed.dtsx` 文件


    点击“文件连接管理器编辑器”的“确定”按钮返回到 `EPT Execute Child Package` 执行包任务编辑器，其外观将类似于图 [6-53](#497846_1_En_6_Chapter.xhtml#Fig53)。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig53_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig53_HTML.jpg)

    **图 6-53** 已配置的 `EPT Execute Child Package` 和 `ReportAndSucceed.dtsx` 文件连接管理器


    点击 `EPT Execute Child Package` 执行包任务编辑器的“确定”按钮。


    右键单击 `ReportAndSucceed.dtsx` 文件连接管理器，然后单击“重命名”，如图 [6-54](#497846_1_En_6_Chapter.xhtml#Fig54)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig54_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig54_HTML.jpg)

    **图 6-54** 重命名 `ReportAndSucceed.dtsx` 文件连接管理器


    将文件连接管理器重命名为 `ChildPackage`，如图 [6-55](#497846_1_En_6_Chapter.xhtml#Fig55) 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig55_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig55_HTML.jpg)

    **图 6-55** 将文件连接管理器重命名为 `ChildPackage`


    为了执行从 `FOREACH Application Package`（它从查询 `SSISConfig` 数据库获取元数据）提供的 SSIS 应用程序包，`ChildPackage`
    文件连接管理器的 `ConnectionString` 属性需要是动态的。SSIS 表达式旨在为运行时的包、容器和任务提供动态值。


    单击 `ChildPackage` 文件连接管理器以选中它，然后按 `F4` 键打开 `ChildPackage` 文件连接管理器的属性，如图 [6-56](#497846_1_En_6_Chapter.xhtml#Fig56)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig56_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig56_HTML.jpg)

    **图 6-56** 打开 `ChildPackage` 文件连接管理器的属性


    单击 `Expressions` 属性，然后单击 `Expressions` 属性值区域中的省略号（`...`），如图 [6-57](#497846_1_En_6_Chapter.xhtml#Fig57)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig57_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig57_HTML.jpg)

    **图 6-57** 单击 `Expressions` 省略号


    单击 `Expressions` 属性省略号会打开“属性表达式编辑器”，如图 [6-58](#497846_1_En_6_Chapter.xhtml#Fig58)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig58_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig58_HTML.jpg)

    **图 6-58** 文件连接管理器属性表达式编辑器对话框属性


    从“属性”下拉列表中选择 `ConnectionString` 属性，如图 [6-59](#497846_1_En_6_Chapter.xhtml#Fig59)
    所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig59_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig59_HTML.jpg)

    **图 6-59** 选择文件连接管理器的 `ConnectionString` 属性


    单击“属性表达式编辑器”中“表达式”列中的省略号（图 [6-59](#497846_1_En_6_Chapter.xhtml#Fig59) 中已圈出）以打开“表达式生成器”，如图
    [6-60](#497846_1_En_6_Chapter.xhtml#Fig60) 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig60_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig60_HTML.jpg)

    **图 6-60** 表达式生成器


    在“表达式生成器”中，展开“系统变量”虚拟文件夹，单击并按住 `User::PackagePath` SSIS 变量，然后将其拖到“表达式”文本框中，如图
    [6-60](#497846_1_En_6_Chapter.xhtml#Fig60) 所示。单击“表达式生成器”的“确定”按钮返回到“属性表达式编辑器”，如图
    [6-61](#497846_1_En_6_Chapter.xhtml#Fig61) 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig61_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig61_HTML.jpg)

    **图 6-61** 已配置 `ConnectionString` 属性的属性表达式编辑器'
  raw: '## Execute Application Packages


    There are a number of mechanisms available for executing SSIS packages, including


    *   .Net (C# and Visual Basic)


    *   PowerShell


    *   DtExec command-line


    *   SQL Agent


    *   SSIS Execute Package Task


    In this example, we will use the SSIS Execute Package Task. Drag an Execute Package
    Task into the FOREACH Application Package Foreach Loop Container. Connect a precedence
    constraint to the Execute Package Task from SCR Log Application Package Values,
    and then rename the Execute Package Task to “EPT Execute Child Package,” as shown
    in Figure [6-46](#497846_1_En_6_Chapter.xhtml#Fig46).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig46_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig46_HTML.jpg)


    Figure 6-46


    Adding the EPT Execute Child Package Execute Package Task


    Open the Execute Package Task Editor and navigate to the Package page. Change
    the ReferenceType property to External Reference, as shown in Figure [6-47](#497846_1_En_6_Chapter.xhtml#Fig47).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig47_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig47_HTML.jpg)


    Figure 6-47


    Changing the Execute Package Task’s ReferenceType property to External Reference


    Change the EPT Execute Child Package execute package task’s Location property
    to “File system,” as shown in Figure [6-48](#497846_1_En_6_Chapter.xhtml#Fig48).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig48_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig48_HTML.jpg)


    Figure 6-48


    Setting the EPT Execute Child Package execute package task’s Location property


    Once the EPT Execute Child Package execute package task’s Location property is
    changed to File system, a new property – Connection – is surfaced in the editor.
    Begin configuring a new connection by clicking the drop-down and selecting “<New
    connection…>” as shown in Figure [6-49](#497846_1_En_6_Chapter.xhtml#Fig49).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig49_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig49_HTML.jpg)


    Figure 6-49


    Select “<New connection…>” to create a new connection


    Because the ReferenceType property is set to External Reference and the Location
    property is set to File system, the EPT Execute Child Package execute package
    task’s Connection property expects to connect to a file – an *SSIS Package file*
    or dtsx file – so the New Connection operation creates a new File Connection Manager
    and opens its editor, as shown in Figure [6-50](#497846_1_En_6_Chapter.xhtml#Fig50).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig50_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig50_HTML.jpg)


    Figure 6-50


    A File Connection Manager ready for configuration


    Leave the “Usage type” file connection manager property set to “Existing file.”
    Click the Browse button and navigate to the ReportAndSucceed.dtsx file in the
    TestSSISSolution\TestSSISProject folder, as shown in Figure [6-51](#497846_1_En_6_Chapter.xhtml#Fig51).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig51_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig51_HTML.jpg)


    Figure 6-51


    Browsing to the ReportAndSucceed.dtsx file in the TestSSISSolution\TestSSISProject
    folder


    Once the TestSSISSolution\TestSSISProject\ReportAndSucceed.dtsx file is selected,
    the File Connection Manager Editor will appear similar to Figure [6-52](#497846_1_En_6_Chapter.xhtml#Fig52).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig52_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig52_HTML.jpg)


    Figure 6-52


    TestSSISSolution\TestSSISProject\ReportAndSucceed.dtsx file selected


    Click the OK button on the File Connection Manager Editor to return to the EPT
    Execute Child Package execute package task editor, which appear similar to Figure
    [6-53](#497846_1_En_6_Chapter.xhtml#Fig53).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig53_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig53_HTML.jpg)


    Figure 6-53


    Configured EPT Execute Child Package and ReportAndSucceed.dtsx File Connection
    Manager


    Click the OK button on the EPT Execute Child Package execute package task editor.


    Right-click the ReportAndSucceed.dtsx file connection manager, and then click
    Rename as shown in Figure [6-54](#497846_1_En_6_Chapter.xhtml#Fig54).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig54_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig54_HTML.jpg)


    Figure 6-54


    Renaming the ReportAndSucceed.dtsx File Connection Manager


    Rename the File Connection Manager to “ChildPackage,” as shown in Figure [6-55](#497846_1_En_6_Chapter.xhtml#Fig55).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig55_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig55_HTML.jpg)


    Figure 6-55


    Renaming the File Connection Manager “ChildPackage”


    In order to execute the SSIS application package supplied from FOREACH Application
    Package (which gets metadata from querying the SSISConfig database), the ChildPackage
    file connection manager ConnectionString property needs to be dynamic. SSIS Expressions
    are designed to provide dynamic values to the package, containers, and tasks at
    runtime.


    Click the ChildPackage file connection manager to select it, and then press the
    F4 key to open the ChildPackage file connection manager’s properties, as shown
    in Figure [6-56](#497846_1_En_6_Chapter.xhtml#Fig56).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig56_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig56_HTML.jpg)


    Figure 6-56


    Opening Properties for the ChildPackage file connection manager


    Click the Expressions property, and then click the ellipsis in the Expressions
    property value area, as shown in Figure [6-57](#497846_1_En_6_Chapter.xhtml#Fig57).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig57_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig57_HTML.jpg)


    Figure 6-57


    Clicking the Expressions ellipsis


    Clicking the Expressions property ellipsis opens the Property Expressions Editor,
    as shown in Figure [6-58](#497846_1_En_6_Chapter.xhtml#Fig58).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig58_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig58_HTML.jpg)


    Figure 6-58


    File Connection Manager Property Expressions Editor dialog properties


    Select the ConnectionString property from the Property drop-down as shown in Figure
    [6-59](#497846_1_En_6_Chapter.xhtml#Fig59).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig59_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig59_HTML.jpg)


    Figure 6-59


    Selecting the ConnectionString property of the File Connection Manager


    Click the ellipsis in the Expression column of the Property Expressions Editor
    (circled in Figure [6-59](#497846_1_En_6_Chapter.xhtml#Fig59)) to open the Expression
    Builder, as shown in Figure [6-60](#497846_1_En_6_Chapter.xhtml#Fig60).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig60_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig60_HTML.jpg)


    Figure 6-60


    Expression Builder


    In Expression Builder, expand the System Variables virtual folder, click and hold
    the User::PackagePath SSIS variable, and then drag the User::PackagePath SSIS
    variable into the “Expression” textbox as shown in Figure [6-60](#497846_1_En_6_Chapter.xhtml#Fig60).
    Click the OK button on Expression Builder to return to the Property Expressions
    Editor, as shown in Figure [6-61](#497846_1_En_6_Chapter.xhtml#Fig61).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig61_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig61_HTML.jpg)


    Figure 6-61


    Property Expressions Editor with a configured ConnectionString property'
