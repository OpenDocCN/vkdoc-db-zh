    Add another SSIS package to the TestSSISProject SSIS project, and rename it to
    “ReportAndFail,” as shown in Figure [5-18](#497846_1_En_5_Chapter.xhtml#Fig18).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig18_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    Adding the ReportAndFail SSIS package


    As before, add a Script Task named “SCR Log Values” to the ReportAndFail package.
    Add the System::PackageName and System::TaskName variables to the ReadOnlyVariables
    property, and then click the Edit Script button. Add the C# in Listing [5-7](#497846_1_En_5_Chapter.xhtml#PC8)
    to the `Main()` method.


    ```

    public void Main()

    {

    string packageName = ➤ Dts.Variables["System::PackageName"].Value.ToString();

    string taskName = ➤ Dts.Variables["System::TaskName"].Value.ToString();

    string subComponent = packageName + "." + taskName;

    int errorCode = -1001;

    string description = packageName + " execution failed";

    Dts.Events.FireError(errorCode, subComponent, description, "", ➤ 0);

    Dts.TaskResult = (int)ScriptResults.Success;

    }

    Listing 5-7

    Main() method C# to configure and raise an Error event in the ReportAndFail SSIS
    package

    ```


    When the code has been entered into the `Main()` method, it will appear as shown
    in Figure [5-19](#497846_1_En_5_Chapter.xhtml#Fig19).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig19_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig19_HTML.jpg)


    Figure 5-19


    Main() method C# that raises an Error event


    Close the Script editor window by clicking the “X” in the upper-right corner of
    the VstaProjects .Net code editor, or by clicking File ➤ Exit, and then click
    the OK button on the SCR Log Values script task. Click Debug ➤ Start Debugging
    to start debug execution of the ReportAndFail SSIS package.


    When execution completes – and hopefully *fails* – click the Progress (or Execution
    Results, if you stop the debugger) to view the Information event we configure
    in the SCR Log Values script task as shown in Figure [5-20](#497846_1_En_5_Chapter.xhtml#Fig20).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig20_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig20_HTML.jpg)


    Figure 5-20


    The Error event


    The error event reads: “`[ReportAndFail.SCR Log Values] Error: ReportAndFail execution
    failed`”.


    The first part of the message is the `subComponent` and is enclosed in square
    brackets (“[]”). The subComponent is built from the Package name and Task name
    variables: “`ReportAndFail.SCR Log Values`”. The event name – `Error` – follows
    the subComponent. The description is next and reads “`ReportAndFail execution
    failed`”.


    Report and fail is exactly what happens when this package executes.


    At a minimum, a test project should include components that succeed *and* fail.


    ## SSIS Framework Metadata Management


    In enterprise architecture or any flavor of development, solving one problem often
    creates a new problem, or problems. I call this “there’s no free lunch.” Growing
    through the “there’s no free lunch” phase is a rite of passage for developers,
    it’s a natural part of maturing, and it’s a *requirement* for technology architects.


    For example, the SSIS framework described in this chapter will simplify the execution
    of several SSIS packages in a specified order by using metadata. There will be
    lots of metadata to manage.


    There’s no free lunch.


    All people who write T-SQL have preferences regarding capitalization and indentation.
    I am no different. I find my T-SQL capitalization and indentation helps me think
    about the problem I am trying to solve.


    Asking yourself or your team, “What is the problem I am/we are trying to solve?”
    is potent. Try it and see.


    ### Add an SSIS Application


    Add an SSIS application to the SSIS framework by executing the T-SQL shown in
    Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9).


    ```

    use [SSISConfig]

    go

    Set NoCount ON

    declare @ApplicationName nvarchar(255) = N''Framework Test''

    print @ApplicationName

    declare @ApplicationId int = (Select [Applications].[ApplicationId]

    From [config].[Applications]

    Where [Applications].[ApplicationName] = ➤ @ApplicationName)

    If (@ApplicationId Is NULL)

    begin

    print '' - Adding '' + @ApplicationName + '' application to ➤ config.Applications
    table''

    declare @AppTbl table(ApplicationId int)

    Insert Into [config].[Applications]

    (ApplicationName)

    Output inserted.ApplicationId into @AppTbl

    Values (@ApplicationName)

    Set @ApplicationId = (Select ApplicationId

    From @AppTbl)

    print '' - '' + @ApplicationName + '' application added to ➤

    config.Applications table''

    end

    Else

    begin

    print '' - '' + @ApplicationName + '' application already exists in ➤

    the config.Applications table.''

    end

    Select @ApplicationId As ApplicationId

    print ''''

    Listing 5-8

    Adding an SSIS application

    ```


    The T-SQL in Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9) is *idempotent*.
    Idempotence is a mathematical term that means an operation may be applied multiple
    times and produce the same result. Idempotence is another way of saying “re-executable
    code.”


    Applied to the T-SQL code in Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9),
    re-executable code produces the same result in the config.Applications table;
    metadata for a new SSIS application named “Framework Test” is added to the framework.
    The first execution of the T-SQL in Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9)
    returns the messages (to the Messages tab in SSMS) shown in Listing [5-9](#497846_1_En_5_Chapter.xhtml#PC10).


    ```

    Framework Test

    - Adding Framework Test application to config.Applications table

    - Framework Test application added to config.Applications table

    Listing 5-9

    Messages returned when adding the Framework Test SSIS application for the first
    time

    ```


    The result, which is the ApplicationId for the “Framework Test” SSIS application,
    is shown in Figure [5-21](#497846_1_En_5_Chapter.xhtml#Fig21).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig21_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig21_HTML.jpg)


    Figure 5-21


    “Framework Test” ApplicationId


    Re-executing the Add SSIS Application T-SQL shown in Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9)
    produces the messages shown in Figure [5-22](#497846_1_En_5_Chapter.xhtml#Fig22).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig22_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Re-executing SSIS Application T-SQL


    Re-executing the Add SSIS Application T-SQL shown in Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9)
    produces the *same* results, as shown in Figure [5-23](#497846_1_En_5_Chapter.xhtml#Fig23).


    ![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig23_HTML.jpg](images/497846_1_En_5_Chapter/497846_1_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Identical Framework Test ApplicationId


    Subsequent re-executions of the Add SSIS Application T-SQL produce the same result.'
