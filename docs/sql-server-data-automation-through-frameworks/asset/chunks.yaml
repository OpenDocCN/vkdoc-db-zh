    ## Viewing Execution Report Data


    SSIS framework logging is stored in two tables name [log].[ApplicationInstance]
    and [log].[ApplicationPackageInstance]. Each row in the [log].[ApplicationInstance]
    table contains data about a single execution of an SSIS framework application
    or an *instance* of an application execution. View application instance data using
    the T-SQL query shown in Listing [7-10](#497846_1_En_7_Chapter.xhtml#PC10).


