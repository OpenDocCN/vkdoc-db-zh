    单击“完成”按钮返回到“设置”选项卡，如图 9-50 所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig50_HTML.jpg](img/497846_1_En_9_Fig50_HTML.jpg)


    图 9-50 已配置的 `Execute Application Package` 的包路径属性


