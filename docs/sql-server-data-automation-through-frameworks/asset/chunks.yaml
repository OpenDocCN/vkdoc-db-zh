    \ `ReportAndFail`，如图 5-18 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig18_HTML.jpg](img/497846_1_En_5_Fig18_HTML.jpg)\n\
    **图 5-18** 添加 `ReportAndFail` SSIS 包\n\n像之前一样，向 `ReportAndFail` 包添加一个名为 `SCR Log\
    \ Values` 的脚本任务。将 `System::PackageName` 和 `System::TaskName` 变量添加到 `ReadOnlyVariables`\
