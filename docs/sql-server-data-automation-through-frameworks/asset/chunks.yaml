    ## Summary


    `Metadata` is used as the road map for the execution of the `orchestrator` and
    `controllers`. Most situations can now be handled by the manipulation of the `metadata`
    that controls the execution, and no manual deconstructions and executions are
    necessary. Any new `stored procedures` added to existing `controllers` or `controllers`
    added to existing `orchestrators` can be included simply by deploying the `stored
    procedures` to be compiled and adding the appropriate `metadata`. In most cases,
    if not all, no changes are required to existing `stored procedures`.


    # Part II SSIS Frameworks


