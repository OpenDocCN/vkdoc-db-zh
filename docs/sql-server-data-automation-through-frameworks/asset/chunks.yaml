    \ 用于在 `ReportAndFail` SSIS 包中配置和引发错误事件的 `Main()` 方法 C# 代码\n\n当代码输入到 `Main()` 方法后，它将显示如图\
    \ 5-19 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig19_HTML.jpg](img/497846_1_En_5_Fig19_HTML.jpg)\n\
    **图 5-19** 引发错误事件的 `Main()` 方法 C# 代码\n\n通过单击 VstaProjects .NET 代码编辑器右上角的 \"X\"\
    \ 或单击 `File` > `Exit` 关闭脚本编辑器窗口，然后单击 `SCR Log Values` 脚本任务上的 `OK` 按钮。单击 `Debug`\
    \ > `Start Debugging` 开始调试执行 `ReportAndFail` SSIS 包。\n\n当执行完成时——希望是*失败*——单击进度（或如果停止了调试器，则单击执行结果）以查看我们在\
    \ `SCR Log Values` 脚本任务中配置的*信息*事件，如图 5-20 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig20_HTML.jpg](img/497846_1_En_5_Fig20_HTML.jpg)\n\
    **图 5-20** 错误事件\n\n错误事件显示为：\"`[ReportAndFail.SCR Log Values] Error: ReportAndFail\
    \ execution failed`\"。\n\n消息的第一部分是 `subComponent`，并用方括号（\"[]\"）括起来。`subComponent`\
    \ 由包名和任务名变量构建而成：\"`ReportAndFail.SCR Log Values`\"。事件名——`Error`——跟在 `subComponent`\
    \ 后面。然后是描述，内容为 \"`ReportAndFail execution failed`\"。\n\n报告并失败——这正是该包执行时发生的情况。\n\
    \n一个测试项目至少应包含成功*和*失败的组件。\n\n## SSIS 框架元数据管理\n\n在企业架构或任何类型的开发中，解决一个问题常常会带来一个新的问题，或多个问题。我称之为“天下没有免费的午餐”。经历“天下没有免费的午餐”这个阶段是开发人员成长的必经之路，是成熟过程中的自然部分，并且对于技术架构师来说是一项*必要要求*。\n\
    \n例如，本章描述的 SSIS 框架将通过使用元数据来简化按指定顺序执行多个 SSIS 包的过程。将会有很多元数据需要管理。\n\n天下没有免费的午餐。\n\
    \n所有编写 T-SQL 的人都对大小写和缩进有自己的偏好。我也不例外。我发现我的 T-SQL 大小写和缩进有助于我思考试图解决的问题。\n\n问自己或你的团队：“我/我们试图解决的问题是什么？”是非常有力的。试试看。\n\
    \n### 添加 SSIS 应用程序\n\n通过执行清单 5-8 中所示的 T-SQL，向 SSIS 框架添加一个 SSIS 应用程序。\n\n```sql\n\
    use [SSISConfig]\ngo\nSet NoCount ON\ndeclare @ApplicationName nvarchar(255) =\
    \ N'Framework Test'\nprint @ApplicationName\ndeclare @ApplicationId int = (Select\
    \ [Applications].[ApplicationId]\n    From [config].[Applications]\n    Where\
    \ [Applications].[ApplicationName] = @ApplicationName)\nIf (@ApplicationId Is\
    \ NULL)\nbegin\n    print ' - Adding ' + @ApplicationName + ' application to config.Applications\
    \ table'\n    declare @AppTbl table(ApplicationId int)\n    Insert Into [config].[Applications]\n\
    \        (ApplicationName)\n    Output inserted.ApplicationId into @AppTbl\n \
    \   Values (@ApplicationName)\n    Set @ApplicationId = (Select ApplicationId\n\
    \        From @AppTbl)\n    print ' - ' + @ApplicationName + ' application added\
    \ to config.Applications table'\nend\nElse\nbegin\n    print ' - ' + @ApplicationName\
    \ + ' application already exists in the config.Applications table.'\nend\nSelect\
    \ @ApplicationId As ApplicationId\nprint ''\n```\n**清单 5-8** 添加 SSIS 应用程序\n\n\
    清单 5-8 中的 T-SQL 是*幂等的*。幂等是一个数学术语，意味着一个操作可以应用多次并产生相同的结果。幂等是“可重复执行的代码”的另一种说法。\n\n\
    应用于清单 5-8 中的 T-SQL 代码，可重复执行的代码在 `config.Applications` 表中产生相同的结果；名为 \"Framework\
    \ Test\" 的新 SSIS 应用程序的元数据被添加到框架中。清单 5-8 中 T-SQL 的首次执行返回以下消息（到 SSMS 的消息选项卡），如清单\
    \ 5-9 所示。\n\n```\nFramework Test\n - Adding Framework Test application to config.Applications\
    \ table\n - Framework Test application added to config.Applications table\n```\n\
    **清单 5-9** 首次添加 Framework Test SSIS 应用程序时返回的消息\n\n结果，即 \"Framework Test\" SSIS\
    \ 应用程序的 `ApplicationId`，如图 5-21 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig21_HTML.jpg](img/497846_1_En_5_Fig21_HTML.jpg)\n\
    **图 5-21** \"Framework Test\" 的 `ApplicationId`\n\n重新执行清单 5-8 所示的添加 SSIS 应用程序的\
    \ T-SQL，会产生如图 5-22 所示的消息。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig22_HTML.jpg](img/497846_1_En_5_Fig22_HTML.jpg)\n\
    **图 5-22** 重新执行 SSIS 应用程序 T-SQL\n\n重新执行清单 5-8 所示的添加 SSIS 应用程序的 T-SQL，会产生*相同*的结果，如图\
    \ 5-23 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig23_HTML.jpg](img/497846_1_En_5_Fig23_HTML.jpg)\n\
    **图 5-23** 相同的 Framework Test `ApplicationId`\n\n后续重新执行添加 SSIS 应用程序的 T-SQL 会产生相同的结果。\n"
- fmt: '### Add SSIS Packages


    Add SSIS packages in `TestSSISProject` to the SSIS framework by executing the
    T-SQL shown in Listing [5-10](#497846_1_En_5_Chapter.xhtml#PC11).


    ```sql

    use [SSISConfig]

    go

    Set NoCount ON

    declare @PackageLocation nvarchar(255) = ➤ N''E:\Projects\TestSSISSolution\TestSSISProject\''

    declare @PackageName nvarchar(255) = N''ReportAndSucceed.dtsx''

    print @PackageLocation + @PackageName

    declare @PackageId int = (Select [Packages].[PackageId]

    From [config].[Packages]

    Where [Packages].[PackageLocation] = ➤ @PackageLocation

    And [Packages].[PackageName] = @PackageName)

    If (@PackageId Is NULL)

    begin

    print '' - Adding '' + @PackageName + '' package to config.Packages table''

    declare @PkgTbl table(PackageId int)

    Insert Into [config].[Packages]

    (PackageLocation, PackageName)

    Output inserted.PackageId into @PkgTbl

    Values (@PackageLocation, @PackageName)

    Set @PackageId = (Select PackageId

    From @PkgTbl)

    print '' - '' + @PackageName + '' package added to config.Packages table''

    end

    Else

    begin

    print '' - '' + @PackageName + '' package already exists in the ➤ config.Packages
    table.''

    end

    Select @PackageId As PackageId

    print ''''

    set @PackageName = N''ReportAndFail.dtsx''

    print @PackageLocation + @PackageName

    set @PackageId = (Select [Packages].[PackageId]

    From [config].[Packages]

    Where [Packages].[PackageLocation] = @PackageLocation

    And [Packages].[PackageName] = @PackageName)

    If (@PackageId Is NULL)

    begin

    print '' - Adding '' + @PackageName + '' application to config.Packages table''

    Delete @PkgTbl

    Insert Into [config].[Packages]

    (PackageLocation, PackageName)

    Output inserted.PackageId into @PkgTbl

    Values (@PackageLocation, @PackageName)

    Set @PackageId = (Select PackageId

    From @PkgTbl)

    print '' - '' + @PackageName + '' package added to config.Packages table''

    end

    Else

    begin

    print '' - '' + @PackageName + '' package already exists in the ➤ config.Packages
    table.''

    end

    Select @PackageId As PackageId

    print ''''

    Listing 5-10

    Adding SSIS packages from TestSSISProject

    ```


    Like the T-SQL in Listing [5-8](#497846_1_En_5_Chapter.xhtml#PC9), the T-SQL in
    Listing [5-10](#497846_1_En_5_Chapter.xhtml#PC11) is also idempotent, so the T-SQL
    code in Listing [5-10](#497846_1_En_5_Chapter.xhtml#PC11) produces the same result
    in the `config.Packages` table; metadata for two new SSIS packages named “ReportAndSucceed.dtsx”
    and “ReportAndFail.dtsx” are added to the framework. The first execution of the
    T-SQL in Listing [5-10](#497846_1_En_5_Chapter.xhtml#PC11) returns the messages
    (to the Messages tab in SSMS) shown in Listing [5-11](#497846_1_En_5_Chapter.xhtml#PC12).


