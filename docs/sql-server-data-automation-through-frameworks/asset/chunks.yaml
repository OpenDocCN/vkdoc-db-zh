    月度流程执行语句

    ```


    从运维角度来看，我们现在引入了更多的复杂性。流程的设置/调度现在增加了额外的优先级层，还有一个时间因素。调度和监控变得更加关键，并且为了确保一切顺利运行，需要关注的地方也更多了。


    ## 总结


    至此，我们已构建了一个包含两个日常流程和两个月度流程的系统。系统中存在依赖关系，要求所有先前流程成功执行后，才能启动下一个流程的执行。这些依赖关系必须在常规生产中的流程调度期间，以及在故障排查和问题修复过程中加以应用。所有这些“活动部件”不仅增加了复杂性，还因为需要外部关注而给系统带来了更多的薄弱点。


    # 2. 使用存储过程实现自动化


    既然我们已经了解到为了执行第 1 章中定义的流程，日复一日需要协调的所有部分，现在让我们引入**控制器**的概念。控制器是我们演示框架概念中最基础的元素。接下来的示例将展示控制器如何使你的工作更轻松，同时减少运维人员需要处理的开销。


    '
- fmt: '## A Daily Process Controller


    For our purposes, a controller is a stored procedure that itself executes all
    the elements of a process and can address business rules within the process. `Listing
    2-1` shows the code to create a stored procedure called `FWDemo.DailyProcessController`.
    This stored procedure executes both of our `Daily Process` stored procedures.
    It logs its own progress and checks the return status of each of the stored procedures
    to ensure successful completion of each.


    ```

    If Exists(Select s.name + ''.'' + p.name

    From sys.procedures p

    Join sys.schemas s

    On s.schema_id = p.schema_id

    Where s.name = ''FWDemo''

    And p.name = ''DailyProcessController'')

    begin

    print '' - Dropping FWDemo.DailyProcessController stored procedure''

    Drop Procedure FWDemo.DailyProcessController

    print '' - FWDemo.DailyProcessController stored procedure dropped''

    end

    GO

    CREATE PROCEDURE FWDemo.DailyProcessController

    AS


    --

    -- Purpose: This procedure is part of the Stored Procedure Framework Demo.

    --          It is the Controller for the Daily Process Stored Procedures.

    --


    SET NOCOUNT ON

    /*********************************************/

    /*  Log the START of the procedure to the process log  */

    /*********************************************/

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    Values (''Procedure FWDemo.DailyProcessController - STARTING'',

    GETDATE()

    )

    DECLARE @RetStat int

    SET @RetStat = 0

    /*****************************************/

    /*  Execute the DailyProcess1 Stored Procedures  */

    /*****************************************/

    EXEC @RetStat = FWDemo.DailyProcess1

    IF @RetStat  0

    GOTO EndController

    /*****************************************/

    /*  Execute the DailyProcess2 Stored Procedures  */

    /*****************************************/

    EXEC @RetStat = FWDemo.DailyProcess2

    IF @RetStat  0

    GOTO EndController

    /****************************************************/

    /*  Log the COMPLETION of the procedure to the process log      */

    /****************************************************/

    EndController:

    IF @RetStat = 0

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.DailyProcessController - COMPLETED'',

    GETDATE()

    )

    END

    ELSE

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.DailyProcessController - ERROR'',

    GETDATE()

    )

    END

    RETURN @RetStat

    GO

    Listing 2-1

    Daily Process Controller stored procedure

    ```


    With the controller in `Listing 2-1`, execution by the operations staff has just
    been made simpler. Instead of scheduling both the stored procedures and dealing
    with precedence rules from the schedule, only the controller execution needs to
    be set up, and monitoring for successful completion is now easier. `Listing 2-2`
    shows the code used to execute the `Daily Process` controller. As always, `FWDemo.ProcessLog`
    shows the progress of the execution.


    ```

    EXECUTE FWDemo.DailyProcessController

    Listing 2-2

    Daily Process Controller execute statement

    ```


    Another advantage of using the controller pattern is the situation where a new
    stored procedure and/or new business rules need to be added to a process. Without
    the controller, the new stored procedure is compiled, and it is the responsibility
    of the operations staff to execute it in its proper position in the process and
    also account for the new business rule requirements in the setup process. That
    is a lot of steps that need to happen after development/testing has ended and,
    thus, an opportunity for error. With a controller in place, development and testing
    would include not only the new stored procedure(s) but also the necessary modifications
    to the controller stored procedure to execute the new stored procedures. The business
    rules then become part of the development/testing effort, and implementation to
    production becomes as simple as compiling the new stored procedure(s) and the
    new version of the controller stored procedure. Since the controller execution
    is already scheduled, no other changes are necessary for the operations staff.
    We have eliminated a lot of the manual intervention when deploying to production
    and, therefore, reduced opportunities for errors.


    ## Monthly Process Controller


    Next, we will add a controller for our `Monthly Process`. `Listing 2-3` has the
    code for the stored procedure called `FWDemo.MonthlyProcessController`. This stored
    procedure executes both of the monthly process stored procedures and handles the
    precedence rule within the process while logging its progress in `FWDemo.ProgressLog`.
    The operations staff can simply execute this controller to start the process.


    ```

    If Exists(Select s.name + ''.'' + p.name

    From sys.procedures p

    Join sys.schemas s

    On s.schema_id = p.schema_id

    Where s.name = ''FWDemo''

    And p.name = ''MonthlyProcessController'')

    begin

    print '' - Dropping FWDemo.MonthlyProcessController stored procedure''

    Drop Procedure FWDemo.MonthlyProcessController

    print '' - FWDemo.MonthlyProcessController stored procedure dropped''

    end

    GO

    CREATE PROCEDURE FWDemo.MonthlyProcessController

    AS


    --

    -- Purpose: This procedure is part of the Stored Procedure Framework Demo.

    --          It is the Controller for the Monthly Process Stored Procedures.

    --


    SET NOCOUNT ON

    /*********************************************/

    /*  Log the START of the procedure to the process log      */

    /*********************************************/

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    Values (''Procedure FWDemo.MonthlyProcessController - STARTING'',

    GETDATE()

    )

    DECLARE @RetStat int

    SET @RetStat = 0

    /********************************************/

    /*  Execute the MonthlyProcess1 Stored Procedures      */

    /********************************************/

    EXEC @RetStat = FWDemo.MonthlyProcess1

    IF @RetStat  0

    GOTO EndController

    /********************************************/

    /*  Execute the MonthlyProcess2 Stored Procedures  */

    /********************************************/

    EXEC @RetStat = FWDemo.MonthlyProcess2

    IF @RetStat  0

    GOTO EndController

    /****************************************************/

    /*  Log the COMPLETION of the procedure to the process log    */

    /****************************************************/

    EndController:

    IF @RetStat = 0

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.MonthlyProcessController - COMPLETED'',

    GETDATE()

    )

    END

    ELSE

    BEGIN

    INSERT INTO FWDemo.ProcessLog (

    ProcessLogMessage,

    CreateDate

    )

    VALUES (''Procedure FWDemo.MonthlyProcessController - ERROR'',

    GETDATE()

    )

    END

    RETURN @RetStat

    GO

    Listing 2-3

    Monthly Process Controller stored procedure

    ```


    `Listing 2-4` has the statement used to execute the new `Monthly Process Controller`.


    ```

    EXECUTE FWDemo.MonthlyProcessController

    Listing 2-4

    Monthly Process Controller execute statement

    ```


    Not addressed here, however, are the business precedence rules between controllers
    that are 1) the `Monthly Process` executes on the first day of the month and 2)
    after the successful completion of the `Daily Process`. But, these details for
    the operations staff to address have become much simpler with the introduction
    of the controller pattern.


    ## Summary


    Controllers incorporate dependencies, defined by the business rules, and coordinate
    the execution of processes. There are two primary advantages that come from this.
    First, it makes scheduling much easier because the dependencies are built in.
    Second, it provides ready access and reference to the process flow when in the
    midst of troubleshooting process issues.


    # 3. Stored Procedure Orchestrators


    Building on the controller pattern in Chapter [2](#497846_1_En_2_Chapter.xhtml),
    the next logical progression for the framework is the concept of the orchestrator.
    It is basically a controller for controllers and can address the issue of precedence
    rules between controllers.'
