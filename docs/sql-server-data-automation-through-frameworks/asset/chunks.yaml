- fmt: "## 添加子管道\n\n如前所述，SSIS框架的本地版本与Azure Data Factory版本之间的差异导致了设计上的不同。重新设计的第一步是将应用程序包执行从父管道迁移到一个“子”管道。\n\
    \n首先，创建一个名为 `child` 的新ADF管道，如图[10-27](#497846_1_En_10_Chapter.xhtml#Fig27)所示。\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig27_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig27_HTML.jpg)\n\
    *图 10-27 添加子管道*\n\n在父管道中，“Execute Application Package”执行SSIS活动可以直接访问所需的属性（这些属性从SSISConfig元数据填充），以动态执行与SSIS应用程序相关的应用程序包。子管道将使用参数来访问相同的元数据。在子管道的“参数”选项卡上，创建以下管道参数/类型/默认值组合：\n\
    \n*   `PackagePath` / String / [空字符串]\n*   `ApplicationPackageId` / Int / 0\n\
    *   `ApplicationInstanceId` / Int / 0\n*   `FailApplicationOnPackageFailure` /\
    \ Bool / true\n*   `ParentRunId` / String / [空字符串]\n\n配置完成后，子管道参数应类似于图[10-28](#497846_1_En_10_Chapter.xhtml#Fig28)。\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig28_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig28_HTML.jpg)\n\
    *图 10-28 已配置的子管道参数*\n\n将一个“Execute SSIS Package”活动拖到子管道画布上，并将新活动重命名为“Execute Application\
    \ Package”，如图[10-29](#497846_1_En_10_Chapter.xhtml#Fig29)所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig29_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig29_HTML.jpg)\n\
    *图 10-29 添加“Execute Application Package”执行SSIS活动*\n\n在“设置”选项卡上配置“Execute Application\
    \ Package”执行SSIS活动的属性，如下所示：\n\n*   Azure-SSIS IR: `Azure-SSIS-Files`\n*   Windows\
    \ 身份验证: [未选中]\n*   32位运行时: [未选中]\n*   包位置: 文件系统（包）\n*   包路径: `@pipeline().parameters.PackagePath`\n\
    \    *   添加动态内容 [Alt + P]，然后选择 参数 ➤ `PackagePath`。\n*   配置路径: [空]\n*   域: `Azure`\n\
    *   用户名: `stframeworks`\n    *   包含SSIS包的Azure文件共享的名称\n*   密码: [你的文件共享主密钥]\n \
    \   *   访问Azure文件共享的主密钥\n*   加密密码: [空]\n*   日志记录级别: `Basic`\n*   日志记录路径: [你的文件共享日志路径]\n\
    *   日志记录访问凭据\n    *   与包访问凭据相同: [如果日志文件夹与SSIS包位于同一Azure文件共享中，则选中]\n\n配置完成后，“Execute\
    \ Application Package”执行SSIS活动在“设置”选项卡上的属性应类似于图[10-30](#497846_1_En_10_Chapter.xhtml#Fig30)。\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig30_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig30_HTML.jpg)\n\
    *图 10-30 已配置的“Execute Application Package”执行SSIS活动属性*\n\n在父管道中，导航到“ForEach Application\
    \ Package”ForEach活动的活动面板，点击删除图标（垃圾桶）以删除“Execute Application Package”执行SSIS活动，如图[10-31](#497846_1_En_10_Chapter.xhtml#Fig31)所示。\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig31_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig31_HTML.jpg)\n\
    *图 10-31 删除“Execute Application Package”执行SSIS活动*\n\n将一个“Execute Pipeline”活动拖到“ForEach\
    \ Application Package”ForEach活动的活动面板上，并将其重命名为“Execute Child Pipeline”，如图[10-32](#497846_1_En_10_Chapter.xhtml#Fig32)所示。\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig32_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig32_HTML.jpg)\n\
    *图 10-32 添加“Execute Child Pipeline”执行管道活动*\n\n点击“Execute Child Pipeline”执行管道活动的“设置”选项卡，并配置以下属性：\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig33_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig33_HTML.jpg)\n\
    *图 10-33 为子管道配置PackagePath参数*\n\n*   调用的管道: `child`\n*   等待完成: [已选中]\n*   参数:\n\
    \    *   `PackagePath` / string / `@item().PackagePath`\n        *   添加动态内容 [Alt\
    \ + P]，选择 ForEach迭代器 ➤ `ForEach Application Package`，然后追加“`.PackagePath`”，如图[10-33](#497846_1_En_10_Chapter.xhtml#Fig33)所示。\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig34_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig34_HTML.jpg)\n\
    *图 10-34 为子管道配置ParentRunId参数*\n\n*   `ApplicationPackageId` / int / `@item().ApplicationPackageId`\n\
    *   `ApplicationInstanceId` / int / `@variables('ApplicationInstanceId')`\n* \
    \  `FailApplicationOnPackageFailure` / bool / `@item().FailApplicationOnPackageFailure`\n\
    *   `ParentRunId` / string / `@pipeline().RunId`\n    *   添加动态内容 [Alt + P]，然后选择\
    \ 系统变量 ➤ Pipeline run ID，如图[10-34](#497846_1_En_10_Chapter.xhtml#Fig34)所示。\n\n\
    配置完成后，“Execute Child Pipeline”执行管道活动在“设置”选项卡上的属性应类似于图[10-35](#497846_1_En_10_Chapter.xhtml#Fig35)。\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig35_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig35_HTML.jpg)\n\
    *图 10-35 已配置的“Execute Child Pipeline”执行管道活动属性*\n\n“Execute Child Pipeline”执行管道活动现在被配置为调用子管道，并传递执行一个应用程序包所需的参数值，该包的元数据存储在SSIS框架中。\n\
    \n## 测试一下！\n\n点击“调试”以测试执行父管道。“Execute Child Pipeline”执行管道活动应执行两次，失败一次，成功一次，这正是我们在执行后查看父管道的“输出”选项卡时看到的结果，如图[10-36](#497846_1_En_10_Chapter.xhtml#Fig36)所示。\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig36_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig36_HTML.jpg)\n\
    *图 10-36 查看父管道的调试执行输出*\n\n更新后的SSIS框架执行引擎按设计工作，但要实现针对`FailApplicationOnPackageFailure`的容错，还有更多工作要做，我们将在下一步（添加应用程序实例日志记录）之后进行管理。\n\
    \n## 添加应用程序包实例日志记录\n\n应用程序实例日志记录发生在父管道中。应用程序实例日志记录的模式是：\n\n1.  记录应用程序实例开始\n2.\
    \  执行一些操作\n3.  记录应用程序实例状态（成功或失败）\n\n应用程序实例日志记录是一个可靠的模式。应用程序包实例日志记录应遵循相同的模式。"
  raw: "### Add the Child Pipeline\n\nAs mentioned previously, the differences between\
    \ the on-premises and the Azure Data Factory versions of an SSIS framework drive\
    \ design differences. The first step in the redesign is migrating application\
    \ package execution from the parent pipeline to a “child” pipeline.\n\nBegin by\
    \ creating a new ADF pipeline named “child,” as shown in Figure [10-27](#497846_1_En_10_Chapter.xhtml#Fig27).\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig27_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig27_HTML.jpg)\n\
    \nFigure 10-27\n\nAdding the child pipeline\n\nIn the parent pipeline, the “Execute\
    \ Application Package” execute SSIS activity has direct access to the properties –\
    \ populated from SSISConfig metadata – required to dynamically execute application\
    \ packages related to an SSIS application. The child pipeline will use parameters\
    \ to access this same metadata. On the Parameters tab of the child pipeline, create\
    \ the following pipeline parameter / type / default value combinations:\n\n* \
    \  PackagePath / String / [Empty String]\n\n*   ApplicationPackageId / Int / 0\n\
    \n*   ApplicationInstanceId / Int / 0\n\n*   FailApplicationOnPackageFailure /\
    \ Bool / true\n\n*   ParentRunId / String / [Empty String]\n\nWhen configured,\
    \ child pipeline parameters should appear similar to Figure [10-28](#497846_1_En_10_Chapter.xhtml#Fig28).\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig28_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig28_HTML.jpg)\n\
    \nFigure 10-28\n\nChild pipeline parameters, configured\n\nDrag an Execute SSIS\
    \ package activity onto the child canvas, and rename the new activity to “Execute\
    \ Application Package,” as shown in Figure [10-29](#497846_1_En_10_Chapter.xhtml#Fig29).\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig29_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig29_HTML.jpg)\n\
    \nFigure 10-29\n\nAdding the “Execute Application Package” execute SSIS activity\n\
    \nConfigure the “Execute Application Package” execute SSIS activity’s properties\
    \ on the Settings tab as follows:\n\n*   Azure-SSIS IR: Azure-SSIS-Files\n\n*\
    \   Windows authentication: [Unchecked]\n\n*   32-bit runtime: [Unchecked]\n\n\
    *   Package location: File system (Package)\n\n*   Package path: @pipeline().parameters.PackagePath\n\
    \    *   Add dynamic content [Alt + P], then parameters ➤ PackagePath.\n\n*  \
    \ Configuration path: [Empty]\n\n*   Domain: Azure\n\n*   Username: stframeworks\n\
    \    *   The name of the Azure file share that contains the SSIS packages\n\n\
    *   Password: [Your file share primary key]\n    *   The Primary Key to access\
    \ the Azure file share\n\n*   Encryption password: [Empty]\n\n*   Logging level:\
    \ Basic\n\n*   Logging path: [Your file share logging path]\n\n*   Logging access\
    \ credentials\n    *   Same as package access credentials: [Checked if logging\
    \ folder resides in the same Azure file share as SSIS packages]\n\nWhen configured,\
    \ the “Execute Application Package” execute SSIS activity’s properties on the\
    \ Settings tab should appear similar to Figure [10-30](#497846_1_En_10_Chapter.xhtml#Fig30).\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig30_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig30_HTML.jpg)\n\
    \nFigure 10-30\n\n“Execute Application Package” execute SSIS activity’s properties\
    \ on the Settings tab, configured\n\nIn the parent pipeline, navigate to the “ForEach\
    \ Application Package” ForEach activity’s Activity surface, and click the Delete\
    \ icon (trash can) to delete the “Execute Application Package” execute SSIS activity,\
    \ as shown in Figure [10-31](#497846_1_En_10_Chapter.xhtml#Fig31).\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig31_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig31_HTML.jpg)\n\
    \nFigure 10-31\n\nDeleting the “Execute Application Package” execute SSIS activity\n\
    \nDrag an Execute Pipeline activity onto the “ForEach Application Package” ForEach\
    \ activity’s Activity surface, and rename it to “Execute Child Pipeline,” as shown\
    \ in Figure [10-32](#497846_1_En_10_Chapter.xhtml#Fig32).\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig32_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig32_HTML.jpg)\n\
    \nFigure 10-32\n\nAdding the “Execute Child Pipeline” execute pipeline activity\n\
    \nClick the “Execute Child Pipeline” execute pipeline activity’s Setting tab,\
    \ and configure the following properties:\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig33_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig33_HTML.jpg)\n\
    \nFigure 10-33\n\nConfiguring the PackagePath parameter for the child pipeline\n\
    \n*   Invoked pipeline: child\n\n*   Wait on completion: [Checked]\n\n*   Parameters:\n\
    \    *   PackagePath / string / @item().PackagePath\n        *   Add dynamic content\
    \ [Alt + P], ForEach iterator ➤ ForEach Application Package, and then append “.PackagePath,”\
    \ as shown in Figure [10-33](#497846_1_En_10_Chapter.xhtml#Fig33).\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig34_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig34_HTML.jpg)\n\
    \nFigure 10-34\n\nConfiguring the ParentRunId parameter for the child pipeline\n\
    \n*   ApplicationPackageId / int / @item().ApplicationPackageId\n\n*   ApplicationInstanceId\
    \ / int / @variables('ApplicationInstanceId')\n\n*   FailApplicationOnPackageFailure\
    \ / bool / @item().FailApplicationOnPackageFailure\n\n*   ParentRunId / string\
    \ / @pipeline().RunId\n    *   Add dynamic content [Alt + P], and then System\
    \ variables ➤ Pipeline run ID, as shown in Figure [10-34](#497846_1_En_10_Chapter.xhtml#Fig34).\n\
    \nWhen configured, the “Execute Child Pipeline” execute pipeline activity’s properties\
    \ on the Settings tab should appear similar to Figure [10-35](#497846_1_En_10_Chapter.xhtml#Fig35).\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig35_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig35_HTML.jpg)\n\
    \nFigure 10-35\n\n“Execute Child Pipeline” execute pipeline activity’s properties\
    \ on the Settings, configured\n\nThe “Execute Child Pipeline” execute pipeline\
    \ activity is now configured to call the child pipeline and pass the parameter\
    \ values required to execute an application package for which metadata is stored\
    \ in the SSIS framework.\n\n### Let’s Test It!\n\nClick Debug to test-execute\
    \ the parent pipeline. The “Execute Child Pipeline” execute pipeline activity\
    \ should execute twice, failing once and succeeding once, and that’s what we see\
    \ when we view the Output tab of the parent pipeline post-execution, as shown\
    \ in Figure [10-36](#497846_1_En_10_Chapter.xhtml#Fig36).\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig36_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig36_HTML.jpg)\n\
    \nFigure 10-36\n\nViewing the parent pipeline’s debug execution output\n\nThe\
    \ updated SSIS framework execution engine works as designed, but there is more\
    \ to do to implement the fault tolerance for FailApplicationOnPackageFailure,\
    \ which we will manage after the next step, adding application instance logging.\n\
    \n## Add Application Package Instance Logging\n\nApplication instance logging\
    \ happens in the parent pipeline. The pattern for application instance logging\
    \ is\n\n1.  Log application instance start\n\n2.  Do some stuff\n\n3.  Log application\
    \ instance status, succeeded or failed\n\nApplication instance logging is a solid\
    \ pattern. Application package instance logging should follow the same pattern."
