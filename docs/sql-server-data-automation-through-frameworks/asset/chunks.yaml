    This chapter covered SSIS framework logging that extended the instrumentation
    we built in Chapter [6](#497846_1_En_6_Chapter.xhtml). The next few chapters cover
    migrating – and adapting – this simple SSIS framework to additional scenarios,
    including Azure Data Factory.


    # 8. Azure-SSIS Integration Runtime


    The Microsoft Azure-SSIS team has been hard at work reducing the friction between
    executing SSIS packages on-premises and executing SSIS packages in Azure. Many
    enterprises execute SSIS packages stored in the file system on-premises. In the
    past, migrating SSIS packages executed in an on-premises file system meant changing
    enterprise SSIS storage and execution patterns. With the advent of Azure-SSIS
    File Share–based execution, executing SSIS packages from files in Azure is no
    longer an issue.


    In fact, the SSIS framework from the previous chapter works well in Azure-SSIS.
    In this chapter, we will discuss and demonstrate:


    *   Getting Started with Azure

    *   Provisioning an Azure Data Factory

    *   Provisioning Azure Storage

    *   Provisioning Azure-SSIS


    ## Getting Started with Azure


    Before creating and interacting with resources in Azure, one must first create
    an Azure account at azure.com, as shown in Figure [8-1](#497846_1_En_8_Chapter.xhtml#Fig1).


    ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig1_HTML.jpg](images/497846_1_En_8_Chapter/497846_1_En_8_Fig1_HTML.jpg)


    Figure 8-1: Azure.com


    Please note the text on the link button in Figure [8-1](#497846_1_En_8_Chapter.xhtml#Fig1)
    reads, “Try Azure for free.” To date, the good people at Microsoft have consistently
    offered free introductory access to some Azure services. Free introductory offers
    lie solely with Microsoft and are subject to changes at Microsoft’s discretion.


    After an account has been created, the next step is to provision an Azure Data
    Factory.


    Azure changes daily. Some of the screenshots and procedures in this book will
    be out of date before publication.


    SSIS application package fault tolerance working as designed


    Remember, the `ReportAndFail.dtsx` application package execution `should` fail,
    but the failure of a `ReportAndFail.dtsx` application package execution instance
    should `not` cause the application to fail (in its current configuration).


    Update the `FailApplicationOnPackageFailure` bit configuration for the `ReportAndFail.dtsx`
    application package using the T-SQL in Listing [7-14](#497846_1_En_7_Chapter.xhtml#PC14).


    ```sql

    Select p.PackageName

    , ap.FailApplicationOnPackageFailure

    From [SSISConfig].[config].[ApplicationPackages] ap

    Join [SSISConfig].[config].[Packages] p

    On p.PackageId = ap.PackageId

    Where p.PackageName = N''ReportAndFail.dtsx''


    Update ap

    Set ap.FailApplicationOnPackageFailure = 1

    From [SSISConfig].[config].[ApplicationPackages] ap

    Join [SSISConfig].[config].[Packages] p

    On p.PackageId = ap.PackageId

    Where p.PackageName = N''ReportAndFail.dtsx''


    Select p.PackageName

    , ap.FailApplicationOnPackageFailure

    From [SSISConfig].[config].[ApplicationPackages] ap

    Join [SSISConfig].[config].[Packages] p

    On p.PackageId = ap.PackageId

    Where p.PackageName = N''ReportAndFail.dtsx''


    Listing 7-14: Updating the FailApplicationOnPackageFailure bit for ReportAndFail.dtsx

    ```


    Updating the SSIS framework application package metadata for the `ReportAndFail.dtsx`
    application package results appears as shown in Figure [7-44](#497846_1_En_7_Chapter.xhtml#Fig44).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig44_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig44_HTML.jpg)


    Figure 7-44: Update ReportAndFail.dtsx application package metadata results


    Re-executing `Parent.dtsx` confirms we can fail if we want to, as shown in Figure
    [7-45](#497846_1_En_7_Chapter.xhtml#Fig45).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig45_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig45_HTML.jpg)


    Figure 7-45: Application Package Failure managed by SSIS framework metadata


    The current state of the `Parent.dtsx` SSIS package represents a fairly robust
    execution engine for the SSIS framework.


    One issue remains, however: re-executing the query shown in Listing [7-11](#497846_1_En_7_Chapter.xhtml#PC11)
    returns the `ApplicationPackageStatus` result “Running,” similar to the results
    shown in Figure [7-46](#497846_1_En_7_Chapter.xhtml#Fig46).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig46_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig46_HTML.jpg)


    Figure 7-46: ApplicationPaackageStatus is “Running”


    Why is the `ApplicationPackageStatus` “Running”? View the screenshot in Figure
    [7-45](#497846_1_En_7_Chapter.xhtml#Fig45), and note the “SQL Log Application
    Package Instance Failure” execute SQL task *did not execute* because the precedence
    constraint connecting the “SCR Log Package Execution Failure” script task to the
    “SQL Log Application Package Instance Failure” execute SQL task is configured
    to evaluate on success *only*. Remember, looking at Listing [7-13](#497846_1_En_7_Chapter.xhtml#PC13),
    an application package failure may result in success *or* failure of the “SQL
    Log Application Package Instance Failure” execute SQL task, depending on the application
    package’s `FailApplicationOnPackageFailure` bit value in the `[config].[ApplicationPackages]`
    table.


    Listing [7-14](#497846_1_En_7_Chapter.xhtml#PC14) and Figure [7-44](#497846_1_En_7_Chapter.xhtml#Fig44)
    show we set the `FailApplicationOnPackageFailure` bit to 1 (true), which informed
    the “SCR Log Package Execution Failure” script task. The “SCR Log Package Execution
    Failure” script task then raised an error, as prescribed by the .Net C# code in
    Listing [7-13](#497846_1_En_7_Chapter.xhtml#PC13).


    Fortunately, the fix is simple and straightforward – delete the precedence constraint
    connecting the “SCR Log Package Execution Failure” script task to the “SQL Log
    Application Package Instance Failure” execute SQL task. Connect a new *failure*
    precedence constraint from the “EPT Execute Child Package” execute package task
    to the “SQL Log Application Package Instance Failure” execute SQL task. Re-executing
    `Parent.dtsx` in the debugger results in execution of the “SQL Log Application
    Package Instance Failure” execute SQL task, as shown in Figure [7-47](#497846_1_En_7_Chapter.xhtml#Fig47).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig47_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig47_HTML.jpg)


    Figure 7-47: The “SQL Log Application Package Instance Failure” execute SQL task
    executes


    Re-executing the application package status query in Listing [7-11](#497846_1_En_7_Chapter.xhtml#PC11)
    returns the `ApplicationPackageStatus` result “Failed,” similar to the results
    shown in Figure [7-48](#497846_1_En_7_Chapter.xhtml#Fig48).


    ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig48_HTML.jpg](images/497846_1_En_7_Chapter/497846_1_En_7_Fig48_HTML.jpg)


    Figure 7-48: ApplicationPackageStatus is “Failed”


    Our SSIS framework execution engine is now ready for deployment elsewhere.'
