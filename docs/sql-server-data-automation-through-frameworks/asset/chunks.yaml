  trans: "\n## 记录执行值\n\n首先，添加一个名为 `ApplicationName` 的字符串数据类型包参数，默认值为 `Framework Test`，如图\
    \ 6-2 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig2_HTML.jpg](img/497846_1_En_6_Fig2_HTML.jpg)\n\
    图 6-2\n将 `ApplicationName` 包参数添加到 `Parent.dtsx`\n\n将 `Sensitive` 和 `Required`\
    \ 参数属性保留为其默认值：`False`。`ApplicationName` 参数包含当 `Parent.dtsx` 执行时要执行的 SSIS 框架 SSIS\
    \ 应用程序的名称。该参数的值将在运行时被覆盖。\n\n要记录执行值，请将一个脚本任务添加到 `Parent.dtsx` 控制流中。将该脚本任务重命名为 `SCR\
    \ Log Initial Values`，如图 6-3 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig3_HTML.jpg](img/497846_1_En_6_Fig3_HTML.jpg)\n\
    图 6-3\n添加并重命名 `SCR Log Initial Values` 脚本任务\n\n`SCR Log Initial Values` 脚本任务将用于捕获\
    \ `Parent.dtsx` 包在执行开始时初始状态的插桩信息。插桩在任何工程实践中都很重要，数据工程以及 ETL（提取、转换和加载）插桩也是如此。在 SSIS\
    \ 包执行开始时捕获设置的初始状态对于故障排除至关重要。正如我的朋友 Grant Fritchey 所说：“如果你不知道正确的情况是什么样子，你怎么知道哪里出了问题？”\n\
    \n打开 `SCR Log Initial Values` 脚本任务编辑器，并将以下 SSIS 变量和参数添加到 `ReadOnlyVariables` 属性中，如图\
    \ 6-4 和图 6-5 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig5_HTML.jpg](img/497846_1_En_6_Fig5_HTML.jpg)\n\
    图 6-5\n两个 SSIS 变量和一个参数已添加到 `ReadOnlyVariables` 脚本任务属性\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig4_HTML.jpg](img/497846_1_En_6_Fig4_HTML.jpg)\n\
    图 6-4\n为 `ReadOnlyVariables` 脚本任务属性选择两个 SSIS 变量和一个参数\n\n*   `System::PackageName`\n\
    *   `System::TaskName`\n*   `$Package::ApplicationName`\n\n从 `ReadOnlyVariables`\
    \ 脚本任务属性中复制变量和参数列表。单击 `Edit Script` 按钮，打开名为 `VstaProjects` 的 Visual Studio Tools\
    \ for Applications (VSTA) .Net 代码编辑器窗口。导航到 `public void Main()`，并将 SSIS 变量和参数粘贴为注释，如图\
    \ 6-6 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig6_HTML.jpg](img/497846_1_En_6_Fig6_HTML.jpg)\n\
    图 6-6\n将 SSIS 变量和参数复制到 `VstaProjects`\n\n添加如清单 6-1 所示的 .Net C# 代码，以记录 `ApplicationName`\
    \ 参数的初始值。\n\n```csharp\npublic void Main()\n{\n    // Variables: System::TaskName,System::PackageName\n\
    \    // Parameters: $Package::ApplicationName\n    string packageName = Dts.Variables[\"\
    System::PackageName\"].Value.ToString();\n    string taskName = Dts.Variables[\"\
    System::TaskName\"].Value.ToString();\n    string subComponent = packageName +\
    \ \".\" + taskName;\n    int informationCode = 1001;\n    bool fireAgain = true;\n\
    \    string applicationName = Dts.Variables[\"$Package::ApplicationName\"].Value.ToString();\n\
    \    string description = \"ApplicationName: \" + applicationName;\n    Dts.Events.FireInformation(informationCode,\
    \ subComponent, description, \"\", 0, ref fireAgain);\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
    }\n```\n清单 6-1\n用于记录 `ApplicationName` 参数初始值的 C# .Net 代码\n\n一旦 `public void Main()`\
    \ 中的代码与清单 6-1 匹配，`VstaProjects` 窗口应配置并引发一个 SSIS Information 事件，如图 6-7 所示。\n\n\
    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig7_HTML.jpg](img/497846_1_En_6_Fig7_HTML.jpg)\n\
    图 6-7\n引发 SSIS Information 事件的 C# .Net 代码\n\n关闭 `VstaProjects` 窗口，并单击脚本任务编辑器上的\
    \ `OK` 按钮。在调试器 (F5) 中执行 `Parent.dtsx` SSIS 包。如果一切顺利，`SCR Log Initial Values` 脚本任务应执行并成功，如图\
    \ 6-8 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig8_HTML.jpg](img/497846_1_En_6_Fig8_HTML.jpg)\n\
    图 6-8\n成功调试执行 `Parent.dtsx`\n\n单击 `Progress` 选项卡（如果已停止调试器，则单击 `Execution Results`\
    \ 选项卡），并查看 `SCR Log Initial Values` 脚本任务中编码的 Information 事件，如图 6-9 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig9_HTML.jpg](img/497846_1_En_6_Fig9_HTML.jpg)\n\
    图 6-9\n查看 Information 事件\n\nInformation 事件的文本如清单 6-2 所示。\n\n```\n[Parent.SCR Log\
    \ Initial Values] Information: ApplicationName: Framework Test\n```\n清单 6-2\n\
    Information 事件的内容\n\n`subComponent` 的值列在最前面，用方括号括起来：`[Parent.SCR Log Initial Values]`。事件类型跟在\
    \ `subComponent` 后面：`Information`。`description` 字符串在最后：`ApplicationName: Framework\
    \ Test`。\n\n此消息将出现在为 `Parent.dtsx` SSIS 包配置的任何日志记录中，并通知操作员哪个 SSIS 应用程序名称已传递给 `Parent.dtsx`\
    \ 包。\n"
- fmt: '## 从SSISConfig检索SSIS应用程序包


    下一步是在`Parent.dtsx` SSIS包中检索要执行的包列表。向`Parent.dtsx`控制流添加一个执行SQL任务，并将其重命名为“SQL Get
    Application Packages”，如图6-10所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig10_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig10_HTML.jpg)


    图6-10 添加“SQL Get Application Packages”执行SQL任务


    从`SCR Log Initial Values`脚本任务连接一个优先约束到`SQL Get Application Packages`执行SQL任务，然后右键单击该任务并单击“编辑”来打开`SQL
    Get Application Packages`执行SQL任务编辑器，如图6-11所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig11_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig11_HTML.jpg)


    图6-11 连接优先约束并打开SQL Get Application Packages执行SQL任务编辑器


    将`SQL Get Application Packages`执行SQL任务的`ConnectionType`属性设置为`ADO.NET`，如图6-12所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig12_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig12_HTML.jpg)


    图6-12 将ConnectionType设置为ADO.NET


    单击`Connection`属性中的下拉菜单，然后单击“<New Connection…>”，如图6-13所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig13_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig13_HTML.jpg)


    图6-13 从Connection属性中选择<New Connection…>


    此时将显示“Configure ADO.NET Connection Manager”对话框，如图6-14所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig14_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig14_HTML.jpg)


    图6-14 Configure ADO.NET Connection Manager对话框


    单击“New”按钮打开连接管理器配置对话框。配置一个新的`ADO.NET Connection Manager`以连接到你的`SSISConfig`数据库实例，如图6-15所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig15_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig15_HTML.jpg)


    图6-15 配置新的ADO.NET Connection Manager


    单击“OK”按钮完成`ADO.NET Connection Manager`的配置。新的连接管理器配置包含你的`SSISConfig`数据库实例的连接信息，现在已存储在已配置的`ADO.NET`连接管理器列表中，如图6-16所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig16_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig16_HTML.jpg)


    图6-16 在Configure ADO.NET Connection Manager中的SSISConfig数据库配置


    单击“OK”按钮完成`ADO.NET Connection Manager`的配置。此时，执行SQL任务编辑器应类似于图6-17。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig17_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig17_HTML.jpg)


    图6-17 为SQL Get Application Packages执行SQL任务配置的连接


    上一章中的代码清单5-14包含了从`SSISConfig`数据库中存储的元数据返回给定SSIS应用程序的SSIS应用程序包列表所需的T-SQL。使用代码清单6-3所示的T-SQL配置`SQL
    Get Application Packages`执行SQL任务的`SQLStatement`属性。


    ```sql

    Select a.ApplicationName

    , p.PackageLocation + p.PackageName As PackagePath

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From [config].[ApplicationPackages] ap

    Join [config].[Applications] a

    On a.ApplicationId = ap.ApplicationId

    Join [config].Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = @ApplicationName

    And ap.ApplicationPackageEnabled = 1

    Order By ap.ExecutionOrder

    ```


    代码清单6-3 从SSISConfig数据库检索SSIS应用程序包的T-SQL


    将代码清单6-3中的T-SQL添加到`SQL Get Application Packages`执行SQL任务的`SQLStatement`属性中，如图6-18所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig18_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig18_HTML.jpg)


    图6-18 添加SQLStatement属性的T-SQL


    单击“OK”按钮关闭“Enter SQL Query”对话框。执行SQL任务编辑器应类似于图6-19所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig19_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig19_HTML.jpg)


    图6-19 配置SQLStatement属性后的SQL Get Application Packages执行SQL任务


    在执行SQL任务编辑器左侧的页面列表中，单击“Parameter Mapping”页面，然后单击“Add”按钮添加一个参数映射。从“Variable Name”列中选择`$Package::ApplicationName`参数，选择`String`数据类型，并在“Parameter
    Name”列中输入`ApplicationName`，如图6-20所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig20_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig20_HTML.jpg)


    图6-20 添加ApplicationName参数


    在“Parameter Mapping”页面上配置的`ApplicationName`参数将从名为`$Package::ApplicationName`的SSIS包参数（如图6-20中“Variable
    Name”列所示）读取值，并将该值提供给在`SQL Get Application Packages`执行SQL任务的`SQLStatement`属性（见代码清单6-17）中配置的T-SQL查询参数。


    返回到`SQL Get Application Packages`执行SQL任务的“General”页面。单击`ResultSet`属性中的下拉菜单，选择“Full
    result set”，如图6-21所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig21_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig21_HTML.jpg)


    图6-21 选择Full result set


    单击“Result Set”页面，然后单击“Add”按钮。编辑`Result Name`值，并将其设置为`0`。在`Variable Name`下拉菜单中，选择“<New
    variable…>”，如图6-22所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig22_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig22_HTML.jpg)


    图6-22 从Result Set Variable Name下拉菜单中选择“<New variable…>”


    当“Add Variable”对话框显示时，确保“Container”设置为`Parent`，如图6-23所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig23_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig23_HTML.jpg)


    图6-23 验证已选择Parent容器


    将`Name`属性更改为`ApplicationPackages`，将`Namespace`保持为`User`，并将`Value type`设置为`Object`，如图6-24所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig24_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig24_HTML.jpg)


    图6-24 配置Object变量ApplicationPackages'
  raw: '## Retrieve SSIS Application Packages from SSISConfig


    The next step is to retrieve a list of packages to execute in the Parent.dtsx
    SSIS package. Add an Execute SQL Task to the Parent.dtsx control flow, and rename
    it to “SQL Get Application Packages,” as shown in Figure [6-10](#497846_1_En_6_Chapter.xhtml#Fig10).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig10_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Adding the “SQL Get Application Packages” Execute SQL Task


    Connect a precedence constraint from the SCR Log Initial Values script task to
    the SQL Get Application Packages execute SQL task, and then open the SQL Get Application
    Packages execute SQL task editor by right-clicking the task and then clicking
    “Edit,” as shown in Figure [6-11](#497846_1_En_6_Chapter.xhtml#Fig11).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig11_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Connecting a precedence constraint and opening the SQL Get Application Packages
    execute SQL task editor


    Set the SQL Get Application Packages execute SQL task’s ConnectionType property
    to ADO.NET, as shown in Figure [6-12](#497846_1_En_6_Chapter.xhtml#Fig12).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig12_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Setting the ConnectionType to ADO.NET


    Click the drop-down in the Connection property, and click “<New Connection…>”
    as shown in Figure [6-13](#497846_1_En_6_Chapter.xhtml#Fig13).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig13_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Selecting <New Connection…> from the Connection property


    The Configure ADO.NET Connection Manager dialog displays, as shown in Figure [6-14](#497846_1_En_6_Chapter.xhtml#Fig14).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig14_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    The Configure ADO.NET Connection Manager dialog


    Click the New button to open the Connection Manager configuration dialog. Configure
    a new ADO.NET Connection Manager to connect to your instance of the SSISConfig
    database, as shown in Figure [6-15](#497846_1_En_6_Chapter.xhtml#Fig15).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig15_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Configuring a new ADO.NET Connection Manager


    Click the OK button to complete configuration of the ADO.NET Connection Manager.
    The new connection manager configuration contains connection information for your
    instance of the SSISConfig database and is now stored in the list of configured
    ADO.NET connection managers as shown in Figure [6-16](#497846_1_En_6_Chapter.xhtml#Fig16).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig16_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Your SSISConfig database configuration in the Configure ADO.NET Connection Manager


    Click the OK button to complete the configuration of the ADO.NET Connection Manager.
    The Execute SQL Task Editor should now appear similar to Figure [6-17](#497846_1_En_6_Chapter.xhtml#Fig17).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig17_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig17_HTML.jpg)


    Figure 6-17


    Connection configured for the SQL Get Application Packages execute SQL task


    Listing [5-14](#497846_1_En_5_Chapter.xhtml#PC15) from the previous chapter contains
    the T-SQL required to return a list of SSIS application packages from the metadata
    stored in the SSISConfig database for a given SSIS application. Configure the
    SQL Get Application Packages execute SQL task’s SQLStatement property with the
    T_SQL shown in Listing [6-3](#497846_1_En_6_Chapter.xhtml#PC3).


    ```

    Select a.ApplicationName

    , p.PackageLocation + p.PackageName As PackagePath

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From [config].[ApplicationPackages] ap

    Join [config].[Applications] a

    On a.ApplicationId = ap.ApplicationId

    Join [config].Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = @ApplicationName

    And ap.ApplicationPackageEnabled = 1

    Order By ap.ExecutionOrder

    Listing 6-3

    T-SQL to retrieve application packages for an SSIS application from the SSISConfig
    database

    ```


    Add the T-SQL in Listing [6-3](#497846_1_En_6_Chapter.xhtml#PC3) to the SQLStatement
    property of the SQL Get Application Packages execute SQL task, as shown in Figure
    [6-18](#497846_1_En_6_Chapter.xhtml#Fig18).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig18_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Adding the SQLStatement property’s T-SQL


    Click the OK button to close the “Enter SQL Query” dialog. The Execute SQL Task
    Editor should appear similar to that shown in Figure [6-19](#497846_1_En_6_Chapter.xhtml#Fig19).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig19_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig19_HTML.jpg)


    Figure 6-19


    SQL Get Application Packages execute SQL task after configuring the SQLStatement
    property


    In the list of Execute SQL Task Editor pages on the left side of the Execute SQL
    Task Editor, click the “Parameter Mapping” page, and then click the Add button
    to add a parameter mapping. Select the $Package::ApplicationName parameter from
    the Variable Name column, select the String data type, and enter “ApplicationName”
    for the Parameter Name column as shown in Figure [6-20](#497846_1_En_6_Chapter.xhtml#Fig20).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig20_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig20_HTML.jpg)


    Figure 6-20


    Adding the ApplicationName parameter


    The ApplicationName parameter configured on the Parameter Mapping page will read
    the value from the SSIS package parameter named $Package::ApplicationName (shown
    in the Variable Name column in Figure [6-20](#497846_1_En_6_Chapter.xhtml#Fig20))
    and supply the value to the T-SQL query parameter configured in the SQL Get Application
    Packages execute SQL task’s SQLStatement property found in Listing 6-17.


    Return to the SQL Get Application Packages execute SQL task’s General page. Click
    the drop-down in the ResultSet property, and select “Full result set,” as shown
    in Figure [6-21](#497846_1_En_6_Chapter.xhtml#Fig21).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig21_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig21_HTML.jpg)


    Figure 6-21


    Selecting Full result set


    Click the Result Set page, and then click the Add button. Edit the Result Name
    value, and set it to “0”. In the Variable Name drop-down, select “<New variable…>”
    as shown in Figure [6-22](#497846_1_En_6_Chapter.xhtml#Fig22).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig22_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig22_HTML.jpg)


    Figure 6-22


    Selecting “<New variable…>” from the Result Set Variable Name drop-down


    When the Add Variable dialog displays, make sure the Container is set to Parent
    as shown in Figure [6-23](#497846_1_En_6_Chapter.xhtml#Fig23).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig23_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig23_HTML.jpg)


    Figure 6-23


    Verifying Parent Container is selected


    Change the Name property to ApplicationPackages, leave the Namespace set to User,
    and set the Value type to Object as shown in Figure [6-24](#497846_1_En_6_Chapter.xhtml#Fig24).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig24_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig24_HTML.jpg)


    Figure 6-24


    Configuring the Object variable ApplicationPackages'
