    当执行父管道时，两个应用程序包——`ReportAndFail.dtsx`和`ReportAndSucceed.dtsx`——会从`SSISConfig`数据库中被检索出来，并转储到父管道的“ForEach
    应用程序包”ForEach 活动的迭代器中。由于`ReportAndFail.dtsx`的`ExecutionOrder`为 10，而`ReportAndSucceed.dtsx`的`ExecutionOrder`为
    20，因此`ReportAndFail.dtsx`会先执行。根据设计，当`ReportAndFail.dtsx`在子管道中执行失败，并且`FailApplicationOnPackageFailure`位为
    true 时，父管道将被取消。


    如果`ReportAndFail.dtsx`在子管道中失败，而`FailApplicationOnPackageFailure`位为`false`，会发生什么？为了测试，请使用清单
    11-4 中的 T-SQL 更新`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位。


    ```sql

    Select ap.ApplicationPackageId

    , a.ApplicationName

    , p.PackageName

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From config.Applications a

    Join config.ApplicationPackages ap

    On ap.ApplicationId = a.ApplicationId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test''

    Order By ap.ExecutionOrder


    Update config.ApplicationPackages

    Set FailApplicationOnPackageFailure = 0

    Where ApplicationPackageId = 2


    Select ap.ApplicationPackageId

    , a.ApplicationName

    , p.PackageName

    , ap.ExecutionOrder

    , ap.FailApplicationOnPackageFailure

    From config.Applications a

    Join config.ApplicationPackages ap

    On ap.ApplicationId = a.ApplicationId

    Join config.Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test''

    Order By ap.ExecutionOrder

    ```


    清单 11-4

    更新`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位


    执行清单 11-4 中的 T-SQL 查询的结果应类似于图 11-34。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig34_HTML.jpg](img/497846_1_En_11_Fig34_HTML.jpg)


    图 11-34

    `ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位已更新


    为了测试更改`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位的影响，请重新触发父管道。监视页面显示了容错结果：`ReportAndFail.dtsx`失败了，但并未停止
    SSIS 框架应用程序的执行。`ReportAndSucceed.dtsx`执行并成功，如图 11-35 所示。


    ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig35_HTML.jpg](img/497846_1_En_11_Fig35_HTML.jpg)


    图 11-35

    容错功能在行动中；一个应用程序包的失败不会停止应用程序执行


    我唯一的抱怨是父管道报告了失败。


    ## 结论


    在本章中，我们为 SSIS 框架的 Azure Data Factory 版本添加了容错功能。在此过程中，我们学习了如何为 Azure Data Factory
    托管标识配置安全性，以便数据工厂管道中的 Web 活动可以调用 Azure Data Factory REST API 中的方法。我们还进一步了解了 ForEach
    活动的默认行为。

