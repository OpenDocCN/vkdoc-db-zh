    ## About the Authors


    ## About the Technical Reviewer


    # Part I


    ## Stored Procedure-Based Database Frameworks


    # 1. Stored Procedures 101


    One of the most common issues continually facing IT organizations is finding the
    proper balance between the effort to develop and deploy processes into production
    against the efficiency and effectiveness of production control operators. The
    effort to develop and deploy and the effectiveness of production control seem
    to be diametrically opposed. Making it easier to develop and deploy processes
    usually means more work and manual intervention for production control. The real
    question that needs to be considered is where is it better to “feel the pain”?
    Pushing the effort toward the development side of the equation can slow down the
    throughput but minimizes the liability of issues at the production process level.
    This and the next few chapters are going to concentrate on processes that are
    executed using stored procedures. In this chapter, you’ll get a basic introduction
    to stored procedures that is the foundation for the chapters that follow. You’ll
    see how to create a child stored procedure, and we’ll provide you a template that
    you can use to create similar procedures in your own work.


    ## The Need for a Framework


    When just in development mode, it is awfully easy (and impressive) to construct
    large, monolithic procedures that do everything from beginning to end. They are
    the proverbial “black box” where something goes in, many gyrations take place,
    and then the desired result occurs. Those are great until a problem occurs, or
    just a change in business requirements means that modifications need to be made.
    When the procedure does so much, what does it take to test it once the modifications
    are done? Even though the change only impacts 10 percent of the procedure, the
    entire procedure has to be tested. What does it take to accomplish that? What
    if there are several intricate modifications that need to be made? How difficult
    does it become for more than one developer to work on the changes and coordinate
    their efforts?


    Now, consider that monolith broken up into multiple procedures, each of which
    performs a unit of work. When a change is made and needs to be tested, that effort
    can be isolated to just what is necessary to perform that unit of work, and the
    validation is concentrated on the result of the procedure. And, with it now being
    multiple procedures, modifications can usually be done simultaneously by multiple
    developers, and their efforts can be mutually exclusive. Over time, that approach
    can prove to be much more cost effective and efficient.


    That is where a framework helps to organize and manage processes to provide the
    most flexibility in development and can minimize the maintenance effort (which,
    sometimes, is not considered until it becomes an obvious issue). A framework provides
    a consistent methodology for assembling and executing processes. It also promotes
