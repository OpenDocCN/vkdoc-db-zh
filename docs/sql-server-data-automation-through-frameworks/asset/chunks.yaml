- fmt: '# 配置SSIS包以迭代应用程序包


    `User::ApplicationPackages` 变量将接收从执行存储在 SQL Get Application Packages 执行 SQL 任务的
    `SQLStatement` 属性中的 T-SQL 查询返回的 ADO.Net 数据集。由于 T-SQL 查询在条件（WHERE 子句）中包含了 `ApplicationName`
    参数，并且此参数由发送到 `Parent.dtsx` SSIS 包的 `$Package::ApplicationName` SSIS 参数设置，因此 ADO.Net
    数据集将包含已配置 SSISConfig 数据的包列表。由于 `$Package::ApplicationName` 默认设置为名为“Framework Test”的
    SSIS 框架应用程序，`User::ApplicationPackages` 变量将包含图 6-25 所示的结果。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig25_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig25_HTML.jpg)


    图 6-25 发送到 `User::ApplicationPackages` 变量的结果


    单击“确定”按钮关闭“添加变量”对话框。


    现在，“SQL 获取应用程序包执行 SQL 任务”编辑器的“常规”页应类似于图 6-26。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig26_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig26_HTML.jpg)


    图 6-26 SQL Get Application Packages 执行 SQL 任务的“常规”页


    单击“确定”按钮关闭 SQL Get Application Packages 执行 SQL 任务编辑器。


    ## Iterate Application Packages


    SSIS Foreach Loop 容器用于迭代多种集合。`User::ApplicationPackages` SSIS 变量是一个对象数据类型变量。对象可以包含标量（或单个、单独的值），但它们并非真正为标量而构建。对象旨在包含集合。集合可以是数组或列表，以及记录集和数据集。集合也可以，嗯，就是集合——一种类似列表的
    .Net 变量类型。


    在上一节中，我们添加了一个执行 SQL 任务。执行 SQL 任务 `ConnectionType` 属性的配置是 `ADO.NET`。我们配置了一个完整结果集，并将结果（来自结果集）发送到名为
    `User::ApplicationPackages` 的对象变量中。因为执行 SQL 任务 `ConnectionType` 属性设置为 `ADO.NET`，所以
    `User::ApplicationPackages` 中对象的类型是一个 ADO.Net 数据集。ADO.Net 数据集包含一个表集合。


    如果将执行 SQL 任务配置为使用 `OLE DB` `ConnectionType`，那么发送到 `User::ApplicationPackages`
    对象变量的结果集将是一个 ADO 记录集，它是一个 COM（公共对象模型）对象。COM 是在微软软件的 32 位（x86）时代引入的，大约在 1990 年代初。


    很酷的一点是，SSIS Foreach Loop 容器的 Foreach ADO 迭代器并不关心你发送给它的是 ADO 记录集还是 ADO.Net 数据集；它都可以迭代。


    将一个 Foreach Loop 容器拖到 `Parent.dtsx` 的控制流上，并从 SQL Get Application Package 执行 SQL
    任务到 Foreach Loop 容器连接一个优先级约束。将 Foreach Loop 容器重命名为“FOREACH Application Package”，如图
    6-27 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig27_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig27_HTML.jpg)


    图 6-27 重命名 Foreach Loop 容器


    打开 FOREACH Application Package 的编辑器并导航到“集合”页。将迭代器更改为“Foreach ADO Enumerator”，如图
    6-28 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig28_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig28_HTML.jpg)


    图 6-28 将 FOREACH Application Package 的迭代器更改为 Foreach ADO Enumerator


    Foreach Loop 容器的 Foreach ADO Enumerator 在每次枚举（遍历数据集）时“指向”一行。每列中的值可以通过序数映射到 SSIS
    变量，每次“传递”（枚举/迭代）。通常，Foreach Loop 容器内的 SSIS 任务被配置为从变量中*读取*这些值，并以某种方式对其执行操作。稍后会详细介绍变量映射。


    每个迭代器都会呈现一个迭代器特定的属性视图。在“迭代器配置”组框中，单击“ADO 对象源变量”下拉列表，然后选择 `User::ApplicationPackages`
    变量，如图 6-29 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig29_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig29_HTML.jpg)


    图 6-29 选择 ADO 对象源变量


    将枚举模式保留为“第一个表中的行”。“集合”页配置如图 6-30 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig30_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig30_HTML.jpg)


    图 6-30 已配置的“集合”页


    单击“变量映射”页。单击“变量”列内部，单击下拉列表，然后单击“<新建变量...>”，如图 6-31 所示。


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig31_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig31_HTML.jpg)


    图 6-31 在“变量映射”页上单击“新建变量”'
  raw: 'The User::ApplicationPackages variable will receive the ADO.Net dataset returned
    from the execution of the T-SQL query stored in the SQL Get Application Packages
    execute SQL task’s SQLStatement property. Since the T-SQL query includes the ApplicationName
    parameter in the criteria (WHERE clause) and this parameter is set by the $Package::ApplicationName
    SSIS parameter sent to the Parent.dtsx SSIS package, the ADO.Net dataset will
    contain the list of packages for which SSISConfig data has been configured. Since
    the $Package::ApplicationName is defaulted to the SSIS framework application named
    “Framework Test,” the User::ApplicationPackages variable will contain the results
    shown in Figure [6-25](#497846_1_En_6_Chapter.xhtml#Fig25).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig25_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig25_HTML.jpg)


    Figure 6-25


    Results sent to User::ApplicationPackages variable


    Click the OK button to close the Add Variable dialog.


    The General page of the SQL Get Application Packages execute SQL task editor should
    now appear similar to Figure [6-26](#497846_1_En_6_Chapter.xhtml#Fig26).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig26_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig26_HTML.jpg)


    Figure 6-26


    The SQL Get Application Packages execute SQL task’s General page


    Click the OK button to close the SQL Get Application Packages execute SQL task
    editor.


    ## Iterate Application Packages


    SSIS Foreach Loop Containers are used to iterate collections of many sorts. The
    User::ApplicationPackages SSIS variable is an object data type variable. Objects
    can contain scalars (or single, individual values), but they’re not really built
    for scalars. Objects are designed to contain collections. Collections can be arrays
    or lists, as well as recordsets and datasets. Collections can also be, well, collections –
    a special list-like .Net variable type.


    In the previous section, we added an Execute SQL Task. The configuration of the
    Execute SQL Task ConnectionType property is ADO.NET. We configured a Full result
    set and sent the results (of the result set) into an Object variable named User::ApplicationPackages.
    Because the Execute SQL Task ConnectionType property is set to ADO.NET, the type
    of object in User::ApplicationPackages is an ADO.Net dataset. ADO.Net datasets
    include a tables collection.


    Had the Execute SQL Task been configured to use an OLE DB ConnectionType, the
    result set sent to the User::ApplicationPackages object variable would be an ADO
    recordset, which is a COM (Common Object Model) object. COM was introduced in
    the 32-bit (x86) era of Microsoft software, circa early 1990s.


    The cool thing is that the SSIS Foreach Loop Container’s Foreach ADO Iterator
    doesn’t care whether you send it an ADO recordset or an ADO.Net dataset; it will
    iterate either.


    Drag a Foreach Loop Container onto the control flow of Parent.dtsx and connect
    a precedence constraint from the SQL Get Application Package execute SQL task
    to the Foreach Loop Container. Rename the Foreach Loop Container to “FOREACH Application
    Package” as shown in Figure [6-27](#497846_1_En_6_Chapter.xhtml#Fig27).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig27_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig27_HTML.jpg)


    Figure 6-27


    Renaming the Foreach Loop Container


    Open the FOREACH Application Package’s editor and navigate to the Collection page.
    Change the Enumerator to “Foreach ADO Enumerator” as shown in Figure [6-28](#497846_1_En_6_Chapter.xhtml#Fig28).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig28_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig28_HTML.jpg)


    Figure 6-28


    Changing the FOREACH Application Package Enumerator to Foreach ADO Enumerator


    A Foreach Loop Container’s Foreach ADO Enumerator “points” to one row each enumeration
    (iteration through the dataset). The values in each column may be mapped into
    SSIS variables by ordinal with each “pass” (enumeration/iteration). Most often,
    SSIS tasks inside the Foreach Loop Container are configured to *read* these values
    from the variables and act upon them in some way. More on Variable Mappings in
    a bit.


    Each enumerator presents an enumerator-specific properties view. In the Enumerator
    configuration group box, click the “ADO object source variable” drop-down, and
    select the User::ApplicationPackages variable as shown in Figure [6-29](#497846_1_En_6_Chapter.xhtml#Fig29).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig29_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig29_HTML.jpg)


    Figure 6-29


    Selecting the ADO object source variable


    Leave the Enumeration mode set to “Rows in the first table.” The Collection page
    is configured as shown in Figure [6-30](#497846_1_En_6_Chapter.xhtml#Fig30).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig30_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig30_HTML.jpg)


    Figure 6-30


    Collection page configured


    Click the Variable Mappings page. Click inside the Variable column, click the
    drop-down, and then click “<New variable…>” as shown in Figure [6-31](#497846_1_En_6_Chapter.xhtml#Fig31).


    ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig31_HTML.jpg](images/497846_1_En_6_Chapter/497846_1_En_6_Fig31_HTML.jpg)


    Figure 6-31


    Clicking New Variable on the Variable Mappings page'
