    ```


    Initial setup of the metadata and deployment of new stored procedures to an application
    do, indeed, make the development and implementation of a process more complex.
    Hopefully, these metadata examples have demonstrated that management during execution,
    particularly in an error resolution situation, has become much simpler. Remember,
    setup and deployment may only occur once. Execution management will remain and
    occur over again as long as the process remains as part of the production activities.
    So, where do you want to make it easier?


    This is the simplest use of metadata for our system and could be just the beginning.
    For a more advanced version, we could build a metadata layer on top of what we
    already have and let orchestrators execute using metadata for the controllers.
    But we will stop here because the idea has been established.


    ## Summary


    Metadata is used as the road map for the execution of the orchestrator and controllers.
    Most situations can now be handled by the manipulation of the metadata that controls
    the execution, and no manual deconstructions and executions are necessary. Any
    new stored procedures added to existing controllers or controllers added to existing
    orchestrators can be included simply by deploying the stored procedures to be
    compiled and adding the appropriate metadata. In most cases, if not all, no changes
    are required to existing stored procedures.


