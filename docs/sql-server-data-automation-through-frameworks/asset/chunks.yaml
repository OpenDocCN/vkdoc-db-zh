  raw: '## Provisioning the SSISConfig Database


    The focus of this section is provisioning the SSISConfig database to an instance
    of Azure SQL Database upon which the SSISConfig database will reside.


    Azure SQL can be a somewhat loose term. It can be taken to mean Azure SQL Database,
    Azure SQL Managed Instance, and some even use it to mean SQL Server running on
    an Azure VM. In this chapter, we are working in Azure SQL Database, which is the
    Software as a Service offering as described at docs.microsoft.com/en-us/azure/azure-sql/azure-sql-iaas-vs-paas-what-is-overview.


    Navigate to the Azure portal to begin the provisioning process. In the left Azure
    menu, hover over “SQL databases” until the SQL databases hover card displays.
    When the SQL databases hover card displays, click “+ Create” similar to Figure
    [9-1](#497846_1_En_9_Chapter.xhtml#Fig1).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig1_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Starting the Azure SQL Database provisioning process


    Clicking “+ Create” opens the Create SQL Database blade. Begin by configuring
    the Subscription property to your subscription name and the Resource group property
    to your resource group name, as shown in Figure [9-2](#497846_1_En_9_Chapter.xhtml#Fig2).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig2_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Azure SQL Database Subscriptions and Resource group properties configuration


    The example uses the resource group named “rgFrameworks.” Azure resource group
    names are globally unique (and case insensitive), so you will need to use a different
    name for your resource group.


    Next, configure the Data details section by entering “SSISConfig” for the “Database
    name” property. Please note server names are globally unique, but database names
    are only unique to the server, as shown in Figure [9-3](#497846_1_En_9_Chapter.xhtml#Fig3).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig3_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Configuring the Database name and Server properties


    For the purposes of this example, click the “No” option to answer the question,
    “Want to use SQL elastic pool?” The “Compute + storage” property defaults to “General
    purpose Gen5, 2 vCores, 32 GB storage,” as shown in Figure [9-4](#497846_1_En_9_Chapter.xhtml#Fig4).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig4_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    SQL elastic pool and “Compute + storage” property configuration


    The default database configuration is a little heavy for the purposes of this
    example. Click the “Configure database” link shown in Figure [9-4](#497846_1_En_9_Chapter.xhtml#Fig4)
    to open the Configure blade, which will allow changes to database capacity and
    performance options, as shown in Figure [9-5](#497846_1_En_9_Chapter.xhtml#Fig5).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig5_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Configuring the Azure SQL database


    As you can tell from Figure [9-5](#497846_1_En_9_Chapter.xhtml#Fig5), the default
    database configuration is also a little *expensive* for the purposes of this example.
    Click the “Looking for basic, standard, premium?” link to navigate to, and select,
    the “Basic” option, as shown in Figure [9-6](#497846_1_En_9_Chapter.xhtml#Fig6).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig6_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Reconfiguring the Azure SQL database


    Two GB and five DTUs is plenty for the example. Click the Apply button to proceed.
    Database configuration now displays out updated settings, as shown in Figure [9-7](#497846_1_En_9_Chapter.xhtml#Fig7).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig7_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Updated Compute + storage settings


    Before creating the new SSISConfig database, double-check the “Additional settings”
    tab’s “Enable advanced data security” property, as shown in Figure [9-8](#497846_1_En_9_Chapter.xhtml#Fig8).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig8_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Configuring the “Enable advanced data security” property


    If the “Start free trial” option is selected, change the setting to “Not now”
    for the purposes of this example.


    On the Networking and Tags tabs, leave the default configuration settings.


    The “Review + create” tab should appear similar to Figure [9-9](#497846_1_En_9_Chapter.xhtml#Fig9).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig9_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Azure SQL Database Review + create page


    Click the Create button to create the Azure SQL Database. Provisioning an Azure
    SQL Database takes a few minutes. Once complete, the portal should appear similar
    to Figure [9-10](#497846_1_En_9_Chapter.xhtml#Fig10).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig10_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Azure SQL Database, provisioned


    The next step is adding SSISConfig database artifacts to the new Azure SQL Database.


    ## Deploy the Simple, Custom, File-Based Azure-SSIS Framework


    The focus of this section is deploying the SSISConfig database designed in Chapters
    [5](#497846_1_En_5_Chapter.xhtml) and [7](#497846_1_En_7_Chapter.xhtml) to an
    Azure SQL SSISConfig database instance.


    To begin, open Azure Data Studio (or SQL Server Management Studio) and connect
    to the recently provisioned Azure SQL Database instance, as shown in Figure [9-11](#497846_1_En_9_Chapter.xhtml#Fig11).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig11_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Connecting to the new Azure SQL Database


    The SSISConfig database is created in the previous step. A script to create the
    SSISConfig database is similar to the scripts used in Chapters [5](#497846_1_En_5_Chapter.xhtml)
    and [7](#497846_1_En_7_Chapter.xhtml), as shown in Listings [9-1](#497846_1_En_9_Chapter.xhtml#PC1).


    ```

    print ''SSISConfig database''

    If Not Exists(Select [databases].[name]

    From [sys].[databases]

    Where [databases].[name] = N''SSISConfig'')

    begin

    print '' - Create SSISConfig database''

    Create Database SSISConfig

    print '' - SSISConfig database created''

    end

    Else

    begin

    print '' - SSISConfig database already exists.''

    end

    print ''''

    go

    Listing 9-1

    Creating SSISConfig in the Azure SQL database

    ```


    When execution completes, Azure Data Studio should display messages similar to
    the messages shown in Figure [9-12](#497846_1_En_9_Chapter.xhtml#Fig12).


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig12_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig12_HTML.jpg)


    Figure 9-12


    SSISConfig database created


    At the time of this writing, the T-SQL in Azure SQL databases does not support
    the `Use` command. If you attempt to use the `Use` command, the error shown in
    Figure [9-13](#497846_1_En_9_Chapter.xhtml#Fig13) is generated.


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig13_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig13_HTML.jpg)


    Figure 9-13


    It’s no “use”…


    Instead of the `Use` command, use the database selector drop-down highlighted
    in Figure [9-13](#497846_1_En_9_Chapter.xhtml#Fig13).


    Listing [9-2](#497846_1_En_9_Chapter.xhtml#PC2) combines the remaining SSISConfig
    DDL (data definition language) statements found in Chapters [5](#497846_1_En_5_Chapter.xhtml)
    and [7](#497846_1_En_7_Chapter.xhtml) to create the SSISConfig database artifacts
    and metadata.'
  trans: '

    ## 配置 SSISConfig 数据库


    本节重点是将 SSISConfig 数据库配置到托管它的 Azure SQL 数据库实例上。


    “Azure SQL”可能是一个比较宽泛的术语。它可以指 Azure SQL 数据库、Azure SQL 托管实例，甚至有人用它来指代运行在 Azure 虚拟机上的
    SQL Server。在本章中，我们使用的是 Azure SQL 数据库，这是其软件即服务产品，详细描述可参考 `docs.microsoft.com/en-us/azure/azure-sql/azure-sql-iaas-vs-paas-what-is-overview`。


    首先导航到 Azure 门户以开始配置过程。在左侧的 Azure 菜单中，将鼠标悬停在“SQL 数据库”上，直到显示 SQL 数据库悬停卡片。当 SQL 数据库悬停卡片显示时，点击“+
    创建”，类似于**图 9-1**。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig1_HTML.jpg](img/497846_1_En_9_Fig1_HTML.jpg)

    **图 9-1** 启动 Azure SQL 数据库配置过程


    点击“+ 创建”会打开“创建 SQL 数据库”界面。首先将“订阅”属性配置为你的订阅名称，将“资源组”属性配置为你的资源组名称，如**图 9-2**所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig2_HTML.jpg](img/497846_1_En_9_Fig2_HTML.jpg)

    **图 9-2** 配置 Azure SQL 数据库订阅和资源组属性


    本例使用名为“rgFrameworks”的资源组。Azure 资源组名称是全局唯一的（且不区分大小写），因此你需要为你的资源组使用不同的名称。


    接下来，在“数据”部分配置，为“数据库名称”属性输入“SSISConfig”。请注意，服务器名称是全局唯一的，但数据库名称仅在服务器内唯一，如**图 9-3**所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig3_HTML.jpg](img/497846_1_En_9_Fig3_HTML.jpg)

    **图 9-3** 配置数据库名称和服务器属性


    出于本示例的目的，点击“否”选项来回答“是否要使用 SQL 弹性池？”这个问题。“计算 + 存储”属性默认为“通用目标 Gen5，2 个 vCore，32
    GB 存储”，如**图 9-4**所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig4_HTML.jpg](img/497846_1_En_9_Fig4_HTML.jpg)

    **图 9-4** SQL 弹性池和“计算 + 存储”属性配置


    默认的数据库配置对于本示例来说有点过高。点击**图 9-4**中所示的“配置数据库”链接以打开“配置”界面，这将允许更改数据库容量和性能选项，如**图 9-5**所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig5_HTML.jpg](img/497846_1_En_9_Fig5_HTML.jpg)

    **图 9-5** 配置 Azure SQL 数据库


    从**图 9-5**可以看出，默认的数据库配置对于本示例来说也有点*昂贵*。点击“查找基本、标准、高级？”链接，导航并选择“基本”选项，如**图 9-6**所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig6_HTML.jpg](img/497846_1_En_9_Fig6_HTML.jpg)

    **图 9-6** 重新配置 Azure SQL 数据库


    对于本示例来说，2 GB 和 5 个 DTU 已经足够。点击“应用”按钮继续。现在数据库配置会显示更新后的设置，如**图 9-7**所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig7_HTML.jpg](img/497846_1_En_9_Fig7_HTML.jpg)

    **图 9-7** 更新后的计算 + 存储设置


    在创建新的 `SSISConfig` 数据库之前，请仔细检查“其他设置”选项卡的“启用高级数据安全”属性，如**图 9-8**所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig8_HTML.jpg](img/497846_1_En_9_Fig8_HTML.jpg)

    **图 9-8** 配置“启用高级数据安全”属性


    如果选择了“开始免费试用”选项，请为本示例将其更改为“暂不”。


    在“网络”和“标记”选项卡上，保留默认配置设置。


    “查看 + 创建”选项卡应类似于**图 9-9**。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig9_HTML.jpg](img/497846_1_En_9_Fig9_HTML.jpg)

    **图 9-9** Azure SQL 数据库的“查看 + 创建”页面


    点击“创建”按钮以创建 Azure SQL 数据库。配置 Azure SQL 数据库需要几分钟时间。完成后，门户应类似于**图 9-10**。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig10_HTML.jpg](img/497846_1_En_9_Fig10_HTML.jpg)

    **图 9-10** 已配置的 Azure SQL 数据库


    下一步是向新的 Azure SQL 数据库添加 `SSISConfig` 数据库对象。


    ## 部署简单、自定义、基于文件的 Azure-SSIS 框架


    本节重点是将第 5 章和第 7 章中设计的 `SSISConfig` 数据库部署到 Azure SQL `SSISConfig` 数据库实例。


    首先，打开 Azure Data Studio（或 SQL Server Management Studio）并连接到最近配置的 Azure SQL 数据库实例，如**图
    9-11**所示。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig11_HTML.jpg](img/497846_1_En_9_Fig11_HTML.jpg)

    **图 9-11** 连接到新的 Azure SQL 数据库


    `SSISConfig` 数据库在上一步中已创建。创建 `SSISConfig` 数据库的脚本类似于第 5 章和第 7 章中使用的脚本，如**代码清单 9-1**所示。


    ```

    print ''SSISConfig database''

    If Not Exists(Select [databases].[name]

    From [sys].[databases]

    Where [databases].[name] = N''SSISConfig'')

    begin

    print '' - Create SSISConfig database''

    Create Database SSISConfig

    print '' - SSISConfig database created''

    end

    Else

    begin

    print '' - SSISConfig database already exists.''

    end

    print ''''

    go

    ```

    **代码清单 9-1** 在 Azure SQL 数据库中创建 `SSISConfig`


    执行完成后，Azure Data Studio 应显示类似于**图 9-12**中所示的消息。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig12_HTML.jpg](img/497846_1_En_9_Fig12_HTML.jpg)

    **图 9-12** `SSISConfig` 数据库已创建


    在撰写本文时，Azure SQL 数据库中的 T-SQL 不支持 `Use` 命令。如果你尝试使用 `Use` 命令，将生成如**图 9-13**所示的错误。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig13_HTML.jpg](img/497846_1_En_9_Fig13_HTML.jpg)

    **图 9-13** 这不是“use”……


    请使用**图 9-13**中高亮显示的数据库选择器下拉菜单代替 `Use` 命令。


    **代码清单 9-2** 合并了第 5 章和第 7 章中剩余的 `SSISConfig` DDL（数据定义语言）语句，用于创建 `SSISConfig` 数据库对象和元数据。

