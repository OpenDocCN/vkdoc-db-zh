    如果 SSIS 包的“包保护级别”属性设置为 `EncryptAllWithPassword` 或 `EncryptSensitiveWithPassword`，则必须将
    SSIS 包的“包密码”属性中的密码提供给执行 SSIS 包活动的“加密密码”属性（图 9-54 中的 #1）。由于我们的测试 SSIS 项目包使用默认保护级别
    `EncryptSensitiveWithUserKey`，因此我们可以将“加密密码”属性留空。出于本示例的目的，接受默认的“日志记录级别”属性设置（基本
    - 图 9-54 中的 #2），并将“日志记录路径”属性设置为 Azure 文件共享路径加上“`\logs`”（图 9-54 中的 #3）。通过选中“与包访问凭据相同”复选框（图
    9-54 中的 #4）来设置“日志记录访问凭据”属性。


    ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig54_HTML.jpg](img/497846_1_En_9_Fig54_HTML.jpg)


    图 9-54 为执行 SSIS 包活动配置加密密码、日志记录级别、日志记录路径和日志记录访问凭据属性'
- fmt: "The parent pipeline is now minimally configured, enough so we can click the\
    \ Debug menu item and perform a test execution (make sure the `Azure-SSIS-Files`\
    \ integration runtime is running first!). By design (at this point), the pipeline\
    \ debug execution should fail, as shown in Figure [9-55](#497846_1_En_9_Chapter.xhtml#Fig55).\n\
    \n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig55_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig55_HTML.jpg)\n\
    **Figure 9-55**\nFailed test execution or parent pipeline\n\nThe test execution\
    \ failed, but why?\n\nIn Figure [9-55](#497846_1_En_9_Chapter.xhtml#Fig55), the\
    \ first execution of the `Execute Application Package` execute SSIS activity failed,\
    \ but the second execution of the `Execute Application Package` execute SSIS activity\
    \ succeeded. You may see *both* executions fail. The most likely cause is the\
    \ `Azure-SSIS-Files` integration runtime is not running.\n\nThe next step is to\
    \ view the log file generated in the Azure file share’s logs folder.\n\n### View\
    \ Test Execution Logs\n\nReturning to storage explorer, the logs folder is likely\
    \ *not* displayed. Refresh the Azure file share from the “More” drop-down menu\
    \ item. Click “Refresh,” as shown in Figure [9-56](#497846_1_En_9_Chapter.xhtml#Fig56).\n\
    \n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig56_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig56_HTML.jpg)\n\
    **Figure 9-56**\nClicking More ➤ Refresh to view the logs folder\n\nThe logs folder,\
    \ shown in Figure [9-57](#497846_1_En_9_Chapter.xhtml#Fig57), should have been\
    \ created (if the logs folder did not exist beforehand) when the test execution\
    \ occurred.\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig57_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig57_HTML.jpg)\n\
    **Figure 9-57**\nThe logs folder, surfaced\n\nDouble-click the logs folder to\
    \ view the contents. Each SSIS package execution generates a run ID visible in\
    \ the pipeline’s Output tab in ADF, as shown in Figure [9-58](#497846_1_En_9_Chapter.xhtml#Fig58),\
    \ along with the corresponding logs\\folder name in storage explorer.\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig58_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig58_HTML.jpg)\n\
    **Figure 9-58**\nPipeline execution’s Output tab aligned with Storage Explorer’s\
    \ logs folder contents\n\n`Execute Application Package` executed twice, once to\
    \ run the SSIS package named `ReportAndSucceed.dtsx` and again for the SSIS package\
    \ named `ReportAndFail.dtsx`. Figure [9-55](#497846_1_En_9_Chapter.xhtml#Fig55)\
    \ showed the topmost instance of `Execute Application Package` succeeded, and\
    \ the next listing of `Execute Application Package` failed.\n\nFigure [9-58](#497846_1_En_9_Chapter.xhtml#Fig58)\
    \ is a screenshot of the parent pipeline’s Output tab *aligned* with the contents\
    \ of the logs folder in the Azure file share. Please note the pipeline’s Output\
    \ Run ID value is similar to the name of the logs subfolder. Entering the topmost\
    \ logs subfolder in storage explorer reveals a collection of log files, as shown\
    \ in Figure [9-59](#497846_1_En_9_Chapter.xhtml#Fig59).\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig59_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig59_HTML.jpg)\n\
    **Figure 9-59**\nLog files stored in the Azure file share `fs-ssis\\logs` folder\n\
    \nRight-click the file that begins with “event_messages_” and then click “Open,”\
    \ as shown in Figure [9-60](#497846_1_En_9_Chapter.xhtml#Fig60).\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig60_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig60_HTML.jpg)\n\
    **Figure 9-60**\nOpening the event_messages log\n\nSince my server is configured\
    \ to open files with the “.log” extension using Notepad, the event_messages file\
    \ opens in Notepad, as shown in Figure [9-61](#497846_1_En_9_Chapter.xhtml#Fig61).\n\
    \n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig61_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig61_HTML.jpg)\n\
    **Figure 9-61**\nViewing the event_messages log file for `ReportAndSucceed.dtsx`\
    \ test execution\n\nThis is the event_messages log file for the execution of the\
    \ `ReportAndSucceed.dtsx` SSIS package. Opening the event_messages log file from\
    \ the other folder displays the event_messages from the execution of the `ReportAndFail.dtsx`\
    \ SSIS package, as shown in Figure [9-62](#497846_1_En_9_Chapter.xhtml#Fig62).\n\
    \n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig62_HTML.jpg](images/497846_1_En_9_Chapter/497846_1_En_9_Fig62_HTML.jpg)\n\
    **Figure 9-62**\nViewing the event_messages log file for `ReportAndFail.dtsx`\
    \ test execution\n\n## Conclusion\n\nThis chapter covered the following:\n\n*\
    \   Provisioning an Azure SQL Database instance\n    *   Deploying the `SSISConfig`\
    \ database to the Azure SQL DB instance\n\n*   Provisioning an Azure File Share\n\
    \    *   Deploying (copying) test SSIS packages to the Azure file share\n\n* \
    \  Building the SSIS framework execution engine\n    *   Test-executing the parent\
    \ pipeline and viewing execution logs\n\nThe next step is persisting application\
    \ and application package operational data in the `SSISConfig` database.\n\n#\
    \ 10. Framework Logging in ADF\n\nChapters [5](#497846_1_En_5_Chapter.xhtml)–[7](#497846_1_En_7_Chapter.xhtml)\
    \ covered designing and building an SSIS framework using a SQL Server database\
    \ named `SSISConfig` and an SSIS package as the execution engine (the `Parent.dtsx`\
    \ SSIS package) to execute SSIS packages stored in the file system of an on-premises\
    \ server. Chapter [8](#497846_1_En_8_Chapter.xhtml) covered provisioning an instance\
    \ of Azure Data Factory (ADF), an Azure storage account, and an `Azure-SSIS` integration\
    \ runtime configured to execute SSIS packages stored in an Azure file share. Chapter\
    \ [9](#497846_1_En_9_Chapter.xhtml) covered provisioning an Azure SQL database,\
    \ deploying the `SSISConfig` database to the Azure SQL DB, provisioning an Azure\
    \ file share (`fs-ssis`), and then building the execution engine (the parent pipeline)\
    \ in ADF.\n\nIn this chapter, we add logging functionality to the parent ADF pipeline,\
    \ much like the functionality we added to the on-premises version of the SSIS\
    \ framework in Chapter [7](#497846_1_En_7_Chapter.xhtml). The log schema and associated\
    \ artifacts have already been deployed, but we will make a few adjustments and\
    \ modifications to the logging-related tables.\n\nAlthough they perform similar\
    \ operations, Azure Data Factory pipelines are *different* from SSIS packages.\
    \ The differences will drive changes in the SSIS framework design.\n\n## Add the\
    \ ApplicationName Parameter\n\nThe parent pipeline will execute SSIS framework\
    \ applications. To make the ADF pipeline generic and able to execute *any* application\
    \ stored in the `SSISConfig` database’s metadata, the pipeline requires an `ApplicationName`\
    \ parameter.\n\nOpen the parent pipeline, click the whitespace of the pipeline,\
    \ and then click the Parameters tab. When the Parameters tab displays, click the\
    \ “+ New” link highlighted in Figure [10-1](#497846_1_En_10_Chapter.xhtml#Fig1).\n\
    \n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig1_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig1_HTML.jpg)\n\
    **Figure 10-1**\nBeginning to add a new parameter\n\nWhen the Parameter configuration\
    \ displays, set the following parameter properties, which are shown in Figure\
    \ [10-2](#497846_1_En_10_Chapter.xhtml#Fig2).\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig2_HTML.jpg](images/497846_1_En_10_Chapter/497846_1_En_10_Fig2_HTML.jpg)\n\
    **Figure 10-2**\nConfiguring the `ApplicationName` parent pipeline parameter\n\
    \n*   Name: `ApplicationName`\n*   Type: `String`\n*   Default Value: `Framework\
    \ Test`\n\nThe `ApplicationName` parameter is now accessible by activities in\
    \ the parent ADF pipeline."
