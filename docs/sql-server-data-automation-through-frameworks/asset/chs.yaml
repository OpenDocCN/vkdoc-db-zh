  \n图 6-24 配置 Object 变量 ApplicationPackages\n\n\n\n### 配置 SSIS 包以迭代应用程序包\n\n`User::ApplicationPackages`\
  \ 变量将接收从执行存储在 SQL 获取应用程序包执行 SQL 任务中的 `SQLStatement` 属性里的 T-SQL 查询所返回的 ADO.Net 数据集。由于此\
  \ T-SQL 查询在条件（WHERE 子句）中包含了 `ApplicationName` 参数，并且该参数由发送到 `Parent.dtsx` SSIS 包的\
  \ `$Package::ApplicationName` SSIS 参数设置，因此该 ADO.Net 数据集将包含已配置 SSISConfig 数据的包列表。因为\
  \ `$Package::ApplicationName` 默认设置为名为“Framework Test”的 SSIS 框架应用程序，所以 `User::ApplicationPackages`\
  \ 变量将包含如图 6-25 所示的结果。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig25_HTML.jpg](img/497846_1_En_6_Fig25_HTML.jpg)\n\
  \n图 6-25 发送到 `User::ApplicationPackages` 变量的结果\n\n单击“确定”按钮关闭“添加变量”对话框。\n\n现在，“SQL\
  \ 获取应用程序包执行 SQL 任务”编辑器的“常规”页应类似于图 6-26。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig26_HTML.jpg](img/497846_1_En_6_Fig26_HTML.jpg)\n\
  \n图 6-26 SQL 获取应用程序包执行 SQL 任务的“常规”页\n\n单击“确定”按钮关闭 SQL 获取应用程序包执行 SQL 任务编辑器。\n\n###\
  \ 迭代应用程序包\n\nSSIS Foreach Loop 容器用于迭代多种集合。`User::ApplicationPackages` SSIS 变量是一个对象数据类型的变量。对象可以包含标量（或单个、单独的值），但它们并非真正为标量而构建。对象旨在包含集合。集合可以是数组或列表，以及记录集和数据集。集合也可以，嗯，就是集合——一种类似列表的\
  \ .Net 变量类型。\n\n在上一节中，我们添加了一个执行 SQL 任务。该执行 SQL 任务的 `ConnectionType` 属性被配置为 `ADO.NET`。我们配置了一个完整结果集，并将结果（来自该结果集）发送到名为\
  \ `User::ApplicationPackages` 的对象变量中。因为执行 SQL 任务的 `ConnectionType` 属性设置为 `ADO.NET`，所以\
  \ `User::ApplicationPackages` 中对象的类型是一个 ADO.Net 数据集。ADO.Net 数据集包含一个表集合。\n\n如果将执行\
  \ SQL 任务配置为使用 `OLE DB` `ConnectionType`，那么发送到 `User::ApplicationPackages` 对象变量的结果集将是一个\
  \ ADO 记录集，它是一个 COM（公共对象模型）对象。COM 是在微软软件的 32 位（x86）时代引入的，大约在 1990 年代初。\n\n很酷的一点是，SSIS\
  \ Foreach Loop 容器的 Foreach ADO 迭代器并不关心你发送给它的是 ADO 记录集还是 ADO.Net 数据集；它都可以迭代。\n\n\
  将一个 Foreach Loop 容器拖到 `Parent.dtsx` 的控制流上，并从 SQL 获取应用程序包执行 SQL 任务到 Foreach Loop\
  \ 容器连接一个优先级约束。将 Foreach Loop 容器重命名为“FOREACH 应用程序包”，如图 6-27 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig27_HTML.jpg](img/497846_1_En_6_Fig27_HTML.jpg)\n\
  \n图 6-27 重命名 Foreach Loop 容器\n\n打开 FOREACH 应用程序包的编辑器并导航到“集合”页。将迭代器更改为“Foreach ADO\
  \ 枚举器”，如图 6-28 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig28_HTML.jpg](img/497846_1_En_6_Fig28_HTML.jpg)\n\
  \n图 6-28 将 FOREACH 应用程序包的迭代器更改为 Foreach ADO 枚举器\n\nForeach Loop 容器的 Foreach ADO\
  \ 枚举器在每次枚举（遍历数据集）时“指向”一行。每列中的值可以通过序数映射到 SSIS 变量，每次“传递”（枚举/迭代）时进行映射。通常，Foreach Loop\
  \ 容器内的 SSIS 任务被配置为从变量中*读取*这些值，并以某种方式对其执行操作。稍后会详细介绍变量映射。\n\n每个迭代器都会呈现一个迭代器特定的属性视图。在“迭代器配置”组框中，单击“ADO\
  \ 对象源变量”下拉列表，然后选择 `User::ApplicationPackages` 变量，如图 6-29 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig29_HTML.jpg](img/497846_1_En_6_Fig29_HTML.jpg)\n\
  \n图 6-29 选择 ADO 对象源变量\n\n将枚举模式保留为“第一个表中的行”。“集合”页配置如图 6-30 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig30_HTML.jpg](img/497846_1_En_6_Fig30_HTML.jpg)\n\
  \n图 6-30 已配置的“集合”页\n\n单击“变量映射”页。单击“变量”列内部，单击下拉列表，然后单击“<新建变量...>”，如图 6-31 所示。\n\n\
  ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig31_HTML.jpg](img/497846_1_En_6_Fig31_HTML.jpg)\n\
  \n图 6-31 在“变量映射”页上单击“新建变量”\n\n\n\n### 配置 SSIS 变量并映射数据集\n\n按照之前的操作，确保在“添加变量”对话框显示时，将“容器”设置为\
  \ SSIS 包作用域（`“Parent”`）。输入 `“PackagePath”` 作为变量名称，其余设置保持各自的默认值，如图 6-32 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig32_HTML.jpg](img/497846_1_En_6_Fig32_HTML.jpg)\n\
  图 6-32 添加 `PackagePath` 变量\n\n单击“确定”按钮关闭“添加变量”对话框。请注意，对于这第一个变量分配，“索引”列默认为 `“0”`，如图\
  \ 6-33 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig33_HTML.jpg](img/497846_1_En_6_Fig33_HTML.jpg)\n\
  图 6-33 `User::PackagePath` 分配给序数 `“0”`\n\n`“0”` 表示什么？很高兴你问到这个问题。`“0”` 表示 `User::ApplicationPackages`\
  \ 数据集中列的序数。请回忆 ADO.Net 数据集中 `Tables(0)` 的内容，如图 6-34 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig34_HTML.jpg](img/497846_1_En_6_Fig34_HTML.jpg)\n\
  图 6-34 `User::ApplicationPackages` 中 ADO.Net 数据集的列序数 `“0”`\n\n我们的包中已经`具有`此字段的值——`ApplicationName`\
  \ 是通过名为 `$Package::ApplicationName` 的参数传递给 `Parent.dtsx` SSIS 包的。我们刚刚创建的 SSIS 变量名为\
  \ `“User::PackagePath”`。我们想要在此处分配的值位于第二个字段中，序数为 1（在这个从 0 开始的数组中）。\n\n将“索引”列中的 `“0”`\
  \ 更改为 `“1”`，如图 6-35 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig35_HTML.jpg](img/497846_1_En_6_Fig35_HTML.jpg)\n\
  图 6-35 将序数更改为 `“1”`\n\n`User::PackagePath` 现在将被分配数据集中第二列的值——在从零开始的序数中为 1。\n\n创建一个新的\
  \ SSIS `Int32` 变量 `User::ExecutionOrder`，使用“添加变量”对话框上的以下设置来映射 `User::ApplicationPackages`\
  \ 变量中数据集的 `ExecutionOrder` 值，如图 6-36 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig36_HTML.jpg](img/497846_1_En_6_Fig36_HTML.jpg)\n\
  图 6-36 映射 `ExecutionOrder` SSIS 变量\n\n*   `容器`: `Parent`\n*   `名称`: `ExecutionOrder`\n\
  *   `命名空间`: `User`\n*   `值类型`: `Int32`\n*   `值`: `-1`\n\n将 `ExecutionOrder` 列的“索引”列更新为\
  \ `2`。FOREACH Application Package Foreach 循环容器的“变量映射”页面应类似于图 6-37。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig37_HTML.jpg](img/497846_1_En_6_Fig37_HTML.jpg)\n\
  图 6-37 `User::PackagePath` 和 `User::ExecutionOrder` 变量已映射\n\n创建一个新的 SSIS `Boolean`\
  \ 变量 `User::FailApplicationOnPackageFailure`，使用“添加变量”对话框上的以下设置来映射 `User::ApplicationPackages`\
  \ 变量中数据集的 `FailApplicationOnPackageFailure` 值，如图 6-38 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig38_HTML.jpg](img/497846_1_En_6_Fig38_HTML.jpg)\n\
  图 6-38 映射 `FailApplicationOnPackageFailure` SSIS 变量\n\n*   `容器`: `Parent`\n*   `名称`:\
  \ `FailApplicationOnPackageFailure`\n*   `命名空间`: `User`\n*   `值类型`: `Boolean`\n\
  *   `值`: `true`\n\n将 `FailApplicationOnPackageFailure` 列的“索引”列更新为 `3`。FOREACH Application\
  \ Package Foreach 循环容器的“变量映射”页面应类似于图 6-39。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig39_HTML.jpg](img/497846_1_En_6_Fig39_HTML.jpg)\n\
  图 6-39 `User:: FailApplicationOnPackageFailure` 变量已映射\n\n单击“确定”按钮关闭“Foreach 循环编辑器”。`Parent.dtsx`\
  \ 应类似于图 6-40。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig40_HTML.jpg](img/497846_1_En_6_Fig40_HTML.jpg)\n\
  图 6-40 添加 FOREACH Application Package 后的 `Parent.dtsx` 控制流\n\n\n### 记录应用程序包值\n\n\
  与记录包启动时的初始值类似，在包执行前记录所有包数据对于故障排除很有帮助。向`Parent.dtsx`包添加一个新的脚本任务。将新脚本任务放置在`FOREACH\
  \ 应用程序包 Foreach 循环容器`内，并将该脚本任务重命名为“SCR Log Application Package Values”，如图 6-41 所示。\n\
  \n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig41_HTML.jpg](img/497846_1_En_6_Fig41_HTML.jpg)\n\
  *图 6-41 添加 SCR Log Application Package Values 脚本任务*\n\n打开脚本任务编辑器，并将以下 SSIS 变量添加到\
  \ `ReadOnlyVariables` 属性中：\n- `System::PackageName`\n- `System::TaskName`\n- `User::PackagePath`\n\
  - `User::ExecutionOrder`\n- `User::FailApplicationOnPackageFailure`\n\n脚本任务的“脚本”页面应如图\
  \ 6-42 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig42_HTML.jpg](img/497846_1_En_6_Fig42_HTML.jpg)\n\
  *图 6-42 已配置的脚本任务 ReadOnlyVariables*\n\n打开 .Net 代码编辑器，并将清单 6-4 中所示的 C# .Net 代码放入\
  \ `public void Main()` 方法中。\n\n```csharp\npublic void Main()\n{\n// System::PackageName,\
  \ System::TaskName\n// User::PackagePath, User::ExecutionOrder, ➤ User::FailApplicationOnPackageFailure\n\
  string packageName = ➤ Dts.Variables[\"System::PackageName\"].Value.ToString();\n\
  string taskName = ➤ Dts.Variables[\"System::TaskName\"].Value.ToString();\nstring\
  \ subComponent = packageName + \".\" + taskName;\nint informationCode = 1001;\n\
  bool fireAgain = true;\nstring packagePath = ➤ Dts.Variables[\"User::PackagePath\"\
  ].Value.ToString();\nstring description = \"PackagePath: \" + packagePath;\nDts.Events.FireInformation(informationCode,\
  \ subComponent, ➤ description, \"\", 0, ref fireAgain);\nint executionOrder = ➤\
  \ Convert.ToInt32(Dts.Variables[\"User::ExecutionOrder\"].Value);\ndescription =\
  \ \"ExecutionOrder: \" + executionOrder.ToString();\nDts.Events.FireInformation(informationCode,\
  \ subComponent, ➤ description, \"\", 0, ref fireAgain);\nbool failApplicationOnPackageFailure\
  \ = ➤ Convert.ToBoolean(Dts.Variables[\"User::FailApplicationOnPackageFailure\"\
  ]➤\n.Value);\ndescription = \"FailApplicationOnPackageFailure: \" + ➤ failApplicationOnPackageFailure.ToString();\n\
  Dts.Events.FireInformation(informationCode, subComponent, ➤ description, \"\", 0,\
  \ ref fireAgain);\nDts.TaskResult = (int)ScriptResults.Success;\n}\n```\n*清单 6-4\
  \ 记录应用程序包值的代码*\n\n当 C# .Net 代码被添加到 SCR Log Application Package Values 脚本任务的 VstaProjects\
  \ 编辑器后，它应如图 6-43 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig43_HTML.png](img/497846_1_En_6_Fig43_HTML.png)\n\
  *图 6-43 SCR Log Application Package Values 的 C# .Net 代码*\n\n关闭 `VstaProjects` 窗口并单击\
  \ `OK` 按钮以关闭脚本任务编辑器。`Parent.dtsx` 的控制流应如图 6-44 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig44_HTML.jpg](img/497846_1_En_6_Fig44_HTML.jpg)\n\
  *图 6-44 添加 SCR Log Application Package Values 后的 Parent.dtsx 控制流*\n\n通过在调试器中执行 `Parent.dtsx`\
  \ 包来测试新功能。按 `F5` 键，然后在调试执行完成后观察“进度”选项卡，如图 6-45 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig45_HTML.jpg](img/497846_1_En_6_Fig45_HTML.jpg)\n\
  *图 6-45 查看由 SCR Log Application Package Values 引发的仪表板消息*\n\n`Parent.dtsx` 包（即 SSIS\
  \ 框架执行引擎）的仪表板已接近完成。下一步是执行那些已从 SSIS 框架数据库返回了元数据的子包。\n\n\n### 执行应用程序包\n\n有多种机制可用于执行\
  \ SSIS 包，包括：\n\n*   .NET（C# 和 Visual Basic）\n*   PowerShell\n*   DtExec 命令行\n* \
  \  SQL Agent\n*   SSIS 执行包任务\n\n在此示例中，我们将使用 SSIS 执行包任务。将一个“执行包任务”拖到 `FOREACH Application\
  \ Package` 循环容器中。从 `SCR Log Application Package Values` 向“执行包任务”连接一个优先约束，然后将执行包任务重命名为\
  \ `EPT Execute Child Package`，如图 6-46 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig46_HTML.jpg](img/497846_1_En_6_Fig46_HTML.jpg)\n\
  **图 6-46** 添加 EPT Execute Child Package 执行包任务\n\n打开“执行包任务编辑器”并导航到“包”选项卡。将 `ReferenceType`\
  \ 属性更改为 `External Reference`，如图 6-47 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig47_HTML.jpg](img/497846_1_En_6_Fig47_HTML.jpg)\n\
  **图 6-47** 将执行包任务的 `ReferenceType` 属性更改为 `External Reference`\n\n将 `EPT Execute\
  \ Child Package` 执行包任务的 `Location` 属性更改为 `File system`，如图 6-48 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig48_HTML.jpg](img/497846_1_En_6_Fig48_HTML.jpg)\n\
  **图 6-48** 设置 `EPT Execute Child Package` 执行包任务的 `Location` 属性\n\n一旦 `EPT Execute\
  \ Child Package` 执行包任务的 `Location` 属性被更改为 `File system`，编辑器中会显示一个新属性 — `Connection`。通过点击下拉菜单并选择\
  \ `<New connection…>` 开始配置新连接，如图 6-49 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig49_HTML.jpg](img/497846_1_En_6_Fig49_HTML.jpg)\n\
  **图 6-49** 选择 `<New connection…>` 以创建新连接\n\n由于 `ReferenceType` 属性被设置为 `External\
  \ Reference` 且 `Location` 属性被设置为 `File system`，`EPT Execute Child Package` 执行包任务的\
  \ `Connection` 属性期望连接到一个文件 — 一个 *SSIS 包文件* 或 `.dtsx` 文件 — 因此“新建连接”操作会创建一个新的“文件连接管理器”并打开其编辑器，如图\
  \ 6-50 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig50_HTML.jpg](img/497846_1_En_6_Fig50_HTML.jpg)\n\
  **图 6-50** 准备配置的文件连接管理器\n\n将文件连接管理器的 `Usage type` 属性保留为 `Existing file`。点击“浏览”按钮并导航到\
  \ `TestSSISSolution\\TestSSISProject` 文件夹中的 `ReportAndSucceed.dtsx` 文件，如图 6-51 所示。\n\
  \n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig51_HTML.jpg](img/497846_1_En_6_Fig51_HTML.jpg)\n\
  **图 6-51** 浏览到 `TestSSISSolution\\TestSSISProject` 文件夹中的 `ReportAndSucceed.dtsx`\
  \ 文件\n\n一旦选择了 `TestSSISSolution\\TestSSISProject\\ReportAndSucceed.dtsx` 文件，“文件连接管理器编辑器”将如图\
  \ 6-52 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig52_HTML.jpg](img/497846_1_En_6_Fig52_HTML.jpg)\n\
  **图 6-52** 已选择 `TestSSISSolution\\TestSSISProject\\ReportAndSucceed.dtsx` 文件\n\n\
  点击“文件连接管理器编辑器”的“确定”按钮返回到 `EPT Execute Child Package` 执行包任务编辑器，其外观将类似于图 6-53。\n\n\
  ![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig53_HTML.jpg](img/497846_1_En_6_Fig53_HTML.jpg)\n\
  **图 6-53** 已配置的 `EPT Execute Child Package` 和 `ReportAndSucceed.dtsx` 文件连接管理器\n\n\
  点击 `EPT Execute Child Package` 执行包任务编辑器的“确定”按钮。\n\n右键单击 `ReportAndSucceed.dtsx`\
  \ 文件连接管理器，然后单击“重命名”，如图 6-54 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig54_HTML.jpg](img/497846_1_En_6_Fig54_HTML.jpg)\n\
  **图 6-54** 重命名 `ReportAndSucceed.dtsx` 文件连接管理器\n\n将文件连接管理器重命名为 `ChildPackage`，如图\
  \ 6-55 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig55_HTML.jpg](img/497846_1_En_6_Fig55_HTML.jpg)\n\
  **图 6-55** 将文件连接管理器重命名为 `ChildPackage`\n\n为了执行从 `FOREACH Application Package`（它从查询\
  \ `SSISConfig` 数据库获取元数据）提供的 SSIS 应用程序包，`ChildPackage` 文件连接管理器的 `ConnectionString`\
  \ 属性需要是动态的。SSIS 表达式旨在为运行时的包、容器和任务提供动态值。\n\n单击 `ChildPackage` 文件连接管理器以选中它，然后按 `F4`\
  \ 键打开 `ChildPackage` 文件连接管理器的属性，如图 6-56 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig56_HTML.jpg](img/497846_1_En_6_Fig56_HTML.jpg)\n\
