  \ 包的 `PackageId`，如图 5-24 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig24_HTML.jpg](img/497846_1_En_5_Fig24_HTML.jpg)\n\
  *图 5-24 “ReportAndSucceed.dtsx” 和 “ReportAndFail.dtsx” SSIS 包的 PackageId*\n\n重新执行代码清单\
  \ 5-10 中所示的添加 SSIS 包的 T-SQL 代码，会产生如图 5-25 所示的消息。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig25_HTML.jpg](img/497846_1_En_5_Fig25_HTML.jpg)\n\
  *图 5-25 重新执行 SSIS 包的 T-SQL 代码*\n\n重新执行代码清单 5-10 中所示的添加 SSIS 包的 T-SQL 代码，会产生*相同*的结果，如图\
  \ 5-26 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig26_HTML.jpg](img/497846_1_En_5_Fig26_HTML.jpg)\n\
  *图 5-26 “ReportAndSucceed.dtsx” 和 “ReportAndFail.dtsx” SSIS 包的相同 PackageId*\n\n\
  后续重新执行添加 SSIS 包的 T-SQL 代码会产生相同的结果。\n\n#### 分配 SSIS 应用包\n\n通过执行代码清单 5-12 中所示的 T-SQL\
  \ 代码，在 SSIS 框架中分配 SSIS 应用包。\n\n```sql\nuse [SSISConfig]\ngo\nSet NoCount ON\ndeclare\
  \ @ApplicationName nvarchar(255) = N'Framework Test'\ndeclare @PackageLocation nvarchar(255)\
  \ = ➤ N'E:\\Projects\\TestSSISSolution\\TestSSISProject\\'\ndeclare @PackageName\
  \ nvarchar(255) = N'ReportAndSucceed.dtsx'\ndeclare @ExecutionOrder int = 10\nprint\
  \ @ApplicationName + ' - ' + @PackageLocation + @PackageName\ndeclare @ApplicationId\
  \ int = (Select [Applications].[ApplicationId]\nFrom [config].[Applications]\nWhere\
  \ [Applications].[ApplicationName] = ➤ @ApplicationName)\ndeclare @PackageId int\
  \ = (Select [Packages].[PackageId]\nFrom [config].[Packages]\nWhere [Packages].[PackageLocation]\
  \ = ➤ @PackageLocation\nAnd [Packages].[PackageName] = @PackageName)\ndeclare @ApplicationPackageId\
  \ int = (Select ApplicationPackageId\nFrom config.ApplicationPackages\nWhere ApplicationId\
  \ = @ApplicationId\nAnd PackageId = @PackageId\nAnd ExecutionOrder = @ExecutionOrder)\n\
  If (@ApplicationPackageId Is NULL)\nbegin\nprint ' - Assigning ' + @PackageName\
  \ + ' package to '\n+ @ApplicationName + ' application'\n+ ' in config.ApplicationPackages\
  \ table'\n+ ' at ExecutionOrder ' + Convert(varchar(9), @ExecutionOrder)\nInsert\
  \ Into [config].[ApplicationPackages]\n(ApplicationId\n, PackageId\n, ExecutionOrder)\n\
  Values (@ApplicationId\n, @PackageId\n, @ExecutionOrder)\nprint ' - ' + @PackageName\
  \ + ' package assigned to '\n+ @ApplicationName + ' application'\n+ ' in config.ApplicationPackages\
  \ table'\n+ ' at ExecutionOrder ' + Convert(varchar(9), @ExecutionOrder)\nend\n\
  Else\nbegin\nprint ' - ' + @PackageName + ' package already'\n+ ' assigned to '\
  \ + @ApplicationName\n+ ' application in config.ApplicationPackages table'\n+ '\
  \ at ExecutionOrder ' + Convert(varchar(9), @ExecutionOrder)\n+ '.'\nend\nprint\
  \ ''\nset @PackageName = N'ReportAndFail.dtsx'\nset @ExecutionOrder = 20\nprint\
  \ @ApplicationName + ' - ' + @PackageLocation + @PackageName\nset @ApplicationId\
  \ = (Select [Applications].[ApplicationId]\nFrom [config].[Applications]\nWhere\
  \ [Applications].[ApplicationName] = ➤ @ApplicationName)\nset @PackageId = (Select\
  \ [Packages].[PackageId]\nFrom [config].[Packages]\nWhere [Packages].[PackageLocation]\
  \ = @PackageLocation\nAnd [Packages].[PackageName] = @PackageName)\nset @ApplicationPackageId\
  \ = (Select ApplicationPackageId\nFrom config.ApplicationPackages\nWhere ApplicationId\
  \ = @ApplicationId\nAnd PackageId = @PackageId\nAnd ExecutionOrder = @ExecutionOrder)\n\
  If (@ApplicationPackageId Is NULL)\nbegin\nprint ' - Assigning ' + @PackageName\
  \ + ' package to '\n+ @ApplicationName + ' application'\n+ ' in config.ApplicationPackages\
  \ table'\n+ ' at ExecutionOrder ' + Convert(varchar(9), @ExecutionOrder)\nInsert\
  \ Into [config].[ApplicationPackages]\n(ApplicationId\n, PackageId\n, ExecutionOrder)\n\
  Values (@ApplicationId\n, @PackageId\n, @ExecutionOrder)\nprint ' - ' + @PackageName\
  \ + ' package assigned to '\n+ @ApplicationName + ' application'\n+ ' in config.ApplicationPackages\
  \ table'\n+ ' at ExecutionOrder ' + Convert(varchar(9), @ExecutionOrder)\nend\n\
  Else\nbegin\nprint ' - ' + @PackageName + ' package already'\n+ ' assigned to '\
  \ + @ApplicationName\n+ ' application in config.ApplicationPackages table'\n+ '\
  \ at ExecutionOrder ' + Convert(varchar(9), @ExecutionOrder)\n+ '.'\nend\nprint\
  \ ''\nListing 5-12\nAssigning SSIS application packages\n```\n\n\n\n与清单 5-8 和清单\
  \ 5-10 中的 T-SQL 一样，清单 5-12 中的 T-SQL 是幂等的。清单 5-12 中的 T-SQL 代码在`config.ApplicationPackages`表中产生相同的结果；两个名为`ReportAndSucceed.dtsx`和`ReportAndFail.dtsx`的新\
  \ SSIS 包的元数据被分配给框架中的`Framework Test`应用程序。清单 5-12 中的 T-SQL 首次执行会返回清单 5-13 所示的消息。\n\
  \n```\nFramework Test - ➤ E:\\Projects\\TestSSISSolution\\TestSSISProject\\ReportAndSucceed.dtsx\n\
  - Assigning ReportAndSucceed.dtsx package to Framework Test application in ➤ config.ApplicationPackages\
  \ table at ExecutionOrder 10\n- ReportAndSucceed.dtsx package assigned to Framework\
  \ Test application in ➤ config.ApplicationPackages table at ExecutionOrder 10\n\
  Framework Test - ➤ E:\\Projects\\TestSSISSolution\\TestSSISProject\\ReportAndFail.dtsx\n\
  - Assigning ReportAndFail.dtsx package to Framework Test application in ➤ config.ApplicationPackages\
  \ table at ExecutionOrder 20\n- ReportAndFail.dtsx package assigned to Framework\
  \ Test application in ➤ config.ApplicationPackages table at ExecutionOrder 20\n\
  Listing 5-13\n首次将 ReportAndSucceed.dtsx 和 ReportAndFail.dtsx SSIS 包分配给 Framework\
  \ Test 应用程序时返回的消息\n```\n\n重新执行清单 5-12 所示的`Add SSIS Application Packages` T-SQL 会产生图\
  \ 5-27 所示的消息。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig27_HTML.jpg](img/497846_1_En_5_Fig27_HTML.jpg)\n\
  图 5-27：重新执行 SSIS Application Packages T-SQL\n\n后续重新执行`Add SSIS Application Packages`\
  \ T-SQL 会产生相同的结果。\n\nSSIS 框架元数据数据库包含一个名为`config`的架构。`config`架构包含三张表：\n1. `Config.Applications`\n\
  2. `Config.Packages`\n3. `Config.ApplicationPackages`\n\n这些表包含名为`Framework Test`的应用程序的元数据，该应用程序与名为`ReportAndSucceed.dtsx`和`ReportAndFail.dtsx`的两个\
  \ SSIS 包相关。可以通过执行清单 5-14 所示的 T-SQL 来检索元数据。\n\n```\nUse [SSISConfig]\ngo\ndeclare\
  \ @ApplicationName nvarchar(255) = N'Framework Test'\nSelect a.ApplicationName\n\
  , p.PackageLocation + p.PackageName As PackagePath\n, ap.ExecutionOrder\n, ap.FailApplicationOnPackageFailure\n\
  From [config].[ApplicationPackages] ap\nJoin [config].[Applications] a\nOn a.ApplicationId\
  \ = ap.ApplicationId\nJoin [config].Packages p\nOn p.PackageId = ap.PackageId\n\
  Where a.ApplicationName = @ApplicationName\nAnd ap.ApplicationPackageEnabled = 1\n\
  Order By ap.ExecutionOrder\nListing 5-14\n查看框架应用程序内容\n```\n\n清单 5-14 所示 T-SQL 查询返回的\
  \ SSIS 框架元数据如图 5-28 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig28_HTML.jpg](img/497846_1_En_5_Fig28_HTML.jpg)\n\
  图 5-28：SSIS 框架元数据查询结果\n\n从 SSIS 框架元数据返回的信息足以在 SSIS 框架执行引擎中执行。我们的下一步是构建 SSIS 框架的执行引擎。\n\
  \n### 总结\n\n在本章中，我们重点介绍了：\n* 构建元数据数据库\n* 构建测试 SSIS 项目\n* 向元数据数据库添加元数据\n\n下一步是构建执行引擎，我们将在下一章中完成。\n\
  \n## 6. 框架执行引擎\n\n既然在上一章中已经构建了元数据数据库和测试应用程序，现在是时候专注于执行引擎了。回想一下，在上一章开头附近，我强调了同理心在软件架构和设计中的重要性。我写道\n\
  \n> *我假设 SSIS 开发人员或 SSIS 开发团队会熟悉 SSIS，因此我在 SSIS 中构建 SSIS 框架。我希望开发人员或团队能够管理和维护他们的框架。*\n\
  \n第 5 章介绍了构建框架和管理元数据。现在，是时候考虑我们的 SSIS 包将如何执行了。\n\n### 创建父 SSIS 包\n\n在一个新的名为`SSISFrameworkSolution`的\
  \ SSIS 解决方案中，创建一个名为`SSISFrameworkProject`的新 SSIS 项目。将默认的 SSIS 包重命名为`Parent.dtsx`，如图\
  \ 6-1 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig1_HTML.jpg](img/497846_1_En_6_Fig1_HTML.jpg)\n\
  图 6-1：在`SSISFrameworkSolution`的`SSISFrameworkProject`中重命名`Parent.dtsx` SSIS 包\n\n\
  `Parent.dtsx`将：\n* 记录执行值\n* 从`SSISConfig`数据库检索属于某个 SSIS 应用程序的 SSIS 应用程序包列表\n* 遍历检索到的应用程序包列表\n\
  * 记录每个应用程序包的元数据\n* 执行每个应用程序包\n* 记录执行结果\n\n\n\n### 记录执行值\n\n首先，添加一个名为 `ApplicationName`\
  \ 的字符串数据类型包参数，默认值为 `Framework Test`，如图 6-2 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig2_HTML.jpg](img/497846_1_En_6_Fig2_HTML.jpg)\n\
  图 6-2\n将 `ApplicationName` 包参数添加到 `Parent.dtsx`\n\n将 `Sensitive` 和 `Required` 参数属性保留为其默认值：`False`。`ApplicationName`\
  \ 参数包含当 `Parent.dtsx` 执行时要执行的 SSIS 框架 SSIS 应用程序的名称。该参数的值将在运行时被覆盖。\n\n要记录执行值，请将一个脚本任务添加到\
  \ `Parent.dtsx` 控制流中。将该脚本任务重命名为 `SCR Log Initial Values`，如图 6-3 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig3_HTML.jpg](img/497846_1_En_6_Fig3_HTML.jpg)\n\
  图 6-3\n添加并重命名 `SCR Log Initial Values` 脚本任务\n\n`SCR Log Initial Values` 脚本任务将用于捕获\
  \ `Parent.dtsx` 包在执行开始时初始状态的插桩信息。插桩在任何工程实践中都很重要，数据工程以及 ETL（提取、转换和加载）插桩也是如此。在 SSIS\
  \ 包执行开始时捕获设置的初始状态对于故障排除至关重要。正如我的朋友 Grant Fritchey 所说：“如果你不知道正确的情况是什么样子，你怎么知道哪里出了问题？”\n\
  \n打开 `SCR Log Initial Values` 脚本任务编辑器，并将以下 SSIS 变量和参数添加到 `ReadOnlyVariables` 属性中，如图\
  \ 6-4 和图 6-5 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig5_HTML.jpg](img/497846_1_En_6_Fig5_HTML.jpg)\n\
  图 6-5\n两个 SSIS 变量和一个参数已添加到 `ReadOnlyVariables` 脚本任务属性\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig4_HTML.jpg](img/497846_1_En_6_Fig4_HTML.jpg)\n\
  图 6-4\n为 `ReadOnlyVariables` 脚本任务属性选择两个 SSIS 变量和一个参数\n\n*   `System::PackageName`\n\
  *   `System::TaskName`\n*   `$Package::ApplicationName`\n\n从 `ReadOnlyVariables`\
  \ 脚本任务属性中复制变量和参数列表。单击 `Edit Script` 按钮，打开名为 `VstaProjects` 的 Visual Studio Tools\
  \ for Applications (VSTA) .Net 代码编辑器窗口。导航到 `public void Main()`，并将 SSIS 变量和参数粘贴为注释，如图\
  \ 6-6 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig6_HTML.jpg](img/497846_1_En_6_Fig6_HTML.jpg)\n\
  图 6-6\n将 SSIS 变量和参数复制到 `VstaProjects`\n\n添加如清单 6-1 所示的 .Net C# 代码，以记录 `ApplicationName`\
  \ 参数的初始值。\n\n```csharp\npublic void Main()\n{\n    // Variables: System::TaskName,System::PackageName\n\
  \    // Parameters: $Package::ApplicationName\n    string packageName = Dts.Variables[\"\
  System::PackageName\"].Value.ToString();\n    string taskName = Dts.Variables[\"\
  System::TaskName\"].Value.ToString();\n    string subComponent = packageName + \"\
  .\" + taskName;\n    int informationCode = 1001;\n    bool fireAgain = true;\n \
  \   string applicationName = Dts.Variables[\"$Package::ApplicationName\"].Value.ToString();\n\
  \    string description = \"ApplicationName: \" + applicationName;\n    Dts.Events.FireInformation(informationCode,\
  \ subComponent, description, \"\", 0, ref fireAgain);\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
  }\n```\n清单 6-1\n用于记录 `ApplicationName` 参数初始值的 C# .Net 代码\n\n一旦 `public void Main()`\
  \ 中的代码与清单 6-1 匹配，`VstaProjects` 窗口应配置并引发一个 SSIS Information 事件，如图 6-7 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig7_HTML.jpg](img/497846_1_En_6_Fig7_HTML.jpg)\n\
  图 6-7\n引发 SSIS Information 事件的 C# .Net 代码\n\n关闭 `VstaProjects` 窗口，并单击脚本任务编辑器上的 `OK`\
  \ 按钮。在调试器 (F5) 中执行 `Parent.dtsx` SSIS 包。如果一切顺利，`SCR Log Initial Values` 脚本任务应执行并成功，如图\
  \ 6-8 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig8_HTML.jpg](img/497846_1_En_6_Fig8_HTML.jpg)\n\
  图 6-8\n成功调试执行 `Parent.dtsx`\n\n单击 `Progress` 选项卡（如果已停止调试器，则单击 `Execution Results`\
  \ 选项卡），并查看 `SCR Log Initial Values` 脚本任务中编码的 Information 事件，如图 6-9 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig9_HTML.jpg](img/497846_1_En_6_Fig9_HTML.jpg)\n\
  图 6-9\n查看 Information 事件\n\nInformation 事件的文本如清单 6-2 所示。\n\n```\n[Parent.SCR Log\
  \ Initial Values] Information: ApplicationName: Framework Test\n```\n清单 6-2\nInformation\
  \ 事件的内容\n\n`subComponent` 的值列在最前面，用方括号括起来：`[Parent.SCR Log Initial Values]`。事件类型跟在\
  \ `subComponent` 后面：`Information`。`description` 字符串在最后：`ApplicationName: Framework\
  \ Test`。\n\n此消息将出现在为 `Parent.dtsx` SSIS 包配置的任何日志记录中，并通知操作员哪个 SSIS 应用程序名称已传递给 `Parent.dtsx`\
  \ 包。\n\n\n\n### 从 SSISConfig 检索 SSIS 应用程序包\n\n下一步是在`Parent.dtsx` SSIS 包中检索要执行的包列表。向`Parent.dtsx`控制流添加一个执行\
  \ SQL 任务，并将其重命名为“SQL Get Application Packages”，如图 6-10 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig10_HTML.jpg](img/497846_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10 添加“SQL Get Application Packages”执行 SQL 任务\n\n从`SCR Log Initial Values`脚本任务连接一个优先约束到`SQL\
  \ Get Application Packages`执行 SQL 任务，然后右键单击该任务并单击“编辑”来打开`SQL Get Application Packages`执行\
  \ SQL 任务编辑器，如图 6-11 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig11_HTML.jpg](img/497846_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11 连接优先约束并打开 SQL Get Application Packages 执行 SQL 任务编辑器\n\n将`SQL Get Application\
  \ Packages`执行 SQL 任务的`ConnectionType`属性设置为`ADO.NET`，如图 6-12 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig12_HTML.jpg](img/497846_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12 将 ConnectionType 设置为 ADO.NET\n\n单击`Connection`属性中的下拉菜单，然后单击“<New Connection…>”，如图\
  \ 6-13 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig13_HTML.jpg](img/497846_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13 从 Connection 属性中选择<New Connection…>\n\n此时将显示“Configure ADO.NET Connection\
  \ Manager”对话框，如图 6-14 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig14_HTML.jpg](img/497846_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14 Configure ADO.NET Connection Manager 对话框\n\n单击“New”按钮打开连接管理器配置对话框。配置一个新的`ADO.NET\
  \ Connection Manager`以连接到你的`SSISConfig`数据库实例，如图 6-15 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig15_HTML.jpg](img/497846_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15 配置新的 ADO.NET Connection Manager\n\n单击“OK”按钮完成`ADO.NET Connection Manager`的配置。新的连接管理器配置包含你的`SSISConfig`数据库实例的连接信息，现在已存储在已配置的`ADO.NET`连接管理器列表中，如图\
  \ 6-16 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig16_HTML.jpg](img/497846_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16 在 Configure ADO.NET Connection Manager 中的 SSISConfig 数据库配置\n\n单击“OK”按钮完成`ADO.NET\
  \ Connection Manager`的配置。此时，执行 SQL 任务编辑器应类似于图 6-17。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig17_HTML.jpg](img/497846_1_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17 为 SQL Get Application Packages 执行 SQL 任务配置的连接\n\n上一章中的代码清单 5-14 包含了从`SSISConfig`数据库中存储的元数据返回给定\
  \ SSIS 应用程序的 SSIS 应用程序包列表所需的 T-SQL。使用代码清单 6-3 所示的 T-SQL 配置`SQL Get Application Packages`执行\
  \ SQL 任务的`SQLStatement`属性。\n\n```sql\nSelect a.ApplicationName\n, p.PackageLocation\
  \ + p.PackageName As PackagePath\n, ap.ExecutionOrder\n, ap.FailApplicationOnPackageFailure\n\
  From [config].[ApplicationPackages] ap\nJoin [config].[Applications] a\nOn a.ApplicationId\
  \ = ap.ApplicationId\nJoin [config].Packages p\nOn p.PackageId = ap.PackageId\n\
  Where a.ApplicationName = @ApplicationName\nAnd ap.ApplicationPackageEnabled = 1\n\
  Order By ap.ExecutionOrder\n```\n\n代码清单 6-3 从 SSISConfig 数据库检索 SSIS 应用程序包的 T-SQL\n\
  \n将代码清单 6-3 中的 T-SQL 添加到`SQL Get Application Packages`执行 SQL 任务的`SQLStatement`属性中，如图\
  \ 6-18 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig18_HTML.jpg](img/497846_1_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18 添加 SQLStatement 属性的 T-SQL\n\n单击“OK”按钮关闭“Enter SQL Query”对话框。执行 SQL 任务编辑器应类似于图\
  \ 6-19 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig19_HTML.jpg](img/497846_1_En_6_Fig19_HTML.jpg)\n\
  \n图 6-19 配置 SQLStatement 属性后的 SQL Get Application Packages 执行 SQL 任务\n\n在执行 SQL\
  \ 任务编辑器左侧的页面列表中，单击“Parameter Mapping”页面，然后单击“Add”按钮添加一个参数映射。从“Variable Name”列中选择`$Package::ApplicationName`参数，选择`String`数据类型，并在“Parameter\
  \ Name”列中输入`ApplicationName`，如图 6-20 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig20_HTML.jpg](img/497846_1_En_6_Fig20_HTML.jpg)\n\
  \n图 6-20 添加 ApplicationName 参数\n\n在“Parameter Mapping”页面上配置的`ApplicationName`参数将从名为`$Package::ApplicationName`的\
  \ SSIS 包参数（如图 6-20 中“Variable Name”列所示）读取值，并将该值提供给在`SQL Get Application Packages`执行\
  \ SQL 任务的`SQLStatement`属性（见代码清单 6-17）中配置的 T-SQL 查询参数。\n\n返回到`SQL Get Application\
  \ Packages`执行 SQL 任务的“General”页面。单击`ResultSet`属性中的下拉菜单，选择“Full result set”，如图 6-21\
  \ 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig21_HTML.jpg](img/497846_1_En_6_Fig21_HTML.jpg)\n\
