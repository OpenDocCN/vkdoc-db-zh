  \ Success` 脚本任务编辑器。和之前一样，将 `System::PackageName`、`System::TaskName` 和 `User::PackagePath`\
  \ SSIS 变量添加到 `ReadOnlyVariables` 属性中，如图 6-66 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig66_HTML.jpg](img/497846_1_En_6_Fig66_HTML.jpg)\n\
  **图 6-66** 填充 ReadOnlyVariables 属性\n\n点击“编辑脚本”按钮打开 `VstaProjects` 编辑器。将清单 6-5 中所示的\
  \ C# .Net 代码添加到 `public void Main()` 方法中，以在框架中记录 SSIS 应用程序包的成功执行。\n\n```\npublic\
  \ void Main()\n{\n// System::PackageName, System::TaskName\n// User::PackagePath\n\
  string packageName = ➤ Dts.Variables[\"System::PackageName\"].Value.ToString();\n\
  string taskName = Dts.Variables[\"System::TaskName\"].Value.ToString();\nstring\
  \ subComponent = packageName + \".\" + taskName;\nint informationCode = 1001;\n\
  bool fireAgain = true;\nstring packagePath = Dts.Variables[\"User::PackagePath\"\
  ].Value.ToString();\nstring description = packagePath + \" execution succeeded\"\
  ;\nDts.Events.FireInformation(informationCode, subComponent, description, ➤ \"\"\
  , 0, ref fireAgain);\nDts.TaskResult = (int)ScriptResults.Success;\n}\n```\n**清单\
  \ 6-5** 用于记录成功的 SSIS 应用程序包执行的 C# .Net 代码\n\n清单 6-5 中的代码引发了一个 `Information` 事件，该事件构建了一条消息，通知操作员和开发人员\
  \ SSIS 框架应用程序包执行已成功，如图 6-67 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig67_HTML.jpg](img/497846_1_En_6_Fig67_HTML.jpg)\n\
  **图 6-67** 在 SSIS 框架应用程序包成功执行时引发 Information 事件\n\n关闭 `VstaProjects` 窗口，然后点击 `SCR\
  \ Log Package Execution Success` 脚本任务编辑器上的“确定”按钮。从 `EPT Execute Child Package` 执行包任务连接一个“成功”优先级约束到\
  \ `SCR Log Package Execution Success` 脚本任务，如图 6-68 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig68_HTML.jpg](img/497846_1_En_6_Fig68_HTML.jpg)\n\
  **图 6-68** 已配置的 SCR Log Package Execution Success\n\n将另一个“脚本任务”拖到 `FOREACH Application\
  \ Package` forEach 循环容器中，并将该脚本任务重命名为“`SCR Log Package Execution Failure`”，然后从 `EPT\
  \ Execute Child Package` 执行包任务连接一个“失败”优先级约束（红色箭头）到 `SCR Log Package Execution Failure`\
  \ 脚本任务，如图 6-69 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig69_HTML.jpg](img/497846_1_En_6_Fig69_HTML.jpg)\n\
  **图 6-69** 添加 SCR Log Package Execution Failure 脚本任务\n\n将以下 SSIS 变量添加到 `SCR Log\
  \ Package Execution Failure` 脚本任务的 `ReadOnlyVariables` 列表中：\n\n*   `System::PackageName`\n\
  *   `System::TaskName`\n*   `User::PackagePath`\n*   `User::FailApplicationOnPackageFailure`\n\
  \n添加后，`SCR Log Package Execution Failure` 脚本任务的 `ReadOnlyVariables` 属性应如图 6-70 所示。\n\
  \n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig70_HTML.jpg](img/497846_1_En_6_Fig70_HTML.jpg)\n\
  **图 6-70**\n\n\n\n#### 查看 SCR Log Package Execution Failure 脚本任务的 ReadOnlyVariables\
  \ 属性\n\n单击 Edit Script 按钮，并将清单 6-6 中所示的 C# .Net 代码添加到 `public void Main()` 方法中。\n\
  \n```csharp\npublic void Main()\n{\n// System::PackageName, System::TaskName\n//\
  \ User::FailApplicationOnPackageFailure, User::PackagePath\nstring packageName =\
  \ ➤ Dts.Variables[\"System::PackageName\"].Value.ToString();\nstring taskName =\
  \ Dts.Variables[\"System::TaskName\"].Value.ToString();\nstring subComponent = packageName\
  \ + \".\" + taskName;\nint informationCode = 1001;\nint errorCode = -999;\nbool\
  \ fireAgain = true;\nbool failApplicationOnPackageFailure = ➤ Convert.ToBoolean(Dts.Variables[\"\
  User::FailApplicationOnPackageFailure\"] ➤\n.Value);\nstring packagePath = Dts.Variables[\"\
  User::PackagePath\"].Value.ToString();\nstring description = String.Empty;\nif(failApplicationOnPackageFailure)\n\
  {\ndescription = packagePath + \" execution failed and ➤ FailApplicationOnPackageFailure\
  \ is set (true)\";\nDts.Events.FireError(errorCode, subComponent, description, \"\
  \", 0);\n}\nelse\n{\ndescription = packagePath + \" execution failed and ➤ FailApplicationOnPackageFailure\
  \ is NOT set (false)\";\nDts.Events.FireInformation(informationCode, subComponent,\
  \ ➤ description, \"\", 0, ref fireAgain);\n}\nDts.TaskResult = (int)ScriptResults.Success;\n\
  }\n```\n清单 6-6\n用于记录应用程序包执行失败的 C# .Net 代码\n\n用于响应 SSIS 框架应用程序包失败的 C# .Net 代码应类似于图\
  \ 6-71 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig71_HTML.jpg](img/497846_1_En_6_Fig71_HTML.jpg)\n\
  图 6-71\n用于记录应用程序包执行失败的 C# .Net 代码\n\n关闭 VstaProjects 窗口，并在 SCR Log Package Execution\
  \ Failure 脚本任务编辑器上单击 OK 按钮。\n\n我们来测试一下！一次测试执行（仍然）导致此 Parent.dtsx SSIS 包执行失败，如图 6-72\
  \ 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig72_HTML.jpg](img/497846_1_En_6_Fig72_HTML.jpg)\n\
  图 6-72\nParent.dtsx 执行失败（再次）\n\n但这次，与之前的执行不同，在 Parent.dtsx 中插桩的信息事件揭示了哪些成功了、哪些失败了，如图\
  \ 6-73 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig73_HTML.jpg](img/497846_1_En_6_Fig73_HTML.jpg)\n\
  图 6-73\n查看应用程序包执行结果\n\n插桩是好的。相信我。但如果消息没有被持久化，插桩几乎就没什么用。我能听到你在想：“安迪，我们可以在哪里捕获这些插桩消息呢？”我很高兴你提出了这个极好的问题。答案是：“当然是在\
  \ SSISConfig 里！”\n\n### 结论\n\n本章重点在于为基于文件的 SSIS 框架构建执行引擎。在本章中，我们构建了 Parent.dtsx\
  \ SSIS 包并添加了插桩。\n\n下一步是将插桩消息记录到 SSISConfig 数据库中，这将在下一章中介绍。\n\n## 7. 框架日志记录\n\n在我们构建一个简单的、自定义的、基于文件的\
  \ SSIS 框架的旅程中，我们已经构建了一个元数据库（名为 SSISDB）、一个测试 SSIS 项目、加载了一些示例元数据（用于测试 SSIS 项目）、创建了执行引擎（Parent.dtsx）并添加了插桩。\n\
  \n本章涵盖如何将执行引擎中生成的插桩消息持久化到 SSISConfig 数据库。\n\n### 创建日志模式\n\n由执行 Parent.dtsx 生成并显示在\
  \ Progress/Execution Results 选项卡上的信息消息非常有用，尤其是在故障排除时。我们如何存储这些消息以供将来访问——特别是当“发生不好的事情”时？\n\
  \n返回到你最喜欢的 T-SQL 开发编辑器（本章剩余部分我将切换到 Azure Data Studio 版本 1.17.1），并连接到托管 SSISConfig\
  \ 数据库的 SQL Server 实例。使用清单 7-1 中的 T-SQL 在 SSISConfig 数据库中创建一个名为 \"log\" 的新模式。\n\n\
  ```sql\nUse [SSISConfig]\ngo\nprint 'Log schema'\nIf Not Exists(Select [schemas].[name]\n\
  From [sys].[schemas]\nWhere [schemas].[name] = N'log')\nbegin\nprint ' - Create\
  \ log schema'\ndeclare @sql nvarchar(100) = N'Create Schema log'\nexec(@sql)\nprint\
  \ ' - Log schema created'\nend\nElse\nbegin\nprint ' - Log schema already exists.'\n\
  end\nprint ''\ngo\n```\n清单 7-1\n创建 SSISConfig.log 模式\n\n消息在 Azure Data Studio 中看起来略有不同，如图\
  \ 7-1 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig1_HTML.jpg](img/497846_1_En_7_Fig1_HTML.jpg)\n\
  图 7-1\n查看创建日志模式时的消息\n\n我们期望在 SQL Server Management Studio (SSMS) 中看到的消息在图 7-1 的“方框”中突出显示。\n\
  \n在添加一个表来捕获日志模式中的“应用程序包执行实例”之前，先添加一个表来捕获日志模式中的“应用程序执行实例”。第一个新表名为 log.ApplicationInstance，构建此表的\
  \ T-SQL 代码见清单 7-2。\n\n```sql\nuse [SSISConfig]\ngo\nprint 'Log.ApplicationInstance\
  \ table'\nIf Not Exists(Select [schemas].[name]\n+ '.' + [tables].[name] As [Schema.Table]\n\
  From [sys].[tables]\nJoin [sys].[schemas]\nOn [schemas].[schema_id] = [tables].[schema_id]\n\
  Where [schemas].[name] = N'log'\nAnd [tables].[name] = N'ApplicationInstance')\n\
  begin\nprint ' - Create log.ApplicationInstance table'\nCreate Table [log].[ApplicationInstance]\n\
  (\nApplicationInstanceId int identity(1, 1)\nConstraint PK_log_ApplicationInstance\
  \ Primary Key Clustered\n, ApplicationId int Not NULL\nConstraint FK_log_ApplicationInstance_config_Applications\n\
  Foreign Key References [config].Applications\n, ApplicationStartTime datetimeoffset(7)\
  \ Not NULL\nConstraint DF_log_ApplicationInstance_ApplicationStartTime\nDefault(sysdatetimeoffset())\n\
  , ApplicationEndTime datetimeoffset(7) NULL\n, ApplicationStatus nvarchar(25) Not\
  \ NULL\nConstraint DF_log_ApplicationInstance_ApplicationStatus\nDefault(N'Running')\n\
  )\nprint ' - Log.ApplicationInstance table created'\nend\nElse\nbegin\nprint ' -\
  \ Log.ApplicationInstance table already exists.'\nend\nprint ''\ngo\n```\n清单 7-2\n\
  在 SSISConfig 数据库中创建 log.ApplicationInstance 表\n\n当清单 7-2 中的 T-SQL 在 Azure Data Factory\
  \ 中执行时，会显示图 7-2 中所示的消息。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig2_HTML.jpg](img/497846_1_En_7_Fig2_HTML.jpg)\n\
  图 7-2\nLog.ApplicationInstance 表创建消息\n\n当 SSIS 框架应用程序在 Parent.dtsx 包中开始执行时，一条新记录将被插入到\
  \ log.ApplicationInstance 表中。当 SSIS 框架应用程序完成执行时，该记录将被更新。但是等等，还有更多！\n\n第二个新表名为 log.ApplicationPackageInstance，构建此表的\
  \ T-SQL 代码见清单 7-3。\n\n\n\n```\nuse [SSISConfig]\ngo\nprint 'Log.ApplicationPackageInstance\
  \ 表'\nIf Not Exists(Select [schemas].[name]\n+ '.' + [tables].[name] As [Schema.Table]\n\
  From [sys].[tables]\nJoin [sys].[schemas]\nOn [schemas].[schema_id] = [tables].[schema_id]\n\
  Where [schemas].[name] = N'log'\nAnd [tables].[name] = N'ApplicationPackageInstance')\n\
  begin\nprint ' - 创建 log.ApplicationPackageInstance 表'\nCreate Table [log].[ApplicationPackageInstance]\n\
  (\nApplicationPackageInstanceId int identity(1, 1)\nConstraint PK_log_ApplicationPackageInstance\
  \ Primary Key Clustered\n, ApplicationInstanceId int Not NULL\nConstraint FK_log_ApplicationPackageInstance_log_ApplicationInstance\n\
  Foreign Key References [log].ApplicationInstance\n, ApplicationPackageId int Not\
  \ NULL\nConstraint FK_log_ApplicationPackageInstance_config_ApplicationPackages\n\
  Foreign Key References [config].ApplicationPackages\n, ApplicationPackageStartTime\
  \ datetimeoffset(7) Not NULL\nConstraint DF_log_ApplicationPackageInstance_ApplicationPackageStartTime\n\
  Default(sysdatetimeoffset())\n, ApplicationPackageEndTime datetimeoffset(7) NULL\n\
  , ApplicationPackageStatus nvarchar(25) Not NULL\nConstraint DF_log_ApplicationPackageInstance_ApplicationPackageStatus\n\
  Default(N'Running')\n)\nprint ' - Log.ApplicationPackageInstance 表已创建'\nend\nElse\n\
  begin\nprint ' - Log.ApplicationPackageInstance 表已存在。'\nend\nprint ''\ngo\n清单 7-3\n\
  在 SSISConfig 数据库中创建 log.ApplicationPackageInstance 表\n```\n\n当在 Azure Data Factory\
  \ 中执行 `清单 7-3` 中的 T-SQL 时，将显示 `图 7-3` 所示的消息。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig3_HTML.jpg](img/497846_1_En_7_Fig3_HTML.jpg)\n\
  \n`图 7-3` Log.ApplicationPackageInstance 表创建消息\n\n当 SSIS 框架应用程序包在 `Parent.dtsx`\
  \ 包的 FOREACH Application Package 循环容器中开始在 EPT 执行应用程序包中执行时，一条新记录将被插入到 `log.ApplicationPackageInstance`\
  \ 表中。当 SSIS 框架应用程序完成执行时，该记录将被更新。\n\n“EPT”前缀代表“执行包任务”。SSIS 中的命名约定很重要，因为事件模型不包含标识“可执行类型”的字段。您可以在\
  \ `ssis.tips/pages/naming.html` 找到一个 SSIS 命名约定。\n\n### 向 Parent.dtsx 添加应用程序实例日志记录\n\
  \n返回到 `Parent.dtsx` SSIS 包。将一个新的执行 SQL 任务拖到控制流上。删除 SCR 日志初始值脚本任务和 SQL 获取应用程序包执行\
  \ SQL 任务之间的优先级约束。连接新的优先级约束 – 第一个在 SCR 日志初始值脚本任务和新的执行 SQL 任务之间，第二个在新的执行 SQL 任务和 SQL\
  \ 获取应用程序包执行 SQL 任务之间。将新的执行 SQL 任务重命名为“SQL 日志应用程序实例开始”，如 `图 7-4` 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig4_HTML.jpg](img/497846_1_En_7_Fig4_HTML.jpg)\n\
  \n`图 7-4` 添加 SQL 日志应用程序实例开始执行 SQL 任务\n\n打开 SQL 日志应用程序实例开始执行 SQL 任务编辑器，并将 `ConnectionType`\
  \ 属性设置为 `ADO.NET`。将 `Connection` 属性设置为指向 `SSISConfig` 数据库的 ADO.Net 连接管理器（我已将我的连接管理器重命名为“SSISConfig”）。将\
  \ `ResultSet` 属性设置为“单行”，如 `图 7-5` 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig5_HTML.jpg](img/497846_1_En_7_Fig5_HTML.jpg)\n\
  \n`图 7-5` 配置 SQL 日志应用程序实例开始执行 SQL 任务的 ResultSet、ConnectionType 和 Connection 属性\n\
  \n点击 `SQLStatement` 属性中的省略号，并将 `清单 7-4` 中的 T-SQL 粘贴到“输入 SQL 查询”对话框中。\n\n```\ndeclare\
  \ @ApplicationId int = (Select ApplicationId\nFrom config.Applications\nWhere ApplicationName\
  \ = @ApplicationName)\nInsert Into [log].ApplicationInstance (ApplicationId)\nOutput\
  \ inserted.ApplicationInstanceId\nValues (@ApplicationId)\n清单 7-4\n向 [log].[ApplicationInstance]\
  \ 表插入一行\n```\n\n“输入 SQL 查询”对话框应如 `图 7-6` 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig6_HTML.jpg](img/497846_1_En_7_Fig6_HTML.jpg)\n\
