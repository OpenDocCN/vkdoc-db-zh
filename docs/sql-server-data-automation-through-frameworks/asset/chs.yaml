  \ 4-17 中的代码将应用程序的元数据重置回其原始设置。\n\n```sql\nUPDATE FWDemo.ApplicationProcessProcedure\n\
  SET Active = 1\nWHERE ApplicationProcessProcedureID in (1, 2)   -– 或来自处理日志的值\n列表\
  \ 4-17\n启用存储过程以供下次执行\n```\n\n诚然，元数据的初始设置和新存储过程的部署确实使过程的开发和实施变得更加复杂。希望这些元数据示例已经证明，在执行期间的管理，尤其是在错误解决情况下，已经变得简单得多。请记住，设置和部署可能只发生一次。只要过程仍是生产活动的一部分，执行管理就会持续存在并反复发生。那么，您希望在哪里使其变得更简单呢？\n\
  \n这是我们系统中最简单的元数据用法，可能仅仅是一个开始。对于更高级的版本，我们可以在现有基础上构建一个元数据层，并让编排器使用元数据来执行控制器。但我们将在此停止，因为核心理念已经确立。\n\
  \n\n## 5. 一个简单、自定义、基于文件的 SSIS 框架\n\n如果你调研使用 SSIS 进行数据集成/工程的企业，你会发现大多数企业并不使用 SSIS\
  \ 目录。大多数企业从文件系统执行 SSIS。为什么？拥有少量 SSIS 包的企业数量远多于拥有大量 SSIS 包的企业。执行几十个 SSIS 包与管理成千上万个\
  \ SSIS 包的执行是不同的——确实非常不同。别只听我说；去问问管理大型企业的任何数据工程师。\n\n在 SSIS 2012 和 SSIS 目录发布之前，SSIS\
  \ 开发人员必须构建自己的 SSIS 框架。在本章中，我将分享一种构建自定义的基于文件的 SSIS 框架的方法。\n\n拥有 45 年软件开发经验的好处相对较少。其中一个好处是经历了几个架构模式的周期，看着它们从流行到衰落。旧模式涂上一层新的虚拟漆，又变成了新的。（这让我想起我的大女儿们在\
  \ 20 世纪 90 年代问我，是否听过一支名为空中铁匠的超棒新乐队。）在后续章节中，当我们部署一个与 Azure Data Factory 的 Azure-SSIS\
  \ 集成运行时极其相似的 SSIS 框架时，我们将看到一个例子。\n\n### SSIS 框架的定义与设计\n\n我们根据以下几个原则来构建 SSIS 框架：\n\
  \n1.  功能性\n2.  共情\n3.  简洁性\n\n#### 功能性\n\n在我看来，一个 SSIS 框架必须完成执行、日志记录和配置。SSIS 包的执行包括\
  \ *分组* 执行。执行分组是指按指定顺序执行一组 SSIS 包的能力。日志记录的目标是呈现足够关于 SSIS 包执行的操作信息，以使有经验的操作员或开发人员能够排查任何执行错误。配置通过允许开发人员和操作员在运行时配置\
  \ SSIS 包的属性、参数和变量，来促进代码重用并支持 SSIS 设计模式。\n\n#### 共情\n\n“安迪，你说的‘共情’是什么意思？” 很高兴你问了。软件开发中的共情体现在用户体验或\
  \ UX 设计考量上。在 SSIS 设计和开发中，共情表现为考虑用户的技能水平。在这种情况下，用户包括 SSIS 开发人员和操作员。SSIS 框架应遵循 KISS（“保持简单，傻瓜”）原则。我假设\
  \ SSIS 开发人员或 SSIS 开发团队会熟悉 SSIS，因此我 *用* SSIS 来构建 SSIS 框架。我希望开发人员或团队能够管理和维护他们自己的框架。\n\
  \n#### 简洁性\n\n> 软件应该像为了达成目标所必需的那样复杂，而不应比必要更复杂。\n>\n> —安迪·伦纳德，约 2007 年\n\n管理复杂性对软件开发人员来说是困难的。最终，管理复杂性是在功能性、可扩展性和可维护性之间的一种平衡行为。SSIS\
  \ 框架由于其本质，需要一定量的复杂性来运作。通过“扩展点”支持扩展总是会失败，因为框架作者无法预见每个企业的每一个用例。设计任何软件——包括 SSIS 框架——都应包含对维护的思考。可维护性有助于在最大功能性和最小复杂性之间取得平衡。\n\
  \n总的来说，功能性、共情和简洁性是相对直接的概念，易于理解但难以实现。\n\n### 构建基于文件的 SSIS 框架\n\n在本书的这一部分，在接下来的几章中，我们将构建一个\
  \ SSIS 框架的组件，该框架将执行存储在文件系统中的 SSIS 包。SSIS 框架的组件包括：\n\n*   一个用于存储执行和配置元数据、日志以及业务逻辑的数据库\n\
  *   一个用 SSIS 构建的执行管理引擎\n\n在本章中，我们重点讨论：\n\n*   构建元数据库\n*   构建一个测试用的 SSIS 项目\n*  \
  \ 向元数据库添加元数据\n\n#### 获取代码\n\n要获取本书的代码，请访问 Apress 网站上本书的目录页面（[`www.apress.com`](http://www.apress.com)）或连接到\
  \ GitHub 仓库：\n\n```\ngithub.com/aleonard763/FrameworksBook\n```\n\n将代码保存到一个你可以轻松访问的位置。\n\
  \n#### 元数据驱动的执行管理\n\n元数据驱动的执行管理并不是一个复杂的主题，尽管乍看之下可能显得复杂。接下来的例子将构建一个名为 `SSISConfig`\
  \ 的数据库以及如图 5-1 所示的执行元数据表。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig1_HTML.jpg](img/497846_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1：用于执行管理的元数据表\n\n#### `SSISConfig` 数据库\n\n`SSISConfig` 数据库设计用于包含框架的元数据。\n\n\
  使用清单 5-1 所示的 T-SQL 创建 `SSISConfig` 数据库。\n\n```sql\nUse [master]\ngo\nprint 'SSISConfig\
  \ database'\nIf Not Exists(Select [databases].[name]\nFrom [sys].[databases]\nWhere\
  \ [databases].[name] = N'SSISConfig')\nbegin\nprint ' - Create SSISConfig database'\n\
  Create Database SSISConfig\nprint ' - SSISConfig database created'\nend\nElse\n\
  begin\nprint ' - SSISConfig database already exists.'\nend\nprint ''\ngo\nListing\
  \ 5-1: Creating the SSISConfig database\n```\n\nSQL Server Management Studio (`SSMS`)\
  \ 的 `对象资源管理器` 应该与图 5-2 相似。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig2_HTML.jpg](img/497846_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2：`SSISConfig` 数据库已创建\n\n#### `config` 架构\n\n在软件开发最佳实践列表的顶部是“关注点分离”。分离关注点的一种方式是解耦。有人认为数据库开发不是软件开发。另一些人则认为，一些软件开发最佳实践可以——或许*应该*——用于数据库开发。我属于这第二类人。\n\
  \n使用清单 5-2 所示的 T-SQL 向 `SSISConfig` 数据库添加第一个架构——`config`。\n\n```sql\nuse [SSISConfig]\n\
  go\nprint 'Config schema'\nIf Not Exists(Select [schemas].[name]\nFrom [sys].[schemas]\n\
  Where [schemas].[name] = N'config')\nbegin\nprint ' - Create config schema'\ndeclare\
  \ @sql nvarchar(100) = N'Create Schema config'\nexec(@sql)\nprint ' - Config schema\
  \ created'\nend\nElse\nbegin\nprint ' - Config schema already exists.'\nend\nprint\
  \ ''\ngo\nListing 5-2: Creating the config schema\n```\n\n`config` 架构创建后，可以在 `SSMS`\
  \ 的 `对象资源管理器` 中查看。导航到 `SSISConfig` ➤ `安全性` ➤ `架构` 节点，如图 5-3 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig3_HTML.jpg](img/497846_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3：查看 `config` 架构\n\n\n\n#### Config.Applications 表\n\n在此框架中，一个 `SSIS application`（SSIS\
  \ 应用程序）被定义为“配置为按预定顺序执行的 SSIS 包的集合”。每个应用程序由一个 `ApplicationId`（非空 `int`）来标识。\n\n每个应用程序都有一个\
  \ `name` 属性，并且 `ApplicationName` 必须是唯一的。通过 `ApplicationId` 来标识应用程序对于参照完整性至关重要。观察\
  \ `config` 架构中表的 T-SQL —— 特别是 `config.ApplicationPackages` 表 —— 您会注意到其设计符合第三范式。\n\
  \n执行清单 5-3 中的 T-SQL，将 `Applications` 表添加到 `SSISConfig` 数据库的 `config` 架构中。\n\n```sql\n\
  use [SSISConfig]\ngo\nprint 'Config.Applications table'\nIf Not Exists(Select [schemas].[name]\
  \ + '.' + [tables].[name] As ➤ [Schema.Table]\nFrom [sys].[tables]\nJoin [sys].[schemas]\n\
  On [schemas].[schema_id] = [tables].[schema_id]\nWhere [schemas].[name] = N'config'\n\
  And [tables].[name] = N'Applications')\nbegin\nprint ' - Create config.Applications\
  \ table'\nCreate Table [config].[Applications]\n(\nApplicationId int identity(1,\
  \ 1)\nConstraint PK_config_Applications Primary Key Clustered\n, ApplicationName\
  \ nvarchar(255) Not NULL\nConstraint UQ_config_Applications_ApplicationName\nUnique\n\
  )\nprint ' - Config.Applications table created'\nend\nElse\nbegin\nprint ' - Config.Applications\
  \ table already exists.'\nend\nprint ''\ngo\nListing 5-3\n添加 config.Applications\n\
  ```\n\n执行后，`config.Applications` 表将出现在对象资源管理器中，如图 5-4 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig4_HTML.jpg](img/497846_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\nConfig.Applications 表\n\n#### Config.Packages 表\n\n包位置元数据存储在 `config.Packages`\
  \ 表中。当我们构建此 SSIS 框架的其他版本时，将会看到这是会变化的表。这些变化基于 SSIS 包在企业中的存放位置。\n\n执行清单 5-4 所示的 T-SQL\
  \ 来创建 `config.Packages` 表。\n\n```sql\nuse [SSISConfig]\ngo\nprint 'Config.Packages\
  \ table'\nIf Not Exists(Select [schemas].[name] + '.' + [tables].[name] As ➤ [Schema.Table]\n\
  From [sys].[tables]\nJoin [sys].[schemas]\nOn [schemas].[schema_id] = [tables].[schema_id]\n\
  Where [schemas].[name] = N'config'\nAnd [tables].[name] = N'Packages')\nbegin\n\
  print ' - Create config.Packages table'\nCreate Table [config].[Packages]\n(\nPackageId\
  \ int identity(1, 1)\nConstraint PK_config_Packages Primary Key Clustered\n, PackageLocation\
  \ nvarchar(255) Not NULL\n, PackageName nvarchar(255) Not NULL\n, Constraint UQ_config_Packages_PackageName\n\
  Unique(PackageLocation, PackageName)\n)\nprint ' - Config.Packages table created'\n\
  end\nElse\nbegin\nprint ' - Config.Packages table already exists.'\nend\nprint ''\n\
  go\nListing 5-4\n创建 config.Packages 表\n```\n\n创建后，`config.Packages` 表将出现在对象资源管理器中，如图\
  \ 5-5 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig5_HTML.jpg](img/497846_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n创建 config.Packages 表\n\n如前所述，框架中的一个 `SSIS application` 是配置为按特定顺序执行的包的集合。考虑到应用程序与包之间的基数关系，显然答案是至少部分为一对多。\n\
  \n考虑实用工具 SSIS 包，例如在文件中的数据成功加载或暂存到数据库后存档平面文件的包。这样的包——可能命名为 `ArchiveFile.dtsx`——可以通过诸如\
  \ `SourceFilePath` 和 `DestinationLocation` 之类的参数进行参数化。然后，`ArchiveFile.dtsx` 可以在多个\
  \ SSIS 应用程序中重用。\n\n这些应用程序与 `ArchiveFile.dtsx` 包之间的基数是多对一。将一对多和多对一的基数关系结合起来，就得到了多对多。在第三范式设计中解决多对多关系需要一个额外的表：本例中就是\
  \ `config.ApplicationPackages`。使用清单 5-5 所示的 T-SQL 创建 `config.ApplicationPackages`。\n\
  \n```sql\nuse [SSISConfig]\ngo\nprint 'Config.ApplicationPackages table'\nIf Not\
  \ Exists(Select [schemas].[name] + '.' + [tables].[name] As ➤ [Schema.Table]\nFrom\
  \ [sys].[tables]\nJoin [sys].[schemas]\nOn [schemas].[schema_id] = [tables].[schema_id]\n\
  Where [schemas].[name] = N'config'\nAnd [tables].[name] = N'ApplicationPackages')\n\
  begin\nprint ' - Create config.ApplicationPackages table'\nCreate Table [config].[ApplicationPackages]\n\
  (\nApplicationPackageId int identity(1, 1)\nConstraint PK_config_ApplicationPackages\
  \ Primary Key Clustered\n, ApplicationId int Not NULL\nConstraint FK_config_ApplicationPackages_config_Applications\n\
  Foreign Key References [config].Applications\n, PackageId int Not NULL\nConstraint\
  \ FK_config_ApplicationPackages_config_Packages\nForeign Key References [config].Packages\n\
  , ExecutionOrder int Not NULL\nConstraint DF_config_ApplicationPackages_ExecutionOrder\n\
  Default(10)\n, ApplicationPackageEnabled bit Not NULL\nConstraint DF_config_ApplicationPackages_ApplicationPackageEnabled\n\
  Default(1)\n, FailApplicationOnPackageFailure bit Not NULL\nConstraint ➤ DF_config_ApplicationPackages_FailApplicationOnPackageFailure\n\
  Default(1)\n, Constraint ➤ UQ_config_ApplicationPackages_ApplicationId_PackageId_ExecutionOrder\n\
  Unique(ApplicationId, PackageId, ExecutionOrder)\n)\nprint ' - Config.ApplicationPackages\
  \ table created'\nend\nElse\nbegin\nprint ' - Config.ApplicationPackages table already\
  \ exists.'\nend\nprint ''\ngo\nListing 5-5\n创建 config.ApplicationPackages 表\n```\n\
  \n当 `config.ApplicationPackages` 表创建后，对象资源管理器中的 `SSISConfig` 表如图 5-6 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig6_HTML.jpg](img/497846_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\nconfig.ApplicationPackages 表\n\n通过展开“列”、“键”和“约束”虚拟文件夹，在对象资源管理器中检查 `config.ApplicationPackages`\
  \ 表，如图 5-7 所示。\n\n![../images/497846_1_En_5_Chapter/497846_1_En_5_Fig7_HTML.jpg](img/497846_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n检查 config.ApplicationPackages 表\n\n`config.ApplicationPackages` 表的列被设计用于解决\
  \ `config.Applications` 表和 `config.Packages` 表之间的多对多基数关系。每个条目通过一个标识列 `ApplicationPackageId`，将\
  \ SSIS 包元数据（通过 `PackageId`）映射到 SSIS 应用程序元数据（通过 `ApplicationId`），从而 `解决`（或 `桥接`）了多对多关系。解决后，此\
  \ `SSISConfig` 数据库设计支持 `Application Packages`（应用程序包）的执行，`Application Packages` 被定义为映射到\
  \ SSIS 应用程序的 SSIS 包的实例。因此，根据设计，`Application Packages` 是此 SSIS 框架中最小的工作单元。\n\n\n\
  ##### 执行属性\n\n应用程序包作为最小的工作单元，其一个引申含义是：应用程序包正是我们定义`执行属性`的地方。在此框架中，应用程序包的执行属性包括：\n\
  \n*   `ExecutionOrder`\n*   `ApplicationPackageEnabled`\n*   `FailApplicationOnPackageFailure`\n\
  \n`ExecutionOrder` 是一个整数，代表了 SSIS 应用程序定义中“按指定顺序”执行的部分。\n\n`ApplicationPackageEnabled`\
  \ 是一个位字段，用于指示当执行 SSIS 应用程序时，单个应用程序包是否被配置为执行。\n\n`FailApplicationOnPackageFailure`\
  \ 是一个位，用于配置容错性。设想一下执行一个 SSIS 应用程序时会发生什么：多个 SSIS 包会按指定顺序执行。在 SSIS 应用程序中具有指定执行顺序的\
  \ SSIS 包就是应用程序包。如果我们非常希望一个 SSIS 包能执行、完成并成功，但如果该包因某种原因失败，对于本次特定的 SSIS 应用程序执行来说并非至关重要，那该怎么办？如果我们只是不太在意这个特定的包是否失败呢？`FailApplicationOnPackageFailure`\
  \ 属性将允许该包失败`而不会`终止整个 SSIS 应用程序的执行。\n\n##### 默认约束\n\n默认约束管理向表中添加新记录时，如果字段未提供显式值，则列的初始值：\n\
  \n*   `DF_config_ApplicationPackages_FailApplicationOnPackageFailure` 是一个默认约束，当首次向\
  \ `config.ApplicationPackages` 表添加记录时未提供值，则将 `FailApplicationOnPackageFailure` 位的值设置为\
  \ True (1)。\n*   `DF_config_ApplicationPackages_ApplicationPackageEnabled` 是一个默认约束，当首次向\
  \ `config.ApplicationPackages` 表添加记录时未提供值，则将 `ApplicationPackageEnabled` 位的值设置为\
  \ True (1)。\n*   `DF_config_ApplicationPackages_ExecutionOrder` 是一个默认约束，当首次向 `config.ApplicationPackages`\
  \ 表添加记录时未提供值，则将 `ExecutionOrder` 整数值设置为 10。\n\n##### 关系\n\n键管理着 SSISConfig 数据库中实体之间的关系，也因此管理着\
  \ SSIS 框架中的关系：\n\n*   `config.ApplicationPackages` 表配置了 `PK_config_ApplicationPackages`。每个表都有一个主键用于关系管理。在此框架中，`PK_config_ApplicationPackages`\
  \ 有助于标识每个“应用程序-包-执行顺序”的组合。\n*   `FK_config_ApplicationPackages_config_Applications`\
  \ 是 `config.ApplicationPackages.ApplicationId` 字段与 `config.Applications.ApplicationId`\
  \ 字段之间的外键。在向 `config.ApplicationPackages` 添加行之前，`config.Applications` 表中`必须`已存在对应的行。应用程序映射到在此`位置`（由\
  \ `ExecutionOrder` 的值表示）执行的包。\n*   `FK_config_ApplicationPackages_config_Packages`\
  \ 是 `config.ApplicationPackages.PackageId` 字段与 `config.Packages.PackageId` 字段之间的外键。在向\
  \ `config.ApplicationPackages` 添加行之前，`config.Packages` 表中`必须`已存在对应的行。一个在某个`位置`（由\
  \ `ExecutionOrder` 的值表示）执行的包被映射到一个应用程序中。\n*   `UQ_config_ApplicationPackages_ApplicationId_PackageId_ExecutionOrder`\
  \ 是一个唯一约束，它保证了存储在 `config.ApplicationPackages` 表中的每个应用程序包在 `ApplicationId`、`PackageId`\
  \ 和 `ExecutionOrder` 字段组合上的唯一性。这意味着 `config.ApplicationPackages` 表中的两个（或多个）记录`可能不具有相同的`\
  \ `ApplicationId`、`PackageId` 和 `ExecutionOrder` 字段值。\n\n##### 常见问题\n\n框架对许多数据用户来说是新事物，我们经常听到以下几个问题：\n\
  \n*   `config.ApplicationPackages` 表中两个（或多个）记录是否可能具有相同的 `ApplicationId`？ 是的。实际上，框架就是为此用例设计的。多个具有相同\
  \ `ApplicationId` 值的 `config.ApplicationPackages` 记录正是框架用来配置一个 SSIS 应用程序的方式。\n*\
  \   `config.ApplicationPackages` 表中两个（或多个）记录是否可能具有相同的 `PackageId`？ 是的。这支持代码重用，例如在多个应用程序中执行\
  \ `ArchiveFile.dtsx` SSIS 包。这也支持一种称为“基于范围的加载”的 SSIS 设计模式。在基于范围的加载中，*相同的* SSIS 包会执行多次。每次执行时，新的最小和最大范围值，或其他数学函数，会被传递给该包。例如，同一个\
  \ SSIS 包可能执行十次。第一次执行可能加载数值以“0”开头的记录。后续执行可能加载数值以“1”、“2”等开头的数据。\n\n我们稍后会回到 SSMS 和\
  \ SSISConfig 数据库的开发。接下来，让我们先构建一个示例 SSIS 解决方案来测试该框架。\n\n### 一个示例 SSIS 解决方案\n\n测试是困难的。测试需要我们以不同的方式思考用户将如何与应用程序交互。开发人员以不擅长测试自己的代码而闻名。为什么？我相信这是因为开发侧重于交付能正常工作的功能。对于有些人（比如我）来说，要转换思维，开始考虑用户在与我们代码交互时可能输入——或者*忘记*输入——的所有排列组合是很困难的。\n\
  \n构建用于测试的示例 SSIS 解决方案时，第一个想法可能是：“我可以用一个 SSIS 包来完成。”这是不正确的。测试至少需要两个 SSIS 包，一个包用于成功场景，另一个用于失败场景。\n\
