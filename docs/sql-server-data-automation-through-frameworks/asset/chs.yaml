  \n图 10-42\n\n设置 ApplicationPackageId 参数值表达式\n\n单击 `@ApplicationPackageRunId` 参数的“值”属性文本框内部，然后单击“添加动态内容\
  \ [Alt + P]”链接。当“添加动态内容”面板显示时，展开“系统变量”表达式类别，然后单击“管道运行 ID”，将参数值 ADF 表达式设置为 `@pipeline().RunId`，如图\
  \ 10-43 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig43_HTML.jpg](img/497846_1_En_10_Fig43_HTML.jpg)\n\
  \n图 10-43\n\n设置 ApplicationPackageRunId 参数值表达式\n\n将“查询超时（分钟）”属性保留为其默认值（120 分钟），“隔离级别”属性设置为“无”（默认值），并保持“仅限第一行”属性为选中状态（默认值）。\n\
  \n至此，“记录应用程序包实例开始”查找活动已配置为调用 `log.InsertApplicationPackageInstance` 存储过程，向其传递子管道的\
  \ `ApplicationInstanceId`、`ApplicationPackageId` 和 `ApplicationPackageRunId` 参数值，并返回\
  \ `ApplicationPackageInstanceId` 值。\n\n将“记录应用程序包实例开始”查找活动的“成功”输出连接到“执行应用程序包”执行 SSIS\
  \ 活动。\n\n### 添加 log.UpdateApplicationPackageInstanceStatus 存储过程\n\n按照当前配置，当子管道被调用以执行\
  \ ReportAndFail.dtsx SSIS 包时，它将失败，因为 ReportAndFail.dtsx SSIS 包被设计为失败。需要更新 `log.ApplicationPackageInstance`\
  \ 行以反映 SSIS 框架应用程序包实例失败的状态。\n\n首先，向 SSISConfig 数据库添加一个名为 `log.UpdateApplicationPackageInstanceStatus`\
  \ 的新存储过程，如代码清单 10-8 所示。\n\n```\nprint 'log.UpdateApplicationPackageInstanceStatus\
  \ stored procedure'\nIf Exists(Select s.[name] + '.' + p.[name]\nFrom [sys].[procedures]\
  \ p\nJoin [sys].[schemas] s\nOn s.[schema_id] = p.[schema_id]\nWhere s.[name] =\
  \ N'log'\nAnd p.[name] = N'UpdateApplicationPackageInstanceStatus')\nbegin\nprint\
  \ ' - Dropping log.UpdateApplicationPackageInstanceStatus stored  procedure'\nDrop\
  \ Procedure log.UpdateApplicationPackageInstanceStatus\nprint ' - Log.UpdateApplicationPackageInstanceStatus\
  \ stored procedure dropped'\nend\nprint ' - Creating log.UpdateApplicationPackageInstanceStatus\
  \ stored procedure'\ngo\nCreate Procedure log.UpdateApplicationPackageInstanceStatus\n\
  @ApplicationPackageInstanceId int\n, @ApplicationPackageStatus nvarchar(55) = 'Succeeded'\n\
  As\nUpdate [log].ApplicationPackageInstance\nSet ApplicationPackageEndTime = sysdatetimeoffset()\n\
  , ApplicationPackageStatus = @ApplicationPackageStatus\nWhere ApplicationPackageInstanceId\
  \ = @ApplicationPackageInstanceId\ngo\nprint ' - Log.UpdateApplicationPackageInstanceStatus\
  \ stored procedure created'\ngo\n```\n\n代码清单 10-8\n用于创建 log.UpdateApplicationPackageInstanceStatus\
  \ 存储过程的幂等 T-SQL\n\n如果一切顺利，Azure Data Studio 的消息应该与图 10-44 相似。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig44_HTML.jpg](img/497846_1_En_10_Fig44_HTML.jpg)\n\
  \n图 10-44\n\n反映 log.UpdateApplicationPackageInstanceStatus 存储过程成功创建的 Azure Data\
  \ Studio 消息\n\n下一步是添加一个存储过程活动，用于在失败时调用 `log.UpdateApplicationPackageInstanceStatus`\
  \ 存储过程。\n\n\n\n### 更新应用程序包实例\n\nADF 执行引擎需要执行一个名为 `log.UpdateApplicationPackageInstanceStatus`\
  \ 的存储过程，该过程接受 `ApplicationPackageInstanceId` 和 `ApplicationPackageStatus` 值，然后更新当前应用程序包实例的状态。存储过程活动非常适合这个任务！\n\
  \n返回子 ADF 管道。将一个存储过程活动拖放到设计界面上。从执行应用程序包活动添加一个失败输出到新的存储过程活动。将新的存储过程活动重命名为“记录应用程序包实例失败”，如图\
  \ 10-45 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig45_HTML.jpg](img/497846_1_En_10_Fig45_HTML.jpg)\n\
  \n*图 10-45*\n添加“记录应用程序包实例失败”存储过程活动\n\n在“设置”选项卡上，从“链接服务”属性下拉菜单中选择 `ssisFrameworkLinkedService`，然后从“存储过程名称”下拉菜单中选择\
  \ `[log].[UpdateApplicationPackageInstanceStatus]`。单击“导入参数”按钮以从 `log.UpdateApplicationPackageInstanceStatus`\
  \ 存储过程导入参数。单击 `ApplicationPackageInstanceId` 参数的值文本框内部，然后单击“添加动态内容 [Alt + P]”链接。当“添加动态内容”面板显示时，展开“活动输出”表达式类别，并单击“记录应用程序包实例启动”。动态内容文本框将显示\
  \ `@activity('Log Application Package Instance Start').output`。在表达式后追加 `.firstrow.ApplicationPackageInstanceId`，以将“记录应用程序包实例启动”查找活动执行返回的\
  \ `ApplicationPackageInstanceId` 值映射到 `ApplicationPackageInstanceId` 参数的值属性中，如图\
  \ 10-46 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig46_HTML.jpg](img/497846_1_En_10_Fig46_HTML.jpg)\n\
  \n*图 10-46*\n将“记录应用程序包实例启动”查找活动映射到 ApplicationPackageInstanceId 参数的值属性\n\n单击“完成”按钮继续。\n\
  \n在 `ApplicationStatus` 参数的值属性中键入“失败”，如图 10-47 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig47_HTML.jpg](img/497846_1_En_10_Fig47_HTML.jpg)\n\
  \n*图 10-47*\n将 ApplicationPackageStatus 属性设置为“失败”\n\n至此，SSIS 框架执行引擎 ADF 版本的子管道已配置为执行\
  \ SSIS 应用程序包并记录失败的应用程序包实例。\n\n下一步是测试执行该管道。\n\n### 测试执行！\n\n返回父管道以测试执行引擎。单击父管道工具栏上的“调试”项。“输出”选项卡会显示，一段时间后，会显示出已执行的父管道活动，如图\
  \ 10-48 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig48_HTML.jpg](img/497846_1_En_10_Fig48_HTML.jpg)\n\
  \n*图 10-48*\n父管道测试执行的结果\n\n执行清单 10-9 中所示的 T-SQL 查询以检查应用程序实例结果。\n\n```sql\nSelect\
  \ top 1\na.ApplicationName\n, ai.ApplicationInstanceId\n, ai.ApplicationStatus\n\
  From log.ApplicationInstance ai\nJoin config.Applications a\nOn a.ApplicationId\
  \ = ai.ApplicationId\nOrder By ApplicationInstanceId Desc\n\ndeclare @ApplicationInstanceId\
  \ int = (Select top 1 ApplicationInstanceId\nFrom log.ApplicationInstance\nOrder\
  \ By ApplicationInstanceId DESC)\n\nSelect p.PackageName\n, ai.ApplicationInstanceId\n\
  , api.ApplicationPackageInstanceId\n, api.ApplicationPackageStatus\n, ap.FailApplicationOnPackageFailure\n\
  From log.ApplicationPackageInstance api\nJoin log.ApplicationInstance ai\nOn ai.ApplicationInstanceId\
  \ = api.ApplicationInstanceId\nJoin config.ApplicationPackages ap\nOn ap.ApplicationPackageId\
  \ = api.ApplicationPackageId\nJoin config.Packages p\nOn p.PackageId = ap.PackageId\n\
  Where ai.ApplicationInstanceId = @ApplicationInstanceId\nOrder By ApplicationPackageInstanceId\n\
  ```\n*清单 10-9*\n应用程序执行结果\n\n结果应类似于图 10-49：\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig49_HTML.jpg](img/497846_1_En_10_Fig49_HTML.jpg)\n\
  \n*图 10-49*\n应用程序执行结果\n\n尽管结果符合预期，但缺少了点什么：目前没有存储过程活动在成功时更新应用程序包实例，这就是为什么清单 10-9\
  \ 中查询的结果（如图 10-49 所示）将 `ReportAndSucceed.dtsx` SSIS 的 ApplicationPackageStatus 显示为“正在运行”。\n\
  \n### 在成功时更新应用程序包实例\n\n子管道需要一种记录应用程序包实例成功的方法。首先，单击“记录应用程序包实例失败”存储过程活动上的“克隆”图标，如图\
  \ 10-50 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig50_HTML.jpg](img/497846_1_En_10_Fig50_HTML.jpg)\n\
  \n*图 10-50*\n准备从“记录应用程序包实例失败”存储过程活动克隆“记录应用程序包实例成功”存储过程活动\n\n与之前克隆“记录应用程序实例失败”存储过程活动类似，克隆“记录应用程序包实例失败”存储过程活动是合理的，因为新的存储过程活动将调用*相同*的存储过程——`log.UpdateApplicationPackageInstanceStatus`——并且*只有*一个参数值配置会发生变化。\n\
  \n从“执行应用程序包”执行 SSIS 包活动添加一个成功输出到克隆的存储过程活动，然后将克隆的存储过程活动重命名为“记录应用程序包实例成功”，如图 10-51\
  \ 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig51_HTML.jpg](img/497846_1_En_10_Fig51_HTML.jpg)\n\
  \n*图 10-51*\n添加“记录应用程序包实例成功”存储过程活动\n\n接下来，单击“记录应用程序包实例成功”存储过程活动的“设置”选项卡。“设置”选项卡上唯一需要的更改是\
  \ ApplicationPackageStatus 参数的值属性的值，需要从“失败”更新为“成功”，如图 10-52 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig52_HTML.jpg](img/497846_1_En_10_Fig52_HTML.jpg)\n\
  \n*图 10-52*\n更新 ApplicationPackageStatus 参数值\n\n一次新的测试执行确认父管道按设计记录了 SSIS 框架应用程序失败，并且重新执行清单\
  \ 10-9 中的查询确认了——如图 10-53 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig53_HTML.jpg](img/497846_1_En_10_Fig53_HTML.jpg)\n\
  \n*图 10-53*\n`ReportAndSucceed.dtsx` 应用程序包成功\n\n在我们目前的示例中，每个应用程序实例都会失败，因为一个名为 `ReportAndFail.dtsx`\
  \ 的子包每次执行都会失败。下一步是为 ADF 版本的 SSIS 框架添加容错能力，这将是下一章的主题。\n\n\n\n### 结论\n\n在本章中，我们为父管道添加了日志记录功能，修改了\
  \ `SSISConfig` 日志表，并将日志记录逻辑封装在存储过程中。通过添加一个子管道来执行应用程序包的执行，我们解耦了 SSIS 框架应用程序包的执行。\n\
  \n## 11. ADF 框架中的容错\n\n前一章介绍了针对 SSIS 框架执行引擎的 Azure Data Factory 版本的日志记录功能。SSIS 包可用的功能与\
  \ Azure Data Factory 管道可用的功能之间的差异驱动了设计上的变更。\n\n在本章中，我们通过实现容错来完善 ADF 执行引擎的功能，该容错功能可根据\
  \ `SSISConfig` 元数据配置以编程方式停止管道执行。\n\n### 容错简介\n\n依作者愚见，*容错* 是描述优雅失败（graceful failure）的另一种方式。思考“这个失败时会发生什么？”是技术人员与工程师之间的一个区别。技术人员完成能实现某些任务的项目，而工程师则构建能管理问题域的解决方案。这归结于个人对“完成”的定义。技术人员处理故障，并在项目能运行时停止。工程师则不会停止，直到解决方案不会失败；而且——当解决方案*确实失败*时——工程师确保失败是优雅的。\n\
  \n您可能还记得，容错是第 5-7 章设计的本地 SSIS 框架执行引擎（`Parent.dtsx` 包）中最复杂的部分。Azure Data Factory\
  \ 版本的 SSIS 框架执行引擎（父管道和子管道）的设计也不例外。为了实现容错，ADF 执行策略需要彻底重新设计。\n\n该示例已经通过构建子管道实现了部分所需的重新设计。为什么应用程序包的执行需要移到子管道？我们将在本章回答这个问题。\n\
  \n### 将 ADF 托管标识添加到参与者角色\n\n在本节中，我们将使用 Azure Data Factory REST API。如果这令您担忧，请不要担心；使用\
  \ ADF REST API 很有趣，并将提升您的 Azure Data Factory 自动化技能！\n\n第一步是将 Azure Data Factory\
  \ 托管标识添加到 Azure Data Factory 访问控制边栏选项卡中的“参与者”角色。首先登录 Azure 门户并导航到 Azure Data Factory\
  \ 边栏选项卡。单击“访问控制 (IAM)”，如图 11-1 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig1_HTML.jpg](img/497846_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n导航到访问控制 (IAM) 边栏选项卡\n\n当访问控制 (IAM) 边栏选项卡显示时，单击“添加角色分配”添加按钮，如图 11-2 所示。\n\
  \n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig2_HTML.jpg](img/497846_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n准备分配角色\n\n当“添加角色分配”边栏选项卡显示时，从“角色”下拉菜单中选择“参与者”。将“分配访问权限到”下拉菜单保留为默认值（“Azure\
  \ AD 用户、组或服务主体”），并在“选择”文本框中输入您的 Azure Data Factory 名称，如图 11-3 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig3_HTML.jpg](img/497846_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3\n查找 Azure Data Factory 托管标识\n\n在“添加角色分配”边栏选项卡中，单击 Azure Data Factory 托管标识。“所选成员”列表会反映当前的选择，并且“保存”按钮已启用，表明角色分配已准备好存储，如图\
  \ 11-4 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig4_HTML.jpg](img/497846_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4\n准备完成角色分配\n\n单击“角色分配”选项卡以查看 ADF 的角色分配，如图 11-5 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig5_HTML.jpg](img/497846_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5\nADF 托管标识已分配到参与者角色\n\n现在，Azure Data Factory 托管标识已分配到参与者角色，ADF Web 活动可以与\
  \ Azure Data Factory REST API 托管的多种方法进行交互。\n\n### 添加应用程序包容错\n\n在 Azure Data Factory\
  \ 版本的 SSIS 框架中如何实现容错？\n\n#### 关于包失败时使应用程序失败\n\n`FailApplicationOnPackageFailure`\
  \ 与应用程序包元数据一起存储在 `SSISConfig` 数据库中。`FailApplicationOnPackageFailure` 的值会返回到父管道中的“获取应用程序包”查找活动，然后传递给子管道参数（名为\
  \ `FailApplicationOnPackageFailure`），该参数位于“ForEach 应用程序包”ForEach 活动的内部活动中的“执行子管道”执行管道活动内。\n\
  \n#### 实现应用程序包容错\n\n首先，在子管道中实现应用程序包容错：右键单击“执行应用程序包”执行 SSIS 包活动的“失败”输出，然后单击“删除”，如图\
  \ 11-6 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig6_HTML.jpg](img/497846_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6\n删除“执行应用程序包”执行 SSIS 包活动的失败输出\n\n将一个“条件”活动拖到子管道画布上，并将条件重命名为“如果包失败则使应用程序失败”，如图\
  \ 11-7 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig7_HTML.jpg](img/497846_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\n添加“如果包失败则使应用程序失败”条件活动\n\n将“执行应用程序包”执行 SSIS 活动的“失败”输出连接到“如果包失败则使应用程序失败”条件活动，如图\
  \ 11-8 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig8_HTML.jpg](img/497846_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8\n将失败输出连接到“如果包失败则使应用程序失败”条件活动\n\n单击“如果包失败则使应用程序失败”条件活动的“活动”选项卡，然后单击表达式文本框内部。单击表达式文本框下方的“添加动态内容\
  \ [Alt + P]”链接。当“添加动态内容”边栏选项卡显示时，展开“参数”类别并选择 `FailApplicationOnPackageFailure` 子管道参数。表达式文本框将显示\
  \ `pipeline().parameters.FailApplicationOnPackageFailure`。在表达式前添加 `@bool(`，并在末尾添加右括号\
  \ `)` 以完成表达式，如图 11-9 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig9_HTML.jpg](img/497846_1_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9\n为“如果包失败则使应用程序失败”条件活动配置表达式属性\n\n单击“完成”以完成此部分的配置。\n\n\n\n#### 检查逻辑\n\n让我们在此稍作停顿，梳理一下目前的逻辑。应用程序包执行有两种可能的结果：要么成功，要么失败。\n\
  \n如果应用程序包执行成功，则会执行“记录应用程序包实例成功”存储过程活动，并为当前的`ApplicationPackageInstanceID`更新`log.ApplicationPackageInstance`表中的`ApplicationPackageStatus`值为\"\
  Succeeded\"（成功）。\n\n成功路径——即第一个用例——已经实现。容错逻辑仅在应用程序包执行失败时才需要。\n\n如果应用程序包执行失败，“若包失败则应用程序失败”条件活动将对子包管道的`FailApplicationOnPackageFailure`参数的值进行求值（通过表达式转换为布尔值）。\n\
  \n当应用程序包执行失败**且**`FailApplicationOnPackageFailure`为 false（假）时，发生第二个用例。在这种情况下，我们需要：\n\
  *   记录应用程序包执行的状态（失败及信息）\n*   **继续**执行 SSIS 框架应用程序的应用程序包\n\n当应用程序包执行失败**且**`FailApplicationOnPackageFailure`为\
  \ true（真）时，发生第三个用例。在这种情况下，我们需要：\n*   记录应用程序包执行的状态（失败及信息）\n*   记录应用程序执行的状态（失败）\n\
  *   **停止**应用程序包的执行\n\n#### 实现容错逻辑\n\n要开始实现容错逻辑，请点击“若包失败则应用程序失败”条件活动的 False（假）活动编辑器，如图\
  \ 11-10 所示。\n\n![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig10_HTML.jpg`](img/497846_1_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10\n打开“若包失败则应用程序失败”条件活动的 False 活动编辑器\n\n将一个存储过程活动拖放到画布上，并将新的存储过程活动重命名为“记录应用程序包实例失败\
  \ 0”，如图 11-11 所示。\n\n![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig11_HTML.jpg`](img/497846_1_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11\n添加“记录应用程序包实例失败 0”存储过程活动\n\n点击“设置”选项卡，并将“链接服务”属性设置为`ssisFrameworkLinkedService`。从“存储过程名称”下拉列表中选择`log.UpdateApplicationPackageInstanceStatus`，如图\
  \ 11-12 所示。\n\n![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig12_HTML.jpg`](img/497846_1_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12\n配置链接服务和存储过程名称\n\n点击“导入参数”按钮开始配置`log.UpdateApplicationPackageInstanceStatus`存储过程参数值。通过点击“添加动态内容[Alt\
  \ + P]”链接并选择“记录应用程序包实例开始”活动来配置`ApplicationPackageInstanceId`存储过程参数，这将在表达式文本框中输入表达式`@activity('Log\
  \ Application Package Instance Start').output`。将`\".firstrow.ApplicationPackageInstanceId\"\
  `附加到表达式。在`ApplicationPackageStatus`值文本框中，输入`\"Failed (FailAppOnPkgFail: 0)\"`，如图\
  \ 11-13 所示。\n\n![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig13_HTML.jpg`](img/497846_1_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13\n配置`ApplicationPackageInstanceId`和`ApplicationPackageStatus`参数值\n\n一旦存储过程参数值设置完毕，“记录应用程序包实例失败\
  \ 0”存储过程活动的配置即告完成。请注意，`ApplicationPackageStatus`包含了附加信息：`\"(FailAppOnPkgFail: 0)\"\
  `。“记录应用程序包实例失败 0”存储过程用于处理用例 2。\n\n`log.ApplicationPackageInstance`表中的`ApplicationPackageStatus`列当前配置为`nvarchar(25)`，不足以容纳文本`\"\
  Failed (FailAppOnPkgFail: 0)\"`。请执行清单 11-1 中的 T-SQL 来扩展列的大小。\n\n```sql\nAlter Table\
  \ [log].[ApplicationPackageInstance]\nAlter Column ApplicationPackageStatus nvarchar(55)\
  \ Not NULL\n```\n清单 11-1\n扩展`ApplicationPackageStatus`列\n\n在讨论和添加支持用例 3 的代码之前，快速回顾一下\
  \ ForEach 活动的默认行为是个好主意。\n\n##### ForEach 活动的默认行为\n\nForEach 活动的默认迭代行为是继续遍历已配置的集合，执行“内部活动”，直到集合中的所有项目都被遍历完毕。一个副作用是，“内部活动”中发生的错误**不会**停止迭代。无论执行结果如何，“内部活动”都会在集合被遍历时执行。\n\
  \n**在**迭代完成后，迭代期间发生的任何失败都会导致 ForEach 活动失败。\n\n假设一个名为“ForEach Array Item”的 ForEach\
  \ 活动包含一个“内部活动”，即一个名为“Wait”的等待活动（我知道这名字很有创意）。假设一个包含四个项目的数组变量被提供给 ForEach 活动的 Items\
  \ 属性。考虑以下 ForEach“内部活动”执行的场景，其中 Wait 活动的第二次迭代失败，按迭代编号如下：\n1.  Wait 执行成功。\n2.  Wait\
  \ 执行失败。\n3.  Wait 执行成功。\n4.  Wait 执行成功。\n\n每次迭代都将执行，导致 Wait 活动执行四次。ForEach 活动将失败。调试输出将如图\
  \ 11-14 所示。\n\n![`../images/497846_1_En_11_Chapter/497846_1_En_11_Fig14_HTML.jpg`](img/497846_1_En_11_Fig14_HTML.jpg)\n\
  \n图 11-14\nForEach 活动执行的输出\n\n图 11-14 显示了 Wait 活动的四次执行。三次成功，一次失败。请注意，每个 Wait 活动都执行了，并且在第二次迭代中的\
  \ Wait 活动**失败后**，又执行了两次 Wait 活动。另请注意，ForEach 活动失败了。\n\n\n\n#### ForEach 活动默认行为及其应用\n\
  \n应用于 SSIS 框架的容错机制，“ForEach 应用程序包” ForEach 活动（其“内部活动”在父管道中配置为执行子管道）默认已配置为无论子包执行结果如何都继续执行子包。因此，下一步是添加逻辑，以便在我们的用例需要时——即当应用程序包执行失败\
  \ **且** `FailApplicationOnPackageFailure` 为 true（用例 3）时——*停止*执行应用程序包。\n\n要配置“如果在包失败时应用程序失败”条件活动的“True\
  \ 活动”，请点击“True 活动”旁边的编辑图标（铅笔），如图 11-15 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig15_HTML.jpg](img/497846_1_En_11_Fig15_HTML.jpg)\n\
  *图 11-15：准备配置“True 活动”*\n\n当 `FailApplicationOnPackageFailure` 位配置为 true（1，这是默认值）时，响应失败的子包执行的操作顺序如下：\n\
  1.  记录应用程序包实例失败\n2.  记录应用程序实例已取消\n3.  设置取消父管道的命令\n4.  执行取消父管道的命令\n\n当 `FailApplicationOnPackageFailure`\
  \ 位配置为 true（1）时，响应失败的子包执行的第一步如下：记录应用程序包实例失败。\n\n要开始添加记录应用程序包实例失败的功能，请在“如果在包失败时应用程序失败”条件活动的“True\
  \ 活动”画布上添加一个存储过程活动，并将新的存储过程活动重命名为“记录应用程序包实例失败 1”，如图 11-16 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig16_HTML.jpg](img/497846_1_En_11_Fig16_HTML.jpg)\n\
  *图 11-16：添加“记录应用程序包实例失败 1”存储过程活动*\n\n在“记录应用程序包实例失败 1”存储过程活动的“设置”选项卡上，单击“链接服务”属性的下拉菜单，选择“ssisFrameworkLinkedService”。在“存储过程名称”下拉菜单中，选择“[log].[UpdateApplicationPackageInstanceStatus]”，如图\
  \ 11-17 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig17_HTML.jpg](img/497846_1_En_11_Fig17_HTML.jpg)\n\
  *图 11-17：配置“记录应用程序包实例失败 1”存储过程活动设置*\n\n单击“导入参数”按钮。当显示 `ApplicationPackageInstanceId`\
  \ 和 `ApplicationPackageStatus` 参数时，通过单击值文本框内部，然后单击“添加动态内容 [Alt + P]”链接，再输入表达式“`@activity('Log\
  \ Application Package Instance Start').output.firstrow.ApplicationPackageInstanceId`”来配置\
  \ `ApplicationPackageInstanceId`。在 `ApplicationPackageStatus` 参数值文本框中，输入文本“Failed\
  \ (FailAppOnPkgFail: 1)”，如图 11-18 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig18_HTML.jpg](img/497846_1_En_11_Fig18_HTML.jpg)\n\
  *图 11-18：配置“记录应用程序包实例失败 1”存储过程活动设置的参数值*\n\n以上完成了当 `FailApplicationOnPackageFailure`\
  \ 位配置为 true（1）时响应失败的子包执行的第一步：记录应用程序包实例失败。\n\n当 `FailApplicationOnPackageFailure`\
  \ 位配置为 true（1）时响应失败的子包执行的第二步如下：记录应用程序实例已取消。\n\n要开始添加记录应用程序实例已取消的功能，请在“如果在包失败时应用程序失败”条件活动的“True\
  \ 活动”画布上添加一个存储过程活动，将“记录应用程序包实例失败 1”存储过程活动的成功输出连接到新的存储过程活动，然后将新的存储过程活动重命名为“记录应用程序实例已取消”，如图\
  \ 11-19 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig19_HTML.jpg](img/497846_1_En_11_Fig19_HTML.jpg)\n\
  *图 11-19：添加“记录应用程序实例已取消”存储过程活动*\n\n将“记录应用程序包实例失败 1”存储过程活动的成功输出连接到“记录应用程序实例已取消”存储过程活动。在“记录应用程序实例已取消”存储过程活动的“设置”选项卡上，单击“链接服务”属性的下拉菜单，选择“ssisFrameworkLinkedService”。在“存储过程名称”下拉菜单中，选择“[log].[UpdateApplicationIntanceStatus]”，如图\
  \ 11-20 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig20_HTML.jpg](img/497846_1_En_11_Fig20_HTML.jpg)\n\
  *图 11-20：配置“记录应用程序实例已取消”存储过程活动设置*\n\n单击“导入参数”按钮。当显示 `ApplicationInstanceId` 和 `ApplicationStatus`\
  \ 参数时，通过单击值文本框内部，然后单击“添加动态内容 [Alt + P]”链接，再输入表达式“`@pipeline().parameters.ApplicationInstanceId`”来配置\
  \ `ApplicationInstanceId`。在 `ApplicationStatus` 参数值文本框中，输入文本“Cancelled”，如图 11-21\
  \ 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig21_HTML.jpg](img/497846_1_En_11_Fig21_HTML.jpg)\n\
  *图 11-21：配置“记录应用程序实例已取消”存储过程活动设置的参数值*\n\n以上完成了当 `FailApplicationOnPackageFailure`\
  \ 位配置为 true（1）时响应失败的子包执行的第二步：记录应用程序实例已取消。\n\n在我们开始此部分过程之前，请导航到子管道设置，并单击“变量”选项卡。单击“+\
  \ 新建”按钮，添加一个名为“StopParentPipelineRunIdString”的字符串变量，如图 11-22 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig22_HTML.jpg](img/497846_1_En_11_Fig22_HTML.jpg)\n\
  *图 11-22：向子管道添加 StopParentPipelineRunIdString 变量*\n\n要开始添加构建取消管道运行命令的功能，请在“如果在包失败时应用程序失败”条件活动的“True\
  \ 活动”画布上添加一个设置变量活动，将“记录应用程序实例已取消”存储过程活动的成功输出连接到新的设置变量活动，然后将新的设置变量活动重命名为“设置取消父管道命令”，如图\
  \ 11-23 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig23_HTML.jpg](img/497846_1_En_11_Fig23_HTML.jpg)\n\
  *图 11-23：添加“设置取消父管道命令”设置变量活动*\n\n\n\n在**设置取消父管道命令**的设置变量活动的**变量**选项卡上，单击**名称**属性的下拉菜单，并选择**StopParentPipelineRunIdString**。单击**值**文本框内部，然后单击**添加动态内容\
  \ [Alt + P]** 链接。当**添加动态内容**窗格显示时，输入一个类似于 `@concat('https://management.azure.com/subscriptions/<订阅\
  \ ID>/resourcegroups/<资源组名称>/providers/Microsoft.DataFactory/factories',pipeline().DataFactory,'/pipelineruns/',pipeline().parameters.ParentRunId,'/cancel?api-version=2018-06-01')`\
  \ 的表达式，如图 11-24 所示。\n\n在图 11-24 所示的表达式中，将 `<subscription id>` 替换为您的订阅 ID 值，并将 `<resource\
  \ group name>` 替换为您的 Azure 数据工厂的资源组名称。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig24_HTML.jpg](img/497846_1_En_11_Fig24_HTML.jpg)\n\
  *图 11-24. 构建 “StopParentPipelineRunIdString” 变量的值*\n\n以上步骤完成了当**在包失败时失败应用程序**位配置为\
  \ true (1) 时，响应失败的子程序包执行的第三步：设置要取消父管道的命令。\n\n当**在包失败时失败应用程序**位配置为 true (1) 时，响应失败的子程序包执行的第四步如下：执行取消父管道的命令。\n\
  \n要开始添加执行取消管道运行命令的功能，请将 Web 活动添加到**在包失败时失败应用程序**条件活动的**True 活动**画布中，将来自**设置取消父管道命令**设置变量活动的成功输出连接到新的\
  \ Web 活动，然后将新的 Web 活动重命名为**停止父级执行**，如图 11-25 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig25_HTML.jpg](img/497846_1_En_11_Fig25_HTML.jpg)\n\
  *图 11-25. 添加 “停止父级执行” Web 活动*\n\n在**停止父级执行** Web 活动的**设置**选项卡上，单击 **URL** 属性的文本框内部，然后单击**添加动态内容\
  \ [Alt + P]** 链接。当**添加动态内容**窗格显示时，输入表达式 `@variables('StopParentPipelineRunIdString')`，如图\
  \ 11-26 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig26_HTML.jpg](img/497846_1_En_11_Fig26_HTML.jpg)\n\
  *图 11-26. 配置 “停止父级执行” Web 活动的 URL 属性*\n\n按如下方式完成**停止父级执行** Web 活动的**设置**选项卡上的属性配置（如图\
  \ 11-27 所示）：\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig27_HTML.jpg](img/497846_1_En_11_Fig27_HTML.jpg)\n\
  *图 11-27. “停止父级执行” Web 活动设置配置*\n\n- 方法：`POST`\n- 主体：`{\"message\":\"Stopping the\
  \ parent pipeline\"}`\n- 高级 ➤ 身份验证：`MSI`\n- 高级 ➤ 资源：`https://management.azure.com`\n\
  \n以上步骤完成了当**在包失败时失败应用程序**位配置为 true (1) 时，响应失败的子程序包执行的第四步也是最后一步：设置要取消父管道的命令。\n\n\
  如前配置，**在包失败时失败应用程序**条件活动的**True 活动**中的活动协同工作，以更新应用程序包实例和应用程序实例的状态，然后为正在运行的父管道调用\
  \ Azure 数据工厂的 REST API Pipeline Runs Cancel 方法。\n\n在测试更改之前，请删除（现已孤立的）**记录应用程序包实例失败**存储过程活动，如图\
  \ 11-28 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig28_HTML.jpg](img/497846_1_En_11_Fig28_HTML.jpg)\n\
  *图 11-28. 删除旧的 “记录应用程序包实例失败” 存储过程活动*\n\n#### 让我们来测试一下！\n\n通过单击数据工厂工具栏中的**全部发布**按钮来部署父管道和子管道，如图\
  \ 11-29 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig29_HTML.jpg](img/497846_1_En_11_Fig29_HTML.jpg)\n\
  *图 11-29. 发布对管道和 ADF 项目的更改*\n\n在父管道中，单击**添加触发器**菜单项，然后单击**立即触发**，如图 11-30 所示。\n\n\
  ![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig30_HTML.jpg](img/497846_1_En_11_Fig30_HTML.jpg)\n\
  *图 11-30. 触发父管道*\n\n当父管道执行完成时，“监视”页面应显示类似于图 11-31 的结果。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig31_HTML.jpg](img/497846_1_En_11_Fig31_HTML.jpg)\n\
  *图 11-31. 父管道和子管道执行结果*\n\n执行清单 11-2 中所示的 T-SQL 查询，以确认应用程序实例和应用程序包实例的结果。\n\n```sql\n\
  Select top 1\na.ApplicationName\n, ai.ApplicationInstanceId\n, ai.ApplicationStatus\n\
  From log.ApplicationInstance ai\nJoin config.Applications a\nOn a.ApplicationId\
  \ = ai.ApplicationId\nOrder By ApplicationInstanceId Desc\ndeclare @ApplicationInstanceId\
  \ int = (Select top 1 ApplicationInstanceId\nFrom log.ApplicationInstance\nOrder\
  \ By ApplicationInstanceId DESC)\nSelect p.PackageName\n, ai.ApplicationInstanceId\n\
  , api.ApplicationPackageInstanceId\n, api.ApplicationPackageStatus\n, ap.FailApplicationOnPackageFailure\n\
  From log.ApplicationPackageInstance api\nJoin log.ApplicationInstance ai\nOn ai.ApplicationInstanceId\
  \ = api.ApplicationInstanceId\nJoin config.ApplicationPackages ap\nOn ap.ApplicationPackageId\
  \ = api.ApplicationPackageId\nJoin config.Packages p\nOn p.PackageId = ap.PackageId\n\
  Where ai.ApplicationInstanceId = @ApplicationInstanceId\nOrder By ApplicationPackageInstanceId\n\
  ```\n*清单 11-2. 应用程序和应用程序包执行结果*\n\n结果应类似于图 11-32。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig32_HTML.jpg](img/497846_1_En_11_Fig32_HTML.jpg)\n\
  *图 11-32. 应用程序和应用程序包执行结果*\n\n**框架测试** SSIS 框架应用程序包含两个应用程序包，**ReportAndFail.dtsx**\
  \ 和 **ReportAndSucceed.dtsx**。如所述，**ReportAndFail.dtsx** 每次执行都会失败。在 SSIS 框架元数据中，两个应用程序包的**在包失败时失败应用程序**位都设置为\
  \ 1 (true)，如执行清单 11-3 中的 T-SQL 查询时所见（结果如图 11-33 所示）。\n\n```sql\nSelect ap.ApplicationPackageId\n\
  , a.ApplicationName\n, p.PackageName\n, ap.ExecutionOrder\n, ap.FailApplicationOnPackageFailure\n\
  From config.Applications a\nJoin config.ApplicationPackages ap\nOn ap.ApplicationId\
  \ = a.ApplicationId\nJoin config.Packages p\nOn p.PackageId = ap.PackageId\nWhere\
  \ a.ApplicationName = N'Framework Test'\nOrder By ap.ExecutionOrder\n```\n*清单 11-3.\
  \ 查看 SSIS 框架元数据*\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig33_HTML.jpg](img/497846_1_En_11_Fig33_HTML.jpg)\n\
  *图 11-33. 查看 SSIS 框架元数据 T-SQL 查询结果*\n\n\n\n当执行父管道时，两个应用程序包——`ReportAndFail.dtsx`和`ReportAndSucceed.dtsx`——会从`SSISConfig`数据库中被检索出来，并转储到父管道的“ForEach\
  \ 应用程序包”ForEach 活动的迭代器中。由于`ReportAndFail.dtsx`的`ExecutionOrder`为 10，而`ReportAndSucceed.dtsx`的`ExecutionOrder`为\
  \ 20，因此`ReportAndFail.dtsx`会先执行。根据设计，当`ReportAndFail.dtsx`在子管道中执行失败，并且`FailApplicationOnPackageFailure`位为\
  \ true 时，父管道将被取消。\n\n如果`ReportAndFail.dtsx`在子管道中失败，而`FailApplicationOnPackageFailure`位为`false`，会发生什么？为了测试，请使用清单\
  \ 11-4 中的 T-SQL 更新`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位。\n\
  \n```sql\nSelect ap.ApplicationPackageId\n, a.ApplicationName\n, p.PackageName\n\
  , ap.ExecutionOrder\n, ap.FailApplicationOnPackageFailure\nFrom config.Applications\
  \ a\nJoin config.ApplicationPackages ap\nOn ap.ApplicationId = a.ApplicationId\n\
  Join config.Packages p\nOn p.PackageId = ap.PackageId\nWhere a.ApplicationName =\
  \ N'Framework Test'\nOrder By ap.ExecutionOrder\n\nUpdate config.ApplicationPackages\n\
  Set FailApplicationOnPackageFailure = 0\nWhere ApplicationPackageId = 2\n\nSelect\
  \ ap.ApplicationPackageId\n, a.ApplicationName\n, p.PackageName\n, ap.ExecutionOrder\n\
  , ap.FailApplicationOnPackageFailure\nFrom config.Applications a\nJoin config.ApplicationPackages\
  \ ap\nOn ap.ApplicationId = a.ApplicationId\nJoin config.Packages p\nOn p.PackageId\
  \ = ap.PackageId\nWhere a.ApplicationName = N'Framework Test'\nOrder By ap.ExecutionOrder\n\
  ```\n\n清单 11-4\n更新`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位\n\
  \n执行清单 11-4 中的 T-SQL 查询的结果应类似于图 11-34。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig34_HTML.jpg](img/497846_1_En_11_Fig34_HTML.jpg)\n\
  \n图 11-34\n`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位已更新\n\n为了测试更改`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位的影响，请重新触发父管道。监视页面显示了容错结果：`ReportAndFail.dtsx`失败了，但并未停止\
  \ SSIS 框架应用程序的执行。`ReportAndSucceed.dtsx`执行并成功，如图 11-35 所示。\n\n![../images/497846_1_En_11_Chapter/497846_1_En_11_Fig35_HTML.jpg](img/497846_1_En_11_Fig35_HTML.jpg)\n\
  \n图 11-35\n容错功能在行动中；一个应用程序包的失败不会停止应用程序执行\n\n我唯一的抱怨是父管道报告了失败。\n\n### 结论\n\n在本章中，我们为\
  \ SSIS 框架的 Azure Data Factory 版本添加了容错功能。在此过程中，我们学习了如何为 Azure Data Factory 托管标识配置安全性，以便数据工厂管道中的\
  \ Web 活动可以调用 Azure Data Factory REST API 中的方法。我们还进一步了解了 ForEach 活动的默认行为。\n\n\n\n"
