  \n### 查看执行报告数据\n\nSSIS 框架日志记录存储在名为 `[log].[ApplicationInstance]` 和 `[log].[ApplicationPackageInstance]`\
  \ 的两个表中。`[log].[ApplicationInstance]` 表中的每一行都包含关于单次 SSIS 框架应用程序执行或应用程序执行的一个*实例*的数据。使用清单\
  \ 7-10 所示的 T-SQL 查询查看应用程序实例数据。\n\n```sql\nSelect a.ApplicationName\n, ai.ApplicationStartTime\n\
  , DateDiff(ms, ai.ApplicationStartTime, ai.ApplicationEndTime) As ApplicationRunMilliSeconds\n\
  , ai.ApplicationStatus\nFrom [SSISConfig].[log].[ApplicationInstance] ai\nJoin [SSISConfig].[config].[Applications]\
  \ a\nOn a.ApplicationId = ai.ApplicationId\nOrder By ai.ApplicationStartTime Desc\n\
  -- 清单 7-10\n-- 查看应用程序实例日志数据\n```\n\n应用程序实例查询的结果将类似于图 7-35 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig35_HTML.jpg](img/497846_1_En_7_Fig35_HTML.jpg)\n\
  \n图 7-35 查看应用程序实例结果\n\n回答我们的第一个问题——“执行测试成功了吗？”——SSIS 应用程序查询的结果表明记录了三次测试应用程序实例执行，这意味着“是的，执行测试成功了三次。”\n\
  \n接下来检查应用程序包实例数据。执行清单 7-11 中所示的 T-SQL 以查看应用程序包实例数据。\n\n```sql\nSelect a.ApplicationName\n\
  , p.PackageName\n, api.ApplicationPackageStartTime\n, ai.ApplicationStatus\n, api.ApplicationPackageStatus\n\
  , api.ApplicationPackageStartTime\n, ap.FailApplicationOnPackageFailure\n, DateDiff(ms,\
  \ api.ApplicationPackageStartTime, ➤ api.ApplicationPackageEndTime) As ApplicationPackageRunMilliSeconds\n\
  , ai.ApplicationStartTime\n, DateDiff(ms, ai.ApplicationStartTime, ai.ApplicationEndTime)\
  \ As ➤ ApplicationRunMilliSeconds\nFrom [SSISConfig].[log].[ApplicationPackageInstance]\
  \ api\nJoin [SSISConfig].[log].[ApplicationInstance] ai\nOn ai.ApplicationInstanceId\
  \ = api.ApplicationInstanceId\nJoin [SSISConfig].[config].[ApplicationPackages]\
  \ ap\nOn ap.ApplicationPackageId = api.ApplicationPackageId\nJoin [SSISConfig].[config].[Applications]\
  \ a\nOn a.ApplicationId = ap.ApplicationId\nJoin [SSISConfig].[config].[Packages]\
  \ p\nOn p.PackageId = ap.PackageId\nOrder By api.ApplicationPackageStartTime Desc\n\
  -- 清单 7-11\n-- 查看应用程序包实例日志数据\n```\n\n应用程序包实例查询的结果将类似于图 7-36 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig36_HTML.jpg](img/497846_1_En_7_Fig36_HTML.jpg)\n\
  \n图 7-36 查看应用程序包实例结果\n\n回答我们的第二个问题——“测试执行成功了吗？”——SSIS 应用程序包查询的结果表明两次测试应用程序实例执行已失败，并且\
  \ `ReportAndFail.dtsx` 应用程序包的每次测试执行都失败了，这意味着“是的，测试执行成功了两次。” 等等。为什么两次失败被认为是成功？两次失败被认为是成功，因为\
  \ `ReportAndFail.dtsx` 应用程序包设计为失败，并且 `FailApplicationOnPackageFailure` 位被设置为 `true`\
  \ (`1`)。\n\n使用清单 7-12 中的 T-SQL 将 `ReportAndFail.dtsx` 应用程序包的 `FailApplicationOnPackageFailure`\
  \ 位设置为 `False` (`0`) 来测试这个断言。\n\n\n\n```sql\nSelect p.PackageName\n, ap.FailApplicationOnPackageFailure\n\
  From [SSISConfig].[config].[ApplicationPackages] ap\nJoin [SSISConfig].[config].[Packages]\
  \ p\nOn p.PackageId = ap.PackageId\nWhere p.PackageName = N'ReportAndFail.dtsx'\n\
  \nUpdate ap\nSet ap.FailApplicationOnPackageFailure = 0\nFrom [SSISConfig].[config].[ApplicationPackages]\
  \ ap\nJoin [SSISConfig].[config].[Packages] p\nOn p.PackageId = ap.PackageId\nWhere\
  \ p.PackageName = N'ReportAndFail.dtsx'\n\nSelect p.PackageName\n, ap.FailApplicationOnPackageFailure\n\
  From [SSISConfig].[config].[ApplicationPackages] ap\nJoin [SSISConfig].[config].[Packages]\
  \ p\nOn p.PackageId = ap.PackageId\nWhere p.PackageName = N'ReportAndFail.dtsx'\n\
  ```\n\n代码清单 7-12 为 `ReportAndFail.dtsx` 重置 `FailApplicationOnPackageFailure` 位\n\
  \n请注意，`Select` 语句在 `Update` 语句执行前后展示了 `FailApplicationOnPackageFailure` 位值。努力在 T-SQL\
  \ 语句中传达意图；“命令已成功完成”的反馈*远远不够*。\n\n应用程序包更新的结果将类似于图 7-37 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig37_HTML.jpg](img/497846_1_En_7_Fig37_HTML.jpg)\n\
  \n图 7-37 查看应用程序包更新结果\n\n在 SSIS 调试器中执行 `Parent.dtsx` 显示 SSIS 执行结果*没有变化*，如图 7-38 所示。\n\
  \n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig38_HTML.jpg](img/497846_1_En_7_Fig38_HTML.jpg)\n\
  \n图 7-38 `Parent.dtsx` 执行再次失败\n\n这是怎么回事？`Parent.dtsx` 的容错配置不正确。在我们正确配置 `Parent.dtsx`\
  \ SSIS 包的容错之前，请注意 `FOREACH Application Package` Foreach 循环容器失败了，表明容错设置不正确。同时请注意\
  \ `SCR Log Package Execution Failure` 脚本任务*成功了*，表明代码清单 7-13 中展示的 `FailApplicationOnPackageFailure`\
  \ 逻辑*正在运作*。\n\n```csharp\npublic void Main()\n{\n    // System::PackageName, System::TaskName\n\
  \    // User::FailApplicationOnPackageFailure, User::PackagePath\n    string packageName\
  \ = ➤ Dts.Variables[\"System::PackageName\"].Value.ToString();\n    string taskName\
  \ = Dts.Variables[\"System::TaskName\"].Value.ToString();\n    string subComponent\
  \ = packageName + \".\" + taskName;\n    int informationCode = 1001;\n    int errorCode\
  \ = -999;\n    bool fireAgain = true;\n    bool failApplicationOnPackageFailure\
  \ = ➤ Convert.ToBoolean(Dts.Variables[\"User::FailApplicationOnPackageFailure\"\
  ] ➤ .Value);\n    string packagePath = Dts.Variables[\"User::PackagePath\"].Value.ToString();\n\
  \    string description = String.Empty;\n\n    if(failApplicationOnPackageFailure)\n\
  \    {\n        description = packagePath + \" execution failed and ➤ FailApplicationOnPackageFailure\
  \ is set (true)\";\n        Dts.Events.FireError(errorCode, subComponent, description,\
  \ \"\", 0);\n    }\n    else\n    {\n        description = packagePath + \" execution\
  \ failed and ➤ FailApplicationOnPackageFailure is NOT set (false)\";\n        Dts.Events.FireInformation(informationCode,\
  \ subComponent, ➤ description, \"\", 0, ref fireAgain);\n    }\n\n    Dts.TaskResult\
  \ = (int)ScriptResults.Success;\n}\n```\n\n代码清单 7-13 `FailApplicationOnPackageFailure`\
  \ 逻辑\n\n来自 `SCR Log Package Execution Failure` 脚本任务的进度选项卡消息确认 `FailApplicationOnPackageFailure`\
  \ 功能按设计工作，如图 7-39 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig39_HTML.jpg](img/497846_1_En_7_Fig39_HTML.jpg)\n\
  \n图 7-39 `FailApplicationOnPackageFailure` 正在运作\n\n下一步是为 `Parent.dtsx` SSIS 包配置容错。\n\
  \n### 在 SSIS 框架应用程序元数据中配置容错\n\n开始为 `Parent.dtsx` SSIS 包配置容错，使得当且仅当满足两个条件时执行才失败：\n\
  \n1.  一个应用程序包执行失败。\n2.  该应用程序包的 `FailApplicationOnPackageFailure` 位设置为 true。\n\n\
  如果这两个条件有一个或两个为假，期望的行为是 `Parent.dtsx` 继续执行。要配置*始终持续运行*功能，点击 `FOREACH Application\
  \ Package` Foreach 循环容器，并按 F4 键显示其属性，如图 7-40 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig40_HTML.jpg](img/497846_1_En_7_Fig40_HTML.jpg)\n\
  \n图 7-40 显示 `FOREACH Application Package` Foreach 循环容器的属性\n\n在图 7-40 中，`MaximumErrorCount`\
  \ 属性被高亮显示。默认的 `MaximumErrorCount` 属性值为 1 的净效果如下：如果在 `FOREACH Application Package`\
  \ Foreach 循环容器执行期间发生一个错误，则 `FOREACH Application Package` Foreach 循环容器的执行将失败。\n\n\
  可以增加 `FOREACH Application Package` Foreach 循环容器的 `MaximumErrorCount` 属性值，但如果要增加，应该设为多少新值？假设配置了\
  \ 10、20 或 300 个应用程序包作为 SSIS 框架应用程序的一部分执行。虽然实际上有一种方法可以管理这种场景，但存在一个更优雅的解决方案。\n\n一个更优雅的解决方案是忽略*所有*执行错误。将\
  \ `FOREACH Application Package` Foreach 循环容器的 `MaximumErrorCount` 属性值更改为 0，以配置该容器忽略执行期间的所有错误。\n\
  \n感谢 Julie Smith（Twitter 账号 @juliechix）教会我将 `MaximumErrorCount` 设置为 0。\n\n因为事件在\
  \ SSIS 中*冒泡*，在 `FOREACH Application Package` Foreach 循环容器内发生的任何错误都将“冒泡”到 `Parent.dtsx`\
  \ SSIS 包，即 `FOREACH Application Package` Foreach 循环容器的父容器。点击 `Parent.dtsx` 控制流中任意空白处以显示\
  \ `Parent.dtsx` 包的属性，并将 `MaximumErrorCount` 属性更改为 0，如图 7-41 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig41_HTML.jpg](img/497846_1_En_7_Fig41_HTML.jpg)\n\
  \n图 7-41 更改 `Parent.dtsx` 包的 `MaximumErrorCount` 属性\n\n*当前*配置下，SSIS 框架应用程序包将继续执行，直到最后一个应用程序包执行完毕，无论应用程序包实例是否失败，*也无论*应用程序包的\
  \ `FailApplicationOnPackageFailure` 位设置如何。\n\n下一步是配置 `Parent.dtsx` SSIS 包，当且仅当满足两个条件时才*停止*执行：\n\
  \n1.  一个应用程序包执行失败。\n2.  该应用程序包的 `FailApplicationOnPackageFailure` 位设置为 true。\n\n\
  点击 `SCR Log Package Execution Failure` 脚本任务。在属性中，将 `SCR Log Package Execution Failure`\
  \ 脚本任务的 `FailPackageOnFailure` 属性更改为 True，如图 7-42 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig42_HTML.jpg](img/497846_1_En_7_Fig42_HTML.jpg)\n\
  \n图 7-42 将 `SCR Log Package Execution Failure` 脚本任务的 `FailPackageOnFailure` 属性更改为\
  \ True\n\n现在测试执行揭示了期望的功能；SSIS 框架应用程序包执行实例的行为符合配置，容错按设计工作，如图 7-43 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig43_HTML.jpg](img/497846_1_En_7_Fig43_HTML.jpg)\n\
  \n图 7-43\n\n\n\n### 结论\n\n本章介绍了 SSIS 框架日志记录，它扩展了我们在第 6 章中构建的仪表化功能。接下来的几章将探讨如何将这个简单的\
  \ SSIS 框架迁移并适配到更多场景中，包括 Azure Data Factory。\n\n## 8. Azure-SSIS 集成运行时\n\n微软 Azure-SSIS\
  \ 团队一直在努力，致力于减少在本地执行 SSIS 包与在 Azure 中执行 SSIS 包之间的摩擦。许多企业在本地执行存储在文件系统中的 SSIS 包。过去，迁移在本地文件系统中执行的\
  \ SSIS 包意味着要改变企业的 SSIS 存储和执行模式。随着基于 Azure-SSIS 文件共享执行的出现，从 Azure 文件执行 SSIS 包已不再是个问题。\n\
  \n实际上，前一章介绍的 SSIS 框架在 Azure-SSIS 中运行良好。在本章中，我们将讨论并演示：\n\n*   Azure 入门\n*   配置 Azure\
  \ Data Factory\n*   配置 Azure 存储\n*   配置 Azure-SSIS\n\n### Azure 入门\n\n在 Azure 中创建资源并与之交互之前，必须首先在\
  \ azure.com 上创建一个 Azure 帐户，如图 8-1 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig1_HTML.jpg](img/497846_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1: Azure.com\n\n请注意，图 8-1 中链接按钮上的文字是“Try Azure for free”。迄今为止，微软的优秀员工一直持续提供某些\
  \ Azure 服务的免费入门访问权限。免费的入门优惠完全由微软提供，并可能根据微软的决定进行更改。\n\n创建帐户后，下一步是配置 Azure Data Factory。\n\
  \nAzure 每天都在变化。本书中的一些截图和操作步骤在出版前可能就会过时。\n\nSSIS 应用程序包容错按设计工作\n\n请记住，`ReportAndFail.dtsx`应用程序包执行`应该`失败，但一个`ReportAndFail.dtsx`应用程序包执行实例的失败`不应`导致应用程序失败（在其当前配置下）。\n\
  \n使用清单 7-14 中的 T-SQL 更新`ReportAndFail.dtsx`应用程序包的`FailApplicationOnPackageFailure`位配置。\n\
  \n```sql\nSelect p.PackageName\n, ap.FailApplicationOnPackageFailure\nFrom [SSISConfig].[config].[ApplicationPackages]\
  \ ap\nJoin [SSISConfig].[config].[Packages] p\nOn p.PackageId = ap.PackageId\nWhere\
  \ p.PackageName = N'ReportAndFail.dtsx'\n\nUpdate ap\nSet ap.FailApplicationOnPackageFailure\
  \ = 1\nFrom [SSISConfig].[config].[ApplicationPackages] ap\nJoin [SSISConfig].[config].[Packages]\
  \ p\nOn p.PackageId = ap.PackageId\nWhere p.PackageName = N'ReportAndFail.dtsx'\n\
  \nSelect p.PackageName\n, ap.FailApplicationOnPackageFailure\nFrom [SSISConfig].[config].[ApplicationPackages]\
  \ ap\nJoin [SSISConfig].[config].[Packages] p\nOn p.PackageId = ap.PackageId\nWhere\
  \ p.PackageName = N'ReportAndFail.dtsx'\n\nListing 7-14: 更新 ReportAndFail.dtsx 的\
  \ FailApplicationOnPackageFailure 位\n```\n\n更新`ReportAndFail.dtsx`应用程序包的 SSIS 框架应用程序包元数据后，结果如图\
  \ 7-44 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig44_HTML.jpg](img/497846_1_En_7_Fig44_HTML.jpg)\n\
  \n图 7-44: 更新 ReportAndFail.dtsx 应用程序包元数据的结果\n\n重新执行`Parent.dtsx`确认了我们可以在需要时失败，如图\
  \ 7-45 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig45_HTML.jpg](img/497846_1_En_7_Fig45_HTML.jpg)\n\
  \n图 7-45: 由 SSIS 框架元数据管理的应用程序包失败\n\n`Parent.dtsx` SSIS 包的当前状态代表了一个相当健壮的 SSIS 框架执行引擎。\n\
  \n然而，仍然存在一个问题：重新执行清单 7-11 中所示的查询，返回的`ApplicationPackageStatus`结果为“Running”，类似于图\
  \ 7-46 所示的结果。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig46_HTML.jpg](img/497846_1_En_7_Fig46_HTML.jpg)\n\
  \n图 7-46: ApplicationPackageStatus 为 “Running”\n\n为什么`ApplicationPackageStatus`是“Running”？查看图\
  \ 7-45 中的截图，注意“SQL Log Application Package Instance Failure”执行 SQL 任务*没有执行*，因为连接“SCR\
  \ Log Package Execution Failure”脚本任务和“SQL Log Application Package Instance Failure”执行\
  \ SQL 任务的优先约束被配置为仅在*成功*时评估。回顾清单 7-13，应用程序包失败可能导致“SQL Log Application Package Instance\
  \ Failure”执行 SQL 任务成功*或*失败，具体取决于`[config].[ApplicationPackages]`表中应用程序包的`FailApplicationOnPackageFailure`位值。\n\
  \n清单 7-14 和图 7-44 显示我们将`FailApplicationOnPackageFailure`位设置为 1（true），这通知了“SCR Log\
  \ Package Execution Failure”脚本任务。“SCR Log Package Execution Failure”脚本任务随后按照清单 7-13\
  \ 中规定的.Net C#代码引发了错误。\n\n幸运的是，修复方法简单明了——删除连接“SCR Log Package Execution Failure”脚本任务和“SQL\
  \ Log Application Package Instance Failure”执行 SQL 任务的优先约束。从“EPT Execute Child Package”执行包任务到“SQL\
  \ Log Application Package Instance Failure”执行 SQL 任务连接一个新的*失败*优先约束。在调试器中重新执行`Parent.dtsx`会执行“SQL\
  \ Log Application Package Instance Failure”执行 SQL 任务，如图 7-47 所示。\n\n![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig47_HTML.jpg](img/497846_1_En_7_Fig47_HTML.jpg)\n\
  \n图 7-47: “SQL Log Application Package Instance Failure” 执行 SQL 任务得以执行\n\n重新执行清单\
  \ 7-11 中的应用程序包状态查询，返回的`ApplicationPackageStatus`结果为“Failed”，类似于图 7-48 所示的结果。\n\n\
  ![../images/497846_1_En_7_Chapter/497846_1_En_7_Fig48_HTML.jpg](img/497846_1_En_7_Fig48_HTML.jpg)\n\
  \n图 7-48: ApplicationPackageStatus 为 “Failed”\n\n我们的 SSIS 框架执行引擎现已准备好部署到其他地方。\n\n\
  \n\n### 预配 Azure Data Factory\n\nAzure 托管了大量服务。通常，Azure 服务可归类为：\n\n1.  基础设施即服务（IaaS），其中\
  \ Azure 托管企业级基础设施，例如虚拟机（VM）。\n2.  平台即服务（PaaS），其中 Azure 提供企业级平台，例如 SQL Server 或 `Azure\
  \ Data Factory`。\n\nAzure 用户首先需要 **预配**（provisioning）——即创建——Azure 服务产品的实例。要开始预配一个\
  \ `Azure Data Factory`（简称 ADF）实例，请点击左侧菜单中的“创建资源”，如图 8-2 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig2_HTML.jpg](img/497846_1_En_8_Fig2_HTML.jpg)\n\
  *图 8-2：在 Azure 左侧菜单中创建资源*\n\n当“新建”页面显示时，搜索“Data Factory”，如图 8-3 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig3_HTML.jpg](img/497846_1_En_8_Fig3_HTML.jpg)\n\
  *图 8-3：在“新建”页面上搜索 Data Factory*\n\n在“新建”页面上，点击搜索文本框下方的“Data Factory”以打开 Data Factory\
  \ 页面，如图 8-4 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig4_HTML.jpg](img/497846_1_En_8_Fig4_HTML.jpg)\n\
  *图 8-4：Data Factory 页面*\n\n点击 Data Factory 页面上的“创建”按钮，打开“新建数据工厂”页面，如图 8-5 所示。\n\n\
  ![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig5_HTML.jpg](img/497846_1_En_8_Fig5_HTML.jpg)\n\
  *图 8-5：添加新的 Azure Data Factory 实例*\n\n在“新建数据工厂”页面上填写必填字段的值。\n\n根据 `Azure Data Factory`\
  \ 的命名规则（`docs.microsoft.com/en-us/azure/data-factory/naming-rules`），`Azure Data\
  \ Factory`、`资源组` 和 `存储帐户` 的名称是全局唯一且不区分大小写的。\n\n资源组是将相关 Azure 资源进行分组的一种方式。当使用 Azure\
  \ 资源来学习 Azure 时，资源组允许学生从一个屏幕**删除**该资源组及其所有组成部分。\n\n您可以从“资源组”下拉菜单中选择一个现有的资源组，或者通过点击“资源组”下拉菜单下方的“新建”链接来创建一个新的资源组，如图\
  \ 8-6 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig6_HTML.jpg](img/497846_1_En_8_Fig6_HTML.jpg)\n\
  *图 8-6：创建新的资源组*\n\n在撰写本文时，微软在全球维护着超过 20 个数据中心位置。这些位置旨在帮助使您的应用程序和数据更靠近客户端。多个位置也有助于备份和冗余。\n\
  \n为了获得最佳响应，请从“位置”下拉菜单中选择一个靠近您的位置，如图 8-7 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig7_HTML.jpg](img/497846_1_En_8_Fig7_HTML.jpg)\n\
  *图 8-7：选择一个位置*\n\n“启用 GIT”默认是选中的，这非常棒，如图 8-8 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig8_HTML.jpg](img/497846_1_En_8_Fig8_HTML.jpg)\n\
  *图 8-8：启用 GIT 复选框*\n\n本章不涉及源代码控制，因此请取消选中“启用 GIT”复选框。\n\n点击“创建”按钮，以按指定配置预配一个 `ADF`\
  \ 实例。\n\n几分钟后，`Azure Data Factory` 就预配好了。您可以点击通知中的按钮访问该资源，或将其固定到仪表板，如图 8-9 所示。\n\
  \n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig9_HTML.jpg](img/497846_1_En_8_Fig9_HTML.jpg)\n\
  *图 8-9：Azure Data Factory 已预配*\n\n如果您从通知“提示框”中点击“固定到仪表板”按钮，一个 Data Factory 磁贴将出现在您上次访问的\
  \ Azure 仪表板上，显示效果如图 8-10 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig10_HTML.jpg](img/497846_1_En_8_Fig10_HTML.jpg)\n\
  *图 8-10：固定到 Azure 仪表板的 Azure Data Factory 实例*\n\n与资源组类似，Azure 仪表板也提供了一种对 Azure 资源进行分组的方式。Azure\
  \ 仪表板允许对来自许多资源组（甚至对管理多个 Azure 订阅的用户来说，还可以跨订阅）的 Azure 资源进行可视化分组。\n\n点击磁贴以访问 `Azure\
  \ Data Factory` 的页面。默认显示“概述”，如图 8-11 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig11_HTML.jpg](img/497846_1_En_8_Fig11_HTML.jpg)\n\
  *图 8-11：Azure Data Factory 页面*\n\n`Azure Data Factory` 页面右上角的“图钉”图标允许您将此 ADF 实例的磁贴固定到\
  \ Azure 仪表板。请记住，您可以配置多个 Azure 仪表板，ADF 实例磁贴将固定到您最后访问的仪表板。\n\n点击“创作和监视”链接按钮，访问此 `Azure\
  \ Data Factory` 实例的 `adf.azure.com`，如图 8-12 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig12_HTML.jpg](img/497846_1_En_8_Fig12_HTML.jpg)\n\
  *图 8-12：Data Factory 概述页面*\n\n在撰写本文时，Data Factory 概述页面包含以下操作的快捷链接：\n\n*   创建管道\n\
  *   创建数据流\n*   从模板创建管道\n*   复制数据\n*   配置 SSIS 集成\n*   设置代码存储库\n\n既然 `Azure Data\
  \ Factory` 已预配好，下一步就是添加 `Azure 存储`。\n\n\n\n### 配置 Azure 存储\n\nAzure Blob 存储是可供 Azure\
  \ 资源和服务使用的文件系统。与服务器和笔记本电脑上的文件系统类似，Azure Blob 存储在所有 Azure 事务中都扮演着至关重要的角色。本节的目标是描述如何配置一个简单的\
  \ Azure 存储账户。随后，我们将使用此账户中的 Azure 文件共享来存储 SSIS 包和 ISPAC 文件。要了解更多关于 Azure 文件共享的信息，请参阅\
  \ `docs.microsoft.com/en-us/azure/storage/files/storage-how-to-create-file-share`。\n\
  \n与配置 ADF 实例时一样，在 Azure 左侧菜单中点击 `创建资源`。点击 `存储`，然后点击 `存储账户 - Blob、文件、表、队列`，如图 8-13\
  \ 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig13_HTML.jpg](img/497846_1_En_8_Fig13_HTML.jpg)\n\
  *图 8-13 配置 Azure 存储*\n\n当 `创建存储账户` 页面显示时，在 `项目详细信息` 部分配置订阅和资源组，如图 8-14 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig14_HTML.jpg](img/497846_1_En_8_Fig14_HTML.jpg)\n\
  *图 8-14 配置存储账户订阅和资源组*\n\n在 `实例详细信息` 部分，配置 `存储账户名称` 属性，如图 8-15 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig15_HTML.jpg](img/497846_1_En_8_Fig15_HTML.jpg)\n\
  *图 8-15 配置存储账户名称属性*\n\n下一步是在 `实例详细信息` 部分配置 `位置` 属性，如图 8-16 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig16_HTML.jpg](img/497846_1_En_8_Fig16_HTML.jpg)\n\
  *图 8-16 配置位置属性*\n\n出于本示例的目的，`标准` 性能已足够，如图 8-17 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig17_HTML.jpg](img/497846_1_En_8_Fig17_HTML.jpg)\n\
  *图 8-17 配置性能属性*\n\n接下来配置 `账户类型` 属性。将 `账户类型` 设置为 `StorageV2（通用 v2）`，如图 8-18 所示。\n\
  \n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig18_HTML.jpg](img/497846_1_En_8_Fig18_HTML.jpg)\n\
  *图 8-18 配置账户类型属性*\n\n出于示例目的，将 `复制` 属性设置为 `本地冗余存储 (LRS)` 即可，如图 8-19 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig19_HTML.jpg](img/497846_1_En_8_Fig19_HTML.jpg)\n\
  *图 8-19 配置存储账户的复制属性*\n\n接受默认的 `访问层级` 属性设置 – `热` – 如图 8-20 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig20_HTML.jpg](img/497846_1_En_8_Fig20_HTML.jpg)\n\
  *图 8-20 配置访问层级属性*\n\n`创建存储账户` 页面的 `基本信息` 选项卡配置如图 8-21 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig21_HTML.jpg](img/497846_1_En_8_Fig21_HTML.jpg)\n\
  *图 8-21 已配置的基本信息选项卡*\n\n出于本示例的目的，将 `网络`、`高级` 和 `标签` 选项卡上的设置保持为默认值。在 `基本信息` 选项卡的底部，点击\
  \ `查看 + 创建` 按钮（如图 8-21 所示）。\n\n存储账户设置将经过验证，结果会显示出来，如图 8-22 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig22_HTML.jpg](img/497846_1_En_8_Fig22_HTML.jpg)\n\
  *图 8-22 存储账户配置验证结果*\n\n还需注意，`创建存储账户` 页面底部的按钮文本已变为 `创建`。点击 `创建` 按钮以创建新的存储账户。部署完成后，存储账户页面和通知将如图\
  \ 8-23 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig23_HTML.jpg](img/497846_1_En_8_Fig23_HTML.jpg)\n\
  *图 8-23 存储账户，已创建*\n\n现在 Azure 数据工厂和存储账户都已配置完成，下一步是添加 Azure-SSIS 集成运行时。\n\n\n###\
  \ 为 SSIS 包文件配置 Azure-SSIS 集成运行时\n\n2019 年 6 月 30 日，Microsoft 发布了 ADF Azure-SSIS\
  \ 集成运行时的新版本。以往，企业可以使用 Azure 数据库托管的 SSIS 目录在云中执行 SSIS 包；而新版本则允许从 Azure 文件共享执行 SSIS\
  \ 包。\n\n### 入门\n\n要开始创建 Azure-SSIS 集成运行时，请导航到 Azure 数据工厂实例的“管理”页面，并在“连接”类别下点击“集成运行时”，如图\
  \ 8-24 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig24_HTML.jpg](img/497846_1_En_8_Fig24_HTML.jpg)\n\
  \n图 8-24：打开 ADF 连接\n\n当“连接”页面显示时，点击“集成运行时”选项卡，如图 8-25 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig25_HTML.jpg](img/497846_1_En_8_Fig25_HTML.jpg)\n\
  \n图 8-25：ADF 连接的“集成运行时”选项卡\n\n点击图 8-25 中圈出的“新建”按钮，以打开“集成运行时设置”窗格，并选择“Azure-SSIS”选项，如图\
  \ 8-26 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig26_HTML.jpg](img/497846_1_En_8_Fig26_HTML.jpg)\n\
  \n图 8-26：在集成运行时设置窗格中选择 Azure-SSIS\n\n图 8-26 中显示的另一个选项是“Azure、Self-Hosted”。你可以访问\
  \ `docs.microsoft.com/en-us/azure/data-factory/concepts-integration-runtime#self-hosted-integration-runtime`\
  \ 来了解有关 *所有* Azure 数据工厂集成运行时的更多信息。出于本示例的目的，我们将配置一个“独立”的 Azure-SSIS 集成运行时——即 IR——这是一种需要最少安全配置的\
  \ IR。有关将 Azure-SSIS IR 加入虚拟网络的更多信息，请访问 `docs.microsoft.com/en-us/azure/data-factory/join-azure-ssis-integration-runtime-virtual-network`。\n\
  \n### 配置常规设置\n\n点击“继续”按钮，打开集成运行时设置窗格上的“常规设置”页面。配置 Azure-SSIS IR 的名称和可选的描述，然后设置“位置”属性。在本例中，将“位置”属性设置为与\
  \ Azure 数据工厂相同的位置（此为默认值），如图 8-27 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig27_HTML.jpg](img/497846_1_En_8_Fig27_HTML.jpg)\n\
  \n图 8-27：配置名称、描述和位置属性\n\n#### 节点配置\n\n接下来的两个步骤将配置 Azure-SSIS 用以执行 SSIS 包的虚拟机（VM）。“节点大小”代表\
  \ *每个节点* 的配置，有一些性能强劲的选项，例如图 8-28 中列出的那些。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig28_HTML.jpg](img/497846_1_En_8_Fig28_HTML.jpg)\n\
  \n图 8-28：Azure-SSIS 的一些节点大小选项\n\nVM 系列的首字母表示虚拟机的通用类别和用途。A 系列 VM 专门设计用于在项目的测试和开发阶段节省成本。要了解有关\
  \ Azure 虚拟机系列和成本的更多信息，请访问 `azure.microsoft.com/en-us/pricing/details/virtual-machines/series/`。\n\
  \n从下拉列表中选择“A8_v2 (8 Core(s), 16384 MB)”节点大小，如图 8-29 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig29_HTML.jpg](img/497846_1_En_8_Fig29_HTML.jpg)\n\
  \n图 8-29：为 Azure-SSIS 选择节点大小\n\n“节点数”滑块指示 Azure-SSIS 可用的虚拟机数量。每个节点将根据上一个下拉列表中选择的节点大小进行配置。节点数是指\
  \ Azure-SSIS IR 可用的、在“节点大小”属性中配置的节点数量。本例中，将“节点数”属性保留为默认值 2，如图 8-30 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig30_HTML.jpg](img/497846_1_En_8_Fig30_HTML.jpg)\n\
  \n图 8-30：将“节点数”属性配置为 2\n\n### 许可与成本管理\n\n下一步是配置“版本/许可证”属性。现在先选择“标准”，如图 8-31 所示。\n\
  \n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig31_HTML.jpg](img/497846_1_En_8_Fig31_HTML.jpg)\n\
  \n图 8-31：设置版本/许可证属性\n\n一项名为“自带许可”或“BYOL”的功能是在 Azure 中减少支出的另一种方式。如果你或你的企业已经拥有 SQL\
  \ Server 许可证，请点击“是”以降低运行 Azure-SSIS 后端 VM 的成本，如图 8-32 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig32_HTML.jpg](img/497846_1_En_8_Fig32_HTML.jpg)\n\
  \n图 8-32：使用 BYOL 降低 Azure 成本\n\n请注意，更改“版本/许可证”属性并 *不会* 影响 Azure-SSIS 的成本，如图 8-33\
  \ 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig33_HTML.jpg](img/497846_1_En_8_Fig33_HTML.jpg)\n\
  \n图 8-33：选择企业版不会影响 Azure-SSIS 成本\n\n阅读 `azure.microsoft.com/en-us/pricing/details/data-factory/ssis/`\
  \ 以了解有关 Azure-SSIS 成本的更多信息。你也可以尝试不同的组合来平衡性能和成本，例如图 8-34 中显示的“D2_v3 (2 Core(s), 8192\
  \ MB)”企业配置。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig34_HTML.jpg](img/497846_1_En_8_Fig34_HTML.jpg)\n\
  \n图 8-34：测试其他节点大小组合\n\n$0.58 大约是 $1.89 的 31%。\n\n*请* 访问 `azure.microsoft.com/en-us/pricing/details/data-factory/ssis/`\
  \ 以了解有关 Azure-SSIS 实例成本的更多信息。管理 Azure-SSIS 成本的一种方法是安排 Azure 数据工厂管道在每晚关闭每个 Azure-SSIS\
  \ 实例，以防你在学习时忘记或被叫走。`andyleonard.blog/2020/05/stop-an-azure-ssis-files-integration-runtime-safely/`\
  \ 是一篇详细介绍如何停止 Azure-SSIS IR 的博客文章。\n\n**作者和/或出版商对产生的任何费用概不负责。**\n\n### 配置部署设置\n\n\
  常规设置配置完毕后，点击“继续”按钮，打开集成运行时设置窗格中的“部署设置”页面，如图 8-35 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig35_HTML.jpg](img/497846_1_En_8_Fig35_HTML.jpg)\n\
  \n图 8-35：集成运行时设置窗格中的“部署设置”页面\n\n我能听到你在想：“天哪，Andy！要配置的东西真多。而且你 *只字未提* 创建 Azure 数据库的事。怎么回事？”别急。我们正在为\
  \ *文件* 创建 Azure-SSIS 实例，记得吗？取消选中图 8-35 中圈出的“创建由 Azure SQL 数据库服务器/托管实例托管的 SSIS 目录\
  \ (SSISDB) 以存储你的项目/包/环境/执行日志”复选框。集成运行时设置窗格中的“部署设置”页面现在看起来与图 8-36 所示相似。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig36_HTML.jpg](img/497846_1_En_8_Fig36_HTML.jpg)\n\
  \n图 8-36\n\n\n集成运行时设置界面中，取消勾选 `创建 SSIS 目录…` 复选框后的 `部署设置` 页面。\n\n单击 `继续` 按钮可打开集成运行时设置界面的\
  \ `高级设置` 页面。`高级设置` 页面上提供四个选项：\n\n1.  `每个节点的最大并行执行数`\n2.  `Azure-SSIS 集成运行时自定义`\n\
  3.  `VNet`\n4.  `自承载集成运行时`\n\n`每个节点的最大并行执行数` 下拉菜单的功能如其名所示。每个 Azure-SSIS 节点（虚拟机）可执行由\
  \ `每个节点的最大并行执行数` 属性配置的 SSIS 包数量。\n\nAzure-SSIS 集成运行时可包含自定义配置和/或第三方工具，例如 SentryOne\
  \ 的 `Task Factory` (sentryone.com/products/task-factory) 和 COZYROC 的 `SSIS+ Components\
  \ Suite` (cozyroc.com/products)。\n\n大多数使用云的企业采用 `混合` 架构，将部分而非全部数据存储在云中。`VNet` 是一种访问本地企业数据的方式。在撰写本文时，经典的\
  \ Azure 虚拟网络正在被弃用，并由 `VNet` 替代。对于正在使用或希望使用以下功能的企业，推荐使用 `VNet`：\n\n-   经典 Azure 虚拟网络\n\
  -   具有 Azure-SSIS IR 的公共 IP 地址\n-   自定义的 Azure-SSIS\n\n请访问文章 `将 Azure-SSIS 集成运行时加入虚拟网络`\
  \ (docs.microsoft.com/en-us/azure/data-factory/join-azure-ssis-integration-runtime-virtual-network)\
  \ 了解更多信息。\n\n`自承载` Azure-SSIS 集成运行时允许访问本地企业数据，而*无需* `VNet`。\n\n在本示例中，请接受默认设置——不勾选任何复选框——如图\
  \ 8-37 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig37_HTML.jpg](img/497846_1_En_8_Fig37_HTML.jpg)\n\
  \n*图 8-37. 配置 Azure-SSIS 高级设置*\n\n单击 `继续` 按钮进入集成运行时设置的 `摘要` 页面。`摘要` 页面显示 Azure-SSIS\
  \ 配置选择，如图 8-38 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig38_HTML.jpg](img/497846_1_En_8_Fig38_HTML.jpg)\n\
  \n*图 8-38. Azure-SSIS 配置选择*\n\n单击 `创建` 按钮以预配 Azure-SSIS 集成运行时。`连接` ➤ `集成运行时` 会显示状态为\
  \ `正在启动` 的新 Azure-SSIS 集成运行时，如图 8-39 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig39_HTML.jpg](img/497846_1_En_8_Fig39_HTML.jpg)\n\
  \n*图 8-39. Azure-SSIS-Files 正在启动*\n\n一段时间后——在撰写本文时，通常为 3-5 分钟（最长）——Azure-SSIS IR\
  \ 将启动，`连接` ➤ `集成运行时` 会显示 `正在运行` 状态，如图 8-40 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig40_HTML.jpg](img/497846_1_En_8_Fig40_HTML.jpg)\n\
  \n*图 8-40. Azure-SSIS-Files 已启动*\n\n### 停止 Azure-SSIS 集成运行时\n\n停止 Azure-SSIS IR\
  \ 的一种方法是使用 `连接` ➤ `集成运行时` 页面上的 `停止` 按钮（停止按钮显示为暂停图标），如图 8-41 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig41_HTML.jpg](img/497846_1_En_8_Fig41_HTML.jpg)\n\
  \n*图 8-41. 停止 Azure-SSIS IR*\n\n单击 `停止` 按钮将触发一个确认对话框，如图 8-42 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig42_HTML.jpg](img/497846_1_En_8_Fig42_HTML.jpg)\n\
  \n*图 8-42. 确认停止命令*\n\n在撰写本文时，单击确认对话框上的 `停止` 按钮会触发如图 8-43 所示的调查表单。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig43_HTML.jpg](img/497846_1_En_8_Fig43_HTML.jpg)\n\
  \n*图 8-43. 由确认对话框触发的调查对话框*\n\n提交（或取消）调查表单后，Azure-SSIS 集成运行时将进入 `正在停止` 状态，如图 8-44\
  \ 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig44_HTML.jpg](img/497846_1_En_8_Fig44_HTML.jpg)\n\
  \n*图 8-44. Azure-SSIS 正在停止*\n\n另一种停止 Azure-SSIS IR 的方法是通过 `监视` ➤ `集成运行时` 页面，如图 8-45\
  \ 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig45_HTML.jpg](img/497846_1_En_8_Fig45_HTML.jpg)\n\
  \n*图 8-45. 监视 ➤ 集成运行时页面*\n\n单击 Azure-SSIS IR 的名称——在本例中为 `Azure-SSIS-Files`——以打开详细信息仪表板，如图\
  \ 8-46 所示。\n\n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig46_HTML.jpg](img/497846_1_En_8_Fig46_HTML.jpg)\n\
  \n*图 8-46. Azure-SSIS 详细信息仪表板*\n\n单击 `状态` (`正在运行`) 以打开如图 8-47 所示的 Azure-SSIS 状态对话框。\n\
  \n![../images/497846_1_En_8_Chapter/497846_1_En_8_Fig47_HTML.jpg](img/497846_1_En_8_Fig47_HTML.jpg)\n\
