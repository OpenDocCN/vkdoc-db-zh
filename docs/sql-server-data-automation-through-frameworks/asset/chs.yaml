  ```sql\n--禁用存储过程以进行重启执行\nUPDATE FWDemo.ApplicationProcessProcedure\nSET Active =\
  \ 0\nWHERE ApplicationProcessProcedureID in (1, 2)   -– 或来自处理日志的值\n列表 4-15\n管理 FWDemo.MonthlyProcess1\
  \ 的错误重启\n```\n\n列表 4-16 显示了重启后应用程序执行的日志条目。\n\n```\nProcessLogID      ProcessLogMessage\
  \                                                                              \
  \    CreateDate\n91                过程 FWDemo.ProcessOrchestratorMD – 已完成       \
