  \ 6-60 所示。单击“表达式生成器”的“确定”按钮返回到“属性表达式编辑器”，如图 6-61 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig61_HTML.jpg](img/497846_1_En_6_Fig61_HTML.jpg)\n\
