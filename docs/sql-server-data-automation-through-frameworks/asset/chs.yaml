  \n\n\n#### 添加 SSIS 包\n\n通过执行代码清单 5-10 中所示的 T-SQL 代码，将 `TestSSISProject` 中的 SSIS\
  \ 包添加到 SSIS 框架中。\n\n```sql\nuse [SSISConfig]\ngo\nSet NoCount ON\ndeclare @PackageLocation\
  \ nvarchar(255) = ➤ N'E:\\Projects\\TestSSISSolution\\TestSSISProject\\'\ndeclare\
  \ @PackageName nvarchar(255) = N'ReportAndSucceed.dtsx'\nprint @PackageLocation\
  \ + @PackageName\ndeclare @PackageId int = (Select [Packages].[PackageId]\nFrom\
  \ [config].[Packages]\nWhere [Packages].[PackageLocation] = ➤ @PackageLocation\n\
  And [Packages].[PackageName] = @PackageName)\nIf (@PackageId Is NULL)\nbegin\nprint\
  \ ' - Adding ' + @PackageName + ' package to config.Packages table'\ndeclare @PkgTbl\
  \ table(PackageId int)\nInsert Into [config].[Packages]\n(PackageLocation, PackageName)\n\
  Output inserted.PackageId into @PkgTbl\nValues (@PackageLocation, @PackageName)\n\
  Set @PackageId = (Select PackageId\nFrom @PkgTbl)\nprint ' - ' + @PackageName +\
  \ ' package added to config.Packages table'\nend\nElse\nbegin\nprint ' - ' + @PackageName\
  \ + ' package already exists in the ➤ config.Packages table.'\nend\nSelect @PackageId\
  \ As PackageId\nprint ''\nset @PackageName = N'ReportAndFail.dtsx'\nprint @PackageLocation\
  \ + @PackageName\nset @PackageId = (Select [Packages].[PackageId]\nFrom [config].[Packages]\n\
  Where [Packages].[PackageLocation] = @PackageLocation\nAnd [Packages].[PackageName]\
  \ = @PackageName)\nIf (@PackageId Is NULL)\nbegin\nprint ' - Adding ' + @PackageName\
  \ + ' application to config.Packages table'\nDelete @PkgTbl\nInsert Into [config].[Packages]\n\
  (PackageLocation, PackageName)\nOutput inserted.PackageId into @PkgTbl\nValues (@PackageLocation,\
  \ @PackageName)\nSet @PackageId = (Select PackageId\nFrom @PkgTbl)\nprint ' - '\
  \ + @PackageName + ' package added to config.Packages table'\nend\nElse\nbegin\n\
  print ' - ' + @PackageName + ' package already exists in the ➤ config.Packages table.'\n\
  end\nSelect @PackageId As PackageId\nprint ''\nListing 5-10\nAdding SSIS packages\
  \ from TestSSISProject\n```\n\n与代码清单 5-8 中的 T-SQL 类似，代码清单 5-10 中的 T-SQL 也是**幂等的**，因此代码清单\
  \ 5-10 中的 T-SQL 代码在 `config.Packages` 表中产生相同的结果；两个名为“ReportAndSucceed.dtsx”和“ReportAndFail.dtsx”的新\
  \ SSIS 包的元数据被添加到框架中。首次执行代码清单 5-10 中的 T-SQL 会返回消息（到 SSMS 的“消息”选项卡），如代码清单 5-11 所示。\n\
  \n```\nE:\\Projects\\TestSSISSolution\\TestSSISProject\\ReportAndSucceed.dtsx\n\
  - Adding ReportAndSucceed.dtsx package to config.Packages table\n- ReportAndSucceed.dtsx\
