  *图 9-25: 已上传的 `ReportAndSucceed.dtsx` 和 `ReportAndFail.dtsx` SSIS 包*\n\n下一步是更新 `SSISConfig`\
  \ 数据库 `config.Packages` 表中的元数据，以反映包所在的文件共享位置。\n\n### 更新 `PackageLocation` 值\n\n\
  问题：一个执行存储在本地文件存储中的 SSIS 包的简单、自定义、基于文件的 SSIS 框架，与一个执行存储在 Azure 文件共享中的 SSIS 包的简单、自定义、基于文件的\
  \ SSIS 框架，有何区别？\n\n答案：一个元数据值。\n\n执行清单 9-5 中所示的 T-SQL Update 语句，以更新存储在 `config.Packages`\
  \ 表中的 `PackageLocation` 值。\n\n```sql\nSelect p.PackageLocation + p.PackageName As\
  \ PackagePath\nFrom [config].[Packages] p\nUpdate [config].[Packages]\nSet PackageLocation\
  \  = N'\\\\stframeworks.file.core.windows.net\\fs-ssis\\'\nWhere PackageLocation\
  \  = N'E:\\Projects\\TestSSISSolution\\TestSSISProject\\'\nSelect p.PackageLocation\
  \ + p.PackageName As PackagePath\nFrom [config].[Packages] p\n```\n*清单 9-5: 更新 `config.Packages`\
  \ 表的 `PackageLocation` 值*\n\n执行清单 9-5 中所示的 T-SQL 后，结果应与图 9-26 类似。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig26_HTML.jpg](img/497846_1_En_9_Fig26_HTML.jpg)\n\
  *图 9-26: 更新 `config.Packages` 元数据*\n\n现在我们已经准备好构建 SSIS 框架执行引擎——Azure 数据工厂版本。\n\n\
  ### 构建 SSIS 框架 ADF 执行引擎\n\n到目前为止，部署一个执行存储在 Azure 文件共享中的 SSIS 包的简单、自定义、基于文件的 SSIS\
  \ 框架，无需更改 SSIS 框架元数据数据库的基础架构，只需更改元数据，并且仅限于更改单个字段中存储的值。\n\nSSIS 框架执行引擎是一个 Azure 数据工厂管道，而管道与\
  \ SSIS 包不同。这些差异将导致数据库及其他地方的更改。\n\n#### 检索 SSIS 包列表\n\n要开始在 ADF 中构建 SSIS 框架执行引擎，请连接到\
  \ Azure 数据工厂实例的“创作和监视”站点，点击“按名称筛选资源”文本框旁的“+”，然后点击“管道”以创建新管道，如图 9-27 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig27_HTML.jpg](img/497846_1_En_9_Fig27_HTML.jpg)\n\
  *图 9-27: 创建新的 ADF 管道*\n\n新管道打开后，将其名称更改为“parent”，如图 9-28 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig28_HTML.jpg](img/497846_1_En_9_Fig28_HTML.jpg)\n\
  *图 9-28: 将新管道重命名为 \"parent\"*\n\n在“活动”窗格中，展开“常规”类别，然后将一个“查找”活动拖到管道画布上。将此查找活动重命名为“获取应用程序包”，如图\
  \ 9-29 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig29_HTML.jpg](img/497846_1_En_9_Fig29_HTML.jpg)\n\
  *图 9-29: 向父管道添加并重命名一个查找活动*\n\nAzure 数据工厂的一个很棒的特性是灵活的创作顺序，或称为“FOA”。FOA 意味着可以从任一方向进行\
  \ ADF 开发：自底向上或自顶向下。\n\n自底向上的 ADF 开发涉及*首先*构建链接服务——以允许管道构件与位于管道外部的数据存储和服务进行通信。以自底向上方式构建链接服务后，再开发数据集。数据集使用链接服务并向管道构件呈现数据集合。如果您熟悉\
  \ SSIS，那么 ADF 链接服务类似于 SSIS 连接管理器，而 ADF 数据集则（不太准确地）类似于 SSIS 数据流源和目标适配器。\n\n对于本示例，我将利用\
  \ FOA 进行自顶向下的开发。自顶向下的 ADF 开发是什么样的呢？在接下来的几节中，我将点击并选择“新建”按钮、链接和选项，来构建如数据集和链接服务等 ADF\
  \ 构件。\n\n在“获取应用程序包”查找活动的“设置”选项卡上，点击“+ 新建”链接以配置“源数据集”属性，如图 9-30 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig30_HTML.jpg](img/497846_1_En_9_Fig30_HTML.jpg)\n\
  *图 9-30: 添加新的源数据集*\n\n当“新建数据集”窗格显示时，选择“Azure SQL 数据库”，然后点击“继续”按钮，如图 9-31 所示。\n\n\
  ![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig31_HTML.jpg](img/497846_1_En_9_Fig31_HTML.jpg)\n\
  *图 9-31: 配置新数据集的数据存储类型*\n\n设置数据集的“名称”属性；我将我的数据集命名为 `ssisFrameworkDataSet`。点击“链接服务”下拉列表，然后点击“+\
  \ 新建”选项，如图 9-32 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig32_HTML.jpg](img/497846_1_En_9_Fig32_HTML.jpg)\n\
  *图 9-32: 配置数据集名称和链接服务属性*\n\n当“新建链接服务 (Azure SQL 数据库)”页面显示时，输入一个名称和可选的描述。将“通过集成运行时连接”选项保留为其默认值，即\
  \ `AutoResolveIntegrationRuntime`。\n\n出于本示例的目的，选择“连接字符串”作为连接源，然后为“帐户选择方法”属性选择“从\
  \ Azure 订阅”选项。在订阅下拉列表中选择您的“Azure 订阅”，在“服务器名称”下拉列表中选择您在预配 Azure SQL 数据库时创建的服务器名称，然后在“数据库名称”下拉列表中选择您预配的\
  \ Azure SQL 数据库的名称。\n\n\n### 配置 Azure SQL 连接并解决常见错误\n\n### 步骤一：配置连接与测试\n\n在“身份验证类型”下拉菜单中选择“SQL\
  \ 身份验证”，然后分别在“用户名”和“密码”文本框中输入你的 Azure SQL 数据库用户名和密码。\n\n现在可以测试连接了。单击“测试连接”链接以测试连接性。连接测试应该会失败，如图\
  \ 9-33 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig33_HTML.jpg](img/497846_1_En_9_Fig33_HTML.jpg)\n\
  **图 9-33** 连接测试失败\n\n在此示例中包含此错误的原因是它非常常见。要解决此错误，请在新浏览器选项卡中打开 Azure 门户，将鼠标悬停在 Azure\
  \ 左侧菜单中的“SQL 数据库”上，以提示显示 SQL 数据库的“悬停卡片”，如图 9-34 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig34_HTML.jpg](img/497846_1_En_9_Fig34_HTML.jpg)\n\
  **图 9-34** 查看 SQL 数据库\n\n单击最近预配的 `SSISConfig` 数据库以打开 `SSISConfig` 页面，如图 9-35 所示。\n\
  \n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig35_HTML.jpg](img/497846_1_En_9_Fig35_HTML.jpg)\n\
  **图 9-35** `SSISConfig` Azure SQL 数据库界面\n\n在“概览”页面上，单击服务器名称链接（本例中为“svssis.database.windows.net”）——如图\
  \ 9-35 所示——以打开服务器界面，如图 9-36 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig36_HTML.jpg](img/497846_1_En_9_Fig36_HTML.jpg)\n\
  **图 9-36** 托管 `SSISConfig` Azure SQL 数据库的服务器\n\n当服务器概览页面显示时，单击“显示防火墙设置”链接以打开“防火墙和虚拟网络”页面。将“允许\
  \ Azure 服务和资源访问此服务器”更改为“是”，如图 9-37 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig37_HTML.jpg](img/497846_1_En_9_Fig37_HTML.jpg)\n\
  **图 9-37** 更新“允许 Azure 服务和资源访问此服务器”\n\n单击图 9-37 中所示的“保存”按钮，将“允许 Azure 服务和资源访问此服务器”的更新存储起来，然后返回到\
  \ Azure Data Factory 中的“新建链接服务”配置。确保完成链接服务配置（在下图中，“用户名”属性值已被编辑隐藏）。单击“测试连接”以重新测试到\
  \ `SSISConfig` 数据库的连接，结果应与图 9-38 类似。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig38_HTML.jpg](img/497846_1_En_9_Fig38_HTML.jpg)\n\
  **图 9-38** 连接测试成功\n\n### 步骤二：配置查找活动\n\n前面的部分不仅作为 FOA（灵活的编写顺序）的示例，还提供了一个非常常见的 Azure\
  \ 安全障碍的解决方案。\n\n继续配置“获取应用程序包”查找活动的“设置”选项卡，将“使用查询”属性更改为“查询”。使用清单 9-6 中所示的 T-SQL 语句初始化“查询”属性。\n\
  \n```sql\nSelect a.ApplicationName\n, p.PackageLocation + p.PackageName As PackagePath\n\
  , ap.ExecutionOrder\n, ap.FailApplicationOnPackageFailure\nFrom [config].[ApplicationPackages]\
  \ ap\nJoin [config].[Applications] a\nOn a.ApplicationId = ap.ApplicationId\nJoin\
  \ [config].Packages p\nOn p.PackageId = ap.PackageId\nWhere a.ApplicationName =\
  \ N'Framework Test'\nAnd ap.ApplicationPackageEnabled = 1\nOrder By ap.ExecutionOrder\n\
  ```\n**清单 9-6** 用于选择“Framework Test” SSIS 应用程序包的 T-SQL\n\n出于本示例的目的，将“查询超时（分钟）”和“隔离级别”属性保留为其默认值。确保“仅第一行”复选框未被选中，如图\
  \ 9-39 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig39_HTML.jpg](img/497846_1_En_9_Fig39_HTML.jpg)\n\
  **图 9-39** 完成“获取应用程序包”查找活动设置\n\n### 步骤三：测试与查看结果\n\n现在可以通过单击工具栏中的“调试”项来测试“获取应用程序包”查找活动，如图\
  \ 9-40 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig40_HTML.jpg](img/497846_1_En_9_Fig40_HTML.jpg)\n\
  **图 9-40** 调试执行（红色圆圈）后查看输出（蓝色框）\n\n调试执行完成后，单击“获取应用程序包”查找活动“输出”选项卡上显示的输出查看器（图 9-40\
  \ 中的“蓝色框”），以查看 Lookup 活动返回的 JSON，如图 9-41 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig41_HTML.jpg](img/497846_1_En_9_Fig41_HTML.jpg)\n\
  **图 9-41** “获取应用程序包”查找活动返回的 JSON\n\n现在我们有了 SSIS 包列表，下一步就是执行列表中包含的 SSIS 包。\n\n\n\
  ### 执行检索到的 SSIS 包\n\n在简单自定义 SSIS 框架的 SSIS 版本中，使用 `Foreach` 循环容器枚举 SSIS 包集合。在 Azure\
  \ Data Factory 中，`ForEach` 活动执行相同的功能。\n\n#### 添加并配置 ForEach 活动\n\n展开名为“Iteration\
  \ & conditionals”的“活动”类别，并将一个 `ForEach` 活动拖到管道画布上。从“`Get Application Packages`”查找活动向\
  \ `ForEach` 活动连接一条“成功”管道，然后将该 `ForEach` 活动重命名为“`ForEach Application Package`”，如图\
  \ 9-42 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig42_HTML.jpg](img/497846_1_En_9_Fig42_HTML.jpg)\n\
  \n图 9-42 添加 `ForEach` 活动\n\n在“设置”选项卡中，单击“项”属性文本框内部。此时会在“项”文本框下方显示“`Add dynamic content\
  \ [Alt + P]`”链接，如图 9-43 所示。\n\n![../images/497846_1_En_9_Chapter/497846_1_En_9_Fig43_HTML.jpg](img/497846_1_En_9_Fig43_HTML.jpg)\n\
