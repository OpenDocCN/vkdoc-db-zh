  \ Name`下拉菜单中，选择“<New variable…>”，如图 6-22 所示。\n\n![../images/497846_1_En_6_Chapter/497846_1_En_6_Fig22_HTML.jpg](img/497846_1_En_6_Fig22_HTML.jpg)\n\
