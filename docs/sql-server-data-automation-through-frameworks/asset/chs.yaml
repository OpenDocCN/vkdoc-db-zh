  **图 9-62**\n查看 `ReportAndFail.dtsx` 测试运行的 event_messages 日志文件\n\n### 本章小结\n\n本章涵盖了以下内容：\n\
  \n*   配置 Azure SQL 数据库实例\n    *   将 `SSISConfig` 数据库部署到 Azure SQL DB 实例\n\n*   配置\
  \ Azure 文件共享\n    *   将测试用的 SSIS 包部署（复制）到 Azure 文件共享\n\n*   构建 SSIS 框架执行引擎\n   \
  \ *   测试运行父管道并查看运行日志\n\n下一步是将应用程序和应用程序包的操作数据持久化存储在 `SSISConfig` 数据库中。\n\n## 10.\
  \ ADF 中的框架日志记录\n\n第 5–7 章介绍了如何使用名为 `SSISConfig` 的 SQL Server 数据库和一个 SSIS 包（`Parent.dtsx`\
  \ SSIS 包）作为执行引擎，来设计和构建一个用于执行存储在本地服务器文件系统中的 SSIS 包的 SSIS 框架。第 8 章介绍了如何配置 Azure Data\
  \ Factory (ADF) 实例、Azure 存储账户以及一个配置为执行存储在 Azure 文件共享中的 SSIS 包的 `Azure-SSIS` 集成运行时。第\
  \ 9 章介绍了如何配置 Azure SQL 数据库、将 `SSISConfig` 数据库部署到 Azure SQL DB、配置 Azure 文件共享 (`fs-ssis`)，然后在\
  \ ADF 中构建执行引擎（父管道）。\n\n在本章中，我们将为父 ADF 管道添加日志记录功能，这非常类似于我们在第 7 章中为本地版 SSIS 框架添加的功能。日志架构及相关构件已经部署，但我们将对与日志记录相关的表进行一些调整和修改。\n\
  \n尽管执行的操作相似，但 Azure Data Factory 管道与 SSIS 包是*不同*的。这些差异将推动 SSIS 框架设计的变更。\n\n## 添加\
  \ ApplicationName 参数\n\n父管道将执行 SSIS 框架应用程序。为了使 ADF 管道具有通用性，能够执行存储在 `SSISConfig`\
  \ 数据库元数据中的*任何*应用程序，该管道需要一个 `ApplicationName` 参数。\n\n打开父管道，点击管道的空白区域，然后点击“参数”选项卡。当“参数”选项卡显示时，点击图\
  \ 10-1 中高亮的“+ 新建”链接。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig1_HTML.jpg](img/497846_1_En_10_Fig1_HTML.jpg)\n\
  **图 10-1**\n开始添加新参数\n\n当参数配置界面显示时，设置以下参数属性，如图 10-2 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig2_HTML.jpg](img/497846_1_En_10_Fig2_HTML.jpg)\n\
  **图 10-2**\n配置 `ApplicationName` 父管道参数\n\n*   名称：`ApplicationName`\n*   类型：`String`\n\
  *   默认值：`Framework Test`\n\n现在，父 ADF 管道中的活动可以访问 `ApplicationName` 参数了。\n\n\n\n##\
  \ SSIS 框架应用程序与包快速回顾\n\n一个 SSIS 框架应用程序是多个 SSIS 包的集合，这些包按照预定顺序执行（一个 SSIS 应用程序可配置为执行一个或多个\
  \ SSIS 包）。SSIS 应用程序的元数据存储在 `config.Applications` 表中，而 SSIS 包位置的元数据则存储在 `config.Packages`\
  \ 表中。由于 SSIS 应用程序和 SSIS 包之间的基数关系是多对多的（一个 SSIS 包可配置为在一个或多个 SSIS 应用程序中运行），因此存在 `config.ApplicationPackages`\
  \ 表来解析应用程序和包之间的关系。\n\n## 添加应用程序实例日志记录\n\n在本章的引言中，我提到 ADF 和 SSIS 在实现类似功能的方式上存在差异，这些差异将推动\
  \ Azure Data Factory 中 SSIS 框架设计的变化。在配置应用程序实例日志记录时，我们遇到了第一个差异。\n\nSSIS 框架在 `log.ApplicationInstance`\
  \ 表中收集有关应用程序执行实例的操作数据。有关应用程序包执行实例的操作数据存储在 `log.ApplicationPackageInstance` 表中。\n\
  \n### 修改 log.ApplicationInstance 表\n\n一个 Azure Data Factory (ADF) 管道由许多组成对象和构件构成，包括\
  \ ADF 活动。当 ADF 活动执行时，会生成一个 *RunId* 值用于操作日志记录。当 Azure Data Factory 管道执行时，会生成一个 RunId\
  \ 值，并用于将内部 ADF 管道日志与管道活动日志关联起来。\n\n通过执行清单 10-1 中的 T-SQL 来修改 `log.ApplicationInstance`\
  \ 表。\n\n```sql\nprint 'Log.ApplicationInstance.ApplicationRunId column'\nIf Not\
  \ Exists(Select s.[name]\n+ '.' + t.[name]\n+ '.' + c.[name]\nFrom [sys].[schemas]\
  \ s\nJoin [sys].[tables] t\nOn t.[schema_id] = s.[schema_id]\nJoin [sys].[columns]\
  \ c\nOn c.[object_id] = t.[object_id]\nWhere s.[name] = N'log'\nAnd t.[name] = N'ApplicationInstance'\n\
  And c.[name] = N'ApplicationRunId')\nbegin\nprint ' - Adding log.ApplicationInstance.ApplicationRunId\
  \ column'\nAlter Table log.ApplicationInstance\nAdd ApplicationRunId nvarchar(55)\
  \ NULL\nprint ' - Log.ApplicationInstance.ApplicationRunId column added'\nend\n\
  Else\nbegin\nprint ' - Log.ApplicationInstance.ApplicationRunId column already exists.'\n\
  end\n```\n清单 10-1\n向 ApplicationInstance 表添加 ApplicationRunId 列\n\n接下来，我们将用于添加应用程序实例行的\
  \ T-SQL 封装到一个存储过程中。\n\n### 添加 log.InsertApplicationInstance 存储过程\n\n在 SSIS 执行引擎（即\
  \ `Parent.dtsx` SSIS 包）中，使用了执行 SQL 任务将初始的 `ApplicationInstance` 记录插入 `log.ApplicationInstance`\
  \ 表并返回一个 `ApplicationInstanceId` 值。在 Azure Data Factory 执行引擎（即父管道）中，将使用一个 Lookup\
  \ 活动来调用一个存储过程，该存储过程插入记录并返回一个 `ApplicationInstanceId` 值。该 `ApplicationInstanceId`\
  \ 值将在管道后续步骤中用于更新 `ApplicationInstance` 记录。\n\n在 Azure Data Studio（或 SSMS）中，连接到名为\
  \ `SSISConfig` 的 Azure SQL 数据库。从第 7 章的清单 7-4 中的 T-SQL 代码开始，以幂等（可重复执行）的方式执行 T-SQL\
  \ 来创建一个名为 `log.InsertApplicationInstance` 的新存储过程，如清单 10-2 所示。\n\n```sql\nprint 'log.InsertApplicationInstance\
  \ stored procedure'\nIf Exists(Select s.[name] + '.' + p.[name]\nFrom [sys].[procedures]\
  \ p\nJoin [sys].[schemas] s\nOn s.[schema_id] = p.[schema_id]\nWhere s.[name] =\
  \ N'log'\nAnd p.[name] = N'InsertApplicationInstance')\nbegin\nprint ' - Dropping\
  \ log.InsertApplicationInstance stored procedure'\nDrop Procedure log.InsertApplicationInstance\n\
  print ' - Log.InsertApplicationInstance stored procedure dropped'\nend\nprint '\
  \ - Creating log.InsertApplicationInstance stored procedure'\ngo\nCreate Procedure\
  \ log.InsertApplicationInstance\n@ApplicationName nvarchar(255)\n, @ApplicationRunId\
  \ nvarchar(55) = NULL\nAs\ndeclare @ApplicationId int = (Select ApplicationId\n\
  From config.Applications\nWhere ApplicationName = @ApplicationName)\nInsert Into\
  \ [log].ApplicationInstance (ApplicationId, ApplicationRunId)\nOutput inserted.ApplicationInstanceId\n\
  Values (@ApplicationId, @ApplicationRunId)\ngo\nprint ' - Log.InsertApplicationInstance\
  \ stored procedure created'\ngo\n```\n清单 10-2\n用于创建 `log.InsertApplicationInstance`\
  \ 存储过程的幂等 T-SQL\n\n`log.InsertApplicationInstance` 存储过程需要将 SSIS 框架应用程序的名称发送到 `@ApplicationName`\
  \ 字符串（`nvarchar(255)`）参数。一个名为 `@ApplicationId` 的内部 T-SQL `int` 参数，会在 `config.Applications`\
  \ 表中查找给定的 `@ApplicationName` 值所对应的 `ApplicationId` 值。\n\n`log.InsertApplicationInstance`\
  \ 存储过程还接受一个名为 `@ApplicationRunId` 的参数，该参数在未提供值时默认为 `NULL`。`@ApplicationRunId` 用于存储\
  \ Azure Data Factory 管道的 `RunId` 值。在 SSIS 框架中存储 `RunId` 使得企业 DevOps 团队能够将 SSIS 框架中的操作日志数据与\
  \ ADF 日志中捕获的操作数据关联起来，这在 ADF 管道执行过程中发生意外情况时非常有用。\n\nT-SQL `Insert` 语句通过将新的 `@ApplicationId`\
  \ 和 `@ApplicationRunId` 值插入到 `log.ApplicationInstance` 表中来初始化 `ApplicationInstance`\
  \ 记录。在 `log.ApplicationInstance` 表上配置的默认值会在该行中插入以下值：\n\n*   `ApplicationStartTime`\
  \ 由 `DF_log_ApplicationInstance_ApplicationStartTime` 设置为 `sysdatetimeoffset()`。\n\
  *   `ApplicationStatus` 由 `DF_log_ApplicationInstance_ApplicationStatus` 设置为 `N'Running'`。\n\
  \n如果一切按计划进行，Azure Data Studio 应返回如图 10-3 所示的消息。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig3_HTML.jpg](img/497846_1_En_10_Fig3_HTML.jpg)\n\
  图 10-3\n创建 `log.InsertApplicationInstance` 存储过程后返回的消息\n\n创建 `log.InsertApplicationInstance`\
  \ 存储过程后，下一步是在管道中添加一个活动来执行该存储过程。\n\n\n### 记录应用程序实例\n\nADF 执行引擎需要执行一个名为 `log.InsertApplicationInstance`\
  \ 的存储过程，该过程会返回一个名为 `ApplicationInstanceId` 的值。为此，我们创建了一个 Lookup 活动！\n\n返回父级 ADF\
  \ 管道。将新的 Lookup 活动拖拽到设计界面。将新 Lookup 活动的成功输出连接到“获取应用程序包”查找活动。将此新的 Lookup 活动重命名为“记录应用程序实例开始”，如图\
  \ 10-4 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig4_HTML.jpg](img/497846_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4 添加“记录应用程序实例开始”查找活动\n\n点击“记录应用程序实例开始”查找活动的 `Settings` 选项卡以继续配置。点击 `Source\
  \ dataset` 属性下拉菜单，选择 `ssisFrameworkDataSet`，如图 10-5 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig5_HTML.jpg](img/497846_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5 为“记录应用程序实例开始”查找活动的 `Source dataset` 属性选择 `ssisFrameworkDataSet`\n\n接下来，将“记录应用程序实例开始”查找活动的\
  \ `Use query` 属性选项设置为 `Stored procedure`。从 `Name` 属性下拉菜单中选择 `log.InsertApplicationInstance`，如图\
  \ 10-6 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig6_HTML.jpg](img/497846_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6 选择 `log.InsertApplicationInstance` 存储过程\n\n接下来，点击 `Import parameter` 按钮，从\
  \ `log.InsertApplicationInstance` 存储过程导入 `@ApplicationName` 和 `@ApplicationRunId`\
  \ 字符串参数。点击 `@ApplicationName` 参数的 `Value` 属性文本框内部，然后点击 `Add dynamic content [Alt\
  \ + P]` 链接，如图 10-7 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig7_HTML.jpg](img/497846_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7 准备向参数值属性添加动态内容\n\n当 `Add dynamic content` 面板显示时，展开 `Parameters` 表达式类别，点击\
  \ `ApplicationName`，将参数值 ADF 表达式设置为 `@pipeline.parameters.ApplicationName`，如图 10-8\
  \ 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig8_HTML.jpg](img/497846_1_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8 设置 ApplicationName 参数值表达式\n\n点击 `Finish` 按钮继续。\n\n点击 `@ApplicationRunId`\
  \ 参数的 `Value` 属性文本框内部，然后点击 `Add dynamic content [Alt + P]` 链接。当 `Add dynamic content`\
  \ 面板显示时，展开 `System variables` 表达式类别，点击 `Pipeline run ID`，将参数值 ADF 表达式设置为 `@pipeline().RunId`，如图\
  \ 10-9 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig9_HTML.jpg](img/497846_1_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9 设置 ApplicationRunId 参数值表达式\n\n保持 `Query timeout (minutes)` 属性为其默认值（120\
  \ 分钟），`Isolation level` 属性为 `None`（默认值），并保持 `First row only` 属性为选中状态（默认值），如图 10-10\
  \ 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig10_HTML.jpg](img/497846_1_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10 保留 `Query timeout`、`Isolation level` 和 `First row only` 属性的默认值\n\n至此，“记录应用程序实例开始”查找活动已配置为调用\
  \ `log.InsertApplicationInstance` 存储过程，向该存储过程传递管道的 `ApplicationName` 和 `ApplicationRunId`\
  \ 参数值，并返回 `ApplicationInstanceId` 值。\n\n### 添加 log.UpdateApplicationInstanceStatus\
  \ 存储过程\n\n按当前配置，父管道会执行失败，因为 `ReportAndFail.dtsx` SSIS 包（按设计）会失败。应更新 `log.ApplicationInstance`\
  \ 行以反映 SSIS 框架应用程序实例失败。\n\n首先，向 SSISConfig 数据库添加一个名为 `log.UpdateApplicationInstanceStatus`\
  \ 的新存储过程，如清单 10-3 所示。\n\n```\nprint 'log.UpdateApplicationInstanceStatus stored\
  \ procedure'\nIf Exists(Select s.[name] + '.' + p.[name]\nFrom [sys].[procedures]\
  \ p\nJoin [sys].[schemas] s\nOn s.[schema_id] = p.[schema_id]\nWhere s.[name] =\
  \ N'log'\nAnd p.[name] = N'UpdateApplicationInstanceStatus')\nbegin\nprint ' - Dropping\
  \ log.UpdateApplicationInstanceStatus stored procedure'\nDrop Procedure log.UpdateApplicationInstanceStatus\n\
  print ' - Log.UpdateApplicationInstanceStatus stored procedure dropped'\nend\nprint\
  \ ' - Creating log.UpdateApplicationInstanceStatus stored procedure'\ngo\nCreate\
  \ Procedure log.UpdateApplicationInstanceStatus\n@ApplicationInstanceId int\n, @ApplicationStatus\
  \ nvarchar(55) = 'Succeeded'\nAs\nUpdate [log].ApplicationInstance\nSet ApplicationEndTime\
  \ = sysdatetimeoffset()\n, ApplicationStatus = @ApplicationStatus\nWhere ApplicationInstanceId\
  \ = @ApplicationInstanceId\ngo\nprint ' - Log.UpdateApplicationInstanceStatus stored\
  \ procedure created'\ngo\nListing 10-3\nIdempotent T-SQL to create the log.UpdateApplicationInstanceStatus\
  \ stored procedure\n```\n\n如果一切按计划进行，Azure Data Studio 消息应类似于图 10-11 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig11_HTML.jpg](img/497846_1_En_10_Fig11_HTML.jpg)\n\
  \n图 10-11 Azure Data Studio 消息反映成功创建了 `log.UpdateApplicationInstanceStatus` 存储过程\n\
  \n下一步是添加一个存储过程活动，用于在失败时调用 `log.UpdateApplicationInstanceStatus` 存储过程。\n\n\n### 更新应用程序实例\n\
  \nADF 执行引擎需要执行一个名为 `log.UpdateApplicationInstanceStatus` 的存储过程，该过程接受 `ApplicationInstanceId`\
  \ 和 `ApplicationStatus` 值，然后更新当前应用程序实例的状态。存储过程活动非常适合这个任务！\n\n返回到父级 ADF 管道。将一个存储过程活动拖放到画布上。从\
  \ `ForEach Application Package` 活动添加一个失败输出连接到新的存储过程活动。将新的存储过程活动重命名为“记录应用程序实例失败”，如图\
  \ 10-12 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig12_HTML.jpg](img/497846_1_En_10_Fig12_HTML.jpg)\n\
  \n*图 10-12: 添加“记录应用程序实例失败”存储过程活动*\n\n在“设置”选项卡上，从“链接服务”属性下拉菜单中选择 `ssisFrameworkLinkedService`，然后从“存储过程名称”下拉菜单中选择\
  \ `[log].[UpdateApplicationInstanceStatus]`，如图 10-13 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig13_HTML.jpg](img/497846_1_En_10_Fig13_HTML.jpg)\n\
  \n*图 10-13: 配置“链接服务”和“存储过程名称”属性*\n\n单击“导入参数”按钮以从 `log.UpdateApplicationInstanceStatus`\
  \ 存储过程导入参数。单击 `ApplicationInstanceId` 参数的值文本框内，然后单击“添加动态内容 [Alt + P]”链接，如图 10-14\
  \ 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig14_HTML.jpg](img/497846_1_En_10_Fig14_HTML.jpg)\n\
  \n*图 10-14: 准备为 ApplicationInstanceId 参数输入动态内容*\n\n当“添加动态内容”面板显示时，展开“活动输出”表达式类别，并单击“记录应用程序实例启动”。动态内容文本框将显示\
  \ `@activity('Log Application Instance Start').output`。在该表达式后追加 `.firstrow.ApplicationInstanceId`，以将“记录应用程序实例启动”查找活动执行返回的\
  \ `ApplicationInstanceId` 值映射到 `ApplicationInstanceId` 参数的值属性中，如图 10-15 所示。\n\n\
  ![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig15_HTML.jpg](img/497846_1_En_10_Fig15_HTML.jpg)\n\
  \n*图 10-15: 将“记录应用程序实例启动”查找活动映射到 ApplicationInstanceId 参数的值属性*\n\n单击“完成”按钮继续。\n\n\
  在 `ApplicationStatus` 参数的值属性中键入“Failed”，如图 10-16 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig16_HTML.jpg](img/497846_1_En_10_Fig16_HTML.jpg)\n\
  \n*图 10-16: 将 ApplicationStatus 属性设置为 Failed*\n\n至此，SSIS 框架执行引擎（父级管道）的 ADF 版本已配置为执行\
  \ SSIS 应用程序并记录失败的应用程序实例。\n\n下一步是测试执行该管道。\n\n### 让我们测试一下！\n\n单击父级管道工具栏上的“调试”项。“输出”选项卡会显示，片刻之后，会显示已执行的父级管道活动，如图\
  \ 10-17 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig17_HTML.jpg](img/497846_1_En_10_Fig17_HTML.jpg)\n\
  \n*图 10-17: 父级管道测试执行的结果*\n\n执行清单 10-4 中所示的 T-SQL 查询以检查应用程序实例结果。\n\n```sql\nSelect\
  \ a.ApplicationName\n, ai.ApplicationStartTime\n, ai.ApplicationStatus\nFrom log.ApplicationInstance\
  \ ai\nJoin config.Applications a\nOn a.ApplicationId = ai.ApplicationId\nOrder By\
  \ ApplicationInstanceId Desc\n```\n\n*清单 10-4: 应用程序实例结果*\n\n结果应类似于图 10-18。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig18_HTML.jpg](img/497846_1_En_10_Fig18_HTML.jpg)\n\
  \n*图 10-18: 应用程序实例结果*\n\n虽然结果符合预期，但缺少了点东西：没有一个在成功时更新应用程序实例的存储过程活动。\n\n### 成功时更新应用程序实例\n\
  \n父级管道需要一种方式来记录应用程序实例的成功。首先单击“记录应用程序实例失败”存储过程活动上的“克隆”图标，如图 10-19 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig19_HTML.jpg](img/497846_1_En_10_Fig19_HTML.jpg)\n\
  \n*图 10-19: 准备从“记录应用程序实例失败”存储过程活动克隆“记录应用程序实例成功”存储过程活动*\n\n克隆“记录应用程序实例失败”存储过程活动是合理的，因为新的存储过程活动将调用*同一个*存储过程——`log.UpdateApplicationInstanceStatus`——并且*只有*一个参数值配置需要更改。\n\
  \n将“ForEach Application Package” ForEach 活动的一个成功输出连接到克隆的存储过程活动，然后将克隆的存储过程活动重命名为“记录应用程序实例成功”，如图\
  \ 10-20 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig20_HTML.jpg](img/497846_1_En_10_Fig20_HTML.jpg)\n\
  \n*图 10-20: 添加“记录应用程序实例成功”存储过程活动*\n\n接下来，单击“记录应用程序实例成功”存储过程活动的“设置”选项卡。在“设置”选项卡上唯一需要的更改是\
  \ `ApplicationStatus` 参数值属性的值，需要将其从“Failed”更新为“Succeeded”，如图 10-21 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig21_HTML.jpg](img/497846_1_En_10_Fig21_HTML.jpg)\n\
  \n*图 10-21: 更新 ApplicationStatus 参数值*\n\n新的测试执行确认父级管道按预期记录了 SSIS 框架应用程序故障。Azure\
  \ Data Factory 版本的 SSIS 框架需要在应用程序包范围内进行类似的实例记录。\n\n下一步是实现应用程序包实例记录。\n\n在继续之前，我们需要对父级管道进行两处更改：\n\
  \n*   将 `ApplicationPackageId` 字段添加到“获取应用程序包”查找活动的查询中。\n*   添加 `ApplicationInstanceId`\
  \ 变量（并将 `ApplicationInstanceId` 值存储到 `ApplicationInstanceId` 变量中）。\n\n### 添加 ApplicationPackageId\
  \ 字段\n\n要将 `ApplicationPackageId` 字段添加到从 SSISConfig 数据库返回的元数据数据集中，请选择“获取应用程序包”查找活动，然后单击“设置”选项卡。使用清单\
  \ 10-5 中的 T-SQL 修改查询属性。\n\n```sql\nSelect a.ApplicationName\n, p.PackageLocation\
  \ + p.PackageName As PackagePath\n, ap.ExecutionOrder\n, ap.FailApplicationOnPackageFailure\n\
  , ap.ApplicationPackageId\nFrom [config].[ApplicationPackages] ap\nJoin [config].[Applications]\
  \ a\nOn a.ApplicationId = ap.ApplicationId\nJoin [config].Packages p\nOn p.PackageId\
  \ = ap.PackageId\nWhere a.ApplicationName = N'Framework Test'\nAnd ap.ApplicationPackageEnabled\
  \ = 1\nOrder By ap.ExecutionOrder\n```\n\n*清单 10-5: 用于检索应用程序包元数据的已修改查询*\n\n修改 T-SQL\
  \ 后，下一步是添加一个变量来保存 `ApplicationInstanceId` 管道变量。\n\n\n\n### 添加 ApplicationInstanceId\
  \ 管道变量\n\n要添加 ApplicationInstanceId 管道变量，请点击管道，然后选择 **“变量”** 选项卡。点击“+ 新建”按钮，并将新变量命名为\
  \ `ApplicationInstanceId`，如图 10-22 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig22_HTML.jpg](img/497846_1_En_10_Fig22_HTML.jpg)\n\
  \n*图 10-22：添加 ApplicationInstanceId 管道变量*\n\n“为什么 `ApplicationInstanceId` 变量——一个整数——被声明为字符串变量？”这是一个合理的问题。在撰写本文时，其他变量类型选项是布尔值和数组。`ApplicationInstanceId`\
  \ 既不是布尔值，也不是数组。\n\n### 配置设置变量活动\n\n下一步是添加一个 **设置变量** 活动，将 `ApplicationInstanceId`\
  \ 管道参数的值设置为从 **“记录应用程序实例启动”** 查找活动返回的 `ApplicationInstanceId` 值。首先，选择“记录应用程序实例启动”查找活动的\
  \ **成功** 输出，右键点击 **成功** 输出，然后点击 **删除**，如图 10-23 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig23_HTML.jpg](img/497846_1_En_10_Fig23_HTML.jpg)\n\
  \n*图 10-23：从“记录应用程序实例启动”查找活动中删除成功输出*\n\n要为“记录应用程序实例启动”查找活动添加一个新的 **成功** 输出，请点击 **“添加输出”**\
  \ 图标，然后点击 **“成功”**，如图 10-24 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig24_HTML.jpg](img/497846_1_En_10_Fig24_HTML.jpg)\n\
  \n*图 10-24：向“记录应用程序实例启动”查找活动添加新的成功输出*\n\n将一个 **设置变量** 活动拖到管道画布上，并将其重命名为 `Set ApplicationInstanceId`。点击\
  \ **变量** 选项卡，从 **名称** 属性下拉菜单中选择 `ApplicationInstanceId`。点击 **值** 属性文本框内部，然后点击 **“添加动态内容\
  \ [Alt + P]”** 链接以打开 **设置动态内容** 刃窗。滚动到 **活动输出** 类别，点击 **“记录应用程序实例启动”** 将 `@activity('Log\
  \ Application Instance Start').output` 添加到表达式文本框中。将 `@activity(` 编辑为 `@string(activity(`。在表达式末尾追加\
  \ `.firstrow.ApplicationInstanceId)`，以分配从“记录应用程序实例启动”查找活动输出中第一行返回的 `ApplicationInstanceId`\
  \ 值，如图 10-25 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig25_HTML.jpg](img/497846_1_En_10_Fig25_HTML.jpg)\n\
  \n*图 10-25：配置“Set ApplicationInstanceId”设置变量活动*\n\n将 `Set ApplicationInstanceId`\
  \ 设置变量活动的 **成功** 输出连接到 **“获取应用程序包”** 查找活动。\n\n现在，`Set ApplicationInstanceId` 设置变量活动已配置为读取从“记录应用程序实例启动”查找活动返回的\
  \ `ApplicationInstanceId` 值，并将该值存储在 `ApplicationInstanceId` 管道变量中。\n\n### 更新存储过程活动\n\
  \n最后，更新 **“记录应用程序实例成功”** 和 **“记录应用程序实例失败”** 存储过程活动，以使用 `@int(variables('ApplicationInstanceId'))`\
  \ 作为 `ApplicationInstanceId` 存储过程参数，而不是使用“记录应用程序实例启动”查找活动的输出，如图 10-26 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig26_HTML.jpg](img/497846_1_En_10_Fig26_HTML.jpg)\n\
  \n*图 10-26：使用 @variables('ApplicationInstanceId')*\n\n如前所述，`ApplicationInstanceId`\
  \ 管道变量是一个字符串。在撰写本文时，在此处和其他地方，该值将被隐式转换为整数。也就是说，在编码时请*有意为之*。这里的“有意为之”指的是显式转换为整数值。\n\
  \n下一步是添加一个子管道来执行应用程序包。\n\n\n## 添加子管道\n\n如前所述，SSIS 框架的本地版本与 Azure Data Factory 版本之间的差异导致了设计上的不同。重新设计的第一步是将应用程序包执行从父管道迁移到一个“子”管道。\n\
  \n首先，创建一个名为 `child` 的新 ADF 管道，如图 10-27 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig27_HTML.jpg](img/497846_1_En_10_Fig27_HTML.jpg)\n\
  *图 10-27 添加子管道*\n\n在父管道中，“Execute Application Package” 执行 SSIS 活动可以直接访问所需的属性（这些属性从\
  \ SSISConfig 元数据填充），以动态执行与 SSIS 应用程序相关的应用程序包。子管道将使用参数来访问相同的元数据。在子管道的“参数”选项卡上，创建以下管道参数/类型/默认值组合：\n\
  \n*   `PackagePath` / String / [空字符串]\n*   `ApplicationPackageId` / Int / 0\n* \
  \  `ApplicationInstanceId` / Int / 0\n*   `FailApplicationOnPackageFailure` / Bool\
  \ / true\n*   `ParentRunId` / String / [空字符串]\n\n配置完成后，子管道参数应类似于图 10-28。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig28_HTML.jpg](img/497846_1_En_10_Fig28_HTML.jpg)\n\
  *图 10-28 已配置的子管道参数*\n\n将一个“Execute SSIS Package”活动拖到子管道画布上，并将新活动重命名为“Execute Application\
  \ Package”，如图 10-29 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig29_HTML.jpg](img/497846_1_En_10_Fig29_HTML.jpg)\n\
  *图 10-29 添加“Execute Application Package”执行 SSIS 活动*\n\n在“设置”选项卡上配置“Execute Application\
  \ Package”执行 SSIS 活动的属性，如下所示：\n\n*   Azure-SSIS IR: `Azure-SSIS-Files`\n*   Windows\
  \ 身份验证: [未选中]\n*   32 位运行时: [未选中]\n*   包位置: 文件系统（包）\n*   包路径: `@pipeline().parameters.PackagePath`\n\
  \    *   添加动态内容 [Alt + P]，然后选择 参数 ➤ `PackagePath`。\n*   配置路径: [空]\n*   域: `Azure`\n\
  *   用户名: `stframeworks`\n    *   包含 SSIS 包的 Azure 文件共享的名称\n*   密码: [你的文件共享主密钥]\n\
