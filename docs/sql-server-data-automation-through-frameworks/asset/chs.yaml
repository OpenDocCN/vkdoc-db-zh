  ### 执行日常流程


  既然环境已搭建完毕且流程也已创建，现在让我们转向执行环节。运维人员需要设置或安排这些流程的运行，并监控是否有错误状况产生，或者如果使用的调度工具支持此功能，则需设置好执行的先后顺序规则。从基本意义上讲，我们现在已拥有一个可供投产的**日常流程**。清单
