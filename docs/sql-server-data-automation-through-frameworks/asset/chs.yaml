  \ 6-61 展示了 `ChildPackage` 文件连接管理器的 `ConnectionString` 属性，该属性现在是动态的，并由 `User::PackagePath`\
  \ SSIS 变量的值驱动。请记住，`User::PackagePath` SSIS 变量的值是在 `FOREACH Application Package`\
  \ forEach 循环容器中管理的，在该容器中，`User::PackagePath` SSIS 变量由从存储在 `SSISConfig` 数据库中的元数据查询返回的\
  \ ADO.Net 数据集中的每个 `PackagePath` 值填充。因此，一旦配置完成（点击“确定”按钮后），`Parent.dtsx` 将会执行与 SSIS\
  \ 应用程序关联的每一个（已启用的）SSIS 框架应用程序包。\n\n点击“确定”按钮关闭“属性表达式编辑器”。展开 `ChildPackage` 文件连接管理器的“表达式”属性（集合），注意\
  \ `ConnectionString` 属性现在由 `User::PackagePath` SSIS 变量的值管理。同时请注意，`ChildPackage`\
