  *图 10-36 查看父管道的调试执行输出*\n\n更新后的 SSIS 框架执行引擎按设计工作，但要实现针对 `FailApplicationOnPackageFailure`\
  \ 的容错，还有更多工作要做，我们将在下一步（添加应用程序实例日志记录）之后进行管理。\n\n## 添加应用程序包实例日志记录\n\n应用程序实例日志记录发生在父管道中。应用程序实例日志记录的模式是：\n\
  \n1.  记录应用程序实例开始\n2.  执行一些操作\n3.  记录应用程序实例状态（成功或失败）\n\n应用程序实例日志记录是一个可靠的模式。应用程序包实例日志记录应遵循相同的模式。\n\
  \n\n### 修改 `log.ApplicationPackageInstance` 表\n\n如之前在 `log.ApplicationInstance`\
  \ 部分所述，当 ADF 活动执行时，会生成一个 `RunId` 值用于操作日志记录。与记录 Azure Data Factory 父管道执行时的父管道 Run\
  \ Id 类似，记录子管道的 `RunId` 是一个很好的做法。子 `RunId` 值可用于将内部 ADF 管道日志与管道活动日志关联起来。\n\n通过执行清单\
  \ 10-6 中的 T-SQL 来修改 `log.ApplicationPackageInstance` 表。\n\n```sql\nprint 'Log.ApplicationPackageInstance.ApplicationPackageRunId\
  \ column'\nIf Not Exists(Select s.[name]\n+ '.' + t.[name]\n+ '.' + c.[name]\nFrom\
  \ [sys].[schemas] s\nJoin [sys].[tables] t\nOn t.[schema_id] = s.[schema_id]\nJoin\
  \ [sys].[columns] c\nOn c.[object_id] = t.[object_id]\nWhere s.[name] = N'log'\n\
  And t.[name] = N'ApplicationPackageInstance'\nAnd c.[name] = N'ApplicationPackageRunId')\n\
  begin\nprint ' - Adding log.ApplicationPackageInstance.ApplicationPackageRunId column'\n\
  Alter Table log.ApplicationPackageInstance\nAdd ApplicationPackageRunId nvarchar(55)\
  \ NULL\nprint ' - Log.ApplicationPackageInstance.ApplicationPackageRunId column\
  \ added'\nend\nElse\nbegin\nprint ' - Log.ApplicationPackageInstance.ApplicationPackageRunId\
  \ column already exists.'\nend\n```\n清单 10-6\n将 `ApplicationPackageRunId` 列添加到 `ApplicationPackageInstance`\
  \ 表\n\n接下来，让我们将用于添加应用程序包实例行的 T-SQL 封装到存储过程中。\n\n### 添加 `log.InsertApplicationPackageInstance`\
  \ 存储过程\n\n在 SSIS 执行引擎（`Parent.dtsx` SSIS 包）中，曾使用执行 SQL 任务将初始的 `ApplicationPackageInstance`\
  \ 记录插入 `log.ApplicationPackageInstance` 表并返回 `ApplicationPackageInstanceId` 值。在\
  \ Azure Data Factory 执行引擎（现在是父管道和子管道）中，将使用 Lookup 活动来调用一个存储过程，该存储过程插入记录并返回 `ApplicationPackageInstanceId`\
  \ 值。`ApplicationPackageInstanceId` 值将在管道后续用于更新 `ApplicationPackageInstance` 记录。\n\
  \n在 Azure Data Studio（或 SSMS）中，连接到名为 `SSISConfig` 的 Azure SQL 数据库。从第 7 章的清单 7-7\
  \ 中的 T-SQL 代码开始，编辑 T-SQL，以幂等（可重复执行）的方式创建名为 `log.InsertApplicationPackageInstance`\
  \ 的新存储过程，如清单 10-7 所示。\n\n```sql\nprint 'log.InsertApplicationPackageInstance stored\
  \ procedure'\nIf Exists(Select s.[name] + '.' + p.[name]\nFrom [sys].[procedures]\
  \ p\nJoin [sys].[schemas] s\nOn s.[schema_id] = p.[schema_id]\nWhere s.[name] =\
  \ N'log'\nAnd p.[name] = N'InsertApplicationPackageInstance')\nbegin\nprint ' -\
  \ Dropping log.InsertApplicationPackageInstance stored procedure'\nDrop Procedure\
  \ log.InsertApplicationPackageInstance\nprint ' - Log.InsertApplicationPackageInstance\
  \ stored procedure dropped'\nend\nprint ' - Creating log.InsertApplicationPackageInstance\
  \ stored procedure'\ngo\nCreate Procedure log.InsertApplicationPackageInstance\n\
  @ApplicationInstanceId int\n, @ApplicationPackageId int\n, @ApplicationPackageRunId\
  \ nvarchar(55) = NULL\nAs\nInsert Into [log].ApplicationPackageInstance\n( ApplicationInstanceId\n\
  , ApplicationPackageId\n, ApplicationPackageRunId)\nOutput inserted.ApplicationPackageInstanceId\n\
  Values\n( @ApplicationInstanceId\n, @ApplicationPackageId\n, @ApplicationPackageRunId)\n\
  go\nprint ' - Log.InsertApplicationPackageInstance stored procedure created'\ngo\n\
  ```\n清单 10-7\n用于幂等创建 `log.InsertApplicationPackageInstance` 存储过程的 T-SQL\n\n`log.InsertApplicationPackageInstance`\
  \ 存储过程需要将应用程序实例的应用程序实例 id 发送到 `@ApplicationInstanceId` int 参数，以便将应用程序实例与应用程序包实例关联起来。请记住，`ApplicationInstanceId`\
  \ 是一个子管道参数，由父管道发送给子管道。另一个由父管道传递的子管道参数是 `ApplicationPackageId`。我们将 `ApplicationPackageId`\
  \ 管道参数的值传递给 `log.InsertApplicationPackageInstance` 存储过程。\n\n`log.InsertApplicationPackageInstance`\
  \ 存储过程还接受一个名为 `@ApplicationPackageRunId` 的参数，当未提供值时，其默认为 `NULL`。`@ApplicationPackageRunId`\
  \ 用于存储 Azure Data Factory 子管道的 `RunId` 值。如前所述，在 SSIS 框架中存储 `RunId` 允许企业 DevOps 团队将\
  \ SSIS 框架中的操作日志数据与 ADF 日志中捕获的操作数据关联起来，这在 ADF 管道执行期间发生不幸情况时极为有用。\n\nT-SQL `Insert`\
  \ 语句通过将新的 `@ApplicationInstanceId`、`@ApplicationPackageId` 和 `@ApplicationPackageRunId`\
  \ 值插入 `log.ApplicationPackageInstance` 表来初始化 `ApplicationPackageInstance` 记录。配置在\
  \ `log.ApplicationPackageInstance` 表上的默认值会在行中插入以下值：\n\n*   `ApplicationPackageStartTime`\
  \ 由 `DF_log_ApplicationPackageInstance_ApplicationPackageStartTime` 设置为 `sysdatetimeoffset()`。\n\
  *   `ApplicationPackageStatus` 由 `DF_log_ApplicationPackageInstance_ApplicationPackageStatus`\
  \ 设置为 `N'Running'`。\n\n如果一切按计划进行，Azure Data Studio 应返回如图 10-37 所示的消息。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig37_HTML.jpg](img/497846_1_En_10_Fig37_HTML.jpg)\n\
  图 10-37\n创建 `log.InsertApplicationPackageInstance` 存储过程产生的消息\n\n创建 `log.InsertApplicationPackageInstance`\
  \ 存储过程后，下一步是向管道添加一个活动以执行该存储过程。\n\n\n\n### 记录应用程序包实例\n\nADF 执行引擎需要运行一个名为 `log.InsertApplicationPackageInstance`\
  \ 的存储过程，该过程将返回一个名为 `ApplicationPackageInstanceId` 的值。为此构建了一个查找活动！\n\n返回到子 ADF 管道。将一个新的查找活动拖到画布上，并将其重命名为“记录应用程序包实例开始”，如图\
  \ 10-38 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig38_HTML.jpg](img/497846_1_En_10_Fig38_HTML.jpg)\n\
  \n图 10-38\n\n添加“记录应用程序包实例开始”查找活动\n\n单击“记录应用程序实例开始”查找活动的“设置”选项卡以继续配置。单击“源数据集”属性下拉菜单，选择“ssisFrameworkDataSet”，然后将“记录应用程序包实例开始”查找活动的“使用查询”属性选项设置为“存储过程”。从“名称”属性下拉菜单中选择\
  \ `log.InsertApplicationPackageInstance`，如图 10-39 所示。\n\n![../images/497846_1_En_10_Chapter/497846_1_En_10_Fig39_HTML.jpg](img/497846_1_En_10_Fig39_HTML.jpg)\n\
  \n图 10-39\n\n选择 log.InsertApplicationPackageInstance 存储过程\n\n接下来，单击“导入参数”按钮，从 `log.InsertApplicationPackageInstance`\
  \ 存储过程导入 `@ApplicationInstanceId`、`@ApplicationPackageId` 和 `@ApplicationPackageRunId`（Int32\
