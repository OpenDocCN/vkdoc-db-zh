  \ 流程。\n\n重新启动 Azure-SSIS 集成运行时以继续操作。\n\n现在，已为从 Azure 文件共享执行配置了 Azure-SSIS IR，下一步是预配\
  \ Azure SQL 数据库。\n\n### 本章总结\n\n本章重点介绍了预配 Azure-SSIS 实例及其先决条件。本章逐步讲解了以下步骤：\n\n-\
