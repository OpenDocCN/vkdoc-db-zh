  trans: '

    ### 使用 Azure 门户


    Azure 门户提供了一种非常便捷的方式来监控 SQL 数据库的资源利用率。诸如 `CPU` 百分比、`DTU` 百分比等计数器都可以通过 Azure 门户进行监控。这些信息可用于确保数据库处于最佳运行状况。Azure
    门户中的监控选项卡（位于数据库详细信息下）可用于监控数据库的资源利用率（参见图 10-8）。此外，可以根据需要使用管理门户配置指标和时间段设置（参见图 10-9）。


    ![A371128_1_En_10_Fig9_HTML.jpg](img/A371128_1_En_10_Fig9_HTML.jpg)

    **图 10-9.** 配置监控指标


    ![A371128_1_En_10_Fig8_HTML.jpg](img/A371128_1_En_10_Fig8_HTML.jpg)

    **图 10-8.** 监控 SQL 数据库资源利用率


    监控图表可以进行编辑，以添加多个其他计数器，如图 10-9 所示。

    配置好指标后，即可在 Azure 门户上监控资源利用率，如图 10-10 所示。


    ![A371128_1_En_10_Fig10_HTML.jpg](img/A371128_1_En_10_Fig10_HTML.jpg)

    **图 10-10.** 在门户上监控指标


    Azure 门户还允许用户针对任何可用指标配置警报（参见图 10-11）。例如，你可以设置一个基于电子邮件的警报，以指示数据库是否超过性能级别最大允许大小的
    `80%`，或者 `DTU` 利用率百分比是否超过该服务层 `DTU` 的 `80%`。这些信息可用于判断是否需要更改数据库的性能级别。


    ![A371128_1_En_10_Fig11_HTML.jpg](img/A371128_1_En_10_Fig11_HTML.jpg)

    **图 10-11.** 为资源利用率指标配置警报


    警报可以配置所需的阈值，并可设置为向管理员或其他用户发送电子邮件。这些设置可以通过 **添加警报规则** 页面进行更改（参见图 10-12）。


    ![A371128_1_En_10_Fig12_HTML.jpg](img/A371128_1_En_10_Fig12_HTML.jpg)

    **图 10-12.** 配置警报属性


    ### 使用动态管理视图和目录视图


    针对数据库和逻辑服务器公开的 `DMV` 和目录视图可用于报告和/或监控 SQL 数据库及逻辑服务器的性能、资源利用率、数据库对象详细信息、查询执行信息等。


    对目录视图和 `DMV` 运行查询需要 `View Server State` 和 `View Database State` 权限。接下来提到的是一些最常用的
    `DMV`。


    #### 资源利用率


    资源利用率（包括逻辑服务器级别和数据库级别）的详细信息也可以使用 Azure SQL 数据库提供的目录视图获取。


    *   `sys.resource_stats`。提供逻辑服务器级别的资源利用率信息。该信息每五分钟收集一次，涵盖运行在该逻辑服务器上的所有数据库。

    *   `sys.dm_db_resource_stats`。提供数据库的资源利用率信息。该信息每 `15` 秒收集一次。

    *   `sys.event_log`。提供有关数据库连接、限流和死锁事件的信息。


    #### 数据库相关信息


    与资源相关的 `DMV` 和目录视图类似，Azure SQL 数据库也提供了许多 `DMV` 和目录视图来提供数据库相关信息，如空间使用情况、等待统计信息等。


    *   `sys.dm_db_file_space_usage`。提供数据库中空间使用情况的信息。

    *   `sys.dm_db_wait_stats`。提供数据库级别所有操作的等待统计信息。此 `DMV` 可用于诊断数据库性能问题和其他查询执行问题。

    *   `sys.dm_database_copies`。提供有关数据库异地复制副本的信息。像 `maximum_lag` 和 `replication_state_desc`
    这样的详细信息可用于确定复制的延迟和状态。


    #### 执行相关信息


    Microsoft SQL Server 中可用的大多数与执行相关的 `DMV` 在 Azure SQL 数据库中也可用，并可用于确定性能问题、执行相关问题等。以下是一些常用的
    `DMV`：


    *   `sys.dm_exec_requests`/`sys.dm_exec_sessions`/`sys.dm_exec_connections`。提供有关连接到（或正在其上执行活动请求）Azure
    SQL 数据库的会话的信息。

    *   `sys.dm_exec_query_stats`、`sys.dm_exec_function_stats`、`sys.dm_exec_procedure_stats`、`sys.dm_exec_trigger_stats`。分别提供查询、存储过程、函数和触发器的聚合执行统计信息。这些
    `DMV` 可用于确定在服务器上执行的耗时最长/CPU 消耗最高/读写最多的查询。当相应的查询或对象从缓存中移除时，这些 `DMV` 中的条目也会被移除。

    *   `sys.dm_exec_query_memory_grants`。提供有关数据库上运行的每个查询的内存授予（待处理或已授予）的信息。


    Azure SQL 数据库还提供了其他 `DMV` 来监控各种详细信息，如数据库索引、数据库或逻辑服务器的安全性等。所有 `DMV` 的完整列表可在 `MSDN`
    上找到。

    '
- fmt: '# Using Extended Events


    Extended Events or (XEvents) are not new. They have been available with Microsoft
    SQL Server since the SQL Server 2008 days. There has been a lot of optimization
    and improvements done to this feature over the last several years. The amount
    of information available through XEvents is enormous, which can be determined
    by the fact that the upcoming release of SQL Server, SQL Server 2016, has almost
    1,200 events exposed.


    Extended Events available on Azure SQL Database is only a subset of the feature
    available with SQL Server. These extended events are scoped to a single Azure
    SQL database, meaning that an extended event running against one Azure SQL database
    cannot be used to monitor events against another database on the same logical
    server.


    Listing [10-2](#A371128_1_En_10_Chapter.html#Par52) provides a sample script that
    can be used to determine the events/actions available with Extended Events on
    Azure SQL Database.


    ```sql

    SELECT

    o.object_type,

    p.name         AS [package_name],

    o.name         AS [db_object_name],

    o.description  AS [db_obj_description]

    FROM

    sys.dm_xe_objects  AS o

    INNER JOIN sys.dm_xe_packages AS p  ON p.guid = o.package_guid

    WHERE

    o.object_type in

    (

    ''event'',''action''

    )

    ORDER BY

    o.object_type,

    p.name,

    o.name;

    ```

    **Listing 10-2.** T-SQL Script to Determine the Events or Actions Available with
    Azure SQL Database


    The easiest way to configure Extended Events for Azure SQL Database is to use
    SQL Server Management Studio, as illustrated in Figure [10-13](#A371128_1_En_10_Chapter.html#Fig13).
    In SSMs, Extended Events can be accessed by expanding the database node.


    ![A371128_1_En_10_Fig13_HTML.jpg](A371128_1_En_10_Fig13_HTML.jpg)

    **Figure 10-13.** Accessing Extended Events


    A new session can be configured by right-clicking on the session node and choosing
    either `New Session Wizard` or `New Session`. Either of the options are fairly
    straightforward to use.


    Following is a sample T-SQL script to create an XEvent to monitor blocking and
    deadlock:


    ```sql

    CREATE EVENT SESSION [Sample_XEvents] ON DATABASE

    ADD EVENT sqlos.wait_info(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.blocked_process_report(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.database_xml:deadlock_report(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.lock_deadlock(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.sp_statement_completed(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.sql_batch_completed(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text))

    ADD TARGET package0.event_file(

    SET filename=N''https://YourStorageAccountName.blob.core.windows.net/ContainerName/OutputFile.xel''),

    ADD TARGET package0.ring_buffer

    WITH (STARTUP_STATE=ON)

    GO

    ```


    Similar sessions can be created to monitor other events on the SQL Database.


    `CONTROL` permission is required to create an Extended Events. This permission
    is available by default to the `DBO` user.


    Information about currently running XEvent sessions and other information regarding
    the events, actions, targets, etc. exposed through XEvents can be derived from
    the several DMVs and catalog views exposed by Azure SQL Database. Following are
    some of the most commonly used DMVs and catalog views :


    *   `sys.dm_xe_database_session_events`. Exposes information about the events
    configured for the currently active sessions.

    *   `sys.dm_xe_database_sessions`. Exposes information about the currently active
    Extended Event sessions.

    *   `sys.database_event_sessions`. Exposes information about all the XEvents sessions
    configured on the SQL database.

    *   `sys.dm_xe_objects`. Provides information about the events, actions, targets,
    etc. exposed by XEvents on Azure SQL Database. This DMV is similar to the one
    available with Microsoft SQL Server.


    Extended Events can be useful in determining performance issues or other issues
    with the Azure SQL Database. But take care not to overload the database with too
    many sessions or events being captured. Doing so can cause over-committing memory
    and ultimately lead to database performance issues.


    ## Summary


    This chapter discussed the `Database Throughput Unit` (`DTU`) and how choosing
    the right performance level is of paramount importance. We discussed how the services
    tier and the performance level of an Azure SQL database can be changed and then
    talked about the various performance optimization and monitoring features available
    with Azure SQL Database and on the Azure Management Portal.'
  raw: '### Using Extended Events


    Extended Events or (XEvents) are not new. They have been available with Microsoft
    SQL Server since the SQL Server 2008 days. There has been a lot of optimization
    and improvements done to this feature over the last several years. The amount
    of information available through XEvents is enormous, which can be determined
    by the fact that the upcoming release of SQL Server, SQL Server 2016, has almost
    1,200 events exposed.


    Extended Events available on Azure SQL Database is only a subset of the feature
    available with SQL Server. These extended events are scoped to a single Azure
    SQL database, meaning that an extended event running against one Azure SQL database
    cannot be used to monitor events against another database on the same logical
    server.


    Listing [10-2](#A371128_1_En_10_Chapter.html#Par52) provides a sample script that
    can be used to determine the events/actions available with Extended Events on
    Azure SQL Database.


    ```

    SELECT

    o.object_type,

    p.name         AS [package_name],

    o.name         AS [db_object_name],

    o.description  AS [db_obj_description]

    FROM

    sys.dm_xe_objects  AS o

    INNER JOIN sys.dm_xe_packages AS p  ON p.guid = o.package_guid

    WHERE

    o.object_type in

    (

    ''event'',''action''

    )

    ORDER BY

    o.object_type,

    p.name,

    o.name;

    Listing 10-2.

