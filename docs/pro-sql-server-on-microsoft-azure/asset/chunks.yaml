  trans: '

    ### 基础设施即服务


    基础设施即服务（IaaS）模型提供托管的服务器环境，可用于部署和运行软件服务。IaaS 与组织的传统做法非常相似，即在本地构建物理或虚拟化服务器并在这些服务器上运行其软件。IaaS
    与传统方法的不同之处在于，在 IaaS 环境中，服务器托管在供应商的数据中心，而不是企业的数据中心。这可以被理解为一种“租用服务器”模式，组织根据需要支付服务器使用费。在
    IaaS 模型中，用户完全控制在这些服务器上运行的软件、灾难恢复（DR）和高可用性要求以及软件所需的定制化。根据供应商的不同，用户还可能拥有根据需求灵活扩大或缩小服务器规模的能力。此外，根据供应商和所提供的服务器类型，服务器可能包含附加软件，例如操作系统、Exchange
    服务器或关系数据库管理系统（RDBMS）服务器。


    鉴于其灵活性和定制所分配服务器的能力，IaaS 可用于轻松地将遗留应用程序迁移到云端，即构建一个模仿本地服务器配置的云服务器。


    ### 软件即服务


    软件即服务（SaaS）模型帮助用户使用云计算供应商托管的软件服务。在 SaaS 模型中，云计算供应商托管软件服务或应用程序，并通过基于订阅的模式使其可供客户访问。客户按需付费使用这些服务。鉴于
    SaaS 基于订阅制的使用模型，用户可以选择暂停、停止、减少或增加对服务的使用。


    在 SaaS 模型中，软件服务配置和底层硬件基础设施对最终用户是不可访问的。因此，用户无法更改所提供的服务或功能。SaaS 提供了一个高度可共享的多租户环境，成千上万甚至数百万的用户可以同时操作，并且在相互隔离和高度安全的环境中运行。SaaS
    还提供了一个非常敏捷的平台，可以帮助用户缩短“上市时间”，并让他们专注于核心业务项目，而无需担心管理和维护其 IT 需求环境所带来的 IT 挑战。


    ## Microsoft Azure


    Azure 是由 Microsoft 开发的云计算平台，用于通过 Microsoft 管理或 Microsoft 合作伙伴托管的数据中心的全球网络来创建、部署和管理应用程序和服务。Azure
    在所有三种服务模型中都提供基于云的服务：软件即服务（SaaS）、平台即服务（PaaS）和基础设施即服务（IaaS）。


    Azure 提供云托管服务器以及其他基础设施资源，如存储、网络和用于创建、部署和运行应用程序的其他集成基础设施。Azure 在提供云计算环境时依赖于大规模的商用现成硬件群。图
    1-2 展示了一个典型的 Azure 资源模型，其中应用程序服务器以及存储、网络和其他计算资源根据部署时设置的策略按需配置。Azure 结构控制器（Fabric
    Controller）凭借其专用的高度冗余和高可用的服务器及软件，是整个 Azure 环境背后的智能核心。


    ![A371128_1_En_1_Fig2_HTML.jpg](img/A371128_1_En_1_Fig2_HTML.jpg)

    *图 1-2. 典型资源模型——Microsoft Azure*


    Azure 计算资源池由一个非常庞大的商用硬件资源池组成，这些资源以高度冗余和高可用的配置进行设置。这种高可用性和冗余性由 Azure 结构控制器维护和管理。


    结构控制器旨在检测任何类型的故障，并采取必要措施以减轻这些故障的风险。这些措施可能包括生成新资源或将资源迁移到不同的硬件资源池。结构控制器还负责根据用户请求扩大或缩小资源规模。


    ## Azure 服务


    Azure 提供了大量服务，这些服务被分组到不同的类别中，如图 1-3 所示。下面将讨论一些常用或在 Azure 中进行 SQL 部署时需要的服务。


    ![A371128_1_En_1_Fig3_HTML.jpg](img/A371128_1_En_1_Fig3_HTML.jpg)

    *图 1-3. Azure 服务*


    ### 计算产品


    Microsoft Azure 提供三种重要的计算产品，可用于运行网站和应用程序。Azure 网站和 Azure 云服务使用 Azure 虚拟机来运行网站和应用程序，同时将管理创建和管理的任务抽象化，使用户无需处理。这两项服务提供
    PaaS 产品，而第三个选项——Azure 虚拟机（VM）——则为用户提供了创建和管理其虚拟机的完全控制权。Azure 虚拟机提供 IaaS 产品。


    #### 虚拟机


    Azure 虚拟机为用户提供对虚拟机及其上运行的应用程序的创建、配置和管理的完全控制权。Azure 虚拟机允许使用上传到 Azure 的 VHD 或利用 Azure
    VHD 库中提供的 VHD 镜像来创建 VM，如图 1-4 所示。Azure 提供了大量针对不同版本/版本的 Windows、Linux 和其他服务器应用程序（如
    SQL Server、BiTalk、Oracle 等）的 VHD。


    ![A371128_1_En_1_Fig4_HTML.jpg](img/A371128_1_En_1_Fig4_HTML.jpg)

    *图 1-4. Azure 虚拟机*


    Azure 虚拟机允许配置并向一个 VM 添加多个虚拟磁盘。这些磁盘可以配置在标准存储上，也可以配置在基于固态硬盘（SSD）的高级存储上。


    #### Azure WebApps（前身为 Azure 网站）


    Azure WebApps（前身为 Azure 网站）通过 Azure 管理门户以及 API 提供托管的 Web 环境。除了能够在云端创建新网站外，Azure
    WebApps 还允许将任何现有网站迁移到云端。WebApps 提供按需扩大或缩小资源规模的能力。创建一个 Azure WebApps 服务基本上就是创建一个带有
    IIS 及相关存储的 VM，如图 1-5 所示。这些 VM 的创建和管理对最终用户是封装的。


    ![A371128_1_En_1_Fig5_HTML.jpg](img/A371128_1_En_1_Fig5_HTML.jpg)

    *图 1-5. Azure WebApps*


    Azure WebApps 提供共享租户模型（资源在多个网站之间共享）和标准模型（为网站提供专用资源）。扩大或缩小实例规模的能力仅在标准模型中可用。


    #### 云服务


    与 Azure 网站类似，Azure 云服务使用 VM 来执行工作负载，同时为用户提供一些对 VM 配置的控制权。例如，可以远程访问 VM，并且可以在 VM
    上安装其他软件。Azure 云服务提供两种不同类型的 VM。Web 角色实例运行带有 IIS 的 Windows Server 变体，而辅助角色实例运行不带
    IIS 的相同 Windows Server 变体。一个云服务应用程序依赖于这两种选项的某种组合。


    ### 数据管理产品


    Windows Azure 提供了多种存储和管理数据的方式。这种服务多样性允许用户利用 Azure 来满足各种业务需求和解决问题。Azure 提供以下四种主要的数据管理产品。

    '
- fmt: '# SQL/Oracle Running on Azure VM


    Azure VMs allow the users to configure an instance of `Microsoft SQL Server`,
    `Oracle`, or any other `DBMS`. As earlier mentioned in the section on compute
    offerings and Virtual Machines, multiple images are available in the Azure marketplace,
    and they can be used deploy a `SQL Server` instance (`SQL 2012`, `SQL 2014` and
    `SQL 2016 RC` releases, as of writing this book) or an `Oracle` instance. Moreover,
    other `DBMS` environments can be created using a customized `VHD`, which can be
    uploaded to Azure.


    # Azure SQL Database


    The Azure SQL Database is a relational database as a service, which provides all
    the important features of an `RDBMS`, including transaction consistency, data
    integrity, and multi-user concurrent data access system. Azure SQL Database is
    built on the same principles as the `Microsoft SQL Server` and provides comparable
    features. For users who are already familiar with `SQL Server`, adapting to Azure
    SQL Database won’t be difficult. Azure SQL Database employs a `PaaS` Service model,
    where the consumer controls the access patterns, while the platform takes care
    of other administrative work. Azure SQL Database provides automatic backups and
    point-in-time restore for the databases. Depending on the service tier being used,
    Azure SQL Databases also provide high availability options at a reasonable cost.


    # Azure Blobs


    Azure Blobs (“blob storage” and “storage blobs” are the same thing) is a cloud-based
    inexpensive storage solution for storing unstructured binary data (Figure [1-6](#A371128_1_En_1_Chapter.html#Fig6)).
    Consider Azure Blob storage as a file store for binary files, with a maximum file
    size limit of `1TB`. Applications can also make use of Azure drives, which let
    blobs provide persistent storage for a `Windows` filesystem mounted in an Azure
    instance. the application sees ordinary `Windows` files, but the contents are
    actually stored in a blob.


    ![A371128_1_En_1_Fig6_HTML.jpg](A371128_1_En_1_Fig6_HTML.jpg)

    **Figure 1-6.** Azure storage blobs


    `Blob storage` is used by many other Azure features (including Virtual Machines),
    so it can certainly handle your workloads.


    # Azure Table Storage


    Tables provide a `NoSQL`/key-value storage. Tables provide fast, reliable, and
    simple access to large amounts of loosely structured and unstructured data. Tables
    provide non-relational or `NoSQL` storage.


    # Networking


    Azure provides several options to set up private networks, virtual private networks,
    and network load balancing. The most commonly used options are described next.


    ## Virtual Network


    Azure Virtual Network (`VNet`) is a logical partitioning of the Azure cloud dedicated
    to the subscription. Administrators have full control over the `IPs`, the `DNS`
    settings, and the security policies for the network. It can be compared to a private
    network of an organization, which runs behind a firewall. Azure `VNets` allow
    you to create subnets, which can be used to further segment the network, depending
    on requirements. Azure allows users to connect the `VNet` to their on-premises
    networks using one of the many connectivity options available with Azure, as illustrated
    in Figure [1-7](#A371128_1_En_1_Chapter.html#Fig7).


    ![A371128_1_En_1_Fig7_HTML.jpg](A371128_1_En_1_Fig7_HTML.jpg)

    **Figure 1-7.** Azure Virtual Network


    ## VPN Connection Options


    Connectivity options allow users to connect their on-premises networks with their
    Azure networks. These options include:


    -   Point-to-site `VPN` connections

    -   Site-to-site `VPN` connections

    -   `ExpressRoute` connections


    ### Point-to-Site VPN Connection


    A point-to-site `VPN` lets users create a secure connection to their Azure Virtual
    Networks from a client computer in their on-premises networks. Point-to-site connections
    have to be configured individually on each client computer that needs to connect
    to the virtual network. Point-to-site connections do not require a `VPN` device,
    but use a `VPN` client that needs to be installed on each client computer. The
    `VPN` is established by manually initiating the connection from the on-premises
    client computer.


    ### Site-to-Site VPN Connection


    A site-to-site `VPN` allows users to create a secure connection between their
    on-premises network and and their Azure Virtual Network. Site-to-site `VPN` connections
    require a `VPN` device located on the on-premises network and must be configured
    to create a secure connection with the Azure `VPN Gateway`. Once the connection
    is established, resources on the on-premises network and in the Azure Virtual
    Network can communicate directly and securely. Unlike the point-to-site `VPN`
    connection, site-to-site connections do not require the establishment of a separate
    connection for each client computer on the local network to access resources in
    the virtual network.


    ### ExpressRoute Connection


    Azure `ExpressRoute` allows the users to create a private connection between Azure
    data centers and their on-premises networks. `ExpressRoute` connections do not
    go over the public Internet, but instead use a dedicated Internet channel and
    thus offer more reliability, better security, and lower latencies compared to
    the typical connections over the Internet. As illustrated in Figure [1-8](#A371128_1_En_1_Chapter.html#Fig8),
    `ExpressRoute` does not use the public Internet to connect your on-premises environment
    with Azure.


    ![A371128_1_En_1_Fig8_HTML.jpg](A371128_1_En_1_Fig8_HTML.jpg)

    **Figure 1-8.** Azure ExpressRoute


    # Developer Services


    Azure provides several services that can be leveraged by developers to write optimal
    and performant code. In addition to providing several features to write code,
    Azure also provides methods to automate testing and capture telemetry while running
    their applications.


    ## Visual Studio Team Services


    `Visual Studio Team Services` provides a service to develop and ship applications,
    share codes with the team, track application development, and load-test applications,
    written in any language.


    ## Application Insights


    `Application Insights` is an extensible analytics service that allows users to
    monitor live performance of their applications. It can help detect and diagnose
    performance issues and provide telemetry data for applications. Developers can
    use the service to continuously improve the performance and usability of their
    application code. `Application Insights` works with web-based and standalone applications
    developed using `.Net`, `J2EE`, and hosted on on-premises or on the cloud, as
    illustrated in Figure [1-9](#A371128_1_En_1_Chapter.html#Fig9).


    ![A371128_1_En_1_Fig9_HTML.jpg](A371128_1_En_1_Fig9_HTML.jpg)

    **Figure 1-9.** Azure Application Insights


    # Identity and Access


    `Windows Azure Active Directory` provides robust and secure identity services
    that help control and manage directory and access management in the cloud. It
    also provides a seamless sign-in experience to Azure resources and enhanced security
    with multi-factor authentication.


    ## Active Directory


    Azure Active Directory (`AAD`) is an identity and access management solution that
    provides organizations with the ability to manage users and groups, just like
    an on-premises active directory solution. `AAD` helps provide secure access to
    resources on-premises and on the cloud. `AAD` is available in three service tiers:
    Free, Basic, and Premium.


    # Backup


    Azure provides a plethora of simple and reliable backup services that can be utilized
    to ensure business continuity and disaster recovery whenever needed.


    ## Azure Site Recovery


    `Site Recovery` is an Azure service that contributes to your business continuity
    and disaster recovery (`BCDR`) strategy by orchestrating replication of your on-premises
    servers and virtual machines to a secondary on-premises data center, or to Azure.
    `Site Recovery` handles the replication, and you can kick off failover and recovery
    with a simple click.'
  raw: '#### SQL/Oracle Running on Azure VM


    Azure VMs allow the users to configure an instance of Microsoft SQL Server, Oracle,
    or any other Database Management System. As earlier mentioned in the section on
    compute offerings and Virtual Machines, multiple images are available in the Azure
    marketplace, and they can be used deploy a SQL Server instance (SQL 2012, SQL
    2014 and SQL 2016 RC releases, as of writing this book) or an Oracle instance.
    Moreover, other DBMS environments can be created using a customized VHD, which
    can be uploaded to Azure.


    #### Azure SQL Database


    The Azure SQL Database is a relational database as a service, which provides all
    the important features of an RDBMS, including transaction consistency, data integrity,
    and multi-user concurrent data access system. Azure SQL Database is built on the
    same principles as the Microsoft SQL Server and provides comparable features.
    For users who are already familiar with SQL Server, adapting to Azure SQL Database
    won’t be difficult. Azure SQL Database employs a PaaS Service model, where the
    consumer controls the access patterns, while the platform takes care of other
    administrative work. Azure SQL Database provides automatic backups and point-in-time
    restore for the databases. Depending on the service tier being used, Azure SQL
    Databases also provide high availability options at a reasonable cost.


    #### Azure Blobs


    Azure Blobs (“blob storage” and “storage blobs” are the same thing) is a cloud-based
    inexpensive storage solution for storing unstructured binary data (Figure [1-6](#A371128_1_En_1_Chapter.html#Fig6)).
