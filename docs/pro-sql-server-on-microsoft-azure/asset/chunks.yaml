- fmt: '## SQL Server Files in Microsoft Azure Storage


    SQL Server 2014 has a unique feature that helps native support for storing SQL
    Server database files in Microsoft Azure Storage. You can now create a database
    on-premises or in a Virtual Machine hosted in Microsoft Azure and store the data
    in Microsoft Azure blob storage. It is easy to move your databases between different
    environments by detaching and attaching the files stored in Microsoft Azure Storage.


    ### Creating Data Files and Credentials


    While creating the data files, you need to do the following:


    1.  Create a storage account and a container within it.

    2.  Create a SQL Server credential that has the policy of the container.

    3.  Access the container using Shared Access Signature.


    While using the native feature of storing the files in the Microsoft Azure Storage,
    you need to:


    1.  Create a policy on the container and generate the SAS key. To get the SAS
    key, download Microsoft Storage Explorer from [`https://azurestorageexplorer.codeplex.com/`](https://azurestorageexplorer.codeplex.com/).

    2.  For each container you need a credential and its name should match the `containers`
    path.


    ### Advantages and Architecture


    Figure [6-6](#A371128_1_En_6_Chapter.html#Fig6) shows that you can have your databases
    residing on-premises or on an Azure Virtual Machine in Microsoft Azure.


    ![A371128_1_En_6_Fig6_HTML.jpg](A371128_1_En_6_Fig6_HTML.jpg)


    **Figure 6-6.** Data files as stored in a Microsoft Azure Storage account


    As you can see, we have `DB3` created in an Azure Virtual Machine with its files
    residing on the Azure storage. On the other hand, `DB6` is residing on the on-premises
    environment and has the files stored in the Azure storage. The advantages of using
    SQL Server data files on Windows Azure blob storage service are as follows:


    *   **Portability.** It’s easy to detach a database from a Windows Azure Virtual
    Machine (IaaS) and attach the database to a different virtual machine in the cloud;
    this feature might be also suitable to implement an efficient disaster recovery
    mechanism, because everything is directly accessible in Windows Azure blob storage.
    To migrate or move databases, use a single `CREATE DATABASE` Transact-SQL query
    that refers to the blob locations, with no restrictions on storage account and
    compute resource location. You can also use rolling upgrade scenarios if extended
    downtime for operating system and/or SQL Server maintenance is required.

    *   **Database virtualization.** When combined with the contained database feature
    in SQL Server 2012 and SQL Server 2014, a database can now be a self-contained
    data repository for each tenant and then dynamically moved to different virtual
    machines for workload rebalancing. For more information about contained databases,
    see the following topic in SQL Server Books Online:

    *   **High availability and disaster recovery.** Because all database files are
    now externally hosted, even if a virtual machine crashes, you can attach these
    files from another hot standby virtual machine, ready to take the processing workload.
    A practical example of this mechanism is provided in the section called “Implementing
    a Failover Cluster Mechanism” later in this book.

    *   **Scalability.** Using SQL Server data files in Windows Azure, you can bypass
    the limitation on the maximum number of Windows Azure disks you can mount on a
    single virtual machine. There is a limitation on the maximum number of I/O per
    second (IOPS) for each single Windows Azure disk.


    Let’s look at the architecture and simplify this a bit. The enhancements have
    been made within the SQL Server engine layer itself. There are three layers where
    the integration has been done; Figure [6-7](#A371128_1_En_6_Chapter.html#Fig7)
    will simplify this idea a bit.


    *   **Manager layer.** This includes a new component called `XFCB Credential Manager`,
    which manages the security credentials necessary to access the Windows Azure blob
    containers and provides the necessary security interface. Secrets are maintained
    encrypted and secured in the SQL Server built-in security repository in the `master`
    system database.

    *   **File Control layer.** Contains a new object called `XFCB`, which is the
    Windows Azure extension to the file control block (FCB) used to manage IO against
    each single SQL Server data or log file on the NTFS file system; it implements
    all the APIs that are required for IO against Windows Azure blob storage.

    *   **Storage layer.** At the Storage layer, the SQL Server I/O Manager is now
    able to natively generate REST API calls to Windows Azure blob storage with minimal
    overhead and great efficiency; in addition, this component can generate information
    about performance counters and extended events (xEvents).


    ![A371128_1_En_6_Fig7_HTML.jpg](A371128_1_En_6_Fig7_HTML.jpg)


    **Figure 6-7.** SQL Server Storage Engineer File IO


    ### Implementation Example


    Here is an example of creating a sample database using this concept:


    ```sql

    -- Creating Databases with files in Windows Azure Storage

    -- Step 1: Create a credential

    CREATE CREDENTIAL [https://storageaccountName.blob.core.windows.net/testcontainer]

    WITH IDENTITY=''SHARED ACCESS SIGNATURE'',

    SECRET = ''SECRET KEY''

    ```


    This secret key is generated using the Azure Storage Explorer.


    1.  Choose `testcontainer` and click on the security button on the toolbar.

    2.  Click the Shared Access Signatures tab.

    3.  Click the Generate Signature button to generate the SAS signature (see Figure
    [6-8](#A371128_1_En_6_Chapter.html#Fig8)).


    ![A371128_1_En_6_Fig8_HTML.jpg](A371128_1_En_6_Fig8_HTML.jpg)


    **Figure 6-8.** Blob & Container Security Dialog: Storage Explorer


    Once you get the string using the data in Figure [6-8](#A371128_1_En_6_Chapter.html#Fig8),
    follow these steps.


    1.  Use the string as `SECRET`, which is after the `?` in the signature string.

    2.  Create a database with data and log files in an Windows Azure container as
    follows:


    ```sql

    CREATE DATABASE FirstHybridDB

    ON

    ( NAME = FirstHybridDB_dat,

    FILENAME = ''https://storageaccountname.blob.core.windows.net/testcontainer/FirstHybridDB.mdf''
    )

    LOG ON

    ( NAME = FirstHybridDB_log,

    FILENAME =  ''https://storageaccountname.blob.core.windows.net/testcontainer/FirstHybridDB_Log.ldf'')

    ```'
  raw: '## SQL Server Files in Microsoft Azure Storage


    SQL Server 2014 has a unique feature that helps native support for storing SQL
    Server database files in Microsoft Azure Storage. You can now create a database
    on-premises or in a Virtual Machine hosted in Microsoft Azure and store the data
    in Microsoft Azure blob storage. It is easy to move your databases between different
    environments by detaching and attaching the files stored in Microsoft Azure Storage.


    While creating the data files, you need to do the following:


    1.  Create a storage account and a container within it.  

    2.  Create a SQL Server credential that has the policy of the container.  

    3.  Access the container using Shared Access Signature.


    While using the native feature of storing the files in the Microsoft Azure Storage,
    you need to:


    1.  Create a policy on the container and generate the SAS key. To get the SAS
    key, download Microsoft Storage Explorer from [`https://azurestorageexplorer.codeplex.com/`](https://azurestorageexplorer.codeplex.com/)
    .  

    2.  For each container you need a credential and its name should match the `containers`
    path.


    Figure [6-6](#A371128_1_En_6_Chapter.html#Fig6) shows that you can have your databases
    residing on-premises or on an Azure Virtual Machine in Microsoft Azure.


    ![A371128_1_En_6_Fig6_HTML.jpg](A371128_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Data files as stored in a Microsoft Azure Storage account


    As you can see, we have DB3 created in an Azure Virtual Machine with its files
    residing on the Azure storage. On the other hand, DB6 is residing on the on-premises
    environment and has the files stored in the Azure storage. The advantages of using
    SQL Server data files on Windows Azure blob storage service are as follows:


    *   Portability. It’s easy to detach a database from a Windows Azure Virtual Machine
    (IaaS) and attach the database to a different virtual machine in the cloud; this
    feature might be also suitable to implement an efficient disaster recovery mechanism,
    because everything is directly accessible in Windows Azure blob storage. To migrate
    or move databases, use a single `CREATE DATABASE` Transact-SQL query that refers
    to the blob locations, with no restrictions on storage account and compute resource
    location. You can also use rolling upgrade scenarios if extended downtime for
    operating system and/or SQL Server maintenance is required.

    *   Database virtualization. When combined with the contained database feature
    in SQL Server 2012 and SQL Server 2014, a database can now be a self-contained
    data repository for each tenant and then dynamically moved to different virtual
    machines for workload rebalancing. For more information about contained databases,
    see the following topic in SQL Server Books Online:

    *   High availability and disaster recovery. Because all database files are now
    externally hosted, even if a virtual machine crashes, you can attach these files
    from another hot standby virtual machine, ready to take the processing workload.
    A practical example of this mechanism is provided in the section called “Implementing
    a Failover Cluster Mechanism” later in this book.

    *   Scalability. Using SQL Server data files in Windows Azure, you can bypass
    the limitation on the maximum number of Windows Azure disks you can mount on a
    single virtual machine. There is a limitation on the maximum number of I/O per
    second (IOPS) for each single Windows Azure disk.


    Let’s look at the architecture and simplify this a bit. The enhancements have
    been made within the SQL Server engine layer itself. There are three layers where
    the integration has been done; Figure [6-7](#A371128_1_En_6_Chapter.html#Fig7)
    will simplify this idea a bit.


    *   Manager layer. This includes a new component called XFCB Credential Manager,
    which manages the security credentials necessary to access the Windows Azure blob
    containers and provides the necessary security interface. Secrets are maintained
    encrypted and secured in the SQL Server built-in security repository in the master
    system database.

    *   File Control layer. Contains a new object called XFCB, which is the Windows
    Azure extension to the file control block (FCB) used to manage IO against each
    single SQL Server data or log file on the NTFS file system; it implements all
    the APIs that are required for IO against Windows Azure blob storage.

    *   Storage layer. At the Storage layer, the SQL Server I/O Manager is now able
    to natively generate REST API calls to Windows Azure blob storage with minimal
    overhead and great efficiency; in addition, this component can generate information
    about performance counters and extended events (xEvents).


    ![A371128_1_En_6_Fig7_HTML.jpg](A371128_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    SQL Server Storage Engineer File IO


    Here is an example of creating a sample database using this concept:


    ```

    -- Creating Databases with files in Windows Azure Storage

    -- Step 1: Create a credential

    CREATE CREDENTIAL [https://storageaccountName.blob.core.windows.net/testcontainer]

    WITH IDENTITY=''SHARED ACCESS SIGNATURE'',

    SECRET = ''SECRET KEY''

    ```


    This secret key is generated using the Azure Storage Explorer.


    1.  Choose `testcontainer` and click on the security button on the toolbar.  

    2.  Click the Shared Access Signatures tab.  

    3.  Click the Generate Signature button to generate the SAS signature (see Figure
    [6-8](#A371128_1_En_6_Chapter.html#Fig8)).


    ![A371128_1_En_6_Fig8_HTML.jpg](A371128_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Blob & Container Security Dialog: Storage Explorer


    Once you get the string using the data in Figure [6-8](#A371128_1_En_6_Chapter.html#Fig8),
    follow these steps.


    1.  Use the string as `SECRET`, which is after the `?` in the signature string.
     

    2.  Create a database with data and log files in an Windows Azure container as
    follows:


    ```

    CREATE DATABASE FirstHybridDB

    ON

    ( NAME = FirstHybridDB_dat,

    FILENAME = ''https://storageaccountname.blob.core.windows.net/testcontainer/FirstHybridDB.mdf''
    )

    LOG ON

    ( NAME = FirstHybridDB_log,

    FILENAME =  ''https://storageaccountname.blob.core.windows.net/testcontainer/FirstHybridDB_Log.ldf'')

    ```'
