- fmt: '### Point-in-Time Restore


    Azure SQL Database 服务为所有数据库提供自动备份功能。这些备份的保留时间取决于数据库运行的服务层级。例如，对于在基本服务层级运行的数据库，备份保留七天，而对于标准和高级服务层级，保留时间分别为
    14 天和 35 天。数据库可以从备份还原到保留期内的任何时间点。这些备份存储在具有地理复制存储账户上，并可读取地理复制副本。


    Azure SQL Database 服务每周进行一次完整备份，每天进行一次差异备份，每五分钟进行一次日志备份。第一次完整备份在数据库创建后立即进行。一旦第一次完整备份完成，其他备份将自动安排。点时间还原可以使用
    `Azure Portal` 或 `PowerShell` 完成，如图 [9-4](#A371128_1_En_9_Chapter.html#Fig4) 所示。


    ![A371128_1_En_9_Fig4_HTML.jpg](A371128_1_En_9_Fig4_HTML.jpg)

    图 9-4. 启动点时间还原


    关于还原操作，请注意以下几点：

    *   还原会在同一逻辑 SQL 服务器上创建一个新数据库，并使用还原点时正在使用的服务层级。由于数据库位于同一逻辑服务器上，因此必须确保服务器上有足够的
    `DTU` 用于新数据库。

    *   还原时间取决于多种因素，如数据库大小、恢复点（时间回溯多远）、需要还原的备份数量等。

    *   数据库还原后，将根据所使用的服务层级和性能级别全额计费。


    如果数据库已被删除，则该数据库的最终备份将根据保留策略保留。已删除的数据库可以还原到其被删除时的时间点。已删除的数据库可以在数据库所在的逻辑服务器下的 `Azure
    Portal` 中查看。图 [9-5](#A371128_1_En_9_Chapter.html#Fig5) 说明了如何使用 `Azure Management
    Portal` 还原已删除的数据库。


    ![A371128_1_En_9_Fig5_HTML.jpg](A371128_1_En_9_Fig5_HTML.jpg)

    图 9-5. 还原已删除的数据库


    如图 [9-6](#A371128_1_En_9_Chapter.html#Fig6) 所示，删除日期和还原点相同，这意味着数据库将被还原到它被删除时的状态。


    ![A371128_1_En_9_Fig6_HTML.jpg](A371128_1_En_9_Fig6_HTML.jpg)

    图 9-6. 启动已删除数据库的还原


    可以使用 `Azure PowerShell` 在某个时间点还原数据库。清单 [9-1](#A371128_1_En_9_Chapter.html#Par25)
    提供了示例代码。

    ```

    Login-AzureRmAccount

    #$resourceGroup = "ResourceGroupName"

    #$DbServer = "DBServerName"

    $resourceGroupName = "Default-SQL-SoutheastAsia"

    # Get the Logical Server Details

    $DbServerName = (Get-AzureRmSqlServer -ResourceGroupName $resourceGroupName).ServerName

    #1. Get for all the Databases on the account.

    $DBName = Get-AzureRmSqlDatabase -ServerName $DbServerName -ResourceGroupName
    $resourceGroupName | Where-Object {$_.DatabaseName -ne "Master"}

    ## PointInTime Parameter takes values in GMT and not local server time.

    $RestoreRequest = Restore-AzureRmSqlDatabase -FromPointInTimeBackup -PointInTime
    “2016-05-17 04:00:00” -ResourceId $DBName[0].ResourceId -ServerName $DbServerName
    -TargetDatabaseName ($DBName[0].DatabaseName+"_Restored") -ResourceGroupName $resourceGroupName

    if($RestoreRequest -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    ## Restore a Deleted Database

    ## in this example we will retrieve all the deleted databases and then restore
    the first database in the list.

    $deletedDBs =  Get-AzureRMSqlDeletedDatabaseBackup -ResourceGroupName $resourceGroupName
    -ServerName $DbServerName

    $RestoredDB = Restore-AzureRmSqlDatabase -FromDeletedDatabaseBackup -DeletionDate
    $deletedDBs[0].DeletionDate -ResourceId $deletedDBs[0].ResourceId -ServerName
    $deletedDBs[0].ServerName -ResourceGroupName $deletedDBs[0].ResourceGroupName
    -ServiceObjectiveName $deletedDBs[0].ServiceLevelObjective -TargetDatabaseName
    $deletedDBs[0].DatabaseName

    if($RestoredDB -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    ```

    清单 9-1. 点时间还原和还原已删除的 Azure SQL 数据库


    ### Geo-Restore


    `Azure SQL Database` 的地理还原功能允许从备份的地理复制副本进行数据库还原。如前所述，`Azure` 会自动在地理冗余存储上对数据库进行备份。地理还原利用这些地理复制的备份副本来进行还原。地理还原可以帮助应用程序快速从影响整个主站点的灾难中恢复。


    > 注意：备份进行复制到 `GRS` 时可能存在一些延迟。完全有可能在主站点宕机之前，最新的备份尚未被复制。


    与点时间还原一样，地理还原可以使用 `Azure Portal`（参见图 [9-7](#A371128_1_En_9_Chapter.html#Fig7)
    和 [9-8](#A371128_1_En_9_Chapter.html#Fig8)）或 `PowerShell`（参见清单 [9-2](#A371128_1_En_9_Chapter.html#Par30)）完成。


    ![A371128_1_En_9_Fig8_HTML.jpg](A371128_1_En_9_Fig8_HTML.jpg)

    图 9-8. 配置地理还原选项


    ![A371128_1_En_9_Fig7_HTML.jpg](A371128_1_En_9_Fig7_HTML.jpg)

    图 9-7. 启动地理还原


    地理还原可以通过创建一个以地理冗余备份为源的新数据库来实现。


    与点时间还原一样，还原数据库所需的时间取决于待还原数据库的大小以及使数据库上线所需的操作数量。

    ```

    $GeoBackups = Get-AzureRMSqlDatabaseGeoBackup -ResourceGroupName $resourceGroupName
    -ServerName $DbServerName

    # Perform Geo-Restore

    $Restored_Geo_DB = Restore-AzureRmSqlDatabase -FromGeoBackup -ResourceGroupName
    $GeoBackups[0].ResourceGroupName -ResourceId $GeoBackups[0].ResourceId -TargetDatabaseName  ($GeoBackups[0].DatabaseName
    + "_Geo_Restored") -ServerName $DbServerName

    if($RestoredDB -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    ```

    清单 9-2. 地理还原一个 Azure SQL 数据库


    ### Geo-Replication


    `Geo-Replication` 提供了为地理上分散的区域创建主数据库的次要副本的能力。地理复制有两种形式——标准地理复制（适用于标准和高级服务层级）和活动地理复制（仅适用于高级服务层级）。


    与本地高可用性技术（如 `SQL Server AlwaysOn`）不同，地理复制本质上始终是异步的。主副本上的事务被传送到次要副本并异步应用。为了防止数据中心之间的网络问题或基于距离的延迟，主副本上的更改会被缓冲，然后再传送到次要副本。


    > 注意：基本层级数据库不提供 `Geo-Replication` 功能。'
  raw: '### Point-in-Time Restore


    Azure SQL Database service provides automatic backup capabilities for all databases.
    The retention of these backups is dependent on the service tier the database is
    running in. For example, for a database running in the basic service tier, the
    backups are retained for seven days, while for standard and premium service tiers,
    the retention is 14 days and 35 days, respectively. The database can be restored
    to any point in time within the retention period from the backups. These backups
    are stored on a geo-redundant storage account with read access to the geo-copy.


    Azure SQL Database service takes full backups every week, differential backups
    every day, and log backup every five minutes. The first full backup is taken immediately
    after the database is created. Once the first full backup is completed, the other
    backups are scheduled automatically. Point-in-time restore can be completed using
    the Azure Portal or using PowerShell, as illustrated in Figure [9-4](#A371128_1_En_9_Chapter.html#Fig4).


    ![A371128_1_En_9_Fig4_HTML.jpg](A371128_1_En_9_Fig4_HTML.jpg)


    Figure 9-4.


    Initiating a point-in-time restore


    Consider these few key points with regard to the restore operation :


    *   Restore creates a new database on the same logical SQL Server and with the
    service tier, which was the being used during the restore point. Since the database
    is on the same logical server, it''s important to ensure that there are enough
    DTUs on the server for the new database.

    *   The time for restore is dependent on multiple factors like the size of the
    database, recovery point (how far back in time), the number of backups to be restored,
    etc.

    *   Once the database is restored, it would be charged fully in accordance to
    the service tier and performance level being used.


    If a database was deleted, the final backup of the database is retained in accordance
    with the retention policy. A deleted database can be restored to the point at
    which it was deleted. The deleted databases can be viewed in the Azure Portal
    under the logical server where the database resided. Figure [9-5](#A371128_1_En_9_Chapter.html#Fig5)
    illustrates how a deleted database can be restored using the Azure Management
    Portal.


    ![A371128_1_En_9_Fig5_HTML.jpg](A371128_1_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    Restoring a deleted database


    As illustrated in Figure [9-6](#A371128_1_En_9_Chapter.html#Fig6), the deleted
    date and the restore point are the same, meaning that the database would be restored
    to the point when it was deleted.


    ![A371128_1_En_9_Fig6_HTML.jpg](A371128_1_En_9_Fig6_HTML.jpg)


    Figure 9-6.


    Initiating a deleted database restore


    Azure PowerShell can be used to restore a database at a point in time. Listing
    [9-1](#A371128_1_En_9_Chapter.html#Par25) provides the sample code .


    ```

    Login-AzureRmAccount

    #$resourceGroup = "ResourceGroupName"

    #$DbServer = "DBServerName"

    $resourceGroupName = "Default-SQL-SoutheastAsia"

    # Get the Logical Server Details

    $DbServerName = (Get-AzureRmSqlServer -ResourceGroupName $resourceGroupName).ServerName

    #1\. Get for all the Databases on the account.

    $DBName = Get-AzureRmSqlDatabase -ServerName $DbServerName -ResourceGroupName
    $resourceGroupName | Where-Object {$_.DatabaseName -ne "Master"}

    ## PointInTime Parameter takes values in GMT and not local server time.

    $RestoreRequest = Restore-AzureRmSqlDatabase -FromPointInTimeBackup -PointInTime
    “2016-05-17 04:00:00” -ResourceId $DBName[0].ResourceId -ServerName $DbServerName
    -TargetDatabaseName ($DBName[0].DatabaseName+"_Restored") -ResourceGroupName $resourceGroupName

    if($RestoreRequest -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    ## Restore a Deleted Database

    ## in this example we will retrieve all the deleted databases and then restore
    the first database in the list.

    $deletedDBs =  Get-AzureRMSqlDeletedDatabaseBackup -ResourceGroupName $resourceGroupName
    -ServerName $DbServerName

    $RestoredDB = Restore-AzureRmSqlDatabase -FromDeletedDatabaseBackup -DeletionDate
    $deletedDBs[0].DeletionDate -ResourceId $deletedDBs[0].ResourceId -ServerName
    $deletedDBs[0].ServerName -ResourceGroupName $deletedDBs[0].ResourceGroupName
    -ServiceObjectiveName $deletedDBs[0].ServiceLevelObjective -TargetDatabaseName
    $deletedDBs[0].DatabaseName

    if($RestoredDB -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    Listing 9-1.

    Point-in-Time Restore and Restoration of a Deleted Azure SQL Database

    ```


    ### Geo-Restore


    The Azure SQL Database Geo-Restore capability allows for the restoration of the
    database from the geo-redundant copy of the backups. As mentioned previously,
    Azure takes automated backups of the databases on a geo-redundant storage. Geo-Restore
    uses these geo-replicated copies of the backup for the restore purposes. Geo-Restore
    can help applications recover quickly from a disaster that impacts the entire
    primary site.


    Note


    There might be some delay between when the backups are taken and when they are
    replicated to the GRS. It is entirely possible that the last backup was not replicated
    before the primary site went down.


    As with point-in-time restores, Geo-Restores can be done using the Azure Portal
    (see Figures [9-7](#A371128_1_En_9_Chapter.html#Fig7) and [9-8](#A371128_1_En_9_Chapter.html#Fig8))
    or using PowerShell (see Listing [9-2](#A371128_1_En_9_Chapter.html#Par30)).


    ![A371128_1_En_9_Fig8_HTML.jpg](A371128_1_En_9_Fig8_HTML.jpg)


    Figure 9-8.


    Configuring Geo-Restore options


    ![A371128_1_En_9_Fig7_HTML.jpg](A371128_1_En_9_Fig7_HTML.jpg)


    Figure 9-7.


    Initiating Geo-Restore


    Geo-Restore can be achieved by creating a new database with the source as the
    geo-redundant backups.


    As with point-in-time restores, the time needed to restore the database depends
    on the size of the database being restored and the number of operations required
    to get the database online .


    ```

    $GeoBackups = Get-AzureRMSqlDatabaseGeoBackup -ResourceGroupName $resourceGroupName
    -ServerName $DbServerName

    # Perform Geo-Restore

    $Restored_Geo_DB = Restore-AzureRmSqlDatabase -FromGeoBackup -ResourceGroupName
    $GeoBackups[0].ResourceGroupName -ResourceId $GeoBackups[0].ResourceId -TargetDatabaseName  ($GeoBackups[0].DatabaseName
    + "_Geo_Restored") -ServerName $DbServerName

    if($RestoredDB -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    Listing 9-2.

    Geo-Restoring an Azure SQL Database

    ```


    ### Geo-Replication


    Geo-Replication provides the ability to create geographically disparate secondary
    replicas of the primary databases. Geo-Replication is available in two flavors—Standard
    Geo-Replication, available with the Standard and the Premium service tier, and
    the Active Geo-Replication, available only with Premium service tier.


    Unlike on-premises high availability technologies (like SQL Server AlwaysOn),
    Geo-Replication is always asynchronous in nature. Transactions on the primary
    copy are shipped to the secondary copy and applied asynchronously. To safeguard
    against network issues between DCs or distance based latency, the changes on the
    primary copy are buffered and then shipped to the secondary copy.


    Note


    Geo-Replication is not available with basic tier databases.'
