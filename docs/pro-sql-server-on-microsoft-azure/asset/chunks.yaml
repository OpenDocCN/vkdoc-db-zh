    \ Azure 中，它肯定有助于提高通信密集型系统的性能。\n\n如果您热衷于阅读博客，您会看到多位 SQL Server 专业人士不鼓励在数据库上使用自动收缩和自动关闭；对于托管在\
    \ Azure VM 上的 SQL Server 实例中的数据库也是如此。清单 [7-7](#A371128_1_En_7_Chapter.html#Par44)\
