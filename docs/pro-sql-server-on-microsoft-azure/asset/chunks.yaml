    using DMVs (Dynamic Management View) exposed at both the database and logical
    server level or by using extended events configurable on the SQL database.'
  trans: '### 使用 PowerShell 更改服务层级或性能级别


    PowerShell 可用于配置 SQL 数据库的服务层级或性能级别。清单 10-1 将现有数据库的服务层级更改为标准版，性能级别更改为 S0。


    ```

    #登录到 Azure 帐户

    Add-AzureRmAccount

    #选择订阅

    $subscriptions = Get-AzureRmSubscription

    $SubscriptionId = $subscriptions[0].SubscriptionId

    Select-AzureRmSubscription -SubscriptionId $SubscriptionId

    #选择资源组

    $ResourceGroupName = Get-AzureRmResourceGroup | Where-Object {$_.ResourceGroupName
    -notlike "Default*"}

    $ResourceGroup= $ResourceGroupName[1].ResourceGroupName

    #选择 Azure SQL 服务器和数据库名称

    $ServerName = (Get-AzureRmSqlServer -ResourceGroupName $ResourceGroup)[1].ServerName

    $DatabaseName = (Get-AzureRmSqlDatabase -ServerName $ServerName -ResourceGroupName
    $ResourceGroup | Where-Object {$_.DatabaseName -ne "Master"}).DatabaseName

    #选择新的服务层级和性能级别

    $NewEdition = "Standard"

    $NewPerformanceLevel = "S0"

    # 更改服务层级/性能级别

    $ScaleRequest = Set-AzureRmSqlDatabase -DatabaseName $DatabaseName -ServerName
    $ServerName -ResourceGroupName $ResourceGroup -Edition $NewEdition -RequestedServiceObjectiveName
    $NewPerformanceLevel

    ```


    清单 10-1. 用于更改 Azure SQL 数据库服务层级和性能级别的 PowerShell 脚本


    ### 使用 Azure 门户更改服务层级或性能级别


    Azure 管理门户提供一键式机制来更改数据库的服务层级或性能级别。图 10-1 和 10-2 展示了如何使用 Azure 管理门户更改 Azure SQL
    数据库的服务层级和性能级别。


    ![A371128_1_En_10_Fig2_HTML.jpg](img/A371128_1_En_10_Fig2_HTML.jpg)


    图 10-2. 选择新的性能级别


    ![A371128_1_En_10_Fig1_HTML.jpg](img/A371128_1_En_10_Fig1_HTML.jpg)


    图 10-1. 使用 Azure 门户更改数据库服务层级


    ## Azure SQL 性能优化功能


    Azure SQL 数据库提供了一些有用的功能，可用于优化 SQL 数据库的性能。其中最重要的功能包括：


    *   内存中优化

    *   查询性能见解

    *   SQL 数据库索引顾问


    ### 内存中优化


    Azure SQL 数据库中的内存中优化功能与 Microsoft SQL Server 2014（及即将推出的 SQL 2016）中的功能非常相似。内存中优化（内存中表和本机编译的存储过程）以及列存储索引可用于提高
    OLTP 和分析工作负载的性能。此外，两者的结合可用于提供接近实时的分析。


    ### SQL 数据库索引顾问


    Azure SQL 数据库索引顾问为 SQL 数据库提供建议，指出应创建（当前仅限非聚集索引）或删除（当前仅限重复索引）哪些索引。可以将索引顾问配置为自动将索引建议应用到数据库。如果建议无助于性能，可以轻松回滚。自动化索引建议需要在
    Azure SQL 数据库上启用查询存储。


    可以通过 Azure 门户访问索引建议，如图 10-3 所示。


    ![A371128_1_En_10_Fig3_HTML.jpg](img/A371128_1_En_10_Fig3_HTML.jpg)


    图 10-3. 在 Azure 门户上访问索引顾问


    要获得索引建议，数据库需要有大量持续的使用量和活动。与不一致的一次性突发活动相比，在活动持续的情况下，索引顾问能提供更好的建议。如图 10-4 所示，可以配置顾问设置以自动创建或删除建议的索引。请注意，这将是一项在线操作，可能会影响正在数据库上运行的查询。


    ![A371128_1_En_10_Fig4_HTML.jpg](img/A371128_1_En_10_Fig4_HTML.jpg)


    图 10-4. 配置索引顾问设置


    如果有可用的索引建议，它们将显示在页面上。如果没有建议，顾问会提供原因说明。例如，在图 10-4 中，没有任何建议的原因是数据库上缺少活动。


    ### SQL 数据库查询性能见解


    查询性能见解提供了一种非常简化的方法来监控和排查 Azure SQL 数据库的性能问题。查询性能见解需要查询存储才能运行，并可提供有关查询性能和 DTU 消耗的详细信息。


    可以从 Azure SQL 数据库的“设置”页面访问查询性能见解，如图 10-5 所示。


    ![A371128_1_En_10_Fig5_HTML.jpg](img/A371128_1_En_10_Fig5_HTML.jpg)


    图 10-5. 查询性能见解


    查询性能见解可用于确定整体 DTU 利用率以及每个查询的利用率。可以从门户访问每个查询的执行详细信息。例如，如图 10-6 所示，您可以看到查询文本以及该查询相应的
    CPU 和 DTU 使用情况。可以调整查询性能见解设置，以显示不同时间段和不同数量查询的统计数据，如图 10-7 所示。


    ![A371128_1_En_10_Fig7_HTML.jpg](img/A371128_1_En_10_Fig7_HTML.jpg)


    图 10-7. 查询性能见解设置


    ![A371128_1_En_10_Fig6_HTML.jpg](img/A371128_1_En_10_Fig6_HTML.jpg)


    图 10-6. 详细的查询性能详情


    查询性能见解基于查询存储，而查询存储有可能会耗尽存储空间。当查询存储耗尽存储空间时，它将进入只读模式，从而无法再存储任何查询性能数据。为查询存储设置正确的保留和清理策略非常重要。可以将清理设置为
    `AUTO`（当达到大小限制时 SQL 将运行清理）或基于时间的保留策略。


    ```

    ALTER DATABASE [YourDB]

    SET QUERY_STORE (SIZE_BASED_CLEANUP_MODE = AUTO);

    ALTER DATABASE [YourDB]

    SET QUERY_STORE (CLEANUP_POLICY = (STALE_QUERY_THRESHOLD_DAYS = 30));

    ```


    查询性能见解提供了一种很好的方法来找出有问题的查询并进行优化。例如，您可以获取消耗 CPU 最多的查询，并在它们对数据库产生重大性能影响之前对其进行调优。


    ## 监控 SQL 数据库


    Azure 提供多种方法来监控 SQL 数据库的性能、资源利用率和安全性。这可以使用 Azure 门户，或使用数据库和逻辑服务器级别公开的 DMV（动态管理视图），或使用可在
    SQL 数据库上配置的扩展事件来完成。'
- fmt: '### Using Azure Portal


    Azure Portal provides a very convenient way to monitor resource utilization for
    SQL Database. Counters like `CPU` percentage, `DTU` percentage, and so on, can
    be monitored from the Azure Portal. This information can be utilized to ensure
    optimal health of the database. The monitoring tab on the Azure Portal (under
    the database details) can be utilized to monitor the resource utilization for
    a database (see Figure 10-8). Also, the metrics and the time period settings can
    be configured using the Management Portal, as per the requirements (see Figure
    10-9).


    ![A371128_1_En_10_Fig9_HTML.jpg](A371128_1_En_10_Fig9_HTML.jpg)

    **Figure 10-9.** Configuring monitoring metrics


    ![A371128_1_En_10_Fig8_HTML.jpg](A371128_1_En_10_Fig8_HTML.jpg)

    **Figure 10-8.** Monitoring SQL Database resource utilization


    The monitoring graphs can be edited to add multiple other counters, as shown in
    Figure 10-9.

    Once the metrics have been configured, the resource utilization can be monitored
    on the Azure Portal, as illustrated in Figure 10-10.


    ![A371128_1_En_10_Fig10_HTML.jpg](A371128_1_En_10_Fig10_HTML.jpg)

    **Figure 10-10.** Monitoring metrics on the portal


    Azure Portal also allows users to configure alerts against any of the available
    metrics (see Figure 10-11). For example, you can set up an e-mail based alert
    to indicate if the database crosses `80%` of the maximum allowed size for the
    performance level, or if the `DTU` utilization percentage crosses `80%` of the
    `DTU`s for that service tier. This information can be used to determine if the
    database performance level needs to be changed.


    ![A371128_1_En_10_Fig11_HTML.jpg](A371128_1_En_10_Fig11_HTML.jpg)

    **Figure 10-11.** Configure alerts for resource utilization metrics


    The alerts can be configured with the desired threshold values and can be configured
    to send e-mails to admins or other users. These settings can be changed using
    the **Add an Alert Rule** page (see Figure 10-12).


    ![A371128_1_En_10_Fig12_HTML.jpg](A371128_1_En_10_Fig12_HTML.jpg)

    **Figure 10-12.** Configuring alert properties


    ### Using DMV and Catalog Views


    `DMV`s and catalog views exposed for both the database and logical servers can
    be used to report and/or monitor the performance, resource utilization, database
    object details, query execution information, and so on, of a SQL database and
    the logical server.


    Running queries against the catalog view and `DMV`s requires `View Server State`
    and `View Database State` permissions. Some of the most commonly used `DMV`s are
    mentioned next.


    #### Resource Utilization


    Detailed information about the resource utilization (both at the logical server
    level and the database level) can also be obtained using the catalog views available
    with Azure SQL Database.


    *   `sys.resource_stats`. Provides resource utilization information at the logical
    server level. The information is collected every five minutes for all the databases
    running on the logical server.

    *   `sys.dm_db_resource_stats`. Provides resource utilization information for
    the database. This information is collected every `15` seconds.

    *   `sys.event_log`. Provides information about connectivity, throttling, and
    deadlock events on the databases.


    #### Database Related Information


    As with resource related `DMV`s and catalog views, Azure SQL Database also provides
    a number of `DMV`s and catalog view to provide database-related information like
    the space usage, wait statistics, etc.


    *   `sys.dm_db_file_space_usage`. Provides information about the space usage in
    the database.

    *   `sys.dm_db_wait_stats`. Provides wait statistics information for all the operations
    in the database level. This `DMV` can be utilized to diagnose performance issues
    with the database and other query execution.

    *   `sys.dm_database_copies`. Provides information about the geo-replication copies
    for the database. Details like `maximum_lag` and `replication_state_desc` can
    be used to determine the latency and status of replication.


    #### Execution Related Information


    Most of the execution related `DMV`s available with Microsoft SQL Server are also
    available with Azure SQL Databases and can be used to determine the performance
    issues, execution related issues, etc. The following are some of the commonly
    used `DMV`s:


    *   `sys.dm_exec_requests`/`sys.dm_exec_sessions`/`sys.dm_exec_connections`. Provides
    information about the sessions connected to (or active requests executing on)
    the Azure SQL Database.

    *   `sys.dm_exec_query_stats`, `sys.dm_exec_function_stats`, `sys.dm_exec_procedure_stats`,
    `sys.dm_exec_trigger_stats`. Provide aggregated execution statistics for queries,
    procedures, functions, and triggers, respectively. These `DMV`s can be utilized
    to determine the top duration/CPU consuming/read/write queries executing on the
    server. Entries from these `DMV`s are removed when the corresponding queries or
    objects are removed from the cache.

    *   `sys.dm_exec_query_memory_grants`. Provides information about memory grants
    (pending or granted) for each query running on the database.


    Other `DMV`s are available with Azure SQL Database to monitor various details
    like database indexes, security of the database or the logical server, etc. A
    complete list of all the `DMV`s is available on `MSDN`.'
