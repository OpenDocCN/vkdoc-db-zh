    *   You can now leverage the Microsoft Azure ecosystem of applications and build
    a highly scalable application.


    However, when you go with this hybrid infrastructure, there are few factors to
    consider:


    *   You may have to think over maintaining the hybrid infrastructure, as there
    are additional components to it like a firewall, virtual networks, routing devices,
    etc.

    *   Managing and accessing the resources involves different sorts of applications,
    thus classic consolidation could be a challenge.

    *   Before moving to the cloud, you should evaluate the complexity, perform risk
    assessment, and do a benchmark study on the feasibility.


    The applications, tools, and services running on either side are not always interoperable.
    There are several applications that cannot quite cross these boundaries and thus
    it is important for you to evaluate the pros and the cons.'
  trans: '

    # 6. SQL 混合解决方案


    在当今 IT 行业充满活力的商业环境中，正发生着巨大的范式转变。您需要通过降低总拥有成本 (TCO) 并最大化投资回报，来不断创新和发展业务。Microsoft
    Azure 为您提供了一个完美的平台，通过整合公共云资源和私有云资源来实现这一点。混合云使用的经典案例是将敏感数据存储在本地数据中心，并连接到其他数据所在的公共云。


    混合云在您的本地数据中心和公共云之间架起了一座桥梁。Microsoft 的云方法非常独特，因为其云中的数据中心所使用的服务器具有一致性。任何客户都可以根据自身需求优化资源，将关键和安全的数据存储在本地数据中心，并通过将工作负载卸载到云端来利用存储成本，从而实现扩展而不会实际影响成本。


    SQL Server 与 Azure 的云服务集成得非常好，提供端到端的体验，使用您所熟悉的 `T-SQL` 或 `PowerShell` 相同的界面。混合环境是指资源既来自云端，也来自本地站点的环境。这些资源包括物理机、虚拟机、存储
    (SAN、云存储)、数据中心 (用于 AD、登录策略等) 以及数据库。因此，您可以设想几种运行混合环境的方式。例如，您可以有一个运行在本地的 SQL Server，并使用云资源。或者，您的
    SQL Server 在云端运行，同时使用本地资源。当我们考虑采用混合方式，让运行在本地环境中的 SQL Server 与云通信时，我们使用两种资源：`Azure
    存储` 和 `Azure 虚拟机`。


    Microsoft Azure 使您能够以极低的风险存储海量数据，因为数据会被写入多个副本。除此之外，还有自动磁盘修复功能，它会运行校验和以确保数据在逻辑上是一致的。


    如果校验和不匹配，我们会自动将该磁盘移除，并立即创建另一个副本。这意味着在任何时候都拥有数据的三个副本。成本也很低，这是客户转向 Azure 的原因之一。另一个重要资源是
    Azure 中提供的虚拟机。这些虚拟机具有高可用性，提供自动虚拟机修复功能，提供多种尺寸供您选择，并且是极佳的成本节约方案。


    图 6-1 展示了我们可以利用云基础设施来节省成本的不同场景。例如，我们可以将备份存储到 `Azure 存储`，将 SQL Server 文件存储在 `Azure
    存储`，并使用 `AlwaysOn` 技术来扩展本地基础设施，并在云端配置一个辅助站点。我们将在本章后面详细探讨这些内容。


    ![A371128_1_En_6_Fig1_HTML.jpg](img/A371128_1_En_6_Fig1_HTML.jpg)


    **图 6-1.** 使用 Azure 存储进行本地集成


    ## 混合模型概览


    混合模型提供以下优势：


    *   您的业务决策变得敏捷，并且可以基于此模型快速决策使资源可用。

    *   您无需浪费时间在准备机器（硬件/软件）上；相反，您可以专注于更高效的业务逻辑或满足客户需求。

    *   您现在可以利用 Microsoft Azure 应用程序生态系统，构建高度可扩展的应用程序。


    但是，当您采用这种混合基础设施时，需要考虑几个因素：


    *   您可能需要考虑维护混合基础设施的问题，因为它涉及额外的组件，如防火墙、虚拟网络、路由设备等。

    *   管理和访问资源涉及不同类型的应用程序，因此经典整合可能是一个挑战。

    *   在迁移到云端之前，您应评估复杂性，进行风险评估，并对可行性进行基准研究。


    运行在任一侧的应用程序、工具和服务并不总是可互操作的。有若干应用程序无法轻易跨越这些边界，因此对您来说，评估利弊非常重要。

    '
- fmt: '## 备份到 Azure 存储


    SQL Server 2014 增强了 `BackuptoUrl` 功能，现在可以直接执行备份并将文件存储到 Microsoft Azure 存储中。通过这种方式，你可以将本地、Azure
    虚拟机上的数据库备份存储在 Azure 存储中，并利用 Azure 存储的特性（如内置的数据冗余和复制功能，用于设计你的大规模可扩展灾难恢复策略）。这是通过
    REST API 而非 HTTP 来与 Azure 存储交互实现的。基本上，你需要以下条件：


    *   Microsoft Azure 账户

    *   Azure 存储账户

    *   存储账户内的容器

    *   SAS 密钥


    你可以在此处阅读更多关于 `SAS` 密钥的信息：[`https://azure.microsoft.com/en-us/documentation/articles/storage-dotnet-shared-access-signature-part-1/`](https://azure.microsoft.com/en-us/documentation/articles/storage-dotnet-shared-access-signature-part-1/)。


    图 6-2 描绘了备份和还原功能，其中备份存储在 Azure 存储中。你可以轻松地从那里执行还原。


    ![A371128_1_En_6_Fig2_HTML.jpg](A371128_1_En_6_Fig2_HTML.jpg)


    图 6-2. Azure 存储中的备份


    在 SQL 2014 中，我们使用 `Backup2Url` 或 `Smart Backup` 来完成备份。这些备份以前存储在页面 blob 中。页面 blob
    针对随机读写进行了优化。在 SQL 2016 中，此功能得到增强并提升到了一个新的水平，你可以备份到块 blob，这对客户来说应该更经济。除此之外，这种架构还有一些优点。备份/还原可以针对条带集进行，这在页面
    blob 或 `Backup2Url` 下是不可能的。对 blob 的备份进行了一些增强，这将进一步提升还原体验。


    图 6-3 展示了如何利用混合环境，并将数据库的备份（此处为完整事务日志备份）存储在 Azure 存储中，从而帮助业务降低总体拥有成本。


    ![A371128_1_En_6_Fig3_HTML.jpg](A371128_1_En_6_Fig3_HTML.jpg)


    图 6-3. Microsoft Azure 存储中的数据库备份文件


    以下脚本将帮助你备份数据库，如下所示。有两个主要步骤：创建凭据，然后向 Azure 发出备份数据库命令。


    ### 步骤 1：为备份到 Azure 创建凭据


    ```sql

    IF NOT EXISTS

    (SELECT * FROM sys.credentials

    WHERE credential_identity = ''mycredential'')

    CREATE CREDENTIAL mycredential WITH IDENTITY = ''cred1''

    ,SECRET = ''SAS Key'' ;

    ```


    你可以从管理门户获取 `SAS` 密钥：


    ```

    旧/经典门户 :-

    a) 单击存储账户

    b) 单击“管理访问密钥”。

    c) 你将找到访问存储账户的主密钥和辅助密钥。

    注意：- 单击存储账户后，单击“容器”选项卡，你可以使用此处的“添加”选项添加一个名为 testcontainer 的容器。

    新门户 :-

    a) 创建存储账户

    b) 单击存储账户

    c) 在“设置”下，单击“访问密钥”

    d) 你将在存储账户名下找到主密钥和辅助密钥。

    ```


    在新门户中，单击存储账户，然后单击 Blob 服务，如图 6-4 所示。你将看到不同的存储服务。


    ![A371128_1_En_6_Fig4_HTML.jpg](A371128_1_En_6_Fig4_HTML.jpg)


    图 6-4. 新门户中显示的存储服务


    你可以使用图 6-5 中所示的 `+` 号添加容器。当你单击 Blobs 服务（见图 6-4）时，你将获得不同的选项，如图 6-5 所示。


    ![A371128_1_En_6_Fig5_HTML.jpg](A371128_1_En_6_Fig5_HTML.jpg)


    图 6-5. 向新门户添加容器


    现在将容器命名为 `testcontainer` 并选择适当的访问类型，如下所示。


    ### 步骤 2：发出备份数据库命令以备份到 Azure


    ```sql

    BACKUP DATABASE DB1

    TO URL =''https://storageaccountname.blob.core.windows.net/testcontainer/DB1_Full.bak''

    WITH CREDENTIAL = ''cred1'',

    COMPRESSION,

    STATS = 5;

    GO

    BACKUP DATABASE DB2

    TO URL =''https://storageaccountname.blob.core.windows.net/testcontainer/DB2_Full.bak''

    WITH CREDENTIAL = ''cred1'',

    COMPRESSION,

    STATS = 5;

    GO

    ```


    类似地，你也可以将日志文件备份到 Azure 存储账户的容器中。'
  raw: '## Backups to Azure Storage


    With SQL Server 2014 BackuptoUrl was enhanced and can now perform the backups
    and store the files directly on to the Microsoft Azure Storage. This way, you
    can store database backups from on-premises, Azure VMs to store backups in Azure
    storage, and leverage the features of Azure storage (built-in redundancy and replication
    of data for designing your DR strategy massively scalable). This is accomplished
    through a REST API instead of HTTP to interact with the Azure storage. Basically,
    all you need are the following:


    *   Microsoft Azure account

    *   Azure storage account

    *   Container inside the storage account

    *   SAS key


    You can read more about the SAS keys here: [`https://azure.microsoft.com/en-us/documentation/articles/storage-dotnet-shared-access-signature-part-1/`](https://azure.microsoft.com/en-us/documentation/articles/storage-dotnet-shared-access-signature-part-1/)
    .


    Figure [6-2](#A371128_1_En_6_Chapter.html#Fig2) depicts the backup and restore
    feature, where the backups are stored within Azure storage . You can easily perform
    a restore from there.


    ![A371128_1_En_6_Fig2_HTML.jpg](A371128_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    Backup in Azure storage


    With SQL 2014, we used the Backup2Url or the Smart Backup to accomplish the backups.
    The backups used to be in page blobs. Page blobs are optimized for random reads
    and writes. With SQL 2016, this feature is enhanced and will be taken to the next
    level where you can backup to block blobs, which is supposed to be more economical
    for the customers. Apart from this, there are few advantages of this architecture.
    The Backup/Restore can be done to/from stripped sets, which was not possible with
    page blobs or Backup2Url. There have been some enhancements made with backup to
    blobs, which will further enhance the restore experience.


    Figure [6-3](#A371128_1_En_6_Chapter.html#Fig3) shows how you can leverage the
    hybrid environment and store the backups (Full Transactional here) of the databases
    in Azure storage, thereby helping business reduce total cost.


    ![A371128_1_En_6_Fig3_HTML.jpg](A371128_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Database backup files in Microsoft Azure Storage


    The following script will help you back up the databases as shown. There are two
    main steps: you create credentials and then issue backup database command to Azure.


    Step 1: Create credentials for backups to Azure


    ```

    IF NOT EXISTS

    (SELECT * FROM sys.credentials

    WHERE credential_identity = ''mycredential'')

    CREATE CREDENTIAL mycredential WITH IDENTITY = ''cred1''

    ,SECRET = ''SAS Key'' ;

    ```


    You can get the SAS key from the Management portal:


    ```

    Old/Classic Portal :-

    a) Click on the storage account

    b) Click on the Manage Access keys.

    c) You will find the primary and the secondary keys to access the storage account.

    N.B:- Once you click on the storage account, click the “Containers” Tab, you can
    add a container and call it as testcontainer using the Add option here.

    New Portal:-

    a) Create the Storage account

    b) Click on the storage account

    c) Under Settings , Click Access keys

    d) You will find the primary and secondary keys under the storage account name.

    ```


    In the new portal, click on the storage account and then on the blob services,
    as shown in Figure [6-4](#A371128_1_En_6_Chapter.html#Fig4). You’ll see different
    storage services.


    ![A371128_1_En_6_Fig4_HTML.jpg](A371128_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Storage services as shown in the new portal


    You can add the container using the `+` sign shown in Figure [6-5](#A371128_1_En_6_Chapter.html#Fig5).
    As you click on the Blobs service (see Figure [6-4](#A371128_1_En_6_Chapter.html#Fig4)),
    you will get the different options, as shown in Figure [6-5](#A371128_1_En_6_Chapter.html#Fig5).


    ![A371128_1_En_6_Fig5_HTML.jpg](A371128_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    Adding a container to the new portal


    Now name the container `testcontainer` and choose the appropriate access type,
    as follows.


    Step 2: Issue a backup database command for backups to Azure


    ```

    BACKUP DATABASE DB1

    TO URL =''https://storageaccountname.blob.core.windows.net/testcontainer/DB1_Full.bak''

    WITH CREDENTIAL = ''cred1'',

    COMPRESSION,

    STATS = 5;

    GO

    BACKUP DATABASE DB2

    TO URL =''https://storageaccountname.blob.core.windows.net/testcontainer/DB2_Full.bak''

    WITH CREDENTIAL = ''cred1'',

    COMPRESSION,

    STATS = 5;

    GO

    ```


    Similarly, you can also back up the log files to the container in the Azure storage
    account.'
