    6.  From this screen, click on the Replica tab and then click the Add Azure Replica
    button.

    7.  Now download the certificate or use an existing one (see Figure [6-11](#A371128_1_En_6_Chapter.html#Fig11)).


    ![A371128_1_En_6_Fig11_HTML.jpg](A371128_1_En_6_Fig11_HTML.jpg)


    Figure 6-11. Certificate download screen You should populate these fields, as
    this information is crucial and will be used in creating the new Azure replica.

    8.  After this, you will be back to the Add Azure Replica page, where you need
    to validate/provide the information in the other tabs, such as backup preference
    and endpoints.

    9.  Select the data synchronization type as per your business requirement. You
    can read more here: `` `https://msdn.microsoft.com/library/hh231021.aspx` ``.


    Once you’re done, you can review the validation page, correct the issues identified,
    and re-run the wizard. Once you’re done, you will have a replica in Microsoft
    Azure. You should create a listener for the clients to connect to the replicas.
    The listener redirects the incoming requests to the primary or the secondary replica.
    Refer to the Azure documentation or the links provided next to explore this concept
    and its implementation more.


    ## Summary


    In today''s world, managing resources more effectively by utilizing the power
    of Microsoft Azure platform is critical for your business. You can be more agile
    and manage your resources more efficiently. You can extend your on-premises data
    center with the Microsoft public cloud and leverage the so-called hybrid model,
    which gives you a chance to leverage the best of both environments. With this
    model you can easily move your business and workloads from different data centers.
    Today, your application is capable of taking advantage of the public cloud using
    Microsoft Azure storage, storing backups, and securely storing your data, all
    the while seamlessly working on your existing private cloud environment.


    # 7. All About Performance


    In the previous chapters, we talked about deploying the SQL Server instance in
    various combinations on an Azure Virtual Machine (Azure VM). We had touched upon
    a few of the best practices that would allow you to get an optimal configuration
    from the get-go. However, there might be scenarios where you would need to run
    health checks on your environment to ensure that is configured for optimal performance.
    Additionally, you might feel the need to run an impromptu health check while troubleshooting
    performance problems for a SQL Server instance running on an Azure VM. In this
    chapter, we will discuss the similarities and the differences that you would need
    to keep in mind while optimizing for performance for a SQL Server environment
    hosted on an Azure VM.


    If you needed to understand the value of following best practices and recommendations
    on Azure, then it would be best explained with the example of post-sales servicing
    for an ultra-luxury car and an economy sedan or SUV. If you buy an ultra-luxury
    car, then the trips to the service center are mighty heavy on the pocket, cost
    a small fortune, and over the years can fund an economy sedan. While the ultra-luxury
    car does have the snob value, feels luxurious, and is eye catching, it does nothing
    from a common sense economics standpoint. So if you want your post sales (i.e.
    post deployment in Azure) to be economical, efficient, and high performing, then
    you need to pay extra care to the best practices. Simple things like the location
    of your application and database services can be your best friend and worst enemy.


    One of the most common pitfalls in Azure is that the driving principles of choosing
    your compute and storage remain the same. However, the onus on choosing the configuration
    is now on the software application management team rather than the hardware procurement
    team. An important point to keep in mind as well is multi-tenancy. In a multi-tenant
    world, everyone has the same SLAs. Physically accessing the hardware is not possible
    and you are so far abstracted from the actual backend that system provides the
    functionality as a service. The very concept of “as a service” in today''s world
    works on the principle of commoditizing hardware, abstracting the internals, and
    providing the components the customer needs.


    Note


    All the `PowerShell` script examples are available in the following project on
    GitHub repository: `` `github.com/amitmsft/SqlOnAzureVM` ``. The `PowerShell`
    samples in this chapter assume that the virtual machine is deployed under the
    `Resource Manager` model and you already have `Azure Resource Manager` `cmdlets`
    installed on the server where these `PowerShell` scripts are being executed. The
    `PowerShell` script files can be downloaded from the GitHub repository mentioned
    earlier in this chapter or can be executed by saving the snippets as `` `.ps1`
    `` files. The examples shown in this chapter assume that the scripts will be executed
    on a machine that has the SQL Server instance being assessed.


    ## Understanding the Virtual Machine Performance


    Virtualization has become a ubiquitous term with IT environments today. There
    was a wave in the industry to gravitate toward virtualization and now there is
    a wave to gravitate toward the cloud. Since Infrastructure as a Service (IaaS)
    closely resembles what a virtual environment would like in a private data center,
    there are similarities that can be pitfalls and there are differences that you
    should be aware of. In Chapter [2](#A371128_1_En_2_Chapter.html), we talked about
    the Azure architecture, which showed that there are a large number of components
    that bind the compute and storage components into a virtual machine. This environment
    may look like your on-premises virtual machine but it’s vastly different from
    it under the hood. In this section, we will talk about the best practices that
    are required to run your SQL Server instance optimally without incurring any performance
    penalties due to misconfigurations or failure to follow best practices. Let’s
    first take a look at compute and storage performance aspects.'
