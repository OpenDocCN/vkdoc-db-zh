    # 自动化的自动化


    > 熟悉滋生轻视。——伊索


    当你最初开始使用 ARM cmdlet 时，不应轻视这句名言。在编写 Azure ARM 部署的自动化脚本时，请保持文档打开以供参考，因为如果你曾使用 PowerShell
    在经典部署模型下进行过部署，那么肌肉记忆确实会占据主导地位。


    如果你管理的企业需要在 Azure 上置备数百台虚拟机来托管 SQL Server 实例和其他应用程序，你可能会感受到自动化前面章节中所示步骤的需求。这种“对自动化进行自动化”的需求在企业中实际上非常普遍。Azure
    允许你利用 REST API、Azure CLI 和 PowerShell 来自动化虚拟机的部署。


    ## 用于 Azure 自动化的 PowerShell


    当有自动化需求时，PowerShell 总是来救场，Azure 有什么理由例外呢？如果你熟悉经典部署模型的 Azure PowerShell cmdlet，那么大多数
    ARM PowerShell cmdlet 也将很容易适应。较旧的 Azure PowerShell `0.9.x` 版本要求你在 Azure 资源管理器
    (`ARM`) 和 Azure 服务管理 (`ASM`，用于管理经典部署模型虚拟机) 之间切换。然而，使用 Azure PowerShell `1.0`，你不再需要在
    `ARM` 和 `ASM` 之间切换。我们将在本章讨论中使用的所有 cmdlet 都基于 Azure PowerShell `1.0`（于 2015 年 11
    月发布）。有相当多的 cmdlet 在你习惯的 Azure PowerShell `0.9.x` 版本 cmdlet 中间插入了一个 `"Rm"` 子串。一个例子是
    `Get-AzureRM`，它在 `ARM` 环境中有一个等效的 cmdlet 叫做 `Get-AzureRmVM`。


    ## 安装 Azure PowerShell 模块


    在开始使用 Azure PowerShell 模块之前，你需要使用以下命令从管理员权限的 PowerShell ISE 或命令窗口中安装它们：


    ```

    # 从 PowerShell 库安装 Azure Resource Manager 模块

    Install-Module AzureRM

    Install-AzureRM

    # 导入给定版本清单的 AzureRM 模块

    Import-AzureRM

    ```


    请记住，错误使用 cmdlet 的问题只有在 cmdlet 执行时才会暴露出来。对于 cmdlet 的错误使用没有执行前的检查。因此，如果你的最后一个 cmdlet
    失败了，并且它是单个原子自动化块的一部分，你将不得不重复执行该 cmdlet。专业人士曾经多次被知晓在 `ARM` 环境中使用了经典部署 cmdlet 并遭遇
    PowerShell 异常的“怒火”！


    ## 将部署过程脚本化


    既然上一节将基于门户的部署描述为一个旅程，让我们再次以脚本化的方式走一遍这个旅程。由于你将无法使用方便的鼠标点击，你将不得不将 UI 在底层所做的一切都脚本化，从登录到正确的订阅开始。


    ### 登录 Azure 订阅


    以下代码展示了如何登录你的 Azure 帐户并选择适当的订阅。


    ```

    ## 参数

    $vSubscriptionName = "" # 如果你有多个订阅则必填

    ## 导入 AzureRM

    Import-AzureRM

    ## 登录 Azure 并选择正确的订阅

    Login-AzureRmAccount

    Get-AzureRmSubscription –SubscriptionName $vSubscriptionName | Select-AzureRmSubscription

    ```


    **代码清单 5-1.** 用于登录 Azure 订阅的 PowerShell 代码


    ### 创建资源组和存储帐户


    登录 Azure 帐户并选择了正确的订阅（如果你有多个访问权限）后，你需要创建资源管理器组、存储帐户以及构建虚拟机所需的其他依赖资源，或者使用现有的资源。本章假设你将从头开始创建所有内容。首要任务是创建一个资源组和一个用于托管虚拟机虚拟硬盘的存储帐户。


    ```

    ## 参数

    $vResourceGroupName = ""

    $vRegion = ""

    $vStorageAccountName = ""

    ## 创建新的资源组

    ## 在创建任何资源之前都需要一个 Azure 资源组

    New-AzureRmResourceGroup -Name $vResourceGroupName -Location $vRegion

    ## 创建存储帐户并将其与资源组关联

    New-AzureRmStorageAccount -ResourceGroupName $vResourceGroupName -Location $vRegion
    -Name $vStorageAccountName -Type Standard_LRS

    ## 将当前存储帐户上下文设置为新创建的存储帐户

    Set-AzureRmCurrentStorageAccount -ResourceGroupName $vResourceGroupName -StorageAccountName
    $vStorageAccountName

    ```


    **代码清单 5-2.** 用于创建资源组和与该资源组关联的存储帐户的 PowerShell 命令


    ## 选择虚拟机映像和大小


    现在你已经为虚拟硬盘准备好了容器，也为正在创建的资源准备好了逻辑容器，让我们继续进行映像选择。这有点复杂，因为映像更新相当频繁，你需要基于当前可用列表进行枚举。由于我们在本章前面使用了
    SQL Server 2016 映像，我们将努力在这个旅程中做同样的事情。另一个你需要最终确定的选择是虚拟映像大小。以下代码使用 `Get-AzureRmVMSize`
    获取该区域中所有可用虚拟机大小的列表。


    ```

    $vRegion = "WestUS"

    ## 获取提供的 VM 列表，然后根据最新的 SQL Server 2016 可用映像进行选择

    Get-AzureRmVMImageOffer -Location $vRegion -PublisherName "MicrosoftSQLServer"
    | Where-Object {$_.Offer -like "*SQL2016*"}

    $vImageSelection = Get-AzureRmVMImage -Offer "SQL2016CTP3.3-WS2012R2" -PublisherName
    "MicrosoftSQLServer" -Skus "Evaluation" -Location $vRegion

    ## 获取可用的虚拟机大小并选择合适的大小

    Get-AzureRmVMSize -Location $vRegion | Where-Object {$_.MemoryInMB -ge 8192 -and
    $_.NumberOfCores -ge 4} | ft

    $vImageSize = "Standard_DS3"

    ```


    **代码清单 5-3.** 用于选择库中可用的虚拟机大小和最新 SQL Server 2016 映像的 PowerShell 代码


    ## 配置可用性集和网络


    如果你想部署一个可用性集，你需要使用 `New-AzureRmAvailabilitySet` cmdlet 来创建一个新的可用性集，并将正在置备的虚拟机添加进去。下一个任务是创建虚拟网络。如果你使用的是独立的
    SQL Server 实例，你并不需要一个可用性集。但是，如果你正在部署一个可用性组，那么就需要一个可用性集来完成配置。如果你使用库中提供的模板部署可用性组，你会注意到可用性集是部署的一部分。


    ```

    $vNetName = "TigerNet"

    ## 为虚拟网络创建子网配置

    $vSubnet = New-AzureRmVirtualNetworkSubnetConfig -Name "TigerSubnet" -AddressPrefix
    "10.0.0.0/24"

    ## 创建虚拟网络

    $vVNet = New-AzureRmVirtualNetwork -Location $vRegion -Name $vNetName -ResourceGroupName
    $vResourceGroupName -Subnet $vSubnet -AddressPrefix "10.0.0.0/24"

    $vNet = Get-AzureRmVirtualNetwork -Name $vNetName  -ResourceGroupName $vResourceGroupName

    $vNetInterface = New-AzureRmNetworkInterface -Name "vNetInterface" -ResourceGroupName
    $vResourceGroupName -Location $vNet.Location -SubnetId $vNet.Subnets[0].Id

    ```


    **代码清单 5-4.** 用于创建 ARM 虚拟网络的示例代码


    ## 置备虚拟机


    现在你拥有了实际创建虚拟机的所有必要组成部分。以下代码将前面章节中完成的映像大小、机器配置和映像配置结合在一起，并向 Azure 请求一台具有所提供配置设置的新虚拟机。

    '
