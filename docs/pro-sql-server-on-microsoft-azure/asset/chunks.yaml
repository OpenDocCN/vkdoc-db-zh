- fmt: '## Azure SQL Database 与 Azure VM 上的 SQL Server


    对于组织和 Azure 用户而言，一个关键决策点是为他们的关系数据库需求部署 **Azure SQL Database** 还是 **Azure VM 上的
    SQL Server**。Azure SQL 数据库和 Azure VM 上的 SQL 针对不同的需求进行了优化。


    当需要配置和管理大量数据库时，Azure SQL 数据库非常适用。由于它是一种 PaaS 产品，所有的管理和打补丁开销都由供应商负责，这有助于组织和用户专注于数据库的设计和使用。Azure
    SQL 数据库针对需要快速上市时间和较低成本要求的场景进行了优化。


    Azure SQL 数据库不提供所有外围功能，如复制、SQL Server 代理等，因此对于严重依赖此类功能的组织来说，Azure SQL 数据库不是一个好的选择。


    Azure VM 上的 SQL Server 针对希望将本地部署扩展到云端的组织进行了优化。由于在 Azure VM 上运行的 SQL Server 引擎与本地环境上运行的引擎完全相同，因此组织更容易将其
    SQL 工作负载“直接迁移”到 Azure。通过在 Azure VM 上运行 SQL Server，组织的 IT 团队对虚拟机拥有完全的管理控制权。


    表 [8-1](#A371128_1_En_8_Chapter.html#Tab1) 总结了 Azure SQL 数据库与 Azure VM 上的 SQL
    Server 之间的主要区别。


    ### 表 8-1. Azure SQL 数据库 vs. Azure VM 上的 SQL Server


    | 特性 | Azure SQL 数据库 | Azure VM 上的 SQL Server |

    | --- | --- | --- |

    | 数据库大小 | P11 性能级别下最大可用 1 TB。 | 数据库最大大小受 VM 大小的限制。例如，在 D14 机器上，最多可以有 32 个数据磁盘，每个磁盘最大
    1 TB。因此，理论上可以有一个 32 TB 的数据库。 |

    | 计算资源 | 无法直接控制计算资源。由于计算资源以 DTU 表示，组织需要对其性能需求进行性能基准测试。 | 对 SQL Server 部署的计算资源拥有完全控制权。
    |

    | 总拥有成本 | 完全消除了对硬件或管理环境的 IT 资源的需求。 | 消除了对硬件的需求，但组织仍然需要一个 IT 团队来管理虚拟机。 |

    | 业务连续性 | 默认提供以下功能：<br>1. 内置容错和本地（同一数据中心）冗余以实现高可用性。<br>2. 自动备份（保留期取决于服务层级）。<br>3.
    地理复制和时间点数据库还原等选项。 | 1. Azure 基础结构为虚拟机提供容错和高可用性。<br>2. SQL 级别的高可用性和灾难恢复选项需要由 IT
    团队配置。<br>3. 实现高可用性通常需要配置新虚拟机，这会增加管理和打补丁的开销。 |

    | SQL 引擎功能 | 支持传统盒装 SQL Server 几乎所有的数据库级别功能，但不支持外围功能，如 SQL Server 代理作业、复制（仅支持作为订阅者）、日志传送等。
    | Azure VM 上的 SQL Server 运行与传统盒装产品相同的 SQL Server 引擎版本。 |

    | 使用场景 | 1. 开发和营销有时间限制的新云设计应用程序。<br>2. 需要内置高可用性、灾难恢复和升级机制的应用程序。<br>3. 没有资源管理底层操作系统和配置设置的组织或用户。<br>4.
    构建软件即服务（SaaS）应用程序。 | 1. 希望以对现有应用程序最小的更改迁移到云端的组织。<br>2. 需要访问 SQL Server 外部资源的应用程序或工作负载。<br>3.
    需要对其 SQL Server 部署拥有完全管理权限的组织。<br>4. 作为本地 SQL Server 部署的灾难恢复部署。 |

    | 可伸缩性 | 通过更改数据库的服务层级或性能级别可轻松扩展。这是一项在线操作，意味着在更改执行期间数据库将保持在线和可用。 | 可通过更改基础 VM 类型进行向上扩展。这是一项离线操作，并且会强制
    SQL Server 停机。 |


    ## 迁移到 Azure SQL 数据库


    无论是 Microsoft SQL Server 还是其他 RDBMS 产品（如 Oracle、DB2 等）上的现有关系数据库，都可以迁移到 Azure SQL
    数据库。从 Microsoft SQL Server 2005 及更高版本迁移时，您可以使用 `SQL Server Management Studio (SSMS)`
    或 `SQL Server Data Tools (SSDT)`；而从非 Microsoft RDBMS 产品迁移时，您需要使用可从 Microsoft 下载站点下载的
    `SQL Server Migration Assistant (SSMA)` 实用工具。


    在本章的剩余部分，我们将讨论将现有的 Microsoft SQL Server 数据库迁移到 Azure SQL 数据库。由于 Azure SQL 数据库不支持
    SQL Server 的全部功能集，因此确保现有数据库不使用 Azure SQL 数据库不支持的功能至关重要。您可以使用 `SQLPackage.exe`
    或 `SSMS` 来检查这一点。'
  raw: '## Azure SQL Database versus SQL Server on Azure VM


    One of the key decisions points for organization and Azure users is whether to
    deploy Azure SQL Database or SQL Server on Azure VMs for their relational database
    needs. Azure SQL Databases and SQL Server on Azure VM are optimized for different
    requirements.


    Azure SQL Database is great in scenarios when there is a need to provision and
    manage many databases. Given that it’s a PaaS offering, all the management and
    patching overhead is taken care of by the vendor, which helps organizations and
    users concentrate on just the design and usage of the database. Azure SQL databases
    are optimized for scenarios where there is a quick turnaround time (go-to market
    time) and lower cost requirements.


    Azure SQL Databases do not provide all the peripheral features like replication,
    SQL Server Agent, etc., so for organizations that rely heavily on such features,
    Azure SQL Databases would not be a good option.


    SQL Server on Azure VMs is optimized for scenarios where an organization is looking
    to extend its on-premises deployments to the cloud. Since the SQL Server engine
    running on an Azure VM is exactly the same as that running on your on-premises
    environments, it’s easier for organizations to lift-and-shift their SQL workloads
    to Azure. With SQL Server running on Azure VMs, the organization’s IT team has
    full administrative control over the VMs.


    Table [8-1](#A371128_1_En_8_Chapter.html#Tab1) summarizes the key differences
    between Azure SQL Database and SQL Server on Azure VMs.


    Table 8-1.


    Azure SQL Database vs. SQL Server on Azure VMs


    | Feature | Azure SQL Databases | SQL Server on Azure VMs |

    | --- | --- | --- |

    | Database size | Max 1TB available with P11 performance level. | Max database
    size constrained by the size of the VM. For example, on a D14 machine, you can
    have a maximum of 32 data disks, each of which is 1TB max. So theoretically, you
    can have a database that’s 32TB. |

    | Compute resources | No direct control over computing resources. Since the computing
    resources are represented as DTUs, the organization needs to performance benchmark
    their performance requirements. | Full control over the compute resources for
    the SQL Server deployments. |

    | Cost of ownership | Completely eliminates the need for hardware or IT resources
    to manage the environment. | Eliminates the need for hardware requirements, but
    organizations still need to have an IT team to manage the VMs. |

    | Business continuity | Provides the following by default: 1\. Built-in fault
    tolerance and local (same data center) redundancy for high availability. 2\. Automatic
    backups (retention period is dependent on the service tier). 3\. Options such
    as geo-replication and point-in-time restore of the databases. | 1\. Azure infrastructure
    provides fault-tolerance and high availability for the VMs. 2\. SQL level high-availability
    and disaster-recovery options need to be configured by the IT team. 3\. Achieving
    high-availability often requires provisioning new VMs, which can increase the
    management and pathing overheads. |

    | SQL engine features | Supports almost all the database level features available
    with traditional box SQL Server, but does not support peripheral features like
    SQL Server agent jobs, replication (only supported as a subscriber), log shipping,
    etc. | SQL Server on Azure VM is running the same SQL Server engine build as the
    traditional box product. |

    | Usage scenarios | 1\. New cloud-designed applications that have time constraints
    in development and marketing. 2\. Applications that need built-in high availability,
    disaster recovery, and upgrade mechanisms. 3\. organizations or users who do not
    have the resources to manage the underlying operating system and configuration
    settings. 4\. Building software as a service (SaaS) applications. | 1\. Organizations
    looking to migrate to the cloud with minimal changes to their existing applications.
    2\. Applications or workloads that require access to resources that are external
    to SQL Server. 3\. Organizations that require full administrative rights on their
    SQL Server deployments. 4\. As a DR deployment for on-premises SQL Server deployments.
    |

    | Scalability | Easily scalable by changing the service tiers or the performance
    level of the database. This is an online operation, which means the database would
    be online and available while the change is being performed. | Can be scaled up
    by changing the base VM type. This is an offline operation and would enforce downtime
    for the SQL Servers . |


    ## Migrating to Azure SQL Database


    Existing relational databases on either Microsoft SQL Server or on other RDBMS
    products like Oracle, DB2, etc. can be migrated to Azure SQL Database. When migrating
    from Microsoft SQL Server 2005 and above, you can use SQL Server Management Studio
    (SSMS) or SQL Server Data Tools (SSDT), whereas when migrating from non-Microsoft
    RDBMS products, you need to use the SQL Server Migration Assistant (SSMA) utility,
    which can be downloaded from Microsoft downloads.


    For the remainder of this chapter, we talk about migrating an existing Microsoft
    SQL Server database to Azure SQL Database. Since Azure SQL Database does not support
    the full set of features available with SQL Server, it is very important to ensure
    that the existing database does not use features that are not supported on Azure
    SQL Database. You can check for this using either `SQLPackage.exe` or SSMS.'
  trans: '

    ## Azure SQL Database 与 Azure VM 上的 SQL Server


    对于组织和 Azure 用户而言，一个关键决策点是为他们的关系数据库需求部署 **Azure SQL Database** 还是 **Azure VM 上的
    SQL Server**。Azure SQL 数据库和 Azure VM 上的 SQL 针对不同的需求进行了优化。


    当需要配置和管理大量数据库时，Azure SQL 数据库非常适用。由于它是一种 PaaS 产品，所有的管理和打补丁开销都由供应商负责，这有助于组织和用户专注于数据库的设计和使用。Azure
    SQL 数据库针对需要快速上市时间和较低成本要求的场景进行了优化。


    Azure SQL 数据库不提供所有外围功能，如复制、SQL Server 代理等，因此对于严重依赖此类功能的组织来说，Azure SQL 数据库不是一个好的选择。


    Azure VM 上的 SQL Server 针对希望将本地部署扩展到云端的组织进行了优化。由于在 Azure VM 上运行的 SQL Server 引擎与本地环境上运行的引擎完全相同，因此组织更容易将其
    SQL 工作负载“直接迁移”到 Azure。通过在 Azure VM 上运行 SQL Server，组织的 IT 团队对虚拟机拥有完全的管理控制权。


    表 8-1 总结了 Azure SQL 数据库与 Azure VM 上的 SQL Server 之间的主要区别。


    ### 表 8-1. Azure SQL 数据库 vs. Azure VM 上的 SQL Server


    | 特性 | Azure SQL 数据库 | Azure VM 上的 SQL Server |

    | --- | --- | --- |

    | 数据库大小 | P11 性能级别下最大可用 1 TB。 | 数据库最大大小受 VM 大小的限制。例如，在 D14 机器上，最多可以有 32 个数据磁盘，每个磁盘最大
    1 TB。因此，理论上可以有一个 32 TB 的数据库。 |

    | 计算资源 | 无法直接控制计算资源。由于计算资源以 DTU 表示，组织需要对其性能需求进行性能基准测试。 | 对 SQL Server 部署的计算资源拥有完全控制权。
    |

    | 总拥有成本 | 完全消除了对硬件或管理环境的 IT 资源的需求。 | 消除了对硬件的需求，但组织仍然需要一个 IT 团队来管理虚拟机。 |

    | 业务连续性 | 默认提供以下功能：<br>1. 内置容错和本地（同一数据中心）冗余以实现高可用性。<br>2. 自动备份（保留期取决于服务层级）。<br>3.
    地理复制和时间点数据库还原等选项。 | 1. Azure 基础结构为虚拟机提供容错和高可用性。<br>2. SQL 级别的高可用性和灾难恢复选项需要由 IT
    团队配置。<br>3. 实现高可用性通常需要配置新虚拟机，这会增加管理和打补丁的开销。 |

    | SQL 引擎功能 | 支持传统盒装 SQL Server 几乎所有的数据库级别功能，但不支持外围功能，如 SQL Server 代理作业、复制（仅支持作为订阅者）、日志传送等。
    | Azure VM 上的 SQL Server 运行与传统盒装产品相同的 SQL Server 引擎版本。 |

    | 使用场景 | 1. 开发和营销有时间限制的新云设计应用程序。<br>2. 需要内置高可用性、灾难恢复和升级机制的应用程序。<br>3. 没有资源管理底层操作系统和配置设置的组织或用户。<br>4.
    构建软件即服务（SaaS）应用程序。 | 1. 希望以对现有应用程序最小的更改迁移到云端的组织。<br>2. 需要访问 SQL Server 外部资源的应用程序或工作负载。<br>3.
    需要对其 SQL Server 部署拥有完全管理权限的组织。<br>4. 作为本地 SQL Server 部署的灾难恢复部署。 |

    | 可伸缩性 | 通过更改数据库的服务层级或性能级别可轻松扩展。这是一项在线操作，意味着在更改执行期间数据库将保持在线和可用。 | 可通过更改基础 VM 类型进行向上扩展。这是一项离线操作，并且会强制
    SQL Server 停机。 |


    ## 迁移到 Azure SQL 数据库


    无论是 Microsoft SQL Server 还是其他 RDBMS 产品（如 Oracle、DB2 等）上的现有关系数据库，都可以迁移到 Azure SQL
    数据库。从 Microsoft SQL Server 2005 及更高版本迁移时，您可以使用 `SQL Server Management Studio (SSMS)`
    或 `SQL Server Data Tools (SSDT)`；而从非 Microsoft RDBMS 产品迁移时，您需要使用可从 Microsoft 下载站点下载的
    `SQL Server Migration Assistant (SSMA)` 实用工具。


    在本章的剩余部分，我们将讨论将现有的 Microsoft SQL Server 数据库迁移到 Azure SQL 数据库。由于 Azure SQL 数据库不支持
    SQL Server 的全部功能集，因此确保现有数据库不使用 Azure SQL 数据库不支持的功能至关重要。您可以使用 `SQLPackage.exe`
    或 `SSMS` 来检查这一点。

    '
- fmt: '# SQLPackage.exe


    `SQLPackage.exe` 是 SQL Server 或 Visual Studio 安装中包含的一个命令行实用程序。该可执行文件可能位于以下文件夹中：


    ```

    SQL Installations- C:\Program Files (x86)\Microsoft SQL Server\120\ DAC\bin

    Visual Studio - C:\Program Files (x86)\Microsoft Visual Studio 12.0\Common7\IDE\Extensions\Microsoft\SQLDB\DAC\120

    ```


    具体文件夹路径可能会因服务器上安装的 SQL Server 或 Visual Studio 版本而有所不同。


    `SQLPackage.exe` 支持以下操作（完整文档可在此处找到：`https://msdn.microsoft.com/library/hh550080.aspx`）：


    1.  `Extract`。创建 SQL Server 或 Azure SQL 数据库的数据库快照（`*.dacpac`）。

    2.  `Export`。将数据库导出到 `*.bacpac` 文件。

    3.  `Import`。将 `*.bacpac` 文件导入到数据库。

    4.  `Publish`。将 `.dacpac` 文件的内容发布到目标数据库。

    5.  `DeployReport`。创建一份 XML 报告，说明发布操作将进行的更改。

    6.  `DriftReport`。创建一份 XML 报告，说明自数据库上次注册以来对已注册数据库进行的更改。

    7.  `Script`。创建一个脚本，包含所有将在目标数据库上进行的更新。


    要获取可能阻碍将数据库迁移到 Azure SQL 数据库的潜在问题列表，请使用以下命令：


    ```

    sqlpackage.exe /Action:Export /ssn:"SQLServerName" /sdn:"DatabaseName" /tf:"Target
    Bacpac File" > "OutputFile" 2>&1

    ```


    其中参数 `2>&1` 表示我们要将错误和输出记录到同一个文件中。


    清单 [8-2](#A371128_1_En_8_Chapter.html#Par88) 显示了执行此命令后的示例输出。


    ```

    Connecting to database ''SQLNexus'' on server ''SQLServerName''.

    Extracting schema

    Extracting schema from database

    Resolving references in schema model

    Validating schema model

    Validating schema model for data package

    Validating schema

    Exporting data from database

    Exporting data

    Processing Export.

    Processing Table ''[dbo].[tbl_PERF_STATS_SCRIPT_RUNTIMES]''.

    Processing Table ''[dbo].[tblNexusInfo]''.

    Processing Table ''[dbo].[tbl_BLOCKING_CHAINS]''.

    Processing Table ''[dbo].[tblDiagScan]''.

    ..........

    Processing Table ''[dbo].[tblDiagScanLookup]''.

    Processing Table ''[dbo].[CounterDetails]''.

    Processing Table ''[dbo].[tbl_RUNTIMES]''.

    Processing Table ''[dbo].[tbl_SYSINFO]''.

    Processing Table ''[dbo].[tbl_Reports]''.

    Successfully exported database and saved it to file ''C: \Target.bacpac''.

    Listing 8-2.

    Output of SQLPackage.exe

    ```


    在此案例中，未检测到数据库存在任何问题。


    # SQL Server Management Studio


    使用 SQL Server Management Studio，用户可以为其数据库创建 bacpac 文件导出，如图 [8-13](#A371128_1_En_8_Chapter.html#Fig13)
    至 [8-15](#A371128_1_En_8_Chapter.html#Fig15) 所示。SSMS 中的“导出数据层应用程序”选项可用于为现有的本地数据库创建
    bacpac 文件，然后该文件可作为 Azure SQL 数据库导入。bacpac 文件封装了数据库的数据和架构。


    ![A371128_1_En_8_Fig13_HTML.jpg](A371128_1_En_8_Fig13_HTML.jpg)

    图 8-13. 在 SSMS 中启动“导出数据层应用程序”向导


    SSMS 的“导出数据层应用程序”允许用户选择要包含在 bacpac 文件中的对象（表、存储过程、触发器等）。


    ![A371128_1_En_8_Fig15_HTML.jpg](A371128_1_En_8_Fig15_HTML.jpg)

    图 8-15. 选择要包含在 bacpac 文件中的对象


    ![A371128_1_En_8_Fig14_HTML.jpg](A371128_1_En_8_Fig14_HTML.jpg)

    图 8-14. 为“导出数据层应用程序”向导配置导出设置


    如果 SQL Server 在创建 bacpac 文件期间识别出任何迁移阻碍因素，这些阻碍因素将在“导出数据层”操作结束时记录在“导出报告”中（参见图 [8-16](#A371128_1_En_8_Chapter.html#Fig16)）。


    ![A371128_1_En_8_Fig16_HTML.jpg](A371128_1_En_8_Fig16_HTML.jpg)

    图 8-16. 导出数据层应用程序执行


    如果在“导出数据层应用程序”报告中未发现错误，则可以将数据库迁移到 Azure SQL 数据库而不会出现任何问题。如果发现了错误，则需要先解决这些错误，然后才能将数据库迁移到
    Azure SQL 数据库。


    # 执行数据库迁移


    实际的数据库迁移可以使用以下任一选项完成。


    *   导出/导入 bacpac 文件。

    *   使用 SSMS “部署到 Azure SQL 数据库”向导。

    *   使用事务复制。


    ## 导出/导入 Bacpac 文件


    如前所述，可以使用 SSMS 或 `SQLPackage.exe` 将现有数据库导出到 bacpac 文件。然后，该导出的文件可以使用 `SQLPackage.exe`
    或 SSMS 中的“导入数据层应用程序”向导导入到 Azure SQL 数据库，如图 [8-17](#A371128_1_En_8_Chapter.html#Fig17)
    所示。


    ![A371128_1_En_8_Fig17_HTML.jpg](A371128_1_En_8_Fig17_HTML.jpg)

    图 8-17. 使用 SSMS 导入 bacpac 文件


    该向导允许用户选择一个现有的 bacpac 文件导入到 Azure SQL 数据库中，并为数据库指定新的名称、服务层级和性能级别（参见图 [8-18](#A371128_1_En_8_Chapter.html#Fig18)）。


    ![A371128_1_En_8_Fig18a_HTML.jpg](A371128_1_En_8_Fig18a_HTML.jpg)![A371128_1_En_8_Fig18b_HTML.jpg](A371128_1_En_8_Fig18b_HTML.jpg)

    图 8-18. 在 bacpac 导入操作期间配置 Azure SQL 数据库选项


    当您单击“完成”时，向导将把 bacpac 文件的内容导入到 Azure SQL 数据库中。


    `SQLPackage.exe` 的 `import` 操作也可用于将 bacpac 文件导入到 Azure SQL 数据库。命令语法如下所示：


    ```

    sqlpackage.exe /Action:Import /SourceFile: /ssn: /tdn: /tu:"AdminUserName" /tp:
    > "OutputFile" 2>&1

    ```


    ## SSMS “部署到 Azure SQL 数据库”向导


    SSMS 的“部署到 Azure SQL 数据库”向导可用于直接将现有的 SQL Server 数据库迁移到 Azure SQL 数据库，而无需显式创建 bacpac
    文件然后再导入它。尽管在后台，此向导会创建临时的 bacpac 文件，然后将其导入到 Azure SQL 数据库。与前面提到的“导入数据层”向导一样，用户可以选择数据库将创建在哪台服务器以及何种服务层级（和性能级别）。


    您可以通过右键单击数据库，然后选择“任务”->“部署到 Microsoft Azure SQL 数据库”来访问此向导，如图 [8-19](#A371128_1_En_8_Chapter.html#Fig19)
    所示。


    ![A371128_1_En_8_Fig19_HTML.jpg](A371128_1_En_8_Fig19_HTML.jpg)

    图 8-19. 启动“将数据库部署到 Microsoft Azure SQL 数据库”向导


    图 [8-20](#A371128_1_En_8_Chapter.html#Fig20) 说明了在部署数据库时可用的不同配置选项。该向导允许用户连接到逻辑服务器（新数据库将托管于此），并指定服务层级和性能级别。


    ![A371128_1_En_8_Fig20_HTML.jpg](A371128_1_En_8_Fig20_HTML.jpg)

    图 8-20. 在部署 Azure SQL 数据库操作期间配置数据库选项

    注意：如果数据库的大小大于服务层级允许的最大大小，迁移将会失败。


    一旦向导完成执行，具有指定服务层级和性能级别的新 Azure SQL 数据库就会在指定的逻辑服务器上创建（参见图 [8-21](#A371128_1_En_8_Chapter.html#Fig21)）。


    ![A371128_1_En_8_Fig21_HTML.jpg](A371128_1_En_8_Fig21_HTML.jpg)

    图 8-21. “将数据库部署到 Microsoft Azure SQL 数据库”向导摘要页'
  raw: '### SQLPackage.exe


    SQLPackage is a command-line utility available as part of the SQL Server or Visual
    Studio installation. The executable can be located in the following folders:


    ```

    SQL Installations- C:\Program Files (x86)\Microsoft SQL Server\120\ DAC\bin

    Visual Studio - C:\Program Files (x86)\Microsoft Visual Studio 12.0\Common7\IDE\Extensions\Microsoft\SQLDB\DAC\120

    ```


    The folders might vary depending on the version of SQL Server or Visual Studio
    installed on your server.


    `SQLPackage.exe` supports the following actions (the complete documentation can
    be found at [`https://msdn.microsoft.com/library/hh550080.aspx`):keez](https://msdn.microsoft.com/library/hh550080.aspx):keez)


    1.  Extract. Creates a database snapshot (`*.dacpac`) of a SQL Server or Azure
    SQL Database.  

    2.  Export. Exports a database to a `*.bacpac` file.  

    3.  Import. Imports a `*.bacpac` file to a database.  

    4.  Publish. Publishes the contents of a `.dacpac` file to the target database.
     

    5.  DeployReport. Creates an XML report of the changes that would be made by a
    publish action.  

    6.  DriftReport. Creates an XML report of the changes that have been made to a
    registered database since it was last registered.  

    7.  Script. Creates a script of all the changes to be updated on the target database.
     


    To get the list of potential issues that might block your efforts of migrating
    a database to Azure SQL Database, use the following command:


    ```

    sqlpackage.exe /Action:Export /ssn:"SQLServerName" /sdn:"DatabaseName" /tf:"Target
    Bacpac File" > "OutputFile" 2>&1

    ```


    Where the parameter `2>&1` indicates that we want to log the errors and output
    in the same file.


    Listing [8-2](#A371128_1_En_8_Chapter.html#Par88) shows sample output from the
    execution.


    ```

    Connecting to database ''SQLNexus'' on server ''SQLServerName''.

    Extracting schema

    Extracting schema from database

    Resolving references in schema model

    Validating schema model

    Validating schema model for data package

    Validating schema

    Exporting data from database

    Exporting data

    Processing Export.

    Processing Table ''[dbo].[tbl_PERF_STATS_SCRIPT_RUNTIMES]''.

    Processing Table ''[dbo].[tblNexusInfo]''.

    Processing Table ''[dbo].[tbl_BLOCKING_CHAINS]''.

    Processing Table ''[dbo].[tblDiagScan]''.

    ..........

    Processing Table ''[dbo].[tblDiagScanLookup]''.

    Processing Table ''[dbo].[CounterDetails]''.

    Processing Table ''[dbo].[tbl_RUNTIMES]''.

    Processing Table ''[dbo].[tbl_SYSINFO]''.

    Processing Table ''[dbo].[tbl_Reports]''.

    Successfully exported database and saved it to file ''C: \Target.bacpac''.

    Listing 8-2.

    Output of SQLPackage.exe

    ```


    In this case, there were no issues detected with the database.


    ### SQL Server Management Studio


    Using SQL Server Management Studio , users can create a bacpac file export of
    their database, as illustrated in Figures [8-13](#A371128_1_En_8_Chapter.html#Fig13)
    through [8-15](#A371128_1_En_8_Chapter.html#Fig15). The Export Data Tier Application
    option from SSMS can be utilized for creating a bacpac file for the existing on-premises
    database, which then can be imported as an Azure SQL Database. A bacpac file encapsulates
    both the data and schema of the database .


    ![A371128_1_En_8_Fig13_HTML.jpg](A371128_1_En_8_Fig13_HTML.jpg)


    Figure 8-13.


    Launching the Export Data Tier Application wizard in SSMS


    SSMS Export Data Tier Application allows users to choose which objects (tables,
    procedures, triggers, etc.) to include in the bacpac file .


    ![A371128_1_En_8_Fig15_HTML.jpg](A371128_1_En_8_Fig15_HTML.jpg)


    Figure 8-15.


    Choosing the objects to be included in the bacpac file


    ![A371128_1_En_8_Fig14_HTML.jpg](A371128_1_En_8_Fig14_HTML.jpg)


    Figure 8-14.


    Configure the export settings for the Export Data Tier Application wizard


    If SQL Server identifies any migration blockers during the creating of the bacpac
    file, those blockers are logged in the Export report at the end of the Export
    Data Tier operation (see Figure [8-16](#A371128_1_En_8_Chapter.html#Fig16)).


    ![A371128_1_En_8_Fig16_HTML.jpg](A371128_1_En_8_Fig16_HTML.jpg)


    Figure 8-16.


    Export Data Tier Application execution


    If no errors are identified in the Export Data Tier Application report, the database
    can be migrated to an Azure SQL Database without any issues. If errors are identified,
    they need to resolved before the database can be migrated to an Azure SQL database.


    ### Performing the Database Migration


    The actual database migration can be done using any of the following options.


    *   Export/import a bacpac file.

    *   Use the SSMS Deploy to Azure SQL Database wizard.

    *   Use Transaction Replication.


    #### Export/Import a Bacpac File


    An existing database can be exported to a bacpac file using SSMS or `SQLPackage.exe`,
    as described earlier. This exported file can then be imported to an Azure SQL
    database using either `SQLPackage.exe` or the Import Data-Tier Application wizard
    in SSMS, as illustrated in Figure [8-17](#A371128_1_En_8_Chapter.html#Fig17).


    ![A371128_1_En_8_Fig17_HTML.jpg](A371128_1_En_8_Fig17_HTML.jpg)


    Figure 8-17.


    Importing a bacpac file using SSMS


    The wizard allows users to choose an existing bacpac file to import into the Azure
    SQL Database as well as to specify a new name, service tier, and performance level
    for the database (see Figure [8-18](#A371128_1_En_8_Chapter.html#Fig18)).


    ![A371128_1_En_8_Fig18a_HTML.jpg](A371128_1_En_8_Fig18a_HTML.jpg)![A371128_1_En_8_Fig18b_HTML.jpg](A371128_1_En_8_Fig18b_HTML.jpg)


    Figure 8-18.


    Configuring the Azure SQL Database options during a bacpac import operation


    When you click finish, the wizard will import the contents of the bacpac file
    to the Azure SQL Database.


    The `SQLPackage.exe` import action can also be used to import a bacpac file to
    Azure SQL Database. The command syntax would look like this:


    ```

    sqlpackage.exe /Action:Import /SourceFile: /ssn: /tdn: /tu:"AdminUserName" /tp:
    > "OutputFile" 2>&1

    ```


    #### The SSMS Deploy to Azure SQL Database Wizard


    The SSMS Deploy to Azure SQL Database wizard can be used to directly migrate an
    existing SQL Server database to Azure SQL Database, without having to explicitly
    create a bacpac file and then import it. Although behind the scenes, this wizard
    creates temporary bacpac files which are then imported to the Azure SQL database.
    As with the Import Data Tier wizard mentioned earlier, users can choose which
    server and what service tier (and performance level) the database will be created
    in.


    You can access this wizard by right-clicking on the database and then choosing
    Tasks, Deploy to Microsoft Azure SQL Database, as illustrated in Figure [8-19](#A371128_1_En_8_Chapter.html#Fig19).


    ![A371128_1_En_8_Fig19_HTML.jpg](A371128_1_En_8_Fig19_HTML.jpg)


    Figure 8-19.


    Launching the Deploy Database to Microsoft Azure SQL Database wizard


    Figure [8-20](#A371128_1_En_8_Chapter.html#Fig20) illustrates the different configuration
    options available when the database is being deployed. The wizard allows users
    to connect to the logical server, where the new database would be hosted, and
    to specify the service tier and the performance level.


    ![A371128_1_En_8_Fig20_HTML.jpg](A371128_1_En_8_Fig20_HTML.jpg)


    Figure 8-20.


    Configuring the database options during a deploy Azure SQL database operation
    Note


    The migration will fail if the size of the database is larger than the maximum
    allowed size of the service tier.


    Once the wizard completes execution, the new Azure SQL Database with the specified
    service tier and performance level is created on the specified logical server
    (see Figure [8-21](#A371128_1_En_8_Chapter.html#Fig21)).


    ![A371128_1_En_8_Fig21_HTML.jpg](A371128_1_En_8_Fig21_HTML.jpg)


    Figure 8-21.


    Deploy database to Microsoft Azure SQL Database wizard summary page'
