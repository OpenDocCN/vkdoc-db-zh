    Configuration Revealed》(Apress) 的作者，并领导 Bangalore PowerShell 和 Bangalore IT Pro
    用户组。他经常在印度及海外的本地用户组活动和会议上发表演讲，主题涵盖 PowerShell 到 Azure 服务等。


