    ## 部署独立的 SQL Server 实例


    在前几章中，详细介绍了 Azure 架构以及 Azure 中可用的部署模型（经典和 ARM）。由于 Azure 正在过渡到资源管理器（ARM）部署模型，本章将仅重点介绍此特定模型。当你登录
    Azure 门户（`portal.azure.com`）时，左侧会呈现一个列视图，允许你查看已部署的各种资源以及可以部署的服务。


    最常见的问题之一是，为什么会看到两个不同的虚拟机项目（见图 5-1）。"虚拟机"选项用于部署使用资源管理器模型的虚拟机，而"虚拟机（经典）"选项则用于部署使用经典部署模型的虚拟机。旧门户（`manage.windowsazure.com`）不显示使用资源管理器模型部署的虚拟机。


    ![A371128_1_En_5_Fig1_HTML.jpg](img/A371128_1_En_5_Fig1_HTML.jpg)

    图 5-1. Azure 门户


    既然你已了解导航差异，让我们将部署 SQL Server 的旅程分解为不同阶段。旅程的第一阶段是选择部署。从许可角度来看，Azure 虚拟机为 SQL Server
    提供了多种部署选择。


    *   从市场部署 SQL Server 映像（见图 5-2）并支付 SQL Server 的每分钟费率。 ![A371128_1_En_5_Fig2_HTML.jpg](img/A371128_1_En_5_Fig2_HTML.jpg)
    图 5-2. 显示 SQL Server 2016 3.3 映像的 Azure 市场映像

    *   使用软件保障下的许可移动性权益安装或上传你自己的 SQL Server 映像

    *   作为拥有服务提供商许可协议 (SPLA) 的服务提供商，你还有一个额外选项，即使用你自己的映像，并通过你的 SPLA 报告订阅者访问许可 (SAL)


    ### 配置设置


    图 5-2 显示了当你点击主页左上角的"新建"选项时，计算资源的市场浏览选项。市场允许你部署从 SQL Server 2008 R2 到 SQL Server
    2016 的各种版本。你甚至可以选择一系列版本，如企业版、标准版和 Express 版。另一个选项是选择预置的解决方案，如可用性组部署模板，它允许你在部署期间部署可用性组。


    #### 虚拟机区域


    对于某些计算部署选项，你可以选择部署模型（经典或 ARM）。一旦选择了要部署的映像，系统将为你提供许多选项来指定虚拟机和 SQL Server 设置（如果你使用的是
    SQL Server 映像）。这段旅程是你为 Azure 部署工作流提供输入，以配置环境的各个选项。这些选项会由 Microsoft 工程团队不断审查。根据用户输入和可用的遥测数据，这些选项的增强和改进会在冲刺版本中添加。一旦你开始使用云，你就会了解到公共云就像天气一样。你知道季节，并且可以根据各种迹象大致预测天气，但你偶尔还是会感到惊喜。与天气唯一的区别是，出现在各种工作流中的增强和改进是为了让你的生活更轻松，而不是更困难。云工程团队是
    Microsoft 内部最敏捷的开发组织之一。


    图 5-3 所示的基本设置视图对所有 Azure 虚拟机配置向导都是通用的，它们允许你指定计算机名称、管理员用户名、密码和资源组名称（因为我们使用的是 ARM）。你还可以指定区域，即此虚拟机将部署到的数据中心，以及订阅。这些是非常重要的考虑因素，因为部署完成后无法通过门户更改它们。如果要将现有的
    Azure 虚拟机移动到不同的区域或订阅，你需要编写 PowerShell 命令来完成。这不是一瞬间就能完成的事情！


    ![A371128_1_En_5_Fig3_HTML.jpg](img/A371128_1_En_5_Fig3_HTML.jpg)

    图 5-3. Azure 虚拟机的基本设置配置


    选择订阅是一个更容易的考虑。你会希望选择应为其资源使用计费的订阅，该订阅通常也将托管应用程序的其他部分。此决策不涉及与性能相关的考虑。然而，为虚拟机选择区域则涉及性能方面。思考区域最简单的方式就是将其视为你的数据中心。对于生产环境，你会选择位于同一数据中心内的服务器刀片和
    SAN。此外，除非你有地理分散的要求，否则最好也将应用程序部署在同一个数据中心。同样的逻辑也适用于这里。你应该为计算、存储和应用程序部署选择相同的区域。这将防止跨数据中心的网络跳转，从而减少延迟并避免对性能产生负面影响。这是在使用
    Azure 虚拟机的多层架构中观察到的最常见的部署错误配置之一。

    '
- fmt: '## Virtual Machine Hardware


    下一组输入对性能和确保应用程序遵守 SLA 同样至关重要。这涉及为你的虚拟机选择合适的计算层。图 5-4 展示了 Azure 提供的不同选项。对于关键的生产环境，建议选择提供
    SSD 磁盘（高级存储）的计算层。向导会为你所选的每个层提供相关的 CPU 核心和 RAM。可以将大小设置视为选择你的硬件，而无需费心理解底层的硬件配置。你只需要知道你的应用程序数据库运行所需的“马力”（处理能力、IOPs
    和物理内存）。


    ![A371128_1_En_5_Fig4_HTML.jpg](A371128_1_En_5_Fig4_HTML.jpg)

    **图 5-4. 选择 Azure 虚拟机大小**


    此配置中的一个主要陷阱是，大多数人在配置时忘记了正确估算 IOPs。如果 IO 突发超过了虚拟机或存储账户的最大公开限制，Azure 将进行限制（参见图 5-5）。这可能导致你的虚拟机性能不稳定地减慢，从而对用户体验产生负面影响。Azure
    提供了监控端点，可用于确定是否超过了现有存储限制。你甚至可以设置警报，在超过阈值时得到通知。第 7 章详细介绍了在 Azure 虚拟机上运行的 SQL Server
    实例的性能方面。


    ![A371128_1_En_5_Fig5_HTML.jpg](A371128_1_En_5_Fig5_HTML.jpg)

    **图 5-5. Azure 标准存储账户限制**


    一旦你选择了所需的大小，系统会提供许多旋钮，允许你配置存储账户。在撰写本文时，Azure 存储的限制是每个订阅 100 个存储账户，每个标准存储账户的限制为
    500TB。页面 Blob 的最大大小为 1TB，这意味着附加到你的虚拟机的虚拟硬盘的最大大小为 1TB。根据你选择的虚拟机层，你的存储大小将受到限制。在图
    5-4 中，选择 DS4 标准将限制你的存储最多为 16 个数据磁盘，这意味着存储大小限制为 16TB。此外，你需要记住，每个存储磁盘对 8KB IOPs
    支持的 IOPs 有一个上限。对于标准层虚拟机，它被限制为 500。


    标准存储和高级存储所需磁盘数量的计算如下所示。


    ```

    所需磁盘数量计算：

    对于标准存储 = MAX[(所需总存储 (GB) ÷ 1024), (所需总 IOPs ÷ 500)]

    对于高级存储 (P30) = MAX[(所需总存储 (GB) ÷ 1024), (所需总 IOPs ÷ 5000), (所需总 IO MB/s ÷ 200)]

    ```


    如果从实际情况来看，如果你需要 1TB 支持 2000 IOPs 的存储，你将需要四个数据磁盘，这将达到可扩展性限制。如果你使用的是 P30 高级存储，你将能够利用单个高级
    IO 磁盘，并且还有一些空间来容纳额外的负载（参见图 5-6）。


    ![A371128_1_En_5_Fig6_HTML.jpg](A371128_1_En_5_Fig6_HTML.jpg)

    **图 5-6. Azure 高级存储限制**


    标准存储是你当不太关心性能时选择的经济型轿车。但你绝不会开这辆车去参加 NASCAR 拉力赛或大奖赛。如果你想在这个舞台上竞争，你的存储需求只能通过高级 IO
    来满足。如果你比较图 5-5 和图 5-6，其中一个会吸引你眼球的限制是每秒 IO 的兆字节数。高级存储将此作为性能选项提供，而标准存储则限制在 IOPs
    级别。作为经验法则，对于高性能 IO 需求，你应该默认选择高级存储。


    高级存储为虚拟机支持高达 64TB 的存储，提供高达 80,000 IOPs 和 1600Mbps 的吞吐量，读操作延迟低于一毫秒。


    从成本角度需要牢记的一个重要点是高级存储与标准存储的计费差异。对于高级存储账户，你将按磁盘的分配大小收费，但对于任何其他类型的存储账户，你将只为写入磁盘的数据所使用的存储空间计费，而不管分配的磁盘大小如何。因此，在创建高级存储磁盘时要谨慎，以防止
    Azure 每月订阅成本出现意外的激增！


    牢记这一经验，图 5-7 所示的存储设置是针对配置为本地冗余存储的高级存储。对于托管 SQL Server 数据文件的 Azure 磁盘，最好使用本地冗余存储。对于高可用性和灾难恢复，你可以配置可用性组。可用性组功能是
    SQL Server 2012 及以上版本中提供的高可用性和灾难恢复解决方案。Azure 市场提供了用于为 SQL Server 2012 及以上版本配置可用性组的模板。图
    5-7 中的示例展示了如何使用基于模板的库映像来部署完全配置的 SQL Server 实例。


    ![A371128_1_En_5_Fig7_HTML.jpg](A371128_1_En_5_Fig7_HTML.jpg)

    **图 5-7. Azure 存储账户设置**


    你可以调整的其他设置是网络设置。你可以为虚拟机配置虚拟网络，这将使用相同虚拟网络的资源进行隔离。这可用于将 SQL Server 实例和单一业务环境的应用程序资源保持在单个子网中。如果应用程序对
    IP 地址有严格的依赖关系，你还可以选择公共或静态 IP 地址。


    一年多前引入了一个新概念——网络安全组 (NSG)，它允许你为虚拟机创建类似 DMZ 的环境。网络管理员一旦理解了 NSG 的概念，他们会再次感到安全，如同在自己的数据中心一样。网络安全组可以应用于子网（虚拟网络内）或单个虚拟机，从而实现两层保护。NSG
    内部的规则可以独立于虚拟机进行修改和更新，从而允许在虚拟机生命周期之外管理访问控制列表。


    一个简单的用例是使用 NSG 来限制虚拟机的 Internet 访问，如图 5-8 所示。NSG 配置中一个很棒的易用性特性是使用虚拟网络标签来配置入站和出站规则。标签是预定义的标识符，代表一类
    IP 地址。`Internet` 标签表示公共 IP 地址空间，将用于限制所需虚拟机的 Internet 访问。


    ![A371128_1_En_5_Fig8_HTML.jpg](A371128_1_En_5_Fig8_HTML.jpg)

    **图 5-8. 网络安全组**'
  raw: '#### Virtual Machine Hardware


    The next set of inputs is also critical for performance and achieving the SLA
    that your application is supposed to adhere to. This involves choosing the right
    compute tier for your virtual machine. Figure [5-4](#A371128_1_En_5_Chapter.html#Fig4)
    shows the different options that Azure provides. For critical production environments,
    the recommendation is to pick a compute tier that provides SSD disks (premium
    storage). The wizard would provide the CPU cores and RAM that is associated with
    each tier that you pick. Think of the size setting as picking your hardware but
    without the hassle of understanding the underlying configuration of hardware.
    All you need to know is the amount of horsepower (processing, IOPs, and physical
    memory) that your application database needs to run.


    ![A371128_1_En_5_Fig4_HTML.jpg](A371128_1_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    Picking the Azure Virtual Machine size


    A major pitfall in this configuration is that most people forget to estimate the
    IOPs correctly during configuration. Azure will throttle IO bursts if they exceed
    the virtual machine or storage account’s maximum published limits (see Figure
    [5-5](#A371128_1_En_5_Chapter.html#Fig5)). This can lead to erratic performance
    slowdown in your virtual machine and thereby negatively impact user experience.
    Azure provides monitoring endpoints that can be used to determine if existing
    storage limits are being exceeded. You can even set up alerts to get notified
    when a threshold is exceeded. Chapter [7](#A371128_1_En_7_Chapter.html) covers
    more details about performance aspects for SQL Server instances running on Azure
    Virtual Machines.


    ![A371128_1_En_5_Fig5_HTML.jpg](A371128_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    Azure Standard storage account limits


    Once you select the desired size, you will be provided with a number of knobs
    that allow you to configure the storage account. At the time of going to print,
    the Azure Storage limits were 100 storage accounts per subscription, with a limit
    of 500TB per Standard storage account. The maximum size of a page blob is 1TB,
    which means that the maximum size of a virtual hard disk attached to your virtual
    machine is 1TB. Depending on the virtual machine tier that you select, your storage
    size will be limited. In Figure [5-4](#A371128_1_En_5_Chapter.html#Fig4), the
    selection of a DS4 standard would limit your storage to a maximum of 16 data disks,
    which means a storage size limit of 16TB. Furthermore, you need to keep in mind
    that each storage disk has a limit for the maximum IOPs supported for 8KB IOPs.
    For a standard tier virtual machine, it is limited to 500.


    The calculation for the number of disks required for Standard and Premium storage
    is shown here.


    ```

    Number of disks required:

    For Standard Storage = MAX of [(Total storage required (in GB) ÷ 1024), (Total
    IOPs required ÷ 500)]

    For Premium Storage (P30) = MAX of [Total storage required (in GB) ÷ 1024), (Total
    IOPs required ÷ 5000), (Total MB/s of IO required ÷ 200)]

    ```


    If we had to put things into perspective, if you required 1TB of storage that
    supported 2000 IOPs, you would need four data disks, which would be hitting the
    scalability limit. If you were using P30 premium storage, you would be able to
    utilize a single premium IO disk and still have some room for additional luggage
    (see Figure [5-6](#A371128_1_En_5_Chapter.html#Fig6)).


    ![A371128_1_En_5_Fig6_HTML.jpg](A371128_1_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    Azure Premium storage limits


    Standard storage is the economy sedan that you pick when you really don’t care
    about performance. But you would never bring this car to compete in the NASCAR
    rally or a Grand Prix. If you want to compete in this arena, your storage needs
    will only be satisfied through Premium IO. If you compare Figures [5-5](#A371128_1_En_5_Chapter.html#Fig5)
    and [5-6](#A371128_1_En_5_Chapter.html#Fig6), one of the limits that will jump
    out at you is the megabytes of IO per second. Premium storage provides that as
    a performance option to consider, whereas Standard storage limits at an IOPs level.
    As thumb rule, for high performance IO requirements, you should default to Premium
    storage.


    Premium storage supports 64TB of storage for a virtual machine supporting up to
    80,000 IOPs and 1600Mbps of throughput at less than one millisecond latency for
    read operations.


    An important point that you need to keep in mind from a cost perspective is the
    billing difference for Premium versus Standard storage. For a Premium storage
    account, you will be charged for the allocated size of the disk but for any other
    type of Storage account, you will only be billed for the storage space used to
    store the data that is written to the disk regardless of the allocated disk size.
    So exercise caution while spawning off Premium storage disks to prevent unwarranted
    shocks in your Azure monthly subscription costs!


    Keeping this wisdom in mind, the storage settings showing in Figure [5-7](#A371128_1_En_5_Chapter.html#Fig7)
    are for Premium storage configured for Locally Redundant Storage. It is best to
    use Locally Redundant Storage for Azure disks hosting SQL Server data files. For
    high availability and disaster recovery, you can configure Availability Groups.
    The Availability Groups feature is a high-availability and disaster-recovery solution
    available in SQL Server 2012 and above. The Azure marketplace provides templates
    for configuring Availability Groups for SQL Server 2012 and above. The example
    in Figure [5-7](#A371128_1_En_5_Chapter.html#Fig7) shows how a gallery image based
    on a template can be used for deploying a fully configured SQL Server instance.


    ![A371128_1_En_5_Fig7_HTML.jpg](A371128_1_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    Azure Storage Account settings


    The other settings that you can tweak are the network settings. You can configure
    the virtual network for your virtual machine, which fences the resources using
    the same virtual network. This can be used for keeping the SQL Server instances
    and the application resources for a single business environment within a single
    subnet. You also have the option of choosing a public or static IP address if
    there is a strict application dependency on the IP address.


    A new concept of Network Security Groups (NSG) was introduced over a year ago
    and it allows you to create a DMZ-like environment for your virtual machines.
    Once again network administrators would feel safe and at their data centers when
    they understand the concept of NSG. A Network Security Group can be applied to
    a subnet (within a virtual network) or individual virtual machines, which allows
    you to enable a two-layer protection. The rules within a NSG can be modified and
    updated independently of the virtual machine, thus allowing the management of
    access control lists outside the lifecycle of a virtual machine.


    A simple use case would be using a NSG to restrict Internet access for virtual
    machines, as shown in Figure [5-8](#A371128_1_En_5_Chapter.html#Fig8). One of
    the great usability features in the NSG configuration is the use of virtual network
    tags for configuring inbound and outbound rules. Tags are predefined identifiers
    that represent a category of IP addresses. The Internet tag denotes the public
    IP address space and will be used to restrict Internet access for the required
    virtual machines.


    ![A371128_1_En_5_Fig8_HTML.jpg](A371128_1_En_5_Fig8_HTML.jpg)


    Figure 5-8.


    Network security groups'
  trans: '

    ## 虚拟机硬件


    下一组输入对于性能和确保应用程序遵守 SLA 同样至关重要。这涉及为你的虚拟机选择合适的计算层。图 5-4 展示了 Azure 提供的不同选项。对于关键的生产环境，建议选择提供
    SSD 磁盘（高级存储）的计算层。向导会为你所选的每个层提供相关的 CPU 核心和 RAM。可以将大小设置视为选择你的硬件，而无需费心理解底层的硬件配置。你只需要知道你的应用程序数据库运行所需的“马力”（处理能力、IOPs
    和物理内存）。


    ![A371128_1_En_5_Fig4_HTML.jpg](img/A371128_1_En_5_Fig4_HTML.jpg)

    **图 5-4. 选择 Azure 虚拟机大小**


    此配置中的一个主要陷阱是，大多数人在配置时忘记了正确估算 IOPs。如果 IO 突发超过了虚拟机或存储账户的最大公开限制，Azure 将进行限制（参见图 5-5）。这可能导致你的虚拟机性能不稳定地减慢，从而对用户体验产生负面影响。Azure
    提供了监控端点，可用于确定是否超过了现有存储限制。你甚至可以设置警报，在超过阈值时得到通知。第 7 章详细介绍了在 Azure 虚拟机上运行的 SQL Server
    实例的性能方面。


    ![A371128_1_En_5_Fig5_HTML.jpg](img/A371128_1_En_5_Fig5_HTML.jpg)

    **图 5-5. Azure 标准存储账户限制**


    一旦你选择了所需的大小，系统会提供许多旋钮，允许你配置存储账户。在撰写本文时，Azure 存储的限制是每个订阅 100 个存储账户，每个标准存储账户的限制为
    500TB。页面 Blob 的最大大小为 1TB，这意味着附加到你的虚拟机的虚拟硬盘的最大大小为 1TB。根据你选择的虚拟机层，你的存储大小将受到限制。在图
    5-4 中，选择 DS4 标准将限制你的存储最多为 16 个数据磁盘，这意味着存储大小限制为 16TB。此外，你需要记住，每个存储磁盘对 8KB IOPs
    支持的 IOPs 有一个上限。对于标准层虚拟机，它被限制为 500。


    标准存储和高级存储所需磁盘数量的计算如下所示。


    ```

    所需磁盘数量计算：

    对于标准存储 = MAX[(所需总存储 (GB) ÷ 1024), (所需总 IOPs ÷ 500)]

    对于高级存储 (P30) = MAX[(所需总存储 (GB) ÷ 1024), (所需总 IOPs ÷ 5000), (所需总 IO MB/s ÷ 200)]

    ```


    如果从实际情况来看，如果你需要 1TB 支持 2000 IOPs 的存储，你将需要四个数据磁盘，这将达到可扩展性限制。如果你使用的是 P30 高级存储，你将能够利用单个高级
    IO 磁盘，并且还有一些空间来容纳额外的负载（参见图 5-6）。


    ![A371128_1_En_5_Fig6_HTML.jpg](img/A371128_1_En_5_Fig6_HTML.jpg)

    **图 5-6. Azure 高级存储限制**


    标准存储是你当不太关心性能时选择的经济型轿车。但你绝不会开这辆车去参加 NASCAR 拉力赛或大奖赛。如果你想在这个舞台上竞争，你的存储需求只能通过高级 IO
    来满足。如果你比较图 5-5 和图 5-6，其中一个会吸引你眼球的限制是每秒 IO 的兆字节数。高级存储将此作为性能选项提供，而标准存储则限制在 IOPs
    级别。作为经验法则，对于高性能 IO 需求，你应该默认选择高级存储。


    高级存储为虚拟机支持高达 64TB 的存储，提供高达 80,000 IOPs 和 1600Mbps 的吞吐量，读操作延迟低于一毫秒。


    从成本角度需要牢记的一个重要点是高级存储与标准存储的计费差异。对于高级存储账户，你将按磁盘的分配大小收费，但对于任何其他类型的存储账户，你将只为写入磁盘的数据所使用的存储空间计费，而不管分配的磁盘大小如何。因此，在创建高级存储磁盘时要谨慎，以防止
    Azure 每月订阅成本出现意外的激增！


    牢记这一经验，图 5-7 所示的存储设置是针对配置为本地冗余存储的高级存储。对于托管 SQL Server 数据文件的 Azure 磁盘，最好使用本地冗余存储。对于高可用性和灾难恢复，你可以配置可用性组。可用性组功能是
    SQL Server 2012 及以上版本中提供的高可用性和灾难恢复解决方案。Azure 市场提供了用于为 SQL Server 2012 及以上版本配置可用性组的模板。图
    5-7 中的示例展示了如何使用基于模板的库映像来部署完全配置的 SQL Server 实例。


    ![A371128_1_En_5_Fig7_HTML.jpg](img/A371128_1_En_5_Fig7_HTML.jpg)

    **图 5-7. Azure 存储账户设置**


    你可以调整的其他设置是网络设置。你可以为虚拟机配置虚拟网络，这将使用相同虚拟网络的资源进行隔离。这可用于将 SQL Server 实例和单一业务环境的应用程序资源保持在单个子网中。如果应用程序对
    IP 地址有严格的依赖关系，你还可以选择公共或静态 IP 地址。


    一年多前引入了一个新概念——网络安全组 (NSG)，它允许你为虚拟机创建类似 DMZ 的环境。网络管理员一旦理解了 NSG 的概念，他们会再次感到安全，如同在自己的数据中心一样。网络安全组可以应用于子网（虚拟网络内）或单个虚拟机，从而实现两层保护。NSG
    内部的规则可以独立于虚拟机进行修改和更新，从而允许在虚拟机生命周期之外管理访问控制列表。


    一个简单的用例是使用 NSG 来限制虚拟机的 Internet 访问，如图 5-8 所示。NSG 配置中一个很棒的易用性特性是使用虚拟网络标签来配置入站和出站规则。标签是预定义的标识符，代表一类
    IP 地址。`Internet` 标签表示公共 IP 地址空间，将用于限制所需虚拟机的 Internet 访问。


    ![A371128_1_En_5_Fig8_HTML.jpg](img/A371128_1_En_5_Fig8_HTML.jpg)

    **图 5-8. 网络安全组**

    '
- fmt: '### 监控与可用性集


    在配置虚拟机时，您可以配置监控（参见图`5-7`）。这允许您在部署期间通过附加将托管从监控端点接收的诊断数据的存储账户，来为您的虚拟机启用监控。


    另一个发挥作用的概念是可用性集，它有助于保护您的虚拟机免受计划外和计划内的维护事件影响。如果您正在部署独立的`SQL Server`实例，则不需要可用性集。建议您配置一个可用性集，以确保维护周期不会导致托管在`Azure`上的应用程序生产环境停机。可用性集感知更新/升级域和故障域（参考第`2`章），这确保在计划和计划外的维护活动中，您可用性集中的所有机器都不会离线。对于可用性组，最好将所有副本虚拟机分组在一个可用性集中。虚拟机的可用性集在创建后无法更改。


    ### SQL Server设置


    如果您使用的是来自市场的`SQL Server`镜像，将会提供这组配置选项来配置`SQL Server`连接性、身份验证、修补、备份、存储需求和密钥保管库配置。


    在图`5-9`中，请注意有两个连接性设置可用，即所需的连接类型和端口号。`SQL Connectivity`下拉列表中提供的三个选项是：


    ![图 5-9](A371128_1_En_5_Fig9_HTML.jpg)


    图 5-9.`SQL Server`特定配置设置


    *   **Local (inside VM only)** — 如果您不希望在虚拟机外部建立到`SQL Server`实例的连接，则应选择此项。

    *   **Private (within a virtual network)** — 如果您希望托管在同一虚拟网络中的应用程序和服务连接到`SQL Server`实例，则应选择此项。

    *   **Public (Internet)** — 如果您想从另一个虚拟网络或从本地环境运行的`Management Studio`等应用程序连接到`SQL
    Server`实例，则应选择此选项。


    `SQL Connectivity`设置和网络安全组的结合提供了一个强大的工具，可以锁定对您的`SQL Server`实例和虚拟机的访问。您还可以指定`SQL
    Server`实例将侦听的端口。作为安全最佳实践，最好将默认端口`1433`更改为不同的端口号，以消除已知的攻击向量。您也可以从同一视图启用`SQL Authentication`。


    接下来我们要讨论的配置选项是存储！存储配置让连接性配置看起来像小菜一碟。通过向导，您可以指定所需的`IOPs`、吞吐量和存储大小。您还可以选择工作负载类型，包括常规、事务处理和数据仓库。一旦提供了输入，向导会执行计算以确定最佳的存储配置。没有这个向导，您将不得不手动将磁盘附加到虚拟机。如果您希望单个数据库文件具有更高的吞吐量，并且无法将数据或日志文件条带化到多个磁盘，则需要在`Windows
    Server`上配置存储空间以帮助提升`IO`性能。有了这个向导，在配置过程中，正确数量的磁盘就会附加到虚拟机。如果指定设置需要多于一个磁盘，配置工作流会在所有磁盘上配置存储空间（虚拟驱动器）。您的存储配置任务变得非常简单！


    在我们讨论其他可用选项之前，让我们谈谈`SQL Server IaaS Agent Extension`。如果您拥有`Azure VM Guest Agent`并且正在`Windows
    Server 2012`或更高版本上部署`SQL Server 2012`或更高版本，则此代理可用。此扩展允许您为正在配置的虚拟机配置自动修补和备份设置。`SQL
    Automated Patching`允许您配置一个具有可配置持续时间的维护窗口，以便在不影响高峰业务时段用户的情况下，将更新应用到您的虚拟机。此设置的默认值为本地时间周日`2AM`，持续`60`分钟，您可以根据需要进行更改。`SQL
    automated backup`配置允许您，顾名思义，使用`Backup to URL`功能，将托管在`SQL Server`实例上的所有数据库自动备份到`Azure`存储账户。您还可以指定保留期以及加密选项。


    `Azure Key Vault`为透明数据库加密、列级加密和备份加密等功能提供了简便的密钥管理。`Azure Key Vault`服务旨在安全且高可用的位置提高加密密钥的安全性和管理。`SQL
    Server Connector`使`SQL Server`能够使用来自`Azure Key Vault`的这些密钥。您现在可以在配置虚拟机的配置输入时直接配置`SQL
    Server`实例以使用`Azure Key Vault`。


    既然您了解了所有的配置选项，不妨试用一下部署向导，在`Azure`虚拟机上启动您优化过的`SQL Server`实例。第`6`章包含有关使用本地实例部署混合部署以及配置可用性组的更多信息。'
  raw: 'While configuring the virtual machine, you can configure monitoring (see Figure
    [5-7](#A371128_1_En_5_Chapter.html#Fig7)). This allows you to enable monitoring
    for your virtual machine during deployment by attaching a storage account that
    will host the diagnostic data received from the monitoring endpoints.


    Another concept that comes into play is the Availability Set, which helps protect
    your virtual machines from unplanned and planned maintenance events. If you are
    deploying a standalone SQL Server instance, an Availability Set is not required.
    It is recommended that you configure an Availability Set to ensure that maintenance
    periods do not lead to downtimes for your application production environments
    hosted on Azure. The availability set is aware of Update/Upgrade and Fault Domains
    (refer Chapter [2](#A371128_1_En_2_Chapter.html)), which ensures that all the
    machines in your availability set are not taken offline during planned and unplanned
    maintenance activities. For availability groups, it is best to group all the replica
    virtual machines in an availability set. The availability set of a virtual machine
    can’t be changed after it is created.


    #### SQL Server Settings


    If you are using a SQL Server image from the marketplace, these set of configuration
    options will be offered to configure the SQL Server connectivity, authentication,
    patching, backup, and storage requirements and key vault configuration.


    In Figure [5-9](#A371128_1_En_5_Chapter.html#Fig9), note that there are two settings
    available for connectivity, namely the type of connectivity required and the port
    number. The three options provided (in the SQL Connectivity dropdown list) are:


    ![A371128_1_En_5_Fig9_HTML.jpg](A371128_1_En_5_Fig9_HTML.jpg)


    Figure 5-9.


    SQL Server specific configuration settings


    *   Local (inside VM only)—If you do not want connections being made to the SQL
    Server instance outside the virtual machine, then this is what you should pick.

    *   Private (within a virtual network)—You should pick this if you want applications
    and services hosted in the same virtual network to connect to the SQL Server instance.

    *   Public (Internet)—You should pick this option if you want to connect to the
    SQL Server instance from another virtual network or from an application like Management
    Studio running in an on-premises environment.


    The combination of the SQL Connectivity setting and Network Security Groups provides
    a powerful tool to lock down access to your SQL Server instance and virtual machine.
    You can also specify the port that the SQL Server instance will listen on. As
    a security best practice, it is best to change the default port of 1433 to a different
    port number to remove a known attack vector. You can also enable SQL Authentication
    from the same view.


    The next configuration option that we are going to discuss is the storage! Storage
    configuration makes connectivity configuration look like a piece of cake. With
    the wizard, you have the option of specifying the IOPs, throughput and the storage
    size required. You also have the option of choosing the type of workload from
    General, Transactional Processing, and Data Warehousing. Once the inputs are provided,
    the wizard performs a calculation to determine the best storage configuration.
    Without this wizard, you would be resigned to attach disks manually to the virtual
    machine. If you wanted a higher throughput for a single database file and were
    unable to stripe the data or log file to multiple disks, you would need to configure
    storage spaces on the Windows Server to help boost IO performance. With this wizard,
    the right number of disks are attached to the virtual machine during provisioning.
    If more than one disk is required for the specified settings, the provisioning
    workflow configures storage spaces (virtual drive) across all disks. Your storage
    configuration tasks just got really easy!


    Before we discuss the additional options available, let us talk about the SQL
    Server IaaS Agent Extension. This agent is available if you have Azure VM Guest
    Agent and are deploying SQL Server 2012 or above on Windows Server 2012 or above.
    This extension allows you to configure automated patching and backup settings
    for the virtual machine being provisioned. The SQL Automated Patching allows you
    to configure a maintenance window with a configurable duration for applying updates
    to your virtual machine without affecting users during peak business hours. The
    default for this setting is local time 2AM on Sunday for 60 minutes, which can
    be changed as per your needs. The SQL automated backup configuration allows you
    to configure as the name suggests automated backups of all your databases hosted
    on the SQL Server instance to an Azure storage account using the Backup to URL
    feature. You also have the option of specifying the retention period along with
    encryption options.


    Azure Key Vault provides ease of key management for features like transparent
    database encryption (TDE), column level encryption and backup encryption. The
    Azure Key Vault (AKV) service is designed to improve the security and management
    of encryption keys in a secure and highly available location. The SQL Server Connector
    enables SQL Server to use these keys from the Azure Key Vault. You can now directly
    configure the SQL Server instance to use Azure Key Vault while configuring the
    provisioning inputs for the virtual machine.


    Now that you know about all the configuration options, give the deployment wizard
    a test drive and spawn your optimized SQL Server instance running on an Azure
    Virtual Machine. Chapter [6](#A371128_1_En_6_Chapter.html) contains more information
    on deploying hybrid deployments using on-premise instances and also configuring
    availability groups.'
