  trans: '### 服务账户权限


    关于是否为 SQL Server 服务账户启用“在内存中锁定页面”权限，网上一直存在一个长期的争论。“在内存中锁定页面”是 Windows 的一项策略，它决定哪个账户可以使用进程将内存分配锁定在物理内存中。它能防止系统将数据分页到磁盘上的虚拟内存中。当
    SQL Server 服务账户被授予此用户权限时，缓冲池内存便无法被 Windows 分页出去。对于运行在 Azure 虚拟机上的 SQL Server 实例，建议您将“在内存中锁定页面”安全权限授予
    SQL Server 服务账户。这可以防止 SQL Server 进程的工作集被分页到磁盘。遭受明显性能打击的最大缺点是，虚拟机的页面文件默认驻留在本地连接的磁盘上。清单
    7-8 展示了如何确定是否已将“在内存中锁定页面”安全权限授予 SQL Server 服务账户。


    **注意**


    请务必为 SQL Server 实例限制 `MAX SERVER MEMORY`，尤其是在为 SQL Server 服务账户启用“在内存中锁定页面”安全权限时。


    ```

    $RulePass = 1

    $sqlquery = "SELECT locked_page_allocations_kb FROM sys.dm_os_process_memory"

    # 针对 SQL Server 实例执行查询

    $lpim = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

    if ($lpim.locked_page_allocations_kb -eq "0")

    {

    Write-Host "[WARN] 未将 Lock Pages in Memory 安全权限授予 SQL Server 服务账户" -ForegroundColor
    Red

    $RulePass = 0

    }

    if ($RulePass -eq 1)

    {

    Write-Host "[INFO] 已将 Lock Pages in Memory 安全权限授予 SQL Server 服务账户" -ForegroundColor
    Green

    }

    ```

    **清单 7-8.** 用于确定是否将内存锁定权限授予 SQL Server 服务账户的 PowerShell 脚本


    另一个容易获得的性能提升是将“性能卷维护任务”安全权限授予 SQL Server 服务账户。当 SQL Server 服务账户拥有此权限时，它允许 SQL
    Server 执行即时文件初始化。这使得 SQL Server 能够创建数据文件而无需将页面清零。如果您没有任何安全合规性要求禁止此操作，则应考虑将此安全权限授予
    SQL Server 服务账户。没有此权限，创建数据库文件所需时间可能长达 10 倍！图 7-2 说明了拥有和没有此权限时的差异。此类演示最好留给本书，不应在生产环境中进行测定。清单
    7-9 展示了如何确定 SQL Server 服务账户是否拥有为数据文件执行即时文件初始化的权限。它适用于任何 SQL Server 实例。


    ![A371128_1_En_7_Fig2_HTML.jpg](img/A371128_1_En_7_Fig2_HTML.jpg)


    **图 7-2.** 即时文件初始化对性能的影响


    ```

    # 查找计算机上安装的 SQL Server 服务

    $SqlService = Get-WmiObject -Query "SELECT * FROM Win32_Service WHERE PathName
    LIKE ''%sqlservr%''"

    # 将计算机上的 secpol 权限导出到文件

    $filename  = "secpol.inf"

    $secpol = secedit /export /cfg $filename | Out-Null

    $secpol = Get-Content $filename

    # 在输出中搜索卷维护任务权限

    $IFI = Select-String -Path $filename -Pattern "SeManageVolumePrivilege"

    # 删除文件

    #Remove-Item $filename

    # 循环遍历计算机上找到的每个 SQL Server 服务

    foreach ($servcice in $SqlService)

    {

    # 找出服务账户的 SID 值

    $objUser = New-Object System.Security.Principal.NTAccount($servcice.StartName)

    $strSID = $objUser.Translate([System.Security.Principal.SecurityIdentifier])

    # 找出 SQL 服务账户 SID 是否存在于输出中

    if ($IFI.ToString().Contains($strSID.Value))

    {

    Write-Host "[INFO] SQL Server 服务账户 ["$servcice.StartName"] 拥有 ''Perform Volume
    Maintenance Task'' 安全权限" -ForegroundColor Green

    }

    else

    {

    Write-Host "[ERR] SQL Server 服务账户 ["$servcice.StartName"] 未拥有 ''Perform Volume
    Maintenance Task'' 安全权限" -ForegroundColor Red

    }

    }

    ```

    **清单 7-9.** 用于确定 SQL 服务账户是否具备执行即时文件初始化能力的 PowerShell 脚本


    要利用即时文件初始化，您需要授予 SQL Server 服务账户 `SE_MANAGE_VOLUME_NAME` 权限，并将其添加到“执行卷维护任务”安全策略中。将
    SQL Server 服务账户添加到“执行卷维护任务”安全策略后，请重新启动 SQL Server 服务。'
- fmt: "## Backups\n\n最常见的 DBA 任务之一是确保数据得到备份并免受任何灾难的破坏。保护数据是神圣的职责，没有 DBA 可以推脱。不过，在\
    \ Azure VM 上备份数据库的技术略有不同。\n\n配置数据库备份时，最好使用 SQL Server 的“备份到 URL”功能（在 SQL Server\
    \ 2012 Service Pack 1 累积更新 2 或更高版本、SQL Server 2014 或 SQL Server 2016 中可用），因为它可以直接备份到\
    \ Azure Blob 存储。这并非在本地数据中心通常配置的方式，但对于你的 Azure VM 来说是个简单的选择。另一个要记住的技巧是使用 SQL Server\
    \ 中可用的备份压缩功能。这减少了虚拟机与 Blob 存储之间传输的网络字节数。\n\n图 7-3 显示了压缩备份到 Blob 存储（表示为云）与未压缩备份到磁盘相比，在吞吐量和时间上存在显著差异。\n\
    \n![A371128_1_En_7_Fig3_HTML.jpg](A371128_1_En_7_Fig3_HTML.jpg)\n图 7-3. 备份到磁盘与备份到\
    \ Blob 存储的性能比较\n\n瞥一眼图 7-3 可能会让你疑惑：如果有专门为此创建的备份数据磁盘，为什么还需要改变备份到它的习惯？在 Azure VM\
    \ 上，主要原因是备份到磁盘会消耗你的数据磁盘和存储账户的 IOPS，而这些是有阈值的。如果可以避免，你不想消耗这种宝贵的资源，尤其是在高性能环境中。如果你同时将多个数据库备份到一个数据磁盘，你可能很快就会达到磁盘吞吐量阈值。如果你使用高级\
    \ IO 磁盘进行备份，这不会是资源的最佳利用，并且从成本效益分析来看是反直觉的！清单 7-10 展示了如何确定数据库备份是否存储在 Azure 磁盘上。\n\
    \n```powershell\n$sqlquery = \"if exists (select TOP 1 physical_device_name from\
    \ msdb.dbo.backupmediafamily where physical_device_name not like 'http%')\nselect\
    \ 'Disk' as Result\nelse\nselect 'Blob' as Result\"\n# Execute a query against\
    \ the SQL Server instance\n$backups = Invoke-Sqlcmd -ServerInstance $sqlserver\
    \ -Query $sqlquery\n# Check if backups are being done to BLOBs directly\nif ($backups.Result\
    \ -eq \"Disk\")\n{\n    Write-Host \"[WARN] Database backups found on local disks\"\
    \ -ForegroundColor Red\n    $RulePass = 0\n}\nif ($RulePass -eq 1)\n{\n    Write-Host\
    \ \"[INFO] All database backups are being backed up to Azure Blobs\" -ForegroundColor\
    \ Green\n}\n\n$sqlquery = \"if exists (select top 1 backup_size from msdb.dbo.backupset\
    \ where compressed_backup_size = backup_size)\nselect 'Uncompressed' as Result\n\
    else\nselect 'Compressed' as Result\"\n# Execute a query against the SQL Server\
    \ instance\n$backups = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery\n\
    # Check if backups are being compressed or not\nif ($backups.Result -eq \"Uncompressed\"\
    )\n{\n    Write-Host \"[WARN] Uncompressed backups are being performed on this\
    \ instance\" -ForegroundColor Red\n    $RulePass = 0\n}\nif ($RulePass -eq 1)\n\
    {\n    Write-Host \"[INFO] All database backups are using backup compression\"\
    \ -ForegroundColor Green\n}\n```\n清单 7-10. 用于检查 SQL Server 实例是否对 Azure Blob 执行了压缩备份的\
    \ PowerShell 脚本\n\n## Data Files on Azure Blobs\n\nSQL Server 2014 及以上版本支持一个选项，可以将数据库文件直接存储在\
    \ Azure Blob 上。既然我们在上一节已经谈到了改变习惯，花点时间了解一下这个功能可能是值得的。这个功能不仅让你免于需要附加额外的数据磁盘，还允许你利用\
    \ Azure Blob 无限的存储容量。此功能适用于运行在本地环境或 Azure VM 上的 SQL Server 实例。使用 Azure Blob 上的数据文件使你免于受限于数据磁盘或一组数据磁盘的\
    \ IOPS 限制。特别是在非生产环境中，这是在不影响性能或不损害 IO 性能一致性的情况下降低成本的好方法。这避免了为你的测试环境使用高级 IO 磁盘的需要。\n\
    \n图 7-4 说明了在 Azure Blob 上托管数据库文件的概念。\n\n![A371128_1_En_7_Fig4_HTML.jpg](A371128_1_En_7_Fig4_HTML.jpg)\n\
    图 7-4. Azure Blob 上的 SQL Server 数据库文件\n\n关于 SQL Server 如何在 Azure Blob 上存储这些文件的讨论超出了范围，但理解此功能的额外好处很重要。当使用\
    \ SQL Server 2016 将数据文件托管在 Azure Blob 上时，你可以选择利用 SQL Server 文件快照备份。它使用 Azure 快照为使用\
    \ Azure Blob 存储服务存储的数据库文件提供近乎即时的备份和更快的还原。文件快照备份（参见图 7-5）由包含数据库文件的 Blob 的一组 Azure\
    \ 快照，加上一个指向这些文件快照的备份文件组成。想想 SAN 快照！每个文件快照都与基础 Blob 存储在同一容器中。你可以指定备份文件本身写入 URL、磁盘或磁带。但是，建议备份到\
    \ URL。有关示例，请参见清单 7-11。\n\n![A371128_1_En_7_Fig5_HTML.jpg](A371128_1_En_7_Fig5_HTML.jpg)\n\
    图 7-5. 使用 Azure Blob 存储数据文件的 SQL Server 数据库文件快照备份\n\n```sql\nBACKUP DATABASE AdventureWorks2016\n\
    TO URL = 'https://<account>.blob.core.windows.net/<container>/AdventureWorks2016.bak'\n\
    WITH FILE_SNAPSHOT;\n```\n清单 7-11. 文件快照备份的 Transact-SQL 示例\n\n如你所见，将数据文件存储在 Azure\
    \ Blob 上并使用文件快照备份极大地简化了你的存储、备份和还原方案！"
  raw: '### Backups


    One of the most common DBA tasks is to ensure that the data is backed up and protected
    from any sort of disaster. Protecting the data is a sacrosanct job that no DBA
    can refute. However, the art of backing up databases on an Azure VM is slightly
    different.


    When you do configure the database backups, it is best to use SQL Server’s Backup
    to Url feature (available in SQL Server 2012 Service Pack 1 Cumulative Update
    2 or higher or SQL Server 2014 or SQL Server 2016), as it directly backs up to
    Azure blog storage. This is not something that you would have normally configured
    in data centers hosted on-premises, but is a no-brainer for your Azure VM. Another
    tip to keep in mind is to use the backup compression feature available in SQL
    Server. This leads to fewer numbers of network bytes transferred between your
    virtual machine and the blog store.


    Figure [7-3](#A371128_1_En_7_Chapter.html#Fig3) shows that there is a significant
    throughput and time difference between compressed backups to blob storage (denoted
    as the cloud) as opposed to uncompressed backups on the disk.


    ![A371128_1_En_7_Fig3_HTML.jpg](A371128_1_En_7_Fig3_HTML.jpg)


    Figure 7-3.


    Performance comparison of backing up to disk and to blob storage


    A glance at Figure [7-3](#A371128_1_En_7_Chapter.html#Fig3) might make you wonder
    why there is a need to break the habit of backing up to a backup data disk if
    one is created for this purpose. On an Azure VM, the primary reason is that backing
    up to the disk consumes IOPs for your data disk and storage accounts, which have
    thresholds. You do not want to spend this commodity if it can be avoided, especially
    for high performance environments. If you concurrently back up multiple databases
    to a data disk, you could very quickly hit your disk throughput thresholds. And
    if you are using Premium IO disk for backups, this wouldn''t be the best use of
    your resources and is counter-intuitive from a cost-benefit analysis! Listing
    [7-10](#A371128_1_En_7_Chapter.html#Par59) shows how to determine if backups of
    the databases are being stored on an Azure disk.


    ```

    $sqlquery = "if exists (select TOP 1 physical_device_name from msdb.dbo.backupmediafamily
    where physical_device_name not like ''http%'')

    select ''Disk'' as Result

    else

    select ''Blob'' as Result"

    # Execute a query against the SQL Server instance

    $backups = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

    # Check if backups are being done to BLOBs directly

    if ($backups.Result -eq "Disk")

    {

    Write-Host "[WARN] Database backups found on local disks" -ForegroundColor Red

    $RulePass = 0

    }

    if ($RulePass -eq 1)

    {

    Write-Host "[INFO] All database backups are being backed up to Azure Blobs" -ForegroundColor
    Green

    }

    $sqlquery = "if exists (select top 1 backup_size from msdb.dbo.backupset where
    compressed_backup_size = backup_size)

    select ''Uncompressed'' as Result

    else

    select ''Compressed'' as Result"

    # Execute a query against the SQL Server instance

    $backups = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

    # Check if backups are being compressed or not

    if ($backups.Result -eq "Uncompressed")

    {

    Write-Host "[WARN] Uncompressed backups are being performed on this instance"
    -ForegroundColor Red

    $RulePass = 0

    }

    if ($RulePass -eq 1)

    {

    Write-Host "[INFO] All database backups are using backup compression" -ForegroundColor
    Green

    }

    Listing 7-10.

    PowerShell Script to Check if Compressed Backups to Azure Blobs Are Being Performed
    on the SQL Server Instance

    ```


    ## Data Files on Azure Blobs


    SQL Server 2014 and above support an option to store your database files directly
    on Azure blobs. Since we already talked about breaking the habit in the earlier
    section, it might be worthwhile spending a few moments on this feature. This feature
    not only allows you to rid yourself of the need to attach additional data disks,
    but also allows you to leverage the limitless storage capacity of Azure blobs.
    This feature is available to a SQL Server instances running on an on-premises
    environment or an Azure VM. Using data files on Azure blobs frees you from the
    IOPs limits on data disks or a group of data disks. Especially on non-production
    environments, this is a great way to reduce the cost without affecting performance
    or compromising on IO performance consistency. This prevents the need of using
    Premium IO disks for your test environments.


    Figure [7-4](#A371128_1_En_7_Chapter.html#Fig4) illustrates the concept of hosting
    database files on Azure blobs.


    ![A371128_1_En_7_Fig4_HTML.jpg](A371128_1_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    SQL Server database files on Azure blobs


    The discussion of how SQL Server stores these files on Azure blobs is out-of-scope,
    but it’s important to understand an added benefit of this feature. When you have
    data files hosted on Azure blob with SQL Server 2016, you have the option of leveraging
    SQL Server file-snapshot backup. This uses Azure snapshots to provide nearly instantaneous
    backups and quicker restores for database files stored using the Azure blob storage
    service. A file-snapshot backup (see Figure [7-5](#A371128_1_En_7_Chapter.html#Fig5))
    consists of a set of Azure snapshots of the blobs containing the database files,
    plus a backup file containing pointers to these file-snapshots. Think SAN snapshots!
    Each file-snapshot is stored in the container with the base blob. You can specify
    that the backup file itself be written to URL, disk, or tape. However, backing
    up to URL is recommended. See Listing [7-11](#A371128_1_En_7_Chapter.html#Par63)
    for an example.


    ![A371128_1_En_7_Fig5_HTML.jpg](A371128_1_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    File-snapshot backup of SQL Server databases using Azure blobs for data files


    ```

    BACKUP DATABASE AdventureWorks2016

    TO URL = ''https://.blob.core.windows.net//AdventureWorks2016.bak''

    WITH FILE_SNAPSHOT;

    Listing 7-11.

    Transact-SQL Example of File-Snapshot Backup

    ```


    As you can see, storing the data files on Azure blobs and using file-snapshot
    backups greatly simplify your storage, backup, and restore story!'
  trans: "## 备份\n\n最常见的 DBA 任务之一是确保数据得到备份并免受任何灾难的破坏。保护数据是神圣的职责，没有 DBA 可以推脱。不过，在 Azure\
    \ VM 上备份数据库的技术略有不同。\n\n配置数据库备份时，最好使用 SQL Server 的“备份到 URL”功能（在 SQL Server 2012\
    \ Service Pack 1 累积更新 2 或更高版本、SQL Server 2014 或 SQL Server 2016 中可用），因为它可以直接备份到\
    \ Azure Blob 存储。这并非在本地数据中心通常配置的方式，但对于你的 Azure VM 来说是个简单的选择。另一个要记住的技巧是使用 SQL Server\
    \ 中可用的备份压缩功能。这减少了虚拟机与 Blob 存储之间传输的网络字节数。\n\n图 7-3 显示了压缩备份到 Blob 存储（表示为云）与未压缩备份到磁盘相比，在吞吐量和时间上存在显著差异。\n\
    \n![A371128_1_En_7_Fig3_HTML.jpg](img/A371128_1_En_7_Fig3_HTML.jpg)\n图 7-3. 备份到磁盘与备份到\
    \ Blob 存储的性能比较\n\n瞥一眼图 7-3 可能会让你疑惑：如果有专门为此创建的备份数据磁盘，为什么还需要改变备份到它的习惯？在 Azure VM\
    \ 上，主要原因是备份到磁盘会消耗你的数据磁盘和存储账户的 IOPS，而这些是有阈值的。如果可以避免，你不想消耗这种宝贵的资源，尤其是在高性能环境中。如果你同时将多个数据库备份到一个数据磁盘，你可能很快就会达到磁盘吞吐量阈值。如果你使用高级\
    \ IO 磁盘进行备份，这不会是资源的最佳利用，并且从成本效益分析来看是反直觉的！清单 7-10 展示了如何确定数据库备份是否存储在 Azure 磁盘上。\n\
    \n```powershell\n$sqlquery = \"if exists (select TOP 1 physical_device_name from\
    \ msdb.dbo.backupmediafamily where physical_device_name not like 'http%')\nselect\
    \ 'Disk' as Result\nelse\nselect 'Blob' as Result\"\n# 针对 SQL Server 实例执行查询\n\
    $backups = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery\n# 检查备份是否直接存储到\
    \ BLOB\nif ($backups.Result -eq \"Disk\")\n{\n    Write-Host \"[警告] 在本地磁盘上找到数据库备份\"\
    \ -ForegroundColor Red\n    $RulePass = 0\n}\nif ($RulePass -eq 1)\n{\n    Write-Host\
    \ \"[信息] 所有数据库备份均存储到 Azure Blobs\" -ForegroundColor Green\n}\n\n$sqlquery = \"\
    if exists (select top 1 backup_size from msdb.dbo.backupset where compressed_backup_size\
    \ = backup_size)\nselect 'Uncompressed' as Result\nelse\nselect 'Compressed' as\
    \ Result\"\n# 针对 SQL Server 实例执行查询\n$backups = Invoke-Sqlcmd -ServerInstance $sqlserver\
    \ -Query $sqlquery\n# 检查备份是否被压缩\nif ($backups.Result -eq \"Uncompressed\")\n{\n\
    \    Write-Host \"[警告] 此实例正在执行未压缩的备份\" -ForegroundColor Red\n    $RulePass = 0\n\
    }\nif ($RulePass -eq 1)\n{\n    Write-Host \"[信息] 所有数据库备份均使用备份压缩\" -ForegroundColor\
    \ Green\n}\n```\n清单 7-10. 用于检查 SQL Server 实例是否对 Azure Blob 执行了压缩备份的 PowerShell\
    \ 脚本\n\n## Azure Blobs 上的数据文件\n\nSQL Server 2014 及以上版本支持一个选项，可以将数据库文件直接存储在 Azure\
    \ Blob 上。既然我们在上一节已经谈到了改变习惯，花点时间了解一下这个功能可能是值得的。这个功能不仅让你免于需要附加额外的数据磁盘，还允许你利用 Azure\
    \ Blob 无限的存储容量。此功能适用于运行在本地环境或 Azure VM 上的 SQL Server 实例。使用 Azure Blob 上的数据文件使你免于受限于数据磁盘或一组数据磁盘的\
    \ IOPS 限制。特别是在非生产环境中，这是在不影响性能或不损害 IO 性能一致性的情况下降低成本的好方法。这避免了为你的测试环境使用高级 IO 磁盘的需要。\n\
    \n图 7-4 说明了在 Azure Blob 上托管数据库文件的概念。\n\n![A371128_1_En_7_Fig4_HTML.jpg](img/A371128_1_En_7_Fig4_HTML.jpg)\n\
    图 7-4. Azure Blob 上的 SQL Server 数据库文件\n\n关于 SQL Server 如何在 Azure Blob 上存储这些文件的讨论超出了范围，但理解此功能的额外好处很重要。当使用\
    \ SQL Server 2016 将数据文件托管在 Azure Blob 上时，你可以选择利用 SQL Server 文件快照备份。它使用 Azure 快照为使用\
    \ Azure Blob 存储服务存储的数据库文件提供近乎即时的备份和更快的还原。文件快照备份（参见图 7-5）由包含数据库文件的 Blob 的一组 Azure\
    \ 快照，加上一个指向这些文件快照的备份文件组成。想想 SAN 快照！每个文件快照都与基础 Blob 存储在同一容器中。你可以指定备份文件本身写入 URL、磁盘或磁带。但是，建议备份到\
    \ URL。有关示例，请参见清单 7-11。\n\n![A371128_1_En_7_Fig5_HTML.jpg](img/A371128_1_En_7_Fig5_HTML.jpg)\n\
    图 7-5. 使用 Azure Blob 存储数据文件的 SQL Server 数据库文件快照备份\n\n```sql\nBACKUP DATABASE AdventureWorks2016\n\
    TO URL = 'https://<account>.blob.core.windows.net/<container>/AdventureWorks2016.bak'\n\
    WITH FILE_SNAPSHOT;\n```\n清单 7-11. 文件快照备份的 Transact-SQL 示例\n\n如你所见，将数据文件存储在 Azure\
    \ Blob 上并使用文件快照备份极大地简化了你的存储、备份和还原方案！"
- fmt: '## Monitoring


    While we are on the topic of breaking the habit, it is important to note that
    almost all the data-gathering and analysis tools that you are used for on-premises
    or virtualized SQL Server instances work in pretty much similar fashion for SQL
    Server instances hosted on Azure VM. In the next few pages, you’ll get acquainted
    with the new monitoring capabilities that Azure provides for SQL Servers running
    on Azure VMs.


    One of the most common questions that you might face as a DBA is how to monitor
    performance of a SQL Server instance running on an Azure VM. One of the easiest
    answers is using the Azure portal. Figure [7-6](#A371128_1_En_7_Chapter.html#Fig6)
    shows a customized set of tiles available on the virtual machine’s landing page.
    You can add the groups and tiles to the view that you see in Figure [7-6](#A371128_1_En_7_Chapter.html#Fig6).


    ![A371128_1_En_7_Fig6_HTML.jpg](A371128_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. Azure portal monitoring dashboard


    The portal lets you configure alerts on various perfmon counters that are available
    to be captured. Figure [7-7](#A371128_1_En_7_Chapter.html#Fig7) shows the alert
    rules that are configured for a particular machine and also the actions that are
    available when the alert condition is met. A large number of the common alerts—such
    as disk, CPU, memory, network, and SQL performance counter-related thresholds—can
    be configured for a virtual machine. For the SQL performance metrics to be available,
    you have to enable SQL metrics to be collected under the Diagnostics tab (see
    Figure [7-7](#A371128_1_En_7_Chapter.html#Fig7)). This can be done during provisioning
    as well, which is explained in Chapter [5](#A371128_1_En_5_Chapter.html).


    ![A371128_1_En_7_Fig7_HTML.jpg](A371128_1_En_7_Fig7_HTML.jpg)


    Figure 7-7. Configuring performance-based alerts for a virtual machine


    If you want to get down to the factory approach of setting up the alerts for a
    large number of virtual machines, this is possible using canned scripts using
    the `Add-AlertRule` cmdlet. The response to the alert can be an e-mail and/or
    you can post the alert to a web hook, which can further process the alert.


    ## Operational Insights


    Some of the best practices checks are common to any SQL Server instance irrespective
    of the location. Since we are talking about SQL Server instances hosted on Azure
    Virtual Machines, this might be a prudent opportunity to discuss `Operational
    Insights`, which work for on-premises and Azure Virtual Machines.


    `Operational Insights`, part of Microsoft Operations Management Suite, is a software
    as a service (SaaS) solution tailored to IT operations teams. This service uses
    the power of Azure to collect, store, and analyze log data from virtually any
    Windows Server and Linux source, from any data center or cloud, and turn that
    data into real-time operational intelligence to help you make better-informed
    decisions.


    Figure [7-8](#A371128_1_En_7_Chapter.html#Fig8) shows the Azure Operational Insights
    dashboard. This service provides a high value for various other benefits like
    enabling change tracking, capacity planning, malware assessment, etc., which show
    up as solutions in the Solutions Gallery. Although touching upon all the available
    solutions in the gallery is out-of-scope for this chapter, it’s worthwhile to
    explore the solutions available in the gallery, even for a SQL Server environment!


    ![A371128_1_En_7_Fig8_HTML.jpg](A371128_1_En_7_Fig8_HTML.jpg)


    Figure 7-8. Azure Operational Insights home page showing enabled solutions


    To get started with `Operational Insights`, you need to download an agent that
    will have to be installed and configured with a workspace ID and a storage key,
    which will be used by the agent to upload the data to Azure. Once you have configured
    the agent, your first task is to enable the SQL Assessment solution. This provides
    a plethora of checks categorized under the following headings:


    *   Security and Compliance

    *   Availability and Business Continuity

    *   Performance and Scalability

    *   Upgrade, Migration, and Deployment

    *   Operations and Monitoring

    *   Change and Configuration Management


    Depending on the data collected, your SQL Server instance might not report issues
    for certain categories and show up a bit red on certain others! Figure [7-9](#A371128_1_En_7_Chapter.html#Fig9)
    shows the high and low priority recommendations for the different areas assessed.


    ![A371128_1_En_7_Fig9_HTML.jpg](A371128_1_En_7_Fig9_HTML.jpg)


    Figure 7-9. SQL Assessment showing issues identfied in different areas


    The tiles have additional drill-down capability that allows you to get additional
    information like the SQL Server instance that reported the issue, the affected
    object name, and additional reading material for the reported issue. You even
    get a recommended corrective action for the reported issue, as shown in Figure
    [7-10](#A371128_1_En_7_Chapter.html#Fig10).


    ![A371128_1_En_7_Fig10_HTML.jpg](A371128_1_En_7_Fig10_HTML.jpg)


    Figure 7-10. Drilldown of performance issues reported by Azure Operational Insights


    The SQL Assessment checks a number of the post deployment performance considerations
    discussed earlier in this chapter, like tempdb configuration. This service has
    a free tier that has a retention period of seven days and a daily limit of 500MB
    per day. If you want to process more day with a higher retention period, especially
    with a large number of instances, you might need to leverage a paid tier for `Operational
    Insights`.


    ## Cheat Sheet


    If you felt this information was too much to digest in a short piece of time,
    here is a cheat sheet that you can use as a quick reference to set up your virtual
    machine hosting SQL Server.


    1.  Pick a minimum of DS3 for Enterprise Edition and DS2 for Standard Edition
    deployments. You might need to pick a higher virtual machine tier if you have
    high network bandwidth requirements.

    2.  Use Premium storage for high performance workloads and ensure that the compute
    and storage are co-located in the same region.

    3.  Disable geo-replication for the storage account.

    4.  Use separate P30 disks for hosting data, log, and tempdb files if required
    with an allocation unit size of 64K. Do not host data and log files on the same
    drive. Create a storage pool where necessary.

    5.  Enabled read caching for data and tempdb data disks and no caching for data
    disks hosting log files when using Premium storage. For Standard data disks, do
    not enable caching.

    6.  Disable `AUTO CLOSE` and `AUTO SHRINK` for the databases and prevent auto
    growth as much as possible.

    7.  Grant the SQL Server service account these security privileges: Lock Pages
    in Memory and Performance Volume Maintenance Tasks (Instant File Initialization).

    8.  Performance compressed database backups to Azure blobs.


    ## Summary


    This chapter explained the best practices and recommendations that you need to
    follow when running SQL Server instances on Azure Virtual Machine. We also looked
    options available in the Azure portal, Azure services, and PowerShell to verify
    if the performance best practices and recommendations are in place for the environment
    running SQL Server. Standard diagnostics data collection techniques work with
    Azure Virtual Machines, but leveraging the hybrid, cloud-enabled options along
    with the hooks that the new portal provides makes life a lot easier.


    When you run the best practices check available in the GitHub repository (`SqlOnAzureVM`),
    you’ll see the output in Figure [7-11](#A371128_1_En_7_Chapter.html#Fig11).


    ![A371128_1_En_7_Fig11_HTML.jpg](A371128_1_En_7_Fig11_HTML.jpg)


    Figure 7-11. Result of a best practices check executed on an Azure Virtual Machine
    hosting SQL Server'
