  trans: '

    #### 标准地理复制


    标准地理复制允许创建（最多一个）辅助副本（不可读）到微软指定的“DR 配对”区域（参见图 9-9）。微软指定的 DR 配对区域列表可以在以下网址找到：


    ![A371128_1_En_9_Fig9_HTML.jpg](img/A371128_1_En_9_Fig9_HTML.jpg)

    图 9-9. 标准地理复制的示意视图


    ```

    http://blogs.msdn.com/b/windowsazurestorage/archive/2013/12/11/introducing-read-access-geo-replicated-storage-ra-grs-for-windows-azure-storage.aspx

    ```


    当主副本处于活动运行状态时，辅助副本是不可读的。需要手动故障转移才能使数据库可供用户访问。标准地理复制提供了经典的灾难恢复场景，即如果主副本出现问题，可以立即将辅助副本联机。


    标准地理复制可以通过管理门户设置，如图 9-10 至 9-12 所示，或者使用 PowerShell（参见清单 9-3）。


    ![A371128_1_En_9_Fig12_HTML.jpg](img/A371128_1_En_9_Fig12_HTML.jpg)

    图 9-12. 配置标准地理复制选项


    ![A371128_1_En_9_Fig11_HTML.jpg](img/A371128_1_En_9_Fig11_HTML.jpg)

    图 9-11. 配置标准地理复制选项


    ![A371128_1_En_9_Fig10_HTML.jpg](img/A371128_1_En_9_Fig10_HTML.jpg)

    图 9-10. 配置标准地理复制


    点击“地理复制角色”选项会打开设置地理复制的窗口。也可以通过点击“所有设置”然后选择“地理复制”来配置。


    在地理复制设置页面上，您有一个指定辅助服务器的选项。如前所述，对于标准地理复制，只允许将“DR 配对”区域作为辅助区域。


    与 Azure 门户一样，PowerShell 也可用于设置标准地理复制（参见清单 9-3）。


    ```

    $resourceGroupName = "Default-SQL-SoutheastAsia"

    $DbServerName = "primarysvr"

    $SecondaryServerName = "secondsvr"

    $DBName = Get-AzureRmSqlDatabase -ServerName $DbServerName -ResourceGroupName
    $resourceGroupName | Where-Object {($_.Edition -eq "Standard") -and ($_.DatabaseName
    -ne "master")}

    $replicationLink = New-AzureRmSqlDatabaseSecondary -DatabaseName $DBName[0].DatabaseName
    -ServerName $DbServerName -ResourceGroupName $resourceGroupName -PartnerResourceGroupName
    $resourceGroupName -PartnerServerName $SecondaryServerName -AllowConnections No

    if($replicationLink -ne $null)

    {

    Write-Host "Standard Geo Replication Setup successfully!!"

    }

    清单 9-3. 使用 PowerShell 配置标准地理复制

    ```


    由于在此情况下数据库配置为标准层，这里唯一允许的选项是拥有一个不可读的辅助副本。此属性可以使用管理门户进行验证（参见图 9-13）。


    ![A371128_1_En_9_Fig13_HTML.jpg](img/A371128_1_En_9_Fig13_HTML.jpg)

    图 9-13. 在此情况下只有一个不可读的辅助副本可用


    配置复制后，数据库的状态会相应更改。例如，如图 9-14 所示，主数据库会显示地理复制角色状态为“主数据库”，而辅助副本会显示为“辅助数据库”。


    ![A371128_1_En_9_Fig14a_HTML.jpg](img/A371128_1_En_9_Fig14a_HTML.jpg)![A371128_1_En_9_Fig14b_HTML.jpg](img/A371128_1_En_9_Fig14b_HTML.jpg)

    图 9-14. 数据库状态已更改


    #### 执行数据库故障转移


    Azure 门户提供了一个非常简便的一键式机制，可在主数据库宕机时进行故障转移（参见图 9-15）。您只需浏览到地理复制设置，然后点击辅助数据库并启动故障转移。Azure
    还提供了在需要时停止复制的机制。


    ![A371128_1_En_9_Fig15_HTML.jpg](img/A371128_1_En_9_Fig15_HTML.jpg)

    图 9-15. 执行数据库故障转移


    也可以使用 PowerShell 将数据库故障转移到辅助副本。


    ```

    Set-AzureRMSqlDatabaseSecondary -DatabaseName $DBName[0].DatabaseName -PartnerResourceGroupName
    $resourceGroup -ResourceGroupName $resourceGroup -ServerName $SecondaryServer
    –Failover -AllowDataLoss

    ```


    #### 活动地理复制


    活动地理复制使用与标准地理复制相同的技术，但有以下区别（参见图 9-16）：


    ![A371128_1_En_9_Fig16_HTML.jpg](img/A371128_1_En_9_Fig16_HTML.jpg)

    图 9-16. 活动地理复制的示意视图


    *   辅助副本是可读的。

    *   全球任何数据中心中最多可以有四个辅助副本。用户可以在任何数据中心创建辅助副本，不受 DR 配对区域的限制。

    *   活动地理复制仅适用于高级层数据库。


    与标准地理复制一样，活动地理复制可以通过 Azure 门户设置，如图 9-17 和 9-18 所示，或者使用 PowerShell，如清单 9-4 所示。


    ![A371128_1_En_9_Fig18_HTML.jpg](img/A371128_1_En_9_Fig18_HTML.jpg)

    图 9-18. 活动地理复制的初始化


    ![A371128_1_En_9_Fig17_HTML.jpg](img/A371128_1_En_9_Fig17_HTML.jpg)

    图 9-17. 配置活动地理复制


    如前所述，使用活动地理复制最多可以创建四个辅助副本（每个位于不同的区域）。所有辅助副本都是可读的，可用于只读工作负载（例如运行报表）。如果主服务器出现问题，可以启动手动故障转移来恢复辅助数据库并使其可用于应用程序工作负载。图
    9-18 表示一个具有两个活动地理复制辅助副本的场景。


    可以使用 Azure 门户或 PowerShell 执行数据库故障转移。故障转移后，新的主数据库进入“联机”状态，而新的辅助数据库进入“可读”状态。如图 9-19
    所示，美国东部数据库现在是主数据库，而东南亚数据库已成为一个可读的辅助数据库。


    ![A371128_1_En_9_Fig19_HTML.jpg](img/A371128_1_En_9_Fig19_HTML.jpg)

    图 9-19. 活动地理复制实战


    清单 9-4 显示了一个启用活动地理复制的 PowerShell 脚本示例。


    ```

    $resourceGroupName = "Default-SQL-SoutheastAsia"

    $DbServerName = "primarysvr"

    $SecondaryServerName = "secondsvr"

    $DBName = Get-AzureRmSqlDatabase -ServerName $DbServerName -ResourceGroupName
    $resourceGroupName | Where-Object {($_.Edition -eq "Premium") -and ($_.DatabaseName
    -ne "master")}

    $replicationLink = New-AzureRmSqlDatabaseSecondary -DatabaseName $DBName[0].DatabaseName
    -ServerName $DbServerName -ResourceGroupName $resourceGroupName -PartnerResourceGroupName
    $resourceGroupName -PartnerServerName $SecondaryServerName -AllowConnections All

    if($replicationLink -ne $null)

    {

    Write-Host "Geo Replication Setup successfully!!"

    }

    传递给 `New-AzureRmSqlDatabaseSecondary` cmdlet 的 “Allow Connections” 参数至关重要。如果未指定
    “All” 选项，Azure 将创建一个不可读的数据库辅助副本。

    清单 9-4. 启用活动地理复制

    ```

    '
- fmt: '# SQL Server Replication


    SQL Server Transactional Replication (and Snapshot Replication) can be set up
    between an on-premises SQL Server or a SQL Server running on Azure VM to an Azure
    SQL database. The following key considerations must be made while setting up replication
    between SQL Server publisher and Azure SQL Database subscriber (see Figure 9-20).


    ![A371128_1_En_9_Fig20_HTML.jpg](A371128_1_En_9_Fig20_HTML.jpg)


    Figure 9-20. SQL replication to Azure SQL Database


    *   The publisher and distributor can be an on-premises SQL Server instance or
    a SQL Server running on Azure VM. The minimum supported build for SQL Server is
    `SQL Server 2012 SP2 CU8`.

    *   The subscriber (`Azure SQL Database`) should be in a push subscription, meaning
    the distribution agent will run on the distribution server.

    *   All replication monitoring and management needs to be performed from the publisher
    server.


    Replication to `Azure SQL Database` can be set up using either `SQL Server Management
    Studio`, as illustrated in Figure 9-21, or using `T-SQL` scripts. When you’re
    selecting the subscription for an existing publication or a new publication, the
    `Azure SQL Database` server and the database can be specified.


    ![A371128_1_En_9_Fig21_HTML.jpg](A371128_1_En_9_Fig21_HTML.jpg)


    Figure 9-21. Configuring replication to Azure SQL Database


    Once replication has been set up, the `Replication Monitor` can be used to monitor
    and manage the subscriptions. Replication to `Azure SQL Database` can be used
    in an effective way to migrate an existing workload to `Azure SQL Database`.


    ## Azure SQL Database: Security and Auditing


    Azure SQL databases provide a plethora of out-of-box security features to ensure
    that users data residing on Azure are not compromised at any cost. The multi-layered
    security available with `Azure SQL Database`—which includes role-based authorization
    (just like `SQL Server`), features to encrypt the data at rest and in transit,
    data masking to restrict access and row-level security—is designed to provide
    full protection from any real or perceived threats.


    Some of the key security features available with `Azure SQL Database` are covered
    next.


    ### Firewall Administration


    The first layer of security is provided by the `Azure SQL Database` firewall,
    which blocks all unauthorized connections to the `Azure SQL Database` (see Figure
    9-22). `Azure Portal` (or `PowerShell`) can be used to configure the IP address
    (or address range) from which connections can be allowed to the `Azure SQL databases`
    (or the logical server). Connections from any other IP would be automatically
    refused.


    ![A371128_1_En_9_Fig22_HTML.jpg](A371128_1_En_9_Fig22_HTML.jpg)


    Figure 9-22. Configuring firewall exceptions for Azure SQL databases


    ### Authentication and Authorization


    `Azure SQL Database` now allows both `SQL` authentication and `Azure Active Directory`
    authentication (provided there is an `Azure AD` configured to use). Like `Microsoft
    SQL Server`, `Azure SQL Database` also uses role-based access authorizations.
    `SQL Database` provides both server level roles and database level roles that
    can be managed using the `Azure Portal`, `PowerShell`, or using `SQL Server Management
    Studio` (only database roles). Server roles and/or database roles are effective
    tools that can help control which user has access to what data. In addition to
    providing role-based access, `Azure SQL Database` also provides some really cool
    features that have not yet made it to the box `SQL Server` (some of these features
    are slated to be included in `SQL Server 2016` release).


    #### Row-Level Security


    Row-Level Security (`RLS`) provides a way to control access to individual rows
    in a table. This access control is implemented using security predicates (or security
    functions) created in the databases. Since the access control logic (the security
    predicates) is available in the database, it provides a very reliable and robust
    security mechanism. Moreover, since the logic is implemented within the database,
    the access will be controlled irrespective of which application or connection
    is requesting data.


    Listing 9-5 shows a script for implementing `RLS`.


    ```sql

    CREATE USER GeneralManager WITHOUT LOGIN;

    CREATE USER Manager1 WITHOUT LOGIN;

    CREATE USER Manager2 WITHOUT LOGIN;

    CREATE TABLE EmployeePerformanceData

    (

    EmployeeID int,

    EmployeeName varchar(200),

    ManagerName sysname,

    EmployeeRating int,

    EmployeeIncrementPercent float

    );

    INSERT into EmployeePerformanceData values

    (10, ''Employee10'', ''Manager2'', 1,10.00),

    (11, ''Employee11'', ''Manager2'', 3, 6.53),

    (12, ''Employee12'', ''Manager1'', 2, 8.71),

    (13, ''Employee13'', ''Manager2'', 3, 6.25),

    (14, ''Employee14'', ''Manager1'', 3, 5.87),

    (15, ''Employee15'', ''Manager2'', 5, 0.00);

    SELECT * FROM EmployeePerformanceData;

    GRANT SELECT ON EmployeePerformanceData TO GeneralManager;

    GRANT SELECT ON EmployeePerformanceData TO Manager1;

    GRANT SELECT ON EmployeePerformanceData TO Manager2;

    -- If any of the users select data from the table at this point, they would see
    all 6 records

    EXECUTE AS USER = ''GeneralManager'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    EXECUTE AS USER = ''Manager1'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    EXECUTE AS USER = ''Manager2'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    --- Implement RLS using Security Predicates and Filters

    /*

    In this case we are creating a security predicate such that the managers can only
    their own Employee Data and the GM can see all the employee information.

    */

    CREATE SCHEMA Security;

    GO

    CREATE FUNCTION Security.fn_securitypredicate(@ManagerName AS sysname)

    RETURNS TABLE

    WITH SCHEMABINDING

    AS

    RETURN SELECT 1 AS fn_securitypredicate_result

    WHERE @ManagerName = USER_NAME() OR USER_NAME() = ''GeneralManager'';

    -- Tie the Security Predicate with the User Table

    CREATE SECURITY POLICY SalesFilter

    ADD FILTER PREDICATE Security.fn_securitypredicate(ManagerName)

    ON dbo.EmployeePerformanceData

    WITH (STATE = ON);

    -- Now if we execute the Queries, each manager would only see their own employee
    information.

    EXECUTE AS USER = ''GeneralManager'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    EXECUTE AS USER = ''Manager1'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    EXECUTE AS USER = ''Manager2'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    -- Disable the security Policy

    ALTER SECURITY POLICY SalesFilter

    WITH (STATE = OFF);

    ```


    Listing 9-5. T-SQL Sample Script for Implementing RLS'
