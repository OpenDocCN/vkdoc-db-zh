    ## About the Technical Reviewer


    Ravikanth is a Principal Engineer and the Lead Architect for Microsoft and VMware
    private and hybrid cloud solutions in the Enterprise Solutions Group at Dell Inc.
    He is a multi-year recipient of Microsoft’s Most Valuable Professional (MVP) award
    in Windows PowerShell. Ravikanth is the author of Windows PowerShell Desired State
    Configuration Revealed (Apress) and leads Bangalore PowerShell and Bangalore IT
    Pro user groups. He can be seen speaking regularly at local user group events
    and conferences in India and abroad about topics ranging from PowerShell to Azure
    Services.


    ![A371128_1_En_BookFrontmatter_Fige_HTML.jpg](A371128_1_En_BookFrontmatter_Fige_HTML.jpg)


    ## Acknowledgments


    Pranab—There are so many people whom, without their support and encouragement,
    I could not have written this book. First and foremost, my parents (Maa and Baba).
    They have always been my pillar of strength. Thank you to my wife (Meenakshi)
    for being so supportive and helping me write this. She actually pushed me to go
    for it with my hectic days at work. My lovely little daughter (Preesha), who is
    my world; she actually let me write when it was probably time to play/spend time
    with her. Several others supported me unconditionally, including my elder sister
    (Rupa Chatterjee). Thank you for the faith you have in me; I am here at Microsoft
    because of you. Thanks also to my brother-in-law (Anindya Chatterjee), for motivating
    me and inspiring me when I needed him most. I would also like to thank my in-laws
    for believing that I could do this and supporting me. I would like to express
    my gratitude to all my mentors, colleagues, and friends at Microsoft, as well
    as all my managers for being supportive about this idea. A big thank you to the
    Apress team, including John, who encouraged me to write and Prachi, for being
    so flexible with the timeline. A special thanks to all the reviewers.


    Sourabh—A special note of thanks to my wife Sharie, who was very encouraging and
    supportive of the long hours I put in during the course of the book. I would like
    to dedicate this book to my mentors, to my teachers for their invaluable lessons,
    and finally to the publishers for being accommodating and very supportive of our
    requests.


    Amit—A special note of thanks to my wife for being supportive when I worked on
    this book after spending hours at the office. Without her, this book would not
    have been possible. She was the one who actually pushed me to write this book.
    I would like to dedicate my contribution to the book to my mom and dad, who always
    believed that nothing is impossible if you put your heart into it. And as always,
    my gratitude goes out to my mentors who have made it possible for me to learn
    about this ever-evolving product in a seamless manner. Last but not the least,
    thanks to Apress for being flexible with the schedule and super accommodating,
    which really helped us complete this book.'
