- fmt: '# Automating the Automation


    > Familiarity breeds contempt. —Aesop


    This famous saying should not be taken lightly when you are starting off initially
    with the ARM cmdlets. Keep the documentation open for reference while writing
    automation scripts for Azure ARM deployments because muscle memory does take over
    if you have deployed using PowerShell under the Classic deployment model.


    If you manage an enterprise that has a need to provision hundreds of virtual machines
    on Azure to host SQL Server instances and other applications, you would probably
    feel the need to automate the steps shown in the earlier section. The need to
    automate the automation is actually very common among enterprises. Azure allows
    you to utilize REST APIs, Azure CLI, and PowerShell to automate deployments for
    virtual machines.


    ## PowerShell for Azure Automation


    PowerShell always comes to the rescue when there is the need for automation and
    why should Azure be any different? If you are familiar with the Azure PowerShell
    cmdlets for the Classic deployment model, most of the ARM PowerShell cmdlets will
    be easy to get accustomed to as well. The older Azure PowerShell `0.9.x` version
    required you to switch between Azure Resource Manager (`ARM`) and Azure Service
    Management (`ASM` for managing Classic deployment model virtual machines). However,
    with Azure PowerShell `1.0`, you no longer need to switch between `ARM` and `ASM`.
    We will be using Azure PowerShell `1.0` (launched in November 2015) for all the
    cmdlets that are used in the discussions in this chapter. There are quite a few
    cmdlets that have a `"Rm"` substring propped in the middle of the cmdlet that
    you were used to in the Azure PowerShell `0.9.x` version. An example of this is
    `Get-AzureRM`, which has an equivalent in the `ARM` world called `Get-AzureRmVM`.


    ## Installing Azure PowerShell Modules


    Before you begin the Azure PowerShell modules, you need to install them from an
    administrative PowerShell ISE or command window using the following commands:


    ```

    # Install the Azure Resource Manager modules from the PowerShell Gallery

    Install-Module AzureRM

    Install-AzureRM

    # Import AzureRM modules for the given version manifest in the AzureRM module

    Import-AzureRM

    ```


    Keep in mind that the use of an incorrect cmdlet comes to light while the cmdlet
    is executing. There is no pre-execution check for incorrect use of cmdlets. So
    if your last cmdlet fails and was part of a single atomic automation block, you
    will have to repeat the cmdlet execution again. Once too often professionals have
    been known to use a Classic deployment cmdlet in the `ARM` world and face the
    wrath of a PowerShell exception!


    ## Scripting the Deployment Journey


    Since the previous section covered the portal based deployment as a journey, let
    us again go through the journey in a scripted manner. Since you will not have
    the handy mouse click available, you will have to script everything that the UI
    does under the hood, starting from logging into the correct subscription.


    ### Logging into an Azure Subscription


    The following code shows how to log into your Azure account and select the appropriate
    subscription.


    ```

    ## Parameters

    $vSubscriptionName = "" # Required if you have multiple subscriptions

    ## Import AzureRM

    Import-AzureRM

    ## Log into the Azure and select the correct subscription

    Login-AzureRmAccount

    Get-AzureRmSubscription –SubscriptionName $vSubscriptionName | Select-AzureRmSubscription

    ```


    **Listing 5-1.** PowerShell Code for Logging Into an Azure Subscription


    ### Creating a Resource Group and Storage Account


    Once you have logged into your Azure account and selected the corrected subscription
    (if you have access to more than one), you will need to either create the Resource
    Manager Group, storage account, and other dependent artifacts that you will need
    to build your virtual machine or use an existing artifact. This chapter assumes
    that you will create everything from scratch. The first task is to create a resource
    group and a storage account to host the virtual hard disks for the virtual machine.


    ```

    ## Parameters

    $vResourceGroupName = ""

    $vRegion = ""

    $vStorageAccountName = ""

    ## Create the new resource group

    ## An Azure resource group is required before you can create any resources

    New-AzureRmResourceGroup -Name $vResourceGroupName -Location $vRegion

    ## Create the storage account and associate it with the Resource Group

    New-AzureRmStorageAccount -ResourceGroupName $vResourceGroupName -Location $vRegion
    -Name $vStorageAccountName -Type Standard_LRS

    ## Set the current storage account context to the newly created storage account

    Set-AzureRmCurrentStorageAccount -ResourceGroupName $vResourceGroupName -StorageAccountName
    $vStorageAccountName

    ```


    **Listing 5-2.** PowerShell Commands to Create a Resource Group and a Storage
    Account Associated with the Same Resource Group


    ## Selecting the Virtual Machine Image and Size


    Now that you have the housing for the virtual hard disks and a logical container
    for the resources being created, let’s proceed with image selection. This is a
    bit complicated as the images are updated quite frequently and you need to enumerate
    based on current list available. Since we used a SQL Server 2016 image earlier
    in the chapter, we shall endeavor to do the same in this journey. Another selection
    that you need to zero in on is the virtual image size. The following code uses
    `Get-AzureRmVMSize` to get a list of all the virtual machine sizes available in
    the region.


    ```

    $vRegion = "WestUS"

    ## Get a list of the VMs offered and then make a selection based on the latest
    SQL Server 2016 image available

    Get-AzureRmVMImageOffer -Location $vRegion -PublisherName "MicrosoftSQLServer"
    | Where-Object {$_.Offer -like "*SQL2016*"}

    $vImageSelection = Get-AzureRmVMImage -Offer "SQL2016CTP3.3-WS2012R2" -PublisherName
    "MicrosoftSQLServer" -Skus "Evaluation" -Location $vRegion

    ## Get the available virtual machine size and select the appropriate one

    Get-AzureRmVMSize -Location $vRegion | Where-Object {$_.MemoryInMB -ge 8192 -and
    $_.NumberOfCores -ge 4} | ft

    $vImageSize = "Standard_DS3"

    ```


    **Listing 5-3.** PowerShell Code to Select the Available Virtual Machine Size
    and the Latest SQL Server 2016 Image Available in the Gallery


    ## Configuring Availability and Networking


    If you are looking to deploy an availability set, you need to use the `New-AzureRmAvailabilitySet`
    cmdlet to create a new availability set and add the virtual machine being provisioned.
    The next task is to create the virtual network. If you are using a standalone
    instance of SQL Server, you do need an availability set. However, if you are deploying
    an Availability Group, then an Availability Set is required for completing the
    configuration. If you deploy Availability Groups using templates available in
    the gallery, then you will notice that an Availability Set is configured as part
    of the deployment.


    ```

    $vNetName = "TigerNet"

    ## Create the subnet configuration for the vNet

    $vSubnet = New-AzureRmVirtualNetworkSubnetConfig -Name "TigerSubnet" -AddressPrefix
    "10.0.0.0/24"

    ## Create the virtual network

    $vVNet = New-AzureRmVirtualNetwork -Location $vRegion -Name $vNetName -ResourceGroupName
    $vResourceGroupName -Subnet $vSubnet -AddressPrefix "10.0.0.0/24"

    $vNet = Get-AzureRmVirtualNetwork -Name $vNetName  -ResourceGroupName $vResourceGroupName

    $vNetInterface = New-AzureRmNetworkInterface -Name "vNetInterface" -ResourceGroupName
    $vResourceGroupName -Location $vNet.Location -SubnetId $vNet.Subnets[0].Id

    ```


    **Listing 5-4.** Sample Code for Creating an ARM Virtual Network


    ## Provisioning the Virtual Machine


    Now you have all the necessary ingredients to actually create the virtual machine.
    The following code ties together the image size, machine configuration, and the
    image configuration completed in the earlier sections and asks Azure for a new
    virtual machine with the provided configuration settings.'
  raw: '## Automating the Automation


    > Familiarity breeds contempt. —Aesop


    This famous saying should not be taken lightly when you are starting off initially
    with the ARM cmdlets. Keep the documentation open for reference while writing
    automation scripts for Azure ARM deployments because muscle memory does take over
    if you have deployed using PowerShell under the Classic deployment model.


    If you manage an enterprise that has a need to provision hundreds of virtual machines
    on Azure to host SQL Server instances and other applications, you would probably
    feel the need to automate the steps shown in the earlier section. The need to
    automate the automation is actually very common among enterprises. Azure allows
    you to utilize REST APIs, Azure CLI, and PowerShell to automate deployments for
    virtual machines.


    PowerShell always comes to the rescue when there is the need for automation and
    why should Azure be any different? If you are familiar with the Azure PowerShell
    cmdlets for the Classic deployment model, most of the ARM PowerShell cmdlets will
    be easy to get accustomed to as well. The older Azure PowerShell 0.9.x version
    required you to switch between Azure Resource Manager (ARM) and Azure Service
    Management (ASM for managing Classic deployment model virtual machines). However,
    with Azure PowerShell 1.0, you no longer need to switch between ARM and ASM. We
    will be using Azure PowerShell 1.0 (launched in November 2015) for all the cmdlets
    that are used in the discussions in this chapter. There are quite a few cmdlets
    that have a `"Rm"` substring propped in the middle of the cmdlet that you were
    used to in the Azure PowerShell 0.9.x version. An example of this is `Get-AzureRM`,
    which has an equivalent in the ARM world called `Get-AzureRmVM`.


    Before you begin the Azure PowerShell modules, you need to install them from an
    administrative PowerShell ISE or command window using the following commands :


    ```

    # Install the Azure Resource Manager modules from the PowerShell Gallery

    Install-Module AzureRM

    Install-AzureRM

    # Import AzureRM modules for the given version manifest in the AzureRM module

    Import-AzureRM

    ```


    Keep in mind that the use of an incorrect cmdlet comes to light while the cmdlet
    is executing. There is no pre-execution check for incorrect use of cmdlets. So
    if your last cmdlet fails and was part of a single atomic automation block, you
    will have to repeat the cmdlet execution again. Once too often professionals have
    been known to use a Classic deployment cmdlet in the ARM world and face the wrath
    of a PowerShell exception!


    Since the previous section covered the portal based deployment as a journey, let
    us again go through the journey in a scripted manner. Since you will not have
    the handy mouse click available, you will have to script everything that the UI
    does under the hood, starting from logging into the correct subscription (see
    Listing [5-1](#A371128_1_En_5_Chapter.html#Par49)).


    ```

    ## Parameters

    $vSubscriptionName = "" # Required if you have multiple subscriptions

    ## Import AzureRM

    Import-AzureRM

    ## Log into the Azure and select the correct subscription

    Login-AzureRmAccount

    Get-AzureRmSubscription –SubscriptionName $vSubscriptionName | Select-AzureRmSubscription

    Listing 5-1.

    PowerShell Code for Logging Into an Azure Subscription

    ```


    Once you have logged into your Azure account and selected the corrected subscription
    (if you have access to more than one), you will need to either create the Resource
    Manager Group, storage account, and other dependent artifacts that you will need
