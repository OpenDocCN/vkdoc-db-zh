  trans: '

    # 8. Azure SQL Database


    Microsoft Azure SQL Database 是 Microsoft Azure 中基于 Microsoft SQL Server 引擎的关系数据库服务，具备
    SQL Server 几乎所有的关键任务功能。Windows Azure SQL Database 旨在提供高可用性、可扩展的数据库即服务，并具有可预测的性能、业务连续性和数据保护能力。SQL
    Database 是一种平台即服务产品，它需要的管理开销极少，并且可以显著减少需要数据库后端支持的应用程序的上市时间。由于该服务基于 SQL Server
    引擎，它与大多数可用的 SQL Server 工具和 API 兼容，从而简化了将现有应用程序迁移到 Azure 的过程。


    在本章中，我们将了解 Azure SQL Database 的内部架构，以及 Windows Azure Fabric 如何在 Azure SQL Database
    的管理和运作中扮演重要角色。我们将学习 Azure SQL Database 提供的各种服务层级和性能级别，以及可用于管理 Azure SQL 数据库的管理功能或选项。


    我们还将学习可用于将本地数据库迁移到 Azure SQL 数据库的不同技术。


    ## SQL Database 架构


    Azure SQL Database 构建于 Windows Azure 框架之上，该框架提供机器管理和分布式应用程序功能。一个 SQL Azure 集群由一个控制环和一个或多个租户环组成。在
    Windows Fabric 术语中，每个环相当于一个物理 Windows Azure 集群，该集群由运行一个或多个应用程序的节点集合组成。环内的每个应用程序包含一个或多个服务。


    ### 租户环


    Windows Fabric 中的租户环实际上就是一个物理 Windows Azure 集群，集群的每个节点都设计为运行一个应用程序。在此情况下，运行的应用程序类型为
    `DBService`，它基本上是一个 `SQL Server Executable` 服务或 `Hekaton`（内存 OLTP）引擎服务。每个 `DBService`
    应用程序都绑定到自己的内存、CPU 和 IO。


    当客户预配 Azure SQL Database 时，他们会创建一个逻辑服务器（如果尚不存在）和一个数据库。实际上，他们是在后端创建了一个 `DBService`（或
    `DBSvc`）。这个 `DBService` 应用程序运行在 Windows Azure 集群的某个节点上。`DBService` 可以使用虚拟机（或主机）上的本地存储以及远程存储来存储数据库（参见图
    8-1）。


    ![A371128_1_En_8_Fig1_HTML.jpg](img/A371128_1_En_8_Fig1_HTML.jpg)


    图 8-1. 在 Windows Azure 集群上运行的 `DBService`


    租户环架构允许创建和运行多个 `DBService`，这些服务可属于一个或多个客户（租户）。由于每个 `DBService` 在其自身的上下文中运行，并且独立于在同一租户环节点上运行的其他
    `DBService` 应用程序，因此该架构允许同一个节点/虚拟机托管多个客户数据库。


    以下服务构成 `DBService` 应用程序的核心：


    *   `SQL Server Executable`

    *   `Watchdog.exe`


    当同时需要 `Hekaton`（内存 OLTP）或全文索引时，可能会有额外的服务。此外，当 Azure SQL Database 作为 Azure SQL
    DW 的后端时，可能还需要其他服务。


    ### 控制环


    控制环的功能是提供管理、预配和重定向服务（参见图 8-2）。它帮助确定数据库在租户环中的位置，并将连接路由到正确的租户数据库。控制环提供以下主要服务：控制管理节点、管理服务节点和重定向器服务节点。


    ![A371128_1_En_8_Fig2_HTML.jpg](img/A371128_1_En_8_Fig2_HTML.jpg)


    图 8-2. 控制环架构


    #### 控制管理节点


    控制管理节点提供内部集群管理服务，这些服务具备容量管理、租户环管理、迁移等场景所需的能力。


    控制管理节点的关键组件之一是集群元数据存储，它是与 Azure SQL 集群相关的所有元数据的唯一存储点。它存储诸如集群状态、运行在集群上的资源状态以及其他确保集群以最佳状态运行的信息。


    #### 管理服务节点


    管理服务节点托管管理组件，这些组件为最终用户管理 Azure SQL 数据库提供 REST API。管理服务作为无状态服务运行在多个活动的管理节点上。如果一个节点发生故障，服务可以在不同的管理节点上重启，并且操作可以从托管服务的节点发生故障时的同一点恢复。传入的最终用户请求由软件负载均衡器定向到其中一个管理端点，然后重定向到一个管理节点。


    #### 重定向器服务节点


    此节点提供到 Azure SQL 数据库的 TDS 重定向。


    该架构还使用其他服务来实现高可用性（`SQL Server 可用性组`）、负载均衡和资源治理。


    ## Azure SQL Database 服务层级


    Azure SQL Database 目前提供三个服务层级，每个层级下有多个性能级别。例如，标准层级有四个性能级别——`S0`、`S1`、`S2` 和 `S3`。每个性能级别提供一组递增的资源（计算能力、内存和存储），以提供递增的吞吐量水平。不同的服务层级以及各层级下的各种性能级别如图
    8-3 所示。鉴于 Azure 是一个不断变化的领域，部分信息未来可能会有变动。最新信息请查阅 MSDN 上的 Azure 文档。


    ![A371128_1_En_8_Fig3_HTML.jpg](img/A371128_1_En_8_Fig3_HTML.jpg)


    图 8-3. Azure SQL Database 的服务层级


    每个性能级别可用的资源以数据库吞吐量单位（或 `DTUs`）来表示。简而言之，`DTUs` 描述了完成一个数据库事务所需的相对计算能力、内存和 IO 吞吐量。例如，标准
    `S2` 性能级别提供 50 个 `DTU` 的计算能力，这相当于每秒约 50 次数据库事务。同样，`P11` 服务层级提供 1750 个 `DTU`，每秒可执行约
    1750 次事务。


    从本地环境迁移到 Azure SQL Database 时，您可以使用公开可用（非微软官方）的 `DTU` 吞吐量计算器来估算所需的 `DTU` 数量，进而确定适合您工作负载的服务层级。`DTU`
    计算器可从 `http://dtucalculator.azurewebsites.net/` 下载。参见图 8-4。


    ![A371128_1_En_8_Fig4_HTML.jpg](img/A371128_1_En_8_Fig4_HTML.jpg)


    图 8-4. 各种服务层级和性能级别下的数据库吞吐量单位（`DTUs`）

