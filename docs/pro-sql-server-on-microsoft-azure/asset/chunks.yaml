- fmt: '### Service Account Privileges


    There has been an eternal debate on the web about enabling the “lock pages in
    memory” privilege for the SQL Server service account. Lock pages in memory is
    a Windows policy that determines which account can use a process to keep memory
    allocations pinned in physical memory. It prevents the system from paging the
    data to virtual memory on disk. When the SQL Server service account is granted
    this user right, buffer pool memory cannot be paged out by Windows. For SQL Server
    instances running on Azure VMs, it is recommended that you provide the lock pages
    in memory security privilege to the SQL Server service account. This prevents
    the working set of the SQL Server process to get paged to disk. The biggest downside
    to the obvious performance hit of getting paged is that the page file of the virtual
    machine by default resides on the locally attached disks. Listing 7-8 shows how
    to determine if the lock pages in memory security privilege is granted to the
    SQL Server service account.


    **Note**


    Always remember to cap `MAX SERVER MEMORY` for the SQL Server instance, especially
    when enabling the lock pages in memory security privilege for the SQL Server service
    account.


    ```

    $RulePass = 1

    $sqlquery = "SELECT locked_page_allocations_kb FROM sys.dm_os_process_memory"

    # Execute a query against the SQL Server instance

    $lpim = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

    if ($lpim.locked_page_allocations_kb -eq "0")

    {

    Write-Host "[WARN] Lock Pages in Memory security privilege is not granted to the
    SQL Server service account" -ForegroundColor Red

    $RulePass = 0

    }

    if ($RulePass -eq 1)

    {

    Write-Host "[INFO] Lock Pages in Memory Security Privilege is granted to the SQL
    Server service account" -ForegroundColor Green

    }

    ```

    **Listing 7-8.** PowerShell Script to Determine if Lock Pages in Memory Privilege
    Is Granted to the SQL Server Service Account


    Another easy performance win is to grant the SQL Server service account the “Performance
    Volume Maintenance Tasks” security privilege. When the SQL Server service account
    has this privilege, it allows the SQL Server to perform instant file initialization.
    This allows SQL Server to create data files without having to zero out the pages.
    If you do not have any security compliance requirement that prevents you from
    doing this, you should look at providing this security privilege to the SQL Server
    service account. Without this privilege, it can take as long as 10 times longer
    to create a database file! Figure 7-2 illustrates the difference between having
    and not having the privilege. Such an illustration is best left to this book and
    should not be determined in production environments. Listing 7-9 shows how to
    determine if the SQL Server service account has the privilege to perform instant
    file initialization for data files. It works for any instance of SQL Server.


    ![A371128_1_En_7_Fig2_HTML.jpg](A371128_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2.** Performance impact of instant file initialization


    ```

    # Find out the SQL Server services installed on the machine

    $SqlService = Get-WmiObject -Query "SELECT * FROM Win32_Service WHERE PathName
    LIKE ''%sqlservr%''"

    # Export the secpol privileges on the machine to a file

    $filename  = "secpol.inf"

    $secpol = secedit /export /cfg $filename | Out-Null

    $secpol = Get-Content $filename

    # Search for the volumne maintenance task privilege in the output

    $IFI = Select-String -Path $filename -Pattern "SeManageVolumePrivilege"

    # Remove the file

    #Remove-Item $filename

    # Loop through each SQL Server service found on the machine

    foreach ($servcice in $SqlService)

    {

    # Find out the SID value of the service account

    $objUser = New-Object System.Security.Principal.NTAccount($servcice.StartName)

    $strSID = $objUser.Translate([System.Security.Principal.SecurityIdentifier])

    # Find out if the SQL Service account SID exists in the output

    if ($IFI.ToString().Contains($strSID.Value))

    {

    Write-Host "[INFO] SQL Server service account ["$servcice.StartName"] has ''Perform
    Volume Maintenance Task'' security privilege" -ForegroundColor Green

    }

    else

    {

    Write-Host "[ERR] SQL Server service account ["$servcice.StartName"] has ''Perform
    Volume Maintenance Task'' security privilege" -ForegroundColor Red

    }

    }

    ```

    **Listing 7-9.** PowerShell Script to Determine if the SQL Service Account Has
    the Ability to Perform Instant File Initialization


    To take advantage of instant file initialization, you grant the SQL Server service
    account `SE_MANAGE_VOLUME_NAME` and add it to the Perform Volume Maintenance Tasks
    security policy. After adding the SQL Server service account to the Perform Volume
    Maintenance Tasks security policy, restart the SQL Server service.'
  raw: '### Service Account Privileges


    There has been an eternal debate on the web about enabling the “lock pages in
    memory” privilege for the SQL Server service account. Lock pages in memory is
    a Windows policy that determines which account can use a process to keep memory
    allocations pinned in physical memory. It prevents the system from paging the
    data to virtual memory on disk. When the SQL Server service account is granted
    this user right, buffer pool memory cannot be paged out by Windows. For SQL Server
    instances running on Azure VMs, it is recommended that you provide the lock pages
    in memory security privilege to the SQL Server service account. This prevents
    the working set of the SQL Server process to get paged to disk. The biggest downside
    to the obvious performance hit of getting paged is that the page file of the virtual
    machine by default resides on the locally attached disks. Listing [7-8](#A371128_1_En_7_Chapter.html#Par51)
    shows how to determine if the lock pages in memory security privilege is granted
    to the SQL Server service account .


    Note


    Always remember to cap `MAX SERVER MEMORY` for the SQL Server instance, especially
    when enabling the lock pages in memory security privilege for the SQL Server service
    account.


    ```

    $RulePass = 1

    $sqlquery = "SELECT locked_page_allocations_kb FROM sys.dm_os_process_memory"

    # Execute a query against the SQL Server instance

    $lpim = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

    if ($lpim.locked_page_allocations_kb -eq "0")

    {

    Write-Host "[WARN] Lock Pages in Memory security privilege is not granted to the
    SQL Server service account" -ForegroundColor Red

    $RulePass = 0

    }

    if ($RulePass -eq 1)

    {

    Write-Host "[INFO] Lock Pages in Memory Security Privilege is granted to the SQL
    Server service account" -ForegroundColor Green

    }

    Listing 7-8.

    PowerShell Script to Determine if Lock Pages in Memory Privilege Is Granted to
    the SQL Server Service Account

