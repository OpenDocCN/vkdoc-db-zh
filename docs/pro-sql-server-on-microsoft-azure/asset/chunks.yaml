  trans: '

    ## 虚拟专用网络


    在当今世界，大多数组织都选择混合模式，将数据同时存储在云端和本地数据中心。例如，您可以创建一个虚拟专用网络（`VPN`），并将您的云环境链接到分支机构（参见图
    4-5）。


    ![A371128_1_En_4_Fig5_HTML.jpg](img/A371128_1_En_4_Fig5_HTML.jpg)


    *图 4-5. 典型的 VPN 设置*


    使用 Microsoft Azure 虚拟网络，您可以通过将虚拟机分组来创建一个逻辑边界，称为虚拟网络或 `VNet`。一旦 `VNet` 建立，您就可以在本地数据中心和
    `VNet` 之间建立 `IPsec` 连接。然而，对于 `ExpressRoute` 设置，则不需要此连接。您可以使用 Microsoft Azure `VMs`
    或 Microsoft Azure 云服务（或两者）在虚拟网络中创建虚拟机。您可以选择 Microsoft Azure 的 `IaaS` 或 `PaaS`
    服务产品来创建虚拟机或服务。创建 `IPsec` 连接时，基本上需要以下条件：


    *   您需要一个虚拟专用网络（`VPN`）网关设备。

    *   您需要连接到本地网络的专用硬件。

    *   您需要一位网络管理员来帮助您完成设置。


    一旦此网络和设置准备就绪，在 `VNet` 内运行的虚拟机将显示为您本地网络的延伸。


    请注意，图 4-5 中的 IP 地址是从您的本地网络可用 IP 地址范围内分配的。在本地网络上运行的软件将能够看到这些虚拟机，就好像它们在自己的本地网络中一样。有趣的是，承载这些虚拟机的物理机器（无论位于网络的哪一侧）都可以运行任何操作系统，因为连接发生在
    `IP` 层，因此是透明的。例如，运行 Linux 操作系统的 Microsoft Azure `VMs` 可以与您运行 Windows 的本地机器通信，反之亦然。您可以使用像
    `SCCM` 这样的基础结构工具来管理云中的虚拟机。


    拥有这样一个扩展网络的一个非常重要的方面是，您可以轻松地将现有的本地 Active Directory 域扩展到 Microsoft Azure 虚拟网络，并为用户提供单点登录，以便他们可以在任何地方运行应用程序。如果需要，您可以在
    Microsoft Azure 云中创建一个域并将其连接到您现有的本地域。由于您的虚拟网络是您本地网络的延伸，反之亦然。


    从技术上讲，您也可以从 Microsoft Azure 网络使用在您本地网络中运行的软件。如果您出于隐私原因希望将数据保留在本地（许多医院和医疗机构就是如此），您可以使用虚拟网络的概念来扩展您的网络，以便数据保留在您的本地网络中（本地存储），而用户仍然可以从运行在
    Microsoft Azure 多个数据中心中的应用程序实例访问数据。


    这为您提供了根据需要灵活访问大量资源的能力。云领域的弹性是一个很棒的概念，直接影响您的财务状况，因为它降低了总体拥有成本。您可以在需要时启动虚拟机，并在完成后直接移除/释放资源（在此上下文中是虚拟机）。您只需为使用它们的时间段付费。假设您有一个紧急请求，需要准备一台机器。使用
    Microsoft Azure，您可以立即设置好虚拟机，并在几分钟内准备就绪。


    ### 负载均衡器


    使用 Azure 负载均衡器，您可以获得高可用性并提升网络应用程序的性能。它使用第 `4` 层 `TCP/UDP` 负载均衡器来平衡和分散负载，并将其通过不同的、健康的服务进行分发。负载均衡通过端点实现，这些端点在公共
    `IP` 和分配给最终将分发负载的虚拟机的本地端口之间具有一对多的关系。以下是使用负载均衡器的一些适用场景：


    *   它可以对发送到虚拟机的 Internet 流量进行负载均衡。

    *   它还可以对虚拟网络内虚拟机之间的传入流量进行负载均衡。它可以用于在云服务内的不同虚拟机之间分配负载。

    *   它还可以将外部流量转发到特定的虚拟机。


    ### Azure `DNS`


    任何服务或网站都会与一个 `IP` 地址关联。域名系统 (`DNS`) 有助于将 `IP` 地址转换为用户友好的服务或网站名称。


    Azure `DNS` 使用 Microsoft Azure 基础结构提供名称解析。您可以将您的域名托管在 Microsoft Azure 数据中心内，同时使用您一直使用的相同凭据管理您的
    `DNS` 记录。Azure `DNS` 中的 `DNS` 域托管在全局 `DNS` 网络名称服务器中。此服务为您的域提供更快的性能和高可用性。您需要从第三方注册商购买域名，然后可以将其托管在
    Azure `DNS` 中以管理 `DNS` 记录。


    ## 总结


    Microsoft Azure 允许您创建 `VPN`，并允许您的本地网络连接相互通信。您可以连接 Azure 应用程序到本地，也可以跨不同数据中心分配负载。您可以以最小的影响扩展您现有的业务并节省大量资金。请务必阅读本章末尾的参考资料，它们是丰富的
    Azure 文档的一部分。


    # 5. 在 Azure `VMs` 上部署 SQL Server


    多年来，自动化已经从批处理文件发展到 `PowerShell`，最终发展到自动化例程。随着云的出现，“自动化”一词有了全新的含义。无论您部署在公共云还是私有云中，执行部署所需的大规模需求是任何人员配备模式都无法满足的。业界看到了对自动化重复任务、监控已部署服务以及提供与部署相关工件的见解的巨大需求。云环境中的“纵向扩展
    (`scale-up`)”和“横向扩展 (`scale-out`)”无法脱离自动化而单独存在。


    在 Microsoft Azure 环境中，您有可用的工作流，允许您指定输入，工作流将使用这些输入作为参数来部署具有所需设置的虚拟机。在传统的 `IT` 世界中，部署
    `SQL Server` 会有先决条件，例如采购硬件、设置硬件和操作系统，然后满足 `IP` 地址、权限等先决条件。所有这些先决条件完成后，您需要获取 `SQL
    Server` 安装媒体，使用必要的参数运行安装，然后执行安装后配置步骤。


    全球大量的 `IT` 专业人员利用各种脚本和自动化方法来加快这些部署速度。许多环境迁移到虚拟化，以加快这些环境的部署速度并缩短采购时间。如果您坚信虚拟化可以节省成本并防止资源利用不足，那么云将这一点又向前推进了一步。它真像预付费的手机服务！您只需为使用的部分付费。这种按需付费模式在企业内的许多共享服务模型中复制，以成本中心的形式进行费用回收。在本章中，我们将把
    Azure 中的部署与本地世界进行类比，并解释在 Azure `VMs` 上托管的 `SQL Server` 实例存在的不同部署选项。

    '
- fmt: '## Deploying a Standalone SQL Server Instance


    In the previous chapters, the Azure architecture was explained in detail along
    with the deployment models (Classic and ARM) available in Azure. Since Azure is
    transitioning to the Resource Manager (ARM) deployment model, this chapter will
    focus only on this particular model. When you log onto the Azure portal (`portal.azure.com`),
    you will be presented with a column view on the left that allows you to look at
    the various artifacts deployed and also the services that can be deployed.


    One of the most common questions is why do you see two different items for Virtual
    Machines (see Figure [5-1](#A371128_1_En_5_Chapter.html#Fig1)). The Virtual Machines
    option is for virtual machines deployed using the Resource Manager model and the
    Virtual Machines (Classic) option is for virtual machines deployed using the Classic
    deployment model. The old portal (`manage.windowsazure.com`) does not show virtual
    machines deployed using the Resource Manager model.


    ![A371128_1_En_5_Fig1_HTML.jpg](A371128_1_En_5_Fig1_HTML.jpg)

    Figure 5-1. Azure portal


    Now that you are aware of the navigation differences, let us break the journey
    of deploying SQL Server into different phases. The first phase of the journey
    is choosing the deployment. Azure Virtual Machines provide multiple choices for
    deployment for SQL Server from a licensing perspective.


    *   Deploying a SQL Server image from the marketplace (see Figure [5-2](#A371128_1_En_5_Chapter.html#Fig2))
    and paying the per-minute rate of SQL Server. ![A371128_1_En_5_Fig2_HTML.jpg](A371128_1_En_5_Fig2_HTML.jpg)
    Figure 5-2. Azure Marketplace image showing SQL Server 2016 3.3 image

    *   Installing or uploading your own SQL Server image using License Mobility benefits
    under Software Assurance

    *   As a Service Provider with a Services Provider License Agreement (SPLA), you
    have an additional option of using your own image with Subscriber Access License
    (SAL) reported via your SPLA


    ### Configuration Settings


    Figure [5-2](#A371128_1_En_5_Chapter.html#Fig2) shows the marketplace browsing
    options for Compute when you click on New option available on the left corner
    of the homepage. The marketplace allows you to deploy SQL Server releases ranging
    from SQL Server 2008 R2 to SQL Server 2016. You can even choose a range of editions
    like Enterprise, Standard, and Express. Another option is to pick pre-canned solutions
    like Availability Group deployment templates, which allow you to deploy Availability
    Groups during deployment.


    #### Virtual Machine Region


    For certain compute deployment options, you can select the deployment model (Classic
    or ARM). Once you select the image that you want to deploy, you will be provided
    with a number of options to specify the virtual machine and SQL Server settings
    (if you are using a SQL Server image). This part of the journey is where you provide
    inputs to the Azure deployment workflow for configuring various options for your
    environment. These options are constantly being reviewed by the Microsoft Engineering
    teams. Enhancements and improvements to these options are added during the sprint
    releases based on user inputs and available telemetry. Once you start working
    with the cloud, you learn that the public cloud is like the weather. You know
    the seasons and can sort of predict the weather based on various signs, but you
    will be pleasantly surprised once in a while. The only difference with the weather
    is that the enhancements and improvements showing up in various workflows are
    to make your life easier rather than more difficult. The Cloud Engineering teams
    are one of the most agile development organizations within Microsoft.


    The Basics settings view showing Figure [5-3](#A371128_1_En_5_Chapter.html#Fig3)
    are common to all Azure Virtual Machine configuration wizards and they allow you
    to specify the machine name, administrator username, password, and resource group
    name (since we are using ARM). You also have the option to specify the region,
    i.e., the data center where this virtual machine will be deployed, and the subscription.
    These are very important things to consider, as these cannot be changed using
    the portal after the deployment has completed. If you want to move an existing
    Azure Virtual Machine to a different region or subscription, you will need to
    write PowerShell commands to get this done. This is not something that happens
    in the blink of an eye!


    ![A371128_1_En_5_Fig3_HTML.jpg](A371128_1_En_5_Fig3_HTML.jpg)

    Figure 5-3. Basic settings configuration for Azure Virtual Machine


    Picking a subscription is an easier consideration. You would want to pick the
    subscription that should get billed for the resource usage and that would typically
    host the other parts of your application. This decision does not have performance
    considerations associated with it. However, picking the region for the virtual
    machine has performance aspects associated with it. The easiest way to think about
    the region is your data center. For a production environment, you would pick the
    server blades and SAN which are colocated within the same data center. Additionally,
    you would deploy your application in the same data center as well preferably unless
    you have geo-dispersed requirement. The same logic applies here. You would pick
    the same region for your compute, storage, and application deployment. This would
    prevent network hops across data centers, which would increase latency and negatively
    impact performance. This is one of the most common deployment misconfigurations
    that have been noticed in multitier architectures using Azure Virtual Machines.'
