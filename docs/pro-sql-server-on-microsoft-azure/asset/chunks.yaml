- fmt: '## Virtual Private Network


    In today’s world, most organizations opt for a hybrid kind of a scenario, putting
    their data in the cloud as well as in an on-premises data center. For example,
    you could create a Virtual Private Network (`VPN`) and link your cloud environment
    to the branch office (see Figure [4-5](#A371128_1_En_4_Chapter.html#Fig5)).


    ![A371128_1_En_4_Fig5_HTML.jpg](A371128_1_En_4_Fig5_HTML.jpg)


    *Figure 4-5. Typical VPN setup*


    Using Microsoft Azure Virtual Network, you can create a logical boundary by grouping
    the virtual machines together, called Virtual Network or `VNet`. Once the `VNet`
    is set up, you can establish an `IPsec` connection between your local on-premises
    data center and the `VNet`. This, however, is not needed for `ExpressRoute` setup.
    You can create the virtual machines in the Virtual Network by using the Microsoft
    Azure `VMs` or Microsoft Azure Cloud Services, or both. You could choose the `IaaS`
    or the `PaaS` service offering from Microsoft Azure to create Virtual Machines
    or services. When you create the `IPsec` connection, it basically requires the
    following:


    *   You need a virtual private network (`VPN`) gateway device.

    *   You need specialized hardware that will be connected to your on-premises network.

    *   You need a network administrator who will help set this up for you.


    Once this network and setup is ready, the virtual machines running within the
    `VNet` will appear as an extension of your on-premises network.


    Notice that the IP addresses in Figure [4-5](#A371128_1_En_4_Chapter.html#Fig5)
    are allocated from the same IP address range that is available for your on-premises
    local network. The software that runs on the local network will be able to see
    the Virtual Machines as if they were available within their own on-premises local
    network. It is interesting to note that the physical machines that host these
    Virtual Machines on either side of the network could run any operating system,
    as the connection happens at the `IP` layer and is thus transparent. For example,
    the Microsoft Azure `VMs` running a Linux operating system can talk to your on-premise
    machines that run Windows or vice versa. You can use the infrastructure tools
    like `SCCM` to manage the cloud’s Virtual Machines.


    A very important aspect of having such an expanded network is that you can easily
    extend your existing on-premises active directory domain to the Microsoft Azure
    Virtual Network and give users single sign-in so that they can run applications
    from anywhere. If need be, you could have a domain created in the Microsoft Azure
    cloud and connect it to your existing on-premises domain. As your Virtual Network
    is an extension of your on-premises network, the reverse is also true.


    You could technically use the software running in your local network from your
    Microsoft Azure Network as well. If you prefer to keep your data local for privacy
    reasons, such as many hospitals and medical facilities do, you can use this concept
    of the Virtual Network and expand your network so that the data remains in your
    on-premises network (stored locally) and yet the users can access the data from
    application instances running across multiple data centers in Microsoft Azure.


    This gives you the flexibility to access a large pool of resources as per your
    needs. Elasticity in the cloud space is a great concept and directly impacts your
    financials, as it reduces the total cost of ownership. You can spin a Virtual
    Machine when you need it and upon completion just remove/release the resource
    (virtual machine in this context). You will only be charged for the period that
    you used them. Imagine you have a request to get a machine ready and the requirement
    is urgent. Using Microsoft Azure, you could set up the Virtual Machine in no time
    and you are all set in few minutes.


    ### Load Balancer


    Using Azure Load Balancer, you get high availability and a boost to your network
    applications. It balances and spreads out the load using layer `4` `TCP/UDP` load
    balancer and distributes it through different, healthy services. Load balancing
    is accomplished using endpoints, which have a one-to-many relationship between
    the public `IP` and the local ports that are assigned to the virtual machines
    where the load will be eventually distributed. Here are a few of the scenarios
    when using Load Balancer is a good idea:


    *   It would load balance Internet traffic to Virtual Machines.

    *   It can also load balance the incoming traffic between the Virtual Machines
    within the Virtual Network. It can be Used To Distribute the load between different
    virtual machines within a cloud service.

    *   It can also forward external traffic to a specific Virtual Machine.


    ### Azure `DNS`


    Any service or website will be associated with an `IP` address. Domain Naming
    System (`DNS`) helps translate the `IP` address to user-friendly names for the
    service or website.


    Azure `DNS` provides name resolution using the Microsoft Azure infrastructure.
    You can host your domains within Microsoft Azure data centers and yet manage your
    `DNS` records using the same credentials that you have been using. `DNS` domains
    within Azure `DNS` are hosted within the global `DNS` network name servers. This
    service provides faster performance and high availability for your domains. You
    need to purchase the domains from a third-party registrar and then they can be
    hosted in Azure `DNS` for managing `DNS` records.


    ## Summary


    Microsoft Azure allows you to create a `VPN` and allows your on-premises network
    connections to talk to each other. You can connect an Azure application on-premises
    as well as distribute loads across different data centers. You can extend your
    existing business with minimal impact and save a lot of money. Be sure to go through
    the references at the end of the chapter, which are a part of the rich Azure documentation.


    # 5. Deploying SQL Server on Azure `VMs`


    Over the years, automation has grown from batch files to `PowerShell` and finally
    automation routines. With the advent of the cloud, the word “automation” took
    on a whole new meaning. Whether you deployed in a public or private cloud, the
    mass scale that was required to perform the deployment could not be satisfied
    by any staffing model. The industry saw an immense need for automating the repetitive
    tasks, monitoring the deployed services and providing insights on the artifacts
    associated with your deployment. The word “`scale-up`” and “`scale-out`” in a
    cloud environment cannot be de-coupled without automation.


    In the Microsoft Azure environment, you have workflows available that allow you
    to specify inputs, which the workflow will use as parameters to deploy the virtual
    machine with your required settings. In the traditional world of `IT`, a `SQL
    Server` deployment would have prerequisites like procuring hardware, setting up
    the hardware and the operating system, and then getting the prerequisites fulfilled
    like `IP` addresses, permissions, etc. After all these prerequisites were done,
    you would need to get the `SQL Server` installation media, run the installation
    with the necessary parameters, and then perform post-installation configuration
    steps.


    A large number of `IT` professionals around the world leveraged various scripting
    and automation methods to make these deployments faster. A number of environments
    moved to virtualization to make the deployment of these environments quicker and
    lessen the procurement timeframe. If you were a firm believer that virtualization
    led to cost savings and prevented underutilization of resources, the cloud takes
    that a step further. It is truly like a pre-paid cellular service! You only pay
    for what you use. This pay-as-you-go model is replicated in many shared services
    models within enterprises in the form of charge back to a cost center. In this
    chapter, we will draw parallels of deployment with the on-premises world in Azure
    and explain the different deployment options present for `SQL Server` instances
    hosted on Azure `VMs`.'
  raw: '## Virtual Private Network


    In today’s world, most organizations opt for a hybrid kind of a scenario, putting
    their data in the cloud as well as in an on-premises data center. For example,
    you could create a Virtual Private Network (VPN) and link your cloud environment
    to the branch office (see Figure [4-5](#A371128_1_En_4_Chapter.html#Fig5)).


    ![A371128_1_En_4_Fig5_HTML.jpg](A371128_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    Typical VPN setup


    Using Microsoft Azure Virtual Network, you can create a logical boundary by grouping
    the virtual machines together, called Virtual Network or VNet. Once the VNet is
    set up, you can establish a IPsec connection between your local on-premises data
    center and the VNet. This, however, is not needed for ExpressRoute setup. You
    can create the virtual machines in the Virtual Network by using the Microsoft
    Azure VMs or Microsoft Azure Cloud Services, or both. You could choose the IaaS
    or the PaaS service offering from Microsoft Azure to create Virtual Machines or
    services. When you create the IPsec connection, it basically requires the following:


    *   You need a virtual private network (VPN) gateway device.

    *   You need specialized hardware that will be connected to your on-premises network.

    *   You need a network administrator who will help set this up for you.


    Once this network and setup is ready, the virtual machines running within the
    VNet will appear as an extension of your on-premises network.


    Notice that the IP addresses in Figure [4-5](#A371128_1_En_4_Chapter.html#Fig5)
    are allocated from the same IP address range that is available for your on-premises
    local network. The software that runs on the local network will be able to see
    the Virtual Machines as if they were available within their own on-premises local
    network. It is interesting to note that the physical machines that host these
    Virtual Machines on either side of the network could run any operating system,
    as the connection happens at the IP layer and is thus transparent. For example,
    the Microsoft Azure VMs running a Linux operating system can talk to your on-premise
    machines that run Windows or vice versa. You can use the infrastructure tools
    like SCCM to manage the cloud’s Virtual Machines.


    A very important aspect of having such an expanded network is that you can easily
    extend your existing on-premises active directory domain to the Microsoft Azure
    Virtual Network and give users single sign-in so that they can run applications
    from anywhere. If need be, you could have a domain created in the Microsoft Azure
    cloud and connect it to your existing on-premises domain. As your Virtual Network
    is an extension of your on-premises network, the reverse is also true.


    You could technically use the software running in your local network from your
    Microsoft Azure Network as well. If you prefer to keep your data local for privacy
    reasons, such as many hospitals and medical facilities do, you can use this concept
    of the Virtual Network and expand your network so that the data remains in your
    on-premises network (stored locally) and yet the users can access the data from
    application instances running across multiple data centers in Microsoft Azure.


    This gives you the flexibility to access a large pool of resources as per your
    needs. Elasticity in the cloud space is a great concept and directly impacts your
    financials, as it reduces the total cost of ownership. You can spin a Virtual
    Machine when you need it and upon completion just remove/release the resource
