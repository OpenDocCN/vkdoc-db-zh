    ## PointInTime Parameter takes values in GMT and not local server time.

    $RestoreRequest = Restore-AzureRmSqlDatabase -FromPointInTimeBackup -PointInTime
    “2016-05-17 04:00:00” -ResourceId $DBName[0].ResourceId -ServerName $DbServerName
    -TargetDatabaseName ($DBName[0].DatabaseName+"_Restored") -ResourceGroupName $resourceGroupName

    if($RestoreRequest -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    ## Restore a Deleted Database

    ## in this example we will retrieve all the deleted databases and then restore
    the first database in the list.

    $deletedDBs =  Get-AzureRMSqlDeletedDatabaseBackup -ResourceGroupName $resourceGroupName
    -ServerName $DbServerName

    $RestoredDB = Restore-AzureRmSqlDatabase -FromDeletedDatabaseBackup -DeletionDate
    $deletedDBs[0].DeletionDate -ResourceId $deletedDBs[0].ResourceId -ServerName
    $deletedDBs[0].ServerName -ResourceGroupName $deletedDBs[0].ResourceGroupName
    -ServiceObjectiveName $deletedDBs[0].ServiceLevelObjective -TargetDatabaseName
    $deletedDBs[0].DatabaseName

    if($RestoredDB -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    ```

    清单 9-1. 时间点还原和还原已删除的 Azure SQL 数据库


    ### 地理还原


    `Azure SQL Database` 的地理还原功能允许从备份的地理复制副本进行数据库还原。如前所述，`Azure` 会自动在地理冗余存储上对数据库进行备份。地理还原利用这些地理复制的备份副本来进行还原。地理还原可以帮助应用程序快速从影响整个主站点的灾难中恢复。


    > 注意：备份在复制到 `GRS` 时可能存在一些延迟。完全有可能在主站点宕机之前，最新的备份尚未被复制。


    与时间点还原一样，地理还原可以使用 `Azure Portal`（参见图 9-7 和 9-8）或 `PowerShell`（参见清单 9-2）完成。


    ![A371128_1_En_9_Fig8_HTML.jpg](img/A371128_1_En_9_Fig8_HTML.jpg)

    图 9-8. 配置地理还原选项


    ![A371128_1_En_9_Fig7_HTML.jpg](img/A371128_1_En_9_Fig7_HTML.jpg)

    图 9-7. 启动地理还原


    地理还原可以通过创建一个以地理冗余备份为源的新数据库来实现。


    与时间点还原一样，还原数据库所需的时间取决于待还原数据库的大小以及使数据库上线所需的操作数量。

    ```

    $GeoBackups = Get-AzureRMSqlDatabaseGeoBackup -ResourceGroupName $resourceGroupName
    -ServerName $DbServerName

    # Perform Geo-Restore

    $Restored_Geo_DB = Restore-AzureRmSqlDatabase -FromGeoBackup -ResourceGroupName
    $GeoBackups[0].ResourceGroupName -ResourceId $GeoBackups[0].ResourceId -TargetDatabaseName  ($GeoBackups[0].DatabaseName
    + "_Geo_Restored") -ServerName $DbServerName

    if($RestoredDB -ne $null)

    {

    Write-Host "Database Restored Successfully!!"

    }

    ```

    清单 9-2. 地理还原一个 Azure SQL 数据库


    ### 地理复制


    `地理复制` 提供了为地理上分散的区域创建主数据库的次要副本的能力。地理复制有两种形式——标准地理复制（适用于标准和高级服务层级）和活动地理复制（仅适用于高级服务层级）。


    与本地高可用性技术（如 `SQL Server AlwaysOn`）不同，地理复制本质上始终是异步的。主副本上的事务被传送到次要副本并异步应用。为了防止数据中心之间的网络问题或基于距离的延迟，主副本上的更改会被缓冲，然后再传送到次要副本。


    > 注意：基本层级数据库不提供 `地理复制` 功能。

    '
- fmt: '#### Standard Geo-Replication


    Standard Geo-Replication allows for the creation of (at most) one secondary replica
    (non-readable) to a Microsoft designated “DR Pair” region (see Figure [9-9](#A371128_1_En_9_Chapter.html#Fig9)).
    The list of Microsoft designated DR pair regions can be found at:


    ![A371128_1_En_9_Fig9_HTML.jpg](A371128_1_En_9_Fig9_HTML.jpg)

    Figure 9-9. Representational view of the standard Geo-Replication


    ```

    http://blogs.msdn.com/b/windowsazurestorage/archive/2013/12/11/introducing-read-access-geo-replicated-storage-ra-grs-for-windows-azure-storage.aspx

    ```


    The secondary replica is non-readable while the primary is up and running. A manual
    failover is required to make the database available for user access. Standard
    Geo-Replication provides the classic DR scenario, wherein if the primary replica
    has some issue, the secondary can be immediately brought online.


    Standard Geo-Replication can be set up using either the Management Portal, as
    illustrated in Figures [9-10](#A371128_1_En_9_Chapter.html#Fig10) through [9-12](#A371128_1_En_9_Chapter.html#Fig12),
    or by using PowerShell (see Listing [9-3](#A371128_1_En_9_Chapter.html#Par41)).


    ![A371128_1_En_9_Fig12_HTML.jpg](A371128_1_En_9_Fig12_HTML.jpg)

    Figure 9-12. Configuring standard Geo-Replication options


    ![A371128_1_En_9_Fig11_HTML.jpg](A371128_1_En_9_Fig11_HTML.jpg)

    Figure 9-11. Configuring standard Geo-Replication options


    ![A371128_1_En_9_Fig10_HTML.jpg](A371128_1_En_9_Fig10_HTML.jpg)

    Figure 9-10. Configuring standard Geo-Replication


    Clicking on the Geo-Replication Role option opens up the window to set up Geo-Replication.
    This can also be configured by clicking on All Settings and then choosing Geo-Replication.


    When on the Geo-Replication setup page, you get an option to specify the secondary
    server. As mentioned earlier with standard Geo-Replication, only a “DR Pair” region
    is allowed as the secondary region.


    Just as with the Azure Portal, PowerShell can be used to set up standard Geo-Replication
    (see Listing [9-3](#A371128_1_En_9_Chapter.html#Par41)).


    ```

    $resourceGroupName = "Default-SQL-SoutheastAsia"

    $DbServerName = "primarysvr"

    $SecondaryServerName = "secondsvr"

    $DBName = Get-AzureRmSqlDatabase -ServerName $DbServerName -ResourceGroupName
    $resourceGroupName | Where-Object {($_.Edition -eq "Standard") -and ($_.DatabaseName
    -ne "master")}

    $replicationLink = New-AzureRmSqlDatabaseSecondary -DatabaseName $DBName[0].DatabaseName
    -ServerName $DbServerName -ResourceGroupName $resourceGroupName -PartnerResourceGroupName
    $resourceGroupName -PartnerServerName $SecondaryServerName -AllowConnections No

    if($replicationLink -ne $null)

    {

    Write-Host "Standard Geo Replication Setup successfully!!"

    }

    Listing 9-3. Configuring Standard Geo-Replication Using PowerShell

    ```


    Since the database in this case is configured with the standard tier, the only
    option allowed here is to have a non-readable secondary copy. This property can
    be verified using the Management Portal (see Figure [9-13](#A371128_1_En_9_Chapter.html#Fig13)).


    ![A371128_1_En_9_Fig13_HTML.jpg](A371128_1_En_9_Fig13_HTML.jpg)

    Figure 9-13. Only a non-readable secondary copy is available in this case


    Once replication is configured, the status of the database changes accordingly.
    For example, as shown in Figure [9-14](#A371128_1_En_9_Chapter.html#Fig14), the
    primary database would show the Geo-Replication role status as Primary, while
    the secondary copy would show up as Secondary.


    ![A371128_1_En_9_Fig14a_HTML.jpg](A371128_1_En_9_Fig14a_HTML.jpg)![A371128_1_En_9_Fig14b_HTML.jpg](A371128_1_En_9_Fig14b_HTML.jpg)

    Figure 9-14. Database status has changed


    #### Performing Database Failover


    The Azure Portal provides a very easy one-click mechanism to failover the database
    when the primary database is down (see Figure [9-15](#A371128_1_En_9_Chapter.html#Fig15)).
    You simply need to browse to the Geo-Replication settings and then click on the
    secondary database and initiate failover. Azure also provides a mechanism to stop
    replication if required.


    ![A371128_1_En_9_Fig15_HTML.jpg](A371128_1_En_9_Fig15_HTML.jpg)

    Figure 9-15. Performing database failover


    PowerShell can also be used to failover a database to the secondary replica.


    ```

    Set-AzureRMSqlDatabaseSecondary -DatabaseName $DBName[0].DatabaseName -PartnerResourceGroupName
    $resourceGroup -ResourceGroupName $resourceGroup -ServerName $SecondaryServer
    –Failover -AllowDataLoss

    ```


    #### Active Geo-Replication


    Active Geo-Replication uses the same technology as the standard Geo-Replication,
    but has the following differences (see Figure [9-16](#A371128_1_En_9_Chapter.html#Fig16)):


    ![A371128_1_En_9_Fig16_HTML.jpg](A371128_1_En_9_Fig16_HTML.jpg)

    Figure 9-16. Representation view of the Active Geo-Replication


    *   The secondaries are readable.

    *   There can be up to four secondaries in any data center across the globe. Users
    can create the secondary in any data centre, irrespective of the DR Pair regions.

    *   Active Geo-Replication is available only for the Premium tier databases.


    As with Standard Geo-Replication, Active Geo-Replication can be set using the
    Azure Portal, as shown in Figures [9-17](#A371128_1_En_9_Chapter.html#Fig17) and
    [9-18](#A371128_1_En_9_Chapter.html#Fig18), or by using PowerShell, as shown in
    Listing [9-4](#A371128_1_En_9_Chapter.html#Par55).


    ![A371128_1_En_9_Fig18_HTML.jpg](A371128_1_En_9_Fig18_HTML.jpg)

    Figure 9-18. Initialization of Active Geo-Replication


    ![A371128_1_En_9_Fig17_HTML.jpg](A371128_1_En_9_Fig17_HTML.jpg)

    Figure 9-17. Configuring Active Geo-Replication


    As mentioned, with Active Geo-Replication, up to four secondaries can be created
    (each in a different region). All the secondaries are readable and can be utilized
    for read-only workloads (such as running reports). If there is a problem with
    the primary server, a manual failover can be initiated to recover the secondary
    database and make it available for the application workload. Figure [9-18](#A371128_1_En_9_Chapter.html#Fig18)
    represents a scenario with two Active Geo-Replication secondaries.


    Database failover can be performed using Azure Portal or PowerShell. After the
    failover, the new primary database goes into the “Online” state, while the new
    secondary goes into the “Readable” state. As can be seen in Figure [9-19](#A371128_1_En_9_Chapter.html#Fig19),
    the East US database is now the primary database, while the Southeast Asia database
    has become a readable secondary database.


    ![A371128_1_En_9_Fig19_HTML.jpg](A371128_1_En_9_Fig19_HTML.jpg)

    Figure 9-19. Active Geo-Replication in Action


    Listing [9-4](#A371128_1_En_9_Chapter.html#Par55) shows a sample PowerShell script
    to enable Active Geo-Replication.


    ```

    $resourceGroupName = "Default-SQL-SoutheastAsia"

    $DbServerName = "primarysvr"

    $SecondaryServerName = "secondsvr"

    $DBName = Get-AzureRmSqlDatabase -ServerName $DbServerName -ResourceGroupName
    $resourceGroupName | Where-Object {($_.Edition -eq "Premium") -and ($_.DatabaseName
    -ne "master")}

    $replicationLink = New-AzureRmSqlDatabaseSecondary -DatabaseName $DBName[0].DatabaseName
    -ServerName $DbServerName -ResourceGroupName $resourceGroupName -PartnerResourceGroupName
    $resourceGroupName -PartnerServerName $SecondaryServerName -AllowConnections All

    if($replicationLink -ne $null)

    {

    Write-Host "Geo Replication Setup successfully!!"

    }

    The “Allow Connections” Parameter to the `New-AzureRmSqlDatabaseSecondary` cmdlet
    is of paramount importance. If the “All” option is not specified, Azure will end
    up creating a non-readable secondary copy of the database.

    Listing 9-4. Enabling Active Geo-Replication

    ```'
