    that you will create everything from scratch. The first task is to create a resource
    group and a storage account to host the virtual hard disks for the virtual machine,
    as shown in Listing [5-2](#A371128_1_En_5_Chapter.html#Par51).


    ```

    ## Parameters

    $vResourceGroupName = ""

    $vRegion = ""

    $vStorageAccountName = ""

    ## Create the new resource group

    ## An Azure resource group is required before you can create any resources

    New-AzureRmResourceGroup -Name $vResourceGroupName -Location $vRegion

    ## Create the storage account and associate it with the Resource Group

    New-AzureRmStorageAccount -ResourceGroupName $vResourceGroupName -Location $vRegion
    -Name $vStorageAccountName -Type Standard_LRS

    ## Set the current storage account context to the newly created storage account

    Set-AzureRmCurrentStorageAccount -ResourceGroupName $vResourceGroupName -StorageAccountName
    $vStorageAccountName

    Listing 5-2.

    PowerShell Commands to Create a Resource Group and a Storage Account Associated
    with the Same Resource Group

    ```


    Now that you have the housing for the virtual hard disks and a logical container
    for the resources being created, let’s proceed with image selection. This is a
    bit complicated as the images are updated quite frequently and you need to enumerate
    based on current list available. Since we used a SQL Server 2016 image earlier
    in the chapter, we shall endeavor to do the same in this journey. Another selection
    that you need to zero in on is the virtual image size. Listing [5-3](#A371128_1_En_5_Chapter.html#Par53)
    uses `Get-AzureRmVMSize` to get a list of all the virtual machine sizes available
    in the region.


    ```

    $vRegion = "WestUS"

    ## Get a list of the VMs offered and then make a selection based on the latest
    SQL Server 2016 image available

    Get-AzureRmVMImageOffer -Location $vRegion -PublisherName "MicrosoftSQLServer"
    | Where-Object {$_.Offer -like "*SQL2016*"}

    $vImageSelection = Get-AzureRmVMImage -Offer "SQL2016CTP3.3-WS2012R2" -PublisherName
    "MicrosoftSQLServer" -Skus "Evaluation" -Location $vRegion

    ## Get the available virtual machine size and select the appropriate one

    Get-AzureRmVMSize -Location $vRegion | Where-Object {$_.MemoryInMB -ge 8192 -and
    $_.NumberOfCores -ge 4} | ft

    $vImageSize = "Standard_DS3"

    Listing 5-3.

    PowerShell Code to Select the Available Virtual Machine Size and the Latest SQL
    Server 2016 Image Available in the Gallery

    ```


    If you are looking to deploy an availability set, you need to use the `New-AzureRmAvailabilitySet`
    cmdlet to create a new availability set and add the virtual machine being provisioned
    (see Listing [5-4](#A371128_1_En_5_Chapter.html#Par55)). The next task is to create
    the virtual network. If you are using a standalone instance of SQL Server, you
