- fmt: '# 6. SQL Hybrid Solutions


    With all the business dynamics available in today’s IT industry, there is a huge
    paradigm shift. You need to constantly innovate and grow your business by reducing
    the Total Cost of Ownership (TCO) and maximizing the return on investment. Microsoft
    Azure provides you with a perfect platform to accomplish this by integrating the
    public cloud resources and private cloud resources together. The classic case
    of hybrid cloud usage is to store your sensitive data within your on-premises
    data center and connect to the public cloud where other data resides.


    The hybrid cloud provides a bridge between your on-premises data center and your
    public cloud. Microsoft’s approach to the cloud is quite unique as there is consistency
    across the cloud in terms of the servers that are being used in the data centers.
    Any customer can optimize resources depending on their needs and can store critical
    and secure data in their on-premise data centers and leverage the storage cost
    by offloading the work to the cloud, thereby scaling up without actually impacting
    cost.


    SQL Server integrates quite well with cloud services from Azure, providing end-to-end
    experiences, using the same interface as `T-SQL` or `PowerShell` that you are
    comfortable with. Hybrid environments are environments where the resources come
    from the cloud and the resources come from on-premises sites. The resources are
    physical machines, VMs, storage (SAN, Cloud Storage), DC (for ADs , logins policies,
    etc.), and databases. So you can think of couple ways to run your hybrid environment.
    Say you can have a SQL Server that runs on-premises and that uses cloud resources.
    You could have your SQL Server in the cloud using an on-premise resource. When
    we think of going hybrid with SQL Server running within our on-premises environment
    talking to the cloud, we use two resources: `Azure storage` and `Azure Virtual
    Machines`.


    Microsoft Azure enables you to store a huge amount of data with minimal risk due
    to the multiple replicas that the data gets written to. To add to this, there
    is automated disk healing that runs a checksum to ensure that the data is logically
    consistent.


    If the checksum doesn''t match, we automatically take the disk out and then make
    another copy on the fly. This means having three copies of the data at any point
    in time. Cost is also low, which is one reason why customers are moving to Azure.
    Another important resource is virtual machines, which are available in Azure.
    These VMs are highly available and offer automatic VM healing with a plethora
    of sizes you can choose from and are a great cost-saver.


    Figure [6-1](#A371128_1_En_6_Chapter.html#Fig1) shows different scenarios we can
    leverage in the cloud infrastructure to save cost. For example, we can store backups
    to `Azure storage`, store SQL Server files in `Azure storage`, and use the `AlwaysOn`
    technology to extend the on-premises infrastructure and have a secondary site
    configured in the cloud. We will look at these in detail later in this chapter.


    ![A371128_1_En_6_Fig1_HTML.jpg](A371128_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1.** On-premises integration using Azure Storage


    ## Hybrid Model Snapshot


    The hybrid model provides the following advantages:


    *   Your business decision become agile and you can quickly make decisions about
    making resources available with this model.

    *   You don''t end up wasting time getting the machines ready (hardware/software);
    instead you can focus on more productive business logic or possibly serve the
    customer’s need.

    *   You can now leverage the Microsoft Azure ecosystem of applications and build
    a highly scalable application.


    However, when you go with this hybrid infrastructure, there are few factors to
    consider:


    *   You may have to think over maintaining the hybrid infrastructure, as there
    are additional components to it like a firewall, virtual networks, routing devices,
    etc.

    *   Managing and accessing the resources involves different sorts of applications,
    thus classic consolidation could be a challenge.

    *   Before moving to the cloud, you should evaluate the complexity, perform risk
    assessment, and do a benchmark study on the feasibility.


    The applications, tools, and services running on either side are not always interoperable.
    There are several applications that cannot quite cross these boundaries and thus
    it is important for you to evaluate the pros and the cons.'
