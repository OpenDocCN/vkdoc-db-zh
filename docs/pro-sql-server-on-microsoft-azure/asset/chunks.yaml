    ### Storage Spaces


    Storage spaces are common configuration patterns used during the VM provisioning.
    If more than one disk is required for your specified settings, the latest gallery
    image templates create one Windows storage space (virtual drive) across all disks.
    A thought might have crossed your mind about the necessity to complicate the configuration.
    A number of databases hosted on-premises have a single database file that cannot
    be split evenly into multiple files at the drop of a hat. This might be due to
    the lack of partitioned data, which would could possibly make a single file the
    hotspot.


    If you are using Windows Server 2012 or above, you can use storage spaces to group
    two or more drives together in a storage pool and then use capacity from that
    pool to create virtual drives called storage spaces. This feature of Windows allows
    you to absolve yourself from the need to split your database into multiple files.
    However, there are a few quirks that you need to be aware of.


    The first quirk to remember is to configuring the number of columns correctly
    for the storage pool. Increasing the number of columns can significantly improve
    performance for sequential workloads. Random workloads do not experience as significant
    a performance increase, exhibiting more uniform performance across different column
    counts. Another factor that ties in directly with the column count of the space
    is the amount of outstanding IOs or data that is to be read from or written to
    the storage space. A large number of columns benefits applications that generate
    enough load to saturated multiple disks, but introduce unnecessary limitations
    on capacity expansion for less demanding applications. If there are more than
    eight data disks, you need to use PowerShell scripts to adjust the number of columns
    appropriately, as shown in Listing [7-6](#A371128_1_En_7_Chapter.html#Par36).


    The second quirk to remember is the Resiliency setting. Storage spaces offer three
    resiliency settings: simple, parity, and mirror. If you select mirror, your data
    disk will end up performing two IO operations for a single IO generated by the
    SQL Server instance. Mirroring is recommended for resiliency, which can eat up
    your IO bandwidth on Azure. If you are only concerned about protecting the virtual
    machine from disk failures, this is already done under the hood by Azure Storage
    (details in Chapter [3](#A371128_1_En_3_Chapter.html)), where redundant copies
    of the blobs hosting the data files are created by default.


    ```

    New-VirtualDisk -StoragePoolFriendlyName CompanyData -FriendlyName BusinessCritical
    -ResiliencySettingName simple -Size 1TB -ProvisioningType Thin -NumberOfColumns
    2 -Interleave 65536

    Listing 7-6.

    PowerShell Script Example to Create a Virtual Disk Storage Pool with a Column
    Count of 2 and Simple Resiliency Setting

    ```


    ### Tempdb


    SQL Server’s temporary database has been the victim of poorly optimized queries
    that spill over operations to the tempdb. The performance problems that plague
    tempdb are not a unique issue isolated to Azure VM. Tempdb performance is a source
    of constant headache if configured incorrectly. To ensure that your tempdb stays
    happy, enable `trace flag 1118 (-T1118)` to prevent resource allocation contention
    during the creation of temp objects by concurrent threads.


    It is a good idea to increase the number of data files in tempdb to maximize disk
    bandwidth and to reduce contention in allocation structures. As a general rule,
    if the number of logical processors is less than or equal to eight, use the same
    number of data files as logical processors. If the number of logical processors
    is greater than eight, use eight data files. If contention continues, increase
    the number of data files by multiples of four (up to the number of logical processors)
    until the contention is reduced to acceptable levels or make changes to the workload/code.
    If your virtual machine''s temporary drive is a SSD, hosting the tempdb on the
    temporary disk is recommend to increase performance throughput.


    Figure [7-1](#A371128_1_En_7_Chapter.html#Fig1) shows clearly that when the tempdb
    is hosted on standard disks, the performance is not consistent and the latency
    for certain IOs could be very high. This would lead to erratic performance, which
    would be unpalatable for mission- or business-critical workloads. When hosting
    the tempdb on SSD or Premium IO disks, the performance is consistent and the deviations
    are negligible.


    ![A371128_1_En_7_Fig1_HTML.jpg](A371128_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    Tempdb performance comparison of SSD, Premium IO, and standard disks


    In summary, if your application likes consistent tempdb performance, picking the
    SSD or Premium IO is the best bet.


    ### Database Settings


    The earlier sections talked in detail about how knowing your IO patterns and the
    IO bandwidth required helps you deploy the Azure VM with the correct configuration.
    This in turn allows you to get the best bang for your buck! There are also a few
    database level settings that help optimize for good performance throughput.


    Database page compression helps reduce the IO, which is true for all environments
    but in Azure it definitely helps boost the performance for chatty systems.


    If you are an avid reader of blogs, you would have seen multiple SQL Server professionals
    discouraging the use of Auto Shrink and Auto Close for a database; this is also
    true for databases hosted on SQL Server instances running on Azure VMs. Listing
    [7-7](#A371128_1_En_7_Chapter.html#Par44) shows how to determine if `AUTO CLOSE`
    and `AUTO SHRINK` are enabled for any database hosted on a SQL Server instance.


    ```

    $RulePass = 1

    $sqlquery = "select name, is_auto_shrink_on, is_auto_close_on from sys.databases"

    # Execute a query against the SQL Server instance

    $dbs = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

    # Loop through the database properties

    foreach ($db in $dbs)

    {

    if ($db.is_auto_shrink_on -eq $true)

    {

    Write-Host "[ERR] Database" $db.name "has Auto Shrink turned on" -ForegroundColor
    Red

    $RulePass = 0

    }

    if ($db.is_auto_close_on -eq $true)

    {

    Write-Host "[ERR] Database" $db.name "has Auto Close turned on" -ForegroundColor
    Red

    $RulePass = 0

    }

    }

    if ($RulePass -eq 1)

    {

    Write-Host "[INFO] No databases found with Auto Close and Auto Shrink turned on"
    -ForegroundColor Green

    }

    Listing 7-7.

    PowerShell Code to Determine if AUTO CLOSE and AUTO SHRINK Are Enabled on Any
    Database

    ```


    A few housekeeping tasks that you may need to perform after SQL Server is installed
    on your virtual machine are:


    1.  Change the default location of the database data and log files to ensure that
    new database files are hosted on the data disks attached to the virtual machine
    that were configured for hosting SQL Server database files.  

    2.  Move the system database files to the data disks.  

    3.  Move your error log, trace file locations, and extended events file targets
    to the data disks.'
