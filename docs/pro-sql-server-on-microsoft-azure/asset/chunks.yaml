- fmt: '## Using Transaction Replication


    Transaction Replication is a data (or schema) replication feature of Microsoft
    SQL Server that replicates transactions on the source database (publisher) to
    the multiple target databases (subscribers), through an intermediate distribution
    database. The `Log Reader agent` reads the transaction log file from the publisher
    database and sends the information to the distribution database. Once the information
    is available with the distribution database, it is send to the subscribers using
    the `distribution agents`.


    SQL Server Transaction Replication allows users to configure `Azure SQL databases`
    as a subscriber. During the initial setup of transactional replication, the subscriber
    database is synced using a snapshot of the publisher database. After the initial
    sync, any changes made to the primary database (on-premises) are captured by `logRead.exe`
    and stored in the distribution database. From the distribution database, these
    changes are sent to the `Azure SQL database` subscriber. This flow is illustrated
    in Figure [8-22](#A371128_1_En_8_Chapter.html#Fig22).


    ![A371128_1_En_8_Fig22_HTML.jpg](A371128_1_En_8_Fig22_HTML.jpg)


    Figure 8-22.


    Execution details of Transaction Replication to Azure SQL Database


    Azure SQL Database cannot be configured as a distributor or as a publisher for
    a transactional replication setup. This feature can be used as an effective option
    for database migration, especially in scenarios where minimal or no downtime is
    required.


    ### Summary


    In this chapter, we learned about the internal architecture workings of `Azure
    SQL Database`. We also looked at the different service tiers and performance levels
    of `Azure SQL Database` and how different utilities—such as the `Azure Portal`,
    `SSMS`, `SSDT`, and `PowerShell`—can be used to create and manage an `Azure SQL
    database`. We also learned about the different methods available to migrate an
    existing `SQL Server database` to `Azure SQL Database`.


    # 9. Business Continuity and Security with Azure SQL Database


    Business continuity is all about ensuring that critical applications are resilient
    to planned or unplanned outages that might result in permanent or temporary loss
    of business functionality. The goal is to design and deploy the critical business
    so that these outages will have minimal or no impact on the business, or there
    is scope for recovery within a business-approved timeframe. There are several
    key discussion points that you need to consider when you’re planning or designing
    for business continuity.


    *   `RTO` . The maximum possible allowed downtime for the application, post which
    the business might incur monetary losses. Applications need to be designed such
    that they recover within the specified `RTO`.

    *   `RPO` . The maximum amount of data loss allowed before the applications need
    to be fully available.

    *   `ERT` . The estimated duration for the database to be fully available after
    a restore or failover request.


    When designing applications for business continuity, architects need to consider
    multiple types of planned or unplanned outages that can cause the application
    to fail. Some of the most common scenarios are:


    *   Human errors . Recovering from scenarios where an admin or a user with elevated
    privileges has deleted or modified critical business data by mistake. This is
    a very common scenario that folks working with `SQL Server` or related technologies
    are all too familiar with.

    *   Site outages . Recovering from scenarios where the entire data center is unavailable.
    Examples include natural catastrophes and electrical malfunctions that render
    the entire DC unavailable.

    *   Maintenance and upgrades . Ensuring business continuity during application
    maintenance and upgrades.


    In this chapter, we will talk about the various business continuity and disaster
    recovery options available with `Azure SQL Database` and how these features can
    be utilized to provide a highly available database environment for your business-critical
    workloads.


    While business continuity and disaster recovery are of paramount importance, another
    key criterion for any critical workload is to ensure the security and safety of
    the data stored on the database. We should be careful during the design and architecting
    phase to ensure that the final solution is secure against all potential external
    or internal attacks. In this chapter, we will cover the different security features
    and options available with the `Azure SQL Database` to ensure the safety of your
    data.


    ## Azure SQL Database: Business Continuity and Disaster Recovery


    `Azure SQL Database` provides out-of-the box high availability and fault tolerance,
    which goes a long way in ensuring business continuity and disaster recovery. Additionally,
    there are other configurable options that can be utilized to achieve high availability/disaster
    recovery across multiple regions.


    ### Local Redundancy


    `Azure SQL Database` by default provides two secondary copies of the database
    in the same data center. These secondaries are in sync with the primary copy of
    the database. All the read/write operations are performed on the primary copy.
    Additionally, the writes are replicated to the secondary copies. Figure [9-1](#A371128_1_En_9_Chapter.html#Fig1)
    shows this process.


    ![A371128_1_En_9_Fig1_HTML.jpg](A371128_1_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    Representational view of Azure SQL DB local redundancy


    `Azure` presents a transparent logical copy of the database to the end users,
    keeping other details hidden. If one of the copies goes down, `Azure` ensures
    that another copy of the database is created to maintain three copies of the database.
    `Azure` uses the `Partition Manager` and `Global Partition Map` to ensure that
    three copies of the database are maintained at any given point in time.


    When a database is created, `Azure` creates the two secondary copies on different
    data nodes. As illustrated in Figure [9-2](#A371128_1_En_9_Chapter.html#Fig2),
    if the node containing the primary copy of the database is down, `Azure Partition
    Manager` initiates a failover algorithm wherein one of the secondary copies is
    promoted to the primary role. Once the primary database copy is established, another
    secondary is created and synched with the primary.


    ![A371128_1_En_9_Fig2_HTML.jpg](A371128_1_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    Detailed representation of how local redundancy is achieved


    If the node containing a secondary copy was down, the `Partition Manager` creates
    a new secondary copy on one of the nodes in order to ensure that there are three
    copies. In the following example, when the node 103 goes down, all the copies
    of the database on that node are moved to other nodes. This process is illustrated
    in Figures [9-2](#A371128_1_En_9_Chapter.html#Fig2) and [9-3](#A371128_1_En_9_Chapter.html#Fig3).


    ![A371128_1_En_9_Fig3_HTML.jpg](A371128_1_En_9_Fig3_HTML.jpg)


    Figure 9-3.


    Reconfiguring local redundancy on a node failure'
