  trans: '## 更新/升级域


    现在您已经了解了资源提供者的架构组织方式，接下来必须理解**更新域**的概念。可以将更新域视为维护计划中要打补丁的一组服务器。如果您不是业务负责人，则需要确保在更新期间，托管在正在打补丁的服务器上的应用程序几乎没有停机时间。这确实是现实世界中最困难的
    IT 问题之一。


    Azure 将实例均匀分布到多个**升级域**中，每个升级域作为部署的一个逻辑单元。在升级部署时，升级操作一次只针对一个升级域执行，以最小化在这些环境中运行的服务或应用程序的停机时间。升级域有助于减少升级对正在运行的服务的影响，同时保持环境最新。这最大限度地降低了因缺乏更新而导致已知问题影响生产环境的风险。


    掌握这一概念非常重要，因为仅仅拥有一个更新域并不能帮助您的 SQL Server 部署。即使在故障转移集群或可用性组环境中，SQL Server 实例也只能有一个运行服务的活动节点。因此，如果运行
    SQL Server 实例的服务器重启，数据库服务将会中断。对于托管在 Azure 虚拟机上的任何生产 SQL Server 环境，拥有一个可用性组部署至关重要，以防止长时间停机。


    ## 故障域


    如前所述，仅靠升级/更新域不足以维护托管在 Azure 虚拟机上的 SQL Server 实例的正常运行时间。在 Azure 中，单点故障的范围本质上是一个**故障域**。


    与本地环境最简单类比的方式是，考虑一个从计算角度防止单点故障的故障转移集群。现在扩展到 Azure 世界，连接到电源插座的单一计算源就是一个故障域。这甚至可以是数据中心中的一个机架，因为机架的电源中断将导致基础设施中的多个计算节点失效。故障域由
    Azure 在部署期间确定，强烈建议将每个角色的两个或更多个实例部署在 Azure 中，以便单个故障域中的故障不会导致应用程序服务中断。对于托管在 Azure
    虚拟机上的 SQL Server，从高可用性角度出发，始终建议拥有主备部署。大多数企业环境都遵循这一概念，在 Azure 中也有这样做的必要。具体的服务级别协议（SLA）详见
    Azure 服务级别协议。


    ## 部署


    使用 Azure 时最常见的任务之一是部署。直到最近，这还是一条单行道。Azure 现在有两种部署模型：经典部署模型和资源管理器部署模型。对于任何新的开发工作，尽可能使用资源管理器部署模型是最好的。所有
    Azure 资源都支持一种或两种部署模型。


    使用这两种部署模型处理虚拟机时，有一些重要的注意事项：


    *   使用经典部署模型部署的虚拟机无法包含在使用资源管理器部署的虚拟网络中。

    *   使用资源管理器部署模型部署的虚拟机必须包含在虚拟网络中。

    *   使用经典部署模型部署的虚拟机不必包含在虚拟网络中。


    ### 经典部署模型


    Azure 最初引入了一种称为**经典部署模型**的部署模型。在本节中，我们将限制在虚拟机的部署讨论。在经典方法中，部署的虚拟机只能通过云服务访问。云服务是容纳虚拟机的容器。云服务名称的格式为
    `<name>.cloudapp.net`。


    ### 资源管理器部署模型


    在**资源管理器部署模型**中，云服务不再是创建虚拟机所需的对象（见图 2-8）。Azure 资源管理器使您能够轻松利用预构建的应用程序模板或构建应用程序模板，以在
    Azure 上部署和管理计算、网络和存储资源。这些模板采用日益流行的 JSON 格式，可以轻松地从现有部署中导出并应用于新部署。


    ![A371128_1_En_2_Fig8_HTML.jpg](img/A371128_1_En_2_Fig8_HTML.jpg)


    图 2-8. Azure 虚拟机的 Azure 资源提供者及其关系


    Azure 资源提供者支持创建功能虚拟机所需的各个资源，您可以按需配置。对于虚拟机，有三个主要的资源提供者：


    *   **计算资源提供者 (CRP)**：支持虚拟机实例和可选的可用性集。

    *   **存储资源提供者 (SRP)**：支持必需的存储帐户，用于存储虚拟机的 VHD，包括其操作系统和额外的数据磁盘。

    *   **网络资源提供者 (NRP)**：支持必需的网卡 (NIC)、虚拟机 IP 地址以及虚拟网络中的子网，以及可选的负载均衡器、负载均衡器 IP 地址和网络安全组。


    我们讨论过，这些资源提供者都不能孤立工作，因为托管一个简单的虚拟机需要资源提供者之间的资源关系。例如，虚拟机依赖于 SRP 中定义的特定存储帐户来将其磁盘存储在
    Blob 存储中。虚拟机引用 NRP 中定义的特定网卡，并且还可能在 CRP 中定义了一个可用性集。网卡引用虚拟机分配的 IP 地址、虚拟机的虚拟网络子网，以及如果需要访问控制，则引用网络安全组。


    资源管理器 (ARM) 使得构建、集成和协作开发复杂的应用程序变得非常简单，这些应用程序可以通过一个可共享的模板文件包含整个范围的 Azure 资源（如网站、SQL
    数据库、虚拟机和虚拟网络）。这样的共享模板文件可以作为可重复部署的用途，相对轻松地搭建开发环境。


    VM 扩展（自定义脚本、DSC、Chef、Puppet 等）与模板文件中的 Azure 资源管理器深度集成，这使得轻松协调虚拟机内的设置配置成为可能。ARM
    还允许使用 Azure 基于角色的访问控制 (RBAC) 进行简单而精确的组织资源访问管理。


    ### 部署自动化


    既然我们谈到了部署，一个明显的问题是是否有办法实现实际部署的自动化。Azure 提供了三种不同的方式来操作计算、存储和网络对象。第一种是 Web 用户界面，这是意料之中的，毕竟这是将图形界面变得普及的公司。第二种和第三种方法主要用于以编程方式部署可通过
    Web 门户部署的任何内容。


    Azure 公开了 PowerShell cmdlet 和 REST API，允许开发人员和 IT 管理员编写部署例程。这些例程自动化创建 Azure 实体并配置该实体公开的部署后配置选项。Azure
    自动化服务的自动化功能与这些编程接口相结合后功能非常强大，允许设计用于部署的自定义工作流。在 GitHub 上可以找到许多此类示例。'
- fmt: "## Summary\n\nIn this chapter, you learned how Azure defines its compute,\
    \ storage, and networking boundaries. While there is a layer of abstraction provided\
    \ in Azure to make your deployment and daily operations easier, the parallels\
    \ that you can draw with your on-premises environment are similar. This allows\
    \ for a lower learning curve when migrating to Azure. Infrastructure as a Service\
    \ has the highest similarity coefficient between your data center and Azure. The\
    \ similarity wanes as you move from IaaS to PaaS to SaaS.\n\n## 3. Microsoft Azure\
    \ Storage\n\nMicrosoft Azure Storage is a cloud storage system that provides customers\
    \ the flexibility to store huge amount of data, and it can be stored for any duration.\
    \ This uniqueness of the data that is stored here is that you can access the data\
    \ anywhere and at anytime. It’s also a utility-based storage system (i.e., you\
    \ pay for what you use and what you store). In Microsoft Azure Storage, the data\
    \ is durable due to the local replication and geographic replication that enables\
    \ disaster recovery. The storage consists of blobs (user’s files), tables (structured\
    \ storage), and queues (messaging). The data is highly durable, available, and\
    \ massively scalable. It is exposed through REST APIs, client libraries in .NET,\
    \ Java, Node.js, Python, PHP, Ruby.\n\n### Azure Storage Service\n\nThere are\
    \ several types of Microsoft Azure Storage services (see Figure [3-1](#A371128_1_En_3_Chapter.html#Fig1)):\n\
    \n![A371128_1_En_3_Fig1_HTML.jpg](A371128_1_En_3_Fig1_HTML.jpg)\n\nFigure 3-1.\
    \ Microsoft Azure Data Storage concepts and REST protocols to access blobs tables\
    \ and queues\n\n*   `Blob storage service`\n*   `Table storage`\n*   `Queue storage`\n\
    *   `File storage`\n\n### Blob Storage\n\nA blobs is nothing but a filesystem\
    \ in the cloud. It can contain text data or binary data, such as a document, a\
    \ media file, or an application installer. In short, it is a simple interface\
    \ to store and retrieve files in the cloud (see Figure [3-1](#A371128_1_En_3_Chapter.html#Fig1)).\
    \ The following list provides some common uses of blobs:\n\n*   Data sharing.\
    \ Customers can share documents, pictures, videos, and music.\n*   Big Data insights.\
    \ Customers can store lots of raw data in the cloud and can compute using map\
    \ reduce jobs for getting data insights.\n*   Backups. Many customers store the\
    \ backups in the cloud, i.e., they store on-premises data in the cloud.\n\nThe\
    \ `blob storage service` contains the following key concepts:\n\n*   `Storage\
    \ accounts`. Microsoft Azure provides storage in the different locations around\
    \ the world. You need to create a `storage account` to access the storage services\
    \ and host your data. Once you create your `storage account`, you can create `blobs`\
    \ and store them in the `container`, and you can create `tables` and put `entities`\
    \ into those `tables`. You can also create `queues` and store `messages` in those\
    \ `queues`.\n*   `Containers`. A `container` provides a grouping of all `blobs`.\
    \ A `storage account` could contain more than one `container` and each `container`\
    \ can contain multiple `blobs`.\n*   `Blob`. A `blob` can contain text data or\
    \ binary data, such as a document, a media file, or an application installer.\
    \ Microsoft Azure Storage offers three types of `blobs`:\n    *   `Block blob`.\
    \ As it goes, a `block blob` comprises of `blocks`, each of which is identified\
    \ by a `block ID`. Basically, you create/modify a `block blob` by writing a set\
    \ of `blocks` and committing them by their `block IDs`. Each `block` can be of\
    \ different size with maximum of 4MB. The maximum size of the `block blob` is\
    \ 200GB, with a single `blob` containing 50,000 `blocks`. For writing a `block\
    \ blob` no more than 64MB in size, you can upload it in a single write operation.\
    \ If a `block` exceeds the size specified within the storage clients, it is broken\
    \ into smaller chunks.\n    *   `Page blob`. This is a collection of 512 bytes\
    \ `page` optimized for random read and write operations. You need to initialize\
    \ the `page blob` and set the maximum size the `page blob` will grow. For adding/modifying\
    \ the contents within a `page blob`, you have to specify an `offset` and the `range`\
    \ that aligns to the 512-byte `page` boundary. The writes happen and a commit\
    \ is issued immediately. The maximum size of a `page blob` is 1TB.\n    *   `Append\
    \ blob`. These are `blocks` that are specifically designed for `append` operations.\
    \ They do not expose the `block ID`. When a `append blob` is modified, `blocks`\
    \ are added at the end by the `Append Block` operation. You cannot update/delete\
    \ existing `blobs`. A `append blob` can be a different size with maximum of 4MB\
    \ and it can include 50,000 `blobs`.\n\n### Table Storage\n\n`Azure table storage`\
    \ contains a large amount of structured non-relational data. Figure [3-2](#A371128_1_En_3_Chapter.html#Fig2)\
    \ shows the following key components of a `table storage`:\n\n![A371128_1_En_3_Fig2_HTML.jpg](A371128_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2. Windows table storage components\n\n*   `Storage account`. As discussed\
    \ earlier, all access to Azure storage is done through the `storage accounts`.\n\
    *   `Table`. A collection of `entities` that has different sets of `properties`.\n\
    *   `Entity`. Like a row in a database, it is a set of `properties` that can be\
    \ up to 1MB size.\n*   `Properties`. A name-value pair that can contain around\
    \ 252 `properties` to store data.\n\n**Note**\nRefer to `https://azure.microsoft.com/en-in/documentation/articles/storage-dotnet-how-to-use-tables/`\
    \ to learn how to access `table storage` using .NET.\n\n### Queue Storage\n\n\
    `Queue storage` is used to store large numbers of `messages` and can be accessed\
    \ using `HTTP/HTTPS`. It is used to process data asynchronously and it helps in\
    \ passing `messages` between the Azure `web role` and the Azure `worker role`.\n\
    `Queues` provide a reliable messaging for your application. They can be used to\
    \ perform asynchronous tasks, such as a task from a `web role` that has to be\
    \ sent to the `worker role` for processing asynchronously. This allows the `web`\
    \ and `worker role` to scale independently (see Figure [3-3](#A371128_1_En_3_Chapter.html#Fig3)).\n\
    \n![A371128_1_En_3_Fig3_HTML.jpg](A371128_1_En_3_Fig3_HTML.jpg)\n\nFigure 3-3.\
    \ Windows queue storage concepts\n\n**Note**\nRefer to `https://azure.microsoft.com/en-in/documentation/articles/storage-dotnet-how-to-use-queues/`\
    \ to learn how to access `queue storage` using .NET.\n\n### File Storage\n\nMany\
    \ of us still use legacy applications and couldn’t function without them. These\
    \ legacy applications used to use `SMB` file shares. With the Microsoft Azure\
    \ `file storage` service, you get cloud-based `SMB` file shares, and it can help\
    \ if you decide to migrate your legacy applications that rely on file shares to\
    \ Azure. An on-premises application can access data in a `file share` using the\
    \ `file storage` REST API. Common `file storage` uses include the following:\n\
    \n*   Migrating on-premises application that depend on file shares.\n*   Storing\
    \ shared application files such as config files.\n*   Storing diagnostic data\
    \ such as logs.\n*   Storing tools and utilities.\n\nIf you look at Figure [3-4](#A371128_1_En_3_Chapter.html#Fig4),\
    \ you will see that the `file service` can be used to store the diagnostic logs\
    \ and application config files. You can create directories and store them at your\
    \ convenience.\n\n![A371128_1_En_3_Fig4_HTML.jpg](A371128_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4. File storage concepts\n\n**Note**\nFor more information, refer to\
    \ `https://azure.microsoft.com/en-in/documentation/articles/storage-dotnet-how-to-use-files/`."
