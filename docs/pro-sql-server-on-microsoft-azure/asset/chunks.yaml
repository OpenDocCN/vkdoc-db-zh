    to deliver a diverse portfolio of cloud services. They offer dramatic improvements
    over traditional enterprise server designs: up to 40 percent server cost savings,
    15 percent power efficiency gains, and 50 percent reduction in deployment and
    service times. Microsoft hosts its cloud services on owned and leased data centers
    across the world, which spans over a million servers and over hundred data centers.


    There are some interesting strategic decisions that were made to get Azure to
    where it is today. The most interesting is the cost factor. Cost is always a discussion
    point in the IT world and Microsoft decided to reduce cost of hosting these environments
    by allocating against key cost drivers. This is fundamentally different from how
    the standard cost calculation works, which involves association of cost with the
    amount of space used. In contrast, Azure uses key factors like energy consumption,
    bandwidth consumption, incident response, and server capacity for determining
    cost.


    In 2014, Microsoft contributed the Open Cloud Server design to the Open Compute
    Project, which allows the industry to benefit from the company’s experience in
    setting up data centers for the various cloud-based services that it managed.


    In the next few sections, we will learn how compute, network, and storage is organized
    in Azure and the internals that you would need to know to make an IaaS offering
    work for you.


    ## The Azure Services


    Azure today offers a multitude of services in all three categories—PaaS , SaaS
    , and IaaS —and it keeps growing. The biggest challenge about writing a book on
    Azure is not whether the book will remain current after you have written it but
    whether it remains current while you are writing it. The world of sprints, shortened
    release cycles, and agile development methods ensures that the consumer of technology
    receives the technology content as quickly as possible.


    Instead of naming the various services that Azure offers today, you will just
    learn about the different areas that Azure can help you and your business. In
    the recent times, Azure has increasingly sought to gain parity between what you
    are used to in the on-premises world and what you see in action in Azure. This
    means that the lines between your data centers and the Azure data centers are
    becoming increasingly fuzzy and a user of your platform will very rarely be able
    to gauge the difference between what is running on Azure and on-premise (unless
    you put a banner on their application that proclaimed its host data center).


    Azure today offers services for:


    *   Management and security like key value and operational insights

    *   Developer services like Visual Studio Team Services

    *   Identity and access management like Azure Active Directory, multifactor authentication

    *   Hybrid integration like BizTalk, Site recovery

    *   Media and CDN like media encoding, media indexer

    *   Internet of Things (IoT), like Event Hub, Stream Analytics

    *   Analytics like Data Lake, HDInsight, Machine Learning, Data Factory

    *   Data and Storage like SQL Database, DocumentDB, SQL Data Warehouse

    *   Web and mobile like Web Apps, API Management


    As you see, Azure is more than just a bunch of hardware running your virtual machines.
    All of these solutions make use of certain parts of Azure’s compute, storage,
    and networking. In the next few chapters, we will delve deep into the internals
    of the Azure’s compute, storage, and networking, but in this chapter, we will
    understand how all of this is tied together.'
  trans: '## 小结


    在本章中，我们学习了云计算的基本原理以及云计算可用的不同服务模型。随后我们讨论了微软云计算平台，其中涵盖了 Azure 以及 Azure 提供的一些关键服务。


    # 2. Azure 架构


    如今，云计算已经成熟，不同服务类别——平台、软件和基础设施——之间有了明确的划分。微软在这三个类别中均提供服务。但在深入探讨之前，让我们首先理解云服务涉及的细微差别。在本章中，我们将了解基础设施即服务
    (IaaS) 的工作原理。可以将 IaaS 想象成披萨：你钟爱的披萨供应商提供冷冻披萨，而你需要管理用于加热和上菜的器具。在 IaaS 领域，这通常意味着供应商提供所有硬件，包括计算能力、网络、存储及其关联服务。你所要做的就是利用基础设施服务的组合，这允许你在该平台上部署任何应用程序或服务。


    微软的 Azure 平台不仅仅是虚拟化基础的超大规模抽象。Azure 还以数据中心的形式推动了大量的创新。让我们快速了解一下这里所述概念背后的硬件是如何布局的。微软云服务器规范实质上提供了蓝图，用于构建微软交付多样化云服务组合所使用的数据中心服务器。与传统的服务器企业设计相比，它们带来了显著的改进：服务器成本节省高达
    40%，电源效率提升 15%，部署和服务时间缩短 50%。微软在全球范围内自有和租赁的数据中心上托管其云服务，这些中心横跨超过百万台服务器和上百个数据中心。


    为了将 Azure 发展到今天的地位，做出了一些有趣的战略决策。其中最有趣的是成本因素。成本始终是 IT 界的一个讨论焦点，微软决定通过针对关键成本驱动因素进行资源分配来降低托管这些环境的成本。这与标准成本计算方式根本不同，后者通常将成本与使用的空间量相关联。相比之下，Azure
    使用能源消耗、带宽消耗、事件响应和服务器容量等关键因素来确定成本。


    2014 年，微软将开放云服务器设计贡献给了开放计算项目，使行业能够受益于该公司在为其管理的各种基于云的服务建立数据中心方面积累的经验。


    在接下来的几节中，我们将学习 Azure 中计算、网络和存储是如何组织的，以及你需要了解的内部原理，以使 IaaS 产品为你所用。


    ## Azure 服务


    如今，Azure 在 PaaS、SaaS 和 IaaS 这三个类别中提供了大量服务，并且持续增长。撰写关于 Azure 的书籍最大的挑战，不是书在你写完后是否依然与时俱进，而是你在写作过程中它是否跟得上变化。冲刺、缩短的发布周期和敏捷开发方法的世界，确保技术消费者能尽快获得技术内容。


    与其列举 Azure 当前提供的各种服务，不如让你了解 Azure 可以在哪些不同领域帮助你和你的业务。近来，Azure 越来越致力于实现与你习惯的本地环境和在
    Azure 中实际使用体验之间的对等。这意味着你的数据中心与 Azure 数据中心之间的界限正变得日益模糊，你的平台用户将很难分辨在 Azure 上运行的内容与在本地运行的内容有何不同（除非你在他们的应用程序上放置一个标明其托管数据中心的横幅）。


    Azure 当前提供的服务包括：


    *   管理与安全，如密钥保管库和操作洞察

    *   开发者服务，如 Visual Studio Team Services

    *   身份与访问管理，如 Azure Active Directory、多重身份验证

    *   混合集成，如 BizTalk、站点恢复

    *   媒体与 CDN，如媒体编码、媒体索引器

    *   物联网 (IoT)，如事件中心、流分析

    *   分析，如数据湖、HDInsight、机器学习、数据工厂

    *   数据与存储，如 SQL 数据库、DocumentDB、SQL 数据仓库

    *   Web 与移动应用，如 Web 应用、API 管理


    如你所见，Azure 不仅仅是运行虚拟机的一堆硬件。所有这些解决方案都利用了 Azure 计算、存储和网络的某些部分。在接下来的几章中，我们将深入探讨 Azure
    计算、存储和网络的内部原理，但在本章中，我们将理解所有这些部分是如何协同工作的。'
- fmt: '## The Compute


    Azure 中的计算是处理能力与物理内存的结合。当你开始在 Azure 中部署计算资源时，本质上是在启动一个虚拟机。该虚拟机运行着一个操作系统，并由本地存储支持，该存储承载着操作系统文件和临时存储。不建议使用此本地存储方案来托管你的应用程序或应用程序可能需要的任何数据。在某些情况下，你可能会使用临时存储，它被称为
    D 盘。相关示例将在后续章节中解释。


    Azure 提供不同层级的计算，对应着不同的定价（参见图 [2-1](#A371128_1_En_2_Chapter.html#Fig1)）。其定价模式类似于手机通话时长计费。你为每一分钟的使用付费。因此，只要你的虚拟机处于启动和运行状态，你就在为计算能力付费。无论你是否实际使用了计算能力，这都不重要。这再次类似于手机通话：无论你在通话中说话还是保持沉默，都会产生计费。理解托管你的应用程序或服务所需的物理内存和处理能力类型至关重要。


    ![A371128_1_En_2_Fig1_HTML.jpg](A371128_1_En_2_Fig1_HTML.jpg)

    **图 2-1. Azure 定价计算器**


    你心中接下来的问题会是：可以托管什么？嗯，它就像一个空房子！你实际上可以托管任何你想要的东西，就像在本地数据中心托管的虚拟机上一样。使用基于云的基础设施服务固有的优势在于，你只需点击一个按钮，后台就会发生一系列神奇的操作。启动虚拟机、设置操作系统以及将计算、网络和存储整合在一起，这些都由
    Azure 基础设施完成。你的工作仅仅是提供输入参数！


    在云中托管的另一个优势是打包的部署产品，即库镜像。你可以启动一个预配置了软件解决方案的虚拟机。Azure 虚拟机支持 SQL Server、Oracle、IBM、SAP
    等更多软件。这种一键式部署的贴心之处在于，如果你选择像 SQL Server、Oracle 等基于解决方案的镜像，其许可成本可以包含在内。如果你不希望将许可成本包含在计算的每分钟成本中，那么你可以使用自己的许可证，并利用
    Azure 的自动化服务来运行虚拟机部署后的步骤。


    现在让我们快速了解一下 Azure 中可用的计算层级。例如，基础层级 (A0, A1, A2 … An) 包含小至 1 个核心、0.75GB RAM 并附带
    20GB 本地磁盘的机器。如果你让一个具有此配置的虚拟机运行整整一个月，大约需要支付 13 美元。在另一个极端，你目前有 G 系列机器，提供 32 个虚拟
    CPU 和 448GB 物理内存。


    如你所见，有一个广泛的范围供你为业务选择正确的组合。


    计算提供了弹性，这也是云著名的特性，它允许你根据负载需求进行横向扩展。当你部署 SQL Server 作为独立实例时，由于 SQL Server 本身不具备横向扩展能力，因此不需要横向扩展功能。SQL
    Server 中有一些功能可以帮助你通过复制或可用性组实现横向扩展。你可以根据需要，甚至随心所欲地扩大和缩小虚拟机实例的规模。虽然随心所欲可能不是充分的业务理由，但你绝对可以根据计算基线的趋势来扩大和缩小规模！弹性在当今的计算领域正变得无处不在，而公有云使之成为现实。零售商最常见的场景之一是应对假日季节的流量高峰。这通常导致在全年为有时持续不到一个月的高峰季过度配置硬件。云中的弹性使之成为现实！Azure
    提供自动缩放功能，允许你扩展在 Web 角色、辅助角色或虚拟机上运行的工作负载。当你扩展在 Azure IaaS 上运行的应用程序时，虚拟机可以从先前创建的机器的可用性集中开启或关闭。其中一个选项是基于平均
    CPU 使用率百分比来指定缩放。


    在托管或本地数据中心中的一些常见难题，在 Azure 中已不再是问题。'
  raw: '## The Compute


    The compute in Azure is a combination of processing power and physical memory.
    When you start deploying compute in Azure, you are essentially spawning a virtual
    machine with an operating system backed by local storage that hosts the operating
    system files and a temporary storage. The local storage solution is not recommended
    for hosting your application or any data that your application might need. There
    might be situations where you use your ephemeral storage, which is referred to
    as the D drive. Examples are explained in later chapters.


    Azure offers different tiers of compute that attract different sets of pricing
    (see Figure [2-1](#A371128_1_En_2_Chapter.html#Fig1)). The pricing is similar
    to your cellular minutes. You pay for every minute of usage. So if your virtual
    machine is up and running, you are paying for the compute power. Whether you are
    using the compute power or not is immaterial. Again similar to your cellular minutes.
    Your usage gets accounted for whether you talk or stay silent on the call. It
    is very important to understand what kind of physical memory and processing power
    you require to host your application or service.


    ![A371128_1_En_2_Fig1_HTML.jpg](A371128_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Azure pricing calculator


    The next question on your mind would be what can you host. Well it’s an empty
    house! You can literally host anything you want as you would on a virtual machine
    hosted in on-premise data center. The inherent advantage of using cloud-based
    infrastructure services is you have to click a button and the magic happens in
    the background. Spawning up the virtual machine, setting up the operating system,
    and tying the compute, network, and storage together is done by Azure infrastructure.
    Your job is to just provide the inputs!


    Another advantage of hosting in the cloud is the packaged deployment offering,
    namely the gallery image. You can spawn up a virtual machine with software solutions
    preconfigured. Azure Virtual Machines support SQL Server, Oracle, IBM, SAP, and
    much more. The endearing aspect of such a one-click deployment is the license
    cost can be baked into it if you pick a solution-based image like SQL Server,
    Oracle, etc. If you don’t want to have the license cost baked into your per-minute
    cost for compute, then you can use your own license and use Azure’s automation
    offering to run your post virtual machine deployment steps.


    Let’s now quickly understand about compute tiers that are available in Azure.
    For example, the Basic tier (A0, A1, A2 … An) consists of machines as small as
    1 core and 0.75GB of RAM with 20GB local disk attached to it. You would pay approximately
    $13 if you left a virtual machine with this configuration running for an entire
    month. On the other end of the spectrum, you currently have the G-series machines
    which provide 32 virtual CPUs and 448GB of physical memory.


    As you can see, there is a wide range that allows you to pick the right combination
    for your business.


    The compute provides elasticity, which is what the cloud is famous for, by allowing
    you to scale out as per your load requirements. A scale out capability is not
    required when you are deploying SQL Server as a standalone SQL Server does not
    have scale out capabilities. There are features in SQL Server that allow you to
    scale out with the help of replication or availability groups. You can scale up
    and scale down your virtual machine instances as and when you need or even to
    your whims and fancies. While a whim and fancy might not be sufficient business
    reason, you can definitely use the trends from your compute baselines to scale
    up and scale down! Elasticity is becoming ubiquitous in the compute world today
    and public cloud makes that a reality. One of the most common scenarios for retailers
    is to match the holiday season traffic burst. This typically leads to over-provisioning
    of hardware throughout the year for a peak season that lasts less than a month
    at times. Elasticity in the cloud makes this a reality! Azure provides an auto-scaling
    feature that allows you to scale your workload running on web roles, worker roles,
    or virtual machines. Virtual machines are turned on or turned off from an availability
    set of previously created machines when you scale an application running on Azure
    IaaS. One of the options is to specify scaling based on the average percentage
    of CPU usage.


    Some of the common conundrums in a hosted or on-premise data center are not really
    issues in Azure.'
