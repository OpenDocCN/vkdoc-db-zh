    AlwaysOn uses two different keys—the Column Master key and the Column Encryption
    key, which is encrypted using the Column Master key. Listing [9-8](#A371128_1_En_9_Chapter.html#Par89)
    implements Always Encrypted on an Azure SQL database.


    ```

    USE [MyDatabase1]

    GO

    CREATE COLUMN MASTER KEY [CMKey]

    WITH

    (

    KEY_STORE_PROVIDER_NAME = N''AZURE_KEY_VAULT'',

    KEY_PATH = N''https://.vault.azure.net/keys/AlwaysEncryptedkey''

    )

    GO

    CREATE COLUMN ENCRYPTION KEY [CEKey]

    WITH VALUES

    (

    COLUMN_MASTER_KEY = [CMKey],

    ALGORITHM = ''RSA_OAEP'',

    ENCRYPTED_VALUE = 

    )

    GO

    CREATE TABLE dbo.EncryptedTable

    (

    ID INT IDENTITY(1,1) PRIMARY KEY,

    LastName NVARCHAR(32) COLLATE Latin1_General_BIN2

    ENCRYPTED WITH

    (

    ENCRYPTION_TYPE = DETERMINISTIC,

    ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'',

    COLUMN_ENCRYPTION_KEY = [CEKey]

    ) NOT NULL,

    Salary INT

    ENCRYPTED WITH

    (

    ENCRYPTION_TYPE = RANDOMIZED,

    ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'',

    COLUMN_ENCRYPTION_KEY = [CEKey]

    ) NOT NULL

    );

    GO

    Listing 9-8.

    Sample T-SQL Script for Implementing Always Encrypted

    ```


    Always Encrypted ensures that data is never in plain text, be it at rest in the
    database storage, or in transit from the client to database or from the database
    to the client.


    Apart from having a plethora of features to ensure safety of data, Azure SQL Database
    is also complaint with various industry standards.


    ## Summary


    In this chapter, you learned about the various business continuity options available
    with Azure SQL Database. Geo-Replication and its associated database failover
    capabilities provide very robust, out-of-box disaster recovery and high availability
    options, and can also be used to offload some of the read workloads to the secondary
    database to optimize the overall database performance.


    You also learned about the numerous security features available with Azure SQL
    Database that can be configured or utilized to ensure that your data is never
    compromised. With Always Encrypted, Azure SQL Database ensures that in-transit
    data will never be compromised, while RLS and data masking ensure that users will
    only see the data they are authorized to see.


    # 10. Azure SQL Database: Performance and Monitoring


    Microsoft Azure SQL Database can be provisioned in different service tiers—Basic,
    Standard, and Premium—each with multiple performance levels—Basic, S1, S2, P1,
    P2, etc. Each performance level provides an increasing set of resources, which
    are designed to deliver increasingly higher transaction throughput.


    The resources and transactional power in each service tier and performance level
    are expressed in terms of Database Throughput Units (DTUs) . DTUs provide a way
    to describe the relative transaction processing capacity of a performance level
    based on a mix of CPU, memory, or IO rates. In essence, when migration from the
    S0 to S1 performance level of the standard tier (i.e., increasing the DTUs from
    10 to 20) equates to doubling the processing power of the database.


    In this chapter, we will explain what a DTU is and why choosing the right performance
    level is very important. We will also look at the various performance optimization
    and performance monitoring features available in Microsoft Azure SQL Database.


    ## What Is a DTU?


    A DTU is a logical representation to create a liaison between a specific and defined
    workload and the Azure SQL DB SKU/Performance levels. As mentioned in Chapter
    [8](#A371128_1_En_8_Chapter.html), in a very simplified description, one DTU equates
    to the resources required to achieve a transactional rate of ∼1 transaction/sec
    on the database. Measuring performance in terms of DTUs provides a way to guarantee
    predictable performance for Azure SQL databases. For example, a database running
    with performance level P1 (125 DTUs) will provide a predictable transaction throughput
    of ∼125 transactions/second.


    ## Choosing a Performance Level


    When architecting/designing for on-premises (or Azure VM) deployments of SQL Server,
    users have traditionally used the machine hardware specs to determine the power
    available to their database workloads. However, this approach doesn’t work in
    the platform as a service world, where the hardware details are abstracted.


    On-premises deployments are constrained by the fact that a lot of deliberation
    and calculations need to be put in before choosing the hardware specs, since scaling
    up the deployment might require fresh hardware investments.


    Choosing the correct performance level in Azure SQL Database environment boils
    down to understanding the transaction throughput requirements for the database
    and then choosing the appropriate performance level for the database. If the chosen
    performance level does not meet the requirements, it’s very easy to scale up (or
    down) the database to a different performance level, which provides a higher (or
    lower) throughput. Microsoft has published performance benchmarks for the different
    performance levels, whereby the throughput of each performance level has been
    summarized in terms of transaction rates per hour, per minute, and per second.
    The performance benchmark numbers and their summarizations can be used to determine
    the approximate performance levels required for the database.


    ## Changing the Performance Level


    As mentioned earlier, SQL Database service tiers or performance levels can be
    changed very easily using either the Azure Portal or PowerShell. This ability
    to change performance levels comes in handy when the user has chosen an incorrect
    service tier or performance level to start with or when there is a need to reduce/increase
    the performance level because the business is expecting a decrease/increase in
    the database operations.


    Changing service tiers is an online operation, which means the database remains
    online while the change is taking effect.'
  trans: '## 始终加密


    始终加密是 Azure SQL Database 和 SQL Server 2016 提供的一项新功能，它允许客户端在应用程序内管理敏感数据的加密，而无需将信息暴露给数据库层。由于加密逻辑不向数据库层暴露，数据库管理员和服务器管理员无法访问或控制实际的敏感信息。


    始终加密支持两种加密方式：确定性加密和随机化加密。确定性加密对于相同的明文总会生成相同的加密输出，而随机化加密则每次都生成不同的值。确定性加密虽然在需要搜索或连接加密数据的场景中很有用，但也可能更容易受到攻击。


    始终加密使用两种不同的密钥——列主密钥和列加密密钥，后者使用列主密钥进行加密。清单 9-8 展示了如何在 Azure SQL 数据库上实现始终加密。


    ```sql

    USE [MyDatabase1]

    GO

    CREATE COLUMN MASTER KEY [CMKey]

    WITH

    (

    KEY_STORE_PROVIDER_NAME = N''AZURE_KEY_VAULT'',

    KEY_PATH = N''https://.vault.azure.net/keys/AlwaysEncryptedkey''

    )

    GO

    CREATE COLUMN ENCRYPTION KEY [CEKey]

    WITH VALUES

    (

    COLUMN_MASTER_KEY = [CMKey],

    ALGORITHM = ''RSA_OAEP'',

    ENCRYPTED_VALUE = 

    )

    GO

    CREATE TABLE dbo.EncryptedTable

    (

    ID INT IDENTITY(1,1) PRIMARY KEY,

    LastName NVARCHAR(32) COLLATE Latin1_General_BIN2

    ENCRYPTED WITH

    (

    ENCRYPTION_TYPE = DETERMINISTIC,

    ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'',

    COLUMN_ENCRYPTION_KEY = [CEKey]

    ) NOT NULL,

    Salary INT

    ENCRYPTED WITH

    (

    ENCRYPTION_TYPE = RANDOMIZED,

    ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'',

    COLUMN_ENCRYPTION_KEY = [CEKey]

    ) NOT NULL

    );

    GO

    ```


    清单 9-8.

    实现始终加密的 T-SQL 脚本示例


    始终加密确保数据无论是在数据库存储中静态保存，还是在从客户端到数据库或从数据库到客户端的传输过程中，都永远不会以明文形式存在。


    除了拥有大量功能来确保数据安全外，Azure SQL Database 还符合各种行业标准。


    ## 总结


    在本章中，您了解了 Azure SQL Database 提供的各种业务连续性选项。异地复制及其相关的数据库故障转移功能提供了非常稳健、开箱即用的灾难恢复和高可用性选项，还可用于将部分读取工作负荷卸载到辅助数据库，以优化整体数据库性能。


    您还了解了 Azure SQL Database 提供的众多安全功能，这些功能可以配置或使用，以确保您的数据永远不会泄露。借助始终加密，Azure SQL
    Database 确保传输中的数据永远不会泄露，而行级安全和数据屏蔽则确保用户只能看到他们被授权查看的数据。


    ## Azure SQL 数据库：性能与监控


    Microsoft Azure SQL Database 可以配置为不同的服务层级——基本、标准和高级——每个层级又包含多个性能级别——基本、S1、S2、P1、P2
    等。每个性能级别提供一组递增的资源，旨在提供越来越高的事务吞吐量。


    每个服务层级和性能级别中的资源和事务处理能力以数据库吞吐量单位 (DTU) 表示。DTU 提供了一种基于 CPU、内存或 IO 速率的混合负载来描述性能级别相对事务处理能力的方法。本质上，从标准层级的
    S0 性能级别迁移到 S1 性能级别（即将 DTU 从 10 增加到 20）相当于将数据库的处理能力翻倍。


    在本章中，我们将解释什么是 DTU，以及为何选择正确的性能级别非常重要。我们还将介绍 Microsoft Azure SQL Database 中可用的各种性能优化和性能监控功能。


    ### 什么是 DTU？


    DTU 是一个逻辑表示，用于在特定且定义的工作负荷与 Azure SQL DB SKU/性能级别之间建立关联。如第 8 章所述，用一个非常简化的描述来说，1
    个 DTU 相当于在数据库上实现约 1 笔交易/秒所需资源的量度。以 DTU 衡量性能提供了一种保证 Azure SQL 数据库可预测性能的方法。例如，使用
    P1 性能级别（125 DTU）运行的数据库将提供约 125 笔交易/秒的可预测事务吞吐量。


    ### 选择性能级别


    在设计本地（或 Azure VM）SQL Server 部署架构时，传统上用户使用机器硬件规格来确定其数据库工作负荷可用的能力。然而，在平台即服务 (PaaS)
    的环境中，这种方法行不通，因为硬件细节被抽象化了。


    本地部署受到一个事实的制约，即在选择硬件规格之前需要进行大量的思考和计算，因为扩展部署可能需要新的硬件投资。


    在 Azure SQL Database 环境中选择正确的性能级别，归结为理解数据库的事务吞吐量需求，然后为数据库选择合适的性能级别。如果选择的性能级别不满足要求，可以非常轻松地将数据库扩展（或缩减）到不同的性能级别，以提供更高（或更低）的吞吐量。Microsoft
    已发布了不同性能级别的性能基准，其中每个性能级别的吞吐量已按每小时、每分钟和每秒的交易率进行了汇总。这些性能基准数字及其汇总数据可用于确定数据库所需的大致性能级别。


    ### 更改性能级别


    如前所述，可以使用 Azure 门户或 PowerShell 非常轻松地更改 SQL Database 的服务层级或性能级别。当用户开始时选择了错误的服务层级或性能级别，或者因为业务预期数据库操作减少/增加而需要降低/提高性能级别时，这种更改性能级别的能力就派上了用场。


    更改服务层级是一项在线操作，这意味着在更改生效期间数据库保持在线状态。'
- fmt: '### PowerShell to Change the Service Tier or Performance Level


    PowerShell can be utilized to configure the service tier or performance Level
    for a SQL database. Listing [10-1](#A371128_1_En_10_Chapter.html#Par11) changes
    the service tier of an existing database to Standard Edition, S0 performance level.


    ```

    #login into the Azure Account

    Add-AzureRmAccount

    #Select the Subscription

    $subscriptions = Get-AzureRmSubscription

    $SubscriptionId = $subscriptions[0].SubscriptionId

    Select-AzureRmSubscription -SubscriptionId $SubscriptionId

    #Select the Resource Group

    $ResourceGroupName = Get-AzureRmResourceGroup | Where-Object {$_.ResourceGroupName
    -notlike "Default*"}

    $ResourceGroup= $ResourceGroupName[1].ResourceGroupName

    #Select the Azure SQL Server and Database Name

    $ServerName = (Get-AzureRmSqlServer -ResourceGroupName $ResourceGroup)[1].ServerName

    $DatabaseName = (Get-AzureRmSqlDatabase -ServerName $ServerName -ResourceGroupName
    $ResourceGroup | Where-Object {$_.DatabaseName -ne "Master"}).DatabaseName

    #select the new Service Tier and Performance Level

    $NewEdition = "Standard"

    $NewPerformanceLevel = "S0"

    # Change the Service Tier/Performance Level

    $ScaleRequest = Set-AzureRmSqlDatabase -DatabaseName $DatabaseName -ServerName
    $ServerName -ResourceGroupName $ResourceGroup -Edition $NewEdition -RequestedServiceObjectiveName
    $NewPerformanceLevel

    ```


    Listing 10-1. PowerShell Script to Change the Service Tier and Performance Level
    for an Azure SQL Database


    ### Using Azure Portal to Change the Service Tier or Performance Level


    Azure Management Portal provides a single-click mechanism to change the service
    tiers or performance levels for your database. Figures [10-1](#A371128_1_En_10_Chapter.html#Fig1)
    and [10-2](#A371128_1_En_10_Chapter.html#Fig2) show how the service tier and the
    performance level of an Azure SQL Database can be changed using the Azure Management
    Portal.


    ![A371128_1_En_10_Fig2_HTML.jpg](A371128_1_En_10_Fig2_HTML.jpg)


    Figure 10-2. Selecting the new performance level


    ![A371128_1_En_10_Fig1_HTML.jpg](A371128_1_En_10_Fig1_HTML.jpg)


    Figure 10-1. Changing database service tiers using the Azure Portal


    ## Azure SQL Performance Optimization Features


    Azure SQL Database provides a few useful features that can be used to optimize
    performance of SQL Database. The most important of these features are:


    *   In-Memory Optimizations

    *   Query Performance Insights

    *   SQL Database Index Advisor


    ### In-Memory Optimizations


    In-Memory Optimization features present in Azure SQL Database are very similar
    to the ones in Microsoft SQL Server 2014 (and the upcoming SQL 2016). In-memory
    optimization (in-memory tables and natively compiled SPs) and ColumnStore indexes
    can be used to increase the performance of both OLTP and analytics workloads.
    Moreover, the combination of the two can be used to provides near real-time analytics.


    ### SQL Database Index Advisor


    Azure SQL Database Index Advisor provides recommendations for indexes to be created
    (only non-clustered indexes) or dropped (only duplicate indexes at the time of
    writing) on the SQL Database. Index Advisor can be configured to automatically
    apply the index recommendations to the database. If the recommendations do not
    help performance, they can be easily rolled back. Automating index recommendations
    requires that query store be enabled on the Azure SQL Database.


    Index recommendations can be accessed on the Azure Portal, as shown in Figure
    [10-3](#A371128_1_En_10_Chapter.html#Fig3).


    ![A371128_1_En_10_Fig3_HTML.jpg](A371128_1_En_10_Fig3_HTML.jpg)


    Figure 10-3. Access the Index Advisor on Azure Portal


    To get index recommendations, a database needs a substantial amount of consistent
    usage and activity. Index Advisor provides better recommendations when there is
    consistent activity rather than inconsistent one-time burst activities. As shown
    in Figure [10-4](#A371128_1_En_10_Chapter.html#Fig4), advisor settings can be
    configured to automatically create or drop the indexes suggested. Note that this
    would be an online operation and may impact queries running against the database.


    ![A371128_1_En_10_Fig4_HTML.jpg](A371128_1_En_10_Fig4_HTML.jpg)


    Figure 10-4. Configuring Index Advisor settings


    If there are index recommendations available, they will be displayed on the page.
    If there are none, the advisor provides a reason as to why that’s so. For example,
    in Figure [10-4](#A371128_1_En_10_Chapter.html#Fig4), the reason for not having
    any recommendations is the absence of activity on the database.


    ### SQL Database Query Performance Insights


    Query Performance Insights provide a very simplified way to monitor and troubleshoot
    performance of an Azure SQL Database. Query Performance Insights requires query
    store to function and can provide detailed information about query performance
    and DTU consumption.


    Query Performance Insights can be accessed from the Settings page of the Azure
    SQL Database, as illustrated in Figure [10-5](#A371128_1_En_10_Chapter.html#Fig5).


    ![A371128_1_En_10_Fig5_HTML.jpg](A371128_1_En_10_Fig5_HTML.jpg)


    Figure 10-5. Query Performance Insights


    Query Performance Insights can be used to determine the overall DTU utilization
    and the utilization per query. Execution details of each query can be accessed
    from the portal. For example, as illustrated in Figure [10-6](#A371128_1_En_10_Chapter.html#Fig6),
    you can see the query text and the corresponding CPU and DTU usage by the query.
    Query Performance Insights settings can be tweaked to display statistics for different
    time periods and for different number of queries, as illustrated in Figure [10-7](#A371128_1_En_10_Chapter.html#Fig7).


    ![A371128_1_En_10_Fig7_HTML.jpg](A371128_1_En_10_Fig7_HTML.jpg)


    Figure 10-7. Query Performance Insights settings


    ![A371128_1_En_10_Fig6_HTML.jpg](A371128_1_En_10_Fig6_HTML.jpg)


    Figure 10-6. Detailed Query Performance details


    Query Performance Insights are based on query store, and it’s possible that query
    store can run out of storage space. When query store runs out of storage space,
    it will go into a read-only mode, thereby not allowing storage of any more query
    performance data. It is important to set up correct retention and clean-up policies
    for query store. Clean-up can be set to `AUTO` (SQL will run cleanup whenever
    the max size limit is reached) or a time-based retention.


    ```

    ALTER DATABASE [YourDB]

    SET QUERY_STORE (SIZE_BASED_CLEANUP_MODE = AUTO);

    ALTER DATABASE [YourDB]

    SET QUERY_STORE (CLEANUP_POLICY = (STALE_QUERY_THRESHOLD_DAYS = 30));

    ```


    Query Performance Insights provides a great method to figure out problematic queries
    and optimize them. For example, you can get the top CPU consuming queries and
    tune them before they have any major performance impacts on the database.


    ## Monitoring SQL Database


    Azure provides multiple ways to monitor performance, resource utilization, and
    security for the SQL databases. This can be done using either Azure Portal or
    using DMVs (Dynamic Management View) exposed at both the database and logical
    server level or by using extended events configurable on the SQL database.'
