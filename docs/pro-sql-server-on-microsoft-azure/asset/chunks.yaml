  trans: '

    ## 使用高级存储和 PowerShell 创建 Azure 虚拟机


    创建以下高级存储账户：


    ```powershell

    C:\> New-AzureRmStorageAccount -ResourceGroupName "TestResourceGroup" -AccountName
    "TestStorageAccount" -Location "US East" -Type "Premium_LRS"

    ```


    以下代码仅使用 ARM cmdlet；可用于创建虚拟机：


    ```powershell

    # 为现有资源组和存储账户名称设置值

    $rgName="RGServers"

    $locName="East US"

    $saName="Testserverssa"

    # 设置现有虚拟网络和子网索引

    $vnetName="XYZ"

    $subnetIndex=0

    $vnet=Get-AzureRmVirtualNetwork -Name $vnetName -ResourceGroupName $rgName

    # 创建 NIC

    $nicName="Test-NIC"

    $domName="TestDom"

    $pip=New-AzureRmPublicIpAddress -Name $nicName -ResourceGroupName $rgName -DomainNameLabel
    $domName -Location $locName -AllocationMethod Dynamic

    $nic=New-AzureRmNetworkInterface -Name $nicName -ResourceGroupName $rgName -Location
    $locName -SubnetId $vnet.Subnets[$subnetIndex].Id -PublicIpAddressId $pip.Id

    # 指定名称、大小和现有可用性集

    $vmName="TestVM"

    $vmSize="Standard_A3"

    $avName="Test_AS"

    $avSet=Get-AzureRmAvailabilitySet –Name $avName –ResourceGroupName $rgName

    $vm=New-AzureRmVMConfig -VMName $vmName -VMSize $vmSize -AvailabilitySetId $avset.Id

    # 添加 200GB 数据磁盘

    $diskSize=200

    $diskLabel="TestStorage"

    $diskName="Test-DISK01"

    $storageAcc=Get-AzureRmStorageAccount -ResourceGroupName $rgName -Name $saName

    $vhdURI=$storageAcc.PrimaryEndpoints.Blob.ToString() + "vhds/" + $vmName + $diskName  +
    ".vhd"

    Add-AzureRmVMDataDisk -VM $vm -Name $diskLabel -DiskSizeInGB $diskSize -VhdUri
    $vhdURI -CreateOption empty

    # 指定映像和本地管理员帐户，然后添加 NIC

    $pubName="MicrosoftWindowsServer"

    $offerName="WindowsServer"

    $skuName="2012-R2-Datacenter"

    $cred=Get-Credential -Message "Type the name and password of the local administrator
    account."

    $vm=Set-AzureRmVMOperatingSystem -VM $vm -Windows -ComputerName $vmName -Credential
    $cred -ProvisionVMAgent -EnableAutoUpdate

    $vm=Set-AzureRmVMSourceImage -VM $vm -PublisherName $pubName -Offer $offerName
    -Skus $skuName -Version "latest"

    $vm=Add-AzureRmVMNetworkInterface -VM $vm -Id $nic.Id

    # 指定操作系统磁盘名称并创建虚拟机

    $diskName="OSDisk"

    $storageAcc=Get-AzureRmStorageAccount -ResourceGroupName $rgName -Name $saName

    $osDiskUri=$storageAcc.PrimaryEndpoints.Blob.ToString() + "vhds/" + $vmName +
    $diskName  + ".vhd"

    $vm=Set-AzureRmVMOSDisk -VM $vm -Name $diskName -VhdUri $osDiskUri -CreateOption
    fromImage

    New-AzureRmVM -ResourceGroupName $rgName -Location $locName -VM $vm

    ```


    参考：https://azure.microsoft.com/en-in/documentation/articles/virtual-machines-windows-create-powershell/


    ### 高级存储内部机制


    高级存储磁盘在 Azure 存储中以页面 Blob 形式实现。每个未缓存的写入操作会复制到三个位于不同机架（故障域）的 SSD 服务器上。高级存储中的数据存储在
    SSD 驱动器上，从而提供更高的吞吐量。所使用的磁盘与使用标准存储获得的磁盘不同。有一个称为 Blob 缓存的组件运行在托管这些虚拟机的服务器上，利用服务器的
    RAM/SSD 来实现更高的吞吐量和低延迟。它对高级磁盘和标准磁盘都启用，并配置为只读和读写缓存。对于只读缓存，它会同步将数据写入缓存和 Azure 存储。对于启用了写入缓存的磁盘，当虚拟机请求时，它会将数据写回
    Azure 存储。这通过磁盘刷新或在 I/O 上指定直写标志（强制单元访问）来完成。


    虚拟机可以利用此缓存架构，提供极高的吞吐量和低延迟，从而极大地提升性能。


    ## Azure 存储最佳实践


    所有开发者在构建应用程序时遵循最佳实践非常重要。从客户合作中获得的经验使我们在处理 Azure 存储并从中获得最大性能方面得出了一些关键经验。


    ### 使用 Blob 提升性能


    处理任何形式的应用程序时，性能都很重要，更不用说 Blob。本节介绍了处理 Blob 时需要牢记的一些要点。当你将文件存储在 Blob 中，并对 Blob
    进行读写时，有几个关键方面需要注意。


    单个 Blob 的读写速度最高可达 60Mbps，单个 Blob 每秒最多支持 500 个请求。如果你有多个客户端需要读取同一个 Blob，并且可能会超过这些限制，你应该考虑使用
    CDN 来分发 Blob。


    尽量使读取大小与写入大小匹配，并避免从具有大块的 Blob 中读取小范围数据。以下属性用于控制读取和写入大小：`CloudBlockBlob.StreamMinimumReadSizeInBytes`
    和 `StreamWriteSizeInBytes`。


    你可以通过并行上传多个文件或通过并发上传来上传文件夹内容。并发上传意味着多个工作进程上传不同的 Blob。并行上传意味着多个工作进程上传同一 Blob 的不同块。


    并行上传多个 Blob 比将多个 Blob 块上传到同一 Blob 执行得更快。这是因为将多个 Blob 块并行上传到单个 Blob 会影响单个分区，并受到分区性能目标的限制。并行上传多个
    Blob 将在许多不同的分区上工作，并可能受到虚拟机带宽的限制。


    #### 复制/移动 Blob


    你可以使用存储 REST API 在存储帐户之间复制 Blob。客户端应用程序可以指示存储服务从任何其他存储帐户复制 Blob。复制可以异步进行，这减少了带宽消耗。但是，你需要小心处理异步进程，因为无法保证完成时间。更好的方法是先将
    Blob 下载到虚拟机，然后再复制到目标位置。在复制过程中，你需要确保虚拟机位于同一区域。


    #### AzCopy


    此实用程序由存储团队发布，可用于在存储帐户之间传输 Blob。你获得的传输速率非常高，建议你将其用于批量上传、下载和其他复制场景。（有关更多信息，请参阅 [`https://azure.microsoft.com/en-us/documentation/articles/storage-use-azcopy/`](https://azure.microsoft.com/en-us/documentation/articles/storage-use-azcopy/)。）


    #### 选择合适的 Blob 类型


    Azure 存储支持两种类型的 Blob——页面 Blob 和块 Blob。你需要根据用例场景选择合适的 Blob 类型，因为这会在很大程度上影响性能和可扩展性。当你想上传大量数据（例如将照片或视频上传到
    Blob 存储）时，块 Blob 是合适的。如果应用程序需要对数据执行随机写入，则页面 Blob 是合适的。


    在使用 Microsoft Azure 存储时，请将以下 URL 用作检查清单。应用程序开发者可以遵循该文章，其中记录了重要的最佳实践，内容全面。它将有助于提升应用程序的性能。参见
    [`https://azure.microsoft.com/en-us/documentation/articles/storage-performance-checklist/`](https://azure.microsoft.com/en-us/documentation/articles/storage-performance-checklist/)。

    '
- fmt: "# Performance Enhancement Using Tables\n\nThe following list provides a few\
    \ tips for working with tables , which is another service that can be used effectively\
    \ in different scenarios, as discussed in this chapter.\n\n*   **Scalability**.\
    \ The system usually performs load balancing as your traffic increases, but if\
    \ your traffic has sudden bursts, you may not be able to get this volume of throughput\
    \ immediately. If your pattern has bursts, you should expect to see throttling\
    \ and/or timeouts during the burst as the storage service automatically load balances\
    \ your table. The recommendation is to slowly ramp up, which gives the system\
    \ time to load balance appropriately.\n*   **JSON** (Java Script Object Notation).\
    \ A popular and concise format for `REST` protocol. `OData` supports `AtomPub`\
    \ and `JSON`. A drawback of `Atom` is its verbose nature, which you may not need\
    \ when you are writing a table service. The table service supports `JSON` instead\
    \ of the XML-based `AtomPub` format for transferring table data. This can reduce\
    \ payload sizes by as much as 75% and can significantly improve the performance\
    \ of your application.\n*   **Naggle off**. Nagle’s algorithm is very popular\
    \ and is implemented across `TCP/IP` networks to improve network performance.\
    \ This may not give you optimal performance specifically in some very high interactive\
    \ systems. For Azure Storage, Nagle’s algorithm has a negative impact on the performance\
    \ of requests to the table and queue services, and you should disable it if possible.\n\
    *   **Tables and partitions**. It is very important how you represent your data,\
    \ as that has a huge impact on the performance of the table service. Tables are\
    \ divided into partitions. Every entity stored in a partition shares the same\
    \ partition key and has a unique row key to identify it within that partition.\
    \ The benefit is that you can update the entities in a single transaction, up\
    \ to 100 separate storage operations. You can also query data within a single\
    \ partition more efficiently than data that spans partitions. Partition supports\
    \ atomic batch transactions and thus the access to entities stored in a single\
    \ partition cannot be load balanced. Thus as a developer you should use the following\
    \ techniques:\n    *   Data that your client application frequently updates or\
    \ queries should be in the same partition. This may be because your application\
    \ is aggregating writes, or because you want to take advantage of atomic batch\
    \ operations.\n    *   Data that your client application does not frequently update/query\
    \ in the same atomic transaction should be in separate partitions.\n    *   Avoid\
    \ hot partitions, which are partitions that receive more data as compared to the\
    \ other partitions. If the partitioning scheme results in a single partition that\
    \ has data that’s used far more often than in the other partitions, expect to\
    \ see throttling. It is likely that the partition will approach the scalability\
    \ target. It is better to make sure that your partition scheme results in no single\
    \ partition approaching the scalability target.\n\nOnce you store data in the\
    \ Microsoft Azure Storage Services, it is important that you understand the best\
    \ practices that can help you retrieve your data. The next section covers these\
    \ important practices.\n\n## Querying Data Best Practices\n\nOnce you store data\
    \ in Microsoft Azure Storage Services, it is important that you understand the\
    \ best practices that can help you retrieve the data.\n\nAs a best practice for\
    \ querying data , a general rule of thumb is to avoid scans. Now if you have to\
    \ do scans, you should organize the data so that the unnecessary data scans can\
    \ be avoided.\n\n*   **Point queries**. Try to use these types of queries as much\
    \ as possible as they return only one entity by specifying the partition key and\
    \ the row key.\n*   **Partition query**. These queries are less performant than\
    \ point queries and should be used carefully. They retrieve sets of data that\
    \ share common partition keys and typically you specify a range of row key values\
    \ or a range of values for some entity property in addition to a partition key.\n\
    *   **Table queries**. This is a query that retrieves a set of entities that do\
    \ not share a common partition key and are not efficient and should be avoided\
    \ as much as possible.\n*   **Query density**. One of the important factors in\
    \ efficiency of a query performance is the number of entities returned and the\
    \ number of entities scanned. A low query density can cause the table service\
    \ to throttle your application and so should be avoided. The following are some\
    \ ways that you can avoid them:\n    *   Filter the data so that the query returns\
    \ only data that your application will consume. The performance of your application\
    \ will increase due to less network payload and fewer entities that your application\
    \ must process.\n    *   Use projection to limit the size of returned data set\
    \ that your client application needs.\n    *   Remove redundant data (denormalize).\
    \ This has always been helpful as it minimizes the number of entities that a query\
    \ must scan to find the data the client needs, rather than having to scan large\
    \ numbers of entities to find the data your application needs.\n\n## Summary\n\
    \nMicrosoft Azure Storage services has all that an application developer needs\
    \ to provide a robust, scalable cloud-based solution. With its many useful features,\
    \ it provides the best platform to host your application and store the data securely.\
    \ You need not think about the DR strategy, as it’s all taken care of. Now with\
    \ the Premium Storage offering, the throughput increases and you get a tremendous\
    \ boost on application performance."
