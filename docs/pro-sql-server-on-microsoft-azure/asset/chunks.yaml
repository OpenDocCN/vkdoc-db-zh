  trans: "\n### 维护读取请求的可用性/一致性\n\n由于所有按位维护的副本都是相同的，这意味着可以从任何副本进行读取。\n为了读取可用性，会并行发出读取请求，取最先返回的请求，并将数据提供给客户。现在，在处理读取请求期间，如果检测到高延迟，会并行发出另一个读取请求进行处理。最先返回的请求将被发送给客户端。\n\
    \n### 分区层的负载均衡\n\n通过负载均衡，尝试平衡`TPS`，即对索引进行负载均衡。在图 3-6 中，主服务器持续监控分区服务器以及每个分区的负载。如果它发现某个分区过热，这意味着该分区收到的待处理请求过多，主服务器可以迅速决定将此范围分区拆分为更小的范围分区（处理此类问题的方法之一）。\n\
    一旦分区移动到负载相对较低的不同分区服务器，它会更新分区映射。然后，前端可以将与该特定范围相关的请求转发到这个新服务器，从而最终平衡每秒事务数。需要注意的一个重要点是，在整个过程中没有数据移动（在`DFS`层）；它只是获取分区范围索引并进行更新，以便分区映射知道应将请求转发到哪个分区服务器。\n\
    \n### DFS 层的负载均衡\n\n对于`DFS`层的负载均衡，监控存储节点的负载，用于确定将从哪个副本读取数据。同时，有一个进程在后台根据 95%延迟执行并行读取。\n\
    对于写入，监控节点以及正在追加数据的副本的负载。当某个节点显得过载时，它会封存该副本并开始追加到一个新的扩展区。这被放置在日志的末尾。\n\n### DFS\
    \ 容量的负载均衡\n\n副本会被移动，以确保所有节点的磁盘都有一些可用空间。`DFS`层是一个仅追加的系统，这意味着它永远不会就地写入任何内容。重要的是要有一些总是可以追加的可用空间。这样可以避免存储节点出现热点。此外，如果有一个坏节点/磁盘或一个机架丢失，他们必须确保有一种更快的方法在所有节点/磁盘之间复制扩展区。利用可用的磁盘空间，可以快速完成此操作。\n\
    \n## Azure 存储提供的持久性\n\nAzure 存储提供三种类型的持久性。\n*   `LRS`（本地冗余存储）。在单个区域内的单个区域中存储数据的三个副本。所有三个副本都将位于同一区域中，从而在节点/机架/磁盘故障时提供持久性。\n\
    *   `ZRS`（区域冗余存储）。适用于块 Blob，并在多个区域中存储三个数据副本，设计上将所有三个副本保留在同一区域内，但不是强制性的，因为有时您可能将其存储在不同区域。除此之外，它提供了比`LRS`更高的持久性，因为现在数据可以抵御与区域相关的故障（例如设施在某个区域内发生火灾）。\n\
    *   `GRS`（全球冗余存储）。您存储六个副本，三个在主区域，三个在辅助区域，地理上分散。这提供了额外的持久性，以保护数据抵御重大的区域性灾难，例如风暴、龙卷风、地震或飓风。\n\
    \n### Azure 高级存储\n\n`Azure 高级存储`由 Microsoft 推出。它有助于为运行 I/O 密集型工作负载的虚拟机提供高性能、低延迟的磁盘支持。它使用`SSD`（固态硬盘）来存储数据。如果您的工作负载需要高吞吐量，并且您希望利用这些磁盘的速度和性能，那么`Premium\
    \ Storage`应该是您的选择。\n对于需要持续高`IO`性能和低延迟的`Azure 虚拟机`工作负载，`高级存储`是合适的。为了在`SQL Server`、`MongoDB`、`Cassandra`等平台上承载`OLTP`、`大数据`和`数据仓库`等`IO`密集型工作负载，`高级存储`是一个很好的选择。\n\
    使用`高级存储`，您的应用程序可以为每个`VM`存储多达`64TB`的数据，并且可以为您提供每个`VM` `80Kbps IOPs`（每秒输入输出操作）的吞吐量和每个`VM`\
    \ `2000Mbps`的磁盘吞吐量。\n为了使用`高级存储`，您需要记住以下几点：\n*   您需要一个`高级存储`帐户。可以使用存储`REST API`版本`2014-02-14`或更高版本（存储和服务管理）、`PowerShell\
    \ 8.10`或更高版本或`Ibiza 门户`（ [`https://portal.azure.com`](https://portal.azure.com)\
    \ ）创建`高级存储`帐户。当您使用`PowerShell`创建`高级存储`帐户时，需要指定`type`参数为`Premium_LRS`。例如：\n   \
    \ ```\n    New-AzureStorageAccount -StorageAccountName \"Testpremiumaccount\"\
    \ -Location \"East US\" -Type \"Premium_LRS\"\n    ```\n*   并非所有区域都支持`高级存储`。目前，美国中部、美国东部和西部、北欧和西欧、日本东部和西部、东南亚和澳大利亚东部支持它。\n\
    *   它仅支持`Azure 页 Blob`，因为它用于保存可用作`Azure 虚拟机`的永久性磁盘。\n*   它是本地冗余的，并在同一区域内保留数据的三个副本。\n\
    *   为了使用`高级存储`，您需要配置`GS 系列`或`DS 系列`的`虚拟机`。\n*   对于所有`高级`数据磁盘，默认的磁盘缓存策略是`只读`，而附加到`虚拟机`的`高级`操作系统磁盘设置为`读写`。\n\
    *   对于`高级存储`帐户，`IOPs`取决于磁盘的大小。目前有三种类型的高级磁盘——`P10`、`P20`和`P30`。关于`IOPs`和吞吐量规格，请参见表\
    \ 3-1。\n\n    表 3-1. 高级磁盘存储限制\n\n    | 磁盘类型 | P10 | P20 | P30 |\n    | --- | ---\
    \ | --- | --- |\n    | 磁盘大小 | 128GB | 512GB | 1TB |\n    | IOPS（每磁盘） | 500 | 2300\
    \ | 5000 |\n    | 吞吐量（每磁盘） | 100Mbps | 150Mbps | 200Mbps |\n\n使用`PowerShell`，您可以使用`高级存储`创建`虚拟机`。可以使用以下代码片段/Cmdlet\
    \ 来尝试此操作。请注意，它们只是 Cmdlet，应如此使用。您也可以参考`MSDN`链接；参见 [`https://msdn.microsoft.com/en-us/library/mt607148.aspx`](https://msdn.microsoft.com/en-us/library/mt607148.aspx)\
    \ 。\n"
- fmt: '## Creating an Azure VM Machine Using Premium Storage and PowerShell


    Create the following Premium Storage account:


    ```powershell

    C:\> New-AzureRmStorageAccount -ResourceGroupName "TestResourceGroup" -AccountName
    "TestStorageAccount" -Location "US East" -Type "Premium_LRS"

    ```


    The following code only uses ARM cmdlet; it can be used to create a VM:


    ```powershell

    # Set values for existing resource group and storage account names

    $rgName="RGServers"

    $locName="East US"

    $saName="Testserverssa"

    # Set the existing virtual network and subnet index

    $vnetName="XYZ"

    $subnetIndex=0

    $vnet=Get-AzureRmVirtualNetwork -Name $vnetName -ResourceGroupName $rgName

    # Create the NIC

    $nicName="Test-NIC"

    $domName="TestDom"

    $pip=New-AzureRmPublicIpAddress -Name $nicName -ResourceGroupName $rgName -DomainNameLabel
    $domName -Location $locName -AllocationMethod Dynamic

    $nic=New-AzureRmNetworkInterface -Name $nicName -ResourceGroupName $rgName -Location
    $locName -SubnetId $vnet.Subnets[$subnetIndex].Id -PublicIpAddressId $pip.Id

    # Specify the name, size, and existing availability set

    $vmName="TestVM"

    $vmSize="Standard_A3"

    $avName="Test_AS"

    $avSet=Get-AzureRmAvailabilitySet –Name $avName –ResourceGroupName $rgName

    $vm=New-AzureRmVMConfig -VMName $vmName -VMSize $vmSize -AvailabilitySetId $avset.Id

    # Add 200GB data disk

    $diskSize=200

    $diskLabel="TestStorage"

    $diskName="Test-DISK01"

    $storageAcc=Get-AzureRmStorageAccount -ResourceGroupName $rgName -Name $saName

    $vhdURI=$storageAcc.PrimaryEndpoints.Blob.ToString() + "vhds/" + $vmName + $diskName  +
    ".vhd"

    Add-AzureRmVMDataDisk -VM $vm -Name $diskLabel -DiskSizeInGB $diskSize -VhdUri
    $vhdURI -CreateOption empty

    # Specify the image and local administrator account, and then add the NIC

    $pubName="MicrosoftWindowsServer"

    $offerName="WindowsServer"

    $skuName="2012-R2-Datacenter"

    $cred=Get-Credential -Message "Type the name and password of the local administrator
    account."

    $vm=Set-AzureRmVMOperatingSystem -VM $vm -Windows -ComputerName $vmName -Credential
    $cred -ProvisionVMAgent -EnableAutoUpdate

    $vm=Set-AzureRmVMSourceImage -VM $vm -PublisherName $pubName -Offer $offerName
    -Skus $skuName -Version "latest"

    $vm=Add-AzureRmVMNetworkInterface -VM $vm -Id $nic.Id

    # Specify the OS disk name and create the VM

    $diskName="OSDisk"

    $storageAcc=Get-AzureRmStorageAccount -ResourceGroupName $rgName -Name $saName

    $osDiskUri=$storageAcc.PrimaryEndpoints.Blob.ToString() + "vhds/" + $vmName +
    $diskName  + ".vhd"

    $vm=Set-AzureRmVMOSDisk -VM $vm -Name $diskName -VhdUri $osDiskUri -CreateOption
    fromImage

    New-AzureRmVM -ResourceGroupName $rgName -Location $locName -VM $vm

    ```


    Ref: https://azure.microsoft.com/en-in/documentation/articles/virtual-machines-windows-create-powershell/


    ### Inside Premium Storage


    Premium Storage disks are implemented as page blobs in Azure storage. Every uncached
    write operation replicates to the SSDs as three servers in different racks (fault
    domains). The data in Premium Storage is stored on SSD drives, thereby providing
    higher throughput. The disk used are different than the ones you would get using
    Standard Storage. There is a component called blob cache that runs on the servers,
    hosting these VMs and taking advantage of the RAM/SSDs of the servers to implement
    higher throughput and low latency. It is enabled for both premium and standard
    disks and is configured with read-only and read-write caching. For read-only caching,
    it synchronously writes data to the cache and to Azure Storage. For write-caching
    enabled disks, it would write data back to Azure Storage when a VM requests it.
    This is done through disk flush or by specifying the write through flags on an
    I/O (forced unit access).


    The VMs can take advantage of this caching architecture and can provide extremely
    high throughput and low latency, thereby boosting performance tremendously.


    ## Azure Storage Best Practices


    It is important for all developers to build their applications using best practices.
    Experience from customer engagement has led us to some key lessons while dealing
    with Azure storage and getting the maximum performance out of it.


    ### Performance Enhancement Using Blobs


    Performance is important when you deal with any form of application, let alone
    blobs. This section looks at a few of the important points to keep in mind when
    you’re working with blobs. When you store files in blobs and you read and write
    to and from blobs, there are few key aspects to keep in mind.


    A single blob can be read and written at up to a maximum of 60Mbps and a single
    blob supports up to 500 requests per second. If you have multiple clients that
    need to read the same blob and you might exceed these limits, you should consider
    using a CDN for distributing the blob.


    Try to match your read size with your write size and avoid reading small ranges
    from blobs with large blocks. The following properties are used to control read
    and write size: `CloudBlockBlob.StreamMinimumReadSizeInBytes` and `StreamWriteSizeInBytes`.


    You can upload folder contents by uploading multiple files in parallel or by uploading
    concurrently. Uploading concurrently means multiple workers upload different blobs.
    Uploading in parallel means multiple workers upload different blocks of the same
    blob.


    Uploading multiple blobs concurrently will execute faster than uploading multiple
    blob blocks to the same blob. This is because uploading multiple blob blocks to
    a single blob in parallel affects a single partition and will be limited by the
    partition performance targets. Uploading multiple blobs in parallel will work
    on many different partitions and will probably be limited by the Virtual Machines’
    bandwidth.


    #### Copy/Move Blobs


    You can use storage REST APIs to copy blobs across storage accounts. A client
    application can instruct the storage service to copy a blob from any other storage
    account. The copy can happen asynchronously, which reduces the bandwidth. However,
    you need to be careful with asynchronous processes, as there is no completion
    time guarantee. It is better to download the blob to the VM and then copy it to
    the destination. During copying, you need to ensure that the VM is in the same
    region.


    #### AzCopy


    This utility released by the storage team can be used to transfer the blobs to
    and from the storage accounts. The transfer rate that you get is very high and
    it is recommended you use this for bulk uploads, downloads, and other copy scenarios.
    (See [`https://azure.microsoft.com/en-us/documentation/articles/storage-use-azcopy/`](https://azure.microsoft.com/en-us/documentation/articles/storage-use-azcopy/)
    for more information.)


    #### Choosing the Right Kind of Blob


    Azure Storage supports two types of blobs— page blobs and block blobs . You need
    to choose the right kind of blob based on the use-case scenario as this can largely
    impact the performance and scalability. Block blobs are appropriate when you want
    to upload large amounts of data such as to upload photos or video to blob storage.
    Page blobs are appropriate if the application needs to perform random writes on
    the data.


    Use the following URL as a checklist when you’re working with Microsoft Azure
    Storage. Application developers can follow the article, which is comprehensive
    with important practices documented. It will help in boosting performance of the
    application. See [`https://azure.microsoft.com/en-us/documentation/articles/storage-performance-checklist/`](https://azure.microsoft.com/en-us/documentation/articles/storage-performance-checklist/).'
