- fmt: '## The Storage


    In the previous section, you understood how Azure compute ties what we know as
    physical memory and processing power as a cohesive unit. This section explains
    what it means to store data in Azure. In the 1950s, the first hard drive stored
    five million six-bit characters, which today would not be sufficient to store
    that data housed in 4GB USB drive. The 3.75MB disk drive was approximately the
    size of two refrigerators and had a stack of 50 disks! Over the years, the world
    of digital data storage has seen improvements in leaps and bounds, and it allows
    you to store over 64GB of information in your mobile device. Today’s cell phones
    have in-built storage that can house over information which would have taken 17,000
    disk drives from the 1950s era!


    Due to the use of standardized commodity hardware for scaling out storage in cloud
    environments, the cost of storage is not a deal breaker anymore! There definitely
    is a time in every IT professional’s career when asking for additional storage
    space for their personal computing device or the servers that they managed was
    a well thought out business proposal. Today, the cloud provides abundance of storage
    at the click of a button in various forms, throughput, and cost factors.


    Azure storage provides the storage foundation for all Azure Virtual Machines.
    It encompasses all the tenets of cloud, which means Azure storage is scalable,
    durable, and highly available. Once again, the advantage of cloud is that you
    pay for what you use and when you use it. It’s a like a pay-as-you-go cell phone
    subscription.


    Azure Storage uses an auto-partitioning system that automatically load-balances
    your data based on traffic. As the demands for storage of your application grow,
    Azure Storage automatically allocates the appropriate storage resources to meet
    them.


    Like any Azure component, Azure Storage is accessible from anywhere in the world.
    One unique aspect of Azure Storage is that any type of application, whether it’s
    running in the cloud or desktop or on-premises or mobile or tablet device, can
    access Azure Storage services. Advanced concepts and design decisions for Azure
    storage will be explained in detail in Chapter [3](#A371128_1_En_3_Chapter.html)
    of this book.


    Now it is time to understand briefly how the storage in Microsoft’s Azure platform
    is organized. As shown in Figure [2-2](#A371128_1_En_2_Chapter.html#Fig2), storage
    is organized in different formats—blobs, tables, queues, and files. Storage is
    organized in the form of containers, tables, queues, and shares. Think of each
    of these as the storage containers in your kitchen. You typically had different
    container with different attributes storing our cereals, flour, rice, etc. Similarly,
    the storage in Azure is segregated into containers of a particular type.


    ![A371128_1_En_2_Fig2_HTML.jpg](A371128_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. Azure storage concepts


    Blob storage is essentially a binary representation of any storage object that
    you place in an Azure blob container. Each blob store can host documents, media
    files, executables, and basically any object that you want to store in the cloud.
    These are typically used to host raw data and media-related files like music,
    pictures, videos, etc.


    Table storage can be used to house structured datasets, which is a NoSQL key-attribute
    data store used for fast programmatic access to large quantities of data.


    Queue storage provides reliable messaging for workflow processing and for communication
    between components of cloud services. The messages could flow between any application
    endpoints. This could either applications hosted on the cloud or in our data center.


    File storage offers SMB-based file shares but the difference is that these are
    hosted on the cloud. These shared have a cloud-based path that any application
    can access as long as it is connected to the Internet.


    Since the cloud hosts applications of various types, the throughput and performance
    requirements vary for each and every business. This is something that Azure storage
    provides in the form of Standard and Premium storage.


    The main design goal of Azure Premium storage was to provide high performance,
    low latency disks for virtual machines that run I/O intensive workloads. Certain
    SQL Server workloads definitely benefit from the use of Azure Premium storage
    for its data disks. You will find multiple references in this book where SQL Server
    instances and premium storage accounts play along nicely for meeting and beating
    your performance and throughput SLAs.


    If you wanted to put things in perspective, you get access to 64TB of storage
    per virtual machine, which can achieve 80,000 IOPS and 2000MB per second disk
    throughput per virtual machine. The introduction of premium storage allows you
    to lift-and-shift your enterprise applications that require consistent high performance
    and low latency for their IO requirements.'
  raw: '## The Storage


    In the previous section, you understood how Azure compute ties what we know as
    physical memory and processing power as a cohesive unit. This section explains
    what it means to store data in Azure. In the 1950s, the first hard drive stored
    five million six-bit characters, which today would not be sufficient to store
    that data housed in 4GB USB drive. The 3.75MB disk drive was approximately the
    size of two refrigerators and had a stack of 50 disks! Over the years, the world
    of digital data storage has seen improvements in leaps and bounds, and it allows
    you to store over 64GB of information in your mobile device. Today’s cell phones
    have in-built storage that can house over information which would have taken 17,000
    disk drives from the 1950s era!


    Due to the use of standardized commodity hardware for scaling out storage in cloud
    environments, the cost of storage is not a deal breaker anymore! There definitely
    is a time in every IT professional’s career when asking for additional storage
    space for their personal computing device or the servers that they managed was
    a well thought out business proposal. Today, the cloud provides abundance of storage
    at the click of a button in various forms, throughput, and cost factors.


    Azure storage provides the storage foundation for all Azure Virtual Machines.
    It encompasses all the tenets of cloud, which means Azure storage is scalable,
    durable, and highly available. Once again, the advantage of cloud is that you
    pay for what you use and when you use it. It’s a like a pay-as-you-go cell phone
    subscription.


    Azure Storage uses an auto-partitioning system that automatically load-balances
    your data based on traffic. As the demands for storage of your application grow,
    Azure Storage automatically allocates the appropriate storage resources to meet
    them.


    Like any Azure component, Azure Storage is accessible from anywhere in the world.
    One unique aspect of Azure Storage is that any type of application, whether it’s
    running in the cloud or desktop or on-premises or mobile or tablet device, can
    access Azure Storage services. Advanced concepts and design decisions for Azure
    storage will be explained in detail in Chapter [3](#A371128_1_En_3_Chapter.html)
    of this book.


    Now it is time to understand briefly how the storage in Microsoft’s Azure platform
    is organized. As shown in Figure [2-2](#A371128_1_En_2_Chapter.html#Fig2), storage
    is organized in different formats—blobs, tables, queues, and files. Storage is
    organized in the form of containers, tables, queues, and shares. Think of each
    of these as the storage containers in your kitchen. You typically had different
    container with different attributes storing our cereals, flour, rice, etc. Similarly,
    the storage in Azure is segregated into containers of a particular type.


    ![A371128_1_En_2_Fig2_HTML.jpg](A371128_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    Azure storage concepts


    Blob storage is essentially a binary representation of any storage object that
    you place in an Azure blob container. Each blob store can host documents, media
    files, executables, and basically any object that you want to store in the cloud.
    These are typically used to host raw data and media-related files like music,
    pictures, videos, etc.


    Table storage can be used to house structured datasets, which is a NoSQL key-attribute
    data store used for fast programmatic access to large quantities of data.


    Queue storage provides reliable messaging for workflow processing and for communication
    between components of cloud services. The messages could flow between any application
    endpoints. This could either applications hosted on the cloud or in our data center.


    File storage offers SMB-based file shares but the difference is that these are
    hosted on the cloud. These shared have a cloud-based path that any application
    can access as long as it is connected to the Internet.


    Since the cloud hosts applications of various types, the throughput and performance
    requirements vary for each and every business. This is something that Azure storage
    provides in the form of Standard and Premium storage.


    The main design goal of Azure Premium storage was to provide high performance,
    low latency disks for virtual machines that run I/O intensive workloads. Certain
    SQL Server workloads definitely benefit from the use of Azure Premium storage
    for its data disks. You will find multiple references in this book where SQL Server
    instances and premium storage accounts play along nicely for meeting and beating
    your performance and throughput SLAs.


    If you wanted to put things in perspective, you get access to 64TB of storage
    per virtual machine, which can achieve 80,000 IOPS and 2000MB per second disk
    throughput per virtual machine. The introduction of premium storage allows you
    to lift-and-shift your enterprise applications that require consistent high performance
    and low latency for their IO requirements.'
  trans: '

    ## 存储


    在上一节中，你了解了 Azure 计算如何将我们熟知的物理内存和处理能力整合为一个内聚单元。本节将解释在 Azure 中存储数据意味着什么。在 20 世纪
    50 年代，第一块硬盘驱动器能存储 500 万个六位字符，而今天，这甚至不足以存储一个 4GB U 盘所容纳的数据。那时 3.75MB 的磁盘驱动器大小约相当于两个冰箱，并且包含
    50 张盘片！多年来，数字数据存储领域取得了飞跃式的进步，如今你的移动设备就能存储超过 64GB 的信息。当今手机的内置存储容量，已能容纳相当于 1950
    年代 17,000 台磁盘驱动器所能存储的信息量！


    由于在云环境中使用标准化的商品硬件来横向扩展存储，存储成本已不再是主要障碍！在每个 IT 专业人士的职业生涯中，总会有那么一刻，为个人计算设备或所管理的服务器申请额外的存储空间，曾是一个经过深思熟虑的商业提案。如今，云服务只需点击一下按钮，就能以各种形式、不同的吞吐量和成本因素，提供海量的存储空间。


    Azure 存储为所有 Azure 虚拟机提供存储基础。它涵盖了云计算的所有原则，这意味着 Azure 存储具有可扩展性、持久性和高可用性。再次强调，云的优势在于你只需为所使用和何时使用的资源付费。这就像手机的按使用付费套餐一样。


    Azure 存储采用自动分区系统，可根据流量自动对数据进行负载均衡。随着应用程序存储需求的增长，Azure 存储会自动分配适当的存储资源来满足需求。


    与任何 Azure 组件一样，Azure 存储可以从世界任何地方访问。Azure 存储的一个独特之处在于，任何类型的应用程序，无论是运行在云端、桌面、本地、移动设备还是平板电脑上，都能访问
    Azure 存储服务。Azure 存储的高级概念和设计决策将在本书第 3 章中详细阐述。


    现在，让我们简要了解一下 Microsoft Azure 平台中的存储是如何组织的。如图 2-2 所示，存储以不同的格式组织——Blob、表、队列和文件。存储以容器、表、队列和共享的形式组织。可以把它们想象成你厨房里的储物容器。你通常会使用不同属性的不同容器来存放谷物、面粉、大米等。类似地，Azure
    中的存储也被划分为特定类型的容器。


    ![A371128_1_En_2_Fig2_HTML.jpg](img/A371128_1_En_2_Fig2_HTML.jpg)


    图 2-2. Azure 存储概念


    **Blob 存储**本质上是你放置在 Azure Blob 容器中的任何存储对象的二进制表示。每个 Blob 存储可以容纳文档、媒体文件、可执行文件，以及基本上任何你想存储在云端的对象。它们通常用于存放原始数据和媒体相关文件，如音乐、图片、视频等。


    **表存储**可用于存放结构化数据集，这是一种 NoSQL 键-属性数据存储，用于快速以编程方式访问海量数据。


    **队列存储**为工作流处理和云服务组件之间的通信提供可靠的消息传递。消息可以在任何应用程序端点之间流动，这些端点既可以是云端托管的应用程序，也可以是我们数据中心的应用程序。


    **文件存储**提供基于 SMB 的文件共享，不同之处在于这些共享托管在云端。这些共享具有基于云的路径，任何连接到互联网的应用程序都可以访问。


    由于云承载着各种类型的应用程序，每个业务的吞吐量和性能要求各不相同。Azure 存储通过标准存储和高级存储的形式来满足这些需求。


    Azure 高级存储的主要设计目标是为运行 I/O 密集型工作负载的虚拟机提供高性能、低延迟的磁盘。某些 SQL Server 工作负载无疑能从为其数据磁盘使用
    Azure 高级存储中受益。在本书中，你会发现多处提到 SQL Server 实例与高级存储账户如何良好协作，以满足并超越你的性能和吞吐量 SLA。


    如果想从具体数字来看，每个虚拟机可访问 64TB 的存储空间，每个虚拟机可实现 80,000 IOPS 和每秒 2000MB 的磁盘吞吐量。高级存储的引入使得你能够将需要一致高性能和低
    I/O 延迟的企业应用程序直接迁移上云。

    '
- fmt: '## 网络


    在深入了解计算层与存储层如何相互通信之前，理解 Azure 平台硬件轮子中的最后一个关键部件至关重要。服务间通信与外部通信由网络层处理。简单来说，它相当于在企业环境中部署的网络的云版本。图[2-3](#A371128_1_En_2_Chapter.html#Fig3)
    展示了企业中典型的网络配置。


    ![A371128_1_En_2_Fig3_HTML.jpg](A371128_1_En_2_Fig3_HTML.jpg)

    图 2-3. 本地环境网络配置


    Azure 虚拟网络代表了 Azure 数据中心内的所有网络功能。它根据你的 Azure 订阅，对 IP 地址块、DNS 设置、安全策略和路由表进行划分。Azure
    网络还允许你延伸本地网络，使你的 Azure 订阅对象成为实际网络的扩展部分。


    如果你想进行类比，请注意图[2-4](#A371128_1_En_2_Chapter.html#Fig4)，Azure 基础设施承担了路由器的角色。它允许从你的虚拟网络访问公共互联网，而无需任何配置。可以将网络安全组（`NSGs`）视为应用于每个单独子网的防火墙。物理负载均衡器在
    Azure 中被面向互联网和内部的负载均衡器所取代。


    ![A371128_1_En_2_Fig4_HTML.jpg](A371128_1_En_2_Fig4_HTML.jpg)

    图 2-4. Azure 虚拟网络图示


    此时一个非常切题的问题是：为什么需要虚拟网络？原因有很多。除了为连接各种 Azure 服务和虚拟机提供连接层之外，还需要隔离功能，允许你为开发、测试和生产等不同功能创建不相交的网络，即使它们使用相同的
    `CIDR` 地址块。Azure 还为部署在你的虚拟网络（`VNet`）中的虚拟机和 `PaaS` 角色实例提供内部名称解析。你也可以部署自己的 `DNS`
    服务器并配置 `VNet` 使用它们。


    现代网络管理员面临的一个有趣挑战是，在不危及安全的前提下，为外部世界（即互联网）提供网络连接。Azure 网络能够在不牺牲安全性的情况下实现公共互联网连接，这得益于网络安全组（`NSGs`）。


    让我们快速了解一下什么是网络安全组及其在 Azure 网络架构中的作用。如果需要打个比方，网络安全组（`NSG`）本质上是网络流量的看守者，它监控在你的 Azure
    订阅对象与连接到这些对象的内部及外部客户端之间产生的流量。你可以创建 `NSG` 来控制进出网络组件（如网卡（`NICs`）、虚拟机和子网）的流量。你可以使用
    `NSG` 根据源 `IP` 地址和端口或目标 `IP` 地址或端口来决定是批准还是拒绝网络流量。`NSG` 的行为类似于企业环境中的防火墙。


    Azure 网络将在第[4]章中详细讨论。


    ## 协同工作原理


    现在你已经了解了 Azure 中可用构建块的基础知识，重要的是理解它们如何协同工作。如果你想了解 Azure 中的一种基础设施即服务（`IaaS`）选项，图[2-5](#A371128_1_En_2_Chapter.html#Fig5)
    将向你展示 Azure 中的虚拟机是如何布局的。


    ![A371128_1_En_2_Fig5_HTML.jpg](A371128_1_En_2_Fig5_HTML.jpg)

    图 2-5. Azure 虚拟机


    图[2-5](#A371128_1_En_2_Chapter.html#Fig5) 显示，Azure 网络是外部客户端与 Azure 虚拟机之间的通信网关。最值得注意的事实之一是，存储层是一个完全独立的物理实体。这与数据中心服务器的构建方式有着根本的不同。如果要打个比方，存储层可以被看作是存储区域网络（`SAN`）和网络附加存储（`NAS`）的结合体。磁盘阵列由存储层以可扩展和弹性的方式进行管理，存储层通过一个非常快速的网络与计算层通信。


    你可以选择部署一个 Azure 库镜像（`Azure gallery image`），这是由微软和其他第三方提供的预制镜像，用于承载操作系统和你选择的预装软件。这样，你甚至不需要编写一个安装程序！


    基础设施即服务（`IaaS`）只是利用计算、存储和网络的服务模型之一。在本地环境中，一种常见的部署模型是 Web 应用程序，它通常采用三层架构。第一层是客户端应用程序，通常是连接到中间层（即应用服务器）的
    Web 浏览器。应用服务器连接到后端服务器，后者通常是数据存储。在 Azure 中，可以使用 Web 角色作为前端、辅助角色作为中间层、数据存储（如 SQL
    服务器、Blob、NoSQL 等）作为第三层，来实现类似的架构。图[2-6](#A371128_1_En_2_Chapter.html#Fig6) 展示了托管在
    Azure 上的典型三层应用程序架构。


    ![A371128_1_En_2_Fig6_HTML.jpg](A371128_1_En_2_Fig6_HTML.jpg)

    图 2-6. 托管在 Azure 上的应用服务


    在图[2-6](#A371128_1_En_2_Chapter.html#Fig6) 中，客户端通过 Azure 虚拟网络连接到一个 Web 角色实例，该实例是运行
    Web 应用程序的计算资源。根据应用程序的需要，可以配置实例数量进行纵向扩展或缩减，这使得服务天然具有弹性，开发者无需做任何特定工作。存储的作用取决于应用程序是否使用
    Azure 存储实体（如 Blob 或队列）来存储数据。间接使用存储的情况是，如果使用了关系型或非关系型的平台即服务（`PaaS`）产品，而这些产品内部使用了存储服务。图[2-6](#A371128_1_En_2_Chapter.html#Fig6)
    显示了 Azure SQL 数据库作为一种存储选项。本书后面将对此进行详细讨论。


    Azure 中的另一种部署范式是托管应用程序实例。这不仅限于 Web 应用程序，还可以用于任何类型的应用程序，如移动应用、服务、`APIs` 等。Azure
    市场提供了大量由微软和第三方提供的预构建服务部署。这允许你启动一个应用程序实例，对于某些部署，它形成了软件即服务（`SaaS`）模型，对于其他部署，则形成了平台即服务（`PaaS`）模型。图[2-7](#A371128_1_En_2_Chapter.html#Fig7)
    展示了应用程序部署的样子。


    ![A371128_1_En_2_Fig7_HTML.jpg](A371128_1_En_2_Fig7_HTML.jpg)

    图 2-7. Azure 应用实例


    正如前面的图示所示，Azure 抽象了部署机制，解耦了硬件，并在部署期间将各种组件绑定在一起。'
  raw: '## The Network


    Before we dive into how the compute and the storage layer communicate with each
    other, it is important to understand the last and final cog in the hardware wheel
    of the Azure platform. The interservice communication and the external communication
    is handled by a network layer that, simply put, is a cloud version of a network
    that you lay out in an enterprise environment. Figure [2-3](#A371128_1_En_2_Chapter.html#Fig3)
    illustrates a typical network configuration in an enterprise.


    ![A371128_1_En_2_Fig3_HTML.jpg](A371128_1_En_2_Fig3_HTML.jpg)


    Figure 2-3.


    Network configuration of an on-premises environment


    Azure Virtual Network is a representation of the all things networking in the
    Azure data centers. It compartmentalizes your IP address blocks, DNS settings,
    security policies, and route tables associated with your Azure subscription. Azure
    networking also allows you to stretch your on-premises network and make your Azure
    subscription objects are an extended part of the actual network.


    If you want to draw parallels, you will notice in Figure [2-4](#A371128_1_En_2_Chapter.html#Fig4)
    that the Azure infrastructure takes on the role of the router. It allows access
    from your virtual network to the public Internet without the need of any configuration.
    Think of the network security groups (NSGs) as firewalls that are applied to each
    individual subnet. The physical load balancers are substituted by Internet facing
    and internal load balancers in Azure.


    ![A371128_1_En_2_Fig4_HTML.jpg](A371128_1_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    Azure Virtual Network illustration


    A very pertinent question at this point would be to question the need for a virtual
    network. The reasons are many. Apart from providing the connectivity layer for
    connecting between various Azure services and virtual machines, there is a need
    for isolation which allows you to create disjoint networks for various functions
    like development, testing, and production that use the same CIDR address blocks.
    Azure also provides internal name resolution for your virtual machines and PaaS
    role instances deployed in your virtual network (VNet) . You can also deploy your
    own DNS servers and configure the VNet to use them.


    One of the interesting challenges of the modern day network administrator is to
    provide network connectivity to the outer world, a.k.a. the Internet, without
    compromising security. Azure networking makes public Internet connectivity possible
    without compromising on security with the help of network security groups (NSGs).


    Let’s quickly understand what network security groups are and their role in the
    Azure networking architecture. If you had to draw an analogy, then the network
    security group (NSG) is basically a watchdog for the network traffic that originates
    between your Azure subscription objects and the internal as well as external client(s)
    that connect to these objects. You can create NSGs to control the inbound and
    outbound traffic to the networking components like network interfaces (NICs) ,
    virtual machines, and subnets. You can use NSGs to decide whether or not network
    traffic is approved or denied based on source IP address and port or destination
    IP address or port. The NSG behavior is similar to firewalls in an enterprise
    environment.


    Azure networking is covered in detail in Chapter [4](#A371128_1_En_4_Chapter.html).


    ## How It Works Together


    Now that you understand the basics of the building blocks available in Azure,
    it is important to understand how it all works together. If you had to look at
    an Infrastructure as a Service option in Azure, Figure [2-5](#A371128_1_En_2_Chapter.html#Fig5)
    would show you how a virtual machine in Azure is laid out.


    ![A371128_1_En_2_Fig5_HTML.jpg](A371128_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    An Azure Virtual Machine


    Figure [2-5](#A371128_1_En_2_Chapter.html#Fig5) shows that Azure networking is
    the communication gateway between the external clients and the Azure Virtual Machines.
    One of the most interesting facts to note is that the storage layer is a completely
    separate physical entity. This is fundamentally different from how servers are
    structured in the data center. If someone wanted to draw a parallel, the storage
    layer could be envisioned as a marriage between a storage area network (SAN) and
    network attached storage (NAS) . The disk arrays are managed in a scalable and
    elastic manner by the storage layer, which communicates with the compute layer
    over a very fast network.


    You can choose to deploy an Azure gallery image, which is a pre-cooked image available
    from Microsoft and other third parties, to host the operating system and pre-installed
    software of your choice. This way, you don’t have to write a single installer!


    Infrastructure as a Service is just one of the service models that makes use of
    the compute, storage, and networking. In the on-premises world, a common deployment
    model is a web application, which consists of a three-tier architecture. The first
    tier is the client application, which is typically a web browser that connects
    to the middle tier, which is the application server. The application server connects
    to the backend server, which is typically a data store. A similar architecture
    can be achieved in Azure using web roles as the frontend, worker roles as the
    middle tier, and the data store (SQL server, blobs, NoSQL, etc.) as the third
    tier. Figure [2-6](#A371128_1_En_2_Chapter.html#Fig6) illustrates a typical three-tier
    application architecture hosted on Azure.


    ![A371128_1_En_2_Fig6_HTML.jpg](A371128_1_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    An application service hosted on Azure


    In Figure [2-6](#A371128_1_En_2_Chapter.html#Fig6), the clients connect using
    Azure Virtual Network to a web role instance, which is a compute resource running
    the web application. Depending on the application’s need, the number of instances
    can be configured to scale up or down, which makes the service elastic out-of-the-box
    without having the developer to do anything specific. The storage comes into play
    depending on whether the application uses the Azure Storage entities for storing
    data like blobs or queues. An indirect use of the storage would be if a relational
    or non-relational Platform as a Service (PaaS) offering is used that internally
    makes use of the storage offering. Figure [2-6](#A371128_1_En_2_Chapter.html#Fig6)
    shows the Azure SQL database as a storage option. This will be covered in detail
    later in this book.


    Another deployment paradigm in Azure is to host application instances. These are
    not just limited to web applications but can be used on any kind of applications
    like mobile, services, APIs, etc. The Azure marketplace offers a plethora of pre-built
    service deployments from Microsoft and third parties. This allows you to spawn
    an application instance, which makes it a Software as a Service (SaaS) model for
    some deployments and Platform as a Service (PaaS) model for other deployments.
    Figure [2-7](#A371128_1_En_2_Chapter.html#Fig7) shows how application deployments
    look.


    ![A371128_1_En_2_Fig7_HTML.jpg](A371128_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    Azure App instances


    As you can see from the previous figures, Azure abstracts the deployment mechanics,
    decouples the hardware, and ties the various components together during deployment.'
  trans: '## 网络


    在深入了解计算层与存储层如何相互通信之前，理解 Azure 平台硬件架构中的最后一个关键部件至关重要。服务间通信与外部通信均由网络层处理。简单来说，它相当于在企业环境中部署的网络的云版本。图
    2-3 展示了企业中典型的网络配置。


    ![A371128_1_En_2_Fig3_HTML.jpg](img/A371128_1_En_2_Fig3_HTML.jpg)

    图 2-3. 本地环境网络配置


    Azure 虚拟网络代表了 Azure 数据中心内的所有网络功能。它根据你的 Azure 订阅，对 IP 地址块、DNS 设置、安全策略和路由表进行逻辑划分。Azure
    网络还允许你延伸本地网络，使你的 Azure 订阅资源成为实际物理网络的扩展部分。


    如果你想进行类比，请注意图 2-4，Azure 基础设施承担了路由器的角色。它允许从你的虚拟网络访问公共互联网，而无需任何额外配置。可以将网络安全组（`NSGs`）视为应用于每个单独子网的防火墙。物理负载均衡器在
    Azure 中被面向互联网的和内部的负载均衡器所取代。


    ![A371128_1_En_2_Fig4_HTML.jpg](img/A371128_1_En_2_Fig4_HTML.jpg)

    图 2-4. Azure 虚拟网络图示


    此时一个非常切题的问题是：为什么需要虚拟网络？原因有很多。除了为连接各种 Azure 服务和虚拟机提供连接层之外，还需要隔离功能，允许你为开发、测试和生产等不同用途创建相互独立的网络，即使它们使用相同的
    `CIDR` 地址块。Azure 还为部署在你的虚拟网络（`VNet`）中的虚拟机和 `PaaS` 角色实例提供内部名称解析。你也可以部署自己的 `DNS`
    服务器并配置 `VNet` 使用它们。


    现代网络管理员面临的一个有趣挑战是，在不危及安全的前提下，为外部世界（即互联网）提供网络连接。Azure 网络能够在不牺牲安全性的情况下实现公共互联网连接，这主要得益于网络安全组（`NSGs`）。


    让我们快速了解一下什么是网络安全组及其在 Azure 网络架构中的作用。如果需要打个比方，网络安全组（`NSG`）本质上是网络流量的看守者，它监控在你的 Azure
    订阅资源与连接到这些资源的内部及外部客户端之间流动的流量。你可以创建 `NSG` 来控制进出网络组件（如网卡（`NICs`）、虚拟机和子网）的流量。你可以使用
    `NSG` 根据源 `IP` 地址和端口或目标 `IP` 地址和端口来决定是允许还是拒绝网络流量。`NSG` 的行为类似于企业环境中的防火墙。


    Azure 网络将在第[4]章中详细讨论。


    ## 协同工作原理


    现在你已经了解了 Azure 中可用构建块的基础知识，重要的是理解它们如何协同工作。如果你想了解 Azure 中的一种基础设施即服务（`IaaS`）选项，图
    2-5 将向你展示 Azure 中的虚拟机是如何布局的。


    ![A371128_1_En_2_Fig5_HTML.jpg](img/A371128_1_En_2_Fig5_HTML.jpg)

    图 2-5. Azure 虚拟机


    图 2-5 显示，Azure 网络是外部客户端与 Azure 虚拟机之间的通信网关。最值得注意的事实之一是，存储层是一个完全独立的物理实体。这与数据中心服务器的传统构建方式有着根本的不同。如果要打个比方，存储层可以被看作是存储区域网络（`SAN`）和网络附加存储（`NAS`）的结合体。磁盘阵列由存储层以可扩展和弹性的方式进行管理，存储层通过一个非常高速的网络与计算层通信。


    你可以选择部署一个 Azure 库镜像（`Azure gallery image`），这是由微软和其他第三方提供的预制镜像，用于承载操作系统和你选择的预装软件。这样，你甚至不需要编写一个安装程序！


    基础设施即服务（`IaaS`）只是利用计算、存储和网络的服务模型之一。在本地环境中，一种常见的部署模型是 Web 应用程序，它通常采用三层架构。第一层是客户端应用程序，通常是连接到中间层（即应用服务器）的
    Web 浏览器。应用服务器连接到后端服务器，后者通常是数据存储。在 Azure 中，可以使用 Web 角色作为前端、辅助角色作为中间层、数据存储（如 SQL
    服务器、Blob、NoSQL 等）作为第三层，来实现类似的架构。图 2-6 展示了托管在 Azure 上的典型三层应用程序架构。


    ![A371128_1_En_2_Fig6_HTML.jpg](img/A371128_1_En_2_Fig6_HTML.jpg)

    图 2-6. 托管在 Azure 上的应用服务


    在图 2-6 中，客户端通过 Azure 虚拟网络连接到一个 Web 角色实例，该实例是运行 Web 应用程序的计算资源。根据应用程序的需要，可以配置实例数量进行纵向扩展或缩减，这使得服务天然具有弹性，开发者无需做任何特定工作。存储的作用取决于应用程序是否使用
    Azure 存储实体（如 Blob 或队列）来存储数据。间接使用存储的情况是，如果使用了关系型或非关系型的平台即服务（`PaaS`）产品，而这些产品内部使用了存储服务。图
    2-6 显示了 Azure SQL 数据库作为一种存储选项。本书后面将对此进行详细讨论。


    Azure 中的另一种部署范式是托管应用程序实例。这不仅限于 Web 应用程序，还可以用于任何类型的应用程序，如移动应用、服务、`APIs` 等。Azure
    市场提供了大量由微软和第三方提供的预构建服务部署。这允许你启动一个应用程序实例，对于某些部署，它形成了软件即服务（`SaaS`）模型，对于其他部署，则形成了平台即服务（`PaaS`）模型。图
    2-7 展示了应用程序部署的样子。


    ![A371128_1_En_2_Fig7_HTML.jpg](img/A371128_1_En_2_Fig7_HTML.jpg)

    图 2-7. Azure 应用实例


    正如前面的图示所示，Azure 抽象了部署机制，解耦了硬件，并在部署期间将各种组件绑定在一起。'
- fmt: '## Update/Upgrade Domain


    Now that you understand how the architecture is organized for the resource providers,
    it is imperative to understand the concept of update domains. Think of the update
    domain as a group of servers that you would patch in a maintenance schedule. If
    you are not the business owner, you need to ensure that the updates have little
    to no downtime for the applications hosted on the servers that are being patched.
    This is truly one of the most difficult IT problems in the real world.


    Azure distributes instances evenly into multiple upgrade domains, with each upgrade
    domain acting as one logical unit of a deployment. When upgrading a deployment,
    the upgrade is carried out one upgrade domain at a time to minimize downtime for
    the services or applications running on these environments. Upgrade domains help
    reduce the impact of an upgrade to a running service and at the same time keep
    the environment up-to-date. This minimizes the risk of known issues affecting
    production environments due to lack of updates.


    It is important to grasp this concept, as having an update domain alone will not
    help your SQL Server deployment. Even in a failover cluster or availability group
    environment, SQL Server instances can have only one active node where the service
    is running. So if the server running your SQL Server instance is rebooted, your
    database service will go down. It is important to have an Availability Group deployment
    for any production SQL Server environment hosted on Azure Virtual Machines to
    prevent extended downtimes.


    ## Fault Domain


    As noted earlier, the upgrade/update domain alone is not sufficient for maintaining
    the uptime of a SQL Server instance hosted on an Azure Virtual Machine. The scope
    of a single point of failure in Azure is essentially a fault domain.


    The easiest way to draw a parallel with the on-premises world is to think of a
    failover cluster that prevents a single point of failure from a compute standpoint.
    Now extending this to the world of Azure, a single compute source connected to
    a power outlet is a fault domain. This could even be a rack in a data center since
    a power outage in a rack will take out multiple compute nodes from the infrastructure.
    The fault domain is determined by Azure during deployment and it is highly recommended
    to have two or more instances of each role deployed in Azure so that a single
    failure in a fault domain does not result in a service outage for your application.
    From a SQL Server hosted on an Azure Virtual Machine, it is always recommended
    to have a primary and secondary deployment from a high availability standpoint.
    This concept is followed in most enterprise environments and the need to do so
    in Azure remains. The SLAs are mentioned in the Azure service level agreements.


    ## Deployment


    One of the most common tasks when working with Azure is deployment. This used
    to be a one-way street until recently. Azure now has two deployment models: classic
    and resource manager. It is best to use the resource manager deployment model
    for any new development work as much as possible. All Azure resources support
    one or both deployment models.


    There are some important considerations when working with virtual machines using
    these two deployment models:


    *   Virtual machines deployed with the classic deployment model cannot be included
    in a virtual network deployed with Resource Manager.

    *   Virtual machines deployed with the Resource Manager deployment model must
    be included in a virtual network.

    *   Virtual machines deployed with the classic deployment model don’t have to
    be included in a virtual network.


    ### Classic Deployment Model


    Azure initially introduced a deployment model called the classic deployment model.
    For this section, we will be restricting the discussion of the deployment of virtual
    machines. In the classic way of doing things, a deployed virtual machine would
    be accessible only through a cloud service. The cloud service is a container for
    holding the virtual machines. The cloud service name had the format `<name>.cloudapp.net`.


    ### Resource Manager Deployment Model


    In the Resource Manager deployment model, cloud service is no longer an object
    required for creating a virtual machine (see Figure 2-8). The Azure Resource Manager
    enables you to easily leverage pre-built application templates or construct an
    application template to deploy and manage compute, network, and storage resources
    on Azure. The templates are available in the increasingly popular JSON format
    and are easily exported from an existing deployment and applied to a new deployment.


    ![A371128_1_En_2_Fig8_HTML.jpg](A371128_1_En_2_Fig8_HTML.jpg)


    Figure 2-8. Azure resource providers and their relationships for an Azure Virtual
    Machine


    Azure resource providers support the individual resources for creating functioning
    virtual machines in the configuration that you need. For virtual machines, there
    are three main resource providers:


    *   Compute Resource Provider (CRP): Supports instances of virtual machines and
    optional availability sets.

    *   Storage Resource Provider (SRP): Supports required storage accounts that store
    the VHDs for virtual machines, including their operating system and additional
    data disks.

    *   Network Resource Provider (NRP): Supports required NICs, virtual machine IP
    addresses, and subnets within virtual networks and optional load balancers, load
    balancer IP addresses, and Network Security Groups.


    We did discuss the fact that none of these resource providers can work in isolation,
    as hosting a simple virtual machine requires relationships between the resources
    in the resource providers. An example of this is that a virtual machine depends
    on a specific storage account defined in the SRP to store its disks in blob storage.
    A virtual machine references a specific NIC defined in the NRP and may also have
    an availability set defined in the CRP. A NIC references the virtual machine’s
    assigned IP address, the subnet of the virtual network for the virtual machine,
    and to a Network Security Group if gated access is required.


    Resource Manager (ARM) makes is really simple to build, integrate, and collaborate
    on complicated applications that can include the entire gamut of Azure resources
    (such as web sites, SQL databases, virtual machines, and virtual networks) from
    a shareable template file. Such a shared template file can be used as repeatable
    deployments for setting up development environments with relative ease.


    There is a deep integration of VM extensions (Custom Scripts, DSC, Chef, Puppet,
    etc.) with the Azure Resource Manager in a template file, which allows easy orchestration
    of in-VM setup configuration. ARM also allows simple and precise organizational
    resource access management using Azure Role-Based Access Control (RBAC).


    ### Deployment Automation


    Now that we are talking about deployment, an obvious question is if there is a
    way to automate the actual deployment. Azure provides three different ways to
    manipulate the compute, storage, and networking objects. The first being the web
    user interface, which is expected as this is the company that made graphical user
    interface a commodity. The second and third methods are mainly for programmatically
    deploying whatever can be deployed using the web portal.


    Azure exposes PowerShell cmdlets and REST APIs, which allow developers and IT
    administrators to write deployment routines. These routines automate the creation
    of the Azure entity and configure the post deployment configuration options exposed
    by the entity. The automation capabilities of Azure Automation service, when combined
    with these programmatic interfaces, are immensely powerful and allow customized
    workflows to be designed for deployment. A number of such examples can be found
    on GitHub.'
