  trans: "\n## 摘要\n\n在本章中，你学习了 Azure 如何定义其计算、存储和网络边界。尽管 Azure 提供了一层抽象，使你的部署和日常运维更为容易，但你可以将其与本地环境进行类比。这有助于在迁移到\
    \ Azure 时降低学习曲线。基础设施即服务在数据中心和 Azure 之间具有最高的相似性系数。当你从 IaaS 转向 PaaS 再到 SaaS 时，这种相似性会逐渐减弱。\n\
    \n## 3. Microsoft Azure 存储\n\nMicrosoft Azure 存储是一个云存储系统，为客户提供灵活存储海量数据的能力，且数据可存储任意时长。其独特之处在于，你可以随时随地访问这些数据。它也是一种基于用量的存储系统（即，你为你所使用和所存储的内容付费）。在\
    \ Microsoft Azure 存储中，由于本地复制和地理复制的实现，数据具有持久性，从而支持灾难恢复。该存储由 Blob（用户文件）、表（结构化存储）和队列（消息传递）组成。数据具有高度持久性、可用性，并且可大规模扩展。它通过\
    \ REST API、.NET、Java、Node.js、Python、PHP、Ruby 中的客户端库进行公开。\n\n### Azure 存储服务\n\n\
    Microsoft Azure 存储服务有多种类型（参见图 3-1）：\n\n![A371128_1_En_3_Fig1_HTML.jpg](img/A371128_1_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1. Microsoft Azure 数据存储概念及访问 Blob、表和队列的 REST 协议\n\n*   `Blob 存储服务`\n*  \
    \ `表存储`\n*   `队列存储`\n*   `文件存储`\n\n### Blob 存储\n\nBlob 不过是云端的文件系统。它可以包含文本数据或二进制数据，例如文档、媒体文件或应用程序安装程序。简而言之，它是一个用于在云中存储和检索文件的简单接口（参见图\
    \ 3-1）。以下列表提供了一些 Blob 的常见用途：\n\n*   数据共享。客户可以共享文档、图片、视频和音乐。\n*   大数据洞察。客户可以在云中存储大量原始数据，并可以使用\
    \ MapReduce 作业进行计算以获取数据洞察。\n*   备份。许多客户将备份存储在云中，即将本地数据存储在云中。\n\n`Blob 存储服务`包含以下关键概念：\n\
    \n*   `存储帐户`。Microsoft Azure 在全球不同位置提供存储。你需要创建一个 `存储帐户` 来访问存储服务并托管你的数据。一旦创建了 `存储帐户`，你就可以创建\
    \ `Blob` 并将其存储在 `容器` 中，也可以创建 `表` 并将 `实体` 放入这些 `表` 中。你还可以创建 `队列` 并在这些 `队列` 中存储\
    \ `消息`。\n*   `容器`。一个 `容器` 提供了所有 `Blob` 的分组。一个 `存储帐户` 可以包含多个 `容器`，每个 `容器` 可以包含多个\
    \ `Blob`。\n*   `Blob`。一个 `Blob` 可以包含文本数据或二进制数据，例如文档、媒体文件或应用程序安装程序。Microsoft Azure\
    \ 存储提供三种类型的 `Blob`：\n    *   `块 Blob`。顾名思义，一个 `块 Blob` 由多个 `块` 组成，每个 `块` 由一个 `块\
    \ ID` 标识。基本上，你通过写入一组 `块` 并通过其 `块 ID` 提交这些块来创建/修改 `块 Blob`。每个 `块` 可以有不同的大小，最大为\
    \ 4MB。`块 Blob` 的最大大小为 200GB，单个 `Blob` 最多可包含 50,000 个 `块`。对于大小不超过 64MB 的 `块 Blob`，你可以通过单次写入操作上传。如果\
    \ `块` 的大小超过存储客户端中指定的大小，它将被分解为更小的块。\n    *   `页 Blob`。这是一个由 512 字节 `页` 组成的集合，针对随机读写操作进行了优化。你需要初始化\
    \ `页 Blob` 并设置 `页 Blob` 将增长到的最大大小。要添加/修改 `页 Blob` 内的内容，你必须指定一个 `偏移量` 和一个与 512\
    \ 字节 `页` 边界对齐的 `范围`。写入操作发生后立即发出提交。`页 Blob` 的最大大小为 1TB。\n    *   `追加 Blob`。这些是专门为\
    \ `追加` 操作设计的 `块`。它们不公开 `块 ID`。当修改 `追加 Blob` 时，通过 `追加块` 操作在末尾添加 `块`。你无法更新/删除现有的\
    \ `Blob`。一个 `追加 Blob` 可以有不同的大小，最大为 4MB，并且可以包含 50,000 个 `Blob`。\n\n### 表存储\n\n\
    `Azure 表存储` 包含大量结构化的非关系数据。图 3-2 显示了 `表存储` 的以下关键组件：\n\n![A371128_1_En_3_Fig2_HTML.jpg](img/A371128_1_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2. Windows 表存储组件\n\n*   `存储帐户`。如前所述，对 Azure 存储的所有访问都通过 `存储帐户` 完成。\n*   `表`。具有不同\
    \ `属性` 集的 `实体` 的集合。\n*   `实体`。类似于数据库中的一行，它是一个 `属性` 集，大小可达 1MB。\n*   `属性`。一个名称-值对，最多可包含约\
    \ 252 个 `属性` 来存储数据。\n\n**注意**\n请参阅 `https://azure.microsoft.com/en-in/documentation/articles/storage-dotnet-how-to-use-tables/`\
    \ 以了解如何使用 .NET 访问 `表存储`。\n\n### 队列存储\n\n`队列存储` 用于存储大量 `消息`，并可通过 `HTTP/HTTPS` 访问。它用于异步处理数据，并有助于在\
    \ Azure `Web 角色` 和 Azure `辅助角色` 之间传递 `消息`。\n`队列` 为你的应用程序提供可靠的消息传递。它们可用于执行异步任务，例如，需要从\
    \ `Web 角色` 发送到 `辅助角色` 以异步处理的任务。这允许 `Web` 和 `辅助角色` 独立扩展（参见图 3-3）。\n\n![A371128_1_En_3_Fig3_HTML.jpg](img/A371128_1_En_3_Fig3_HTML.jpg)\n\
    \n图 3-3. Windows 队列存储概念\n\n**注意**\n请参阅 `https://azure.microsoft.com/en-in/documentation/articles/storage-dotnet-how-to-use-queues/`\
    \ 以了解如何使用 .NET 访问 `队列存储`。\n\n### 文件存储\n\n我们中的许多人仍在使用遗留应用程序，没有它们就无法工作。这些遗留应用程序过去使用\
    \ `SMB` 文件共享。借助 Microsoft Azure 的 `文件存储` 服务，你可以获得基于云的 `SMB` 文件共享，如果你决定将依赖文件共享的遗留应用程序迁移到\
    \ Azure，这会有所帮助。本地应用程序可以使用 `文件存储` REST API 访问 `文件共享` 中的数据。常见的 `文件存储` 用途包括：\n\n\
    *   迁移依赖于文件共享的本地应用程序。\n*   存储共享的应用程序文件，如配置文件。\n*   存储诊断数据，如日志。\n*   存储工具和实用程序。\n\
    \n如果你看图 3-4，你会看到 `文件服务` 可用于存储诊断日志和应用程序配置文件。你可以根据需要创建目录并存储它们。\n\n![A371128_1_En_3_Fig4_HTML.jpg](img/A371128_1_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4. 文件存储概念\n\n**注意**\n更多信息，请参阅 `https://azure.microsoft.com/en-in/documentation/articles/storage-dotnet-how-to-use-files/`。\n"
- fmt: '### Design Decisions


    Microsoft Azure storage was designed based on some key customer engagements:


    *   Strong consistency. For Enterprise customers, consistency is very important
    in moving their line of business applications to the cloud. It is extremely important
    for them to perform conditional reads, writes, and deletes for optimistic concurrency
    control. Microsoft Azure storage thus provides three properties as per the CAP
    theorem—strong consistency, high availability, and partition tolerance.

    *   Global and scalable Namespace storage. With Microsoft Azure Storage, you can
    store massive data and access it consistently from anywhere across the globe.
    Microsoft Azure leverages the DNS as a part of the namespace and breaks the namespace
    into three parts—a storage account name, a partition name, and an object name
    (`http(s)://AccountName.<Service>.core.windows.net/PartitionName/ObjectName`).

    *   Disaster recovery. With Microsoft Azure Storage, the data is stored across
    multiple data centers that are globally dispersed. This is to ensure that customers’
    data is protected at any cost against natural disasters like earthquakes, fires,
    storms, etc.

    *   Scalable. The data needs to be scalable, it should be capable of scaling automatically
    and be load balanced based on the peak traffic demand.

    *   Multi-tenancy. Many customers, depending on their need, could be served from
    the same shared storage, thus reducing the cost of storage.


    The following are important characteristics of Premium Storage:


    *   Durability. Premium Storage was built on the Locally Redundant Storage (LRS)
    technology, which stores the replica of data within the same region. This was
    to confirm durability of data for Enterprise workload. Writes will be confirmed
    back to the application only when they have been durably replicated by the LRS
    system.

    *   New `"DS"` series VMs. The new DS series of Virtual Machines supports Premium
    Storage data disks. You can leverage a new sophisticated caching capability that
    enables extremely low latency for read operations.

    *   Linux support. With Linux integration services 4.0, Microsoft have enabled
    support for even more Linux flavors. There are different distributions that have
    been validated with Microsoft Azure Premium Storage such as Ubuntu (Versions 12.04,
    14.04, 14.10, and 15.04), SUSE 12, etc.


    ## Azure Storage Architecture Internals


    A storage stamp is a cluster of racks of storage nodes on Microsoft Azure Fabric
    where each rack is on a separate domain under redundant networking and power (see
    Figure [3-5](#A371128_1_En_3_Chapter.html#Fig5)).


    ![A371128_1_En_3_Fig5_HTML.jpg](A371128_1_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    Storage stamps architecture


    All the reads and writes go to these clusters of storage. The target is to keep
    the storage stamp at about 70% utilized in terms of capacity, transactions, and
    bandwidth so that better seek time is gained for higher throughput. This provides
    better resiliency against rack failures within a stamp.


    Location Service manages all storage stamps. It does things like account load
    balancing and account allocation, and it handles geo-replication across these
    stamps. The location service itself is distributed across two geographic locations
    for its own disaster recovery.


    Note


    For more information on Microsoft Azure Storage, we recommend the following sites:


    [`http://sigops.org/sosp/sosp11/current/2011-Cascais/printable/11-calder.pdf`](http://sigops.org/sosp/sosp11/current/2011-Cascais/printable/11-calder.pdf)


    [`https://blogs.msdn.microsoft.com/windowsazurestorage/2011/11/20/sosp-paper-windows-azure-storage-a-highly-available-cloud-storage-service-with-strong-consistency/`](https://blogs.msdn.microsoft.com/windowsazurestorage/2011/11/20/sosp-paper-windows-azure-storage-a-highly-available-cloud-storage-service-with-strong-consistency/)


    ### Replication Engine


    There are two replication engines: intra-stamp replication (stream layer) and
    inter-stamp replication (partition layer).


    Intra-stamp replication provides synchronous replication and ensures all data
    is durable within the stamp. It keeps different enough copies of data across different
    fault domains in advent of disk, node, or rack failures. This is done by the partition
    layer and is in the path of critical path of customer write request. A success
    is only returned to a client once the data is replicated within an intra-stamp.


    Inter-stamp replication provides asynchronous replication by lazily replicating
    data across the stamps in the background. This is an object-level replication
    where either whole objects are replicated or the recent changes are. This replication
    is used to keep data in two locations for disaster recovery, migrating an account’s
    data between stamps. It provides geo-redundancy against geographical disasters
    by using optimal use of network bandwidth across the stamps.


    ### Layers Within a Storage Stamp


    There are three layers within a storage stamp (see Figure [3-6](#A371128_1_En_3_Chapter.html#Fig6)):


    ![A371128_1_En_3_Fig6_HTML.jpg](A371128_1_En_3_Fig6_HTML.jpg)


    Figure 3-6.


    Dynamic load balancing in the partition layer


    *   Stream layer/Distributed File System (DFS) layer. This is the lowest layer
    and is responsible for handling the disk and storing data to the disk. This means
    that it stores the bits on the disk and replicates the data across many servers
    to keep data durable within a storage stamp. Think of this as a distributed file
    system layer within a storage stamp. Data is stored into the files, called extents,
    and they are replicated three times within a region between upgrade domain (UD)
    and fault domain(FD). This is an append-only filesystem, so data is never overwritten.
    Data gets appended to the end of the extent.

    *   Partition layer. This serves two unique purposes. This layer understands the
    data abstractions. It understands what a blob is, what a table entity is, what
    a message is, and how to perform transactions against those objects. Thus it ensures
    transaction ordering and optimistic concurrency, storing object data on top of
    stream layer and caching object data to reduce the disk I/O. This layer is also
    responsible for partitioning all objects within a stamp. This layer is also responsible
    for a massively scalable index, this index is used to index all blobs, table entities,
    and queues. There is a master that’s responsible for taking this index and breaking
    it into range partitions based on the load to the index. These objects are broken
    into disjointed ranges based on partition name values and served from different
    partition servers (i.e., it manages which partition server serves which partition
    range for blobs, tables, and queues). This is done to load-balance the TPS traffic
    to the big index.

    *   Front-end layer. Provides a REST protocol for blobs, tables, and queues. It
    is used for authentication, authorization, and for logging and gathering metrics.


    You may wonder how this structured storage system is provided in an append-only
    filesystem, i.e., how only updating blobs/tables is allowed when the filesystem
    is append only?


    At a high level, the data abstractions are treated at the partition layer as logs
    (streams). Any update to the data is appended to the log, which means that they
    are appended to the last extent of the logs. Think of this as a list link of extents.
    Thus, the append happens only to the last extent. All prior extents are sealed
    and are never appended to those extents. The data is then committed and successfully
    returned back to the client. In parallel, all the recent updates are stored in
    memory and in the background, so it would lazily check those off the critical
    write path. These are then merged to a B-Plus tree. Therefore, there are the logs
    that are used to commit the updates, and then the checkpoint, and the tree that’s
    used to find the last version of your data.'
