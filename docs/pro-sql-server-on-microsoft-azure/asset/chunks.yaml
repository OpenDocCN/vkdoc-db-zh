- fmt: "# 1. Introduction to Microsoft Azure\n\n电子补充材料：本章的在线版本（doi：[10.1007/978-1-4842-2083-2_1](http://dx.doi.org/10.1007/978-1-4842-2083-2_1)）包含补充材料，可供授权用户使用。\n\
    \n在与IT决策者的任何会议中，云都已成为一个重要的考量因素。基于云的系统所带来的好处使其很有吸引力去采用私有云、公有云甚至混合云。然而，有趣的是，早在“云”这个词变得流行之前的几十年，如今所熟知的云就已经存在了！\n\
    \n即使在云计算兴起之前，微软就已经提供了大量的云服务，例如像Hotmail这样的电子邮件平台。它过去是，现在仍然是一个基于云的个人电子邮件服务。微软至今仍在托管的另一项服务是其Xbox\
    \ Live游戏服务，该服务为玩家提供多人游戏选项、个人资料管理以及社交游戏体验。\n\n在本章中，我们将讨论云计算以及这些概念如何与Microsoft Azure相关联。我们还将了解Microsoft\
    \ Azure中可用的不同服务模型和产品，并讨论一些与Azure SQL Server部署一起使用的常见服务。\n\n## Cloud Computing\
    \ Overview\n\n云计算是一个创新平台，正在彻底改变我们进行计算的方式。云计算基于“按使用付费”的关键原则，即您无需为计算需求投资硬件或软件，而是从供应商那里租用所需的计算能力、存储、软件和其他资源。这减少了所需的总投资。云计算帮助用户和企业获得全球性的、高可用的、基于请求的计算、存储和软件服务访问。这些基于云的资源（计算、存储或软件服务）基于资源共享的原则，以提供一致且经济高效的解决方案。\n\
    \n云计算严重依赖虚拟化的概念，物理计算资源可以被划分为多个独立的虚拟设备，每个设备都可用于执行某种计算任务。虚拟化有助于创建一个高度可扩展和敏捷的计算单元系统，可以按需分配和利用。虚拟化还通过更好地利用现有硬件资源，帮助降低与硬件基础设施相关的成本。\n\
    \n任何云计算环境最重要的设计原则之一是优化、有效或最佳地利用共享资源。由于云资源由多个用户共享，并且具有按需分配的灵活性，因此有效利用这些资源至关重要。有效利用共享资源的能力降低了运行和维护云计算环境的总体成本。\n\
    \n云计算提供了一种从传统的CAPEX（资本支出）模式到OPEX（运营支出）模式的转变。在CAPEX模式中，组织投资于获取随时间折旧的固定资产；而在OPEX模式中，组织投资于在使用依赖于共享基础设施的服务期间产生的运营费用。“迁移到云”这个短语就表明了这种从CAPEX模式到OPEX模式的转变。推动这种向云基础设施迁移的关键点是：\n\
    \n*   云计算帮助企业降低建立数据中心或其他所需服务器环境的初始成本，从而使他们能够将时间和精力集中在核心业务和项目上。\n*   由于云计算资源或服务可以按需配置和调整，它有助于减少组织的“上市时间”并满足其业务的波动性需求。\n\
    \n## Characteristics of Cloud Computing\n\n任何云计算环境的关键特征是：\n\n*   敏捷性：云计算平台的特点在于其敏捷性，可以快速引入新功能和服务，以及如何能够快速创建并交付一个新的计算资源或服务。\n\
    *   成本：云计算平台使组织能够从CAPEX模式过渡到OPEX模式。这有助于降低建立计算平台或采用更新技术的初始成本。大多数提供云计算平台的供应商都提供按使用付费的模型，这意味着消费者只需为他们使用的服务付费。\n\
    *   设备和位置独立性：云计算使用户和组织能够通过互联网访问他们的资源，这意味着可以从任何地方访问资源，无论资源位于哪个数据中心。\n*   维护：由于大部分维护由云计算供应商管理，消费者无需在维护上投入时间和资源。\n\
    *   资源共享：由于云计算建立在资源共享的原则上，它允许供应商：\n    1.  将其基础设施集中在房地产、电力等成本较低的地理位置。\n    2.\
    \  有效且高效地利用计算资源。\n*   可扩展性和弹性：云计算允许动态、快速且近乎实时地配置资源和服务。这有助于用户根据其业务需求扩大或缩小使用规模。\n\
    *   可靠性：云计算平台使用多个冗余站点，包括本地（同一数据中心）和地理冗余，以提供更好的业务连续性和灾难恢复能力。\n\n## Service Models\n\
    \n如图[1-1](#A371128_1_En_1_Chapter.html#Fig1)所示，大多数云计算提供商提供以下服务模型：平台、基础设施和软件。\n\
    \n![A371128_1_En_1_Fig1_HTML.jpg](A371128_1_En_1_Fig1_HTML.jpg)\n\n图 1-1. 表示视图—服务模型\n\
    \n### Platform as a Service\n\n虽然SaaS模型可能是满足组织大部分软件需求的完美解决方案，但缺乏根据业务需求自定义和更改服务的能力使其对一些组织来说不可用。由于没有可用的自定义选项，SaaS服务有时无法满足用户业务各个方面的需要。在这种情况下，企业必须投入时间和资源来构建软件能力以弥补这些差距。值得庆幸的是，云计算提供了平台即服务模型，它可以填补这一空白，并允许消费者创建和运行自定义应用程序。PaaS提供具有极高可扩展性和弹性的云托管应用服务器。\n\
    \n在PaaS模型中，云供应商提供一个预先配置的、虚拟化的应用服务器环境，组织或用户可以向其中部署他们自定义的内部构建的应用程序。云供应商确保应用服务器的维护、打补丁和可用性，而组织需要管理和维护运行在应用服务器上的自定义应用程序。在部署这些应用程序期间，开发人员定义应用程序的资源需求（CPU、网络、内存等）。云计算配置引擎使用此资源需求定义（通常作为配置文件的一部分），并创建并绑定运行应用程序所需的必要基础设施。PaaS是客户构建新应用程序的理想解决方案，因为迁移遗留应用程序可能需要大量的应用程序重新设计以符合PaaS模型的规则。"
  raw: "# 1. Introduction to Microsoft Azure\n\nElectronic supplementary material\
    \ The online version of this chapter (doi:[10.​1007/​978-1-4842-2083-2_​1](http://dx.doi.org/10.1007/978-1-4842-2083-2_1))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    The cloud has become an important consideration in any meeting that you have with\
    \ an IT decision maker. The benefits of having a cloud-based system make it attractive\
    \ to adopt a private, public, or even a hybrid cloud. However, it is interesting\
    \ to note that the cloud as it’s known today existed decades before the word “cloud”\
    \ became fashionable!\n\nMicrosoft provided a large number of cloud services even\
    \ before the cloud became the cloud, for example an e-mail platform like Hotmail.\
    \ This was and still is a cloud-based personal e-mail service. Another service\
    \ that Microsoft still hosts is its Xbox Live gaming service, which provides gamers\
    \ with multiplayer gaming options, profile management, and social gaming experiences.\n\
    \nIn this chapter, we will talk about cloud computing and how the concepts relate\
    \ to Microsoft Azure. We will also look at the different service models and offerings\
    \ available in Microsoft Azure and discuss some of the common services used with\
    \ Azure SQL Server deployments.\n\n## Cloud Computing Overview\n\nCloud computing\
    \ is an innovative platform that is revolutionizing the way we do computing. Cloud\
    \ computing is based on the key principle of “pay-as-you-go,” whereby you don’t\
    \ invest in the hardware or the software for your computing needs, but instead\
    \ rent the computational power, storage, software, and other resources you need\
    \ from a vendor. This reduces the overall investment needed. Cloud computing helps\
    \ users and enterprises get global, highly available, request-based access to\
    \ compute, storage, and software services. These cloud-based resources (compute,\
    \ storage, or the software services) are based on the principles of resource sharing\
    \ in order to provide a consistent and cost-effective solution.\n\nCloud computing\
    \ relies heavily on the concept of virtualization, where physical computing resources\
    \ can be divided into multiple independent virtual devices, each of which can\
    \ be utilized to perform some sort of computing task. Virtualization helps create\
    \ a highly scalable and agile system of computing units, which can be allocated\
    \ and utilized on demand. Virtualization also helps reduce the hardware infrastructure\
    \ related costs by better utilizing the existing hardware resources.\n\nOne of\
    \ the most important design principles for any cloud computing environment is\
    \ to make the best, effective, or optimal use of the shared resources. Since cloud\
    \ resources are shared by multiple users and have the flexibility of being allocated\
    \ on demand, effective use of these resources is of paramount importance. The\
    \ ability to effectively utilize the shared resources reduces the overall cost\
    \ to run and maintain the cloud computing environment.\n\nCloud computing provides\
    \ a shift from the traditional CAPEX (capital expenditure) model, where organizations\
    \ invest in acquiring fixed assets that depreciate over time, to an OPEX (operational\
    \ expenditure) model, where the organization invests in operational expenses incurred\
    \ during usage of services relying on a shared infrastructure. The phrase “migration\
    \ to cloud” indicates this movement from the CAPEX to the OPEX model. The key\
    \ points driving this migration to cloud infrastructure are:\n\n*   Cloud computing\
    \ helps businesses reduce initial costs of setting up data centers or other server\
    \ environments as required so they can instead focus the time and energies on\
    \ their core business and projects.\n*   Since cloud computing resources or services\
    \ can be provisioned and adjusted on demand, it helps reduce the “go-to-market”\
    \ time for organizations and to meet the fluctuating demands of their business.\n\
    \n## Characteristics of Cloud Computing\n\nThe key characteristics of any cloud\
    \ computing environment are:\n\n*   Agility: Cloud computing platforms are characterized\
    \ by the agility with which new features and services can be introduced and how\
    \ a new computing resource or a service could be spun out and become consumable.\n\
    *   Cost: Cloud computing platforms enable an organization to transition from\
    \ a CAPEX model to an OPEX model. This helps reduce the initial cost for setting\
    \ up a computing platform or in adopting newer technologies. A majority of the\
    \ vendors that provide a cloud computing platform offer a pay-as-you-go model,\
    \ which means consumers only pay for what they use.\n*   Device and location independence:\
    \ Cloud computing enables users and organizations to access their resources over\
    \ the Internet, meaning the resources can be accessed from anywhere, regardless\
    \ of which data center the resources are located in.\n*   Maintenance: Since most\
    \ of the maintenance is managed by the cloud computing vendor, consumers do not\
    \ need to invest time and resources in maintenance.\n*   Resource sharing: Since\
    \ cloud computing is built on the principles of resource sharing, it allows the\
    \ vendors to:\n    1.  Centralize their infrastructure in geographical locations\
    \ with lower costs for real estates, electricity, etc.  \n    2.  Effectively\
    \ and efficiently use the computing resources.  \n*   Scalability and elasticity:\
    \ Cloud computing allows for dynamic, quick and near real-time provisioning of\
    \ resources and services. This helps users scale up or down their use in accordance\
    \ with their business needs.\n*   Reliability: Cloud computing platforms use multiple\
    \ redundant sites. both local (same data center) and geo redundancy to provide\
    \ for better business continuity and disaster recovery.\n\n## Service Models\n\
    \nAs shown in Figure [1-1](#A371128_1_En_1_Chapter.html#Fig1), most cloud computing\
    \ providers provide services in the following service models : platform, infrastructure,\
    \ and software.\n\n![A371128_1_En_1_Fig1_HTML.jpg](A371128_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1.\n\nRepresentational view—service models\n\n### Platform as a Service\n\
    \nWhile the SaaS model can be the perfect solution for a majority of the software\
    \ needs of an organization, the absence of the ability to customize and change\
    \ the services as per the business needs make it unusable for some organizations.\
    \ Since there is no customization available, SaaS services sometimes don’t fit\
    \ the needs of every aspect of a user’s business. In such cases, businesses have\
    \ to invest time and resources in building software capabilities to address these\
    \ gaps. Thankfully, cloud computing provides the Platform as a Service (PaaS)\
    \ model, which can fill this gap and allow consumers to create and run custom\
    \ applications. PaaS offers cloud-hosted application servers with very high scalability\
    \ and elasticity.\n\nIn the PaaS model, the cloud vendors provide a pre-configured,\
    \ virtualized application server environment, to which organization or users can\
    \ deploy their custom in-house build applications. The cloud vendor ensures the\
    \ maintenance, patching, and availability of the app servers, and the organizations\
    \ need to manage and maintain the custom applications running on the app servers.\
    \ During deployment of these applications, the developers define the resource\
    \ requirements (CPU, network, memory, and so on) for these applications. The cloud\
    \ computing provision engine consumes this resource requirement definition (most\
    \ as part of a configuration file) and creates and binds the necessary infrastructures\
    \ needed to run the application. PaaS is an ideal solution for new applications\
    \ being built by the customers, as migrating legacy applications might require\
    \ extensive application redesign to comply with the rules of the PaaS model."
