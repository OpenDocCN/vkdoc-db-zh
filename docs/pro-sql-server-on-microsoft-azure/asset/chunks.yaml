    \ \"latest\"\n},\n\"OSDisk\": {\n\"OperatingSystemType\": \"Windows\",\n\"Caching\"\
    : \"ReadWrite\",\n\"CreateOption\": \"FromImage\",\n\"DiskSizeGB\": null,\n\"\
    Name\": \"tigerninja\",\n\"SourceImage\": null,\n\"VirtualHardDisk\": {\n\"Uri\"\
    : \"https://.blob.core.windows.net/vhds/.vhd\"\n}\n}\n}\nDataDiskNames       \
    \     : {datadisk1.vhd, datadisk2.vhd, logdisk.vhd, tigerninja-20151017-015414...}\n\
    NetworkInterfaceIDs      : {/subscriptions//resourceGroups/ninja/providers/Microsoft.Network/networkInterfaces/}\n\
    ```\n*Listing 5-6. An Example Output of the Model and Instance View of a Virtual\
    \ Machine*\n\n## 部署后\n\n一旦虚拟机部署完成，你会注意到有一个非常实用的诊断视图，用于显示警报和资源使用情况。你可以根据自己的喜好或业务需求，通过添加磁贴和组以及调整磁贴大小（见\
    \ *Figure 5-10*）来自定义此视图。这些磁贴最有用的方面之一是它们可以固定到你的仪表板上。因此，如果你有一个需要监控的关键指标，可以将其固定在登录\
    \ Azure Web 门户后立即可见的仪表板上。\n\n![A371128_1_En_5_Fig10_HTML.jpg](A371128_1_En_5_Fig10_HTML.jpg)\n\
    *Figure 5-10. Azure Virtual Machine diagnostics view*\n\n如果你发现某个特定的性能指标对你的业务非常重要，那么你可以基于阈值为性能监视器数据添加警报。如\
    \ *Figure 5-10* 所示，为当客户操作系统 CPU 使用率大于 80 时定义了一个警报。当警报触发时，可以自动向虚拟机的管理员发送电子邮件。如果需要将警报通知发送到公司内部的特定组，也可以添加其他收件人。\n\
    \n如果你觉得电子邮件太老派，可以通过为警报配置 Web  webhook 进一步操作。Azure 提供了使用 HTTP 或 HTTPS 端点通过 POST\
    \ 方法发送 JSON 有效负载的功能。如果你已有处理传入 Web 请求以创建寻呼和工单的工具，你的工作将变得更加简单！你的支持人员可以无缝处理工单，而无需担心为这些环境设置额外的诊断和警报。如果你正在考虑减少学习曲线并最大化效率曲线，这个功能绝对值得一个大拇指，因为它正中下怀！\n\
    \n如果你觉得需要添加需要监控的指标，可以使用“所有设置”边栏选项卡中“监视”组下的 `Diagnostics` 选项来完成。默认情况下，Azure 不会添加任何警报，因此你需要在同一\
    \ `Monitoring` 组下的 `Alerts` 选项中添加与你的业务相关的警报。\n\n随着 Azure Automation 的出现，你可以将许多\
    \ PowerShell 脚本转换为自动化 runbook，这些 runbook 可以被有权访问 Azure 自动化帐户的多个用户重复使用。你可以使用 Azure\
    \ 自动化 runbook 来运行安装后的自定义配置，例如设置用户数据库，甚至为 `Analysis Services`、`Reporting Services`\
    \ 和 `Integration Services` 进行额外配置。"
  raw: "```\n$Credential = Get-Credential\n$VirtualMachine = New-AzureRmVMConfig -VMName\
    \ $VMName -VMSize $vImageSize\n$VirtualMachine = Set-AzureRmVMOperatingSystem\
    \ -VM $VirtualMachine -Windows -ComputerName $ComputerName -Credential $Credential\
    \ -ProvisionVMAgent -EnableAutoUpdate\n$VirtualMachine = Set-AzureRmVMSourceImage\
    \ -VM $VirtualMachine -PublisherName MicrosoftSQLServer -Offer \"SQL2016CTP3.3-WS2012R2\"\
    \ -Skus Evaluation -Version \"latest\"\n$VirtualMachine = Add-AzureRmVMNetworkInterface\
    \ -VM $VirtualMachine -Id $Interface.Id\n$OSDiskUri = $StorageAccount.PrimaryEndpoints.Blob.ToString()\
    \ + \"vhds/\" + $OSDiskName + \".vhd\"\n$VirtualMachine = Set-AzureRmVMOSDisk\
    \ -VM $VirtualMachine -Name $OSDiskName -VhdUri $OSDiskUri -CreateOption FromImage\n\
    ## Create the VM in Azure\nNew-AzureRmVM -ResourceGroupName $ResourceGroupName\
    \ -Location $Location -VM $VirtualMachine\nListing 5-5.\nPowerShell Command to\
    \ Provision the Virtual Machine\n```\n\nIf you love the Ctrl+C and Ctrl+V feature\
    \ in Windows, you will love the `Get-AzureRmVM` PowerShell cmdlet! `Get-AzureRmVM`\
    \ fetches the properties of a virtual machine associated with a resource group\
    \ (see Listing [5-6](#A371128_1_En_5_Chapter.html#Par59)). It provides a JSON-like\
    \ output of the model view, which is the user-specified property of the virtual\
    \ machine like the machine configuration. The output also contains the instance\
    \ view, which is the instance level status of the virtual machine like the status\
    \ of the disks attached to the virtual machine. The JSON output can be used to\
    \ construct virtual machine configurations for future similar deployments. This\
    \ is highly beneficial when you need to set up test environments that replicate\
    \ the production environment. Now with Azure PowerShell cmdlets, you can get this\
    \ done.\n\n```\nResourceGroupName        : \nId                       : /subscriptions//resourceGroups/ninja/providers/Microsoft.Compute/virtualMachines/\n\
    Name                     : \nType                     : Microsoft.Azure.Management.Compute.Models.VirtualMachineGetResponse\n\
    Location                 : westus\nTags                     : {}\nAvailabilitySetReference\
    \ : null\nDiagnosticsProfile       : {\n\"BootDiagnostics\": {\n\"Enabled\": true,\n\
    \"StorageUri\":\"https://.blob.core.windows.net/\"\n}\n}\nExtensions         \
    \      : [\n{\n\"AutoUpgradeMinorVersion\":false,\n\"ExtensionType\":\"IaaSDiagnostics\"\
    ,\n\"InstanceView\":null,\n\"ProtectedSettings\":null,\n\"ProvisioningState\"\
    :\"Succeeded\",\n\"Publisher\": \"Microsoft.Azure.Diagnostics\",\n\"Settings\"\
    : \"{\\r\\n\\\"xmlCfg\\\": \\\".......\\\",\\r\\n  \\\"storageAccount\\\": \\\"\
    \\\"\\r\\n}\",\n\"TypeHandlerVersion\": \"1.2\",\n\"Id\": \"/subscriptions//resourceGroups//providers/Microsoft.Compute/virtualMachines/tigerninja/extensions/Microsoft.Insights.VMDiagnosticsSettings\"\
    ,\n\"Name\": \"Microsoft.Insights.VMDiagnosticsSettings\",\n\"Type\": \"Microsoft.Compute/virtualMachines/extensions\"\
    ,\n\"Location\": \"westus\",\n\"Tags\": {}\n}\n]\nHardwareProfile          : {\n\
    \"VirtualMachineSize\": \"Standard_DS3\"\n}\nInstanceView             : null\n\
    NetworkProfile           : {\n\"NetworkInterfaces\": [\n{\n\"Primary\": null,\n\
    \"ReferenceUri\": \"/subscriptions//resourceGroups/ninja/providers/Microsoft.Network/networkInterfaces/\"\
    \n}\n]\n}\nOSProfile                : {\n\"ComputerName\": \"\",\n\"AdminPassword\"\
    : null,\n\"AdminUsername\": \"\",\n\"CustomData\": null,\n\"LinuxConfiguration\"\
    : null,\n\"Secrets\": [],\n\"WindowsConfiguration\": {\n\"AdditionalUnattendContents\"\
    : [],\n\"EnableAutomaticUpdates\": true,\n\"ProvisionVMAgent\": true,\n\"TimeZone\"\
    : null,\n\"WinRMConfiguration\": null\n}\n}\nPlan                     : null\n\
    ProvisioningState        : Succeeded\nStorageProfile           : {\n\"DataDisks\"\
    : [\n{\n\"Lun\": 0,\n\"Caching\": \"ReadOnly\",\n\"CreateOption\": \"Attach\"\
    ,\n\"DiskSizeGB\": null,\n\"Name\": \"datadisk1.vhd\",\n\"SourceImage\": null,\n\
    \"VirtualHardDisk\": {\n\"Uri\": \"https://.blob.core.windows.net/vhds/datadisk1.vhd\"\
    \n}\n},\n{\n\"Lun\": 1,\n\"Caching\": \"ReadOnly\",\n\"CreateOption\": \"Attach\"\
    ,\n\"DiskSizeGB\": null,\n\"Name\": \"datadisk2.vhd\",\n\"SourceImage\": null,\n\
    \"VirtualHardDisk\": {\n\"Uri\": \"https://.blob.core.windows.net/vhds/datadisk2.vhd\"\
    \n}\n},\n{\n\"Lun\": 2,\n\"Caching\": \"None\",\n\"CreateOption\": \"Attach\"\
    ,\n\"DiskSizeGB\": null,\n\"Name\": \"logdisk.vhd\",\n\"SourceImage\": null,\n\
    \"VirtualHardDisk\": {\n\"Uri\": \"https://.blob.core.windows.net/vhds/logdisk.vhd\"\
    \n}\n},\n{\n\"Lun\": 3,\n\"Caching\": \"ReadOnly\",\n\"CreateOption\": \"Empty\"\
    ,\n\"DiskSizeGB\": 128,\n\"Name\": \"-20151017-015414\",\n\"SourceImage\": null,\n\
    \"VirtualHardDisk\": {\n\"Uri\": \"https://.blob.core.windows.net/vhds/-20151017-015414.vhd\"\
    \n}\n}\n],\n\"ImageReference\": {\n\"Offer\": \"WindowsServer\",\n\"Publisher\"\
    : \"MicrosoftWindowsServer\",\n\"Sku\": \"2012-R2-Datacenter\",\n\"Version\":\
    \ \"latest\"\n},\n\"OSDisk\": {\n\"OperatingSystemType\": \"Windows\",\n\"Caching\"\
    : \"ReadWrite\",\n\"CreateOption\": \"FromImage\",\n\"DiskSizeGB\": null,\n\"\
    Name\": \"tigerninja\",\n\"SourceImage\": null,\n\"VirtualHardDisk\": {\n\"Uri\"\
    : \"https://.blob.core.windows.net/vhds/.vhd\"\n}\n}\n}\nDataDiskNames       \
    \     : {datadisk1.vhd, datadisk2.vhd, logdisk.vhd, tigerninja-20151017-015414...}\n\
    NetworkInterfaceIDs      : {/subscriptions//resourceGroups/ninja/providers/Microsoft.Network/networkInter\n\
    faces/}\nListing 5-6.\nAn Example Output of the Model and Instance View of a Virtual\
    \ Machine\n```\n\n## Post Deployment\n\nOnce the virtual machine deployment is\
    \ complete, you will notice that there is a pretty useful diagnostics view of\
    \ the alerts and resource usage. This can be further customized to your liking\
    \ by adding tiles and groups and resizing the tiles (see Figure [5-10](#A371128_1_En_5_Chapter.html#Fig10))\
    \ as per your whims and fancies or business requirements. One of the most useful\
    \ aspects of these tiles is that they can be pinned to your dashboard. So if you\
    \ have a critical metric that you want to monitor, you could have it pinned on\
    \ your dashboard that’s visible to you as soon as you log into the Azure web portal.\n\
    \n![A371128_1_En_5_Fig10_HTML.jpg](A371128_1_En_5_Fig10_HTML.jpg)\n\nFigure 5-10.\n\
    \nAzure Virtual Machine diagnostics view\n\nIf you find that a particular performance\
    \ metric is very important for your business, then you can add an alert for the\
    \ performance monitor data based on a threshold. As you can see in Figure [5-10](#A371128_1_En_5_Chapter.html#Fig10),\
    \ there is a CPU usage alert defined for the guest OS when it’s greater than 80\\\
    . When the alert is raised, you can automatically send an e-mail to administrators\
    \ of the virtual machine. If you need the alert notification sent to a specific\
    \ group without your company, then you can add other recipients as well.\n\nIf\
    \ you think e-mail is old school, you can take this a step further by configuring\
    \ web hooks for your alerts. Azure provides the capability to use HTTP or HTTPS\
    \ endpoints to send JSON payloads using POST methods. If you already have tools\
    \ that process incoming web requests to create paging and service requests, your\
    \ job becomes even simpler! Your support staff can seamlessly work on service\
    \ requests without having to worry about setting up additional diagnostics and\
    \ alerts for these environments. If you were thinking about reducing the learning\
    \ curve and maximizing the efficiency curve, this is definitely a functionality\
    \ that deserves a thumbs up for hitting the nail on the head!\n\nIf you feel the\
    \ need to add metrics that need to be monitored, this can be done using the Diagnostics\
    \ option available under the Monitoring group in the All Settings blade view.\
    \ Azure does not add any alerts by default, so you would need to add the alerts\
    \ pertinent to your business under the Alerts option available under the same\
    \ Monitoring group.\n\nWith the advent of Azure Automation, you can convert a\
    \ number of the PowerShell scripts into automation runbooks, which can be reused\
    \ by multiple users having access to the Azure Automation account. You can use\
    \ Azure Automation runbooks to run post install custom configuration like setting\
    \ up user databases or even additional configuration for your Analysis Services,\
    \ Reporting Services, and Integration Services."
