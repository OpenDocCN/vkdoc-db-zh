    在新门户中，单击存储账户，然后单击 Blob 服务，如图 6-4 所示。你将看到不同的存储服务。


    ![A371128_1_En_6_Fig4_HTML.jpg](img/A371128_1_En_6_Fig4_HTML.jpg)


    图 6-4. 新门户中显示的存储服务


    你可以使用图 6-5 中所示的 `+` 号添加容器。当你单击 Blobs 服务（见图 6-4）时，你将获得不同的选项，如图 6-5 所示。


