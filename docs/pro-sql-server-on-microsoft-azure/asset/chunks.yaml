- fmt: '# 8. Azure SQL Database


    Microsoft Azure SQL Database is a relational database service in Microsoft Azure
    based on the Microsoft SQL Server engine, with almost all the mission-critical
    capabilities of SQL Server. Windows Azure SQL Database is designed to deliver
    highly available and scalable database as a service with predictable performance,
    business continuity, and data protection capabilities. SQL Database is a platform
    as a server offering, and it requires very little administrative overhead and
    can significantly reduce the time-to-market for applications requiring database
    backend support. Since the service is based on the SQL Server engine, it works
    with most of the SQL Server tools and APIs available, making it easier to migrate
    existing applications to Azure.


    In this chapter, we will learn about the internal architecture of Azure SQL Database
    and how the Windows Azure Fabric plays an important role in the management and
    functioning of the Azure SQL Database. We will learn about the various service
    tiers and performance levels available with the Azure SQL Database and the management
    features or options available to manage an Azure SQL database.


    We will also learn about the different techniques that can be utilized to migrate
    an on-premises database to an Azure SQL database.


    ## SQL Database Architecture


    Azure SQL Database is built on top of the Windows Azure framework, which provides
    machine management and distributed application functionality. A SQL Azure cluster
    consists of a control ring and one or more tenant rings. In Windows Fabric terminology,
    each ring equates to a physical Windows Azure cluster that consists of a collection
    of nodes that run one or more applications. Each application within a ring contains
    one or more services.


    ### The Tenant Ring


    A tenant ring in the Windows Fabric is nothing but a physical Windows Azure cluster,
    where each node of the cluster is designed to run an application. In this case,
    the application being run is of type `DBService`, which is basically a `SQL Server
    Executable` service or the `Hekaton` (in-memory OLTP) engine service. Each `DBService`
    application is bound to its own memory, CPU, and IO.


    When customers provision an Azure SQL Database, they create a logical server (if
    it doesn’t already exist) and a database. They are actually creating a `DBService`
    (or `DBSvc`) in the backend. This `DBService` application runs on one of the nodes
    of the Windows Azure cluster. The `DBService` can use the local storage on the
    VM (or the host) and remote storage (see Figure 8-1) for storing the database.


    ![A371128_1_En_8_Fig1_HTML.jpg](A371128_1_En_8_Fig1_HTML.jpg)


    Figure 8-1. `DBService` running on Windows Azure clusters


    The tenant ring architecture allows for the creation and functioning of multiple
    `DBServices`, belonging to one or more customers (tenants). Since each `DBService`
    runs in its own context and is independent of other `DBService` applications running
    on the same node in the tenant ring, this architecture allows the same node/VM
    to host multiple customer databases.


    The following services form the core of the `DBService` application:


    *   `SQL Server Executable`

    *   `Watchdog.exe`


    There might be additional services when `Hekaton` (in-memory OLTP) or full text
    is also required. Additionally, there might be other services that are needed
    when Azure SQL Database forms the backend to Azure SQL DW.


    ### The Control Ring


    The control ring functions to provide management, provisioning, and redirecting
    services (see Figure 8-2). It helps determine the location of the databases in
    the tenant rings and routing connections to the right tenant databases. Control
    ring provides the following major services: Control Management Nodes, Management
    Services Nodes, and Redirector Services Nodes.


    ![A371128_1_En_8_Fig2_HTML.jpg](A371128_1_En_8_Fig2_HTML.jpg)


    Figure 8-2. Control ring architecture


    #### Control Management Node


    The control management node provides internal cluster management services that
    provide capabilities like capacity management, tenant ring management, migration,
    and other such scenarios.


    One of the key components of the control management node is the cluster metadata
    store, which is the single point of all metadata related to the Azure SQL clusters.
    It stores information such as the state of the cluster, the state of the resources
    running on the cluster, and other information that’s ensures that the cluster
    is functioning optimally.


    #### Management Service Node


    The management services node hosts management components that provide REST APIs
    for management of the Azure SQL database by the end users. The management services
    run as stateless services on multiple active management nodes. If a node fails,
    the service can be restarted on a different management node and the operation
    can resume from the same point when the node hosting the service failed. The incoming
    end user requests host one of the various management endpoints and are then redirected
    to a management node by a software load balancer.


    #### Redirector Services Node


    This provides TDS redirection to the Azure SQL database.


    The architecture also uses other services to achieve high availability (`SQL Server
    availability groups`), load balancing, and resource governance.


    ## Azure SQL Database Service Tiers


    Azure SQL Database is currently available in three service tiers with multiple
    performance levels, available under each service tier. For example, the standard
    tier has four performance levels—`S0`, `S1`, `S2`, and `S3`. Each performance
    level provides an increasing set of resources (compute power, memory, and storage)
    to provide increasing level throughput. The different service tiers and the various
    performance levels under each of the tiers are shown in Figure 8-3. Given that
    Azure is an ever-changing landscape, some of the information might change in the
    future. Up-to-date information can be found in the Azure document on MSDN.


    ![A371128_1_En_8_Fig3_HTML.jpg](A371128_1_En_8_Fig3_HTML.jpg)


    Figure 8-3. Service tiers for Azure SQL Database


    The resources available under each performance level are expressed in terms of
    Database Throughput Units (or `DTUs`). In very simple terms, `DTUs` describes
    the relative amount of compute power, memory, and IO throughput required to complete
    a database transaction. For example, the standard `S2` performance level provides
    50 `DTUs` of computational power, which equates to ∼50 database transactions per
    second. Similarly, the `P11` service tier provides 1750 `DTUs` and can perform
    ∼1750 transactions per second.


    When migrating from on-premises environments to an Azure SQL Database, you can
    use a publicly available (non-Microsoft) `DTU` throughput calculator to estimate
    the number of `DTUs` and consequently determine the service tier that might be
    required for your workload. The `DTU` calculator can be downloaded from `http://dtucalculator.azurewebsites.net/`.
    See Figure 8-4.


    ![A371128_1_En_8_Fig4_HTML.jpg](A371128_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. Database Throughput Units (`DTUs`) across various service tiers and
    performance levels'
