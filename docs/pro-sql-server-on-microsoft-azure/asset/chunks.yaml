    \ ($db.is_auto_close_on -eq $true)\n    {\n        Write-Host \"[ERR] Database\"\
    \ $db.name \"has Auto Close turned on\" -ForegroundColor Red\n        $RulePass\
    \ = 0\n    }\n}\nif ($RulePass -eq 1)\n{\n    Write-Host \"[INFO] No databases\
    \ found with Auto Close and Auto Shrink turned on\" -ForegroundColor Green\n}\n\
    ```\n清单 7-7. 用于确定任何数据库上是否启用了 AUTO CLOSE 和 AUTO SHRINK 的 PowerShell 代码\n\n在虚拟机上安装\
    \ SQL Server 后，您可能需要执行的一些维护任务包括：\n\n1.  更改数据库数据和日志文件的默认位置，以确保新的数据库文件托管在为托管 SQL\
