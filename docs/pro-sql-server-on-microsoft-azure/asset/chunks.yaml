    ## SQL 数据库审核


    SQL 数据库审核提供了跟踪数据库上关键事件并将其存储在 Azure 存储上的能力。这些审核日志随后可用于满足法规遵从性要求，或为数据库上的活动提供基准（或分析）。所有服务层级都支持审核。


    此外，审核可以在逻辑服务器级别（这将确保该服务器上的所有数据库都被审核）或数据库级别进行配置（参见图 9-24）。可以使用 Azure 门户或 PowerShell
    配置审核。


    ![A371128_1_En_9_Fig24_HTML.jpg](img/A371128_1_En_9_Fig24_HTML.jpg)

    图 9-24. 为 SQL 数据库配置审核


    注意：启用 SQL 数据库审核后，您可能需要更改下游客户端连接到 SQL 数据库的连接字符串，否则您的应用程序将无法连接到数据库。例如，启用审核后，复制到
    SQL 数据库的操作将会失败，因为分发服务器代理将无法连接到订阅服务器。在这种情况下，请确保使用连接字符串 `<server name>.database.secure.windows.net`。


    审核数据可以在 Azure 门户中以仪表板格式消费，也可以导出到 Excel 进行分析。


    ## SQL 数据库威胁检测


    SQL 数据库威胁检测提供了一种机制，用于检测并响应 SQL 数据库的潜在威胁（异常活动）。结合使用威胁检测和审核，用户可以调查并对数据库的任何此类威胁采取必要措施。可以使用
    Azure 门户轻松设置威胁检测，如图 9-25 所示。


    ![A371128_1_En_9_Fig25_HTML.jpg](img/A371128_1_En_9_Fig25_HTML.jpg)

    图 9-25. 配置威胁检测


