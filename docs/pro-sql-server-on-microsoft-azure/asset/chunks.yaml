    \ ARM 以查看与该订阅关联的 ARM 资源。这里引用的 CLI 版本默认在经典部署模型下运行。\n\n```\nazure login\nTo sign\
    \ in, use a web browser to open the page http://aka.ms/devicelogin. Enter the\
    \ code XXXXXXXXX to authenticate.\nazure account download\nazure account import\
    \ \nazure account list\nazure account set \nazure config mode arm\nListing 5-7.\
    \ 用于登录 Azure 并为 ARM 操作使用所需订阅的命令\n```\n\n![A371128_1_En_5_Fig12_HTML.jpg](A371128_1_En_5_Fig12_HTML.jpg)\n\
    图 5-12. `azure vm show` 命令的 Azure CLI 输出片段\n\n```\nazure vm list\nazure vm show\
    \  \nListing 5-8. 用于以 JSON 格式列出虚拟机和单个虚拟机属性的 Azure CLI 命令\n```\n\n## Summary\n\n\
    在本章中，你学习了如何使用向导和通过自动化将 SQL Server 实例部署到 Azure 虚拟机上。我们还讨论了许多将影响虚拟机性能和成本的考虑因素。"
