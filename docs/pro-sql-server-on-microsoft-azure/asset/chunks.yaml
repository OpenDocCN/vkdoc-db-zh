  trans: '

    # 使用扩展事件


    扩展事件（Extended Events 或 XEvents）并非新概念。自 SQL Server 2008 起，该功能就已包含在 Microsoft SQL
    Server 中。过去几年中，此功能已经过了大量优化和改进。通过 XEvents 可获取的信息量极其庞大，这一点可以从即将发布的 SQL Server 2016
    已公开近 1,200 个事件这一事实中得到印证。


    Azure SQL Database 上提供的扩展事件仅是 SQL Server 中可用功能的一个子集。这些扩展事件的作用域仅限于单个 Azure SQL
    数据库，这意味着针对一个 Azure SQL 数据库运行的扩展事件无法用于监控同一逻辑服务器上另一数据库的事件。


    清单 10-2 提供了一个示例脚本，可用于确定 Azure SQL Database 上扩展事件可用的事件/操作。


    ```sql

    SELECT

    o.object_type,

    p.name         AS [package_name],

    o.name         AS [db_object_name],

    o.description  AS [db_obj_description]

    FROM

    sys.dm_xe_objects  AS o

    INNER JOIN sys.dm_xe_packages AS p  ON p.guid = o.package_guid

    WHERE

    o.object_type in

    (

    ''event'',''action''

    )

    ORDER BY

    o.object_type,

    p.name,

    o.name;

    ```

    **清单 10-2.** 用于确定 Azure SQL Database 可用事件或操作的 T-SQL 脚本


    为 Azure SQL Database 配置扩展事件最简单的方法是使用 SQL Server Management Studio，如图 10-13 所示。在
    SSMS 中，可通过展开数据库节点来访问扩展事件。


    ![A371128_1_En_10_Fig13_HTML.jpg](img/A371128_1_En_10_Fig13_HTML.jpg)

    **图 10-13.** 访问扩展事件


    右键单击会话节点并选择 `新建会话向导` 或 `新建会话`，即可配置新会话。这两种选项都相当易于使用。


    以下是一个用于创建 XEvent 以监控阻塞和死锁的示例 T-SQL 脚本：


    ```sql

    CREATE EVENT SESSION [Sample_XEvents] ON DATABASE

    ADD EVENT sqlos.wait_info(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.blocked_process_report(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.database_xml:deadlock_report(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.lock_deadlock(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.sp_statement_completed(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),

    ADD EVENT sqlserver.sql_batch_completed(

    ACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text))

    ADD TARGET package0.event_file(

    SET filename=N''https://YourStorageAccountName.blob.core.windows.net/ContainerName/OutputFile.xel''),

    ADD TARGET package0.ring_buffer

    WITH (STARTUP_STATE=ON)

    GO

    ```


    可以创建类似的会话来监控 SQL 数据库上的其他事件。


    创建扩展事件需要 `CONTROL` 权限。此权限默认授予 `DBO` 用户。


    关于当前正在运行的 XEvent 会话以及通过 XEvents 公开的事件、操作、目标等的其他信息，可以从 Azure SQL Database 公开的多个
    DMV（动态管理视图）和目录视图中获取。以下是一些最常用的 DMV 和目录视图：


    *   `sys.dm_xe_database_session_events`：公开有关当前活动会话已配置事件的信息。

    *   `sys.dm_xe_database_sessions`：公开有关当前活动扩展事件会话的信息。

    *   `sys.database_event_sessions`：公开 SQL 数据库上配置的所有 XEvents 会话的信息。

    *   `sys.dm_xe_objects`：提供有关 Azure SQL Database 上 XEvents 公开的事件、操作、目标等的信息。此 DMV
    与 Microsoft SQL Server 中可用的类似。


    扩展事件有助于确定 Azure SQL Database 的性能问题或其他问题。但请注意，不要因捕获过多的会话或事件而使数据库过载。这样做可能导致内存过度提交，并最终引发数据库性能问题。


    ## 总结


    本章讨论了 `数据库吞吐量单元` (`DTU`) 以及选择正确的性能级别至关重要。我们探讨了如何更改 Azure SQL 数据库的服务层级和性能级别，然后介绍了
    Azure SQL 数据库和 Azure 管理门户上提供的各种性能优化和监控功能。

