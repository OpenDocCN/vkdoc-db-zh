  trans: '

    # 4. Microsoft Azure 网络


    借助 Microsoft Azure，您可以在微软数据中心内创建运行的`虚拟机`。您创建的这些虚拟机最终会成为某个工作组的一部分。传统上，您可以将应用程序托管在您的虚拟机上，而数据可能驻留在`SQL
    Server`上，而后者可能位于另一台虚拟机上。这些机器需要相互通信，因此您不仅需要连接它们，还需要在它们之间进行通信。为了从应用程序连接，您可以使用`SQL
    身份验证`或直通式 Windows 身份验证来连接到`SQL Server`，因为这些机器都位于同一个工作组中。


    全球各地分布着不同的数据中心，不同的客户和企业在 Microsoft Azure 中运行。它为在云中托管您的业务并降低`总拥有成本（TCO）`提供了完美的平台。因此，为了将您的业务托管在
    Microsoft Azure 中或存储数据，您可以使用这些遍布全球的数据中心之一。


    如图 4-1 所示，您可以通过三种不同的方式连接到这些数据中心：


    ![A371128_1_En_4_Fig1_HTML.jpg](img/A371128_1_En_4_Fig1_HTML.jpg)


    *图 4-1. 使用不同组件的典型设置*


    *   将本地网络连接到包含一组虚拟机的独立网络。

    *   使用`Azure AD Connect`将 Microsoft Azure 应用程序链接到本地 Windows 服务器。参见[`https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/`](https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/)。

    *   使用`Microsoft Azure 流量管理器`将请求路由到运行 Microsoft Azure 应用程序不同实例的多个数据中心。


    您也可以在云中创建`虚拟网络`。您可以在 Microsoft Azure 中创建测试环境，包含用于用户身份验证的域控制器（`DC`），并可以托管您的应用程序服务器。您的数据驻留在`SQL
    Server`中，该服务器配置在 Microsoft Azure 中，利用了大规模可扩展、高度安全的 Microsoft Azure 存储。您需要创建一个`虚拟网络`来配置安全的站点到站点连接以及云中受保护的私有`虚拟网络`。因此，您可以在
    Microsoft Azure 内构建完整的办公网络。


    在本章中，您将看到 Microsoft Azure 如何让您创建`VPN`，并允许您的本地网络连接并相互通信。您还可以将 Azure 应用程序与本地连接，并在不同数据中心之间分配负载。您还将了解一些关键的网络组件/概念，如果您有兴趣可以进一步研究。


    ## 网络入门


    将您的本地环境安全地连接到`虚拟网络`有助于扩展您的业务，并通过利用 Microsoft Azure 服务来降低成本。至少有三种选项可以帮助您连接和扩展混合网络：`站点到站点`、`站点到站点`和`ExpressRoute`。更多细节请参见图
    4-2 和表 4-1。


    *表 4-1. 选择最佳连接选项*


    | | `点到站点` | `站点到站点` | `ExpressRoute` |

    | --- | --- | --- | --- |

    | Azure 服务 | `云服务`和`虚拟机` | `云服务`和`虚拟机` | 大多数服务，请参阅附注中的链接 |

    | 带宽 | 小于`100MBPS` | 小于`100MBPS` | `50MBPS-10GBPS` |

    | 支持的协议 | `安全套接字隧道协议（SSTP）` | `IPSec` | 通过 VLAN、NSP 和 VPN 技术的直接连接 |

    | 连接弹性 | `主动-被动` | `主动-被动` | `主动-主动` |


    ![A371128_1_En_4_Fig2_HTML.jpg](img/A371128_1_En_4_Fig2_HTML.jpg)


    *图 4-2. 典型的混合设置*


    在您选择其中一种选项之前，应该考虑几点，例如以下几个问题：您的应用程序需要多少吞吐量？您的应用程序是否通过公共互联网连接？您是否有可用的公共 IP？您需要`VPN
    网关`吗？


    更多信息可以在这里找到：


    [`https://azure.microsoft.com/en-in/documentation/articles/expressroute-faqs/#supported-services`](https://azure.microsoft.com/en-in/documentation/articles/expressroute-faqs/#supported-services)


    [`https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-cross-premises-options/`](https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-cross-premises-options/)


    在当今业务横跨世界多个地区的时代，公有云可以巧妙地用作本地数据中心的扩展。云为您提供了灵活性，因为您可以按需创建虚拟机，如果不需要可以暂停/停止它们，并且一旦工作完成且不再需要时可以删除它们，即您只在业务需要时使用计算资源。此外，您在本地运行的现有应用程序将继续平稳运行。您可以快速创建包含`SharePoint`和`SQL
    Server`的`虚拟机`，并拥有一个可以与您现有本地`Active Directory`通信的`Active Directory`。


    ### 站点到站点连接


    `站点到站点`连接可用于将分支办公室连接到总部（主办公室）。在此类连接中，主机无需安装`VPN`客户端软件。位于本地环境中的`VPN`设备被配置为与 Azure
    `VPN 网关`建立安全连接。它通过`VPN 网关`发送`TCP/IP`数据包，这些网关对数据包进行封装和加密，并通过`VPN`隧道发送。然后，目的地的`VPN
    网关`接收数据包，解读数据包的头部和内容，然后将其发送到目标主机。


    以下描述了您可能会使用`站点到站点`连接的一些场景：


    *   用于创建混合解决方案。

    *   业务需求是持续可靠的网络连接。

    *   您不需要为将本地网络连接到`VPN`进行任何客户端配置。


    设置`站点到站点`连接的要求主要是您需要一个具有面向互联网`IP 地址`的兼容`VPN`设备。此设备应与`VPN 网关`类型兼容。

