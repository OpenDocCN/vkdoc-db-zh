    \ to pick pre-canned solutions like Availability Group deployment templates, which\
    \ allow you to deploy Availability Groups during deployment.\n\n#### Virtual Machine\
    \ Region\n\nFor certain compute deployment options, you can select the deployment\
    \ model (Classic or ARM). Once you select the image that you want to deploy, you\
    \ will be provided with a number of options to specify the virtual machine and\
    \ SQL Server settings (if you are using a SQL Server image). This part of the\
    \ journey is where you provide inputs to the Azure deployment workflow for configuring\
    \ various options for your environment. These options are constantly being reviewed\
    \ by the Microsoft Engineering teams. Enhancements and improvements to these options\
    \ are added during the sprint releases based on user inputs and available telemetry.\
    \ Once you start working with the cloud, you learn that the public cloud is like\
    \ the weather. You know the seasons and can sort of predict the weather based\
    \ on various signs, but you will be pleasantly surprised once in a while. The\
    \ only difference with the weather is that the enhancements and improvements showing\
    \ up in various workflows are to make your life easier rather than more difficult.\
    \ The Cloud Engineering teams are one of the most agile development organizations\
    \ within Microsoft.\n\nThe Basics settings view showing Figure [5-3](#A371128_1_En_5_Chapter.html#Fig3)\
    \ are common to all Azure Virtual Machine configuration wizards and they allow\
    \ you to specify the machine name, administrator username, password, and resource\
    \ group name (since we are using ARM). You also have the option to specify the\
    \ region, i.e., the data center where this virtual machine will be deployed, and\
    \ the subscription. These are very important things to consider, as these cannot\
    \ be changed using the portal after the deployment has completed. If you want\
    \ to move an existing Azure Virtual Machine to a different region or subscription,\
    \ you will need to write PowerShell commands to get this done. This is not something\
    \ that happens in the blink of an eye!\n\n![A371128_1_En_5_Fig3_HTML.jpg](A371128_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3.\n\nBasic settings configuration for Azure Virtual Machine\n\nPicking\
    \ a subscription is an easier consideration. You would want to pick the subscription\
    \ that should get billed for the resource usage and that would typically host\
    \ the other parts of your application. This decision does not have performance\
    \ considerations associated with it. However, picking the region for the virtual\
    \ machine has performance aspects associated with it. The easiest way to think\
    \ about the region is your data center. For a production environment, you would\
    \ pick the server blades and SAN which are colocated within the same data center.\
    \ Additionally, you would deploy your application in the same data center as well\
    \ preferably unless you have geo-dispersed requirement. The same logic applies\
    \ here. You would pick the same region for your compute, storage, and application\
    \ deployment. This would prevent network hops across data centers, which would\
    \ increase latency and negatively impact performance. This is one of the most\
    \ common deployment misconfigurations that have been noticed in multitier architectures\
    \ using Azure Virtual Machines."
