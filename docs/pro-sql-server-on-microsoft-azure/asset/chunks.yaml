- fmt: "# 优化 Azure VM 上的 SQL Server 性能\n\n```\n$RulePass = 1\n$sqlquery = \"select\
    \ distinct substring(physical_name,1,2) as drive,db_name(database_id) as dbname,\
    \ name, physical_name from sys.master_files where substring(physical_name,2,1)\
    \ = ':'\"\n$sqlDrives = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery\n\
    $Files = $sqlDrives | Where-Object {$_.drive -eq $TempDrive -and $_.dbname -ne\
    \ \"tempdb\"}\nforeach ($file in $Files)\n{\n    Write-Host \"[ERR] Database file\"\
    \ $file.name \"(physical file:\" $file.physical_name \") for database\" $file.dbname\
    \ \"is hosted on the temporary drive\" -ForegroundColor Red\n    $RulePass = 0\n\
    }\nif ($RulePass -eq 1)\n{\n    Write-Host \"[INFO] No files found on the temporary\
    \ drive\" $TempDrive -ForegroundColor Green\n}\nelse\n{\n    Write-Host \"[ERR]\
    \ Any data stored on\" $TempDrive \"drive is SUBJECT TO LOSS and THERE IS NO WAY\
    \ TO RECOVER IT.\" -ForegroundColor Red\n    Write-Host \"[ERR] Please do not\
    \ use this disk for storing any personal or application data.\" -ForegroundColor\
    \ Red\n}\n```\n清单 7-5. 检查文件是否托管在临时驱动器上的 PowerShell 代码\n\n### 存储空间\n\n存储空间是在虚拟机预配过程中常用的配置模式。如果您的指定设置需要多个磁盘，最新的库映像模板会在所有磁盘上创建一个\
    \ Windows 存储空间（虚拟驱动器）。您可能会思考是否有必要使配置复杂化。许多本地托管的数据库具有单个数据库文件，无法轻易拆分为多个文件。这可能是由于缺乏分区数据，这可能导致单个文件成为热点。\n\
    \n如果您使用的是 Windows Server 2012 或更高版本，可以使用存储空间将两个或更多驱动器分组到存储池中，然后使用该池中的容量创建称为存储空间的虚拟驱动器。Windows\
    \ 的此功能使您无需将数据库拆分为多个文件。但是，需要注意一些问题。\n\n第一个需要记住的问题是正确配置存储池的列数。增加列数可以显著提高顺序工作负载的性能。随机工作负载的性能提升不那么显著，在不同列数下表现出更均匀的性能。与空间的列数直接相关的另一个因素是未完成的\
    \ IO 量或要从存储空间读取或写入的数据量。大量的列数有利于生成足够负载以饱和多个磁盘的应用程序，但会对需求较低的应用程序引入不必要的容量扩展限制。如果数据磁盘超过八个，则需要使用\
    \ PowerShell 脚本来适当调整列数，如清单 [7-6](#A371128_1_En_7_Chapter.html#Par36) 所示。\n\n第二个需要记住的问题是弹性设置。存储空间提供三种弹性设置：简单、奇偶校验和镜像。如果您选择镜像，您的数据磁盘将对\
    \ SQL Server 实例生成的单个 IO 执行两个 IO 操作。建议使用镜像来提高弹性，但这会消耗您在 Azure 上的 IO 带宽。如果您只关心保护虚拟机免受磁盘故障的影响，这已经由\
    \ Azure 存储在后台完成（详见第 [3](#A371128_1_En_3_Chapter.html) 章），其中默认创建了承载数据文件的 blob 的冗余副本。\n\
    \n```\nNew-VirtualDisk -StoragePoolFriendlyName CompanyData -FriendlyName BusinessCritical\
    \ -ResiliencySettingName simple -Size 1TB -ProvisioningType Thin -NumberOfColumns\
    \ 2 -Interleave 65536\n```\n清单 7-6. 创建具有 2 个列数和简单弹性设置的虚拟磁盘存储池的 PowerShell 脚本示例\n\
    \n### Tempdb\n\nSQL Server 的临时数据库一直是优化不佳的查询的受害者，这些查询将操作溢出到 `tempdb`。困扰 `tempdb`\
    \ 的性能问题并非 Azure VM 独有的问题。如果配置不当，`tempdb` 性能是持续的头痛之源。为确保您的 `tempdb` 保持良好状态，请启用\
    \ `trace flag 1118 (-T1118)` 以防止并发线程在创建临时对象期间发生资源分配争用。\n\n增加 `tempdb` 中的数据文件数量以最大化磁盘带宽并减少分配结构中的争用是一个好主意。一般规则是，如果逻辑处理器的数量小于或等于八，则使用与逻辑处理器相同数量的数据文件。如果逻辑处理器的数量大于八，则使用八个数据文件。如果争用持续存在，则将数据文件数量增加四的倍数（最多为逻辑处理器的数量），直到争用降至可接受的水平，或者对工作负载/代码进行更改。如果虚拟机的临时驱动器是\
    \ SSD，建议将 `tempdb` 托管在临时磁盘上以提高性能吞吐量。\n\n图 [7-1](#A371128_1_En_7_Chapter.html#Fig1)\
    \ 清楚地表明，当 `tempdb` 托管在标准磁盘上时，性能不稳定，并且某些 IO 的延迟可能非常高。这将导致性能不稳定，这对于关键任务或关键业务工作负载来说是难以接受的。当将\
    \ `tempdb` 托管在 SSD 或高级 IO 磁盘上时，性能是稳定的，偏差可以忽略不计。\n\n![A371128_1_En_7_Fig1_HTML.jpg](A371128_1_En_7_Fig1_HTML.jpg)\n\
    图 7-1. SSD、高级 IO 和标准磁盘上的 `tempdb` 性能比较\n\n总之，如果您的应用程序需要一致的 `tempdb` 性能，选择 SSD\
    \ 或高级 IO 是最佳选择。\n\n### 数据库设置\n\n前面的部分详细介绍了了解 IO 模式和所需 IO 带宽如何帮助您以正确的配置部署 Azure\
