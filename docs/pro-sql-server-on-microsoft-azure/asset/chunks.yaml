  trans: '

    # 在 Azure 虚拟机上运行的 SQL/Oracle


    Azure 虚拟机允许用户配置 `Microsoft SQL Server`、`Oracle` 或任何其他 `DBMS` 的实例。正如在关于计算产品和虚拟机部分中所提及的，Azure
    市场提供了多种映像，可用于部署 `SQL Server` 实例（截至本书撰写时，有 `SQL 2012`、`SQL 2014` 和 `SQL 2016 RC`
    版本）或 `Oracle` 实例。此外，还可以使用自定义的 `VHD` 创建其他 `DBMS` 环境，并将该 `VHD` 上传到 Azure。


    # Azure SQL 数据库


    Azure SQL 数据库是一种关系数据库即服务，它提供了 `RDBMS` 的所有重要特性，包括事务一致性、数据完整性和多用户并发数据访问系统。Azure
    SQL 数据库构建在与 `Microsoft SQL Server` 相同的原则之上，并提供可比的功能。对于已经熟悉 `SQL Server` 的用户来说，适应
    Azure SQL 数据库不会很困难。Azure SQL 数据库采用 `PaaS` 服务模型，使用者控制访问模式，而平台则负责其他管理工作。Azure SQL
    数据库为数据库提供自动备份和时间点恢复功能。根据所使用的服务层，Azure SQL 数据库还以合理的成本提供高可用性选项。


    # Azure Blob 存储


    Azure Blob 存储（“blob 存储”和“存储 blob”是同一回事）是一种基于云的廉价存储解决方案，用于存储非结构化二进制数据（图 1-6）。可以将
    Azure Blob 存储视为二进制文件的文件存储，最大文件大小限制为 `1TB`。应用程序还可以利用 Azure 驱动器，这使得 blob 能够为挂载在
    Azure 实例中的 `Windows` 文件系统提供持久存储。应用程序看到的是普通的 `Windows` 文件，但其内容实际上存储在 blob 中。


    ![A371128_1_En_1_Fig6_HTML.jpg](img/A371128_1_En_1_Fig6_HTML.jpg)

    **图 1-6.** Azure 存储 Blob


    `Blob 存储`被许多其他 Azure 功能（包括虚拟机）所使用，因此它当然能够处理你的工作负载。


    # Azure 表存储


    表提供了一种 `NoSQL`/键值存储。表提供了对大量松散结构化和非结构化数据的快速、可靠且简单的访问。表提供非关系型或 `NoSQL` 存储。


    # 网络


    Azure 提供了多种选项来设置私有网络、虚拟专用网络和网络负载均衡。接下来描述最常用的选项。


    ## 虚拟网络


    Azure 虚拟网络 (`VNet`) 是 Azure 云中专用于订阅的逻辑分区。管理员对网络的 `IP`、`DNS` 设置和安全策略拥有完全控制权。它可以比作一个组织在防火墙后面运行的私有网络。Azure
    `VNet` 允许你创建子网，这些子网可根据需要用于进一步细分网络。Azure 允许用户使用 Azure 提供的多种连接选项之一，将 `VNet` 连接到其本地网络，如图
    1-7 所示。


    ![A371128_1_En_1_Fig7_HTML.jpg](img/A371128_1_En_1_Fig7_HTML.jpg)

    **图 1-7.** Azure 虚拟网络


    ## VPN 连接选项


    连接选项允许用户将其本地网络与其 Azure 网络连接起来。这些选项包括：


    -   点到站点 `VPN` 连接

    -   站点到站点 `VPN` 连接

    -   `ExpressRoute` 连接


    ### 点到站点 VPN 连接


    点到站点 `VPN` 允许用户从其本地网络中的一台客户端计算机创建到其 Azure 虚拟网络的安全连接。点到站点连接必须在需要连接到虚拟网络的每台客户端计算机上单独配置。点到站点连接不需要
    `VPN` 设备，而是使用需要在每台客户端计算机上安装的 `VPN` 客户端。`VPN` 是通过从本地客户端计算机手动启动连接来建立的。


    ### 站点到站点 VPN 连接


    站点到站点 `VPN` 允许用户在其本地网络与其 Azure 虚拟网络之间建立安全连接。站点到站点 `VPN` 连接需要位于本地网络上的 `VPN` 设备，并且必须配置为与
    Azure `VPN` 网关建立安全连接。连接建立后，本地网络和 Azure 虚拟网络中的资源可以直接安全地通信。与点到站点 `VPN` 连接不同，站点到站点连接不需要为本地网络上访问虚拟网络中资源的每台客户端计算机建立单独的连接。


    ### ExpressRoute 连接


    Azure `ExpressRoute` 允许用户在其本地网络与 Azure 数据中心之间建立专用连接。`ExpressRoute` 连接不通过公共互联网，而是使用专用的互联网通道，因此与通过互联网的典型连接相比，它提供了更高的可靠性、更好的安全性和更低的延迟。如图
    1-8 所示，`ExpressRoute` 不使用公共互联网来连接你的本地环境与 Azure。


    ![A371128_1_En_1_Fig8_HTML.jpg](img/A371128_1_En_1_Fig8_HTML.jpg)

    **图 1-8.** Azure ExpressRoute


    # 开发者服务


    Azure 提供了多项可供开发者利用的服务，以编写优化且高性能的代码。除了提供编写代码的多项功能外，Azure 还提供了在运行应用程序时自动化测试和捕获遥测数据的方法。


    ## Visual Studio Team Services


    `Visual Studio Team Services` 提供了一项服务，用于开发和交付应用程序、与团队共享代码、跟踪应用程序开发以及对用任何语言编写的应用程序进行负载测试。


    ## Application Insights


    `Application Insights` 是一项可扩展的分析服务，允许用户监控其实时应用程序性能。它可以帮助检测和诊断性能问题，并为应用程序提供遥测数据。开发者可以使用该服务持续改进其应用程序代码的性能和可用性。`Application
    Insights` 适用于使用 `.Net`、`J2EE` 开发并托管在本地或云端的基于 Web 的和独立的应用程序，如图 1-9 所示。


    ![A371128_1_En_1_Fig9_HTML.jpg](img/A371128_1_En_1_Fig9_HTML.jpg)

    **图 1-9.** Azure Application Insights


    # 身份与访问管理


    `Windows Azure Active Directory` 提供了强大且安全的身份服务，有助于在云中控制和管理目录及访问管理。它还提供无缝登录 Azure
    资源的体验，并通过多因素认证增强安全性。


    ## Active Directory


    Azure Active Directory (`AAD`) 是一种身份和访问管理解决方案，为组织提供了管理用户和组的能力，就像本地 Active Directory
    解决方案一样。`AAD` 有助于为本地和云中的资源提供安全访问。`AAD` 提供三种服务层：免费版、基本版和高级版。


    # 备份


    Azure 提供了大量简单可靠的备份服务，可在需要时用于确保业务连续性和灾难恢复。


    ## Azure Site Recovery


    `Site Recovery` 是一项 Azure 服务，通过协调将你的本地服务器和虚拟机复制到次要本地数据中心或 Azure，来为你的业务连续性和灾难恢复
    (`BCDR`) 策略做出贡献。`Site Recovery` 处理复制过程，你可以通过简单点击启动故障转移和恢复。

    '
- fmt: '## Summary


    In this chapter, we learned the basic principles of cloud computing and the different
    service models available with cloud computing. We then discussed the Microsoft
    Cloud Computing platform, which included Azure and some of the key services available
    with Azure.


    # 2. Azure Architecture


    Today cloud computing has matured and has clear demarcations between the different
    classes of service—platform, software, and infrastructure. Microsoft offers services
    in all three categories. But before we jump into them, let us first understand
    the nuances involved in cloud services. In this chapter, we will understand how
    Infrastructure as a Service (IaaS) works. Think of IaaS as a pizza where your
    favorite pizza vendor provides the frozen pizza and you need to manage the stuff
    that is used to warm and serve the pizza. In the IaaS world, this usually means
    that the vendor provides all the hardware, including the computing power, network,
    and storage along with its associated services. All you do is use the combination
    of the infrastructure offerings, which allows you to deploy any application or
    service on that platform.


    Microsoft’s Azure platform is not just about hyper-scale abstraction of virtualization
    fundamentals. There is also a large amount of innovation that Azure drives in
    the form of its data centers. Let’s quickly look at how the hardware behind the
    concepts described here are laid out. The Microsoft cloud server specification
    essentially provides the blueprints for the data center servers Microsoft uses
    to deliver a diverse portfolio of cloud services. They offer dramatic improvements
    over traditional enterprise server designs: up to 40 percent server cost savings,
    15 percent power efficiency gains, and 50 percent reduction in deployment and
    service times. Microsoft hosts its cloud services on owned and leased data centers
    across the world, which spans over a million servers and over hundred data centers.


    There are some interesting strategic decisions that were made to get Azure to
    where it is today. The most interesting is the cost factor. Cost is always a discussion
    point in the IT world and Microsoft decided to reduce cost of hosting these environments
    by allocating against key cost drivers. This is fundamentally different from how
    the standard cost calculation works, which involves association of cost with the
    amount of space used. In contrast, Azure uses key factors like energy consumption,
    bandwidth consumption, incident response, and server capacity for determining
    cost.


    In 2014, Microsoft contributed the Open Cloud Server design to the Open Compute
    Project, which allows the industry to benefit from the company’s experience in
    setting up data centers for the various cloud-based services that it managed.


    In the next few sections, we will learn how compute, network, and storage is organized
    in Azure and the internals that you would need to know to make an IaaS offering
    work for you.


    ## The Azure Services


    Azure today offers a multitude of services in all three categories—PaaS, SaaS,
    and IaaS—and it keeps growing. The biggest challenge about writing a book on Azure
    is not whether the book will remain current after you have written it but whether
    it remains current while you are writing it. The world of sprints, shortened release
    cycles, and agile development methods ensures that the consumer of technology
    receives the technology content as quickly as possible.


    Instead of naming the various services that Azure offers today, you will just
    learn about the different areas that Azure can help you and your business. In
    the recent times, Azure has increasingly sought to gain parity between what you
    are used to in the on-premises world and what you see in action in Azure. This
    means that the lines between your data centers and the Azure data centers are
    becoming increasingly fuzzy and a user of your platform will very rarely be able
    to gauge the difference between what is running on Azure and on-premise (unless
    you put a banner on their application that proclaimed its host data center).


    Azure today offers services for:


    *   Management and security like key value and operational insights

    *   Developer services like Visual Studio Team Services

    *   Identity and access management like Azure Active Directory, multifactor authentication

    *   Hybrid integration like BizTalk, Site recovery

    *   Media and CDN like media encoding, media indexer

    *   Internet of Things (IoT), like Event Hub, Stream Analytics

    *   Analytics like Data Lake, HDInsight, Machine Learning, Data Factory

    *   Data and Storage like SQL Database, DocumentDB, SQL Data Warehouse

    *   Web and mobile like Web Apps, API Management


    As you see, Azure is more than just a bunch of hardware running your virtual machines.
    All of these solutions make use of certain parts of Azure’s compute, storage,
    and networking. In the next few chapters, we will delve deep into the internals
    of the Azure’s compute, storage, and networking, but in this chapter, we will
    understand how all of this is tied together.'
