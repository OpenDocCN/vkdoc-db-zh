  trans: '

    ### 设计决策


    微软 Azure 存储的设计基于一些关键的客户业务需求：


    *   **强一致性**。对于企业客户而言，在将他们的关键业务应用程序迁移到云端时，一致性至关重要。执行乐观并发控制所需的条件读取、写入和删除操作对他们来说极为重要。因此，微软
    Azure 存储根据 CAP 定理提供了三个属性——**强一致性**、高可用性和分区容错性。

    *   **全局可扩展的命名空间存储**。借助微软 Azure 存储，您可以存储海量数据，并能从全球任何地方一致地访问它。微软 Azure 将 DNS 作为命名空间的一部分，并将命名空间分为三部分——存储账户名称、分区名称和对象名称
    (`http(s)://AccountName.<Service>.core.windows.net/PartitionName/ObjectName`)。

    *   **灾难恢复**。借助微软 Azure 存储，数据被存储在全球分散的多个数据中心中。这是为了确保在任何情况下都能保护客户数据，抵御地震、火灾、风暴等自然灾害。

    *   **可扩展性**。数据需要具备可扩展性，应能根据峰值流量需求自动扩展并进行负载均衡。

    *   **多租户**。许多客户可根据其需求，由同一个共享存储提供服务，从而降低了存储成本。


    高级存储具有以下重要特性：


    *   **持久性**。高级存储建立在本地冗余存储技术之上，该技术将数据副本存储在同一区域内。这是为了确认企业工作负载数据的持久性。仅当写入操作已被 LRS
    系统持久化复制后，才会向应用程序确认写入成功。

    *   **新的 `"DS"` 系列虚拟机**。新的 DS 系列虚拟机支持高级存储数据磁盘。您可以利用一种新的复杂缓存功能，该功能可实现读取操作的极低延迟。

    *   **Linux 支持**。通过 Linux 集成服务 4.0，微软已为更多 Linux 版本提供支持。有多种发行版已经过微软 Azure 高级存储的验证，例如
    Ubuntu（版本 12.04、14.04、14.10 和 15.04）、SUSE 12 等。


    ## Azure 存储架构内部原理


    存储戳是在微软 Azure 基础结构上的一组存储节点机架集群，每个机架位于具有冗余网络和电源的独立域中（参见图 3-5）。


    ![A371128_1_En_3_Fig5_HTML.jpg](img/A371128_1_En_3_Fig5_HTML.jpg)


    图 3-5.

    存储戳架构


    所有的读写操作都针对这些存储集群。目标是使存储戳在容量、事务和带宽方面的利用率保持在 70%左右，以便为更高的吞吐量获得更好的寻道时间。这提供了针对存储戳内机架故障的更强弹性。


    位置服务管理所有存储存储戳。它执行诸如账户负载平衡和账户分配等操作，并处理这些存储戳之间的地理复制。位置服务本身也跨两个地理位置分布，以实现其自身的灾难恢复。


    **注意**


    有关微软 Azure 存储的更多信息，我们推荐以下网站：


    [`http://sigops.org/sosp/sosp11/current/2011-Cascais/printable/11-calder.pdf`](http://sigops.org/sosp/sosp11/current/2011-Cascais/printable/11-calder.pdf)


    [`https://blogs.msdn.microsoft.com/windowsazurestorage/2011/11/20/sosp-paper-windows-azure-storage-a-highly-available-cloud-storage-service-with-strong-consistency/`](https://blogs.msdn.microsoft.com/windowsazurestorage/2011/11/20/sosp-paper-windows-azure-storage-a-highly-available-cloud-storage-service-with-strong-consistency/)


    ### 复制引擎


    存在两种复制引擎：戳内复制（流层）和戳间复制（分区层）。


    戳内复制提供同步复制，并确保所有数据在存储戳内都是持久的。它在不同故障域之间保留足够不同的数据副本，以防磁盘、节点或机架故障。这由分区层完成，并且位于客户写入请求的关键路径上。仅当数据在戳内复制成功后，才会向客户端返回成功。


    戳间复制通过在后台延迟复制数据来提供异步复制。这是一个对象级别的复制，要么复制整个对象，要么复制最近的更改。此复制用于在两个位置保留数据以实现灾难恢复，在存储戳之间迁移账户的数据。它通过优化使用存储戳间的网络带宽，提供针对地理灾难的地理冗余。


    ### 存储戳内的层次结构


    存储戳内有三个层次（参见图 3-6）：


    ![A371128_1_En_3_Fig6_HTML.jpg](img/A371128_1_En_3_Fig6_HTML.jpg)


    图 3-6.

    分区层中的动态负载均衡


    *   **流层/分布式文件系统层**。这是最底层，负责处理磁盘并将数据存储到磁盘。这意味着它将比特位存储在磁盘上，并将数据复制到许多服务器上，以保持数据在存储戳内的持久性。可以将其视为存储戳内的分布式文件系统层。数据被存储到称为“扩展区”的文件中，它们在区域内升级域和故障域之间被复制三次。这是一个仅追加的文件系统，因此数据永远不会被覆盖。数据会被追加到扩展区的末尾。

    *   **分区层**。这一层有两个独特的目的。它理解数据抽象。它理解什么是 Blob、什么是表实体、什么是消息，以及如何对这些对象执行事务。因此，它确保事务排序和乐观并发控制，在流层之上存储对象数据，并缓存对象数据以减少磁盘
    I/O。该层还负责对存储戳内的所有对象进行分区。该层还负责一个大规模可扩展的索引，该索引用于索引所有 Blob、表实体和队列。有一个主节点负责获取此索引，并根据索引的负载将其分解为范围分区。这些对象根据分区名称值被分解为不相交的范围，并由不同的分区服务器提供服务（即，它管理哪个分区服务器为
    Blob、表和队列的哪个分区范围提供服务）。这样做是为了对访问大索引的 TPS 流量进行负载均衡。

    *   **前端层**。为 Blob、表和队列提供 REST 协议。用于身份验证、授权以及日志记录和收集指标。


    您可能想知道，在这种仅追加的文件系统中是如何提供结构化存储系统的？即，当文件系统是仅追加时，如何允许仅更新 Blob/表？


    从高层次看，数据抽象在分区层被视为日志（流）。对数据的任何更新都会被追加到日志中，这意味着它们被追加到日志的最后一个扩展区。可以将其视为扩展区的链表链接。因此，追加操作只发生在最后一个扩展区。所有先前的扩展区都被封存，永不向其追加数据。然后数据被提交并成功返回给客户端。与此同时，所有最近的更新都存储在内存中，并在后台进行处理，因此会在关键写入路径之外懒惰地处理这些检查点。然后这些更新被合并到一棵
    B+树中。因此，存在用于提交更新的日志，然后是检查点，以及用于查找您数据最新版本的树。

    '
- fmt: "### Maintaining Availability/Consistency for Read Requests\n\nSince all replicas\
    \ that are maintained bitwise are identical, this implies that they can be read\
    \ from any replica.\nFor read availability, parallel read requests are sent out\
    \ and the first request that comes back is taken and the data is provided to the\
    \ customers. Now during processing of the read requests if high latency is noticed,\
    \ in parallel, another read request is issued for it to be processed. The one\
    \ that returns first will be sent to the client.\n\n### Load Balancing of Partition\
    \ Layer\n\nBy load balancing an attempt is made to balance the `TPS`, i.e., load\
    \ balance the index. In Figure [3-6](#A371128_1_En_3_Chapter.html#Fig6), the master\
    \ continuously monitors the loads to the partition servers as well as to each\
    \ partition. If it finds one of the partitions to be too hot, which means that\
    \ this partition is getting far too many requests to be processed, the master\
    \ can decide quickly to take this range partition and split it into smaller range\
    \ partitions (one of the ways to deal with such issues).\nOnce the partition is\
    \ moved to the different partition server that’s comparatively less loaded, it\
    \ updates the partition map. The front-end can then forward the requests pertaining\
    \ to the specific range to this new server, which eventually balances the transactions\
    \ per second. An important part to note is that no data moves (in the `DFS` layer)\
    \ during this whole process; it just takes the partition range index and updates\
    \ it so that the the partition map knows which partition server to forward the\
    \ requests to.\n\n### Load Balancing of the DFS Layer\n\nFor load balancing at\
    \ the `DFS` layer, the load is monitored for storage nodes, which is used to determine\
    \ which replica the data will be read from. In parallel, there is a process to\
    \ perform the parallel reads in background based on 95% latency.\nFor writing,\
    \ the load is monitored for the nodes and the replicas that is being appended\
    \ to. When some node appears overloaded, it seals the replica and starts appending\
    \ to a new extent. That’s placed at the end of the log.\n\n### Load Balancing\
    \ of DFS Capacity\n\nThe replicas are moved around to ensure that all nodes have\
    \ disks with some free space to be used. The `DFS` layer is an append only system,\
    \ which means it would never write anything in place. It is important to have\
    \ some free space where it would always append. This way hot spots are avoided\
    \ in storage nodes. In addition, if there is a bad node/disk or if a rack is lost,\
    \ they have to ensure a faster way to replicate the extents across all nodes/disks.\
    \ With available disk space, this can be done quickly.\n\n## Durability Offerings\
    \ with Azure Storage\n\nThere are three types of durability offered with Azure\
    \ Storage.\n*   `LRS` (Local Redundant Storage ). Stores three replicas of data\
    \ within a single zone in a single region. All the three replicas will be in the\
    \ same zone, thus providing durability despite node/rack/disk failure.\n*   `ZRS`\
    \ (Zone Redundant Storage ). Available for block blobs and stores three replicas\
    \ of data across multiple zones and is designed to keep all three replicas in\
    \ the same region, but not mandatory as sometimes you might just store it in different\
    \ region as well. In addition to this, it provides durability over `LRS` as now\
    \ the data is durable against zone-related failures (such as a fire in a facility\
    \ in a zone).\n*   `GRS` (Globally Redundant Storage ) . You store six replicas,\
    \ three in the primary region and three in the secondary region, geographically\
    \ dispersed. This provides additional durability to protect data against major\
    \ regional catastrophic disaster(s), such as storms, tornados, earthquakes, or\
    \ hurricanes.\n\n### Azure Premium Storage\n\n`Azure Premium Storage` was introduced\
    \ by Microsoft. It helps deliver high-performance, low-latency disk support for\
    \ virtual machines running I/O-intensive workloads. It uses `SSD` (solid state\
    \ drives) to store the data. If your workload needs high throughput and you want\
    \ to take advantage of the speed and performance of these disks, `Premium Storage`\
    \ should be your choice.\nFor `Azure Virtual Machine` workloads that need consistent\
    \ high `IO` performance and low latency, `Premium Storage` is appropriate. In\
    \ order to host `IO` intensive workloads like `OLTP`, `Big Data`, and `Data Warehousing`\
    \ on platforms like `SQL Server`, `MongoDB`, `Cassandra`, and others, `Premium\
    \ Storage` is a good choice.\nWith `Premium Storage`, your application can store\
    \ up to `64TB` of data per `VM` and can give you throughput of `80Kbps IOPs` (`Input\
    \ Output Operations per Second`) per `VM` and `2000Mbps` disk throughput per `VM`.\n\
    There are quite a few points you need to keep in mind in order to use `Premium\
    \ Storage` :\n*   You need a `Premium Storage` account. `Premium Storage` accounts\
    \ can be created using storage `REST APIs` version `2014-02-14` or later (Storage\
    \ and Service Management), `PowerShell 8.10` or later, or the `Ibiza portal` (\
    \ [`https://portal.azure.com`](https://portal.azure.com) ). When you create a\
    \ `Premium Storage` account using `PowerShell`, you need to specify the `type`\
    \ parameter as `Premium_LRS`. For example:\n    ```\n    New-AzureStorageAccount\
    \ -StorageAccountName \"Testpremiumaccount\" -Location \"East US\" -Type \"Premium_LRS\"\
    \n    ```\n*   Not all regions support `Premium Storage`. Currently, the Central\
    \ US, East and West US, Northern and Western Europe, East and West Japan, Southeast\
    \ Asia, and Eastern Australia support it.\n*   It only supports `Azure page blobs`,\
    \ as it is used to hold persistent disks that can be used for `Azure Virtual Machines`.\n\
    *   It is locally redundant and keeps three copies of data in same region.\n*\
    \   In order to use `Premium Storage`, you need to provision either `GS-series`\
    \ or `DS-series` of `VMs`.\n*   For all `Premium` data disks, the default disk\
    \ caching policy is `read-only` and `Premium` operating system disks attached\
    \ to the `VM` are set to `read-write`.\n*   For `Premium Storage` accounts, the\
    \ `IOPs` depends on the size of the disk. At present there are three types of\
    \ premium disks—`P10`, `P20`, and `P30`. See Table [3-1](#A371128_1_En_3_Chapter.html#Tab1)\
    \ for `IOPs` and throughput specifications.\n\n    Table 3-1. Premium Disk Storage\
    \ limits\n\n    | Disk Type | P10 | P20 | P30 |\n    | --- | --- | --- | --- |\n\
    \    | Disk size | 128GB | 512GB | 1TB |\n    | IOPS (per disk) | 500 | 2300 |\
    \ 5000 |\n    | Throughput (per disk) | 100Mbps | 150Mbps | 200Mbps |\n\nUsing\
    \ `PowerShell`, you can create a `VM` using `Premium Storage`. The following code\
    \ snippets/cmdlets can be used to try this out. Note they are just cmdlets and\
    \ should be used as such. There are `MSDN` links that you can refer to as well;\
    \ see [`https://msdn.microsoft.com/en-us/library/mt607148.aspx`](https://msdn.microsoft.com/en-us/library/mt607148.aspx)\
    \ ."
