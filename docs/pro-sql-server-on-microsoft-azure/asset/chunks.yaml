    \ cmdlet 来执行基于 JSON 模板的部署。该 cmdlet 提供了一个选项，可以使用 `-TemplateParameterFile` 开关来指定参数列表。\n\
    \n## Azure CLI\n\n如果你是自动化爱好者，那么 Azure 命令行接口 (CLI) 很可能是你下一个要下载的工具！适用于 Windows、Mac\
    \ 和 Linux 的 Microsoft Azure Xplat-CLI 是一个项目，它为开发人员和 IT 管理员提供了一个跨平台的命令行界面，用于开发、部署和管理\
    \ Microsoft Azure 应用程序。本节引用的 CLI 版本是 0.9.15 (node: 4.2.4)。你需要在你的机器上安装 `node.js`\
    \ 才能操作 Azure CLI。\n\n在开始使用 CLI 命令之前，你需要配置你的设置并登录到你的订阅。清单 [5-7](#A371128_1_En_5_Chapter.html#Par78)\
    \ 和 [5-8](#A371128_1_En_5_Chapter.html#Par79) 展示了登录 Azure 的步骤，这需要你提供身份验证详细信息并在\
