    \n图 1-1. 表示视图—服务模型\n\n### 平台即服务\n\n虽然 SaaS 模型可能是满足组织大部分软件需求的完美解决方案，但缺乏根据业务需求自定义和更改服务的能力使其对一些组织来说不可用。由于没有可用的自定义选项，SaaS\
    \ 服务有时无法满足用户业务各个方面的需要。在这种情况下，企业必须投入时间和资源来构建软件能力以弥补这些差距。值得庆幸的是，云计算提供了平台即服务模型，它可以填补这一空白，并允许消费者创建和运行自定义应用程序。PaaS\
    \ 提供具有极高可扩展性和弹性的云托管应用服务器。\n\n在 PaaS 模型中，云供应商提供一个预先配置的、虚拟化的应用服务器环境，组织或用户可以向其中部署他们自定义的内部构建的应用程序。云供应商确保应用服务器的维护、打补丁和可用性，而组织需要管理和维护运行在应用服务器上的自定义应用程序。在部署这些应用程序期间，开发人员定义应用程序的资源需求（CPU、网络、内存等）。云计算配置引擎使用此资源需求定义（通常作为配置文件的一部分），并创建并绑定运行应用程序所需的必要基础设施。PaaS\
    \ 是客户构建新应用程序的理想解决方案，因为迁移遗留应用程序可能需要大量的应用程序重新设计以符合 PaaS 模型的规则。"
- fmt: '### Infrastructure as a Service


    The Infrastructure as a Service (IaaS) model provides hosted server environments,
    which can be used to deploy and run software services. IaaS is very similar to
    what organizations have been traditionally doing, where they build physical or
    virtualized servers on-premises and run their software on these servers. The difference
    between IaaS and the traditional approach is that, in the IaaS world, the servers
    are hosted in vendor’s data centers, rather than the enterprise’s data center.
    This can be perceived as a rent-a-server model, where the organizations pay for
    the use of the servers on an as-needed basis. In the IaaS model, users have full
    control over what software runs on these servers, the DR and high availability
    requirements, and the customization needed for the software. Depending on the
    vendor, the users may also have the flexibility to upsize or downsize the servers
    as per demand. Additionally, depending on the vendor and the type of server provisioned,
    the server may include additional software, such as the operating system, an Exchange
    server, or an RDBMS server.


    Given the flexibility and ability to customize the provisioned server, IaaS can
    be used to migrate legacy applications easily to the cloud, but build a cloud
    server that mimics the on-premises server configurations.


    ### Software as a Service


    The Software as a Service (or SaaS) model helps users consume software services
    hosted by a cloud computing vendor. In the SaaS model, cloud computing vendors
    host a software service or application and make it accessible to customers in
    a subscription-based model. The customers use these services on a pay-as-you-go
    basis. Given that SaaS is based on a subscription-based usage model, the users
    have a choice to suspend, stop, reduce, or increase their use of the services.


    In the SaaS model, the software service configuration and the underlying hardware
    infrastructure are not accessible to the end users. As such, users cannot change
    the services or features offered. SaaS offers a highly sharable multi-tenant environment,
    where thousands and millions of users can operate at the same time, in a mutually
    exclusive and highly secure context. SaaS also offers a very agile platform, which
    can help users reduce their “go-to-market” time and help them focus on their core
    business projects without worrying about the IT challenges of managing and maintaining
    an environment for their IT needs.


    ## Microsoft Azure


    Azure is a cloud computing platform developed by Microsoft for creating, deploying,
    and managing applications and services through a global network of Microsoft managed
    or Microsoft partner hosted data centers. Azure provides cloud-based services
    in all the three service models: Software as a Service (SaaS), Platform as a Service
    (PaaS), and Infrastructure as a Service (IaaS).


    Azure provides a cloud-hosted server and the other infrastructure resources like
    storage, network, and other integration infrastructure for creating, deploying,
    and running applications. Azure relies on massive groups of commodity, off-the-shelf
    hardware in providing the cloud computing environment. Figure [1-2](#A371128_1_En_1_Chapter.html#Fig2)
    shows a representational Azure resource model where application servers along
    with storage, network, and other compute resources are provisioned on demand by
    the policies set during deployment. The Azure Fabric Controller, with its dedicated
    set of highly redundant and highly available servers and software, is the intelligence
    behind the entire Azure environment.


    ![A371128_1_En_1_Fig2_HTML.jpg](A371128_1_En_1_Fig2_HTML.jpg)

    *Figure 1-2. Representational resource model—Microsoft Azure*


    Azure compute resource pool consists of a very large pool of commodity hardware
    resources, which are configured in a highly redundant and highly available setup.
    This high availability and redundancy is maintained and managed by the Azure Fabric
    Controller.


    The Fabric Controller is designed to detect any kind of failures and take necessary
    action to mitigate the risks of those failures. These actions could include spawning
    new resources and migrating the resources to a different pool of hardware resources.
    The Fabric Controller is also responsible for upsizing or downsizing the resources
    based on user requests.


    ## Azure Services


    Azure offers a plethora of services, which are grouped together in different categories,
    as illustrated in Figure [1-3](#A371128_1_En_1_Chapter.html#Fig3). Some of the
    services that are used commonly or are needed with SQL deployments in Azure are
    discussed below.


    ![A371128_1_En_1_Fig3_HTML.jpg](A371128_1_En_1_Fig3_HTML.jpg)

    *Figure 1-3. Azure services*


    ### Compute Offerings


    Microsoft Azure provides three important compute offerings, which can be utilized
    to run web sites and applications. The Azure web sites and Azure Cloud Services
    use Azure Virtual Machines to run the web sites and applications, while abstracting
    the tasks of managing the creation and administrations from the users. These two
    services provide PaaS offerings, while the third option—Azure Virtual Machine
    (VMs)—provides full control to the users, to create and manage their VMs. Azure
    Virtual Machines provides an IaaS offering.


    #### Virtual Machines


    Azure Virtual Machines provides users with complete control over the creation,
    configuration, and management of the virtual machines and the applications running
    on them. Azure Virtual Machines allows for creating of VMs using VHDs uploaded
    to Azure or by leveraging VHD images available in the Azure VHD gallery, as illustrated
    in Figure [1-4](#A371128_1_En_1_Chapter.html#Fig4). Azure provides a plethora
    of VHDs for different editions/versions of Windows, Linux, and other server applications,
    such as SQL Server, BiTalk, Oracle, etc.


    ![A371128_1_En_1_Fig4_HTML.jpg](A371128_1_En_1_Fig4_HTML.jpg)

    *Figure 1-4. Azure Virtual Machines*


    Azure Virtual Machines allows configuration and addition of multiple virtual disks
    to a VM. These disks can be configured either on the Standard Storage or the Solid
    State Devices (SSDs) based Premium Storage.


    #### Azure WebApps (Formerly Azure Websites)


    Azure WebApps, formerly Azure Websites, provides a managed web environment using
    the Azure Management portal as well as APIs. Apart from the ability to create
    new web sites on the cloud, Azure WebApps also allows for the migration of any
    existing web sites to the cloud. WebApps provides the ability to upsize or downsize
    the resources on demand. Creating an Azure WebApps service basically creates a
    VM with IIS and associated storage, as illustrated in Figure [1-5](#A371128_1_En_1_Chapter.html#Fig5).
    The creation and management of these VMs is encapsulated from the end users.


    ![A371128_1_En_1_Fig5_HTML.jpg](A371128_1_En_1_Fig5_HTML.jpg)

    *Figure 1-5. Azure WebApps*


    Azure WebApps is available in both a Share Tenant model, where resources are shared
    between multiple web sites, and a Standard model, which provides dedicated resources
    to the web site. The ability to upsize or downsize the instances is only available
    with Standard model.


    #### Cloud Services


    As with Azure Websites, Azure cloud services use VMs to execute workloads, while
    providing the users with some control over the configuration of the VMs. For example,
    the VMs can be accessed remotely and additional software can be installed on the
    VMs. Azure Cloud services provide two different variants of VMs. Instances of
    web roles run a variant of Windows Server with IIS, while instances of worker
    roles run the same Windows Server variant without IIS. A cloud services application
    relies on some combination of these two options.


    ### Data Management Offerings


    Windows Azure provides several ways to store and manage data. This diversity of
    services allows users to utilize Azure to address a variety of business requirements
    and problems. Azure provides the following four major data management offerings.'
