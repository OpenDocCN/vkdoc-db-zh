- fmt: "## Azure Resource Explorer\n\n如果你想获取已部署的任何 ARM 资源的 JSON 表示形式（甚至包括你订阅中其他人部署的资源，前提是你拥有权限），那么请访问\
    \ Azure Resource Explorer (`resources.azure.com`)。这可以说是另一种复制粘贴体验，尽管如果你不太熟悉 `GET`\
    \ 和 `PUT` 这些行话，可能会觉得有点新奇！你可以使用 Web UI 来浏览你订阅中的资源。\n\n在我们离题太远之前，Azure Resource\
    \ Explorer 提供了一种方法来检查你现有的部署，并从中创建模板。GitHub 上的 Azure-QuickStart-Templates 仓库下有一大批可用模板。如果你喜欢挑战，可以使用\
    \ Visual Studio 2015 从零开始创建一个 Azure 资源管理器模板。但是，需要预先警告的是，即使是经验最丰富的专业人士，在从头开始创建模板的过程中调试错误时，也常因忽略一些显而易见的疏漏而急得抓狂。这种挫败感最无害的一个例子，就是在虚拟机部署过程中未能发现未使用强密码。\n\
    \n图 [5-11](#A371128_1_En_5_Chapter.html#Fig11) 所示的右窗格提供了针对你资源的 `GET` 和 `PUT` 选项。当你分别点击\
    \ Documentation（文档）和 PowerShell 选项卡时，你还可以获得资源方法的文档以及用于创建资源的等效 PowerShell 命令。一个\
    \ Azure 模板包含以下组件：\n\n![A371128_1_En_5_Fig11_HTML.jpg](A371128_1_En_5_Fig11_HTML.jpg)\n\
    图 5-11. Azure 资源管理器门户\n\n*   Schema（架构） 提供了 JSON 架构文件的位置，该文件描述了模板语言的版本。在当今快速变化的世界中，这一点非常重要。\n\
    *   Content Version（内容版本） 指定了要使用的模板版本。\n*   Parameters（参数） 是可以为每次部署自定义的值。\n* \
    \  Variables（变量） 在模板中用作 JSON 片段，以简化模板语言表达式。\n*   Resources（资源） 是要部署或更新的服务类型，例如虚拟机、存储帐户等。\n\
    \n以下来自 Azure Resource Explorer UI 的 PowerShell 代码用于获取虚拟机的实例视图和模型视图：\n\n```\n$vRM\
    \ = Get-AzureRmResource -ResourceGroupName  -ResourceType Microsoft.Compute/virtualMachines\
    \ -ResourceName  -ApiVersion 2015-06-15\n## Additional command to get the list\
    \ of data disks attached to the virtual machine\n$vRM.Properties.StorageProfile.DataDisks\n\
