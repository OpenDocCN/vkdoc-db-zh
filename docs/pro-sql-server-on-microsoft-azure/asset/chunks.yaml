  trans: '

    ## 监控


    既然我们讨论到了改掉旧习惯这个话题，那么有一点很重要需要指出：您在本地或虚拟化 SQL Server 实例上习惯使用的几乎所有数据收集和分析工具，在 Azure
    VM 上托管的 SQL Server 实例中，其工作方式都大致相似。在接下来的几页中，您将熟悉 Azure 为运行在 Azure VM 上的 SQL Server
    提供的新的监控功能。


    作为 DBA，您可能面临的最常见的问题之一是如何监控运行在 Azure VM 上的 SQL Server 实例的性能。最简单的答案之一就是使用 Azure
    门户。图 7-6 展示了在虚拟机登陆页面上可用的一组自定义磁贴。您可以将图 7-6 中所见视图中的组和磁贴添加进来。


    ![A371128_1_En_7_Fig6_HTML.jpg](img/A371128_1_En_7_Fig6_HTML.jpg)


    图 7-6. Azure 门户监控仪表板


    门户允许您在各种可捕获的性能监视器计数器上配置警报。图 7-7 展示了为特定机器配置的警报规则，以及当警报条件满足时可执行的操作。可以为虚拟机配置大量常见的警报——例如磁盘、CPU、内存、网络以及与
    SQL 性能计数器相关的阈值。要使 SQL 性能指标可用，您必须在“诊断”选项卡下启用收集 SQL 指标（参见图 7-7）。这也可以在配置过程中完成，相关说明在第
    5 章中。


    ![A371128_1_En_7_Fig7_HTML.jpg](img/A371128_1_En_7_Fig7_HTML.jpg)


    图 7-7. 为虚拟机配置基于性能的警报


    如果您想采用工厂化方法为大量虚拟机设置警报，可以使用预置脚本通过`Add-AlertRule` cmdlet 来实现。对警报的响应可以是一封电子邮件，和/或将警报发布到
    Web 挂钩，由后者进一步处理警报。


    ## 操作见解


    一些最佳实践检查是任何 SQL Server 实例通用的，与其位置无关。既然我们正在讨论托管在 Azure 虚拟机上的 SQL Server 实例，这或许是一个审慎的机会来讨论`Operational
    Insights`，它同时适用于本地和 Azure 虚拟机。


    `Operational Insights`是 Microsoft 操作管理套件的一部分，是一个为 IT 运营团队量身定制的软件即服务解决方案。这项服务利用
    Azure 的强大功能，从任何数据中心或云的、几乎任何 Windows Server 和 Linux 来源收集、存储和分析日志数据，并将这些数据转化为实时的操作情报，帮助您做出更明智的决策。


    图 7-8 展示了 Azure 操作见解仪表板。该服务提供了许多其他高价值的益处，例如启用变更跟踪、容量规划、恶意软件评估等，这些作为解决方案显示在“解决方案库”中。尽管详细介绍库中所有可用的解决方案超出了本章的范围，但探索库中的解决方案是值得的，即使对于
    SQL Server 环境也是如此！


    ![A371128_1_En_7_Fig8_HTML.jpg](img/A371128_1_En_7_Fig8_HTML.jpg)


    图 7-8. 显示已启用解决方案的 Azure 操作见解主页


    要开始使用`Operational Insights`，您需要下载一个代理程序，该程序必须安装并使用工作区 ID 和存储密钥进行配置，代理将使用这些信息将数据上传到
    Azure。配置好代理后，您的首要任务是启用 SQL 评估解决方案。这提供了大量检查项，归类在以下标题下：


    *   安全与合规

    *   可用性与业务连续性

    *   性能与可扩展性

    *   升级、迁移和部署

    *   操作与监控

    *   变更和配置管理


    根据收集到的数据，您的 SQL Server 实例可能不会在某些类别中报告问题，而在其他类别中则可能显示较多的红色（警告）！图 7-9 展示了对不同评估领域的高低优先级建议。


    ![A371128_1_En_7_Fig9_HTML.jpg](img/A371128_1_En_7_Fig9_HTML.jpg)


    图 7-9. SQL 评估显示在不同领域识别出的问题


    这些磁贴具有额外的钻取功能，允许您获取附加信息，例如报告问题的 SQL Server 实例、受影响对象的名称以及所报告问题的补充阅读材料。您甚至会获得针对所报告问题的建议纠正措施，如图
    7-10 所示。


    ![A371128_1_En_7_Fig10_HTML.jpg](img/A371128_1_En_7_Fig10_HTML.jpg)


    图 7-10. Azure 操作见解报告的性能问题详细信息


    SQL 评估会检查本章前面讨论的许多部署后的性能注意事项，例如 tempdb 配置。此服务有一个免费层级，保留期为七天，每日限额为 500MB。如果您想处理更多数据并具有更长的保留期，特别是对于大量实例，您可能需要为`Operational
    Insights`使用付费层级。


    ## 速查表


    如果您觉得这些信息在短时间内难以消化，这里有一份速查表，可以作为设置托管 SQL Server 的虚拟机的快速参考。


    1.  为企业版选择至少 DS3，为标准版选择 DS2。如果您有高网络带宽需求，可能需要选择更高的虚拟机层级。

    2.  对于高性能工作负载使用高级存储，并确保计算和存储位于同一区域。

    3.  为存储账户禁用异地复制。

    4.  如有必要，使用单独的 P30 磁盘来存放数据、日志和 tempdb 文件，分配单元大小设为 64K。不要将数据和日志文件放在同一驱动器上。在必要时创建存储池。

    5.  使用高级存储时，为数据和 tempdb 数据磁盘启用读取缓存，为存放日志文件的数据磁盘不启用缓存。对于标准数据磁盘，不要启用缓存。

    6.  为数据库禁用`AUTO CLOSE`和`AUTO SHRINK`，并尽可能防止自动增长。

    7.  授予 SQL Server 服务账户以下安全特权：锁定内存中的页和性能卷维护任务（即时文件初始化）。

    8.  执行压缩的数据库备份到 Azure Blob。


    ## 本章小结


    本章解释了在 Azure 虚拟机上运行 SQL Server 实例时需要遵循的最佳实践和建议。我们还探讨了 Azure 门户、Azure 服务和 PowerShell
    中可用的选项，用于验证运行 SQL Server 的环境是否已落实性能最佳实践和建议。标准诊断数据收集技术适用于 Azure 虚拟机，但利用混合的、支持云的新选项以及新门户提供的挂钩功能，使工作变得容易得多。


    当您运行 GitHub 仓库(`SqlOnAzureVM`)中提供的最佳实践检查时，您将看到图 7-11 所示的输出。


    ![A371128_1_En_7_Fig11_HTML.jpg](img/A371128_1_En_7_Fig11_HTML.jpg)


    图 7-11. 在托管 SQL Server 的 Azure 虚拟机上执行最佳实践检查的结果

