- fmt: '# Smart Backup


    Smart Backup is one of the new features of SQL Server 2014 that uses the Azure
    infrastructure for taking intelligent backups. Following are a few of the key
    differences with traditional backups:


    *   Backup is based on intelligence rather than on schedule

    *   Completely managed by SQL Server

    *   Backup retention is automatically managed

    *   Backup retrieval is more reliable


    Smart Backup can be configured at the instance level or at the DB level. The only
    input parameter required is the retention period, which ranges from 1 to 30 days.
    When Smart Backup is enabled at instance level, existing databases need to be
    added manually; however new databases will automatically be added to the schedule.
    Backups can be stored in encrypted or unencrypted form. To enhance security, keys
    can be regenerated at regular intervals. The following script needs to be run
    to enable this feature:


    ```sql

    -- Enable Smart Backups

    EXEC smart_admin.sp_set_db_backup

    @database_name=''TestDB'',

    @retention_days=30,

    @credential_name=''cred1'',

    @encryption_algorithm=''NO_ENCRYPTION'',

    @enable_backup=1

    GO

    ```


    If you want backups that are created using the smart backup feature to be encrypted,
    you need to create the key, certificate, and the credentials. You could have the
    key rotated at regular intervals for security purposes; this can be done by using
    the secondary key and regenerating it (see Listing [6-1](#A371128_1_En_6_Chapter.html#Par72)).


    ```sql

    Use master;

    Go

    --Create a master key

    Create master key encryption by password=''Password@123''

    Go

    --Create a certificate

    Create certificate mycert1 With subject =''MySmartBackup''

    If exist (select * from sys.credentials where name = ''cred1'')

    Drop credential cred1

    --Create a Credential

    Create credential cred1

    With identity =''StorageAccountName'',

    Secret = ''SAS KEY''

    --Smart backup enabled at Instance level.

    Use msdb;

    GO

    EXEC smart_admin.sp_set_instance_backup

    --@database_name=''TestDB''

    @retention_days=30

    ,@credential_name=''cred1''

    ,@encryption_algorithm =''AES_128''

    ,@encryptor_type= ''Certificate''

    ,@encryptor_name=''mycert1''

    ,@enable_backup=1;

    GO

    -- Smart backup enabled at DB level.

    Use msdb;

    GO

    EXEC smart_admin.sp_set_db_backup

    @database_name=''TestDB''

    ,@retention_days=30

    ,@credential_name=''mycred1''

    ,@encryption_algorithm =''AES_128''

    ,@encryptor_type= ''Certificate''

    ,@encryptor_name=''Mycert1''

    ,@enable_backup=1;

    GO

    --View managed backup configuration at the instance level

    Select * from msdb.smart_admin.fn_backup_instance_config ()

    --View configuration details

    Select * from msdb.smart_admin.fn_backup_db_config ('''')

    Listing 6-1.

    Creating the Key for Smart Backup Encryption

    ```


    For ad hoc backups, use the following, but note that it could break the chain
    and a fresh full backup would need to be triggered:


    ```sql

    --On Demand backup to the cloud

    exec msdb.smart_admin.sp_backup_on_demand ''TestDB'',''log''

    exec msdb.smart_admin.sp_backup_on_demand ''TestDB'',''database''

    ```


    The following provides more information on how to create backups for a database
    with SQL Server managed backups to Windows Azure.


    [`https://msdn.microsoft.com/en-IN/library/dn451012.aspx`](https://msdn.microsoft.com/en-IN/library/dn451012.aspx)


    # AlwaysOn Configuration on Azure VMs


    AlwaysOn has evolved over the years. Many of our customers can’t afford a DR site.
    They can be costly in terms of purchasing the hardware, maintenance can be an
    overhead, and you need to have an operations team to run the site. So it adds
    to your total cost. For such customers, we wanted to provide a solution for disaster
    recovery and therefore, starting in 2012, we added replica in Microsoft Azure
    (VMs) . This is an IaaS offering where you can have SQL server running on virtual
    machines. As it stands today, we have quite a few customers who run their reporting
    workload on the Azure and take backups from there and can use it as a DR site.
    This way, they offload the backups and don’t touch the primary server. There are
    a few points to check before making such a setup :


    *   The latency shouldn''t be so much that the secondary can''t catch up and ends
    up lagging far behind.

    *   Confirm that the data that’s stored in the secondary replica on a different
    data center complies with the data protection and security norms.


    You can have your main data center on-premises and add your secondary replica
    on Azure. The requirements needed for this setup are discussed shortly.


    In 2014, we introduced a new wizard where you can add the replica in the cloud,
    end-to-end. Suppose you needed to configure an AlwaysOn Availability Group, and
    you know that you need machines. You would need to install Windows Failover Cluster,
    and then you would need to enable AlwaysOn, take a backup and restore it, and
    then post it to start synchronization. The environment is then validated using
    this new wizard.


    This wizard also has built-in logic, whereby if there is a failure it will retry
    automatically. It has timeouts set as well.


    Today, its easy to extend the Availability Group to Azure VM; it is cheap compared
    to keeping it on-premises. In this case, you need to pay for VM, storage, and
    the traffic going out. You get free ingress traffic and with no DR site cost in
    terms of hardware, so it works quite well for a DR site. You have your secondary
    replica in a different site, so during DR you manually failover to the secondary
    replica. You can thus offload your work to the primary site, i.e., reporting and
    BI to the readable secondary on Azure. You can take backups as well. The only
    thing that you need to do is configure site-to-site VPN tunnel between on-premises
    and Azure. After you do this, you can extend your AlwaysOn configuration.


    The following are the requirements for extending your on-premises data center
    with AlwaysOn AG:


    *   A valid subscription

    *   An existing AlwaysOn Availability group within your on-premises network

    *   Connectivity between your on-premises network and the Azure Virtual Network
    using a VPN device. You can read more here: [`https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-site-to-site-create/`](https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-site-to-site-create/)


    Once this is done, you can use the Add Azure Replica wizard, which will help you
    extend your existing AG by adding another replica to the Microsoft Azure as follows:


    1.  From SQL Server Management Studio, go to AlwaysOn Availability Group and then
    Availability Groups to provide the name of the Availability Group.

    2.  Right-click on the availability replicas and then click on Add Replica.

    3.  The wizard shown in Figure [6-9](#A371128_1_En_6_Chapter.html#Fig9) appears.


    ![A371128_1_En_6_Fig9_HTML.jpg](A371128_1_En_6_Fig9_HTML.jpg)


    Figure 6-9.

    Add replica wizard GUI

    4.  Connect to your existing replicas by using the Connect or Connect All button.

    5.  On the next screen, you will be presented with Figure [6-10](#A371128_1_En_6_Chapter.html#Fig10).


    ![A371128_1_En_6_Fig10_HTML.jpg](A371128_1_En_6_Fig10_HTML.jpg)


    Figure 6-10.'
