    ## Microsoft Azure 存储中的 SQL Server 文件


    SQL Server 2014 具有一项独特功能，可原生支持将 SQL Server 数据库存储于 Microsoft Azure 存储中。现在，您可以在本地或在
    Microsoft Azure 托管的虚拟机上创建数据库，并将数据存储在 Microsoft Azure Blob 存储中。通过分离和附加存储在 Microsoft
    Azure 存储中的文件，可以轻松地在不同环境之间移动数据库。


    ### 创建数据文件和凭据


    创建数据文件时，您需要执行以下操作：


    1.  创建一个存储账户及其内部的容器。

    2.  创建一个具有该容器策略的 SQL Server 凭据。

    3.  使用共享访问签名访问该容器。


    使用将文件存储在 Microsoft Azure 存储中的原生功能时，您需要：


    1.  在容器上创建策略并生成 SAS 密钥。要获取 SAS 密钥，请从 [`https://azurestorageexplorer.codeplex.com/`](https://azurestorageexplorer.codeplex.com/)
    下载 Microsoft 存储资源管理器。

    2.  每个容器都需要一个凭据，其名称必须与 `containers` 路径匹配。


    ### 优势与架构


    图 6-6 展示了您的数据库可以驻留在本地，也可以驻留在 Microsoft Azure 中的 Azure 虚拟机上。


    ![A371128_1_En_6_Fig6_HTML.jpg](img/A371128_1_En_6_Fig6_HTML.jpg)


    **图 6-6.** 存储在 Microsoft Azure 存储账户中的数据文件


    如图所示，我们有一个在 Azure 虚拟机中创建的 `DB3`，其文件驻留在 Azure 存储上。另一方面，`DB6` 驻留在本地环境，但其文件存储在 Azure
    存储中。在 Windows Azure Blob 存储服务上使用 SQL Server 数据文件的优势如下：


    *   **可移植性。** 可以轻松地将数据库从 Windows Azure 虚拟机（IaaS）分离，并将该数据库附加到云中的不同虚拟机上；此功能也适用于实现高效的灾难恢复机制，因为所有内容在
    Windows Azure Blob 存储中都是直接可访问的。要迁移或移动数据库，请使用引用 Blob 位置的单个 `CREATE DATABASE` Transact-SQL
    查询，且对存储账户和计算资源位置没有限制。如果操作系统和/或 SQL Server 维护需要较长的停机时间，您还可以使用滚动升级场景。

    *   **数据库虚拟化。** 结合 SQL Server 2012 和 SQL Server 2014 中的包含数据库功能，数据库现在可以作为每个租户的自包含数据存储库，然后可以动态移动到不同的虚拟机以实现工作负载再平衡。有关包含数据库的更多信息，请参阅
    SQL Server 联机丛书中的以下主题：

    *   **高可用性和灾难恢复。** 由于所有数据库文件现在都是外部托管的，即使虚拟机崩溃，您也可以从另一个热备用虚拟机附加这些文件，准备接管处理工作负载。本书后面的“实现故障转移集群机制”一节提供了此机制的实际示例。

    *   **可扩展性。** 在 Windows Azure 中使用 SQL Server 数据文件，您可以绕过单个虚拟机上可挂载的 Windows Azure
    磁盘最大数量的限制。每个 Windows Azure 磁盘在每秒最大 I/O 操作数（IOPS）方面存在限制。


    让我们看一下架构并简化一下。增强功能是在 SQL Server 引擎层内部实现的。集成在三个层面完成；图 6-7 将稍微简化这个概念。


    *   **管理层。** 这包括一个名为 `XFCB Credential Manager` 的新组件，它管理访问 Windows Azure Blob 容器所需的安全凭据并提供必要的安全接口。机密信息在
    `master` 系统数据库中的 SQL Server 内置安全存储库中以加密方式维护和保护。

    *   **文件控制层。** 包含一个名为 `XFCB` 的新对象，这是文件控制块（FCB）的 Windows Azure 扩展，用于管理针对 NTFS 文件系统上每个
    SQL Server 数据或日志文件的 I/O；它实现了针对 Windows Azure Blob 存储进行 I/O 所需的所有 API。

    *   **存储层。** 在存储层，SQL Server I/O 管理器现在能够以极小的开销和极高的效率原生生成对 Windows Azure Blob 存储的
    REST API 调用；此外，此组件可以生成有关性能计数器和扩展事件（xEvents）的信息。


    ![A371128_1_En_6_Fig7_HTML.jpg](img/A371128_1_En_6_Fig7_HTML.jpg)


    **图 6-7.** SQL Server 存储引擎文件 I/O


    ### 实施示例


    以下是一个使用此概念创建示例数据库的示例：


    ```sql

    -- 在 Windows Azure 存储中创建文件的数据库

    -- 步骤 1：创建凭据

    CREATE CREDENTIAL [https://storageaccountName.blob.core.windows.net/testcontainer]

    WITH IDENTITY=''SHARED ACCESS SIGNATURE'',

    SECRET = ''SECRET KEY''

    ```


    此密钥是使用 Azure 存储资源管理器生成的。


    1.  选择 `testcontainer` 并单击工具栏上的安全按钮。

    2.  单击“共享访问签名”选项卡。

    3.  单击“生成签名”按钮以生成 SAS 签名（参见图 6-8）。


    ![A371128_1_En_6_Fig8_HTML.jpg](img/A371128_1_En_6_Fig8_HTML.jpg)


    **图 6-8.** Blob 和容器安全对话框：存储资源管理器


    一旦您使用图 6-8 中的数据获取到字符串后，请按照以下步骤操作。


    1.  使用该字符串作为 `SECRET`，即签名字符串中 `?` 之后的部分。

    2.  在 Windows Azure 容器中创建具有数据和日志文件的数据库，如下所示：


    ```sql

    CREATE DATABASE FirstHybridDB

    ON

    ( NAME = FirstHybridDB_dat,

    FILENAME = ''https://storageaccountname.blob.core.windows.net/testcontainer/FirstHybridDB.mdf''
    )

    LOG ON

    ( NAME = FirstHybridDB_log,

    FILENAME =  ''https://storageaccountname.blob.core.windows.net/testcontainer/FirstHybridDB_Log.ldf'')

    ```

