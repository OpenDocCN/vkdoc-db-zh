  trans: '

    ### 弹性数据库池


    Azure SQL 数据库还允许在弹性数据库池中创建和管理多个数据库。为了更详细地理解弹性数据库池，请考虑一个示例。


    假设有一个 ISV 为多个客户提供 SaaS（软件即服务）服务。对于每个客户，该 ISV 都需要配置一个数据库作为软件服务的后端。这些客户的高峰使用时间和需求各不相同。假设客户
    A 的高峰使用量在每秒 200 个连接到 1000 个连接之间变化。这种负载变化可能并不局限于一天中的特定时间。在这种情况下，配置一个单一服务层级的数据库，使其能同时保证最佳性能和成本效益变得很困难。由于用户负载可能不依赖于时间，ISV
    更可能不得不配置一个满足峰值负载需求的最高服务层级的数据库。这显然不是一个经济高效的解决方案。


    弹性数据库池为这类问题提供了一个解决方案。简而言之，弹性数据库池提供了一组与该池关联的共享 DTU（更精确地说是 eDTU），可供池中的数据库使用。例如，考虑一个标准的
    S3 层级弹性池，它有大约 800 个 DTU。用户最多可以在此池中创建 400 个数据库，这将允许这些数据库共享和消耗 DTU 资源，而无需为池中的数据库分配特定的性能级别。这种安排允许多个具有不同工作负载的数据库最佳地使用池中可用的
    DTU。图 8-5 列出了不同服务层级下弹性池的各种限制。


    ![A371128_1_En_8_Fig5_HTML.jpg](img/A371128_1_En_8_Fig5_HTML.jpg)


    图 8-5. 不同服务层级的弹性池限制


    ### 服务层级：限制与功能


    Azure SQL 数据库可用的每个服务层级都有特定的限制，其中一些在图 8-6 和以下列表中提及。再次如前所述，更新信息可在 MSDN 上的 Azure
    文档中找到。


    *   最大数据库大小。指定数据库大小限制的最大值。如表中所示，基本层级数据库的最大限制为 2GB，而高级 P11 数据库的最大限制为 1TB。

    *   自动备份和时间点恢复。Azure SQL 数据库提供自动完整备份和日志备份功能。这些备份可以在服务层级规定的保留期内的任何时间点进行恢复。例如，默认情况下标准层级的数据库备份保留
    14 天，因此可以恢复到过去 14 天内的任何时间点。我们将在第 9 章全面介绍高可用性、业务连续性和灾难恢复。

    *   最大内存中 OLTP 存储。指定允许用于存储内存中 OLTP 对象的最大内存量。这仅适用于高级层级，因为其他层级不支持内存中 OLTP 优化。

    *   最大并发请求数。可在数据库上执行的并发用户或应用程序请求的最大数量。熟悉 Microsoft SQL Server 的读者可能记得，SQL Server
    提供了一个 DMV `sys.dm_exec_requests`，用于列出服务器上运行的所有活动请求。类似的 DMV 可与 WASD 一起使用，以获取数据库在任何时间点的活动请求总数。

    *   最大并发登录数。这表示允许同时登录到数据库的用户或应用程序数量的限制。此限制不适用于弹性数据库池。


    ![A371128_1_En_8_Fig6_HTML.jpg](img/A371128_1_En_8_Fig6_HTML.jpg)


    图 8-6. 服务层级的功能与限制


    ## 管理工具


    Azure SQL 数据库的管理（创建、更新、迁移等）可以通过以下任何工具完成：


    *   Azure 门户

    *   SQL Server Management Studio

    *   SQL Server 数据工具

    *   命令行实用程序和 REST API


    这些将在接下来的章节中讨论。


    ### Azure 门户


    Azure 门户是一个基于 Web 的应用程序，提供创建、删除、恢复和管理 Azure SQL 数据库及相关逻辑服务器的功能。它还提供监控数据库性能、配置安全性和高可用性以及更改数据库服务层级的能力。


    让我们看看可以使用 Azure 门户完成的一些重要任务：创建数据库和管理数据库属性。


    #### 创建数据库


    使用 Azure 门户创建数据库时（此示例使用新版 Azure 门户），我们可以选择使用现有服务器或创建新的逻辑服务器。如果在数据库创建过程中创建新服务器，用户可以选择服务器和数据库所在的数据中心。（参见图
    8-7，该图表明新数据库将创建在东南亚数据中心的逻辑服务器 `tnkl47icl` 上。）


    ![A371128_1_En_8_Fig7_HTML.jpg](img/A371128_1_En_8_Fig7_HTML.jpg)


    图 8-7. 创建新 SQL 数据库时选择服务层级和性能级别


    用户还可以选择正在创建的数据库的服务层级和性能级别，如图 8-7 所示。数据库创建后，可以使用管理门户更改其服务层级和性能级别。


    #### 管理数据库属性


    Azure 门户可用于启用、禁用或更改数据库的属性。如图 8-8 所示，Azure 门户还可用于恢复、导出、更改服务层级以及启用或禁用数据库上的审核和监视。


    ![A371128_1_En_8_Fig8_HTML.jpg](img/A371128_1_En_8_Fig8_HTML.jpg)


    图 8-8. 通过 Azure 门户可用的数据库详细信息和管理选项


    Azure 门户最重要的用途之一是配置来自客户端 IP 的连接的防火墙例外。默认情况下，Azure 会阻止所有传入 SQL 数据库的流量。在任何客户端工具（如
    SQL Server Management Studio (`SSMS`) 或 SQL Server 数据工具 (`SSDT`)）访问数据库之前，必须添加例外。


    此设置是在服务器级别执行的，如图 8-9 所示。


    ![A371128_1_En_8_Fig9_HTML.jpg](img/A371128_1_En_8_Fig9_HTML.jpg)


    图 8-9. 为 Azure SQL 数据库服务器配置防火墙选项


    注意：审核、安全性、监视、高可用性和性能故障排除将在后续章节中介绍。

    '
- fmt: '### SQL Server Management Studio


    SQL Server Management Studio，一个自2005年以来随SQL Server提供的广为人知的管理工具，可用于管理和开发Azure SQL数据库。如图[8-10](#A371128_1_En_8_Chapter.html#Fig10)所示，`SSMS`可用于连接到Azure
    SQL数据库并在数据库上执行管理或其他操作。


    ![A371128_1_En_8_Fig10_HTML.jpg](A371128_1_En_8_Fig10_HTML.jpg)


    图 8-10。


    使用SQL Server Management Studio (`SSMS`)连接到SQL数据库。


    Azure SQL数据库支持SQL身份验证和Windows身份验证（当使用本地AD和Azure AD之间的AD联合时）。


    连接到Azure SQL数据库时，需要指定作为数据库创建一部分创建的逻辑SQL服务器的名称。逻辑SQL服务器数据库的名称始终采用图[8-10](#A371128_1_En_8_Chapter.html#Fig10)中所示的格式。


    ![A371128_1_En_8_Fig11_HTML.jpg](A371128_1_En_8_Fig11_HTML.jpg)


    图 8-11。


    使用SQL Server Management Studio探索SQL数据库。


    `SSMS`可用于执行许多活动，例如：


    *   使用扩展事件进行监控和管理

    *   数据库创建、设计和开发

    *   管理安全


    以下`T-SQL`命令可用于创建一个Azure SQL数据库：


    ```

    CREATE DATABASE MyTestDatabase3

    (

    MaxSize = 1 GB, ---> Maximum Size of the Database. This value cannot be grater
    than the size supported by the Service Tier

    Edition = ''Standard'', --> The Service Tier for the Database

    Service_Objective = ''S0'' --> Performance Level For the Database.

    )

    ```


    在此示例中，我们正在标准服务层创建一个性能级别为`S0`（10 `DTU`）的数据库。我们还指定数据库的最大大小为1GB。


    注意


    连接到Azure SQL数据库时，常规SQL数据库中可用的某些管理功能或能力将不可用。例如，无法右键单击Azure SQL数据库并对其进行备份。


    ### SQL Server Data Tools (SSDT)


    `SSDT`是一个免费的可下载实用程序，可用于构建SQL Server关系数据库、Azure SQL数据库、`SSIS`包、`SSAS`数据模型和`SSRS`报告。使用`SSDT`，您可以像在Visual
    Studio中开发应用程序一样，以相同的简单性设计和部署任何SQL Server内容类型。


    `SSDT`主要是一个可用于设计Azure SQL数据库的开发环境。用于连接到SQL数据库的连接字符串与`SSMS`使用的字符串相同。图[8-12](#A371128_1_En_8_Chapter.html#Fig12)说明了如何使用`SSDT`连接到Azure
    SQL数据库。


    ![A371128_1_En_8_Fig12_HTML.jpg](A371128_1_En_8_Fig12_HTML.jpg)


    图 8-12。


    使用`SSDT`连接到并设计Azure SQL数据库。


    ### Command-Line Utilities and REST APIs


    像PowerShell这样的命令行实用程序可用于创建和管理Azure SQL数据库。同样，Azure公开了一组`REST API`，可用于处理Azure SQL数据库。


    PowerShell可用于执行与Azure SQL数据库相关的几乎所有操作。清单[8-1](#A371128_1_En_8_Chapter.html#Par55)使用Azure
    PowerShell cmdlets执行以下任务：


    1.  登录Azure。

    2.  选择要使用的订阅。

    3.  选择现有的`ResourceGroup`或创建新的。创建新的`ResourceGroup`时，脚本允许用户选择数据中心。

    4.  选择现有的逻辑服务器或创建新的。

    5.  配置防火墙规则以允许从客户端计算机连接到逻辑服务器。

    6.  配置SQL数据库。脚本在基本服务层配置一个数据库。


    ```

    #Login to your Azure Subscription.

    Add-AzureRmAccount

    #Get a list of all the Subscriptions associated with the login

    $subscriptions = Get-AzureRmSubscription

    #Choose a Valid Subscription from the list returned by the Previous Command

    $count = 1

    Foreach ($subscription in $subscriptions)

    {

    Write-Host $count.ToString() " -:" $subscription.SubscriptionName

    $count +=1

    }

    Write-Host "Choose the Subscription where the databases has to be deployed -"
    -ForegroundColor Yellow

    $SubsChoice = Read-Host

    $Arrayindex = $SubsChoice-1

    Select-AzureRmSubscription -SubscriptionId $subscriptions[$Arrayindex].SubscriptionId

    #Get the Azure ResourceGroups available in the Subscription or create a New ResourceGroup

    $resourceGroupName = ""

    $DCLocation = ""

    $option = Read-Host "Do you want to use an existing Resource Group (y/n) :-"

    if($option -eq "y")

    {

    $ResGroups = Get-AzureRmResourceGroup | Where-Object{$_.ResourceGroupName -NotLike
    "Default*" }

    #Choose a Valid Subscription from the list

    $count = 1

    Foreach ($ResGroup in $ResGroups)

    {

    Write-Host $count.ToString() " -:" $ResGroup.ResourceGroupName

    $count +=1

    }

    Write-Host "Choose the ResourceGroup to which the databases has to be deployed
    -" -ForegroundColor Yellow

    $ResGrChoice = Read-Host

    $Arrayindex = $ResGrChoice-1

    $resourceGroupName = $ResGroups[$Arrayindex].ResourceGroupName

    $DCLocation = $ResGroups[$Arrayindex].Location

    }

    Else

    {

    Write-Host "Enter the New ResourceGroup Name" -ForegroundColor Yellow

    $resourceGroupName = Read-Host

    $locations = Get-AzureLocation

    $count=1

    Foreach ($location in $locations)

    {

    Write-Host $count.ToString() " -:" $location.Name

    $count +=1

    }

    Write-Host "Choose a Data Center Location " -ForegroundColor Yellow

    $LocChoice = Read-Host

    $Arrayindex = $LocChoice-1

    $DCLocation = $locations[$Arrayindex].Name

    try

    {

    $resourceGroup = New-AzureRmResourceGroup -Name $resourceGroupName -Location $DCLocation

    }

    catch

    {}

    }

    #Select either an existing logical server or create a new logical server for the
    database.

    $SQLDBServerName = ""

    $option = Read-Host "Do you want to use an existing SQL Database Server (y/n)
    :-"

    if($option -eq "y")

    {

    $logicalServers = Get-AzureRmSqlServer -ResourceGroupName $resourceGroupName

    #Choose a Valid SQLDatabase Server from the list

    $count = 1

    Foreach ($logicalServer in $logicalServers)

    {

    Write-Host $count.ToString() " -:" $logicalServer.ServerName

    $count +=1

    }

    Write-Host "Choose the Logical SQLDatabase Server where the databases has to be
    deployed -" -ForegroundColor Yellow

    $SrvChoice = Read-Host

    $Arrayindex = $SrvChoice-1

    $SQLDBServerName = $logicalServers[$Arrayindex].ServerName

    }

    Else

    {

    Write-host "Enter the name for the SQL Server :-" -ForegroundColor Yellow

    $SQLDBServerName = Read-Host

    $SQLDBServerName = $SQLDBServerName.ToLower()

    $admin = Read-Host "Enter the Admin Account -:"

    $password =  Read-host "Enter the Admin Password -:" -assecurestring

    $Pscred = New-Object System.Management.Automation.PSCredential ($admin,$password)

    $DbServer = New-AzureRmSqlServer -ServerName $SQLDBServerName -SqlAdministratorCredentials
    $Pscred -Location $DCLocation -ResourceGroupName $resourceGroupName

    }

    #Add Firewall Rules to allow connections from the local machine

    $FirewallRuleName = "Rule1"

    $FirewallStartIP = "125.16.230.6"

    $FirewallEndIp = "125.16.230.6"

    $FirewallRule = New-AzureRmSqlServerFirewallRule -ResourceGroupName $resourceGroupName
    -ServerName $SQLDBServerName -FirewallRuleName $FirewallRuleName -StartIpAddress
    $FirewallStartIP -EndIpAddress $FirewallEndIp

    #Add the SQL Database

    $DatabaseName = "MyDatabase2"

    $DatabaseEdition = "Basic"

    $DatabasePerfomanceLevel = "Basic"

    $SqlDatabase = New-AzureRmSqlDatabase -ResourceGroupName $resourceGroupName -ServerName
    $SQLDBServerName -DatabaseName $DatabaseName -Edition $DatabaseEdition -RequestedServiceObjectiveName
    $DatabasePerfomanceLevel

    Listing 8-1。

