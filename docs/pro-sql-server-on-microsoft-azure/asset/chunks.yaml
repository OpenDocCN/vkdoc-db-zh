    \ = New-AzureRmVMConfig -VMName $VMName -VMSize $vImageSize\n$VirtualMachine =\
    \ Set-AzureRmVMOperatingSystem -VM $VirtualMachine -Windows -ComputerName $ComputerName\
    \ -Credential $Credential -ProvisionVMAgent -EnableAutoUpdate\n$VirtualMachine\
    \ = Set-AzureRmVMSourceImage -VM $VirtualMachine -PublisherName MicrosoftSQLServer\
    \ -Offer \"SQL2016CTP3.3-WS2012R2\" -Skus Evaluation -Version \"latest\"\n$VirtualMachine\
