  trans: '# SQL Server 复制


    可以在本地 SQL Server 或运行于 Azure 虚拟机上的 SQL Server 与 Azure SQL 数据库之间设置 SQL Server 事务复制（及快照复制）。在设置
    SQL Server 发布服务器与 Azure SQL 数据库订阅服务器之间的复制时，必须考虑以下关键事项（参见图 9-20）。


    ![A371128_1_En_9_Fig20_HTML.jpg](img/A371128_1_En_9_Fig20_HTML.jpg)


    图 9-20. 复制到 Azure SQL 数据库的 SQL 复制


    *   发布服务器和分发服务器可以是本地 SQL Server 实例或运行在 Azure 虚拟机上的 SQL Server。支持的最低 SQL Server
    版本是 `SQL Server 2012 SP2 CU8`。

    *   订阅服务器（`Azure SQL Database`）应采用推送订阅，这意味着分发代理将在分发服务器上运行。

    *   所有复制监控和管理操作都必须从发布服务器执行。


    复制到 `Azure SQL Database` 可以使用 `SQL Server Management Studio`（如图 9-21 所示）或 `T-SQL`
    脚本来设置。当您为现有发布或新发布选择订阅时，可以指定 `Azure SQL Database` 服务器和数据库。


    ![A371128_1_En_9_Fig21_HTML.jpg](img/A371128_1_En_9_Fig21_HTML.jpg)


    图 9-21. 配置复制到 Azure SQL 数据库


    一旦复制设置完成，就可以使用 `复制监视器` 来监控和管理订阅。复制到 `Azure SQL Database` 可以作为一种有效方式，用于将现有工作负载迁移到
    `Azure SQL Database`。


    ## Azure SQL 数据库：安全性与审核


    Azure SQL 数据库提供了大量开箱即用的安全功能，以确保用户在 Azure 上的数据在任何情况下都不会受到威胁。`Azure SQL Database`
    提供的多层安全功能——包括基于角色的授权（类似于 `SQL Server`）、加密静态数据和传输中数据的功能、用于限制访问的数据屏蔽以及行级安全——旨在提供全面保护，抵御任何真实或潜在的威胁。


    接下来将介绍 `Azure SQL Database` 提供的一些关键安全功能。


    ### 防火墙管理


    第一层安全由 `Azure SQL Database` 防火墙提供，它会阻止所有对 `Azure SQL Database` 的未经授权连接（参见图 9-22）。可以使用
    `Azure 门户`（或 `PowerShell`）配置允许连接到 `Azure SQL 数据库`（或逻辑服务器）的 IP 地址（或地址范围）。来自任何其他
    IP 的连接将被自动拒绝。


    ![A371128_1_En_9_Fig22_HTML.jpg](img/A371128_1_En_9_Fig22_HTML.jpg)


    图 9-22. 为 Azure SQL 数据库配置防火墙例外


    ### 身份验证与授权


    `Azure SQL Database` 现在同时支持 `SQL` 身份验证和 `Azure Active Directory` 身份验证（前提是已配置 `Azure
    AD` 以供使用）。与 `Microsoft SQL Server` 类似，`Azure SQL Database` 也使用基于角色的访问授权。`SQL Database`
    提供了服务器级别角色和数据库级别角色，可以通过 `Azure 门户`、`PowerShell` 或使用 `SQL Server Management Studio`（仅限数据库角色）进行管理。服务器角色和/或数据库角色是有效的工具，可以帮助控制哪些用户可以访问哪些数据。除了提供基于角色的访问控制外，`Azure
    SQL Database` 还提供了一些非常酷的功能，这些功能尚未出现在标准的 `SQL Server` 中（其中一些功能计划包含在 `SQL Server
    2016` 版本中）。


    #### 行级安全


    行级安全 (`RLS`) 提供了一种控制对表中单个行访问的方法。此访问控制是通过在数据库中创建的安全谓词（或安全函数）来实现的。由于访问控制逻辑（安全谓词）在数据库中可用，因此它提供了一种非常可靠和稳健的安全机制。此外，由于逻辑在数据库内实现，无论哪个应用程序或连接请求数据，访问都会受到控制。


    清单 9-5 展示了一个实现 `RLS` 的脚本。


    ```sql

    CREATE USER GeneralManager WITHOUT LOGIN;

    CREATE USER Manager1 WITHOUT LOGIN;

    CREATE USER Manager2 WITHOUT LOGIN;

    CREATE TABLE EmployeePerformanceData

    (

    EmployeeID int,

    EmployeeName varchar(200),

    ManagerName sysname,

    EmployeeRating int,

    EmployeeIncrementPercent float

    );

    INSERT into EmployeePerformanceData values

    (10, ''Employee10'', ''Manager2'', 1,10.00),

    (11, ''Employee11'', ''Manager2'', 3, 6.53),

    (12, ''Employee12'', ''Manager1'', 2, 8.71),

    (13, ''Employee13'', ''Manager2'', 3, 6.25),

    (14, ''Employee14'', ''Manager1'', 3, 5.87),

    (15, ''Employee15'', ''Manager2'', 5, 0.00);

    SELECT * FROM EmployeePerformanceData;

    GRANT SELECT ON EmployeePerformanceData TO GeneralManager;

    GRANT SELECT ON EmployeePerformanceData TO Manager1;

    GRANT SELECT ON EmployeePerformanceData TO Manager2;

    -- If any of the users select data from the table at this point, they would see
    all 6 records

    EXECUTE AS USER = ''GeneralManager'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    EXECUTE AS USER = ''Manager1'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    EXECUTE AS USER = ''Manager2'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    --- Implement RLS using Security Predicates and Filters

    /*

    In this case we are creating a security predicate such that the managers can only
    their own Employee Data and the GM can see all the employee information.

    */

    CREATE SCHEMA Security;

    GO

    CREATE FUNCTION Security.fn_securitypredicate(@ManagerName AS sysname)

    RETURNS TABLE

    WITH SCHEMABINDING

    AS

    RETURN SELECT 1 AS fn_securitypredicate_result

    WHERE @ManagerName = USER_NAME() OR USER_NAME() = ''GeneralManager'';

    -- Tie the Security Predicate with the User Table

    CREATE SECURITY POLICY SalesFilter

    ADD FILTER PREDICATE Security.fn_securitypredicate(ManagerName)

    ON dbo.EmployeePerformanceData

    WITH (STATE = ON);

    -- Now if we execute the Queries, each manager would only see their own employee
    information.

    EXECUTE AS USER = ''GeneralManager'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    EXECUTE AS USER = ''Manager1'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    EXECUTE AS USER = ''Manager2'';

    SELECT * FROM EmployeePerformanceData;

    REVERT;

    -- Disable the security Policy

    ALTER SECURITY POLICY SalesFilter

    WITH (STATE = OFF);

    ```


    清单 9-5. 实现 RLS 的 T-SQL 示例脚本'
- fmt: '# Dynamic Data Masking


    Data masking prevents exposure or unauthorized access to sensitive data by masking
    the database before it’s presented to the users. Data masking is configured by
    defining security policies within the table/object definition and using the `mask`/`unmask`
    permissions to control whether a user sees masked or unmasked data. Database owners
    and admins always see unmasked data.


    A sample script to test data masking is included in Listing [9-6](#A371128_1_En_9_Chapter.html#Par71).


    ```sql

    CREATE TABLE Employee

    (

    EmployeeID int IDENTITY PRIMARY KEY,

    FirstName varchar(100) MASKED WITH (FUNCTION = ''partial(1,"XXXXXXX",0)'') NULL,

    LastName varchar(100) NOT NULL,

    Phone# varchar(12) MASKED WITH (FUNCTION = ''default()'') NULL,

    Email varchar(100) MASKED WITH (FUNCTION = ''email()'') NULL,

    Salary float Masked with (Function=''random(1,7)'') Null

    );

    INSERT Employee (FirstName, LastName, Phone#, Email, Salary) VALUES

    (''Roberto'', ''Tamburello'', ''555.123.4567'', ''RTamburello@contoso.com'',100000.00),

    (''Janice'', ''Galvin'', ''555.123.4568'', ''JGalvin@contoso.com.co'',200000.00),

    (''Zheng'', ''Mu'', ''555.123.4569'', ''ZMu@contoso.net'',100000.00),

    (''Bill'', ''Anderson'', ''555.123.4570'', ''billand@contoso.net'',150000.00),

    (''Graham'', ''Scott'', ''555.123.4571'', ''Grahamsco@contoso.net'',120000.00);

    SELECT * FROM Employee;

    CREATE USER AppUser WITHOUT LOGIN;

    GRANT SELECT ON Employee TO AppUser;

    EXECUTE AS USER = ''AppUser'';

    SELECT * FROM Employee;

    REVERT;

    ```


    Listing 9-6. T-SQL Sample Script for Implementing Data Masking


    The user `AppUser` will see the following output (see Figure [9-23](#A371128_1_En_9_Chapter.html#Fig23))
    with all sensitive information masked. The DBO, on the other hand, will see all
    the data as is.


    ![A371128_1_En_9_Fig23_HTML.jpg](A371128_1_En_9_Fig23_HTML.jpg)

    Figure 9-23. Data masking


    ## SQL Database Auditing


    SQL Database Auditing provides the ability to track key events on the databases
    and store them on Azure Storage. These audit logs can then be utilized for regulatory
    compliance requirements or to provide a benchmark (or analysis) of the activities
    on the database. Auditing is available in all service tiers.


    Additionally, auditing can be configured at a logical server level (which will
    ensure all DBs on the server are being audited) or at a database level (see Figure
    [9-24](#A371128_1_En_9_Chapter.html#Fig24)). Auditing can be configured using
    Azure Portal or PowerShell.


    ![A371128_1_En_9_Fig24_HTML.jpg](A371128_1_En_9_Fig24_HTML.jpg)

    Figure 9-24. Configuring auditing for SQL Database


    Note: After SQL Database Auditing is enabled, you might need to change your connection
    string to the SQL database from downstream clients, or your applications will
    fail to connect to the database. For example, replication to SQL database will
    fail after enabling auditing, since the distributor agent will fail to connect
    to the subscriber. In such cases, make sure to use the connection string `<server
    name>.database.secure.windows.net`.


    Auditing data is available for consumption in a dashboard format in Azure Portal
    or can be exported to Excel and analyzed there.


    ## SQL Database Threat Detection


    SQL Database Threat Detection provides a mechanism to detect and respond to potential
    threats (anomalous activities) to the SQL database. Using a combination of threat
    detection and auditing, users can investigate and then take necessary actions
    on any such threat to the database. Threat detection can be easily set up using
    Azure Portal, as illustrated in Figure [9-25](#A371128_1_En_9_Chapter.html#Fig25).


    ![A371128_1_En_9_Fig25_HTML.jpg](A371128_1_En_9_Fig25_HTML.jpg)

    Figure 9-25. Configuring threat detection


    ## Encryption


    Azure SQL Database provides a plethora of encryption features to ensure that data
    residing on the database is not compromised. These features provide protection
    to data both at rest and in transit, discussed next.


    ### Connection Encryption


    Azure SQL Database allows users to use an encrypted SSL connection to the database.
    To ensure that the connection to SQL Database is encrypted, application developers
    need to use the `"Encrypt = True"` connection string parameter.


    ### Transparent Data Encryption


    Transparent Data Encryption (TDE) is not a new feature and has been around since
    SQL Server 2008. It provides a way to encrypt the data at rest. Azure SQL databases
    use the same technology to provide a way to encrypt all data at rest. Transparent
    Data Encryption can be enabled by using either the Azure Portal (or PowerShell)
    or the following T-SQL code.


    ```sql

    Alter Database [MyDatabase1] set Encryption On

    ```


    The PowerShell cmdlet `Get-AzureRMSqlDatabaseTransparentDataEncryption` can also
    be used to set TDE on the SQL database.


    ### Cell-Level (or Column Data) Encryption


    Column data encryption is not a new feature and users familiar with SQL Server
    know that this can be achieved by using a combination of symmetric keys and the
    `EncryptByKey` (or `DecryptByKey`) functions available with SQL. The key is to
    use the `EncryptByKey` function along with the key during data insert or update
    and the `DecryptByKey` function for `SELECT` operations.


    The T-SQL script in Listing [9-7](#A371128_1_En_9_Chapter.html#Par85) creates
    a table to store encrypted data.


    ```sql

    IF NOT EXISTS (SELECT * FROM sys.symmetric_keys WHERE symmetric_key_id = 101)

    CREATE MASTER KEY ENCRYPTION BY

    PASSWORD = ''ThisisaveryveryStr0ngPAss@w0rd1''

    GO

    CREATE CERTIFICATE EncryptCert

    WITH SUBJECT = ''Some Random Subject'';

    GO

    CREATE SYMMETRIC KEY SymmetricKey

    WITH ALGORITHM = AES_256

    ENCRYPTION BY CERTIFICATE EncryptCert;

    GO

    -- Create a column in which to store the encrypted data.

    Create table CustomerInfo

    (

    CustomerID int Identity Primary Key,

    CustomerName varchar(200),

    CustomerPhone varbinary(100),

    CustomerEmail varbinary(200),

    CustomerCreditCard varbinary(200)

    )

    -- Open the symmetric key with which to encrypt the data.

    Begin Tran

    OPEN SYMMETRIC KEY SymmetricKey

    DECRYPTION BY CERTIFICATE EncryptCert;

    insert into CustomerInfo (CustomerName,CustomerPhone,CustomerEmail,CustomerCreditCard)
    values

    (

    ''Mike Anderson'',

    EncryptByKey(Key_GUID(''SymmetricKey''),''555-123-1234''),

    EncryptByKey(Key_GUID(''SymmetricKey''),''mikeand@contoso.com''),

    EncryptByKey(Key_GUID(''SymmetricKey''),''1234567891011123'')

    )

    Commit

    -- Decrypt the Data

    Begin Tran

    OPEN SYMMETRIC KEY SymmetricKey

    DECRYPTION BY CERTIFICATE EncryptCert;

    Select CustomerId,CustomerName,

    convert(varchar,DecryptbyKey(CustomerPhone)) as Phone,

    convert(varchar,DecryptbyKey(CustomerEmail)) as Email,

    convert(varchar,DecryptbyKey(CustomerCreditCard)) as CreditCard

    From CustomerInfo

    Commit

    ```


    Listing 9-7. Sample T-SQL Script for Storing Encrypted Data'
  raw: '#### Dynamic Data Masking


    Data masking prevents exposure or unauthorized access to sensitive data by masking
    the database before it’s presented to the users. Data masking is configured by
    defining security policies within the table/object definition and using the mask/unmask
    permissions to control whether a user sees masked or unmasked data. Database owners
    and admins always see unmasked data.


    A sample script to test data masking is included in Listing [9-6](#A371128_1_En_9_Chapter.html#Par71).


    ```

