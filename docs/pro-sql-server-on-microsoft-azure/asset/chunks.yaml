    ## 致谢


    Pranab——有太多人的支持和鼓励，我才能完成本书的写作。首先也是最重要的，我的父母（妈妈和爸爸）。他们一直是我力量的支柱。感谢我的妻子（Meenakshi）如此支持并帮助我完成此书。在我工作繁忙的日子里，实际上是她推动我完成此事。我可爱的小女儿（Preesha），她是我的全世界；她让我在可能本该是玩耍/陪伴她的时间得以写作。还有其他许多人无条件地支持我，包括我的姐姐（Rupa
    Chatterjee）。感谢你们对我的信任；因为你们，我才能在 Microsoft 工作。也感谢我的姐夫（Anindya Chatterjee），在我最需要的时候激励和鼓舞我。我还要感谢我的岳父岳母，相信我能做到并支持我。我谨向我在
    Microsoft 的所有导师、同事和朋友，以及所有支持这个想法的经理们表达我的感激之情。非常感谢 Apress 团队，包括鼓励我写作的 John，以及在时间安排上如此灵活的
    Prachi。特别感谢所有的审稿人。


    Sourabh——特别感谢我的妻子 Sharie，在我撰写本书投入漫长时光的过程中，她非常鼓励和支持我。谨以此书献给我的导师、我的老师，感谢他们无价的教诲，最后也献给出版商，感谢他们对我们要求的包容和大力支持。


    Amit——特别感谢我的妻子，在我下班后投入数小时撰写此书时给予支持。没有她，这本书就不可能完成。实际上，是她推动我写这本书的。我谨将我对本书的贡献献给我的妈妈和爸爸，他们一直相信只要全心投入，没有什么是不可能的。一如既往，感谢我的导师，是他们让我能够无缝地学习这个不断演进的产品。最后但同样重要的是，感谢
    Apress 在时间安排上的灵活和超级包容，这确实帮助我们完成了这本书。'
