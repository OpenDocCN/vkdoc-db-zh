- fmt: '### Point-to-Site Connections


    你可以使用此功能创建到你的虚拟网络的安全连接。与站点到站点连接不同，你需要在每个打算连接到虚拟网络的客户端上安装并配置 VPN 客户端。你也不需要一个具有面向互联网
    IP 地址的 VPN 设备。


    以下描述了你会使用点到站点连接的一些场景：


    *   你有少量客户端需要连接到虚拟网络。

    *   你的客户端需要远程连接。

    *   已存在一个站点到站点连接，但有几个客户端必须从远程位置连接到虚拟网络。


    虚拟网络为你提供了一种在 Azure 内创建私有网络的选项。利用这一点，不同的服务可以相互通信或与本地资源通信。


    这个概念非常有趣且实用；然而，为了使其有益，用户应该像应用程序运行在他们自己的本地数据中心一样对待它。你的网络管理员可以在你的本地本地网络和 Microsoft
    Azure 之间设置 Microsoft Azure 虚拟专用网络，其中可以运行多台虚拟机。这可以在 VPN 网关设备的帮助下完成。你可以选择自己的 IPv4
    地址并将其分配给在云中运行的这些虚拟机。这意味着它看起来像是你现有网络的延伸。最终用户将能够无缝地访问在这些虚拟机上运行的应用程序，就像访问本地网络上的应用程序一样。


    ### ExpressRoute


    ExpressRoute 是一个非常简洁的概念，通过它你可以获得自己到 Azure 的私有连接。ExpressRoute 是一种绕过公共互联网、将你的本地基础结构连接到
    Microsoft Azure 数据中心的连接（参见图 [4-3](#A371128_1_En_4_Chapter.html#Fig3)）。这有助于 Azure
    像你自己的私有云一样运作。


    ![A371128_1_En_4_Fig3_HTML.jpg](A371128_1_En_4_Fig3_HTML.jpg)

    图 4-3. 使用 ExpressRoute 的混合设置


    有两种方法可以建立到 Microsoft Azure 的私有连接。第一种是通过交易所提供商设施连接；如果你使用交易所提供商设施，你可以直接连接到 Azure。或者，你可以通过你的网络服务提供商在本地站点和
    Microsoft Azure 数据中心之间建立直接连接。


    Microsoft Azure 将看起来只是你广域网上的另一个站点。ExpressRoute 是无缝的，并且与各种技术配合得很好。它还提供内置冗余。Microsoft
    直接与你的网络服务提供商合作。它提供更快的吞吐量，接近 10Gbps。因此，借助 ExpressRoute，你的网络基础设施非常安全，具有低延迟、高吞吐量和出色的可靠性。如果你使用
    ExpressRoute 在本地和 Microsoft Azure 数据中心之间传输数据，你还可以享受成本优势。由于它快速且可靠，它可以用于数据迁移、业务连续性复制、灾难恢复和高可用性策略。


    借助 ExpressRoute，你可以利用 Microsoft Azure 的计算和存储容量，并将其添加到你现有的数据中心。由于它可靠并提供高吞吐量连接，你可以构建一个从现有数据中心扩展通过
    Microsoft Azure 数据中心的混合应用程序。有趣的是，你在不牺牲安全性或性能的情况下获得了所有这一切。


    ## Azure AD Connect


    使用 `Azure AD Connect`，你可以将你的本地身份基础结构连接到托管在 Microsoft Azure 中的活动目录。它为你提供一个向导，指导你完成连接所需的先决条件和组件。使用此工具，你可以为
    `Office 365`、`Azure` 和与 `Azure AD` 集成的 `SaaS` 应用程序配置用户的通用标识。安装该工具时，它会安装先决条件，如
    `.NET Framework`、`Azure Active Directory`、`PowerShell` 模块以及用于登录的 `Microsoft Online
    Service` 助手。它会为多个活动目录林之一配置同步。它还帮助你配置密码哈希同步或与 Web 应用程序的 `Active Directory Federation`。你可以在
    [`https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/`](https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/)
    阅读更多相关信息。


    ## Traffic Manager


    在当今用户遍布全球的世界中，挑战在于在多个数据中心运行应用程序实例。主要挑战是如何智能地将流量重定向到运行在分散数据中心的应用程序实例。目标通常是让用户访问距离他们最近的应用程序，以获得最佳响应时间和吞吐量。


    `Traffic Manager` 帮助你控制流量的分布并将其路由到特定的端点，如网站、云服务等。基本上，你定义规则来决定 `Traffic Manager`
    将如何路由/分发流量到数据中心。例如，通常请求可能会根据用户位置路由到最近的数据中心；然而，该数据中心的响应时间并不总是最佳的。在这种情况下，用户可以被路由到其他数据中心。这种类型的服务在现代商业中非常有用，因为你的用户遍布全球。


    以下是 `Traffic Manager` 提供的主要优势：


    *   它有助于提高关键任务应用程序的可用性。

    *   你为高性能应用程序获得更好的响应时间。

    *   你可以通过禁用端点来执行应用程序升级，并在服务完成后启用它们。

    *   最后，你可以将一个端点指定给另一个 `Traffic Manager`，从而分发复杂的应用程序部署。


    图 [4-4](#A371128_1_En_4_Chapter.html#Fig4) 展示了规则如何使 `Traffic Manager` 能够路由全球流量。


    ![A371128_1_En_4_Fig4_HTML.jpg](A371128_1_En_4_Fig4_HTML.jpg)

    图 4-4. Traffic Manager 工作流'
  raw: '### Point-to-Site Connections


    You can use this to create a secure connection to your Virtual Network. Unlike
    with Site-to-Site, you need to install a VPN client and configure it on every
    client that intends to connect to the Virtual Network. You also don''t need a
    VPN device with an Internet-facing IP address.


    The following describes a few scenarios when you would use the Point-to-Site connections:


    *   You have a handful of clients who want to connect to the Virtual Network.

    *   Remote connectivity is a requirement by your clients.

    *   There is an existing Site-to-Site connection; however, a few clients have
    to connect to the Virtual Network from a remote location.


    Virtual Networks provide you with an option to create a private network within
    Azure. Using this, different services can talk to each other or to on-premises
    resources.


    This concept is quite interesting and useful as well; however, in order to make
    it beneficial, the users should treat the applications as if it were running on
    their own on-premises data center. Your network administrator can set up a Microsoft
    Azure Virtual Private Network between your local on-premises network and Microsoft
    Azure, where multiple Virtual Machines can run. This can be done with the help
    of a VPN gateway device. You can choose your own IP v4 address and assign it to
    these Virtual Machines that run in the cloud VMs. This means it would appear that
    this is an extension of your existing network. The end users would be able to
    access the application running on those Virtual Machines seamlessly, as if they
    were accessing them on their local network.


    ### ExpressRoute


    ExpressRoute is a pretty neat concept, whereby you get your own private connection
    to Azure. ExpressRoute is a connection that bypasses the public Internet that
    connects your on-premises infrastructure to Microsoft Azure data centers (see
    Figure [4-3](#A371128_1_En_4_Chapter.html#Fig3)). This helps Azure act like your
    own private cloud.


    ![A371128_1_En_4_Fig3_HTML.jpg](A371128_1_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    Hybrid setup with ExpressRoute


    There are two ways to establish your private connections to Microsoft Azure. The
    first way is to connect through a exchange provider facility; if you are using
    a exchange provider facility, you could directly connect to the Azure. Alternatively,
    you can establish a direct connection through your network service provider between
    the on-premises site and the Microsoft Azure data center.


    Microsoft Azure would appear as just another site on your WAN. ExpressRoute is
    seamless and it works great with all sorts of technology. It also provides built-in
    redundancy. Microsoft works directly with your network service provider. It delivers
    throughput that is faster, nearly 10Gbps. Thus, with ExpressRoute you have your
    network infrastructure superbly secured, with low latency, high throughput and
    great reliability. If you use ExpressRoute for data transfer between on-premises
    and the Microsoft Azure data center, you can enjoy cost benefits as well. Since
    it is fast and reliable, it can be used for data migration, replication for business
    continuity, disaster recovery, and high-availability strategies.


    With ExpressRoute, you can leverage the compute and storage capacity of Microsoft
    Azure and add that to your existing data centers. Since it is reliable and offers
    high throughput connections, you could build a hybrid application that expands
    from your existing data center through the Microsoft Azure data center. Interestingly,
    you get all of this without compromising on security or performance.


    ## Azure AD Connect


    Using Azure AD Connect , you can connect your on-premises identity infrastructure
    to the active directory hosted in Microsoft Azure. It presents you with a wizard
    that guides you with the prerequisites and the components needed for the connection.
    Using this tool, you can configure common identity for your users for Office 365,
    Azure, and SaaS applications, which are integrated along with Azure AD. When you
    install the tool, it installs the prerequisites like .NET Framework, Azure Active
    Directory, the PowerShell module, and the Microsoft Online Service assistant for
    sign-in. It configures sync for one of the multiple active directory forests.
    It also helps you configure password hash sync or Active Directory Federation
    with a web application. You can read more about it at [`https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/`](https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/)
    .


    ## Traffic Manager


    In today’s world where users are spread around the globe, the challenge is running
    an application instance in multiple data centers. The main challenge is how to
    intelligently redirect the traffic to the application instances running in the
    dispersed data centers. The aim is usually to assign users access to the application
    that’s running in closest proximity to them, in order to get the best response
    time and throughput.


    Traffic Manager helps you control the distribution of the traffic and route it
    to specific end points like website, cloud services, etc. Basically, you define
    rules that determine how the traffic will be routed/distributed to the data centers
    for the Traffic Manager to follow. For example, usually the request could be routed
    to the closest data center from the user location; however, it’s not always true
    that the response time from that data center will be best. In such cases, users
    could be routed to other data centers. This type of service is very useful in
    modern-day business, where your users are spread across the planet.


    The following are the main benefits that Traffic Manager provides:


    *   It helps improve availability of mission-critical applications.

    *   You get better response time for high-performant applications.

    *   You could perform application upgrades by disabling your endpoints and enable
    the same once the service is complete.

    *   Finally, you can specify an endpoint to another Traffic Manager, thereby distributing
    complex application deployments.


    Figure [4-4](#A371128_1_En_4_Chapter.html#Fig4) shows how the rules enable Traffic
    Manager to route global traffic.


    ![A371128_1_En_4_Fig4_HTML.jpg](A371128_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Traffic Manager workflow'
