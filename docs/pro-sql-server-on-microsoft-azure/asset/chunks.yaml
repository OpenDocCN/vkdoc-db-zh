- fmt: '### Elastic Database Pool


    Azure SQL Database also allows for creation and management of multiple databases
    in an Elastic Database Pool. To understand Elastic Database Pool in more details,
    consider an example.


    Let’s say there is an ISV that provides SaaS (software as a service) services
    to multiple customers. For each of the customers, this ISV has to provision a
    database to be used as the backend of the software service. Each of these customers
    has varying peak usage times and requirements. Let’s say for a customer A, the
    peak usage varies from 200 connections per second to 1000 connection per second.
    This variation in load might not be bound to specific times of the day. Under
    such circumstances it becomes difficult to provision a database, under a single
    service tier, which would allow optimal performance and be cost effective at the
    same time. Since the user load may not be time-dependent, the ISV will more likely
    have to provision a database with the highest service tier, which meets the peak
    load requirements. This obviously is not a cost-effective solution.


    Elastic Database Pool provides a solution for such problems. In simple terms,
    Elastic Database Pool provides a set of shared DTUs (eDTUs to be more precise)
    associated with the pool, which can be utilized by the databases in the pool.
    For example, consider a standard S3 tier of elastic pool that has about 800 DTUs.
    A user can create a maximum of 400 databases in this pool, which would allow these
    databases to share and consume DTU resources without needing to assign a specific
    performance level to the databases in the pool. The arrangement allows multiple
    databases with varying workloads to optimally use the available DTUs in the pool.
    Figure [8-5](#A371128_1_En_8_Chapter.html#Fig5) provides a listing of various
    limits for elastic pool in the different service tiers.


    ![A371128_1_En_8_Fig5_HTML.jpg](A371128_1_En_8_Fig5_HTML.jpg)


    Figure 8-5. Elastic pool limits for various service tiers


    ### Service Tiers: Limits and Capabilities


    Each of the services tiers available with the Azure SQL Database has specific
    limits, some of which are mentioned in Figure [8-6](#A371128_1_En_8_Chapter.html#Fig6)
    and in the following list. Again, as mentioned earlier, updated information can
    be found in the Azure Documentation on MSDN.


    *   Maximum Database Size. Specifies the max size limit on the database. As mentioned
    in the table, the maximum limit for a basic tier database is 2GB, while the max
    for a Premium P11 database is 1TB.

    *   Automatic Backups and Point-In-Time Restore. Azure SQL Database provides automatic
    full and log backup features. These backups can be restored to any point in time
    in the retention period as specified by the service tiers. For example, the standard
    tier DB backups are retained for 14 days by default and hence can be restored
    to any point in time in the last 14 days. We will be covering high availability,
    business continuity, and disaster recovery in full in the Chapter [9](#A371128_1_En_9_Chapter.html).

    *   Max In-Memory OLTP Storage. Specifies the maximum amount of storage allowed
    for storing in-memory OLTP objects. This is only applicable for premium tiers
    since the other tiers do not support in-memory OLTP optimizations.

    *   Max Concurrent Requests. The maximum number of concurrent user or application
    requests that can execute on the database. Readers familiar with Microsoft SQL
    Server might remember that SQL Server exposes a DMV `sys.dm_exec_requests`, which
    lists all the active requests running on the server. Similar DMVs can be used
    with WASD to get the total number of requests active on the database at any point
    in time.

    *   Max Concurrent Logins. This represents the limit of the number of users or
    applications allowed to log in to the database at the same time. This limit is
    not applicable to Elastic Database Pool.


    ![A371128_1_En_8_Fig6_HTML.jpg](A371128_1_En_8_Fig6_HTML.jpg)


    Figure 8-6. Service tiers capabilities and limits


    ## Management Tools


    Management (creation, updating, migration, etc.) of Azure SQL Database can be
    done with any of the following tools:


    *   Azure Portal

    *   SQL Server Management Studio

    *   SQL Server data tools

    *   Command-line utilities and REST APIs


    These are discussed in the next sections.


    ### Azure Portal


    Azure Portal is a web based application that provides capabilities to create,
    delete, restore, and manage Azure SQL Database and the associated logical server.
    It also provides capabilities to monitor database performance, configure security
    and high availability, and the ability to change the service tier of the database.


    Let’s look at a couple of important tasks that can be done using Azure Portal:
    creating databases and managing database properties.


    #### Create Database


    When creating the database using Azure Portal (this example uses the New Azure
    Portal), we get the choice of choosing an existing server or creating a new logical
    server. If a new server is being created as part of the DB creation, users have
    the option to choose the data center in which the server and the database will
    reside. (See Figure [8-7](#A371128_1_En_8_Chapter.html#Fig7), which indicates
    that the new database would be created on a logical server `tnkl47icl` in the
    Southeast Asia data center.)


    ![A371128_1_En_8_Fig7_HTML.jpg](A371128_1_En_8_Fig7_HTML.jpg)


    Figure 8-7. Choosing the service tier and performance level while creating a new
    SQL database


    Users can also choose the service tier and the performance level of the database
    being created, as illustrated in Figure [8-7](#A371128_1_En_8_Chapter.html#Fig7).
    The service tier and the performance level of a database can be changed using
    the Management portal, after creating the database.


    #### Managing Database Properties


    Azure Portal can be used to enable, disable, or change the properties of the database.
    As illustrated in Figure [8-8](#A371128_1_En_8_Chapter.html#Fig8), the Azure Portal
    can also be used to restore, export, change the service tier, and enable or disable
    auditing and monitoring on the database.


    ![A371128_1_En_8_Fig8_HTML.jpg](A371128_1_En_8_Fig8_HTML.jpg)


    Figure 8-8. Database details and management options available through the Azure
    Portal


    One of the most important uses of the Azure Portal is to configure firewall exceptions
    for connections from client IPs. Azure by default blocks all incoming traffic
    to the SQL database. An exception should be added before the database can be accessed
    by any of the client tools like SQL Server Management Studio (`SSMS`) or SQL Server
    Data Tools (`SSDT`).


    This setting is performed at the server level, as illustrated in Figure [8-9](#A371128_1_En_8_Chapter.html#Fig9).


    ![A371128_1_En_8_Fig9_HTML.jpg](A371128_1_En_8_Fig9_HTML.jpg)


    Figure 8-9. Configuring firewall options for an Azure SQL database server


    Note: Auditing, security, monitoring, high availability, and performance troubleshooting
    are covered in the later chapters.'
