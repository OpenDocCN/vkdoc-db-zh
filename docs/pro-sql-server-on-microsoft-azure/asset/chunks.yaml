    \ writing a table service. The table service supports JSON instead of the XML-based\
    \ AtomPub format for transferring table data. This can reduce payload sizes by\
    \ as much as 75% and can significantly improve the performance of your application.\n\
    *   Naggle off. Nagle’s algorithm is very popular and is implemented across TCP/IP\
    \ networks to improve network performance. This may not give you optimal performance\
    \ specifically in some very high interactive systems. For Azure Storage, Nagle’s\
    \ algorithm has a negative impact on the performance of requests to the table\
    \ and queue services, and you should disable it if possible.\n*   Tables and partitions.\
    \ It is very important how you represent your data, as that has a huge impact\
    \ on the performance of the table service. Tables are divided into partitions.\
    \ Every entity stored in a partition shares the same partition key and has a unique\
    \ row key to identify it within that partition. The benefit is that you can update\
    \ the entities in a single transaction, up to 100 separate storage operations.\
    \ You can also query data within a single partition more efficiently than data\
    \ that spans partitions. Partition supports atomic batch transactions and thus\
    \ the access to entities stored in a single partition cannot be load balanced.\
    \ Thus as a developer you should use the following techniques:\n    *   Data that\
    \ your client application frequently updates or queries should be in the same\
    \ partition. This may be because your application is aggregating writes, or because\
    \ you want to take advantage of atomic batch operations.\n    *   Data that your\
    \ client application does not frequently update/query in the same atomic transaction\
    \ should be in separate partitions.\n    *   Avoid hot partitions, which are partitions\
    \ that receive more data as compared to the other partitions. If the partitioning\
    \ scheme results in a single partition that has data that’s used far more often\
    \ than in the other partitions, expect to see throttling. It is likely that the\
    \ partition will approach the scalability target. It is better to make sure that\
    \ your partition scheme results in no single partition approaching the scalability\
    \ target.\n\nOnce you store data in the Microsoft Azure Storage Services, it is\
    \ important that you understand the best practices that can help you retrieve\
    \ your data. The next section covers these important practices.\n\n## Querying\
    \ Data Best Practices\n\nOnce you store data in Microsoft Azure Storage Services,\
    \ it is important that you understand the best practices that can help you retrieve\
    \ the data.\n\nAs a best practice for querying data , a general rule of thumb\
    \ is to avoid scans. Now if you have to do scans, you should organize the data\
    \ so that the unnecessary data scans can be avoided.\n\n*   Point queries. Try\
    \ to use these types of queries as much as possible as they return only one entity\
    \ by specifying the partition key and the row key.\n*   Partition query. These\
    \ queries are less performant than point queries and should be used carefully.\
    \ They retrieve sets of data that share common partition keys and typically you\
    \ specify a range of row key values or a range of values for some entity property\
    \ in addition to a partition key.\n*   Table queries. This is a query that retrieves\
    \ a set of entities that do not share a common partition key and are not efficient\
    \ and should be avoided as much as possible.\n*   Query density. One of the important\
    \ factors in efficiency of a query performance is the number of entities returned\
    \ and the number of entities scanned. A low query density can cause the table\
    \ service to throttle your application and so should be avoided. The following\
    \ are some ways that you can avoid them:\n    *   Filter the data so that the\
    \ query returns only data that your application will consume. The performance\
    \ of your application will increase due to less network payload and fewer entities\
    \ that your application must process.\n    *   Use projection to limit the size\
    \ of returned data set that your client application needs.\n    *   Remove redundant\
    \ data (denormalize). This has always been helpful as it minimizes the number\
    \ of entities that a query must scan to find the data the client needs, rather\
    \ than having to scan large numbers of entities to find the data your application\
    \ needs.\n\n## Summary\n\nMicrosoft Azure Storage services has all that an application\
    \ developer needs to provide a robust, scalable cloud-based solution. With its\
    \ many useful features, it provides the best platform to host your application\
    \ and store the data securely. You need not think about the DR strategy, as it’s\
    \ all taken care of. Now with the Premium Storage offering, the throughput increases\
    \ and you get a tremendous boost on application performance."
  trans: "\n# 使用表进行性能提升\n\n以下列表提供了一些关于使用表的技巧，正如本章所讨论的，表是另一种可在不同场景中有效使用的服务。\n\n*  \
    \ **可伸缩性**。当您的流量增加时，系统通常会执行负载均衡，但如果您的流量出现突发峰值，您可能无法立即获得该量级的吞吐量。如果您的模式存在突发峰值，您应该预期在突发期间会出现限流和/或超时，因为存储服务正在为您的表自动进行负载均衡。建议是缓慢增加流量，这样可以让系统有时间进行适当的负载均衡。\n\
    *   **JSON** (JavaScript 对象表示法)。一种流行且简洁的 `REST` 协议格式。`OData` 支持 `AtomPub` 和 `JSON`。`Atom`\
    \ 的一个缺点是其冗长的特性，这在编写表服务时可能是不需要的。表服务支持使用 `JSON` 而非基于 XML 的 `AtomPub` 格式来传输表数据。这可以将有效载荷大小减少多达\
    \ 75%，并能显著提升应用程序的性能。\n*   **禁用 Nagle 算法**。纳格尔算法非常流行，在 `TCP/IP` 网络中广泛实施以提升网络性能。在某些高交互性系统中，这可能无法为您提供最佳性能。对于\
    \ Azure 存储，纳格尔算法对表和队列服务的请求性能有负面影响，应尽可能将其禁用。\n*   **表与分区**。如何表示您的数据非常重要，因为这对表服务的性能有巨大影响。表被划分为分区。存储在一个分区中的所有实体共享相同的分区键，并在该分区内拥有一个唯一的行键来标识自身。好处是您可以在单个事务中更新实体，最多支持\
    \ 100 个独立的存储操作。您还可以在单个分区内更高效地查询数据，而不是查询跨越多个分区的数据。分区支持原子批处理事务，因此对存储在单个分区内实体的访问无法进行负载均衡。因此，作为开发者，您应使用以下技术：\n\
    \    *   您的客户端应用程序经常更新或查询的数据应位于同一分区中。这可能是因为您的应用程序正在聚合写入，或者您希望利用原子批处理操作。\n    *\
    \   您的客户端应用程序不常在同一原子事务中更新/查询的数据应位于不同的分区中。\n    *   避免出现热点分区，即那些比其他分区接收更多数据的分区。如果分区方案导致某个分区的数据使用频率远高于其他分区，那么请做好遇到限流的准备。该分区很可能会接近其可伸缩性目标。最好确保您的分区方案不会导致任何单一分区接近其可伸缩性目标。\n\
    \n一旦您将数据存储在 Microsoft Azure 存储服务中，理解能帮助您检索数据的最佳实践就变得非常重要。下一节将介绍这些重要实践。\n\n## 查询数据最佳实践\n\
    \n一旦您将数据存储在 Microsoft Azure 存储服务中，理解能帮助您检索数据的最佳实践就变得非常重要。\n\n作为查询数据的最佳实践，一个通用的经验法则是避免扫描。如果您必须进行扫描，应该组织数据，以便能够避免不必要的数据扫描。\n\
    \n*   **点查询**。尽可能多地使用此类查询，因为它们通过指定分区键和行键仅返回一个实体。\n*   **分区查询**。这些查询的性能不如点查询，应谨慎使用。它们检索共享相同分区键的数据集，通常您除了指定分区键外，还会指定一个行键范围或某个实体属性的值范围。\n\
    *   **表查询**。这种查询检索一组不共享公共分区键的实体，效率低下，应尽可能避免。\n*   **查询密度**。影响查询性能效率的重要因素之一是返回的实体数量与扫描的实体数量。低查询密度可能导致表服务对您的应用程序进行限流，因此应避免。以下是一些您可以避免低查询密度的方法：\n\
    \    *   过滤数据，使查询仅返回您的应用程序将要使用的数据。由于网络有效载荷减少以及您的应用程序必须处理的实体减少，应用程序的性能将得到提升。\n\
    \    *   使用投影来限制您的客户端应用程序需要返回的数据集的大小。\n    *   删除冗余数据（反规范化）。这一直是有帮助的，因为它最小化了查询必须扫描以找到客户端所需数据的实体数量，而不是必须扫描大量实体来找到您的应用程序需要的数据。\n\
    \n## 总结\n\nMicrosoft Azure 存储服务提供了应用程序开发者所需的一切，以提供一个稳健、可扩展的基于云的解决方案。凭借其众多实用功能，它提供了最佳平台来托管您的应用程序并安全地存储数据。您无需考虑灾难恢复策略，因为它已全部处理妥当。现在，借助高级存储产品，吞吐量得以提升，您的应用程序性能将获得巨大增强。\n"
- fmt: '# 4. Microsoft Azure Networking


    With the help of Microsoft Azure, you can create `Virtual Machines` that run within
    Microsoft data centers. These virtual machines that you create eventually form
    a part of a workgroup. Traditionally, you can have an application hosted on your
    virtual machine and the data could reside on `SQL Server`, which could be on a
    different virtual machine. These machines need to talk to each other, so you not
    only need to connect, you also need to communicate between them. In order to connect
    from the application, you can use `SQL Authentication` or a pass-through Windows
    authentication to connect to `SQL Server` since these machines resides on a workgroup.


    There are different data centers spread across the globe where different customers
    and businesses run in Microsoft Azure. It provides the perfect platform to host
    your business in cloud and reduce the `TCO`. Thus in order to have your business
    hosted in Microsoft Azure or store data, you can use one of these data centers
    spread across globe.


    As shown in Figure [4-1](#A371128_1_En_4_Chapter.html#Fig1), you can connect to
    these data centers in three different ways:


    ![A371128_1_En_4_Fig1_HTML.jpg](A371128_1_En_4_Fig1_HTML.jpg)


    *Figure 4-1. Typical setups using different components*


    *   Connect the on-premises network to a separate network that has set of virtual
    machines.

    *   Use `Azure AD Connect` to link the Microsoft Azure application to the on-premises
    Windows servers. See [`https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/`](https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/).

    *   Use `Microsoft Azure Traffic Manager` to route requests to multiple data centers
    where the different instances of the Microsoft Azure application run.


    You can also create `Virtual Networks` in the cloud. You could create your test
    environment in Microsoft Azure with a domain controller (`DC`) for user authentication,
    and you can host your application servers. Your data resides in `SQL Servers`
    which is provisioned in Microsoft Azure, which utilizes the massively scalable,
    highly secure Microsoft Azure storage. You need to create a `Virtual Network`
    to configure secure site-to-site connectivity as well as protected private `Virtual
    Network` in the cloud. Thus you can build your complete office network within
    Microsoft Azure.


    In this chapter, you’ll see how Microsoft Azure allows you to create a `VPN` and
    allows your on-premise networks to connect and talk to each other. You can also
    connect Azure applications on-premises as well as distribute load across different
    data centers. You will also be introduced to a few key networking components/concepts,
    which you can study further if you are interested.


    ## Networking Primer


    Connecting your on-premise securely to a `Virtual Network` can help in expanding
    your business and reduce cost by leveraging the Microsoft Azure Services. There
    are at least three options that could help you connect and expand your hybrid
    network: `Site-to-Site`, `Point-to-Site`, and `ExpressRoute`. See Figure [4-2](#A371128_1_En_4_Chapter.html#Fig2)
    and Table [4-1](#A371128_1_En_4_Chapter.html#Tab1) for more detail.


    *Table 4-1. Choosing the Best Connectivity Options*


    | | `Point-to-Site` | `Site-to-Site` | `ExpressRoute` |

    | --- | --- | --- | --- |

    | Azure Services | `Cloud Service` and `Virtual Machine` | `Cloud Service` and
    `Virtual Machine` | Most services, Refer to the link in PS |

    | Bandwidth | Less than `100MBPS` | Less than `100MBPS` | `50MBPS-10GBPS` |

    | Supported Protocols | `Secure Socket Tunneling Protocol (SSTP)` | `IPSec` |
    Direct connections over VLANs, NSPs, and VPN technologies |

    | Connection Resiliency | `Active-Passive` | `Active–Passive` | `Active-Active`
    |


    ![A371128_1_En_4_Fig2_HTML.jpg](A371128_1_En_4_Fig2_HTML.jpg)


    *Figure 4-2. Typical hybrid setup*


    Before you opt for one of these options, you should consider few points, such
    as the following questions. How much throughput does your application require?
    Does your application connect via a public Internet? Do you have a public IP available?
    Do you need `VPN gateways`?


    More information can be found here:


    [`https://azure.microsoft.com/en-in/documentation/articles/expressroute-faqs/#supported-services`](https://azure.microsoft.com/en-in/documentation/articles/expressroute-faqs/#supported-services)


    [`https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-cross-premises-options/`](https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-cross-premises-options/)


    In today’s world where businesses span multiple regions across different parts
    of the world, a public cloud can be cleverly used as an extension of the on-Premise
    data center. The cloud provides you the flexibility as you can create virtual
    machines on demand, you can pause/stop them if you don''t need them, and you can
    delete them once your work is done and you don''t need them anymore, i.e., you
    use the compute whenever your business needs it. In addition, your existing applications
    running on-premises continue to run smoothly. You can spin `Virtual Machines`
    with `SharePoint` and `SQL Server`, and have an `Active Directory` that can talk
    to your existing on-premises `Active Directory` as well.


    ### Site-to-Site Connections


    `Site-to-Site` can be used to connect the branch office to the main office, which
    is the headquarters. In this type of connection, hosts would not have `VPN` client
    software installed. The `VPN` device that is located in the on-premises environment
    is configured to create a secured connection with the Azure `VPN Gateway`. It
    sends the `TCP/IP` packets through `VPN gateways`, which encapsulate and encrypt
    the packets and send it through the `VPN` tunnel. There then a `VPN gateway` at
    the destination that receives the packets, deciphers the header and the content
    from the packet, and then sends the same to the destination host.


    The following describe a few scenarios when you would use the `Site-to-Site` connections:


    *   For creating a hybrid solution.

    *   The requirement for the business is a consistent and reliable network connection.

    *   You don''t need any client-side configuration for connecting your on-premises
    network to your `VPN`.


    The requirement for setting up a `Site-to-Site` connections is primarily that
    you need a compatible `VPN` device having an Internet-facing `IP address`. This
    device should be compatible with the `VPN gateway` type.'
