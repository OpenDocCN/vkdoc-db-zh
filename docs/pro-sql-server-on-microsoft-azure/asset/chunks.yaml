    6.  在此屏幕上，单击“副本”选项卡，然后单击“添加 Azure 副本”按钮。

    7.  现在下载证书或使用现有证书（参见图 6-11）。


    ![A371128_1_En_6_Fig11_HTML.jpg](img/A371128_1_En_6_Fig11_HTML.jpg)


    图 6-11. 证书下载屏幕。你应该填写这些字段，因为此信息至关重要，将用于创建新的 Azure 副本。

    8.  之后，你将返回到“添加 Azure 副本”页面，在此处你需要验证/提供其他选项卡中的信息，例如备份首选项和终结点。

    9.  根据你的业务需求选择数据同步类型。你可以在此处阅读更多信息：`` `https://msdn.microsoft.com/library/hh231021.aspx`
    ``。


    完成后，你可以查看验证页面，纠正发现的问题，并重新运行向导。一旦完成，你将拥有一个位于 Microsoft Azure 中的副本。你应该为客户端创建一个侦听器以连接到这些副本。该侦听器将传入请求重定向到主副本或辅助副本。请参阅
    Azure 文档或旁边提供的链接，以更深入地探索此概念及其实施。


    ## 总结


    在当今世界，通过利用 Microsoft Azure 平台的能力更有效地管理资源对你的业务至关重要。你可以更加敏捷，更高效地管理资源。你可以利用 Microsoft
    公有云扩展本地数据中心，并采用所谓的混合模式，这让你有机会利用两种环境的最佳优势。通过这种模型，你可以轻松地将业务和工作负载从不同的数据中心迁移。如今，你的应用程序能够利用
    Microsoft Azure 存储来使用公有云、存储备份并安全地存储数据，同时与你现有的私有云环境无缝协作。


    # 7. 性能全解析


    在前面的章节中，我们讨论了在 Azure 虚拟机 (Azure VM) 上以各种组合部署 SQL Server 实例。我们已经提到了一些最佳实践，这些实践能让你从一开始就获得最佳配置。然而，在某些情况下，你可能需要运行运行状况检查以确保环境配置为最佳性能。此外，在排查运行在
    Azure VM 上的 SQL Server 实例的性能问题时，你可能觉得有必要运行一次临时的运行状况检查。在本章中，我们将讨论在优化托管在 Azure VM
    上的 SQL Server 环境的性能时需要牢记的相似之处和不同之处。


    如果你想理解遵循 Azure 上的建议和最佳实践的价值，那么最好的例证莫过于超豪华车与经济型轿车或 SUV 的售后服务。如果你购买了一辆超豪华车，那么去服务中心的费用会非常昂贵，耗资不菲，长年累月下来足以买一辆经济型轿车。虽然超豪华车确实有面子价值、感觉豪华且引人注目，但从普通经济学常识的角度来看，它毫无益处。因此，如果你希望你的售后（即
    Azure 中的部署后）服务经济、高效且高性能，那么你就需要格外注意最佳实践。像应用程序和数据库服务位置这样的简单细节，既可能成为你最好的朋友，也可能成为最坏的敌人。


    Azure 中最常见的陷阱之一是，选择计算和存储的驱动原则保持不变。然而，选择配置的责任现在落在了软件应用程序管理团队身上，而不是硬件采购团队。另一个需要牢记的重要点是多租户。在多租户环境中，每个人都遵循相同的服务级别协议
    (SLA)。物理访问硬件是不可能的，而且你与实际后端相距甚远，系统以服务的形式提供功能。在当今世界，“即服务”的概念正是基于商品化硬件、抽象内部细节并提供客户所需组件的原则运作的。


    注意


    所有 `PowerShell` 脚本示例均可在 GitHub 存储库的以下项目中找到：`` `github.com/amitmsft/SqlOnAzureVM`
    ``。本章中的 `PowerShell` 示例假设虚拟机部署在 `资源管理器` 模式下，并且你已经在执行这些 `PowerShell` 脚本的服务器上安装了
    `Azure 资源管理器` `cmdlets`。`PowerShell` 脚本文件可以从本章前面提到的 GitHub 存储库下载，也可以通过将代码片段保存为
    `` `.ps1` `` 文件来执行。本章所示的示例假设脚本将在安装有要评估的 SQL Server 实例的机器上执行。


    ## 理解虚拟机性能


    虚拟化已成为当今 IT 环境中无处不在的术语。业界曾有一波转向虚拟化的浪潮，现在又有一波转向云计算的浪潮。由于基础设施即服务 (IaaS) 与私有数据中心中的虚拟环境非常相似，因此存在一些可能成为陷阱的相似之处，也有一些你应该意识到的不同之处。在第
    2 章中，我们讨论了 Azure 架构，该架构显示有大量组件将计算和存储组件绑定成一个虚拟机。这个环境看起来可能像你的本地虚拟机，但在内部却大不相同。在本节中，我们将讨论运行
    SQL Server 实例以获得最佳性能所需的最佳实践，以避免因配置错误或未遵循最佳实践而导致的任何性能损失。让我们首先看看计算和存储性能方面。'
- fmt: "## Compute\n\nIt is recommended (based on testing done by Microsoft) that\
    \ you use a DS3 machine for the Enterprise Edition and DS2 machine for the Standard\
    \ Edition. One of the main reasons for this is due to the availability of the\
    \ local SSD, which can be utilized for `tempdb` and also because Premium IO disks\
    \ can be attached to these machines. Azure Storage and its different tiers were\
    \ highlighted in Chapter [3](#A371128_1_En_3_Chapter.html). If such a check had\
    \ to be automated against multiple machines, then this could be done using the\
    \ weapon of choice of an automation ninja; i.e., PowerShell. Listing [7-1](#A371128_1_En_7_Chapter.html#Par7)\
    \ shows how to check if you are running a DS- or G-series virtual machine hosting\
    \ a SQL Server instance.\n\n```powershell\n$RGName = \"\"\n$VMName = \"\"\n# Get\
    \ the details of the virtual machine\n$VM = Get-AzureRmVM -ResourceGroupName $RGName\
    \ -Name $VMName\n# Check if the recommended machine size is being followed\nif\
    \ ($VM.HardwareProfile.VirtualMachineSize -like (\"*_DS*\") -or $VM.HardwareProfile.VirtualMachineSize\
    \ -like \"*_G*\")\n{\n    Write-Host \"[INFO] Virtual machine size: \" $VM.HardwareProfile.VirtualMachineSize\
    \ -ForegroundColor Green\n}\nelse\n{\n    Write-Host \"[WARN] Virtual machine\
    \ size: \" $VM.HardwareProfile.VirtualMachineSize -ForegroundColor Yellow\n  \
    \  Write-Host \"It is recommended to use DS2 or higher machines for SQL Server\
    \ Standard Edition\" -ForegroundColor Yellow\n    Write-Host \"It is recommended\
    \ to use DS3 or higher machines for SQL Server Enterprise Edition\" -ForegroundColor\
    \ Yellow\n}\n```\n\nListing 7-1. PowerShell Code to Check if an Azure VM Hosting\
    \ a SQL Server Instance Is Running the Recommended Tier\n\nAnother consideration\
    \ with respect to choosing a larger virtual machine is the network bandwidth.\
    \ The larger the machine, the more network bandwidth you have. It is important\
    \ to note that network communications generated by accessing data disks and the\
    \ operating system disk attached to the virtual machine are not considered part\
    \ of the bandwidth limits.\n\n## Network\n\nOne of the fundamental differences\
    \ in Azure related to networking is that the latency can be higher as compared\
    \ to your traditional on-premises environment due to multiple layers that are\
    \ introduced, such as load balancers, firewalls, virtualization, etc. One of the\
    \ golden rules of optimizing network performance for your applications talking\
    \ to SQL Server is to reduce the number of network round trips. If you are unable\
    \ to do so, it is recommended that you consolidate the application layers into\
    \ a single virtual machine of an appropriate tier. This ensures that the network\
    \ calls do not have to leave the virtual machine.\n\nIf you have applications\
    \ or systems that make the upward journey to the cloud from your on-premises environment,\
    \ it’s best to determine the network profile of the application calls to the database\
    \ along with the chattiness quotient. In scenarios where none of the changes required\
    \ to control the chattiness and network round trips can be changed as desired,\
    \ you might consider using Azure ExpressRoute, which can create private connections\
    \ between Azure data centers and on-premises infrastructure or in a co-location\
    \ environment. You can reach bandwidths as high as 10Gbps depending on the tier\
    \ that you choose and your geographical location.\n\nNote\n\nMicrosoft uses ExpressRoute\
    \ configurations for hybrid deployments of internal applications and has seen\
    \ high levels of performance improvement in these environments as opposed to when\
    \ ExpressRoute was not used.\n\n`Ctrl+C` and `Ctrl+V` are truly awesome features\
    \ adored by IT professionals across the world and this at times can become the\
    \ bane of your performance. Moving any sort of data to and from your virtual machine\
    \ and an on-premises environment using copy and paste functionality or any other\
    \ means counts toward your bandwidth consumption. So it is time to cringe when\
    \ you see that developer running a `SELECT *` query on a table with a million\
    \ rows against a Management Studio running on the on-premises machine while connecting\
    \ to a SQL Server instance hosted on an Azure VM! It is always advisable to set\
    \ up a client workstation(s) in Azure that the developer(s) can use for development/testing\
    \ efforts. If there is a need to move data in and out of the Azure region or on-premises,\
    \ it’s better to compress the data before moving it for performance and cost reasons.\n\
    \n## Storage\n\nThe next aspect of performance is the configuration of the storage\
    \ layout. The Azure Storage account and compute for your virtual machine should\
    \ be in the same data center to reduce transfer delays. If you fail to do this,\
    \ performance is negatively impacted exponentially. This is akin to having your\
    \ bed in one room and the mattress in the other. The functionality of the mattress\
    \ might be served but the true value of both the components put together will\
    \ never be realized unless they are bundled together!\n\nIt is recommended to\
    \ use SQL Server features for high availability and disaster recovery for the\
    \ instance and databases hosted on the instance, as consistent write order across\
    \ multiple disks is not guaranteed. This is primarily the reason why the Locally\
    \ Redundant Storage (`LRS`) option is recommended for data disks hosting SQL Server\
    \ database files. Another aspect to keep in mind is that `LRS` storage has twice\
    \ the ingress/egress bandwidths of its peer categories like Geo-Redundant Storage/Zone\
    \ Redundant Storage.\n\nThe first automation check is to use the virtual machine\
    \ properties and compare the location of the compute and storage and ensure that\
    \ it is co-located. The way to automate this is to retrieve the storage profile\
    \ of the data disks attached to the virtual machine and determine if replication\
    \ is enabled for them. The PowerShell script in Listing [7-2](#A371128_1_En_7_Chapter.html#Par16)\
    \ assumes that the storage accounts in the resource group are associated with\
    \ the SQL Server instance deployed in the same resource group. Its checks to see\
    \ if storage replication is enabled and if storage and compute are co-located.\n\
    \n```powershell\n$Accounts = @() #Empty list to store the account names\n# Get\
    \ the details about the virtual machine\n$VM = Get-AzureRmVM -ResourceGroupName\
    \ $RGName -Name $VMName\n# Retrieve the URI from the virtual hard disks attached\
    \ to the VM\n$VHDs = $VM.StorageProfile.DataDisks.VirtualHardDisk.Uri\n# Retrieve\
    \ the storage account from each URI\nforeach ($vhd in $VHDs)\n{\n    $Accounts\
    \ = $Accounts + ((($vhd -split \"//\")[1]) -split \".blob\")[0]\n}\n# Get the\
    \ unique storage accounts\n$Accounts = $Accounts | select -Unique\n# Get the best\
    \ practices for the account\nforeach ($Account in $Accounts)\n{\n    $StorageAccount\
    \ = Get-AzureRmStorageAccount -ResourceGroupName $RGName -Name $Account\n    Write-Host\
    \ \"***** Storage account check for \" $StorageAccount.StorageAccountName\n  \
    \  if ($StorageAccount.AccountType.ToString().Contains(\"LRS\"))\n    {\n    \
    \    Write-Host \"[INFO] Replication is not enabled for the storage account\"\
    \ -ForegroundColor Green\n    }\n    else\n    {\n        Write-Host \"[ERR] Account\
    \ Type: \" $StorageAccount.AccountType -ForegroundColor Red\n        Write-Host\
    \ \"[ERR] It is recommended to disable any form of replication for your storage\
    \ account\" -ForegroundColor Red\n    }\n    if ($VM.Location -eq $StorageAccount.Location.Replace(\"\
    \ \",\"\"))\n    {\n        Write-Host \"[INFO] Storage and Compute are co-located\"\
    \ -ForegroundColor Green\n    }\n    else\n    {\n        Write-Host \"[ERR] Storage\
    \ and Compute are not co-located\" -ForegroundColor Red\n    }\n}\n```\n\nListing\
    \ 7-2. PowerShell Script for Storage Best Practices"
  raw: '### Compute


    It is recommended (based on testing done by Microsoft) that you use a DS3 machine
    for the Enterprise Edition and DS2 machine for the Standard Edition. One of the
    main reasons for this is due to the availability of the local SSD, which can be
    utilized for tempdb and also because Premium IO disks can be attached to these
    machines. Azure Storage and its different tiers were highlighted in Chapter [3](#A371128_1_En_3_Chapter.html).
    If such a check had to be automated against multiple machines, then this could
    be done using the weapon of choice of an automation ninja; i.e., PowerShell. Listing
    [7-1](#A371128_1_En_7_Chapter.html#Par7) shows how to check if you are running
    a DS- or G-series virtual machine hosting a SQL Server instance.


    ```

    $RGName = ""

    $VMName = ""

    # Get the details of the virtual machine

    $VM = Get-AzureRmVM -ResourceGroupName $RGName -Name $VMName

    # Check if the recommended machine size is being followed

    if ($VM.HardwareProfile.VirtualMachineSize -like ("*_DS*") -or $VM.HardwareProfile.VirtualMachineSize
    -like "*_G*")

    {

    Write-Host "[INFO] Virtual machine size: " $VM.HardwareProfile.VirtualMachineSize
    -ForegroundColor Green

    }

    else

    {

    Write-Host "[WARN] Virtual machine size: " $VM.HardwareProfile.VirtualMachineSize
    -ForegroundColor Yellow

    Write-Host "It is recommended to use DS2 or higher machines for SQL Server Standard
    Edition" -ForegroundColor Yellow

    Write-Host "It is recommended to use DS3 or higher machines for SQL Server Enterprise
    Edition" -ForegroundColor Yellow

    }

    Listing 7-1.

    PowerShell Code to Check if an Azure VM Hosting a SQL Server Instance Is Running
    the Recommended Tier

    ```


    Another consideration with respect to choosing a larger virtual machine is the
    network bandwidth. The larger the machine, the more network bandwidth you have.
    It is important to note that network communications generated by accessing data
    disks and the operating system disk attached to the virtual machine are not considered
    part of the bandwidth limits.


    ### Network


    One of the fundamental differences in Azure related to networking is that the
    latency can be higher as compared to your traditional on-premises environment
    due to multiple layers that are introduced, such as load balancers, firewalls,
    virtualization, etc. One of the golden rules of optimizing network performance
    for your applications talking to SQL Server is to reduce the number of network
    round trips. If you are unable to do so, it is recommended that you consolidate
    the application layers into a single virtual machine of an appropriate tier. This
    ensures that the network calls do not have to leave the virtual machine.


    If you have applications or systems that make the upward journey to the cloud
    from your on-premises environment, it’s best to determine the network profile
    of the application calls to the database along with the chattiness quotient. In
    scenarios where none of the changes required to control the chattiness and network
    round trips can be changed as desired, you might consider using Azure ExpressRoute,
    which can create private connections between Azure data centers and on-premises
    infrastructure or in a co-location environment. You can reach bandwidths as high
    as 10Gbps depending on the tier that you choose and your geographical location.


    Note


    Microsoft uses ExpressRoute configurations for hybrid deployments of internal
    applications and has seen high levels of performance improvement in these environments
    as opposed to when ExpressRoute was not used.


    Ctrl+C and Ctrl+V are truly awesome features adored by IT professionals across
    the world and this at times can become the bane of your performance. Moving any
    sort of data to and from your virtual machine and an on-premises environment using
    copy and paste functionality or any other means counts toward your bandwidth consumption.
    So it is time to cringe when you see that developer running a `SELECT *` query
    on a table with a million rows against a Management Studio running on the on-premises
    machine while connecting to a SQL Server instance hosted on an Azure VM! It is
    always advisable to set up a client workstation(s) in Azure that the developer(s)
    can use for development/testing efforts. If there is a need to move data in and
    out of the Azure region or on-premises, it’s better to compress the data before
    moving it for performance and cost reasons.


    ### Storage


    The next aspect of performance is the configuration of the storage layout. The
    Azure Storage account and compute for your virtual machine should be in the same
    data center to reduce transfer delays. If you fail to do this, performance is
    negatively impacted exponentially. This is akin to having your bed in one room
    and the mattress in the other. The functionality of the mattress might be served
    but the true value of both the components put together will never be realized
    unless they are bundled together!


    It is recommended to use SQL Server features for high availability and disaster
    recovery for the instance and databases hosted on the instance, as consistent
    write order across multiple disks is not guaranteed. This is primarily the reason
    why the Locally Redundant Storage (LRS) option is recommended for data disks hosting
    SQL Server database files. Another aspect to keep in mind is that LRS storage
    has twice the ingress/egress bandwidths of its peer categories like Geo-Redundant
    Storage/Zone Redundant Storage.


    The first automation check is to use the virtual machine properties and compare
    the location of the compute and storage and ensure that it is co-located. The
    way to automate this is to retrieve the storage profile of the data disks attached
    to the virtual machine and determine if replication is enabled for them. The PowerShell
    script in Listing [7-2](#A371128_1_En_7_Chapter.html#Par16) assumes that the storage
    accounts in the resource group are associated with the SQL Server instance deployed
    in the same resource group. Its checks to see if storage replication is enabled
    and if storage and compute are co-located.


    ```

    $Accounts = @() #Empty list to store the account names

    # Get the details about the virtual machine

    $VM = Get-AzureRmVM -ResourceGroupName $RGName -Name $VMName

    # Retrieve the URI from the virtual hard disks attached to the VM

    $VHDs = $VM.StorageProfile.DataDisks.VirtualHardDisk.Uri

    # Retrieve the storage account from each URI

    foreach ($vhd in $VHDs)

    {

    $Accounts = $Accounts + ((($vhd -split "//")[1]) -split ".blob")[0]

    }

    # Get the unique storage accounts

    $Accounts = $Accounts | select -Unique

    # Get the best practices for the account

    foreach ($Account in $Accounts)

    {

    $StorageAccount = Get-AzureRmStorageAccount -ResourceGroupName $RGName -Name $Account

    Write-Host "***** Storage account check for " $StorageAccount.StorageAccountName

    if ($StorageAccount.AccountType.ToString().Contains("LRS"))

    {

    Write-Host "[INFO] Replication is not enabled for the storage account" -ForegroundColor
    Green

    }

    else

    {

    Write-Host "[ERR] Account Type: " $StorageAccount.AccountType -ForegroundColor
    Red

    Write-Host "[ERR] It is recommended to disable any form of replication for your
    storage account" -ForegroundColor Red

    }

    if ($VM.Location -eq $StorageAccount.Location.Replace(" ",""))

    {

    Write-Host "[INFO] Storage and Compute are co-located" -ForegroundColor Green

    }

    else

    {

    Write-Host "[ERR] Storage and Compute are co-located" -ForegroundColor Red

    }

    }

    Listing 7-2.

    PowerShell Script for Storage Best Practices

    ```'
  trans: "\n## 计算\n\n根据微软的测试结果，建议企业版使用 DS3 型虚拟机，标准版使用 DS2 型虚拟机。这样做的主要原因之一在于本地 SSD\
    \ 的可用性，它可用于 `tempdb`，同时也因为这些机器可以附加高级 IO 磁盘。Azure 存储及其不同层级已在第 3 章中重点介绍。如果需要针对多台机器自动执行此类检查，则可以使用自动化忍者的首选武器——即\
    \ PowerShell 来完成。清单 7-1 展示了如何检查运行 SQL Server 实例的虚拟机是否为 DS 系列或 G 系列。\n\n```powershell\n\
    $RGName = \"\"\n$VMName = \"\"\n# 获取虚拟机的详细信息\n$VM = Get-AzureRmVM -ResourceGroupName\
    \ $RGName -Name $VMName\n# 检查是否遵循了推荐的机器规格\nif ($VM.HardwareProfile.VirtualMachineSize\
    \ -like (\"*_DS*\") -or $VM.HardwareProfile.VirtualMachineSize -like \"*_G*\"\
    )\n{\n    Write-Host \"[INFO] 虚拟机规格: \" $VM.HardwareProfile.VirtualMachineSize\
    \ -ForegroundColor Green\n}\nelse\n{\n    Write-Host \"[WARN] 虚拟机规格: \" $VM.HardwareProfile.VirtualMachineSize\
    \ -ForegroundColor Yellow\n    Write-Host \"对于 SQL Server 标准版，建议使用 DS2 或更高规格的机器\"\
    \ -ForegroundColor Yellow\n    Write-Host \"对于 SQL Server 企业版，建议使用 DS3 或更高规格的机器\"\
    \ -ForegroundColor Yellow\n}\n```\n\n清单 7-1. 用于检查托管 SQL Server 实例的 Azure 虚拟机是否运行推荐规格的\
    \ PowerShell 代码\n\n选择更大规格虚拟机时，另一个需要考虑的因素是网络带宽。机器规格越大，可用的网络带宽就越多。需要注意的是，访问数据磁盘和附加到虚拟机的操作系统磁盘所产生的网络通信，不计入带宽限制。\n\
    \n## 网络\n\nAzure 在网络方面的一个根本性差异在于，由于引入了负载均衡器、防火墙、虚拟化等多层架构，其延迟可能比传统的本地环境更高。优化连接\
    \ SQL Server 的应用程序网络性能的黄金法则之一是减少网络往返次数。如果无法做到这一点，建议将应用程序层整合到一台适当规格的虚拟机中。这可以确保网络调用无需离开虚拟机。\n\
    \n如果您有从本地环境“向上”迁移到云端的应用程序或系统，最好确定应用程序对数据库调用的网络特征以及其通信频繁程度。在无法按需更改以控制通信频繁程度和网络往返次数的情况下，您可以考虑使用\
    \ Azure 快速通道，它可以在 Azure 数据中心与本地基础设施或共置环境之间创建私有连接。根据您选择的层级和地理位置，带宽最高可达 10Gbps。\n\
    \n注意\n\n微软在其内部应用程序的混合部署中使用快速通道配置，并已观察到这些环境中的性能得到显著提升，相比之下，未使用快速通道时则不然。\n\n`Ctrl+C`\
    \ 和 `Ctrl+V` 是深受全球 IT 专业人士喜爱的强大功能，但有时也会成为性能的祸根。使用复制粘贴功能或任何其他方式，在虚拟机与本地环境之间移动任何类型的数据，都会消耗您的带宽。因此，当您看到开发人员在本地机器上运行\
    \ Management Studio，连接到 Azure VM 上托管的 SQL Server 实例，并对拥有百万行数据的表执行 `SELECT *` 查询时，就该紧张了！始终建议在\
    \ Azure 中设置一个（或多个）供开发人员用于开发/测试工作的客户端工作站。如果需要将数据移入或移出 Azure 区域或本地环境，出于性能和成本考虑，最好在移动前对数据进行压缩。\n\
    \n## 存储\n\n性能的下一个方面是存储布局的配置。虚拟机的 Azure 存储账户和计算资源应位于同一数据中心内，以减少传输延迟。如果未能做到这一点，性能将呈指数级下降。这类似于将床和床垫分别放在两个房间。床垫的功能可能得以发挥，但只有将两者组合在一起，才能真正实现其全部价值！\n\
    \n建议对托管在实例上的实例和数据库使用 SQL Server 的高可用性和灾难恢复功能，因为无法保证跨多个磁盘的写入顺序是一致的。这主要是为什么推荐用于托管\
    \ SQL Server 数据库文件的数据磁盘使用本地冗余存储（`LRS`）选项。需要记住的另一个方面是，`LRS` 存储的入口/出口带宽是其同类配置（如地域冗余存储/区域冗余存储）的两倍。\n\
    \n第一个自动化检查是使用虚拟机属性，比较计算资源和存储的位置，确保它们位于同一位置。实现此自动化的步骤是：检索附加到虚拟机的数据磁盘的存储配置文件，并确定是否为它们启用了复制。清单\
    \ 7-2 中的 PowerShell 脚本假设资源组中的存储账户与部署在同一资源组中的 SQL Server 实例相关联。它会检查是否启用了存储复制以及存储和计算是否位于同一位置。\n\
    \n```powershell\n$Accounts = @() # 用于存储账户名称的空列表\n# 获取虚拟机的详细信息\n$VM = Get-AzureRmVM\
    \ -ResourceGroupName $RGName -Name $VMName\n# 从附加到 VM 的虚拟硬盘检索 URI\n$VHDs = $VM.StorageProfile.DataDisks.VirtualHardDisk.Uri\n\
    # 从每个 URI 中检索存储账户\nforeach ($vhd in $VHDs)\n{\n    $Accounts = $Accounts + ((($vhd\
    \ -split \"//\")[1]) -split \".blob\")[0]\n}\n# 获取唯一的存储账户\n$Accounts = $Accounts\
    \ | select -Unique\n# 获取账户的最佳实践\nforeach ($Account in $Accounts)\n{\n    $StorageAccount\
    \ = Get-AzureRmStorageAccount -ResourceGroupName $RGName -Name $Account\n    Write-Host\
    \ \"***** 存储账户检查: \" $StorageAccount.StorageAccountName\n    if ($StorageAccount.AccountType.ToString().Contains(\"\
    LRS\"))\n    {\n        Write-Host \"[INFO] 该存储账户未启用复制\" -ForegroundColor Green\n\
    \    }\n    else\n    {\n        Write-Host \"[ERR] 账户类型: \" $StorageAccount.AccountType\
    \ -ForegroundColor Red\n        Write-Host \"[ERR] 建议为您的存储账户禁用任何形式的复制\" -ForegroundColor\
    \ Red\n    }\n    if ($VM.Location -eq $StorageAccount.Location.Replace(\" \"\
    ,\"\"))\n    {\n        Write-Host \"[INFO] 存储和计算位于同一位置\" -ForegroundColor Green\n\
    \    }\n    else\n    {\n        Write-Host \"[ERR] 存储和计算不在同一位置\" -ForegroundColor\
    \ Red\n    }\n}\n```\n\n清单 7-2. 用于存储最佳实践的 PowerShell 脚本\n"
- fmt: '### Data Disks


    当考虑 SQL Server 数据库文件与操作系统磁盘时，无论平台和环境如何，一些最佳实践确实值得遵循。将数据文件和日志文件混合存放在同一卷中，或者在 Azure
    VM 场景下存放在同一数据磁盘上，从来都不是一个好主意。SQL Server 数据文件依赖于随机 I/O，而事务日志执行顺序 I/O。由于 I/O 特性的不同，当数据和日志在短时间内执行大量操作时，存储介质无法达到最佳性能。


    对于 Azure 磁盘，存在一种“预热效应”，可能导致吞吐量和带宽在短时间内降低。在数据磁盘一段时间（大约 20 分钟）未被访问的情况下，自适应分区和负载均衡机制会启动。如果在这些算法活动期间访问磁盘，你可能会注意到吞吐量和带宽在短时间内（大约
    10 分钟）有所下降，之后它们会恢复到正常水平。这种预热效应是由于 Azure 的自适应分区和负载均衡机制引起的，该机制在多租户存储环境中动态调整以适应工作负载变化。在决定将文件放置在数据磁盘上时，牢记这一点很重要。


    操作系统磁盘是本地连接的磁盘，其性能等级与托管高性能、低延迟数据库文件的要求不同。建议不要在操作系统文件上存储任何东西，正如其名所示，只存放操作系统文件。从库中部署的所有
    Azure 虚拟机都使用 `C:` 作为操作系统驱动器。清单 [7-3](#A371128_1_En_7_Chapter.html#Par20) 展示了一个用于检查数据库文件是否托管在操作系统驱动器上的代码示例。


    ```powershell

    $RulePass = 1

    $sqlquery = "select distinct substring(physical_name,1,2) as drive from sys.master_files
    where substring(physical_name,2,1) = '':''"

    $sqlDrives = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

    # Find out the OS Drive

    $Name = Get-WmiObject -Class Win32_DiskDrive -Filter "InterfaceType = `"IDE`"
    and SCSITargetId = 0" | Select-Object PAth

    $Dependent = Get-WmiObject -Class Win32_DiskDriveToDiskPartition | Where-Object
    {$_.Antecedent -contains $Name.Path} | Select-Object Dependent

    $OSDrive = (Get-WmiObject -Class Win32_LogicalDiskToPartition | Where-Object {$_.Antecedent
    -eq $Dependent.Dependent} | Select-Object Dependent).Dependent.Split("`"")[1]

    foreach ($drive in $sqlDrives)

    {

    if ($drive.drive -eq $OSDrive)

    {

    Write-Host "[ERR] Database files found on OS drive" -ForegroundColor Red

    $RulePass = 0

    }

    }

    if ($RulePass -eq 1)

    {

    Write-Host "[INFO] No database files found on OS drive" -ForegroundColor Green

    }

    ```

    **清单 7-3.** 用于测试是否有任何数据库文件托管在操作系统 (`C:`) 驱动器上的 PowerShell 脚本


    Microsoft 团队在运行于 Azure 虚拟机上的 SQL Server 上测试了各种工作负载，关于磁盘配置的结论如下（假设你使用的是高级 IO）：


    *   在托管数据文件和 `tempdb` 的数据磁盘上启用读取缓存。这允许为后续读取缓存读写操作。写入操作会直接持久化到 Azure 存储，以防止数据丢失或损坏，同时仍能启用读取缓存。对于事务性工作负载，这非常有益。

    *   对于将托管事务日志文件的数据磁盘，禁用读取缓存。这将完全绕过缓存。所有磁盘传输都直接针对 Azure 存储完成。此缓存设置可防止物理主机本地磁盘成为瓶颈。这是本地磁盘的一个常见问题，当事务日志刷新量很高时，表现为
    `WRITELOG` 或其他 I/O 相关等待。在事务提交导致的日志刷新率非常高的场景中，此配置设置性能极佳。

    *   临时磁盘（通常是 D: 驱动器）的某些层级具有本地连接的 SSD。此类磁盘可用于托管 `tempdb` 或缓冲池扩展。缓冲池扩展是 SQL Server
    2014 中添加的一项功能，它将非易失性存储作为 SQL Server 缓冲池的扩展。有关检查临时驱动器是否托管除 `tempdb` 之外的数据库文件的代码示例，请参见清单
    [7-5](#A371128_1_En_7_Chapter.html#Par31)。

    *   使用推荐的分配大小（64KB）格式化数据磁盘。这对于 OLTP 工作负载性能尤其有益。（参见清单 [7-4](#A371128_1_En_7_Chapter.html#Par27)。）


    许多部署因性能问题向 Microsoft 提起了支持事件，这些事件被归因于未遵循这些最佳实践。


    ```powershell

    function global:Split-Result()

    {

    param

    (

    [parameter(ValueFromPipeline=$true,

    Mandatory=$true)]

    [Array]$MATCHRESULT

    )

    process

    {

    $ReturnData=NEW-OBJECT PSOBJECT –property @{Title=”;Value=”}

    $DATA=$Matchresult[0].tostring().split(":")

    $ReturnData.Title=$Data[0].trim()

    $ReturnData.Value=$Data[1].trim()

    Return $ReturnData

    }

    }

    $LogicalDisks = Get-WmiObject -Query "select * from Win32_LogicalDisk Where MediaType
    = 12" | Select Name, MediaType, FileSystem, Size

    foreach ($disk in $LogicalDisks)

    {

    $Drive = $disk.Name + "\"

    $RESULTS=(fsutil fsinfo ntfsinfo $Drive)

    $AllocSize = $Results | Split-Result | Select-Object Title,Value | Where-Object
    {$_.Title -eq "Bytes Per Cluster"}

    if ($AllocSize.Value -eq 65536)

    {

    Write-Host "Allocation size for " $Drive " = " $AllocSize.Value " bytes" -ForegroundColor
    Green

    }

    else

    {

    Write-Host "Allocation size for " $Drive " = " $AllocSize.Value " bytes (Recommendation
    is 64K)" -ForegroundColor Red

    }

    }

    ```

    **清单 7-4.** 用于检查分配单元大小是否设置为 64KB 的 PowerShell 代码


    如果你不使用高级 IO（标准 IO），则应在所有数据磁盘上禁用缓存。对于生产场景，建议使用高级 IO，因为它专为处理并行、高队列深度的 IO 工作负载而构建。具有高度并发和
    I/O 密集型工作负载的应用程序将看到持续的高性能吞吐量。


    请记住，测试效果仅与测试环境相当。在低能力硬件上进行基准测试会得到低基准值，同样，在低层级 Azure 虚拟机上进行基准测试会提供不准确的瓶颈和基准数字。Azure
    的美妙之处在于，你可以在测试完成后立即关闭测试环境，这让你可以在不影响测试质量的情况下关注月度账单。同时，你可以以远低于本地部署成本的价格维护生产环境的副本。


    **注意**


    在临时驱动器上托管任何其他数据库文件将导致机器关闭后这些数据库文件被彻底清除。在临时驱动器上托管除 `tempdb` 之外的数据库文件是更新 DBA 简历的一种非常快速且行之有效的方法！'
  raw: '### Data Disks


    When you think about SQL Server database files and operating system disks, a few
    best practices do jump out irrespective of the platform and environment. It is
    never a good idea to mix data and log files in the same volume and, in the case
    of Azure VMs, on the same data disks. SQL Server data files thrive on random IO
    whereas transaction logs perform sequential IO. Due to the different IO profiles,
    the storage medium cannot perform optimally when both data and logs are performing
    large amounts of operations in short periods.


    With Azure disks, there is a warm-up effect that can result in a reduced rate
    of throughput and bandwidth for a short period of time. In situations where a
    data disk is not accessed for a period of time (approximately 20 minutes), adaptive
    partitioning and load balancing mechanisms kick in. If the disk is accessed while
    these algorithms are active, you may notice some degradation in throughput and
    bandwidth for a short period of time (approximately 10 minutes), after which they
    return to their normal levels. This warm-up effect happens because of the adaptive
    partitioning and load balancing mechanism of Azure, which dynamically adjusts
    to workload changes in a multi-tenant storage environment. When deciding on the
    placement of your files on data disks, it is important to keep this information
    in mind.


    The operating system disk is locally attached disk and not in the same performance
    class as required for hosting high performance, low latency database files. It
    is advisable not to store anything on the operating system files other than, as
    the name suggests, operating system files. All Azure Virtual Machines deployed
    from the gallery have `C:` as the operating system drive. Listing [7-3](#A371128_1_En_7_Chapter.html#Par20)
    shows a code sample used to check if database files are hosted on the operating
    System drive.


    ```

    $RulePass = 1

    $sqlquery = "select distinct substring(physical_name,1,2) as drive from sys.master_files
    where substring(physical_name,2,1) = '':''"

    $sqlDrives = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

    # Find out the OS Drive

    $Name = Get-WmiObject -Class Win32_DiskDrive -Filter "InterfaceType = `"IDE`"
    and SCSITargetId = 0" | Select-Object PAth

    $Dependent = Get-WmiObject -Class Win32_DiskDriveToDiskPartition | Where-Object
    {$_.Antecedent -contains $Name.Path} | Select-Object Dependent

    $OSDrive = (Get-WmiObject -Class Win32_LogicalDiskToPartition | Where-Object {$_.Antecedent
    -eq $Dependent.Dependent} | Select-Object Dependent).Dependent.Split("`"")[1]

    foreach ($drive in $sqlDrives)

    {

    if ($drive.drive -eq $OSDrive)

    {

    Write-Host "[ERR] Database files found on OS drive" -ForegroundColor Red

    $RulePass = 0

    }

    }

    if ($RulePass -eq 1)

    {

    Write-Host "[INFO] No database files found on OS drive" -ForegroundColor Green

    }

    Listing 7-3.

    PowerShell Script To Test If Any Database Files Are Hosted on the Operating System
    [C:] Drive

    ```


    The teams at Microsoft have tested various workloads on SQL Server running on
    Azure Virtual Machines and the verdict on the disk configuration is as follows
    (assuming that you are using Premium IO) :


    *   Enable read caching on the data disks that host data files and tempdb. This
    allows reads and writes to be cached for future reads. The writes are persisted
    directly to Azure Storage to prevent data loss or data corruption while still
    enabling read cache. For transactional workloads, this is very beneficial.

    *   Disable read caching for data disks that will host transaction log files.
    This would bypass the cache completely. All disk transfers are completed against
    Azure Storage. This cache setting prevents the physical host local disks from
    becoming a bottleneck. This is a common problem with local disks, which manifests
    itself as `WRITELOG` or other IO-related waits when transaction log flushes are
    high. This configuration setting is very performant in scenarios where the rates
    of log flushes due to transaction commits are very high.

    *   Temporary disk (typically D: drive) for certain tiers have locally attached
    SSDs. Such disks can be used to host the tempdb or buffer pool extensions. Buffer
    pool extension was a feature added in SQL Server 2014, which targets non-volatile
    storage as an extension of the SQL Server buffer pool. See Listing [7-5](#A371128_1_En_7_Chapter.html#Par31)
    for a code sample that checks if the temporary drive is hosting database files
    other than tempdb.

    *   Formatting the data disks with recommended allocation sizes (64KB). This is
    especially beneficial for OLTP workload performance. (See Listing [7-4](#A371128_1_En_7_Chapter.html#Par27).)


    A number of deployments have raised support incidents with Microsoft due to performance
    issues that have been attributed to these best practices not being followed.


    ```

    function global:Split-Result()

    {

    param

    (

    [parameter(ValueFromPipeline=$true,

    Mandatory=$true)]

    [Array]$MATCHRESULT

    )

    process

    {

    $ReturnData=NEW-OBJECT PSOBJECT –property @{Title=”;Value=”}

    $DATA=$Matchresult[0].tostring().split(":")

    $ReturnData.Title=$Data[0].trim()

    $ReturnData.Value=$Data[1].trim()

    Return $ReturnData

    }

    }

    $LogicalDisks = Get-WmiObject -Query "select * from Win32_LogicalDisk Where MediaType
    = 12" | Select Name, MediaType, FileSystem, Size

    foreach ($disk in $LogicalDisks)

    {

    $Drive = $disk.Name + "\"

    $RESULTS=(fsutil fsinfo ntfsinfo $Drive)

    $AllocSize = $Results | Split-Result | Select-Object Title,Value | Where-Object
    {$_.Title -eq "Bytes Per Cluster"}

    if ($AllocSize.Value -eq 65536)

    {

    Write-Host "Allocation size for " $Drive " = " $AllocSize.Value " bytes" -ForegroundColor
    Green

    }

    else

    {

    Write-Host "Allocation size for " $Drive " = " $AllocSize.Value " bytes (Recommendation
    is 64K)" -ForegroundColor Red

    }

    }

    Listing 7-4.

    PowerShell Code for Checking if the Allocation Unit Size Is Set to 64KB

    ```


    If you are not using Premium IO (Standard IO), caching should be disabled on all
    data disks. For production scenarios, it is recommended that you use Premium IO,
    as it is built for handling parallel, high queue depth IO workloads. Applications
    with highly concurrent and IO intensive workloads will see consistently high performance
    throughput .


    Remember that testing is only as good as the environment. Benchmarking on low
    capability hardware gives low benchmarks and similarly benchmarking on low tier
    Azure VMs will provide inaccurate bottlenecks and benchmark numbers. The beauty
    of Azure is that you can turn off your test environment as soon as the test is
    completed and this lets you keep an eye out on the monthly bill without optimizing
    test quality. At the same time, you can maintain copies of the production environment
    at a fraction of the cost of what it would have been on-premises.


    Caution


    Hosting any other database files on the temporary drive will result in the database
    files being wiped to oblivion after the machine is shut down. Hosting database
    files other than tempdb on the temporary drive is a very quick and proven way
    to get a DBA’s resume updated!'
