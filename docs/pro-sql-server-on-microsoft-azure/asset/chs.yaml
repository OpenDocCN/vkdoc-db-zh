- "# 1. 微软 Azure 简介\n\n电子补充材料：本章的在线版本（doi：[10.1007/978-1-4842-2083-2_1](http://dx.doi.org/10.1007/978-1-4842-2083-2_1)）包含补充材料，可供授权用户使用。\n\
  \n在与任何 IT 决策者的会议中，云都已成为一个重要的考量因素。基于云的系统所带来的好处，使其极具吸引力，无论是采用私有云、公有云还是混合云。然而，有趣的是，早在“云”这个词变得流行之前的几十年，如今所熟知的云就已经存在了！\n\
  \n即使在云计算兴起之前，微软就已经提供了大量的云服务，例如像 Hotmail 这样的电子邮件平台。它过去是，现在仍然是一个基于云的个人电子邮件服务。微软至今仍在托管的另一项服务是其\
  \ Xbox Live 游戏服务，该服务为玩家提供多人游戏选项、个人资料管理以及社交游戏体验。\n\n在本章中，我们将讨论云计算以及这些概念如何与 Microsoft\
  \ Azure 相关联。我们还将了解 Microsoft Azure 中可用的不同服务模型和产品，并讨论一些与 Azure SQL Server 部署一起使用的常见服务。\n\
  \n## 云计算概述\n\n云计算是一个创新平台，正在彻底改变我们进行计算的方式。云计算基于“按使用付费”的关键原则，即您无需为计算需求投资硬件或软件，而是从供应商那里租用所需的计算能力、存储、软件和其他资源。这减少了所需的总投资。云计算帮助用户和企业获得全球性的、高可用的、基于请求的计算、存储和软件服务访问。这些基于云的资源（计算、存储或软件服务）基于资源共享的原则，以提供一致且经济高效的解决方案。\n\
  \n云计算严重依赖虚拟化的概念，物理计算资源可以被划分为多个独立的虚拟设备，每个设备都可用于执行某种计算任务。虚拟化有助于创建一个高度可扩展和敏捷的计算单元系统，可以按需分配和利用。虚拟化还通过更好地利用现有硬件资源，帮助降低与硬件基础设施相关的成本。\n\
  \n任何云计算环境最重要的设计原则之一是优化、有效或最佳地利用共享资源。由于云资源由多个用户共享，并且具有按需分配的灵活性，因此有效利用这些资源至关重要。有效利用共享资源的能力降低了运行和维护云计算环境的总体成本。\n\
  \n云计算提供了一种从传统的 CAPEX（资本支出）模式到 OPEX（运营支出）模式的转变。在 CAPEX 模式中，组织投资于获取随时间折旧的固定资产；而在 OPEX\
  \ 模式中，组织投资于在使用依赖于共享基础设施的服务期间产生的运营费用。“迁移到云”这个短语就表明了这种从 CAPEX 模式到 OPEX 模式的转变。推动这种向云基础设施迁移的关键点是：\n\
  \n*   云计算帮助企业降低建立数据中心或其他所需服务器环境的初始成本，从而使他们能够将时间和精力集中在核心业务和项目上。\n*   由于云计算资源或服务可以按需配置和调整，它有助于减少组织的“上市时间”并满足其业务的波动性需求。\n\
  \n## 云计算的特征\n\n任何云计算环境的关键特征是：\n\n*   敏捷性：云计算平台的特点在于其敏捷性，可以快速引入新功能和服务，以及如何能够快速创建并交付一个新的计算资源或服务。\n\
  *   成本：云计算平台使组织能够从 CAPEX 模式过渡到 OPEX 模式。这有助于降低建立计算平台或采用更新技术的初始成本。大多数提供云计算平台的供应商都提供按使用付费的模型，这意味着消费者只需为他们使用的服务付费。\n\
  *   设备和位置独立性：云计算使用户和组织能够通过互联网访问他们的资源，这意味着可以从任何地方访问资源，无论资源位于哪个数据中心。\n*   维护：由于大部分维护由云计算供应商管理，消费者无需在维护上投入时间和资源。\n\
  *   资源共享：由于云计算建立在资源共享的原则上，它允许供应商：\n    1.  将其基础设施集中在房地产、电力等成本较低的地理位置。\n    2.  有效且高效地利用计算资源。\n\
  *   可扩展性和弹性：云计算允许动态、快速且近乎实时地配置资源和服务。这有助于用户根据其业务需求扩大或缩小使用规模。\n*   可靠性：云计算平台使用多个冗余站点，包括本地（同一数据中心）和地理冗余，以提供更好的业务连续性和灾难恢复能力。\n\
  \n## 服务模型\n\n如图 1-1 所示，大多数云计算提供商提供以下服务模型：平台、基础设施和软件。\n\n![A371128_1_En_1_Fig1_HTML.jpg](img/A371128_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1. 表示视图—服务模型\n\n### 平台即服务\n\n虽然 SaaS 模型可能是满足组织大部分软件需求的完美解决方案，但缺乏根据业务需求自定义和更改服务的能力使其对一些组织来说不可用。由于没有可用的自定义选项，SaaS\
  \ 服务有时无法满足用户业务各个方面的需要。在这种情况下，企业必须投入时间和资源来构建软件能力以弥补这些差距。值得庆幸的是，云计算提供了平台即服务模型，它可以填补这一空白，并允许消费者创建和运行自定义应用程序。PaaS\
  \ 提供具有极高可扩展性和弹性的云托管应用服务器。\n\n在 PaaS 模型中，云供应商提供一个预先配置的、虚拟化的应用服务器环境，组织或用户可以向其中部署他们自定义的内部构建的应用程序。云供应商确保应用服务器的维护、打补丁和可用性，而组织需要管理和维护运行在应用服务器上的自定义应用程序。在部署这些应用程序期间，开发人员定义应用程序的资源需求（CPU、网络、内存等）。云计算配置引擎使用此资源需求定义（通常作为配置文件的一部分），并创建并绑定运行应用程序所需的必要基础设施。PaaS\
  \ 是客户构建新应用程序的理想解决方案，因为迁移遗留应用程序可能需要大量的应用程序重新设计以符合 PaaS 模型的规则。\n\n\n### 基础设施即服务\n\n\
  基础设施即服务（IaaS）模型提供托管的服务器环境，可用于部署和运行软件服务。IaaS 与组织的传统做法非常相似，即在本地构建物理或虚拟化服务器并在这些服务器上运行其软件。IaaS\
  \ 与传统方法的不同之处在于，在 IaaS 环境中，服务器托管在供应商的数据中心，而不是企业的数据中心。这可以被理解为一种“租用服务器”模式，组织根据需要支付服务器使用费。在\
  \ IaaS 模型中，用户完全控制在这些服务器上运行的软件、灾难恢复（DR）和高可用性要求以及软件所需的定制化。根据供应商的不同，用户还可能拥有根据需求灵活扩大或缩小服务器规模的能力。此外，根据供应商和所提供的服务器类型，服务器可能包含附加软件，例如操作系统、Exchange\
  \ 服务器或关系数据库管理系统（RDBMS）服务器。\n\n鉴于其灵活性和定制所分配服务器的能力，IaaS 可用于轻松地将遗留应用程序迁移到云端，即构建一个模仿本地服务器配置的云服务器。\n\
  \n### 软件即服务\n\n软件即服务（SaaS）模型帮助用户使用云计算供应商托管的软件服务。在 SaaS 模型中，云计算供应商托管软件服务或应用程序，并通过基于订阅的模式使其可供客户访问。客户按需付费使用这些服务。鉴于\
  \ SaaS 基于订阅制的使用模型，用户可以选择暂停、停止、减少或增加对服务的使用。\n\n在 SaaS 模型中，软件服务配置和底层硬件基础设施对最终用户是不可访问的。因此，用户无法更改所提供的服务或功能。SaaS\
  \ 提供了一个高度可共享的多租户环境，成千上万甚至数百万的用户可以同时操作，并且在相互隔离和高度安全的环境中运行。SaaS 还提供了一个非常敏捷的平台，可以帮助用户缩短“上市时间”，并让他们专注于核心业务项目，而无需担心管理和维护其\
  \ IT 需求环境所带来的 IT 挑战。\n\n## Microsoft Azure\n\nAzure 是由 Microsoft 开发的云计算平台，用于通过 Microsoft\
  \ 管理或 Microsoft 合作伙伴托管的数据中心的全球网络来创建、部署和管理应用程序和服务。Azure 在所有三种服务模型中都提供基于云的服务：软件即服务（SaaS）、平台即服务（PaaS）和基础设施即服务（IaaS）。\n\
  \nAzure 提供云托管服务器以及其他基础设施资源，如存储、网络和用于创建、部署和运行应用程序的其他集成基础设施。Azure 在提供云计算环境时依赖于大规模的商用现成硬件群。图\
  \ 1-2 展示了一个典型的 Azure 资源模型，其中应用程序服务器以及存储、网络和其他计算资源根据部署时设置的策略按需配置。Azure 结构控制器（Fabric\
  \ Controller）凭借其专用的高度冗余和高可用的服务器及软件，是整个 Azure 环境背后的智能核心。\n\n![A371128_1_En_1_Fig2_HTML.jpg](img/A371128_1_En_1_Fig2_HTML.jpg)\n\
  *图 1-2. 典型资源模型——Microsoft Azure*\n\nAzure 计算资源池由一个非常庞大的商用硬件资源池组成，这些资源以高度冗余和高可用的配置进行设置。这种高可用性和冗余性由\
  \ Azure 结构控制器维护和管理。\n\n结构控制器旨在检测任何类型的故障，并采取必要措施以减轻这些故障的风险。这些措施可能包括生成新资源或将资源迁移到不同的硬件资源池。结构控制器还负责根据用户请求扩大或缩小资源规模。\n\
  \n## Azure 服务\n\nAzure 提供了大量服务，这些服务被分组到不同的类别中，如图 1-3 所示。下面将讨论一些常用或在 Azure 中进行 SQL\
  \ 部署时需要的服务。\n\n![A371128_1_En_1_Fig3_HTML.jpg](img/A371128_1_En_1_Fig3_HTML.jpg)\n\
  *图 1-3. Azure 服务*\n\n## 计算产品\n\nMicrosoft Azure 提供三种重要的计算产品，可用于运行网站和应用程序。Azure 网站和\
  \ Azure 云服务使用 Azure 虚拟机来运行网站和应用程序，同时将管理创建和管理的任务抽象化，使用户无需处理。这两项服务提供 PaaS 产品，而第三个选项——Azure\
  \ 虚拟机（VM）——则为用户提供了创建和管理其虚拟机的完全控制权。Azure 虚拟机提供 IaaS 产品。\n\n#### 虚拟机\n\nAzure 虚拟机为用户提供对虚拟机及其上运行的应用程序的创建、配置和管理的完全控制权。Azure\
  \ 虚拟机允许使用上传到 Azure 的 VHD 或利用 Azure VHD 库中提供的 VHD 镜像来创建 VM，如图 1-4 所示。Azure 提供了大量针对不同版本/版本的\
  \ Windows、Linux 和其他服务器应用程序（如 SQL Server、BiTalk、Oracle 等）的 VHD。\n\n![A371128_1_En_1_Fig4_HTML.jpg](img/A371128_1_En_1_Fig4_HTML.jpg)\n\
  *图 1-4. Azure 虚拟机*\n\nAzure 虚拟机允许配置并向一个 VM 添加多个虚拟磁盘。这些磁盘可以配置在标准存储上，也可以配置在基于固态硬盘（SSD）的高级存储上。\n\
  \n#### Azure WebApps（前身为 Azure 网站）\n\nAzure WebApps（前身为 Azure 网站）通过 Azure 管理门户以及\
  \ API 提供托管的 Web 环境。除了能够在云端创建新网站外，Azure WebApps 还允许将任何现有网站迁移到云端。WebApps 提供按需扩大或缩小资源规模的能力。创建一个\
  \ Azure WebApps 服务基本上就是创建一个带有 IIS 及相关存储的 VM，如图 1-5 所示。这些 VM 的创建和管理对最终用户是封装的。\n\n\
  ![A371128_1_En_1_Fig5_HTML.jpg](img/A371128_1_En_1_Fig5_HTML.jpg)\n*图 1-5. Azure\
  \ WebApps*\n\nAzure WebApps 提供共享租户模型（资源在多个网站之间共享）和标准模型（为网站提供专用资源）。扩大或缩小实例规模的能力仅在标准模型中可用。\n\
  \n#### 云服务\n\n与 Azure 网站类似，Azure 云服务使用 VM 来执行工作负载，同时为用户提供一些对 VM 配置的控制权。例如，可以远程访问\
  \ VM，并且可以在 VM 上安装其他软件。Azure 云服务提供两种不同类型的 VM。Web 角色实例运行带有 IIS 的 Windows Server 变体，而辅助角色实例运行不带\
  \ IIS 的相同 Windows Server 变体。一个云服务应用程序依赖于这两种选项的某种组合。\n\n## 数据管理产品\n\nWindows Azure\
  \ 提供了多种存储和管理数据的方式。这种服务多样性允许用户利用 Azure 来满足各种业务需求和解决问题。Azure 提供以下四种主要的数据管理产品。\n\n\n\
  \n"
- '# 在 Azure 虚拟机上运行的 SQL/Oracle


  Azure 虚拟机允许用户配置 `Microsoft SQL Server`、`Oracle` 或任何其他 `DBMS` 的实例。正如在关于计算产品和虚拟机部分中所提及的，Azure
  市场提供了多种映像，可用于部署 `SQL Server` 实例（截至本书撰写时，有 `SQL 2012`、`SQL 2014` 和 `SQL 2016 RC`
  版本）或 `Oracle` 实例。此外，还可以使用自定义的 `VHD` 创建其他 `DBMS` 环境，并将该 `VHD` 上传到 Azure。


  '
- '# Azure SQL 数据库


  Azure SQL 数据库是一种关系数据库即服务，它提供了 `RDBMS` 的所有重要特性，包括事务一致性、数据完整性和多用户并发数据访问系统。Azure SQL
  数据库构建在与 `Microsoft SQL Server` 相同的原则之上，并提供可比的功能。对于已经熟悉 `SQL Server` 的用户来说，适应 Azure
  SQL 数据库不会很困难。Azure SQL 数据库采用 `PaaS` 服务模型，使用者控制访问模式，而平台则负责其他管理工作。Azure SQL 数据库为数据库提供自动备份和时间点恢复功能。根据所使用的服务层，Azure
  SQL 数据库还以合理的成本提供高可用性选项。


  '
- '# Azure Blob 存储


  Azure Blob 存储（“blob 存储”和“存储 blob”是同一回事）是一种基于云的廉价存储解决方案，用于存储非结构化二进制数据（图 1-6）。可以将
  Azure Blob 存储视为二进制文件的文件存储，最大文件大小限制为 `1TB`。应用程序还可以利用 Azure 驱动器，这使得 blob 能够为挂载在 Azure
  实例中的 `Windows` 文件系统提供持久存储。应用程序看到的是普通的 `Windows` 文件，但其内容实际上存储在 blob 中。


  ![A371128_1_En_1_Fig6_HTML.jpg](img/A371128_1_En_1_Fig6_HTML.jpg)

  **图 1-6.** Azure 存储 Blob


  `Blob 存储`被许多其他 Azure 功能（包括虚拟机）所使用，因此它当然能够处理你的工作负载。


  '
- '# Azure 表存储


  表提供了一种 `NoSQL`/键值存储。表提供了对大量松散结构化和非结构化数据的快速、可靠且简单的访问。表提供非关系型或 `NoSQL` 存储。


  ## 网络


  Azure 提供了多种选项来设置私有网络、虚拟专用网络和网络负载均衡。接下来描述最常用的选项。


  ## 虚拟网络


  Azure 虚拟网络 (`VNet`) 是 Azure 云中专用于订阅的逻辑分区。管理员对网络的 `IP`、`DNS` 设置和安全策略拥有完全控制权。它可以比作一个组织在防火墙后面运行的私有网络。Azure
  `VNet` 允许你创建子网，这些子网可根据需要用于进一步细分网络。Azure 允许用户使用 Azure 提供的多种连接选项之一，将 `VNet` 连接到其本地网络，如图
  1-7 所示。


  ![A371128_1_En_1_Fig7_HTML.jpg](img/A371128_1_En_1_Fig7_HTML.jpg)

  **图 1-7.** Azure 虚拟网络


  ## VPN 连接选项


  连接选项允许用户将其本地网络与其 Azure 网络连接起来。这些选项包括：


  -   点到站点 `VPN` 连接

  -   站点到站点 `VPN` 连接

  -   `ExpressRoute` 连接


  ### 点到站点 VPN 连接


  点到站点 `VPN` 允许用户从其本地网络中的一台客户端计算机创建到其 Azure 虚拟网络的安全连接。点到站点连接必须在需要连接到虚拟网络的每台客户端计算机上单独配置。点到站点连接不需要
  `VPN` 设备，而是使用需要在每台客户端计算机上安装的 `VPN` 客户端。`VPN` 是通过从本地客户端计算机手动启动连接来建立的。


  ### 站点到站点 VPN 连接


  站点到站点 `VPN` 允许用户在其本地网络与其 Azure 虚拟网络之间建立安全连接。站点到站点 `VPN` 连接需要位于本地网络上的 `VPN` 设备，并且必须配置为与
  Azure `VPN` 网关建立安全连接。连接建立后，本地网络和 Azure 虚拟网络中的资源可以直接安全地通信。与点到站点 `VPN` 连接不同，站点到站点连接不需要为本地网络上访问虚拟网络中资源的每台客户端计算机建立单独的连接。


  ### ExpressRoute 连接


  Azure `ExpressRoute` 允许用户在其本地网络与 Azure 数据中心之间建立专用连接。`ExpressRoute` 连接不通过公共互联网，而是使用专用的互联网通道，因此与通过互联网的典型连接相比，它提供了更高的可靠性、更好的安全性和更低的延迟。如图
  1-8 所示，`ExpressRoute` 不使用公共互联网来连接你的本地环境与 Azure。


  ![A371128_1_En_1_Fig8_HTML.jpg](img/A371128_1_En_1_Fig8_HTML.jpg)

  **图 1-8.** Azure ExpressRoute


  '
- '# 开发者服务


  Azure 提供了多项可供开发者利用的服务，以编写优化且高性能的代码。除了提供编写代码的多项功能外，Azure 还提供了在运行应用程序时自动化测试和捕获遥测数据的方法。


  ## Visual Studio Team Services


  `Visual Studio Team Services` 提供了一项服务，用于开发和交付应用程序、与团队共享代码、跟踪应用程序开发以及对用任何语言编写的应用程序进行负载测试。


  ## Application Insights


  `Application Insights` 是一项可扩展的分析服务，允许用户监控其实时应用程序性能。它可以帮助检测和诊断性能问题，并为应用程序提供遥测数据。开发者可以使用该服务持续改进其应用程序代码的性能和可用性。`Application
  Insights` 适用于使用 `.Net`、`J2EE` 开发并托管在本地或云端的基于 Web 的和独立的应用程序，如图 1-9 所示。


  ![A371128_1_En_1_Fig9_HTML.jpg](img/A371128_1_En_1_Fig9_HTML.jpg)

  **图 1-9.** Azure Application Insights


  '
- '# 身份与访问管理


  `Windows Azure Active Directory` 提供了强大且安全的身份服务，有助于在云中控制和管理目录及访问管理。它还提供无缝登录 Azure
  资源的体验，并通过多因素认证增强安全性。


  ## Active Directory


  Azure Active Directory (`AAD`) 是一种身份和访问管理解决方案，为组织提供了管理用户和组的能力，就像本地 Active Directory
  解决方案一样。`AAD` 有助于为本地和云中的资源提供安全访问。`AAD` 提供三种服务层：免费版、基本版和高级版。


  ### 备份


  Azure 提供了大量简单可靠的备份服务，可在需要时用于确保业务连续性和灾难恢复。


  ## Azure Site Recovery


  `Site Recovery` 是一项 Azure 服务，通过协调将你的本地服务器和虚拟机复制到次要本地数据中心或 Azure，来为你的业务连续性和灾难恢复 (`BCDR`)
  策略做出贡献。`Site Recovery` 处理复制过程，你可以通过简单点击启动故障转移和恢复。



  ## 小结


  在本章中，我们学习了云计算的基本原理以及云计算可用的不同服务模型。随后我们讨论了微软云计算平台，其中涵盖了 Azure 以及 Azure 提供的一些关键服务。


  '
- '# 2. Azure 架构


  如今，云计算已经成熟，不同服务类别——平台、软件和基础设施——之间有了明确的划分。微软在这三个类别中均提供服务。但在深入探讨之前，让我们首先理解云服务涉及的细微差别。在本章中，我们将了解基础设施即服务
  (IaaS) 的工作原理。可以将 IaaS 想象成披萨：你钟爱的披萨供应商提供冷冻披萨，而你需要管理用于加热和上菜的器具。在 IaaS 领域，这通常意味着供应商提供所有硬件，包括计算能力、网络、存储及其关联服务。你所要做的就是利用基础设施服务的组合，这允许你在该平台上部署任何应用程序或服务。


  微软的 Azure 平台不仅仅是虚拟化基础的超大规模抽象。Azure 还以数据中心的形式推动了大量的创新。让我们快速了解一下这里所述概念背后的硬件是如何布局的。微软云服务器规范实质上提供了蓝图，用于构建微软交付多样化云服务组合所使用的数据中心服务器。与传统的服务器企业设计相比，它们带来了显著的改进：服务器成本节省高达
  40%，电源效率提升 15%，部署和服务时间缩短 50%。微软在全球范围内自有和租赁的数据中心上托管其云服务，这些中心横跨超过百万台服务器和上百个数据中心。


  为了将 Azure 发展到今天的地位，做出了一些有趣的战略决策。其中最有趣的是成本因素。成本始终是 IT 界的一个讨论焦点，微软决定通过针对关键成本驱动因素进行资源分配来降低托管这些环境的成本。这与标准成本计算方式根本不同，后者通常将成本与使用的空间量相关联。相比之下，Azure
  使用能源消耗、带宽消耗、事件响应和服务器容量等关键因素来确定成本。


  2014 年，微软将开放云服务器设计贡献给了开放计算项目，使行业能够受益于该公司在为其管理的各种基于云的服务建立数据中心方面积累的经验。


  在接下来的几节中，我们将学习 Azure 中计算、网络和存储是如何组织的，以及你需要了解的内部原理，以使 IaaS 产品为你所用。


  ## Azure 服务


  如今，Azure 在 PaaS、SaaS 和 IaaS 这三个类别中提供了大量服务，并且持续增长。撰写关于 Azure 的书籍最大的挑战，不是书在你写完后是否依然与时俱进，而是你在写作过程中它是否跟得上变化。冲刺、缩短的发布周期和敏捷开发方法的世界，确保技术消费者能尽快获得技术内容。


  与其列举 Azure 当前提供的各种服务，不如让你了解 Azure 可以在哪些不同领域帮助你和你的业务。近来，Azure 越来越致力于实现与你习惯的本地环境和在
  Azure 中实际使用体验之间的对等。这意味着你的数据中心与 Azure 数据中心之间的界限正变得日益模糊，你的平台用户将很难分辨在 Azure 上运行的内容与在本地运行的内容有何不同（除非你在他们的应用程序上放置一个标明其托管数据中心的横幅）。


  Azure 当前提供的服务包括：


  *   管理与安全，如密钥保管库和操作洞察

  *   开发者服务，如 Visual Studio Team Services

  *   身份与访问管理，如 Azure Active Directory、多重身份验证

  *   混合集成，如 BizTalk、站点恢复

  *   媒体与 CDN，如媒体编码、媒体索引器

  *   物联网 (IoT)，如事件中心、流分析

  *   分析，如数据湖、HDInsight、机器学习、数据工厂

  *   数据与存储，如 SQL 数据库、DocumentDB、SQL 数据仓库

  *   Web 与移动应用，如 Web 应用、API 管理


  如你所见，Azure 不仅仅是运行虚拟机的一堆硬件。所有这些解决方案都利用了 Azure 计算、存储和网络的某些部分。在接下来的几章中，我们将深入探讨 Azure
  计算、存储和网络的内部原理，但在本章中，我们将理解所有这些部分是如何协同工作的。



  ## 计算资源


  Azure 中的计算是处理能力与物理内存的结合。当你开始在 Azure 中部署计算资源时，本质上是在启动一个虚拟机。该虚拟机运行着一个操作系统，并由本地存储支持，该存储承载着操作系统文件和临时存储。不建议使用此本地存储方案来托管你的应用程序或应用程序可能需要的任何数据。在某些情况下，你可能会使用临时存储，它被称为
  D 盘。相关示例将在后续章节中解释。


  Azure 提供不同层级的计算，对应着不同的定价（参见图 2-1）。其定价模式类似于手机通话时长计费。你为每一分钟的使用付费。因此，只要你的虚拟机处于启动和运行状态，你就在为计算能力付费。无论你是否实际使用了计算能力，这都不重要。这再次类似于手机通话：无论你在通话中说话还是保持沉默，都会产生计费。理解托管你的应用程序或服务所需的物理内存和处理能力类型至关重要。


  ![A371128_1_En_2_Fig1_HTML.jpg](img/A371128_1_En_2_Fig1_HTML.jpg)

  **图 2-1. Azure 定价计算器**


  你心中接下来的问题会是：可以托管什么？嗯，它就像一个空房子！你实际上可以托管任何你想要的东西，就像在本地数据中心托管的虚拟机上一样。使用基于云的基础设施服务固有的优势在于，你只需点击一个按钮，后台就会发生一系列神奇的操作。启动虚拟机、设置操作系统以及将计算、网络和存储整合在一起，这些都由
  Azure 基础设施完成。你的工作仅仅是提供输入参数！


  在云中托管的另一个优势是打包的部署产品，即库镜像。你可以启动一个预配置了软件解决方案的虚拟机。Azure 虚拟机支持 SQL Server、Oracle、IBM、SAP
  等更多软件。这种一键式部署的贴心之处在于，如果你选择像 SQL Server、Oracle 等基于解决方案的镜像，其许可成本可以包含在内。如果你不希望将许可成本包含在计算的每分钟成本中，那么你可以使用自己的许可证，并利用
  Azure 的自动化服务来运行虚拟机部署后的步骤。


  现在让我们快速了解一下 Azure 中可用的计算层级。例如，基础层级 (A0, A1, A2 … An) 包含小至 1 个核心、0.75GB RAM 并附带 20GB
  本地磁盘的机器。如果你让一个具有此配置的虚拟机运行整整一个月，大约需要支付 13 美元。在另一个极端，你目前有 G 系列机器，提供 32 个虚拟 CPU 和 448GB
  物理内存。


  如你所见，有一个广泛的范围供你为业务选择正确的组合。


  计算提供了弹性，这也是云著名的特性，它允许你根据负载需求进行横向扩展。当你部署 SQL Server 作为独立实例时，由于 SQL Server 本身不具备横向扩展能力，因此不需要横向扩展功能。SQL
  Server 中有一些功能可以帮助你通过复制或可用性组实现横向扩展。你可以根据需要，甚至随心所欲地扩大和缩小虚拟机实例的规模。虽然随心所欲可能不是充分的业务理由，但你绝对可以根据计算基线的趋势来扩大和缩小规模！弹性在当今的计算领域正变得无处不在，而公有云使之成为现实。零售商最常见的场景之一是应对假日季节的流量高峰。这通常导致在全年为有时持续不到一个月的高峰季过度配置硬件。云中的弹性使之成为现实！Azure
  提供自动缩放功能，允许你扩展在 Web 角色、辅助角色或虚拟机上运行的工作负载。当你扩展在 Azure IaaS 上运行的应用程序时，虚拟机可以从先前创建的机器的可用性集中开启或关闭。其中一个选项是基于平均
  CPU 使用率百分比来指定缩放。


  在托管或本地数据中心中的一些常见难题，在 Azure 中已不再是问题。




  ## 存储


  在上一节中，你了解了 Azure 计算如何将我们熟知的物理内存和处理能力整合为一个内聚单元。本节将解释在 Azure 中存储数据意味着什么。在 20 世纪 50
  年代，第一块硬盘驱动器能存储 500 万个六位字符，而今天，这甚至不足以存储一个 4GB U 盘所容纳的数据。那时 3.75MB 的磁盘驱动器大小约相当于两个冰箱，并且包含
  50 张盘片！多年来，数字数据存储领域取得了飞跃式的进步，如今你的移动设备就能存储超过 64GB 的信息。当今手机的内置存储容量，已能容纳相当于 1950 年代
  17,000 台磁盘驱动器所能存储的信息量！


  由于在云环境中使用标准化的商品硬件来横向扩展存储，存储成本已不再是主要障碍！在每个 IT 专业人士的职业生涯中，总会有那么一刻，为个人计算设备或所管理的服务器申请额外的存储空间，曾是一个经过深思熟虑的商业提案。如今，云服务只需点击一下按钮，就能以各种形式、不同的吞吐量和成本因素，提供海量的存储空间。


  Azure 存储为所有 Azure 虚拟机提供存储基础。它涵盖了云计算的所有原则，这意味着 Azure 存储具有可扩展性、持久性和高可用性。再次强调，云的优势在于你只需为所使用和何时使用的资源付费。这就像手机的按使用付费套餐一样。


  Azure 存储采用自动分区系统，可根据流量自动对数据进行负载均衡。随着应用程序存储需求的增长，Azure 存储会自动分配适当的存储资源来满足需求。


  与任何 Azure 组件一样，Azure 存储可以从世界任何地方访问。Azure 存储的一个独特之处在于，任何类型的应用程序，无论是运行在云端、桌面、本地、移动设备还是平板电脑上，都能访问
  Azure 存储服务。Azure 存储的高级概念和设计决策将在本书第 3 章中详细阐述。


  现在，让我们简要了解一下 Microsoft Azure 平台中的存储是如何组织的。如图 2-2 所示，存储以不同的格式组织——Blob、表、队列和文件。存储以容器、表、队列和共享的形式组织。可以把它们想象成你厨房里的储物容器。你通常会使用不同属性的不同容器来存放谷物、面粉、大米等。类似地，Azure
  中的存储也被划分为特定类型的容器。


  ![A371128_1_En_2_Fig2_HTML.jpg](img/A371128_1_En_2_Fig2_HTML.jpg)


  图 2-2. Azure 存储概念


  **Blob 存储**本质上是你放置在 Azure Blob 容器中的任何存储对象的二进制表示。每个 Blob 存储可以容纳文档、媒体文件、可执行文件，以及基本上任何你想存储在云端的对象。它们通常用于存放原始数据和媒体相关文件，如音乐、图片、视频等。


  **表存储**可用于存放结构化数据集，这是一种 NoSQL 键-属性数据存储，用于快速以编程方式访问海量数据。


  **队列存储**为工作流处理和云服务组件之间的通信提供可靠的消息传递。消息可以在任何应用程序端点之间流动，这些端点既可以是云端托管的应用程序，也可以是我们数据中心的应用程序。


  **文件存储**提供基于 SMB 的文件共享，不同之处在于这些共享托管在云端。这些共享具有基于云的路径，任何连接到互联网的应用程序都可以访问。


  由于云承载着各种类型的应用程序，每个业务的吞吐量和性能要求各不相同。Azure 存储通过标准存储和高级存储的形式来满足这些需求。


  Azure 高级存储的主要设计目标是为运行 I/O 密集型工作负载的虚拟机提供高性能、低延迟的磁盘。某些 SQL Server 工作负载无疑能从为其数据磁盘使用
  Azure 高级存储中受益。在本书中，你会发现多处提到 SQL Server 实例与高级存储账户如何良好协作，以满足并超越你的性能和吞吐量 SLA。


  如果想从具体数字来看，每个虚拟机可访问 64TB 的存储空间，每个虚拟机可实现 80,000 IOPS 和每秒 2000MB 的磁盘吞吐量。高级存储的引入使得你能够将需要一致高性能和低
  I/O 延迟的企业应用程序直接迁移上云。



  ## 网络


  在深入了解计算层与存储层如何相互通信之前，理解 Azure 平台硬件架构中的最后一个关键部件至关重要。服务间通信与外部通信均由网络层处理。简单来说，它相当于在企业环境中部署的网络的云版本。图
  2-3 展示了企业中典型的网络配置。


  ![A371128_1_En_2_Fig3_HTML.jpg](img/A371128_1_En_2_Fig3_HTML.jpg)

  图 2-3. 本地环境网络配置


  Azure 虚拟网络代表了 Azure 数据中心内的所有网络功能。它根据你的 Azure 订阅，对 IP 地址块、DNS 设置、安全策略和路由表进行逻辑划分。Azure
  网络还允许你延伸本地网络，使你的 Azure 订阅资源成为实际物理网络的扩展部分。


  如果你想进行类比，请注意图 2-4，Azure 基础设施承担了路由器的角色。它允许从你的虚拟网络访问公共互联网，而无需任何额外配置。可以将网络安全组（`NSGs`）视为应用于每个单独子网的防火墙。物理负载均衡器在
  Azure 中被面向互联网的和内部的负载均衡器所取代。


  ![A371128_1_En_2_Fig4_HTML.jpg](img/A371128_1_En_2_Fig4_HTML.jpg)

  图 2-4. Azure 虚拟网络图示


  此时一个非常切题的问题是：为什么需要虚拟网络？原因有很多。除了为连接各种 Azure 服务和虚拟机提供连接层之外，还需要隔离功能，允许你为开发、测试和生产等不同用途创建相互独立的网络，即使它们使用相同的
  `CIDR` 地址块。Azure 还为部署在你的虚拟网络（`VNet`）中的虚拟机和 `PaaS` 角色实例提供内部名称解析。你也可以部署自己的 `DNS` 服务器并配置
  `VNet` 使用它们。


  现代网络管理员面临的一个有趣挑战是，在不危及安全的前提下，为外部世界（即互联网）提供网络连接。Azure 网络能够在不牺牲安全性的情况下实现公共互联网连接，这主要得益于网络安全组（`NSGs`）。


  让我们快速了解一下什么是网络安全组及其在 Azure 网络架构中的作用。如果需要打个比方，网络安全组（`NSG`）本质上是网络流量的看守者，它监控在你的 Azure
  订阅资源与连接到这些资源的内部及外部客户端之间流动的流量。你可以创建 `NSG` 来控制进出网络组件（如网卡（`NICs`）、虚拟机和子网）的流量。你可以使用
  `NSG` 根据源 `IP` 地址和端口或目标 `IP` 地址和端口来决定是允许还是拒绝网络流量。`NSG` 的行为类似于企业环境中的防火墙。


  Azure 网络将在第[4]章中详细讨论。


  ## 协同工作原理


  现在你已经了解了 Azure 中可用构建块的基础知识，重要的是理解它们如何协同工作。如果你想了解 Azure 中的一种基础设施即服务（`IaaS`）选项，图 2-5
  将向你展示 Azure 中的虚拟机是如何布局的。


  ![A371128_1_En_2_Fig5_HTML.jpg](img/A371128_1_En_2_Fig5_HTML.jpg)

  图 2-5. Azure 虚拟机


  图 2-5 显示，Azure 网络是外部客户端与 Azure 虚拟机之间的通信网关。最值得注意的事实之一是，存储层是一个完全独立的物理实体。这与数据中心服务器的传统构建方式有着根本的不同。如果要打个比方，存储层可以被看作是存储区域网络（`SAN`）和网络附加存储（`NAS`）的结合体。磁盘阵列由存储层以可扩展和弹性的方式进行管理，存储层通过一个非常高速的网络与计算层通信。


  你可以选择部署一个 Azure 库镜像（`Azure gallery image`），这是由微软和其他第三方提供的预制镜像，用于承载操作系统和你选择的预装软件。这样，你甚至不需要编写一个安装程序！


  基础设施即服务（`IaaS`）只是利用计算、存储和网络的服务模型之一。在本地环境中，一种常见的部署模型是 Web 应用程序，它通常采用三层架构。第一层是客户端应用程序，通常是连接到中间层（即应用服务器）的
  Web 浏览器。应用服务器连接到后端服务器，后者通常是数据存储。在 Azure 中，可以使用 Web 角色作为前端、辅助角色作为中间层、数据存储（如 SQL 服务器、Blob、NoSQL
  等）作为第三层，来实现类似的架构。图 2-6 展示了托管在 Azure 上的典型三层应用程序架构。


  ![A371128_1_En_2_Fig6_HTML.jpg](img/A371128_1_En_2_Fig6_HTML.jpg)

  图 2-6. 托管在 Azure 上的应用服务


  在图 2-6 中，客户端通过 Azure 虚拟网络连接到一个 Web 角色实例，该实例是运行 Web 应用程序的计算资源。根据应用程序的需要，可以配置实例数量进行纵向扩展或缩减，这使得服务天然具有弹性，开发者无需做任何特定工作。存储的作用取决于应用程序是否使用
  Azure 存储实体（如 Blob 或队列）来存储数据。间接使用存储的情况是，如果使用了关系型或非关系型的平台即服务（`PaaS`）产品，而这些产品内部使用了存储服务。图
  2-6 显示了 Azure SQL 数据库作为一种存储选项。本书后面将对此进行详细讨论。


  Azure 中的另一种部署范式是托管应用程序实例。这不仅限于 Web 应用程序，还可以用于任何类型的应用程序，如移动应用、服务、`APIs` 等。Azure 市场提供了大量由微软和第三方提供的预构建服务部署。这允许你启动一个应用程序实例，对于某些部署，它形成了软件即服务（`SaaS`）模型，对于其他部署，则形成了平台即服务（`PaaS`）模型。图
  2-7 展示了应用程序部署的样子。


  ![A371128_1_En_2_Fig7_HTML.jpg](img/A371128_1_En_2_Fig7_HTML.jpg)

  图 2-7. Azure 应用实例


  正如前面的图示所示，Azure 抽象了部署机制，解耦了硬件，并在部署期间将各种组件绑定在一起。


  ## 更新/升级域


  现在您已经了解了资源提供者的架构组织方式，接下来必须理解**更新域**的概念。可以将更新域视为维护计划中要打补丁的一组服务器。如果您不是业务负责人，则需要确保在更新期间，托管在正在打补丁的服务器上的应用程序几乎没有停机时间。这确实是现实世界中最困难的
  IT 问题之一。


  Azure 将实例均匀分布到多个**升级域**中，每个升级域作为部署的一个逻辑单元。在升级部署时，升级操作一次只针对一个升级域执行，以最小化在这些环境中运行的服务或应用程序的停机时间。升级域有助于减少升级对正在运行的服务的影响，同时保持环境最新。这最大限度地降低了因缺乏更新而导致已知问题影响生产环境的风险。


  掌握这一概念非常重要，因为仅仅拥有一个更新域并不能帮助您的 SQL Server 部署。即使在故障转移集群或可用性组环境中，SQL Server 实例也只能有一个运行服务的活动节点。因此，如果运行
  SQL Server 实例的服务器重启，数据库服务将会中断。对于托管在 Azure 虚拟机上的任何生产 SQL Server 环境，拥有一个可用性组部署至关重要，以防止长时间停机。


  ## 故障域


  如前所述，仅靠升级/更新域不足以维护托管在 Azure 虚拟机上的 SQL Server 实例的正常运行时间。在 Azure 中，单点故障的范围本质上是一个**故障域**。


  与本地环境最简单类比的方式是，考虑一个从计算角度防止单点故障的故障转移集群。现在扩展到 Azure 世界，连接到电源插座的单一计算源就是一个故障域。这甚至可以是数据中心中的一个机架，因为机架的电源中断将导致基础设施中的多个计算节点失效。故障域由
  Azure 在部署期间确定，强烈建议将每个角色的两个或更多个实例部署在 Azure 中，以便单个故障域中的故障不会导致应用程序服务中断。对于托管在 Azure
  虚拟机上的 SQL Server，从高可用性角度出发，始终建议拥有主备部署。大多数企业环境都遵循这一概念，在 Azure 中也有这样做的必要。具体的服务级别协议（SLA）详见
  Azure 服务级别协议。


  ## 部署


  使用 Azure 时最常见的任务之一是部署。直到最近，这还是一条单行道。Azure 现在有两种部署模型：经典部署模型和资源管理器部署模型。对于任何新的开发工作，尽可能使用资源管理器部署模型是最好的。所有
  Azure 资源都支持一种或两种部署模型。


  使用这两种部署模型处理虚拟机时，有一些重要的注意事项：


  *   使用经典部署模型部署的虚拟机无法包含在使用资源管理器部署的虚拟网络中。

  *   使用资源管理器部署模型部署的虚拟机必须包含在虚拟网络中。

  *   使用经典部署模型部署的虚拟机不必包含在虚拟网络中。


  ### 经典部署模型


  Azure 最初引入了一种称为**经典部署模型**的部署模型。在本节中，我们将限制在虚拟机的部署讨论。在经典方法中，部署的虚拟机只能通过云服务访问。云服务是容纳虚拟机的容器。云服务名称的格式为
  `<name>.cloudapp.net`。


  ### 资源管理器部署模型


  在**资源管理器部署模型**中，云服务不再是创建虚拟机所需的对象（见图 2-8）。Azure 资源管理器使您能够轻松利用预构建的应用程序模板或构建应用程序模板，以在
  Azure 上部署和管理计算、网络和存储资源。这些模板采用日益流行的 JSON 格式，可以轻松地从现有部署中导出并应用于新部署。


  ![A371128_1_En_2_Fig8_HTML.jpg](img/A371128_1_En_2_Fig8_HTML.jpg)


  图 2-8. Azure 虚拟机的 Azure 资源提供者及其关系


  Azure 资源提供者支持创建功能虚拟机所需的各个资源，您可以按需配置。对于虚拟机，有三个主要的资源提供者：


  *   **计算资源提供者 (CRP)**：支持虚拟机实例和可选的可用性集。

  *   **存储资源提供者 (SRP)**：支持必需的存储帐户，用于存储虚拟机的 VHD，包括其操作系统和额外的数据磁盘。

  *   **网络资源提供者 (NRP)**：支持必需的网卡 (NIC)、虚拟机 IP 地址以及虚拟网络中的子网，以及可选的负载均衡器、负载均衡器 IP 地址和网络安全组。


  我们讨论过，这些资源提供者都不能孤立工作，因为托管一个简单的虚拟机需要资源提供者之间的资源关系。例如，虚拟机依赖于 SRP 中定义的特定存储帐户来将其磁盘存储在
  Blob 存储中。虚拟机引用 NRP 中定义的特定网卡，并且还可能在 CRP 中定义了一个可用性集。网卡引用虚拟机分配的 IP 地址、虚拟机的虚拟网络子网，以及如果需要访问控制，则引用网络安全组。


  资源管理器 (ARM) 使得构建、集成和协作开发复杂的应用程序变得非常简单，这些应用程序可以通过一个可共享的模板文件包含整个范围的 Azure 资源（如网站、SQL
  数据库、虚拟机和虚拟网络）。这样的共享模板文件可以作为可重复部署的用途，相对轻松地搭建开发环境。


  VM 扩展（自定义脚本、DSC、Chef、Puppet 等）与模板文件中的 Azure 资源管理器深度集成，这使得轻松协调虚拟机内的设置配置成为可能。ARM 还允许使用
  Azure 基于角色的访问控制 (RBAC) 进行简单而精确的组织资源访问管理。


  ### 部署自动化


  既然我们谈到了部署，一个明显的问题是是否有办法实现实际部署的自动化。Azure 提供了三种不同的方式来操作计算、存储和网络对象。第一种是 Web 用户界面，这是意料之中的，毕竟这是将图形界面变得普及的公司。第二种和第三种方法主要用于以编程方式部署可通过
  Web 门户部署的任何内容。


  Azure 公开了 PowerShell cmdlet 和 REST API，允许开发人员和 IT 管理员编写部署例程。这些例程自动化创建 Azure 实体并配置该实体公开的部署后配置选项。Azure
  自动化服务的自动化功能与这些编程接口相结合后功能非常强大，允许设计用于部署的自定义工作流。在 GitHub 上可以找到许多此类示例。



  ## 摘要


  在本章中，你学习了 Azure 如何定义其计算、存储和网络边界。尽管 Azure 提供了一层抽象，使你的部署和日常运维更为容易，但你可以将其与本地环境进行类比。这有助于在迁移到
  Azure 时降低学习曲线。基础设施即服务在数据中心和 Azure 之间具有最高的相似性系数。当你从 IaaS 转向 PaaS 再到 SaaS 时，这种相似性会逐渐减弱。


