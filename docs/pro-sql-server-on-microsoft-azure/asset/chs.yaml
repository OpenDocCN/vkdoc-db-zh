  \ 所示。\n\n![A371128_1_En_10_Fig7_HTML.jpg](img/A371128_1_En_10_Fig7_HTML.jpg)\n\n\
  图 10-7. 查询性能见解设置\n\n![A371128_1_En_10_Fig6_HTML.jpg](img/A371128_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6. 详细的查询性能详情\n\n查询性能见解基于查询存储，而查询存储有可能会耗尽存储空间。当查询存储耗尽存储空间时，它将进入只读模式，从而无法再存储任何查询性能数据。为查询存储设置正确的保留和清理策略非常重要。可以将清理设置为\
  \ `AUTO`（当达到大小限制时 SQL 将运行清理）或基于时间的保留策略。\n\n```\nALTER DATABASE [YourDB]\nSET QUERY_STORE\
  \ (SIZE_BASED_CLEANUP_MODE = AUTO);\nALTER DATABASE [YourDB]\nSET QUERY_STORE (CLEANUP_POLICY\
  \ = (STALE_QUERY_THRESHOLD_DAYS = 30));\n```\n\n查询性能见解提供了一种很好的方法来找出有问题的查询并进行优化。例如，您可以获取消耗\
  \ CPU 最多的查询，并在它们对数据库产生重大性能影响之前对其进行调优。\n\n## 监控 SQL 数据库\n\nAzure 提供多种方法来监控 SQL 数据库的性能、资源利用率和安全性。这可以使用\
  \ Azure 门户，或使用数据库和逻辑服务器级别公开的 DMV（动态管理视图），或使用可在 SQL 数据库上配置的扩展事件来完成。\n\n\n### 使用 Azure\
  \ 门户\n\nAzure 门户提供了一种非常便捷的方式来监控 SQL 数据库的资源利用率。诸如 `CPU` 百分比、`DTU` 百分比等计数器都可以通过 Azure\
  \ 门户进行监控。这些信息可用于确保数据库处于最佳运行状况。Azure 门户中的监控选项卡（位于数据库详细信息下）可用于监控数据库的资源利用率（参见图 10-8）。此外，可以根据需要使用管理门户配置指标和时间段设置（参见图\
  \ 10-9）。\n\n![A371128_1_En_10_Fig9_HTML.jpg](img/A371128_1_En_10_Fig9_HTML.jpg)\n\
  **图 10-9.** 配置监控指标\n\n![A371128_1_En_10_Fig8_HTML.jpg](img/A371128_1_En_10_Fig8_HTML.jpg)\n\
  **图 10-8.** 监控 SQL 数据库资源利用率\n\n监控图表可以进行编辑，以添加多个其他计数器，如图 10-9 所示。\n配置好指标后，即可在 Azure\
  \ 门户上监控资源利用率，如图 10-10 所示。\n\n![A371128_1_En_10_Fig10_HTML.jpg](img/A371128_1_En_10_Fig10_HTML.jpg)\n\
  **图 10-10.** 在门户上监控指标\n\nAzure 门户还允许用户针对任何可用指标配置警报（参见图 10-11）。例如，你可以设置一个基于电子邮件的警报，以指示数据库是否超过性能级别最大允许大小的\
  \ `80%`，或者 `DTU` 利用率百分比是否超过该服务层 `DTU` 的 `80%`。这些信息可用于判断是否需要更改数据库的性能级别。\n\n![A371128_1_En_10_Fig11_HTML.jpg](img/A371128_1_En_10_Fig11_HTML.jpg)\n\
  **图 10-11.** 为资源利用率指标配置警报\n\n警报可以配置所需的阈值，并可设置为向管理员或其他用户发送电子邮件。这些设置可以通过 **添加警报规则**\
  \ 页面进行更改（参见图 10-12）。\n\n![A371128_1_En_10_Fig12_HTML.jpg](img/A371128_1_En_10_Fig12_HTML.jpg)\n\
  **图 10-12.** 配置警报属性\n\n### 使用动态管理视图和目录视图\n\n针对数据库和逻辑服务器公开的 `DMV` 和目录视图可用于报告和/或监控\
  \ SQL 数据库及逻辑服务器的性能、资源利用率、数据库对象详细信息、查询执行信息等。\n\n对目录视图和 `DMV` 运行查询需要 `View Server\
  \ State` 和 `View Database State` 权限。接下来提到的是一些最常用的 `DMV`。\n\n#### 资源利用率\n\n资源利用率（包括逻辑服务器级别和数据库级别）的详细信息也可以使用\
  \ Azure SQL 数据库提供的目录视图获取。\n\n*   `sys.resource_stats`。提供逻辑服务器级别的资源利用率信息。该信息每五分钟收集一次，涵盖运行在该逻辑服务器上的所有数据库。\n\
  *   `sys.dm_db_resource_stats`。提供数据库的资源利用率信息。该信息每 `15` 秒收集一次。\n*   `sys.event_log`。提供有关数据库连接、限流和死锁事件的信息。\n\
  \n#### 数据库相关信息\n\n与资源相关的 `DMV` 和目录视图类似，Azure SQL 数据库也提供了许多 `DMV` 和目录视图来提供数据库相关信息，如空间使用情况、等待统计信息等。\n\
  \n*   `sys.dm_db_file_space_usage`。提供数据库中空间使用情况的信息。\n*   `sys.dm_db_wait_stats`。提供数据库级别所有操作的等待统计信息。此\
  \ `DMV` 可用于诊断数据库性能问题和其他查询执行问题。\n*   `sys.dm_database_copies`。提供有关数据库异地复制副本的信息。像\
  \ `maximum_lag` 和 `replication_state_desc` 这样的详细信息可用于确定复制的延迟和状态。\n\n#### 执行相关信息\n\
  \nMicrosoft SQL Server 中可用的大多数与执行相关的 `DMV` 在 Azure SQL 数据库中也可用，并可用于确定性能问题、执行相关问题等。以下是一些常用的\
  \ `DMV`：\n\n*   `sys.dm_exec_requests`/`sys.dm_exec_sessions`/`sys.dm_exec_connections`。提供有关连接到（或正在其上执行活动请求）Azure\
  \ SQL 数据库的会话的信息。\n*   `sys.dm_exec_query_stats`、`sys.dm_exec_function_stats`、`sys.dm_exec_procedure_stats`、`sys.dm_exec_trigger_stats`。分别提供查询、存储过程、函数和触发器的聚合执行统计信息。这些\
  \ `DMV` 可用于确定在服务器上执行的耗时最长/CPU 消耗最高/读写最多的查询。当相应的查询或对象从缓存中移除时，这些 `DMV` 中的条目也会被移除。\n\
  *   `sys.dm_exec_query_memory_grants`。提供有关数据库上运行的每个查询的内存授予（待处理或已授予）的信息。\n\nAzure\
  \ SQL 数据库还提供了其他 `DMV` 来监控各种详细信息，如数据库索引、数据库或逻辑服务器的安全性等。所有 `DMV` 的完整列表可在 `MSDN` 上找到。\n\
  \n\n\n### 使用扩展事件\n\n扩展事件（Extended Events 或 XEvents）并非新概念。自 SQL Server 2008 起，该功能就已包含在\
  \ Microsoft SQL Server 中。过去几年中，此功能已经过了大量优化和改进。通过 XEvents 可获取的信息量极其庞大，这一点可以从即将发布的\
  \ SQL Server 2016 已公开近 1,200 个事件这一事实中得到印证。\n\nAzure SQL Database 上提供的扩展事件仅是 SQL\
  \ Server 中可用功能的一个子集。这些扩展事件的作用域仅限于单个 Azure SQL 数据库，这意味着针对一个 Azure SQL 数据库运行的扩展事件无法用于监控同一逻辑服务器上另一数据库的事件。\n\
  \n清单 10-2 提供了一个示例脚本，可用于确定 Azure SQL Database 上扩展事件可用的事件/操作。\n\n```sql\nSELECT\n\
  o.object_type,\np.name         AS [package_name],\no.name         AS [db_object_name],\n\
  o.description  AS [db_obj_description]\nFROM\nsys.dm_xe_objects  AS o\nINNER JOIN\
  \ sys.dm_xe_packages AS p  ON p.guid = o.package_guid\nWHERE\no.object_type in\n\
  (\n'event','action'\n)\nORDER BY\no.object_type,\np.name,\no.name;\n```\n**清单 10-2.**\
  \ 用于确定 Azure SQL Database 可用事件或操作的 T-SQL 脚本\n\n为 Azure SQL Database 配置扩展事件最简单的方法是使用\
  \ SQL Server Management Studio，如图 10-13 所示。在 SSMS 中，可通过展开数据库节点来访问扩展事件。\n\n![A371128_1_En_10_Fig13_HTML.jpg](img/A371128_1_En_10_Fig13_HTML.jpg)\n\
  **图 10-13.** 访问扩展事件\n\n右键单击会话节点并选择 `新建会话向导` 或 `新建会话`，即可配置新会话。这两种选项都相当易于使用。\n\n以下是一个用于创建\
  \ XEvent 以监控阻塞和死锁的示例 T-SQL 脚本：\n\n```sql\nCREATE EVENT SESSION [Sample_XEvents]\
  \ ON DATABASE\nADD EVENT sqlos.wait_info(\nACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),\n\
  ADD EVENT sqlserver.blocked_process_report(\nACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),\n\
  ADD EVENT sqlserver.database_xml:deadlock_report(\nACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),\n\
  ADD EVENT sqlserver.lock_deadlock(\nACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),\n\
  ADD EVENT sqlserver.sp_statement_completed(\nACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text)),\n\
  ADD EVENT sqlserver.sql_batch_completed(\nACTION(sqlserver.database_name,sqlserver.session_id,sqlserver.sql_text))\n\
  ADD TARGET package0.event_file(\nSET filename=N'https://YourStorageAccountName.blob.core.windows.net/ContainerName/OutputFile.xel'),\n\
  ADD TARGET package0.ring_buffer\nWITH (STARTUP_STATE=ON)\nGO\n```\n\n可以创建类似的会话来监控\
  \ SQL 数据库上的其他事件。\n\n创建扩展事件需要 `CONTROL` 权限。此权限默认授予 `DBO` 用户。\n\n关于当前正在运行的 XEvent\
  \ 会话以及通过 XEvents 公开的事件、操作、目标等的其他信息，可以从 Azure SQL Database 公开的多个 DMV（动态管理视图）和目录视图中获取。以下是一些最常用的\
  \ DMV 和目录视图：\n\n*   `sys.dm_xe_database_session_events`：公开有关当前活动会话已配置事件的信息。\n* \
  \  `sys.dm_xe_database_sessions`：公开有关当前活动扩展事件会话的信息。\n*   `sys.database_event_sessions`：公开\
  \ SQL 数据库上配置的所有 XEvents 会话的信息。\n*   `sys.dm_xe_objects`：提供有关 Azure SQL Database\
  \ 上 XEvents 公开的事件、操作、目标等的信息。此 DMV 与 Microsoft SQL Server 中可用的类似。\n\n扩展事件有助于确定 Azure\
  \ SQL Database 的性能问题或其他问题。但请注意，不要因捕获过多的会话或事件而使数据库过载。这样做可能导致内存过度提交，并最终引发数据库性能问题。\n\
  \n## 总结\n\n本章讨论了 `数据库吞吐量单元` (`DTU`) 以及选择正确的性能级别至关重要。我们探讨了如何更改 Azure SQL 数据库的服务层级和性能级别，然后介绍了\
  \ Azure SQL 数据库和 Azure 管理门户上提供的各种性能优化和监控功能。\n\n\n\n# 索引\n\n## Microsoft Azure\n\n\
