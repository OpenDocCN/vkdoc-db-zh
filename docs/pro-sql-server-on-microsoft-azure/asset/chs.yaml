  \ 将增长到的最大大小。要添加/修改 `页 Blob` 内的内容，你必须指定一个 `偏移量` 和一个与 512 字节 `页` 边界对齐的 `范围`。写入操作发生后立即发出提交。`页\
  \ Blob` 的最大大小为 1TB。\n    *   `追加 Blob`。这些是专门为 `追加` 操作设计的 `块`。它们不公开 `块 ID`。当修改 `追加\
  \ Blob` 时，通过 `追加块` 操作在末尾添加 `块`。你无法更新/删除现有的 `Blob`。一个 `追加 Blob` 可以有不同的大小，最大为 4MB，并且可以包含\
  \ 50,000 个 `Blob`。\n\n### 表存储\n\n`Azure 表存储` 包含大量结构化的非关系数据。图 3-2 显示了 `表存储` 的以下关键组件：\n\
