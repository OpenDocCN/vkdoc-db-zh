  \ *图 5-10*）来自定义此视图。这些磁贴最有用的方面之一是它们可以固定到你的仪表板上。因此，如果你有一个需要监控的关键指标，可以将其固定在登录 Azure\
  \ Web 门户后立即可见的仪表板上。\n\n![A371128_1_En_5_Fig10_HTML.jpg](img/A371128_1_En_5_Fig10_HTML.jpg)\n\
  *图 5-10. Azure 虚拟机诊断视图*\n\n如果你发现某个特定的性能指标对你的业务非常重要，那么你可以基于阈值为性能监视器数据添加警报。如 *图 5-10*\
  \ 所示，定义了一个当客户操作系统 CPU 使用率大于 80 时触发的警报。当警报触发时，可以自动向虚拟机的管理员发送电子邮件。如果需要将警报通知发送到公司内部的特定组，也可以添加其他收件人。\n\
  \n如果你觉得电子邮件太老派，可以通过为警报配置 Web 钩子进一步操作。Azure 提供了使用 HTTP 或 HTTPS 端点通过 POST 方法发送 JSON\
  \ 有效负载的功能。如果你已有处理传入 Web 请求以创建寻呼和工单的工具，你的工作将变得更加简单！你的支持人员可以无缝处理工单，而无需担心为这些环境设置额外的诊断和警报。如果你正在考虑减少学习曲线并最大化效率曲线，这个功能绝对值得一个大拇指，因为它正中下怀！\n\
  \n如果你觉得需要添加需要监控的指标，可以使用“所有设置”边栏选项卡中“监视”组下的 `Diagnostics` 选项来完成。默认情况下，Azure 不会添加任何警报，因此你需要在同一\
  \ `Monitoring` 组下的 `Alerts` 选项中添加与你的业务相关的警报。\n\n随着 Azure Automation 的出现，你可以将许多 PowerShell\
  \ 脚本转换为自动化 Runbook，这些 Runbook 可以被有权访问 Azure 自动化帐户的多个用户重复使用。你可以使用 Azure 自动化 Runbook\
  \ 来运行安装后的自定义配置，例如设置用户数据库，甚至为 `Analysis Services`、`Reporting Services` 和 `Integration\
  \ Services` 进行额外配置。\n\n以下是根据您的要求，以高级文档工程师和翻译员身份整理优化后的中文 Markdown 文档。已严格遵循所有格式规范，包括保留粗体、斜体、代码、链接结构，并优化了技术表述的一致性：\n\
  \n\n\n### Azure Resource Explorer\n\n如果你想获取已部署的任何 ARM 资源的 JSON 表示形式（甚至包括你订阅中其他人部署的资源，前提是你拥有权限），那么请访问\
  \ Azure Resource Explorer (`resources.azure.com`)。这可以说是另一种“复制粘贴”体验，尽管如果你不太熟悉 `GET`\
  \ 和 `PUT` 这些术语，可能会觉得有点新奇！你可以使用 Web UI 来浏览你订阅中的资源。\n\n在我们离题太远之前，Azure Resource Explorer\
  \ 提供了一种方法来检查你现有的部署，并从中创建模板。GitHub 上的 **Azure-QuickStart-Templates** 仓库下有一大批可用模板。如果你喜欢挑战，可以使用\
  \ Visual Studio 2015 从零开始创建一个 Azure 资源管理器模板。但是，需要预先警告的是，即使是经验最丰富的专业人士，在从头开始创建模板的过程中调试错误时，也常因忽略一些显而易见的疏漏而急得抓狂。这种挫败感最无害的一个例子，就是在虚拟机部署过程中未能发现未使用强密码。\n\
  \n图 5-11 所示的右窗格提供了针对你资源的 `GET` 和 `PUT` 选项。当你分别点击 **Documentation**（文档）和 **PowerShell**\
  \ 选项卡时，你还可以获得资源方法的文档以及用于创建资源的等效 PowerShell 命令。一个 Azure 模板包含以下组件：\n\n![A371128_1_En_5_Fig11_HTML.jpg](img/A371128_1_En_5_Fig11_HTML.jpg)\n\
  **图 5-11. Azure 资源管理器门户**\n\n*   **Schema**（架构）提供了 JSON 架构文件的位置，该文件描述了模板语言的版本。在当今快速变化的世界中，这一点非常重要。\n\
  *   **Content Version**（内容版本）指定了要使用的模板版本。\n*   **Parameters**（参数）是可以为每次部署自定义的值。\n\
  *   **Variables**（变量）在模板中用作 JSON 片段，以简化模板语言表达式。\n*   **Resources**（资源）是要部署或更新的服务类型，例如虚拟机、存储帐户等。\n\
  \n以下来自 Azure Resource Explorer UI 的 PowerShell 代码用于获取虚拟机的实例视图和模型视图：\n\n```powershell\n\
  $vRM = Get-AzureRmResource -ResourceGroupName  -ResourceType Microsoft.Compute/virtualMachines\
  \ -ResourceName  -ApiVersion 2015-06-15\n## 附加命令，用于获取附加到虚拟机的数据磁盘列表\n$vRM.Properties.StorageProfile.DataDisks\n\
  ```\n\n如果你点击如图 5-11 所示的 **Actions**（操作，`POST`，`DELETE`）选项卡，你将能够对你的资源执行一系列操作，例如关闭、重新启动、启动你的虚拟机，甚至删除该资源。该\
  \ UI 还提供了等效的操作方法，如 `POST` 和 `DELETE`。操作仅在你处于读/写模式下才可能。一旦你拥有一个模板文件，就可以使用 `New-AzureRmResourceGroupDeployment`\
  \ cmdlet 来执行基于 JSON 模板的部署。该 cmdlet 提供了一个选项，可以使用 `-TemplateParameterFile` 开关来指定参数列表。\n\
