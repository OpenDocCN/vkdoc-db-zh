  *   `容器`。一个 `容器` 提供了所有 `Blob` 的分组。一个 `存储帐户` 可以包含多个 `容器`，每个 `容器` 可以包含多个 `Blob`。\n\
  *   `Blob`。一个 `Blob` 可以包含文本数据或二进制数据，例如文档、媒体文件或应用程序安装程序。Microsoft Azure 存储提供三种类型的\
