  \n\n# 6. SQL 混合解决方案\n\n在当今 IT 行业充满活力的商业环境中，正发生着巨大的范式转变。您需要通过降低总拥有成本 (TCO) 并最大化投资回报，来不断创新和发展业务。Microsoft\
  \ Azure 为您提供了一个完美的平台，通过整合公共云资源和私有云资源来实现这一点。混合云使用的经典案例是将敏感数据存储在本地数据中心，并连接到其他数据所在的公共云。\n\
  \n混合云在您的本地数据中心和公共云之间架起了一座桥梁。Microsoft 的云方法非常独特，因为其云中的数据中心所使用的服务器具有一致性。任何客户都可以根据自身需求优化资源，将关键和安全的数据存储在本地数据中心，并通过将工作负载卸载到云端来利用存储成本，从而实现扩展而不会实际影响成本。\n\
  \nSQL Server 与 Azure 的云服务集成得非常好，提供端到端的体验，使用您所熟悉的 `T-SQL` 或 `PowerShell` 相同的界面。混合环境是指资源既来自云端，也来自本地站点的环境。这些资源包括物理机、虚拟机、存储\
  \ (SAN、云存储)、数据中心 (用于 AD、登录策略等) 以及数据库。因此，您可以设想几种运行混合环境的方式。例如，您可以有一个运行在本地的 SQL Server，并使用云资源。或者，您的\
  \ SQL Server 在云端运行，同时使用本地资源。当我们考虑采用混合方式，让运行在本地环境中的 SQL Server 与云通信时，我们使用两种资源：`Azure\
  \ 存储` 和 `Azure 虚拟机`。\n\nMicrosoft Azure 使您能够以极低的风险存储海量数据，因为数据会被写入多个副本。除此之外，还有自动磁盘修复功能，它会运行校验和以确保数据在逻辑上是一致的。\n\
  \n如果校验和不匹配，我们会自动将该磁盘移除，并立即创建另一个副本。这意味着在任何时候都拥有数据的三个副本。成本也很低，这是客户转向 Azure 的原因之一。另一个重要资源是\
  \ Azure 中提供的虚拟机。这些虚拟机具有高可用性，提供自动虚拟机修复功能，提供多种尺寸供您选择，并且是极佳的成本节约方案。\n\n图 6-1 展示了我们可以利用云基础设施来节省成本的不同场景。例如，我们可以将备份存储到\
  \ `Azure 存储`，将 SQL Server 文件存储在 `Azure 存储`，并使用 `AlwaysOn` 技术来扩展本地基础设施，并在云端配置一个辅助站点。我们将在本章后面详细探讨这些内容。\n\
  \n![A371128_1_En_6_Fig1_HTML.jpg](img/A371128_1_En_6_Fig1_HTML.jpg)\n\n**图 6-1.**\
  \ 使用 Azure 存储进行本地集成\n\n## 混合模型概览\n\n混合模型提供以下优势：\n\n*   您的业务决策变得敏捷，并且可以基于此模型快速决策使资源可用。\n\
  *   您无需浪费时间在准备机器（硬件/软件）上；相反，您可以专注于更高效的业务逻辑或满足客户需求。\n*   您现在可以利用 Microsoft Azure\
  \ 应用程序生态系统，构建高度可扩展的应用程序。\n\n但是，当您采用这种混合基础设施时，需要考虑几个因素：\n\n*   您可能需要考虑维护混合基础设施的问题，因为它涉及额外的组件，如防火墙、虚拟网络、路由设备等。\n\
  *   管理和访问资源涉及不同类型的应用程序，因此经典整合可能是一个挑战。\n*   在迁移到云端之前，您应评估复杂性，进行风险评估，并对可行性进行基准研究。\n\
  \n运行在任一侧的应用程序、工具和服务并不总是可互操作的。有若干应用程序无法轻易跨越这些边界，因此对您来说，评估利弊非常重要。\n\n\n## 备份到 Azure\
  \ 存储\n\nSQL Server 2014 增强了 `BackuptoUrl` 功能，现在可以直接执行备份并将文件存储到 Microsoft Azure 存储中。通过这种方式，你可以将本地、Azure\
  \ 虚拟机上的数据库备份存储在 Azure 存储中，并利用 Azure 存储的特性（如内置的数据冗余和复制功能，用于设计你的大规模可扩展灾难恢复策略）。这是通过\
  \ REST API 而非 HTTP 来与 Azure 存储交互实现的。基本上，你需要以下条件：\n\n*   Microsoft Azure 账户\n*  \
  \ Azure 存储账户\n*   存储账户内的容器\n*   SAS 密钥\n\n你可以在此处阅读更多关于 `SAS` 密钥的信息：[`https://azure.microsoft.com/en-us/documentation/articles/storage-dotnet-shared-access-signature-part-1/`](https://azure.microsoft.com/en-us/documentation/articles/storage-dotnet-shared-access-signature-part-1/)。\n\
  \n图 6-2 描绘了备份和还原功能，其中备份存储在 Azure 存储中。你可以轻松地从那里执行还原。\n\n![A371128_1_En_6_Fig2_HTML.jpg](img/A371128_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2. Azure 存储中的备份\n\n在 SQL 2014 中，我们使用 `Backup2Url` 或 `Smart Backup` 来完成备份。这些备份以前存储在页面\
  \ blob 中。页面 blob 针对随机读写进行了优化。在 SQL 2016 中，此功能得到增强并提升到了一个新的水平，你可以备份到块 blob，这对客户来说应该更经济。除此之外，这种架构还有一些优点。备份/还原可以针对条带集进行，这在页面\
  \ blob 或 `Backup2Url` 下是不可能的。对 blob 的备份进行了一些增强，这将进一步提升还原体验。\n\n图 6-3 展示了如何利用混合环境，并将数据库的备份（此处为完整事务日志备份）存储在\
  \ Azure 存储中，从而帮助业务降低总体拥有成本。\n\n![A371128_1_En_6_Fig3_HTML.jpg](img/A371128_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3. Microsoft Azure 存储中的数据库备份文件\n\n以下脚本将帮助你备份数据库，如下所示。有两个主要步骤：创建凭据，然后向 Azure\
  \ 发出备份数据库命令。\n\n### 步骤 1：为备份到 Azure 创建凭据\n\n```sql\nIF NOT EXISTS\n(SELECT * FROM\
  \ sys.credentials\nWHERE credential_identity = 'mycredential')\nCREATE CREDENTIAL\
  \ mycredential WITH IDENTITY = 'cred1'\n,SECRET = 'SAS Key' ;\n```\n\n你可以从管理门户获取\
  \ `SAS` 密钥：\n\n```\n旧/经典门户 :-\na) 单击存储账户\nb) 单击“管理访问密钥”。\nc) 你将找到访问存储账户的主密钥和辅助密钥。\n\
  注意：- 单击存储账户后，单击“容器”选项卡，你可以使用此处的“添加”选项添加一个名为 testcontainer 的容器。\n新门户 :-\na) 创建存储账户\n\
  b) 单击存储账户\nc) 在“设置”下，单击“访问密钥”\nd) 你将在存储账户名下找到主密钥和辅助密钥。\n```\n\n在新门户中，单击存储账户，然后单击\
  \ Blob 服务，如图 6-4 所示。你将看到不同的存储服务。\n\n![A371128_1_En_6_Fig4_HTML.jpg](img/A371128_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 新门户中显示的存储服务\n\n你可以使用图 6-5 中所示的 `+` 号添加容器。当你单击 Blobs 服务（见图 6-4）时，你将获得不同的选项，如图\
  \ 6-5 所示。\n\n![A371128_1_En_6_Fig5_HTML.jpg](img/A371128_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5. 向新门户添加容器\n\n现在将容器命名为 `testcontainer` 并选择适当的访问类型，如下所示。\n\n### 步骤 2：发出备份数据库命令以备份到\
  \ Azure\n\n```sql\nBACKUP DATABASE DB1\nTO URL ='https://storageaccountname.blob.core.windows.net/testcontainer/DB1_Full.bak'\n\
  WITH CREDENTIAL = 'cred1',\nCOMPRESSION,\nSTATS = 5;\nGO\nBACKUP DATABASE DB2\n\
  TO URL ='https://storageaccountname.blob.core.windows.net/testcontainer/DB2_Full.bak'\n\
  WITH CREDENTIAL = 'cred1',\nCOMPRESSION,\nSTATS = 5;\nGO\n```\n\n类似地，你也可以将日志文件备份到\
  \ Azure 存储账户的容器中。\n\n\n## Microsoft Azure 存储中的 SQL Server 文件\n\nSQL Server 2014\
  \ 具有一项独特功能，可原生支持将 SQL Server 数据库存储于 Microsoft Azure 存储中。现在，您可以在本地或在 Microsoft Azure\
  \ 托管的虚拟机上创建数据库，并将数据存储在 Microsoft Azure Blob 存储中。通过分离和附加存储在 Microsoft Azure 存储中的文件，可以轻松地在不同环境之间移动数据库。\n\
  \n### 创建数据文件和凭据\n\n创建数据文件时，您需要执行以下操作：\n\n1.  创建一个存储账户及其内部的容器。\n2.  创建一个具有该容器策略的\
  \ SQL Server 凭据。\n3.  使用共享访问签名访问该容器。\n\n使用将文件存储在 Microsoft Azure 存储中的原生功能时，您需要：\n\
  \n1.  在容器上创建策略并生成 SAS 密钥。要获取 SAS 密钥，请从 [`https://azurestorageexplorer.codeplex.com/`](https://azurestorageexplorer.codeplex.com/)\
  \ 下载 Microsoft 存储资源管理器。\n2.  每个容器都需要一个凭据，其名称必须与 `containers` 路径匹配。\n\n### 优势与架构\n\
  \n图 6-6 展示了您的数据库可以驻留在本地，也可以驻留在 Microsoft Azure 中的 Azure 虚拟机上。\n\n![A371128_1_En_6_Fig6_HTML.jpg](img/A371128_1_En_6_Fig6_HTML.jpg)\n\
  \n**图 6-6.** 存储在 Microsoft Azure 存储账户中的数据文件\n\n如图所示，我们有一个在 Azure 虚拟机中创建的 `DB3`，其文件驻留在\
  \ Azure 存储上。另一方面，`DB6` 驻留在本地环境，但其文件存储在 Azure 存储中。在 Windows Azure Blob 存储服务上使用 SQL\
  \ Server 数据文件的优势如下：\n\n*   **可移植性。** 可以轻松地将数据库从 Windows Azure 虚拟机（IaaS）分离，并将该数据库附加到云中的不同虚拟机上；此功能也适用于实现高效的灾难恢复机制，因为所有内容在\
  \ Windows Azure Blob 存储中都是直接可访问的。要迁移或移动数据库，请使用引用 Blob 位置的单个 `CREATE DATABASE` Transact-SQL\
  \ 查询，且对存储账户和计算资源位置没有限制。如果操作系统和/或 SQL Server 维护需要较长的停机时间，您还可以使用滚动升级场景。\n*   **数据库虚拟化。**\
  \ 结合 SQL Server 2012 和 SQL Server 2014 中的包含数据库功能，数据库现在可以作为每个租户的自包含数据存储库，然后可以动态移动到不同的虚拟机以实现工作负载再平衡。有关包含数据库的更多信息，请参阅\
  \ SQL Server 联机丛书中的以下主题：\n*   **高可用性和灾难恢复。** 由于所有数据库文件现在都是外部托管的，即使虚拟机崩溃，您也可以从另一个热备用虚拟机附加这些文件，准备接管处理工作负载。本书后面的“实现故障转移集群机制”一节提供了此机制的实际示例。\n\
  *   **可扩展性。** 在 Windows Azure 中使用 SQL Server 数据文件，您可以绕过单个虚拟机上可挂载的 Windows Azure\
  \ 磁盘最大数量的限制。每个 Windows Azure 磁盘在每秒最大 I/O 操作数（IOPS）方面存在限制。\n\n让我们看一下架构并简化一下。增强功能是在\
  \ SQL Server 引擎层内部实现的。集成在三个层面完成；图 6-7 将稍微简化这个概念。\n\n*   **管理层。** 这包括一个名为 `XFCB Credential\
  \ Manager` 的新组件，它管理访问 Windows Azure Blob 容器所需的安全凭据并提供必要的安全接口。机密信息在 `master` 系统数据库中的\
  \ SQL Server 内置安全存储库中以加密方式维护和保护。\n*   **文件控制层。** 包含一个名为 `XFCB` 的新对象，这是文件控制块（FCB）的\
  \ Windows Azure 扩展，用于管理针对 NTFS 文件系统上每个 SQL Server 数据或日志文件的 I/O；它实现了针对 Windows Azure\
  \ Blob 存储进行 I/O 所需的所有 API。\n*   **存储层。** 在存储层，SQL Server I/O 管理器现在能够以极小的开销和极高的效率原生生成对\
  \ Windows Azure Blob 存储的 REST API 调用；此外，此组件可以生成有关性能计数器和扩展事件（xEvents）的信息。\n\n![A371128_1_En_6_Fig7_HTML.jpg](img/A371128_1_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7.** SQL Server 存储引擎文件 I/O\n\n### 实施示例\n\n以下是一个使用此概念创建示例数据库的示例：\n\n```sql\n\
  -- 在 Windows Azure 存储中创建文件的数据库\n-- 步骤 1：创建凭据\nCREATE CREDENTIAL [https://storageaccountName.blob.core.windows.net/testcontainer]\n\
  WITH IDENTITY='SHARED ACCESS SIGNATURE',\nSECRET = 'SECRET KEY'\n```\n\n此密钥是使用 Azure\
  \ 存储资源管理器生成的。\n\n1.  选择 `testcontainer` 并单击工具栏上的安全按钮。\n2.  单击“共享访问签名”选项卡。\n3.  单击“生成签名”按钮以生成\
  \ SAS 签名（参见图 6-8）。\n\n![A371128_1_En_6_Fig8_HTML.jpg](img/A371128_1_En_6_Fig8_HTML.jpg)\n\
  \n**图 6-8.** Blob 和容器安全对话框：存储资源管理器\n\n一旦您使用图 6-8 中的数据获取到字符串后，请按照以下步骤操作。\n\n1.  使用该字符串作为\
  \ `SECRET`，即签名字符串中 `?` 之后的部分。\n2.  在 Windows Azure 容器中创建具有数据和日志文件的数据库，如下所示：\n\n\
  ```sql\nCREATE DATABASE FirstHybridDB\nON\n( NAME = FirstHybridDB_dat,\nFILENAME\
  \ = 'https://storageaccountname.blob.core.windows.net/testcontainer/FirstHybridDB.mdf'\
  \ )\nLOG ON\n( NAME = FirstHybridDB_log,\nFILENAME =  'https://storageaccountname.blob.core.windows.net/testcontainer/FirstHybridDB_Log.ldf')\n\
  ```\n\n\n\n## 智能备份\n\n智能备份是 SQL Server 2014 的新功能之一，它利用 Azure 基础架构进行智能备份。以下是其与传统备份的几个关键区别：\n\
  \n*   备份基于智能判断而非预设计划\n*   完全由 SQL Server 管理\n*   备份保留期自动管理\n*   备份检索更可靠\n\n智能备份可以在实例级别或数据库级别进行配置。唯一需要的输入参数是保留期，范围从\
  \ 1 天到 30 天。当在实例级别启用智能备份时，需要手动添加现有数据库；但是，新建数据库将自动加入计划。备份可以存储为加密或未加密形式。为了增强安全性，密钥可以定期重新生成。需要运行以下脚本来启用此功能：\n\
  \n```sql\n-- 启用智能备份\nEXEC smart_admin.sp_set_db_backup\n@database_name='TestDB',\n\
  @retention_days=30,\n@credential_name='cred1',\n@encryption_algorithm='NO_ENCRYPTION',\n\
  @enable_backup=1\nGO\n```\n\n如果您希望使用智能备份功能创建的备份被加密，则需要创建密钥、证书和凭据。出于安全目的，可以定期轮换密钥；这可以通过使用辅助密钥并重新生成它来实现（参见清单\
  \ 6-1）。\n\n```sql\nUse master;\nGo\n--创建主密钥\nCreate master key encryption by password='Password@123'\n\
  Go\n--创建证书\nCreate certificate mycert1 With subject ='MySmartBackup'\nIf exist (select\
  \ * from sys.credentials where name = 'cred1')\nDrop credential cred1\n--创建凭据\n\
  Create credential cred1\nWith identity ='StorageAccountName',\nSecret = 'SAS KEY'\n\
  --在实例级别启用智能备份。\nUse msdb;\nGO\nEXEC smart_admin.sp_set_instance_backup\n--@database_name='TestDB'\n\
  @retention_days=30\n,@credential_name='cred1'\n,@encryption_algorithm ='AES_128'\n\
  ,@encryptor_type= 'Certificate'\n,@encryptor_name='mycert1'\n,@enable_backup=1;\n\
  GO\n-- 在数据库级别启用智能备份。\nUse msdb;\nGO\nEXEC smart_admin.sp_set_db_backup\n@database_name='TestDB'\n\
  ,@retention_days=30\n,@credential_name='mycred1'\n,@encryption_algorithm ='AES_128'\n\
  ,@encryptor_type= 'Certificate'\n,@encryptor_name='Mycert1'\n,@enable_backup=1;\n\
  GO\n--查看实例级别的托管备份配置\nSelect * from msdb.smart_admin.fn_backup_instance_config ()\n\
  --查看配置详情\nSelect * from msdb.smart_admin.fn_backup_db_config ('')\n清单 6-1.\n为智能备份加密创建密钥\n\
  ```\n\n对于临时备份，请使用以下命令，但请注意这可能会中断备份链，需要触发一次新的完整备份：\n\n```sql\n--按需备份到云\nexec msdb.smart_admin.sp_backup_on_demand\
  \ 'TestDB','log'\nexec msdb.smart_admin.sp_backup_on_demand 'TestDB','database'\n\
  ```\n\n以下提供了更多关于如何为数据库创建 SQL Server 托管备份到 Windows Azure 的信息。\n\n[`https://msdn.microsoft.com/en-IN/library/dn451012.aspx`](https://msdn.microsoft.com/en-IN/library/dn451012.aspx)\n\
  \n## 在 Azure 虚拟机上配置 AlwaysOn\n\nAlwaysOn 技术多年来不断发展。我们的许多客户无法负担灾难恢复站点的费用。购买硬件成本高昂，维护可能成为负担，并且需要一个运维团队来管理站点。因此，这会增加您的总拥有成本。对于此类客户，我们希望为灾难恢复提供一种解决方案，因此从\
  \ 2012 年开始，我们在 Microsoft Azure (VM) 中添加了副本。这是一种 IaaS 服务，您可以在虚拟机上运行 SQL Server。截至目前，我们已有相当多的客户在\
  \ Azure 上运行其报表工作负载，并在那里进行备份，可将其用作灾难恢复站点。这样，他们卸载了备份操作，不会触及主服务器。在建立此类设置之前，需要检查几点：\n\
  \n*   延迟不应过高，以免副本无法跟上而远远落后。\n*   确认存储在不同数据中心的辅助副本上的数据符合数据保护和安全规范。\n\n您可以将主数据中心设在本地，并在\
  \ Azure 上添加辅助副本。此设置所需的要求将在稍后讨论。\n\n在 2014 年，我们引入了一个新的向导，您可以端到端地在云中添加副本。假设您需要配置一个\
  \ AlwaysOn 可用性组，并且您知道需要机器。您将需要安装 Windows 故障转移群集，然后需要启用 AlwaysOn，进行备份和恢复，然后将其发布以开始同步。然后使用这个新向导验证环境。\n\
  \n该向导还具有内置逻辑，如果发生故障，它会自动重试。它还设置了超时。\n\n如今，将可用性组扩展到 Azure VM 很容易；与将其保留在本地相比成本低廉。在这种情况下，您需要为\
  \ VM、存储和出站流量付费。入站流量免费，并且没有灾难恢复站点的硬件成本，因此它作为灾难恢复站点效果很好。您的辅助副本位于不同的站点，因此在灾难恢复期间，您可以手动故障转移到辅助副本。这样，您可以将工作负载（例如报表和\
  \ BI）卸载到 Azure 上可读的辅助副本。您也可以进行备份。您唯一需要做的是在本地和 Azure 之间配置站点到站点 VPN 隧道。完成此操作后，您就可以扩展您的\
  \ AlwaysOn 配置。\n\n以下是使用 AlwaysOn AG 扩展本地数据中心的要求：\n\n*   一个有效的订阅\n*   您本地网络中现有的 AlwaysOn\
  \ 可用性组\n*   使用 VPN 设备在本地网络和 Azure 虚拟网络之间建立连接。您可以在此处阅读更多信息：[`https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-site-to-site-create/`](https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-site-to-site-create/)\n\
  \n一旦完成，您就可以使用“添加 Azure 副本”向导，它将通过向 Microsoft Azure 添加另一个副本来帮助您扩展现有的 AG，如下所示：\n\n\
  1.  从 SQL Server Management Studio 中，转到 AlwaysOn 可用性组，然后转到可用性组，提供可用性组的名称。\n2.  右键单击可用性副本，然后单击“添加副本”。\n\
  3.  将出现如图 6-9 所示的向导。\n\n![A371128_1_En_6_Fig9_HTML.jpg](img/A371128_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9.\n添加副本向导 GUI\n4.  使用“连接”或“全部连接”按钮连接到您现有的副本。\n5.  在下一个屏幕上，您将看到图 6-10。\n\n\
  ![A371128_1_En_6_Fig10_HTML.jpg](img/A371128_1_En_6_Fig10_HTML.jpg)\n\n图 6-10.\n\
  \n\n### 添加副本向导：指定副本\n\n6.  在此屏幕上，单击“副本”选项卡，然后单击“添加 Azure 副本”按钮。\n7.  现在下载证书或使用现有证书（参见图\
  \ 6-11）。\n\n![A371128_1_En_6_Fig11_HTML.jpg](img/A371128_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11. 证书下载屏幕。你应该填写这些字段，因为此信息至关重要，将用于创建新的 Azure 副本。\n8.  之后，你将返回到“添加 Azure 副本”页面，在此处你需要验证/提供其他选项卡中的信息，例如备份首选项和终结点。\n\
  9.  根据你的业务需求选择数据同步类型。你可以在此处阅读更多信息：`` `https://msdn.microsoft.com/library/hh231021.aspx`\
  \ ``。\n\n完成后，你可以查看验证页面，纠正发现的问题，并重新运行向导。一旦完成，你将拥有一个位于 Microsoft Azure 中的副本。你应该为客户端创建一个侦听器以连接到这些副本。该侦听器将传入请求重定向到主副本或辅助副本。请参阅\
  \ Azure 文档或旁边提供的链接，以更深入地探索此概念及其实施。\n\n## 总结\n\n在当今世界，通过利用 Microsoft Azure 平台的能力更有效地管理资源对你的业务至关重要。你可以更加敏捷，更高效地管理资源。你可以利用\
  \ Microsoft 公有云扩展本地数据中心，并采用所谓的混合模式，这让你有机会利用两种环境的最佳优势。通过这种模型，你可以轻松地将业务和工作负载从不同的数据中心迁移。如今，你的应用程序能够利用\
  \ Microsoft Azure 存储来使用公有云、存储备份并安全地存储数据，同时与你现有的私有云环境无缝协作。\n\n# 7. 性能全解析\n\n在前面的章节中，我们讨论了在\
  \ Azure 虚拟机 (Azure VM) 上以各种组合部署 SQL Server 实例。我们已经提到了一些最佳实践，这些实践能让你从一开始就获得最佳配置。然而，在某些情况下，你可能需要运行运行状况检查以确保环境配置为最佳性能。此外，在排查运行在\
  \ Azure VM 上的 SQL Server 实例的性能问题时，你可能觉得有必要运行一次临时的运行状况检查。在本章中，我们将讨论在优化托管在 Azure VM\
  \ 上的 SQL Server 环境的性能时需要牢记的相似之处和不同之处。\n\n如果你想理解遵循 Azure 上的建议和最佳实践的价值，那么最好的例证莫过于超豪华车与经济型轿车或\
  \ SUV 的售后服务。如果你购买了一辆超豪华车，那么去服务中心的费用会非常昂贵，耗资不菲，长年累月下来足以买一辆经济型轿车。虽然超豪华车确实有面子价值、感觉豪华且引人注目，但从普通经济学常识的角度来看，它毫无益处。因此，如果你希望你的售后（即\
  \ Azure 中的部署后）服务经济、高效且高性能，那么你就需要格外注意最佳实践。像应用程序和数据库服务位置这样的简单细节，既可能成为你最好的朋友，也可能成为最坏的敌人。\n\
  \nAzure 中最常见的陷阱之一是，选择计算和存储的驱动原则保持不变。然而，选择配置的责任现在落在了软件应用程序管理团队身上，而不是硬件采购团队。另一个需要牢记的重要点是多租户。在多租户环境中，每个人都遵循相同的服务级别协议\
  \ (SLA)。物理访问硬件是不可能的，而且你与实际后端相距甚远，系统以服务的形式提供功能。在当今世界，“即服务”的概念正是基于商品化硬件、抽象内部细节并提供客户所需组件的原则运作的。\n\
  \n注意\n\n所有 `PowerShell` 脚本示例均可在 GitHub 存储库的以下项目中找到：`` `github.com/amitmsft/SqlOnAzureVM`\
  \ ``。本章中的 `PowerShell` 示例假设虚拟机部署在 `资源管理器` 模式下，并且你已经在执行这些 `PowerShell` 脚本的服务器上安装了\
  \ `Azure 资源管理器` `cmdlets`。`PowerShell` 脚本文件可以从本章前面提到的 GitHub 存储库下载，也可以通过将代码片段保存为\
  \ `` `.ps1` `` 文件来执行。本章所示的示例假设脚本将在安装有要评估的 SQL Server 实例的机器上执行。\n\n## 理解虚拟机性能\n\n\
  虚拟化已成为当今 IT 环境中无处不在的术语。业界曾有一波转向虚拟化的浪潮，现在又有一波转向云计算的浪潮。由于基础设施即服务 (IaaS) 与私有数据中心中的虚拟环境非常相似，因此存在一些可能成为陷阱的相似之处，也有一些你应该意识到的不同之处。在第\
  \ 2 章中，我们讨论了 Azure 架构，该架构显示有大量组件将计算和存储组件绑定成一个虚拟机。这个环境看起来可能像你的本地虚拟机，但在内部却大不相同。在本节中，我们将讨论运行\
  \ SQL Server 实例以获得最佳性能所需的最佳实践，以避免因配置错误或未遵循最佳实践而导致的任何性能损失。让我们首先看看计算和存储性能方面。\n\n\n\
  ### 计算\n\n根据微软的测试结果，建议企业版使用 DS3 型虚拟机，标准版使用 DS2 型虚拟机。这样做的主要原因之一在于本地 SSD 的可用性，它可用于\
  \ `tempdb`，同时也因为这些机器可以附加高级 IO 磁盘。Azure 存储及其不同层级已在第 3 章中重点介绍。如果需要针对多台机器自动执行此类检查，则可以使用自动化忍者的首选武器——即\
  \ PowerShell 来完成。清单 7-1 展示了如何检查运行 SQL Server 实例的虚拟机是否为 DS 系列或 G 系列。\n\n```powershell\n\
  $RGName = \"\"\n$VMName = \"\"\n"
- '# 获取虚拟机的详细信息

  $VM = Get-AzureRmVM -ResourceGroupName $RGName -Name $VMName

  '
- "# 检查是否遵循了推荐的机器规格\nif ($VM.HardwareProfile.VirtualMachineSize -like (\"*_DS*\")\
  \ -or $VM.HardwareProfile.VirtualMachineSize -like \"*_G*\")\n{\n    Write-Host\
  \ \"[INFO] 虚拟机规格: \" $VM.HardwareProfile.VirtualMachineSize -ForegroundColor Green\n\
  }\nelse\n{\n    Write-Host \"[WARN] 虚拟机规格: \" $VM.HardwareProfile.VirtualMachineSize\
  \ -ForegroundColor Yellow\n    Write-Host \"对于 SQL Server 标准版，建议使用 DS2 或更高规格的机器\"\
  \ -ForegroundColor Yellow\n    Write-Host \"对于 SQL Server 企业版，建议使用 DS3 或更高规格的机器\"\
  \ -ForegroundColor Yellow\n}\n```\n\n清单 7-1. 用于检查托管 SQL Server 实例的 Azure 虚拟机是否运行推荐规格的\
  \ PowerShell 代码\n\n选择更大规格虚拟机时，另一个需要考虑的因素是网络带宽。机器规格越大，可用的网络带宽就越多。需要注意的是，访问数据磁盘和附加到虚拟机的操作系统磁盘所产生的网络通信，不计入带宽限制。\n\
  \n## 网络\n\nAzure 在网络方面的一个根本性差异在于，由于引入了负载均衡器、防火墙、虚拟化等多层架构，其延迟可能比传统的本地环境更高。优化连接 SQL\
  \ Server 的应用程序网络性能的黄金法则之一是减少网络往返次数。如果无法做到这一点，建议将应用程序层整合到一台适当规格的虚拟机中。这可以确保网络调用无需离开虚拟机。\n\
  \n如果您有从本地环境“向上”迁移到云端的应用程序或系统，最好确定应用程序对数据库调用的网络特征以及其通信频繁程度。在无法按需更改以控制通信频繁程度和网络往返次数的情况下，您可以考虑使用\
  \ Azure 快速通道，它可以在 Azure 数据中心与本地基础设施或共置环境之间创建私有连接。根据您选择的层级和地理位置，带宽最高可达 10Gbps。\n\n\
  注意\n\n微软在其内部应用程序的混合部署中使用快速通道配置，并已观察到这些环境中的性能得到显著提升，相比之下，未使用快速通道时则不然。\n\n`Ctrl+C`\
  \ 和 `Ctrl+V` 是深受全球 IT 专业人士喜爱的强大功能，但有时也会成为性能的祸根。使用复制粘贴功能或任何其他方式，在虚拟机与本地环境之间移动任何类型的数据，都会消耗您的带宽。因此，当您看到开发人员在本地机器上运行\
  \ Management Studio，连接到 Azure VM 上托管的 SQL Server 实例，并对拥有百万行数据的表执行 `SELECT *` 查询时，就该紧张了！始终建议在\
  \ Azure 中设置一个（或多个）供开发人员用于开发/测试工作的客户端工作站。如果需要将数据移入或移出 Azure 区域或本地环境，出于性能和成本考虑，最好在移动前对数据进行压缩。\n\
  \n## 存储\n\n性能的下一个方面是存储布局的配置。虚拟机的 Azure 存储账户和计算资源应位于同一数据中心内，以减少传输延迟。如果未能做到这一点，性能将呈指数级下降。这类似于将床和床垫分别放在两个房间。床垫的功能可能得以发挥，但只有将两者组合在一起，才能真正实现其全部价值！\n\
  \n建议对托管在实例上的实例和数据库使用 SQL Server 的高可用性和灾难恢复功能，因为无法保证跨多个磁盘的写入顺序是一致的。这主要是为什么推荐用于托管\
  \ SQL Server 数据库文件的数据磁盘使用本地冗余存储（`LRS`）选项。需要记住的另一个方面是，`LRS` 存储的入口/出口带宽是其同类配置（如地域冗余存储/区域冗余存储）的两倍。\n\
  \n第一个自动化检查是使用虚拟机属性，比较计算资源和存储的位置，确保它们位于同一位置。实现此自动化的步骤是：检索附加到虚拟机的数据磁盘的存储配置文件，并确定是否为它们启用了复制。清单\
  \ 7-2 中的 PowerShell 脚本假设资源组中的存储账户与部署在同一资源组中的 SQL Server 实例相关联。它会检查是否启用了存储复制以及存储和计算是否位于同一位置。\n\
  \n```powershell\n$Accounts = @() # 用于存储账户名称的空列表\n"
- '# 获取虚拟机的详细信息

  $VM = Get-AzureRmVM -ResourceGroupName $RGName -Name $VMName

  '
- '# 从附加到 VM 的虚拟硬盘检索 URI

  $VHDs = $VM.StorageProfile.DataDisks.VirtualHardDisk.Uri

  '
- "# 从每个 URI 中检索存储账户\nforeach ($vhd in $VHDs)\n{\n    $Accounts = $Accounts + ((($vhd\
  \ -split \"//\")[1]) -split \".blob\")[0]\n}\n"
- '# 获取唯一的存储账户

  $Accounts = $Accounts | select -Unique

  '
- "# 获取账户的最佳实践\nforeach ($Account in $Accounts)\n{\n    $StorageAccount = Get-AzureRmStorageAccount\
  \ -ResourceGroupName $RGName -Name $Account\n    Write-Host \"***** 存储账户检查: \" $StorageAccount.StorageAccountName\n\
  \    if ($StorageAccount.AccountType.ToString().Contains(\"LRS\"))\n    {\n    \
  \    Write-Host \"[INFO] 该存储账户未启用复制\" -ForegroundColor Green\n    }\n    else\n\
  \    {\n        Write-Host \"[ERR] 账户类型: \" $StorageAccount.AccountType -ForegroundColor\
  \ Red\n        Write-Host \"[ERR] 建议为您的存储账户禁用任何形式的复制\" -ForegroundColor Red\n  \
  \  }\n    if ($VM.Location -eq $StorageAccount.Location.Replace(\" \",\"\"))\n \
  \   {\n        Write-Host \"[INFO] 存储和计算位于同一位置\" -ForegroundColor Green\n    }\n\
  \    else\n    {\n        Write-Host \"[ERR] 存储和计算不在同一位置\" -ForegroundColor Red\n\
  \    }\n}\n```\n\n清单 7-2. 用于存储最佳实践的 PowerShell 脚本\n\n\n\n### 数据磁盘\n\n在考虑 SQL Server\
  \ 数据库文件与操作系统磁盘时，无论平台和环境如何，都有一些最佳实践确实值得遵循。将数据文件和日志文件混合存放在同一卷中，或者在 Azure VM 场景下存放在同一数据磁盘上，从来都不是一个好主意。SQL\
  \ Server 数据文件依赖于随机 I/O，而事务日志执行顺序 I/O。由于 I/O 特性的不同，当数据和日志在短时间内执行大量操作时，存储介质无法达到最佳性能。\n\
  \n对于 Azure 磁盘，存在一种“预热效应”，可能导致吞吐量和带宽在短时间内降低。在数据磁盘一段时间（大约 20 分钟）未被访问的情况下，自适应分区和负载均衡机制会启动。如果在这些算法活动期间访问磁盘，你可能会注意到吞吐量和带宽在短时间内（大约\
  \ 10 分钟）有所下降，之后它们会恢复到正常水平。这种预热效应是由于 Azure 的自适应分区和负载均衡机制引起的，该机制在多租户存储环境中动态调整以适应工作负载变化。在决定将文件放置在数据磁盘上时，牢记这一点很重要。\n\
  \n操作系统磁盘是本地连接的磁盘，其性能等级与托管高性能、低延迟数据库文件的要求不同。建议不要在操作系统磁盘上存储任何东西，正如其名所示，只存放操作系统文件。从库中部署的所有\
  \ Azure 虚拟机都使用 `C:` 作为操作系统驱动器。清单 7-3 展示了一个用于检查数据库文件是否托管在操作系统驱动器上的代码示例。\n\n```powershell\n\
  $RulePass = 1\n$sqlquery = \"select distinct substring(physical_name,1,2) as drive\
  \ from sys.master_files where substring(physical_name,2,1) = ':'\"\n$sqlDrives =\
  \ Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery\n"
- "# Find out the OS Drive\n$Name = Get-WmiObject -Class Win32_DiskDrive -Filter \"\
  InterfaceType = `\"IDE`\" and SCSITargetId = 0\" | Select-Object PAth\n$Dependent\
  \ = Get-WmiObject -Class Win32_DiskDriveToDiskPartition | Where-Object {$_.Antecedent\
  \ -contains $Name.Path} | Select-Object Dependent\n$OSDrive = (Get-WmiObject -Class\
  \ Win32_LogicalDiskToPartition | Where-Object {$_.Antecedent -eq $Dependent.Dependent}\
  \ | Select-Object Dependent).Dependent.Split(\"`\"\")[1]\nforeach ($drive in $sqlDrives)\n\
  {\nif ($drive.drive -eq $OSDrive)\n{\nWrite-Host \"[ERR] Database files found on\
  \ OS drive\" -ForegroundColor Red\n$RulePass = 0\n}\n}\nif ($RulePass -eq 1)\n{\n\
  Write-Host \"[INFO] No database files found on OS drive\" -ForegroundColor Green\n\
  }\n```\n**清单 7-3.** 用于测试是否有任何数据库文件托管在操作系统 (`C:`) 驱动器上的 PowerShell 脚本\n\nMicrosoft\
  \ 团队在运行于 Azure 虚拟机上的 SQL Server 上测试了各种工作负载，关于磁盘配置的结论如下（假设你使用的是高级 IO）：\n\n*   在托管数据文件和\
  \ `tempdb` 的数据磁盘上启用读取缓存。这允许为后续读取缓存读写操作。写入操作会直接持久化到 Azure 存储，以防止数据丢失或损坏，同时仍能启用读取缓存。对于事务性工作负载，这非常有益。\n\
  *   对于将托管事务日志文件的数据磁盘，禁用读取缓存。这将完全绕过缓存。所有磁盘传输都直接针对 Azure 存储完成。此缓存设置可防止物理主机本地磁盘成为瓶颈。这是本地磁盘的一个常见问题，当事务日志刷新量很高时，表现为\
  \ `WRITELOG` 或其他 I/O 相关等待。在事务提交导致的日志刷新率非常高的场景中，此配置设置性能极佳。\n*   临时磁盘（通常是 D: 驱动器）的某些层级具有本地连接的\
  \ SSD。此类磁盘可用于托管 `tempdb` 或缓冲池扩展。缓冲池扩展是 SQL Server 2014 中添加的一项功能，它将非易失性存储作为 SQL Server\
  \ 缓冲池的扩展。有关检查临时驱动器是否托管除 `tempdb` 之外的数据库文件的代码示例，请参见清单 7-5。\n*   使用推荐的分配大小（64KB）格式化数据磁盘。这对于\
  \ OLTP 工作负载性能尤其有益。（参见清单 7-4。）\n\n许多部署因性能问题向 Microsoft 提起了支持事件，这些事件被归因于未遵循这些最佳实践。\n\
  \n```powershell\nfunction global:Split-Result()\n{\nparam\n(\n[parameter(ValueFromPipeline=$true,\n\
  Mandatory=$true)]\n[Array]$MATCHRESULT\n)\nprocess\n{\n$ReturnData=NEW-OBJECT PSOBJECT\
  \ –property @{Title=”;Value=”}\n$DATA=$Matchresult[0].tostring().split(\":\")\n\
  $ReturnData.Title=$Data[0].trim()\n$ReturnData.Value=$Data[1].trim()\nReturn $ReturnData\n\
  }\n}\n$LogicalDisks = Get-WmiObject -Query \"select * from Win32_LogicalDisk Where\
  \ MediaType = 12\" | Select Name, MediaType, FileSystem, Size\nforeach ($disk in\
  \ $LogicalDisks)\n{\n$Drive = $disk.Name + \"\\\"\n$RESULTS=(fsutil fsinfo ntfsinfo\
  \ $Drive)\n$AllocSize = $Results | Split-Result | Select-Object Title,Value | Where-Object\
  \ {$_.Title -eq \"Bytes Per Cluster\"}\nif ($AllocSize.Value -eq 65536)\n{\nWrite-Host\
  \ \"Allocation size for \" $Drive \" = \" $AllocSize.Value \" bytes\" -ForegroundColor\
  \ Green\n}\nelse\n{\nWrite-Host \"Allocation size for \" $Drive \" = \" $AllocSize.Value\
  \ \" bytes (Recommendation is 64K)\" -ForegroundColor Red\n}\n}\n```\n**清单 7-4.**\
  \ 用于检查分配单元大小是否设置为 64KB 的 PowerShell 代码\n\n如果你不使用高级 IO（标准 IO），则应在所有数据磁盘上禁用缓存。对于生产场景，建议使用高级\
  \ IO，因为它专为处理并行、高队列深度的 IO 工作负载而构建。具有高度并发和 I/O 密集型工作负载的应用程序将看到持续的高性能吞吐量。\n\n请记住，测试效果仅与测试环境相当。在低能力硬件上进行基准测试会得到低基准值，同样，在低层级\
  \ Azure 虚拟机上进行基准测试会提供不准确的瓶颈和基准数字。Azure 的美妙之处在于，你可以在测试完成后立即关闭测试环境，这让你可以在不影响测试质量的情况下关注月度账单。同时，你可以以远低于本地部署成本的价格维护生产环境的副本。\n\
  \n**注意**\n\n在临时驱动器上托管任何其他数据库文件将导致机器关闭后这些数据库文件被彻底清除。在临时驱动器上托管除 `tempdb` 之外的数据库文件是更新\
  \ DBA 简历的一种非常快速且行之有效的方法！\n\n\n\n\n# 优化 Azure VM 上的 SQL Server 性能\n\n```\n$RulePass\
  \ = 1\n$sqlquery = \"select distinct substring(physical_name,1,2) as drive,db_name(database_id)\
  \ as dbname, name, physical_name from sys.master_files where substring(physical_name,2,1)\
  \ = ':'\"\n$sqlDrives = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery\n\
  $Files = $sqlDrives | Where-Object {$_.drive -eq $TempDrive -and $_.dbname -ne \"\
  tempdb\"}\nforeach ($file in $Files)\n{\n    Write-Host \"[ERR] Database file\"\
  \ $file.name \"(physical file:\" $file.physical_name \") for database\" $file.dbname\
  \ \"is hosted on the temporary drive\" -ForegroundColor Red\n    $RulePass = 0\n\
  }\nif ($RulePass -eq 1)\n{\n    Write-Host \"[INFO] No files found on the temporary\
  \ drive\" $TempDrive -ForegroundColor Green\n}\nelse\n{\n    Write-Host \"[ERR]\
  \ Any data stored on\" $TempDrive \"drive is SUBJECT TO LOSS and THERE IS NO WAY\
  \ TO RECOVER IT.\" -ForegroundColor Red\n    Write-Host \"[ERR] Please do not use\
  \ this disk for storing any personal or application data.\" -ForegroundColor Red\n\
  }\n```\n清单 7-5. 检查文件是否托管在临时驱动器上的 PowerShell 代码\n\n### 存储空间\n\n存储空间是在虚拟机预配过程中常用的配置模式。如果您的指定设置需要多个磁盘，最新的库映像模板会在所有磁盘上创建一个\
  \ Windows 存储空间（虚拟驱动器）。您可能会思考是否有必要使配置复杂化。许多本地托管的数据库具有单个数据库文件，无法轻易拆分为多个文件。这可能是由于缺乏分区数据，这可能导致单个文件成为热点。\n\
  \n如果您使用的是 Windows Server 2012 或更高版本，可以使用存储空间将两个或更多驱动器分组到存储池中，然后使用该池中的容量创建称为存储空间的虚拟驱动器。Windows\
  \ 的此功能使您无需将数据库拆分为多个文件。但是，需要注意一些问题。\n\n第一个需要记住的问题是正确配置存储池的列数。增加列数可以显著提高顺序工作负载的性能。随机工作负载的性能提升不那么显著，在不同列数下表现出更均匀的性能。与空间的列数直接相关的另一个因素是未完成的\
  \ IO 量或要从存储空间读取或写入的数据量。大量的列数有利于生成足够负载以饱和多个磁盘的应用程序，但会对需求较低的应用程序引入不必要的容量扩展限制。如果数据磁盘超过八个，则需要使用\
  \ PowerShell 脚本来适当调整列数，如清单 7-6 所示。\n\n第二个需要记住的问题是弹性设置。存储空间提供三种弹性设置：简单、奇偶校验和镜像。如果您选择镜像，您的数据磁盘将对\
  \ SQL Server 实例生成的单个 IO 执行两个 IO 操作。建议使用镜像来提高弹性，但这会消耗您在 Azure 上的 IO 带宽。如果您只关心保护虚拟机免受磁盘故障的影响，这已经由\
  \ Azure 存储在后台完成（详见第 3 章），其中默认创建了承载数据文件的 blob 的冗余副本。\n\n```\nNew-VirtualDisk -StoragePoolFriendlyName\
  \ CompanyData -FriendlyName BusinessCritical -ResiliencySettingName simple -Size\
  \ 1TB -ProvisioningType Thin -NumberOfColumns 2 -Interleave 65536\n```\n清单 7-6.\
  \ 创建具有 2 个列数和简单弹性设置的虚拟磁盘存储池的 PowerShell 脚本示例\n\n### Tempdb\n\nSQL Server 的临时数据库一直是优化不佳的查询的受害者，这些查询将操作溢出到\
  \ `tempdb`。困扰 `tempdb` 的性能问题并非 Azure VM 独有的问题。如果配置不当，`tempdb` 性能是持续的头痛之源。为确保您的 `tempdb`\
  \ 保持良好状态，请启用 `trace flag 1118 (-T1118)` 以防止并发线程在创建临时对象期间发生资源分配争用。\n\n增加 `tempdb`\
  \ 中的数据文件数量以最大化磁盘带宽并减少分配结构中的争用是一个好主意。一般规则是，如果逻辑处理器的数量小于或等于八，则使用与逻辑处理器相同数量的数据文件。如果逻辑处理器的数量大于八，则使用八个数据文件。如果争用持续存在，则将数据文件数量增加四的倍数（最多为逻辑处理器的数量），直到争用降至可接受的水平，或者对工作负载/代码进行更改。如果虚拟机的临时驱动器是\
  \ SSD，建议将 `tempdb` 托管在临时磁盘上以提高性能吞吐量。\n\n图 7-1 清楚地表明，当 `tempdb` 托管在标准磁盘上时，性能不稳定，并且某些\
  \ IO 的延迟可能非常高。这将导致性能不稳定，这对于关键任务或关键业务工作负载来说是难以接受的。当将 `tempdb` 托管在 SSD 或高级 IO 磁盘上时，性能是稳定的，偏差可以忽略不计。\n\
  \n![A371128_1_En_7_Fig1_HTML.jpg](img/A371128_1_En_7_Fig1_HTML.jpg)\n图 7-1. SSD、高级\
  \ IO 和标准磁盘上的 `tempdb` 性能比较\n\n总之，如果您的应用程序需要一致的 `tempdb` 性能，选择 SSD 或高级 IO 是最佳选择。\n\
  \n### 数据库设置\n\n前面的部分详细介绍了了解 IO 模式和所需 IO 带宽如何帮助您以正确的配置部署 Azure VM。这反过来又能让您获得最佳的性价比！还有一些数据库级别的设置有助于优化良好的性能吞吐量。\n\
  \n数据库页面压缩有助于减少 IO，这对于所有环境都是正确的，但在 Azure 中，它肯定有助于提高通信密集型系统的性能。\n\n如果您热衷于阅读博客，您会看到多位\
  \ SQL Server 专业人士不鼓励在数据库上使用自动收缩和自动关闭；对于托管在 Azure VM 上的 SQL Server 实例中的数据库也是如此。清单\
  \ 7-7 展示了如何确定任何托管在 SQL Server 实例上的数据库是否启用了 `AUTO CLOSE` 和 `AUTO SHRINK`。\n\n```\n\
  $RulePass = 1\n$sqlquery = \"select name, is_auto_shrink_on, is_auto_close_on from\
  \ sys.databases\"\n"
- '# Execute a query against the SQL Server instance

  $dbs = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

  '
- "# Loop through the database properties\nforeach ($db in $dbs)\n{\n    if ($db.is_auto_shrink_on\
  \ -eq $true)\n    {\n        Write-Host \"[ERR] Database\" $db.name \"has Auto Shrink\
  \ turned on\" -ForegroundColor Red\n        $RulePass = 0\n    }\n    if ($db.is_auto_close_on\
  \ -eq $true)\n    {\n        Write-Host \"[ERR] Database\" $db.name \"has Auto Close\
  \ turned on\" -ForegroundColor Red\n        $RulePass = 0\n    }\n}\nif ($RulePass\
  \ -eq 1)\n{\n    Write-Host \"[INFO] No databases found with Auto Close and Auto\
  \ Shrink turned on\" -ForegroundColor Green\n}\n```\n清单 7-7. 用于确定任何数据库上是否启用了 AUTO\
  \ CLOSE 和 AUTO SHRINK 的 PowerShell 代码\n\n在虚拟机上安装 SQL Server 后，您可能需要执行的一些维护任务包括：\n\
  \n1.  更改数据库数据和日志文件的默认位置，以确保新的数据库文件托管在为托管 SQL Server 数据库文件而配置的虚拟机的附加数据磁盘上。\n2.  将系统数据库文件移动到数据磁盘。\n\
  3.  将错误日志、跟踪文件位置和扩展事件文件目标移动到数据磁盘。\n\n\n### 服务账户权限\n\n关于是否为 SQL Server 服务账户启用“在内存中锁定页面”权限，网上一直存在一个长期的争论。“在内存中锁定页面”是\
  \ Windows 的一项策略，它决定哪个账户可以使用进程将内存分配锁定在物理内存中。它能防止系统将数据分页到磁盘上的虚拟内存中。当 SQL Server 服务账户被授予此用户权限时，缓冲池内存便无法被\
  \ Windows 分页出去。对于运行在 Azure 虚拟机上的 SQL Server 实例，建议您将“在内存中锁定页面”安全权限授予 SQL Server 服务账户。这可以防止\
  \ SQL Server 进程的工作集被分页到磁盘。遭受明显性能打击的最大缺点是，虚拟机的页面文件默认驻留在本地连接的磁盘上。清单 7-8 展示了如何确定是否已将“在内存中锁定页面”安全权限授予\
  \ SQL Server 服务账户。\n\n**注意**\n\n请务必为 SQL Server 实例限制 `MAX SERVER MEMORY`，尤其是在为 SQL\
  \ Server 服务账户启用“在内存中锁定页面”安全权限时。\n\n```\n$RulePass = 1\n$sqlquery = \"SELECT locked_page_allocations_kb\
  \ FROM sys.dm_os_process_memory\"\n"
- '# 针对 SQL Server 实例执行查询

  $lpim = Invoke-Sqlcmd -ServerInstance $sqlserver -Query $sqlquery

  if ($lpim.locked_page_allocations_kb -eq "0")

  {

  Write-Host "[WARN] 未将 Lock Pages in Memory 安全权限授予 SQL Server 服务账户" -ForegroundColor
  Red

  $RulePass = 0

  }

  if ($RulePass -eq 1)

  {

  Write-Host "[INFO] 已将 Lock Pages in Memory 安全权限授予 SQL Server 服务账户" -ForegroundColor
  Green

  }

  ```

  **清单 7-8.** 用于确定是否将内存锁定权限授予 SQL Server 服务账户的 PowerShell 脚本


  另一个容易获得的性能提升是将“性能卷维护任务”安全权限授予 SQL Server 服务账户。当 SQL Server 服务账户拥有此权限时，它允许 SQL Server
  执行即时文件初始化。这使得 SQL Server 能够创建数据文件而无需将页面清零。如果您没有任何安全合规性要求禁止此操作，则应考虑将此安全权限授予 SQL Server
  服务账户。没有此权限，创建数据库文件所需时间可能长达 10 倍！图 7-2 说明了拥有和没有此权限时的差异。此类演示最好留给本书，不应在生产环境中进行测定。清单
  7-9 展示了如何确定 SQL Server 服务账户是否拥有为数据文件执行即时文件初始化的权限。它适用于任何 SQL Server 实例。


  ![A371128_1_En_7_Fig2_HTML.jpg](img/A371128_1_En_7_Fig2_HTML.jpg)


  **图 7-2.** 即时文件初始化对性能的影响


  ```

  '
- '# 查找计算机上安装的 SQL Server 服务

  $SqlService = Get-WmiObject -Query "SELECT * FROM Win32_Service WHERE PathName LIKE
  ''%sqlservr%''"

  '
- '# 将计算机上的 secpol 权限导出到文件

  $filename  = "secpol.inf"

  $secpol = secedit /export /cfg $filename | Out-Null

  $secpol = Get-Content $filename

  '
- '# 在输出中搜索卷维护任务权限

  $IFI = Select-String -Path $filename -Pattern "SeManageVolumePrivilege"

  '
- '# 删除文件

  #Remove-Item $filename

  '
- '# 循环遍历计算机上找到的每个 SQL Server 服务

  foreach ($servcice in $SqlService)

  {

  '
- '# 找出服务账户的 SID 值

  $objUser = New-Object System.Security.Principal.NTAccount($servcice.StartName)

  $strSID = $objUser.Translate([System.Security.Principal.SecurityIdentifier])

  '
- '# 找出 SQL 服务账户 SID 是否存在于输出中

  if ($IFI.ToString().Contains($strSID.Value))

  {

  Write-Host "[INFO] SQL Server 服务账户 ["$servcice.StartName"] 拥有 ''Perform Volume Maintenance
  Task'' 安全权限" -ForegroundColor Green

  }

  else

  {

  Write-Host "[ERR] SQL Server 服务账户 ["$servcice.StartName"] 未拥有 ''Perform Volume Maintenance
  Task'' 安全权限" -ForegroundColor Red

  }

  }

