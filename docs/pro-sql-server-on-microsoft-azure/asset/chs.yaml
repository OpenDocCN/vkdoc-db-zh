  #### 始终加密


  始终加密是 Azure SQL Database 和 SQL Server 2016 提供的一项新功能，它允许客户端在应用程序内管理敏感数据的加密，而无需将信息暴露给数据库层。由于加密逻辑不向数据库层暴露，数据库管理员和服务器管理员无法访问或控制实际的敏感信息。


  始终加密支持两种加密方式：确定性加密和随机化加密。确定性加密对于相同的明文总会生成相同的加密输出，而随机化加密则每次都生成不同的值。确定性加密虽然在需要搜索或连接加密数据的场景中很有用，但也可能更容易受到攻击。


  始终加密使用两种不同的密钥——列主密钥和列加密密钥，后者使用列主密钥进行加密。清单 9-8 展示了如何在 Azure SQL 数据库上实现始终加密。


  ```sql

  USE [MyDatabase1]

  GO

  CREATE COLUMN MASTER KEY [CMKey]

  WITH

  (

  KEY_STORE_PROVIDER_NAME = N''AZURE_KEY_VAULT'',

  KEY_PATH = N''https://.vault.azure.net/keys/AlwaysEncryptedkey''

  )

  GO

  CREATE COLUMN ENCRYPTION KEY [CEKey]

  WITH VALUES

  (

  COLUMN_MASTER_KEY = [CMKey],

  ALGORITHM = ''RSA_OAEP'',

  ENCRYPTED_VALUE = 

  )

  GO

  CREATE TABLE dbo.EncryptedTable

  (

  ID INT IDENTITY(1,1) PRIMARY KEY,

  LastName NVARCHAR(32) COLLATE Latin1_General_BIN2

  ENCRYPTED WITH

  (

  ENCRYPTION_TYPE = DETERMINISTIC,

  ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'',

  COLUMN_ENCRYPTION_KEY = [CEKey]

  ) NOT NULL,

  Salary INT

  ENCRYPTED WITH

  (

  ENCRYPTION_TYPE = RANDOMIZED,

  ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'',

  COLUMN_ENCRYPTION_KEY = [CEKey]

  ) NOT NULL

  );

  GO

  ```


  清单 9-8.

  实现始终加密的 T-SQL 脚本示例


  始终加密确保数据无论是在数据库存储中静态保存，还是在从客户端到数据库或从数据库到客户端的传输过程中，都永远不会以明文形式存在。


  除了拥有大量功能来确保数据安全外，Azure SQL Database 还符合各种行业标准。


  ## 总结


  在本章中，您了解了 Azure SQL Database 提供的各种业务连续性选项。异地复制及其相关的数据库故障转移功能提供了非常稳健、开箱即用的灾难恢复和高可用性选项，还可用于将部分读取工作负荷卸载到辅助数据库，以优化整体数据库性能。


  您还了解了 Azure SQL Database 提供的众多安全功能，这些功能可以配置或使用，以确保您的数据永远不会泄露。借助始终加密，Azure SQL Database
  确保传输中的数据永远不会泄露，而行级安全和数据屏蔽则确保用户只能看到他们被授权查看的数据。


  ## Azure SQL 数据库：性能与监控


  Microsoft Azure SQL Database 可以配置为不同的服务层级——基本、标准和高级——每个层级又包含多个性能级别——基本、S1、S2、P1、P2
  等。每个性能级别提供一组递增的资源，旨在提供越来越高的事务吞吐量。


  每个服务层级和性能级别中的资源和事务处理能力以数据库吞吐量单位 (DTU) 表示。DTU 提供了一种基于 CPU、内存或 IO 速率的混合负载来描述性能级别相对事务处理能力的方法。本质上，从标准层级的
  S0 性能级别迁移到 S1 性能级别（即将 DTU 从 10 增加到 20）相当于将数据库的处理能力翻倍。


  在本章中，我们将解释什么是 DTU，以及为何选择正确的性能级别非常重要。我们还将介绍 Microsoft Azure SQL Database 中可用的各种性能优化和性能监控功能。


  ## 什么是 DTU？


  DTU 是一个逻辑表示，用于在特定且定义的工作负荷与 Azure SQL DB SKU/性能级别之间建立关联。如第 8 章所述，用一个非常简化的描述来说，1 个
  DTU 相当于在数据库上实现约 1 笔交易/秒所需资源的量度。以 DTU 衡量性能提供了一种保证 Azure SQL 数据库可预测性能的方法。例如，使用 P1
  性能级别（125 DTU）运行的数据库将提供约 125 笔交易/秒的可预测事务吞吐量。


  ## 选择性能级别


  在设计本地（或 Azure VM）SQL Server 部署架构时，传统上用户使用机器硬件规格来确定其数据库工作负荷可用的能力。然而，在平台即服务 (PaaS)
  的环境中，这种方法行不通，因为硬件细节被抽象化了。


  本地部署受到一个事实的制约，即在选择硬件规格之前需要进行大量的思考和计算，因为扩展部署可能需要新的硬件投资。


  在 Azure SQL Database 环境中选择正确的性能级别，归结为理解数据库的事务吞吐量需求，然后为数据库选择合适的性能级别。如果选择的性能级别不满足要求，可以非常轻松地将数据库扩展（或缩减）到不同的性能级别，以提供更高（或更低）的吞吐量。Microsoft
  已发布了不同性能级别的性能基准，其中每个性能级别的吞吐量已按每小时、每分钟和每秒的交易率进行了汇总。这些性能基准数字及其汇总数据可用于确定数据库所需的大致性能级别。


  ## 更改性能级别


  如前所述，可以使用 Azure 门户或 PowerShell 非常轻松地更改 SQL Database 的服务层级或性能级别。当用户开始时选择了错误的服务层级或性能级别，或者因为业务预期数据库操作减少/增加而需要降低/提高性能级别时，这种更改性能级别的能力就派上了用场。


  更改服务层级是一项在线操作，这意味着在更改生效期间数据库保持在线状态。


  ### 使用 PowerShell 更改服务层级或性能级别


  PowerShell 可用于配置 SQL 数据库的服务层级或性能级别。清单 10-1 将现有数据库的服务层级更改为标准版，性能级别更改为 S0。


  ```

  #登录到 Azure 帐户

  Add-AzureRmAccount

  #选择订阅

  $subscriptions = Get-AzureRmSubscription

  $SubscriptionId = $subscriptions[0].SubscriptionId

  Select-AzureRmSubscription -SubscriptionId $SubscriptionId

  #选择资源组

  $ResourceGroupName = Get-AzureRmResourceGroup | Where-Object {$_.ResourceGroupName
  -notlike "Default*"}

  $ResourceGroup= $ResourceGroupName[1].ResourceGroupName

  #选择 Azure SQL 服务器和数据库名称

  $ServerName = (Get-AzureRmSqlServer -ResourceGroupName $ResourceGroup)[1].ServerName

  $DatabaseName = (Get-AzureRmSqlDatabase -ServerName $ServerName -ResourceGroupName
  $ResourceGroup | Where-Object {$_.DatabaseName -ne "Master"}).DatabaseName

  #选择新的服务层级和性能级别

  $NewEdition = "Standard"

  $NewPerformanceLevel = "S0"

  '
- "# 更改服务层级/性能级别\n$ScaleRequest = Set-AzureRmSqlDatabase -DatabaseName $DatabaseName\
  \ -ServerName $ServerName -ResourceGroupName $ResourceGroup -Edition $NewEdition\
  \ -RequestedServiceObjectiveName $NewPerformanceLevel\n```\n\n清单 10-1. 用于更改 Azure\
