- "# 3. Microsoft Azure 存储\n\nMicrosoft Azure 存储是一个云存储系统，为客户提供灵活存储海量数据的能力，且数据可存储任意时长。其独特之处在于，你可以随时随地访问这些数据。它也是一种基于用量的存储系统（即，你为你所使用和所存储的内容付费）。在\
  \ Microsoft Azure 存储中，由于本地复制和地理复制的实现，数据具有持久性，从而支持灾难恢复。该存储由 Blob（用户文件）、表（结构化存储）和队列（消息传递）组成。数据具有高度持久性、可用性，并且可大规模扩展。它通过\
  \ REST API、.NET、Java、Node.js、Python、PHP、Ruby 中的客户端库进行公开。\n\n## Azure 存储服务\n\nMicrosoft\
  \ Azure 存储服务有多种类型（参见图 3-1）：\n\n![A371128_1_En_3_Fig1_HTML.jpg](img/A371128_1_En_3_Fig1_HTML.jpg)\n\
