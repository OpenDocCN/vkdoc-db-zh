  \n\n\n### 设计决策\n\n微软 Azure 存储的设计基于一些关键的客户业务需求：\n\n*   **强一致性**。对于企业客户而言，在将他们的关键业务应用程序迁移到云端时，一致性至关重要。执行乐观并发控制所需的条件读取、写入和删除操作对他们来说极为重要。因此，微软\
  \ Azure 存储根据 CAP 定理提供了三个属性——**强一致性**、高可用性和分区容错性。\n*   **全局可扩展的命名空间存储**。借助微软 Azure\
  \ 存储，您可以存储海量数据，并能从全球任何地方一致地访问它。微软 Azure 将 DNS 作为命名空间的一部分，并将命名空间分为三部分——存储账户名称、分区名称和对象名称\
  \ (`http(s)://AccountName.<Service>.core.windows.net/PartitionName/ObjectName`)。\n\
  *   **灾难恢复**。借助微软 Azure 存储，数据被存储在全球分散的多个数据中心中。这是为了确保在任何情况下都能保护客户数据，抵御地震、火灾、风暴等自然灾害。\n\
  *   **可扩展性**。数据需要具备可扩展性，应能根据峰值流量需求自动扩展并进行负载均衡。\n*   **多租户**。许多客户可根据其需求，由同一个共享存储提供服务，从而降低了存储成本。\n\
  \n高级存储具有以下重要特性：\n\n*   **持久性**。高级存储建立在本地冗余存储技术之上，该技术将数据副本存储在同一区域内。这是为了确认企业工作负载数据的持久性。仅当写入操作已被\
  \ LRS 系统持久化复制后，才会向应用程序确认写入成功。\n*   **新的 `\"DS\"` 系列虚拟机**。新的 DS 系列虚拟机支持高级存储数据磁盘。您可以利用一种新的复杂缓存功能，该功能可实现读取操作的极低延迟。\n\
  *   **Linux 支持**。通过 Linux 集成服务 4.0，微软已为更多 Linux 版本提供支持。有多种发行版已经过微软 Azure 高级存储的验证，例如\
  \ Ubuntu（版本 12.04、14.04、14.10 和 15.04）、SUSE 12 等。\n\n## Azure 存储架构内部原理\n\n存储戳是在微软\
  \ Azure 基础结构上的一组存储节点机架集群，每个机架位于具有冗余网络和电源的独立域中（参见图 3-5）。\n\n![A371128_1_En_3_Fig5_HTML.jpg](img/A371128_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5.\n存储戳架构\n\n所有的读写操作都针对这些存储集群。目标是使存储戳在容量、事务和带宽方面的利用率保持在 70%左右，以便为更高的吞吐量获得更好的寻道时间。这提供了针对存储戳内机架故障的更强弹性。\n\
  \n位置服务管理所有存储存储戳。它执行诸如账户负载平衡和账户分配等操作，并处理这些存储戳之间的地理复制。位置服务本身也跨两个地理位置分布，以实现其自身的灾难恢复。\n\
  \n**注意**\n\n有关微软 Azure 存储的更多信息，我们推荐以下网站：\n\n[`http://sigops.org/sosp/sosp11/current/2011-Cascais/printable/11-calder.pdf`](http://sigops.org/sosp/sosp11/current/2011-Cascais/printable/11-calder.pdf)\n\
  \n[`https://blogs.msdn.microsoft.com/windowsazurestorage/2011/11/20/sosp-paper-windows-azure-storage-a-highly-available-cloud-storage-service-with-strong-consistency/`](https://blogs.msdn.microsoft.com/windowsazurestorage/2011/11/20/sosp-paper-windows-azure-storage-a-highly-available-cloud-storage-service-with-strong-consistency/)\n\
  \n### 复制引擎\n\n存在两种复制引擎：戳内复制（流层）和戳间复制（分区层）。\n\n戳内复制提供同步复制，并确保所有数据在存储戳内都是持久的。它在不同故障域之间保留足够不同的数据副本，以防磁盘、节点或机架故障。这由分区层完成，并且位于客户写入请求的关键路径上。仅当数据在戳内复制成功后，才会向客户端返回成功。\n\
  \n戳间复制通过在后台延迟复制数据来提供异步复制。这是一个对象级别的复制，要么复制整个对象，要么复制最近的更改。此复制用于在两个位置保留数据以实现灾难恢复，在存储戳之间迁移账户的数据。它通过优化使用存储戳间的网络带宽，提供针对地理灾难的地理冗余。\n\
  \n### 存储戳内的层次结构\n\n存储戳内有三个层次（参见图 3-6）：\n\n![A371128_1_En_3_Fig6_HTML.jpg](img/A371128_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6.\n分区层中的动态负载均衡\n\n*   **流层/分布式文件系统层**。这是最底层，负责处理磁盘并将数据存储到磁盘。这意味着它将比特位存储在磁盘上，并将数据复制到许多服务器上，以保持数据在存储戳内的持久性。可以将其视为存储戳内的分布式文件系统层。数据被存储到称为“扩展区”的文件中，它们在区域内升级域和故障域之间被复制三次。这是一个仅追加的文件系统，因此数据永远不会被覆盖。数据会被追加到扩展区的末尾。\n\
  *   **分区层**。这一层有两个独特的目的。它理解数据抽象。它理解什么是 Blob、什么是表实体、什么是消息，以及如何对这些对象执行事务。因此，它确保事务排序和乐观并发控制，在流层之上存储对象数据，并缓存对象数据以减少磁盘\
  \ I/O。该层还负责对存储戳内的所有对象进行分区。该层还负责一个大规模可扩展的索引，该索引用于索引所有 Blob、表实体和队列。有一个主节点负责获取此索引，并根据索引的负载将其分解为范围分区。这些对象根据分区名称值被分解为不相交的范围，并由不同的分区服务器提供服务（即，它管理哪个分区服务器为\
  \ Blob、表和队列的哪个分区范围提供服务）。这样做是为了对访问大索引的 TPS 流量进行负载均衡。\n*   **前端层**。为 Blob、表和队列提供 REST\
  \ 协议。用于身份验证、授权以及日志记录和收集指标。\n\n您可能想知道，在这种仅追加的文件系统中是如何提供结构化存储系统的？即，当文件系统是仅追加时，如何允许仅更新\
  \ Blob/表？\n\n从高层次看，数据抽象在分区层被视为日志（流）。对数据的任何更新都会被追加到日志中，这意味着它们被追加到日志的最后一个扩展区。可以将其视为扩展区的链表链接。因此，追加操作只发生在最后一个扩展区。所有先前的扩展区都被封存，永不向其追加数据。然后数据被提交并成功返回给客户端。与此同时，所有最近的更新都存储在内存中，并在后台进行处理，因此会在关键写入路径之外懒惰地处理这些检查点。然后这些更新被合并到一棵\
  \ B+树中。因此，存在用于提交更新的日志，然后是检查点，以及用于查找您数据最新版本的树。\n\n\n\n### 维护读取请求的可用性/一致性\n\n由于所有按位维护的副本都是相同的，这意味着可以从任何副本进行读取。\n\
  为了读取可用性，会并行发出读取请求，取最先返回的请求，并将数据提供给客户。现在，在处理读取请求期间，如果检测到高延迟，会并行发出另一个读取请求进行处理。最先返回的请求将被发送给客户端。\n\
  \n### 分区层的负载均衡\n\n通过负载均衡，尝试平衡`TPS`，即对索引进行负载均衡。在图 3-6 中，主服务器持续监控分区服务器以及每个分区的负载。如果它发现某个分区过热，这意味着该分区收到的待处理请求过多，主服务器可以迅速决定将此范围分区拆分为更小的范围分区（处理此类问题的方法之一）。\n\
  一旦分区移动到负载相对较低的不同分区服务器，它会更新分区映射。然后，前端可以将与该特定范围相关的请求转发到这个新服务器，从而最终平衡每秒事务数。需要注意的一个重要点是，在整个过程中没有数据移动（在`DFS`层）；它只是获取分区范围索引并进行更新，以便分区映射知道应将请求转发到哪个分区服务器。\n\
  \n### DFS 层的负载均衡\n\n对于`DFS`层的负载均衡，监控存储节点的负载，用于确定将从哪个副本读取数据。同时，有一个进程在后台根据 95%延迟执行并行读取。\n\
  对于写入，监控节点以及正在追加数据的副本的负载。当某个节点显得过载时，它会封存该副本并开始追加到一个新的扩展区。这被放置在日志的末尾。\n\n### DFS 容量的负载均衡\n\
  \n副本会被移动，以确保所有节点的磁盘都有一些可用空间。`DFS`层是一个仅追加的系统，这意味着它永远不会就地写入任何内容。重要的是要有一些总是可以追加的可用空间。这样可以避免存储节点出现热点。此外，如果有一个坏节点/磁盘或一个机架丢失，他们必须确保有一种更快的方法在所有节点/磁盘之间复制扩展区。利用可用的磁盘空间，可以快速完成此操作。\n\
  \n## Azure 存储提供的持久性\n\nAzure 存储提供三种类型的持久性。\n*   `LRS`（本地冗余存储）。在单个区域内的单个区域中存储数据的三个副本。所有三个副本都将位于同一区域中，从而在节点/机架/磁盘故障时提供持久性。\n\
  *   `ZRS`（区域冗余存储）。适用于块 Blob，并在多个区域中存储三个数据副本，设计上将所有三个副本保留在同一区域内，但不是强制性的，因为有时您可能将其存储在不同区域。除此之外，它提供了比`LRS`更高的持久性，因为现在数据可以抵御与区域相关的故障（例如设施在某个区域内发生火灾）。\n\
  *   `GRS`（全球冗余存储）。您存储六个副本，三个在主区域，三个在辅助区域，地理上分散。这提供了额外的持久性，以保护数据抵御重大的区域性灾难，例如风暴、龙卷风、地震或飓风。\n\
  \n### Azure 高级存储\n\n`Azure 高级存储`由 Microsoft 推出。它有助于为运行 I/O 密集型工作负载的虚拟机提供高性能、低延迟的磁盘支持。它使用`SSD`（固态硬盘）来存储数据。如果您的工作负载需要高吞吐量，并且您希望利用这些磁盘的速度和性能，那么`Premium\
  \ Storage`应该是您的选择。\n对于需要持续高`IO`性能和低延迟的`Azure 虚拟机`工作负载，`高级存储`是合适的。为了在`SQL Server`、`MongoDB`、`Cassandra`等平台上承载`OLTP`、`大数据`和`数据仓库`等`IO`密集型工作负载，`高级存储`是一个很好的选择。\n\
  使用`高级存储`，您的应用程序可以为每个`VM`存储多达`64TB`的数据，并且可以为您提供每个`VM` `80Kbps IOPs`（每秒输入输出操作）的吞吐量和每个`VM`\
  \ `2000Mbps`的磁盘吞吐量。\n为了使用`高级存储`，您需要记住以下几点：\n*   您需要一个`高级存储`帐户。可以使用存储`REST API`版本`2014-02-14`或更高版本（存储和服务管理）、`PowerShell\
  \ 8.10`或更高版本或`Ibiza 门户`（ [`https://portal.azure.com`](https://portal.azure.com)\
  \ ）创建`高级存储`帐户。当您使用`PowerShell`创建`高级存储`帐户时，需要指定`type`参数为`Premium_LRS`。例如：\n    ```\n\
  \    New-AzureStorageAccount -StorageAccountName \"Testpremiumaccount\" -Location\
  \ \"East US\" -Type \"Premium_LRS\"\n    ```\n*   并非所有区域都支持`高级存储`。目前，美国中部、美国东部和西部、北欧和西欧、日本东部和西部、东南亚和澳大利亚东部支持它。\n\
  *   它仅支持`Azure 页 Blob`，因为它用于保存可用作`Azure 虚拟机`的永久性磁盘。\n*   它是本地冗余的，并在同一区域内保留数据的三个副本。\n\
  *   为了使用`高级存储`，您需要配置`GS 系列`或`DS 系列`的`虚拟机`。\n*   对于所有`高级`数据磁盘，默认的磁盘缓存策略是`只读`，而附加到`虚拟机`的`高级`操作系统磁盘设置为`读写`。\n\
  *   对于`高级存储`帐户，`IOPs`取决于磁盘的大小。目前有三种类型的高级磁盘——`P10`、`P20`和`P30`。关于`IOPs`和吞吐量规格，请参见表\
  \ 3-1。\n\n    表 3-1. 高级磁盘存储限制\n\n    | 磁盘类型 | P10 | P20 | P30 |\n    | --- | ---\
  \ | --- | --- |\n    | 磁盘大小 | 128GB | 512GB | 1TB |\n    | IOPS（每磁盘） | 500 | 2300\
  \ | 5000 |\n    | 吞吐量（每磁盘） | 100Mbps | 150Mbps | 200Mbps |\n\n使用`PowerShell`，您可以使用`高级存储`创建`虚拟机`。可以使用以下代码片段/Cmdlet\
  \ 来尝试此操作。请注意，它们只是 Cmdlet，应如此使用。您也可以参考`MSDN`链接；参见 [`https://msdn.microsoft.com/en-us/library/mt607148.aspx`](https://msdn.microsoft.com/en-us/library/mt607148.aspx)\
  \ 。\n\n\n\n## 使用高级存储和 PowerShell 创建 Azure 虚拟机\n\n创建以下高级存储账户：\n\n```powershell\n\
  C:\\> New-AzureRmStorageAccount -ResourceGroupName \"TestResourceGroup\" -AccountName\
  \ \"TestStorageAccount\" -Location \"US East\" -Type \"Premium_LRS\"\n```\n\n以下代码仅使用\
  \ ARM cmdlet；可用于创建虚拟机：\n\n```powershell\n# 为现有资源组和存储账户名称设置值\n$rgName=\"RGServers\"\
  \n$locName=\"East US\"\n$saName=\"Testserverssa\"\n# 设置现有虚拟网络和子网索引\n$vnetName=\"\
  XYZ\"\n$subnetIndex=0\n$vnet=Get-AzureRmVirtualNetwork -Name $vnetName -ResourceGroupName\
  \ $rgName\n# 创建 NIC\n$nicName=\"Test-NIC\"\n$domName=\"TestDom\"\n$pip=New-AzureRmPublicIpAddress\
  \ -Name $nicName -ResourceGroupName $rgName -DomainNameLabel $domName -Location\
  \ $locName -AllocationMethod Dynamic\n$nic=New-AzureRmNetworkInterface -Name $nicName\
  \ -ResourceGroupName $rgName -Location $locName -SubnetId $vnet.Subnets[$subnetIndex].Id\
  \ -PublicIpAddressId $pip.Id\n# 指定名称、大小和现有可用性集\n$vmName=\"TestVM\"\n$vmSize=\"Standard_A3\"\
  \n$avName=\"Test_AS\"\n$avSet=Get-AzureRmAvailabilitySet –Name $avName –ResourceGroupName\
  \ $rgName\n$vm=New-AzureRmVMConfig -VMName $vmName -VMSize $vmSize -AvailabilitySetId\
  \ $avset.Id\n# 添加 200GB 数据磁盘\n$diskSize=200\n$diskLabel=\"TestStorage\"\n$diskName=\"\
  Test-DISK01\"\n$storageAcc=Get-AzureRmStorageAccount -ResourceGroupName $rgName\
  \ -Name $saName\n$vhdURI=$storageAcc.PrimaryEndpoints.Blob.ToString() + \"vhds/\"\
  \ + $vmName + $diskName  + \".vhd\"\nAdd-AzureRmVMDataDisk -VM $vm -Name $diskLabel\
  \ -DiskSizeInGB $diskSize -VhdUri $vhdURI -CreateOption empty\n# 指定映像和本地管理员帐户，然后添加\
  \ NIC\n$pubName=\"MicrosoftWindowsServer\"\n$offerName=\"WindowsServer\"\n$skuName=\"\
  2012-R2-Datacenter\"\n$cred=Get-Credential -Message \"Type the name and password\
  \ of the local administrator account.\"\n$vm=Set-AzureRmVMOperatingSystem -VM $vm\
  \ -Windows -ComputerName $vmName -Credential $cred -ProvisionVMAgent -EnableAutoUpdate\n\
  $vm=Set-AzureRmVMSourceImage -VM $vm -PublisherName $pubName -Offer $offerName -Skus\
  \ $skuName -Version \"latest\"\n$vm=Add-AzureRmVMNetworkInterface -VM $vm -Id $nic.Id\n\
  # 指定操作系统磁盘名称并创建虚拟机\n$diskName=\"OSDisk\"\n$storageAcc=Get-AzureRmStorageAccount\
  \ -ResourceGroupName $rgName -Name $saName\n$osDiskUri=$storageAcc.PrimaryEndpoints.Blob.ToString()\
  \ + \"vhds/\" + $vmName + $diskName  + \".vhd\"\n$vm=Set-AzureRmVMOSDisk -VM $vm\
  \ -Name $diskName -VhdUri $osDiskUri -CreateOption fromImage\nNew-AzureRmVM -ResourceGroupName\
  \ $rgName -Location $locName -VM $vm\n```\n\n参考：https://azure.microsoft.com/en-in/documentation/articles/virtual-machines-windows-create-powershell/\n\
  \n## 高级存储内部机制\n\n高级存储磁盘在 Azure 存储中以页面 Blob 形式实现。每个未缓存的写入操作会复制到三个位于不同机架（故障域）的 SSD\
  \ 服务器上。高级存储中的数据存储在 SSD 驱动器上，从而提供更高的吞吐量。所使用的磁盘与使用标准存储获得的磁盘不同。有一个称为 Blob 缓存的组件运行在托管这些虚拟机的服务器上，利用服务器的\
  \ RAM/SSD 来实现更高的吞吐量和低延迟。它对高级磁盘和标准磁盘都启用，并配置为只读和读写缓存。对于只读缓存，它会同步将数据写入缓存和 Azure 存储。对于启用了写入缓存的磁盘，当虚拟机请求时，它会将数据写回\
  \ Azure 存储。这通过磁盘刷新或在 I/O 上指定直写标志（强制单元访问）来完成。\n\n虚拟机可以利用此缓存架构，提供极高的吞吐量和低延迟，从而极大地提升性能。\n\
  \n## Azure 存储最佳实践\n\n所有开发者在构建应用程序时遵循最佳实践非常重要。从客户合作中获得的经验使我们在处理 Azure 存储并从中获得最大性能方面得出了一些关键经验。\n\
  \n### 使用 Blob 提升性能\n\n处理任何形式的应用程序时，性能都很重要，更不用说 Blob。本节介绍了处理 Blob 时需要牢记的一些要点。当你将文件存储在\
  \ Blob 中，并对 Blob 进行读写时，有几个关键方面需要注意。\n\n单个 Blob 的读写速度最高可达 60Mbps，单个 Blob 每秒最多支持 500\
  \ 个请求。如果你有多个客户端需要读取同一个 Blob，并且可能会超过这些限制，你应该考虑使用 CDN 来分发 Blob。\n\n尽量使读取大小与写入大小匹配，并避免从具有大块的\
  \ Blob 中读取小范围数据。以下属性用于控制读取和写入大小：`CloudBlockBlob.StreamMinimumReadSizeInBytes` 和\
  \ `StreamWriteSizeInBytes`。\n\n你可以通过并行上传多个文件或通过并发上传来上传文件夹内容。并发上传意味着多个工作进程上传不同的 Blob。并行上传意味着多个工作进程上传同一\
  \ Blob 的不同块。\n\n并行上传多个 Blob 比将多个 Blob 块上传到同一 Blob 执行得更快。这是因为将多个 Blob 块并行上传到单个 Blob\
  \ 会影响单个分区，并受到分区性能目标的限制。并行上传多个 Blob 将在许多不同的分区上工作，并可能受到虚拟机带宽的限制。\n\n#### 复制/移动 Blob\n\
  \n你可以使用存储 REST API 在存储帐户之间复制 Blob。客户端应用程序可以指示存储服务从任何其他存储帐户复制 Blob。复制可以异步进行，这减少了带宽消耗。但是，你需要小心处理异步进程，因为无法保证完成时间。更好的方法是先将\
  \ Blob 下载到虚拟机，然后再复制到目标位置。在复制过程中，你需要确保虚拟机位于同一区域。\n\n#### AzCopy\n\n此实用程序由存储团队发布，可用于在存储帐户之间传输\
  \ Blob。你获得的传输速率非常高，建议你将其用于批量上传、下载和其他复制场景。（有关更多信息，请参阅 [`https://azure.microsoft.com/en-us/documentation/articles/storage-use-azcopy/`](https://azure.microsoft.com/en-us/documentation/articles/storage-use-azcopy/)。）\n\
  \n#### 选择合适的 Blob 类型\n\nAzure 存储支持两种类型的 Blob——页面 Blob 和块 Blob。你需要根据用例场景选择合适的 Blob\
  \ 类型，因为这会在很大程度上影响性能和可扩展性。当你想上传大量数据（例如将照片或视频上传到 Blob 存储）时，块 Blob 是合适的。如果应用程序需要对数据执行随机写入，则页面\
  \ Blob 是合适的。\n\n在使用 Microsoft Azure 存储时，请将以下 URL 用作检查清单。应用程序开发者可以遵循该文章，其中记录了重要的最佳实践，内容全面。它将有助于提升应用程序的性能。参见\
  \ [`https://azure.microsoft.com/en-us/documentation/articles/storage-performance-checklist/`](https://azure.microsoft.com/en-us/documentation/articles/storage-performance-checklist/)。\n\
  \n\n\n### 使用表进行性能提升\n\n以下列表提供了一些关于使用表的技巧，正如本章所讨论的，表是另一种可在不同场景中有效使用的服务。\n\n*   **可伸缩性**。当您的流量增加时，系统通常会执行负载均衡，但如果您的流量出现突发峰值，您可能无法立即获得该量级的吞吐量。如果您的模式存在突发峰值，您应该预期在突发期间会出现限流和/或超时，因为存储服务正在为您的表自动进行负载均衡。建议是缓慢增加流量，这样可以让系统有时间进行适当的负载均衡。\n\
  *   **JSON** (JavaScript 对象表示法)。一种流行且简洁的 `REST` 协议格式。`OData` 支持 `AtomPub` 和 `JSON`。`Atom`\
  \ 的一个缺点是其冗长的特性，这在编写表服务时可能是不需要的。表服务支持使用 `JSON` 而非基于 XML 的 `AtomPub` 格式来传输表数据。这可以将有效载荷大小减少多达\
  \ 75%，并能显著提升应用程序的性能。\n*   **禁用 Nagle 算法**。纳格尔算法非常流行，在 `TCP/IP` 网络中广泛实施以提升网络性能。在某些高交互性系统中，这可能无法为您提供最佳性能。对于\
  \ Azure 存储，纳格尔算法对表和队列服务的请求性能有负面影响，应尽可能将其禁用。\n*   **表与分区**。如何表示您的数据非常重要，因为这对表服务的性能有巨大影响。表被划分为分区。存储在一个分区中的所有实体共享相同的分区键，并在该分区内拥有一个唯一的行键来标识自身。好处是您可以在单个事务中更新实体，最多支持\
  \ 100 个独立的存储操作。您还可以在单个分区内更高效地查询数据，而不是查询跨越多个分区的数据。分区支持原子批处理事务，因此对存储在单个分区内实体的访问无法进行负载均衡。因此，作为开发者，您应使用以下技术：\n\
  \    *   您的客户端应用程序经常更新或查询的数据应位于同一分区中。这可能是因为您的应用程序正在聚合写入，或者您希望利用原子批处理操作。\n    * \
  \  您的客户端应用程序不常在同一原子事务中更新/查询的数据应位于不同的分区中。\n    *   避免出现热点分区，即那些比其他分区接收更多数据的分区。如果分区方案导致某个分区的数据使用频率远高于其他分区，那么请做好遇到限流的准备。该分区很可能会接近其可伸缩性目标。最好确保您的分区方案不会导致任何单一分区接近其可伸缩性目标。\n\
  \n一旦您将数据存储在 Microsoft Azure 存储服务中，理解能帮助您检索数据的最佳实践就变得非常重要。下一节将介绍这些重要实践。\n\n## 查询数据最佳实践\n\
  \n一旦您将数据存储在 Microsoft Azure 存储服务中，理解能帮助您检索数据的最佳实践就变得非常重要。\n\n作为查询数据的最佳实践，一个通用的经验法则是避免扫描。如果您必须进行扫描，应该组织数据，以便能够避免不必要的数据扫描。\n\
  \n*   **点查询**。尽可能多地使用此类查询，因为它们通过指定分区键和行键仅返回一个实体。\n*   **分区查询**。这些查询的性能不如点查询，应谨慎使用。它们检索共享相同分区键的数据集，通常您除了指定分区键外，还会指定一个行键范围或某个实体属性的值范围。\n\
  *   **表查询**。这种查询检索一组不共享公共分区键的实体，效率低下，应尽可能避免。\n*   **查询密度**。影响查询性能效率的重要因素之一是返回的实体数量与扫描的实体数量。低查询密度可能导致表服务对您的应用程序进行限流，因此应避免。以下是一些您可以避免低查询密度的方法：\n\
  \    *   过滤数据，使查询仅返回您的应用程序将要使用的数据。由于网络有效载荷减少以及您的应用程序必须处理的实体减少，应用程序的性能将得到提升。\n  \
  \  *   使用投影来限制您的客户端应用程序需要返回的数据集的大小。\n    *   删除冗余数据（反规范化）。这一直是有帮助的，因为它最小化了查询必须扫描以找到客户端所需数据的实体数量，而不是必须扫描大量实体来找到您的应用程序需要的数据。\n\
  \n## 总结\n\nMicrosoft Azure 存储服务提供了应用程序开发者所需的一切，以提供一个稳健、可扩展的基于云的解决方案。凭借其众多实用功能，它提供了最佳平台来托管您的应用程序并安全地存储数据。您无需考虑灾难恢复策略，因为它已全部处理妥当。现在，借助高级存储产品，吞吐量得以提升，您的应用程序性能将获得巨大增强。\n\
  \n\n\n"
- '# 4. Microsoft Azure 网络


  借助 Microsoft Azure，您可以在微软数据中心内创建运行的`虚拟机`。您创建的这些虚拟机最终会成为某个工作组的一部分。传统上，您可以将应用程序托管在您的虚拟机上，而数据可能驻留在`SQL
  Server`上，而后者可能位于另一台虚拟机上。这些机器需要相互通信，因此您不仅需要连接它们，还需要在它们之间进行通信。为了从应用程序连接，您可以使用`SQL
  身份验证`或直通式 Windows 身份验证来连接到`SQL Server`，因为这些机器都位于同一个工作组中。


  全球各地分布着不同的数据中心，不同的客户和企业在 Microsoft Azure 中运行。它为在云中托管您的业务并降低`总拥有成本（TCO）`提供了完美的平台。因此，为了将您的业务托管在
  Microsoft Azure 中或存储数据，您可以使用这些遍布全球的数据中心之一。


  如图 4-1 所示，您可以通过三种不同的方式连接到这些数据中心：


  ![A371128_1_En_4_Fig1_HTML.jpg](img/A371128_1_En_4_Fig1_HTML.jpg)


  *图 4-1. 使用不同组件的典型设置*


  *   将本地网络连接到包含一组虚拟机的独立网络。

  *   使用`Azure AD Connect`将 Microsoft Azure 应用程序链接到本地 Windows 服务器。参见[`https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/`](https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/)。

  *   使用`Microsoft Azure 流量管理器`将请求路由到运行 Microsoft Azure 应用程序不同实例的多个数据中心。


  您也可以在云中创建`虚拟网络`。您可以在 Microsoft Azure 中创建测试环境，包含用于用户身份验证的域控制器（`DC`），并可以托管您的应用程序服务器。您的数据驻留在`SQL
  Server`中，该服务器配置在 Microsoft Azure 中，利用了大规模可扩展、高度安全的 Microsoft Azure 存储。您需要创建一个`虚拟网络`来配置安全的站点到站点连接以及云中受保护的私有`虚拟网络`。因此，您可以在
  Microsoft Azure 内构建完整的办公网络。


  在本章中，您将看到 Microsoft Azure 如何让您创建`VPN`，并允许您的本地网络连接并相互通信。您还可以将 Azure 应用程序与本地连接，并在不同数据中心之间分配负载。您还将了解一些关键的网络组件/概念，如果您有兴趣可以进一步研究。


  ## 网络入门


  将您的本地环境安全地连接到`虚拟网络`有助于扩展您的业务，并通过利用 Microsoft Azure 服务来降低成本。至少有三种选项可以帮助您连接和扩展混合网络：`站点到站点`、`站点到站点`和`ExpressRoute`。更多细节请参见图
  4-2 和表 4-1。


  *表 4-1. 选择最佳连接选项*


  | | `点到站点` | `站点到站点` | `ExpressRoute` |

  | --- | --- | --- | --- |

  | Azure 服务 | `云服务`和`虚拟机` | `云服务`和`虚拟机` | 大多数服务，请参阅附注中的链接 |

  | 带宽 | 小于`100MBPS` | 小于`100MBPS` | `50MBPS-10GBPS` |

  | 支持的协议 | `安全套接字隧道协议（SSTP）` | `IPSec` | 通过 VLAN、NSP 和 VPN 技术的直接连接 |

  | 连接弹性 | `主动-被动` | `主动-被动` | `主动-主动` |


  ![A371128_1_En_4_Fig2_HTML.jpg](img/A371128_1_En_4_Fig2_HTML.jpg)


  *图 4-2. 典型的混合设置*


  在您选择其中一种选项之前，应该考虑几点，例如以下几个问题：您的应用程序需要多少吞吐量？您的应用程序是否通过公共互联网连接？您是否有可用的公共 IP？您需要`VPN
  网关`吗？


  更多信息可以在这里找到：


  [`https://azure.microsoft.com/en-in/documentation/articles/expressroute-faqs/#supported-services`](https://azure.microsoft.com/en-in/documentation/articles/expressroute-faqs/#supported-services)


  [`https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-cross-premises-options/`](https://azure.microsoft.com/en-in/documentation/articles/vpn-gateway-cross-premises-options/)


  在当今业务横跨世界多个地区的时代，公有云可以巧妙地用作本地数据中心的扩展。云为您提供了灵活性，因为您可以按需创建虚拟机，如果不需要可以暂停/停止它们，并且一旦工作完成且不再需要时可以删除它们，即您只在业务需要时使用计算资源。此外，您在本地运行的现有应用程序将继续平稳运行。您可以快速创建包含`SharePoint`和`SQL
  Server`的`虚拟机`，并拥有一个可以与您现有本地`Active Directory`通信的`Active Directory`。


  ### 站点到站点连接


  `站点到站点`连接可用于将分支办公室连接到总部（主办公室）。在此类连接中，主机无需安装`VPN`客户端软件。位于本地环境中的`VPN`设备被配置为与 Azure
  `VPN 网关`建立安全连接。它通过`VPN 网关`发送`TCP/IP`数据包，这些网关对数据包进行封装和加密，并通过`VPN`隧道发送。然后，目的地的`VPN
  网关`接收数据包，解读数据包的头部和内容，然后将其发送到目标主机。


  以下描述了您可能会使用`站点到站点`连接的一些场景：


  *   用于创建混合解决方案。

  *   业务需求是持续可靠的网络连接。

  *   您不需要为将本地网络连接到`VPN`进行任何客户端配置。


  设置`站点到站点`连接的要求主要是您需要一个具有面向互联网`IP 地址`的兼容`VPN`设备。此设备应与`VPN 网关`类型兼容。



  ### 点到站点连接


  你可以使用此功能创建到你的虚拟网络的安全连接。与站点到站点连接不同，你需要在每个打算连接到虚拟网络的客户端上安装并配置 VPN 客户端。你也不需要一个具有面向互联网
  IP 地址的 VPN 设备。


  以下描述了你会使用点到站点连接的一些场景：


  *   你有少量客户端需要连接到虚拟网络。

  *   你的客户端需要远程连接。

  *   已存在一个站点到站点连接，但有几个客户端必须从远程位置连接到虚拟网络。


  虚拟网络为你提供了一种在 Azure 内创建私有网络的选项。利用这一点，不同的服务可以相互通信或与本地资源通信。


  这个概念非常有趣且实用；然而，为了使其有益，用户应该像应用程序运行在他们自己的本地数据中心一样对待它。你的网络管理员可以在你的本地本地网络和 Microsoft
  Azure 之间设置 Microsoft Azure 虚拟专用网络，其中可以运行多台虚拟机。这可以在 VPN 网关设备的帮助下完成。你可以选择自己的 IPv4
  地址并将其分配给在云中运行的这些虚拟机。这意味着它看起来像是你现有网络的延伸。最终用户将能够无缝地访问在这些虚拟机上运行的应用程序，就像访问本地网络上的应用程序一样。


  ### ExpressRoute


  ExpressRoute 是一个非常简洁的概念，通过它你可以获得自己到 Azure 的私有连接。ExpressRoute 是一种绕过公共互联网、将你的本地基础结构连接到
  Microsoft Azure 数据中心的连接（参见图 4-3）。这有助于 Azure 像你自己的私有云一样运作。


  ![A371128_1_En_4_Fig3_HTML.jpg](img/A371128_1_En_4_Fig3_HTML.jpg)

  图 4-3. 使用 ExpressRoute 的混合设置


  有两种方法可以建立到 Microsoft Azure 的私有连接。第一种是通过交易所提供商设施连接；如果你使用交易所提供商设施，你可以直接连接到 Azure。或者，你可以通过你的网络服务提供商在本地站点和
  Microsoft Azure 数据中心之间建立直接连接。


  Microsoft Azure 将看起来只是你广域网上的另一个站点。ExpressRoute 是无缝的，并且与各种技术配合得很好。它还提供内置冗余。Microsoft
  直接与你的网络服务提供商合作。它提供更快的吞吐量，接近 10Gbps。因此，借助 ExpressRoute，你的网络基础设施非常安全，具有低延迟、高吞吐量和出色的可靠性。如果你使用
  ExpressRoute 在本地和 Microsoft Azure 数据中心之间传输数据，你还可以享受成本优势。由于它快速且可靠，它可以用于数据迁移、业务连续性复制、灾难恢复和高可用性策略。


  借助 ExpressRoute，你可以利用 Microsoft Azure 的计算和存储容量，并将其添加到你现有的数据中心。由于它可靠并提供高吞吐量连接，你可以构建一个从现有数据中心扩展通过
  Microsoft Azure 数据中心的混合应用程序。有趣的是，你在不牺牲安全性或性能的情况下获得了所有这一切。


  ## Azure AD Connect


  使用 `Azure AD Connect`，你可以将你的本地身份基础结构连接到托管在 Microsoft Azure 中的活动目录。它为你提供一个向导，指导你完成连接所需的先决条件和组件。使用此工具，你可以为
  `Office 365`、`Azure` 和与 `Azure AD` 集成的 `SaaS` 应用程序配置用户的通用标识。安装该工具时，它会安装先决条件，如 `.NET
  Framework`、`Azure Active Directory`、`PowerShell` 模块以及用于登录的 `Microsoft Online Service`
  助手。它会为多个活动目录林之一配置同步。它还帮助你配置密码哈希同步或与 Web 应用程序的 `Active Directory Federation`。你可以在
  [`https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/`](https://azure.microsoft.com/en-in/documentation/articles/active-directory-aadconnect/)
  阅读更多相关信息。


  ## Traffic Manager


  在当今用户遍布全球的世界中，挑战在于在多个数据中心运行应用程序实例。主要挑战是如何智能地将流量重定向到运行在分散数据中心的应用程序实例。目标通常是让用户访问距离他们最近的应用程序，以获得最佳响应时间和吞吐量。


  `Traffic Manager` 帮助你控制流量的分布并将其路由到特定的端点，如网站、云服务等。基本上，你定义规则来决定 `Traffic Manager`
  将如何路由/分发流量到数据中心。例如，通常请求可能会根据用户位置路由到最近的数据中心；然而，该数据中心的响应时间并不总是最佳的。在这种情况下，用户可以被路由到其他数据中心。这种类型的服务在现代商业中非常有用，因为你的用户遍布全球。


  以下是 `Traffic Manager` 提供的主要优势：


  *   它有助于提高关键任务应用程序的可用性。

  *   你为高性能应用程序获得更好的响应时间。

  *   你可以通过禁用端点来执行应用程序升级，并在服务完成后启用它们。

  *   最后，你可以将一个端点指定给另一个 `Traffic Manager`，从而分发复杂的应用程序部署。


  图 4-4 展示了规则如何使 `Traffic Manager` 能够路由全球流量。


  ![A371128_1_En_4_Fig4_HTML.jpg](img/A371128_1_En_4_Fig4_HTML.jpg)

  图 4-4. Traffic Manager 工作流



  ## 虚拟专用网络


  在当今世界，大多数组织都选择混合模式，将数据同时存储在云端和本地数据中心。例如，您可以创建一个虚拟专用网络（`VPN`），并将您的云环境链接到分支机构（参见图
  4-5）。


  ![A371128_1_En_4_Fig5_HTML.jpg](img/A371128_1_En_4_Fig5_HTML.jpg)


  *图 4-5. 典型的 VPN 设置*


  使用 Microsoft Azure 虚拟网络，您可以通过将虚拟机分组来创建一个逻辑边界，称为虚拟网络或 `VNet`。一旦 `VNet` 建立，您就可以在本地数据中心和
  `VNet` 之间建立 `IPsec` 连接。然而，对于 `ExpressRoute` 设置，则不需要此连接。您可以使用 Microsoft Azure `VMs`
  或 Microsoft Azure 云服务（或两者）在虚拟网络中创建虚拟机。您可以选择 Microsoft Azure 的 `IaaS` 或 `PaaS` 服务产品来创建虚拟机或服务。创建
  `IPsec` 连接时，基本上需要以下条件：


  *   您需要一个虚拟专用网络（`VPN`）网关设备。

  *   您需要连接到本地网络的专用硬件。

  *   您需要一位网络管理员来帮助您完成设置。


  一旦此网络和设置准备就绪，在 `VNet` 内运行的虚拟机将显示为您本地网络的延伸。


  请注意，图 4-5 中的 IP 地址是从您的本地网络可用 IP 地址范围内分配的。在本地网络上运行的软件将能够看到这些虚拟机，就好像它们在自己的本地网络中一样。有趣的是，承载这些虚拟机的物理机器（无论位于网络的哪一侧）都可以运行任何操作系统，因为连接发生在
  `IP` 层，因此是透明的。例如，运行 Linux 操作系统的 Microsoft Azure `VMs` 可以与您运行 Windows 的本地机器通信，反之亦然。您可以使用像
  `SCCM` 这样的基础结构工具来管理云中的虚拟机。


  拥有这样一个扩展网络的一个非常重要的方面是，您可以轻松地将现有的本地 Active Directory 域扩展到 Microsoft Azure 虚拟网络，并为用户提供单点登录，以便他们可以在任何地方运行应用程序。如果需要，您可以在
  Microsoft Azure 云中创建一个域并将其连接到您现有的本地域。由于您的虚拟网络是您本地网络的延伸，反之亦然。


  从技术上讲，您也可以从 Microsoft Azure 网络使用在您本地网络中运行的软件。如果您出于隐私原因希望将数据保留在本地（许多医院和医疗机构就是如此），您可以使用虚拟网络的概念来扩展您的网络，以便数据保留在您的本地网络中（本地存储），而用户仍然可以从运行在
  Microsoft Azure 多个数据中心中的应用程序实例访问数据。


  这为您提供了根据需要灵活访问大量资源的能力。云领域的弹性是一个很棒的概念，直接影响您的财务状况，因为它降低了总体拥有成本。您可以在需要时启动虚拟机，并在完成后直接移除/释放资源（在此上下文中是虚拟机）。您只需为使用它们的时间段付费。假设您有一个紧急请求，需要准备一台机器。使用
  Microsoft Azure，您可以立即设置好虚拟机，并在几分钟内准备就绪。


  ### 负载均衡器


  使用 Azure 负载均衡器，您可以获得高可用性并提升网络应用程序的性能。它使用第 `4` 层 `TCP/UDP` 负载均衡器来平衡和分散负载，并将其通过不同的、健康的服务进行分发。负载均衡通过端点实现，这些端点在公共
  `IP` 和分配给最终将分发负载的虚拟机的本地端口之间具有一对多的关系。以下是使用负载均衡器的一些适用场景：


  *   它可以对发送到虚拟机的 Internet 流量进行负载均衡。

  *   它还可以对虚拟网络内虚拟机之间的传入流量进行负载均衡。它可以用于在云服务内的不同虚拟机之间分配负载。

  *   它还可以将外部流量转发到特定的虚拟机。


  ### Azure `DNS`


  任何服务或网站都会与一个 `IP` 地址关联。域名系统 (`DNS`) 有助于将 `IP` 地址转换为用户友好的服务或网站名称。


  Azure `DNS` 使用 Microsoft Azure 基础结构提供名称解析。您可以将您的域名托管在 Microsoft Azure 数据中心内，同时使用您一直使用的相同凭据管理您的
  `DNS` 记录。Azure `DNS` 中的 `DNS` 域托管在全局 `DNS` 网络名称服务器中。此服务为您的域提供更快的性能和高可用性。您需要从第三方注册商购买域名，然后可以将其托管在
  Azure `DNS` 中以管理 `DNS` 记录。


  ## 总结


  Microsoft Azure 允许您创建 `VPN`，并允许您的本地网络连接相互通信。您可以连接 Azure 应用程序到本地，也可以跨不同数据中心分配负载。您可以以最小的影响扩展您现有的业务并节省大量资金。请务必阅读本章末尾的参考资料，它们是丰富的
  Azure 文档的一部分。


