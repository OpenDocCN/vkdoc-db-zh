  \n```\nSELECT e.id,\ne.last_name,\nd.department_name,\no.address,\ns.company,\n\
  s.meeting_date\nFROM employee e\nINNER JOIN office o ON e.office_id = o.id\nINNER\
  \ JOIN sales_meeting s ON e.id = s.employee_id\nINNER JOIN department d ON e.department_id\
  \ = d.id;\n```\n\n这将显示所有四个表中相关联的记录。如果你使用我们目前使用的示例数据来运行此查询，你会得到一个错误，因为`department`表不存在。\n\
  \n随着你向数据库中添加越来越多具有关联列的表，你可以在需要时与它们进行连接。你还可以使用`WHERE`子句在任何这些表上过滤数据，使用`ORDER BY`子句按任何列排序，以及使用你目前学到的其他关键字。\n\
  \n你最终可能会得到一个相当长的查询，就像这里展示的：\n\n```\nSELECT e.id AS employee_id,\ne.last_name,\n\
  e.salary,\ne.job_title,\nd.department_name,\no.address,\ns.company,\ns.meeting_date\n\
  FROM employee e\nINNER JOIN office o ON e.office_id = o.id\nINNER JOIN sales_meeting\
  \ s ON e.id = s.employee_id\nINNER JOIN department d ON e.department_id = d.id\n\
  WHERE o.address LIKE '%Main Street%'\nAND e.salary > 30000;\n```\n\n此查询将显示所有`办公室`在`Main\
  \ Street`且`工资`大于 30000 的员工的`员工`、`部门`、`办公室`和`销售会议`信息。\n\n一旦你设置好数据，编写这样的查询就会变得更容易。\n\
  \n### 总结\n\n你可以使用与连接两个表相同的方法来连接三个、四个或更多表。你可以使用`INNER JOIN`、一种`OUTER JOIN`或连接的组合来连接所有表。具体需要哪种连接将取决于你想查看的数据。\n\
  \n你可以在连接中使用其他关键字和子句，例如用于过滤数据的`WHERE`子句和用于排序数据的`ORDER BY`子句，以获取你所需的确切数据。\n\n\n\n\
  ### 简单的数值计算\n\nSQL 允许你使用一些标准的数学符号执行简单的数学计算。这些符号是：\n\n*   `+` 用于加法\n*   `-` 用于减法\n\
  *   `*` 用于乘法\n*   `/` 用于除法\n\n仅使用这些符号你可能就能得到所需的结果。让我们来看一个例子。\n\n假设你需要查看每位员工的薪资，以及在他们当前薪资基础上增加\
  \ 10000 后的数额。你的查询可能如下所示：\n\n```sql\nSELECT id, last_name, salary, salary + 10000\n\
  FROM employee;\n```\n\n此查询显示了员工的 `id`、`last_name` 和其当前的 `salary` 值。它还显示了一个新列，即当前\
  \ `salary` 值加上 10000，这正是 `salary + 10000` 所做的。这不会更新表中的任何数据；它只是显示当前值加上 10000 后的结果。\n\
  \n该查询的结果是：\n\n| ID | LAST_NAME | SALARY | SALARY+10000 |\n| --- | --- | --- | ---\
  \ |\n| 1 | JONES | 30000 | 40000 |\n| 2 | SMITH | 35000 | 45000 |\n| 3 | KING |\
  \ 45000 | 55000 |\n| 4 | SIMPSON | 52000 | 62000 |\n| 5 | ANDERSON | 31000 | 41000\
  \ |\n| 6 | COOPER | (null) | (null) |\n| 7 | ADAMS | (null) | (null) |\n| 8 | SMITH\
  \ | 62000 | 72000 |\n| 9 | PATRICK | 40000 | 50000 |\n\n新列被称为 “SALARY+10000”。Oracle\
  \ 会使用你提供的表达式来标记该列，并移除空格。这些值显示了薪资加上 10000 后的数额。\n\n任何 `NULL` 值将继续显示为 `NULL`。这是因为\
  \ `NULL` 是一个未知值，向一个未知值添加任何东西仍然会使它成为一个未知值。\n\n你也可以使用 `-` 符号进行减法运算。例如，要查看 `salary`\
  \ 值减少 5000 后的数额，你的查询可能如下所示：\n\n```sql\nSELECT id, last_name, salary, salary - 5000\n\
  FROM employee;\n```\n\n结果将是：\n\n| ID | LAST_NAME | SALARY | SALARY-5000 |\n| ---\
  \ | --- | --- | --- |\n| 1 | JONES | 30000 | 25000 |\n| 2 | SMITH | 35000 | 30000\
  \ |\n| 3 | KING | 45000 | 40000 |\n| 4 | SIMPSON | 52000 | 47000 |\n| 5 | ANDERSON\
  \ | 31000 | 26000 |\n| 6 | COOPER | (null) | (null) |\n| 7 | ADAMS | (null) | (null)\
  \ |\n| 8 | SMITH | 62000 | 57000 |\n| 9 | PATRICK | 40000 | 35000 |\n\n新列再次显示了此计算的结果。它显示了一个比当前\
  \ `salary` 值少 5000 的数额。\n\n你也可以使用 `*` 进行乘法运算。你可以乘以整数或小数。例如，你可以查看 `salary` 增加 10%（乘以\
  \ 1.1）后的情况，或者查看 `salary` 翻倍（乘以 2）后的情况。\n\n```sql\nSELECT id, last_name, salary,\
  \ salary * 1.1, salary * 2\nFROM employee;\n```\n\n结果：\n\n| ID | LAST_NAME | SALARY\
  \ | SALARY*1.1 | SALARY*2 |\n| --- | --- | --- | --- | --- |\n| 1 | JONES | 30000\
  \ | 33000 | 60000 |\n| 2 | SMITH | 35000 | 38500 | 70000 |\n| 3 | KING | 45000 |\
  \ 49500 | 90000 |\n| 4 | SIMPSON | 52000 | 57200 | 104000 |\n| 5 | ANDERSON | 31000\
  \ | 34100 | 62000 |\n| 6 | COOPER | (null) | (null) | (null) |\n| 7 | ADAMS | (null)\
  \ | (null) | (null) |\n| 8 | SMITH | 62000 | 68200 | 124000 |\n| 9 | PATRICK | 40000\
  \ | 44000 | 80000 |\n\n在之前的章节中，你已经了解了列别名，即你可以为结果中的列指定的名称。在执行这类计算时使用列别名是一个好主意。这个查询使结果更易于阅读：\n\
  \n```sql\nSELECT id,\nlast_name,\nsalary,\nsalary * 1.1 AS salary_inc_comm,\nsalary\
  \ * 2 AS salary_double\nFROM employee;\n```\n\n这显示了相同的数据，但表明乘以 1.1 是包含佣金的计算，而乘以\
  \ 2 是翻倍的计算。\n\n| ID | LAST_NAME | SALARY | SALARY_INC_COMM | SALARY_DOUBLE |\n|\
  \ --- | --- | --- | --- | --- |\n| 1 | JONES | 30000 | 33000 | 60000 |\n| 2 | SMITH\
  \ | 35000 | 38500 | 70000 |\n| 3 | KING | 45000 | 49500 | 90000 |\n| 4 | SIMPSON\
  \ | 52000 | 57200 | 104000 |\n| 5 | ANDERSON | 31000 | 34100 | 62000 |\n| 6 | COOPER\
  \ | (null) | (null) | (null) |\n| 7 | ADAMS | (null) | (null) | (null) |\n| 8 |\
  \ SMITH | 62000 | 68200 | 124000 |\n| 9 | PATRICK | 40000 | 44000 | 80000 |\n\n\
  最后，你可以使用 `/` 符号对数字进行除法运算。要将员工的 `salary` 除以 2，你可以编写以下查询：\n\n```sql\nSELECT id,\n\
  last_name,\nsalary,\nsalary / 2\nFROM employee;\n```\n\n结果将是：\n\n| ID | LAST_NAME\
  \ | SALARY | SALARY/2 |\n| --- | --- | --- | --- |\n| 1 | JONES | 30000 | 15000\
  \ |\n| 2 | SMITH | 35000 | 17500 |\n| 3 | KING | 45000 | 22500 |\n| 4 | SIMPSON\
  \ | 52000 | 26000 |\n| 5 | ANDERSON | 31000 | 15500 |\n| 6 | COOPER | (null) | (null)\
  \ |\n| 7 | ADAMS | (null) | (null) |\n| 8 | SMITH | 62000 | 31000 |\n| 9 | PATRICK\
  \ | 40000 | 20000 |\n\n这些运算符或符号在执行此类计算时非常有用。然而，对于更复杂的计算，你可以使用 Oracle 的内置函数。\n\n\
  ### DUAL 表\n\n在我们探讨 Oracle 中可用的函数之前，有一个概念你应该先了解一下。当你在 Oracle 中编写 `SELECT` 语句时，`SELECT`\
  \ 和 `FROM` 关键字都是必需的。你不能编写没有 `SELECT` 或没有 `FROM` 的 `SELECT` 语句。\n\n这个查询可以工作：\n\n\
  ```sql\nSELECT id\nFROM employee;\n```\n\n但这个查询不行：\n\n```sql\nSELECT id;\n```\n\n\
  有时你可能不需要从表中选择数据。例如，如果你想要获取当前日期，你不需要为此使用特定的表，因为数据库应该知道日期（我们将在本章后面学习这个函数）。或者你可能想显示一个特定的数字来测试一个函数。例如，如果你想显示值\
  \ 123，那么你可以编写这个查询：\n\n```sql\nSELECT 123\nFROM employee;\n```\n\n然而，这将会为 employee\
  \ 表的每一行显示一个 123 的值：\n\n| 123 |\n| --- |\n| 123 |\n| 123 |\n| 123 |\n| 123 |\n| 123\
  \ |\n| 123 |\n| 123 |\n| 123 |\n| 123 |\n\n这显示了九个结果加上列标题。这不是你想要看到的。如果你从查询中移除表，因为你不想要获取\
  \ employee 记录呢？\n\n```sql\nSELECT 123;\n```\n\n当你运行这个查询时，它会显示一个错误：\n\n```\nORA-00923:\
  \ FROM keyword not found where expected\n00923. 00000 -  \"FROM keyword not found\
  \ where expected\"\n*Cause:\n*Action:\nError at Line: 1 Column: 10\n```\n\n这是因为\
  \ `FROM` 子句是必需的。那么，你如何才能只看到 123 这个值呢？你可以使用一个名为 `DUAL` 的特殊 Oracle 表。\n\n`DUAL` 表是内置于\
  \ Oracle 数据库中的一个表。它包含一行和一列。它的主要目的是允许你运行那些使用不需要任何表数据的值或函数的查询。\n\n你可以通过对其运行查询来看到 `DUAL`\
  \ 表：\n\n```sql\nSELECT *\nFROM dual;\n```\n\n| DUMMY |\n| --- |\n| X |\n\n`DUAL`\
  \ 表在一个名为 `DUMMY` 的列中只有一个值 “X”。这意味着你可以使用 `DUAL` 表来执行你之前的查询，以显示值 123：\n\n```sql\n\
  SELECT 123\nFROM dual;\n```\n\n| 123 |\n| --- |\n| 123 |\n\n你现在可以看到你选择的值。现在看起来可能不那么有用，但是一旦我们开始使用函数，你就会看到这个\
  \ `DUAL` 表的好处。这个表是 Oracle 特有的：它在其他 SQL 供应商（如 Microsoft SQL Server 或 MySQL）中不存在。\n\
  \n\n\n### 数字函数\n\nOracle 有一系列“数字函数”，或称为使用数字执行计算的函数。在 Oracle 中，函数可以像这样被引用：\n\n```\n\
  函数名(参数)\n```\n\n这包括：\n\n*   `函数名`，即函数的名称\n*   左括号，其中包含一个或多个参数，或你提供给函数的输入值\n*   右括号\n\
  \n函数的结果将在你指定函数的位置使用。例如，如果你在 `SELECT` 子句中将此函数用作列之一，函数的结果将显示在该列中。让我们看一些例子。\n\n###\
  \ ROUND 函数\n\n你可能经常执行的一个操作是四舍五入数字。Oracle 允许你在数据库中存储十进制数字，但有时你可能希望以整数形式显示它们。有几个函数可以让你做到这一点。其中一个函数叫做\
  \ `ROUND`。我将使用大写字母引用 Oracle 函数，因为它们在 Oracle 文档中就是这样编写的，而且在你的 SQL 代码中也更容易阅读。\n\n\
  `ROUND` 函数接受两个参数或输入：\n\n*   你想要四舍五入的数字\n*   要四舍五入到的小数位数\n\n函数的结果是你指定的数字，按你指定的小数位数进行了四舍五入。你可以像下面这样在\
  \ SQL 查询中编写它，使用一个示例数字：\n\n```\nSELECT ROUND(123.456, 0)\nFROM dual;\n```\n\n我们使用了本章前面提到的\
  \ `DUAL` 表。同时使用了 `ROUND` 函数，它包含两个参数。第一个是你想要四舍五入的数字，即 123.456。第二个是要四舍五入到的小数位数，即 0。这意味着数字\
  \ 123.456 将被四舍五入到 0 位小数。\n\n如果你运行此查询，你将得到以下结果：\n\n| ROUND(123.456,0) |\n| --- |\n\
  | 123 |\n\n这个 `ROUND` 函数的结果是 123。这是因为 123.456 被向下舍入，而不是向上舍入。\n\n你也可以使用 `ROUND` 函数配合不同的小数位数。例如，要四舍五入到两位小数，你的查询将如下所示：\n\
  \n```\nSELECT ROUND(123.456, 2)\nFROM dual;\n```\n\n你只需将第二个参数更改为数字 2，以代表两位小数。此查询的结果是：\n\
  \n| ROUND(123.456,2) |\n| --- |\n| 123.46 |\n\n结果是 123.46，因为 123.456 被向上舍入为 123.46。\n\
  \n### CEILING 和 FLOOR 函数\n\n在 Oracle SQL 中还有另外两种对数字进行取整的方法，它们使用 `CEILING` 和 `FLOOR`\
  \ 函数。`CEILING` 函数会将数字向上舍入到最接近的整数，而 `FLOOR` 函数会将数字向下舍入到最接近的整数。\n\n这些函数的语法是：\n\n```\n\
  CEILING (输入数字)\nFLOOR (输入数字)\n```\n\n这些函数中的每一个都接受单个参数，即要取整的数字。与 `ROUND` 函数不同，这些函数不需要用于指定位数的第二个参数，因为它们总是取整到整数。\n\
  \n使用这些函数的一个查询如下所示。我使用了列别名以使输出更整洁。\n\n```\nSELECT\nCEILING(123.456) AS 向上取整结果,\n\
  FLOOR(123.456) AS 向下取整结果\nFROM dual;\n```\n\n| 向上取整结果 | 向下取整结果 |\n| --- | --- |\n\
  | 124 | 123 |\n\n`CEILING` 函数将数字向上舍入为 124，而 `FLOOR` 函数将数字向下舍入为 123。Oracle 中的其他数字函数的工作方式相同，你提供一个输入值，然后计算出一个结果。\n\
  \n### 对表数据使用数字函数\n\n让我们看一个使用表中某列的函数示例。假设 `employee` 表中存储的 `salary` 是一个年薪值，我们想看看月值会是多少。然而，除了月值之外，我们还想看看如果我们将\
  \ `salary` 除以 12 并向下取整后，“剩余”金额会是多少。例如，30/12 的值将是 2（2*12=24），剩余 6（30-24=6）。我们可以在\
  \ Oracle 中使用函数来实现这一点：`FLOOR` 函数和 `MOD` 函数。\n\n`MOD` 函数执行*模除运算*，这意味着它将一个数字除以另一个数字并返回余数。\n\
  \n我们的查询将如下所示：\n\n```\nSELECT\nId,\nlast_name,\nsalary,\nFLOOR(salary/12) AS 月薪,\n\
  MOD(salary, 12) AS 月剩余金额\nFROM employee;\n```\n\n此查询包含 `FLOOR` 函数，首先将 `salary` 除以\
  \ 12，然后将结果四舍五入到最接近的整数。`MOD` 函数获取 `salary` 值，将其除以 12，并显示剩余值。\n\n此查询的结果将是：\n\n| ID\
  \ | 姓氏 | 年薪 | 月薪 | 月剩余金额 |\n| --- | --- | --- | --- | --- |\n| 1 | JONES | 30000\
  \ | 2500 | 0 |\n| 2 | SMITH | 35000 | 2916 | 8 |\n| 3 | KING | 45000 | 3750 | 0\
  \ |\n| 4 | SIMPSON | 52000 | 4333 | 4 |\n| 5 | ANDERSON | 31000 | 2583 | 4 |\n|\
  \ 6 | COOPER | (null) | (null) | (null) |\n| 7 | ADAMS | (null) | (null) | (null)\
  \ |\n| 8 | SMITH | 62000 | 5166 | 8 |\n| 9 | PATRICK | 40000 | 3333 | 4 |\n\n这显示了\
  \ `salary`，以及向下取整后的月 `salary`。它还显示了 `salary` 除以 12 后的剩余值。例如，员工 JONES 的年薪为 30000，可以有\
  \ 2500 的月薪，剩余 0，因为 2500*12 = 30000。\n\n\n\n### 字符串的连接\n\n在本章前面，你学习了如何使用符号执行数学运算，例如加法和减法。你可以使用另一个符号对字符串或文本值执行不同的操作：*连接*。\n\
  \n连接是将两个字符串值连接在一起的过程。这样做通常是因为值存储在不同的列或不同的表中，但你希望将它们显示在同一列中。例如，如果我们的员工表中有一个名为 `first_name`\
  \ 的列，你可能希望将 `first_name` 和 `last_name` 连接起来，组成一个完整的姓名。\n\n如何在 Oracle 中连接字符串？你需要使用两个管道符：`\"\
  ||\"`。将这两个字符放在两个其他字符串之间，结果将是一个组合了它们的单个值。\n\n例如，你可以使用连接将名称 `\"John\"` 和名称 `\"Smith\"\
  ` 组合起来：\n\n```sql\nSELECT 'John' || 'Smith'\nFROM dual;\n```\n\n结果将是：\n\n| JOHN&#124;&#124;SMITH\
  \ |\n| --- |\n| JohnSmith |\n\n这显示了一个包含组合值的单列。但是，值之间没有空格，因为我们在连接时没有指定。连接不会自动添加空格，所以如果你想要一个空格，就需要手动添加。让我们试试这个查询：\n\
  \n```sql\nSELECT 'John ' || 'Smith' AS full_name\nFROM dual;\n```\n\n我还添加了一个列别名，以使结果更易于阅读。结果是：\n\
  \n| FULL_NAME |\n| --- |\n| John Smith |\n\n现在显示的值中间有了一个空格。你也可以连接表中的值。假设你需要组合 `employee`\
  \ 表中的 `last_name` 和 `salary` 值：\n\n```sql\nSELECT id,\nlast_name || salary\nFROM\
  \ employee;\n```\n\n结果将是：\n\n| ID | LAST_NAME&#124;&#124;SALARY |\n| --- | --- |\n\
  | 1 | JONES30000 |\n| 2 | SMITH35000 |\n| 3 | KING45000 |\n| 4 | SIMPSON52000 |\n\
  | 5 | ANDERSON31000 |\n| 6 | COOPER |\n| 7 | ADAMS |\n| 8 | SMITH62000 |\n| 9 |\
  \ PATRICK40000 |\n\n这个结果集的主要问题是很难读取连接后的值，因为名称直接连到了数字值上。\n\n如何解决名称直接连到数字上的问题？你可以添加一个空格和一个逗号。这可以通过添加第三个连接值来实现。这意味着你的值将显示\
  \ `last_name`，然后是一个逗号和一个空格，接着是薪水。执行此操作的查询是：\n\n```sql\nSELECT id,\nlast_name ||\
  \ ', ' || salary\nFROM employee;\n```\n\n这个查询的结果是：\n\n| ID | LAST_NAME&#124;&#124;,&#124;&#124;SALARY\
  \ |\n| --- | --- |\n| 1 | JONES, 30000 |\n| 2 | SMITH, 35000 |\n| 3 | KING, 45000\
  \ |\n| 4 | SIMPSON, 52000 |\n| 5 | ANDERSON, 31000 |\n| 6 | COOPER, |\n| 7 | ADAMS,\
  \ |\n| 8 | SMITH, 62000 |\n| 9 | PATRICK, 40000 |\n\n这些结果更易于阅读。你添加了一个空格和一个逗号，结果现在位于单列中。如果你需要组合字符串值，或者字符串与数字或日期，都可以使用这种连接技术。\n\
  \n### 字符串函数\n\nOracle 还提供了一些处理字符串的函数，就像你之前学习处理数字时一样。这类函数有很多，它们允许你对字符串值执行各种操作，例如：\n\
  \n*   更改大小写（大写和小写）\n*   在其他字符串中查找字符串并提取位置或字符串本身\n*   在字符串的开头或结尾添加或删除字符，例如空格\n* \
  \  转换 ASCII 码\n\n在本节中，你将看到如何使用其中的几个函数。\n\n#### 更改大小写\n\n在本节中，你将学习两个用于更改字符串大小写的函数：一个用于转换为大写，一个用于转换为小写。这些函数用于将你的字符串或字符数据转换为一致的格式。\n\
  \n为什么你希望数据保持一致的格式？也许你允许用户以混合大小写的形式在表单中输入数据，而你希望以相同的方式存储它，以便日后更易于显示和搜索。\n\n要将字符串值转换为大写，你需要使用\
  \ `UPPER` 函数。`UPPER` 函数的语法如下：\n\n```sql\nUPPER (input_string)\n```\n\n它只接受一个参数，即\
  \ `input_string`，也就是你想要转换为大写的字符串。该函数返回相同的大写形式值。\n\n你可以通过查询 `office` 表来了解此函数的工作原理，因为\
  \ `address` 字段包含大写和小写的数据：\n\n```sql\nSELECT id,\naddress,\nUPPER(address)\nFROM\
  \ office;\n```\n\n这个查询的结果是：\n\n| ID | ADDRESS | UPPER(ADDRESS) |\n| --- | --- |\
  \ --- |\n| 1 | 123 Smith Street | 123 SMITH STREET |\n| 2 | 45 Main Street | 45\
  \ MAIN STREET |\n| 3 | 10 Collins Road | 10 COLLINS ROAD |\n\n你可以看到 `id` 列、原始的 `address`，以及应用\
  \ `UPPER` 函数后的 `address`。内容读起来一样，但只是转换成了大写形式（`123 SMITH STREET` 而不是 `123 Smith Street`）。任何已经是大写的字母保持不变，小写字母被转换为大写字母，数字则保持不变。\n\
  \n你可以使用类似的查询将数据转换为小写。Oracle 的 `LOWER` 函数可以做到这一点，其语法与 `UPPER` 函数类似：\n\n```sql\nLOWER\
  \ (input_string)\n```\n\n该函数将所有字符转换为小写字符。对 `office` 表执行此操作的查询如下：\n\n```sql\nSELECT\
  \ id,\naddress,\nLOWER(address)\nFROM office;\n```\n\n结果是：\n\n| ID | ADDRESS | LOWER(ADDRESS)\
  \ |\n| --- | --- | --- |\n| 1 | 123 Smith Street | 123 smith street |\n| 2 | 45\
  \ Main Street | 45 main street |\n| 3 | 10 Collins Road | 10 collins road |\n\n\
  这些结果显示了地址的小写形式。数字和已有的小写字符保持不变，而大写字符被转换为小写。\n\n#### 检查相同大小写的匹配\n\n我见过 `UPPER` 和 `LOWER`\
  \ 函数的一种常见用法是在比较数据或在表中查找数据时。这通常在 `WHERE` 子句中完成。\n\n为了演示这个例子，你需要向 `employee` 表中插入一条新记录，员工名为“Jones”。\n\
  \n```sql\nINSERT INTO employee (id, last_name, salary, office_id)\nVALUES (10, 'Jones',\
  \ 42000, 2);\n```\n\n当你在表上运行 `SELECT` 语句时，它看起来像这样：\n\n```sql\nSELECT id,\nlast_name,\n\
  salary,\noffice_id\nFROM employee;\n```\n\n| ID | LAST_NAME | SALARY | OFFICE_ID\
  \ |\n| --- | --- | --- | --- |\n| 1 | JONES | 30000 | 1 |\n| 2 | SMITH | 35000 |\
  \ 2 |\n| 3 | KING | 45000 | 2 |\n| 4 | SIMPSON | 52000 | 1 |\n| 5 | ANDERSON | 31000\
  \ | (null) |\n| 6 | COOPER | (null) | 1 |\n| 7 | ADAMS | (null) | 3 |\n| 8 | SMITH\
  \ | 62000 | 3 |\n| 9 | PATRICK | 40000 | 1 |\n| 10 | Jones | 42000 | 2 |\n\n现在假设你想查找所有名为\
  \ `JONES` 的员工。你已经看过一些记录，并了解到 `employee` 的 `last_names` 是以大写形式存储的，所以你的查询是这样的：\n\n\
  ```sql\nSELECT id,\nlast_name,\nsalary,\noffice_id\nFROM employee\nWHERE last_name\
  \ = 'JONES';\n```\n\n当你运行这个查询时，得到的结果是：\n\n| ID | LAST_NAME | SALARY | OFFICE_ID\
  \ |\n| --- | --- | --- | --- |\n| 1 | JONES | 30000 | 1 |\n\n那么你刚插入的 `Jones` 新记录呢？它不应该也显示出来吗？在这个案例中，Oracle\
  \ 数据库显示了正确的结果。这是因为 Oracle 中的 `WHERE` 子句是区分大小写的。这意味着 `\"JONES\"` 不等于 `\"Jones\"`，也不等于\
  \ `\"jones\"`。\n\n\n#### 注意\n\nOracle 中的 WHERE 子句是区分大小写的，这意味着\"JONES\"、\"Jones\"\
  和\"jones\"都是不同的值。\n\n如何让查询同时显示这两种值呢？你可以使用`UPPER`或`LOWER`函数。与其查找\"`last_name`为 JONES\
  \ 的所有记录\"，不如查找\"`last_name`大写形式为 JONES 的所有记录\"。你也可以查找\"`last_name`小写形式为 jones 的所有记录\"\
  。它们会显示相同的结果。\n\n实现此功能的查询如下：\n\n```\nSELECT id,\nlast_name,\nsalary,\noffice_id\n\
  FROM employee\nWHERE UPPER(last_name) = 'JONES';\n```\n\n这将比较`last_name`值的大写形式与\
  \ JONES 的值。将显示以下结果：\n\n| ID | LAST_NAME | SALARY | OFFICE_ID |\n| --- | --- | ---\
  \ | --- |\n| 1 | JONES | 20000 | 1 |\n| 10 | Jones | 42000 | 2 |\n\n两条\"Jones\"\
  记录都被显示出来了：一条是大写形式的，另一条是混合大小写形式的。\n\n你也可以通过将两边都转换为小写来获得相同的结果：\n\n```\nSELECT id,\n\
  last_name,\nsalary,\noffice_id\nFROM employee\nWHERE LOWER(last_name) = 'jones';\n\
  ```\n\n应该使用哪个函数呢？对我个人而言，我偏好使用`UPPER`。在这种情况下它也更有意义，因为表中大多数值都是大写的。但两者会显示相同的结果。\n\n\
  #### 获取字符串的一部分\n\n另一个对字符串值进行的常见操作是获取字符串的某个部分。这个概念称为`子串`，因为较大字符串的较小部分被称为子串。Oracle\
  \ 函数`SUBSTR`可以让你从一个字符串中提取一个子串。其语法如下：\n\n```\nSUBSTR (string, start_position [, length])\n\
  ```\n\n此函数有三个参数：\n\n*   `string`：要查找的字符串\n*   `start_position`：要提取的子串的起始位置\n*  \
  \ `length`：要返回的子串的长度\n\n在上面的语法中，你会注意到一些方括号\"[\"和\"]\"。它们表示该参数是可选的。你不必指定`length`参数。这意味着你可以用两种方式运行此函数：\n\
  \n```\nSUBSTR (string, start_position)\nSUBSTR (string, start_position, length)\n\
  ```\n\n如果你不添加`length`参数，默认行为是返回字符串的剩余部分。\n\n让我们在`office`表上看一个例子。你可能想要找到`address`字段的前两个字符。你可以使用`SUBSTR`函数，起始位置为\
  \ 1，长度为 2 来实现。\n\n```\nSELECT id,\naddress,\nSUBSTR(address, 1, 2)\nFROM office;\n\
  ```\n\n这将显示以下结果：\n\n| ID | ADDRESS | SUBSTR(ADDRESS,1,2) |\n| --- | --- | --- |\n\
  | 1 | 123 Smith Street | 12 |\n| 2 | 45 Main Street | 45 |\n| 3 | 10 Collins Road\
  \ | 10 |\n\n它提取了`address`字段的前两个字符并显示在新列中。\n\n你可以尝试不带`length`参数的同一函数。假设你想从第 5 个字符开始提取`address`的剩余部分。你的查询可能如下所示：\n\
  \n```\nSELECT id,\naddress,\nSUBSTR(address, 5)\nFROM office;\n```\n\n结果将是：\n\n\
  | ID | ADDRESS | SUBSTR(ADDRESS,5) |\n| --- | --- | --- |\n| 1 | 123 Smith Street\
  \ | Smith Street |\n| 2 | 45 Main Street | ain Street |\n| 3 | 10 Collins Road |\
  \ ollins Road |\n\n该函数提取了从第 5 个位置开始的整个字符串。\n\n在 Oracle 中，还有更多的字符串函数，可以让你对字符串进行各种转换。这里介绍的只是其中一部分。\n\
  \n\n### 日期计算\n\n在本章中，你已经学习了如何对字符串和数字进行基本操作。你也可以对日期进行基本操作。给日期加上或减去天数是我见过的最常见的操作，因此在本节中你将学习如何做到这一点。\n\
  \n`sales_meeting` 表有一个 `meeting_date` 列，用于存储日期值。\n\n| ID | EMPLOYEE_ID | COMPANY\
  \ | MEETING_DATE |\n| --- | --- | --- | --- |\n| 1 | 5 | ABC Construction | 10/Aug/2018\
  \ |\n| 2 | 2 | BW Signage | 21/Aug/2018 |\n| 3 | (null) | WXC Services | 23/Aug/2018\
  \ |\n\n你只需向日期值加上或减去一个数字，即可为该日期值加上或减去天数。例如，要在 `meeting_date` 值上加 7 天，你可以指定 `meeting_date\
  \ + 7`。执行此操作的查询如下：\n\n```sql\nSELECT id,\nmeeting_date,\nmeeting_date + 7\nFROM\
  \ sales_meeting;\n```\n\n运行此查询后，你将得到以下结果。\n\n| ID | MEETING_DATE | MEETING_DATE+7\
  \ |\n| --- | --- | --- |\n| 1 | 10/Aug/2018 | 17/Aug/2018 |\n| 2 | 21/Aug/2018 |\
  \ 28/Aug/2018 |\n| 3 | 23/Aug/2018 | 30/Aug/2018 |\n\n这些日期每一个都加上了 7 天。如果需要，你可以加更长的周期或减去天数。下面是一个查询，显示相同的日期加上\
  \ 14 天和减去 30 天的结果。\n\n```sql\nSELECT id,\nmeeting_date,\nmeeting_date + 14,\nmeeting_date\
  \ - 30\nFROM sales_meeting;\n```\n\n结果如下：\n\n| ID | MEETING_DATE | MEETING_DATE+14\
  \ | MEETING_DATE-30 |\n| --- | --- | --- | --- |\n| 1 | 10/Aug/2018 | 24/Aug/2018\
  \ | 11/Jul/2018 |\n| 2 | 21/Aug/2018 | 4/Sep/2018 | 22/Jul/2018 |\n| 3 | 23/Aug/2018\
  \ | 6/Sep/2018 | 24/Jul/2018 |\n\n这是查找未来或过去日期的简单方法。你也可以用它来查找未来或过去的小时。请记住，`DATE`\
  \ 数据类型也包含时间。我们也可以使用相同的过程以及一个名为 `TO_CHAR` 的函数来显示时间。\n\n`meeting_date` 列存储日期和时间值，但只显示日期。查看时间值的一种方法是使用\
  \ `TO_CHAR` 函数，该函数将日期值转换为字符串或字符值。`TO_CHAR` 函数语法如下：\n\n```sql\nTO_CHAR (input_value\
  \ [, format_mask [, nls_parameter] ] )\n```\n\n这包含几个参数：\n\n*   `input_value`：要转换为字符值的值\n\
  *   `format_mask`：`input_value` 应显示的格式。这是可选的，如果省略，将使用默认格式。\n*   `nls_parameter`：此可选参数允许你指定任何特定于位置的值。\n\
  \n首先，让我们将 `meeting_date` 值显示为日期和时间值：\n\n```sql\nSELECT id,\nmeeting_date,\nTO_CHAR(meeting_date,\
  \ 'DD/MON/YYYY HH:MI:SS AM') AS meeting_datetime\nFROM sales_meeting;\n```\n\n第二个参数是格式掩码。这是日期值将显示的格式。它包括：\n\
  \n*   `DD`，表示两位数的日期（例如，27），后跟正斜杠 \"/\"\n*   然后是 `MON`，表示三位字母的月份（例如，AUG），后跟正斜杠 \"\
  /\"\n*   然后是四位数的年份（例如，2018），后跟一个空格\n*   然后是两位数的小时，后跟冒号 \":\"\n*   然后是两位数的分钟，后跟冒号\
  \ \":\"\n*   然后是两位数的秒，后跟一个空格\n*   然后是 `AM` 或 `PM` 指示符\n\n此查询的结果是：\n\n| ID | MEETING_DATE\
  \ | MEETING_DATETIME |\n| --- | --- | --- |\n| 1 | 10/Aug/18 | 10/Aug/2018 12:00:00\
  \ AM |\n| 2 | 21/Aug/18 | 21/Aug/2018 12:00:00 AM |\n| 3 | 23/Aug/18 | 23/Aug/2018\
  \ 12:00:00 AM |\n\n如你所见，`meeting_datetime` 列显示了包含时间的 `meeting_date` 值。时间是午夜，因为当未指定时间时，这是默认值。\n\
  \n现在，假设你想给这些日期加上 6 小时。之前你向日期加上整数来增加一天。你可以通过加上数字然后除以 24 来向日期加上小时。例如，向日期加上 1/24 将使其增加\
  \ 1 小时。\n\n要为每个 `meeting_date` 值加上 6 小时，你的查询如下：\n\n```sql\nSELECT id,\nTO_CHAR(meeting_date,\
  \ 'DD/MON/YYYY HH:MI:SS AM') AS meeting_datetime,\nTO_CHAR(meeting_date + 6/24,\
  \ 'DD/MON/YYYY HH:MI:SS AM') AS meeting_datetime_future\nFROM sales_meeting;\n```\n\
  \n此查询的结果是：\n\n| ID | MEETING_DATE | MEETING_DATETIME |\n| --- | --- | --- |\n| 1\
  \ | 10/Aug/18 | 10/Aug/2018 06:00:00 AM |\n| 2 | 21/Aug/18 | 21/Aug/2018 06:00:00\
  \ AM |\n| 3 | 23/Aug/18 | 23/Aug/2018 06:00:00 AM |\n\n这显示了当前的日期和时间，然后是加上 6 小时后的日期和时间。所有时间都显示为早上\
  \ 6 点，因为你在提到 `meeting_date` 列的地方加上了“+6/24”。它被添加到函数内部，因为我们希望在 `TO_CHAR` 执行格式化之前先完成加\
  \ 6 小时的操作。\n\n这些只是你可以在日期和数字之间进行的加减操作的一些例子。使用日期函数可以对日期进行更多操作。\n\n### 日期函数\n\n在本节中，你将学习如何使用两个最常见的日期函数。第一个函数让你查找当前日期和时间。\n\
  \n#### 当前日期和时间\n\n在很多情况下，你可能想知道当前的日期和时间是什么，例如：\n\n*   在应用程序中记录事件发生的时间\n*   记录错误发生的时间\n\
  *   向用户显示当前日期和时间\n\n有几个函数可以显示当前日期和时间，但我见过最常用的是 `SYSDATE`。此函数将返回数据库服务器的当前日期和时间。这是一种快速简便地获取当前日期和时间的方法。它不涉及任何参数；只需在查询中添加单词\
  \ `SYSDATE`。要获取当前日期和时间，请使用以下查询：\n\n```sql\nSELECT SYSDATE\nFROM dual;\n```\n\n你的结果将显示当前日期，例如：\n\
  \n| SYSDATE |\n| --- |\n| 30/AUG/2018 |\n\n`SYSDATE` 函数实际上包含一个时间部分，但像之前的 `meeting_date`\
  \ 列一样，默认情况下不显示。你可以通过对 `SYSDATE` 列使用 `TO_CHAR` 函数来显示日期和时间。是的，你可以在其他函数内部使用函数，这是在许多情况下获取所需数据的常用方法。\n\
  \n你的查询可能如下所示：\n\n```sql\nSELECT\nTO_CHAR(SYSDATE, 'DD/MON/YYYY HH:MI:SS AM') AS\
  \ time_now\nFROM dual;\n```\n\n此查询的结果将显示类似以下内容：\n\n| SYSDATE |\n| --- |\n| 30/AUG/2018\
  \ 12:30:14 PM |\n\n这显示了当前日期以及时间。每次运行此查询时，时间都会更改为当前时间。\n\n如果需要将当前日期插入列中，可以在 `INSERT`\
  \ 语句中使用此函数。例如，像这样的查询将插入一条新记录，其会议日期和时间为当前时间：\n\n```sql\nINSERT INTO sales_meeting\
  \ (id, employee_id, company, meeting_date)\nVALUES (4, 7, 'McMahon', SYSDATE);\n\
  ```\n\n因此，无需指定实际的日期值，而是使用 `SYSDATE` 函数。你无需在你的数据库上运行此查询。\n\n\n\n#### 添加月份\n\n在本章前面，你已经学习了如何通过简单地在日期上添加一个数字来增加天数：\n\
  \n```sql\nSELECT meeting_date + 7\nFROM sales_meeting;\n```\n\n然而，如果你需要向一个日期添加几个月呢？三个月、六个月，还是\
  \ 24 个月？你可以通过添加天数来实现。但你会选择哪个数字：30，还是 31？不同的月份有不同的天数，所以添加 30 天这个方法并非在所有情况下都适用。如果你需要日期精确地变为未来的某个月份，这种方法就行不通了。\n\
  \nOracle 中有一个名为 `ADD_MONTHS` 的函数，它允许你向一个日期添加指定的月份数：\n\n```sql\nADD_MONTHS (input_date,\
  \ number_of_months)\n```\n\n这个函数包含两个参数。`input_date` 是你想要向其添加月份的日期，而 `number_of_months`\
  \ 是一个表示要添加的月份数的数字。这个函数会将指定的月份数添加到日期中，并确保日保持不变，只改变月份（或年份）。\n\n假设你需要为你的 `meeting_dates`\
  \ 添加六个月。你的查询将如下所示：\n\n```sql\nSELECT\n    meeting_date,\n    ADD_MONTHS(meeting_date,\
  \ 6) AS new_date\nFROM sales_meeting;\n```\n\n该查询的结果是：\n\n| ID | MEETING_DATE |\
  \ NEW_DATE |\n| --- | --- | --- |\n| 1 | 10/Aug/2018 | 10/Feb/2019 |\n| 2 | 21/Aug/2018\
  \ | 21/Feb/2019 |\n| 3 | 23/Aug/2018 | 23/Feb/2019 |\n\n`new_date` 列，使用了 `ADD_MONTHS`\
  \ 函数，显示了 6 个月后的会议日期。它保持了相同的日，但月份和年份已经改变。\n\n如果你想向一个日期添加特定的年数，你可以通过添加等效的月份数来实现。这是可行的，因为一年总是有\
  \ 12 个月。你可以通过添加年数对应的月份数（例如，24 代表 2 年），或者将年数乘以 12（例如，2 * 12）来完成。这个查询包含了两种示例：\n\n\
  ```sql\nSELECT\n    meeting_date,\n    ADD_MONTHS(meeting_date, 24) AS new_date,\n\
  \    ADD_MONTHS(meeting_date, 2*12) AS new_date_ex2\nFROM sales_meeting;\n```\n\n\
  结果是：\n\n| ID | MEETING_DATE | NEW_DATE | NEW_DATE_EX2 |\n| --- | --- | --- | ---\
  \ |\n| 1 | 10/Aug/2018 | 10/Aug/2020 | 10/Aug/2020 |\n| 2 | 21/Aug/2018 | 21/Aug/2020\
  \ | 21/Aug/2020 |\n| 3 | 23/Aug/2018 | 23/Aug/2020 | 23/Aug/2020 |\n\n`new_date`\
  \ 和 `new_date_ex2` 两列都显示了 `meeting_date` 值两年后的结果。这是向现有日期值添加月份或年份的一种简单方法。\n\n###\
  \ 总结\n\nOracle 中的函数允许你对查询中的列和值执行计算。你可以使用数学符号如 `+`、`-`、`*` 和 `/` 执行一些基本操作。你也可以使用\
  \ `||` 连接字符串值。如果你想执行更复杂的操作，可以使用 Oracle 提供的众多函数之一。\n\nOracle 函数根据它们处理的数据类型分为三组：数字、字符串和日期。这些函数接受参数，执行一个过程，并返回一个值。它们可以用于查询的许多不同部分，例如\
  \ `SELECT` 查询中的 `WHERE` 子句，以及 `INSERT` 和 `UPDATE` 查询中。\n\n## 23. 编写条件逻辑\n\n许多编程语言都包含执行条件逻辑的能力，即“如果这个条件为真，则执行某事，否则执行另一事”。SQL\
  \ 与其他编程语言不同，它不包含很多特性，如变量和循环。然而，SQL 确实具有使用条件逻辑的能力。\n\n这在其他语言中通常被称为 `IF` 语句，其形式如下：\n\
  \n```sql\nif (some condition) {\n    do_something;\nelse {\n    do_something_else;\n\
  }\n```\n\n在 SQL 中，你可以做同样类型的事情，但做法略有不同。你可以使用一种称为 `CASE` 语句的语句。\n\n### CASE 语句\n\n\
  在 SQL 中，`CASE` 语句允许你在查询中执行这种“如果-那么-否则”逻辑或条件逻辑。它类似于其他语言中的 `IF` 语句。它被称为语句（statement）而不是函数（function），因为它是一组关键字的组合，而不是一个带有括号内几个参数的关键字。\n\
  \n`CASE` 语句可以用于函数可以使用的许多相同位置，例如：\n\n*   `SELECT` 语句的 `SELECT`、`WHERE` 和 `ORDER BY`\
  \ 子句\n*   `UPDATE` 语句的 `UPDATE`、`SET` 和 `WHERE` 子句\n*   `DELETE` 语句的 `WHERE` 子句\n\
  \n它非常适合根据同一行中的另一个值来显示特定的值。因为每一行中的值可能不同，所以有时添加一个 `CASE` 语句来查看它们并在不同情况下显示一个值是很有用的。\n\
  \n`CASE` 语句是什么样子的？\n\n```sql\nCASE [expression]\n    WHEN condition_1 THEN result_1\n\
  \    WHEN condition_2 THEN result_2\n    ...\n    WHEN condition_n THEN result_n\n\
  \    ELSE result\nEND case_name\n```\n\n该语句的参数是：\n\n*   `expression`：这是 `CASE` 语句将要查找的表达式或条件。如果你将其与\
  \ `IF` 语句比较，这相当于 `IF` 后面条件的第一部分。这是一个可选参数。\n*   `condition_1/2/n`：这是上述表达式的可能结果。根据你想要处理的不同可能值的数量，你可以在\
  \ `CASE` 语句中放入任意多个这样的条件。\n*   `result_1/2/n`：这是如果满足上述条件则应显示的值。它位于 `THEN` 关键字之后，相当于其他编程语言中\
  \ `IF-THEN-ELSE` 语句的 `THEN` 部分。\n*   `ELSE result`：如果 `CASE` 语句中没有任何条件被满足，则显示此值。它相当于\
  \ `IF-THEN-ELSE` 语句的 `ELSE` 部分。\n*   `case_name`：这是一个可选参数，指示当它在查询中使用时该列应被称为什么。它类似于你在前面章节中使用过的列别名。\n\
  \n这是一个相当长的语句，但如果你需要在查询中执行这种逻辑，它非常有用。在 Oracle SQL 中，你可以使用两种方式的 `CASE` 语句：简单的 `CASE`\
  \ 语句和搜索的 `CASE` 语句。\n\n\n\n### 简单 CASE 语句\n\n### 基本示例\n\n一个*简单 CASE 语句*是指使用了表达式参数的情况。它会对每一行的\
  \ `WHEN` 条件检查同一个表达式。\n\n例如，你的语句可能如下所示：\n\n```sql\nCASE last_name\nWHEN 'JONES' THEN\
  \ 'The name is Jones'\nWHEN 'SMITH' THEN 'The name is Smith'\nWHEN 'KING' THEN 'The\
  \ name is King'\nELSE 'The name is something else'\nEND namecheck\n```\n\n这条语句会检查\
  \ `last_name` 列，如果它等于 JONES、SMITH 或 KING，则显示不同的值。如果它不匹配其中任何一个，则显示另一个值。你不需要指定 `WHEN\
  \ last_name = 'JONES'` 或 `WHEN last_name = 'SMITH'`，因为使用这种方法时，`WHEN` 会自动应用到语句开头提到的\
  \ `last_name` 上。\n\n这里也没有提到表名或 `FROM` 子句，因为假定这条语句是另一个包含 `FROM` 子句的语句（例如 `SELECT`）的一部分。例如，这条\
  \ `CASE` 语句可以被添加到一个 `SELECT` 查询中：\n\n| LAST_NAME | NAMECHECK |\n| --- | --- |\n\
  | JONES | The name is Jones |\n| SMITH | The name is Smith |\n| KING | The name\
  \ is King |\n| SIMPSON | The name is something else |\n| ANDERSON | The name is\
  \ something else |\n| COOPER | The name is something else |\n| ADAMS | The name\
  \ is something else |\n| SMITH | The name is Smith |\n| PATRICK | The name is something\
  \ else |\n| Jones | The name is something else |\n\n```sql\nSELECT\nlast_name,\n\
  CASE last_name\nWHEN 'JONES' THEN 'The name is Jones'\nWHEN 'SMITH' THEN 'The name\
  \ is Smith'\nWHEN 'KING' THEN 'The name is King'\nELSE 'The name is something else'\n\
  END namecheck\nFROM employee;\n```\n\n你可以看到其中一些结果显示了正确描述名字的句子，而另一些显示了“something\
  \ else”。最后一行显示的是“Jones”，但这个 `CASE` 语句将其显示为“something else”。这是因为 `CASE` 语句和 `WHEN`\
  \ 子句是区分大小写的，就像你在之前章节中学到的 `WHERE` 子句一样。这意味着 “Jones” 不等于 “JONES”。\n\n### 使用函数处理大小写\n\
  \n好消息是，你可以在 `CASE` 语句中使用函数。你可以在 `CASE` 语句内部使用 `UPPER` 函数将 `last_name` 转换为大写值进行检查：\n\
  \n| LAST_NAME | NAMECHECK |\n| --- | --- |\n| JONES | The name is Jones |\n| SMITH\
  \ | The name is Smith |\n| KING | The name is King |\n| SIMPSON | The name is something\
  \ else |\n| ANDERSON | The name is something else |\n| COOPER | The name is something\
  \ else |\n| ADAMS | The name is something else |\n| SMITH | The name is Smith |\n\
  | PATRICK | The name is something else |\n| Jones | The name is Jones |\n\n```sql\n\
  SELECT\nlast_name,\nCASE UPPER(last_name)\nWHEN 'JONES' THEN 'The name is Jones'\n\
  WHEN 'SMITH' THEN 'The name is Smith'\nWHEN 'KING' THEN 'The name is King'\nELSE\
  \ 'The name is something else'\nEND namecheck\nFROM employee;\n```\n\n使用这个 `UPPER`\
  \ 函数已将“Jones”转换为“JONES”，并满足了 CASE 语句中 WHEN ‘JONES’ 的条件。\n\n### 多条件简单 CASE\n\n让我们看另一个例子，你需要判断一个\
  \ `salary` 是否等于 20000 或 40000，如果是，则符合加薪条件。你的查询会是这样：\n\n```sql\nSELECT id,\nlast_name,\n\
  salary,\nCASE salary\nWHEN 20000 THEN 'Eligible'\nWHEN 40000 THEN 'Eligible'\nELSE\
  \ 'Not Eligible'\nEND salary_check\nFROM employee;\n```\n\n这个查询检查 `salary` 列。如果等于\
  \ 20000，则显示 Eligible 值。如果等于 40000，也显示同样的值。如果它不匹配这两个值中的任何一个，则显示 Not Eligible。如果你运行这个查询，你会得到这个结果：\n\
  \n| ID | LAST_NAME | SALARY | SALARY_CHECK |\n| --- | --- | --- | --- |\n| 1 | JONES\
  \ | 30000 | Not Eligible |\n| 2 | SMITH | 35000 | Not Eligible |\n| 3 | KING | 45000\
  \ | Not Eligible |\n| 4 | SIMPSON | 52000 | Not Eligible |\n| 5 | ANDERSON | 31000\
  \ | Not Eligible |\n| 6 | COOPER | (null) | Not Eligible |\n| 7 | ADAMS | (null)\
  \ | Not Eligible |\n| 8 | SMITH | 62000 | Not Eligible |\n| 9 | PATRICK | 40000\
  \ | Eligible |\n| 10 | Jones | 42000 | Not Eligible |\n\n这显示了 `salary` 为 20000 或\
  \ 40000 的员工为 Eligible，其他记录为 Not Eligible。然而，`CASE` 语句中的两个 `WHEN` 子句看起来非常相似：\n\n\
  ```sql\nWHEN 20000 THEN 'Eligible'\nWHEN 40000 THEN 'Eligible'\n```\n\n我们可以尝试使用\
  \ `OR` 关键字将它们合并为一个条件，就像在 `WHERE` 子句中那样。这使代码更易于阅读和编写，因为代码更少。\n\n```sql\nWHEN 20000\
  \ OR 40000 THEN 'Eligible'\n```\n\n让我们将这个添加到整个查询中并运行它。\n\n```sql\nSELECT id,\nlast_name,\n\
  salary,\nCASE salary\nWHEN 20000 OR 40000 THEN 'Eligible'\nELSE 'Not Eligible'\n\
  END salary_check\nFROM employee;\n```\n\n我们得到了这个错误：\n\n```\nORA-00905: missing keyword\n\
  00905. 00000 -  \"missing keyword\"\n*Cause:\n*Action:\nError at Line: 28 Column:\
  \ 12\n```\n\n这是否意味着我们不能在 `CASE` 语句中使用 `OR` 关键字？我们可以，但不能在简单 CASE 语句中使用。对于比这些简单检查更复杂的任何情况，我们需要使用另一种类型的\
  \ CASE 语句。\n\n\n### 搜索式 CASE 语句\n\nOracle 中的另一种 `CASE` 语句是“搜索式 `CASE` 语句” (`searched\
  \ case statement`)。搜索式 `CASE` 语句与简单 `CASE` 语句的区别在于指定表达式的位置。在简单 `CASE` 语句中，`expression`\
  \ 紧跟在 `CASE` 关键字之后。在搜索式 `CASE` 语句中，`expression` 位于每个 `WHEN` 子句中。\n\n搜索式 `CASE` 语句允许使用更复杂的条件，例如多个条件、通配符检查、大于和小于检查以及对多个字段的检查。你可以看到以下示例，它使用了与之前简单\
  \ `CASE` 语句相同的逻辑，但采用了搜索式 `CASE` 语句的格式：\n\n```sql\nCASE\nWHEN last_name = 'JONES'\
  \ THEN 'The name is Jones'\nWHEN last_name = 'SMITH' THEN 'The name is Smith'\n\
  WHEN last_name = 'KING'  THEN 'The name is King'\nELSE 'The name is something else'\n\
  END namecheck\n```\n\n这种方法需要多打一点字，但它更灵活。让我们将其加入 `SELECT` 查询中，并像之前一样加入 `UPPER` 函数。\n\
  \n| LAST_NAME | NAMECHECK            |\n| --------- | -------------------- |\n|\
  \ JONES     | The name is Jones    |\n| SMITH     | The name is Smith    |\n| KING\
  \      | The name is King     |\n| SIMPSON   | The name is something else |\n| ANDERSON\
  \  | The name is something else |\n| COOPER    | The name is something else |\n\
  | ADAMS     | The name is something else |\n| SMITH     | The name is Smith    |\n\
  | PATRICK   | The name is something else |\n| Jones     | The name is Jones    |\n\
  \n```sql\nSELECT\nlast_name,\nCASE\n  WHEN UPPER(last_name) = 'JONES' THEN 'The\
  \ name is Jones'\n  WHEN UPPER(last_name) = 'SMITH' THEN 'The name is Smith'\n \
  \ WHEN UPPER(last_name) = 'KING'  THEN 'The name is King'\n  ELSE 'The name is something\
  \ else'\nEND namecheck\nFROM employee;\n```\n\n结果显示与之前的示例相同。`namecheck` 列根据我们编写的\
  \ `CASE` 语句显示简短描述。对于一个简单的检查，这种方法可能显得有点过于麻烦，因此在这种情况下，也许简单 `CASE` 语句更受青睐。然而，有些时候搜索式\
  \ `CASE` 语句更好。\n\n让我们看另一个例子。假设你被要求根据几位员工当前的薪资来确定他们是否有资格加薪。如果员工的薪水低于 40000，则显示为“低薪”。如果他们的薪水在\
  \ 40000 到 50000 之间，则显示为“中等薪资”，任何 50000 或更多的应显示为“高薪”。\n\n你的查询将如下所示：\n\n```sql\nSELECT\
  \ id,\n       last_name,\n       salary,\n       CASE\n         WHEN salary < 40000\
  \                    THEN 'Low salary'\n         WHEN salary >= 40000 AND salary\
  \ < 50000 THEN 'Medium salary'\n         WHEN salary >= 50000                  \
  \ THEN 'High salary'\n       END salary_check\nFROM employee;\n```\n\n我们这里没有添加 `ELSE`。它是一个可选子句。让我们看看运行此查询会发生什么。\n\
  \n| ID  | LAST_NAME | SALARY | SALARY_CHECK   |\n| --- | --------- | ------ | --------------\
  \ |\n| 1   | JONES     | 30000  | Low salary     |\n| 2   | SMITH     | 35000  |\
  \ Low salary     |\n| 3   | KING      | 45000  | Medium Salary  |\n| 4   | SIMPSON\
  \   | 52000  | High salary    |\n| 5   | ANDERSON  | 31000  | Low salary     |\n\
  | 6   | COOPER    | (null) | (null)         |\n| 7   | ADAMS     | (null) | (null)\
  \         |\n| 8   | SMITH     | 62000  | High salary    |\n| 9   | PATRICK   |\
  \ 40000  | (null)         |\n| 10  | Jones     | 42000  | Medium salary  |\n\n你可以看到，一些记录的值为“低薪”、“中等薪资”或“高薪”。其他记录显示为\
  \ `NULL`。这是因为他们没有满足 `CASE` 语句中提到的条件。\n\n那么 `salary` 为 40000 的那条记录呢？为什么它没有显示一个值？这是因为你使用的条件是这样的：\n\
  \n```sql\nCASE\n  WHEN salary < 40000                    THEN 'Low salary'\n  WHEN\
  \ salary > 40000 AND salary < 50000 THEN 'Medium salary'\n  WHEN salary >= 50000\
  \                   THEN 'High salary'\nEND salary_check\n```\n\n第一个 `WHEN` 子句查找\
  \ `salary` 值小于 40000。第二个 `WHEN` 子句查找 `salary` 值大于 40000。其中没有提到 `salary` 等于 40000。有两种方法可以解决此问题：\n\
  \n*   更改符号以包含“等于”\n*   更改 `WHEN` 子句使其重叠\n\n第一种解决方法是更改符号以包含“等于”。我们之前使用的描述是：“如果员工的薪水低于\
  \ 40000，则显示为低薪。如果他们的薪水在 40000 到 50000 之间，则显示为中等薪资。”这表明 `salary` 值为 40000 应标记为‘中等薪资’。你可以更改查询以加入“等于”：\n\
  \n```sql\nSELECT id,\n       last_name,\n       salary,\n       CASE\n         WHEN\
  \ salary < 40000                       THEN 'Low salary'\n         WHEN salary >=\
  \ 40000 AND salary <= 50000  THEN 'Medium salary'\n         WHEN salary > 50000\
  \                       THEN 'High salary'\n       END salary_check\nFROM employee;\n\
  ```\n\n| ID  | LAST_NAME | SALARY | SALARY_CHECK   |\n| --- | --------- | ------\
  \ | -------------- |\n| 1   | JONES     | 30000  | Low salary     |\n| 2   | SMITH\
  \     | 35000  | Low salary     |\n| 3   | KING      | 45000  | Medium salary  |\n\
  | 4   | SIMPSON   | 52000  | High salary    |\n| 5   | ANDERSON  | 31000  | Low\
  \ salary     |\n| 6   | COOPER    | (null) | (null)         |\n| 7   | ADAMS   \
  \  | (null) | (null)         |\n| 8   | SMITH     | 62000  | High salary    |\n\
  | 9   | PATRICK   | 40000  | Medium salary  |\n| 10  | Jones     | 42000  | Medium\
  \ salary  |\n\n现在显示了正确的值。最后两个 `NULL` 值显示的原因是薪资值为 `NULL`。\n\n解决此问题的另一种方法是利用 Oracle\
  \ 处理 `CASE` 语句的方式。Oracle 会找到第一个为 `TRUE` 的条件，并将其用于你的 `CASE` 语句。这意味着如果第一个和第二个 `WHEN`\
  \ 子句都为真，则将使用第一个 `WHEN` 子句的结果。你可以更新查询以使用此方法：\n\n```sql\nSELECT id,\n       last_name,\n\
  \       salary,\n       CASE\n         WHEN salary <= 40000              THEN 'Low\
  \ salary'\n         WHEN salary <= 50000              THEN 'Medium salary'\n   \
  \      ELSE 'High salary'\n       END salary_check\nFROM employee;\n```\n\n| ID\
  \  | LAST_NAME | SALARY | SALARY_CHECK   |\n| --- | --------- | ------ | --------------\
  \ |\n| 1   | JONES     | 30000  | Low salary     |\n| 2   | SMITH     | 35000  |\
  \ Low salary     |\n| 3   | KING      | 45000  | Medium salary  |\n| 4   | SIMPSON\
  \   | 52000  | High salary    |\n| 5   | ANDERSON  | 31000  | Low salary     |\n\
  | 6   | COOPER    | (null) | (null)         |\n| 7   | ADAMS     | (null) | (null)\
  \         |\n| 8   | SMITH     | 62000  | High salary    |\n| 9   | PATRICK   |\
  \ 40000  | Medium salary  |\n| 10  | Jones     | 42000  | Medium salary  |\n\n如你所见，显示的值与之前的示例相同。`CASE`\
  \ 语句是一个非常强大的语句。\n\n在 SQL 中处理条件逻辑还有另一种方法，那就是 `DECODE` 函数。\n\n### DECODE 函数\n\n`DECODE`\
  \ 是 Oracle 提供的一个函数，用于执行条件逻辑。它与 `CASE` 语句类似。该函数的语法如下所示：\n\n```\nDECODE (expression,\
  \ search, result [, search, result]... [,default] )\n```\n\n此 Oracle `DECODE` 函数的参数为：\n\
  \n*   `expression`（必填）：这是函数中要比较的值。\n*   `search`（必填）：这是用于与表达式进行比较的值。\n*   `result`（必填）：如果搜索值与表达式值匹配，则返回此值。可以有多组搜索和结果值，结果值对应于前一个搜索值。\n\
  *   `default`（可选）：如果没有一个搜索值与表达式匹配，则返回此值。如果未提供默认值，则使用 `NULL`。\n\n如果你将它与 `IF-THEN-ELSE`\
  \ 语句进行比较，它看起来会是这样：\n\n```\nIF (expression = search) THEN result\n[ELSE IF (expression\
  \ = search) THEN result]\nELSE default\nEND IF\n```\n\n你也可以将之前的 `CASE` 语句写成 `DECODE`\
  \ 函数。它看起来像这样：\n\n```\nSELECT\nlast_name,\nDECODE(UPPER(last_name), 'JONES', 'The\
  \ name is Jones', 'SMITH', 'The name is Smith', 'KING', 'The name is King', 'The\
  \ name is something else') AS namecheck\nFROM employee;\n```\n\n这个函数全部在一行上，所以可以格式化得更好一些：\n\
  \n```\nSELECT\nlast_name,\nDECODE(UPPER(last_name),\n'JONES', 'The name is Jones',\n\
  'SMITH', 'The name is Smith',\n'KING', 'The name is King',\n'The name is something\
  \ else') AS namecheck\nFROM employee;\n```\n\n你可以运行此查询并得到以下结果。\n\n| LAST_NAME |\
  \ NAMECHECK |\n| --- | --- |\n| JONES | 名字是 Jones |\n| SMITH | 名字是 Smith |\n| KING\
  \ | 名字是 King |\n| SIMPSON | 名字是其他 |\n| ANDERSON | 名字是其他 |\n| COOPER | 名字是其他 |\n\
  | ADAMS | 名字是其他 |\n| SMITH | 名字是 Smith |\n| PATRICK | 名字是其他 |\n| Jones | 名字是 Jones\
  \ |\n\n此示例中的 `DECODE` 函数看起来类似于 `CASE` 语句，并显示相同的结果。但是，在某些情况下，`DECODE` 函数可能会有点混乱，例如使用\
  \ `LIKE` 关键字进行部分匹配或使用大于或小于符号时。\n\n`DECODE` 只能检查完全匹配。你可以使用一些运算符和 `SIGN` 函数来检查是否大于或小于其他值。之前我们有一个对薪资进行分组的\
  \ `CASE` 语句：\n\n```\nCASE\nWHEN salary = 50000 THEN 'High salary'\nEND salary_check\n\
  ```\n\n要用 `DECODE` 语句编写相同的逻辑，我们的函数将如下所示：\n\n```\nDECODE(SIGN(40000-salary),1,'Low\
  \ salary', -1, 'Medium or high salary', 'Unsure')\n```\n\n此函数首先从 `40000` 中减去 `salary`，并将其括在\
  \ `SIGN` 函数中。如果结果为正数，此函数将返回 `1`，如果结果为负数，则返回 `-1`。因此，如果 `salary` 小于 `40000`，则结果值将为正数，`SIGN`\
  \ 返回 `1`。\n\n然后，你需要将 'Medium or high salary' 替换为另一个 `DECODE` 函数来检查 `50000` 的值：\n\
  \n```\nDECODE(SIGN(40000-salary),1,'Low salary', -1, DECODE(SIGN(50000-salary),1,'Medium\
  \ salary', -1, 'High salary', 'Unsure'),'Unsure')\n```\n\n如你所见，这变得相当混乱，函数里面套着函数。你或其他人也很难理解它的含义。\n\
  \n因此，在这种情况下，它可能有效，但使用 `CASE` 语句会更好。\n\n### CASE 还是 DECODE？\n\n如果 `CASE` 语句和 `DECODE`\
  \ 函数功能相同，应该使用哪一个？我建议在所有情况下都使用 `CASE` 语句，原因如下：\n\n*   `CASE` 是在 Oracle 8（相当长一段时间以前）中引入的，用于替换较旧的\
  \ `DECODE` 函数。\n*   `CASE` 比 `DECODE` 更灵活。\n*   对于简单和复杂的逻辑，`CASE` 都比 `DECODE` 更具可读性。\n\
  *   `CASE` 和 `DECODE` 的性能相同。\n\n如果你在所有情况下都使用 `CASE`，那么你就保持了代码的一致性。有时对于简单逻辑，使用 `DECODE`\
  \ 似乎更容易，但如果你在某些地方使用 `DECODE`，在其他地方使用 `CASE`，会使你的 SQL 代码更难理解。\n\n### 总结\n\nOracle\
  \ SQL 包含使用条件逻辑的能力，这等同于 \"if then else\" 语句。这可以通过两种方式实现：`CASE` 和 `DECODE`。\n\n`CASE`\
  \ 语句允许你执行条件逻辑，可以是简单的 CASE 语句，也可以是搜索式的 CASE 语句。这些语句几乎相同，只在表达式使用的位置上有所不同，但搜索式 CASE\
  \ 语句在逻辑上更灵活。\n\n`DECODE` 函数也可以以类似的方式用于条件逻辑。然而，它限制更多、更古老，且更难阅读。我建议使用 `CASE` 语句而不是\
  \ `DECODE` 函数。\n\n## 24. 理解聚合函数\n\n在上一章中，你学习了什么是函数。你查看了一些函数示例，例如 `LOWER`，它对特定列的值执行特定操作。`LOWER`\
  \ 函数用于将每个记录的 `last_name` 值转换为小写版本。\n\n```\nSELECT id,\nlast_name,\nLOWER(last_name)\n\
  FROM employee;\n```\n\n此查询的结果显示小写的 `last_name` 记录。\n\n| ID | LAST_NAME | LOWER(LAST_NAME)\
  \ |\n| --- | --- | --- |\n| 1 | JONES | jones |\n| 2 | SMITH | smith |\n| 3 | KING\
  \ | king |\n| 4 | SIMPSON | simpson |\n| 5 | ANDERSON | anderson |\n| 6 | COOPER\
  \ | cooper |\n| 7 | ADAMS | adams |\n| 8 | SMITH | smith |\n| 9 | PATRICK | patrick\
  \ |\n| 10 | Jones | jones |\n\n这个函数，以及我们看过的其他函数，都是对每个记录单独执行的。SQL 中有一些函数允许你对多条记录执行操作。\n\
  \n### 聚合函数\n\n`聚合函数`是 SQL 中一种可以使用来自多于一行数据的函数。它们被称为聚合函数，因为它们聚合数据。虽然你之前学到的函数，如 `ADD_MONTHS`\
  \ 和 `LOWER`，作用于返回的每一行，但聚合函数会查看多行中的数据并返回单个结果。\n\n为什么这很有用？SQL 中有五个常用的聚合函数，它们允许你执行以下任务：\n\
  \n*   查找列或表中的记录数\n*   查找一组数字的总和\n*   查找最大值或最高值\n*   查找最小值或最低值\n*   查找值列表的平均值\n\n\
  在本章中，你将学习这些函数以及如何使用它们。\n\n### SUM 函数\n\n你将学习的第一个聚合函数是 `SUM`。`SUM` 函数用于对数字进行总计或求和。它看起来像这样：\n\
  \n```\nSUM ( [DISTINCT] expression)\n```\n\n`SUM` 函数接受两个参数：\n\n*   `expression`：这是要相加的表达式，可以是表中的列或其他数值表示形式。\n\
  *   `DISTINCT`：这是一个可选参数，指定 SUM 函数只应对表达式中的不同或唯一值求和。我不经常使用它，但知道它是可用的。\n\n"
- '# SQL 聚合函数：SUM 与 COUNT 详解


  ## 一、SUM 函数示例


  让我们通过`employee`表中`salary`值的一些例子来看看`SUM`函数。该表如下所示：


  | ID | LAST_NAME | SALARY |

  | --- | --- | --- |

  | 1 | JONES | 30000 |

  | 2 | SMITH | 35000 |

  | 3 | KING | 45000 |

  | 4 | SIMPSON | 52000 |

  | 5 | ANDERSON | 31000 |

  | 6 | COOPER | (null) |

  | 7 | ADAMS | (null) |

  | 8 | SMITH | 62000 |

  | 9 | PATRICK | 40000 |

  | 10 | Jones | 42000 |


  ```sql

  SELECT id,

  last_name,

  salary

  FROM employee;

  ```


  要找到`salary`值的`SUM`总和，你可以编写如下查询：


  ```sql

  SELECT SUM(salary)

  FROM employee;

  ```


  这将显示所有薪水值的总和。


  | SUM(SALARY) |

  | --- |

  | 337000 |


  `NULL`值在`SUM`计算中被忽略，`salary`值的总和是 337,000。请注意，即使`employee`表中有十行数据，也只返回了一行。这是因为`SUM`函数是一个**聚合函数**。无论基础表中有多少行，它都只返回一行。


  ### 1.1 SUM 与 WHERE 子句


  当你将其与`WHERE`子句一起使用时，`SUM`函数也能工作。数据库会先执行`WHERE`子句，然后对那些符合`WHERE`子句条件的值执行`SUM`。


  假设你想找出除 SIMPSON 外所有`employee`的`salary`值总和。查询如下：


  ```sql

  SELECT SUM(salary)

  FROM employee

  WHERE last_name <> ''SIMPSON'';

  ```


  此查询的结果是：


  | SUM(SALARY) |

  | --- |

  | 285000 |


  这与之前的薪水总和相同，但减去了 SIMPSON 的 52000 薪水。


  ### 1.2 SUM 与表达式


  你可以在`SUM`函数中使用已经过其他函数处理或计算的值。假设你想找出如果所有`salary`值都增加 20%后的总额。这意味着`salary`值将乘以 1.2，然后相加。


  ```sql

  SELECT SUM(salary * 1.2)

  FROM employee;

  ```


  结果如下：


  | SUM(SALARY) |

  | --- |

  | 404400 |


  任何可以转换为数字的东西都可以用作`SUM`函数的参数。


  ### 1.3 SUM 与 DISTINCT


  让我们看看`DISTINCT`关键字在`SUM`函数内部使用时的作用。这将找出列中的唯一或不同的值，并对它们求和。


  ```sql

  SELECT SUM(DISTINCT salary)

  FROM employee;

  ```


  结果如下：


  | SUM(SALARY) |

  | --- |

  | 337000 |


  它显示 337,000，因为它计算了所有唯一`salary`值的总和。


  ## 二、COUNT 函数


  Oracle SQL 中另一个可用的函数是`COUNT`函数。此函数用于计算表中或结果集中的记录数。它的工作方式与`SUM`函数类似：


  ```sql

  COUNT( [DISTINCT] expression)

  ```


  该函数的两个参数与`SUM`函数相同：


  *   `expression`：这是要计数的表达式，可以是表中的某个列，也可以是数字值的其他表示。

  *   `DISTINCT`：这是一个可选参数，指定`COUNT`函数应只计算表达式中不同的或唯一的值。


  让我们看一些例子。


  ### 2.1 统计所有记录


  `COUNT`函数的一个常见用途是统计表中的所有记录。这可以通过使用`*`作为参数来完成：


  ```sql

  SELECT COUNT(*)

  FROM employee;

  ```


  这将统计表中的所有记录并显示一个数字。


  | COUNT(*) |

  | --- |

  | 10 |


  与`SUM`函数一样，`COUNT`函数也是一个聚合函数，因此它将多行聚合成一行。这是查看表中记录数量的简单方法。你可以在任何表上运行它：


  | COUNT(*) |

  | --- |

  | 3 |


  ```sql

  SELECT COUNT(*)

  FROM office;

  ```


  `office`表中有三条记录，所以这个`COUNT`显示值为 3。


  ### 2.2 统计特定列


  使用`COUNT`函数的另一种方法是统计特定列中的值的数量。这与`COUNT(*)`略有不同，因为统计特定列会忽略任何`NULL`值，而`COUNT(*)`会包含带有`NULL`值的行。


  如果你对`id`列执行`COUNT`，它将计算非`NULL`的值并显示结果。在这种情况下，所有值都已填充。你可以通过从员工表中选择一些列来确认这一点。


  | ID | LAST_NAME | SALARY |

  | --- | --- | --- |

  | 1 | JONES | 30000 |

  | 2 | SMITH | 35000 |

  | 3 | KING | 45000 |

  | 4 | SIMPSON | 52000 |

  | 5 | ANDERSON | 31000 |

  | 6 | COOPER | (null) |

  | 7 | ADAMS | (null) |

  | 8 | SMITH | 62000 |

  | 9 | PATRICK | 40000 |

  | 10 | Jones | 42000 |


  ```sql

  SELECT id, last_name, salary

  FROM employee;

  ```


  你可以在`id`列上使用`COUNT`函数：


  | COUNT(ID) |

  | --- |

  | 10 |


  ```sql

  SELECT COUNT(id)

  FROM employee;

  ```


  但是，如果你统计`last_name`列，值将会不同，因为有一个`NULL`值：


  | COUNT(LAST_NAME) |

  | --- |

  | 9 |


  ```sql

  SELECT COUNT(last_name)

  FROM employee;

  ```


  你也可以统计`salary`列，这将显示另一个不同的值：


  | COUNT(SALARY) |

  | --- |

  | 8 |


  ```sql

  SELECT COUNT(salary)

  FROM employee;

  ```


  如你所见，如果该列中有`NULL`值，对不同列执行`COUNT`将显示不同的结果。


  ### 2.3 COUNT 与 DISTINCT


  有时你需要找出列中不同或唯一值的数量，例如“状态”列或员工`last_name`值。你可以使用`SELECT DISTINCT`来查看这些值是什么，但如果你只想看看有多少个，你可以使用带有`DISTINCT`的`COUNT`。


  执行此操作的查询如下：


  ```sql

  SELECT COUNT(DISTINCT last_name)

  FROM employee;

  ```


  注意`DISTINCT`在括号内部，因为我们正在统计不同的`last_name`值。此查询的结果是：


  | COUNT(DISTINCT LAST_NAME) |

  | --- |

  | 9 |


  此结果显示为 9，因为表中有 10 行，包括 SMITH 这个值被提到了两次，它在计数中被排除。这表明有 9 个不同的`last_name`值。我们可以通过运行`SELECT`查询来看看实际值是什么：


  | LAST_NAME |

  | --- |

  | JONES |

  | SMITH |

  | KING |

  | SIMPSON |

  | ANDERSON |

  | ADAMS |

  | COOPER |

  | PATRICK |

  | Jones |


  ```sql

  SELECT DISTINCT last_name

  FROM employee;

  ```


  “JONES”和“Jones”被视为不同的值，因为`DISTINCT`关键字是区分大小写的。


  如果我们将`DISTINCT`放在`COUNT`函数之外会怎样？这是我以前做过，也看到别人做过的事情。为了计算不同记录的数量，一个查询可能如下所示：


  ```sql

  SELECT DISTINCT COUNT(last_name)

  FROM employee;

  ```


  如果你运行这个查询，你会得到这个结果：


  | COUNT(LAST_NAME) |

  | --- |

  | 10 |


  显示值为 10。这是因为此查询不是在统计不同的`last_name`值；它是在统计所有的`last_name`值，然后对`COUNT`函数的结果执行`DISTINCT`。执行步骤如下：


  1.  查看员工表中的`last_name`值。

  2.  统计非`NULL`的`last_name`值的数量并返回一个单一值（值为 10）。

  3.  显示唯一的结果。只有一行，因此没有找到重复项。


  此过程在`DISTINCT`之前执行`COUNT`，因此虽然查询会返回结果，但它并未向你显示不同的`last_name`值的数量。


  #### 注意


  要计算不同值的数量，`DISTINCT`必须放在`COUNT`函数内部，而不是外部。



  #### 结合 WHERE 进行计数


  使用 `COUNT` 函数的另一种方式是在 `SELECT` 查询中结合 `WHERE` 子句。前面的例子都涉及计算表中的所有记录，但有时你可能需要计算满足特定条件的记录。这和之前所做的那样，在
  `SELECT` 查询中添加一个 `WHERE` 子句一样简单。


  假设你需要找出 `salary` 小于或等于 40000 的 `employees` 数量。一个可以实现此目的的查询是：


  ```sql

  SELECT COUNT(*)

  FROM employee

  WHERE salary <= 40000;

  ```


  这个查询使用了 `COUNT(*)` 函数以及一个 `WHERE` 子句，仅统计我们想要计数的员工。结果是：


  | COUNT(*) |

  | --- |

  | 4 |


  这个查询确定了有 4 名员工符合该标准。


  ### AVG 函数


  Oracle 包含一个名为 `AVG` 的函数，是“平均值（average）”的缩写。此函数用于查找一组数值的平均值。平均值是通过将所有非 `NULL` 值相加，再除以非
  `NULL` 值的数量来计算的。该函数的语法与 `SUM` 和 `COUNT` 函数相似：


  ```sql

  AVG ( [DISTINCT] expression)

  ```


  此函数的参数与 `COUNT` 函数相同：


  *   `expression`：这是要计算平均值的表达式，可以是表中的某个列或其他数值的表示。

  *   `DISTINCT`：这是一个可选参数，指定 `AVG` 函数应仅计算表达式中不同或唯一的值的平均值。


  让我们看一些例子。


  #### 所有值的平均值


  使用 `AVG` 函数的一种方法是找出某列所有值的平均值。这只适用于数值，因此在本例中，你需要找出所有员工的平均 `salary`：


  ```sql

  SELECT AVG(salary)

  FROM employee;

  ```


  与之前的 `COUNT` 和 `SUM` 函数类似，你在括号内指定列名。数据库将查看该列中所有非 `NULL` 的值，计算它们的平均值，并将结果显示给你。此查询的结果是：


  | AVG(SALARY) |

  | --- |

  | 42125 |


  这显示了平均工资是 42,125。你可以通过选择这些值来检查表中有哪些 `salary` 值：


  | ID | SALARY |

  | --- | --- |

  | 1 | 30000 |

  | 2 | 35000 |

  | 3 | 45000 |

  | 4 | 52000 |

  | 5 | 31000 |

  | 6 | (null) |

  | 7 | (null) |

  | 8 | 62000 |

  | 9 | 40000 |

  | 10 | 42000 |


  ```sql

  SELECT id, salary

  FROM employee;

  ```


  #### 使用 DISTINCT 计算平均值


  你也可以使用 `AVG` 函数来计算唯一或不同值的平均值。它的工作方式与 `COUNT` 函数相同，即消除列中的重复值，然后对剩余值计算平均值。查询可能如下所示：


  ```sql

  SELECT AVG(DISTINCT salary)

  FROM employee;

  ```


  | AVG(DISTINCTSALARY) |

  | --- |

  | 42125 |


  这个查询找到了不同值的平均值。


  #### 结合 WHERE 计算平均值


  最后，就像 `SUM` 和 `COUNT` 函数一样，你可以在带有 `WHERE` 子句的查询中使用 `AVG`。你可以将 `WHERE` 子句单独添加到查询中，与
  `AVG` 函数分开。


  假设你需要找出办公室编号为 2 的 `employees` 的平均 `salary`。为此，你的查询可以是：


  ```sql

  SELECT AVG(salary)

  FROM employee

  WHERE office_id = 2;

  ```


  结果是：


  | AVG(SALARY) |

  | --- |

  | 40666.66666 |


  这个查询将找到所有 `office_id` 为 2 的 `employees`，然后计算这些员工的平均 `salary`。你可以运行一个 `SELECT` 查询来查看它使用了哪些记录：


  | ID | LAST_NAME | SALARY |

  | --- | --- | --- |

  | 2 | SMITH | 35000 |

  | 3 | KING | 45000 |

  | 10 | Jones | 42000 |


  ```sql

  SELECT id, last_name, salary

  FROM employee

  WHERE office_id = 2;

  ```


  这三条记录被用于 `AVG` 函数，其 `salary` 值的平均值为 40,666。


  ### MIN 函数


  `MIN` 是另一个聚合函数，用于在值列表中查找最小值或最低值。它与 `AVG` 和 `SUM` 一样，用于数值，并且会忽略任何 `NULL` 值。


  要使用 `MIN` 函数，请遵循以下语法：


  ```sql

  MIN (expression)

  ```


  这里的 `expression` 指的是用于计算最小值的值。最常见的，这将是表中的一个列。让我们看一些 `MIN` 函数的例子。


  #### 所有记录的最小值


  你可以编写一个简单的查询，使用 `MIN` 来查找所有记录的最小值。例如，要找到最小的 `salary`，你的查询可能如下所示：


  ```sql

  SELECT MIN(salary)

  FROM employee;

  ```


  这个查询的结果是：


  | MIN(SALARY) |

  | --- |

  | 30000 |


  这显示了最小或最低的 `salary` 是 30000。通过查看表中的所有 `salary` 值，你可以确认这一点。


  | ID | SALARY |

  | --- | --- |

  | 1 | 30000 |

  | 2 | 35000 |

  | 3 | 45000 |

  | 4 | 52000 |

  | 5 | 31000 |

  | 6 | (null) |

  | 7 | (null) |

  | 8 | 62000 |

  | 9 | 40000 |

  | 10 | 42000 |


  ```sql

  SELECT id, salary

  FROM employee;

  ```


  你可以通过 `salary` 列对这个查询进行排序，以便更容易地找到最低值。


  | ID | SALARY |

  | --- | --- |

  | 1 | 30000 |

  | 5 | 31000 |

  | 2 | 35000 |

  | 9 | 40000 |

  | 10 | 42000 |

  | 3 | 45000 |

  | 4 | 52000 |

  | 8 | 62000 |

  | 6 | (null) |

  | 7 | (null) |


  ```sql

  SELECT id, salary

  FROM employee

  ORDER BY salary ASC;

  ```


  现在你可以看到最低的 `salary` 是 30000。`NULL` 值被忽略，因为它们代表未知的值，这与零不同。


  #### 结合 WHERE 计算最小值


  就像之前的函数一样，你可以在带有 `WHERE` 子句的查询中使用 `MIN` 函数。假设你想找出所有在 `office_id` 为 3 的 `employees`
  中的最低 `salary`。为此，你的查询如下所示：


  ```sql

  SELECT MIN(salary)

  FROM employee

  WHERE office_id = 3;

  ```


  结果是：


  | MIN(SALARY) |

  | --- |

  | 62000 |


  这是最小值，因为只有两个员工的 `office_id` 是 3，而其中一个的 `salary` 值是 `NULL`。


  ### MAX 函数


  你将学到的最后一个聚合函数是 `MAX` 函数。此函数将找出一组值中的最大值或最高值。它与 `MIN` 函数相反。要使用此函数，请遵循以下语法：


  ```sql

  MAX (expression)

  ```


  这里的 `expression` 指的是用于计算最大值的值。最常见的，这将是表中的一个列。让我们看一些 `MAX` 函数的例子。


  #### 所有记录的最大值


  你可以使用 `MAX` 函数来查找表中某列的最高值，就像使用 `MIN` 函数查找最小值一样。一个实现此目的的查询如下所示：


  ```sql

  SELECT MAX(salary)

  FROM employee;

  ```


  这将显示以下结果：


  | MAX(SALARY) |

  | --- |

  | 62000 |


  这显示了表中最高的 `salary`，即 62,000。你可以通过从表中选择所有 `salary` 值并按 `salary` 降序排列来确认这一点：


  | ID | SALARY |

  | --- | --- |

  | 8 | 62000 |

  | 4 | 52000 |

  | 10 | 42000 |

  | 3 | 45000 |

  | 9 | 40000 |

  | 2 | 35000 |

  | 5 | 31000 |

  | 1 | 30000 |

  | 6 | (null) |

  | 7 | (null) |


  ```sql

  SELECT id, salary

  FROM employee

  ORDER BY salary DESC NULLS LAST;

  ```


  与本章中所有其他函数一样，`NULL` 值被忽略。


  #### 结合 WHERE 计算最大值


  你也可以在查询中使用 `WHERE` 子句时使用 `MAX` 函数。`MAX` 函数将应用于匹配 `WHERE` 子句的所有行中的值。


  例如，要找出办公室 1 或 2 中所有 `employees` 的最高 `salary`，可以使用以下查询：


  ```sql

  SELECT MAX(salary)

  FROM employee

  WHERE office_id IN (1, 2);

  ```


  结果是：


  | MAX(SALARY) |

  | --- |

  | 52000 |


  这是办公室 1 或 2 中员工的最高 `salary`。



  ### 概要


  聚合函数是用于查看一行或多行数据，并将这些数据聚合为单一结果的函数。最常用的五个函数分别是 `SUM`（用于累加值）、`COUNT`（用于计数）、`AVG`（用于计算平均值）、`MAX`（用于求最大值）和
  `MIN`（用于求最小值）。它们都会忽略 `NULL` 值，并且可以与 `WHERE` 子句一同使用。


  ## 25. 对结果进行分组


  在上一章中，你学习了聚合函数。这些函数计算列中值的某个汇总值（例如总和或计数），并向你显示单行结果。在本章中，你将学习如何编写查询以对结果进行分组。这是什么意思？


  ### 分组数据


  为了理解分组数据的概念，让我们来看一下员工表。


  | ID | LAST_NAME | SALARY | OFFICE_ID |

  | --- | --- | --- | --- |

  | 1 | JONES | 30000 | 1 |

  | 2 | SMITH | 35000 | 2 |

  | 3 | KING | 45000 | 2 |

  | 4 | SIMPSON | 52000 | 1 |

  | 5 | ANDERSON | 31000 | (null) |

  | 6 | COOPER | (null) | 1 |

  | 7 | ADAMS | (null) | 3 |

  | 8 | SMITH | 62000 | 3 |

  | 9 | PATRICK | 40000 | 1 |

  | 10 | Jones | 42000 | 2 |


  ```sql

  SELECT id, last_name, salary, office_id

  FROM employee;

  ```


  在上一章中，你学习了如何使用 `SUM` 计算所有薪资值的总和，以及如何使用 `COUNT` 计算记录数。这些函数查看表中的所有值，并向你返回一个汇总值。它们可以帮助你找到如下问题的答案：


  *   计算所有薪资值的总和

  *   计算办公室 ID 为 1 的员工的薪资总和

  *   计算员工总数

  *   计算办公室 ID 为 2 的员工数量


  如果你想找出每个办公室的员工数量怎么办？你可以编写如下查询：


  ```sql

  SELECT COUNT(*)

  FROM employee

  WHERE office_id = 1;

  ```


  这将显示 `office_id` 值为 1 的员工数量。然后你必须为下一个 `office_id` 值运行另一个查询：


  ```sql

  SELECT COUNT(*)

  FROM employee

  WHERE office_id = 2;

  ```


  然后你需要不断运行这类查询，直到获得所有 `office_id` 值的 `COUNT` 结果。这样做有几个缺点：


  *   你必须为每个不同的 `office_id` 值单独编写查询，这非常耗时。

  *   在编写查询之前，你需要知道每个 `office_id` 值具体是什么。

  *   你必须手动合并所有这些单独查询的结果。


  不过，有一种更好的方法：分组。Oracle SQL 允许你在使用聚合函数时对数据进行分组。这让你无需运行单独的查询，就能找到诸如“计算每个办公室 ID 的员工数量”之类问题的答案。对于此示例，这正是我们想要的结果。


  | OFFICE_ID | COUNT(*) |

  | --- | --- |

  | 1 | 4 |

  | 2 | 3 |

  | 3 | 2 |

  | (null) | 1 |


  如何用 SQL 实现这一点呢？有一个名为 `GROUP BY` 的关键字可以与 `SELECT` 语句一起使用。


  ### GROUP BY 关键字


  在 SQL 中，`GROUP BY` 关键字允许你在运行 `SELECT` 查询时对数据进行分组。要使用 `GROUP BY`，你需要具备：


  *   一个聚合函数，例如 `SUM` 或 `COUNT`

  *   用于对数据进行分组的列


  在我们的示例中，你想计算每个办公室 ID 的员工数量。这意味着你想要分组的列是 `office_id`，因为描述是“在每个办公室 ID 中”。你还需要查看员工数量，这是使用
  `COUNT` 完成的。


  要开始 `SELECT` 查询，你先指定要显示的列，然后是聚合函数 `COUNT`：


  ```sql

  SELECT office_id, COUNT(*)

  ```


  这将显示 `office_id` 列，然后是一个 `COUNT` 列。接着你添加表名：


  ```sql

  SELECT office_id, COUNT(*)

  FROM employee

  ```


  现在你添加 `GROUP BY` 关键字。这定义了你希望如何对数据进行分组，或者说 `COUNT` 函数应如何进行计算。你想为 `office_id` 的每个不同值计算
  `COUNT`，因此你的 `GROUP BY` 子句将如下所示：


  ```sql

  SELECT office_id, COUNT(*)

  FROM employee

  GROUP BY office_id;

  ```


  记住这一点的一个简单方法是：`SELECT` 子句中任何不是聚合函数的列，都应该出现在 `GROUP BY` 子句中。在此查询中，`office_id` 位于
  `SELECT` 子句中，也位于 `GROUP BY` 子句中。`COUNT(*)` 函数不在 `GROUP BY` 子句中，因为它是一个聚合函数。现在让我们运行这个查询。


  | OFFICE_ID | COUNT(*) |

  | --- | --- |

  | 1 | 4 |

  | 2 | 3 |

  | 3 | 2 |

  | (null) | 1 |


  这正好显示了你想要的结果。这个简单的查询让你无需知道 `office_id` 具体有哪些值，也无需编写多个查询，就能找出每个办公室的员工数量。


  如果你不使用 `GROUP BY` 子句会怎样？


  ```sql

  SELECT office_id, COUNT(*)

  FROM employee;

  ```


  如果你运行此查询，你可能期望看到相同的结果。然而，你看到的会是：


  ```

  ORA-00937: not a single-group group function

  00937. 00000 -  "not a single-group group function"

  *Cause:

  *Action:

  Error at Line: 1 Column: 8

  ```


  此错误意味着你在一个包含聚合函数的查询中使用了普通列，但没有使用 `GROUP BY` 子句。这个 SQL 语句是无效的，因为它缺少 `GROUP BY` 子句。这是编写
  SQL 时常见的错误，但幸运的是它很容易修复。


  如果你忘记添加 `GROUP BY`，SQL Developer 还会在你的 `SELECT` 列下显示彩色下划线：


  ![../images/471705_1_En_25_Chapter/471705_1_En_25_Fig1_HTML.jpg](img/471705_1_En_25_Fig1_HTML.jpg)


  图 25-1


  彩色下划线提示


  如果将鼠标悬停在其上，它将显示警告消息。


  ![../images/471705_1_En_25_Chapter/471705_1_En_25_Fig2_HTML.jpg](img/471705_1_En_25_Fig2_HTML.jpg)


  图 25-2


  缺少 GROUP BY 的警告消息


  这样，你就可以在运行查询之前发现问题。


  ### 与连接（JOIN）一起使用的 GROUP BY


  你可以将 `GROUP BY` 子句与任何 `SELECT` 查询一起使用，例如那些需要与其他表连接的查询。假设你想查看每个办公室的员工数量，但希望显示办公室的
  `address` 而不是 ID。`address` 字段在办公室表中。你的查询将如下所示：


  ```sql

  SELECT o.address,

  COUNT(*)

  FROM employee e

  INNER JOIN office o ON e.office_id = o.id

  GROUP BY o.address

  ORDER BY o.address;

  ```


  此查询包含几个部分。它使用了表别名，“o” 代表办公室表，“e” 代表员工表。查询按办公室表中的 `address` 字段分组。同时，它还将两个表连接在一起。


  此查询的结果是：


  | ADDRESS | COUNT(*) |

  | --- | --- |

  | 10 Collins Road | 2 |

  | 123 Smith Street | 4 |

  | 45 Main Street | 3 |


  这将显示每个办公室的 `addresses`，以及查询为每个 `address` 找到的员工记录数。


  ### GROUP BY 与 SUM


  你可以将 `GROUP BY` 子句与任何聚合函数一起使用。前面的示例使用了 `COUNT`，但如果需要，你也可以使用 `SUM`。要计算每个办公室的薪资总和，你的查询可能如下所示：


  ```sql

  SELECT office_id,

  SUM(salary)

  FROM employee

  GROUP BY office_id;

  ```


  它与使用 `COUNT` 的查询非常相似，但你是在 `salary` 列上使用 `SUM` 函数。你的结果将如下所示：


  | OFFICE_ID | SUM(SALARY) |

  | --- | --- |

  | 1 | 122000 |

  | 2 | 122000 |

  | 3 | 62000 |

  | (null) | 31000 |


  这显示了每个 `office_id` 值，以及具有该 `office_id` 的所有员工的薪资值总和。你可以手动将它们相加，但使用此函数和 `GROUP BY`
  子句会自动完成计算。



  ### 使用 WHERE 子句的 GROUP BY


  就像其他任何 `SELECT` 查询一样，如果你在使用 `GROUP BY` 子句，你也可以使用 `WHERE` 子句来过滤你的结果。`WHERE` 子句会过滤掉所有不符合你条件的记录，然后
  `GROUP BY` 子句和聚合函数将在剩下的记录上执行。


  假设你想找出每个办公室的工资总额，但要排除员工 SIMPSON。你的查询可能如下所示：


  ```sql

  SELECT office_id,

  SUM(salary)

  FROM employee

  WHERE last_name <> ''SIMPSON''

  GROUP BY office_id;

  ```


  `WHERE` 子句位于 `GROUP BY` 子句之前。如果顺序反过来，你会得到一个错误。


  这个查询的结果是：


  | OFFICE_ID | SUM(SALARY) |

  | --- | --- |

  | 1 | 70000 |

  | 2 | 122000 |

  | 3 | 62000 |

  | (null) | 31000 |


  结果与之前的查询几乎相同，只是 `office_id` 为 1 的工资总和降低了。降低了 52,000，因为 SIMPSON 被排除在外，而他的 `office_id`
  是 1。在这个例子中，查询执行了以下步骤：


  1.  查看了所有员工记录

  2.  排除了 `last_name` 是 SIMPSON 的记录

  3.  从这些结果中显示了每个唯一的 `office_id` 值

  4.  针对这些结果中的每个 `office_id` 值计算了 `SUM`


  在 SQL 中，结合使用 `WHERE`、聚合函数和 `GROUP BY` 可以轻松获得你想要的聚合结果。


  ### 分组后限制结果


  查询中的 `WHERE` 子句允许你在执行聚合函数和分组之前限制结果。在前面的例子中，你通过办公室排除了员工 SIMPSON 的 `salary` 总和。


  让我们尝试另一个例子，来看看 SQL 的另一个特性。假设你想找出每个办公室的员工数量，但只要那些员工数量超过两人的办公室。


  你可以先列出 `office_id` 值和员工计数：


  ```sql

  SELECT office_id, COUNT(*)

  FROM employee

  GROUP BY office_id;

  ```


  结果会是这样：


  | OFFICE_ID | COUNT(*) |

  | --- | --- |

  | 1 | 4 |

  | 2 | 3 |

  | 3 | 2 |

  | (null) | 1 |


  这显示了每个办公室的员工数量。现在，下一步是只显示员工数量超过两人的办公室。要做到这一点，你可以排除 `office_id` 为 3 的记录，但更好的方法是根据你的条件来排除记录。根据你发现的
  `id` 值来排除数据，需要你事先知道这些 `id` 值。所以，让我们排除员工数为 2 或更少的记录：


  ```sql

  SELECT office_id, COUNT(*)

  FROM employee

  WHERE COUNT(*) > 2

  GROUP BY office_id;

  ```


  这应该只显示 `COUNT` 函数返回值大于 2 的记录。让我们运行这个查询，看看会发生什么：


  ```

  ORA-00934: group function is not allowed here

  00934. 00000 -  "group function is not allowed here"

  *Cause:

  *Action:

  Error at Line: 3 Column: 7

  ```


  你得到了一个错误。为什么会这样？这个错误的发生是因为 SQL 语句的处理方式及其背后的规则。SQL 中的一条规则是，你不能在 `WHERE` 子句中使用任何由
  `GROUP BY` 子句产生的值（例如聚合函数的结果）。这是因为 SQL 语句中的子句是按照与书写顺序不同的顺序处理的：


  1.  `FROM`

  2.  `WHERE`

  3.  `GROUP BY`

  4.  `SELECT`

  5.  `ORDER BY`


  这意味着当 `WHERE` 子句被处理时，它只知道你正在从中选择的列和表。它不知道每个组的 `COUNT` 函数的结果，因为那是 `GROUP BY` 子句的工作。


  如何得到你需要的结果呢？你可以使用一个叫做 `HAVING` 的子句。


  ### HAVING 子句


  在 SQL 中，有一个叫做 `HAVING` 的子句。`HAVING` 子句将在 `GROUP BY` 应用之后，对你的结果集中的行进行限制。`HAVING`
  子句看起来像这样：


  ```sql

  HAVING criteria

  ```


  它的工作方式类似于 `WHERE` 子句，因为你需要指定条件。然而，这里的条件应该是你 `SELECT` 查询中使用的聚合函数。


  在之前的例子中，你试图找出员工数量超过两人的办公室及其员工数量。为此，你需要只显示 `COUNT(*)` 大于 2 的记录。因为这是一个聚合函数，你需要为此使用
  `HAVING` 子句：


  ```sql

  SELECT office_id,

  COUNT(*)

  FROM employee

  GROUP BY office_id

  HAVING COUNT(*) > 2;

  ```


  `HAVING` 子句看起来与 `WHERE` 子句相同，只是关键字不同。此外，`HAVING` 子句位于 `GROUP BY` 子句之后，而不是 `FROM`
  子句之后。


  如果你运行这个查询，你会得到这个结果：


  | OFFICE_ID | COUNT(*) |

  | --- | --- |

  | 1 | 4 |

  | 2 | 3 |


  前两个 `office_id` 都显示了，因为它们分别有 4 名和 3 名员工。`office_id` 为 3 的记录没有显示，因为它只有两名员工。你可以通过查询
  `employee` 表并按 `office_id` 排序来查看底层数据，这样更容易看清楚：


  ```sql

  SELECT id,

  last_name,

  office_id

  FROM employee

  ORDER BY office_id ASC;

  ```


  | ID | LAST_NAME | OFFICE_ID |

  | --- | --- | --- |

  | 1 | JONES | 1 |

  | 4 | SIMPSON | 1 |

  | 6 | COOPER | 1 |

  | 9 | PATRICK | 1 |

  | 2 | SMITH | 2 |

  | 3 | KING | 2 |

  | 10 | Jones | 2 |

  | 7 | ADAMS | 3 |

  | 8 | SMITH | 3 |

  | 5 | ANDERSON | (null) |


  通过查看这个结果，你可以看到员工数量。


  ### GROUP BY、HAVING 和 SUM


  你可以将 `HAVING` 子句与任何聚合函数一起使用。前面的例子使用了 `COUNT` 函数，但它也可以与 `SUM`、`MAX`、`MIN` 或 `AVG`
  等其他函数一起使用。


  假设你需要找出每个办公室的员工数量和总 `salary`，但只要总 `salary` 大于 100,000 的办公室。这可以通过扩展之前例子的查询来完成：


  ```sql

  SELECT office_id,

  COUNT(*),

  SUM(salary)

  FROM employee

  GROUP BY office_id

  HAVING SUM(salary) > 100000;

  ```


  这个查询有几个不同之处。它有两个聚合函数：`COUNT` 和 `SUM`。这在 SQL 中是允许的。它还有一个 `HAVING` 子句，只显示 `salary`
  的 `SUM` 大于 100,000 的记录。这个查询的结果是：


  | OFFICE_ID | COUNT(*) | SUM(SALARY) |

  | --- | --- | --- |

  | 1 | 4 | 122000 |

  | 2 | 3 | 122000 |


  它显示了办公室 1 和 2，因为它们的总 `salary` 大于 100000。`office_id` 为 3 的记录被排除，因为总 `salary` 小于 100000。


  这个例子表明，你可以在查询中包含两个聚合函数，并且只对其中一个使用 `HAVING` 子句。




  ### 查找重复记录


  你在本章将学习的最后一个示例是如何查找重复记录。在你的数据表中，很容易存储与现有记录相同的数据。你可以使用数据库和应用程序代码中的功能来防止这种情况；然而，这些功能并不总是被使用。


  让我们再看一下 `employee` 表：


  ```

  SELECT id,

  last_name,

  salary,

  office_id

  FROM employee;

  ```


  结果是：


  | ID | LAST_NAME | SALARY | OFFICE_ID |

  | --- | --- | --- | --- |

  | 1 | JONES | 30000 | 1 |

  | 2 | SMITH | 35000 | 2 |

  | 3 | KING | 45000 | 2 |

  | 4 | SIMPSON | 52000 | 1 |

  | 5 | ANDERSON | 31000 | (null) |

  | 6 | COOPER | (null) | 1 |

  | 7 | ADAMS | (null) | 3 |

  | 8 | SMITH | 62000 | 3 |

  | 9 | PATRICK | 40000 | 1 |

  | 10 | Jones | 42000 | 2 |


  你可以看到有十名员工。一些 `last_name` 的值是相同的，即使 `salary` 不同。如果你想在这个表中查找重复记录，你可能想从重复出现的 `last_name`
  值开始。仅仅因为记录有相同的 `last_name` 并不意味着它们是重复的，但这是一个很好的起点。你也可能只想知道哪些 `last_name` 值被使用了不止一次。


  你想编写的查询将向你显示 `last_name` 以及每个 `last_name` 的员工数量，条件是该姓氏对应有多于一名员工。这个查询看起来像这样：


  ```

  SELECT UPPER(last_name),

  COUNT(*) AS empcount

  FROM employee

  GROUP BY UPPER(last_name)

  HAVING COUNT(*) > 1

  ORDER BY empcount DESC;

  ```


  这个查询中包含几个部分。我们选择了 `last_name` 的大写版本和每个 `last_name` 的 `COUNT` 数，并给 `COUNT` 列起了一个别名
  "empcount"。我们按 `last_name` 列进行分组，并使用 `HAVING` 子句来排除员工数小于或等于 1 的 `last_name` 记录。最后，我们按
  `empcount` 列排序。


  为什么我们在 `HAVING` 子句中使用 `COUNT(*)` 函数，却在 `ORDER BY` 中使用 `empcount` 别名？这是由于查询在 Oracle
  中的处理方式决定的，这意味着 `ORDER BY` 子句可以引用列别名，但 `GROUP BY` 和 `HAVING` 不可以。使用 `ORDER BY COUNT(*)
  DESC` 也可以达到相同的结果，但在本例中，我使用了列别名。


  让我们看看结果：


  | LAST_NAME | EMPCOUNT |

  | --- | --- |

  | JONES | 2 |

  | SMITH | 2 |


  结果显示 JONES 和 SMITH 各有 2 名员工。JONES 的 `last_name` 显示为 2，是因为我们将 `last_name` 转换为了大写，因此它包含了
  "Jones" 这条记录。所有其他 `last_name` 值未显示在此处，因为它们只对应一名员工。


  因此，通过组合使用聚合函数、分组和排序，你可以找出哪些记录可能是重复的，并可以进一步调查你的数据。


  ### 总结


  对数据进行分组意味着对特定列中每个不同的值执行聚合函数。如果你在查询中同时使用了聚合函数和非聚合函数列，你需要按所有非聚合列进行分组，以避免错误。你可以使用 `WHERE`
  子句在分组前过滤记录。你也可以使用 `HAVING` 子句在分组操作应用后对记录进行过滤，这是基于所使用的聚合函数进行的。


  结合使用 `GROUP BY` 和 `HAVING` 可以让你轻松获得所需的结果。


  ## 26. 什么是索引？


  索引是 SQL 中一个值得了解的功能。它们对于提升查询性能非常有用，并且随着你在 SQL 方面经验的增长，你需要了解如何创建它们以及为什么需要它们。


  ### 什么是索引？


  一个 `索引` 是数据库中的一个对象，它可以提升性能，或减少你的 SQL 查询的运行时间。我喜欢把它想象成教科书后面的索引。


  你是否曾经为了查找某个特定主题而翻阅教科书？例如，你正在看一本关于人类文明史的教科书，想了解更多关于尤利乌斯·凯撒的信息。你知道这是罗马时代的一部分，所以你可能会猜它在书中间的某个位置。你会翻到书中间的某处，浏览页面寻找关于尤利乌斯·凯撒的内容。或者，你可以从第一页开始，逐页查找关于尤利乌斯·凯撒的信息，直到找到当前年份。


  这两种方法都会花费不少时间，而且效率不高。当你从头到尾阅读每一页直到找到所需信息时，这正是 Oracle 在你的表中查找数据的方式。当你查找 `last_name`
  是 SIMPSON 的 `employee` 记录时，Oracle 会查看每一行来找到你需要的记录。如果表很大，这也可能需要一些时间。


  有一个更好的方法。教科书通常在书的末尾有一个索引。这个索引会列出书中所有的关键主题以及它们被引用的页码。要找到关于尤利乌斯·凯撒的信息，你只需在索引中查找，它就会显示书中提到他的所有页码：


  *尤利乌斯·凯撒... 第 43, 210, 548-570 页*


  然后你可以翻到那些页面找到你需要的信息。


  Oracle 中的 `索引` 工作原理相同。你可以创建一个 `索引`，它包含如何在表中找到记录的信息。当你运行一个使用该信息查找数据的 SQL 语句时，Oracle
  将使用 `索引` 来找到你需要的记录。这通常比在没有 `索引` 的情况下遍历整个表要快得多。


  那么，为什么你需要了解索引呢？了解索引是很有好处的，因为它们能极大地影响查询的性能。在“现实世界”的数据库中，表上存在索引也是非常普遍的。了解它们是什么、有什么作用以及如何创建它们，是你职业生涯中一项有用的技能。


  ### 如何创建索引


  一个 `索引` 是数据库中的一个对象，就像 `表` 一样。要创建 `索引`，我们使用 `CREATE` 语句。这个语句的语法是：


  ```

  CREATE INDEX index_name

  ON table_name (columns);

  ```


  你以 `CREATE INDEX` 开始。然后你需要为 `索引` 提供一个名称。`索引` 名在数据库中必须是唯一的。接下来是关键字 `ON`，然后是 `表名`，后面跟着你想要在其上创建索引的列（或多列）。


  一个 `索引` 是创建在单个 `表` 和一个或多个列上的。`索引` 将存储你指定的列的信息，使数据库更容易基于这些列查找记录。让我们看一些例子。




  ### 创建索引示例


  假设你想在 `employee` 表的 `last_name` 列上创建一个索引，以便任何查询该列的操作都能运行得更快。为此，你的语句会是这样的：


  ```

  CREATE INDEX idx_emp_lname

  ON employee (last_name);

  ```


  这是一个简短的语句，但有几点需要注意。首先，索引名称是 `idx_emp_lname`。你可以起任何喜欢的名称，只要符合 Oracle 的命名规则（例如，必须以字母开头，长度不能超过
  30 个字符）。为什么我要把这个索引命名为 `idx_emp_lname` 呢？


  如果你做过编程，可能了解某些编码标准或规范。这些并非编程语言强制执行的规则，而是团队或社区设定的标准。这些标准可能涉及空格、换行、字符和对象命名。你可能已经注意到我在本书的
  SQL 代码中已经使用了一些：


  *   SQL 关键字全部大写，例如 `SELECT` 和 `FROM`


  *   列名和表名使用小写，例如 `employee` 和 `salary`


  *   `SELECT` 语句中的每个关键字都另起一行。


  这个索引被命名为 `idx_emp_lname` 是因为这是我喜欢提倡的一个标准。它分为三个部分：


  *   `idx` 是索引（index）的缩写，表示此对象是一个索引。


  *   `emp` 是 `employee` 的缩写，表示该索引所应用的表。


  *   `lname` 是 `last_name` 的缩写，表示该索引所应用的列。


  为什么这个名字有帮助？因为它能让你通过名称快速判断它是什么。有两个地方你经常会看到索引或其他数据库对象的名称。第一个是错误消息，因为错误消息通常包含对象名称，能够看到一个错误与
  `idx_emp_lname` 相关，就能让你很好地了解其原因。第二个是使用一种称为执行计划的数据库功能，它包含了 Oracle 执行查询的计划步骤。当你看到名称
  `idx_emp_lname` 时，你就知道它是 `employee` 表上 `last_name` 列的索引，而无需去查证。


  让我们再看一下那个语句：


  ```

  CREATE INDEX idx_emp_lname

  ON employee (last_name);

  ```


  索引名为 `idx_emp_lname`。然后是 `ON` 关键字，接着指定 `employee` 表。在括号内，是 `last_name` 列。这意味着将在数据库中创建一个索引，该索引包含所有不同的
  `last_name` 值及其在 `employee` 表中存储位置的信息。这意味着当你在这个表上运行某些查询时，它们会运行得更快，因为数据库知道这些 `last_name`
  值存储在哪里。


  使用与运行 `SELECT` 查询相同的过程在数据库上执行该语句。如果你使用的是 SQL Developer 或 Live SQL（基于 Web 的 SQL 工具），这都适用。输出应显示：


  ```

  Index IDX_EMP_LNAME created.

  ```


  与表不同，你不能在索引上运行查询。你不能运行像 `SELECT * FROM idx_emp_lname` 这样的查询。这是因为索引将其所有信息在数据库后台存储。你需要做的只是创建它。


  现在，让我们看一些使用索引的例子。还记得之前在书后索引中查找值的例子吗？Oracle 中的索引工作方式相同。但是，你需要编写一个实际在表中查找值的查询，才能使用索引。最简单的方法之一是使用
  `WHERE` 子句。假设你有如下查询：


  ```

  SELECT id,

  last_name,

  salary

  FROM employee;

  ```


  这个查询会显示所有 `employees` 的 `last_name`，但它不会使用索引。如果我们用之前的教科书例子来比喻，这就等同于“给我看这本书的每一页”。如果你想显示所有内容，使用书后的索引就没有帮助。


  | ID | LAST_NAME | SALARY |

  | --- | --- | --- |

  | 1 | JONES | 30000 |

  | 2 | SMITH | 35000 |

  | 3 | KING | 45000 |

  | 4 | SIMPSON | 52000 |

  | 5 | ANDERSON | 31000 |

  | 6 | COOPER | (null) |

  | 7 | ADAMS | (null) |

  | 8 | SMITH | 62000 |

  | 9 | PATRICK | 40000 |

  | 10 | Jones | 42000 |


  假设你想查找一个名为 `COOPER` 的特定 `employee`。你的查询会是这样的：


  ```

  SELECT id,

  last_name,

  salary

  FROM employee

  WHERE last_name = ''COOPER'';

  ```


  在创建索引之前，Oracle 必须：


  1.  查看表中的每一行

  2.  检查该行是否匹配 `last_name` 为 `COOPER`

  3.  如果匹配，则将该行显示给你


  对于十行数据来说，这看起来工作量不大，但一旦数据量增加到成千上万甚至数十万行，就会产生巨大的差异。


  现在，你在这个表和这个列上有了索引，Oracle 将会：


  1.  在索引中查找 `COOPER` 的条目，该条目显示了具有该值的行

  2.  将这些行显示给你


  在更大的表中，这将快得多。


  如果你现在运行查询，你会得到这个结果：


  | ID | LAST_NAME | SALARY |

  | --- | --- | --- |

  | 6 | COOPER | (null) |


  索引不会改变显示的内容。它只是改变了显示的速度。


  ### 为什么性能很重要？


  SQL 查询的性能很重要，因为快速的查询比慢速查询能提供更好的用户体验。有几种情况可能适用这一点。


  #### Web 应用程序


  一个例子是你正在开发一个供人们使用的应用程序。该应用程序会访问数据库来添加新数据、更新现有数据和查看现有数据。通常，当用户加载一个页面时，会在数据库上运行一个查询来向用户显示数据。在查询运行期间，用户必须等待，或者看着空白屏幕，或者看着加载屏幕，直到数据显示出来。如果数据能立即或在几秒钟内显示，对用户来说可能是一次良好的体验。这是他们期望的事情。然而，如果由于一个需要运行这么长时间的
  `SELECT` 查询，导致页面 20 到 30 秒或更长时间无法显示，用户会不高兴。


  在大多数情况下，他们期望在显示数据的应用程序中能有更快的加载时间。一个在几秒钟内显示数据的查询可能与一个需要运行 30 秒的查询只有细微差别，但对用户来说，其性能和体验却有天壤之别。




  #### 夜间批处理作业


  查询性能重要的另一个例子是夜间批处理作业。在许多组织中，用户操作的应用程序会存储数据。这些用户还需要对这些数据运行报告，以了解他们每月的销售额或注册客户数量。报告数据的系统通常与捕获数据的系统是分开的，因为生成报告可能会影响在线应用程序的性能。


  为了让报告系统和在线应用程序高效运行，应用程序中的数据会被转移到一个报告系统中。这个报告系统针对查看数据进行了优化，它使用一个称为抽取、转换、加载 (`ETL`)
  的流程。这个流程包含许多不同的 SQL 查询，例如填充表格以显示每日和每月的总销售额。


  这个过程以及这些查询通常在夜间执行，这样应用程序的用户不会受到影响，并且报告系统也能为第二天做好准备。这些步骤大约有 12 小时的运行窗口。听起来时间很长，对吧？但是，这些查询可能非常复杂，可能需要相当长的时间才能运行完成。目标是让这些查询在午夜的某个时候完成，这样数据就能为第二天做好准备。然而，如果查询性能不佳，它们可能到早上
  9 点还在运行，这意味着报告系统尚未准备好使用，而且运行它的服务器仍然处于负载之下。


  这类查询的某个特定步骤花费 20 分钟或更长时间是很常见的。如果一个查询花了 3 个小时而不是 20 分钟，就可能导致流程的其余部分被延迟。在这种情况下，SQL
  查询的性能非常重要。


  #### 报告系统


  查询性能重要的最后一个例子是在报告系统中。如前所述，生成报告的系统通常与捕获数据的系统不同。公司里所有人都会使用报告系统，根据不同系统中捕获的数据来查看不同的信息。


  每次生成报告时，都会运行一个查询从数据库中 `SELECT` 数据。这些报告的生成可能需要一点时间。例如，如果报告在 30 秒内生成，用户可能会感到满意。然而，如果报告开始需要几分钟才能生成，用户就会感到沮丧，对该系统的体验也会很差。


  以上就是一些例子，说明查询的性能和运行时间如何影响用户体验。


  ### 使用连接（Join）的索引


  索引有用的一种常见情况是针对用作连接（join）一部分的列。看下面这个查询示例：


  ```sql

  SELECT

  e.id,

  e.last_name,

  e.salary,

  o.address

  FROM employee e

  INNER JOIN office o ON e.office_id = o.id;

  ```


  此查询将显示以下结果。


  | ID | LAST_NAME | SALARY | ADDRESS |

  | --- | --- | --- | --- |

  | 1 | JONES | 30000 | 123 Smith Street |

  | 2 | SMITH | 35000 | 45 Main Street |

  | 3 | KING | 45000 | 45 Main Street |

  | 4 | SIMPSON | 52000 | 123 Smith Street |

  | 6 | COOPER | (null) | 123 Smith Street |

  | 7 | ADAMS | (null) | 10 Collins Road |

  | 8 | SMITH | 62000 | 10 Collins Road |

  | 9 | PATRICK | 40000 | 123 Smith Street |

  | 10 | Jones | 42000 | 45 Main Street |


  此查询从两个表（`employee` 和 `office` 表）获取数据，并基于 `office` 表的 `id` 值将它们连接起来。当 Oracle 数据库处理此查询时，它大致会执行以下操作：


  1.  查找 `employee` 表中的所有数据

  2.  查看每个 `employee` 的 `office_id` 值

  3.  使用该 `office_id` 值，查找 `office` 表中所有匹配 `id` 值的行

  4.  从匹配的行中获取 `address`，并将其用于该 `employee`

  5.  对每个 `employee` 记录重复步骤 2-4


  在上面的列表中，步骤 3 是两个表之间关联被使用的地方。如果没有索引，就会为每个 `employee` 扫描 `office` 表的每一行以查找对应的 `office_id`。例如，`id`
  为 1 (`JONES`) 的 `employee` 的 `office_id` 是 1。然后数据库会查找 `office` 表中 `id` 为 1 的行，并使用该行的
  `address`。接着对 `id` 为 2 (`SMITH`) 的 `employee` 重复此过程，依此类推。


  当 `office` 表中只有三行时，这可能没问题。但当有成百上千行时，它会严重影响性能。


  #### 创建索引


  我们刚才看到的查询示例使用了 `office` 表的主键和 `employee` 表的外键之间的连接（join）：


  ```sql

  SELECT

  e.id,

  e.last_name,

  e.salary,

  o.address

  FROM employee e

  INNER JOIN office o ON e.office_id = o.id;

  ```


  `office` 表上的主键是 `id`，`employee` 表上的外键是 `office_id`。在 Oracle 数据库中，当你为表定义主键时，会自动在该列上创建一个索引。因此
  `office.id` 列上会存在一个索引。但是，在创建外键时，不会自动创建索引。


  在外键列上创建索引是提高查询性能的好方法。外键列（如 `employee.office_id`）通常用于在另一个表中查找值。


  #### 注意


  在 Oracle 中，主键会自动创建索引。外键则 `不会` 自动创建索引。


  要创建 `employee.office_id` 列上的索引，可以运行以下语句：


  ```sql

  CREATE INDEX idx_emp_officeid

  ON employee (office_id);

  ```


  再次说明，我使用了命名约定来命名这个索引。它被称为 `idx_emp_officeid`，意思是这是 `employee` 表上 `office_id` 列的一个索引。运行此语句后，索引就在数据库中创建了。


  ```text

  Index IDX_EMP_OFFICEID created.

  ```


  索引创建后，Oracle 数据库运行查询的方式将使得可以使用索引，从而加快查询运行速度。


  ### 索引的缺点


  创建索引是提高查询性能的好方法。然而，它们并不是实现良好 SQL 性能的“万能解药”。它们并不是一个单一的、神奇的解决方案。索引也有一些缺点。


  首先，每个索引都需要数据库中的一些空间。根据相关表中的记录数量，这可能是大量的空间。你创建的索引越多，占用的空间就越多。你的 IT 部门可能为数据库设置了最大大小限制，所以这一点需要注意。


  另一个缺点是保持索引更新。表上的索引提高了 `SELECT` 查询的性能，但会降低 `INSERT`、`UPDATE` 和 `DELETE` 查询的性能。这是因为每次运行
  `INSERT`、`UPDATE` 或 `DELETE` 查询时，索引需要与表一起更新。这会减慢查询速度。如果一个表上有多个索引（这是可能的），那么这些 `INSERT`/`UPDATE`/`DELETE`
  查询可能需要更长的时间。对于简单的查询，这可能看起来没什么，但对于更复杂的查询，运行时间很容易就会延长。


  因此，在创建过多索引和创建不足索引之间存在一个权衡。你如何知道应该创建哪些索引呢？




  ### 创建索引的最佳实践


  关于何时以及如何创建索引，有几点最佳实践我推荐参考：


  *   考虑为查询的 `WHERE` 子句中使用的列创建索引（例如，`WHERE` last_name = ‘SMITH’）。这将有助于对该列的查找。

  *   考虑为 `JOIN` 中使用的列创建索引，这同样会帮助提升该列的查找性能。

  *   不要为表中的每个列都创建索引，因为这可能会减慢对该表的 `INSERT`、`UPDATE` 和 `DELETE` 查询速度。

  *   考虑为那些具有大量不同唯一值的列创建索引。


  本书未涵盖几种不同类型的索引。如果你正在对数据库进行性能调优并考虑索引，了解其他类型的索引会很有用，这样你可以确定什么对你的查询最合适。


  了解何时创建索引的一个重要部分是了解你的数据库运行的查询类型，以及表中存储的数据。这通常需要通过与团队成员甚至数据库管理员沟通获得，他们负责数据库服务器的管理，并且通常对数据库性能有深入的了解。


  ### 总结


  数据库中的索引是一种用于提升查询性能的对象。它们在表上创建，并包含一个或多个列。良好的查询性能至关重要，因为它能改善用户体验，无论是在应用程序、夜间批处理作业还是报表系统中。


  在用于查询 `WHERE` 子句的列上，或在 `JOIN` 子句中的字段上创建索引是有益的。然而，索引会减慢 `INSERT`、`UPDATE` 和 `DELETE`
  查询的速度，因此不建议为表中的每一列都创建索引。


