  \ `ORDER BY last_name ASC;` 来为此查询添加一个 `ORDER BY` 子句。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig12_HTML.jpg](img/471705_1_En_27_Fig12_HTML.jpg)\n\
  \n图 27-12\n\n修改 SQL 查询\n\n按回车键运行查询，结果就会显示出来。\n\n### 在 SQL*Plus 中格式化输出\n\n你可能已经注意到在\
  \ SQL*Plus 中运行这些查询时，输出看起来不太整洁。这是因为与 SQL Developer 不同，这里的每列宽度是根据该列可能包含的字符数来设定的，而非实际字符数。这意味着你会在列中看到很多空格，并且行会跨多行显示。\n\
  \n例如，在 `employee` 表上运行我们的 `SELECT` 查询看起来像这样：\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig13_HTML.jpg](img/471705_1_En_27_Fig13_HTML.jpg)\n\
  \n图 27-13\n\nSELECT 查询的输出\n\n```sql\nSELECT id, last_name, salary\nFROM employee;\n\
  ```\n\n然而，我们可以清理这个输出，使其更具可读性。我们可以在 SQL*Plus 中运行命令来格式化列。这个命令的语法如下：\n\n```sql\ncolumn\
  \ column_name format value;\n```\n\n这个命令的一个例子是：\n\n```sql\ncolumn last_name format\
  \ a10;\n```\n\n这指定了 `last_name` 列应格式化为宽度为 10 个字符的字母数字字段。我们在 SQL 查询之前运行此命令。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig14_HTML.jpg](img/471705_1_En_27_Fig14_HTML.jpg)\n\
  \n图 27-14\n\n格式化列\n\n然后，你可以再次运行 SQL 查询。按几次向上箭头键重新加载该查询，然后按回车键。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig15_HTML.jpg](img/471705_1_En_27_Fig15_HTML.jpg)\n\
  \n图 27-15\n\nSELECT 语句的格式化输出\n\n现在输出整洁多了。如果仍然太窄，你可以用一个更大的数字重新运行该命令（例如，`column last_name\
  \ format a40`），然后重新运行 `SELECT` 查询。\n\n### 复制并粘贴到 SQL*Plus 中\n\nSQL*Plus 允许你输入并运行查询。然而，你可能会发现在文本编辑器中编写查询然后复制粘贴到命令行中更容易。这在\
  \ SQL*Plus 中是可以做到的。操作如下：\n\n1.  在文本编辑器（如 Notepad++ 或 Sublime Text）中输入你的查询。\n2. \
  \ 从文本编辑器中复制你的查询。\n3.  打开 SQL*Plus，在提示符处右键单击，然后选择“粘贴”。查询现在将显示在 SQL*Plus 中。\n4.  按回车键运行查询。\n\
  \n查询结果随后将被显示出来。\n\n### 斜杠字符\n\n有时查看 SQL 代码时，你可能会在语句末尾看到斜杠字符 “/”：\n\n```sql\nSELECT\
  \ id, last_name, salary, office_id\nFROM employee\n/\n```\n\n你会在网站上，或者在你当前或未来的雇主使用的脚本中看到这类例子。这意味着什么？如果已经有了分号，为什么还需要它？\n\
  \n在 SQL*Plus 中，分号字符将确保运行最近的语句。斜杠字符将运行缓冲区中的任何内容，这可以包含多个语句。如果你将前面的查询输入到 SQL*Plus 中（末尾是斜杠而不是分号）并运行该查询，你会得到相同的结果。\n\
  \n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig16_HTML.jpg](img/471705_1_En_27_Fig16_HTML.jpg)\n\
  \n图 27-16\n\n查询结果\n\n你经常会在包含多个语句的脚本中看到斜杠字符。这意味着所有语句同时运行，而不是在语句之间暂停。\n\n### 退出 SQL*Plus\n\
  \n如果你想随时退出 SQL*Plus，可以在 `sqlplus` 提示符下输入命令 `exit`。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig17_HTML.jpg](img/471705_1_En_27_Fig17_HTML.jpg)\n\
  \n图 27-17\n\n使用 exit 命令离开 SQL*Plus\n\n按回车键，`sqlplus` 将退出。你会返回到命令提示符。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig18_HTML.jpg](img/471705_1_En_27_Fig18_HTML.jpg)\n\
  \n图 27-18\n\n使用 exit 命令离开命令提示符\n\n然后你可以再次输入 `exit` 并按回车键，命令提示符将会退出。\n\n### SQLcl\
  \ 怎么样？\n\nSQL*Plus 自 20 世纪 80 年代中期就已存在，这在软件世界是很长的时间了。在此期间的大部分时间里，其功能基本保持标准。最近，Oracle\
  \ 发布了一个新的免费命令行工具，称为“SQLcl”，即 SQL Command Line 的缩写。这是一个命令行工具，操作上与 SQL*Plus 类似，但功能要多得多。SQLcl\
  \ 允许你：\n\n*   与数据库交互（运行 SQL 查询）\n*   运行批处理脚本\n*   编辑 SQL 代码\n*   语句补全\n*   以及更多功能\n\
  \n然而，与 SQL*Plus 不同，SQLcl 不会随 Oracle 数据库自动安装。不过，你可以轻松地从 Oracle 网站下载它。\n\n\n### 如何下载与运行\
  \ SQLcl\n\n您可以从 Oracle 网站下载 SQLcl。具体步骤如下：\n\n1.  访问 Oracle 网站并导航至 **开发者工具 ➤ SQLcl**。您可以从\
  \ [`www.oracle.com`](http://www.oracle.com) 进行操作，或直接访问页面：[`www.oracle.com/technetwork/developer-tools/sqlcl/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/sqlcl/downloads/index.html)。\n\
  \n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig19_HTML.jpg](img/471705_1_En_27_Fig19_HTML.jpg)\n\
  \n    图 27-19 SQLcl 下载页面\n\n2.  接受许可协议。\n3.  点击下载按钮。这是一个适用于所有操作系统的单一下载文件。\n4.  下载\
  \ ZIP 文件后，将其解压缩到计算机上的某个位置。\n5.  打开命令窗口（**开始 ➤ `cmd`**）。\n6.  浏览到您解压缩文件的位置。例如，可以使用命令\
  \ `cd c:\\oraclexe\\sqlcl\\` 完成此操作。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig20_HTML.jpg](img/471705_1_En_27_Fig20_HTML.jpg)\n\
  \n    图 27-20 切换到新目录\n\n7.  浏览到 bin 文件夹：`cd bin`\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig21_HTML.jpg](img/471705_1_En_27_Fig21_HTML.jpg)\n\
  \n    图 27-21 切换到 bin 目录\n\n8.  运行 `sql` 命令。SQLcl 随即启动。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig22_HTML.jpg](img/471705_1_En_27_Fig22_HTML.jpg)\n\
  \n    图 27-22 运行 SQLcl\n\n9.  SQLcl 启动后，您需要连接到数据库。您可以在输入 `sqlcl` 后出现的提示符处执行此操作。输入您的用户名和密码。\n\
  10. 按 Enter 键，即可建立数据库连接。您的屏幕应如下所示：\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig23_HTML.jpg](img/471705_1_En_27_Fig23_HTML.jpg)\n\
  \n    图 27-23 登录到 SQLcl\n\n然后，您可以像使用 SQL*Plus 一样，使用 SQLcl 来运行 SQL 语句并查看输出。\n\n###\
  \ 总结\n\nOracle 提供了命令行工具，可用于在无需 SQL Developer 等图形工具的情况下访问数据库。最常见的工具是 SQL*Plus，它随每个\
  \ Oracle 数据库一同提供。另一个命令行工具是 SQLcl，这是一个较新的工具，可以从 Oracle 网站下载。\n\n使用命令行工具而非图形工具有几个原因，例如运行速度更快、您可能并非总能访问\
  \ SQL Developer，以及 SQL*Plus 在所有 Oracle 数据库上都可用。\n\n"
- "# 第七部分 附录\n\n## 如何查找和使用 Oracle SQL 参考手册\n\n关于 Oracle SQL，有很多内容需要学习和记忆。我们在本书中学习了许多不同的关键字，例如：\n\
  \n*   `SELECT`\n*   `INSERT`\n*   `UPDATE`\n*   `DELETE`\n*   `CREATE TABLE`\n\n\
  我们还学习了一些不同的 SQL 函数，例如 `SUM` 和 `UPPER`。这些命令和函数中的每一个都有特定的语法，即其运行方式和接受的参数。这很容易忘记。\n\
  \n幸运的是，Oracle 为其数据库提供了在线参考或文档。其中包含了关于其所有命令和函数的详细信息，如果您忘记了其工作原理或用法，这是一个查找具体内容的绝佳方式。\n\
  \n### 查找 Oracle SQL 参考手册\n\n要查找 Oracle 参考手册：\n\n1.  访问 [`https://docs.oracle.com`](https://docs.oracle)。\n\
  2.  点击左侧的 **数据库**，然后点击 **Oracle Database**。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig1_HTML.jpg](img/471705_1_En_28_Fig1_HTML.jpg)\n\
  \n    图 A1-1 Oracle 数据库文档链接\n\n3.  点击 **主题** 下的 **开发**。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig2_HTML.jpg](img/471705_1_En_28_Fig2_HTML.jpg)\n\
  \n    图 A1-2 **开发** 链接\n\n4.  向下滚动到 **SQL 和 PL/SQL** 部分，然后点击 **SQL 语言参考** 下的 HTML\
  \ 链接。您也可以点击 PDF 链接来下载 PDF 文件以供离线查看。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig3_HTML.jpg](img/471705_1_En_28_Fig3_HTML.jpg)\n\
  \n    图 A1-3 SQL 语言参考链接\n\n### Oracle SQL 参考手册概览\n\nOracle SQL 参考手册如下所示。\n\n![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig4_HTML.png](img/471705_1_En_28_Fig4_HTML.png)\n\
