  \n1.  点击侧边栏左侧的搜索图标（放大镜图标）。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig9_HTML.jpg](img/471705_1_En_28_Fig9_HTML.jpg)\n\
