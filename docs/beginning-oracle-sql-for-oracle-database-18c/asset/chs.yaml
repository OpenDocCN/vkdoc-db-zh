  ## 前言


  欢迎阅读《Oracle Database 18c SQL 入门》！感谢您选择本书。可以说您对学习 Oracle 数据库感兴趣，因为这正是本书的主题。为什么是 Oracle
  数据库？为什么是这本书？


  Oracle Database 是世界上最受欢迎的数据库管理系统之一。根据多个因素对数据库流行度进行排名的网站 `db-engines.com` 在 2018
  年底的数据显示，Oracle 位居第一。它被许多大型组织使用，其主要竞争对手是微软的 SQL Server。学习 Oracle `SQL` 将使您在寻找任何使用
  Oracle 数据库的公司职位时处于有利位置。


  为什么是这本书？本书将帮助您开始在 Oracle 数据库的最新版本 18c 上学习 `SQL`。18c 版本由 Oracle 在 2017 年底宣布，并于 2018
  年中后期发布给开发者社区。学习使用 Oracle 的最新版本对您的职业生涯将非常有帮助，因为当组织将其 Oracle 版本升级到 18c 时，您将知道如何使用它。


  本书也面向初学者。您将从学习什么是数据库、如何安装所需工具以及 `SQL`（结构化查询语言）的所有命令开始，从而能够使用 Oracle 数据库。完全不需要数据库经验。如果您曾使用过其他数据库，如
  `SQL Server` 或 `MySQL`，您可能会更容易理解这些概念，因为它们有一些共通之处。


  ## 您将学到什么


  本书分为几个不同的部分和许多章节。以下是您将学习内容的概要。


  '
- '# 第一部分：设置环境


  **第 1 章：什么是数据库？** 本章解释了什么是数据库。它解释了一些常见术语，如表、行，以及 `SQL` 是什么。还提到了不同的供应商，例如 Oracle。


  **第 2 章：设置环境。** 在本章中，您将学习如何设置自己的 Oracle 数据库。您将学习如何从 Oracle 网站下载所需的软件，其中包括 Oracle
  免费版本的数据库 Oracle Express，以及一个称为 Oracle `SQL Developer` 的开发工具。提供了分步说明和截图。


  '
- '# 第二部分：查看数据


  **第 3 章：检索数据。** 本章介绍 `SELECT` 语句，您可以用它从数据库中检索数据并进行查看。


  **第 4 章：选择特定列。** 本章扩展了前一章的内容，向您展示如何使用 `SELECT` 语句查看单个列。


  **第 5 章：限制结果。** 您将学习如何使用 `WHERE` 子句仅查看表中的部分记录，因为有时您并不想看到每条记录。


  **第 6 章：比较数据。** 有时您可能希望基于部分匹配进行过滤，您将在本章中学习如何操作。


  **第 7 章：应用多个过滤器。** `SQL` 允许您根据多个条件过滤记录。在本章中，您将学习如何做到这一点。


  **第 8 章：处理空值。** 数据库有一个称为 `NULL` 的概念，表示未知值。您将了解更多关于其含义以及如何在查询中处理它的信息。


  **第 9 章：移除重复结果。** 编写查询时，您偶尔会得到重复的结果。本章将解释如何移除重复项，仅查看唯一的结果。


  **第 10 章：对列表和值范围应用过滤器。** 本章将解释如何通过使用值列表，更高效地使用多个值来过滤您的结果。


  **第 11 章：对数据排序。** 如果您曾经需要以特定顺序显示数据，读完本章后您就会知道如何操作。


  **第 12 章：应用表别名和列别名。** 在本章中，您将了解什么是表别名和列别名，以及它们的优点。


  '
- '# 第三部分：添加、更新、删除数据


  **第 13 章：理解数据类型。** Oracle 支持许多不同的数据类型，每种类型都有其特定用途。在本章中，您将了解几种主要的数据类型。


  **第 14 章：创建表。** 数据存储在数据库的表中，本章将向您展示如何创建表。


  **第 15 章：向表中添加数据。** 要查看表中的数据，首先需要将其添加到表中。本章解释了如何在 `SQL` 中完成此操作。


  **第 16 章：更新和删除数据。** 偶尔您需要更改数据库中已存在的数据。您可以在 Oracle `SQL` 中执行此操作，本章将向您展示如何操作。


  **第 17 章：更新或删除表。** 本章解释了如何更改表的结构，或者在不再需要时将其删除。




  '
- '# 第四部分：连接表


  ## 第 18 章：内连接

  本章中，你将学习什么是连接，以及如何使用“内连接”显示来自两个表的数据。


  ## 第 19 章：外连接

  本章解释“外连接”的概念，以及如何在 SQL 中使用它。


  ## 第 20 章：其他连接类型

  除了内连接和外连接，还有几种其他类型的连接。本章将对此进行解释。


  ## 第 21 章：连接多个表

  在查询中，你经常需要连接两个以上的表。本章解释如何实现这一点。


  '
- '# 第五部分：函数


  ## 第 22 章：在 SQL 中使用函数

  SQL 包含对数据执行计算和转换的函数。本章你将了解它们是什么以及如何使用。


  ## 第 23 章：编写条件逻辑

  本章中，你将学习如何实现条件逻辑，即条件为真时显示一个值，为假时显示另一个值。


  ## 第 24 章：理解聚合函数

  SQL 中的一些函数被称为聚合函数，它们将多行数据组合在一起。本章解释它们是什么以及如何使用。


  ## 第 25 章：对结果进行分组

  使用聚合函数时，你可能需要对结果进行分组。本章解释其含义以及如何操作。


  ## 第 26 章：什么是索引？

  本章中，你将学习索引是什么、如何创建索引以及一些相关技巧。


  '
- '# 第六部分：命令行


  ## 第 27 章：使用命令行

  本章将解释什么是 SQL*Plus 以及如何使用它连接到数据库。同时也会说明 SQLcl 是什么，以及如何下载和使用它。


