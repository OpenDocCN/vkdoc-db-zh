  \n    图 9-1\n\n    Employee 表中的数据\n\n4.  单击“添加行”按钮。\n5.  在表中输入一个新行，`ID` 为 8，`last_name`\
  \ 为 SMITH，`salary` 为 62000。\n6.  再次单击“添加行”按钮，在表中输入一个新行，`ID` 为 9，`last_name` 为 PATRICK，`salary`\
  \ 为 40000。你的屏幕应如图 9-2 所示。\n\n    ![../images/471705_1_En_9_Chapter/471705_1_En_9_Fig2_HTML.jpg](img/471705_1_En_9_Fig2_HTML.jpg)\n\
  \n    图 9-2\n\n    Employee 表中的新数据\n\n7.  单击“提交”。\n\n你现在已经将新数据添加到了 `employee` 表中。这些新记录将用于演示\
  \ Oracle 如何处理重复数据。\n\n### 选择数据\n\n现在数据已经在表中了，让我们看看它的样子。打开一个新的或现有的 SQL 窗口并运行以下查询，该查询显示表中的所有列和行：\n\
  \n```\nSELECT id, last_name, salary\nFROM employee;\n```\n\n结果应该如下所示：\n\n```\nID\
  \   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING\
  \        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER    \
  \  NULL\n7    NULL        NULL\n8    SMITH       62000\n9    PATRICK     40000\n\
  ```\n\n观察这些数据，你可能会注意到 `last_name` 为 `'SMITH'` 出现了两次。这可能是可以的，因为可能有两名名为 `'SMITH'`\
  \ 的员工。假设你被要求找出数据库中所有员工的不同姓名。你可以运行这样的查询：\n\n```\nSELECT last_name\nFROM employee;\n\
  ```\n\n结果将是：\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\nANDERSON\nCOOPER\n\
  (null)\nSMITH\nPATRICK\n```\n\n一旦你把这个结果给你的经理或团队看，他们可能会问：“为什么 SMITH 出现了两次？我只需要看到每个姓名一次。”你可能想知道如何做到这一点。你是删除记录吗？还是忽略第\
  \ 8 条记录，也就是第二个 `'SMITH'` 值？你不能删除数据，因为它可能是有效的。你可以尝试忽略第 8 条记录：\n\n```\nSELECT last_name\n\
  FROM employee\nWHERE id <> 8;\n```\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\n\
  ANDERSON\nCOOPER\n(null)\nSMITH\nPATRICK\n```\n\n在你刚刚运行的查询中，你知道哪个 `ID` 是重复的以及如何删除它。如果有许多记录存在这个问题，或者有数百条、数千条记录呢？你不可能知道所有这些记录的\
  \ `ID` 值。有一个更好的方法可以做到这一点。\n\n### 什么是 DISTINCT？\n\nSQL 中有一个名为 `DISTINCT` 的关键字，它允许你从结果中删除重复的行。`DISTINCT`\
  \ 关键字不会从数据库中删除数据。它只是在运行 `SELECT` 查询时识别任何相同的记录，并从你的结果中删除任何重复的行。`DISTINCT` 关键字放在 `SELECT`\
  \ 关键字之后：\n\n```\nSELECT DISTINCT columns\nFROM table...\n```\n\n这个 `DISTINCT` 关键字将应用于整个查询。你不能为每个列指定\
  \ `DISTINCT`，因为它删除的是结果中的重复记录，而不是每个列中的重复值。这是一个重要的区别，你很快就会看到一些这样的例子。\n\n#### 注意\n\n\
  `DISTINCT` 关键字从你的结果中删除重复的行，而不是每个列中的重复值。\n\n### 查找唯一的 Last Name 值\n\n你可以使用前面的例子来查找所有唯一的\
  \ `last_name` 值，而不需要在 `WHERE` 子句中使用 `ID`。你的查询将如下所示：\n\n```\nSELECT DISTINCT last_name\n\
  FROM employee;\n```\n\n结果将如下所示：\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\n\
  ANDERSON\nCOOPER\n(null)\nPATRICK\n```\n\n你可以看到重复的记录（第二个 `last_name` 为 SMITH）没有显示。这就是\
  \ `DISTINCT` 关键字的作用。\n\n\n### 查找唯一的薪资值\n\n我们来看另一个例子。假设你需要找出表中所有唯一的 `salary` 值。这将展示\
  \ `DISTINCT` 关键字不仅对文本值有效，也适用于数值。你的查询可能一开始是这样的：\n\n```sql\nSELECT salary\nFROM employee;\n\
  ```\n\n这个查询的结果是：\n\n```\nSALARY\n\n(null)\n(null)\n```\n\n这向你展示了两件事。首先，这一列中有两个 `NULL`\
  \ 值。其次，薪资为 40000 的值重复了，因为有两名 `employee` 的薪资相同。你可以用 `DISTINCT` 来解决这个问题。\n\n```sql\n\
  SELECT DISTINCT salary\nFROM employee;\n```\n\n这个查询的结果是：\n\n```\nSALARY\n\n(null)\n\
  ```\n\n使用 `DISTINCT` 消除了一条 `NULL` 记录和一条 40000 的记录。如果你不想包含 `NULL` 值该怎么办？你可以将 `DISTINCT`\
  \ 关键字与上一章学过的 `WHERE` 子句结合使用。\n\n```sql\nSELECT DISTINCT salary\nFROM employee\n\
  WHERE salary IS NOT NULL;\n```\n\n你的结果会像这样：\n\n```\nSALARY\n```\n\n这显示了所有唯一的 `salary`\
  \ 值，但排除了 `NULL` 值。\n\n### 查找唯一的值组合\n\n让我们看另一个例子。假设你被要求找出此表中所有唯一的 `last_name` 和 `salary`\
  \ 值组合。你的查询会是这样的：\n\n```sql\nSELECT DISTINCT last_name, salary\nFROM employee;\n\
  ```\n\n注意 `DISTINCT` 关键字只出现了一次。你为整个查询定义了它，而不需要为每一列都定义一次。如果你运行这个查询，结果如下：\n\n```\n\
  LAST_NAME   SALARY\nJONES       20000\nSMITH       35000\nKING        40000\nSIMPSON\
  \     52000\nANDERSON    31000\nCOOPER      (null)\n(null)      (null)\nSMITH  \
  \     62000\nPATRICK     40000\n```\n\n你可能会疑惑为什么 `'SMITH'` 出现了两次。还有为什么 `salary`\
  \ 为 40000 的值也出现了两次？这是因为它们可能是重复的值，但它们不是重复的行。薪资为 35000 的 `'SMITH'` 行与薪资为 62000 的 `'SMITH'`\
  \ 行是不同的行，因此该行保留在结果中。\n\n薪资为 40000 的 `'KING'` 行和薪资为 40000 的 `'PATRICK'` 行也是如此。尽管\
  \ `salary` 相同，但 `last_name` 不同，所以行也不同。\n\n`DISTINCT` 的设计目的不是为了从不同行的不同列中删除重复值。如果它这样做，那么每行中的数据就会被混淆，从而变得不正确。如果你需要通过消除重复项来在查询中查找唯一结果，那么\
  \ `DISTINCT` 就是实现这一目标的方法。\n\n如何区分两个 `'SMITH'` 员工是不同的人？你可以查看 `ID` 列。或者，你可以添加一个新列来定义更多关于他们的信息，这将在后面的章节中学习。\n\
  \n### 总结\n\nSQL 不会自动从你的结果中消除重复记录。你可以在查询中通过在 `SELECT` 关键字后添加 `DISTINCT` 关键字来实现这一点。它移除的是重复的记录，而不是重复的列，这两个概念截然不同。\n\
  \n## 10. 对值列表和范围应用过滤器\n\n在前面的章节中，你学习了 `WHERE` 子句以及如何使用它来限制你看到的结果。你可以使用各种符号（称为 `运算符`）来实现这一点，例如“等于”和“小于”。你还可以使用\
  \ `AND`/`OR` 关键字来指定多个条件。\n\n处理值列表带来了一个有趣的挑战：一个很长的列表可能导致查询中出现大量的 `AND` 和 `OR` 关键字。本章介绍了一些在处理大型列表时很有帮助的语法。你还将学习一些用于范围的语法。\n\
  \n### 连词过多\n\n在 `WHERE` 子句中编写包含一长串相等条件的查询会变得很繁琐。让我们通过一个例子来说明，这将为你接下来要学习的语法做铺垫。\n\
  \n首先，到目前为止，我们的示例数据如下：\n\n```\nID  LAST_NAME SALARY\n1   JONES     20000\n2   SMITH\
  \     35000\n3   KING      40000\n4   SIMPSON   52000\n5   ANDERSON  31000\n6  \
  \ COOPER    (null)\n7   (null)    (null)\n8   SMITH     62000\n9   PATRICK   40000\n\
  ```\n\n如果你想找出所有 `salary` 等于 5,000 或 10,000 倍数的记录，你可能会有这样的查询：\n\n```sql\nSELECT id,\
  \ last_name, salary\nFROM employee\nWHERE salary = 20000\nOR salary = 35000\nOR\
  \ salary = 40000;\n```\n\n如果你运行这个查询，得到的结果是：\n\n```\nID   LAST_NAME   SALARY\n1 \
  \   JONES       20000\n2    SMITH       35000\n3    KING        40000\n9    PATRICK\
  \     40000\n```\n\n我们忽略了薪资为 52000、31000 和其他值的记录。你得到了想要的结果，但我们的 `WHERE` 子句包含了针对同一列的三个检查：\n\
  \n```sql\nWHERE salary = 20000\nOR salary = 35000\nOR salary = 40000;\n```\n\n如果你的表中有更多值，并且想检查五到十个不同的值怎么办？你可以使用更多\
  \ `OR` 关键字，但这会让查询看起来有点乱：\n\n```sql\nWHERE salary = 20000\nOR salary = 35000\nOR\
  \ salary = 40000\nOR salary = 45000\nOR salary = 50000\nOR salary = 55000\nOR salary\
  \ = 60000\nOR salary = 65000;\n```\n\n有一种方法可以改进这种重复使用大量 `OR` 关键字的情况：使用 `IN` 关键字。\n\
  \n### IN 关键字\n\n`IN` 关键字允许你在单个比较中指定多个值。这个关键字的工作方式与使用多个 `OR` 关键字相同。`IN` 子句看起来像这样：\n\
  \n```sql\nWHERE column IN (value1, value2... value_n)\n```\n\n使用 `IN` 关键字来代替“等于”运算符。然后你指定一个左括号\
  \ \"(\"，并在括号内包含所有你想要检查的值，每个值之间用逗号分隔。最后，你关闭括号。\n\n#### 使用 IN 的示例\n\n你可以在 `IN` 关键字内指定一个很长的值列表（实际上最多可达\
  \ 1,000 个）。这种指定列表的能力对于你正在查看的示例非常有用。与其使用像这样的查询：\n\n```sql\nSELECT id, last_name,\
  \ salary\nFROM employee\nWHERE salary = 20000\nOR salary = 35000\nOR salary = 40000;\n\
  ```\n\n你可以使用这样的查询：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE\
  \ salary IN (20000, 35000, 40000);\n```\n\n第二个版本看起来更整洁，更易于阅读，因为所有关于薪资的条件都集中在一起。这个查询的结果是：\n\
  \n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n\
  3    KING        40000\n9    PATRICK     40000\n```\n\n这些结果与使用单独 `OR` 语句的查询结果相同。\n\
  \n#### 更长的值列表\n\n你之前的例子在 `IN` 子句中包含了三个值。如果你想包含更多呢？使用几个 `OR` 语句，你的查询可能像这样：\n\n```sql\n\
  SELECT id, last_name, salary\nFROM employee\nWHERE salary = 10000\nOR salary = 20000\n\
  OR salary = 30000\nOR salary = 40000\nOR salary = 50000\nOR salary = 60000\nOR salary\
  \ = 70000\nOR salary = 80000\nOR salary = 90000\nOR salary = 100000;\n```\n\n这个查询检查薪资值是否以\
  \ 10,000 为增量。每个值都有单独的 `OR` 关键字。这个查询显示以下结果：\n\n```\nID   LAST_NAME   SALARY\n1  \
  \  JONES       20000\n3    KING        40000\n9    PATRICK     40000\n```\n\n查询结果只显示了三条记录，因为只有三个\
  \ `salary` 值与提供的列表中的值匹配。尽管列表中有十个值，但许多值没有对应的行，所以只返回了三行。\n\n你可以使用 `IN` 子句重写查询：\n\n\
  ```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE salary IN (\n10000, 20000,\
  \ 30000, 40000, 50000,\n60000, 70000, 80000, 90000, 100000);\n```\n\n同样，`IN` 子句看起来比单独的\
  \ `OR` 关键字整洁得多，也更容易阅读。这个查询的结果也是一样的：\n\n```\nID   LAST_NAME   SALARY\n1    JONES\
  \       20000\n3    KING        40000\n9    PATRICK     40000\n```\n\n\n\n### 使用\
  \ `IN` 处理文本值\n\n`IN` 关键字也可以与文本值一起使用。假设你有一个需要筛选的姓名列表。使用 `OR` 关键字的查询可能如下所示：\n\n```sql\n\
  SELECT id, last_name, salary\nFROM employee\nWHERE last_name = 'SIMPSON'\nOR last_name\
  \ = 'COOPER'\nOR last_name = 'ANDERSON';\n```\n\n这个查询可以改用 `IN` 关键字来写：\n\n```sql\n\
  SELECT id, last_name, salary\nFROM employee\nWHERE last_name IN ('SIMPSON', 'COOPER',\
  \ 'ANDERSON');\n```\n\n每个文本值都需要用单引号括起来，就像你在其他 `WHERE` 子句中看到的一样。这些文本值也都放在括号内，用逗号分隔，就像处理薪资值的查询一样。\n\
  \n这个查询的结果是：\n\n```sql\nID   LAST_NAME   SALARY\n4    SIMPSON     52000\n5    ANDERSON\
  \    31000\n6    COOPER      NULL\n```\n\n你可以看到结果显示了你指定的 `last_name` 值的记录。无论你在 `IN`\
  \ 关键字内指定多少个值，这种类型的查询都有效，并且比单独的 `OR` 语句更容易输入和阅读。\n\n### 将 `IN` 与其他子句结合使用\n\n你已经见过一些在单个\
  \ `WHERE` 子句中查找列中几个不同值的查询。你也可以将这种方法与其他条件相结合，例如另一个 `AND` 或 `OR` 子句。\n\n假设你想找到所有 `salary`\
  \ 为 20000、25000、30000、35000 或 40000，并且 `last_name` 为 SMITH 的员工。你的查询可能如下所示：\n\n```sql\n\
  SELECT id, last_name, salary\nFROM employee\nWHERE salary IN (20000, 25000, 30000,\
  \ 35000, 40000)\nAND last_name = 'SMITH';\n```\n\n这个查询使用 `IN` 关键字来查找 `salary` 值，并使用相等比较来检查\
  \ `last_name` 值。这种将 `IN` 关键字与其他子句结合的技术是完全有效的 SQL。运行此查询时，结果应为：\n\n```sql\nID   LAST_NAME\
  \   SALARY\n2    SMITH       35000\n```\n\n结果显示了一条记录，因为表中只有一条记录匹配指定的 `salary` 值并具有给定的\
  \ `last_name` 值。\n\n### `IN` 与 `AND`？\n\n你已经了解到，在 `IN` 子句中指定值等同于写出多个 `OR` 子句。为什么\
  \ `IN` 子句不等同于多个 `AND` 子句呢？当你有多个 `AND` 子句时会发生什么？\n\n这是之前使用 `OR` 的查询：\n\n```sql\n\
  SELECT id, last_name, salary\nFROM employee\nWHERE salary = 20000\nOR salary = 35000\n\
  OR salary = 40000;\n```\n\n现在，考虑将所有的 OR 关键字替换为 AND，因为一个常见的错误是认为“我对 20000、35000 和\
  \ 40000 的薪资值感兴趣”。很容易犯这样的错误：从英语思维中抓住“和”，并将其转换为查询中的 AND 关键字。例如：\n\n```sql\nSELECT\
  \ id, last_name, salary\nFROM employee\nWHERE salary = 20000\nAND salary = 35000\n\
  AND salary = 40000;\n```\n\n然而，这个查询不会得到你想要的结果。它本质上是在说：“显示 `salary` 等于 20000 且等于\
  \ 35000 且等于 40000 的记录”。\n\n一个列不能同时等于多个值。如果一个 `salary` 值等于 20000，它就不可能同时等于 35000。这个查询将返回零行。这就是为什么\
  \ `IN` 关键字等同于 `OR` 关键字，而不是 `AND` 关键字。\n\n### `IN` 与 `LIKE`？\n\n在之前的章节中，你学习了如何使用\
  \ `LIKE` 关键字执行部分匹配。例如，要找到所有 `last_name` 以“S”开头的记录，我们的查询将是：\n\n```sql\nSELECT id,\
  \ last_name, salary\nFROM employee\nWHERE last_name LIKE 'S%';\n```\n\n如果你想找到所有\
  \ `last_name` 以“S”或“P”开头的记录呢？你能为此使用 `IN` 关键字吗？你能写成这样吗？\n\n```sql\nSELECT id, last_name,\
  \ salary\nFROM employee\nWHERE last_name IN ('S%', 'P%');\n```\n\n不幸的是，`IN` 的这种用法不会给你所需的结果。`IN`\
  \ 子句对括号内的所有值进行“等于”判断，而不是 `LIKE`。因此，`IN` 子句无法对列表中的值执行部分匹配。它将返回 `last_name` 精确匹配字符“S%”或“P%”的记录，而这样的记录一条也没有。\n\
  \n当你有多个 `LIKE` 条件时，可以使用 `OR` 关键字将它们组合起来。例如：\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee\nWHERE last_name LIKE 'S%'\nOR last_name LIKE 'P%';\n```\n\n这个查询将显示以下结果：\n\
  \n```sql\nID   LAST_NAME   SALARY\n2    SMITH       35000\n4    SIMPSON     52000\n\
  8    SMITH       62000\n9    PATRICK     40000\n```\n\n### 过滤值的范围\n\n你已经学习了如何使用“等于”和“大于”等运算符通过\
  \ `WHERE` 子句过滤数据。有时你可能需要查找落在特定值范围内的数据。有一种比使用大于和小于运算符组合更好的方法来过滤值范围。\n\n可以使用你的员工表来完成值范围的过滤。你可能需要过滤薪资值的范围。员工表如下所示：\n\
  \n```sql\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n\
  3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER\
  \      NULL\n7    NULL        NULL\n8    SMITH       62000\n9    PATRICK     40000\n\
  ```\n\n假设你的经理想知道谁的薪资在某个范围内。你被要求提供所有薪资在 20,000 到 40,000 之间（含）的员工的详细信息。\n\n你会怎么做？你可以使用一个\
  \ `WHERE` 子句，其中包含：\n\n*   一个大于或等于符号，用于薪资 20,000\n*   一个小于或等于符号，用于薪资 40,000\n*  \
  \ `AND` 关键字以确保记录同时满足这两个条件\n\n你的查询可能如下所示：\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee\nWHERE salary >= 20000\nAND salary <= 40000;\n```\n\n这个查询将找到 `salary`\
  \ 大于或等于 20000 且 `salary` 小于或等于 40000 的记录。你的结果将如下所示：\n\n```sql\nID   LAST_NAME  \
  \ SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n\
  5    ANDERSON    31000\n9    PATRICK     40000\n```\n\n这些结果显示了 `salary` 等于 20000、40000\
  \ 以及介于两者之间的所有值的记录。有另一种方法可以将相同的逻辑写入查询：使用一个称为 `BETWEEN` 的运算符。\n\n### `BETWEEN` 运算符\n\
  \n在 SQL 中，`BETWEEN` 是一个运算符，它允许你为特定列指定上限和下限，行必须满足该条件才会被包含。`BETWEEN` 等同于使用“大于或等于”和“小于或等于”。使用\
  \ `BETWEEN` 的语法如下：\n\n```sql\nWHERE column BETWEEN low_value AND high_value\n```\n\
  \n这意味着：\n\n*   它以 `WHERE` 列开头，这是你想要查找的列。\n*   然后你指定 `BETWEEN` 运算符。\n*   接着是 `low_value`，即范围中的下限值。\n\
  *   然后你有 `AND` 关键字。\n*   最后你有 `high_value`，即范围中的上限值。\n\n#### 使用 Between 处理两个薪资值\n\
  \n你可以将前面的例子重写为一个使用 `BETWEEN` 的查询。\n\n第一个例子是这个查询：\n\n```sql\nSELECT id, last_name,\
  \ salary\nFROM employee\nWHERE salary >= 20000\nAND salary <= 40000;\n```\n\n你可以使用\
  \ `BETWEEN` 关键字将其重写如下：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\n\
  WHERE salary BETWEEN 20000 AND 40000;\n```\n\n这个查询输入量稍少，并且可以说更容易阅读。结果是相同的：\n\n```sql\n\
  ID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING\
  \        40000\n5    ANDERSON    31000\n9    PATRICK     40000\n```\n\n\n\n"
- '# 第十一章：数据排序


  ## 11.1 当值不完全匹配时使用 BETWEEN


  `BETWEEN` 操作符也可用于数据与您指定的上下限值不完全匹配的情况。要查找 `salary`（工资）值在 50,000 到 100,000 之间的 `employee`（员工）记录，您可以编写如下查询：


  ```sql

  SELECT id, last_name, salary

  FROM employee

  WHERE salary BETWEEN 50000 AND 100000;

  ```


  该查询的结果是：


  ```

  ID   LAST_NAME   SALARY

  4    SIMPSON     52000

  8    SMITH       62000

  ```


  您会注意到几点。首先，没有值恰好是 50,000 或 100,000，但这没关系。在此范围内的值会被显示出来。此外，`NULL` 值不会被显示。`NULL` 被视为未知值，因此数据库无法判断那些
  `NULL` 值是否在此范围内。


  ## 11.2 对文本值使用 BETWEEN


  您也可以将文本值与 `BETWEEN` 关键字一起使用。假设您想查找所有介于 ''ANDERSON'' 和 ''MOON'' 之间的 `last_name`（姓氏）值。您可以编写如下查询：


  ```sql

  SELECT id, last_name, salary

  FROM employee

  WHERE last_name BETWEEN ''ANDERSON'' AND ''MOON'';

  ```


  我们的结果将显示如下：


  ```

  ID   LAST_NAME   SALARY

  1    JONES       20000

  3    KING        40000

  5    ANDERSON    31000

  6    COOPER      NULL

  ```


  这个结果是通过检查每个 `last_name` 值的字符，看它们如果按字母顺序排序，是否在 ''ANDERSON'' 之后且在 ''MOON'' 之前来确定的。这三个值都符合。


  ## 11.3 包含性与排他性检查示例


  这是一个使用 `BETWEEN` 子句无法达到预期效果的例子。假设您需要查找所有 `salary` 大于或等于 20000 且小于 40000 的 `employee`
  记录。如果他们的 `salary` 是 40000，则不应包含在内。不使用 `BETWEEN` 的查询可能如下所示：


  ```sql

  SELECT id, last_name, salary

  FROM employee

  WHERE salary >= 20000

  AND salary < 40000;

  ```


  请注意，第一个 `WHERE` 条件使用 “>=” 来表示“大于或等于 20000”。第二个条件使用 “<” 来表示“小于 40000”。此查询将返回以下结果：


  ```

  ID   LAST_NAME   SALARY

  1    JONES       20000

  2    SMITH       35000

  5    ANDERSON    31000

  ```


  如果您使用 `BETWEEN` 来编写这个查询，它将看起来与之前的查询相同，但会显示不同的结果。


  ```sql

  SELECT id, last_name, salary

  FROM employee

  WHERE salary BETWEEN 20000 AND 40000;

  ```


  结果是不同的：


  ```

  ID   LAST_NAME   SALARY

  1    JONES       20000

  2    SMITH       35000

  3    KING        40000

  5    ANDERSON    31000

  9    PATRICK     40000

  ```


  这是需要注意的地方。如果您需要使用“大于或等于”和“小于或等于”，那么 `BETWEEN` 是适用的，否则它就不适用。您能直接说 `BETWEEN` 20000
  和 39999 吗？


  可以，但怎么能保证没有 39999.50 的工资呢？您如何有效地找出小于 40000 的最高值？这并不容易做到。日期字段也存在同样的问题，本书后面会讨论。


  ## 11.4 是否应该使用 BETWEEN？


  您已经看到 `BETWEEN` 关键字可以作为“大于或等于”和“小于或等于”逻辑（也称为“包含性”）的替代方案。您应该使用哪种方法？


  以下是我的建议：如果您确实在寻找一个值的范围，并且您的规则要求它是包含性的，那么您可以使用 `BETWEEN`。如果不是，我建议使用其他符号。表 10-1 对此规则提供了一个快速参考。


  表 10-1：何时使用 `BETWEEN` 操作符


  | 是否在寻找值范围？ | 是否包含指定值？ | 使用 BETWEEN 或 运算符 |

  | --- | --- | --- |

  | 是 | 是 | BETWEEN |

  | 是 | 否 | 运算符 |

  | 否 | 是 | 运算符 |

  | 否 | 否 | 运算符 |


  ## 11.5 总结


  `IN` 关键字允许您指定多个值来进行“等于”检查。它比使用多个 `OR` 关键字更容易输入和阅读，并且可以与任何数据类型一起使用。


  `BETWEEN` 关键字是一个有用的概念，它允许您为一个必须在另外两个值之间的值指定 `WHERE` 子句。它是一个易于编写和理解的“大于或等于”与“小于或等于”的组合，但如果需要，无法修改为使用“大于”或“小于”。


