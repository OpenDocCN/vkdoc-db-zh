- "# 第一部分：环境设置\n\n## 1. 什么是数据库？\n\n软件的一个主要特性是它能让您以特定方式与数据进行交互。这可以是一个购物清单应用，让您在手机上添加购物物品；一个让您可以撰写和发布文章的网站；或者是一个存储客户信息的客户关系管理程序。\n\
  \n所有这些程序都让您能以某种方式查看信息、编辑信息，然后将其存储在某处。如果无法存储这些信息，软件的效用就会大打折扣。想象一个购物清单应用，但当您输入需要购买的物品后，应用却不保存，一旦关闭应用清单就会消失。这样的应用就没什么用了！\n\
  \n软件需要一个地方来存储数据。最常见的存储方式就是使用数据库。数据库是文件和信息的结构化定义，它使用户和软件能够高效地存储、检索和更新数据。\n\n购物清单应用、文章发布网站、客户关系管理系统以及许多其他类型的软件都会使用数据库。存储在数据库中的数据以多种方式被软件使用，并允许用户在软件中查看、保存和编辑信息。\n\
  \n例如，一个购物清单应用可能会在数据库中存储以下信息：\n*   购物清单上每个物品的名称（您需要从商店购买的物品）\n*   物品类别的列表（例如，蔬菜、乳制品、调味品）\n\
  *   您想购买的每个物品的数量（例如，3 个苹果，2 杯面粉）\n\n那么，除了存储信息，为什么还要使用数据库呢？\n\n首先，它很高效。数据在数据库中的存储方式使得用户和软件易于读取数据、添加新数据、更新或删除现有数据。\n\
  \n数据库还允许您在不影响所有其他数据的情况下，对一小部分数据进行更新（如果需要）。例如，您可以向购物清单中添加一个新物品，而无需更改数据库中的每个其他物品。\n\
  \n使用数据库存储数据的一个考虑是，它们需要一个“数据库管理系统”。这是一种允许用户或应用程序与文件交互的软件。它使您可以轻松输入命令，而数据库管理系统则负责处理数据的更改及其中涉及的所有复杂性。另一个优势是能够处理多个用户查看或编辑数据的情况。\n\
  \n### 数据库的替代方案\n\n数据库并不是存储数据的唯一方式。数据也可以直接存储在文件中。一个例子就是文本文件。如果您打开记事本并新建一个文档，输入一些文本并保存，那么一个文件就被保存到了您的计算机上。这个例子中没有创建数据库。文件只是保存到了您的计算机上。\n\
  \n将数据存储在文本文件中比使用数据库更简单，如果您是唯一处理该文件的人，这也没问题。\n\n然而，当软件开始被多人使用或随着时间的推移变得庞大时，将数据存储在文件中可能会出现问题，例如确保不同用户的更改不会被覆盖、确保数据能够快速保存和检索，以及只更新文件的部分内容。如果使用数据库，这些问题都能得到解决。\n\
  \n我想解释几个与数据库相关的术语，以帮助您理解什么是数据库以及如何与之交互。\n\n### 表\n\n表是数据库中存储相关数据的逻辑结构。数据库中的大部分数据都存储在表内。数据库通常有多个表，我们将在本书中频繁提及表。\n\
  \n如果您之前使用过电子表格程序，例如 Microsoft Excel，那么可以将表想象成一个工作表。信息在表中的存储方式与在工作表中的存储方式类似。您有被划分为列的多行数据。\n\
  \n\n\n### 行\n\n一行代表表中单条信息记录。例如，在客户关系管理系统中，一行可以代表一个客户，或者在杂货清单应用中代表一个产品。数据库中的一行类似于电子表格文件中的一行。纯粹主义者可能不赞同我这样类比，但这个比喻是有用的。\n\
  \n### 列\n\n列是一种表示表中记录或行特定信息的方式。它是每一行的一个属性或值。\n\n例如，客户的“名”可以是一个列，然后可以为各行记录一个值。客户的“姓”可以是另一个列，可以单独记录，并且很可能与每个客户的“名”不同。\n\
  \n在脑海中想象电子表格文件中的列可能会有所帮助。例如：\n\n```\nFirst Name     Last Name\nJacinda        Ardern\n\
  Malcolm        Turnbull\nTheresa        May\n```\n\n在这个例子中，每一行代表一位总理。因此，这个表将是一个总理表。表中的每一行具体代表一位总理。然后，每一列描述了一个属性——比如名和姓——这些是你期望一位总理拥有的属性。\n\
  \n### 查询\n\n你已经了解到数据存储在数据库中，并且可以被添加、更新或检索。软件通过数据库管理系统以几种不同的方式与这个数据库交互：\n\n*   从数据库中检索数据\n\
  *   更改数据库中的值\n*   向数据库添加一些新数据\n*   从数据库中删除一些现有数据\n\n这些类型的命令被称为查询，它们是使用某种特定类型代码的特定命令，让软件通过数据库管理系统与数据库交互。这些查询易于阅读，我们将在本书中学习如何读写它们。\n\
  \n### SQL\n\nSQL 代表结构化查询语言。它是用于在数据库上编写查询的语言或代码类型。这就是我们将在本书中学习的语言。\n\n这个缩写可以发音为“ess\
  \ cue ell”。然而，它也可以发音为“see kwel”，就好像这个词是“sequel”。无论哪种方式，SQL 都是我们将使用的语言。\n\n### 索引\n\
  \n之前我们解释了什么是表。表是数据库中的一种对象。表用于存储数据。索引是数据库中的另一种对象，用于使查找表中存储的数据更容易。\n\n索引是一个提高查询效率的对象。它有点像书本后面的索引。如果你正在查找关于特定主题的信息，你不会浏览每一页直到找到它。你会在索引中查找该主题，它会告诉你去哪一页。\n\
  \n### 供应商\n\nSQL 语言和相关数据库功能遵循一个标准：ISO SQL 标准。该标准规定了语言的工作方式。\n\n对于许多编程语言，例如 Java，只有一个供应商。然而，对于\
  \ SQL，有许多供应商。这些供应商创建了他们自己版本的使用 SQL 的数据库管理系统。\n\n其中一些供应商实现包括：\n\n*   Oracle Database\n\
  *   Microsoft SQL Server\n*   Oracle MySQL\n*   PostgreSQL\n\n所有这些供应商实现的相似之处在于，它们都实现了\
  \ SQL 标准。标准中定义的相同代码在每个供应商的数据库中将以相同的方式工作。至少，这是希望。\n\n然而，每个供应商都增加了额外的功能和特性，这些在不同平台上工作方式并不相同。例如，Oracle\
  \ 实现了对其数据库平台有效的 SQL 扩展，但在 PostgreSQL 等中找不到。所有供应商都做同样的事情，因此在实践中，编写完美兼容所有供应商实现的 SQL\
  \ 可能很困难。\n\n有时供应商特定的改动很小，例如特定函数的名称或数据类型的名称。有时改动较大，例如新的对象类型或构建数据库的方式。\n\n这对你意味着什么？如果你学习适用于一个供应商数据库的\
  \ SQL，那么大部分知识可以转移到其他供应商。你应该能够将你从一个数据库供应商那里学到的大部分知识应用到另一个数据库供应商。\n\n在本书中，你将学习 Oracle\
  \ SQL。这意味着你将学习使用 SQL 语言的 Oracle 数据库管理系统上的所有基本命令。如果你去尝试使用 Microsoft SQL Server 数据库，在了解差异之后，你应该能够很快掌握\
  \ Microsoft 的实现。\n\n### 总结\n\n数据库是应用程序使用的一种数据存储方法。数据库中的数据存储在表中，表有用于每条记录的行和用于需要存储的每种数据类型的列。\n\
  \n查询是在数据库上运行的以检索、添加或更新数据的命令。这些查询是用一种称为 SQL 的语言编写的，SQL 代表结构化查询语言。\n\n几个供应商提供他们自己版本的使用\
  \ SQL 的数据库管理系统。其中一些供应商是 Oracle、Microsoft SQL Server、MySQL 和 PostgreSQL。我们将在本书中学习\
  \ Oracle。\n\n## 2. 设置环境\n\n本章向你介绍我们将在本书中使用的不同工具，并向你展示如何下载和设置它们。你还将创建一个表并设置一些示例数据。\n\
  \n### 我们需要什么工具？\n\n我们将在本书中使用两种不同的工具来教授 Oracle SQL：Oracle Express 和 Oracle SQL Developer。Oracle\
  \ Express 是 Oracle 企业级数据库的一个精简版本。快速版（Express Edition）或 Oracle Express 是免费且易于设置的。它在学习\
  \ Oracle SQL 以及在家创建自己的项目的人群中很受欢迎。\n\nOracle SQL Developer 是 Oracle 开发的一个程序，它让你能够连接到数据库并在数据库上运行\
  \ SQL。它也是免费且易于设置的。\n\n最后，Oracle 提供了另一个名为 LiveSQL 的工具。它是一个包含示例数据集的网站，让你可以连接到数据库，上传自己的数据，并在其上运行\
  \ SQL 查询。你不需要安装 Oracle Express 或 Oracle SQL Developer 来使用 LiveSQL。\n\n虽然 LiveSQL\
  \ 是一个用于学习和使用 Oracle SQL 的方便工具，但本书的重点将放在 Oracle SQL Developer 和 Oracle Express 上。这是因为本书不仅教你如何使用\
  \ SQL 语言，还将教你如何使用 Oracle SQL Developer——这是处理 Oracle 数据库最广泛使用的工具之一。这种对 SQL Developer\
  \ 的关注让你为 SQL 的实际应用做好更充分的准备，因为公司会使用 Oracle SQL Developer（或类似工具）来处理数据库，而不是 LiveSQL。\n\
  \n\n### 版本\n\n本书中的示例主要围绕以下版本的 Oracle 快捷版（Express Edition）和 SQL Developer 构建。不过，SQL\
  \ 是一门成熟且稳定的语言。本书开头的内容应该也适用于任何较近期的数据库版本。\n\n*   Oracle 快捷版 18c。此版本于 2018 年初发布，其快捷版则在\
  \ 2018 年末发布。\n*   Oracle SQL Developer 18.2。此版本于 2018 年 7 月发布。\n\nOracle 的版本号历史从\
  \ 2 开始，一直到 2017 年的 12c 版本。大约每 2 或 3 年会发布一个新的主版本，“12c”中的“c”代表“cloud（云）”，这是该版本的重点（之前的版本使用其他字母，如代表网格计算的“g”和代表互联网的“i”）。尽管“c”代表云，但\
  \ 12c 版本既可用于本地安装，也可在云上使用。\n\nOracle 公司在 2017 年宣布，他们的版本发布将改为年度发布，因此版本号将改为反映发布年份。这就解释了\
  \ 18c 版本的由来。Oracle 没有发布 13 到 17 的版本号，而是直接跳到了 18c。\n\n同样的概念也应用于 Oracle SQL Developer。最新版本是\
  \ 18，而之前的版本是版本 4。\n\n现在我们已经解释了将要使用的工具，接下来让我们看看如何设置它们。\n\n### 下载 Oracle 快捷版\n\nOracle\
  \ 快捷版（或 Oracle Database XE）是我们将使用的数据库管理系统。它具备我们所需的所有数据库功能。它的限制主要与数据库大小以及在商业产品中的使用有关，但对于学习来说非常合适。\n\
  \n下载 Oracle 快捷版的步骤：\n\n1.  访问 Oracle 网站： [`www.oracle.com`](http://www.oracle.com)。\n\
  2.  导航到菜单 ➤ 产品 ➤ 数据库 ➤ 应用开发。这可以通过将鼠标悬停在每个部分上并点击 Oracle 快捷版来完成，如图 2-1 所示。\n\n   \
  \ ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig1_HTML.jpg](img/471705_1_En_2_Fig1_HTML.jpg)\n\
  \    图 2-1\n    选择“应用开发”的菜单选项\n\n3.  向下滚动页面并点击 Database Express Edition（如图 2-2 所示）。\n\
  \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig2_HTML.jpg](img/471705_1_En_2_Fig2_HTML.jpg)\n\
  \    图 2-2\n    “数据库语言和工具”部分\n\n4.  向下滚动，在“资源”部分下点击 Download Oracle Database XE（图\
  \ 2-3）。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig3_HTML.jpg](img/471705_1_En_2_Fig3_HTML.jpg)\n\
  \    图 2-3\n    Oracle Database XE 页面的底部\n\n加载的页面将显示有关 Oracle 快捷版的信息（图 2-4）。\n\n\
  ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig4_HTML.jpg](img/471705_1_En_2_Fig4_HTML.jpg)\n\
  图 2-4\nOracle 快捷版下载页面\n\n#### 注意\n\n本节中的截图显示的是 Oracle 快捷版 11g。在撰写本文时，这是 Windows\
  \ 上发布的最新版本。在您阅读本书时，18c 版本应该已经可用。安装过程是相同的。\n\n1.  阅读并点击“接受许可协议”。然后下载链接将会出现。\n2. \
  \ 选择与您的操作系统相对应的版本并点击链接。如果是 Windows 系统，请根据您运行的 Windows 版本选择 32 位或 64 位。如果不确定，可以选择\
  \ 32 位版本以获得更顺畅的体验。\n    然后您将被要求登录或创建一个 Oracle 账户（图 2-5）。这是必需的，以便您可以下载 Oracle 快捷版（和\
  \ Oracle SQL Developer）。创建账户是免费的，您无需是 Oracle 员工。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig5_HTML.jpg](img/471705_1_En_2_Fig5_HTML.jpg)\n\
  \    图 2-5\n    登录或创建账户\n\n3.  点击“创建账户”。随后将显示“创建您的 Oracle 账户”屏幕，如图 2-6 所示。\n\n \
  \   ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig6_HTML.jpg](img/471705_1_En_2_Fig6_HTML.jpg)\n\
  \    图 2-6\n    “创建您的 Oracle 账户”屏幕\n\n4.  输入您的详细信息并点击“创建账户”。您的账户现在应该已经创建好了。\n5.\
  \  使用您新创建的账户登录。然后 Oracle 快捷版应该就会开始下载到您的计算机。\n\n根据您的浏览器设置，下载要么会自动开始（在默认的“下载”文件夹中），要么会要求您指定保存位置。\n\
  \n### Windows、Linux 以及 Mac 呢？\n\n您可能已经注意到 Oracle 快捷版有 Windows 和 Linux 版本，但没有 Mac\
  \ 版本。Oracle 目前不提供 Oracle 快捷版的 Mac 版本下载。但是，如果您使用的是 Mac，仍然可以使用 Oracle 快捷版来学习 Oracle。我自己就使用\
  \ Mac，并且能够在其上运行 Oracle 数据库。\n\nMac 用户有几种选择：\n\n*   设置一个 Windows 虚拟机，这是您计算机上运行 Windows\
  \ 安装的一个区域，您可以在其中安装 Oracle。这可以使用虚拟机应用程序（如 Parallels 或 VirtualBox）来完成。\n*   下载 Oracle\
  \ 预构建的开发者虚拟机之一。这些是由 Oracle 预制的虚拟机文件，其中包含 Windows（使用名为 VirtualBox 的虚拟机程序）、Oracle\
  \ 数据库和 SQL Developer。\n*   使用 LiveSQL，它不需要安装，但需要互联网连接。\n\n有关设置虚拟机的详细信息，请访问以下页面：\n\
  *   Oracle\n*   在 Mac 上设置 Oracle： [`www.databasestar.com/oracle-mac/`](http://www.databasestar.com/oracle-mac/)\n\
  \n接下来的说明主要适用于 Windows 和 Linux 用户。如果您使用的是 Mac，那么您关于使用虚拟机还是 LiveSQL 的选择将会影响您需要执行以下哪些活动。例如，Oracle\
  \ 预构建的虚拟机会预装 Oracle 数据库，而对于您从头创建的虚拟机，您需要自己安装数据库。\n\n\n### 安装 Oracle Express\n\n\
  既然我们已经下载了 Oracle Express，现在是时候安装它了。接下来的步骤是针对 Windows 安装的，但 Linux 安装过程应该类似。\n\n1.\
  \  浏览到下载文件的位置。它通常会在默认的“下载”文件夹中，或者你指定的任何位置。如果你的浏览器还打开着，你应该能点击该文件并选择**在文件夹中显示**（或类似选项）来打开文件保存的位置。\n\
  \n2.  由于该文件是 `ZIP` 格式，需要解压。打开该文件并解压，或者右键单击文件并选择**解压**。\n\n    文件会被解压到一个名为 `DISK1`\
  \ 的文件夹中。\n\n3.  打开 `DISK1` 文件夹并运行安装程序文件（图 2-7）。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig7_HTML.jpg](img/471705_1_En_2_Fig7_HTML.jpg)\n\
  \n    *图 2-7：`DISK1` 文件夹*\n\n4.  文件将加载并显示介绍屏幕（图 2-8）。点击**下一步**。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig8_HTML.jpg](img/471705_1_En_2_Fig8_HTML.jpg)\n\
  \n    *图 2-8：介绍屏幕*\n\n5.  阅读条款并点击**我接受**；然后点击**下一步**（图 2-9）。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig9_HTML.jpg](img/471705_1_En_2_Fig9_HTML.jpg)\n\
  \n    *图 2-9：许可协议*\n\n6.  在**选择目标位置**屏幕，点击**下一步**。你可以更改想要安装到的位置，但默认位置 (`C:\\oraclexe`)\
  \ 即可。\n\n7.  **指定数据库密码**屏幕将显示，如图 2-10 所示。输入一个你想用于系统管理员账户（称为 `SYS` 和 `SYSTEM`）的密码，然后点击**下一步**。\n\
  \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig10_HTML.jpg](img/471705_1_En_2_Fig10_HTML.jpg)\n\
  \n    *图 2-10：数据库密码屏幕*\n\n#### 注意\n\n你需要记住这个密码，因为你稍后将使用它登录数据库，以及在你需要重置其他密码时使用。如果忘记此密码，你可能需要重新安装\
  \ Oracle Express。\n\n8.  在“摘要”屏幕，点击**安装**。\n\n    Oracle Express 随后将开始安装。此安装过程通常需要几分钟时间。安装完成后会显示一条消息。\n\
  \n现在你已经安装了 Oracle Express，是时候下载并设置 Oracle SQL Developer，以便你可以使用这个数据库了。\n\n### 下载\
  \ Oracle SQL Developer\n\nOracle SQL Developer 是 Oracle 提供的免费应用程序，用于访问和操作 Oracle\
  \ 数据库。此应用程序被称为集成开发环境 (`IDE`)。它是一种让开发者处理代码的应用程序。\n\n下载 SQL Developer：\n\n1.  访问 Oracle\
  \ 网站：[`www.oracle.com`](http://www.oracle.com)。\n\n2.  在菜单下，导航至**产品 ➤ 数据库 ➤ 应用程序开发**。\n\
  \n3.  向下滚动并选择 **SQL Developer**。\n\n4.  点击**下载**按钮，如图 2-11 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig11_HTML.jpg](img/471705_1_En_2_Fig11_HTML.jpg)\n\
  \n    *图 2-11：Oracle SQL Developer 下载*\n\n    该页面显示了下载 SQL Developer 的许多不同选项（图 2-12）：\n\
  \n    *   Windows 64-bit with JDK included\n    *   Windows 32-bit or 64-bit\n \
  \   *   Mac OSX\n    *   Linux\n    *   Other\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig12_HTML.jpg](img/471705_1_En_2_Fig12_HTML.jpg)\n\
  \n    *图 2-12：Oracle SQL Developer 下载版本*\n\n    你应该选择与你操作系统和之前选择的 Oracle Express\
  \ 版本（32 位或 64 位）相匹配的 Oracle SQL Developer 版本。最简单的方式是使用“Windows 64-bit with JDK included”。这适用于你运行的是\
  \ 64 位 Windows 系统。Oracle SQL Developer 运行在 Java 平台上，这是唯一一个附带 `JDK`（Java 开发工具包）的版本。因此，它安装起来更简单，因为它只是一个安装过程。\n\
  \n    然而，如果你运行的不是 Windows 64 位系统，你需要选择其他版本。这些其他版本不包含 `JDK`，所以你需要单独安装它。我们将在本章后面解释如何操作。\n\
  \n5.  点击你希望下载的版本对应的**下载**链接。与 Oracle Express 一样，根据你的浏览器设置，文件将被下载到默认位置，或者你将可以指定位置。\n\
  \n文件下载完成后，就可以进行设置了。\n\n### 运行 Oracle SQL Developer\n\nOracle SQL Developer 的一个优点是它不需要安装。你下载的文件是一个\
  \ `ZIP` 文件。要让 SQL Developer 运行起来：\n\n1.  浏览到你下载 SQL Developer 的位置。\n\n2.  通过双击文件，或右键单击并选择**解压**来解压\
  \ `ZIP` 文件。\n\n3.  文件解压后，你可以为该文件创建一个快捷方式以便更容易运行。右键单击 `sqldeveloper.exe` 并选择**发送到桌面快捷方式**。这将在桌面上放置该文件的快捷方式。\n\
  \n4.  运行 `sqldeveloper.exe` 文件。SQL Developer 现在将会打开。\n\n5.  如果你下载的版本没有包含 `JDK`，系统可能会要求你指定\
  \ Java 文件的路径。点击**浏览**并找到 `java.exe` 文件。它通常位于 `C:\\Program Files\\Java\\jdk1.8.0_144\\\
  bin\\`。\n\n随后应该会显示启动页或欢迎屏幕。\n\n### 下载 JDK\n\n如果你下载的 SQL Developer 版本没有附带 `JDK`，你可能需要下载它。如果你的电脑上已经安装了它，可能来自你之前所做的其他开发工作，那么你就不需要再次下载。但是，如果你确实需要下载，方法如下：\n\
  \n1.  访问 [`www.oracle.com`](http://www.oracle.com)。\n\n2.  在菜单下，选择**产品 ➤ 开发者工具 ➤\
  \ Java SE SDK**。\n\n3.  点击页面顶部的**下载**选项卡，如图 2-13 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig13_HTML.jpg](img/471705_1_En_2_Fig13_HTML.jpg)\n\
  \n    *图 2-13：Java 下载*\n\n4.  点击 `JDK` 旁边的**下载**按钮，如图 2-14 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig14_HTML.jpg](img/471705_1_En_2_Fig14_HTML.jpg)\n\
  \n    *图 2-14：Java 下载页面*\n\n5.  点击**接受许可协议**，然后点击代表你操作系统文件的链接，如图 2-15 所示。\n\n  \
  \  ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig15_HTML.jpg](img/471705_1_En_2_Fig15_HTML.jpg)\n\
  \n    *图 2-15：Java 下载链接*\n\n文件下载后，你可以安装它。\n\n1.  在浏览器中点击该文件以运行安装文件。或者，你可以浏览到你下载它的位置，然后运行该文件。\n\
  \n2.  在过程的每一步点击**下一步**来跟随安装步骤。无需更改任何默认选项。\n\n`JDK` 安装需要几分钟时间。你现在可以运行 SQL Developer\
  \ 了。\n\n\n\n### 创建连接\n\n打开 SQL Developer 后，你就可以连接到刚刚安装的 Oracle 数据库了。这将允许你通过运行查询与数据库进行交互。我们需要做几件事：\n\
  \n1.  使用管理员账户创建一个新连接。\n2.  创建一个新用户。\n3.  使用新用户创建一个新连接。\n\n为什么需要创建新用户？我们不能直接使用安装时创建的系统账户吗？我们确实可以使用\
  \ `SYSTEM` 账户，但以这种方式使用 `SYSTEM` 账户来创建表和处理数据并不是一个好的做法。这是因为系统管理员账户拥有许多权限，数据库管理员会使用它们执行各种任务。在工作环境中，你通常无法访问系统管理员账户，因此最好使用自己的账户。\n\
  \n要创建新连接：\n\n1.  在 SQL Developer 中，点击屏幕左侧“连接”选项卡中的绿色 + 按钮，如图 2-16 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig16_HTML.jpg](img/471705_1_En_2_Fig16_HTML.jpg)\n\
  \    图 2-16：新建连接按钮。\n    如果看不到“连接”选项卡，请点击“视图”菜单，然后点击“连接”。\n\n随后将显示“新建连接”窗口，如图 2-17\
  \ 所示。现有连接显示在左侧，创建新连接的字段位于右侧。你左侧的连接列表将是空的。\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig17_HTML.jpg](img/471705_1_En_2_Fig17_HTML.jpg)\n\
  图 2-17：新建连接窗口。\n\n1.  输入一个 `连接名`。这可以是任何你喜欢的名字，用于在所有其他连接的列表中标识此连接。我建议使用“System”，因为这是\
  \ `SYSTEM` 账户的连接。将来如果你需要连接多个数据库，在此 `连接名` 字段中同时放入数据库名称和用户名会是个好习惯。\n2.  输入“SYSTEM”作为\
  \ `用户名`。\n3.  在密码字段中，输入你在安装 Oracle Express 时输入的密码。就是你需要记住的那个密码。\n4.  勾选 `保存密码` 复选框，这样每次连接时就不需要重新输入密码了。屏幕应如图\
  \ 2-18 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig18_HTML.jpg](img/471705_1_En_2_Fig18_HTML.jpg)\n\
  \    图 2-18：新建连接窗口中的数据。\n5.  关于连接信息，如果你在公司，你的 DBA（数据库管理员）通常会提供如何连接的信息。对于连接到我们的 Oracle\
  \ Express 数据库，请将 `主机名`、`端口` 和 `SID` 字段保留为它们的默认值。`主机名` 应为“localhost”，`端口` 应为 `1521`，`SID`\
  \ 应为“xe”。\n6.  点击 `测试` 按钮。这将测试你与数据库的连接，并查看你输入的信息是否正确。\n    如果测试成功，左下角应显示“状态: 成功”，如图\
  \ 2-19 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig19_HTML.jpg](img/471705_1_En_2_Fig19_HTML.jpg)\n\
  \    图 2-19：测试连接成功的消息。\n    点击 `保存`。新连接将被保存到左侧的列表中，如图 2-20 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig20_HTML.jpg](img/471705_1_En_2_Fig20_HTML.jpg)\n\
  \    图 2-20：列表中的新连接。\n7.  点击 `连接`。SQL Developer 将使用此连接并连接到数据库。连接成功后，SQL Developer\
  \ 窗口中会显示一个以你的连接命名的新选项卡。\n\n### 创建新用户\n\n我们可以继续以 `SYSTEM` 账户创建表，但我们要避免以 `SYSTEM`\
  \ 身份进行操作。我们将创建一个新用户，然后由该用户来创建我们的表。在 SQL Developer 窗口的左侧，你应该能看到 `连接` 字样，其下方是你刚刚创建的连接。找到你的新连接。然后执行以下步骤：\n\
  \n1.  点击连接名称左侧的箭头，展开该连接下的项目。这将显示所有不同类别的对象。\n2.  滚动到此列表的底部，右键单击 `其他用户`，然后选择 `创建用户`，如图\
  \ 2-21 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig21_HTML.jpg](img/471705_1_En_2_Fig21_HTML.jpg)\n\
  \    图 2-21：“创建用户”菜单选项。\n3.  在出现的窗口中，输入新用户的名称，如图 2-22 所示。名称不区分大小写，且不应包含特殊字符或“system”等保留字。如果不确定使用什么，可以用你自己的名字或“intro_user”作为用户名。\n\
  \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig22_HTML.jpg](img/471705_1_En_2_Fig22_HTML.jpg)\n\
  \    图 2-22：“创建用户”窗口。\n4.  在 `新密码` 和 `确认密码` 框中输入密码。\n5.  将所有其他选项留空：复选框和表空间字段。\n\
  6.  点击 `已授予的角色` 选项卡。将出现可用角色的列表。\n7.  点击 `CONNECT` 角色旁边的 `已授予` 复选框，如图 2-23 所示。此 `CONNECT`\
  \ 角色允许用户连接到数据库。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig23_HTML.jpg](img/471705_1_En_2_Fig23_HTML.jpg)\n\
  \    图 2-23：“已授予的角色”选项卡。\n8.  点击 `系统权限` 选项卡。将出现可用权限的列表，如图 2-24 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig24_HTML.jpg](img/471705_1_En_2_Fig24_HTML.jpg)\n\
  \    图 2-24：“系统权限”选项卡。\n9.  点击 `CREATE TABLE` 权限旁边的 `已授予` 复选框。这将允许你创建表。\n10. 点击\
  \ `应用` 按钮。新用户将被创建，并显示一条消息，如图 2-25 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig25_HTML.jpg](img/471705_1_En_2_Fig25_HTML.jpg)\n\
  \    图 2-25：成功消息。\n\n### 使用新用户创建连接\n\n现在你已经有了一个新用户。让我们用这个用户创建一个新连接，这样你就可以开始以这个新用户（而不是管理员用户）的身份使用数据库。你可以遵循与之前创建连接相同的步骤来创建此连接。\n\
  \n简而言之：\n\n1.  点击 SQL Developer 左侧的绿色加号，显示“创建新连接”窗口。\n2.  输入新的连接名，并输入创建用户时使用的用户名和密码。\n\
  3.  将其余连接信息保留为默认值。\n4.  点击 `保存` 以保存连接。\n5.  最后，点击 `连接` 以该用户身份连接。\n\n干得漂亮！你现在已经安装了\
  \ Oracle 数据库，打开了 SQL Developer，并创建了一个新用户以及使用该用户的连接。\n\n\n### 创建表\n\n在开始学习基础 SQL\
