  \n要在 SQL*Plus 中运行查询，只需在登录后于提示符后键入查询。例如，要从 `employee` 表中选择所有记录，请输入此查询：\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig9_HTML.jpg](img/471705_1_En_27_Fig9_HTML.jpg)\n\
