- "# 第十二章：数据排序\n\n在本章中，您将学习如何按特定顺序对结果进行排序。在 SQL 中，从表中选择的数据不能保证以特定顺序显示。如果您想以特定顺序显示它，有一个命令可以使用。\n\
  \n## 12.1 结果无序\n\n当您在表上运行 `SELECT` 查询时，表中的数据会被显示出来供您查看。例如，如果您运行一个 `SELECT` 查询来获取所有行，您会看到所有的行。\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee;\n```\n```\nID   LAST_NAME\
  \   SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n\
  4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    (null)\
  \      (null)\n8    SMITH       62000\n9    PATRICK     40000\n```\n\n如果您查看结果，您会看到它们是按\
  \ `ID` 字段升序（从低到高）排序的。但这种排序并不是您查询的一部分。当您运行查询时，Oracle 不会以特定方式对您的结果进行排序，这意味着您无法保证数据会以这种方式排序。\n\
  \n上一个示例中数据按 ID 号排序的原因是，数据通常按照您添加到数据库的顺序排列。然而，有许多因素可以改变这种行为，例如：\n\n*   从表中删除数据\n\
  *   向表中添加新数据\n*   更新表中的现有数据\n*   其他数据库管理任务\n*   并行数据访问（如在高性能系统中）\n\n因此，如果 Oracle\
  \ 无法保证您的数据会以某种特定方式排序，您该怎么办？您可以在编写查询时指定数据出现的顺序。\n\n### 12.1.1 警告！\n\n开发人员有时会争辩特定情况，说数据库引擎绝不可能返回无序的行。忽略这样的论点。它们总是错的，并且会在最糟糕的时候出错，比如凌晨\
  \ 2 点您最不想被召回办公室解决问题的时候。\n\n## 12.2 使用 ORDER BY 对结果排序\n\nSQL 中有一个子句叫做 `ORDER BY`。它允许您指定结果集中行的出现顺序。`ORDER\
  \ BY` 子句如下所示：\n\n```sql\nORDER BY expression [ASC|DESC]\n```\n\n这个语法包括：\n\n*   `ORDER\
  \ BY` 关键字，用于指示正在执行的操作。\n*   一个表达式，指定您希望如何对结果进行排序。\n*   `ASC` 或 `DESC`，它们是可选的，指定是按升序还是降序对数据进行排序。\n\
  \n您也可以按多个列排序：\n\n```sql\nORDER BY expression [ASC|DESC], expression [ASC|DESC],\
  \ expression [ASC|DESC]...\n```\n\n您可以不断在子句末尾添加表达式，用逗号分隔。您将在本章后面看到这样做的示例。\n\n表达式可以是以下任何一种：\n\
  \n*   列名或包含该列的表达式\n*   代表 `SELECT` 子句中列位置的数字\n*   列别名（您将在本书后面学到）\n\n本章中也会有这些示例。\n\
  \n## 12.3 ORDER BY 示例\n\n让我们看一些对数据进行排序的例子。您可以在 SQL 查询中看到 `ORDER BY` 子句的实际效果，并了解它如何影响结果。\n\
  \n\n\n#### 按文本值排序\n\n首先，你将按 `last_name` 对数据排序，以便按字母顺序查看所有记录。为此，需要在 `SELECT` 查询中添加\
  \ `ORDER BY`。例如：\n\n```\nSELECT id, last_name, salary\nFROM employee\nORDER BY last_name;\n\
  ```\n\n你刚刚添加了 `ORDER BY` 和 `last_name` 列。你可以指定 `ASC`（升序）或 `DESC`（降序），但这是可选的，默认值是\
  \ `ASC`。\n\n结果如下所示：\n\n```\nID   LAST_NAME   SALARY\n5   ANDERSON     31000\n6 \
  \  COOPER       (null)\n1   JONES        20000\n3   KING         40000\n9   PATRICK\
  \      40000\n4   SIMPSON      52000\n2   SMITH        35000\n8   SMITH        62000\n\
  7   (null)       (null)\n```\n\n这些结果按 `last_name` 升序排列。`NULL` 值出现在底部。如果你想明确排序方式，可以在查询中指定关键字\
  \ `ASC`：\n\n```\nSELECT id, last_name, salary\nFROM employee\nORDER BY last_name\
  \ ASC;\n```\n\n结果将是相同的：\n\n```\nID   LAST_NAME   SALARY\n5   ANDERSON     31000\n\
  6   COOPER       (null)\n1   JONES        20000\n3   KING         40000\n9   PATRICK\
  \      40000\n4   SIMPSON      52000\n2   SMITH        35000\n8   SMITH        62000\n\
  7   (null)       (null)\n```\n\n所以，如果结果相同，是否应该添加 `ASC` 关键字？我认为应该，因为它明确说明了数据的排序方式。编写\
  \ SQL 时，通常最好避免任何歧义，并明确指定需要执行的操作。不过，省略 `ASC` 很常见，因此要做好在别人代码中遇到省略 `ASC` 的查询的准备，因为它是默认值。\n\
  \n#### 按数字值排序\n\n让我们看一个关于 `salary` 列的例子。你可以根据最高和最低的 `salary` 值对结果进行排序。\n\n首先，让我们根据最低的\
  \ `salary` 值对数据排序。我们的查询如下所示：\n\n```\nSELECT id, last_name, salary\nFROM employee\n\
  ORDER BY salary ASC;\n```\n\n此查询将按 `salary` 列升序对员工记录排序。结果如下所示：\n\n```\nID  LAST_NAME\
  \   SALARY\n1   JONES       20000\n5   ANDERSON    31000\n2   SMITH       35000\n\
  3   KING        40000\n9   PATRICK     40000\n4   SIMPSON     52000\n8   SMITH \
  \      62000\n6   COOPER      (null)\n7   (null)      (null)\n```\n\n如你所见，最低的 `salary`\
  \ 在顶部，最高的在底部。你也可以对任何列（例如 `salary`）进行降序排序。可以通过将 `ASC` 改为 `DESC` 来实现：\n\n```\nSELECT\
  \ id, last_name, salary\nFROM employee\nORDER BY salary DESC;\n```\n\n结果现在将按相反顺序排序：\n\
  \n```\nID  LAST_NAME   SALARY\n6   COOPER      (null)\n7   (null)      (null)\n\
  8   SMITH       62000\n4   SIMPSON     52000\n3   KING        40000\n9   PATRICK\
  \     40000\n2   SMITH       35000\n5   ANDERSON    31000\n1   JONES       20000\n\
  ```\n\n你可以看到最高的工资出现在列表的顶部。\n\n#### 按不在 SELECT 子句中的列排序\n\n当你按一列排序时，不必在 `SELECT` 子句中指定该列。这意味着你不需要看到该列也能按它排序。\n\
  \n你可以使用前面示例中的查询，并将其修改为从 `SELECT` 子句中移除 `salary` 列。它仍然在 `ORDER BY` 子句中。\n\n```\n\
  SELECT id, last_name\nFROM employee\nORDER BY salary DESC;\n```\n\n结果显示为：\n\n```\n\
  ID  LAST_NAME\n6   COOPER\n7   (null)\n8   SMITH\n4   SIMPSON\n3   KING\n9   PATRICK\n\
  2   SMITH\n5   ANDERSON\n1   JONES\n```\n\n如你所见，`salary` 列没有显示。但是，结果的顺序与前面按 `salary`\
  \ 降序排列的示例相同。\n\n#### 按数字排序\n\n另一种对结果排序的方法是指定一个数字，而不是列名。你指定的数字是 `SELECT` 子句中列的序号。\n\
  \n你可能有一个如下所示的查询：\n\n```\nSELECT id, last_name, salary\nFROM employee;\n```\n\n要按\
  \ `id` 列排序，你可以指定一个 `ORDER BY` 子句：\n\n```\nORDER BY 1 ASC;\n```\n\n这将按 `ID` 列排序，因为数字\
  \ 1 表示 `SELECT` 子句中的第一列，即 `ID`。\n\n```\nSELECT id, last_name, salary\nFROM employee\n\
  ORDER BY 1 ASC;\n```\n\n```\nID  LAST_NAME   SALARY\n1   JONES       20000\n2  \
  \ SMITH       35000\n3   KING        40000\n4   SIMPSON     52000\n5   ANDERSON\
  \    31000\n6   COOPER      (null)\n7   (null)      (null)\n8   SMITH       62000\n\
  9   PATRICK     40000\n```\n\n数据按 `ID` 列排序。要改为按 `last_name` 列排序，可以将数字 1 改为 2。\n\n\
  ```\nSELECT id, last_name, salary\nFROM employee\nORDER BY 2 ASC;\n```\n\n```\n\
  ID  LAST_NAME   SALARY\n5   ANDERSON    31000\n6   COOPER      (null)\n1   JONES\
  \       20000\n3   KING        40000\n9   PATRICK     40000\n4   SIMPSON     52000\n\
  2   SMITH       35000\n8   SMITH       62000\n7   (null)      (null)\n```\n\n列号的工作方式与指定列名相同。那么为什么要使用数字而不是名称呢？列号更容易输入，可用于你编写的临时\
  \ SQL 脚本。但是，我建议在编写将被其他人或应用程序使用的代码时使用完整的列名，因为它更容易理解正在排序的是哪一列，并且不易因数据库更改而出错。\n\n####\
  \ ORDER BY 与 NULL 值\n\n你可能已经注意到前面的示例中出现了一些 `NULL` 值。默认情况下，当按升序排序时，`NULL` 值出现在结果的底部；当按降序排序时，出现在结果的顶部。\n\
  \n在 Oracle SQL 中，你可以根据需要为查询更改此行为。你可以在 `ORDER BY` 子句的末尾指定两个可选关键字之一，以指示你希望如何处理 `NULL`\
  \ 值：\n\n*   `NULLS FIRST`：`NULL` 值显示在列表的**顶部**，无论排序方式如何。\n*   `NULLS LAST`：`NULL`\
  \ 值显示在列表的**底部**，无论排序方式如何。\n\n例如，如果你想按 `salary` 降序排序，但希望 `NULL` 值显示在底部而不是顶部，你的查询如下所示：\n\
  \n```\nSELECT id, last_name, salary\nFROM employee\nORDER BY salary DESC NULLS LAST;\n\
  ```\n\n```\nID  LAST_NAME   SALARY\n8   SMITH       62000\n4   SIMPSON     52000\n\
  3   KING        40000\n9   PATRICK     40000\n2   SMITH       35000\n5   ANDERSON\
  \    31000\n1   JONES       20000\n7   (null)      (null)\n6   COOPER      (null)\n\
  ```\n\n`salary` 值按降序排序，`NULL` 值显示在末尾。要让 `NULL` 值显示在顶部：\n\n```\nSELECT id, last_name,\
  \ salary\nFROM employee\nORDER BY salary DESC NULLS FIRST;\n```\n\n结果是：\n\n```\n\
  ID  LAST_NAME   SALARY\n6   COOPER      (null)\n7   (null)      (null)\n8   SMITH\
  \       62000\n4   SIMPSON     52000\n3   KING        40000\n9   PATRICK     40000\n\
  2   SMITH       35000\n5   ANDERSON    31000\n1   JONES       20000\n```\n\n\n\n\
  #### 按多列排序\n\n在之前的示例中，你已经看到了如何按单列排序。如果想按两列或更多列排序该怎么办？SQL 中可以做到。要按多个列排序，只需添加一个逗号，然后是列名或列号，接着是排序方向（`ASC`\
  \ 表示升序，`DESC` 表示降序）。\n\n例如，要按 `last_name` 列排序，然后再按 `salary` 列排序：\n\n```sql\nSELECT\
  \ id, last_name, salary\nFROM employee\nORDER BY last_name ASC, salary DESC;\n```\n\
  \n```\nID  LAST_NAME   SALARY\n5   ANDERSON    31000\n6   COOPER      (null)\n1\
  \   JONES       20000\n3   KING        40000\n9   PATRICK     40000\n4   SIMPSON\
  \     52000\n8   SMITH       62000\n2   SMITH       35000\n7   (null)      (null)\n\
  ```\n\n结果首先按 `last_name` 升序排序，然后对于 `last_name` 相同的行，再按 `salary` 降序排序。\n\n在这个查询中，你按两列进行了排序。并且，这两列的排序方式不同：一列升序，一列降序。没有规则规定它们必须采用相同的顺序。你可以使用类似的语法按三列排序：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nORDER BY last_name ASC, salary\
  \ ASC, id ASC;\n```\n\n```\nID  LAST_NAME   SALARY\n5   ANDERSON    31000\n6   COOPER\
  \      (null)\n1   JONES       20000\n3   KING        40000\n9   PATRICK     40000\n\
  4   SIMPSON     52000\n2   SMITH       35000\n8   SMITH       62000\n7   (null)\
  \      (null)\n```\n\n数据将按你指定的方式排序。对于这么小的表格，可能不太容易看出数据的排序方式，但如果是大表，效果会更明显。\n\n你不必让所有列都按相同方式排序。例如，可以让一列升序排序，另一列降序排序：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nORDER BY last_name ASC, salary\
  \ DESC;\n```\n\n结果是：\n\n```\nID  LAST_NAME   SALARY\n5   ANDERSON    31000\n6  \
  \ COOPER      (null)\n1   JONES       20000\n3   KING        40000\n9   PATRICK\
  \     40000\n4   SIMPSON     52000\n8   SMITH       62000\n2   SMITH       35000\n\
  7   (null)      (null)\n```\n\n你会注意到在 `last_name` 为 `SMITH` 的行上存在差异。数据仍然首先按 `last_name`\
  \ 升序排序，但当 `last_name` 相同时，`salary` 按降序排序。`SMITH` 的行被排序为薪资 62000 的排在薪资 35000 的前面。\n\
  \n### 你真的需要对数据进行排序吗？\n\n你已经看到了如何对查询结果进行排序。这样做可以更方便地查看数据并理解表中的内容。\n\n然而，并非总是需要对数据进行排序。使用\
  \ `ORDER BY` 子句可能是一个相当耗费资源的操作。对于一个包含十条记录的表来说，影响可能不大，但当你处理成百上千条结果时，使用 `ORDER BY`\
  \ 子句会减慢查询速度。\n\n如果你确实需要以特定顺序显示结果，那么请随意使用 `ORDER BY` 子句。因为你的需要就是需要，数据库引擎就是为你工作的。但是，如果结果的顺序对你或应用程序来说无关紧要，那就不要排序。\n\
  \n一些可能需要对结果排序的查询示例有：\n\n*   特定客户的所有订单，按订单日期排序，以便客户查看列表\n*   某个类别中的所有产品，按名称排序，以便在你的网站上展示\n\
  \n一些可能不需要对结果排序的查询示例有：\n\n*   选修某门课程的学生列表，因为你可能想让用户自行决定排序方式，或者根本不想排序\n*   将在页面下拉框中使用的唯一状态值列表。\n\
  \n### 小结\n\n使用 `ORDER BY` 子句，可以按特定顺序显示查询结果。你可以指定列名或其在 `SELECT` 子句中出现的位置。结果可以按某列升序或降序排序。你可以指定多个列来对结果进行排序，并且每个列都可以指定升序或降序。\n\
  \n## 12. 应用表与列别名\n\n到目前为止的所有章节中，你已经学习了如何查看数据库表中的数据。你学习了如何使用多种不同方法来选择要显示的列和行。\n\n\
  在第二部分的最后一章，我们将探讨两种可用于改进 SQL 查询的技术，使它们更易于编写且结果更易于理解。第一种技术称为 `表别名`。\n\n### 什么是表别名？\n\
  \n`表别名` 是你在 SQL 查询中可以赋予表的一个替代名称。此别名仅适用于你的查询，不会对数据库进行永久性更改。\n\n为什么你想在查询中使用表别名？\n\n\
  *   它可以使你在查询中引用列时更轻松、更快速。\n*   在处理涉及两个或更多表的查询时更容易（你将在本书后面学习到）。\n*   某些类型的查询需要使用表别名，你将在本书后面学习到。\n\
  \n表别名是什么样子的？它是在 `FROM` 子句中表名之后的一个简短名称：\n\n```sql\nSELECT columns\nFROM table_name\
  \ alias_name;\n```\n\n`alias_name` 是你提供的名称。你先写表名，然后一个空格，接着是 `alias_name`。`alias_name`\
  \ 可以随心所欲地短或长。你可以写一个短的别名，比如单个字母，或者一个长的别名。\n\n一旦完成此操作，你就可以在查询中引用任何列时，将该别名用作前缀。\n\n\
  让我们看一个这方面的例子。\n\n### 表别名示例\n\n我们将从之前章节中看到的对 `employee` 表的查询开始。我们的查询是：\n\n```sql\n\
  SELECT id, last_name, salary\nFROM employee;\n```\n\n你可以在表名后添加一个空格和一个名称来为此查询添加表别名：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee e;\n```\n\n在这个例子中，我使用了别名 `e`。这很有帮助，因为：\n\
  \n*   它易于输入，因为它是单个字符。\n*   它比完整的表名 `employee` 更短。\n*   它以相同的字母开头，因此当你阅读查询时，可以看出\
  \ `e` 是 `employee` 的缩写。\n\n设置了表别名后，我们现在可以更新 `SELECT` 子句以使用此表别名。这样做有几个原因，我们在本章前面已经提到过（输入更快，对多表查询有帮助）。其中一个更快的方式是使用一个称为“智能感知”或“自动完成”的功能。\n\
  \n\n\n### 智能感知或自动完成\n\n智能感知，或常被称为自动完成，是许多软件开发工具中的一项功能，它能让你更快地编写代码。它在 `SQL Developer`\
  \ 中可用，并且当你使用表别名时很容易触发。让我们看一个示例。\n\n1.  打开 `SQL Developer` 并连接到你的数据库，方式与前面章节相同。你的屏幕应显示一个新的\
  \ SQL 窗口，如图 12-1 所示。\n\n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig1_HTML.jpg](img/471705_1_En_12_Fig1_HTML.jpg)\n\
  \n    图 12-1：新的 SQL 窗口\n\n2.  输入查询的一部分：\n\n    ```sql\n    SELECT\n    FROM employee\
  \ e;\n    ```\n\n3.  你的屏幕应如图 12-2 所示。如果出现红色下划线，目前可以忽略。它只是提醒你查询不完整，因为你尚未指定任何列。\n\n\
  \    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig2_HTML.jpg](img/471705_1_En_12_Fig2_HTML.jpg)\n\
  \n    图 12-2：SQL Developer 中的查询\n\n4.  现在，将光标放在 `SELECT` 单词后面，按空格，然后输入你的别名 \"e\"\
  ，接着输入一个句点字符 \" . \"。你的 `SELECT` 子句应看起来像 `SELECT e.` （如图 12-3 所示）。\n\n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig3_HTML.jpg](img/471705_1_En_12_Fig3_HTML.jpg)\n\
  \n    图 12-3：自动完成选项\n\n5.  弹出的窗口显示了 `employee` 表中所有可用的列。你可以通过按上下箭头键、输入部分列名或在列表中点击名称来选择一个列。\n\
  6.  重复这些步骤，直到你输入了查询中想要显示的所有列。\n\n这个出现的弹出窗口被称为智能感知或自动完成。当使用表别名时很容易触发它。只需输入别名和一个句点即可触发。此功能使你可以轻松地从表中选择列包含在查询中，节省时间并防止因列名输入错误而导致的错误。\n\
  \n如果你运行带有表别名的查询，结果将与不带表别名时相同：\n\n```sql\nSELECT e.id, e.last_name\nFROM employee\
  \ e;\n```\n\n```\nID   LAST_NAME\n1    JONES\n2    SMITH\n3    KING\n4    SIMPSON\n\
  5    ANDERSON\n6    COOPER\n7    (null)\n8    SMITH\n9    PATRICK\n```\n\n### 更长的表别名\n\
  \n你不必为表别名使用单个字母。许多网上的 `SQL` 代码示例使用单个字母，而另一些则使用更多字母。使用单个字母的缺点是，当查询中有多个表可能以相同字母开头时，它无法立即明确它指的是哪个表。\n\
  \n例如，假设你的数据库有一个名为 `product` 的表，用于存储其销售产品的详细信息。你可能还有一个名为 `pay_rate` 的表，其中包含员工的不同工资率。如果你有一个查询使用表别名\
  \ \"p\"，你能否轻易分辨它指的是 `product` 表而不是 `pay_rate` 表？\n\n在某些情况下，尤其是较长的查询中，你可能希望使用较长的表别名名称。名称越长，输入就越困难，因此你需要在名称太短缺乏信息量和太长无法成为有效别名之间取得平衡。\n\
  \n我通常尝试将我的别名最多保持在四到五个字符。你可以使用别名 \"emp\" 为 `employee` 表制作一个更具描述性的别名。\n\n```sql\n\
  SELECT emp.id, emp.last_name, emp.salary\nFROM employee emp;\n```\n\n这足够短，易于输入，也足够长以描述该表是什么。\n\
  \n### 如果我不使用表别名会怎样？\n\n所有这些为表（这只是表的另一个名称）添加别名以使输入更容易的努力？如果你不想使用表别名呢？\n\n你不必使用。在我编写的许多查询中，我不使用别名。它是一个可选功能，在较小的查询中并不常用。但了解这个功能的存在是好的，无论是在\
  \ `SQL` 中还是在 `SQL Developer` 软件中。\n\n### 什么是列别名？\n\n`SQL` 的另一个有助于编写查询的功能是 `列别名`。`列别名`\
  \ 是你赋予结果中显示的列的名称。\n\n使用 `列别名` 有几个原因：\n\n*   使输出的标题更便于用户阅读\n*   使输出的标题更便于应用程序使用\n\
  *   使该列可在查询的其他部分使用\n\n就像表别名一样，`列别名` 是一个可选功能。与表别名不同，`SQL Developer` 中没有内置任何专门利用 `列别名`\
  \ 的功能。\n\n要使用 `列别名`，你在查询中的列名后添加一个名称：\n\n```sql\nSELECT column_name [AS] column_alias\n\
  FROM table;\n```\n\n中间有一个关键字 `AS`，用于定义 `列别名`。然而，它是一个可选关键字：`列别名` 在有或没有它的情况下都能工作。\n\
  \n让我们看一个例子。\n\n### 列别名示例\n\n我们可以从本章前面的查询开始：\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee;\n```\n\n如果你运行此查询，你会得到以下输出：\n\n```\nID   LAST_NAME   SALARY\n1   \
  \ JONES       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON\
  \     52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    (null)      (null)\n\
  8    SMITH       62000\n9    PATRICK     40000\n```\n\n`SQL Developer` 和许多其他集成开发环境\
  \ (IDE) 会将 `SELECT` 子句中的列名显示为这里的列标题。\n\n如果你想为标题使用不同的名称怎么办？你可以调整你的表，但这意味着所有其他使用此表的查询都需要更新，否则它们将无法再工作。\n\
  \n更好的方法是使用 `列别名`。假设你希望将 `last_name` 列显示为 \"surname\"。你可以调整你的查询：\n\n```sql\nSELECT\
  \ id, last_name AS surname, salary\nFROM employee;\n```\n\n如果你运行查询，你的结果将如下所示：\n\n\
  ```\nID   SURNAME     SALARY\n1    JONES       20000\n2    SMITH       35000\n3\
  \    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER\
  \      (null)\n7    (null)      (null)\n8    SMITH       62000\n9    PATRICK   \
  \  40000\n```\n\n列标题现在叫做 `surname`。`employee` 表没有做任何更改（只有你的查询），因此数据库或应用程序的其他部分不会受到影响。如果你不想包含\
  \ `AS` 关键字，因为它是可选的，你的查询将如下所示：\n\n```sql\nSELECT id, last_name surname, salary\n\
  FROM employee;\n```\n\n此查询的结果将是相同的。\n\n```\nID   SURNAME     SALARY\n1    JONES\
  \       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON    \
  \ 52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    (null)      (null)\n\
  8    SMITH       62000\n9    PATRICK     40000\n```\n\n\n\n### AS 关键字\n\n如果列别名的\
  \ `AS` 关键字是可选的，你应该使用它吗？当然，输入得越少越好？我建议你在使用列别名时总是包含 `AS` 关键字。原因如下。\n\n假设你有一个像前面那样的查询：\n\
  \n```sql\nSELECT id, last_name surname, salary\nFROM employee;\n```\n\n仔细看这个查询，它包含三列，`last_name`\
  \ 列有一个别名 `surname`。然而，`surname` 看起来可能像一个额外的列。仅通过查看这个查询，你如何知道 `surname` 是列别名，还是写查询的人忘了在\
  \ `last_name` 列后加逗号，而 `surname` 实际上是另一列？\n\n区分起来并不容易。在这个例子中，查询会运行，就像之前那样。然而，假设你有一个像这样的查询：\n\
  \n```sql\nSELECT id, last_name salary\nFROM employee;\n```\n\n这看起来像是你想选择三列：`id`、`last_name`\
  \ 和 `salary`。这在本书中我们已经见过很多次了。然而，当你运行查询时，你会看到这样的结果：\n\n```sql\nID   SALARY\n1   \
  \ JONES\n2    SMITH\n3    KING\n4    SIMPSON\n5    ANDERSON\n6    COOPER\n7    (null)\n\
  8    SMITH\n9    PATRICK\n```\n\n为什么 `last_name` 列被命名为 `salary`？或者为什么 `salary` 列显示的是看起来像名字的文本值？仔细看你的查询，你能发现问题所在：\n\
  \n```sql\nSELECT id, last_name salary\nFROM employee;\n```\n\n在 `last_name` 列的结尾和\
  \ `salary` 列的开始之间缺少一个逗号。Oracle 数据库不知道你的意图；它只知道被告知的内容，所以它看着 `last_name` 列并称其为“salary”。\n\
  \n如果你为每一个使用的列别名都指定 `AS` 关键字，就能立即清楚地表明这应该是一个列别名，而不是一个缺少逗号的列。在 SQL 中，有时使用稍长的语句版本以使读者更清楚，比使用短版本节省时间但导致后续更多问题要好。\n\
  \n> **注意：**\n> 在指定列别名时使用 `AS` 关键字，有助于你和其它开发人员知道后面的单词应该是一个列别名，而不是输入错误的查询。\n\n###\
  \ 数学运算与列别名\n\nSQL 的另一个特性是能够对列执行*数学运算*。这包括加、减、乘、除这些基本操作。它们使用以下符号完成：\n\n*   `+` 表示加法\n\
  *   `-` 表示减法\n*   `*` 表示乘法\n*   `/` 表示除法\n\n要执行其中一种操作，输入一个列或值，然后是其中一个符号，接着是另一个列或值。\n\
  \n#### 加法\n\n例如，我们的 `salary` 列表示每位员工的年薪。要显示如果将其增加 10000 后的值，我们的查询将是：\n\n```sql\n\
  SELECT id, last_name, salary + 10000\nFROM employee;\n```\n\n结果将是：\n\n```sql\nID\
  \   LAST_NAME   SALARY+10000\n1    JONES       30000\n2    SMITH       45000\n3\
  \    KING        50000\n4    SIMPSON     62000\n5    ANDERSON    41000\n6    COOPER\
  \      (null)\n7    (null)      (null)\n8    SMITH       72000\n9    PATRICK   \
  \  50000\n```\n\n显示的数值比原始的 `salary` 值多 10000。你怎么确定呢？你怎么知道之前的 `salary` 值是多少？\n\n\
  你可以把它加入查询中。没有规则说不能多次选择同一个列。要同时查看旧的 `salary` 值，你可以运行这个查询：\n\n```sql\nSELECT id, last_name,\
  \ salary, salary + 10000\nFROM employee;\n```\n\n结果将是：\n\n```sql\nID   LAST_NAME\
  \  SALARY    SALARY+10000\n1    JONES      20000     30000\n2    SMITH      35000\
  \     45000\n3    KING       40000     50000\n4    SIMPSON    52000     62000\n\
  5    ANDERSON   31000     41000\n6    COOPER     (null)    (null)\n7    (null) \
  \    (null)    (null)\n8    SMITH      62000     72000\n9    PATRICK    40000  \
  \   50000\n```\n\n你可以看到旧值和新值。所有 `salary` 值都增加了 10000，除了那些 `salary` 为 `NULL` 的记录。这是因为\
  \ `NULL` 表示未知，而给一个未知值加上 10000 仍然是一个未知值。\n\n这与列别名有什么关系？如果你看结果，可以看到“`salary plus 10000`”这一列的列标题是“`SALARY+10000`”。默认情况下，Oracle\
  \ 会像这样标记你的列标题，通过合并任何运算符并删除空格。这对你或任何使用此值的应用程序来说都不太易读，所以我们可以给它一个列别名。\n\n假设你想将新列命名为\
  \ `new_salary`。我们的查询将是：\n\n```sql\nSELECT id, last_name, salary, salary + 10000\
  \ AS new_salary\nFROM employee;\n```\n\n你的结果将如下所示：\n\n```sql\nID   LAST_NAME   SALARY\
  \    NEW_SALARY\n1    JONES       20000     30000\n2    SMITH       35000     45000\n\
  3    KING        40000     50000\n4    SIMPSON     52000     62000\n5    ANDERSON\
  \    31000     41000\n6    COOPER      (null)    (null)\n7    (null)      (null)\
  \    (null)\n8    SMITH       62000     72000\n9    PATRICK     40000     50000\n\
  ```\n\n这个列标题 `NEW_SALARY` 比 `SALARY+10000` 更容易阅读，也更容易被应用程序处理。\n\n#### 减法\n\n你可以在\
  \ SQL 代码中以与执行加法相同的方式执行减法。例如，从工资值中减去 5000，你的查询如下所示：\n\n```sql\nSELECT id, last_name,\
  \ salary, salary - 5000\nFROM employee;\n```\n\n这个查询的结果是：\n\n```sql\nID   LAST_NAME\
  \   SALARY   SALARY-5000\n1    JONES       20000    15000\n2    SMITH       35000\
  \    30000\n3    KING        40000    35000\n4    SIMPSON     52000    47000\n5\
  \    ANDERSON    31000    26000\n6    COOPER      (null)   (null)\n7    (null) \
  \     (null)   (null)\n8    SMITH       62000    57000\n9    PATRICK     40000 \
  \   35000\n```\n\n你可以给这个新列一个列别名：\n\n```sql\nSELECT id, last_name, salary, salary\
  \ - 5000 AS low_salary\nFROM employee;\n```\n\n这个查询的结果是：\n\n```sql\nID   LAST_NAME\
  \   SALARY   LOW_SALARY\n1    JONES       20000    15000\n2    SMITH       35000\
  \    30000\n3    KING        40000    35000\n4    SIMPSON     52000    47000\n5\
  \    ANDERSON    31000    26000\n6    COOPER      (null)   (null)\n7    (null) \
  \     (null)   (null)\n8    SMITH       62000    57000\n9    PATRICK     40000 \
  \   35000\n```\n\n这显示了 `salary` 值减去 5000，并带有标签 `LOW_SALARY`。\n\n\n\n#### 乘法\n\n\
  你可以像加法和减法一样，使用 \"`*`\" 符号将一个值乘以另一个值。假设你想将 `salary` 值乘以 5，以查看 5 年的工资总成本。我们的查询将如下所示：\n\
  \n```sql\nSELECT id, last_name, salary, salary * 5\nFROM employee;\n```\n\n这个查询的结果是：\n\
  \n```\nID   LAST_NAME   SALARY   SALARY*5\n1    JONES       20000    100000\n2 \
  \   SMITH       35000    175000\n3    KING        40000    200000\n4    SIMPSON\
  \     52000    260000\n5    ANDERSON    31000    155000\n6    COOPER      (null)\
  \   (null)\n7    (null)      (null)   (null)\n8    SMITH       62000    310000\n\
  9    PATRICK     40000    200000\n```\n\n你可以看到 `salary` 已被乘以 5 以显示新值。也可以为这个值应用列别名，使其更具可读性：\n\
  \n```sql\nSELECT id, last_name, salary, salary * 5 AS five_year_salary\nFROM employee;\n\
  ```\n\n这个查询的结果是：\n\n```\nID   LAST_NAME   SALARY   FIVE_YEAR_SALARY\n1    JONES\
  \       20000    100000\n2    SMITH       35000    175000\n3    KING        40000\
  \    200000\n4    SIMPSON     52000    260000\n5    ANDERSON    31000    155000\n\
  6    COOPER      (null)   (null)\n7    (null)      (null)   (null)\n8    SMITH \
  \      62000    310000\n9    PATRICK     40000    200000\n```\n\n在这个例子中，别名是 `FIVE_YEAR_SALARY`。这可能看起来有点奇怪，因为它比\
  \ `SALARY` 列名长，但它比 `SALARY*5` 更易读，也更容易被应用程序使用。\n\n#### 除法\n\n最后，你可以使用 \"`/`\" 符号在\
  \ SQL 中对值进行除法运算。它的工作方式与其他符号相同。假设你想查看每位员工的月薪。你可以将现有的年薪 `salary` 除以 12 来得到月薪。\n\n\
  ```sql\nSELECT id, last_name, salary, salary / 12\nFROM employee;\n```\n\n这个查询的结果是：\n\
  \n```\nID   LAST_NAME   SALARY   SALARY/12\n1    JONES       20000    1666.666667\n\
  2    SMITH       35000    2916.666667\n3    KING        40000    3333.333333\n4\
  \    SIMPSON     52000    4333.333333\n5    ANDERSON    31000    2583.333333\n6\
  \    COOPER      (null)   (null)\n7    (null)      (null)   (null)\n8    SMITH \
  \      62000    5166.666667\n9    PATRICK     40000    3333.333333\n```\n\n现在显示的所有值都是小数，因为没有一个值能被\
  \ 12 整除。你将在后面的章节中学习如何对这些数字进行四舍五入。\n\n如果你想给你的列起一个别名，也可以这样做：\n\n```sql\nSELECT id,\
  \ last_name, salary, salary / 12 AS monthly_salary\nFROM employee;\n```\n\n这个查询的结果是：\n\
  \n```\nID   LAST_NAME   SALARY   MONTHLY_SALARY\n1    JONES       20000    1666.666667\n\
  2    SMITH       35000    2916.666667\n3    KING        40000    3333.333333\n4\
  \    SIMPSON     52000    4333.333333\n5    ANDERSON    31000    2583.333333\n6\
  \    COOPER      (null)   (null)\n7    (null)      (null)   (null)\n8    SMITH \
  \      62000    5166.666667\n9    PATRICK     40000    3333.333333\n```\n\n在这些结果中，该列现在有了一个新的标题。正如你所见，使用列别名在处理数学运算时特别有用。\n\
  \n### 列别名与表别名\n\n在本章中，你已经分别在不同的查询中学习了列别名和表别名。它们实际上可以在同一个查询中使用，以使你的查询更具可读性。\n\n你可以使用本章前面查找月薪的查询。\n\
  \n```sql\nSELECT id,\nlast_name,\nsalary,\nsalary / 12 AS monthly_salary\nFROM employee;\n\
  ```\n\n这个查询使用列别名将 `salary / 12` 重命名为 `monthly_salary`。你可以将表别名与此查询一起使用：\n\n```sql\n\
  SELECT e.id,\ne.last_name,\ne.salary,\ne.salary / 12 AS monthly_salary\nFROM employee\
  \ e;\n```\n\n在这个查询中，每次我们引用 `employee` 表中的列时，我们都使用了表别名 \"`e`\"。正如我们之前提到的，对于像这样简单的查询，这可能看起来工作量太大，但这是学习使用更复杂查询时的一个重要技巧。\n\
  \n### 总结\n\n表别名和列别名都是 SQL 中的可选功能，可以在你的查询中使用。表别名允许你为表在查询中指定另一个名称，这通常比真实名称短。当你处理更复杂的查询时，它们很有帮助，并且它们允许你使用\
  \ IDE 的智能感知或自动完成功能。\n\n列别名允许你为输出中的列指定另一个名称或标签，使其更易于用户阅读，也更容易被其他应用程序处理。\n\n数学运算允许你在\
  \ SQL 中对值进行加、减、乘、除，这些是使用列别名的常见目标。最后，你可以在单个查询中同时使用列别名和表别名。当你转向更复杂的查询时，你会发现这些功能更有用。\n\
  \n"
- '# 第三部分 添加、更新、删除数据


  '
- "# 第 13 章 理解数据类型\n\n在本章中，你将学习什么是数据类型、为什么需要它们，以及 Oracle 数据库如何处理不同的数据类型。\n\n### 什么是数据类型？\n\
  \n`数据类型`是信息在数据库中存储的格式。表中的每个列都有一个数据类型，这是在创建表并指定列名时定义的。\n\n如果你以前做过任何编程，比如 .Net 或 Java，你会知道这些语言中有不同的数据类型可用。数据库开发和\
  \ SQL 也不例外。有可用的数据类型来指定数据的存储方式。\n\n你还记得本书前面创建 `employee` 表的时候吗？我们要求你为 `ID`、`last_name`\
  \ 和 `salary` 列选择数据类型（图 13-1）。\n\n![../images/471705_1_En_13_Chapter/471705_1_En_13_Fig1_HTML.jpg](img/471705_1_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1. 向表中添加列时选择数据类型\n\n这一步就是指定每个列的数据类型的地方。你指定了：\n\n*   `ID` 列是某种数字。\n*   `last_name`\
  \ 列是文本值。\n*   `salary` 列也是数字。\n\n\n\n### 我们为什么需要不同的数据类型？\n\n当你创建一张表时，你指定了列名。这应该就是你需要做的全部事情了，对吧？那我们为什么要关心数据类型呢？存在不同数据类型的原因有几个。\n\
  \n首先，它使得数据库能够更高效地存储数据。如果你将每张表的每一列都定义为最多 10,000 个字符的文本值，那么数据库就需要为这些情况预留那么多存储空间，无论你想存储\
  \ 10,000 个字符的情况有多么罕见。为你的每一列定义合适的数据类型将意味着数据库可以高效地存储数据。\n\n这也意味着你的查询会更快。将本应是数字的值存储为“数字”数据类型，意味着数据库可以更容易地搜索特定值（因为它知道字段的限制，例如是数字而不是字母）。如果值应该存储为数字而不是文本，这也意味着数学计算可以更容易、更快速地执行。\n\
  \n使用合适的数据类型还可以防止无效数据。使用数据库存储数据的主要好处之一，就是你可以对数据存储施加限制。例如，存储一个“订单日期”可以存储为文本值，但这可能意味着你会得到像这样的值：\n\
  *   30/01/2018\n*   01/30/2018\n*   30-Jan 2018\n*   40 Jan 2018\n*   124/Abc/1000\n\
  \n其中一些值是没问题的，但另一些则不是。然而，如果我们将这个“订单日期”存储为日期值，那么我们就可以使用数据库内置的验证来检查无效日期。Oracle 数据库会知道“40\
  \ Jan 2018”不是一个有效的日期，因此它不会存储这个值。这确保了你的数据保持高质量并防止错误。\n\n所以，总而言之，数据类型用于高效地存储数据、提高查询性能以及防止无效数据。\n\
  \n### 有哪些不同的数据类型？\n\n我们已经介绍了什么是数据类型以及为什么使用它们。那么存在哪些类型的数据类型，你如何使用它们呢？\n\nOracle 数据库（以及许多其他数据库和编程语言）中的数据类型可以分为三组：文本、数字和日期。每一组都有一系列可以用于你的列的数据类型。\n\
  \n#### 文本数据类型\n\nOracle 中的文本数据类型用于存储文本值。它们可以用来存储字母字符、数字以及许多特殊字符。\n\nOracle 提供了许多不同的数据类型来存储文本值，每种都有其特定的用途。让我们逐一了解一下。\n\
  \n##### CHAR\n\nOracle 有一种名为`CHAR`的数据类型，它是“character”（字符）的缩写。它存储字符串，这是一个编程术语，意思是“文本值”。这种数据类型以固定长度存储数据，这意味着无论实际存储的值是什么，该值占用的空间量都是相同的。\n\
  \n当你指定一个`CHAR`列时，你需要指定一个长度值。这表示要在字段中存储的字符数，必须在 1 到 2000 之间。只要长度等于或短于这个数字，你可以在这个列中存储任何文本值。例如，一个长度为\
  \ 10 的`CHAR`列可以存储“Car”和“Fast Car”的值，但不能存储“Red Sports Car”，因为“Red Sports Car”长于 10\
  \ 个字符。\n\n关于`CHAR`主要要记住的是：小于你定义的长度的值，其右侧会被添加空格字符以满足该长度。这意味着如果你在一个长度为 10 的`CHAR`列中存储一个“Fast\
  \ Car”的值，实际存储的值是“Fast Car  ”。末尾添加了两个空格以使长度达到 10。\n\n要将一个列定义为带有长度的`CHAR`，你使用单词`CHAR`，然后在括号内指定长度：\n\
  \n```sql\nCHAR(10)\n```\n\n你可以更改括号内的数字为你想使用的长度。对于一个长度为 150 的`CHAR`值，使用此代码：\n\n```sql\n\
  CHAR(150)\n```\n\n**注意**：添加到`CHAR`列的值会在其右侧添加空格字符，以使值的长度达到`CHAR`列定义的长度。\n\n#####\
  \ VARCHAR2\n\nOracle 中的`VARCHAR2`数据类型也存储字符串或文本值，与`CHAR`数据类型类似。`VARCHAR2`是“variable\
  \ character”（可变字符）的缩写。在定义`VARCHAR2`列时需要指定一个最大长度，该长度必须在 1 到 4000 之间，表示字符数。然而，这个长度是可变的。这意味着你存储的值不会在末尾添加空格字符来满足你定义的长度。\n\
  \n例如，如果你声明一个长度为 10 字节的`VARCHAR2`列，那么你可以存储“Car”或“Fast Car”的值。当你存储这些值时，不会添加空格，所以“Fast\
  \ Car”的值会按你输入的方式精确存储。\n\n根据我的经验，`VARCHAR2`是最常见的数据类型之一，所以你会经常用到它。\n\n为什么它叫`VARCHAR2`而不是`VARCHAR`？这是因为`VARCHAR`是一个\
  \ SQL 标准数据类型，未在 Oracle SQL 中使用。当 Oracle 想要实现自己的`VARCHAR`版本时，他们创建了`VARCHAR2`，而不是改变`VARCHAR`的工作方式。这也意味着他们可以在未来的某个时间点实现`VARCHAR`标准。\n\
  \n定义一个`VARCHAR2`与`CHAR`类似，你在括号内指定长度：\n\n```sql\nVARCHAR2(20)\n```\n\n这意味着定义了一个最大长度为\
  \ 20 字节的`VARCHAR2`数据类型。字节和字符之间的区别细微但重要。一个字符存储为字节，在许多情况下，一个字节就是一个字符。然而，有些字符需要多个字节来存储。\n\
  \n##### NCHAR\n\n`NCHAR`数据类型是“Unicode character”（Unicode 字符）的缩写。它与`CHAR`数据类型非常相似，因为它存储固定长度的字符数据，并为较短的值添加空格以使其达到你指定的长度。\n\
  \n但是，它用于存储包含 Unicode 字符的文本值。Unicode 字符是软件中可以使用的一组特殊字符。它们在 Oracle 中有自己的数据类型，因为存储这些字符通常需要多于一个字节。Unicode\
  \ 字符的一些例子是：\n*   数学字符，例如表示“求和”的希腊符号：Σ\n*   许多带重音的字符：例如，â\n\n我们习惯的标准字符，例如字母表和键盘上可见的符号，每个字符可以存储在一个字节的数据中。这使得它们可以存储在`CHAR`数据类型中，因为一个字节等于一个字符。\n\
  \n对于 Unicode 字符，一个字符可能需要存储在多个字节中，因此需要一个特殊的数据类型。这意味着，如果你想存储这些特殊的 Unicode 字符，并且需要将它们存储在固定长度中，请使用`NCHAR`而不是`CHAR`。\n\
  \n要定义一个`NCHAR`数据类型，像`CHAR`数据类型一样，在括号内以字节为单位指定长度。\n\n```sql\nNCHAR(30)\n```\n\n这定义了一个长度为\
  \ 30 字节的`NCHAR`数据类型。\n\n\n\n##### NVARCHAR2\n\n`NVARCHAR2` 是 `VARCHAR2` 的 Unicode\
  \ 版本。就像 `NCHAR` 数据类型一样，它允许存储 Unicode 字符，但它采用了 `VARCHAR2` 的可变长度概念，这意味着您可以存储所需的值，而无需为其添加额外的空格字符。\n\
  \n要定义 `NVARCHAR2` 数据类型，请在括号内指定长度，就像 `VARCHAR2` 数据类型一样。\n\n```\nNVARCHAR2(200)\n\
  ```\n\n这定义了一个长度为 200 字节的 `NVARCHAR2` 数据类型。\n\n下表总结了我们刚刚介绍的不同数据类型。\n\n|     | 定长（用空格填充）\
  \ | 变长（最大长度） |\n| --- | --- | --- |\n| 标准字符 | `CHAR` | `VARCHAR2` |\n| Unicode 字符\
  \ | `NCHAR` | `NVARCHAR2` |\n\n如果您想知道应该使用哪种数据类型，我将在本章后面解释一些建议。\n\n##### LONG\n\n\
  `LONG` 数据类型可用于存储长度高达 2GB 的文本值。`VARCHAR2` 的最大长度为 4000 字节，即 4KB。`LONG` 比这要大得多。\n\n\
  但是，我不建议创建带有 `LONG` 数据类型的列，因为它已被 Oracle 弃用。这意味着 Oracle 已确定在未来版本中不会支持它，并且仅在最近的版本中包含它，以确保使用带有\
  \ `LONG` 数据类型的旧代码的客户的数据库不会崩溃。\n\n如果您想在单个字段中存储大量数据，建议使用 `LOB` 数据类型，例如 `CLOB` 或 `BLOB`。我将在本章后面解释这些。\n\
  \n##### RAW\n\n`RAW` 数据类型类似于 `VARCHAR2`，因为它存储可变长度字符串。但是，它以原始格式存储数据，这意味着在导出到另一种类型的数据库时不会进行转换。\n\
  \n这不是我推荐使用的数据类型。如果您在系统之间进行大量转换，那么也许可以使用它，但还有其他更合适的文本数据类型。\n\n##### LONG RAW\n\n\
  `LONG RAW` 数据类型是 `LONG` 数据类型和 `RAW` 数据类型的混合体。它允许存储大量数据（如 `LONG` 数据类型），并确保在导出数据到其他系统时字符不会被转换。\n\
  \n然而，与 `LONG` 数据类型一样，`LONG RAW` 数据类型已被弃用，因此您不应使用它。应使用 `BLOB` 数据类型代替。\n\n#### 数字数据类型\n\
  \n在 Oracle 中，有许多数据类型可用于存储数字值。虽然您可以将数字存储在基于文本的数据类型（如 `VARCHAR2`）中，但如果只存储数字，最好使用数字数据类型，因为：\n\
  \n*   您可以对它们执行算术运算（例如，将年薪除以 12）。\n*   您可以将它们四舍五入到不同的小数位数。\n*   您可以使用 sum、average\
  \ 和其他功能对它们进行聚合。\n\n让我们看看数字数据类型。\n\n##### NUMBER\n\nOracle 中的 `NUMBER` 数据类型用于存储数字。它可以存储整数或小数、正数或负数。存储为\
  \ `NUMBER` 数据类型的值范围是从 -9 × 10¹²⁵ 到 9 × 10¹²⁵，这意味着数字大约有 125 位，可正可负。\n\n当您定义 `NUMBER`\
  \ 数据类型时，可以定义两件事：精度和小数位数。\n\n*   精度是数字中的总位数。\n*   小数位数是小数点右边的位数。\n\n使用精度和小数位数的不同值组合，您可以存储正负小数以及整数。\n\
  \n您可以通过在括号内指定精度和小数位数（`p` 代表精度，`s` 代表小数位数）来定义 `NUMBER` 数据类型：\n\n```\nNUMBER(p, s)\n\
  ```\n\n例如，要定义一个总位数为十位、小数位数为三位的数字，您可以这样写：\n\n```\nNUMBER(10, 3)\n```\n\n这意味着小数点左边有七位数字，右边有三位数字（例如，1234567.123）。\n\
  \n##### INTEGER\n\n`INTEGER` 数据类型是 SQL 标准数据类型，这意味着它存在于所有 SQL 数据库中。然而，在 Oracle 中，它等同于定义\
  \ `NUMBER(38)` 数据类型，即一个具有 38 位数字和 0 位小数位数的 `NUMBER`。\n\n因为 `INTEGER` 数据类型实际上被转换为\
  \ `NUMBER(38)` 数据类型，所以最好使用 `NUMBER`。如果您不想要 38 位数字，它允许您在值的大小上有更多的自由。它也更清楚地表示了它的含义。\n\
  \n##### FLOAT\n\nOracle 包含一个 `FLOAT` 数据类型，这是一个 ANSI 标准数据类型（意味着它在所有类型的 SQL 中都可用）。然而，就像\
  \ `INTEGER` 一样，`FLOAT` 数据类型在 Oracle 数据库内部被转换为 `NUMBER`。\n\n因此，与其使用被转换为 `NUMBER`\
  \ 的 `FLOAT` 数据类型，我建议直接使用 `NUMBER`。\n\n##### DECIMAL\n\n与 `FLOAT` 数据类型一样，Oracle 包含一个也是\
  \ ANSI 标准数据类型的 `DECIMAL` 数据类型。它也被 Oracle 数据库转换为 `NUMBER` 数据类型。因此，我建议使用 `NUMBER`\
  \ 数据类型而不是 `DECIMAL`。\n\n##### BINARY_FLOAT\n\n`BINARY_FLOAT` 数据类型用于存储浮点数，即包含小数位的数字。它类似于其他编程语言中的“float”数据类型。\n\
  \n`BINARY_FLOAT` 与 `NUMBER` 数据类型有几个区别：\n\n*   `BINARY_FLOAT` 通常比 `NUMBER` 更快地执行算术计算。\n\
  *   `BINARY_FLOAT` 通常比 `NUMBER` 占用更少的存储空间。\n*   `BINARY_FLOAT` 是近似定义，而 `NUMBER`\
  \ 是精确定义。\n\n当存储 `BINARY_FLOAT` 值时，存储的是一个近似值。如果您对这个数字进行大量计算，这可能会导致舍入问题。然而，它适用于存储大的小数或浮点数。\n\
  \n##### BINARY_DOUBLE\n\n`BINARY_DOUBLE` 数据类型与 `BINARY_FLOAT` 数据类型非常相似：\n\n*   它们都存储浮点数。\n\
  *   它们都以近似的方式存储数字，而不是 `NUMBER` 那样的精确方式。\n\n然而，`BINARY_FLOAT` 是 32 位精度值，而 `BINARY_DOUBLE`\
  \ 是 64 位精度值。这意味着它可以比 `BINARY_FLOAT` 存储更多的小数位。如果您需要存储一个大的小数，并且 `BINARY_FLOAT` 无法处理，那么\
  \ `BINARY_DOUBLE` 可能是一个不错的选择。\n\n#### 日期数据类型\n\n最后一个主要的数据类型类别是日期数据类型。这些数据类型用于存储与日期和时间相关的任何内容。\n\
  \n##### DATE\n\n`DATE` 数据类型允许您存储日期和时间值。是的，尽管它被称为 `DATE`，但它存储日期和时间。它存储年、月、日、小时、分钟和秒。Oracle\
  \ SQL 中没有 `DATETIME` 数据类型。\n\n如果您想存储日期和时间值，并且不需要存储时区或秒的小数部分（其他日期数据类型可以做到），则此数据类型很有用。\n\
  \n关于 `DATE` 数据类型需要记住的一点是，该数据类型的默认显示格式仅显示日期（年、月、日），而不显示时间。这可能看起来令人困惑，因为值只显示日期，并且数据类型被称为\
  \ `DATE`，但它确实包含时间。我们将在本书后面看到一些这方面的例子。\n\n##### TIMESTAMP\n\nOracle 中的 `TIMESTAMP`\
  \ 数据类型类似于 `DATE` 数据类型，但您可以存储秒的小数部分。您可以存储高达 9 的精度，这意味着一秒内有 9 位小数。\n\n`TIMESTAMP`\
  \ 允许比 `DATE` 数据类型更精细地记录时间。例如，如果您正在记录日志文件中的数据以查看某些事件发生的确切时间，那么秒的小数部分对您来说可能很重要。\n\n\
  \n\n##### 带时区的时间戳 (TIMESTAMP WITH TIME ZONE)\n\n`TIMESTAMP WITH TIME ZONE` 数据类型与\
  \ `TIMESTAMP` 数据类型类似，但它还包含时区信息。这意味着它包括年、月、日、时、分、秒、小数秒和时区。\n\n一个 `TIMESTAMP WITH\
  \ TIME ZONE` 值的例子是：“2018-04-21 07:41:03.152 -7:00”。这表示 2018 年 4 月 21 日，上午 7:41:03.152。它还表明该值与\
  \ GMT/UTC 相差-7 小时。\n\n在数据库和软件中处理时区可能很困难。使用这种数据类型有助于以正确的方式存储数据。\n\n##### 带本地时区的时间戳\
  \ (TIMESTAMP WITH LOCAL TIME ZONE)\n\n`TIMESTAMP WITH LOCAL TIME ZONE` 与 `TIMESTAMP\
  \ WITH TIME ZONE` 相似，因为它也存储日期、时间和时区。然而，当你从这种类型的列中 `SELECT` 一个值时，该值会以用户的时区显示，而不是像\
  \ `TIMESTAMP WITH TIME ZONE` 数据类型那样以数据库的时区显示。\n\n这使得根据查看数据的用户，将数据转换到不同的时区变得更加容易。这看起来可能是一个非常特殊的情况，但如果你正在开发一个全球使用的系统，那么这种数据类型会非常有用。\n\
  \n##### 年月间隔 (INTERVAL YEAR TO MONTH)\n\n到目前为止，我们看到的日期数据类型用于存储一个“时间点”：一个特定的日期和时间。然而，有时需要存储一个“时间段”，例如“4\
  \ 年”或“2 个月”。有几种方法可以做到这一点。\n\n你可以将其存储在 `NUMBER` 数据类型中，它代表要存储的月数。但是，如果你还想存储年份或天数呢？你可以创建几个不同的列来存储每个值（例如，一个年列和一个月列）。这意味着需要很多额外的列。这也意味着你可能存储一些无效的数据。\n\
  \n这就是 `INTERVAL` 数据类型的用途。它们用于存储一个时间段。\n\n`INTERVAL YEAR TO MONTH` 数据类型用于存储年和月的数量。值之间用短横线分隔，所以“03-06”这个值表示\
  \ 3 年 6 个月。\n\n使用这种数据类型的优势是：\n*   你可以将数据存储在一个列中，而不是两个列中，从而节省查询时间并节省数据库空间。\n*   它确保只允许有效的值。\n\
  \n因此，如果你需要存储一个涉及年和月的时间段，这种数据类型很有用。\n\n##### 日秒间隔 (INTERVAL DAY TO SECOND)\n\n`INTERVAL\
  \ DAY TO SECOND` 是另一种用于存储“时间段”的数据类型。它允许你存储天、小时、分钟和秒。\n\n例如，213 天，14 小时，28 分钟和 17\
  \ 秒的值显示为“213 14:28:17”。\n\n就像 `INTERVAL YEAR TO MONTH` 数据类型一样，它允许你将所有信息存储在一个列中。它也确保你只存储有效的数据。\n\
  \n#### 其他数据类型\n\n还有一些其他数据类型不属于文本/数字/日期数据类型。两个更常见的数据类型是 `BLOB` 和 `CLOB`。\n\n#####\
  \ 二进制大对象 (BLOB)\n\n`BLOB` 数据类型代表“二进制大对象”。它用于存储非结构化的二进制对象。\n\n这意味着它对于存储无法保存在文本列中的图像或音频文件很有用。它存储单个文件的数据，但不能存储字符数据。其最大大小为\
  \ 4GB。\n\n##### 字符大对象 (CLOB)\n\n`CLOB` 数据类型代表“字符大对象”。它与 `BLOB` 类似，但与 `BLOB` 不同，它存储字符数据而非二进制数据。\n\
  \n它的最大大小也是 4GB。它对于存储大的字符值很有用，但如果你想存储图像、音频或其他文件，则应使用 `BLOB`。\n\n### 数据类型建议\n\n你已经了解了\
  \ Oracle SQL 中所有主要的数据类型。你如何知道应该使用哪些，尤其是对于那些相似的数据类型？\n\n以下是一些针对不同数据类型的建议：\n*   不要使用\
  \ `LONG` 或 `LONG RAW`，因为它们已弃用。应改用 `BLOB` 或 `CLOB`。\n*   `VARCHAR2` 可以替代 `CHAR`。我不知道有什么理由需要使用\
  \ `CHAR` 而不是 `VARCHAR2`。\n*   应该使用 `NUMBER` 而不是 `INTEGER`、`FLOAT` 或 `DECIMAL`。\n\
  *   考虑二进制数字类型的优缺点，以决定使用 `BINARY_FLOAT` 还是 `NUMBER`。\n*   始终指定大小或精度。大多数数据类型允许你指定这个，但有默认值。最好明确指定你想要的大小，而不是依赖默认值。\n\
  \n在接下来的几章中，你将看到一些使用这些数据类型的例子。\n\n### 总结\n\nOracle SQL 中有许多不同的数据类型，允许你存储不同种类的值。数据类型的三个主要组是文本、数字和日期。这些组中有很多数据类型，它们都用于特定的原因，并有各自的优缺点。\n\
  \n## 14. 创建表\n\n在本书前面，你创建了一个名为 `employee` 的新表并向其中添加了数据。你是使用 SQL Developer 中的菜单选项完成此操作的。还有另一种创建表的方法，我们将在本章中学习。\n\
  \n### 使用 SQL 代码创建表\n\n使用菜单选项创建表的替代方法是使用 SQL 代码。到目前为止，你学到的 SQL 代码允许你使用 `SELECT` 语句从现有表中读取数据。有一系列不同的\
  \ SQL 语句可以使用，其中一种就是用于创建表。\n\n为什么你会使用 SQL 代码而不是菜单选项来创建表呢？有几个原因。\n\n你可能无法访问 SQL Developer。虽然它是一个简单的下载和设置程序，但如果你在公司处理他们的数据库，你可能无法访问此程序。创建表的唯一方法将是运行一条\
  \ SQL 语句。\n\n另一个原因是，如果创建表是一个更大流程中的一个步骤。可以一个接一个地运行多条 SQL 语句，而无需你为每条语句都按“运行”按钮。这在你作为数据库开发人员或数据库管理员工作时很常见。使用\
  \ SQL 代码创建表允许你做到这一点。\n\n你可能也在使用不同的程序来运行 SQL。我最近调查了有多少种不同的 IDE 可以用于 Oracle 数据库，发现有超过三十种！其中有一小部分是公司更常用的，而菜单选项可能并非在每个\
  \ IDE 中都可用。使用 SQL 语句创建表在所有这些程序中都是被接受的。\n\n那么，如何使用 SQL 语句创建表呢？你使用 `CREATE TABLE`\
  \ 语句。\n\n### CREATE TABLE 语句\n\nSQL 有一个名为 `CREATE TABLE` 的语句，它允许你在数据库上创建一个新表。与许多\
  \ SQL 语句一样，它用于创建基本表时很简单，但它有很多你将来可能想使用的高级选项。在本章中，我们将重点介绍如何创建一个基本表。\n\n`CREATE TABLE`\
  \ 语句如下所示：\n\n```\nCREATE TABLE tablename (\ncolumn_1 data_type,\ncolumn_2 data_type,\n\
  ...\ncolumn_n  data_type\n);\n```\n\n你可能已经注意到它看起来与 `SELECT` 语句大不相同。关于 `CREATE TABLE`\
  \ 语句有几点需要注意：\n*   它以 `CREATE TABLE` 开头。可以用小写书写，但为了遵循代码标准，我建议将 SQL 关键字大写。\n*   然后你指定表名。表名长度最多为\
  \ 30 个字符。\n*   然后是一个左括号。\n*   在左括号内是你指定表中要有的列的地方。\n*   对于每一列，你指定一个名称和一个数据类型。使用逗号分隔每个列定义。\n\
  *   添加完所有列后，以右括号和分号结束。\n\n一旦你编写了这样一条语句，你运行它，表就会在数据库上创建。我们将看几个这条语句的例子。\n\n\n\n###\
  \ 我们的员工表\n\n在前面的章节中，我们创建了一个名为 `employee` 的新表。我们使用了 SQL Developer 内部的菜单选项来完成此操作，如图\
  \ 14-1 所示。\n\n![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig1_HTML.jpg](img/471705_1_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1 员工表\n\n如果用 `CREATE TABLE` 语句来表示，会是什么样子呢？如果我们想使用 `CREATE TABLE` 语句来创建这个员工表，它将是这样的：\n\
  \n```sql\nCREATE TABLE employee (\n    id NUMBER,\n    last_name VARCHAR2(20),\n\
  \    salary NUMBER\n);\n```\n\n该表被命名为 `employee`。我用小写书写，因为这是我倾向于遵循的标准（用小写书写表名）。Oracle\
  \ 实际上是以大写形式存储表名的，因此根据数据库，无论你写 `employee` 还是 `EMPLOYEE`，结果都是一样的。\n\n显示的第一个列是 `id`。我也倾向于用小写书写列名。它的数据类型是\
  \ `NUMBER`，后面加了一个逗号，因为我们想向这个表添加另一个列。\n\n第二列是 `last_name`。它的数据类型是 `VARCHAR2`，这是我们在上一章介绍过的一种文本数据类型。这个\
  \ `VARCHAR2` 后面括号里有一个 20。这是你为许多数据类型指定长度、大小或精度的方式，对于 `VARCHAR2` 数据类型，这个数字表示该列允许的最大字符数。所以，对于这个表中的\
  \ `last_name`，你最多可以存储 20 个字节。\n\n最后，我们有 `salary` 列，它也是一个数字。你可以看到 `id` 和 `salary`\
  \ 列都只写了 `NUMBER`，括号里没有值。通过不包含一个值，就会使用一个默认值，这意味着值会按你输入的方式存储。`NUMBER` 数据类型的默认大小是 38。通常最好为每个变量指定一个大小，这样可以明确你期望它有多大。\n\
  \n这个例子是基于我们已经创建的一个表。如果我们尝试在 SQL Developer 中运行这个语句，会得到一个错误，提示表已存在。这是因为我们不能有两个同名的表。\n\
  \n让我们看另一个不同名字的例子。\n\n### 存储办公室详细信息\n\n假设我们想扩展我们的数据库以存储更多信息。我们想存储关于公司不同办公室的数据，它们位于哪里，以及哪些员工在里面工作。为此，我们将创建一个新表。\n\
  \n为什么我们不能把这些信息存储在 `employee` 表中呢？让我们试试看会发生什么。\n\n在 SQL 中，你可以修改现有的表来添加新列，我们将在后面的章节中学习。假设我们已经在\
  \ `employee` 表中添加了一个名为 `office` 的新列，如下所示：\n\n| ID | LAST_NAME | SALARY | OFFICE\
  \ |\n| --- | --- | --- | --- |\n| 1 | JONES | 20000 |   |\n| 2 | SMITH | 35000 |\
  \   |\n| 3 | KING | 40000 |   |\n| 4 | SIMPSON | 52000 |   |\n| 5 | ANDERSON | 31000\
  \ |   |\n| 6 | COOPER | (null) |   |\n| 7 | (null) | (null) |   |\n| 8 | SMITH |\
  \ 62000 |   |\n| 9 | PATRICK | 40000 |   |\n\n现在，你可以尝试通过向这个 `office` 列添加信息来向此表添加数据。\n\
  \n| ID | LAST_NAME | SALARY | OFFICE |\n| --- | --- | --- | --- |\n| 1 | JONES |\
  \ 20000 | 123 Main Street |\n| 2 | SMITH | 35000 | 45 Smith Street |\n| 3 | KING\
  \ | 40000 | Level 2, 10 Clark Street |\n| 4 | SIMPSON | 52000 | 205 Capital Road\
  \ |\n| 5 | ANDERSON | 31000 | 123 Main Street |\n| 6 | COOPER | (null) | 12 Main\
  \ Street |\n| 7 | (null) | (null) | Level 2, 10 Clark Street |\n| 8 | SMITH | 62000\
  \ | Level 1, 10 Clark Street |\n| 9 | PATRICK | 40000 | 123 Main St |\n\n这看起来可能没问题。我们将地址，有时是建筑物楼层，存储在这个列中。我们可以看到一些员工与其他员工在同一个办公室工作。\n\
  \n然而，看看 ID 为 5、6 和 9 的记录。\n\n| ID | LAST_NAME | SALARY | OFFICE |\n| --- | --- |\
  \ --- | --- |\n| 5 | ANDERSON | 31000 | 123 Main Street |\n| 6 | COOPER | (null)\
  \ | 12 Main Street |\n| 9 | PATRICK | 40000 | 123 Main St |\n\n`office` 的值看起来很相似。它们是相同的吗？COOPER\
  \ 的办公室 12 Main Street 和 ANDERSON 的办公室 123 Main Street 是同一个吗？只是街道号码打错了？PATRICK 的办公室和\
  \ ANDERSON 的办公室是同一个，只是把 Street 缩写成了 St？在这种设置下很容易混淆。\n\n另一个问题可能出现在我们更新数据时。假设我们将 SMITH\
  \ 的 `office` 从 45 Smith Street 更新为 123 Main Street。\n\n| ID | LAST_NAME | SALARY\
  \ | OFFICE |\n| --- | --- | --- | --- |\n| 1 | JONES | 20000 | 123 Main Street |\n\
  | 2 | SMITH | 35000 | 123 Main Street |\n| 3 | KING | 40000 | Level 2, 10 Clark\
  \ Street |\n| 4 | SIMPSON | 52000 | 205 Capital Road |\n| 5 | ANDERSON | 31000 |\
  \ 123 Main Street |\n| 6 | COOPER | (null) | 12 Main Street |\n| 7 | (null) | (null)\
  \ | Level 2, 10 Clark Street |\n| 8 | SMITH | 62000 | Level 1, 10 Clark Street |\n\
  | 9 | PATRICK | 40000 | 123 Main St |\n\n这意味着什么？这是否意味着 SMITH 已从 45 Smith Street\
  \ 的办公室搬到了 123 Main Street 的办公室？如果是这样，45 Street Street 的办公室在公司还存在吗？根据这个表，它不存在了，因为它没有被列在那一列中。\n\
  \n这被称为 `删除异常`，是设计数据库时应避免的问题。`删除异常` 是指你更新一行以引用不同的值，而关于先前值存在的所有记录都丢失了。这是我们想要避免的。\n\
  \n另一个可能出现的问题称为 `更新异常`。假设我们将 ANDERSON 的办公室从 123 Main Street 更改为 123 Main Street South。\n\
  \n| ID | LAST_NAME | SALARY | OFFICE |\n| --- | --- | --- | --- |\n| 1 | JONES |\
  \ 20000 | 123 Main Street |\n| 2 | SMITH | 35000 | 123 Main Street |\n| 3 | KING\
  \ | 40000 | Level 2, 10 Clark Street |\n| 4 | SIMPSON | 52000 | 205 Capital Road\
  \ |\n| 5 | ANDERSON | 31000 | 123 Main Street South |\n| 6 | COOPER | (null) | 12\
  \ Main Street |\n| 7 | (null) | (null) | Level 2, 10 Clark Street |\n| 8 | SMITH\
  \ | 62000 | Level 1, 10 Clark Street |\n| 9 | PATRICK | 40000 | 123 Main St |\n\n\
  这是否意味着 ANDERSON 已经搬到了 123 Main Street South 的新办公室？或者，这是否意味着 123 Main Street 的办公室不复存在，已搬迁至\
  \ 123 Main Street South？或者，这是否意味着市议会已将 Main Street 更名为 Main Street South，但实际上对于公司来说是同一个办公室和位置？\n\
  \n我们可以看到还有其他几位员工使用 123 Main Street 办公室，这可能正确也可能不正确。如果你打算更新此办公室的所有出现位置，但有些被遗漏了，那么就可能出现问题。这被称为\
  \ `更新异常`，应该避免。\n\n有一个称为 `数据库设计` 或 `关系数据库设计` 的软件开发领域，它引入了一个称为 `规范化` 的过程。遵循此过程是为了确保你的数据库结构高效，以避免这些错误。\n\
  \n对于我们的例子，如果我们把办公室的详细信息存储在一个单独的表中，就可以避免所有这些问题。这是因为我们实际上想要存储两件不同的事情：\n\n*   公司所有办公室的列表\n\
  *   哪些员工在哪些办公室工作的记录\n\n这些信息以两种不同的方式捕获。\n\n\n\n### 办公室表\n\n让我们来创建 `office` 表。我们希望\
  \ `office` 表包含一个 `ID` 和一个 `address`。\n\n我们的 `CREATE TABLE()` 语句将如下所示：\n\n```sql\n\
  CREATE TABLE office (\nid,\naddress\n);\n```\n\n在创建此表之前，我们需要指定数据类型和大小。对于 `ID` 列，这将是一个整数。我们可以使用\
  \ `NUMBER` 数据类型，在我们的示例中可以使用大小为 5。这将能处理从 0 到 99999 的数字，这对我们来说应该足够了。\n\n对于 `address`\
  \ 字段，这将是一个文本字段，因为我们希望存储街道号码和街道名称。在我们的示例中可以使用 200 个字符，我们将使用 `VARCHAR2`。\n\n我们的 `CREATE\
  \ TABLE()` 语句看起来将是这样的：\n\n```sql\nCREATE TABLE office (\nid NUMBER(5),\naddress\
  \ VARCHAR2(200)\n);\n```\n\n要运行此语句：\n\n1.  打开 SQL Developer 并创建一个新的 SQL 文件（或使用一个已打开的文件），就像你在前面章节中所做的那样。\n\
  2.  将前面所示的 `CREATE TABLE()` 语句输入到 SQL 窗口中，如图 14-2 所示。\n    ![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig2_HTML.jpg](img/471705_1_En_14_Fig2_HTML.jpg)\n\
  \    图 14-2：SQL Developer 中的 `CREATE TABLE()` 语句\n3.  点击工具栏上的“运行语句”按钮（那个大的绿色三角形），就像你之前运行语句时所做的那样。运行\
  \ `CREATE TABLE()` 语句与运行 `SELECT()` 语句的方式相同。\n\n语句运行后，屏幕底部会出现一条消息，告诉你表已成功创建，如图 14-3\
  \ 所示。\n\n![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig3_HTML.jpg](img/471705_1_En_14_Fig3_HTML.jpg)\n\
  图 14-3：表创建成功\n\n如果出现错误消息，可能有几个原因：\n*   表名已被另一个表使用。表名在数据库中必须是唯一的，因此如果你已经创建了这个表，就不能再次创建它。你将在本书后面学习如何删除表。\n\
  *   确保在 `id NUMBER(5)` 语句后面有一个逗号，因为这会让数据库知道你要指定第二个列。如果没有逗号，你会得到一个错误。\n*   确保空格的位置与所示的一致，例如在\
  \ `CREATE` 和 `TABLE` 之间，在列名（`id` 或 `address`）和数据类型（`NUMBER` 或 `VARCHAR2`）之间。\n*\
  \   确保 `VARCHAR2` 中没有空格。它是一个单词。\n\n你现在已经成功在数据库中创建了第二个表！让我们再创建一个使用不同数据类型的第三个表。\n\n\
  ### 销售会议表\n\n除了存储员工和办公室的信息，我们还想存储员工参加的销售会议信息。这些会议将与特定公司举行，并在某个日期和时间发生。我们想要存储的列有：\n\
  *   参加会议的员工\n*   会议是与哪家公司举行的\n*   会议的日期和时间\n\n对于列的长度，公司名称可以是 200 个字符。日期和时间值不需要长度，因为它是标准格式。我们的员工姓名将与\
  \ `employee` 表相同，为 20 个字符。\n\n我们的 `CREATE TABLE()` 语句将如下所示：\n\n```sql\nCREATE TABLE\
  \ sales_meeting (\nid NUMBER(5),\nemployee VARCHAR2(200),\ncompany VARCHAR2(200),\n\
  meeting_date DATE\n);\n```\n\n在我们运行这个语句之前，有几个你应该了解的概念。\n\n### 主键\n\n你可能已经注意到，到目前为止我们创建的所有表都包含一个名为\
  \ `id` 的列，并且该列的数据类型是 `NUMBER`。使用这个字段的原因是为了让你在查询中能够识别记录。\n\n这是什么意思？好吧，让我们看看我们的 `employee`\
  \ 表。\n\n| ID | 姓氏 | 工资 |\n| --- | --- | --- |\n| 1 | JONES | 20000 |\n| 2 | SMITH\
  \ | 35000 |\n| 3 | KING | 40000 |\n| 4 | SIMPSON | 52000 |\n| 5 | ANDERSON | 31000\
  \ |\n| 6 | COOPER | (null) |\n| 7 | (null) | (null) |\n| 8 | SMITH | 62000 |\n|\
  \ 9 | PATRICK | 40000 |\n\n它有一个 `id` 列和一个 `last_name` 列。假设你想查找员工 JONES 的所有信息。这很简单，因为你只需查找\
  \ `last_name` 为 JONES 的表记录。\n\n但是，如果你需要查找 SMITH 的信息呢？你可以查找 `last_name` 是 SMITH 的记录，但有两条记录的姓氏是\
  \ SMITH。你会用哪一条？他们有相同的 `last_name` 但不同的 `salary` 值。他们也可能有不同的 `offices`。需要有一种方法能唯一标识此表中的记录。\n\
  \n这就是 `id` 列的用途。它是一个存储表中 `employee` 记录的唯一编号的列。每当数据库或系统需要找到特定记录时，都可以使用这个 `ID`。\n\n\
  同样的概念可以在许多不同的系统中找到：\n*   你的纳税识别号，例如社会安全号码（在美国）或税务档案号（在澳大利亚）\n*   你的电子邮件地址\n*   你登录系统时使用的任何用户名\n\
  *   保险、电话或互联网公司的会员号或账号\n\n使用这种 ID 或唯一标识符很有帮助，因为：\n*   如果你知道这个 ID，总有办法找到你想要的记录。\n\
  *   记录上的任何其他信息都可以更改，只要 ID 相同。例如，人们可以改名，但记录仍然是同一条记录。\n*   易于搜索和关联其他记录（我们将在本书后面详细介绍）。\n\
  \n表中每条记录都有唯一标识符的概念称为 *主键*。表上的主键不仅仅是添加一个 ID 字段。Oracle（以及许多其他数据库）允许你将一个或多个列指定为主键。这意味着：\n\
  *   数据库确保值是唯一的。如果你尝试输入一个已被其他记录使用的值，你会得到一个错误。\n*   数据库将使基于此字段的搜索更容易，我们将在本书后面介绍。\n\
  \n确保表具有主键是良好的数据库设计实践。它可以提高数据质量，防止重复行，并提高表的性能。\n\n当我们编写 `sales_meeting` 表的 `CREATE\
  \ TABLE()` 语句时，我们要求你先不要运行该语句。这是因为我们想向这个表添加“主键”。现在就让我们来添加吧。\n\n要向表添加主键，你可以在列名和数据类型后添加\
  \ `PRIMARY KEY` 这几个词。如下面的语句所示，它位于数据类型之后，逗号之前。在你运行这个创建表的语句之前，还有一个概念需要解释，以及需要对这个语句做的另一个更改。\n\
  \n```sql\nCREATE TABLE sales_meeting (\nid NUMBER(5) PRIMARY KEY,\nemployee VARCHAR2(200),\n\
  company VARCHAR2(200),\nmeeting_date DATE\n);\n```\n\n\n### 再次记录员工信息\n\n我们的 `sales_meeting`\
  \ 表有一个名为 `employee` 的列，用于存储参与 `sales_meeting` 的员工的 `last_name`。假设我们的 `sales_meeting`\
  \ 表看起来像这样：\n\n```\nID   EMPLOYEE   COMPANY            MEETING_DATE\n1    ANDERSON\
  \   ABC Construction   10 August 2018\n2    SMITH      BW Signage         21 August\
  \ 2018\n```\n\n你可以看到第一条记录是与 ANDERSON 和 ABC Construction 公司的会议。然而，第二条记录是与 SMITH。是哪一个\
  \ SMITH 员工？我们有两个叫 SMITH 的员工。\n\n如果你尝试在表中存储员工的姓名，这可能会导致几个问题：\n\n*   如果有两条同名记录，你无法确定它具体关联到哪位员工。\n\
  *   如果你在 `employee` 表中更改了员工的姓氏，你也必须在这里更改。如果你忘记了，那么此表中的记录将与 `employee` 表不匹配。\n* \
  \  如果你在此表中添加一个员工姓名，那么你需要确保 `employee` 表中也有相应的记录，否则你对参与销售会议的员工将一无所知。\n\n这个问题有一个解决方案。这个解决方案的概念称为“外键”。\n\
  \n### 外键\n\n当你创建 `sales_meeting` 表时，你需要存储会议所涉及的员工信息。然而，你并不一定需要存储员工的姓名。你只需要知道是哪位员工即可。这可以通过引用\
  \ `employee` 表中的记录来实现。\n\n这是我们的 `employee` 表：\n\n```\nID  LAST_NAME   SALARY\n1\
  \   JONES       20000\n2   SMITH       35000\n3   KING        40000\n4   SIMPSON\
  \     52000\n5   ANDERSON    31000\n6   COOPER      (null)\n7   (null)      (null)\n\
  8   SMITH       62000\n9   PATRICK     40000\n```\n\n这是我们的 `sales_meeting` 表：\n\n\
  ```\nID  EMPLOYEE   COMPANY            MEETING_DATE\n1   ANDERSON   ABC Construction\
  \   10 August 2018\n2   SMITH      BW Signage         21 August 2018\n```\n\n与其在\
  \ `employee` 列中存储员工的姓氏（例如 ANDERSON, SMITH），你可以存储员工的 ID 号，即主键。这意味着：\n\n*   我们的 `sales_meeting`\
  \ 记录将只关联到一位员工，从而避免了两位员工同姓的问题。\n*   总是存在对应的员工记录。你无法存储 ID 为 10 的值，因为没有 ID 为 10 的员工。\n\
  *   如果你更改了 `last_name`，你只需要在一个地方更改。`sales_meeting` 表中的相关记录不包含 `last_name`，因此它们不需要知道这个更改。\n\
  \n因此，与其在 `sales_meeting` 表中存储 ANDERSON 和 SMITH，不如存储他们的 ID 号：\n\n```\nID   EMPLOYEE\
  \   COMPANY            MEETING_DATE\n1    5          ABC Construction   10 August\
  \ 2018\n2    2          BW Signage         21 August 2018\n```\n\n这样你可以看到第一条记录的\
  \ `employee` 值为 5，它指向 `employee` 表中 `ID` 为 5 的员工。你还可以看到第二条记录的 `employee` 值为 2，它指向\
  \ `employee` 表中一条 `last_name` 为 SMITH 的记录。这样就清楚它指向的是两条 SMITH 记录中的哪一条。\n\n使用数据库列来存储另一个表的主键的概念称为\
  \ `foreign key`。在此示例中，`sales_meeting` 表中的 `employee` 列就是一个外键。\n\n就像使用主键一样，外键是一种良好的数据库设计技术，可以避免前面提到的所有问题。我们如何在创建表时指定外键呢？\n\
  \n目前，我们的 `sales_meeting` 表的 `CREATE TABLE` 语句如下：\n\n```\nCREATE TABLE sales_meeting\
  \ (\nid NUMBER(5) PRIMARY KEY,\nemployee VARCHAR2(200),\ncompany VARCHAR2(200),\n\
  meeting_date DATE\n);\n```\n\n首先，你需要将 `employee` 列的数据类型从 `VARCHAR2` 改为 `NUMBER`\
  \ 类型，以匹配 `employee` 表中的 `ID`。你也可以将列名从 `employee` 改为 `employee_id`，以明确表示它指向 `employee`\
  \ 表的 `id`。\n\n```\nCREATE TABLE sales_meeting (\nid NUMBER(5) PRIMARY KEY,\nemployee_id\
  \ NUMBER(5),\ncompany VARCHAR2(200),\nmeeting_date DATE\n);\n```\n\n现在，你需要添加一些代码来指定外键。你可以保持语句原样，这样就可以向此表添加\
  \ `employee ID`。但是，你想要添加一种称为 `foreign key constraint` 的东西，以明确指定它是一个外键，并利用数据库的一些优势。\n\
  \n`constraint` 是你可以添加到表中的东西，用于指定可添加数据的规则。这意味着你将无法向 `employee_id` 列添加在 `employee`\
  \ 表中没有对应记录的数字，从而提高了数据质量。\n\n我们将在后面的章节中探讨如何添加外键约束，因为每个外键都需要一个对应的主键，而我们尚未向 `employee`\
  \ 表添加主键。\n\n创建 `sales_meeting` 表的最终代码如下：\n\n```\nCREATE TABLE sales_meeting (\n\
  id NUMBER(5) PRIMARY KEY,\nemployee_id NUMBER(5),\ncompany VARCHAR2(200),\nmeeting_date\
  \ DATE\n);\n```\n\n你现在可以在 SQL Developer 中运行此查询。表应该会像创建 `office` 表一样被创建。在后面的章节中，我们将学习如何从两个表中获取数据。\n\
  \n### 总结\n\n在 SQL 中创建表可以使用名为 `CREATE TABLE` 的 SQL 命令完成。当你无法访问 SQL Developer，或者将此语句作为更大集合的一部分运行时，使用\
  \ SQL 命令很有帮助。\n\n主键是你可以应用于列的数据库功能，它确保列值是唯一的并标识表中的行。外键是另一个应用于列的数据库功能，它存储另一个表的主键，并防止重复存储相同的数据。\n\
  \n## 15. 向表中添加数据\n\n到目前为止，我们一直在使用的数据库有三个表：`employee`、`office` 和 `sales_meeting`。其中只有一个表包含数据：`employee`\
  \ 表。向表中添加数据是创建表之后的一个独立步骤。\n\n在本书前面，当你向 `employee` 表添加数据时，你使用了 SQL Developer 中的菜单选项。你在设置表时和向表中添加更多数据时都这样做过。然而，正如我们了解到创建表可以使用语句一样，添加数据也可以使用\
  \ SQL 语句。\n\n使用 SQL 语句向表添加数据的原因与使用 `CREATE TABLE` 语句创建表的原因相同：\n\n*   当你使用不同的 IDE\
  \ 或无法访问 SQL Developer 时，可以使用它。\n*   它更快。\n*   它可以作为更大步骤集合的一部分使用。\n\n在 Oracle SQL\
  \ 中，你可以使用 `INSERT` 语句向表中添加数据。\n\n\n### INSERT 语句\n\n`INSERT` 语句是一条 SQL 语句，可让你向表中添加数据。你需要指定表、列以及要添加的值，运行该语句后，数据即被添加到表中。`INSERT`\
  \ 语句格式如下：\n\n```sql\nINSERT INTO tablename (columns) VALUES (values_to_insert);\n\
  ```\n\n它以 `INSERT INTO` 开头，这些是 SQL 关键字，表明你要插入数据。然后你指定 `tablename`，即数据要插入到的目标表。接下来，你指定列名，也就是你想添加数据的具体列。之后是关键字\
  \ `VALUES`，其后括号内是你要插入到表中的值。\n\n在向表中插入数据时指定列的原因，并非每一列都需要填值。你可能希望某些列留空。这样做也便于数据库知道哪个值对应哪一列。\n\
  \n当你编写 `INSERT` 语句时，它通常包含多个列：\n\n```sql\nINSERT INTO tablename (col1, col2, col3)\
  \ VALUES (val1, val2, val3);\n```\n\n你需要确保从表中指定的列数（第一组括号）与 `VALUES` 部分（第二组括号）的值数量相同。在此示例中，`val1`\
  \ 将被添加到 `col1` 列，`val2` 被添加到 `col2` 列，`val3` 被添加到 `col3` 列。\n\n让我们看一个例子。假设你想向 `office`\
  \ 表添加一条新记录。`office` 表有 `id` 和 `address` 两列。我们的 `INSERT` 语句开头如下：\n\n```sql\nINSERT\
  \ INTO office (id, address) VALUES (\n```\n\n接下来，你需要指定要插入的值。我们想插入第一条记录，所以 ID 为 `1`，地址为\
  \ `'123 Smith Street'`。我们的语句如下：\n\n```sql\nINSERT INTO office (id, address) VALUES\
  \ (1, '123 Smith Street');\n```\n\n我们有两列和两个值。值之间用逗号分隔。第一个值代表 `id`，第二个值代表 `address`。`id`\
  \ 值是一个数字，因此不需要用单引号括起来。`address` 值是一个文本值，因此需要放在单引号内。\n\n### 运行 INSERT 语句\n\n你可以像运行任何其他\
  \ SQL 语句一样运行此语句。\n\n1.  打开 SQL Developer 并新建一个 SQL 文件。\n2.  将前面提到的 `INSERT` 语句输入到代码区域，如图\
  \ 15-1 所示。\n\n    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig1_HTML.jpg](img/471705_1_En_15_Fig1_HTML.jpg)\n\
  \n    图 15-1\n\n    SQL Developer 中的 `INSERT` 语句\n\n3.  点击运行按钮。\n\n语句运行后，你将在屏幕底部看到其输出，如图\
  \ 15-2 所示。\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig2_HTML.jpg](img/471705_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2\n\n`INSERT` 语句的输出\n\n它将显示“1 row inserted。”这表示记录已插入。它不会向你显示记录的具体内容；要查看内容，你需要对该表运行一条\
  \ `SELECT` 语句。\n\n如果你看到错误信息，应检查你的 `INSERT` 语句中的几点：\n\n*   表名拼写正确吗？表名必须在数据库中已存在，我遇到过很多错误都是因为表名拼写稍有差错。\n\
  *   你指定的列数与值的数量相同吗？如果列数不同，你会得到一个错误。\n*   值是否引用了正确的列？如果数据类型不同（例如，你试图将地址输入到 `id` 列），你会得到一个错误。\n\
  *   文本值是否用单引号括起来了？如果没有，它们会被当作 SQL 代码处理，并可能导致错误。\n\n一旦你的语句成功运行，我们可以验证数据是否存在于表中。为此，对表运行一条\
  \ `SELECT` 语句：\n\n```sql\nSELECT *\nFROM office;\n```\n\n因为我们只是检查数据是否存在，使用 `SELECT\
  \ *` 是可以的。如果你运行这条语句，将得到以下结果：\n\n```\nID   ADDRESS\n1    123 Smith Street\n```\n\n\
  你可以看到数据已成功插入到表中。\n\n### 插入更多数据\n\n我们可以向此表中插入更多数据，以便有更多数据可供操作。让我们再插入两条记录：\n\n*  \
  \ 45 Main Street，ID 为 2\n*   10 Collins Road，ID 为 3\n\n`INSERT` 语句如下：\n\n```sql\n\
  INSERT INTO office (id, address) VALUES (2, '45 Main Street');\nINSERT INTO office\
  \ (id, address) VALUES (3, '10 Collins Road');\n```\n\n我们可以在 SQL Developer 中运行这两条语句。不必分开运行，你可以将它们连续运行。\n\
  \n1.  将这两条语句添加到你的 SQL Developer 窗口中，如图 15-3 所示。\n\n    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig3_HTML.jpg](img/471705_1_En_15_Fig3_HTML.jpg)\n\
  \n    图 15-3\n\n    两条 `INSERT` 语句\n\n2.  选中这两条语句使其高亮显示，如图 15-4 所示。\n\n    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig4_HTML.jpg](img/471705_1_En_15_Fig4_HTML.jpg)\n\
  \n    图 15-4\n\n    选中两条 `INSERT` 语句\n\n3.  点击运行按钮。两条语句将被依次运行。\n\n屏幕底部的输出应显示两行独立的“1\
  \ row inserted”，如图 15-5 所示。\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig5_HTML.jpg](img/471705_1_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5\n\n两条 `INSERT` 语句的输出\n\n让我们再次从 `office` 表中查询数据。\n\n```sql\nSELECT *\nFROM\
  \ office;\n```\n\n结果如下：\n\n```\nID   ADDRESS\n1    123 Smith Street\n2    45 Main\
  \ Street\n3    10 Collins Road\n```\n\n你可以看到所有三条记录都出现在表中。下面我们来看一些插入日期值的例子。\n\n###\
  \ 插入日期值\n\n向表中添加日期值需要特殊处理，因为世界各地的默认日期格式可能不同。\n\nOracle 数据库在安装时（Oracle Express）确定所有日期的日期格式。这很重要，因为它决定了我们如何向数据库添加日期值。\n\
  \n让我们向 `sales_meeting` 表添加一些数据。如果你还记得前面创建该表的章节，它有几列：\n\n*   `id`\n*   `employee_id`\n\
  *   `company`\n*   `meeting_date`\n\n`id` 和 `employee_id` 列是数字。`company` 列是文本值，`meeting_date`\
  \ 是日期。我们的 `INSERT` 语句如下：\n\n```sql\nINSERT INTO sales_meeting (id, employee_id,\
  \ company, meeting_date) VALUES (1, 5, 'ABC Construction', 'Aug 10 2018');\n```\n\
  \n这将插入一条记录，其 `id` 为 1，`employee_id` 为 5，`company` 为 `'ABC Construction'`，`meeting_date`\
  \ 为 `'Aug 10 2018'`。\n\n但是，如果你尝试在 SQL Developer 中运行此语句，很可能会出错，如图 15-6 所示。\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig6_HTML.jpg](img/471705_1_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6\n\n插入日期时的错误信息\n\n此错误发生的原因是数据库不认为“Aug 10 2018”是有效日期。对你我而言它似乎是有效的，但对数据库来说并非如此。数据库需要特定格式的日期，具体取决于你所在的地区。\n\
  \n不过，有一种符合 ANSI 标准的方法可以向数据库插入日期。你可以使用日期字面值，它是一个关键字（即“`DATE`”），以“`YYYY-MM-DD`”的特定格式指定日期。这意味着：\n\
  \n*   四位数字表示年份，后接一个短横线\n*   然后是两位数字表示月份，后接一个短横线\n*   然后是两位数字表示日\n\n因此，要将“Aug 10\
  \ 2018”写成此格式，需要写为 `DATE '2018-08-10'`。\n\n\n\n#### 注意\n\n默认日期格式是在安装 Oracle 数据库时设置的，根据您所在的地理位置，格式可能有所不同。\n\
  \n让我们再次尝试使用这个新格式的 `INSERT` 语句：\n\n```\nINSERT INTO sales_meeting (id, employee_id,\
  \ company, meeting_date) VALUES (1, 5, 'ABC Construction', DATE '2018-08-10');\n\
  ```\n\n如果您在 `SQL Developer` 中运行此语句，您将看到成功的消息“1 row inserted.”。\n\n您可以通过运行 `SELECT`\
  \ 语句查看此表中的数据：\n\n```\nSELECT *\nFROM sales_meeting;\n```\n\n输出结果如下所示。\n\n| ID |\
  \ EMPLOYEE | COMPANY | MEETING_DATE |\n| --- | --- | --- | --- |\n| 1 | 5 | ABC\
  \ Construction | 10/AUG/2018 |\n\n此处的 `meeting_date` 列是 `DATE` 数据类型。Oracle 会根据您所在的地区和数据库设置，以不同的格式显示此日期。上面显示的格式是“DD/MON/YYYY”，但您的格式也可能是“DD-MON-YYYY”或“MM/DD/YYYY”。\n\
  \n让我们向此表插入第二条记录，此表在上一章中使用过：\n\n```\nINSERT INTO sales_meeting (id, employee_id,\
  \ company, meeting_date) VALUES (2, 2, 'BW Signage', DATE '2018-08-21');\n```\n\n\
  一旦您运行此语句，该记录就进入表中。您可以再次运行 `SELECT` 查询以查看表中的结果：\n\n| ID | EMPLOYEE | COMPANY | MEETING_DATE\
  \ |\n| --- | --- | --- | --- |\n| 1 | 5 | ABC Construction | 10/AUG/2018 |\n| 2\
  \ | 2 | BW Signage | 21/AUG/2018 |\n\n```\nSELECT *\nFROM sales_meeting;\n```\n\n\
  ### 保存和撤销更改\n\n在更改数据时，有一个相关且有用的数据库概念需要了解。当您在计算机上使用程序时，您对文件进行更改并看到这些更改。然而，在您保存文件之前，这些更改不会永久存储在文件中。如果您不想保存更改，可以在不保存的情况下退出程序。\n\
  \nOracle 数据库有一个类似的概念，称为 `COMMIT` 和 `ROLLBACK`。这是 Oracle SQL 中的两个关键字：\n\n*   `COMMIT`\
  \ 将您所做的任何更改永久保存到数据库中。这类似于在文字处理器中按下保存按钮。\n*   `ROLLBACK` 将撤销对数据库所做的所有更改。这类似于关闭文字处理器而不保存更改。\n\
  \n这两个语句适用于自您连接到 Oracle 数据库或自您上次运行这些语句之一以来插入、更新或删除的数据。\n\n为什么需要知道这个？因为除非您运行这两个命令之一，否则您刚刚使用\
  \ `INSERT` 语句插入的数据不会保存在数据库中。如果您退出 `SQL Developer`，会收到一个关于提交更改的警告，但能够在 `SQL Developer`\
  \ 中提交是很好的习惯。\n\n您可以在 `SQL Developer` 中以两种方式执行 `COMMIT` 或 `ROLLBACK`：通过运行语句或单击 `SQL\
  \ Developer` 中的按钮。要运行语句，请将命令 `COMMIT;` 输入到 `SQL Developer` 中，如图 15-7 所示。\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig7_HTML.jpg](img/471705_1_En_15_Fig7_HTML.jpg)\n\
  *图 15-7. COMMIT 命令*\n\n然后，单击运行按钮。输出面板应显示“Commit completed.”。\n\n如果您想执行 `ROLLBACK`，请输入命令\
  \ `ROLLBACK` 并单击运行按钮。不过目前，您只需要执行 `COMMIT`，而不需要 `ROLLBACK`。\n\n或者，您可以使用 `SQL Developer`\
  \ 中的按钮来提交。此按钮是一个带有绿色对勾的灰色圆柱体，在 SQL 窗口中可用，如图 15-8 所示。`ROLLBACK` 按钮在其旁边。\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig8_HTML.jpg](img/471705_1_En_15_Fig8_HTML.jpg)\n\
  *图 15-8. SQL Developer 中的 COMMIT 按钮*\n\n因此，一旦您完成向数据库表中插入数据，最好提交数据。如果您退出 `SQL Developer`，会收到询问，但自己提交数据是一个应该养成的好习惯。\n\
  \n### 插入数据的最佳实践\n\n在本章中，您学习了如何向 Oracle 数据库插入数据。在执行此操作时，我可以提供一些“最佳实践”或技巧。\n\n指定您要插入的列。`INSERT`\
  \ 语句允许您指定要向其中添加数据的表的列。这是第一组括号内的部分：\n\n```\nINSERT INTO table (col1, col2, col3)\
  \ VALUES (val1, val2, val3)\n```\n\n在 SQL 中，此部分是可选的。您实际上不需要指定列即可运行 `INSERT` 语句。如果您不指定它们，值将按照数据库中列定义的顺序插入。这是有风险的，因为不能保证列的顺序保持不变。如果您不指定列，那么您的\
  \ `INSERT` 语句将来可能会失败。在运行 `INSERT` 语句时始终指定列是一个好主意。\n\n将文本和日期用引号括起来，但数字不需要。您可能会忍不住将所有值都放在引号内，因为文本和日期值需要引号。但是，您不需要将数字放在引号内，最好在指定数字时不加引号，以避免数据库可能进行的任何额外处理。\n\
  \n记住完成后要 `COMMIT`。这是我们看到的第一个要求您在语句运行后提交数据的语句。如果您运行 `INSERT` 语句后想知道为什么应用程序或其他用户看不到数据，那很可能是因为它尚未提交。\n\
  \n### 小结\n\nOracle SQL 中的 `INSERT` 语句允许您向表中添加数据。您可以指定表名、列和要添加的值。文本和日期值需要放在单引号内，但数字不需要。\n\
  \n插入数据后，要使其永久保存到数据库，需要使用 `COMMIT` 命令进行提交。如果您决定不想提交数据，可以运行 `ROLLBACK` 命令来撤销这些更改。\n\
  \n## 16. 更新和删除数据\n\n在上一章中，您学习了如何向表中添加数据。SQL 允许您更改表中已有的数据，我们将在本章中学习如何操作。\n\n为什么要在数据添加后更新它？也许您在运行\
  \ `INSERT` 语句时数据出错了，比如名字拼写错误或日期添加错误。或者也许应用程序的一部分进行了更改并需要更新数据。或者应用程序的用户更改了一些数据并希望保存它。这些都将涉及更新数据库中的数据。\n\
  \n好消息是，您不必删除记录并将其作为新记录插入。SQL 提供了一条命令，允许您对现有数据进行更改。\n\n\n\n### UPDATE 语句\n\nSQL 中有一种叫做\
  \ `UPDATE` 的语句，它允许你更改表中已有的数据。`UPDATE` 语句的工作方式与 `SELECT` 和 `INSERT` 语句类似，你需要指定一些关键字和数据，然后运行该语句。\n\
  \n`UPDATE` 语句的格式如下所示：\n\n```sql\nUPDATE tablename\nSET col1 = val1 [, col2 = val2…]\n\
  [WHERE condition];\n```\n\n该语句包含几个部分：\n\n*   首先，我们以 `UPDATE` 关键字开头，这告诉数据库你正在运行什么语句。\n\
  *   然后，我们指定包含要更新数据的表名。在 Oracle SQL 中，一次只能更新一个表。\n*   接着是 `SET` 关键字，你在这里指定要更改的内容。\n\
  *   在 `SET` 关键字之后，我们指定列和值的组合。这包括列名、一个等号以及你想要应用于该列的新值。如果你想在同一张表中更新多个列，可以指定多个列和值的组合。\n\
  *   最后，我们有一个 `WHERE` 子句，它让你能够筛选表，只更新你想要的行。\n\n方括号代表语句的可选部分。对于 `UPDATE` 语句，要更新的额外列是可选的。`WHERE`\
  \ 子句也是可选的。这意味着有可能更新表中的每条记录——无论是有意还是无意的！\n\n#### 注意\n\n在 `UPDATE` 语句中，`WHERE` 子句是可选的。如果你不想更新表中的每条记录，请确保添加\
  \ `WHERE` 子句。\n\n让我们看一些 `UPDATE` 语句的示例。\n\n### 更新为新值\n\n在我们的第一个示例中，我们将更新 `employee`\
  \ 表。该表目前如下所示：\n\n```sql\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH\
  \       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON   \
  \ 31000\n6    COOPER      (null)\n7    (null)      (null)\n8    SMITH       62000\n\
  9    PATRICK     40000\n```\n\n假设员工 `KING`（`id` 为 3）获得了晋升，需要更新其 `salary`。他们当前的薪水是\
  \ 40000，新薪水是 45000。\n\n我们的 `UPDATE` 语句开头如下：\n\n```sql\nUPDATE employee\n```\n\n\
  我们正在更新 `employee` 表，因此在此处指定了它。然后我们需要指定要更新的列和值：\n\n```sql\nUPDATE employee\nSET salary\
  \ = 45000\n```\n\n现在，数据库如何知道我们正在更新哪个 `salary`？我们需要指定一个 `WHERE` 子句。这将包含识别该记录的条件。我们可以通过两种方式实现：\n\
  \n*   匹配 `id = 3`\n*   匹配 `last_name = 'KING'`\n\n正如我们在前面章节中学到的，某些数据可能会重复（例如两个员工有相同的\
  \ `last_name`）。因此，在更新单个记录时，最好使用 `id` 或主键列。在这个例子中，两个条件都会找到相同的记录，但我们将使用 `id` 列来养成好习惯。所以，将此添加到你的查询中：\n\
  \n```sql\nUPDATE employee\nSET salary = 45000\nWHERE id = 3;\n```\n\n我们的 `UPDATE`\
  \ 语句完成了。要运行它，就像我们到目前为止学到的其他语句一样，将其输入到 SQL Developer 窗口中，然后单击“运行”按钮。你不会看到对表所做的更改，但会在屏幕底部看到一条输出，显示“1\
  \ row(s) updated.”，这意味着更新成功。\n\n如果你在这里出错，请确保你的表名和列名拼写正确。很多时候，我在 SQL 中遇到的错误都是由于我将表名打错造成的，例如将“employee”打成“emplyoee”。\n\
  \n你可以通过从 `employee` 表中选择数据来查看所做的更改：\n\n```sql\nSELECT *\nFROM employee;\n```\n\n\
  显示的结果如下：\n\n```sql\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH\
  \       35000\n3    KING        45000\n4    SIMPSON     52000\n5    ANDERSON   \
  \ 31000\n6    COOPER      (null)\n7    (null)      (null)\n8    SMITH       62000\n\
  9    PATRICK     40000\n```\n\n### 在运行前检查更新语句\n\n当你运行 `UPDATE` 语句时，在更改发生之前无法看到哪些数据将被更新。如果你使用\
  \ `id` 字段更新单个记录，可能很容易弄清楚，但如果你的 `WHERE` 子句更复杂呢？\n\n你可以通过在运行 `UPDATE` 语句之前，使用相同的表和\
  \ `WHERE` 子句运行一个 `SELECT` 语句，来查看 `UPDATE` 语句将更新哪些数据。\n\n看前面运行过的例子：\n\n```sql\nUPDATE\
  \ employee\nSET salary = 45000\nWHERE id = 3;\n```\n\n你可以通过从 `employee` 表中选择所有列，并使用相同的\
  \ `WHERE` 子句，将其转换为 `SELECT` 查询：\n\n```sql\nSELECT *\nFROM employee\nWHERE id = 3;\n\
  ```\n\n如果你在运行 `UPDATE` 语句之前运行 `SELECT` 语句，你就可以看到将被 `UPDATE` 语句影响的确切记录。在运行 `UPDATE`\
  \ 语句之前运行 `SELECT` 语句不是必须的，但如果你想确保更新的是正确的记录，这是个好主意。\n\n### 更新 NULL 值\n\n更新表的另一个原因是在之前存在\
  \ `NULL` 值的地方添加一个值。在我们的 `employee` 表中，有一条 `id` 为 7 的记录没有 `last_name`。你可以运行一条 `UPDATE`\
  \ 语句来为该记录添加 `last_name`。不过，这次不是基于 `id` 查找该值，而是基于 `last_name` 为 `NULL` 来查找。\n\n假设我们的\
  \ `last_name` 值应为“ADAMS”。你可以用这条语句更新 `employee` 表：\n\n```sql\nUPDATE employee\nSET\
  \ last_name = 'ADAMS'\nWHERE last_name IS NULL;\n```\n\n在 `WHERE` 子句中，你使用 `IS NULL`\
  \ 来检查 `last_name` 具有 `NULL` 值的记录。在 SQL 中，使用 `=` 号检查 `NULL` 值是无效的。`WHERE` 子句也在数据更新前运行，所以这条语句查找\
  \ `NULL` 值并将其更新为其他值没有问题。\n\n这张表只有一条记录的 `last_name` 为 `NULL`。如果有不止一条记录具有 `NULL` 值，那么这个查询将更新所有这些记录。这可能不是你想要的操作，所以在运行查询前确认你的\
  \ `WHERE` 子句是个好习惯。\n\n如果你运行这条语句，应该会收到一条消息“1 row(s) updated.”。你现在可以从此表中选择数据来检查是否已更新：\n\
  \n```sql\nSELECT *\nFROM employee;\n```\n\n该查询的结果是：\n\n```sql\nID   LAST_NAME  \
  \ SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING        45000\n\
  4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    ADAMS\
  \       (null)\n8    SMITH       62000\n9    PATRICK     40000\n```\n\n你可以看到，`last_name`\
  \ 为 `NULL` 的员工已被更新为“ADAMS”。\n\n\n### 基于现有值更新\n\n有时，您可能希望根据表中已有的数据来更新数据。我们将看一个例子：将薪水增加一定数额。\n\
  \n假设员工 JONES（`id = 1`）表现出色，获得了 10000 的加薪。我们可以通过两种方式来更新此数据：\n\n*   运行一个查询来查找当前薪水，编写一个查询将当前薪水更新为比现有值多\
  \ 10000，然后运行该查询。\n*   或者，编写一个查询，将当前薪水更新为增加 10000，并运行该查询。\n\n第二种方法更可取。我们不需要运行两个单独的查询。我们可以运行一个查询来完成此操作。我们的\
  \ `UPDATE` 查询如下所示：\n\n```\nUPDATE employee\nSET salary = salary + 10000\nWHERE id\
  \ = 1;\n```\n\n此查询与之前的查询类似。然而，在 `SET` 子句中，它写着 `SET salary = salary + 10000`。这意味着“将薪水设置为当前薪水值加上\
  \ 10000。” 它允许您在不知道现有值的情况下增加该值。\n\n如果您运行此查询，您将看到熟悉的“1 row(s) updated.”消息。您可以从表中 `SELECT`\
  \ 来查看数据现在的样子。\n\n```\nSELECT *\nFROM employee;\n```\n\n此查询的结果是：\n\n```\nID   LAST_NAME\
  \   SALARY\n1    JONES       30000\n2    SMITH       35000\n3    KING        45000\n\
  4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    ADAMS\
  \       (null)\n8    SMITH       62000\n9    PATRICK     40000\n```\n\n您可以看到 JONES\
  \ 的 `salary` 现在是 30000，比原来的 20000 多了 10000。\n\n### 更新日期值\n\n使用日期值编写和运行 `UPDATE`\
  \ 语句类似于更新文本或数值。您应该使用我们在上一章关于插入数据中学到的日期字面量。\n\n这是前一章中的 `sales_meeting` 表：\n\n```\n\
  ID   EMPLOYEE_ID   COMPANY           MEETING_DATE\n1    5             ABC Construction\
  \  10/AUG/2018\n2    2             BW Signage        21/AUG/2018\n```\n\n假设与 BW\
  \ Signage 的会议日期需要从 8 月 21 日更新到 8 月 25 日。您可以使用 `UPDATE` 语句来完成此操作：\n\n```\nUPDATE\
  \ sales_meeting\nSET meeting_date = DATE '2018-08-25'\nWHERE id = 2;\n```\n\n在此\
  \ `WHERE` 子句中，您可以用几种方式编写：\n\n*   公司 = BW Signage，但可能还有其他我们不希望更改的与同一家公司的会议。\n*  \
  \ 会议日期 = 2018 年 8 月 21 日，但也可能有其他会议在同一天。\n\n您应该使用 `id = 2`，因为这是保证这是您想要更新的唯一记录的唯一方法。如果您运行此查询，您将收到关于\
  \ 1 行被更新的消息。要查看更改，请运行 `SELECT` 语句：\n\n```\nSELECT *\nFROM sales_meeting;\n```\n\n\
  结果是：\n\n```\nID   EMPLOYEE_ID   COMPANY           MEETING_DATE\n1    5         \
  \    ABC Construction  10/AUG/2018\n2    2             BW Signage        25/AUG/2018\n\
  ```\n\n您可以看到数据已使用正确的日期更新。日期格式取决于您的位置，但可以更改。\n\n### 查看和更新日期格式\n\nOracle 数据库以某种方式显示日期格式，具体取决于安装数据库时指定的位置。您可以通过查看数据库的参数来查看格式设置为什么，以及更改它。这些参数存储在名为\
  \ `nls_session_parameters` 的表中：\n\n```\nSELECT * FROM nls_session_parameters\nWHERE\
  \ parameter = 'NLS_DATE_FORMAT';\n```\n\n您的输出将类似于：\n\n```\nPARAMETER         VALUE\n\
  NLS_DATE_FORMAT   DD/MON/RRRR\n```\n\n`value` 列指定日期的显示格式。在此示例中，“DD” 代表两位数的日，“MON”\
  \ 是三位数的月，“RRRR” 是四位数的年。如果您运行此查询，可能会得到不同的值，例如 “DD-MON-RRRR” 或 “MM-DD-RRRR。”\n\n您可以通过使用\
  \ `ALTER SESSION` 命令将日期格式更新为您喜欢的格式。只需将此命令中的日期格式更改为您喜欢的格式，然后运行它：\n\n```\nALTER SESSION\
  \ SET NLS_DATE_FORMAT = 'YYYY/MM/DD';\n```\n\n这将把格式更新为以年/月/日格式显示日期，例如 2018 年 8 月\
  \ 25 日显示为 2018/08/25。\n\n### 更新两个列\n\nSQL 中的 `UPDATE` 语句允许您更新多个列。可能会有需要这样做的情形，例如在开发应用程序时，网页上的多个字段可以被更改。\n\
  \n为此，请将您的第二个及后续列添加到 `SET` 子句中，并用逗号分隔。所有更新都将应用于匹配 `WHERE` 子句的行。例如，要更新 `sales_meeting`\
  \ 表以更改与 BW Signage 会议的员工和日期，您可以运行此查询：\n\n```\nUPDATE sales_meeting\nSET employee_id\
  \ = 6, meeting_date = DATE '2018-08-22'\nWHERE id = 2;\n```\n\n当您运行此语句时，您将看到有一行被更新。它不会告诉您更新了多少列。但是，就像前面的示例一样，您可以运行\
  \ `SELECT` 语句来查看更改。\n\n```\nSELECT *\nFROM sales_meeting;\nID   EMPLOYEE_ID   COMPANY\
  \            MEETING_DATE\n1    5             ABC Construction   10/AUG/2018\n2\
  \    6             BW Signage         22/AUG/2018\n```\n\n更新已应用于满足 `WHERE` 子句的两列。如果您想根据不同的条件更新不同的列，您必须编写单独的\
  \ `UPDATE` 语句。\n\n### 没有 WHERE 子句的更新\n\n在本章前面，我提到 `WHERE` 子句在 `UPDATE` 语句中是可选的。这意味着有可能（无论是有意还是无意）更新表中的每条记录。让我们看看当我们这样做时会发生什么。\n\
  \n首先，通过单击 SQL Developer 中的“提交”按钮或在 SQL 窗口中运行 `COMMIT` 命令来提交您已做的任何更改。这将确保您可以回滚从现在开始运行的任何命令，而不会丢失您在本章中所做的任何工作。\n\
  \n现在，让我们运行一个 `UPDATE` 语句来更新 `employee` 表中的 `salary` 值。我们希望在薪水为 `NULL` 时进行更新，但假设您忘记添加\
  \ `WHERE` 子句：\n\n```\nUPDATE employee\nSET salary = 25000;\n```\n\n当您运行此查询时，您将收到\
  \ “9 row(s) updated.” 的消息。哦不！九行！您只想更新一两行！您可以对表运行 `SELECT` 查询以查看更改了什么：\n\n| ID |\
  \ LAST_NAME | SALARY |\n| --- | --- | --- |\n| 1 | JONES | 25000 |\n| 2 | SMITH\
  \ | 25000 |\n| 3 | KING | 25000 |\n| 4 | SIMPSON | 25000 |\n| 5 | ANDERSON | 25000\
  \ |\n| 6 | COOPER | 25000 |\n| 7 | (null) | 25000 |\n| 8 | SMITH | 25000 |\n| 9\
  \ | PATRICK | 25000 |\n\n```\nSELECT *\nFROM employee;\n```\n\n您可以看到表中的每条记录都被更新为相同的\
  \ `salary`。每位员工的 `salary` 信息都已丢失。\n\n如果您不是故意这样做的，没关系。您可以通过运行 `ROLLBACK` 命令或单击 SQL\
  \ Developer 中的“回滚”按钮来撤消这些更改。应该会出现一条消息，显示“回滚成功。”\n\n然后，您可以再次运行 `SELECT` 命令来查看 `employee`\
  \ 表中的数据。\n\n| ID | LAST_NAME | SALARY |\n| --- | --- | --- |\n| 1 | JONES | 30000\
  \ |\n| 2 | SMITH | 35000 |\n| 3 | KING | 45000 |\n| 4 | SIMPSON | 52000 |\n| 5 |\
  \ ANDERSON | 31000 |\n| 6 | COOPER | (null) |\n| 7 | (null) | (null) |\n| 8 | SMITH\
  \ | 62000 |\n| 9 | PATRICK | 40000 |\n\n```\nSELECT *\nFROM employee;\n```\n\n因此，请小心您的\
  \ `UPDATE` 语句。确保它们上有 `WHERE` 子句，除非您非常确定要更新表中的每条记录！对于像这样较小的表，这可能没问题，但当您处理包含数千或数百万条记录的表时，这可能会带来问题！\n\
  \n"
- '# 17. 更新或删除表


  ### 从表中删除数据


  有时你可能想要从表中删除数据。也许是在你学习 SQL 时插入数据出了错，或者是为了移除不再需要的数据。在 SQL 中，有办法做到这一点，它涉及使用 `DELETE`
  语句。


  `DELETE` 语句允许你从表中删除数据。它的工作方式类似于 `UPDATE` 语句，你需要指定表名和要删除记录的条件。`DELETE` 语句看起来像这样：


  ```

  DELETE FROM 表名

  [WHERE 条件];

  ```


  该语句以 `DELETE FROM` 开始，然后你提及要从中删除数据的表名。接着你可以指定一个 `WHERE` 子句。这个 `WHERE` 子句用于确定你想要删除哪些记录。


  就像 `UPDATE` 语句一样，`DELETE` 语句上的 `WHERE` 子句是可选的。这意味着，如果你不小心，很容易就会删除表中的所有记录！在运行 `DELETE`
  语句之前，请确保你有 `WHERE` 子句，除非你真的想删除表中的所有记录。


  注意：`DELETE` 语句上的 `WHERE` 子句是可选的。如果省略它，表中的所有记录都将被删除。


  #### 删除记录


  让我们从 office 表中删除一条记录。office 表目前如下所示。


  | ID | 地址 |

  | --- | --- |

  | 1 | 123 Smith Street |

  | 2 | 45 Main Street |

  | 3 | 10 Collins Road |


  我们想从这个表中删除 “10 Collins Road” 的记录。为此，你可以编写如下语句：


  ```

  DELETE FROM office

  WHERE address = ''10 Collins Road'';

  ```


  这将找到 office 表中地址为 “10 Collins Road” 的所有记录，并将它们从表中删除。


  如果你在 SQL Developer 中运行此语句，屏幕底部的输出面板将显示 “1 row deleted.”。就像 `INSERT` 和 `UPDATE` 语句一样，`DELETE`
  语句不会向你显示哪些记录被删除了。


  你可以在表上运行 `SELECT` 语句，以查看执行 `DELETE` 语句后表的样子：


  | ID | 地址 |

  | --- | --- |

  | 1 | 123 Smith Street |

  | 2 | 45 Main Street |


  ```

  SELECT *

  FROM office;

  ```


  你可以看到 “10 Collins Road” 的记录已不在表中。


  当你用 `INSERT` 语句添加数据或用 `UPDATE` 语句更新数据时，在运行 `COMMIT` 语句保存更改或运行 `ROLLBACK` 语句撤销更改之前，数据并没有永久保存在数据库中。同样的功能也适用于
  `DELETE` 语句：在运行 `COMMIT` 语句或使用 `ROLLBACK` 撤销删除操作之前，数据并没有被永久删除。


  我们想提交这个语句，所以运行一个 `COMMIT` 语句或点击 `COMMIT` 按钮来保存你的更改。


  #### 检查哪些记录将被删除


  `DELETE` 语句在运行前不会告诉你哪些记录将被删除。它不会弹出一个 “你确定吗？” 的对话框让你确认这些记录。


  不过，你可以对你的 `DELETE` 语句做一个小小的改动，以便在运行前查看哪些记录会受到影响。你可以简单地将 `DELETE` 改为 `SELECT *`。


  例如，你的语句可能如下所示：


  ```

  DELETE FROM office

  WHERE address = ''10 Collins Road'';

  ```


  要在运行 `DELETE` 语句之前查看哪些记录将被删除，请将 `DELETE` 一词替换为 `SELECT *`。


  ```

  SELECT *

  FROM office

  WHERE address = ''10 Collins Road'';

  ```


  你可以运行这个 `SELECT` 查询来查看符合 `WHERE` 子句条件的记录。再将这个语句改回 `DELETE` 就会删除那些记录。这对于像这样简单的查询，甚至对于
  `WHERE` 子句更复杂的查询都很有帮助。


  #### 删除表中的所有记录


  如果你想删除表中的所有记录，也可以使用 `DELETE` 语句。这对于重置表或删除其所有数据（以便重新插入）很有用。


  要删除表中的所有记录，请编写一个没有 `WHERE` 子句的 `DELETE` 语句。


  ```

  DELETE FROM office;

  ```


  这将删除表中的所有记录。你也可以运行一个 `WHERE` 子句满足所有条件的 `DELETE` 语句来达到相同的效果。在我们的例子中，这些查询将删除所有数据：


  ```

  DELETE FROM office

  WHERE id >= 1;

  DELETE FROM office

  WHERE address IS NOT NULL;

  ```


  你可以运行这些查询，所有记录都将从你的表中移除。如果你想再次插入记录，可以运行前面章节中的 `INSERT` 语句。


  ### 总结


  SQL 中的 `UPDATE` 语句允许你更新表中已存在的数据。你不需要删除并重新插入数据来修正它。你可以使用 `WHERE` 子句（其工作方式与 `SELECT`
  语句中的相同）来更新表中符合特定条件的一列或多列。


  你可以使用 `DELETE` 语句从表中删除记录。该语句有一个可选的 `WHERE` 子句，让你指定要删除哪些记录，如果你省略它，所有记录都将被删除。


  ### 为什么要更新表的结构？


  在 SQL 中，你可以更新表的结构。这意味着你可以添加或删除列、重命名列、重命名表、更改列的数据类型等等。你为什么要这样做呢？有几个原因。


  在软件开发的世界里，一旦某样东西被开发出来，就不能保证它会永远保持不变。这适用于整个应用程序，一直到它所使用的代码和表。


  你可能需要修改一个表来添加一个新列，以捕获更多信息。这在你最初创建表时是未知的，因为它是一个新的需求。


  另一种情况是，如果一个列被创建了，但出于某种原因需要重命名，例如为了与另一个表匹配，或者为了反映它的真实用途。


  为什么不直接删除表然后重新创建呢？有时那样更容易，但大多数情况下，修改表更容易。这是因为你并不总是有创建表的 SQL 语句，而且如果你删除了表，你将丢失其中的所有数据。


  我们将通过一些修改表的示例来演示如何操作。


  ### ALTER TABLE 语句


  修改表结构的方法是使用一个名为 `ALTER TABLE` 的语句。它将改变表的结构，这与 `UPDATE` 语句（它更改表内的数据）不同。


  `ALTER TABLE` 语句可以做相当多的事情：


  *   向表中添加一个或多个列

  *   更改列的数据类型

  *   向列添加约束（如主键或外键）

  *   从表中删除列

  *   重命名列

  *   重命名表


  `ALTER TABLE` 语句如下所示：


  ```

  ALTER TABLE 表名 修改表子句;

  ```


  它包括几个部分：


  *   以 ALTER TABLE 开头。

  *   然后指定你想要修改的表名。

  *   最后，你指定一个 `alter_table_clause`。它描述了你要做的更改。


  让我们看一些修改表的例子。


  在最近几章中，你已经学习了如何操作表和数据。具体来说，你已经学习了如何：


  *   创建表

  *   向表中添加数据

  *   更新表中的数据

  *   从表中删除数据


  还有两个与表相关的操作你将学习到：如何更新表的结构，以及如何删除表。


  ### 示例：添加列


  你可以使用 `ALTER TABLE` 语句向现有表中添加新列。这类语句看起来如下所示：

  ```

  ALTER TABLE table_name

  ADD column_name column_definition;

  ```


  它包含了表名、新列的名称以及你想要添加的新列的详细信息，例如数据类型。


  假设你想为 `employee` 表添加一个新列来存储员工职位。这是一个文本值，100 个字符应该足够容纳它。你的 `ALTER TABLE` 语句看起来会是这样：

  ```

  ALTER TABLE employee

  ADD job_title VARCHAR2(100);

  ```


  这个语句会在 `employee` 表中添加一个名为 `job_title` 的新列，数据类型为 `VARCHAR2`，最大长度为 100 字节。列名的长度限制为
  128 字节（截至 12.2 版本）。虽然较长的列名可能更具描述性，但需要在列名足够描述性与不过长之间取得平衡。


  要运行此语句，只需像处理其他语句一样，将其输入到 SQL Developer 窗口中，然后点击“运行”按钮。你会在输出面板中收到一条消息，内容为“Table EMPLOYEE
  altered.”。


  如果你向一个已包含数据的表中添加一个新列，那么这个列中的值会是什么呢？让我们来一探究竟。你可以通过运行一条 `SELECT` 语句来查看表中的内容，包括你的新列：

  ```

  SELECT *

  FROM employee;

  ```


  你的表应该大致如下所示，具体取决于你是否运行了前面章节中的 `UPDATE` 语句：


  | ID | LAST_NAME | SALARY | JOB_TITLE |

  | --- | --- | --- | --- |

  | 1 | JONES | 30000 | (null) |

  | 2 | SMITH | 35000 | (null) |

  | 3 | KING | 45000 | (null) |

  | 4 | SIMPSON | 52000 | (null) |

  | 5 | ANDERSON | 31000 | (null) |

  | 6 | COOPER | (null) | (null) |

  | 7 | ADAMS | (null) | (null) |

  | 8 | SMITH | 62000 | (null) |

  | 9 | PATRICK | 40000 | (null) |


  新的 `job_title` 列中每条记录的值都是 `NULL`。这是因为当我们添加列时，不可能知道每条记录的对应值应该是什么，因此它被设置为 `NULL`。你可以运行一条
  `UPDATE` 语句来为现有记录更新 `job_title` 的值。


  ### 示例：更改数据类型


  `ALTER TABLE` 语句的另一项用途是更改列的数据类型。这在以下等情况中非常有用：

  *   你需要扩大列的容量，例如增加 `NUMBER` 或 `VARCHAR2` 字段的大小。

  *   你要将一个列从文本值更改为数字值，因为它将要引用另一个表中的主键。

  *   你需要捕获日期时间值的额外部分。


  更改一个已包含数据的列的数据类型可能会导致问题，所以需要谨慎操作。根据你所做的更改，数据可能会被保留，或者你可能会收到错误。如果你确实想要更改列的数据类型，你的语句看起来会是这样：

  ```

  ALTER TABLE table_name

  MODIFY column_name data_type;

  ```


  举个例子，如果你想将 `job_title` 列从 `VARCHAR2(100)` 更改为 `NVARCHAR2(250)`，你的语句看起来会是这样：

  ```

  ALTER TABLE employee

  MODIFY job_title NVARCHAR2(250);

  ```


  你只需要指定新的数据类型，而不需要指定旧的数据类型。如果你在 SQL Developer 中的数据库上运行此语句，你会收到一条“Table EMPLOYEE altered”的消息。


  ### 示例：添加主键


  在之前的章节中，我们解释了主键的概念（表中用于唯一标识一行的一个或多个列）。你在创建 `sales_meeting` 表时为其添加了主键。你也可以使用 `ALTER
  TABLE` 语句向已存在的表中添加主键。


  用于添加主键的 `ALTER TABLE` 语句看起来如下所示：

  ```

  ALTER TABLE table_name

  ADD CONSTRAINT constraint_name constraint_type;

  ```


  这个语句使用了 “`constraint`” 这个词。约束是数据库中的一种对象，用于对表中的列应用规则。主键就是一种约束。适用于主键的规则有：

  *   它必须是唯一的。

  *   它不能包含任何 `NULL` 值。

  *   每个表只能有一个主键。

  *   它可以应用于一个或多个列。


  我们的 `employee` 表目前没有主键，但你现在可以添加一个。用于此操作的语句将是：

  ```

  ALTER TABLE employee

  ADD CONSTRAINT pk_emp_id PRIMARY KEY (id);

  ```


  这个语句包含了：

  *   `ALTER TABLE employee` 来标识正在被修改的表。

  *   `ADD CONSTRAINT` 来指定要在表上添加什么。

  *   约束名称 “`pk_emp_id`”，这是新约束的名称。

  *   `PRIMARY KEY`，指定这是一个主键约束。

  *   列名 `id`，这意味着 `employee` 表上的 `id` 列是主键。


  为什么我们要给主键起一个名字？主键是存储在数据库中的东西，因此它需要一个名字。当你创建一个表时，你可以在想要设为主键的列后面直接添加 `PRIMARY KEY`
  字样，而无需指定主键约束的名称。然而，Oracle 在创建时会自动为主键设置一个名称，那将是一个由字母和数字组成的长字符串。使用你自己的命名可以使日后更容易识别。


  我在这个例子中使用的主键名称是 `pk_emp_id`。在为约束（如主键）命名时，我喜欢遵循一个标准的命名格式。这样你只需通过名称就能轻易知道它是什么。这个命名格式包括：

  *   前两个字母表示约束类型（“`pk`”），然后加一个下划线。

  *   表名的缩写（“`emp`” 是 `employee` 的缩写），然后加一个下划线。

  *   列的名称，如果是长名称可以缩写（这里是 `id` 列）。

  *   我使用的名字是 `pk_emp_id`，这意味着它是 `employee` 表上使用 `id` 列的主键。


  如果你还没有运行，你应该在数据库上运行这条 `ALTER TABLE` 语句。下一个例子需要用到它。



  ### 示例：添加外键


  外键是一个或多个列，用于引用另一张表中的主键。外键是良好数据库设计的一部分。Oracle 允许你添加外键约束，这些约束会强制执行外键规则，确保被引用的表中存在对应的记录。


  例如，我们的 `sales_meeting` 表有一个 `employee_id` 列，如下所示：


  ```

  ID   EMPLOYEE_ID   COMPANY            MEETING_DATE

  1    5             ABC Construction   10/AUG/2018

  2    2             BW Signage         21/AUG/2018

  ```


  `employee_id` 列是外键，它引用了员工表的 id 列。我们可以使用 `ALTER TABLE` 命令为这张表添加一个外键约束：


  ```

  ALTER TABLE sales_meeting

  ADD CONSTRAINT fk_sm_empid FOREIGN KEY (employee_id) REFERENCES employee(id);

  ```


  这条语句包含：


  *   `ALTER TABLE sales_meeting` 用于指明我们要修改哪张表。

  *   `ADD CONSTRAINT fk_sm_emp_id`，为新的约束指定一个名称。

  *   `FOREIGN KEY (employee_id)` 表明这是一个外键约束，`employee_id` 是此约束应用到的当前表的列。

  *   `REFERENCES employee (id)` 表示当前表中的这个列引用了 `employee` 表的 `id` 列。


  如果你运行这条语句，会收到消息“Table SALES_MEETING altered”。这表示外键已应用到这张表。它确保：


  `sales_meeting` 表中的 `employee_id` 与员工 `id` 列中的某条记录匹配。如果你为 `employee_id` 15 添加一条
  `sales_meeting` 记录，但不存在 `id` 为 15 的员工记录，你会得到一个错误。


  拥有相关 `sales_meeting` 记录的员工记录不能被删除。可以通过设置更改这一行为，但默认情况下是不允许的。你不能删除 `id` 为 5 的员工，因为他们有一条
  `sales_meeting` 记录。


  如果你运行此语句，而被引用的表（本例中是 `employee` 表）在 `id` 列上没有主键，你会得到如下错误信息：


  ```

  Error starting at line : 21 in command -

  ALTER TABLE sales_meeting

  ADD CONSTRAINT fk_sm_empid FOREIGN KEY (employee_id) REFERENCES employee(id)

  Error report -

  ORA-02270: no matching unique or primary key for this column-list

  02270. 00000 -  "no matching unique or primary key for this column-list"

  *Cause:    A REFERENCES clause in a CREATE/ALTER TABLE statement

  gives a column-list for which there is no matching unique or primary key constraint
  in the referenced table.

  *Action:   Find the correct column names using the ALL_CONS_COLUMNS

  catalog view

  ```


  这意味着 `employee` 表在 `id` 列上没有主键。


  ### 示例：重命名列


  要重命名表中的列，可以使用 `ALTER TABLE` 语句。语句如下：


  ```

  ALTER TABLE table_name

  RENAME COLUMN column_name TO new_column_name;

  ```


  假设你想将新列从 `job_title` 重命名为 `position_title`。执行此操作的语句是：


  ```

  ALTER TABLE employee

  RENAME COLUMN job_title TO position_title;

  ```


  如果你运行这条语句，你会像之前的示例一样得到“Table EMPLOYEE altered”的消息。你也可以通过运行 `employee` 表上的 `SELECT`
  语句来查看变更已生效：


  ```

  SELECT *

  FROM employee;

  ID   LAST_NAME   SALARY   POSITION_TITLE

  1    JONES       30000    (null)

  2    SMITH       35000    (null)

  3    KING        45000    (null)

  4    SIMPSON     52000    (null)

  5    ANDERSON    31000    (null)

  6    COOPER      (null)   (null)

  7    ADAMS       (null)   (null)

  8    SMITH       62000    (null)

  9    PATRICK     40000    (null)

  ```


  此语句并未更改该列中的任何值。


  ### 示例：删除列


  要从表中删除列，你也可以使用 `ALTER TABLE` 语句：


  ```

  ALTER TABLE table_name

  DROP [COLUMN] column_name

  [CASCADE CONSTRAINTS];

  ```


  关于这条语句有几点需要注意：


  *   它使用了 `DROP` 关键字，这是从数据库中删除对象时使用的词。

  *   `COLUMN` 这个词是可选的。如果省略 `COLUMN`，列名必须用括号括起来。

  *   `CASCADE CONSTRAINTS` 这些词是可选的，我们稍后会解释其含义。


  让我们删除 `employee` 表上的新列，该列名为 `position_title`。为此，我们的语句将是：


  ```

  ALTER TABLE employee

  DROP COLUMN position_title;

  ```


  或者，这条语句同样有效：


  ```

  ALTER TABLE employee

  DROP (position_title);

  ```


  如果你运行这两条语句中的任意一条，该列将从表中移除。你可以通过运行 `SELECT` 语句来确认：


  ```

  SELECT *

  FROM employee;

  ID  LAST_NAME   SALARY

  1   JONES       30000

  2   SMITH       35000

  3   KING        45000

  4   SIMPSON     52000

  5   ANDERSON    31000

  6   COOPER      (null)

  7   ADAMS       (null)

  8   SMITH       62000

  9   PATRICK     40000

  ```


  `CASCADE CONSTRAINTS` 是什么意思？如果你尝试从一个有约束应用的表中删除列，比如 `sales_meeting` 表中的 `employee_id`
  列，你会得到一个错误，提示无法删除具有约束的列。如果你想删除该列及其相关约束以避免此错误，可以指定 `CASCADE CONSTRAINTS`。这意味着该列及其所有约束都将被删除。


  ### 示例：重命名表


  我们将要查看的 `ALTER TABLE` 语句的最后一个操作是重命名表。如果表有更合适的名称，或者你需要对软件进行更改而要求表名变更，你可能希望重命名表。


  为此，`ALTER TABLE` 语句如下所示：


  ```

  ALTER TABLE table_name

  RENAME TO new_table_name;

  ```


  假设我们为其创建数据库的公司认定，与客户的会议应该不仅仅代表销售。这意味着我们应该将 `sales_meeting` 表重命名为更具描述性的名称，例如 `customer_meeting`。


  你的 `ALTER TABLE` 语句将是：


  ```

  ALTER TABLE sales_meeting

  RENAME TO customer_meeting;

  ```


  当你运行这条语句时，表名将在数据库中更新。如果你尝试在旧表名上运行 `SELECT` 语句，会得到一个错误，提示表不存在。如果你在新表名上运行 `SELECT`
  语句，你将看到表中的结果。


  ### 使用 DROP TABLE 删除表


  到目前为止，本章你已经学习了如何修改表及其列。还有一件事我们尚未涉及，那就是从数据库中删除表。


  如果你不再需要某个表，你可能希望删除它。删除不使用的表比将其留在数据库中更好，因为删除它们可以节省数据库空间，并且减少其他需要对数据库编写查询的人的困惑。


  从数据库中删除表被称为“删除”（dropping）表。`drop` 一词用于描述从数据库中删除对象的过程，而表是一种对象。


  `DROP TABLE` 语句用于删除表，其形式如下：


  ```

  DROP TABLE table_name;

  ```


  这是一个简短的语句，你唯一需要做的就是添加表名。例如，假设你需要删除 `office` 表。为此，你的语句将是：


  ```

  DROP TABLE office;

  ```


  如果你运行这条语句，该表将从数据库中删除。如果你想重建该表，可以使用前面章节提到的 `CREATE TABLE` 语句。


  #### 注意


  `ALTER TABLE` 和 `DROP TABLE` 都会自动执行 `COMMIT`，这意味着你无法通过运行 `ROLLBACK` 来撤销该语句。




  ### 摘要


  许多对现有表的调整可以通过 `ALTER TABLE` 语句完成，例如添加、删除、丢弃列，以及重命名表。诸如主键和外键之类的约束也可以使用 `ALTER TABLE`
  语句添加到现有表中。使用 `DROP TABLE` 语句可以从数据库中移除表。


  '
- '# 第四部分 连接表


  ## 18. 内连接


  在本书前面，我们学习了什么是数据库，以及它相比其他存储数据方式的几个优势。在本章中，我们将学习如何充分利用其中一个优势：能够同时查看来自多个表的数据。


  ### 多表


  在之前的章节中，我们创建了一个 `employee` 表来存储员工信息。随后，我们创建了一个 `office` 表和一个 `sales_meeting` 表。接着，`sales_meeting`
  表被重命名为 `customer_meeting`。创建另外这两个表有几个原因：


  *   确保数据只存储在一个地方

  *   提高我们存储数据的质量

  *   在修改数据时节省时间


  我们的表如下所示。


  这是 `employee` 表：


  ```

  ID   LAST_NAME    SALARY   JOB_TITLE

  1    JONES        30000    (null)

  2    SMITH        35000    (null)

  3    KING         45000    (null)

  4    SIMPSON      52000    (null)

  5    ANDERSON     31000    (null)

  6    COOPER       (null)   (null)

  7    (null)       (null)   (null)

  8    SMITH        62000    (null)

  9    PATRICK      40000    (null)

  ```


  这是 `office` 表：


  ```

  ID   ADDRESS

  1    123 Smith Street

  2    45 Main Street

  3    10 Collins Road

  ```


  这是 `customer_meeting` 表：


  ```

  ID   EMPLOYEE_ID    COMPANY             MEETING_DATE

  1    5              ABC Construction    10/Aug/2018

  2    2              BW Signage          21/Aug/2018

  ```


  你见过一些 `SELECT` 查询，它们展示 `employee` 表中的所有记录，或 `office` 表中的所有记录，或 `customer_meeting`
  表中的所有记录。如果你想查看一个 `employees` 列表以及与之相关的 `customer_meeting` 记录呢？你可以编写单独的查询来获取这些数据，并使用你的应用程序代码将数据链接在一起。


  然而，让应用程序代码匹配相关记录效率不高，并且可能导致相当多的代码。数据库和 SQL 语言的一个优势是能够处理来自多个表的数据。SQL 中允许你这样做的特性称为
  *连接*。


  ### 什么是连接？


  连接是 SQL 的一个特性，允许你在单个查询中查看来自两个或更多表的列。数据库中的数据存储在单独的表中，每个表存储某种特定类型的信息。连接允许你编写一个从两个或多个表获取信息的查询，并在单个结果集中查看这些列。连接常写在
  `SELECT` 查询中，但也可以在其他查询（如 `UPDATE`）中完成。


  在 SQL 中，你可以通过在查询中指定一个关键字来添加连接。有几种不同类型的连接，每种都有自己的关键字。我们将在本书后面学习这些连接类型。现在，我们从一个简单的连接开始。


  SQL 中的连接涉及几个部分：


  *   两个表

  *   一个 JOIN 关键字

  *   指定两个表如何连接的条件


  SQL 如下所示：


  ```sql

  SELECT columns

  FROM table1

  JOIN table2 ON criteria;

  ```


  两个表是 `table1` 和 `table2`，你可以将其替换为要在查询中使用的两个表。`JOIN` 关键字指定你正在为查询连接这两个表。`ON` 关键字让你指定连接条件，即表如何连接。


  ### 连接示例


  让我们看一个例子。假设你需要展示 `customer_meeting` 数据，例如会议日期和公司名称，以及参加会议的每个员工的姓名。


  员工姓名在 `employee` 表中，销售会议数据在 `customer_meeting` 表中。你需要编写一个查询来展示来自两个表的数据。


  首先，可以从列开始。让我们展示 `customer_meeting` 表中的所有列：


  ```sql

  SELECT id, employee_id, company, meeting_date

  FROM customer_meeting;

  ```


  你还想看到员工的姓名。让我们添加这一列：


  ```sql

  SELECT id, employee_id, company, meeting_date, last_name

  FROM customer_meeting;

  ```


  如果你现在运行这个查询，会得到一个错误。你会得到错误，因为 `customer_meeting` 表中没有 `last_name` 列。你需要将 `employee`
  表包含在查询中，这通过连接来完成。


  ```sql

  SELECT id, employee_id, company, meeting_date, last_name

  FROM customer_meeting

  JOIN employee

  ```


  在查询中仅仅指定 `JOIN employee` 是不够的。关键字 `JOIN` 表示我们想要从 `customer_meeting` 和 `employee`
  表获取数据。但是 Oracle 数据库如何知道哪个 `employee` 与哪个 `customer_meeting` 相关？*你* 又如何知道呢？


  这就是外键的作用。在前面的章节中，我们解释了什么是外键并将它们添加到我们的表中。外键是一个表中的列，它引用另一个表中的主键。外键主要用于定义两个表之间的关系，这正是我们现在需要知道的。


  在 `customer_meeting` 表中，有一个名为 `employee_id` 的列。该列引用 `employee` 表中的 `id`。引用 `employee_id`
  列中的数据是我们连接两个表的方式。查询需要说明，如果 `customer_meeting` 的 `employee_id` 列与 `employee` 的 `id`
  列匹配，则记录相关。


  你可以更新查询以包含此条件：


  ```sql

  SELECT id, employee_id, company, meeting_date, last_name

  FROM customer_meeting

  JOIN employee ON customer_meeting.employee_id = employee.id;

  ```


  “如果 `customer_meeting` 的 `employee_id` 列与 `employee` 的 `id` 列匹配，则记录相关”的条件被写作 `ON
  customer_meeting.employee_id = employee.id`。包含 `JOIN` 关键字的那一行被称为 *连接子句*，连接条件总是用一个操作符（如
  “=”）在中间指定两个列。


  这个查询将展示 `customer_meeting` 信息，以及 `employee` 的 `last_name` 列，在同一个结果集中。让我们运行查询。


  ```sql

  ORA-00918: column ambiguously defined

  00918. 00000 -  "column ambiguously defined"

  *Cause:

  *Action:

  Error at Line: 1 Column: 8

  ```


  如果你运行这个查询，你会得到一个关于“列定义不明确”的错误。这是什么意思？它意味着 `SELECT` 子句中提到的 `id` 列可能来自 `customer_meeting`
  表或 `employee` 表，数据库不知道你想要哪一个，因此显示错误。需要哪个列是不明确的，或者说模糊的。


  你可以通过指定列来自哪个表来解决这个错误。你可以在列名前添加表名和一个点：


  ```sql

  SELECT customer_meeting.id, employee_id, company, meeting_date, last_name

  FROM customer_meeting

  JOIN employee ON customer_meeting.employee_id = employee.id;

  ```


  如果你现在运行查询，应该会得到一些结果：


  ```

  ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

  1    5              ABC Construction   10/Aug/2018    ANDERSON

  2    2              BW Signage         21/Aug/2018    SMITH

  ```


  恭喜！你刚刚编写并运行了第一个连接两个表的 SQL 查询！




  ### 连接、格式化与表别名


  在之前的例子中，我们将 `customer_meeting` 表名添加到 `id` 列，以便在 `SELECT` 子句中明确我们所指的列。这意味着只有一列指定了表名，而其他列没有。查询可以运行，但查看查询本身时，可能不容易知道每列来自哪个表。


  ```sql

  SELECT customer_meeting.id, employee_id, company, meeting_date, last_name

  FROM customer_meeting

  JOIN employee ON customer_meeting.employee_id = employee.id;

  ```


  有一种方法可以改进这个查询。你可以同时指定每个表的名称和列名。添加表名会多写不少代码，但这些额外的代码能清楚地表明每列来自哪个表。例如：


  ```sql

  SELECT customer_meeting.id, customer_meeting.employee_id, customer_meeting.company,
  customer_meeting.meeting_date, employee.last_name

  FROM customer_meeting

  JOIN employee ON customer_meeting.employee_id = employee.id;

  ```


  另一个需要注意的方面是格式。在书中阅读这个查询可能很容易。但是，如果我们在 `SQL Developer` 等 IDE 中编写查询，`SELECT` 子句会向右延伸得很长，如图
  18-1 所示。


  ![../images/471705_1_En_18_Chapter/471705_1_En_18_Fig1_HTML.jpg](img/471705_1_En_18_Fig1_HTML.jpg)

  图 18-1. 一个行长很长的查询


  查询向右延伸很长会使查询难以阅读，你可能需要向右滚动才能看到查询的其余部分。好消息是，`SQL` 不会区别对待空白字符，例如换行符和空格。这意味着通常更推荐将
  `SELECT` 子句中的每个列放在单独的行上，如下所示：


  ```sql

  SELECT

  customer_meeting.id,

  customer_meeting.employee_id,

  customer_meeting.company,

  customer_meeting.meeting_date,

  employee.last_name

  FROM customer_meeting

  JOIN employee ON customer_meeting.employee_id = employee.id;

  ```


  这样写查询会比正常情况占用更多行。然而，它使包含的列列表更易于阅读，也更易于维护，因为你可以更轻松地添加和删除列。你也不需要在 `SQL Developer`
  中左右滚动了。图 18-2 显示了查询如何更合适地适应窗口。


  ![../images/471705_1_En_18_Chapter/471705_1_En_18_Fig2_HTML.jpg](img/471705_1_En_18_Fig2_HTML.jpg)

  图 18-2. 相同查询分行显示


  我们的查询还有一个可以改进的地方。在本书前面，我们学习了表别名，即你可以在查询中给表起的名字。在涉及连接的查询中使用它们是一个很好的地方。


  你可以将表别名同时应用于 `customer_meeting` 表和 `employee` 表。例如，你可以给 `customer_meeting` 表一个别名
  "s"，给 `employee` 表一个别名 "e"。以下查询版本展示了如何按照我刚才描述的方式为表名起别名：


  ```sql

  SELECT

  customer_meeting.id,

  customer_meeting.employee_id,

  customer_meeting.company,

  customer_meeting.meeting_date,

  employee.last_name

  FROM customer_meeting s

  JOIN employee e ON customer_meeting.employee_id = employee.id;

  ```


  下一步是用别名替换每个列旁边提到的完整表名。你可以在连接条件和 `SELECT` 子句中都进行替换。所以，不是 `customer_meeting.id`，而是
  `c.id`。不是 `employee.last_name`，而是 `e.last_name`。例如：


  ```sql

  SELECT

  c.id,

  c.employee_id,

  c.company,

  c.meeting_date,

  e.last_name

  FROM customer_meeting c

  JOIN employee e ON c.employee_id = e.id;

  ```


  这个查询比之前的查询更小，更容易编写。而且每列来自哪个表也很清楚，因为你可以看到 `c` 表是 `customer_meeting`，`e` 表是 `employee`。它也避免了我们之前看到的列名不明确的错误。


  如果你在 `SQL Developer` 中运行这个查询，会得到如下结果：


  ```

  ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

  1    5              ABC Construction   10/Aug/2018    ANDERSON

  2    2              BW Signage         21/Aug/2018    SMITH

  ```


  你看到的结果与之前相同，但查询却更容易阅读和编写了。


  总结一下，在编写带有连接的查询后，最好：

  *   在 `SELECT` 子句中将列指定在单独的行上

  *   添加表别名，并在 `JOIN` 条件和 `SELECT` 子句中引用这些别名


  ### 内连接 (INNER JOIN)


  `SQL` 中有几种不同类型的连接。我们刚刚看到的连接类型是 `内连接 (inner join)`。这意味着我们编写的查询只返回两个表中相关联的结果。结果不包括：

  *   任何没有员工记录的 `customer_meetings`（反正表里没有）

  *   任何没有销售会议的员工


  `内连接 (inner join)` 只返回两个表中都匹配的结果。你的 `SELECT` 查询也可以使用 `INNER JOIN` 关键字而不是 `JOIN`
  关键字。以下是相同的查询，因为在 `Oracle SQL` 中，`JOIN` 等同于 `INNER JOIN`。


  ```sql

  SELECT

  c.id,

  c.employee_id,

  c.company,

  c.meeting_date,

  e.last_name

  FROM customer_meeting c

  INNER JOIN employee e ON c.employee_id = e.id;

  ```


  那么，如果 `INNER` 是一个可选的关键字，你是否应该指定它呢？我建议你指定，因为它能明确表示你要求的是一个 `INNER JOIN`，而不是我们将在后面章节介绍的其他连接类型之一。但这取决于你，因为即使不使用
  `INNER` 关键字，查询仍然会运行。


  让我们在 `customer_meeting` 表中添加一条没有员工的新记录，以确认 `INNER JOIN` 的行为。


  ```sql

  INSERT INTO customer_meeting (id, employee_id, company, meeting_date) VALUES (3,
  NULL, ''WXC Services'', DATE''2018-08-23'');

  ```


  运行此查询后，`customer_meeting` 表将如下所示：


  ```

  ID   EMPLOYEE_ID      COMPANY            MEETING_DATE

  1    5                ABC Construction   10/Aug/2018

  2    2                BW Signage         21/Aug/2018

  3    (null)           WXC Services       23/Aug/2018

  ```


  新记录没有关联的员工。现在，运行本章前面带有连接的 `SELECT` 查询。


  ```sql

  SELECT

  c.id,

  c.employee_id,

  c.company,

  c.meeting_date,

  e.last_name

  FROM customer_meeting c

  INNER JOIN employee e ON c.employee_id = e.id;

  ```


  结果是：


  ```

  ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

  1    5              ABC Construction   10/Aug/2018    ANDERSON

  2    2              BW Signage         21/Aug/2018    SMITH

  ```


  你可以看到，`id` 为 3 的 `customer_meeting` 记录没有显示出来。这是因为 `employee` 表中没有相关的记录，并且由于使用了 `INNER
  JOIN`，该记录不会显示。还有其他连接类型可以让你看到这些数据，我们将在后面的章节中学习。


  ### 总结


  连接是 `SQL` 中的一个功能，它允许你在单个查询内部将两个或多个表关联起来，从而无需使用其他编程语言即可显示这些表中的数据。需要一个连接条件来指定两个表如何关联。


  将 `SELECT` 列显示在单独的行上并使用表别名是一个好习惯，这样可以使查询更易于阅读和编辑。


  我们研究的基本连接类型是 `内连接 (INNER JOIN)`，它显示两个表中都匹配的记录。还有其他连接类型，我们将在接下来的几章中探讨。


  ## 19. 外连接


  在上一章中，我们学习了如何使用 `JOIN` 关键字将表连接在一起。这是一种称为 `外连接 (outer join)` 的连接类型，它显示被连接的两个表中都存在的记录。另一种连接类型是
  `外连接 (outer join)`。




  ### 什么是外连接？


  外连接是将两个表连接在一起，但如果其中一个表中没有相关记录，仍然会显示来自另一个表的数据。


  使用我们的示例数据，将 `employee` 表连接到 `customer_meeting` 表时，你看到了 `customer_meeting` 和 `employee`
  的记录。你没有看到任何没有对应 `employees` 的 `customer_meetings`，也没有看到任何没有对应 `customer_meetings`
  的 `employees`。这正是内连接所做的。


  另一方面，外连接会显示一个表中的所有数据以及另一个表中的匹配数据，或者是 `NULL` 值。它会显示所有的 `customer_meeting` 记录，以及与之相关的员工，如果某个员工没有关联，则显示
  `NULL` 值。


  外连接在你希望显示一个表中的所有记录，而不因为另一个表中没有对应记录就排除它们时非常有用。


  有三种不同类型的外连接：

  *   左外连接

  *   右外连接

  *   全外连接


  在本章中，我们将逐一介绍它们。


  ### 编写左外连接


  当你编写一个使用 `JOIN` 的 `SELECT` 查询时，将涉及的两个表想象成一个在左，一个在右会很有帮助。首先提到的表就是左边的表。


  我们可以用维恩图来图形化地表示左外连接，每个圆圈代表一个表，阴影区域代表找到的记录。图 19-1 展示了这个维恩图。


  ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig1_HTML.jpg](img/471705_1_En_19_Fig1_HTML.jpg)

  图 19-1: 一个内连接，table1 在左，table2 在右


  我们上一章的示例查询使用了 `INNER JOIN`：

  ```sql

  SELECT

  s.id,

  s.employee_id,

  s.company,

  s.meeting_date,

  e.last_name

  FROM customer_meeting s

  INNER JOIN employee e ON s.employee_id = e.id;

  ```


  在此示例中，`customer_meeting` 表在左边，`employee` 表在右边。


  对于 `LEFT OUTER JOIN`，左边表中的所有记录都会被显示。如果右边表中有匹配项，则显示该匹配项；否则，显示 `NULL` 值。


  在此示例中，如果你使用 `LEFT OUTER JOIN`，查询将显示所有的 `customer_meeting` 记录。如果找到匹配项，它会显示 `employee
  last_name` 值，否则显示 `NULL`。


  你可以用与 `INNER JOIN` 相同的方式编写 `LEFT OUTER JOIN`。你只需要将关键字从 `JOIN` 或 `INNER JOIN` 改为
  `LEFT JOIN` 或 `LEFT OUTER JOIN`。关键字 `OUTER` 是可选的，所以是否添加它取决于你。


  一个使用 `LEFT OUTER JOIN` 的查询如下所示：

  ```sql

  SELECT columns

  FROM table1

  LEFT [OUTER] JOIN table2 ON condition;

  ```


  你可以调整前面的示例查询，将其视为一个 `LEFT JOIN`：

  ```sql

  SELECT

  s.id,

  s.employee_id,

  s.company,

  s.meeting_date,

  e.last_name

  FROM customer_meeting s

  LEFT JOIN employee e ON s.employee_id = e.id;

  ```


  连接条件仍然是必需的。你仍然需要指定两个表中的数据是如何关联的，在这个例子中，`customer_meeting` 的 `employee_id` 与 `employee`
  的 `id` 列相关。


  我们的 `LEFT JOIN` 查询将显示以下结果：

  ```

  ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

  1    5              ABC Construction   10/Aug/2018    ANDERSON

  2    2              BW Signage         21/Aug/2018    SMITH

  3    (null)         WXC Services       23/Aug/2018    (null)

  ```


  这些结果显示了 `customer_meeting` 表中的所有记录。结果显示了前两位员工的 `ANDERSON` 和 `SMITH`，因为 `customer_meeting`
  记录中的 `employee_id` 字段提到了员工 5 和 2。第三条记录有一个 `NULL employee_id`，因此来自 `employee` 表的
  `last_name` 也是 `NULL`。它仍然被显示出来，因为我们使用的是 `LEFT JOIN` 而不是 `INNER JOIN`。


  左连接的图形化表示如图 19-2 所示。

  ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig2_HTML.jpg](img/471705_1_En_19_Fig2_HTML.jpg)

  图 19-2: 一个左外连接，table1 在左，table2 在右


  ### 使用左外连接显示所有员工


  另一个例子是这个问题：如果我们想查看所有员工，以及他们（如果有的话）参加的 `customer_meetings` 怎么办？我们也可以使用 `LEFT OUTER
  JOIN` 来实现。


  假设我们想要查看员工的 `id`、`last_name` 和 `salary`，以及 `customer_meeting` 的 `id`、`company` 和
  `meeting_date`。我们的查询可能如下所示：

  ```sql

  SELECT

  e.id,

  e.last_name,

  e.salary,

  s.id,

  s.company,

  s.meeting_date

  FROM employee e

  INNER JOIN customer_meeting s ON e.id = s.employee_id;

  ```


  这个查询使用了 `INNER JOIN`，将显示以下信息：

  ```

  ID   LAST_NAME    SALARY  ID   COMPANY           MEETING_DATE

  2    SMITH        35000   2    BW Signage        21/Aug/2018

  5    ANDERSON     31000   1    ABC Construction  10/Aug/2018

  ```


  它只显示了那些有 `customer_meeting` 记录的员工。我们想查看所有员工，无论他们是否有客户会议记录。


  我们可以将查询改为使用 `LEFT JOIN` 而不是 `INNER JOIN`，并包含一个 `ORDER BY`：

  ```sql

  SELECT

  e.id,

  e.last_name,

  e.salary,

  s.id,

  s.company,

  s.meeting_date

  FROM employee e

  LEFT JOIN customer_meeting s ON e.id = s.employee_id

  ORDER BY e.id;

  ```


  这将显示以下结果：

  ```

  ID  LAST_NAME   SALARY  ID      COMPANY           MEETING_DATE

  1   JONES       30000   (null)  (null)            (null)

  2   SMITH       35000   2       BW Signage        21/Aug/2018

  3   KING        45000   (null)  (null)            (null)

  4   SIMPSON     52000   (null)  (null)            (null)

  5   ANDERSON    31000   1       ABC Construction  10/Aug/2018

  6   COOPER      (null)  (null)  (null)            (null)

  7   (null)      (null)  (null)  (null)            (null)

  8   SMITH       62000   (null)  (null)            (null)

  9   PATRICK     40000   (null)  (null)            (null)

  ```


  它显示了所有的 `employee` 记录，以及任何存在的 `customer_meeting` 值。对于没有 `customer_meeting` 值的员工，会显示
  `NULL` 值。




  ### 编写右外连接


  另一种类型的外连接是 *右外连接*。右外连接会显示连接中右侧表的所有记录。如果连接左侧的记录存在，则也会显示；否则，将显示一个 `NULL` 值。


  如果你觉得这听起来像左外连接，那你是对的。它与左外连接正好相反。在左外连接中，显示的是左侧表的所有记录。在右外连接中，显示的是右侧表的所有记录。


  右外连接也可以用维恩图来展示，如图 19-3 所示。


  ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig3_HTML.jpg](img/471705_1_En_19_Fig3_HTML.jpg)


  图 19-3


  一个右外连接，table1 在左，table2 在右


  我们之前的一个例子展示了所有的 `employee` 记录以及他们对应的 `customer_meeting` 记录。那个例子是用一个带有 `LEFT JOIN`
  的查询编写的：


  ```sql

  SELECT

  e.id,

  e.last_name,

  e.salary,

  s.id,

  s.company,

  s.meeting_date

  FROM employee e

  LEFT JOIN customer_meeting s ON e.id = s.employee_id;

  ```


  同样的查询也可以写成 `RIGHT OUTER JOIN`，只需交换表的顺序并将 `LEFT JOIN` 改为 `RIGHT JOIN`。这是一个例子：


  ```sql

  SELECT

  e.id,

  e.last_name,

  e.salary,

  s.id,

  s.company,

  s.meeting_date

  FROM customer_meeting s

  RIGHT JOIN employee e ON e.id = s.employee_id;

  ```


  **加粗的部分**是唯一更改的部分。连接条件不需要改变。连接条件出现的顺序无关紧要。


  这个查询的结果与之前相同：


  ```

  ID  LAST_NAME  SALARY  ID      COMPANY           MEETING_DATE

  1   JONES      30000   (null)  (null)            (null)

  2   SMITH      35000   2       BW Signage        21/Aug/2018

  3   KING       45000   (null)  (null)            (null)

  4   SIMPSON    52000   (null)  (null)            (null)

  5   ANDERSON   31000   1       ABC Construction  10/Aug/2018

  6   COOPER     (null)  (null)  (null)            (null)

  7   (null)     (null)  (null) (null)        (null)

  8   SMITH      62000   (null) (null)        (null)

  9   PATRICK    40000   (null) (null)        (null)

  ```


  ### 何时会使用右外连接？


  我几乎没怎么见过使用 `RIGHT OUTER JOIN` 或 `RIGHT JOIN` 的查询，因为这类查询总是可以写成 `LEFT JOIN`。如果可能的话，我更倾向于将查询写成
  `LEFT JOIN`，我遇到的大多数 SQL 开发者也是如此。


  我认为 `RIGHT JOIN` 可能更有意义的唯一场景是，如果你的输出先显示带有 `NULL` 值的列，然后再显示带有实际值的列。


  例如，假设你想要这样的输出：


  ```

  ID      COMPANY            MEETING_DATE  ID  LAST_NAME  SALARY

  (null)  (null)             (null)        1   JONES      20000

  2       BW Signage         21/Aug/2018   2   SMITH      35000

  (null)  (null)             (null)        3   KING       40000

  (null)  (null)             (null)        4   SIMPSON    52000

  1       ABC Construction   10/Aug/2018   5   ANDERSON   31000

  (null)  (null)             (null)        6   COOPER     (null)

  (null)  (null)             (null)        7   (null)     (null)

  (null)  (null)             (null)        8   SMITH      62000

  (null)  (null)             (null)        9   PATRICK    40000

  ```


  这些结果显示了左侧的 `customer_meeting` 列（如果存在的话），然后显示了所有的 `employee` 列。在这个例子中，将查询写成 `RIGHT
  OUTER JOIN` 可能更有道理，因为输出反映了编写右外连接时表的顺序。


  ### 编写全外连接


  最后一种类型的外连接是 *全外连接*。它的行为类似于左外连接和右外连接。使用全外连接连接两个表将显示：


  *   两张表中所有匹配的记录

  *   第一张表中不匹配第二张表的所有记录（将显示 NULL 值）

  *   第二张表中不匹配第一张表的所有记录（将显示 NULL 值）


  全外连接可以用维恩图显示，如图 19-4 所示。


  ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig4_HTML.jpg](img/471705_1_En_19_Fig4_HTML.jpg)


  图 19-4


  一个全外连接，table1 在左，table2 在右


  当你想获取两张表的所有记录并查看哪些记录匹配、哪些不匹配时，全外连接非常有用。全外连接查询如下所示：


  ```sql

  SELECT columns

  FROM table1

  FULL [OUTER] JOIN table2 ON condition;

  ```


  就像左连接和右连接一样，在编写 `FULL OUTER JOIN` 时，`OUTER` 这个词是可选的。让我们看一个例子。


  ### 在我们的表上使用全外连接


  我们可以编写一个在员工表和 `customer_meeting` 表上使用全外连接的查询。这是一个例子：


  ```sql

  SELECT

  e.id,

  e.last_name,

  e.salary,

  s.id,

  s.company,

  s.meeting_date

  FROM employee e

  FULL JOIN customer_meeting s ON e.id = s.employee_id

  ORDER BY e.id;

  ```


  该查询仍然基于 `employee_id` 列进行连接，就像之前的例子一样。这个查询的输出如下：


  ```

  ID     LAST_NAME  SALARY  ID       COMPANY           MEETING_DATE

  1      JONES      30000   (null)   (null)            (null)

  2      SMITH      35000   2        BW Signage        21/Aug/2018

  3      KING       45000   (null)   (null)            (null)

  4      SIMPSON    52000   (null)   (null)            (null)

  5      ANDERSON   31000   1        ABC Construction  10/Aug/2018

  6      COOPER     (null)  (null)   (null)            (null)

  7      (null)     (null)  (null)   (null)            (null)

  8      SMITH      62000   (null)   (null)            (null)

  9      PATRICK    40000   (null)   (null)            (null)

  (null) (null)     (null)  3        WXC Services      23/Aug/2018

  ```


  你可以在这个输出中看到几点：


  *   显示了匹配的行，例如员工 SMITH 与他们的 BW Signage 会议，以及员工 ANDERSON 与他们的 ABC Construction 会议。

  *   显示了没有会议的员工行，例如 JONES 和 KING。

  *   显示了没有对应员工的 customer_meeting 行，例如与 WXC Services 的会议。


  这种类型的查询比左连接或右连接显示的信息更多。


  ### 总结


  外连接是一种连接类型，它显示一张表中的所有记录，以及另一张表中如果存在则匹配的记录。如果未找到匹配项，则显示 `NULL` 值。这使你可以查看完整表格以及另一张表中的任何匹配记录。


  左外连接将显示连接关键字左侧提到的表中的所有记录，而右外连接将显示连接关键字右侧表中的所有记录。全外连接两者都做。


  ## 20. 其他连接类型


  Oracle SQL 提供了其他几种连接语法类型。这些连接类型不常用，但值得了解它们是什么以及为什么应该或不应该使用它们。



  ### USING 关键字


  在之前的章节中，你已经学习了如何编写使用 `INNER JOIN`（内连接）从两张表中获取数据的查询。在那个过程中，你需要通过指定两个需要匹配值的列来指明两张表是如何关联的。这是你运行过的查询：


  ```sql

  SELECT

  s.id,

  s.employee_id,

  s.company,

  s.meeting_date,

  e.last_name

  FROM customer_meeting s

  INNER JOIN employee e ON s.employee_id = e.id;

  ```


  SQL 中还有另一个关键字，能让你更简单地编写 `INNER JOIN` 或 `OUTER JOIN`（外连接）：那就是 `USING` 关键字。这个 `USING`
  关键字允许你指定一个列名，数据库会使用两张表中该列名的列作为连接条件。其语法如下：


  ```sql

  SELECT columns

  FROM table1

  JOIN table2 USING (column_name);

  ```


  在这个语法中，你将 `ON column=column` 替换成了 `USING(column)`。让我们用 `office` 表来演示一下。


  ### 更新 Office 表


  `office` 表目前没有链接到任何表，但设想是每个员工都将使用一个办公室。为了在我们的数据库中存储这一信息，我们需要将 `office` 表中的 `id`
  字段添加到 `employee` 表中。


  首先，我们运行一个 `ALTER TABLE` 语句：


  ```sql

  ALTER TABLE employee

  ADD office_id NUMBER(5);

  ```


  如果你在 SQL Developer 中的数据库上运行这个语句，`employee` 表中将添加一个新列。我将它命名为 `office_id`，以清楚表明该值的用途。它也是一个
  `NUMBER` 数据类型，长度为五位数，这与 `office` 表中 `id` 列的大小相同。


  当你对 `employee` 表运行 `SELECT` 查询时，这个列是空的：


  ```sql

  SELECT id, last_name, salary, office_id

  FROM employee;

  ID  LAST_NAME  SALARY  OFFICE_ID

  1   JONES      30000   (null)

  2   SMITH      35000   (null)

  3   KING       45000   (null)

  4   SIMPSON    52000   (null)

  5   ANDERSON   31000   (null)

  6   COOPER     (null)  (null)

  7   ADAMS      (null)  (null)

  8   SMITH      62000   (null)

  9   PATRICK    40000   (null)

  ```


  你可以在这个表上运行 `UPDATE` 语句来更新这些值。需要运行的更新语句如下所示。


  ```sql

  UPDATE employee SET office_id = 1 WHERE id IN (1, 4, 6, 9);

  UPDATE employee SET office_id = 2 WHERE id IN (2, 3);

  UPDATE employee SET office_id = 3 WHERE id IN (7, 8);

  COMMIT;

  ```


  这些查询使用了 `IN` 关键字，允许你通过一次查询更新多行，而无需指定多个 `OR` 语句。


  运行完那些 `UPDATE` 语句后，你可以在 `employee` 表上运行相同的 `SELECT` 查询：


  ```sql

  SELECT id, last_name, salary, office_id

  FROM employee;

  ID  LAST_NAME  SALARY  OFFICE_ID

  1   JONES      30000   1

  2   SMITH      35000   2

  3   KING       45000   2

  4   SIMPSON    52000   1

  5   ANDERSON   31000   (null)

  6   COOPER     (null)  1

  7   ADAMS      (null)  3

  8   SMITH      62000   3

  9   PATRICK    40000   1

  ```


  现在，`employee` 记录有了一个关联的 `office_id`。接下来，让我们用 `USING` 关键字编写一个 `SELECT` 查询。


  ### 使用 USING 关键字编写查询


  你可以对 `employee` 和 `office` 表使用 `USING` 关键字来编写 `SELECT` 查询。


  ```sql

  SELECT id,

  last_name,

  salary,

  address

  FROM employee

  INNER JOIN office USING (office_id);

  ```


  这个查询在 `office_id` 列上使用了 `USING` 关键字，这意味着它基于 `office_id` 列将两张表连接在一起。让我们看看结果：


  ```

  ORA-00904: "OFFICE"."OFFICE_ID": invalid identifier

  ```


  这出乎意料。为什么没有得到员工和办公室记录的列表？查询中包含了两张表和多个列。


  这是因为 `USING` 子句会在两张表中查找指定的列，并且列名必须相同。这个查询试图基于 `employee.office_id` 列与 `office.office_id`
  列相匹配来连接两张表。这就遇到了错误，因为 `employee.office_id` 列标识了办公室，但 `office.office_id` 列并不存在。


  正确的连接方式应该是匹配 `employee.office_id = office.id`。但这无法使用 `USING` 关键字实现。`USING` 关键字要求两个列名相同。


  你可以将 `office` 表中的 `id` 列重命名为 `office_id`，但这并不总是可行，特别是当你在处理现有系统时，因为它可能导致其他查询出错。重命名一个列也可能导致其他使用
  `USING` 子句的查询失效！


  #### 注意


  `USING` 子句要求两张表都包含一个同名的列。如果该列包含的数据不一致，你将得到意想不到的结果。


  要求列名相同是我 `不推荐` 使用 `USING` 子句的原因之一。另一个原因是对列的限制。我们将两张表连接在一起，在最近的示例中，我们一直使用表别名来明确每列来自哪张表。之前的查询没有这些别名，所以我们添加上。


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  o.address

  FROM employee e

  INNER JOIN office o USING (id);

  ```


  如果你运行这个查询，你会得到这条消息：


  ```

  ORA-25154: column part of USING clause cannot have qualifier

  25154. 00000 -  "column part of USING clause cannot have qualifier"

  *Cause:    Columns that are used for a named-join (either a NATURAL join

  or a join with a USING clause) cannot have an explicit qualifier.

  *Action:   Remove the qualifier.

  Error at Line: 9 Column: 8

  ```


  这意味着 `USING` 子句中的 `id` 列不能在 `SELECT` 子句中带有表别名。这是因为该值在两张表中应该是相同的，因此不需要限定词。让我们调整查询来移除它：


  ```sql

  SELECT id,

  e.last_name,

  e.salary,

  o.address

  FROM employee e

  INNER JOIN office o USING (id);

  ```


  这个查询将会运行，并显示与之前相同的结果，尽管在这个例子中它们是不正确的。不能用别名引用这个列是个小问题，但当两张表中的列确实相同时，这应该没关系。


  编写这个查询的一个更好的方法是使用 `ON` 关键字代替 `USING` 关键字：


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e

  INNER JOIN office o ON e.office_id = o.id;

  ```


  你也可以在这里加入 `office_id`。这个查询的结果是：


  ```

  ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

  1   JONES      30000   1          123 Smith Street

  2   SMITH      35000   2          45 Main Street

  3   KING       45000   2          45 Main Street

  4   SIMPSON    52000   1          123 Smith Street

  6   COOPER     (null)  1          123 Smith Street

  7   ADAMS      (null)  3          10 Collins Road

  8   SMITH      62000   3          10 Collins Road

  9   PATRICK    40000   1          123 Smith Street

  ```


  使用 `ON` 关键字需要多打一点字，但它让你的查询更灵活，并能防止因列名相同但内容不匹配而引发的问题。


  ### 什么是自然连接？


  自然连接是 Oracle 的另一个简化表连接过程的功能。它是内连接的一种变体，允许你在不指定列名的情况下连接表。


  自然连接的语法是：


  ```sql

  SELECT columns

  FROM table1

  NATURAL JOIN table2;

  ```


  如果你不指定列，Oracle 怎么知道如何将两张表连接起来？使用自然连接时，数据库将根据名称相同的列或列组进行连接。


  它的工作方式与 `USING` 关键字类似。如果两张表有一个同名列，连接就基于该列进行。如果有两个同名列，则两列都会被使用。


  #### 注意


  自然连接会对名称相同的列执行内连接。这非常严格，可能导致结果不正确。


  ### 使用自然连接编写查询


  让我们再次使用`employee`和`office`表来看一个这方面的例子。


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e

  NATURAL JOIN office o;

  ```


  如果你运行这个查询，会看到这条消息：


  ```

  ORA-25155: column used in NATURAL join cannot have qualifier

  25155. 00000 -  "column used in NATURAL join cannot have qualifier"

  *Cause:    Columns that are used for a named-join (either a NATURAL join

  or a join with a USING clause) cannot have an explicit qualifier.

  *Action:   Remove the qualifier.

  Error at Line: 49 Column: 8

  ```


  这与`USING`连接的错误相同。你必须从`id`列中移除表别名。我猜是`id`列，因为我知道该列在两个表中是共同的。


  ```sql

  SELECT id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e

  NATURAL JOIN office o;

  ```


  如果你运行这个查询，会得到这些结果。


  ```

  ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

  1   JONES      30000   1          123 Smith Street

  2   SMITH      35000   2          45 Main Street

  3   KING       45000   3          10 Collins Road

  ```


  这些结果与我们使用`USING`关键字得到的不正确结果相同。这是因为连接是在两个表的`id`列上执行的，而不是在`employee.office_id = office.id`上执行的。令人担忧的是，这并没有显示错误。结果显示了，但它们是不正确的。


  因为列名需要匹配，我不推荐使用`NATURAL JOIN`。


  不建议使用`NATURAL JOIN`还有几个其他原因：


  *   如果存在多个同名列，它们也会被包含在连接条件中，从而在不显示错误的情况下给你带来不正确的结果。

  *   如我们之前所见，你不能对这些列使用表别名。

  *   这不能用于外连接。它使用的是内连接。


  就像`USING`关键字一样，我不推荐自然连接。我建议改用带`ON`关键字的内连接。


  ### 什么是交叉连接？


  *交叉连接*是另一种很少使用但值得了解的连接类型。让我们用一个例子来演示一下。


  假设你想查看所有员工及其办公室。你可能会编写这样一个查询：


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e,

  office o;

  ```


  你运行查询，得到类似这样的结果：


  ```

  ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

  1   JONES      30000   1          123 Smith Street

  2   SMITH      35000   1          123 Smith Street

  3   KING       45000   1          123 Smith Street

  4   SIMPSON    52000   1          123 Smith Street

  5   ANDERSON   31000   1          123 Smith Street

  6   COOPER     (null)  1          123 Smith Street

  7   ADAMS      (null)  1          123 Smith Street

  8   SMITH      62000   1          123 Smith Street

  9   PATRICK    40000   1          123 Smith Street

  1   JONES      30000   2          45 Main Street

  2   SMITH      35000   2          45 Main Street

  3   KING       45000   2          45 Main Street

  4   SIMPSON    52000   2          45 Main Street

  5   ANDERSON   31000   2          45 Main Street

  6   COOPER     (null)  2          45 Main Street

  7   ADAMS      (null)  2          45 Main Street

  8   SMITH      62000   2          45 Main Street

  9   PATRICK    40000   2          45 Main Street

  1   JONES      30000   3          10 Collins Road

  2   SMITH      35000   3          10 Collins Road

  3   KING       45000   3          10 Collins Road

  4   SIMPSON    52000   3          10 Collins Road

  5   ANDERSON   31000   3          10 Collins Road

  6   COOPER     (null)  3          10 Collins Road

  7   ADAMS      (null)  3          10 Collins Road

  8   SMITH      62000   3          10 Collins Road

  9   PATRICK    40000   3          10 Collins Road

  ```


  这里发生了什么？你预期有八或九条记录，却发现了 27 条。这种类型的结果被称为*笛卡尔积*，即第一个表中的每一行都与第二个表中的每一行相关联。


  如果你仔细查看结果，可以看到它列出了所有员工并显示第一个办公室的地址，然后再次列出所有员工并显示第二个办公室的地址。它对第三个办公室重复此操作，27 条结果来自九名员工乘以三个办公室。如果我们有更多的办公室，我们会得到更多的结果。


  为什么会这样？这是因为我们从两个表中选择数据时没有指定连接条件。这是我们的查询：


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e,

  office o;

  ```


  其中没有`INNER JOIN`或`OUTER JOIN`，也没有提及任何需要匹配的列。这会导致笛卡尔积，而这几乎肯定不是你想要的。运行一个显示 27 条结果而不是八或九条的查询可能还不算太糟，但如果你有成百上千条记录，那么最终可能会得到一个非常大的结果集。


  这种情况经常在忘记添加连接条件时意外发生。然而，有一种方法可以明确指定你需要这种类型的连接。


  ### 使用交叉连接


  交叉连接是一种会返回笛卡尔积结果的连接类型。它允许你将一个表中的所有记录与另一个表中的所有记录刻意匹配。


  为什么你会想要这样做呢？这是为表或查询生成数据的一种简便方法，这可能是你当前项目需要做的事情。


  交叉连接的语法如下所示：


  ```sql

  SELECT columns

  FROM table1

  CROSS JOIN table2;

  ```


  你可以将其应用于你的员工和办公室查询，如下所示：


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e

  CROSS JOIN office o;

  ```


  这将显示与之前相同的结果：同样的 27 条记录。


  为什么你要写`CROSS JOIN`而不是使用之前的方法？在 SQL 中，有几种方法可以完成相同的任务，有时你会得到一个没有显示错误但不完全符合你想要的结果。使用`CROSS
  JOIN`的原因是为了明确表示你打算将一个表中的每条记录与另一个表中的每条记录连接起来。根据经验，故意编写`CROSS JOIN`的情况非常罕见。大多数时候，如果你看到之前显示的那种结果，通常是因为你的查询中有错误。如果你使用第一种方法编写查询，并不能清楚地表明你是故意的还是无意的。


  ### 替代连接语法


  到目前为止，你已经学习了使用`JOIN`关键字的各种变体来连接两个表：


  *   `JOIN`, `INNER JOIN`

  *   `LEFT JOIN`, `LEFT OUTER JOIN`

  *   `RIGHT JOIN`, `RIGHT OUTER JOIN`

  *   `CROSS JOIN`


  这组关键字被称为 ANSI 连接语法，因为它是 SQL ANSI 标准的一部分。还有一种连接表的替代语法，通常称为 Oracle 语法，因为它是 Oracle
  SQL 特有的。


  当你编写一个连接两个表的查询时，你实际上是在说，“显示这些列，其中这个表的列等于那个表的列。” 这听起来很像`WHERE`子句的功能。


  替代连接语法做的正是这件事。它使用`WHERE`子句来执行连接。对于处理外连接，有一些 Oracle 特有的额外符号。



  #### 内连接


  这种替代连接语法是什么样的？它是一个`WHERE`子句：


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e, office o

  WHERE e.office_id = o.id;

  ```


  以这种方式编写查询涉及将表名放入`FROM`子句，作为逗号分隔的列表。默认情况下，这被视为一个`CROSS JOIN`，其中来自两个表的每条记录都会连接在一起。然后，你使用`WHERE`子句来指定两个表连接所依据的列，从而将结果缩减为有意义的记录。


  此查询的结果是：


  ```sql

  ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

  1   JONES      30000   1          123 Smith Street

  2   SMITH      35000   2          45 Main Street

  3   KING       45000   2          45 Main Street

  4   SIMPSON    52000   1          123 Smith Street

  6   COOPER     (null)  1          123 Smith Street

  7   ADAMS      (null)  3          10 Collins Road

  8   SMITH      62000   3          10 Collins Road

  9   PATRICK    40000   1          123 Smith Street

  ```


  这显示了所有有办公室的员工及其办公地址。它与执行一个`INNER JOIN`相同，但表匹配的条件写在`WHERE`子句中，而不是`ON`关键字后面。我们刚刚编写的查询等同于这个：


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e

  INNER JOIN office o ON e.office_id = o.id;

  ```


  #### 外连接


  前面的例子展示了如何使用替代语法（在`WHERE`子句中）编写内连接。如何使用这种语法编写外连接呢？


  Oracle 提供了一些符号，你可以用在查询中，在`WHERE`子句中创建外连接。你可以在`WHERE`子句中，将`+`符号放在你预期可能为`NULL`的列旁的括号`()`内。


  要编写一个`LEFT OUTER JOIN`（显示左表的记录，右表显示匹配项或`NULL`值），可以使用以下查询：


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e, office o

  WHERE e.office_id = o.id(+);

  ```


  注意，`(+)`符号出现在`o.id`列之后，分号之前。它是 SQL 语句的一部分，并且与`office.id`列相关联，这意味着该表的记录可能为空。


  结果是：


  ```sql

  ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

  1   JONES      30000   1          123 Smith Street

  2   SMITH      35000   2          45 Main Street

  3   KING       45000   2          45 Main Street

  4   SIMPSON    52000   1          123 Smith Street

  6   COOPER     (null)  1          123 Smith Street

  7   ADAMS      (null)  3          10 Collins Road

  8   SMITH      62000   3          10 Collins Road

  9   PATRICK    40000   1          123 Smith Street

  5   ANDERSON   31000   (null)     (null)

  ```


  这与`LEFT OUTER JOIN`显示的内容相同。所有`employee`记录都被显示，并且显示了他们的办公信息。对于员工 5，`office_id`和`address`显示为`NULL`值，因为他们没有`office`。


  右外连接可以通过将`(+)`放在另一列上来编写：


  ```sql

  SELECT e.id,

  e.last_name,

  e.salary,

  e.office_id,

  o.address

  FROM employee e, office o

  WHERE e.office_id(+) = o.id;

  ```


  ```sql

  ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

  1   JONES      30000   1          123 Smith Street

  2   SMITH      35000   2          45 Main Street

  3   KING       45000   2          45 Main Street

  4   SIMPSON    52000   1          123 Smith Street

  6   COOPER     (null)  1          123 Smith Street

  7   ADAMS      (null)  3          10 Collins Road

  8   SMITH      62000   3          10 Collins Road

  9   PATRICK    40000   1          123 Smith Street

  ```


  此查询显示了所有`office`记录及其关联的`employee`记录。员工 5 未被显示，因为他们没有`office`。这等同于`RIGHT OUTER JOIN`。


  #### 为什么不应使用替代连接语法


  现在你已经看到在 Oracle SQL 中有两种执行连接的方法。然而，我建议使用 ANSI 风格（使用`JOIN`关键字）而不是替代风格（使用`WHERE`子句）。原因如下。


  **意图**。`WHERE`子句的意图是限制结果集中的数据。使用`WHERE`子句来连接两个表虽然有效，但这并非`WHERE`子句的本意。在连接两个表时，这看起来很简单，但在下一章我们将学习如何连接多个表。一旦开始处理更大、更复杂的查询，它们通常会有包含大量条件的`WHERE`子句，如果过滤行的逻辑与连接表的逻辑分开，会更容易处理。


  **减少错误**。使用`JOIN`关键字，发生错误或结果集问题的几率非常低，因为你在查询中包含每个表时，都指定了它们如何连接。如果使用`WHERE`子句，你在`FROM`子句中指定所有表，然后在`WHERE`子句中指定条件。当你连接多个表时，你有可能忘记在`WHERE`子句中添加连接表的条件。这可能导致笛卡尔积（如我们之前所见），并产生不正确的结果。在我的职业生涯中，我犯过无数次这样的错误。


  **灵活**。使用`JOIN`关键字可以让你在需要时轻松更改连接类型，并允许你使用其他连接类型，如`FULL OUTER JOIN`。而使用`WHERE`子句中的连接，执行`FULL
  OUTER JOIN`更困难，并且将符号从一侧更改到另一侧需要更多工作。


  因此，每当需要连接表时，我建议使用`JOIN`关键字而不是`WHERE`子句。如果你遇到在`WHERE`子句中连接数据的代码，你将能够理解它的作用，并有机会更改它。


  ### 总结


  `USING`关键字允许你在两个表中列名相同的列上连接它们。它更容易输入，但它依赖于你的列名匹配，而这并不总是可行。


  自然连接是一种内连接，其中 Oracle 数据库基于所有名称相同的列来连接两个表。这容易出问题，就像`USING`关键字一样，因为它依赖于列名匹配。


  交叉连接是一种将一张表中的所有记录与另一张表中的所有记录相关联的连接类型。这会导致笛卡尔积，如果你不指定连接类型，也会发生这种情况。这通常是一个意外，但在某些情况下你可能想要交叉连接，Oracle
  提供了`CROSS JOIN`关键字来实现这一点。


  最后，还有一种替代连接语法，或称为 Oracle 连接语法，它允许你使用`WHERE`子句和一些符号来执行内连接和外连接。这是一种较旧的语法风格，不推荐使用，因为它违背了`WHERE`子句的意图，并且容易出错。


  ## 21. 连接多个表


  在本章中，我们将学习如何使用 SQL 在查询中连接许多表。到目前为止，我们已经了解了不少关于连接的知识：


  *   什么是连接（一种在查询中关联两个表的方式）

  *   什么是内连接和外连接

  *   不同类型的外连接（左、右、全）

  *   一些可用的其他连接类型（交叉连接）或不推荐使用的类型（自然连接）

  *   替代连接语法（`WHERE`子句）


  到目前为止的所有主题都只涉及一次操作两个表：要么是`employee`和`office`表，要么是`employee`和`sales_meeting`表。如果我们想同时从三个表中获取数据该怎么办？




  ### 连接三个表


  在 SQL 中，可以在单个查询中将三个或更多的表连接在一起。事实上，这正是数据库的优势所在。你可以将数据存储在不同的表中，并将它们关联起来，以你需要的方式查看。


  到目前为止，你的数据库中有三个表：


  *   `employee`

  *   `office`

  *   `sales_meeting`


  如果你需要显示来自所有三个表的数据，例如员工姓名、其办公室地址，以及会议的公司和日期，该怎么办呢？你可以通过将这三个表连接在一起来实现。


  连接多个表的工作方式类似于多米诺骨牌游戏。你知道在多米诺骨牌中，有一套小骨牌，每端有一个符号，这些符号是 1 到 6 的骰子点数吗？我不常玩多米诺骨牌，但我记得一条规则，你只能将一张骨牌放在具有相同点数的骨牌旁边。如果一张骨牌的一端是
  4，那么你只能将一张也有 4 的骨牌放在第一张骨牌旁边，如图 21-1 所示。


  ![../images/471705_1_En_21_Chapter/471705_1_En_21_Fig1_HTML.jpg](img/471705_1_En_21_Fig1_HTML.jpg)


  图 21-1：两张多米诺骨牌类似于两个表的连接


  那么，如果你想添加第三张骨牌，你需要找到一张匹配的骨牌并将其添加到末尾，如图 21-2 所示。


  ![../images/471705_1_En_21_Chapter/471705_1_En_21_Fig2_HTML.jpg](img/471705_1_En_21_Fig2_HTML.jpg)


  图 21-2：三张多米诺骨牌类似于三个表的连接


  你可以一直这样做，直到用完所有骨牌。这就像 SQL 中连接的工作原理。骨牌块就是表，上面的数字就是列。只要能在表之间识别出共同的关联，你就可以将许多不同的表连接在一起。你只需在语句末尾添加一个新表并指定连接条件，它就被包含了。


  一个连接两个表的查询可能如下所示：


  ```sql

  SELECT columns

  FROM table1

  INNER JOIN table2 ON condition;

  ```


  一个连接三个表的查询可能如下所示：


  ```sql

  SELECT columns

  FROM table1

  INNER JOIN table2 ON condition

  INNER JOIN table3 ON condition;

  ```


  这个查询将三个表连接在一起，可以显示和处理来自所有三个表的数据。


  ### 连接我们的表


  让我们看一个例子。你有你的三个表（`employee`、`office` 和 `sales_meeting`），并且你想查看来自这三个表的数据。你的查询将如下所示：


  ```sql

  SELECT e.id,

  e.last_name,

  o.address,

  s.company,

  s.meeting_date

  FROM employee e

  INNER JOIN office o ON e.office_id = o.id

  INNER JOIN sales_meeting s ON e.id = s.employee_id;

  ```


  这个查询结合了你目前学到的一些技术，并连接了三个表。你从 `employee` 表中选择，该表被赋予了一个别名 "e"。我们使用了与前面章节相同的 `INNER
  JOIN`，通过相关的 ID（`employee.office_id` 和 `office.id`）将其连接到 `office` 表。


  然后，你可以添加一个 `INNER JOIN` 到 `sales_meeting` 表，别名为 "s"。你需要根据某个条件将其连接到你的其他表。你可以将其连接到在其上面指定的表中的任何列，即
  `office` 或 `employee` 表中的任何列。在这个例子中，你将其连接到 `employee.id` 列，因为这是我们的数据设置方式。


  #### 注意


  当你开始向查询中添加更多表时，表别名非常有用。


  如果你运行这个查询，你会得到这个结果。


  | ID | LAST_NAME | ADDRESS | COMPANY | MEETING_DATE |

  | --- | --- | --- | --- | --- |

  | 2 | SMITH | 45 Main Street | BW Signage | 21/Aug/2018 |


  这是唯一显示的结果，因为它是唯一同时拥有 `office` 记录和 `sales_meeting` 记录的员工：


  *   员工 4、6、7、8 和 9 被排除，因为他们没有 `office` 和 `sales_meeting` 记录。

  *   员工 1 和 3 被排除，因为他们没有 `sales_meeting` 记录。

  *   员工 5 被排除，因为他没有 `office` 记录。


  然而，对于显示的记录，你可以从 `employee` 表看到 `last_name`，从 `office` 表看到 `address`，从 `sales_meeting`
  表看到 `company` 和 `meeting_date`。这是因为你将三个不同的表连接在了一起。


  ### 使用外连接类型


  在之前的例子中，你将三个表连接在一起，但只看到一个结果，因为这是所有三个表共有的记录。如果你想看到一些匹配的记录，对于那些不匹配的则显示 `NULL`，就像一个外连接那样，该怎么办？你可以对多个表进行这样的操作。


  假设你想查看 `employee` 记录以及他们的 `sales_meeting` 和 `office` 记录（如果存在的话），否则显示 `NULL`。你可以通过调整我们之前的查询来实现，使用
  `LEFT JOIN` 代替 `INNER JOIN`。


  ```sql

  SELECT e.id,

  e.last_name,

  o.address,

  s.company,

  s.meeting_date

  FROM employee e

  LEFT JOIN office o ON e.office_id = o.id

  LEFT JOIN sales_meeting s ON e.id = s.employee_id;

  ```


  你的结果将显示：


  ```

  ID  LAST_NAME  ADDRESS           COMPANY           MEETING_DATE

  1   JONES      123 Smith Street  (null)            (null)

  2   SMITH      45 Main Street    BW Signage        21/Aug/2018

  3   KING       45 Main Street    (null)            (null)

  4   SIMPSON    123 Smith Street  (null)            (null)

  6   COOPER     123 Smith Street  (null)            (null)

  7   ADAMS      10 Collins Road   (null)            (null)

  8   SMITH      10 Collins Road   (null)            (null)

  9   PATRICK    123 Smith Street  (null)            (null)

  5   ANDERSON   (null)            ABC Construction  10/Aug/2018

  ```


  这个结果显示了更多的记录。你可以看到所有的 `employee` 记录，他们的 `offices`（如果有的话，否则为 `NULL`），以及他们的 `sales_meetings`（如果有的话，否则为
  `NULL`）。


  这个查询与之前的例子相同，只是使用了 `LEFT JOIN` 而不是 `INNER JOIN`。这是一种很好的方式，可以查看你的主记录在其他表中存在哪些数据（如果有的话）。


  你可以为 `sales_meetings` 编写一个类似的查询，在那里你可以看到所有的 `sales_meeting` 记录，他们的 `employees`（如果有的话），以及他们的
  `offices`（如果有的话）。


  ```sql

  SELECT

  s.id AS sales_meeting_id,

  s.company,

  s.meeting_date,

  e.id AS employee_id,

  e.last_name,

  o.address

  FROM sales_meeting s

  LEFT JOIN employee e ON e.id = s.employee_id

  LEFT JOIN office o ON e.office_id = o.id;

  ```


  结果是：


  ```

  SALES_MEETING_ID  COMPANY           MEETING_DATE  EMPLOYEE_ID   LAST_NAME  ADDRESS

  1                 ABC Construction  10/Aug/18     5             ANDERSON   (null)

  2                 BW Signage        21/Aug/18     2             SMITH      45 Main
  Street

  3                 WXC Services      23/Aug/18     (null)        (null)     (null)

  ```


  这显示了我们的预期结果。重点是 `sales_meeting`，因为其他表正在被“左连接”到它上面。




