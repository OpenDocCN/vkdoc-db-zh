  \ 图标的右侧两个按钮处。\n\n这将把数据保存到数据库中。稍后，更改将被保存。一些消息将出现在屏幕底部的日志中。\n\n现在我们的数据已经在表里了。\n\n\n\
  ### LiveSQL\n\nOracle 有一个在线数据库名为 LiveSQL，它允许你创建自己的数据并运行自己的查询。这对于测试 SQL 或当你无法访问安装了\
  \ Oracle 的计算机时非常有用。\n\n本书中的所有示例代码都可以在 LiveSQL 上运行。不过，你需要先了解如何使用 LiveSQL。要访问 LiveSQL：\n\
  \n1.  在你的网页浏览器中访问 [`https://livesql.oracle.com`](https://livesql.oracle.com)，页面应如图\
