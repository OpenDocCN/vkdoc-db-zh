  \    图 2-44 LiveSQL 中的 CREATE TABLE 查询\n\n4.  点击窗口右上角的“运行”来执行查询。然后，`EMPLOYEE` 表将被创建。\n\
  \n你现在能够在 Oracle 数据库上运行查询并查看结果了。\n\n### 总结\n\n要在自己的计算机上运行 Oracle，我们可以运行 Oracle Express\
  \ Edition 和 Oracle SQL Developer，它们都是 Oracle 提供的免费工具。\n\n设置这些工具涉及安装 Oracle Express，在\
  \ Oracle SQL Developer 中建立新连接，以及创建一个新用户。\n\n然后，我们使用 SQL Developer 中的菜单和屏幕创建了一个表，并向该表添加了一些数据。\n\
  \n在下一章中，我们将研究运行一些基本的 SQL 查询来查看这些数据。\n\n## 第二部分 查看数据\n\n## 3. 检索数据\n\n在本章中，你将学习如何查看数据库中的数据。你将学习你的第一个\
  \ SQL 语句——`SELECT` 语句，并在你刚创建的表上看到一些示例。\n\n### 如何查看数据？\n\n在上一章中，你完成了很多工作：\n\n*  \
  \ 你下载并安装了 Oracle Express。\n*   你下载并运行了 SQL Developer。\n*   你创建了两个新连接和一个新用户。\n* \
  \  你创建了一个新表并填充了示例数据。\n\n当你创建表并添加示例数据时，你使用的是 SQL Developer 的用户界面——菜单和屏幕上出现的字段。然而，SQL\
  \ 是一种基于文本的语言。你将学习如何编写 SQL 代码来处理这些数据，因为这种代码可以在其他应用程序中使用，用于开发报表或其他脚本。\n\nSQL 语言中有一个语句或命令允许你查看数据库中的数据。它被称为\
  \ `SELECT` 语句。\n\n### 什么是 SELECT 语句？\n\n`SELECT` 语句是 SQL 中的一种语句类型，它允许你从数据库中读取数据。一个\
  \ `SELECT` 语句必须按照某种模式编写。这种模式被称为*语法*（syntax），你将学习到的每个语句都有不同的模式或语法。“语法”一词在 SQL 和编程中常用，用于描述代码需要如何编写。\n\
  \n要在 Oracle SQL 中编写 `SELECT` 语句，需要遵循以下语法：\n\n```\nSELECT your_columns\nFROM your_table;\n\
  ```\n\n让我们看看这个语句的各个部分。首先，你从 `SELECT` 关键字开始。我之所以称它为*关键字*，是因为它是 SQL 中的一个特殊词汇，有特定的功能（在这个例子中，是检索一些数据）。一个\
  \ `SELECT` 语句以 `SELECT` 关键字开头。\n\n然后你有一个空格，接着是占位符 \"your_columns\"。这个占位符是你列出希望在结果中显示的列的地方。当你编写\
  \ `SELECT` 语句时（你很快就会做），你需要用其他内容替换 \"your_columns\" 部分，通常是一个列名列表。\n\n接下来，是 `FROM`\
  \ 关键字。`FROM` 关键字是 `SELECT` 语句的一部分。它指定了数据所来源的表。`FROM` 关键字本身不是一个语句，因为一个 SQL 语句不能以\
  \ `FROM` 关键字开头。`FROM` 实际上是一个属于其他语句（如 `SELECT`）的关键字。\n\n然后你有一个空格，接着是 \"your_table\"\
  \ 这个词。这也是一个占位符，你可以将其替换为表的名称。\n\n最后，你有一个分号 \";\"。它指定了语句的结束。写分号是可选的，但养成这个好习惯很有益。当你开始在\
  \ SQL 窗口中拥有多个语句或开始编写更多 SQL 代码时，分号将变得很重要。尽早养成在 SQL 语句末尾添加分号的好习惯。\n\n\n### 需注意的几点\n\
  \n你可能会对 `SELECT` 语句语法中的几处细节感到疑惑，例如大小写和换行。我将部分语法写成了大写字母，部分写成了小写字母：\n\n```\nSELECT\
  \ your_columns\nFROM your_table;\n```\n\n为什么这样呢？基本上，这是关于格式化的问题。当你编写 SQL 时，坚持使用一致的格式有助于他人阅读，也更易于维护。\n\
  \n我倾向于将 SQL 关键字（如 `SELECT` 和 `FROM`）大写。这样无论你是在 SQL Developer、其他集成开发环境（IDE）、应用程序代码还是脚本中阅读它们，关键字都会很醒目。\n\
  \n其他人则偏好将 SQL 关键字小写，例如 `select` 和 `from`。这取决于个人喜好，网上也不乏文章详细说明为何以及如何将 SQL 写成大写或小写。\n\
  \n幸运的是，SQL 并非大小写敏感的语言。对于 Oracle 数据库而言，你写 `SELECT` 还是 `select` 并不重要。代码仍会运行。\n\n你应该如何编写\
  \ SQL 呢？我推荐关键字使用大写。然而，我认为更重要的是与你团队或应用程序的其他部分保持格式一致。如果你的团队偏好小写，那就使用小写。如果你有选择权，比如是为自己学习而非在团队中，那么我建议使用大写。\n\
  \n那么间距呢？为什么我要将 `FROM` 这个词放在新的一行？SQL 并不要求关键字必须换行。\n\n然而，将 `FROM` 关键字（以及许多其他关键字）放在新的一行，将有助于使查询更易于阅读和维护。因此，我推荐你这样编写查询。\n\
  \n### 我们的第一个 SELECT 语句\n\n既然你已经了解了 `SELECT` 语句的语法并解释了一些格式问题，现在让我们来编写你的第一个 `SELECT`\
  \ 语句。\n\n首先，以 `SELECT` 关键字开始：\n\n```\nSELECT\n```\n\n然后，添加你想查看的列。在这个例子中，我们将展示此表中所有可用的列。在\
  \ SQL 中，要实现这一点，你需要使用星号字符 `*`。在 `SELECT` 关键字后加一个空格，然后添加它。\n\n```\nSELECT *\n```\n\
  \n这种 `SELECT` 语句的变体通常被称为“全选”或“select star”，因为你选择了所有的列。\n\n接下来，另起一行并添加 `FROM` 这个词。\n\
  \n```\nSELECT *\nFROM\n```\n\n现在你需要指定数据来自哪个表。你可以使用上一章创建的表，即 `employee`。\n\n```\n\
  SELECT *\nFROM employee\n```\n\n最后，加上分号。\n\n```\nSELECT *\nFROM employee;\n```\n\
  \n这就是你的第一个 `SELECT` 语句！\n\n那么行呢？你已经指定了要看所有列，但行呢？\n\n数据库将使用此语句并查找所有符合你提供条件的行。默认情况下，除非你指定了需要检查的条件，否则将返回所有行。你将在本书后面学习如何显示满足特定条件的行，但目前你并未添加任何条件，因此数据库将显示所有行。\n\
  \n你该如何操作呢？你需要使用 SQL 工作表或编辑器在数据库上运行它。\n\n### 在 SQL Developer 中运行语句\n\n要运行你的 `SELECT`\
  \ 语句，你可以使用 SQL Developer。你可以按照以下步骤操作：\n\n![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig5_HTML.jpg](img/471705_1_En_3_Fig5_HTML.jpg)\n\
  图 3-5 查询结果\n\n1.  打开 `SQL Developer`。它应该在你上一章解压的位置。会出现一个加载屏幕，应用程序会在 5 到 10 秒内加载完成。\n\
  \n2.  在屏幕左侧的 `Connections`（连接）菜单中（图 3-1），应该有两个连接（一个用于 `SYSTEM`，一个用于 `Intro User`\
  \ 或你创建的用户）。\n\n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig1_HTML.jpg](img/471705_1_En_3_Fig1_HTML.jpg)\n\
  \    图 3-1 连接面板\n\n3.  双击你的 `Intro User` 连接（或不是用于 `SYSTEM` 用户的那个连接）。\n\n    一个新的\
  \ SQL 工作表将在主屏幕上打开。请注意，右上角的下拉框包含你的连接名称，如图 3-2 所示。\n\n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig2_HTML.jpg](img/471705_1_En_3_Fig2_HTML.jpg)\n\
  \    图 3-2 新的 SQL 工作表\n\n4.  点击新的 SQL 窗口内部，并按如下方式输入你的 SQL 查询：\n\n    ```\n    SELECT\
  \ *\n    FROM employee;\n    ```\n\n    在你输入时，可能会弹出一些菜单来辅助你的输入。你现在可以忽略它们。你的屏幕应如图\
  \ 3-3 所示。\n\n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig3_HTML.jpg](img/471705_1_En_3_Fig3_HTML.jpg)\n\
  \    图 3-3 输入 SQL 查询\n\n    在 SQL 窗口的顶部，就在你刚写的 `SELECT` 语句上方，有一排按钮，如图 3-4 所示。\n\n\
  \    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig4_HTML.jpg](img/471705_1_En_3_Fig4_HTML.jpg)\n\
  \    图 3-4 运行按钮\n\n    第一个按钮，那个大的绿色箭头，是 `Run Statement`（运行语句），第二个是 `Run Script`（运行脚本）。我将向你展示使用这些按钮会发生什么。你可以暂时忽略其他按钮。\n\
  \n5.  点击工具栏上的第一个按钮，即 `Run Statement` 按钮。\n\n    SQL 语句开始运行，片刻之后，一组数据显示在屏幕底部（图 3-5）。\n\
  \n你会注意到数据以行的形式显示，并且有五行。在每行的左边，都有一个数字，如图 3-6 截图所示。这个数字代表你结果的行号。\n\n![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig6_HTML.jpg](img/471705_1_En_3_Fig6_HTML.jpg)\n\
  图 3-6 行号\n\n在这个例子中，行号与 `ID` 相同，但那是因为数据显示的顺序就是如此。当你编写没有 `ID` 列或以不同顺序显示数据的查询时，这个行号可以帮助你查看每一行号对应的内容。\n\
  \n### 结果\n\n当 `SELECT` 语句在数据库上运行时，该语句的结果会显示给你。这被称为结果，或你的 `result set`（结果集），因为它是由查询产生的数据集合。\n\
  \n在你之前的例子中，你想查看 `employee` 表中的所有列。当你运行此语句时，屏幕底部会出现一个表格或网格。这个网格就是你的 `result set`，它包含了\
  \ `employee` 表中的所有列和行。\n\n这与你上一章输入的数据相同。它显示了 `ID` 列、`last_name` 列和 `salary` 列。它显示了你输入的所有行。\n\
  \n\n### 运行脚本\n\n另一种运行查询的方法是使用 SQL Developer 中的 **运行脚本** 按钮。此按钮将运行 SQL 窗口中的所有命令（可能不止一个），并且会以基于文本的输出形式显示结果，而不是表格形式。\n\
  \n在 SQL 窗口中写好你的 `SELECT` 查询后，点击 **运行脚本** 按钮。图 3-7 显示了输出的样子。\n\n![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig7_HTML.jpg](img/471705_1_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7\n\n脚本输出\n\n这显示了与 **运行语句** 按钮相同的输出。但是，它以基于文本的格式显示。这使得复制粘贴到文本文件或一次性运行多个语句变得容易。如果你执行多个查询，它们的结果将在此文本输出中依次显示，第一个查询的结果在顶部。\n\
  \n了解如何使用 **运行脚本** 功能及其作用是很有好处的。然而，在本书中，你将主要使用 **运行语句** 按钮。\n\n### SQL 中的错误\n\n运行这些查询看起来相当简单，对吧？运行一条语句，数据就会显示。然而，并非所有\
  \ SQL 语句都那么简单，也并非所有语句都会给你想要的结果。\n\n偶尔，你运行一个查询，结果不是从数据库返回结果集，而是一个错误消息。\n\n显示错误消息的原因有很多，例如：\n\
  \n*   你的语句存在语法错误，或者写法不正确（例如，关键字放错了位置）。\n*   处理数据时遇到问题（例如，某一行中的某个值无法转换为数字）。\n*  \
  \ 发生了与数据库相关的错误（例如，连接问题）。\n\n我不知道有谁能运行 SQL 查询而不遇到错误。我们都会在 SQL 上犯错。即使我做这行有一段时间了，我的查询仍然会出错。\n\
  \n你刚开始时遇到的大多数错误都是第一种：查询写得不正确的语法错误。数据相关的错误有时也会发生。其他与数据库相关的错误很少见，通常超出了你的控制范围。\n\n\
  以下小节描述了你在编写 SQL 时会看到的一些更常见的错误。随着你学习本书的深入，你会了解更多关于可能出错的地方，以及如何发现和纠正语句中的问题。\n\n####\
  \ 缺少关键字\n\n我们之前的示例查询如下：\n\n```sql\nSELECT *\nFROM employee;\n```\n\n假设你忘记在查询中添加\
  \ `FROM` 关键字，你的查询变成这样：\n\n```sql\nSELECT * employee;\n```\n\n如果你运行该语句，你会得到这个错误：\n\
  \n```\nORA-00923: FROM keyword not found where expected\n00923. 00000 -  \"FROM\
  \ keyword not found where expected\"\n*Cause:\n*Action:\nError at Line: 1 Column:\
  \ 10\n```\n\n所有 Oracle 错误消息都以一个三字母代码开头，后跟一个连字符和五个数字。这是错误代码。大多数错误都有 ORA 错误代码，但有些会有\
  \ PLS 代码。\n\n示例中的错误代码是 ORA-00923，消息是 “FROM keyword not found where expected”。\n\n\
  第二行显示了错误描述，但它与错误消息相同。通常，会显示原因和操作。但对于此错误，没有显示原因或操作。最后一行指出了发生错误的行和列：在本例中是第 1 行，第 10\
  \ 列。\n\n这个错误不言自明：“找不到 FROM 关键字”。如果你查看你的 SQL 语句，你会看到没有 `FROM` 关键字，因此该语句无法运行。\n\n\
  #### 表不存在\n\n有时你会有一个类似下面的查询，并得到一个错误：\n\n```sql\nSELECT *\nFROM emplyoee;\n```\n\n\
  ```\nORA-00942: table or view does not exist\n00942. 00000 -  \"table or view does\
  \ not exist\"\n*Cause:\n*Action:\nError at Line: 2 Column: 6\n```\n\n错误提示是 ORA-00942:\
  \ table or view does not exist。\n\n你可能会想，“这不可能，表确实存在，我刚刚创建的！” 我也犯过很多次同样的错误。这个查询的问题在于，你指定的表实际上并不存在，但这是因为它被拼写错了。查询中提到的是\
  \ “emplyoee” 而不是 “employee”。\n\n如果你拼错了表名，就会得到这个错误。但是，此错误也可能由于角色和安全相关的其他一些原因而出现。\n\
  \n### 总结\n\n在本章中，你了解了 `SELECT` 语句，它允许你查看表中存在的数据。你使用 `SELECT *` 显示了表中的所有列和行，并学习了在编写查询时可能出现的错误类型。\n\
  \n在下一章中，你将学习如何指定要显示表中的哪些列。\n\n## 4. 选择特定列\n\n在本章中，你将学习如何显示表中的特定列。像我们在第 3 章中所做的那样返回所有列并不总是必要或可取的。回想一下，我们在该章执行了以下查询：\n\
  \n```sql\nSELECT *\nFROM employee;\n```\n\n图 4-1 显示了结果，即来自 `employee` 表的所有列和行。幸运的是，在这个例子中列数不多，所以结果不至于让人不知所措。\n\
  \n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig1_HTML.jpg](img/471705_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\n对 employee 表查询的结果\n\n试想一下，当一个表有几十列甚至可能上百列时！有时我们不希望在查询结果中看到所有列。这可能是因为我们在应用程序的某个特定部分使用查询，而该部分只希望显示部分数据，而不是表中的所有数据。\n\
  \n在 SQL 中我们如何做到这一点？我们在 `SELECT` 子句中指定每一列。这种查询的语法如下：\n\n```sql\nSELECT column_name,\
  \ column_name...\nFROM table_name;\n```\n\n这个语法看起来与第 3 章中的非常相似。但是，我们不是指定 `*` 字符（表示所有列），而是指定我们要显示的每一列。我们用逗号分隔每个列名。语法末尾的三个点\
  \ “...” 仅表示列名语法可以重复。\n\n还有一件事：我用到了一个我们尚未涵盖的术语，即 *子句（clause）*。子句是一行以关键字开头的 SQL 代码，并包含与该关键字相关的所有内容。\n\
  \n到目前为止，我们已经见过两个子句：\n\n*   SELECT 子句，包含 `SELECT` 关键字及其后跟随的列。\n*   FROM 子句，包含 `FROM`\
  \ 关键字及其后跟随的任何内容，例如表名。\n\n在本书中，我们将经常使用“子句”这个术语来指代查询的不同部分。\n\n\n\n### 选择单列\n\n我们的示例表\
  \ `employee` 包含三列：\n\n*   `id`\n*   `last_name`\n*   `salary`\n\n假设我们只想在结果中显示 `last_name`\
  \ 列。我们可以通过在 `SELECT` 子句中指定 `last_name` 来实现：\n\n```sql\nSELECT last_name\nFROM employee;\n\
  ```\n\n这意味着查询将仅在结果中显示 `last_name` 列，而不显示 `ID` 或 `salary` 列。这样的查询可用于应用程序中需要显示员工姓氏的部分。让我们在数据库上运行这个查询。\n\
  \n首先，如果尚未打开，请打开 `SQL Developer`。然后，通过双击你在前面章节创建的新用户连接来连接到你的数据库。这不是 `system` 用户：它是你创建的另一个用户。在图\
  \ 4-2 中，这个连接被称为 `Intro`。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig2_HTML.jpg](img/471705_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2 `SQL Developer` 中的连接\n\n双击列表中的连接将使 `SQL Developer` 连接到数据库。屏幕上还会显示一个新的 `SQL\
  \ worksheet` 窗口。\n\n如果没有显示 `SQL worksheet` 怎么办？或者你把它关掉了？你可以很容易地打开一个新的。\n\n具体操作如下：\n\
  \n1.  点击工具栏中间图标中的 `新建 SQL 工作表` 按钮。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig3_HTML.jpg](img/471705_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3 新建 `SQL 工作表` 图标\n\n2.  `选择连接` 窗口将如图 4-4 所示弹出。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig4_HTML.jpg](img/471705_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4 `选择连接` 窗口\n\n3.  选择你想要使用的连接，例如 “Intro”，然后点击 `确定`。\n\n将创建一个新的 `SQL 工作表`，它作为新选项卡显示在\
  \ `SQL Developer` 中，如图 4-5 所示。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig5_HTML.jpg](img/471705_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5 新工作表\n\n一旦新文件作为新选项卡显示在屏幕上，你就可以输入你的查询了。让我们将前面示例中使用的查询输入到新窗口中，如图 4-6 所示。\n\
  \n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig6_HTML.jpg](img/471705_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6 在 `SQL Developer` 中编写的查询\n\n在运行查询之前，请注意窗口右上角的下拉框（如图 4-7 所示）。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig7_HTML.jpg](img/471705_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7 `SQL` 窗口的连接\n\n这是用于此文件的连接。`SQL developer` 中的每个选项卡或文件都需要一个到数据库的连接才能运行代码。好处是，如果你正在处理多个用户或数据库，可以为每个选项卡设置一个独立的连接。\n\
  \n然而，这意味着我们必须在运行查询之前选择连接。这个框就是我们进行选择的地方。如果你忘记了这一步，当你第一次为此工作表点击 `运行语句` 时，`SQL Developer`\
  \ 会提示你选择一个连接。\n\n从列表中选择代表你新用户的连接。你的屏幕现在应如图 4-8 所示。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig8_HTML.jpg](img/471705_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8 选择连接后的 `SQL` 查询\n\n现在我们可以运行查询了。点击 `运行查询` 在数据库上执行它并查看结果（图 4-9）。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig9_HTML.jpg](img/471705_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9 我们的查询结果\n\n这里的结果只显示了 `employee` 表中的 `last_name`。它没有显示 `ID` 或 `salary` 列，因为我们没有在查询的\
  \ `SELECT` 子句中指定它们。\n\n### 选择多列\n\n在 `SQL` 中，你可以在 `SELECT` 子句中指定多个列。你可以通过指定多个用逗号分隔的列名来实现，正如我们在本章开头看到的：\n\
  \n```sql\nSELECT column1, column2, column_n...\nFROM your_table;\n```\n\n如果我们想同时显示\
  \ `ID` 和 `last_name` 列，我们的查询可以这样写：\n\n```sql\nSELECT id, last_name\nFROM employee;\n\
  ```\n\n你可能会注意到逗号和下一个列名之间有一个空格。这个空格不是必需的。即使缺少空格，语句仍然会运行。例如，下面的写法可读性较差，但执行效果相同：\n\n\
  ```sql\nSELECT id,last_name\nFROM employee;\n```\n\n不过，我认为有空格更容易阅读：\n\n```sql\n\
  SELECT id, last_name\nFROM employee;\n```\n\n这个查询将显示 `employee` 表中每条记录的 `id` 和 `last_name`。你可以在\
  \ `SQL Developer` 中以与前面示例相同的方式运行此查询。将其输入到 `SQL Developer` 中并点击 `运行语句` 按钮。运行查询前，你的屏幕应如图\
  \ 4-10 所示；运行查询后应如图 4-11 所示。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig11_HTML.jpg](img/471705_1_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11 运行查询后\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig10_HTML.jpg](img/471705_1_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10 运行查询前\n\n结果也可以这样表示：\n\n| ID | LAST_NAME |\n| --- | --- |\n| 1 | JONES |\n\
  | 2 | SMITH |\n| 3 | KING |\n| 4 | SIMPSON |\n| 5 | ANDERSON |\n\n屏幕底部的结果将显示所有同时包含\
  \ `ID` 和 `last_name` 列的记录。\n\n### 选择所有列\n\n你可以使用相同的方法来显示表中的所有列。你可以选择编写 `SELECT *`，或者逐一列出所有列名。\n\
  \n本书前面介绍的 `SELECT *` 方法如下所示：\n\n```sql\nSELECT *\nFROM employee;\n```\n\n例如，如果你想显示所有员工的\
  \ `ID`、`last name` 和 `salary`，你的查询可以这样写：\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee;\n```\n\n指定了三列，它们的名字用逗号分隔。两种方法将显示相同的结果：使用 `*` 选择所有列或单独选择所有列。\n\n你可以在\
  \ `SQL Developer` 中输入此语句，如图 4-12 所示。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig12_HTML.jpg](img/471705_1_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12 选择所有列\n\n当你运行查询时，你将看到所有 `employee` 记录的 `id`、`last_name` 和 `salary`，如图 4-13\
  \ 所示。\n\n![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig13_HTML.jpg](img/471705_1_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13 所有列的结果\n\n\n### 选择特定列还是选择所有列？\n\n如果你想显示表中的所有列，有两种方法可以实现：\n\n*   使用 `SELECT\
  \ *`\n\n*   使用 `SELECT` 并单独指定每一列\n\n哪种方法更好？你应该用哪一种？我推荐单独指定每一列。这意味着你的查询应该像这样：\n\n\
  ```sql\nSELECT id, last_name, salary\nFROM employee;\n```\n\n而不是像这样：\n\n```sql\n\
  SELECT *\nFROM employee;\n```\n\n我为什么这么推荐？你可能在想，如果 `SELECT *` 更容易输入而且效果一样，为什么我不推荐它。这有几个原因。\n\
  \n首先，只显示你感兴趣或想要查看的列是个好习惯。仅仅因为你“可以”显示所有列，或者仅仅因为它更容易输入，并不是一个好习惯。单独输入列名只需要几秒钟（如果你使用像\
  \ `SQL Developer` 这样的程序，速度会更快）。显示所有列可能会导致查询运行变慢，也会使任何使用此查询的应用程序运行变慢，因为需要处理更多的数据。\n\
  \n其次，如果列名发生变化，或者增加了新列，使用 `SELECT *` 会影响查询和结果。具体指定列名则可以减少这个问题。\n\n所以，请尽量单独指定列，而不要使用\
  \ `SELECT *`。\n\n### 总结\n\n你可以使用 SQL 从表中选择特定的列。你可以选择一列、多列或表中的每一列。推荐单独指定列，而不是使用 `SELECT\
  \ *`，因为它更易于维护，并能减轻应用程序和数据库的负载。\n\n## 5. 限制结果\n\n我们刚刚学习了如何显示表中的特定列。在本章中，我们将探讨如何显示表中的特定行。\n\
  \n### 为什么要限制数据？\n\n在之前的例子中，我们查看了表中的所有列，以及表中的一列或两列。其中一个查询是这样的：\n\n```sql\nSELECT\
  \ id, last_name, salary\nFROM employee;\n```\n\n此查询将显示表中所有员工的 `id`、`last_name` 和\
  \ `salary` 列。如果你不想看到表中的所有员工呢？在我们的示例表中，有五条记录。但如果表中有一百条或一千条记录呢？在你可能遇到的工作场所的真实数据库中，拥有超过一百万条记录的表并不罕见。\n\
  \n那么，为什么你只想显示部分记录呢？本质上，如果你有一个需求，只想显示符合特定条件的记录，那么你只需要在数据库中找到这些记录。\n\n一些例子可能是：\n\n\
  *   查找特定员工的所有信息。\n\n*   查找客户的所有订单。\n\n*   查找特定年份的所有学生注册信息。\n\n你可能会想：“我们不能直接获取表中的所有记录，然后让应用程序自己找出需要的吗？”我们可以这样做，但这会非常慢。从表中找出所有数据，将其从数据库发送到应用程序，然后由应用程序丢弃它不需要的记录，这将花费大量的时间和内存。它还会影响网络流量，因为将所有数据发送到应用程序通常会产生大量网络流量，并且比数据库在发送回数据之前检查行要慢得多。\n\
  \n更好的方法是只查找我们想要的数据，这样能更好地利用数据库和时间。幸运的是，在 SQL 中，我们可以使用 `WHERE` 子句轻松做到这一点。\n\n###\
  \ 什么是 WHERE 子句？\n\n`WHERE` 子句是一个子句，它让你能够过滤查询的数据，只显示符合你指定条件的记录。正如我们在前面章节提到的，子句是 SQL\
  \ 关键字及其后所有相关内容的组合。\n\n`WHERE` 子句看起来像这样：\n\n```sql\nWHERE criteria\n```\n\n这个子句看似简单，但功能强大。你将\
  \ `WHERE` 子句放入 `SELECT` 查询中，紧跟在 `FROM` 子句之后。例如：\n\n```sql\nSELECT columns\nFROM\
  \ table\nWHERE criteria;\n```\n\n分号被移到了语句的最后，在 `WHERE` 子句之后。\n\n### 使用文本值的示例\n\n\
  让我们看一些例子。我们将从文本值开始。这是我们在上一章运行的查询，显示员工表中的所有记录。\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee;\n```\n\n我们的结果看起来像这样：\n\n```sql\nID   LAST_NAME   SALARY\n1    JONES\
  \       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON    \
  \ 52000\n5    ANDERSON    31000\n```\n\n假设你想查找 `last_name` 为 `SMITH` 的员工的所有列（或字段）。\n\
  \n你可以这样写查询：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name\
  \ = 'SMITH';\n```\n\n这个查询有几个新的组成部分：\n\n*   首先，你添加了 `WHERE` 关键字。\n\n*   然后，你指定了 `last_name`\
  \ 列。这是因为你想将 `last_name` 列的值与另一个值进行比较。\n\n*   接着，你添加了一个等号 \"`=`\"。\n\n*   最后，你添加了\
  \ `'SMITH'`。这是因为你想查看所有 `last_name` 为 `SMITH` 的记录。\n\n`SMITH` 被放在单引号内，因为这是你要查找的特定值。`SMITH`\
  \ 这个值被称为“字符串”，这是软件开发中表示文本值的术语。`SMITH` 的值用单引号括起来，是因为你想让数据库知道你希望它被视为文本值，而不是列名。如果你没有使用单引号，你的查询看起来会是这样：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name = SMITH;\n\
  ```\n\n然后，Oracle 数据库会查找一个名为 `SMITH` 的列，并会显示错误，因为该列不存在。所以，任何时候你要查找文本值，请确保它用单引号括起来：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name = 'SMITH';\n\
  ```\n\n这个查询是如何工作的？Oracle 数据库将运行此查询，并检查员工表中的每一行，看该行的 `last_name` 是否等于 `'SMITH'`。如果是，则该行将包含在显示给你的结果中。如果不是，则不显示。如果你运行这个查询，你的输出将是：\n\
  \n`ID LAST_NAME SALARY`\n`2  SMITH 35000`\n\n只显示了一条记录，因为只有一条记录的 `last_name` 值是 `SMITH`。当你使用带有文本值的\
  \ `WHERE` 子句时，**值是区分大小写的**。本书前面提到，SQL 不是区分大小写的语言，这意味着 `SELECT` 和 `select` 的功能是相同的。\n\
  \n但是，在处理文本值时，例如 `'SMITH'`，这种检查是区分大小写的。这意味着查找 `'Smith'` 不会显示与查找 `'SMITH'` 相同的结果。\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name = 'Smith';\n\
  ```\n\n```sql\nNo results found.\n```\n\n这是因为表中的值等于 `'SMITH`，这与 `'Smith'` 不同。\n\n\
  #### 注意\n\n文本值（那些在单引号内的）在 SQL 中是区分大小写的。所以，`'SMITH'` 不等于 `'Smith'`。\n\n注意等号周围的空格。它们不是必需的，但没有它们，查询会更难阅读。例如：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name=\"Smith\"\
  ;\n```\n\n这个查询可以执行，但我建议在像等号这样的运算符周围加上空格，以提高可读性。良好地使用空格可以使查询更容易被下一个需要维护它的程序员阅读。\n\
  \n\n### 数值示例\n\n你并不总是需要按文本值进行筛选。你也可以按数值进行筛选。比如说，你想找出所有薪资为 52000 的员工。你的查询会像这样：\n\n\
  ```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE salary = 52000;\n```\n\
  \n这个查询与之前的查询有几个不同之处：\n\n*   我们希望查看具有特定薪资的记录，因此我们指定了 `WHERE salary`。\n\n*   我们不关心\
  \ `last_name` 的值是什么，所以我们从 `WHERE` 子句中移除了针对该列的任何条件。\n\n*   我们还使用了等号，然后指定了一个数字：52000。这样做将显示所有薪资为\
  \ 52000 的记录。\n\n你可能会想，“美元符号怎么办？我能添加逗号作为千位分隔符吗？”你可能正尝试运行这样的查询：\n\n```sql\nSELECT\
  \ id, last_name, salary\nFROM employee\nWHERE salary = $52000;\n```\n\n或者像这样：\n\n\
  ```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE salary = 52,000;\n```\n\
  \n好消息是，你不需要输入逗号和美元符号。良好数据库设计的因素之一是每列都具有合适的数据类型。虽然 `last_name` 列存储为文本值，但 `salary`\
  \ 是存储为数字。\n\n你不能在薪资列中存储货币符号（`$` 或 `€`），因为这意味着该字段不再是数字。然而，你可以将薪资存储为不含货币符号的数字，任何使用此薪资值的应用程序都可以决定如何显示该值（例如，添加货币符号）。\n\
  \n你也不需要存储任何逗号或其他字符作为千位分隔符。这些应该仅用于在报告或应用程序中显示数据，因此显示薪资的位置将决定是否需要任何千位分隔符。在数据库中，我们只存储数字值。你也可以在从数据库\
  \ `SELECT` 该列时添加它。\n\n与 SQL 中的文本值不同，你不应将数值括在单引号中。指定 `salary = 52000` 将有效。\n\n总结一下，我们的查询看起来像这样：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE salary = 52000;\n```\n\
  \n如果你运行查询，结果将如下所示：\n\n```\nID   LAST_NAME   SALARY\n4    SIMPSON     52000\n```\n\
  \n此结果显示了一条符合你条件的记录：`salary` 等于 52000。没有其他记录具有相同的 `salary` 值。\n\n### 查找不等于某个值的行\n\
  \n到目前为止，你一直在查看精确匹配某些条件的记录。如果你想找到所有不匹配某些条件的记录怎么办？\n\n在 SQL 中，你可以使用一个稍有不同的符号来查找不匹配某些条件的记录，该符号代表“不等于”。“不等于”操作由\
  \ `<>` 表示。这个符号是两个尖括号紧挨在一起。\n\n让我们看一个查找不匹配特定条件的记录的示例，你想查看所有 `last_name` 不是 SMITH\
  \ 的员工。\n\n你的查询会像这样：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE\
  \ last_name <> 'SMITH';\n```\n\n这个查询看起来与之前查找所有名为 SMITH 的员工的查询完全相同，只是我们使用了 `<>` 而不是\
  \ `=`。因此，我们新版本的查询将显示所有 `last_name` 不等于 SMITH 的记录。\n\n```\nID   LAST_NAME   SALARY\n\
  1    JONES       20000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
  \    31000\n```\n\n最后，还有另一个符号可用于表示不等于：`!=`。感叹号和等号也指定“不等于”。这意味着你的查询也可以这样写：\n\n```sql\n\
  SELECT id, last_name, salary\nFROM employee\nWHERE last_name != 'SMITH';\n```\n\n\
  结果将是相同的：\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n3    KING    \
  \    40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n```\n\n如果有两个符号做同样的事情，你该使用哪一个？我建议使用两个尖括号\
  \ `<>`，因为它们是 SQL 标准的一部分，而 `!=` 不是。这使他人更容易理解，也便于未来的代码更改。\n\n### 大于\n\n我们已经看了等于和不等于。你还可以使用“大于”检查来查找记录，这意味着你可以找到某列大于特定值的所有记录。大于符号是\
  \ `>`，一个指向右边的单尖括号。\n\n假设你想找到所有 `salary` 大于 35000 的 `employee` 记录。你的查询会像这样：\n\n```sql\n\
  SELECT id, last_name, salary\nFROM employee\nWHERE salary > 35000;\n```\n\n就像查找等于某个数字的值一样，你不应将数字括在单引号中。这适用于你处理数字的所有工作。\n\
  \n这个查询将查看每条记录，确定 `salary` 是否大于 `35000`，如果是，则该记录将显示在结果中。如果不是，该记录将不会被显示。大于符号不包括与你指定的值匹配的值。因此，35000\
  \ 的值不会被返回，但 35001 的值会被返回。\n\n我们的结果将如下所示：\n\n```\nID   LAST_NAME   SALARY\n3    KING\
  \        40000\n4    SIMPSON     52000\n```\n\n结果显示了 `salary` 大于 `35000` 的两条记录。它没有包括\
  \ `employee 'SMITH'`，因为他们的 `salary` 正好是 `35000`，并不大于 `35000`。\n\n### 大于等于\n\n如果你想包含那条\
  \ `'SMITH'` 记录怎么办？你可以将查询改为 `> 34999`。另一种方法是使用“大于等于”。可以使用 `>=` 符号来包含 `'SMITH'` 记录，该符号是大于符号和等号的组合。\n\
  \n如果你想编写一个查询，显示所有 `salary` 大于等于 `35000` 的 `employees`，它会像这样：\n\n```sql\nSELECT id,\
  \ last_name, salary\nFROM employee\nWHERE salary >= 35000;\n```\n\n这个查询将显示以下结果：\n\
  \n```\nID   LAST_NAME   SALARY\n2    SMITH       35000\n3    KING        40000\n\
  4    SIMPSON     52000\n```\n\n它显示了 `'KING'` 和 `'SIMPSON'`，因为他们超过 35000，也显示了 `'SMITH'`，因为\
  \ 35000 满足“大于等于 35000”的条件。它没有显示 `'JONES'` 或 `'ANDERSON'`，因为他们的 `salary` 值小于 35000。\n\
  \n### 小于\n\n就像“大于”条件一样，你可以使用“小于”符号来查找小于某个值的记录。这个符号是 `<`。它的用法与大于符号相同。如果你想编写一个查询来显示所有\
  \ `salary` 小于 40000 的 `employees`，它会像这样：\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee\nWHERE salary < 40000;\n```\n\n你的结果将是：\n\n```\nID   LAST_NAME   SALARY\n\
  1    JONES       20000\n2    SMITH       35000\n5    ANDERSON    31000\n```\n\n\
  表中的五条记录里，`'KING'` (40000) 和 `'SIMPSON'` (52000) 没有被显示，因为他们的 `salary` 值不小于 40000。`'KING'`\
  \ 的 `salary` 值等于 40000，这并不小于 40000。\n\n\n### 小于等于\n\nSQL 支持“小于等于”检查，其方式与“大于等于”检查类似。它使用小于符号和等于符号的组合，即“`<=`”。要查看所有\
  \ `salary` 小于或等于 40000 的员工，可以使用如下查询：\n\n```sql\nSELECT id, last_name, salary\nFROM\
  \ employee\nWHERE salary <= 40000;\n```\n\n该查询的结果如下：\n\n```sql\nID   LAST_NAME \
  \  SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n\
  5    ANDERSON    31000\n```\n\n结果显示了 `'JONES'`、`'SMITH'` 和 `'ANDERSON'`，因为他们的 `salary`\
  \ 都小于 40000。结果显示了 `'KING'`，因为他们的 `salary` 等于 40000。总之，可以使用的不同符号如表 5-1 所示。\n\n**表\
  \ 5-1 可用的比较运算符**\n\n| 含义 | 符号 |\n| --- | --- |\n| 等于 | `=` |\n| 不等于 | `<>` 或 `!=`\
  \ |\n| 大于 | `>` |\n| 大于等于 | `>=` |\n| 小于 | `<` |\n| 小于等于 | `<=` |\n\n### 最佳实践\n\n\
  SQL 中的 `WHERE` 子句非常灵活，正如你在本章所见，整个 SQL 语言也是如此。你的查询的格式和结构可以与其他人编写显示相同结果的查询方式不同。\n\n\
  对于改进你对 `WHERE` 子句及整个查询的使用，我可以提供一些“最佳实践”或提示。这将确保你的查询易于阅读，并且易于你自己和他人将来理解。\n\n####\
  \ 将列名放在左侧\n\n在编写 `WHERE` 子句时，你应该将列名放在左侧，将值或其他列放在每个比较语句的右侧。这使代码保持一致且更易于阅读。这意味着你的查询应该这样写：\n\
  \n```sql\nWHERE last_name = 'SMITH'\n```\n\n而不是：\n\n```sql\nWHERE 'SMITH' = last_name\n\
  ```\n\n两个 `WHERE` 子句的作用相同，但第一个遵循了更常见的格式，我认为更具可读性。大多数有 SQL 经验的程序员都期望列名在左侧，字面值在右侧。\n\
  \n#### 只选择你需要的\n\n在 `WHERE` 子句中提到的列不必在 `SELECT` 子句中列出。你可以在不需要将数据发送回应用程序的情况下，基于某个值进行筛选。\n\
  \n例如，假设你想查看所有 `salary` 小于 40000 的员工 `ID`。你可以在 `SELECT` 和 `WHERE` 子句中都列出 `salary`：\n\
  \n```sql\nSELECT id, salary\nFROM employee\nWHERE salary < 40000;\n```\n\n然而，通过在\
  \ `SELECT` 子句中列出 `salary` 列，当应用程序不需要这些值时，你仍然会导致所有 `salary` 值通过网络发送，或者可能暴露需要保护且保密的数据。\n\
  \n一个更高效的查询版本如下：\n\n```sql\nSELECT id\nFROM employee\nWHERE salary < 40000;\n```\n\
  \n数据库引擎仍然可以基于 `salary` 列筛选结果。但是，只有 `ID` 值会通过网络发送到应用程序。网络流量减少了，你的应用程序用户也不会等待不需要的数据被发送，或者不会将\
  \ `salary` 数据显示给不应看到的人。\n\n### 总结\n\n你可以使用 `WHERE` 子句来筛选结果，它涉及 `WHERE` 关键字和一些条件。这意味着你可以只显示你感兴趣的记录。使用\
  \ `WHERE` 子句筛选数据可以通过多种方式完成，使用诸如等于、不等于、大于和小于等符号。\n\n## 6. 比较数据\n\n你刚刚学习了如何限制要显示的行，使用了多种方法，例如等于或大于。这些方法中的每一种都将一个列与另一个值进行比较。这个另一个值是通过“精确匹配”来检查的。检查时使用的是你指定的确切值。\n\
  \n例如，考虑这个 `WHERE` 子句：\n\n```sql\nWHERE last_name = 'SMITH'\n```\n\n这个 `WHERE` 子句将返回所有\
  \ `last_name` 等于 `'SMITH'` 的行。它不会返回 `last_name` 是以下任何值的记录：\n\n*   Smith\n*   SMITHERS\n\
  *   SMITHSONIAN\n*   Naismith\n*   SMIT\n\n这就是精确匹配的作用。但如果你想匹配部分值呢？\n\n### 什么是部分匹配？\n\
  \n在之前的例子中，你查找了所有 `last_name` 为 `'SMITH'` 的 `employee` 记录。如果你想查找所有 `last_name` 以字母\
  \ S 开头的 `employee` 记录呢？\n\n你可以编写一个如下查询：\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee\nWHERE last_name = 'S';\n```\n\n如果你运行这个查询，会得到以下结果：\n\n```sql\nNo results\
  \ found.\n```\n\n你没有得到任何结果，因为没有任何 `last_name` 值等于 `'S'`。“等于”和“以...开头”在 SQL 及一般的编程中是不同的概念。能够找到“以”某个值“开头”的记录的能力被称为*部分匹配*。\n\
  \n部分匹配是能够匹配部分值的能力。它不是检查一个值是否完全等于另一个值，而是通过部分匹配我们可以检查：\n\n*   以某个值开头\n*   以某个值结尾\n\
  *   包含某个值\n*   其他值的组合\n\n你可以通过在 SQL 中使用 `LIKE` 关键字来执行部分匹配。\n\n### LIKE 的语法\n\n`LIKE`\
  \ 关键字可以在 `WHERE` 子句中代替等号使用：\n\n```sql\nWHERE column LIKE compare_string\n```\n\n\
  你从像之前见过的 `WHERE` 子句开始，然后指定你想要查找的列。接着使用 `LIKE` 关键字并指定一个 `compare_string`，即你要查找的值。\n\
  \n如何编写这个比较字符串？你需要使用所谓的*通配符字符*。通配符字符是用来代表任何其他字符的字符。通过一个例子可以更好地解释这一点。\n\n### 百分号通配符\n\
  \n在前面的例子中，您想查找所有以 “S” 开头的 `last_name`。为此，您可以使用百分号通配符，即 “%”。它代表“零个或多个字符”，即任何字母、数字或符号。\n\
  \n您可以使用这样的 `WHERE` 子句：\n\n```sql\nWHERE last_name LIKE 'S%'\n```\n\n这将查找 `last_name`\
  \ 值以 “S” 作为第一个字符，然后后面是零个或多个字符的记录，无论这些字符是什么。\n\n这将显示如下值：\n\n*   SMITHERS\n*   Smith\n\
  *   SIMPSON\n*   Stanley\n*   Sum\n*   So\n\n您能看出规律吗？所有这些值都以 “S” 开头，后面有零个或多个字符。实际跟随的字符无关紧要，只需有一个或多个即可。\n\
  \n您可以编写查询来显示此数据：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name\
  \ LIKE 'S%';\n```\n\n您的结果将是：\n\n```sql\nID   LAST_NAME   SALARY\n2    SMITH    \
  \   35000\n4    SIMPSON     52000\n```\n\n您可以看到两个结果，一个是 `'SMITH'`，一个是 `'SIMPSON'`。两者都以\
  \ “S” 开头。另外有两个记录也包含 “S”（`'ANDERSON'` 和 `'JONES'`），但它们没有被显示，因为您的条件是 “S%”，意味着 `last_name`\
  \ 需要以单个 S 开头，后面是其他字符。值 `'ANDERSON'` 和 `'JONES'` 不以 S 开头。\n\n如果您想显示那些记录呢？如果您想查找所有\
  \ `last_name` 中包含 “S” 的记录呢？您可以通过在 S 前面和后面都放置 % 符号来实现：\n\n```sql\nSELECT id, last_name,\
  \ salary\nFROM employee\nWHERE last_name LIKE '%S%';\n```\n\n您的结果将如下所示：\n\n```sql\n\
  ID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n4    SIMPSON\
  \     52000\n5    ANDERSON    31000\n```\n\n显示这些值是因为它们在 `last_name` 值的任何位置都包含一个\
  \ S。它可能在开头、中间或结尾。\n\n您也可以查找以 S 结尾的值，通过在比较字符串的开头放置一个 “%” 符号但不在结尾放置。您的查询将如下所示：\n\n\
  ```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name LIKE '%S';\n\
  ```\n\n我们的结果将如下所示：\n\n```sql\nID   LAST_NAME   SALARY\n1    JONES       20000\n\
  ```\n\n如前所示，百分号通配符对于在字符串的任何位置查找一个或一组字符很有帮助。\n\n### 下划线通配符\n\nOracle SQL 中可用的另一个通配符是下划线字符\
  \ “_”。下划线字符用于表示零个或一个任意类型的字符。它与百分号字符类似，后者表示零个或多个字符，区别在于下划线在使用通配符的位置最多允许一个字符。\n\n\
  假设您有这样的 `WHERE` 子句：\n\n```sql\nWHERE last_name LIKE 'SA_'\n```\n\n您的结果将包括：\n\n*\
  \   SAM\n*   SAL\n*   SAr\n*   SA\n\n然而，您的结果**不会**包括：\n\n*   SALL\n*   SANDERS\n\
  *   SAWS\n*   Sam\n\n这是因为下划线的位置最多只允许一个字符，而第二组例子有两个或更多字符（或者不是以 “SA” 开头）。\n\n假设您想查找每个\
  \ `last_name` 是单个字符后跟 `'ING'`。您的查询将如下所示：\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee\nWHERE last_name LIKE '_ING';\n```\n\n结果将是：\n\n```sql\nID   LAST_NAME\
  \   SALARY\n3    KING        40000\n```\n\n此结果显示 `'KING'` 的值，因为它包含一个单个字符，后跟字符 `'ING'`。如果表中有\
  \ `last_name` 值为 `'BING'` 或 `'LING'` 的记录，它们也会被显示。\n\n您也可以混合使用百分号和下划线字符，或任意数量的这两种字符来查找您想要的记录。假设您想查找所有\
  \ `last_name` 中包含 ‘SO’ 但后面只有一个字符的记录。您的查询将是：\n\n```sql\nSELECT id, last_name, salary\n\
  FROM employee\nWHERE last_name LIKE '%SO_';\n```\n\n`WHERE` 子句将 `last_name` 与 `'%SO_'`\
  \ 进行比较，这代表任意数量的字符，然后是字符 SO，然后是零个或一个字符。您的结果将是：\n\n```sql\nID   LAST_NAME   SALARY\n\
  4    SIMPSON     52000\n5    ANDERSON    31000\n```\n\n`'SIMPSON'` 和 `'ANDERSON'`\
  \ 都被显示，因为它们包含字符 `'SO'` 并且后面有一个字符。\n\n假设您想查找所有 `last_name` 包含字母 I 作为第二个字符并且在那之后任何位置包含字母\
  \ N 的记录。您的查询将是：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name\
  \ LIKE '_I%N%';\n```\n\n这个比较字符串 `'_I%N%'` 可以解释为：\n\n*   一个下划线，代表任意单个字符\n*   一个 I，位于第二个位置\n\
  *   一个 %，代表零个或多个任意字符\n*   一个 N，需要在 I 之后但在任何位置\n*   一个 %，代表 N 之后的零个或多个任意字符\n\n此查询的结果将是：\n\
  \n```sql\nID   LAST_NAME   SALARY\n3    KING        40000\n4    SIMPSON     52000\n\
  ```\n\n`'KING'` 和 `'SIMPSON'` 都符合 `WHERE` 子句条件。`'KING'` 中的 N 紧跟在 I 之后，`'SIMPSON'`\
  \ 中的 N 在值的末尾。\n\n\n### 搜索通配符字符\n\n在本章中，你已经学习了如何使用通配符字符 `%` 和 `_` 来查找部分匹配某个值的记录。这些\
  \ `%` 和 `_` 字符在查询运行时会被其他字符替代。但是，如果列中的值实际包含 `%` 字符或 `_` 字符怎么办？\n\n假设你的 `employee`\
  \ 表中存在一个包含下划线的值。这条记录可能是由应用程序在开发过程中放置在那里的，你需要了解更多相关信息。该记录看起来像这样：\n\n```\nID   LAST_NAME\
  \            SALARY\n11   confirmation_needed  (null)\n```\n\n“confirmation_needed”\
  \ 这个 `last_name` 并不是一个有效的 `last_name`。你想编写一个查询来查找所有 `last_name` 中包含下划线字符的 `employees`。你可以这样写查询：\n\
  \n```\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name LIKE '%_%';\n\
  ```\n\n当你运行这个查询时，会得到以下结果：\n\n```\nID   LAST_NAME           SALARY\n1    JONES  \
  \             20000\n2    SMITH               35000\n3    KING                40000\n\
  4    SIMPSON             52000\n5    ANDERSON            31000\n11   confirmation_needed\
  \ 0\n```\n\n这显示了表中的所有记录。查询正在搜索 ‘%_%’，这意味着“所有字符，后跟一个字符，再后跟所有字符”。如何搜索包含下划线的所有字符呢？你需要指定下划线应被视为一个值，而不是通配符字符。这需要对字符进行*转义*。\n\
  \n转义字符意味着你希望该字符被视为列值的一部分，而不是一个特殊符号（例如通配符）。在包括 SQL 在内的许多编程语言中都可以对字符进行转义。要在 SQL 中转义一个字符，你需要做两件事：\n\
  \n*   在要转义的字符前立即指定一个字符\n*   在你的 `WHERE` 子句中指定这个转义字符是什么\n\n常用的转义字符是反斜杠字符 ‘\\’，因为它很少在你的数据中使用。如果确实使用了，你可以选择另一个字符。\n\
  \n要在查询中使用转义字符，你需要这样编写查询：\n\n```\nSELECT id, last_name, salary\nFROM employee\nWHERE\
  \ last_name LIKE '%\\_%' ESCAPE '\\';\n```\n\n这个查询与前一个查询相比有两个变化。首先，在 `LIKE` 关键字后的字符串中有一个\
  \ \\ 字符。这个字符表示后续字符（下划线）被“转义”。其次，在 `WHERE` 子句末尾添加了一个关键字：`ESCAPE` ‘\\’。这意味着转义字符被定义为\
  \ ‘\\’ 字符。如果没有添加这个 `ESCAPE` 关键字，Oracle 将不会知道 `LIKE` 字符串中的 ‘\\’ 是什么意思。\n\n这个更新后的查询结果是：\n\
  \n```\nID   LAST_NAME           SALARY\n11   confirmation_needed 0\n```\n\n如你所见，更新后的查询将只显示\
  \ `last_name` 值包含下划线的记录。\n\n### 性能\n\n关于 `LIKE` 关键字需要了解的另一点是，使用该关键字的查询性能通常不是很好。\n\
  \n如果你使用精确匹配，Oracle 通常可以扫描列中的所有值并找到匹配的值。然而，使用带有 `LIKE` 关键字的部分匹配需要更长时间，因为 Oracle 需要查看每个值并应用你的条件。\n\
  \n我们不会在本书中过多讨论 Oracle SQL 的性能，但我想指出，`LIKE` 关键字的性能表现并不好。如果确实需要，你应该使用它；如果可以用其他方法（例如“等于”）实现，就使用其他方法。\n\
  \n### 总结\n\n`=` 符号和其他符号用于执行精确匹配或完全匹配指定值。在 SQL 中，另一种选择是部分匹配，它匹配值的一部分。这些值的部分可以通过 `LIKE`\
  \ 关键字和使用通配符 `%` 和 `_` 来指定。\n\n## 应用多个过滤器\n\n在前面的章节中，你已经学习了如何限制你想查看的记录。你研究了使用诸如“等于”和“大于”之类的符号。你还学习了如何使用\
  \ `LIKE` 关键字和通配符字符进行部分匹配。\n\n这些概念很有用。然而，你可能已经注意到，我们在每个查询中只按一个条件进行了过滤。我们基于特定的 `last_name`\
  \ 值或特定的 `salary` 值进行过滤。如果我们想基于两个或更多条件进行过滤呢？\n\n### 为什么使用多个过滤器？\n\n为什么要在 SQL 查询中使用多个过滤器？这完全取决于查询的类型或你想要的结果。对于我们正在使用的示例，使用\
  \ `WHERE` 子句执行单个过滤可能没问题，但当你处理更多数据或想要显示不同的结果时，你就需要学习如何使用多个过滤器。\n\n一些例子可能是：\n\n* \
  \  查找特定客户在某个日期范围内的所有订单\n*   查找所有活跃且处于特定状态的学生\n*   查找所有在线订购且订单金额超过特定数额的客户\n\n每种这样的查询都在查看两个或更多条件。你将学习如何使用你的示例数据来实现这一点。\n\
  \n### AND 关键字\n\nSQL 允许你在 `WHERE` 子句中使用多个条件，以将数据限制为你想要查看的记录。有两种方法可以做到这一点。第一种方法是使用\
  \ `AND` 关键字。\n\n`AND` 关键字让你可以在 `WHERE` 子句中指定两个条件。如果一条记录满足这两个条件，它就会被显示。如果一条记录满足零个或一个条件，那么它就不会被显示。如果你想检查查询中的多个条件，并且两个条件都需要匹配某一行，那么\
  \ `AND` 关键字非常有用。\n\n使用 `AND` 关键字如下所示：\n\n```\nWHERE condition\nAND condition\n```\n\
  \n这可以分解为：\n\n*   以 `WHERE` 关键字开头，表示 `WHERE` 子句的开始。\n*   `condition`：一行要被显示所必须满足的条件（例如，`last_name\
  \ = 'SMITH'`）\n*   `AND`：表示一行还必须满足第二个条件。\n*   `condition`：如前所述，一行要被显示所必须满足的条件\n\n\
  让我们看一些使用 `AND` 关键字的多条件示例。\n\n#### 查找匹配姓氏和薪资的记录\n\n假设你想查找 `last_name` 包含字母 “S” 且\
  \ `salary` 大于 32000 的记录。你的查询将如下所示：\n\n```\nSELECT id, last_name, salary\nFROM employee\n\
  WHERE last_name LIKE '%S%'\nAND salary > 32000;\n```\n\n在这个查询中，`AND` 被写在新行上以使其更易于阅读。即使你将\
  \ `AND` 与 `WHERE` 放在同一行，查询仍然会运行（你可能更喜欢那样写）。这个查询的结果将是：\n\n```\nID   LAST_NAME   SALARY\n\
  2    SMITH       35000\n4    SIMPSON     52000\n```\n\n此查询显示了 `'SMITH'` 和 `'SIMPSON'`\
  \ 的记录，因为它们的 `salary` 都大于 32000 且 `last_name` 中都包含 “S”。`'JONES'` 和 `'ANDERSON'` 的记录在\
  \ `last_name` 中都有 “S”，但他们的 `salary` 小于 32000。`'KING'` 的记录 `salary` 大于 32000，但 `last_name`\
  \ 中没有 “S”。因此，只显示了 `'SMITH'` 和 `'SIMPSON'`。\n\n\n\n#### 使用 AND 关键词对两列进行大于和小于查询以查找记录\n\
  \n使用 `AND` 关键词的另一个例子是使用除等于和 `LIKE` 之外的其他比较运算符。假设你想查找 `ID` 大于或等于 3 且 `salary`（工资）小于\
  \ 40000 的记录。你的查询语句会是这样的：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\n\
  WHERE id >= 3\nAND salary < 40000;\n```\n\n结果会是这样：\n\n```\nID   LAST_NAME   SALARY\n\
  5    ANDERSON    31000\n```\n\n这是唯一显示的记录，因为尽管 `KING` 和 `SIMPSON` 的 `ID` 大于或等于 3，但他们的\
  \ `salary` 并不小于 40000。\n\n### OR 关键词\n\n在查询中使用多个筛选条件的第二种方法是使用 `OR` 关键词。`OR` 关键词的使用方式与\
  \ `AND` 关键词相同。然而，区别在于 `OR` 表示两个条件中至少有一个需要满足，而不像 `AND` 关键词那样需要两个条件都满足。\n\n使用 `OR`\
  \ 关键词的语法如下：\n\n```sql\nWHERE condition\nOR condition\n```\n\n`OR` 关键词的工作方式与 `AND`\
  \ 关键词相同。它用在 `WHERE` 子句中，你可以用它来指定第二个要检查的条件。如果对于某一行，两个条件中的任何一个（或两个）为真，那么该行就会包含在结果中。`OR`\
  \ 关键词对于检查多个条件并查看至少有一个条件为真的结果非常有用。\n\n#### 使用 OR 关键词按姓氏或工资查找记录\n\n让我们看看之前使用 `OR`\
  \ 而不是 `AND` 重写的例子。你想查找 `last_name`（姓氏）包含字母“S”，或者 `salary` 大于 32000 的记录。你的查询语句会是这样的：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name LIKE '%S%'\n\
  OR salary > 32000;\n```\n\n你的结果会是这样：\n\n```\nID   LAST_NAME   SALARY\n1    JONES\
  \       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON    \
  \ 52000\n5    ANDERSON    31000\n```\n\n结果显示了表中的每一条记录。`last_name` 为 `'JONES'`、`'SMITH'`、`'SIMPSON'`\
  \ 和 `'ANDERSON'` 的记录被显示，因为它们 `last_name` 中都包含“S”。`'KING'` 的记录被显示是因为他们的 `salary`\
  \ 大于 32000。有些记录只满足两个条件中的一个（`last_name` 中包含“S” 或 `salary` 大于 32000），但这没关系；它们仍然被包含在结果中。\n\
  \n#### 使用 OR 关键词对两列进行大于或小于查询以查找记录\n\n让我们看另一个使用 `OR` 的例子。你可能想查看所有 `ID` 大于或等于 4，或者\
  \ `salary` 小于 40000 的记录。\n\n```sql\nSELECT id, last_name, salary\nFROM employee\n\
  WHERE id >= 4\nOR salary < 40000;\n```\n\n结果会是这样：\n\n```\nID   LAST_NAME   SALARY\n\
  1    JONES       20000\n2    SMITH       35000\n4    SIMPSON     52000\n5    ANDERSON\
  \    31000\n```\n\n我们可以解释表中每条记录的处理方式：\n\n*   `JONES`：显示是因为 `salary` 小于 40000。\n\
  *   `SMITH`：同样显示是因为 `salary` 小于 40000。\n*   `KING`：未显示，因为 `salary` 不小于 40000 且 `ID`\
  \ 不大于或等于 4。\n*   `SIMPSON`：显示是因为 `ID` 大于或等于 4。\n*   `ANDERSON`：显示是因为 `ID` 大于或等于\
  \ 4 且 `salary` 小于 40000。\n\n### 超过两个条件\n\n你已经看到几个关于 `AND` 和 `OR` 带有两个条件的例子。如果你想使用超过两个条件怎么办？你可以在\
  \ SQL 中使用 `AND` 和 `OR` 来做到这一点。你只需在 `WHERE` 子句末尾添加另一个 `AND` 或 `OR`：\n\n```sql\nWHERE\
  \ condition\n[{AND|OR} condition]\n[{AND|OR} condition]\n```\n\n当你阅读 SQL 文档时，会看到类似的语法。方括号\
  \ `[` 和 `]` 表示其中的部分是可选的。花括号 `{` 和 `}` 表示其中的部分是必需的。最后，竖线 `|` 表示必须选择其中一个选项。\n\n因此，这个语法意味着你需要有一个\
  \ `WHERE` 条件，然后你可以有一个 `AND` 或 `OR` 条件。如果你确实有一个 `AND` 或 `OR` 条件，你需要写成 `AND condition`\
  \ 或 `OR condition`。\n\n你可以在查询中添加更多 `AND` 或 `OR` 条件。你还可以在查询中使用 `AND` 和 `OR` 的不同组合。\n\
  \n#### 多个 AND 条件\n\n让我们看一些例子。你可能想查看所有 `last_name` 包含“S”且 `salary` 大于 30000 并小于 40000\
  \ 的 `employees`（员工）。你的查询语句会是这样的：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\n\
  WHERE last_name LIKE '%S%'\nAND salary > 30000\nAND salary < 40000;\n```\n\n你的结果会是这样：\n\
  \n```\nID   LAST_NAME   SALARY\n2    SMITH       35000\n5    ANDERSON    31000\n\
  ```\n\n这显示了 `'SMITH'` 和 `'ANDERSON'`，因为他们满足查询中的所有三个条件：\n\n*   `last_name` 包含“S”。\n\
  *   `salary` 大于 30000。\n*   `salary` 小于 40000。\n\n#### 多个 OR 条件\n\n让我们看一个使用多个 `OR`\
  \ 关键词的例子。假设你想查看所有 `salary` 小于 25000，或 `salary` 大于 50000，或 `last_name` 包含“G”的 `employee`\
  \ 记录。你的查询语句会是这样的：\n\n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE\
  \ salary < 25000\nOR salary > 50000\nOR last_name LIKE '%G%';\n```\n\n此查询的结果将是：\n\
  \n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n3    KING        40000\n\
  4    SIMPSON     52000\n```\n\n`'JONES'` 的记录显示是因为 `salary` 小于 25000。`'KING'` 的记录显示是因为\
  \ `last_name` 包含 G，`'SIMPSON'` 显示是因为 `salary` 大于 50000。对于一行要显示，只需要其中一个条件为真。\n\n\
  #### 组合多个 AND 和 OR 条件\n\n如果你想混合使用这些关键字，在一个查询中同时放入 `AND` 和 `OR` 呢？你可以这样做。假设你有这个查询：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name LIKE '%S%'\n\
  AND salary > 30000\nOR salary < 40000;\n```\n\n你有 `condition1 AND condition2 OR\
  \ condition3`。这些结果会是什么样子呢？它会是这样：\n\n```\nID   LAST_NAME   SALARY\n1    JONES   \
  \    20000\n2    SMITH       35000\n4    SIMPSON     52000\n5    ANDERSON    31000\n\
  ```\n\n如何得到这个结果？`AND` 和 `OR` 关键字按照特定的顺序进行求值。这被称为*运算顺序*（order of operations）。这个概念适用于\
  \ SQL 的多个领域，你可能在数学课上也记得它，当时一些运算比其他运算具有更高的优先级。\n\n`AND` 和 `OR` 都具有相同的优先级。它们按顺序使用。因此，对于这个查询，逻辑是显示满足以下条件的记录：\n\
  \n*   `last_name` 包含 S 且 `salary` 大于 30000\n*   或者，`salary` 小于 40000\n\n现在这是两个独立的条件。`'SMITH'`、`'SIMPSON'`\
  \ 和 `'ANDERSON'` 的记录被显示，因为它们满足第一个标准：`last_name` 包含 S 且 `salary` 大于 30000。`'JONES'`\
  \ 被显示是因为它的 `salary` 小于 40000。`'KING'` 未被显示。\n\n\n\n### 使用多个条件指定顺序\n\n如果你想按特定顺序检查条件怎么办？你可以使用括号：“(”\
  \ 和 “)”。在查询中添加括号将强制查询以某种方式运行。括号内的操作先运行，然后再与括号外的操作组合。让我们看这个例子：\n\n```sql\nSELECT\
  \ id, last_name, salary\nFROM employee\nWHERE last_name LIKE '%N%'\nAND salary >\
  \ 50000\nOR last_name LIKE '%T%';\n```\n\n这将显示符合以下条件的记录：\n\n*   `last_name` 包含 “N”\
  \ 且 `salary` 大于 50000\n*   或者，`last_name` 包含 “T”。\n\n这将显示以下结果：\n\n```sql\nID   LAST_NAME\
  \   SALARY\n2    SMITH       35000\n4    SIMPSON     52000\n```\n\n如果你想显示一组不同的记录，你会这样编写查询：\n\
  \n```sql\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name LIKE '%N%'\n\
  AND (salary > 50000\nOR last_name LIKE '%T%');\n```\n\n注意括号围绕着两个条件和 `OR` 关键字。这意味着这些条件先运行，然后与第一个条件组合。这将显示符合以下条件的记录：\n\
  \n*   `salary` 大于 50000 或 `last_name` 包含 “T”\n*   并且 `last_name` 包含 “N”。\n\n此查询的结果将是：\n\
  \n```sql\nID   LAST_NAME   SALARY\n4    SIMPSON     52000\n```\n\n每条记录都满足这些条件。如果在\
  \ `WHERE` 子句中没有括号，结果就会不同。`'SMITH'` 的记录在第一个结果中显示而不在第二个中显示的原因在于，第一个查询显示了所有 `last_name`\
  \ 包含 “T” 的记录，而第二个查询只显示了 `last_name` 包含 “T” 且 `salary` 大于 50000 的记录。\n\n### 总结\n\n\
  你可以通过组合使用 `AND` 和 `OR` 关键字在 SQL 查询中使用多个筛选器。`AND` 关键字将检查记录是否满足指定的所有条件，而 `OR` 关键字将检查记录是否满足指定的至少一个条件。查询中可以添加许多\
  \ `AND` 和 `OR` 关键字，它们按书写顺序运行。如果你想确保它们按特定顺序运行，可以将条件和关键字用括号括起来。\n\n## 8. 处理 Null 值\n\
  \n在本章中，你将学习 SQL 和数据库中称为“null”的概念。在你一直使用的示例表中，每条记录的每个列都有一个值。然而，在处理真实数据库时，情况并非总是如此。“null”这个概念用于数据未知的情况。\n\
  \n### 缺失数据\n\n在真实数据库中，可能会出现数据缺失的情况。这可能是故意的（我们不知道值是什么），或者是某种错误（本应有值却没有）。数据库中的表不要求你在每一行每一列都存储一个值。\n\
  \n到目前为止，我们在本书中一直使用一个名为 `employee` 的示例表。该表如下所示：\n\n```sql\nID   LAST_NAME   SALARY\n\
  1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON\
  \     52000\n5    ANDERSON    31000\n```\n\n该表有五行和三列。每行的每个列都有一个值。然而，情况并非总是如此。值可能会缺失。如果某个\
  \ `employee` 的 `salary` 未知怎么办？或者我们表中还有其他列，例如 `date of birth`，而某些 `employee` 的这些信息未知？\n\
  \n这是处理数据库时的一种有效场景。问题是：我们如何存储它？假设你有一个新 `employee`，但你目前不知道他们的 `salary` 是多少。可以这样表示：\n\
  \n```sql\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n\
  3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER\
  \      Unknown\n```\n\n在这个例子中，我们使用了一个文本值 “Unknown”，来指明我们不知道新 `employee` 的 `salary`\
  \ 值。但这并不是一个好主意。\n\n首先，`salary` 列是一个数字列，这意味着它只存储数字而不是文本值。在这个数字列中使用文本值 “Unknown” 会在尝试添加时导致错误。\n\
  \n你不应该为了允许出现这个 “Unknown” 值而将 `salary` 列的类型更改为文本值。嗯，你可以这样做，但那样你可以对数据库中的每个字段都这样做，这将意味着数据类型完全失去作用。\n\
  \n如果你使用 “n/a” 的值呢？出于同样的原因，这也不行。将文本值添加到数字列是不可能的。而且，有什么理由说 “n/a” 的值在这个字段或其他字段中不是合法值呢？它可能对\
  \ `salary` 无效，但如果有一个名为 `commission` 的列存储员工的佣金金额呢？“n/a” 的值可能意味着佣金不适用于该特定员工。\n\n如果你使用\
  \ 0 呢？你可以使用 0，但 0 值表示“`salary` 是零”。你想捕捉的事实是 `salary` 未知，而未知与 0 是不同的。如果你使用 0，你将不得不调整所有查看\
  \ `salary` 列的查询，忽略那些 `salary` 为 0 的记录，因为它会扭曲任何总计或平均值。\n\n如果你使用一个空格字符 “ ” 呢？这是一个选项，但它面临着与\
  \ “Unknown” 和 “n/a” 相同的问题，因为它是一个试图添加到数字字段的文本值。\n\n使用空字符串怎么样，这意味着引号内没有任何内容：‘ ’？你可以试试这个，但空字符串在\
  \ SQL 中的处理方式不同。它仍然是一个文本值，这意味着在尝试用于数字或日期字段时会有问题。\n\n所以，你不能使用像 “n/a”、或 0、或 “ ”、或空字符串这样的文本值。你能用什么？你可以使用\
  \ `NULL` 值。\n\n### 什么是 NULL？\n\n`NULL` 这个词是一个关键字，意思是“一个未知值”。它用于表示数据库表中的未知或缺失值。提供这个关键字是因为未知值不同于空字符串、空格、零或其他可能有含义（如\
  \ “n/a” 或 “FALSE”）的文本值。\n\n`NULL` 值在数据库中使用相当频繁，因为无法保证所有字段总是有数据。在数据库中使用 `NULL` 值（相对于零或空字符串）有什么优势？\n\
  \n*   `NULL` 适用于任何列类型：文本、数字、日期。你不需要为了使用它而更改列的类型。\n*   `NULL` 有自己的一套用于执行逻辑的关键字，因为它是一个特殊值。\n\
  *   有一系列函数可以与 `NULL` 一起使用。\n*   它不占用存储空间，这对于小表来说可能不是问题，但对于大表可能有帮助。\n\n### 应该如何处理\
  \ NULL？\n\n`NULL` 值需要特殊的处理方式，这可能是它们唯一的缺点。在本书中，你将学习如何处理 `NULL` 值，但你将结合目前所学查看一些与 `NULL`\
  \ 值相关的例子和处理方式。\n\n你刚刚学习了如何使用等于和大于等符号检查列值是否与其他值匹配。这对于文本、数字和日期值都适用。但是，它不适用于 `NULL`\
  \ 值。一个值不能“等于” `NULL`，因为 `NULL` 是一个未知值。要检查一个值是否是 `NULL`，我们使用关键字 `IS NULL`。你的 `WHERE`\
  \ 子句应该像这样：\n\n```sql\nWHERE salary IS NULL;\n```\n\n如果你使用等号来写，它不会找到任何内容：\n\n```sql\n\
  WHERE salary = NULL;\n```\n\n让我们看一些例子来解释这一点。\n\n### 处理 NULL 的示例\n\n你将看到一些在数据库中处理\
  \ `NULL` 值的例子。首先，你需要在表中添加一些 `NULL` 值，以便可以编写处理它们的 `SELECT` 查询。\n\n\n\n### 添加更多数据\n\
  \n你的表格当前如下所示：\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH\
  \       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON   \
  \ 31000\n```\n\n你应该向表格中添加一个新行，该行的 `salary` 列具有 `NULL` 值，以及另一个新行，该行的 `last_name`\
  \ 和 `salary` 列都具有 `NULL` 值。\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n\
  2    SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
  \    31000\n6    COOPER      NULL\n7    NULL        NULL\n```\n\n让我们将这些数据添加到我们的表中。\n\
  \n1.  打开 SQL Developer 并连接到数据库（如果尚未连接，请按照前面章节所示的步骤操作）。\n2.  点击连接名称旁边的箭头，然后点击“Tables\
  \ (Filtered)”旁边的箭头将其展开，并点击 `EMPLOYEE`，如图 8-1 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig1_HTML.jpg](img/471705_1_En_8_Fig1_HTML.jpg)\n\
  \n    图 8-1：包含表名的连接列表\n\n3.  在屏幕主区域出现的窗口上，点击 `Data` 选项卡，如图 8-2 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig2_HTML.jpg](img/471705_1_En_8_Fig2_HTML.jpg)\n\
  \n    图 8-2：员工表数据\n\n4.  点击工具栏上的 `Insert Row` 按钮。它应该是从左数第三个按钮。将出现一个新行，如图 8-3 所示。\n\
  \n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig3_HTML.jpg](img/471705_1_En_8_Fig3_HTML.jpg)\n\
  \n    图 8-3：表中的新行\n\n5.  在新行中，输入 `ID` 为 6，`last_name` 为 `COOPER`。将 `salary` 值保留为\
  \ `(null)`，如图 8-4 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig4_HTML.jpg](img/471705_1_En_8_Fig4_HTML.jpg)\n\
  \n    图 8-4：输入数据\n\n6.  再次点击 `Insert Row` 按钮，以插入一个新行。\n7.  为新行输入 `ID` 为 7，并将 `last_name`\
  \ 和 `salary` 列保留为 `(null)`，如图 8-5 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig5_HTML.jpg](img/471705_1_En_8_Fig5_HTML.jpg)\n\
  \n    图 8-5：表中的两个新行\n\n8.  点击 `Commit Changes` 按钮将此数据保存到数据库。`Commit Changes` 按钮是灰色带绿色勾的形状，位于红色叉的右侧，如图\
  \ 8-6 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig6_HTML.jpg](img/471705_1_En_8_Fig6_HTML.jpg)\n\
  \n    图 8-6：提交更改按钮\n\n你的屏幕应如图 8-7 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig7_HTML.jpg](img/471705_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7：保存更改\n\n### 选择记录\n\n你可以通过运行一个 `SELECT` 语句来检查新数据是否已在表中，就像你在前面章节中所做的那样。具体步骤如下：\n\
  \n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig8_HTML.jpg](img/471705_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8：选择连接窗口\n\n1.  打开一个新的 SQL 文件或使用你已打开的现有文件。在之前的章节中我们已经介绍过如何操作，现在将再次演示。如果你已经打开了一个窗口，可以跳过接下来的几个步骤。\n\
  2.  要打开一个新的 SQL 文件，请点击 `New Worksheet` 按钮。\n3.  选择一个连接，如图 8-8 所示。\n\n将显示一个新的 SQL\
  \ 工作表。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig9_HTML.jpg](img/471705_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9：在员工表上运行 SELECT 查询\n\n1.  运行以下查询：\n\n    ```\n    SELECT id, last_name, salary\n\
  \    FROM employee;\n    ```\n\n    结果应如图 8-9 所示。\n\n如你所见，此表中显示了 `NULL` 值。在 SQL\
  \ Developer 中，它们显示为 `(null)`，以便我们知道它们是 `NULL` 值。但是，如果此查询的结果在应用程序中使用，它们将是 `NULL`，需要相应地处理。\n\
  \n### 限制 NULL 值\n\n你可以在表中看到 `NULL` 值。如果你想从结果中排除它们该怎么办？之前提到过，不能使用“等于”号。让我们看看如果这样使用会发生什么。你可以运行此查询：\n\
  \n```\nSELECT id, last_name, salary\nFROM employee\nWHERE salary = NULL;\nNo results\
  \ found.\n```\n\nSQL Developer 将不显示任何结果，如图 8-10 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig10_HTML.jpg](img/471705_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10：未找到结果\n\n你需要使用 `IS NULL` 关键字。为此，你可以调整查询使其如下所示：\n\n```\nSELECT id, last_name,\
  \ salary\nFROM employee\nWHERE salary IS NULL;\n```\n\n你的结果将如下所示：\n\n```\nID   LAST_NAME\
  \   SALARY\n6    COOPER      NULL\n7    NULL        NULL\n```\n\n它只显示 `salary` 值为\
  \ `NULL` 的行。你可以对 `last_name` 列尝试相同的操作：\n\n```\nSELECT id, last_name, salary\nFROM\
  \ employee\nWHERE last_name IS NULL;\n```\n\n结果是：\n\n```\nID   LAST_NAME   SALARY\n\
  7    NULL        NULL\n```\n\n这将只显示 `last_name` 列为 `NULL` 的记录。\n\n### 隐藏空值\n\n你刚刚看到了如何在结果中显示包含\
  \ `NULL` 值的记录。如果你想忽略它们该怎么办？你可以使用一个类似的关键词。就像不能使用“等于”来查找 `NULL` 值一样，也不能使用“不等于”来忽略\
  \ `NULL` 值。\n\n要使用的关键词是 `NOT`。`NOT` 是 SQL 中的一个关键字，用于执行与它所修饰的关键字相反的操作。它在 SQL 的多个地方使用，你将在本书中学习到。目前，它可以用来忽略\
  \ `NULL` 值。你的查询将如下所示：\n\n```\nSELECT id, last_name, salary\nFROM employee\nWHERE\
  \ salary IS NOT NULL;\n```\n\n注意你在 `IS` 后面添加了 `NOT`，所以是 `IS NOT NULL`。这意味着将显示所有\
  \ `salary` 不是 `NULL` 的记录。你的结果是：\n\n```\nID   LAST_NAME   SALARY\n1    JONES    \
  \   20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n\
  5    ANDERSON    31000\n```\n\n这些结果不包括那些 `salary` 为 `NULL` 的记录。你可以对 `last_name`\
  \ 列执行相同的操作：\n\n```\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name\
  \ IS NOT NULL;\n```\n\n结果将是：\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n\
  2    SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
  \    31000\n6    COOPER      NULL\n```\n\n你可以看到 `ID` 7 没有被显示，因为它的 `last_name` 是\
  \ `NULL`。`ID` 为 6 的记录被显示了，因为 `last_name` 有值。虽然 `salary` 是 `NULL`，但你的查询没有提到 `salary`。\n\
  \n你可以使用 `AND` 关键字来排除这两个列中任一列为 `NULL` 的记录。\n\n```\nSELECT id, last_name, salary\n\
  FROM employee\nWHERE last_name IS NOT NULL\nAND salary IS NOT NULL;\n```\n\n此查询的结果是：\n\
  \n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n\
  3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n```\n\n\
  你可以看到，两个包含 `NULL` 值的记录没有显示出来。\n\n\n### 在一个 SQL 窗口中运行多个查询\n\n在本章及前面的章节中，你对相同的数据运行了多个\
  \ SQL 查询。你可能是通过删除窗口中已有的所有 SQL 代码并输入新代码来运行查询的。\n\n然而，SQL Developer（以及许多其他程序）使得编写多个查询并仅运行你想要的那一个变得更容易。这也是我们在本书前面提到的分号字符\
  \ `\";\"` 发挥作用的地方。\n\n你可以在一个 SQL 窗口中编写许多不同的 SQL 语句。如果它们用分号分隔，就会被视为独立的查询，并且可以单独运行。\n\
  \n例如，你的窗口可能如图 8-11 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig11_HTML.jpg](img/471705_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11\n\n一个窗口中的多个查询\n\n这包括三个 SQL 查询。它们用空行分隔以便于阅读。更重要的是，每个查询都以分号结尾，以指示语句的结束位置。\n\
  \n你可以在 SQL Developer 中通过在查询内（分号之前）的任何位置单击，然后单击绿色的“运行语句”按钮来运行单个查询。这将仅运行光标所在的查询，如图\
  \ 8-12 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig12_HTML.jpg](img/471705_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12\n\n运行单个查询\n\n你也可以在任何其他查询内单击并运行该查询。这意味着你可以在一个文件中编写任意多的查询，并且只运行你想要的那个。这对本书中的练习非常有帮助，因为你可以将一组代码写在另一组之后，并返回运行任何先前的查询。\n\
  \n### 总结\n\nSQL 中的缺失值被捕获为 `NULL` 值，表示未知值。这与空字符串或零不同。SQL 查询可以使用关键字 `IS NULL` 来检查一个值是否为\
  \ `NULL`。它们也可以使用 `IS NOT NULL` 来查找非 `NULL` 的值。\n\n## 9. 移除重复结果\n\n当你将数据存储在表中时，正如你目前所学，你可以直接输入值并保存。然后数据就被保存到表中。只要你输入的值与列的类型匹配，就应该可以工作。例如，这意味着你不能将文本值输入到数字列中。\n\
  \n到目前为止，你的示例数据如下所示：\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2 \
  \   SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
  \    31000\n6    COOPER      NULL\n7    NULL        NULL\n```\n\n观察这个表，你可能会做几个假设：\n\
  \n*   `ID` 号是连续的，从 1 开始递增。\n*   `last_name` 值都是大写的。\n*   `salary` 有某种最小值和最大值。\n\
  *   所有 `last_name` 值都是不同的。\n\n你还没有在表上定义任何东西来使这些陈述成为事实。目前它们只是假设。这意味着这些假设中的每一个都可能是错误的。`ID`\
  \ 号可能不是连续的。`last_name` 值可能不是大写的。`salary` 可能没有最小和最大范围。所有 `last_name` 值可能并非不同。\n\n\
  ### 添加新记录\n\n在这个例子中，让我们向表中添加一些新值。你可以遵循本书前面相同的步骤。\n\n1.  打开 SQL Developer 并展开窗口左侧的连接。\n\
