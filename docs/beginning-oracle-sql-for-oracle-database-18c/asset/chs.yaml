  \ Oracle 员工。\n\n3.  登录并接受应用程序免责声明后，你将有几个区域可以访问，如图 2-38 所示。你可以查看其他人提供的脚本或代码，也可以从新窗口开始。对于本书，我们将从新窗口开始。\n\
