- fmt: '## Simple Numeric Calculations


    SQL lets you perform simple mathematical calculations using some standard mathematical
    symbols. These symbols are:


    *   `+` for addition

    *   `-` for subtraction

    *   `*` for multiplication

    *   `/` for division


    You may be able to get the result you need just using these symbols. Let’s take
    a look at an example.


    Let’s say you need to see each employee’s salary along with what their salary
    would be if you added 10000 to it. Your query would look like this:


    ```sql

    SELECT id, last_name, salary, salary + 10000

    FROM employee;

    ```


    This query shows the employee `id`, `last_name`, and their current `salary` value.
    It also shows a new column that is the current `salary` value with 10000 added
    to it, which is what the `salary + 10000` does. This won’t update any data in
    the table; it just shows what the current value is with 10000 added to it.


    The results of this query are:


    | ID | LAST_NAME | SALARY | SALARY+10000 |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 40000 |

    | 2 | SMITH | 35000 | 45000 |

    | 3 | KING | 45000 | 55000 |

    | 4 | SIMPSON | 52000 | 62000 |

    | 5 | ANDERSON | 31000 | 41000 |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | 72000 |

    | 9 | PATRICK | 40000 | 50000 |


    The new column is called “SALARY+10000.” Oracle will label the column with the
    expression you have provided and remove the spaces. The values show what the salary
    is with 10000 added to it.


    Any `NULL` values will continue to be displayed as `NULL`. This is because `NULL`
    is an unknown value, and adding anything to an unknown value will still make it
    an unknown value.


    You can also subtract values by using the `-` symbol. For example, to see the
    `salary` value with 5000 less, your query would look like this:


    ```sql

    SELECT id, last_name, salary, salary - 5000

    FROM employee;

    ```


    The results would be:


    | ID | LAST_NAME | SALARY | SALARY-5000 |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 25000 |

    | 2 | SMITH | 35000 | 30000 |

    | 3 | KING | 45000 | 40000 |

    | 4 | SIMPSON | 52000 | 47000 |

    | 5 | ANDERSON | 31000 | 26000 |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | 57000 |

    | 9 | PATRICK | 40000 | 35000 |


    Once again, the new column displays the result of this calculation. It shows a
    value that is 5000 less than the current `salary` value.


    You can also use `*` for multiplication. You can multiply by whole numbers or
    decimal numbers. For example, you can see what the `salary` would look like if
    it had a 10% increase (by multiplying it by 1.1) or what it would look like if
    it was doubled (by multiplying it by 2).


    | ID | LAST_NAME | SALARY | SALARY*1.1 | SALARY*2 |

    | --- | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 33000 | 60000 |

    | 2 | SMITH | 35000 | 38500 | 70000 |

    | 3 | KING | 45000 | 49500 | 90000 |

    | 4 | SIMPSON | 52000 | 57200 | 104000 |

    | 5 | ANDERSON | 31000 | 34100 | 62000 |

    | 6 | COOPER | (null) | (null) | (null) |

    | 7 | ADAMS | (null) | (null) | (null) |

    | 8 | SMITH | 62000 | 68200 | 124000 |

    | 9 | PATRICK | 40000 | 44000 | 80000 |


    ```sql

    SELECT id, last_name, salary, salary * 1.1, salary * 2

    FROM employee;

    ```


    In an earlier chapter, you learned about column aliases, which are names you can
    give to your columns in the results. Using column aliases when performing these
    kinds of calculations is a great idea. This query makes the results much easier
    to read:


    ```sql

    SELECT id,

    last_name,

    salary,

    salary * 1.1 AS salary_inc_comm,

    salary * 2 AS salary_double

    FROM employee;

    ```


    This shows the same data but indicates that the 1.1 multiplication is including
    commission and the multiplication by 2 is a doubling.


    | ID | LAST_NAME | SALARY | SALARY_INC_COMM | SALARY_DOUBLE |

    | --- | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 33000 | 60000 |

    | 2 | SMITH | 35000 | 38500 | 70000 |

    | 3 | KING | 45000 | 49500 | 90000 |

    | 4 | SIMPSON | 52000 | 57200 | 104000 |

    | 5 | ANDERSON | 31000 | 34100 | 62000 |

    | 6 | COOPER | (null) | (null) | (null) |

    | 7 | ADAMS | (null) | (null) | (null) |

    | 8 | SMITH | 62000 | 68200 | 124000 |

    | 9 | PATRICK | 40000 | 44000 | 80000 |


    Finally, you can perform division on numbers using the `/` symbol. To divide the
    employee `salary` by 2, you can write this query:


    ```sql

    SELECT id,

    last_name,

    salary,

    salary / 2

    FROM employee;

    ```


    The results would be:


    | ID | LAST_NAME | SALARY | SALARY/2 |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 15000 |

    | 2 | SMITH | 35000 | 17500 |

    | 3 | KING | 45000 | 22500 |

    | 4 | SIMPSON | 52000 | 26000 |

    | 5 | ANDERSON | 31000 | 15500 |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | 31000 |

    | 9 | PATRICK | 40000 | 20000 |


    These operators or symbols can be very useful when performing these kinds of calculations.
    However, for more complex calculations, you can use Oracle’s built-in functions.


    ## The DUAL Table


    Before we look into the functions available in Oracle, there’s a concept that
    you should learn about first. When you write a `SELECT` statement in Oracle, both
    the `SELECT` and the `FROM` keyword are required. You can’t write a `SELECT` statement
    without `SELECT` or without `FROM`.


    This query will work:


    ```sql

    SELECT id

    FROM employee;

    ```


    But this query will not:


    ```sql

    SELECT id;

    ```


    Sometimes you may not need to select from a table. For example, if you want to
    get the current date, you don’t need to use a specific table for this, as the
    database should know the date (we’ll learn the function for this later in this
    chapter). Or you may want to display a specific number to test out a function.
    For example, if you wanted to display the value 123, then you could write this
    query:


    ```sql

    SELECT 123

    FROM employee;

    ```


    However, this would show a value of 123 for each row of the employee table:


    | 123 |

    | --- |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |


    This shows nine results plus the column heading. This isn’t what you want to see.
    What if you removed the table from the query, as you don’t want to get the employee
    records?


    ```sql

    SELECT 123;

    ```


    When you run this query, it will show an error:


    ```

    ORA-00923: FROM keyword not found where expected

    00923. 00000 -  "FROM keyword not found where expected"

    *Cause:

    *Action:

    Error at Line: 1 Column: 10

    ```


    This is because the `FROM` clause is required. So how can you see just the value
    of 123? You can use a special Oracle table called `DUAL`.


    The `DUAL` table is a table built in to the Oracle database. It contains one row
    and one column. Its primary purpose is to allow you to run queries that use values
    or functions that don’t need any table data.


    You can see the `DUAL` table by running a query on it:


    ```sql

    SELECT *

    FROM dual;

    ```


    | DUMMY |

    | --- |

    | X |


    The `DUAL` table has a single value of “X” in a single column called `DUMMY`.
    This means you can use the `DUAL` table for your earlier query to show the value
    of 123:


    ```sql

    SELECT 123

    FROM dual;

    ```


    | 123 |

    | --- |

    | 123 |


    You can now see the value you have selected. This may not seem that useful now,
    but once we start using functions, you’ll see the benefits of this `DUAL` table.
    This table is Oracle-specific: it doesn’t exist in other SQL vendors such as Microsoft
    SQL Server or MySQL.'
