    \nFigure 27-12\n\nMaking changes to an SQL query\n\nPress Enter to run the query,\
    \ and the results are shown.\n\n## Formatting Output in SQL*Plus\n\nYou’ve probably\
    \ noticed when running these queries in SQL*Plus that the output doesn’t look\
    \ very neat. This is because each column’s width is sized according to the potential\
    \ number of characters in the column, not the actual number of characters, unlike\
    \ SQL Developer. This means you’ll get a lot of blank spaces in columns and rows\
    \ spread over multiple lines.\n\nFor example, running our `SELECT` query on the\
    \ employee table looks like this:\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig13_HTML.jpg](Images/471705_1_En_27_Fig13_HTML.jpg)\n\
    \nFigure 27-13\n\nThe output of a SELECT query\n\n```\nSELECT id, last_name, salary\n\
    FROM employee;\n```\n\nHowever, it’s possible to clean this up to make it more\
    \ readable. We can run commands to format the columns in SQL*Plus. The syntax\
    \ for this command looks like this:\n\n```\ncolumn column_name format value;\n\
    ```\n\nAn example of this command would be:\n\n```\ncolumn last_name format a10;\n\
    ```\n\nThis specifies that the `last_name` column should be formatted as an alphanumeric\
    \ field with a width of 10 characters. We run this command before our SQL query.\n\
    \n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig14_HTML.jpg](Images/471705_1_En_27_Fig14_HTML.jpg)\n\
    \nFigure 27-14\n\nFormatting columns\n\nThen, you can run the SQL query again.\
    \ Press Up a few times to load the query again and press Enter.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig15_HTML.jpg](Images/471705_1_En_27_Fig15_HTML.jpg)\n\
    \nFigure 27-15\n\nFormatted output from a SELECT statement\n\nThe output is a\
    \ lot neater now. If it’s still too narrow, you can rerun that command with a\
    \ larger number (for example, `column last_name format a40`), then rerun the `SELECT`\
    \ query.\n\n## Copy and Paste into SQL*Plus\n\nSQL*Plus lets you enter queries\
    \ and run them. However, you personally might find it easier to write queries\
    \ in a text editor and copy and paste them into the command line. This is something\
    \ you can do in SQL*Plus. To do this:\n\n1.  Enter your query into a text editor,\
    \ such as Notepad++ or Sublime Text.\n\n2.  Copy your query from the text editor.\n\
    \n3.  Open SQL*Plus, right click at your prompt, and select Paste. The query will\
    \ now be shown in SQL*Plus.\n\n4.  Run the query by pressing Enter.\n\nThe query\
    \ results will then be displayed.\n\n## The Forward Slash Character\n\nSometimes\
    \ when looking at SQL code you might see the forward slash character “/” at the\
    \ end of a statement:\n\n```\nSELECT id, last_name, salary, office_id\nFROM employee\n\
    /\n```\n\nYou’ll see these kinds of examples on websites, or in scripts that your\
    \ current or future employers would use. What does this mean, and why do you need\
    \ it if you have a semicolon?\n\nIn SQL*Plus, the semicolon character will ensure\
    \ the most recent statement is run. The slash character will run whatever is in\
    \ the buffer, which can include more than one statement. If you enter the preceding\
    \ query into SQL*Plus, which has a slash at the end rather than a semicolon, and\
    \ run the query, you’ll get the same results.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig16_HTML.jpg](Images/471705_1_En_27_Fig16_HTML.jpg)\n\
    \nFigure 27-16\n\nThe query results\n\nYou’ll often see the slash character in\
    \ scripts that have more than one statement in them. This means all statements\
    \ are run at the same time, rather than stopping between statements.\n\n## Exiting\
    \ SQL*Plus\n\nIf you want to exit SQL*Plus at any time, you can type the command\
    \ exit at the sqlplus prompt.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig17_HTML.jpg](Images/471705_1_En_27_Fig17_HTML.jpg)\n\
    \nFigure 27-17\n\nUsing the exit command to leave SQL*Plus\n\nPress Enter, and\
    \ sqlplus will exit. You will be returned to the command prompt.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig18_HTML.jpg](Images/471705_1_En_27_Fig18_HTML.jpg)\n\
    \nFigure 27-18\n\nUsing the exit command to leave the command prompt\n\nYou can\
    \ then type exit again and press Enter, and the command prompt will exit.\n\n\
    ## What About SQLcl ?\n\nSQL*Plus has been around since the mid-1980s, which is\
    \ a long time in the world of software. The features have remained pretty standard\
    \ for most of this time. Recently, Oracle has released a new free command line\
    \ tool, called “SQLcl,” which is short for SQL Command Line. This is a command\
    \ line tool, similar in operation to SQL*Plus, but with a lot more features. SQLcl\
    \ allows you to:\n\n*   Interact with the database (run SQL queries)\n\n*   Run\
    \ batch scripts\n\n*   Edit SQL code\n\n*   Statement completion\n\n*   .. and\
    \ much more\n\nHowever, unlike SQL*Plus, SQLcl does not come with Oracle databases\
    \ automatically. You can easily download it from the Oracle website though."
  trans: "### 一步登录\n\n你也可以一步登录到你的数据库，即将用户名和密码作为参数指定给 `sqlplus` 命令。\n\n1.  如前面的步骤所述，打开命令窗口。\n\
    2.  输入 `sqlplus username password`，其中 `username` 是你想登录的用户名，`password` 是该账户的密码，然后按回车键。\n\
    \n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig8_HTML.jpg](img/471705_1_En_27_Fig8_HTML.jpg)\n\
    \n    图 27-8\n\n    以不同方式登录 SQL*Plus\n\n现在你已经登录到你的数据库了。\n\n## 在 SQL*Plus 中运行查询\n\
    \n要在 SQL*Plus 中运行查询，只需在登录后于提示符后键入查询。例如，要从 `employee` 表中选择所有记录，请输入此查询：\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig9_HTML.jpg](img/471705_1_En_27_Fig9_HTML.jpg)\n\
    \n图 27-9\n\nSQL*Plus 中的一个 SELECT 查询\n\n```sql\nSELECT id, last_name, salary\n\
    FROM employee;\n```\n\n在编写查询时，你可以按回车键换行。只有当你输入分号并按回车键时，查询才会运行。这意味着你可以随时添加新行，例如为每个\
    \ SQL 关键字或每列单独一行。\n\n在此查询后输入分号，然后按回车键。查询的结果就会显示出来。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig10_HTML.jpg](img/471705_1_En_27_Fig10_HTML.jpg)\n\
    \n图 27-10\n\n运行 SELECT 查询\n\n你可以在提示符处按向上和向下箭头键来循环查看之前的查询。这使得查看最近的查询并对其更改变得容易。如果在空提示符处按向上箭头，它将显示最后一个查询。\n\
    \n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig11_HTML.jpg](img/471705_1_En_27_Fig11_HTML.jpg)\n\
    \n图 27-11\n\n最近的 SQL 语句\n\nSQL*Plus 还为你的查询提供了一个光标。你可以使用方向键移动光标，并在运行查询前对其进行编辑。例如，你可以通过将光标移动到查询末尾并键入\
    \ `ORDER BY last_name ASC;` 来为此查询添加一个 `ORDER BY` 子句。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig12_HTML.jpg](img/471705_1_En_27_Fig12_HTML.jpg)\n\
    \n图 27-12\n\n修改 SQL 查询\n\n按回车键运行查询，结果就会显示出来。\n\n## 在 SQL*Plus 中格式化输出\n\n你可能已经注意到在\
    \ SQL*Plus 中运行这些查询时，输出看起来不太整洁。这是因为与 SQL Developer 不同，这里的每列宽度是根据该列可能包含的字符数来设定的，而非实际字符数。这意味着你会在列中看到很多空格，并且行会跨多行显示。\n\
    \n例如，在 `employee` 表上运行我们的 `SELECT` 查询看起来像这样：\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig13_HTML.jpg](img/471705_1_En_27_Fig13_HTML.jpg)\n\
    \n图 27-13\n\nSELECT 查询的输出\n\n```sql\nSELECT id, last_name, salary\nFROM employee;\n\
    ```\n\n然而，我们可以清理这个输出，使其更具可读性。我们可以在 SQL*Plus 中运行命令来格式化列。这个命令的语法如下：\n\n```sql\n\
    column column_name format value;\n```\n\n这个命令的一个例子是：\n\n```sql\ncolumn last_name\
    \ format a10;\n```\n\n这指定了 `last_name` 列应格式化为宽度为 10 个字符的字母数字字段。我们在 SQL 查询之前运行此命令。\n\
    \n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig14_HTML.jpg](img/471705_1_En_27_Fig14_HTML.jpg)\n\
    \n图 27-14\n\n格式化列\n\n然后，你可以再次运行 SQL 查询。按几次向上箭头键重新加载该查询，然后按回车键。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig15_HTML.jpg](img/471705_1_En_27_Fig15_HTML.jpg)\n\
    \n图 27-15\n\nSELECT 语句的格式化输出\n\n现在输出整洁多了。如果仍然太窄，你可以用一个更大的数字重新运行该命令（例如，`column\
    \ last_name format a40`），然后重新运行 `SELECT` 查询。\n\n## 复制并粘贴到 SQL*Plus 中\n\nSQL*Plus\
    \ 允许你输入并运行查询。然而，你可能会发现在文本编辑器中编写查询然后复制粘贴到命令行中更容易。这在 SQL*Plus 中是可以做到的。操作如下：\n\n\
    1.  在文本编辑器（如 Notepad++ 或 Sublime Text）中输入你的查询。\n2.  从文本编辑器中复制你的查询。\n3.  打开 SQL*Plus，在提示符处右键单击，然后选择“粘贴”。查询现在将显示在\
    \ SQL*Plus 中。\n4.  按回车键运行查询。\n\n查询结果随后将被显示出来。\n\n## 斜杠字符\n\n有时查看 SQL 代码时，你可能会在语句末尾看到斜杠字符\
    \ “/”：\n\n```sql\nSELECT id, last_name, salary, office_id\nFROM employee\n/\n\
    ```\n\n你会在网站上，或者在你当前或未来的雇主使用的脚本中看到这类例子。这意味着什么？如果已经有了分号，为什么还需要它？\n\n在 SQL*Plus\
    \ 中，分号字符将确保运行最近的语句。斜杠字符将运行缓冲区中的任何内容，这可以包含多个语句。如果你将前面的查询输入到 SQL*Plus 中（末尾是斜杠而不是分号）并运行该查询，你会得到相同的结果。\n\
    \n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig16_HTML.jpg](img/471705_1_En_27_Fig16_HTML.jpg)\n\
    \n图 27-16\n\n查询结果\n\n你经常会在包含多个语句的脚本中看到斜杠字符。这意味着所有语句同时运行，而不是在语句之间暂停。\n\n## 退出 SQL*Plus\n\
    \n如果你想随时退出 SQL*Plus，可以在 `sqlplus` 提示符下输入命令 `exit`。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig17_HTML.jpg](img/471705_1_En_27_Fig17_HTML.jpg)\n\
    \n图 27-17\n\n使用 exit 命令离开 SQL*Plus\n\n按回车键，`sqlplus` 将退出。你会返回到命令提示符。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig18_HTML.jpg](img/471705_1_En_27_Fig18_HTML.jpg)\n\
    \n图 27-18\n\n使用 exit 命令离开命令提示符\n\n然后你可以再次输入 `exit` 并按回车键，命令提示符将会退出。\n\n## SQLcl\
    \ 怎么样？\n\nSQL*Plus 自 20 世纪 80 年代中期就已存在，这在软件世界是很长的时间了。在此期间的大部分时间里，其功能基本保持标准。最近，Oracle\
    \ 发布了一个新的免费命令行工具，称为“SQLcl”，即 SQL Command Line 的缩写。这是一个命令行工具，操作上与 SQL*Plus 类似，但功能要多得多。SQLcl\
    \ 允许你：\n\n*   与数据库交互（运行 SQL 查询）\n*   运行批处理脚本\n*   编辑 SQL 代码\n*   语句补全\n*   以及更多功能\n\
    \n然而，与 SQL*Plus 不同，SQLcl 不会随 Oracle 数据库自动安装。不过，你可以轻松地从 Oracle 网站下载它。"
- fmt: "## How to Download and Run SQLcl\n\nYou can download SQLcl from the Oracle\
    \ website. To do this:\n\n1.  Visit Oracle’s website and navigate to Developer\
    \ Tools ➤ SQLcl. You can do this from [`www.oracle.com`](http://www.oracle.com)\
    \ or navigating to the page directly: [`www.oracle.com/technetwork/developer-tools/sqlcl/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/sqlcl/downloads/index.html).\n\
    \n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig19_HTML.jpg](Images/471705_1_En_27_Fig19_HTML.jpg)\n\
    \n    Figure 27-19 The SQLcl download page\n\n2.  Accept the license agreement.\n\
    3.  Click the Download button. There is a single download file that works across\
    \ all operating systems.\n4.  Once the ZIP file is downloaded, extract it to a\
    \ location on your computer.\n5.  Open the command window (Start ➤ `cmd`).\n6.\
    \  Browse to the location where you extracted the files. For example, this could\
    \ be done using the command `cd c:\\oraclexe\\sqlcl\\`\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig20_HTML.jpg](Images/471705_1_En_27_Fig20_HTML.jpg)\n\
    \n    Figure 27-20 Changing to the new directory\n\n7.  Browse to the bin folder:\
    \ `cd bin`\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig21_HTML.jpg](Images/471705_1_En_27_Fig21_HTML.jpg)\n\
    \n    Figure 27-21 Changing to the bin directory\n\n8.  Run the `sql` command.\
    \ SQLcl will then start.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig22_HTML.jpg](Images/471705_1_En_27_Fig22_HTML.jpg)\n\
    \n    Figure 27-22 Running SQLcl\n\n9.  Now that SQLcl is running, you’ll need\
    \ to connect to your database. You can do this at the prompt that appears after\
    \ entering `sqlcl`. Enter your username and password.\n10. Press Enter, and your\
    \ database connection will be made. Your screen should look like this:\n\n   \
    \ ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig23_HTML.jpg](Images/471705_1_En_27_Fig23_HTML.jpg)\n\
    \n    Figure 27-23 Logged on to SQLcl\n\nYou can then use SQLcl to run SQL statements\
    \ and see the output, in the same way as you would for SQL*Plus.\n\n## Summary\n\
    \nOracle offers command line tools, which can be used to access the database without\
    \ a graphical tool such as SQL Developer. The most common tool is SQL*Plus, which\
    \ comes with every Oracle database. Another command line tool is SQLcl, which\
    \ is a newer tool and is downloadable from the Oracle website.\n\nThere are a\
    \ few reasons to use command line tools instead of a graphical tool, such as it\
    \ being faster to run, you won’t always have access to SQL Developer, and SQL*Plus\
    \ is available on all Oracle databases.\n\n# Part VII Appendixes\n\n## How to\
    \ Find and Navigate the Oracle SQL Reference\n\nThere is a lot to learn and remember\
    \ about Oracle SQL. We’ve learned a lot of different keywords in this book, such\
    \ as:\n\n*   `SELECT`\n*   `INSERT`\n*   `UPDATE`\n*   `DELETE`\n*   `CREATE TABLE`\n\
    \nWe’ve also learned a few different SQL functions, such as `SUM` and `UPPER`.\
    \ Each of these commands and functions has a specific syntax, which is the way\
    \ it needs to be run and the parameters that it accepts. This is easy to forget.\n\
    \nFortunately, Oracle provides an online reference or documentation for their\
    \ database. This contains detailed information about all of their commands and\
    \ functions and is a great way to look up something specific if you’ve forgotten\
    \ how it works or what to do.\n\n### Finding the Oracle SQL Reference\n\nTo find\
    \ the Oracle reference:\n\n1.  Visit [`https://docs.oracle.com`](https://docs.oracle.com).\n\
    2.  Click on Database, then Oracle Database on the left.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig1_HTML.jpg](Images/471705_1_En_28_Fig1_HTML.jpg)\n\
    \n    Figure A1-1 The link to Oracle Database documentation\n\n3.  Click on Development,\
    \ which is under Topics.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig2_HTML.jpg](Images/471705_1_En_28_Fig2_HTML.jpg)\n\
    \n    Figure A1-2 The Development link\n\n4.  Scroll down to the “SQL and PL/SQL”\
    \ section and click on the HTML link under “SQL Language Reference.” You can click\
    \ the PDF link instead to download a PDF file for viewing offline.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig3_HTML.jpg](Images/471705_1_En_28_Fig3_HTML.jpg)\n\
    \n    Figure A1-3 The link to the SQL Language Reference\n\n### The Oracle SQL\
    \ Reference\n\nThe Oracle SQL Reference looks like this.\n\n![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig4_HTML.png](Images/471705_1_En_28_Fig4_HTML.png)\n\
    \nFigure A1-4 The SQL Language Reference\n\nThis page contains a few different\
    \ areas:\n\n1.  **`Breadcrumb navigation`**. This can be used to navigate up and\
    \ down in the page hierarchy. It also lets you know where in the documentation\
    \ you currently are, as it changes depending on what page you are on.\n2.  **`Page\
    \ title`**. This is the name of the page you are currently viewing.\n3.  **`Sidebar`**.\
    \ This contains the Table of Contents, which is everything that the guide contains.\
    \ You can click on the heading names to be taken to each section or click the\
    \ + icons to expand a section where it applies. There are also buttons for Search,\
    \ Print, Download, and Share.\n4.  **`Main content`**. This shows the content\
    \ of the page you are currently viewing.\n5.  **`Navigation arrows`**. Clicking\
    \ the left and right arrows will take you to the previous and next pages in the\
    \ reference guide.\n\n### Find What You Need Using Table of Contents\n\nOne way\
    \ to find what you need is to browse and expand the Table of Contents to the right\
    \ section. For example, let’s say you’re looking for information on how to use\
    \ the `SUM` function. To do this:\n\n![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig8_HTML.jpg](Images/471705_1_En_28_Fig8_HTML.jpg)\n\
    \nFigure A1-8 The `SUM` reference page\n\n1.  Click on the Functions link on the\
    \ Table of Contents.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig5_HTML.jpg](Images/471705_1_En_28_Fig5_HTML.jpg)\n\
    \n    Figure A1-5 The Table of Contents panel\n\n2.  The `SUM` function is an\
    \ aggregate function, so click on Aggregate functions on this page or on the Table\
    \ of Contents.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig6_HTML.jpg](Images/471705_1_En_28_Fig6_HTML.jpg)\n\
    \n    Figure A1-6 The Functions page including Aggregate Functions\n\n3.  Scroll\
    \ down and click on `SUM`.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig7_HTML.jpg](Images/471705_1_En_28_Fig7_HTML.jpg)\n\
    \n    Figure A1-7 The Aggregate Functions list\n\n4.  The `SUM` reference page\
    \ is shown in Figure [A1-8](#471705_1_En_28_Chapter.xhtml#Fig8).\n\n### Find What\
    \ You Need Using Search\n\nThe other way to find what you need is to use the Search\
    \ function. To do this:\n\n1.  Click on the Search icon on the left of the sidebar\
    \ (the magnifying glass icon).\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig9_HTML.jpg](Images/471705_1_En_28_Fig9_HTML.jpg)\n\
    \n    Figure A1-9 The Search box on the left sidebar\n\n2.  Enter in a search\
    \ term, such as `SUM`, and press Enter.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig10_HTML.jpg](Images/471705_1_En_28_Fig10_HTML.jpg)\n\
    \n    Figure A1-10 Searching for `SUM`\n\n3.  The search results are shown on\
    \ a new tab, with your search term bolded in each result.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig11_HTML.jpg](Images/471705_1_En_28_Fig11_HTML.jpg)\n\
    \n    Figure A1-11 The search results\n\n4.  Click on the result that matches\
    \ the one you are looking for. In this case, it may be the first result: the `SUM`\
    \ page.\n\n### Index\n\n**A**\n\n`ADD_MONTHS` function\nAggregate functions\n\
    `AVG` ( *see* Average (`AVG`) function)\n`COUNT` function\n`column`\n`DISTINCT`\
    \ parameters\n`SUM` function\n`WHERE` clause\ndefinition\n`LOWER` function\n`MAX`\
    \ function\n`records` syntax\n`WHERE`\n`MIN` function\n`records` syntax\n`WHERE`\
    \ clause\n`SUM` ( *see* `SUM` function)\ntasks\n\n**ALTER TABLE** statement\n\
    `CASCADE CONSTRAINTS`\n`column`\n`constraint`\n`data type`\n`DROP TABLE`\n`foreign\
    \ key`\n`primary key`\n`remove column`\n`rename column`\nstructure of table\n\
    `rename`\n\n**AND** keyword\n\n**Average (`AVG`)** function\n`all` values\n`COUNT`\
    \ function\n`DISTINCT`\n`SUM` and `COUNT` functions\n`WHERE` clause"
  raw: "## How to Download and Run SQLcl\n\nYou can download SQLcl from the Oracle\
    \ website. To do this:\n\n1.  Visit Oracle’s website and navigate to Developer\
    \ Tools ➤ SQLcl. You can do this from [`www.oracle.com`](http://www.oracle.com)\
    \ or navigating to the page directly: [`www.oracle.com/technetwork/developer-tools/sqlcl/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/sqlcl/downloads/index.html)\
    \ .\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig19_HTML.jpg](Images/471705_1_En_27_Fig19_HTML.jpg)\n\
    \n    Figure 27-19\n\n    The SQLcl download page\n\n2.  Accept the license agreement.\n\
    \n3.  Click the Download button. There is a single download file that works across\
    \ all operating systems.\n\n4.  Once the ZIP file is downloaded, extract it to\
    \ a location on your computer.\n\n5.  Open the command window (Start ➤ cmd).\n\
    \n6.  Browse to the location where you extracted the files. For example, this\
    \ could be done using the command cd c:\\oraclexe\\sqlcl\\\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig20_HTML.jpg](Images/471705_1_En_27_Fig20_HTML.jpg)\n\
    \n    Figure 27-20\n\n    Changing to the new directory\n\n7.  Browse to the bin\
    \ folder: cd bin\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig21_HTML.jpg](Images/471705_1_En_27_Fig21_HTML.jpg)\n\
    \n    Figure 27-21\n\n    Changing to the bin directory\n\n8.  Run the sql command.\
    \ SQLcl will then start.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig22_HTML.jpg](Images/471705_1_En_27_Fig22_HTML.jpg)\n\
    \n    Figure 27-22\n\n    Running SQLcl\n\n9.  Now that SQLcl is running, you’ll\
    \ need to connect to your database. You can do this at the prompt that appears\
    \ after entering sqlcl. Enter your username and password.\n\n10.  Press Enter,\
    \ and your database connection will be made. Your screen should look like this:\n\
    \n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig23_HTML.jpg](Images/471705_1_En_27_Fig23_HTML.jpg)\n\
    \n    Figure 27-23\n\n    Logged on to SQLcl\n\nYou can then use SQLcl to run\
    \ SQL statements and see the output, in the same way as you would for SQL*Plus.\n\
    \n## Summary\n\nOracle offers command line tools, which can be used to access\
    \ the database without a graphical tool such as SQL Developer. The most common\
    \ tool is SQL*Plus, which comes with every Oracle database. Another command line\
    \ tool is SQLcl, which is a newer tool and is downloadable from the Oracle website.\n\
    \nThere are a few reasons to use command line tools instead of a graphical tool,\
    \ such as it being faster to run, you won’t always have access to SQL Developer,\
    \ and SQL*Plus is available on all Oracle databases.\n\n# Part VIIAppendixes\n\
    \n# How to Find and Navigate the Oracle SQL Reference\n\nThere is a lot to learn\
    \ and remember about Oracle SQL. We’ve learned a lot of different keywords in\
    \ this book, such as:\n\n*   SELECT\n\n*   INSERT\n\n*   UPDATE\n\n*   DELETE\n\
    \n*   CREATE TABLE\n\nWe’ve also learned a few different SQL functions, such as\
    \ SUM and UPPER. Each of these commands and functions has a specific syntax, which\
    \ is the way it needs to be run and the parameters that it accepts. This is easy\
    \ to forget.\n\nFortunately, Oracle provides an online reference or documentation\
    \ for their database. This contains detailed information about all of their commands\
    \ and functions and is a great way to look up something specific if you’ve forgotten\
    \ how it works or what to do.\n\n## Finding the Oracle SQL Reference\n\nTo find\
    \ the Oracle reference:\n\n1.  Visit [`https://docs.oracle.com`](https://docs.oracle.com)\
    \ .\n\n2.  Click on Database, then Oracle Database on the left.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig1_HTML.jpg](Images/471705_1_En_28_Fig1_HTML.jpg)\n\
    \n    Figure A1-1\n\n    The link to Oracle Database documentation\n\n3.  Click\
    \ on Development, which is under Topics.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig2_HTML.jpg](Images/471705_1_En_28_Fig2_HTML.jpg)\n\
    \n    Figure A1-2\n\n    The Development link\n\n4.  Scroll down to the “SQL and\
    \ PL/SQL” section and click on the HTML link under “SQL Language Reference.” You\
    \ can click the PDF link instead to download a PDF file for viewing offline.\n\
    \n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig3_HTML.jpg](Images/471705_1_En_28_Fig3_HTML.jpg)\n\
    \n    Figure A1-3\n\n    The link to the SQL Language Reference\n\n## The Oracle\
    \ SQL Reference\n\nThe Oracle SQL Reference looks like this.\n\n![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig4_HTML.png](Images/471705_1_En_28_Fig4_HTML.png)\n\
    \nFigure A1-4\n\nThe SQL Language Reference\n\nThis page contains a few different\
    \ areas:\n\n1.  **Breadcrumb navigation** . This can be used to navigate up and\
    \ down in the page hierarchy. It also lets you know where in the documentation\
    \ you currently are, as it changes depending on what page you are on.\n\n2.  **Page\
    \ title** . This is the name of the page you are currently viewing.\n\n3.  **Sidebar**\
    \ . This contains the Table of Contents, which is everything that the guide contains.\
    \ You can click on the heading names to be taken to each section or click the\
    \ + icons to expand a section where it applies. There are also buttons for Search,\
    \ Print, Download, and Share.\n\n4.  **Main** **content** . This shows the content\
    \ of the page you are currently viewing.\n\n5.  **Navigation arrows** . Clicking\
    \ the left and right arrows will take you to the previous and next pages in the\
    \ reference guide.\n\n## Find What You Need Using Table of Contents\n\nOne way\
    \ to find what you need is to browse and expand the Table of Contents to the right\
    \ section. For example, let’s say you’re looking for information on how to use\
    \ the SUM function. To do this:\n\n![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig8_HTML.jpg](Images/471705_1_En_28_Fig8_HTML.jpg)\n\
    \nFigure A1-8\n\nThe SUM reference page\n\n1.  Click on the Functions link on\
    \ the Table of Contents.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig5_HTML.jpg](Images/471705_1_En_28_Fig5_HTML.jpg)\n\
    \n    Figure A1-5\n\n    The Table of Contents panel\n\n2.  The SUM function is\
    \ an aggregate function, so click on Aggregate functions on this page or on the\
    \ Table of Contents.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig6_HTML.jpg](Images/471705_1_En_28_Fig6_HTML.jpg)\n\
    \n    Figure A1-6\n\n    The Functions page including Aggregate Functions\n\n\
    3.  Scroll down and click on SUM.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig7_HTML.jpg](Images/471705_1_En_28_Fig7_HTML.jpg)\n\
    \n    Figure A1-7\n\n    The Aggregate Functions list\n\n4.  The SUM reference\
    \ page is shown in Figure [A1-8](#471705_1_En_28_Chapter.xhtml#Fig8).\n\n## Find\
    \ What You Need Using Search\n\nThe other way to find what you need is to use\
    \ the Search function. To do this:\n\n1.  Click on the Search icon on the left\
    \ of the sidebar (the magnifying glass icon).\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig9_HTML.jpg](Images/471705_1_En_28_Fig9_HTML.jpg)\n\
    \n    Figure A1-9\n\n    The Search box on the left sidebar\n\n2.  Enter in a\
    \ search term, such as SUM, and press Enter.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig10_HTML.jpg](Images/471705_1_En_28_Fig10_HTML.jpg)\n\
    \n    Figure A1-10\n\n    Searching for SUM\n\n3.  The search results are shown\
    \ on a new tab, with your search term bolded in each result.\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig11_HTML.jpg](Images/471705_1_En_28_Fig11_HTML.jpg)\n\
    \n    Figure A1-11\n\n    The search results\n\n4.  Click on the result that matches\
    \ the one you are looking for. In this case, it may be the first result: the SUM\
    \ page.\n\n### Index\n\n### A\n\nADD_MONTHS function Aggregate functions AVG (\
    \ *see* Average (AVG) function) COUNT function column DISTINCT parameters SUM\
    \ function WHERE clause definition LOWER function MAX function records syntax\
    \ WHERE MIN function records syntax WHERE clause SUM ( *see* SUM function) tasks\
    \ ALTER TABLE statement CASCADE CONSTRAINTS column constraint data type DROP TABLE\
    \ foreign key primary key remove column rename column structure of table rename\
    \ AND keyword Average (AVG) function all values COUNT function DISTINCT SUM and\
    \ COUNT functions WHERE clause"
  trans: "\n## 如何下载与运行 SQLcl\n\n您可以从 Oracle 网站下载 SQLcl。具体步骤如下：\n\n1.  访问 Oracle 网站并导航至\
    \ **开发者工具 ➤ SQLcl**。您可以从 [`www.oracle.com`](http://www.oracle.com) 进行操作，或直接访问页面：[`www.oracle.com/technetwork/developer-tools/sqlcl/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/sqlcl/downloads/index.html)。\n\
    \n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig19_HTML.jpg](img/471705_1_En_27_Fig19_HTML.jpg)\n\
    \n    图 27-19 SQLcl 下载页面\n\n2.  接受许可协议。\n3.  点击下载按钮。这是一个适用于所有操作系统的单一下载文件。\n4.\
    \  下载 ZIP 文件后，将其解压缩到计算机上的某个位置。\n5.  打开命令窗口（**开始 ➤ `cmd`**）。\n6.  浏览到您解压缩文件的位置。例如，可以使用命令\
    \ `cd c:\\oraclexe\\sqlcl\\` 完成此操作。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig20_HTML.jpg](img/471705_1_En_27_Fig20_HTML.jpg)\n\
    \n    图 27-20 切换到新目录\n\n7.  浏览到 bin 文件夹：`cd bin`\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig21_HTML.jpg](img/471705_1_En_27_Fig21_HTML.jpg)\n\
    \n    图 27-21 切换到 bin 目录\n\n8.  运行 `sql` 命令。SQLcl 随即启动。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig22_HTML.jpg](img/471705_1_En_27_Fig22_HTML.jpg)\n\
    \n    图 27-22 运行 SQLcl\n\n9.  SQLcl 启动后，您需要连接到数据库。您可以在输入 `sqlcl` 后出现的提示符处执行此操作。输入您的用户名和密码。\n\
    10. 按 Enter 键，即可建立数据库连接。您的屏幕应如下所示：\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig23_HTML.jpg](img/471705_1_En_27_Fig23_HTML.jpg)\n\
    \n    图 27-23 登录到 SQLcl\n\n然后，您可以像使用 SQL*Plus 一样，使用 SQLcl 来运行 SQL 语句并查看输出。\n\n\
    ## 总结\n\nOracle 提供了命令行工具，可用于在无需 SQL Developer 等图形工具的情况下访问数据库。最常见的工具是 SQL*Plus，它随每个\
    \ Oracle 数据库一同提供。另一个命令行工具是 SQLcl，这是一个较新的工具，可以从 Oracle 网站下载。\n\n使用命令行工具而非图形工具有几个原因，例如运行速度更快、您可能并非总能访问\
    \ SQL Developer，以及 SQL*Plus 在所有 Oracle 数据库上都可用。\n\n# 第七部分 附录\n\n## 如何查找和使用 Oracle\
    \ SQL 参考手册\n\n关于 Oracle SQL，有很多内容需要学习和记忆。我们在本书中学习了许多不同的关键字，例如：\n\n*   `SELECT`\n\
    *   `INSERT`\n*   `UPDATE`\n*   `DELETE`\n*   `CREATE TABLE`\n\n我们还学习了一些不同的 SQL\
    \ 函数，例如 `SUM` 和 `UPPER`。这些命令和函数中的每一个都有特定的语法，即其运行方式和接受的参数。这很容易忘记。\n\n幸运的是，Oracle\
    \ 为其数据库提供了在线参考或文档。其中包含了关于其所有命令和函数的详细信息，如果您忘记了其工作原理或用法，这是一个查找具体内容的绝佳方式。\n\n###\
    \ 查找 Oracle SQL 参考手册\n\n要查找 Oracle 参考手册：\n\n1.  访问 [`https://docs.oracle.com`](https://docs.oracle)。\n\
    2.  点击左侧的 **数据库**，然后点击 **Oracle Database**。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig1_HTML.jpg](img/471705_1_En_28_Fig1_HTML.jpg)\n\
    \n    图 A1-1 Oracle 数据库文档链接\n\n3.  点击 **主题** 下的 **开发**。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig2_HTML.jpg](img/471705_1_En_28_Fig2_HTML.jpg)\n\
    \n    图 A1-2 **开发** 链接\n\n4.  向下滚动到 **SQL 和 PL/SQL** 部分，然后点击 **SQL 语言参考** 下的 HTML\
    \ 链接。您也可以点击 PDF 链接来下载 PDF 文件以供离线查看。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig3_HTML.jpg](img/471705_1_En_28_Fig3_HTML.jpg)\n\
    \n    图 A1-3 SQL 语言参考链接\n\n### Oracle SQL 参考手册概览\n\nOracle SQL 参考手册如下所示。\n\n![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig4_HTML.png](img/471705_1_En_28_Fig4_HTML.png)\n\
    \n图 A1-4 SQL 语言参考手册\n\n此页面包含几个不同的区域：\n\n1.  **`面包屑导航`**。可用于在页面层次结构中上下导航。它还让您知道当前在文档中的位置，因为它会根据您所在的页面而变化。\n\
    2.  **`页面标题`**。这是您当前查看的页面的名称。\n3.  **`侧边栏`**。其中包含目录，即指南包含的所有内容。您可以点击标题名称跳转到每个部分，或者点击适用的\
    \ + 图标来展开部分。此外，还有用于搜索、打印、下载和分享的按钮。\n4.  **`主要内容`**。显示您当前查看页面的内容。\n5.  **`导航箭头`**。点击左右箭头将带您进入参考指南的前一页和后一页。\n\
    \n### 使用目录查找所需内容\n\n查找所需内容的一种方法是浏览并展开目录到相应的部分。例如，假设您正在查找有关如何使用 `SUM` 函数的信息。操作如下：\n\
    \n![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig8_HTML.jpg](img/471705_1_En_28_Fig8_HTML.jpg)\n\
    \n图 A1-8 `SUM` 参考页面\n\n1.  点击目录中的 **函数** 链接。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig5_HTML.jpg](img/471705_1_En_28_Fig5_HTML.jpg)\n\
    \n    图 A1-5 目录面板\n\n2.  `SUM` 函数是一个聚合函数，因此点击此页面或目录中的 **聚合函数**。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig6_HTML.jpg](img/471705_1_En_28_Fig6_HTML.jpg)\n\
    \n    图 A1-6 包含聚合函数的函数页面\n\n3.  向下滚动并点击 `SUM`。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig7_HTML.jpg](img/471705_1_En_28_Fig7_HTML.jpg)\n\
    \n    图 A1-7 聚合函数列表\n\n4.  `SUM` 参考页面如图 A1-8 所示。\n\n### 使用搜索功能查找所需内容\n\n查找所需内容的另一种方法是使用搜索功能。操作如下：\n\
    \n1.  点击侧边栏左侧的搜索图标（放大镜图标）。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig9_HTML.jpg](img/471705_1_En_28_Fig9_HTML.jpg)\n\
    \n    图 A1-9 左侧边栏中的搜索框\n\n2.  输入搜索词，例如 `SUM`，然后按 Enter 键。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig10_HTML.jpg](img/471705_1_En_28_Fig10_HTML.jpg)\n\
    \n    图 A1-10 搜索 `SUM`\n\n3.  搜索结果显示在新选项卡中，您的搜索词在每个结果中以粗体显示。\n\n    ![../images/471705_1_En_28_Chapter/471705_1_En_28_Fig11_HTML.jpg](img/471705_1_En_28_Fig11_HTML.jpg)\n\
    \n    图 A1-11 搜索结果\n\n4.  点击与您要找的内容匹配的结果。在这种情况下，可能是第一个结果：`SUM` 页面。\n\n### 索引\n\
    \n**A**\n\n`ADD_MONTHS` 函数\n聚合函数\n`AVG` ( *参见* 平均值 (`AVG`) 函数)\n`COUNT` 函数\n`列`\n\
    `DISTINCT` 参数\n`SUM` 函数\n`WHERE` 子句\n定义\n`LOWER` 函数\n`MAX` 函数\n`records` 语法\n\
    `WHERE`\n`MIN` 函数\n`records` 语法\n`WHERE` 子句\n`SUM` ( *参见* `SUM` 函数)\n任务\n\n**ALTER\
    \ TABLE** 语句\n`CASCADE CONSTRAINTS`\n`列`\n`约束`\n`数据类型`\n`DROP TABLE`\n`外键`\n`主键`\n\
    `删除列`\n`重命名列`\n表结构\n`重命名`\n\n**AND** 关键字\n\n**平均值 (`AVG`)** 函数\n`所有` 值\n`COUNT`\
    \ 函数\n`DISTINCT`\n`SUM` 和 `COUNT` 函数\n`WHERE` 子句\n"
