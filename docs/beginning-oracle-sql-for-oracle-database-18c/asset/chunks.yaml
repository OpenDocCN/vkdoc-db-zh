  trans: '

    ## 简单的数值计算


    SQL 允许你使用一些标准的数学符号执行简单的数学计算。这些符号是：


    *   `+` 用于加法

    *   `-` 用于减法

    *   `*` 用于乘法

    *   `/` 用于除法


    仅使用这些符号你可能就能得到所需的结果。让我们来看一个例子。


    假设你需要查看每位员工的薪资，以及在他们当前薪资基础上增加 10000 后的数额。你的查询可能如下所示：


    ```sql

    SELECT id, last_name, salary, salary + 10000

    FROM employee;

    ```


    此查询显示了员工的 `id`、`last_name` 和其当前的 `salary` 值。它还显示了一个新列，即当前 `salary` 值加上 10000，这正是
    `salary + 10000` 所做的。这不会更新表中的任何数据；它只是显示当前值加上 10000 后的结果。


    该查询的结果是：


    | ID | LAST_NAME | SALARY | SALARY+10000 |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 40000 |

    | 2 | SMITH | 35000 | 45000 |

    | 3 | KING | 45000 | 55000 |

    | 4 | SIMPSON | 52000 | 62000 |

    | 5 | ANDERSON | 31000 | 41000 |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | 72000 |

    | 9 | PATRICK | 40000 | 50000 |


    新列被称为 “SALARY+10000”。Oracle 会使用你提供的表达式来标记该列，并移除空格。这些值显示了薪资加上 10000 后的数额。


    任何 `NULL` 值将继续显示为 `NULL`。这是因为 `NULL` 是一个未知值，向一个未知值添加任何东西仍然会使它成为一个未知值。


    你也可以使用 `-` 符号进行减法运算。例如，要查看 `salary` 值减少 5000 后的数额，你的查询可能如下所示：


    ```sql

    SELECT id, last_name, salary, salary - 5000

    FROM employee;

    ```


    结果将是：


    | ID | LAST_NAME | SALARY | SALARY-5000 |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 25000 |

    | 2 | SMITH | 35000 | 30000 |

    | 3 | KING | 45000 | 40000 |

    | 4 | SIMPSON | 52000 | 47000 |

    | 5 | ANDERSON | 31000 | 26000 |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | 57000 |

    | 9 | PATRICK | 40000 | 35000 |


    新列再次显示了此计算的结果。它显示了一个比当前 `salary` 值少 5000 的数额。


    你也可以使用 `*` 进行乘法运算。你可以乘以整数或小数。例如，你可以查看 `salary` 增加 10%（乘以 1.1）后的情况，或者查看 `salary`
    翻倍（乘以 2）后的情况。


    ```sql

    SELECT id, last_name, salary, salary * 1.1, salary * 2

    FROM employee;

    ```


    结果：


    | ID | LAST_NAME | SALARY | SALARY*1.1 | SALARY*2 |

    | --- | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 33000 | 60000 |

    | 2 | SMITH | 35000 | 38500 | 70000 |

    | 3 | KING | 45000 | 49500 | 90000 |

    | 4 | SIMPSON | 52000 | 57200 | 104000 |

    | 5 | ANDERSON | 31000 | 34100 | 62000 |

    | 6 | COOPER | (null) | (null) | (null) |

    | 7 | ADAMS | (null) | (null) | (null) |

    | 8 | SMITH | 62000 | 68200 | 124000 |

    | 9 | PATRICK | 40000 | 44000 | 80000 |


    在之前的章节中，你已经了解了列别名，即你可以为结果中的列指定的名称。在执行这类计算时使用列别名是一个好主意。这个查询使结果更易于阅读：


    ```sql

    SELECT id,

    last_name,

    salary,

    salary * 1.1 AS salary_inc_comm,

    salary * 2 AS salary_double

    FROM employee;

    ```


    这显示了相同的数据，但表明乘以 1.1 是包含佣金的计算，而乘以 2 是翻倍的计算。


    | ID | LAST_NAME | SALARY | SALARY_INC_COMM | SALARY_DOUBLE |

    | --- | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 33000 | 60000 |

    | 2 | SMITH | 35000 | 38500 | 70000 |

    | 3 | KING | 45000 | 49500 | 90000 |

    | 4 | SIMPSON | 52000 | 57200 | 104000 |

    | 5 | ANDERSON | 31000 | 34100 | 62000 |

    | 6 | COOPER | (null) | (null) | (null) |

    | 7 | ADAMS | (null) | (null) | (null) |

    | 8 | SMITH | 62000 | 68200 | 124000 |

    | 9 | PATRICK | 40000 | 44000 | 80000 |


    最后，你可以使用 `/` 符号对数字进行除法运算。要将员工的 `salary` 除以 2，你可以编写以下查询：


    ```sql

    SELECT id,

    last_name,

    salary,

    salary / 2

    FROM employee;

    ```


    结果将是：


    | ID | LAST_NAME | SALARY | SALARY/2 |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 15000 |

    | 2 | SMITH | 35000 | 17500 |

    | 3 | KING | 45000 | 22500 |

    | 4 | SIMPSON | 52000 | 26000 |

    | 5 | ANDERSON | 31000 | 15500 |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | 31000 |

    | 9 | PATRICK | 40000 | 20000 |


    这些运算符或符号在执行此类计算时非常有用。然而，对于更复杂的计算，你可以使用 Oracle 的内置函数。


    ## DUAL 表


    在我们探讨 Oracle 中可用的函数之前，有一个概念你应该先了解一下。当你在 Oracle 中编写 `SELECT` 语句时，`SELECT` 和 `FROM`
    关键字都是必需的。你不能编写没有 `SELECT` 或没有 `FROM` 的 `SELECT` 语句。


    这个查询可以工作：


    ```sql

    SELECT id

    FROM employee;

    ```


    但这个查询不行：


    ```sql

    SELECT id;

    ```


    有时你可能不需要从表中选择数据。例如，如果你想要获取当前日期，你不需要为此使用特定的表，因为数据库应该知道日期（我们将在本章后面学习这个函数）。或者你可能想显示一个特定的数字来测试一个函数。例如，如果你想显示值
    123，那么你可以编写这个查询：


    ```sql

    SELECT 123

    FROM employee;

    ```


    然而，这将会为 employee 表的每一行显示一个 123 的值：


    | 123 |

    | --- |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |

    | 123 |


    这显示了九个结果加上列标题。这不是你想要看到的。如果你从查询中移除表，因为你不想要获取 employee 记录呢？


    ```sql

    SELECT 123;

    ```


    当你运行这个查询时，它会显示一个错误：


    ```

    ORA-00923: FROM keyword not found where expected

    00923. 00000 -  "FROM keyword not found where expected"

    *Cause:

    *Action:

    Error at Line: 1 Column: 10

    ```


    这是因为 `FROM` 子句是必需的。那么，你如何才能只看到 123 这个值呢？你可以使用一个名为 `DUAL` 的特殊 Oracle 表。


    `DUAL` 表是内置于 Oracle 数据库中的一个表。它包含一行和一列。它的主要目的是允许你运行那些使用不需要任何表数据的值或函数的查询。


    你可以通过对其运行查询来看到 `DUAL` 表：


    ```sql

    SELECT *

    FROM dual;

    ```


    | DUMMY |

    | --- |

    | X |


    `DUAL` 表在一个名为 `DUMMY` 的列中只有一个值 “X”。这意味着你可以使用 `DUAL` 表来执行你之前的查询，以显示值 123：


    ```sql

    SELECT 123

    FROM dual;

    ```


    | 123 |

    | --- |

    | 123 |


    你现在可以看到你选择的值。现在看起来可能不那么有用，但是一旦我们开始使用函数，你就会看到这个 `DUAL` 表的好处。这个表是 Oracle 特有的：它在其他
    SQL 供应商（如 Microsoft SQL Server 或 MySQL）中不存在。

    '
- fmt: '## Number Functions


    Oracle has a range of "number functions," or functions that perform calculations
    using numbers. Functions in Oracle can be referred to like this:


    ```

    FUNCTIONNAME(parameters)

    ```


    This includes:


    *   `FUNCTIONNAME`, or the name of the function

    *   Open brackets, which contain one or more parameters, or input values that
    you provide to the function

    *   Close brackets


    The result of the function is used in the place where you specify the function.
    For example, if you use this function as one of the columns in the `SELECT` clause,
    the result of the function will be displayed in the column. Let’s take a look
    at some examples.


    ## The ROUND Function


    One operation you may perform a lot is rounding numbers. Oracle allows you to
    store decimal numbers in the database, but sometimes you may want to display these
    in a whole number. There are a few functions that let you do this. One of those
    functions is called `ROUND`. I’ll refer to Oracle functions in upper case, as
    that’s what they are written as in the Oracle documentation, and it makes it easier
    to read in your SQL code.


    The `ROUND` function takes two parameters, or inputs:


    *   The number you want to round

    *   The number of decimal places to round to


    The result of the function is the number you specified rounded to the number of
    decimal places you specified. You can write this in an SQL query like this, using
    an example number:


    ```

    SELECT ROUND(123.456, 0)

    FROM dual;

    ```


    We’ve used the `DUAL` table as mentioned earlier in the chapter. The `ROUND` function
    is also used, and it contains two parameters. The first is the number you want
    to round, which is 123.456. The second is the number of decimal places to round
    to, which is 0. This means the number 123.456 will be rounded to 0 decimal places.


    If you run this query, you’ll get this result:


    | ROUND(123.456,0) |

    | --- |

    | 123 |


    The result of this `ROUND` function is 123. This is because 123.456 is rounded
    down, and not rounded up.


    You can also use the `ROUND` function with a different number of decimal places.
    For example, to round to two decimal places, your query would look like this:


    ```

    SELECT ROUND(123.456, 2)

    FROM dual;

    ```


    You simply change the second parameter to the number 2, to represent two decimal
    places. The results of this query are:


    | ROUND(123.456,2) |

    | --- |

    | 123.46 |


    The result is 123.46 because 123.456 is rounded up to 123.46.


    ## The CEILING and FLOOR Functions


    There are two other ways to round numbers in Oracle SQL, and they use the functions
    `CEILING` and `FLOOR`. The `CEILING` function will round a number up to the nearest
    whole number, and the `FLOOR` function rounds a number down to the nearest whole
    number.


    The syntax for these functions is:


    ```

    CEILING (input_number)

    FLOOR (input_number)

    ```


    Each of these functions takes a single parameter, which is the number to round.
    Unlike the `ROUND` function, these functions don’t need the second parameter for
    the number of digits, as they always round to a whole number.


    A query that uses these functions would be the one below. I’ve used column aliases
    to make the output neater.


    ```

    SELECT

    CEILING(123.456) AS num_ceilng,

    FLOOR(123.456) AS num_floor

    FROM dual;

    ```


    | NUM_CEILING | NUM_FLOOR |

    | --- | --- |

    | 124 | 123 |


    The `CEILING` function rounded the number up to 124, and the `FLOOR` function
    rounded the number down to 123. Other number functions in Oracle work in the same
    way, where you provide an input value and a result is calculated.


    ## Using Number Functions with Table Data


    Let’s see an example function that uses one of the columns in a table. Let’s say
    that the `salary` stored in the `employee` table is an annual value, and we want
    to see what the monthly value would be. However, along with the monthly value,
    we want to see what the "left over" amount would be if we divide the `salary`
    by 12 and round it down. For example, the value of 30/12 would be 2 (2*12=24),
    with 6 left over (30-24=6). We can use functions for this in Oracle: the `FLOOR`
    function and the `MOD` function.


    The `MOD` function performs a *modulo division*, which means it divides one number
    by another and returns the remainder.


    Our query would look like this:


    ```

    SELECT

    Id,

    last_name,

    salary,

    FLOOR(salary/12) AS monthly_salary,

    MOD(salary, 12) AS monthly_remaining

    FROM employee;

    ```


    This query includes the `FLOOR` function to first divide the `salary` by 12, then
    round the result to the nearest whole number. The `MOD` function takes the `salary`
    value, divides it by 12, and displays the leftover value.


    The result of this query would be:


    | ID | LAST_NAME | SALARY | MONTHLY_SALARY | MONTHLY_REMAINDER |

    | --- | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 2500 | 0 |

    | 2 | SMITH | 35000 | 2916 | 8 |

    | 3 | KING | 45000 | 3750 | 0 |

    | 4 | SIMPSON | 52000 | 4333 | 4 |

    | 5 | ANDERSON | 31000 | 2583 | 4 |

    | 6 | COOPER | (null) | (null) | (null) |

    | 7 | ADAMS | (null) | (null) | (null) |

    | 8 | SMITH | 62000 | 5166 | 8 |

    | 9 | PATRICK | 40000 | 3333 | 4 |


    This shows the `salary`, and the monthly `salary` rounded down. It also shows
    the remaining value after the `salary` was divided by 12. For example, the employee
    JONES has an annual salary of 30000, and can have a monthly salary of 2500 with
    0 left over, because 2500*12 = 30000.'
