  trans: "\n## INSERT 语句\n\n`INSERT` 语句是一条 SQL 语句，可让你向表中添加数据。你需要指定表、列以及要添加的值，运行该语句后，数据即被添加到表中。`INSERT`\
    \ 语句格式如下：\n\n```sql\nINSERT INTO tablename (columns) VALUES (values_to_insert);\n\
    ```\n\n它以 `INSERT INTO` 开头，这些是 SQL 关键字，表明你要插入数据。然后你指定 `tablename`，即数据要插入到的目标表。接下来，你指定列名，也就是你想添加数据的具体列。之后是关键字\
    \ `VALUES`，其后括号内是你要插入到表中的值。\n\n在向表中插入数据时指定列的原因，并非每一列都需要填值。你可能希望某些列留空。这样做也便于数据库知道哪个值对应哪一列。\n\
    \n当你编写 `INSERT` 语句时，它通常包含多个列：\n\n```sql\nINSERT INTO tablename (col1, col2, col3)\
    \ VALUES (val1, val2, val3);\n```\n\n你需要确保从表中指定的列数（第一组括号）与 `VALUES` 部分（第二组括号）的值数量相同。在此示例中，`val1`\
    \ 将被添加到 `col1` 列，`val2` 被添加到 `col2` 列，`val3` 被添加到 `col3` 列。\n\n让我们看一个例子。假设你想向\
    \ `office` 表添加一条新记录。`office` 表有 `id` 和 `address` 两列。我们的 `INSERT` 语句开头如下：\n\n```sql\n\
    INSERT INTO office (id, address) VALUES (\n```\n\n接下来，你需要指定要插入的值。我们想插入第一条记录，所以\
    \ ID 为 `1`，地址为 `'123 Smith Street'`。我们的语句如下：\n\n```sql\nINSERT INTO office (id,\
    \ address) VALUES (1, '123 Smith Street');\n```\n\n我们有两列和两个值。值之间用逗号分隔。第一个值代表 `id`，第二个值代表\
    \ `address`。`id` 值是一个数字，因此不需要用单引号括起来。`address` 值是一个文本值，因此需要放在单引号内。\n\n## 运行 INSERT\
    \ 语句\n\n你可以像运行任何其他 SQL 语句一样运行此语句。\n\n1.  打开 SQL Developer 并新建一个 SQL 文件。\n2.  将前面提到的\
    \ `INSERT` 语句输入到代码区域，如图 15-1 所示。\n\n    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig1_HTML.jpg](img/471705_1_En_15_Fig1_HTML.jpg)\n\
    \n    图 15-1\n\n    SQL Developer 中的 `INSERT` 语句\n\n3.  点击运行按钮。\n\n语句运行后，你将在屏幕底部看到其输出，如图\
    \ 15-2 所示。\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig2_HTML.jpg](img/471705_1_En_15_Fig2_HTML.jpg)\n\
    \n图 15-2\n\n`INSERT` 语句的输出\n\n它将显示“1 row inserted。”这表示记录已插入。它不会向你显示记录的具体内容；要查看内容，你需要对该表运行一条\
    \ `SELECT` 语句。\n\n如果你看到错误信息，应检查你的 `INSERT` 语句中的几点：\n\n*   表名拼写正确吗？表名必须在数据库中已存在，我遇到过很多错误都是因为表名拼写稍有差错。\n\
    *   你指定的列数与值的数量相同吗？如果列数不同，你会得到一个错误。\n*   值是否引用了正确的列？如果数据类型不同（例如，你试图将地址输入到 `id`\
    \ 列），你会得到一个错误。\n*   文本值是否用单引号括起来了？如果没有，它们会被当作 SQL 代码处理，并可能导致错误。\n\n一旦你的语句成功运行，我们可以验证数据是否存在于表中。为此，对表运行一条\
    \ `SELECT` 语句：\n\n```sql\nSELECT *\nFROM office;\n```\n\n因为我们只是检查数据是否存在，使用 `SELECT\
    \ *` 是可以的。如果你运行这条语句，将得到以下结果：\n\n```\nID   ADDRESS\n1    123 Smith Street\n```\n\
    \n你可以看到数据已成功插入到表中。\n\n## 插入更多数据\n\n我们可以向此表中插入更多数据，以便有更多数据可供操作。让我们再插入两条记录：\n\n\
    *   45 Main Street，ID 为 2\n*   10 Collins Road，ID 为 3\n\n`INSERT` 语句如下：\n\n```sql\n\
    INSERT INTO office (id, address) VALUES (2, '45 Main Street');\nINSERT INTO office\
    \ (id, address) VALUES (3, '10 Collins Road');\n```\n\n我们可以在 SQL Developer 中运行这两条语句。不必分开运行，你可以将它们连续运行。\n\
    \n1.  将这两条语句添加到你的 SQL Developer 窗口中，如图 15-3 所示。\n\n    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig3_HTML.jpg](img/471705_1_En_15_Fig3_HTML.jpg)\n\
    \n    图 15-3\n\n    两条 `INSERT` 语句\n\n2.  选中这两条语句使其高亮显示，如图 15-4 所示。\n\n    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig4_HTML.jpg](img/471705_1_En_15_Fig4_HTML.jpg)\n\
    \n    图 15-4\n\n    选中两条 `INSERT` 语句\n\n3.  点击运行按钮。两条语句将被依次运行。\n\n屏幕底部的输出应显示两行独立的“1\
    \ row inserted”，如图 15-5 所示。\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig5_HTML.jpg](img/471705_1_En_15_Fig5_HTML.jpg)\n\
    \n图 15-5\n\n两条 `INSERT` 语句的输出\n\n让我们再次从 `office` 表中查询数据。\n\n```sql\nSELECT *\n\
    FROM office;\n```\n\n结果如下：\n\n```\nID   ADDRESS\n1    123 Smith Street\n2    45\
    \ Main Street\n3    10 Collins Road\n```\n\n你可以看到所有三条记录都出现在表中。下面我们来看一些插入日期值的例子。\n\
    \n## 插入日期值\n\n向表中添加日期值需要特殊处理，因为世界各地的默认日期格式可能不同。\n\nOracle 数据库在安装时（Oracle Express）确定所有日期的日期格式。这很重要，因为它决定了我们如何向数据库添加日期值。\n\
    \n让我们向 `sales_meeting` 表添加一些数据。如果你还记得前面创建该表的章节，它有几列：\n\n*   `id`\n*   `employee_id`\n\
    *   `company`\n*   `meeting_date`\n\n`id` 和 `employee_id` 列是数字。`company` 列是文本值，`meeting_date`\
    \ 是日期。我们的 `INSERT` 语句如下：\n\n```sql\nINSERT INTO sales_meeting (id, employee_id,\
    \ company, meeting_date) VALUES (1, 5, 'ABC Construction', 'Aug 10 2018');\n```\n\
    \n这将插入一条记录，其 `id` 为 1，`employee_id` 为 5，`company` 为 `'ABC Construction'`，`meeting_date`\
    \ 为 `'Aug 10 2018'`。\n\n但是，如果你尝试在 SQL Developer 中运行此语句，很可能会出错，如图 15-6 所示。\n\n\
    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig6_HTML.jpg](img/471705_1_En_15_Fig6_HTML.jpg)\n\
    \n图 15-6\n\n插入日期时的错误信息\n\n此错误发生的原因是数据库不认为“Aug 10 2018”是有效日期。对你我而言它似乎是有效的，但对数据库来说并非如此。数据库需要特定格式的日期，具体取决于你所在的地区。\n\
    \n不过，有一种符合 ANSI 标准的方法可以向数据库插入日期。你可以使用日期字面值，它是一个关键字（即“`DATE`”），以“`YYYY-MM-DD`”的特定格式指定日期。这意味着：\n\
    \n*   四位数字表示年份，后接一个短横线\n*   然后是两位数字表示月份，后接一个短横线\n*   然后是两位数字表示日\n\n因此，要将“Aug 10\
    \ 2018”写成此格式，需要写为 `DATE '2018-08-10'`。\n"
- fmt: '### Note


    The default date format is set when you install the Oracle database and could
    be different depending on where you are in the world.


    Let’s try that `INSERT` statement again with this new format:


    ```

    INSERT INTO sales_meeting (id, employee_id, company, meeting_date) VALUES (1,
    5, ''ABC Construction'', DATE ''2018-08-10'');

    ```


    If you run this statement in `SQL Developer`, you’ll get a successful message
    of “1 row inserted.”


    You can view the data in this table by running a `SELECT` statement:


    ```

    SELECT *

    FROM sales_meeting;

    ```


    The output looks like this.


    | ID | EMPLOYEE | COMPANY | MEETING_DATE |

    | --- | --- | --- | --- |

    | 1 | 5 | ABC Construction | 10/AUG/2018 |


    The `meeting_date` column here is a `DATE` data type. Oracle will display this
    date in a different format depending on your part of the world and your database
    settings. The format shown above is “DD/MON/YYYY”, but your format may be “DD-MON-YYYY”
    or “MM/DD/YYYY”, for example.


    Let’s insert a second record into this table, which was used in the previous chapter:


    ```

    INSERT INTO sales_meeting (id, employee_id, company, meeting_date) VALUES (2,
    2, ''BW Signage'', DATE ''2018-08-21'');

    ```


    Once you run this statement, the record is in the table. You can run the `SELECT`
    query again to see the results in the table:


    | ID | EMPLOYEE | COMPANY | MEETING_DATE |

    | --- | --- | --- | --- |

    | 1 | 5 | ABC Construction | 10/AUG/2018 |

    | 2 | 2 | BW Signage | 21/AUG/2018 |


    ```

    SELECT *

    FROM sales_meeting;

    ```


    ## Saving and Undoing Changes


    There’s a database concept that is relevant and helpful to know when making changes
    to your data. When you use a program on your computer, you make changes to a file
    and see the changes. However, these changes are not permanently stored on the
    file until you save the file. If you don’t want to save your changes, you can
    exit the program without saving.


    Oracle databases have a similar concept, called `COMMIT` and `ROLLBACK`. These
    are two keywords in Oracle SQL:


    *   `COMMIT` will save any changes you have made permanently to the database.
    This is similar to pressing the Save button within a word processor.

    *   `ROLLBACK` will undo all changes made to the database. This is similar to
    closing a word processor without saving changes.


    These two statements apply to data inserted, updated, or deleted since you connected
    to the Oracle database or since the last time you ran one of these statements.


    Why do you need to know this? Because unless you run either of these two commands,
    the data you just inserted using the `INSERT` statements will not be saved in
    the database. You’ll get a warning if you exit `SQL Developer` about committing
    your changes, but it’s good to be able to commit while you’re using `SQL Developer`.


    You can `COMMIT` or `ROLLBACK` in `SQL developer` in two ways: by running the
    statement or clicking a button inside `SQL Developer`. To run the statement, type
    the command `COMMIT;` into `SQL Developer`, as shown in Figure [15-7](#471705_1_En_15_Chapter.xhtml#Fig7).


    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig7_HTML.jpg](Images/471705_1_En_15_Fig7_HTML.jpg)

    *Figure 15-7. The COMMIT command*


    Then, click the Run button. The output panel should show “Commit completed.”


    If you want to `ROLLBACK` instead, enter the command `ROLLBACK` and click the
    Run button. For now, though, you just need to `COMMIT` and not `ROLLBACK`.


    Alternatively, you can use the button in `SQL Developer` to commit. This button
    is a gray cylinder with a green tick and it’s available on the SQL window, as
    shown in Figure [15-8](#471705_1_En_15_Chapter.xhtml#Fig8). The `ROLLBACK` button
    is next to it.


    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig8_HTML.jpg](Images/471705_1_En_15_Fig8_HTML.jpg)

    *Figure 15-8. The COMMIT button in SQL Developer*


    So, once you have finished inserting data into your database tables, it’s good
    to commit the data. You’ll get asked if you exit `SQL Developer`, but committing
    the data yourself is a good habit to get into.


    ## Best Practices for Inserting Data


    You’ve learned how to insert data into an Oracle database in this chapter. There
    are some “best practices” or tips that I can suggest when doing this.


    Specify the columns you are inserting. The `INSERT` statement lets you specify
    the columns in the table you’re adding data to. This is the part inside the first
    set of parentheses:


    ```

    INSERT INTO table (col1, col2, col3) VALUES (val1, val2, val3)

    ```


    In SQL, this part is optional. You don’t actually need to specify the columns
    to run an `INSERT` statement. If you don’t specify them, the values are inserted
    into the order that the columns are defined in the database. This is risky, as
    the columns are not guaranteed to stay in the same order. If you don’t specify
    the columns, then your `INSERT` statement may fail in the future. It’s a good
    idea to always specify the columns when running an `INSERT` statement.


    Include text and dates in quotes, but not numbers. It can be tempting to include
    all values inside quotes because text and date values need to be. However, you
    don’t need to enter numbers inside quotes, and it’s better to specify them without
    quotes to avoid any extra processing that the database might do.


    Remember to `COMMIT` once you are finished. This is the first statement we’ve
    seen that requires you to commit data once the statement is run. If you run the
    `INSERT` statement and then wonder why applications or other users don’t see the
    data, then it’s likely because it hasn’t yet been committed.


    ## Summary


    The `INSERT` statement in Oracle SQL lets you add data to a table. You can specify
    the table name, the columns, and the values to be added. Text and date values
    need to be inside single quotes, but numbers do not.


    After inserting data, for it to be permanently saved to the database, it needs
    to be committed with the `COMMIT` command. If you decide you don’t want to commit
    the data, you can run the `ROLLBACK` command to undo these changes.


    # 16. Updating and Removing Data


    In the last chapter, you learned how to add data to a table. SQL allows you to
    make changes to data that’s already in a table, and we’ll learn how to do that
    in this chapter.


    Why would you want to update data after it’s been added? Perhaps you made a mistake
    with the data when running the `INSERT` statement, such as spelling a name wrong
    or adding the wrong date. Or perhaps part of an application makes a change and
    needs to update the data. Or perhaps a user of the application changes some data
    and wants to save it. Each of these will involve an update to the data in the
    database.


    The good news is that you don’t have to delete the record and insert it as a new
    record. SQL provides a command that lets you make changes to existing data.'
