    Our example table, `employee`, has three columns:


    *   `id`

    *   `last_name`

    *   `salary`


    Let’s say we want to show just the `last_name` column in our results. We can do
    this by specifying the `last_name` in the `SELECT` clause:


    ```sql

    SELECT last_name

    FROM employee;

    ```


    This means the query will only show the `last_name` column in our results, and
    not the `ID` or the `salary` columns. A query like this would be used in an area
    of an application that needed to display the last names of employees. Let’s run
    this query on our database.


    First, open `SQL Developer`, if you haven’t done so already. Then, connect to
    your database by double-clicking the new user’s connection you created in an earlier
    chapter. This was not the `system` user: it was the other user you created. In
    Figure 4-2, this is called `Intro`.


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig2_HTML.jpg](Images/471705_1_En_4_Fig2_HTML.jpg)


    Figure 4-2 The connection in `SQL Developer`


    Double-clicking the connection in the list will cause `SQL Developer` to connect
    to the database. A new `SQL worksheet` window is also displayed on the screen.


    What if no `SQL worksheet` is displayed? Or you closed it? You can open a new
    one pretty easily.


    To do this:


    1.  Click the `New SQL Worksheet` button in the middle of the icons on the toolbar.


