- fmt: '### 按文本值排序


    首先，你将按 `last_name` 对数据排序，以便按字母顺序查看所有记录。为此，需要在 `SELECT` 查询中添加 `ORDER BY`。例如：


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY last_name;

    ```


    你刚刚添加了 `ORDER BY` 和 `last_name` 列。你可以指定 `ASC`（升序）或 `DESC`（降序），但这是可选的，默认值是 `ASC`。


    结果如下所示：


    ```

    ID   LAST_NAME   SALARY

    5   ANDERSON     31000

    6   COOPER       (null)

    1   JONES        20000

    3   KING         40000

    9   PATRICK      40000

    4   SIMPSON      52000

    2   SMITH        35000

    8   SMITH        62000

    7   (null)       (null)

    ```


    这些结果按 `last_name` 升序排列。`NULL` 值出现在底部。如果你想明确排序方式，可以在查询中指定关键字 `ASC`：


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY last_name ASC;

    ```


    结果将是相同的：


    ```

    ID   LAST_NAME   SALARY

    5   ANDERSON     31000

    6   COOPER       (null)

    1   JONES        20000

    3   KING         40000

    9   PATRICK      40000

    4   SIMPSON      52000

    2   SMITH        35000

    8   SMITH        62000

    7   (null)       (null)

    ```


    所以，如果结果相同，是否应该添加 `ASC` 关键字？我认为应该，因为它明确说明了数据的排序方式。编写 SQL 时，通常最好避免任何歧义，并明确指定需要执行的操作。不过，省略
    `ASC` 很常见，因此要做好在别人代码中遇到省略 `ASC` 的查询的准备，因为它是默认值。


    ### 按数字值排序


    让我们看一个关于 `salary` 列的例子。你可以根据最高和最低的 `salary` 值对结果进行排序。


    首先，让我们根据最低的 `salary` 值对数据排序。我们的查询如下所示：


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY salary ASC;

    ```


    此查询将按 `salary` 列升序对员工记录排序。结果如下所示：


    ```

    ID  LAST_NAME   SALARY

    1   JONES       20000

    5   ANDERSON    31000

    2   SMITH       35000

    3   KING        40000

    9   PATRICK     40000

    4   SIMPSON     52000

    8   SMITH       62000

    6   COOPER      (null)

    7   (null)      (null)

    ```


    如你所见，最低的 `salary` 在顶部，最高的在底部。你也可以对任何列（例如 `salary`）进行降序排序。可以通过将 `ASC` 改为 `DESC`
    来实现：


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY salary DESC;

    ```


    结果现在将按相反顺序排序：


    ```

    ID  LAST_NAME   SALARY

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    4   SIMPSON     52000

    3   KING        40000

    9   PATRICK     40000

    2   SMITH       35000

    5   ANDERSON    31000

    1   JONES       20000

    ```


    你可以看到最高的工资出现在列表的顶部。


    ### 按不在 SELECT 子句中的列排序


    当你按一列排序时，不必在 `SELECT` 子句中指定该列。这意味着你不需要看到该列也能按它排序。


    你可以使用前面示例中的查询，并将其修改为从 `SELECT` 子句中移除 `salary` 列。它仍然在 `ORDER BY` 子句中。


    ```

    SELECT id, last_name

    FROM employee

    ORDER BY salary DESC;

    ```


    结果显示为：


    ```

    ID  LAST_NAME

    6   COOPER

    7   (null)

    8   SMITH

    4   SIMPSON

    3   KING

    9   PATRICK

    2   SMITH

    5   ANDERSON

    1   JONES

    ```


    如你所见，`salary` 列没有显示。但是，结果的顺序与前面按 `salary` 降序排列的示例相同。


    ### 按数字排序


    另一种对结果排序的方法是指定一个数字，而不是列名。你指定的数字是 `SELECT` 子句中列的序号。


    你可能有一个如下所示的查询：


    ```

    SELECT id, last_name, salary

    FROM employee;

    ```


    要按 `id` 列排序，你可以指定一个 `ORDER BY` 子句：


    ```

    ORDER BY 1 ASC;

    ```


    这将按 `ID` 列排序，因为数字 1 表示 `SELECT` 子句中的第一列，即 `ID`。


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY 1 ASC;

    ```


    ```

    ID  LAST_NAME   SALARY

    1   JONES       20000

    2   SMITH       35000

    3   KING        40000

    4   SIMPSON     52000

    5   ANDERSON    31000

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    9   PATRICK     40000

    ```


    数据按 `ID` 列排序。要改为按 `last_name` 列排序，可以将数字 1 改为 2。


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY 2 ASC;

    ```


    ```

    ID  LAST_NAME   SALARY

    5   ANDERSON    31000

    6   COOPER      (null)

    1   JONES       20000

    3   KING        40000

    9   PATRICK     40000

    4   SIMPSON     52000

    2   SMITH       35000

    8   SMITH       62000

    7   (null)      (null)

    ```


    列号的工作方式与指定列名相同。那么为什么要使用数字而不是名称呢？列号更容易输入，可用于你编写的临时 SQL 脚本。但是，我建议在编写将被其他人或应用程序使用的代码时使用完整的列名，因为它更容易理解正在排序的是哪一列，并且不易因数据库更改而出错。


    ### ORDER BY 与 NULL 值


    你可能已经注意到前面的示例中出现了一些 `NULL` 值。默认情况下，当按升序排序时，`NULL` 值出现在结果的底部；当按降序排序时，出现在结果的顶部。


    在 Oracle SQL 中，你可以根据需要为查询更改此行为。你可以在 `ORDER BY` 子句的末尾指定两个可选关键字之一，以指示你希望如何处理 `NULL`
    值：


    *   `NULLS FIRST`：`NULL` 值显示在列表的**顶部**，无论排序方式如何。

    *   `NULLS LAST`：`NULL` 值显示在列表的**底部**，无论排序方式如何。


    例如，如果你想按 `salary` 降序排序，但希望 `NULL` 值显示在底部而不是顶部，你的查询如下所示：


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY salary DESC NULLS LAST;

    ```


    ```

    ID  LAST_NAME   SALARY

    8   SMITH       62000

    4   SIMPSON     52000

    3   KING        40000

    9   PATRICK     40000

    2   SMITH       35000

    5   ANDERSON    31000

    1   JONES       20000

    7   (null)      (null)

    6   COOPER      (null)

    ```


    `salary` 值按降序排序，`NULL` 值显示在末尾。要让 `NULL` 值显示在顶部：


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY salary DESC NULLS FIRST;

    ```


    结果是：


    ```

    ID  LAST_NAME   SALARY

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    4   SIMPSON     52000

    3   KING        40000

    9   PATRICK     40000

    2   SMITH       35000

    5   ANDERSON    31000

    1   JONES       20000

    ```'
  raw: '### Order by a Text Value


    You’ll start by ordering your data by the `last_name`, so you can see all of the
    records in alphabetical order. To do this, you add an `ORDER BY` to your `SELECT`
    query. For example:


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY last_name;

    ```


    You’ve just added in `ORDER BY` and then the last_name column. You can specify
    either `ASC` or `DESC`, but doing so is optional and the default is `ASC`.


    Your results will look like these:


    ```

    ID   LAST_NAME   SALARY

    5   ANDERSON     31000

    6   COOPER       (null)

    1   JONES        20000

    3   KING         40000

    9   PATRICK      40000

    4   SIMPSON      52000

    2   SMITH        35000

    8   SMITH        62000

    7   (null)       (null)

    ```


    These results are sorted by `last_name` in ascending order. The `NULL` value appears
    at the bottom. If you want to be clear about your ordering, you can specify the
    keyword `ASC` in the query:


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY last_name ASC;

    ```


    Your results would then be the same:


    ```

    ID   LAST_NAME   SALARY

    5   ANDERSON     31000

    6   COOPER       (null)

    1   JONES        20000

    3   KING         40000

    9   PATRICK      40000

    4   SIMPSON      52000

    2   SMITH        35000

    8   SMITH        62000

    7   (null)       (null)

    ```


    So, if the results are the same, should you add in the `ASC` keyword? I think
    that you should, because it makes it clear that data is ordered in a specific
    way. When writing SQL, it’s usually better to avoid any ambiguity and specify
    exactly what needs to be done. However, it is common to omit ASC, so be prepared
    to encounter queries in other people’s code in which ASC is omitted because it
    is the default.


    ### Order by a Number Value


    Let’s look at an example on the `salary` column. You can sort the results based
    on the highest and then on the lowest `salary` values.


    First, let’s sort the data based on the lowest `salary` values. Our query will
    look like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY salary ASC;

    ```


    This query will sort the employee records by the `salary` column in ascending
    order. The results will look like these:


    ```

    ID  LAST_NAME   SALARY

    1   JONES       20000

    5   ANDERSON    31000

    2   SMITH       35000

    3   KING        40000

    9   PATRICK     40000

    4   SIMPSON     52000

    8   SMITH       62000

    6   COOPER      (null)

    7   (null)      (null)

    ```


    As you can see, the lowest `salary` is at the top and the highest is at the bottom.
    You can also sort any column, such as the `salary`, in descending order. You can
    do this by changing the `ASC` to `DESC`:


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY salary DESC;

    ```


    The results will now be sorted in the reverse order:


    ```

    ID  LAST_NAME   SALARY

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    4   SIMPSON     52000

    3   KING        40000

    9   PATRICK     40000

    2   SMITH       35000

    5   ANDERSON    31000

    1   JONES       20000

    ```


    You can see that the highest salary is at the top of the list.


    ### Order by a Column Not in the SELECT Clause


    When you order by a column, you don’t have to specify that column in the `SELECT`
    clause. This means you don’t need to see the column to be able to order by it.


    You can use the query from the earlier example and change it to remove the salary
    column from the `SELECT` clause . It’s still in the `ORDER BY` clause.


    ```

    SELECT id, last_name

    FROM employee

    ORDER BY salary DESC;

    ```


    The results are shown as:


    ```

    ID  LAST_NAME

    6   COOPER

    7   (null)

    8   SMITH

    4   SIMPSON

    3   KING

    9   PATRICK

    2   SMITH

    5   ANDERSON

    1   JONES

    ```


    As you can see, the `salary` column isn’t shown. However, the order of the results
    is the same as the earlier example, which was by `salary` in descending order.


    ### Order by a Number


    Another way to order your results is to specify a number, rather than the name
    of the column. The number you specify is the number of the column in the `SELECT`
    clause.


    You could have a query like this:


    ```

    SELECT id, last_name, salary

    FROM employee;

    ```


    To order by the id column, you can specify an `ORDER BY` clause:


    ```

    ORDER BY 1 ASC;

    ```


    This will order by the `ID` column, because the number 1 indicates the first column
    in the `SELECT` clause, which is `ID`.


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY 1 ASC;

    ```


    ```

    ID  LAST_NAME   SALARY

    1   JONES       20000

    2   SMITH       35000

    3   KING        40000

    4   SIMPSON     52000

    5   ANDERSON    31000

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    9   PATRICK     40000

    ```


    The data is ordered by the `ID` column. To change this to the `last_name` column,
    you can change the number 1 to 2.


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY 2 ASC;

    ```


    ```

    ID  LAST_NAME   SALARY

    5   ANDERSON    31000

    6   COOPER      (null)

    1   JONES       20000

    3   KING        40000

    9   PATRICK     40000

    4   SIMPSON     52000

    2   SMITH       35000

    8   SMITH       62000

    7   (null)      (null)

    ```


    The column number works in the same way as specifying the column name. So why
    would you use the number instead of the name? The column number is easier to type
    and can be used in once-off SQL scripts you write. However, I recommend using
    the full column name when writing code that will be used by other people or applications,
    as it’s easier to understand which column is being ordered, and it’s less prone
    to errors from changes in the database.


    ### ORDER BY and NULLs


    You might have noticed in the earlier examples that some `NULL` values appeared.
    By default, the `NULL` values appear at the bottom of results when they are ordered
    in ascending order, and at the top of results when ordered in descending order.


    In Oracle SQL, you can change this behavior for your query if you like. You can
    specify one of two optional keywords at the end of your `ORDER BY` clause to indicate
    how you want `NULL` values to be treated:


    *   NULLS FIRST: NULL values are shown at the **top** of the list, regardless
    of how it is ordered.


    *   NULLS LAST: NULL values are shown at the **bottom** of the list, regardless
    of how it is ordered.


    For example, if you wanted to order by `salary` in descending order, but have
    the `NULL` values shown at the bottom instead of the top, your query would look
    like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY salary DESC NULLS LAST;

    ID  LAST_NAME   SALARY

    8   SMITH       62000

    4   SIMPSON     52000

    3   KING        40000

    9   PATRICK     40000

    2   SMITH       35000

    5   ANDERSON    31000

    1   JONES       20000

    7   (null)      (null)

    6   COOPER      (null)

    ```


    The `salary` values are ordered in descending order, and the `NULL` values are
    shown at the end. To sort with `NULL` values at the top:


    ```

    SELECT id, last_name, salary

    FROM employee

    ORDER BY salary DESC NULLS FIRST;

    ```


    The results are:


    ```

    ID  LAST_NAME   SALARY

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    4   SIMPSON     52000

    3   KING        40000

    9   PATRICK     40000

    2   SMITH       35000

    5   ANDERSON    31000

    1   JONES       20000

    ```'
