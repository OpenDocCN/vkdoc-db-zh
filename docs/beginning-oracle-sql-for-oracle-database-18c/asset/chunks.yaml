    How about using an empty string, which means there is nothing inside the quotes:
    ‘ ’? You could try this, but an empty string is treated differently in SQL. It’s
    still a text value, which means it will have issues trying to be used in a number
    or a date field.


    So, you can’t use text values like “n/a”, or 0, or “ ”, or empty strings. What
    can you use? You can use a value of `NULL`.


    ## What is NULL?


    The word `NULL` is a keyword that means “an unknown value.” It’s used to represent
    unknown or missing values in a database table. This keyword is provided because
    an unknown value is different to an empty string, a blank space, a zero, or another
    text value that may have a meaning such as “n/a” or “FALSE.”


    The value of `NULL` is used quite often in databases, as there is no guarantee
    that all fields will always have data. What are the advantages of using `NULL`
    values in your database (as opposed to zeroes or empty strings)?


    *   `NULL` works on any column type: text, number, date. You don’t need to change
    the type of column for it to work.


    *   `NULL` has its own set of keywords for performing logic, as it’s a special
    value.


    *   There are a range of functions that work with `NULL`.


    *   It uses no storage, which might not be an issue with small tables but can
    help with larger tables.


    ## How Should NULL Be Treated?


    `NULL` values require their own treatment, which is probably their only disadvantage.
    Throughout this book, you’ll learn how to work with `NULL` values, but you’ll
    look at some examples and treatment of `NULL` values related to what you’ve learned
    so far.


    You just learned how to check if column values match other values, using symbols
    such as equals and greater than. This works for text, number, and date values.
    However, it won’t work for `NULL` values. A value can’t be “equal to” `NULL`,
    because `NULL` is an unknown value. To check if a value is `NULL`, we use the
    keywords `IS NULL`. Your WHERE clause would look like this:


    ```

    WHERE salary IS NULL;

    ```


    If you write it using the equals sign, it won’t find anything:


    ```

    WHERE salary = NULL;

    ```


    Let’s take a look at some examples to explain this.


    ## Examples of Working with NULL


    You’ll see some examples of working with `NULL` values in a database. First, you’ll
    need to add some `NULL` values to your table so you can write `SELECT` queries
    that work with them.'
