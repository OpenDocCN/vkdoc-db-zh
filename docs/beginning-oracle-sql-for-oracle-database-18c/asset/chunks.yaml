  trans: '## DECODE 函数


    `DECODE` 是 Oracle 提供的一个函数，用于执行条件逻辑。它与 `CASE` 语句类似。该函数的语法如下所示：


    ```

    DECODE (expression, search, result [, search, result]... [,default] )

    ```


    此 Oracle `DECODE` 函数的参数为：


    *   `expression`（必填）：这是函数中要比较的值。

    *   `search`（必填）：这是用于与表达式进行比较的值。

    *   `result`（必填）：如果搜索值与表达式值匹配，则返回此值。可以有多组搜索和结果值，结果值对应于前一个搜索值。

    *   `default`（可选）：如果没有一个搜索值与表达式匹配，则返回此值。如果未提供默认值，则使用 `NULL`。


    如果你将它与 `IF-THEN-ELSE` 语句进行比较，它看起来会是这样：


    ```

    IF (expression = search) THEN result

    [ELSE IF (expression = search) THEN result]

    ELSE default

    END IF

    ```


    你也可以将之前的 `CASE` 语句写成 `DECODE` 函数。它看起来像这样：


    ```

    SELECT

    last_name,

    DECODE(UPPER(last_name), ''JONES'', ''The name is Jones'', ''SMITH'', ''The name
    is Smith'', ''KING'', ''The name is King'', ''The name is something else'') AS
    namecheck

    FROM employee;

    ```


    这个函数全部在一行上，所以可以格式化得更好一些：


    ```

    SELECT

    last_name,

    DECODE(UPPER(last_name),

    ''JONES'', ''The name is Jones'',

    ''SMITH'', ''The name is Smith'',

    ''KING'', ''The name is King'',

    ''The name is something else'') AS namecheck

    FROM employee;

    ```


    你可以运行此查询并得到以下结果。


    | LAST_NAME | NAMECHECK |

    | --- | --- |

    | JONES | 名字是 Jones |

    | SMITH | 名字是 Smith |

    | KING | 名字是 King |

    | SIMPSON | 名字是其他 |

    | ANDERSON | 名字是其他 |

    | COOPER | 名字是其他 |

    | ADAMS | 名字是其他 |

    | SMITH | 名字是 Smith |

    | PATRICK | 名字是其他 |

    | Jones | 名字是 Jones |


    此示例中的 `DECODE` 函数看起来类似于 `CASE` 语句，并显示相同的结果。但是，在某些情况下，`DECODE` 函数可能会有点混乱，例如使用 `LIKE`
    关键字进行部分匹配或使用大于或小于符号时。


    `DECODE` 只能检查完全匹配。你可以使用一些运算符和 `SIGN` 函数来检查是否大于或小于其他值。之前我们有一个对薪资进行分组的 `CASE` 语句：


    ```

    CASE

    WHEN salary = 50000 THEN ''High salary''

    END salary_check

    ```


    要用 `DECODE` 语句编写相同的逻辑，我们的函数将如下所示：


    ```

    DECODE(SIGN(40000-salary),1,''Low salary'', -1, ''Medium or high salary'', ''Unsure'')

    ```


    此函数首先从 `40000` 中减去 `salary`，并将其括在 `SIGN` 函数中。如果结果为正数，此函数将返回 `1`，如果结果为负数，则返回 `-1`。因此，如果
    `salary` 小于 `40000`，则结果值将为正数，`SIGN` 返回 `1`。


    然后，你需要将 ''Medium or high salary'' 替换为另一个 `DECODE` 函数来检查 `50000` 的值：


    ```

    DECODE(SIGN(40000-salary),1,''Low salary'', -1, DECODE(SIGN(50000-salary),1,''Medium
    salary'', -1, ''High salary'', ''Unsure''),''Unsure'')

    ```


    如你所见，这变得相当混乱，函数里面套着函数。你或其他人也很难理解它的含义。


    因此，在这种情况下，它可能有效，但使用 `CASE` 语句会更好。


    ## CASE 还是 DECODE？


    如果 `CASE` 语句和 `DECODE` 函数功能相同，应该使用哪一个？我建议在所有情况下都使用 `CASE` 语句，原因如下：


    *   `CASE` 是在 Oracle 8（相当长一段时间以前）中引入的，用于替换较旧的 `DECODE` 函数。

    *   `CASE` 比 `DECODE` 更灵活。

    *   对于简单和复杂的逻辑，`CASE` 都比 `DECODE` 更具可读性。

    *   `CASE` 和 `DECODE` 的性能相同。


    如果你在所有情况下都使用 `CASE`，那么你就保持了代码的一致性。有时对于简单逻辑，使用 `DECODE` 似乎更容易，但如果你在某些地方使用 `DECODE`，在其他地方使用
    `CASE`，会使你的 SQL 代码更难理解。


    ## 总结


    Oracle SQL 包含使用条件逻辑的能力，这等同于 "if then else" 语句。这可以通过两种方式实现：`CASE` 和 `DECODE`。


    `CASE` 语句允许你执行条件逻辑，可以是简单的 CASE 语句，也可以是搜索式的 CASE 语句。这些语句几乎相同，只在表达式使用的位置上有所不同，但搜索式
    CASE 语句在逻辑上更灵活。


    `DECODE` 函数也可以以类似的方式用于条件逻辑。然而，它限制更多、更古老，且更难阅读。我建议使用 `CASE` 语句而不是 `DECODE` 函数。


    ## 24. 理解聚合函数


    在上一章中，你学习了什么是函数。你查看了一些函数示例，例如 `LOWER`，它对特定列的值执行特定操作。`LOWER` 函数用于将每个记录的 `last_name`
    值转换为小写版本。


    ```

    SELECT id,

    last_name,

    LOWER(last_name)

    FROM employee;

    ```


    此查询的结果显示小写的 `last_name` 记录。


    | ID | LAST_NAME | LOWER(LAST_NAME) |

    | --- | --- | --- |

    | 1 | JONES | jones |

    | 2 | SMITH | smith |

    | 3 | KING | king |

    | 4 | SIMPSON | simpson |

    | 5 | ANDERSON | anderson |

    | 6 | COOPER | cooper |

    | 7 | ADAMS | adams |

    | 8 | SMITH | smith |

    | 9 | PATRICK | patrick |

    | 10 | Jones | jones |


    这个函数，以及我们看过的其他函数，都是对每个记录单独执行的。SQL 中有一些函数允许你对多条记录执行操作。


    ### 聚合函数


    `聚合函数`是 SQL 中一种可以使用来自多于一行数据的函数。它们被称为聚合函数，因为它们聚合数据。虽然你之前学到的函数，如 `ADD_MONTHS` 和
    `LOWER`，作用于返回的每一行，但聚合函数会查看多行中的数据并返回单个结果。


    为什么这很有用？SQL 中有五个常用的聚合函数，它们允许你执行以下任务：


    *   查找列或表中的记录数

    *   查找一组数字的总和

    *   查找最大值或最高值

    *   查找最小值或最低值

    *   查找值列表的平均值


    在本章中，你将学习这些函数以及如何使用它们。


    ### SUM 函数


    你将学习的第一个聚合函数是 `SUM`。`SUM` 函数用于对数字进行总计或求和。它看起来像这样：


    ```

    SUM ( [DISTINCT] expression)

    ```


    `SUM` 函数接受两个参数：


    *   `expression`：这是要相加的表达式，可以是表中的列或其他数值表示形式。

    *   `DISTINCT`：这是一个可选参数，指定 SUM 函数只应对表达式中的不同或唯一值求和。我不经常使用它，但知道它是可用的。'
- fmt: '# SQL聚合函数：SUM与COUNT详解


    ## 一、SUM 函数示例


    让我们通过`employee`表中`salary`值的一些例子来看看`SUM`函数。该表如下所示：


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | ADAMS | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |

    | 10 | Jones | 42000 |


    ```sql

    SELECT id,

    last_name,

    salary

    FROM employee;

    ```


    要找到`salary`值的`SUM`总和，你可以编写如下查询：


    ```sql

    SELECT SUM(salary)

    FROM employee;

    ```


    这将显示所有薪水值的总和。


    | SUM(SALARY) |

    | --- |

    | 337000 |


    `NULL`值在`SUM`计算中被忽略，`salary`值的总和是337,000。请注意，即使`employee`表中有十行数据，也只返回了一行。这是因为`SUM`函数是一个**聚合函数**。无论基础表中有多少行，它都只返回一行。


    ### 1.1 SUM 与 WHERE 子句


    当你将其与`WHERE`子句一起使用时，`SUM`函数也能工作。数据库会先执行`WHERE`子句，然后对那些符合`WHERE`子句条件的值执行`SUM`。


    假设你想找出除SIMPSON外所有`employee`的`salary`值总和。查询如下：


    ```sql

    SELECT SUM(salary)

    FROM employee

    WHERE last_name <> ''SIMPSON'';

    ```


    此查询的结果是：


    | SUM(SALARY) |

    | --- |

    | 285000 |


    这与之前的薪水总和相同，但减去了SIMPSON的52000薪水。


    ### 1.2 SUM 与表达式


    你可以在`SUM`函数中使用已经过其他函数处理或计算的值。假设你想找出如果所有`salary`值都增加20%后的总额。这意味着`salary`值将乘以1.2，然后相加。


    ```sql

    SELECT SUM(salary * 1.2)

    FROM employee;

    ```


    结果如下：


    | SUM(SALARY) |

    | --- |

    | 404400 |


    任何可以转换为数字的东西都可以用作`SUM`函数的参数。


    ### 1.3 SUM 与 DISTINCT


    让我们看看`DISTINCT`关键字在`SUM`函数内部使用时的作用。这将找出列中的唯一或不同的值，并对它们求和。


    ```sql

    SELECT SUM(DISTINCT salary)

    FROM employee;

    ```


    结果如下：


    | SUM(SALARY) |

    | --- |

    | 337000 |


    它显示337,000，因为它计算了所有唯一`salary`值的总和。


    ## 二、COUNT 函数


    Oracle SQL中另一个可用的函数是`COUNT`函数。此函数用于计算表中或结果集中的记录数。它的工作方式与`SUM`函数类似：


    ```sql

    COUNT( [DISTINCT] expression)

    ```


    该函数的两个参数与`SUM`函数相同：


    *   `expression`：这是要计数的表达式，可以是表中的某个列，也可以是数字值的其他表示。

    *   `DISTINCT`：这是一个可选参数，指定`COUNT`函数应只计算表达式中不同的或唯一的值。


    让我们看一些例子。


    ### 2.1 统计所有记录


    `COUNT`函数的一个常见用途是统计表中的所有记录。这可以通过使用`*`作为参数来完成：


    ```sql

    SELECT COUNT(*)

    FROM employee;

    ```


    这将统计表中的所有记录并显示一个数字。


    | COUNT(*) |

    | --- |

    | 10 |


    与`SUM`函数一样，`COUNT`函数也是一个聚合函数，因此它将多行聚合成一行。这是查看表中记录数量的简单方法。你可以在任何表上运行它：


    | COUNT(*) |

    | --- |

    | 3 |


    ```sql

    SELECT COUNT(*)

    FROM office;

    ```


    `office`表中有三条记录，所以这个`COUNT`显示值为3。


    ### 2.2 统计特定列


    使用`COUNT`函数的另一种方法是统计特定列中的值的数量。这与`COUNT(*)`略有不同，因为统计特定列会忽略任何`NULL`值，而`COUNT(*)`会包含带有`NULL`值的行。


    如果你对`id`列执行`COUNT`，它将计算非`NULL`的值并显示结果。在这种情况下，所有值都已填充。你可以通过从员工表中选择一些列来确认这一点。


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | ADAMS | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |

    | 10 | Jones | 42000 |


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    你可以在`id`列上使用`COUNT`函数：


    | COUNT(ID) |

    | --- |

    | 10 |


    ```sql

    SELECT COUNT(id)

    FROM employee;

    ```


    但是，如果你统计`last_name`列，值将会不同，因为有一个`NULL`值：


    | COUNT(LAST_NAME) |

    | --- |

    | 9 |


    ```sql

    SELECT COUNT(last_name)

    FROM employee;

    ```


    你也可以统计`salary`列，这将显示另一个不同的值：


    | COUNT(SALARY) |

    | --- |

    | 8 |


    ```sql

    SELECT COUNT(salary)

    FROM employee;

    ```


    如你所见，如果该列中有`NULL`值，对不同列执行`COUNT`将显示不同的结果。


    ### 2.3 COUNT 与 DISTINCT


    有时你需要找出列中不同或唯一值的数量，例如“状态”列或员工`last_name`值。你可以使用`SELECT DISTINCT`来查看这些值是什么，但如果你只想看看有多少个，你可以使用带有`DISTINCT`的`COUNT`。


    执行此操作的查询如下：


    ```sql

    SELECT COUNT(DISTINCT last_name)

    FROM employee;

    ```


    注意`DISTINCT`在括号内部，因为我们正在统计不同的`last_name`值。此查询的结果是：


    | COUNT(DISTINCT LAST_NAME) |

    | --- |

    | 9 |


    此结果显示为9，因为表中有10行，包括SMITH这个值被提到了两次，它在计数中被排除。这表明有9个不同的`last_name`值。我们可以通过运行`SELECT`查询来看看实际值是什么：


    | LAST_NAME |

    | --- |

    | JONES |

    | SMITH |

    | KING |

    | SIMPSON |

    | ANDERSON |

    | ADAMS |

    | COOPER |

    | PATRICK |

    | Jones |


    ```sql

    SELECT DISTINCT last_name

    FROM employee;

    ```


    “JONES”和“Jones”被视为不同的值，因为`DISTINCT`关键字是区分大小写的。


    如果我们将`DISTINCT`放在`COUNT`函数之外会怎样？这是我以前做过，也看到别人做过的事情。为了计算不同记录的数量，一个查询可能如下所示：


    ```sql

    SELECT DISTINCT COUNT(last_name)

    FROM employee;

    ```


    如果你运行这个查询，你会得到这个结果：


    | COUNT(LAST_NAME) |

    | --- |

    | 10 |


    显示值为10。这是因为此查询不是在统计不同的`last_name`值；它是在统计所有的`last_name`值，然后对`COUNT`函数的结果执行`DISTINCT`。执行步骤如下：


    1.  查看员工表中的`last_name`值。

    2.  统计非`NULL`的`last_name`值的数量并返回一个单一值（值为10）。

    3.  显示唯一的结果。只有一行，因此没有找到重复项。


    此过程在`DISTINCT`之前执行`COUNT`，因此虽然查询会返回结果，但它并未向你显示不同的`last_name`值的数量。


    ### 注意


    要计算不同值的数量，`DISTINCT`必须放在`COUNT`函数内部，而不是外部。'
  raw: '### A Simple SUM Example


    Let’s see some examples of the `SUM` function, using the `salary` value in the
    `employee` table . The table looks like this:


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | ADAMS | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |

    | 10 | Jones | 42000 |


    ```

    SELECT id,

    last_name,

    salary

    FROM employee;

    ```


    To find the `SUM` of the `salary` values, you can write a query like this:


    ```

    SELECT SUM(salary)

    FROM employee;

    ```


    This will show the total of all of the salary values.


    | SUM(SALARY) |

    | --- |

    | 337000 |


    The `NULL` values are ignored in the `SUM` calculation, and the total of the `salary`
    values is 337,000\. Notice how there is only one row returned, even though there
    are ten rows in the `employee` table. This is because the `SUM` function is an
    aggregate function. It returns a single row regardless of how many rows are in
    the underlying table.


    ### SUM with WHERE


    The `SUM` function can work if you use it with a `WHERE` clause . The database
    will perform the `WHERE` clause first, and then perform the `SUM` on those values
    that match the `WHERE` clause.


    Let’s say you want to find the total of all `salary` values for `employees` excluding
    SIMPSON. The query for that would be:


    ```

    SELECT SUM(salary)

    FROM employee

    WHERE last_name  ''SIMPSON'';

    ```


    The result from this query is:


    | SUM(SALARY) |

    | --- |

    | 285000 |


    This is the same salary total as before, minus the 52000 salary for SIMPSON.


    ### SUM with Expression


    You can use the `SUM` function with values that have had other functions or calculations
    performed on them. Let’s say you wanted to find the total of `salary` values if
    they had all been given a 20% pay increase. This means the `salary` value would
    be multiplied by 1.2 and then added together.


    ```

    SELECT SUM(salary * 1.2)

    FROM employee;

    ```


    The results are:


    | SUM(SALARY) |

    | --- |

    | 404400 |


    Anything that can be turned into a number can be used as a parameter in the `SUM`
    function.


    ### SUM with DISTINCT


    Let’s see what the `DISTINCT` keyword does when used inside the `SUM` function.
    This will find the unique or distinct values in the column, and sum those together.


    ```

    SELECT SUM(DISTINCT salary)

    FROM employee;

    ```


    The results are:


    | SUM(SALARY) |

    | --- |

    | 337000 |


    It shows 337,000 because it has calculated the sum of all of the unique `salary`
    values.


    ## The COUNT Function


    Another function available in Oracle SQL is the `COUNT` function . This function
    is used to count the number of records in a table or in your result set. It works
    in a similar way to the `SUM` function:


    ```

    COUNT( [DISTINCT] expression)

    ```


    The two parameters to this function are the same as the `SUM` function:


    *   expression: This is the expression to be counted, which could be a column
    in a table or some other representation of number values.


    *   DISTINCT: This is an optional parameter that specifies the COUNT function
    should only count the distinct or unique values in the expression.


    Let’s take a look at some examples.


    ### Counting All Records


    A common use of the `COUNT` function is to count all records in a table. This
    can be done using a * for the parameter:


    ```

    SELECT COUNT(*)

    FROM employee;

    ```


    This will count all records in the table and show a single number.


    | COUNT(*) |

    | --- |

    | 10 |


    Just like the `SUM` function, the `COUNT` function is an aggregate function, so
    it aggregates multiple rows into one row. This is an easy way to see how many
    records are in a table. You can run it on any table:


    | COUNT(*) |

    | --- |

    | 3 |


    ```

    SELECT COUNT(*)

    FROM office;

    ```


    There are three records in the `office` table, so this `COUNT` shows a value of
    3.


    ### Count a Specific Column


    Another way to use the `COUNT` function is to count the number of values in a
    specific column. This is slightly different to `COUNT(*)`, because counting a
    specific column will ignore any `NULL` values, but `COUNT(*)` will include rows
    with `NULL` values.


    If you perform a `COUNT` on the `id` column, it will count the values that are
    not `NULL` and show the result. In this situation, all of the values are populated.
    You can confirm this by selecting some of the columns from the employee table.


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | ADAMS | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |

    | 10 | Jones | 42000 |


    ```

    SELECT id, last_name, salary

    FROM employee;

    ```


    You can use the `COUNT` function on the `id` column:


    | COUNT(ID) |

    | --- |

    | 10 |


    ```

    SELECT COUNT(id)

    FROM employee;

    ```


    However, if you count the `last_name` column, the value will be different because
    there is a `NULL` value:


    | COUNT(LAST_NAME) |

    | --- |

    | 9 |


    ```

    SELECT COUNT(last_name)

    FROM employee;

    ```


    You can also count the `salary` column, which will show a different value again:


    | COUNT(SALARY) |

    | --- |

    | 8 |


    ```

    SELECT COUNT(salary)

    FROM employee;

    ```


    As you can see, performing a `COUNT` on different columns will show different
    results if there are `NULL` values in that column.


    ### Count with DISTINCT


    Sometimes you’ll need to find out the number of distinct or unique values in a
    column, such as a “status” column or employee `last_name` values. You can use
    the `SELECT DISTINCT` to see what the values are, but if you just want to see
    how many there are, you can use `COUNT` with `DISTINCT`.


    The query to do this would look like this:


    ```

    SELECT COUNT(DISTINCT last_name)

    FROM employee;

    ```


    Notice that the `DISTINCT` is inside the brackets, as we are counting the distinct
    `last_name` values. The results of this query are:


    | COUNT(DISTINCTLAST_NAME) |

    | --- |

    | 9 |


    This result shows 9, because there are 10 rows in the table including the value
    of SMITH mentioned twice, which is excluded from the count. It shows there are
    9 distinct `last_name` values. We can see what the actual values are by running
    a `SELECT` query:


    | LAST_NAME |

    | --- |

    | JONES |

    | SMITH |

    | KING |

    | SIMPSON |

    | ANDERSON |

    | ADAMS |

    | COOPER |

    | PATRICK |

    | Jones |


    ```

    SELECT DISTINCT last_name

    FROM employee;

    ```


    Both “JONES” and “Jones” are treated as different values, as the `DISTINCT` keyword
    is case sensitive.


    What happens if we put the `DISTINCT` outside the `COUNT` function? This is something
    I’ve done before and I’ve seen others do. In order to count the number of distinct
    records, a query could look like this:


    ```

    SELECT DISTINCT COUNT(last_name)

    FROM employee;

    ```


    If you run this query, you’ll get this result:


    | COUNT(LAST_NAME) |

    | --- |

    | 10 |


    The value of 10 is shown. This is because this query is not counting the distinct
    `last_name` values; it’s counting all of the `last_name` values and then performing
    a `DISTINCT` on the `COUNT` function. These steps are performed:


    1.  Look at the last_name values in the employee table


    2.  Count the number of last_name values that are not NULL and return a single
    value (the value of 10)


    3.  Show the unique results. There is only one row, so no duplicates are found.


    This process performs the `COUNT` before the `DISTINCT`, so while the query will
    return a result, it doesn’t show you the distinct number of `last_name` values.


    ### Note


    To count the number of distinct values, the DISTINCT must go inside the COUNT
    function, not outside.'
