- fmt: '## Less Than or Equal To


    SQL 支持“小于等于”检查，其方式与“大于等于”检查类似。它使用小于符号和等于符号的组合，即“`<=`”。要查看所有 `salary` 小于或等于 40000
    的员工，可以使用如下查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary <= 40000;

    ```


    该查询的结果如下：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    5    ANDERSON    31000

    ```


    结果显示了 `''JONES''`、`''SMITH''` 和 `''ANDERSON''`，因为他们的 `salary` 都小于 40000。结果显示了
    `''KING''`，因为他们的 `salary` 等于 40000。总之，可以使用的不同符号如表 5-1 所示。


    **表 5-1 可用的比较运算符**


    | 含义 | 符号 |

    | --- | --- |

    | 等于 | `=` |

    | 不等于 | `<>` 或 `!=` |

    | 大于 | `>` |

    | 大于等于 | `>=` |

    | 小于 | `<` |

    | 小于等于 | `<=` |


    ## 最佳实践


    SQL 中的 `WHERE` 子句非常灵活，正如你在本章所见，整个 SQL 语言也是如此。你的查询的格式和结构可以与其他人编写显示相同结果的查询方式不同。


    对于改进你对 `WHERE` 子句及整个查询的使用，我可以提供一些“最佳实践”或提示。这将确保你的查询易于阅读，并且易于你自己和他人将来理解。


    ### 将列名放在左侧


    在编写 `WHERE` 子句时，你应该将列名放在左侧，将值或其他列放在每个比较语句的右侧。这使代码保持一致且更易于阅读。这意味着你的查询应该这样写：


    ```sql

    WHERE last_name = ''SMITH''

    ```


    而不是：


    ```sql

    WHERE ''SMITH'' = last_name

    ```


    两个 `WHERE` 子句的作用相同，但第一个遵循了更常见的格式，我认为更具可读性。大多数有 SQL 经验的程序员都期望列名在左侧，字面值在右侧。


    ### 只选择你需要的


    在 `WHERE` 子句中提到的列不必在 `SELECT` 子句中列出。你可以在不需要将数据发送回应用程序的情况下，基于某个值进行筛选。


    例如，假设你想查看所有 `salary` 小于 40000 的员工 `ID`。你可以在 `SELECT` 和 `WHERE` 子句中都列出 `salary`：


    ```sql

    SELECT id, salary

    FROM employee

    WHERE salary < 40000;

    ```


    然而，通过在 `SELECT` 子句中列出 `salary` 列，当应用程序不需要这些值时，你仍然会导致所有 `salary` 值通过网络发送，或者可能暴露需要保护且保密的数据。


    一个更高效的查询版本如下：


    ```sql

    SELECT id

    FROM employee

    WHERE salary < 40000;

    ```


    数据库引擎仍然可以基于 `salary` 列筛选结果。但是，只有 `ID` 值会通过网络发送到应用程序。网络流量减少了，你的应用程序用户也不会等待不需要的数据被发送，或者不会将
    `salary` 数据显示给不应看到的人。


    ## 总结


    你可以使用 `WHERE` 子句来筛选结果，它涉及 `WHERE` 关键字和一些条件。这意味着你可以只显示你感兴趣的记录。使用 `WHERE` 子句筛选数据可以通过多种方式完成，使用诸如等于、不等于、大于和小于等符号。


    # 6. 比较数据


    你刚刚学习了如何限制要显示的行，使用了多种方法，例如等于或大于。这些方法中的每一种都将一个列与另一个值进行比较。这个另一个值是通过“精确匹配”来检查的。检查时使用的是你指定的确切值。


    例如，考虑这个 `WHERE` 子句：


    ```sql

    WHERE last_name = ''SMITH''

    ```


    这个 `WHERE` 子句将返回所有 `last_name` 等于 `''SMITH''` 的行。它不会返回 `last_name` 是以下任何值的记录：


    *   Smith

    *   SMITHERS

    *   SMITHSONIAN

    *   Naismith

    *   SMIT


    这就是精确匹配的作用。但如果你想匹配部分值呢？


    ## 什么是部分匹配？


    在之前的例子中，你查找了所有 `last_name` 为 `''SMITH''` 的 `employee` 记录。如果你想查找所有 `last_name`
    以字母 S 开头的 `employee` 记录呢？


    你可以编写一个如下查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''S'';

    ```


    如果你运行这个查询，会得到以下结果：


    ```sql

    No results found.

    ```


    你没有得到任何结果，因为没有任何 `last_name` 值等于 `''S''`。“等于”和“以...开头”在 SQL 及一般的编程中是不同的概念。能够找到“以”某个值“开头”的记录的能力被称为*部分匹配*。


    部分匹配是能够匹配部分值的能力。它不是检查一个值是否完全等于另一个值，而是通过部分匹配我们可以检查：


    *   以某个值开头

    *   以某个值结尾

    *   包含某个值

    *   其他值的组合


    你可以通过在 SQL 中使用 `LIKE` 关键字来执行部分匹配。


    ## LIKE 的语法


    `LIKE` 关键字可以在 `WHERE` 子句中代替等号使用：


    ```sql

    WHERE column LIKE compare_string

    ```


    你从像之前见过的 `WHERE` 子句开始，然后指定你想要查找的列。接着使用 `LIKE` 关键字并指定一个 `compare_string`，即你要查找的值。


    如何编写这个比较字符串？你需要使用所谓的*通配符字符*。通配符字符是用来代表任何其他字符的字符。通过一个例子可以更好地解释这一点。'
  raw: '## Less Than or Equal To


    SQL supports a “less than or equal to” check in the same way as the “greater than
    or equal to” check. It uses a combination of the less than symbol and the equals
    symbol, which is “<=”. To see all employees where the `salary` is less than or
    equal to 40000, a query like this would work:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary <= 40000;

    ```


    The results of this query would be:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    5    ANDERSON    31000

    ```


    The result shows `''JONES''`, `''SMITH''`, and `''ANDERSON''`, as they all have
    a `salary` of less than 40000\. The result also shows `''KING''`, as their `salary`
    is equal to 40000\. In summary, the different symbols that can be used are shown
    in Table [5-1](#471705_1_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    Available Comparison Operators


    | Meaning | Symbol |

    | --- | --- |

    | Equal to | = |

    | Not equal to | <> or != |

    | Greater than | > |

    | Greater than or equal to | >= |

    | Less than | < |

    | Less than or equal to | <= |


    ## Best Practices


    The WHERE clause in SQL is quite flexible, just like the SQL language overall,
    as you’ve seen in this chapter. The formatting and structure of your query can
    be different to the way that other people write a query that would show the same
    result.


    There are a few “best practices” or tips that I can suggest for improving your
    use of this WHERE clause and your query overall. This will ensure that your query
    is easy to read and easy to understand by yourself and others in the future.


    ### Specify Columns on the Left


    When writing your WHERE clause, you should place your columns on the left, and
    values or other columns on the right of each comparison statement. This makes
    the code consistent and easier to read. This means your query would say:


    ```

    WHERE last_name = ''SMITH''

    ```


    Rather than:


    ```

    WHERE ''SMITH'' = last_name

    ```


    Both `WHERE` clauses do the same thing, but the first one follows a more common
    format that I think is more readable. Most programmers with experience in SQL
    expect column names on the left and literal values to be on the right.


    ### Select Only What You Need


    The columns you mention in the `WHERE` clause do not have to be listed in the
    `SELECT` clause. You can filter on a value without needing to send it back to
    the application.


    For example, let’s say you wanted to see all employee `IDs` where the `salary`
    is less than 40000\. You could list the salary in both the `SELECT` and the `WHERE`
    clauses:


    ```

    SELECT id, salary

    FROM employee

    WHERE salary < 40000;

    ```


    However, by listing the `salary` column in the `SELECT` clause you are causing
    all the `salary` values to be sent over the network to the application when the
    application doesn’t need those values, or possibly exposing data that needs to
    be secured and kept private.


    A more efficient version of the query looks like this:


    ```

    SELECT id

    FROM employee

    WHERE salary < 40000;

    ```


    The database engine can still filter the results on the `salary` column. However,
    only the `ID` values are sent across the network to the application. Network traffic
    is reduced, and your application users won’t be waiting for data to be sent that
    is not needed or showing `salary` data to people who shouldn’t see it.


    ## Summary


    Your results can be filtered using the `WHERE` clause, which involves the `WHERE`
    keyword and some criteria. This means you can show only the records that you are
    interested in. Filtering your data using the `WHERE` clause can be done in a range
    of ways, using symbols such as equals, not equals, greater than, and less than.


    # 6. Comparing Data


    You’ve just learned how to restrict which rows you want to display, using a range
    of methods such as the equal to or greater than. Each of these methods checks
    a column against another value. This other value is checked using an “exact match.”
    The exact value that you specified is used to perform the check.


    For example, consider this `WHERE` clause:


    ```

    WHERE last_name = ''SMITH''

    ```


    This `WHERE` clause will return all rows where the `last_name` is equal to `''SMITH''`.
    It does not return records where the `last_name` is any of the following values:


    *   Smith


    *   SMITHERS


    *   SMITHSONIAN


    *   Naismith


    *   SMIT


    This is what an exact match does. But what if you want to match on part of a value?


    ## What Is a Partial Match?


    In the earlier example, you looked for all `employee` records that had a `last_name`
    of `''SMITH''`. What if you wanted to find all `employee` records that had a `last_name`
    starting with the letter S?


    You could write a query like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''S'';

    ```


    If you run this query, you get the following results:


    ```

    No results found.

    ```


    You don’t get any results because there are no `last_name` values that are equal
    to `''S''`. “Equal to” and “starting with” are different concepts in SQL and programming
    in general. The ability to find records that “start with” a certain value is called
    a *partial match*.


    A partial match is the ability to match on part of a value. Rather than checking
    that a value exactly matches another value, with partial match we can check for:


    *   Starting with a certain value


    *   Ending with a certain value


    *   Contains a certain value


    *   Other combinations of values


    You can perform a partial match in SQL by using the *LIKE* keyword.


    ## Syntax of LIKE


    The `LIKE` keyword can be used in place of the equals symbol in the `WHERE` clause:


    ```

    WHERE column LIKE compare_string

    ```


    You start with the `WHERE` clause like you’ve previously seen, and then specify
    the column you want to look for. You then use the `LIKE` keyword and specify a
    `compare_string`, which is the value you are looking for.


    How do you write this compare string? You use what are called *wildcard characters*.
    Wildcard characters are characters that are used to represent any other character.
    This can be better explained with an example.'
