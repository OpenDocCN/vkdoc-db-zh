    当您运行此查询时，您将收到 “9 row(s) updated.” 的消息。哦不！九行！您只想更新一两行！您可以对表运行 `SELECT` 查询以查看更改了什么：


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 25000 |

    | 2 | SMITH | 25000 |

    | 3 | KING | 25000 |

    | 4 | SIMPSON | 25000 |

    | 5 | ANDERSON | 25000 |

    | 6 | COOPER | 25000 |

    | 7 | (null) | 25000 |

    | 8 | SMITH | 25000 |

    | 9 | PATRICK | 25000 |


    ```

    SELECT *

    FROM employee;

    ```


    您可以看到表中的每条记录都被更新为相同的 `salary`。每位员工的 `salary` 信息都已丢失。


    如果您不是故意这样做的，没关系。您可以通过运行 `ROLLBACK` 命令或单击 SQL Developer 中的“回滚”按钮来撤消这些更改。应该会出现一条消息，显示“回滚成功。”


    然后，您可以再次运行 `SELECT` 命令来查看 `employee` 表中的数据。


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | (null) | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |


    ```

    SELECT *

    FROM employee;

    ```


    因此，请小心您的 `UPDATE` 语句。确保它们上有 `WHERE` 子句，除非您非常确定要更新表中的每条记录！对于像这样较小的表，这可能没问题，但当您处理包含数千或数百万条记录的表时，这可能会带来问题！'
- fmt: '# 17. Updating or Deleting a Table


    ## Removing Data from a Table


    There may be a time you want to delete data from a table. Perhaps it’s while you’re
    learning SQL and have made a mistake when inserting data, or it’s to remove data
    that is no longer needed. In SQL, there is a way to do that, and it involves using
    the `DELETE` statement.


    The `DELETE` statement allows you to delete data from a table. It works similar
    to the update statement, where you specify the table name and the criteria for
    the records that will be deleted. The `DELETE` statement looks like this:


    ```

    DELETE FROM tablename

    [WHERE condition];

    ```


    The statement starts with `DELETE FROM`, and then you mention the table name to
    delete the data from. You then can specify a `WHERE` clause. This `WHERE` clause
    is used to identify which records you want to delete.


    Just like the `UPDATE` statement, the `WHERE` clause on the `DELETE` statement
    is optional. This means it’s easy to delete all of the records in your table if
    you’re not careful! Before running a `DELETE` statement, make sure you have a
    `WHERE` clause unless you really want to delete all the records in the table.


    Note: The `WHERE` clause on a `DELETE` statement is optional. If you exclude it,
    all records in the table will be deleted.


    ### Deleting a Record


    Let’s delete a record from the office table. The office table currently looks
    like this.


    | ID | ADDRESS |

    | --- | --- |

    | 1 | 123 Smith Street |

    | 2 | 45 Main Street |

    | 3 | 10 Collins Road |


    We want to delete the record for “10 Collins Road” from this table. To do that,
    you can write a statement like this:


    ```

    DELETE FROM office

    WHERE address = ''10 Collins Road'';

    ```


    This will find all records in the office table that have an address of “10 Collins
    Road” and delete them from the table.


    If you run this statement in SQL Developer, the output panel at the bottom of
    the screen will show “1 row deleted.” Just like the `INSERT` and `UPDATE` statements,
    the `DELETE` statement doesn’t show you what records were deleted.


    You can run a `SELECT` statement on the table to see what the table looks like
    after the `DELETE` statement:


    | ID | ADDRESS |

    | --- | --- |

    | 1 | 123 Smith Street |

    | 2 | 45 Main Street |


    ```

    SELECT *

    FROM office;

    ```


    You can see the record for “10 Collins Road” is no longer in the table.


    When you added data with the `INSERT` statement or updated data with the `UPDATE`
    statement, the data wasn’t permanently saved in the database until you either
    ran a `COMMIT` statement to save it or a `ROLLBACK` statement to undo it. The
    same functionality applies to a `DELETE` statement: the data is not permanently
    deleted until you run a `COMMIT` statement or undo the delete with a `ROLLBACK`.


    We want to commit this statement, so run a `COMMIT` statement or click on the
    `COMMIT` button to save your changes.


    ### Check What Records Will Be Deleted


    The `DELETE` statement doesn’t tell you what records will be deleted before you
    run the statement. There’s no “Are you sure?” dialog box that appears, asking
    you to confirm these records.


    However, you can make a slight change to your `DELETE` statement to see what records
    are impacted before you run it. You can simply change the `DELETE` to a `SELECT
    *`.


    For example, your statement might look like this:


    ```

    DELETE FROM office

    WHERE address = ''10 Collins Road'';

    ```


    To see what records will be deleted before you run the `DELETE` statement, replace
    the word `DELETE` with `SELECT *`.


    ```

    SELECT *

    FROM office

    WHERE address = ''10 Collins Road'';

    ```


    You can run this `SELECT` query to see the records that meet the `WHERE` clause
    criteria. Changing this statement back to a `DELETE` will then delete those records.
    This is helpful with simple queries like this and even queries with more complicated
    `WHERE` clauses.


    ### Delete All Records in a Table


    If you want to delete all records in a table, you can also use the `DELETE` statement.
    This is helpful for resetting a table or removing all of its data, so you can
    reinsert it.


    To delete all records in a table, write a `DELETE` statement that has no `WHERE`
    clause.


    ```

    DELETE FROM office;

    ```


    This will delete all records in the table. You can also have the same effect by
    running a DELETE statement that has a WHERE clause that meets all criteria. For
    our example, these queries will delete all data:


    ```

    DELETE FROM office

    WHERE id >= 1;

    DELETE FROM office

    WHERE address IS NOT NULL;

    ```


    You can run these queries, and all records will be removed from your table. If
    you want to insert the records again, you can run the `INSERT` statements from
    the earlier chapter.


    ## Summary


    The `UPDATE` statement in SQL allows you to update data that already exists in
    a table. You don’t need to remove and reinsert the data to correct it. You can
    update one or many columns in a table that meet certain criteria using a `WHERE`
    clause, which works in the same way as a `SELECT` statement.


    You can remove records from a table using the `DELETE` statement. This statement
    has an optional `WHERE` clause that lets you specify which records to delete,
    and if you leave this out, all records are deleted.


    ## Why Update the Structure of a Table?


    In SQL, you can update the structure of your table. This means you can add or
    remove columns, rename columns, rename tables, change data types of columns, and
    more. Why would you want to do this? There are a few reasons.


    In the world of software development, once something is developed, there is no
    guarantee it will stay that way forever. This applies to an application as a whole,
    all the way down to the code and the tables that it works with.


    You may need to alter a table to add a new column to capture some more information.
    This wasn’t known about when you created the table originally, as it’s a new request.


    Another scenario is if a column was created but needs to be renamed for some reason,
    such as matching with another table or to reflect what it’s really used for.


    Why wouldn’t you just delete the table and recreate it? Sometimes that’s easier,
    but most of the time it’s easier to alter the table. This is because you don’t
    always have the SQL to create the table, and if you remove the table you’ll lose
    all of the data inside it.


    We’ll go through some examples for making changes to tables to demonstrate how
    this is done.


    ## The ALTER TABLE Statement


    The way to make changes to the structure of a table is to use a statement called
    `ALTER TABLE`. This will alter the structure of the table, as opposed to the `UPDATE`
    statement, which changes the data inside the table.


    There are quite a few things that the `ALTER TABLE` statement can do:


    *   Add one or more columns to a table

    *   Change the data type of a column

    *   Add a constraint to a column (such as a primary key or a foreign key)

    *   Remove a column from a table

    *   Rename a column

    *   Rename a table


    The `ALTER TABLE` statement looks like this:


    ```

    ALTER TABLE table_name alter_table_clause;

    ```


    This includes a few things:


    *   It starts with ALTER TABLE.

    *   You then specify the name of the table you want to alter.

    *   Finally, you specify an alter_table_clause. This describes the changes you
    are making.


    Let’s take a look at some examples of altering a table.


    You’ve learned how to work with tables and data in the last few chapters. Specifically,
    you’ve learned how to:


    *   Create a table

    *   Add data to a table

    *   Update data in a table

    *   Delete data from a table


    There are two more operations relating to tables that you’ll learn about: how
    to update the structure of a table, and how to delete a table.'
