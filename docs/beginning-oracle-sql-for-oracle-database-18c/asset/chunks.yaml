  trans: '## 注意


    Oracle 中的 WHERE 子句是区分大小写的，这意味着"JONES"、"Jones"和"jones"都是不同的值。


    如何让查询同时显示这两种值呢？你可以使用`UPPER`或`LOWER`函数。与其查找"`last_name`为 JONES 的所有记录"，不如查找"`last_name`大写形式为
    JONES 的所有记录"。你也可以查找"`last_name`小写形式为 jones 的所有记录"。它们会显示相同的结果。


    实现此功能的查询如下：


    ```

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee

    WHERE UPPER(last_name) = ''JONES'';

    ```


    这将比较`last_name`值的大写形式与 JONES 的值。将显示以下结果：


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 20000 | 1 |

    | 10 | Jones | 42000 | 2 |


    两条"Jones"记录都被显示出来了：一条是大写形式的，另一条是混合大小写形式的。


    你也可以通过将两边都转换为小写来获得相同的结果：


    ```

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee

    WHERE LOWER(last_name) = ''jones'';

    ```


    应该使用哪个函数呢？对我个人而言，我偏好使用`UPPER`。在这种情况下它也更有意义，因为表中大多数值都是大写的。但两者会显示相同的结果。


    ## 获取字符串的一部分


    另一个对字符串值进行的常见操作是获取字符串的某个部分。这个概念称为`子串`，因为较大字符串的较小部分被称为子串。Oracle 函数`SUBSTR`可以让你从一个字符串中提取一个子串。其语法如下：


    ```

    SUBSTR (string, start_position [, length])

    ```


    此函数有三个参数：


    *   `string`：要查找的字符串

    *   `start_position`：要提取的子串的起始位置

    *   `length`：要返回的子串的长度


    在上面的语法中，你会注意到一些方括号"["和"]"。它们表示该参数是可选的。你不必指定`length`参数。这意味着你可以用两种方式运行此函数：


    ```

    SUBSTR (string, start_position)

    SUBSTR (string, start_position, length)

    ```


    如果你不添加`length`参数，默认行为是返回字符串的剩余部分。


    让我们在`office`表上看一个例子。你可能想要找到`address`字段的前两个字符。你可以使用`SUBSTR`函数，起始位置为 1，长度为 2 来实现。


    ```

    SELECT id,

    address,

    SUBSTR(address, 1, 2)

    FROM office;

    ```


    这将显示以下结果：


    | ID | ADDRESS | SUBSTR(ADDRESS,1,2) |

    | --- | --- | --- |

    | 1 | 123 Smith Street | 12 |

    | 2 | 45 Main Street | 45 |

    | 3 | 10 Collins Road | 10 |


    它提取了`address`字段的前两个字符并显示在新列中。


    你可以尝试不带`length`参数的同一函数。假设你想从第 5 个字符开始提取`address`的剩余部分。你的查询可能如下所示：


    ```

    SELECT id,

    address,

    SUBSTR(address, 5)

    FROM office;

    ```


    结果将是：


    | ID | ADDRESS | SUBSTR(ADDRESS,5) |

    | --- | --- | --- |

    | 1 | 123 Smith Street | Smith Street |

    | 2 | 45 Main Street | ain Street |

    | 3 | 10 Collins Road | ollins Road |


    该函数提取了从第 5 个位置开始的整个字符串。


    在 Oracle 中，还有更多的字符串函数，可以让你对字符串进行各种转换。这里介绍的只是其中一部分。'
- fmt: '# Calculations on Dates


    You’ve learned in this chapter how to do basic operations on strings and numbers.
    You can also do basic operations on dates. Adding and subtracting days from a
    date is the most common operation I’ve seen, so you’ll learn how to do that in
    this section.


    The `sales_meeting` table has a `meeting_date` column that stores a date value.


    | ID | EMPLOYEE_ID | COMPANY | MEETING_DATE |

    | --- | --- | --- | --- |

    | 1 | 5 | ABC Construction | 10/Aug/2018 |

    | 2 | 2 | BW Signage | 21/Aug/2018 |

    | 3 | (null) | WXC Services | 23/Aug/2018 |


    You can add or subtract days from a date value by simply adding or subtracting
    a number to this date value. For example, to add 7 days to the `meeting_date`
    value, you would specify `meeting_date + 7`. The query to do this would be:


    ```sql

    SELECT id,

    meeting_date,

    meeting_date + 7

    FROM sales_meeting;

    ```


    When you run this query, you’ll get this result.


    | ID | MEETING_DATE | MEETING_DATE+7 |

    | --- | --- | --- |

    | 1 | 10/Aug/2018 | 17/Aug/2018 |

    | 2 | 21/Aug/2018 | 28/Aug/2018 |

    | 3 | 23/Aug/2018 | 30/Aug/2018 |


    Each of these dates has had 7 days added to it. You can add a longer period or
    subtract days if needed. Here’s a query that shows the same dates with 14 days
    added and with 30 days subtracted.


    ```sql

    SELECT id,

    meeting_date,

    meeting_date + 14,

    meeting_date - 30

    FROM sales_meeting;

    ```


    The results are:


    | ID | MEETING_DATE | MEETING_DATE+14 | MEETING_DATE-30 |

    | --- | --- | --- | --- |

    | 1 | 10/Aug/2018 | 24/Aug/2018 | 11/Jul/2018 |

    | 2 | 21/Aug/2018 | 4/Sep/2018 | 22/Jul/2018 |

    | 3 | 23/Aug/2018 | 6/Sep/2018 | 24/Jul/2018 |


    This is a simple way to find a date in the future or the past. You can also use
    it to find hours in the future or the past as well. Remember that the `DATE` data
    type also includes time. We can use the same process as well as a function called
    `TO_CHAR` to show time.


    The `meeting_date` column stores a date and time value, but only shows a date.
    One way to see the time value is to use the `TO_CHAR` function, which converts
    a date value to a string or character value. The `TO_CHAR` function syntax looks
    like this:


    ```sql

    TO_CHAR (input_value [, format_mask [, nls_parameter] ] )

    ```


    This includes several parameters:


    *   `input_value`: the value to convert to a character value

    *   `format_mask`: the format that the `input_value` should be displayed as. This
    is optional, and if it’s omitted, a default format will be used.

    *   `nls_parameter`: This optional parameter allows you to specify any location-specific
    values.


    First, let’s display the `meeting_date` value as a date and time value:


    ```sql

    SELECT id,

    meeting_date,

    TO_CHAR(meeting_date, ''DD/MON/YYYY HH:MI:SS AM'') AS meeting_datetime

    FROM sales_meeting;

    ```


    The second parameter is the format mask. This is how the date value will be displayed.
    It includes:


    *   `DD`, which is a two-digit day (e.g., 27), followed by a forward slash “/”

    *   Then `MON`, which is a three-letter month (e.g., AUG), followed by a forward
    slash “/”

    *   Then a four-digit year (e.g., 2018), followed by a space

    *   Then a two-digit hour, followed by a colon “:”

    *   Then a two-digit minute, followed by a colon “:”

    *   Then a two-digit second, followed by a space

    *   Then an `AM` or `PM` indicator


    The results of this query are:


    | ID | MEETING_DATE | MEETING_DATETIME |

    | --- | --- | --- |

    | 1 | 10/Aug/18 | 10/Aug/2018 12:00:00 AM |

    | 2 | 21/Aug/18 | 21/Aug/2018 12:00:00 AM |

    | 3 | 23/Aug/18 | 23/Aug/2018 12:00:00 AM |


    As you can see, the `meeting_datetime` column shows the `meeting_date` value including
    a time. The time is midnight, as this is the default value when a time is not
    specified.


    Now, let’s say you wanted to add 6 hours to these dates. Earlier you added whole
    numbers to the dates to add another day. You can add hours to dates by adding
    numbers and then dividing by 24. For example, adding 1/24 to a date will increase
    it by 1 hour.


    To add 6 hours to each of the `meeting_date` values, your query will look like
    this:


    ```sql

    SELECT id,

    TO_CHAR(meeting_date, ''DD/MON/YYYY HH:MI:SS AM'') AS meeting_datetime,

    TO_CHAR(meeting_date + 6/24, ''DD/MON/YYYY HH:MI:SS AM'') AS meeting_datetime_future

    FROM sales_meeting;

    ```


    The results of this query are:


    | ID | MEETING_DATE | MEETING_DATETIME |

    | --- | --- | --- |

    | 1 | 10/Aug/18 | 10/Aug/2018 06:00:00 AM |

    | 2 | 21/Aug/18 | 21/Aug/2018 06:00:00 AM |

    | 3 | 23/Aug/18 | 23/Aug/2018 06:00:00 AM |


    This shows the current date and time and then the date and time after 6 hours
    have been added. All of the times are showing as 6am, because you added the “+6/24”
    where the `meeting_date` column was mentioned. It’s added inside the function
    because we want the addition of 6 hours to be done before the formatting is done
    by `TO_CHAR` .


    These are just some examples of the kind of addition and subtraction you can do
    with dates and numbers. A lot more can be done with dates by using date functions.


    # Date Functions


    In this section you’ll learn how to use two of the most common date functions.
    The first one lets you find the current date and time.


    ## Current Date and Time


    There are many situations where you want to know what the current date and time
    is, such as:


    *   Recording when an event happened in an application

    *   Recording when errors occur

    *   Displaying the current date and time to the user


    There are a few functions to display the current date and time, but the most commonly
    used one that I’ve seen is `SYSDATE` . This function will return the current date
    and time of the database server. It’s a quick and easy way to get the current
    date and time. There are no parameters involved; just add the word `SYSDATE` into
    your query. To get the current date and time, use this query:


    ```sql

    SELECT SYSDATE

    FROM dual;

    ```


    Your results will show the current date, such as:


    | SYSDATE |

    | --- |

    | 30/AUG/2018 |


    The `SYSDATE` function actually includes a time component, but like the `meeting_date`
    column earlier, it doesn’t show by default. You can show the date and time by
    using the `TO_CHAR` function on the `SYSDATE` column. Yes, you can use functions
    inside other functions, and this is a common way to get the data you need in many
    situations.


    Your query may look like this:


    ```sql

    SELECT

    TO_CHAR(SYSDATE, ''DD/MON/YYYY HH:MI:SS AM'') AS time_now

    FROM dual;

    ```


    The results of this query will show something like this:


    | SYSDATE |

    | --- |

    | 30/AUG/2018 12:30:14 PM |


    This shows the current date along with the time. Each time you run this query
    the time will change to reflect the current time.


    If you need to insert the current date into a column, you can use this in an `INSERT`
    statement. For example, a query like this will insert a new record with a meeting
    on the current date and time:


    ```sql

    INSERT INTO sales_meeting (id, employee_id, company, meeting_date)

    VALUES (4, 7, ''McMahon'', SYSDATE);

    ```


    So, instead of specifying an actual date value, you use the `SYSDATE` function
    . You don’t need to run this query on your database.'
