  trans: '

    ## 数值示例


    你并不总是需要按文本值进行筛选。你也可以按数值进行筛选。比如说，你想找出所有薪资为 52000 的员工。你的查询会像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 52000;

    ```


    这个查询与之前的查询有几个不同之处：


    *   我们希望查看具有特定薪资的记录，因此我们指定了 `WHERE salary`。


    *   我们不关心 `last_name` 的值是什么，所以我们从 `WHERE` 子句中移除了针对该列的任何条件。


    *   我们还使用了等号，然后指定了一个数字：52000。这样做将显示所有薪资为 52000 的记录。


    你可能会想，“美元符号怎么办？我能添加逗号作为千位分隔符吗？”你可能正尝试运行这样的查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = $52000;

    ```


    或者像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 52,000;

    ```


    好消息是，你不需要输入逗号和美元符号。良好数据库设计的因素之一是每列都具有合适的数据类型。虽然 `last_name` 列存储为文本值，但 `salary`
    是存储为数字。


    你不能在薪资列中存储货币符号（`$` 或 `€`），因为这意味着该字段不再是数字。然而，你可以将薪资存储为不含货币符号的数字，任何使用此薪资值的应用程序都可以决定如何显示该值（例如，添加货币符号）。


    你也不需要存储任何逗号或其他字符作为千位分隔符。这些应该仅用于在报告或应用程序中显示数据，因此显示薪资的位置将决定是否需要任何千位分隔符。在数据库中，我们只存储数字值。你也可以在从数据库
    `SELECT` 该列时添加它。


    与 SQL 中的文本值不同，你不应将数值括在单引号中。指定 `salary = 52000` 将有效。


    总结一下，我们的查询看起来像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 52000;

    ```


    如果你运行查询，结果将如下所示：


    ```

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    ```


    此结果显示了一条符合你条件的记录：`salary` 等于 52000。没有其他记录具有相同的 `salary` 值。


    ## 查找不等于某个值的行


    到目前为止，你一直在查看精确匹配某些条件的记录。如果你想找到所有不匹配某些条件的记录怎么办？


    在 SQL 中，你可以使用一个稍有不同的符号来查找不匹配某些条件的记录，该符号代表“不等于”。“不等于”操作由 `<>` 表示。这个符号是两个尖括号紧挨在一起。


    让我们看一个查找不匹配特定条件的记录的示例，你想查看所有 `last_name` 不是 SMITH 的员工。


    你的查询会像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name <> ''SMITH'';

    ```


    这个查询看起来与之前查找所有名为 SMITH 的员工的查询完全相同，只是我们使用了 `<>` 而不是 `=`。因此，我们新版本的查询将显示所有 `last_name`
    不等于 SMITH 的记录。


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    最后，还有另一个符号可用于表示不等于：`!=`。感叹号和等号也指定“不等于”。这意味着你的查询也可以这样写：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name != ''SMITH'';

    ```


    结果将是相同的：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    如果有两个符号做同样的事情，你该使用哪一个？我建议使用两个尖括号 `<>`，因为它们是 SQL 标准的一部分，而 `!=` 不是。这使他人更容易理解，也便于未来的代码更改。


    ## 大于


    我们已经看了等于和不等于。你还可以使用“大于”检查来查找记录，这意味着你可以找到某列大于特定值的所有记录。大于符号是 `>`，一个指向右边的单尖括号。


    假设你想找到所有 `salary` 大于 35000 的 `employee` 记录。你的查询会像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary > 35000;

    ```


    就像查找等于某个数字的值一样，你不应将数字括在单引号中。这适用于你处理数字的所有工作。


    这个查询将查看每条记录，确定 `salary` 是否大于 `35000`，如果是，则该记录将显示在结果中。如果不是，该记录将不会被显示。大于符号不包括与你指定的值匹配的值。因此，35000
    的值不会被返回，但 35001 的值会被返回。


    我们的结果将如下所示：


    ```

    ID   LAST_NAME   SALARY

    3    KING        40000

    4    SIMPSON     52000

    ```


    结果显示了 `salary` 大于 `35000` 的两条记录。它没有包括 `employee ''SMITH''`，因为他们的 `salary` 正好是
    `35000`，并不大于 `35000`。


    ## 大于等于


    如果你想包含那条 `''SMITH''` 记录怎么办？你可以将查询改为 `> 34999`。另一种方法是使用“大于等于”。可以使用 `>=` 符号来包含 `''SMITH''`
    记录，该符号是大于符号和等号的组合。


    如果你想编写一个查询，显示所有 `salary` 大于等于 `35000` 的 `employees`，它会像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary >= 35000;

    ```


    这个查询将显示以下结果：


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    ```


    它显示了 `''KING''` 和 `''SIMPSON''`，因为他们超过 35000，也显示了 `''SMITH''`，因为 35000 满足“大于等于
    35000”的条件。它没有显示 `''JONES''` 或 `''ANDERSON''`，因为他们的 `salary` 值小于 35000。


    ## 小于


    就像“大于”条件一样，你可以使用“小于”符号来查找小于某个值的记录。这个符号是 `<`。它的用法与大于符号相同。如果你想编写一个查询来显示所有 `salary`
    小于 40000 的 `employees`，它会像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary < 40000;

    ```


    你的结果将是：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    5    ANDERSON    31000

    ```


    表中的五条记录里，`''KING''` (40000) 和 `''SIMPSON''` (52000) 没有被显示，因为他们的 `salary` 值不小于
    40000。`''KING''` 的 `salary` 值等于 40000，这并不小于 40000。

