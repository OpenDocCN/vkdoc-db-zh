  trans: '## 选择特定列还是选择所有列？


    如果你想显示表中的所有列，有两种方法可以实现：


    *   使用 `SELECT *`


    *   使用 `SELECT` 并单独指定每一列


    哪种方法更好？你应该用哪一种？我推荐单独指定每一列。这意味着你的查询应该像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    而不是像这样：


    ```sql

    SELECT *

    FROM employee;

    ```


    我为什么这么推荐？你可能在想，如果 `SELECT *` 更容易输入而且效果一样，为什么我不推荐它。这有几个原因。


    首先，只显示你感兴趣或想要查看的列是个好习惯。仅仅因为你“可以”显示所有列，或者仅仅因为它更容易输入，并不是一个好习惯。单独输入列名只需要几秒钟（如果你使用像
    `SQL Developer` 这样的程序，速度会更快）。显示所有列可能会导致查询运行变慢，也会使任何使用此查询的应用程序运行变慢，因为需要处理更多的数据。


    其次，如果列名发生变化，或者增加了新列，使用 `SELECT *` 会影响查询和结果。具体指定列名则可以减少这个问题。


    所以，请尽量单独指定列，而不要使用 `SELECT *`。


    ## 总结


    你可以使用 SQL 从表中选择特定的列。你可以选择一列、多列或表中的每一列。推荐单独指定列，而不是使用 `SELECT *`，因为它更易于维护，并能减轻应用程序和数据库的负载。


    ## 5. 限制结果


    我们刚刚学习了如何显示表中的特定列。在本章中，我们将探讨如何显示表中的特定行。


    ### 为什么要限制数据？


    在之前的例子中，我们查看了表中的所有列，以及表中的一列或两列。其中一个查询是这样的：


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    此查询将显示表中所有员工的 `id`、`last_name` 和 `salary` 列。如果你不想看到表中的所有员工呢？在我们的示例表中，有五条记录。但如果表中有一百条或一千条记录呢？在你可能遇到的工作场所的真实数据库中，拥有超过一百万条记录的表并不罕见。


    那么，为什么你只想显示部分记录呢？本质上，如果你有一个需求，只想显示符合特定条件的记录，那么你只需要在数据库中找到这些记录。


    一些例子可能是：


    *   查找特定员工的所有信息。


    *   查找客户的所有订单。


    *   查找特定年份的所有学生注册信息。


    你可能会想：“我们不能直接获取表中的所有记录，然后让应用程序自己找出需要的吗？”我们可以这样做，但这会非常慢。从表中找出所有数据，将其从数据库发送到应用程序，然后由应用程序丢弃它不需要的记录，这将花费大量的时间和内存。它还会影响网络流量，因为将所有数据发送到应用程序通常会产生大量网络流量，并且比数据库在发送回数据之前检查行要慢得多。


    更好的方法是只查找我们想要的数据，这样能更好地利用数据库和时间。幸运的是，在 SQL 中，我们可以使用 `WHERE` 子句轻松做到这一点。


    ### 什么是 WHERE 子句？


    `WHERE` 子句是一个子句，它让你能够过滤查询的数据，只显示符合你指定条件的记录。正如我们在前面章节提到的，子句是 SQL 关键字及其后所有相关内容的组合。


    `WHERE` 子句看起来像这样：


    ```sql

    WHERE criteria

    ```


    这个子句看似简单，但功能强大。你将 `WHERE` 子句放入 `SELECT` 查询中，紧跟在 `FROM` 子句之后。例如：


    ```sql

    SELECT columns

    FROM table

    WHERE criteria;

    ```


    分号被移到了语句的最后，在 `WHERE` 子句之后。


    ### 使用文本值的示例


    让我们看一些例子。我们将从文本值开始。这是我们在上一章运行的查询，显示员工表中的所有记录。


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    我们的结果看起来像这样：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    假设你想查找 `last_name` 为 `SMITH` 的员工的所有列（或字段）。


    你可以这样写查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''SMITH'';

    ```


    这个查询有几个新的组成部分：


    *   首先，你添加了 `WHERE` 关键字。


    *   然后，你指定了 `last_name` 列。这是因为你想将 `last_name` 列的值与另一个值进行比较。


    *   接着，你添加了一个等号 "`=`"。


    *   最后，你添加了 `''SMITH''`。这是因为你想查看所有 `last_name` 为 `SMITH` 的记录。


    `SMITH` 被放在单引号内，因为这是你要查找的特定值。`SMITH` 这个值被称为“字符串”，这是软件开发中表示文本值的术语。`SMITH` 的值用单引号括起来，是因为你想让数据库知道你希望它被视为文本值，而不是列名。如果你没有使用单引号，你的查询看起来会是这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = SMITH;

    ```


    然后，Oracle 数据库会查找一个名为 `SMITH` 的列，并会显示错误，因为该列不存在。所以，任何时候你要查找文本值，请确保它用单引号括起来：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''SMITH'';

    ```


    这个查询是如何工作的？Oracle 数据库将运行此查询，并检查员工表中的每一行，看该行的 `last_name` 是否等于 `''SMITH''`。如果是，则该行将包含在显示给你的结果中。如果不是，则不显示。如果你运行这个查询，你的输出将是：


    `ID LAST_NAME SALARY`

    `2  SMITH 35000`


    只显示了一条记录，因为只有一条记录的 `last_name` 值是 `SMITH`。当你使用带有文本值的 `WHERE` 子句时，**值是区分大小写的**。本书前面提到，SQL
    不是区分大小写的语言，这意味着 `SELECT` 和 `select` 的功能是相同的。


    但是，在处理文本值时，例如 `''SMITH''`，这种检查是区分大小写的。这意味着查找 `''Smith''` 不会显示与查找 `''SMITH''` 相同的结果。


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''Smith'';

    ```


    ```sql

    No results found.

    ```


    这是因为表中的值等于 `''SMITH`，这与 `''Smith''` 不同。


    ### 注意


    文本值（那些在单引号内的）在 SQL 中是区分大小写的。所以，`''SMITH''` 不等于 `''Smith''`。


    注意等号周围的空格。它们不是必需的，但没有它们，查询会更难阅读。例如：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name="Smith";

    ```


    这个查询可以执行，但我建议在像等号这样的运算符周围加上空格，以提高可读性。良好地使用空格可以使查询更容易被下一个需要维护它的程序员阅读。'
- fmt: '## Example with a Number Value


    You don’t always need to filter on text values. You can also filter on number
    values. Let’s say you wanted to find any employees who had a salary of 52,000.
    Your query would look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 52000;

    ```


    There are a few differences between this query and the earlier query:


    *   We want to see records with a specific salary, so we have specified `WHERE
    salary`.


    *   We don’t care what the `last_name` value is, so we have removed any condition
    for that column from the `WHERE` clause.


    *   We have also used the equals sign, and then specified a number: 52000. Doing
    so will show us all records with a salary of 52000.


    You might be wondering, “What about a dollar sign? Can I add a comma as a thousand
    separator?” You might be trying to run a query like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = $52000;

    ```


    Or like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 52,000;

    ```


    The good news is that you don’t have to type commas and dollar signs. One of the
    factors of good database design is that each column has an appropriate data type.
    While the `last_name` column is stored as a text value, the `salary` is stored
    as a number.


    You can’t store the currency symbol (a `$` symbol or a `€` symbol) in the salary
    column, because that would mean the field is no longer a number. However, you
    can store the salary as a number without the currency symbol, and any application
    that uses this salary value can determine how to display the value (for example,
    adding a currency symbol).


    You also don’t need to store any commas or other characters as thousand separators.
    These should be used only for displaying data in a report or an application, so
    the place that the salary is displayed will determine if any thousand separators
    are needed. In the database, we simply store the number value. You can also add
    this when you `SELECT` the column from the database.


    Unlike text values in SQL, you shouldn’t enclose number values within single quotes.
    Specifying `salary = 52000` will work.


    To recap, our query looks like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 52000;

    ```


    If you run your query, your results will look like these:


    ```

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    ```


    This result shows a single record that meets your criteria: the `salary` is equal
    to 52000. None of the other records have that same `salary` value.


    ## Finding Rows Not Equal to a Value


    So far, you have looked at records that match certain criteria exactly. What if
    you want to find all records that don’t match certain criteria?


    You can find records that don’t match certain criteria in SQL with a slightly
    different symbol that represents “not equal to.” The “not equal to” operation
    is represented by `<>`. This symbol is two angled brackets next to each other.


    Let’s see an example of finding records that don’t match certain criteria, where
    you want to see all employees where the `last_name` is not SMITH.


    Your query would look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name <> ''SMITH'';

    ```


    This query looks exactly the same as the one earlier to find all employees named
    SMITH, except we use `<>` instead of `=`. Thus, our new version of the query will
    show us all records where the `last_name` does not equal SMITH.


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    Finally, there is another symbol that can be used for not equals: `!=`. The exclamation
    point and equals sign also specify “not equal to.” This means your query could
    also be written like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name != ''SMITH'';

    ```


    The results would be the same:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    If there are two symbols that do the same thing, which one do you use? I would
    recommend using the two angled brackets `<>`, because they are part of the SQL
    standard whereas `!=` is not. This makes it easier for others to understand and
    also makes it easier in the future for code changes.


    ## Greater Than


    We’ve looked at equal to, and not equal to. You can also find records using a
    “greater than” check, which means you can find all records where a column is greater
    than a specific value. The greater than symbol is `>`, a single angled bracket
    that points to the right.


    Let’s say you wanted to find all `employee` records where the `salary` was greater
    than 35000. Your query would look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary > 35000;

    ```


    Just like with finding values equal to a number, you shouldn’t enclose the number
    inside single quotes. This applies to all the work you do with numbers.


    This query will look at each record, determine if the `salary` is greater than
    `35000`, and if it is, the record will be shown in these results. If not, the
    record won’t be shown. The greater than symbol does not include values that match
    what you have specified. So, a value of 35000 would not be returned, but a value
    of 35001 would be.


    Our results would look like this:


    ```

    ID   LAST_NAME   SALARY

    3    KING        40000

    4    SIMPSON     52000

    ```


    The results show the two records where the `salary` is greater than `35000`. It
    does not include `employee ''SMITH''`, as they have a `salary` of `35000` exactly,
    which is not greater than `35000`.


    ## Greater Than or Equal To


    What if you wanted to include that `''SMITH''` record? You could change your query
    to be `> 34999`. Another way to do it would be to use “greater than or equal to.”
    Including the `''SMITH''` record can be checked using a `>=` symbol, which is
    a combination of the greater than symbol and the equals signal.


    If you wanted to write a query that shows all `employees` with a `salary` greater
    than or equal to `35000`, it would look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary >= 35000;

    ```


    This query would show the following results:


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    ```


    It shows both `''KING''` and `''SIMPSON''` because they are over 35000, and `''SMITH''`
    because the 35000 meets the “greater than or equal to 35000” criteria. It doesn’t
    show `''JONES''` or `''ANDERSON''` because their `salary` values are less than
    35000.


    ## Less Than


    Just like with the “greater than” criteria, you can look for records that are
    less than a specific value using a “less than” symbol. This symbol is `<`. It’s
    used in the same way as the greater than symbol. If you wanted to write a query
    to show all `employees` with a `salary` of less than 40000, it would look like
    this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary < 40000;

    ```


    Your results would be:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    5    ANDERSON    31000

    ```


    Out of the five records in the table, `''KING''` (40000) and `''SIMPSON''` (52000)
    are not shown as their `salary` values are not less than 40000. The `salary` value
    for `''KING''` is equal to 40000 which is not less than 40000.'
