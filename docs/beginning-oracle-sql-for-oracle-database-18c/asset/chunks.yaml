- fmt: '## 百分号通配符


    在前面的例子中，您想查找所有以 “S” 开头的 `last_name`。为此，您可以使用百分号通配符，即 “%”。它代表“零个或多个字符”，即任何字母、数字或符号。


    您可以使用这样的 `WHERE` 子句：


    ```sql

    WHERE last_name LIKE ''S%''

    ```


    这将查找 `last_name` 值以 “S” 作为第一个字符，然后后面是零个或多个字符的记录，无论这些字符是什么。


    这将显示如下值：


    *   SMITHERS

    *   Smith

    *   SIMPSON

    *   Stanley

    *   Sum

    *   So


    您能看出规律吗？所有这些值都以 “S” 开头，后面有零个或多个字符。实际跟随的字符无关紧要，只需有一个或多个即可。


    您可以编写查询来显示此数据：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''S%'';

    ```


    您的结果将是：


    ```sql

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    4    SIMPSON     52000

    ```


    您可以看到两个结果，一个是 `''SMITH''`，一个是 `''SIMPSON''`。两者都以 “S” 开头。另外有两个记录也包含 “S”（`''ANDERSON''`
    和 `''JONES''`），但它们没有被显示，因为您的条件是 “S%”，意味着 `last_name` 需要以单个 S 开头，后面是其他字符。值 `''ANDERSON''`
    和 `''JONES''` 不以 S 开头。


    如果您想显示那些记录呢？如果您想查找所有 `last_name` 中包含 “S” 的记录呢？您可以通过在 S 前面和后面都放置 % 符号来实现：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%'';

    ```


    您的结果将如下所示：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    显示这些值是因为它们在 `last_name` 值的任何位置都包含一个 S。它可能在开头、中间或结尾。


    您也可以查找以 S 结尾的值，通过在比较字符串的开头放置一个 “%” 符号但不在结尾放置。您的查询将如下所示：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S'';

    ```


    我们的结果将如下所示：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    ```


    如前所示，百分号通配符对于在字符串的任何位置查找一个或一组字符很有帮助。


    ## 下划线通配符


    Oracle SQL 中可用的另一个通配符是下划线字符 “_”。下划线字符用于表示零个或一个任意类型的字符。它与百分号字符类似，后者表示零个或多个字符，区别在于下划线在使用通配符的位置最多允许一个字符。


    假设您有这样的 `WHERE` 子句：


    ```sql

    WHERE last_name LIKE ''SA_''

    ```


    您的结果将包括：


    *   SAM

    *   SAL

    *   SAr

    *   SA


    然而，您的结果**不会**包括：


    *   SALL

    *   SANDERS

    *   SAWS

    *   Sam


    这是因为下划线的位置最多只允许一个字符，而第二组例子有两个或更多字符（或者不是以 “SA” 开头）。


    假设您想查找每个 `last_name` 是单个字符后跟 `''ING''`。您的查询将如下所示：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''_ING'';

    ```


    结果将是：


    ```sql

    ID   LAST_NAME   SALARY

    3    KING        40000

    ```


    此结果显示 `''KING''` 的值，因为它包含一个单个字符，后跟字符 `''ING''`。如果表中有 `last_name` 值为 `''BING''`
    或 `''LING''` 的记录，它们也会被显示。


    您也可以混合使用百分号和下划线字符，或任意数量的这两种字符来查找您想要的记录。假设您想查找所有 `last_name` 中包含 ‘SO’ 但后面只有一个字符的记录。您的查询将是：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%SO_'';

    ```


    `WHERE` 子句将 `last_name` 与 `''%SO_''` 进行比较，这代表任意数量的字符，然后是字符 SO，然后是零个或一个字符。您的结果将是：


    ```sql

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    `''SIMPSON''` 和 `''ANDERSON''` 都被显示，因为它们包含字符 `''SO''` 并且后面有一个字符。


    假设您想查找所有 `last_name` 包含字母 I 作为第二个字符并且在那之后任何位置包含字母 N 的记录。您的查询将是：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''_I%N%'';

    ```


    这个比较字符串 `''_I%N%''` 可以解释为：


    *   一个下划线，代表任意单个字符

    *   一个 I，位于第二个位置

    *   一个 %，代表零个或多个任意字符

    *   一个 N，需要在 I 之后但在任何位置

    *   一个 %，代表 N 之后的零个或多个任意字符


    此查询的结果将是：


    ```sql

    ID   LAST_NAME   SALARY

    3    KING        40000

    4    SIMPSON     52000

    ```


    `''KING''` 和 `''SIMPSON''` 都符合 `WHERE` 子句条件。`''KING''` 中的 N 紧跟在 I 之后，`''SIMPSON''`
    中的 N 在值的末尾。'
  raw: '## The Percent Wildcard Character


    In our earlier example, you wanted to find all `last_names` that started with
    “S.” To do this, you can use the percent wildcard character, which is “%”. This
    represents “zero or more characters,” which means any letter, number, or symbol.


    You can have a `WHERE` clause like this:


    ```

    WHERE last_name LIKE ''S%''

    ```


    This will look for `last_name` values that have an “S” as the first character,
    and then zero or more characters after that “S” no matter what those characters
    are.


    This would show values such as:


    *   SMITHERS


    *   Smith


    *   SIMPSON


    *   Stanley


    *   Sum


    *   So


    Can you see a pattern here? All of those values start with an “S” and have zero
    or more characters following it. The actual characters that follow it don’t matter.
    There just needs to be one or more.


    You can write a query to show this data:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''S%'';

    ```


    Your results would be:


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    4    SIMPSON     52000

    ```


    You can see two results here, one for `''SMITH''` and one for `''SIMPSON''`. Both
    of those start with “S”. There are two other records that have an “S” in them
    (`''ANDERSON''` and `''JONES''`), but they are not shown because your criteria
    was “S%”, which meant the `last_name` needed to have a single S at the start,
    followed by other characters. The values of `''ANDERSON''` and `''JONES''` don’t
    start with an S.


    What if you did want to show those records? What if you wanted to find all records
    where the `last_name` had an “S” in it? You can do this by putting a % symbol
    both before the S and after the S:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%'';

    ```


    Your results would look like this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    These values are shown because they contain an S at any position in the `last_name`
    value. It could be at the start, in the middle, or at the end.


    You could look for values that end with an S as well, by placing a “%” symbol
    at the start of your comparison string but not at the end. Your query would look
    like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S'';

    ```


    Our results would look like this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    ```


    The percent wildcard character is helpful for finding a character or set of characters
    in a string in any position, as you’ve seen in the preceding examples.


    ## The Underscore Wildcard Character


    The other wildcard character available in Oracle SQL is the underscore character
    “_”. The underscore character is used to represent zero or one character of any
    type. It’s similar to the percent character, which represents zero or more characters,
    except the underscore allows for at most one character in the place that the wildcard
    is used.


    Let’s say you had a WHERE clause like this:


    ```

    WHERE last_name LIKE ''SA_''

    ```


    Your results would include:


    *   SAM


    *   SAL


    *   SAr


    *   SA


    However, your results would **not** include:


    *   SALL


    *   SANDERS


    *   SAWS


    *   Sam


    This is because only one character at most is allowed in the place of the underscore,
    and the second group of examples had two or more characters (or did not start
    with “SA”).


    Let’s say you wanted to find every `last_name` that had a single character followed
    by `''ING''`. Your query would look like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''_ING'';

    ```


    The results would be:


    ```

    ID   LAST_NAME   SALARY

    3    KING        40000

    ```


    This result shows the value of `''KING''` because it contains a single character,
    followed by the characters `''ING''`. If there were records in the table with
    a `last_name` value of `''BING''` or `''LING''`, they would also be shown.


    You can also mix the percent and underscore characters or include any number of
    these two characters to find the record you want. Let’s say you wanted to find
    all records that included ‘SO’ in the `last_name` but had a single character after
    it. Your query would be:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%SO_'';

    ```


    The `WHERE` clause compares the `last_name` to `''%SO_''`, which is any number
    of characters, then the characters SO, then zero or one character. Your results
    would be:


    ```

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    Both `''SIMPSON''` and `''ANDERSON''` are shown, because they include the characters
    `''SO''` and have a single character following it.


    Let’s say you wanted to find all records where the `last_name` included the letter
    I as the second character and included the letter N at any point after that. Your
    query would be:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''_I%N%'';

    ```


    This comparison string, `''_I%N%''`, can be explained as:


    *   An underscore, which means any single character


    *   An I, which is in the second position


    *   A %, which means zero or more of any character


    *   An N, which needs to be after the I but in any position


    *   A %, which means zero or more of any character after the N


    Your results of this query would be:


    ```

    ID   LAST_NAME   SALARY

    3    KING        40000

    4    SIMPSON     52000

    ```


    Both `''KING''` and `''SIMPSON''` meet the `WHERE` clause criteria. The N in `''KING''`
    is immediately after the I, and the N in `''SIMPSON''` is at the end of the value.'
