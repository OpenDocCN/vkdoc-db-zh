- fmt: "## Intellisense or AutoComplete\n\nIntellisense, or AutoComplete as it’s often\
    \ called, is a feature in many software development tools that allow you to write\
    \ code faster. It’s available in `SQL Developer`, and easily accessible when you\
    \ use table aliases. Let’s see an example of this.\n\n1.  Open `SQL Developer`\
    \ and connect to your database, in the same way that you have done for earlier\
    \ chapters. Your screen should show a new SQL window, as shown in Figure 12-1.\n\
    \n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig1_HTML.jpg](Images/471705_1_En_12_Fig1_HTML.jpg)\n\
    \n    Figure 12-1: The new SQL window\n\n2.  Enter in part of the query:\n\n \
    \   ```sql\n    SELECT\n    FROM employee e;\n    ```\n\n3.  Your screen should\
    \ look like that shown in Figure 12-2. If a red underline appears, you can ignore\
    \ that for now. It’s just letting you know that the query is incomplete, as you\
    \ have not specified any columns.\n\n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig2_HTML.jpg](Images/471705_1_En_12_Fig2_HTML.jpg)\n\
    \n    Figure 12-2: The query in SQL Developer\n\n4.  Now, put your cursor after\
    \ the `SELECT` word, press space, then enter your alias name of “e”, then enter\
    \ a period character “ . ” Your `SELECT` clause should look like `SELECT e.` (as\
    \ shown in Figure 12-3).\n\n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig3_HTML.jpg](Images/471705_1_En_12_Fig3_HTML.jpg)\n\
    \n    Figure 12-3: The AutoComplete options\n\n5.  The popup that appears shows\
    \ all of the columns available in the `employee` table. You can select a column\
    \ by pressing the up and down arrow keys, typing in part of the column name, or\
    \ clicking on the name in the list.\n6.  Repeat these steps until you have entered\
    \ all of the columns you want to show in your query.\n\nThis popup that appears\
    \ is called Intellisense or AutoComplete. It’s easy to trigger when a table alias\
    \ is used. Simply enter the alias name and a period to trigger it. This feature\
    \ allows you to easily select a column from the table to include in your query,\
    \ saving time and preventing errors from mistyping the column name.\n\nIf you\
    \ run the query with the table aliases, you’ll get the same results as without\
    \ the table aliases:\n\n```sql\nSELECT e.id, e.last_name\nFROM employee e;\n```\n\
    \n```\nID   LAST_NAME\n1    JONES\n2    SMITH\n3    KING\n4    SIMPSON\n5    ANDERSON\n\
    6    COOPER\n7    (null)\n8    SMITH\n9    PATRICK\n```\n\n## Longer Table Aliases\n\
    \nYou don’t have to use a single letter for a table alias. Many examples of `SQL`\
    \ code online will use a single letter, and many others will use more letters.\
    \ The disadvantage of using a single letter is it’s not immediately obvious what\
    \ table it refers to, when there are multiple tables in a query that may start\
    \ with the same letter.\n\nFor example, let’s say your database has a table called\
    \ `product` that stored details about products that it sold. You may also have\
    \ a table called `pay_rate`, which included the different pay rates for employees.\
    \ If you had a query that used a table alias of “p”, would you be able to easily\
    \ tell that it referred to the `product` table rather than the `pay_rate` table?\n\
    \nIn some instances, especially with longer queries, you may want to use a longer\
    \ table alias name. The longer the name is, the harder it is to type, so you would\
    \ need to have a balance between a name that’s too short to be informative and\
    \ a name that’s too long to be an effective alias.\n\nI usually try to keep my\
    \ aliases to four or five characters at most. You can make a more descriptive\
    \ alias for the `employee` table by using an alias name of “emp”.\n\n```sql\n\
    SELECT emp.id, emp.last_name, emp.salary\nFROM employee emp;\n```\n\nThis is short\
    \ enough that it’s easier to type, and long enough to describe what the table\
    \ is.\n\n## What If I Don’t Use a Table Alias?\n\nAll of this effort to add a\
    \ table alias, which is just another name for a table, to make things easier to\
    \ type? What if you don’t want to use a table alias?\n\nYou don’t have to. In\
    \ many of the queries I write, I don’t use aliases. It’s an optional feature,\
    \ and not used that often in smaller queries. But it’s good to know that the feature\
    \ is there, both in `SQL` and in the `SQL Developer` software.\n\n## What Is a\
    \ Column Alias?\n\nAnother feature of `SQL` that’s helpful for writing queries\
    \ is a `column alias`. A `column alias` is a name that you give to a column that’s\
    \ shown in your results.\n\nThere are a few reasons for using `column alias`es:\n\
    \n*   To make the heading of the output easier to read by users\n*   To make the\
    \ heading of the output easier to use by applications\n*   To make the column\
    \ available in other parts of the query\n\nJust like a table alias, a `column\
    \ alias` is an optional feature. There’s nothing built into `SQL Developer` to\
    \ take advantage of `column alias`es, unlike a table alias.\n\nTo use a `column\
    \ alias`, you add a name after the column name in your query:\n\n```sql\nSELECT\
    \ column_name [AS] column_alias\nFROM table;\n```\n\nThere’s a keyword in the\
    \ middle called `AS`, which is used to define a `column alias`. However, it’s\
    \ an optional keyword: a `column alias` will work with or without it.\n\nLet’s\
    \ take a look at an example.\n\n## Example of a Column Alias\n\nWe can start with\
    \ our query from earlier in this chapter:\n\n```sql\nSELECT id, last_name, salary\n\
    FROM employee;\n```\n\nIf you run this query, you get the following output:\n\n\
    ```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n\
    3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER\
    \      (null)\n7    (null)      (null)\n8    SMITH       62000\n9    PATRICK \
    \    40000\n```\n\n`SQL Developer`, and many other integrated development environments\
    \ (IDEs) will show the column names from the `SELECT` clause as the column headings\
    \ here.\n\nWhat if you wanted to have a different name for your heading? You could\
    \ adjust your table, but that would mean all other queries using this table would\
    \ need to be updated, otherwise they would no longer work.\n\nA better way to\
    \ do this would be to use `column alias`es. Let’s say you wanted to display your\
    \ `last_name` column as “surname”. You can adjust your query:\n\n```sql\nSELECT\
    \ id, last_name AS surname, salary\nFROM employee;\n```\n\nIf you run the query,\
    \ your results will look like this:\n\n```\nID   SURNAME     SALARY\n1    JONES\
    \       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON  \
    \   52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    (null)      (null)\n\
    8    SMITH       62000\n9    PATRICK     40000\n```\n\nThe column heading is now\
    \ called `surname` . No changes have been made to the `employee` table (just your\
    \ query), so other areas of your database or applications won’t be affected. If\
    \ you don’t want to include the `AS` keyword, because it’s optional, your query\
    \ would look like this:\n\n```sql\nSELECT id, last_name surname, salary\nFROM\
    \ employee;\n```\n\nThe results of this query would be the same.\n\n```\nID  \
    \ SURNAME     SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING\
    \        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER  \
    \    (null)\n7    (null)      (null)\n8    SMITH       62000\n9    PATRICK   \
    \  40000\n```"
  raw: "## Intellisense or AutoComplete\n\nIntellisense, or AutoComplete as it’s often\
    \ called, is a feature in many software development tools that allow you to write\
    \ code faster. It’s available in SQL Developer, and easily accessible when you\
    \ use table aliases. Let’s see an example of this.\n\n1.  Open SQL Developer and\
    \ connect to your database, in the same way that you have done for earlier chapters.\
    \ Your screen should show a new SQL window, as shown in Figure [12-1](#471705_1_En_12_Chapter.xhtml#Fig1).\n\
    \n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig1_HTML.jpg](Images/471705_1_En_12_Fig1_HTML.jpg)\n\
    \n    Figure 12-1\n\n    The new SQL window\n\n2.  Enter in part of the query:\n\
    \n    ```\n    SELECT\n    FROM employee e;\n    ```\n\n3.  Your screen should\
    \ look like that shown in Figure [12-2](#471705_1_En_12_Chapter.xhtml#Fig2). If\
    \ a red underline appears, you can ignore that for now. It’s just letting you\
    \ know that the query is incomplete, as you have not specified any columns.\n\n\
    \    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig2_HTML.jpg](Images/471705_1_En_12_Fig2_HTML.jpg)\n\
    \n    Figure 12-2\n\n    The query in SQL Developer\n\n4.  Now, put your cursor\
    \ after the `SELECT` word, press space, then enter your alias name of “e”, then\
    \ enter a period character “ . ” Your `SELECT` clause should look like `SELECT\
    \ e.` (as shown in Figure [12-3](#471705_1_En_12_Chapter.xhtml#Fig3)).\n\n   \
    \ ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig3_HTML.jpg](Images/471705_1_En_12_Fig3_HTML.jpg)\n\
    \n    Figure 12-3\n\n    The AutoComplete options\n\n5.  The popup that appears\
    \ shows all of the columns available in the employee table. You can select a column\
    \ by pressing the up and down arrow keys, typing in part of the column name, or\
    \ clicking on the name in the list.\n\n6.  Repeat these steps until you have entered\
    \ all of the columns you want to show in your query.\n\nThis popup that appears\
    \ is called Intellisense or AutoComplete. It’s easy to trigger when a table alias\
    \ is used. Simply enter the alias name and a period to trigger it. This feature\
    \ allows you to easily select a column from the table to include in your query,\
    \ saving time and preventing errors from mistyping the column name.\n\nIf you\
    \ run the query with the table aliases, you’ll get the same results as without\
    \ the table aliases:\n\n```\nSELECT e.id, e.last_name\nFROM employee e;\nID  \
    \ LAST_NAME\n1    JONES\n2    SMITH\n3    KING\n4    SIMPSON\n5    ANDERSON\n\
    6    COOPER\n7    (null)\n8    SMITH\n9    PATRICK\n```\n\n## Longer Table Aliases\n\
    \nYou don’t have to use a single letter for a table alias. Many examples of SQL\
    \ code online will use a single letter, and many others will use more letters.\
    \ The disadvantage of using a single letter is it’s not immediately obvious what\
    \ table it refers to, when there are multiple tables in a query that may start\
    \ with the same letter.\n\nFor example, let’s say your database has a table called\
    \ “`product`” that stored details about products that it sold. You may also have\
    \ a table called “`pay_rate`”, which included the different pay rates for employees.\
    \ If you had a query that used a table alias of “p”, would you be able to easily\
    \ tell that it referred to the product table rather than the `pay_rate` table?\n\
    \nIn some instances, especially with longer queries, you may want to use a longer\
    \ table alias name. The longer the name is, the harder it is to type, so you would\
    \ need to have a balance between a name that’s too short to be informative and\
    \ a name that’s too long to be an effective alias.\n\nI usually try to keep my\
    \ aliases to four or five characters at most. You can make a more descriptive\
    \ alias for the employee table by using an alias name of “emp”.\n\n```\nSELECT\
    \ emp.id, emp.last_name, emp.salary\nFROM employee emp;\n```\n\nThis is short\
    \ enough that it’s easier to type, and long enough to describe what the table\
    \ is.\n\n## What If I Don’t Use a Table Alias?\n\nAll of this effort to add a\
    \ table alias, which is just another name for a table, to make things easier to\
    \ type? What if you don’t want to use a table alias?\n\nYou don’t have to. In\
    \ many of the queries I write, I don’t use aliases. It’s an optional feature,\
    \ and not used that often in smaller queries. But it’s good to know that the feature\
    \ is there, both in SQL and in the SQL Developer software.\n\n## What Is a Column\
    \ Alias?\n\nAnother feature of SQL that’s helpful for writing queries is a *column\
    \ alias*. A column alias is a name that you give to a column that’s shown in your\
    \ results.\n\nThere are a few reasons for using column aliases:\n\n*   To make\
    \ the heading of the output easier to read by users\n\n*   To make the heading\
    \ of the output easier to use by applications\n\n*   To make the column available\
    \ in other parts of the query\n\nJust like a table alias, a column alias is an\
    \ optional feature. There’s nothing built into SQL Developer to take advantage\
    \ of column aliases, unlike a table alias.\n\nTo use a column alias, you add a\
    \ name after the column name in your query:\n\n```\nSELECT column_name [AS] column_alias\n\
    FROM table;\n```\n\nThere’s a keyword in the middle called “AS”, which is used\
    \ to define a column alias. However, it’s an optional keyword: a column alias\
    \ will work with or without it.\n\nLet’s take a look at an example.\n\n## Example\
    \ of a Column Alias\n\nWe can start with our query from earlier in this chapter:\n\
    \n```\nSELECT id, last_name, salary\nFROM employee;\n```\n\nIf you run this query,\
    \ you get the following output:\n\n```\nID   LAST_NAME   SALARY\n1    JONES  \
    \     20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON    \
    \ 52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    (null)      (null)\n\
    8    SMITH       62000\n9    PATRICK     40000\n```\n\nSQL Developer, and many\
    \ other integrated development environments (IDEs) will show the column names\
    \ from the `SELECT` clause as the column headings here.\n\nWhat if you wanted\
    \ to have a different name for your heading? You could adjust your table, but\
    \ that would mean all other queries using this table would need to be updated,\
    \ otherwise they would no longer work.\n\nA better way to do this would be to\
    \ use column aliases. Let’s say you wanted to display your `last_name` column\
    \ as “surname”. You can adjust your query:\n\n```\nSELECT id, last_name AS surname,\
    \ salary\nFROM employee;\n```\n\nIf you run the query, your results will look\
    \ like this:\n\n```\nID   SURNAME     SALARY\n1    JONES       20000\n2    SMITH\
    \       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON \
    \   31000\n6    COOPER      (null)\n7    (null)      (null)\n8    SMITH      \
    \ 62000\n9    PATRICK     40000\n```\n\nThe column heading is now called `surname`\
    \ . No changes have been made to the `employee` table (just your query), so other\
    \ areas of your database or applications won’t be affected. If you don’t want\
    \ to include the `AS` keyword, because it’s optional, your query would look like\
    \ this:\n\n```\nSELECT id, last_name surname, salary\nFROM employee;\n```\n\n\
    The results of this query would be the same.\n\n```\nID   SURNAME     SALARY\n\
    1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON\
    \     52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    (null)    \
    \  (null)\n8    SMITH       62000\n9    PATRICK     40000\n```"
  trans: "\n## 智能感知或自动完成\n\n智能感知，或常被称为自动完成，是许多软件开发工具中的一项功能，它能让你更快地编写代码。它在 `SQL Developer`\
    \ 中可用，并且当你使用表别名时很容易触发。让我们看一个示例。\n\n1.  打开 `SQL Developer` 并连接到你的数据库，方式与前面章节相同。你的屏幕应显示一个新的\
    \ SQL 窗口，如图 12-1 所示。\n\n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig1_HTML.jpg](img/471705_1_En_12_Fig1_HTML.jpg)\n\
    \n    图 12-1：新的 SQL 窗口\n\n2.  输入查询的一部分：\n\n    ```sql\n    SELECT\n    FROM employee\
    \ e;\n    ```\n\n3.  你的屏幕应如图 12-2 所示。如果出现红色下划线，目前可以忽略。它只是提醒你查询不完整，因为你尚未指定任何列。\n\
    \n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig2_HTML.jpg](img/471705_1_En_12_Fig2_HTML.jpg)\n\
    \n    图 12-2：SQL Developer 中的查询\n\n4.  现在，将光标放在 `SELECT` 单词后面，按空格，然后输入你的别名 \"\
    e\"，接着输入一个句点字符 \" . \"。你的 `SELECT` 子句应看起来像 `SELECT e.` （如图 12-3 所示）。\n\n    ![../images/471705_1_En_12_Chapter/471705_1_En_12_Fig3_HTML.jpg](img/471705_1_En_12_Fig3_HTML.jpg)\n\
    \n    图 12-3：自动完成选项\n\n5.  弹出的窗口显示了 `employee` 表中所有可用的列。你可以通过按上下箭头键、输入部分列名或在列表中点击名称来选择一个列。\n\
    6.  重复这些步骤，直到你输入了查询中想要显示的所有列。\n\n这个出现的弹出窗口被称为智能感知或自动完成。当使用表别名时很容易触发它。只需输入别名和一个句点即可触发。此功能使你可以轻松地从表中选择列包含在查询中，节省时间并防止因列名输入错误而导致的错误。\n\
    \n如果你运行带有表别名的查询，结果将与不带表别名时相同：\n\n```sql\nSELECT e.id, e.last_name\nFROM employee\
    \ e;\n```\n\n```\nID   LAST_NAME\n1    JONES\n2    SMITH\n3    KING\n4    SIMPSON\n\
    5    ANDERSON\n6    COOPER\n7    (null)\n8    SMITH\n9    PATRICK\n```\n\n## 更长的表别名\n\
    \n你不必为表别名使用单个字母。许多网上的 `SQL` 代码示例使用单个字母，而另一些则使用更多字母。使用单个字母的缺点是，当查询中有多个表可能以相同字母开头时，它无法立即明确它指的是哪个表。\n\
    \n例如，假设你的数据库有一个名为 `product` 的表，用于存储其销售产品的详细信息。你可能还有一个名为 `pay_rate` 的表，其中包含员工的不同工资率。如果你有一个查询使用表别名\
    \ \"p\"，你能否轻易分辨它指的是 `product` 表而不是 `pay_rate` 表？\n\n在某些情况下，尤其是较长的查询中，你可能希望使用较长的表别名名称。名称越长，输入就越困难，因此你需要在名称太短缺乏信息量和太长无法成为有效别名之间取得平衡。\n\
    \n我通常尝试将我的别名最多保持在四到五个字符。你可以使用别名 \"emp\" 为 `employee` 表制作一个更具描述性的别名。\n\n```sql\n\
    SELECT emp.id, emp.last_name, emp.salary\nFROM employee emp;\n```\n\n这足够短，易于输入，也足够长以描述该表是什么。\n\
    \n## 如果我不使用表别名会怎样？\n\n所有这些为表（这只是表的另一个名称）添加别名以使输入更容易的努力？如果你不想使用表别名呢？\n\n你不必使用。在我编写的许多查询中，我不使用别名。它是一个可选功能，在较小的查询中并不常用。但了解这个功能的存在是好的，无论是在\
    \ `SQL` 中还是在 `SQL Developer` 软件中。\n\n## 什么是列别名？\n\n`SQL` 的另一个有助于编写查询的功能是 `列别名`。`列别名`\
    \ 是你赋予结果中显示的列的名称。\n\n使用 `列别名` 有几个原因：\n\n*   使输出的标题更便于用户阅读\n*   使输出的标题更便于应用程序使用\n\
    *   使该列可在查询的其他部分使用\n\n就像表别名一样，`列别名` 是一个可选功能。与表别名不同，`SQL Developer` 中没有内置任何专门利用\
    \ `列别名` 的功能。\n\n要使用 `列别名`，你在查询中的列名后添加一个名称：\n\n```sql\nSELECT column_name [AS]\
    \ column_alias\nFROM table;\n```\n\n中间有一个关键字 `AS`，用于定义 `列别名`。然而，它是一个可选关键字：`列别名`\
    \ 在有或没有它的情况下都能工作。\n\n让我们看一个例子。\n\n## 列别名示例\n\n我们可以从本章前面的查询开始：\n\n```sql\nSELECT\
    \ id, last_name, salary\nFROM employee;\n```\n\n如果你运行此查询，你会得到以下输出：\n\n```\nID\
    \   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING\
    \        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER  \
    \    (null)\n7    (null)      (null)\n8    SMITH       62000\n9    PATRICK   \
    \  40000\n```\n\n`SQL Developer` 和许多其他集成开发环境 (IDE) 会将 `SELECT` 子句中的列名显示为这里的列标题。\n\
    \n如果你想为标题使用不同的名称怎么办？你可以调整你的表，但这意味着所有其他使用此表的查询都需要更新，否则它们将无法再工作。\n\n更好的方法是使用 `列别名`。假设你希望将\
    \ `last_name` 列显示为 \"surname\"。你可以调整你的查询：\n\n```sql\nSELECT id, last_name AS surname,\
    \ salary\nFROM employee;\n```\n\n如果你运行查询，你的结果将如下所示：\n\n```\nID   SURNAME     SALARY\n\
    1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON\
    \     52000\n5    ANDERSON    31000\n6    COOPER      (null)\n7    (null)    \
    \  (null)\n8    SMITH       62000\n9    PATRICK     40000\n```\n\n列标题现在叫做 `surname`。`employee`\
    \ 表没有做任何更改（只有你的查询），因此数据库或应用程序的其他部分不会受到影响。如果你不想包含 `AS` 关键字，因为它是可选的，你的查询将如下所示：\n\
    \n```sql\nSELECT id, last_name surname, salary\nFROM employee;\n```\n\n此查询的结果将是相同的。\n\
    \n```\nID   SURNAME     SALARY\n1    JONES       20000\n2    SMITH       35000\n\
    3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER\
    \      (null)\n7    (null)      (null)\n8    SMITH       62000\n9    PATRICK \
    \    40000\n```\n"
- fmt: '## The AS Keyword


    如果列别名的`AS`关键字是可选的，你应该使用它吗？当然，需要输入的越少越好？我建议你在使用列别名时总是包含`AS`关键字。原因如下。


    假设你有一个像前面那样的查询：


    ```sql

    SELECT id, last_name surname, salary

    FROM employee;

    ```


    仔细看这个查询，它包含三列，`last_name`列有一个别名`surname`。然而，`surname`看起来可能像一个额外的列。仅通过查看这个查询，你如何知道`surname`是列别名，还是写查询的人忘了在`last_name`列后加逗号，而`surname`实际上是另一列？


    区分起来并不容易。在这个例子中，查询会运行，就像之前那样。然而，假设你有一个像这样的查询：


    ```sql

    SELECT id, last_name salary

    FROM employee;

    ```


    这看起来像是你想选择三列：`id`、`last_name`和`salary`。这在本书中我们已经见过很多次了。然而，当你运行查询时，你会看到这样的结果：


    ```sql

    ID   SALARY

    1    JONES

    2    SMITH

    3    KING

    4    SIMPSON

    5    ANDERSON

    6    COOPER

    7    (null)

    8    SMITH

    9    PATRICK

    ```


    为什么`last_name`列被命名为`salary`？或者为什么`salary`列显示的是看起来像名字的文本值？仔细看你的查询，你能发现问题所在：


    ```sql

    SELECT id, last_name salary

    FROM employee;

    ```


    在`last_name`列的结尾和`salary`列的开始之间缺少一个逗号。Oracle数据库不知道你的意图；它只知道被告知的内容，所以它看着`last_name`列并称其为“salary”。


    如果你为每一个使用的列别名都指定`AS`关键字，就能立即清楚地表明这应该是一个列别名，而不是一个缺少逗号的列。在SQL中，有时使用稍长的语句版本以使读者更清楚，比使用短版本节省时间但导致后续更多问题要好。


    > **注意：**

    > 在指定列别名时使用`AS`关键字，有助于你和其它开发人员知道后面的单词应该是一个列别名，而不是输入错误的查询。


    ## Mathematical Operations and Column Aliases


    SQL的另一个特性是能够对列执行*数学运算*。这包括加、减、乘、除这些基本操作。它们使用以下符号完成：


    *   `+` 表示加法

    *   `-` 表示减法

    *   `*` 表示乘法

    *   `/` 表示除法


    要执行其中一种操作，输入一个列或值，然后是其中一个符号，接着是另一个列或值。


    ### Addition


    例如，我们的`salary`列表示每位员工的年薪。要显示如果将其增加10000后的值，我们的查询将是：


    ```sql

    SELECT id, last_name, salary + 10000

    FROM employee;

    ```


    结果将是：


    ```sql

    ID   LAST_NAME   SALARY+10000

    1    JONES       30000

    2    SMITH       45000

    3    KING        50000

    4    SIMPSON     62000

    5    ANDERSON    41000

    6    COOPER      (null)

    7    (null)      (null)

    8    SMITH       72000

    9    PATRICK     50000

    ```


    显示的数值比原始的`salary`值多10000。你怎么确定呢？你怎么知道之前的`salary`值是多少？


    你可以把它加入查询中。没有规则说不能多次选择同一个列。要同时查看旧的`salary`值，你可以运行这个查询：


    ```sql

    SELECT id, last_name, salary, salary + 10000

    FROM employee;

    ```


    结果将是：


    ```sql

    ID   LAST_NAME  SALARY    SALARY+10000

    1    JONES      20000     30000

    2    SMITH      35000     45000

    3    KING       40000     50000

    4    SIMPSON    52000     62000

    5    ANDERSON   31000     41000

    6    COOPER     (null)    (null)

    7    (null)     (null)    (null)

    8    SMITH      62000     72000

    9    PATRICK    40000     50000

    ```


    你可以看到旧值和新值。所有`salary`值都增加了10000，除了那些`salary`为`NULL`的记录。这是因为`NULL`表示未知，而给一个未知值加上10000仍然是一个未知值。


    这与列别名有什么关系？如果你看结果，可以看到“`salary plus 10000`”这一列的列标题是“`SALARY+10000`”。默认情况下，Oracle会像这样标记你的列标题，通过合并任何运算符并删除空格。这对你或任何使用此值的应用程序来说都不太易读，所以我们可以给它一个列别名。


    假设你想将新列命名为`new_salary`。我们的查询将是：


    ```sql

    SELECT id, last_name, salary, salary + 10000 AS new_salary

    FROM employee;

    ```


    你的结果将如下所示：


    ```sql

    ID   LAST_NAME   SALARY    NEW_SALARY

    1    JONES       20000     30000

    2    SMITH       35000     45000

    3    KING        40000     50000

    4    SIMPSON     52000     62000

    5    ANDERSON    31000     41000

    6    COOPER      (null)    (null)

    7    (null)      (null)    (null)

    8    SMITH       62000     72000

    9    PATRICK     40000     50000

    ```


    这个列标题`NEW_SALARY`比`SALARY+10000`更容易阅读，也更容易被应用程序处理。


    ### Subtraction


    你可以在SQL代码中以与执行加法相同的方式执行减法。例如，从工资值中减去5000，你的查询如下所示：


    ```sql

    SELECT id, last_name, salary, salary - 5000

    FROM employee;

    ```


    这个查询的结果是：


    ```sql

    ID   LAST_NAME   SALARY   SALARY-5000

    1    JONES       20000    15000

    2    SMITH       35000    30000

