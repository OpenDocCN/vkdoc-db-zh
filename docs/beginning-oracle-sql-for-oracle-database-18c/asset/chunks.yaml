- fmt: '### Order by Multiple Columns


    In our examples, you’ve seen how to sort by a single column. What if you wanted
    to sort by two columns, or more? You can do that in SQL. To sort by more than
    one column, just add a comma, then the name or number of the column, then the
    direction to sort (either `ASC` or `DESC`).


    For example, to sort by the `last_name` column and then the `salary` column:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    ORDER BY last_name ASC, salary DESC;

    ```


    ```

    ID  LAST_NAME   SALARY

    5   ANDERSON    31000

    6   COOPER      (null)

    1   JONES       20000

    3   KING        40000

    9   PATRICK     40000

    4   SIMPSON     52000

    8   SMITH       62000

    2   SMITH       35000

    7   (null)      (null)

    ```


    The results are sorted by `last_name` in ascending order, and then `salary` in
    descending order. This means that the results are sorted by the `last_name` value,
    and if there are any rows that have the same `last_name`, they are then sorted
    by the `salary` in descending order.


    You’ve sorted by two columns in this query. You’ve also sorted by these columns
    in a different way: one ascending, and one descending. There are no rules to say
    they both have to be in the same order. You can use the same kind of syntax to
    sort by three columns:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    ORDER BY last_name ASC, salary ASC, id ASC;

    ```


    ```

    ID  LAST_NAME   SALARY

    5   ANDERSON    31000

    6   COOPER      (null)

    1   JONES       20000

    3   KING        40000

    9   PATRICK     40000

    4   SIMPSON     52000

    2   SMITH       35000

    8   SMITH       62000

    7   (null)      (null)

    ```


    The data will be ordered in the way you have specified. With such a small table,
    it can be hard to tell how the data is ordered, but with a larger table it will
    be clearer.


    You don’t have to order all of your columns in the same way. For example, you
    can order one column in ascending order and another column in descending order:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    ORDER BY last_name ASC, salary DESC;

    ```


    The results are:


    ```

    ID  LAST_NAME   SALARY

    5   ANDERSON    31000

    6   COOPER      (null)

    1   JONES       20000

    3   KING        40000

    9   PATRICK     40000

    4   SIMPSON     52000

    8   SMITH       62000

    2   SMITH       35000

    7   (null)      (null)

    ```


    You’ll notice the difference here on the rows where the `last_name` is `SMITH`.
    The values are still ordered by `last_name` in ascending order, but when the `last_name`
    is the same, the `salary` is sorted in descending order. The rows for `SMITH`
    are sorted so that the salary of 62000 comes above the salary of 35000.


    ## Do You Really Need to Order Your Data?


    You’ve seen how to order the results from a query. Doing so can make it easier
    to view the data and understand what’s in the table.


    However, it’s not always necessary to order the data. Using the `ORDER BY` clause
    can be quite an intensive process. It might not have much of an impact on a table
    of ten records, but when you’re working with hundreds or thousands of results,
    having an `ORDER BY` clause can slow a query down.


    If you really need to show your results in a particular order, then feel free
    to use the `ORDER BY` clause. Because you need what you need, and the database
    engine is there to do the work for you. However, if the order of the results does
    not matter to you or to the application, then don’t order them.


    Some examples of queries where you may want to order results are:


    *   All orders for a particular customer, sorted by the order date, so the customer
    can view the list

    *   All products in a category, sorted by the name, so they can be displayed on
    your website


    Some examples of queries where you may not want to order results are:


    *   A list of students enrolled in a class, as you may want to leave the ordering
    up to the users, or may not want to order them at all

    *   A unique list of status values that are going to be used in a drop-down box
    on a page.


    ## Summary


    The results of your query can be shown in a specific order using the `ORDER BY`
    clause. You can specify either the name of the column, or the position it appears
    in the `SELECT` clause. Results can be ordered by a column in either ascending
    or descending order. You can specify multiple columns to order the results by,
    and each of these can be ordered in ascending or descending order.


    # 12. Applying Table and Column Aliases


    In all of the chapters so far, you’ve learned how to view data from our database
    tables. You’ve learned how to choose the columns and rows you want to display
    using many different methods.


    In this final chapter of Part II, we’ll look at two techniques you can use to
    improve your SQL queries and make them easier to write and easier to understand
    the results of. The first of these techniques is called a `table alias`.


    ## What is a Table Alias?


    A `table alias` is an alternative name you can apply to your table as part of
    your SQL query. This alias applies only to your query, and no permanent changes
    are made to the database.


    Why would you want to use a table alias in your query?


    *   It can make it easier and faster to refer to columns in your query.

    *   It’s easier to work with queries involving two or more tables (which you will
    learn about later in this book).

    *   There are some types of queries that need to use table aliases, which you’ll
    learn about later in this book.


    What does a table alias look like? It’s a short word after your table name in
    the `FROM` clause:


    ```sql

    SELECT columns

    FROM table_name alias_name;

    ```


    The `alias_name` is a name you provide. You write the table name, then a space,
    then the `alias_name`. The `alias_name` can be as short or as long as you like.
    You can write a short alias, such as a single letter, or a long alias.


    Once you have done this, you can then use the alias as a prefix to any column
    you refer to in your query.


    Let’s take a look at an example of this.


    ## Example of a Table Alias


    We’ll start with our query on the `employee` table that we looked at in earlier
    chapters. This was our query:


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    You can add a table alias to this query by adding a space and then a name after
    the table name:


    ```sql

    SELECT id, last_name, salary

    FROM employee e;

    ```


    In this example, I’ve used an alias of `e`. This is helpful because:


    *   It’s easy to type, as it’s a single character.

    *   It’s shorter than the full table name of `employee`.

    *   It starts with the same letter, so when you read the query you can see that
    `e` is short for `employee`.


    With our table alias set, we can now update our `SELECT` clause to use this table
    alias. There are a few reasons to do this, which we’ve mentioned earlier in this
    chapter (faster to type, helpful for queries with multiple tables). One way that
    it’s faster is the use of a feature called “Intellisense” or “AutoComplete”.'
