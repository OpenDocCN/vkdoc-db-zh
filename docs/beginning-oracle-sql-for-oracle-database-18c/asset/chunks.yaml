- fmt: "## Searched Case Statement\n\nOracle 中的另一种 `CASE` 语句是“搜索式 `CASE` 语句” (`searched\
    \ case statement`)。搜索式 `CASE` 语句与简单 `CASE` 语句的区别在于指定表达式的位置。在简单 `CASE` 语句中，`expression`\
    \ 紧跟在 `CASE` 关键字之后。在搜索式 `CASE` 语句中，`expression` 位于每个 `WHEN` 子句中。\n\n搜索式 `CASE`\
    \ 语句允许使用更复杂的条件，例如多个条件、通配符检查、大于和小于检查以及对多个字段的检查。你可以看到以下示例，它使用了与之前简单 `CASE` 语句相同的逻辑，但采用了搜索式\
    \ `CASE` 语句的格式：\n\n```sql\nCASE\nWHEN last_name = 'JONES' THEN 'The name is Jones'\n\
    WHEN last_name = 'SMITH' THEN 'The name is Smith'\nWHEN last_name = 'KING'  THEN\
    \ 'The name is King'\nELSE 'The name is something else'\nEND namecheck\n```\n\n\
    这种方法需要多打一点字，但它更灵活。让我们将其加入 `SELECT` 查询中，并像之前一样加入 `UPPER` 函数。\n\n| LAST_NAME | NAMECHECK\
    \            |\n| --------- | -------------------- |\n| JONES     | The name is\
    \ Jones    |\n| SMITH     | The name is Smith    |\n| KING      | The name is\
    \ King     |\n| SIMPSON   | The name is something else |\n| ANDERSON  | The name\
    \ is something else |\n| COOPER    | The name is something else |\n| ADAMS   \
    \  | The name is something else |\n| SMITH     | The name is Smith    |\n| PATRICK\
    \   | The name is something else |\n| Jones     | The name is Jones    |\n\n```sql\n\
    SELECT\nlast_name,\nCASE\n  WHEN UPPER(last_name) = 'JONES' THEN 'The name is\
    \ Jones'\n  WHEN UPPER(last_name) = 'SMITH' THEN 'The name is Smith'\n  WHEN UPPER(last_name)\
    \ = 'KING'  THEN 'The name is King'\n  ELSE 'The name is something else'\nEND\
    \ namecheck\nFROM employee;\n```\n\n结果显示与之前的示例相同。`namecheck` 列根据我们编写的 `CASE` 语句显示简短描述。对于一个简单的检查，这种方法可能显得有点过于麻烦，因此在这种情况下，也许简单\
    \ `CASE` 语句更受青睐。然而，有些时候搜索式 `CASE` 语句更好。\n\n让我们看另一个例子。假设你被要求根据几位员工当前的薪资来确定他们是否有资格加薪。如果员工的薪水低于\
    \ 40000，则显示为“低薪”。如果他们的薪水在 40000 到 50000 之间，则显示为“中等薪资”，任何 50000 或更多的应显示为“高薪”。\n\
    \n你的查询将如下所示：\n\n```sql\nSELECT id,\n       last_name,\n       salary,\n      \
    \ CASE\n         WHEN salary < 40000                    THEN 'Low salary'\n  \
    \       WHEN salary >= 40000 AND salary < 50000 THEN 'Medium salary'\n       \
    \  WHEN salary >= 50000                   THEN 'High salary'\n       END salary_check\n\
    FROM employee;\n```\n\n我们这里没有添加 `ELSE`。它是一个可选子句。让我们看看运行此查询会发生什么。\n\n| ID  | LAST_NAME\
    \ | SALARY | SALARY_CHECK   |\n| --- | --------- | ------ | -------------- |\n\
    | 1   | JONES     | 30000  | Low salary     |\n| 2   | SMITH     | 35000  | Low\
    \ salary     |\n| 3   | KING      | 45000  | Medium Salary  |\n| 4   | SIMPSON\
    \   | 52000  | High salary    |\n| 5   | ANDERSON  | 31000  | Low salary     |\n\
    | 6   | COOPER    | (null) | (null)         |\n| 7   | ADAMS     | (null) | (null)\
    \         |\n| 8   | SMITH     | 62000  | High salary    |\n| 9   | PATRICK  \
    \ | 40000  | (null)         |\n| 10  | Jones     | 42000  | Medium salary  |\n\
    \n你可以看到，一些记录的值为“低薪”、“中等薪资”或“高薪”。其他记录显示为 `NULL`。这是因为他们没有满足 `CASE` 语句中提到的条件。\n\n\
    那么 `salary` 为 40000 的那条记录呢？为什么它没有显示一个值？这是因为你使用的条件是这样的：\n\n```sql\nCASE\n  WHEN\
    \ salary < 40000                    THEN 'Low salary'\n  WHEN salary > 40000 AND\
    \ salary < 50000 THEN 'Medium salary'\n  WHEN salary >= 50000                \
    \   THEN 'High salary'\nEND salary_check\n```\n\n第一个 `WHEN` 子句查找 `salary` 值小于\
    \ 40000。第二个 `WHEN` 子句查找 `salary` 值大于 40000。其中没有提到 `salary` 等于 40000。有两种方法可以解决此问题：\n\
    \n*   更改符号以包含“等于”\n*   更改 `WHEN` 子句使其重叠\n\n第一种解决方法是更改符号以包含“等于”。我们之前使用的描述是：“如果员工的薪水低于\
    \ 40000，则显示为低薪。如果他们的薪水在 40000 到 50000 之间，则显示为中等薪资。”这表明 `salary` 值为 40000 应标记为‘中等薪资’。你可以更改查询以加入“等于”：\n\
    \n```sql\nSELECT id,\n       last_name,\n       salary,\n       CASE\n       \
    \  WHEN salary < 40000                       THEN 'Low salary'\n         WHEN\
    \ salary >= 40000 AND salary <= 50000  THEN 'Medium salary'\n         WHEN salary\
    \ > 50000                       THEN 'High salary'\n       END salary_check\n\
    FROM employee;\n```\n\n| ID  | LAST_NAME | SALARY | SALARY_CHECK   |\n| --- |\
    \ --------- | ------ | -------------- |\n| 1   | JONES     | 30000  | Low salary\
    \     |\n| 2   | SMITH     | 35000  | Low salary     |\n| 3   | KING      | 45000\
    \  | Medium salary  |\n| 4   | SIMPSON   | 52000  | High salary    |\n| 5   |\
    \ ANDERSON  | 31000  | Low salary     |\n| 6   | COOPER    | (null) | (null) \
    \        |\n| 7   | ADAMS     | (null) | (null)         |\n| 8   | SMITH     |\
    \ 62000  | High salary    |\n| 9   | PATRICK   | 40000  | Medium salary  |\n|\
    \ 10  | Jones     | 42000  | Medium salary  |\n\n现在显示了正确的值。最后两个 `NULL` 值显示的原因是薪资值为\
    \ `NULL`。\n\n解决此问题的另一种方法是利用 Oracle 处理 `CASE` 语句的方式。Oracle 会找到第一个为 `TRUE` 的条件，并将其用于你的\
    \ `CASE` 语句。这意味着如果第一个和第二个 `WHEN` 子句都为真，则将使用第一个 `WHEN` 子句的结果。你可以更新查询以使用此方法：\n\n\
    ```sql\nSELECT id,\n       last_name,\n       salary,\n       CASE\n         WHEN\
    \ salary <= 40000              THEN 'Low salary'\n         WHEN salary <= 50000\
    \              THEN 'Medium salary'\n         ELSE 'High salary'\n       END salary_check\n\
    FROM employee;\n```\n\n| ID  | LAST_NAME | SALARY | SALARY_CHECK   |\n| --- |\
    \ --------- | ------ | -------------- |\n| 1   | JONES     | 30000  | Low salary\
    \     |\n| 2   | SMITH     | 35000  | Low salary     |\n| 3   | KING      | 45000\
    \  | Medium salary  |\n| 4   | SIMPSON   | 52000  | High salary    |\n| 5   |\
    \ ANDERSON  | 31000  | Low salary     |\n| 6   | COOPER    | (null) | (null) \
    \        |\n| 7   | ADAMS     | (null) | (null)         |\n| 8   | SMITH     |\
    \ 62000  | High salary    |\n| 9   | PATRICK   | 40000  | Medium salary  |\n|\
    \ 10  | Jones     | 42000  | Medium salary  |\n\n如你所见，显示的值与之前的示例相同。`CASE` 语句是一个非常强大的语句。\n\
    \n在 SQL 中处理条件逻辑还有另一种方法，那就是 `DECODE` 函数。"
  raw: '## Searched Case Statement


    The other type of `CASE` statement in Oracle is the *searched case statement*
    . The difference between the searched case statement and the simple case statement
    is where you specify the expression. In the simple case statement, the `expression`
    goes right after the `CASE` keyword. In the searched case statement, the `expression`
    goes in each `WHEN` clause.


    The searched case statement allows for more complex criteria to be used, such
    as multiple conditions, wildcard checks, greater than and less than checks, and
    checks on several fields. You can see an example of this using the same logic
    as the simple case statement you saw earlier, but in the format of a searched
    case statement:


    ```

    CASE

    WHEN last_name = ''JONES'' THEN ''The name is Jones''

    WHEN last_name = ''SMITH'' THEN ''The name is Smith''

    WHEN last_name = ''KING'' THEN ''The name is King''

    ELSE ''The name is something else''

    END namecheck

    ```


    This method involves a little more typing, but it’s more flexible. Let’s add this
    into a `SELECT` query and add in the `UPPER` function as you did earlier.


    | LAST_NAME | NAMECHECK |

    | --- | --- |

    | JONES | The name is Jones |

    | SMITH | The name is Smith |

    | KING | The name is King |

    | SIMPSON | The name is something else |

    | ANDERSON | The name is something else |

    | COOPER | The name is something else |

    | ADAMS | The name is something else |

    | SMITH | The name is Smith |

    | PATRICK | The name is something else |

    | Jones | The name is Jones |


    ```

    SELECT

    last_name,

    CASE

    WHEN UPPER(last_name) = ''JONES'' THEN ''The name is Jones''

    WHEN UPPER(last_name) = ''SMITH'' THEN ''The name is Smith''

    WHEN UPPER(last_name) = ''KING'' THEN ''The name is King''

    ELSE ''The name is something else''

    END namecheck

    FROM employee;

    ```


    The results show the same as the earlier example. The namecheck column shows a
    short description, based on how we wrote the `CASE` statement. This method might
    seem like a bit too much effort for a simple check, so in this situation, perhaps
    the simple case statement is preferred. However, there are times where a searched
    case statement is better.


    Let’s take a look at another example. Let’s say you’ve been asked to find out
    the eligibility of a pay raise for several employees based on their current salary.
    If an employee is paid less than 40000, then show it as a low salary. If they
    are paid between 40000 and 50000, then show it as a medium salary, and anything
    50000 or more should be shown as a high salary.


    Your query would look like this:


    ```

    SELECT id,

    last_name,

    salary,

    CASE

    WHEN salary  40000 AND salary  50000 THEN ''High salary''

    END salary_check

    FROM employee;

    ```


    We haven’t added in an `ELSE` here. It’s an optional clause. Let’s see what happens
    when you run this query.


    | ID | LAST_NAME | SALARY | SALARY_CHECK |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | Low salary |

    | 2 | SMITH | 35000 | Low salary |

    | 3 | KING | 45000 | Medium Salary |

    | 4 | SIMPSON | 52000 | High salary |

    | 5 | ANDERSON | 31000 | Low salary |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | High salary |

    | 9 | PATRICK | 40000 | (null) |

    | 10 | Jones | 42000 | Medium salary |


    You can see that some records have a value of either Low salary, Medium salary,
    or High salary. The other records are showing as `NULL`. This is because they
    didn’t meet the criteria mentioned in the `CASE` statement.


    What about the record that has a `salary` of 40000? Why didn’t it show a value?
    It’s because the criteria you used was this:


    ```

    CASE

    WHEN salary  40000 AND salary  50000 THEN ''High salary''

    END salary_check

    ```


    The first `WHEN` clause looks for `salary` values less than 40000\. The second
    `WHEN` clause looks for `salary` values greater than 40000\. There’s no mention
    of a `salary` being equal to 40000\. There are two ways to fix this:


    *   Change the signs to include “equal to”


    *   Change the WHEN clause to overlap


    The first way to solve it is to change the signs to include an equal to. The description
    we used earlier was: “If an employee is paid less than 40000, then show it as
    a low salary. If they are paid between 40000 and 50000, then show it as a medium
    salary.” This shows that the `salary` values of 40000 should be marked as ‘Medium
    salary’. You can change your query to put an “equal to”:


    | ID | LAST_NAME | SALARY | SALARY_CHECK |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | Low salary |

    | 2 | SMITH | 35000 | Low salary |

    | 3 | KING | 45000 | Medium salary |

    | 4 | SIMPSON | 52000 | High salary |

    | 5 | ANDERSON | 31000 | Low salary |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | High salary |

    | 9 | PATRICK | 40000 | Medium salary |

    | 10 | Jones | 42000 | Medium salary |


    ```

    SELECT id,

    last_name,

    salary,

    CASE

    WHEN salary = 40000 AND salary = 50000 THEN ''High salary''

    END salary_check

    FROM employee;

    ```


    The right values are now shown. The final two `NULL` values are displaying because
    the salary value is `NULL`.


    The other way of resolving this problem is taking advantage of the way that Oracle
    processes `CASE` statements. Oracle will find the first condition that is true,
    and use that for your `CASE` statement. This means if both the first and second
    `WHEN` clauses are true, then the first `WHEN` clause result will be used. You
    can update your query to use this:


    | ID | LAST_NAME | SALARY | SALARY_CHECK |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | Low salary |

    | 2 | SMITH | 35000 | Low salary |

    | 3 | KING | 45000 | Medium salary |

    | 4 | SIMPSON | 52000 | High salary |

    | 5 | ANDERSON | 31000 | Low salary |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | High salary |

    | 9 | PATRICK | 40000 | Medium salary |

    | 10 | Jones | 42000 | Medium salary |


    ```

    SELECT id,

    last_name,

    salary,

    CASE

    WHEN salary = 50000 THEN ''High salary''

    END salary_check

    FROM employee;

    ```


    The same values are shown as the earlier example. The `CASE` statement, as you
    can see, is quite a powerful statement


    There is another way to handle conditional logic in SQL, and that’s the `DECODE`
    function.'
