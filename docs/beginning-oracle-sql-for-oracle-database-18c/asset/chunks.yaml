  trans: '

    # 创建索引示例


    假设你想在 `employee` 表的 `last_name` 列上创建一个索引，以便任何查询该列的操作都能运行得更快。为此，你的语句会是这样的：


    ```

    CREATE INDEX idx_emp_lname

    ON employee (last_name);

    ```


    这是一个简短的语句，但有几点需要注意。首先，索引名称是 `idx_emp_lname`。你可以起任何喜欢的名称，只要符合 Oracle 的命名规则（例如，必须以字母开头，长度不能超过
    30 个字符）。为什么我要把这个索引命名为 `idx_emp_lname` 呢？


    如果你做过编程，可能了解某些编码标准或规范。这些并非编程语言强制执行的规则，而是团队或社区设定的标准。这些标准可能涉及空格、换行、字符和对象命名。你可能已经注意到我在本书的
    SQL 代码中已经使用了一些：


    *   SQL 关键字全部大写，例如 `SELECT` 和 `FROM`


    *   列名和表名使用小写，例如 `employee` 和 `salary`


    *   `SELECT` 语句中的每个关键字都另起一行。


    这个索引被命名为 `idx_emp_lname` 是因为这是我喜欢提倡的一个标准。它分为三个部分：


    *   `idx` 是索引（index）的缩写，表示此对象是一个索引。


    *   `emp` 是 `employee` 的缩写，表示该索引所应用的表。


    *   `lname` 是 `last_name` 的缩写，表示该索引所应用的列。


    为什么这个名字有帮助？因为它能让你通过名称快速判断它是什么。有两个地方你经常会看到索引或其他数据库对象的名称。第一个是错误消息，因为错误消息通常包含对象名称，能够看到一个错误与
    `idx_emp_lname` 相关，就能让你很好地了解其原因。第二个是使用一种称为执行计划的数据库功能，它包含了 Oracle 执行查询的计划步骤。当你看到名称
    `idx_emp_lname` 时，你就知道它是 `employee` 表上 `last_name` 列的索引，而无需去查证。


    让我们再看一下那个语句：


    ```

    CREATE INDEX idx_emp_lname

    ON employee (last_name);

    ```


    索引名为 `idx_emp_lname`。然后是 `ON` 关键字，接着指定 `employee` 表。在括号内，是 `last_name` 列。这意味着将在数据库中创建一个索引，该索引包含所有不同的
    `last_name` 值及其在 `employee` 表中存储位置的信息。这意味着当你在这个表上运行某些查询时，它们会运行得更快，因为数据库知道这些 `last_name`
    值存储在哪里。


    使用与运行 `SELECT` 查询相同的过程在数据库上执行该语句。如果你使用的是 SQL Developer 或 Live SQL（基于 Web 的 SQL
    工具），这都适用。输出应显示：


    ```

    Index IDX_EMP_LNAME created.

    ```


    与表不同，你不能在索引上运行查询。你不能运行像 `SELECT * FROM idx_emp_lname` 这样的查询。这是因为索引将其所有信息在数据库后台存储。你需要做的只是创建它。


    现在，让我们看一些使用索引的例子。还记得之前在书后索引中查找值的例子吗？Oracle 中的索引工作方式相同。但是，你需要编写一个实际在表中查找值的查询，才能使用索引。最简单的方法之一是使用
    `WHERE` 子句。假设你有如下查询：


    ```

    SELECT id,

    last_name,

    salary

    FROM employee;

    ```


    这个查询会显示所有 `employees` 的 `last_name`，但它不会使用索引。如果我们用之前的教科书例子来比喻，这就等同于“给我看这本书的每一页”。如果你想显示所有内容，使用书后的索引就没有帮助。


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | ADAMS | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |

    | 10 | Jones | 42000 |


    假设你想查找一个名为 `COOPER` 的特定 `employee`。你的查询会是这样的：


    ```

    SELECT id,

    last_name,

    salary

    FROM employee

    WHERE last_name = ''COOPER'';

    ```


    在创建索引之前，Oracle 必须：


    1.  查看表中的每一行

    2.  检查该行是否匹配 `last_name` 为 `COOPER`

    3.  如果匹配，则将该行显示给你


    对于十行数据来说，这看起来工作量不大，但一旦数据量增加到成千上万甚至数十万行，就会产生巨大的差异。


    现在，你在这个表和这个列上有了索引，Oracle 将会：


    1.  在索引中查找 `COOPER` 的条目，该条目显示了具有该值的行

    2.  将这些行显示给你


    在更大的表中，这将快得多。


    如果你现在运行查询，你会得到这个结果：


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 6 | COOPER | (null) |


    索引不会改变显示的内容。它只是改变了显示的速度。


    ## 为什么性能很重要？


    SQL 查询的性能很重要，因为快速的查询比慢速查询能提供更好的用户体验。有几种情况可能适用这一点。


    ### Web 应用程序


    一个例子是你正在开发一个供人们使用的应用程序。该应用程序会访问数据库来添加新数据、更新现有数据和查看现有数据。通常，当用户加载一个页面时，会在数据库上运行一个查询来向用户显示数据。在查询运行期间，用户必须等待，或者看着空白屏幕，或者看着加载屏幕，直到数据显示出来。如果数据能立即或在几秒钟内显示，对用户来说可能是一次良好的体验。这是他们期望的事情。然而，如果由于一个需要运行这么长时间的
    `SELECT` 查询，导致页面 20 到 30 秒或更长时间无法显示，用户会不高兴。


    在大多数情况下，他们期望在显示数据的应用程序中能有更快的加载时间。一个在几秒钟内显示数据的查询可能与一个需要运行 30 秒的查询只有细微差别，但对用户来说，其性能和体验却有天壤之别。

    '
- fmt: '### Overnight Batch Jobs


    Another example of where the performance of a query is important is overnight
    batch jobs. In many organizations, there are applications that users operate that
    store data. These users also have a need to run reports on this data, to find
    out how many sales they made per month or how many customers have signed up. The
    reporting of this data is often done in a separate system to where it is captured,
    because the reporting could impact the performance of the live application.


    In order for the reporting and the live application to work efficiently, the data
    from the application is transferred to a reporting system. This reporting system
    is optimized for viewing data, using a process called extract, transform, load
    (`ETL`). This process has a lot of different SQL queries in it, such as populating
    tables to show the total sales amounts per day and per month.


    This process, and these queries, are often performed overnight so that the users
    of the application are unaffected and the reporting system is ready for the next
    day. There’s roughly a 12-hour window for these steps to run. Seems like a long
    time, right? Well, these queries can be very complicated and can take quite a
    long time to run. The goal is for these queries to be completed sometime in the
    middle of the night, so the data is ready for the next day. However, if the queries
    do not perform well, then they could still be running at 9 in the morning, meaning
    the reporting system is not ready for use and the server that it’s running on
    is still under load.


    It’s common for these kinds of queries to take 20 minutes or more for a particular
    step in the process. If the query takes 3 hours instead of 20 minutes, that can
    cause the rest of the process to be delayed. The performance of the SQL queries
    in this case is important.


    ### Reporting System


    The last example where query performance is important is in a reporting system.
    As mentioned earlier, the system that does the reporting is usually different
    to the system that captures the data. The reporting system will be used by people
    all across the company to see different information based on the data captured
    in different systems.


    Every time a report is generated, a query is run to `SELECT` the data from the
    database. These reports may take a little time to generate. If the report generates
    in 30 seconds for example, then the users may be satisfied with that. However,
    if the report starts taking several minutes to generate, then the users will be
    frustrated and have a poor experience with the system.


    So those are a few examples of how the performance and running time of a query
    can impact the user experience.


    ## Index Using a Join


    A common situation where an index is useful is on columns that are used as part
    of joins. Take a look at this query for example:


    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    This query will show the following results.


    | ID | LAST_NAME | SALARY | ADDRESS |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 123 Smith Street |

    | 2 | SMITH | 35000 | 45 Main Street |

    | 3 | KING | 45000 | 45 Main Street |

    | 4 | SIMPSON | 52000 | 123 Smith Street |

    | 6 | COOPER | (null) | 123 Smith Street |

    | 7 | ADAMS | (null) | 10 Collins Road |

    | 8 | SMITH | 62000 | 10 Collins Road |

    | 9 | PATRICK | 40000 | 123 Smith Street |

    | 10 | Jones | 42000 | 45 Main Street |


    This query gets data from two tables (the `employee` and `office` tables) and
    joins them on the `office`''s `id` value. When the Oracle database processes this
    query, it will do something like this:


    1.  Look up all data in the `employee` table

    2.  Look at each `employee`''s `office_id` value

    3.  Using that `office_id` value, look at all values in the `office` table for
    the matching `id` value

    4.  Get the `address` from the matching row and use that for the `employee`

    5.  Repeat steps 2-4 for each `employee` record


    In the preceding list, step 3 is where the link between the two tables is used.
    Without an index, each row in the `office` table is scanned for the `office_id`
    for that `employee`. For example, the `employee` with an `id` of 1 (`JONES`) has
    an `office_id` of 1. The database will then look through the `office` table for
    the row with an `id` of 1 and use the `address` from that row. This is repeated
    for the `employee` with an `id` of 2 (`SMITH`), and so on.


    This may be OK when there are three rows in the `office` table. But when there
    are hundreds or thousands, it can really impact the performance.


    ### Creating an Index


    The query in the example we just saw was using a join between the primary key
    from the `office` table and a foreign key from the `employee` table:


    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    The primary key on the `office` table is `id`, and the foreign key on the `employee`
    table is `office_id`. In an Oracle database, whenever you define a primary key
    on a table, an index is automatically created on that column. An index will exist
    on the `office.id` column. However, an index is not automatically created when
    a foreign key is created.


    Creating an index on a foreign key column is a great way to improve the performance
    of a query. A foreign key column (such as the `employee.office_id`) is often used
    to look up values in another table.


    ### Note


    In Oracle, an index is automatically created on a primary key. An index is `not`
    automatically created on a foreign key.


    To create an index on the `employee.office_id` column, you can run this statement:


    ```sql

    CREATE INDEX idx_emp_officeid

    ON employee (office_id);

    ```


    Once again, I’ve used a naming convention with the name of the index. It’s called
    `idx_emp_officeid`, which means it is an index on the `employee` table on the
    `office_id` column. Once you run this statement, an index is created on the database.


    ```text

    Index IDX_EMP_OFFICEID created.

    ```


    Now the index is created, the way the Oracle database runs the query will mean
    the index can be used and the query will run faster.


    ## The Disadvantages of Indexes


    Creating indexes is a good way to improve the performance of a query. However,
    they’re not a “silver bullet” to good-performing SQL. They’re not a single magical
    solution. There are some disadvantages.


    First, each index requires some space on the database. Depending on the number
    of records in the related table, this could be a large amount of space. The more
    indexes you create, the more space is taken up. You might have a maximum size
    for your database, set by your IT department, so this may be something to be conscious
    of.


    Another disadvantage is keeping the index updated. Indexes on a table improve
    the performance of `SELECT` queries, but they reduce the performance of `INSERT`,
    `UPDATE`, and `DELETE` queries. This is because each time an `INSERT`, `UPDATE`,
    or `DELETE` query is run, the index needs to be updated along with the table.
    This can slow down the query. If there are multiple indexes on a table (which
    is possible), then these `INSERT`/`UPDATE`/`DELETE` queries can take much longer.
    This might not seem like much for a simple query, but with more complicated queries,
    the run time can easily expand.


    So, there is a tradeoff between creating too many indexes and not enough indexes.
    How do you know what indexes to create?'
