  trans: '

    ## 查找重复记录


    你在本章将学习的最后一个示例是如何查找重复记录。在你的数据表中，很容易存储与现有记录相同的数据。你可以使用数据库和应用程序代码中的功能来防止这种情况；然而，这些功能并不总是被使用。


    让我们再看一下 `employee` 表：


    ```

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee;

    ```


    结果是：


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 1 |

    | 2 | SMITH | 35000 | 2 |

    | 3 | KING | 45000 | 2 |

    | 4 | SIMPSON | 52000 | 1 |

    | 5 | ANDERSON | 31000 | (null) |

    | 6 | COOPER | (null) | 1 |

    | 7 | ADAMS | (null) | 3 |

    | 8 | SMITH | 62000 | 3 |

    | 9 | PATRICK | 40000 | 1 |

    | 10 | Jones | 42000 | 2 |


    你可以看到有十名员工。一些 `last_name` 的值是相同的，即使 `salary` 不同。如果你想在这个表中查找重复记录，你可能想从重复出现的 `last_name`
    值开始。仅仅因为记录有相同的 `last_name` 并不意味着它们是重复的，但这是一个很好的起点。你也可能只想知道哪些 `last_name` 值被使用了不止一次。


    你想编写的查询将向你显示 `last_name` 以及每个 `last_name` 的员工数量，条件是该姓氏对应有多于一名员工。这个查询看起来像这样：


    ```

    SELECT UPPER(last_name),

    COUNT(*) AS empcount

    FROM employee

    GROUP BY UPPER(last_name)

    HAVING COUNT(*) > 1

    ORDER BY empcount DESC;

    ```


    这个查询中包含几个部分。我们选择了 `last_name` 的大写版本和每个 `last_name` 的 `COUNT` 数，并给 `COUNT` 列起了一个别名
    "empcount"。我们按 `last_name` 列进行分组，并使用 `HAVING` 子句来排除员工数小于或等于 1 的 `last_name` 记录。最后，我们按
    `empcount` 列排序。


    为什么我们在 `HAVING` 子句中使用 `COUNT(*)` 函数，却在 `ORDER BY` 中使用 `empcount` 别名？这是由于查询在 Oracle
    中的处理方式决定的，这意味着 `ORDER BY` 子句可以引用列别名，但 `GROUP BY` 和 `HAVING` 不可以。使用 `ORDER BY COUNT(*)
    DESC` 也可以达到相同的结果，但在本例中，我使用了列别名。


    让我们看看结果：


    | LAST_NAME | EMPCOUNT |

    | --- | --- |

    | JONES | 2 |

    | SMITH | 2 |


    结果显示 JONES 和 SMITH 各有 2 名员工。JONES 的 `last_name` 显示为 2，是因为我们将 `last_name` 转换为了大写，因此它包含了
    "Jones" 这条记录。所有其他 `last_name` 值未显示在此处，因为它们只对应一名员工。


    因此，通过组合使用聚合函数、分组和排序，你可以找出哪些记录可能是重复的，并可以进一步调查你的数据。


    ## 总结


    对数据进行分组意味着对特定列中每个不同的值执行聚合函数。如果你在查询中同时使用了聚合函数和非聚合函数列，你需要按所有非聚合列进行分组，以避免错误。你可以使用
    `WHERE` 子句在分组前过滤记录。你也可以使用 `HAVING` 子句在分组操作应用后对记录进行过滤，这是基于所使用的聚合函数进行的。


    结合使用 `GROUP BY` 和 `HAVING` 可以让你轻松获得所需的结果。


    # 26. 什么是索引？


    索引是 SQL 中一个值得了解的功能。它们对于提升查询性能非常有用，并且随着你在 SQL 方面经验的增长，你需要了解如何创建它们以及为什么需要它们。


    ## 什么是索引？


    一个 `索引` 是数据库中的一个对象，它可以提升性能，或减少你的 SQL 查询的运行时间。我喜欢把它想象成教科书后面的索引。


    你是否曾经为了查找某个特定主题而翻阅教科书？例如，你正在看一本关于人类文明史的教科书，想了解更多关于尤利乌斯·凯撒的信息。你知道这是罗马时代的一部分，所以你可能会猜它在书中间的某个位置。你会翻到书中间的某处，浏览页面寻找关于尤利乌斯·凯撒的内容。或者，你可以从第一页开始，逐页查找关于尤利乌斯·凯撒的信息，直到找到当前年份。


    这两种方法都会花费不少时间，而且效率不高。当你从头到尾阅读每一页直到找到所需信息时，这正是 Oracle 在你的表中查找数据的方式。当你查找 `last_name`
    是 SIMPSON 的 `employee` 记录时，Oracle 会查看每一行来找到你需要的记录。如果表很大，这也可能需要一些时间。


    有一个更好的方法。教科书通常在书的末尾有一个索引。这个索引会列出书中所有的关键主题以及它们被引用的页码。要找到关于尤利乌斯·凯撒的信息，你只需在索引中查找，它就会显示书中提到他的所有页码：


    *尤利乌斯·凯撒... 第 43, 210, 548-570 页*


    然后你可以翻到那些页面找到你需要的信息。


    Oracle 中的 `索引` 工作原理相同。你可以创建一个 `索引`，它包含如何在表中找到记录的信息。当你运行一个使用该信息查找数据的 SQL 语句时，Oracle
    将使用 `索引` 来找到你需要的记录。这通常比在没有 `索引` 的情况下遍历整个表要快得多。


    那么，为什么你需要了解索引呢？了解索引是很有好处的，因为它们能极大地影响查询的性能。在“现实世界”的数据库中，表上存在索引也是非常普遍的。了解它们是什么、有什么作用以及如何创建它们，是你职业生涯中一项有用的技能。


    ## 如何创建索引


    一个 `索引` 是数据库中的一个对象，就像 `表` 一样。要创建 `索引`，我们使用 `CREATE` 语句。这个语句的语法是：


    ```

    CREATE INDEX index_name

    ON table_name (columns);

    ```


    你以 `CREATE INDEX` 开始。然后你需要为 `索引` 提供一个名称。`索引` 名在数据库中必须是唯一的。接下来是关键字 `ON`，然后是 `表名`，后面跟着你想要在其上创建索引的列（或多列）。


    一个 `索引` 是创建在单个 `表` 和一个或多个列上的。`索引` 将存储你指定的列的信息，使数据库更容易基于这些列查找记录。让我们看一些例子。

    '
- fmt: '# Example of Creating an Index


    Let’s say you wanted to create an index on the `last_name` column in the `employee`
    table, so that any queries that looked up the `last_name` column would run faster.
    To do this, your statement would look like this:


    ```

    CREATE INDEX idx_emp_lname

    ON employee (last_name);

    ```


    It’s a short statement but there are a few things to notice. First, the index
    name is `idx_emp_lname`. You can make up almost any name you like, as long as
    it’s within Oracle’s naming rules (must start with a letter, can’t be more than
    30 characters long, for example). Why have I called this index `idx_emp_lname`?


    If you’ve done any programming before, then you may be aware of certain coding
    standards or guidelines. These aren’t rules enforced by the programming language,
    but are standards set by the team or the community. These standards can relate
    to spacing, line breaks, characters, and object naming. You might have noticed
    I’ve used a few already in the SQL code in this book:


    *   SQL keywords all in upper case, such as `SELECT` and `FROM`


    *   Column and table names in lower case, such as `employee` and `salary`


    *   Each of the keywords in a `SELECT` statement is on a new line.


    The reason the index is named `idx_emp_lname` is because it’s a standard that
    I like to encourage. It’s broken down into three parts:


    *   The `idx` is short for index, which means this object is an index.


    *   The `emp` is short for `employee`, which is the table that the index applies
    to


    *   The `lname` is short for `last_name`, which is the column that the index applies
    to.


    Why is this name helpful? It’s so you can quickly tell what it is by looking at
    the name. There are two places that you’ll often see the name of an index or other
    objects in the database. The first is error messages, as error messages often
    include the names of objects, and being able to see that an error is related to
    `idx_emp_lname` gives you a good idea what it’s about. The second is using a database
    feature called an execution plan, which includes the planned steps that Oracle
    will take to execute a query. When you see the name `idx_emp_lname`, you know
    it’s an index on the `employee` table on the `last_name` column, without having
    to look it up.


    Let’s look at that statement again:


    ```

    CREATE INDEX idx_emp_lname

    ON employee (last_name);

    ```


    The index is called `idx_emp_lname`. Then we have the word `ON`, and then specify
    the `employee` table. Inside brackets, we have the `last_name` column. This means
    an index will be created on the database, which contains all of the different
    `last_name` values and information about where they are stored in the `employee`
    table. This means that when you run certain queries on this table, they will run
    faster, as the database knows where these `last_name` values are stored.


    Run the query on the database using the same process as running a `SELECT` query.
    This will work in either SQL Developer or Live SQL (the web-based SQL tool) if
    you’re using that. The output should show:


    ```

    Index IDX_EMP_LNAME created.

    ```


    Unlike a table, you can’t run queries on an index. You can’t run a query like
    `SELECT * FROM idx_emp_lname`. This is because the index stores all of its information
    behind the scenes in the database. All you need to do is create it.


    Now, let’s see some examples of using the index. Remember the earlier example
    of looking up a value in an index in the back of a book? The index in Oracle works
    the same way. However, you need to write a query that will actually look up the
    value in the table for the index to be used. One of the easiest ways to do this
    is to use the `WHERE` clause. Let’s say you had this query:


    ```

    SELECT id,

    last_name,

    salary

    FROM employee;

    ```


    This query will display the `last_name` for all `employees`, but it won’t use
    the index. It’s the equivalent of “show me every page in the book” if we use that
    textbook example from earlier. Using an index in the back of the book won’t help
    if you want to show everything.


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | ADAMS | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |

    | 10 | Jones | 42000 |


    Let’s say you wanted to find a specific `employee` called `COOPER`. Your query
    would look like this:


    ```

    SELECT id,

    last_name,

    salary

    FROM employee

    WHERE last_name = ''COOPER'';

    ```


    Before you created the index, Oracle would have to:


    1.  Look at every row in the table


    2.  Check if the row matched the `last_name` of `COOPER`


    3.  If it did, show the row to you


    This might not seem like a lot of work for ten rows, but once you start getting
    into the thousands and hundreds of thousands of rows, then this makes a big difference.


    Now that you have an index on this table and on this column, Oracle will:


    1.  Look up the entry for `COOPER` in the index, which shows the rows that have
    that value


    2.  Show those rows to you


    This will be much faster in larger tables.


    If you run the query now, you’ll get this result:


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 6 | COOPER | (null) |


    The index doesn’t change what is shown. It just changes how fast it is shown.


    ## Why Is Performance Important?


    Performance of an SQL query is important because a fast query gives a much better
    user experience than slower queries. There are a few situations where this may
    apply.


    ### Web Application


    One example is when you are developing an application for people to use. This
    application would access a database to add new data, update existing data, and
    view existing data. Usually when a user loads a page, a query is run on the database
    to display data to the user. While the query is running, the user has to wait,
    either looking at a blank screen or a loading screen, for the data to be displayed.
    If this data is displayed instantly or in a few seconds, it’s likely going to
    be a good experience for the user. It’s something they would expect. However,
    if the page doesn’t display for 20 to 30 seconds or longer because of a `SELECT`
    query that takes this long to run, the users are not going to be happy.


    In most situations, they would expect a faster load time in an application that
    displays data. A query that displays data in a couple of seconds could only be
    slightly different to one that takes 30 seconds to run, but it’s a big difference
    in performance and experience for the user.'
  raw: '## Example of Creating an Index


    Let’s say you wanted to create an index on the `last_name` column in the `employee`
    table, so that any queries that looked up the `last_name` column would run faster.
    To do this, your statement would look like this:


    ```

    CREATE INDEX idx_emp_lname

    ON employee (last_name);

    ```


    It’s a short statement but there are a few things to notice. First, the index
    name is `idx_emp_lname`. You can make up almost any name you like, as long as
    it’s within Oracle’s naming rules (must start with a letter, can’t be more than
    30 characters long, for example). Why have I called this index `idx_emp_lname`?


    If you’ve done any programming before, then you may be aware of certain coding
    standards or guidelines. These aren’t rules enforced by the programming language,
    but are standards set by the team or the community. These standards can relate
    to spacing, line breaks, characters, and object naming. You might have noticed
    I’ve used a few already in the SQL code in this book:


    *   SQL keywords all in upper case, such as SELECT and FROM


    *   Column and table names in lower case, such as employee and salary


    *   Each of the keywords in a SELECT statement is on a new line.


    The reason the index is named `idx_emp_lname` is because it’s a standard that
    I like to encourage. It’s broken down into three parts:


    *   The idx is short for index, which means this object is an index.


    *   The emp is short for employee, which is the table that the index applies to


    *   The lname is short for last_name, which is the column that the index applies
    to.


    Why is this name helpful? It’s so you can quickly tell what it is by looking at
    the name. There are two places that you’ll often see the name of an index or other
    objects in the database. The first is error messages, as error messages often
    include the names of objects, and being able to see that an error is related to
    `idx_emp_lname` gives you a good idea what it’s about. The second is using a database
    feature called an *execution plan*, which includes the planned steps that Oracle
    will take to execute a query. When you see the name `idx_emp_lname`, you know
    it’s an index on the `employee` table on the `last_name` column, without having
    to look it up.


    Let’s look at that statement again:


    ```

    CREATE INDEX idx_emp_lname

    ON employee (last_name);

    ```


    The index is called `idx_emp_lname`. Then we have the word `ON`, and then specify
    the `employee` table. Inside brackets, we have the `last_name` column. This means
    an index will be created on the database, which contains all of the different
    `last_name` values and information about where they are stored in the `employee`
    table. This means that when you run certain queries on this table, they will run
    faster, as the database knows where these `last_name` values are stored.


    Run the query on the database using the same process as running a `SELECT` query
    . This will work in either SQL Developer or Live SQL (the web-based SQL tool)
    if you’re using that. The output should show:


    ```

    Index IDX_EMP_LNAME created.

    ```


    Unlike a table, you can’t run queries on an index. You can’t run a query like
    `SELECT * FROM idx_emp_lname`. This is because the index stores all of its information
    behind the scenes in the database. All you need to do is create it.


    Now, let’s see some examples of using the index. Remember the earlier example
    of looking up a value in an index in the back of a book? The index in Oracle works
    the same way. However, you need to write a query that will actually look up the
    value in the table for the index to be used. One of the easiest ways to do this
    is to use the `WHERE` clause . Let’s say you had this query:


    ```

    SELECT id,

    last_name,

    salary

    FROM employee;

    ```


    This query will display the `last_name` for all `employees`, but it won’t use
    the index. It’s the equivalent of “show me every page in the book” if we use that
    textbook example from earlier. Using an index in the back of the book won’t help
    if you want to show everything.


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | ADAMS | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |

    | 10 | Jones | 42000 |


    Let’s say you wanted to find a specific `employee` called COOPER. Your query would
    look like this:


    ```

    SELECT id,

    last_name,

    salary

    FROM employee

    WHERE last_name = ''COOPER'';

    ```


    Before you created the index, Oracle would have to:


    1.  Look at every row in the table


    2.  Check if the row matched the last_name of COOPER


    3.  If it did, show the row to you


    This might not seem like a lot of work for ten rows, but once you start getting
    into the thousands and hundreds of thousands of rows, then this makes a big difference.


    Now that you have an index on this table and on this column, Oracle will:


    1.  Look up the entry for COOPER in the index, which shows the rows that have
    that value


    2.  Show those rows to you


    This will be much faster in larger tables.


    If you run the query now, you’ll get this result:


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 6 | COOPER | (null) |


    The index doesn’t change what is shown. It just changes how fast it is shown.


    ## Why Is Performance Important?


    Performance of an SQL query is important because a fast query gives a much better
    user experience than slower queries. There are a few situations where this may
    apply.


    ### Web Application


    One example is when you are developing an application for people to use. This
    application would access a database to add new data, update existing data, and
    view existing data. Usually when a user loads a page, a query is run on the database
    to display data to the user. While the query is running, the user has to wait,
    either looking at a blank screen or a loading screen, for the data to be displayed.
    If this data is displayed instantly or in a few seconds, it’s likely going to
    be a good experience for the user. It’s something they would expect. However,
    if the page doesn’t display for 20 to 30 seconds or longer because of a `SELECT`
    query that takes this long to run, the users are not going to be happy.


    In most situations, they would expect a faster load time in an application that
    displays data. A query that displays data in a couple of seconds could only be
