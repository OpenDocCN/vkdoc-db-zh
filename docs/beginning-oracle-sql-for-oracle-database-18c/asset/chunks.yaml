- fmt: '## SELECT Columns or SELECT *?


    If you want to show all columns in a table, you can do this in two ways:


    *   Use `SELECT *`


    *   Use `SELECT` and then specify each column individually


    Which method is better? Which one should you use? I recommend specifying each
    of the columns individually. This means your query should look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    Rather than look like this:


    ```sql

    SELECT *

    FROM employee;

    ```


    Why would I recommend this? You might be wondering why I don’t recommend `SELECT
    *` if it’s easier to type and does the same thing. There are a few reasons.


    First, it’s a good idea to only show the columns you are interested in working
    with or seeing. Showing all columns in a table just because you can, or just because
    it’s easier to type, is not a good habit. It only takes a few seconds to type
    our column names individually (which can be fast if you use a program like `SQL
    Developer`). Showing all columns can make a query run slower, and also make any
    applications run slower that use this query because there is more data to process.


    Second, if the names of the columns change, or columns are added, using `SELECT
    *` can impact the query and the results. Using the columns specifically will mean
    this issue is reduced.


    So, try to specify the columns individually rather than use `SELECT *`.


    ## Summary


    You can use SQL to select individual columns from a table. You can select one
    column, multiple columns, or every column in the table. Specifying the individual
    columns is recommended rather than using `SELECT *` because it’s easier to maintain
    and reduces the load by the application and database.


    ## 5. Restricting the Results


    We have just learned how to display certain columns from a table. In this chapter,
    we’ll look at how to display certain rows from a table.


    ### Why Restrict Data?


    In our earlier examples, we looked at all columns in a table and one or two columns
    from a table. One of the queries looked like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    This query will show the `id`, `last_name`, and `salary` columns for all employees
    in the table. What if you didn’t want to see all employees in the table? In our
    example table, there are five records. But what if the table had one hundred,
    or one thousand records? In real databases that you might encounter in the workplace,
    a table with over a million records is not uncommon.


    So why would you want to only show some records? Essentially, if you have a requirement
    to only show records that meet certain criteria, then you only need to find those
    records in the database.


    Some examples could be:


    *   Find all information for a particular employee.


    *   Find all orders places for a customer.


    *   Find all student enrollments during a particular year.


    You might be thinking, “Can’t we just get all records in the table and let the
    application find what it needs?” We could do that, but it would be very slow.
    Finding all of the data in a table, sending it from the database to the application,
    for the application to discard the records it does not need would take a lot of
    time and memory. It also has an impact on network traffic, because sending all
    data to the application typically results in a lot of network traffic and is a
    lot slower than the database examining the rows before sending them back.


    It’s a much better use of the database and time to only find the data that we
    want. Luckily, we can do that easily in SQL with the `WHERE` clause.


    ### What is the WHERE Clause?


    The `WHERE` clause is a clause that lets you filter the data from your query to
    only show you what meets the criteria you specify. A clause, as we mentioned in
    an earlier chapter, is a combination of an SQL keyword and everything related
    that comes after it.


    The `WHERE` clause looks like this:


    ```sql

    WHERE criteria

    ```


    The clause seems simple, but it’s quite powerful. You put the `WHERE` clause into
    a `SELECT` query immediately after the `FROM` clause. For example:


    ```sql

    SELECT columns

    FROM table

    WHERE criteria;

    ```


    The semicolon is moved to the very end of the statement, after the `WHERE` clause.


    ### Example with a Text Value


    Let’s take a look at some examples. We’ll begin with some text values. Here is
    the query we ran last chapter, which shows all of the records in the employee
    table.


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    Our results look like these:


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    Let’s say you wanted to find all of the columns, or fields, for employees with
    a `last_name` of `SMITH`.


    You can write your query like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''SMITH'';

    ```


    There are a few new components to this query:


    *   First, you add in the `WHERE` keyword.


    *   Then, you specify the `last_name` column. This is because you want to check
    the value of the `last_name` column against another value.


    *   You then add an equals sign "`=`".


    *   Finally, you add the term `''SMITH''`. This is because you want to see all
    records with a `last_name` of `SMITH`.


    `SMITH` is inside single quotes because this is a specific value you want to look
    for. The value of `SMITH` is called a “string,” which is the word in software
    development for a text value. The value of `SMITH` is inside single quotes because
    you want the database to know you want that treated as a text value and not as
    a column name. If you did not have the single quotes, your query would look like
    this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = SMITH;

    ```


    Then, the Oracle database would be looking for a column called `SMITH`, and an
    error would be shown because the column does not exist. So, any time you’re looking
    for a text value, ensure it is inside single quotes:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''SMITH'';

    ```


    How does this query work? The Oracle database will run this query, and for each
    row in the employee table, it will check if the `last_name` of that row is equal
    to `''SMITH''`. If it is, then the row is included in the results displayed to
    you. If not, then it is not displayed. If you run this query, your output would
    be:


    `ID LAST_NAME SALARY`

    `2  SMITH 35000`


    Only one record is shown, because only one record has a `last_name` value of `SMITH`.
    When you use the `WHERE` clause with text values, the **values are case sensitive**.
    Earlier in this book we mentioned that SQL is not a case-sensitive language, which
    means `SELECT` and `select` both perform the same thing.


    However, when working with text values, such as `''SMITH''`, this check is case
    sensitive. This means that looking for `''Smith''` will not show the same results
    as looking for `''SMITH''`.


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''Smith'';

    ```


    ```sql

    No results found.

    ```


    This is because the value in the table is equal to `''SMITH''`, which is different
    to `''Smith''`.


    ### Note


    Text values (those inside single quotes) are case sensitive in SQL. So, `''SMITH''`
    is not equal to `''Smith''`.


    Notice the spaces surrounding the equals sign. They are not required, but without
    them the query is more difficult to read. For example:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name="Smith";

    ```


    This query will execute, but I recommend the spaces around operators like the
    equal sign for reasons of readability. Good use of white space makes the query
    easier to read for the next programmer who needs to maintain it.'
