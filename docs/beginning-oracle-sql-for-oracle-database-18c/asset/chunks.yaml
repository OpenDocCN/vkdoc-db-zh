  trans: "## 需注意的几点\n\n你可能会对 `SELECT` 语句语法中的几处细节感到疑惑，例如大小写和换行。我将部分语法写成了大写字母，部分写成了小写字母：\n\
    \n```\nSELECT your_columns\nFROM your_table;\n```\n\n为什么这样呢？基本上，这是关于格式化的问题。当你编写\
    \ SQL 时，坚持使用一致的格式有助于他人阅读，也更易于维护。\n\n我倾向于将 SQL 关键字（如 `SELECT` 和 `FROM`）大写。这样无论你是在\
    \ SQL Developer、其他集成开发环境（IDE）、应用程序代码还是脚本中阅读它们，关键字都会很醒目。\n\n其他人则偏好将 SQL 关键字小写，例如\
    \ `select` 和 `from`。这取决于个人喜好，网上也不乏文章详细说明为何以及如何将 SQL 写成大写或小写。\n\n幸运的是，SQL 并非大小写敏感的语言。对于\
    \ Oracle 数据库而言，你写 `SELECT` 还是 `select` 并不重要。代码仍会运行。\n\n你应该如何编写 SQL 呢？我推荐关键字使用大写。然而，我认为更重要的是与你团队或应用程序的其他部分保持格式一致。如果你的团队偏好小写，那就使用小写。如果你有选择权，比如是为自己学习而非在团队中，那么我建议使用大写。\n\
    \n那么间距呢？为什么我要将 `FROM` 这个词放在新的一行？SQL 并不要求关键字必须换行。\n\n然而，将 `FROM` 关键字（以及许多其他关键字）放在新的一行，将有助于使查询更易于阅读和维护。因此，我推荐你这样编写查询。\n\
    \n## 我们的第一个 SELECT 语句\n\n既然你已经了解了 `SELECT` 语句的语法并解释了一些格式问题，现在让我们来编写你的第一个 `SELECT`\
    \ 语句。\n\n首先，以 `SELECT` 关键字开始：\n\n```\nSELECT\n```\n\n然后，添加你想查看的列。在这个例子中，我们将展示此表中所有可用的列。在\
    \ SQL 中，要实现这一点，你需要使用星号字符 `*`。在 `SELECT` 关键字后加一个空格，然后添加它。\n\n```\nSELECT *\n```\n\
    \n这种 `SELECT` 语句的变体通常被称为“全选”或“select star”，因为你选择了所有的列。\n\n接下来，另起一行并添加 `FROM` 这个词。\n\
    \n```\nSELECT *\nFROM\n```\n\n现在你需要指定数据来自哪个表。你可以使用上一章创建的表，即 `employee`。\n\n```\n\
    SELECT *\nFROM employee\n```\n\n最后，加上分号。\n\n```\nSELECT *\nFROM employee;\n```\n\
    \n这就是你的第一个 `SELECT` 语句！\n\n那么行呢？你已经指定了要看所有列，但行呢？\n\n数据库将使用此语句并查找所有符合你提供条件的行。默认情况下，除非你指定了需要检查的条件，否则将返回所有行。你将在本书后面学习如何显示满足特定条件的行，但目前你并未添加任何条件，因此数据库将显示所有行。\n\
    \n你该如何操作呢？你需要使用 SQL 工作表或编辑器在数据库上运行它。\n\n## 在 SQL Developer 中运行语句\n\n要运行你的 `SELECT`\
    \ 语句，你可以使用 SQL Developer。你可以按照以下步骤操作：\n\n![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig5_HTML.jpg](img/471705_1_En_3_Fig5_HTML.jpg)\n\
    图 3-5 查询结果\n\n1.  打开 `SQL Developer`。它应该在你上一章解压的位置。会出现一个加载屏幕，应用程序会在 5 到 10 秒内加载完成。\n\
    \n2.  在屏幕左侧的 `Connections`（连接）菜单中（图 3-1），应该有两个连接（一个用于 `SYSTEM`，一个用于 `Intro User`\
    \ 或你创建的用户）。\n\n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig1_HTML.jpg](img/471705_1_En_3_Fig1_HTML.jpg)\n\
    \    图 3-1 连接面板\n\n3.  双击你的 `Intro User` 连接（或不是用于 `SYSTEM` 用户的那个连接）。\n\n    一个新的\
    \ SQL 工作表将在主屏幕上打开。请注意，右上角的下拉框包含你的连接名称，如图 3-2 所示。\n\n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig2_HTML.jpg](img/471705_1_En_3_Fig2_HTML.jpg)\n\
    \    图 3-2 新的 SQL 工作表\n\n4.  点击新的 SQL 窗口内部，并按如下方式输入你的 SQL 查询：\n\n    ```\n   \
    \ SELECT *\n    FROM employee;\n    ```\n\n    在你输入时，可能会弹出一些菜单来辅助你的输入。你现在可以忽略它们。你的屏幕应如图\
    \ 3-3 所示。\n\n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig3_HTML.jpg](img/471705_1_En_3_Fig3_HTML.jpg)\n\
    \    图 3-3 输入 SQL 查询\n\n    在 SQL 窗口的顶部，就在你刚写的 `SELECT` 语句上方，有一排按钮，如图 3-4 所示。\n\
    \n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig4_HTML.jpg](img/471705_1_En_3_Fig4_HTML.jpg)\n\
    \    图 3-4 运行按钮\n\n    第一个按钮，那个大的绿色箭头，是 `Run Statement`（运行语句），第二个是 `Run Script`（运行脚本）。我将向你展示使用这些按钮会发生什么。你可以暂时忽略其他按钮。\n\
    \n5.  点击工具栏上的第一个按钮，即 `Run Statement` 按钮。\n\n    SQL 语句开始运行，片刻之后，一组数据显示在屏幕底部（图\
    \ 3-5）。\n\n你会注意到数据以行的形式显示，并且有五行。在每行的左边，都有一个数字，如图 3-6 截图所示。这个数字代表你结果的行号。\n\n![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig6_HTML.jpg](img/471705_1_En_3_Fig6_HTML.jpg)\n\
    图 3-6 行号\n\n在这个例子中，行号与 `ID` 相同，但那是因为数据显示的顺序就是如此。当你编写没有 `ID` 列或以不同顺序显示数据的查询时，这个行号可以帮助你查看每一行号对应的内容。\n\
    \n## 结果\n\n当 `SELECT` 语句在数据库上运行时，该语句的结果会显示给你。这被称为结果，或你的 `result set`（结果集），因为它是由查询产生的数据集合。\n\
    \n在你之前的例子中，你想查看 `employee` 表中的所有列。当你运行此语句时，屏幕底部会出现一个表格或网格。这个网格就是你的 `result set`，它包含了\
    \ `employee` 表中的所有列和行。\n\n这与你上一章输入的数据相同。它显示了 `ID` 列、`last_name` 列和 `salary` 列。它显示了你输入的所有行。"
- fmt: '## Run Script


    另一种运行查询的方法是使用 SQL Developer 中的 **Run Script** 按钮。此按钮将运行 SQL 窗口中的所有命令（可能不止一个），并且会以基于文本的输出形式显示结果，而不是表格形式。


    在 SQL 窗口中写好你的 `SELECT` 查询后，点击 **Run Script** 按钮。图 [3-7](#471705_1_En_3_Chapter.xhtml#Fig7)
    显示了输出的样子。


    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig7_HTML.jpg](Images/471705_1_En_3_Fig7_HTML.jpg)


    图 3-7


    脚本输出


    这显示了与 **Run Statement** 按钮相同的输出。但是，它以基于文本的格式显示。这使得复制粘贴到文本文件或一次性运行多个语句变得容易。如果你执行多个查询，它们的结果将在此文本输出中依次显示，第一个查询的结果在顶部。


    了解如何使用 **Run Script** 功能及其作用是很有好处的。然而，在本书中，你将主要使用 **Run Statement** 按钮。


    ## SQL 中的错误


    运行这些查询看起来相当简单，对吧？运行一条语句，数据就会显示。然而，并非所有 SQL 语句都那么简单，也并非所有语句都会给你想要的结果。


    偶尔，你运行一个查询，结果不是从数据库返回结果集，而是一个错误消息。


    显示错误消息的原因有很多，例如：


    *   你的语句存在语法错误，或者写法不正确（例如，关键字放错了位置）。

    *   处理数据时遇到问题（例如，某一行中的某个值无法转换为数字）。

    *   发生了与数据库相关的错误（例如，连接问题）。


    我不知道有谁能运行 SQL 查询而不遇到错误。我们都会在 SQL 上犯错。即使我做这行有一段时间了，我的查询仍然会出错。


    你刚开始时遇到的大多数错误都是第一种：查询写得不正确的语法错误。数据相关的错误有时也会发生。其他与数据库相关的错误很少见，通常超出了你的控制范围。


    以下小节描述了你在编写 SQL 时会看到的一些更常见的错误。随着你学习本书的深入，你会了解更多关于可能出错的地方，以及如何发现和纠正语句中的问题。


    ### 缺少关键字


    我们之前的示例查询如下：


    ```sql

    SELECT *

    FROM employee;

    ```


    假设你忘记在查询中添加 `FROM` 关键字，你的查询变成这样：


    ```sql

    SELECT * employee;

    ```


    如果你运行该语句，你会得到这个错误：


    ```

    ORA-00923: FROM keyword not found where expected

    00923. 00000 -  "FROM keyword not found where expected"

    *Cause:

    *Action:

    Error at Line: 1 Column: 10

    ```


    所有 Oracle 错误消息都以一个三字母代码开头，后跟一个连字符和五个数字。这是错误代码。大多数错误都有 ORA 错误代码，但有些会有 PLS 代码。


    示例中的错误代码是 ORA-00923，消息是 “FROM keyword not found where expected”。


    第二行显示了错误描述，但它与错误消息相同。通常，会显示原因和操作。但对于此错误，没有显示原因或操作。最后一行指出了发生错误的行和列：在本例中是第 1 行，第
    10 列。


    这个错误不言自明：“找不到 FROM 关键字”。如果你查看你的 SQL 语句，你会看到没有 `FROM` 关键字，因此该语句无法运行。


    ### 表不存在


    有时你会有一个类似下面的查询，并得到一个错误：


    ```sql

    SELECT *

    FROM emplyoee;

    ```


    ```

    ORA-00942: table or view does not exist

    00942. 00000 -  "table or view does not exist"

    *Cause:

    *Action:

    Error at Line: 2 Column: 6

    ```


    错误提示是 ORA-00942: table or view does not exist。


    你可能会想，“这不可能，表确实存在，我刚刚创建的！” 我也犯过很多次同样的错误。这个查询的问题在于，你指定的表实际上并不存在，但这是因为它被拼写错了。查询中提到的是
    “emplyoee” 而不是 “employee”。


    如果你拼错了表名，就会得到这个错误。但是，此错误也可能由于角色和安全相关的其他一些原因而出现。


    ## 总结


    在本章中，你了解了 `SELECT` 语句，它允许你查看表中存在的数据。你使用 `SELECT *` 显示了表中的所有列和行，并学习了在编写查询时可能出现的错误类型。


    在下一章中，你将学习如何指定要显示表中的哪些列。


    # 4. 选择特定列


    在本章中，你将学习如何显示表中的特定列。像我们在第 [3](#471705_1_En_3_Chapter.xhtml) 章中所做的那样返回所有列并不总是必要或可取的。回想一下，我们在该章执行了以下查询：


    ```sql

    SELECT *

    FROM employee;

    ```


    图 [4-1](#471705_1_En_4_Chapter.xhtml#Fig1) 显示了结果，即来自 `employee` 表的所有列和行。幸运的是，在这个例子中列数不多，所以结果不至于让人不知所措。


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig1_HTML.jpg](Images/471705_1_En_4_Fig1_HTML.jpg)


    图 4-1


    对 employee 表查询的结果


    试想一下，当一个表有几十列甚至可能上百列时！有时我们不希望在查询结果中看到所有列。这可能是因为我们在应用程序的某个特定部分使用查询，而该部分只希望显示部分数据，而不是表中的所有数据。


    在 SQL 中我们如何做到这一点？我们在 `SELECT` 子句中指定每一列。这种查询的语法如下：


    ```sql

    SELECT column_name, column_name...

    FROM table_name;

    ```


    这个语法看起来与第 [3](#471705_1_En_3_Chapter.xhtml) 章中的非常相似。但是，我们不是指定 `*` 字符（表示所有列），而是指定我们要显示的每一列。我们用逗号分隔每个列名。语法末尾的三个点
    “...” 仅表示列名语法可以重复。


    还有一件事：我用到了一个我们尚未涵盖的术语，即 *子句（clause）*。子句是一行以关键字开头的 SQL 代码，并包含与该关键字相关的所有内容。


    到目前为止，我们已经见过两个子句：


    *   SELECT 子句，包含 `SELECT` 关键字及其后跟随的列。

    *   FROM 子句，包含 `FROM` 关键字及其后跟随的任何内容，例如表名。


    在本书中，我们将经常使用“子句”这个术语来指代查询的不同部分。'
  raw: '## Run Script


    Another way you can run your query is to use the Run Script button in SQL Developer.
    This button will run all of the commands in your SQL window, which may include
    more than one. It will also display it in a text-based output, and not a table.


    Once you have your `SELECT` query written in the SQL window, click the Run Script
    button. Figure [3-7](#471705_1_En_3_Chapter.xhtml#Fig7) shows what your output
    would look like.


    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig7_HTML.jpg](Images/471705_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    The script output


    This shows the same output as the Run Statement button. However, it’s shown in
    a text-based format. This makes it easy to copy and paste into a text file, or
    to run several statements at once. If you execute multiple queries, the results
    will be displayed one after each other in this text output, with the first query’s
    results at the top.


    It’s good to know how to use the Run Script feature, and what it does. However,
    in this book, you’ll be using the Run Statement button most of the time.


    ## Errors in SQL


    Running those queries seemed pretty simple right? You run a statement, and data
    is displayed. However, not all SQL statements are that simple, and not all of
    them give you the result you want.


    Occasionally you’ll run a query and instead of getting the result set from the
    database, you’ll get an error message.


    Error messages are shown for many reasons, such as:


    *   There’s an error with the syntax of your statement, or how it is written (e.g.,
    you have put a keyword in the wrong place).


    *   There’s an issue with the data being processed (e.g., a certain value in a
    row can’t be converted to a number).


    *   There’s a database-related error (e.g., connection issue).


    I don’t know anyone who can run SQL queries without errors. We all make mistakes
    with our SQL sometimes. I still get errors with my queries and I’ve been doing
    this for a while.


    Most of the errors you’ll find when starting out are of the first kind: syntax
    errors where a query isn’t written correctly. The data-related ones also happen
    sometimes. Other database-related errors are rare and usually outside your control.


    The following subsections describe a few of the more common errors that you’ll
    see in writing SQL. As you progress through the book, you’ll learn more and more
    about what might go wrong and how to spot and correct problems in your statements.


    ### Missing Keyword


    Our example query earlier looked like this:


    ```

    SELECT *

    FROM employee;

    ```


    Let’s say that you forget to add the `FROM` keyword to your query, and your query
    looks like this:


    ```

    SELECT * employee;

    ```


    If you run that statement, you’ll get this error:


    ```

    ORA-00923: FROM keyword not found where expected

    00923\. 00000 -  "FROM keyword not found where expected"

    *Cause:

    *Action:

    Error at Line: 1 Column: 10

    ```


    All Oracle error messages start with a three letter code, followed by a dash and
    then five numbers. This is the error code. Most errors have an ORA error code,
    but some will have a PLS code.


    The preceding error in the example has a code of ORA-00923, and the message says
    “FROM keyword not found where expected.”


    An error description is shown on the second line, but it is the same as the error
    message. Often, a cause and action is shown. But for this error, there is no cause
    or action displayed. The final line says the line and column that the error occurred
    on: in this case at Line 1, Column 10.


    The error in this case is self-explanatory: “the FROM keyword is not found.” If
    you look at your SQL statement, you’ll see that there is no `FROM` keyword, so
    the statement does not run.


    ### Table Does Not Exist


    Sometimes you’ll have a query like the following, and get an error:


    ```

    SELECT *

    FROM emplyoee;

    ORA-00942: table or view does not exist

    00942\. 00000 -  "table or view does not exist"

    *Cause:

    *Action:

    Error at Line: 2 Column: 6

    ```


    The error says ORA-00942: table or view does not exist.


    You’re probably thinking, “That can’t be right, the table does exist, I just created
    it!” I’ve made this same mistake many times. The issue with this query is that
    the table you have specified does not actually exist, but that’s because it’s
    misspelt. The query mentions “emplyoee” and not “employee.”


    You’ll get this error if you misspell a table. However, this error can also appear
    for a few other reasons related to roles and security.


    ## Summary


    In this chapter, you’ve looked at the `SELECT` statement, which allows you to
    see the data that exists in a table. You used `SELECT *` to show all of the columns
    and rows in a table and learned what kind of errors can appear as you’re writing
    your queries.


    In the next chapter, you’ll learn about specifying which columns in a table you
    want to display.


    # 4. Selecting Specific Columns


    In this chapter, you’ll learn how to show specific columns from your table. It
    is not always necessary or desirable to return all columns as we did in Chapter
    [3](#471705_1_En_3_Chapter.xhtml). As you’ll recall, we executed the following
    query in that chapter:


    ```

    SELECT *

    FROM employee;

    ```


    Figure [4-1](#471705_1_En_4_Chapter.xhtml#Fig1) shows the results, which are all
    the columns from the employee table. Fortunately, in this instance there are few
    columns, so the results are not overwhelming.


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig1_HTML.jpg](Images/471705_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    The results of a query on the employee table


    Consider the case when a table has dozens or even maybe a hundred columns! Sometimes
    we don’t want to see all columns in our query results. This could be because we’re
    using a query in a certain part of the application where we only want to display
    some of the data and not all of the data in the table.


    How can we do this in SQL? We specify each of the columns in the `SELECT` clause.
    The syntax for this kind of query looks as follows:


    ```

    SELECT column_name, column_name...

    FROM table_name;

    ```


    This syntax looks very similar to that from Chapter [3](#471705_1_En_3_Chapter.xhtml).
    However, instead of specifying the `*` character (which indicates all columns),
    we specify each individual column we want to show. We separate each column name
    with a comma. The three dots “...” at the end of the syntax there just indicate
    that the column name syntax can be repeated.


    One more thing: I used a term that we haven’t covered yet, which is *clause*.
    A clause is a line of SQL code that starts with a keyword and includes everything
    related to that keyword.


    We’ve seen two clauses so far:


    *   The SELECT clause, which includes the SELECT keyword and columns that follow
    it


    *   The FROM clause, which includes the FROM keyword and anything that follows
    it, such as a table name.


    We’ll use this term clause often throughout this book to refer to different parts
    of a query.'
