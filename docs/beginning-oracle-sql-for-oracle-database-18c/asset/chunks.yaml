- fmt: '# 11. Ordering Your Data


    ## 11.1. Using BETWEEN When Values Don’t Match


    The `BETWEEN` operator can also be used on data that does not exactly match the
    upper and lower values you specify. To find the `employee` records with `salary`
    values between 50,000 and 100,000, you would write a query like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary BETWEEN 50000 AND 100000;

    ```


    The results of this query are:


    ```

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    8    SMITH       62000

    ```


    You’ll notice a few things. First, there are no values that are exactly 50,000
    or 100,000, but that’s OK. The values that are in this range are shown. Also,
    the `NULL` values are not shown. `NULL` is considered an unknown, so the database
    is unable to tell if those `NULL` values are within this range.


    ## 11.2. Using BETWEEN with Text Values


    You can also use text values with a `BETWEEN` keyword. Let’s say you wanted to
    find all `last_name` values that were between ANDERSON and MOON. You would write
    a query that looks like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name BETWEEN ''ANDERSON'' AND ''MOON'';

    ```


    Our results would display like this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    5    ANDERSON    31000

    6    COOPER      NULL

    ```


    This result is determined by checking the characters in each `last_name` value
    to see if they come after `''ANDERSON''` and before `''MOON''` if they were sorted
    alphabetically. All three of these values do.


    ## 11.3. An Example of an Inclusive and Exclusive Check


    Here’s an example of something that won’t work as a `BETWEEN` clause. Let’s say
    that you need to find all `employee` records that have a `salary` of 20000 or
    greater, and `employee` records that have a `salary` of less than 40000. If they
    have a `salary` of 40000, they should not be included. Your query without `BETWEEN`
    could look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary >= 20000

    AND salary < 40000;

    ```


    Notice that the first `WHERE` condition uses “>=” to reflect “greater than or
    equal to 20000”. The second condition uses “<” to reflect “less than 40000”. This
    query will return the following results:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    5    ANDERSON    31000

    ```


    If you write this using a `BETWEEN`, it will look the same as the earlier query
    and show different results.


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary BETWEEN 20000 AND 40000;

    ```


    The results are different:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    5    ANDERSON    31000

    9    PATRICK     40000

    ```


    This is something to be aware of. If you need to use “greater than or equal to”
    and “less than or equal to,” then `BETWEEN` can work, otherwise it won’t work.
    Could you just say `BETWEEN` 20000 and 39999?


    You could, but what’s to say there isn’t a salary of 39999.50? How can you effectively
    work out the highest value that is less than 40000? You can’t do that very easily.
    The same issue can be found with date fields, which you’ll look at later in this
    book.


    ## 11.4. Should You Use BETWEEN?


    You’ve seen the `BETWEEN` keyword as something that can be used as an alternative
    to “greater than or equal to ” and “less than or equal to ” logic (otherwise known
    as “inclusive”). Which method should you use?


    Here’s what I would recommend: if you are truly looking for a range of values,
    and your rule says it needs to be inclusive, then you can use `BETWEEN`. If you
    aren’t, then I would suggest using the other symbols. Table 10-1 provides an at-a-glance
    summary of this rule.


    Table 10-1: When to Use the `BETWEEN` Operator


    | Looking for a range of values? | Inclusive of values specified? | Use BETWEEN
    or Operators |

    | --- | --- | --- |

    | Yes | Yes | BETWEEN |

    | Yes | No | Operators |

    | No | Yes | Operators |

    | No | No | Operators |


    ## 11.5. Summary


    The `IN` keyword allows you to specify several values to perform an “equal to”
    check on. It’s easier to type and easier to read than using multiple `OR` keywords,
    and it can be used with any data type.


    The `BETWEEN` keyword is a helpful concept that allows you to specify a `WHERE`
    clause for a value that must be within two other values. It’s an easy to write
    and easy to understand combination of “greater than or equal to” and “less than
    or equal to,” but cannot be modified to use “greater than” or “less than” if required.


    # 12. Ordering Your Data


    In this chapter, you’ll learn how to sort your results in a specific order. In
    SQL, the data you select from a table is not guaranteed to be shown in a particular
    order. If you want to show it in a particular order, there is a command you can
    use.


    ## 12.1. Results Are Not Ordered


    When you run a `SELECT` query on a table, the data in the table is displayed for
    you to see. If you run a `SELECT` query to get all rows, for example, you see
    all of the rows.


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```

    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    (null)      (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    If you look at the results, you’ll see that they are ordered by the `ID` field
    in ascending order, which is from lowest to highest. This ordering didn’t happen
    as part of your query though. Oracle does not order your results in a certain
    way when you run a query, which means you can’t guarantee that data will be ordered
    this way.


    The reason the data has been ordered by ID number in the prior example is because
    the data is often ordered by when you added it to the database. However, there
    are many factors that can change that behavior, such as:


    *   Deleting data from a table

    *   Adding new data into a table

    *   Updating existing data in a table

    *   Other database administrator tasks

    *   Parallel data access such as in high-performance systems


    So, if Oracle can’t guarantee that your data will be ordered in a certain way,
    what can you do? You can specify the order you want your data to appear in when
    you write the query.


    ### 12.1.1. Warning!


    Developers will sometimes argue a specific case, saying that there is no way the
    database engine will return rows out of order. Ignore such arguments. They are
    always wrong, and will become wrong at the worst possible time, such as at 2:00
    am when you least want to be paged back to the office to solve a problem.


    ## 12.2. Ordering Results with ORDER BY


    There’s a clause in SQL called `ORDER BY`. This allows you to specify the order
    that you want the rows in your result to appear in. The `ORDER BY` clause looks
    like this:


    ```sql

    ORDER BY expression [ASC|DESC]

    ```


    This syntax includes:


    *   An `ORDER BY` keyword to indicate what is being done.

    *   An expression, which specifies how you want to order your results

    *   `ASC` or `DESC`, which are optional, and specify whether to order your data
    in ascending or descending order.


    You can also order by more than one column:


    ```sql

    ORDER BY expression [ASC|DESC], expression [ASC|DESC], expression [ASC|DESC]...

    ```


    You can just keep adding expressions to the end of the clause, separated by commas.
    You’ll see examples of this being done later in this chapter.


    The expression can be any of:


    *   A column name or expression including the column

    *   A number which represents the position of a column in the `SELECT` clause

    *   A column alias (which you will learn later in this book)


    You’ll have examples of these in the chapter as well.


    ## 12.3. ORDER BY Examples


    Let’s see some examples of ordering your data. You can see this `ORDER BY` clause
    in action in SQL queries, and see how it impacts the results.'
