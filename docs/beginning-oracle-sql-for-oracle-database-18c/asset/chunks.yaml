- fmt: '## Joining Three Tables


    In SQL, it''s possible to join three or more tables together in a single query.
    In fact, it''s where the strength of a database comes in. You''re able to store
    data in different tables and relate it all together to view it in the way you
    need.


    You have three tables in your database so far:


    *   `employee`

    *   `office`

    *   `sales_meeting`


    What if you needed to display data from all three tables, such as the employee
    name, their office address, and the company and date of the meeting? You can do
    this using SQL by joining these three tables together.


    Joining multiple tables works like the game of dominos. You know how in dominoes
    there was a set of small blocks with one symbol on each end, and the symbols were
    a dice number ranging from 1 to 6? I didn''t play dominoes a lot, but I remember
    a rule that said you could only place a domino down next to a domino that had
    the same number. If a domino had a 4 at one end, you could only place a domino
    with a 4 on it next to the first domino, as shown in Figure [21-1](#471705_1_En_21_Chapter.xhtml#Fig1).


    ![../images/471705_1_En_21_Chapter/471705_1_En_21_Fig1_HTML.jpg](Images/471705_1_En_21_Fig1_HTML.jpg)


    Figure 21-1: Two dominoes are similar to a join with two tables


    Well, if you want to add a third domino, you need to find one that matches and
    add it to the end, as shown in Figure [21-2](#471705_1_En_21_Chapter.xhtml#Fig2).


    ![../images/471705_1_En_21_Chapter/471705_1_En_21_Fig2_HTML.jpg](Images/471705_1_En_21_Fig2_HTML.jpg)


    Figure 21-2: Three dominoes are similar to a join with three tables


    You can keep doing this until you run out of pieces. This is like how joins work
    in SQL. The domino blocks are the tables and the numbers on them are columns.
    You can join many different tables together, as long as you can identify a common
    link between them. You just add a new table to the end of your statement and specify
    the join criteria, and it''s included.


    A query that joins two tables may look like this:


    ```sql

    SELECT columns

    FROM table1

    INNER JOIN table2 ON condition;

    ```


    A query that joins three tables may look like this:


    ```sql

    SELECT columns

    FROM table1

    INNER JOIN table2 ON condition

    INNER JOIN table3 ON condition;

    ```


    This query has joined three tables together and can display and work with data
    from all three tables.


    ## Joining Our Tables Together


    Let''s see an example. You have your three tables (`employee`, `office`, and `sales_meeting`)
    and you want to see data from all three of them. Your query would look like this:


    ```sql

    SELECT e.id,

    e.last_name,

    o.address,

    s.company,

    s.meeting_date

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id

    INNER JOIN sales_meeting s ON e.id = s.employee_id;

    ```


    This query combines a few techniques you''ve learned so far and joins three tables.
    You are selecting from the `employee` table, which has been given an alias of
    "e". We have used the same `INNER JOIN` as previous chapters, joining this to
    the `office` table on the relevant IDs (`employee.office_id` and `office.id`).


    You can then add an `INNER JOIN` to the `sales_meeting` table, with an alias of
    "s". You need to join this to your other tables on a certain condition. You can
    join it to any column that is in the tables specified above it, so anything in
    the `office` or `employee` table. In this example, you are joining it to the `employee.id`
    column, as that is how our data is set up.


    ### Note


    Table aliases are very helpful when you start adding more tables to your query.


    If you run this query, you''ll get this result.


    | ID | LAST_NAME | ADDRESS | COMPANY | MEETING_DATE |

    | --- | --- | --- | --- | --- |

    | 2 | SMITH | 45 Main Street | BW Signage | 21/Aug/2018 |


    This result is the only one shown, as it is the only employee that has an `office`
    record and a `sales_meeting` record:


    *   Employees 4, 6, 7, 8 and 9 are excluded because they have no `office` and
    no `sales_meeting` records.

    *   Employee 1 and 3 are excluded because they do not have a `sales_meeting` record.

    *   Employee 5 is excluded as they do not have an `office`.


    However, for the record that is showing, you can see the `last_name` from the
    `employee` table, the `address` from the `office` table, and the `company` and
    `meeting_date` from the `sales_meeting` table. This is because you have joined
    three different tables together.


    ## Using Outer Join Types


    In the earlier example, you joined three tables together but only saw one result,
    because that was the record that was common between all three tables. What if
    you want to see some records that match and `NULL` for those that don''t match,
    like an outer join? You can do that with multiple tables.


    Let''s say you want to see the `employee` records and their `sales_meeting` and
    `office` records if they exist, otherwise show `NULL`. You can do this by adjusting
    our earlier query to use `LEFT JOIN` instead of `INNER JOIN`.


    ```sql

    SELECT e.id,

    e.last_name,

    o.address,

    s.company,

    s.meeting_date

    FROM employee e

    LEFT JOIN office o ON e.office_id = o.id

    LEFT JOIN sales_meeting s ON e.id = s.employee_id;

    ```


    Your results will display:


    ```

    ID  LAST_NAME  ADDRESS           COMPANY           MEETING_DATE

    1   JONES      123 Smith Street  (null)            (null)

    2   SMITH      45 Main Street    BW Signage        21/Aug/2018

    3   KING       45 Main Street    (null)            (null)

    4   SIMPSON    123 Smith Street  (null)            (null)

    6   COOPER     123 Smith Street  (null)            (null)

    7   ADAMS      10 Collins Road   (null)            (null)

    8   SMITH      10 Collins Road   (null)            (null)

    9   PATRICK    123 Smith Street  (null)            (null)

    5   ANDERSON   (null)            ABC Construction  10/Aug/2018

    ```


    This result shows more records. You can see all of the `employee` records, their
    `offices` if they have any (otherwise `NULL`), and their `sales_meetings` if they
    have any (otherwise `NULL`).


    The query is the same as the earlier example but uses `LEFT JOIN` instead of an
    `INNER JOIN`. This is a great way to see what data, if any, exists in other tables
    for your main record.


    You can write a similar query for `sales_meetings`, where you can see all of the
    `sales_meeting` records, their `employees` (if they have any), and their `offices`
    (if they have any).


    ```sql

    SELECT

    s.id AS sales_meeting_id,

    s.company,

    s.meeting_date,

    e.id AS employee_id,

    e.last_name,

    o.address

    FROM sales_meeting s

    LEFT JOIN employee e ON e.id = s.employee_id

    LEFT JOIN office o ON e.office_id = o.id;

    ```


    The results are:


    ```

    SALES_MEETING_ID  COMPANY           MEETING_DATE  EMPLOYEE_ID   LAST_NAME  ADDRESS

    1                 ABC Construction  10/Aug/18     5             ANDERSON   (null)

    2                 BW Signage        21/Aug/18     2             SMITH      45
    Main Street

    3                 WXC Services      23/Aug/18     (null)        (null)     (null)

    ```


    This shows what we expect. The focus is on the `sales_meeting`, as the other tables
    are being "left joined" to it.'
