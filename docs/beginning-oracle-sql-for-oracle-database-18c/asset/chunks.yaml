    ```


    These results show the `customer_meeting` columns on the left, if they exist,
    and then show all of the `employee` columns. In this example, it might make more
    sense to write the query as a `RIGHT OUTER JOIN`, because the output reflects
    the ordering of tables as they would occur when writing a RIGHT OUTER JOIN.


    ## Writing a Full Outer Join


    The final type of outer join is a *full outer join*. This behaves similar to both
    a left outer join and a right outer join. Joining two tables with a full outer
    join will show:


    *   All records from both tables that match


    *   All records from the first table that don’t match the second table (which
    will show NULL values)


    *   All records from the second table that don’t match the first table (which
    will show NULL values)


    A full outer join can be displayed as a Venn diagram, as shown in Figure [19-4](#471705_1_En_19_Chapter.xhtml#Fig4).


    ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig4_HTML.jpg](Images/471705_1_En_19_Fig4_HTML.jpg)


    Figure 19-4


    A Full Outer Join, with table1 on the left and table2 on the right


    A full outer join is useful when you want to get all records from both tables
    and see which records match and don’t match. A full outer join query looks like
    this:


    ```

    SELECT columns

    FROM table1

    FULL [OUTER] JOIN table2 ON condition;

    ```


    Just like the left join and right join, the word `OUTER` is optional when writing
    a `FULL OUTER JOIN`. Let’s see an example.


    ## Using a Full Outer Join on Our Tables


    We can write a query that uses a full outer join on our employee and `customer_meeting`
    tables. Here’s an example of such:


    ```

    SELECT

    e.id,

    e.last_name,

    e.salary,

    s.id,

    s.company,

    s.meeting_date

    FROM employee e

    FULL JOIN customer_meeting s ON e.id = s.employee_id

    ORDER BY e.id;

    ```


    The query still joins on the `employee_id` columns, just like the earlier examples.
    The output of this query looks like this:


    ```

    ID     LAST_NAME  SALARY  ID       COMPANY           MEETING_DATE

    1      JONES      30000   (null)   (null)            (null)

    2      SMITH      35000   2        BW Signage        21/Aug/2018

    3      KING       45000   (null)   (null)            (null)

    4      SIMPSON    52000   (null)   (null)            (null)

    5      ANDERSON   31000   1        ABC Construction  10/Aug/2018

    6      COOPER     (null)  (null)   (null)            (null)

    7      (null)     (null)  (null)   (null)            (null)

    8      SMITH      62000   (null)   (null)            (null)

    9      PATRICK    40000   (null)   (null)            (null)

    (null) (null)     (null)  3        WXC Services      23/Aug/2018

    ```


    You can see a few things in this output:


    *   Matching rows are shown, such as employee SMITH and their meeting with BW
    Signage, and employee ANDERSON and their meeting with ABC Construction.


    *   Employee rows with no meetings are shown, such as JONES and KIN.


    *   Customer_meeting rows with no employees are shown, such as the meeting with
    WXC Services.


    This type of query shows more information than either a left join or right join.


    ## Summary


    An outer join is a type of join that shows all records in one table, along with
    records that match in another table if they exist. If no matches are found, a
    `NULL` value is shown. This allows you to see a full table as well as any matching
    records in another table.


    A left outer join will show all records in the table mentioned on the left of
    the join keyword, and the right outer join will show all records in the table
    on the right of the join keyword. A full outer join does both.


    # 20. Other Join Types


    There are several other types of join syntax offered in Oracle SQL. These join
    types aren’t used as often, but it’s worth knowing about them and why you should
    or should not use them.'
  trans: '

    ## 编写右外连接


    另一种类型的外连接是 *右外连接*。右外连接会显示连接中右侧表的所有记录。如果连接左侧的记录存在，则也会显示；否则，将显示一个 `NULL` 值。


    如果你觉得这听起来像左外连接，那你是对的。它与左外连接正好相反。在左外连接中，显示的是左侧表的所有记录。在右外连接中，显示的是右侧表的所有记录。


    右外连接也可以用维恩图来展示，如图 19-3 所示。


    ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig3_HTML.jpg](img/471705_1_En_19_Fig3_HTML.jpg)


    图 19-3


    一个右外连接，table1 在左，table2 在右


    我们之前的一个例子展示了所有的 `employee` 记录以及他们对应的 `customer_meeting` 记录。那个例子是用一个带有 `LEFT JOIN`
    的查询编写的：


    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    s.id,

    s.company,

    s.meeting_date

    FROM employee e

    LEFT JOIN customer_meeting s ON e.id = s.employee_id;

    ```


    同样的查询也可以写成 `RIGHT OUTER JOIN`，只需交换表的顺序并将 `LEFT JOIN` 改为 `RIGHT JOIN`。这是一个例子：


    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    s.id,

    s.company,

    s.meeting_date

    FROM customer_meeting s

    RIGHT JOIN employee e ON e.id = s.employee_id;

    ```


    **加粗的部分**是唯一更改的部分。连接条件不需要改变。连接条件出现的顺序无关紧要。


    这个查询的结果与之前相同：


    ```

    ID  LAST_NAME  SALARY  ID      COMPANY           MEETING_DATE

    1   JONES      30000   (null)  (null)            (null)

    2   SMITH      35000   2       BW Signage        21/Aug/2018

    3   KING       45000   (null)  (null)            (null)

    4   SIMPSON    52000   (null)  (null)            (null)

    5   ANDERSON   31000   1       ABC Construction  10/Aug/2018

    6   COOPER     (null)  (null)  (null)            (null)

    7   (null)     (null)  (null) (null)        (null)

    8   SMITH      62000   (null) (null)        (null)

    9   PATRICK    40000   (null) (null)        (null)

    ```


    ## 何时会使用右外连接？


    我几乎没怎么见过使用 `RIGHT OUTER JOIN` 或 `RIGHT JOIN` 的查询，因为这类查询总是可以写成 `LEFT JOIN`。如果可能的话，我更倾向于将查询写成
    `LEFT JOIN`，我遇到的大多数 SQL 开发者也是如此。


    我认为 `RIGHT JOIN` 可能更有意义的唯一场景是，如果你的输出先显示带有 `NULL` 值的列，然后再显示带有实际值的列。


    例如，假设你想要这样的输出：


    ```

    ID      COMPANY            MEETING_DATE  ID  LAST_NAME  SALARY

    (null)  (null)             (null)        1   JONES      20000

    2       BW Signage         21/Aug/2018   2   SMITH      35000

    (null)  (null)             (null)        3   KING       40000

    (null)  (null)             (null)        4   SIMPSON    52000

    1       ABC Construction   10/Aug/2018   5   ANDERSON   31000

    (null)  (null)             (null)        6   COOPER     (null)

    (null)  (null)             (null)        7   (null)     (null)

    (null)  (null)             (null)        8   SMITH      62000

    (null)  (null)             (null)        9   PATRICK    40000

    ```


    这些结果显示了左侧的 `customer_meeting` 列（如果存在的话），然后显示了所有的 `employee` 列。在这个例子中，将查询写成 `RIGHT
    OUTER JOIN` 可能更有道理，因为输出反映了编写右外连接时表的顺序。


    ## 编写全外连接


    最后一种类型的外连接是 *全外连接*。它的行为类似于左外连接和右外连接。使用全外连接连接两个表将显示：


    *   两张表中所有匹配的记录

    *   第一张表中不匹配第二张表的所有记录（将显示 NULL 值）

    *   第二张表中不匹配第一张表的所有记录（将显示 NULL 值）


    全外连接可以用维恩图显示，如图 19-4 所示。


    ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig4_HTML.jpg](img/471705_1_En_19_Fig4_HTML.jpg)


    图 19-4


    一个全外连接，table1 在左，table2 在右


    当你想获取两张表的所有记录并查看哪些记录匹配、哪些不匹配时，全外连接非常有用。全外连接查询如下所示：


    ```sql

    SELECT columns

    FROM table1

    FULL [OUTER] JOIN table2 ON condition;

    ```


    就像左连接和右连接一样，在编写 `FULL OUTER JOIN` 时，`OUTER` 这个词是可选的。让我们看一个例子。


    ## 在我们的表上使用全外连接


    我们可以编写一个在员工表和 `customer_meeting` 表上使用全外连接的查询。这是一个例子：


    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    s.id,

    s.company,

    s.meeting_date

    FROM employee e

    FULL JOIN customer_meeting s ON e.id = s.employee_id

    ORDER BY e.id;

    ```


    该查询仍然基于 `employee_id` 列进行连接，就像之前的例子一样。这个查询的输出如下：


    ```

    ID     LAST_NAME  SALARY  ID       COMPANY           MEETING_DATE

    1      JONES      30000   (null)   (null)            (null)

    2      SMITH      35000   2        BW Signage        21/Aug/2018

    3      KING       45000   (null)   (null)            (null)

    4      SIMPSON    52000   (null)   (null)            (null)

    5      ANDERSON   31000   1        ABC Construction  10/Aug/2018

    6      COOPER     (null)  (null)   (null)            (null)

    7      (null)     (null)  (null)   (null)            (null)

    8      SMITH      62000   (null)   (null)            (null)

    9      PATRICK    40000   (null)   (null)            (null)

    (null) (null)     (null)  3        WXC Services      23/Aug/2018

    ```


    你可以在这个输出中看到几点：


    *   显示了匹配的行，例如员工 SMITH 与他们的 BW Signage 会议，以及员工 ANDERSON 与他们的 ABC Construction
    会议。

    *   显示了没有会议的员工行，例如 JONES 和 KING。

    *   显示了没有对应员工的 customer_meeting 行，例如与 WXC Services 的会议。


    这种类型的查询比左连接或右连接显示的信息更多。


    ## 总结


    外连接是一种连接类型，它显示一张表中的所有记录，以及另一张表中如果存在则匹配的记录。如果未找到匹配项，则显示 `NULL` 值。这使你可以查看完整表格以及另一张表中的任何匹配记录。


    左外连接将显示连接关键字左侧提到的表中的所有记录，而右外连接将显示连接关键字右侧表中的所有记录。全外连接两者都做。


    # 20. 其他连接类型


    Oracle SQL 提供了其他几种连接语法类型。这些连接类型不常用，但值得了解它们是什么以及为什么应该或不应该使用它们。

    '
- fmt: '## The USING Keyword


    In an earlier chapter you learned how to write a query that used an `INNER JOIN`
    to get data from two tables. As part of that you specified how the two tables
    were related, by indicating the two columns whose values needed to match. Here''s
    the query you ran:


    ```sql

    SELECT

    s.id,

    s.employee_id,

    s.company,

    s.meeting_date,

    e.last_name

    FROM customer_meeting s

    INNER JOIN employee e ON s.employee_id = e.id;

    ```


    There is another keyword in SQL that allows you to write an `INNER JOIN` or `OUTER
    JOIN` even easier: the `USING` keyword. This `USING` keyword allows you to specify
    a name for a column, and that column from both tables is used as the join criteria.
    The syntax looks like this:


    ```sql

    SELECT columns

    FROM table1

    JOIN table2 USING (column_name);

    ```


    With this syntax you replace the `ON column=column` with the `USING(column)`.
    Let''s demonstrate this with the office table.


    ## Updating the Office Table


    The `office` table isn''t currently linking to anything, but the idea is that
    each employee will work from an office. To store this in our database, we need
    to add the `id` field from the `office` table to the `employee` table.


    First, let''s run an `ALTER TABLE` statement:


    ```sql

    ALTER TABLE employee

    ADD office_id NUMBER(5);

    ```


    If you run this statement on your database in SQL Developer, a new column will
    be added to the `employee` table. I''ve called it `office_id` so it''s clear what
    the value refers to. It''s also a `NUMBER` data type with five digits, as that''s
    the size of the `id` column in the `office` table.


    When you run a `SELECT` query on the `employee` table, this column is blank:


    ```sql

    SELECT id, last_name, salary, office_id

    FROM employee;

    ID  LAST_NAME  SALARY  OFFICE_ID

    1   JONES      30000   (null)

    2   SMITH      35000   (null)

    3   KING       45000   (null)

    4   SIMPSON    52000   (null)

    5   ANDERSON   31000   (null)

    6   COOPER     (null)  (null)

    7   ADAMS      (null)  (null)

    8   SMITH      62000   (null)

    9   PATRICK    40000   (null)

    ```


    You can run an `UPDATE` statement on this table to update these values. The update
    statements to run are shown as follows.


    ```sql

    UPDATE employee SET office_id = 1 WHERE id IN (1, 4, 6, 9);

    UPDATE employee SET office_id = 2 WHERE id IN (2, 3);

    UPDATE employee SET office_id = 3 WHERE id IN (7, 8);

    COMMIT;

    ```


    These queries use the `IN` keyword to allow you to update multiple rows with one
    query and without specifying multiple `OR` statements.


    After you run those `UPDATE` statements, you can run the same `SELECT` query on
    the `employee` table:


    ```sql

    SELECT id, last_name, salary, office_id

    FROM employee;

    ID  LAST_NAME  SALARY  OFFICE_ID

    1   JONES      30000   1

    2   SMITH      35000   2

    3   KING       45000   2

    4   SIMPSON    52000   1

    5   ANDERSON   31000   (null)

    6   COOPER     (null)  1

    7   ADAMS      (null)  3

    8   SMITH      62000   3

    9   PATRICK    40000   1

    ```


    The `employee` records now have an associated `office_id`. Now let''s write a
    `SELECT` query with the `USING` keyword.


    ## Writing a Query with the USING Keyword


    You can write a `SELECT` query with the `USING` keyword on the `employee` and
    `office` tables.


    ```sql

    SELECT id,

    last_name,

    salary,

    address

    FROM employee

    INNER JOIN office USING (office_id);

    ```


    This query includes the `USING` keyword on the `office_id` column, which means
    it joins the two tables together based on the `office_id` column. Let''s look
    at the results:


    ```

    ORA-00904: "OFFICE"."OFFICE_ID": invalid identifier

    ```


    This is unexpected. Why didn''t you get a list of both employee and office records?
    The query includes both tables and several columns.


    It''s because the `USING` clause looks for the specified column in both tables,
    and the column names need to be the same. This query has joined the two tables
    on the `employee.office_id` column matching the `office.office_id` column. This
    has encountered an error, as the `employee.office_id` column identifies the office,
    but the `office.office_id` column does not exist.


    The correct way to perform the join would be to match on `employee.office_id =
    office.id`. But this is not possible with the `USING` keyword. The `USING` keyword
    requires that both column names be the same.


    You could rename the `id` column in the `office` table to be `office_id` but that''s
    not always possible, especially if you''re working on an existing system, as it
    may cause other queries to break. Renaming a column may also cause other queries
    that use the `USING` clause to break as well!


    ### Note


    The `USING` clause requires that both tables contain a column with the same name.
    If this column does not contain the same data, you will get unexpected results.


    The requirement to make the column names the same is one of the reasons why I
    `don''t recommend` the `USING` clause. Another reason is the restrictions on the
    column. We joined two tables together, and in our recent examples we''ve been
    using table aliases to make it clear which tables each column comes from. The
    previous query didn''t have these aliases, so let''s add them in.


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o USING (id);

    ```


    If you run this query, you''ll get this message:


    ```

    ORA-25154: column part of USING clause cannot have qualifier

    25154. 00000 -  "column part of USING clause cannot have qualifier"

    *Cause:    Columns that are used for a named-join (either a NATURAL join

    or a join with a USING clause) cannot have an explicit qualifier.

    *Action:   Remove the qualifier.

    Error at Line: 9 Column: 8

    ```


    This means that the `id` column inside the `USING` clause cannot have a table
    alias in the `SELECT` clause. This is because the value should be the same in
    both tables and therefore does not need a qualifier. Let''s adjust the query to
    remove this:


    ```sql

    SELECT id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o USING (id);

    ```


    This query will run and show the same results as earlier, even though they are
    incorrect in this example. Not being able to refer to this column with an alias
    is a small issue, but when the column in both tables is the same, it shouldn''t
    matter.


    A better way of writing this query is to use the `ON` keyword instead of the `USING`
    keyword:


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    You can add in the `office_id` here as well. The results from this query are:


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    ```


    It''s a little more typing to use the `ON` keyword, but it allows for more flexibility
    with your queries and prevents issues from arising with columns that don''t match
    but have the same name.


    ## What is a Natural Join?


    A natural join is another Oracle feature that simplifies the process of joining
    tables. It''s a variation of an inner join that allows you to join tables without
    specifying the column names.


    The syntax for a natural join is:


    ```sql

    SELECT columns

    FROM table1

    NATURAL JOIN table2;

    ```


    How does Oracle know how to join the two tables together if you don''t specify
    a column? With a natural join, the database will join based on the column or columns
    that have the same names.


    It works in a similar way to the `USING` keyword. If the two tables have a column
    with the same name, the join is performed on that. If there are two columns with
    the same name, both columns are used.


    ### Note


    A natural join will perform an inner join on column names that have the same name.
    This is very restrictive and can give incorrect results.'
