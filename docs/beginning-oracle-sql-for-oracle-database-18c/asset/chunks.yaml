  trans: '

    # 第十一章：数据排序


    ## 11.1 当值不完全匹配时使用 BETWEEN


    `BETWEEN` 操作符也可用于数据与您指定的上下限值不完全匹配的情况。要查找 `salary`（工资）值在 50,000 到 100,000 之间的 `employee`（员工）记录，您可以编写如下查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary BETWEEN 50000 AND 100000;

    ```


    该查询的结果是：


    ```

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    8    SMITH       62000

    ```


    您会注意到几点。首先，没有值恰好是 50,000 或 100,000，但这没关系。在此范围内的值会被显示出来。此外，`NULL` 值不会被显示。`NULL`
    被视为未知值，因此数据库无法判断那些 `NULL` 值是否在此范围内。


    ## 11.2 对文本值使用 BETWEEN


    您也可以将文本值与 `BETWEEN` 关键字一起使用。假设您想查找所有介于 ''ANDERSON'' 和 ''MOON'' 之间的 `last_name`（姓氏）值。您可以编写如下查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name BETWEEN ''ANDERSON'' AND ''MOON'';

    ```


    我们的结果将显示如下：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    5    ANDERSON    31000

    6    COOPER      NULL

    ```


    这个结果是通过检查每个 `last_name` 值的字符，看它们如果按字母顺序排序，是否在 ''ANDERSON'' 之后且在 ''MOON'' 之前来确定的。这三个值都符合。


    ## 11.3 包含性与排他性检查示例


    这是一个使用 `BETWEEN` 子句无法达到预期效果的例子。假设您需要查找所有 `salary` 大于或等于 20000 且小于 40000 的 `employee`
    记录。如果他们的 `salary` 是 40000，则不应包含在内。不使用 `BETWEEN` 的查询可能如下所示：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary >= 20000

    AND salary < 40000;

    ```


    请注意，第一个 `WHERE` 条件使用 “>=” 来表示“大于或等于 20000”。第二个条件使用 “<” 来表示“小于 40000”。此查询将返回以下结果：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    5    ANDERSON    31000

    ```


    如果您使用 `BETWEEN` 来编写这个查询，它将看起来与之前的查询相同，但会显示不同的结果。


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary BETWEEN 20000 AND 40000;

    ```


    结果是不同的：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    5    ANDERSON    31000

    9    PATRICK     40000

    ```


    这是需要注意的地方。如果您需要使用“大于或等于”和“小于或等于”，那么 `BETWEEN` 是适用的，否则它就不适用。您能直接说 `BETWEEN` 20000
    和 39999 吗？


    可以，但怎么能保证没有 39999.50 的工资呢？您如何有效地找出小于 40000 的最高值？这并不容易做到。日期字段也存在同样的问题，本书后面会讨论。


    ## 11.4 是否应该使用 BETWEEN？


    您已经看到 `BETWEEN` 关键字可以作为“大于或等于”和“小于或等于”逻辑（也称为“包含性”）的替代方案。您应该使用哪种方法？


    以下是我的建议：如果您确实在寻找一个值的范围，并且您的规则要求它是包含性的，那么您可以使用 `BETWEEN`。如果不是，我建议使用其他符号。表 10-1
    对此规则提供了一个快速参考。


    表 10-1：何时使用 `BETWEEN` 操作符


    | 是否在寻找值范围？ | 是否包含指定值？ | 使用 BETWEEN 或 运算符 |

    | --- | --- | --- |

    | 是 | 是 | BETWEEN |

    | 是 | 否 | 运算符 |

    | 否 | 是 | 运算符 |

    | 否 | 否 | 运算符 |


    ## 11.5 总结


    `IN` 关键字允许您指定多个值来进行“等于”检查。它比使用多个 `OR` 关键字更容易输入和阅读，并且可以与任何数据类型一起使用。


    `BETWEEN` 关键字是一个有用的概念，它允许您为一个必须在另外两个值之间的值指定 `WHERE` 子句。它是一个易于编写和理解的“大于或等于”与“小于或等于”的组合，但如果需要，无法修改为使用“大于”或“小于”。


    # 第十二章：数据排序


    在本章中，您将学习如何按特定顺序对结果进行排序。在 SQL 中，从表中选择的数据不能保证以特定顺序显示。如果您想以特定顺序显示它，有一个命令可以使用。


    ## 12.1 结果无序


    当您在表上运行 `SELECT` 查询时，表中的数据会被显示出来供您查看。例如，如果您运行一个 `SELECT` 查询来获取所有行，您会看到所有的行。


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```

    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    (null)      (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    如果您查看结果，您会看到它们是按 `ID` 字段升序（从低到高）排序的。但这种排序并不是您查询的一部分。当您运行查询时，Oracle 不会以特定方式对您的结果进行排序，这意味着您无法保证数据会以这种方式排序。


    上一个示例中数据按 ID 号排序的原因是，数据通常按照您添加到数据库的顺序排列。然而，有许多因素可以改变这种行为，例如：


    *   从表中删除数据

    *   向表中添加新数据

    *   更新表中的现有数据

    *   其他数据库管理任务

    *   并行数据访问（如在高性能系统中）


    因此，如果 Oracle 无法保证您的数据会以某种特定方式排序，您该怎么办？您可以在编写查询时指定数据出现的顺序。


    ### 12.1.1 警告！


    开发人员有时会争辩特定情况，说数据库引擎绝不可能返回无序的行。忽略这样的论点。它们总是错的，并且会在最糟糕的时候出错，比如凌晨 2 点您最不想被召回办公室解决问题的时候。


    ## 12.2 使用 ORDER BY 对结果排序


    SQL 中有一个子句叫做 `ORDER BY`。它允许您指定结果集中行的出现顺序。`ORDER BY` 子句如下所示：


    ```sql

    ORDER BY expression [ASC|DESC]

    ```


    这个语法包括：


    *   `ORDER BY` 关键字，用于指示正在执行的操作。

    *   一个表达式，指定您希望如何对结果进行排序。

    *   `ASC` 或 `DESC`，它们是可选的，指定是按升序还是降序对数据进行排序。


    您也可以按多个列排序：


    ```sql

    ORDER BY expression [ASC|DESC], expression [ASC|DESC], expression [ASC|DESC]...

    ```


    您可以不断在子句末尾添加表达式，用逗号分隔。您将在本章后面看到这样做的示例。


    表达式可以是以下任何一种：


    *   列名或包含该列的表达式

    *   代表 `SELECT` 子句中列位置的数字

    *   列别名（您将在本书后面学到）


    本章中也会有这些示例。


    ## 12.3 ORDER BY 示例


    让我们看一些对数据进行排序的例子。您可以在 SQL 查询中看到 `ORDER BY` 子句的实际效果，并了解它如何影响结果。

