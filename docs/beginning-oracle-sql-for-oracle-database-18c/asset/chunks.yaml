- fmt: '## 使用 IN 处理文本值


    `IN` 关键字也可以与文本值一起使用。假设你有一个需要筛选的姓名列表。使用 `OR` 关键字的查询可能如下所示：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''SIMPSON''

    OR last_name = ''COOPER''

    OR last_name = ''ANDERSON'';

    ```


    这个查询可以改用 `IN` 关键字来写：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name IN (''SIMPSON'', ''COOPER'', ''ANDERSON'');

    ```


    每个文本值都需要用单引号括起来，就像你在其他 `WHERE` 子句中看到的一样。这些文本值也都放在括号内，用逗号分隔，就像处理薪资值的查询一样。


    这个查询的结果是：


    ```sql

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      NULL

    ```


    你可以看到结果显示了你指定的 `last_name` 值的记录。无论你在 `IN` 关键字内指定多少个值，这种类型的查询都有效，并且比单独的 `OR` 语句更容易输入和阅读。


    ## 将 IN 与其他子句结合使用


    你已经见过一些在单个 `WHERE` 子句中查找列中几个不同值的查询。你也可以将这种方法与其他条件相结合，例如另一个 `AND` 或 `OR` 子句。


    假设你想找到所有 `salary` 为 20000、25000、30000、35000 或 40000，并且 `last_name` 为 SMITH 的员工。你的查询可能如下所示：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary IN (20000, 25000, 30000, 35000, 40000)

    AND last_name = ''SMITH'';

    ```


    这个查询使用 `IN` 关键字来查找 `salary` 值，并使用相等比较来检查 `last_name` 值。这种将 `IN` 关键字与其他子句结合的技术是完全有效的
    SQL。运行此查询时，结果应为：


    ```sql

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    ```


    结果显示了一条记录，因为表中只有一条记录匹配指定的 `salary` 值并具有给定的 `last_name` 值。


    ## IN 与 AND？


    你已经了解到，在 `IN` 子句中指定值等同于写出多个 `OR` 子句。为什么 `IN` 子句不等同于多个 `AND` 子句呢？当你有多个 `AND` 子句时会发生什么？


    这是之前使用 `OR` 的查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    现在，考虑将所有的 OR 关键字替换为 AND，因为一个常见的错误是认为“我对 20000、35000 和 40000 的薪资值感兴趣”。很容易犯这样的错误：从英语思维中抓住“和”，并将其转换为查询中的
    AND 关键字。例如：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    AND salary = 35000

    AND salary = 40000;

    ```


    然而，这个查询不会得到你想要的结果。它本质上是在说：“显示 `salary` 等于 20000 且等于 35000 且等于 40000 的记录”。


    一个列不能同时等于多个值。如果一个 `salary` 值等于 20000，它就不可能同时等于 35000。这个查询将返回零行。这就是为什么 `IN` 关键字等同于
    `OR` 关键字，而不是 `AND` 关键字。


    ## IN 与 LIKE？


    在之前的章节中，你学习了如何使用 `LIKE` 关键字执行部分匹配。例如，要找到所有 `last_name` 以“S”开头的记录，我们的查询将是：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''S%'';

    ```


    如果你想找到所有 `last_name` 以“S”或“P”开头的记录呢？你能为此使用 `IN` 关键字吗？你能写成这样吗？


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name IN (''S%'', ''P%'');

    ```


    不幸的是，`IN` 的这种用法不会给你所需的结果。`IN` 子句对括号内的所有值进行“等于”判断，而不是 `LIKE`。因此，`IN` 子句无法对列表中的值执行部分匹配。它将返回
    `last_name` 精确匹配字符“S%”或“P%”的记录，而这样的记录一条也没有。


    当你有多个 `LIKE` 条件时，可以使用 `OR` 关键字将它们组合起来。例如：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''S%''

    OR last_name LIKE ''P%'';

    ```


    这个查询将显示以下结果：


    ```sql

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    4    SIMPSON     52000

    8    SMITH       62000

    9    PATRICK     40000

    ```


    ## 过滤值的范围


    你已经学习了如何使用“等于”和“大于”等运算符通过 `WHERE` 子句过滤数据。有时你可能需要查找落在特定值范围内的数据。有一种比使用大于和小于运算符组合更好的方法来过滤值范围。


    可以使用你的员工表来完成值范围的过滤。你可能需要过滤薪资值的范围。员工表如下所示：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      NULL

    7    NULL        NULL

    8    SMITH       62000

    9    PATRICK     40000

    ```


    假设你的经理想知道谁的薪资在某个范围内。你被要求提供所有薪资在 20,000 到 40,000 之间（含）的员工的详细信息。


    你会怎么做？你可以使用一个 `WHERE` 子句，其中包含：


    *   一个大于或等于符号，用于薪资 20,000

    *   一个小于或等于符号，用于薪资 40,000

    *   `AND` 关键字以确保记录同时满足这两个条件


    你的查询可能如下所示：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary >= 20000

    AND salary <= 40000;

    ```


    这个查询将找到 `salary` 大于或等于 20000 且 `salary` 小于或等于 40000 的记录。你的结果将如下所示：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    5    ANDERSON    31000

    9    PATRICK     40000

    ```


    这些结果显示了 `salary` 等于 20000、40000 以及介于两者之间的所有值的记录。有另一种方法可以将相同的逻辑写入查询：使用一个称为 `BETWEEN`
    的运算符。


    ## BETWEEN 运算符


    在 SQL 中，`BETWEEN` 是一个运算符，它允许你为特定列指定上限和下限，行必须满足该条件才会被包含。`BETWEEN` 等同于使用“大于或等于”和“小于或等于”。使用
    `BETWEEN` 的语法如下：


    ```sql

    WHERE column BETWEEN low_value AND high_value

    ```


    这意味着：


    *   它以 `WHERE` 列开头，这是你想要查找的列。

    *   然后你指定 `BETWEEN` 运算符。

    *   接着是 `low_value`，即范围中的下限值。

    *   然后你有 `AND` 关键字。

    *   最后你有 `high_value`，即范围中的上限值。


    ### 使用 Between 处理两个薪资值


    你可以将前面的例子重写为一个使用 `BETWEEN` 的查询。


    第一个例子是这个查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary >= 20000

    AND salary <= 40000;

    ```


    你可以使用 `BETWEEN` 关键字将其重写如下：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary BETWEEN 20000 AND 40000;

    ```


    这个查询输入量稍少，并且可以说更容易阅读。结果是相同的：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    5    ANDERSON    31000

    9    PATRICK     40000

    ```'
  raw: '### Using IN with Text Values


    The `IN` keyword can also be used with text values. Let’s say you had a list of
    names you wanted to filter on. Your query with `OR` keywords could look like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name = ''SIMPSON''

    OR last_name = ''COOPER''

    OR last_name = ''ANDERSON'';

    ```


    This query can be written using an `IN` keyword:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name IN (''SIMPSON'', ''COOPER'', ''ANDERSON'');

    ```


    Each of the text values need to be enclosed in single quotes, just like you’ve
    seen in other `WHERE` clauses. The text values are also all inside the brackets,
    separated by commas, just like the query with salary values.


    The results for this query are:


    ```

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      NULL

    ```


    You can see that the results show the records with the `last_name` values you
    specified. This type of query works no matter how many values you specify inside
    the `IN` keyword, and the query is a lot easier to type and read than separate
    `OR` statements


    ### Using IN with Other Clauses


    You’ve seen some queries that had one `WHERE` clause that looked for a few different
    values in a column. You can combine that approach with other criteria as well,
    such as another `AND` or `OR` clause .


    Let’s say you want to find all employees that have a `salary` of 20000, 25000,
    30000, 35000, or 40000, and also had a `last_name` of SMITH. Your query could
    look like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary IN (20000, 25000, 30000, 35000, 40000)

    AND last_name = ''SMITH'';

    ```


    This query uses the `IN` keyword to look for `salary` values, and it uses an equality
    comparison to check for the `last_name` value. This technique of combining the
    `IN` keyword with other clauses is perfectly valid SQL. When you run this query,
    the results should be:


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    ```


    These results show a single record, as there is only one record in the table that
    matches the specified `salary` values and has the given `last_name` value.


    ## IN with AND?


    You’ve learned that specifying values in an `IN` clause is the same as writing
    out several `OR` clauses. Why is an `IN` clause not like several `AND` clauses
    ? What happens when you have several `AND` clauses?


    Here is the earlier query that uses `OR`:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    Now, think about replacing all the OR keywords with AND, because a common mistake
    is to think in terms of “I’m interested in salary values of 20000, 35000, and
    40000.” It’s easy to make the mistake of seizing upon the “and” from the thought
    as written in English, and to translate that conjunction into the keyword AND
    in a query. For example:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    AND salary = 35000

    AND salary = 40000;

    ```


    However, this query won’t give you what you need. It’s essentially saying, “show
    me records where the `salary` is equal to 20000 AND 35000 AND 40000”.


    A column can’t be equal to more than one value at a time. If a `salary` value
    is equal to 20000 it can’t also be equal to 35000\. This query will return zero
    rows. That’s why the `IN` keyword is comparable to the `OR` keyword and not to
    the `AND` keyword.


    ## IN with LIKE ?


    In a previous chapter, you learned how to use the `LIKE` keyword to perform partial
    matches. For example, to find all records where the `last_name` starts with “S,”
    our query would be:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''S%'';

    ```


    What if you wanted to find all records where the `last_name` started with “S”
    or “P”? Could you use an `IN` keyword for this? Could you write something like
    this?


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name IN (''S%'', ''P%'');

    ```


    Unfortunately, this use of `IN` won’t give you the results you need. The `IN`
    clause does an “equals to” on all of the values inside the brackets, and not a
    `LIKE`. So, the `IN` clause won’t be able to perform a partial match on the values
    in the list. It will return records where the `last_name` exactly matches the
    characters “S%” or “P%”, of which there are none.


    When you have multiple `LIKE` conditions, you can combine them using `OR` keywords.
    For example:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''S%''

    OR last_name LIKE ''P%'';

    ```


    This query will show the following results:


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    4    SIMPSON     52000

    8    SMITH       62000

    9    PATRICK     40000

    ```


    ## Filtering on Ranges of Values


    You''ve learned how to use operators such as “equal to” and “greater than” to
    filter data using a `WHERE` clause. Sometimes you may need to find data that falls
    within a range of values. There is a better way to filter on a range of values
    than using a combination of greater than and less than operators.


    Filtering on a range of values could be done using your employee table. You may
    want to filter on a range of salary values. The employee table looks like this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      NULL

    7    NULL        NULL

    8    SMITH       62000

    9    PATRICK     40000

    ```


    Let’s say your manager wants to know who is being paid a salary in a certain range.
    You have been asked for the details of all people who have a salary between 20,000
    and 40,000 inclusive.


    How would you do this? You can use a `WHERE` clause that uses:


    *   A greater than or equal to symbol, for salaries of 20,000


    *   A less than or equal to symbol, for salaries of 40,000


    *   The `AND` keyword to ensure records meet both criteria


    Your query could look like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary >= 20000

    AND salary <= 40000;

    ```


    This query will find records where the `salary` is greater than or equal to 20000
    and the `salary` is less than or equal to 40000\. Your results would look like
    this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    5    ANDERSON    31000

    9    PATRICK     40000

    ```


    These results show records that have a `salary` equal to 20000, 40000, and everything
    in between. There’s an alternative way to write the same logic into a query: using
    an operator called `BETWEEN`.


    ## The BETWEEN Operator


    In SQL, `BETWEEN` is an operator that lets you specify an upper and lower limit
    for a particular column, and the rows must match that criteria to be included.
    `BETWEEN` is the same as using a “greater than or equal to” and a “less than or
    equal to.” The syntax for using `BETWEEN` looks like this:


    ```

    WHERE column BETWEEN low_value AND high_value

    ```


    This means:


    *   It starts with the `WHERE` column, which is the column whose values you want
    to look up.


    *   You then specify the `BETWEEN` operator.


    *   Next comes the `low_value`, or the lower value in the range.


    *   Then you have the `AND` keyword.


    *   Finally, you have the `high_value`, or the higher value in the range.


    ### Using Between with Two Salary Values


    You can rewrite your earlier example into a query that uses `BETWEEN`.


    The first example was this query:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary >= 20000

    AND salary <= 40000;

    ```


    You can rewrite this using the `BETWEEN` keyword like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary BETWEEN 20000 AND 40000;

    ```


    This query has a little less typing, and is arguably easier to read. The results
    are the same:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    5    ANDERSON    31000

    9    PATRICK     40000

    ```'
