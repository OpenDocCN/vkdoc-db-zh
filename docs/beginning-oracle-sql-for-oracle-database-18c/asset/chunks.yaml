    query would look like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    AND salary > 30000

    AND salary < 40000;

    ```


    Your results would look like this:


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    5    ANDERSON    31000

    ```


    This shows both `''SMITH''` and `''ANDERSON''` because they meet all three criteria
    in the query:


    *   The `last_name` contains “S.”


    *   The `salary` is greater than 30000.


    *   The `salary` is less than 40000.


    ### Multiple OR Conditions


    Let’s look at an example using multiple `OR` keywords. Let’s say you want to see
    all `employee` records where the `salary` is less than 25000, or the `salary`
    is greater than 50000, or the `last_name` contains a “G.” This is what your query
    would look like:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary  50000

    OR last_name LIKE ''%G%'';

    ```


    The results of this query would be:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    4    SIMPSON     52000

    ```


    The record for `''JONES''` is shown because the `salary` is less than 25000\.
    The record for `''KING''` is shown because the `last_name` contains a G, and `''SIMPSON''`
    is shown because the `salary` is greater than 50000\. Only one of the conditions
    needs to be true for the row to be shown.


    ### Combining Multiple AND and OR Conditions


    What if you wanted to mix these keywords, by putting both `AND/OR` into the one
    query? You can do that. Let’s say you had this query:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    AND salary > 30000

    OR salary < 40000;

    ```


    You have `condition1 AND condition2 OR condition3`. What would these results look
    like? It would look like this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    How did you get to this result? The `AND` and `OR` keywords are run in a certain
    order. This is called the *order of operations*. This concept applies to several
    areas in SQL, and you might remember it from mathematics class in school, where
    some operations had priority over others.


    `AND` and `OR` both have the same priority. They are both used in sequence. So,
    for this query, the logic says to show records that:


    *   Have a `last_name` containing S and a `salary` greater than 30000


    *   Or, have a `salary` less than 40000


    These are two separate conditions now. The records for `''SMITH''`, `''SIMPSON''`,
    and `''ANDERSON''` are shown because they meet the first criteria of having a
    `last_name` with S and a `salary` greater than 30000\. `''JONES''` is shown because
    they have a `salary` less than 40000\. `''KING''` is not shown.'
  trans: '

    ### 使用 AND 关键词对两列进行大于和小于查询以查找记录


    使用 `AND` 关键词的另一个例子是使用除等于和 `LIKE` 之外的其他比较运算符。假设你想查找 `ID` 大于或等于 3 且 `salary`（工资）小于
    40000 的记录。你的查询语句会是这样的：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE id >= 3

    AND salary < 40000;

    ```


    结果会是这样：


    ```

    ID   LAST_NAME   SALARY

    5    ANDERSON    31000

    ```


    这是唯一显示的记录，因为尽管 `KING` 和 `SIMPSON` 的 `ID` 大于或等于 3，但他们的 `salary` 并不小于 40000。


    ## OR 关键词


    在查询中使用多个筛选条件的第二种方法是使用 `OR` 关键词。`OR` 关键词的使用方式与 `AND` 关键词相同。然而，区别在于 `OR` 表示两个条件中至少有一个需要满足，而不像
    `AND` 关键词那样需要两个条件都满足。


    使用 `OR` 关键词的语法如下：


    ```sql

    WHERE condition

    OR condition

    ```


    `OR` 关键词的工作方式与 `AND` 关键词相同。它用在 `WHERE` 子句中，你可以用它来指定第二个要检查的条件。如果对于某一行，两个条件中的任何一个（或两个）为真，那么该行就会包含在结果中。`OR`
    关键词对于检查多个条件并查看至少有一个条件为真的结果非常有用。


    ### 使用 OR 关键词按姓氏或工资查找记录


    让我们看看之前使用 `OR` 而不是 `AND` 重写的例子。你想查找 `last_name`（姓氏）包含字母“S”，或者 `salary` 大于 32000
    的记录。你的查询语句会是这样的：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    OR salary > 32000;

    ```


    你的结果会是这样：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    结果显示了表中的每一条记录。`last_name` 为 `''JONES''`、`''SMITH''`、`''SIMPSON''` 和 `''ANDERSON''`
    的记录被显示，因为它们 `last_name` 中都包含“S”。`''KING''` 的记录被显示是因为他们的 `salary` 大于 32000。有些记录只满足两个条件中的一个（`last_name`
    中包含“S” 或 `salary` 大于 32000），但这没关系；它们仍然被包含在结果中。


    ### 使用 OR 关键词对两列进行大于或小于查询以查找记录


    让我们看另一个使用 `OR` 的例子。你可能想查看所有 `ID` 大于或等于 4，或者 `salary` 小于 40000 的记录。


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE id >= 4

    OR salary < 40000;

    ```


    结果会是这样：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    我们可以解释表中每条记录的处理方式：


    *   `JONES`：显示是因为 `salary` 小于 40000。

    *   `SMITH`：同样显示是因为 `salary` 小于 40000。

    *   `KING`：未显示，因为 `salary` 不小于 40000 且 `ID` 不大于或等于 4。

    *   `SIMPSON`：显示是因为 `ID` 大于或等于 4。

    *   `ANDERSON`：显示是因为 `ID` 大于或等于 4 且 `salary` 小于 40000。


    ## 超过两个条件


    你已经看到几个关于 `AND` 和 `OR` 带有两个条件的例子。如果你想使用超过两个条件怎么办？你可以在 SQL 中使用 `AND` 和 `OR` 来做到这一点。你只需在
    `WHERE` 子句末尾添加另一个 `AND` 或 `OR`：


    ```sql

    WHERE condition

    [{AND|OR} condition]

    [{AND|OR} condition]

    ```


    当你阅读 SQL 文档时，会看到类似的语法。方括号 `[` 和 `]` 表示其中的部分是可选的。花括号 `{` 和 `}` 表示其中的部分是必需的。最后，竖线
    `|` 表示必须选择其中一个选项。


    因此，这个语法意味着你需要有一个 `WHERE` 条件，然后你可以有一个 `AND` 或 `OR` 条件。如果你确实有一个 `AND` 或 `OR` 条件，你需要写成
    `AND condition` 或 `OR condition`。


    你可以在查询中添加更多 `AND` 或 `OR` 条件。你还可以在查询中使用 `AND` 和 `OR` 的不同组合。


    ### 多个 AND 条件


    让我们看一些例子。你可能想查看所有 `last_name` 包含“S”且 `salary` 大于 30000 并小于 40000 的 `employees`（员工）。你的查询语句会是这样的：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    AND salary > 30000

    AND salary < 40000;

    ```


    你的结果会是这样：


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    5    ANDERSON    31000

    ```


    这显示了 `''SMITH''` 和 `''ANDERSON''`，因为他们满足查询中的所有三个条件：


    *   `last_name` 包含“S”。

    *   `salary` 大于 30000。

    *   `salary` 小于 40000。


    ### 多个 OR 条件


    让我们看一个使用多个 `OR` 关键词的例子。假设你想查看所有 `salary` 小于 25000，或 `salary` 大于 50000，或 `last_name`
    包含“G”的 `employee` 记录。你的查询语句会是这样的：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary < 25000

    OR salary > 50000

    OR last_name LIKE ''%G%'';

    ```


    此查询的结果将是：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    4    SIMPSON     52000

    ```


    `''JONES''` 的记录显示是因为 `salary` 小于 25000。`''KING''` 的记录显示是因为 `last_name` 包含 G，`''SIMPSON''`
    显示是因为 `salary` 大于 50000。对于一行要显示，只需要其中一个条件为真。


    ### 组合多个 AND 和 OR 条件


    如果你想混合使用这些关键字，在一个查询中同时放入 `AND` 和 `OR` 呢？你可以这样做。假设你有这个查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    AND salary > 30000

    OR salary < 40000;

    ```


    你有 `condition1 AND condition2 OR condition3`。这些结果会是什么样子呢？它会是这样：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    如何得到这个结果？`AND` 和 `OR` 关键字按照特定的顺序进行求值。这被称为*运算顺序*（order of operations）。这个概念适用于 SQL
    的多个领域，你可能在数学课上也记得它，当时一些运算比其他运算具有更高的优先级。


    `AND` 和 `OR` 都具有相同的优先级。它们按顺序使用。因此，对于这个查询，逻辑是显示满足以下条件的记录：


    *   `last_name` 包含 S 且 `salary` 大于 30000

    *   或者，`salary` 小于 40000


    现在这是两个独立的条件。`''SMITH''`、`''SIMPSON''` 和 `''ANDERSON''` 的记录被显示，因为它们满足第一个标准：`last_name`
    包含 S 且 `salary` 大于 30000。`''JONES''` 被显示是因为它的 `salary` 小于 40000。`''KING''` 未被显示。

