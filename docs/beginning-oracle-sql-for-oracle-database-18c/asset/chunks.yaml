    # 使用多个条件指定顺序


    如果你想按特定顺序检查条件怎么办？你可以使用括号：“(” 和 “)”。在查询中添加括号将强制查询以某种方式运行。括号内的操作先运行，然后再与括号外的操作组合。让我们看这个例子：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%N%''

    AND salary > 50000

    OR last_name LIKE ''%T%'';

    ```


    这将显示符合以下条件的记录：


    *   `last_name` 包含 “N” 且 `salary` 大于 50000

    *   或者，`last_name` 包含 “T”。


    这将显示以下结果：


    ```sql

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    4    SIMPSON     52000

    ```


    如果你想显示一组不同的记录，你会这样编写查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%N%''

    AND (salary > 50000

    OR last_name LIKE ''%T%'');

    ```


    注意括号围绕着两个条件和 `OR` 关键字。这意味着这些条件先运行，然后与第一个条件组合。这将显示符合以下条件的记录：


    *   `salary` 大于 50000 或 `last_name` 包含 “T”

    *   并且 `last_name` 包含 “N”。


    此查询的结果将是：


    ```sql

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    ```


    每条记录都满足这些条件。如果在 `WHERE` 子句中没有括号，结果就会不同。`''SMITH''` 的记录在第一个结果中显示而不在第二个中显示的原因在于，第一个查询显示了所有
    `last_name` 包含 “T” 的记录，而第二个查询只显示了 `last_name` 包含 “T” 且 `salary` 大于 50000 的记录。


    ## 总结


    你可以通过组合使用 `AND` 和 `OR` 关键字在 SQL 查询中使用多个筛选器。`AND` 关键字将检查记录是否满足指定的所有条件，而 `OR` 关键字将检查记录是否满足指定的至少一个条件。查询中可以添加许多
    `AND` 和 `OR` 关键字，它们按书写顺序运行。如果你想确保它们按特定顺序运行，可以将条件和关键字用括号括起来。


    # 8. 处理 Null 值


    在本章中，你将学习 SQL 和数据库中称为“null”的概念。在你一直使用的示例表中，每条记录的每个列都有一个值。然而，在处理真实数据库时，情况并非总是如此。“null”这个概念用于数据未知的情况。


    ## 缺失数据


    在真实数据库中，可能会出现数据缺失的情况。这可能是故意的（我们不知道值是什么），或者是某种错误（本应有值却没有）。数据库中的表不要求你在每一行每一列都存储一个值。


    到目前为止，我们在本书中一直使用一个名为 `employee` 的示例表。该表如下所示：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    该表有五行和三列。每行的每个列都有一个值。然而，情况并非总是如此。值可能会缺失。如果某个 `employee` 的 `salary` 未知怎么办？或者我们表中还有其他列，例如
    `date of birth`，而某些 `employee` 的这些信息未知？


    这是处理数据库时的一种有效场景。问题是：我们如何存储它？假设你有一个新 `employee`，但你目前不知道他们的 `salary` 是多少。可以这样表示：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      Unknown

    ```


    在这个例子中，我们使用了一个文本值 “Unknown”，来指明我们不知道新 `employee` 的 `salary` 值。但这并不是一个好主意。


    首先，`salary` 列是一个数字列，这意味着它只存储数字而不是文本值。在这个数字列中使用文本值 “Unknown” 会在尝试添加时导致错误。


    你不应该为了允许出现这个 “Unknown” 值而将 `salary` 列的类型更改为文本值。嗯，你可以这样做，但那样你可以对数据库中的每个字段都这样做，这将意味着数据类型完全失去作用。


    如果你使用 “n/a” 的值呢？出于同样的原因，这也不行。将文本值添加到数字列是不可能的。而且，有什么理由说 “n/a” 的值在这个字段或其他字段中不是合法值呢？它可能对
    `salary` 无效，但如果有一个名为 `commission` 的列存储员工的佣金金额呢？“n/a” 的值可能意味着佣金不适用于该特定员工。


    如果你使用 0 呢？你可以使用 0，但 0 值表示“`salary` 是零”。你想捕捉的事实是 `salary` 未知，而未知与 0 是不同的。如果你使用
    0，你将不得不调整所有查看 `salary` 列的查询，忽略那些 `salary` 为 0 的记录，因为它会扭曲任何总计或平均值。


    如果你使用一个空格字符 “ ” 呢？这是一个选项，但它面临着与 “Unknown” 和 “n/a” 相同的问题，因为它是一个试图添加到数字字段的文本值。


    使用空字符串怎么样，这意味着引号内没有任何内容：‘ ’？你可以试试这个，但空字符串在 SQL 中的处理方式不同。它仍然是一个文本值，这意味着在尝试用于数字或日期字段时会有问题。


    所以，你不能使用像 “n/a”、或 0、或 “ ”、或空字符串这样的文本值。你能用什么？你可以使用 `NULL` 值。


    ## 什么是 NULL？


    `NULL` 这个词是一个关键字，意思是“一个未知值”。它用于表示数据库表中的未知或缺失值。提供这个关键字是因为未知值不同于空字符串、空格、零或其他可能有含义（如
    “n/a” 或 “FALSE”）的文本值。


    `NULL` 值在数据库中使用相当频繁，因为无法保证所有字段总是有数据。在数据库中使用 `NULL` 值（相对于零或空字符串）有什么优势？


    *   `NULL` 适用于任何列类型：文本、数字、日期。你不需要为了使用它而更改列的类型。

    *   `NULL` 有自己的一套用于执行逻辑的关键字，因为它是一个特殊值。

    *   有一系列函数可以与 `NULL` 一起使用。

    *   它不占用存储空间，这对于小表来说可能不是问题，但对于大表可能有帮助。


    ## 应该如何处理 NULL？


    `NULL` 值需要特殊的处理方式，这可能是它们唯一的缺点。在本书中，你将学习如何处理 `NULL` 值，但你将结合目前所学查看一些与 `NULL` 值相关的例子和处理方式。


    你刚刚学习了如何使用等于和大于等符号检查列值是否与其他值匹配。这对于文本、数字和日期值都适用。但是，它不适用于 `NULL` 值。一个值不能“等于” `NULL`，因为
    `NULL` 是一个未知值。要检查一个值是否是 `NULL`，我们使用关键字 `IS NULL`。你的 `WHERE` 子句应该像这样：


    ```sql

    WHERE salary IS NULL;

    ```


    如果你使用等号来写，它不会找到任何内容：


    ```sql

    WHERE salary = NULL;

    ```


    让我们看一些例子来解释这一点。


    ## 处理 NULL 的示例


    你将看到一些在数据库中处理 `NULL` 值的例子。首先，你需要在表中添加一些 `NULL` 值，以便可以编写处理它们的 `SELECT` 查询。

