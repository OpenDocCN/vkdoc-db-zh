- fmt: '### Count with WHERE


    Another way you can use the `COUNT` function is with a `WHERE` clause in the `SELECT`
    query. The previous examples have involved counting all records in a table, but
    sometimes you may want to count records that meet certain criteria. This is as
    simple as adding a `WHERE` clause to the `SELECT` query as you’ve previously done.


    Let’s say you needed to find the number of `employees` with a `salary` of less
    than or equal to 40000. A query to do this would be:


    ```sql

    SELECT COUNT(*)

    FROM employee

    WHERE salary <= 40000;

    ```


    This uses the `COUNT(*)` function along with a `WHERE` clause for just the employees
    we want to count. The results are:


    | COUNT(*) |

    | --- |

    | 4 |


    This query has determined there are 4 employees that meet that criterion.


    ## The AVG Function


    Oracle includes a function called `AVG`, which is short for “average.” This function
    is used to find the average of a set of number values. An average value is calculated
    by adding together all of the non-`NULL` values and dividing by the number of
    non-`NULL` values. The function looks similar to the `SUM` and `COUNT` functions:


    ```sql

    AVG ( [DISTINCT] expression)

    ```


    The parameters to this function are the same as the `COUNT` function:


    *   `expression`: This is the expression to calculate the average of, which could
    be a column in a table or some other representation of number values.

    *   `DISTINCT`: This is an optional parameter that specifies the `AVG` function
    should only average the distinct or unique values in the expression.


    Let’s take a look at some examples.


    ### Average of All Values


    One way to use the `AVG` function is to find the average of all values in a column.
    This only works with number values, so for this example you’ll need to find the
    average `salary` for all employees:


    ```sql

    SELECT AVG(salary)

    FROM employee;

    ```


    Like the `COUNT` and `SUM` functions earlier, you specify the column name inside
    the brackets. The database will look at all values in this column that are not
    `NULL`, find the average of them, and display the value to you. The result of
    this query is:


    | AVG(SALARY) |

    | --- |

    | 42125 |


    This shows the average salary is 42,125. You can check what `salary` values are
    in the table by selecting those values:


    | ID | SALARY |

    | --- | --- |

