    requires that both column names be the same.


    You could rename the id column in the `office` table to be `office_id` but that’s
    not always possible, especially if you’re working on an existing system, as it
    may cause other queries to break. Renaming a column may also cause other queries
    that use the `USING` clause to break as well!


    ### Note


    The USING clause requires that both tables contain a column with the same name.
    If this column does not contain the same data, you will get unexpected results.


    The requirement to make the column names the same is one of the reasons why I
    **don’t recommend** the `USING` clause. Another reason is the restrictions on
    the column. We joined two tables together, and in our recent examples we’ve been
    using table aliases to make it clear which tables each column comes from. The
    previous query didn’t have these aliases, so let’s add them in.


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o USING (id);

    ```


    If you run this query, you’ll get this message:


    ```

    ORA-25154: column part of USING clause cannot have qualifier

    25154\. 00000 -  "column part of USING clause cannot have qualifier"

    *Cause:    Columns that are used for a named-join (either a NATURAL join

    or a join with a USING clause) cannot have an explicit qualifier.

    *Action:   Remove the qualifier.

    Error at Line: 9 Column: 8

    ```


    This means that the `id` column inside the `USING` clause cannot have a table
    alias in the `SELECT` clause. This is because the value should be the same in
    both tables and therefore does not need a qualifier. Let’s adjust the query to
    remove this:


    ```

    SELECT id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o USING (id);

    ```


    This query will run and show the same results as earlier, even though they are
    incorrect in this example. Not being able to refer to this column with an alias
    is a small issue, but when the column in both tables is the same, it shouldn’t
    matter.


    A better way of writing this query is to use the `ON` keyword instead of the `USING`
    keyword:


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    You can add in the `office_id` here as well. The results from this query are:


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    ```


    It’s a little more typing to use the `ON` keyword, but it allows for more flexibility
    with your queries and prevents issues from arising with columns that don’t match
    but have the same name.


    ## What is a Natural Join?


    A natural join is another Oracle feature that simplifies the process of joining
    tables. It’s a variation of an inner join that allows you to join tables without
    specifying the column names.


    The syntax for a natural join is:


    ```

    SELECT columns

    FROM table1

    NATURAL JOIN table2;

    ```


    How does Oracle know how to join the two tables together if you don’t specify
    a column? With a natural join, the database will join based on the column or columns
    that have the same names.


    It works in a similar way to the `USING` keyword. If the two tables have a column
    with the same name, the join is performed on that. If there are two columns with
    the same name, both columns are used.


    ### Note


    A natural join will perform an inner join on column names that have the same name.
    This is very restrictive and can give incorrect results.'
  trans: '## USING 关键字


    在之前的章节中，你已经学习了如何编写使用 `INNER JOIN`（内连接）从两张表中获取数据的查询。在那个过程中，你需要通过指定两个需要匹配值的列来指明两张表是如何关联的。这是你运行过的查询：


    ```sql

    SELECT

    s.id,

    s.employee_id,

    s.company,

    s.meeting_date,

    e.last_name

    FROM customer_meeting s

    INNER JOIN employee e ON s.employee_id = e.id;

    ```


    SQL 中还有另一个关键字，能让你更简单地编写 `INNER JOIN` 或 `OUTER JOIN`（外连接）：那就是 `USING` 关键字。这个 `USING`
    关键字允许你指定一个列名，数据库会使用两张表中该列名的列作为连接条件。其语法如下：


    ```sql

    SELECT columns

    FROM table1

    JOIN table2 USING (column_name);

    ```


    在这个语法中，你将 `ON column=column` 替换成了 `USING(column)`。让我们用 `office` 表来演示一下。


    ## 更新 Office 表


    `office` 表目前没有链接到任何表，但设想是每个员工都将使用一个办公室。为了在我们的数据库中存储这一信息，我们需要将 `office` 表中的 `id`
    字段添加到 `employee` 表中。


    首先，我们运行一个 `ALTER TABLE` 语句：


    ```sql

    ALTER TABLE employee

    ADD office_id NUMBER(5);

    ```


    如果你在 SQL Developer 中的数据库上运行这个语句，`employee` 表中将添加一个新列。我将它命名为 `office_id`，以清楚表明该值的用途。它也是一个
    `NUMBER` 数据类型，长度为五位数，这与 `office` 表中 `id` 列的大小相同。


    当你对 `employee` 表运行 `SELECT` 查询时，这个列是空的：


    ```sql

    SELECT id, last_name, salary, office_id

    FROM employee;

    ID  LAST_NAME  SALARY  OFFICE_ID

    1   JONES      30000   (null)

    2   SMITH      35000   (null)

    3   KING       45000   (null)

    4   SIMPSON    52000   (null)

    5   ANDERSON   31000   (null)

    6   COOPER     (null)  (null)

    7   ADAMS      (null)  (null)

    8   SMITH      62000   (null)

    9   PATRICK    40000   (null)

    ```


    你可以在这个表上运行 `UPDATE` 语句来更新这些值。需要运行的更新语句如下所示。


    ```sql

    UPDATE employee SET office_id = 1 WHERE id IN (1, 4, 6, 9);

    UPDATE employee SET office_id = 2 WHERE id IN (2, 3);

    UPDATE employee SET office_id = 3 WHERE id IN (7, 8);

    COMMIT;

    ```


    这些查询使用了 `IN` 关键字，允许你通过一次查询更新多行，而无需指定多个 `OR` 语句。


    运行完那些 `UPDATE` 语句后，你可以在 `employee` 表上运行相同的 `SELECT` 查询：


    ```sql

    SELECT id, last_name, salary, office_id

    FROM employee;

    ID  LAST_NAME  SALARY  OFFICE_ID

    1   JONES      30000   1

    2   SMITH      35000   2

    3   KING       45000   2

    4   SIMPSON    52000   1

    5   ANDERSON   31000   (null)

    6   COOPER     (null)  1

    7   ADAMS      (null)  3

    8   SMITH      62000   3

    9   PATRICK    40000   1

    ```


    现在，`employee` 记录有了一个关联的 `office_id`。接下来，让我们用 `USING` 关键字编写一个 `SELECT` 查询。


    ## 使用 USING 关键字编写查询


    你可以对 `employee` 和 `office` 表使用 `USING` 关键字来编写 `SELECT` 查询。


    ```sql

    SELECT id,

    last_name,

    salary,

    address

    FROM employee

    INNER JOIN office USING (office_id);

    ```


    这个查询在 `office_id` 列上使用了 `USING` 关键字，这意味着它基于 `office_id` 列将两张表连接在一起。让我们看看结果：


    ```

    ORA-00904: "OFFICE"."OFFICE_ID": invalid identifier

    ```


    这出乎意料。为什么没有得到员工和办公室记录的列表？查询中包含了两张表和多个列。


    这是因为 `USING` 子句会在两张表中查找指定的列，并且列名必须相同。这个查询试图基于 `employee.office_id` 列与 `office.office_id`
    列相匹配来连接两张表。这就遇到了错误，因为 `employee.office_id` 列标识了办公室，但 `office.office_id` 列并不存在。


    正确的连接方式应该是匹配 `employee.office_id = office.id`。但这无法使用 `USING` 关键字实现。`USING` 关键字要求两个列名相同。


    你可以将 `office` 表中的 `id` 列重命名为 `office_id`，但这并不总是可行，特别是当你在处理现有系统时，因为它可能导致其他查询出错。重命名一个列也可能导致其他使用
    `USING` 子句的查询失效！


    ### 注意


    `USING` 子句要求两张表都包含一个同名的列。如果该列包含的数据不一致，你将得到意想不到的结果。


    要求列名相同是我 `不推荐` 使用 `USING` 子句的原因之一。另一个原因是对列的限制。我们将两张表连接在一起，在最近的示例中，我们一直使用表别名来明确每列来自哪张表。之前的查询没有这些别名，所以我们添加上。


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o USING (id);

    ```


    如果你运行这个查询，你会得到这条消息：


    ```

    ORA-25154: column part of USING clause cannot have qualifier

    25154. 00000 -  "column part of USING clause cannot have qualifier"

    *Cause:    Columns that are used for a named-join (either a NATURAL join

    or a join with a USING clause) cannot have an explicit qualifier.

    *Action:   Remove the qualifier.

    Error at Line: 9 Column: 8

    ```


    这意味着 `USING` 子句中的 `id` 列不能在 `SELECT` 子句中带有表别名。这是因为该值在两张表中应该是相同的，因此不需要限定词。让我们调整查询来移除它：


    ```sql

    SELECT id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o USING (id);

    ```


    这个查询将会运行，并显示与之前相同的结果，尽管在这个例子中它们是不正确的。不能用别名引用这个列是个小问题，但当两张表中的列确实相同时，这应该没关系。


    编写这个查询的一个更好的方法是使用 `ON` 关键字代替 `USING` 关键字：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    你也可以在这里加入 `office_id`。这个查询的结果是：


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    ```


    使用 `ON` 关键字需要多打一点字，但它让你的查询更灵活，并能防止因列名相同但内容不匹配而引发的问题。


    ## 什么是自然连接？


    自然连接是 Oracle 的另一个简化表连接过程的功能。它是内连接的一种变体，允许你在不指定列名的情况下连接表。


    自然连接的语法是：


    ```sql

    SELECT columns

    FROM table1

    NATURAL JOIN table2;

    ```


    如果你不指定列，Oracle 怎么知道如何将两张表连接起来？使用自然连接时，数据库将根据名称相同的列或列组进行连接。


    它的工作方式与 `USING` 关键字类似。如果两张表有一个同名列，连接就基于该列进行。如果有两个同名列，则两列都会被使用。


    ### 注意


    自然连接会对名称相同的列执行内连接。这非常严格，可能导致结果不正确。'
- fmt: '## 使用自然连接编写查询


    让我们再次使用`employee`和`office`表来看一个这方面的例子。


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    NATURAL JOIN office o;

    ```


    如果你运行这个查询，会看到这条消息：


    ```

    ORA-25155: column used in NATURAL join cannot have qualifier

    25155. 00000 -  "column used in NATURAL join cannot have qualifier"

    *Cause:    Columns that are used for a named-join (either a NATURAL join

    or a join with a USING clause) cannot have an explicit qualifier.

    *Action:   Remove the qualifier.

    Error at Line: 49 Column: 8

    ```


    这与`USING`连接的错误相同。你必须从`id`列中移除表别名。我猜是`id`列，因为我知道该列在两个表中是共同的。


    ```sql

    SELECT id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    NATURAL JOIN office o;

    ```


    如果你运行这个查询，会得到这些结果。


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   3          10 Collins Road

    ```


    这些结果与我们使用`USING`关键字得到的不正确结果相同。这是因为连接是在两个表的`id`列上执行的，而不是在`employee.office_id =
    office.id`上执行的。令人担忧的是，这并没有显示错误。结果显示了，但它们是不正确的。


    因为列名需要匹配，我不推荐使用`NATURAL JOIN`。


    不建议使用`NATURAL JOIN`还有几个其他原因：


    *   如果存在多个同名列，它们也会被包含在连接条件中，从而在不显示错误的情况下给你带来不正确的结果。

    *   如我们之前所见，你不能对这些列使用表别名。

    *   这不能用于外连接。它使用的是内连接。


    就像`USING`关键字一样，我不推荐自然连接。我建议改用带`ON`关键字的内连接。


    ## 什么是交叉连接？


    *交叉连接*是另一种很少使用但值得了解的连接类型。让我们用一个例子来演示一下。


    假设你想查看所有员工及其办公室。你可能会编写这样一个查询：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e,

    office o;

    ```


    你运行查询，得到类似这样的结果：


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   1          123 Smith Street

    3   KING       45000   1          123 Smith Street

    4   SIMPSON    52000   1          123 Smith Street

    5   ANDERSON   31000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  1          123 Smith Street

    8   SMITH      62000   1          123 Smith Street

    9   PATRICK    40000   1          123 Smith Street

    1   JONES      30000   2          45 Main Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   2          45 Main Street

    5   ANDERSON   31000   2          45 Main Street

    6   COOPER     (null)  2          45 Main Street

    7   ADAMS      (null)  2          45 Main Street

    8   SMITH      62000   2          45 Main Street

    9   PATRICK    40000   2          45 Main Street

    1   JONES      30000   3          10 Collins Road

    2   SMITH      35000   3          10 Collins Road

    3   KING       45000   3          10 Collins Road

    4   SIMPSON    52000   3          10 Collins Road

    5   ANDERSON   31000   3          10 Collins Road

    6   COOPER     (null)  3          10 Collins Road

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   3          10 Collins Road

    ```


    这里发生了什么？你预期有八或九条记录，却发现了27条。这种类型的结果被称为*笛卡尔积*，即第一个表中的每一行都与第二个表中的每一行相关联。


    如果你仔细查看结果，可以看到它列出了所有员工并显示第一个办公室的地址，然后再次列出所有员工并显示第二个办公室的地址。它对第三个办公室重复此操作，27条结果来自九名员工乘以三个办公室。如果我们有更多的办公室，我们会得到更多的结果。


    为什么会这样？这是因为我们从两个表中选择数据时没有指定连接条件。这是我们的查询：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e,

    office o;

    ```


    其中没有`INNER JOIN`或`OUTER JOIN`，也没有提及任何需要匹配的列。这会导致笛卡尔积，而这几乎肯定不是你想要的。运行一个显示27条结果而不是八或九条的查询可能还不算太糟，但如果你有成百上千条记录，那么最终可能会得到一个非常大的结果集。


    这种情况经常在忘记添加连接条件时意外发生。然而，有一种方法可以明确指定你需要这种类型的连接。


    ## 使用交叉连接


    交叉连接是一种会返回笛卡尔积结果的连接类型。它允许你将一个表中的所有记录与另一个表中的所有记录刻意匹配。


    为什么你会想要这样做呢？这是为表或查询生成数据的一种简便方法，这可能是你当前项目需要做的事情。


    交叉连接的语法如下所示：


    ```sql

    SELECT columns

    FROM table1

    CROSS JOIN table2;

    ```


    你可以将其应用于你的员工和办公室查询，如下所示：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    CROSS JOIN office o;

    ```


    这将显示与之前相同的结果：同样的27条记录。


    为什么你要写`CROSS JOIN`而不是使用之前的方法？在SQL中，有几种方法可以完成相同的任务，有时你会得到一个没有显示错误但不完全符合你想要的结果。使用`CROSS
    JOIN`的原因是为了明确表示你打算将一个表中的每条记录与另一个表中的每条记录连接起来。根据经验，故意编写`CROSS JOIN`的情况非常罕见。大多数时候，如果你看到之前显示的那种结果，通常是因为你的查询中有错误。如果你使用第一种方法编写查询，并不能清楚地表明你是故意的还是无意的。


    ## 替代连接语法


    到目前为止，你已经学习了使用`JOIN`关键字的各种变体来连接两个表：


    *   `JOIN`, `INNER JOIN`

    *   `LEFT JOIN`, `LEFT OUTER JOIN`

    *   `RIGHT JOIN`, `RIGHT OUTER JOIN`

    *   `CROSS JOIN`


    这组关键字被称为ANSI连接语法，因为它是SQL ANSI标准的一部分。还有一种连接表的替代语法，通常称为Oracle语法，因为它是Oracle SQL特有的。


    当你编写一个连接两个表的查询时，你实际上是在说，“显示这些列，其中这个表的列等于那个表的列。” 这听起来很像`WHERE`子句的功能。


    替代连接语法做的正是这件事。它使用`WHERE`子句来执行连接。对于处理外连接，有一些Oracle特有的额外符号。'
  raw: '## Writing a Query with a Natural Join


    Let’s see an example of this using the `employee` and `office` tables again.


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    NATURAL JOIN office o;

    ```


    If you run that query, you’ll get this message:


    ```

    ORA-25155: column used in NATURAL join cannot have qualifier

    25155\. 00000 -  "column used in NATURAL join cannot have qualifier"

    *Cause:    Columns that are used for a named-join (either a NATURAL join

    or a join with a USING clause) cannot have an explicit qualifier.

    *Action:   Remove the qualifier.

    Error at Line: 49 Column: 8

    ```


    This is the same error as the `USING` join . You’ll have to remove the table alias
    from the `id` column. I’m guessing it’s the `id` column, as I know that column
    is common between both tables.


    ```

    SELECT id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    NATURAL JOIN office o;

    ```


    If you run this query, you’ll get these results.


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   3          10 Collins Road

    ```


    These are the same incorrect results we got with the `USING` keyword. This is
    because the join is performed on the `id` column in both tables, rather than `employee.office_id
    = office.id`. The worrying part of this is that an error is not shown. The results
    are shown but they are not correct.


    Because the column names need to match, I don’t recommend the `NATURAL JOIN`.


    There are a few other reasons why it’s not a good idea to use a `NATURAL JOIN`:


    *   If there are multiple columns with the same name, they will also get included
    in the join criteria, giving you incorrect results without showing an error.


    *   You can’t use table aliases with these columns, as we saw earlier.


    *   This can’t be used with an outer join. It uses an inner join.


    Just like the `USING` keyword, I don’t recommend the natural join. I suggest using
    an inner join with the `ON` keyword instead.


    ## What is a Cross Join?


    A *cross join* is another type of join that is rarely used, but good to know about.
    Let’s demonstrate this with an example.


    Let’s say you want to see all employees and their offices. You write a query like
    this:


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e,

    office o;

    ```


    You run the query, and get results like this:


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   1          123 Smith Street

    3   KING       45000   1          123 Smith Street

    4   SIMPSON    52000   1          123 Smith Street

    5   ANDERSON   31000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  1          123 Smith Street

    8   SMITH      62000   1          123 Smith Street

    9   PATRICK    40000   1          123 Smith Street

    1   JONES      30000   2          45 Main Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   2          45 Main Street

    5   ANDERSON   31000   2          45 Main Street

    6   COOPER     (null)  2          45 Main Street

    7   ADAMS      (null)  2          45 Main Street

    8   SMITH      62000   2          45 Main Street

    9   PATRICK    40000   2          45 Main Street

    1   JONES      30000   3          10 Collins Road

    2   SMITH      35000   3          10 Collins Road

    3   KING       45000   3          10 Collins Road

    4   SIMPSON    52000   3          10 Collins Road

    5   ANDERSON   31000   3          10 Collins Road

    6   COOPER     (null)  3          10 Collins Road

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   3          10 Collins Road

    ```


    What has happened here? You were expecting eight or nine records but have found
    27\. This type of result is called a *Cartesian product* , and it is where every
    row in the first table is related to every row in the second table.


    If you look closely at your results, you can see it lists all employees and shows
    the address for the first office, then lists all employees again and shows the
    address of the second office. It repeats this for the third office, and the 27
    results come from nine employees multiplied by three offices. If we had more offices,
    we would get even more results.


    Why did this happen? It’s because we selected data from two tables without specifying
    a join condition. This was our query:


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e,

    office o;

    ```


    There was no `INNER JOIN` or `OUTER JOIN` or mention of any columns that need
    to match. This results in a Cartesian product and is almost certainly not what
    you want. Running a query that shows 27 results instead of eight or nine is not
    so bad, but if you have hundreds or thousands of records, then you could end up
    with a very large result set.


    It often happens accidentally, if you forget to add in the join condition like
    this. However, there is a way to specify that you do want this type of join.


    ## Using a CROSS JOIN


    A cross join is a type of join that will return a Cartesian product result. It
    will allow you to deliberately match all records in one table with all records
    in another table.


    Why would you ever want to do this? It’s an easy way to generate data for a table
    or a query, which may be something you need to do for the project you’re working
    on.


    The syntax of a cross join looks like this:


    ```

    SELECT columns

    FROM table1

    CROSS JOIN table2;

    ```


    You can apply this to your employee and office query like this:


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    CROSS JOIN office o;

    ```


    This will show the same results as earlier: the same 27 records.


    Why would you write a `CROSS JOIN` instead of the earlier method? In SQL, there
    are several ways of doing the same task, and sometimes you get a result that doesn’t
    show an error but isn’t quite what you wanted. The reason to use a `CROSS JOIN`
    is to specify that you intended to join every record in one table to every record
    in another table. From experience, it''s very rare for a `CROSS JOIN` to be written
    on purpose. Most of the time if you see the kind of results shown previously,
    it is usually because of an error in your query. If you write the query using
    the first method, it isn’t clear if you did this deliberately or accidentally.


    ## Alternative Join Syntax


    So far you have learned to join two tables together using variations of the JOIN
    keyword:


    *   JOIN, INNER JOIN


    *   LEFT JOIN, LEFT OUTER JOIN


    *   RIGHT JOIN, RIGHT OUTER JOIN


    *   CROSS JOIN


    This set of keywords is called the ANSI join syntax, as it is part of the ANSI
    standard of SQL. There is an alternative syntax for joining tables together that’s
    often called the Oracle syntax, as it’s specific to Oracle SQL.


    When you write a query that joins two tables together, you are essentially saying,
    “show me these columns where this table’s column is equal to that table’s column.”
    This sounds a lot like the functionality of a `WHERE` clause.


    The alternative join syntax does exactly that. It uses a `WHERE` clause to perform
    a join. There are some extra symbols for handling outer joins that are Oracle-specific.'
  trans: '## 使用自然连接编写查询


    让我们再次使用`employee`和`office`表来看一个这方面的例子。


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    NATURAL JOIN office o;

    ```


    如果你运行这个查询，会看到这条消息：


    ```

    ORA-25155: column used in NATURAL join cannot have qualifier

    25155. 00000 -  "column used in NATURAL join cannot have qualifier"

    *Cause:    Columns that are used for a named-join (either a NATURAL join

    or a join with a USING clause) cannot have an explicit qualifier.

    *Action:   Remove the qualifier.

    Error at Line: 49 Column: 8

    ```


    这与`USING`连接的错误相同。你必须从`id`列中移除表别名。我猜是`id`列，因为我知道该列在两个表中是共同的。


    ```sql

    SELECT id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    NATURAL JOIN office o;

    ```


    如果你运行这个查询，会得到这些结果。


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   3          10 Collins Road

    ```


    这些结果与我们使用`USING`关键字得到的不正确结果相同。这是因为连接是在两个表的`id`列上执行的，而不是在`employee.office_id =
    office.id`上执行的。令人担忧的是，这并没有显示错误。结果显示了，但它们是不正确的。


    因为列名需要匹配，我不推荐使用`NATURAL JOIN`。


    不建议使用`NATURAL JOIN`还有几个其他原因：


    *   如果存在多个同名列，它们也会被包含在连接条件中，从而在不显示错误的情况下给你带来不正确的结果。

    *   如我们之前所见，你不能对这些列使用表别名。

    *   这不能用于外连接。它使用的是内连接。


    就像`USING`关键字一样，我不推荐自然连接。我建议改用带`ON`关键字的内连接。


    ## 什么是交叉连接？


    *交叉连接*是另一种很少使用但值得了解的连接类型。让我们用一个例子来演示一下。


    假设你想查看所有员工及其办公室。你可能会编写这样一个查询：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e,

    office o;

    ```


    你运行查询，得到类似这样的结果：


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   1          123 Smith Street

    3   KING       45000   1          123 Smith Street

    4   SIMPSON    52000   1          123 Smith Street

    5   ANDERSON   31000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  1          123 Smith Street

    8   SMITH      62000   1          123 Smith Street

    9   PATRICK    40000   1          123 Smith Street

    1   JONES      30000   2          45 Main Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   2          45 Main Street

    5   ANDERSON   31000   2          45 Main Street

    6   COOPER     (null)  2          45 Main Street

    7   ADAMS      (null)  2          45 Main Street

    8   SMITH      62000   2          45 Main Street

    9   PATRICK    40000   2          45 Main Street

    1   JONES      30000   3          10 Collins Road

    2   SMITH      35000   3          10 Collins Road

    3   KING       45000   3          10 Collins Road

    4   SIMPSON    52000   3          10 Collins Road

    5   ANDERSON   31000   3          10 Collins Road

    6   COOPER     (null)  3          10 Collins Road

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   3          10 Collins Road

    ```


    这里发生了什么？你预期有八或九条记录，却发现了 27 条。这种类型的结果被称为*笛卡尔积*，即第一个表中的每一行都与第二个表中的每一行相关联。


    如果你仔细查看结果，可以看到它列出了所有员工并显示第一个办公室的地址，然后再次列出所有员工并显示第二个办公室的地址。它对第三个办公室重复此操作，27 条结果来自九名员工乘以三个办公室。如果我们有更多的办公室，我们会得到更多的结果。


    为什么会这样？这是因为我们从两个表中选择数据时没有指定连接条件。这是我们的查询：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e,

    office o;

    ```


    其中没有`INNER JOIN`或`OUTER JOIN`，也没有提及任何需要匹配的列。这会导致笛卡尔积，而这几乎肯定不是你想要的。运行一个显示 27 条结果而不是八或九条的查询可能还不算太糟，但如果你有成百上千条记录，那么最终可能会得到一个非常大的结果集。


    这种情况经常在忘记添加连接条件时意外发生。然而，有一种方法可以明确指定你需要这种类型的连接。


    ## 使用交叉连接


    交叉连接是一种会返回笛卡尔积结果的连接类型。它允许你将一个表中的所有记录与另一个表中的所有记录刻意匹配。


    为什么你会想要这样做呢？这是为表或查询生成数据的一种简便方法，这可能是你当前项目需要做的事情。


    交叉连接的语法如下所示：


    ```sql

    SELECT columns

    FROM table1

    CROSS JOIN table2;

    ```


    你可以将其应用于你的员工和办公室查询，如下所示：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    CROSS JOIN office o;

    ```


    这将显示与之前相同的结果：同样的 27 条记录。


    为什么你要写`CROSS JOIN`而不是使用之前的方法？在 SQL 中，有几种方法可以完成相同的任务，有时你会得到一个没有显示错误但不完全符合你想要的结果。使用`CROSS
    JOIN`的原因是为了明确表示你打算将一个表中的每条记录与另一个表中的每条记录连接起来。根据经验，故意编写`CROSS JOIN`的情况非常罕见。大多数时候，如果你看到之前显示的那种结果，通常是因为你的查询中有错误。如果你使用第一种方法编写查询，并不能清楚地表明你是故意的还是无意的。


    ## 替代连接语法


    到目前为止，你已经学习了使用`JOIN`关键字的各种变体来连接两个表：


    *   `JOIN`, `INNER JOIN`

    *   `LEFT JOIN`, `LEFT OUTER JOIN`

    *   `RIGHT JOIN`, `RIGHT OUTER JOIN`

    *   `CROSS JOIN`


    这组关键字被称为 ANSI 连接语法，因为它是 SQL ANSI 标准的一部分。还有一种连接表的替代语法，通常称为 Oracle 语法，因为它是 Oracle
    SQL 特有的。


    当你编写一个连接两个表的查询时，你实际上是在说，“显示这些列，其中这个表的列等于那个表的列。” 这听起来很像`WHERE`子句的功能。


    替代连接语法做的正是这件事。它使用`WHERE`子句来执行连接。对于处理外连接，有一些 Oracle 特有的额外符号。'
- fmt: '### Inner Join


    这种替代连接语法是什么样的？它是一个`WHERE`子句：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e, office o

    WHERE e.office_id = o.id;

    ```


    以这种方式编写查询涉及将表名放入`FROM`子句，作为逗号分隔的列表。默认情况下，这被视为一个`CROSS JOIN`，其中来自两个表的每条记录都会连接在一起。然后，你使用`WHERE`子句来指定两个表连接所依据的列，从而将结果缩减为有意义的记录。


    此查询的结果是：


    ```sql

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    ```


    这显示了所有有办公室的员工及其办公地址。它与执行一个`INNER JOIN`相同，但表匹配的条件写在`WHERE`子句中，而不是`ON`关键字后面。我们刚刚编写的查询等同于这个：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    ### Outer Join


    前面的例子展示了如何使用替代语法（在`WHERE`子句中）编写内连接。如何使用这种语法编写外连接呢？


    Oracle提供了一些符号，你可以用在查询中，在`WHERE`子句中创建外连接。你可以在`WHERE`子句中，将`+`符号放在你预期可能为`NULL`的列旁的括号`()`内。


    要编写一个`LEFT OUTER JOIN`（显示左表的记录，右表显示匹配项或`NULL`值），可以使用以下查询：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e, office o

    WHERE e.office_id = o.id(+);

    ```


    注意，`(+)`符号出现在`o.id`列之后，分号之前。它是SQL语句的一部分，并且与`office.id`列相关联，这意味着该表的记录可能为空。


    结果是：


    ```sql

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    5   ANDERSON   31000   (null)     (null)

    ```


    这与`LEFT OUTER JOIN`显示的内容相同。所有`employee`记录都被显示，并且显示了他们的办公信息。对于员工5，`office_id`和`address`显示为`NULL`值，因为他们没有`office`。


    右外连接可以通过将`(+)`放在另一列上来编写：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e, office o

    WHERE e.office_id(+) = o.id;

    ```


    ```sql

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    ```


    此查询显示了所有`office`记录及其关联的`employee`记录。员工5未被显示，因为他们没有`office`。这等同于`RIGHT OUTER JOIN`。


    ### Why You Shouldn''t Use the Alternative Join Syntax


    现在你已经看到在Oracle SQL中有两种执行连接的方法。然而，我建议使用ANSI风格（使用`JOIN`关键字）而不是替代风格（使用`WHERE`子句）。原因如下。


    **意图**。`WHERE`子句的意图是限制结果集中的数据。使用`WHERE`子句来连接两个表虽然有效，但这并非`WHERE`子句的本意。在连接两个表时，这看起来很简单，但在下一章我们将学习如何连接多个表。一旦开始处理更大、更复杂的查询，它们通常会有包含大量条件的`WHERE`子句，如果过滤行的逻辑与连接表的逻辑分开，会更容易处理。


    **减少错误**。使用`JOIN`关键字，发生错误或结果集问题的几率非常低，因为你在查询中包含每个表时，都指定了它们如何连接。如果使用`WHERE`子句，你在`FROM`子句中指定所有表，然后在`WHERE`子句中指定条件。当你连接多个表时，你有可能忘记在`WHERE`子句中添加连接表的条件。这可能导致笛卡尔积（如我们之前所见），并产生不正确的结果。在我的职业生涯中，我犯过无数次这样的错误。


    **灵活**。使用`JOIN`关键字可以让你在需要时轻松更改连接类型，并允许你使用其他连接类型，如`FULL OUTER JOIN`。而使用`WHERE`子句中的连接，执行`FULL
    OUTER JOIN`更困难，并且将符号从一侧更改到另一侧需要更多工作。


    因此，每当需要连接表时，我建议使用`JOIN`关键字而不是`WHERE`子句。如果你遇到在`WHERE`子句中连接数据的代码，你将能够理解它的作用，并有机会更改它。


    ## Summary


    `USING`关键字允许你在两个表中列名相同的列上连接它们。它更容易输入，但它依赖于你的列名匹配，而这并不总是可行。


    自然连接是一种内连接，其中Oracle数据库基于所有名称相同的列来连接两个表。这容易出问题，就像`USING`关键字一样，因为它依赖于列名匹配。


    交叉连接是一种将一张表中的所有记录与另一张表中的所有记录相关联的连接类型。这会导致笛卡尔积，如果你不指定连接类型，也会发生这种情况。这通常是一个意外，但在某些情况下你可能想要交叉连接，Oracle提供了`CROSS
    JOIN`关键字来实现这一点。


    最后，还有一种替代连接语法，或称为Oracle连接语法，它允许你使用`WHERE`子句和一些符号来执行内连接和外连接。这是一种较旧的语法风格，不推荐使用，因为它违背了`WHERE`子句的意图，并且容易出错。


    # 21. Joining Many Tables


    在本章中，我们将学习如何使用SQL在查询中连接许多表。到目前为止，我们已经了解了不少关于连接的知识：


    *   什么是连接（一种在查询中关联两个表的方式）

    *   什么是内连接和外连接

    *   不同类型的外连接（左、右、全）

    *   一些可用的其他连接类型（交叉连接）或不推荐使用的类型（自然连接）

    *   替代连接语法（`WHERE`子句）


    到目前为止的所有主题都只涉及一次操作两个表：要么是`employee`和`office`表，要么是`employee`和`sales_meeting`表。如果我们想同时从三个表中获取数据该怎么办？'
  raw: '### Inner Join


    What does this alternative join syntax look like? It’s a `WHERE` clause:


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e, office o

    WHERE e.office_id = o.id;

    ```


    Writing a query this way involves putting the table names into the FROM clause
    as a comma-separated list. By default, this is treated as a CROSS JOIN, where
    every record from both tables is joined together. You then use the WHERE clause
    to specify the columns that the two tables are joined on, so that you can reduce
    the results to something that makes sense.


    The results of this query are:


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    ```


    This shows all employees that have offices, and their office address. It’s the
    same as performing an `INNER JOIN`, but the criteria for matching the tables is
    written in the `WHERE` clause instead of the `ON` keyword. The query we just wrote
    is equal to this one:


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    ### Outer Join


    The example earlier showed how to write an inner join using the alternative syntax
    (in the WHERE clause). How can you write an outer join using this syntax?


    Oracle has some symbols you can use in your queries to create an outer join with
    the `WHERE` clause. You can enter a + symbol inside brackets () next to the column
    in the `WHERE` clause that you expect could be `NULL`.


    To write a `LEFT OUTER JOIN`, where the records from the left table are shown
    and the right table either shows matches or a `NULL` value, this query can be
    used:


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e, office o

    WHERE e.office_id = o.id(+);

    ```


    Notice that the (+) symbol comes after the `o.id` column and before the semicolon.
    It’s part of the SQL statement, and it’s associated with the `office.id` column,
    which means that table’s records may be blank.


    The results are:


    ```

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    5   ANDERSON   31000   (null)     (null)

    ```


    This shows the same as a `LEFT OUTER JOIN`. All `employee` records are shown,
    and their office values are shown. A `NULL` value is shown for the `office_id`
    and `address` for employee 5, as they have no `office`.


    A right outer join can be written by placing the (+) on the other column instead:


    ```

    SELECT e.id,

    e.last_name,

    e.salary,

    e.office_id,

    o.address

    FROM employee e, office o

    WHERE e.office_id(+) = o.id;

    ID  LAST_NAME  SALARY  OFFICE_ID  ADDRESS

    1   JONES      30000   1          123 Smith Street

    2   SMITH      35000   2          45 Main Street

    3   KING       45000   2          45 Main Street

    4   SIMPSON    52000   1          123 Smith Street

    6   COOPER     (null)  1          123 Smith Street

    7   ADAMS      (null)  3          10 Collins Road

    8   SMITH      62000   3          10 Collins Road

    9   PATRICK    40000   1          123 Smith Street

    ```


    This query shows all `office` records and their associated `employee` records.
    Employee 5 is not shown as they do not have an `office`. This is the same as a
    RIGHT OUTER JOIN.


    ### Why You Shouldn’t Use the Alternative Join Syntax


    Now you have seen there are two ways to perform joins in Oracle SQL. However,
    I recommend using the ANSI-style (with the JOIN keywords) rather than the alternative
    style (with the WHERE clause). There are several reasons for this.


    **Intention** . The intention of the `WHERE` clause is to restrict data from your
    result set. Using the `WHERE` clause to join two tables together will work, but
    it’s not the intention of the `WHERE` clause. This may seem simple to do when
    joining two tables together, but in the next chapter we’ll learn how to join multiple
    tables. Once you start working with larger and more complex queries, they often
    have `WHERE` clauses with a lot of criteria, and it’s easier to work with if the
    logic to filter the rows is separate to the logic to join tables.


    **Reduce Errors** . With the `JOIN` keywords, there is a very low chance of getting
    errors or issues with your result set, because you’re specifying how each table
    is joined as you’re including it in your query. If you use the `WHERE` clause,
    you specify all of your tables in the `FROM` clause and then the criteria in the
    `WHERE` clause. As you join several tables together, there is a chance you will
    forget to add in the `WHERE` clause that joins the tables together. This can result
    in a Cartesian product, as we saw earlier, and will result in incorrect results.
    I’ve done this more times than I can count in my career.


    **Flexible** . Using the `JOIN` keywords allows you to easily change the join
    types if needed and allows you to use other join types like a `FULL OUTER JOIN`.
    Using the joins in the `WHERE` clause, it’s harder to do a `FULL OUTER JOIN` and
    takes a bit more work to change the symbol from one side to another.


    So, whenever you need to join tables together, I recommend using the `JOIN` keywords
    rather than the `WHERE` clause. If you come across code that joins data in the
    `WHERE` clause, you’ll be able to understand what it does and have the opportunity
    to change it.


    ## Summary


    The `USING` keyword allows you to join two tables together on a column name that
    is the same in both tables. It’s easier to type but it relies on your column names
    matching, which won’t always work.


    The natural join is a type of inner join where the Oracle database joins the two
    tables based on all columns that have the same name. This is prone to issues,
    just like the `USING` keyword, as it relies on column names matching.


    A cross join is a type of join that relates all records in one table with all
    records in another table. This results in a Cartesian product, which also happens
    if you don’t specify a join type. This is often an accident, but there are some
    situations where you want a cross join, and Oracle provides the `CROSS JOIN` keyword
    to do this.


    Finally, there is an alternative join syntax, or an Oracle join syntax, which
    allows you to perform inner and outer joins using the `WHERE` clause and some
    symbols. This is an older style syntax and is not recommended, as it’s against
    the intention of the `WHERE` clause and prone to errors.


    # 21. Joining Many Tables


    In this chapter, we’ll learn how to use SQL to join many tables together in our
    query. So far, we’ve learned quite a bit about joins:


    *   What a join is (a way of relating two tables together in a query)


    *   What an inner and outer join is


    *   The different types of outer joins (left, right, full)


    *   Some other join types that are available if needed (cross join) or that are
    not recommended (natural join)


    *   The alternative join syntax (the WHERE clause)


    All of the topics so far have only worked with two tables at a time: either the
    `employee` and `office` table, or the `employee` and `sales_meeting` table. What
    if we want to get data from three tables at once?'
