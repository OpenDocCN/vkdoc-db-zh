    \ 语句允许使用更复杂的条件，例如多个条件、通配符检查、大于和小于检查以及对多个字段的检查。你可以看到以下示例，它使用了与之前简单 `CASE` 语句相同的逻辑，但采用了搜索式\
    \ `CASE` 语句的格式：\n\n```sql\nCASE\nWHEN last_name = 'JONES' THEN 'The name is Jones'\n\
