    ## Introduction


    Welcome to “Beginning SQL for Oracle Database 18C”! Thanks for picking up this
    book. It’s safe to say you’re interested in learning about Oracle database, as
    that’s what this book is about. Why Oracle database, and why this book?


    Oracle Database is one of the most popular database management systems in the
    world. The website `db-engines.com`, which ranks the popularity of databases based
    on several factors, has Oracle at #1 as of late 2018. It’s used in many large
    organizations, and the main competitor is Microsoft’s SQL Server. Learning Oracle
    `SQL` will put you in a good position when looking for a job with any company
    using an Oracle database.


    Why this book? This book will help you get started with learning `SQL` on the
    latest version of Oracle’s database: 18c. Version 18c was announced in late 2017
    by Oracle and released in mid-late 2018 for the developer community. Learning
    how to use the latest version of Oracle will be very helpful for your career,
    because when organizations upgrade their version of Oracle to version 18c, you’ll
    know how to work with it.


    This book is also targeted toward beginners. You’ll start by learning what a database
    is, how to install the tools you need, and all of the commands of `SQL` (Structured
    Query Language) to get you up and running with Oracle database. No experience
    with databases is needed at all. If you have worked with other databases such
    as `SQL Server` or `MySQL`, you might pick up the concepts easier because there
    are some common areas.


    ## What You’ll Learn


    This book is broken up into several different parts, and many different chapters.
    Here’s a summary of what you’ll learn.


    ### Part I: Setting Up


    **Chapter 1: What is a Database?** This chapter explains what a database is. It
    explains some of the common terms such as table, row, and what `SQL` is. It also
    mentions who the different vendors are, such as Oracle.


    **Chapter 2: Setting Up.** In this chapter you’ll learn how to set up your very
    own Oracle database. You’ll learn how to download the required software from the
    Oracle website, which includes Oracle’s free version of their database called
    Oracle Express, and a development tool called Oracle `SQL Developer`. There are
    step-by-step instructions along with screenshots.


    ### Part II: Viewing Data


    **Chapter 3: Retrieving Data.** This chapter introduces the `SELECT` statement,
    which you can use to retrieve data from the database and view it.


    **Chapter 4: Selecting Specific Columns.** This chapter expands on the previous
    chapter and shows you how to view individual columns using the `SELECT` statement.


    **Chapter 5: Restricting the Results.** You’ll learn how to use the `WHERE` clause
    to see only some of the records in a table, because there are times you don’t
    want to see every record.


    **Chapter 6: Comparing Data.** Sometimes you may want to filter on a partial match,
    and you’ll learn how to do that in this chapter.


    **Chapter 7: Applying Multiple Filters.** `SQL` allows you to filter the records
    on multiple criteria. In this chapter, you’ll learn how to do that.


    **Chapter 8: Working with Nulls.** Databases have a concept called `NULL`, which
    represents an unknown value. You’ll learn more about what this means and how to
    handle it in your queries.


    **Chapter 9: Removing Duplicate Results.** You’ll occasionally get duplicate results
    when writing queries. This chapter will explain how to remove the duplicates and
    just see the unique results.


    **Chapter 10: Applying Filters on Lists and Ranges of Values.** This chapter will
    explain how to filter your results using multiple values more efficiently by using
    lists of values.


    **Chapter 11: Ordering Your Data.** If you ever need to show your data in a specific
    order, you’ll know how to do that after reading this chapter.


    **Chapter 12: Applying Table and Column Aliases.** You’ll learn what table aliases
    and column aliases are, and their advantages, in this chapter.


    ### Part III: Adding, Updating, Deleting Data


    **Chapter 13: Understanding the Data Types.** Oracle supports many different types
    of data, each of which have their own purpose. In this chapter, you’ll learn about
    a few of the main data types.


    **Chapter 14: Creating a Table.** Data is stored in tables in a database, and
    this chapter will show you how you can create a table.


    **Chapter 15: Adding Data to a Table.** To view data in a table, it first needs
    to be added to a table. This chapter explains how to do that in `SQL`.


    **Chapter 16: Updating and Removing Data.** Occasionally you’ll need to make changes
    to data that already exists in the database. You can do that in Oracle `SQL` and
    this chapter will show you how.


    **Chapter 17: Updating or Deleting a Table.** This chapter explains how to make
    changes to the structure of a table or delete it if it’s no longer needed.'
