    ```


    这样你可以看到第一条记录的 `employee` 值为 5，它指向 `employee` 表中 `ID` 为 5 的员工。你还可以看到第二条记录的 `employee`
    值为 2，它指向 `employee` 表中一条 `last_name` 为 SMITH 的记录。这样就清楚它指向的是两条 SMITH 记录中的哪一条。


    使用数据库列来存储另一个表的主键的概念称为 `foreign key`。在此示例中，`sales_meeting` 表中的 `employee` 列就是一个外键。


    就像使用主键一样，外键是一种良好的数据库设计技术，可以避免前面提到的所有问题。我们如何在创建表时指定外键呢？


    目前，我们的 `sales_meeting` 表的 `CREATE TABLE` 语句如下：


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee VARCHAR2(200),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    首先，你需要将 `employee` 列的数据类型从 `VARCHAR2` 改为 `NUMBER` 类型，以匹配 `employee` 表中的 `ID`。你也可以将列名从
    `employee` 改为 `employee_id`，以明确表示它指向 `employee` 表的 `id`。


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee_id NUMBER(5),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    现在，你需要添加一些代码来指定外键。你可以保持语句原样，这样就可以向此表添加 `employee ID`。但是，你想要添加一种称为 `foreign key
    constraint` 的东西，以明确指定它是一个外键，并利用数据库的一些优势。


    `constraint` 是你可以添加到表中的东西，用于指定可添加数据的规则。这意味着你将无法向 `employee_id` 列添加在 `employee`
    表中没有对应记录的数字，从而提高了数据质量。


    我们将在后面的章节中探讨如何添加外键约束，因为每个外键都需要一个对应的主键，而我们尚未向 `employee` 表添加主键。


    创建 `sales_meeting` 表的最终代码如下：


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee_id NUMBER(5),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    你现在可以在 SQL Developer 中运行此查询。表应该会像创建 `office` 表一样被创建。在后面的章节中，我们将学习如何从两个表中获取数据。


    ## 总结


    在 SQL 中创建表可以使用名为 `CREATE TABLE` 的 SQL 命令完成。当你无法访问 SQL Developer，或者将此语句作为更大集合的一部分运行时，使用
    SQL 命令很有帮助。


    主键是你可以应用于列的数据库功能，它确保列值是唯一的并标识表中的行。外键是另一个应用于列的数据库功能，它存储另一个表的主键，并防止重复存储相同的数据。


    ## 15. 向表中添加数据


    到目前为止，我们一直在使用的数据库有三个表：`employee`、`office` 和 `sales_meeting`。其中只有一个表包含数据：`employee`
    表。向表中添加数据是创建表之后的一个独立步骤。


    在本书前面，当你向 `employee` 表添加数据时，你使用了 SQL Developer 中的菜单选项。你在设置表时和向表中添加更多数据时都这样做过。然而，正如我们了解到创建表可以使用语句一样，添加数据也可以使用
    SQL 语句。


    使用 SQL 语句向表添加数据的原因与使用 `CREATE TABLE` 语句创建表的原因相同：


    *   当你使用不同的 IDE 或无法访问 SQL Developer 时，可以使用它。

    *   它更快。

    *   它可以作为更大步骤集合的一部分使用。


    在 Oracle SQL 中，你可以使用 `INSERT` 语句向表中添加数据。'
- fmt: "## The INSERT Statement\n\nThe `INSERT` statement is an SQL statement that\
    \ lets you add data to a table. You specify the table, the columns, and the values\
    \ you want to add, and when you run the statement the data is added to the table.\
    \ The `INSERT` statement looks like this:\n\n```sql\nINSERT INTO tablename (columns)\
    \ VALUES (values_to_insert);\n```\n\nIt starts off with `INSERT INTO`, which are\
    \ SQL keywords that indicate you want to insert data. You then specify the `tablename`,\
    \ which is the table that the data is to be inserted into. Next, you specify the\
    \ columns, which are the specific columns you want to add data to. After that,\
    \ you have the keyword `VALUES`, then inside brackets the values that you want\
    \ to insert into the table.\n\nThe reason you specify the columns when inserting\
    \ data into a table is because not every column might be needed. You may want\
    \ to leave some columns blank. It’s also used so the database knows which values\
    \ are meant for each column.\n\nWhen you write an `INSERT` statement, it often\
    \ has multiple columns:\n\n```sql\nINSERT INTO tablename (col1, col2, col3) VALUES\
    \ (val1, val2, val3);\n```\n\nYou need to specify the same number of columns from\
    \ the table (the first brackets) as the `VALUES` section (the second brackets).\
    \ In this example, `val1` will be added to column `col1`, `val2` is added to column\
    \ `col2`, and `val3` is added to column `col3`.\n\nLet’s see an example. Let’s\
    \ say you wanted to add a new record to the `office` table. The `office` table\
    \ had columns for the `id` and `address`. Our `INSERT` statement would start like\
    \ this:\n\n```sql\nINSERT INTO office (id, address) VALUES (\n```\n\nNext, you\
    \ need to specify the values to insert. We want to insert our first record, so\
    \ we have an ID of `1` and an address of `'123 Smith Street'`. Our statement looks\
    \ like this:\n\n```sql\nINSERT INTO office (id, address) VALUES (1, '123 Smith\
    \ Street');\n```\n\nWe have two columns and two values. The values are separated\
    \ by a comma. The first value represents the `id` and the second value represents\
    \ the `address`. The `id` value is a number, so it does not need to be enclosed\
    \ in single quotes. The `address` value is a text value, so it needs to be inside\
    \ single quotes.\n\n## Running an INSERT Statement\n\nYou can run this statement\
    \ in the same way as any other SQL statement.\n\n1.  Open SQL developer and open\
    \ a new SQL file.\n\n2.  Enter the `INSERT` statement mentioned earlier into the\
    \ code area, as shown in Figure [15-1](#471705_1_En_15_Chapter.xhtml#Fig1).\n\n\
    \    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig1_HTML.jpg](Images/471705_1_En_15_Fig1_HTML.jpg)\n\
    \n    Figure 15-1\n\n    The `INSERT` statement in SQL Developer\n\n3.  Click\
    \ the Run button.\n\nOnce the statement has run, you’ll see the output of the\
    \ statement at the bottom of the screen, as shown in Figure [15-2](#471705_1_En_15_Chapter.xhtml#Fig2).\n\
    \n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig2_HTML.jpg](Images/471705_1_En_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2\n\nThe output of the `INSERT` statement\n\nIt will display “1 row\
    \ inserted.” This means that the record is inserted. It won’t show you what the\
    \ record is; to do that, you’ll need to run a `SELECT` statement on the table.\n\
    \nIf you see an error message, you should check a few things in your `INSERT`\
    \ statement:\n\n*   Is the table spelled correctly? The table name must already\
    \ exist in the database, and I’ve encountered many errors where I have misspelled\
    \ the table name slightly.\n\n*   Have you specified the same number of columns\
    \ as the number of values? If the number of columns is different, you’ll get an\
    \ error.\n\n*   Are the values referring to the correct columns? If the data types\
    \ are different (for example, you attempt to enter the address into the `id` column),\
    \ you’ll get an error.\n\n*   Do you have single quotes around the text values?\
    \ If not, they will be treated like SQL code and will probably show an error.\n\
    \nOnce your statement has run successfully, we can check that the data exists\
    \ in the table. To do this, run a `SELECT` statement on the table:\n\n```sql\n\
    SELECT *\nFROM office;\n```\n\nBecause we are just checking that the data exists,\
    \ it’s OK to use `SELECT *`. If you run this statement, you’ll get the following\
    \ results:\n\n```\nID   ADDRESS\n1    123 Smith Street\n```\n\nYou can see that\
    \ the data has been inserted into the table successfully.\n\n## Inserting More\
    \ Data\n\nWe can insert some more data into this table so we have more data to\
    \ work with. Let’s insert two more records:\n\n*   45 Main Street, with an ID\
    \ of 2\n\n*   10 Collins Road, with an ID of 3\n\nThe `INSERT` statements would\
    \ look like this:\n\n```sql\nINSERT INTO office (id, address) VALUES (2, '45 Main\
    \ Street');\nINSERT INTO office (id, address) VALUES (3, '10 Collins Road');\n\
    ```\n\nWe can run these two statements in SQL Developer. Instead of running them\
    \ separately, you can run them one after the other.\n\n1.  Add these two statements\
    \ into your SQL Developer window, as shown in Figure [15-3](#471705_1_En_15_Chapter.xhtml#Fig3).\n\
    \n    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig3_HTML.jpg](Images/471705_1_En_15_Fig3_HTML.jpg)\n\
    \n    Figure 15-3\n\n    Two `INSERT` statements\n\n2.  Select both of the statements\
    \ so they are highlighted, as shown in Figure [15-4](#471705_1_En_15_Chapter.xhtml#Fig4).\n\
    \n    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig4_HTML.jpg](Images/471705_1_En_15_Fig4_HTML.jpg)\n\
    \n    Figure 15-4\n\n    Selecting both `INSERT` statements\n\n3.  Click on the\
    \ Run button. Both statements will be run, one after the other.\n\nThe output\
    \ at the bottom of the screen should show two separate lines of “1 row inserted,”\
    \ just like Figure [15-5](#471705_1_En_15_Chapter.xhtml#Fig5).\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig5_HTML.jpg](Images/471705_1_En_15_Fig5_HTML.jpg)\n\
    \nFigure 15-5\n\nThe output from both `INSERT` statements\n\nLet’s select from\
    \ the `office` table again.\n\n```sql\nSELECT *\nFROM office;\n```\n\nThe results\
    \ are:\n\n```\nID   ADDRESS\n1    123 Smith Street\n2    45 Main Street\n3   \
    \ 10 Collins Road\n```\n\nYou can see that all three of the records appear in\
    \ the table. Let’s see some examples of inserting date values.\n\n## Inserting\
    \ Date Values\n\nAdding date values into a table requires special treatment, because\
    \ the default date format can differ in parts of the world.\n\nThe Oracle database\
    \ determines the date format for all dates when you install the database (Oracle\
    \ Express). This is relevant because it determines how we can add date values\
    \ to the database.\n\nLet’s add some data to the `sales_meeting` table. If you\
    \ remember from the earlier chapter where you created the table, it had a few\
    \ columns:\n\n*   `id`\n\n*   `employee_id`\n\n*   `company`\n\n*   `meeting_date`\n\
    \nBoth the `id` and `employee_id` columns were numbers. The `company` column is\
    \ a text value, and `meeting_date` is a date. Our `INSERT` statement would look\
    \ like this:\n\n```sql\nINSERT INTO sales_meeting (id, employee_id, company, meeting_date)\
    \ VALUES (1, 5, 'ABC Construction', 'Aug 10 2018');\n```\n\nThis would insert\
    \ a record with an `id` of 1, an `employee_id` of 5, a `company` of `'ABC Construction'`,\
    \ and a `meeting_date` of `'Aug 10 2018'`.\n\nHowever, if you try to run this\
    \ statement in SQL Developer, you will likely get an error, as shown in Figure\
    \ [15-6](#471705_1_En_15_Chapter.xhtml#Fig6).\n\n![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig6_HTML.jpg](Images/471705_1_En_15_Fig6_HTML.jpg)\n\
    \nFigure 15-6\n\nAn error message from inserting a date\n\nThis error happens\
    \ because the database does not recognize “Aug 10 2018” as a valid date. To you\
    \ and me it might seem valid, but to the database it doesn’t. The database needs\
    \ dates in a certain format, depending on your location in the world.\n\nHowever,\
    \ there is an ANSI-standard way you can insert dates into the database. You can\
    \ use a date literal, which is a keyword (the word “`DATE`”) that specifies a\
    \ date in a specific format of “`YYYY-MM-DD`”. This means:\n\n*   A four-digit\
    \ value for the year, followed by a dash\n\n*   Then a two-digit value for the\
    \ month, followed by a dash\n\n*   Then a two-digit value for the day\n\nSo, to\
    \ write the date of “Aug 10 2018” in this format, it needs to be written as `DATE\
    \ '2018-08-10'`."
