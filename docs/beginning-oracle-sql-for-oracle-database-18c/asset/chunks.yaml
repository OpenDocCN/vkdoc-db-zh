  trans: '# 17. 更新或删除表


    ## 从表中删除数据


    有时你可能想要从表中删除数据。也许是在你学习 SQL 时插入数据出了错，或者是为了移除不再需要的数据。在 SQL 中，有办法做到这一点，它涉及使用 `DELETE`
    语句。


    `DELETE` 语句允许你从表中删除数据。它的工作方式类似于 `UPDATE` 语句，你需要指定表名和要删除记录的条件。`DELETE` 语句看起来像这样：


    ```

    DELETE FROM 表名

    [WHERE 条件];

    ```


    该语句以 `DELETE FROM` 开始，然后你提及要从中删除数据的表名。接着你可以指定一个 `WHERE` 子句。这个 `WHERE` 子句用于确定你想要删除哪些记录。


    就像 `UPDATE` 语句一样，`DELETE` 语句上的 `WHERE` 子句是可选的。这意味着，如果你不小心，很容易就会删除表中的所有记录！在运行 `DELETE`
    语句之前，请确保你有 `WHERE` 子句，除非你真的想删除表中的所有记录。


    注意：`DELETE` 语句上的 `WHERE` 子句是可选的。如果省略它，表中的所有记录都将被删除。


    ### 删除记录


    让我们从 office 表中删除一条记录。office 表目前如下所示。


    | ID | 地址 |

    | --- | --- |

    | 1 | 123 Smith Street |

    | 2 | 45 Main Street |

    | 3 | 10 Collins Road |


    我们想从这个表中删除 “10 Collins Road” 的记录。为此，你可以编写如下语句：


    ```

    DELETE FROM office

    WHERE address = ''10 Collins Road'';

    ```


    这将找到 office 表中地址为 “10 Collins Road” 的所有记录，并将它们从表中删除。


    如果你在 SQL Developer 中运行此语句，屏幕底部的输出面板将显示 “1 row deleted.”。就像 `INSERT` 和 `UPDATE`
    语句一样，`DELETE` 语句不会向你显示哪些记录被删除了。


    你可以在表上运行 `SELECT` 语句，以查看执行 `DELETE` 语句后表的样子：


    | ID | 地址 |

    | --- | --- |

    | 1 | 123 Smith Street |

    | 2 | 45 Main Street |


    ```

    SELECT *

    FROM office;

    ```


    你可以看到 “10 Collins Road” 的记录已不在表中。


    当你用 `INSERT` 语句添加数据或用 `UPDATE` 语句更新数据时，在运行 `COMMIT` 语句保存更改或运行 `ROLLBACK` 语句撤销更改之前，数据并没有永久保存在数据库中。同样的功能也适用于
    `DELETE` 语句：在运行 `COMMIT` 语句或使用 `ROLLBACK` 撤销删除操作之前，数据并没有被永久删除。


    我们想提交这个语句，所以运行一个 `COMMIT` 语句或点击 `COMMIT` 按钮来保存你的更改。


    ### 检查哪些记录将被删除


    `DELETE` 语句在运行前不会告诉你哪些记录将被删除。它不会弹出一个 “你确定吗？” 的对话框让你确认这些记录。


    不过，你可以对你的 `DELETE` 语句做一个小小的改动，以便在运行前查看哪些记录会受到影响。你可以简单地将 `DELETE` 改为 `SELECT *`。


    例如，你的语句可能如下所示：


    ```

    DELETE FROM office

    WHERE address = ''10 Collins Road'';

    ```


    要在运行 `DELETE` 语句之前查看哪些记录将被删除，请将 `DELETE` 一词替换为 `SELECT *`。


    ```

    SELECT *

    FROM office

    WHERE address = ''10 Collins Road'';

    ```


    你可以运行这个 `SELECT` 查询来查看符合 `WHERE` 子句条件的记录。再将这个语句改回 `DELETE` 就会删除那些记录。这对于像这样简单的查询，甚至对于
    `WHERE` 子句更复杂的查询都很有帮助。


    ### 删除表中的所有记录


    如果你想删除表中的所有记录，也可以使用 `DELETE` 语句。这对于重置表或删除其所有数据（以便重新插入）很有用。


    要删除表中的所有记录，请编写一个没有 `WHERE` 子句的 `DELETE` 语句。


    ```

    DELETE FROM office;

    ```


    这将删除表中的所有记录。你也可以运行一个 `WHERE` 子句满足所有条件的 `DELETE` 语句来达到相同的效果。在我们的例子中，这些查询将删除所有数据：


    ```

    DELETE FROM office

    WHERE id >= 1;

    DELETE FROM office

    WHERE address IS NOT NULL;

    ```


    你可以运行这些查询，所有记录都将从你的表中移除。如果你想再次插入记录，可以运行前面章节中的 `INSERT` 语句。


    ## 总结


    SQL 中的 `UPDATE` 语句允许你更新表中已存在的数据。你不需要删除并重新插入数据来修正它。你可以使用 `WHERE` 子句（其工作方式与 `SELECT`
    语句中的相同）来更新表中符合特定条件的一列或多列。


    你可以使用 `DELETE` 语句从表中删除记录。该语句有一个可选的 `WHERE` 子句，让你指定要删除哪些记录，如果你省略它，所有记录都将被删除。


    ## 为什么要更新表的结构？


    在 SQL 中，你可以更新表的结构。这意味着你可以添加或删除列、重命名列、重命名表、更改列的数据类型等等。你为什么要这样做呢？有几个原因。


    在软件开发的世界里，一旦某样东西被开发出来，就不能保证它会永远保持不变。这适用于整个应用程序，一直到它所使用的代码和表。


    你可能需要修改一个表来添加一个新列，以捕获更多信息。这在你最初创建表时是未知的，因为它是一个新的需求。


    另一种情况是，如果一个列被创建了，但出于某种原因需要重命名，例如为了与另一个表匹配，或者为了反映它的真实用途。


    为什么不直接删除表然后重新创建呢？有时那样更容易，但大多数情况下，修改表更容易。这是因为你并不总是有创建表的 SQL 语句，而且如果你删除了表，你将丢失其中的所有数据。


    我们将通过一些修改表的示例来演示如何操作。


    ## ALTER TABLE 语句


    修改表结构的方法是使用一个名为 `ALTER TABLE` 的语句。它将改变表的结构，这与 `UPDATE` 语句（它更改表内的数据）不同。


    `ALTER TABLE` 语句可以做相当多的事情：


    *   向表中添加一个或多个列

    *   更改列的数据类型

    *   向列添加约束（如主键或外键）

    *   从表中删除列

    *   重命名列

    *   重命名表


    `ALTER TABLE` 语句如下所示：


    ```

    ALTER TABLE 表名 修改表子句;

    ```


    它包括几个部分：


    *   以 ALTER TABLE 开头。

    *   然后指定你想要修改的表名。

    *   最后，你指定一个 `alter_table_clause`。它描述了你要做的更改。


    让我们看一些修改表的例子。


    在最近几章中，你已经学习了如何操作表和数据。具体来说，你已经学习了如何：


    *   创建表

    *   向表中添加数据

    *   更新表中的数据

    *   从表中删除数据


    还有两个与表相关的操作你将学习到：如何更新表的结构，以及如何删除表。'
- fmt: '## Example: Adding a Column


    You can add a new column to an existing table using the `ALTER TABLE` statement.
    This type of statement would look like this:

    ```

    ALTER TABLE table_name

    ADD column_name column_definition;

    ```


    This includes the name of the table, the name of the new column, and the details
    of the new column you want to add such as the data type.


    Let’s say you want to add a new column for the employee’s job title to the employee
    table. This is a text value, and 100 characters should be enough to capture it.
    Your `ALTER TABLE` statement would look like this:

    ```

    ALTER TABLE employee

    ADD job_title VARCHAR2(100);

    ```


    This statement will add a new column called `job_title` to the employee table,
    with a data type of `VARCHAR2` and a maximum size of 100 bytes. The names of columns
    have a limit of 128 bytes (as of version 12.2). While a longer column name might
    be more descriptive, there’s a balance between having a column name that’s descriptive
    enough without being too long.


    To run this statement, simply enter it into an SQL Developer window as you’ve
    been doing for other statements and click the Run button. You’ll get a message
    in the output panel that says, “Table EMPLOYEE altered.”


    If you add a new column to a table with data in it already, what will the values
    in this column be? Let’s find out. You can see what’s in the table, including
    your new column, by running a `SELECT` statement:

    ```

    SELECT *

    FROM employee;

    ```


    Your table should look something like this, depending on if you ran the `UPDATE`
    statements in previous chapters or not:


    | ID | LAST_NAME | SALARY | JOB_TITLE |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | (null) |

    | 2 | SMITH | 35000 | (null) |

    | 3 | KING | 45000 | (null) |

    | 4 | SIMPSON | 52000 | (null) |

    | 5 | ANDERSON | 31000 | (null) |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | (null) |

    | 9 | PATRICK | 40000 | (null) |


    The new `job_title` column has a value of `NULL` for every record. This is because
    it’s not possible to know what the value would be for each record when we add
    the column, so it is set to `NULL`. You can run an `UPDATE` statement to update
    existing records with a new `job_title` value.


    ## Example: Change a Data Type


    Another thing you can do with the `ALTER TABLE` statement is to change the data
    type of a column. This is useful for situations such as:

    *   You need to make a column larger, such as increasing the size of a `NUMBER`
    or `VARCHAR2` field.

    *   You are changing a column from a text value to a number value, as it is going
    to refer to a primary key in another table.

    *   You need to capture additional parts of a date and time value.


    Changing a data type of a column with data already in it may cause issues, so
    it’s something to be careful with. Depending on the change you make, the data
    may be kept, or you may get an error. If you do want to change the data type of
    a column, your statement would look like this:

    ```

    ALTER TABLE table_name

    MODIFY column_name data_type;

    ```


    As an example, if you want to change the `job_title` column from a `VARCHAR2(100)`
    to an `NVARCHAR2(250)`, your statement would look like this:

    ```

    ALTER TABLE employee

    MODIFY job_title NVARCHAR2(250);

    ```


    You only need to specify the new data type, not the old data type. If you run
    this statement on your database in SQL Developer, you’ll get a “Table EMPLOYEE
    altered” message.


    ## Example: Add a Primary Key


    In an earlier chapter, we explained the concept of a primary key (one or more
    columns in a table that are used to uniquely identify a row). You added a primary
    key for the `sales_meeting` table when you created it. You can also use the `ALTER
    TABLE` statement to add a primary key to a table that already exists.


    The `ALTER TABLE` statement to add a primary key would look like this:

    ```

    ALTER TABLE table_name

    ADD CONSTRAINT constraint_name constraint_type;

    ```


    This statement uses the word “`constraint`.” A constraint is a type of object
    in the database that is used to apply rules to columns in a table. A primary key
    is a type of constraint. The rules that apply to a primary key are:

    *   It must be unique.

    *   It cannot contain any `NULL` values.

    *   There can only be one primary key per table.

    *   It can apply to one or more columns.


    Our employee table does not have a primary key, but you can add one now. The statement
    to do this would be:

    ```

    ALTER TABLE employee

    ADD CONSTRAINT pk_emp_id PRIMARY KEY (id);

    ```


    This statement includes:

    *   The `ALTER TABLE employee` to identify which table is being changed.

    *   `ADD CONSTRAINT` to specify what is being added on the table.

    *   The constraint name of “`pk_emp_id`,” which is a name for the new constraint.

    *   `PRIMARY KEY`, which specifies that this is a primary key constraint.

    *   The column name `id`, which means the `id` column on the employee table is
    the primary key.


    Why did we give the primary key a name? The primary key is something that is stored
    on the database, and therefore it needs a name. When you create a table, you can
    add the words `PRIMARY KEY` after the column that you want to be the primary key
    without specifying the name of the primary key constraint. However, Oracle will
    automatically set the name of the primary key when it is created, and it will
    be a long combination of letters and numbers. Using your own name makes it easier
    to identify in the future.


    The primary key name that I used in this example is `pk_emp_id`. I like to follow
    a standard naming format when naming constraints, such as primary keys. This means
    you can easily know what it is just by looking at the name. This naming format
    includes:

    *   The type of constraint in the first two letters (“`pk`”), then an underscore.

    *   An abbreviated name of the table (“`emp`” is short for employee), then an
    underscore.

    *   The name of the column, possibly abbreviated if it’s a long name (the `id`
    column).

    *   The name I used is `pk_emp_id`, which means it’s a primary key on the employee
    table using the `id` column.


    If you haven’t already, you should run this `ALTER TABLE` statement on the database.
    You’ll need it for the next example.'
