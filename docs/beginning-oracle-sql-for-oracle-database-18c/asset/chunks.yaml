    \ JDK should take a few minutes to be installed. You can now run SQL Developer."
  trans: "\n## 安装 Oracle Express\n\n既然我们已经下载了 Oracle Express，现在是时候安装它了。接下来的步骤是针对 Windows\
    \ 安装的，但 Linux 安装过程应该类似。\n\n1.  浏览到下载文件的位置。它通常会在默认的“下载”文件夹中，或者你指定的任何位置。如果你的浏览器还打开着，你应该能点击该文件并选择**在文件夹中显示**（或类似选项）来打开文件保存的位置。\n\
    \n2.  由于该文件是 `ZIP` 格式，需要解压。打开该文件并解压，或者右键单击文件并选择**解压**。\n\n    文件会被解压到一个名为 `DISK1`\
    \ 的文件夹中。\n\n3.  打开 `DISK1` 文件夹并运行安装程序文件（图 2-7）。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig7_HTML.jpg](img/471705_1_En_2_Fig7_HTML.jpg)\n\
    \n    *图 2-7：`DISK1` 文件夹*\n\n4.  文件将加载并显示介绍屏幕（图 2-8）。点击**下一步**。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig8_HTML.jpg](img/471705_1_En_2_Fig8_HTML.jpg)\n\
    \n    *图 2-8：介绍屏幕*\n\n5.  阅读条款并点击**我接受**；然后点击**下一步**（图 2-9）。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig9_HTML.jpg](img/471705_1_En_2_Fig9_HTML.jpg)\n\
    \n    *图 2-9：许可协议*\n\n6.  在**选择目标位置**屏幕，点击**下一步**。你可以更改想要安装到的位置，但默认位置 (`C:\\oraclexe`)\
    \ 即可。\n\n7.  **指定数据库密码**屏幕将显示，如图 2-10 所示。输入一个你想用于系统管理员账户（称为 `SYS` 和 `SYSTEM`）的密码，然后点击**下一步**。\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig10_HTML.jpg](img/471705_1_En_2_Fig10_HTML.jpg)\n\
    \n    *图 2-10：数据库密码屏幕*\n\n### 注意\n\n你需要记住这个密码，因为你稍后将使用它登录数据库，以及在你需要重置其他密码时使用。如果忘记此密码，你可能需要重新安装\
    \ Oracle Express。\n\n8.  在“摘要”屏幕，点击**安装**。\n\n    Oracle Express 随后将开始安装。此安装过程通常需要几分钟时间。安装完成后会显示一条消息。\n\
    \n现在你已经安装了 Oracle Express，是时候下载并设置 Oracle SQL Developer，以便你可以使用这个数据库了。\n\n## 下载\
    \ Oracle SQL Developer\n\nOracle SQL Developer 是 Oracle 提供的免费应用程序，用于访问和操作 Oracle\
    \ 数据库。此应用程序被称为集成开发环境 (`IDE`)。它是一种让开发者处理代码的应用程序。\n\n下载 SQL Developer：\n\n1.  访问\
    \ Oracle 网站：[`www.oracle.com`](http://www.oracle.com)。\n\n2.  在菜单下，导航至**产品 ➤ 数据库\
    \ ➤ 应用程序开发**。\n\n3.  向下滚动并选择 **SQL Developer**。\n\n4.  点击**下载**按钮，如图 2-11 所示。\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig11_HTML.jpg](img/471705_1_En_2_Fig11_HTML.jpg)\n\
    \n    *图 2-11：Oracle SQL Developer 下载*\n\n    该页面显示了下载 SQL Developer 的许多不同选项（图\
    \ 2-12）：\n\n    *   Windows 64-bit with JDK included\n    *   Windows 32-bit or\
    \ 64-bit\n    *   Mac OSX\n    *   Linux\n    *   Other\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig12_HTML.jpg](img/471705_1_En_2_Fig12_HTML.jpg)\n\
    \n    *图 2-12：Oracle SQL Developer 下载版本*\n\n    你应该选择与你操作系统和之前选择的 Oracle Express\
    \ 版本（32 位或 64 位）相匹配的 Oracle SQL Developer 版本。最简单的方式是使用“Windows 64-bit with JDK\
    \ included”。这适用于你运行的是 64 位 Windows 系统。Oracle SQL Developer 运行在 Java 平台上，这是唯一一个附带\
    \ `JDK`（Java 开发工具包）的版本。因此，它安装起来更简单，因为它只是一个安装过程。\n\n    然而，如果你运行的不是 Windows 64\
    \ 位系统，你需要选择其他版本。这些其他版本不包含 `JDK`，所以你需要单独安装它。我们将在本章后面解释如何操作。\n\n5.  点击你希望下载的版本对应的**下载**链接。与\
    \ Oracle Express 一样，根据你的浏览器设置，文件将被下载到默认位置，或者你将可以指定位置。\n\n文件下载完成后，就可以进行设置了。\n\n\
    ## 运行 Oracle SQL Developer\n\nOracle SQL Developer 的一个优点是它不需要安装。你下载的文件是一个 `ZIP`\
    \ 文件。要让 SQL Developer 运行起来：\n\n1.  浏览到你下载 SQL Developer 的位置。\n\n2.  通过双击文件，或右键单击并选择**解压**来解压\
    \ `ZIP` 文件。\n\n3.  文件解压后，你可以为该文件创建一个快捷方式以便更容易运行。右键单击 `sqldeveloper.exe` 并选择**发送到桌面快捷方式**。这将在桌面上放置该文件的快捷方式。\n\
    \n4.  运行 `sqldeveloper.exe` 文件。SQL Developer 现在将会打开。\n\n5.  如果你下载的版本没有包含 `JDK`，系统可能会要求你指定\
    \ Java 文件的路径。点击**浏览**并找到 `java.exe` 文件。它通常位于 `C:\\Program Files\\Java\\jdk1.8.0_144\\\
    bin\\`。\n\n随后应该会显示启动页或欢迎屏幕。\n\n## 下载 JDK\n\n如果你下载的 SQL Developer 版本没有附带 `JDK`，你可能需要下载它。如果你的电脑上已经安装了它，可能来自你之前所做的其他开发工作，那么你就不需要再次下载。但是，如果你确实需要下载，方法如下：\n\
    \n1.  访问 [`www.oracle.com`](http://www.oracle.com)。\n\n2.  在菜单下，选择**产品 ➤ 开发者工具\
    \ ➤ Java SE SDK**。\n\n3.  点击页面顶部的**下载**选项卡，如图 2-13 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig13_HTML.jpg](img/471705_1_En_2_Fig13_HTML.jpg)\n\
    \n    *图 2-13：Java 下载*\n\n4.  点击 `JDK` 旁边的**下载**按钮，如图 2-14 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig14_HTML.jpg](img/471705_1_En_2_Fig14_HTML.jpg)\n\
    \n    *图 2-14：Java 下载页面*\n\n5.  点击**接受许可协议**，然后点击代表你操作系统文件的链接，如图 2-15 所示。\n\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig15_HTML.jpg](img/471705_1_En_2_Fig15_HTML.jpg)\n\
    \n    *图 2-15：Java 下载链接*\n\n文件下载后，你可以安装它。\n\n1.  在浏览器中点击该文件以运行安装文件。或者，你可以浏览到你下载它的位置，然后运行该文件。\n\
    \n2.  在过程的每一步点击**下一步**来跟随安装步骤。无需更改任何默认选项。\n\n`JDK` 安装需要几分钟时间。你现在可以运行 SQL Developer\
    \ 了。\n"
- fmt: "## Create a Connection\n\nOnce you have opened SQL Developer, you’re ready\
    \ to connect to the Oracle database you just installed. This will allow you to\
    \ interact with the database by running queries. We’re going to do a few things:\n\
    \n1.  Create a new connection using the administrator account.\n2.  Create a new\
    \ user.\n3.  Create a new connection using the new user.\n\nWhy do we need to\
    \ create a new user? Can’t we just use the system account that we created in the\
    \ install? We could indeed use the `SYSTEM` account, but using the `SYSTEM` account\
    \ for creating tables and working with data in this way is not a good thing to\
    \ do. That’s because system administrator accounts have a lot of privileges and\
    \ are used by database administrators for a variety of tasks. In a working environment,\
    \ you won’t have access to a system administrator account, so it’s better to use\
    \ your own account.\n\nTo create a new connection:\n\n1.  In SQL Developer, click\
    \ the green + button in the Connections tab on the left of the screen, as shown\
    \ in Figure [2-16](#471705_1_En_2_Chapter.xhtml#Fig16).\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig16_HTML.jpg](Images/471705_1_En_2_Fig16_HTML.jpg)\n\
    \    Figure 2-16: The new connection button.\n    If you don’t see the Connections\
    \ tab, click the View menu and click Connections.\n\nThe New Connection window\
    \ is then displayed, as shown in Figure [2-17](#471705_1_En_2_Chapter.xhtml#Fig17).\
    \ The existing connections are shown on the left, and fields for creating a new\
    \ connection are on the right. Your list of connections on the left will be empty.\n\
    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig17_HTML.jpg](Images/471705_1_En_2_Fig17_HTML.jpg)\n\
    Figure 2-17: The new connection window.\n\n1.  Enter in a `Connection Name`. This\
    \ can be anything you like, and is used so you can identify the connection in\
    \ the list of all other connections. I would suggest the word “System” because\
    \ this is the connection for the `SYSTEM` account. In the future if you are connecting\
    \ to multiple databases, it’s good to put the name of the database along with\
    \ the username in this `Connection Name` field.\n2.  Enter the word “SYSTEM” as\
    \ the `Username`.\n3.  In the password field, enter the password that you entered\
    \ when you installed Oracle Express. This was the password you needed to remember.\n\
    4.  Check the `Save Password` box so you don’t need to enter the password each\
    \ time. The screen should look like Figure [2-18](#471705_1_En_2_Chapter.xhtml#Fig18).\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig18_HTML.jpg](Images/471705_1_En_2_Fig18_HTML.jpg)\n\
    \    Figure 2-18: Data in the new connection window.\n5.  For the connection information,\
    \ if you are at a company, your DBA would typically give you this information\
    \ on how to connect. For connecting to our Oracle Express database, leave the\
    \ `Hostname`, `Port`, and `SID` fields as their default values. The `Hostname`\
    \ should be “localhost,” the `Port` should be `1521`, and the `SID` should be\
    \ “xe”.\n6.  Click the `Test` button. This will test your connection to the database\
    \ and see if you have entered the correct information.\n    If the test is successful,\
    \ it should say “Status: Success” in the lower left hand corner, as shown in Figure\
    \ [2-19](#471705_1_En_2_Chapter.xhtml#Fig19).\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig19_HTML.jpg](Images/471705_1_En_2_Fig19_HTML.jpg)\n\
    \    Figure 2-19: The success message from testing a connection.\n    Click `Save`.\
    \ The new connection is saved into the list on the left, as shown in Figure [2-20](#471705_1_En_2_Chapter.xhtml#Fig20).\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig20_HTML.jpg](Images/471705_1_En_2_Fig20_HTML.jpg)\n\
    \    Figure 2-20: The new connection in the list.\n7.  Click `Connect`. SQL Developer\
    \ will use this connection and connect to the database. Once it is connected,\
    \ a new tab is shown in the SQL Developer window with the name of your connection.\n\
    \n## Create a New User\n\nWe could proceed with creating a table as the `SYSTEM`\
    \ account, but working as `SYSTEM` is a practice we want to avoid. We’ll create\
    \ a new user that will then create our table. On the left side of the SQL Developer\
    \ window, you should see the word `Connections`, and then the connection you just\
    \ created under that. Find your new connection. Then perform the following steps:\n\
    \n1.  Click the arrow to the left of the connection name to expand the items under\
    \ the connection. This will show all the different categories of objects.\n2.\
    \  Scroll to the bottom of this list, right click `Other Users`, and select `Create\
    \ User`, as shown in Figure [2-21](#471705_1_En_2_Chapter.xhtml#Fig21).\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig21_HTML.jpg](Images/471705_1_En_2_Fig21_HTML.jpg)\n\
    \    Figure 2-21: Create User menu option.\n3.  In the window that appears, enter\
    \ the name for the new user, as shown in Figure [2-22](#471705_1_En_2_Chapter.xhtml#Fig22).\
    \ This is case insensitive and should not contain special characters or reserved\
    \ words like “system”. If you’re not sure what to use, use your own name or “intro_user”\
    \ as a username.\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig22_HTML.jpg](Images/471705_1_En_2_Fig22_HTML.jpg)\n\
    \    Figure 2-22: The Create User window.\n4.  Enter a password in the `New Password`\
    \ and `Confirm Password` boxes.\n5.  Leave all of the other options blank: the\
    \ checkboxes and the tablespace fields.\n6.  Click the `Granted Roles` tab. A\
    \ list of available roles will appear.\n7.  Click the `Granted` checkbox next\
    \ to the `CONNECT` role, as shown in Figure [2-23](#471705_1_En_2_Chapter.xhtml#Fig23).\
    \ This `CONNECT` role allows the user to make a connection to the database.\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig23_HTML.jpg](Images/471705_1_En_2_Fig23_HTML.jpg)\n\
    \    Figure 2-23: The Granted Roles tab.\n8.  Click the `System Privileges` tab.\
    \ A list of available privileges will appear, as shown in Figure [2-24](#471705_1_En_2_Chapter.xhtml#Fig24).\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig24_HTML.jpg](Images/471705_1_En_2_Fig24_HTML.jpg)\n\
    \    Figure 2-24: The System Privileges tab.\n9.  Click the `Granted` checkbox\
    \ next to the `CREATE TABLE` privileges. This will allow you to create a table.\n\
    10. Click the `Apply` button. The new user will be created and a message is displayed,\
    \ as shown in Figure [2-25](#471705_1_En_2_Chapter.xhtml#Fig25).\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig25_HTML.jpg](Images/471705_1_En_2_Fig25_HTML.jpg)\n\
    \    Figure 2-25: The success message.\n\n## Create a Connection with New User\n\
    \nYou now have a new user. Let’s create a new connection with this user, so you\
    \ can start working with the database as this new user and not the administrator\
    \ user. You can follow the same steps as we did for creating the earlier connection\
    \ for creating this connection.\n\nIn short:\n\n1.  Click the green plus sign\
    \ on the left of SQL Developer to show the Create New Connection window.\n2. \
    \ Enter a new name for the connection, and enter the username and password you\
    \ used when you created the user.\n3.  Leave the rest of the connection info as\
    \ the defaults.\n4.  Click `Save` to save the connection.\n5.  Finally, click\
    \ `Connect` to connect as this user.\n\nWell done! You’ve now installed an Oracle\
    \ database, opened SQL Developer, and created a new user and a connection with\
    \ that user."
