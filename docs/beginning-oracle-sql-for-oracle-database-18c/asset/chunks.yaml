- fmt: '## The DECODE Function


    `DECODE` is a function available in Oracle that lets you perform conditional logic.
    It''s similar to the `CASE` statement. The function syntax looks like this:


    ```

    DECODE (expression, search, result [, search, result]... [,default] )

    ```


    The parameters of this Oracle `DECODE` function are:


    *   `expression` (mandatory): This is the value to compare to in the function.

    *   `search` (mandatory): This is the value to compare against the expression.

    *   `result` (mandatory): This is what is returned if the search value matches
    the expression value. There can be many pairs of search and result values, and
    the result value is related to the previous search value.

    *   `default` (optional): If none of the search values match the expression, then
    this value is returned. If the default value is not provided then `NULL` is used.


    If you compare this to an `IF-THEN-ELSE` statement, it would look like this:


    ```

    IF (expression = search) THEN result

    [ELSE IF (expression = search) THEN result]

    ELSE default

    END IF

    ```


    You can write the earlier `CASE` statement as a `DECODE` function as well. It
    would look like this:


    ```

    SELECT

    last_name,

    DECODE(UPPER(last_name), ''JONES'', ''The name is Jones'', ''SMITH'', ''The name
    is Smith'', ''KING'', ''The name is King'', ''The name is something else'') AS
    namecheck

    FROM employee;

    ```


    This function is all on a single line, so can be formatted a little better:


    ```

    SELECT

    last_name,

    DECODE(UPPER(last_name),

    ''JONES'', ''The name is Jones'',

    ''SMITH'', ''The name is Smith'',

    ''KING'', ''The name is King'',

    ''The name is something else'') AS namecheck

    FROM employee;

    ```


    You can run this query and get the following result.


    | LAST_NAME | NAMECHECK |

    | --- | --- |

    | JONES | The name is Jones |

    | SMITH | The name is Smith |

    | KING | The name is King |

    | SIMPSON | The name is something else |

    | ANDERSON | The name is something else |

    | COOPER | The name is something else |

    | ADAMS | The name is something else |

    | SMITH | The name is Smith |

    | PATRICK | The name is something else |

    | Jones | The name is Jones |


    The `DECODE` function in this example looks similar to a `CASE` statement and
    shows the same results. However, there are situations where the `DECODE` function
    can be a bit messy, such as using the `LIKE` keyword for partial matches or using
    greater than or less than symbols.


    `DECODE` can only be checked for exact matches. You can use some operators and
    a `SIGN` function to check for greater than or less than other values. Earlier
    we had a `CASE` statement that grouped salaries:


    ```

    CASE

    WHEN salary = 50000 THEN ''High salary''

    END salary_check

    ```


    To write the same logic in a `DECODE` statement, our function would look like
    this:


    ```

    DECODE(SIGN(40000-salary),1,''Low salary'', -1, ''Medium or high salary'', ''Unsure'')

    ```


    This function first subtracts the `salary` from `40000` and encloses it in a `SIGN`
    function. This function will return a `1` if the result is positive, and `-1`
    if the result is negative. So, if the `salary` is less than `40000` then the value
    will be positive, and `SIGN` returns `1`.


    You''ll then need to substitute the ''Medium or high salary'' for another `DECODE`
    function to check for the value of `50000`:


    ```

    DECODE(SIGN(40000-salary),1,''Low salary'', -1, DECODE(SIGN(50000-salary),1,''Medium
    salary'', -1, ''High salary'', ''Unsure''),''Unsure'')

    ```


    As you can see, this is getting quite messy, with functions inside other functions.
    It''s also hard for you or others to understand what it means.


    So, in this situation, it might work, but a `CASE` statement would be better.


    ## CASE or DECODE?


    If the `CASE` statement and the `DECODE` function do the same thing, which one
    should you use? I recommend using the `CASE` statement in every situation, for
    a few reasons:


    *   `CASE` was introduced in Oracle 8 (quite a while ago) to replace `DECODE`,
    which is an older function.

    *   `CASE` is more flexible than `DECODE`.

    *   `CASE` is more readable for simple and complicated logic than `DECODE`.

    *   Performance is the same between both `CASE` and `DECODE`.


    If you use `CASE` in all situations, then you''re being consistent. Sometimes
    it might seem easier to use a `DECODE` for simple logic, but if you use `DECODE`
    in some places and `CASE` in others, it makes your SQL code a little harder to
    understand.


    ## Summary


    Oracle SQL includes the ability to use conditional logic, which is equivalent
    to "if then else" statements. This can be done in two ways: `CASE` and `DECODE`.


    The `CASE` statement lets you perform conditional logic, either as a simple case
    statement or a searched case statement. These statements are almost the same and
    only differ in where the expression is used, but the searched case statement allows
    for more flexibility in logic.


    The `DECODE` function can also be used for conditional logic in a similar way.
    However, it is more restrictive, older, and harder to read. I recommend using
    `CASE` statements rather than `DECODE` functions.


    ## 24. Understanding Aggregate Functions


    In the last chapter, you learned what a function was. You looked at a few examples
    of functions, such as `LOWER`, that performed a specific operation on a particular
    column''s value for every record. The `LOWER` function was used to convert every
    record''s `last_name` value into a lowercase version of the `last_name`.


    ```

    SELECT id,

    last_name,

    LOWER(last_name)

    FROM employee;

    ```


    The results of this query show the `last_name` records in lowercase.


    | ID | LAST_NAME | LOWER(LAST_NAME) |

    | --- | --- | --- |

    | 1 | JONES | jones |

    | 2 | SMITH | smith |

    | 3 | KING | king |

    | 4 | SIMPSON | simpson |

    | 5 | ANDERSON | anderson |

    | 6 | COOPER | cooper |

    | 7 | ADAMS | adams |

    | 8 | SMITH | smith |

    | 9 | PATRICK | patrick |

    | 10 | Jones | jones |


    This function, and others we looked at, are performed on each record individually.
    There are some functions in SQL that allow you to perform an operation on multiple
    records.


    ### Aggregate Functions


    An `aggregate function` is a type of function in SQL that can use data from more
    than one row. They are called aggregate functions because they aggregate data.
    While the functions you learned about earlier, such as `ADD_MONTHS` and `LOWER`,
    are operating on each row that is returned, aggregate functions look at data in
    multiple rows and return a single result.


    Why would this be useful? There are five commonly used aggregate functions in
    SQL, and they allow you to perform the following tasks:


    *   Find the number of records in a column or a table

    *   Find the total of a set of numbers

    *   Find the maximum or highest value

    *   Find the minimum or highest value

    *   Find the average from a list of values


    You''ll learn about these functions and how to use them in this chapter.


    ### The SUM Function


    The first of the aggregate functions you''ll learn about is called `SUM`. The
    `SUM` function is used to total or add up numbers. It looks like this:


    ```

    SUM ( [DISTINCT] expression)

    ```


    The `SUM` function takes two parameters:


    *   `expression`: This is the expression to be added up, which could be a column
    in a table or some other representation of number values.

    *   `DISTINCT`: This is an optional parameter that specifies the SUM function
    should only sum the distinct or unique values in the expression. I haven''t used
    this very often, but it''s good to know that it''s available.'
