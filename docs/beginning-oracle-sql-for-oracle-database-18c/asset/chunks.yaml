    | 2 | 35000 |

    | 3 | 45000 |

    | 4 | 52000 |

    | 5 | 31000 |

    | 6 | (null) |

    | 7 | (null) |

    | 8 | 62000 |

    | 9 | 40000 |

    | 10 | 42000 |


    ```sql

    SELECT id, salary

    FROM employee;

    ```


    ### Average with DISTINCT


    You can also use the `AVG` function to average the number of unique or distinct
    values. It works the same way as the `COUNT` function, where it eliminates the
    duplicate values in the column and averages the remaining values. The query could
    look like this:


    ```sql

    SELECT AVG(DISTINCT salary)

    FROM employee;

    ```


    | AVG(DISTINCTSALARY) |

    | --- |

    | 42125 |


    This query has found the average of the distinct values.


    ### Average with WHERE


    Finally, just like the `SUM` and `COUNT` function, you can use `AVG` with a query
    that has a `WHERE` clause. You can add the `WHERE` clause to the query separately
    from the `AVG` function.


    Let’s say you needed to find the average `salary` of `employees` who were in office
    number 2. To do this, your query could be:


    ```sql

    SELECT AVG(salary)

    FROM employee

    WHERE office_id = 2;

    ```


    The results are:


    | AVG(SALARY) |

    | --- |

    | 40666.66666 |


    This query will find all `employees` with an `office_id` of 2, and then find the
    average `salary` of those employees. You can run a `SELECT` query to see which
    records it is using:


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 10 | Jones | 42000 |


    ```sql

