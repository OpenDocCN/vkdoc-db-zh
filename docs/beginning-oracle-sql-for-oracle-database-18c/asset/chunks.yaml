- fmt: "## Versions\n\nExamples in the book are built around the following versions\
    \ of Express Edition and SQL Developer. However, SQL is a mature and stable language.\
    \ The beginning content in this book should work just fine with any reasonably\
    \ recent version of the database.\n\n*   Oracle Express Edition 18c. This version\
    \ was released in early 2018, with the Express Edition released in late 2018.\n\
    \n*   Oracle SQL Developer 18.2. This version was released in July 2018.\n\nThe\
    \ history of Oracle version numbers started at 2 and went up to version 12c in\
    \ 2017. Every 2 or 3 years a new major version was released, and the “c” in “12c”\
    \ stands for “cloud,” which was the focus of that version (previous versions used\
    \ other letters such as “g” for grid computing and “i” for Internet). Even though\
    \ the c stands for cloud, 12c is available for on-premise installs and on the\
    \ cloud.\n\nOracle Corporation announced in 2017 that their versioning would change\
    \ to an annual release and therefore the numbering would change to reflect the\
    \ year of release. This explains the version 18c. There is no Oracle version number\
    \ 13 to 17. They were skipped in favor of moving to 18c.\n\nThe same concept was\
    \ used for Oracle SQL Developer. The latest version is 18, and the version before\
    \ that was version 4.\n\nNow we’ve explained what tools we’re going to use, let’s\
    \ look at how to set them up.\n\n## Download Oracle Express\n\nOracle Express\
    \ (or Oracle Database XE) is the database management system we’ll be using. It\
    \ has all of the database features we need. The limitations it has are related\
    \ to database size and its use in commercial products, but it’s great for learning\
    \ with.\n\nTo download Oracle Express:\n\n1.  Visit Oracle’s website at [`www.oracle.com`](http://www.oracle.com).\n\
    \n2.  Navigate to Menu ➤ Products ➤ Databases ➤ Application Development. This\
    \ can be done by hovering your mouse over each section and clicking Oracle Express,\
    \ as shown in Figure [2-1](#471705_1_En_2_Chapter.xhtml#Fig1).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig1_HTML.jpg](Images/471705_1_En_2_Fig1_HTML.jpg)\n\
    \n    Figure 2-1\n\n    The menu options for selecting Application Development\n\
    \n3.  Scroll down the page and click Database Express Edition (as shown in Figure\
    \ [2-2](#471705_1_En_2_Chapter.xhtml#Fig2)).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig2_HTML.jpg](Images/471705_1_En_2_Fig2_HTML.jpg)\n\
    \n    Figure 2-2\n\n    The Database Languages and Tools section\n\n4.  Scroll\
    \ down and click Download Oracle Database XE under the Resources section (Figure\
    \ [2-3](#471705_1_En_2_Chapter.xhtml#Fig3)).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig3_HTML.jpg](Images/471705_1_En_2_Fig3_HTML.jpg)\n\
    \n    Figure 2-3\n\n    The bottom of the Oracle Database XE page\n\nThe page\
    \ that loads will show information about Oracle Express (Figure [2-4](#471705_1_En_2_Chapter.xhtml#Fig4)).\n\
    \n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig4_HTML.jpg](Images/471705_1_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4\n\nThe Oracle Express download page\n\n### Note\n\nThe screenshots\
    \ in this section show Oracle Express 11g. At the time of writing, this is the\
    \ latest version released for Windows. By the time you’re reading this, the 18c\
    \ version should be available. The installation process is the same.\n\n1.  Read\
    \ and click the Accept License Agreement. The download links will then appear.\n\
    \n2.  Choose the version that corresponds to your operating system and click the\
    \ link. If on Windows, go with 32- or 64-bit to match the version of Windows you\
    \ are running. If in doubt about that, then choose the 32-bit version for a smoother\
    \ experience.\n\n    You’ll then be asked to log in or create an Oracle account\
    \ (Figure [2-5](#471705_1_En_2_Chapter.xhtml#Fig5)). This is required so you can\
    \ download Oracle Express (and Oracle SQL Developer). Creating an account is free,\
    \ and you don’t need to be an Oracle employee.\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig5_HTML.jpg](Images/471705_1_En_2_Fig5_HTML.jpg)\n\
    \n    Figure 2-5\n\n    Sign in or create account\n\n3.  Click Create Account.\
    \ The Create Your Oracle Account screen will then be displayed, as shown in Figure\
    \ [2-6](#471705_1_En_2_Chapter.xhtml#Fig6).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig6_HTML.jpg](Images/471705_1_En_2_Fig6_HTML.jpg)\n\
    \n    Figure 2-6\n\n    The Create Your Oracle Account screen\n\n4.  Enter your\
    \ details and click Create Account. Your account should now be created.\n\n5.\
    \  Login using your newly created account. Oracle Express should then start downloading\
    \ to your computer.\n\nDepending on your browser settings, the download will either\
    \ start automatically (in a default Downloads folder), or you’ll be asked to specify\
    \ the location.\n\n## Windows, Linux, and What About Mac?\n\nYou’ve probably noticed\
    \ there is a Windows and a Linux version of Oracle Express, but there’s no Mac\
    \ version. Oracle currently doesn’t offer a Mac version of Oracle Express for\
    \ download. However, it is possible to use Oracle Express and learn Oracle if\
    \ you’re using a Mac. I use a Mac and am able to run an Oracle database on it.\n\
    \nThere are a few options for Mac users:\n\n*   Set up a Windows virtual machine,\
    \ which is an area of your computer that runs an installation of Windows, where\
    \ you can install Oracle. This can be done using a virtual machine application\
    \ such as Parallels or VirtualBox.\n\n*   Download one of the Oracle prebuilt\
    \ Developer virtual machines. These are premade virtual machine files by Oracle\
    \ that contain Windows (using a virtual machine program called VirtualBox), Oracle\
    \ Database, and SQL Developer.\n\n*   Use LiveSQL, which requires no installation\
    \ but does need an Internet connection.\n\nFor detailed information on setting\
    \ up a virtual machine, visit these pages:\n\n*   Oracle\n\n*   Setting up Oracle\
    \ on a Mac: [`www.databasestar.com/oracle-mac/`](http://www.databasestar.com/oracle-mac/)\n\
    \nThe instructions that follow apply mainly to Windows and Linux users. If on\
    \ a Mac, then the choices you make around using virtual machines versus LiveSQL\
    \ will influence which of the following activities you need to perform. For example,\
    \ Oracle Database will be preinstalled on a prebuilt virtual machine from Oracle,\
    \ whereas you’ll need to install the database yourself on a virtual machine that\
    \ you create from scratch."
