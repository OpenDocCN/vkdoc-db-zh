    子句。这是编写 SQL 时常见的错误，但幸运的是它很容易修复。


    如果你忘记添加 `GROUP BY`，SQL Developer 还会在你的 `SELECT` 列下显示彩色下划线：


    ![../images/471705_1_En_25_Chapter/471705_1_En_25_Fig1_HTML.jpg](img/471705_1_En_25_Fig1_HTML.jpg)


    图 25-1


    彩色下划线提示


    如果将鼠标悬停在其上，它将显示警告消息。


    ![../images/471705_1_En_25_Chapter/471705_1_En_25_Fig2_HTML.jpg](img/471705_1_En_25_Fig2_HTML.jpg)


    图 25-2


    缺少 GROUP BY 的警告消息


    这样，你就可以在运行查询之前发现问题。


    ### 与连接（JOIN）一起使用的 GROUP BY


    你可以将 `GROUP BY` 子句与任何 `SELECT` 查询一起使用，例如那些需要与其他表连接的查询。假设你想查看每个办公室的员工数量，但希望显示办公室的
    `address` 而不是 ID。`address` 字段在办公室表中。你的查询将如下所示：


    ```sql

    SELECT o.address,

    COUNT(*)

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id

    GROUP BY o.address

    ORDER BY o.address;

    ```


    此查询包含几个部分。它使用了表别名，“o” 代表办公室表，“e” 代表员工表。查询按办公室表中的 `address` 字段分组。同时，它还将两个表连接在一起。


    此查询的结果是：


    | ADDRESS | COUNT(*) |

    | --- | --- |

    | 10 Collins Road | 2 |

    | 123 Smith Street | 4 |

    | 45 Main Street | 3 |


    这将显示每个办公室的 `addresses`，以及查询为每个 `address` 找到的员工记录数。


    ### GROUP BY 与 SUM


    你可以将 `GROUP BY` 子句与任何聚合函数一起使用。前面的示例使用了 `COUNT`，但如果需要，你也可以使用 `SUM`。要计算每个办公室的薪资总和，你的查询可能如下所示：


    ```sql

    SELECT office_id,

    SUM(salary)

    FROM employee

    GROUP BY office_id;

    ```


    它与使用 `COUNT` 的查询非常相似，但你是在 `salary` 列上使用 `SUM` 函数。你的结果将如下所示：


    | OFFICE_ID | SUM(SALARY) |

    | --- | --- |

    | 1 | 122000 |

    | 2 | 122000 |

    | 3 | 62000 |

    | (null) | 31000 |


    这显示了每个 `office_id` 值，以及具有该 `office_id` 的所有员工的薪资值总和。你可以手动将它们相加，但使用此函数和 `GROUP BY`
    子句会自动完成计算。'
- fmt: '## GROUP BY with WHERE


    Just like with any other `SELECT` query, you can filter your results using the
    `WHERE` clause if you’re using a `GROUP BY` clause. The `WHERE` clause will filter
    any results that don’t match your criteria, and then the `GROUP BY` and aggregate
    functions will be performed on the records that are left.


    Let’s say you wanted to find the total salary for each office, excluding the employee
    SIMPSON. Your query would look like this:


    ```sql

    SELECT office_id,

    SUM(salary)

    FROM employee

    WHERE last_name <> ''SIMPSON''

    GROUP BY office_id;

    ```


    The `WHERE` clause comes before the `GROUP BY` clause. If it’s around the other
    way, you’ll get an error.


    The results from this query are:


    | OFFICE_ID | SUM(SALARY) |

    | --- | --- |

    | 1 | 70000 |

    | 2 | 122000 |

    | 3 | 62000 |

    | (null) | 31000 |


    The results are almost the same as the earlier query, except `office_id` 1 has
    a lower salary. It’s 52,000 lower because SIMPSON was excluded, and they have
    an `office_id` of 1. In this situation, the query has:


    1.  Looked at all employee records

    2.  Excluded those that have a `last_name` of SIMPSON

    3.  Displayed each of the unique `office_id` values from these results

    4.  Calculated a `SUM` for each of these `office_id` values from these results


    Using a combination of `WHERE`, aggregate functions, and `GROUP BY` makes it easy
    in SQL to get the kind of aggregate results you’re looking for.


    ### Restricting Results After Grouping


    The `WHERE` clause in a query allows you to restrict the results that you perform
    your aggregate function and grouping on. In the preceding example, you excluded
    employee SIMPSON from the `SUM` of `salary` by office.


    Let’s try a different example to see another feature of SQL. Let’s say you wanted
    to find the number of employees in each office where there are more than two employees
    in that office.


    You can start by listing the `office_id` values and the count of employees:


    ```sql

    SELECT office_id, COUNT(*)

    FROM employee

    GROUP BY office_id;

    ```


    The results will look like this:


    | OFFICE_ID | COUNT(*) |

    | --- | --- |

    | 1 | 4 |

    | 2 | 3 |

    | 3 | 2 |

    | (null) | 1 |


    This shows the number of employees in each office. Now, the next step is to only
    show the offices that have more than two employees. To do this, you could exclude
    `office_id` 3, but it’s better to exclude the records based on your criteria.
    Excluding the data based on the `id` values you find will require you to know
    these `id` values. So, let’s exclude records with 2 or fewer employees:


    ```sql

    SELECT office_id, COUNT(*)

    FROM employee

    WHERE COUNT(*) > 2

    GROUP BY office_id;

    ```


    This should only show records where the `COUNT` function has returned a value
    greater than 2. Let’s run this query and see what happens:


    ```

    ORA-00934: group function is not allowed here

    00934. 00000 -  "group function is not allowed here"

    *Cause:

    *Action:

    Error at Line: 3 Column: 7

    ```


    You’ve gotten an error. Why is this? This error has happened because of the way
    the SQL statements are processed and the rules behind it. One rule in SQL is that
    you can’t use a `WHERE` clause on any value that is a result of a `GROUP BY` clause.
    This is because the clauses in an SQL statement are processed in the following
    order, which is different to the order they are written:


    1.  `FROM`

    2.  `WHERE`

    3.  `GROUP BY`

    4.  `SELECT`

    5.  `ORDER BY`


    This means that when the `WHERE` clause is processed, all it knows is the columns
    and tables you are selecting from. It has no knowledge of the result of the `COUNT`
    function for each group, as that is done by the `GROUP BY` clause.


    How can you get the result you need? You can use a clause called `HAVING`.


    ### The HAVING Clause


    In SQL, there is a clause called the `HAVING` clause. The `HAVING` clause will
    restrict rows in your result after the `GROUP BY` has been applied. The `HAVING`
    clause looks like this:


    ```sql

    HAVING criteria

    ```


    It works in a similar way to the `WHERE` clause, as you need to specify criteria.
    However, the criteria here are meant to be the aggregate functions used in your
    `SELECT` query.


    In the earlier example, you tried to find the offices and the number of employees
    in each office where there are more than two employees. To do this, you need to
    only show records where the `COUNT(*)` is greater than 2. Because this is an aggregate
    function, you’ll need to use the `HAVING` clause for this:


    ```sql

    SELECT office_id,

    COUNT(*)

    FROM employee

    GROUP BY office_id

    HAVING COUNT(*) > 2;

    ```


    The `HAVING` clause looks the same as a `WHERE` clause would, except the keyword
    is different. Also, the `HAVING` clause goes after the `GROUP BY` clause, rather
    than after the `FROM` clause.


    If you run this query, you’ll get this result:


    | OFFICE_ID | COUNT(*) |

    | --- | --- |

    | 1 | 4 |

    | 2 | 3 |


    Both of the first two `office_id`s are displayed, as they have 4 and 3 employees
    in them. The record with an `office_id` of 3 is not shown, as it had two employees
    in it. You can see the underlying data by querying the `employee` table, and ordering
    by the `office_id` to make it easier to see:


    ```sql

    SELECT id,

    last_name,

    office_id

    FROM employee

    ORDER BY office_id ASC;

    ```


    | ID | LAST_NAME | OFFICE_ID |

    | --- | --- | --- |

    | 1 | JONES | 1 |

    | 4 | SIMPSON | 1 |

    | 6 | COOPER | 1 |

    | 9 | PATRICK | 1 |

    | 2 | SMITH | 2 |

    | 3 | KING | 2 |

    | 10 | Jones | 2 |

    | 7 | ADAMS | 3 |

    | 8 | SMITH | 3 |

    | 5 | ANDERSON | (null) |


    You can see the number of employees by looking at this result.


    ### GROUP BY, HAVING, and SUM


    You can use the `HAVING` clause with any aggregate function. The earlier example
    used the `COUNT` function, but it can also be used with other functions such as
    `SUM`, `MAX`, `MIN`, or `AVG`.


    Let’s say you needed to find the number of employees and total `salary` for each
    office where the total `salary` is greater than 100,000. This can be done by expanding
    the query from the earlier example:


    ```sql

    SELECT office_id,

    COUNT(*),

    SUM(salary)

    FROM employee

    GROUP BY office_id

    HAVING SUM(salary) > 100000;

    ```


    This query has a few differences. It has two aggregate functions: `COUNT` and
    `SUM`. This is acceptable to do in SQL. It also has a `HAVING` clause that only
    shows records where the `SUM` of `salary` is greater than 100,000. The results
    of this query are:


    | OFFICE_ID | COUNT(*) | SUM(SALARY) |

    | --- | --- | --- |

    | 1 | 4 | 122000 |

    | 2 | 3 | 122000 |


    It shows both offices 1 and 2, as their total `salary` is greater than 100000.
    The record with an `office_id` of 3 is excluded as the total `salary` is less
    than 100000.


    This example shows that you can include two aggregate functions in your query
    and use the `HAVING` clause on only one of them.'
