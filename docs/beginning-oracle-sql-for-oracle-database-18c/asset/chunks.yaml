  trans: '

    ## 数字函数


    Oracle 有一系列“数字函数”，或称为使用数字执行计算的函数。在 Oracle 中，函数可以像这样被引用：


    ```

    函数名(参数)

    ```


    这包括：


    *   `函数名`，即函数的名称

    *   左括号，其中包含一个或多个参数，或你提供给函数的输入值

    *   右括号


    函数的结果将在你指定函数的位置使用。例如，如果你在 `SELECT` 子句中将此函数用作列之一，函数的结果将显示在该列中。让我们看一些例子。


    ## ROUND 函数


    你可能经常执行的一个操作是四舍五入数字。Oracle 允许你在数据库中存储十进制数字，但有时你可能希望以整数形式显示它们。有几个函数可以让你做到这一点。其中一个函数叫做
    `ROUND`。我将使用大写字母引用 Oracle 函数，因为它们在 Oracle 文档中就是这样编写的，而且在你的 SQL 代码中也更容易阅读。


    `ROUND` 函数接受两个参数或输入：


    *   你想要四舍五入的数字

    *   要四舍五入到的小数位数


    函数的结果是你指定的数字，按你指定的小数位数进行了四舍五入。你可以像下面这样在 SQL 查询中编写它，使用一个示例数字：


    ```

    SELECT ROUND(123.456, 0)

    FROM dual;

    ```


    我们使用了本章前面提到的 `DUAL` 表。同时使用了 `ROUND` 函数，它包含两个参数。第一个是你想要四舍五入的数字，即 123.456。第二个是要四舍五入到的小数位数，即
    0。这意味着数字 123.456 将被四舍五入到 0 位小数。


    如果你运行此查询，你将得到以下结果：


    | ROUND(123.456,0) |

    | --- |

    | 123 |


    这个 `ROUND` 函数的结果是 123。这是因为 123.456 被向下舍入，而不是向上舍入。


    你也可以使用 `ROUND` 函数配合不同的小数位数。例如，要四舍五入到两位小数，你的查询将如下所示：


    ```

    SELECT ROUND(123.456, 2)

    FROM dual;

    ```


    你只需将第二个参数更改为数字 2，以代表两位小数。此查询的结果是：


    | ROUND(123.456,2) |

    | --- |

    | 123.46 |


    结果是 123.46，因为 123.456 被向上舍入为 123.46。


    ## CEILING 和 FLOOR 函数


    在 Oracle SQL 中还有另外两种对数字进行取整的方法，它们使用 `CEILING` 和 `FLOOR` 函数。`CEILING` 函数会将数字向上舍入到最接近的整数，而
    `FLOOR` 函数会将数字向下舍入到最接近的整数。


    这些函数的语法是：


    ```

    CEILING (输入数字)

    FLOOR (输入数字)

    ```


    这些函数中的每一个都接受单个参数，即要取整的数字。与 `ROUND` 函数不同，这些函数不需要用于指定位数的第二个参数，因为它们总是取整到整数。


    使用这些函数的一个查询如下所示。我使用了列别名以使输出更整洁。


    ```

    SELECT

    CEILING(123.456) AS 向上取整结果,

    FLOOR(123.456) AS 向下取整结果

    FROM dual;

    ```


    | 向上取整结果 | 向下取整结果 |

    | --- | --- |

    | 124 | 123 |


    `CEILING` 函数将数字向上舍入为 124，而 `FLOOR` 函数将数字向下舍入为 123。Oracle 中的其他数字函数的工作方式相同，你提供一个输入值，然后计算出一个结果。


    ## 对表数据使用数字函数


    让我们看一个使用表中某列的函数示例。假设 `employee` 表中存储的 `salary` 是一个年薪值，我们想看看月值会是多少。然而，除了月值之外，我们还想看看如果我们将
    `salary` 除以 12 并向下取整后，“剩余”金额会是多少。例如，30/12 的值将是 2（2*12=24），剩余 6（30-24=6）。我们可以在
    Oracle 中使用函数来实现这一点：`FLOOR` 函数和 `MOD` 函数。


    `MOD` 函数执行*模除运算*，这意味着它将一个数字除以另一个数字并返回余数。


    我们的查询将如下所示：


    ```

    SELECT

    Id,

    last_name,

    salary,

    FLOOR(salary/12) AS 月薪,

    MOD(salary, 12) AS 月剩余金额

    FROM employee;

    ```


    此查询包含 `FLOOR` 函数，首先将 `salary` 除以 12，然后将结果四舍五入到最接近的整数。`MOD` 函数获取 `salary` 值，将其除以
    12，并显示剩余值。


    此查询的结果将是：


    | ID | 姓氏 | 年薪 | 月薪 | 月剩余金额 |

    | --- | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 2500 | 0 |

    | 2 | SMITH | 35000 | 2916 | 8 |

    | 3 | KING | 45000 | 3750 | 0 |

    | 4 | SIMPSON | 52000 | 4333 | 4 |

    | 5 | ANDERSON | 31000 | 2583 | 4 |

    | 6 | COOPER | (null) | (null) | (null) |

    | 7 | ADAMS | (null) | (null) | (null) |

    | 8 | SMITH | 62000 | 5166 | 8 |

    | 9 | PATRICK | 40000 | 3333 | 4 |


    这显示了 `salary`，以及向下取整后的月 `salary`。它还显示了 `salary` 除以 12 后的剩余值。例如，员工 JONES 的年薪为 30000，可以有
    2500 的月薪，剩余 0，因为 2500*12 = 30000。

    '
- fmt: '## Concatenation of Strings


    Earlier in this chapter you learned how to use symbols to perform mathematical
    operations, such as addition and subtraction. You can use another symbol to perform
    a different operation using string or text values: *concatenation*.


    Concatenation is the process of joining two string values together. This is often
    done because values are stored in separate columns or in separate tables, but
    you want to display them both in one column. For example, if you had a column
    called `first_name` in our employee table, you may want to concatenate the `first_name`
    and `last_name` to make a full name.


    How can you concatenate strings in Oracle? You use two pipe characters: `"||"`.
    You place these two characters between two other strings, and the result will
    be a single value that combines them.


    For example, you can combine the name `"John"` and the name `"Smith"` using concatenation:


    ```sql

    SELECT ''John'' || ''Smith''

    FROM dual;

    ```


    The result would be:


    | JOHN&#124;&#124;SMITH |

    | --- |

    | JohnSmith |


    This shows a single column with the combined value. However, there is no space
    between the values, as we didn’t specify one with the concatenation. Concatenating
    does not automatically add spaces, so if you want one, you need to add it manually.
    Let’s try this query:


    ```sql

    SELECT ''John '' || ''Smith'' AS full_name

    FROM dual;

    ```


    I’ve also added in a column alias to make the result easier to read. The result
    is:


    | FULL_NAME |

    | --- |

    | John Smith |


    This now shows the value with a space between it. You can also concatenate values
    from a table. Let’s say you needed to combine the `last_name` and `salary` values
    from the `employee` table:


    ```sql

    SELECT id,

    last_name || salary

    FROM employee;

    ```


    The results would be:


    | ID | LAST_NAME&#124;&#124;SALARY |

    | --- | --- |

    | 1 | JONES30000 |

    | 2 | SMITH35000 |

    | 3 | KING45000 |

    | 4 | SIMPSON52000 |

    | 5 | ANDERSON31000 |

    | 6 | COOPER |

    | 7 | ADAMS |

    | 8 | SMITH62000 |

    | 9 | PATRICK40000 |


    The main issue with this result set is that it’s hard to read the value from the
    concatenation, as the name leads straight into the number value.


    How can you resolve the issue of the name leading right into the numbers? You
    can add in a space and a comma, for example. This can be done by adding in a third
    concatenated value into this. This means your value would show the `last_name`,
    then a comma and a space, then the salary. The query to do this is:


    ```sql

    SELECT id,

    last_name || '', '' || salary

    FROM employee;

    ```


    The results of this query are:


    | ID | LAST_NAME&#124;&#124;,&#124;&#124;SALARY |

    | --- | --- |

    | 1 | JONES, 30000 |

    | 2 | SMITH, 35000 |

    | 3 | KING, 45000 |

    | 4 | SIMPSON, 52000 |

    | 5 | ANDERSON, 31000 |

    | 6 | COOPER, |

    | 7 | ADAMS, |

    | 8 | SMITH, 62000 |

    | 9 | PATRICK, 40000 |


    These results are easier to read. You’ve added a space and a comma, and the results
    are now in a single column. If you ever need to combine string values, or strings
    with numbers or dates, you can use this concatenation technique.


    ## String Functions


    Oracle also offers some functions to work with strings, just like you learned
    when working with numbers earlier. There are a lot of these types of functions,
    and they let you do a wide range of things to string values such as:


    *   Change case (upper and lower case)

    *   Find strings within other strings and extract the position or the string

    *   Add or remove characters, such as spaces, from the ends of a string

    *   Translate ASCII codes


    In this section, you’ll see how to use a few of these functions.


    ### Changing Case


    There are two functions for changing the case of a string that you’ll learn about
    in this section: one for changing to upper case, and one for changing to lower
    case. These functions are used to transform your string or character data into
    a consistent format.


    Why do you want data in a consistent format? Perhaps you allow users to enter
    data in a form, in a mix of upper and lower case, and you want to store it the
    same way to make it easier to display and search at a later date.


    To transform a string value to an uppercase value, you use the `UPPER` function.
    The syntax of the `UPPER` function looks like this:


    ```sql

    UPPER (input_string)

    ```


    It only takes one parameter, which is the `input_string`, or the string you want
    to convert to upper case. The function returns the same value in upper case.


    You can see how this function works by querying the `office` table, as the `address`
    field has data that is in upper case and lower case:


    ```sql

    SELECT id,

    address,

    UPPER(address)

    FROM office;

    ```


    The results of this query are:


    | ID | ADDRESS | UPPER(ADDRESS) |

    | --- | --- | --- |

    | 1 | 123 Smith Street | 123 SMITH STREET |

    | 2 | 45 Main Street | 45 MAIN STREET |

    | 3 | 10 Collins Road | 10 COLLINS ROAD |


    You can see the `id` column, the original `address`, and the `address` as a result
    of the `UPPER` function. The value reads the same way but has just been converted
    to an uppercase value (`123 SMITH STREET` instead of `123 Smith Street`). Any
    letters that are already uppercase letters are unchanged, lowercase letters are
    translated to uppercase letters, and numbers are unchanged.


    You can use a similar query for converting data to lowercase. Oracle’s `LOWER`
    function lets you do that, and the syntax is similar to the `UPPER` function:


    ```sql

    LOWER (input_string)

    ```


    The function converts all of the characters to lowercase characters. A query to
    do this for the `office` table would look like this:


    ```sql

    SELECT id,

    address,

    LOWER(address)

    FROM office;

    ```


    The results are:


    | ID | ADDRESS | LOWER(ADDRESS) |

    | --- | --- | --- |

    | 1 | 123 Smith Street | 123 smith street |

    | 2 | 45 Main Street | 45 main street |

    | 3 | 10 Collins Road | 10 collins road |


    These results show the address in lowercase. The numbers and existing lowercase
    characters are unchanged, and the uppercase characters were converted to lowercase.


    ### Checking for Matches on the Same Case


    A common way that I’ve seen the `UPPER` and `LOWER` functions work is when comparing
    data or looking for data in a table. This would be done inside the `WHERE` clause.


    To demonstrate an example of this, you’ll need to insert a new record into the
    `employee` table for the employee “Jones.”


    ```sql

    INSERT INTO employee (id, last_name, salary, office_id)

    VALUES (10, ''Jones'', 42000, 2);

    ```


    When you run a `SELECT` statement on the table, it will look like this:


    ```sql

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee;

    ```


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 1 |

    | 2 | SMITH | 35000 | 2 |

    | 3 | KING | 45000 | 2 |

    | 4 | SIMPSON | 52000 | 1 |

    | 5 | ANDERSON | 31000 | (null) |

    | 6 | COOPER | (null) | 1 |

    | 7 | ADAMS | (null) | 3 |

    | 8 | SMITH | 62000 | 3 |

    | 9 | PATRICK | 40000 | 1 |

    | 10 | Jones | 42000 | 2 |


    Now let’s say you wanted to find all employees with the name of `JONES`. You’ve
    seen a few of the records and understand that `employee` `last_names` are stored
    in uppercase, so your query looks like this:


    ```sql

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee

    WHERE last_name = ''JONES'';

    ```


    When you run this query, you get this result:


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 1 |


    What about the new record you just inserted for `Jones`? Shouldn’t that have shown
    up as well? In this case, the Oracle database has shown the correct result. This
    is because the `WHERE` clause in Oracle is case sensitive. This means that `"JONES"`
    does not equal `"Jones"` and it does not equal `"jones"`.'
