- fmt: '### Finding Records with AND for Greater Than and Less Than on Two Columns


    Another example of using the `AND` keyword is using other comparison operators
    besides equals and `LIKE`. Let’s say you wanted to find the records where the
    `ID` is greater than or equal to 3 and the `salary` is less than 40000. Your query
    would look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE id >= 3

    AND salary < 40000;

    ```


    The results would look like this:


    ```

    ID   LAST_NAME   SALARY

    5    ANDERSON    31000

    ```


    This is the only record shown, because even though `KING` and `SIMPSON` have an
    `ID` greater than or equal to 3, their `salary` is not less than 40000.


    ## The OR Keyword


    The second way of using multiple filters on a query is to use the `OR` keyword.
    The `OR` keyword is used in the same way as the `AND` keyword. However, the difference
    is that `OR` means that at least one of the two criteria needs to be met, but
    it doesn’t need to be both like the `AND` keyword.


    Using the `OR` keyword looks like this:


    ```sql

    WHERE condition

    OR condition

    ```


    The `OR` keyword works in the same way as the `AND` keyword. It’s used in the
    `WHERE` clause and you can use it to specify a second condition to check for.
    If either one (or both) of the two conditions is true for a row, then it is included
    in the results. The `OR` keyword is useful for checking multiple conditions and
    seeing results where at least one of those conditions is true.


    ### Finding Records with OR for a Last Name or a Salary


    Let’s look at the earlier examples rewritten using `OR` instead of `AND`. You
    want to find records where a `last_name` contained the letter “S,” or the `salary`
    was greater than 32000. Your query would look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    OR salary > 32000;

    ```


    Your results would look like this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    The results show every record in the table. The records with the `last_name` of
    `''JONES''`, `''SMITH''`, `''SIMPSON''`, and `''ANDERSON''` are shown, as they
    all have an “S” in their `last_name`. The record of `''KING''` is shown because
    they have a `salary` greater than 32000. Some records only meet one of the two
    criteria (having an “S” in their `last_name` or `salary` greater than 32000),
    but that’s OK; they’re still included in the results.


    ### Finding Records with OR for Greater Than or Less Than on Two Columns


    Let’s see another example using `OR`. You may want to see all records where the
    `ID` is greater than or equal to 4, or the `salary` is less than 40000.


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE id >= 4

    OR salary < 40000;

    ```


    The results would look like this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    We can explain the treatment of each of the records in our table:


    *   `JONES`: This is shown because the `salary` is less than 40000.

    *   `SMITH`: This is also shown because the `salary` is less than 40000.

    *   `KING`: This is not shown, as the `salary` is not less than 40000 and the
    `ID` is not greater than or equal to 4.

    *   `SIMPSON`: This is shown because the `ID` is greater than or equal to 4.

    *   `ANDERSON`: This is shown because the `ID` is greater than or equal to 4 and
    the `salary` is less than 40000.


    ## More Than Two Conditions


    You’ve seen a few examples of `AND` and `OR` with two conditions. What if you
    wanted to use more than two conditions? You can do this in SQL using `AND` and
    `OR`. You simply add another `AND` or `OR` to the end of the `WHERE` clause:


    ```sql

    WHERE condition

    [{AND|OR} condition]

    [{AND|OR} condition]

    ```


    You’ll see syntax like this when you’re reading SQL documentation. The square
    brackets `[` and `]` mean that the part inside is optional. The curly brackets
    `{` and `}` mean that the part inside is mandatory. Finally, the vertical pipe
    `|` means that one of the options must be chosen.


    So, this syntax means that you need to have a `WHERE` condition, then you could
    have an `AND` or `OR` condition. If you do have an `AND` or `OR` condition, you
    need to write either `AND condition` or `OR condition`.


    You can add many more `AND` or `OR` conditions to your query. You can also use
    different combinations of `AND` and `OR` in your query.


    ### Multiple AND Conditions


    Let’s see some examples. You may want to see all `employees` where the `last_name`
    contains “S” and the `salary` is greater than 30000 and less than 40000. Your
    query would look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    AND salary > 30000

    AND salary < 40000;

    ```


    Your results would look like this:


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    5    ANDERSON    31000

    ```


    This shows both `''SMITH''` and `''ANDERSON''` because they meet all three criteria
    in the query:


    *   The `last_name` contains “S”.

    *   The `salary` is greater than 30000.

    *   The `salary` is less than 40000.


    ### Multiple OR Conditions


    Let’s look at an example using multiple `OR` keywords. Let’s say you want to see
    all `employee` records where the `salary` is less than 25000, or the `salary`
    is greater than 50000, or the `last_name` contains a “G”. This is what your query
    would look like:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary < 25000

    OR salary > 50000

    OR last_name LIKE ''%G%'';

    ```


    The results of this query would be:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    4    SIMPSON     52000

    ```


    The record for `''JONES''` is shown because the `salary` is less than 25000. The
    record for `''KING''` is shown because the `last_name` contains a G, and `''SIMPSON''`
    is shown because the `salary` is greater than 50000. Only one of the conditions
    needs to be true for the row to be shown.


    ### Combining Multiple AND and OR Conditions


    What if you wanted to mix these keywords, by putting both `AND` and `OR` into
    one query? You can do that. Let’s say you had this query:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    AND salary > 30000

    OR salary < 40000;

    ```


    You have `condition1 AND condition2 OR condition3`. What would these results look
    like? It would look like this:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    How did you get this result? The `AND` and `OR` keywords are evaluated in a certain
    order. This is called the *order of operations*. This concept applies to several
    areas in SQL, and you might remember it from mathematics class, where some operations
    had priority over others.


    `AND` and `OR` both have the same priority. They are both used in sequence. So,
    for this query, the logic says to show records that:


    *   Have a `last_name` containing S and a `salary` greater than 30000

    *   Or, have a `salary` less than 40000


    These are two separate conditions now. The records for `''SMITH''`, `''SIMPSON''`,
    and `''ANDERSON''` are shown because they meet the first criteria of having a
    `last_name` with S and a `salary` greater than 30000. `''JONES''` is shown because
    it has a `salary` less than 40000. `''KING''` is not shown.'
