    ### 结合 WHERE 进行计数


    使用 `COUNT` 函数的另一种方式是在 `SELECT` 查询中结合 `WHERE` 子句。前面的例子都涉及计算表中的所有记录，但有时你可能需要计算满足特定条件的记录。这和之前所做的那样，在
    `SELECT` 查询中添加一个 `WHERE` 子句一样简单。


    假设你需要找出 `salary` 小于或等于 40000 的 `employees` 数量。一个可以实现此目的的查询是：


    ```sql

    SELECT COUNT(*)

    FROM employee

    WHERE salary <= 40000;

    ```


    这个查询使用了 `COUNT(*)` 函数以及一个 `WHERE` 子句，仅统计我们想要计数的员工。结果是：


    | COUNT(*) |

    | --- |

    | 4 |


    这个查询确定了有 4 名员工符合该标准。


    ## AVG 函数


    Oracle 包含一个名为 `AVG` 的函数，是“平均值（average）”的缩写。此函数用于查找一组数值的平均值。平均值是通过将所有非 `NULL` 值相加，再除以非
    `NULL` 值的数量来计算的。该函数的语法与 `SUM` 和 `COUNT` 函数相似：


    ```sql

    AVG ( [DISTINCT] expression)

    ```


    此函数的参数与 `COUNT` 函数相同：


    *   `expression`：这是要计算平均值的表达式，可以是表中的某个列或其他数值的表示。

    *   `DISTINCT`：这是一个可选参数，指定 `AVG` 函数应仅计算表达式中不同或唯一的值的平均值。


    让我们看一些例子。


    ### 所有值的平均值


    使用 `AVG` 函数的一种方法是找出某列所有值的平均值。这只适用于数值，因此在本例中，你需要找出所有员工的平均 `salary`：


    ```sql

    SELECT AVG(salary)

    FROM employee;

    ```


    与之前的 `COUNT` 和 `SUM` 函数类似，你在括号内指定列名。数据库将查看该列中所有非 `NULL` 的值，计算它们的平均值，并将结果显示给你。此查询的结果是：


    | AVG(SALARY) |

    | --- |

    | 42125 |


    这显示了平均工资是 42,125。你可以通过选择这些值来检查表中有哪些 `salary` 值：


    | ID | SALARY |

    | --- | --- |

    | 1 | 30000 |

    | 2 | 35000 |

    | 3 | 45000 |

    | 4 | 52000 |

    | 5 | 31000 |

    | 6 | (null) |

    | 7 | (null) |

    | 8 | 62000 |

    | 9 | 40000 |

    | 10 | 42000 |


    ```sql

    SELECT id, salary

    FROM employee;

    ```


    ### 使用 DISTINCT 计算平均值


    你也可以使用 `AVG` 函数来计算唯一或不同值的平均值。它的工作方式与 `COUNT` 函数相同，即消除列中的重复值，然后对剩余值计算平均值。查询可能如下所示：


    ```sql

    SELECT AVG(DISTINCT salary)

    FROM employee;

    ```


    | AVG(DISTINCTSALARY) |

    | --- |

    | 42125 |


    这个查询找到了不同值的平均值。


    ### 结合 WHERE 计算平均值


    最后，就像 `SUM` 和 `COUNT` 函数一样，你可以在带有 `WHERE` 子句的查询中使用 `AVG`。你可以将 `WHERE` 子句单独添加到查询中，与
    `AVG` 函数分开。


    假设你需要找出办公室编号为 2 的 `employees` 的平均 `salary`。为此，你的查询可以是：


    ```sql

    SELECT AVG(salary)

    FROM employee

    WHERE office_id = 2;

    ```


    结果是：


    | AVG(SALARY) |

    | --- |

    | 40666.66666 |


    这个查询将找到所有 `office_id` 为 2 的 `employees`，然后计算这些员工的平均 `salary`。你可以运行一个 `SELECT`
    查询来查看它使用了哪些记录：


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 10 | Jones | 42000 |


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE office_id = 2;

    ```


    这三条记录被用于 `AVG` 函数，其 `salary` 值的平均值为 40,666。


    ## MIN 函数


    `MIN` 是另一个聚合函数，用于在值列表中查找最小值或最低值。它与 `AVG` 和 `SUM` 一样，用于数值，并且会忽略任何 `NULL` 值。


    要使用 `MIN` 函数，请遵循以下语法：


    ```sql

    MIN (expression)

    ```


    这里的 `expression` 指的是用于计算最小值的值。最常见的，这将是表中的一个列。让我们看一些 `MIN` 函数的例子。


    ### 所有记录的最小值


    你可以编写一个简单的查询，使用 `MIN` 来查找所有记录的最小值。例如，要找到最小的 `salary`，你的查询可能如下所示：


    ```sql

    SELECT MIN(salary)

    FROM employee;

    ```


    这个查询的结果是：


    | MIN(SALARY) |

    | --- |

    | 30000 |


    这显示了最小或最低的 `salary` 是 30000。通过查看表中的所有 `salary` 值，你可以确认这一点。


    | ID | SALARY |

    | --- | --- |

    | 1 | 30000 |

    | 2 | 35000 |

    | 3 | 45000 |

    | 4 | 52000 |

    | 5 | 31000 |

    | 6 | (null) |

    | 7 | (null) |

    | 8 | 62000 |

    | 9 | 40000 |

    | 10 | 42000 |


    ```sql

    SELECT id, salary

    FROM employee;

    ```


    你可以通过 `salary` 列对这个查询进行排序，以便更容易地找到最低值。


    | ID | SALARY |

    | --- | --- |

    | 1 | 30000 |

    | 5 | 31000 |

    | 2 | 35000 |

    | 9 | 40000 |

    | 10 | 42000 |

    | 3 | 45000 |

    | 4 | 52000 |

    | 8 | 62000 |

    | 6 | (null) |

    | 7 | (null) |


    ```sql

    SELECT id, salary

    FROM employee

    ORDER BY salary ASC;

    ```


    现在你可以看到最低的 `salary` 是 30000。`NULL` 值被忽略，因为它们代表未知的值，这与零不同。


    ### 结合 WHERE 计算最小值


    就像之前的函数一样，你可以在带有 `WHERE` 子句的查询中使用 `MIN` 函数。假设你想找出所有在 `office_id` 为 3 的 `employees`
    中的最低 `salary`。为此，你的查询如下所示：


    ```sql

    SELECT MIN(salary)

    FROM employee

    WHERE office_id = 3;

    ```


    结果是：


    | MIN(SALARY) |

    | --- |

    | 62000 |


    这是最小值，因为只有两个员工的 `office_id` 是 3，而其中一个的 `salary` 值是 `NULL`。


    ## MAX 函数


    你将学到的最后一个聚合函数是 `MAX` 函数。此函数将找出一组值中的最大值或最高值。它与 `MIN` 函数相反。要使用此函数，请遵循以下语法：


    ```sql

    MAX (expression)

    ```


    这里的 `expression` 指的是用于计算最大值的值。最常见的，这将是表中的一个列。让我们看一些 `MAX` 函数的例子。


    ### 所有记录的最大值


    你可以使用 `MAX` 函数来查找表中某列的最高值，就像使用 `MIN` 函数查找最小值一样。一个实现此目的的查询如下所示：


    ```sql

    SELECT MAX(salary)

    FROM employee;

    ```


    这将显示以下结果：


    | MAX(SALARY) |

    | --- |

    | 62000 |


    这显示了表中最高的 `salary`，即 62,000。你可以通过从表中选择所有 `salary` 值并按 `salary` 降序排列来确认这一点：


    | ID | SALARY |

    | --- | --- |

    | 8 | 62000 |

    | 4 | 52000 |

    | 10 | 42000 |

    | 3 | 45000 |

    | 9 | 40000 |

    | 2 | 35000 |

    | 5 | 31000 |

    | 1 | 30000 |

    | 6 | (null) |

    | 7 | (null) |


    ```sql

    SELECT id, salary

    FROM employee

    ORDER BY salary DESC NULLS LAST;

    ```


    与本章中所有其他函数一样，`NULL` 值被忽略。


    ### 结合 WHERE 计算最大值


    你也可以在查询中使用 `WHERE` 子句时使用 `MAX` 函数。`MAX` 函数将应用于匹配 `WHERE` 子句的所有行中的值。


    例如，要找出办公室 1 或 2 中所有 `employees` 的最高 `salary`，可以使用以下查询：


    ```sql

    SELECT MAX(salary)

    FROM employee

    WHERE office_id IN (1, 2);

    ```


    结果是：


    | MAX(SALARY) |

    | --- |

    | 52000 |


    这是办公室 1 或 2 中员工的最高 `salary`。

    '
- fmt: '## Summary


    聚合函数是查看一行或多行并将这些数据聚合为单个结果的函数。五个最常见的函数是 `SUM`（用于累加值）、`COUNT`（用于计数值的数量）、`AVG`（用于求平均值）、`MAX`（用于求最大值）和
    `MIN`（用于求最小值）。它们都忽略 `NULL` 值，并且可以与 `WHERE` 子句一起使用。


    # 25. 分组结果


    在上一章中，你学习了聚合函数。这些函数计算列中值的某个值（例如总和或计数），并向你显示单行结果。在本章中，你将学习如何编写查询以对结果进行分组。这是什么意思？


    ### 分组数据


    要理解分组数据的概念，让我们看一下员工表。


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 1 |

    | 2 | SMITH | 35000 | 2 |

    | 3 | KING | 45000 | 2 |

    | 4 | SIMPSON | 52000 | 1 |

    | 5 | ANDERSON | 31000 | (null) |

    | 6 | COOPER | (null) | 1 |

    | 7 | ADAMS | (null) | 3 |

    | 8 | SMITH | 62000 | 3 |

    | 9 | PATRICK | 40000 | 1 |

    | 10 | Jones | 42000 | 2 |


    ```sql

    SELECT id, last_name, salary, office_id

    FROM employee;

    ```


    在上一章中，你学习了如何使用 `SUM` 找出所有薪资值的总和，以及如何使用 `COUNT` 计算记录数。这些函数查看表中的所有值并向你显示一个值。它们让你能够找到如下问题的答案：


    *   计算所有薪资值的总和

    *   计算办公室ID为1的员工的薪资总和

    *   计算员工数量

    *   计算办公室ID为2的员工数量


    如果你想找出每个办公室的员工数量怎么办？你可以编写如下查询：


    ```sql

    SELECT COUNT(*)

    FROM employee

    WHERE office_id = 1;

    ```


    这将显示 `office_id` 值为1的员工数量。然后你必须为下一个 `office_id` 运行另一个查询：


    ```sql

    SELECT COUNT(*)

    FROM employee

    WHERE office_id = 2;

    ```


    然后你将运行这些查询，直到获得所有 `office_id` 值的 `COUNT` 结果。这样做有几个缺点：


    *   你必须为每个不同的 `office_id` 值编写查询，这很耗时。

    *   在编写查询之前，你需要知道每个 `office_id` 值是什么。

    *   你必须合并所有这些单独查询的结果。


    不过，有一种更好的方法：分组。Oracle SQL 允许你在使用聚合函数时创建数据组。这将让你无需运行单独的查询就能找到诸如“计算每个办公室ID的员工数量”之类问题的答案。对于此示例，这就是我们想要的结果。


    | OFFICE_ID | COUNT(*) |

    | --- | --- |

    | 1 | 4 |

    | 2 | 3 |

    | 3 | 2 |

    | (null) | 1 |


    如何用SQL实现这一点呢？有一个名为 `GROUP BY` 的关键字可以与 `SELECT` 语句一起使用。


    ### GROUP BY 关键字


    在SQL中，`GROUP BY` 关键字允许你在运行 `SELECT` 查询时对数据进行分组。要使用 `GROUP BY`，你需要：


    *   一个聚合函数，例如 `SUM` 或 `COUNT`

    *   用于对这些数据进行分组的列


    在我们的示例中，你想计算每个办公室ID的员工数量。这意味着你想按其分组数据的列是 `office_id`，因为描述是“在每个办公室ID中”。你还需要查看员工数量，这是使用
    `COUNT` 完成的。


    要开始 `SELECT` 查询，你指定要显示的列，然后是 `COUNT`：


    ```sql

    SELECT office_id, COUNT(*)

    ```


    这将显示 `office_id` 列，然后是一个 `COUNT` 列。然后你添加表名：


    ```sql

    SELECT office_id, COUNT(*)

    FROM employee

    ```


    现在你添加一个 `GROUP BY` 关键字。这定义了你希望如何对数据进行分组，或者 `COUNT` 函数应如何计算。你想为 `office_id` 的每个不同值计算
    `COUNT`，因此你的 `GROUP BY` 子句将如下所示：


    ```sql

    SELECT office_id, COUNT(*)

    FROM employee

    GROUP BY office_id;

    ```


    记住这一点的一个简单方法是：`SELECT` 子句中任何不是聚合函数的列都应该出现在 `GROUP BY` 子句中。在此查询中，`office_id` 位于
    `SELECT` 子句中，也位于 `GROUP BY` 子句中。`COUNT(*)` 函数不在 `GROUP BY` 子句中，因为它是一个聚合函数。现在让我们运行这个查询。


    | OFFICE_ID | COUNT(*) |

    | --- | --- |

    | 1 | 4 |

    | 2 | 3 |

    | 3 | 2 |

    | (null) | 1 |


    这正好显示了你想要的结果。这个简单的查询让你无需知道 `office_id` 值是什么，也无需编写单独的查询，就能找出每个办公室的员工数量。


    如果你不使用 `GROUP BY` 子句会怎样？


    ```sql

    SELECT office_id, COUNT(*)

    FROM employee;

    ```


    如果你运行此查询，你可能期望看到相同的结果。然而，你看到的是：


    ```

    ORA-00937: not a single-group group function

    00937. 00000 -  "not a single-group group function"

    *Cause:

    *Action:

    Error at Line: 1 Column: 8

    ```


    此错误意味着你有一个带有聚合函数的列，但没有 `GROUP BY` 子句。此SQL无效，因为需要 `GROUP BY` 子句。这是编写SQL时常见的错误，但幸运的是它很容易修复。


    如果你忘记添加 `GROUP BY`，SQL Developer 还会在你的 `SELECT` 列下显示彩色下划线：


    ![../images/471705_1_En_25_Chapter/471705_1_En_25_Fig1_HTML.jpg](Images/471705_1_En_25_Fig1_HTML.jpg)


    图 25-1


    彩色下划线


    如果将鼠标悬停在其上，它将显示警告消息。


    ![../images/471705_1_En_25_Chapter/471705_1_En_25_Fig2_HTML.jpg](Images/471705_1_En_25_Fig2_HTML.jpg)


    图 25-2


    缺少 GROUP BY 的警告消息


    这样，你就可以在运行查询之前发现问题。


    ### 带连接的 GROUP BY


    你可以将 `GROUP BY` 子句与任何 `SELECT` 查询一起使用，例如那些与其他表连接的查询。假设你想查看每个办公室的员工数量，但想查看办公室的
    `address` 而不是ID。`address` 在办公室表中。你的查询将如下所示：


    ```sql

    SELECT o.address,

    COUNT(*)

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id

    GROUP BY o.address

    ORDER BY o.address;

    ```


    此查询包含几个部分。它有表别名，“o” 表示办公室，“e” 表示员工。查询按办公室表中的 `address` 字段分组。它还将两个表连接在一起。


    此查询的结果是：


    | ADDRESS | COUNT(*) |

    | --- | --- |

    | 10 Collins Road | 2 |

    | 123 Smith Street | 4 |

    | 45 Main Street | 3 |


    这将显示每个办公室的 `addresses`，以及查询为每个 `address` 找到的记录数。


    ### GROUP BY 和 SUM


    你可以将 `GROUP BY` 子句与任何聚合函数一起使用。前面的示例使用了 `COUNT`，但如果需要，你也可以使用 `SUM`。要计算每个办公室的薪资总和，你的查询可能如下所示：


    ```sql

    SELECT office_id,

    SUM(salary)

    FROM employee

    GROUP BY office_id;

    ```


    它与使用 `COUNT` 的查询非常相似，但你是在 `salary` 列上使用 `SUM`。你的结果将如下所示：


    | OFFICE_ID | SUM(SALARY) |

    | --- | --- |

    | 1 | 122000 |

    | 2 | 122000 |

    | 3 | 62000 |

    | (null) | 31000 |


    这显示了每个 `office_id` 值以及具有该 `office_id` 的员工的薪资值总和。你可以手动相加，但使用此函数和 `GROUP BY` 子句将自动计算它。'
  raw: '## Summary


    Aggregate functions are functions that look at one or many rows and aggregate
    that data into a single result. The five most common functions are `SUM` (which
    adds up values), `COUNT` (which counts the number of values), `AVG` (which finds
    an average value), `MAX` (which finds the maximum value), and `MIN` (which finds
    the lowest value). All of them ignore `NULL` values and can be used with a `WHERE`
    clause.


    # 25. Grouping Your Results


    In the last chapter, you learned about aggregate functions. These functions calculated
    a value, such as a sum or a count, over the values in a column and showed you
    a single row of results. In this chapter, you’ll learn how to write a query that
    groups your results. What does that mean?


    ## Grouping Your Data


    To understand the concept of grouping data, let’s take a look at the employee
    table.


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 1 |

    | 2 | SMITH | 35000 | 2 |

    | 3 | KING | 45000 | 2 |

    | 4 | SIMPSON | 52000 | 1 |

    | 5 | ANDERSON | 31000 | (null) |

    | 6 | COOPER | (null) | 1 |

    | 7 | ADAMS | (null) | 3 |

    | 8 | SMITH | 62000 | 3 |

    | 9 | PATRICK | 40000 | 1 |

    | 10 | Jones | 42000 | 2 |


    ```

    SELECT id, last_name, salary, office_id

    FROM employee;

    ```


    In the last chapter, you learned how to find the total of all of the salary values
    using `SUM` and how to count the number of records using `COUNT`. These functions
    look at all of the values in the table and show you a value. They let you find
    the answer to questions like:


    *   Find the sum of all salary values


    *   Find the sum of all salary values for employees in office_id 1


    *   Find the number of employees


    *   Find the number of employees in office_id 2


    What if you wanted to find the number of employees in each office? You could write
    a query like this:


    ```

    SELECT COUNT(*)

    FROM employee

    WHERE office_id = 1;

    ```


    This would show the number of employees with an `office_id` value of 1\. You would
    then have to run another query for the next `office_id`:


    ```

    SELECT COUNT(*)

    FROM employee

    WHERE office_id = 2;

    ```


    You would then run these queries until you got the `COUNT` results for all of
    your `office_id` values. There are a few disadvantages to doing it this way:


    *   You have to write queries for each different office_id value, which takes
    time.


    *   You need to know what each of the office_id values are before writing the
    query.


    *   You’ll have to combine the results of all of these separate queries.


    There is a better way to do this though: grouping. Oracle SQL allows you to create
    groups of data when using aggregate functions. This will let you find the answer
    to questions such as “find the number of employees in each office_id” without
    having to run separate queries. For this example, this is the kind of result we
    are looking for.


    | OFFICE_ID | COUNT(*) |

    | --- | --- |

    | 1 | 4 |

    | 2 | 3 |

    | 3 | 2 |

    | (null) | 1 |


    How can you do this with SQL? There’s a keyword called `GROUP BY` that can be
    used with a `SELECT` statement.


    ## The GROUP BY Keyword


    In SQL, the `GROUP BY` keyword lets you group data when running a `SELECT` query.
    To use `GROUP BY`, you need:


    *   An aggregate function, such as SUM or COUNT


    *   Columns to group this data by


    In our example, you want to find the number of employees in each office_id. This
    means the column you want to group this data by is the `office_id`, as the description
    says “in each office_id.” You also want to see the number of employees, which
    is done using `COUNT`.


    To start the `SELECT` query, you specify the column to display and then `COUNT`:


    ```

    SELECT office_id, COUNT(*)

    ```


    This will display the `office_id` column, and then a `COUNT` column. You then
    add in the table name:


    ```

    SELECT office_id, COUNT(*)

    FROM employee

    ```


    Now you add in a `GROUP BY` keyword. This defines how you want to group your data,
    or how the `COUNT` function should be calculated. You want to calculate the `COUNT`
    for each different value of `office_id`, so your `GROUP BY` clause will look like
    this:


    ```

    SELECT office_id, COUNT(*)

    FROM employee

    GROUP BY office_id;

    ```


    One easy way to remember this is that any column in the `SELECT` clause that is
    not an aggregate function should be in the `GROUP BY` clause. In this query, the
    `office_id` is in the `SELECT` clause and is also in the `GROUP BY` clause. The
    `COUNT(*)` function is not in the `GROUP BY` clause because it is an aggregate
    function. Let’s run this query now.


    | OFFICE_ID | COUNT(*) |

    | --- | --- |

    | 1 | 4 |

    | 2 | 3 |

    | 3 | 2 |

    | (null) | 1 |


    This shows you the exact result that you want. This simple query lets you find
    the number of employees in each office, without having to know what the `office_id`
    values are and without having to write separate queries.


    What if you didn’t use the `GROUP BY` clause?


    ```

    SELECT office_id, COUNT(*)

    FROM employee;

    ```


    If you run this query, you might expect to see the same results. However, this
    is what you see:


    ```

    ORA-00937: not a single-group group function

    00937\. 00000 -  "not a single-group group function"

    *Cause:

    *Action:

    Error at Line: 1 Column: 8

    ```


    This error means that you have a column with an aggregate function, but no `GROUP
    BY` clause. This SQL is invalid, as the `GROUP BY` clause is needed. This is a
    common error that you’ll get when writing SQL, but fortunately it’s an easy fix.


    SQL Developer will also show a colored underline under your SELECT columns if
    you forget to add a GROUP BY:


    ![../images/471705_1_En_25_Chapter/471705_1_En_25_Fig1_HTML.jpg](Images/471705_1_En_25_Fig1_HTML.jpg)


    Figure 25-1


    Colored underline


    If you hover over this, it will display a warning message.


    ![../images/471705_1_En_25_Chapter/471705_1_En_25_Fig2_HTML.jpg](Images/471705_1_En_25_Fig2_HTML.jpg)


    Figure 25-2


    Warning message for missing GROUP BY


    This way you can see that you have an issue before you run the query.


    ## GROUP BY with a Join


    You can use the `GROUP BY` clause with any `SELECT` query, such as those with
    a join to another table. Let’s say you wanted to see the number of employees in
    each office, but wanted to see the `address` of the office and not the ID`.` The
    `address` is in the office table. Your query would look like this:


    ```

    SELECT o.address,

    COUNT(*)

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id

    GROUP BY o.address

    ORDER BY o.address;

    ```


    This query includes a few things. It has table aliases, which are “o” for office
    and “e” for employee. The query groups by the `address` field from the office
    table. It also joins the two tables together.


    The results of this query are:


    | ADDRESS | COUNT(*) |

    | --- | --- |

    | 10 Collins Road | 2 |

    | 123 Smith Street | 4 |

    | 45 Main Street | 3 |


    This will show the `addresses` for each office, and the number of records the
    query has found for each `address`.


    ## GROUP BY and SUM


    You can use the `GROUP BY` clause with any aggregate function. The earlier examples
    used `COUNT`, but you can use `SUM` instead if needed. To find the sum of `salary`
    values for each office, your query could look like this:


    ```

    SELECT office_id,

    SUM(salary)

    FROM employee

    GROUP BY office_id;

    ```


    It’s very similar to the query with `COUNT`, but instead you are using `SUM` on
    the `salary` column. Your results will look like this:


    | OFFICE_ID | SUM(SALARY) |

    | --- | --- |

    | 1 | 122000 |

    | 2 | 122000 |

    | 3 | 62000 |

    | (null) | 31000 |


    This shows each `office_id` value and the sum of the `salary` values for employees
    with that `office_id`. You could add this up manually but using this function,
    and a `GROUP BY` clause will calculate it automatically.'
  trans: '## 概要


