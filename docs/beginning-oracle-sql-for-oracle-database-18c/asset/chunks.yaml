    \ this:\n\n```\nCREATE TABLE sales_meeting (\nid NUMBER(5),\nemployee VARCHAR2(200),\n\
    company VARCHAR2(200),\nmeeting_date DATE\n);\n```\n\nBefore we run this statement,\
    \ there are a couple of concepts that you should know about.\n\n## Primary Key\n\
    \nYou might have noticed that all tables we have created so far include a column\
    \ called `id`, and this column has a data type of `NUMBER`. The reason for using\
    \ this field is so you can identify the record in your queries.\n\nWhat does this\
    \ mean? Well, let’s look at our `employee` table.\n\n| ID | LAST_NAME | SALARY\
