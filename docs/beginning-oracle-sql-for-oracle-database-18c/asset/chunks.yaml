    \ [8-6](#471705_1_En_8_Chapter.xhtml#Fig6).\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig6_HTML.jpg](Images/471705_1_En_8_Fig6_HTML.jpg)\n\
    \n    Figure 8-6\n\n    The Commit Changes button\n\nYour screen should look like\
    \ Figure [8-7](#471705_1_En_8_Chapter.xhtml#Fig7).\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig7_HTML.jpg](Images/471705_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7\n\nSaving the changes\n\n### Selecting the Records\n\nYou can check\
    \ that the new data is in the table by running a `SELECT` statement, just like\
    \ you have done in earlier chapters. To do this:\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig8_HTML.jpg](Images/471705_1_En_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8\n\nThe Select Connection window\n\n1.  Open a new SQL file or use\
    \ an existing file you have open.\n\n    In the earlier chapters we looked at\
    \ how to do this, and we’ll go through that again now. If you have a window open\
    \ already, you can skip the next few steps.\n\n2.  To open a new SQL file, click\
    \ on the New Worksheet button.\n\n3.  Select a Connection, as shown in Figure\
    \ [8-8](#471705_1_En_8_Chapter.xhtml#Fig8).\n\nA new SQL worksheet is shown.\n\
    \n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig9_HTML.jpg](Images/471705_1_En_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9\n\nThe SELECT query on the employee table\n\n1.  Run the following\
    \ query:\n\n    ```\n    SELECT id, last_name, salary\n    FROM employee;\n  \
    \  ```\n\n    The results should look like Figure [8-9](#471705_1_En_8_Chapter.xhtml#Fig9).\n\
    \nAs you can see, the `NULL` values are displayed in this table. In SQL Developer,\
    \ they are displayed as `(null)` so we can see that they are `NULL` values. However,\
    \ if the results of this query are used in an application, they will be `NULL`\
    \ and need to be treated accordingly.\n\n### Restricting the NULL Values\n\nYou\
    \ can see the NULL values in the table. What if you wanted to exclude them from\
    \ our results? Earlier I mentioned that you can’t use the “equals to” sign. Let’s\
    \ see what happens when you do this. You can run this query:\n\n```\nSELECT id,\
    \ last_name, salary\nFROM employee\nWHERE salary = NULL;\nNo results found.\n\
    ```\n\nSQL Developer would display no results, as shown in Figure [8-10](#471705_1_En_8_Chapter.xhtml#Fig10).\n\
    \n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig10_HTML.jpg](Images/471705_1_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10\n\nNo results found\n\nYou need to use the `IS NULL` keyword. To\
    \ do this, you can adjust your query so it looks like this:\n\n```\nSELECT id,\
    \ last_name, salary\nFROM employee\nWHERE salary IS NULL;\n```\n\nYour results\
    \ will look like this:\n\n```\nID   LAST_NAME   SALARY\n6    COOPER      NULL\n\
    7    NULL        NULL\n```\n\nIt only shows the rows that have a `NULL salary`\
    \ value. You can try the same thing for the last_name column:\n\n```\nSELECT id,\
    \ last_name, salary\nFROM employee\nWHERE last_name IS NULL;\n```\n\nThe results\
    \ are:\n\n```\nID   LAST_NAME   SALARY\n7    NULL        NULL\n```\n\nThis will\
    \ only show records where the `last_name` column is `NULL`.\n\n### Hiding Null\
    \ Values\n\nYou’ve just seen how to show records with `NULL` values in your results.\
    \ What if you want to ignore them? You can use a similar keyword. Just like you\
    \ can’t use “equals to” to look for `NULL` values, you can’t use “not equals to”\
    \ to ignore `NULL` values.\n\nThe keyword to use is `NOT`. `NOT` is a keyword\
    \ in SQL that performs the opposite of the keyword it is used on. It’s used in\
    \ several places in SQL, which you will learn about in this book. For now, it\
    \ can be used to ignore `NULL` values. Your query would look like this:\n\n```\n\
    SELECT id, last_name, salary\nFROM employee\nWHERE salary IS NOT NULL;\n```\n\n\
    Notice that you have added the word `NOT` after `IS`, so it reads `IS NOT NULL`.\
    \ This means that all records where the salary is not `NULL` will be shown. Your\
    \ results are:\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH\
    \       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON \
    \   31000\n```\n\nThese results do not include those records where the `salary`\
    \ is `NULL`. You can do the same thing for the `last_name` column:\n\n```\nSELECT\
    \ id, last_name, salary\nFROM employee\nWHERE last_name IS NOT NULL;\n```\n\n\
    The results would be:\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n\
    2    SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
    \    31000\n6    COOPER      NULL\n```\n\nYou can see that `ID` 7 is not shown\
    \ because the `last_name` is `NULL`. The record with `ID` 6 is shown, because\
    \ the `last_name` is populated. The `salary` is `NULL`, but your query did not\
    \ mention the salary.\n\nYou can exclude records where either of these two columns\
    \ are `NULL` by using the `AND` keyword.\n\n```\nSELECT id, last_name, salary\n\
    FROM employee\nWHERE last_name IS NOT NULL\nAND salary IS NOT NULL;\n```\n\nThe\
    \ results of this query are:\n\n```\nID   LAST_NAME   SALARY\n1    JONES     \
    \  20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n\
    5    ANDERSON    31000\n```\n\nYou can see that the two records with `NULL` values\
    \ are not shown."
  trans: "\n# 添加更多数据\n\n你的表格当前如下所示：\n\n```\nID   LAST_NAME   SALARY\n1    JONES  \
    \     20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON    \
    \ 52000\n5    ANDERSON    31000\n```\n\n你应该向表格中添加一个新行，该行的 `salary` 列具有 `NULL`\
    \ 值，以及另一个新行，该行的 `last_name` 和 `salary` 列都具有 `NULL` 值。\n\n```\nID   LAST_NAME \
    \  SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n\
    4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER      NULL\n7    NULL\
    \        NULL\n```\n\n让我们将这些数据添加到我们的表中。\n\n1.  打开 SQL Developer 并连接到数据库（如果尚未连接，请按照前面章节所示的步骤操作）。\n\
    2.  点击连接名称旁边的箭头，然后点击“Tables (Filtered)”旁边的箭头将其展开，并点击 `EMPLOYEE`，如图 8-1 所示。\n\n\
    \    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig1_HTML.jpg](img/471705_1_En_8_Fig1_HTML.jpg)\n\
    \n    图 8-1：包含表名的连接列表\n\n3.  在屏幕主区域出现的窗口上，点击 `Data` 选项卡，如图 8-2 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig2_HTML.jpg](img/471705_1_En_8_Fig2_HTML.jpg)\n\
    \n    图 8-2：员工表数据\n\n4.  点击工具栏上的 `Insert Row` 按钮。它应该是从左数第三个按钮。将出现一个新行，如图 8-3 所示。\n\
    \n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig3_HTML.jpg](img/471705_1_En_8_Fig3_HTML.jpg)\n\
    \n    图 8-3：表中的新行\n\n5.  在新行中，输入 `ID` 为 6，`last_name` 为 `COOPER`。将 `salary` 值保留为\
    \ `(null)`，如图 8-4 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig4_HTML.jpg](img/471705_1_En_8_Fig4_HTML.jpg)\n\
    \n    图 8-4：输入数据\n\n6.  再次点击 `Insert Row` 按钮，以插入一个新行。\n7.  为新行输入 `ID` 为 7，并将 `last_name`\
    \ 和 `salary` 列保留为 `(null)`，如图 8-5 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig5_HTML.jpg](img/471705_1_En_8_Fig5_HTML.jpg)\n\
    \n    图 8-5：表中的两个新行\n\n8.  点击 `Commit Changes` 按钮将此数据保存到数据库。`Commit Changes` 按钮是灰色带绿色勾的形状，位于红色叉的右侧，如图\
    \ 8-6 所示。\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig6_HTML.jpg](img/471705_1_En_8_Fig6_HTML.jpg)\n\
    \n    图 8-6：提交更改按钮\n\n你的屏幕应如图 8-7 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig7_HTML.jpg](img/471705_1_En_8_Fig7_HTML.jpg)\n\
    \n图 8-7：保存更改\n\n# 选择记录\n\n你可以通过运行一个 `SELECT` 语句来检查新数据是否已在表中，就像你在前面章节中所做的那样。具体步骤如下：\n\
    \n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig8_HTML.jpg](img/471705_1_En_8_Fig8_HTML.jpg)\n\
    \n图 8-8：选择连接窗口\n\n1.  打开一个新的 SQL 文件或使用你已打开的现有文件。在之前的章节中我们已经介绍过如何操作，现在将再次演示。如果你已经打开了一个窗口，可以跳过接下来的几个步骤。\n\
    2.  要打开一个新的 SQL 文件，请点击 `New Worksheet` 按钮。\n3.  选择一个连接，如图 8-8 所示。\n\n将显示一个新的 SQL\
    \ 工作表。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig9_HTML.jpg](img/471705_1_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9：在员工表上运行 SELECT 查询\n\n1.  运行以下查询：\n\n    ```\n    SELECT id, last_name,\
    \ salary\n    FROM employee;\n    ```\n\n    结果应如图 8-9 所示。\n\n如你所见，此表中显示了 `NULL`\
    \ 值。在 SQL Developer 中，它们显示为 `(null)`，以便我们知道它们是 `NULL` 值。但是，如果此查询的结果在应用程序中使用，它们将是\
    \ `NULL`，需要相应地处理。\n\n# 限制 NULL 值\n\n你可以在表中看到 `NULL` 值。如果你想从结果中排除它们该怎么办？之前提到过，不能使用“等于”号。让我们看看如果这样使用会发生什么。你可以运行此查询：\n\
    \n```\nSELECT id, last_name, salary\nFROM employee\nWHERE salary = NULL;\nNo results\
    \ found.\n```\n\nSQL Developer 将不显示任何结果，如图 8-10 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig10_HTML.jpg](img/471705_1_En_8_Fig10_HTML.jpg)\n\
    \n图 8-10：未找到结果\n\n你需要使用 `IS NULL` 关键字。为此，你可以调整查询使其如下所示：\n\n```\nSELECT id, last_name,\
    \ salary\nFROM employee\nWHERE salary IS NULL;\n```\n\n你的结果将如下所示：\n\n```\nID \
    \  LAST_NAME   SALARY\n6    COOPER      NULL\n7    NULL        NULL\n```\n\n它只显示\
    \ `salary` 值为 `NULL` 的行。你可以对 `last_name` 列尝试相同的操作：\n\n```\nSELECT id, last_name,\
    \ salary\nFROM employee\nWHERE last_name IS NULL;\n```\n\n结果是：\n\n```\nID   LAST_NAME\
    \   SALARY\n7    NULL        NULL\n```\n\n这将只显示 `last_name` 列为 `NULL` 的记录。\n\n\
    # 隐藏空值\n\n你刚刚看到了如何在结果中显示包含 `NULL` 值的记录。如果你想忽略它们该怎么办？你可以使用一个类似的关键词。就像不能使用“等于”来查找\
    \ `NULL` 值一样，也不能使用“不等于”来忽略 `NULL` 值。\n\n要使用的关键词是 `NOT`。`NOT` 是 SQL 中的一个关键字，用于执行与它所修饰的关键字相反的操作。它在\
    \ SQL 的多个地方使用，你将在本书中学习到。目前，它可以用来忽略 `NULL` 值。你的查询将如下所示：\n\n```\nSELECT id, last_name,\
    \ salary\nFROM employee\nWHERE salary IS NOT NULL;\n```\n\n注意你在 `IS` 后面添加了 `NOT`，所以是\
    \ `IS NOT NULL`。这意味着将显示所有 `salary` 不是 `NULL` 的记录。你的结果是：\n\n```\nID   LAST_NAME\
    \   SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n\
    4    SIMPSON     52000\n5    ANDERSON    31000\n```\n\n这些结果不包括那些 `salary` 为 `NULL`\
    \ 的记录。你可以对 `last_name` 列执行相同的操作：\n\n```\nSELECT id, last_name, salary\nFROM employee\n\
    WHERE last_name IS NOT NULL;\n```\n\n结果将是：\n\n```\nID   LAST_NAME   SALARY\n1\
    \    JONES       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON\
    \     52000\n5    ANDERSON    31000\n6    COOPER      NULL\n```\n\n你可以看到 `ID`\
    \ 7 没有被显示，因为它的 `last_name` 是 `NULL`。`ID` 为 6 的记录被显示了，因为 `last_name` 有值。虽然 `salary`\
    \ 是 `NULL`，但你的查询没有提到 `salary`。\n\n你可以使用 `AND` 关键字来排除这两个列中任一列为 `NULL` 的记录。\n\n\
    ```\nSELECT id, last_name, salary\nFROM employee\nWHERE last_name IS NOT NULL\n\
    AND salary IS NOT NULL;\n```\n\n此查询的结果是：\n\n```\nID   LAST_NAME   SALARY\n1  \
    \  JONES       20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON\
    \     52000\n5    ANDERSON    31000\n```\n\n你可以看到，两个包含 `NULL` 值的记录没有显示出来。\n"
- fmt: "## Multiple Queries in One SQL Window\n\n在本章及前面的章节中，你对相同的数据运行了多个 SQL 查询。你可能是通过删除窗口中已有的所有\
    \ SQL 代码并输入新代码来运行查询的。\n\n然而，SQL Developer（以及许多其他程序）使得编写多个查询并仅运行你想要的那一个变得更容易。这也是我们在本书前面提到的分号字符\
    \ \";\" 发挥作用的地方。\n\n你可以在一个 SQL 窗口中编写许多不同的 SQL 语句。如果它们用分号分隔，就会被视为独立的查询，并且可以单独运行。\n\
    \n例如，你的窗口可能如图 [8-11](#471705_1_En_8_Chapter.xhtml#Fig11) 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig11_HTML.jpg](Images/471705_1_En_8_Fig11_HTML.jpg)\n\
    \n图 8-11\n\n一个窗口中的多个查询\n\n这包括三个 SQL 查询。它们用空行分隔以便于阅读。更重要的是，每个查询都以分号结尾，以指示语句的结束位置。\n\
    \n你可以在 SQL Developer 中通过在查询内（分号之前）的任何位置单击，然后单击绿色的“运行语句”按钮来运行单个查询。这将仅运行光标所在的查询，如图\
    \ [8-12](#471705_1_En_8_Chapter.xhtml#Fig12) 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig12_HTML.jpg](Images/471705_1_En_8_Fig12_HTML.jpg)\n\
    \n图 8-12\n\n运行单个查询\n\n你也可以在任何其他查询内单击并运行该查询。这意味着你可以在一个文件中编写任意多的查询，并且只运行你想要的那个。这对本书中的练习非常有帮助，因为你可以将一组代码写在另一组之后，并返回运行任何先前的查询。\n\
    \n## Summary\n\nSQL 中的缺失值被捕获为 `NULL` 值，表示未知值。这与空字符串或零不同。SQL 查询可以使用关键字 `IS NULL`\
    \ 来检查一个值是否为 `NULL`。它们也可以使用 `IS NOT NULL` 来查找非 `NULL` 的值。\n\n## 9. Removing Duplicate\
    \ Results\n\n当你将数据存储在表中时，正如你目前所学，你可以直接输入值并保存。然后数据就被保存到表中。只要你输入的值与列的类型匹配，就应该可以工作。例如，这意味着你不能将文本值输入到数字列中。\n\
    \n到目前为止，你的示例数据如下所示：\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n\
    2    SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
    \    31000\n6    COOPER      NULL\n7    NULL        NULL\n```\n\n观察这个表，你可能会做几个假设：\n\
    \n*   `ID` 号是连续的，从 1 开始递增。\n*   `last_name` 值都是大写的。\n*   `salary` 有某种最小值和最大值。\n\
    *   所有 `last_name` 值都是不同的。\n\n你还没有在表上定义任何东西来使这些陈述成为事实。目前它们只是假设。这意味着这些假设中的每一个都可能是错误的。`ID`\
    \ 号可能不是连续的。`last_name` 值可能不是大写的。`salary` 可能没有最小和最大范围。所有 `last_name` 值可能并非不同。\n\
    \n## Add New Records\n\n在这个例子中，让我们向表中添加一些新值。你可以遵循本书前面相同的步骤。\n\n1.  打开 SQL Developer\
    \ 并展开窗口左侧的连接。\n2.  展开“Tables (Filtered)”并单击 EMPLOYEE 表。\n3.  在出现的 SQL 窗口中，单击“数据”选项卡，如图\
    \ [9-1](#471705_1_En_9_Chapter.xhtml#Fig1) 所示。\n\n    ![../images/471705_1_En_9_Chapter/471705_1_En_9_Fig1_HTML.jpg](Images/471705_1_En_9_Fig1_HTML.jpg)\n\
    \n    图 9-1\n\n    Employee 表中的数据\n\n4.  单击“添加行”按钮。\n5.  在表中输入一个新行，`ID` 为 8，`last_name`\
    \ 为 SMITH，`salary` 为 62000。\n6.  再次单击“添加行”按钮，在表中输入一个新行，`ID` 为 9，`last_name` 为\
    \ PATRICK，`salary` 为 40000。你的屏幕应如图 [9-2](#471705_1_En_9_Chapter.xhtml#Fig2) 所示。\n\
    \n    ![../images/471705_1_En_9_Chapter/471705_1_En_9_Fig2_HTML.jpg](Images/471705_1_En_9_Fig2_HTML.jpg)\n\
    \n    图 9-2\n\n    Employee 表中的新数据\n\n7.  单击“提交”。\n\n你现在已经将新数据添加到了 `employee`\
    \ 表中。这些新记录将用于演示 Oracle 如何处理重复数据。\n\n## Select the Data\n\n现在数据已经在表中了，让我们看看它的样子。打开一个新的或现有的\
    \ SQL 窗口并运行以下查询，该查询显示表中的所有列和行：\n\n```\nSELECT id, last_name, salary\nFROM employee;\n\
    ```\n\n结果应该如下所示：\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2  \
    \  SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
    \    31000\n6    COOPER      NULL\n7    NULL        NULL\n8    SMITH       62000\n\
    9    PATRICK     40000\n```\n\n观察这些数据，你可能会注意到 `last_name` 为 `'SMITH'` 出现了两次。这可能是可以的，因为可能有两名名为\
    \ `'SMITH'` 的员工。假设你被要求找出数据库中所有员工的不同姓名。你可以运行这样的查询：\n\n```\nSELECT last_name\nFROM\
    \ employee;\n```\n\n结果将是：\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\nANDERSON\n\
    COOPER\n(null)\nSMITH\nPATRICK\n```\n\n一旦你把这个结果给你的经理或团队看，他们可能会问：“为什么 SMITH 出现了两次？我只需要看到每个姓名一次。”你可能想知道如何做到这一点。你是删除记录吗？还是忽略第\
    \ 8 条记录，也就是第二个 `'SMITH'` 值？你不能删除数据，因为它可能是有效的。你可以尝试忽略第 8 条记录：\n\n```\nSELECT last_name\n\
    FROM employee\nWHERE id  8;\n```\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\n\
    ANDERSON\nCOOPER\n(null)\nSMITH\nPATRICK\n```\n\n在你刚刚运行的查询中，你知道哪个 `ID` 是重复的以及如何删除它。如果有许多记录存在这个问题，或者有数百条、数千条记录呢？你不可能知道所有这些记录的\
    \ `ID` 值。有一个更好的方法可以做到这一点。\n\n## What is DISTINCT ?\n\nSQL 中有一个名为 `DISTINCT` 的关键字，它允许你从结果中删除重复的行。`DISTINCT`\
    \ 关键字不会从数据库中删除数据。它只是在运行 `SELECT` 查询时识别任何相同的记录，并从你的结果中删除任何重复的行。`DISTINCT` 关键字放在\
    \ `SELECT` 关键字之后：\n\n```\nSELECT DISTINCT columns\nFROM table...\n```\n\n这个 `DISTINCT`\
    \ 关键字将应用于整个查询。你不能为每个列指定 `DISTINCT`，因为它删除的是结果中的重复记录，而不是每个列中的重复值。这是一个重要的区别，你很快就会看到一些这样的例子。\n\
    \n### Note\n\n`DISTINCT` 关键字从你的结果中删除重复的行，而不是每个列中的重复值。\n\n## Finding Unique Last\
    \ Name Values\n\n你可以使用前面的例子来查找所有唯一的 `last_name` 值，而不需要在 `WHERE` 子句中使用 `ID`。你的查询将如下所示：\n\
    \n```\nSELECT DISTINCT last_name\nFROM employee;\n```\n\n结果将如下所示：\n\n```\nLAST_NAME\n\
    JONES\nSMITH\nKING\nSIMPSON\nANDERSON\nCOOPER\n(null)\nPATRICK\n```\n\n你可以看到重复的记录（第二个\
    \ `last_name` 为 SMITH）没有显示。这就是 `DISTINCT` 关键字的作用。"
  raw: "## Multiple Queries in One SQL Window\n\nIn this chapter, and earlier chapters,\
    \ you ran several SQL queries on the same data. You may have run your queries\
    \ by deleting all of the SQL code that you already had in the window and entering\
    \ the new code.\n\nHowever, SQL Developer (and many other programs) make it easier\
    \ to write many queries and run just the query you want. This is also where the\
    \ semicolon character “;” comes in, which we mentioned earlier in the book.\n\n\
    You can write many different SQL statements in an SQL window. If they are separated\
    \ by semicolon characters, they are treated as separate queries, and can be run\
    \ separately.\n\nFor example, your window may look like Figure [8-11](#471705_1_En_8_Chapter.xhtml#Fig11).\n\
    \n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig11_HTML.jpg](Images/471705_1_En_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11\n\nMultiple queries in the one window\n\nThis includes three SQL\
    \ queries. They are separated by a blank line to make it easier to read. More\
    \ importantly, they each end with a semicolon to indicate where the statement\
    \ ends.\n\nYou can run an individual query in SQL Developer by clicking anywhere\
    \ inside the query, before the semicolon, and clicking the green Run Statement\
    \ button. This will run only the query that the cursor is in, as shown in Figure\
    \ [8-12](#471705_1_En_8_Chapter.xhtml#Fig12).\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig12_HTML.jpg](Images/471705_1_En_8_Fig12_HTML.jpg)\n\
    \nFigure 8-12\n\nRunning a single query\n\nYou can click inside any other query\
    \ and run that query as well. This means you can write as many queries as you\
    \ want in the one file and run only the query that you want. It’s very helpful\
    \ for the exercises in this book, as you can write one set of code after the other\
    \ and go back and run any previous queries.\n\n## Summary\n\nMissing values in\
    \ SQL are captured as `NULL` values, which represent unknown values. This is different\
    \ to an empty string or a zero. SQL queries can use the keyword `IS NULL` to check\
    \ if a value is `NULL`. They can also use `IS NOT NULL` to look for values that\
    \ aren’t `NULL`.\n\n# 9. Removing Duplicate Results\n\nWhen you store data in\
    \ a table, as you have learned so far, you can just enter the values and save\
    \ it. The data is then saved into the table. As long as the values you enter match\
    \ the type of column, then it should work. This means you can’t enter a text value\
    \ into a number column, for example.\n\nYour sample data looks like this so far:\n\
    \n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n\
    3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER\
    \      NULL\n7    NULL        NULL\n```\n\nLooking at this table, you may assume\
    \ a few things:\n\n*   The `ID` number is sequential, starting at 1 and going\
    \ up.\n\n*   The `last_name` values are all in upper case.\n\n*   The `salary`\
    \ has some kind of minimum and maximum value.\n\n*   All of the `last_name` values\
    \ are different.\n\nYou haven’t defined anything on this table to make any of\
    \ those statements facts. They’re just assumptions at this stage. This means that\
    \ each of these could be false. `ID` numbers may not be sequential. The `last_name`\
    \ values may not be in upper case. The `salary` may not have a minimum and maximum\
    \ range. All of the `last_name` values might not be different.\n\n## Add New Records\n\
    \nFor this example, let’s add some new values to the table. You can follow the\
    \ same steps that you did earlier in this book.\n\n1.  Open SQL Developer and\
    \ expand the Connection on the left side of the window.\n\n2.  Expand “Tables\
    \ (Filtered)” and click the EMPLOYEE table.\n\n3.  In the SQL Window that appears,\
    \ click the Data tab, as shown in Figure [9-1](#471705_1_En_9_Chapter.xhtml#Fig1).\n\
    \n    ![../images/471705_1_En_9_Chapter/471705_1_En_9_Fig1_HTML.jpg](Images/471705_1_En_9_Fig1_HTML.jpg)\n\
    \n    Figure 9-1\n\n    The data in the Employee table\n\n4.  Click the Add Row\
    \ button\n\n5.  Enter a new row into the table with an `ID` of 8, `last_name`\
    \ of SMITH, and a `salary` of 62000.\n\n6.  Click the Add Row button again and\
    \ enter a new row into the table with an `ID` of 9, `last_name` of PATRICK, and\
    \ a `salary` of 40000\\. Your screen should look like Figure [9-2](#471705_1_En_9_Chapter.xhtml#Fig2).\n\
    \n    ![../images/471705_1_En_9_Chapter/471705_1_En_9_Fig2_HTML.jpg](Images/471705_1_En_9_Fig2_HTML.jpg)\n\
    \n    Figure 9-2\n\n    New data in the Employee table\n\n7.  Click Commit.\n\n\
    You have now added new data into the `employee` table. These new records will\
    \ be used to demonstrate how Oracle handles duplicate data.\n\n## Select the Data\n\
    \nNow the data is in the table, let’s see what it looks like. Open a new or existing\
    \ SQL window and run the following query, which shows all columns and rows from\
    \ the table:\n\n```\nSELECT id, last_name, salary\nFROM employee;\n```\n\nThe\
    \ results should look like this:\n\n```\nID   LAST_NAME   SALARY\n1    JONES \
    \      20000\n2    SMITH       35000\n3    KING        40000\n4    SIMPSON   \
    \  52000\n5    ANDERSON    31000\n6    COOPER      NULL\n7    NULL        NULL\n\
    8    SMITH       62000\n9    PATRICK     40000\n```\n\nLooking at that data, you\
    \ might notice that the `last_name` of `'SMITH'` appears twice. This may be OK,\
    \ as there might be two employees named `'SMITH'`. Let’s say you’ve been asked\
    \ to find all of the different names of all employees in the database. You could\
    \ run a query like this:\n\n```\nSELECT last_name\nFROM employee;\n```\n\nThe\
    \ results would be:\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\nANDERSON\n\
    COOPER\n(null)\nSMITH\nPATRICK\n```\n\nOnce you show this to your manager or your\
    \ team, they might ask, “Why does SMITH appear twice? I only need to see each\
    \ name once.” You might be wondering how to do this. Do you delete the record?\
    \ Do you ignore record 8, which is the second `'SMITH'` value? You can’t delete\
    \ the data, as it might be valid. You could try to ignore record 8 though:\n\n\
    ```\nSELECT last_name\nFROM employee\nWHERE id  8;\n```\n\n```\nLAST_NAME\nJONES\n\
    SMITH\nKING\nSIMPSON\nANDERSON\nCOOPER\n(null)\nSMITH\nPATRICK\n```\n\nWith the\
    \ query you just ran, you knew what `ID` was duplicated and how to remove it.\
    \ What if there are many records that have this issue, or hundreds, or thousands\
    \ of records? You can’t possibly know the `ID` values for all of them. There is\
    \ a better way you can do this.\n\n## What is DISTINCT ?\n\nThere is a keyword\
    \ in SQL called *DISTINCT*, which allows you to remove duplicate rows from your\
    \ results. The `DISTINCT` keyword doesn’t delete data from the database. It just\
    \ identifies any records that are the same when you run a `SELECT` query and removes\
    \ any duplicate rows from your results. The `DISTINCT` keyword goes after the\
    \ `SELECT` keyword:\n\n```\nSELECT DISTINCT columns\nFROM table...\n```\n\nThis\
    \ `DISTINCT` keyword will apply to the entire query. You can’t specify `DISTINCT`\
    \ for each column, because it removes duplicate records from the result, not duplicate\
    \ values from each column. This is an important distinction, and you’ll see some\
    \ examples of this soon.\n\n### Note\n\nThe DISTINCT keyword removes duplicate\
    \ rows from your results, not duplicate values from each column.\n\n## Finding\
    \ Unique Last Name Values\n\nYou can use the earlier example of finding all unique\
    \ `last_name` values without using the `ID` in the `WHERE` clause. Your query\
    \ would look like this:\n\n```\nSELECT DISTINCT last_name\nFROM employee;\n```\n\
    \nThe results will look like this:\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\n\
    ANDERSON\nCOOPER\n(null)\nSMITH\nPATRICK\n```\n\nYou can see that the duplicate\
    \ record (the second `last_name` of SMITH) is not showing. This is what the `DISTINCT`\
    \ keyword does."
  trans: "## 在一个 SQL 窗口中运行多个查询\n\n在本章及前面的章节中，你对相同的数据运行了多个 SQL 查询。你可能是通过删除窗口中已有的所有\
    \ SQL 代码并输入新代码来运行查询的。\n\n然而，SQL Developer（以及许多其他程序）使得编写多个查询并仅运行你想要的那一个变得更容易。这也是我们在本书前面提到的分号字符\
    \ `\";\"` 发挥作用的地方。\n\n你可以在一个 SQL 窗口中编写许多不同的 SQL 语句。如果它们用分号分隔，就会被视为独立的查询，并且可以单独运行。\n\
    \n例如，你的窗口可能如图 8-11 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig11_HTML.jpg](img/471705_1_En_8_Fig11_HTML.jpg)\n\
    \n图 8-11\n\n一个窗口中的多个查询\n\n这包括三个 SQL 查询。它们用空行分隔以便于阅读。更重要的是，每个查询都以分号结尾，以指示语句的结束位置。\n\
    \n你可以在 SQL Developer 中通过在查询内（分号之前）的任何位置单击，然后单击绿色的“运行语句”按钮来运行单个查询。这将仅运行光标所在的查询，如图\
    \ 8-12 所示。\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig12_HTML.jpg](img/471705_1_En_8_Fig12_HTML.jpg)\n\
    \n图 8-12\n\n运行单个查询\n\n你也可以在任何其他查询内单击并运行该查询。这意味着你可以在一个文件中编写任意多的查询，并且只运行你想要的那个。这对本书中的练习非常有帮助，因为你可以将一组代码写在另一组之后，并返回运行任何先前的查询。\n\
    \n## 总结\n\nSQL 中的缺失值被捕获为 `NULL` 值，表示未知值。这与空字符串或零不同。SQL 查询可以使用关键字 `IS NULL` 来检查一个值是否为\
    \ `NULL`。它们也可以使用 `IS NOT NULL` 来查找非 `NULL` 的值。\n\n## 9. 移除重复结果\n\n当你将数据存储在表中时，正如你目前所学，你可以直接输入值并保存。然后数据就被保存到表中。只要你输入的值与列的类型匹配，就应该可以工作。例如，这意味着你不能将文本值输入到数字列中。\n\
    \n到目前为止，你的示例数据如下所示：\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n\
    2    SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
    \    31000\n6    COOPER      NULL\n7    NULL        NULL\n```\n\n观察这个表，你可能会做几个假设：\n\
    \n*   `ID` 号是连续的，从 1 开始递增。\n*   `last_name` 值都是大写的。\n*   `salary` 有某种最小值和最大值。\n\
    *   所有 `last_name` 值都是不同的。\n\n你还没有在表上定义任何东西来使这些陈述成为事实。目前它们只是假设。这意味着这些假设中的每一个都可能是错误的。`ID`\
    \ 号可能不是连续的。`last_name` 值可能不是大写的。`salary` 可能没有最小和最大范围。所有 `last_name` 值可能并非不同。\n\
    \n## 添加新记录\n\n在这个例子中，让我们向表中添加一些新值。你可以遵循本书前面相同的步骤。\n\n1.  打开 SQL Developer 并展开窗口左侧的连接。\n\
    2.  展开“Tables (Filtered)”并单击 EMPLOYEE 表。\n3.  在出现的 SQL 窗口中，单击“数据”选项卡，如图 9-1 所示。\n\
    \n    ![../images/471705_1_En_9_Chapter/471705_1_En_9_Fig1_HTML.jpg](img/471705_1_En_9_Fig1_HTML.jpg)\n\
    \n    图 9-1\n\n    Employee 表中的数据\n\n4.  单击“添加行”按钮。\n5.  在表中输入一个新行，`ID` 为 8，`last_name`\
    \ 为 SMITH，`salary` 为 62000。\n6.  再次单击“添加行”按钮，在表中输入一个新行，`ID` 为 9，`last_name` 为\
    \ PATRICK，`salary` 为 40000。你的屏幕应如图 9-2 所示。\n\n    ![../images/471705_1_En_9_Chapter/471705_1_En_9_Fig2_HTML.jpg](img/471705_1_En_9_Fig2_HTML.jpg)\n\
    \n    图 9-2\n\n    Employee 表中的新数据\n\n7.  单击“提交”。\n\n你现在已经将新数据添加到了 `employee`\
    \ 表中。这些新记录将用于演示 Oracle 如何处理重复数据。\n\n## 选择数据\n\n现在数据已经在表中了，让我们看看它的样子。打开一个新的或现有的\
    \ SQL 窗口并运行以下查询，该查询显示表中的所有列和行：\n\n```\nSELECT id, last_name, salary\nFROM employee;\n\
    ```\n\n结果应该如下所示：\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2  \
    \  SMITH       35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON\
    \    31000\n6    COOPER      NULL\n7    NULL        NULL\n8    SMITH       62000\n\
    9    PATRICK     40000\n```\n\n观察这些数据，你可能会注意到 `last_name` 为 `'SMITH'` 出现了两次。这可能是可以的，因为可能有两名名为\
    \ `'SMITH'` 的员工。假设你被要求找出数据库中所有员工的不同姓名。你可以运行这样的查询：\n\n```\nSELECT last_name\nFROM\
    \ employee;\n```\n\n结果将是：\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\nANDERSON\n\
    COOPER\n(null)\nSMITH\nPATRICK\n```\n\n一旦你把这个结果给你的经理或团队看，他们可能会问：“为什么 SMITH 出现了两次？我只需要看到每个姓名一次。”你可能想知道如何做到这一点。你是删除记录吗？还是忽略第\
    \ 8 条记录，也就是第二个 `'SMITH'` 值？你不能删除数据，因为它可能是有效的。你可以尝试忽略第 8 条记录：\n\n```\nSELECT last_name\n\
    FROM employee\nWHERE id <> 8;\n```\n\n```\nLAST_NAME\nJONES\nSMITH\nKING\nSIMPSON\n\
    ANDERSON\nCOOPER\n(null)\nSMITH\nPATRICK\n```\n\n在你刚刚运行的查询中，你知道哪个 `ID` 是重复的以及如何删除它。如果有许多记录存在这个问题，或者有数百条、数千条记录呢？你不可能知道所有这些记录的\
    \ `ID` 值。有一个更好的方法可以做到这一点。\n\n## 什么是 DISTINCT？\n\nSQL 中有一个名为 `DISTINCT` 的关键字，它允许你从结果中删除重复的行。`DISTINCT`\
    \ 关键字不会从数据库中删除数据。它只是在运行 `SELECT` 查询时识别任何相同的记录，并从你的结果中删除任何重复的行。`DISTINCT` 关键字放在\
    \ `SELECT` 关键字之后：\n\n```\nSELECT DISTINCT columns\nFROM table...\n```\n\n这个 `DISTINCT`\
    \ 关键字将应用于整个查询。你不能为每个列指定 `DISTINCT`，因为它删除的是结果中的重复记录，而不是每个列中的重复值。这是一个重要的区别，你很快就会看到一些这样的例子。\n\
    \n### 注意\n\n`DISTINCT` 关键字从你的结果中删除重复的行，而不是每个列中的重复值。\n\n## 查找唯一的 Last Name 值\n\n\
    你可以使用前面的例子来查找所有唯一的 `last_name` 值，而不需要在 `WHERE` 子句中使用 `ID`。你的查询将如下所示：\n\n```\n\
    SELECT DISTINCT last_name\nFROM employee;\n```\n\n结果将如下所示：\n\n```\nLAST_NAME\n\
    JONES\nSMITH\nKING\nSIMPSON\nANDERSON\nCOOPER\n(null)\nPATRICK\n```\n\n你可以看到重复的记录（第二个\
    \ `last_name` 为 SMITH）没有显示。这就是 `DISTINCT` 关键字的作用。"
- fmt: '### Finding Unique Salary Values


    Let’s try another example. Let’s say you had to find all of the unique `salary`
    values in the table. This will show that the `DISTINCT` keyword can work on number
    values and not just text values. Your query could start looking like this:


    ```sql

    SELECT salary

    FROM employee;

    ```


    The results of this query are:


    ```

    SALARY


    (null)

    (null)

    ```


    This shows you two things. First, there are two `NULL` values in this column.
    Second, the `salary` of 40000 is repeated, as two `employees` have the same `salary`.
    You can resolve this with `DISTINCT`.


    ```sql

    SELECT DISTINCT salary

    FROM employee;

    ```


    The results of this query are:


    ```

    SALARY


    (null)

    ```


    Using `DISTINCT` has eliminated one of the `NULL` values and one of the 40000
    values. What if you did not want to include `NULL` values? You can combine the
    `DISTINCT` keyword with a `WHERE` clause that you learned in a previous chapter.


    ```sql

    SELECT DISTINCT salary

    FROM employee

    WHERE salary IS NOT NULL;

    ```


    Your results would look like this:


    ```

    SALARY

    ```


    This shows all unique `salary` values, excluding `NULL` values.


    ### Finding Unique Combinations of Values


    Let’s have a look at another example. Let’s say you’ve been asked to find all
    unique `last_name` and `salary` values in this table. Your query would look like
    this:


    ```sql

    SELECT DISTINCT last_name, salary

    FROM employee;

    ```


    Notice that the `DISTINCT` keyword only appears once. You have defined it for
    our query, and don’t need to define it for each column. If you run the query,
    the results look like this:


    ```

    LAST_NAME   SALARY

    JONES       20000

    SMITH       35000

    KING        40000

    SIMPSON     52000

    ANDERSON    31000

    COOPER      (null)

    (null)      (null)

    SMITH       62000

    PATRICK     40000

    ```


    You might be wondering why `''SMITH''` appears twice. And why does the `salary`
    of 40000 appear twice? This is because they might be duplicate values, but they
    are not duplicate rows. The row of `''SMITH''` with a `salary` of 35000 is a different
    row to `''SMITH''` with a `salary` of 62000, so the row stays in the results.


    The same can be said for the row of `''KING''` with a `salary` of 40000 and the
    row of `''PATRICK''` with the `salary` of 40000. Even though the `salary` is the
    same, the `last_name` is different, so the row is different.


    `DISTINCT` is not designed to remove duplicate values from different columns in
    different rows. If it did this, then the data in each row would be mixed up and
    wouldn’t be correct. If you need to find unique results in your query by eliminating
    duplicates, then `DISTINCT` is the way to do that.


    How can you tell that the two `''SMITH''` employees are different? You can look
    at the `ID` column. Alternatively, you can add a new column that defines more
    information about them, which you will learn about in a later chapter.


    ### Summary


    SQL does not eliminate duplicate records from your result automatically. You can
    do this in your queries by adding the keyword `DISTINCT` after the `SELECT` keyword.
    It removes duplicate records, and not duplicate columns, which are quite different
    concepts.


    ## 10. Applying Filters on Lists and Ranges of Values


    In previous chapters, you learned about the `WHERE` clause and how you could use
    it to restrict the results you see. You can do this using a variety of symbols,
    called `operators`, such as "equal to" and "less than." You can also specify multiple
    criteria using the `AND`/`OR` keywords.


    Working with lists of values presents an interesting challenge in that a large
    list can result in a large number of `AND` and `OR` keywords in a query. This
    chapter introduces some syntax that’s helpful when working with large lists. You’ll
    also learn about some syntax for ranges too.


    ### Too Many Conjunctions


    Writing a query with a long list of equality conditions in the `WHERE` clause
    can become tedious. Let’s work through an example that will help set the stage
    for the syntax you’ll learn about next.


    First, our sample data looks like this so far:


    ```

    ID  LAST_NAME SALARY

    1   JONES     20000

    2   SMITH     35000

    3   KING      40000

    4   SIMPSON   52000

    5   ANDERSON  31000

    6   COOPER    (null)

    7   (null)    (null)

    8   SMITH     62000

    9   PATRICK   40000

    ```


    If you wanted to find all records where the `salary` was equal to a 5,000 or 10,000
    increment, you could have a query like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    If you run the query, this is the result you get:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    9    PATRICK     40000

    ```


    We are ignoring records with a `salary` of 52000, 31000, and other values. You
    get the results you want, but our `WHERE` clause includes three checks on the
    same column:


    ```sql

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    What if you had more values in our table and wanted to check five or ten different
    values? You could use a few more `OR` keywords but it would make our query look
    a little messy:


    ```sql

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000

    OR salary = 45000

    OR salary = 50000

    OR salary = 55000

    OR salary = 60000

    OR salary = 65000;

    ```


    There is a way to improve this repetition of so many `OR` keywords: use the `IN`
    keyword.


    ### The IN Keyword


    The `IN` keyword allows you to specify multiple values in a single comparison.
    This keyword works in the same way as using multiple `OR` keywords. The `IN` clause
    looks like this:


    ```sql

    WHERE column IN (value1, value2... value_n)

    ```


    The `IN` keyword is used instead of an "equal to" operator. You then specify an
    open bracket "(" and include all of the values inside the brackets that you want
    to check for, each of which are separated by a comma. Finally, you close the brackets.


    #### Example of Using IN


    You can specify a long list of values inside the `IN` keyword here (up to 1,000
    in fact). That ability to specify a list is great for the example you were looking
    at. Instead of having a query like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    You can have a query like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary IN (20000, 35000, 40000);

    ```


    This second version looks neater and is easier to read, as all of the criteria
    for the salary are together. The results of this query are:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    9    PATRICK     40000

    ```


    These results are the same as from the query with the separate `OR` statements.


    #### A Longer Value List


    Your example earlier included three values inside the `IN` clause. What if you
    wanted to include more? Using several `OR` statements, your query could look like
    this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 10000

    OR salary = 20000

    OR salary = 30000

    OR salary = 40000

    OR salary = 50000

    OR salary = 60000

    OR salary = 70000

    OR salary = 80000

    OR salary = 90000

    OR salary = 100000;

    ```


    This query checks for `salary` values at 10,000 increments. There are separate
    `OR` keywords for each value. This query shows the following results:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    9    PATRICK     40000

    ```


    The query result shows only three records, as there are only three `salary` values
    that match values from the list provided. Even though there were ten values in
    the list, rows do not exist for many of those, so only three rows are returned.


    You can rewrite the query using the `IN` clause:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary IN (

    10000, 20000, 30000, 40000, 50000,

    60000, 70000, 80000, 90000, 100000);

    ```


    Once again, the `IN` clause looks a lot neater than separate `OR` keywords and
    is easier to read. The results of this query are also the same:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    9    PATRICK     40000

    ```'
  raw: '### Finding Unique Salary Values


    Let’s try another example. Let’s say you had to find all of the unique `salary`
    values in the table. This will show that the DISTINCT keyword can work on number
    values and not just text values. Your query could start looking like this:


    ```

    SELECT salary

    FROM employee;

    ```


    The results of this query are:


    ```

    SALARY


    (null)

    (null)


    ```


    This shows you two things. First, there are two `NULL` values in this column.
    Second, the `salary` of 40000 is repeated, as two `employees` have the same `salary`.
    You can resolve this with `DISTINCT`.


    ```

    SELECT DISTINCT salary

    FROM employee;

    ```


    The results of this query are:


    ```

    SALARY


    (null)


    ```


    Using `DISTINCT` has eliminated one of the `NULL` values and one of the 40000
    values. What if you did not want to include `NULL` values? You can combine the
    `DISTINCT` keyword with a `WHERE` clause that you learned in a previous chapter.


    ```

    SELECT DISTINCT salary

    FROM employee

    WHERE salary IS NOT NULL;

    ```


    Your results would look like this:


    ```

    SALARY


    ```


    This shows all unique `salary` values, excluding `NULL` values.


    ### Finding Unique Combinations of Values


    Let’s have a look at another example. Let’s say you’ve been asked to find all
    unique `last_name` and `salary` values in this table. Your query would look like
    this:


    ```

    SELECT DISTINCT last_name, salary

    FROM employee;

    ```


    Notice that the `DISTINCT` keyword only appears once. You have defined it for
    our query, and don’t need to define it for each column. If you run the query,
    the results look like this:


    ```

    LAST_NAME   SALARY

    JONES       20000

    SMITH       35000

    KING        40000

    SIMPSON     52000

    ANDERSON    31000

    COOPER      (null)

    (null)      (null)

    SMITH       62000

    PATRICK     40000

    ```


    You might be wondering why `''SMITH''` appears twice. And why does the `salary`
    of 40000 appear twice? This is because they might be duplicate values, but they
    are not duplicate rows. The row of `''SMITH''` with a `salary` of 35000 is a different
    row to `''SMITH''` with a `salary` of 62000, so the row stays in the results.


    The same can be said for the row of `''KING''` with a `salary` of 40000 and the
    row of `''PATRICK''` with the `salary` of 40000\. Even though the `salary` is
    the same, the `last_name` is different, so the row is different.


    `DISTINCT` is not designed to remove duplicate values from different columns in
    different rows. If it did this, then the data in each row would be mixed up and
    wouldn’t be correct. If you need to find unique results in your query by eliminating
    duplicates, then `DISTINCT` is the way to do that.


    How can you tell that the two `''SMITH''` employees are different? You can look
    at the `ID` column. Alternatively, you can add a new column that defines more
    information about them, which you will learn about in a later chapter.


    ## Summary


    SQL does not eliminate duplicate records from your result automatically. You can
    do this in your queries by adding the keyword `DISTINCT` after the `SELECT` keyword.
    It removes duplicate records, and not duplicate columns, which are quite different
    concepts.


    # 10. Applying Filters on Lists and Ranges of Values


    In previous chapters, you learned about the `WHERE` clause and how you could use
    it to restrict the results you see. You can do this using a variety of symbols,
    called *operators* , such as “equal to” and “less than.” You can also specify
    multiple criteria using the `AND/OR` keywords.


    Working with lists of values presents an interesting challenge in that a large
    list can result in a large number of `AND` and `OR` keywords in a query. This
    chapter introduces some syntax that’s helpful when working with large lists. You’ll
    also learn about some syntax for ranges too.


    ## Too Many Conjunctions


    Writing a query with a long list of equality conditions in the `WHERE` clause
    can become tedious. Let’s work through an example that will help set the stage
    for the syntax you’ll learn about next.


    First, our sample data looks like this so far:


    ```

    ID  LAST_NAME SALARY

    1   JONES     20000

    2   SMITH     35000

    3   KING      40000

    4   SIMPSON   52000

    5   ANDERSON  31000

    6   COOPER    (null)

    7   (null)    (null)

    8   SMITH     62000

    9   PATRICK   40000

    ```


    If you wanted to find all records where the `salary` was equal to a 5,000 or 10,000
    increment, you could have a query like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    If you run the query, this is the result you get:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    9    PATRICK     40000

    ```


    We are ignoring records with a `salary` of 52000, 31000, and other values. You
    get the results you want, but our `WHERE` clause includes three checks on the
    same column:


    ```

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    What if you had more values in our table and wanted to check five or ten different
    values? You could use a few more `OR` keywords but it would make our query look
    a little messy:


    ```

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000

    OR salary = 45000

    OR salary = 50000

    OR salary = 55000

    OR salary = 60000

    OR salary = 65000;

    ```


    There is a way to improve this repetition of so many `OR` keywords: use the `IN`
    keyword.


    ## The IN Keyword


    The `IN` keyword allows you to specify multiple values in a single comparison.
    This keyword works in the same way as using multiple `OR` keywords. The `IN` clause
    looks like this:


    ```

    WHERE column IN (value1, value2... value_n)

    ```


    The `IN` keyword is used instead of an “equal to” operator. You then specify an
    open bracket “(” and include all of the values inside the brackets that you want
    to check for, each of which are separated by a comma. Finally, you close the brackets.


    ### Example of Using IN


    You can specify a long list of values inside the `IN` keyword here (up to 1,000
    in fact). That ability to specify a list is great for the example you were looking
    at. Instead of having a query like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    You can have a query like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary IN (20000, 35000, 40000);

    ```


    This second version looks neater and is easier to read, as all of the criteria
    for the salary are together. The results of this query are:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    9    PATRICK     40000

    ```


    These results are the same as from the query with the separate `OR` statements.


    ### A Longer Value List


    Your example earlier included three values inside the `IN` clause. What if you
    wanted to include more? Using several `OR` statements, your query could look like
    this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 10000

    OR salary = 20000

    OR salary = 30000

    OR salary = 40000

    OR salary = 50000

    OR salary = 60000

    OR salary = 70000

    OR salary = 80000

    OR salary = 90000

    OR salary = 100000;

    ```


    This query checks for `salary` values at 10,000 increments. There are separate
    `OR` keywords for each value. This query shows the following results:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    9    PATRICK     40000

    ```


    The query result shows only three records, as there are only three `salary` values
    that match values from the list provided. Even though there were ten values in
    the list, rows do not exist for many of those, so only three rows are returned.


    You can rewrite the query using the `IN` clause:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE salary IN (

    10000, 20000, 30000, 40000, 50000,

    60000, 70000, 80000, 90000, 100000);

    ```


    Once again, the `IN` clause looks a lot neater than separate `OR` keywords and
    is easier to read. The results of this query are also the same:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    9    PATRICK     40000

    ```'
  trans: '

    ### 查找唯一的薪资值


    我们来看另一个例子。假设你需要找出表中所有唯一的 `salary` 值。这将展示 `DISTINCT` 关键字不仅对文本值有效，也适用于数值。你的查询可能一开始是这样的：


    ```sql

    SELECT salary

    FROM employee;

    ```


    这个查询的结果是：


    ```

    SALARY


    (null)

    (null)

    ```


    这向你展示了两件事。首先，这一列中有两个 `NULL` 值。其次，薪资为 40000 的值重复了，因为有两名 `employee` 的薪资相同。你可以用 `DISTINCT`
    来解决这个问题。


    ```sql

    SELECT DISTINCT salary

    FROM employee;

    ```


    这个查询的结果是：


    ```

    SALARY


    (null)

    ```


    使用 `DISTINCT` 消除了一条 `NULL` 记录和一条 40000 的记录。如果你不想包含 `NULL` 值该怎么办？你可以将 `DISTINCT`
    关键字与上一章学过的 `WHERE` 子句结合使用。


    ```sql

    SELECT DISTINCT salary

    FROM employee

    WHERE salary IS NOT NULL;

    ```


    你的结果会像这样：


    ```

    SALARY

    ```


    这显示了所有唯一的 `salary` 值，但排除了 `NULL` 值。


    ### 查找唯一的值组合


    让我们看另一个例子。假设你被要求找出此表中所有唯一的 `last_name` 和 `salary` 值组合。你的查询会是这样的：


    ```sql

    SELECT DISTINCT last_name, salary

    FROM employee;

    ```


    注意 `DISTINCT` 关键字只出现了一次。你为整个查询定义了它，而不需要为每一列都定义一次。如果你运行这个查询，结果如下：


    ```

    LAST_NAME   SALARY

    JONES       20000

    SMITH       35000

    KING        40000

    SIMPSON     52000

    ANDERSON    31000

    COOPER      (null)

    (null)      (null)

    SMITH       62000

    PATRICK     40000

    ```


    你可能会疑惑为什么 `''SMITH''` 出现了两次。还有为什么 `salary` 为 40000 的值也出现了两次？这是因为它们可能是重复的值，但它们不是重复的行。薪资为
    35000 的 `''SMITH''` 行与薪资为 62000 的 `''SMITH''` 行是不同的行，因此该行保留在结果中。


    薪资为 40000 的 `''KING''` 行和薪资为 40000 的 `''PATRICK''` 行也是如此。尽管 `salary` 相同，但 `last_name`
    不同，所以行也不同。


    `DISTINCT` 的设计目的不是为了从不同行的不同列中删除重复值。如果它这样做，那么每行中的数据就会被混淆，从而变得不正确。如果你需要通过消除重复项来在查询中查找唯一结果，那么
    `DISTINCT` 就是实现这一目标的方法。


    如何区分两个 `''SMITH''` 员工是不同的人？你可以查看 `ID` 列。或者，你可以添加一个新列来定义更多关于他们的信息，这将在后面的章节中学习。


    ### 总结


    SQL 不会自动从你的结果中消除重复记录。你可以在查询中通过在 `SELECT` 关键字后添加 `DISTINCT` 关键字来实现这一点。它移除的是重复的记录，而不是重复的列，这两个概念截然不同。


    ## 10. 对值列表和范围应用过滤器


    在前面的章节中，你学习了 `WHERE` 子句以及如何使用它来限制你看到的结果。你可以使用各种符号（称为 `运算符`）来实现这一点，例如“等于”和“小于”。你还可以使用
    `AND`/`OR` 关键字来指定多个条件。


    处理值列表带来了一个有趣的挑战：一个很长的列表可能导致查询中出现大量的 `AND` 和 `OR` 关键字。本章介绍了一些在处理大型列表时很有帮助的语法。你还将学习一些用于范围的语法。


    ### 连词过多


    在 `WHERE` 子句中编写包含一长串相等条件的查询会变得很繁琐。让我们通过一个例子来说明，这将为你接下来要学习的语法做铺垫。


    首先，到目前为止，我们的示例数据如下：


    ```

    ID  LAST_NAME SALARY

    1   JONES     20000

    2   SMITH     35000

    3   KING      40000

    4   SIMPSON   52000

    5   ANDERSON  31000

    6   COOPER    (null)

    7   (null)    (null)

    8   SMITH     62000

    9   PATRICK   40000

    ```


    如果你想找出所有 `salary` 等于 5,000 或 10,000 倍数的记录，你可能会有这样的查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    如果你运行这个查询，得到的结果是：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    9    PATRICK     40000

    ```


    我们忽略了薪资为 52000、31000 和其他值的记录。你得到了想要的结果，但我们的 `WHERE` 子句包含了针对同一列的三个检查：


    ```sql

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    如果你的表中有更多值，并且想检查五到十个不同的值怎么办？你可以使用更多 `OR` 关键字，但这会让查询看起来有点乱：


    ```sql

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000

    OR salary = 45000

    OR salary = 50000

    OR salary = 55000

    OR salary = 60000

    OR salary = 65000;

    ```


    有一种方法可以改进这种重复使用大量 `OR` 关键字的情况：使用 `IN` 关键字。


    ### IN 关键字


    `IN` 关键字允许你在单个比较中指定多个值。这个关键字的工作方式与使用多个 `OR` 关键字相同。`IN` 子句看起来像这样：


    ```sql

    WHERE column IN (value1, value2... value_n)

    ```


    使用 `IN` 关键字来代替“等于”运算符。然后你指定一个左括号 "("，并在括号内包含所有你想要检查的值，每个值之间用逗号分隔。最后，你关闭括号。


    #### 使用 IN 的示例


    你可以在 `IN` 关键字内指定一个很长的值列表（实际上最多可达 1,000 个）。这种指定列表的能力对于你正在查看的示例非常有用。与其使用像这样的查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 20000

    OR salary = 35000

    OR salary = 40000;

    ```


    你可以使用这样的查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary IN (20000, 35000, 40000);

    ```


    第二个版本看起来更整洁，更易于阅读，因为所有关于薪资的条件都集中在一起。这个查询的结果是：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    9    PATRICK     40000

    ```


    这些结果与使用单独 `OR` 语句的查询结果相同。


    #### 更长的值列表


    你之前的例子在 `IN` 子句中包含了三个值。如果你想包含更多呢？使用几个 `OR` 语句，你的查询可能像这样：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary = 10000

    OR salary = 20000

    OR salary = 30000

    OR salary = 40000

    OR salary = 50000

    OR salary = 60000

    OR salary = 70000

    OR salary = 80000

    OR salary = 90000

    OR salary = 100000;

    ```


    这个查询检查薪资值是否以 10,000 为增量。每个值都有单独的 `OR` 关键字。这个查询显示以下结果：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    9    PATRICK     40000

    ```


    查询结果只显示了三条记录，因为只有三个 `salary` 值与提供的列表中的值匹配。尽管列表中有十个值，但许多值没有对应的行，所以只返回了三行。


    你可以使用 `IN` 子句重写查询：


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE salary IN (

    10000, 20000, 30000, 40000, 50000,

    60000, 70000, 80000, 90000, 100000);

    ```


    同样，`IN` 子句看起来比单独的 `OR` 关键字整洁得多，也更容易阅读。这个查询的结果也是一样的：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       20000

    3    KING        40000

    9    PATRICK     40000

    ```

