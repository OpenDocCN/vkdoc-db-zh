    ORDER BY salary DESC NULLS FIRST;

    ```


    结果是：


    ```

    ID  LAST_NAME   SALARY

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    4   SIMPSON     52000

    3   KING        40000

    9   PATRICK     40000

    2   SMITH       35000

    5   ANDERSON    31000

    1   JONES       20000

    ```

