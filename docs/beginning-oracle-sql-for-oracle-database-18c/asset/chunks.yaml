- fmt: "### Adding Months\n\nEarlier in this chapter you learned how to add days to\
    \ a date by simply adding a number to a date:\n\n```sql\nSELECT meeting_date +\
    \ 7\nFROM sales_meeting;\n```\n\nHowever, what if you needed to add several months\
    \ to a date? Three months, six months, 24 months? You could do this by adding\
    \ the number of days. But what number would you choose: 30, or 31? Different months\
    \ have different numbers of days, so adding a number of 30 won’t work in all situations.\
    \ If you need the date to be exactly a number of months in the future, this method\
    \ won’t work.\n\nThere’s an Oracle function called `ADD_MONTHS`, which lets you\
    \ add a specific number of months to a date:\n\n```sql\nADD_MONTHS (input_date,\
    \ number_of_months)\n```\n\nThis includes two parameters. The `input_date` is\
    \ the date you’re adding to, and the `number_of_months` is a number that represents\
    \ the number of months to add. This will add the specified number of months to\
    \ a date and ensure the day remains the same, and only the month (or year) changes.\n\
    \nLet’s say you needed to add six months to your `meeting_dates`. Your query would\
    \ look like this:\n\n```sql\nSELECT\nmeeting_date,\nADD_MONTHS(meeting_date, 6)\
    \ AS new_date\nFROM sales_meeting;\n```\n\nThe results of this query are:\n\n\
    | ID | MEETING_DATE | NEW_DATE |\n| --- | --- | --- |\n| 1 | 10/Aug/2018 | 10/Feb/2019\
    \ |\n| 2 | 21/Aug/2018 | 21/Feb/2019 |\n| 3 | 23/Aug/2018 | 23/Feb/2019 |\n\n\
    The `new_date` column, with the `ADD_MONTHS` function, shows the meeting date\
    \ 6 months into the future. It has kept the same day, but the month and year have\
    \ been changed.\n\nIf you wanted to add a specific number of years to a date,\
    \ you can add this in a number of months. This will work because a year always\
    \ has 12 months. You can do this by adding the representation of years in months\
    \ (e.g., 24 for 2 years) or by multiplying the number of years by 12 (e.g., 2\
    \ * 12). This query includes both examples:\n\n```sql\nSELECT\nmeeting_date,\n\
    ADD_MONTHS(meeting_date, 24) AS new_date,\nADD_MONTHS(meeting_date, 2*12) AS new_date_ex2\n\
    FROM sales_meeting;\n```\n\nThe results are:\n\n| ID | MEETING_DATE | NEW_DATE\
    \ | NEW_DATE_EX2 |\n| --- | --- | --- | --- |\n| 1 | 10/Aug/2018 | 10/Aug/2020\
    \ | 10/Aug/2020 |\n| 2 | 21/Aug/2018 | 21/Aug/2020 | 21/Aug/2020 |\n| 3 | 23/Aug/2018\
    \ | 23/Aug/2020 | 23/Aug/2020 |\n\nBoth the `new_date` and `new_date_ex2` columns\
    \ show the `meeting_date` value 2 years into the future. This is an easy way of\
    \ adding months or years to an existing date value.\n\n## Summary\n\nFunctions\
    \ in Oracle will let you perform calculations on columns and values in your queries.\
    \ You can do some basic operations using mathematical symbols such as `+`, `-`,\
    \ `*` and `/`. You can also concatenate string values using `||`. If you want\
    \ to perform operations more than that, you can use one of Oracle’s many functions.\n\
    \nThe Oracle functions are grouped into three groups based on the type of data\
    \ they work with: number, string, and date. These functions take parameters, perform\
    \ a process, and return a value. They can be used in many different areas of queries,\
    \ such as `WHERE` clauses in `SELECT` queries and `INSERT` and `UPDATE` queries.\n\
    \n# 23. Writing Conditional Logic\n\nMany programming languages include the ability\
    \ to perform conditional logic, or “if this is true, then do something, otherwise\
    \ do something else.” SQL is different to other programming languages and doesn’t\
    \ include a lot of features such as variables and loops. However, SQL does have\
    \ the ability to use conditional logic.\n\nThis is often called an `IF` statement\
    \ in other languages, which looks like this:\n\n```sql\nif (some condition) {\n\
    \    do_something;\nelse {\n    do_something_else;\n}\n```\n\nIn SQL, you can\
    \ do the same kind of thing, but it’s done a little differently. You can use a\
    \ type of statement called the `CASE` statement.\n\n## The CASE Statement\n\n\
    In SQL, the `CASE` statement allows you to perform this “if-then-else” logic or\
    \ conditional logic in your query. It’s similar to an `IF` statement in other\
    \ languages. It’s called a statement rather than a function because it’s a combination\
    \ of keywords and not a keyword with several parameters inside brackets.\n\nThe\
    \ `CASE` statement can be used in many of the same places that a function can,\
    \ such as:\n\n*   The `SELECT`, `WHERE`, and `ORDER BY` clause of a `SELECT` statement\n\
    *   The `UPDATE`, `SET`, and `WHERE` clause of an `UPDATE` statement\n*   The\
    \ `WHERE` clause of a `DELETE` statement\n\nIt’s good for displaying a particular\
    \ value depending on another value in the same row. Because values in each row\
    \ can be different, adding in a `CASE` statement to look at them and display a\
    \ value in different situations is sometimes useful.\n\nWhat does a `CASE` statement\
    \ look like?\n\n```sql\nCASE [expression]\n    WHEN condition_1 THEN result_1\n\
    \    WHEN condition_2 THEN result_2\n    ...\n    WHEN condition_n THEN result_n\n\
    \    ELSE result\nEND case_name\n```\n\nThe parameters for this statement are:\n\
    \n*   `expression`: This is the expression or the condition that the `CASE` statement\
    \ will look for. If you compare this to an `IF` statement, this is the first part\
    \ of the condition that comes after the `IF`. This is an optional parameter.\n\
    *   `condition_1/2/n`: This is the possible result of the expression just mentioned.\
    \ You can have as many of these conditions as you like in your `CASE` statement,\
    \ depending on how many different possible values you want to handle.\n*   `result_1/2/n`:\
    \ This is the value that should be displayed or shown if the condition mentioned\
    \ is met. This comes after the `THEN` keyword and is equivalent to the `THEN`\
    \ part of an `IF-THEN-ELSE` statement in other programming languages.\n*   `ELSE\
    \ result`: This is the value to show if none of the conditions in the `CASE` statement\
    \ are met. It’s equivalent to the `ELSE` part of an `IF-THEN-ELSE` statement.\n\
    *   `case_name`: This is an optional parameter and indicates what the column should\
    \ be called when it’s used in the query. It’s similar to a column alias that you’ve\
    \ used in earlier chapters.\n\nIt’s quite a long statement, but it’s very useful\
    \ if you need to perform this kind of logic in your query. In Oracle SQL, you\
    \ can use a `CASE` statement in two ways: a simple `CASE` statement, and a searched\
    \ `CASE` statement."
  raw: '### Adding Months


    Earlier in this chapter you learned how to add days to a date by simply adding
    a number to a date:


    ```

    SELECT meeting_date + 7

    FROM sales_meeting;

    ```


    However, what if you needed to add several months to a date? Three months, six
    months, 24 months? You could do this by adding the number of days. But what number
    would you choose: 30, or 31? Different months have different numbers of days,
    so adding a number of 30 won’t work in all situations. If you need the date to
    be exactly a number of months in the future, this method won’t work.


    There’s an Oracle function called `ADD_MONTHS`, which lets you add a specific
    number of months to a date:


    ```

    ADD_MONTHS (input_date, number_of_months)

    ```


    This includes two parameters. The input_date is the date you’re adding to, and
    the number_of_months is a number that represents the number of months to add.
    This will add the specified number of months to a date and ensure the day remains
    the same, and only the month (or year) changes.


    Let’s say you needed to add six months to your `meeting_dates`. Your query would
    look like this:


    ```

    SELECT

    meeting_date,

    ADD_MONTHS(meeting_date, 6) AS new_date

    FROM sales_meeting;

    ```


    The results of this query are:


    | ID | MEETING_DATE | NEW_DATE |

    | --- | --- | --- |

    | 1 | 10/Aug/2018 | 10/Feb/2019 |

    | 2 | 21/Aug/2018 | 21/Feb/2019 |

    | 3 | 23/Aug/2018 | 23/Feb/2019 |


    The `new_date` column, with the `ADD_MONTHS` function , shows the meeting date
    6 months into the future. It has kept the same day, but the month and year have
    been changed.


    If you wanted to add a specific number of years to a date, you can add this in
    a number of months. This will work because a year always has 12 months. You can
    do this by adding the representation of years in months (e.g., 24 for 2 years)
    or by multiplying the number of years by 12 (e.g., 2 * 12). This query includes
    both examples:


    ```

    SELECT

    meeting_date,

    ADD_MONTHS(meeting_date, 24) AS new_date,

    ADD_MONTHS(meeting_date, 2*12) AS new_date_ex2

    FROM sales_meeting;

    ```


    The results are:


    | ID | MEETING_DATE | NEW_DATE | NEW_DATE_EX2 |

    | --- | --- | --- | --- |

    | 1 | 10/Aug/2018 | 10/Aug/2020 | 10/Aug/2020 |

    | 2 | 21/Aug/2018 | 21/Aug/2020 | 21/Aug/2020 |

    | 3 | 23/Aug/2018 | 23/Aug/2020 | 23/Aug/2020 |


    Both the `new_date` and `new_date_ex2` columns show the `meeting_date` value 2
    years into the future. This is an easy way of adding months or years to an existing
    date value.


    ## Summary


    Functions in Oracle will let you perform calculations on columns and values in
    your queries. You can do some basic operations using mathematical symbols such
    as +, -, * and /. You can also concatenate string values using ||. If you want
    to perform operations more than that, you can use one of Oracle’s many functions.


    The Oracle functions are grouped into three groups based on the type of data they
    work with: number, string, and date. These functions take parameters, perform
    a process, and return a value. They can be used in many different areas of queries,
    such as WHERE clauses in SELECT queries and INSERT and UPDATE queries.


    # 23. Writing Conditional Logic


    Many programming languages include the ability to perform conditional logic, or
    “if this is true, then do something, otherwise do something else.” SQL is different
    to other programming languages and doesn’t include a lot of features such as variables
    and loops. However, SQL does have the ability to use conditional logic.


    This is often called an IF statement in other languages, which looks like this:


    ```

    if (some condition) {

    do_something;

    else {

    do_something_else;

    }

    ```


    In SQL, you can do the same kind of thing, but it’s done a little differently.
    You can use a type of statement called the *CASE statement*.


    ## The CASE Statement


    In SQL, the `CASE` statement allows you to perform this “if-then-else” logic or
    conditional logic in your query. It’s similar to an IF statement in other languages.
    It’s called a statement rather than a function because it’s a combination of keywords
    and not a keyword with several parameters inside brackets.


    The `CASE` statement can be used in many of the same places that a function can,
    such as:


    *   The SELECT, WHERE, and ORDER BY clause of a SELECT statement


    *   The UPDATE, SET, and WHERE clause of an UPDATE statement


    *   The WHERE clause of a DELETE statement


    It’s good for displaying a particular value depending on another value in the
    same row. Because values in each row can be different, adding in a `CASE` statement
    to look at them and display a value in different situations is sometimes useful.


    What does a `CASE` statement look like?


    ```

    CASE [expression] WHEN condition_1 THEN result_1

    WHEN condition_2 THEN result_2

    ...

    WHEN condition_n THEN result_n

    ELSE result

    END case_name

    ```


    The parameters for this statement are:


    *   expression: This is the expression or the condition that the CASE statement
    will look for. If you compare this to an IF statement, this is the first part
    of the condition that comes after the IF. This is an optional parameter.


    *   condition_1/2/n: This is the possible result of the expression just mentioned.
    You can have as many of these conditions as you like in your CASE statement, depending
    on how many different possible values you want to handle.


    *   result_1/2/n: This is the value that should be displayed or shown if the condition
    mentioned is met. This comes after the THEN keyword and is equivalent to the THEN
    part of an IF-THEN-ELSE statement in other programming languages.


    *   ELSE result: This is the value to show if none of the conditions in the CASE
    statement are met. It’s equivalent to the ELSE part of an IF-THEN-ELSE statement.


    *   case_name: This is an optional parameter and indicates what the column should
    be called when it’s used in the query. It’s similar to a column alias that you’ve
    used in earlier chapters.


    It’s quite a long statement, but it’s very useful if you need to perform this
    kind of logic in your query. In Oracle SQL, you can use a `CASE` statement in
    two ways: a *simple case statement*, and a *searched case statement*.'
  trans: "\n### 添加月份\n\n在本章前面，你已经学习了如何通过简单地在日期上添加一个数字来增加天数：\n\n```sql\nSELECT meeting_date\
    \ + 7\nFROM sales_meeting;\n```\n\n然而，如果你需要向一个日期添加几个月呢？三个月、六个月，还是 24 个月？你可以通过添加天数来实现。但你会选择哪个数字：30，还是\
    \ 31？不同的月份有不同的天数，所以添加 30 天这个方法并非在所有情况下都适用。如果你需要日期精确地变为未来的某个月份，这种方法就行不通了。\n\nOracle\
    \ 中有一个名为 `ADD_MONTHS` 的函数，它允许你向一个日期添加指定的月份数：\n\n```sql\nADD_MONTHS (input_date,\
    \ number_of_months)\n```\n\n这个函数包含两个参数。`input_date` 是你想要向其添加月份的日期，而 `number_of_months`\
    \ 是一个表示要添加的月份数的数字。这个函数会将指定的月份数添加到日期中，并确保日保持不变，只改变月份（或年份）。\n\n假设你需要为你的 `meeting_dates`\
    \ 添加六个月。你的查询将如下所示：\n\n```sql\nSELECT\n    meeting_date,\n    ADD_MONTHS(meeting_date,\
    \ 6) AS new_date\nFROM sales_meeting;\n```\n\n该查询的结果是：\n\n| ID | MEETING_DATE\
    \ | NEW_DATE |\n| --- | --- | --- |\n| 1 | 10/Aug/2018 | 10/Feb/2019 |\n| 2 |\
    \ 21/Aug/2018 | 21/Feb/2019 |\n| 3 | 23/Aug/2018 | 23/Feb/2019 |\n\n`new_date`\
    \ 列，使用了 `ADD_MONTHS` 函数，显示了 6 个月后的会议日期。它保持了相同的日，但月份和年份已经改变。\n\n如果你想向一个日期添加特定的年数，你可以通过添加等效的月份数来实现。这是可行的，因为一年总是有\
    \ 12 个月。你可以通过添加年数对应的月份数（例如，24 代表 2 年），或者将年数乘以 12（例如，2 * 12）来完成。这个查询包含了两种示例：\n\n\
    ```sql\nSELECT\n    meeting_date,\n    ADD_MONTHS(meeting_date, 24) AS new_date,\n\
    \    ADD_MONTHS(meeting_date, 2*12) AS new_date_ex2\nFROM sales_meeting;\n```\n\
    \n结果是：\n\n| ID | MEETING_DATE | NEW_DATE | NEW_DATE_EX2 |\n| --- | --- | --- |\
    \ --- |\n| 1 | 10/Aug/2018 | 10/Aug/2020 | 10/Aug/2020 |\n| 2 | 21/Aug/2018 |\
    \ 21/Aug/2020 | 21/Aug/2020 |\n| 3 | 23/Aug/2018 | 23/Aug/2020 | 23/Aug/2020 |\n\
    \n`new_date` 和 `new_date_ex2` 两列都显示了 `meeting_date` 值两年后的结果。这是向现有日期值添加月份或年份的一种简单方法。\n\
    \n## 总结\n\nOracle 中的函数允许你对查询中的列和值执行计算。你可以使用数学符号如 `+`、`-`、`*` 和 `/` 执行一些基本操作。你也可以使用\
    \ `||` 连接字符串值。如果你想执行更复杂的操作，可以使用 Oracle 提供的众多函数之一。\n\nOracle 函数根据它们处理的数据类型分为三组：数字、字符串和日期。这些函数接受参数，执行一个过程，并返回一个值。它们可以用于查询的许多不同部分，例如\
    \ `SELECT` 查询中的 `WHERE` 子句，以及 `INSERT` 和 `UPDATE` 查询中。\n\n# 23. 编写条件逻辑\n\n许多编程语言都包含执行条件逻辑的能力，即“如果这个条件为真，则执行某事，否则执行另一事”。SQL\
    \ 与其他编程语言不同，它不包含很多特性，如变量和循环。然而，SQL 确实具有使用条件逻辑的能力。\n\n这在其他语言中通常被称为 `IF` 语句，其形式如下：\n\
    \n```sql\nif (some condition) {\n    do_something;\nelse {\n    do_something_else;\n\
    }\n```\n\n在 SQL 中，你可以做同样类型的事情，但做法略有不同。你可以使用一种称为 `CASE` 语句的语句。\n\n## CASE 语句\n\n\
    在 SQL 中，`CASE` 语句允许你在查询中执行这种“如果-那么-否则”逻辑或条件逻辑。它类似于其他语言中的 `IF` 语句。它被称为语句（statement）而不是函数（function），因为它是一组关键字的组合，而不是一个带有括号内几个参数的关键字。\n\
    \n`CASE` 语句可以用于函数可以使用的许多相同位置，例如：\n\n*   `SELECT` 语句的 `SELECT`、`WHERE` 和 `ORDER\
    \ BY` 子句\n*   `UPDATE` 语句的 `UPDATE`、`SET` 和 `WHERE` 子句\n*   `DELETE` 语句的 `WHERE`\
    \ 子句\n\n它非常适合根据同一行中的另一个值来显示特定的值。因为每一行中的值可能不同，所以有时添加一个 `CASE` 语句来查看它们并在不同情况下显示一个值是很有用的。\n\
    \n`CASE` 语句是什么样子的？\n\n```sql\nCASE [expression]\n    WHEN condition_1 THEN result_1\n\
    \    WHEN condition_2 THEN result_2\n    ...\n    WHEN condition_n THEN result_n\n\
    \    ELSE result\nEND case_name\n```\n\n该语句的参数是：\n\n*   `expression`：这是 `CASE`\
    \ 语句将要查找的表达式或条件。如果你将其与 `IF` 语句比较，这相当于 `IF` 后面条件的第一部分。这是一个可选参数。\n*   `condition_1/2/n`：这是上述表达式的可能结果。根据你想要处理的不同可能值的数量，你可以在\
    \ `CASE` 语句中放入任意多个这样的条件。\n*   `result_1/2/n`：这是如果满足上述条件则应显示的值。它位于 `THEN` 关键字之后，相当于其他编程语言中\
    \ `IF-THEN-ELSE` 语句的 `THEN` 部分。\n*   `ELSE result`：如果 `CASE` 语句中没有任何条件被满足，则显示此值。它相当于\
    \ `IF-THEN-ELSE` 语句的 `ELSE` 部分。\n*   `case_name`：这是一个可选参数，指示当它在查询中使用时该列应被称为什么。它类似于你在前面章节中使用过的列别名。\n\
    \n这是一个相当长的语句，但如果你需要在查询中执行这种逻辑，它非常有用。在 Oracle SQL 中，你可以使用两种方式的 `CASE` 语句：简单的 `CASE`\
    \ 语句和搜索的 `CASE` 语句。\n"
- fmt: '# Simple Case Statement


    ## 基本示例


    一个*简单 CASE 语句*就是使用了表达式参数的情况。它会对每一行的 `WHEN` 条件检查同一个表达式。


    例如，你的语句可能如下所示：


    ```sql

    CASE last_name

    WHEN ''JONES'' THEN ''The name is Jones''

    WHEN ''SMITH'' THEN ''The name is Smith''

    WHEN ''KING'' THEN ''The name is King''

    ELSE ''The name is something else''

    END namecheck

    ```


    这条语句会检查 `last_name` 列，如果它等于 JONES、SMITH 或 KING，则显示不同的值。如果它不匹配其中任何一个，则显示另一个值。你不需要指定
    `WHEN last_name = ''JONES''` 或 `WHEN last_name = ''SMITH''`，因为使用这种方法时，`WHEN` 会自动应用到语句开头提到的
    `last_name` 上。


    这里也没有提到表名或 `FROM` 子句，因为假定这条语句是另一个包含 `FROM` 子句的语句（例如 `SELECT`）的一部分。例如，这条 `CASE`
    语句可以被添加到一个 `SELECT` 查询中：


    | LAST_NAME | NAMECHECK |

    | --- | --- |

    | JONES | The name is Jones |

    | SMITH | The name is Smith |

    | KING | The name is King |

    | SIMPSON | The name is something else |

    | ANDERSON | The name is something else |

    | COOPER | The name is something else |

    | ADAMS | The name is something else |

    | SMITH | The name is Smith |

    | PATRICK | The name is something else |

    | Jones | The name is something else |


    ```sql

    SELECT

    last_name,

    CASE last_name

    WHEN ''JONES'' THEN ''The name is Jones''

    WHEN ''SMITH'' THEN ''The name is Smith''

    WHEN ''KING'' THEN ''The name is King''

    ELSE ''The name is something else''

    END namecheck

    FROM employee;

    ```


    你可以看到其中一些结果显示了正确描述名字的句子，而另一些显示了“something else”。最后一行显示的是“Jones”，但这个 `CASE` 语句将其显示为“something
    else”。这是因为 `CASE` 语句和 `WHEN` 子句是区分大小写的，就像你在之前章节中学到的 `WHERE` 子句一样。这意味着 “Jones”
    不等于 “JONES”。


    ## 使用函数处理大小写


    好消息是，你可以在 `CASE` 语句中使用函数。你可以在 `CASE` 语句内部使用 `UPPER` 函数将 `last_name` 转换为大写值进行检查：


    | LAST_NAME | NAMECHECK |

    | --- | --- |

    | JONES | The name is Jones |

    | SMITH | The name is Smith |

    | KING | The name is King |

    | SIMPSON | The name is something else |

    | ANDERSON | The name is something else |

    | COOPER | The name is something else |

    | ADAMS | The name is something else |

    | SMITH | The name is Smith |

    | PATRICK | The name is something else |

    | Jones | The name is Jones |


    ```sql

    SELECT

    last_name,

    CASE UPPER(last_name)

    WHEN ''JONES'' THEN ''The name is Jones''

    WHEN ''SMITH'' THEN ''The name is Smith''

    WHEN ''KING'' THEN ''The name is King''

    ELSE ''The name is something else''

    END namecheck

    FROM employee;

    ```


    使用这个 `UPPER` 函数已将“Jones”转换为“JONES”，并满足了 CASE 语句中 WHEN ‘JONES’ 的条件。


    ## 多条件简单 CASE


    让我们看另一个例子，你需要判断一个 `salary` 是否等于 20000 或 40000，如果是，则符合加薪条件。你的查询会是这样：


    ```sql

    SELECT id,

    last_name,

    salary,

    CASE salary

    WHEN 20000 THEN ''Eligible''

    WHEN 40000 THEN ''Eligible''

    ELSE ''Not Eligible''

    END salary_check

    FROM employee;

    ```


    这个查询检查 `salary` 列。如果等于 20000，则显示 Eligible 值。如果等于 40000，也显示同样的值。如果它不匹配这两个值中的任何一个，则显示
    Not Eligible。如果你运行这个查询，你会得到这个结果：


    | ID | LAST_NAME | SALARY | SALARY_CHECK |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | Not Eligible |

    | 2 | SMITH | 35000 | Not Eligible |

    | 3 | KING | 45000 | Not Eligible |

    | 4 | SIMPSON | 52000 | Not Eligible |

    | 5 | ANDERSON | 31000 | Not Eligible |

    | 6 | COOPER | (null) | Not Eligible |

    | 7 | ADAMS | (null) | Not Eligible |

    | 8 | SMITH | 62000 | Not Eligible |

    | 9 | PATRICK | 40000 | Eligible |

    | 10 | Jones | 42000 | Not Eligible |


    这显示了 `salary` 为 20000 或 40000 的员工为 Eligible，其他记录为 Not Eligible。然而，`CASE` 语句中的两个
    `WHEN` 子句看起来非常相似：


    ```sql

    WHEN 20000 THEN ''Eligible''

    WHEN 40000 THEN ''Eligible''

    ```


    我们可以尝试使用 `OR` 关键字将它们合并为一个条件，就像在 `WHERE` 子句中那样。这使代码更易于阅读和编写，因为代码更少。


    ```sql

    WHEN 20000 OR 40000 THEN ''Eligible''

    ```


    让我们将这个添加到整个查询中并运行它。


    ```sql

    SELECT id,

    last_name,

    salary,

    CASE salary

    WHEN 20000 OR 40000 THEN ''Eligible''

    ELSE ''Not Eligible''

    END salary_check

    FROM employee;

    ```


    我们得到了这个错误：


    ```

    ORA-00905: missing keyword

    00905. 00000 -  "missing keyword"

    *Cause:

    *Action:

    Error at Line: 28 Column: 12

    ```


    这是否意味着我们不能在 `CASE` 语句中使用 `OR` 关键字？我们可以，但不能在简单 CASE 语句中使用。对于比这些简单检查更复杂的任何情况，我们需要使用另一种类型的
    CASE 语句。'
  raw: '## Simple Case Statement


    A *simple case statement* is where the expression parameter is used. The same
    expression is checked for each of the `WHEN condition` lines.


    For example, your statement may look like this:


    ```

    CASE last_name

    WHEN ''JONES'' THEN ''The name is Jones''

    WHEN ''SMITH'' THEN ''The name is Smith''

    WHEN ''KING'' THEN ''The name is King''

    ELSE ''The name is something else''

    END namecheck

    ```


    This statement looks at the `last_name` column and displays different values if
    it is equal to JONES, SMITH, or KING. If it doesn’t match any of those, another
    value is displayed. You don’t need to specify `WHEN last_name = ''JONES''` or
    `WHEN last_name = ''SMITH''` because, using this method, the `WHEN` automatically
    applies to the `last_name` mentioned at the start of the statement.


    There is also no mention of a table name or a `FROM` clause here, as it’s assumed
    this statement is part of another statement (such as a `SELECT`) that includes
    a `FROM` clause. For example, this `CASE` statement can be added to a `SELECT`
    query :


    | LAST_NAME | NAMECHECK |

    | --- | --- |

    | JONES | The name is Jones |

    | SMITH | The name is Smith |

    | KING | The name is King |

    | SIMPSON | The name is something else |

    | ANDERSON | The name is something else |

    | COOPER | The name is something else |

    | ADAMS | The name is something else |

    | SMITH | The name is Smith |

    | PATRICK | The name is something else |

    | Jones | The name is something else |


    ```

    SELECT

    last_name,

    CASE last_name

    WHEN ''JONES'' THEN ''The name is Jones''

    WHEN ''SMITH'' THEN ''The name is Smith''

    WHEN ''KING'' THEN ''The name is King''

    ELSE ''The name is something else''

    END namecheck

    FROM employee;

    ```


    You can see that a few of these results show a sentence that describes the name
    correctly, and others show “something else.” The last row shows “Jones”, but this
    `CASE` statement shows it as “something else”. This is because the `CASE` statement
    and the `WHEN` clause are case sensitive, just like the `WHERE` clause you learned
    about in an earlier chapter. This means that “Jones” does not equal “JONES.”


    The good news is that you can use functions inside a `CASE` statement. You can
    convert the `last_name` to an uppercase value for checking inside the `CASE` statement:


    | LAST_NAME | NAMECHECK |

    | --- | --- |

    | JONES | The name is Jones |

    | SMITH | The name is Smith |

    | KING | The name is King |

    | SIMPSON | The name is something else |

    | ANDERSON | The name is something else |

    | COOPER | The name is something else |

    | ADAMS | The name is something else |

    | SMITH | The name is Smith |

    | PATRICK | The name is something else |

    | Jones | The name is Jones |


    ```

    SELECT

    last_name,

    CASE UPPER(last_name)

    WHEN ''JONES'' THEN ''The name is Jones''

    WHEN ''SMITH'' THEN ''The name is Smith''

    WHEN ''KING'' THEN ''The name is King''

    ELSE ''The name is something else''

    END namecheck

    FROM employee;

    ```


    Using this `UPPER` function has converted “Jones” to “JONES” and it has met the
    criteria inside the CASE statement that said WHEN ‘JONES’.


    Let’s look at another example, where you need to determine if a `salary` is equal
    to 20000 or 40000, then it’s eligible for a pay rise. Your query would look like
    this:


    ```

    SELECT id,

    last_name,

    salary,

    CASE salary

    WHEN 20000 THEN ''Eligible''

    WHEN 40000 THEN ''Eligible''

    ELSE ''Not Eligible''

    END salary_check

    FROM employee;

    ```


    This query looks at the `salary` column. If it’s equal to 20000 it shows a value
    of Eligible. It shows the same value if it’s equal to 40000\. If it doesn’t match
    either of those values, it shows as Not Eligible. If you run the query, you’ll
    get this result:


    | ID | LAST_NAME | SALARY | SALARY_CHECK |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | Not Eligible |

    | 2 | SMITH | 35000 | Not Eligible |

    | 3 | KING | 45000 | Not Eligible |

    | 4 | SIMPSON | 52000 | Not Eligible |

    | 5 | ANDERSON | 31000 | Not Eligible |

    | 6 | COOPER | (null) | Not Eligible |

    | 7 | ADAMS | (null) | Not Eligible |

    | 8 | SMITH | 62000 | Not Eligible |

    | 9 | PATRICK | 40000 | Eligible |

    | 10 | Jones | 42000 | Not Eligible |


    This shows the word Eligible for employees with a `salary` of 20000 or 40000,
    and Not Eligible for the other records. However, both of the `WHEN` clauses inside
    the `CASE` statement look very similar:


    ```

    WHEN 20000 THEN ''Eligible''

    WHEN 40000 THEN ''Eligible''

    ```


    We can try to improve this by using the `OR` keyword to combine them into one,
    just like we would if this was a `WHERE` clause . This makes it easier to read
    and write, as there is less code.


    ```

    WHEN 20000 OR 40000 THEN ''Eligible''

    ```


    Let’s add this to the overall query and run it.


    ```

    SELECT id,

    last_name,

    salary,

    CASE salary

    WHEN 20000 OR 40000 THEN ''Eligible''

    ELSE ''Not Eligible''

    END salary_check

    FROM employee;

    ```


    We get this error:


    ```

    ORA-00905: missing keyword

    00905\. 00000 -  "missing keyword"

    *Cause:

    *Action:

    Error at Line: 28 Column: 12

    ```


    Does this mean we can’t have the `OR` keyword inside a `CASE` statement? We can,
    but not inside a simple case statement. For anything more than these simple checks,
    we need to use the other type of case statement.'
