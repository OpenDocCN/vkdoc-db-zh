  trans: '## 示例：添加列


    你可以使用 `ALTER TABLE` 语句向现有表中添加新列。这类语句看起来如下所示：

    ```

    ALTER TABLE table_name

    ADD column_name column_definition;

    ```


    它包含了表名、新列的名称以及你想要添加的新列的详细信息，例如数据类型。


    假设你想为 `employee` 表添加一个新列来存储员工职位。这是一个文本值，100 个字符应该足够容纳它。你的 `ALTER TABLE` 语句看起来会是这样：

    ```

    ALTER TABLE employee

    ADD job_title VARCHAR2(100);

    ```


    这个语句会在 `employee` 表中添加一个名为 `job_title` 的新列，数据类型为 `VARCHAR2`，最大长度为 100 字节。列名的长度限制为
    128 字节（截至 12.2 版本）。虽然较长的列名可能更具描述性，但需要在列名足够描述性与不过长之间取得平衡。


    要运行此语句，只需像处理其他语句一样，将其输入到 SQL Developer 窗口中，然后点击“运行”按钮。你会在输出面板中收到一条消息，内容为“Table
    EMPLOYEE altered.”。


    如果你向一个已包含数据的表中添加一个新列，那么这个列中的值会是什么呢？让我们来一探究竟。你可以通过运行一条 `SELECT` 语句来查看表中的内容，包括你的新列：

    ```

    SELECT *

    FROM employee;

    ```


    你的表应该大致如下所示，具体取决于你是否运行了前面章节中的 `UPDATE` 语句：


    | ID | LAST_NAME | SALARY | JOB_TITLE |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | (null) |

    | 2 | SMITH | 35000 | (null) |

    | 3 | KING | 45000 | (null) |

    | 4 | SIMPSON | 52000 | (null) |

    | 5 | ANDERSON | 31000 | (null) |

    | 6 | COOPER | (null) | (null) |

    | 7 | ADAMS | (null) | (null) |

    | 8 | SMITH | 62000 | (null) |

    | 9 | PATRICK | 40000 | (null) |


    新的 `job_title` 列中每条记录的值都是 `NULL`。这是因为当我们添加列时，不可能知道每条记录的对应值应该是什么，因此它被设置为 `NULL`。你可以运行一条
    `UPDATE` 语句来为现有记录更新 `job_title` 的值。


    ## 示例：更改数据类型


    `ALTER TABLE` 语句的另一项用途是更改列的数据类型。这在以下等情况中非常有用：

    *   你需要扩大列的容量，例如增加 `NUMBER` 或 `VARCHAR2` 字段的大小。

    *   你要将一个列从文本值更改为数字值，因为它将要引用另一个表中的主键。

    *   你需要捕获日期时间值的额外部分。


    更改一个已包含数据的列的数据类型可能会导致问题，所以需要谨慎操作。根据你所做的更改，数据可能会被保留，或者你可能会收到错误。如果你确实想要更改列的数据类型，你的语句看起来会是这样：

    ```

    ALTER TABLE table_name

    MODIFY column_name data_type;

    ```


    举个例子，如果你想将 `job_title` 列从 `VARCHAR2(100)` 更改为 `NVARCHAR2(250)`，你的语句看起来会是这样：

    ```

    ALTER TABLE employee

    MODIFY job_title NVARCHAR2(250);

    ```


    你只需要指定新的数据类型，而不需要指定旧的数据类型。如果你在 SQL Developer 中的数据库上运行此语句，你会收到一条“Table EMPLOYEE
    altered”的消息。


    ## 示例：添加主键


    在之前的章节中，我们解释了主键的概念（表中用于唯一标识一行的一个或多个列）。你在创建 `sales_meeting` 表时为其添加了主键。你也可以使用 `ALTER
    TABLE` 语句向已存在的表中添加主键。


    用于添加主键的 `ALTER TABLE` 语句看起来如下所示：

    ```

    ALTER TABLE table_name

    ADD CONSTRAINT constraint_name constraint_type;

    ```


    这个语句使用了 “`constraint`” 这个词。约束是数据库中的一种对象，用于对表中的列应用规则。主键就是一种约束。适用于主键的规则有：

    *   它必须是唯一的。

    *   它不能包含任何 `NULL` 值。

    *   每个表只能有一个主键。

    *   它可以应用于一个或多个列。


    我们的 `employee` 表目前没有主键，但你现在可以添加一个。用于此操作的语句将是：

    ```

    ALTER TABLE employee

    ADD CONSTRAINT pk_emp_id PRIMARY KEY (id);

    ```


    这个语句包含了：

    *   `ALTER TABLE employee` 来标识正在被修改的表。

    *   `ADD CONSTRAINT` 来指定要在表上添加什么。

    *   约束名称 “`pk_emp_id`”，这是新约束的名称。

    *   `PRIMARY KEY`，指定这是一个主键约束。

    *   列名 `id`，这意味着 `employee` 表上的 `id` 列是主键。


    为什么我们要给主键起一个名字？主键是存储在数据库中的东西，因此它需要一个名字。当你创建一个表时，你可以在想要设为主键的列后面直接添加 `PRIMARY KEY`
    字样，而无需指定主键约束的名称。然而，Oracle 在创建时会自动为主键设置一个名称，那将是一个由字母和数字组成的长字符串。使用你自己的命名可以使日后更容易识别。


    我在这个例子中使用的主键名称是 `pk_emp_id`。在为约束（如主键）命名时，我喜欢遵循一个标准的命名格式。这样你只需通过名称就能轻易知道它是什么。这个命名格式包括：

    *   前两个字母表示约束类型（“`pk`”），然后加一个下划线。

    *   表名的缩写（“`emp`” 是 `employee` 的缩写），然后加一个下划线。

    *   列的名称，如果是长名称可以缩写（这里是 `id` 列）。

    *   我使用的名字是 `pk_emp_id`，这意味着它是 `employee` 表上使用 `id` 列的主键。


    如果你还没有运行，你应该在数据库上运行这条 `ALTER TABLE` 语句。下一个例子需要用到它。'
- fmt: '## Example: Add a Foreign Key


    A foreign key is one or more columns that refer to a primary key in another table.
    Foreign keys are a part of a good database design. Oracle allows you to add foreign
    key constraints, which enforce the rules of a foreign key, ensuring that a record
    exists in the table that is being referred to.


    For example, our `sales_meeting` table has an `employee_id` column, and looks
    like this:


    ```

    ID   EMPLOYEE_ID   COMPANY            MEETING_DATE

    1    5             ABC Construction   10/AUG/2018

    2    2             BW Signage         21/AUG/2018

    ```


    The `employee_id` column is the foreign key, and it refers to the employee table’s
    id column. We can use the `ALTER TABLE` command to add a foreign key constraint
    to this table:


    ```

    ALTER TABLE sales_meeting

    ADD CONSTRAINT fk_sm_empid FOREIGN KEY (employee_id) REFERENCES employee(id);

    ```


    This statement includes:


    *   `ALTER TABLE sales_meeting` to identify the table we are altering

    *   `ADD CONSTRAINT fk_sm_emp_id`, which gives the new constraint a name

    *   `FOREIGN KEY (employee_id)` means it is a foreign key constraint, and the
    `employee_id` is the column in this table that it applies to.

    *   `REFERENCES employee (id)` means that the column in this table refers to the
    `id` column in the `employee` table.


    If you run this statement, you’ll get the message “Table SALES_MEETING altered.”
    This means the foreign key has been applied to this table. It ensures:


    The `employee_id` in the `sales_meeting` table matches a record in the employee’s
    `id` column. If you add a `sales_meeting` for `employee_id` 15, but no employee
    record exists with that `id`, you’ll get an error.


    Employee records that have a related `sales_meeting` can’t be deleted. A setting
    can be changed to allow them to be deleted, but by default they can’t be. You
    can’t delete the employee with an `id` of 5 as they have a `sales_meeting` record.


    If you run this statement and the referring table (the `employee` table in this
    example) does not have a primary key on the `id` column, you’ll get this error
    message:


    ```

    Error starting at line : 21 in command -

    ALTER TABLE sales_meeting

    ADD CONSTRAINT fk_sm_empid FOREIGN KEY (employee_id) REFERENCES employee(id)

    Error report -

    ORA-02270: no matching unique or primary key for this column-list

    02270. 00000 -  "no matching unique or primary key for this column-list"

    *Cause:    A REFERENCES clause in a CREATE/ALTER TABLE statement

    gives a column-list for which there is no matching unique or primary key constraint
    in the referenced table.

    *Action:   Find the correct column names using the ALL_CONS_COLUMNS

    catalog view

    ```


    This means that the `employee` table does not have a primary key on the `id` column.


    ## Example: Rename a Column


    To rename a column in a table, you can use the `ALTER TABLE` statement. The statement
    looks like this:


    ```

    ALTER TABLE table_name

    RENAME COLUMN column_name TO new_column_name;

    ```


    Let’s say you wanted to rename our new column from `job_title` to `position_title`.
    The statement to do this would be:


    ```

    ALTER TABLE employee

    RENAME COLUMN job_title TO position_title;

    ```


    If you run this statement, you’ll get the “Table EMPLOYEE altered” just like earlier
    examples. You can also see the change has been applied by running a `SELECT` statement
    on the `employee` table:


    ```

    SELECT *

    FROM employee;

    ID   LAST_NAME   SALARY   POSITION_TITLE

    1    JONES       30000    (null)

    2    SMITH       35000    (null)

    3    KING        45000    (null)

    4    SIMPSON     52000    (null)

    5    ANDERSON    31000    (null)

    6    COOPER      (null)   (null)

    7    ADAMS       (null)   (null)

    8    SMITH       62000    (null)

    9    PATRICK     40000    (null)

    ```


    None of the values in the column have been changed with this statement.


    ## Example: Remove a Column


    To remove a column from a table, you can also use the `ALTER TABLE` statement:


    ```

    ALTER TABLE table_name

    DROP [COLUMN] column_name

    [CASCADE CONSTRAINTS];

    ```


    There are a few things to note about this statement:


    *   It uses the `DROP` keyword, which is the word used when removing objects from
    the database.

    *   The word `COLUMN` is optional. If you omit the word `COLUMN`, the column names
    must be within brackets.

    *   The words `CASCADE CONSTRAINTS` are optional, and we’ll cover what this means
    shortly.


    Let’s remove the new column on the `employee` table, which is called `position_title`.
    To do this, our statement would be:


    ```

    ALTER TABLE employee

    DROP COLUMN position_title;

    ```


    Alternatively, this statement would also work:


    ```

    ALTER TABLE employee

    DROP (position_title);

    ```


    If you run either of these statements, the column will be removed from the table.
    You can confirm this by running a `SELECT` statement:


    ```

    SELECT *

    FROM employee;

    ID  LAST_NAME   SALARY

    1   JONES       30000

    2   SMITH       35000

    3   KING        45000

    4   SIMPSON     52000

    5   ANDERSON    31000

    6   COOPER      (null)

    7   ADAMS       (null)

    8   SMITH       62000

    9   PATRICK     40000

    ```


    What does `CASCADE CONSTRAINTS` mean? If you try to drop a column from a table
    that has constraints applied, such as the `employee_id` column on the `sales_meeting`
    table, you’ll get an error saying you can’t remove a column that has constraints.
    To avoid this error if you want to remove the column and any constraints, you
    can specify `CASCADE CONSTRAINTS`. This means the column and any constraints will
    be removed.


    ## Example: Rename a Table


    The last operation we will look at for the `ALTER TABLE` statement is renaming
    a table. You may want to rename a table if there’s a better name for the table,
    or if you are making changes to the software that require the table name to be
    changed.


    To do this, the `ALTER TABLE` statement would look like this:


    ```

    ALTER TABLE table_name

    RENAME TO new_table_name;

    ```


    Let’s say the company for which we are creating our database has determined that
    the meetings with customers should represent more than just sales. This means
    that we should rename our `sales_meeting` table to something more descriptive,
    such as `customer_meeting`.


    Your `ALTER TABLE` statement would look like this:


    ```

    ALTER TABLE sales_meeting

    RENAME TO customer_meeting;

    ```


    When you run this statement, the table name will be updated on the database. If
    you try to run a `SELECT` statement on the old table name, you’ll get an error
    that says the table does not exist. If you run a `SELECT` statement on the new
    table name, you’ll see the results from the table.


    ### Removing a Table with DROP TABLE


    So far in this chapter you have learned how to make changes to a table and its
    columns. There’s one thing we haven’t looked at yet, and that is removing a table
    from the database.


    You may want to remove a table if you don’t need it anymore. It’s better to remove
    tables that aren’t used, rather than leave them in the database, because removing
    them will save space on the database and will cause less confusion for others
    who need to write queries on the database.


    Removing a table from the database is called “dropping” a table. The word `drop`
    is used to describe the process of deleting objects from the database, and a table
    is a type of object.


    The `DROP TABLE` statement is used to drop a table, and it looks like this:


    ```

    DROP TABLE table_name;

    ```


    It’s a short statement, and the only thing you need to do is add the table name.
    For example, let’s say you need to remove the `office` table. To do this, your
    statement would be:


    ```

    DROP TABLE office;

    ```


    If you run this statement, the table will be deleted from the database. If you
    want to recreate the table, you can use the `CREATE TABLE` statement mentioned
    in the earlier chapter.


    ### Note


    Both the `ALTER TABLE` and `DROP TABLE` automatically perform a `COMMIT`, which
    means you can’t undo the statement by running a `ROLLBACK`.'
  raw: '## Example: Add a Foreign Key


    A foreign key is one or more columns that refer to a primary key in another table.
    Foreign keys are a part of a good database design. Oracle allows you to add foreign
    key constraints, which enforce the rules of a foreign key, ensuring that a record
    exists in the table that is being referred to.


    For example, our `sales_meeting` table has an `employee_id` column, and looks
    like this:


    ```

    ID   EMPLOYEE_ID   COMPANY            MEETING_DATE

    1    5             ABC Construction   10/AUG/2018

    2    2             BW Signage         21/AUG/2018

    ```


    The `employee_id` column is the foreign key, and it refers to the employee table’s
    id column. We can use the `ALTER TABLE` command to add a foreign key constraint
    to this table:


    ```

    ALTER TABLE sales_meeting

    ADD CONSTRAINT fk_sm_empid FOREIGN KEY (employee_id) REFERENCES employee(id);

    ```


    This statement includes:


    *   ALTER TABLE sales_meeting to identify the table we are altering


    *   ADD CONSTRAINT fk_sm_emp_id, which gives the new constraint a name


    *   FOREIGN KEY (employee_id) means it is a foreign key constraint, and the employee_id
    is the column in this table that it applies to.


    *   REFERENCES employee (id) means that the column in this table refers to the
    id column in the employee table.


    If you run this statement, you’ll get the message “Table SALES_MEETING altered.”
    This means the foreign key has been applied to this table. It ensures:


    The `employee_id` in the `sales_meeting` table matches a record in the employee’s
    `id` column. If you add a `sales_meeting` for `employee_id` 15, but no employee
    record exists with that `id`, you’ll get an error.


    Employee records that have a related `sales_meeting` can’t be deleted. A setting
    can be changed to allow them to be deleted, but by default they can’t be. You
    can’t delete the employee with an `id` of 5 as they have a `sales_meeting` record.


    If you run this statement and the referring table (the `employee` table in this
    example) does not have a primary key on the `id` column, you’ll get this error
    message:


    ```

    Error starting at line : 21 in command -

    ALTER TABLE sales_meeting

    ADD CONSTRAINT fk_sm_empid FOREIGN KEY (employee_id) REFERENCES employee(id)

    Error report -

    ORA-02270: no matching unique or primary key for this column-list

    02270\. 00000 -  "no matching unique or primary key for this column-list"

    *Cause:    A REFERENCES clause in a CREATE/ALTER TABLE statement

    gives a column-list for which there is no matching unique or primary key constraint
    in the referenced table.

    *Action:   Find the correct column names using the ALL_CONS_COLUMNS

    catalog view

    ```


    This means that the `employee` table does not have a primary key on the `id` column.


    ## Example: Rename a Column


    To rename a column in a table, you can use the `ALTER TABLE` statement. The statement
    looks like this:


    ```

    ALTER TABLE table_name

    RENAME COLUMN column_name TO new_column_name;

    ```


    Let’s say you wanted to rename our new column from `job_title` to `position_title`.
    The statement to do this would be:


    ```

    ALTER TABLE employee

    RENAME COLUMN job_title TO position_title;

    ```


    If you run this statement, you’ll get the “Table EMPLOYEE altered” just like earlier
    examples. You can also see the change has been applied by running a `SELECT` statement
    on the `employee` table:


    ```

    SELECT *

    FROM employee;

    ID   LAST_NAME   SALARY   POSITION_TITLE

    1    JONES       30000    (null)

    2    SMITH       35000    (null)

    3    KING        45000    (null)

    4    SIMPSON     52000    (null)

    5    ANDERSON    31000    (null)

    6    COOPER      (null)   (null)

    7    ADAMS       (null)   (null)

    8    SMITH       62000    (null)

    9    PATRICK     40000    (null)

    ```


    None of the values in the column have been changed with this statement.


    ## Example: Remove a Column


    To remove a column from a table, you can also use the `ALTER TABLE` statement:


    ```

    ALTER TABLE table_name

    DROP [COLUMN] column_name

    [CASCADE CONSTRAINTS];

    ```


    There are a few things to note about this statement:


    *   It uses the DROP keyword, which is the word used when removing objects from
    the database.


    *   The word COLUMN is optional. If you omit the word COLUMN, the column names
    must be within brackets.


    *   The words CASCADE CONSTRAINTS are optional, and we’ll cover what this means
    shortly.


    Let’s remove the new column on the `employee` table, which is called `position_title`.
    To do this, our statement would be:


    ```

    ALTER TABLE employee

    DROP COLUMN position_title;

    ```


    Alternatively, this statement would also work:


    ```

    ALTER TABLE employee

    DROP (position_title);

    ```


    If you run either of these statements, the column will be removed from the table.
    You can confirm this by running a `SELECT` statement:


    ```

    SELECT *

    FROM employee;

    ID  LAST_NAME   SALARY

    1   JONES       30000

    2   SMITH       35000

    3   KING        45000

    4   SIMPSON     52000

    5   ANDERSON    31000

    6   COOPER      (null)

    7   ADAMS       (null)

    8   SMITH       62000

    9   PATRICK     40000

    ```


    What does `CASCADE CONSTRAINTS` mean? If you try to drop a column from a table
    that has constraints applied, such as the `employee_id` column on the `sales_meeting`
    table, you’ll get an error saying you can’t remove a column that has constraints.
    To avoid this error if you want to remove the column and any constraints, you
    can specify `CASCADE CONSTRAINTS`. This means the column and any constraints will
    be removed.


    ## Example: Rename a Table


    The last operation we will look at for the `ALTER TABLE` statement is renaming
    a table. You may want to rename a table if there’s a better name for the table,
    or if you are making changes to the software that require the table name to be
    changed.


    To do this, the `ALTER TABLE` statement would look like this:


    ```

    ALTER TABLE table_name

    RENAME TO new_table_name;

    ```


    Let’s say the company for which we are creating our database has determined that
    the meetings with customers should represent more than just sales. This means
    that we should rename our `sales_meeting` table to something more descriptive,
    such as `customer_meeting`.


    Your `ALTER TABLE` statement would look like this:


    ```

    ALTER TABLE sales_meeting

    RENAME TO customer_meeting;

    ```


    When you run this statement, the table name will be updated on the database. If
    you try to run a `SELECT` statement on the old table name, you’ll get an error
    that says the table does not exist. If you run a `SELECT` statement on the new
    table name, you’ll see the results from the table.


    ## Removing a Table with DROP TABLE


    So far in this chapter you have learned how to make changes to a table and its
    columns. There’s one thing we haven’t looked at yet, and that is removing a table
    from the database.


    You may want to remove a table if you don’t need it anymore. It’s better to remove
    tables that aren’t used, rather than leave them in the database, because removing
    them will save space on the database and will cause less confusion for others
    who need to write queries on the database.


    Removing a table from the database is called “*dropping*” a table. The word drop
    is used to describe the process of deleting objects from the database, and a table
    is a type of object.


    The `DROP TABLE` statement is used to drop a table, and it looks like this:


    ```

    DROP TABLE table_name;

    ```


    It’s a short statement, and the only thing you need to do is add the table name.
    For example, let’s say you need to remove the `office` table. To do this, your
    statement would be:


    ```

    DROP TABLE office;

    ```


    If you run this statement, the table will be deleted from the database. If you
    want to recreate the table, you can use the `CREATE TABLE` statement mentioned
    in the earlier chapter.


    ### Note


    Both the ALTER TABLE and DROP TABLE automatically perform a COMMIT, which means
    you can’t undo the statement by running a ROLLBACK.'
