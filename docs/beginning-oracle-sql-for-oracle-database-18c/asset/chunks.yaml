  trans: "## 版本\n\n本书中的示例主要围绕以下版本的 Oracle 快捷版（Express Edition）和 SQL Developer 构建。不过，SQL\
    \ 是一门成熟且稳定的语言。本书开头的内容应该也适用于任何较近期的数据库版本。\n\n*   Oracle 快捷版 18c。此版本于 2018 年初发布，其快捷版则在\
    \ 2018 年末发布。\n*   Oracle SQL Developer 18.2。此版本于 2018 年 7 月发布。\n\nOracle 的版本号历史从\
    \ 2 开始，一直到 2017 年的 12c 版本。大约每 2 或 3 年会发布一个新的主版本，“12c”中的“c”代表“cloud（云）”，这是该版本的重点（之前的版本使用其他字母，如代表网格计算的“g”和代表互联网的“i”）。尽管“c”代表云，但\
    \ 12c 版本既可用于本地安装，也可在云上使用。\n\nOracle 公司在 2017 年宣布，他们的版本发布将改为年度发布，因此版本号将改为反映发布年份。这就解释了\
    \ 18c 版本的由来。Oracle 没有发布 13 到 17 的版本号，而是直接跳到了 18c。\n\n同样的概念也应用于 Oracle SQL Developer。最新版本是\
    \ 18，而之前的版本是版本 4。\n\n现在我们已经解释了将要使用的工具，接下来让我们看看如何设置它们。\n\n## 下载 Oracle 快捷版\n\n\
    Oracle 快捷版（或 Oracle Database XE）是我们将使用的数据库管理系统。它具备我们所需的所有数据库功能。它的限制主要与数据库大小以及在商业产品中的使用有关，但对于学习来说非常合适。\n\
    \n下载 Oracle 快捷版的步骤：\n\n1.  访问 Oracle 网站： [`www.oracle.com`](http://www.oracle.com)。\n\
    2.  导航到菜单 ➤ 产品 ➤ 数据库 ➤ 应用开发。这可以通过将鼠标悬停在每个部分上并点击 Oracle 快捷版来完成，如图 2-1 所示。\n\n \
    \   ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig1_HTML.jpg](img/471705_1_En_2_Fig1_HTML.jpg)\n\
    \    图 2-1\n    选择“应用开发”的菜单选项\n\n3.  向下滚动页面并点击 Database Express Edition（如图 2-2\
    \ 所示）。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig2_HTML.jpg](img/471705_1_En_2_Fig2_HTML.jpg)\n\
    \    图 2-2\n    “数据库语言和工具”部分\n\n4.  向下滚动，在“资源”部分下点击 Download Oracle Database XE（图\
    \ 2-3）。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig3_HTML.jpg](img/471705_1_En_2_Fig3_HTML.jpg)\n\
    \    图 2-3\n    Oracle Database XE 页面的底部\n\n加载的页面将显示有关 Oracle 快捷版的信息（图 2-4）。\n\
    \n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig4_HTML.jpg](img/471705_1_En_2_Fig4_HTML.jpg)\n\
    图 2-4\nOracle 快捷版下载页面\n\n### 注意\n\n本节中的截图显示的是 Oracle 快捷版 11g。在撰写本文时，这是 Windows\
    \ 上发布的最新版本。在您阅读本书时，18c 版本应该已经可用。安装过程是相同的。\n\n1.  阅读并点击“接受许可协议”。然后下载链接将会出现。\n2.\
    \  选择与您的操作系统相对应的版本并点击链接。如果是 Windows 系统，请根据您运行的 Windows 版本选择 32 位或 64 位。如果不确定，可以选择\
    \ 32 位版本以获得更顺畅的体验。\n    然后您将被要求登录或创建一个 Oracle 账户（图 2-5）。这是必需的，以便您可以下载 Oracle 快捷版（和\
    \ Oracle SQL Developer）。创建账户是免费的，您无需是 Oracle 员工。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig5_HTML.jpg](img/471705_1_En_2_Fig5_HTML.jpg)\n\
    \    图 2-5\n    登录或创建账户\n\n3.  点击“创建账户”。随后将显示“创建您的 Oracle 账户”屏幕，如图 2-6 所示。\n\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig6_HTML.jpg](img/471705_1_En_2_Fig6_HTML.jpg)\n\
    \    图 2-6\n    “创建您的 Oracle 账户”屏幕\n\n4.  输入您的详细信息并点击“创建账户”。您的账户现在应该已经创建好了。\n\
    5.  使用您新创建的账户登录。然后 Oracle 快捷版应该就会开始下载到您的计算机。\n\n根据您的浏览器设置，下载要么会自动开始（在默认的“下载”文件夹中），要么会要求您指定保存位置。\n\
    \n## Windows、Linux 以及 Mac 呢？\n\n您可能已经注意到 Oracle 快捷版有 Windows 和 Linux 版本，但没有 Mac\
    \ 版本。Oracle 目前不提供 Oracle 快捷版的 Mac 版本下载。但是，如果您使用的是 Mac，仍然可以使用 Oracle 快捷版来学习 Oracle。我自己就使用\
    \ Mac，并且能够在其上运行 Oracle 数据库。\n\nMac 用户有几种选择：\n\n*   设置一个 Windows 虚拟机，这是您计算机上运行\
    \ Windows 安装的一个区域，您可以在其中安装 Oracle。这可以使用虚拟机应用程序（如 Parallels 或 VirtualBox）来完成。\n\
    *   下载 Oracle 预构建的开发者虚拟机之一。这些是由 Oracle 预制的虚拟机文件，其中包含 Windows（使用名为 VirtualBox 的虚拟机程序）、Oracle\
    \ 数据库和 SQL Developer。\n*   使用 LiveSQL，它不需要安装，但需要互联网连接。\n\n有关设置虚拟机的详细信息，请访问以下页面：\n\
    *   Oracle\n*   在 Mac 上设置 Oracle： [`www.databasestar.com/oracle-mac/`](http://www.databasestar.com/oracle-mac/)\n\
    \n接下来的说明主要适用于 Windows 和 Linux 用户。如果您使用的是 Mac，那么您关于使用虚拟机还是 LiveSQL 的选择将会影响您需要执行以下哪些活动。例如，Oracle\
    \ 预构建的虚拟机会预装 Oracle 数据库，而对于您从头创建的虚拟机，您需要自己安装数据库。"
- fmt: "## Install Oracle Express\n\nNow that we have downloaded Oracle Express, it’s\
    \ time to install it. The steps that follow are for the Windows installation,\
    \ but the Linux installation should be similar.\n\n1.  Browse to the location\
    \ where you downloaded the file. This will either be in a default Downloads folder\
    \ or where you specified it. If you’ve still got your browser open, you should\
    \ be able to click the file and select **Show in Folder** (or a similar option)\
    \ to open the location where the file is saved.\n\n2.  As the file is a `ZIP`\
    \ file, it needs to be extracted. Open the file and extract it, or right click\
    \ the file and select **Extract**.\n\n    The file is extracted into a folder\
    \ called `DISK1`.\n\n3.  Open the `DISK1` folder and run the setup file (Figure\
    \ [2-7](#471705_1_En_2_Chapter.xhtml#Fig7)).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig7_HTML.jpg](Images/471705_1_En_2_Fig7_HTML.jpg)\n\
    \n    *Figure 2-7: The `DISK1` folder*\n\n4.  The file will load and an introduction\
    \ screen will be displayed (Figure [2-8](#471705_1_En_2_Chapter.xhtml#Fig8)).\
    \ Click **Next**.\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig8_HTML.jpg](Images/471705_1_En_2_Fig8_HTML.jpg)\n\
    \n    *Figure 2-8: The Introduction screen*\n\n5.  Read the terms and click **I\
    \ accept**; then click **Next** (Figure [2-9](#471705_1_En_2_Chapter.xhtml#Fig9)).\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig9_HTML.jpg](Images/471705_1_En_2_Fig9_HTML.jpg)\n\
    \n    *Figure 2-9: The License Agreement*\n\n6.  On the **Choose a destination\
    \ location** screen, click **Next**. You can change the location you want to install\
    \ into, but the default location (`C:\\oraclexe`) is OK.\n\n7.  The **Specify\
    \ Database Passwords** screen is displayed as shown in Figure [2-10](#471705_1_En_2_Chapter.xhtml#Fig10).\
    \ Enter a password you would like to use for the system administrator accounts\
    \ (called `SYS` and `SYSTEM`) and click **Next**.\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig10_HTML.jpg](Images/471705_1_En_2_Fig10_HTML.jpg)\n\
    \n    *Figure 2-10: The database password screen*\n\n### Note\n\nYou need to remember\
    \ this password, as you’ll use it to log in to the database later, and in case\
    \ you ever need to reset another password. If you forget the password, you may\
    \ need to reinstall Oracle Express.\n\n8.  On the Summary screen, click **Install**.\n\
    \n    Oracle Express will then be installed. This installation usually takes a\
    \ few minutes. A message is displayed once the installation is complete.\n\nNow\
    \ you have installed Oracle Express, it’s time to download and set up Oracle SQL\
    \ Developer so you can use this database.\n\n## Download Oracle SQL Developer\n\
    \nOracle SQL Developer is Oracle’s free application for accessing and working\
    \ with Oracle databases. This application is called an integrated development\
    \ environment (`IDE`). It’s a type of application that lets developers work with\
    \ code.\n\nTo download SQL Developer:\n\n1.  Visit Oracle’s website at [`www.oracle.com`](http://www.oracle.com).\n\
    \n2.  Under the menu, navigate to **Products ➤ Databases ➤ Application Development**.\n\
    \n3.  Scroll down and select **SQL Developer**.\n\n4.  Click the **Download**\
    \ button, as shown in Figure [2-11](#471705_1_En_2_Chapter.xhtml#Fig11).\n\n \
    \   ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig11_HTML.jpg](Images/471705_1_En_2_Fig11_HTML.jpg)\n\
    \n    *Figure 2-11: Oracle SQL Developer download*\n\n    The page shows many\
    \ different options for downloading SQL Developer (Figure [2-12](#471705_1_En_2_Chapter.xhtml#Fig12)):\n\
    \n    *   Windows 64-bit with JDK included\n    *   Windows 32-bit or 64-bit\n\
    \    *   Mac OSX\n    *   Linux\n    *   Other\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig12_HTML.jpg](Images/471705_1_En_2_Fig12_HTML.jpg)\n\
    \n    *Figure 2-12: Oracle SQL Developer download versions*\n\n    You should\
    \ choose the version of Oracle SQL Developer that matches your operating system\
    \ and the version of Oracle Express you chose earlier (either 32-bit or 64-bit).\
    \ The easiest way to get started is to use the “Windows 64-bit with JDK included.”\
    \ That’s if you are running a 64-bit version of Windows. Oracle SQL Developer\
    \ runs on a Java platform, and this is the only version that includes the `JDK`\
    \ (Java Development Kit) with it. So, it’s simpler to install because it’s only\
    \ the one process.\n\n    However, if you aren’t running Windows 64-bit, you’ll\
    \ need to choose one of the other versions. The other versions don’t come with\
    \ the `JDK` included, so you’ll need to install that separately. We’ll explain\
    \ how to do that later in this chapter.\n\n5.  Click the **Download** link for\
    \ the version you wish to download. As with Oracle Express, depending on your\
    \ browser settings the file will be downloaded to the default location or you’ll\
    \ get to specify the location.\n\nOnce the file is downloaded, it’s ready to set\
    \ up.\n\n## Run Oracle SQL Developer\n\nThe good thing about Oracle SQL Developer\
    \ is that it doesn’t need to be installed. The file that you have downloaded is\
    \ a `ZIP` file. To get SQL Developer up and running:\n\n1.  Browse to the location\
    \ where you downloaded SQL Developer.\n\n2.  Extract the `ZIP` file by double-clicking\
    \ the file, or right clicking and select **Extract**.\n\n3.  Once the file is\
    \ extracted, you can create a shortcut to the file to make it easier to run. Right\
    \ click `sqldeveloper.exe` and select **Send to Desktop as Shortcut**. This will\
    \ place a shortcut to the file on the desktop.\n\n4.  Run the `sqldeveloper.exe`\
    \ file. SQL Developer will now open.\n\n5.  If you downloaded a version that did\
    \ not come with `JDK` included, you may get asked to specify the path to your\
    \ Java files. Click **Browse** and locate the `java.exe` file. This will usually\
    \ be in `C:\\Program Files\\Java\\jdk1.8.0_144\\bin\\`.\n\nThe landing page or\
    \ splash screen should then be shown.\n\n## Download the JDK\n\nIf you have downloaded\
    \ one of the SQL Developer versions that did not come with the `JDK` included,\
    \ you may need to download it. If you’ve already got it on your computer, perhaps\
    \ from other development work you’ve done, then you won’t need to download it\
    \ again. However, if you do need to download it, here’s how:\n\n1.  Visit [`www.oracle.com`](http://www.oracle.com).\n\
    \n2.  Under the menu, select **Products ➤ Developer Tools ➤ Java SE SDK**.\n\n\
    3.  Click the **Downloads** tab at the top of the page, as shown in Figure [2-13](#471705_1_En_2_Chapter.xhtml#Fig13).\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig13_HTML.jpg](Images/471705_1_En_2_Fig13_HTML.jpg)\n\
    \n    *Figure 2-13: Java downloads*\n\n4.  Click the **Download** button next\
    \ to `JDK`, as shown in Figure [2-14](#471705_1_En_2_Chapter.xhtml#Fig14).\n\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig14_HTML.jpg](Images/471705_1_En_2_Fig14_HTML.jpg)\n\
    \n    *Figure 2-14: Java download page*\n\n5.  Click **Accept License Agreement**,\
    \ then click the link that represents the file for your operating system, as shown\
    \ in Figure [2-15](#471705_1_En_2_Chapter.xhtml#Fig15).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig15_HTML.jpg](Images/471705_1_En_2_Fig15_HTML.jpg)\n\
    \n    *Figure 2-15: Java download links*\n\nOnce the file is downloaded, you can\
    \ install it.\n\n1.  Click the file in your browser to run the installation file.\
    \ Alternatively, you can browse to the location where you downloaded it to, and\
    \ run the file.\n\n2.  Follow the steps in the process by clicking **Next** at\
    \ each stage. There’s no need to change any of the default options.\n\nThe `JDK`\
    \ should take a few minutes to be installed. You can now run SQL Developer."
