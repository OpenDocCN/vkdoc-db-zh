    Figure 4-3 The new `SQL Worksheet` icon


    2.  The `Select Connection` window will pop up as shown in Figure 4-4.


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig4_HTML.jpg](Images/471705_1_En_4_Fig4_HTML.jpg)


    Figure 4-4 The `Select Connection` window


    3.  Select the connection you want to use, such as “Intro,” and click `OK`.


    A new `SQL worksheet` is created, and it is displayed as a new tab within `SQL
    Developer`, as shown in Figure 4-5.


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig5_HTML.jpg](Images/471705_1_En_4_Fig5_HTML.jpg)


    Figure 4-5 The new worksheet


    Once the new file is displayed as a new tab on the screen, you can enter your
    query. Let’s enter the query we used in the earlier example into our new window,
    as shown in Figure 4-6.


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig6_HTML.jpg](Images/471705_1_En_4_Fig6_HTML.jpg)


    Figure 4-6 Our query written in `SQL Developer`


    Before we run our query, notice the drop-down box on the top right of the window
    (as shown in Figure 4-7).


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig7_HTML.jpg](Images/471705_1_En_4_Fig7_HTML.jpg)


    Figure 4-7 The connection for the `SQL` window


    This is the connection that is used for this file. Each tab, or file, in `SQL
    developer` needs to have a connection to the database to be able to run code.
    The good thing is that you can have a separate connection for each tab, if you’re
