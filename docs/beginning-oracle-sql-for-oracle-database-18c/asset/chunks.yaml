    ## 示例：添加外键


    外键是一个或多个列，用于引用另一张表中的主键。外键是良好数据库设计的一部分。Oracle 允许你添加外键约束，这些约束会强制执行外键规则，确保被引用的表中存在对应的记录。


    例如，我们的 `sales_meeting` 表有一个 `employee_id` 列，如下所示：


    ```

    ID   EMPLOYEE_ID   COMPANY            MEETING_DATE

    1    5             ABC Construction   10/AUG/2018

    2    2             BW Signage         21/AUG/2018

    ```


    `employee_id` 列是外键，它引用了员工表的 id 列。我们可以使用 `ALTER TABLE` 命令为这张表添加一个外键约束：


    ```

    ALTER TABLE sales_meeting

    ADD CONSTRAINT fk_sm_empid FOREIGN KEY (employee_id) REFERENCES employee(id);

    ```


    这条语句包含：


    *   `ALTER TABLE sales_meeting` 用于指明我们要修改哪张表。

    *   `ADD CONSTRAINT fk_sm_emp_id`，为新的约束指定一个名称。

    *   `FOREIGN KEY (employee_id)` 表明这是一个外键约束，`employee_id` 是此约束应用到的当前表的列。

    *   `REFERENCES employee (id)` 表示当前表中的这个列引用了 `employee` 表的 `id` 列。


    如果你运行这条语句，会收到消息“Table SALES_MEETING altered”。这表示外键已应用到这张表。它确保：


    `sales_meeting` 表中的 `employee_id` 与员工 `id` 列中的某条记录匹配。如果你为 `employee_id` 15 添加一条
    `sales_meeting` 记录，但不存在 `id` 为 15 的员工记录，你会得到一个错误。


    拥有相关 `sales_meeting` 记录的员工记录不能被删除。可以通过设置更改这一行为，但默认情况下是不允许的。你不能删除 `id` 为 5 的员工，因为他们有一条
    `sales_meeting` 记录。


    如果你运行此语句，而被引用的表（本例中是 `employee` 表）在 `id` 列上没有主键，你会得到如下错误信息：


    ```

    Error starting at line : 21 in command -

    ALTER TABLE sales_meeting

    ADD CONSTRAINT fk_sm_empid FOREIGN KEY (employee_id) REFERENCES employee(id)

    Error report -

    ORA-02270: no matching unique or primary key for this column-list

    02270. 00000 -  "no matching unique or primary key for this column-list"

    *Cause:    A REFERENCES clause in a CREATE/ALTER TABLE statement

    gives a column-list for which there is no matching unique or primary key constraint
    in the referenced table.

    *Action:   Find the correct column names using the ALL_CONS_COLUMNS

    catalog view

    ```


    这意味着 `employee` 表在 `id` 列上没有主键。


    ## 示例：重命名列


    要重命名表中的列，可以使用 `ALTER TABLE` 语句。语句如下：


    ```

    ALTER TABLE table_name

    RENAME COLUMN column_name TO new_column_name;

    ```


    假设你想将新列从 `job_title` 重命名为 `position_title`。执行此操作的语句是：


    ```

    ALTER TABLE employee

    RENAME COLUMN job_title TO position_title;

    ```


    如果你运行这条语句，你会像之前的示例一样得到“Table EMPLOYEE altered”的消息。你也可以通过运行 `employee` 表上的 `SELECT`
    语句来查看变更已生效：


    ```

    SELECT *

    FROM employee;

    ID   LAST_NAME   SALARY   POSITION_TITLE

    1    JONES       30000    (null)

    2    SMITH       35000    (null)

    3    KING        45000    (null)

    4    SIMPSON     52000    (null)

    5    ANDERSON    31000    (null)

    6    COOPER      (null)   (null)

    7    ADAMS       (null)   (null)

    8    SMITH       62000    (null)

    9    PATRICK     40000    (null)

    ```


    此语句并未更改该列中的任何值。


    ## 示例：删除列


    要从表中删除列，你也可以使用 `ALTER TABLE` 语句：


    ```

    ALTER TABLE table_name

    DROP [COLUMN] column_name

    [CASCADE CONSTRAINTS];

    ```


    关于这条语句有几点需要注意：


    *   它使用了 `DROP` 关键字，这是从数据库中删除对象时使用的词。

    *   `COLUMN` 这个词是可选的。如果省略 `COLUMN`，列名必须用括号括起来。

    *   `CASCADE CONSTRAINTS` 这些词是可选的，我们稍后会解释其含义。


    让我们删除 `employee` 表上的新列，该列名为 `position_title`。为此，我们的语句将是：


    ```

    ALTER TABLE employee

    DROP COLUMN position_title;

    ```


    或者，这条语句同样有效：


    ```

    ALTER TABLE employee

    DROP (position_title);

    ```


    如果你运行这两条语句中的任意一条，该列将从表中移除。你可以通过运行 `SELECT` 语句来确认：


    ```

    SELECT *

    FROM employee;

    ID  LAST_NAME   SALARY

    1   JONES       30000

    2   SMITH       35000

    3   KING        45000

    4   SIMPSON     52000

    5   ANDERSON    31000

    6   COOPER      (null)

    7   ADAMS       (null)

    8   SMITH       62000

    9   PATRICK     40000

    ```


    `CASCADE CONSTRAINTS` 是什么意思？如果你尝试从一个有约束应用的表中删除列，比如 `sales_meeting` 表中的 `employee_id`
    列，你会得到一个错误，提示无法删除具有约束的列。如果你想删除该列及其相关约束以避免此错误，可以指定 `CASCADE CONSTRAINTS`。这意味着该列及其所有约束都将被删除。


    ## 示例：重命名表


    我们将要查看的 `ALTER TABLE` 语句的最后一个操作是重命名表。如果表有更合适的名称，或者你需要对软件进行更改而要求表名变更，你可能希望重命名表。


    为此，`ALTER TABLE` 语句如下所示：


    ```

    ALTER TABLE table_name

    RENAME TO new_table_name;

    ```


    假设我们为其创建数据库的公司认定，与客户的会议应该不仅仅代表销售。这意味着我们应该将 `sales_meeting` 表重命名为更具描述性的名称，例如 `customer_meeting`。


    你的 `ALTER TABLE` 语句将是：


    ```

    ALTER TABLE sales_meeting

    RENAME TO customer_meeting;

    ```


    当你运行这条语句时，表名将在数据库中更新。如果你尝试在旧表名上运行 `SELECT` 语句，会得到一个错误，提示表不存在。如果你在新表名上运行 `SELECT`
    语句，你将看到表中的结果。


    ### 使用 DROP TABLE 删除表


    到目前为止，本章你已经学习了如何修改表及其列。还有一件事我们尚未涉及，那就是从数据库中删除表。


    如果你不再需要某个表，你可能希望删除它。删除不使用的表比将其留在数据库中更好，因为删除它们可以节省数据库空间，并且减少其他需要对数据库编写查询的人的困惑。


    从数据库中删除表被称为“删除”（dropping）表。`drop` 一词用于描述从数据库中删除对象的过程，而表是一种对象。


    `DROP TABLE` 语句用于删除表，其形式如下：


    ```

    DROP TABLE table_name;

    ```


    这是一个简短的语句，你唯一需要做的就是添加表名。例如，假设你需要删除 `office` 表。为此，你的语句将是：


    ```

    DROP TABLE office;

    ```


    如果你运行这条语句，该表将从数据库中删除。如果你想重建该表，可以使用前面章节提到的 `CREATE TABLE` 语句。


    ### 注意


    `ALTER TABLE` 和 `DROP TABLE` 都会自动执行 `COMMIT`，这意味着你无法通过运行 `ROLLBACK` 来撤销该语句。

    '
- fmt: '## Summary


    很多对现有表的调整可以通过 `ALTER TABLE` 语句完成，例如添加、删除、丢弃列，以及重命名表。诸如主键和外键之类的约束也可以使用 `ALTER TABLE`
    语句添加到现有表中。使用 `DROP TABLE` 语句可以从数据库中移除表。


    # Part IV Joining Tables


    # 18. Inner Join


    本书前面，我们学习了什么是数据库，以及它相比其他存储数据方式的几个优势。在本章中，我们将学习如何充分利用其中一个优势：能够同时查看来自多个表的数据。


    ## Multiple Tables


    在之前的章节中，我们创建了一个 `employee` 表来存储员工信息。随后，我们创建了一个 `office` 表和一个 `sales_meeting` 表。接着，`sales_meeting`
    表被重命名为 `customer_meeting`。创建另外这两个表有几个原因：


    *   确保数据只存储在一个地方

    *   提高我们存储数据的质量

    *   在修改数据时节省时间


    我们的表如下所示。


    这是 `employee` 表：


    ```

    ID   LAST_NAME    SALARY   JOB_TITLE

    1    JONES        30000    (null)

    2    SMITH        35000    (null)

    3    KING         45000    (null)

    4    SIMPSON      52000    (null)

    5    ANDERSON     31000    (null)

    6    COOPER       (null)   (null)

    7    (null)       (null)   (null)

    8    SMITH        62000    (null)

    9    PATRICK      40000    (null)

    ```


    这是 `office` 表：


    ```

    ID   ADDRESS

    1    123 Smith Street

    2    45 Main Street

    3    10 Collins Road

    ```


    这是 `customer_meeting` 表：


    ```

    ID   EMPLOYEE_ID    COMPANY             MEETING_DATE

    1    5              ABC Construction    10/Aug/2018

    2    2              BW Signage          21/Aug/2018

    ```


    你见过一些 `SELECT` 查询，它们展示 `employee` 表中的所有记录，或 `office` 表中的所有记录，或 `customer_meeting`
    表中的所有记录。如果你想查看一个 `employees` 列表以及与之相关的 `customer_meeting` 记录呢？你可以编写单独的查询来获取这些数据，并使用你的应用程序代码将数据链接在一起。


    然而，让应用程序代码匹配相关记录效率不高，并且可能导致相当多的代码。数据库和 SQL 语言的一个优势是能够处理来自多个表的数据。SQL 中允许你这样做的特性称为
    *join*。


    ## What is a Join?


    Join 是 SQL 的一个特性，允许你在单个查询中查看来自两个或更多表的列。数据库中的数据存储在单独的表中，每个表存储某种特定类型的信息。Join 允许你编写一个从两个或多个表获取信息的查询，并在单个结果集中查看这些列。Join
    常写在 `SELECT` 查询中，但也可以在其他查询（如 `UPDATE`）中完成。


    在 SQL 中，你可以通过在查询中指定一个关键字来添加 join。有几种不同类型的 join，每种都有自己的关键字。我们将在本书后面学习这些 join 类型。现在，我们从一个简单的
    join 开始。


    SQL 中的 join 涉及几个部分：


    *   两个表

    *   一个 JOIN 关键字

    *   指定两个表如何连接的条件


    SQL 如下所示：


    ```sql

    SELECT columns

    FROM table1

    JOIN table2 ON criteria;

    ```


    两个表是 `table1` 和 `table2`，你可以将其替换为要在查询中使用的两个表。`JOIN` 关键字指定你正在为查询连接这两个表。`ON` 关键字让你指定连接条件，即表如何连接。


    ## An Example of a Join


    让我们看一个例子。假设你需要展示 `customer_meeting` 数据，例如会议日期和公司名称，以及参加会议的每个员工的姓名。


    员工姓名在 `employee` 表中，销售会议数据在 `customer_meeting` 表中。你需要编写一个查询来展示来自两个表的数据。


    首先，可以从列开始。让我们展示 `customer_meeting` 表中的所有列：


    ```sql

    SELECT id, employee_id, company, meeting_date

    FROM customer_meeting;

    ```


    你还想看到员工的姓名。让我们添加这一列：


    ```sql

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting;

    ```


    如果你现在运行这个查询，会得到一个错误。你会得到错误，因为 `customer_meeting` 表中没有 `last_name` 列。你需要将 `employee`
    表包含在查询中，这通过 join 来完成。


    ```sql

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee

    ```


    在查询中仅仅指定 `JOIN employee` 是不够的。关键字 `JOIN` 表示我们想要从 `customer_meeting` 和 `employee`
    表获取数据。但是 Oracle 数据库如何知道哪个 `employee` 与哪个 `customer_meeting` 相关？*你* 又如何知道呢？


    这就是外键的作用。在前面的章节中，我们解释了什么是外键并将它们添加到我们的表中。外键是一个表中的列，它引用另一个表中的主键。外键主要用于定义两个表之间的关系，这正是我们现在需要知道的。


    在 `customer_meeting` 表中，有一个名为 `employee_id` 的列。该列引用 `employee` 表中的 `id`。引用 `employee_id`
    列中的数据是我们连接两个表的方式。查询需要说明，如果 `customer_meeting` 的 `employee_id` 列与 `employee` 的
    `id` 列匹配，则记录相关。


    你可以更新查询以包含此条件：


    ```sql

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    “如果 `customer_meeting` 的 `employee_id` 列与 `employee` 的 `id` 列匹配，则记录相关”的条件被写作 `ON
    customer_meeting.employee_id = employee.id`。包含 `JOIN` 关键字的那一行被称为 *join clause*，连接条件总是用一个操作符（如
    “=”）在中间指定两个列。


    这个查询将展示 `customer_meeting` 信息，以及 `employee` 的 `last_name` 列，在同一个结果集中。让我们运行查询。


    ```sql

    ORA-00918: column ambiguously defined

    00918. 00000 -  "column ambiguously defined"

    *Cause:

    *Action:

    Error at Line: 1 Column: 8

    ```


    如果你运行这个查询，你会得到一个关于“列定义不明确”的错误。这是什么意思？它意味着 `SELECT` 子句中提到的 `id` 列可能来自 `customer_meeting`
    表或 `employee` 表，数据库不知道你想要哪一个，因此显示错误。需要哪个列是不明确的，或者说模糊的。


    你可以通过指定列来自哪个表来解决这个错误。你可以在列名前添加表名和一个点：


    ```sql

    SELECT customer_meeting.id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    如果你现在运行查询，应该会得到一些结果：


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    恭喜！你刚刚编写并运行了第一个连接两个表的 SQL 查询！'
  raw: '## Summary


    A lot of adjustments can be made to existing tables using the `ALTER TABLE` statement,
    such as adding, removing, and dropping columns, and renaming the table. Constraints
    such as primary keys and foreign keys can also be added to existing tables using
    the `ALTER TABLE` statement. Tables can be removed from the database with the
    `DROP TABLE` statement.


    # Part IVJoining Tables


    # 18.  Inner Join


    Earlier in this book, we learned what a database was, and that it had several
    advantages over other ways of storing data. In this chapter, we’ll learn how to
    make the most of one of those advantages: the ability to view data from multiple
    tables at once.


    ## Multiple Tables


    In earlier chapters we created an employee table to store information about employees.
    We then created an `office` table and a `sales_meeting` table. The `sales_meeting`
    table was then renamed to `customer_meeting`. There were several reasons for creating
    these other two tables:


    *   Ensure data is only stored in one place


    *   Improve the quality of the data we store


    *   Save time when making changes to the data


    Our tables are shown below.


    This is the `employee` table:


    ```

    ID   LAST_NAME    SALARY   JOB_TITLE

    1    JONES        30000    (null)

    2    SMITH        35000    (null)

    3    KING         45000    (null)

    4    SIMPSON      52000    (null)

    5    ANDERSON     31000    (null)

    6    COOPER       (null)   (null)

    7    (null)       (null)   (null)

    8    SMITH        62000    (null)

    9    PATRICK      40000    (null)

    ```


    This is the `office` table:


    ```

    ID   ADDRESS

    1    123 Smith Street

    2    45 Main Street

    3    10 Collins Road

    ```


    This is the `customer_meeting` table:


    ```

    ID   EMPLOYEE_ID    COMPANY             MEETING_DATE

    1    5              ABC Construction    10/Aug/2018

    2    2              BW Signage          21/Aug/2018

    ```


    You’ve seen some `SELECT` queries that show you all of the records in the `employee`
    table, or all of the records in the `office` table, or all of the records in the
    `customer_meeting` table. What if you want to see a list of `employees` and the
    `customer_meeting` records that they are related to? You could write separate
    queries to get this data and use your application code to link the data together.


    However, having your application code match up related records is not very efficient
    and may result in quite a bit of code. One of the strengths of databases and the
    SQL language is being able to process data from multiple tables. The feature of
    SQL that allows you to do so is called a *join*.


    ## What is a Join?


    A join is a feature of SQL that allows you to view the columns from two or more
    tables in a single query. Data in a database is stored in separate tables, where
    each table stores a certain type of information. A join allows you to write a
    query that gets information from two or more tables and view the columns in a
    single set of results. Joins are often written in `SELECT` queries, but can also
    be done in other queries such as an `UPDATE`.


    In SQL, you can add a join by specifying a keyword in your query. There are several
    different types of joins, each of which has their own keyword. We’ll learn about
    these types of joins later in this book. For now, we’ll start with a simple join.


    A join in SQL involves a few things:


    *   Two tables


    *   A JOIN keyword


    *   Conditions that specify how the two tables are joined


    The SQL looks like this:


    ```

    SELECT columns

    FROM table1

    JOIN table2 ON criteria;

    ```


    The two tables are table1 and table2, for which you can substitute the two tables
    you want to use in your query. The `JOIN` keyword specifies that you are joining
    the two tables together for your query. The `ON` keyword lets you specify the
    criteria, which is how the tables are joined.


    ## An Example of a Join


    Let’s take a look at an example. Let’s say you need to show the `customer_meeting`
    data , such as the meeting date and company name, along with the name of each
    employee who is attending a meeting.


    The employee names are available in the `employee` table, and the sales meeting
    data is in the `customer_meeting` table. You need to write a query to show data
    from two tables.


    First, you can start with the columns. Let’s show all of the columns from the
    `customer_meeting` table:


    ```

    SELECT id, employee_id, company, meeting_date

    FROM customer_meeting;

    ```


    You also want to see the names of the employees. Let’s add in that column:


    ```

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting;

    ```


    If you run this query as it is, you’ll get an error. You’ll get an error because
    there is no `last_name` column in the `customer_meeting` table. You need to include
    the `employee` table in your query, which is done using a join.


    ```

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee

    ```


    You’ll need to do more than just specify `JOIN employee` in the query. The keyword
    JOIN says that we want to get data from the `customer_meeting` and the `employee`
    tables. But how does the Oracle database know which `employee` is related to which
    `customer_meeting`? How do *you* know?


    This is where foreign keys are used. In an earlier chapter, we explained what
    a foreign key was and added them to our tables. A foreign key is a column in one
    table that refers to the primary key in another table. Foreign keys are mainly
    used to define how two tables are related, which is exactly what we need to know
    right now.


    In the `customer_meeting` table, there is a column called `employee_id`. This
    column refers to the `id` in the `employee` table. Referring to the data in the
    `employee_id` column is how we can join the two tables together. The query needs
    to say that the records are related if the `customer_meeting''s employee_id` column
    matches the `employee''s id` column


    You can update your query to include this criterion:


    ```

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    The criterion of “the records are related if the `customer_meeting''s employee_id`
    column matches the `employee''s id column`” is written as `ON customer_meeting.employee_id
    = employee.id`. The line that has the `JOIN` keyword on it is called the *join
    clause*, and the join criteria always specifies two columns with an operator (such
    as “=”) in the middle.


    This query will show the `customer_meeting` information, along with the `last_name`
    column of the `employee`, in the same result set. Let’s run the query.


    ```

    ORA-00918: column ambiguously defined

    00918\. 00000 -  "column ambiguously defined"

    *Cause:

    *Action:

    Error at Line: 1 Column: 8

    ```


    If you run this query, you’ll get an error about a “column ambiguously defined.”
    What does this mean? It means that the `id` column mentioned in the `SELECT` clause
    could come from either the `customer_meeting` table or the `employee` table, and
    the database doesn’t know which one you want, so it displays an error. It’s unclear,
    or ambiguous, which column is needed.


    You can resolve this error by specifying the table that the column comes from.
    You can do this by adding the table name and a period before the column name:


    ```

    SELECT customer_meeting.id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    If you run the query now, you should get some results:


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    Congratulations! You’ve just written and run your first SQL query that joins two
    tables together!'
  trans: '

    ## 摘要


    许多对现有表的调整可以通过 `ALTER TABLE` 语句完成，例如添加、删除、丢弃列，以及重命名表。诸如主键和外键之类的约束也可以使用 `ALTER TABLE`
    语句添加到现有表中。使用 `DROP TABLE` 语句可以从数据库中移除表。


    # 第四部分 连接表


    # 18. 内连接


    在本书前面，我们学习了什么是数据库，以及它相比其他存储数据方式的几个优势。在本章中，我们将学习如何充分利用其中一个优势：能够同时查看来自多个表的数据。


    ## 多表


    在之前的章节中，我们创建了一个 `employee` 表来存储员工信息。随后，我们创建了一个 `office` 表和一个 `sales_meeting` 表。接着，`sales_meeting`
    表被重命名为 `customer_meeting`。创建另外这两个表有几个原因：


    *   确保数据只存储在一个地方

    *   提高我们存储数据的质量

    *   在修改数据时节省时间


    我们的表如下所示。


    这是 `employee` 表：


    ```

    ID   LAST_NAME    SALARY   JOB_TITLE

    1    JONES        30000    (null)

    2    SMITH        35000    (null)

    3    KING         45000    (null)

    4    SIMPSON      52000    (null)

    5    ANDERSON     31000    (null)

    6    COOPER       (null)   (null)

    7    (null)       (null)   (null)

    8    SMITH        62000    (null)

    9    PATRICK      40000    (null)

    ```


    这是 `office` 表：


    ```

    ID   ADDRESS

    1    123 Smith Street

    2    45 Main Street

    3    10 Collins Road

    ```


    这是 `customer_meeting` 表：


    ```

    ID   EMPLOYEE_ID    COMPANY             MEETING_DATE

    1    5              ABC Construction    10/Aug/2018

    2    2              BW Signage          21/Aug/2018

    ```


    你见过一些 `SELECT` 查询，它们展示 `employee` 表中的所有记录，或 `office` 表中的所有记录，或 `customer_meeting`
    表中的所有记录。如果你想查看一个 `employees` 列表以及与之相关的 `customer_meeting` 记录呢？你可以编写单独的查询来获取这些数据，并使用你的应用程序代码将数据链接在一起。


    然而，让应用程序代码匹配相关记录效率不高，并且可能导致相当多的代码。数据库和 SQL 语言的一个优势是能够处理来自多个表的数据。SQL 中允许你这样做的特性称为
    *连接*。


    ## 什么是连接？


    连接是 SQL 的一个特性，允许你在单个查询中查看来自两个或更多表的列。数据库中的数据存储在单独的表中，每个表存储某种特定类型的信息。连接允许你编写一个从两个或多个表获取信息的查询，并在单个结果集中查看这些列。连接常写在
    `SELECT` 查询中，但也可以在其他查询（如 `UPDATE`）中完成。


    在 SQL 中，你可以通过在查询中指定一个关键字来添加连接。有几种不同类型的连接，每种都有自己的关键字。我们将在本书后面学习这些连接类型。现在，我们从一个简单的连接开始。


    SQL 中的连接涉及几个部分：


    *   两个表

    *   一个 JOIN 关键字

    *   指定两个表如何连接的条件


    SQL 如下所示：


    ```sql

    SELECT columns

    FROM table1

    JOIN table2 ON criteria;

    ```


    两个表是 `table1` 和 `table2`，你可以将其替换为要在查询中使用的两个表。`JOIN` 关键字指定你正在为查询连接这两个表。`ON` 关键字让你指定连接条件，即表如何连接。


    ## 连接示例


    让我们看一个例子。假设你需要展示 `customer_meeting` 数据，例如会议日期和公司名称，以及参加会议的每个员工的姓名。


    员工姓名在 `employee` 表中，销售会议数据在 `customer_meeting` 表中。你需要编写一个查询来展示来自两个表的数据。


    首先，可以从列开始。让我们展示 `customer_meeting` 表中的所有列：


    ```sql

    SELECT id, employee_id, company, meeting_date

    FROM customer_meeting;

    ```


    你还想看到员工的姓名。让我们添加这一列：


    ```sql

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting;

    ```


    如果你现在运行这个查询，会得到一个错误。你会得到错误，因为 `customer_meeting` 表中没有 `last_name` 列。你需要将 `employee`
    表包含在查询中，这通过连接来完成。


    ```sql

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee

    ```


    在查询中仅仅指定 `JOIN employee` 是不够的。关键字 `JOIN` 表示我们想要从 `customer_meeting` 和 `employee`
    表获取数据。但是 Oracle 数据库如何知道哪个 `employee` 与哪个 `customer_meeting` 相关？*你* 又如何知道呢？


    这就是外键的作用。在前面的章节中，我们解释了什么是外键并将它们添加到我们的表中。外键是一个表中的列，它引用另一个表中的主键。外键主要用于定义两个表之间的关系，这正是我们现在需要知道的。


    在 `customer_meeting` 表中，有一个名为 `employee_id` 的列。该列引用 `employee` 表中的 `id`。引用 `employee_id`
    列中的数据是我们连接两个表的方式。查询需要说明，如果 `customer_meeting` 的 `employee_id` 列与 `employee` 的
    `id` 列匹配，则记录相关。


    你可以更新查询以包含此条件：


    ```sql

    SELECT id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    “如果 `customer_meeting` 的 `employee_id` 列与 `employee` 的 `id` 列匹配，则记录相关”的条件被写作 `ON
    customer_meeting.employee_id = employee.id`。包含 `JOIN` 关键字的那一行被称为 *连接子句*，连接条件总是用一个操作符（如
    “=”）在中间指定两个列。


    这个查询将展示 `customer_meeting` 信息，以及 `employee` 的 `last_name` 列，在同一个结果集中。让我们运行查询。


    ```sql

    ORA-00918: column ambiguously defined

    00918. 00000 -  "column ambiguously defined"

    *Cause:

    *Action:

    Error at Line: 1 Column: 8

    ```


    如果你运行这个查询，你会得到一个关于“列定义不明确”的错误。这是什么意思？它意味着 `SELECT` 子句中提到的 `id` 列可能来自 `customer_meeting`
    表或 `employee` 表，数据库不知道你想要哪一个，因此显示错误。需要哪个列是不明确的，或者说模糊的。


    你可以通过指定列来自哪个表来解决这个错误。你可以在列名前添加表名和一个点：


    ```sql

    SELECT customer_meeting.id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    如果你现在运行查询，应该会得到一些结果：


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    恭喜！你刚刚编写并运行了第一个连接两个表的 SQL 查询！

