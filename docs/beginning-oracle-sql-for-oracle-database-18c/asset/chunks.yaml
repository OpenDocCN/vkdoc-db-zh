    # Part ISetting Up


    # 1. What is a Database?


    One of the main features of software is that it lets you interact with data in
    a certain way. This could be a grocery list app that lets you add items to a shopping
    list on your phone, a website that lets you write and publish articles, or a customer
    relationship management program where you store information about customers.


    All of these programs let you view information in a certain way, edit this information,
    and then store it somewhere. Without the ability to store this information, the
    software wouldn’t work that well. Imagine having a grocery list app, but when
    you entered the items you needed to buy, the app wouldn’t save and the list disappeared
    when you closed the application. Such an application wouldn’t be very useful!


    Software needs a place to store data. The most common way to store this is in
    a database. A database is a defined structure of files and information that lets
    users and software store, retrieve, and update data in an efficient way.


    Databases are used by grocery list apps, websites for publishing articles, customer
    relationship management systems, and many more types of software. The data that
    is stored in a database is used by the software in many ways, and allows the users
    to view, save, and edit information in the software.


    For example, a grocery list app may store the following information in a database:


    *   The names of each item on your grocery list (the items you need to buy from
    the shop)


    *   A list of categories of items (e.g., vegetables, dairy, spices)


    *   The quantities or amounts of each item you want to buy (e.g., 3 apples, 2
    cups of flour)


    So why is a database used, other than to store information?


    First, it’s efficient. The way that the data is stored in the database makes it
    easy for users and software to read the data, add new data, update or delete existing
    data.


    Databases also let you make updates to a small area of data without impacting
    all of the other data, if required. For example, you can add a new item to your
    grocery list without having to make changes to every other item in the database.


    One consideration of using databases to store data is that they need a “database
    management system.” This is a type of software that lets users or applications
    interact with the file. It allows you to easily enter commands, and the database
    management system takes care of changes to the data and all of the complexity
    involved. Another advantage would be handling multiple users viewing or editing
    the data.


    ## Alternatives to Databases


    A database isn’t the only way to store data. Data can also be stored directly
    in files. An example of this would be a text file. If you open Notepad and create
    a new document, enter some text, and save it, a file is saved onto your computer.
    There is no database created in this example. The file is just saved to your computer.


    Storing your data in a text file is simpler than working with a database, and
    it’s OK if you’re the only one working on the file.


    However, there are problems that may occur with storing data in files when the
    software starts to get used by multiple people or gets larger over time, such
    as ensuring different users’ changes are not overwritten, ensuring data can be
    saved and retrieved quickly, and only updating parts of a file. These problems
    are all addressed if a database is used.


    There are a few different database-related terms I want to explain, to help you
    understand what a database is and how to interact with it.


    ## Tables


    A table is a logical structure for storing related data in a database. Most of
    the data in a database is stored within tables. Databases usually have multiple
    tables, and we’ll be referring to tables a lot throughout this book.


    If you’ve used a spreadsheet program before, such as Microsoft Excel, a table
    can be thought of like a worksheet. Information is stored in a table in a similar
    way that it is stored on a worksheet. You have rows of data that are divided into
    columns.'
