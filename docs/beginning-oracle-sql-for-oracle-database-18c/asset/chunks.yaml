  trans: "\n# 办公室表\n\n让我们来创建 `office` 表。我们希望 `office` 表包含一个 `ID` 和一个 `address`。\n\n\
    我们的 `CREATE TABLE()` 语句将如下所示：\n\n```sql\nCREATE TABLE office (\nid,\naddress\n\
    );\n```\n\n在创建此表之前，我们需要指定数据类型和大小。对于 `ID` 列，这将是一个整数。我们可以使用 `NUMBER` 数据类型，在我们的示例中可以使用大小为\
    \ 5。这将能处理从 0 到 99999 的数字，这对我们来说应该足够了。\n\n对于 `address` 字段，这将是一个文本字段，因为我们希望存储街道号码和街道名称。在我们的示例中可以使用\
    \ 200 个字符，我们将使用 `VARCHAR2`。\n\n我们的 `CREATE TABLE()` 语句看起来将是这样的：\n\n```sql\nCREATE\
    \ TABLE office (\nid NUMBER(5),\naddress VARCHAR2(200)\n);\n```\n\n要运行此语句：\n\n\
    1.  打开 SQL Developer 并创建一个新的 SQL 文件（或使用一个已打开的文件），就像你在前面章节中所做的那样。\n2.  将前面所示的 `CREATE\
    \ TABLE()` 语句输入到 SQL 窗口中，如图 14-2 所示。\n    ![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig2_HTML.jpg](img/471705_1_En_14_Fig2_HTML.jpg)\n\
    \    图 14-2：SQL Developer 中的 `CREATE TABLE()` 语句\n3.  点击工具栏上的“运行语句”按钮（那个大的绿色三角形），就像你之前运行语句时所做的那样。运行\
    \ `CREATE TABLE()` 语句与运行 `SELECT()` 语句的方式相同。\n\n语句运行后，屏幕底部会出现一条消息，告诉你表已成功创建，如图\
    \ 14-3 所示。\n\n![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig3_HTML.jpg](img/471705_1_En_14_Fig3_HTML.jpg)\n\
    图 14-3：表创建成功\n\n如果出现错误消息，可能有几个原因：\n*   表名已被另一个表使用。表名在数据库中必须是唯一的，因此如果你已经创建了这个表，就不能再次创建它。你将在本书后面学习如何删除表。\n\
    *   确保在 `id NUMBER(5)` 语句后面有一个逗号，因为这会让数据库知道你要指定第二个列。如果没有逗号，你会得到一个错误。\n*   确保空格的位置与所示的一致，例如在\
    \ `CREATE` 和 `TABLE` 之间，在列名（`id` 或 `address`）和数据类型（`NUMBER` 或 `VARCHAR2`）之间。\n\
    *   确保 `VARCHAR2` 中没有空格。它是一个单词。\n\n你现在已经成功在数据库中创建了第二个表！让我们再创建一个使用不同数据类型的第三个表。\n\
    \n# 销售会议表\n\n除了存储员工和办公室的信息，我们还想存储员工参加的销售会议信息。这些会议将与特定公司举行，并在某个日期和时间发生。我们想要存储的列有：\n\
    *   参加会议的员工\n*   会议是与哪家公司举行的\n*   会议的日期和时间\n\n对于列的长度，公司名称可以是 200 个字符。日期和时间值不需要长度，因为它是标准格式。我们的员工姓名将与\
    \ `employee` 表相同，为 20 个字符。\n\n我们的 `CREATE TABLE()` 语句将如下所示：\n\n```sql\nCREATE\
    \ TABLE sales_meeting (\nid NUMBER(5),\nemployee VARCHAR2(200),\ncompany VARCHAR2(200),\n\
    meeting_date DATE\n);\n```\n\n在我们运行这个语句之前，有几个你应该了解的概念。\n\n## 主键\n\n你可能已经注意到，到目前为止我们创建的所有表都包含一个名为\
    \ `id` 的列，并且该列的数据类型是 `NUMBER`。使用这个字段的原因是为了让你在查询中能够识别记录。\n\n这是什么意思？好吧，让我们看看我们的\
    \ `employee` 表。\n\n| ID | 姓氏 | 工资 |\n| --- | --- | --- |\n| 1 | JONES | 20000\
    \ |\n| 2 | SMITH | 35000 |\n| 3 | KING | 40000 |\n| 4 | SIMPSON | 52000 |\n| 5\
    \ | ANDERSON | 31000 |\n| 6 | COOPER | (null) |\n| 7 | (null) | (null) |\n| 8\
    \ | SMITH | 62000 |\n| 9 | PATRICK | 40000 |\n\n它有一个 `id` 列和一个 `last_name` 列。假设你想查找员工\
    \ JONES 的所有信息。这很简单，因为你只需查找 `last_name` 为 JONES 的表记录。\n\n但是，如果你需要查找 SMITH 的信息呢？你可以查找\
    \ `last_name` 是 SMITH 的记录，但有两条记录的姓氏是 SMITH。你会用哪一条？他们有相同的 `last_name` 但不同的 `salary`\
    \ 值。他们也可能有不同的 `offices`。需要有一种方法能唯一标识此表中的记录。\n\n这就是 `id` 列的用途。它是一个存储表中 `employee`\
    \ 记录的唯一编号的列。每当数据库或系统需要找到特定记录时，都可以使用这个 `ID`。\n\n同样的概念可以在许多不同的系统中找到：\n*   你的纳税识别号，例如社会安全号码（在美国）或税务档案号（在澳大利亚）\n\
    *   你的电子邮件地址\n*   你登录系统时使用的任何用户名\n*   保险、电话或互联网公司的会员号或账号\n\n使用这种 ID 或唯一标识符很有帮助，因为：\n\
    *   如果你知道这个 ID，总有办法找到你想要的记录。\n*   记录上的任何其他信息都可以更改，只要 ID 相同。例如，人们可以改名，但记录仍然是同一条记录。\n\
    *   易于搜索和关联其他记录（我们将在本书后面详细介绍）。\n\n表中每条记录都有唯一标识符的概念称为 *主键*。表上的主键不仅仅是添加一个 ID 字段。Oracle（以及许多其他数据库）允许你将一个或多个列指定为主键。这意味着：\n\
    *   数据库确保值是唯一的。如果你尝试输入一个已被其他记录使用的值，你会得到一个错误。\n*   数据库将使基于此字段的搜索更容易，我们将在本书后面介绍。\n\
    \n确保表具有主键是良好的数据库设计实践。它可以提高数据质量，防止重复行，并提高表的性能。\n\n当我们编写 `sales_meeting` 表的 `CREATE\
    \ TABLE()` 语句时，我们要求你先不要运行该语句。这是因为我们想向这个表添加“主键”。现在就让我们来添加吧。\n\n要向表添加主键，你可以在列名和数据类型后添加\
    \ `PRIMARY KEY` 这几个词。如下面的语句所示，它位于数据类型之后，逗号之前。在你运行这个创建表的语句之前，还有一个概念需要解释，以及需要对这个语句做的另一个更改。\n\
    \n```sql\nCREATE TABLE sales_meeting (\nid NUMBER(5) PRIMARY KEY,\nemployee VARCHAR2(200),\n\
    company VARCHAR2(200),\nmeeting_date DATE\n);\n```\n"
- fmt: '## Recording the Employee Again


    我们的 `sales_meeting` 表有一个名为 `employee` 的列，用于存储参与 `sales_meeting` 的员工的 `last_name`。假设我们的
    `sales_meeting` 表看起来像这样：


    ```

    ID   EMPLOYEE   COMPANY            MEETING_DATE

    1    ANDERSON   ABC Construction   10 August 2018

    2    SMITH      BW Signage         21 August 2018

    ```


    你可以看到第一条记录是与 ANDERSON 和 ABC Construction 公司的会议。然而，第二条记录是与 SMITH。是哪一个 SMITH 员工？我们有两个叫
    SMITH 的员工。


    如果你尝试在表中存储员工的姓名，这可能会导致几个问题：


    *   如果有两条同名记录，你无法确定它具体关联到哪位员工。

    *   如果你在 `employee` 表中更改了员工的姓氏，你也必须在这里更改。如果你忘记了，那么此表中的记录将与 `employee` 表不匹配。

    *   如果你在此表中添加一个员工姓名，那么你需要确保 `employee` 表中也有相应的记录，否则你对参与销售会议的员工将一无所知。


    这个问题有一个解决方案。这个解决方案的概念称为“外键”。


    ## Foreign Key


    当你创建 `sales_meeting` 表时，你需要存储会议所涉及的员工信息。然而，你并不一定需要存储员工的姓名。你只需要知道是哪位员工即可。这可以通过引用
    `employee` 表中的记录来实现。


    这是我们的 `employee` 表：


    ```

    ID  LAST_NAME   SALARY

    1   JONES       20000

    2   SMITH       35000

    3   KING        40000

    4   SIMPSON     52000

    5   ANDERSON    31000

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    9   PATRICK     40000

    ```


    这是我们的 `sales_meeting` 表：


    ```

    ID  EMPLOYEE   COMPANY            MEETING_DATE

    1   ANDERSON   ABC Construction   10 August 2018

    2   SMITH      BW Signage         21 August 2018

    ```


    与其在 `employee` 列中存储员工的姓氏（例如 ANDERSON, SMITH），你可以存储员工的 ID 号，即主键。这意味着：


    *   我们的 `sales_meeting` 记录将只关联到一位员工，从而避免了两位员工同姓的问题。

    *   总是存在对应的员工记录。你无法存储 ID 为 10 的值，因为没有 ID 为 10 的员工。

    *   如果你更改了 `last_name`，你只需要在一个地方更改。`sales_meeting` 表中的相关记录不包含 `last_name`，因此它们不需要知道这个更改。


    因此，与其在 `sales_meeting` 表中存储 ANDERSON 和 SMITH，不如存储他们的 ID 号：


    ```

    ID   EMPLOYEE   COMPANY            MEETING_DATE

    1    5          ABC Construction   10 August 2018

    2    2          BW Signage         21 August 2018

    ```


    这样你可以看到第一条记录的 `employee` 值为 5，它指向 `employee` 表中 `ID` 为 5 的员工。你还可以看到第二条记录的 `employee`
    值为 2，它指向 `employee` 表中一条 `last_name` 为 SMITH 的记录。这样就清楚它指向的是两条 SMITH 记录中的哪一条。


    使用数据库列来存储另一个表的主键的概念称为 `foreign key`。在此示例中，`sales_meeting` 表中的 `employee` 列就是一个外键。


    就像使用主键一样，外键是一种良好的数据库设计技术，可以避免前面提到的所有问题。我们如何在创建表时指定外键呢？


    目前，我们的 `sales_meeting` 表的 `CREATE TABLE` 语句如下：


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee VARCHAR2(200),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    首先，你需要将 `employee` 列的数据类型从 `VARCHAR2` 改为 `NUMBER` 类型，以匹配 `employee` 表中的 `ID`。你也可以将列名从
    `employee` 改为 `employee_id`，以明确表示它指向 `employee` 表的 `id`。


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee_id NUMBER(5),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    现在，你需要添加一些代码来指定外键。你可以保持语句原样，这样就可以向此表添加 `employee ID`。但是，你想要添加一种称为 `foreign key
    constraint` 的东西，以明确指定它是一个外键，并利用数据库的一些优势。


    `constraint` 是你可以添加到表中的东西，用于指定可添加数据的规则。这意味着你将无法向 `employee_id` 列添加在 `employee`
    表中没有对应记录的数字，从而提高了数据质量。


    我们将在后面的章节中探讨如何添加外键约束，因为每个外键都需要一个对应的主键，而我们尚未向 `employee` 表添加主键。


    创建 `sales_meeting` 表的最终代码如下：


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee_id NUMBER(5),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    你现在可以在 SQL Developer 中运行此查询。表应该会像创建 `office` 表一样被创建。在后面的章节中，我们将学习如何从两个表中获取数据。


    ## Summary


    在 SQL 中创建表可以使用名为 `CREATE TABLE` 的 SQL 命令完成。当你无法访问 SQL Developer，或者将此语句作为更大集合的一部分运行时，使用
    SQL 命令很有帮助。


    主键是你可以应用于列的数据库功能，它确保列值是唯一的并标识表中的行。外键是另一个应用于列的数据库功能，它存储另一个表的主键，并防止重复存储相同的数据。


    ## 15. Adding Data to a Table


    到目前为止，我们一直在使用的数据库有三个表：`employee`、`office` 和 `sales_meeting`。其中只有一个表包含数据：`employee`
    表。向表中添加数据是创建表之后的一个独立步骤。


    在本书前面，当你向 `employee` 表添加数据时，你使用了 SQL Developer 中的菜单选项。你在设置表时和向表中添加更多数据时都这样做过。然而，正如我们了解到创建表可以使用语句一样，添加数据也可以使用
    SQL 语句。


    使用 SQL 语句向表添加数据的原因与使用 `CREATE TABLE` 语句创建表的原因相同：


    *   当你使用不同的 IDE 或无法访问 SQL Developer 时，可以使用它。

    *   它更快。

    *   它可以作为更大步骤集合的一部分使用。


    在 Oracle SQL 中，你可以使用 `INSERT` 语句向表中添加数据。'
  raw: '## Recording the Employee Again


    Our `sales_meeting` table had a column called `employee` , which stores the `last_name`
    of the employee who is involved in the `sales_meeting`. Let’s say our `sales_meeting`
    table would look like this:


    ```

    ID   EMPLOYEE   COMPANY            MEETING_DATE

    1    ANDERSON   ABC Construction   10 August 2018

    2    SMITH      BW Signage         21 August 2018

    ```


    You can see the first record is a meeting with ANDERSON and the company ABC Construction.
    The second record, however, is with SMITH. Which SMITH record? There are two employees
    called SMITH.


    If you try to store the employee’s name in this table, this can cause a few problems:


    *   You can’t tell which employee it actually relates to if there are two records
    with the same name.


    *   If you change the employee’s last name in the employee table, you have to
    change it here as well. If you forget, then the record in this table won’t match
    the employee table.


    *   If you add an employee name to this table, then you’ll need to ensure there
    is a record in the employee table as well, otherwise you know nothing about the
    employee involved in the sales meeting.


    There is a solution to this issue. The solution is a concept called a “foreign
    key.”


    ## Foreign Key


    When you are creating your `sales_meeting` table, you need to store information
    about the employee that the meeting is with. However, you don’t necessarily need
    to store the employee’s name. You just need to know which employee it was with.
    This can be done by referring to the record in the employee table.


    This is the `employee` table:


    ```

    ID  LAST_NAME   SALARY

    1   JONES       20000

    2   SMITH       35000

    3   KING        40000

    4   SIMPSON     52000

    5   ANDERSON    31000

    6   COOPER      (null)

    7   (null)      (null)

    8   SMITH       62000

    9   PATRICK     40000

    ```


    This is our `sales_meeting` table:


    ```

    ID  EMPLOYEE   COMPANY            MEETING_DATE

    1   ANDERSON   ABC Construction   10 August 2018

    2   SMITH      BW Signage         21 August 2018

    ```


    Rather than storing the employee’s last name in the employee column (e.g., ANDERSON,
    SMITH), you can store the ID number of the employee, which is the primary key.
    This means:


    *   Our sales_meeting record will relate to only one employee, so you avoid the
    issue of two employees with the same last_name.


    *   There’s always an employee record that exists. You can’t store the ID of 10
    because there is no employee with an ID of 10.


    *   If you change the last_name, you only change it in one place. The related
    records in the sales_meeting table don’t have the last_name, so they don’t need
    to know about the change.


    So instead of storing ANDERSON and SMITH in the `sales_meeting` table, you would
    store their ID numbers:


    ```

    ID   EMPLOYEE   COMPANY            MEETING_DATE

    1    5          ABC Construction   10 August 2018

    2    2          BW Signage         21 August 2018

    ```


    This way you can see the first record has an `employee` value of 5, which refers
    to the employee `ID` of 5 in the `employee` table. You can also see that the second
    record has an `employee` value of 2, which refers to an `employee` record with
    the `last_name` of SMITH. It’s clear which of the two SMITH records it refers
    to.


    The concept of using a database column to store the primary key of another table
    is called a *foreign key*. In this example, the `employee` column in the `sales_meeting`
    table is a foreign key.


    Just like using a primary key, a foreign key is a good database design technique,
    and avoids all of the issues mentioned earlier. How do we specify a foreign key
    when creating our table?


    Currently, our `CREATE TABLE` statement for the `sales_meeting` table looks like
    this:


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee VARCHAR2(200),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    First, you need to change the data type of the `employee` column from a `VARCHAR2`
    to a `NUMBER` type, so it matches the `ID` in the `employee` table. You can also
    change the name from `employee` to `employee_id`, so it’s clear that it refers
    to the `id` of the `employee` table.


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee_id NUMBER(5),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    Now, you need to add some code to this to specify the foreign key. You can leave
    the statement the way it is, which will allow you to add the `employee ID` into
    this table. However, you want to add something called a *foreign key constraint*
    to actually specify that it is a foreign key and to use a few benefits of the
    database.


    A *constraint* is something you can add to a table to specify rules around the
    data that can be added. This means you won’t be able to add numbers to the `employee_id`
    table that don’t have a record in the `employee` table, which improves the quality
    of your data.


    We’ll look at adding a foreign key constraint in a later chapter, because each
    foreign key needs a corresponding primary key, and we haven’t yet added a primary
    key to the `employee` table.


    The final code for creating the `sales_meeting` table looks like this:


    ```

    CREATE TABLE sales_meeting (

    id NUMBER(5) PRIMARY KEY,

    employee_id NUMBER(5),

    company VARCHAR2(200),

    meeting_date DATE

    );

    ```


    You can now run this query in SQL Developer. The table should be created like
    it was for the office table. In a later chapter we’ll learn how to get data from
    both tables.


    ## Summary


    Creating a table in SQL can be done using an SQL command called `CREATE TABLE`.
    Using the SQL command is helpful when you don’t have access to SQL Developer,
    and if you run this statement as part of a larger set.


    A primary key is a database feature that you can apply to a column, and it ensures
    that the column value is unique and identifies the row in the table. A foreign
    key is another database feature applied to a column, which stores the primary
    key of another table and prevents storing the same data twice.


    # 15. Adding Data to a Table


    The database we have been working on so far has three tables: `employee`, `office`,
    and `sales_meeting`. Only one of these tables has any data in it: the employee
    table. Adding data to a table is a separate step to creating the table.


    Earlier in the book, when you added data to the employee table, you used the menu
    options within SQL Developer. You did this when you set up the table, and when
    you added more data to the table. However, just as we learned that creating a
    table can be done with a statement, adding data can also be done with an SQL statement.


    The reasons for using an SQL statement to add data to a table are the same as
    using the CREATE TABLE statement for creating a table:


    *   You can use it when you are using a different IDE or don’t have access to
    SQL Developer.


    *   It’s faster.


    *   It can be used as part of a larger set of steps.


    In Oracle SQL, you can add data to a table using the INSERT statement.'
