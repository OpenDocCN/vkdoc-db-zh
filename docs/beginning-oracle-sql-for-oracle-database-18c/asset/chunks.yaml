  trans: '

    ## 字符串的连接


    在本章前面，你学习了如何使用符号执行数学运算，例如加法和减法。你可以使用另一个符号对字符串或文本值执行不同的操作：*连接*。


    连接是将两个字符串值连接在一起的过程。这样做通常是因为值存储在不同的列或不同的表中，但你希望将它们显示在同一列中。例如，如果我们的员工表中有一个名为 `first_name`
    的列，你可能希望将 `first_name` 和 `last_name` 连接起来，组成一个完整的姓名。


    如何在 Oracle 中连接字符串？你需要使用两个管道符：`"||"`。将这两个字符放在两个其他字符串之间，结果将是一个组合了它们的单个值。


    例如，你可以使用连接将名称 `"John"` 和名称 `"Smith"` 组合起来：


    ```sql

    SELECT ''John'' || ''Smith''

    FROM dual;

    ```


    结果将是：


    | JOHN&#124;&#124;SMITH |

    | --- |

    | JohnSmith |


    这显示了一个包含组合值的单列。但是，值之间没有空格，因为我们在连接时没有指定。连接不会自动添加空格，所以如果你想要一个空格，就需要手动添加。让我们试试这个查询：


    ```sql

    SELECT ''John '' || ''Smith'' AS full_name

    FROM dual;

    ```


    我还添加了一个列别名，以使结果更易于阅读。结果是：


    | FULL_NAME |

    | --- |

    | John Smith |


    现在显示的值中间有了一个空格。你也可以连接表中的值。假设你需要组合 `employee` 表中的 `last_name` 和 `salary` 值：


    ```sql

    SELECT id,

    last_name || salary

    FROM employee;

    ```


    结果将是：


    | ID | LAST_NAME&#124;&#124;SALARY |

    | --- | --- |

    | 1 | JONES30000 |

    | 2 | SMITH35000 |

    | 3 | KING45000 |

    | 4 | SIMPSON52000 |

    | 5 | ANDERSON31000 |

    | 6 | COOPER |

    | 7 | ADAMS |

    | 8 | SMITH62000 |

    | 9 | PATRICK40000 |


    这个结果集的主要问题是很难读取连接后的值，因为名称直接连到了数字值上。


    如何解决名称直接连到数字上的问题？你可以添加一个空格和一个逗号。这可以通过添加第三个连接值来实现。这意味着你的值将显示 `last_name`，然后是一个逗号和一个空格，接着是薪水。执行此操作的查询是：


    ```sql

    SELECT id,

    last_name || '', '' || salary

    FROM employee;

    ```


    这个查询的结果是：


    | ID | LAST_NAME&#124;&#124;,&#124;&#124;SALARY |

    | --- | --- |

    | 1 | JONES, 30000 |

    | 2 | SMITH, 35000 |

    | 3 | KING, 45000 |

    | 4 | SIMPSON, 52000 |

    | 5 | ANDERSON, 31000 |

    | 6 | COOPER, |

    | 7 | ADAMS, |

    | 8 | SMITH, 62000 |

    | 9 | PATRICK, 40000 |


    这些结果更易于阅读。你添加了一个空格和一个逗号，结果现在位于单列中。如果你需要组合字符串值，或者字符串与数字或日期，都可以使用这种连接技术。


    ## 字符串函数


    Oracle 还提供了一些处理字符串的函数，就像你之前学习处理数字时一样。这类函数有很多，它们允许你对字符串值执行各种操作，例如：


    *   更改大小写（大写和小写）

    *   在其他字符串中查找字符串并提取位置或字符串本身

    *   在字符串的开头或结尾添加或删除字符，例如空格

    *   转换 ASCII 码


    在本节中，你将看到如何使用其中的几个函数。


    ### 更改大小写


    在本节中，你将学习两个用于更改字符串大小写的函数：一个用于转换为大写，一个用于转换为小写。这些函数用于将你的字符串或字符数据转换为一致的格式。


    为什么你希望数据保持一致的格式？也许你允许用户以混合大小写的形式在表单中输入数据，而你希望以相同的方式存储它，以便日后更易于显示和搜索。


    要将字符串值转换为大写，你需要使用 `UPPER` 函数。`UPPER` 函数的语法如下：


    ```sql

    UPPER (input_string)

    ```


    它只接受一个参数，即 `input_string`，也就是你想要转换为大写的字符串。该函数返回相同的大写形式值。


    你可以通过查询 `office` 表来了解此函数的工作原理，因为 `address` 字段包含大写和小写的数据：


    ```sql

    SELECT id,

    address,

    UPPER(address)

    FROM office;

    ```


    这个查询的结果是：


    | ID | ADDRESS | UPPER(ADDRESS) |

    | --- | --- | --- |

    | 1 | 123 Smith Street | 123 SMITH STREET |

    | 2 | 45 Main Street | 45 MAIN STREET |

    | 3 | 10 Collins Road | 10 COLLINS ROAD |


    你可以看到 `id` 列、原始的 `address`，以及应用 `UPPER` 函数后的 `address`。内容读起来一样，但只是转换成了大写形式（`123
    SMITH STREET` 而不是 `123 Smith Street`）。任何已经是大写的字母保持不变，小写字母被转换为大写字母，数字则保持不变。


    你可以使用类似的查询将数据转换为小写。Oracle 的 `LOWER` 函数可以做到这一点，其语法与 `UPPER` 函数类似：


    ```sql

    LOWER (input_string)

    ```


    该函数将所有字符转换为小写字符。对 `office` 表执行此操作的查询如下：


    ```sql

    SELECT id,

    address,

    LOWER(address)

    FROM office;

    ```


    结果是：


    | ID | ADDRESS | LOWER(ADDRESS) |

    | --- | --- | --- |

    | 1 | 123 Smith Street | 123 smith street |

    | 2 | 45 Main Street | 45 main street |

    | 3 | 10 Collins Road | 10 collins road |


    这些结果显示了地址的小写形式。数字和已有的小写字符保持不变，而大写字符被转换为小写。


    ### 检查相同大小写的匹配


    我见过 `UPPER` 和 `LOWER` 函数的一种常见用法是在比较数据或在表中查找数据时。这通常在 `WHERE` 子句中完成。


    为了演示这个例子，你需要向 `employee` 表中插入一条新记录，员工名为“Jones”。


    ```sql

    INSERT INTO employee (id, last_name, salary, office_id)

    VALUES (10, ''Jones'', 42000, 2);

    ```


    当你在表上运行 `SELECT` 语句时，它看起来像这样：


    ```sql

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee;

    ```


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 1 |

    | 2 | SMITH | 35000 | 2 |

    | 3 | KING | 45000 | 2 |

    | 4 | SIMPSON | 52000 | 1 |

    | 5 | ANDERSON | 31000 | (null) |

    | 6 | COOPER | (null) | 1 |

    | 7 | ADAMS | (null) | 3 |

    | 8 | SMITH | 62000 | 3 |

    | 9 | PATRICK | 40000 | 1 |

    | 10 | Jones | 42000 | 2 |


    现在假设你想查找所有名为 `JONES` 的员工。你已经看过一些记录，并了解到 `employee` 的 `last_names` 是以大写形式存储的，所以你的查询是这样的：


    ```sql

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee

    WHERE last_name = ''JONES'';

    ```


    当你运行这个查询时，得到的结果是：


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 1 |


    那么你刚插入的 `Jones` 新记录呢？它不应该也显示出来吗？在这个案例中，Oracle 数据库显示了正确的结果。这是因为 Oracle 中的 `WHERE`
    子句是区分大小写的。这意味着 `"JONES"` 不等于 `"Jones"`，也不等于 `"jones"`。

    '
- fmt: '## Note


    The WHERE clause in Oracle is case sensitive, which means that “JONES,” “Jones,”
    and “jones” are all different values.


    How can you get this query to show both values? You use either the `UPPER` or
    `LOWER` function . Instead of looking for “all records with a `last_name` of JONES,”
    you want to look for “all records where the uppercase version of the `last_name`
    is JONES.” You can also look for “all records where the lowercase version of the
    `last_name` is jones.” They would show the same result.


    The query to do this would be:


    ```

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee

    WHERE UPPER(last_name) = ''JONES'';

    ```


    This will compare the uppercase version of the `last_name` value to the value
    of JONES. The following result will be displayed:


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 20000 | 1 |

    | 10 | Jones | 42000 | 2 |


    Both “Jones” records are displayed: the one with the uppercase value and the one
    with the mixed case value.


    You can get the same result by converting both sides to lowercase:


    ```

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee

    WHERE LOWER(last_name) = ''jones'';

    ```


    Which ones should you use? For me, it’s a personal preference to use `UPPER`.
    It also makes more sense in this situation, as most of the values in the table
    are uppercase. But they will both show the same results.


    ## Getting Part of a String


    Another common operation to perform on a string value is to get a certain part
    of a string. This concept is called a `substring`, as the smaller part of a larger
    string is called a substring. The Oracle function `SUBSTR` will let you extract
    one string from another string. The syntax looks like this:


    ```

    SUBSTR (string, start_position [, length])

    ```


    There are three parameters in this function:


    *   `string`: the string that is being looked in

    *   `start_position`: the starting position of the substring to extract

    *   `length`: the length of the substring to return


    In the preceding syntax, you’ll notice some square brackets “[“ and “]”. These
    indicate that a parameter is optional. You don’t have to specify the `length`
    parameter. This means you can run the function in two ways:


    ```

    SUBSTR (string, start_position)

    SUBSTR (string, start_position, length)

    ```


    If you don’t add the `length` parameter, the default behavior means the rest of
    the string will be returned.


    Let’s see an example on the `office` table. You may want to find the first two
    characters of the `address` field. You can do that using the `SUBSTR` function
    with a starting position of 1 and a length of 2.


    ```

    SELECT id,

    address,

    SUBSTR(address, 1, 2)

    FROM office;

    ```


    This will show the following results:


    | ID | ADDRESS | SUBSTR(ADDRESS,1,2) |

    | --- | --- | --- |

    | 1 | 123 Smith Street | 12 |

    | 2 | 45 Main Street | 45 |

    | 3 | 10 Collins Road | 10 |


    It’s taken the first two characters of the `address` field and displayed those
    in the new column here.


    You can try the same function without the `length` parameter. Let’s say you wanted
    to extract the rest of the `address` starting from the 5th character. Your query
    could look like this:


    ```

    SELECT id,

    address,

    SUBSTR(address, 5)

    FROM office;

    ```


    The results would be:


    | ID | ADDRESS | SUBSTR(ADDRESS,5) |

    | --- | --- | --- |

    | 1 | 123 Smith Street | Smith Street |

    | 2 | 45 Main Street | ain Street |

    | 3 | 10 Collins Road | ollins Road |


    The function has taken the entire string starting with the character in position
    5.


    In Oracle, there are a lot more string functions that let you do a range of transformations
    on strings. These are just a few of them.'
  raw: '### Note


    The WHERE clause in Oracle is case sensitive, which means that “JONES,” “Jones,”
    and “jones” are all different values.


    How can you get this query to show both values? You use either the `UPPER` or
    `LOWER` function . Instead of looking for “all records with a last_name of JONES,”
    you want to look for “all records where the uppercase version of the last_name
    is JONES.” You can also look for “all records where the lowercase version of the
    last_name is jones.” They would show the same result.


    The query to do this would be:


    ```

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee

    WHERE UPPER(last_name) = ''JONES'';

    ```


