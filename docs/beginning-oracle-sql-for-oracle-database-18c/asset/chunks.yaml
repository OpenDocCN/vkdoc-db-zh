  trans: '

    ### 注意


    默认日期格式是在安装 Oracle 数据库时设置的，根据您所在的地理位置，格式可能有所不同。


    让我们再次尝试使用这个新格式的 `INSERT` 语句：


    ```

    INSERT INTO sales_meeting (id, employee_id, company, meeting_date) VALUES (1,
    5, ''ABC Construction'', DATE ''2018-08-10'');

    ```


    如果您在 `SQL Developer` 中运行此语句，您将看到成功的消息“1 row inserted.”。


    您可以通过运行 `SELECT` 语句查看此表中的数据：


    ```

    SELECT *

    FROM sales_meeting;

    ```


    输出结果如下所示。


    | ID | EMPLOYEE | COMPANY | MEETING_DATE |

    | --- | --- | --- | --- |

    | 1 | 5 | ABC Construction | 10/AUG/2018 |


    此处的 `meeting_date` 列是 `DATE` 数据类型。Oracle 会根据您所在的地区和数据库设置，以不同的格式显示此日期。上面显示的格式是“DD/MON/YYYY”，但您的格式也可能是“DD-MON-YYYY”或“MM/DD/YYYY”。


    让我们向此表插入第二条记录，此表在上一章中使用过：


    ```

    INSERT INTO sales_meeting (id, employee_id, company, meeting_date) VALUES (2,
    2, ''BW Signage'', DATE ''2018-08-21'');

    ```


    一旦您运行此语句，该记录就进入表中。您可以再次运行 `SELECT` 查询以查看表中的结果：


    | ID | EMPLOYEE | COMPANY | MEETING_DATE |

    | --- | --- | --- | --- |

    | 1 | 5 | ABC Construction | 10/AUG/2018 |

    | 2 | 2 | BW Signage | 21/AUG/2018 |


    ```

    SELECT *

    FROM sales_meeting;

    ```


    ## 保存和撤销更改


    在更改数据时，有一个相关且有用的数据库概念需要了解。当您在计算机上使用程序时，您对文件进行更改并看到这些更改。然而，在您保存文件之前，这些更改不会永久存储在文件中。如果您不想保存更改，可以在不保存的情况下退出程序。


    Oracle 数据库有一个类似的概念，称为 `COMMIT` 和 `ROLLBACK`。这是 Oracle SQL 中的两个关键字：


    *   `COMMIT` 将您所做的任何更改永久保存到数据库中。这类似于在文字处理器中按下保存按钮。

    *   `ROLLBACK` 将撤销对数据库所做的所有更改。这类似于关闭文字处理器而不保存更改。


    这两个语句适用于自您连接到 Oracle 数据库或自您上次运行这些语句之一以来插入、更新或删除的数据。


    为什么需要知道这个？因为除非您运行这两个命令之一，否则您刚刚使用 `INSERT` 语句插入的数据不会保存在数据库中。如果您退出 `SQL Developer`，会收到一个关于提交更改的警告，但能够在
    `SQL Developer` 中提交是很好的习惯。


    您可以在 `SQL Developer` 中以两种方式执行 `COMMIT` 或 `ROLLBACK`：通过运行语句或单击 `SQL Developer`
    中的按钮。要运行语句，请将命令 `COMMIT;` 输入到 `SQL Developer` 中，如图 15-7 所示。


    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig7_HTML.jpg](img/471705_1_En_15_Fig7_HTML.jpg)

    *图 15-7. COMMIT 命令*


    然后，单击运行按钮。输出面板应显示“Commit completed.”。


    如果您想执行 `ROLLBACK`，请输入命令 `ROLLBACK` 并单击运行按钮。不过目前，您只需要执行 `COMMIT`，而不需要 `ROLLBACK`。


    或者，您可以使用 `SQL Developer` 中的按钮来提交。此按钮是一个带有绿色对勾的灰色圆柱体，在 SQL 窗口中可用，如图 15-8 所示。`ROLLBACK`
    按钮在其旁边。


    ![../images/471705_1_En_15_Chapter/471705_1_En_15_Fig8_HTML.jpg](img/471705_1_En_15_Fig8_HTML.jpg)

    *图 15-8. SQL Developer 中的 COMMIT 按钮*


    因此，一旦您完成向数据库表中插入数据，最好提交数据。如果您退出 `SQL Developer`，会收到询问，但自己提交数据是一个应该养成的好习惯。


    ## 插入数据的最佳实践


    在本章中，您学习了如何向 Oracle 数据库插入数据。在执行此操作时，我可以提供一些“最佳实践”或技巧。


    指定您要插入的列。`INSERT` 语句允许您指定要向其中添加数据的表的列。这是第一组括号内的部分：


    ```

    INSERT INTO table (col1, col2, col3) VALUES (val1, val2, val3)

    ```


    在 SQL 中，此部分是可选的。您实际上不需要指定列即可运行 `INSERT` 语句。如果您不指定它们，值将按照数据库中列定义的顺序插入。这是有风险的，因为不能保证列的顺序保持不变。如果您不指定列，那么您的
    `INSERT` 语句将来可能会失败。在运行 `INSERT` 语句时始终指定列是一个好主意。


    将文本和日期用引号括起来，但数字不需要。您可能会忍不住将所有值都放在引号内，因为文本和日期值需要引号。但是，您不需要将数字放在引号内，最好在指定数字时不加引号，以避免数据库可能进行的任何额外处理。


    记住完成后要 `COMMIT`。这是我们看到的第一个要求您在语句运行后提交数据的语句。如果您运行 `INSERT` 语句后想知道为什么应用程序或其他用户看不到数据，那很可能是因为它尚未提交。


    ## 小结


    Oracle SQL 中的 `INSERT` 语句允许您向表中添加数据。您可以指定表名、列和要添加的值。文本和日期值需要放在单引号内，但数字不需要。


    插入数据后，要使其永久保存到数据库，需要使用 `COMMIT` 命令进行提交。如果您决定不想提交数据，可以运行 `ROLLBACK` 命令来撤销这些更改。


    # 16. 更新和删除数据


    在上一章中，您学习了如何向表中添加数据。SQL 允许您更改表中已有的数据，我们将在本章中学习如何操作。


    为什么要在数据添加后更新它？也许您在运行 `INSERT` 语句时数据出错了，比如名字拼写错误或日期添加错误。或者也许应用程序的一部分进行了更改并需要更新数据。或者应用程序的用户更改了一些数据并希望保存它。这些都将涉及更新数据库中的数据。


    好消息是，您不必删除记录并将其作为新记录插入。SQL 提供了一条命令，允许您对现有数据进行更改。

    '
- fmt: '## The UPDATE Statement


    There’s a statement in SQL called `UPDATE`, which allows you to make changes to
    data that already exists in a table. The `UPDATE` statement works in a similar
    way to the `SELECT` and `INSERT` statements where you specify some keywords and
    some data and run the statement.


    The `UPDATE` statement looks like this:


    ```sql

    UPDATE tablename

    SET col1 = val1 [, col2 = val2…]

    [WHERE condition];

    ```


    There are a few parts to this statement:


    *   First, we start with an `UPDATE` keyword, which lets the database know what
    statement you’re running.

    *   We then specify the table name that contains the data you want to update.
    In Oracle SQL, you can only update one table at a time.

    *   We then have a `SET` keyword, which is where you specify what is being changed.

    *   After the `SET` keyword, we specify combinations of columns and values. This
    includes the column name, an equals sign, and the new value you want to apply
    to that column. You can specify multiple combinations of columns and values if
    you want to update more than one column in the same table.

    *   Finally, we have a `WHERE` clause, which lets you filter the table to only
    the rows you want to update.


    The square brackets represent optional parts of the statement. For the `UPDATE`
    statement, extra columns to update are optional. The `WHERE` clause is also optional.
    This means it’s possible to update every record in the table: either deliberately
    or accidentally!


    ### Note


    In an `UPDATE` statement, the `WHERE` clause is optional. If you don’t want to
    update every record in your table, make sure you add a `WHERE` clause.


    Let’s take a look at some examples of the `UPDATE` statement.


    ## Update to a New Value


    For our first example, we’re going to update the `employee` table. This table
    currently looks like this:


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    (null)      (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    Let’s say that the employee `KING`, with an `id` of 3, has gotten a promotion
    and needs to have their `salary` updated. Their current salary is 40000 and their
    new salary is 45000.


    Our `UPDATE` statement starts like this:


    ```sql

    UPDATE employee

    ```


    We are updating the `employee` table, so we’ve specified it here. Then we need
    to specify what columns and values we are updating:


    ```sql

    UPDATE employee

    SET salary = 45000

    ```


    Now, how does the database know which `salary` we are updating? We need to specify
    a `WHERE` clause. This will include criteria that identify the record. We can
    do this in two ways:


    *   Match on the `id = 3`

    *   Match on the `last_name = ''KING''`


    As we learned in previous chapters, there’s a chance that some data may be duplicated
    (such as two employees with the same `last_name`). For this reason, it’s better
    to use an `id` or primary key column when updating individual records. In this
    example, both conditions will find the same record, but we will use the `id` column
    to get into the habit. So, add this to your query:


    ```sql

    UPDATE employee

    SET salary = 45000

    WHERE id = 3;

    ```


    Our `UPDATE` statement is complete. To run this, enter it into an SQL Developer
    window, just like the other statements we’ve learned so far, and click the Run
    button. You won’t see the changes that were made to the table, but you’ll see
    an output at the bottom of the screen that says “1 row(s) updated.” This means
    the update was successful.


    If you get an error here, ensure that your table name and column names are spelled
    correctly. Many times, I’ve gotten errors in SQL that were caused by me mistyping
    a table name, such as “emplyoee” instead of “employee.”


    You can see the changes that were made by selecting the data from the `employee`
    table:


    ```sql

    SELECT *

    FROM employee;

    ```


    These are the results that are shown:


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        45000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    (null)      (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    ## Checking an Update Statement Before Running It


    When you ran the `UPDATE` statement, there was no way of seeing what data was
    going to be updated before it happened. It might be easy to work out if you’re
    updating a single record using an `id` field, but what if your `WHERE` clause
    is more complicated?


    You can see what data is being updated by the `UPDATE` statement by running a
    `SELECT` statement with the same table and `WHERE` clause before running the `UPDATE`
    statement.


    Look at the example you ran earlier:


    ```sql

    UPDATE employee

    SET salary = 45000

    WHERE id = 3;

    ```


    You can convert this to a `SELECT` query by selecting all columns from the `employee`
    table, using the same `WHERE` clause:


    ```sql

    SELECT *

    FROM employee

    WHERE id = 3;

    ```


    If you run the `SELECT` statement before running the `UPDATE` statement, you can
    see the exact record that will be impacted by the `UPDATE` statement. You don’t
    need to run a `SELECT` statement before running the `UPDATE` statement, but if
    you want to be sure you’re updating the correct records, then it’s a good idea.


    ## Update a NULL Value


    Another reason to update a table is to add a value where a `NULL` value existed
    previously. In our `employee` table, we have a record with an `id` of 7 that had
    no `last_name`. You can run an `UPDATE` statement to add a `last_name` to this
    record. However, instead of finding this value based on the `id`, you’ll find
    it based on the `last_name` being `NULL`.


    Let’s say our `last_name` value is supposed to be “ADAMS”. You can update the
    `employee` table with this statement:


    ```sql

    UPDATE employee

    SET last_name = ''ADAMS''

    WHERE last_name IS NULL;

    ```


    In the `WHERE` clause, you are using `IS NULL` to check for records where the
    `last_name` has a `NULL` value. `NULL` values being checked with an `=` sign won’t
    work in SQL. The `WHERE` clause is also run before the data is updated, so there
    is no issue with this statement looking for a `NULL` value and updating that value
    to something else.


    This table only has one record with a `NULL last_name`. If there was more than
    one record with a `NULL` value, then this query would update all of those records.
    This might not be something you want to do, so it’s good to be sure of your `WHERE`
    clause before you run the query.


    If you run this statement, you should get a message “1 row(s) updated.” You can
    now select the data from this table to check it has been updated:


    ```sql

    SELECT *

    FROM employee;

    ```


    The results of this query are:


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        45000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    ADAMS       (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    You can see that the employee with a `last_name` of `NULL` was updated to “ADAMS”.'
