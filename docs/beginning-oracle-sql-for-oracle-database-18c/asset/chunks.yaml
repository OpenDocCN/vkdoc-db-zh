    \ the path to the file and run it.\n\n### It’s Available on Every Oracle Database\n\
    \nAnother advantage of SQL*Plus is that it comes with every Oracle database. Whether\
    \ you’re running Oracle Express or the full version of Oracle, you’ll have access\
    \ to SQL*Plus and are able to run SQL commands with it.\n\n### You Don’t Always\
    \ Have Access to SQL Developer\n\nWhile SQL Developer is a free application and\
    \ doesn’t require an installation process, you may not be able to use it in your\
    \ workplace. At my first role in the industry, we used a tool called “PL/SQL Developer,”\
    \ which is a paid application similar to SQL Developer. This means we didn’t use\
    \ SQL Developer for our queries, so any habits or techniques with SQL Developer\
    \ that I or my team learned were not able to be used.\n\nAnother situation where\
    \ you may not have access to SQL Developer is on client sites. Some people have\
    \ jobs where they visit different clients quite regularly and are not able to\
    \ install software at the client’s site. This means they will have to use SQL*Plus,\
    \ rather than use SQL Developer.\n\n## How to Start SQL*Plus\n\nTo start SQL*Plus,\
    \ you need to open a command window. These steps will assume you’re running Oracle\
    \ on Windows, but the steps are similar for other operating systems as well. SQL*Plus\
    \ was included with Oracle Express that you installed at the beginning of this\
    \ book.\n\n1.  Open the Command Prompt by clicking Start and typing “cmd”.\n\n\
    \    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig3_HTML.jpg](Images/471705_1_En_27_Fig3_HTML.jpg)\n\
    \n    Figure 27-3\n\n    Running the cmd command\n\n    If you’re on an older\
    \ version of Windows, you may need to click Start then click Run, then type “cmd”.\n\
    \n2.  Press Enter. The command window is now open.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig4_HTML.jpg](Images/471705_1_En_27_Fig4_HTML.jpg)\n\
    \n    Figure 27-4\n\n    The Windows command window\n\n3.  Enter the command sqlplus\
    \ and press Enter.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig5_HTML.jpg](Images/471705_1_En_27_Fig5_HTML.jpg)\n\
    \n    Figure 27-5\n\n    Running sqlplus\n\n4.  Enter your username and press\
    \ Enter. This could be the system username, or the username you set up earlier\
    \ in the book.\n\n5.  Enter your password and press Enter. If you’re using the\
    \ system account, this is the same password you entered when you installed Oracle\
    \ Express and when you set up the connection in SQL Developer earlier in this\
    \ book. If you’re using the user you created, then enter their password here.\n\
    \n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig6_HTML.jpg](Images/471705_1_En_27_Fig6_HTML.jpg)\n\
    \n    Figure 27-6\n\n    Logging in to SQL*Plus\n\nYou are now logged in to SQL*Plus\
    \ and your database.\n\n### Note\n\nYour output will include Oracle version 18c\
    \ (unlike the screenshot here, which mentions version 11).\n\n## Alternative Login\
    \ Syntax\n\nThere are other ways you can enter your username and password when\
    \ logging in to SQL*Plus. These are used as a personal preference or as a quicker\
    \ way of logging in. To use these other methods:\n\n### Login with Two Steps\n\
    \nYou can log in to your database with two steps: specifying the username as a\
    \ parameter when launching sqlplus and entering the password separately.\n\n1.\
    \  Open the command window as explained in the earlier steps.\n\n2.  Enter sqlplus\
    \ username, where username is the name of the user you want to enter, and press\
    \ Enter.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig7_HTML.jpg](Images/471705_1_En_27_Fig7_HTML.jpg)\n\
    \n    Figure 27-7\n\n    Logging in to SQL*Plus in a different way\n\n3.  Enter\
    \ the password for this user, and press Enter.\n\nYou are now logged in to your\
    \ database."
  trans: "\n## 创建索引的最佳实践\n\n关于何时以及如何创建索引，有几点最佳实践我推荐参考：\n\n*   考虑为查询的 `WHERE` 子句中使用的列创建索引（例如，`WHERE`\
    \ last_name = ‘SMITH’）。这将有助于对该列的查找。\n*   考虑为 `JOIN` 中使用的列创建索引，这同样会帮助提升该列的查找性能。\n\
    *   不要为表中的每个列都创建索引，因为这可能会减慢对该表的 `INSERT`、`UPDATE` 和 `DELETE` 查询速度。\n*   考虑为那些具有大量不同唯一值的列创建索引。\n\
    \n本书未涵盖几种不同类型的索引。如果你正在对数据库进行性能调优并考虑索引，了解其他类型的索引会很有用，这样你可以确定什么对你的查询最合适。\n\n了解何时创建索引的一个重要部分是了解你的数据库运行的查询类型，以及表中存储的数据。这通常需要通过与团队成员甚至数据库管理员沟通获得，他们负责数据库服务器的管理，并且通常对数据库性能有深入的了解。\n\
    \n## 总结\n\n数据库中的索引是一种用于提升查询性能的对象。它们在表上创建，并包含一个或多个列。良好的查询性能至关重要，因为它能改善用户体验，无论是在应用程序、夜间批处理作业还是报表系统中。\n\
    \n在用于查询 `WHERE` 子句的列上，或在 `JOIN` 子句中的字段上创建索引是有益的。然而，索引会减慢 `INSERT`、`UPDATE` 和 `DELETE`\
    \ 查询的速度，因此不建议为表中的每一列都创建索引。\n\n# 第六部分 命令行\n\n## 27. 使用命令行\n\n到目前为止，我们一直使用一个名为 `SQL\
    \ Developer` 的应用程序来运行我们的 SQL 查询。在本书开头，你从 Oracle 网站下载了这个软件并用它来运行查询。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig1_HTML.jpg](img/471705_1_En_27_Fig1_HTML.jpg)\n\
    \n图 27-1 Oracle SQL Developer\n\n另一种运行这些查询的方法是使用 `LiveSQL`，这是 Oracle 基于网页的 SQL\
    \ 编辑器。你可以使用在 Oracle 网站上为此工具创建的账户来创建表和运行查询。但是，这仅适用于你在 `LiveSQL` 中创建的表，无法用它来连接你自己计算机上的数据库。\n\
    \n还有第三种运行 SQL 的方法，那就是使用 `命令行`。`命令行` 是指每个操作系统上都有的一个工具，它允许你仅使用文本来运行命令。\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig2_HTML.jpg](img/471705_1_En_27_Fig2_HTML.jpg)\n\
    \n图 27-2 Windows 上的命令行\n\n### 什么是 `SQL*Plus` 以及为何要使用它？\n\n`SQL*Plus` 是 Oracle\
    \ 提供的一个命令行工具。它随 Oracle 快捷版（即你在本书前面下载的版本）以及 Oracle 完整版一起提供。`SQL*Plus` 允许你连接到 Oracle\
    \ 数据库并运行查询。\n\n如果它是一个基于文本的工具，为什么你想使用它而不是像 `SQL Developer` 这样完整的用户界面呢？有几个原因。\n\n\
    **它速度快**\n\n`SQL*Plus` 工具相当快。它是一个小巧但功能强大的工具。与 `SQL Developer` 等 IDE 相比，它的加载和运行速度更快。当然，它的功能较少，也不能点击按钮，但它启动非常快，非常适合运行查询。\n\
    \n和许多软件工具一样，你用得越多，使用效率就越高。过一段时间后，你会开始更熟练地使用 `SQL*Plus`。许多软件开发人员在开发工作中更喜欢使用 `vim`\
    \ 和 `emacs` 这样的基于文本的编辑器，原因就是：速度快。\n\n**易于运行脚本**\n\n脚本是包含一组 SQL 语句的文件。在 `SQL*Plus`\
    \ 中运行它们非常容易。在 `SQL Developer` 中，你需要浏览计算机上的目录来打开文件。而在 `SQL*Plus` 中，你可以复制粘贴或输入文件路径来运行它。\n\
    \n**每个 Oracle 数据库都可用**\n\n`SQL*Plus` 的另一个优点是它随每个 Oracle 数据库一起提供。无论你运行的是 Oracle\
    \ 快捷版还是完整版，你都可以使用 `SQL*Plus` 并用它来执行 SQL 命令。\n\n**你并非总能访问 `SQL Developer`**\n\n\
    虽然 `SQL Developer` 是一个免费应用程序且无需安装过程，但在你的工作场所你可能无法使用它。在我进入这个行业的第一份工作中，我们使用一个名为“PL/SQL\
    \ Developer”的工具，这是一个与 `SQL Developer` 类似的付费应用程序。这意味着我们没有使用 `SQL Developer` 来运行查询，因此我和我的团队所养成的任何与\
    \ `SQL Developer` 相关的习惯或技巧都无法使用。\n\n你可能无法访问 `SQL Developer` 的另一种情况是在客户现场。有些人的工作需要经常拜访不同的客户，无法在客户的站点安装软件。这意味着他们将不得不使用\
    \ `SQL*Plus`，而不是 `SQL Developer`。\n\n### 如何启动 `SQL*Plus`\n\n要启动 `SQL*Plus`，你需要打开一个命令窗口。这些步骤将假设你在\
    \ Windows 上运行 Oracle，但对于其他操作系统，步骤也类似。`SQL*Plus` 随你在本书开头安装的 Oracle Express 一起提供。\n\
    \n1.  点击“开始”菜单，输入“`cmd`”，打开命令提示符。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig3_HTML.jpg](img/471705_1_En_27_Fig3_HTML.jpg)\n\
    \n    图 27-3 运行 `cmd` 命令\n\n    如果你使用的是旧版 Windows，可能需要点击“开始”，然后点击“运行”，再输入“`cmd`”。\n\
    \n2.  按回车键。命令窗口现已打开。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig4_HTML.jpg](img/471705_1_En_27_Fig4_HTML.jpg)\n\
    \n    图 27-4 Windows 命令窗口\n\n3.  输入命令 `sqlplus` 并按回车键。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig5_HTML.jpg](img/471705_1_En_27_Fig5_HTML.jpg)\n\
    \n    图 27-5 运行 `sqlplus`\n\n4.  输入你的 `用户名` 并按回车键。这可以是 `system` 用户名，或者是你在本书前面设置的\
    \ `用户名`。\n5.  输入你的 `密码` 并按回车键。如果你使用的是 `system` 账户，这就是你在安装 Oracle Express 时以及在本书前面设置\
    \ `SQL Developer` 连接时输入的同一个 `密码`。如果你使用的是你创建的用户，则在此输入他们的 `密码`。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig6_HTML.jpg](img/471705_1_En_27_Fig6_HTML.jpg)\n\
    \n    图 27-6 登录到 `SQL*Plus`\n\n你现在已登录到 `SQL*Plus` 和你的数据库。\n\n**注意**\n\n你的输出将包含\
    \ Oracle 18c 版本（与此处截图中提到的 11 版不同）。\n\n### 其他登录语法\n\n在登录 `SQL*Plus` 时，还有其他方式可以输入你的\
    \ `用户名` 和 `密码`。这些方法用于个人偏好或作为更快的登录方式。要使用这些其他方法：\n\n**两步登录法**\n\n你可以分两步登录到你的数据库：在启动\
    \ `sqlplus` 时将 `用户名` 作为参数指定，然后单独输入 `密码`。\n\n1.  按照前面步骤所述打开命令窗口。\n2.  输入 `sqlplus\
    \ 用户名`，其中 `用户名` 是你要登录的用户的名字，然后按回车键。\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig7_HTML.jpg](img/471705_1_En_27_Fig7_HTML.jpg)\n\
    \n    图 27-7 以不同方式登录 `SQL*Plus`\n3.  输入此用户的 `密码`，然后按回车键。\n\n你现在已登录到你的数据库。\n"
- fmt: "### Log in with One Step\n\nYou can also log in to your database in one step,\
    \ where you specify the username and password as parameters to the `sqlplus` command.\n\
    \n1.  Open the command window as explained in the earlier steps.\n2.  Enter `sqlplus\
    \ username password`, where `username` is the name of the user you want to enter\
    \ and the `password` is that account’s password, and press Enter.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig8_HTML.jpg](Images/471705_1_En_27_Fig8_HTML.jpg)\n\
    \n    Figure 27-8\n\n    Logging in to SQL*Plus in a different way\n\nYou are\
    \ now logged in to your database.\n\n## Running a Query in SQL*Plus\n\nTo run\
    \ a query in SQL*Plus, simply type the query at the prompt after logging in. For\
    \ example, to select all records from the `employee` table, enter this query:\n\
    \n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig9_HTML.jpg](Images/471705_1_En_27_Fig9_HTML.jpg)\n\
    \nFigure 27-9\n\nA SELECT query in SQL*Plus\n\n```sql\nSELECT id, last_name, salary\n\
    FROM employee;\n```\n\nYou can press Enter while writing a query to go to a new\
    \ line. The query is not run until you enter a semicolon and press Enter. This\
    \ means you can add new lines whenever you like, such as for each SQL keyword\
    \ or for each column.\n\nOnce you have entered the semicolon after this query,\
    \ press Enter. The results of the query are shown.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig10_HTML.jpg](Images/471705_1_En_27_Fig10_HTML.jpg)\n\
    \nFigure 27-10\n\nRunning a SELECT query\n\nYou can cycle through previous queries\
    \ by pressing the Up and Down arrows at the prompt. This makes it easy to view\
    \ the recent queries and make changes to it. If you press Up at an empty prompt,\
    \ it will display the last query.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig11_HTML.jpg](Images/471705_1_En_27_Fig11_HTML.jpg)\n\
    \nFigure 27-11\n\nRecent SQL statements\n\nSQL*Plus also gives you a cursor in\
    \ your query. You can move the cursor using the arrow keys, and make edits to\
    \ the query before running it. For example, you can add an `ORDER BY` to this\
    \ query by moving the cursor to the end of the query and typing `ORDER BY last_name\
    \ ASC;`\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig12_HTML.jpg](Images/471705_1_En_27_Fig12_HTML.jpg)\n\
    \nFigure 27-12\n\nMaking changes to an SQL query\n\nPress Enter to run the query,\
    \ and the results are shown.\n\n## Formatting Output in SQL*Plus\n\nYou’ve probably\
    \ noticed when running these queries in SQL*Plus that the output doesn’t look\
    \ very neat. This is because each column’s width is sized according to the potential\
    \ number of characters in the column, not the actual number of characters, unlike\
    \ SQL Developer. This means you’ll get a lot of blank spaces in columns and rows\
    \ spread over multiple lines.\n\nFor example, running our `SELECT` query on the\
    \ `employee` table looks like this:\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig13_HTML.jpg](Images/471705_1_En_27_Fig13_HTML.jpg)\n\
    \nFigure 27-13\n\nThe output of a SELECT query\n\n```sql\nSELECT id, last_name,\
    \ salary\nFROM employee;\n```\n\nHowever, it’s possible to clean this up to make\
    \ it more readable. We can run commands to format the columns in SQL*Plus. The\
    \ syntax for this command looks like this:\n\n```sql\ncolumn column_name format\
    \ value;\n```\n\nAn example of this command would be:\n\n```sql\ncolumn last_name\
    \ format a10;\n```\n\nThis specifies that the `last_name` column should be formatted\
    \ as an alphanumeric field with a width of 10 characters. We run this command\
    \ before our SQL query.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig14_HTML.jpg](Images/471705_1_En_27_Fig14_HTML.jpg)\n\
    \nFigure 27-14\n\nFormatting columns\n\nThen, you can run the SQL query again.\
    \ Press Up a few times to load the query again and press Enter.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig15_HTML.jpg](Images/471705_1_En_27_Fig15_HTML.jpg)\n\
    \nFigure 27-15\n\nFormatted output from a SELECT statement\n\nThe output is a\
    \ lot neater now. If it’s still too narrow, you can rerun that command with a\
    \ larger number (for example, `column last_name format a40`), then rerun the `SELECT`\
    \ query.\n\n## Copy and Paste into SQL*Plus\n\nSQL*Plus lets you enter queries\
    \ and run them. However, you personally might find it easier to write queries\
    \ in a text editor and copy and paste them into the command line. This is something\
    \ you can do in SQL*Plus. To do this:\n\n1.  Enter your query into a text editor,\
    \ such as Notepad++ or Sublime Text.\n2.  Copy your query from the text editor.\n\
    3.  Open SQL*Plus, right click at your prompt, and select Paste. The query will\
    \ now be shown in SQL*Plus.\n4.  Run the query by pressing Enter.\n\nThe query\
    \ results will then be displayed.\n\n## The Forward Slash Character\n\nSometimes\
    \ when looking at SQL code you might see the forward slash character “/” at the\
    \ end of a statement:\n\n```sql\nSELECT id, last_name, salary, office_id\nFROM\
    \ employee\n/\n```\n\nYou’ll see these kinds of examples on websites, or in scripts\
    \ that your current or future employers would use. What does this mean, and why\
    \ do you need it if you have a semicolon?\n\nIn SQL*Plus, the semicolon character\
    \ will ensure the most recent statement is run. The slash character will run whatever\
    \ is in the buffer, which can include more than one statement. If you enter the\
    \ preceding query into SQL*Plus, which has a slash at the end rather than a semicolon,\
    \ and run the query, you’ll get the same results.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig16_HTML.jpg](Images/471705_1_En_27_Fig16_HTML.jpg)\n\
    \nFigure 27-16\n\nThe query results\n\nYou’ll often see the slash character in\
    \ scripts that have more than one statement in them. This means all statements\
    \ are run at the same time, rather than stopping between statements.\n\n## Exiting\
    \ SQL*Plus\n\nIf you want to exit SQL*Plus at any time, you can type the command\
    \ `exit` at the `sqlplus` prompt.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig17_HTML.jpg](Images/471705_1_En_27_Fig17_HTML.jpg)\n\
    \nFigure 27-17\n\nUsing the exit command to leave SQL*Plus\n\nPress Enter, and\
    \ `sqlplus` will exit. You will be returned to the command prompt.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig18_HTML.jpg](Images/471705_1_En_27_Fig18_HTML.jpg)\n\
    \nFigure 27-18\n\nUsing the exit command to leave the command prompt\n\nYou can\
    \ then type `exit` again and press Enter, and the command prompt will exit.\n\n\
    ## What About SQLcl?\n\nSQL*Plus has been around since the mid-1980s, which is\
    \ a long time in the world of software. The features have remained pretty standard\
    \ for most of this time. Recently, Oracle has released a new free command line\
    \ tool, called “SQLcl,” which is short for SQL Command Line. This is a command\
    \ line tool, similar in operation to SQL*Plus, but with a lot more features. SQLcl\
    \ allows you to:\n\n*   Interact with the database (run SQL queries)\n*   Run\
    \ batch scripts\n*   Edit SQL code\n*   Statement completion\n*   .. and much\
    \ more\n\nHowever, unlike SQL*Plus, SQLcl does not come with Oracle databases\
    \ automatically. You can easily download it from the Oracle website though."
