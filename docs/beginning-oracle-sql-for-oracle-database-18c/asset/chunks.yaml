    FROM employee

    WHERE office_id = 2;

    ```


    These three records were used in the `AVG` function, and the average of the `salary`
    values is 40,666.


    ## The MIN Function


    `MIN` is another aggregate function, and it’s used to find the minimum or lowest
    value in a list of values. It’s used with number values, just like `AVG` and `SUM`,
    and it ignores any `NULL` values.


    To use the `MIN` function, follow this syntax:


    ```sql

    MIN (expression)

    ```


    The expression here refers to the values to use to calculate the minimum. Most
    often this will be a column in a table. Let’s see some examples of the `MIN` function.


    ### Minimum of All Records


    You can write a simple query that uses `MIN` to find the minimum value of all
    records. For example, to find the minimum `salary`, your query could look like
    this:


    ```sql

    SELECT MIN(salary)

    FROM employee;

    ```


    The results of this query are:


    | MIN(SALARY) |

    | --- |

    | 30000 |


    This shows that the minimum or smallest `salary` is 30000. You can see how this
    is the case by looking at all `salary` values in the table.


    | ID | SALARY |

    | --- | --- |

    | 1 | 30000 |

    | 2 | 35000 |

    | 3 | 45000 |

    | 4 | 52000 |

    | 5 | 31000 |

    | 6 | (null) |

    | 7 | (null) |

    | 8 | 62000 |

    | 9 | 40000 |

    | 10 | 42000 |


    ```sql

    SELECT id, salary

    FROM employee;

    ```


    You could order this query by the `salary` column to make it easier to look for
    the lowest value.


    | ID | SALARY |

    | --- | --- |

    | 1 | 30000 |

    | 5 | 31000 |

    | 2 | 35000 |

    | 9 | 40000 |

    | 10 | 42000 |

    | 3 | 45000 |

    | 4 | 52000 |

    | 8 | 62000 |

    | 6 | (null) |

    | 7 | (null) |


    ```sql

    SELECT id, salary

    FROM employee

    ORDER BY salary ASC;

    ```


    Now you can see that the lowest `salary` is 30000. `NULL` values are ignored,
    as they represent unknown values, which is different to zero.


    ### Minimum with WHERE


    Just like the previous functions, you can use the `MIN` function in a query with
    a `WHERE` clause. Let’s say you wanted to find the minimum `salary` of all `employees`
    that are in `office_id` 3. To do this, your query would look like this:


    ```sql

    SELECT MIN(salary)

    FROM employee

    WHERE office_id = 3;

    ```


    The results are:


    | MIN(SALARY) |

    | --- |

    | 62000 |


    This is the minimum value because there are only two employees with an `office_id`
    of 3, and one of them has a `salary` value of `NULL`.


    ## The MAX Function


    The final aggregate function you’ll learn about is the `MAX` function. This function
    will find the maximum or highest value in a set of values. It’s the opposite of
    the `MIN` function. To use this function, follow this syntax:


    ```sql

    MAX (expression)

    ```


    The expression here refers to the values to use to calculate the maximum. Most
    often this will be a column in a table. Let’s see some examples of the `MAX` function.


    ### Maximum of All Records


    You can use the `MAX` function to find the highest value for a column in a table,
    just like you used the `MIN` function to find the smallest. A query to do this
    would look like this:


    ```sql

    SELECT MAX(salary)

    FROM employee;

    ```


    This will show the following result:


    | MAX(SALARY) |

    | --- |

    | 62000 |


    This shows the highest `salary` in the table, which is 62,000. You can confirm
    this by selecting all `salary` values from the table and ordering by `salary`
    in descending order:


    | ID | SALARY |

    | --- | --- |

    | 8 | 62000 |

    | 4 | 52000 |

    | 10 | 42000 |

    | 3 | 45000 |

    | 9 | 40000 |

    | 2 | 35000 |

    | 5 | 31000 |

    | 1 | 30000 |

    | 6 | (null) |

    | 7 | (null) |


    ```sql

    SELECT id, salary

    FROM employee

    ORDER BY salary DESC NULLS LAST;

    ```


    Just like with all other functions in this chapter, the `NULL` values are ignored.


    ### Maximum with WHERE


    You can also use the `MAX` function when using a `WHERE` clause in your query.
    The `MAX` function will be used on all values in rows that match the `WHERE` clause.


    For example, to find the maximum `salary` for all `employees` in office 1 or 2,
    the following query can be used:


    ```sql

    SELECT MAX(salary)

    FROM employee

    WHERE office_id IN (1, 2);

    ```


    The results are:


    | MAX(SALARY) |

    | --- |

    | 52000 |


    This is the highest `salary` for employees in either office 1 or 2.'
