  trans: '

    ## UPDATE 语句


    SQL 中有一种叫做 `UPDATE` 的语句，它允许你更改表中已有的数据。`UPDATE` 语句的工作方式与 `SELECT` 和 `INSERT` 语句类似，你需要指定一些关键字和数据，然后运行该语句。


    `UPDATE` 语句的格式如下所示：


    ```sql

    UPDATE tablename

    SET col1 = val1 [, col2 = val2…]

    [WHERE condition];

    ```


    该语句包含几个部分：


    *   首先，我们以 `UPDATE` 关键字开头，这告诉数据库你正在运行什么语句。

    *   然后，我们指定包含要更新数据的表名。在 Oracle SQL 中，一次只能更新一个表。

    *   接着是 `SET` 关键字，你在这里指定要更改的内容。

    *   在 `SET` 关键字之后，我们指定列和值的组合。这包括列名、一个等号以及你想要应用于该列的新值。如果你想在同一张表中更新多个列，可以指定多个列和值的组合。

    *   最后，我们有一个 `WHERE` 子句，它让你能够筛选表，只更新你想要的行。


    方括号代表语句的可选部分。对于 `UPDATE` 语句，要更新的额外列是可选的。`WHERE` 子句也是可选的。这意味着有可能更新表中的每条记录——无论是有意还是无意的！


    ### 注意


    在 `UPDATE` 语句中，`WHERE` 子句是可选的。如果你不想更新表中的每条记录，请确保添加 `WHERE` 子句。


    让我们看一些 `UPDATE` 语句的示例。


    ## 更新为新值


    在我们的第一个示例中，我们将更新 `employee` 表。该表目前如下所示：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    (null)      (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    假设员工 `KING`（`id` 为 3）获得了晋升，需要更新其 `salary`。他们当前的薪水是 40000，新薪水是 45000。


    我们的 `UPDATE` 语句开头如下：


    ```sql

    UPDATE employee

    ```


    我们正在更新 `employee` 表，因此在此处指定了它。然后我们需要指定要更新的列和值：


    ```sql

    UPDATE employee

    SET salary = 45000

    ```


    现在，数据库如何知道我们正在更新哪个 `salary`？我们需要指定一个 `WHERE` 子句。这将包含识别该记录的条件。我们可以通过两种方式实现：


    *   匹配 `id = 3`

    *   匹配 `last_name = ''KING''`


    正如我们在前面章节中学到的，某些数据可能会重复（例如两个员工有相同的 `last_name`）。因此，在更新单个记录时，最好使用 `id` 或主键列。在这个例子中，两个条件都会找到相同的记录，但我们将使用
    `id` 列来养成好习惯。所以，将此添加到你的查询中：


    ```sql

    UPDATE employee

    SET salary = 45000

    WHERE id = 3;

    ```


    我们的 `UPDATE` 语句完成了。要运行它，就像我们到目前为止学到的其他语句一样，将其输入到 SQL Developer 窗口中，然后单击“运行”按钮。你不会看到对表所做的更改，但会在屏幕底部看到一条输出，显示“1
    row(s) updated.”，这意味着更新成功。


    如果你在这里出错，请确保你的表名和列名拼写正确。很多时候，我在 SQL 中遇到的错误都是由于我将表名打错造成的，例如将“employee”打成“emplyoee”。


    你可以通过从 `employee` 表中选择数据来查看所做的更改：


    ```sql

    SELECT *

    FROM employee;

    ```


    显示的结果如下：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        45000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    (null)      (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    ## 在运行前检查更新语句


    当你运行 `UPDATE` 语句时，在更改发生之前无法看到哪些数据将被更新。如果你使用 `id` 字段更新单个记录，可能很容易弄清楚，但如果你的 `WHERE`
    子句更复杂呢？


    你可以通过在运行 `UPDATE` 语句之前，使用相同的表和 `WHERE` 子句运行一个 `SELECT` 语句，来查看 `UPDATE` 语句将更新哪些数据。


    看前面运行过的例子：


    ```sql

    UPDATE employee

    SET salary = 45000

    WHERE id = 3;

    ```


    你可以通过从 `employee` 表中选择所有列，并使用相同的 `WHERE` 子句，将其转换为 `SELECT` 查询：


    ```sql

    SELECT *

    FROM employee

    WHERE id = 3;

    ```


    如果你在运行 `UPDATE` 语句之前运行 `SELECT` 语句，你就可以看到将被 `UPDATE` 语句影响的确切记录。在运行 `UPDATE` 语句之前运行
    `SELECT` 语句不是必须的，但如果你想确保更新的是正确的记录，这是个好主意。


    ## 更新 NULL 值


    更新表的另一个原因是在之前存在 `NULL` 值的地方添加一个值。在我们的 `employee` 表中，有一条 `id` 为 7 的记录没有 `last_name`。你可以运行一条
    `UPDATE` 语句来为该记录添加 `last_name`。不过，这次不是基于 `id` 查找该值，而是基于 `last_name` 为 `NULL` 来查找。


    假设我们的 `last_name` 值应为“ADAMS”。你可以用这条语句更新 `employee` 表：


    ```sql

    UPDATE employee

    SET last_name = ''ADAMS''

    WHERE last_name IS NULL;

    ```


    在 `WHERE` 子句中，你使用 `IS NULL` 来检查 `last_name` 具有 `NULL` 值的记录。在 SQL 中，使用 `=` 号检查
    `NULL` 值是无效的。`WHERE` 子句也在数据更新前运行，所以这条语句查找 `NULL` 值并将其更新为其他值没有问题。


    这张表只有一条记录的 `last_name` 为 `NULL`。如果有不止一条记录具有 `NULL` 值，那么这个查询将更新所有这些记录。这可能不是你想要的操作，所以在运行查询前确认你的
    `WHERE` 子句是个好习惯。


    如果你运行这条语句，应该会收到一条消息“1 row(s) updated.”。你现在可以从此表中选择数据来检查是否已更新：


    ```sql

    SELECT *

    FROM employee;

    ```


    该查询的结果是：


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        45000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    ADAMS       (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    你可以看到，`last_name` 为 `NULL` 的员工已被更新为“ADAMS”。

    '
- fmt: '## 基于现有值更新


    有时，您可能希望根据表中已有的数据来更新数据。我们将看一个例子：将薪水增加一定数额。


    假设员工 JONES（`id = 1`）表现出色，获得了 10000 的加薪。我们可以通过两种方式来更新此数据：


    *   运行一个查询来查找当前薪水，编写一个查询将当前薪水更新为比现有值多 10000，然后运行该查询。

    *   或者，编写一个查询，将当前薪水更新为增加 10000，并运行该查询。


    第二种方法更可取。我们不需要运行两个单独的查询。我们可以运行一个查询来完成此操作。我们的 `UPDATE` 查询如下所示：


    ```

    UPDATE employee

    SET salary = salary + 10000

    WHERE id = 1;

    ```


    此查询与之前的查询类似。然而，在 `SET` 子句中，它写着 `SET salary = salary + 10000`。这意味着“将薪水设置为当前薪水值加上
    10000。” 它允许您在不知道现有值的情况下增加该值。


    如果您运行此查询，您将看到熟悉的“1 row(s) updated.”消息。您可以从表中 `SELECT` 来查看数据现在的样子。


    ```

    SELECT *

    FROM employee;

    ```


    此查询的结果是：


    ```

    ID   LAST_NAME   SALARY

    1    JONES       30000

    2    SMITH       35000

    3    KING        45000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    ADAMS       (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    您可以看到 JONES 的 `salary` 现在是 30000，比原来的 20000 多了 10000。


    ## 更新日期值


    使用日期值编写和运行 `UPDATE` 语句类似于更新文本或数值。您应该使用我们在上一章关于插入数据中学到的日期字面量。


    这是前一章中的 `sales_meeting` 表：


    ```

    ID   EMPLOYEE_ID   COMPANY           MEETING_DATE

    1    5             ABC Construction  10/AUG/2018

    2    2             BW Signage        21/AUG/2018

    ```


    假设与 BW Signage 的会议日期需要从 8 月 21 日更新到 8 月 25 日。您可以使用 `UPDATE` 语句来完成此操作：


    ```

    UPDATE sales_meeting

    SET meeting_date = DATE ''2018-08-25''

    WHERE id = 2;

    ```


    在此 `WHERE` 子句中，您可以用几种方式编写：


    *   公司 = BW Signage，但可能还有其他我们不希望更改的与同一家公司的会议。

    *   会议日期 = 2018年8月21日，但也可能有其他会议在同一天。


    您应该使用 `id = 2`，因为这是保证这是您想要更新的唯一记录的唯一方法。如果您运行此查询，您将收到关于 1 行被更新的消息。要查看更改，请运行 `SELECT`
    语句：


    ```

    SELECT *

    FROM sales_meeting;

    ```


    结果是：


    ```

    ID   EMPLOYEE_ID   COMPANY           MEETING_DATE

    1    5             ABC Construction  10/AUG/2018

    2    2             BW Signage        25/AUG/2018

    ```


    您可以看到数据已使用正确的日期更新。日期格式取决于您的位置，但可以更改。


    ## 查看和更新日期格式


    Oracle 数据库以某种方式显示日期格式，具体取决于安装数据库时指定的位置。您可以通过查看数据库的参数来查看格式设置为什么，以及更改它。这些参数存储在名为
    `nls_session_parameters` 的表中：


    ```

    SELECT * FROM nls_session_parameters

    WHERE parameter = ''NLS_DATE_FORMAT'';

    ```


    您的输出将类似于：


    ```

    PARAMETER         VALUE

    NLS_DATE_FORMAT   DD/MON/RRRR

    ```


    `value` 列指定日期的显示格式。在此示例中，“DD” 代表两位数的日，“MON” 是三位数的月，“RRRR” 是四位数的年。如果您运行此查询，可能会得到不同的值，例如
    “DD-MON-RRRR” 或 “MM-DD-RRRR。”


    您可以通过使用 `ALTER SESSION` 命令将日期格式更新为您喜欢的格式。只需将此命令中的日期格式更改为您喜欢的格式，然后运行它：


    ```

    ALTER SESSION SET NLS_DATE_FORMAT = ''YYYY/MM/DD'';

    ```


    这将把格式更新为以年/月/日格式显示日期，例如 2018 年 8 月 25 日显示为 2018/08/25。


    ## 更新两个列


    SQL 中的 `UPDATE` 语句允许您更新多个列。可能会有需要这样做的情形，例如在开发应用程序时，网页上的多个字段可以被更改。


    为此，请将您的第二个及后续列添加到 `SET` 子句中，并用逗号分隔。所有更新都将应用于匹配 `WHERE` 子句的行。例如，要更新 `sales_meeting`
    表以更改与 BW Signage 会议的员工和日期，您可以运行此查询：


    ```

    UPDATE sales_meeting

    SET employee_id = 6, meeting_date = DATE ''2018-08-22''

    WHERE id = 2;

    ```


    当您运行此语句时，您将看到有一行被更新。它不会告诉您更新了多少列。但是，就像前面的示例一样，您可以运行 `SELECT` 语句来查看更改。


    ```

    SELECT *

    FROM sales_meeting;

    ID   EMPLOYEE_ID   COMPANY            MEETING_DATE

    1    5             ABC Construction   10/AUG/2018

    2    6             BW Signage         22/AUG/2018

    ```


    更新已应用于满足 `WHERE` 子句的两列。如果您想根据不同的条件更新不同的列，您必须编写单独的 `UPDATE` 语句。


    ## 没有 WHERE 子句的更新


    在本章前面，我提到 `WHERE` 子句在 `UPDATE` 语句中是可选的。这意味着有可能（无论是有意还是无意）更新表中的每条记录。让我们看看当我们这样做时会发生什么。


    首先，通过单击 SQL Developer 中的“提交”按钮或在 SQL 窗口中运行 `COMMIT` 命令来提交您已做的任何更改。这将确保您可以回滚从现在开始运行的任何命令，而不会丢失您在本章中所做的任何工作。


    现在，让我们运行一个 `UPDATE` 语句来更新 `employee` 表中的 `salary` 值。我们希望在薪水为 `NULL` 时进行更新，但假设您忘记添加
    `WHERE` 子句：


    ```

    UPDATE employee

    SET salary = 25000;

    ```


    当您运行此查询时，您将收到 “9 row(s) updated.” 的消息。哦不！九行！您只想更新一两行！您可以对表运行 `SELECT` 查询以查看更改了什么：


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 25000 |

    | 2 | SMITH | 25000 |

    | 3 | KING | 25000 |

    | 4 | SIMPSON | 25000 |

    | 5 | ANDERSON | 25000 |

    | 6 | COOPER | 25000 |

    | 7 | (null) | 25000 |

    | 8 | SMITH | 25000 |

    | 9 | PATRICK | 25000 |


    ```

    SELECT *

    FROM employee;

    ```


    您可以看到表中的每条记录都被更新为相同的 `salary`。每位员工的 `salary` 信息都已丢失。


    如果您不是故意这样做的，没关系。您可以通过运行 `ROLLBACK` 命令或单击 SQL Developer 中的“回滚”按钮来撤消这些更改。应该会出现一条消息，显示“回滚成功。”


    然后，您可以再次运行 `SELECT` 命令来查看 `employee` 表中的数据。


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | (null) | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |


    ```

    SELECT *

    FROM employee;

    ```


    因此，请小心您的 `UPDATE` 语句。确保它们上有 `WHERE` 子句，除非您非常确定要更新表中的每条记录！对于像这样较小的表，这可能没问题，但当您处理包含数千或数百万条记录的表时，这可能会带来问题！'
  raw: '## Update Based on Existing Value


    Sometimes you may want to update your data based on data that’s already in the
    table. One example we’ll look at is updating a salary to increase it by a certain
    amount.


    Let’s say that the employee JONES (id = 1) has been performing well and has been
    awarded a salary increase of 10000\. There are two ways we can update this data:


    *   Run a query to find the current salary, write a query to update the current
    salary to 10000 more than what it is, and run that query.


    *   Or, write a query that updates the current salary to add 10000, and run that
    query.


    The second option is preferable. We won’t need to run two separate queries. We
    can run a single query that does this. Our `UPDATE` query would look like this:


    ```

    UPDATE employee

    SET salary = salary + 10000

    WHERE id = 1;

    ```


    This query is similar to the earlier queries. However, in the `SET` clause, it
    says `SET salary = salary + 10000`. This means “set the salary to the current
    salary value plus 10000.” It allows you to increase the value without knowing
    what the existing value is.


    If you run this query, you’ll see the familiar message of “1 row(s) updated.”
    You can select from the table to see what the data now looks like.


    ```

    SELECT *

    FROM employee;

    ```


    The results of this query are:


    ```

    ID   LAST_NAME   SALARY

    1    JONES       30000

    2    SMITH       35000

    3    KING        45000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      (null)

    7    ADAMS       (null)

    8    SMITH       62000

    9    PATRICK     40000

    ```


    You can see that the `salary` for JONES is now 30000, which is 10000 more than
    the original 20000.


    ## Update a Date Value


    Writing and running an `UPDATE` statement using a date value is similar to updating
    text or numeric values. You should use the date literal we learned about in the
    previous chapter on inserting data.


    This is the sales_meeting table from the earlier chapter:


    ```

    ID   EMPLOYEE_ID   COMPANY           MEETING_DATE

    1    5             ABC Construction  10/AUG/2018

    2    2             BW Signage        21/AUG/2018

    ```


    Let’s say that the meeting with BW Signage needs to have the date updated from
    21 August to 25 August. You can do this using an `UPDATE` statement:


    ```

    UPDATE sales_meeting

    SET meeting_date = DATE ''2018-08-25''

    WHERE id = 2;

    ```


    In this `WHERE` clause, you could write it in several ways:


    *   Company = BW Signage, but there may be more meetings with the same company
    that we don’t want to change.


    *   Meeting_date = 21 Aug 2018, but there could be other meetings on the same
    date


    You should use `id = 2` because that’s the only way to guarantee that this is
    the only record you want to update. If you run this query, you’ll get the message
    about 1 row being updated. To see the changes, run a `SELECT` statement:


    ```

    SELECT *

    FROM sales_meeting;

    ```


    The results are:


    ```

    ID   EMPLOYEE_ID   COMPANY           MEETING_DATE

    1    5             ABC Construction  10/AUG/2018

    2    2             BW Signage        25/AUG/2018

    ```


    You can see the data has been updated with the correct date. The date format depends
    on your location, but it can be changed.


    ## Viewing and Updating the Date Format


    The Oracle database displays date formats in a certain way, depending on the location
    specified when installing the database. You can see what the format is set to,
    and change it, by looking at the parameters of the database. These parameters
    are stored in a table called `nls_session_parameters` :


    ```

    SELECT * FROM nls_session_parameters

    WHERE parameter = ''NLS_DATE_FORMAT'';

    ```


    Your output would look similar to this:


    ```

    PARAMETER         VALUE

    NLS_DATE_FORMAT   DD/MON/RRRR

    ```


    The `value` column specifies the format that the date is shown in. In this example,
    “DD” stands for a two-digit day, “MON” is a three-letter month, and “RRRR” is
    a four-digit year. If you run this query, you may get a different value, such
    as “DD-MON-RRRR” or “MM-DD-RRRR.”


    You can update your date format to a format you prefer by using the `ALTER SESSION`
    command . Simply change the date format in this command to one you prefer, and
    run it:


    ```

    ALTER SESSION SET NLS_DATE_FORMAT = ''YYYY/MM/DD'';

    ```


    This will update the format to show the dates as a year/month/day format, such
    as 2018/08/25 for 25^(th) August 2018.


    ## Update Two Columns


    The `UPDATE` statement in SQL lets you update more than one column. There may
    be situations where this is needed, such as developing an application where more
    than one field on a web page can be changed.


    To do this, add your second and further columns to the `SET` clause separated
    by a comma. All of the updates will be applied to the rows that match the `WHERE`
    clause. For example, to update the `sales_meeting` table to change the employee
    and date of the meeting with BW Signage, you can run this query:


    ```

    UPDATE sales_meeting

    SET employee_id = 6, meeting_date = DATE ''2018-08-22''

    WHERE id = 2;

    ```


    When you run this statement, you’ll see that one row was updated. It doesn’t tell
    you how many columns were updated. However, just like the earlier examples, you
    can run a `SELECT` statement to see the changes.


    ```

    SELECT *

    FROM sales_meeting;

    ID   EMPLOYEE_ID   COMPANY            MEETING_DATE

    1    5             ABC Construction   10/AUG/2018

    2    6             BW Signage         22/AUG/2018

    ```


    The update was made to both columns that meet the `WHERE` clause. If you want
    to update separate columns based on different criteria, you’ll have to write separate
    `UPDATE` statements.


    ## Update Without WHERE Clause


    Earlier in this chapter, I mentioned that the `WHERE` clause is optional in an
    `UPDATE` statement. This means it’s possible to update every record in the table,
    either deliberately or accidentally. Let’s see what happens when we do this.


    First, commit any changes you have already made by clicking on the Commit button
    in SQL Developer or running a `COMMIT` command in the SQL window. This will ensure
    you can rollback any commands you run from now on, and not lose anything you’ve
    done in this chapter.


    Now, let’s run an `UPDATE` statement to update the `salary` value in the employee
    table. We want this to be updated where the salary is `NULL`, but let’s say you
    forget to add the `WHERE` clause:


    ```

    UPDATE employee

    SET salary = 25000;

    ```


    When you run this query, you’ll get a message of “9 row(s) updated.” Oh no! Nine
    rows! You only wanted to update one or two! You can run a `SELECT` query on the
    table and see what has changed:


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 25000 |

    | 2 | SMITH | 25000 |

    | 3 | KING | 25000 |

    | 4 | SIMPSON | 25000 |

    | 5 | ANDERSON | 25000 |

    | 6 | COOPER | 25000 |

    | 7 | (null) | 25000 |

    | 8 | SMITH | 25000 |

    | 9 | PATRICK | 25000 |


    ```

    SELECT *

    FROM employee;

    ```


    You can see that every record in the table has been updated to the same `salary`.
    The information for each employee’s `salary` has been lost.


    If you didn’t mean to do this, that’s OK. You can undo these changes by running
    a `ROLLBACK` command or clicking the Rollback button in SQL Developer. A message
    should appear that says “Rollback successful.”


    You can then run a `SELECT` command to see the data in the employee table again.


    | ID | LAST_NAME | SALARY |

    | --- | --- | --- |

    | 1 | JONES | 30000 |

    | 2 | SMITH | 35000 |

    | 3 | KING | 45000 |

    | 4 | SIMPSON | 52000 |

    | 5 | ANDERSON | 31000 |

    | 6 | COOPER | (null) |

    | 7 | (null) | (null) |

    | 8 | SMITH | 62000 |

    | 9 | PATRICK | 40000 |


    ```

    SELECT *

    FROM employee;

    ```


    So, be careful with your `UPDATE` statements. Make sure you have a `WHERE` clause
    on them unless you’re very sure you want to update every record in the table!
    This might be OK for smaller tables such as this, but when you’re working with
    tables that contain thousands or millions of records, it can be problematic!'
