- fmt: '## Rows


    一行代表表中单条信息记录。例如，在客户关系管理系统中，一行可以代表一个客户，或者在杂货清单应用中代表一个产品。数据库中的一行类似于电子表格文件中的一行。纯粹主义者可能不赞同我这样类比，但这个比喻是有用的。


    ## Columns


    列是一种表示表中记录或行特定信息的方式。它是每一行的一个属性或值。


    例如，客户的“名”可以是一个列，然后可以为各行记录一个值。客户的“姓”可以是另一个列，可以单独记录，并且很可能与每个客户的“名”不同。


    在脑海中想象电子表格文件中的列可能会有所帮助。例如：


    ```

    First Name     Last Name

    Jacinda        Ardern

    Malcolm        Turnbull

    Theresa        May

    ```


    在这个例子中，每一行代表一位总理。因此，这个表将是一个总理表。表中的每一行具体代表一位总理。然后，每一列描述了一个属性——比如名和姓——这些是你期望一位总理拥有的属性。


    ## Query


    你已经了解到数据存储在数据库中，并且可以被添加、更新或检索。软件通过数据库管理系统以几种不同的方式与这个数据库交互：


    *   从数据库中检索数据

    *   更改数据库中的值

    *   向数据库添加一些新数据

    *   从数据库中删除一些现有数据


    这些类型的命令被称为查询，它们是使用某种特定类型代码的特定命令，让软件通过数据库管理系统与数据库交互。这些查询易于阅读，我们将在本书中学习如何读写它们。


    ## SQL


    SQL 代表结构化查询语言。它是用于在数据库上编写查询的语言或代码类型。这就是我们将在本书中学习的语言。


    这个缩写可以发音为“ess cue ell”。然而，它也可以发音为“see kwel”，就好像这个词是“sequel”。无论哪种方式，SQL 都是我们将使用的语言。


    ## Indexes


    之前我们解释了什么是表。表是数据库中的一种对象。表用于存储数据。索引是数据库中的另一种对象，用于使查找表中存储的数据更容易。


    索引是一个提高查询效率的对象。它有点像书本后面的索引。如果你正在查找关于特定主题的信息，你不会浏览每一页直到找到它。你会在索引中查找该主题，它会告诉你去哪一页。


    ## Vendors


    SQL 语言和相关数据库功能遵循一个标准：ISO SQL 标准。该标准规定了语言的工作方式。


    对于许多编程语言，例如 Java，只有一个供应商。然而，对于 SQL，有许多供应商。这些供应商创建了他们自己版本的使用 SQL 的数据库管理系统。


    其中一些供应商实现包括：


    *   Oracle Database

    *   Microsoft SQL Server

    *   Oracle MySQL

    *   PostgreSQL


    所有这些供应商实现的相似之处在于，它们都实现了 SQL 标准。标准中定义的相同代码在每个供应商的数据库中将以相同的方式工作。至少，这是希望。


    然而，每个供应商都增加了额外的功能和特性，这些在不同平台上工作方式并不相同。例如，Oracle 实现了对其数据库平台有效的 SQL 扩展，但在 PostgreSQL
    等中找不到。所有供应商都做同样的事情，因此在实践中，编写完美兼容所有供应商实现的 SQL 可能很困难。


    有时供应商特定的改动很小，例如特定函数的名称或数据类型的名称。有时改动较大，例如新的对象类型或构建数据库的方式。


    这对你意味着什么？如果你学习适用于一个供应商数据库的 SQL，那么大部分知识可以转移到其他供应商。你应该能够将你从一个数据库供应商那里学到的大部分知识应用到另一个数据库供应商。


    在本书中，你将学习 Oracle SQL。这意味着你将学习使用 SQL 语言的 Oracle 数据库管理系统上的所有基本命令。如果你去尝试使用 Microsoft
    SQL Server 数据库，在了解差异之后，你应该能够很快掌握 Microsoft 的实现。


    ## Summary


    数据库是应用程序使用的一种数据存储方法。数据库中的数据存储在表中，表有用于每条记录的行和用于需要存储的每种数据类型的列。


    查询是在数据库上运行的以检索、添加或更新数据的命令。这些查询是用一种称为 SQL 的语言编写的，SQL 代表结构化查询语言。


    几个供应商提供他们自己版本的使用 SQL 的数据库管理系统。其中一些供应商是 Oracle、Microsoft SQL Server、MySQL 和 PostgreSQL。我们将在本书中学习
    Oracle。


    # 2. Setting Up


    本章向你介绍我们将在本书中使用的不同工具，并向你展示如何下载和设置它们。你还将创建一个表并设置一些示例数据。


    ## What Tools Do We Need?


    我们将在本书中使用两种不同的工具来教授 Oracle SQL：Oracle Express 和 Oracle SQL Developer。Oracle Express
    是 Oracle 企业级数据库的一个精简版本。快速版（Express Edition）或 Oracle Express 是免费且易于设置的。它在学习 Oracle
    SQL 以及在家创建自己的项目的人群中很受欢迎。


    Oracle SQL Developer 是 Oracle 开发的一个程序，它让你能够连接到数据库并在数据库上运行 SQL。它也是免费且易于设置的。


    最后，Oracle 提供了另一个名为 LiveSQL 的工具。它是一个包含示例数据集的网站，让你可以连接到数据库，上传自己的数据，并在其上运行 SQL 查询。你不需要安装
    Oracle Express 或 Oracle SQL Developer 来使用 LiveSQL。


    虽然 LiveSQL 是一个用于学习和使用 Oracle SQL 的方便工具，但本书的重点将放在 Oracle SQL Developer 和 Oracle
    Express 上。这是因为本书不仅教你如何使用 SQL 语言，还将教你如何使用 Oracle SQL Developer——这是处理 Oracle 数据库最广泛使用的工具之一。这种对
    SQL Developer 的关注让你为 SQL 的实际应用做好更充分的准备，因为公司会使用 Oracle SQL Developer（或类似工具）来处理数据库，而不是
    LiveSQL。'
  raw: '## Rows


    A row represents a single record of information in a table. For example, a row
    may represent a customer in a customer relationship management system, or a product
    in a grocery list app. A row in a database is similar to a row in a spreadsheet
    file. Purists won’t appreciate my putting things that way, but the analogy is
    useful.


    ## Columns


    A column is a way to represent a particular piece of information for the records
    or rows within a table. It’s an attribute or a value of each row.


    For example, a customer’s first name may be a column, and a value may then be
    recorded for the rows. A customer’s last name could be a different column, and
    can be recorded separately and would likely be different to each customer’s first
    name.


    It may help to form a mental picture of columns in a spreadsheet file. For example:


    ```

    First Name     Last Name

    Jacinda        Ardern

    Malcolm        Turnbull

    Theresa        May

    ```


    Each row in this example represents a prime minister. Thus, the table would be
    a table of prime ministers. Each row in the table represents one prime minister
    specifically. Then each column describes an attribute—such as first and last—that
    one would expect a prime minister to have.


    ## Query


    You’ve learned that data is stored in a database, and it can be added, updated,
    or retrieved. Software interacts with this database using a database management
    system in a few different ways:


    *   Retrieving the data from the database


    *   Changing values in the database


    *   Adding some new data to the database


    *   Removing some existing data from the database


    These types of commands are called queries, which are specific commands using
    a certain type of code that let the software interact with the database, using
    the database management system. These queries are easily readable, and we’ll learn
    how to read and write them in this book.


    ## SQL


    SQL stands for Structured Query Language. It is the language or type of code that
    is used to write queries on the database. This is the language that we’ll be learning
    in this book.


    This can be pronounced as an abbreviation, “ess cue ell.” However, it can also
    be pronounced as “see kwel,” as though the word is “sequel.” In either way, SQL
    is the language we’ll use.


    ## Indexes


    Earlier we explained what tables were. Tables are a type of object on the database.
    Tables are used to store data. Indexes are another type of object on the database,
    and are used to make it easier to find data stored in tables.


    An index is an object that improves the efficiency of a query. It’s kind of like
    an index at the back of a book. If you were looking for information on a particular
    topic, you wouldn’t skim through every page until you found it. You would look
    up the topic in the index and it would tell you what page to go to.


    ## Vendors


    The SQL language and related database features follow a standard: the ISO SQL
    standard. This standard specifies how the language works.


    With many programming languages, such as Java, there is only one vendor. However,
    with SQL, there are many vendors. These vendors have created their own versions
    of a database management system that uses SQL.


    Some of these vendor implementations are:


    *   Oracle Database


    *   Microsoft SQL Server


    *   Oracle MySQL


    *   PostgreSQL


    All of these vendor implementations are similar in that they all implement the
    SQL standard. The same code that is defined in the standard will work in the same
    way in each vendor’s database. At least, that’s the hope.


    However, each vendor has added on extra functionality and features that don’t
    work the same across the different platforms. For example, Oracle implements extensions
    to SQL that work on their database platform but are not found in, say, PostgreSQL.
    All vendors do the same thing, so in practice it can be difficult to write SQL
    that is perfectly compatible across vendor implementations.


    Sometimes the vendor-specific changes are small, such as the names of particular
    functions, or the names of data types. Sometimes they are larger changes, such
    as new types of objects or ways to structure a database.


    What does this mean for you? If you learn the SQL that applies to one vendor’s
    database, most of that knowledge is transferrable to other vendors. You should
    be able to use most of what you learn about one database vendor on another database
    vendor.


    In this book, you’ll learn about Oracle SQL. This means you’ll learn all of the
    basic commands on Oracle’s database management system that uses the SQL language.
    If you were to go and try to work with a Microsoft SQL Server database, you should
    be able to pick up Microsoft’s implementation pretty quickly after learning about
    the differences.


    ## Summary


    A database is a method of storing data used by applications. Data in a database
    is stored in tables, which have rows for each record and columns for each type
    of data that needs to be stored.


    A query is a command that is run on the database to retrieve, add, or update data.
    These queries are written in a language called SQL, which stands for Structured
    Query Language.


    Several vendors offer their own version of database management systems that use
    SQL. Some of these vendors are Oracle, Microsoft SQL Server, MySQL, and PostgreSQL.
    We’ll be learning about Oracle in this book.


    # 2. Setting Up


    This chapter introduces you to the different tools we’ll use in this book, and
    shows you how to download and set them up. You’ll create a table and set up some
    sample data as well.


    ## What Tools Do We Need?


    We’ll use two different tools to teach Oracle SQL in this book: Oracle Express,
    and Oracle SQL Developer. Oracle Express is a smaller version of Oracle’s enterprise-level
    database. The Express Edition, or Oracle Express, is free and easy to set up.
    It’s popular with people learning Oracle SQL and for creating their own projects
    at home.


    Oracle SQL Developer is a program developed by Oracle that lets you connect to
    the database and run SQL on the database. It’s also free and easy to set up.


    Last, there’s another tool provided by Oracle called LiveSQL. It’s a website with
    sample datasets that lets you connect to a database, upload your own data, and
    run SQL queries on it. You don’t need to install Oracle Express or Oracle SQL
    Developer to use LiveSQL.


    While LiveSQL is a handy tool for learning and working with Oracle SQL, the focus
    of this book will be on Oracle SQL Developer and Oracle Express. This is because
    the book will teach you not only how to work with SQL the language, but how to
    use Oracle SQL Developer—one of the most widely used tools for working with Oracle
    Database. This focus on SQL Developer makes you more prepared for real-world application
    of SQL, as companies would use Oracle SQL Developer (or a similar tool) to work
    with databases rather than LiveSQL.'
