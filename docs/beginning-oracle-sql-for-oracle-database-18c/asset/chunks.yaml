- fmt: '# Part V Functions


    ## 22. Using functions in SQL


    There’s more to SQL than reading the data that’s stored in the table. You’ll often
    need to manipulate it or perform calculations on it. That’s where functions come
    in.


    ### What is a Function?


    A `function` is a piece of code stored in the database that allows you to perform
    a specific task that returns an output. There are three parts to a function:


    *   The input, which is the data you provide to the function

    *   The process, or what the function does

    *   The output, which is the result of the function’s process


    There are a lot of functions built into Oracle SQL to perform a lot of different
    calculations or processes. Why would you want to use a function? Functions are
    used to perform manipulation on data, such as:


    *   Count the number of records that meet a certain criteria

    *   Total a range of numbers

    *   Convert a date to another time zone

    *   Find a specific character in a string of characters


    Whenever you need to see more than just the value that’s stored in the database
    table, you’ll probably need to use a function.


    ### Where Can You Use Functions?


    Functions can be used in many places in Oracle SQL, such as:


    *   The `SELECT` clause of a `SELECT` statement, viewing the result of a function

    *   The `ON` clause of the `JOIN` of a `SELECT` statement

    *   The `WHERE` clause of a `SELECT` statement, filtering data to the result of
    a function

    *   The `ORDER BY` clause

    *   The `SET` clause of an `UPDATE` statement

    *   The `WHERE` clause of a `DELETE` or `UPDATE` statement

    *   The `VALUES` clause of an `INSERT` statement


    You’ve learned how to write a `SELECT`, `INSERT`, `UPDATE`, and `DELETE` statements.
    In this chapter, you’ll see how functions can be used in these statements as well.


    ## Mixing Join Types


    The examples so far have demonstrated that you can show all matching records in
    many tables using `INNER JOIN` and matches or `NULLs` in all tables using a `LEFT
    JOIN`. Can you use a mix of both? The answer is yes, you can mix join types in
    a query.


    What if you wanted to see all employees that had offices, and their `sales_meetings`
    if they had any `sales_meetings`? This could be done by selecting from the `employee`
    table, performing an `INNER JOIN` to the `office` table (to exclude employees
    that don’t have offices and offices without employees), and then a `LEFT JOIN`
    to the `sales_meeting` table.


    The query would look like this:


    ```

    SELECT e.id,

    e.last_name,

    o.address,

    s.company,

    s.meeting_date

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id

    LEFT JOIN sales_meeting s ON e.id = s.employee_id;

    ```


    The results from this query are:


    | ID | LAST_NAME | ADDRESS | COMPANY | MEETING_DATE |

    | --- | --- | --- | --- | --- |

    | 1 | JONES | 123 Smith Street | (null) | (null) |

    | 2 | SMITH | 45 Main Street | BW Signage | 21/Aug/18 |

    | 3 | KING | 45 Main Street | (null) | (null) |

    | 4 | SIMPSON | 123 Smith Street | (null) | (null) |

    | 6 | COOPER | 123 Smith Street | (null) | (null) |

    | 7 | ADAMS | 10 Collins Road | (null) | (null) |

    | 8 | SMITH | 10 Collins Road | (null) | (null) |

    | 9 | PATRICK | 123 Smith Street | (null) | (null) |


    You can see that this result is different to the earlier one. Employee id 5 is
    not shown (ANDERSON) because they do not have an `office`. Even though they have
    a `sales_meeting`, they are not shown because we were performing an `INNER JOIN`
    on `employee` and `office`, meaning the record had to exist in both tables.


    This shows that you can use a mix of join types when working with multiple tables.
    The type of join you use should be dependent on the needs of your query and what
    result you want to see.


    ## Joining Four or More Tables


    You have seen some example queries that joined two and three tables together.
    You can use the same techniques to join four, five, and many more tables together.
    While we only have three tables at the moment, once you start working on real
    applications either in your job or on a side project, you’ll start using many
    more than three tables.


    The same techniques apply when joining more than three tables. For example, let’s
    say you had a table called `department` that stored an `id` and a `name` of the
    department such as Accounting or Sales. Let’s say there is also a column in the
    `employee` table called `department_id` that stores the `id` from the `department`
    table.


    Our tables and fields would then be:


    *   `employee`: `id`, `last_name`, `salary`, `job_title`, `office_id`, `department_id`

    *   `office`: `id`, `address`

    *   `sales_meeting`: `id`, `employee_id`, `company`, `meeting_date`

    *   `department`: `id`, `department_name`


    You could join all four of these tables together like this:


    ```

    SELECT e.id,

    e.last_name,

    d.department_name,

    o.address,

    s.company,

    s.meeting_date

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id

    INNER JOIN sales_meeting s ON e.id = s.employee_id

    INNER JOIN department d ON e.department_id = d.id;

    ```


    This would then show you the records that were related across all four tables.
    If you run this query at the moment using the sample data we have used so far,
    you’ll get an error because the `department` table does not exist.


    As you add more and more tables to our database, with related columns, you can
    join to them if you need to. You can also use the `WHERE` clause to filter data
    on any of these tables, the `ORDER BY` clause to order on any column, and other
    keywords you have learned so far.


    You may end up with quite a long query, like the one shown here:


    ```

    SELECT e.id AS employee_id,

    e.last_name,

    e.salary,

    e.job_title,

    d.department_name,

    o.address,

    s.company,

    s.meeting_date

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id

    INNER JOIN sales_meeting s ON e.id = s.employee_id

    INNER JOIN department d ON e.department_id = d.id

    WHERE o.address LIKE ''%Main Street%''

    AND e.salary > 30000;

    ```


    This query would show all `employee`, `department`, `office`, and `sales meeting`
    information for employees that have an `office` on Main Street and a `salary`
    of greater than 30,000.


    Once you set up your data, writing queries like this gets easier.


    ## Summary


    You can use the same method as joining two tables to join three, four, or more
    tables together. You can join all tables using an `INNER JOIN`, a type of `OUTER
    JOIN`, or a combination of joins. The exact joins needed will be determined by
    the data you want to view.


    You can use other keywords and clauses with your joins, such as `WHERE` clauses
    to filter data and `ORDER BY` to sort data, to give you the exact data that you
    need.'
