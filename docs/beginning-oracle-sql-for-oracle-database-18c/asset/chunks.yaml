    这显示了`salary`值减去5000，并带有标签`LOW_SALARY`。'
  raw: '## The AS Keyword


    If the `AS` keyword for column aliases is optional, should you use it or not?
    Surely the less typing you need to do, the better? I would recommend that you
    include the `AS` keyword whenever you use a column alias. Here’s why.


    Let’s say you had a query like the preceding one:


    ```

    SELECT id, last_name surname, salary

    FROM employee;

    ```


    If you look closely at this query, you can see it includes three columns, and
    the `last_name` column has an alias of `surname`. However, the surname may look
    like an extra column. How do you know, by looking at this query, if the surname
    is meant to be a column alias, or the person who wrote it forgot to add the comma
    after the `last_name` column, and surname is actually a different column?


    It’s not easy to tell the difference. In this example, the query will run, as
    it did earlier. However, let’s say you have a query like this:


    ```

    SELECT id, last_name salary

    FROM employee;

    ```


    This looks like you want to select three columns: `id`, `last_name`, and `salary`.
    This is what we’ve seen a lot during this book. However, when you run the query,
    this is what you’ll see.


    ```

    ID   SALARY

    1    JONES

    2    SMITH

    3    KING

    4    SIMPSON

    5    ANDERSON

    6    COOPER

    7    (null)

    8    SMITH

    9    PATRICK

    ```


    Why is the `last_name` column called `salary`? Or why is the `salary` column showing
    text values that look like names? If you look closely at your query, you can see
    the issue:


    ```

    SELECT id, last_name salary

    FROM employee;

    ```


    A comma is missing between the end of the `last_name` column and the start of
    the `salary` column. The Oracle database doesn’t know what you meant; it just
    knows what it’s told, so it looks at the `last_name` column and calls it “salary”.


    If you specify the `AS` keyword for every column alias you use, it’s immediately
    clear that this is supposed to be a column alias, and not a column that’s missing
    a comma. Sometimes in SQL it’s better to use the slightly longer version of a
    statement to make it clearer to the reader, than to use the short version to save
    time but cause more issues later.


    ### Note


    Using the AS keyword when specifying column aliases is helpful for you and other
    developers to know that the following word is supposed to be a column alias and
    not a mistyped query.


    ## Mathematical Operations and Column Aliases


    Another feature of SQL is the ability to perform *mathematical operations* on
    columns. This includes the basic operations of addition, subtraction, multiplication,
    and division. These are done using the following symbols:


    *   + for addition


    *   - for subtraction


    *   * for multiplication


    *   / for division


    To perform one of these operations, enter a column or value, then one of these
    symbols, then another column or value.


    ### Addition


    For example, our `salary` column indicates the annual salary for each employee.
    To show what the value would be if you increased it by 10000, our query would
    be:


    ```

    SELECT id, last_name, salary + 10000

    FROM employee;

    ```


    The results would be:


    ```

    ID   LAST_NAME   SALARY+10000

    1    JONES       30000

    2    SMITH       45000

    3    KING        50000

    4    SIMPSON     62000

    5    ANDERSON    41000

    6    COOPER      (null)

    7    (null)      (null)

    8    SMITH       72000

    9    PATRICK     50000

    ```


    The values are showing 10000 more than the original `salary` value. How can you
    be sure? How do you know what the earlier `salary` value was?


    You can add that to your query. There’s no rule to say you can’t select a column
    more than once. To see the old `salary` value as well, you can run this query:


    ```

    SELECT id, last_name, salary, salary + 10000

    FROM employee;

    ```


    The results would be:


    ```

    ID   LAST_NAME  SALARY    SALARY+10000

    1    JONES      20000     30000

    2    SMITH      35000     45000

    3    KING       40000     50000

    4    SIMPSON    52000     62000

    5    ANDERSON   31000     41000

    6    COOPER     (null)    (null)

    7    (null)     (null)    (null)

    8    SMITH      62000     72000

    9    PATRICK    40000     50000

    ```


    You can see the old and the new value. All `salary` values have increased by 10000,
    except for those with a `NULL salary`. This is because `NULL` means unknown and
    adding 10000 to an unknown value is still an unknown value.


    What does this have to do with column aliases? If you look at the results, you
    can see that the column heading for the “`salary plus 10000`” column is “`SALARY+10000`”.
    By default, Oracle will label your column headings like this, by combining any
    operators and removing spaces. This isn’t very readable by your or by any applications
    that use this value, so we can give it a column alias.


    Let’s say you wanted to label our new column `new_salary`. Our query would be:


    ```

    SELECT id, last_name, salary, salary + 10000 AS new_salary

    FROM employee;

    ```


    Your results would look like this


    ```

    ID   LAST_NAME   SALARY    NEW_SALARY

    1    JONES       20000     30000

    2    SMITH       35000     45000

    3    KING        40000     50000

    4    SIMPSON     52000     62000

    5    ANDERSON    31000     41000

    6    COOPER      (null)    (null)

    7    (null)      (null)    (null)

    8    SMITH       62000     72000

    9    PATRICK     40000     50000

    ```


    This column heading of `NEW_SALARY` is a lot easier to read and a lot easier for
    applications to work with than `SALARY+10000`.


    ### Subtraction


    You can perform subtraction in our SQL code in the same way as you performed addition.
    For example, to subtract 5000 from our salary values, your query would look like
    this:


    ```

    SELECT id, last_name, salary, salary - 5000

    FROM employee;

    ```


    The results of this query are:


    ```

    ID   LAST_NAME   SALARY   SALARY-5000

    1    JONES       20000    15000

    2    SMITH       35000    30000

    3    KING        40000    35000

    4    SIMPSON     52000    47000

    5    ANDERSON    31000    26000

    6    COOPER      (null)   (null)

    7    (null)      (null)   (null)

    8    SMITH       62000    57000

    9    PATRICK     40000    35000

    ```


    You can give this new column a column alias:


    ```

    SELECT id, last_name, salary, salary - 5000 AS low_salary

    FROM employee;

    ```


    The results of this query are:


    ```

    ID   LAST_NAME   SALARY   LOW_SALARY

    1    JONES       20000    15000

    2    SMITH       35000    30000

    3    KING        40000    35000

    4    SIMPSON     52000    47000

    5    ANDERSON    31000    26000

    6    COOPER      (null)   (null)

    7    (null)      (null)   (null)

    8    SMITH       62000    57000

    9    PATRICK     40000    35000

    ```


    This shows the `salary` value minus 5000, with a label of `LOW_SALARY`.'
