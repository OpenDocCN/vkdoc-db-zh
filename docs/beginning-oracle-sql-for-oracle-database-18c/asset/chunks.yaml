- fmt: '# Specifying the Order with Multiple Conditions


    What if you want to check your conditions in a specific order? You can do this
    using brackets: “(“ and ”)”. Adding brackets to your query will force the query
    to be run in a certain way. The operations inside the brackets are run first,
    and then they are combined with the operations outside of the brackets. Let’s
    look at this example:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%N%''

    AND salary > 50000

    OR last_name LIKE ''%T%'';

    ```


    This will show records that:


    *   Have a `last_name` containing “N” and a `salary` of greater than 50000

    *   Or, have a `last_name` containing “T.”


    This shows the following results:


    ```sql

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    4    SIMPSON     52000

    ```


    If you wanted to show a different set of records, you would write your query like
    this:


    ```sql

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%N%''

    AND (salary > 50000

    OR last_name LIKE ''%T%'');

    ```


    Notice that the brackets are around two conditions and the `OR` keyword. This
    means those conditions are run first, and then combined with the first condition.
    This will show records that:


    *   Have a `salary` of greater than 50000 or a `last_name` containing “T”

    *   And have a `last_name` containing “N.”


    The results from this query would be:


    ```sql

    ID   LAST_NAME   SALARY

    4    SIMPSON     52000

    ```


    Each of these records meets the criteria. Without the brackets inside the `WHERE`
    clause, the results are different. The reason that the record for `''SMITH''`
    is shown in the first result but not the second is because the first query shows
    all records where the `last_name` contains “T” but the second query only shows
    records where the `last_name` contains “T” and have a `salary` of greater than
    50000.


    ## Summary


    You can use multiple filters in your SQL queries by using a combination of `AND`
    and `OR` keywords. The `AND` keyword will check that a record meets all of the
    conditions specified, and the `OR` keyword will check that a record meets at least
    one of the conditions specified. Many `AND` and `OR` keywords can be added into
    a query, and they are run in the order they are written. If you want to ensure
    they are run in a specific order, you can enclose the conditions and keywords
    in brackets.


    # 8. Working with Nulls


    In this chapter, you’ll learn all about a concept in SQL and databases called
    “null.” In the sample table you’ve been using, every record has a value for every
    column. However, when working with real databases, this is not always the case.
    The concept of “null” is used when data is not known.


    ## Missing Data


    In a real database, there could be a situation where data is missing. This could
    be deliberately (we don’t know what the value is), or some kind of bug (there
    should be a value but there isn’t). Tables in a database don’t require you to
    store a value in every row and column.


    We’ve been working with a sample table called `employee` in this book so far.
    The table looks like this:


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    ```


    The table has five rows, and three columns. Every column for every row has a value.
    However, this is not always the case. It’s possibly for values to be missing.
    What if there was an `employee` where the `salary` was not known? Or we had other
    columns in the table, such as a `date of birth`, which were not known for some
    `employees`?


    This is a valid scenario when working with databases. The question is: how do
    we store it? Let’s say you have a new `employee`, but you don’t currently know
    what their `salary` is. It could be represented like this:


    ```sql

    ID   LAST_NAME   SALARY

    1    JONES       20000

    2    SMITH       35000

    3    KING        40000

    4    SIMPSON     52000

    5    ANDERSON    31000

    6    COOPER      Unknown

    ```


    In this example, we’ve used a text value of “Unknown,” to specify that we don’t
    know what the `salary` value is for the new `employee`. This isn’t a good idea
    though.


    First, the `salary` column is a number column, which means it only stores numbers
    and not text values. Using a text value of “Unknown” in this number column will
    cause an error when trying to add it.


    You shouldn’t change the type of the `salary` column to a text value to allow
    for this “Unknown” value to appear. Well, you could, but then you could do that
    for every field in the database and it will mean the data types aren’t useful
    at all.


    What if you use a value of “n/a”? This also doesn’t work, for the same reason.
    Adding a text value into a number column is not possible. Also, what’s to say
    that the value of “n/a” isn’t a legitimate value in this field or other fields?
    It might not be valid for `salary`, but what if there was a column called `commission`
    which stored an employee’s commission amount? The value of “n/a” might mean that
    commission does not apply to this particular employee.


    What if you use 0? You could use 0, but a value of 0 indicates “the `salary` is
    zero.” You want to capture the fact that the `salary` is unknown, and unknown
    is different to 0\. If you use 0, you would have to adjust all of our queries
    that look at the `salary` column to ignore those with a `salary` of 0, as it would
    skew any totals or averages.


    What if you use a blank space character “ ”? That’s an option, but it faces the
    same issues as “Unknown” and “n/a” because it’s a text value that is trying to
    be added to a number field.


    How about using an empty string, which means there is nothing inside the quotes:
    ‘ ’? You could try this, but an empty string is treated differently in SQL. It’s
    still a text value, which means it will have issues trying to be used in a number
    or a date field.


    So, you can’t use text values like “n/a”, or 0, or “ ”, or empty strings. What
    can you use? You can use a value of `NULL`.


    ## What is NULL?


    The word `NULL` is a keyword that means “an unknown value.” It’s used to represent
    unknown or missing values in a database table. This keyword is provided because
    an unknown value is different to an empty string, a blank space, a zero, or another
    text value that may have a meaning such as “n/a” or “FALSE.”


    The value of `NULL` is used quite often in databases, as there is no guarantee
    that all fields will always have data. What are the advantages of using `NULL`
    values in your database (as opposed to zeroes or empty strings)?


    *   `NULL` works on any column type: text, number, date. You don’t need to change
    the type of column for it to work.

    *   `NULL` has its own set of keywords for performing logic, as it’s a special
    value.

    *   There are a range of functions that work with `NULL`.

    *   It uses no storage, which might not be an issue with small tables but can
    help with larger tables.


    ## How Should NULL Be Treated?


    `NULL` values require their own treatment, which is probably their only disadvantage.
    Throughout this book, you’ll learn how to work with `NULL` values, but you’ll
    look at some examples and treatment of `NULL` values related to what you’ve learned
    so far.


    You just learned how to check if column values match other values, using symbols
    such as equals and greater than. This works for text, number, and date values.
    However, it won’t work for `NULL` values. A value can’t be “equal to” `NULL`,
    because `NULL` is an unknown value. To check if a value is `NULL`, we use the
    keywords `IS NULL`. Your `WHERE` clause would look like this:


    ```sql

    WHERE salary IS NULL;

    ```


    If you write it using the equals sign, it won’t find anything:


    ```sql

    WHERE salary = NULL;

    ```


    Let’s take a look at some examples to explain this.


    ## Examples of Working with NULL


    You’ll see some examples of working with `NULL` values in a database. First, you’ll
    need to add some `NULL` values to your table so you can write `SELECT` queries
    that work with them.'
