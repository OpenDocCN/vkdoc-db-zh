- fmt: '# Part IV: Joining Tables


    ## Chapter 18: Inner Join

    In this chapter, you’ll learn what a join is, and how to display data from two
    tables using an “inner join.”


    ## Chapter 19: Outer Join

    This chapter explains the concept of an “outer join,” and how to use it in SQL.


    ## Chapter 20: Other Join Types

    Other than an inner join and outer join, there are a few other types of joins.
    These are explained in this chapter.


    ## Chapter 21: Joining Many Tables

    You’ll often need to join more than two tables together in your queries. This
    chapter explains how to do that.


    # Part V: Functions


    ## Chapter 22: Using Functions in SQL

    SQL includes functions that perform calculations and transformations on your data.
    You’ll learn what they are and how to use them in this chapter.


    ## Chapter 23: Writing Conditional Logic

    In this chapter, you’ll learn how to implement conditional logic, which displays
    one value if a condition is true and another if it is false.


    ## Chapter 24: Understanding Aggregate Functions

    Some functions in SQL are called aggregate functions, which combine multiple rows
    of data together. This chapter explains what they are and how to use them.


    ## Chapter 25: Grouping Your Results

    When using aggregate functions, you may want to group your results. This chapter
    explains what that means and how to do it.


    ## Chapter 26: What are Indexes?

    In this chapter, you’ll learn what an index is, how to create one, and some tips
    for doing so.


    # Part VI: Command Line


    ## Chapter 27: Using the Command Line

    This chapter will explain what SQL*Plus is and how to use it to connect to your
    database. It also explains what SQLcl is, and how to download and use it.


    # Part VII: Appendixes


    ## Appendix: How to Find and Navigate the Oracle SQL Reference

    Oracle’s website contains a lot of information about SQL. This appendix will explain
    how to find this website and how to navigate it.


    # About the Author


    I’ve been working with Oracle databases ever since I went to university in 2004.
    My first role after university was supporting a series of applications that were
    built on an Oracle database and have had a range of roles in the software development
    industry since then. In that time, I obtained the “Oracle SQL Expert” certification,
    and studying for that helped me improve my knowledge of the Oracle database. I
    also run the website databasestar.com, which offers practical advice for database
    developers, with a focus on Oracle SQL.


    Now you know a bit about me, and what you’ll learn in this book, it’s time to
    get started with learning SQL with Oracle Database 18c.


    # Acknowledgments


    I’d like to thank Jonathan Gennick at Apress who originally contacted me with
    the idea for this book and for everything he has helped me with while writing
    this book. I’d also like to thank Jill Balzano for assisting with getting the
    book organized and completed, and Michelle Kolbe who ensured the high quality
    and accuracy of the material in her role as Technical Reviewer. Finally, I’d like
    to thank my wife Fiona for her support while creating this book.


    # About the Author and About the Technical Reviewer


    ## About the Author


    ## About the Technical Reviewer


    # Part I: Setting Up


    ## 1. What is a Database?


    One of the main features of software is that it lets you interact with data in
    a certain way. This could be a grocery list app that lets you add items to a shopping
    list on your phone, a website that lets you write and publish articles, or a customer
    relationship management program where you store information about customers.


    All of these programs let you view information in a certain way, edit this information,
    and then store it somewhere. Without the ability to store this information, the
    software wouldn’t work that well. Imagine having a grocery list app, but when
    you entered the items you needed to buy, the app wouldn’t save and the list disappeared
    when you closed the application. Such an application wouldn’t be very useful!


    Software needs a place to store data. The most common way to store this is in
    a database. A database is a defined structure of files and information that lets
    users and software store, retrieve, and update data in an efficient way.


    Databases are used by grocery list apps, websites for publishing articles, customer
    relationship management systems, and many more types of software. The data that
    is stored in a database is used by the software in many ways, and allows the users
    to view, save, and edit information in the software.


    For example, a grocery list app may store the following information in a database:


    * The names of each item on your grocery list (the items you need to buy from
    the shop)

    * A list of categories of items (e.g., vegetables, dairy, spices)

    * The quantities or amounts of each item you want to buy (e.g., 3 apples, 2 cups
    of flour)


    So why is a database used, other than to store information?


    First, it’s efficient. The way that the data is stored in the database makes it
    easy for users and software to read the data, add new data, update or delete existing
    data.


    Databases also let you make updates to a small area of data without impacting
    all of the other data, if required. For example, you can add a new item to your
    grocery list without having to make changes to every other item in the database.


    One consideration of using databases to store data is that they need a “database
    management system.” This is a type of software that lets users or applications
    interact with the file. It allows you to easily enter commands, and the database
    management system takes care of changes to the data and all of the complexity
    involved. Another advantage would be handling multiple users viewing or editing
    the data.


    ## Alternatives to Databases


    A database isn’t the only way to store data. Data can also be stored directly
    in files. An example of this would be a text file. If you open Notepad and create
    a new document, enter some text, and save it, a file is saved onto your computer.
    There is no database created in this example. The file is just saved to your computer.


    Storing your data in a text file is simpler than working with a database, and
    it’s OK if you’re the only one working on the file.


    However, there are problems that may occur with storing data in files when the
