- fmt: '## Why Do We Have Different Data Types?


    When you create a table, you specify the column names. That should be all you
    need to do, right? Why do we care what the data type is? There are a few reasons
    that different data types exist.


    First, it allows the database to be more efficient with storing data. If you define
    every column in every table as a text value of up to 10,000 characters, then the
    database will need to allow for that much storage space for those situations where
    you want to store 10,000 characters (no matter how rare those situations are).
    Defining an appropriate data type for each of your columns will mean the database
    can store the data efficiently.


    It also means your queries will be faster. Storing values that are supposed to
    be numbers as a “number” data type will mean the database can search for specific
    values easier (as it knows the limits of the field, such as numbers and not letters).
    It also means mathematical calculations can be performed easier and faster, if
    values should be stored as numbers rather than text.


    Using an appropriate data type also prevents invalid data. One of the major benefits
    of using a database to store your data is the restrictions you can place on storing
    the data. For example, storing an “order date” could be stored as a text value,
    but that means you may get values like this:


    *   30/01/2018

    *   01/30/2018

    *   30-Jan 2018

    *   40 Jan 2018

    *   124/Abc/1000


    Some of these values are OK, but others are not. However, if we stored this “order
    date” as a date value, then we can use the databases in-built validation to check
    for invalid dates. The Oracle database will know that “40 Jan 2018” is not a valid
    date, so it will not store the value. This ensures the quality of your data remains
    high and prevents errors.


    So, in summary, data types are used to store data efficiently, to improve the
    performance of queries, and to prevent invalid data.


    ## What Are the Different Data Types?


    We’ve covered what data types are and why they are used. What kind of data types
    exist, and how can you use them?


    The data types in the Oracle database (and in many other databases and programming
    languages) can be broken down into three groups: text, number, and date. Each
    of these groups has a range of data types you can use for your columns.


    ### Text Data Types


    The text data types in Oracle are those that are used to store text values. They
    can be used to store alphabet characters, numbers, and many special characters.


    There are many different data types available in Oracle for storing text values,
    and each of them has their own use. Let’s take a look at each of them.


    #### CHAR


    Oracle has a data type called `CHAR`, which is short for “character.” It stores
    strings, which is a programming word that means “text values.” This data type
    stores data in a fixed length, which means the value takes up the same amount
    of space regardless of the actual value being stored.


    When you specify a `CHAR` column, you need to specify a length value. This represents
    the number of characters to store in the field and must be between 1 and 2000.
    You can store any text value inside this column, as long as its length is equal
    to or shorter than this number. For example, a `CHAR` column with a length of
    10 can store the value of “Car” and “Fast Car” but not “Red Sports Car”, because
    “Red Sports Car” is longer than 10 characters.


    The main thing to remember about `CHAR` is that values that are less than the
    length you define have space characters added to the right of the value to meet
    the length. This means if you store a value of “Fast Car” in a `CHAR` column with
    a length of 10, the value that is actually stored is “Fast Car”. Two spaces have
    been added to the end to bring the length to 10.


    To define a column as a `CHAR` with a length, you use the word `CHAR` and then
    the length inside brackets:


    ```sql

    CHAR(10)

    ```


    You can change the number that is inside the brackets to the length that you would
    like to use. For a `CHAR` value with a length of 150, use this code:


    ```sql

    CHAR(150)

    ```


    **注意**：Values added to `CHAR` columns have space characters added to the right
    of the value to bring the length of the value up to the defined length of the
    `CHAR` column.


    #### VARCHAR2


    The `VARCHAR2` data type in Oracle also stores strings, or text values, like the
    `CHAR` data type. `VARCHAR2` is short for “variable character.” A maximum length
    is specified when you define a `VARCHAR2` column, which must be between 1 and
    4000, and represents the number of characters. However, the length is variable.
    This means that the values you store do not have space characters added to the
    end to meet the length you define.


    For example, if you declare a `VARCHAR2` column with a length of 10 bytes, then
    you can store a value of “Car” or “Fast Car.” When you store these values, spaces
    are not added, so the value of “Fast Car” is stored exactly as you enter it.


    `VARCHAR2` is one of the most common data types in my experience, so it’s one
    you’ll be using a lot.


    Why is it called `VARCHAR2` and not `VARCHAR`? This is because `VARCHAR` is an
    SQL standard data type and isn’t used in Oracle SQL. When Oracle wanted to implement
    their own version of `VARCHAR`, they created `VARCHAR2` rather than changing the
    way that `VARCHAR` works. This also means that they can implement the `VARCHAR`
    standard at some point in the future.


    Defining a `VARCHAR2` is similar to `CHAR`, where you specify the length inside
    brackets:


    ```sql

    VARCHAR2(20)

    ```


    This means a `VARCHAR2` data type is defined with a maximum length of 20 bytes.
    The difference between bytes and characters is subtle but important. A character
    is stored as bytes, and in many cases one byte is one character. However, there
    are some characters that require multiple bytes to be stored.


    #### NCHAR


    The `NCHAR` data type is short for “Unicode character.” It’s very similar to the
    `CHAR` data type, as it stores character data of a fixed length and adds spaces
    for shorter values to bring the value up to the length you have specified.


    However, it’s used for storing text values that contain Unicode characters. Unicode
    characters are a set of special characters that can be used in software. They
    have their own data type in Oracle, as they can often require more than one byte
    to store the character. Some examples of Unicode characters are:


    *   Mathematical characters, such as the Greek symbol that represents “sum”: Σ

    *   Many characters with accents: for example, â


    The standard characters that we are used to, such as the alphabet and symbols
    visible on a keyboard, can be stored in a single byte of data per character. This
    makes it possible to store in a `CHAR` data type, where one byte equals one character.


    For Unicode characters, it’s possible that a character needs to be stored in multiple
    bytes, so a special data type is needed. This means that if you want to store
    these special Unicode characters, and you need to store them in a fixed length,
    use `NCHAR` instead of `CHAR`.


    To define an `NCHAR` data type, specify the length in bytes inside brackets, just
    like the `CHAR` data type.


    ```sql

    NCHAR(30)

    ```


    This defines an `NCHAR` data type with a length of 30 bytes.'
