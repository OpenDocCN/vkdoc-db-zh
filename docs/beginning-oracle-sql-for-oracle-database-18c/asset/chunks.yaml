- fmt: '## Searching for Wildcard Characters


    In this chapter you’ve learned how to use the wildcard characters of `%` and `_`
    to look for records that partially match a value. These `%` and `_` characters
    are substituted with other characters when your query is run. However, what if
    the value in the column actually contained a `%` character or an `_` character?


    Let’s say that there is a value in your `employee` table that contained an underscore.
    The record with this may have been placed there by the application, perhaps during
    development, and you need to find out more about it. The record would look like
    this:


    ```

    ID   LAST_NAME            SALARY

    11   confirmation_needed  (null)

    ```


    The `last_name` of “confirmation_needed” isn’t a valid `last_name`. You want to
    write a query to find all `employees` where a `last_name` contains an underscore
    character. You could write this query:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%_%'';

    ```


    When you run this query, you’ll get this result:


    ```

    ID   LAST_NAME           SALARY

    1    JONES               20000

    2    SMITH               35000

    3    KING                40000

    4    SIMPSON             52000

    5    ANDERSON            31000

    11   confirmation_needed 0

    ```


    This shows all records in the table. The query is searching for ‘%_%’, which means
    “all characters, followed by one character, followed by all characters.” How can
    you search for all characters with an underscore? You’ll need to specify that
    the underscore should be treated like a value and not a wildcard character. This
    is done by *escaping* the character.


    Escaping a character means you want the character to be treated as part of the
    value in the column and not as a special symbol (such as a wildcard). Escaping
    a character is possible in many programming languages, including SQL. To escape
    a character in SQL, you’ll need to do two things:


    *   Specify a character immediately before the character you want to escape


    *   Specify in your `WHERE` clause what this escape character is


    A common character to use as an escape character is the backslash character ‘\’,
    because it’s rare this character is used in your data. If it is used, you can
    choose another character.


    To use an escape character in your query, you would write the query like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%\_%'' ESCAPE ''\'';

    ```


    This has two changes from the previous query. First, there is a \ character inside
    the string after the `LIKE` keyword. This character indicates that the following
    character (the underscore) is “escaped.” There is also a keyword added to the
    end of the `WHERE` clause: `ESCAPE` ‘\’. This means that the escape character
    is defined as the ‘\’ character. Without adding this `ESCAPE` keyword, Oracle
    won’t know what the ‘\’ means inside the `LIKE` string.


    The results of this updated query are:


    ```

    ID   LAST_NAME           SALARY

    11   confirmation_needed 0

    ```


    As you can see, the updated query will only show records where the `last_name`
    value contains an underscore.


    ## Performance


    Another thing to know about the `LIKE` keyword is that the performance of queries
    using this keyword is generally not very good.


    If you use an exact match, Oracle can usually scan all of the values you’re looking
    at in a column and find those that match. However, using a partial match with
    the `LIKE` keyword takes longer, as Oracle needs to look at each value and apply
    your criteria to it.


    We won’t go into the performance of Oracle SQL a lot in this book, but I wanted
    to point out that the `LIKE` keyword is not known for performing well. You should
    use it if it’s really what you need, and use other methods (such as “equal to”)
    if it can be done that way.


    ## Summary


    The `=` symbol and other symbols are used to perform exact matches or match the
    specified value exactly. In SQL, the alternative is a partial match, which matches
    on a part of a value. These parts of values can be specified with the `LIKE` keyword
    and using the wildcards of `%` and `_`.


    ## Applying Multiple Filters


    In the previous chapters, you’ve learned how to restrict the records you want
    to see. You looked at using symbols such as “equals to” and “greater than.” You
    also learned how to do partial matches using the `LIKE` keyword and wildcard characters.


    These concepts are useful to know. However, you may have noticed that we only
    filtered by one criteria in each query. We filtered based on a particular `last_name`
    value, or a particular `salary` value. What if we wanted to filter on two or more
    criteria?


    ## Why Use Multiple Filters?


    Why would you want to use multiple filters in an SQL query? It all depends on
    the type of query or the results you’re looking for. It might be OK to perform
    a single filter using the `WHERE` clause for the examples we are using, but when
    you work with a lot more data or have different results you want to show, then
    you’ll need to learn how to use multiple filters.


    Some examples could be:


    *   Finding all orders in a date range for a specific customer


    *   Finding all students who are active and in a specific state


    *   Finding all customers who ordered online and ordered more than a specific
    amount


    Each of these kinds of queries is looking at two or more criteria. You’ll learn
    how to do that with your example data.


    ## The AND Keyword


    SQL allows you to use more than one criteria in your `WHERE` clause to restrict
    the data to just the records you want to see. There are two ways of doing this.
    The first way is using the `AND` keyword .


    The `AND` keyword lets you specify two conditions in your `WHERE` clause. If a
    record meets both of the conditions, it is displayed. If a record meets zero or
    one of the conditions, then it is not displayed. The `AND` keyword is useful if
    you want to check for more than one criteria in your query and both of the criteria
    need to match for a row.


    Using the `AND` keyword looks like this:


    ```

    WHERE condition

    AND condition

    ```


    This can be broken down:


    *   It starts with the `WHERE` keyword to denote the beginning of the `WHERE`
    clause.


    *   `condition`: the condition that must be met for a row to be displayed (e.g.,
    `last_name = ''SMITH''`)


    *   `AND`: denotes that a second condition must also be met for a row.


    *   `condition`: as before, a condition that must be met for a row to be displayed


    Let’s see some examples of multiple conditions using the `AND` keyword.


    ### Finding Records That Match a Last Name and a Salary


    Let’s say you wanted to find records where a `last_name` contained the letter
    “S” and the `salary` was greater than 32000. Your query would look like this:


    ```

    SELECT id, last_name, salary

    FROM employee

    WHERE last_name LIKE ''%S%''

    AND salary > 32000;

    ```


    In this query, the `AND` is written on a new line to make it easier to read. The
    query will still run if you put the `AND` on the same line as `WHERE` (and you
    might prefer to write it that way). The results of this query would be:


    ```

    ID   LAST_NAME   SALARY

    2    SMITH       35000

    4    SIMPSON     52000

    ```


    This query shows records for `''SMITH''` and `''SIMPSON''`, as they both have
    a `salary` greater than 32000 and an “S” in their `last_name`. The records for
    `''JONES''` and `''ANDERSON''` both have an “S” in their `last_name`, but their
    `salary` is less than 32000. The record for `''KING''` has a `salary` greater
    than 32000 but does not have an “S” in the `last_name`. So, only `''SMITH''` and
    `''SIMPSON''` are shown.'
