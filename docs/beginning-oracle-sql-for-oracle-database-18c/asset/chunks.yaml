- fmt: '## Joins, Formatting, and Table Aliases


    In the earlier example, we added the `customer_meeting` table name to the `id`
    column so it was clear which column we meant in the `SELECT` clause. This meant
    that one column had the table name specified, but the others did not. The query
    ran, but looking at the query, it may not be easy to know which table each column
    comes from.


    ```sql

    SELECT customer_meeting.id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    There is a way you can improve the query. You can specify each table name along
    with the column name. Adding the table name is quite a lot of code to write, but
    the added code makes it clear which column comes from which table. For example:


    ```sql

    SELECT customer_meeting.id, customer_meeting.employee_id, customer_meeting.company,
    customer_meeting.meeting_date, employee.last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    Another thing to note is the formatting. When reading this query in the book,
    it may be easy to read. However, if we write the query in an IDE such as `SQL
    Developer`, the `SELECT` clause extends far to the right, as shown in Figure [18-1](#471705_1_En_18_Chapter.xhtml#Fig1).


    ![../images/471705_1_En_18_Chapter/471705_1_En_18_Fig1_HTML.jpg](Images/471705_1_En_18_Fig1_HTML.jpg)

    Figure 18-1. A query that has a long line


    Having the query extend far to the right makes the query hard to read, and you
    may need to scroll to the right to see the rest of the query. The good news is
    that `SQL` does not treat white space, such as new lines and spaces, any differently.
    This means that it’s commonly preferred to have each column in the `SELECT` clause
    on its own line, as in:


    ```sql

    SELECT

    customer_meeting.id,

    customer_meeting.employee_id,

    customer_meeting.company,

    customer_meeting.meeting_date,

    employee.last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    Writing a query like this takes up more lines than normal. However, it makes it
    easier to read the list of columns that are included. It also makes it easier
    to maintain, as you can add and remove columns easier. You also don’t need to
    scroll left and right in `SQL Developer`. Figure [18-2](#471705_1_En_18_Chapter.xhtml#Fig2)
    shows how the query fits the window more nicely.


    ![../images/471705_1_En_18_Chapter/471705_1_En_18_Fig2_HTML.jpg](Images/471705_1_En_18_Fig2_HTML.jpg)

    Figure 18-2. The same query on separate lines


    There is one more improvement you can make to our query. Earlier in this book
    we learned about table aliases, which are names you can give to your tables in
    a query. A great place to use them is in queries that have joins.


    You can apply table aliases to both the `customer_meeting` table and the `employee`
    table. For example, you can give the `customer_meeting` table an alias of "s"
    and the `employee` table an alias of "e". Here’s the version of the query showing
    how to alias the table names as I’ve just described:


    ```sql

    SELECT

    customer_meeting.id,

    customer_meeting.employee_id,

    customer_meeting.company,

    customer_meeting.meeting_date,

    employee.last_name

    FROM customer_meeting s

    JOIN employee e ON customer_meeting.employee_id = employee.id;

    ```


    The next step is to replace the mentions of the full table name next to each column
    with the alias. You can do this in both the join criteria and the `SELECT` clause.
    So, instead of `customer_meeting.id`, it would be `c.id`. Instead of `employee.last_name`,
    it would be `e.last_name`. For example:


    ```sql

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    JOIN employee e ON c.employee_id = e.id;

    ```


    This query is much smaller and easier to write than the earlier query. It’s also
    clear which table each column comes from, as you can see that the `c` table is
    `customer_meeting` and the `e` table is `employee`. It also avoids the ambiguous
    column error we saw earlier.


    If you run this query in `SQL Developer`, you’ll get these results:


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    You see the same results as earlier, but the query is a lot easier to read and
    write.


    Just to recap, after writing a query with a join, it’s a good idea to:

    * Specify the columns in the `SELECT` clause on separate lines

    * Add table aliases, and refer to those aliases in the `JOIN` criteria and the
    `SELECT` clause


    ## An INNER JOIN


    There are several different types of joins in `SQL`. The join type we just saw
    is an `inner join`. This means that the query we wrote only returns results that
    are related in both tables. The results did not include:

    * Any `customer_meetings` that did not have an employee record (there were none
    in the table anyway)

    * Any employees that did not have a sales meeting


    An `inner join` only returns results that match in both tables. Your `SELECT`
    query could have also used the `INNER JOIN` keyword instead of the `JOIN` keyword.
    Following is the same query, because `JOIN` is the same as `INNER JOIN` in `Oracle
    SQL`.


    ```sql

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    INNER JOIN employee e ON c.employee_id = e.id;

    ```


    So, if `INNER` is an optional keyword, should you specify it? I recommend that
    you do, because it makes it clear that you are asking for an `INNER JOIN` and
    not one of the other join types we’ll cover in a later chapter. But it’s up to
    you, as the query will still run if the `INNER` keyword is not used.


    Let’s add in a new record into the `customer_meeting` table, without an employee,
    to confirm the behavior of an `INNER JOIN`.


    ```sql

    INSERT INTO customer_meeting (id, employee_id, company, meeting_date) VALUES (3,
    NULL, ''WXC Services'', DATE''2018-08-23'');

    ```


    Once this query is run, the `customer_meeting` table will look like this:


    ```

    ID   EMPLOYEE_ID      COMPANY            MEETING_DATE

    1    5                ABC Construction   10/Aug/2018

    2    2                BW Signage         21/Aug/2018

    3    (null)           WXC Services       23/Aug/2018

    ```


    The new record does not have an associated employee. Now, run your `SELECT` query
    with the join from earlier in the chapter.


    ```sql

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    INNER JOIN employee e ON c.employee_id = e.id;

    ```


    The results are:


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    You can see that the `customer_meeting` record with an `id` of 3 is not shown.
    This is because there is no related record in the `employee` table, and because
    an `INNER JOIN` is used, the record is not shown. There are other join types that
    let you see this data, which we’ll learn about in later chapters.


    ## Summary


    A join is a feature in `SQL` that allows you to relate two or more tables to each
    other inside a single query, allowing you to display data from these tables without
    using other programming languages. A join criterion is needed, which specifies
    how the two tables are related.


    It’s good practice to display your `SELECT` columns on separate lines, and to
    use table aliases, to make it easier to read and edit your queries.


    The basic type of join we looked at is an `INNER JOIN`, which shows records that
    match in both tables. There are other join types, which we’ll look at in the next
    few chapters.


    # 19. Outer Join


    In the last chapter, we learned how to join tables together using the `JOIN` keyword.
    This was a type of join called an `outer join`, which displays records that exist
    in both tables being joined. The other type of join is an `outer join`.'
  raw: '## Joins, Formatting, and Table Aliases


    In the earlier example, we added the `customer_meeting` table name to the `id`
    column so it was clear which column we meant in the `SELECT` clause. This meant
    that one column had the table name specified, but the others did not. The query
    ran, but looking at the query, it may not be easy to know which table each column
    comes from.


    ```

    SELECT customer_meeting.id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    There is a way you can improve the query. You can specify each table name along
    with the column name. Adding the table name is quite a lot of code to write, but
    the added code makes it clear which column comes from which table. For example:


    ```

    SELECT customer_meeting.id, customer_meeting.employee_id, customer_meeting.company,
    customer_meeting.meeting_date, employee.last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    Another thing to note is the formatting. When reading this query in the book,
    it may be easy to read. However, if we write the query in an IDE such as SQL Developer,
    the `SELECT` clause extends far to the right, as shown in Figure [18-1](#471705_1_En_18_Chapter.xhtml#Fig1).


    ![../images/471705_1_En_18_Chapter/471705_1_En_18_Fig1_HTML.jpg](Images/471705_1_En_18_Fig1_HTML.jpg)


    Figure 18-1


    A query that has a long line


    Having the query extend far to the right makes the query hard to read, and you
    may need to scroll to the right to see the rest of the query. The good news is
    that SQL does not treat white space, such as new lines and spaces, any differently.
    This means that it’s commonly preferred to have each column in the `SELECT` clause
    on its own line, as in:


    ```

    SELECT

    customer_meeting.id,

    customer_meeting.employee_id,

    customer_meeting.company,

    customer_meeting.meeting_date,

    employee.last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    Writing a query like this takes up more lines than normal. However, it makes it
    easier to read the list of columns that are included. It also makes it easier
    to maintain, as you can add and remove columns easier. You also don’t need to
    scroll left and right in SQL Developer. Figure [18-2](#471705_1_En_18_Chapter.xhtml#Fig2)
    shows how the query fits the window more nicely.


    ![../images/471705_1_En_18_Chapter/471705_1_En_18_Fig2_HTML.jpg](Images/471705_1_En_18_Fig2_HTML.jpg)


    Figure 18-2


    The same query on separate lines


    There is one more improvement you can make to our query. Earlier in this book
    we learned about table aliases, which are names you can give to your tables in
    a query. A great place to use them is in queries that have joins.


    You can apply table aliases to both the `customer_meeting` table and the `employee`
    table. For example, you can give the `customer_meeting` table an alias of “s”
    and the `employee` table an alias of “e”. Here’s the version of the query showing
    how to alias the table names as I’ve just described:


    ```

    SELECT

    customer_meeting.id,

    customer_meeting.employee_id,

    customer_meeting.company,

    customer_meeting.meeting_date,

    employee.last_name

    FROM customer_meeting s

    JOIN employee e ON customer_meeting.employee_id = employee.id;

    ```


    The next step is to replace the mentions of the full table name next to each column
    with the alias. You can do this in both the join criteria and the `SELECT` clause.
    So, instead of `customer_meeting.id`, it would be `c.id`. Instead of `employee.last_name`,
    it would be `e.last_name`. For example:


    ```

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    JOIN employee e ON c.employee_id = e.id;

    ```


    This query is much smaller and easier to write than the earlier query. It’s also
    clear which table each column comes from, as you can see that the c table is `customer_meeting`
    and the e table is `employee`. It also avoids the ambiguous column error we saw
    earlier.


    If you run this query in SQL Developer, you’ll get these results:


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    You see the same results as earlier, but the query is a lot easier to read and
    write.


    Just to recap, after writing a query with a join, it’s a good idea to:


    *   Specify the columns in the SELECT clause on separate lines


    *   Add table aliases, and refer to those aliases in the JOIN criteria and the
    SELECT clause


    ## An INNER JOIN


    There are several different types of joins in SQL. The join type we just saw is
    an *inner join*. This means that the query we wrote only returns results that
    are related in both tables. The results did not include:


    *   Any customer_meetings that did not have an employee record (there were none
    in the table anyway)


    *   Any employees that did not have a sales meeting


    An inner join only returns results that match in both tables. Your `SELECT` query
    could have also used the `INNER JOIN` keyword instead of the `JOIN` keyword. Following
    is the same query, because `JOIN` is the same as `INNER JOIN` in Oracle SQL.


    ```

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    INNER JOIN employee e ON c.employee_id = e.id;

    ```


    So, if INNER is an optional keyword, should you specify it? I recommend that you
    do, because it makes it clear that you are asking for an `INNER JOIN` and not
    one of the other join types we’ll cover in a later chapter. But it’s up to you,
    as the query will still run if the `INNER` keyword is not used.


    Let’s add in a new record into the `customer_meeting` table, without an employee,
    to confirm the behavior of an `INNER JOIN`.


    ```

    INSERT INTO customer_meeting (id, employee_id, company, meeting_date) VALUES (3,
    NULL, ''WXC Services'', DATE''2018-08-23'');

    ```


    Once this query is run, the `customer_meeting` table will look like this:


    ```

    ID   EMPLOYEE_ID      COMPANY            MEETING_DATE

    1    5                ABC Construction   10/Aug/2018

    2    2                BW Signage         21/Aug/2018

    3    (null)           WXC Services       23/Aug/2018

    ```


    The new record does not have an associated employee. Now, run your `SELECT` query
    with the join from earlier in the chapter.


    ```

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    INNER JOIN employee e ON c.employee_id = e.id;

    ```


    The results are:


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    You can see that the `customer_meeting` record with an `id` of 3 is not shown.
    This is because there is no related record in the employee table, and because
    an `INNER JOIN` is used, the record is not shown. There are other join types that
    let you see this data, which we’ll learn about in later chapters.


    ## Summary


    A join is a feature in SQL that allows you to relate two or more tables to each
    other inside a single query, allowing you to display data from these tables without
    using other programming languages. A join criterion is needed, which specifies
    how the two tables are related.


    It’s good practice to display your `SELECT` columns on separate lines, and to
    use table aliases, to make it easier to read and edit your queries.


    The basic type of join we looked at is an `INNER JOIN`, which shows records that
    match in both tables. There are other join types, which we’ll look at in the next
    few chapters.


    # 19.  Outer Join


    In the last chapter, we learned how to join tables together using the `JOIN` keyword
    . This was a type of join called an *inner join*, which displays records that
    exist in both tables being joined. The other type of join is an *outer join*.'
  trans: '

    ## 连接、格式化与表别名


    在之前的例子中，我们将 `customer_meeting` 表名添加到 `id` 列，以便在 `SELECT` 子句中明确我们所指的列。这意味着只有一列指定了表名，而其他列没有。查询可以运行，但查看查询本身时，可能不容易知道每列来自哪个表。


    ```sql

    SELECT customer_meeting.id, employee_id, company, meeting_date, last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    有一种方法可以改进这个查询。你可以同时指定每个表的名称和列名。添加表名会多写不少代码，但这些额外的代码能清楚地表明每列来自哪个表。例如：


    ```sql

    SELECT customer_meeting.id, customer_meeting.employee_id, customer_meeting.company,
    customer_meeting.meeting_date, employee.last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    另一个需要注意的方面是格式。在书中阅读这个查询可能很容易。但是，如果我们在 `SQL Developer` 等 IDE 中编写查询，`SELECT` 子句会向右延伸得很长，如图
    18-1 所示。


    ![../images/471705_1_En_18_Chapter/471705_1_En_18_Fig1_HTML.jpg](img/471705_1_En_18_Fig1_HTML.jpg)

    图 18-1. 一个行长很长的查询


    查询向右延伸很长会使查询难以阅读，你可能需要向右滚动才能看到查询的其余部分。好消息是，`SQL` 不会区别对待空白字符，例如换行符和空格。这意味着通常更推荐将
    `SELECT` 子句中的每个列放在单独的行上，如下所示：


    ```sql

    SELECT

    customer_meeting.id,

    customer_meeting.employee_id,

    customer_meeting.company,

    customer_meeting.meeting_date,

    employee.last_name

    FROM customer_meeting

    JOIN employee ON customer_meeting.employee_id = employee.id;

    ```


    这样写查询会比正常情况占用更多行。然而，它使包含的列列表更易于阅读，也更易于维护，因为你可以更轻松地添加和删除列。你也不需要在 `SQL Developer`
    中左右滚动了。图 18-2 显示了查询如何更合适地适应窗口。


    ![../images/471705_1_En_18_Chapter/471705_1_En_18_Fig2_HTML.jpg](img/471705_1_En_18_Fig2_HTML.jpg)

    图 18-2. 相同查询分行显示


    我们的查询还有一个可以改进的地方。在本书前面，我们学习了表别名，即你可以在查询中给表起的名字。在涉及连接的查询中使用它们是一个很好的地方。


    你可以将表别名同时应用于 `customer_meeting` 表和 `employee` 表。例如，你可以给 `customer_meeting` 表一个别名
    "s"，给 `employee` 表一个别名 "e"。以下查询版本展示了如何按照我刚才描述的方式为表名起别名：


    ```sql

    SELECT

    customer_meeting.id,

    customer_meeting.employee_id,

    customer_meeting.company,

    customer_meeting.meeting_date,

    employee.last_name

    FROM customer_meeting s

    JOIN employee e ON customer_meeting.employee_id = employee.id;

    ```


    下一步是用别名替换每个列旁边提到的完整表名。你可以在连接条件和 `SELECT` 子句中都进行替换。所以，不是 `customer_meeting.id`，而是
    `c.id`。不是 `employee.last_name`，而是 `e.last_name`。例如：


    ```sql

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    JOIN employee e ON c.employee_id = e.id;

    ```


    这个查询比之前的查询更小，更容易编写。而且每列来自哪个表也很清楚，因为你可以看到 `c` 表是 `customer_meeting`，`e` 表是 `employee`。它也避免了我们之前看到的列名不明确的错误。


    如果你在 `SQL Developer` 中运行这个查询，会得到如下结果：


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    你看到的结果与之前相同，但查询却更容易阅读和编写了。


    总结一下，在编写带有连接的查询后，最好：

    *   在 `SELECT` 子句中将列指定在单独的行上

    *   添加表别名，并在 `JOIN` 条件和 `SELECT` 子句中引用这些别名


    ## 内连接 (INNER JOIN)


    `SQL` 中有几种不同类型的连接。我们刚刚看到的连接类型是 `内连接 (inner join)`。这意味着我们编写的查询只返回两个表中相关联的结果。结果不包括：

    *   任何没有员工记录的 `customer_meetings`（反正表里没有）

    *   任何没有销售会议的员工


    `内连接 (inner join)` 只返回两个表中都匹配的结果。你的 `SELECT` 查询也可以使用 `INNER JOIN` 关键字而不是 `JOIN`
    关键字。以下是相同的查询，因为在 `Oracle SQL` 中，`JOIN` 等同于 `INNER JOIN`。


    ```sql

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    INNER JOIN employee e ON c.employee_id = e.id;

    ```


    那么，如果 `INNER` 是一个可选的关键字，你是否应该指定它呢？我建议你指定，因为它能明确表示你要求的是一个 `INNER JOIN`，而不是我们将在后面章节介绍的其他连接类型之一。但这取决于你，因为即使不使用
    `INNER` 关键字，查询仍然会运行。


    让我们在 `customer_meeting` 表中添加一条没有员工的新记录，以确认 `INNER JOIN` 的行为。


    ```sql

    INSERT INTO customer_meeting (id, employee_id, company, meeting_date) VALUES (3,
    NULL, ''WXC Services'', DATE''2018-08-23'');

    ```


    运行此查询后，`customer_meeting` 表将如下所示：


    ```

    ID   EMPLOYEE_ID      COMPANY            MEETING_DATE

    1    5                ABC Construction   10/Aug/2018

    2    2                BW Signage         21/Aug/2018

    3    (null)           WXC Services       23/Aug/2018

    ```


    新记录没有关联的员工。现在，运行本章前面带有连接的 `SELECT` 查询。


    ```sql

    SELECT

    c.id,

    c.employee_id,

    c.company,

    c.meeting_date,

    e.last_name

    FROM customer_meeting c

    INNER JOIN employee e ON c.employee_id = e.id;

    ```


    结果是：


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    ```


    你可以看到，`id` 为 3 的 `customer_meeting` 记录没有显示出来。这是因为 `employee` 表中没有相关的记录，并且由于使用了
    `INNER JOIN`，该记录不会显示。还有其他连接类型可以让你看到这些数据，我们将在后面的章节中学习。


    ## 总结


    连接是 `SQL` 中的一个功能，它允许你在单个查询内部将两个或多个表关联起来，从而无需使用其他编程语言即可显示这些表中的数据。需要一个连接条件来指定两个表如何关联。


    将 `SELECT` 列显示在单独的行上并使用表别名是一个好习惯，这样可以使查询更易于阅读和编辑。


    我们研究的基本连接类型是 `内连接 (INNER JOIN)`，它显示两个表中都匹配的记录。还有其他连接类型，我们将在接下来的几章中探讨。


    # 19. 外连接


    在上一章中，我们学习了如何使用 `JOIN` 关键字将表连接在一起。这是一种称为 `外连接 (outer join)` 的连接类型，它显示被连接的两个表中都存在的记录。另一种连接类型是
    `外连接 (outer join)`。

    '
- fmt: '## What is an Outer Join?


    An outer join is where two tables are joined together, but if there is no related
    record in one of the tables, the data from the other table is still shown.


    Using our sample data and joining the `employee` table to the `customer_meeting`
    table, you saw `customer_meeting` and `employee` records. You didn’t see any `customer_meetings`
    that had no `employees`, or any `employees` that had no `customer_meetings`. This
    is what an inner join does.


    An outer join, on the other hand, will show all the data from one table and matching
    data from the other table, or a `NULL` value. It will show all `customer_meeting`
    records, and either the employee that is related or a `NULL` value if an employee
    is not related.


    An outer join is helpful if you want to show all records from a table and not
    exclude those just because there are no records in another table.


    There are three different types of outer joins:

    *   Left outer joins

    *   Right outer joins

    *   Full outer joins


    We’ll look at each of them in this chapter.


    ## Writing a Left Outer Join


    When you write a `SELECT` query that uses a `JOIN`, it’s helpful to think of the
    two tables involved as one being on the left and the other being on the right.
    The table mentioned first is the table on the left.


    We can represent a left outer join graphically as a Venn diagram, with each circle
    representing a table and the shaded area as the records that are found. Figure
    19-1 shows this Venn diagram.


    ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig1_HTML.jpg](Images/471705_1_En_19_Fig1_HTML.jpg)

    Figure 19-1: An Inner Join, with table1 on the left and table2 on the right


    Our example query from the last chapter used an `INNER JOIN`:

    ```sql

    SELECT

    s.id,

    s.employee_id,

    s.company,

    s.meeting_date,

    e.last_name

    FROM customer_meeting s

    INNER JOIN employee e ON s.employee_id = e.id;

    ```


    In this example the `customer_meeting` table is on the left and the `employee`
    table is on the right.


    For a `LEFT OUTER JOIN`, all of the records in the left table are shown. If there
    is a match from the right table, it is shown; otherwise, a `NULL` value is shown.


    In this example, if you use a `LEFT OUTER JOIN`, the query would show all of the
    `customer_meeting` records. It would show `employee last_name` values if a match
    was found, but otherwise show `NULL`.


    You can write a `LEFT OUTER JOIN` in the same way as an `INNER JOIN`. You just
    need to change the keyword from `JOIN` or `INNER JOIN` to `LEFT JOIN` or `LEFT
    OUTER JOIN`. The keyword `OUTER` is optional, so it’s up to you if you add it.


    A query that uses a `LEFT OUTER JOIN` would look like this:

    ```sql

    SELECT columns

    FROM table1

    LEFT [OUTER] JOIN table2 ON condition;

    ```


    You can adjust the example query from earlier to see it as a `LEFT JOIN`:

    ```sql

    SELECT

    s.id,

    s.employee_id,

    s.company,

    s.meeting_date,

    e.last_name

    FROM customer_meeting s

    LEFT JOIN employee e ON s.employee_id = e.id;

    ```


    The join criterion is still needed. You still need to specify how the data in
    the two tables is related, and in this case the `customer_meeting''s employee_id`
    is related to the `employee''s id` column.


    Our `LEFT JOIN` query will display the following results:

    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    3    (null)         WXC Services       23/Aug/2018    (null)

    ```


    These results show all of the records from the `customer_meeting` table. The results
    show both `ANDERSON` and `SMITH` for the first two employees, as the `customer_meeting`
    mentions employees 5 and 2 for their `employee_id` records. The third record has
    a `NULL employee_id`, and therefore a `NULL` `last_name` from the `employee` table.
    It is still shown, as we are using a `LEFT JOIN` and not an `INNER JOIN`.


    A left join is represented graphically, as shown in Figure 19-2.

    ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig2_HTML.jpg](Images/471705_1_En_19_Fig2_HTML.jpg)

    Figure 19-2: A Left Outer Join, with table1 on the left and table2 on the right


    ## Showing All Employees with a Left Outer Join


    Another example is this question: what if we wanted to see all employees, along
    with the `customer_meetings` they had, if any? We can do this using a `LEFT OUTER
    JOIN` as well.


    Let’s say we wanted to see the `id`, `last_name`, and `salary` of an employee,
    along with the `id`, `company`, and `meeting_date` of a `customer_meeting`. Our
    query could look like this:

    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    s.id,

    s.company,

    s.meeting_date

    FROM employee e

    INNER JOIN customer_meeting s ON e.id = s.employee_id;

    ```


    This query uses an `INNER JOIN`, and would show us the following information:

    ```

    ID   LAST_NAME    SALARY  ID   COMPANY           MEETING_DATE

    2    SMITH        35000   2    BW Signage        21/Aug/2018

    5    ANDERSON     31000   1    ABC Construction  10/Aug/2018

    ```


    It only shows us employees that have a `customer_meeting`. We want to see all
    employees, regardless of if they have a customer meeting.


    We can change our query to use a `LEFT JOIN` instead of an `INNER JOIN`, and include
    an `ORDER BY`:

    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    s.id,

    s.company,

    s.meeting_date

    FROM employee e

    LEFT JOIN customer_meeting s ON e.id = s.employee_id

    ORDER BY e.id;

    ```


    This will show the following results:

    ```

    ID  LAST_NAME   SALARY  ID      COMPANY           MEETING_DATE

    1   JONES       30000   (null)  (null)            (null)

    2   SMITH       35000   2       BW Signage        21/Aug/2018

    3   KING        45000   (null)  (null)            (null)

    4   SIMPSON     52000   (null)  (null)            (null)

    5   ANDERSON    31000   1       ABC Construction  10/Aug/2018

    6   COOPER      (null)  (null)  (null)            (null)

    7   (null)      (null)  (null)  (null)            (null)

    8   SMITH       62000   (null)  (null)            (null)

    9   PATRICK     40000   (null)  (null)            (null)

    ```


    It shows all of the `employee` records, along with any `customer_meeting` values
    if they exist. `NULL` values are shown for employees that have no `customer_meeting`
    values.'
  raw: '## What is an Outer Join?


    An outer join is where two tables are joined together, but if there is no related
    record in one of the tables, the data from the other table is still shown.


    Using our sample data and joining the `employee` table to the `customer_meeting`
    table, you saw `customer_meeting` and employee records. You didn’t see any `customer_meetings`
    that had no `employees`, or any `employees` that had no `customer_meetings`. This
    is what an inner join does.


    An outer join, on the other hand, will show all the data from one table and matching
    data from the other table, or a `NULL` value. It will show all `customer_meeting`
    records, and either the employee that is related or a `NULL` value if an employee
    is not related.


    An outer join is helpful if you want to show all records from a table and not
    exclude those just because there are no records in another table.


    There are three different types of outer joins:


    *   Left outer joins


    *   Right outer joins


    *   Full outer joins


    We’ll look at each of them in this chapter.


    ## Writing a Left Outer Join


    When you write a `SELECT` query that uses a `JOIN`, it’s helpful to think of the
    two tables involved as one being on the left and the other being on the right.
    The table mentioned first is the table on the left.


    We can represent a left outer join graphically as a Venn diagram, with each circle
    representing a table and the shaded area as the records that are found. Figure
    [19-1](#471705_1_En_19_Chapter.xhtml#Fig1) shows this Venn diagram.


    ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig1_HTML.jpg](Images/471705_1_En_19_Fig1_HTML.jpg)


    Figure 19-1


    An Inner Join, with table1 on the left and table2 on the right


    Our example query from the last chapter used an `INNER JOIN`:


    ```

    SELECT

    s.id,

    s.employee_id,

    s.company,

    s.meeting_date,

    e.last_name

    FROM customer_meeting s

    INNER JOIN employee e ON s.employee_id = e.id;

    ```


    In this example the `customer_meeting` table is on the left and the `employee`
    table is on the right.


    For a `LEFT OUTER JOIN`, all of the records in the left table are shown. If there
    is a match from the right table, it is shown; otherwise, a `NULL` value is shown.


    In this example, if you use a `LEFT OUTER JOIN`, the query would show all of the
    `customer_meeting` records. It would show `employee last_name` values if a match
    was found, but otherwise show `NULL`.


    You can write a `LEFT OUTER JOIN` in the same way as an `INNER JOIN`. You just
    need to change the keyword from `JOIN` or `INNER JOIN` to `LEFT JOIN` or `LEFT
    OUTER JOIN`. The keyword `OUTER` is optional, so it’s up to you if you add it.


    A query that uses a `LEFT OUTER JOIN` would look like this:


    ```

    SELECT columns

    FROM table1

    LEFT [OUTER] JOIN table2 ON condition;

    ```


    You can adjust the example query from earlier to see it as a `LEFT JOIN`:


    ```

    SELECT

    s.id,

    s.employee_id,

    s.company,

    s.meeting_date,

    e.last_name

    FROM customer_meeting s

    LEFT JOIN employee e ON s.employee_id = e.id;

    ```


    The join criterion is still needed. You still need to specify how the data in
    the two tables is related, and in this case the `customer_meeting''s employee_id`
    is related to the `employee''s id` column.


    Our LEFT JOIN query will display the following results:


    ```

    ID   EMPLOYEE_ID    COMPANY            MEETING_DATE   LAST_NAME

    1    5              ABC Construction   10/Aug/2018    ANDERSON

    2    2              BW Signage         21/Aug/2018    SMITH

    3    (null)         WXC Services       23/Aug/2018    (null)

    ```


    These results show all of the records from the `customer_meeting` table. The results
    show both ANDERSON and SMITH for the first two employees, as the `customer_meeting`
    mentions employees 5 and 2 for their `employee_id` records. The third record has
    a `NULL employee_id`, and therefore a `NULL` last_name from the employee table.
    It is still shown, as we are using a `LEFT JOIN` and not an `INNER JOIN`.


    A left join is represented graphically, as shown in Figure [19-2](#471705_1_En_19_Chapter.xhtml#Fig2).


    ![../images/471705_1_En_19_Chapter/471705_1_En_19_Fig2_HTML.jpg](Images/471705_1_En_19_Fig2_HTML.jpg)


    Figure 19-2


    A Left Outer Join, with table1 on the left and table2 on the right


    ## Showing All Employees with a Left Outer Join


    Another example is this question: what if we wanted to see all employees, along
    with the `customer_meetings` they had, if any? We can do this using a `LEFT OUTER
    JOIN` as well.


    Let’s say we wanted to see the `id`, `last_name`, and `salary` of an employee,
    along with the `id`, `company`, and `meeting_date` of a `customer_meeting`. Our
    query could look like this:


    ```

    SELECT

    e.id,

    e.last_name,

    e.salary,

    s.id,

    s.company,

    s.meeting_date

    FROM employee e

    INNER JOIN customer_meeting s ON e.id = s.employee_id;

    ```


    This query uses an `INNER JOIN`, and would show us the following information:


    ```

    ID   LAST_NAME    SALARY  ID   COMPANY           MEETING_DATE

    2    SMITH        35000   2    BW Signage        21/Aug/2018

    5    ANDERSON     31000   1    ABC Construction  10/Aug/2018

    ```


    It only shows us employees that have a `customer_meeting`. We want to see all
    employees, regardless of if they have a customer meeting.


    We can change our query to use a `LEFT JOIN` instead of an `INNER JOIN`, and include
    an `ORDER BY` :


    ```

    SELECT

    e.id,

    e.last_name,

    e.salary,

    s.id,

    s.company,

    s.meeting_date

    FROM employee e

    LEFT JOIN customer_meeting s ON e.id = s.employee_id

    ORDER BY e.id;

    ```


    This will show the following results:


    ```

    ID  LAST_NAME   SALARY  ID      COMPANY           MEETING_DATE

    1   JONES       30000   (null)  (null)            (null)

    2   SMITH       35000   2       BW Signage        21/Aug/2018

    3   KING        45000   (null)  (null)            (null)

    4   SIMPSON     52000   (null)  (null)            (null)

    5   ANDERSON    31000   1       ABC Construction  10/Aug/2018

    6   COOPER      (null)  (null)  (null)            (null)

    7   (null)      (null)  (null)  (null)            (null)

    8   SMITH       62000   (null)  (null)            (null)

    9   PATRICK     40000   (null)  (null)            (null)

    ```


    It shows all of the employee records, along with any `customer_meeting` values
    if they exist. `NULL` values are shown for employees that have no `customer_meeting`
    values.'
