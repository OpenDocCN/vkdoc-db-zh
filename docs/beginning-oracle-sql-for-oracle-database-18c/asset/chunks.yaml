    This means a `VARCHAR2` data type is defined with a maximum length of 20 bytes.
    The difference between bytes and characters is subtle but important. A character
    is stored as bytes, and in many cases one byte is one character. However, there
    are some characters that require multiple bytes to be stored.


    ### NCHAR


    The `NCHAR` data type is short for “Unicode character.” It’s very similar to the
    `CHAR` data type, as it stores character data of a fixed length and adds spaces
    for shorter values to bring the value up to the length you have specified.


    However, it’s used for storing text values that contain Unicode characters. Unicode
    characters are a set of special characters that can be used in software. They
    have their own data type in Oracle, as they can often require more than one byte
    to store the character. Some examples of Unicode characters are:


    *   Mathematical characters, such as the Greek symbol that represents “sum”: Σ


    *   Many characters with accents: for example, â


    The standard characters that we are used to, such as the alphabet and symbols
    visible on a keyboard, can be stored in a single byte of data per character. This
    makes it possible to store in a `CHAR` data type, where one byte equals one character.


    For Unicode characters, it’s possible that a character needs to be stored in multiple
    bytes, so a special data type is needed. This means that if you want to store
    these special Unicode characters, and you need to store them in a fixed length,
    use `NCHAR` instead of CHAR.


    To define an `NCHAR` data type, specify the length in bytes inside brackets, just
    like the `CHAR` data type.


    ```

    NCHAR(30)

    ```


    This defines an `NCHAR` data type with a length of 30 bytes.'
  trans: '

    ## 我们为什么需要不同的数据类型？


    当你创建一张表时，你指定了列名。这应该就是你需要做的全部事情了，对吧？那我们为什么要关心数据类型呢？存在不同数据类型的原因有几个。


    首先，它使得数据库能够更高效地存储数据。如果你将每张表的每一列都定义为最多 10,000 个字符的文本值，那么数据库就需要为这些情况预留那么多存储空间，无论你想存储
    10,000 个字符的情况有多么罕见。为你的每一列定义合适的数据类型将意味着数据库可以高效地存储数据。


    这也意味着你的查询会更快。将本应是数字的值存储为“数字”数据类型，意味着数据库可以更容易地搜索特定值（因为它知道字段的限制，例如是数字而不是字母）。如果值应该存储为数字而不是文本，这也意味着数学计算可以更容易、更快速地执行。


    使用合适的数据类型还可以防止无效数据。使用数据库存储数据的主要好处之一，就是你可以对数据存储施加限制。例如，存储一个“订单日期”可以存储为文本值，但这可能意味着你会得到像这样的值：

    *   30/01/2018

    *   01/30/2018

    *   30-Jan 2018

    *   40 Jan 2018

    *   124/Abc/1000


    其中一些值是没问题的，但另一些则不是。然而，如果我们将这个“订单日期”存储为日期值，那么我们就可以使用数据库内置的验证来检查无效日期。Oracle 数据库会知道“40
    Jan 2018”不是一个有效的日期，因此它不会存储这个值。这确保了你的数据保持高质量并防止错误。


    所以，总而言之，数据类型用于高效地存储数据、提高查询性能以及防止无效数据。


    ## 有哪些不同的数据类型？


    我们已经介绍了什么是数据类型以及为什么使用它们。那么存在哪些类型的数据类型，你如何使用它们呢？


    Oracle 数据库（以及许多其他数据库和编程语言）中的数据类型可以分为三组：文本、数字和日期。每一组都有一系列可以用于你的列的数据类型。


    ### 文本数据类型


    Oracle 中的文本数据类型用于存储文本值。它们可以用来存储字母字符、数字以及许多特殊字符。


    Oracle 提供了许多不同的数据类型来存储文本值，每种都有其特定的用途。让我们逐一了解一下。


    #### CHAR


    Oracle 有一种名为`CHAR`的数据类型，它是“character”（字符）的缩写。它存储字符串，这是一个编程术语，意思是“文本值”。这种数据类型以固定长度存储数据，这意味着无论实际存储的值是什么，该值占用的空间量都是相同的。


    当你指定一个`CHAR`列时，你需要指定一个长度值。这表示要在字段中存储的字符数，必须在 1 到 2000 之间。只要长度等于或短于这个数字，你可以在这个列中存储任何文本值。例如，一个长度为
    10 的`CHAR`列可以存储“Car”和“Fast Car”的值，但不能存储“Red Sports Car”，因为“Red Sports Car”长于 10
    个字符。


    关于`CHAR`主要要记住的是：小于你定义的长度的值，其右侧会被添加空格字符以满足该长度。这意味着如果你在一个长度为 10 的`CHAR`列中存储一个“Fast
    Car”的值，实际存储的值是“Fast Car  ”。末尾添加了两个空格以使长度达到 10。


    要将一个列定义为带有长度的`CHAR`，你使用单词`CHAR`，然后在括号内指定长度：


    ```sql

    CHAR(10)

    ```


    你可以更改括号内的数字为你想使用的长度。对于一个长度为 150 的`CHAR`值，使用此代码：


    ```sql

    CHAR(150)

    ```


    **注意**：添加到`CHAR`列的值会在其右侧添加空格字符，以使值的长度达到`CHAR`列定义的长度。


    #### VARCHAR2


    Oracle 中的`VARCHAR2`数据类型也存储字符串或文本值，与`CHAR`数据类型类似。`VARCHAR2`是“variable character”（可变字符）的缩写。在定义`VARCHAR2`列时需要指定一个最大长度，该长度必须在
    1 到 4000 之间，表示字符数。然而，这个长度是可变的。这意味着你存储的值不会在末尾添加空格字符来满足你定义的长度。


    例如，如果你声明一个长度为 10 字节的`VARCHAR2`列，那么你可以存储“Car”或“Fast Car”的值。当你存储这些值时，不会添加空格，所以“Fast
    Car”的值会按你输入的方式精确存储。


    根据我的经验，`VARCHAR2`是最常见的数据类型之一，所以你会经常用到它。


    为什么它叫`VARCHAR2`而不是`VARCHAR`？这是因为`VARCHAR`是一个 SQL 标准数据类型，未在 Oracle SQL 中使用。当 Oracle
    想要实现自己的`VARCHAR`版本时，他们创建了`VARCHAR2`，而不是改变`VARCHAR`的工作方式。这也意味着他们可以在未来的某个时间点实现`VARCHAR`标准。


    定义一个`VARCHAR2`与`CHAR`类似，你在括号内指定长度：


    ```sql

    VARCHAR2(20)

    ```


    这意味着定义了一个最大长度为 20 字节的`VARCHAR2`数据类型。字节和字符之间的区别细微但重要。一个字符存储为字节，在许多情况下，一个字节就是一个字符。然而，有些字符需要多个字节来存储。


    #### NCHAR


    `NCHAR`数据类型是“Unicode character”（Unicode 字符）的缩写。它与`CHAR`数据类型非常相似，因为它存储固定长度的字符数据，并为较短的值添加空格以使其达到你指定的长度。


    但是，它用于存储包含 Unicode 字符的文本值。Unicode 字符是软件中可以使用的一组特殊字符。它们在 Oracle 中有自己的数据类型，因为存储这些字符通常需要多于一个字节。Unicode
    字符的一些例子是：

    *   数学字符，例如表示“求和”的希腊符号：Σ

    *   许多带重音的字符：例如，â


    我们习惯的标准字符，例如字母表和键盘上可见的符号，每个字符可以存储在一个字节的数据中。这使得它们可以存储在`CHAR`数据类型中，因为一个字节等于一个字符。


    对于 Unicode 字符，一个字符可能需要存储在多个字节中，因此需要一个特殊的数据类型。这意味着，如果你想存储这些特殊的 Unicode 字符，并且需要将它们存储在固定长度中，请使用`NCHAR`而不是`CHAR`。


    要定义一个`NCHAR`数据类型，像`CHAR`数据类型一样，在括号内以字节为单位指定长度。


    ```sql

    NCHAR(30)

    ```


    这定义了一个长度为 30 字节的`NCHAR`数据类型。

    '
- fmt: '### NVARCHAR2


    `NVARCHAR2` 是 `VARCHAR2` 的 Unicode 版本。就像 `NCHAR` 数据类型一样，它允许存储 Unicode 字符，但它采用了
    `VARCHAR2` 的可变长度概念，这意味着您可以存储所需的值，而无需为其添加额外的空格字符。


    要定义 `NVARCHAR2` 数据类型，请在括号内指定长度，就像 `VARCHAR2` 数据类型一样。


    ```

    NVARCHAR2(200)

    ```


    这定义了一个长度为 200 字节的 `NVARCHAR2` 数据类型。


    下表总结了我们刚刚介绍的不同数据类型。


    |   | 定长（用空格填充） | 变长（最大长度） |

    | --- | --- | --- |

    | 标准字符 | `CHAR` | `VARCHAR2` |

    | Unicode 字符 | `NCHAR` | `NVARCHAR2` |


    如果您想知道应该使用哪种数据类型，我将在本章后面解释一些建议。


    #### LONG


    `LONG` 数据类型可用于存储长度高达 2GB 的文本值。`VARCHAR2` 的最大长度为 4000 字节，即 4KB。`LONG` 比这要大得多。


    但是，我不建议创建带有 `LONG` 数据类型的列，因为它已被 Oracle 弃用。这意味着 Oracle 已确定在未来版本中不会支持它，并且仅在最近的版本中包含它，以确保使用带有
    `LONG` 数据类型的旧代码的客户的数据库不会崩溃。


    如果您想在单个字段中存储大量数据，建议使用 `LOB` 数据类型，例如 `CLOB` 或 `BLOB`。我将在本章后面解释这些。


    ### RAW


    `RAW` 数据类型类似于 `VARCHAR2`，因为它存储可变长度字符串。但是，它以原始格式存储数据，这意味着在导出到另一种类型的数据库时不会进行转换。


    这不是我推荐使用的数据类型。如果您在系统之间进行大量转换，那么也许可以使用它，但还有其他更合适的文本数据类型。


    ### LONG RAW


    `LONG RAW` 数据类型是 `LONG` 数据类型和 `RAW` 数据类型的混合体。它允许存储大量数据（如 `LONG` 数据类型），并确保在导出数据到其他系统时字符不会被转换。


    然而，与 `LONG` 数据类型一样，`LONG RAW` 数据类型已被弃用，因此您不应使用它。应使用 `BLOB` 数据类型代替。


    ## 数字数据类型


    在 Oracle 中，有许多数据类型可用于存储数字值。虽然您可以将数字存储在基于文本的数据类型（如 `VARCHAR2`）中，但如果只存储数字，最好使用数字数据类型，因为：


    *   您可以对它们执行算术运算（例如，将年薪除以 12）。

    *   您可以将它们四舍五入到不同的小数位数。

    *   您可以使用 sum、average 和其他功能对它们进行聚合。


    让我们看看数字数据类型。


    ### NUMBER


    Oracle 中的 `NUMBER` 数据类型用于存储数字。它可以存储整数或小数、正数或负数。存储为 `NUMBER` 数据类型的值范围是从 -9 × 10^125
    到 9 × 10^125，这意味着数字大约有 125 位，可正可负。


    当您定义 `NUMBER` 数据类型时，可以定义两件事：精度和小数位数。


    *   精度是数字中的总位数。

    *   小数位数是小数点右边的位数。


    使用精度和小数位数的不同值组合，您可以存储正负小数以及整数。


    您可以通过在括号内指定精度和小数位数（`p` 代表精度，`s` 代表小数位数）来定义 `NUMBER` 数据类型：


    ```

    NUMBER(p, s)

    ```


    例如，要定义一个总位数为十位、小数位数为三位的数字，您可以这样写：


    ```

    NUMBER(10, 3)

    ```


    这意味着小数点左边有七位数字，右边有三位数字（例如，1234567.123）。


    ### INTEGER


    `INTEGER` 数据类型是 SQL 标准数据类型，这意味着它存在于所有 SQL 数据库中。然而，在 Oracle 中，它等同于定义 `NUMBER(38)`
    数据类型，即一个具有 38 位数字和 0 位小数位数的 `NUMBER`。


    因为 `INTEGER` 数据类型实际上被转换为 `NUMBER(38)` 数据类型，所以最好使用 `NUMBER`。如果您不想要 38 位数字，它允许您在值的大小上有更多的自由。它也更清楚地表示了它的含义。


    ### FLOAT


    Oracle 包含一个 `FLOAT` 数据类型，这是一个 ANSI 标准数据类型（意味着它在所有类型的 SQL 中都可用）。然而，就像 `INTEGER`
    一样，`FLOAT` 数据类型在 Oracle 数据库内部被转换为 `NUMBER`。


    因此，与其使用被转换为 `NUMBER` 的 `FLOAT` 数据类型，我建议直接使用 `NUMBER`。


    ### DECIMAL


    与 `FLOAT` 数据类型一样，Oracle 包含一个也是 ANSI 标准数据类型的 `DECIMAL` 数据类型。它也被 Oracle 数据库转换为 `NUMBER`
    数据类型。因此，我建议使用 `NUMBER` 数据类型而不是 `DECIMAL`。


    ### BINARY_FLOAT


    `BINARY_FLOAT` 数据类型用于存储浮点数，即包含小数位的数字。它类似于其他编程语言中的“float”数据类型。


    `BINARY_FLOAT` 与 `NUMBER` 数据类型有几个区别：


    *   `BINARY_FLOAT` 通常比 `NUMBER` 更快地执行算术计算。

    *   `BINARY_FLOAT` 通常比 `NUMBER` 占用更少的存储空间。

    *   `BINARY_FLOAT` 是近似定义，而 `NUMBER` 是精确定义。


    当存储 `BINARY_FLOAT` 值时，存储的是一个近似值。如果您对这个数字进行大量计算，这可能会导致舍入问题。然而，它适用于存储大的小数或浮点数。


    ### BINARY_DOUBLE


    `BINARY_DOUBLE` 数据类型与 `BINARY_FLOAT` 数据类型非常相似：


    *   它们都存储浮点数。

    *   它们都以近似的方式存储数字，而不是 `NUMBER` 那样的精确方式。


    然而，`BINARY_FLOAT` 是 32 位精度值，而 `BINARY_DOUBLE` 是 64 位精度值。这意味着它可以比 `BINARY_FLOAT`
    存储更多的小数位。如果您需要存储一个大的小数，并且 `BINARY_FLOAT` 无法处理，那么 `BINARY_DOUBLE` 可能是一个不错的选择。


    ## 日期数据类型


    最后一个主要的数据类型类别是日期数据类型。这些数据类型用于存储与日期和时间相关的任何内容。


    ### DATE


    `DATE` 数据类型允许您存储日期和时间值。是的，尽管它被称为 `DATE`，但它存储日期和时间。它存储年、月、日、小时、分钟和秒。Oracle SQL
    中没有 `DATETIME` 数据类型。


    如果您想存储日期和时间值，并且不需要存储时区或秒的小数部分（其他日期数据类型可以做到），则此数据类型很有用。


    关于 `DATE` 数据类型需要记住的一点是，该数据类型的默认显示格式仅显示日期（年、月、日），而不显示时间。这可能看起来令人困惑，因为值只显示日期，并且数据类型被称为
    `DATE`，但它确实包含时间。我们将在本书后面看到一些这方面的例子。


    ### TIMESTAMP


    Oracle 中的 `TIMESTAMP` 数据类型类似于 `DATE` 数据类型，但您可以存储秒的小数部分。您可以存储高达 9 的精度，这意味着一秒内有
    9 位小数。


    `TIMESTAMP` 允许比 `DATE` 数据类型更精细地记录时间。例如，如果您正在记录日志文件中的数据以查看某些事件发生的确切时间，那么秒的小数部分对您来说可能很重要。'
  raw: '### NVARCHAR2


    `NVARCHAR2` is the Unicode version of `VARCHAR2`. Just like the `NCHAR` data type,
    it allows for Unicode characters to be stored, but it uses the variable-length
    concept of `VARCHAR2`, which means you can store the value you want without having
    to add extra space characters to it.


    To define an `NVARCHAR2` data type, specify the length inside brackets, just like
    the `VARCHAR2` data type.


    ```

    NVARCHAR2(200)

    ```


    This defines an `NVARCHAR2` data type with a length of 200 bytes.


    This table summarizes the different data types we’ve just looked at.


    |   | Fixed Length (padded with spaces) | Variable Length (maximum length) |

    | --- | --- | --- |

    | Standard characters | CHAR | VARCHAR2 |

    | Unicode characters | NCHAR | NVARCHAR2 |


    If you’re wondering which data type you should use, I’ll explain some recommendations
    later in this chapter.


    #### LONG


    The `LONG` data type can be used to store text values up to 2GB in length. `VARCHAR2`
    had a maximum length of 4000 bytes, which represents 4KB. `LONG` is much larger
    than that.


    However, I don’t recommend creating columns with the `LONG` data type, as it has
    been deprecated by Oracle. This means that Oracle has determined it’s not something
    they will support in future releases and is only included in recent releases to
    ensure customers using old code with `LONG` data types won’t have their databases
    break.


    If you want to store a large amount of data in a single field, it’s recommended
    to use `LOB` data types, such as `CLOB` or `BLOB`. I’ll explain those later in
    this chapter.


    ### RAW


    The `RAW` data type is similar to `VARCHAR2`, as it stores a variable-length string.
    However, it stores data in a raw format, which means it does not get converted
    when exporting to another type of database.


    It’s not a data type I would recommend using. If you’re doing a lot of conversion
    between systems, then perhaps you can use it, but there are other text data types
    that are more suitable.


    ### LONG RAW


    The `LONG RAW` data type is a mix between the `LONG` data type and the `RAW` data
    type. It allows for a large amount of data to be stored (like the `LONG` data
    type), and it ensures characters are not converted when exporting data to other
    systems.


    However, like the `LONG` data type, the `LONG RAW` data type is deprecated, so
    you shouldn’t use it. The `BLOB` data type should be used instead.


    ## Number Data Types


    There are many data types that can be used to store number values in Oracle. While
    you can store numbers in text-based data types such as `VARCHAR2`, it’s better
    to use number data types if you’re storing just numbers because:


    *   You can perform arithmetic on them (e.g., dividing annual salary by 12).


    *   You can round them to a different number of decimal places.


    *   You can aggregate them using sum, average, and other features.


    Let’s take a look at the number data types.


    ### NUMBER


    The `NUMBER` data type in Oracle is used to store numbers. It can store either
    whole numbers or decimal numbers, positive or negative numbers. The range of a
    value stored as a `NUMBER` data type is from -9 × 10^125 to 9 × 10^125, which
    means numbers that are about 125 digits, positive or negative.


    When you define a `NUMBER` data type, you can define two things: a precision and
    a scale.


    *   Precision is the total number of digits in the number.


    *   Scale is the number of digits to the right of the decimal point.


    Using different combinations of values for precision and scale allows you to store
    positive and negative decimals and whole numbers.


    You can define a `NUMBER` data type by specifying the precision and scale inside
    brackets (`p` stands for precision, `s` stands for scale):


    ```

    NUMBER(p, s)

    ```


    For example, to define a number that has ten total digits, with three decimal
    places, you would write this:


    ```

    NUMBER(10, 3)

    ```


    This means there are seven digits to the left of the decimal and three to the
    right (e.g., 1234567.123).


    ### INTEGER


    The `INTEGER` data type is an SQL standard data type, which means it is in all
    SQL databases. However, in Oracle, it’s the same as defining a `NUMBER(38)` data
    type, which is a `NUMBER` with 38 digits and 0 decimal places.


    Because the `INTEGER` data type is actually translated to a `NUMBER(38)` data
    type, it’s better to use `NUMBER`. It allows you more freedom with the size of
    the value, if you don’t want a 38-digit number. It’s also clearer what it represents.


    ### FLOAT


    Oracle includes a `FLOAT` data type, which is an ANSI standard data type (meaning
    it is available in all types of SQL). However, just like `INTEGER`, the `FLOAT`
    data type is translated internally by the Oracle database to `NUMBER`.


    So, rather than using the `FLOAT` data type, which is translated to `NUMBER`,
    I would suggest just using `NUMBER`.


    ### DECIMAL


    Just like the `FLOAT` data type, Oracle includes a `DECIMAL` data type that is
    also an ANSI standard data type. It’s also translated to a `NUMBER` data type
    by the Oracle database. I would recommend using the `NUMBER` data type instead
    of `DECIMAL` for this reason.


    ### BINARY_FLOAT


    The `BINARY_FLOAT` data type is used for storing floating-point numbers, which
    are numbers that contain decimal places. It’s similar to “float” data types in
    other programming languages.


    There are a few differences between `BINARY_FLOAT` and the `NUMBER` data type:


    *   BINARY_FLOAT can often perform arithmetic calculations faster than NUMBER.


    *   BINARY_FLOAT is often smaller to store than NUMBER.


    *   BINARY_FLOAT is an approximate definition, where NUMBER is an exact definition


    When a `BINARY_FLOAT` value is stored, an approximate value is stored. This can
    cause rounding issues if you’re using many calculations on this number. However,
    it’s good for storing large decimal or floating-point numbers.


    ### BINARY_DOUBLE


    The `BINARY_DOUBLE` data type is very similar to the `BINARY_FLOAT` data type:


    *   They both store floating-point numbers.


    *   They both store numbers in an approximate way, rather than the exact way that
    NUMBER does.


    However, `BINARY_FLOAT` is a 32-bit precision value and `BINARY_DOUBLE` is a 64-bit
    precision value. This means it can store many more decimal places than `BINARY_FLOAT`.
    If you need to store a large decimal number, and `BINARY_FLOAT` cannot handle
    it, then `BINARY_DOUBLE` may be a good option.


    ## Date Data Types


    The final main category of data types is date data types. These data types are
    used to store anything that relates to dates and times.


    ### DATE


    The `DATE` data type allows you to store a date and time value. Yes, even though
    it’s called `DATE`, it stores both a date and a time. It stores year, month, day,
    hours, minutes, and seconds. There is no `DATETIME` data type in Oracle SQL.


    This data type is useful if you want to store date and time values, and don’t
    need to store time zones or fractions of seconds (which the other date data types
    do).


    One thing to remember with the `DATE` data type is that the default display format
    of this data type only shows the date (year, month, and day), and not the time.
    This may seem confusing, as the values only show a date and the data type is called
    `DATE` but it does include a time. We’ll see some examples of this later in this
    book.


    ### TIMESTAMP


    The `TIMESTAMP` data type in Oracle is similar to the `DATE` data type, except
    you can store fractions of a second. You can store up to a precision of 9, which
    means 9 decimal places within a second.


    `TIMESTAMP` allows for more granular recording of time than the `DATE` data type.
    For example, if you’re recording data in a log file to see exactly when certain
    events happen, perhaps fractions of a second is important to you.'
  trans: '

    ### NVARCHAR2


    `NVARCHAR2` 是 `VARCHAR2` 的 Unicode 版本。就像 `NCHAR` 数据类型一样，它允许存储 Unicode 字符，但它采用了
    `VARCHAR2` 的可变长度概念，这意味着您可以存储所需的值，而无需为其添加额外的空格字符。


    要定义 `NVARCHAR2` 数据类型，请在括号内指定长度，就像 `VARCHAR2` 数据类型一样。


    ```

    NVARCHAR2(200)

    ```


    这定义了一个长度为 200 字节的 `NVARCHAR2` 数据类型。


    下表总结了我们刚刚介绍的不同数据类型。


    |     | 定长（用空格填充） | 变长（最大长度） |

    | --- | --- | --- |

    | 标准字符 | `CHAR` | `VARCHAR2` |

    | Unicode 字符 | `NCHAR` | `NVARCHAR2` |


    如果您想知道应该使用哪种数据类型，我将在本章后面解释一些建议。


    #### LONG


    `LONG` 数据类型可用于存储长度高达 2GB 的文本值。`VARCHAR2` 的最大长度为 4000 字节，即 4KB。`LONG` 比这要大得多。


    但是，我不建议创建带有 `LONG` 数据类型的列，因为它已被 Oracle 弃用。这意味着 Oracle 已确定在未来版本中不会支持它，并且仅在最近的版本中包含它，以确保使用带有
    `LONG` 数据类型的旧代码的客户的数据库不会崩溃。


    如果您想在单个字段中存储大量数据，建议使用 `LOB` 数据类型，例如 `CLOB` 或 `BLOB`。我将在本章后面解释这些。


    ### RAW


    `RAW` 数据类型类似于 `VARCHAR2`，因为它存储可变长度字符串。但是，它以原始格式存储数据，这意味着在导出到另一种类型的数据库时不会进行转换。


    这不是我推荐使用的数据类型。如果您在系统之间进行大量转换，那么也许可以使用它，但还有其他更合适的文本数据类型。


    ### LONG RAW


    `LONG RAW` 数据类型是 `LONG` 数据类型和 `RAW` 数据类型的混合体。它允许存储大量数据（如 `LONG` 数据类型），并确保在导出数据到其他系统时字符不会被转换。


    然而，与 `LONG` 数据类型一样，`LONG RAW` 数据类型已被弃用，因此您不应使用它。应使用 `BLOB` 数据类型代替。


    ## 数字数据类型


    在 Oracle 中，有许多数据类型可用于存储数字值。虽然您可以将数字存储在基于文本的数据类型（如 `VARCHAR2`）中，但如果只存储数字，最好使用数字数据类型，因为：


    *   您可以对它们执行算术运算（例如，将年薪除以 12）。

    *   您可以将它们四舍五入到不同的小数位数。

    *   您可以使用 sum、average 和其他功能对它们进行聚合。


    让我们看看数字数据类型。


    ### NUMBER


    Oracle 中的 `NUMBER` 数据类型用于存储数字。它可以存储整数或小数、正数或负数。存储为 `NUMBER` 数据类型的值范围是从 -9 × 10¹²⁵
    到 9 × 10¹²⁵，这意味着数字大约有 125 位，可正可负。


    当您定义 `NUMBER` 数据类型时，可以定义两件事：精度和小数位数。


    *   精度是数字中的总位数。

    *   小数位数是小数点右边的位数。


    使用精度和小数位数的不同值组合，您可以存储正负小数以及整数。


    您可以通过在括号内指定精度和小数位数（`p` 代表精度，`s` 代表小数位数）来定义 `NUMBER` 数据类型：


    ```

    NUMBER(p, s)

    ```


    例如，要定义一个总位数为十位、小数位数为三位的数字，您可以这样写：


    ```

    NUMBER(10, 3)

    ```


    这意味着小数点左边有七位数字，右边有三位数字（例如，1234567.123）。


    ### INTEGER


    `INTEGER` 数据类型是 SQL 标准数据类型，这意味着它存在于所有 SQL 数据库中。然而，在 Oracle 中，它等同于定义 `NUMBER(38)`
    数据类型，即一个具有 38 位数字和 0 位小数位数的 `NUMBER`。


    因为 `INTEGER` 数据类型实际上被转换为 `NUMBER(38)` 数据类型，所以最好使用 `NUMBER`。如果您不想要 38 位数字，它允许您在值的大小上有更多的自由。它也更清楚地表示了它的含义。


    ### FLOAT


    Oracle 包含一个 `FLOAT` 数据类型，这是一个 ANSI 标准数据类型（意味着它在所有类型的 SQL 中都可用）。然而，就像 `INTEGER`
    一样，`FLOAT` 数据类型在 Oracle 数据库内部被转换为 `NUMBER`。


    因此，与其使用被转换为 `NUMBER` 的 `FLOAT` 数据类型，我建议直接使用 `NUMBER`。


    ### DECIMAL


    与 `FLOAT` 数据类型一样，Oracle 包含一个也是 ANSI 标准数据类型的 `DECIMAL` 数据类型。它也被 Oracle 数据库转换为 `NUMBER`
    数据类型。因此，我建议使用 `NUMBER` 数据类型而不是 `DECIMAL`。


    ### BINARY_FLOAT


    `BINARY_FLOAT` 数据类型用于存储浮点数，即包含小数位的数字。它类似于其他编程语言中的“float”数据类型。


    `BINARY_FLOAT` 与 `NUMBER` 数据类型有几个区别：


    *   `BINARY_FLOAT` 通常比 `NUMBER` 更快地执行算术计算。

    *   `BINARY_FLOAT` 通常比 `NUMBER` 占用更少的存储空间。

    *   `BINARY_FLOAT` 是近似定义，而 `NUMBER` 是精确定义。


    当存储 `BINARY_FLOAT` 值时，存储的是一个近似值。如果您对这个数字进行大量计算，这可能会导致舍入问题。然而，它适用于存储大的小数或浮点数。


    ### BINARY_DOUBLE


    `BINARY_DOUBLE` 数据类型与 `BINARY_FLOAT` 数据类型非常相似：


    *   它们都存储浮点数。

    *   它们都以近似的方式存储数字，而不是 `NUMBER` 那样的精确方式。


    然而，`BINARY_FLOAT` 是 32 位精度值，而 `BINARY_DOUBLE` 是 64 位精度值。这意味着它可以比 `BINARY_FLOAT`
    存储更多的小数位。如果您需要存储一个大的小数，并且 `BINARY_FLOAT` 无法处理，那么 `BINARY_DOUBLE` 可能是一个不错的选择。


    ## 日期数据类型


    最后一个主要的数据类型类别是日期数据类型。这些数据类型用于存储与日期和时间相关的任何内容。


    ### DATE


    `DATE` 数据类型允许您存储日期和时间值。是的，尽管它被称为 `DATE`，但它存储日期和时间。它存储年、月、日、小时、分钟和秒。Oracle SQL
    中没有 `DATETIME` 数据类型。


    如果您想存储日期和时间值，并且不需要存储时区或秒的小数部分（其他日期数据类型可以做到），则此数据类型很有用。


    关于 `DATE` 数据类型需要记住的一点是，该数据类型的默认显示格式仅显示日期（年、月、日），而不显示时间。这可能看起来令人困惑，因为值只显示日期，并且数据类型被称为
    `DATE`，但它确实包含时间。我们将在本书后面看到一些这方面的例子。


    ### TIMESTAMP


    Oracle 中的 `TIMESTAMP` 数据类型类似于 `DATE` 数据类型，但您可以存储秒的小数部分。您可以存储高达 9 的精度，这意味着一秒内有
    9 位小数。


    `TIMESTAMP` 允许比 `DATE` 数据类型更精细地记录时间。例如，如果您正在记录日志文件中的数据以查看某些事件发生的确切时间，那么秒的小数部分对您来说可能很重要。

    '
- fmt: '### TIMESTAMP WITH TIME ZONE


    `TIMESTAMP WITH TIME ZONE` 数据类型与 `TIMESTAMP` 数据类型类似，但它还包含时区信息。这意味着它包括年、月、日、时、分、秒、小数秒和时区。


    一个 `TIMESTAMP WITH TIME ZONE` 值的例子是：“2018-04-21 07:41:03.152 -7:00”。这表示2018年4月21日，上午7:41:03.152。它还表明该值与GMT/UTC相差-7小时。


    在数据库和软件中处理时区可能很困难。使用这种数据类型有助于以正确的方式存储数据。


    ### TIMESTAMP WITH LOCAL TIME ZONE


    `TIMESTAMP WITH LOCAL TIME ZONE` 与 `TIMESTAMP WITH TIME ZONE` 相似，因为它也存储日期、时间和时区。然而，当你从这种类型的列中
    `SELECT` 一个值时，该值会以用户的时区显示，而不是像 `TIMESTAMP WITH TIME ZONE` 数据类型那样以数据库的时区显示。


    这使得根据查看数据的用户，将数据转换到不同的时区变得更加容易。这看起来可能是一个非常特殊的情况，但如果你正在开发一个全球使用的系统，那么这种数据类型会非常有用。


    ### INTERVAL YEAR TO MONTH


    到目前为止，我们看到的日期数据类型用于存储一个“时间点”：一个特定的日期和时间。然而，有时需要存储一个“时间段”，例如“4年”或“2个月”。有几种方法可以做到这一点。


    你可以将其存储在 `NUMBER` 数据类型中，它代表要存储的月数。但是，如果你还想存储年份或天数呢？你可以创建几个不同的列来存储每个值（例如，一个年列和一个月列）。这意味着需要很多额外的列。这也意味着你可能存储一些无效的数据。


    这就是 `INTERVAL` 数据类型的用途。它们用于存储一个时间段。


    `INTERVAL YEAR TO MONTH` 数据类型用于存储年和月的数量。值之间用短横线分隔，所以“03-06”这个值表示3年6个月。


    使用这种数据类型的优势是：

    *   你可以将数据存储在一个列中，而不是两个列中，从而节省查询时间并节省数据库空间。

    *   它确保只允许有效的值。


    因此，如果你需要存储一个涉及年和月的时间段，这种数据类型很有用。


    ### INTERVAL DAY TO SECOND


    `INTERVAL DAY TO SECOND` 是另一种用于存储“时间段”的数据类型。它允许你存储天、小时、分钟和秒。


    例如，213天，14小时，28分钟和17秒的值显示为“213 14:28:17”。


    就像 `INTERVAL YEAR TO MONTH` 数据类型一样，它允许你将所有信息存储在一个列中。它也确保你只存储有效的数据。


    ## Other Data Types


    还有一些其他数据类型不属于文本/数字/日期数据类型。两个更常见的数据类型是 `BLOB` 和 `CLOB`。


    ### BLOB


    `BLOB` 数据类型代表“二进制大对象”。它用于存储非结构化的二进制对象。


    这意味着它对于存储无法保存在文本列中的图像或音频文件很有用。它存储单个文件的数据，但不能存储字符数据。其最大大小为4GB。


    ### CLOB


    `CLOB` 数据类型代表“字符大对象”。它与 `BLOB` 类似，但与 `BLOB` 不同，它存储字符数据而非二进制数据。


    它的最大大小也是4GB。它对于存储大的字符值很有用，但如果你想存储图像、音频或其他文件，则应使用 `BLOB`。


    ## Data Type Recommendations


    你已经了解了Oracle SQL中所有主要的数据类型。你如何知道应该使用哪些，尤其是对于那些相似的数据类型？


    以下是一些针对不同数据类型的建议：

    *   不要使用 `LONG` 或 `LONG RAW`，因为它们已弃用。应改用 `BLOB` 或 `CLOB`。

    *   `VARCHAR2` 可以替代 `CHAR`。我不知道有什么理由需要使用 `CHAR` 而不是 `VARCHAR2`。

    *   应该使用 `NUMBER` 而不是 `INTEGER`、`FLOAT` 或 `DECIMAL`。

    *   考虑二进制数字类型的优缺点，以决定使用 `BINARY_FLOAT` 还是 `NUMBER`。

    *   始终指定大小或精度。大多数数据类型允许你指定这个，但有默认值。最好明确指定你想要的大小，而不是依赖默认值。


    在接下来的几章中，你将看到一些使用这些数据类型的例子。


    ## Summary


    Oracle SQL中有许多不同的数据类型，允许你存储不同种类的值。数据类型的三个主要组是文本、数字和日期。这些组中有很多数据类型，它们都用于特定的原因，并有各自的优缺点。


    # 14. Creating a Table


    在本书前面，你创建了一个名为 `employee` 的新表并向其中添加了数据。你是使用SQL Developer中的菜单选项完成此操作的。还有另一种创建表的方法，我们将在本章中学习。


    ## Creating Tables Using SQL Code


    使用菜单选项创建表的替代方法是使用SQL代码。到目前为止，你学到的SQL代码允许你使用 `SELECT` 语句从现有表中读取数据。有一系列不同的SQL语句可以使用，其中一种就是用于创建表。


    为什么你会使用SQL代码而不是菜单选项来创建表呢？有几个原因。


    你可能无法访问SQL Developer。虽然它是一个简单的下载和设置程序，但如果你在公司处理他们的数据库，你可能无法访问此程序。创建表的唯一方法将是运行一条SQL语句。


    另一个原因是，如果创建表是一个更大流程中的一个步骤。可以一个接一个地运行多条SQL语句，而无需你为每条语句都按“运行”按钮。这在你作为数据库开发人员或数据库管理员工作时很常见。使用SQL代码创建表允许你做到这一点。


    你可能也在使用不同的程序来运行SQL。我最近调查了有多少种不同的IDE可以用于Oracle数据库，发现有超过三十种！其中有一小部分是公司更常用的，而菜单选项可能并非在每个IDE中都可用。使用SQL语句创建表在所有这些程序中都是被接受的。


    那么，如何使用SQL语句创建表呢？你使用 `CREATE TABLE` 语句。


    ## The CREATE TABLE Statement


    SQL有一个名为 `CREATE TABLE` 的语句，它允许你在数据库上创建一个新表。与许多SQL语句一样，它用于创建基本表时很简单，但它有很多你将来可能想使用的高级选项。在本章中，我们将重点介绍如何创建一个基本表。


    `CREATE TABLE` 语句如下所示：


    ```

    CREATE TABLE tablename (

    column_1 data_type,

    column_2 data_type,

    ...

    column_n  data_type

    );

    ```


    你可能已经注意到它看起来与 `SELECT` 语句大不相同。关于 `CREATE TABLE` 语句有几点需要注意：

    *   它以 `CREATE TABLE` 开头。可以用小写书写，但为了遵循代码标准，我建议将SQL关键字大写。

    *   然后你指定表名。表名长度最多为30个字符。

    *   然后是一个左括号。

    *   在左括号内是你指定表中要有的列的地方。

    *   对于每一列，你指定一个名称和一个数据类型。使用逗号分隔每个列定义。

    *   添加完所有列后，以右括号和分号结束。


    一旦你编写了这样一条语句，你运行它，表就会在数据库上创建。我们将看几个这条语句的例子。'
  raw: '### TIMESTAMP WITH TIME ZONE


    The `TIMESTAMP WITH TIME ZONE` data type is like the `TIMESTAMP` data type, but
    also includes a time zone. This means it includes year, month, day, hours, minutes,
    seconds, fractional seconds, and time zone.


    An example of a `TIMESTAMP WITH TIME ZONE` value is: “2018-04-21 07:41:03.152
    -7:00.” This is the 21st of April 2018, at 7:41:03.152 in the morning. It also
    indicates that the value is -7 hours from GMT/UTC.


    Dealing with time zones in databases and in software can be hard. Using this data
    type can help with storing the data in the right way.


    ### TIMESTAMP WITH LOCAL TIME ZONE


    The `TIMESTAMP WITH LOCAL TIME ZONE` is similar to the `TIMESTAMP WITH TIME ZONE`,
    in that it stores a date, time, and time zone. However, when you `SELECT` a value
    from this type of column, the value is displayed in the user’s time zone, instead
    of the database’s time zone like the `TIMESTAMP WITH TIME ZONE` data type.


    This makes it easier to convert data to a different time zone depending on the
    user that’s viewing it. It might seem like a very specific case, but if you’re
    working on a system that is used around the world, then this data type can be
    very useful.


    ### INTERVAL YEAR TO MONTH


    The date data types we have looked at so far are used to store a “point in time”:
    a specific date and a specific time. However, there is sometimes a need to store
    a “period of time” such as “4 years” or “2 months.” There are a few ways this
    could be done.


    You could store it in a `NUMBER` data type, which represents the number of months
    you want to store. However, what if you also want to store years, or days? You
    could create a few different columns to store each value (e.g., a year column
    and a month column). This would mean a lot of extra columns. It would also mean
    you could store some invalid data.


    This is where the `INTERVAL` data types come in. They are used to store a period
    of time.


    The `INTERVAL YEAR TO MONTH` data type is used to store a number of years and
    months. The value is separated by a dash, so a value of “03-06” represents 3 years
    6 months.


    The advantages of using this data type are:


    *   You can store the data in a single column, and not two columns, saving time
    with your queries and saving space on the database.


    *   It ensures only valid values are allowed.


    So, if you need to store a period of time involving years and months, this data
    type is useful.


    ### INTERVAL DAY TO SECOND


    The `INTERVAL DAY TO SECOND` is another data type used to store a “period of time.”
    It allows you store days, hours, minutes, and seconds.


    For example, a value of 213 days, 14 hours, 28 minutes and 17 seconds is displayed
    as “213 14:28:17.”


    Just like the `INTERVAL YEAR TO MONTH` data type, it allows you to store all of
    this information in a single column. It also ensures you store only valid data.


    ## Other Data Types


    There are a few other data types that don’t fit into the text/number/date data
    types. The two more common data types are `BLOB` and `CLOB`.


    ### BLOB


    The `BLOB` data type stands for “binary large object.” It’s used to store unstructured
    binary objects.


    This means it’s useful for storing images or audio files that can’t be stored
    in text columns. It stores data for a single file, but it can’t store character
    data. It has a maximum size of 4GB.


    ### CLOB


    The `CLOB` data type stands for “character large object.” It’s similar to `BLOB`,
    but unlike `BLOB` it stores character data and not binary data.


    It also has a maximum size of 4GB. It’s useful for storing large character values,
    but if you want to store images or audio or other files, then a `BLOB` would be
    used.


    ## Data Type Recommendations


    You’ve seen all of the major data types available in Oracle SQL. How do you know
    which ones you should use, especially for data types that are similar?


    Here are some recommendations for different data types:


    *   Don’t use LONG or LONG RAW, as these are deprecated. Use BLOB or CLOB instead.


    *   VARCHAR2 can be used instead of CHAR. I don’t know of a reason to use CHAR
    instead of VARCHAR2.


    *   NUMBER should be used instead of INTEGER, FLOAT, or DECIMAL.


    *   Consider the advantages and disadvantages of the binary number types, to decide
    whether or not BINARY_FLOAT or NUMBER should be used.


    *   Always specify the size or precision. Most data types allow you to specify
    this but have a default value. It’s better to be specific with the size you want
    rather than rely on defaults.


    In the next few chapters, you’ll see some examples of these data types being used.


    ## Summary


    There are many different data types in Oracle SQL, which allow you to store different
    kinds of values. The three main groups of data types are text, number, and date.
    There are many data types in each of these groups, which are all used for specific
    reasons and have their own advantages and disadvantages.


    # 14. Creating a Table


    Earlier in this book, you created a new table called `employee` and added data
    to it. You did this using the menu options within SQL Developer. There is another
    way to create tables, which we will learn about in this chapter.


    ## Creating Tables Using SQL Code


    An alternative to creating tables using the menu options is to use SQL code. The
    SQL code you’ve learned so far allows you to read data from an existing table
    using the `SELECT` statement. There is a range of different SQL statements that
    can be used, and one of them is for creating a table.


    Why would you create a table using SQL code instead of using the menu options?
    There are a few reasons.


    You may not have access to SQL Developer. While it was a simple program to download
    and set up, if you’re working for a company on their database, you may not have
    access to this program. The only way to create a table would be to run an SQL
    statement.


    Another reason is if creating a table is a step within a larger process. Multiple
    SQL statements can be run, one after the other, without you having to press a
    “Run” button for each statement. This is common when you’re working as a database
    developer or database administrator. Using SQL code to create a table allows you
    to do this.


    You may also be using a different program for running SQL. I recently looked into
    how many different IDEs exist that work on Oracle database and found over thirty!
    There’s a subset of those that are more commonly used by companies, and using
    menu options may not be available in each of them. Using an SQL statement to create
    a table is accepted in all of these programs.


    So how can you create a table using an SQL statement? You use the `CREATE TABLE`
    statement.


    ## The CREATE TABLE Statement


    SQL has a statement called `CREATE TABLE`, which lets you create a new table on
    the database. As with many SQL statements, it’s simple to use for creating a basic
    table, but it has a lot of advanced options you may want to use in the future.
    In this chapter, we’ll focus on creating a basic table.


    A `CREATE TABLE` statement looks like this:


    ```

    CREATE TABLE tablename (

    column_1 data_type,

    column_2 data_type,

    ...

    column_n  data_type

    );

    ```


    You might have noticed it looks quite different to a `SELECT` statement. There
    are a few things to note about the `CREATE TABLE` statement:


    *   It starts with CREATE TABLE. It can be written in lower case, but in order
    to keep to the code standards I recommend putting SQL keywords in upper case.


    *   You then specify the table name. This can be up to 30 characters.


    *   You then have an open bracket.


    *   Inside the open brackets is where you specify the columns you want the table
    to have.


    *   For each column, you specify a name and a data type. A comma is used to separate
    each column specification.


    *   After adding all of the columns, you end with a closing bracket and a semicolon.


    Once you write one of these statements, you run the statement, and the table is
    then created on the database. We’ll look at a few examples of this statement.'
  trans: '

    ### 带时区的时间戳 (TIMESTAMP WITH TIME ZONE)


    `TIMESTAMP WITH TIME ZONE` 数据类型与 `TIMESTAMP` 数据类型类似，但它还包含时区信息。这意味着它包括年、月、日、时、分、秒、小数秒和时区。


    一个 `TIMESTAMP WITH TIME ZONE` 值的例子是：“2018-04-21 07:41:03.152 -7:00”。这表示 2018 年
    4 月 21 日，上午 7:41:03.152。它还表明该值与 GMT/UTC 相差-7 小时。


    在数据库和软件中处理时区可能很困难。使用这种数据类型有助于以正确的方式存储数据。


    ### 带本地时区的时间戳 (TIMESTAMP WITH LOCAL TIME ZONE)


    `TIMESTAMP WITH LOCAL TIME ZONE` 与 `TIMESTAMP WITH TIME ZONE` 相似，因为它也存储日期、时间和时区。然而，当你从这种类型的列中
    `SELECT` 一个值时，该值会以用户的时区显示，而不是像 `TIMESTAMP WITH TIME ZONE` 数据类型那样以数据库的时区显示。


    这使得根据查看数据的用户，将数据转换到不同的时区变得更加容易。这看起来可能是一个非常特殊的情况，但如果你正在开发一个全球使用的系统，那么这种数据类型会非常有用。


    ### 年月间隔 (INTERVAL YEAR TO MONTH)


    到目前为止，我们看到的日期数据类型用于存储一个“时间点”：一个特定的日期和时间。然而，有时需要存储一个“时间段”，例如“4 年”或“2 个月”。有几种方法可以做到这一点。


    你可以将其存储在 `NUMBER` 数据类型中，它代表要存储的月数。但是，如果你还想存储年份或天数呢？你可以创建几个不同的列来存储每个值（例如，一个年列和一个月列）。这意味着需要很多额外的列。这也意味着你可能存储一些无效的数据。


    这就是 `INTERVAL` 数据类型的用途。它们用于存储一个时间段。


    `INTERVAL YEAR TO MONTH` 数据类型用于存储年和月的数量。值之间用短横线分隔，所以“03-06”这个值表示 3 年 6 个月。


    使用这种数据类型的优势是：

    *   你可以将数据存储在一个列中，而不是两个列中，从而节省查询时间并节省数据库空间。

    *   它确保只允许有效的值。


    因此，如果你需要存储一个涉及年和月的时间段，这种数据类型很有用。


    ### 日秒间隔 (INTERVAL DAY TO SECOND)


    `INTERVAL DAY TO SECOND` 是另一种用于存储“时间段”的数据类型。它允许你存储天、小时、分钟和秒。


    例如，213 天，14 小时，28 分钟和 17 秒的值显示为“213 14:28:17”。


    就像 `INTERVAL YEAR TO MONTH` 数据类型一样，它允许你将所有信息存储在一个列中。它也确保你只存储有效的数据。


    ## 其他数据类型


    还有一些其他数据类型不属于文本/数字/日期数据类型。两个更常见的数据类型是 `BLOB` 和 `CLOB`。


    ### 二进制大对象 (BLOB)


    `BLOB` 数据类型代表“二进制大对象”。它用于存储非结构化的二进制对象。


    这意味着它对于存储无法保存在文本列中的图像或音频文件很有用。它存储单个文件的数据，但不能存储字符数据。其最大大小为 4GB。


    ### 字符大对象 (CLOB)


    `CLOB` 数据类型代表“字符大对象”。它与 `BLOB` 类似，但与 `BLOB` 不同，它存储字符数据而非二进制数据。


    它的最大大小也是 4GB。它对于存储大的字符值很有用，但如果你想存储图像、音频或其他文件，则应使用 `BLOB`。


    ## 数据类型建议


    你已经了解了 Oracle SQL 中所有主要的数据类型。你如何知道应该使用哪些，尤其是对于那些相似的数据类型？


    以下是一些针对不同数据类型的建议：

    *   不要使用 `LONG` 或 `LONG RAW`，因为它们已弃用。应改用 `BLOB` 或 `CLOB`。

    *   `VARCHAR2` 可以替代 `CHAR`。我不知道有什么理由需要使用 `CHAR` 而不是 `VARCHAR2`。

    *   应该使用 `NUMBER` 而不是 `INTEGER`、`FLOAT` 或 `DECIMAL`。

    *   考虑二进制数字类型的优缺点，以决定使用 `BINARY_FLOAT` 还是 `NUMBER`。

    *   始终指定大小或精度。大多数数据类型允许你指定这个，但有默认值。最好明确指定你想要的大小，而不是依赖默认值。


    在接下来的几章中，你将看到一些使用这些数据类型的例子。


    ## 总结


    Oracle SQL 中有许多不同的数据类型，允许你存储不同种类的值。数据类型的三个主要组是文本、数字和日期。这些组中有很多数据类型，它们都用于特定的原因，并有各自的优缺点。


    # 14. 创建表


    在本书前面，你创建了一个名为 `employee` 的新表并向其中添加了数据。你是使用 SQL Developer 中的菜单选项完成此操作的。还有另一种创建表的方法，我们将在本章中学习。


    ## 使用 SQL 代码创建表


    使用菜单选项创建表的替代方法是使用 SQL 代码。到目前为止，你学到的 SQL 代码允许你使用 `SELECT` 语句从现有表中读取数据。有一系列不同的 SQL
    语句可以使用，其中一种就是用于创建表。


    为什么你会使用 SQL 代码而不是菜单选项来创建表呢？有几个原因。


    你可能无法访问 SQL Developer。虽然它是一个简单的下载和设置程序，但如果你在公司处理他们的数据库，你可能无法访问此程序。创建表的唯一方法将是运行一条
    SQL 语句。


    另一个原因是，如果创建表是一个更大流程中的一个步骤。可以一个接一个地运行多条 SQL 语句，而无需你为每条语句都按“运行”按钮。这在你作为数据库开发人员或数据库管理员工作时很常见。使用
    SQL 代码创建表允许你做到这一点。


    你可能也在使用不同的程序来运行 SQL。我最近调查了有多少种不同的 IDE 可以用于 Oracle 数据库，发现有超过三十种！其中有一小部分是公司更常用的，而菜单选项可能并非在每个
    IDE 中都可用。使用 SQL 语句创建表在所有这些程序中都是被接受的。


    那么，如何使用 SQL 语句创建表呢？你使用 `CREATE TABLE` 语句。


    ## CREATE TABLE 语句


    SQL 有一个名为 `CREATE TABLE` 的语句，它允许你在数据库上创建一个新表。与许多 SQL 语句一样，它用于创建基本表时很简单，但它有很多你将来可能想使用的高级选项。在本章中，我们将重点介绍如何创建一个基本表。


    `CREATE TABLE` 语句如下所示：


    ```

    CREATE TABLE tablename (

    column_1 data_type,

    column_2 data_type,

    ...

    column_n  data_type

    );

    ```


    你可能已经注意到它看起来与 `SELECT` 语句大不相同。关于 `CREATE TABLE` 语句有几点需要注意：

    *   它以 `CREATE TABLE` 开头。可以用小写书写，但为了遵循代码标准，我建议将 SQL 关键字大写。

    *   然后你指定表名。表名长度最多为 30 个字符。

    *   然后是一个左括号。

    *   在左括号内是你指定表中要有的列的地方。

    *   对于每一列，你指定一个名称和一个数据类型。使用逗号分隔每个列定义。

    *   添加完所有列后，以右括号和分号结束。


    一旦你编写了这样一条语句，你运行它，表就会在数据库上创建。我们将看几个这条语句的例子。

    '
- fmt: "## Our Employee Table\n\nIn the earlier chapters, we created a new table called\
    \ `employee`. We used the menu options inside SQL Developer for this, as shown\
    \ in Figure [14-1](#471705_1_En_14_Chapter.xhtml#Fig1).\n\n![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig1_HTML.jpg](Images/471705_1_En_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1 The employee table\n\nWhat would this look like as a `CREATE TABLE`\
    \ statement? If we wanted to create this employee table using the `CREATE TABLE`\
    \ statement instead, it would look like this:\n\n```sql\nCREATE TABLE employee\
    \ (\n    id NUMBER,\n    last_name VARCHAR2(20),\n    salary NUMBER\n);\n```\n\
    \nThe table has been named `employee`. It’s written in lowercase, as that’s the\
    \ standard I like to stick to (writing table names in lowercase). Oracle actually\
    \ stores the table names in upper case, so according to the database you’ll have\
    \ the same result if you write `employee` or `EMPLOYEE`.\n\nThe first column shown\
    \ is `id`. I also prefer to write column names in lower case. The data type of\
    \ this was `NUMBER`, and then a comma is added because we want to add another\
    \ column to this table.\n\nThe second column is `last_name`. This has a data type\
    \ of `VARCHAR2`, which is a text data type that we covered in the last chapter.\
    \ This `VARCHAR2` has a 20 in brackets after it. This is how you specify length\
    \ or size or precision for many data types, and for `VARCHAR2` data types this\
    \ number represents the maximum number of characters allowed in this column. So,\
    \ for the `last_name` in this table, you can store up to 20 bytes.\n\nFinally,\
    \ we have the `salary` column, which is also a number. You can see that both the\
    \ `id` and `salary` columns just say `NUMBER` with no value in brackets. By not\
    \ including a value, a default value is used, which means the value is stored\
    \ as you enter it. The default size of a `NUMBER` data type is 38. It’s usually\
    \ better to specify a size for each variable so it’s clear how big you expect\
    \ it to be.\n\nThis example was based on a table we already created. If we try\
    \ to run this statement in SQL Developer, we’ll get an error saying that the table\
    \ already exists. This is because we can’t have two tables with the same name.\n\
    \nLet’s look at another example that has a different name.\n\n## Storing Office\
    \ Details\n\nLet’s say we wanted to expand our database to store more information.\
    \ We want to store data about the different offices that our company has, where\
    \ they are located, and which employees work in them. To do this, we will create\
    \ a new table.\n\nWhy can’t we just store this information in the `employee` table?\
    \ Let’s try that and see what happens.\n\nIn SQL, you can alter existing tables\
    \ to add new columns, which we will learn about in a later chapter. Let’s say\
    \ that we have added a new column to our `employee` table called `office`, which\
    \ looks like this:\n\n| ID | LAST_NAME | SALARY | OFFICE |\n| --- | --- | ---\
    \ | --- |\n| 1 | JONES | 20000 |   |\n| 2 | SMITH | 35000 |   |\n| 3 | KING |\
    \ 40000 |   |\n| 4 | SIMPSON | 52000 |   |\n| 5 | ANDERSON | 31000 |   |\n| 6\
    \ | COOPER | (null) |   |\n| 7 | (null) | (null) |   |\n| 8 | SMITH | 62000 |\
    \   |\n| 9 | PATRICK | 40000 |   |\n\nNow, you can try to add data to this table,\
    \ by adding information to this `office` column.\n\n| ID | LAST_NAME | SALARY\
    \ | OFFICE |\n| --- | --- | --- | --- |\n| 1 | JONES | 20000 | 123 Main Street\
    \ |\n| 2 | SMITH | 35000 | 45 Smith Street |\n| 3 | KING | 40000 | Level 2, 10\
    \ Clark Street |\n| 4 | SIMPSON | 52000 | 205 Capital Road |\n| 5 | ANDERSON |\
    \ 31000 | 123 Main Street |\n| 6 | COOPER | (null) | 12 Main Street |\n| 7 | (null)\
    \ | (null) | Level 2, 10 Clark Street |\n| 8 | SMITH | 62000 | Level 1, 10 Clark\
    \ Street |\n| 9 | PATRICK | 40000 | 123 Main St |\n\nThis might seem OK. We store\
    \ the address, and sometimes a building level, in this column. We can see some\
    \ employees work in the same office as other employees.\n\nHowever, look at the\
    \ records with an ID of 5, 6, and 9.\n\n| ID | LAST_NAME | SALARY | OFFICE |\n\
    | --- | --- | --- | --- |\n| 5 | ANDERSON | 31000 | 123 Main Street |\n| 6 | COOPER\
    \ | (null) | 12 Main Street |\n| 9 | PATRICK | 40000 | 123 Main St |\n\nThe `office`\
    \ values look similar. Are they the same? Is COOPER’s office of 12 Main Street\
    \ the same as ANDERSON’s office of 123 Main Street and they just mistyped the\
    \ street number? Is PATRICK’s office the same as ANDERSON’s office, but typed\
    \ St instead of Street? It’s easy to get confused with this kind of setup.\n\n\
    Another issue can arise when we update data. Let’s say we have updated the `office`\
    \ for SMITH from 45 Smith Street to be 123 Main Street.\n\n| ID | LAST_NAME |\
    \ SALARY | OFFICE |\n| --- | --- | --- | --- |\n| 1 | JONES | 20000 | 123 Main\
    \ Street |\n| 2 | SMITH | 35000 | 123 Main Street |\n| 3 | KING | 40000 | Level\
    \ 2, 10 Clark Street |\n| 4 | SIMPSON | 52000 | 205 Capital Road |\n| 5 | ANDERSON\
    \ | 31000 | 123 Main Street |\n| 6 | COOPER | (null) | 12 Main Street |\n| 7 |\
    \ (null) | (null) | Level 2, 10 Clark Street |\n| 8 | SMITH | 62000 | Level 1,\
    \ 10 Clark Street |\n| 9 | PATRICK | 40000 | 123 Main St |\n\nWhat does this mean?\
    \ Does it mean that SMITH has moved from the 45 Smith Street office to the 123\
    \ Main Street office? If so, does the 45 Smith Street office still exist in the\
    \ company? According to this table, it doesn’t, as it’s not listed in that column.\n\
    \nThis is called a `delete anomaly` and is an issue when designing databases that\
    \ should be avoided. A `delete anomaly` is where you update a row to refer to\
    \ a different value, and all record of the previous value existing is lost. This\
    \ is something we want to avoid.\n\nAnother issue that may appear is called an\
    \ `update anomaly`. Let’s say we changed ANDERSON’s office from 123 Main Street\
    \ to 123 Main Street South.\n\n| ID | LAST_NAME | SALARY | OFFICE |\n| --- | ---\
    \ | --- | --- |\n| 1 | JONES | 20000 | 123 Main Street |\n| 2 | SMITH | 35000\
    \ | 123 Main Street |\n| 3 | KING | 40000 | Level 2, 10 Clark Street |\n| 4 |\
    \ SIMPSON | 52000 | 205 Capital Road |\n| 5 | ANDERSON | 31000 | 123 Main Street\
    \ South |\n| 6 | COOPER | (null) | 12 Main Street |\n| 7 | (null) | (null) | Level\
    \ 2, 10 Clark Street |\n| 8 | SMITH | 62000 | Level 1, 10 Clark Street |\n| 9\
    \ | PATRICK | 40000 | 123 Main St |\n\nDoes this mean that ANDERSON has moved\
    \ to a new office at 123 Main Street South? Or, does it mean that the 123 Main\
    \ Street office no longer exists and has moved to 123 Main Street South? Or, does\
    \ it mean that the city council has renamed Main Street to Main Street South,\
    \ but it’s actually the same office and location for the company?\n\nWe can see\
    \ there are several other employees with the 123 Main Street office, which may\
    \ or may not be correct. If you intended to update all occurrences of this office,\
    \ but some have been missed, then there can be a problem. This is called an `update\
    \ anomaly` and should be avoided.\n\nThere’s an area of software development called\
    \ `database design`, or `relational database design`, which introduces a process\
    \ called `normalization`. This process is followed to ensure your database is\
    \ structured in an efficient way to avoid these errors.\n\nFor our example, we\
    \ can avoid all of these issues if we store the details of our office in a separate\
    \ table. This is because we actually want to store two different things:\n\n*\
    \   A list of all offices in the company\n*   A record of which employees work\
    \ at which offices\n\nThese are captured in two different ways."
  raw: '## Our Employee Table


    In the earlier chapters, we created a new table called `employee`. We used the
    menu options inside SQL Developer for this, as shown in Figure [14-1](#471705_1_En_14_Chapter.xhtml#Fig1).


    ![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig1_HTML.jpg](Images/471705_1_En_14_Fig1_HTML.jpg)


    Figure 14-1


    The employee table


    What would this look like as a `CREATE TABLE` statement? If we wanted to create
    this employee table using the `CREATE TABLE` statement instead, it would look
    like this:


    ```

    CREATE TABLE employee (

    id NUMBER,

    last_name VARCHAR2(20),

    salary NUMBER

    );

    ```


    The table has been named `employee`. It’s written in lowercase, as that’s the
    standard I like to stick to (writing table names in lowercase). Oracle actually
    stores the table names in upper case, so according to the database you’ll have
    the same result if you write employee or EMPLOYEE.


    The first column shown is `id`. I also prefer to write column names in lower case.
    The data type of this was `NUMBER`, and then a comma is added because we want
    to add another column to this table.


    The second column is `last_name`. This has a data type of `VARCHAR2`, which is
    a text data type that we covered in the last chapter. This `VARCHAR2` has a 20
    in brackets after it. This is how you specify length or size or precision for
    many data types, and for `VARCHAR2` data types this number represents the maximum
    number of characters allowed in this column. So, for the last_name in this table,
    you can store up to 20 bytes.


    Finally, we have the `salary` column, which is also a number. You can see that
    both the `id` and `salary` columns just say `NUMBER` with no value in brackets.
    By not including a value, a default value is used, which means the value is stored
    as you enter it. The default size of a `NUMBER` data type is 38\. It’s usually
    better to specify a size for each variable so it’s clear how big you expect it
    to be.


    This example was based on a table we already created. If we try to run this statement
    in SQL Developer, we’ll get an error saying that the table already exists. This
    is because we can’t have two tables with the same name.


    Let’s look at another example that has a different name.


    ## Storing Office Details


    Let’s say we wanted to expand our database to store more information. We want
    to store data about the different offices that our company has, where they are
    located, and which employees work in them. To do this, we will create a new table.


    Why can’t we just store this information in the `employee` table? Let’s try that
    and see what happens.


    In SQL, you can alter existing tables to add new columns, which we will learn
    about in a later chapter. Let’s say that we have added a new column to our `employee`
    table called `office`, which looks like this:


    | ID | LAST_NAME | SALARY | OFFICE |

    | --- | --- | --- | --- |

    | 1 | JONES | 20000 |   |

    | 2 | SMITH | 35000 |   |

    | 3 | KING | 40000 |   |

    | 4 | SIMPSON | 52000 |   |

    | 5 | ANDERSON | 31000 |   |

    | 6 | COOPER | (null) |   |

    | 7 | (null) | (null) |   |

    | 8 | SMITH | 62000 |   |

    | 9 | PATRICK | 40000 |   |


    Now, you can try to add data to this table, by adding information to this office
    column.


    | ID | LAST_NAME | SALARY | OFFICE |

    | --- | --- | --- | --- |

    | 1 | JONES | 20000 | 123 Main Street |

    | 2 | SMITH | 35000 | 45 Smith Street |

    | 3 | KING | 40000 | Level 2, 10 Clark Street |

    | 4 | SIMPSON | 52000 | 205 Capital Road |

    | 5 | ANDERSON | 31000 | 123 Main Street |

    | 6 | COOPER | (null) | 12 Main Street |

    | 7 | (null) | (null) | Level 2, 10 Clark Street |

    | 8 | SMITH | 62000 | Level 1, 10 Clark Street |

    | 9 | PATRICK | 40000 | 123 Main St |


    This might seem OK. We store the address, and sometimes a building level, in this
    column. We can see some employees work in the same office as other employees.


    However, look at the records with an ID of 5, 6, and 9.


    | ID | LAST_NAME | SALARY | OFFICE |

    | --- | --- | --- | --- |

    | 5 | ANDERSON | 31000 | 123 Main Street |

    | 6 | COOPER | (null) | 12 Main Street |

    | 9 | PATRICK | 40000 | 123 Main St |


    The `office` values look similar. Are they the same? Is COOPER’s office of 12
    Main Street the same as ANDERSON’s office of 123 Main Street and they just mistyped
    the street number? Is PATRICK’s office the same as ANDERSON’s office, but typed
    St instead of Street? It’s easy to get confused with this kind of setup.


    Another issue can arise when we update data. Let’s say we have updated the `office`
    for SMITH from 45 Smith Street to be 123 Main Street.


    | ID | LAST_NAME | SALARY | OFFICE |

    | --- | --- | --- | --- |

    | 1 | JONES | 20000 | 123 Main Street |

    | 2 | SMITH | 35000 | 123 Main Street |

    | 3 | KING | 40000 | Level 2, 10 Clark Street |

    | 4 | SIMPSON | 52000 | 205 Capital Road |

    | 5 | ANDERSON | 31000 | 123 Main Street |

    | 6 | COOPER | (null) | 12 Main Street |

    | 7 | (null) | (null) | Level 2, 10 Clark Street |

    | 8 | SMITH | 62000 | Level 1, 10 Clark Street |

    | 9 | PATRICK | 40000 | 123 Main St |


    What does this mean? Does it mean that SMITH has moved from the 45 Smith Street
    office to the 123 Main Street office? If so, does the 45 Smith Street office still
    exist in the company? According to this table, it doesn’t, as it’s not listed
    in that column.


    This is called a *delete anomaly* and is an issue when designing databases that
    should be avoided. A delete anomaly is where you update a row to refer to a different
    value, and all record of the previous value existing is lost. This is something
    we want to avoid.


    Another issue that may appear is called an “update anomaly.” Let’s say we changed
    ANDERSON’s office from 123 Main Street to 123 Main Street South.


    | ID | LAST_NAME | SALARY | OFFICE |

    | --- | --- | --- | --- |

    | 1 | JONES | 20000 | 123 Main Street |

    | 2 | SMITH | 35000 | 123 Main Street |

    | 3 | KING | 40000 | Level 2, 10 Clark Street |

    | 4 | SIMPSON | 52000 | 205 Capital Road |

    | 5 | ANDERSON | 31000 | 123 Main Street South |

    | 6 | COOPER | (null) | 12 Main Street |

    | 7 | (null) | (null) | Level 2, 10 Clark Street |

    | 8 | SMITH | 62000 | Level 1, 10 Clark Street |

    | 9 | PATRICK | 40000 | 123 Main St |


    Does this mean that ANDERSON has moved to a new office at 123 Main Street South?
    Or, does it mean that the 123 Main Street office no longer exists and has moved
    to 123 Main Street South? Or, does it mean that the city council has renamed Main
    Street to Main Street South, but it’s actually the same office and location for
    the company?


    We can see there are several other employees with the 123 Main Street office,
    which may or may not be correct. If you intended to update all occurrences of
    this office, but some have been missed, then there can be a problem. This is called
    an *update anomaly* and should be avoided.


    There’s an area of software development called *database design*, or *relational
    database design* , which introduces a process called *normalization* . This process
    is followed to ensure your database is structured in an efficient way to avoid
    these errors.


    For our example, we can avoid all of these issues if we store the details of our
    office in a separate table. This is because we actually want to store two different
    things:


    *   A list of all offices in the company


    *   A record of which employees work at which offices


    These are captured in two different ways.'
  trans: "\n## 我们的员工表\n\n在前面的章节中，我们创建了一个名为 `employee` 的新表。我们使用了 SQL Developer 内部的菜单选项来完成此操作，如图\
    \ 14-1 所示。\n\n![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig1_HTML.jpg](img/471705_1_En_14_Fig1_HTML.jpg)\n\
    \n图 14-1 员工表\n\n如果用 `CREATE TABLE` 语句来表示，会是什么样子呢？如果我们想使用 `CREATE TABLE` 语句来创建这个员工表，它将是这样的：\n\
    \n```sql\nCREATE TABLE employee (\n    id NUMBER,\n    last_name VARCHAR2(20),\n\
    \    salary NUMBER\n);\n```\n\n该表被命名为 `employee`。我用小写书写，因为这是我倾向于遵循的标准（用小写书写表名）。Oracle\
    \ 实际上是以大写形式存储表名的，因此根据数据库，无论你写 `employee` 还是 `EMPLOYEE`，结果都是一样的。\n\n显示的第一个列是 `id`。我也倾向于用小写书写列名。它的数据类型是\
    \ `NUMBER`，后面加了一个逗号，因为我们想向这个表添加另一个列。\n\n第二列是 `last_name`。它的数据类型是 `VARCHAR2`，这是我们在上一章介绍过的一种文本数据类型。这个\
    \ `VARCHAR2` 后面括号里有一个 20。这是你为许多数据类型指定长度、大小或精度的方式，对于 `VARCHAR2` 数据类型，这个数字表示该列允许的最大字符数。所以，对于这个表中的\
    \ `last_name`，你最多可以存储 20 个字节。\n\n最后，我们有 `salary` 列，它也是一个数字。你可以看到 `id` 和 `salary`\
    \ 列都只写了 `NUMBER`，括号里没有值。通过不包含一个值，就会使用一个默认值，这意味着值会按你输入的方式存储。`NUMBER` 数据类型的默认大小是\
    \ 38。通常最好为每个变量指定一个大小，这样可以明确你期望它有多大。\n\n这个例子是基于我们已经创建的一个表。如果我们尝试在 SQL Developer\
    \ 中运行这个语句，会得到一个错误，提示表已存在。这是因为我们不能有两个同名的表。\n\n让我们看另一个不同名字的例子。\n\n## 存储办公室详细信息\n\
    \n假设我们想扩展我们的数据库以存储更多信息。我们想存储关于公司不同办公室的数据，它们位于哪里，以及哪些员工在里面工作。为此，我们将创建一个新表。\n\n\
    为什么我们不能把这些信息存储在 `employee` 表中呢？让我们试试看会发生什么。\n\n在 SQL 中，你可以修改现有的表来添加新列，我们将在后面的章节中学习。假设我们已经在\
    \ `employee` 表中添加了一个名为 `office` 的新列，如下所示：\n\n| ID | LAST_NAME | SALARY | OFFICE\
    \ |\n| --- | --- | --- | --- |\n| 1 | JONES | 20000 |   |\n| 2 | SMITH | 35000\
    \ |   |\n| 3 | KING | 40000 |   |\n| 4 | SIMPSON | 52000 |   |\n| 5 | ANDERSON\
    \ | 31000 |   |\n| 6 | COOPER | (null) |   |\n| 7 | (null) | (null) |   |\n| 8\
    \ | SMITH | 62000 |   |\n| 9 | PATRICK | 40000 |   |\n\n现在，你可以尝试通过向这个 `office`\
    \ 列添加信息来向此表添加数据。\n\n| ID | LAST_NAME | SALARY | OFFICE |\n| --- | --- | --- |\
    \ --- |\n| 1 | JONES | 20000 | 123 Main Street |\n| 2 | SMITH | 35000 | 45 Smith\
    \ Street |\n| 3 | KING | 40000 | Level 2, 10 Clark Street |\n| 4 | SIMPSON | 52000\
    \ | 205 Capital Road |\n| 5 | ANDERSON | 31000 | 123 Main Street |\n| 6 | COOPER\
    \ | (null) | 12 Main Street |\n| 7 | (null) | (null) | Level 2, 10 Clark Street\
    \ |\n| 8 | SMITH | 62000 | Level 1, 10 Clark Street |\n| 9 | PATRICK | 40000 |\
    \ 123 Main St |\n\n这看起来可能没问题。我们将地址，有时是建筑物楼层，存储在这个列中。我们可以看到一些员工与其他员工在同一个办公室工作。\n\
    \n然而，看看 ID 为 5、6 和 9 的记录。\n\n| ID | LAST_NAME | SALARY | OFFICE |\n| --- | ---\
    \ | --- | --- |\n| 5 | ANDERSON | 31000 | 123 Main Street |\n| 6 | COOPER | (null)\
    \ | 12 Main Street |\n| 9 | PATRICK | 40000 | 123 Main St |\n\n`office` 的值看起来很相似。它们是相同的吗？COOPER\
    \ 的办公室 12 Main Street 和 ANDERSON 的办公室 123 Main Street 是同一个吗？只是街道号码打错了？PATRICK\
    \ 的办公室和 ANDERSON 的办公室是同一个，只是把 Street 缩写成了 St？在这种设置下很容易混淆。\n\n另一个问题可能出现在我们更新数据时。假设我们将\
    \ SMITH 的 `office` 从 45 Smith Street 更新为 123 Main Street。\n\n| ID | LAST_NAME\
    \ | SALARY | OFFICE |\n| --- | --- | --- | --- |\n| 1 | JONES | 20000 | 123 Main\
    \ Street |\n| 2 | SMITH | 35000 | 123 Main Street |\n| 3 | KING | 40000 | Level\
    \ 2, 10 Clark Street |\n| 4 | SIMPSON | 52000 | 205 Capital Road |\n| 5 | ANDERSON\
    \ | 31000 | 123 Main Street |\n| 6 | COOPER | (null) | 12 Main Street |\n| 7 |\
    \ (null) | (null) | Level 2, 10 Clark Street |\n| 8 | SMITH | 62000 | Level 1,\
    \ 10 Clark Street |\n| 9 | PATRICK | 40000 | 123 Main St |\n\n这意味着什么？这是否意味着 SMITH\
    \ 已从 45 Smith Street 的办公室搬到了 123 Main Street 的办公室？如果是这样，45 Street Street 的办公室在公司还存在吗？根据这个表，它不存在了，因为它没有被列在那一列中。\n\
    \n这被称为 `删除异常`，是设计数据库时应避免的问题。`删除异常` 是指你更新一行以引用不同的值，而关于先前值存在的所有记录都丢失了。这是我们想要避免的。\n\
    \n另一个可能出现的问题称为 `更新异常`。假设我们将 ANDERSON 的办公室从 123 Main Street 更改为 123 Main Street\
    \ South。\n\n| ID | LAST_NAME | SALARY | OFFICE |\n| --- | --- | --- | --- |\n\
    | 1 | JONES | 20000 | 123 Main Street |\n| 2 | SMITH | 35000 | 123 Main Street\
    \ |\n| 3 | KING | 40000 | Level 2, 10 Clark Street |\n| 4 | SIMPSON | 52000 |\
    \ 205 Capital Road |\n| 5 | ANDERSON | 31000 | 123 Main Street South |\n| 6 |\
    \ COOPER | (null) | 12 Main Street |\n| 7 | (null) | (null) | Level 2, 10 Clark\
    \ Street |\n| 8 | SMITH | 62000 | Level 1, 10 Clark Street |\n| 9 | PATRICK |\
    \ 40000 | 123 Main St |\n\n这是否意味着 ANDERSON 已经搬到了 123 Main Street South 的新办公室？或者，这是否意味着\
    \ 123 Main Street 的办公室不复存在，已搬迁至 123 Main Street South？或者，这是否意味着市议会已将 Main Street\
    \ 更名为 Main Street South，但实际上对于公司来说是同一个办公室和位置？\n\n我们可以看到还有其他几位员工使用 123 Main Street\
    \ 办公室，这可能正确也可能不正确。如果你打算更新此办公室的所有出现位置，但有些被遗漏了，那么就可能出现问题。这被称为 `更新异常`，应该避免。\n\n有一个称为\
    \ `数据库设计` 或 `关系数据库设计` 的软件开发领域，它引入了一个称为 `规范化` 的过程。遵循此过程是为了确保你的数据库结构高效，以避免这些错误。\n\
    \n对于我们的例子，如果我们把办公室的详细信息存储在一个单独的表中，就可以避免所有这些问题。这是因为我们实际上想要存储两件不同的事情：\n\n*   公司所有办公室的列表\n\
    *   哪些员工在哪些办公室工作的记录\n\n这些信息以两种不同的方式捕获。\n"
- fmt: "# The Office Table\n\nLet’s create our `office` table. We want the `office`\
    \ table to include an `ID` and an `address`.\n\nOur `CREATE TABLE()` statement\
    \ would look like this:\n\n```sql\nCREATE TABLE office (\nid,\naddress\n);\n```\n\
    \nBefore we can create this, we need to specify data types and sizes. For our\
    \ `ID` column, this will be a whole number. We can use the `NUMBER` data type,\
    \ and for our example we can use a size of 5. This will handle numbers from 0\
    \ to 99999, which should be enough for us.\n\nFor the `address` field, this will\
    \ be a text field, because we want to store the street number and street name.\
    \ We can use 200 characters for our example, and we will use `VARCHAR2`.\n\nOur\
    \ `CREATE TABLE()` statement would then look like this:\n\n```sql\nCREATE TABLE\
    \ office (\nid NUMBER(5),\naddress VARCHAR2(200)\n);\n```\n\nTo run this statement:\n\
    \n1.  Open SQL Developer and create a new SQL file (or use one you already have\
    \ opened), like you have done in earlier chapters.\n2.  Enter the `CREATE TABLE()`\
    \ statement shown previously into the SQL window, as shown in Figure [14-2](#471705_1_En_14_Chapter.xhtml#Fig2).\n\
    \    ![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig2_HTML.jpg](Images/471705_1_En_14_Fig2_HTML.jpg)\n\
    \    Figure 14-2: The `CREATE TABLE()` statement in SQL Developer\n3.  Click the\
    \ Run Statement button (the big green triangle) on the toolbar, as you’ve done\
    \ when running earlier statements. Running a `CREATE TABLE()` statement is done\
    \ in the same way as a `SELECT()` statement.\n\nOnce the statement is run, a message\
    \ will appear at the bottom of the screen to let you know that the table was created\
    \ successfully, as shown in Figure [14-3](#471705_1_En_14_Chapter.xhtml#Fig3).\n\
    \n![../images/471705_1_En_14_Chapter/471705_1_En_14_Fig3_HTML.jpg](Images/471705_1_En_14_Fig3_HTML.jpg)\n\
    Figure 14-3: Table successfully created\n\nIf an error message appears, it could\
    \ be for a few reasons:\n*   The table name is already being used by another table.\
    \ The table name must be unique in the database, so if you have already created\
    \ this table, you can’t create it again. You’ll learn how to delete tables later\
    \ in this book.\n*   Make sure there is a comma after the `id NUMBER(5)` statement,\
    \ as this lets the database know you want to specify a second column. If there\
    \ is no comma, you’ll get an error.\n*   Make sure there are spaces in the same\
    \ places as shown, such as between `CREATE` and `TABLE`, between the name of the\
    \ column (`id`, or `address`) and the data type (`NUMBER` or `VARCHAR2`).\n* \
    \  Make sure there is no space in `VARCHAR2`. It’s a single word.\n\nYou have\
    \ now created a second table in the database! Let’s create a third table that\
    \ uses different data types.\n\n# The Sales Meeting Table\n\nIn addition to storing\
    \ information about employees and offices, we also want to store information about\
    \ sales meetings that employees attend. These meetings will be with a certain\
    \ company and will occur at a date and time. The columns we want to store are:\n\
    *   The employee who attended the meeting\n*   What company it was with\n*   The\
    \ date and time of the meeting\n\nFor the length of our columns, the company name\
    \ could be 200 characters. The date and time value does not need a length, as\
    \ it’s in a standard format. Our employee name will be the same as the `employee`\
    \ table, which was 20 characters.\n\nOur `CREATE TABLE()` statement will look\
    \ like this:\n\n```sql\nCREATE TABLE sales_meeting (\nid NUMBER(5),\nemployee\
    \ VARCHAR2(200),\ncompany VARCHAR2(200),\nmeeting_date DATE\n);\n```\n\nBefore\
    \ we run this statement, there are a couple of concepts that you should know about.\n\
    \n## Primary Key\n\nYou might have noticed that all tables we have created so\
    \ far include a column called `id`, and this column has a data type of `NUMBER`.\
    \ The reason for using this field is so you can identify the record in your queries.\n\
    \nWhat does this mean? Well, let’s look at our `employee` table.\n\n| ID | LAST_NAME\
    \ | SALARY |\n| --- | --- | --- |\n| 1 | JONES | 20000 |\n| 2 | SMITH | 35000\
    \ |\n| 3 | KING | 40000 |\n| 4 | SIMPSON | 52000 |\n| 5 | ANDERSON | 31000 |\n\
    | 6 | COOPER | (null) |\n| 7 | (null) | (null) |\n| 8 | SMITH | 62000 |\n| 9 |\
    \ PATRICK | 40000 |\n\nThis has an `id` and a `last_name` column. Let’s say you\
    \ wanted to find all of the information for the employee JONES. This would be\
    \ simple, as you can just look up the table where `last_name` is JONES.\n\nHowever,\
    \ what if you needed to find the information for SMITH? You could look up the\
    \ record where the `last_name` is SMITH, but there are two records with SMITH.\
    \ Which one would you use? They have the same `last_name` but different `salary`\
    \ values. They may also have different `offices`. There needs to be a way to uniquely\
    \ identify the records in this table.\n\nThis is what the `id` column is for.\
    \ It’s a column that stores a unique number for the `employee` record in the table.\
    \ Whenever the database or the system needs to find a particular record, it can\
    \ use this `ID`.\n\nThe same concept can be found in many different systems:\n\
    *   Your tax ID number, such as a Social Security Number (in the United States)\
    \ or the Tax File Number (in Australia)\n*   Your e-mail address\n*   Any username\
    \ you have when logging on to a system\n*   Membership or account numbers for\
    \ insurance or phone or internet companies\n\nUsing this kind of ID or unique\
    \ identifier is helpful because:\n*   There’s always a way to find the record\
    \ you want if you know this ID.\n*   Any other information on the record can change,\
    \ as long as the ID is the same. For example, people can change names, but the\
    \ record is still the same record.\n*   It’s easy to search and relate to other\
    \ records (which we’ll learn more about in this book).\n\nThe concept of a unique\
    \ identifier for each record in a table is called a *primary key*. A primary key\
    \ on a table is more than just adding an ID field. Oracle (and many other databases)\
    \ allow you to specify one or more columns as the primary key. This means:\n*\
    \   The database ensures that the values are unique. If you try to enter a value\
    \ that is already used by another record, you’ll get an error.\n*   The database\
    \ will make it easier to search on this field, which we’ll cover later in this\
    \ book.\n\nIt’s good database design to ensure that tables have a primary key.\
    \ It improves the quality of your data, prevents duplicate rows, and improves\
    \ the performance of your tables.\n\nWhen we wrote the `CREATE TABLE()` statement\
    \ for the `sales_meeting` table, we asked you not to run the statement yet. This\
    \ is because we wanted to add the “primary key” to this table. Let’s do that now.\n\
    \nTo add a primary key to a table, you can add the words `PRIMARY KEY` after the\
    \ column name and data type. As you can see in the following statement, it goes\
    \ after the data type but before the comma. Before you run this statement to create\
    \ the table, there’s another concept to explain, and another change to make to\
    \ this statement.\n\n```sql\nCREATE TABLE sales_meeting (\nid NUMBER(5) PRIMARY\
    \ KEY,\nemployee VARCHAR2(200),\ncompany VARCHAR2(200),\nmeeting_date DATE\n);\n\
    ```"
