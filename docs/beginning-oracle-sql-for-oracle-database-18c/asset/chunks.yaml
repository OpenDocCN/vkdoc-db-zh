  trans: '

    ## 使用 WHERE 子句的 GROUP BY


    就像其他任何 `SELECT` 查询一样，如果你在使用 `GROUP BY` 子句，你也可以使用 `WHERE` 子句来过滤你的结果。`WHERE` 子句会过滤掉所有不符合你条件的记录，然后
    `GROUP BY` 子句和聚合函数将在剩下的记录上执行。


    假设你想找出每个办公室的工资总额，但要排除员工 SIMPSON。你的查询可能如下所示：


    ```sql

    SELECT office_id,

    SUM(salary)

    FROM employee

    WHERE last_name <> ''SIMPSON''

    GROUP BY office_id;

    ```


    `WHERE` 子句位于 `GROUP BY` 子句之前。如果顺序反过来，你会得到一个错误。


    这个查询的结果是：


    | OFFICE_ID | SUM(SALARY) |

    | --- | --- |

    | 1 | 70000 |

    | 2 | 122000 |

    | 3 | 62000 |

    | (null) | 31000 |


    结果与之前的查询几乎相同，只是 `office_id` 为 1 的工资总和降低了。降低了 52,000，因为 SIMPSON 被排除在外，而他的 `office_id`
    是 1。在这个例子中，查询执行了以下步骤：


    1.  查看了所有员工记录

    2.  排除了 `last_name` 是 SIMPSON 的记录

    3.  从这些结果中显示了每个唯一的 `office_id` 值

    4.  针对这些结果中的每个 `office_id` 值计算了 `SUM`


    在 SQL 中，结合使用 `WHERE`、聚合函数和 `GROUP BY` 可以轻松获得你想要的聚合结果。


    ### 分组后限制结果


    查询中的 `WHERE` 子句允许你在执行聚合函数和分组之前限制结果。在前面的例子中，你通过办公室排除了员工 SIMPSON 的 `salary` 总和。


    让我们尝试另一个例子，来看看 SQL 的另一个特性。假设你想找出每个办公室的员工数量，但只要那些员工数量超过两人的办公室。


    你可以先列出 `office_id` 值和员工计数：


    ```sql

    SELECT office_id, COUNT(*)

    FROM employee

    GROUP BY office_id;

    ```


    结果会是这样：


    | OFFICE_ID | COUNT(*) |

    | --- | --- |

    | 1 | 4 |

    | 2 | 3 |

    | 3 | 2 |

    | (null) | 1 |


    这显示了每个办公室的员工数量。现在，下一步是只显示员工数量超过两人的办公室。要做到这一点，你可以排除 `office_id` 为 3 的记录，但更好的方法是根据你的条件来排除记录。根据你发现的
    `id` 值来排除数据，需要你事先知道这些 `id` 值。所以，让我们排除员工数为 2 或更少的记录：


    ```sql

    SELECT office_id, COUNT(*)

    FROM employee

    WHERE COUNT(*) > 2

    GROUP BY office_id;

    ```


    这应该只显示 `COUNT` 函数返回值大于 2 的记录。让我们运行这个查询，看看会发生什么：


    ```

    ORA-00934: group function is not allowed here

    00934. 00000 -  "group function is not allowed here"

    *Cause:

    *Action:

    Error at Line: 3 Column: 7

    ```


    你得到了一个错误。为什么会这样？这个错误的发生是因为 SQL 语句的处理方式及其背后的规则。SQL 中的一条规则是，你不能在 `WHERE` 子句中使用任何由
    `GROUP BY` 子句产生的值（例如聚合函数的结果）。这是因为 SQL 语句中的子句是按照与书写顺序不同的顺序处理的：


    1.  `FROM`

    2.  `WHERE`

    3.  `GROUP BY`

    4.  `SELECT`

    5.  `ORDER BY`


    这意味着当 `WHERE` 子句被处理时，它只知道你正在从中选择的列和表。它不知道每个组的 `COUNT` 函数的结果，因为那是 `GROUP BY` 子句的工作。


    如何得到你需要的结果呢？你可以使用一个叫做 `HAVING` 的子句。


    ### HAVING 子句


    在 SQL 中，有一个叫做 `HAVING` 的子句。`HAVING` 子句将在 `GROUP BY` 应用之后，对你的结果集中的行进行限制。`HAVING`
    子句看起来像这样：


    ```sql

    HAVING criteria

    ```


    它的工作方式类似于 `WHERE` 子句，因为你需要指定条件。然而，这里的条件应该是你 `SELECT` 查询中使用的聚合函数。


    在之前的例子中，你试图找出员工数量超过两人的办公室及其员工数量。为此，你需要只显示 `COUNT(*)` 大于 2 的记录。因为这是一个聚合函数，你需要为此使用
    `HAVING` 子句：


    ```sql

    SELECT office_id,

    COUNT(*)

    FROM employee

    GROUP BY office_id

    HAVING COUNT(*) > 2;

    ```


    `HAVING` 子句看起来与 `WHERE` 子句相同，只是关键字不同。此外，`HAVING` 子句位于 `GROUP BY` 子句之后，而不是 `FROM`
    子句之后。


    如果你运行这个查询，你会得到这个结果：


    | OFFICE_ID | COUNT(*) |

    | --- | --- |

    | 1 | 4 |

    | 2 | 3 |


    前两个 `office_id` 都显示了，因为它们分别有 4 名和 3 名员工。`office_id` 为 3 的记录没有显示，因为它只有两名员工。你可以通过查询
    `employee` 表并按 `office_id` 排序来查看底层数据，这样更容易看清楚：


    ```sql

    SELECT id,

    last_name,

    office_id

    FROM employee

    ORDER BY office_id ASC;

    ```


    | ID | LAST_NAME | OFFICE_ID |

    | --- | --- | --- |

    | 1 | JONES | 1 |

    | 4 | SIMPSON | 1 |

    | 6 | COOPER | 1 |

    | 9 | PATRICK | 1 |

    | 2 | SMITH | 2 |

    | 3 | KING | 2 |

    | 10 | Jones | 2 |

    | 7 | ADAMS | 3 |

    | 8 | SMITH | 3 |

    | 5 | ANDERSON | (null) |


    通过查看这个结果，你可以看到员工数量。


    ### GROUP BY、HAVING 和 SUM


    你可以将 `HAVING` 子句与任何聚合函数一起使用。前面的例子使用了 `COUNT` 函数，但它也可以与 `SUM`、`MAX`、`MIN` 或 `AVG`
    等其他函数一起使用。


    假设你需要找出每个办公室的员工数量和总 `salary`，但只要总 `salary` 大于 100,000 的办公室。这可以通过扩展之前例子的查询来完成：


    ```sql

    SELECT office_id,

    COUNT(*),

    SUM(salary)

    FROM employee

    GROUP BY office_id

    HAVING SUM(salary) > 100000;

    ```


    这个查询有几个不同之处。它有两个聚合函数：`COUNT` 和 `SUM`。这在 SQL 中是允许的。它还有一个 `HAVING` 子句，只显示 `salary`
    的 `SUM` 大于 100,000 的记录。这个查询的结果是：


    | OFFICE_ID | COUNT(*) | SUM(SALARY) |

    | --- | --- | --- |

    | 1 | 4 | 122000 |

    | 2 | 3 | 122000 |


    它显示了办公室 1 和 2，因为它们的总 `salary` 大于 100000。`office_id` 为 3 的记录被排除，因为总 `salary` 小于
    100000。


    这个例子表明，你可以在查询中包含两个聚合函数，并且只对其中一个使用 `HAVING` 子句。

    '
- fmt: '## Finding Duplicate Records


    The final example you’ll learn in this chapter is how to find duplicate records.
    In your tables, it’s easy to store data that is the same as existing records.
    There are features you can use in both your database and application code to prevent
    this; however, they are not always used.


    Let’s take a look at the `employee` table again:


    ```

    SELECT id,

    last_name,

    salary,

    office_id

    FROM employee;

    ```


    The results are:


    | ID | LAST_NAME | SALARY | OFFICE_ID |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 1 |

    | 2 | SMITH | 35000 | 2 |

    | 3 | KING | 45000 | 2 |

    | 4 | SIMPSON | 52000 | 1 |

    | 5 | ANDERSON | 31000 | (null) |

    | 6 | COOPER | (null) | 1 |

    | 7 | ADAMS | (null) | 3 |

    | 8 | SMITH | 62000 | 3 |

    | 9 | PATRICK | 40000 | 1 |

    | 10 | Jones | 42000 | 2 |


    You can see that there are ten employees. Some of the `last_name` values are the
    same, even though the `salary` is different. If you wanted to find duplicate records
    in this table, you may want to start with the `last_name` values that were repeated.
    Just because the records have the same `last_name` doesn’t mean they are duplicates,
    but it’s a good place to start. You may also just want to know which `last_name`
    values are used more than once.


    The query you want to write will show you the `last_name` and the number of employees
    with each `last_name` where there is more than one employee for that last name.
    This query will look like this:


    ```

    SELECT UPPER(last_name),

    COUNT(*) AS empcount

    FROM employee

    GROUP BY UPPER(last_name)

    HAVING COUNT(*) > 1

    ORDER BY empcount DESC;

    ```


    There are a few things in this query. We’re selecting the uppercase version of
    the `last_name` and the `COUNT` of each `last_name` and have given an alias to
    the `COUNT` column called “empcount.” We’re grouping by the `last_name` column
    and using the `HAVING` clause to eliminate `last_name` records where there is
    1 employee or less. Finally, we’re ordering by the `empcount` column.


    Why are we using the `COUNT(*)` function in the `HAVING` clause but using the
    `empcount` alias in the `ORDER BY`? This is due to the way the query is processed
    in Oracle and it means that the `ORDER BY` clause can refer to column aliases,
    but the `GROUP BY` and `HAVING` can’t. The same result could be achieved with
    `ORDER BY COUNT(*) DESC`, but for this example, I’ve used the column alias.


    Let’s see the results:


    | LAST_NAME | EMPCOUNT |

    | --- | --- |

    | JONES | 2 |

    | SMITH | 2 |


    The results show JONES and SMITH with two employees each. The `last_name` of JONES
    shows two because we have converted the `last_name` to uppercase, so it includes
    the record of “Jones.” All other `last_name` values are not shown here because
    they only have one matching `employee`.


    So, by using a combination of aggregate functions, grouping, and ordering, you
    can find out which records may be duplicates and can investigate your data further.


    ## Summary


    Grouping your data means performing aggregate functions for each different value
    in a particular column. If you use aggregate functions and columns that are not
    aggregate functions, you’ll need to group by all nonaggregate columns in your
    query in order to avoid an error. You can use the `WHERE` clause to filter records
    before the grouping. You can also use the `HAVING` clause to filter records after
    the grouping has been applied, which is done on the aggregate functions used.


    Using a combination of `GROUP BY` and `HAVING` can make it easy to get the results
    you need.


    # 26. What Are Indexes?


    Indexes are a feature that’s worth knowing about in SQL. They are useful for making
    your queries perform better, and as you gain more experience in SQL, you’ll need
    to know how to create them and why they are needed.


    ## What Is an Index?


    An `index` is an object in the database that improves the performance, or reduces
    the run time, of your SQL query. I like to think of it like an index in the back
    of a textbook.


    Have you ever tried to look at a textbook for a specific topic? For example, you’re
    looking at a textbook on the history of human civilization and want to know more
    about Julius Caesar. You know this was part of the Roman times, so you might guess
    that it was somewhere in the middle of the book. You would flip to somewhere in
    the middle of the book and scan the pages to look for something about Julius Caesar.
    Or, you could start at page 1 and look through each page for information on Julius
    Caesar until you get to the current year.


    Either of those methods would take a while and wouldn’t be very efficient. When
    you read every page from start to finish until you find the information you need
    is how Oracle looks up data in your table. When you look for the `employee` record
    where the `last_name` is SIMPSON, Oracle will look at every row to find the record
    you need. This can also take some time if the table is large.


    There is a better way. Textbooks often have an index at the back of the book.
    This index will list all of the key topics in the book and the pages they are
    referenced on. To find information about Julius Caesar, you can simply look that
    up in the index and it will show you all of the pages in the book where it’s mentioned:


    *Julius Caesar… pg 43, 210, 548-570*


    You can then flip to those pages to find the information you need.


    An `index` in Oracle works the same way. You can create an `index`, which includes
    information on where to find records in a table. When you run an SQL statement
    that looks for data using that information, Oracle will use the `index` to find
    the records you need. This is usually much faster than looking through the entire
    table without the `index`.


    So why do you need to know about indexes? Indexes are good to know because they
    can make a big difference in the performance of your queries. It’s also very common
    in databases in the “real world” to have indexes on their tables. Knowing what
    they are, what they do, and how to create them is a skill that will be useful
    for you in your career.


    ## How to Create an Index


    An `index` is an object on the database, just like a `table`. To create an `index`,
    we use the `CREATE` statement. The syntax for this statement is:


    ```

    CREATE INDEX index_name

    ON table_name (columns);

    ```


    You start with `CREATE INDEX`. You then need to provide a name for the `index`.
    The `index` name must be unique on the database. Next, you have the keyword `ON`
    and then a `table` name, followed by the column (or columns) you want the `index`
    to be created on.


    An `index` is created on a single `table` and on one or more columns. The `index`
    will store the information about the columns you specify, making it easier for
    the database to look up records based on those columns. Let’s see some examples.'
