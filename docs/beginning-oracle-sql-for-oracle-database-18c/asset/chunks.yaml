- fmt: '### Multiplication


    You can multiply a value by another value in the same way as addition and subtraction,
    by using the "`*`" symbol. Let’s say you wanted to multiple our `salary` value
    by 5 to see the cost of the salary over 5 years. Our query would look like this:


    ```sql

    SELECT id, last_name, salary, salary * 5

    FROM employee;

    ```


    The results of this query are:


    ```

    ID   LAST_NAME   SALARY   SALARY*5

    1    JONES       20000    100000

    2    SMITH       35000    175000

    3    KING        40000    200000

    4    SIMPSON     52000    260000

    5    ANDERSON    31000    155000

    6    COOPER      (null)   (null)

    7    (null)      (null)   (null)

    8    SMITH       62000    310000

    9    PATRICK     40000    200000

    ```


    You can see that the `salary` has been multiplied by 5 to show the new value.
    A column alias can also be applied to this value to make it more readable:


    ```sql

    SELECT id, last_name, salary, salary * 5 AS five_year_salary

    FROM employee;

    ```


    The results of this query are:


    ```

    ID   LAST_NAME   SALARY   FIVE_YEAR_SALARY

    1    JONES       20000    100000

    2    SMITH       35000    175000

    3    KING        40000    200000

    4    SIMPSON     52000    260000

    5    ANDERSON    31000    155000

    6    COOPER      (null)   (null)

    7    (null)      (null)   (null)

    8    SMITH       62000    310000

    9    PATRICK     40000    200000

    ```


    The alias in this case is `FIVE_YEAR_SALARY`. This might seem strange, as it’s
    longer than the `SALARY` column name, but it’s easier to read and easier for applications
    to use than `SALARY*5`.


    ### Division


    Finally, you can apply division to values in SQL with the "`/`" symbol. It works
    in the same way as the other symbols. Let’s say you wanted to see the monthly
    salary for each employee. You could divide our existing annual `salary` by 12
    to get the monthly salary.


    ```sql

    SELECT id, last_name, salary, salary / 12

    FROM employee;

    ```


    The results from this query are:


    ```

    ID   LAST_NAME   SALARY   SALARY/12

    1    JONES       20000    1666.666667

    2    SMITH       35000    2916.666667

    3    KING        40000    3333.333333

    4    SIMPSON     52000    4333.333333

    5    ANDERSON    31000    2583.333333

    6    COOPER      (null)   (null)

    7    (null)      (null)   (null)

    8    SMITH       62000    5166.666667

    9    PATRICK     40000    3333.333333

    ```


    All of the values shown are now in decimals, because none of them are neatly divisible
    by 12\. You’ll learn how to round these numbers in a later chapter.


    If you wanted to give your column an alias, you can do that as well:


    ```sql

    SELECT id, last_name, salary, salary / 12 AS monthly_salary

    FROM employee;

    ```


    The results from this query are:


    ```

    ID   LAST_NAME   SALARY   MONTHLY_SALARY

    1    JONES       20000    1666.666667

    2    SMITH       35000    2916.666667

    3    KING        40000    3333.333333

    4    SIMPSON     52000    4333.333333

    5    ANDERSON    31000    2583.333333

    6    COOPER      (null)   (null)

    7    (null)      (null)   (null)

    8    SMITH       62000    5166.666667

    9    PATRICK     40000    3333.333333

    ```


    The column now has a new heading in these results. Using column aliases is especially
    useful when working with mathematical operations, as you’ve seen.


    ## Column Aliases with Table Aliases


    You’ve learned about column aliases and table aliases in this chapter, in separate
    queries. They can actually be used in the same query to make your query even more
    readable.


    You can use the query to find the monthly salary from earlier in the chapter.


    ```sql

    SELECT id,

    last_name,

    salary,

    salary / 12 AS monthly_salary

    FROM employee;

    ```


    This query uses a column alias to rename `salary / 12` to `monthly_salary`. You
    can use a table alias with this query:


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.salary / 12 AS monthly_salary

    FROM employee e;

    ```


    In this query, every time we have referred to a column from the `employee` table,
    we’ve used the table alias of "`e`". As we mentioned before, this might seem like
    too much work for a simple query like this, but it’s an important tip to learn
    for when you move on to more complicated queries.


    ## Summary


    Table aliases and column aliases are both optional features in SQL that you can
    use in your queries. Table aliases allow you to give another name to your table
    for your query, which is usually shorter than the real name. They help when you
    are working with more complicated queries and they allow you to use the Intellisense
    or AutoComplete feature of your IDE.


    Column aliases allow you to give another name or label to your column in the output,
    making it more readable by users and easier for other applications to process.


    Mathematical operations allow you to add, subtract, multiply, and divide values
    in SQL, and these are common targets for using column aliases. Finally, you can
    use both column aliases and table aliases in a single query. As you move on to
    more complicated queries, you’ll find these features more useful.


    # Part III Adding, Updating, Deleting Data


    # 13. Understanding the Data Types


    In this chapter, you’ll learn what data types are, why you need them, and how
    the Oracle database handles different data types.


    ## What is a Data Type?


    A `data type` is the format that a piece of information is stored in a database.
    Each column in a table has a data type, which is defined when you create the table
    and specify the column names.


    If you’ve done any programming before, such as .Net or Java, you’ll know that
    there are different data types available in these languages. Database development,
    and SQL, are no different. Data types are available for specifying how data is
    stored.


    Do you remember earlier in this book when you created the `employee` table? We
    asked you to select a data type for the `ID`, `last_name`, and `salary` columns
    (Figure 13-1).


    ![../images/471705_1_En_13_Chapter/471705_1_En_13_Fig1_HTML.jpg](Images/471705_1_En_13_Fig1_HTML.jpg)


    Figure 13-1. Selecting a data type when adding columns to a table


    This step was where the data type for each column was specified. You specified
    that:


    *   The `ID` column is some kind of number.

