    \ User\n\nYou now have a new user. Let’s create a new connection with this user,\
    \ so you can start working with the database as this new user and not the administrator\
    \ user. You can follow the same steps as we did for creating the earlier connection\
    \ for creating this connection.\n\nIn short:\n\n1.  Click the green plus sign\
    \ on the left of SQL Developer to show the Create New Connection window.\n\n2.\
    \  Enter a new name for the connection, and enter the username and password you\
    \ used when you created the user.\n\n3.  Leave the rest of the connection info\
    \ as the defaults.\n\n4.  Click Save to save the connection.\n\n5.  Finally, click\
    \ Connect to connect as this user.\n\nWell done! You’ve now installed an Oracle\
    \ database, opened SQL Developer, and created a new user and a connection with\
    \ that user."
  trans: "\n## 创建连接\n\n打开 SQL Developer 后，你就可以连接到刚刚安装的 Oracle 数据库了。这将允许你通过运行查询与数据库进行交互。我们需要做几件事：\n\
    \n1.  使用管理员账户创建一个新连接。\n2.  创建一个新用户。\n3.  使用新用户创建一个新连接。\n\n为什么需要创建新用户？我们不能直接使用安装时创建的系统账户吗？我们确实可以使用\
    \ `SYSTEM` 账户，但以这种方式使用 `SYSTEM` 账户来创建表和处理数据并不是一个好的做法。这是因为系统管理员账户拥有许多权限，数据库管理员会使用它们执行各种任务。在工作环境中，你通常无法访问系统管理员账户，因此最好使用自己的账户。\n\
    \n要创建新连接：\n\n1.  在 SQL Developer 中，点击屏幕左侧“连接”选项卡中的绿色 + 按钮，如图 2-16 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig16_HTML.jpg](img/471705_1_En_2_Fig16_HTML.jpg)\n\
    \    图 2-16：新建连接按钮。\n    如果看不到“连接”选项卡，请点击“视图”菜单，然后点击“连接”。\n\n随后将显示“新建连接”窗口，如图\
    \ 2-17 所示。现有连接显示在左侧，创建新连接的字段位于右侧。你左侧的连接列表将是空的。\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig17_HTML.jpg](img/471705_1_En_2_Fig17_HTML.jpg)\n\
    图 2-17：新建连接窗口。\n\n1.  输入一个 `连接名`。这可以是任何你喜欢的名字，用于在所有其他连接的列表中标识此连接。我建议使用“System”，因为这是\
    \ `SYSTEM` 账户的连接。将来如果你需要连接多个数据库，在此 `连接名` 字段中同时放入数据库名称和用户名会是个好习惯。\n2.  输入“SYSTEM”作为\
    \ `用户名`。\n3.  在密码字段中，输入你在安装 Oracle Express 时输入的密码。就是你需要记住的那个密码。\n4.  勾选 `保存密码`\
    \ 复选框，这样每次连接时就不需要重新输入密码了。屏幕应如图 2-18 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig18_HTML.jpg](img/471705_1_En_2_Fig18_HTML.jpg)\n\
    \    图 2-18：新建连接窗口中的数据。\n5.  关于连接信息，如果你在公司，你的 DBA（数据库管理员）通常会提供如何连接的信息。对于连接到我们的\
    \ Oracle Express 数据库，请将 `主机名`、`端口` 和 `SID` 字段保留为它们的默认值。`主机名` 应为“localhost”，`端口`\
    \ 应为 `1521`，`SID` 应为“xe”。\n6.  点击 `测试` 按钮。这将测试你与数据库的连接，并查看你输入的信息是否正确。\n    如果测试成功，左下角应显示“状态:\
    \ 成功”，如图 2-19 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig19_HTML.jpg](img/471705_1_En_2_Fig19_HTML.jpg)\n\
    \    图 2-19：测试连接成功的消息。\n    点击 `保存`。新连接将被保存到左侧的列表中，如图 2-20 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig20_HTML.jpg](img/471705_1_En_2_Fig20_HTML.jpg)\n\
    \    图 2-20：列表中的新连接。\n7.  点击 `连接`。SQL Developer 将使用此连接并连接到数据库。连接成功后，SQL Developer\
    \ 窗口中会显示一个以你的连接命名的新选项卡。\n\n## 创建新用户\n\n我们可以继续以 `SYSTEM` 账户创建表，但我们要避免以 `SYSTEM`\
    \ 身份进行操作。我们将创建一个新用户，然后由该用户来创建我们的表。在 SQL Developer 窗口的左侧，你应该能看到 `连接` 字样，其下方是你刚刚创建的连接。找到你的新连接。然后执行以下步骤：\n\
    \n1.  点击连接名称左侧的箭头，展开该连接下的项目。这将显示所有不同类别的对象。\n2.  滚动到此列表的底部，右键单击 `其他用户`，然后选择 `创建用户`，如图\
    \ 2-21 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig21_HTML.jpg](img/471705_1_En_2_Fig21_HTML.jpg)\n\
    \    图 2-21：“创建用户”菜单选项。\n3.  在出现的窗口中，输入新用户的名称，如图 2-22 所示。名称不区分大小写，且不应包含特殊字符或“system”等保留字。如果不确定使用什么，可以用你自己的名字或“intro_user”作为用户名。\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig22_HTML.jpg](img/471705_1_En_2_Fig22_HTML.jpg)\n\
    \    图 2-22：“创建用户”窗口。\n4.  在 `新密码` 和 `确认密码` 框中输入密码。\n5.  将所有其他选项留空：复选框和表空间字段。\n\
    6.  点击 `已授予的角色` 选项卡。将出现可用角色的列表。\n7.  点击 `CONNECT` 角色旁边的 `已授予` 复选框，如图 2-23 所示。此\
    \ `CONNECT` 角色允许用户连接到数据库。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig23_HTML.jpg](img/471705_1_En_2_Fig23_HTML.jpg)\n\
    \    图 2-23：“已授予的角色”选项卡。\n8.  点击 `系统权限` 选项卡。将出现可用权限的列表，如图 2-24 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig24_HTML.jpg](img/471705_1_En_2_Fig24_HTML.jpg)\n\
    \    图 2-24：“系统权限”选项卡。\n9.  点击 `CREATE TABLE` 权限旁边的 `已授予` 复选框。这将允许你创建表。\n10. 点击\
    \ `应用` 按钮。新用户将被创建，并显示一条消息，如图 2-25 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig25_HTML.jpg](img/471705_1_En_2_Fig25_HTML.jpg)\n\
    \    图 2-25：成功消息。\n\n## 使用新用户创建连接\n\n现在你已经有了一个新用户。让我们用这个用户创建一个新连接，这样你就可以开始以这个新用户（而不是管理员用户）的身份使用数据库。你可以遵循与之前创建连接相同的步骤来创建此连接。\n\
    \n简而言之：\n\n1.  点击 SQL Developer 左侧的绿色加号，显示“创建新连接”窗口。\n2.  输入新的连接名，并输入创建用户时使用的用户名和密码。\n\
    3.  将其余连接信息保留为默认值。\n4.  点击 `保存` 以保存连接。\n5.  最后，点击 `连接` 以该用户身份连接。\n\n干得漂亮！你现在已经安装了\
    \ Oracle 数据库，打开了 SQL Developer，并创建了一个新用户以及使用该用户的连接。\n"
- fmt: "## Create a Table\n\n在开始学习基础 SQL 之前，我们需要做的最后一件事是创建一些示例数据。这将涉及两个步骤：创建一个表，然后向该表中添加数据。\n\
    \n每个步骤都可以用两种方式完成。我们可以使用 SQL Developer 内部的菜单和对话框，也可以运行一些 SQL 代码来完成此操作。到本书结束时，你将学会如何用\
    \ SQL 代码完成这两项操作，但现在，我们将使用菜单创建表。当你以新用户身份连接到 `Oracle` 数据库后，就可以准备创建表了。\n\n操作步骤如下：\n\
    \n1.  展开窗口左侧的连接名称，查看所有可用的对象。\n2.  右键单击显示为 `Tables (Filtered)` 的选项，并选择 `New Table`。此选项应位于列表顶部，如图\
    \ [2-26](#471705_1_En_2_Chapter.xhtml#Fig26) 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig26_HTML.jpg](Images/471705_1_En_2_Fig26_HTML.jpg)\n\
    \    *图 2-26: `New Table` 菜单选项*\n    此时应出现 `Create Table` 窗口。\n3.  输入表的名称。对于此表，我们将存储员工数据，因此在\
    \ `Name` 字段中输入单词 `employee`，如图 [2-27](#471705_1_En_2_Chapter.xhtml#Fig27) 所示。大写、小写无关紧要。`Oracle`\
    \ 会以统一大小写存储表名。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig27_HTML.jpg](Images/471705_1_En_2_Fig27_HTML.jpg)\n\
    \    *图 2-27: 新表的名称*\n4.  表需要包含列。在 `Columns` 部分，双击 `Name` 列中的第一个值（当前为 `COLUMN1`），如图\
    \ [2-28](#471705_1_En_2_Chapter.xhtml#Fig28) 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig28_HTML.jpg](Images/471705_1_En_2_Fig28_HTML.jpg)\n\
    \    *图 2-28: 编辑新列的名称*\n5.  输入列的新名称。我们将其命名为 `ID`。\n6.  选择 `Data Type` 值为 `NUMBER`，如图\
    \ [2-29](#471705_1_En_2_Chapter.xhtml#Fig29) 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig29_HTML.jpg](Images/471705_1_En_2_Fig29_HTML.jpg)\n\
    \    *图 2-29: 新列的数据类型*\n7.  点击右侧的绿色 `+` 符号以添加新条目，如图 [2-30](#471705_1_En_2_Chapter.xhtml#Fig30)\
    \ 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig30_HTML.jpg](Images/471705_1_En_2_Fig30_HTML.jpg)\n\
    \    *图 2-30: 添加新列*\n8.  重复相同的步骤，将此列命名为 `LAST_NAME`。将数据类型保留为 `VARCHAR2`。\n9. \
    \ 点击绿色 `+` 符号添加新条目。将此列命名为 `SALARY`，并选择数据类型为 `NUMBER`。\n\n你的窗口应如图 [2-31](#471705_1_En_2_Chapter.xhtml#Fig31)\
    \ 所示。\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig31_HTML.jpg](Images/471705_1_En_2_Fig31_HTML.jpg)\n\
    *图 2-31: 添加更多列*\n1.  点击 `OK` 按钮。你的表现在将被创建。它也会出现在屏幕右侧 `Tables (Filtered)` 项目下。\n\
    \n恭喜！你现在已经创建了你的第一个表。\n\n## Insert Some Data\n\n当我们创建一个新表时，它有我们定义的列，但里面没有数据。最后一步是向我们的新表中添加一些数据。\n\
    \n我们可以通过使用 `SQL Developer` 中的菜单选项来完成此操作。\n\n操作步骤如下：\n\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig36_HTML.jpg](Images/471705_1_En_2_Fig36_HTML.jpg)\n\
    *图 2-36: 添加到表中的更多行*\n\n| ID  | LAST_NAME | SALARY |\n| --- | --- | --- |\n| 2\
    \   | SMITH     | 35000  |\n| 3   | KING      | 40000  |\n| 4   | SIMPSON   |\
    \ 52000  |\n| 5   | ANDERSON  | 31000  |\n\n1.  展开左侧窗口中的连接名称，然后展开 `Tables (Filtered)`\
    \ 条目，如图 [2-32](#471705_1_En_2_Chapter.xhtml#Fig32) 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig32_HTML.jpg](Images/471705_1_En_2_Fig32_HTML.jpg)\n\
    \    *图 2-32: 连接下列出的表*\n2.  单击 `EMPLOYEE` 表一次。左侧将打开一个新选项卡，显示有关该表的信息，例如创建表时添加的三列，如图\
    \ [2-33](#471705_1_En_2_Chapter.xhtml#Fig33) 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig33_HTML.jpg](Images/471705_1_En_2_Fig33_HTML.jpg)\n\
    \    *图 2-33: Employee 的列*\n3.  在第二行选项卡上，单击 `Data` 选项卡。它应该在 `Columns` 的左侧，如图 [2-34](#471705_1_En_2_Chapter.xhtml#Fig34)\
    \ 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig34_HTML.jpg](Images/471705_1_En_2_Fig34_HTML.jpg)\n\
    \    *图 2-34: Employee 表中的数据*\n4.  单击 `Insert Row` 按钮。这是从左数第三个按钮，上面有一个白色方块和一个绿色\
    \ `+` 符号。将添加一个新行。\n5.  在 `ID` 列中输入值 `1`，在 `LAST_NAME` 列中输入值 `JONES`，在 `SALARY`\
    \ 列中输入值 `20000`。你不需要输入引号或逗号，只需输入值。你的屏幕应如图 [2-35](#471705_1_En_2_Chapter.xhtml#Fig35)\
    \ 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig35_HTML.jpg](Images/471705_1_En_2_Fig35_HTML.jpg)\n\
    \    *图 2-35: 第一行数据*\n6.  单击 `Insert Row` 按钮，并在出现的行中输入以下值。重复此操作，直到所有值都进入表中，并且看起来像图\
    \ [2-36](#471705_1_En_2_Chapter.xhtml#Fig36)。\n7.  单击 `Commit Changes` 按钮。这是一个灰色的框，上面有一个圆柱体和绿色的勾号图标，位于\
    \ `Insert New Row` 图标的右侧两个按钮处。\n\n这将把数据保存到数据库中。稍后，更改将被保存。一些消息将出现在屏幕底部的日志中。\n\n\
    现在我们的数据已经在表里了。"
  raw: "## Create a Table\n\nThe last things we need to do before we can start learning\
    \ some basic SQL is to create some sample data. This will involve two steps: creating\
    \ a table, and then adding data to that table.\n\nEach of these steps can be done\
    \ in two ways. We can use the menu and dialog boxes inside SQL Developer, or we\
    \ can run some SQL code to do this. By the end of the book you’ll learn how to\
    \ do both in SQL code, but for now, we’ll create a table using the menus. Once\
    \ you are connected to the Oracle database as your new user, you’re ready to create\
    \ a table.\n\nTo do this:\n\n1.  Expand the name of the connection on the left\
    \ side of the window to see all of the available objects.\n\n2.  Right click the\
    \ option that says “Tables (Filtered),” and select New Table. This should appear\
    \ at the top of the list, as shown in Figure [2-26](#471705_1_En_2_Chapter.xhtml#Fig26).\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig26_HTML.jpg](Images/471705_1_En_2_Fig26_HTML.jpg)\n\
    \n    Figure 2-26\n\n    The New Table menu option\n\n    The Create Table window\
    \ should appear.\n\n3.  Enter in a name for the table. For this table, we’ll store\
    \ data about employees, so we’ll enter the word “employee” into the Name field,\
    \ as shown in Figure [2-27](#471705_1_En_2_Chapter.xhtml#Fig27). Upper case, lower\
    \ case, the case does not matter. Oracle stores table names all in the one case.\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig27_HTML.jpg](Images/471705_1_En_2_Fig27_HTML.jpg)\n\
    \n    Figure 2-27\n\n    The name of the new table\n\n4.  A table needs to have\
    \ columns in it. In the Columns section, select the first value in the Name column\
    \ (currently called “COLUMN1”) by double-clicking it, as shown in Figure [2-28](#471705_1_En_2_Chapter.xhtml#Fig28).\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig28_HTML.jpg](Images/471705_1_En_2_Fig28_HTML.jpg)\n\
    \n    Figure 2-28\n\n    Editing the name of a new column\n\n5.  Enter a new name\
    \ for the column. We’ll call ours ID.\n\n6.  Select a Data Type value of NUMBER,\
    \ as shown in Figure [2-29](#471705_1_En_2_Chapter.xhtml#Fig29).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig29_HTML.jpg](Images/471705_1_En_2_Fig29_HTML.jpg)\n\
    \n    Figure 2-29\n\n    The data type of the new column\n\n7.  Click the green\
    \ + symbol on the right to add a new entry, as shown in Figure [2-30](#471705_1_En_2_Chapter.xhtml#Fig30).\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig30_HTML.jpg](Images/471705_1_En_2_Fig30_HTML.jpg)\n\
    \n    Figure 2-30\n\n    Adding a new column\n\n8.  Repeat the same steps to name\
    \ this column “LAST_NAME.” Leave the data type as VARCHAR2.\n\n9.  Click the green\
    \ + symbol to add a new entry. Call this column “SALARY” and select a data type\
    \ of NUMBER.\n\nYour window should look like this (Figure [2-31](#471705_1_En_2_Chapter.xhtml#Fig31)).\n\
    \n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig31_HTML.jpg](Images/471705_1_En_2_Fig31_HTML.jpg)\n\
    \nFigure 2-31\n\nAdding more columns\n\n1.  Click the OK button. Your table will\
    \ now be created. It will also appear under the “Tables (Filtered)” item on the\
    \ right of the screen.\n\nCongratulations! You have now created your very first\
    \ table.\n\n## Insert Some Data\n\nWhen we create a new table, it has the columns\
    \ we defined but it has no data in it. The final step is to add some data to our\
    \ new table.\n\nWe can do this by using the menu options in SQL Developer.\n\n\
    To do this:\n\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig36_HTML.jpg](Images/471705_1_En_2_Fig36_HTML.jpg)\n\
    \nFigure 2-36\n\nMore rows added to the table\n\n| ID | LAST_NAME | SALARY |\n\
    | --- | --- | --- |\n| 2 | SMITH | 35000 |\n| 3 | KING | 40000 |\n| 4 | SIMPSON\
    \ | 52000 |\n| 5 | ANDERSON | 31000 |\n\n1.  Expand the name of your connection\
    \ on the left window, and then expand the Tables (Filtered) entry, as shown in\
    \ Figure [2-32](#471705_1_En_2_Chapter.xhtml#Fig32).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig32_HTML.jpg](Images/471705_1_En_2_Fig32_HTML.jpg)\n\
    \n    Figure 2-32\n\n    The table listed under the connection\n\n2.  Click the\
    \ EMPLOYEE table once. A new tab opens on the left that shows information about\
    \ the table, such as the three columns you added when you created the table, as\
    \ shown in Figure [2-33](#471705_1_En_2_Chapter.xhtml#Fig33).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig33_HTML.jpg](Images/471705_1_En_2_Fig33_HTML.jpg)\n\
    \n    Figure 2-33\n\n    The Employee columns\n\n3.  On the second row of tabs,\
    \ click the Data tab. This should be on the left next to Columns, as shown in\
    \ Figure [2-34](#471705_1_En_2_Chapter.xhtml#Fig34).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig34_HTML.jpg](Images/471705_1_En_2_Fig34_HTML.jpg)\n\
    \n    Figure 2-34\n\n    The data in the Employee table\n\n4.  Click the Insert\
    \ Row button. This is the third button from the left, which has a white square\
    \ and a green + symbol on it. A new row will be added.\n\n5.  Enter a value of\
    \ 1 in the ID column, a value of JONES in the LAST_NAME column, and a value of\
    \ 20000 in the SALARY column. You don’t need to enter quote marks or commas, just\
    \ the values. Your screen should look like Figure [2-35](#471705_1_En_2_Chapter.xhtml#Fig35).\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig35_HTML.jpg](Images/471705_1_En_2_Fig35_HTML.jpg)\n\
    \n    Figure 2-35\n\n    The first row of data\n\n6.  Click the Insert Row button\
    \ and enter the following values into the row that appears. Repeat until all of\
    \ these values are in the table and it looks like Figure [2-36](#471705_1_En_2_Chapter.xhtml#Fig36).\n\
    \n1.  Click the Commit Changes button. This is a grey box with a cylinder and\
    \ a green tick icon two buttons to the right of the Insert New Row icon.\n\nThis\
    \ will save this data to the database. After a moment, the changes will be saved.\
    \ Some messages will appear in the log at the bottom of the screen.\n\nNow we\
    \ have our data in our table."
  trans: "## 创建表\n\n在开始学习基础 SQL 之前，我们需要做的最后一件事是创建一些示例数据。这将涉及两个步骤：创建一个表，然后向该表中添加数据。\n\
    \n每个步骤都可以用两种方式完成。我们可以使用 SQL Developer 内部的菜单和对话框，也可以运行一些 SQL 代码来完成此操作。到本书结束时，你将学会如何用\
    \ SQL 代码完成这两项操作，但现在，我们将使用菜单创建表。当你以新用户身份连接到 `Oracle` 数据库后，就可以准备创建表了。\n\n操作步骤如下：\n\
    \n1.  展开窗口左侧的连接名称，查看所有可用的对象。\n2.  右键单击显示为 `Tables (Filtered)` 的选项，并选择 `New Table`。此选项应位于列表顶部，如图\
    \ 2-26 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig26_HTML.jpg](img/471705_1_En_2_Fig26_HTML.jpg)\n\
    \    *图 2-26: `New Table` 菜单选项*\n    此时应出现 `Create Table` 窗口。\n3.  输入表的名称。对于此表，我们将存储员工数据，因此在\
    \ `Name` 字段中输入单词 `employee`，如图 2-27 所示。大写、小写无关紧要。`Oracle` 会以统一大小写存储表名。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig27_HTML.jpg](img/471705_1_En_2_Fig27_HTML.jpg)\n\
    \    *图 2-27: 新表的名称*\n4.  表需要包含列。在 `Columns` 部分，双击 `Name` 列中的第一个值（当前为 `COLUMN1`），如图\
    \ 2-28 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig28_HTML.jpg](img/471705_1_En_2_Fig28_HTML.jpg)\n\
    \    *图 2-28: 编辑新列的名称*\n5.  输入列的新名称。我们将其命名为 `ID`。\n6.  选择 `Data Type` 值为 `NUMBER`，如图\
    \ 2-29 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig29_HTML.jpg](img/471705_1_En_2_Fig29_HTML.jpg)\n\
    \    *图 2-29: 新列的数据类型*\n7.  点击右侧的绿色 `+` 符号以添加新条目，如图 2-30 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig30_HTML.jpg](img/471705_1_En_2_Fig30_HTML.jpg)\n\
    \    *图 2-30: 添加新列*\n8.  重复相同的步骤，将此列命名为 `LAST_NAME`。将数据类型保留为 `VARCHAR2`。\n9. \
    \ 点击绿色 `+` 符号添加新条目。将此列命名为 `SALARY`，并选择数据类型为 `NUMBER`。\n\n你的窗口应如图 2-31 所示。\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig31_HTML.jpg](img/471705_1_En_2_Fig31_HTML.jpg)\n\
    *图 2-31: 添加更多列*\n1.  点击 `OK` 按钮。你的表现在将被创建。它也会出现在屏幕右侧 `Tables (Filtered)` 项目下。\n\
    \n恭喜！你现在已经创建了你的第一个表。\n\n## 插入数据\n\n当我们创建一个新表时，它有我们定义的列，但里面没有数据。最后一步是向我们的新表中添加一些数据。\n\
    \n我们可以通过使用 `SQL Developer` 中的菜单选项来完成此操作。\n\n操作步骤如下：\n\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig36_HTML.jpg](img/471705_1_En_2_Fig36_HTML.jpg)\n\
    *图 2-36: 添加到表中的更多行*\n\n| ID  | LAST_NAME | SALARY |\n| --- | --- | --- |\n| 2\
    \   | SMITH     | 35000  |\n| 3   | KING      | 40000  |\n| 4   | SIMPSON   |\
    \ 52000  |\n| 5   | ANDERSON  | 31000  |\n\n1.  展开左侧窗口中的连接名称，然后展开 `Tables (Filtered)`\
    \ 条目，如图 2-32 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig32_HTML.jpg](img/471705_1_En_2_Fig32_HTML.jpg)\n\
    \    *图 2-32: 连接下列出的表*\n2.  单击 `EMPLOYEE` 表一次。左侧将打开一个新选项卡，显示有关该表的信息，例如创建表时添加的三列，如图\
    \ 2-33 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig33_HTML.jpg](img/471705_1_En_2_Fig33_HTML.jpg)\n\
    \    *图 2-33: Employee 的列*\n3.  在第二行选项卡上，单击 `Data` 选项卡。它应该在 `Columns` 的左侧，如图 2-34\
    \ 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig34_HTML.jpg](img/471705_1_En_2_Fig34_HTML.jpg)\n\
    \    *图 2-34: Employee 表中的数据*\n4.  单击 `Insert Row` 按钮。这是从左数第三个按钮，上面有一个白色方块和一个绿色\
    \ `+` 符号。将添加一个新行。\n5.  在 `ID` 列中输入值 `1`，在 `LAST_NAME` 列中输入值 `JONES`，在 `SALARY`\
    \ 列中输入值 `20000`。你不需要输入引号或逗号，只需输入值。你的屏幕应如图 2-35 所示。\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig35_HTML.jpg](img/471705_1_En_2_Fig35_HTML.jpg)\n\
    \    *图 2-35: 第一行数据*\n6.  单击 `Insert Row` 按钮，并在出现的行中输入以下值。重复此操作，直到所有值都进入表中，并且看起来像图\
    \ 2-36。\n7.  单击 `Commit Changes` 按钮。这是一个灰色的框，上面有一个圆柱体和绿色的勾号图标，位于 `Insert New Row`\
    \ 图标的右侧两个按钮处。\n\n这将把数据保存到数据库中。稍后，更改将被保存。一些消息将出现在屏幕底部的日志中。\n\n现在我们的数据已经在表里了。"
- fmt: "## LiveSQL\n\nOracle有一个在线数据库叫做LiveSQL，可以让你创建自己的数据并运行自己的查询。这对于测试SQL或当你无法访问安装了Oracle的计算机时非常有用。\n\
    \n本书中的所有示例代码都可以在LiveSQL上运行。不过，你需要先了解如何使用LiveSQL。要访问LiveSQL：\n\n1.  在你的网页浏览器中访问\
    \ [`https://livesql.oracle.com`](https://livesql.oracle.com)，页面应如图 [2-37](#471705_1_En_2_Chapter.xhtml#Fig37)\
    \ 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig37_HTML.jpg](Images/471705_1_En_2_Fig37_HTML.jpg)\n\
    \    图 2-37 LiveSQL 主页\n\n2.  点击红色的“Start Coding Now”按钮。如果你已有Oracle账户，请使用该账户登录。否则，你需要创建一个新账户。账户是免费的，并且你不必是Oracle员工。\n\
    \n3.  登录并接受应用程序免责声明后，你将有几个区域可以访问，如图 [2-38](#471705_1_En_2_Chapter.xhtml#Fig38)\
    \ 所示。你可以查看其他人提供的脚本或代码，也可以从新窗口开始。对于本书，我们将从新窗口开始。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig38_HTML.jpg](Images/471705_1_En_2_Fig38_HTML.jpg)\n\
    \    图 2-38 登录后的 LiveSQL 页面\n\n4.  点击红色的“Code SQL”按钮或左侧的“SQL Worksheet”链接，以打开一个新的LiveSQL会话。\n\
    \n    你将看到一个新的查询窗口，如图 [2-39](#471705_1_En_2_Chapter.xhtml#Fig39) 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig39_HTML.jpg](Images/471705_1_En_2_Fig39_HTML.jpg)\n\
    \    图 2-39 SQL 工作表\n\n5.  将本书中提到的任何代码输入（或复制粘贴）到此查询窗口中，然后点击“Run”按钮。代码应该会运行，结果将被显示出来。\n\
    \n6.  要使用类似于SQL Developer说明的向导创建新表，请点击“Schema”并选择“Create Database Object”。\n\n\
    \    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig40_HTML.jpg](Images/471705_1_En_2_Fig40_HTML.jpg)\n\
    \    图 2-40 LiveSQL Schema 窗口\n\n7.  在出现的弹出窗口中，选择“Table”。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig41_HTML.jpg](Images/471705_1_En_2_Fig41_HTML.jpg)\n\
    \    图 2-41 创建数据库对象窗口\n\n创建表窗口如图 [2-42](#471705_1_En_2_Chapter.xhtml#Fig42) 所示。\n\
    \n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig42_HTML.jpg](Images/471705_1_En_2_Fig42_HTML.jpg)\n\
    图 2-42 创建表窗口\n\n1.  为你的表输入一个表名。\n\n2.  以与在Oracle SQL Developer中相同的方式输入列名并选择数据类型。\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig43_HTML.jpg](Images/471705_1_En_2_Fig43_HTML.jpg)\n\
    \    图 2-43 填写创建表窗口\n\n3.  点击“Generate SQL”。SQL随后会生成并显示在查询窗口中。LiveSQL会生成SQL代码，而不是自动创建表。你将在本书后面学习如何使用SQL代码创建表。\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig44_HTML.jpg](Images/471705_1_En_2_Fig44_HTML.jpg)\n\
    \    图 2-44 LiveSQL 中的 CREATE TABLE 查询\n\n4.  点击窗口右上角的“Run”来运行查询。然后，`EMPLOYEE`表将被创建。\n\
    \n你现在能够在Oracle数据库上运行查询并查看结果了。\n\n## 总结\n\n要在自己的计算机上运行Oracle，我们可以运行Oracle Express\
    \ Edition和Oracle SQL Developer，它们都是Oracle提供的免费工具。\n\n设置这些工具涉及安装Oracle Express，在Oracle\
    \ SQL Developer中建立新连接，以及创建一个新用户。\n\n然后，我们使用SQL Developer中的菜单和屏幕创建了一个表，并向该表添加了一些数据。\n\
    \n在下一章中，我们将研究运行一些基本的SQL查询来查看这些数据。\n\n## 第二部分 查看数据\n\n### 3. 检索数据\n\n在本章中，你将学习如何查看数据库中的数据。你将学习你的第一个SQL语句——`SELECT`语句，并在你刚创建的表上看到一些示例。\n\
    \n#### 如何查看数据？\n\n在上一章中，你完成了很多工作：\n\n*   你下载并安装了Oracle Express。\n*   你下载并运行了SQL\
    \ Developer。\n*   你创建了两个新连接和一个新用户。\n*   你创建了一个新表并填充了示例数据。\n\n当你创建表并添加示例数据时，你使用的是SQL\
    \ Developer的用户界面——菜单和屏幕上出现的字段。然而，SQL是一种基于文本的语言。你将学习如何编写SQL代码来处理这些数据，因为这种代码可以在其他应用程序中使用，用于开发报表或其他脚本。\n\
    \nSQL语言中有一个语句或命令允许你查看数据库中的数据。它被称为`SELECT`语句。\n\n#### 什么是 SELECT 语句？\n\n`SELECT`语句是SQL中的一种语句类型，它允许你从数据库中读取数据。一个`SELECT`语句必须按照某种模式编写。这种模式被称为*语法*（syntax），你将学习到的每个语句都有不同的模式或语法。“语法”一词在SQL和编程中常用，用于描述代码需要如何编写。\n\
    \n要在Oracle SQL中编写`SELECT`语句，需要遵循以下语法：\n\n```\nSELECT your_columns\nFROM your_table;\n\
    ```\n\n让我们看看这个语句的各个部分。首先，你从`SELECT`关键字开始。我之所以称它为*关键字*，是因为它是SQL中的一个特殊词汇，有特定的功能（在这个例子中，是检索一些数据）。一个`SELECT`语句以`SELECT`关键字开头。\n\
    \n然后你有一个空格，接着是占位符“your_columns”。这个占位符是你列出希望在结果中显示的列的地方。当你编写`SELECT`语句时（你很快就会做），你需要用其他内容替换“your_columns”部分，通常是一个列名列表。\n\
    \n接下来，是`FROM`关键字。`FROM`关键字是`SELECT`语句的一部分。它指定了数据所来源的表。`FROM`关键字本身不是一个语句，因为一个SQL语句不能以`FROM`关键字开头。`FROM`实际上是一个属于其他语句（如`SELECT`）的关键字。\n\
    \n然后你有一个空格，接着是“your_table”这个词。这也是一个占位符，你可以将其替换为表的名称。\n\n最后，你有一个分号“;”。它指定了语句的结束。写分号是可选的，但养成这个好习惯很有益。当你开始在SQL窗口中拥有多个语句或开始编写更多SQL代码时，分号将变得很重要。尽早养成在SQL语句末尾添加分号的好习惯。"
  raw: "## LiveSQL\n\nOracle has an online database called LiveSQL, which lets you\
    \ create your own data and run your own queries. It’s great for testing out SQL\
    \ or for when you don’t have access to a computer with Oracle installed on it.\n\
    \nAll of the example code in this book can be run on LiveSQL. However, you’ll\
    \ need to know how to use LiveSQL first. To access LiveSQL:\n\n1.  Visit [`https://livesql.oracle.com`](https://livesql.oracle.com)\
    \ in your web browser, which should display as shown in Figure [2-37](#471705_1_En_2_Chapter.xhtml#Fig37).\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig37_HTML.jpg](Images/471705_1_En_2_Fig37_HTML.jpg)\n\
    \n    Figure 2-37\n\n    The LiveSQL home page\n\n2.  Click the red “Start Coding\
    \ Now” button. If you already have an Oracle account, log in with that. Otherwise,\
    \ you’ll have to create one. An account is free, and you don’t have to be an Oracle\
    \ employee.\n\n3.  Once you are logged in and have accepted the Application Disclaimer,\
    \ you’ll have several areas available for you to visit, as shown in Figure [2-38](#471705_1_En_2_Chapter.xhtml#Fig38).\
    \ You can look at scripts or code other people have made available, or you can\
    \ start with a new window. For this book, we’ll start at a new window.\n\n   \
    \ ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig38_HTML.jpg](Images/471705_1_En_2_Fig38_HTML.jpg)\n\
    \n    Figure 2-38\n\n    The LiveSQL page after logging in\n\n4.  Click the red\
    \ Code SQL button or the SQL Worksheet link on the left to open a new LiveSQL\
    \ session.\n\n    You’ll be presented with a new query window, as shown in Figure\
    \ [2-39](#471705_1_En_2_Chapter.xhtml#Fig39).\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig39_HTML.jpg](Images/471705_1_En_2_Fig39_HTML.jpg)\n\
    \n    Figure 2-39\n\n    The SQL worksheet\n\n5.  Enter (or copy and paste) any\
    \ code we have mentioned in this book into this query window, and click the Run\
    \ button. The code should run and the results will be displayed.\n\n6.  To create\
    \ a new table using a wizard similar to the SQL Developer instructions, click\
    \ Schema and choose Create Database Object.\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig40_HTML.jpg](Images/471705_1_En_2_Fig40_HTML.jpg)\n\
    \n    Figure 2-40\n\n    The LiveSQL Schema window\n\n7.  In the popup that appears,\
    \ choose Table.\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig41_HTML.jpg](Images/471705_1_En_2_Fig41_HTML.jpg)\n\
    \n    Figure 2-41\n\n    The Create Database Object window\n\nThe Create Table\
    \ window is shown in Figure [2-42](#471705_1_En_2_Chapter.xhtml#Fig42).\n\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig42_HTML.jpg](Images/471705_1_En_2_Fig42_HTML.jpg)\n\
    \nFigure 2-42\n\nThe Create Table window\n\n1.  Enter a Table Name for your table.\n\
    \n2.  Enter the column names and select data types, in the same way as you did\
    \ in Oracle SQL Developer.\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig43_HTML.jpg](Images/471705_1_En_2_Fig43_HTML.jpg)\n\
    \n    Figure 2-43\n\n    Populating the Create Table window\n\n3.  Click Generate\
    \ SQL. The SQL is then generated and displayed in a query window. LiveSQL will\
    \ generate the SQL code rather than create the table automatically. You’ll learn\
    \ how to create a table using SQL code later in this book.\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig44_HTML.jpg](Images/471705_1_En_2_Fig44_HTML.jpg)\n\
    \n    Figure 2-44\n\n    The CREATE TABLE query in LiveSQL\n\n4.  Click Run in\
    \ the top right corner of the window to run the query. The EMPLOYEE table will\
    \ then be created.\n\nYou’re now able to run queries and see results on an Oracle\
    \ database.\n\n## Summary\n\nTo run Oracle on our own computer, we can run Oracle\
    \ Express Edition and Oracle SQL Developer, which are both free tools offered\
    \ by Oracle.\n\nSetting these up involved installing Oracle Express, setting up\
    \ a new connection, and creating a new user in Oracle SQL Developer.\n\nWe then\
    \ created a table, and added some data to this table, using the menu and screens\
    \ within SQL Developer.\n\nIn the next chapter, we’ll look at running some basic\
    \ SQL queries to see this data.\n\n# Part IIViewing Data\n\n# 3. Retrieving Data\n\
    \nIn this chapter, you’ll learn how to see the data that’s in your database. You’ll\
    \ look at your first SQL statement, the SELECT statement, and see some examples\
    \ of this on the table you just created.\n\n## How Can You See the Data?\n\nIn\
    \ the last chapter, you achieved a lot:\n\n*   You downloaded and installed Oracle\
    \ Express.\n\n*   You downloaded and ran SQL Developer.\n\n*   You created two\
    \ new connections and a new user.\n\n*   You created a new table and populated\
    \ it with sample data.\n\nWhen you created the table and added the sample data,\
    \ you used the user interface of SQL Developer—the menu and the fields that appeared\
    \ on the screen. However, SQL is a text-based language. You’ll be learning how\
    \ to write SQL code to work with this data, because this code can be used in other\
    \ applications, to develop reports, or in other scripts.\n\nThere is a statement\
    \ or command in the SQL language that allows you to view data in the database.\
    \ It’s called the SELECT statement.\n\n## What Is the SELECT Statement?\n\nThe\
    \ SELECT statement is a type of statement in SQL that lets you read data from\
    \ the database. A `SELECT` statement must be written in a certain pattern. This\
    \ pattern is called *syntax*, and each of the statements you’ll learn about has\
    \ a different pattern or syntax. The word syntax is commonly used in SQL and programming\
    \ to describe how code needs to be written.\n\nTo write a `SELECT` statement in\
    \ Oracle SQL, it needs to follow this syntax:\n\n```\nSELECT your_columns\nFROM\
    \ your_table;\n```\n\nLet’s look at each part of this statement. First, you start\
    \ with the `SELECT` keyword. I’ve called it a *keyword* as it’s a special word\
    \ in SQL that does something (in this case, retrieves some data). A `SELECT` statement\
    \ starts with the `SELECT` keyword.\n\nYou then have a space, and then the placeholder\
    \ word “your_columns.” This placeholder is where you list the columns you want\
    \ to show in your results. When you write a `SELECT` statement (which you will\
    \ do shortly), you replace the “your_columns” part with something else, generally\
    \ a list of column names.\n\nNext, you have the `FROM` keyword. The `FROM` keyword\
    \ is part of the `SELECT` statement. It specifies the table that the data is being\
    \ retrieved from. The `FROM` keyword is not a statement, because an SQL statement\
    \ cannot start with the `FROM` keyword. `FROM` is actually a keyword that is part\
    \ of other statements (such as `SELECT`).\n\nYou then have a space, then the word\
    \ “your_table.” This is also a placeholder, and you can replace this with the\
    \ name of the table.\n\nFinally, you have a semicolon “;”. This specifies the\
    \ end of the statement. Writing the semicolon is optional, but it’s a good habit\
    \ to get into. When you start to have multiple statements in an SQL window or\
    \ start writing more SQL code, the semicolon will be important. Adding a semicolon\
    \ to the end of your SQL statements is a good habit to start early."
  trans: "\n## LiveSQL\n\nOracle 有一个在线数据库名为 LiveSQL，它允许你创建自己的数据并运行自己的查询。这对于测试 SQL\
    \ 或当你无法访问安装了 Oracle 的计算机时非常有用。\n\n本书中的所有示例代码都可以在 LiveSQL 上运行。不过，你需要先了解如何使用 LiveSQL。要访问\
    \ LiveSQL：\n\n1.  在你的网页浏览器中访问 [`https://livesql.oracle.com`](https://livesql.oracle.com)，页面应如图\
    \ 2-37 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig37_HTML.jpg](img/471705_1_En_2_Fig37_HTML.jpg)\n\
    \    图 2-37 LiveSQL 主页\n\n2.  点击红色的“立即开始编码”按钮。如果你已有 Oracle 账户，请使用该账户登录。否则，你需要创建一个新账户。账户是免费的，并且你不必是\
    \ Oracle 员工。\n\n3.  登录并接受应用程序免责声明后，你将有几个区域可以访问，如图 2-38 所示。你可以查看其他人提供的脚本或代码，也可以从新窗口开始。对于本书，我们将从新窗口开始。\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig38_HTML.jpg](img/471705_1_En_2_Fig38_HTML.jpg)\n\
    \    图 2-38 登录后的 LiveSQL 页面\n\n4.  点击红色的“编写 SQL”按钮或左侧的“SQL 工作表”链接，以打开一个新的 LiveSQL\
    \ 会话。\n\n    你将看到一个新的查询窗口，如图 2-39 所示。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig39_HTML.jpg](img/471705_1_En_2_Fig39_HTML.jpg)\n\
    \    图 2-39 SQL 工作表\n\n5.  将本书中提到的任何代码输入（或复制粘贴）到此查询窗口中，然后点击“运行”按钮。代码应该会运行，结果将被显示出来。\n\
    \n6.  要使用类似于 SQL Developer 说明的向导创建新表，请点击“概要”并选择“创建数据库对象”。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig40_HTML.jpg](img/471705_1_En_2_Fig40_HTML.jpg)\n\
    \    图 2-40 LiveSQL 概要窗口\n\n7.  在出现的弹出窗口中，选择“表”。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig41_HTML.jpg](img/471705_1_En_2_Fig41_HTML.jpg)\n\
    \    图 2-41 创建数据库对象窗口\n\n创建表窗口如图 2-42 所示。\n\n![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig42_HTML.jpg](img/471705_1_En_2_Fig42_HTML.jpg)\n\
    图 2-42 创建表窗口\n\n1.  为你的表输入一个表名。\n\n2.  以与在 Oracle SQL Developer 中相同的方式输入列名并选择数据类型。\n\
    \n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig43_HTML.jpg](img/471705_1_En_2_Fig43_HTML.jpg)\n\
    \    图 2-43 填写创建表窗口\n\n3.  点击“生成 SQL”。SQL 随后会生成并显示在查询窗口中。LiveSQL 会生成 SQL 代码，而不是自动创建表。你将在本书后面学习如何使用\
    \ SQL 代码创建表。\n\n    ![../images/471705_1_En_2_Chapter/471705_1_En_2_Fig44_HTML.jpg](img/471705_1_En_2_Fig44_HTML.jpg)\n\
    \    图 2-44 LiveSQL 中的 CREATE TABLE 查询\n\n4.  点击窗口右上角的“运行”来执行查询。然后，`EMPLOYEE`\
    \ 表将被创建。\n\n你现在能够在 Oracle 数据库上运行查询并查看结果了。\n\n## 总结\n\n要在自己的计算机上运行 Oracle，我们可以运行\
    \ Oracle Express Edition 和 Oracle SQL Developer，它们都是 Oracle 提供的免费工具。\n\n设置这些工具涉及安装\
    \ Oracle Express，在 Oracle SQL Developer 中建立新连接，以及创建一个新用户。\n\n然后，我们使用 SQL Developer\
    \ 中的菜单和屏幕创建了一个表，并向该表添加了一些数据。\n\n在下一章中，我们将研究运行一些基本的 SQL 查询来查看这些数据。\n\n## 第二部分 查看数据\n\
    \n### 3. 检索数据\n\n在本章中，你将学习如何查看数据库中的数据。你将学习你的第一个 SQL 语句——`SELECT` 语句，并在你刚创建的表上看到一些示例。\n\
    \n#### 如何查看数据？\n\n在上一章中，你完成了很多工作：\n\n*   你下载并安装了 Oracle Express。\n*   你下载并运行了\
    \ SQL Developer。\n*   你创建了两个新连接和一个新用户。\n*   你创建了一个新表并填充了示例数据。\n\n当你创建表并添加示例数据时，你使用的是\
    \ SQL Developer 的用户界面——菜单和屏幕上出现的字段。然而，SQL 是一种基于文本的语言。你将学习如何编写 SQL 代码来处理这些数据，因为这种代码可以在其他应用程序中使用，用于开发报表或其他脚本。\n\
    \nSQL 语言中有一个语句或命令允许你查看数据库中的数据。它被称为 `SELECT` 语句。\n\n#### 什么是 SELECT 语句？\n\n`SELECT`\
    \ 语句是 SQL 中的一种语句类型，它允许你从数据库中读取数据。一个 `SELECT` 语句必须按照某种模式编写。这种模式被称为*语法*（syntax），你将学习到的每个语句都有不同的模式或语法。“语法”一词在\
    \ SQL 和编程中常用，用于描述代码需要如何编写。\n\n要在 Oracle SQL 中编写 `SELECT` 语句，需要遵循以下语法：\n\n```\n\
    SELECT your_columns\nFROM your_table;\n```\n\n让我们看看这个语句的各个部分。首先，你从 `SELECT` 关键字开始。我之所以称它为*关键字*，是因为它是\
    \ SQL 中的一个特殊词汇，有特定的功能（在这个例子中，是检索一些数据）。一个 `SELECT` 语句以 `SELECT` 关键字开头。\n\n然后你有一个空格，接着是占位符\
    \ \"your_columns\"。这个占位符是你列出希望在结果中显示的列的地方。当你编写 `SELECT` 语句时（你很快就会做），你需要用其他内容替换\
    \ \"your_columns\" 部分，通常是一个列名列表。\n\n接下来，是 `FROM` 关键字。`FROM` 关键字是 `SELECT` 语句的一部分。它指定了数据所来源的表。`FROM`\
    \ 关键字本身不是一个语句，因为一个 SQL 语句不能以 `FROM` 关键字开头。`FROM` 实际上是一个属于其他语句（如 `SELECT`）的关键字。\n\
    \n然后你有一个空格，接着是 \"your_table\" 这个词。这也是一个占位符，你可以将其替换为表的名称。\n\n最后，你有一个分号 \";\"。它指定了语句的结束。写分号是可选的，但养成这个好习惯很有益。当你开始在\
    \ SQL 窗口中拥有多个语句或开始编写更多 SQL 代码时，分号将变得很重要。尽早养成在 SQL 语句末尾添加分号的好习惯。\n"
- fmt: "## A Few Things to Note\n\nThere are a few things in the `SELECT` statement\
    \ syntax you might be wondering about, such as the capitalization and the separate\
    \ lines. I’ve written part of that syntax in capital letters and part in lower\
    \ case:\n\n```\nSELECT your_columns\nFROM your_table;\n```\n\nWhy is that? Basically,\
    \ it’s about formatting. When you write SQL, it’s helpful to stick to a consistent\
    \ format, to make it easier to read for others and easier to maintain.\n\nI prefer\
    \ to write SQL keywords, such as `SELECT` and `FROM`, in capital letters. This\
    \ makes them stand out wherever you read them, whether it’s in SQL Developer,\
    \ another IDE, application code, or a script.\n\nOther people prefer to write\
    \ their SQL keywords in lower case, such as `select` and `from`. The choice comes\
    \ down to personal preference and there’s no shortage of articles online that\
    \ specify how and why SQL should be written in either upper case or lower case.\n\
    \nFortunately, SQL is not a case-sensitive language. It doesn’t matter to the\
    \ Oracle database whether you write `SELECT` or `select`. The code will still\
    \ run.\n\nWhich way should you write your SQL? I recommend upper case for keywords.\
    \ However, I also think that it’s more important to be consistent with your formatting\
    \ with the rest of your team or the application. If your team prefers lower case,\
    \ then use lower case. If you have the choice, if you’re learning for yourself\
    \ and not in a team, then I suggest using upper case.\n\nWhat about the spacing?\
    \ Why did I put the word `FROM` on a new line? SQL doesn’t need keywords to be\
    \ on a new line.\n\nHowever, putting the `FROM` keyword (and many other keywords)\
    \ on a new line will help to make the query easier to read and easier to maintain.\
    \ So, I recommend writing your queries like this.\n\n## Our First SELECT Statement\n\
    \nNow that you’ve looked at the syntax of a `SELECT` statement and explained some\
    \ of the formatting, let’s write your very first `SELECT` statement.\n\nFirst,\
    \ you start with the `SELECT` keyword:\n\n```\nSELECT\n```\n\nThen, you add in\
    \ the columns you want to see. In this example, we will show all of the columns\
    \ available in this table. To do that in SQL, you use the asterisk character `*`.\
    \ Add this to the end of the `SELECT` keyword, after a space.\n\n```\nSELECT *\n\
    ```\n\nThis variation of the `SELECT` statement is often called a “select all”\
    \ or a “select star,” as you are selecting all of the columns.\n\nNext, you start\
    \ a new line and add the word `FROM`.\n\n```\nSELECT *\nFROM\n```\n\nNow you need\
    \ to specify which table the data comes from. You can use the table you created\
    \ in the last chapter, which was `employee`.\n\n```\nSELECT *\nFROM employee\n\
    ```\n\nFinally, add a semicolon.\n\n```\nSELECT *\nFROM employee;\n```\n\nThis\
    \ is your very first `SELECT` statement!\n\nWhat about the rows? You have specified\
    \ you want to see all columns, but what about the rows?\n\nThe database will use\
    \ this statement and find all rows that match the criteria you provide. By default,\
    \ all rows are returned, unless you specify criteria that you should check. You’ll\
    \ learn about displaying rows that meet certain criteria later in this book, but\
    \ for now you aren’t adding any, so the database will show you all rows.\n\nWhat\
    \ do you do with it? You run it on your database using an SQL worksheet or editor.\n\
    \n## Running a Statement in SQL Developer\n\nTo run your `SELECT` statement, you\
    \ can use SQL Developer. You can do this by following these steps:\n\n![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig5_HTML.jpg](Images/471705_1_En_3_Fig5_HTML.jpg)\n\
    Figure 3-5 The query results\n\n1.  Open `SQL Developer`. It should be in the\
    \ location that you extracted it in the previous chapter. A loading screen will\
    \ appear and within 5 to 10 seconds the application will load.\n\n2.  In the `Connections`\
    \ menu on the left of the screen (Figure [3-1](#471705_1_En_3_Chapter.xhtml#Fig1)),\
    \ there should be two connections (one for `SYSTEM` and one for `Intro User` or\
    \ the user you created).\n\n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig1_HTML.jpg](Images/471705_1_En_3_Fig1_HTML.jpg)\n\
    \    Figure 3-1 The Connections panel\n\n3.  Double-click your `Intro User` connection\
    \ (or the connection that is not for the `SYSTEM` user).\n\n    A new SQL worksheet\
    \ will open on the main screen. Notice that on the top right corner, the drop-down\
    \ box contains the name of your connection, as shown in Figure [3-2](#471705_1_En_3_Chapter.xhtml#Fig2).\n\
    \n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig2_HTML.jpg](Images/471705_1_En_3_Fig2_HTML.jpg)\n\
    \    Figure 3-2 The new SQL worksheet\n\n4.  Click inside the new SQL window and\
    \ enter in your SQL query as follows:\n\n    ```\n    SELECT *\n    FROM employee;\n\
    \    ```\n\n    As you enter it, some popup menus may appear to help your typing.\
    \ You can ignore those for now. Your screen should look like Figure [3-3](#471705_1_En_3_Chapter.xhtml#Fig3).\n\
    \n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig3_HTML.jpg](Images/471705_1_En_3_Fig3_HTML.jpg)\n\
    \    Figure 3-3 Entering an SQL query\n\n    On the top of the SQL window, above\
    \ where you’ve just written your `SELECT` statement, there is a row of buttons,\
    \ as shown in Figure [3-4](#471705_1_En_3_Chapter.xhtml#Fig4).\n\n    ![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig4_HTML.jpg](Images/471705_1_En_3_Fig4_HTML.jpg)\n\
    \    Figure 3-4 The Run buttons\n\n    The first button, the big green arrow,\
    \ is `Run Statement`, and the second is `Run Script`. I’ll show you what happens\
    \ when you use those buttons. You can ignore the other buttons for now.\n\n5.\
    \  Click the `Run Statement` button, which is the first button on the toolbar.\n\
    \n    The SQL statement is run, and after a moment, a set of data is shown at\
    \ the bottom of the screen (Figure [3-5](#471705_1_En_3_Chapter.xhtml#Fig5)).\n\
    \nYou’ll notice that the data is shown in rows, and there are five rows. On the\
    \ left of each row, there is a number, as shown in the screenshot in Figure [3-6](#471705_1_En_3_Chapter.xhtml#Fig6).\
    \ This number represents the row number of your result.\n\n![../images/471705_1_En_3_Chapter/471705_1_En_3_Fig6_HTML.jpg](Images/471705_1_En_3_Fig6_HTML.jpg)\n\
    Figure 3-6 The row number\n\nIn this example the row number is the same as the\
    \ `ID`, but that’s because the data is shown in that order. When you write queries\
    \ that don’t have the `ID` column or show data in a different order, this row\
    \ number can help you see what each row number is.\n\n## Results\n\nWhen a `SELECT`\
    \ statement is run on a database, the results of the statement are shown to you.\
    \ This is called the results, or your `result set`, as it’s a set of data that\
    \ results from a query.\n\nIn your previous example, you wanted to see all columns\
    \ in the `employee` table. When you run this statement, a table or grid appears\
    \ at the bottom of the screen. This grid is your `result set`, and it is all of\
    \ the columns and rows in the `employee` table.\n\nThis is the same data that\
    \ you entered in the previous chapter. It shows the `ID` column, the `last_name`\
    \ column, and the `salary` column. It shows all of the rows you entered."
