    the `SELECT` clause in the query.


    ## Selecting Multiple Columns


    In `SQL`, you can specify more than one column in your `SELECT` clause. You do
    this by specifying multiple column names separated by commas, as we saw in the
    beginning of this chapter:


    ```sql

    SELECT column1, column2, column_n...

    FROM your_table;

    ```


    If we want to show both the `ID` and the `last_name` columns, we would write our
    query like this:


    ```sql

    SELECT id, last_name

    FROM employee;

    ```


    You might notice a space between the comma and the next column name. This space
    is not required. The statement will still run if it’s missing the space. For example,
    the following is less legible, but still executes the same:


    ```sql

    SELECT id,last_name

    FROM employee;

    ```


    However, I think it’s easier to read if there’s a space:


    ```sql

    SELECT id, last_name

    FROM employee;

    ```


    This query will show the `id` and `last_name` for each record in the `employee`
    table. You can run this query in the same way as earlier examples in `SQL Developer`.
    Enter it into `SQL Developer` and click the `Run Statement` button. Your screen
    should look like Figure 4-10 before running the query, and Figure 4-11 after running
    the query.


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig11_HTML.jpg](Images/471705_1_En_4_Fig11_HTML.jpg)


    Figure 4-11 After running the query


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig10_HTML.jpg](Images/471705_1_En_4_Fig10_HTML.jpg)


    Figure 4-10 Before running the query


    The results can also be represented like this:


    | ID | LAST_NAME |

    | --- | --- |

    | 1 | JONES |

    | 2 | SMITH |

    | 3 | KING |

    | 4 | SIMPSON |

    | 5 | ANDERSON |


    The results at the bottom of the screen will show all records with both the `ID`
    and the `last_name` columns.


    ## Selecting All Columns


    You can use the same method for displaying all columns in a table. You can choose
    to write `SELECT *`, or you can choose to enumerate all the column names.


    The `SELECT *` approach from earlier in the book looks like this:


    ```sql

    SELECT *

    FROM employee;

    ```


    For example, if you wanted to display the `ID`, the `last name`, and the `salary`
    of all employees, your query could look like this:


    ```sql

    SELECT id, last_name, salary

    FROM employee;

    ```


    The three columns are specified, and their names are separated by commas. Both
    approaches will show the same results: selecting all columns using `*` or selecting
    all columns individually.


    You can enter this statement in `SQL Developer`, as shown in Figure 4-12.


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig12_HTML.jpg](Images/471705_1_En_4_Fig12_HTML.jpg)


    Figure 4-12 Selecting all columns


    When you run the query, you’ll see the `id`, `last_name`, and `salary` for all
    `employee` records, as shown in Figure 4-13.


    ![../images/471705_1_En_4_Chapter/471705_1_En_4_Fig13_HTML.jpg](Images/471705_1_En_4_Fig13_HTML.jpg)


    Figure 4-13 The results of all columns'
