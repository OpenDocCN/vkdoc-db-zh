    9    PATRICK     40000    3333.333333

    ```


    在这些结果中，该列现在有了一个新的标题。正如你所见，使用列别名在处理数学运算时特别有用。


    ## 列别名与表别名


    在本章中，你已经分别在不同的查询中学习了列别名和表别名。它们实际上可以在同一个查询中使用，以使你的查询更具可读性。


    你可以使用本章前面查找月薪的查询。


    ```sql

    SELECT id,

    last_name,

    salary,

    salary / 12 AS monthly_salary

    FROM employee;

    ```


    这个查询使用列别名将 `salary / 12` 重命名为 `monthly_salary`。你可以将表别名与此查询一起使用：


    ```sql

    SELECT e.id,

    e.last_name,

    e.salary,

    e.salary / 12 AS monthly_salary

    FROM employee e;

    ```


    在这个查询中，每次我们引用 `employee` 表中的列时，我们都使用了表别名 "`e`"。正如我们之前提到的，对于像这样简单的查询，这可能看起来工作量太大，但这是学习使用更复杂查询时的一个重要技巧。


    ## 总结


    表别名和列别名都是 SQL 中的可选功能，可以在你的查询中使用。表别名允许你为表在查询中指定另一个名称，这通常比真实名称短。当你处理更复杂的查询时，它们很有帮助，并且它们允许你使用
    IDE 的智能感知或自动完成功能。


    列别名允许你为输出中的列指定另一个名称或标签，使其更易于用户阅读，也更容易被其他应用程序处理。


    数学运算允许你在 SQL 中对值进行加、减、乘、除，这些是使用列别名的常见目标。最后，你可以在单个查询中同时使用列别名和表别名。当你转向更复杂的查询时，你会发现这些功能更有用。


    # 第三部分 添加、更新、删除数据


    # 第 13 章 理解数据类型


    在本章中，你将学习什么是数据类型、为什么需要它们，以及 Oracle 数据库如何处理不同的数据类型。


    ## 什么是数据类型？


    `数据类型`是信息在数据库中存储的格式。表中的每个列都有一个数据类型，这是在创建表并指定列名时定义的。


    如果你以前做过任何编程，比如 .Net 或 Java，你会知道这些语言中有不同的数据类型可用。数据库开发和 SQL 也不例外。有可用的数据类型来指定数据的存储方式。


    你还记得本书前面创建 `employee` 表的时候吗？我们要求你为 `ID`、`last_name` 和 `salary` 列选择数据类型（图 13-1）。


    ![../images/471705_1_En_13_Chapter/471705_1_En_13_Fig1_HTML.jpg](img/471705_1_En_13_Fig1_HTML.jpg)


    图 13-1. 向表中添加列时选择数据类型


    这一步就是指定每个列的数据类型的地方。你指定了：


    *   `ID` 列是某种数字。

    *   `last_name` 列是文本值。

    *   `salary` 列也是数字。

