    | ID | LAST_NAME | SALARY | ADDRESS |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 123 Smith Street |

    | 2 | SMITH | 35000 | 45 Main Street |

    | 3 | KING | 45000 | 45 Main Street |

    | 4 | SIMPSON | 52000 | 123 Smith Street |

    | 6 | COOPER | (null) | 123 Smith Street |

    | 7 | ADAMS | (null) | 10 Collins Road |

    | 8 | SMITH | 62000 | 10 Collins Road |

    | 9 | PATRICK | 40000 | 123 Smith Street |

    | 10 | Jones | 42000 | 45 Main Street |


    This query gets data from two tables (the `employee` and `office` tables) and
    joins them on the `office''s id` value. When the Oracle database processes this
    query, it will do something like this:


    1.  Look up all data in the employee table


    2.  Look at each employee’s office_id value


    3.  Using that office_id value, look at all values in the office table for the
    matching id value


    4.  Get the address from the matching row and use that for the employee


    5.  Repeat steps 2-4 for each employee record


    In the preceding list, step 3 is where the link between the two tables is used.
    Without an index, each row in the `office` table is scanned for the `office id`
    for that `employee`. For example, the `employee` with an `id` of 1 (JONES) has
    an `office_id` of 1\. The database will then look through the `office` table for
    the row with and `id` of 1 and use the `address` from that row. This is repeated
    for the `employee` with and `id` of 2 (SMITH), and so on.


    This may be OK when there are three rows in the `office` table. But when there
    are hundreds or thousands, it can really impact the performance.


    ### Creating an Index


    The query in the example we just saw was using a join between the primary key
    from the `office` table and a foreign key from the `employee` table:


    ```

    SELECT

    e.id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    The primary key on the `office` table is `id`, and the foreign key on the `employee`
    table is `office_id`. In an Oracle database, whenever you define a primary key
    on a table, an index is automatically created on that column. An index will exist
    on the office.id column. However, an index is not automatically created when a
    foreign key is created.


    Creating an index on a foreign key column is a great way to improve the performance
    of a query. A foreign key column (such as the `employee.office_id`) is often used
    to look up values in another table.


    ### Note


    In Oracle, an index is automatically created on a primary key. An index is **not**
    automatically created on a foreign key.


    To create an index on the `employee.office_id` column, you can run this statement:


    ```

    CREATE INDEX idx_emp_officeid

    ON employee (office_id);

    ```


    Once again, I’ve used a naming convention with the name of the index. It’s called
    `idx_emp_officeid`, which means it is an index on the `employee` table on the
    `office_id` column. Once you run this statement, an index is created on the database.


    ```

    Index IDX_EMP_OFFICEID created.

    ```


    Now the index is created, the way the Oracle database runs the query will mean
    the index can be used and the query will run faster.


    ## The Disadvantages of Indexes


    Creating indexes is a good way to improve the performance of a query. However,
    they’re not a “silver bullet” to good-performing SQL. They’re not a single magical
    solution. There are some disadvantages.


    First, each index requires some space on the database. Depending on the number
    of records in the related table, this could be a large amount of space. The more
    indexes you create, the more space is taken up. You might have a maximum size
    for your database, set by your IT department, so this may be something to be conscious
    of.


    Another disadvantage is keeping the index updated. Indexes on a table improve
    the performance of `SELECT` queries, but they reduce the performance of `INSERT`,
    `UPDATE`, and `DELETE` queries. This is because each time an `INSERT`, `UPDATE`,
    or `DELETE` query is run, the index needs to be updated along with the table.
    This can slow down the query. If there are multiple indexes on a table (which
    is possible), then these `INSERT`/`UPDATE`/`DELETE` queries can take much longer.
    This might not seem like much for a simple query, but with more complicated queries,
    the run time can easily expand.


    So, there is a tradeoff between creating too many indexes and not enough indexes.
    How do you know what indexes to create?'
  trans: '

    ### 夜间批处理作业


    查询性能重要的另一个例子是夜间批处理作业。在许多组织中，用户操作的应用程序会存储数据。这些用户还需要对这些数据运行报告，以了解他们每月的销售额或注册客户数量。报告数据的系统通常与捕获数据的系统是分开的，因为生成报告可能会影响在线应用程序的性能。


    为了让报告系统和在线应用程序高效运行，应用程序中的数据会被转移到一个报告系统中。这个报告系统针对查看数据进行了优化，它使用一个称为抽取、转换、加载 (`ETL`)
    的流程。这个流程包含许多不同的 SQL 查询，例如填充表格以显示每日和每月的总销售额。


    这个过程以及这些查询通常在夜间执行，这样应用程序的用户不会受到影响，并且报告系统也能为第二天做好准备。这些步骤大约有 12 小时的运行窗口。听起来时间很长，对吧？但是，这些查询可能非常复杂，可能需要相当长的时间才能运行完成。目标是让这些查询在午夜的某个时候完成，这样数据就能为第二天做好准备。然而，如果查询性能不佳，它们可能到早上
    9 点还在运行，这意味着报告系统尚未准备好使用，而且运行它的服务器仍然处于负载之下。


    这类查询的某个特定步骤花费 20 分钟或更长时间是很常见的。如果一个查询花了 3 个小时而不是 20 分钟，就可能导致流程的其余部分被延迟。在这种情况下，SQL
    查询的性能非常重要。


    ### 报告系统


    查询性能重要的最后一个例子是在报告系统中。如前所述，生成报告的系统通常与捕获数据的系统不同。公司里所有人都会使用报告系统，根据不同系统中捕获的数据来查看不同的信息。


    每次生成报告时，都会运行一个查询从数据库中 `SELECT` 数据。这些报告的生成可能需要一点时间。例如，如果报告在 30 秒内生成，用户可能会感到满意。然而，如果报告开始需要几分钟才能生成，用户就会感到沮丧，对该系统的体验也会很差。


    以上就是一些例子，说明查询的性能和运行时间如何影响用户体验。


    ## 使用连接（Join）的索引


    索引有用的一种常见情况是针对用作连接（join）一部分的列。看下面这个查询示例：


    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    此查询将显示以下结果。


    | ID | LAST_NAME | SALARY | ADDRESS |

    | --- | --- | --- | --- |

    | 1 | JONES | 30000 | 123 Smith Street |

    | 2 | SMITH | 35000 | 45 Main Street |

    | 3 | KING | 45000 | 45 Main Street |

    | 4 | SIMPSON | 52000 | 123 Smith Street |

    | 6 | COOPER | (null) | 123 Smith Street |

    | 7 | ADAMS | (null) | 10 Collins Road |

    | 8 | SMITH | 62000 | 10 Collins Road |

    | 9 | PATRICK | 40000 | 123 Smith Street |

    | 10 | Jones | 42000 | 45 Main Street |


    此查询从两个表（`employee` 和 `office` 表）获取数据，并基于 `office` 表的 `id` 值将它们连接起来。当 Oracle 数据库处理此查询时，它大致会执行以下操作：


    1.  查找 `employee` 表中的所有数据

    2.  查看每个 `employee` 的 `office_id` 值

    3.  使用该 `office_id` 值，查找 `office` 表中所有匹配 `id` 值的行

    4.  从匹配的行中获取 `address`，并将其用于该 `employee`

    5.  对每个 `employee` 记录重复步骤 2-4


    在上面的列表中，步骤 3 是两个表之间关联被使用的地方。如果没有索引，就会为每个 `employee` 扫描 `office` 表的每一行以查找对应的 `office_id`。例如，`id`
    为 1 (`JONES`) 的 `employee` 的 `office_id` 是 1。然后数据库会查找 `office` 表中 `id` 为 1 的行，并使用该行的
    `address`。接着对 `id` 为 2 (`SMITH`) 的 `employee` 重复此过程，依此类推。


    当 `office` 表中只有三行时，这可能没问题。但当有成百上千行时，它会严重影响性能。


    ### 创建索引


    我们刚才看到的查询示例使用了 `office` 表的主键和 `employee` 表的外键之间的连接（join）：


    ```sql

    SELECT

    e.id,

    e.last_name,

    e.salary,

    o.address

    FROM employee e

    INNER JOIN office o ON e.office_id = o.id;

    ```


    `office` 表上的主键是 `id`，`employee` 表上的外键是 `office_id`。在 Oracle 数据库中，当你为表定义主键时，会自动在该列上创建一个索引。因此
    `office.id` 列上会存在一个索引。但是，在创建外键时，不会自动创建索引。


    在外键列上创建索引是提高查询性能的好方法。外键列（如 `employee.office_id`）通常用于在另一个表中查找值。


    ### 注意


    在 Oracle 中，主键会自动创建索引。外键则 `不会` 自动创建索引。


    要创建 `employee.office_id` 列上的索引，可以运行以下语句：


    ```sql

    CREATE INDEX idx_emp_officeid

    ON employee (office_id);

    ```


    再次说明，我使用了命名约定来命名这个索引。它被称为 `idx_emp_officeid`，意思是这是 `employee` 表上 `office_id` 列的一个索引。运行此语句后，索引就在数据库中创建了。


    ```text

    Index IDX_EMP_OFFICEID created.

    ```


    索引创建后，Oracle 数据库运行查询的方式将使得可以使用索引，从而加快查询运行速度。


    ## 索引的缺点


    创建索引是提高查询性能的好方法。然而，它们并不是实现良好 SQL 性能的“万能解药”。它们并不是一个单一的、神奇的解决方案。索引也有一些缺点。


    首先，每个索引都需要数据库中的一些空间。根据相关表中的记录数量，这可能是大量的空间。你创建的索引越多，占用的空间就越多。你的 IT 部门可能为数据库设置了最大大小限制，所以这一点需要注意。


    另一个缺点是保持索引更新。表上的索引提高了 `SELECT` 查询的性能，但会降低 `INSERT`、`UPDATE` 和 `DELETE` 查询的性能。这是因为每次运行
    `INSERT`、`UPDATE` 或 `DELETE` 查询时，索引需要与表一起更新。这会减慢查询速度。如果一个表上有多个索引（这是可能的），那么这些 `INSERT`/`UPDATE`/`DELETE`
    查询可能需要更长的时间。对于简单的查询，这可能看起来没什么，但对于更复杂的查询，运行时间很容易就会延长。


    因此，在创建过多索引和创建不足索引之间存在一个权衡。你如何知道应该创建哪些索引呢？

    '
- fmt: "## Best Practices for Creating Indexes\n\nThere are a few best practices that\
    \ I can recommend for knowing when and how to create indexes:\n\n*   Consider\
    \ creating indexes on columns used in `WHERE` clauses of queries (e.g., `WHERE`\
    \ last_name = ‘SMITH’). This will help the lookup on this column.\n*   Consider\
    \ creating indexes on columns used in `JOIN`s, which will also help the lookup\
    \ on this column.\n*   Don’t create indexes on every column in the table, as this\
    \ can slow down the `INSERT`, `UPDATE`, and `DELETE` queries on this table.\n\
    *   Consider creating indexes on columns that have a lot of different unique values.\n\
    \nThere are several different types of indexes that are not covered in this book.\
    \ If you are doing performance tuning on your database and are considering indexes,\
    \ it would be useful to learn about the other types of indexes so you can determine\
    \ what's best for your query.\n\nA large part of knowing when to create indexes\
    \ is knowing the types of queries that your database runs, and what data is stored\
    \ in the tables. This often comes from speaking with other team members and even\
    \ database administrators, who are responsible for the administration of the database\
    \ server and often are quite knowledgeable in database performance.\n\n## Summary\n\
    \nAn index in a database is an object that improves the performance of queries.\
    \ They are created on a table and include one or more columns. Queries that perform\
    \ well are important as they improve the user experience, whether it is in an\
    \ application, an overnight batch job, or a reporting system.\n\nIndexes are useful\
    \ to create on columns that are used in `WHERE` clauses of queries, or on fields\
    \ in a `JOIN` clause. However, indexes can slow down `INSERT`, `UPDATE`, and `DELETE`\
    \ queries, so it’s not advisable to create indexes on every column in a table.\n\
    \n# Part VI Command Line\n\n## 27. Using the Command Line\n\nSo far, we’ve used\
    \ an application called `SQL Developer` to run our SQL queries. At the start of\
    \ the book, you downloaded this software from the Oracle website and used it to\
    \ run queries.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig1_HTML.jpg](Images/471705_1_En_27_Fig1_HTML.jpg)\n\
    \nFigure 27-1 Oracle SQL Developer\n\nAnother way you can run these queries is\
    \ using `LiveSQL`, which is Oracle’s web-based SQL editor. You can create tables\
    \ and run queries using an account you create on Oracle’s website for this tool.\
    \ However, this will only work on tables you create within `LiveSQL`. You can’t\
    \ use it to connect to your databases on your own computer.\n\nThere’s a third\
    \ way you can run SQL, and that’s using the `command line`. The `command line`\
    \ is a name for a tool on every operating system that lets you run commands using\
    \ text only.\n\n![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig2_HTML.jpg](Images/471705_1_En_27_Fig2_HTML.jpg)\n\
    \nFigure 27-2 The command line on Windows\n\n### What is `SQL*Plus` and Why Would\
    \ You Use It?\n\n`SQL*Plus` is a command line tool offered by Oracle. It comes\
    \ with both the Express Edition of Oracle (which you would have downloaded earlier\
    \ in this book) as well as the full edition of Oracle. `SQL*Plus` lets you connect\
    \ to an Oracle database and run queries on it.\n\nIf it’s a text-based tool, why\
    \ would you want to use that instead of a full user interface such as `SQL Developer`?\
    \ There are a few reasons.\n\n**It’s Fast**\n\nThe `SQL*Plus` tool is pretty fast.\
    \ It’s a small tool that does a lot. It’s faster to load and run than IDEs such\
    \ as `SQL Developer`. Sure, it has fewer features and you can’t click buttons,\
    \ but it starts up very quickly and it’s great for running queries.\n\nLike many\
    \ software tools, the more you use it, the more efficient you’ll become at it.\
    \ After a while, you’ll start getting better at using `SQL*Plus`. Many software\
    \ developers prefer using text-based editors such as `vim` and `emacs` for their\
    \ development work for this reason: it’s fast.\n\n**It’s Easy to Run Scripts**\n\
    \nA script is a file that contains a set of SQL statements. Running one of these\
    \ in `SQL*Plus` is quite easy. In `SQL Developer`, you’ll have to open the file\
    \ by browsing through the directories on your computer. In `SQL*Plus`, you can\
    \ copy and paste or enter the path to the file and run it.\n\n**It’s Available\
    \ on Every Oracle Database**\n\nAnother advantage of `SQL*Plus` is that it comes\
    \ with every Oracle database. Whether you’re running Oracle Express or the full\
    \ version of Oracle, you’ll have access to `SQL*Plus` and are able to run SQL\
    \ commands with it.\n\n**You Don’t Always Have Access to `SQL Developer`**\n\n\
    While `SQL Developer` is a free application and doesn’t require an installation\
    \ process, you may not be able to use it in your workplace. At my first role in\
    \ the industry, we used a tool called “PL/SQL Developer,” which is a paid application\
    \ similar to `SQL Developer`. This means we didn’t use `SQL Developer` for our\
    \ queries, so any habits or techniques with `SQL Developer` that I or my team\
    \ learned were not able to be used.\n\nAnother situation where you may not have\
    \ access to `SQL Developer` is on client sites. Some people have jobs where they\
    \ visit different clients quite regularly and are not able to install software\
    \ at the client’s site. This means they will have to use `SQL*Plus`, rather than\
    \ use `SQL Developer`.\n\n### How to Start `SQL*Plus`\n\nTo start `SQL*Plus`,\
    \ you need to open a command window. These steps will assume you’re running Oracle\
    \ on Windows, but the steps are similar for other operating systems as well. `SQL*Plus`\
    \ was included with Oracle Express that you installed at the beginning of this\
    \ book.\n\n1.  Open the Command Prompt by clicking Start and typing “`cmd`”.\n\
    \n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig3_HTML.jpg](Images/471705_1_En_27_Fig3_HTML.jpg)\n\
    \n    Figure 27-3 Running the `cmd` command\n\n    If you’re on an older version\
    \ of Windows, you may need to click Start then click Run, then type “`cmd`”.\n\
    \n2.  Press Enter. The command window is now open.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig4_HTML.jpg](Images/471705_1_En_27_Fig4_HTML.jpg)\n\
    \n    Figure 27-4 The Windows command window\n\n3.  Enter the command `sqlplus`\
    \ and press Enter.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig5_HTML.jpg](Images/471705_1_En_27_Fig5_HTML.jpg)\n\
    \n    Figure 27-5 Running `sqlplus`\n\n4.  Enter your `username` and press Enter.\
    \ This could be the `system` username, or the `username` you set up earlier in\
    \ the book.\n5.  Enter your `password` and press Enter. If you’re using the `system`\
    \ account, this is the same `password` you entered when you installed Oracle Express\
    \ and when you set up the connection in `SQL Developer` earlier in this book.\
    \ If you’re using the user you created, then enter their `password` here.\n\n\
    \    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig6_HTML.jpg](Images/471705_1_En_27_Fig6_HTML.jpg)\n\
    \n    Figure 27-6 Logging in to `SQL*Plus`\n\nYou are now logged in to `SQL*Plus`\
    \ and your database.\n\n**Note**\n\nYour output will include Oracle version 18c\
    \ (unlike the screenshot here, which mentions version 11).\n\n### Alternative\
    \ Login Syntax\n\nThere are other ways you can enter your `username` and `password`\
    \ when logging in to `SQL*Plus`. These are used as a personal preference or as\
    \ a quicker way of logging in. To use these other methods:\n\n**Login with Two\
    \ Steps**\n\nYou can log in to your database with two steps: specifying the `username`\
    \ as a parameter when launching `sqlplus` and entering the `password` separately.\n\
    \n1.  Open the command window as explained in the earlier steps.\n2.  Enter `sqlplus\
    \ username`, where `username` is the name of the user you want to enter, and press\
    \ Enter.\n\n    ![../images/471705_1_En_27_Chapter/471705_1_En_27_Fig7_HTML.jpg](Images/471705_1_En_27_Fig7_HTML.jpg)\n\
    \n    Figure 27-7 Logging in to `SQL*Plus` in a different way\n3.  Enter the `password`\
    \ for this user, and press Enter.\n\nYou are now logged in to your database."
