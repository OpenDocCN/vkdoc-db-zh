- fmt: "# Adding More Data\n\nYour table currently looks like this:\n\n```\nID   LAST_NAME\
    \   SALARY\n1    JONES       20000\n2    SMITH       35000\n3    KING        40000\n\
    4    SIMPSON     52000\n5    ANDERSON    31000\n```\n\nYou should add a new row\
    \ into the table which has a `NULL` value for the `salary` column, and another\
    \ row that has a `NULL` value for both `last_name` and `salary` columns.\n\n```\n\
    ID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH       35000\n3   \
    \ KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n6    COOPER\
    \      NULL\n7    NULL        NULL\n```\n\nLet’s add this to our table.\n\n1.\
    \  Open SQL Developer and connect to the database, using the steps shown in the\
    \ previous chapters, if you haven’t done so already.\n2.  Click on the arrow next\
    \ to the connection name, then click on the arrow next to “Tables (Filtered)”\
    \ to expand it, and click on `EMPLOYEE`, as shown in Figure [8-1](#471705_1_En_8_Chapter.xhtml#Fig1).\n\
    \n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig1_HTML.jpg](Images/471705_1_En_8_Fig1_HTML.jpg)\n\
    \n    Figure 8-1: The Connections list including the table name\n\n3.  Click on\
    \ the `Data` tab on the window that appears on the main section of the screen,\
    \ as shown in Figure [8-2](#471705_1_En_8_Chapter.xhtml#Fig2).\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig2_HTML.jpg](Images/471705_1_En_8_Fig2_HTML.jpg)\n\
    \n    Figure 8-2: The Employee table data\n\n4.  Click on the `Insert Row` button\
    \ on the toolbar. It should be the third button from the left. A new row will\
    \ appear, as shown in Figure [8-3](#471705_1_En_8_Chapter.xhtml#Fig3).\n\n   \
    \ ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig3_HTML.jpg](Images/471705_1_En_8_Fig3_HTML.jpg)\n\
    \n    Figure 8-3: A new row in the table\n\n5.  In the new row, enter an `ID`\
    \ of 6 and a `last_name` of `COOPER`. Leave the `salary` value as `(null)`, as\
    \ shown in Figure [8-4](#471705_1_En_8_Chapter.xhtml#Fig4).\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig4_HTML.jpg](Images/471705_1_En_8_Fig4_HTML.jpg)\n\
    \n    Figure 8-4: Entering the data\n\n6.  Click on the `Insert Row` button again,\
    \ to insert a new row.\n7.  Enter an `ID` of 7 for the new row, and leave the\
    \ `last_name` and `salary` columns as `(null)`, as shown in Figure [8-5](#471705_1_En_8_Chapter.xhtml#Fig5).\n\
    \n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig5_HTML.jpg](Images/471705_1_En_8_Fig5_HTML.jpg)\n\
    \n    Figure 8-5: Two new rows in the table\n\n8.  Click the `Commit Changes`\
    \ button to save this data to the database. The `Commit Changes` button is the\
    \ grey shape with the green tick, to the right of the red cross, as shown in Figure\
    \ [8-6](#471705_1_En_8_Chapter.xhtml#Fig6).\n\n    ![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig6_HTML.jpg](Images/471705_1_En_8_Fig6_HTML.jpg)\n\
    \n    Figure 8-6: The Commit Changes button\n\nYour screen should look like Figure\
    \ [8-7](#471705_1_En_8_Chapter.xhtml#Fig7).\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig7_HTML.jpg](Images/471705_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7: Saving the changes\n\n# Selecting the Records\n\nYou can check that\
    \ the new data is in the table by running a `SELECT` statement, just like you\
    \ have done in earlier chapters. To do this:\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig8_HTML.jpg](Images/471705_1_En_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8: The Select Connection window\n\n1.  Open a new SQL file or use an\
    \ existing file you have open. In the earlier chapters we looked at how to do\
    \ this, and we’ll go through that again now. If you have a window open already,\
    \ you can skip the next few steps.\n2.  To open a new SQL file, click on the `New\
    \ Worksheet` button.\n3.  Select a Connection, as shown in Figure [8-8](#471705_1_En_8_Chapter.xhtml#Fig8).\n\
    \nA new SQL worksheet is shown.\n\n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig9_HTML.jpg](Images/471705_1_En_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9: The SELECT query on the employee table\n\n1.  Run the following\
    \ query:\n\n    ```\n    SELECT id, last_name, salary\n    FROM employee;\n  \
    \  ```\n\n    The results should look like Figure [8-9](#471705_1_En_8_Chapter.xhtml#Fig9).\n\
    \nAs you can see, the `NULL` values are displayed in this table. In SQL Developer,\
    \ they are displayed as `(null)` so we can see that they are `NULL` values. However,\
    \ if the results of this query are used in an application, they will be `NULL`\
    \ and need to be treated accordingly.\n\n# Restricting the NULL Values\n\nYou\
    \ can see the `NULL` values in the table. What if you wanted to exclude them from\
    \ our results? Earlier I mentioned that you can’t use the “equals to” sign. Let’s\
    \ see what happens when you do this. You can run this query:\n\n```\nSELECT id,\
    \ last_name, salary\nFROM employee\nWHERE salary = NULL;\nNo results found.\n\
    ```\n\nSQL Developer would display no results, as shown in Figure [8-10](#471705_1_En_8_Chapter.xhtml#Fig10).\n\
    \n![../images/471705_1_En_8_Chapter/471705_1_En_8_Fig10_HTML.jpg](Images/471705_1_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10: No results found\n\nYou need to use the `IS NULL` keyword. To do\
    \ this, you can adjust your query so it looks like this:\n\n```\nSELECT id, last_name,\
    \ salary\nFROM employee\nWHERE salary IS NULL;\n```\n\nYour results will look\
    \ like this:\n\n```\nID   LAST_NAME   SALARY\n6    COOPER      NULL\n7    NULL\
    \        NULL\n```\n\nIt only shows the rows that have a `NULL` `salary` value.\
    \ You can try the same thing for the `last_name` column:\n\n```\nSELECT id, last_name,\
    \ salary\nFROM employee\nWHERE last_name IS NULL;\n```\n\nThe results are:\n\n\
    ```\nID   LAST_NAME   SALARY\n7    NULL        NULL\n```\n\nThis will only show\
    \ records where the `last_name` column is `NULL`.\n\n# Hiding Null Values\n\n\
    You’ve just seen how to show records with `NULL` values in your results. What\
    \ if you want to ignore them? You can use a similar keyword. Just like you can’t\
    \ use “equals to” to look for `NULL` values, you can’t use “not equals to” to\
    \ ignore `NULL` values.\n\nThe keyword to use is `NOT`. `NOT` is a keyword in\
    \ SQL that performs the opposite of the keyword it is used on. It’s used in several\
    \ places in SQL, which you will learn about in this book. For now, it can be used\
    \ to ignore `NULL` values. Your query would look like this:\n\n```\nSELECT id,\
    \ last_name, salary\nFROM employee\nWHERE salary IS NOT NULL;\n```\n\nNotice that\
    \ you have added the word `NOT` after `IS`, so it reads `IS NOT NULL`. This means\
    \ that all records where the `salary` is not `NULL` will be shown. Your results\
    \ are:\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH   \
    \    35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n\
    ```\n\nThese results do not include those records where the `salary` is `NULL`.\
    \ You can do the same thing for the `last_name` column:\n\n```\nSELECT id, last_name,\
    \ salary\nFROM employee\nWHERE last_name IS NOT NULL;\n```\n\nThe results would\
    \ be:\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH    \
    \   35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n\
    6    COOPER      NULL\n```\n\nYou can see that `ID` 7 is not shown because the\
    \ `last_name` is `NULL`. The record with `ID` 6 is shown, because the `last_name`\
    \ is populated. The `salary` is `NULL`, but your query did not mention the `salary`.\n\
    \nYou can exclude records where either of these two columns are `NULL` by using\
    \ the `AND` keyword.\n\n```\nSELECT id, last_name, salary\nFROM employee\nWHERE\
    \ last_name IS NOT NULL\nAND salary IS NOT NULL;\n```\n\nThe results of this query\
    \ are:\n\n```\nID   LAST_NAME   SALARY\n1    JONES       20000\n2    SMITH   \
    \    35000\n3    KING        40000\n4    SIMPSON     52000\n5    ANDERSON    31000\n\
    ```\n\nYou can see that the two records with `NULL` values are not shown."
