    There is a documented SQL Server startup option that can be used to disable the
    missing indexes feature, but I am not aware of collecting this data being a problem
    or anyone ever needing to use it.'
  trans: '## 缺失索引功能


    ### 功能概述


    我们已经见识过缺失索引功能的实际应用。让我们在本节中总结一下缺失索引功能是什么，并了解一下缺失索引 DMV。基本上，缺失索引功能是数据库引擎的一种行为，默认启用，它是查询优化器分析当前正在优化的查询可从中受益的索引的结果。在此过程中，查询优化器会估算如果某个索引存在，是否会使查询性能受益，并将此信息提供在执行计划中。此外，SQL
    Server 会将此信息保存在缺失索引 DMV 中。但是，再次提醒，这是一种估算，并存在一些局限性，其中部分局限性已在前面演示过：


    1.  它不适用于简单计划。

    2.  它不推荐聚集索引或筛选索引。

    3.  缺失索引 DMV 最多只能收集大约 500 个索引组的信息。

    4.  DMV 中的数据不会持久保存。

    5.  它不是一个索引优化工具。


    在 XML 计划中查看缺失索引信息可能很复杂。幸运的是，SQL Server Management Studio 可以帮助你为推荐的索引组装 `CREATE
    INDEX` 语句，如前所示。


    ### 缺失索引 DMV


    总之，缺失索引 DMV 包括以下几个：


    *   `sys.dm_db_missing_index_group_stats`：返回有关缺失索引组的摘要信息。

    *   `sys.dm_db_missing_index_groups`：返回有关特定缺失索引组的信息。

    *   `sys.dm_db_missing_index_details`：返回有关缺失索引的详细信息。

    *   `sys.dm_db_missing_index_columns`：返回有关数据库表中缺失索引的列的信息。


    ### 使用缺失索引 DMV


    为了快速了解如何使用缺失索引 DMV，让我们跟随这个练习。创建一个新的测试数据库并再次运行这些语句，以获取一些可供操作的数据：


    ```sql

    SELECT *

    INTO dbo.SalesOrderDetail

    FROM AdventureWorks2017.Sales.SalesOrderDetail

    GO

    SELECT *

    INTO dbo.SalesOrderHeader

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    ```


    由于使用如此简单的表和模式可能会再次遇到简单计划的限制，让我们再次使用未公开的跟踪标志 `8758`。（请记住切勿在生产环境中使用此跟踪标志。）


    ```sql

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    OPTION (QUERYTRACEON 8757)

    ```


    你的执行计划会显示如前所述的建议。但这次我们将从缺失索引 DMV 收集的数据中查看。运行以下查询：


    ```sql

    SELECT g.*, statement, column_id, column_name, column_usage

    FROM sys.dm_db_missing_index_details AS d

    CROSS APPLY sys.dm_db_missing_index_columns(d.index_handle)

    INNER JOIN sys.dm_db_missing_index_groups AS g

    ON g.index_handle = d.index_handle

    WHERE d.database_id = DB_ID()

    ORDER BY g.index_group_handle, g.index_handle, column_id

    ```


    注意我们正在按当前数据库进行筛选，因此我们希望连接到测试数据库来运行此查询。如果没有这样的筛选，可能会返回关于你实例中其他数据库的大量信息。将返回索引组中的缺失索引信息，并且由于我们刚刚创建了测试数据库，现在只有一个索引组。此索引组的信息与我们可以在图形或
    XML 计划中看到的信息相同。下面是一个简化的输出，以适应页面，显示了现有索引组的列信息。`column_usage` 列将显示查询如何使用该列，可能包含
    `EQUALITY`、`INEQUALITY` 和 `INCLUDE` 值。这可以帮助你构建推荐索引的 `CREATE INDEX` 语句，但请记住，SQL
    Server Management Studio 也可以为你做这件事。


    | **Statement** | **column_id** | **column_name** | **column_usage** |

    | --- | --- | --- | --- |

    | [test].[dbo].[SalesOrderDetail] | 1 | SalesOrderID | INCLUDE |

    | [test].[dbo].[SalesOrderDetail] | 2 | SalesOrderDetailID | INCLUDE |

    | [test].[dbo].[SalesOrderDetail] | 3 | CarrierTrackingNumber | INCLUDE |

    | [test].[dbo].[SalesOrderDetail] | 4 | OrderQty | INCLUDE |

    | [test].[dbo].[SalesOrderDetail] | 5 | ProductID | EQUALITY |

    | [test].[dbo].[SalesOrderDetail] | 6 | SpecialOfferID | INCLUDE |


    以下查询将使用 `sys.dm_db_missing_index_group_stats` DMV 返回有关缺失索引的额外性能信息：


    ```sql

    SELECT d.*, s.*

    FROM sys.dm_db_missing_index_group_stats AS s

    INNER JOIN sys.dm_db_missing_index_groups AS g

    ON s.group_handle = g.index_group_handle

    INNER JOIN sys.dm_db_missing_index_details AS d

    ON g.index_handle = d.index_handle

    WHERE d.database_id = DB_ID()

    ```


    在这些信息中，我们有 `avg_user_impact` 列，在 SQL Server Management Studio 中也显示为 Impact，在本例中值为
    `99.31`。`avg_user_impact` 是如果实现缺失索引组，用户查询将获得的平均百分比收益。此值基于查询成本，因此不代表任何特定单位。


    运行下一个查询：


    ```sql

    SELECT * FROM SalesOrderDetail

    WHERE OrderQty = 1

    OPTION (QUERYTRACEON 8757)

    ```


    运行前面的查询以显示有关缺失索引 DMV 的信息，将显示第二个 `index_group_handle`，其中包含为 `OrderQty` 列创建索引的详细信息，并包含表的其他几列。本练习中的第二个
    `SELECT` 查询将显示 `avg_user_impact` 为 `96.97`，以及其他性能信息。SQL Server 将继续累积此信息，直到达到 500
    个缺失索引组的限制。


    ### 结论


    最后，当你考虑到缺失索引功能的局限性时，请记住这些信息始终可用。它对性能没有任何影响，并且你无需付出任何额外努力即可获取它。即使你不打算应用其任何建议，也可以将其视为一个警告，表明也许是时候审查你的索引策略了，至少对于你当前正在处理的执行计划是这样。


    > **注意**

    > 有一个有文档记录的 SQL Server 启动选项可用于禁用缺失索引功能，但据我所知，收集此数据从未成为问题，也无人需要使用它。'
- fmt: '## 数据库引擎调整顾问


    数据库引擎调整顾问自 SQL Server 2005 起可用。其前身索引调整向导是在 SQL Server 7.0 中引入的，当时其数据库引擎包含了一个重新设计的查询处理器。


    DTA 通过使用查询优化器估算的成本来工作。这一 DTA 架构决策非常合理，因为实际上正是查询优化器在查询优化过程中决定是否使用索引。现在，你可能会问，查询优化器究竟如何估算一个尚不存在的索引的成本？事实是，查询优化器在查询优化期间从不直接使用索引数据，而只使用其统计信息。统计信息包含有关一列或多列数据分布的信息。对于
    DTA 来说，临时创建索引将非常昂贵且耗时，并且需要磁盘空间和其他资源，这在生产环境甚至某些其他环境中可能是不可取的。但 DTA 可以为候选索引临时创建统计信息。这些索引统计信息是为
    DTA 会话临时创建的，被称为假设索引。虽然你可以使用未文档化的 `CREATE INDEX WITH STATISTICS_ONLY` 语句来创建此类索引，但这没有太大意义，因为它们仅在
    DTA 会话期间有用。例如，即使你自己创建了这些索引，查询优化器也会忽略它们。


    你可以通过查看 `sys.indexes` 目录视图的 `is_hypothetical` 列来判断一个索引是否是假设索引。由于这些索引在 DTA 会话中不再需要时会自动删除，因此如果例如
    DTA 在索引被删除之前崩溃，其中一些索引可能会保留下来。如果没有 DTA 会话使用它们，删除那些假设索引总是安全的。


    通过查阅 Surajit Chaudhuri 和 Vivek Narasayya 的学术论文，你可以获得更多关于 DTA 和索引调整向导最初如何架构的有趣细节：

    - 在 `www.microsoft.com/en-us/research/publication/an-efficient-cost-driven-index-selection-tool-for-microsoft-sql-server/`
    上的《An Efficient, Cost-Driven Index Selection Tool for Microsoft SQL Server》

    - 在 `www.microsoft.com/en-us/research/publication/self-tuning-database-systems-a-decade-of-progress/`
    上的《Self-Tuning Database Systems: A Decade of Progress》


    DTA 可以分析来自多种不同来源的工作负载：包含查询的文件、包含 SQL 跟踪的文件或表，或者从 SQL Server 2012 开始，可以直接从计划缓存中获取。随着
    SQL Server Management Studio 16.2 的引入，你还可以使用查询存储来选择要调整的工作负载。如第 6 章所建议的，使用查询存储与计划缓存之间的区别在于，前者包含更长的查询历史记录，而计划缓存仅包含最近执行的查询子集。我们稍后将尝试其中一些工作负载源。


    除了推荐聚集索引、非聚集索引、筛选索引以及沿途的统计信息外，DTA 还可以选择推荐索引视图、分区和列存储索引。使用跟踪工作负载选项需要使用 SQL Profiler
    提供的 Tuning 模板捕获跟踪，或者手动使用该模板上定义的事件。


    我们在本章前面尝试了一个简单的练习，依赖于我们对索引工作原理的理解、缺失索引功能以及从执行计划中获取反馈。现在，让我们将相同的查询提供给 DTA，看看我们会得到什么建议。为确保从头开始，你可以删除测试数据库上的当前表，或者删除整个数据库并重新创建。然后运行以下语句来填充这些表：


    ```sql

    SELECT *

    INTO dbo.SalesOrderDetail

    FROM AdventureWorks2017.Sales.SalesOrderDetail

    GO

    SELECT *

    INTO dbo.SalesOrderHeader

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    GO

    ```


    创建要调整的查询文件。复制以下查询并将其保存在文件系统中的一个文件中：


    ```sql

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID, UnitPrice FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    ORDER BY ProductID

    GO

    SELECT ProductID, COUNT(*) FROM SalesOrderDetail

    GROUP BY ProductID

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 870

    GO

    ```


    打开 DTA 并创建一个新会话。在会话的“常规”选项卡上，提供一个会话名称或使用提供的默认名称。指定测试数据库既是要调整的数据库，也是用于工作负载分析的数据库。使用“工作负载”和“文件”选项选择包含要调整的查询的文件。所选选项如图
    9-9 所示。


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig9_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig9_HTML.jpg)


    图 9-9 DTA 常规选项卡


    “会话调整选项”包含非常重要的选择。对于本练习，我们将使用原始默认值，如图 9-10 所示。我稍后会解释最重要的部分。


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig10_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig10_HTML.jpg)


    图 9-10 DTA 调整选项选项卡


    默认选择将调整时间限制为一小时。接下来的三个选择允许你选择要在数据库中使用的物理设计结构、要使用的分区策略以及要在数据库中保留的物理设计结构。当你做出选择时，页面底部的描述将显示摘要。原始默认选择如下：


    > 数据库引擎调整顾问将推荐聚集索引和非聚集索引以提高工作负载的性能。将不考虑分区策略。新推荐的结构将是非分区的。所有现有结构在调整过程结束时将在数据库中保持完整。


    某些选择的组合可能是无效的，相反，你将收到消息“你选择的调整选项集无效”，并附有其无效的原因说明。在提供正确的选择之前，你将无法继续。


    注意


    DTA 会记住你选择的调整选项，这些选项将被视为任何未来会话的新默认值，直到再次更改。'
  raw: '## The Database Engine Tuning Advisor


    The Database Engine Tuning Advisor (DTA) has been available since SQL Server 2005\.
    Its predecessor, the Index Tuning Wizard, was introduced with SQL Server 7.0 when
    its database engine included a rearchitected query processor.


    The DTA works by using the cost estimated by the query optimizer. This DTA architecture
    decision makes a lot of sense as it is actually the query optimizer that makes
    the decision whether or not to use the index during the query optimization process.
    Now, you may be asking how on earth can the query optimizer estimate the cost
    of an index which does not exist yet. The reality is that the query optimizer
    never directly uses the index data during query optimization but only its statistics.
    Statistics contain information about the data distribution of a column or columns.
    For the DTA, to create an index temporarily would be very expensive and time-consuming,
    and it would require disk space and other resources, something probably not desirable
    on production or even some other environments. But the DTA can temporarily create
    statistics for the candidate indexes. Those index statistics are created temporarily
    for the DTA session and are called hypothetical indexes. Although you can create
    such indexes using the undocumented `CREATE INDEX WITH STATISTICS_ONLY` statement,
    it does not make much sense as they are only useful during a DTA session. For
    example, although you can create those indexes yourself, they will be ignored
    by the query optimizer.


    You can see if an index is a hypothetical index by looking at the `is_hypothetical`
    column of the `sys.indexes` catalog. Since these indexes are automatically deleted
    as soon as they are no longer needed during a DTA session, it is possible that
    some of them may survive if, for example, the DTA crashes before the index can
    be deleted. It is always safe to delete those hypothetical indexes if no DTA session
    is using them.


    You can get more interesting details about how the DTA and the Index Tuning Wizard
    were originally architected by looking at the academic papers by Surajit Chaudhuri
    and Vivek Narasayya “An Efficient, Cost-Driven Index Selection Tool for Microsoft
    SQL Server” at [`www.microsoft.com/en-us/research/publication/an-efficient-cost-driven-index-selection-tool-for-microsoft-sql-server/`](http://www.microsoft.com/en-us/research/publication/an-efficient-cost-driven-index-selection-tool-for-microsoft-sql-server/)
    and “Self-Tuning Database Systems: A Decade of Progress” at [`www.microsoft.com/en-us/research/publication/self-tuning-database-systems-a-decade-of-progress/`](http://www.microsoft.com/en-us/research/publication/self-tuning-database-systems-a-decade-of-progress/).


    The DTA can analyze workloads from several different sources: a file containing
    queries, a file or table containing a SQL trace, or, starting with SQL Server
    2012, directly from the plan cache. Introduced with SQL Server Management Studio
    16.2, you can also use the Query Store to select a workload to tune. As suggested
    in Chapter [6](#393702_2_En_6_Chapter.xhtml), the difference between using the
    Query Store and the plan cache is that the former contains a longer history of
    queries, while the plan cache only contains a subset of recently executed queries.
    We will try some of these workload sources in a moment.


    In addition to recommending clustered, nonclustered, and filtered indexes and
    statistics along the way, the DTA also has the choice to recommend indexed views,
    partitioning, and columnstore indexes. Using the trace workload option requires
    to capture a trace using the Tuning template available with SQL Profiler or manually
    using the events defined on that template.


    We tried a simple exercise earlier in this chapter relying on both our knowledge
    on how indexes work and the missing indexes feature and getting feedback from
    execution plans. Now let’s feed the same queries to the DTA and see what recommendations
    we get. To make sure you start fresh, you can either delete the current tables
    on the test database or delete the entire database and create it again. Then run
    these statements to populate such tables:


    ```

    SELECT *

    INTO dbo.SalesOrderDetail

    FROM AdventureWorks2017.Sales.SalesOrderDetail

    GO

    SELECT *

    INTO dbo.SalesOrderHeader

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    ```


    Create the file with the queries to tune. Copy the following queries and save
    them on a file in the file system:


    ```

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID, UnitPrice FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    ORDER BY ProductID

    GO

    SELECT ProductID, COUNT(*) FROM SalesOrderDetail

    GROUP BY ProductID

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 870

    GO

    ```


    Open the DTA and create a new session. On the session General tab, provide a session
    name or use the default name provided. Specify the test database both as the database
    to tune and database for workload analysis. Select the file containing the queries
    to tune using the Workload and File choices. Selected choices are shown in Figure
    [9-9](#393702_2_En_9_Chapter.xhtml#Fig9).


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig9_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig9_HTML.jpg)


    Figure 9-9


    DTA General tab


    Session Tuning Options has very important choices. For this exercise, we will
    use the original defaults, which are shown in Figure [9-10](#393702_2_En_9_Chapter.xhtml#Fig10).
    I will explain the most important ones later.


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig10_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig10_HTML.jpg)


    Figure 9-10


    DTA Tuning Options tab


    The default choices limit the tuning time to one hour. The next three choices
    allow you to select the physical design structures to employ in the database,
    the partitioning strategy to use, and the physical design structures to keep in
    the database. As you select choices, a description at the bottom of the page will
    show a summary. The original default choices read as follows:


    > *Database Engine Tuning Advisor will recommend both clustered and nonclustered
    indexes to improve performance of your workload. No partitioning strategies will
    be considered. Newly recommended structures will be un-partitioned. All existing
    structures will remain intact in the database at the conclusion of the tuning
    process.*


    Some combination of choices may be invalid, and instead you will get the message
    “The set of tuning options that you have selected is not valid” along with an
    explanation of why they are not valid. You won’t be able to continue until correct
    choices are supplied.


    Note


    The DTA remembers the tuning options you select, and these will be considered
    the new default for any future session until changed again.'
  trans: '## 数据库引擎调整顾问


    数据库引擎调整顾问自 SQL Server 2005 起可用。其前身索引调整向导是在 SQL Server 7.0 中引入的，当时其数据库引擎包含了一个重新设计的查询处理器。


    DTA 通过使用查询优化器估算的成本来工作。这一 DTA 架构决策非常合理，因为实际上正是查询优化器在查询优化过程中决定是否使用索引。现在，你可能会问，查询优化器究竟如何估算一个尚不存在的索引的成本？事实是，查询优化器在查询优化期间从不直接使用索引数据，而只使用其统计信息。统计信息包含有关一列或多列数据分布的信息。对于
