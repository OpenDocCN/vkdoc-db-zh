  trans: '

    ### 本地编译


    本地编译适用于创建内存优化表和本机编译模块。在这两种情况下，系统会生成 C 代码，进行编译和链接，最终创建一个 DLL，并将其加载到与 SQL Server
    可执行文件进程内的内存中以提升性能。你可以通过查询 `sys.dm_os_loaded_modules` DMV 来查看当前系统中已加载的 DLL 列表，如下所示，在我的测试系统中，它列出了几个指向
    `C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\DATA\xtp\` 文件夹的文件。


    ```sql

    SELECT * FROM sys.dm_os_loaded_modules

    WHERE description = ''XTP Native DLL''

    ```


    数据库社区有时会关注创建文件的安全访问权限问题。总之，我要告诉你不必为此担心。当 DLL 文件创建时，它会被自动加载到内存中，无需备份这些创建的文件或对它们进行任何维护。这些文件不再被需要。每次
    SQL Server 启动时，它都会为内存优化表创建新的 DLL。本机编译模块仅在首次执行时进行编译。从技术上讲，创建的 DLL 文件具有与数据文件相同的安全访问权限。进入前面列出的
    `xtp` 文件夹后，你会发现以配置数据库的数据库 ID 命名的附加文件夹，其中包含具有以下扩展名的文件（每个内存优化表和本机编译模块都会创建一组这样的文件）：


    | 扩展名 | 描述 |

    | --- | --- |

    | `.c` | C 语言源代码 |

    | `.dll` | 动态链接库文件 |

    | `.obj` | C 编译器生成的目标文件 |

    | `.out` | C 编译器生成的日志文件（包含编译器使用的参数） |

    | `.pdb` | C 编译器生成的符号文件 |

    | `.xml` | MAT（混合抽象树）文件 |


    注意


    内存 OLTP 功能最初被称为极端事务处理，XTP 这个缩写在 SQL Server 的许多地方仍然保留。


    在我的系统中，C 编译器和 Microsoft 链接器分别位于 `C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\Binn\Xtp\VC\bin`
    目录下的 `cl.exe` 和 `link.exe`。下面是一个用于说明目的的小型 C 代码片段。（生成的代码并非供人类阅读。）


    ```c

    #include "hkenggen.h"

    #include "hkrtgen.h"

    #include "hkgenlib.h"

    #define ENABLE_INTSAFE_SIGNED_FUNCTIONS

    #include "intsafe.h"

    #define HOTPATCH_BUFFER_SIZE 256

    typedef struct _PATCH_BUFFER {

    unsigned short PointerIndex;

    unsigned short Fill1;

    unsigned short BufferSize;

    unsigned short Fill2;

    unsigned __int64 Buffer[(HOTPATCH_BUFFER_SIZE - 8) / sizeof(__int64)];

    } PATCH_BUFFER;

    PATCH_BUFFER HotPatchBuffer = {0, 0, HOTPATCH_BUFFER_SIZE, 0};

    int memcmp(const void*, const void*, size_t);

    void *memset(void*, int, size_t);

    #pragma deprecated (memcpy)

    #define offsetof(s,f)   ((size_t)&(((s*)0)->f))

    struct NullBitsStruct_322100188

    {

    unsigned char hkc_isnull_3:1;

    };

    ```


    注意


    有关 Hekaton 编译器架构的更多详情，你可以阅读 Cristian Diaconu 等人撰写的论文“Hekaton: SQL Server’s Memory-Optimized
    OLTP Engine”，你可以在网上找到它：[`www.microsoft.com/en-us/research/publication/hekaton-sql-servers-memory-optimized-oltp-engine`](http://www.microsoft.com/en-us/research/publication/hekaton-sql-servers-memory-optimized-oltp-engine)。


    ### 内存优化表变量


    从 SQL Server 2016 开始，你现在可以使用内存优化表变量来替代传统的表变量或临时表。内存优化表变量比它们在 `tempdb` 中的对应物性能高出数倍，其优点之一是它们始终位于内存中，并且不使用
    `tempdb`。因此，它们不受限于 `tempdb` 的 I/O 访问或争用分配等限制。


    注意


    SQL Server 2019 的新功能是，你现在可以配置 tempdb 使用基于内存 OLTP 技术的内存优化元数据。通过启用此 tempdb 配置，元数据现在可以移入无锁、非持久的内存优化表中，从而在技术上消除了元数据争用。你可以在第[4]章（我们讨论
    tempdb 故障排除和配置的地方）找到更多细节。


    让我们看一个例子。以下代码创建了一个常规临时表及其等效的内存优化表变量。请注意，创建内存优化表变量需要两个步骤。首先，我们必须使用 `MEMORY_OPTIMIZED
    = ON` 子句创建一个类型，该类型像任何其他内存优化表一样需要一个索引。然后我们必须使用该类型声明一个内存优化表变量。


    ```sql

    CREATE TABLE #temp (

    CustomerID int,

    Name varchar(40)

    )

    GO

    CREATE TYPE test

    AS TABLE (

    CustomerID int INDEX IX_CustomerID,

    Name varchar(40)

    )

    WITH (MEMORY_OPTIMIZED = ON)

    GO

    DECLARE @mytest test

    SELECT * FROM @mytest

    SELECT * FROM #temp

    ```


    你可能使用具有 `SCHEMA_ONLY` 持久性的内存优化表获得类似行为，但主要区别在于，表架构在 SQL Server 重启或数据库因其他方法离线后，仍然是数据库的一部分。具有
    `SCHEMA_ONLY` 持久性的表在其他一些业务场景中也很有用，例如 Web 应用程序的会话状态以及用于 ETL（提取、转换和加载）目的的临时暂存表。


    ### 当前限制


    尽管 SQL Server 2019 是 Hekaton 的第四个版本，但在决定开始使用此功能进行项目开发之前，你仍然需要了解一些限制。你可以在“Transact-SQL
    Constructs Not Supported by In-Memory OLTP”（[`https://msdn.microsoft.com/en-us/library/dn246937.aspx`](https://msdn.microsoft.com/en-us/library/dn246937.aspx)）和“Unsupported
    SQL Server Features for In-Memory OLTP”（[`https://msdn.microsoft.com/en-us/library/dn133181.aspx`](https://msdn.microsoft.com/en-us/library/dn133181.aspx)）中找到此类信息。


    两份文档都提供了指向先前 SQL Server 版本的链接，但强烈建议你在较新版本上实现新的 Hekaton 项目。

    '
- fmt: '# Columnstore Indexes


    Although column-based storage technology research dates back to the 1970s, their
    first implementations on database engines appeared only in the 1990s, 20 years
    later. Columnstore storage provides performance benefits on data warehouse databases
    as usually only a small number of the columns in a fact table may be needed for
    star join queries. Although they are also an in-memory technology in SQL Server,
    different from `Hekaton`, `columnstore indexes` are usually used in very large
    tables and are not required to entirely fit in memory. Figure 7-3 shows a comparison
    between a row-based and a column-based storage, in which we see that instead of
    hosting all the columns in a row, database pages contain data from only one specific
    column.


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig3_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig3_HTML.jpg)

    **Figure 7-3** Rowstore and columnstore compared


    **Note**

    A seminal paper and a great reference for the topic is “C-store: A Column-oriented
    DBMS” by Mike Stonebraker et. al, which you can find online at [`https://web.stanford.edu/class/cs245/readings/c-store.pdf`](https://web.stanford.edu/class/cs245/readings/c-store.pdf).


    `Columnstore index` technology was first introduced in the SQL Server 2012 release,
    which started as a read-only nonclustered `columnstore index` that could be created
    on a `heap` or `clustered index`. Since this was a read-only structure, it would
    only make sense on a data warehouse, as opposed to an operational system (but
    as we will see soon, on recent versions of SQL Server, `columnstore indexes` could
    be created on operational system as well).


    There were typically three workarounds to update read-only `columnstore index`
    data including using partitioning and partition switching, simply recreating the
    index, or using `UNION ALL` to combine data from the read-only `columnstore index`
    and a regular updatable table. These workarounds are no longer needed on subsequent
    versions. In the query processing side, `columnstore index` technology also introduced
    `batch mode processing`, a vector-based or vectorized execution method designed
    to improve the query performance by processing multiple rows at a time instead
    of using the traditional operators that process a row at a time.


    The next generation of the feature included the choice to create an updatable
    `clustered columnstore index`. In this case, the `columnstore index` became the
    table or primary storage. In other words, `columnstore storage` can now replace
    the entire `rowstore` structure. This was introduced in SQL Server 2014, and the
    choice of a read-only nonclustered `columnstore index` was still available, if
    this was the only `columnstore index` in the table. Keep in mind that, as a nonclustered
    index, it would have to copy the required columns from the base table so additional
    storage was required. But it can also benefit from high compression ratios, making
    this additional required storage only 10% on average. No additional indexes were
    supported on the `clustered columnstore index`, not even `rowstores`, and there
    was no `columnstore index` support for memory-optimized tables.


    Starting with SQL Server 2016, it is now possible to create an updatable nonclustered
    `columnstore index`, which could be created on either a `heap` or a `clustered
    index` (previously only a read-only version was possible). This updatable nonclustered
    `columnstore index` can be created on OLTP tables, which can help with real-time
    analytical queries, as covered later in this chapter, and can support a filtered
    condition as well. An updatable `columnstore index` can be created on OLTP memory-optimized
    tables as well although all the columns have to be included and no filtered condition
    is allowed. `Compression delay` is available to help on some performance scenarios.


    It is worth mentioning that having a read-only nonclustered `columnstore index`,
    the default behavior in SQL Server 2014, is no longer possible in later versions
    of the product, although you can simulate their behavior, if needed, using a read-only
    filegroup. Finally, `rowstore`-based nonclustered indexes can now be created on
    a `clustered columnstore index`.


    In summary, `columnstore indexes` started with some limitations, making SQL Server
    2016 the third release improving on the features of this technology. If, for any
    reason, you are still under a previous version, you could use the following document
    to determine which features are available for the specific release: [`https://msdn.microsoft.com/en-us/library/dn934994.aspx`](https://msdn.microsoft.com/en-us/library/dn934994.aspx).


    `Columnstore indexes` include several performance benefits such as the following:


    *   **Columnar storage**: Since data warehouse star join queries usually select
    only a few columns of a fact table, reading only the pages for the required columns
    has huge I/O savings. Pages hosting columns not required for a query do not have
    to be read at all.

    *   **Compression**: Since data from the same column is stored in the same pages,
    similar data are kept contiguously, which means a high compression ratio, again
    saving I/O resources.

    *   **Batch mode processing**: `Columnstore index` technology uses a vector-based
    or vectorized execution model by which their engine processes multiple rows at
    the same time (typically up to 900). This processing is done at the query operation
    level, and more operations are included on each release. This contrasts the traditional
    query execution model, which processes just one row at a time, and it is used
    in all the versions of SQL Server. For a list of operations supporting `batch
    mode processing` for each SQL Server release, see [`https://msdn.microsoft.com/en-us/library/dn935005.aspx`](https://msdn.microsoft.com/en-us/library/dn935005.aspx).

    *   **Segment elimination**: As mentioned earlier, data for the same column is
    stored in the same page, and multiple pages are grouped into a segment. Similar
    to the concept of partition elimination, segments can be eliminated depending
    on the values used as filters in a query.

    *   **Aggregate pushdown**: Starting with SQL Server 2016, aggregates are pushed
    down and precalculated at the storage engine. Aggregations can be pushed down
    to the scan operation, improving query performance by orders of magnitude.'
  raw: '## Columnstore Indexes


    Although column-based storage technology research dates back to the 1970s, their
    first implementations on database engines appeared only in the 1990s, 20 years
    later. Columnstore storage provides performance benefits on data warehouse databases
    as usually only a small number of the columns in a fact table may be needed for
    star join queries. Although they are also an in-memory technology in SQL Server,
    different from Hekaton, columnstore indexes are usually used in very large tables
    and are not required to entirely fit in memory. Figure [7-3](#393702_2_En_7_Chapter.xhtml#Fig3)
    shows a comparison between a row-based and a column-based storage, in which we
    see that instead of hosting all the columns in a row, database pages contain data
    from only one specific column.


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig3_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Rowstore and columnstore compared


    Note


    A seminal paper and a great reference for the topic is “C-store: A Column-oriented
    DBMS” by Mike Stonebraker et. al, which you can find online at [`https://web.stanford.edu/class/cs245/readings/c-store.pdf`](https://web.stanford.edu/class/cs245/readings/c-store.pdf).


    Columnstore index technology was first introduced in the SQL Server 2012 release,
    which started as a read-only nonclustered columnstore index that could be created
    on a heap or clustered index. Since this was a read-only structure, it would only
    make sense on a data warehouse, as opposed to an operational system (but as we
    will see soon, on recent versions of SQL Server, columnstore indexes could be
    created on operational system as well).


    There were typically three workarounds to update read-only columnstore index data
    including using partitioning and partition switching, simply recreating the index,
    or using `UNION ALL` to combine data from the read-only columnstore index and
    a regular updatable table. These workarounds are no longer needed on subsequent
    versions. In the query processing side, columnstore index technology also introduced
    batch mode processing, a vector-based or vectorized execution method designed
    to improve the query performance by processing multiple rows at a time instead
    of using the traditional operators that process a row at a time.


    The next generation of the feature included the choice to create an updatable
    clustered columnstore index. In this case, the columnstore index became the table
    or primary storage. In other words, columnstore storage can now replace the entire
    rowstore structure. This was introduced in SQL Server 2014, and the choice of
    a read-only nonclustered columnstore index was still available, if this was the
    only columnstore index in the table. Keep in mind that, as a nonclustered index,
    it would have to copy the required columns from the base table so additional storage
    was required. But it can also benefit from high compression ratios, making this
    additional required storage only 10% on average. No additional indexes were supported
    on the clustered columnstore index, not even rowstores, and there was no columnstore
    index support for memory-optimized tables.


    Starting with SQL Server 2016, it is now possible to create an updatable nonclustered
    columnstore index, which could be created on either a heap or a clustered index
    (previously only a read-only version was possible). This updatable nonclustered
    columnstore index can be created on OLTP tables, which can help with real-time
    analytical queries, as covered later in this chapter, and can support a filtered
    condition as well. An updatable columnstore index can be created on OLTP memory-optimized
    tables as well although all the columns have to be included and no filtered condition
    is allowed. Compression delay is available to help on some performance scenarios.


    It is worth mentioning that having a read-only nonclustered columnstore index,
    the default behavior in SQL Server 2014, is no longer possible in later versions
    of the product, although you can simulate their behavior, if needed, using a read-only
    filegroup. Finally, rowstore-based nonclustered indexes can now be created on
    a clustered columnstore index.


    In summary, columnstore indexes started with some limitations, making SQL Server
    2016 the third release improving on the features of this technology. If, for any
    reason, you are still under a previous version, you could use the following document
    to determine which features are available for the specific release: [`https://msdn.microsoft.com/en-us/library/dn934994.aspx`](https://msdn.microsoft.com/en-us/library/dn934994.aspx).


    Columnstore indexes include several performance benefits such as the following:


    *   Columnar storage: Since data warehouse star join queries usually select only
    a few columns of a fact table, reading only the pages for the required columns
    has huge I/O savings. Pages hosting columns not required for a query do not have
    to be read at all.


    *   Compression: Since data from the same column is stored in the same pages,
    similar data are kept contiguously, which means a high compression ratio, again
    saving I/O resources.


    *   Batch mode processing: Columnstore index technology uses a vector-based or
    vectorized execution model by which their engine processes multiple rows at the
    same time (typically up to 900). This processing is done at the query operation
    level, and more operations are included on each release. This contrasts the traditional
    query execution model, which processes just one row at a time, and it is used
    in all the versions of SQL Server. For a list of operations supporting batch mode
    processing for each SQL Server release, see [`https://msdn.microsoft.com/en-us/library/dn935005.aspx`](https://msdn.microsoft.com/en-us/library/dn935005.aspx).


    *   Segment elimination: As mentioned earlier, data for the same column is stored
    in the same page, and multiple pages are grouped into a segment. Similar to the
    concept of partition elimination, segments can be eliminated depending on the
    values used as filters in a query.


    *   Aggregate pushdown: Starting with SQL Server 2016, aggregates are pushed down
    and precalculated at the storage engine. Aggregations can be pushed down to the
    scan operation, improving query performance by orders of magnitude.'
  trans: '

    # 列存储索引


    尽管基于列的存储技术研究可以追溯到 20 世纪 70 年代，但其在数据库引擎上的首次实现直到 90 年代才出现，晚了 20 年。列存储为数据仓库数据库提供了性能优势，因为星型连接查询通常只需要事实表中的少数几列。虽然在
    SQL Server 中它也是一种内存中技术，但与`Hekaton`不同，`列存储索引`通常用于非常大的表，并不要求完全装入内存。图 7-3 比较了基于行的存储和基于列的存储，从中我们可以看到，数据库页不是承载一行中的所有列，而是只包含来自一个特定列的数据。


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig3_HTML.jpg](img/393702_2_En_7_Fig3_HTML.jpg)

    **图 7-3** 行存储与列存储对比


    **注意**

    关于此主题的一篇开创性论文和重要参考资料是 Mike Stonebraker 等人的《C-store：一个面向列的 DBMS》，你可以在 [`https://web.stanford.edu/class/cs245/readings/c-store.pdf`](https://web.stanford.edu/class/cs245/readings/c-store.pdf)
    在线找到。


    `列存储索引`技术首次引入于 SQL Server 2012 版本，最初是作为一种只读的非聚集`列存储索引`，可以创建在`堆`或`聚集索引`上。由于这是一种只读结构，它只对数据仓库有意义，而不适用于操作系统（但正如我们很快将看到的，在
    SQL Server 的后续版本中，`列存储索引`也可以创建在操作系统上）。


    当时通常有三种方法来更新只读的`列存储索引`数据，包括使用分区和分区切换、简单地重新创建索引，或使用`UNION ALL`将只读`列存储索引`和常规可更新表的数据组合起来。在后续版本中，这些变通方法不再需要。在查询处理方面，`列存储索引`技术还引入了`批处理模式`，这是一种基于向量或向量化的执行方法，旨在通过一次处理多行而不是使用传统的一次处理一行的操作符来提高查询性能。


    该功能的下一代版本包含了创建可更新的`聚集列存储索引`的选项。在这种情况下，`列存储索引`成为表或主要存储。换句话说，`列存储存储`现在可以取代整个`行存储`结构。这在
    SQL Server 2014 中引入，并且如果表中没有其他`列存储索引`，只读非聚集`列存储索引`的选项仍然可用。请记住，作为非聚集索引，它必须从基表复制所需的列，因此需要额外的存储空间。但它也可以受益于高压缩率，使得这额外所需的存储空间平均只有
    10%。在`聚集列存储索引`上不支持其他索引，即使是`行存储`索引也不行，并且内存优化表不支持`列存储索引`。


    从 SQL Server 2016 开始，现在可以创建可更新的非聚集`列存储索引`，它可以创建在`堆`或`聚集索引`上（以前只可能创建只读版本）。这种可更新的非聚集`列存储索引`可以创建在
    OLTP 表上，这有助于实时分析查询（本章稍后将介绍），并且也可以支持筛选条件。可更新的`列存储索引`也可以创建在 OLTP 内存优化表上，尽管必须包含所有列，并且不允许筛选条件。在某些性能场景下，可以使用`压缩延迟`来提供帮助。


    值得一提的是，在 SQL Server 2014 中的默认行为——拥有一个只读非聚集`列存储索引`——在产品的后续版本中不再可能，尽管如果需要，你可以使用只读文件组来模拟其行为。最后，现在可以在`聚集列存储索引`上创建基于`行存储`的非聚集索引。


    总之，`列存储索引`最初有一些限制，使得 SQL Server 2016 成为改进此技术功能的第三个版本。如果出于任何原因，你仍在使用之前的版本，可以使用以下文档来确定特定版本可用哪些功能：[`https://msdn.microsoft.com/en-us/library/dn934994.aspx`](https://msdn.microsoft.com/en-us/library/dn934994.aspx)。


    `列存储索引`包括多项性能优势，例如：


    *   **列存储**：由于数据仓库星型连接查询通常只从事实表中选择少数几列，因此只读取所需列的页面可以带来巨大的 I/O 节省。完全不需要读取查询不需要的列所在的页面。

    *   **压缩**：由于同一列的数据存储在相同的页面中，相似数据是连续存放的，这意味着高压缩率，再次节省了 I/O 资源。

    *   **批处理模式**：`列存储索引`技术使用基于向量或向量化的执行模型，其引擎一次处理多行（通常最多 900 行）。这种处理在查询操作级别完成，并且每个版本包含的操作越来越多。这与传统的查询执行模型形成对比，后者一次只处理一行，并且用于所有版本的
    SQL Server。有关每个 SQL Server 版本支持`批处理模式`的操作列表，请参阅 [`https://msdn.microsoft.com/en-us/library/dn935005.aspx`](https://msdn.microsoft.com/en-us/library/dn935005.aspx)。

    *   **段消除**：如前所述，同一列的数据存储在相同的页面中，多个页面被分组为一个段。类似于分区消除的概念，可以根据查询中用作筛选器的值来消除某些段。

    *   **聚合下推**：从 SQL Server 2016 开始，聚合操作被下推并预先在存储引擎中计算。聚合可以被下推到扫描操作，从而将查询性能提升几个数量级。

    '
- fmt: '### Examples


    #### 创建非聚集列存储索引


    第一个示例展示了如何创建非聚集列存储索引，该操作适用于自 SQL Server 2012 以来的所有产品版本。作为非聚集索引，它假设表已存在，因此我将在 `AdventureWorksDW2017`
    中先创建一个表。


    > 注意

    >

    > 如第 1 章所述，你可以从 [`https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure`](https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure)
    下载 `AdventureWorksDW2017`。


    ```sql

    USE AdventureWorksDW2017

    GO

    CREATE TABLE dbo.FactResellerSalesNew(

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    SalesOrderNumber nvarchar(20) NOT NULL,

    SalesOrderLineNumber tinyint NOT NULL,

    RevisionNumber tinyint NULL,

    OrderQuantity smallint NULL,

    UnitPrice money NULL,

    ExtendedAmount money NULL,

    UnitPriceDiscountPct float NULL,

    DiscountAmount float NULL,

    ProductStandardCost money NULL,

    TotalProductCost money NULL,

    SalesAmount money NULL,

    TaxAmt money NULL,

    Freight money NULL,

    CarrierTrackingNumber nvarchar(25) NULL,

    CustomerPONumber nvarchar(25) NULL,

    OrderDate datetime NULL,

    DueDate datetime NULL,

    ShipDate datetime NULL,

    CONSTRAINT PK_SalesOrderNumber_SalesOrderLineNumber PRIMARY KEY CLUSTERED (

    SalesOrderNumber ASC,

    SalesOrderLineNumber ASC)

    )

    ```


    我们现在可以通过选择表列的子集来创建非聚集列存储索引：


    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX ncsi_FactResellerSalesNew ON dbo.FactResellerSalesNew
    (

    SalesOrderNumber, SalesOrderLineNumber, ProductKey, OrderDateKey, DueDateKey,
    ShipDateKey,

    ResellerKey, EmployeeKey, PromotionKey, CurrencyKey, SalesTerritoryKey, RevisionNumber,

    OrderQuantity, UnitPrice, ExtendedAmount, UnitPriceDiscountPct, DiscountAmount,
    ProductStandardCost,

    TotalProductCost, SalesAmount, TaxAmt, Freight, CarrierTrackingNumber, CustomerPONumber,

    OrderDate, DueDate, ShipDate)

    ```


    如前所述，从 SQL Server 2016 开始，非聚集列存储索引现在是可更新的，因此我们可以在索引创建后加载数据。（如果你在早期版本的 SQL Server
    中测试此代码，其中列存储索引可能是只读的，你可能需要先加载数据。）


    ```sql

    INSERT INTO dbo.FactResellerSalesNew SELECT * FROM dbo.FactResellerSales

    ```


    #### 星型连接查询示例


    接下来是一个利用该索引并以批处理执行模式运行的星型连接查询示例，如图 7-4 中的执行计划所示。


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig4_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig4_HTML.jpg)


    *图 7-4 事实表上的列存储索引*


    ```sql

    SELECT ProductKey, SUM(SalesAmount) FROM dbo.FactResellerSalesNew

    GROUP BY ProductKey

    ```


    #### 尝试创建聚集列存储索引


    接下来，尝试创建聚集列存储索引：


    ```sql

    CREATE CLUSTERED COLUMNSTORE INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew

    ```


    这不会成功有两个主要原因。直接原因是我们的表已经有一个聚集索引，显然每个表只允许一个。即使你删除聚集索引，或使用 `CREATE CLUSTERED COLUMNSTORE
    INDEX WITH (DROP_EXISTING = ON)`，下一个限制是每个表只允许一个列存储索引，SQL Server 将报错 35339。


    #### 清理操作


    接下来，通过删除索引进行清理：


    ```sql

    DROP INDEX dbo.FactResellerSalesNew.ncsi_FactResellerSalesNew

    ```


    显然，如果你也要删除表，则不需要删除索引，如下所示：


    ```sql

    DROP TABLE FactResellerSalesNew

    ```


    #### 创建无聚集索引的表并创建聚集列存储索引


    对于下一个练习，创建一个没有聚集索引的表版本：


    ```sql

    USE AdventureWorksDW2017

    GO

    CREATE TABLE dbo.FactResellerSalesNew(

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    SalesOrderNumber nvarchar(20) NOT NULL,

    SalesOrderLineNumber tinyint NOT NULL,

    RevisionNumber tinyint NULL,

    OrderQuantity smallint NULL,

    UnitPrice money NULL,

    ExtendedAmount money NULL,

    UnitPriceDiscountPct float NULL,

    DiscountAmount float NULL,

    ProductStandardCost money NULL,

    TotalProductCost money NULL,

    SalesAmount money NULL,

    TaxAmt money NULL,

    Freight money NULL,

    CarrierTrackingNumber nvarchar(25) NULL,

    CustomerPONumber nvarchar(25) NULL,

    OrderDate datetime NULL,

    DueDate datetime NULL,

    ShipDate datetime NULL)

    ```


    现在你可以创建聚集列存储索引，这基本上会将整个表存储从行存储转换为列存储。这可以从堆（如本例）或基于行的聚集索引（如后所示）转换而来。


    ```sql

    CREATE CLUSTERED COLUMNSTORE INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew

    ```


    你可以如前所述加载数据，因为自 SQL Server 2014 引入以来，聚集列存储索引始终是可更新的。类似地，此时尝试创建非聚集列存储索引将返回错误 35339。


    #### 直接创建为聚集列存储的表


    你也可以直接将表创建为聚集列存储。这是一个仅使用上一个表中几列的示例：


    ```sql

    DROP TABLE dbo.FactResellerSalesNew

    GO

    CREATE TABLE dbo.FactResellerSalesNew (

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    INDEX csi_FactResellerSalesNew CLUSTERED COLUMNSTORE)

    ```


    #### 在聚集列存储上创建非聚集行存储索引


    我们之前看到不能在聚集列存储上创建非聚集列存储（实际上，不能创建超过一个任何类型的聚集索引），但我们可以创建行存储非聚集索引。示例如下：


    ```sql

    CREATE INDEX IX_ProductKey ON dbo.FactResellerSalesNew(ProductKey)

    ```


    #### 使用 `DROP_EXISTING` 子句转换索引类型


    假设一个表是行存储聚集索引，你可以使用 `DROP_EXISTING` 子句将其转换为列存储聚集索引。运行以下语句创建一个行存储：


    ```sql

    DROP TABLE dbo.FactResellerSalesNew

    GO

    CREATE TABLE dbo.FactResellerSalesNew (

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL)

    ```


    如果你运行以下查询，`type_desc` 列将返回 `HEAP` 作为索引类型的描述：


    ```sql

    SELECT * FROM sys.indexes

    WHERE object_id = OBJECT_ID(''dbo.FactResellerSalesNew'')

    ```


    运行以下代码创建基于行的聚集索引：


    ```sql

    CREATE CLUSTERED INDEX IX_ProductKey ON dbo.FactResellerSalesNew (ProductKey)

    ```


    这次，`type_desc` 将是 `CLUSTERED`，但仍然是基于行存储的。通过运行以下语句，存储将从聚集行存储更改为聚集列存储。`sys.indexes`
    上的 `type_desc` 将返回 `CLUSTERED COLUMNSTORE`。


    ```sql

    CREATE CLUSTERED COLUMNSTORE INDEX IX_ProductKey ON dbo.FactResellerSalesNew

    WITH (DROP_EXISTING = ON)

    ```


    #### 将列存储转换回行存储


    你也可以将列存储转换回行存储，可以是堆或聚集索引。删除列存储将创建一个堆，如以下示例所示。接续前面的示例，删除索引将使 `type_desc` 恢复为 `HEAP`：


    ```sql

    DROP INDEX dbo.FactResellerSalesNew.IX_ProductKey

    ```


    或者，不删除索引，你可以运行下一段代码；`type_desc` 将变回基于行的聚集索引：


    ```sql

    CREATE CLUSTERED INDEX IX_ProductKey ON dbo.FactResellerSalesNew(ProductKey)

    WITH (DROP_EXISTING = ON)

    ```'
  raw: '### Examples


    The first example shows how to create a nonclustered columnstore index and works
    on every version of the product since SQL Server 2012. As a nonclustered index,
    it assumes a table already exists so I will start by creating one in AdventureWorksDW2017.


    Note


    As indicated in Chapter [1](#393702_2_En_1_Chapter.xhtml), you can download the
    AdventureWorksDW2017 from [`https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure`](https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure).


    ```

    USE AdventureWorksDW2017

    GO

    CREATE TABLE dbo.FactResellerSalesNew(

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    SalesOrderNumber nvarchar(20) NOT NULL,

    SalesOrderLineNumber tinyint NOT NULL,

    RevisionNumber tinyint NULL,

    OrderQuantity smallint NULL,

    UnitPrice money NULL,

    ExtendedAmount money NULL,

    UnitPriceDiscountPct float NULL,

    DiscountAmount float NULL,

    ProductStandardCost money NULL,

    TotalProductCost money NULL,

    SalesAmount money NULL,

    TaxAmt money NULL,

    Freight money NULL,

    CarrierTrackingNumber nvarchar(25) NULL,

    CustomerPONumber nvarchar(25) NULL,

    OrderDate datetime NULL,

    DueDate datetime NULL,

    ShipDate datetime NULL,

    CONSTRAINT PK_SalesOrderNumber_SalesOrderLineNumber PRIMARY KEY CLUSTERED (

    SalesOrderNumber ASC,

    SalesOrderLineNumber ASC)

    )

    ```


    We can now create the nonclustered columnstore index by selecting a subset of
    the table columns:


    ```

    CREATE NONCLUSTERED COLUMNSTORE INDEX ncsi_FactResellerSalesNew ON dbo.FactResellerSalesNew
    (

    SalesOrderNumber, SalesOrderLineNumber, ProductKey, OrderDateKey, DueDateKey,
    ShipDateKey,

    ResellerKey, EmployeeKey, PromotionKey, CurrencyKey, SalesTerritoryKey, RevisionNumber,

    OrderQuantity, UnitPrice, ExtendedAmount, UnitPriceDiscountPct, DiscountAmount,
    ProductStandardCost,

    TotalProductCost, SalesAmount, TaxAmt, Freight, CarrierTrackingNumber, CustomerPONumber,

    OrderDate, DueDate, ShipDate)

    ```


    As indicated earlier, starting with SQL Server 2016, the nonclustered columnstore
    index is now updatable, so we can load the data after the index is created. (If
    you are testing this code in an earlier version of SQL Server, where a columnstore
    index may be read-only, you may want to load the data first.)


    ```

    INSERT INTO dbo.FactResellerSalesNew SELECT * FROM dbo.FactResellerSales

    ```


    Next is an example of a star join query taking benefit of the index and running
    in batch execution mode as shown in the plan in Figure [7-4](#393702_2_En_7_Chapter.xhtml#Fig4).


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig4_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Columnstore index on a fact table


    ```

    SELECT ProductKey, SUM(SalesAmount) FROM dbo.FactResellerSalesNew

    GROUP BY ProductKey

    ```


    Next, try to create a clustered columnstore index:


    ```

    CREATE CLUSTERED COLUMNSTORE INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew

    ```


    There are two main reasons this would not work. The immediate one is that our
    table already has a clustered index, and obviously only one is allowed per table.
    Even if you remove the clustered index, or use `CREATE CLUSTERED COLUMNSTORE INDEX
    WITH (DROP_EXISTING = ON)`, the next limitation is that only one columnstore index
    is allowed per table, and SQL Server will complain showing error 35339.


    Next, clean up by dropping the index:


    ```

    DROP INDEX dbo.FactResellerSalesNew.ncsi_FactResellerSalesNew

    ```


    Obviously, dropping the index is not required if you are also dropping the table,
    as shown:


    ```

    DROP TABLE FactResellerSalesNew

    ```


    For the next exercise, create a version of the table without a clustered index:


    ```

    USE AdventureWorksDW2017

    GO

    CREATE TABLE dbo.FactResellerSalesNew(

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    SalesOrderNumber nvarchar(20) NOT NULL,

    SalesOrderLineNumber tinyint NOT NULL,

    RevisionNumber tinyint NULL,

    OrderQuantity smallint NULL,

    UnitPrice money NULL,

    ExtendedAmount money NULL,

    UnitPriceDiscountPct float NULL,

    DiscountAmount float NULL,

    ProductStandardCost money NULL,

    TotalProductCost money NULL,

    SalesAmount money NULL,

    TaxAmt money NULL,

    Freight money NULL,

    CarrierTrackingNumber nvarchar(25) NULL,

    CustomerPONumber nvarchar(25) NULL,

    OrderDate datetime NULL,

    DueDate datetime NULL,

    ShipDate datetime NULL)

    ```


    Now you can create a clustered columnstore index, which will basically convert
    the entire table storage from a rowstore into a columnstore. This could happen
    from either a heap like in this example or from a row-based clustered index, as
    shown later.


    ```

    CREATE CLUSTERED COLUMNSTORE INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew

    ```


    You can load data as shown previously as clustered columnstore indexes have always
    been updatable since they were introduced with SQL Server 2014\. Similarly, trying
    to create a nonclustered columnstore index at this point would return error 35339.


    You could also create the table directly as a clustered columnstore. This is an
    example using only a few columns of the previous table:


    ```

    DROP TABLE dbo.FactResellerSalesNew

    GO

    CREATE TABLE dbo.FactResellerSalesNew (

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    INDEX csi_FactResellerSalesNew CLUSTERED COLUMNSTORE)

    ```


    We saw earlier that we cannot create a nonclustered columnstore on a clustered
    columnstore (or more than one clustered index of any kind as a matter of fact),
    but we can create a rowstore nonclustered index. An example is shown next:


    ```

    CREATE INDEX IX_ProductKey ON dbo.FactResellerSalesNew(ProductKey)

    ```


    Assuming a table is a rowstore clustered index, you can convert it to a columnstore
    clustered index using the `DROP_EXISTING` clause. Run the following statement
    to create a rowstore:


    ```

    DROP TABLE dbo.FactResellerSalesNew

    GO

    CREATE TABLE dbo.FactResellerSalesNew (

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL)

    ```


    If you run the following query, the `type_desc` column will return `HEAP` as the
    description of index type:


    ```

    SELECT * FROM sys.indexes

    WHERE object_id = OBJECT_ID(''dbo.FactResellerSalesNew'')

    ```


    Run the following code to create a row-based clustered index:


    ```

    CREATE CLUSTERED INDEX IX_ProductKey ON dbo.FactResellerSalesNew (ProductKey)

    ```


    This time, `type_desc` will be `CLUSTERED` but still rowstore based. By running
    the following statement, the storage will be changed from clustered rowstore to
    clustered columnstore. `type_desc` on sys.indexes will return `CLUSTERED COLUMNSTORE`.


    ```

    CREATE CLUSTERED COLUMNSTORE INDEX IX_ProductKey ON dbo.FactResellerSalesNew

    WITH (DROP_EXISTING = ON)

    ```


    You can also convert a columnstore to a rowstore, either to a heap or a clustered
    index. Dropping the columnstore will create a heap like in the following example.
    Following the previous example, dropping the index will return `type_desc` to
    `HEAP`:


    ```

    DROP INDEX dbo.FactResellerSalesNew.IX_ProductKey

    ```


    Alternatively, instead of dropping the index, you run the next code; `type_desc`
    will go back to a row-based clustered index:


    ```

    CREATE CLUSTERED INDEX IX_ProductKey ON dbo.FactResellerSalesNew(ProductKey)

    WITH (DROP_EXISTING = ON)

    ```'
  trans: '

    ### 示例


    #### 创建非聚集列存储索引


    第一个示例展示了如何创建非聚集列存储索引，该操作适用于自 SQL Server 2012 以来的所有产品版本。作为一个非聚集索引，它假设表已存在，因此我将在
    `AdventureWorksDW2017` 中先创建一个表。


    > 注意

    >

    > 如第 1 章所述，你可以从 [`https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure`](https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure)
    下载 `AdventureWorksDW2017`。


    ```sql

    USE AdventureWorksDW2017

    GO

    CREATE TABLE dbo.FactResellerSalesNew(

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    SalesOrderNumber nvarchar(20) NOT NULL,

    SalesOrderLineNumber tinyint NOT NULL,

    RevisionNumber tinyint NULL,

    OrderQuantity smallint NULL,

    UnitPrice money NULL,

    ExtendedAmount money NULL,

    UnitPriceDiscountPct float NULL,

    DiscountAmount float NULL,

    ProductStandardCost money NULL,

    TotalProductCost money NULL,

    SalesAmount money NULL,

    TaxAmt money NULL,

    Freight money NULL,

    CarrierTrackingNumber nvarchar(25) NULL,

    CustomerPONumber nvarchar(25) NULL,

    OrderDate datetime NULL,

    DueDate datetime NULL,

    ShipDate datetime NULL,

    CONSTRAINT PK_SalesOrderNumber_SalesOrderLineNumber PRIMARY KEY CLUSTERED (

    SalesOrderNumber ASC,

    SalesOrderLineNumber ASC)

    )

    ```


    我们现在可以通过选择表列的子集来创建非聚集列存储索引：


    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX ncsi_FactResellerSalesNew ON dbo.FactResellerSalesNew
    (

    SalesOrderNumber, SalesOrderLineNumber, ProductKey, OrderDateKey, DueDateKey,
    ShipDateKey,

    ResellerKey, EmployeeKey, PromotionKey, CurrencyKey, SalesTerritoryKey, RevisionNumber,

    OrderQuantity, UnitPrice, ExtendedAmount, UnitPriceDiscountPct, DiscountAmount,
    ProductStandardCost,

    TotalProductCost, SalesAmount, TaxAmt, Freight, CarrierTrackingNumber, CustomerPONumber,

    OrderDate, DueDate, ShipDate)

    ```


    如前所述，从 SQL Server 2016 开始，非聚集列存储索引现在是可更新的，因此我们可以在索引创建后加载数据。（如果你在早期版本的 SQL Server
    中测试此代码，其中列存储索引可能是只读的，你可能需要先加载数据。）


    ```sql

    INSERT INTO dbo.FactResellerSalesNew SELECT * FROM dbo.FactResellerSales

    ```


    #### 星型连接查询示例


    接下来是一个利用该索引并以批处理执行模式运行的星型连接查询示例，如图 7-4 中的执行计划所示。


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig4_HTML.jpg](img/393702_2_En_7_Fig4_HTML.jpg)


    *图 7-4 事实表上的列存储索引*


    ```sql

    SELECT ProductKey, SUM(SalesAmount) FROM dbo.FactResellerSalesNew

    GROUP BY ProductKey

    ```


    #### 尝试创建聚集列存储索引


    接下来，尝试创建聚集列存储索引：


    ```sql

    CREATE CLUSTERED COLUMNSTORE INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew

    ```


    这不会成功有两个主要原因。直接原因是我们的表已经有一个聚集索引，显然每个表只允许一个。即使你删除聚集索引，或使用 `CREATE CLUSTERED COLUMNSTORE
    INDEX WITH (DROP_EXISTING = ON)`，下一个限制是每个表只允许一个列存储索引，SQL Server 将报错 35339。


    #### 清理操作


    接下来，通过删除索引进行清理：


    ```sql

    DROP INDEX dbo.FactResellerSalesNew.ncsi_FactResellerSalesNew

    ```


    显然，如果你也要删除表，则不需要删除索引，如下所示：


    ```sql

    DROP TABLE FactResellerSalesNew

    ```


    #### 创建无聚集索引的表并创建聚集列存储索引


    对于下一个练习，创建一个没有聚集索引的表版本：


    ```sql

    USE AdventureWorksDW2017

    GO

    CREATE TABLE dbo.FactResellerSalesNew(

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    SalesOrderNumber nvarchar(20) NOT NULL,

    SalesOrderLineNumber tinyint NOT NULL,

    RevisionNumber tinyint NULL,

    OrderQuantity smallint NULL,

    UnitPrice money NULL,

    ExtendedAmount money NULL,

    UnitPriceDiscountPct float NULL,

    DiscountAmount float NULL,

    ProductStandardCost money NULL,

    TotalProductCost money NULL,

    SalesAmount money NULL,

    TaxAmt money NULL,

    Freight money NULL,

    CarrierTrackingNumber nvarchar(25) NULL,

    CustomerPONumber nvarchar(25) NULL,

    OrderDate datetime NULL,

    DueDate datetime NULL,

    ShipDate datetime NULL)

    ```


    现在你可以创建聚集列存储索引，这基本上会将整个表存储从行存储转换为列存储。这可以从堆（如本例）或基于行的聚集索引（如后所示）转换而来。


    ```sql

    CREATE CLUSTERED COLUMNSTORE INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew

    ```


    你可以如前所述加载数据，因为自 SQL Server 2014 引入以来，聚集列存储索引始终是可更新的。类似地，此时尝试创建非聚集列存储索引将返回错误 35339。


    #### 直接创建为聚集列存储的表


    你也可以直接将表创建为聚集列存储。这是一个仅使用上一个表中几列的示例：


    ```sql

    DROP TABLE dbo.FactResellerSalesNew

    GO

    CREATE TABLE dbo.FactResellerSalesNew (

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL,

    INDEX csi_FactResellerSalesNew CLUSTERED COLUMNSTORE)

    ```


    #### 在聚集列存储上创建非聚集行存储索引


    我们之前看到不能在聚集列存储上创建非聚集列存储（实际上，不能创建超过一个任何类型的聚集索引），但我们可以创建行存储非聚集索引。示例如下：


    ```sql

    CREATE INDEX IX_ProductKey ON dbo.FactResellerSalesNew(ProductKey)

    ```


    #### 使用 `DROP_EXISTING` 子句转换索引类型


    假设一个表是行存储聚集索引，你可以使用 `DROP_EXISTING` 子句将其转换为列存储聚集索引。运行以下语句创建一个行存储：


    ```sql

    DROP TABLE dbo.FactResellerSalesNew

    GO

    CREATE TABLE dbo.FactResellerSalesNew (

    ProductKey int NOT NULL,

    OrderDateKey int NOT NULL,

    DueDateKey int NOT NULL,

    ShipDateKey int NOT NULL,

    ResellerKey int NOT NULL,

    EmployeeKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    SalesTerritoryKey int NOT NULL)

    ```


    如果你运行以下查询，`type_desc` 列将返回 `HEAP` 作为索引类型的描述：


    ```sql

    SELECT * FROM sys.indexes

    WHERE object_id = OBJECT_ID(''dbo.FactResellerSalesNew'')

    ```


    运行以下代码创建基于行的聚集索引：


    ```sql

    CREATE CLUSTERED INDEX IX_ProductKey ON dbo.FactResellerSalesNew (ProductKey)

    ```


    这次，`type_desc` 将是 `CLUSTERED`，但仍然是基于行存储的。通过运行以下语句，存储将从聚集行存储更改为聚集列存储。`sys.indexes`
    上的 `type_desc` 将返回 `CLUSTERED COLUMNSTORE`。


    ```sql

    CREATE CLUSTERED COLUMNSTORE INDEX IX_ProductKey ON dbo.FactResellerSalesNew

    WITH (DROP_EXISTING = ON)

    ```


    #### 将列存储转换回行存储


    你也可以将列存储转换回行存储，可以是堆或聚集索引。删除列存储将创建一个堆，如以下示例所示。接续前面的示例，删除索引将使 `type_desc` 恢复为 `HEAP`：


    ```sql

    DROP INDEX dbo.FactResellerSalesNew.IX_ProductKey

    ```


    或者，不删除索引，你可以运行下一段代码；`type_desc` 将变回基于行的聚集索引：


    ```sql

    CREATE CLUSTERED INDEX IX_ProductKey ON dbo.FactResellerSalesNew(ProductKey)

    WITH (DROP_EXISTING = ON)

    ```

