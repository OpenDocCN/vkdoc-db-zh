- fmt: '### Transformation Rules


    As mentioned previously, the SQL Server query optimizer uses transformation rules
    to produce alternate execution plans. A final execution plan would be later chosen
    after cardinalities and costs are estimated. Transformation rules are based on
    relational algebra operations. The query optimizer will apply transformation rules
    to the previously generated logical tree of operators and by doing that would
    create additional equivalent logical and physical alternatives. In other words,
    it will take a relational operator tree and would generate equivalent relational
    trees.


    At the beginning of the optimization process, as we saw earlier, a query tree
    contains only logical expressions. Once transformation rules are applied, they
    could generate additional logical and physical expressions. A logical expression
    could be, for example, the definition of a join, as in the SQL language, and the
    physical expression would be when the query optimizer selects one of the physical
    operators like nested loops join, merge join, or hash join. In a similar way,
    a logical aggregate operation could be implemented with two physical algorithms,
    stream aggregate and hash aggregate.


    ### Rule Classification


    Transformation rules could be categorized in three types, simplification, exploration,
    and implementation rules.

    - Simplification rules are mostly used in the simplification phase, which we covered
    earlier, and their purpose is to simplify the current logical tree of operations.

    - Exploration rules, which are also called logical transformation rules, are used
    to generate equivalent logical alternatives.

    - On the other side, implementation rules, which are also called physical transformation
    rules, are used to generate equivalent physical alternatives.


    ### Memo Structure and Cost Estimation


    All the logical and physical alternatives generated during the query optimization
    process are stored in a memory structure called the `memo`. But keep in mind that
    finding alternatives is just solving one part of the problem. There is still the
    need to select the best choice. A cost estimation component will estimate the
    cost of the physical operations (there is no need to estimate the cost of logical
    operations). Even when all the alternate plans are equivalent and would produce
    the same query results, their costs could be dramatically different. Obviously,
    a bigger cost means using more resources such as CPU, I/O, or memory, impacting
    the query performance, hence the responsibility to select the best or lower cost.


    Finally, keep in mind that the query optimization process is extremely complicated,
    and by that it is not perfect. For example, it could be possible that an optimal
    plan may not be generated at all as a specific query could produce millions and
    millions of plans, and many of those may be discarded or not considered at all.
    Or perhaps it could be possible that the perfect plan may be generated and stored
    in the `memo` structure but not selected at all because of an incorrect cost estimation
    which instead selects another plan.


    ### Inspecting Transformation Rules


    Transformation rules work in a very simple way. They take a logical tree of operations
    and produce an equivalent tree of operations which, if executed, will return exactly
    the same query results. Since the performance of each tree or plan may be different,
    we strive to find the best possible plan we can. The transformation rules available
    to the query optimizer can be listed using the `sys.dm_exec_query_transformation_stats`
    DMV, which, although somehow undocumented, displays the names of the available
    rules. Running the following query will return 420 rules on SQL Server 2019 CU4:


    ```sql

    SELECT * FROM sys.dm_exec_query_transformation_stats

    ```


    A sample of the first few rows, related to join optimizations, is next.


    | name | promise_total |

    | --- | --- |

    | JNtoNL | 721299 |

    | LOJNtoNL | 841440 |

    | LSJNtoNL | 32803 |

    | LASJNtoNL | 26609 |

    | JNtoSM | 1254182 |

    | FOJNtoSM | 5448 |

    | LOJNtoSM | 318398 |

    | ROJNtoSM | 316128 |

    | LSJNtoSM | 9414 |

    | RSJNtoSM | 9414 |

    | LASJNtoSM | 10896 |

    | RASJNtoSM | 10896 |


    There is not much about transformation rules or how they work in the SQL Server
    documentation. But there are also some undocumented statements which could allow
    you to inspect and learn more about transformation rules and the optimization
    process in general.


    ### Optimization Example: GbAggBeforeJoin Rule


    To show you how transformation rules work, I will show you a complete example
    of a popular optimization. One well-known optimization I regularly show on my
    demos at conferences is when the query optimizer decides to push down a group
    by aggregate before a join. The transformation rule performing this optimization
    is called `GbAggBeforeJoin` (group by aggregate before join).


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig8_HTML.png](images/393702_2_En_1_Chapter/393702_2_En_1_Fig8_HTML.png)

    *Figure 1-8: Group by aggregate before join optimization*


    As shown in Figure 1-8, assuming we originally have the logical tree on the left,
    after applying the `GbAggBeforeJoin` rule, the query optimizer is able to generate
    the logical tree on the right. The traditional query optimization for this kind
    of query would be to perform the join on both tables first and then perform the
    aggregation using the join results. In some cases, however, performing the aggregation
    before the join could be more efficient.


    Both trees in Figure 1-8 are equivalent and, if executed, would produce exactly
    the same results. But, as mentioned more than once so far, one tree or execution
    plan could be more efficient than the other, and that is the reason we are optimizing
    this (and the reason query optimizers exist in the first place).


    Now let me show you how that optimization process works on SQL Server. Let us
    get an execution plan for the following query:


    ```sql

    SELECT c.CustomerID, COUNT(*)

    FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

    ON c.CustomerID = o.CustomerID

    GROUP BY c.CustomerID

    ```


    This query produces the plan in Figure 1-9.


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig9_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig9_HTML.jpg)

    *Figure 1-9: Plan with group by aggregate before join optimization*


    There are a few undocumented ways to know which transformation rules were considered
    for the generation of this execution plan. One of them, although very verbose,
    is using the undocumented trace flag 2373 as in the following example:


    ```sql

    DBCC TRACEON(3604)

    SELECT c.CustomerID, COUNT(*)

    FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

    ON c.CustomerID = o.CustomerID

    GROUP BY c.CustomerID

    OPTION (RECOMPILE, QUERYTRACEON 2373)

    ```


    Although the purpose of the flag is to provide memory information about the optimization
    process, we will use it to learn which transformation rules are being considered
    during this process. Running the previous query would create a very large output
    on the Messages tab of SQL Server Management Studio (notice we are using trace
    flag 3604 to get this output). I am removing most of the output and including
    only the information related to the transformation rules used by the optimization.'
  raw: '### Transformation Rules


    As mentioned previously, the SQL Server query optimizer uses transformation rules
    to produce alternate execution plans. A final execution plan would be later chosen
    after cardinalities and costs are estimated. Transformation rules are based on
    relational algebra operations. The query optimizer will apply transformation rules
    to the previously generated logical tree of operators and by doing that would
    create additional equivalent logical and physical alternatives. In other words,
    it will take a relational operator tree and would generate equivalent relational
    trees.


