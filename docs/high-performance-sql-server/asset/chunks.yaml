    尽管您很可能使用脚本来处理扩展事件并运行诸如 `CREATE EVENT SESSION`、`ALTER EVENT SESSION` 和 `DROP EVENT
    SESSION` 之类的语句，但通过其 SQL Server Management Studio 用户界面可以轻松入门。该界面还可以帮助您为所选事件和选项编写脚本。扩展事件用户界面还允许您根据一些常见的故障排除场景选择现有模板，这与长期以来在
    SQL Profiler 中使用模板的方式非常相似。也可以创建自定义模板。


    要涵盖常见事件及其使用方法的讨论需要单独一章。此外，我们在第 5 章中介绍了一个使用扩展事件跟踪特定进程等待的示例，因此您可能需要参考它。但如果您在排查性能问题时没有额外信息，首要任务之一是查看正在运行的高开销查询，并寻找优化机会。以下事件列表有助于收集此类信息，可用于排查高开销查询：


    *   `sql_statement_completed`：指示 SQL 语句已完成。其 SQL 跟踪对应事件是 `SQL:StmtCompleted`。

    *   `sp_statement_completed`：当存储过程内的 SQL 语句完成时发生。其 SQL 跟踪对应事件是 `SP:StmtCompleted`。

    *   `module_end`：当模块的执行完成时发生。其 SQL 跟踪对应事件是 `SP:Completed`。

    *   `sql_batch_completed`：指示批处理已完成。其 SQL 跟踪对应事件是 `SQL:BatchCompleted`。

    *   `rpc_completed`：指示远程过程调用已完成。其 SQL 跟踪对应事件是 `RPC:Completed`。


    这些事件只会查找已完成的 SQL 语句。遗憾的是，无法使用事件来查找未能完成的语句的性能信息，但您可以使用新的查询存储功能获取此类信息，如第 6 章所述。在某些情况下，未完成的语句可能是性能问题，因此排查这些情况可能是必要且重要的。


    您可以在 [`https://msdn.microsoft.com/en-us/library/ms175481.aspx`](https://msdn.microsoft.com/en-us/library/ms175481.aspx)
    找到已记录的 SQL 跟踪事件。


    注意


    尽管在撰写本文时我尚未看到完整的扩展事件文档在线发布，但您可以使用 SQL Server Management Studio 用户界面通过键入事件全名或部分名称来快速搜索事件。选择特定事件还可以显示其描述及其事件字段的描述。

    '
- fmt: '# SQL Server Data Collector


    The SQL Server Data Collector, a feature introduced with SQL Server 2008, is a
    great tool for collecting system data and troubleshooting performance problems.
    It is definitely the most underused SQL Server tool and one I have used extensively
    in the past. Collecting system data is essential to troubleshoot performance problems
    as it is very common that while researching a problem when there are no symptoms,
    the information may not be available anymore.


    Among the information collected are the following:


    1.  Disk usage: Includes disk usage information for both data and transaction
    log files

    2.  Query statistics: Includes query performance information

    3.  Server activity: Includes a large list of performance counters and server
    activity information such as waits, schedulers, virtual file statistics, and data
    from some other DMVs


    These three items correspond to the three collection sets defined when you enable
    the Data Collector. You can get specific details about the data collected on each
    collection set by looking at their properties. For example, in `SQL Server Management
    Studio`, expand the `Management` folder, select `Data Collection` and then `System
    Data Collection Sets`, right-click any of the collection sets, and select properties.


    As an example, the `Server Activity` collection set properties is shown in Figure
    8-4, which includes two collection items. You can inspect the `T-SQL` code used
    to collect data on the first collection item, called “Server Activity–DMV Snapshots,”
    which obtains the data from multiple DMVs. The second collection item in the list,
    called “Server Activity–Performance Counters,” shows the defined performance counters.
    It contains a large list of performance counters, and, as mentioned earlier in
    this chapter, you could fine-tune this list by including additional performance
    counters. A very small sample list of these performance counters is next:


    ![Server Activity collection set properties](images/393702_2_En_8_Chapter/393702_2_En_8_Fig4_HTML.jpg)


    *   `\Memory % Committed Bytes In Use`

    *   `\Memory \Available Bytes`

    *   `\Memory \Cache Bytes`

    *   `\Memory \Cache Faults/sec`

    *   `\Memory \Committed Bytes`

    *   `\Memory \Free & Zero Page List Bytes`

    *   `\Memory \Modified Page List Bytes`

    *   `\Memory \Pages/sec`

    *   `\Memory \Page Reads/sec`

    *   `\Memory \Page Writes/sec`

    *   ...


    The data collected by this tool is persisted in a database, and you can define
    the retention policies depending on your needs. Finally, the Data Collector contains
    reports that you can use to see the collected information in a nice graphical
    way. You could also create your own reports or write customized queries to obtain
    data directly from the `Data Collector` database. For more details about the `Data
    Collector`, please refer to the SQL Server documentation.


    ## Operator-Level Performance Statistics


    Introduced with SQL Server 2016, and later included as part of SQL Server 2014
    Service Pack 2, it is now possible to see operator-level performance information
    in an execution plan, which is an amazing piece of information for query execution
    troubleshooting. Only very basic information, such as the actual number of rows,
    was available on previous versions of SQL Server.


    Looking at the `XML` plan will provide such rich and valuable information to troubleshoot
    performance problems such as actual rows read (which is different from the actual
    number of rows, available in all the versions of SQL), actual `CPU` time, actual
    elapsed time, actual logical reads, actual physical reads, actual read-aheads,
    actual `LOB` logical reads, actual `LOB` physical reads, or actual `LOB` read-aheads,
    obviously when applicable.


    For example, run the following query and examine its resulting execution plan
    in `AdventureWorks2017`:


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ```


    Inspecting the generated plan would show a clustered index scan operation with
    the following information, in which the `RunTimeCountersPerThread` element, as
    its name implies, includes runtime performance information counter per thread,
    as the following `XML` fragment shows:


    ```xml

    <RunTimeCountersPerThread Thread="0" ActualRows="31465" ActualRowsRead="31465"
    ActualEndOfScans="1" ActualExecutions="1" ActualExecutionTime="2.0156" ... />

    ```


    Although this performance information is by thread, for simplicity, the previous
    example includes a serial plan and only thread 0 is shown. A parallel plan will
    show the same level of detail by thread. For example, in my test system with four
    logical processors, I can see five entries for `RunTimeCountersPerThread`, one
    for thread 0, which is the coordinator or main thread, plus four entries for each
    of the actual threads performing the actual clustered index scan operation.


    You can look at this information by requesting the actual execution plan. As we
    know, getting an actual execution plan from `SQL Server Management Studio` is
    straightforward and not an expensive operation to do. Getting an actual execution
    plan from queries executed by applications in a production environment could be
    more expensive as it would require capturing the required events. As an alternative,
    a new extended event, `query_thread_profile`, can be used to get the same information.
    This event is triggered at the end of the query execution by each operator and
    thread used in the plan. Additionally, you could use the `node_id` attribute in
    the event to correlate it with the respective operator in the plan.


    ## Trace Flags on Plans


    Introduced with SQL Server 2014 Service Pack 2 and SQL Server 2016 Service Pack
    1, execution plans now show information about enabled trace flags. This includes
    the instance level, session level, and query level trace flags enabled both at
    optimization time and execution time (if an actual execution plan is requested).
    Both session and query levels show as session in the plan.


    Note: Query level trace flags are indicated using the `QUERYTRACEON` query hint,
    and although this hint has been available for several versions of SQL Server,
    has only recently been documented, and has been supported for only a limited number
    of trace flags, as shown on [`https://support.microsoft.com/en-us/kb/2801413`](https://support.microsoft.com/en-us/kb/2801413).


    By using this new feature, you can see if a specific behavior has been introduced
    by means of a trace flag, which impacts the choice of an execution plan or may
    impact the query performance in some other way. This feature will be especially
    helpful when sharing execution plans where you do not have direct access to the
    server that produced them.


    ## Summary


    This chapter covered performance troubleshooting by monitoring or collecting data
    from a SQL Server instance. It also demonstrated how proactively collecting and
    persisting this data for later analysis could be extremely beneficial to understand
    how a specific system works, to create a baseline, and to understand when performance
    is deviating from a desirable or expected behavior.


    Performance problems could arise for multiple reasons, some of those even benign,
    for example, a website increasing the number of customers and sales. Consequently,
    proactively monitoring and understanding performance trends is essential to anticipate
    and react to those changes. Although it is impossible to have a comprehensive
    list, this chapter covered the most critical performance counters, dynamic management
    objects, and events, along with some of the tools used to display and collect
    such data. Some other performance counters, dynamic management objects, and events
    have been introduced in other chapters of the book as well as related to the topic
    at hand.'
