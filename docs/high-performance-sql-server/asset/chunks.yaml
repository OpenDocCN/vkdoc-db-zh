  trans: '

    ### 成本估算


    如前所述，查询优化器生成的执行计划的质量，直接等同于其所产生等效计划的质量以及这些计划成本估算的准确性。这意味着，即使查询优化器能够为某个查询生成一个完美的执行计划（并将其存储在
    memo 中），一个不正确的成本估算也可能导致查询优化器选择另一个效率较低的计划。


    查询优化器使用的成本估算公式考虑了 I/O、CPU 和内存等资源的消耗，得出的数值对许多人来说可能像是个谜。例如，你可能会惊讶地发现，成本估算并不考虑你的查询是否需要从磁盘读取数据，或者数据是否已经在内存中。它也不考虑你使用的是非常老旧的磁盘驱动器还是最快的
    SSD 卷。但是，尽管没有考虑这些因素，成本估算在选择一个足够好的执行计划这一目的上，效果非常出色。


    最后，如果你曾好奇像 `2.65143` 这样的成本数字是如何计算出来的，我将在这里做一个基本介绍，至少让你了解其工作原理的基本概念。成本估算是为每个运算符单独执行的，而计划的总成本则是该计划中所有运算符成本的总和。每个运算符的成本取决于其算法以及该运算符预计返回的行数。某些运算符，如排序和哈希连接，还会考虑系统中的可用内存。


    正如你在每个执行计划中看到的那样，每个运算符都包含与之关联的成本。一些运算符可能同时包含 CPU 成本和 I/O 成本。另一些可能只有 CPU 成本。通常，位于执行计划数据流起始位置的运算符（即在计划形状中从右侧开始）会具有
    I/O 成本。一些例子包括表扫描、聚集索引扫描或索引查找。示例参见图 1-13。再次强调，注意这是估算成本。尽管计划会显示某些属性（如行数）的估计值和实际值，但并不存在所谓的实际
    CPU 成本或实际 I/O 成本（不过有多种工具可以找出查询的真实性能信息；其中许多工具，如查询存储，本书均有介绍）。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig13_HTML.jpg](img/393702_2_En_1_Fig13_HTML.jpg)


    **图 1-13**

    显示 CPU 和 I/O 成本的运算符


    注意：我说数据在执行计划中从右向左流动。根据定义，执行方向是相反的，即从左到右，这意味着顶级运算符会向其右侧的运算符请求行数据。


    现在让我为你展示一个针对以下查询的成本估算示例：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    WHERE LineTotal = 35

    ```


    运行该查询，获取计划，并显示聚集索引扫描运算符的属性。在这个聚集索引扫描的具体例子中，我注意到第一条记录的 CPU 成本是 `0.0001581`，其后每增加一条记录的
    CPU 成本是 `0.0000011`。由于我们估计有 `121,317` 条记录，我们可以计算总 CPU 成本为 `0.0001581 + 0.0000011
    * (121317 – 1)`，得出 `0.133606`，这就是图 1-13 中显示的估算 CPU 成本值。


    同样地，我注意到第一个数据库页的最小 I/O 成本是 `0.003125`，其后每增加一个页，成本递增 `0.00074074`。由于聚集索引扫描运算符会扫描整个表，我可以使用以下查询来查找数据库页的数量，此查询在此情况下返回
    `1239`：


    ```sql

    SELECT in_row_data_page_count, row_count

    FROM sys.dm_db_partition_stats

    WHERE object_id = object_id(''Sales.SalesOrderDetail'')

    AND index_id = 1

    ```


    因为该运算符扫描的是拥有 `1239` 个页的整个表，我现在可以估算 I/O 成本了，即 `0.003125 + 0.00074074 * (1239 –
    1)`，总计 `0.92016112`，或四舍五入后为 `0.920162`，如图 1-13 所示。


    因此，该运算符的总成本是 CPU 成本 `0.133606` 和 I/O 成本 `0.920162` 之和，总计为 `1.05377`，如图 1-13 所示。按照相同的过程，整个计划的成本是计划中所有运算符成本的总和。在这个例子中，我们加上两个计算标量运算符的成本
    `0.01213`，最后加上一个筛选运算符的成本 `0.05823`，总计为 `1.13626`，这就是图 1-14 执行计划中显示的成本（再次说明，有时这些数字会被四舍五入）。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig14_HTML.jpg](img/393702_2_En_1_Fig14_HTML.jpg)


    **图 1-14**

    显示总成本的计划


    最后，请记住这只是一个成本模型；虽然它对于选择一个足够好的执行计划来说效果很好，但这并不意味着它是实际执行时的真实成本。我听过很多人试图用这些成本来比较一个计划与另一个计划的性能效率。这是一个巨大的错误。正如我之前所说，有多种工具可以查看查询的真实性能信息。


    关于 SQL Server 成本估算历史的一个有趣轶事，与成本值的原始含义有关。最初，这个数字意味着在特定硬件配置上查询执行所需的秒数。因此，`1.25`
    的成本意味着查询需要 `1.25` 秒来执行。显然，执行时间取决于硬件，所以这些成本是在微软一位名叫 Nick（尼克）的员工的电脑上测量的，他是查询处理团队的一员。这发生在
    SQL Server 7 时代，也就是当前的查询优化器被编写的时候。如今，这些数值不应再与秒数或其他任何度量单位关联起来，它们只是被称为成本单位。

    '
- fmt: '## Statistics


    我们无法在结束关于查询优化器工作原理的章节时，不介绍查询优化统计信息。SQL Server 查询优化器是一个基于成本的优化器。这意味着它所生成计划的质量直接与其成本估算相关。同样，计划的估算成本也是基于为特定运算符定义的成本模型及其基数估算。基数估算基本上是指给定查询预计返回的行数。


    那么，优化器如何知道一个查询，或者更具体地说，查询中任何运算符预计返回的行数呢？从技术上讲，这似乎是不可能的，因为查询优化器的任务只是生成执行计划，它甚至从不实际访问数据。


    为了获得对数据的估算，SQL Server 使用查询优化统计信息。简单来说，统计信息是关于数据或数据分布的信息。基数估算是预计由查询或特定查询运算符（如筛选器或联接）返回的行数。另一方面，可选择性可以描述为满足特定谓词的行数占总行数的比例。因此，可选择性总是一个介于
    0 到 1 之间（包含 0 和 1）的值。高可选择性的谓词将返回少量行。


    接下来，我将展示一个关于统计信息如何工作的非常基础的示例。假设我们想要优化以下查询：


    ```

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```


    在这个案例中，我们请求估算执行计划而不是实际执行计划。选择“显示估算执行计划”而非“包含实际执行计划”，或使用 `Ctrl-L`。我们的计划如图 [1-15](#393702_2_En_1_Chapter.xhtml#Fig15)
    所示。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig15_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig15_HTML.jpg)


    图 1-15


    显示预计行数的计划


    注意


    您也可以在最终的执行计划中看到预计行数以及实际行数。


    那么，优化器在实际运行查询之前如何知道有 9 个预计行呢？要回答这个问题，我们需要查看统计信息对象的直方图。为此，您可以使用适用于任何 SQL Server
    版本的 `DBCC SHOW_STATISTICS`，或者对于 SQL Server 2016 Service Pack 1 CU2 或更高版本，可以使用较新的
    `sys.dm_db_stats_histogram` DMF。`DBCC SHOW_STATISTICS` 可用于显示整个统计信息对象，其中包括头部信息、密度信息和直方图。`sys.dm_db_stats_histogram`
    可用于仅显示统计信息对象的直方图，它与运行 `DBCC SHOW_STATISTICS WITH HISTOGRAM` 效果相同。以下语句将请求所需的统计信息对象：


    ```

    DBCC SHOW_STATISTICS(''Sales.SalesOrderDetail'', IX_SalesOrderDetail_ProductID)

    ```


    您可以使用以下语句获取直方图：


    ```

    SELECT * FROM sys.dm_db_stats_histogram (OBJECT_ID(''Sales.SalesOrderDetail''),
    3)

    ```


    在上面的例子中，您需要 `stats_id`，本例中是 3，您可以从 `sys.stats` DMV 中获取，如下例所示：


    ```

    SELECT * FROM sys.stats

    WHERE object_id = OBJECT_ID(''Sales.SalesOrderDetail'')

    ```


    虽然 `sys.stats` 的优点是可以编程方式用于查找 `stats_id`，但对于单次请求，您必须手动运行它。例如，在我的系统中，我可以看到统计信息
    `IX_SalesOrderDetail_ProductID` 的 `stats_id` 值为 3。


    另一种显示统计信息对象详细信息的方法是使用 `sys.dm_db_stats_properties` DMF，如下所示（尽管相同的信息也可以通过 `DBCC
    SHOW_STATISTICS` 获取）：


    ```

    SELECT * FROM sys.dm_db_stats_properties (OBJECT_ID(''Sales.SalesOrderDetail''),
    3)

    ```


    直方图的一小部分内容如下：


    ```

    range_high_key  range_rows  equal_rows  distinct_range_rows  average_range_rows

    889             80          161         2                    40

    892             116         169         2                    58

    894             140         145         1                    140

    898             227         9           3                    75.66666

    900             117         110         1                    117

    904             34          253         2                    17

    ```


    在我的测试系统中，直方图的这一部分只显示了 200 个步骤中的 6 个。我们可以看到有一个 `range_high_key` 值为 898（我们在搜索谓词中使用了
    898），并且 `equal_rows` 值是 9，这就是查询优化器获取该值的来源。在 `range_high_key` 没有匹配的情况下，例如 897，将使用
    `average_range_rows` 值代替，本例中为 75.66666，如图 [1-16](#393702_2_En_1_Chapter.xhtml#Fig16)
    所示。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig16_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig16_HTML.jpg)


    图 1-16


    使用 `average_range_rows` 的预计行数'
  raw: '### Statistics


    We could not end a section about how the query optimizer works without at least
    an introduction to query optimization statistics. The SQL Server query optimizer
    is a cost-based optimizer. This means that the quality of the plans it produces
    is directly related to its cost estimations. In the same way, the estimated cost
    of a plan is based on a cost model defined per specific operator as well as their
    cardinality estimation. Cardinality estimation basically means the estimated number
    of rows returned by a given query.


    So how does the optimizer know the number of rows returned by a query or, more
    specifically, by any operator in a query? This seems like technically impossible
    as the job of the query optimizer is just to generate an execution plan, and it
    never does even access the data at all.


    To get an estimation about the data, SQL Server uses query optimization statistics.
    Statistics are, simply put, information about the data or data distribution. A
    cardinality estimate is the number of rows estimated to be returned by a query
    or a specific query operator such as a filter or a join. On the other way, selectivity
    can be described as a fraction of rows in a set that satisfy a specific predicate.
    As such, selectivity is always a value between 0 and 1, inclusive. A highly selective
    predicate would return a small number of rows.


    Next, I will show you a very basic example of how statistics work. Let us suppose
    we want to optimize this query:


    ```

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```


    In this case, request an estimated execution plan instead of an actual execution
    plan. Instead of “Include Actual Execution Plan,” select “Display Estimated Execution
    Plan” or use Ctrl-L. Our plan is shown in Figure [1-15](#393702_2_En_1_Chapter.xhtml#Fig15).


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig15_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig15_HTML.jpg)


    Figure 1-15


    Plan showing estimated number of rows


    Note


    You can also see the estimated number of rows in the final execution plan, along
    with the actual number of rows.


    So how does the optimizer know there are nine estimated rows before actually running
    the query? To answer this, we would have to look at the histogram of the statistics
    object. In order to do this, you can either use DBCC SHOW_STATISTICS for any version
    of SQL Server or the newer sys.dm_db_stats_histogram DMF for SQL Server 2016 Service
    Pack 1 CU2 or later. DBCC SHOW_STATISTICS can be used to display the entire statistics
    object, which includes a header, the density information, and the histogram. sys.dm_db_stats_histogram
    can be used to display the histogram of the statistics object only, and it is
    the same as running DBCC SHOW_STATISTICS WITH HISTOGRAM. The following statement
    will request the required statistics object:


    ```

    DBCC SHOW_STATISTICS(''Sales.SalesOrderDetail'', IX_SalesOrderDetail_ProductID)

    ```


    You can get the histogram using the following statement:


    ```

    SELECT * FROM sys.dm_db_stats_histogram (OBJECT_ID(''Sales.SalesOrderDetail''),
    3)

    ```


    In the last example, you need the stats_id, in this case 3, which you can get
    from the sys.stats DMV as in the following example:


    ```

    SELECT * FROM sys.stats

    WHERE object_id = OBJECT_ID(''Sales.SalesOrderDetail'')

    ```


    Although sys.stats has the benefit that it can be used programmatically to find
    the stats_id, for a single request, you would have to run it manually. For example,
    in my system, I can see that the statistic IX_SalesOrderDetail_ProductID has stats_id
    value of 3.


    Another method used to show details about the statistics object can be using the
    sys.dm_db_stats_properties DMF as shown next (although the same information is
    available using DBCC SHOW_STATISTICS):


    ```

    SELECT * FROM sys.dm_db_stats_properties (OBJECT_ID(''Sales.SalesOrderDetail''),
    3)

    ```


    A small section of the histogram is next:


    ```

    range_high_key  range_rows  equal_rows  distinct_range_rows  average_range_rows

    889             80          161         2                    40

    892             116         169         2                    58

    894             140         145         1                    140

    898             227         9           3                    75.66666

    900             117         110         1                    117

    904             34          253         2                    17

    ```


    In this part of the histogram, only 6 steps are shown out of 200 in my test system.
    We can see there is a range_high_key value of 898 (where 898 was used in our search
    predicate), and the equal_rows value is 9, which is where the query optimizer
    is getting the value from. In the cases where there is no match for range_high_key,
    for example, 897, the average_range_rows value will be used instead, in this case
    75.66666, as you can see in Figure [1-16](#393702_2_En_1_Chapter.xhtml#Fig16).


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig16_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Estimated number of rows using average_range_rows'
