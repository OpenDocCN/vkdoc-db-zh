    ```

    DBCC execution completed. If DBCC printed error messages, contact your system
    administrator.

    Rules that are off globally:

    JNtoSM

    GbAggToStrm

    GbAggToHS

    GbAggBeforeJoin

    DBCC execution completed. If DBCC printed error messages, contact your system
    administrator.

    ```


    同样，您可以使用未文档化的语句 `DBCC SHOWONRULES` 来列出所有仍然启用的规则，在我们的例子中，这将是查询优化器可用的剩余 416 条规则。要启用被禁用的规则，请运行未文档化的语句
    `DBCC RULEON`，如下所示：


    ```

