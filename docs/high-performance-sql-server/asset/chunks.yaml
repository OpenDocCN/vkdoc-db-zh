- fmt: '### `sys.dm_db_index_physical_stats`


    This DMV allows you to get the fragmentation information of your tables and indexes.
    Fragmentation could exist in three flavors: page, logical, and extent fragmentation.
    Page fragmentation occurs when data pages are not totally full. On the other side,
    logical and extent fragmentation appears when the pages of an object are not physically
    in order. Logical fragmentation occurs when pages are not physically in order
    according to the index logical order. Extent fragmentation is a similar concept
    in which the extents of a heap are not physically in order.


    Fragmentation could be a performance problem only for table and index scan operations,
    for example, while performing page read-ahead operations. A workload of mostly
    index lookups would not be affected by fragmentation (at least logical or extent
    fragmentation). Two columns on the `sys.dm_db_index_physical_stats`, `avg_page_space_used_in_percent`
    and `avg_fragmentation_in_percent`, reflect the fragmentation level of the table
    or index.


    The column `avg_page_space_used_in_percent` indicates the average percentage of
    space used in data pages, which basically indicates page fullness. Page fullness
    can usually be controlled by configuring an adequate fill factor value, which
    specifies the percentage of space to be filled with data for data pages, and can
    be configured at different levels ranging from the server to the object level.
    For example, a fill factor of 90 means the page is 90% full, leaving only the
    remaining 10% for new rows. An optimal value would depend on the application and
    database usage. The server default configuration fill factor value, 0 (which,
    by the way, is exactly the same as 100), means that pages are filled to capacity
    and work perfectly fine when rows are usually added at the end of a table, such
    as when using an `IDENTITY` constraint. This default value would also be optimal
    for disk space usage as the page is full and scans will be efficient as well (meaning
    there is no need to scan partially empty pages performing additional I/O operations).
    But full pages may not be optimal for random insert data operations where page
    splits will be required creating a performance problem in addition to fragmentation.


    A value less than 100% may be adequate for cases requiring random insert data
    operations. This could be achieved by adjusting the fill factor configuration
    according to the particular insert data requirements of the application. A page
    split occurs when SQL Server has no room in a page for either additional rows
    or to update an existing row whose new larger size does not fit in the page anymore.
    The split operation basically creates a new page in which about half of the rows
    of the original page are moved to the new page. Page splits are an expensive operation
    and lead to fragmentation as they end with two pages about only 50% full. Page
    splits should be avoided or minimized and can be monitored using the `SQLServer:Access
    Methods` Page Splits/sec performance counter or the `page_split` extended event.
    As covered in Chapter 9, a performance recommendation for an index is to have
    an ever-increasing value to minimize these problems.


    The column `avg_fragmentation_in_percent` refers to the percentage of logical
    fragmentation for indexes or extent fragmentation for heaps. Logical fragmentation
    refers to the percentage of out-of-order pages in the leaf pages of an index,
    where pages are not physically in order according to the index logical order.
    Extent fragmentation is a similar concept for heaps in which the extents of a
    heap are not physically in order.


    Fixing page fragmentation in a database would require adjusting the fill factor
    configuration level if your application needs to insert rows on existing pages.
    Logical or extent fragmentation can be fixed by rebuilding or reorganizing the
    index or table. You would usually only need to update the fill factor once. Rebuilding
    or reorganizing the index or table, on the other hand, may need to be performed
    on a periodic basis, usually in a database maintenance job. When to decide to
    rebuild or reorganize an index would depend on your database, but usually a safe
    starting point is to reorganize the index when the fragmentation goes from 10
    to 40% and to rebuild the index when the fragmentation is greater than 40%. A
    heap by definition does not include a clustered index, but you can also defragment
    it by creating a clustered index on it and then dropping it. Creating a clustered
    index on the heap will redistribute the data in an optimal way, without any fragmentation,
    and later dropping it will just remove the metadata definition of the index, leaving
    the data the same.


    The following code will return the indexes that may require defragmentation in
    the current database by looking at the `avg_fragmentation_in_percent` column with
    fragmentation greater than 10%:


    ```sql

    SELECT *

    FROM sys.dm_db_index_physical_stats (DB_ID(), NULL, NULL , NULL, ''LIMITED'')

    WHERE avg_fragmentation_in_percent > 10

    ```


    You can then write a script to make the choice to either run `ALTER INDEX REORGANIZE`
    or `ALTER INDEX REBUILD`, based on the percentage, as shown in the following pseudocode:


    ```sql

    IF avg_fragmentation_in_percent = 30.0

    SET @command = ''ALTER INDEX '' + ... + '' REBUILD''

    EXEC (@command)

    ```


    The `sys.dm_db_index_physical_stats` documentation at `https://msdn.microsoft.com/en-us/library/ms188917.aspx`
    includes the basic code to do this, which you can adapt for your specific needs.


    Note: I strongly recommend using Ola Hallengren’s SQL Server maintenance solution
    for backups, integrity checks, and index and statistics maintenance. This maintenance
    solution is free and can be downloaded from `https://ola.hallengren.com/`.


    ### `sys.dm_exec_query_optimizer_info`


    The `sys.dm_exec_query_optimizer_info` DMV returns information about the optimizations
    performed by the query optimizer. You can use this information to obtain query
    optimization information regarding your system or a specific workload. Currently,
    the DMV returns 39 rows listing great information such as the total number of
    optimizations, average elapsed time per optimization, average estimated cost per
    optimization, and details about optimizations such as trivial plans, timeouts,
    memory problems during optimization, or the number of optimizations related to
    inserts, deletes, updates, merges, subqueries, hints, view references, remote
    queries, and indexed views. This can give you great info about the optimizations
    happening in your system. Some of the entries of this DMV are undocumented.


    A short sample output is shown in Table 8-5.


    Table 8-5: Sample Output


    | counter | occurrence | value |

    | --- | --- | --- |

    | timeout | 495 | 1 |

    | memory limit exceeded | 0 | NULL |

    | insert stmt | 12836 | 1 |

    | delete stmt | 93 | 1 |

    | update stmt | 12 | 1 |

    | merge stmt | 0 | NULL |

    | contains subquery | 7161 | 1 |

    | unnest failed | 11783 | 1 |'
