- fmt: '## CXPACKET


    This is the parallel processing wait. Having these waits in your system does not
    necessarily mean that there is a problem, or a problem with parallelism. Unfortunately,
    some wrong advice online shows otherwise, which has given parallelism a bad reputation.
    As a consequence, a bad reaction to this wait by many people is to sometimes disable
    parallelism. The reality is we may need to do additional research to see if, in
    fact, parallelism is the problem. As covered in the example earlier in this chapter,
    to troubleshoot `CXPACKET` wait, we should start by looking at the waits on the
    additional child parallel threads.


    In addition, starting with SQL Server 2016 Service Pack 2 and SQL Server 2017
    CU3, `CXPACKET` waits are separated into `CXPACKET` and `CXCONSUMER` waits, mostly
    separating the waits for the producer and consumer threads, respectively. So `CXPACKET`
    now only applies to waits related to the synchronization of the query processor
    exchange operator and producing rows for consumer threads. Consumer thread waits
    are now tracked separately using the `CXCONSUMER` wait type.


    ## CXCONSUMER


    As mentioned earlier, starting with SQL Server 2016 Service Pack 2 and SQL Server
    2017 CU3, `CXPACKET` waits are now separated into `CXPACKET` and `CXCONSUMER`
    waits. `CXCONSUMER` are consumer threads waiting for a producer thread to send
    rows and can usually be safely ignored.


    ## PAGELATCH_* and PAGEIOLATCH_*


    Latches and latch-related waits were introduced in Chapter [1](#393702_2_En_1_Chapter.xhtml)
    and also covered earlier in this chapter. In addition, latch waits related to
    contention on allocation pages on `tempdb` are covered in great detail in Chapter
    [4](#393702_2_En_4_Chapter.xhtml).


    ## ASYNC_NETWORK_IO


    Although the name of this wait type may suggest a network problem, a most common
    scenario is a client processing data problem. Usually, the recommendation is to
    make sure the client is processing the data fast enough or to validate that the
    client itself does not have a performance problem. Network connectivity problem
    is less common but also a recommended check.


    ## SOS_SCHEDULER_YIELD


    As covered in Chapter [1](#393702_2_En_1_Chapter.xhtml) and at the beginning of
    this chapter, SQL Server uses a nonpreemptive scheduler so when a task uses its
    quantum, it is programmed to yield CPU voluntarily. The task is never suspended
    and instead goes directly from running to runnable as there is no need to wait
    for a resource or anything else. This wait on the runnable queue is reflected
    as a `SOS_SCHEDULER_YIELD` wait and usually does not mean there is a problem.
    Since `wait_time` includes `signal_wait_time` on the previously discussed DMVs,
    for a task waiting on `SOS_SCHEDULER_YIELD`, both values will be the same or very
    close.


    This wait type can also mean spinlock contention, but as explained earlier it
    is not common.


    ## THREADPOOL


    As explained in Chapter [1](#393702_2_En_1_Chapter.xhtml), workers in SQL Server
    are created in an on-demand fashion until the “max worker threads” configured
    value is reached, and if there are not enough workers for query execution, tasks
    may have to wait, and you will see this wait type. This does not mean that the
    value of “max worker threads” has to be increased as using the default value of
    0 is usually the recommended choice. Some other waits or performance issues should
    be investigated as well. Queries showing these waits most likely should be optimized,
    especially if they have parallel plans using a large number of threads.


    The “max worker threads” configured value does not take into account the workers
    required for the background system process, and its default value allows SQL Server
    to automatically configure the number of maximum worker threads. For more details,
    see the following Books Online entry: [`https://msdn.microsoft.com/en-us/library/ms190219.aspx`](https://msdn.microsoft.com/en-us/library/ms190219.aspx).


    ## PREEMPTIVE_*


    The `PREEMPTIVE_` prefix includes a large number of waits (225 in SQL Server 2019),
    all of which occur when the SQLOS scheduler switches to preemptive mode to perform
    a specific external operation. In preemptive mode, you will see the task status
    as `Running` as in reality its execution is outside the control of the SQLOS.


    ## OLEDB


    You will see `OLEDB` waits when a task is waiting for data from a SQL Server Native
    Client OLE DB provider. You should look at these sources, which in many cases
    are linked servers or SSIS packages, for the possibility of optimizations. Executing
    DMVs or `DBCC CHECK` commands will also show `OLEDB` waits as internally they
    are implemented as special `OLEDB` calls.


    ## IO_COMPLETION


    This wait type occurs for a large variety of I/O waits related to reads and writes
    other than database pages. Some examples of these I/O operations include reading
    and writing sort or hash workfiles on `tempdb`, reading and writing records or
    any other information from the transaction log (other than `WRITELOG` explained
    next), or reading and writing eager spools to `tempdb`. As mentioned previously,
    I/O waits on data pages appear as `PAGEIOLATCH_` waits.


    ## WRITELOG


    `WRITELOG` occurs when a thread is waiting for SQL Server to write a log block
    to the transaction log, mostly as a result of a transaction commit or a checkpoint
    operation. Keep in mind that every update operation requires a transaction, even
    if one has not been explicitly created, for example, using the `BEGIN/COMMIT TRANSACTION`
    statements. Although some recommendations online ask for reducing the amount of
    changes to the database, assuming that has been optimized, the remaining thing
    to do is to use a faster I/O subsystem, at least for the transaction log file.
    In addition, you could also consider implementing delayed durability, a feature
    introduced with SQL Server 2014.'
