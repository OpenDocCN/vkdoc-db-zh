  trans: '

    ### 转换规则


    如前所述，SQL Server 查询优化器使用**转换规则**来生成替代的执行计划。最终的执行计划将在基数和成本被估算后被选出。转换规则基于关系代数操作。查询优化器将对先前生成的逻辑操作符树应用转换规则，并由此创建额外的等效逻辑和物理替代方案。换句话说，它将接收一个关系操作符树，并生成等效的关系树。


    在优化过程的开始，如我们之前所见，查询树只包含逻辑表达式。一旦应用了转换规则，它们可能会生成额外的逻辑和物理表达式。一个逻辑表达式可以是，例如，SQL 语言中连接的定义，而物理表达式则是在查询优化器选择其中一个物理操作符（如嵌套循环连接、合并连接或哈希连接）时产生。类似地，一个逻辑聚合操作可以通过两种物理算法实现：流聚合和哈希聚合。


    ### 规则分类


    转换规则可分为三种类型：简化规则、探索规则和实现规则。

    -   简化规则主要用于我们之前介绍过的简化阶段，其目的是简化当前的操作逻辑树。

    -   探索规则，也称为逻辑转换规则，用于生成等效的逻辑替代方案。

    -   另一方面，实现规则，也称为物理转换规则，用于生成等效的物理替代方案。


    ### 备忘录结构与成本估算


    在查询优化过程中生成的所有逻辑和物理替代方案都存储在一个名为 `memo` 的内存结构中。但请记住，找出替代方案只是解决了问题的一部分，仍需要选出最佳选择。一个成本估算组件将估算物理操作的成本（无需估算逻辑操作的成本）。即使所有替代计划是等效的并且会产生相同的查询结果，它们的成本也可能有天壤之别。显然，更高的成本意味着消耗更多的资源，如
    CPU、I/O 或内存，从而影响查询性能，因此需要承担选择最佳或最低成本计划的责任。


    最后，请记住，查询优化过程极其复杂，也因此并不完美。例如，对于某个特定查询，由于可能产生数百万甚至数千万个计划，其中许多计划可能被丢弃或根本不予考虑，因此可能根本无法生成最优计划。又或者，完美的计划可能已被生成并存储在
    `memo` 结构中，但由于错误的成本估算选择了另一个计划，导致它根本未被选中。


    ### 检查转换规则


    转换规则的工作方式非常简单。它们接收一个逻辑操作树，并产生一个等效的操作树，如果执行，将返回完全相同的查询结果。由于每个树或计划的性能可能不同，我们努力寻找能找到的最佳计划。查询优化器可用的转换规则可以使用
    `sys.dm_exec_query_transformation_stats` 动态管理视图列出，该视图虽然未完全文档化，但显示了可用规则的名称。在 SQL
    Server 2019 CU4 上运行以下查询将返回 420 条规则：


    ```sql

    SELECT * FROM sys.dm_exec_query_transformation_stats

    ```


    下表是与连接优化相关的前几行示例。


    | name | promise_total |

    | --- | --- |

    | JNtoNL | 721299 |

    | LOJNtoNL | 841440 |

    | LSJNtoNL | 32803 |

    | LASJNtoNL | 26609 |

    | JNtoSM | 1254182 |

    | FOJNtoSM | 5448 |

    | LOJNtoSM | 318398 |

    | ROJNtoSM | 316128 |

    | LSJNtoSM | 9414 |

    | RSJNtoSM | 9414 |

    | LASJNtoSM | 10896 |

    | RASJNtoSM | 10896 |


    SQL Server 文档中关于转换规则或其工作方式的内容不多。但也有一些未文档化的语句，可以让你检查并了解更多关于转换规则和优化过程的信息。


    ### 优化示例：GbAggBeforeJoin 规则


    为了向你展示转换规则如何工作，我将展示一个常见优化的完整示例。我在会议演示中经常展示的一个众所周知的优化是，当查询优化器决定在连接之前下推分组聚合时。执行此优化的转换规则称为
    `GbAggBeforeJoin`（连接前分组聚合）。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig8_HTML.png](img/393702_2_En_1_Fig8_HTML.png)

    *图 1-8：连接前分组聚合优化*


    如图 1-8 所示，假设我们最初拥有左侧的逻辑树，在应用 `GbAggBeforeJoin` 规则后，查询优化器能够生成右侧的逻辑树。这类查询的传统优化方式是先对两个表执行连接，然后使用连接结果执行聚合。然而，在某些情况下，在连接之前执行聚合可能更高效。


    图 1-8 中的两棵树是等效的，如果执行，将产生完全相同的结果。但是，正如到目前为止多次提到的，一棵树或执行计划可能比另一棵更高效，这就是我们进行此优化的原因（也是查询优化器存在的首要原因）。


    现在让我向你展示该优化过程在 SQL Server 上如何工作。让我们为以下查询获取一个执行计划：


    ```sql

    SELECT c.CustomerID, COUNT(*)

    FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

    ON c.CustomerID = o.CustomerID

    GROUP BY c.CustomerID

    ```


    此查询产生图 1-9 中的计划。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig9_HTML.jpg](img/393702_2_En_1_Fig9_HTML.jpg)

    *图 1-9：包含连接前分组聚合优化的计划*


    有几种未文档化的方法可以了解生成此执行计划时考虑了哪些转换规则。其中一种方法，虽然输出非常冗长，是使用未文档化的跟踪标志 2373，如下例所示：


    ```sql

    DBCC TRACEON(3604)

    SELECT c.CustomerID, COUNT(*)

    FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

    ON c.CustomerID = o.CustomerID

    GROUP BY c.CustomerID

    OPTION (RECOMPILE, QUERYTRACEON 2373)

    ```


    虽然此标志的目的是提供有关优化过程的内存信息，但我们将用它来了解在此过程中考虑了哪些转换规则。运行上述查询将在 SQL Server Management
    Studio 的“消息”选项卡上产生大量输出（注意我们使用了跟踪标志 3604 来获取此输出）。我删除了大部分输出，仅包含与优化使用的转换规则相关的信息。

    '
