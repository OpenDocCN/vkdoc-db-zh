    - 在 `www.microsoft.com/en-us/research/publication/an-efficient-cost-driven-index-selection-tool-for-microsoft-sql-server/`
    上的《An Efficient, Cost-Driven Index Selection Tool for Microsoft SQL Server》

    - 在 `www.microsoft.com/en-us/research/publication/self-tuning-database-systems-a-decade-of-progress/`
    上的《Self-Tuning Database Systems: A Decade of Progress》


    DTA 可以分析来自多种不同来源的工作负载：包含查询的文件、包含 SQL 跟踪的文件或表，或者从 SQL Server 2012 开始，可以直接从计划缓存中获取。随着
    SQL Server Management Studio 16.2 的引入，你还可以使用查询存储来选择要调整的工作负载。如第 6 章所建议的，使用查询存储与计划缓存之间的区别在于，前者包含更长的查询历史记录，而计划缓存仅包含最近执行的查询子集。我们稍后将尝试其中一些工作负载源。


    除了推荐聚集索引、非聚集索引、筛选索引以及沿途的统计信息外，DTA 还可以选择推荐索引视图、分区和列存储索引。使用跟踪工作负载选项需要使用 SQL Profiler
    提供的 Tuning 模板捕获跟踪，或者手动使用该模板上定义的事件。


    我们在本章前面尝试了一个简单的练习，依赖于我们对索引工作原理的理解、缺失索引功能以及从执行计划中获取反馈。现在，让我们将相同的查询提供给 DTA，看看我们会得到什么建议。为确保从头开始，你可以删除测试数据库上的当前表，或者删除整个数据库并重新创建。然后运行以下语句来填充这些表：


    ```sql

    SELECT *

    INTO dbo.SalesOrderDetail

    FROM AdventureWorks2017.Sales.SalesOrderDetail

    GO

    SELECT *

    INTO dbo.SalesOrderHeader

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    GO

    ```


    创建要调整的查询文件。复制以下查询并将其保存在文件系统中的一个文件中：


    ```sql

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID, UnitPrice FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    ORDER BY ProductID

    GO

    SELECT ProductID, COUNT(*) FROM SalesOrderDetail

    GROUP BY ProductID

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 870

    GO

    ```


    打开 DTA 并创建一个新会话。在会话的“常规”选项卡上，提供一个会话名称或使用提供的默认名称。指定测试数据库既是要调整的数据库，也是用于工作负载分析的数据库。使用“工作负载”和“文件”选项选择包含要调整的查询的文件。所选选项如图
    9-9 所示。


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig9_HTML.jpg](img/393702_2_En_9_Fig9_HTML.jpg)


    图 9-9 DTA 常规选项卡


    “会话调整选项”包含非常重要的选择。对于本练习，我们将使用原始默认值，如图 9-10 所示。我稍后会解释最重要的部分。


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig10_HTML.jpg](img/393702_2_En_9_Fig10_HTML.jpg)


    图 9-10 DTA 调整选项选项卡


    默认选择将调整时间限制为一小时。接下来的三个选择允许你选择要在数据库中使用的物理设计结构、要使用的分区策略以及要在数据库中保留的物理设计结构。当你做出选择时，页面底部的描述将显示摘要。原始默认选择如下：


    > 数据库引擎调整顾问将推荐聚集索引和非聚集索引以提高工作负载的性能。将不考虑分区策略。新推荐的结构将是非分区的。所有现有结构在调整过程结束时将在数据库中保持完整。


    某些选择的组合可能是无效的，相反，你将收到消息“你选择的调整选项集无效”，并附有其无效的原因说明。在提供正确的选择之前，你将无法继续。


    **注意**


    DTA 会记住你选择的调整选项，这些选项将被视为任何未来会话的新默认值，直到再次更改。'
- fmt: 'Click `Start Analysis` from the toolbar. Although the time scheduled is up
    to one hour, the analysis for this exercise should be completed in just a few
    minutes. The `Progress` tab will be displayed, or you can select it to see the
    progress of the tuning process. After the analysis is completed, you can look
    at the recommendations by using the `Recommendations` tab or take a look at the
    tuning summary and reports using the `Reports` tab. Part of the `Recommendations`
    tab, which is too large to fit in this book, is shown in Figure 9-11.


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig11_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig11_HTML.jpg)


    ### Figure 9-11

    #### DTA Recommendations tab


    The `Recommendations` tab shows information such as the recommended objects to
    be created or dropped along with the required code to perform such operation.
    The `Target of Recommendation` column shows the objects to be, in this case, created
    where statistics start with `_dta_stat`, indexes start with `_dta_index`, and
    views with `_dta_mv` prefixes. The last column of the Recommendations tab shows
    the `Definition` column, which is clickable and would show the code to create
    the recommended objects. This is the code for the four recommended objects in
    this exercise. (Code is shown as provided, so it does not follow the style and
    format as the rest of the book.)


    ```sql

    CREATE STATISTICS [_dta_stat_565577053_1_5] ON [dbo].[SalesOrderDetail]([SalesOrderID],
    [ProductID])

    CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderDetail_9_565577053__K5_1_2] ON
    [dbo].[SalesOrderDetail]

    (

    [ProductID] ASC

    )

    INCLUDE ([SalesOrderID],

    [SalesOrderDetailID]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE
    = OFF) ON [PRIMARY]

    SET ANSI_PADDING ON

    CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderDetail_9_565577053__K5_K1_2_3_4_6_7_8_9_10_11]
    ON [dbo].[SalesOrderDetail]

    (

    [ProductID] ASC,

    [SalesOrderID] ASC

    )

    INCLUDE ([SalesOrderDetailID],

    [CarrierTrackingNumber],

    [OrderQty],

    [SpecialOfferID],

    [UnitPrice],

    [UnitPriceDiscount],

    [LineTotal],

    [rowguid],

    [ModifiedDate]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE = OFF)
    ON [PRIMARY]

    CREATE CLUSTERED INDEX [_dta_index_SalesOrderHeader_c_9_581577110__K1] ON [dbo].[SalesOrderHeader]

    (

    [SalesOrderID] ASC

    )WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE = OFF) ON [PRIMARY]

    ```


    Let’s do a quick analysis of the recommendations. We see a slight variation in
    the recommendations compared to what we got in the earlier exercise with missing
    indexes mostly due to the fact that we knew the `SalesOrderHeader` and `SalesOrderDetail`
    are master-detail tables, and we decided to create clustered indexes on it up
    front. As we discussed, the missing indexes feature does not have the capability
    to suggest clustered indexes. This exercise showed that, by just using the defaults,
    we got recommendations on clustered indexes, nonclustered indexes, and statistics.


    As expected, the recommended clustered index on the `SalesOrderHeader table` is
    the result of our supplied range query (the one with the `WHERE SalesOrderID BETWEEN
    50000 AND 70000` predicate). We also got recommended a couple of nonclustered
    indexes and a multicolumn statistics object. These recommendations could be a
    good choice, but it does not match our previous exercise as we manually created
    a clustered index on `SalesOrderDetail`, which was part of the original design
    for these master-detail tables. There is no recommended clustered index for `SalesOrderDetail`
    as we didn’t supply any range query either. Obviously, the DTA cannot recommend
    on something it does not know, so it is important to feed them all the important
    queries. It is also interesting to note that the DTA recommended a multicolumn
    statistic on `SalesOrderID` and `ProductID`. Multicolumn statistics are never
    created automatically by SQL Server.


    As you can see, even for this simple exercise, it may take you some time to analyze,
    evaluate, and verify the provided recommendations on a test environment, but this
    is something that we definitely have to do before deploying it to a production
    instance. I cannot emphasize enough that we don’t want to implement these recommendations
    blindly.


    The `Reports` tab shows a large amount of interesting information about the tuning
    process including a summary with the tuning information plus 15 different reports.
    All the information presented in the DTA is stored in the `msdb` database, so
    you may want to take a look at it if you have some special needs. The information
    is stored on the `DTA_` tables and will be kept there until you delete the DTA
    session.


    Finally, as covered earlier, two very useful DTA features introduced in the latest
    releases of the product are that you can now use the plan cache and the Query
    Store as the source for the workload to analyze, so you don’t need to collect
    any data at all. This makes a lot of sense as it is very likely that your most
    expensive queries can be found there, as we showed you with the `sys.dm_exec_query_stats`
    DMV in Chapter 8 or the Query Store in Chapter 6.


    Let’s take a look at these features with the following exercise. To simulate a
    real workload in the plan cache, you can run our test queries in SQL Server Management
    Studio preceded by the `DBCC FREEPROCCACHE` statement, which is used to clear
    the existing plan cache, as shown next:


    ```sql

    DBCC FREEPROCCACHE

    GO

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID, UnitPrice FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    ORDER BY ProductID

    GO

    SELECT ProductID, COUNT(*) FROM SalesOrderDetail

    GROUP BY ProductID

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 870

    GO

    ```


    After the queries are executed, most likely they will be in the plan cache, and
    then you can create a DTA session selecting `Plan Cache` as a workload. When you
    are tuning the plan cache, you are not explicitly submitting queries. Therefore,
    it is more important to look at the reports at the end of your tuning session
    (e.g., the `Statement detail` report) to learn about what kinds of queries were
    tuned. You can find these on the `Reports` tab as indicated earlier. In my case,
    I got the same recommendations as with the file exercise earlier, but just a reminder
    that when you are tuning the plan cache, you may have less control about which
    queries to tune.


    Curious to see how the DTA decides which queries from the plan cache to tune?
    You can just take a look at the queries the DTA submits to the database engine
    by using either SQL trace or extended events. This is what I got on my test, which
    shows the DTA submits the following query to find out the 1000 most expensive
    queries based on duration:


    ```sql

    select top 1000 isnull(st.objectid,0),

    isnull(st.dbid,0), avg(cp.execution_count), st.text

    from sys.dm_exec_query_stats cp

    cross apply sys.dm_exec_sql_text(cp.plan_handle) st

    where cp.creation_time < N''2016-08-08 03:47:06.273'' and st.dbid in (9)

    group by st.text,st.objectid,st.dbid

    order by sum(total_elapsed_time) desc

    ```


    You can follow exactly the same exercise to instead use the `Query Store`; just
    make sure this component is enabled and configured. For details on how to do this,
    you can refer to Chapter 6.'
