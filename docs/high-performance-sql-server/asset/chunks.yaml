    is a picture of the screen of this first boot, as later posted by Slava in a blog
    titled “SQL Server on Linux, aka project Helsinki: Story behind the idea,” which
    you can still find at [`https://docs.microsoft.com/en-us/archive/blogs/slavao/sql-server-on-linux-aka-project-helsinki-story-behind-the-idea`](https://docs.microsoft.com/en-us/archive/blogs/slavao/sql-server-on-linux-aka-project-helsinki-story-behind-the-idea).


    It is obvious to note that making SQL Server run on Linux was not only just a
    matter of running SQL Server on Drawbridge and fixing a few bugs. A Platform Abstraction
    Layer (PAL) was still needed to abstract the calls and libraries from the underlying
    operating system. Although SQLOS was not able to provide all the abstraction required,
    using it for the project was still a huge benefit. But using Drawbridge LibOS
    along with pieces of SQLOS provided the required solution. By combining these
    technologies, SQLPAL was born.'
  trans: '

    ## Drawbridge


    Drawbridge 是一个微软研究项目，旨在基于 Windows 的库操作系统版本，为应用沙盒化提供一种新的虚拟化形式。尽管虚拟化技术多年来已极为流行，但其存在的一个问题在于需要运行整个操作系统实例和大量服务，因此显得非常**沉重**。研究致力于构建仅包含所需资源的、更轻量级的虚拟机版本。


    Drawbridge 的主要目的是大幅降低在同一硬件上托管多个虚拟机时的虚拟化资源开销，在某种程度上，这类似于 Docker 后来所实现的目标。根据微软的说法，Drawbridge
    为容器技术提供了宝贵的见解。Docker 于 2013 年 3 月作为开源项目发布，而 Drawbridge 项目则早两年完成。


    Drawbridge 项目的最初目的是在 Azure 中托管小型应用程序。为此，Drawbridge 将 Windows 内核提取出来，在用户模式下运行，以创建一个能够运行
    Windows 应用程序的高密度容器。换句话说，Drawbridge 实际上是将整个 Windows 操作系统置于用户模式下运行。之后，团队开始测试在其他操作系统中运行
    Drawbridge。这使他们能够利用这种技术作为容器，在不同平台上运行 Windows 应用程序。Linux 是经过测试的操作系统之一。


    Drawbridge 包含两个主要组件：一个称为 `picoprocess` 的进程和一个库操作系统，有时被称为 `LibOS`，如图 2-1 所示。库操作系统是一个
    Windows 用户模式库，它使得 Drawbridge 能够在指定的主机上运行 Windows 程序。该库实现了 `Win32` 和 `Windows NT`
    调用的很大一部分子集，同样如图 2-1 所示。


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig1_HTML.jpg](img/393702_2_En_2_Fig1_HTML.jpg)

    图 2-1：Drawbridge Windows 库操作系统


    库操作系统实现了超过 1500 个 Windows 调用，并且由于它也实现了 `Win32` 和 `Windows NT` 层的一部分，SQL Server
    团队能够托管 `MSXML`、`SQLCLR` 以及其他 SQL Server 组件所需的 API。通过使用库操作系统，该团队无需重写像 `MSXML` 或
    `SQLCLR` 这样的完整功能。SQL Server on Linux 项目并不需要 `picoprocess` 组件。


    **注意：** 您可以在微软研究页面 [`www.microsoft.com/en-us/research/project/drawbridge/`](http://www.microsoft.com/en-us/research/project/drawbridge/)
    上找到关于 Drawbridge 项目的更多信息，以及在 [`www.microsoft.com/en-us/research/publication/rethinking-the-library-os-from-the-top-down/`](http://www.microsoft.com/en-us/research/publication/rethinking-the-library-os-from-the-top-down/)
    上找到《从顶向下重新思考库操作系统》一文。


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig2_HTML.jpg](img/393702_2_En_2_Fig2_HTML.jpg)

    图 2-2：SQL Server 在 Linux 上的首次启动


    曾参与原始 Drawbridge 项目的 Andrew Baumann 已经完成了 Drawbridge 的移植，并拥有了在 Linux 上运行的 Drawbridge
    原型。得益于这个原型，团队在不到一个月的时间内，即 2015 年 2 月底，就实现了 SQL Server 在 Linux 上的启动和运行。图 2-2 是这次首次启动的屏幕截图，后来由
    Slava 在一篇题为《SQL Server on Linux, aka project Helsinki: Story behind the idea》的博客中发布，您仍可在
    [`https://docs.microsoft.com/en-us/archive/blogs/slavao/sql-server-on-linux-aka-project-helsinki-story-behind-the-idea`](https://docs.microsoft.com/en-us/archive/blogs/slavao/sql-server-on-linux-aka-project-helsinki-story-behind-the-idea)
    找到。


    显而易见的是，让 SQL Server 在 Linux 上运行并非仅仅是将其运行在 Drawbridge 上并修复几个错误那么简单。仍然需要一个平台抽象层
    (`PAL`) 来抽象底层操作系统的调用和库。尽管 `SQLOS` 无法提供所需的全部抽象，但将其用于该项目仍然大有裨益。不过，结合使用 Drawbridge
    的 `LibOS` 和 `SQLOS` 的部分组件，提供了所需的解决方案。通过结合这些技术，`SQLPAL` 应运而生。

    '
- fmt: '## SQLPAL


    将 `SQLOS` 与 `Drawbridge LibOS` 结合，发展成 `SQLPAL` 是完美的解决方案。除了 `SQLOS` 和 `Drawbridge
    LibOS`，还需要一个新的层来帮助 `SQLPAL` 与操作系统交互。这个被称为 `host extension` 的层被添加到 `SQLOS` 底部，将
    `SQLPAL` 内部的调用映射到操作系统调用。`SQLPAL` 允许绕过 `Windows` 库，通过直接调用 `SQLPAL` 来获得相同的功能。


    即使在项目的这个阶段，如你从图 [2-3](#393702_2_En_2_Chapter.xhtml#Fig3) 所见，`SQLOS`、`Drawbridge
    library OS` 和 `host extension` 提供的选项之间存在一些服务重复。一些不需要或重复的功能将需要被移除。合并重复的功能也将需要进行更改。


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig3_HTML.jpg](images/393702_2_En_2_Chapter/393702_2_En_2_Fig3_HTML.jpg)


    图 2-3


    赫尔辛基项目功能重叠


    `SQL Server` 团队决定保留 `SQLOS` 核心作为主要组件（有时称为 `SOSv2`），并使用 `Drawbridge library OS`
    和 `Linux host extension` 的部分功能。最终形成的 `SQL Server on Linux` 系统架构如图 [2-4](#393702_2_En_2_Chapter.xhtml#Fig4)
    所示。所有 `SQL Server` 代码，包括 `SQLPAL`，都是为 `Windows` 编译的。`host extension` 是一个原生的 `Linux`
    应用程序，为 `Linux` 编译。


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig4_HTML.jpg](images/393702_2_En_2_Chapter/393702_2_En_2_Fig4_HTML.jpg)


    图 2-4


    `SQL Server on Linux` 架构


    与 `Windows` 平台上的 `SQL Server` 不同，单个 `Linux` 进程同时托管 `SQL Server` 数据库引擎和 `SQL Server
    Agent`。此外，每个服务器只能运行一个 `SQL Server` 实例，称为默认实例；目前还不支持命名实例。


    最后，值得一提的是，`SQL Server on Linux` 几乎包含了 `SQL Server for Windows` 的所有功能，包括 `SQL Server
    2017` 和 `SQL Server 2019`。在未包含的功能中，我们有事务复制和快照复制（从 `SQL Server 2017 Cumulative
    Update 18` 开始可用）、合并复制、带有第三方连接的分布式查询、具有 `EXTERNAL_ACCESS` 或 `UNSAFE` 权限集的 `CLR`
    程序集、`Polybase`（不适用于 `SQL Server 2017`）、`Stretch DB`、系统扩展存储过程、文件表、数据库镜像和缓冲池扩展。


    此外，一些服务如 `SQL Server Browser Service`、`SQL Server Analysis Services`、`SQL Server
    Reporting Services`、`SQL Server R Services`、`StreamInsight`、`Data Quality Services`
    和 `Master Data Services` 尚未在任何版本的 `SQL Server on Linux` 中提供。


    有关 `SQL Server on Linux` 上可用功能的完整列表，请参阅文档中的以下条目：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253Fview%253Dsql-server-ver15)。有关不可用功能的完整列表，您可以查看以下链接：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?view=sql-server-ver15#Unsupported`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253Fview%253Dsql-server-ver15%2523Unsupported)。请记住，这些链接是针对
    `SQL Server 2019` 的，但如果您仍然需要使用 `SQL Server 2017`，也可以轻松导航到相关的 `SQL Server 2017`
    文章。当前不可用的功能可能会在未来的版本中包含。


    ## 总结


    在本章中，我们介绍了适用于 `Linux` 平台的 `SQL Server`，其内容适用于该产品的最新版本，即 `SQL Server 2017` 和 `2019`。第
    [3](#393702_2_En_3_Chapter.xhtml) 章将是唯一一章仅涵盖与 `Linux` 版本相关的功能。本书的其余部分将主要适用于所有支持的
    `SQL Server` 版本。


    将 `SQL Server` 引入 `Linux` 的成功主要依赖于 `SQLOS` 和 `Drawbridge` 项目。`SQLOS` 是为 `SQL Server
    2005` 版本构建的，但它从未旨在提供平台独立性或可移植性。虽然 `SQLOS` 无法提供所需的所有抽象层，但它使将 `SQL Server` 移植到 `Linux`
    变得容易得多。实现 `Drawbridge library OS` 结合 `SQLOS` 的部分提供了所需的解决方案。通过结合这些技术，`SQLPAL` 应运而生。


    `SQL Server` 最终可用于 `Red Hat Enterprise Linux`、`SUSE Linux Enterprise Server`、`Ubuntu`
    和 `Docker`。


    ## 第二部分 设计与配置


    ## 3. SQL Server 配置


    正确配置 `SQL Server` 对于数据库和应用程序的性能至关重要。尽管该产品经过多年更新以确保其默认配置尽可能最佳，但仍然存在许多情况，特别是对于高性能工作负载，可能需要额外的配置和优化。


    那么，`SQL Server` 是如何配置的呢？有多个级别和方法来配置 `SQL Server`。例如，在实例、数据库甚至表或对象级别都有一些配置选项。执行实例级别配置的传统且最常见的方法是使用
    `sp_configure` 存储过程，它显示至少 70 个实例级别配置选项，这些选项在 `sys.configurations` 目录视图中也可见。还有一些操作系统配置选项直接或间接影响
    `SQL Server`。跟踪标志也用于配置 `SQL Server` 中的某些项目，它们可以在实例、数据库或其他级别工作。跟踪标志是改变 `SQL Server`
    中特定行为的一种方法，并且根据定义，从来不是一种永久配置选择。


    您可能会问，如果这些选择是最佳实践、建议或指南，为什么我们必须在任何新实例上一直启用它们，以及为什么它们不是由 `SQL Server` 默认启用的。现实情况是，一些配置选项最初设计为默认启用（例如自动创建和自动更新统计信息选项），而另一些选项随着时间的推移成为最佳实践，并最终成为
    `SQL Server` 中的默认选项。其他一些配置建议将取决于特定的工作负载，因此不会默认在每次安装中启用。


    与往常一样，当产品的新版本更改了默认值时，`SQL Server` 提供了将此默认值更改回原始行为的方法，以最大程度地减少回归或您的应用程序可能对先前行为存在的某些其他依赖性而导致性能问题。


    本章讨论的配置选择并非旨在全面，而是我主要选择了主要影响性能的选项（大多在实例级别），并重点关注 `SQL Server 2017` 和 `SQL Server
    2019` 中的新功能。为了更好的可管理性、可维护性或可恢复性而进行的一些配置选择也可能包括在内。在列举了许多可能的选择之后，好消息是通常默认配置值对于大多数
    `SQL Server` 实例来说是一个不错的选择，或者至少是一个良好的起点。


    有趣的是，最初作为跟踪标志 `2371`、`1117` 和 `1118` 开始的行为，从 `SQL Server 2016` 开始现在默认启用。让我们从本章开始讨论所有这些变化。第
    [4](#393702_2_En_4_Chapter.xhtml) 章将更详细地介绍跟踪标志 `1117` 和 `1118`。'
  raw: '## SQLPAL


    Growing SQLOS into a SQLPAL by marrying it with Drawbridge LibOS was the perfect
    solution. In addition to SQLOS and Drawbridge LibOS, a new layer was required
    to help SQLPAL to interact with the operating system. This layer, which was called
    host extension, was added at the bottom of SQLOS to map calls from inside SQLPAL
    into operating system calls. SQLPAL would allow to bypass the Windows libraries
    and get the same functionality calling directly into the SQLPAL.


    Even at this point in the project, as you can see from Figure [2-3](#393702_2_En_2_Chapter.xhtml#Fig3),
    there was some duplication of services between the choices provided by SQLOS,
    the Drawbridge library OS, and host extension. Some unneeded or duplicated features
    would have to be removed. Merging duplicated features would require changes as
    well.


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig3_HTML.jpg](images/393702_2_En_2_Chapter/393702_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Helsinki project functionality overlap


    The SQL Server team decided to keep the SQLOS core as the main component, sometimes
    called SOSv2, and use some parts of both the Drawbridge library OS and the Linux
    host extension. The resulting SQL Server on Linux system architecture is depicted
    in Figure [2-4](#393702_2_En_2_Chapter.xhtml#Fig4). All SQL Server code, including
    SQLPAL, is compiled for Windows. The host extension is a native Linux application,
    compiled for Linux .


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig4_HTML.jpg](images/393702_2_En_2_Chapter/393702_2_En_2_Fig4_HTML.jpg)


    Figure 2-4


    SQL Server on Linux architecture


    Different than SQL Server on the Windows platform, a single Linux process hosts
    both the SQL Server database engine and SQL Server Agent. Also, only a single
    SQL Server instance can be run per server, called a default instance; named instances
    are not supported yet.


    Finally, it is worth mentioning that SQL Server on Linux includes almost all the
    features of SQL Server for Windows, including both SQL Server 2017 and SQL Server
    2019\. Among the features not included, we have transactional and snapshot replication
    (available starting with SQL Server 2017 Cumulative Update 18), merge replication,
    distributed query with third-party connections, CLR assemblies with the EXTERNAL_ACCESS
    or UNSAFE permission set, Polybase (not available for SQL Server 2017), Stretch
    DB, system extended stored procedures, file tables, database mirroring, and buffer
    pool extension.


    In addition, some services such as SQL Server Browser Service, SQL Server Analysis
    Services, SQL Server Reporting Services, SQL Server R Services, StreamInsight,
    Data Quality Services, and Master Data Services are not yet available for any
    release of SQL Server on Linux.


    For a complete list of features available on SQL Server on Linux, see the following
    entry on the documentation: [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253Fview%253Dsql-server-ver15).
    For a complete list of features not available, you can look at the following link:
    [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?view=sql-server-ver15#Unsupported`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253Fview%253Dsql-server-ver15%2523Unsupported).
    Keep in mind these links are for SQL Server 2019, but you could easily navigate
    to the related SQL Server 2017 articles as well, in case you still need to use
    this version. Features currently not available may be included in a future release
    .


    ## Summary


    In this chapter, we covered SQL Server for the Linux platform and its content
    applies to the latest releases of the product, SQL Server 2017 and 2019\. Chapter
    [3](#393702_2_En_3_Chapter.xhtml) will be the only other chapter covering features
    only relevant to the Linux version. The rest of the book would apply mostly to
    every SQL Server supported version.


    The success of taking SQL Server to Linux would rely mostly on SQLOS and the Drawbridge
    project. SQLOS was built for the SQL Server 2005 release, but it was never intended
    to provide platform independence or portability. Although SQLOS was not able to
    provide all the abstraction required, it helped make taking SQL Server to Linux
    much easier. Implementing the Drawbridge library OS along with pieces of SQLOS
    provided the required solution. By combining these technologies, SQLPAL was born.


    SQL Server was finally made available for Red Hat Enterprise Linux, SUSE Linux
    Enterprise Server, Ubuntu, and Docker.


    # Part IIDesign and Configuration


    # 3. SQL Server Configuration


    Properly configuring SQL Server is of paramount importance for the performance
    of your databases and applications. Even when the product has been updated throughout
    the years to ensure it has the best possible configuration by default, there are
    still multiple cases, especially for high performance workloads, in which additional
    configurations and optimizations may be required.


    So, how is SQL Server configured? There are several levels and methods of configuring
    SQL Server. For example, there are some configuration options at the instance,
    the database, or even at the table or object level. The traditional and most common
    method to perform instance-level configuration is using the `sp_configure` stored
    procedure, which shows at least 70 instance-level configuration options, also
    visible on the `sys.configurations` catalog view. There are some operating system
    configuration options that directly or indirectly impact SQL Server as well. Trace
    flags are also used to configure some items in SQL Server, and they may work at
    the instance, database, or other levels. A trace flag is a method to change a
    specific behavior in SQL Server and, by definition, was never meant to be a permanent
    configuration choice.


    You may be asking, if these choices are best practices, recommendations, or guidelines,
    why do we have to enable them on any new instance all the time and why they are
    not enabled by default by SQL Server. The reality is some configuration options
    were originally designed to be enabled by default (like the auto-create and auto-update
    statistics options), while others over time became best practices and eventually
    default options in SQL Server. Some other configuration recommendations will depend
    on a specific workload and therefore are not enabled by default on every installation.


    As usual, when the defaults are changed in a new version of a product, SQL Server
    provides methods to change this default back to the original behavior to minimize
    performance problems in case of regressions or some other dependencies your application
    may have had on a previous behavior.


    The configuration choices discussed in this chapter are not intended to be comprehensive,
    but rather I have chosen the ones primarily impacting performance, mostly at the
    instance level, with some focus on what is new in both SQL Server 2017 and SQL
    Server 2019\. Some configuration choices for better administration, manageability,
    or recoverability may be included as well. After many possible choices, the good
    news is that usually the default configuration values are a good choice for most
    SQL Server instances or at least a good starting point.


    Interestingly enough, the behavior that originally started as trace flags 2371,
    1117, and 1118 is now enabled by default, starting with SQL Server 2016\. Let’s
    start the chapter discussing all those changes. Chapter [4](#393702_2_En_4_Chapter.xhtml)
    will cover trace flags 1117 and 1118 in greater detail.'
  trans: '## SQLPAL


    将 `SQLOS` 与 `Drawbridge LibOS` 结合，发展成 `SQLPAL` 是完美的解决方案。除了 `SQLOS` 和 `Drawbridge
    LibOS`，还需要一个新的层来帮助 `SQLPAL` 与操作系统交互。这个被称为 `host extension` 的层被添加到 `SQLOS` 底部，将
    `SQLPAL` 内部的调用映射到操作系统调用。`SQLPAL` 允许绕过 `Windows` 库，通过直接调用 `SQLPAL` 来获得相同的功能。


    即使在项目的这个阶段，如你从图 2-3 所见，`SQLOS`、`Drawbridge library OS` 和 `host extension` 提供的选项之间存在一些服务重复。一些不需要或重复的功能将需要被移除。合并重复的功能也将需要进行更改。


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig3_HTML.jpg](img/393702_2_En_2_Fig3_HTML.jpg)


    图 2-3


    赫尔辛基项目功能重叠


    `SQL Server` 团队决定保留 `SQLOS` 核心作为主要组件（有时称为 `SOSv2`），并使用 `Drawbridge library OS`
    和 `Linux host extension` 的部分功能。最终形成的 `SQL Server on Linux` 系统架构如图 2-4 所示。所有 `SQL
    Server` 代码，包括 `SQLPAL`，都是为 `Windows` 编译的。`host extension` 是一个原生的 `Linux` 应用程序，为
    `Linux` 编译。


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig4_HTML.jpg](img/393702_2_En_2_Fig4_HTML.jpg)


    图 2-4


    `SQL Server on Linux` 架构


    与 `Windows` 平台上的 `SQL Server` 不同，单个 `Linux` 进程同时托管 `SQL Server` 数据库引擎和 `SQL Server
    Agent`。此外，每个服务器只能运行一个 `SQL Server` 实例，称为默认实例；目前还不支持命名实例。


    最后，值得一提的是，`SQL Server on Linux` 几乎包含了 `SQL Server for Windows` 的所有功能，包括 `SQL Server
    2017` 和 `SQL Server 2019`。在未包含的功能中，我们有事务复制和快照复制（从 `SQL Server 2017 Cumulative
    Update 18` 开始可用）、合并复制、带有第三方连接的分布式查询、具有 `EXTERNAL_ACCESS` 或 `UNSAFE` 权限集的 `CLR`
    程序集、`Polybase`（不适用于 `SQL Server 2017`）、`Stretch DB`、系统扩展存储过程、文件表、数据库镜像和缓冲池扩展。


    此外，一些服务如 `SQL Server Browser Service`、`SQL Server Analysis Services`、`SQL Server
    Reporting Services`、`SQL Server R Services`、`StreamInsight`、`Data Quality Services`
    和 `Master Data Services` 尚未在任何版本的 `SQL Server on Linux` 中提供。


    有关 `SQL Server on Linux` 上可用功能的完整列表，请参阅文档中的以下条目：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253Fview%253Dsql-server-ver15)。有关不可用功能的完整列表，您可以查看以下链接：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?view=sql-server-ver15#Unsupported`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253Fview%253Dsql-server-ver15%2523Unsupported)。请记住，这些链接是针对
    `SQL Server 2019` 的，但如果您仍然需要使用 `SQL Server 2017`，也可以轻松导航到相关的 `SQL Server 2017`
    文章。当前不可用的功能可能会在未来的版本中包含。


    ## 总结


    在本章中，我们介绍了适用于 `Linux` 平台的 `SQL Server`，其内容适用于该产品的最新版本，即 `SQL Server 2017` 和 `2019`。第
    3 章将是唯一一章仅涵盖与 `Linux` 版本相关的功能。本书的其余部分将主要适用于所有支持的 `SQL Server` 版本。


    将 `SQL Server` 引入 `Linux` 的成功主要依赖于 `SQLOS` 和 `Drawbridge` 项目。`SQLOS` 是为 `SQL Server
    2005` 版本构建的，但它从未旨在提供平台独立性或可移植性。虽然 `SQLOS` 无法提供所需的所有抽象层，但它使将 `SQL Server` 移植到 `Linux`
    变得容易得多。实现 `Drawbridge library OS` 结合 `SQLOS` 的部分提供了所需的解决方案。通过结合这些技术，`SQLPAL` 应运而生。


    `SQL Server` 最终可用于 `Red Hat Enterprise Linux`、`SUSE Linux Enterprise Server`、`Ubuntu`
    和 `Docker`。


