    TRANSACTION ISOLATION LEVEL = SNAPSHOT,

    LANGUAGE = ''us_english'')

    SELECT SalesOrderID, OrderDate, CustomerID

    FROM dbo.SalesOrderHeader

    END

    ```


    An example of its execution follows:


