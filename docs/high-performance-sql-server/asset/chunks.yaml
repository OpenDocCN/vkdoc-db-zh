  trans: '

    # 跟踪标志 1117 和 1118


    由于 SQL Server 使用 SGAM 页面来查找至少有一个未使用页面的混合区，解决 SGAM 争用问题的一个可能方法是完全避免混合区，改为专门使用统一区。自
    SQL Server 2000 起，`跟踪标志 1118` 就可用于实现此目的。通过禁用大多数单页分配并改用专用区，可以减少 SGAM 页面上的争用。使用
    `跟踪标志 1118` 的一个缺点是，每个对象都将使用一个专用区，这需要八个页面。如果对象小到只能容纳一个页面，这实际上是在浪费空间。也就是说，如果对象只需要
    8 KB 的空间，它将不得不使用 64 KB，从而浪费 56 KB 的存储空间。另一个缺点是，此配置在实例级别生效，同样会影响用户数据库。SGAM 页面仍将被使用，因为
    IAM 页面仍需要从混合区进行单页分配，但 SGAM 争用很可能会被消除或大幅最小化。


    `跟踪标志 1117` 与 SQL Server 在启用文件组中所有文件的均匀增长时如何增加数据库文件的大小有关。此讨论需要先介绍三个要点：


    1.  不要依赖自动增长。

    2.  配置数据库即时文件初始化。

    3.  创建大小相等的数据文件。


    不要依赖默认的自动增长配置，但应启用它并配置合适的文件增长参数，以便将其作为最后的手段。生产环境很可能有一个专用的驱动器用于 `tempdb`，如果不是为数据文件和事务日志文件分别准备专用驱动器的话。如果你处于这种情况，只需为
    `tempdb` 文件分配尽可能多的空间。这将有助于避免在生产操作期间增长数据库文件，从而导致不必要的开销。同时，它将最大限度地减少碎片。


    配置数据库即时文件初始化，这在第 3 章中有详细介绍，并在下一节中简要描述。


    创建大小相等的数据文件。SQL Server 使用一种称为比例填充算法的机制，该算法会考虑数据库文件的当前大小（至少在文件组级别）。此算法决定了文件被使用和写入的顺序。它试图以轮询方式将分配分散到各个页面上。当文件大小不相同时，会存在一个不幸的行为：它不会在数据库的所有数据文件之间均匀分散
    GAM 分配，而是会倾向于最大的文件。因此，确保所有数据文件大小相同至关重要。


    `跟踪标志 1117` 通过按配置的增量同时增长所有 `tempdb` 文件来帮助你避免此问题。然而，与 `跟踪标志 1118` 的情况类似，`跟踪标志 1117`
    适用于整个 SQL Server 实例，在用户数据库上作用于文件组级别。你可能需要检查此设置，因为它可能会对用户数据库上的文件组造成问题。


    正如我们将在下一节看到的，`跟踪标志 1117` 和 `1118` 的行为现在可以在数据库级别进行配置。


    # SQL Server 2016 增强功能


    SQL Server 2016 针对 `tempdb` 引入了几项重要的增强功能，因此我们在本节中讨论它们。如本章引言所述，之前的某些 `tempdb` 建议现在在
    SQL Server 2016 中默认配置或启用。让我们从 SQL Server 安装过程开始。


    在 SQL Server 安装过程中的一个屏幕（如前一章图 3-3 所示），现在允许你选择授予 SQL Server 数据库引擎服务帐户“执行卷维护任务”特权，从而自动启用即时文件初始化。在早期版本的
    SQL Server 中，这是一个必须与 SQL Server 安装或配置过程分开进行配置的选项。


    默认情况下，当创建或还原数据库（或添加、扩展或还原文件）时，文件首先通过填充零来初始化。在某些情况下，根据文件大小，这可能非常耗时。通过启用即时文件初始化，SQL
    Server 会跳过文件清零过程，使该过程几乎是瞬间完成的。跳过此过程的唯一缺点，正如图 3 中提到的安装屏幕所警告的那样，是避免清零数据页“可能导致信息泄露，因为它可能允许未经授权的主体访问已删除的内容”。有关即时文件初始化功能的更多详细信息，请参阅第
    3 章。


    在安装过程的后期，SQL Server 允许你配置 `tempdb`。与早期版本的 SQL Server 不同，安装过程现在建议数据文件的数量与系统中可用的逻辑处理器数量相同，最多为八个。如果你不采取任何操作，这将是默认配置，如图
    4-2 所示。


