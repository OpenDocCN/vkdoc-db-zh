- fmt: '### Diskspd


    The Diskspd or Diskspeed utility is a command-line storage testing tool that replaces
    sqlio, a popular tool SQL Server professionals have been using for years but is
    no longer available to download. Diskspd’s main focus is performance testing,
    although accuracy is an important part as well as the tool verifies that the data
    was correctly read and written. Different from SQLIOSim, which uses a minimal
    number of parameters and automatically tests all common SQL Server storage access
    patterns, Diskspd knows nothing about SQL Server storage usage, and it is up to
    you to use the right parameters to simulate a proper test.


    Diskspd can be used on all kinds of storage, such as local disks, LUNs on a SAN,
    or SMB file shares, and, like SQLIOSim, does not require a SQL Server installation.
    Diskspd can be downloaded at [`https://gallery.technet.microsoft.com/DiskSpd-a-robust-storage-6cd2f223`](https://gallery.technet.microsoft.com/DiskSpd-a-robust-storage-6cd2f223),
    and, since it is currently open sourced, its C++ source code is provided as well
    at [`https://github.com/microsoft/diskspd`](https://github.com/microsoft/diskspd).


    If you have ever used sqlio before, Diskspd should be very simple and straightforward
    to use as it works in a very similar way. If you are new to any of these utilities,
    it may take a while to learn how to use it to simulate specific SQL Server I/O
    patterns.


    Diskspd includes its own documentation, which is available with the software download,
    and in addition includes documentation about guidance on using Diskspd to simulate
    SQL Server workloads. The document, called “Using DiskSpd in SQL Server environments,”
    contains information about the typical read and write patterns used in SQL Server
    for different operations like normal activity, checkpoints, lazy writer, bulk
    insert, backup, restore, `DBCC CHECKDB`, index rebuilds, read-aheads on data files,
    or normal activity on log files. For example, the normal activity in SQL Server
    reads and writes from 8 KB up to 128 KB of data, read-ahead uses up to 512 KB,
    or a checkpoint can write from 64 KB up to 128 KB. The document also includes
    information about the number of threads used and if the I/O pattern is random
    or sequential. You can use this tool to help simulate those SQL Server I/O patterns
    in Diskspd. Please refer to the document for additional details.


    Let’s create an exercise opening a command prompt window running as administrator
    and execute the following:


    `diskspd -c1024M -d120 -r -w0 -t8 -o8 -b8K -L test.dat`


    The meaning of the chosen parameters is the following:


    - `-c1024M`: Creates a 1,024 MB file

    - `-d120`: Duration of the test, in this case 120 seconds

    - `-r`: Random I/O

    - `-w0`: Percentage of write requests, 0, in this case because it is a read-only
    workload

    - `-t8`: Number of threads

    - `-o8`: Number of outstanding I/O requests per thread

    - `-b8K`: Block size

    - `-L`: Measures latency statistics

    - `test.dat`: File to create for test


    Optionally, you can use the output parameter to have more control of the outputted
    data instead of just looking at it in the command prompt window. After the test
    is completed, information similar to the following will be shown. The first section
    will show a summary of the parameters used. The second will show a per-processor
    CPU utilization summary, as shown next:


    ```

    CPU |  Usage |  User  |  Kernel |  Idle

    0|  21.38%|  14.66%|    6.72%|  78.62%

    1|  22.47%|  15.53%|    6.94%|  77.53%

    2|  19.36%|  14.52%|    4.84%|  80.64%

    3|  23.29%|  17.40%|    5.90%|  76.71%

    avg.|  21.63%|  15.53%|    6.10%|  78.37%

    ```


    The following three sections show read I/Os, write I/Os, and total I/Os. Since
    I requested only reads, write I/Os will show 0, and read I/Os and total I/Os will
    be the same. A small sample is next:


    ```

    Read IO

    thread | bytes    | I/Os  | MB/s | I/O per s | AvgLat  | LatStdDev | file

    0 | 16072704 | 1962  | 0.13 | 16.35     | 489.401 | 267.067   | test.dat (1024MB)

    1 | 15753216 | 1923  | 0.13 | 16.02     | 498.270 | 282.754   | test.dat (1024MB)

    2 | 15998976 | 1953  | 0.13 | 16.27     | 491.140 | 266.429   | test.dat (1024MB)

    3 | 15687680 | 1915  | 0.12 | 15.96     | 501.054 | 279.055   | test.dat (1024MB)

    4 | 15982592 | 1951  | 0.13 | 16.26     | 491.862 | 271.641   | test.dat (1024MB)

    5 | 16105472 | 1966  | 0.13 | 16.38     | 488.446 | 271.681   | test.dat (1024MB)

    6 | 15613952 | 1906  | 0.12 | 15.88     | 503.282 | 275.617   | test.dat (1024MB)

    7 | 15769600 | 1925  | 0.13 | 16.04     | 498.274 | 266.536   | test.dat (1024MB)

    total:   126984192 | 15501 | 1.01 | 129.17    | 495.157 | 272.671

    ```


    The last section of the report shows latency, as requested by the `-L` parameter,
    again in this case only reads:


    ```

    %-ile |  Read (ms) | Write (ms) | Total (ms)

    min |      0.007 |        N/A |      0.007

    25th |    313.126 |        N/A |    313.126

    ...

    max |   1816.870 |        N/A |   1816.870

    ```


    Note: Additionally, you could use the CrystalDiskMark utility, which has a graphical
    user interface but runs Diskspd on the background.


    ### SQLIOSim


    Different from Diskspd, SQLIOSim is designed to directly simulate SQL Server I/O
    patterns and is more focused on checking for correctness and corruption problems.
    SQLIOSim is used to perform reliability and integrity tests on your storage system,
    and it does so by simulating SQL Server read, write, checkpoint, backup, sort,
    and read-ahead activities. You can do some similar testing with Diskspd, but you
    have to understand the I/O pattern and define the required command-line statements.


    SQLIOSim replaces SQLIOStress, and it has been included with SQL Server since
    version 2008, which you can locate in the Binn folder (e.g., on a default installation
    at `C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\Binn`). It
    can also be downloaded from [`https://support.microsoft.com/en-us/kb/231619`](https://support.microsoft.com/en-us/kb/231619).
    This tool complements Diskspd as it provides different tests, so you don’t have
    to decide between one or the other and instead use both if you are testing your
    storage infrastructure.


    Although both Diskspd and SQLIOSim are command-line utilities, SQLIOSim also has
    a graphical interface that makes it a lot easier to use. By specifying some minimum
    parameters, the utility will perform all the required tests and may take a considerable
    amount of time to complete. An example executing SQLIOSim can be seen in Figure
    11-2.


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig2_HTML.jpg](images/393702_2_En_11_Chapter/393702_2_En_11_Fig2_HTML.jpg)


    Figure 11-2: SQLIOSim stress test running


    SQLIOSim stress test is designed for testing storage before a production implementation,
    so do not run this test in a live production environment. Running this test on
    shared storage may impact other storage connected systems or users, even if your
    volumes or LUNs are not used by anyone else. Communicate with your storage administrator
    before running such stress test.'
