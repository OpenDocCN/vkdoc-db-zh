  trans: '## 在 Linux 上配置 SQL Server


    如前所述，SQL Server 的最新两个版本——2017 和 2019——可以在 Windows 和 Linux 操作系统上运行。此外，它们还能在 Docker
    上运行，而 Docker 本身又可在 Windows、Linux 和 Mac OS 上运行。本章前面提到的所有配置同样适用于 Linux 系统。然而，本章的剩余部分将重点介绍仅适用于
    Linux 实现的配置。这些配置主要分为两类：使用 `mssql-conf` 实用工具进行的配置和操作系统配置。


    虽然你可以使用 `mssql-conf` 实用工具的 `setup` 选项来安装和配置 SQL Server，但本节假设你已经安装了 SQL Server
    和命令行工具。有关如何安装的详细信息，你可以参考 SQL Server 文档或我由 McGraw-Hill 出版的书 *SQL Server on Linux*。为了完整起见，以下是你很可能用来安装并初步配置
    SQL Server 的命令：


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    usermod: no changes

    Choose an edition of SQL Server:

    1) Evaluation (free, no production use rights, 180-day limit)

    2) Developer (free, no production use rights)

    3) Express (free)

    4) Web (PAID)

    5) Standard (PAID)

    6) Enterprise (PAID) - CPU Core utilization restricted to 20 physical/40 hyperthreaded

    7) Enterprise Core (PAID) - CPU Core utilization up to Operating System Maximum

    8) I bought a license through a retail sales channel and have a product key to
    enter.

    Details about editions can be found at

    https://go.microsoft.com/fwlink/?LinkId=2109348&clcid=0x409

    Use of PAID editions of this software requires separate licensing through a

    Microsoft Volume Licensing program.

    By choosing a PAID edition, you are verifying that you have the appropriate

    number of licenses in place to install and run this software.

    Enter your edition(1-8): 2

    The license terms for this product can be found in

    /usr/share/doc/mssql-server or downloaded from:

    https://go.microsoft.com/fwlink/?LinkId=2104294&clcid=0x409

    The privacy statement can be viewed at:

    https://go.microsoft.com/fwlink/?LinkId=853010&clcid=0x409

    Enter the SQL Server system administrator password:

    Confirm the SQL Server system administrator password:

    Configuring SQL Server...

    ForceFlush is enabled for this instance.

    ForceFlush feature is enabled for log durability.

    Setup has completed successfully. SQL Server is now starting.

    ```


    尽管你可以通过多种方式配置多个设置——例如，在 Windows 上运行 SQL Server Management Studio，同时连接到运行在 Linux
    上的 SQL Server 实例——但在其他情况下，使用 `mssql-conf` 工具是执行这些更改的唯一方式。配置全局跟踪标志或 TCP/IP 端口就是需要使用
    `mssql-conf` 工具的典型例子，而在 Windows 世界中，我们会使用 SQL Server 配置管理器。正如前面第 2 章所述，SQL Server
    配置管理器在 Linux 上不可用。


    要查看可用的 `mssql-conf` 选项，请不带参数运行该实用工具：


    ```

    # /opt/mssql/bin/mssql-conf

    usage: mssql-conf [-h] [-n]  ...

    positional arguments:

    setup             Initialize and setup Microsoft SQL Server

    set               Set the value of a setting

    unset             Unset the value of a setting

    list              List the supported settings

    get               Gets the value of all settings in a section or of an

    individual setting

    traceflag         Enable/disable one or more traceflags

    set-sa-password   Set the system administrator (SA) password

    set-collation     Set the collation of system databases

    validate          Validate the configuration file

    set-edition       Set the edition of the SQL Server instance

    validate-ad-config

    Validate configuration for Active Directory

    Authentication

    setup-ad-keytab   Create a keytab for SQL Server to use to authenticate AD

    users

    optional arguments:

    -h, --help          show this help message and exit

    -n, --noprompt      Does not prompt the user and uses environment variables

    or defaults.

    ```


    从该输出可能无法立即看出，但你可以通过两种不同的方式使用 `mssql-conf`。


    ### 使用特定参数


    第一种是使用列出的参数之一，例如 `traceflag` 或 `set-sa-password`，它们分别用于启用或禁用一个或多个跟踪标志，或设置系统管理员密码。


    ### 使用 `set` 和 `unset` 参数


    第二种是使用 `set` 或 `unset` 参数来设置或取消设置特定设置的值。例如，一个常用的设置可能是 `memory.memorylimitmb`，它可用于设置
    SQL Server 的内存限制。你可以通过以下命令查看所有可用设置的列表：


    ```

