- fmt: 'To disable the Query Store once again, you can use SQL Server Management Studio
    and select Off on Operation Mode (Requested), or you can use the following statement:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE = OFF

    ```


    In addition to `MAX_STORAGE_SIZE_MB`, the following options can be configured
    in the Query Store:


    1.  `OPERATION_MODE`: Updates the operation mode of the Query Store and can be
    `OFF`, `READ_ONLY`, and `READ_WRITE`. As mentioned earlier, the state of the Query
    Store can be seen using `desired_state_desc` and `actual_state_desc` from the
    `sys.database_query_store_options` catalog view. It can be `OFF` when the Query
    Store is disabled and `READ_ONLY` and `READ_WRITE` when it is enabled. When the
    Query Store is enabled, it will usually be in the `READ_WRITE` state. The Query
    Store can automatically go to the `READ_ONLY` state if there is a disk space problem,
    as explained earlier, or if you manually change the operation mode.


    2.  `MAX_PLANS_PER_QUERY`: Indicates the maximum number of plans maintained for
    each query, and its default value is 200. The Query Store gives you the possibility
    to explore how many different plans could be created for a specific query in a
    production workload, something that was not possible before, unless you use a
    third-party tool like the Picasso Database Query Optimizer Visualizer.


    3.  `INTERVAL_LENGTH_MINUTES`: Defines the time interval at which runtime execution
    statistics data is aggregated into the Query Store and the default value is 60
    minutes. It would not be feasible to store each and every query execution as some
    of them could be executed thousands or millions of times in a short period of
    time. The Query Store will store one row per query with aggregated runtime statistics
    for the specified interval. For example, if a query is executed 2000 times in
    one hour, the interval in the `sys.query_store_runtime_stats` catalog view will
    show 2000 `count_executions`, but the performance data will be aggregated for
    all those executions. Using a lower value can be useful in cases where you want
    finer granularity, but it will also use more disk space.


    4.  `CLEANUP_POLICY`: Defines the data retention policy of the Query Store. At
    the moment, the only possible value is `STALE_QUERY_THRESHOLD_DAYS`, which specifies
    the number of days for which the information for a query is retained in the Query
    Store. Its default value, as shown in an `ALTER DATABASE` statement at the beginning
    of this section, is 367 days. This configuration value will also impact the required
    disk space for the Query Store, and 367 days may be too high for some workloads
    so you may need to configure it to a lower value.


    5.  `DATA_FLUSH_INTERVAL_SECONDS`: Defines the frequency at which data written
    to the Query Store is persisted to disk. Its default value is 900 seconds or 15
    minutes. As shown in the architecture section, data collected by the Query Store
    is immediately available, but for performance reasons it is only written to disk
    asynchronously.


    Finally, the Query Store also has configuration options to define query capture
    and cleanup policies. Defining the query capture policy can be done with the `QUERY_CAPTURE_MODE`,
    which has the values `ALL`, `AUTO`, and `NONE`, which are described as:


    1.  `ALL`: Defines that all the queries are captured. It is the default value.


    2.  `AUTO`: Indicates to only capture relevant queries based on execution count
    and resource consumption. When this option is used, queries with low compile and
    execution times and executed infrequently are not collected. Thresholds for frequency,
    compile, and execution times are internally determined and cannot be manually
    configured.


    3.  `NONE`: Requests the Query Store to stop capturing new queries. When this
    configuration choice is used, the Query Store will collect compile and runtime
    statistics only for queries that were captured already. This configuration should
    be used with caution since important information for new queries will be missed.


    The cleanup policy is defined using the `SIZE_BASED_CLEANUP_MODE` configuration
    option and has the values `OFF` (the default) and `AUTO`. `OFF` means that the
    policy is disabled and no data is automatically deleted. If the `AUTO` value is
    defined, the policy will be automatically activated when size on disk reaches
    90% of the value defined in `MAX_STORAGE_SIZE`. The cleanup policy removes the
    least expensive and oldest queries first and stops at approximately 80% of the
    disk space defined at `MAX_STORAGE_SIZE`.'
