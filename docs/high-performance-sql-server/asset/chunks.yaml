  trans: '

    虽然我尚未见过一个纯粹的 OLTP 系统，但索引需求会根据系统从 OLTP 转向报表或数据仓库的方式而变化。OLTP 更侧重于快速查找一行或极少量行，因此非聚集索引对于此类工作负载至关重要。另一方面，OLTP
    系统存在大量更新操作，所以限制索引数量也很重要。报表和数据仓库工作负载则专注于处理海量数据，尽管可以使用传统索引来辅助查询（如第 7 章所述），但列存储索引是更合适的选择。


    创建索引的主要目的是辅助筛选和连接谓词，使 SQL Server 能尽快找到符合条件的数据行。筛选谓词通过查询中的`WHERE`子句指定（通常为等值比较），而连接谓词则在两表连接时指定。使用`WHERE`子句配合大于、小于或`BETWEEN`比较的查询通常称为范围查询，它们也能从索引中受益——尤其当索引覆盖查询时。有时可定义聚集索引来辅助此类范围查询，但由于每表仅允许一个聚集索引，次选方案可能是创建非聚集覆盖索引。若查找操作数量过多，查询优化器不太可能选择非覆盖的非聚集索引来执行范围扫描操作。


    按顺序返回数据行是索引的另一重要用途，这种情况可能出现在多种场景中：例如请求特定顺序的数据（使用`ORDER BY`操作），或当查询优化器发现某些受益于有序数据的操作符（如合并连接或流聚合）时。此类索引能避免昂贵的排序操作或其他效率较低的查询处理策略。


    总之，索引查找虽有用，但通常仅适用于相对较少的数据行。只要索引能覆盖查询，对任意数量的数据行使用索引进行范围扫描都很有帮助。这就是为什么范围扫描在聚集索引上效果显著——因为根据定义，聚集索引覆盖了表中的所有列。


    ### 索引使用验证


    创建索引后验证其执行计划至关重要，需确保索引不仅被查询使用，而且符合预期方式。例如：你为特定查询创建索引，虽然执行计划选择了该索引，但它可能执行的是索引扫描而非期望的索引查找操作。情况或许不至于如此极端，但你可能定义了多列索引，虽然看到索引查找操作，但查找谓词仅用于首列。显然，性能指标才是衡量索引策略成功与否的主要依据。若查询原先需执行一分钟，在创建所需索引后缩短至一两秒，你可能认为效果已足够理想。


    需要明确的是：查询优化器选择索引并不等同于能获得良好性能。后文将说明，遍历索引 B 树结构是昂贵操作，仅当搜索少量或相对较少的数据行时才值得采用。如同查询优化决策的常见情况，存在一个临界点——超过该点后成本会急剧上升，此时采用其他访问方法（如扫描表）可能更高效。若索引未能覆盖查询所需的所有列，成本会进一步增加，因为可能需要两次遍历
    B 树结构：第一次遍历非聚集索引，第二次遍历主表（通常是聚集索引）。此类操作称为键查找。主表也可能是堆结构（无 B 树），但类似的操作——行 ID 查找——同样不可避免。


    虽然查询优化器被设计为能在这些情况下做出正确决策，但问题仍可能出现，或许源于基数估计错误或查询处理器的其他限制。此外，某些可复用代码（如存储过程）可能因参数敏感性问题产生此类状况，特别是在数据分布不均的情况下。此时查询优化器会在存储过程首次执行时创建最优计划。如第
    1 章所述，查询优化器通过首次提供的参数来决定执行查询的操作方案。当后续以不同参数再次运行该查询时，问题可能显现——先前创建的执行计划可能不再适用。


    最后，查询谓词中存在`WHERE`子句并不意味着必须创建新索引，也不代表查询优化器必须使用已有索引。这本质上是基于成本的决策，某些情况下其他遍历方式可能更合适且成本更低。典型情况包括：查询谓词的选择性不足，或索引未能覆盖查询。查询优化器不选择索引可能存在多种原因（即使假设索引创建正确）：

    1.  **成本因素**：当前参数值下使用索引可能是好选择，但其他值下则不然。此问题常见于数据分布不均的情况，本章后续将展示相关案例。

    2.  **复杂表达式**：可能因使用了函数或复杂表达式，至少当前版本的 SQL Server 查询优化器无法完全解析。

    3.  **无实用性**：索引可能完全无效。可调查索引未被使用的原因并考虑删除。索引使用情况记录在`sys.dm_db_index_usage_stats`
    DMV 视图中（详见第 8 章）。

    4.  **基数估计错误或其他查询处理器限制**。


    若分析后怀疑索引确实有用而查询优化器未选择它，可通过使用提示强制索引来研究查询行为。通常我不建议使用查询提示，因为它们破坏了查询的声明式规范，限制了查询优化器的选择空间，且查询提示本质上形成了新的依赖关系，会增加维护难度。例如：若查询提示使用了特定索引，删除该索引将导致查询失败。

    '
- fmt: '## Index Maintenance


    We definitely don’t want to create indexes for every single query in the system.
    Indexes could be recommended to help on the performance of critical or frequently
    used queries only, as having too many indexes can introduce a new performance
    problem. Since every index would require maintenance, either automatically by
    the database engine with every insert, update, or delete operation or by the database
    administrator when scheduling jobs to remove fragmentation or update statistics,
    you should limit the number of indexes you create per table. In addition, indexes
    use valuable storage and potentially more memory resources.


    The number of indexes to create on a table would also depend on whether you have
    an OLTP system where data is changing all the time or a Data Warehouse where data
    only changes on a periodic basis (e.g., using ETL jobs). Index characteristics
    are also different for both workloads where the first one could be to help single
    lookups and the second to help on data aggregations. In summary, some of the issues
    of having too many indexes are the following:


    1.  Performance of update operations such as `INSERT`, `UPDATE`, `DELETE`, `MERGE`,
    and others may be negatively impacted.

    2.  Maintenance jobs for index rebuild or index reorganization operations (to
    eliminate or minimize index fragmentation) or statistics update may take longer,
    use more resources, and expand the database maintenance window.

    3.  More disk space storage and potentially more memory will be required.


    For more details about fragmentation, you can refer to Chapter 8, where we also
    discuss the `sys.dm_db_index_physical_stats` DMV.


    ## Heaps


    A heap is not an index or a b-tree structure per se, but it is also important
    to cover it here as any table has to be configured either as a heap or as a clustered
    index. A heap is a data structure where rows are stored in no specific order.
    Although choosing between a heap and a clustered order sometimes can be a topic
    of debate and will depend on your database and workload, usually a well-designed
    clustered index offers the advantage of offering an order that can be used for
    range scans or return sorted data. Having said that, a heap can also be used in
    some other cases like in a small table or tables where a proposed candidate clustering
    key could be larger than the heap row identifier or `RID`. A `RID` is only eight
    bytes long and serves the row locator for rows in a heap. Small tables may not
    only be configured as heaps, but they may not require nonclustered indexes at
    all, as in some cases scanning the entire table could be less expensive than navigating
    any alternate b-tree index structure.


    Although most of the time it is recommended to use clustered indexes as they offer
    the benefit of accessing data in order, there are some other benefits of using
    heaps, especially with small tables or to avoid issues like page splits and minimize
    fragmentation. For a great discussion about choosing clustered indexes vs. heaps,
    see the article “Clustered Indexes and Heaps” located at [`https://technet.microsoft.com/en-us/library/cc917672.aspx`](https://technet.microsoft.com/en-us/library/cc917672.aspx).


    ## Clustered Indexes


    Usually, a table will have, or more precisely be, a clustered index. A few of
    the exceptions were listed previously in the “Heaps” section. Mentioned earlier
    was when a proposed clustered index key is restrictively large while a heap `RID`
    uses only eight bytes. Something similar in size to this eight-byte heap `RID`
    could be achieved by using an identity property, which could be either the `int`
    or `bigint` data types, which use four and eight bytes, respectively. That is,
    you could start using an `int` data type, and later upgrade to a `bigint`, if
    required. If you already know up front you will need a `bigint`, you should start
    with it to avoid a conversion maintenance later in production use.


    Since a heap does not provide any order and requires a nonclustered index to find
    specific rows, a clustered index has the advantage of providing that benefit already,
    but since only one clustered key or order is available, it would have to be chosen
    wisely. The best choice of a clustered key is one that can help with range queries
    where the index can quickly find the first row in a range and follow the logical,
    and hopefully physical, index order to find the remaining rows. Range queries
    are queries that filter predicates using greater than or less than operators such
    as `>`, `>=`, `<`, or `<=` or the `BETWEEN` clause. Clustered indexes also help
    on `JOIN` predicates, for example, when defining master-detail tables and foreign
    key constraints. They greatly benefit `ORDER BY` and `GROUP BY` queries if these
    are based on the table clustering key.


    Best practices throughout the years have shown that clustered index keys are recommended
    to be unique, narrow, static, and ever-increasing, especially for performance
    and disk-space-used considerations. As a side note, those four recommendations
    are not a problem on a heap as an `RID` follows those four properties. A `RID`
    is relatively narrow as it uses only eight bytes. Let us review the unique, narrow,
    static, and ever-increasing properties, recommended for a clustered index key:


    1.  **Unique**: Clustered index key is recommended to be unique. If it is not,
    a four-byte uniqueifier will be added to make sure it is unique.

    2.  **Narrow**: Clustering key is recommended to be as narrow as possible as it
    saves disk storage and memory usage. A very important consideration in this point
    is that every nonclustered index row will also store this clustering key, again
    impacting storage and memory usage. A clustering key could be one or more columns
    so it is recommended to be as few columns as possible or one column and a short
    key.

    3.  **Static**: I would say this should be a requirement for a clustering key.
    A volatile clustering key, which may change or it is constantly changing, can
    be a huge performance problem as rows have to be moved from one page to another
    and create page splits and fragmentation.

    4.  **Ever-increasing**: It is recommended to use an ever-increasing value like
    the one provided by an `IDENTITY` property. This helps to add new rows always
    in new pages at the end of the index, avoiding page splits and fragmentation.
    However, in very intensive workloads with high concurrency, scenarios may create
    contention as all the new rows are inserted always at the same and last page.
    This problem is commonly known as “last page insert contention” and may impact
    heaps as well.


    **Note**


    If the “last page insert contention” problem is a serious bottleneck in your application,
    you definitely should consider using memory-optimized tables and In-Memory OLTP.
    For details about this SQL Server feature, see Chapter 7. Fragmentation and page
    splits are covered in more detail in Chapter 8.


    Finally, defining a primary key will by default also create a clustered index
    using either T-SQL or SQL Server Management Studio. In order to change this behavior
    (e.g., to instead create a nonclustered index), it needs to be required explicitly.'
