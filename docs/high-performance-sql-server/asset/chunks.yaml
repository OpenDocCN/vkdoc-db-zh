  trans: '

    从工具栏点击 `Start Analysis`。虽然计划的分析时间最长可达一小时，但对于本练习，分析应在几分钟内完成。随后将显示 `Progress` 选项卡，或者您可以选择该选项卡查看调优过程的进度。分析完成后，您可以使用
    `Recommendations` 选项卡查看建议，或者使用 `Reports` 选项卡查看调优摘要和报告。`Recommendations` 选项卡的一部分内容（因篇幅过大无法在本书中完整呈现）如图
    9-11 所示。


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig11_HTML.jpg](img/393702_2_En_9_Fig11_HTML.jpg)


    ### 图 9-11

    #### DTA 建议选项卡


    `Recommendations` 选项卡显示诸如建议创建或删除的对象以及执行此类操作所需代码等信息。`Target of Recommendation`
    列显示了将要创建的对象（在本例中），其中统计信息以 `_dta_stat` 开头，索引以 `_dta_index` 开头，视图以 `_dta_mv` 为前缀。建议选项卡的最后一列是
    `Definition` 列，该列可点击，会显示创建建议对象的代码。以下是本练习中四个建议对象的代码。（代码按原样显示，因此不遵循本书其余部分的风格和格式。）


    ```sql

    CREATE STATISTICS [_dta_stat_565577053_1_5] ON [dbo].SalesOrderDetail

    CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderDetail_9_565577053__K5_1_2] ON
    [dbo].[SalesOrderDetail]

    (

    [ProductID] ASC

    )

    INCLUDE ([SalesOrderID],

    [SalesOrderDetailID]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE
    = OFF) ON [PRIMARY]

    SET ANSI_PADDING ON

    CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderDetail_9_565577053__K5_K1_2_3_4_6_7_8_9_10_11]
    ON [dbo].[SalesOrderDetail]

    (

    [ProductID] ASC,

    [SalesOrderID] ASC

    )

    INCLUDE ([SalesOrderDetailID],

    [CarrierTrackingNumber],

    [OrderQty],

    [SpecialOfferID],

    [UnitPrice],

    [UnitPriceDiscount],

    [LineTotal],

    [rowguid],

    [ModifiedDate]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE = OFF)
    ON [PRIMARY]

    CREATE CLUSTERED INDEX [_dta_index_SalesOrderHeader_c_9_581577110__K1] ON [dbo].[SalesOrderHeader]

    (

    [SalesOrderID] ASC

    )WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE = OFF) ON [PRIMARY]

    ```


    让我们快速分析一下这些建议。与我们之前在缺失索引练习中得到的结果相比，我们看到建议略有不同，这主要是因为我们知道 `SalesOrderHeader` 和
    `SalesOrderDetail` 是主从表，并且我们决定预先为其创建聚集索引。正如我们讨论过的，缺失索引功能无法建议聚集索引。本练习表明，仅使用默认设置，我们就获得了关于聚集索引、非聚集索引和统计信息的建议。


    正如预期的那样，建议在 `SalesOrderHeader` 表上创建的聚集索引是我们提供的范围查询（即带有 `WHERE SalesOrderID BETWEEN
    50000 AND 70000` 谓词的查询）的结果。我们还获得了几个非聚集索引和一个多列统计信息对象的建议。这些建议可能是个不错的选择，但它们与我们之前的练习并不匹配，因为我们手动在
    `SalesOrderDetail` 上创建了一个聚集索引，而这是这些主从表原始设计的一部分。由于我们没有提供任何范围查询，因此没有建议为 `SalesOrderDetail`
    创建聚集索引。显然，DTA 无法就其未知的信息提出建议，因此向其提供所有重要查询至关重要。同样值得注意的是，DTA 建议在 `SalesOrderID` 和
    `ProductID` 上创建多列统计信息。多列统计信息永远不会由 SQL Server 自动创建。


    如您所见，即使对于这个简单的练习，您也可能需要花费一些时间在测试环境中分析、评估和验证所提供的建议，但这绝对是在将其部署到生产实例之前必须做的工作。我必须再次强调，我们绝不能盲目实施这些建议。


    `Reports` 选项卡显示了关于调优过程的大量有趣信息，包括包含调优信息的摘要以及 15 个不同的报告。DTA 中呈现的所有信息都存储在 `msdb`
    数据库中，因此如果您有特殊需求，可以查看一下。这些信息存储在 `DTA_` 表中，并将一直保留，直到您删除 DTA 会话。


    最后，如前所述，产品最新版本中引入了两个非常有用的 DTA 功能：您现在可以使用计划缓存和查询存储作为要分析的工作负载源，因此您根本不需要收集任何数据。这非常有意义，因为您最昂贵的查询很可能就在其中，正如我们在第
    8 章通过 `sys.dm_exec_query_stats` DMV 或在第 6 章通过查询存储向您展示的那样。


    让我们通过以下练习来看看这些功能。为了模拟计划缓存中的真实工作负载，您可以在 SQL Server Management Studio 中运行我们的测试查询，并在前面加上
    `DBCC FREEPROCCACHE` 语句，该语句用于清除现有的计划缓存，如下所示：


    ```sql

    DBCC FREEPROCCACHE

    GO

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID, UnitPrice FROM SalesOrderDetail

    WHERE ProductID = 870

    GO

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    ORDER BY ProductID

    GO

    SELECT ProductID, COUNT(*) FROM SalesOrderDetail

    GROUP BY ProductID

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 898

    GO

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 870

    GO

    ```


    查询执行后，它们很可能会进入计划缓存，然后您可以创建一个 DTA 会话，选择 `Plan Cache` 作为工作负载。当您调优计划缓存时，您并没有显式提交查询。因此，在调优会话结束时查看报告（例如
    `Statement detail` 报告）以了解调优了哪些类型的查询就更加重要了。您可以如前所述在 `Reports` 选项卡上找到这些内容。在我的案例中，我得到了与之前文件练习相同的建议，但需要提醒的是，当您调优计划缓存时，您对要调优哪些查询的控制可能较少。


    好奇 DTA 如何决定从计划缓存中调优哪些查询吗？您可以使用 SQL 跟踪或扩展事件查看 DTA 提交给数据库引擎的查询。这是我在测试中得到的结果，它显示
    DTA 提交了以下查询，以根据持续时间找出最耗费资源的 1000 个查询：


    ```sql

    select top 1000 isnull(st.objectid,0),

    isnull(st.dbid,0), avg(cp.execution_count), st.text

    from sys.dm_exec_query_stats cp

    cross apply sys.dm_exec_sql_text(cp.plan_handle) st

    where cp.creation_time < N''2016-08-08 03:47:06.273'' and st.dbid in (9)

    group by st.text,st.objectid,st.dbid

    order by sum(total_elapsed_time) desc

    ```


    您可以遵循完全相同的练习来改用 `Query Store`；只需确保此组件已启用并配置好。有关如何执行此操作的详细信息，请参阅第 6 章。

    '
- fmt: '## Summary


    This chapter covered how SQL Server uses indexes and why they are critical for
    the performance of your database applications. Indexes are of paramount importance
    for OLTP workloads as they allow you to quickly find one or a small number of
    rows in a potentially large table. Although using such indexes improves the performance
    of lookups by using expensive random IOs, their use is limited to a small number
    of rows. Indexes can also provide some other benefits, such as providing ordered
    data without having to perform expensive sort operations or covering a query,
    providing all the required columns without having to use the main table, eliminating
    the need for more database pages and logical reads.


    The chapter also provided emphasis on using SQL Server tools to help create indexes
    such as the `missing indexes` feature and the more sophisticated `Database Engine
    Tuning Advisor`. Finally, maintenance considerations for indexes were explained
    as well. Just because indexes are useful does not mean you should have many as
    both the database engine and user maintenance operations are required to keep
    the indexes updated and defragmented.


    # 10. Intelligent Query Processing


    This chapter provides an overview to intelligent query processing, a collection
    of features designed to improve the performance of your queries. Intelligent query
    processing was introduced with SQL Server 2017 with three original features under
    the umbrella of `adaptive query processing`. The term `intelligent query processing`,
    however, was not used until the SQL Server 2019 release, which included five more
    features. As an introductory chapter, I am not covering these features exhaustively
    so you can refer to the SQL Server documentation for more details.


    The intelligent query processing features provide performance enhancements with
    no application changes needed or no effort required. These features are enabled
    by default using at least the database compatibility level of the SQL Server version
    where they were introduced. Figure [10-1](#393702_2_En_10_Chapter.xhtml#Fig1),
    taken from the SQL Server documentation, shows all the current intelligent query
    processing features.


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig1_HTML.jpg](images/393702_2_En_10_Chapter/393702_2_En_10_Fig1_HTML.jpg)


    Figure 10-1: Intelligent query processing features


    As you can notice in Figure [10-1](#393702_2_En_10_Chapter.xhtml#Fig1), intelligent
    query processing may also be grouped in families of features. For example, the
    `adaptive query processing` family includes features like `adaptive joins`, `interleaved
    execution`, and `memory grant feedback`. `Approximate query processing` includes
    for now just one feature, `approximate count distinct`. More intelligent query
    processing features are planned to be included in future versions of SQL Server.


    `Adaptive query processing` includes a new generation of query processing features
    that enable the query optimizer to make runtime adjustments to execution plans
    and optimizer statistics. This allows the query optimizer to discover new information
    that can lead to better query performance. `Adaptive query processing` offers
    some improvements to the traditional query optimization process. In the normal
    query optimization process, if a bad cardinality estimation contributed to a suboptimal
    execution plan, no additional changes or optimizations were allowed to such plan,
    and it was used to execute the query anyway.


    Figure [10-1](#393702_2_En_10_Chapter.xhtml#Fig1) also shows the version when
    each of these features was introduced. This means that SQL Server 2017 only contains
    the features in blue, while SQL Server 2019 contains all the features listed.
    To enable any of these features, you would have to use the compatibility level
    of the version the feature was released, as seen in Figure [10-1](#393702_2_En_10_Chapter.xhtml#Fig1),
    or a later compatibility level. For example, this could be compatibility level
    `140` for SQL Server 2017 and compatibility level `150` for SQL Server 2019. An
    example on how to set compatibility level for a database is next:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET COMPATIBILITY_LEVEL = 150

    ```'
