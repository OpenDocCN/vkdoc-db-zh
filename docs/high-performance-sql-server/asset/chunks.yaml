- fmt: '## Introduction


    Chapter [1](#393702_2_En_1_Chapter.xhtml) introduced SQLOS and explained that
    SQL Server uses a nonpreemptive scheduler, in which a task voluntarily releases
    control periodically and will run as long as its quantum allows it or until it
    gets suspended on a synchronization object. We also learned that, in a few cases,
    a task can run in preemptive mode when the task is running code outside the SQL
    Server domain. Both cases are represented in Figure [5-1](#393702_2_En_5_Chapter.xhtml#Fig1),
    which shows the task execution process that was explained in Chapter [1](#393702_2_En_1_Chapter.xhtml).
    In this chapter, we expand on this topic and explain how this task execution process
    fits into the waits and queues performance methodology.


    ![../images/393702_2_En_5_Chapter/393702_2_En_5_Fig1_HTML.jpg](images/393702_2_En_5_Chapter/393702_2_En_5_Fig1_HTML.jpg)


    **Figure 5-1**

    Task execution process


    From the point of view of the user, a request is always running. After all, when
    we run a query, it appears to be executing all the time. But, as we can see in
    Figure [5-1](#393702_2_En_5_Chapter.xhtml#Fig1), a request sometimes is running
    and sometimes is waiting. When it is running, it is using processor time to perform
    useful work. When it is suspended, it is waiting for something—maybe a resource,
    maybe a synchronization object—or maybe it is waiting for work to be assigned.
    The task is said to be in a waiter list. When it is runnable, the task is ready
    to execute, but it first has to wait for its processor slice, and it is said to
    be in the runnable queue. The time spent on the runnable queue, waiting for processor
    time, is called signal wait time. When any of these parts take too long, either
    running or waiting, it is very important to understand why, as there might be
    a possibility of improvement in any case. SQL Server tracks all the information
    about why a request is waiting, how long it is waiting, and what it is waiting
    for.


    As covered in Chapter [1](#393702_2_En_1_Chapter.xhtml), SQL Server has a scheduler
    per logical processor, and, in addition, there are some hidden schedulers used
    for internal tasks and one more used for the DAC (Dedicated Administrator Connection).
    You can identify them by looking at the `status` column of the `sys.dm_os_schedulers`
    DMV. An interesting column on this DMV, `quantum_length_us`, shows the quantum
    used by the scheduler, which is usually 4 milliseconds (or 4000 microseconds).
    In addition, keep in mind that Figure [5-1](#393702_2_En_5_Chapter.xhtml#Fig1)
    shows one scheduler or logical processor only. On a system with eight logical
    processors, you will have the same process eight times, potentially up to eight
    tasks running and using CPU at the same time, and eight waiter lists and runnable
    queues.


    A special case, also noted in Figure [5-1](#393702_2_En_5_Chapter.xhtml#Fig1),
    is the transition from Running to Runnable, which is possible in cases where a
    task uses its quantum without the need to wait for any resource. The SQL Server
    code was designed to detect areas in the code when this can happen and programmed
    to voluntarily yield processor time when the quantum reaches its limit, which
    is usually four milliseconds. A task has to yield even if it is the only user
    task in the system, which is obviously not common in a live system. Even on an
    almost idle system, there are some other processes running in the system as background
    system processes.


    Technically, you can see the waiter list by using the `sys.dm_os_waiting_tasks`
    DMV. Different from the runnable queue discussed later, the waiter list does not
    have any specific order, a task can arrive at any moment, and since the resource
    they are waiting on can be available at any moment, they can stop waiting and
    leave the list at any time. Once the resource is available, the task will be signaled
    to be placed at the end of the runnable queue. The `resource_description` column
    of the `sys.dm_os_waiting_tasks` DMV shows the resource the task is waiting for,
    which can have a large number of possible values but which are nicely documented
    at [`https://msdn.microsoft.com/en-us/library/ms188743.aspx`](https://msdn.microsoft.com/en-us/library/ms188743.aspx).


    The runnable queue usually works as a FIFO list, meaning that tasks are placed
    in this queue and serviced in the order they arrive, the only exception being
    when Resource Governor is configured to change this priority, but that is a special
    configuration and is not common. `runnable_tasks_count` on the `sys.dm_os_schedulers`
    DMV shows the number of workers on the runnable queue for a specific scheduler.


    The task execution process shown in Figure [5-1](#393702_2_En_5_Chapter.xhtml#Fig1)
    will continue until the query execution is complete, except for a few cases when
    a query is canceled, timed out, or not able to complete for some other reason.
    The new Query Store feature, covered in the next chapter, allows you to track
    these queries in cases where you want to troubleshoot them as well.


    The task execution status, Running, Runnable, or Suspended, can be shown using
    the `status` column on `sys.dm_exec_requests`, which, as covered in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    returns information about each request that is executing within SQL Server. There
    are two additional task execution statuses in SQL Server, Background and Sleeping.
    Background is used for background system processes. Sleeping can be used for any
    connection, whether a user or system process, that had done work and was now connected
    but not actively working or waiting to do work. As indicated earlier, the wait
    information is available in several DMVs and other sources and will be covered
    in detail in the next section.


    As mentioned, waits happen in SQL Server all the time, and you can see this information
    in several ways including running the `sys.dm_exec_requests` DMV. Let us build
    a simple example to show you how to get this information. Open a SQL Server Management
    Studio session and run the following statements:


    ```sql

    BEGIN TRANSACTION

    UPDATE Sales.SalesOrderDetail

    SET OrderQty = 5

    WHERE SalesOrderDetailID = 121317

    ```


    Notice that a transaction is started but not yet committed or rolled back. Open
    another session and run this:


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderDetailID = 121317

    ```


    Then open a third session and run this:


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    ```


    Since the first session has locks in an open transaction on the `Sales.SalesOrderDetail`
    table, the other two sessions will be blocked. Run this on a new session:


    ```sql

    SELECT * FROM sys.dm_exec_requests r JOIN sys.dm_exec_sessions s

    ON r.session_id = s.session_id

    WHERE s.is_user_process = 1

    ```


    **Note**


    The only reason we join with `sys.dm_exec_sessions` is to use the `is_user_process`
    column, which indicates if the session is a system or user process. We can no
    longer just rely on the `session_id` value as was done in previous versions of
    SQL Server.


    You should see something like this, summarized to fit the page:


    | session_id | status | Command | blocking_session_id | wait_type | last_wait_type
    | wait_resource |

    | --- | --- | --- | --- | --- | --- | --- |

    | 59 | suspended | SELECT | 55 | LCK_M_S | LCK_M_S | KEY: 5:72057594057588736
    (722affd45fb5) |

    | 64 | running | SELECT | 0 | NULL | MEMORY_ALLOCATION_EXT |   |

    | 65 | suspended | SELECT | 0 | CXPACKET | CXPACKET |   |'
