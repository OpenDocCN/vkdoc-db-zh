    of an index for ProductID 870\. The table scan will cost 1.25303 units, and forcing
    the index using the following query will cost 5.27841, a big difference. You can
    force the index seek using the following `INDEX` hint and verify both costs in
    the generated execution plans:


    ```

    SELECT * FROM SalesOrderDetail

    WITH (INDEX (IX_ProductID))

    WHERE ProductID = 870

    ```


    Although I mentioned query costs to explain the query optimizer decisions, the
    reality is that we should not focus much on such costs for our performance analysis
    but rather on the real execution performance data. If you use a statement such
    as `SET STATISTICS IO ON` to analyze the I/O performance of both queries, you
    may find out that using the plan with the index seek with the ProductID 870 will
    use 12 times more I/Os than scanning the entire table.


    It is worth mentioning here that the reason we have different plans for the same
    query is because of a behavior called auto-parameterization, which, although it
    can help to reuse plans, it does it in a very conservative way. Since there are
    no constraints to predict how many rows the query will return, such a query could
    return 0, 1, or many rows or even the entire table. For this reason, the query
    optimizer decides not to reuse the previous plan and creates a new one, tailored
    to the new value. If we were using stored procedures, where reusing plans is mostly
    encouraged, the existing plan will be reused. You may be asking which of the two
    plans will be reused. Obviously, it is the one created for the first optimization.


    In summary, index seeks and key lookups are extremely efficient for a small number
    of rows but become very expensive as the number of rows increases. Obviously,
    this does not mean that you should avoid them. In fact, there is no bad query
    operator, and each one could be the best choice in the right circumstances. Sometimes,
    I see developers trying to get rid of key lookups entirely, and that is not the
    right approach. There has to be a balance, especially when you cannot create indexes
    for every query.


    Let’s suppose we change the query slightly to the following:


    ```

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    WHERE ProductID = 870

    ```


    This time, we get a new plan with just an index seek and no key lookup, as shown
    in Figure [9-4](#393702_2_En_9_Chapter.xhtml#Fig4).


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig4_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Plan without a key lookup


    So why has the key lookup gone? Every nonclustered index includes the table clustering
    key, so in this case both SalesOrderID and SalesOrderDetailID are available without
    having to access the base table. Let’s add one more column:


    ```

    SELECT SalesOrderID, SalesOrderDetailID, ProductID, UnitPrice FROM SalesOrderDetail

    WHERE ProductID = 870

    ```


    Because the index does not include the `UnitPrice` column, it no longer covers
    the query, and we go back to the clustered index scan. But this time we get a
    new index recommendation. Most SQL Server versions would show the following index
    definition:


    ```

    CREATE NONCLUSTERED INDEX []

    ON [dbo].[SalesOrderDetail] ([ProductID])

    INCLUDE ([SalesOrderID],[SalesOrderDetailID],[UnitPrice])

    ```


    In this case, it looks like a good recommendation. However, we don’t want to include
    SalesOrderID and SalesOrderDetailID as they are already contained on the nonclustered
    index, as we mentioned earlier. Even if we do add them, they will not be duplicated,
    but it is clearer not to do it in the index definition. This column duplication
    on the index definition is fixed in SQL Server 2019 which only includes the UnitPrice
    column.


    Let’s drop the existing index and create a new one with the recommendation:


    ```

    DROP INDEX SalesOrderDetail.IX_ProductID

    GO

    CREATE NONCLUSTERED INDEX IX_ProductID

    ON SalesOrderDetail (ProductID)

    INCLUDE (UnitPrice)

    ```


    Running our last `SELECT` statement again will get the best possible plan using
    an index seek and similar to the one in Figure [9-4](#393702_2_En_9_Chapter.xhtml#Fig4).
    Assuming that the query is worth it (e.g., it is used multiple times), you can
    create the index with that included column. It is your decision when to use `INCLUDE`
    as doing so too frequently will require data duplication. After the index is created,
    we have the optimal index for the query, either with parameter 898 or 870 or,
    in fact, any other parameter. In both cases, we have only the index seek without
    the need for a key lookup.'
  trans: '

    现在，通过查看执行计划，你可以验证优化级别是完整的，但正如预期，我们仍然得到相同的计划，因为实际上没有任何改变。但这次我们得到了一个缺失索引的建议。这是生成的代码：


    ```

    CREATE NONCLUSTERED INDEX []

    ON [dbo].[SalesOrderDetail] ([ProductID])

    INCLUDE

    ([SalesOrderID],[SalesOrderDetailID],[CarrierTrackingNumber],[OrderQty],[SpecialOfferID],

    [UnitPrice],[UnitPriceDiscount],[LineTotal],[rowguid],[ModifiedDate])

    ```


    注意

    要在 SQL Server Management Studio 中显示此代码，请右键单击执行计划顶部的绿色“缺失索引”消息，然后选择“缺失索引详细信息”。这将打开一个新的查询窗口并列出该代码。


    对于一个从 121,317 行中返回 9 行的查询来说，这个建议似乎是个好主意。但是，尽管在 `ProductID` 上创建索引看起来方向正确，但将表中的所有剩余列都包含在索引中似乎有些过度。基本上，这将复制表所需的空间。更好的选择可能只是在
    `ProductID` 上创建索引，不包含任何列，如下所示：


    ```

    CREATE NONCLUSTERED INDEX IX_ProductID

    ON SalesOrderDetail (ProductID)

    ```


    让我们再次运行查询。我们现在不再需要跟踪标志，因为我们已经有了索引，它会创建替代方案，查询优化器将必须执行完全优化。


    ```

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    ```


    我们现在得到了一个完全优化的计划，如图 9-3 所示。


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig3_HTML.jpg](img/393702_2_En_9_Fig3_HTML.jpg)


    图 9-3

    使用索引查找操作的计划


    由于我们现在看到了希望看到的索引查找操作以充分利用索引，这个计划现在看起来好多了。在这种特定情况下，没有缺失索引的建议，因为似乎最佳索引已经存在并被使用。但我们遇到了其他情况，即键查找。需要进行键查找是因为我们请求了表中的所有列，而单独的索引并未涵盖所有列。如前所述，键查找（或其在堆上的等效操作，即
    `RID` 查找）是一项开销很大的操作，仅对相对较少的行数有意义。无法给出百分比作为示例，但它非常低，并且取决于查询优化器的估计。现在让我们用不同的 `ProductID`
    值运行以下相同的查询：


    ```

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 870

    ```


    这一次，它返回了 4688 行，但它回到了表扫描，因为查询优化器估计，对于如此大量的行使用索引查找和键查找可能比扫描整个表的开销更大。你可以通过查看计划来验证这两种开销，但你必须强制为
    `ProductID` 870 使用索引。表扫描的开销为 1.25303 单位，而使用以下查询强制使用索引的开销为 5.27841，差异巨大。你可以使用以下
    `INDEX` 提示强制进行索引查找，并在生成的执行计划中验证两者的开销：


    ```

    SELECT * FROM SalesOrderDetail

    WITH (INDEX (IX_ProductID))

    WHERE ProductID = 870

    ```


    虽然我提到了查询开销来解释查询优化器的决策，但现实是，对于我们的性能分析，我们不应该过分关注这些开销，而应该关注实际的执行性能数据。如果你使用像 `SET
    STATISTICS IO ON` 这样的语句来分析两个查询的 I/O 性能，你可能会发现，对于 `ProductID` 870，使用带有索引查找的计划将比扫描整个表多使用
    12 倍的 I/O。


    这里值得一提的是，同一个查询出现不同计划的原因是一种称为“自动参数化”的行为。虽然它可以帮助重用计划，但其方式非常保守。由于无法预测查询将返回多少行，这样的查询可能返回
    0、1 或很多行，甚至可能返回整个表。因此，查询优化器决定不重用之前的计划，而是创建一个针对新值量身定制的新计划。如果我们使用的是存储过程（主要鼓励重用计划），则将重用现有计划。你可能想知道这两个计划中哪一个会被重用。显然，是第一个优化时创建的计划。


    总而言之，索引查找和键查找对于少量行来说极其高效，但随着行数的增加，它们会变得非常昂贵。显然，这并不意味着你应该避免它们。事实上，没有绝对不好的查询运算符，在适当的情况下，每个运算符都可能是最佳选择。有时，我看到开发人员试图完全摆脱键查找，这不是正确的方法。必须取得平衡，特别是当你无法为每个查询创建索引时。


    让我们假设我们将查询稍微更改为以下内容：


    ```

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    WHERE ProductID = 870

    ```


    这一次，我们得到了一个仅包含索引查找而没有键查找的新计划，如图 9-4 所示。


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig4_HTML.jpg](img/393702_2_En_9_Fig4_HTML.jpg)


    图 9-4

    没有键查找的计划


    那么为什么键查找消失了？每个非聚集索引都包含表的聚集键，因此在这种情况下，`SalesOrderID` 和 `SalesOrderDetailID` 无需访问基表即可获得。让我们再添加一列：


    ```

    SELECT SalesOrderID, SalesOrderDetailID, ProductID, UnitPrice FROM SalesOrderDetail

    WHERE ProductID = 870

    ```


    因为索引不包含 `UnitPrice` 列，所以它不再覆盖查询，我们又回到了聚集索引扫描。但这次我们得到了一个新的索引建议。大多数 SQL Server 版本会显示以下索引定义：


    ```

    CREATE NONCLUSTERED INDEX []

    ON [dbo].[SalesOrderDetail] ([ProductID])

    INCLUDE ([SalesOrderID],[SalesOrderDetailID],[UnitPrice])

    ```


    在这种情况下，这看起来是一个不错的建议。然而，我们不想包含 `SalesOrderID` 和 `SalesOrderDetailID`，因为如前所述，它们已经包含在非聚集索引中。即使我们添加它们，它们也不会被复制，但在索引定义中不这样做会更清晰。SQL
    Server 2019 修复了索引定义中的这种列重复问题，它只包含 `UnitPrice` 列。


    让我们删除现有索引并根据建议创建一个新索引：


    ```

    DROP INDEX SalesOrderDetail.IX_ProductID

    GO

    CREATE NONCLUSTERED INDEX IX_ProductID

    ON SalesOrderDetail (ProductID)

    INCLUDE (UnitPrice)

    ```


    再次运行我们最后一条 `SELECT` 语句将获得使用索引查找的最佳可能计划，与图 9-4 中的类似。假设这个查询值得（例如，它被多次使用），你可以创建包含该包含列的索引。何时使用
    `INCLUDE` 由你决定，因为过于频繁地这样做将需要数据复制。索引创建后，我们就拥有了针对该查询的最佳索引，无论参数是 898 还是 870，或者事实上任何其他参数。在这两种情况下，我们只有索引查找，而无需进行键查找。

    '
- fmt: '## 索引的其他用途


    我们刚刚介绍了过滤谓词，稍后将介绍连接谓词，但让我们先看看刚刚创建的索引的其他一些好用法。该索引还能提供其他好处，例如按顺序返回数据（例如，在使用 `ORDER
    BY` 的查询中，或者当查询处理器需要添加一些操作如合并连接时）以及聚合操作。让我们先删除该索引：


    ```sql

    DROP INDEX SalesOrderDetail.IX_ProductID

    ```


    运行以下查询：


    ```sql

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    ORDER BY ProductID

    ```


    如图 9-5 所示，为了提供所需的顺序，必须添加一个开销很大的排序操作。


    ![图 9-5: 带有排序操作的执行计划](images/393702_2_En_9_Chapter/393702_2_En_9_Fig5_HTML.jpg)


    重新创建索引：


    ```sql

    CREATE NONCLUSTERED INDEX IX_ProductID

    ON SalesOrderDetail (ProductID)

    ```


    再次运行查询将创建一个非常简单的计划，仅使用已创建的索引，无需排序操作。如图 9-6 所示。


    ![图 9-6: 利用索引获取已排序数据的执行计划](images/393702_2_En_9_Chapter/393702_2_En_9_Fig6_HTML.jpg)


    在这种情况下，由于数据已经排序，因此不需要排序操作。只需要进行索引扫描，因为我们需要所有行。如果您查看执行计划，该操作的 `Ordered` 属性将显示为
    `True`，这意味着它正在利用数据已经有序这一事实。


    该索引也将用于以下查询，按 `ProductID` 聚合数据，否则将需要表扫描和哈希聚合。生成的计划只会扫描非聚集索引，并执行一个称为流聚合的简单聚合，利用数据已经排序的事实。索引扫描操作符的
    `Ordered` 属性再次为 `True`。


    ```sql

    SELECT ProductID, COUNT(*) FROM SalesOrderDetail

    GROUP BY ProductID

    ```


    总之，本节展示了如何使用索引来执行以下操作：


    1.  快速查找过滤谓词的数据（使用 `WHERE` 子句）

    2.  按顺序返回数据（使用 `ORDER BY` 子句）

    3.  聚合数据（使用 `GROUP BY` 子句）


    ## 连接谓词的索引建议


    对于连接谓词，一个好的索引建议是什么？尽管查询优化器可以就连接的索引做出几种不同的决策，但数据库管理员通常可以关注两个主要选择：连接整个表或连接表并附加筛选条件。


    1.  **连接整个表**：在这种情况下，由于无论如何都要扫描整个表，索引的相关性较低，可能不会被使用。

    2.  **连接两个表并附加筛选条件**：索引在这里至关重要，因为连接谓词上的索引有助于高选择性的查询。一个索引可用于通过过滤谓词快速查找行，而额外的索引可用于根据连接谓词在第二个表中查找匹配的行。同样，查询选择性和成本估算会影响查询优化器的决策。


    例如，运行以下查询将创建如图 9-7 所示的计划：


    ```sql

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 898

    ```


    ![图 9-7: 针对带有高选择性谓词的两表连接优化的执行计划](images/393702_2_En_9_Chapter/393702_2_En_9_Fig7_HTML.jpg)


    这是一个非常高效的计划。`IX_ProductID` 索引用于高效地找到 `ProductID` 为 898 的九行数据，并且需要九次额外的键查找来从同一表中获取剩余的列。一旦我们在
    `SalesOrderDetail` 上获得了这九行，就可以使用索引（在本例中是聚集索引）高效地在主表 `SalesOrderHeader` 中找到九个匹配的行（假设它们存在）。


    然而，将谓词改为选择性较低的条件将产生完全不同的计划（参见图 9-8）。


    ```sql

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 870

    ```


    ![图 9-8: 针对低选择性谓词的两表连接执行计划](images/393702_2_En_9_Chapter/393702_2_En_9_Fig8_HTML.jpg)


    该计划现在使用了两个表扫描，如图 9-8 所示，但请记住，您更可能使用存储过程来重用计划。因此，在这种情况下，其中一个计划将被所有提供参数的实例重用。这也是一个可能推荐两个或更多索引的场景，但您可能已经注意到，缺失索引功能仅为特定查询执行一次推荐一个索引。如果您检查执行计划的
    XML 版本或缺失索引 DMV，情况也是如此。


    接下来，我将展示一个使用 `INDEX` 查询提示的查询。如前所述，如果删除该索引，查询将失败。请记住，这是一个可能出现的场景，因为索引维护常常与代码维护分开进行。如果您使用
    `INDEX` 提示，应该记录它们或在删除索引之前研究其可能的使用位置。例如，之前我们尝试了以下查询来在查询优化器未选择时强制使用 `ProductID`
    索引：


    ```sql

    SELECT * FROM SalesOrderDetail

    WITH (INDEX (IX_ProductID))

    WHERE ProductID = 870

    ```


    删除我们为 `ProductID` 列创建的索引：


    ```sql

    DROP INDEX SalesOrderDetail.IX_ProductID

    ```


    现在尝试运行之前的 `SELECT` 语句将会失败，并返回以下错误消息：


    ```sql

    Msg 308, Level 16, State 1, Line 1

    Index ''IX_ProductID'' on table ''SalesOrderDetail'' (specified in the FROM clause)
    does not exist.

    ```


    ## 检查索引深度


    最后，让我们看一下索引深度属性，它显示了索引的层级数，也可以粗略地告诉您索引在查找特定行时使用的页面数量。您可以使用 `sys.dm_db_index_physical_stats`
    DMV，如下所示。这次让我们针对 AdventureWorks2017 数据库运行这个练习：


    ```sql

    SELECT name, index_depth, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats(DB_ID (),

    OBJECT_ID (''Sales.SalesOrderDetail''), null, null, null) s

    JOIN sys.indexes i

    ON s.index_id = i.index_id

    WHERE name in (''IX_SalesOrderDetail_ProductID'',

    ''PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID'')

    ```


    您也可以使用 `INDEXPROPERTY` 函数的 `IndexDepth` 属性来获得相同的结果：


    ```sql

    SELECT INDEXPROPERTY(OBJECT_ID(''Sales.SalesOrderDetail''),

    ''IX_SalesOrderDetail_ProductID'', ''IndexDepth'')

    SELECT INDEXPROPERTY(OBJECT_ID(''Sales.SalesOrderDetail''),

    ''PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID'', ''IndexDepth'')

    ```


    在这两种情况下，聚集索引 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 的深度为 3，而非聚集索引
    `IX_SalesOrderDetail_ProductID` 的深度为 2。类似地，您可以使用以下语句来测量查询使用的页面数量：


    ```sql

    SET STATISTICS IO ON

    ```


    如果您运行以下使用聚集索引查找（遍历索引 b 树）的语句，查看“消息”选项卡，您会看到三次逻辑读取：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID = 43659 AND SalesOrderDetailID = 1

    ```


    在类似的练习中，要查看以下查询所示的非聚集索引查找所使用的逻辑页数，您会看到两次逻辑读取：


    ```sql

    SELECT ProductID FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```'
  raw: 'We have just covered filter predicates and will cover join predicates shortly,
    but let’s first see some other good uses of the index we have just created. This
    index can provide some other benefits like returning its data in order (e.g.,
    on a query using `ORDER BY` or when the query processor needs to add some operations
    like a merge join) and aggregations. Let’s drop the index:


    ```

    DROP INDEX SalesOrderDetail.IX_ProductID

    ```


    Run the following query:


    ```

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    ORDER BY ProductID

    ```


    As you can see in Figure [9-5](#393702_2_En_9_Chapter.xhtml#Fig5), an expensive
    sort operation has to be added to provide the required order.


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig5_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Plan with a sort operation


    Create the index again:


    ```

    CREATE NONCLUSTERED INDEX IX_ProductID

    ON SalesOrderDetail (ProductID)

    ```


    Running the query again will create a very simple plan using only the created
    index with no need for a sort operation. This is shown in Figure [9-6](#393702_2_En_9_Chapter.xhtml#Fig6).


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig6_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Plan using an index to get sorted data


    No sort operation is required in this case as the data is already sorted. Just
    an index scan is needed, as we need all the rows. The `Ordered` property of the
    operation, if you look at the execution plan, will show True, meaning that it
    is taking advantage of the fact that the data is already ordered.


    The index will also be used for the following query, aggregating data by ProductID,
    which otherwise would require a table scan and a hash aggregation. The resulting
    plan would just scan the nonclustered index and would do a simple aggregation
    called stream aggregation, taking advantage of the fact that the data is already
    sorted. The `Ordered` property is again True on the index scan operator.


    ```

    SELECT ProductID, COUNT(*) FROM SalesOrderDetail

    GROUP BY ProductID

    ```


    In summary, this section showed how to use an index to do the following:


    1.  Quickly find data on a filter predicate (using the `WHILE` clause)


    2.  Return data in order (using the `ORDER BY` clause)


    3.  Aggregate data (using the `GROUP BY` clause)


    What would be a good index recommendation for a join predicate? Although the query
    optimizer can take several different decisions about indexes for joins, usually
    the database administrator can focus on two main choices: joining the entire tables
    or joining the tables plus additional filters.


    1.  Joining the entire tables: In this case, since the entire tables are scanned
    anyway, indexes are less relevant and might not be used.


    2.  Joining both tables plus additional filters: Indexing is essential here as
    indexes on join predicates help on queries with high selectivity. An index could
    be used to quickly find the rows by a filter predicate, and additional indexes
    could be used to find the rows that match on the second table according to the
    join predicate. Again, query selectivity and cost estimation impact the query
    optimizer decision.


    For example, running the following query will create the plan shown in Figure
    [9-7](#393702_2_En_9_Chapter.xhtml#Fig7):


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig7_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Plan optimized for joining two tables with a high selective predicate


    ```

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 898

    ```


    This is a very efficient plan. The `IX_ProductID` index is used to efficiently
    find the nine rows for the ProductID 898, and nine additional key lookups are
    needed to obtain the remaining columns from the same table. Once we get the nine
    rows on `SalesOrderDetail`, we can use an index (in this case, the clustered index)
    to efficiently find the nine matching rows on the master table, `SalesOrderHeader`,
    assuming they exist.


    However, changing to a less selective predicate would produce a totally different
    plan. (See Figure [9-8](#393702_2_En_9_Chapter.xhtml#Fig8).)


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig8_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Plan joining two tables for a predicate with low selectivity


    ```

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 870

    ```


    The plan now uses two table scans, as shown in Figure [9-8](#393702_2_En_9_Chapter.xhtml#Fig8),
    but remember it is more likely that you will be using stored procedures to reuse
    plans. Consequently, in this case, one of these plans would be reused for all
    the instances of the provided parameter. This is also a scenario where two or
    more indexes could have been recommended, but you may have noticed that the missing
    indexes feature only recommends one index at a time for a specific query execution.
    This is also true if you would inspect the XML version of the execution plan or
    the missing indexes DMV.


    Next, I’ll show you a query using the `INDEX` query hint. As mentioned earlier,
    if you drop such an index, the query will fail. Keep in mind that it is a possible
    scenario as many times the maintenance of indexes is separated to the maintenance
    of code. If you are using `INDEX` hints, you should document them or research
    where an index may be used before it is removed. For example, earlier we tried
    the following query to force the use of the ProductID when the query optimizer
    was not selecting it:


    ```

    SELECT * FROM SalesOrderDetail

    WITH (INDEX (IX_ProductID))

    WHERE ProductID = 870

    ```


    Drop the index we created for the `ProductID` column:


    ```

    DROP INDEX SalesOrderDetail.IX_ProductID

    ```


    Trying to run the previous `SELECT` statement will now fail and instead will return
    the following error message:


    ```

    Msg 308, Level 16, State 1, Line 1

    Index ''IX_ProductID'' on table ''SalesOrderDetail'' (specified in the FROM clause)
    does not exist.

    ```


    Finally, let’s take a look at the index depth property, which shows the number
    of levels of an index and can also roughly tell you the number of pages an index
    uses to find a specific row. You could use the `sys.dm_db_index_physical_stats`
    DMV as shown next. Let’s run this exercise this time against the AdventureWorks2017
    database:


    ```

    SELECT name, index_depth, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats(DB_ID (),

    OBJECT_ID (''Sales.SalesOrderDetail''), null, null, null) s

    JOIN sys.indexes i

    ON s.index_id = i.index_id

    WHERE name in (''IX_SalesOrderDetail_ProductID'',

    ''PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID'')

    ```


    You can also use the `IndexDepth` property of the `INDEXPROPERTY` function to
    get the same results:


    ```

    SELECT INDEXPROPERTY(OBJECT_ID(''Sales.SalesOrderDetail''),

    ''IX_SalesOrderDetail_ProductID'', ''IndexDepth'')

    SELECT INDEXPROPERTY(OBJECT_ID(''Sales.SalesOrderDetail''),

    ''PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID'', ''IndexDepth'')

    ```


    In both cases, we will have a depth of 3 for the clustered index `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    and 2 for the nonclustered index `IX_SalesOrderDetail_ProductID`. In a similar
    way, you can measure the number of pages used by a query using the following statement:


    ```

    SET STATISTICS IO ON

    ```


    If you run the following statement, which uses a clustered index seek navigating
    the index b-tree, you could see three logical reads if you look at the Messages
    tab:


    ```

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID = 43659 AND SalesOrderDetailID = 1

    ```


    In a similar exercise, to see the logical pages used by an index seek of the listed
    nonclustered index like in the following query, you would see two logical reads:


    ```

    SELECT ProductID FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```'
  trans: '## 索引的其他用途


    我们刚刚介绍了过滤谓词，稍后将介绍连接谓词，但让我们先看看刚刚创建的索引的其他一些好用法。该索引还能提供其他好处，例如按顺序返回数据（例如，在使用 `ORDER
    BY` 的查询中，或者当查询处理器需要添加一些操作如合并连接时）以及聚合操作。让我们先删除该索引：


    ```sql

    DROP INDEX SalesOrderDetail.IX_ProductID

    ```


    运行以下查询：


    ```sql

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    ORDER BY ProductID

    ```


    如图 9-5 所示，为了提供所需的顺序，必须添加一个开销很大的排序操作。


    ![图 9-5: 带有排序操作的执行计划](img/393702_2_En_9_Fig5_HTML.jpg)


    重新创建索引：


    ```sql

    CREATE NONCLUSTERED INDEX IX_ProductID

    ON SalesOrderDetail (ProductID)

    ```


    再次运行查询将创建一个非常简单的计划，仅使用已创建的索引，无需排序操作。如图 9-6 所示。


    ![图 9-6: 利用索引获取已排序数据的执行计划](img/393702_2_En_9_Fig6_HTML.jpg)


    在这种情况下，由于数据已经排序，因此不需要排序操作。只需要进行索引扫描，因为我们需要所有行。如果您查看执行计划，该操作的 `Ordered` 属性将显示为
    `True`，这意味着它正在利用数据已经有序这一事实。


    该索引也将用于以下查询，按 `ProductID` 聚合数据，否则将需要表扫描和哈希聚合。生成的计划只会扫描非聚集索引，并执行一个称为流聚合的简单聚合，利用数据已经排序的事实。索引扫描操作符的
    `Ordered` 属性再次为 `True`。


    ```sql

    SELECT ProductID, COUNT(*) FROM SalesOrderDetail

    GROUP BY ProductID

    ```


    总之，本节展示了如何使用索引来执行以下操作：


    1.  快速查找过滤谓词的数据（使用 `WHERE` 子句）

    2.  按顺序返回数据（使用 `ORDER BY` 子句）

    3.  聚合数据（使用 `GROUP BY` 子句）


    ## 连接谓词的索引建议


    对于连接谓词，一个好的索引建议是什么？尽管查询优化器可以就连接的索引做出几种不同的决策，但数据库管理员通常可以关注两个主要选择：连接整个表或连接表并附加筛选条件。


    1.  **连接整个表**：在这种情况下，由于无论如何都要扫描整个表，索引的相关性较低，可能不会被使用。

    2.  **连接两个表并附加筛选条件**：索引在这里至关重要，因为连接谓词上的索引有助于高选择性的查询。一个索引可用于通过过滤谓词快速查找行，而额外的索引可用于根据连接谓词在第二个表中查找匹配的行。同样，查询选择性和成本估算会影响查询优化器的决策。


    例如，运行以下查询将创建如图 9-7 所示的计划：


    ```sql

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 898

    ```


    ![图 9-7: 针对带有高选择性谓词的两表连接优化的执行计划](img/393702_2_En_9_Fig7_HTML.jpg)


    这是一个非常高效的计划。`IX_ProductID` 索引用于高效地找到 `ProductID` 为 898 的九行数据，并且需要九次额外的键查找来从同一表中获取剩余的列。一旦我们在
    `SalesOrderDetail` 上获得了这九行，就可以使用索引（在本例中是聚集索引）高效地在主表 `SalesOrderHeader` 中找到九个匹配的行（假设它们存在）。


    然而，将谓词改为选择性较低的条件将产生完全不同的计划（参见图 9-8）。


    ```sql

    SELECT * FROM SalesOrderDetail d

    JOIN SalesOrderHeader h

    ON d.SalesOrderID = h.SalesOrderID

    WHERE ProductID = 870

    ```


    ![图 9-8: 针对低选择性谓词的两表连接执行计划](img/393702_2_En_9_Fig8_HTML.jpg)


    该计划现在使用了两个表扫描，如图 9-8 所示，但请记住，您更可能使用存储过程来重用计划。因此，在这种情况下，其中一个计划将被所有提供参数的实例重用。这也是一个可能推荐两个或更多索引的场景，但您可能已经注意到，缺失索引功能仅为特定查询执行一次推荐一个索引。如果您检查执行计划的
    XML 版本或缺失索引 DMV，情况也是如此。


    接下来，我将展示一个使用 `INDEX` 查询提示的查询。如前所述，如果删除该索引，查询将失败。请记住，这是一个可能出现的场景，因为索引维护常常与代码维护分开进行。如果您使用
    `INDEX` 提示，应该记录它们或在删除索引之前研究其可能的使用位置。例如，之前我们尝试了以下查询来在查询优化器未选择时强制使用 `ProductID`
    索引：


    ```sql

    SELECT * FROM SalesOrderDetail

    WITH (INDEX (IX_ProductID))

    WHERE ProductID = 870

    ```


    删除我们为 `ProductID` 列创建的索引：


    ```sql

    DROP INDEX SalesOrderDetail.IX_ProductID

    ```


    现在尝试运行之前的 `SELECT` 语句将会失败，并返回以下错误消息：


    ```sql

    Msg 308, Level 16, State 1, Line 1

    Index ''IX_ProductID'' on table ''SalesOrderDetail'' (specified in the FROM clause)
    does not exist.

    ```


    ## 检查索引深度


    最后，让我们看一下索引深度属性，它显示了索引的层级数，也可以粗略地告诉您索引在查找特定行时使用的页面数量。您可以使用 `sys.dm_db_index_physical_stats`
    DMV，如下所示。这次让我们针对 AdventureWorks2017 数据库运行这个练习：


    ```sql

    SELECT name, index_depth, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats(DB_ID (),

    OBJECT_ID (''Sales.SalesOrderDetail''), null, null, null) s

    JOIN sys.indexes i

    ON s.index_id = i.index_id

    WHERE name in (''IX_SalesOrderDetail_ProductID'',

    ''PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID'')

    ```


    您也可以使用 `INDEXPROPERTY` 函数的 `IndexDepth` 属性来获得相同的结果：


    ```sql

    SELECT INDEXPROPERTY(OBJECT_ID(''Sales.SalesOrderDetail''),

    ''IX_SalesOrderDetail_ProductID'', ''IndexDepth'')

    SELECT INDEXPROPERTY(OBJECT_ID(''Sales.SalesOrderDetail''),

    ''PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID'', ''IndexDepth'')

    ```


    在这两种情况下，聚集索引 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 的深度为 3，而非聚集索引
    `IX_SalesOrderDetail_ProductID` 的深度为 2。类似地，您可以使用以下语句来测量查询使用的页面数量：


    ```sql

    SET STATISTICS IO ON

    ```


    如果您运行以下使用聚集索引查找（遍历索引 b 树）的语句，查看“消息”选项卡，您会看到三次逻辑读取：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID = 43659 AND SalesOrderDetailID = 1

    ```


    在类似的练习中，要查看以下查询所示的非聚集索引查找所使用的逻辑页数，您会看到两次逻辑读取：


    ```sql

    SELECT ProductID FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```'
- fmt: '## The Missing Indexes Feature


    ### Feature Overview


    We have already seen the missing indexes feature in action. Let’s use this section
    to summarize what the missing indexes feature is and also take a look at the missing
    indexes DMVs. Basically, the missing indexes feature is a database engine behavior
    enabled by default as a result of the query optimizer analyzing which indexes
    would benefit the current query being optimized. During this process, the query
    optimizer estimates if an index would benefit the performance of the query if
    it existed and provides this information in the execution plan. In addition, SQL
    Server is keeping this information on the missing indexes DMVs. But, then again,
    remember this is an estimation and has some of the following limitations, some
    of which were demonstrated earlier:


    1.  It does not work for a trivial plan.

    2.  It does not recommend clustered indexes or filtered indexes.

    3.  The missing indexes DMVs can collect information only up to about 500 index
    groups.

    4.  Data on the DMVs is not persisted.

    5.  It is not an index tuning tool.


    Looking at the missing index information in the XML plan can be complicated. Fortunately,
    SQL Server Management Studio can help you assemble the `CREATE INDEX` statements
    for the recommended indexes, as shown earlier.


    ### Missing Index DMVs


    In summary, the missing indexes DMVs are the following:


    *   `sys.dm_db_missing_index_group_stats`: Returns summary information regarding
    missing index groups

    *   `sys.dm_db_missing_index_groups`: Returns information regarding a specific
    group of missing indexes

    *   `sys.dm_db_missing_index_details`: Returns detailed information regarding
    a missing index

    *   `sys.dm_db_missing_index_columns`: Returns information regarding the database
    table columns that are missing an index


    ### Using the Missing Index DMVs


    To give you a quick tour on how to use the missing indexes DMVs, let’s follow
    this exercise. Create a new test database and run these statements again to have
    some data to play with:


    ```sql

    SELECT *

    INTO dbo.SalesOrderDetail

    FROM AdventureWorks2017.Sales.SalesOrderDetail

    GO

    SELECT *

    INTO dbo.SalesOrderHeader

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    ```


    Since by using such a simple table and schema we can hit once again the trivial
    plan limitation, let’s use the undocumented trace flag `8758` one more time. (Remember
    never to use this trace flag in a production environment.)


    ```sql

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    OPTION (QUERYTRACEON 8757)

    ```


    Your execution plan shows a recommendation as indicated earlier in this chapter.
    But this time we will take a look from the data collected on the missing indexes
    DMVs. Run the following query:


    ```sql

    SELECT g.*, statement, column_id, column_name, column_usage

    FROM sys.dm_db_missing_index_details AS d

    CROSS APPLY sys.dm_db_missing_index_columns(d.index_handle)

    INNER JOIN sys.dm_db_missing_index_groups AS g

    ON g.index_handle = d.index_handle

    WHERE d.database_id = DB_ID()

    ORDER BY g.index_group_handle, g.index_handle, column_id

    ```


    Notice we are filtering on the current database, so we would want to run this
    query connected to the test database. A lot of information may be returned for
    other databases in your instance without such a filter. Missing index information
    in index groups will be returned, and, since we just created the test database,
    there is only one index group now. The information for this index group is the
    same information that we can see in the graphical or XML plan. An abbreviated
    output to fit the page that shows the column information for the existing index
    group is next. The `column_usage` column will show how the column is used by the
    query and may contain the values `EQUALITY`, `INEQUALITY`, and `INCLUDE`. This
    can help you to build the `CREATE INDEX` statement for the recommended index,
    but remember, SQL Server Management Studio can do that for you too.


    | **Statement** | **column_id** | **column_name** | **column_usage** |

    | --- | --- | --- | --- |

    | [test].[dbo].[SalesOrderDetail] | 1 | SalesOrderID | INCLUDE |

    | [test].[dbo].[SalesOrderDetail] | 2 | SalesOrderDetailID | INCLUDE |

    | [test].[dbo].[SalesOrderDetail] | 3 | CarrierTrackingNumber | INCLUDE |

    | [test].[dbo].[SalesOrderDetail] | 4 | OrderQty | INCLUDE |

    | [test].[dbo].[SalesOrderDetail] | 5 | ProductID | EQUALITY |

    | [test].[dbo].[SalesOrderDetail] | 6 | SpecialOfferID | INCLUDE |


    The following query will use the `sys.dm_db_missing_index_group_stats` DMV to
    return additional performance information about the missing indexes:


    ```sql

    SELECT d.*, s.*

    FROM sys.dm_db_missing_index_group_stats AS s

    INNER JOIN sys.dm_db_missing_index_groups AS g

    ON s.group_handle = g.index_group_handle

    INNER JOIN sys.dm_db_missing_index_details AS d

    ON g.index_handle = d.index_handle

    WHERE d.database_id = DB_ID()

    ```


    Among this information, we have the column `avg_user_impact`, which is also shown
    on SQL Server Management Studio as Impact and in this case has the value `99.31`.
    `avg_user_impact` is the average percentage benefit that user queries will gain
    if the missing index group were implemented. This value is based on the query
    cost, and as such it does not represent any specific unit.


    Run the next query:


    ```sql

    SELECT * FROM SalesOrderDetail

    WHERE OrderQty = 1

    OPTION (QUERYTRACEON 8757)

    ```


    Running the previous queries to display information about the missing indexes
    DMVs will show a second `index_group_handle` with details about creating an index
    for the `OrderQty` column and include several other columns of the table. The
    second `SELECT` query in this exercise will show an `avg_user_impact` of `96.97`,
    along with other performance information. SQL Server will continue to accumulate
    this information until the limit of 500 missing index groups is reached.


    ### Conclusion


    Finally, when you consider the limitations of the missing indexes feature, keep
    in mind that this information is always available. It does not have any performance
    impact, and you don’t have to do any additional effort to obtain it. Even if you
    don’t plan to apply any of its recommendations, consider it as a warning that
    maybe it is time to review your index strategy, at least for the current execution
    plan you are working with.


    > **Note**

    > There is a documented SQL Server startup option that can be used to disable
    the missing indexes feature, but I am not aware of collecting this data being
    a problem or anyone ever needing to use it.'
