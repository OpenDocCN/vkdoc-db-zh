    *   Distributed partitioned views


    *   Parallel index operations


    *   Automatic use of indexed views by the query optimizer


    *   Parallel consistent check


    *   Star join query optimizations


    *   Global batch aggregation


    *   Always On availability groups (see the following note)


    *   Online index create and rebuild


    *   Resumable online index rebuilds


    *   Fast recovery


    Note


    SQL Server Standard edition provides Basic Always On availability groups which
    support a failover environment for a single database and a single replica. Basic
    availability groups are intended to replace the deprecated database mirroring
    feature and provide a similar level of feature support.


    ## Memory Configuration


    SQL Server can automatically and dynamically manage memory without any change
    to the default memory configuration. This can work perfectly fine most of the
    time when SQL Server is installed as a single instance on a dedicated server.
    In this case, you could leave the default settings of max server memory and min
    server memory, as no other application or server component is competing for the
    server memory. SQL Server is designed to dynamically allocate memory only when
    needed and, in order to avoid the operating system to page memory to disk, release
    it if not much is available. If you are targeting for a high performance SQL Server
    installation, it is strictly recommended to have a server dedicated just for your
    production SQL Server instance, as other applications or components on the same
    server may compete for memory and other server resources.


    However, in some cases, you may want to tune the memory configuration for some
    specific cases—for example, if you want to restrict the memory available to SQL
    Server or if you are seeing memory problems. Configuring memory using these settings
    is essential if you are using more than one instance of SQL Server, but, then
    again, multiple instances are not recommended for a high performance production
    installation. In order to estimate the max server memory, you should consider
    how much memory is needed by the operating system and other required server components,
    if any. As documented on [`https://msdn.microsoft.com/en-us/library/ms178067.aspx`](https://msdn.microsoft.com/en-us/library/ms178067.aspx),
    max server memory accounts for the following :


    1.  Buffer pool memory


    2.  All caches


    3.  Memory grants


    4.  Compile memory


    5.  Lock manager memory


    6.  CLR memory


    It also accounts for basically any memory clerk defined on `sys.dm_os_memory_clerks`.
    Memory not controlled by the max server memory configuration setting includes
    the following:


    1.  Memory heaps


    2.  Linked server providers other than SQL Server


    3.  Thread stacks


    4.  Non-SQL Server DLLs


    Max server memory is the high-water mark, and, except as indicated next, SQL Server
    cannot use more memory than the specified value on this configuration setting.
    Starting with the 2012 release, SQL Server might allocate more memory than the
    configured value for max server memory when there is insufficient contiguous free
    memory because of memory fragmentation. SQL Server can perform overcommitment
    instead of rejecting the memory request and, by doing that, briefly exceeding
    the configured max server memory setting.


    When configuring min server memory, SQL Server does not immediately allocate all
    the minimum memory. As before, it will only allocate more memory when its workload
    requires it. But once the min server memory is reached, memory is never released
    under that point.


    For example, to configure the max memory to 492 GB, you could run the following
    statements:


    ```

    sp_configure ''max server memory'', 503808

    GO

    RECONFIGURE

    ```


    To get back to its default, run the following:


    ```

    sp_configure ''max server memory'', 2147483647

    GO

    RECONFIGURE

    ```


    You can use the `sys.dm_os_sys_info` and `sys.dm_os_process_memory` DMV to get
    general information about the memory in the system. Some other memory configuration
    choices are 32-bit related, but this architecture is currently disappearing. In
    fact, SQL Server 2016 was the first database engine release to be no longer available
    for the 32-bit architecture. Another SQL Server architecture, Itanium, was also
    deprecated with SQL Server 2008 R2 and Windows Server 2008 R2 a few years ago
    .


    ## Lock Pages in Memory


    Lock Pages in Memory is a Windows policy that prevents the operating system from
    paging data in physical memory to disk, which is usually an expensive operation.
    Although this configuration option may be less relevant than earlier versions,
    it is still available in all the latest versions of SQL Server. While trace flag
    845 was required in the Standard edition of SQL Server 2012 and other older versions,
    it is not needed for later versions of the product. Trace flag 845 was never required
    for the Enterprise edition of SQL Server.


    To enable Lock Pages in Memory, you need to enable the policy with the same name
    for the service account used by the SQL Server database engine using the Windows
    group policy tool (`gpedit.msc`). For details on how to perform this, see [`https://msdn.microsoft.com/en-us/library/ms190730.aspx`](https://msdn.microsoft.com/en-us/library/ms190730.aspx).'
  trans: '

    ## SQL Server 企业版


    如果您正在为数据库和应用程序寻求最佳性能，您需要使用 SQL Server 的企业版。位于 [`https://docs.microsoft.com/en-us/sql/sql-server/editions-and-components-of-sql-server-version-15`](https://docs.microsoft.com/en-us/sql/sql-server/editions-and-components-of-sql-server-version-15)
    的文档 "SQL Server 2019 (15.x) 的版本和支持的功能" 比较了 SQL Server 2019 各个版本支持的可扩展性限制和功能。您也可以从这些页面访问
    SQL Server 2017 及其他旧版本的相同文档。


    SQL Server 企业版支持操作系统支持的所有内存和处理器。对于 Windows Server 2016 标准版或数据中心版，这意味着 SQL Server
    最多可使用 24 TB 内存和 512 个核心。对于 Windows Server 2019 标准版或数据中心版，它最高可支持 24 TB 内存和无限数量的核心。另一方面，SQL
    Server 标准版将被限制为最多 4 个插槽或 24 个核心以及 128 GB 内存。


    如第 2 章所述，从 SQL Server 2016 Service Pack 1 开始，一些曾经仅限企业版的功能现已在产品的所有版本中可用。这些功能包括内存中
    OLTP、列存储索引、数据库快照、压缩、分区、Always Encrypted、行级安全、动态数据屏蔽和变更数据捕获等。


    如您在前一份文档中所见，仍有大量功能仅在 SQL Server 企业版中可用。仅列举最重要的部分，特别是从性能角度考虑，我们有：


    *   资源调控器

    *   联机非聚集列存储索引重新生成

    *   内存优化的 tempdb 元数据

    *   分区表并行处理

    *   NUMA 感知和大页面内存及缓冲区数组分配

    *   预读

    *   高级扫描

    *   自动调优

    *   行存储的批处理模式

    *   行模式内存授予反馈

    *   批处理模式自适应联接

    *   批处理模式内存授予反馈

    *   分布式分区视图

    *   并行索引操作

    *   查询优化器自动使用索引视图

    *   并行一致性检查

    *   星型联接查询优化

    *   全局批处理聚合

    *   Always On 可用性组（请参阅以下注释）

    *   联机索引创建和重新生成

    *   可恢复的联机索引重新生成

    *   快速恢复


    > **注意**

    > SQL Server 标准版提供基本的 Always On 可用性组，支持单个数据库和单个副本的故障转移环境。基本可用性组旨在取代已弃用的数据库镜像功能，并提供类似级别的功能支持。


    ## 内存配置


    SQL Server 可以自动动态地管理内存，无需更改默认内存配置。当 SQL Server 作为单一实例安装在专用服务器上时，这在大多数情况下可以完美运行。在这种情况下，您可以保留
    `max server memory` 和 `min server memory` 的默认设置，因为没有其他应用程序或服务器组件在竞争服务器内存。SQL Server
    设计为仅在需要时动态分配内存，并且为了防止操作系统将内存分页到磁盘，如果可用内存不多，则会释放内存。如果您追求高性能 SQL Server 安装，强烈建议使用专用服务器来托管您的生产
    SQL Server 实例，因为同一服务器上的其他应用程序或组件可能会竞争内存和其他服务器资源。


    然而，在某些情况下，您可能需要为特定情况调整内存配置——例如，如果您想限制 SQL Server 可用的内存，或者您遇到了内存问题。如果您使用多个 SQL
    Server 实例，使用这些设置配置内存至关重要，但再次强调，对于高性能生产安装，不建议使用多个实例。为了估算 `max server memory`，您应该考虑操作系统和其他必需的服务器组件（如果有）需要多少内存。如
    [`https://msdn.microsoft.com/en-us/library/ms178067.aspx`](https://msdn.microsoft.com/en-us/library/ms178067.aspx)
    所述，`max server memory` 计算以下内容：


    1.  缓冲池内存

    2.  所有缓存

    3.  内存授予

    4.  编译内存

    5.  锁管理器内存

    6.  CLR 内存


    它还计算基本上在 `sys.dm_os_memory_clerks` 上定义的所有内存 clerk。不受 `max server memory` 配置设置控制的内存包括以下内容：


    1.  内存堆

    2.  除 SQL Server 外的链接服务器提供程序

    3.  线程堆栈

    4.  非 SQL Server DLL


    `Max server memory` 是高水位标记，除下述情况外，SQL Server 不能使用超过此配置设置中指定值的内存。从 2012 版本开始，当由于内存碎片导致没有足够的连续可用内存时，SQL
    Server 可能会分配超过为 `max server memory` 配置的值。SQL Server 可以执行超额分配，而不是拒绝内存请求，通过这样做，会短暂超过配置的
    `max server memory` 设置。


    在配置 `min server memory` 时，SQL Server 不会立即分配所有最小内存。和之前一样，只有当其工作负载需要时，它才会分配更多内存。但是一旦达到
    `min server memory`，内存永远不会释放到低于该点。


    例如，要将 `max memory` 配置为 492 GB，您可以运行以下语句：


    ```sql

    sp_configure ''max server memory'', 503808

    GO

    RECONFIGURE

    ```


    要恢复为其默认值，请运行以下语句：


    ```sql

    sp_configure ''max server memory'', 2147483647

    GO

    RECONFIGURE

    ```


    您可以使用 `sys.dm_os_sys_info` 和 `sys.dm_os_process_memory` DMV 来获取有关系统内存的常规信息。其他一些内存配置选择与
    32 位相关，但目前这种架构正在消失。实际上，SQL Server 2016 是第一个不再提供 32 位架构的数据库引擎版本。另一个 SQL Server
    架构，安腾（Itanium），也在几年前随 SQL Server 2008 R2 和 Windows Server 2008 R2 一起被弃用。


    ## 在内存中锁定页面


    在内存中锁定页面是 Windows 的一项策略，可防止操作系统将物理内存中的数据分页到磁盘，这通常是一项开销很大的操作。尽管此配置选项可能不如早期版本相关，但它在所有最新版本的
    SQL Server 中仍然可用。虽然在 SQL Server 2012 标准版和其他旧版本中需要跟踪标志 845，但后续版本的产品则不需要。SQL Server
    企业版从来不需要跟踪标志 845。


    要启用在内存中锁定页面，您需要使用 Windows 组策略工具 (`gpedit.msc`) 为 SQL Server 数据库引擎使用的服务帐户启用同名策略。有关如何执行此操作的详细信息，请参阅
    [`https://msdn.microsoft.com/en-us/library/ms190730.aspx`](https://msdn.microsoft.com/en-us/library/ms190730.aspx)。

    '
- fmt: '## backup compression default


    The backup compression default is another interesting option that can be helpful
    to compress your database backups, and it is disabled by default. Although compressing
    SQL Server backups may have some overhead for processor usage, it will minimize
    I/O, increasing the backup speed in addition to saving disk space. Optionally,
    you can set compression at the backup level using the `COMPRESSION` set option
    of the `DATABASE BACKUP` statement, but it is recommended to have it as a server
    default.


    Backup compression was introduced with SQL Server 2008, and it is currently only
    available on the Enterprise and Standard editions.


    ## query governor cost limit


    The “query governor cost limit” configuration option allows you to define the
    cost limit of a query executed in your SQL Server instance, where cost limit refers
    to the estimated cost of the execution plan. You can also get the same behavior
    on a per-connection basis using the `SET QUERY_GOVERNOR_COST_LIMIT` statement.


    For example, briefly change the query governor cost limit to 20 by running the
    following statements:


    ```

    sp_configure ''query governor cost limit'', 20

    RECONFIGURE

    ```


    Trying to run an expensive query like the following will result in the error message
    "The query has been canceled because the estimated cost of this query (%d) exceeds
    the configured threshold of %d":


    ```

    SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2

    ```


    Don’t forget to set back the configuration to its default value:


    ```

    sp_configure ''query governor cost limit'', 0

    RECONFIGURE

    ```


    ## blocked process threshold


    The blocked process threshold is a useful configuration option that you can use
    to specify a threshold in which a blocked process alert should be generated. The
    threshold is specified in seconds, and the default for this configuration option
    is 0, which means that no alert is generated. After this configuration setting
    has been configured, an alert still has to be explicitly defined for some action
    to be taken. Run the following statement to change the blocked process threshold
    to five seconds:


    ```

    sp_configure ''blocked process threshold (s)'', 5

    RECONFIGURE

    ```


    One of the choices available to create an alert is to use the `blocked_process_report`
    extended event and create a session as shown:


    ```

    CREATE EVENT SESSION blocked_process_test ON SERVER

    ADD EVENT sqlserver.blocked_process_report

    GO

    ALTER EVENT SESSION blocked_process_test ON SERVER

    STATE = START

    ```


    After the session has been created and started, it will start capturing events
    every time a process has been blocked for five seconds.


    Don’t forget to set the configuration value back to its default after you finish
    your testing.


    ```

    sp_configure ''blocked process threshold (s)'', 0

    RECONFIGURE

    GO

    ALTER EVENT SESSION blocked_process_test ON SERVER

    STATE = STOP

    GO

    DROP EVENT SESSION blocked_process_test ON SERVER

    ```


    ## Advanced Trace Flags


    In an article published a few years ago called “Tuning Options for SQL Server
    When Running in High-Performance Workloads,” Microsoft documented an interesting
    list of trace flags that can be useful to improve the performance of SQL Server
    when running in high performance workloads. You can find the article at [`https://support.microsoft.com/en-us/kb/920093`](https://support.microsoft.com/en-us/kb/920093),
    and, in this section, I’ll provide a summary of the listed trace flags.


    First of all, these are advanced trace flags that may have secondary effects,
    so they are only recommended after all the traditional tuning choices have been
    exhausted. In addition, since some of these recommendations may be a bit extreme,
    the article warns about evaluating the effects of your workload on a test system
    before a production implementation. The listed trace flags are as follows:


    1.  Using trace flag 652 to disable page prefetching scans, that is, read-ahead
    reads. If you know that your workload can benefit from disabling read-ahead reads,
    this could be a choice that you may want to consider.

    2.  Using trace flag 8744 to disable prefetching for ranges, used by the nested
    loops join operator.

    3.  Using trace flag 661 to disable the ghost record removal process. Enabling
    this trace flag improves performance as deleted records don’t have to be removed,
    but it obviously has an impact on disk usage and the performance of scan operations.

    4.  Using trace flag 834 to enable Windows large page allocations for the memory
    that is allocated for the buffer pool. This trace flag requires the Lock Pages
    in Memory privilege assigned to the SQL Server database engine service account,
    as covered earlier. Currently, columnstore indexes are not supported if you are
    using this trace flag so keep this in mind. Columnstore indexes are covered in
    Chapter [7](#393702_2_En_7_Chapter.xhtml).

    5.  Using trace flag 836 to enable the max server memory option for the buffer
    pool. This trace flag applies only to 32-bit versions of SQL Server, but I really
    hope you are not using that architecture anymore.

    6.  Using trace flag 2301 to enable advanced decision support optimizations. Trace
    flag 2301 is also covered in more detail in the article “Query Processor Modeling
    Extensions in SQL Server 2005 SP1” at [`https://blogs.msdn.microsoft.com/ianjo/2006/04/24/query-processor-modelling-extensions-in-sql-server-2005-sp1/`](https://blogs.msdn.microsoft.com/ianjo/2006/04/24/query-processor-modelling-extensions-in-sql-server-2005-sp1/).

    7.  Using trace flag 8020 to disable working set monitoring.

    8.  Using several trace flags to disable various ring buffers, including 8011
    to disable the resource monitor ring buffer, 8012 to disable the ring buffer for
    schedulers, 8018 to disable the exception ring buffer, and 8019 to disable the
    stack collection for the exception ring buffer. Disabling these ring buffers improves
    the performance of SQL Server, but ironically they also provide diagnostic information
    that can help you to troubleshoot problems. I would not recommend disabling these
    ring buffers, but again this is something you can consider and hopefully only
    on a short-term basis.'
