- fmt: '### system_health Extended Event Session


    The `system_health` session is an extended event session that automatically collects
    system data that can be used to troubleshoot performance problems. It is configured
    by default on every SQL Server installation, and it starts when the instance starts,
    running all the time. Although the `system_health` session can be closed and deleted,
    it is not recommended to do so as its execution does not have any noticeable performance
    impact.


    The `system_health` session collects information about multiple areas (for details,
    see [`https://msdn.microsoft.com/en-us/library/ff877955.aspx`](https://msdn.microsoft.com/en-us/library/ff877955.aspx)),
    and it also captures a number of waits. The following code is a partial definition
    of the SQL Server `system_health` describing the wait types captured and filtering
    out based on the wait duration:


    ```sql

    ADD EVENT sqlos.wait_info(

    ACTION(package0.callstack,sqlserver.session_id,sqlserver.sql_text)

    WHERE ([duration]>(15000) AND ([wait_type]>=N''LATCH_NL'' AND ([wait_type]>=N''PAGELATCH_NL''

    AND [wait_type]=N''PAGEIOLATCH_NL''

    AND [wait_type]=N''IO_COMPLETION'' AND

    [wait_type]=N''FCB_REPLICA_WRITE'' AND [wait_type](30000)

    AND [wait_type](5000) AND ([wait_type]>=N''PREEMPTIVE_OS_GENERICOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_INITIALIZESECURITYCONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_AUTHZGETINFORMATIONFROMCONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_CRYPTACQUIRECONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_NETGROUPGETUSERS'' AND

    [wait_type]=N''PREEMPTIVE_OS_NETVALIDATEPASSWORDPOLICYFREE'' AND

    [wait_type](45000) AND

    ([wait_type]>=N''PREEMPTIVE_OS_SETNAMEDSECURITYINFO'' AND

    [wait_type]=N''PREEMPTIVE_OS_RSFXDEVICEOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_DTCOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_CLOSEHANDLE'' AND

    [wait_type]=N''PREEMPTIVE_OS_GETCOMPRESSEDFILESIZE'' AND

    [wait_type]=N''PREEMPTIVE_OS_DISCONNECTNAMEDPIPE''AND

    [wait_type]<=N''PREEMPTIVE_CLOSEBACKUPMEDIA'' OR

    [wait_type]=N''PREEMPTIVE_OS_AUTHENTICATIONOPS'' OR

    [wait_type]=N''PREEMPTIVE_OS_FREECREDENTIALSHANDLE'' OR

    [wait_type]=N''PREEMPTIVE_OS_AUTHORIZATIONOPS'' OR

    [wait_type]=N''PREEMPTIVE_COM_COCREATEINSTANCE'' OR

    [wait_type]=N''PREEMPTIVE_OS_NETVALIDATEPASSWORDPOLICY'' OR

    [wait_type]=N''PREEMPTIVE_VSS_CREATESNAPSHOT''))))

    ```


    In addition, the `system_health` event session uses `sp_server_diagnostics_component_result`,
    which by itself collects a variety of diagnostic data and health information including
    some waits. For more information about `sp_server_diagnostics_component_result`,
    see [`https://msdn.microsoft.com/en-us/library/ff878233.aspx`](https://msdn.microsoft.com/en-us/library/ff878233.aspx).
    The `sp_server_diagnostics_component_result` is defined as follows :


    ```sql

    ADD EVENT sqlserver.sp_server_diagnostics_component_result(SET collect_data=(1)

    WHERE ([sqlserver].[is_system]=(1) AND [component](4)))

    ```


    Finally, keep in mind that although the `system_health` session collected information
    is captured to both the file and ring buffer targets, it may only hold recent
    events, and it is not persisted but recycled as shown next. You may need to perform
    some additional steps to persist this information to disk.


    ```sql

    ADD TARGET package0.event_file(SET filename=N''system_health.xel'',max_file_size=(5),
    max_rollover_files=(4)),

    ADD TARGET package0.ring_buffer(SET max_events_limit=(5000),max_memory=(4096))

    ```


    The definition shows that the file target has a `max_file_size` , which is the
    maximum file size in megabytes, of 5 MB and `max_rollover_files` or maximum number
    of files to retain in the file system of four, making a maximum of 20 MB of information.
    The file target can be read using the following query:


    ```sql

    SELECT *, CAST(event_data AS XML)

    FROM sys.fn_xe_file_target_read_file(''system_health*.xel'', NULL, NULL, NULL)

    ```


    In the same way, the `system_health` session uses the ring buffer target with
    a `max_events_limit` of 5000, meaning that it will keep to a maximum of 5000 events
    in the ring buffer, and older events will be dropped as this limit is reached.
    It also defines a maximum amount of memory of 4096 kilobytes. By default, the
    oldest events are dropped when these limits are reached, but another configuration
    option, `occurrence_number`, allows you to configure the number of events kept
    before being discarded depending on the event type.


    You can use the following query as a starting point to start inspecting the `system_health`
    session captured information, especially the ring buffer target:


    ```sql

    SELECT CAST(t.target_data AS xml)

    FROM sys.dm_xe_session_targets t

    JOIN sys.dm_xe_sessions s

    ON s.address = t.event_session_address

    WHERE s.name = ''system_health''

    ```


    **Note**


    You may need to increase the number of characters retrieved from the server for
    XML data in your SQL Server Management Studio session if you find an unexpected
    end of file parsing error while trying to open the XML column. To do that, use
    the `Tools` menu and select `Options` ➤ `Query Results` ➤ `SQL Server` ➤ `Results
    to Grid` ➤ `Maximum Characters Retrieved`, and change `XML data` to `Unlimited`
    (the default value is 2 MB).


    Similar to the `system_health` session, SQL Server has provided a default trace
    for many versions of the product. Although it does not capture any wait information,
    the default trace persists some activity and changes primarily related to SQL
    Server configuration options. Along with SQL trace, the default trace has been
    deprecated.'
  raw: '### system_health Extended Event Session


    The `system_health` session is an extended event session that automatically collects
    system data that can be used to troubleshoot performance problems. It is configured
    by default on every SQL Server installation, and it starts when the instance starts,
    running all the time. Although the `system_health` session can be closed and deleted,
    it is not recommended to do so as its execution does not have any noticeable performance
    impact.


    The `system_health` session collects information about multiple areas (for details,
    see [`https://msdn.microsoft.com/en-us/library/ff877955.aspx`](https://msdn.microsoft.com/en-us/library/ff877955.aspx)),
    and it also captures a number of waits. The following code is a partial definition
    of the SQL Server `system_health` describing the wait types captured and filtering
    out based on the wait duration:


    ```

    ADD EVENT sqlos.wait_info(

    ACTION(package0.callstack,sqlserver.session_id,sqlserver.sql_text)

    WHERE ([duration]>(15000) AND ([wait_type]>=N''LATCH_NL'' AND ([wait_type]>=N''PAGELATCH_NL''

    AND [wait_type]=N''PAGEIOLATCH_NL''

    AND [wait_type]=N''IO_COMPLETION'' AND

    [wait_type]=N''FCB_REPLICA_WRITE'' AND [wait_type](30000)

    AND [wait_type](5000) AND ([wait_type]>=N''PREEMPTIVE_OS_GENERICOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_INITIALIZESECURITYCONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_AUTHZGETINFORMATIONFROMCONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_CRYPTACQUIRECONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_NETGROUPGETUSERS'' AND

    [wait_type]=N''PREEMPTIVE_OS_NETVALIDATEPASSWORDPOLICYFREE'' AND

    [wait_type](45000) AND

    ([wait_type]>=N''PREEMPTIVE_OS_SETNAMEDSECURITYINFO'' AND

    [wait_type]=N''PREEMPTIVE_OS_RSFXDEVICEOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_DTCOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_CLOSEHANDLE'' AND

    [wait_type]=N''PREEMPTIVE_OS_GETCOMPRESSEDFILESIZE'' AND

    [wait_type]=N''PREEMPTIVE_OS_DISCONNECTNAMEDPIPE''AND

    [wait_type]<=N''PREEMPTIVE_CLOSEBACKUPMEDIA'' OR

    [wait_type]=N''PREEMPTIVE_OS_AUTHENTICATIONOPS'' OR

    [wait_type]=N''PREEMPTIVE_OS_FREECREDENTIALSHANDLE'' OR

    [wait_type]=N''PREEMPTIVE_OS_AUTHORIZATIONOPS'' OR

    [wait_type]=N''PREEMPTIVE_COM_COCREATEINSTANCE'' OR

    [wait_type]=N''PREEMPTIVE_OS_NETVALIDATEPASSWORDPOLICY'' OR

    [wait_type]=N''PREEMPTIVE_VSS_CREATESNAPSHOT''))))

    ```


    In addition, the `system_health` event session uses `sp_server_diagnostics_component_result`,
    which by itself collects a variety of diagnostic data and health information including
    some waits. For more information about `sp_server_diagnostics_component_result`,
    see [`https://msdn.microsoft.com/en-us/library/ff878233.aspx`](https://msdn.microsoft.com/en-us/library/ff878233.aspx).
    The `sp_server_diagnostics_component_result` is defined as follows :


    ```

    ADD EVENT sqlserver.sp_server_diagnostics_component_result(SET collect_data=(1)

    WHERE ([sqlserver].[is_system]=(1) AND [component](4)))

    ```


    Finally, keep in mind that although the `system_health` session collected information
    is captured to both the file and ring buffer targets, it may only hold recent
    events, and it is not persisted but recycled as shown next. You may need to perform
    some additional steps to persist this information to disk.


    ```

    ADD TARGET package0.event_file(SET filename=N''system_health.xel'',max_file_size=(5),
    max_rollover_files=(4)),

    ADD TARGET package0.ring_buffer(SET max_events_limit=(5000),max_memory=(4096))

    ```


    The definition shows that the file target has a `max_file_size` , which is the
    maximum file size in megabytes, of 5 MB and `max_rollover_files` or maximum number
    of files to retain in the file system of four, making a maximum of 20 MB of information.
    The file target can be read using the following query:


    ```

    SELECT *, CAST(event_data AS XML)

    FROM sys.fn_xe_file_target_read_file(''system_health*.xel'', NULL, NULL, NULL)

    ```


    In the same way, the `system_health` session uses the ring buffer target with
    a `max_events_limit` of 5000, meaning that it will keep to a maximum of 5000 events
    in the ring buffer, and older events will be dropped as this limit is reached.
    It also defines a maximum amount of memory of 4096 kilobytes. By default, the
    oldest events are dropped when these limits are reached, but another configuration
    option, `occurrence_number`, allows you to configure the number of events kept
    before being discarded depending on the event type.


    You can use the following query as a starting point to start inspecting the `system_health`
    session captured information, especially the ring buffer target:


    ```

    SELECT CAST(t.target_data AS xml)

    FROM sys.dm_xe_session_targets t

    JOIN sys.dm_xe_sessions s

    ON s.address = t.event_session_address

    WHERE s.name = ''system_health''

    ```


    Note


    You may need to increase the number of characters retrieved from the server for
    XML data in your SQL Server Management Studio session if you find an unexpected
    end of file parsing error while trying to open the XML column. To do that, use
    the Tools menu and select Options ➤ Query Results ➤ SQL Server ➤ Results to Grid
    ➤ Maximum Characters Retrieved, and change XML data to Unlimited (the default
    value is 2 MB).


    Similar to the `system_health` session, SQL Server has provided a default trace
    for many versions of the product. Although it does not capture any wait information,
    the default trace persists some activity and changes primarily related to SQL
    Server configuration options. Along with SQL trace, the default trace has been
