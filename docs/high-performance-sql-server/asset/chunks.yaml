  trans: '

    ### Diskspd


    Diskspd（或 Diskspeed）实用工具是一个命令行存储测试工具，它替代了 sqlio——一个多年来 SQL Server 专业人员广泛使用但现已无法下载的工具。Diskspd
    的主要侧重点是性能测试，尽管准确性同样重要，因为该工具会验证数据是否被正确读取和写入。与 SQLIOSim（它使用最少数量的参数并自动测试所有常见的 SQL
    Server 存储访问模式）不同，Diskspd 对 SQL Server 存储使用一无所知，需要由你来使用正确的参数来模拟适当的测试。


    Diskspd 可用于各种存储，例如本地磁盘、SAN 上的 LUN 或 SMB 文件共享，并且与 SQLIOSim 一样，不需要安装 SQL Server。Diskspd
    可从 [`https://gallery.technet.microsoft.com/DiskSpd-a-robust-storage-6cd2f223`](https://gallery.technet.microsoft.com/DiskSpd-a-robust-storage-6cd2f223)
    下载，并且由于它目前是开源的，其 C++ 源代码也已在 [`https://github.com/microsoft/diskspd`](https://github.com/microsoft/diskspd)
    提供。


    如果你之前使用过 sqlio，那么 Diskspd 应该非常简单直接，因为其工作方式非常相似。如果你是第一次接触这类实用工具，可能需要一些时间来学习如何使用它来模拟特定的
    SQL Server I/O 模式。


    Diskspd 包含其自带的文档，随软件下载一起提供，此外还包括关于使用 Diskspd 模拟 SQL Server 工作负载的指导文档。该文档名为“在 SQL
    Server 环境中使用 DiskSpd”，其中包含 SQL Server 在不同操作（如常规活动、检查点、惰性写入器、大容量插入、备份、还原、`DBCC
    CHECKDB`、索引重建、数据文件的预读或日志文件的常规活动）中使用的典型读写模式信息。例如，SQL Server 的常规活动读取和写入的数据块大小从 8
    KB 到 128 KB 不等，预读最多使用 512 KB，而检查点可以写入 64 KB 到 128 KB 的数据。该文档还包含有关使用的线程数以及 I/O
    模式是随机还是顺序的信息。你可以使用此工具在 Diskspd 中帮助模拟这些 SQL Server I/O 模式。更多详情请参阅该文档。


    让我们创建一个练习：以管理员身份打开命令提示符窗口并执行以下命令：


    `diskspd -c1024M -d120 -r -w0 -t8 -o8 -b8K -L test.dat`


    所选参数的含义如下：


    -   `-c1024M`: 创建一个 1,024 MB 的文件

    -   `-d120`: 测试持续时间，本例为 120 秒

    -   `-r`: 随机 I/O

    -   `-w0`: 写入请求的百分比，本例为 0，因为是只读工作负载

    -   `-t8`: 线程数

    -   `-o8`: 每个线程的未完成 I/O 请求数

    -   `-b8K`: 块大小

    -   `-L`: 测量延迟统计数据

    -   `test.dat`: 为测试创建的文件


    可选地，你可以使用输出参数来更好地控制输出的数据，而不仅仅是在命令提示符窗口中查看。测试完成后，将显示类似以下的信息。第一部分将显示所用参数的摘要。第二部分将显示每个处理器的
    CPU 利用率摘要，如下所示：


    ```

    CPU |  Usage |  User  |  Kernel |  Idle

    0|  21.38%|  14.66%|    6.72%|  78.62%

    1|  22.47%|  15.53%|    6.94%|  77.53%

    2|  19.36%|  14.52%|    4.84%|  80.64%

    3|  23.29%|  17.40%|    5.90%|  76.71%

    avg.|  21.63%|  15.53%|    6.10%|  78.37%

    ```


    接下来的三个部分显示读取 I/O、写入 I/O 和总 I/O。由于我只请求了读取，写入 I/O 将显示为 0，而读取 I/O 和总 I/O 将相同。一个小型示例如下：


    ```

    Read IO

    thread | bytes    | I/Os  | MB/s | I/O per s | AvgLat  | LatStdDev | file

    0 | 16072704 | 1962  | 0.13 | 16.35     | 489.401 | 267.067   | test.dat (1024MB)

    1 | 15753216 | 1923  | 0.13 | 16.02     | 498.270 | 282.754   | test.dat (1024MB)

    2 | 15998976 | 1953  | 0.13 | 16.27     | 491.140 | 266.429   | test.dat (1024MB)

    3 | 15687680 | 1915  | 0.12 | 15.96     | 501.054 | 279.055   | test.dat (1024MB)

    4 | 15982592 | 1951  | 0.13 | 16.26     | 491.862 | 271.641   | test.dat (1024MB)

    5 | 16105472 | 1966  | 0.13 | 16.38     | 488.446 | 271.681   | test.dat (1024MB)

    6 | 15613952 | 1906  | 0.12 | 15.88     | 503.282 | 275.617   | test.dat (1024MB)

    7 | 15769600 | 1925  | 0.13 | 16.04     | 498.274 | 266.536   | test.dat (1024MB)

    total:   126984192 | 15501 | 1.01 | 129.17    | 495.157 | 272.671

    ```


    报告的最后部分显示延迟，由 `-L` 参数请求，同样在本例中只有读取：


    ```

    %-ile |  Read (ms) | Write (ms) | Total (ms)

    min |      0.007 |        N/A |      0.007

    25th |    313.126 |        N/A |    313.126

    ...

    max |   1816.870 |        N/A |   1816.870

    ```


    注意：此外，你也可以使用 CrystalDiskMark 实用工具，它具有图形用户界面，但在后台运行 Diskspd。


    ### SQLIOSim


    与 Diskspd 不同，SQLIOSim 旨在直接模拟 SQL Server I/O 模式，并且更侧重于检查正确性和损坏问题。SQLIOSim 用于对存储系统执行可靠性和完整性测试，它通过模拟
    SQL Server 的读取、写入、检查点、备份、排序和预读活动来实现这一点。你可以使用 Diskspd 进行一些类似的测试，但你必须了解 I/O 模式并定义所需的命令行语句。


    SQLIOSim 替代了 SQLIOStress，并且自 SQL Server 2008 版本起就包含在其中，你可以在 Binn 文件夹中找到它（例如，默认安装在
    `C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\Binn`）。它也可以从
    [`https://support.microsoft.com/en-us/kb/231619`](https://support.microsoft.com/en-us/kb/231619)
    下载。该工具是对 Diskspd 的补充，因为它提供了不同的测试，因此你不必在两者之间做选择，而是在测试存储基础架构时同时使用两者。


    尽管 Diskspd 和 SQLIOSim 都是命令行实用工具，但 SQLIOSim 也具有图形界面，使其更易于使用。通过指定一些最少的参数，该实用工具将执行所有必需的测试，并且可能需要相当长的时间才能完成。执行
    SQLIOSim 的示例见图 11-2。


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig2_HTML.jpg](img/393702_2_En_11_Fig2_HTML.jpg)


    图 11-2：正在运行的 SQLIOSim 压力测试


    SQLIOSim 压力测试设计用于在生产实施前测试存储，因此请勿在实际生产环境中运行此测试。在共享存储上运行此测试可能会影响其他连接的存储系统或用户，即使你的卷或
    LUN 没有被其他人使用。在运行此类压力测试之前，请与你的存储管理员沟通。

