- fmt: '## Interleaved Execution


    As I mentioned earlier in this chapter, traditional query optimization produces
    an execution plan, and independently if the cardinality estimates happen to be
    accurate or not, the plan is executed anyway. Usually, we only know about bad
    cardinality estimations after query execution, especially after a bad query performance
    problem. Interleaved execution is a new feature designed to help with some of
    those bad cardinality estimation problems.


    A historic problem with multistatement table-valued functions is that traditionally
    they have a fixed cardinality estimate. This guesstimate is 100 rows for SQL Server
    2014 and later, and just 1 row for any earlier versions. This fixed cardinality
    estimate can lead to the query optimizer making bad decisions when the real number
    of rows to be processed is higher than the mentioned estimated guess. In these
    cases, a nonoptimal execution plan may be created leading to query performance
    problems.


    Starting with SQL Server 2017, interleaved execution enables query plans to adapt
    based on a revised cardinality estimation. In this process, SQL Server can optimize
    part of a query, pause the current query optimization, execute the partial plan,
    capture accurate cardinality estimates, and resume the optimization for the remaining
    parts of the query. Capturing accurate cardinality information helps the query
    optimizer to make better decisions for the remaining part of the query. The benefits
    would be bigger depending on how wide the difference between the actual and estimated
    number of rows is and how many downstream operations in the plan consume those
    rows. For the current release, interleaved execution works only with multistatement
    table-valued functions, but more constructs are planned to be added in the future.


    You could use the `interleaved_exec_status` extended event to find out if interleaved
    execution is occurring. In the same way, you can use the `interleaved_exec_stats_update`
    extended event to verify if cardinality estimates were updated by the interleaved
    execution feature.


    Same as the other features in this chapter, any new feature in any complex piece
    of software like a database engine may cause a regression for some queries. Because
    of this, you may decide to disable this feature at the database level and probably
    turn on only at the query level. To disable interleaved execution at the database
    level, use the following statement for SQL Server 2017:

    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET DISABLE_INTERLEAVED_EXECUTION_TVF = ON

    ```


    If you are in the latest version of SQL Server, you can use:

    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET INTERLEAVED_EXECUTION_TVF = ON

    ```


    To disable at the query level, use the following hint:

    ```

    SELECT * ...

    OPTION (USE HINT(‘DISABLE_INTERLEAVED_EXECUTION_TVF’))

    ```


    Finally, let us see an example of how interleaved execution works. Create the
    following function:

    ```

    CREATE FUNCTION dbo.ufn_SalesOrderDetail(@year int)

    RETURNS @SalesOrderDetail TABLE

    (

    [SalesOrderID] [int] NOT NULL,

    [SalesOrderDetailID] [int] NOT NULL,

    [CarrierTrackingNumber] [nvarchar](25) NULL,

    [OrderQty] [smallint] NOT NULL,

    [ProductID] [int] NOT NULL,

    [SpecialOfferID] [int] NOT NULL,

    [UnitPrice] [money] NOT NULL,

    [UnitPriceDiscount] [money] NOT NULL,

    [LineTotal] money NOT NULL,

    [rowguid] [uniqueidentifier] ROWGUIDCOL NOT NULL,

    [ModifiedDate] [datetime] NOT NULL)

    AS

    BEGIN

    INSERT @SalesOrderDetail

    SELECT * FROM Sales.SalesOrderDetail

    WHERE YEAR(ModifiedDate) = @year

    RETURN

    END

    ```


    First, I would like to show you a plan before interleaved execution was introduced.
    As mentioned, there are several ways to disable this feature such as changing
    the database compatibility level, using a database scoped configuration option,
    or using a query hint. Let us try the last choice.

    ```

    SELECT * FROM dbo.ufn_SalesOrderDetail(2014) o

    JOIN Sales.SalesOrderHeader h ON o.SalesOrderID = h.SalesOrderID

    OPTION (USE HINT(''DISABLE_INTERLEAVED_EXECUTION_TVF''))

    ```


    This query would create the plan in Figure [10-3](#393702_2_En_10_Chapter.xhtml#Fig3).


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig3_HTML.jpg](images/393702_2_En_10_Chapter/393702_2_En_10_Fig3_HTML.jpg)


    Figure 10-3: Plan without interleaved execution


    You may notice that the expected estimated number of rows of 100 makes the query
    optimizer believe a nested loops join may be the most appropriate physical operator
    for such low number of rows. Now run the query without any hint:

    ```

    SELECT * FROM dbo.ufn_SalesOrderDetail(2014) o

    JOIN Sales.SalesOrderHeader h ON o.SalesOrderID = h.SalesOrderID

    ```


    This time, we get the plan in Figure [10-4](#393702_2_En_10_Chapter.xhtml#Fig4).


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig4_HTML.jpg](images/393702_2_En_10_Chapter/393702_2_En_10_Fig4_HTML.jpg)


    Figure 10-4: Plan with interleaved execution


    You can now see that the estimated number of rows is the same as the actual number
    of rows, and the query optimizer is making a different decision regarding the
    plan. This time, the plan uses both sort and merge join operations to process
    the same data which may be more appropriate for such a large number of rows.


    ## Batch Mode on Rowstore


    The batch mode on rowstores feature was introduced with SQL Server 2019. Batch
    mode for columnstore has been available several versions back, starting when columnstore
    indexes were introduced back in SQL Server 2012. As covered in Chapter [7](#393702_2_En_7_Chapter.xhtml),
    batch mode processing is a vector-based execution method designed to improve the
    query performance by processing multiple rows at a time instead of using the traditional
    operators that process a row at a time.


    The query optimizer can use batch mode on rowstores on bitmap filters, on-disk
    heaps, and b-tree indexes, which basically means on-disk clustered and nonclustered
    indexes. The feature also supports all existing batch mode–enabled operators available
    for columnstores. Batch mode on rowstores can help in cases when you do not want
    to create a columnstore index or one cannot be created because you also need a
    feature not supported by columnstore indexes. A current limitation of batch mode
    on rowstores, however, is that it is not available for In-Memory OLTP tables or
    queries that fetch or filter a large object (LOB) column.


    Even when batch mode is available for rowstores, this feature is still only beneficial
    for queries that process a larger number of rows, for example, analytical or business
    intelligence queries. As suggested in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    the decision to use batch mode is, like anything else in the query optimizer,
    a cost-based decision. This cost estimation will show if using batch rowstore
    is beneficial for the performance of the query. Some of the minimal requirements
    by the optimizer to ever consider batch mode are the size of the tables, the operators
    used, and the estimated cardinalities in the input query. You can validate if
    your plan is using batch mode by checking the Actual Execution Mode property at
    the operator level. You can find more detail about batch mode by looking at the
    “Columnstore Indexes” section in Chapter [7](#393702_2_En_7_Chapter.xhtml).


    To use batch mode on rowstore, you only need to change the compatibility mode
    to SQL Server 2019 or 150. To disable batch mode on rowstore at the database level
    without changing the database compatibility level, you can use:

    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET BATCH_MODE_ON_ROWSTORE = OFF

    ```


    To reenable this feature, just change the value to ON.


    To disable this feature at a query level, assuming you found a performance regression,
    you can try the USE HINT as shown next:

    ```

    SELECT * ...

    OPTION(USE HINT(‘DISALLOW_BATCH_MODE’))

    ```


    There is also a hint to enable batch mode when it is disabled via a database scoped
    configuration. In this case, you can try:

    ```

    SELECT *

    OPTION(USE HINT(‘ALLOW_BATCH_MODE’))

    ```'
  raw: '## Interleaved Execution


    As I mentioned earlier in this chapter, traditional query optimization produces
    an execution plan, and independently if the cardinality estimates happen to be
    accurate or not, the plan is executed anyway. Usually, we only know about bad
    cardinality estimations after query execution, especially after a bad query performance
    problem. Interleaved execution is a new feature designed to help with some of
    those bad cardinality estimation problems.


    A historic problem with multistatement table-valued functions is that traditionally
    they have a fixed cardinality estimate. This guesstimate is 100 rows for SQL Server
    2014 and later, and just 1 row for any earlier versions. This fixed cardinality
    estimate can lead to the query optimizer making bad decisions when the real number
    of rows to be processed is higher than the mentioned estimated guess. In these
    cases, a nonoptimal execution plan may be created leading to query performance
    problems.


    Starting with SQL Server 2017, interleaved execution enables query plans to adapt
    based on a revised cardinality estimation. In this process, SQL Server can optimize
    part of a query, pause the current query optimization, execute the partial plan,
    capture accurate cardinality estimates, and resume the optimization for the remaining
    parts of the query. Capturing accurate cardinality information helps the query
    optimizer to make better decisions for the remaining part of the query. The benefits
    would be bigger depending on how wide the difference between the actual and estimated
    number of rows is and how many downstream operations in the plan consume those
    rows. For the current release, interleaved execution works only with multistatement
    table-valued functions, but more constructs are planned to be added in the future.


    You could use the interleaved_exec_status extended event to find out if interleaved
    execution is occurring. In the same way , you can use the interleaved_exec_stats_update
    extended event to verify if cardinality estimates were updated by the interleaved
    execution feature.


    Same as the other features in this chapter, any new feature in any complex piece
    of software like a database engine may cause a regression for some queries. Because
    of this, you may decide to disable this feature at the database level and probably
    turn on only at the query level. To disable interleaved execution at the database
    level, use the following statement for SQL Server 2017:


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET DISABLE_INTERLEAVED_EXECUTION_TVF = ON

    ```


    If you are in the latest version of SQL Server, you can use


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET INTERLEAVED_EXECUTION_TVF = ON

    ```


    To disable at the query level, use the following hint:


    ```

    SELECT * ...

    OPTION (USE HINT(‘DISABLE_INTERLEAVED_EXECUTION_TVF’))

    ```


    Finally, let us see an example of how interleaved execution works. Create the
    following function:


    ```

    CREATE FUNCTION dbo.ufn_SalesOrderDetail(@year int)

    RETURNS @SalesOrderDetail TABLE

    (

    [SalesOrderID] [int] NOT NULL,

    [SalesOrderDetailID] [int] NOT NULL,

    [CarrierTrackingNumber] [nvarchar](25) NULL,

    [OrderQty] [smallint] NOT NULL,

    [ProductID] [int] NOT NULL,

    [SpecialOfferID] [int] NOT NULL,

    [UnitPrice] [money] NOT NULL,

    [UnitPriceDiscount] [money] NOT NULL,

    [LineTotal] money NOT NULL,

    [rowguid] [uniqueidentifier] ROWGUIDCOL NOT NULL,

    [ModifiedDate] [datetime] NOT NULL)

    AS

    BEGIN

    INSERT @SalesOrderDetail

    SELECT * FROM Sales.SalesOrderDetail

    WHERE YEAR(ModifiedDate) = @year

    RETURN

    END

    ```


    First, I would like to show you a plan before interleaved execution was introduced.
    As mentioned, there are several ways to disable this feature such as changing
    the database compatibility level , using a database scoped configuration option,
    or using a query hint. Let us try the last choice.


    ```

    SELECT * FROM dbo.ufn_SalesOrderDetail(2014) o

    JOIN Sales.SalesOrderHeader h ON o.SalesOrderID = h.SalesOrderID

    OPTION (USE HINT(''DISABLE_INTERLEAVED_EXECUTION_TVF''))

    ```


    This query would create the plan in Figure [10-3](#393702_2_En_10_Chapter.xhtml#Fig3).


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig3_HTML.jpg](images/393702_2_En_10_Chapter/393702_2_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Plan without interleaved execution


    You may notice that the expected estimated number of rows of 100 makes the query
    optimizer believe a nested loops join may be the most appropriate physical operator
    for such low number of rows. Now run the query without any hint:


    ```

    SELECT * FROM dbo.ufn_SalesOrderDetail(2014) o

    JOIN Sales.SalesOrderHeader h ON o.SalesOrderID = h.SalesOrderID

    ```


    This time, we get the plan in Figure [10-4](#393702_2_En_10_Chapter.xhtml#Fig4).


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig4_HTML.jpg](images/393702_2_En_10_Chapter/393702_2_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Plan with interleaved execution


    You can now see that the estimated number of rows is the same as the actual number
    of rows, and the query optimizer is making a different decision regarding the
    plan. This time, the plan uses both sort and merge join operations to process
    the same data which may be more appropriate for such a large number of rows .


    ## Batch Mode on Rowstore


    The batch mode on rowstores feature was introduced with SQL Server 2019\. Batch
    mode for columnstore has been available several versions back, starting when columnstore
    indexes were introduced back in SQL Server 2012\. As covered in Chapter [7](#393702_2_En_7_Chapter.xhtml),
    batch mode processing is a vector-based execution method designed to improve the
    query performance by processing multiple rows at a time instead of using the traditional
    operators that process a row at a time.


    The query optimizer can use batch mode on rowstores on bitmap filters, on-disk
    heaps, and b-tree indexes, which basically means on-disk clustered and nonclustered
    indexes. The feature also supports all existing batch mode–enabled operators available
    for columnstores. Batch mode on rowstores can help in cases when you do not want
    to create a columnstore index or one cannot be created because you also need a
    feature not supported by columnstore indexes. A current limitation of batch mode
    on rowstores, however, is that it is not available for In-Memory OLTP tables or
    queries that fetch or filter a large object (LOB) column.


    Even when batch mode is available for rowstores, this feature is still only beneficial
    for queries that process a larger number of rows, for example, analytical or business
    intelligence queries. As suggested in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    the decision to use batch mode is, like anything else in the query optimizer,
    a cost-based decision. This cost estimation will show if using batch rowstore
    is beneficial for the performance of the query. Some of the minimal requirements
    by the optimizer to ever consider batch mode are the size of the tables, the operators
    used, and the estimated cardinalities in the input query. You can validate if
    your plan is using batch mode by checking the Actual Execution Mode property at
    the operator level. You can find more detail about batch mode by looking at the
    “Columnstore Indexes” section in Chapter [7](#393702_2_En_7_Chapter.xhtml).


    To use batch mode on rowstore, you only need to change the compatibility mode
    to SQL Server 2019 or 150\. To disable batch mode on rowstore at the database
    level without changing the database compatibility level, you can use


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET BATCH_MODE_ON_ROWSTORE = OFF

    ```


    To reenable this feature, just change the value to ON.


    To disable this feature at a query level, assuming you found a performance regression,
    you can try the USE HINT as shown next:


    ```

    SELECT * ...

    OPTION(USE HINT(‘DISALLOW_BATCH_MODE’))

    ```


    There is also a hint to enable batch mode when it is disabled via a database scoped
    configuration. In this case, you can try


    ```

    SELECT *

    OPTION(USE HINT(‘ALLOW_BATCH_MODE’))

    ```'
  trans: '


    ## 交错执行


    正如我在本章前面所提到的，传统的查询优化会生成一个执行计划，无论基数估计是否准确，该计划都会被执行。通常，我们只在查询执行后，尤其是在出现糟糕的查询性能问题后，才会知道糟糕的基数估计。交错执行是一项旨在帮助解决其中一些基数估计问题的新功能。


    多语句表值函数（Multistatement table-valued functions）的历史问题在于，传统上它们有一个固定的基数估计。这个猜测值在 SQL
    Server 2014 及更高版本中是 100 行，而在任何更早的版本中只有 1 行。当实际要处理的行数高于估计的猜测值时，这种固定的基数估计可能导致查询优化器做出糟糕的决策。在这些情况下，可能会创建一个非最优的执行计划，从而导致查询性能问题。


    从 SQL Server 2017 开始，交错执行使查询计划能够基于修订后的基数估计进行适应。在此过程中，SQL Server 可以优化查询的一部分，暂停当前的查询优化，执行部分计划，捕获准确的基数估计，然后恢复对查询剩余部分的优化。捕获准确的基数信息有助于查询优化器为查询的剩余部分做出更好的决策。实际行数与估计行数之间的差异越大，以及计划中消耗这些行的下游操作越多，获得的收益就越大。在当前版本中，交错执行仅适用于多语句表值函数，但计划在未来添加对更多结构的支持。


    您可以使用 `interleaved_exec_status` 扩展事件来查明是否正在发生交错执行。同样，您可以使用 `interleaved_exec_stats_update`
    扩展事件来验证基数估计是否由交错执行功能更新。


    与本章中的其他功能一样，在像数据库引擎这样的复杂软件中，任何新功能都可能对某些查询导致性能回退。因此，您可能决定在数据库级别禁用此功能，或许只在查询级别启用。要在数据库级别为
    SQL Server 2017 禁用交错执行，请使用以下语句：

    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET DISABLE_INTERLEAVED_EXECUTION_TVF = ON

    ```


    如果您使用的是最新版本的 SQL Server，可以使用：

    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET INTERLEAVED_EXECUTION_TVF = ON

    ```


    要在查询级别禁用，请使用以下提示：

    ```

    SELECT * ...

    OPTION (USE HINT(''DISABLE_INTERLEAVED_EXECUTION_TVF''))

    ```


    最后，让我们看一个交错执行如何工作的例子。创建以下函数：

    ```

    CREATE FUNCTION dbo.ufn_SalesOrderDetail(@year int)

    RETURNS @SalesOrderDetail TABLE

    (

    [SalesOrderID] [int] NOT NULL,

    [SalesOrderDetailID] [int] NOT NULL,

    [CarrierTrackingNumber] nvarchar NULL,

    [OrderQty] [smallint] NOT NULL,

    [ProductID] [int] NOT NULL,

    [SpecialOfferID] [int] NOT NULL,

    [UnitPrice] [money] NOT NULL,

    [UnitPriceDiscount] [money] NOT NULL,

    [LineTotal] money NOT NULL,

    [rowguid] [uniqueidentifier] ROWGUIDCOL NOT NULL,

    [ModifiedDate] [datetime] NOT NULL)

    AS

    BEGIN

    INSERT @SalesOrderDetail

    SELECT * FROM Sales.SalesOrderDetail

    WHERE YEAR(ModifiedDate) = @year

    RETURN

    END

    ```


    首先，我想向您展示引入交错执行之前的计划。如前所述，有几种方法可以禁用此功能，例如更改数据库兼容级别、使用数据库作用域配置选项或使用查询提示。让我们尝试最后一种选择。

    ```

    SELECT * FROM dbo.ufn_SalesOrderDetail(2014) o

    JOIN Sales.SalesOrderHeader h ON o.SalesOrderID = h.SalesOrderID

    OPTION (USE HINT(''DISABLE_INTERLEAVED_EXECUTION_TVF''))

    ```


    此查询将创建图 10-3 中的计划。


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig3_HTML.jpg](img/393702_2_En_10_Fig3_HTML.jpg)


    图 10-3：没有交错执行的计划


    您可能会注意到，预期的估计行数 100 使得查询优化器相信对于如此低的行数，嵌套循环连接可能是最合适的物理运算符。现在在没有任何提示的情况下运行查询：

    ```

    SELECT * FROM dbo.ufn_SalesOrderDetail(2014) o

    JOIN Sales.SalesOrderHeader h ON o.SalesOrderID = h.SalesOrderID

    ```


    这一次，我们得到了图 10-4 中的计划。


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig4_HTML.jpg](img/393702_2_En_10_Fig4_HTML.jpg)


    图 10-4：带有交错执行的计划


    您现在可以看到估计行数与实际行数相同，查询优化器对于计划做出了不同的决策。这次，计划同时使用了排序和合并连接操作来处理相同的数据，这对于如此大的行数可能更合适。


    ## 行存储上的批处理模式


    行存储上的批处理模式（Batch mode on rowstore）功能随 SQL Server 2019 引入。列存储的批处理模式在之前的几个版本中已经可用，始于
    SQL Server 2012 引入列存储索引时。如第 7 章所述，批处理模式处理是一种基于向量的执行方法，旨在通过一次处理多行而不是使用传统的逐行处理运算符来提高查询性能。


    查询优化器可以在位图过滤器、磁盘堆和 B 树索引上使用行存储上的批处理模式，这基本上意味着磁盘上的聚集和非聚集索引。该功能还支持所有现有的适用于列存储的启用批处理模式的运算符。当您不想创建列存储索引，或者因为您还需要一个列存储索引不支持的功能而无法创建时，行存储上的批处理模式可以提供帮助。然而，行存储上批处理模式当前的一个限制是它不适用于内存优化
    OLTP 表或获取/筛选大对象列的查询。


    即使批处理模式可用于行存储，此功能仍然仅对处理大量行的查询有益，例如分析或商业智能查询。如第 1 章所建议的，使用批处理模式的决定就像查询优化器中的其他任何决策一样，是一个基于成本的决定。此成本估计将显示使用行存储批处理模式是否对查询的性能有益。优化器考虑批处理模式的一些最低要求包括表的大小、使用的运算符以及输入查询中的估计基数。您可以通过在运算符级别检查“实际执行模式”属性来验证您的计划是否正在使用批处理模式。您可以通过查看第
    7 章中的“列存储索引”部分了解更多关于批处理模式的细节。


    要使用行存储上的批处理模式，您只需将兼容性模式更改为 SQL Server 2019 或 150。要在不更改数据库兼容性级别的情况下在数据库级别禁用行存储上的批处理模式，您可以使用：

    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET BATCH_MODE_ON_ROWSTORE = OFF

    ```


    要重新启用此功能，只需将值更改为 ON。


    要在查询级别禁用此功能（假设您发现了性能回退），您可以尝试使用 USE HINT，如下所示：

    ```

    SELECT * ...

    OPTION(USE HINT(''DISALLOW_BATCH_MODE''))

    ```


    还有一个提示可以在通过数据库作用域配置禁用时启用批处理模式。在这种情况下，您可以尝试：

    ```

    SELECT *

    OPTION(USE HINT(''ALLOW_BATCH_MODE''))

    ```


