  raw: '### Nonclustered Indexes


    Nonclustered indexes are the traditional secondary indexes used by SQL Server
    and can be created on the main clustered index or a heap. As such, they contain
    only one or a few columns of the base table as index keys. They can optionally
    contain one or more columns, not as keys, but as additional data to cover a query,
    using the `INCLUDE` clause.


    Nonclustered indexes are essential for exact match queries, which are used to
    find one or a few rows using equality comparisons. Like clustered indexes, they
    could be extremely useful for range queries but only if the index covers the query.
    Range queries could be helpful when using a noncovering index only for a very
    limited number of rows as the main table would in that case have to be accessed
    anyway, and, as mentioned earlier, random disk I/Os become very expensive as the
    number of rows increases. Nonclustered indexes can benefit `ORDER BY` and `GROUP
    BY` queries as well, again assuming they cover the query.


    As mentioned earlier, if you want to cover a column that is not required for searching
    purposes, it can be added to the index using the `INCLUDE` clause. For example,
    if column `col1` is included, it can be returned by a query, but you cannot use
    it to search in a filter predicate such as `col1 = 12`. I’ve seen in the documentation
    advice that an `INCLUDE` column can help you to avoid the index limitation of
    16 key columns or key size of 900 bytes, but if you are getting even close to
    those limits, you should rethink your index design. As mentioned earlier, it does
    not exactly play the same role as such columns cannot be used in a search predicate.
    A reminder that a nonclustered index also covers the clustered index keys, and
    like those, we should keep nonclustered indexes as small as possible.


    Finally , be aware that the term “nonclustered index” is also used with In-Memory
    OLTP and columnstore index technologies, so it is usually a good practice to always
    call the indexes in these new technologies memory-optimized nonclustered indexes
    and nonclustered columnstore indexes.


    Note


    The recommended properties for a clustered index (unique, narrow, static, and
    ever-increasing) either do not apply for nonclustered indexes or are less relevant.


    ### Filtered Indexes


    Filtered indexes were introduced with SQL Server 2008 and can be very helpful
    in situations where subsets of data can be eliminated from the query results.
    Typical scenarios for filtered indexes are data with sparse columns, data with
    large number of `NULL` values, or columns with heterogeneous data. Filtered indexes
    require a `WHERE` clause with a filter predicate indicating the rows to include
    in the index.


    Note


    Sparse columns, also introduced with SQL Server 2008, are columns that have an
    optimized storage for `NULL` values and are used in cases when a large number
    of the values in the column are `NULL`.


    ## Working with Indexes


    Let’s take a quick tour creating a few indexes for some basic scenarios, reviewing
    some of the concepts explained in this chapter and looking to the missing indexes
    feature along the way, showcasing some of its benefits and limitations. Create
    a new database called “test” and run the following code to populate it with some
    data. Keep in mind that the missing indexes feature is not an index tuning tool
    and, as discussed, has a number of limitations. It helps as it is always available
    and can provide feedback even without requesting it. If you need an index tuning
    tool, you should use the DTA.


    ```

    SELECT *

    INTO dbo.SalesOrderDetail

    FROM AdventureWorks2017.Sales.SalesOrderDetail

    GO

    SELECT *

    INTO dbo.SalesOrderHeader

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    ```


    At this moment, we are ready to run some queries on the test database. Let’s try
    a few simple ones while looking at the produced execution plans. We will immediately
    see a couple of limitations of the missing indexes feature, the first one being
    that it cannot be used to recommend clustered indexes. The following query would
    be a great example for such a tool to recommend a clustered index as it would
    be helpful to perform a range scan by first finding the row with SalesOrderID
    50000 and navigating the index throughout SalesOrderID 70000:


    ```

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    ```


    We don’t see any missing index recommendation on the graphical execution plan.
    There is, however, a second limitation that may be blocking providing any recommendation.
    The produced plan is a trivial plan, and the missing indexes feature does not
    work with a trivial plan either. Missing index information is provided by the
    query optimizer during a full optimization, and since a trivial plan skips this
    optimization, no missing index information is provided. There are several ways
    to avoid a trivial plan although, in fact, you would rarely see this problem on
    your real-life databases, as even some minor changes make the query require a
    full optimization. A simple way to avoid a trivial plan is to use an undocumented
    trace flag to force a full optimization. This is trace flag 8757, and, as an undocumented
    trace flag, it is not supported and should not be used in a production environment.


    Trying the following query will create a full optimized plan, but the limitation
    with clustered indexes remains, and we still got no recommendation. By the way,
    the DTA, as covered later, would recommend a clustered index on the `SalesOrderID`
    column for this range query.


    ```

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    OPTION (QUERYTRACEON 8757)

    ```


    Many times the decision to create a clustered index and which keys to use for
    such index is performed during database or table design. Let’s manually create
    clustered indexes for both tables.


    ```

    CREATE CLUSTERED INDEX PK_SalesOrderHeader ON SalesOrderHeader(SalesOrderID)

    GO

    CREATE CLUSTERED INDEX PK_SalesOrderDetail

    ON SalesOrderDetail(SalesOrderID, SalesOrderDetailID)

    ```


    A foreign key constraint on this master-detail table would be a natural choice
    here. I may not go that far to cover an entire exercise but will just discuss
    the basic steps to see how the tools work. Let’s continue the exercise with a
    very simple query:


    ```

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    ```


    This time, we get a clustered index scan, technically a table scan, with no missing
    index recommendations yet, as shown in Figure [9-2](#393702_2_En_9_Chapter.xhtml#Fig2).


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig2_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Plan with no missing index recommendation


    Even with the clustered index, the trivial plan limitation remains. Let’s try
    the trace flag 8757 again to disable a trivial optimization:


    ```

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    OPTION (QUERYTRACEON 8757)

    ```'
  trans: '

    ### 非聚集索引


    非聚集索引是 SQL Server 使用的传统二级索引，可以创建在主聚集索引或堆上。因此，它们只包含基础表中的一列或几列作为索引键。它们还可以选择性地包含一个或多个列，这些列不作为键，而是作为额外的数据以覆盖查询，这通过
    `INCLUDE` 子句实现。


    非聚集索引对于精确匹配查询至关重要，这类查询用于通过相等比较来查找一行或多行数据。与聚集索引类似，它们对于范围查询也可能极其有用，但前提是索引必须覆盖查询。当使用非覆盖索引时，范围查询可能仅在处理非常有限数量的行时才有帮助，因为那种情况下仍然需要访问主表，而且如前所述，随着行数的增加，随机磁盘
    I/O 会变得非常昂贵。非聚集索引也能使 `ORDER BY` 和 `GROUP BY` 查询受益，同样假设它们覆盖了查询。


    如前所述，如果想包含一个并非搜索所必需的列，可以使用 `INCLUDE` 子句将其添加到索引中。例如，如果包含了 `col1` 列，查询可以返回它，但你不能在过滤谓词（如
    `col1 = 12`）中用它进行搜索。我在文档中见过这样的建议：`INCLUDE` 列可以帮助你规避索引的 16 个键列或 900 字节键大小的限制，但如果你的索引设计已经接近这些限制，你应该重新考虑。如前所述，它扮演的角色并不完全相同，因为这些列不能用于搜索谓词。需要提醒的是，非聚集索引也覆盖了聚集索引键，并且与这些键类似，我们也应该使非聚集索引尽可能小。


    最后，请注意术语“非聚集索引”也用于内存中 OLTP 和列存储索引技术，因此通常的良好实践是始终称这些新技术中的索引为内存优化非聚集索引和非聚集列存储索引。


    > 注意

    >

    > 对于聚集索引推荐的属性（唯一、狭窄、静态、始终递增）要么不适用于非聚集索引，要么相关性较低。


    ### 过滤索引


    过滤索引随 SQL Server 2008 引入，在可以从查询结果中排除数据子集的情况下非常有用。过滤索引的典型场景包括具有稀疏列的数据、具有大量 `NULL`
    值的数据或具有异类数据的列。过滤索引需要一个带有过滤谓词的 `WHERE` 子句，以指示要包含在索引中的行。


    > 注意

    >

    > 稀疏列同样随 SQL Server 2008 引入，它们是对 `NULL` 值进行了优化存储的列，用于列中大量值为 `NULL` 的情况。


    ## 索引的使用


    让我们快速浏览一下，为几个基本场景创建一些索引，回顾本章解释的一些概念，并在此过程中了解缺失索引功能，展示其一些优点和局限性。创建一个名为“test”的新数据库，并运行以下代码为其填充一些数据。请记住，缺失索引功能并非索引优化工具，并且如前所述，它有许多局限性。它的帮助在于它总是可用的，即使没有请求也能提供反馈。如果你需要索引优化工具，应该使用
    DTA（数据库引擎优化顾问）。


    ```sql

    SELECT *

    INTO dbo.SalesOrderDetail

    FROM AdventureWorks2017.Sales.SalesOrderDetail

    GO

    SELECT *

    INTO dbo.SalesOrderHeader

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    ```


    此时，我们已准备好在 test 数据库上运行一些查询。让我们尝试几个简单的查询，同时查看生成的执行计划。我们将立即看到缺失索引功能的几个局限性，第一个是它不能用于推荐聚集索引。以下查询对于此类工具推荐聚集索引将是一个很好的示例，因为它有助于先找到
    `SalesOrderID` 为 50000 的行，然后遍历索引到 `SalesOrderID` 70000，从而执行范围扫描：


    ```sql

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    ```


    我们在图形化执行计划上没有看到任何缺失索引的建议。然而，可能存在第二个限制阻碍了提供任何建议。生成的计划是一个**平凡计划**，缺失索引功能对平凡计划同样不起作用。缺失索引信息由查询优化器在完整优化期间提供，而平凡计划跳过了此优化阶段，因此不会提供缺失索引信息。有几种方法可以避免平凡计划，尽管实际上，在你的真实数据库中很少会遇到此问题，因为即使是一些微小的更改也会使查询需要完整优化。避免平凡计划的一个简单方法是使用一个未公开的跟踪标志来强制进行完整优化。这就是跟踪标志
    8757，并且作为一个未公开的跟踪标志，它不受支持，不应在生产环境中使用。


    尝试以下查询将创建一个完整优化的计划，但关于聚集索引的限制仍然存在，我们仍然没有得到建议。顺便说一下，稍后介绍的 DTA 会为此范围查询推荐在 `SalesOrderID`
    列上创建聚集索引。


    ```sql

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    OPTION (QUERYTRACEON 8757)

    ```


    很多时候，创建聚集索引以及为此类索引选择哪些键的决定是在数据库或表设计期间做出的。让我们手动为两个表创建聚集索引。


    ```sql

    CREATE CLUSTERED INDEX PK_SalesOrderHeader ON SalesOrderHeader(SalesOrderID)

    GO

    CREATE CLUSTERED INDEX PK_SalesOrderDetail

    ON SalesOrderDetail(SalesOrderID, SalesOrderDetailID)

    ```


    在这个主明细表上设置外键约束将是一个自然的选择。我可能不会进行得那么远来覆盖整个练习，而只是讨论基本步骤来了解工具如何工作。让我们继续练习，使用一个非常简单的查询：


    ```sql

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    ```


    这次，我们得到了一个聚集索引扫描（技术上是表扫描），目前还没有缺失索引建议，如图 9-2 所示。


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig2_HTML.jpg](img/393702_2_En_9_Fig2_HTML.jpg)


    图 9-2

    没有缺失索引建议的计划


    即使有了聚集索引，平凡计划的限制仍然存在。让我们再次尝试使用跟踪标志 8757 来禁用平凡优化：


    ```sql

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    OPTION (QUERYTRACEON 8757)

    ```

    '
- fmt: 'You can now verify, by looking at the execution plan, that the optimization
    level is full, but we still get the same plan, as expected, as nothing has really
    changed. But this time we get a missing index recommendation. This is the code
    generated:


    ```

    CREATE NONCLUSTERED INDEX []

    ON [dbo].[SalesOrderDetail] ([ProductID])

    INCLUDE

    ([SalesOrderID],[SalesOrderDetailID],[CarrierTrackingNumber],[OrderQty],[SpecialOfferID],

    [UnitPrice],[UnitPriceDiscount],[LineTotal],[rowguid],[ModifiedDate])

    ```


    Note

    To show this code in SQL Server Management Studio, right-click the green-colored
    Missing Index message at the top of the execution plan and select Missing Index
    Details. A new query window will be opened with the listed code.


    For a query returning 9 rows out of 121,317, this recommendation seems like a
    good idea. But, although creating an index on `ProductID` seems to go in the right
    direction, including all the remaining columns of the table in the index seems
    overkill. Basically, it will duplicate the space required for the table. A better
    choice may be to just create the index on `ProductID`, with no included columns,
    as shown next:


    ```

    CREATE NONCLUSTERED INDEX IX_ProductID

    ON SalesOrderDetail (ProductID)

    ```


    Let’s run the query again. We no longer need a trace flag since we now have an
    index, and it will create alternate choices and the query optimizer will have
    to perform a full optimization.


    ```

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    ```


    We now get a full optimization with the plan shown in Figure 9-3.


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig3_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig3_HTML.jpg)


    Figure 9-3

    Plan using an index seek operation


    This plan is looking a lot better now that we have the index seek that we wanted
    to see to fully utilize an index. In this particular case, there is no missing
    index recommendation as it seems that the optimum index is already available and
    used. But we have something else, a key lookup. A key lookup is needed because
    we are requesting all the columns of the table, and the index alone does not cover
    them all. As explained earlier, a key lookup (or its equivalent on a heap, a `RID`
    lookup) is an expensive operation that only makes sense for a relatively small
    number of rows. There is no percentage to give as an example, but it is very low
    and depends on the query optimizer estimates. Let’s now run the following same
    query with a different `ProductID` value:


    ```

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 870

    ```


    This time, it returned 4688 rows, but it went back to a table scan as the query
    optimizer estimated that using an index seek and a key lookup for such a large
    number of rows could be more expensive than scanning the entire table. You can
    verify both costs by looking at the plans, but you will have to force the use
    of an index for `ProductID` 870. The table scan will cost 1.25303 units, and forcing
    the index using the following query will cost 5.27841, a big difference. You can
    force the index seek using the following `INDEX` hint and verify both costs in
    the generated execution plans:


    ```

    SELECT * FROM SalesOrderDetail

    WITH (INDEX (IX_ProductID))

    WHERE ProductID = 870

    ```


    Although I mentioned query costs to explain the query optimizer decisions, the
    reality is that we should not focus much on such costs for our performance analysis
    but rather on the real execution performance data. If you use a statement such
    as `SET STATISTICS IO ON` to analyze the I/O performance of both queries, you
    may find out that using the plan with the index seek with the `ProductID` 870
    will use 12 times more I/Os than scanning the entire table.


    It is worth mentioning here that the reason we have different plans for the same
    query is because of a behavior called auto-parameterization, which, although it
    can help to reuse plans, it does it in a very conservative way. Since there are
    no constraints to predict how many rows the query will return, such a query could
    return 0, 1, or many rows or even the entire table. For this reason, the query
    optimizer decides not to reuse the previous plan and creates a new one, tailored
    to the new value. If we were using stored procedures, where reusing plans is mostly
    encouraged, the existing plan will be reused. You may be asking which of the two
    plans will be reused. Obviously, it is the one created for the first optimization.


    In summary, index seeks and key lookups are extremely efficient for a small number
    of rows but become very expensive as the number of rows increases. Obviously,
    this does not mean that you should avoid them. In fact, there is no bad query
    operator, and each one could be the best choice in the right circumstances. Sometimes,
    I see developers trying to get rid of key lookups entirely, and that is not the
    right approach. There has to be a balance, especially when you cannot create indexes
    for every query.


    Let’s suppose we change the query slightly to the following:


    ```

    SELECT SalesOrderID, SalesOrderDetailID, ProductID FROM SalesOrderDetail

    WHERE ProductID = 870

    ```


    This time, we get a new plan with just an index seek and no key lookup, as shown
    in Figure 9-4.


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig4_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig4_HTML.jpg)


    Figure 9-4

    Plan without a key lookup


    So why has the key lookup gone? Every nonclustered index includes the table clustering
    key, so in this case both `SalesOrderID` and `SalesOrderDetailID` are available
    without having to access the base table. Let’s add one more column:


    ```

    SELECT SalesOrderID, SalesOrderDetailID, ProductID, UnitPrice FROM SalesOrderDetail

    WHERE ProductID = 870

    ```


    Because the index does not include the `UnitPrice` column, it no longer covers
    the query, and we go back to the clustered index scan. But this time we get a
    new index recommendation. Most SQL Server versions would show the following index
    definition:


    ```

    CREATE NONCLUSTERED INDEX []

    ON [dbo].[SalesOrderDetail] ([ProductID])

    INCLUDE ([SalesOrderID],[SalesOrderDetailID],[UnitPrice])

    ```


    In this case, it looks like a good recommendation. However, we don’t want to include
    `SalesOrderID` and `SalesOrderDetailID` as they are already contained on the nonclustered
    index, as we mentioned earlier. Even if we do add them, they will not be duplicated,
    but it is clearer not to do it in the index definition. This column duplication
    on the index definition is fixed in SQL Server 2019 which only includes the `UnitPrice`
    column.


    Let’s drop the existing index and create a new one with the recommendation:


    ```

    DROP INDEX SalesOrderDetail.IX_ProductID

    GO

    CREATE NONCLUSTERED INDEX IX_ProductID

    ON SalesOrderDetail (ProductID)

    INCLUDE (UnitPrice)

    ```


    Running our last `SELECT` statement again will get the best possible plan using
    an index seek and similar to the one in Figure 9-4. Assuming that the query is
    worth it (e.g., it is used multiple times), you can create the index with that
    included column. It is your decision when to use `INCLUDE` as doing so too frequently
    will require data duplication. After the index is created, we have the optimal
    index for the query, either with parameter 898 or 870 or, in fact, any other parameter.
    In both cases, we have only the index seek without the need for a key lookup.'
