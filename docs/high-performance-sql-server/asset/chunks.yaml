    和 `PAGE_LATCH` 等待在本章前面已介绍过。收集等待信息的其他方法将在下一章介绍。


    ```

    SELECT * FROM sys.dm_os_waiting_tasks

    WHERE wait_type LIKE ''PAGE%LATCH%''

    AND resource_description LIKE ''2:%''

    ```


    打开性能监视器并添加以下计数器：


    *   对象: `SQLServer:Wait Statistics`

