    ## tempdb 事件


    你可以通过检查分配环形缓冲区来分析 `tempdb` 数据库中的分配和解除分配信息，这可以使用未文档化的跟踪标志 1106 来启用。但请注意，启用它肯定会影响系统的性能，因此不要在生产或繁忙的系统上使用它。以下是一个工作原理示例。首先启用跟踪标志
    1106。


    ```

    DBCC TRACEON (1106, -1)

    ```


    然后你可以使用以下代码检查分配环形缓冲区：


