    ```


    However, if we try the following query adding a function, we will instead get
    the most expensive plan shown in Figure [9-1](#393702_2_En_9_Chapter.xhtml#Fig1),
    which has to perform a table scan, reading all the rows on the table and introducing
    a filter operator later in the process to return the correct data:


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig1_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Plan ignoring a nonclustered index


    ```

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ABS(ProductID) = 898

    ```


    Computed columns may be able to help in both cases—to have a better cardinality
    estimation and to create and use an index. They help by providing more information
    to the query optimizer as statistics are now automatically created when needed.
    You could also create an index on a computed column if it can help to find rows
    quickly.


    Although sometimes used by the SQL Server community, the term “sarg” (search argument)
    is not really used in the official documentation or the database research community
    so I would not use it here. Sarg refers to predicates that can be converted into
    an index operation, but it is an old term that originated from the old Sybase
    code and documentation and should no longer be applied to SQL Server. In *The
    Guru’s Guide to SQL Server Architecture and Internals*, Ken Henderson says, “The
    query optimizer in all recent versions of SQL Server is far more sophisticated
    in terms of its ability to use an index to speed up a query than it was in older
    versions of the product” (Addison-Wesley, 2004). Since the query optimizer’s ability
    to use indexes is no longer constrained to simple expressions, the term “sarg”
    is no longer relevant.'
  trans: '# 正如本章引言所述，尽管索引有多种用途，但**最重要**的无疑是导航，即尽可能快速高效地找到一行或多行数据。传统上，这是通过使用 B 树结构来实现的。索引搜索使用随机磁盘
    I/O，对于少量或有限行数的检索极为有效，因此对于 OLTP 工作负载至关重要。然而，每次随机磁盘 I/O 通常需要读取几个数据库页面，因此随着行数的增加，其代价变得越来越高。这种代价高昂的原因在于，它需要从根节点遍历
    B 树结构直到叶子节点，可能读取多个数据库页面。尽管每个页面通常包含许多行，但大多数时候只需要其中一行。


    出于这个原因，当 SQL Server 需要处理大量行时，查询优化器很可能会转而选择执行顺序磁盘 I/O，例如表扫描或索引扫描。一些在报表和数据仓库工作负载中大量使用的查询处理操作（如排序和哈希）无疑也会从这种顺序磁盘
    I/O 中受益。星型连接查询或使用聚合的查询就是这样的例子。


    另一个有趣的现象是，随机磁盘 I/O 的代价在很大程度上取决于所访问的行数，这与顺序磁盘 I/O 完全不同——后者的代价通常与请求的行数无关。例如，无论我们只请求
    5%的行还是整个表，表扫描的代价是相同的。然而，随机磁盘 I/O 的代价，如果只请求几行，或者请求几百或几千行，其代价会急剧增加，从极其高效的操作迅速转变为非常昂贵的操作。此外，当所选索引无法覆盖查询时（很可能还需要访问基表），每次搜索可能需要执行两次随机磁盘
    I/O。最后，如果对查询性能有帮助，SQL Server 可能一次使用多个非聚集索引。这种操作称为索引交叉，与往常一样，做出此选择将是一个基于代价的决策。


    ### 在何处使用索引


    SQL Server 查询优化器在以下方式中使用索引：


    1.  根据筛选谓词或联接谓词查找行。

    2.  按特定顺序交付行。

    3.  如果索引覆盖查询（即包含所有所需列），则根本不需要访问主表。


    让我们更详细地看看这些选择。SQL Server 可以对如下表达式上的索引进行利用：


    ```

    col1 = 12

    col2 = ''California''

    col3 > 30

    col4 IN (7, 23, 38)

    col5 BETWEEN 23 AND 38

    ```


    SQL Server 可能无法匹配更复杂表达式上的索引，例如：


    ```

    col6 = ABS(col1)

    col7 = (col1 * 3.1416) / col2

    ```


    正如我们稍后将展示的，等式与非等式谓词对索引的选择有很大影响。复杂的表达式也是查询处理器的一个有趣的限制。您可能会惊讶地发现，查询优化器无法解析其中一些表达式。这意味着查询优化器不仅无法选择索引来查找符合此表达式的行，而且还无法估计该谓词返回的行数。这种估计称为基数估计，通常由统计信息提供，对于查询优化过程至关重要。显然，即使基数估计很差，SQL
    Server 也始终会返回正确的数据；只是在某些情况下，获取数据的方式可能效率不高。


    例如，以下查询将使用索引查找创建高效的执行计划，因为`SalesOrderDetail`表在`ProductID`列上有一个索引：


    ```sql

    USE AdventureWorks2017

    GO

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```


    但是，如果我们尝试以下添加了函数的查询，则会得到如图 9-1 所示的最昂贵的计划，该计划必须执行表扫描，读取表中的所有行，并在稍后的过程中引入筛选运算符以返回正确的数据：


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig1_HTML.jpg](img/393702_2_En_9_Fig1_HTML.jpg)


    **图 9-1** 忽略非聚集索引的计划


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ABS(ProductID) = 898

    ```


    计算列可能对这两种情况都有帮助——既能提供更好的基数估计，又能创建和使用索引。它们通过向查询优化器提供更多信息来提供帮助，因为现在需要时会自动创建统计信息。如果计算列有助于快速查找行，您也可以在其上创建索引。


    尽管 SQL Server 社区有时会使用术语"sarg"（搜索参数），但它并未真正用于官方文档或数据库研究社区，因此我将不在此使用它。Sarg 指的是可以转换为索引操作的谓词，但它是一个源自旧
    Sybase 代码和文档的古老术语，不应再应用于 SQL Server。在《*The Guru’s Guide to SQL Server Architecture
    and Internals*》中，Ken Henderson 表示：“与旧版本的产品相比，所有近期版本的 SQL Server 中的查询优化器在利用索引加速查询的能力方面要复杂得多”（Addison-Wesley，2004）。由于查询优化器使用索引的能力不再局限于简单表达式，术语“sarg”已不再适用。'
- fmt: 'Although I have yet to see a pure OLTP system, index requirements vary depending
    on how a system goes from OLTP to Reporting or Data Warehouse. OLTP is more about
    finding a row or a very small number of rows quickly, so nonclustered indexes
    are essential for this type of workload. On the other hand, OLTP systems have
    a large number of updates, so limiting the number of indexes is important too.
    Reporting and Data Warehouse workloads focus on processing large amounts of data,
    and although you can use traditional indexes to help with their queries, as covered
    in Chapter [7](#393702_2_En_7_Chapter.xhtml), columnstore indexes are a more appropriate
    choice.


    The main reason you create an index is to help with filter and join predicates,
    so SQL Server can find the rows requested on those predicates as quickly as possible.
    Filter predicates are specified on queries using the `WHERE` clause , usually
    in equality comparisons, where join predicates are specified when two tables are
    joined. Queries using the `WHERE` clause with greater than, less than, or `BETWEEN`
    comparisons are usually referred to as range queries, and they can also benefit
    from an index, especially if the index covers the query. Sometimes, you can define
    a clustered index to help on those range queries, but since only one such index
    is possible per table, a second choice could be to create a nonclustered covering
    index. It is not likely that a noncovering nonclustered index will be chosen for
    a range scan operation by the query optimizer if the number of lookups is high.


    Returning the rows in order is another important use of indexes, and this can
    happen in several cases, like when you request data in some specific order (e.g.,
    using an `ORDER BY` operation) or when the query optimizer finds it useful for
    some operators that can benefit from ordered data, like a merge join or a stream
    aggregate. Such an index can avoid expensive sort operations or some other less
    efficient query processing strategy.


    In summary, index seeks are helpful but usually only for a relatively small number
    of rows. Using an index for range scans is helpful for any number of rows as long
    as the index covers the query. This is the reason why range scans are very effective
    on clustered indexes as by definition they cover all the columns on a table.


    ### Index Usage Validation


    It is extremely important after you create your indexes to verify their execution
    plans to make sure the index is not only used by your query but used in the expected
    way. For example, you may create an index for a specific query, and although the
    index is chosen in the execution plan, it may be used to perform an index scan
    instead of the desired index seek operation. It may not be as drastic, but you
    might also define a multicolumn index, and although you see an index seek, a seek
    predicate is used only for the first column. Obviously, the performance metrics
    are the main indicator of the success of your indexing strategy. If your query
    was originally taking one minute to execute, and if after creating the required
    indexes, it runs in one or two seconds, you may decide it is good enough.


    It is worth clarifying that just because the query optimizer selects an index,
    it does not mean you will get good performance. As shown later, navigating an
    index b-tree is an expensive operation, and it is only worth it when searching
    for a few rows or a relatively small number of rows. As usual on query optimization
    decisions, there is a tipping point where the cost increases in a way that using
    other access methods or operations, such as scanning a table, could be more efficient.
    The fact that an index does not cover all the columns required by the query makes
    the cost even worst, as potentially you need to navigate a b-tree structure twice,
    one for the nonclustered index and a second one for the main table, usually a
    clustered index. Such an operation is called a key lookup. The main table could
    also be a heap where there is no b-tree, but a similar operation, a RID lookup,
    will be required too.


    Now, having said that, the query optimizer is designed to make the correct decision
    in these cases, but sometimes problems may occur, maybe because of some bad cardinality
    estimations or other limitations of the query processor. In addition, some reusable
    code, like stored procedures, may create such a problem when some queries are
    sensitive to parameters, especially in cases with uneven data distribution. In
    this case, the query optimizer will originally create the optimal plan when the
    stored procedure is executed for the first time. As mentioned in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    the query optimizer accomplishes this by using the first provided parameter or
    parameters to make the decision about the operations to perform to execute such
    query. A problem may appear later for such queries when running a second instance
    with different parameters in which the previously created plan may no longer be
    a good choice.


    Finally , just because there is a `WHERE` clause in a query predicate, it does
    not mean that a new index has to be created or has to be used by the query optimizer
    if it already exists. In the end, this is a cost-based decision, and in some cases
    other navigation choices may be more appropriate and less expensive. Typical cases
    of this are query predicates that are not selective enough or the index may not
    cover the query. There could be several reasons why an index is not chosen by
    the query optimizer, even assuming the index was created correctly.


    1.  Cost: Maybe using the index is a good idea for the current value or parameter
    but not for some other values. This problem happens with data with uneven distribution.
    Examples of these cases are shown later in this chapter.


    2.  Complex expressions: Maybe because you are using a function or a complex expression
    that, at least on the current version of SQL Server, the query optimizer is not
    able to fully understand.


    3.  Not useful: Maybe the index is not useful at all. You could research if an
    index is not being used and may decide to delete it. Index usage is recorded in
    the `sys.dm_db_index_usage_stats` DMV, which is covered in Chapter [8](#393702_2_En_8_Chapter.xhtml).


    4.  Bad cardinality estimations or some other query processor limitations.


    If, after analyzing these choices, you suspect that an index could in fact be
    useful and for some reason the query optimizer is not selecting it, you could
    research such query behavior by using a hint to force index selection. I usually
    don’t recommend using hints as they break the declarative specification of queries,
    restrict the choices the query optimizer has, and make maintenance of the query
    more difficult as hints are basically a new dependency. For example, if a query
    hint uses a specific index, dropping the index will make the query fail.'
