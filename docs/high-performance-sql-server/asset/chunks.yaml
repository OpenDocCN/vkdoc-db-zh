- fmt: '# DMVs/DMFs


    Several DMVs and DMFs can be used to show storage usage and information and are
    covered in Chapter [8](#393702_2_En_8_Chapter.xhtml), including the `sys.dm_io_virtual_file_stats`
    DMF, the `sys.dm_os_volume_stats` DMF, the `sys.dm_db_index_physical_stats` DMV,
    and the `sys.dm_db_index_usage_stats` DMV.


    The `sys.dm_io_virtual_file_stats` DMF provides a rich amount of I/O information
    for each data and log file in a database, including not only I/O activity data
    but also wait latency information. The `sys.dm_os_volume_stats` DMF returns information
    about the volumes in the system, based on the provided database ID and file ID.
    The `sys.dm_db_index_physical_stats` DMV allows you to get the fragmentation information
    of your tables and indexes. The `sys.dm_db_index_usage_stats` DMV returns information
    about the operations performed on tables and indexes of a database including the
    number of seeks, scans, bookmark lookups, and updates by both user queries and
    system queries. Please refer to that chapter for more details and additional DMVs.


    In addition, for tuning purposes, sometimes you would want to know which queries
    are using the most I/O resources. Those queries can be collected if you have enabled
    the Query Store, as covered in Chapter [6](#393702_2_En_6_Chapter.xhtml). In addition,
    you can use the `sys.dm_exec_query_stats` DMV to list such queries based on the
    query statistics available in the plan cache. Also covered in Chapter [8](#393702_2_En_8_Chapter.xhtml),
    you could use this DMV to list the most expensive queries based on I/O resources
    such as logical reads, physical reads, or logical writes. Finally, query I/O information
    can also be available by using the `SET STATISTICS IO` statement.


    ## Volume Configuration


    Windows allocation unit size and disk partition alignment are two topics that
    are usually ignored while configuring storage. Although the Windows allocation
    unit size default when formatting an NTFS volume is 4 KB, Microsoft has long been
    recommending to use a 64 KB size when formatting an NTFS volume that will be used
    for SQL Server data files and transaction log files.


    Disk partition alignment remains an important consideration, especially for older
    versions of Windows. Partition misalignment refers to a problem present on Windows
    2003 and older in which the very first block of data written to a partition was
    63K in size. But since Windows would instead work with blocks of an even size
    such as 4K or 64K of data, such disk operations would require spanning two sectors,
    creating a performance problem.


    Preexisting partitions attached to Windows Server 2008 or later may still have
    this problem as partitions are not automatically aligned when servers are upgraded
    to Windows Server 2008 and, as a result, must be rebuilt for optimal performance.
    Even when disk partition alignment is not a problem with newer Windows versions,
    the correct configuration could be validated as well. To validate the correct
    partition alignment or fix a partition alignment problem, see the article at [`https://support.microsoft.com/en-us/kb/929491`](https://support.microsoft.com/en-us/kb/929491).
    For more details about disk partition alignment, see the Microsoft white paper
    “Disk Partition Alignment Best Practices for SQL Server” at [`https://technet.microsoft.com/en-us/library/dd758814(v=SQL.100).aspx`](https://technet.microsoft.com/en-us/library/dd758814%2528v%253DSQL.100%2529.aspx).


    ## RAID Levels


    As covered earlier in this chapter, SQL Server storage solutions usually implement
    some flavor of RAID (redundant array of independent disks), so let’s use this
    section to discuss some of these most popular configurations, including RAID levels
    0, 1, 5, 6, and 10. RAID is also possible at the software level, but it has limitations
    and performance penalties compared to using hardware RAID controllers. RAID employs
    techniques such as mirroring, striping, and parity error detection.


    Again, keep in mind that even if you have some enterprise-level storage and you
    only need to request disk space to your storage administrator, you still need
    to understand which RAID configuration flavor such volumes may have and maybe
    even request a configuration according to your needs.


    ### RAID 0


    RAID 0, or striping, refers to the process in which data is spread across two
    or more drives. Striping alone offers no data redundancy so one drive failure
    means you will lose your data. RAID 0 has no extra storage cost because all the
    drive capacity is used. Since there is no redundancy, it should not be used for
    data or transaction log files but may have a use elsewhere, such as for temporary
    storage for backups before they are copied to a permanent location. A RAID 0 configuration
    is shown in Figure [11-3](#393702_2_En_11_Chapter.xhtml#Fig3).


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig3_HTML.jpg](images/393702_2_En_11_Chapter/393702_2_En_11_Fig3_HTML.jpg)


    Figure 11-3 RAID 0


    ### RAID 1


    RAID 1, or mirroring, writes the same data on two or more drives at the same time.
    Obviously, the cost of this implementation is, at least, 50% of the storage used.
    RAID 1 can recover from a driver failure as the data is on at least a second copy.
    In such cases, the failed drive should be replaced as soon as possible so the
    RAID controller can copy the drive data again, as data will be at risk until the
    failed drive is completely rebuilt. You can have data loss only if the second
    drive fails before the failing mirrored one is rebuilt.


    A typical use for RAID 1 is to mirror the local operating system drive of a server,
    which also usually hosts the SQL Server installation software. RAID 1 is shown
    in Figure [11-4](#393702_2_En_11_Chapter.xhtml#Fig4).


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig4_HTML.jpg](images/393702_2_En_11_Chapter/393702_2_En_11_Fig4_HTML.jpg)


    Figure 11-4 RAID 1


    ### RAID 5


    RAID 5, or disk striping with parity, is similar to RAID 0 in that the data is
    spread across two or more drives but in addition stores parity checking information.
    Parity information is not stored in only one drive, but it is stored in all the
    drives, as shown in Figure [11-5](#393702_2_En_11_Chapter.xhtml#Fig5). RAID 5
    offers failure protection while minimizing the amount of disk used, at least compared
    to RAID 1.


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig5_HTML.jpg](images/393702_2_En_11_Chapter/393702_2_En_11_Fig5_HTML.jpg)


    Figure 11-5 RAID 5


    The cost of using RAID 5 is the cost to calculate the parity information plus
    the space used to store it, which is 1/n of the n drives used. For example, in
    Figure [11-5](#393702_2_En_11_Chapter.xhtml#Fig5), four drives are used and the
    parity information alone uses one drive, so the cost is 1/4. RAID 5 can recover
    from one drive failure, but it cannot recover from two or more drive failures.
    The minimum number of drives in a RAID 5 configuration is three.


    ### RAID 6


    RAID 6, or disk striping with double parity, is similar to RAID 5, but it adds
    another level of parity information, basically extending RAID 5 by adding another
    parity block. If RAID 5 protects against a single disk failure, RAID 6 can tolerate
    losing two disks.


    The cost of using RAID 6 is the cost to calculate the parity information plus
    the space used to store it, which is 2/n of n drives used. For example, in Figure
    [11-6](#393702_2_En_11_Chapter.xhtml#Fig6), five drives are used while the parity
    uses two drives, so the cost is 2/5.


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig6_HTML.jpg](images/393702_2_En_11_Chapter/393702_2_En_11_Fig6_HTML.jpg)


    Figure 11-6 RAID 6'
