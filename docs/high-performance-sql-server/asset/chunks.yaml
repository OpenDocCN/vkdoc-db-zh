    SQL Profiler）非常广泛，因此在我看来，它不会很快从产品中移除。


    与性能计数器类似，扩展事件和 SQL 跟踪都有大量的事件。例如，运行以下代码返回现有扩展事件，对于 SQL Server 2019 RTM 将返回 1846
    个事件（相比之下，SQL Server 2016 RTM 返回 1303 个事件，SQL Server 2014 RTM 返回 870 个事件）：


