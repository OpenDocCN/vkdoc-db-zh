    Having said that, a good understanding of how SQL Server works is always important.
    In this section, I will show you how SQL Server uses indexes and how it can help
    you with the performance of your queries.


    Creating the right indexes could range from a very simple to an overwhelming task.
    I’ve seen many beginner SQL Server professionals who just say, well, my query
    `WHERE` clause uses column `col1` so I just have to create an index on `col1`.
    Right, it might help. But in production scenarios, the choices are usually many
    and more complicated, and creating the right indexes could be time-consuming.
    In addition to understanding how indexes work, before designing indexes for your
    database, you should have the following knowledge or at least consider some or
