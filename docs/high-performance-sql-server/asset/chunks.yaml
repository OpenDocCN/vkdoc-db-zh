  trans: '## 查询优化


    我们已经了解了当请求提交到 SQL Server 后，调度器和工作线程如何执行任务。在空闲的工作线程拾取一个待处理任务后，提交的查询在执行之前需要先进行编译和优化。为了理解查询是如何执行的，我们现在从
    SQLOS 的世界切换到关系引擎（也称为查询处理器）所执行的工作。关系引擎包含两个主要组件：查询优化器和执行引擎。查询优化器的工作是使用数据库引擎提供的算法为查询组装一个高效的执行计划。计划创建后，将由执行引擎执行。


    查询处理器需要对查询执行的第一个操作是解析和绑定，这由一个称为 `algebrizer` 的组件完成。查询处理器执行的下一步是查询优化过程。如图 1-3 所示，查询优化过程基本上是对候选执行计划的枚举，并根据它们的成本（使用基数估计和成本估计）从中选择最优的计划。SQL
    Server 查询优化器是一个基于成本的优化器，虽然它使用规则来探索搜索空间，但它依赖于一个成本估计模型来估计每个候选计划的成本并选择最高效的一个。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig3_HTML.jpg](img/393702_2_En_1_Fig3_HTML.jpg)

    **图 1-3** 查询优化器架构


    关系引擎实现了许多物理操作，这些操作由查询优化器选择以组装执行计划。因此，简单来说，查询优化可以看作是将初始树表示中表达的原始逻辑操作映射到执行引擎实现的物理操作的过程。显然，这不是一对一的运算符匹配，而是一个更复杂的过程。逻辑操作和物理操作都可以在执行计划的每个运算符上看到。例如，一个逻辑聚合操作必须映射到一个物理流聚合或一个哈希聚合。另一方面，一个逻辑连接可以映射到嵌套循环连接、合并连接或哈希连接物理运算符。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig4_HTML.jpg](img/393702_2_En_1_Fig4_HTML.jpg)

    **图 1-4** SQL Server 查询处理过程


    查询处理过程遵循多个步骤，如图 1-4 所示，尽管主要的优化过程是在最后通过最多三个探索阶段执行的。这是使用转换规则生成候选计划并估计基数和成本的部分。优化过程不必执行所有三个探索阶段，只要找到一个良好的执行计划，就可以在任何一个阶段停止。


    除了此时已转换为逻辑操作树的查询文本以及与查询直接相关的对象的元数据外，查询优化器还将从其他对象（如约束、索引等）以及优化器统计信息中收集额外信息。


    如前图 1-4 所示，理论上，为了找到查询的最佳执行计划，一个基于成本的查询优化器应该生成搜索空间中存在的所有可能的执行计划，并正确估计每个计划的成本。这些操作中的每一个都非常复杂，这就是为什么查询优化（使用算法术语）被认为是一个
    NP-hard 问题。因此，查询优化器不可能对所有可能的计划进行穷举搜索，因为一些复杂的查询可能有成千上万甚至数百万个可能的解决方案。例如，仅考虑查询中的连接顺序，根据要连接的表的数量，可能的解决方案数量可以计算为


    ```

    (2n – 2)!/(n – 1)!

    ```


    其中两个感叹号 (`!`) 符号代表数学上的阶乘运算。表 1-2 显示了从 2 个表到 12 个表的查询可能解决方案数量的示例，使用了两种典型的连接形状。


    **表 1-2** 左深树和丛生树的连接顺序


    | 表数 | 左深树 | 丛生树 |

    | --- | --- | --- |

    | 2 | 2 | 2 |

    | 3 | 6 | 12 |

    | 4 | 24 | 120 |

    | 5 | 120 | 1,680 |

    | 6 | 720 | 30,240 |

    | 7 | 5,040 | 665,280 |

    | 8 | 40,320 | 17,297,280 |

    | 9 | 362,880 | 518,918,400 |

    | 10 | 3,628,800 | 17,643,225,600 |

    | 11 | 39,916,800 | 670,442,572,800 |

    | 12 | 479,001,600 | 28,158,588,057,600 |


    **注意**

    像 `left-deep`、`right-deep` 和 `bushy trees` 这样的名称通常用于标识逻辑树中连接顺序的形状。`Left-deep`
    树也称为线性树或线性处理树。`Bushy trees` 的集合包含了 `left-deep` 和 `right-deep` 树的集合。更多细节，您可以查看我的博文：[`www.benjaminnevarez.com/2010/06/optimizing-join-orders/`](http://www.benjaminnevarez.com/2010/06/optimizing-join-orders/)。


    为了探索搜索空间，需要一个计划枚举算法来探索语义上等价的计划。等价候选解决方案的生成由查询优化器使用转换规则完成。查询优化器也使用启发式方法来限制考虑的选择数量，以保持优化时间合理。查询优化器考虑的替代计划集合被称为搜索空间，并在优化过程中存储在一个称为
    `memo` 的组件中。


    枚举候选计划后，查询优化器需要估计这些计划的成本，以便可以选择最优的、成本最低的计划。查询优化器使用考虑资源使用（如 I/O、CPU 和内存）的成本公式来估计
    `memo` 结构中每个物理操作符的成本，尽管稍后在查询计划中只能看到 CPU 和 I/O 成本的报告。计划中所有操作符的成本之和就是查询的成本。成本估计是按操作符进行的，取决于物理操作符使用的算法以及需要处理的记录的估计数量。这个记录数量的估计被称为基数估计。'
- fmt: 'Cardinality estimation uses a mathematical model that relies on statistical
    information and calculations based on simplifying assumptions like uniformity,
    independence, containment, and inclusion (which still holds true for the new cardinality
    estimator introduced with SQL Server 2014). Statistics contain information describing
    the distribution of values in one or more columns of a table that consists of
    histograms, a global calculated density information, and optionally special string
    statistics (also called tries). Cardinality for the base table can be obtained
    directly using statistics, but estimation of most other cardinalities—for example,
    for filters or intermediate results for joins—has to be calculated using predefined
    models and formulas. However, the model does not account for all the possible
    cases, and sometimes, as mentioned earlier, assumptions are used. Statistics are,
    by default, created and updated automatically by SQL Server, and administrators
    have multiple choices to manage them as well.


    Note


    Most of the internal information about what the SQL Server query optimizer does
    can be inspected using undocumented statements and trace flags, although these
    are not supported by Microsoft and are not intended to be used in a production
    system. We will cover some of them in the rest of the chapter.


    Since our interest in this chapter is to understand how SQL Server works, after
    this introduction, let us now review the query optimization process in more detail,
    starting with parsing and binding.


    ### Parsing and Binding


    As mentioned earlier, parsing and binding are the first operations performed when
    a query is submitted for execution. Parsing checks the query for correct syntax,
    including the correct use of keywords and spelling, and translates its information
    into a relational algebra tree representing the logical operators of the query.


    The binding process checks whether tables, columns, and any other element referenced
    in the query exist, associating every object on the logical tree with its corresponding
    object in the system catalog. This process is also called name resolution. Binding
    also validates that the requested operations between the query objects are valid
    and that the objects are visible to the user running the query (i.e., the user
    has the required permissions). The resulting tree after the binding operation
    is then sent to the query optimizer. For example, the following query will have
    the tree representation as shown in Figure [1-5](#393702_2_En_1_Chapter.xhtml#Fig5),
    which shows data access, join, filter, and aggregation operations:


    ```

    SELECT ProductID, COUNT(*)

    FROM Sales.SalesOrderHeader so JOIN Sales.SalesOrderDetail sod

    ON so.SalesOrderID = sod.SalesOrderID

    WHERE SalesPersonID = 275

    GROUP BY ProductID

    ```


    Note


    Most of the examples in this book use the AdventureWorks databases, which you
    can download from [`https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure`](https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure).
    Download both `AdventureWorks2017.bak` and `AdventureWorksDW2017.bak` backup files,
    which are the OLTP (Online Transaction Processing) and data warehouse databases,
    and restore them in SQL Server as `AdventureWorks2017` and `AdventureWorksDW2017`.
    All the code in this book has been tested in SQL Server 2019 so you also want
    to make sure to change these databases’ compatibility level to 150.


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig5_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Query tree representation


    Name resolution for views also includes the process of view substitution in which
    a view reference is expanded to include the actual view definition. The query
    tree representation, as shown in Figure [1-5](#393702_2_En_1_Chapter.xhtml#Fig5),
    represents the logical operations performed by the query and is closely related
    to the original syntax of the query. These logical operations include things like
    “get data from the Sales table,” “perform an inner join,” “perform an aggregation,”
    and so on. The query processor will use different tree representations during
    the entire optimization process, and these trees will have different names.


    Although these logical trees are not defined anywhere in the documentation, the
    following query will return the names of those tree representations:


    ```

    SELECT * FROM sys.dm_xe_map_values

    WHERE name = ''query_optimizer_tree_id''

    ```


    The following is the output of such query on SQL Server 2019 Cumulative Update
    4\. The `@@VERSION` function in my system in addition returns `Microsoft SQL Server
    2019 (RTM-CU4) (KB4548597) - 15.0.4033.1 (X64)` where `KB4548597` is the knowledge
    base article describing the cumulative update and `15.0.4033.1` is the product
    version. Starting with SQL Server 2017, service packs are no longer available,
    and the new servicing model will be based on cumulative updates (and General Distribution
    Releases, or GDRs, when required), and only CU are released.'
