    will depend on the number of rows read, so it can range from very cheap to very
    expensive.


    Making sure you executed the previous queries, we can now run this query to display
    some of the information collected by the Query Store:


    ```

    SELECT rs.avg_logical_io_reads, qt.query_sql_text,

    q.query_id, qt.query_text_id, p.plan_id, rs.runtime_stats_id,

    rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    JOIN sys.query_store_runtime_stats_interval AS rsi

    ON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id

    ```


    We get the following output; only the required rows are displayed:


    | `avg_logical_io_reads` | `1249` | `7054` |

    | --- | --- | --- |

    | `query_sql_text` | (@pid int)SELECT * FROM | (@pid int)SELECT * FROM |

    | `query_id` | 1 | 1 |

    | `query_text_id` | 1 | 1 |

    | `plan_id` | 1 | 2 |

    | `runtime_stats_id` | 1 | 2 |

    | `avg_rowcount` | 2348.5 | 2348.5 |

    | `count_executions` | 2 | 2 |


    This shows that for `plan_id` 1, the one with the table scan, the average logical
    IO reads was 1249 as the entire table has 1249 pages. For `plan_id` 2, the plan
    with the index seek and key lookup operators, the average was 7054, which is roughly
    29 plus 14,077 divided by 2, as there were two executions.


    SQL Server Management Studio can also show you this and other Query Store information.
    Right-click Regressed Queries on the Query Store folder under the database and
    select View Regressed Queries. The report will give you the choice to select CPU
    Time (us), Duration (us), Logical Reads, Logical Writes, Memory Consumption (KB),
    and Physical Reads. Click “View regressed queries in a grid format with additional
    details.” Figure [6-5](#393702_2_En_6_Chapter.xhtml#Fig5) shows the report with
    logical reads.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig5_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Top 25 regressed queries sorted by logical reads


    Click the query we are interested in. (You may have different `query_id` even
    if you have followed the same steps here.) You would see a screen similar to Figure
    [6-6](#393702_2_En_6_Chapter.xhtml#Fig6) on the top-right pane that shows both
    plans, represented by two small circles. Clicking a circle will show runtime information
    for each plan, and the graphical plan will be displayed at the bottom pane (not
    shown in Figure [6-6](#393702_2_En_6_Chapter.xhtml#Fig6)).


