- fmt: "## SQLOS\n\n正如第 1 章所提到的，`SQLOS` 是为 `SQL Server 2005` 版本构建的。当时，`SQL Server`\
    \ 是仅限 `Windows` 的应用程序，因此 `SQLOS` 从未旨在提供平台独立性或可移植性。它的创建不是为了帮助将数据库引擎移植到其他操作系统。当时并不需要一个平台抽象层（`PAL`）。\n\
    \n如前所述，`SQLOS` 的主要目的是利用新的可用硬件功能，例如具有极大内存量的硬件、非统一内存访问（`NUMA`）系统、对称多线程（`SMT`）和每插槽多核心的多\
    \ `CPU` 配置系统，以及支持热插拔内存和 `CPU`。这些以及其他新的硬件和硬件趋势将使数据库引擎受益。`SQLOS` 成为了 `SQL Server`\
    \ 的应用层，负责管理所有操作系统资源，如内存和缓冲管理、非抢占式调度、`I/O` 功能、异常处理、资源调控、死锁检测和扩展事件。\n\n如前所述，操作系统服务是通用服务，有时不能满足数据库引擎的需求。这些通用服务在被数据库引擎使用时可能无法很好地扩展。这些服务可以针对数据库引擎的特定需求进行重写、优化和定制。\n\
    \n然而，即使 `SQLOS` 从未旨在提供平台独立性，但在后来决定将数据库引擎引入 `Linux` 时，它却扮演了一个非常重要的角色，这一点连 `SQL\
    \ Server` 团队当时也未曾预料到。\n\n> 注意\n>\n> 有关 `SQLOS` 的更多细节，请阅读 `Slava Oks` 的论文“A new\
    \ platform layer in SQL Server 2005 to exploit new hardware capabilities and their\
    \ trends”，链接如下：\n> `https://docs.microsoft.com/en-us/archive/blogs/slavao/platform-layer-for-sql-server`\n\
    \n## Project Helsinki\n\n`SQL Server` 团队之前曾多次考虑将 `SQL Server` 移植到 `Linux`。从微软退休的杰出工程师兼总经理\
    \ `Hal Berenson` 在其 2011 年的博文“Porting Microsoft SQL Server to Linux”中描述了这段经历，文章链接如下：\n\
    `https://hal2020.com/2011/07/27/porting-microsoft-sql-server-to-linux`。这篇文章至今读来仍非常有趣。微软数据库系统部门的总经理\
    \ `Rohan Kumar` 也在 2017 年的这次采访中提到了几次发布 `Linux` 版本 `SQL Server` 的尝试，链接如下：\n`https://techcrunch.com/2017/07/17/how-microsoft-brought-sql-server-to-linux/`。\n\
    \n在 2015 年底，将 `SQL Server` 引入 `Linux` 的项目被重新提上议程，并催生了 `Project Helsinki`，该项目以\
    \ `Linux` 内核的创建者及历史上的主要开发者 `Linus Torvalds` 的出生地命名。`Helsinki` 团队由 `Slava Oks`（`SQL\
    \ Server` 合作伙伴工程经理）、`Tobias Ternstrom`（`SQL Server` 首席项目经理）和 `Scott Konersmann`（`SQL\
    \ Server` 合作伙伴工程经理）领导。`Slava` 也是构建 `SQLOS` 的团队成员之一，正如所提到的，`SQLOS` 在 `SQL Server\
    \ 2005` 版本中得以实现。\n\n值得注意的是，该项目在严格的保密协议（`NDA`）下运行，并且据报道没有发生任何泄露。即使是那些与微软签有现行 `SQL\
    \ Server NDA` 的人，例如微软 `MVP` 社区，也对该毫不知情。\n\n`Helsinki` 团队设想在 `Linux` 上的产品在质量、功能、性能、应用程序兼容性、可扩展性和安全性方面与\
    \ `Windows` 版本完全相同。此外，该产品还需要在代码库中保持快速的创新步伐，以确保修复和新功能在 `Windows` 和 `Linux` 平台上同步出现。\n\
    \n移植到 `Linux`，通常也被描述为纯粹主义者的方法，通常是第一个被考虑的方法。但根据微软团队的说法，直接进行移植将是一个庞大的项目，并会面临以下挑战：\n\
    \n*   拥有超过 `4000` 万行 `C++` 代码和近 `30` 年的开发历史，将代码移植以在 `Linux` 上编译将需要数年时间才能完成。\n\
    *   在移植项目期间，随着新功能、更新和修复的不断进行，实际代码库仍在变化。赶上当前的代码库本身将是一个巨大的挑战。\n*   经过几十年在单一平台（`Windows`）上的开发，代码库中存在大量的操作系统依赖项。这些依赖项是进行代码移植到\
    \ `Linux` 的最大挑战。`SQL Server` 团队在以下库中发现了依赖项：\n    1.  `Windows` 内核库（`ntdll.dll`）\n\
    \    2.  `Win32` 库（例如 `user32.dll`）\n    3.  `Windows` 应用程序库（例如 `MSXML`、`SQLCLR`、由\
    \ `SQL Server Agent` 和 `MS DTC`（即 `Microsoft Distributed Transaction Coordinator`）使用的\
    \ `COM` 组件和库）\n\n其中，`Windows` 应用程序库是最复杂的依赖项。仅重写所有这些库就无法在合理的时间内完成。很快，很明显直接进行移植是不可接受的。至少，微软之前曾考虑过移植路径，但这样的项目从未获得批准。因此，`Helsinki`\
    \ 团队开始寻找移植之外的替代解决方案。\n\n`SQLOS` 无法提供所有所需的抽象。例如，在 `SQLOS` 之外仍然进行了许多 `Windows` 调用。此外，`XML`\
    \ 和 `SQL Server Agent` 等几个组件位于 `SQL Server` 外部，根本未使用 `SQLOS`。因此，一个考虑是，不重写这些库，而是专注于将\
    \ `SQLOS` 发展为一个适当的抽象层。也就是说，所有对 `Windows API` 的调用都将通过 `SQLOS` 路由，由 `SQLOS` 与底层操作系统交互。正因为如此，需要一种新的方法，于是考虑了一种名为\
    \ `Drawbridge` 的虚拟化解决方案。"
  raw: '## SQLOS


    As mentioned in Chapter [1](#393702_2_En_1_Chapter.xhtml), SQLOS was built for
    the SQL Server 2005 release. Back then, SQL Server was a Windows-only application,
    so SQLOS was never intended to provide platform independence or portability. It
    was not created to help porting the database engine to other operating systems.
    There was no need for a PAL.


    As also indicated earlier, SQLOS main purpose was to exploit the new available
    hardware capabilities such as hardware with very large amounts of memory, non-uniform
    memory access (NUMA) systems, symmetric multithreading (SMT) and multi-CPU configuration
    with multiple cores per socket systems, and support for hot memory and CPU add-ons
    and removals. These and other new hardware and hardware trends would benefit database
    engines. SQLOS became the SQL Server application layer responsible for managing
    all operating system resources such as memory and buffer management, nonpreemptive
    scheduling, I/O functions, exception handling, resource governance, deadlock detection,
    and extended events.


    As indicated, operating system services are general-purpose services and sometimes
    inadequate for database engine needs. Those general-purpose services may not scale
    well while used by a database engine. Those services could be rewritten and optimized
    and tailored for the specific needs of a database engine.


    However, even when SQLOS was never intended to provide platform independence,
    unbeknownst to the SQL Server team, SQLOS would take a very important role years
    later when it was decided to take the database engine to Linux .


    Note


    For more details about SQLOS, read the paper “A new platform layer in SQL Server
    2005 to exploit new hardware capabilities and their trends” by Slava Oks at [`https://docs.microsoft.com/en-us/archive/blogs/slavao/platform-layer-for-sql-server`](https://docs.microsoft.com/en-us/archive/blogs/slavao/platform-layer-for-sql-server).


    ## Project Helsinki


    The SQL Server team had considered porting SQL Server to Linux a few times before.
    Hal Berenson, who retired from Microsoft as a distinguished engineer and general
    manager, describes the experience in its 2011 post “Porting Microsoft SQL Server
    to Linux” which you can find at [`https://hal2020.com/2011/07/27/porting-microsoft-sql-server-to-linux`](https://hal2020.com/2011/07/27/porting-microsoft-sql-server-to-linux).
    The article is still a very interesting read. Rohan Kumar, general manager of
    Microsoft’s Database Systems group, also mentioned a couple of attempts to release
    a Linux version of SQL Server on this interview back in 2017, which you can read
    here: [`https://techcrunch.com/2017/07/17/how-microsoft-brought-sql-server-to-linux/`](https://techcrunch.com/2017/07/17/how-microsoft-brought-sql-server-to-linux/).


    The project to take SQL Server to Linux was revisited again at the end of 2015
    giving rise to Project Helsinki, named after the birthplace of Linus Torvalds,
    the creator and, historically, the principal developer of the Linux kernel. The
    Helsinki team was led by Slava Oks, Partner Group Engineering Manager, SQL Server;
    Tobias Ternstrom, Principal Program Manager, SQL Server; and Scott Konersmann,
    Partner Engineering Manager, SQL Server. Slava was also part of the team that
    built SQLOS which, as mentioned, was implemented in the SQL Server 2005 release.


    It was worth noting that the project ran under strict NDA (nondisclosure agreement),
    and reportedly there were no leaks. Not even people with current SQL Server NDA,
    for example, the Microsoft MVP community, were aware of the project.


    The Helsinki team envisioned to have a product on Linux to be the same as the
    Windows release in terms of quality, functionality, performance, application compatibility,
    scalability, and security. In addition, the product would require a continued
    fast pace of innovation in the code base in order to make sure that fixes and
    new features would appear simultaneously both in the Windows and Linux platforms.


    Porting to Linux, also usually described as the purist approach, was usually the
    first approach considered. But according to the Microsoft team, doing a port would
    be a huge project and would face the following challenges :


    With more than 40 million lines of C++ code and close to 30 years of development
    behind it, porting the code to compile Linux would take years to complete.


    During the porting project, the live code will still be changing as new features,
    updates, and fixes are performed all the time. Catching up with the current code
    base would be another huge challenge by itself.


    After decades of development in a single platform, Windows, there were a large
    number of operating system dependencies across the code base. Those dependencies
    were the biggest challenge to do a code port to Linux. The SQL Server team found
    dependencies in the following libraries:


    1.  Windows kernel library (ntdll.dll)


    2.  Win32 library (e.g., user32.dll)


    3.  Windows application libraries (e.g., MSXML, SQLCLR, COM components and libraries
    used by the SQL Server Agent and MS DTC or Microsoft Distributed Transaction Coordinator)


    Among these, the Windows application libraries were the most complex dependencies.
    Rewriting all these libraries alone could not be completed in a reasonable time.
    Very soon it was clear that doing a direct port would not be acceptable. At least,
    Microsoft had been considering the port path before, but such project was never
    approved. So, the Helsinki team started looking for an alternative solution to
    porting.


    SQLOS was not able to provide all the abstraction required. For example, there
    were still many Windows calls performed outside SQLOS. In addition, several components
    such as XML and the SQL Server Agent were external to SQL Server and not using
    SQLOS at all. So a consideration was to, instead of rewriting these libraries,
    focus on growing SQLOS into a proper abstraction layer. That is, all calls to
    Windows APIs would be routed through SQLOS which will interact with the underlying
    operating system. Because of this, a new approach was needed and a virtualization
    solution called Drawbridge was considered .'
  trans: "\n## SQLOS\n\n正如第 1 章所提到的，`SQLOS` 是为 `SQL Server 2005` 版本构建的。当时，`SQL Server`\
    \ 是仅限 `Windows` 的应用程序，因此 `SQLOS` 从未旨在提供平台独立性或可移植性。它的创建不是为了帮助将数据库引擎移植到其他操作系统。当时并不需要一个平台抽象层（`PAL`）。\n\
    \n如前所述，`SQLOS` 的主要目的是利用新的可用硬件功能，例如具有极大内存量的硬件、非统一内存访问（`NUMA`）系统、对称多线程（`SMT`）和每插槽多核心的多\
    \ `CPU` 配置系统，以及支持热插拔内存和 `CPU`。这些以及其他新的硬件和硬件趋势将使数据库引擎受益。`SQLOS` 成为了 `SQL Server`\
    \ 的应用层，负责管理所有操作系统资源，如内存和缓冲管理、非抢占式调度、`I/O` 功能、异常处理、资源调控、死锁检测和扩展事件。\n\n如前所述，操作系统服务是通用服务，有时不能满足数据库引擎的需求。这些通用服务在被数据库引擎使用时可能无法很好地扩展。这些服务可以针对数据库引擎的特定需求进行重写、优化和定制。\n\
    \n然而，即使 `SQLOS` 从未旨在提供平台独立性，但在后来决定将数据库引擎引入 `Linux` 时，它却扮演了一个非常重要的角色，这一点连 `SQL\
    \ Server` 团队当时也未曾预料到。\n\n> 注意\n>\n> 有关 `SQLOS` 的更多细节，请阅读 `Slava Oks` 的论文“SQL Server\
    \ 2005 中利用新硬件能力及其趋势的新平台层”，链接如下：\n> `https://docs.microsoft.com/en-us/archive/blogs/slavao/platform-layer-for-sql-server`\n\
    \n## Project Helsinki\n\n`SQL Server` 团队之前曾多次考虑将 `SQL Server` 移植到 `Linux`。从微软退休的杰出工程师兼总经理\
    \ `Hal Berenson` 在其 2011 年的博文“将 Microsoft SQL Server 移植到 Linux”中描述了这段经历，文章链接如下：\n\
    `https://hal2020.com/2011/07/27/porting-microsoft-sql-server-to-linux`。这篇文章至今读来仍非常有趣。微软数据库系统部门的总经理\
    \ `Rohan Kumar` 也在 2017 年的这次采访中提到了几次发布 `Linux` 版本 `SQL Server` 的尝试，链接如下：\n`https://techcrunch.com/2017/07/17/how-microsoft-brought-sql-server-to-linux/`。\n\
    \n在 2015 年底，将 `SQL Server` 引入 `Linux` 的项目被重新提上议程，并催生了 `Project Helsinki`，该项目以\
    \ `Linux` 内核的创建者及历史上的主要开发者 `Linus Torvalds` 的出生地命名。`Helsinki` 团队由 `Slava Oks`（`SQL\
    \ Server` 合作伙伴工程经理）、`Tobias Ternstrom`（`SQL Server` 首席项目经理）和 `Scott Konersmann`（`SQL\
    \ Server` 合作伙伴工程经理）领导。`Slava` 也是构建 `SQLOS` 的团队成员之一，正如所提到的，`SQLOS` 在 `SQL Server\
    \ 2005` 版本中得以实现。\n\n值得注意的是，该项目在严格的保密协议（`NDA`）下运行，并且据报道没有发生任何泄露。即使是那些与微软签有现行 `SQL\
    \ Server NDA` 的人，例如微软 `MVP` 社区，也对该毫不知情。\n\n`Helsinki` 团队设想在 `Linux` 上的产品在质量、功能、性能、应用程序兼容性、可扩展性和安全性方面与\
    \ `Windows` 版本完全相同。此外，该产品还需要在代码库中保持快速的创新步伐，以确保修复和新功能在 `Windows` 和 `Linux` 平台上同步出现。\n\
    \n移植到 `Linux`，通常也被描述为纯粹主义者的方法，通常是第一个被考虑的方法。但根据微软团队的说法，直接进行移植将是一个庞大的项目，并会面临以下挑战：\n\
    \n*   拥有超过 `4000` 万行 `C++` 代码和近 `30` 年的开发历史，将代码移植以在 `Linux` 上编译将需要数年时间才能完成。\n\
    *   在移植项目期间，随着新功能、更新和修复的不断进行，实际代码库仍在变化。赶上当前的代码库本身将是一个巨大的挑战。\n*   经过几十年在单一平台（`Windows`）上的开发，代码库中存在大量的操作系统依赖项。这些依赖项是进行代码移植到\
    \ `Linux` 的最大挑战。`SQL Server` 团队在以下库中发现了依赖项：\n    1.  `Windows` 内核库（`ntdll.dll`）\n\
    \    2.  `Win32` 库（例如 `user32.dll`）\n    3.  `Windows` 应用程序库（例如 `MSXML`、`SQLCLR`、由\
    \ `SQL Server Agent` 和 `MS DTC`（即 `Microsoft Distributed Transaction Coordinator`）使用的\
    \ `COM` 组件和库）\n\n其中，`Windows` 应用程序库是最复杂的依赖项。仅重写所有这些库就无法在合理的时间内完成。很快，很明显直接进行移植是不可接受的。至少，微软之前曾考虑过移植路径，但这样的项目从未获得批准。因此，`Helsinki`\
    \ 团队开始寻找移植之外的替代解决方案。\n\n`SQLOS` 无法提供所有所需的抽象。例如，在 `SQLOS` 之外仍然进行了许多 `Windows` 调用。此外，`XML`\
    \ 和 `SQL Server Agent` 等几个组件位于 `SQL Server` 外部，根本未使用 `SQLOS`。因此，一个考虑是，不重写这些库，而是专注于将\
    \ `SQLOS` 发展为一个适当的抽象层。也就是说，所有对 `Windows API` 的调用都将通过 `SQLOS` 路由，由 `SQLOS` 与底层操作系统交互。正因为如此，需要一种新的方法，于是考虑了一种名为\
    \ `Drawbridge` 的虚拟化解决方案。\n"
- fmt: '## Drawbridge


    Drawbridge was a Microsoft Research project intended as a new form of virtualization
    for application sandboxing based on a library OS version of Windows. Although
    virtualization has been extremely popular for many years now, a problem with virtualization
    was that it requires an entire operating system instance and a lot of services
    to run, making it very heavy. Research has been conducted to build a lighter version
    of these virtual machines with only the required resources.


    Drawbridge’s main purpose was to drastically reduce the virtualization resource
    overhead when hosting multiple virtual machines in the same hardware, in some
    way, something similar to what Docker would achieve sometime later. According
    to Microsoft, Drawbridge provided valuable insights into container technology.
    Docker was released as open source in March 2013, while the Drawbridge project
    had been completed two years earlier.


    The original purpose of the Drawbridge project was to host small applications
    in Azure. In order to achieve that, Drawbridge took the Windows kernel to run
    it in user mode in a process to create a high-density container that could run
    Windows applications. In other words, Drawbridge was actually taking the entire
    Windows operating system in user mode. Later, the team started testing running
    Drawbridge in other operating systems. This allowed them to use this technology
    as a container to run Windows applications on a different platform. Linux was
    one of those operating systems tested.


    Drawbridge contained two main components, a process called `picoprocess` and a
    library OS, sometimes called `LibOS`, as shown in Figure 2-1. The library OS was
    a Windows user mode library, which will allow Drawbridge to run Windows programs
    on a specified host. Such library implemented a large subset of the `Win32` and
    `Windows NT` calls, as also shown in Figure 2-1.


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig1_HTML.jpg](images/393702_2_En_2_Chapter/393702_2_En_2_Fig1_HTML.jpg)

    Figure 2-1: Drawbridge Windows library OS


    The library OS implemented more than 1500 Windows calls, and since it also implemented
    part of the `Win32` and `Windows NT` layers, the SQL Server team was able to host
    `MSXML`, `SQLCLR`, and other APIs required by other SQL Server components. By
    using the library OS, the team would not have to rewrite whole features like `MSXML`
    or `SQLCLR`. The `picoprocess` component was not needed for the SQL Server on
    the Linux project.


    **Note:** You can find more information about the Drawbridge project on the Microsoft
    Research page at [`www.microsoft.com/en-us/research/project/drawbridge/`](http://www.microsoft.com/en-us/research/project/drawbridge/)
    and "Rethinking the Library OS from the Top Down" at [`www.microsoft.com/en-us/research/publication/rethinking-the-library-os-from-the-top-down/`](http://www.microsoft.com/en-us/research/publication/rethinking-the-library-os-from-the-top-down/).


    ![../images/393702_2_En_2_Chapter/393702_2_En_2_Fig2_HTML.jpg](images/393702_2_En_2_Chapter/393702_2_En_2_Fig2_HTML.jpg)

    Figure 2-2: First SQL Server boot on Linux


    Andrew Baumann, who worked on the original Drawbridge project, had already made
    a port of Drawbridge and had a prototype of Drawbridge running on Linux. Thanks
    to this prototype, the team had SQL Server booting and working on Linux in less
    than a month, at the end of February 2015. Figure 2-2 is a picture of the screen
    of this first boot, as later posted by Slava in a blog titled "SQL Server on Linux,
    aka project Helsinki: Story behind the idea," which you can still find at [`https://docs.microsoft.com/en-us/archive/blogs/slavao/sql-server-on-linux-aka-project-helsinki-story-behind-the-idea`](https://docs.microsoft.com/en-us/archive/blogs/slavao/sql-server-on-linux-aka-project-helsinki-story-behind-the-idea).


    It is obvious to note that making SQL Server run on Linux was not only just a
    matter of running SQL Server on Drawbridge and fixing a few bugs. A Platform Abstraction
    Layer (`PAL`) was still needed to abstract the calls and libraries from the underlying
    operating system. Although `SQLOS` was not able to provide all the abstraction
    required, using it for the project was still a huge benefit. But using Drawbridge
    `LibOS` along with pieces of `SQLOS` provided the required solution. By combining
    these technologies, `SQLPAL` was born.'
