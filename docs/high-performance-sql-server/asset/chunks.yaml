- fmt: "### sys.dm_exec_session_wait_stats\n\n`sys.dm_exec_session_wait_stats` 是在\
    \ SQL Server 2016 中引入的，它终于提供了一种长期需要的方法来查找每个会话的等待情况，而之前这可能需要运行一个潜在的、开销很大的 SQL Server\
    \ 扩展事件会话。该 DMV 中的列与 `sys.dm_os_wait_stats` 完全相同。与 `sys.dm_os_wait_stats` 类似，但不同于\
    \ `sys.dm_exec_requests` 和 `sys.dm_os_waiting_tasks`，此 DMV 仅报告已完成的等待。例如，如果一个任务等待资源\
    \ 3000 毫秒，后两个 DMV 可能报告进度，比如 1500 或 2500，但 `sys.dm_exec_session_wait_stats` 只会在任务仍在等待时报告\
    \ 0，或者在等待完成时报告 3000。下一个示例将检查会话 52 的已完成等待。\n\n```sql\nSELECT * FROM sys.dm_exec_session_wait_stats\n\
    WHERE session_id = 52\n```\n\n### Extended Events\n\nSQL Server 中有三个与等待相关的扩展事件：`wait_completed`、`wait_info`\
    \ 和 `wait_info_external`。`wait_completed` 和 `wait_info` 非常相似，并且共享大部分字段。它们都捕获系统中发生的等待，但\
    \ `wait_info` 会在等待开始时和等待结束时都捕获信息，这由字段 `opcode`（其值为 “Begin” 和 “End”）定义。`wait_completed`\
    \ 只捕获已完成的等待。其他常见字段是 `duration` 和 `signal_duration`（分别是持续时间和信号持续时间，以毫秒为单位），以及 `wait_resource`\
    \ 和 `wait_type`（分别是等待所依据的资源和等待类型）。当发生调度器让出操作以及线程再次获得处理器时间时，也会产生 `wait_info`。`wait_info_external`\
    \ 则是在 SQL Server 以抢占模式运行外部任务时产生。\n\n如前所述，等待在 SQL Server 中无时无刻不在发生，即使是在未执行任何用户查询的空闲系统上也是如此。在捕获这些事件时应极其小心，因为它可能会生成大量数据。你应该只进行短时间的故障排除，或尽可能过滤掉等待。\n\
    \n让我们运行以下练习来查看其中一些等待。首先，为 `wait_info` 事件创建一个新的扩展事件会话。（确保根据你的测试环境使用正确的驱动器和文件夹。）你可能希望收集整个实例的等待，或指定筛选器以限制事件数量。在本例中，你希望查看特定查询的等待，因此一个好的筛选器可以是你的会话\
    \ ID。在你的会话中找到 `spid` 并在以下创建名为 `waits` 的扩展事件会话的语句中相应替换。\n\n```sql\nCREATE EVENT\
    \ SESSION waits ON SERVER\nADD EVENT sqlos.wait_info (\nWHERE (sqlserver.session_id\
    \ = 58))\nADD TARGET package0.event_file\n(SET FILENAME = 'C:\\data\\waits.xel')\n\
    ```\n\n然后启动会话，运行你想要分析的查询（在本例中是一个排序语句），然后关闭会话。\n\n```sql\nALTER EVENT SESSION waits\
    \ ON SERVER STATE = START\nGO\nUSE AdventureWorks2017\nGO\nSELECT * FROM Sales.SalesOrderDetail\n\
    ORDER BY OrderQty\nGO\nALTER EVENT SESSION waits ON SERVER STATE = STOP\n```\n\
    \n以下语句将显示捕获的数据。例如，我的测试系统只显示了几千个事件。\n\n```sql\nSELECT *, CAST(event_data AS XML)\
    \ AS 'event_data'\nFROM sys.fn_xe_file_target_read_file('C:\\data\\waits*.xel',\
    \ NULL, NULL, NULL)\n```\n\n仅作参考，我捕获的数据中某个事件的 `event_data` 列如下所示：\n\n```\n<event\
    \ name=\"wait_info\" package=\"sqlos\" timestamp=\"2023-10-27T10:00:00.000Z\"\
    >\n  <data name=\"wait_type\">\n    <type name=\"wait_type\" package=\"package0\"\
    />\n    <value>CXPACKET</value>\n    <text>CXPACKET</text>\n  </data>\n  <data\
    \ name=\"opcode\">\n    <type name=\"wait_opcode\" package=\"sqlos\"/>\n    <value>1</value>\n\
    \    <text>End</text>\n  </data>\n  <data name=\"duration\">\n    <type name=\"\
    uint64\" package=\"package0\"/>\n    <value>3000</value>\n  </data>\n  <data name=\"\
    signal_duration\">\n    <type name=\"uint64\" package=\"package0\"/>\n    <value>100</value>\n\
    \  </data>\n  <data name=\"wait_resource\">\n    <type name=\"binary_data\" package=\"\
    package0\"/>\n    <value>0x0000007128e19ec0</value>\n  </data>\n</event>\n```\n\
    \n你可以看到前面提到的 `wait_info` 事件的字段。在本例中，等待类型是 `CXPACKET`，`opcode` 是 `End`，并且捕获了一些\
    \ `duration`、`signal_duration` 和 `wait_resource` 的值。\n\n让我们将数据保存到一个临时表中，以便更容易进行一些额外处理：\n\
    \n```sql\nCREATE TABLE #waits (\nevent_data XML)\nGO\nINSERT INTO #waits (event_data)\n\
    SELECT CAST (event_data AS XML) AS event_data\nFROM sys.fn_xe_file_target_read_file\
    \ (\n'C:\\data\\waits*.xel', NULL, NULL, NULL)\n```\n\n最后，运行以下查询以执行一些聚合：\n\n```sql\n\
    SELECT\n    waits.wait_type,\n    COUNT (*) AS wait_count,\n    SUM (waits.duration)\
    \ AS total_wait_time_ms,\n    SUM (waits.duration) - SUM (waits.signal_duration)\
    \ AS total_resource_wait_time_ms,\n    SUM (waits.signal_duration) AS total_signal_wait_time_ms\n\
    FROM\n    (SELECT\n        event_data.value ('(/event/@timestamp)[1]', 'DATETIME')\
    \ AS datetime,\n        event_data.value ('(/event/data[@name=''wait_type'']/text)[1]',\
    \ 'VARCHAR(100)') AS wait_type,\n        event_data.value ('(/event/data[@name=''opcode'']/text)[1]',\
    \ 'VARCHAR(100)') AS opcode,\n        event_data.value ('(/event/data[@name=''duration'']/value)[1]',\
    \ 'BIGINT') AS duration,\n        event_data.value ('(/event/data[@name=''signal_duration'']/value)[1]',\
    \ 'BIGINT') AS signal_duration\n    FROM #waits\n    ) AS waits\nWHERE waits.opcode\
    \ = 'End'\nGROUP BY waits.wait_type\nORDER BY total_wait_time_ms DESC\n```\n\n\
    我的测试摘要输出（仅包含顶部事件）如下所示。\n\n| wait_type | wait_count | total_wait_time_ms | total_resource_wait_time_ms\
    \ | total_signal_wait_time_ms |\n| --- | --- | --- | --- | --- |\n| CXPACKET |\
    \ 5301 | 11662 | 11649 | 13 |\n| NETWORK_IO | 7057 | 482 | 478 | 4 |\n| LATCH_EX\
    \ | 23 | 19 | 9 | 10 |\n| LATCH_SH | 4 | 14 | 0 | 14 |\n\n最后，关闭并删除扩展事件会话，并删除临时表。\n\
    \n```sql\nDROP EVENT SESSION waits ON SERVER\nDROP TABLE #waits\n```\n\n在这个练习中，我们按会话\
    \ ID 进行了筛选，但你也可以按其他字段进行筛选。下一节讨论 `system_health` 会话时展示了一个示例，其默认代码按等待类型和持续时间进行筛选。"
  raw: '### sys.dm_exec_session_wait_stats


    The `sys.dm_exec_session_wait_stats` , which was introduced with SQL Server 2016,
    is finally a long-requested method to find the waits per session, which previously
    required to run a potentially expensive SQL Server Extended Event session. The
    columns in this DMV are exactly the same as sys.dm_os_wait_stats. In the same
    way as sys.dm_os_wait_stats, but different from sys.dm_exec_requests and sys.dm_os_waiting_tasks,
    this DMV only reports waits that have been completed. For example, if a task waited
    3000 milliseconds for a resource, the last two DMVs can report the progress, like
    1500 or 2500, but sys.dm_exec_session_wait_stats will only report 0 if the task
    is still waiting or 3000 when the wait is completed. The next example will examine
    the waits completed for session 52.


    ```

    SELECT * FROM sys.dm_exec_session_wait_stats

    WHERE session_id = 52

    ```


    ### Extended Events


    There are three extended events related to waits in SQL Server: `wait_completed`,
    `wait_info`, and `wait_info_external`. `wait_completed` and `wait_info` are very
    similar and share most of their fields. They both capture waits happening in the
    system, but `wait_info` captures both when the wait begins and when the wait ends,
    as defined in the field `opcode`, which has the values “Begin” and “End.” `wait_completed`
    only captures completed waits. The other common fields are `duration` and `signal_duration`
    , which are the duration and signal duration in milliseconds, and `wait_resource`
    and `wait_type` , which are the resource on which the wait is waiting and the
    wait type, respectively. `wait_info` is also produced both when there is a scheduler
    yield operation and when the thread gets processor time again. `wait_info_external`
    is when SQL Server runs an external task running in preemptive mode.


    As mentioned, waits happen in SQL Server all the time, even on an idle system
    that is not executing any user queries. You should be extremely careful while
    capturing these events as it may generate a lot of data. You should only troubleshoot
    for short periods of time or filter out waits as much as possible.


    Let’s run the following exercise to see some of those waits. First, create a new
    extended event session for the `wait_info` event . (Make sure you use the correct
    drive and folder according to your test environment.) You may want to collect
    the waits for the entire instance or specify filters to limit the number of events.
    In this case, you want to see the waits for a specific query, so a good filter
    could be your session ID. Find the spid in your session and replace it accordingly
    in the following statement, which creates an extended event session called waits:


    ```

    CREATE EVENT SESSION waits ON SERVER

    ADD EVENT sqlos.wait_info (

    WHERE (sqlserver.session_id = 58))

    ADD TARGET package0.event_file

    (SET FILENAME = ''C:\data\waits.xel'')

    ```


    Then start the session and run the query you want to analyze—in this case, a sort
    statement—and close the session.


    ```

    ALTER EVENT SESSION waits ON SERVER STATE = START

    GO

    USE AdventureWorks2017

    GO

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    GO

    ALTER EVENT SESSION waits ON SERVER STATE = STOP

    ```


    The following statement will display the captured data. For example, my test system
    shows just a few thousand events.


    ```

    SELECT *, CAST(event_data AS XML) AS ''event_data''

    FROM sys.fn_xe_file_target_read_file(''C:\data\waits*.xel'', NULL, NULL, NULL)

    ```


    Just for reference, the `event_data` column for one of the events in my captured
    data looks like this:


    ```


    CXPACKET


    End


    0x0000007128e19ec0


    ```


    You can see the fields mentioned earlier for the `wait_info` event . In this case,
    the wait type is `CXPACKET`, `opcode End`, and some captured values for `duration`,
    `signal_duration`, and `wait_resource`.


    Let’s save the data in a temporary table to make it easier to do some additional
    processing:


    ```

    CREATE TABLE #waits (

    event_data XML)

    GO

    INSERT INTO #waits (event_data)

    SELECT CAST (event_data AS XML) AS event_data

    FROM sys.fn_xe_file_target_read_file (

    ''C:\data\waits*.xel'', NULL, NULL, NULL)

    ```


    Finally, run the following query to perform some aggregations:


    ```

    SELECT

    waits.wait_type,

    COUNT (*) AS wait_count,

    SUM (waits.duration) AS total_wait_time_ms,

    SUM (waits.duration) - SUM (waits.signal_duration) AS total_resource_wait_time_ms,

    SUM (waits.signal_duration) AS total_signal_wait_time_ms

    FROM

    (SELECT

    event_data.value (''(/event/@timestamp)[1]'', ''DATETIME'') AS datetime,

    event_data.value (''(/event/data[@name=''''wait_type'''']/text)[1]'', ''VARCHAR(100)'')
    AS wait_type,

    event_data.value (''(/event/data[@name=''''opcode'''']/text)[1]'', ''VARCHAR(100)'')
    AS opcode,

    event_data.value (''(/event/data[@name=''''duration'''']/value)[1]'', ''BIGINT'')
    AS duration,

    event_data.value (''(/event/data[@name=''''signal_duration'''']/value)[1]'', ''BIGINT'')
    AS signal_duration

    FROM #waits

    ) AS waits

    WHERE waits.opcode = ''End''

    GROUP BY waits.wait_type

    ORDER BY total_wait_time_ms DESC

    ```


    A summary output for my test including just the top events is shown next.


    | wait_type | wait_count | total_wait_time_ms | total_resource_wait_time_ms |
    total_signal_wait_time_ms |

    | --- | --- | --- | --- | --- |

    | CXPACKET | 5301 | 11662 | 11649 | 13 |

    | NETWORK_IO | 7057 | 482 | 478 | 4 |

    | LATCH_EX | 23 | 19 | 9 | 10 |

    | LATCH_SH | 4 | 14 | 0 | 14 |


    Finally, close and drop the extended event session and delete the temp table.


    ```

    DROP EVENT SESSION waits ON SERVER

    DROP TABLE #waits

    ```


    In this exercise, we filtered on session ID, but you can filter on some other
    fields as well. An example is shown in the next section, which discusses the `system_health`
    session and which default code filters out by wait type and duration.'
