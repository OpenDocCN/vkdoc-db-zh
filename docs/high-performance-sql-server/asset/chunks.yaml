  trans: '

    ### 页面预期寿命


    `SQLServer:Buffer Manager` 对象下的性能计数器 **页面预期寿命 (PLE)** 显示了数据页在缓冲池中停留的平均秒数。尽管网上仍有许多建议将
    300 及更低的值视为 PLE 出现问题的阈值，但这已不再是一个好的推荐。这个建议最初是微软多年前根据论文《**五分钟规则：用内存交换磁盘访问，以及五字节规则：用内存交换
    CPU 时间**》发布的。该规则指的是基于成本（包括价格和性能）决定一个页面应保留在内存中还是从磁盘访问的临界点。


    > 注意

    >

    > 这篇论文至今读来仍很有趣，你可以在网上找到它：[`www.hpl.hp.com/techreports/tandem/TR-86.1.pdf`](http://www.hpl.hp.com/techreports/tandem/TR-86.1.pdf)。此外，五分钟规则在
    10 年和 20 年后得到了重新审视，你可以通过阅读《**五分钟规则十年回顾及其他计算机存储经验法则**》（网址：[`http://research.microsoft.com/en-us/um/people/gray/5_min_rule_sigmod.pdf`](http://research.microsoft.com/en-us/um/people/gray/5_min_rule_sigmod.pdf)）和《**五分钟规则二十年回顾：闪存如何改变规则**》（网址：[`http://cacm.acm.org/magazines/2009/7/32091-the-five-minute-rule-20-years-later`](http://cacm.acm.org/magazines/2009/7/32091-the-five-minute-rule-20-years-later)）来了解新的发现。


    基于当前的硬件趋势，更好的做法是建立一个基线，并且只在 PLE 长时间下降时才考虑它存在问题。PLE 短时间下降可能不是问题，因为一些昂贵的查询和作业可能导致这种情况，但它应该能够很快恢复。


    关于 PLE 需要考虑的第二点是，如果你正在使用**非统一内存访问架构**（这在当今非常普遍）。如果你使用 NUMA，你应该使用`SQLServer:Buffer
    Node`对象中的 PLE，因为`SQLServer:Buffer Manager`会显示所有 NUMA 节点的通用值。在这种情况下，可能出现某个 NUMA
    节点的 PLE 有问题需要你关注，但如果你只关注通用 PLE，这个问题可能就不明显。同样地，一个节点的重大变化——例如，一个维护作业大幅降低 PLE——也可能影响通用值，使得问题看起来像是一个系统范围的问题。


    ### 缓冲区缓存命中率


    这个同样来自`SQLServer:Buffer Manager`的性能计数器，显示了无需访问磁盘就从缓冲池返回的页面百分比。该比率仅考虑最近几千次页面访问计算得出，期望达到
    100%或接近 100%的比率。


    ### 处理器时间百分比


    一个需要监控且易于理解的关键性能计数器，`Processor`对象下的**处理器时间百分比**，测量处理器执行非空闲线程所花费时间的平均百分比，它是处理器活动的主要指标。


    显然，高处理器使用率之后首先要验证的是它是否与 SQL Server 相关，在专用服务器上，这很可能是情况。话虽如此，高性能安装要求 SQL Server
    不仅运行在自己的服务器上，而且作为唯一的 SQL Server 实例运行。但即使在这样的配置中，排除其他 Windows 服务或应用程序可能是问题所在的情况也是好的。我在生产环境中也见过这样的情况。


    要分析处理器执行特定进程所花费时间的百分比，你可以使用`Process`对象下的处理器时间百分比。在性能监视器中查看此计数器时，你可能需要选择 SQL Server
    进程或你怀疑消耗处理器时间的其他几个进程。你的服务器可能列出大量实例（本例中是进程）。数据库引擎服务名为`sqlservr`（对应可执行文件`C:\Program
    Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\Binn\sqlservr.exe`）。根据你的安装选择，可能还会运行一些其他
    SQL Server 服务，例如 SQL Server 代理（名为`SQLAGENT.EXE`）、SQL Server 浏览器（`sqlbrowser.exe`）等。


    一旦你确认确实是 SQL Server 使用了大部分处理器时间，接下来要做的是找出 SQL Server 内部哪些进程可能正在利用这些资源，例如，通过查看最昂贵的查询。你可以使用查询存储、数据收集器功能收集的数据或其他工具。如果你没有收集任何性能数据，你可以简单地查看来自`sys.dm_exec_query_stats`
    DMV 的当前数据，假设问题查询仍在计划缓存中。以下是一个查询示例，它将按 CPU 使用率列出 20 个最昂贵的查询：


    ```sql

    SELECT TOP 20 qstats.query_hash,

    SUM(qstats.total_worker_time) / SUM(qstats.execution_count) AS avg_total_worker_time,

    MIN(qstats.statement_text) AS statement_text

    FROM (SELECT qs.*, SUBSTRING(st.text, (qs.statement_start_offset/2) + 1,

    ((CASE statement_end_offset

    WHEN -1 THEN DATALENGTH(ST.text)

    ELSE qs.statement_end_offset END

    - qs.statement_start_offset)/2) + 1) AS statement_text

    FROM sys.dm_exec_query_stats qs

    CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st) AS qstats

    GROUP BY qstats.query_hash

    ORDER BY avg_total_worker_time DESC

    ```


    此外，你也可以使用`sys.dm_exec_requests` DMV 查看当前正在执行的查询，如下所示：


    ```sql

    SELECT TOP 20 SUBSTRING(t.text, (r.statement_start_offset/2) + 1,

    ((CASE statement_end_offset

    WHEN -1 THEN DATALENGTH(t.text)

    ELSE r.statement_end_offset END

    - r.statement_start_offset)/2) + 1) AS statement_text, *

    FROM sys.dm_exec_requests r

    CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t

    ORDER BY cpu_time DESC

    ```


    请注意，在这两个查询中，数据都是按处理器时间排序的，第一个查询使用`total_worker_time`列，第二个使用`cpu_time`列。如第 6 章所述，`sys.dm_exec_query_stats`和`sys.dm_exec_requests`还包括其他列，你可以轻松更新之前的查询以按不同的性能指标（如逻辑读或物理读）进行排序。最后，一旦你找出哪些查询消耗了处理器资源，就可以专注于它们的调优和优化。


    ### 处理器队列长度


    这个列在`System`对象下的计数器，指示所有处理器处理器队列中的线程数。处理器队列长度计数器值过大通常意味着线程数量超过了当前处理器能够高效处理的数量。与处理器时间百分比计数器类似，查找和优化昂贵的查询可能是提高系统性能的好方法。


    ### 锁存器


    `SQLServer:Latches`对象包含多个计数器，可以帮助你监控必须等待的锁存器请求数量及其平均等待时间（以毫秒为单位）。锁存器是用于保护内存结构以进行并发访问的短期、轻量级同步原语，在第
    1 章和第 5 章中有更详细的介绍。这些性能计数器还提供有关当前为**超级锁存器**的锁存器数量、已提升为超级锁存器的锁存器数量以及已降级为常规锁存器的超级锁存器数量的信息。

    '
- fmt: '## Locks


    与锁存器类似，`SQLServer:Locks` 对象包含多种计数器，提供诸如每秒锁请求、每秒锁等待、每秒锁超时和每秒死锁数量等信息，以及每次导致等待的锁请求的平均等待时间（以毫秒为单位）等信息。锁和阻塞也在第
    [5](#393702_2_En_5_Chapter.xhtml) 章中介绍过。


    ## LogicalDisk 和 PhysicalDisk


    `LogicalDisk` 和 `PhysicalDisk` 对象提供了大量计数器，可帮助你监控系统中的 I/O 操作。`LogicalDisk` 和 `PhysicalDisk`
    提供相同的计数器，但它们分别从逻辑磁盘或物理磁盘的角度提供信息。特别值得关注的是“平均磁盘队列长度”（Avg. Disk Queue Length），它表示为特定磁盘排队的读写请求的平均数量。


    你可能想尝试前面“日志增长”部分中的练习，看看是否能在测试系统中对“平均磁盘队列长度”造成压力。有关这些性能计数器和存储压力工具的更多详细信息，请参阅第 [11](#393702_2_En_11_Chapter.xhtml)
    章。


    ## SQL 编译/秒 和 重编译/秒


    在 `SQLServer:SQL Statistics` 对象下，这些性能计数器可帮助你监控系统中发生的编译和重编译。编译指的是查询优化过程，其中查询优化器为待执行的查询生成高效的执行计划。


    查询只优化一次，并且由于查询优化是一项昂贵的操作，生成的执行计划预期会保留在内存中并尽可能多地重用。这对于可重用代码（如存储过程）尤其如此。因此，大量的编译或重编译可能表明存在问题，需要进行研究。可能的情况是，你有一个即席工作负载或大量即席查询，导致了大量的优化操作。即席工作负载通常提交只使用一次的不同查询，每个查询都需要一次优化，并可能为可能不再需要的计划使用计划缓存内存。虽然在这种情况下你无法最小化优化次数，但你可以通过启用“针对即席工作负载进行优化”（optimize
    for ad hoc workloads）配置选项来减少计划缓存使用的内存，如第 [3](#393702_2_En_3_Chapter.xhtml) 章所述。如果允许更改应用程序，你可以尝试通过使用存储过程来促进代码重用。


    重编译是对查询的新优化，通常已经存在一个执行计划。重编译可能由多种原因引起，包括对象模式的更改（例如添加列或索引）、与会话相关的 SET 选项的更改、统计信息更新，甚至在代码中显式请求重编译（例如，使用
    `RECOMPILE` 提示）。计划也可能因多种原因从计划缓存中移除，包括内存压力、某些实例或数据库配置更改，或发出直接影响计划缓存的语句，如 `DBCC
    FREEPROCCACHE`。在这些情况下，由于计划已被清除，执行新的查询优化被视为一次新的编译，而不是重编译。


    重用计划是帮助系统性能的最佳方法之一，如果你遵循一些简单的建议，如使用存储过程，SQL Server 可以自动完成这一点。尽管重用计划在几乎所有情况下都完美有效，但你需要意识到少数情况下它可能成为问题。典型的场景是运行参数敏感的查询，其中重用错误的计划可能对系统性能造成灾难性影响。


    你可以通过参考第 [1](#393702_2_En_1_Chapter.xhtml) 章获取有关编译、重编译和计划缓存的更多信息。此外，我推荐阅读 Microsoft
    白皮书“SQL Server 2008 中的计划缓存”（Plan Caching in SQL Server 2008），可从 [`https://technet.microsoft.com/en-us/library/ee343986
    (v=sql.100).aspx`](https://technet.microsoft.com/en-us/library/ee343986) 获取。


    ## 内存授予


    在 `SQLServer:Memory Manager` 中，“内存授予”（Memory Grants Outstanding）和“挂起的内存授予”（Memory
    Grants Pending）分别返回已成功获取或正在等待内存授予的进程数量。你可以使用 `SQLServer:Wait Statistics` 对象上的“内存授予队列等待”（Memory
    Grant queue waits）获取额外的等待信息，包括平均等待时间（毫秒）、每秒累计等待时间、进行中的等待以及每秒开始的等待。内存、内存授予及其对系统性能的影响已在第
    [1](#393702_2_En_1_Chapter.xhtml) 章中介绍。


    ## 被阻塞的进程


    在 `SQLServer:General Statistics` 对象下，“被阻塞的进程”（process blocked）返回当前被阻塞的进程数。有关阻塞的更多信息，包括等待和故障排除信息，可在第
    [5](#393702_2_En_5_Chapter.xhtml) 章中找到。


    ## 日志刷新计数器


    在事务提交后，SQL Server 必须将日志缓冲区中的日志记录刷新到磁盘，将此信息持久保存到事务日志文件中。在 `SQLServer:Databases`
    下，SQL Server 有四个性能计数器可帮助你确定将日志记录刷新到磁盘是否是系统中的性能瓶颈。同样，它们的定义是直接的，如下列所示：


    | 计数器名 | 描述 |

    | --- | --- |

    | `Log Flushes/sec` | 每秒日志刷新次数 |

    | `Log Flush Waits/sec` | 每秒等待日志刷新的提交次数 |

    | `Log Flush Wait Time` | 刷新日志的总等待时间，以毫秒为单位 |

    | `Log Flush Write Time (ms)` | 在过去一秒内完成的日志刷新写入所需的时间，以毫秒为单位 |


    ## 检查点页/秒


    同样在 `SQLServer:Buffer Manager` 对象下，“检查点页/秒”（Checkpoint pages/sec）性能计数器监视由检查点或任何其他需要将所有脏页刷新到磁盘的操作每秒刷新到磁盘的页数。检查点是数据库引擎的一项操作，其中内存缓冲池中已修改的页面（也称为脏页）和任何必需的事务日志信息被写入磁盘。


    ## 内存管理器


    `SQLServer:Memory Manager` 对象包含多种与内存相关的计数器，有助于监控连接、数据库缓存、锁、日志池、查询优化或授予执行进程（用于哈希、排序和创建索引操作）的内存使用的内存。其他一些计数器提供有关系统内存的一般信息，包括以下内容：


    *   可用内存 (KB) (`Free Memory (KB)`)：表示服务器当前未使用的已提交内存量

    *   目标服务器内存 (KB) (`Target Server Memory (KB)`)：指定服务器可以消耗的理想内存量

    *   服务器总内存 (KB) (`Total Server Memory (KB)`)：表示服务器当前正在消耗的内存量'
  raw: '### Locks


    Similar to latches, the `SQLServer:Locks` object includes a variety of counters
    providing information such as lock requests per second, lock waits per second,
    lock timeouts per second, and the number of deadlocks per second, along with information
    such as the average amount of wait time in milliseconds for each lock request
    that resulted in a wait. Locking and blocking were also introduced in Chapter
    [5](#393702_2_En_5_Chapter.xhtml).


    ### LogicalDisk and PhysicalDisk


    The `LogicalDisk` and `PhysicalDisk` objects provide a large variety of counters
    that can help you to monitor I/O operations in your system. `LogicalDisk` and
    `PhysicalDisk` provide the same counters, but they just provide information from
    either the logical or physical disk perspective. Of particular interest is Avg.
    Disk Queue Length, which is the average number of both read and write requests
    that are queued for a particular disk.


    You may want to try the exercise from the “Log Growths” section earlier to see
    if you can stress the Avg. Disk Queue Length in your test system. For more details
    about these performance counters and storage stress tools, please refer to Chapter
    [11](#393702_2_En_11_Chapter.xhtml).


    ### SQL Compilations/Sec and Recompilations/Sec


    Under the `SQLServer:SQL Statistics` object, these performance counters can help
    you monitor the compilations and recompilations happening in your system. Compilation
    refers to the query optimization process in which the query optimizer produces
    an efficient execution plan for a query to be executed.


    A query is optimized only once, and since query optimization is an expensive operation,
    the resulting execution plan is expected to be kept in memory and reused as many
    times as possible. This is especially true for reusable code such as stored procedures.
    For this reason, a large number of compilations or recompilations may indicate
    a problem and should be researched. It may be the case that you have an ad hoc
    workload or a large number of ad hoc queries, causing a large number of optimizations.
    An ad hoc workload typically submits different queries that are used only once,
    each one requiring an optimization and potentially using plan cache memory for
    a plan that may not be required again. Although in this case you cannot minimize
    the number of optimizations, you can reduce the memory used by the plan cache
    by enabling the “optimize for ad hoc workloads” configuration option, as described
    in Chapter [3](#393702_2_En_3_Chapter.xhtml). If changing the application is allowed,
    you can try to promote reusing code using stored procedures.


    A recompile is a new optimization of a query in which usually there is already
    an execution plan. Recompiles can happen for a large number of reasons including
    change of schema in objects like adding a column or an index, change in the session-related
    SET options, statistics being updated, or even explicitly requesting a recompile
    in the code (e.g., using the `RECOMPILE` hint). There are also multiple reasons
    why a plan may be removed from the plan cache, including memory pressure, some
    instance or database configuration changes, or the issue of a statement directly
    impacting the plan cache like `DBCC FREEPROCCACHE`. In those cases, since the
    plan was purged, performing a new query optimization is considered a new compilation,
    not a recompile.


    Reusing plans is one of the best ways to help in the performance of a system,
    and, if you follow just a few recommendations like using stored procedures, this
    is something that SQL Server can do automatically. Even though reusing plans works
    perfectly almost all the time, you need to be aware of a few cases when it could
    be a problem. A typical scenario is when running parameter-sensitive queries in
    which reusing the wrong plan could be catastrophic for the performance of your
    system.


    You can get more information about compiles, recompiles, and plan caching by referring
    to Chapter [1](#393702_2_En_1_Chapter.xhtml). In addition, I would recommend you
    reading the Microsoft white paper “Plan Caching in SQL Server 2008,” available
    at [`https://technet.microsoft.com/en-us/library/ee343986 (v=sql.100).aspx`](https://technet.microsoft.com/en-us/library/ee343986).


    ### Memory Grants


    In `SQLServer:Memory Manager`, Memory Grants Outstanding and Memory Grants Pending
    return the number of processes that have successfully acquired or are waiting
    for a memory grant, respectively. You could get additional wait information using
    the Memory Grant queue waits on the `SQLServer:Wait Statistics` object including
    average wait time in milliseconds, cumulative wait time per second, waits in progress,
    and waits started per second. Memory and memory grants and their impact on system
    performance were covered in Chapter [1](#393702_2_En_1_Chapter.xhtml).


    ### Processes Blocked


    Under the `SQLServer:General Statistics` object, process blocked returns the number
    of processes currently blocked. Additional information about blocking including
    waits and troubleshooting information can be found in Chapter [5](#393702_2_En_5_Chapter.xhtml).


    ### Log Flush Counters


    SQL Server has to flush to disk the log records in the log buffer after a transaction
    is committed, persisting this information in the transaction log file. Under `SQLServer:Databases`,
    SQL Server has four performance counters that can help you determine if flushing
    log records to disk is a performance bottleneck in your system. Again, their definitions
    are straightforward as you can see in the following list:


    | Log Flushes/sec | Number of log flushes per second |

    | --- | --- |

    | Log Flush Waits/sec | Number of commits per second waiting for the log flush
    |

    | Log Flush Wait Time | Total wait time to flush the log, measured in milliseconds
    |

    | Log Flush Write Time (ms) | Time required, measured in milliseconds, to perform
    writes of log flushes that were completed in the last second |


    ### Checkpoint Pages/Sec


    Also under the `SQLServer:Buffer Manager` object, the Checkpoint pages/sec performance
    counter monitors the number of pages flushed to disk per second either by a checkpoint
    or any other operation that requires all dirty pages to be flushed to disk. A
    checkpoint is a database engine operation in which the modified pages in memory
    buffer pool (also called dirty pages) and any required transaction log information
    are written to disk.


    ### Memory Manager


    The `SQLServer:Memory Manager` object includes a variety of memory-related counters
    that can be helpful to monitor the memory used by connections, the database cache,
    locks, log pool, query optimization, or the memory granted to executing processes
    (for hash, sort, and create index operations). Some other counters have general
    information about the memory in the system including the following:


    *   Free Memory (KB): Indicates the amount of committed memory the server is currently
    not using


    *   Target Server Memory (KB): Specifies the ideal amount of memory the server
    can consume


    *   Total Server Memory (KB): Indicates the amount of memory the server is currently
    consuming'
