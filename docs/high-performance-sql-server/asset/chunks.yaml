- fmt: '# sys.dm_os_wait_stats


    `sys.dm_os_wait_stats` DMV 一直是获取 SQL Server 实例等待信息的传统方式。即使该 DMV 是在 SQL Server
    2005 中引入的，相同的信息在更早的版本中也可以通过使用已弃用且不再文档化的 DBCC `SQLPERF(''waitstats'')` 语句获取，该语句在当前版本中仍然有效。你可以通过运行以下语句直接获取等待信息，但通常我们希望进行额外的过滤和数据聚合，如下文所示：


    ```

    SELECT * FROM sys.dm_os_wait_stats

    ```


    你也可以查询以下目录视图来列出可用的等待类型：


    ```

    SELECT * FROM sys.dm_xe_map_values WHERE name = ''wait_types''

    ```


    `sys.dm_os_wait_stats` DMV 显示自 SQL Server 实例上次启动或等待统计信息上次清除以来发生的所有等待。它列出了所有可用的等待类型，甚至包括那些尚未发生等待的类型，对于这些类型，等待时间和计数值将为
    0。SQL Server 2019 中该 DMV 显示 1080 个等待类型，其中大量是未文档化的。由于此 DMV 返回的是数值，你需要将其与其他信息结合使用，例如与基线比较、与不同时间点的快照比较，并可能进行额外分析以从中获取价值。例如，`wait_time_ms`
    的值 10808265 是好是坏？


    `sys.dm_os_wait_stats` 与 `sys.dm_exec_requests` 和 `sys.dm_os_waiting_tasks` 的另一个区别在于，后两者显示的是仍在进行中的等待信息，而
    `sys.dm_os_wait_stats` 仅在等待完成后才累积信息。例如，如果你多次刷新前面提到的使用 `sys.dm_exec_requests` 的查询，你会注意到
    `CXPACKET` 和 `LCK_M_S` 的等待时间会随着进程被另一个会话阻塞而持续增加。一旦等待完成，等待统计信息将被记录到 `sys.dm_os_wait_stats`
    中。


    SQL Server 文档传统上将等待分为三类：


    ### Resource


    任务正在等待一个不可用或正被其他任务（如 I/O、锁或闩锁）使用的资源。


    ### Queue


    任务正在等待分配工作。通常用于系统后台任务。


    ### External


    任务正在等待外部进程完成，例如链接服务器查询或扩展存储过程。


    其他一些来源增加了其他类别，如 I/O（在我们的例子中属于 Resource 类别），或将锁和闩锁分离到它们自己的同步类别中。


    `sys.dm_os_wait_stats` DMV 包含以下列：


    *   `wait_type`: 等待类型，大多数在 [`https://msdn.microsoft.com/en-us/library/ms179984.aspx`](https://msdn.microsoft.com/en-us/library/ms179984.aspx)
    上有文档。我将在本章后面介绍最重要的几种。

    *   `waiting_tasks_count`: 指定等待类型的等待次数。

    *   `wait_time_ms`: 总等待时间（毫秒）。此时间包括下文描述的信号等待时间。

    *   `max_wait_time_ms`: 指定等待类型的最大等待时间（毫秒）。

    *   `signal_wait_time_ms`: 信号等待时间（毫秒）。如前所述，这是任务在可运行队列中等待处理器时间的时间。


    有许多等待类型无需关注，在收集或聚合等待信息时将其过滤掉是典型做法。以下是一个此类查询的示例：


    ```

    SELECT

    wait_type,

    wait_time_ms,

    wait_time_ms * 100.0 / SUM(wait_time_ms) OVER() AS percentage,

    signal_wait_time_ms * 100.0 / wait_time_ms as signal_pct

    FROM sys.dm_os_wait_stats

    WHERE wait_time_ms > 0

    AND wait_type NOT IN (

    ''BROKER_DISPATCHER'', ''BROKER_EVENTHANDLER'',

    ''BROKER_RECEIVE_WAITFOR'', ''BROKER_TASK_STOP'',

    ''BROKER_TO_FLUSH'', ''BROKER_TRANSMITTER'',

    ''CHECKPOINT_QUEUE'', ''CHKPT'',

    ''CLR_AUTO_EVENT'', ''CLR_MANUAL_EVENT'',

    ''CLR_SEMAPHORE'', ''DBMIRROR_DBM_EVENT'',

    ''DBMIRROR_DBM_MUTEX'', ''DBMIRROR_EVENTS_QUEUE'',

    ''DBMIRROR_WORKER_QUEUE'', ''DBMIRRORING_CMD'',

    ''DIRTY_PAGE_POLL'', ''DISPATCHER_QUEUE_SEMAPHORE'',

    ''EXECSYNC'', ''FSAGENT'',

    ''FT_IFTS_SCHEDULER_IDLE_WAIT'', ''FT_IFTSHC_MUTEX'',

    ''HADR_CLUSAPI_CALL'', ''HADR_FILESTREAM_IOMGR_IOCOMPLETION'',

    ''HADR_LOGCAPTURE_WAIT'', ''HADR_NOTIFICATION_DEQUEUE'',

    ''HADR_TIMER_TASK'', ''HADR_WORK_QUEUE'',

    ''KSOURCE_WAKEUP'', ''LAZYWRITER_SLEEP'',

    ''LOGMGR_QUEUE'', ''ONDEMAND_TASK_QUEUE'',

    ''PWAIT_ALL_COMPONENTS_INITIALIZED'', ''QDS_ASYNC_QUEUE'',

    ''QDS_PERSIST_TASK_MAIN_LOOP_SLEEP'', ''QDS_SHUTDOWN_QUEUE'',

    ''QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP'', ''REQUEST_FOR_DEADLOCK_SEARCH'',

    ''RESOURCE_QUEUE'', ''SERVER_IDLE_CHECK'',

    ''SLEEP_BPOOL_FLUSH'', ''SLEEP_BUFFERPOOL_HELPLW'',

    ''SLEEP_DBSTARTUP'', ''SLEEP_DCOMSTARTUP'',

    ''SLEEP_MASTERDBREADY'', ''SLEEP_MASTERMDREADY'',

    ''SLEEP_MASTERUPGRADED'', ''SLEEP_MSDBSTARTUP'',

    ''SLEEP_SYSTEMTASK'', ''SLEEP_TASK'',

    ''SLEEP_TEMPDBSTARTUP'', ''SLEEP_WORKSPACE_ALLOCATEPAGE'',

    ''SNI_HTTP_ACCEPT'', ''SP_SERVER_DIAGNOSTICS_SLEEP'',

    ''SQLTRACE_BUFFER_FLUSH'', ''SQLTRACE_INCREMENTAL_FLUSH_SLEEP'',

    ''SQLTRACE_WAIT_ENTRIES'', ''WAIT_FOR_RESULTS'',

    ''WAITFOR'', ''WAITFOR_TASKSHUTDOWN'',

    ''WAIT_XTP_HOST_WAIT'', ''WAIT_XTP_OFFLINE_CKPT_NEW_LOG'',

    ''WAIT_XTP_CKPT_CLOSE'', ''XE_DISPATCHER_JOIN'',

    ''XE_DISPATCHER_WAIT'', ''XE_TIMER_EVENT'')

    ORDER BY percentage DESC

    ```


    收集等待信息的一个绝佳选择是启用 SQL Server 数据收集功能，该功能随 SQL Server 2008 引入。此功能不仅可以收集等待信息，还可以收集各种性能信息并将其持久化到数据库中。它还包括多个图表和报告来呈现收集的数据。图
    5-3 展示了一个部分数据收集报告的示例，其中等待统计信息按多个类别进行了聚合。有关启用和使用数据收集功能的更多详细信息，请参阅 SQL Server 文档。


    ![`../images/393702_2_En_5_Chapter/393702_2_En_5_Fig3_HTML.jpg`](images/393702_2_En_5_Chapter/393702_2_En_5_Fig3_HTML.jpg)


    图 5-3


    数据收集 SQL Server 等待报告


    最后，可以使用以下语句清除等待统计信息，尽管这可能并不总是可取的，因为这些历史信息可能被其他工具使用：


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    ```


    当 SQL Server 重新启动时，等待显然也会被清除。可以使用 `sys.dm_os_performance_counters` DMV 上的“SQL
    Server 等待统计信息”对象获取有关等待的额外信息，例如：


    ```

    SELECT * FROM sys.dm_os_performance_counters

    WHERE object_name = ''SQLServer:Wait Statistics''

    ```


    前面的查询适用于 SQL Server 默认实例。如果你有一个命名实例，则需要相应地替换实例名，使得 `object_name` 的 SQLServer 前缀变为
    `MSSQL$<instance>`。如果不确定如何指定实例名，可以尝试以下查询：


    ```

    SELECT * FROM sys.dm_os_performance_counters

    WHERE object_name like ''%Wait Statistics%''

    ```


    `sys.dm_os_performance_counters` DMV 上可用的信息需要额外处理才能正确解释，如第 8 章所述。'
  raw: '### sys.dm_os_wait_stats


    The `sys.dm_os_wait_stats` DMV has been the traditional way to get wait information
    on a SQL Server instance, and even when the DMV was introduced in SQL Server 2005,
    the same information was available in earlier versions using the DBCC `SQLPERF(''waitstats'')`
    statement, which still works on the current version, although it is no longer
    documented and was deprecated a long time ago. You could just get the wait information
    running the following statement, but usually we would want to do additional filtering
    and data aggregation, as shown later:


    ```

    SELECT * FROM sys.dm_os_wait_stats

    ```


    You may also query the following catalog to list the available wait types:


    ```

    SELECT * FROM sys.dm_xe_map_values WHERE name = ''wait_types''

    ```


    The `sys.dm_os_wait_stats` DMV shows all the waits that have occurred since the
    last time the SQL Server instance started or the wait statistics were last cleared
    and lists all the wait types available, even the ones for which waits haven’t
    occurred yet, in which case wait time and count values will be 0\. The DMV shows
    1080 waits for SQL Server 2019, and a large number of them are undocumented. Since
    this DMV returns a numeric value, you will have to use it with some other information,
    compare it to a baseline, compare it with another snapshot taken at a different
    time, and probably do additional analysis to get value from it. For example, is
    a value of 10808265 for `wait_time_ms` good or bad?


    Another difference with `sys.dm_exec_requests` and `sys.dm_os_waiting_tasks` is
    that these DMVs show wait information for waits that are still in progress, while
    `sys.dm_os_wait_stats` only accumulates the information once the wait is completed.
    For example, if you refresh multiple times the query using `sys.dm_exec_requests`
    shown earlier, you would notice that the wait time for the `CXPACKET` and `LCK_M_S`
    wait increases for as long as the processes continue to be blocked by another
    session. Once the wait is completed, the wait statistics will be registered on
    `sys.dm_os_wait_stats`.


    The SQL Server documentation traditionally categorizes waits into three categories:


    1.  Resource: The task is waiting on a resource that is either not available or
    that is being used by some other task such as I/O, locks, or latches.


    2.  Queue: The task is waiting for work to be assigned. It is usually used by
    system background tasks.


    3.  External: The task is waiting for an external process such as a linked server
    query or an extended procedure to complete.


    Some other sources add some other categories like I/O, which in our case would
    be part of the Resource category, or separate locks and latches into its own synchronization
    category.


    The `sys.dm_os_wait_stats` DMV has the following columns:


    *   `wait_type`: Wait type, most of them documented at [`https://msdn.microsoft.com/en-us/library/ms179984.aspx`](https://msdn.microsoft.com/en-us/library/ms179984.aspx).
    I’ll cover the most important ones later in this chapter.


    *   `waiting_tasks_count`: Number of waits for the specified wait type.


    *   `wait_time_ms`: Total wait time in milliseconds. This time includes signal
    wait time as described next.


    *   `max_wait_time_ms`: Maximum wait time in milliseconds for the specified wait
    type.


    *   `signal_wait_time_ms`: Signal wait time in milliseconds. As described earlier,
    this is the time the task waits in the runnable queue, waiting for processor time.


    There are multiple wait types that should not be a concern, and it is typical
    to filter them out when collecting or aggregating wait information. Here is an
    example of what such a query would look like :


    ```

    SELECT

    wait_type,

    wait_time_ms,

    wait_time_ms * 100.0 / SUM(wait_time_ms) OVER() AS percentage,

    signal_wait_time_ms * 100.0 / wait_time_ms as signal_pct

    FROM sys.dm_os_wait_stats

    WHERE wait_time_ms > 0

    AND wait_type NOT IN (

    ''BROKER_DISPATCHER'', ''BROKER_EVENTHANDLER'',

    ''BROKER_RECEIVE_WAITFOR'', ''BROKER_TASK_STOP'',

    ''BROKER_TO_FLUSH'', ''BROKER_TRANSMITTER'',

    ''CHECKPOINT_QUEUE'', ''CHKPT'',

    ''CLR_AUTO_EVENT'', ''CLR_MANUAL_EVENT'',

    ''CLR_SEMAPHORE'', ''DBMIRROR_DBM_EVENT'',

    ''DBMIRROR_DBM_MUTEX'', ''DBMIRROR_EVENTS_QUEUE'',

    ''DBMIRROR_WORKER_QUEUE'', ''DBMIRRORING_CMD'',

    ''DIRTY_PAGE_POLL'', ''DISPATCHER_QUEUE_SEMAPHORE'',

    ''EXECSYNC'', ''FSAGENT'',

    ''FT_IFTS_SCHEDULER_IDLE_WAIT'', ''FT_IFTSHC_MUTEX'',

    ''HADR_CLUSAPI_CALL'', ''HADR_FILESTREAM_IOMGR_IOCOMPLETION'',

    ''HADR_LOGCAPTURE_WAIT'', ''HADR_NOTIFICATION_DEQUEUE'',

    ''HADR_TIMER_TASK'', ''HADR_WORK_QUEUE'',

    ''KSOURCE_WAKEUP'', ''LAZYWRITER_SLEEP'',

    ''LOGMGR_QUEUE'', ''ONDEMAND_TASK_QUEUE'',

    ''PWAIT_ALL_COMPONENTS_INITIALIZED'', ''QDS_ASYNC_QUEUE'',

    ''QDS_PERSIST_TASK_MAIN_LOOP_SLEEP'', ''QDS_SHUTDOWN_QUEUE'',

    ''QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP'', ''REQUEST_FOR_DEADLOCK_SEARCH'',

    ''RESOURCE_QUEUE'', ''SERVER_IDLE_CHECK'',

    ''SLEEP_BPOOL_FLUSH'', ''SLEEP_BUFFERPOOL_HELPLW'',

    ''SLEEP_DBSTARTUP'', ''SLEEP_DCOMSTARTUP'',

    ''SLEEP_MASTERDBREADY'', ''SLEEP_MASTERMDREADY'',

    ''SLEEP_MASTERUPGRADED'', ''SLEEP_MSDBSTARTUP'',

    ''SLEEP_SYSTEMTASK'', ''SLEEP_TASK'',

    ''SLEEP_TEMPDBSTARTUP'', ''SLEEP_WORKSPACE_ALLOCATEPAGE'',

    ''SNI_HTTP_ACCEPT'', ''SP_SERVER_DIAGNOSTICS_SLEEP'',

    ''SQLTRACE_BUFFER_FLUSH'', ''SQLTRACE_INCREMENTAL_FLUSH_SLEEP'',

    ''SQLTRACE_WAIT_ENTRIES'', ''WAIT_FOR_RESULTS'',

    ''WAITFOR'', ''WAITFOR_TASKSHUTDOWN'',

    ''WAIT_XTP_HOST_WAIT'', ''WAIT_XTP_OFFLINE_CKPT_NEW_LOG'',

    ''WAIT_XTP_CKPT_CLOSE'', ''XE_DISPATCHER_JOIN'',

    ''XE_DISPATCHER_WAIT'', ''XE_TIMER_EVENT'')

    ORDER BY percentage DESC

    ```


    A great choice for collecting wait information is to enable the SQL Server Data
    Collection feature, which was introduced with SQL Server 2008\. This feature will
    allow you to collect not only waits but a great variety of performance information
    and persist it in a database. It also includes a number of graphs and reports
    to present the collected data. Figure [5-3](#393702_2_En_5_Chapter.xhtml#Fig3)
    shows an example of a partial Data Collection report with wait statistics, aggregated
    by multiple categories. For more details about enabling and using the Data Collection
    feature, please refer to the SQL Server documentation .


    ![../images/393702_2_En_5_Chapter/393702_2_En_5_Fig3_HTML.jpg](images/393702_2_En_5_Chapter/393702_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Data Collection SQL Server waits report


    Finally, it is possible to clear wait statistics using the following statement
    although it may not always be desirable as this historical information may be
    used by other tools:


    ```

    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR)

    ```


    Waits are obviously also cleared when SQL Server is restarted. Additional information
    about waits can be obtained using the Wait Statistics SQL Server object on the
    `sys.dm_os_performance_counters` DMV, for example:


    ```

    SELECT * FROM sys.dm_os_performance_counters

    WHERE object_name = ''SQLServer:Wait Statistics''

    ```


    The previous query works against a SQL Server default instance. If you have a
    named instance, you would need to replace the instance name accordingly, so that
    the SQLServer prefix of object_name would become MSSQL$<instance>. You may try
    the following if not sure how to specify the instance name:


    ```

    SELECT * FROM sys.dm_os_performance_counters

    WHERE object_name like ''%Wait Statistics%''

    ```


    Information available on the `sys.dm_os_performance_counters` DMV requires additional
    processing to be properly interpreted, as covered in Chapter [8](#393702_2_En_8_Chapter.xhtml).'
