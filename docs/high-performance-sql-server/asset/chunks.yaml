    不过我注意到一个小问题：你提到“以下是需要翻译的文本”，但你提供的内的内容已经是完整的中文技术文档，描述的是 SQL Server 查询优化器中统计信息的工作原理。


    请问你希望我：

    1. 将这段中文内容作为参考示例，然后为你翻译其他英文文本？

    2. 或者是需要我检查、优化这段已有中文翻译的格式和质量？

    3. 还是有其他英文文本需要我翻译？


    请告诉我你的具体需求，我会立即开始工作！ 😊'
- fmt: '### Plan Caching


    Once an execution plan is generated by the SQL Server query optimizer, it can
    be stored in memory to be reused as many times as needed if the same query is
    executed again. Since query optimization is a very expensive operation in terms
    of time and system resources, reusing a query plan as much as possible can greatly
    enhance the performance of your databases. Plans are stored in a part of the memory
    called the plan cache (which was previously known as the procedure cache), and
    they are only removed in a few cases such as when there is SQL Server memory pressure,
    when some configuration changes are performed either at the instance or database
    level, or when certain statements (like `DBCC FREEPROCACHE`) are executed. The
    plan cache is part of the memory you allocate to SQL Server along with the buffer
    pool, which is used to store database pages.


    I mentioned earlier that when a query or batch is sent to SQL Server for execution,
    it is first sent to the `query optimizer` so a query plan can be generated. Actually,
    before deciding if an optimization is needed, SQL Server first checks the plan
    cache to see if an execution plan already exists for the submitted query or batch.
    If it does, the entire optimization process could be skipped.


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig17_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig17_HTML.jpg)


    Figure 1-17: SQL Server compilation and recompilation process


    In order to use an existing execution plan, some validations are still needed.
    The SQL Server compilation and recompilation process is shown in `Figure 1-17`,
    where you can notice that even after a plan for a batch is found in the plan cache,
    it is still validated for correctness-related reasons. This means that a plan
    that was used even a moment ago may no longer be valid after some database changes,
    for example, a change on a column or an index. Obviously, if the plan is no longer
    valid, a new one has to be generated by the query optimizer, and a recompilation
    will occur.


    After a plan has been found valid for correctness-related reasons, it is next
    validated for optimality or performance-related reasons. A typical case in this
    validation is the presence of new or outdated statistics. Once again, if a plan
    fails this validation, the batch will be sent for optimization, and a new plan
    will be generated. In addition, if statistics are out of date, they will need
    to be automatically updated first if default SQL Server settings are used. If
    automatic update of statistics is disabled, which is rarely recommended, then
    this update will be skipped. If asynchronous update of statistics is configured,
    the query optimizer will use existing statistics that would be updated asynchronously
    later and most likely available for the next optimization that may require them.
    In any of these cases, a new generated plan may be kept in the plan cache so it
    can be reused again. It is worth noting here that it is possible that the old
    and the new plan may be the same or very similar if not enough changes were done
    in the system and the optimizer takes the same decisions as earlier. But then
    again this is a validation that is required for correctness and performance-related
    reasons.


    I have emphasized so far that reusing a plan is desired in order to avoid expensive
    optimization time and cost resources. However, even after passing the optimality
    validation indicated earlier, there may be cases when reusing a plan may not help
    performance wise, and requesting a new plan would instead be a better choice.
    This is particularly true in the case of parameter-sensitive queries where, because
    of skewed or uneven data distribution, reusing a plan created with one parameter
    may not be adequate for the same query with a different parameter. This is sometimes
    referred to as the parameter sniffing problem, although, in reality, parameter
    sniffing is a performance optimization that the query optimizer uses to generate
    a plan especially tailored for the particular parameter values initially passed
    in. It is the fact that this does not work fine all the time that has given parameter
    sniffing its bad reputation.


    ## Query Execution


    As mentioned in the previous section, the query optimizer assembles a plan choosing
    from a collection of operations available on the execution engine, and the resulting
    plan is used by the query processor to retrieve the desired data from the database.
    In this section, I will describe the most common query operators, also called
    iterators, and the most common operations that you will see in execution plans.'
