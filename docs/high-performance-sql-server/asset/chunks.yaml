  trans: '

    ### 原生编译模块


    如前所述，在 SQL Server 2016 及更高版本中，有三种类型的原生编译模块，包括存储过程、标量和表值用户定义函数以及触发器。最初在 SQL Server
    2014 中引入 Hekaton（内存优化技术）时，仅支持存储过程。我们在此回顾所有这些模块。以下代码是一个原生编译存储过程的基本定义：


    ```

    CREATE PROCEDURE test

    WITH NATIVE_COMPILATION, SCHEMABINDING,

    EXECUTE AS OWNER

    AS

    BEGIN ATOMIC WITH (

    TRANSACTION ISOLATION LEVEL = SNAPSHOT,

    LANGUAGE = ''us_english'')

    SELECT SalesOrderID, OrderDate, CustomerID

    FROM dbo.SalesOrderHeader

    END

    ```


    其执行示例如下：


    ```

    EXEC test

    ```


    用户定义函数有时会被提及可能引发性能问题。原生编译的用户定义函数性能更佳，但仍应仅在适当的情况下使用。接下来是最基本的标量用户定义函数，用以展示所需的语法：


    ```

    CREATE FUNCTION test_function()

    RETURNS int

    WITH NATIVE_COMPILATION, SCHEMABINDING

    AS BEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''English'')

    RETURN 1

    END

    ```


    您可以使用以下语句调用它：


    ```

    SELECT dbo.test_function()

    ```


    以下是一个表值用户定义函数的示例：


    ```

    CREATE FUNCTION dbo.test_tvf()

    RETURNS TABLE

    WITH NATIVE_COMPILATION, SCHEMABINDING

    AS

    RETURN SELECT SalesOrderID, OrderDate, Status FROM dbo.SalesOrderHeader

    ```


    您可以使用以下语句调用它：


    ```

    SELECT * FROM dbo.test_tvf()

    ```


    类似地，以下是您用于创建触发器的代码。原生编译触发器仅可用于内存优化表，并且这些是内存优化表上唯一允许的触发器类型。


    ```

    CREATE TRIGGER Insert_SalesOrderHeader

    ON dbo.SalesOrderHeader

    WITH NATIVE_COMPILATION, SCHEMABINDING

    FOR INSERT, UPDATE, DELETE

    AS BEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''us_english'')

    -- trigger code

    END

    ```


    为了避免对原生编译模块进行不必要的运行时检查（这些检查必须在执行时进行），某些选项必须在编译时定义。任何原生编译模块所需的选项如下：


    *   `SCHEMABINDING`: 将原生编译模块绑定到底层表或表的架构。

    *   `EXECUTE AS`: 指定执行原生编译模块的安全上下文。

    *   `ATOMIC`: 指示整个块作为原子块执行，整个块要么全部提交，要么全部回滚。属于 ANSI SQL 标准的一部分。

    *   `TRANSACTION ISOLATION LEVEL`: 定义事务隔离级别，但只有以下三种选择可用：`SNAPSHOT`、`REPEATABLE
    READ` 和 `SERIALIZABLE`。与传统的 SQL Server 代码不同，原生编译模块没有默认的事务隔离级别，因此必须指定此选项。

    *   `LANGUAGE`: 指定代码的语言环境。


    另外两个选项虽然不是必需的，但它们是 `DATEFIRST` 和 `DATEFORMAT`，分别用于指定一周的第一天和日期格式。如果未指定，则从 `LANGUAGE`
    选项中推断。


    ### 修改表和原生编译模块


    现在可以使用 `ALTER TABLE` 来更改表的大多数属性，包括添加和删除列、添加和删除索引，或更改哈希索引的 `BUCKET_COUNT` 值。对于内存优化表，不允许使用
    `CREATE INDEX` 和 `DROP INDEX`；必须改用 `ALTER TABLE`。让我们看几个示例，假设初始表如下：


    1.  添加列。以下代码添加了三列（顺便提一下，这三列最初从基于磁盘的表中删除，因为它们基于用户定义数据类型）：


    ```

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    2.  添加索引。以下代码添加了一个非聚集索引和一个哈希索引：


    ```

    ALTER TABLE dbo.SalesOrderHeader

    ADD OnlineOrderFlag bit NOT NULL,

    PurchaseOrderNumber nvarchar(25) NULL,

    AccountNumber nvarchar(25) NULL

    ```


    3.  更改索引的桶数。以下代码重建一个索引并将桶数更改为 100,000：


    ```

    ALTER TABLE dbo.SalesOrderHeader

    ADD INDEX IX_ModifiedDate (ModifiedDate),

    INDEX IX_CustomerID HASH (CustomerID) WITH (BUCKET_COUNT = 10000)

    ```


    4.  删除列或索引。以下代码删除了先前添加的三列：


    ```

    ALTER TABLE dbo.SalesOrderHeader

    ALTER INDEX IX_CustomerID

    REBUILD WITH (BUCKET_COUNT = 100000)

    ```


    ```

    ALTER TABLE dbo.SalesOrderHeader

    DROP COLUMN OnlineOrderFlag, PurchaseOrderNumber, AccountNumber

    ```


    对表进行更改可能会干扰原生编译模块的 `SCHEMABINDING` 属性。假设您有以下使用 `SalesOrderHeader` 表中若干列的原生编译存储过程：


    ```

    CREATE PROCEDURE dbo.test

    WITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS owner

    AS

    BEGIN ATOMIC

    WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''us_english'')

    SELECT SubTotal, ModifiedDate FROM dbo.SalesOrderHeader

    END

    ```


    尝试从表中删除该过程引用的某一列


    ```

    ALTER TABLE  dbo.SalesOrderHeader

    DROP COLUMN SubTotal

    ```


    将返回以下错误：


    ```

    Msg 5074, Level 16, State 1, Line 1

    The object ''test'' is dependent on column ''SubTotal''.

    Msg 4922, Level 16, State 9, Line 1

    ALTER TABLE DROP COLUMN SubTotal failed because one or more objects access this
    column.

    ```


    但是，您可以删除任何未被此过程或其他架构绑定对象引用的列：


    ```

    ALTER TABLE dbo.SalesOrderHeader

    DROP COLUMN TaxAmt

    ```


    幸运的是，在这种情况下不允许使用星号 (*) 来选择表中的所有列。尝试这样做会得到错误 1054，提示在架构绑定对象中不允许使用此类语法。


    SQL Server 2016 的新功能是，您还可以更改原生编译存储过程。其他原生编译对象（如触发器以及标量和表值用户定义函数）也可以被更改。例如，以下代码更改了先前创建的存储过程，从
    `SELECT` 列表中移除一列并更改了隔离级别：


    ```

    ALTER PROCEDURE dbo.test

    WITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS owner

    AS

    BEGIN ATOMIC

    WITH (TRANSACTION ISOLATION LEVEL = REPEATABLE READ, LANGUAGE = ''us_english'')

    SELECT SubTotal FROM dbo.SalesOrderHeader

    END

    ```

    '
- fmt: '### Native Compilation


    Native compilation applies to the creation of both memory-optimized tables and
    natively compiled modules. In both cases, C code is generated, compiled, and linked,
    and finally a DLL is created and loaded into memory in-process with the SQL Server
    executable for performance. You can find the list of DLLs currently loaded in
    the system by looking at the `sys.dm_os_loaded_modules` DMV as shown next, which
    in my test system lists several files pointing to the `C:\Program Files\Microsoft
    SQL Server\MSSQL15.MSSQLSERVER\MSSQL\DATA\xtp\` folder.


    ```sql

    SELECT * FROM sys.dm_os_loaded_modules

    WHERE description = ''XTP Native DLL''

    ```


    A concern sometimes raised in the database community is about the security access
    of the created files. In summary, I will tell you that you should not worry about
    it. When a DLL file is created, it is automatically loaded in memory, and there
    is no need to back up the created files or do any maintenance to them. Those files
    are not needed anymore. Every time SQL Server starts, it creates new DLLs for
    memory-optimized tables. Natively compiled modules are compiled only when they
    are executed the first time. Technically, the created DLL files have the same
    security access as the data files. Once inside the previously listed `xtp` folder,
    you will find additional folders named after the database ID of the configured
    database, containing files with the following extensions (a set of these files
    is created per memory-optimized table and natively compiled module):


    | Extension | Description |

    | --- | --- |

    | `.c` | C language source code |

    | `.dll` | Dynamic-link library file |

    | `.obj` | Object file generated by C compiler |

    | `.out` | Log file generated by C compiler (includes parameters used by compiler)
    |

    | `.pdb` | Symbol file generated by C compiler |

    | `.xml` | MAT (Mixed Abstract Tree) file |


    Note


    The In-Memory OLTP feature was originally called extreme transaction processing,
    and the XTP acronym remains in a large number of places in SQL Server.


    In my system, the C compiler and Microsoft linker are located on `C:\Program Files\Microsoft
    SQL Server\MSSQL15.MSSQLSERVER\MSSQL\Binn\Xtp\VC\bin` as `cl.exe` and `link.exe`,
    respectively. A small C code fragment shown for illustration purposes is next.
    (Generated code is not intended for human consumption.)


    ```c

    #include "hkenggen.h"

    #include "hkrtgen.h"

    #include "hkgenlib.h"

    #define ENABLE_INTSAFE_SIGNED_FUNCTIONS

    #include "intsafe.h"

    #define HOTPATCH_BUFFER_SIZE 256

    typedef struct _PATCH_BUFFER {

    unsigned short PointerIndex;

    unsigned short Fill1;

    unsigned short BufferSize;

    unsigned short Fill2;

    unsigned __int64 Buffer[(HOTPATCH_BUFFER_SIZE - 8) / sizeof(__int64)];

    } PATCH_BUFFER;

    PATCH_BUFFER HotPatchBuffer = {0, 0, HOTPATCH_BUFFER_SIZE, 0};

    int memcmp(const void*, const void*, size_t);

    void *memset(void*, int, size_t);

    #pragma deprecated (memcpy)

    #define offsetof(s,f)   ((size_t)&(((s*)0)->f))

    struct NullBitsStruct_322100188

    {

    unsigned char hkc_isnull_3:1;

    };

    ```


    Note


    For more details about the Hekaton compiler architecture, you can read the paper
    “Hekaton: SQL Server’s Memory-Optimized OLTP Engine” by Cristian Diaconu et. al,
    which you can find online at [`www.microsoft.com/en-us/research/publication/hekaton-sql-servers-memory-optimized-oltp-engine`](http://www.microsoft.com/en-us/research/publication/hekaton-sql-servers-memory-optimized-oltp-engine).


    ### Memory-Optimized Table Variables


    Starting with SQL Server 2016, you can now use memory-optimized table variables
    to replace traditional table variables or temporary tables. Memory-optimized table
    variables offer several times better performance than their `tempdb` counterparts,
    and among their benefits are that they are always in memory and don’t use `tempdb`.
    Consequently, they don’t suffer from the `tempdb` limitations like I/O access
    or contention allocation.


    Note


    New on SQL Server 2019, you can now configure tempdb to use memory-optimized metadata,
    a feature based on the In-Memory OLTP technology. By enabling this tempdb configuration,
    tempdb metadata can now be moved into latch-free nondurable memory-optimized tables
    and by doing that technically eliminating metadata contention. You can find more
    details at Chapter [4](#393702_2_En_4_Chapter.xhtml), where we covered tempdb
    troubleshooting and configuration.


    Let’s take a look at one example. The following code creates a regular temporary
    table and its equivalent memory-optimized table variable. Notice that two steps
    are required to create a memory-optimized table variable. First, we must create
    a type using the `MEMORY_OPTIMIZED = ON` clause, which like any other memory-optimized
    table requires an index. Then we must declare a memory-optimized table variable
    using the type.


    ```sql

    CREATE TABLE #temp (

    CustomerID int,

    Name varchar(40)

    )

    GO

    CREATE TYPE test

    AS TABLE (

    CustomerID int INDEX IX_CustomerID,

    Name varchar(40)

    )

    WITH (MEMORY_OPTIMIZED = ON)

    GO

    DECLARE @mytest test

    SELECT * FROM @mytest

    SELECT * FROM #temp

    ```


    You may have a similar behavior using a memory-optimized table with `SCHEMA_ONLY`
    durability, but the main difference is that the table schema remains part of the
    database after SQL Server is restarted or the database is brought offline by some
    other methods. Tables with `SCHEMA_ONLY` durability are also useful in some other
    business scenarios like session state for web applications and staging tables
    for ETL (Extract, Transform, and Load) purposes.


    ### Current Limitations


    Although SQL Server 2019 is the fourth release of Hekaton, there are still some
    limitations you need to be aware of before deciding to start working on a project
    using this feature. You can find such information in “Transact-SQL Constructs
    Not Supported by In-Memory OLTP” at [`https://msdn.microsoft.com/en-us/library/dn246937.aspx`](https://msdn.microsoft.com/en-us/library/dn246937.aspx)
    and “Unsupported SQL Server Features for In-Memory OLTP” at [`https://msdn.microsoft.com/en-us/library/dn133181.aspx`](https://msdn.microsoft.com/en-us/library/dn133181.aspx).


    Both documents offer links for previous SQL Server versions, but it is strongly
    recommended that you implement new Hekaton projects on the later version instead.'
