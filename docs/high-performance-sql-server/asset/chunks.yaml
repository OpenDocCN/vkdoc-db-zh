  trans: '### 更新


    SQL Server 中的更新操作同样需要进行优化，以尽可能快地执行。这些操作有时比 `SELECT` 查询更复杂，因为它们不仅需要找到要更新的数据，还可能需要更新现有索引、执行触发器以及强制现有的引用完整性或检查约束。

    更新操作分两步执行，可概括为一个读取部分和一个请求的更新部分。第一步确定将要更新哪些记录以及要应用的更改细节，并将像任何其他 `SELECT` 语句一样读取要更新的数据。对于
    `INSERT` 语句，这包括要插入的值；对于 `DELETE` 语句，则是要删除记录的键，这可以是聚集索引的聚集键，也可以是堆的 RID。对于 `UPDATE`
    语句，则需要同时具备要更新记录的键和要更新的值。第二步执行更新操作，包括更新索引、验证约束以及在需要时执行触发器。如果违反了任何约束，更新操作将失败并回滚。


    ## 内存授权


    尽管提交到 SQL Server 的每个查询都需要一些内存，但排序和哈希操作需要显著更多的内存量，在某些情况下，这可能导致性能问题。与将数据页保留在内存中的缓冲池缓存不同，内存授权是服务器内存的一部分，用于在查询执行排序和哈希操作时存储临时行数据，并且仅在查询持续期间需要。此内存用于存储要排序的行或构建哈希连接与哈希聚合运算符所使用的哈希表。在极少数情况下，具有多个范围扫描的并行查询计划也可能需要内存授权。

    查询所需的内存在组装执行计划时由查询优化器估算，它基于估算的行数和行大小，以及所需的操作类型（如排序、哈希连接或哈希聚合）。尽管此过程通常运行良好，但在某些情况下可能会出现一些性能问题：


    1.  运行多个需要排序或哈希操作的系统可能没有足够的可用内存，导致一个或多个查询需要等待。

    2.  低估所需内存的计划可能导致额外的数据处理，或者查询运算符使用磁盘（溢出）。


    在第一种情况下，SQL Server 估算出了运行查询所需的最小内存量，称为所需内存，但由于系统中没有足够的内存，查询将不得不等待，直到此内存可用。通过查看
    `sys.dm_exec_query_memory_grants` DMV，您可以获取有关已获得内存授权或仍需要内存授权才能执行的查询的信息。例如，以下代码将显示正在等待内存授权的查询：


    ```sql

    SELECT * FROM sys.dm_exec_query_memory_grants WHERE grant_time IS NULL

    ```


    在第二种情况下，通常是由于基数估算不佳，查询优化器可能低估了查询以及排序操作、或哈希操作的生成输入所需的内存量，导致其无法放入可用内存中。您可以使用 `sort_warning`、`hash_warning`
    和 `exchange_spill` 扩展事件（或 Sort Warning、Hash Warning 和 Exchange Spill 跟踪事件类）来监控您的数据库中可能发生这些性能问题的情况。

    资源信号量进程负责为传入的查询预留和分配内存。当系统中足够内存可用时，资源信号量将按先进先出（FIFO）的原则将请求的内存授予查询，以便它们可以开始执行。如果没有足够的内存可用，资源信号量会将当前查询置于等待队列中。随着内存变得可用，资源信号量将唤醒等待队列中的查询，并授予请求的内存，以便它们可以开始执行。可以使用
    `sys.dm_exec_query_resource_semaphores` 来显示有关资源信号量的附加信息，该视图除了描述此处介绍的常规资源信号量外，还描述了小查询资源信号量。小查询资源信号量负责处理请求内存授权小于
    5 MB 且查询开销小于三个开销单位的查询。小查询资源信号量有助于改善预期执行非常快的小查询的响应时间。

    与内存相关的等待可以通过 `RESOURCE_SEMAPHORE` 等待类型检测到，这表明由于其他并发查询，查询内存请求无法立即获得批准。监控此等待类型可以检测到过多的并发查询或过大的内存请求量。您可以使用以下查询来查看此类信息：


    ```sql

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''RESOURCE_SEMAPHORE''

    ```


    注意


    相关的等待类型 `RESOURCE_SEMAPHORE_QUERY_COMPILE` 表示并发查询编译过多。`RESOURCE_SEMAPHORE_MUTEX`
    显示在运行查询时等待线程预留，但在同步查询编译和内存授权请求时也会发生。关于等待的更多细节将在第 5 章介绍。


    最后，内存授权反馈是 SQL Server 2017 引入的一项功能，旨在通过重新计算查询所需的内存并更新缓存的查询计划中的信息来帮助处理这些情况。内存授权反馈有两种模式：批处理模式和行模式，这将在第
    10 章中更详细地介绍。'
- fmt: '## Locks and Latches


    Latches are short-term lightweight synchronization primitives used to protect
    memory structures for concurrent access. They must be acquired before data can
    be read from or written to a page in the buffer pool depending on the access mode
    preventing other threads from looking at incorrect data. Latches are SQL Server
    internal control mechanisms and are only held for the duration of the physical
    operation on the memory structure. Performance problems relating to latch contention
    may happen when multiple threads try to acquire incompatible latches on the same
    memory structure.


    Latches can be categorized into two main groups: page latch waits, which are reported
    with the `PAGELATCH` and `PAGEIOLATCH` prefixes on the `sys.dm_os_wait_stats`
    DMV, and nonpage latch waits, which use the `LATCH` and `TRAN_MARKLATCH` prefixes
    on the same DMV. Let’s review them:


    1.  `PAGELATCH_`: They are called buffer latches as they are used for pages in
    the buffer pool. Pages are the fundamental unit of data storage in SQL Server,
    and their size is 8 KB. Pages include data and index pages for user objects along
    with pages that manage allocations such as the `IAM` (Index Allocation Map), `PFS`
    (Page Free Space), `GAM` (Shared Global Allocation Map), and `SGAM` (Shared Global
    Allocation Map) pages.


    2.  `PAGEIOLATCH`: Similar to the previous type of latch, they are also latches
    for pages, but these are used in the case where a page is not yet loaded in the
    buffer pool and needs to be accessed from disk. They are often referred to as
    I/O latches.


    3.  `LATCH_` and `TRAN_MARKLATCH`: These are used for internal memory structures
    other than buffer pool pages and so are simply known as nonbuffer latches.


    Every latch wait on the `sys.dm_os_wait_stats` also includes a mode, identified
    by two characters after the latch prefix such as `SH` (shared latch), `EX` (exclusive
    latch), `UP` (update latch), `KP` (keep latch), `DT` (destroy latch), or `NL`
    (null latch), this last one undocumented and no longer used. Since there are currently
    six modes running, the following will return 24 rows:


    ```sql

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''%LATCH_%''

    ```


    The `sys.dm_os_latch_stats` DMV can be used to return information about all latch
    waits in the system and is organized by classes. All the buffer latch waits are
    included in the `BUFFER latch_` class, and all remaining classes are nonbuffer
    latches. Since latch contention in allocation pages is a common problem on the
    `tempdb` database, this topic will be explained in more detail in Chapter [4](#393702_2_En_4_Chapter.xhtml),
    which covers tempdb troubleshooting and configuration.


    Locking, on the other hand, is a mechanism used by SQL Server to synchronize access
    to the same data by multiple users at the same time. There are several ways to
    get information about the current locking activity in SQL Server such as using
    the `sys.dm_tran_locks` DMV. The main difference between locks and latches is
    that latches are used to guarantee consistency of memory structures and that they
    are held for the duration of the physical operation on this memory structure.
    Locks are used to guarantee the consistency of a transaction and are controlled
    by the developer, for example, by the use of transaction isolation levels.


    Note: SQL Server also uses similar structures called superlatches (sometimes called
    sublatches) to provide increased performance in highly concurrent workloads. SQL
    Server will dynamically promote a latch into a superlatch or demote it as needed.


    Waits and contention on locks and latches are inevitable as part of the normal
    operation on a busy SQL Server instance. The challenge is to identify when these
    waits are excessive and may create a performance problem. Waits for any SQL Server
    resource are always recorded and available as inside the SQL Server code it is
    required to indicate what resource the code is waiting for. Waits for locks and
    latches are covered in great detail in Chapter [5](#393702_2_En_5_Chapter.xhtml).


    ## Summary


    This chapter covered how the SQL Server database engine works and explained everything
    happening in the system from the moment a connection is made to a database until
    a query is executed and the results are returned to the client. TDS was introduced
    as an application-level protocol that facilitates the interaction between clients
    and SQL Server. We also saw how operating system services are general-purpose
    services and many times inappropriate for database engine needs as they do not
    scale well.


    We covered how the query processor works and how the query optimizer assembles
    an efficient execution plan using the operations provided by the database engine.
    With a large number of operators available in SQL Server, we covered the most
    used operations as well, including operators for data access, aggregations, joins,
    updates, and parallelism. Memory grants and locks and latches were discussed as
    well as many performance problems that require a basic understanding of how they
    work.


    This introductory chapter didn’t include newer database engine structures such
    as columnstore indexes or memory-optimized tables, which are totally new technologies
    and require an entire chapter. Chapter [7](#393702_2_En_7_Chapter.xhtml) is dedicated
    to those in-memory technologies.


    # 2. SQL Server on Linux


    I started my IT career working with Unix systems and databases. That includes
    databases and applications on platforms like System V Release 4, IBM AIX, HP-UX,
    Sun Solaris, and of course Linux. Back in 1991, I was using Unix on minicomputers,
    and I was always wondering how I could run Unix on less expensive hardware, such
    as a PC, so I could better test and learn how it works. Then I discovered Linux
    while reading a personal computing magazine article.


    I was fortunate to be among the very early Linux users when I downloaded it from
    the Internet and saved the images into four or five floppy disks. I know not so
    many people were using Linux back then because not many people even heard about
    it. In fact, I never knew about anyone else using or even knowing Linux existed
    back then. Not so many people even had access to the Internet in those days. The
    Internet was mostly available in only a few universities.


    Although I started working with SQL Server 6.5 in the second part of the 1990s,
    I was also working with other database technologies in both Windows and Unix.
    A few years later, when I decided to specialize in and focus exclusively on SQL
    Server, I thought I would never work with a Unix system ever again. But that was
    about to change years later, by 2016.'
  raw: '## Locks and Latches


    Latches are short-term lightweight synchronization primitives used to protect
    memory structures for concurrent access. They must be acquired before data can
    be read from or written to a page in the buffer pool depending on the access mode
    preventing other threads from looking at incorrect data. Latches are SQL Server
    internal control mechanisms and are only held for the duration of the physical
    operation on the memory structure. Performance problems relating to latch contention
    may happen when multiple threads try to acquire incompatible latches on the same
    memory structure.


    Latches can be categorized into two main groups: page latch waits, which are reported
    with the `PAGELATCH` and `PAGEIOLATCH` prefixes on the `sys.dm_os_wait_stats`
    DMV, and nonpage latch waits, which use the `LATCH` and `TRAN_MARKLATCH` prefixes
    on the same DMV. Let’s review them:


    1.  `PAGELATCH_`: They are called buffer latches as they are used for pages in
    the buffer pool. Pages are the fundamental unit of data storage in SQL Server,
    and their size is 8 KB. Pages include data and index pages for user objects along
    with pages that manage allocations such as the IAM (Index Allocation Map), PFS
    (Page Free Space), GAM (Shared Global Allocation Map), and SGAM (Shared Global
    Allocation Map) pages.


    2.  `PAGEIOLATCH`: Similar to the previous type of latch, they are also latches
    for pages, but these are used in the case where a page is not yet loaded in the
    buffer pool and needs to be accessed from disk. They are often referred to as
    I/O latches.


    3.  `LATCH_` and `TRAN_MARKLATCH`: These are used for internal memory structures
    other than buffer pool pages and so are simply known as nonbuffer latches.


    Every latch wait on the `sys.dm_os_wait_stats` also includes a mode, identified
    by two characters after the latch prefix such as SH (shared latch), EX (exclusive
    latch), UP (update latch), KP (keep latch), DT (destroy latch), or NL (null latch),
    this last one undocumented and no longer used. Since there are currently six modes
    running, the following will return 24 rows:


    ```

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''%LATCH_%''

    ```


    The `sys.dm_os_latch_stats` DMV can be used to return information about all latch
    waits in the system and is organized by classes. All the buffer latch waits are
    included in the `BUFFER latch_` class, and all remaining classes are nonbuffer
    latches. Since latch contention in allocation pages is a common problem on the
    `tempdb` database, this topic will be explained in more detail in Chapter [4](#393702_2_En_4_Chapter.xhtml),
    which covers tempdb troubleshooting and configuration.


    Locking, on the other hand, is a mechanism used by SQL Server to synchronize access
    to the same data by multiple users at the same time. There are several ways to
    get information about the current locking activity in SQL Server such as using
    the `sys.dm_tran_locks` DMV. The main difference between locks and latches is
    that latches are used to guarantee consistency of memory structures and that they
    are held for the duration of the physical operation on this memory structure.
    Locks are used to guarantee the consistency of a transaction and are controlled
    by the developer, for example, by the use of transaction isolation levels.


    Note


    SQL Server also uses similar structures called superlatches (sometimes called
    sublatches) to provide increased performance in highly concurrent workloads. SQL
    Server will dynamically promote a latch into a superlatch or demote it as needed.


    Waits and contention on locks and latches are inevitable as part of the normal
    operation on a busy SQL Server instance. The challenge is to identify when these
    waits are excessive and may create a performance problem. Waits for any SQL Server
    resource are always recorded and available as inside the SQL Server code it is
    required to indicate what resource the code is waiting for. Waits for locks and
    latches are covered in great detail in Chapter [5](#393702_2_En_5_Chapter.xhtml).


    ## Summary


    This chapter covered how the SQL Server database engine works and explained everything
    happening in the system from the moment a connection is made to a database until
    a query is executed and the results are returned to the client. TDS was introduced
    as an application-level protocol that facilitates the interaction between clients
    and SQL Server. We also saw how operating system services are general-purpose
    services and many times inappropriate for database engine needs as they do not
    scale well.


    We covered how the query processor works and how the query optimizer assembles
    an efficient execution plan using the operations provided by the database engine.
    With a large number of operators available in SQL Server, we covered the most
    used operations as well, including operators for data access, aggregations, joins,
    updates, and parallelism. Memory grants and locks and latches were discussed as
    well as many performance problems that require a basic understanding of how they
    work.


    This introductory chapter didn’t include newer database engine structures such
    as columnstore indexes or memory-optimized tables, which are totally new technologies
    and require an entire chapter. Chapter [7](#393702_2_En_7_Chapter.xhtml) is dedicated
    to those in-memory technologies.


    # 2. SQL Server on Linux


    I started my IT career working with Unix systems and databases. That includes
    databases and applications on platforms like System V Release 4, IBM AIX, HP-UX,
    Sun Solaris, and of course Linux. Back in 1991, I was using Unix on minicomputers,
    and I was always wondering how I could run Unix on less expensive hardware, such
    as a PC, so I could better test and learn how it works. Then I discovered Linux
    while reading a personal computing magazine article.


    I was fortunate to be among the very early Linux users when I downloaded it from
    the Internet and saved the images into four or five floppy disks. I know not so
    many people were using Linux back then because not many people even heard about
    it. In fact, I never knew about anyone else using or even knowing Linux existed
    back then. Not so many people even had access to the Internet in those days. The
    Internet was mostly available in only a few universities.


    Although I started working with SQL Server 6.5 in the second part of the 1990s,
    I was also working with other database technologies in both Windows and Unix.
    A few years later, when I decided to specialize in and focus exclusively on SQL
    Server, I thought I would never work with a Unix system ever again. But that was
    about to change years later, by 2016.'
  trans: '

    ## 锁与闩锁


    闩锁是一种轻量级的短期同步原语，用于保护内存结构以供并发访问。根据访问模式的不同，在从缓冲池中读取或写入页面数据前必须先获取闩锁，以防止其他线程看到不正确的数据。闩锁是
    SQL Server 内部的控制机制，仅在物理操作内存结构期间持有。当多个线程尝试在同一内存结构上获取不兼容的闩锁时，可能会发生与闩锁争用相关的性能问题。


    闩锁可分为两大类：页面闩锁等待（在 `sys.dm_os_wait_stats` 动态管理视图 (DMV) 中以 `PAGELATCH` 和 `PAGEIOLATCH`
    前缀报告）和非页面闩锁等待（在同一 DMV 中使用 `LATCH` 和 `TRAN_MARKLATCH` 前缀）。让我们来审视它们：


    1.  `PAGELATCH_`：被称为缓冲区闩锁，因为它们用于缓冲池中的页面。页面是 SQL Server 中数据存储的基本单位，大小为 8 KB。页面包括用户对象的数据页和索引页，以及管理分配的页面，例如
    `IAM`（索引分配映射）、`PFS`（页空间可用信息）、`GAM`（全局分配映射）和 `SGAM`（共享全局分配映射）页面。


    2.  `PAGEIOLATCH`：与上一类闩锁类似，它们也用于页面，但这些闩锁用于页面尚未加载到缓冲池中而需要从磁盘访问的情况。它们通常被称为 I/O 闩锁。


    3.  `LATCH_` 和 `TRAN_MARKLATCH`：这些用于缓冲池页面以外的内部内存结构，因此简称为非缓冲区闩锁。


    `sys.dm_os_wait_stats` 中的每个闩锁等待也包含一个模式，通过闩锁前缀后的两个字符来标识，例如 `SH`（共享闩锁）、`EX`（排他闩锁）、`UP`（更新闩锁）、`KP`（保持闩锁）、`DT`（销毁闩锁）或
    `NL`（空闩锁，后者未文档化且不再使用）。由于目前有六种模式运行，以下查询将返回 24 行：


    ```sql

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type LIKE ''%LATCH_%''

    ```


    `sys.dm_os_latch_stats` DMV 可用于返回系统中所有闩锁等待的信息，并按类别组织。所有缓冲区闩锁等待都包含在 `BUFFER latch_`
    类中，其余所有类别都是非缓冲区闩锁。由于分配页面中的闩锁争用是 `tempdb` 数据库的常见问题，本主题将在第 4 章中更详细地解释，该章涵盖 tempdb
    故障排除和配置。


    另一方面，锁定是 SQL Server 用来同步多个用户同时访问相同数据的机制。有多种方法可以获取有关 SQL Server 中当前锁定活动的信息，例如使用
    `sys.dm_tran_locks` DMV。锁与闩锁的主要区别在于，闩锁用于保证内存结构的一致性，并且仅在对该内存结构进行物理操作期间持有。锁用于保证事务的一致性，并由开发人员控制，例如通过使用事务隔离级别。


    注意：SQL Server 还使用称为超级闩锁（有时称为子闩锁）的类似结构，以在高并发工作负载中提供更高的性能。SQL Server 会根据需要动态地将闩锁提升为超级闩锁或将其降级。


    在繁忙的 SQL Server 实例上，锁和闩锁的等待与争用是其正常操作中不可避免的一部分。挑战在于识别这些等待何时过度并可能引发性能问题。对任何 SQL
    Server 资源的等待总是被记录并可用，因为在 SQL Server 代码内部需要指明代码正在等待什么资源。锁和闩锁的等待将在第 5 章中详细介绍。


    ## 本章小结


    本章介绍了 SQL Server 数据库引擎的工作原理，并解释了从连接到数据库到查询执行并将结果返回给客户端期间系统中发生的一切。TDS 作为应用层协议被引入，以促进客户端与
    SQL Server 之间的交互。我们还了解到操作系统服务是通用服务，很多时候并不适合数据库引擎的需求，因为它们无法很好地扩展。


    我们介绍了查询处理器的工作原理，以及查询优化器如何使用数据库引擎提供的操作组装高效的执行计划。借助 SQL Server 中大量的可用运算符，我们还介绍了最常用的操作，包括用于数据访问、聚合、联接、更新和并行的运算符。同时讨论了内存授予、锁和闩锁，以及许多需要基本理解其工作原理的性能问题。


    这个介绍性章节没有包含较新的数据库引擎结构，例如列存储索引或内存优化表，这些是全新的技术，需要专门的一整章来介绍。第 7 章专门讨论这些内存中技术。


    # 2. SQL Server on Linux


    我的 IT 职业生涯始于使用 Unix 系统和数据库。这包括在像 System V Release 4、IBM AIX、HP-UX、Sun Solaris，当然还有
    Linux 这样的平台上的数据库和应用程序。早在 1991 年，我就在小型机上使用 Unix，并且我一直在想如何能在更便宜的硬件（比如 PC）上运行 Unix，以便更好地测试和学习其工作原理。后来，我在阅读一本个人计算机杂志的文章时发现了
    Linux。


    我很幸运成为最早的 Linux 用户之一，当时我从互联网上下载它，并将镜像保存到四、五张软盘中。我知道当时使用 Linux 的人不多，因为甚至没多少人听说过它。事实上，我那时从不知道有其他人使用或甚至知道
    Linux 的存在。在那个年代，甚至没多少人能访问互联网。互联网主要只在少数大学可用。


    虽然我在 1990 年代后半期开始使用 SQL Server 6.5，但我也在 Windows 和 Unix 上从事其他数据库技术的工作。几年后，当我决定专攻并完全专注于
    SQL Server 时，我以为我再也不会接触 Unix 系统了。但几年后，到 2016 年，这一切即将改变。

    '
- fmt: '## Microsoft Announcements


    It was a huge surprise for all of us in the technology world when at the Data
    Driven event in New York, in March 2016, Microsoft’s Scott Guthrie, Executive
    Vice President, Cloud and Enterprise Group, announced that SQL Server would be
    available for the Linux platform. You can still read about the announcement here:
    [`https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux/`](https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux/).
    Before that day, we would only hear occasional announcements that SQL Server will
    be ported to Linux, just to notice that was posted on an April 1st or April fools''
    day. But this time, it was no joke.


    The first bits of the product, which consisted of the first public preview or
    CTP (Community Technology Preview) of what later would become SQL Server 2017,
    were released later that year in November at the Microsoft Connect() event in
    the same city.


    Note


    I was so excited about the possibilities of running SQL Server on Linux that I
    wrote an entire book about SQL Server on Linux myself. If you are interested in
    more details, you can read `SQL Server on Linux` published by McGraw-Hill.


    Microsoft also released SQL Server 2016 Service Pack 1 at the same event and announced
    that, starting with this version, for the first time in the history of SQL Server,
    all the application and programmability features would be available on all the
    editions of the product. Features such as In-Memory OLTP, columnstore indexes,
    database snapshots, compression, partitioning, Always Encrypted, row-level security,
    dynamic data masking, and change data capture, among others, would be available
    on all the editions of SQL Server, from the free Express edition to Standard and
    Enterprise. This obviously also impacted SQL Server on Linux as it was planned
    to be part of the SQL Server 2017 release.


    Having all the application and programmability features available on all the editions
    of the product would make applications more portable and could be developed and
    deployed on any edition and now on multiple platforms or at least Windows, Linux,
    and Docker. Also, as of March of 2016, the SQL Server Developer edition, starting
    with SQL Server 2014, was also made available for free.


    After several impacting announcements on those two events, it seems like we still
    were not ready for yet another big surprise. Just two days after the mentioned
    first CTP of what later would be the first version of SQL Server for Linux was
    released, several sources, starting with `The Register`, indicated that the product
    was not a port, as almost everybody expected, but instead was using a virtualization
    technology based on a research project called Drawbridge. You can still read such
    an article, “Microsoft Linux? Microsoft running its Windows'' SQL Server software
    on Linux,” at [`www.theregister.com/2016/11/18/microsoft_running_windows_apps_on_linux`](https://www.theregister.com/2016/11/18/microsoft_running_windows_apps_on_linux).


    Even when Microsoft never explicitly said it was a port, which means compiling
    the SQL Server code and running it as a native Linux application, it was the most
    logical assumption. It was strange hearing that the opposite was true for the
    first time from some other sources outside Microsoft. The SQL Server team went
    public with the architecture only a month later, mostly with the article “SQL
    Server on Linux: How? Introduction” which is still a good read which you can find
    at [`https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/`](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/).


    Although it took less than three years to ship the final bits of the software,
    work still spanned two versions of the product. While work on Linux started back
    in late 2014 and early 2015, SQL Server 2016 was released in May of 2016. SQL
    Server 2017, the first release to run on Linux, would not be released until October
    of 2017.


    Currently, only the latest two versions of SQL Server, 2017 and 2019, can run
    on Linux. They can run on Red Hat Enterprise Linux, SUSE Linux Enterprise Server,
    and Ubuntu. These versions of SQL Server can also run on Docker, which itself
    runs on Linux, Windows, and Mac OS platforms.


    Note


    Installing SQL Server on Linux or running SQL Server on Docker is outside the
    scope of this book. For details about how to perform this, see the installation
    section at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview?view=sql-server-ver15).


    I will use the remainder of this chapter to explain the architecture behind SQL
    Server on Linux. A bit of history to bring perspective may be needed as well.


    ## A Bit of History


    Although SQL Server has been a Windows-only software product for more than two
    decades, not so many people know that it started in the Unix world. SQL Server
    was originally a Sybase product which ran in several Unix platforms and was originally
    called DataServer. Back in the day, in order to run software on multiple platforms,
    the code had to be ported and compiled for every operating system. So SQL Server
    started as a multiplatform technology. Windows did not even exist in those early
    days (or at least the server software, originally called Windows NT). Sometime
    later, Sybase partnered with Microsoft to take SQL Server first to OS/2 and later
    to Windows.


    Microsoft and Sybase even had a short partnership with Ashton-Tate, and the result
    of this partnership released Ashton-Tate/Microsoft SQL Server 1.0 for OS/2 in
    May 1989. After the agreement with Ashton-Tate ended, the name of the product
    was changed to just Microsoft SQL Server, and its first version, 1.1, was released
    in the summer of 1990.


    A few years later, Microsoft released a new server-based operating system, Windows
    NT. Its first version, Windows NT 3.1, was released in July 1993 (there was no
    version 1 or 2). The kernel of Windows NT was originally intended to be used on
    OS/2. Windows NT was written in C, C++, and assembly language. Very soon Microsoft
    decided to port SQL Server from OS/2 to Windows NT.


    SQL Server 4.2 for OS/2 was ported to Windows NT resulting in SQL Server 4.21
    and was released in 1993. In April 1994, Microsoft and Sybase announced the end
    of their development agreement, and each decided to develop its own SQL Server
    or database products. SQL Server 4.2B was the last version of the product for
    OS/2.


    Back in those early days of SQL Server, both as a Sybase product and a Microsoft
    product, there was always the dilemma and decision to make about making a product
    portable and able to run on more than one platform or making a product designed,
    written, and optimized for a single operating system. This was one of the decisions
    Microsoft took while leaving the OS/2 platform and keeping SQL Server a Windows-only
    software. This same concern would return when Microsoft tried to port SQL Server
    to Linux. The goals of portability sometimes conflict with the goals of performance.
    In other words, a software project would either need a major reengineering for
    every supported platform or it could take a lowest common denominator approach
    and not fully use the features of every platform.


    Note: You can learn more about the history of SQL Server by reading Chapter [1](#393702_2_En_1_Chapter.xhtml)
    of `Inside Microsoft SQL Server 2000` by Kalen Delaney which you can also find
    online at [`www.sqlserverinternals.com/s/History-of-SQL-Server.pdf`](https://www.sqlserverinternals.com/s/History-of-SQL-Server.pdf).'
