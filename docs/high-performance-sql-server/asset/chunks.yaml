    help you to collect query and plan information along with their runtime statistics,
    which you can use to easily identify query performance–related problems and even
    force an existing execution plan. The chapter closes by mentioning some related
    new features such as the Live Query Statistics and the SQL Server Management Studio
    plan comparison tool.


    Part 4, Performance Tuning and Troubleshooting, includes the five remaining chapters
    of the book and covers topics such as in-memory technologies, indexing, intelligent
    query processing, and disk and storage.


    In-memory technologies are introduced in Chapter [7](#393702_2_En_7_Chapter.xhtml)
    and include In-Memory OLTP and columnstore indexes. Both features suffered severe
    limitations with their original releases, so this chapter covers how these technologies
    work and what their current improvements are. The chapter ends with operational
    analytics, which combines both technologies to allow analytical queries to be
    executed in real time in an OLTP system. In-memory technologies promise to be
    the future in relational database technologies.


    Chapter [8](#393702_2_En_8_Chapter.xhtml) shows how proactively collecting and
    persisting performance information could be extremely beneficial to understand
    how a specific system works, to create a baseline, and to understand when performance
    is deviating from a desirable or expected behavior. The chapter also covers the
    most critical performance counters, dynamic management objects, and events, along
    with some of the tools used to display and collect such data. This chapter surely
    overlaps with Part 3, Monitoring.


    Indexing, a required topic for database performance, is covered in Chapter [9](#393702_2_En_9_Chapter.xhtml),
    which explains how indexes work and why they are important on both OLTP and Data
    Warehouse environments. The chapter provides emphasis on using SQL Server tools
    to help create indexes such as the missing indexes feature and the more sophisticated
    Database Engine Tuning Advisor.


    Another new chapter in this second edition of the book, Chapter [10](#393702_2_En_10_Chapter.xhtml),
    provides an overview to intelligent query processing, a collection of features
    introduced with SQL Server 2017 designed to improve the performance of your queries.
    The intelligent query processing features provide performance enhancements with
    no application changes needed and little or no effort required.


    Finally, SQL Server storage is explained in Chapter [11](#393702_2_En_11_Chapter.xhtml).
    Disk has traditionally been the slowest part of a database system, but newer technologies
    such as flash-based storage offer great performance improvements and are becoming
    a de facto enterprise standard as their cost continues to decline. The chapter
    also indicates that storage optimization is not only about using the fastest disk
    possible but also minimizing its usage by implementing the methods covered in
    several chapters of the book, such as proper indexing or some query-tuning techniques.


    Acknowledgments


    First of all, I would like to thank the people who directly helped me write this
    book, starting with everyone on the Apress team. Thanks to Jonathan Gennick, for
    giving me the opportunity to originally write this book and for encouraging me
    to write a second edition, especially on the difficult and uncertain times when
    we all were involved in a global pandemic. Thanks to Jill Balzano, coordinating
    editor, with whom I worked almost on a daily basis. I would also like to thank
    my amazing technical reviewer, Mark Broadbent, who did an incredible job providing
    feedback about every chapter of the book.


    I always also like to thank the people who indirectly helped me in this and all
    my previous books—the people who I learned this technology from by reading their
    books and academic papers, including Kalen Delaney, Michael Stonebraker, Goetz
    Graefe, Ken Henderson, and Sunil Agarwal, just to name a few. Thanks go out as
    well to the people in the SQL Server community from whom I also learned a lot.
    The long list of names would be impossible to include here.


    Finally, thanks to my family, my sons Diego, Benjamin, and David, and my wife
    Rocio. Thanks again all for your support and patience for the many evenings and
    weekends I spent on yet another book-writing adventure.


