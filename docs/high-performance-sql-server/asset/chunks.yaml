  trans: '

    ## 批处理模式自适应连接


    如第 1 章所述，在查询优化期间由于基数估计错误而选择错误的连接算法，可能会严重影响查询性能。自适应连接提供了一种解决方案，它允许执行计划在执行时根据流经连接操作符的实际行数动态选择物理连接算法。在执行过程中，自适应连接操作符会先假定该连接是哈希连接，并读取连接的生成输入；如果达到计算出的阈值，则将继续作为哈希连接执行。如果未达到阈值，计划仍会使用生成输入，但转而继续执行为嵌套循环连接。在当前版本的批处理模式自适应连接中，仅支持哈希连接和嵌套循环连接，并且如前所述，计划最初会假定物理连接是哈希连接。


    批处理模式自适应连接，顾名思义，仅限于使用批处理模式操作符的查询。在 SQL Server 2017 中，这基本上仅限于使用列存储索引的操作。然而，在最新版本中，它还包括使用行存储批处理模式的操作，这也是本章稍后将讨论的新功能。


    最后，在某些情况下，您可能需要禁用本章涵盖的此功能或其他功能。例如当遇到性能回退时。若要在不更改数据库兼容级别的情况下，为整个数据库级别禁用批处理模式自适应连接，可以对
    SQL Server 2017 使用以下语句：


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET DISABLE_BATCH_MODE_ADAPTIVE_JOINS = ON

    ```


    以下语句对 SQL Server 2019 执行相同操作：


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET BATCH_MODE_ADAPTIVE_JOINS = OFF

    ```


    如果需要重新启用此功能，可以相应地反转 `ON` 和 `OFF` 的值。


    如果需要对特定查询禁用批处理模式自适应连接，但为数据库的其他查询保持该功能启用，还可以使用 `USE HINT` 子句，如下所示：


    ```

    SELECT * ...

    OPTION (USE HINT(''DISABLE_BATCH_MODE_ADAPTIVE_JOINS''))

    ```


    让我们通过在 `SalesOrderHeader` 表上创建列存储索引来尝试此功能的示例：


    ```

    CREATE NONCLUSTERED COLUMNSTORE INDEX CIX_SalesOrderID

    ON Sales.SalesOrderHeader(TaxAmt)

    ```


    接下来是我们的示例查询：


    ```

    SELECT SUM(soh.TaxAmt)

    FROM Sales.SalesOrderHeader soh

    JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    ```


    在 SQL Server 2019 中运行上述查询将生成如图 10-2 所示的计划。如果您使用的是 SQL Server 2017，则需要使用实时查询统计信息功能才能看到相同的信息。


    注意：实时查询统计信息功能在 SQL Server 2016 中引入，它允许您可视化每个已执行分支上处理的行数。


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig2_HTML.jpg](img/393702_2_En_10_Fig2_HTML.jpg)


    图 10-2 自适应连接查询计划


    图 10-2 中计划最重要的部分是新的自适应连接操作符，它与常规物理连接不同，具有三个输入。第一个或顶部的分支是生成输入，在本例中是一个列存储索引扫描操作符。第二个或中间的分支是如果选择哈希连接将会使用的输入。如您所见，计划显示已处理了
    `121317` 行中的 `121317` 行，这意味着该分支已被选中。第三个也是底部的分支是如果选择嵌套循环连接将会使用的输入。同样，您可以在图 10-2
    中看到，由于 `121317` 行中的 `0` 行已被处理，该分支未被选中。


    您还可以检查定义计划用于此决策的阈值的值。如果您查看自适应连接操作符的属性，`Adaptive Threshold Rows` 属性将显示值 `1398.57`。行数等于或大于此阈值的任何数量都将使计划继续作为哈希连接执行。更小的数量将把连接切换到嵌套循环连接。


    最后，删除创建的索引：


    ```

    DROP INDEX Sales.SalesOrderHeader.CIX_SalesOrderID

    ```

    '
- fmt: '## Memory Grant Feedback


    SQL Server 使用缓冲区缓存页面来保存查询使用的数据。然而，其他一些操作（如排序和哈希）可能需要大量的额外内存，但它们无法使用计划缓存，而是需要内存授权。内存授权用于存储要排序的行，或者存储哈希连接和哈希聚合运算符使用的哈希表，并且仅在查询执行期间需要。在某些极少数情况下，具有多个范围扫描的并行计划也可能需要内存授权。


    查询所需的内存数量由查询优化器在生成计划时估算。尽管此过程通常能正确估算所需内存，但在某些情况下，可能会发生以下性能问题：


    1.  低估所需内存的计划可能导致额外的查询处理或将数据溢出到磁盘。

    2.  高估所需内存的计划可能会浪费宝贵的资源，并可能导致其他查询不得不等待它们自己请求的内存。


    内存授权反馈旨在通过重新计算查询所需的内存并在缓存的查询计划中更新它来帮助解决这些情况。内存授权反馈可以从 `tempdb` 溢出事件或实际使用的内存量中获取信息。虽然这种改进的估算可能在查询的第一次执行时没有帮助，但它可以用于提升后续执行的性能。内存授权反馈实际上是一个学习过程，并且顾名思义，它从真实的运行时信息中获得反馈。内存授权反馈有两种模式：批处理模式（随
    SQL Server 2017 引入）和行模式（随 SQL Server 2019 引入）。


    对于参数敏感的查询，内存授权反馈将自动禁用。如第 [1](#393702_2_En_1_Chapter.xhtml) 章所解释，在某些情况下，当我们遇到倾斜或不均匀的数据分布时，重用使用一个参数创建的计划可能不适用于具有不同参数的相同查询。对于参数敏感的查询，可能需要多次重复运行才能禁用此功能，因为可能需要时间才能发现查询的内存需求存在差异。您可以通过监控
    `memory_grant_feedback_loop_disabled` 扩展事件来监控该功能何时被禁用。


    由于内存授权反馈信息存储在执行计划中，这带来了一些限制。例如，使用 `OPTION (RECOMPILE)` 或在存储过程级别使用 `RECOMPILE`
    的查询永远不会缓存计划。计划也可能从计划缓存中被移除，从而同时丢失其反馈信息。在这些情况下，内存授权反馈功能无法使用。有关重新编译和计划缓存的更多详细信息，请参阅第
    [1](#393702_2_En_1_Chapter.xhtml) 章。


    与本章介绍的所有功能一样，如果您遇到任何性能问题，可以在数据库级别禁用它们。由于您可能仍希望保留使用特定数据库兼容级别带来的一些其他好处，您可以使用 `ALTER
    DATABASE SCOPED CONFIGURATION` 语句在单个数据库级别启用特定的数据库配置设置。要在 SQL Server 2017 中禁用内存授权反馈功能，您可以在适用的数据库上下文中使用以下语句：


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK = ON

    ```


    以下语句在 SQL Server 2019 中执行相同操作：


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET BATCH_MODE_MEMORY_GRANT_FEEDBACK = OFF

    ```


    您可以通过在上述语句中切换 `ON` 和 `OFF` 的值来重新启用它。


    如果您只需要在查询级别（而不是数据库级别）禁用此功能，可以使用 `USE HINT`，如下所示：


    ```

    SELECT * ....

    OPTION (USE HINT(''DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK''))

    ```


    行模式内存授权反馈的工作方式与批处理模式版本类似，但它仅在 SQL Server 2019 中可用。要启用此功能，您需要将兼容级别设置为 `150`。如果您需要在保持数据库兼容级别不变的情况下禁用它，可以使用以下语句：


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET ROW_MODE_MEMORY_GRANT_FEEDBACK = OFF

    ```


    如果您想重新启用此功能，只需将值改为 `ON`。与批处理内存授权反馈相同，您可以仅在查询级别禁用此功能。如果您在单个查询上遇到性能回归，这将非常有用。


    ```

    SELECT * ....

    OPTION (USE HINT(''DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK''))

    ```'
  raw: '## Memory Grant Feedback


    SQL Server uses the buffer cache pages to keep the data used by your queries.
    Some other operations such as sorting and hashing, however, may require significant
    amounts of additional memory but cannot use the plan cache and instead require
    a memory grant. A memory grant is required to store the rows to be sorted or to
    store the hash tables used by the hash join and hash aggregate operators, and
    it is only required for the duration of the query. In some very rare cases, parallel
    plans with multiple range scans may also require a memory grant.


    The amount of memory required by a query is estimated by the query optimizer when
    the plan is generated. Although this process usually correctly estimates the required
    memory, in some cases, some of the following performance problems may occur:


    1.  A plan underestimating the required memory could lead to additional query
    processing or spilling data to disk.


    2.  Plans overestimating the required memory may waste valuable resources and
    may lead to other queries having to wait for their own requested memory.


    The memory grant feedback was designed to help with these situations by recalculating
    the memory required by a query and updating it in the cached query plan. The memory
    grant feedback may get information from tempdb spill events or from the actual
    amount of memory really utilized. Although this improved estimate may not help
    in the first execution of the query, it can be used to improve the performance
    on following executions. The memory grant feedback is in fact a learning process,
    and, as the name suggests, it actually gets feedback from real runtime information.
    The memory grant feedback comes in two flavors, batch mode, which was introduced
    with SQL Server 2017, and row mode, which was introduced with SQL Server 2019.


    The memory grant feedback will be automatically disabled for parameter-sensitive
    queries. As explained in Chapter [1](#393702_2_En_1_Chapter.xhtml), in some cases
    when we have skewed or uneven data distribution, reusing a plan created with one
    parameter may not be adequate for the same query with a different parameter .
    It may take several repeated runs for this feature to be disabled in the case
    of parameter-sensitive queries as it may take time to find out that the query
    has a variation on memory requirements. You can monitor when the feature was disabled
    by monitoring the memory_grant_feedback_loop_disabled extended event.


    Since the memory grant feedback information is stored in the execution plan, this
    posts a few limitations. For example, a query using OPTION (RECOMPILE) or RECOMPILE
    at the procedure level would never cache a plan. A plan can also be removed from
    the plan cache and by doing that also losing its feedback information. In these
    cases, the memory grant feedback feature cannot be used. For more details about
    recompilation and the plan cache, please refer to Chapter [1](#393702_2_En_1_Chapter.xhtml).


    As with all the features covered in this chapter, you can disable them at the
    database level if you encounter any performance problem. Since you may still want
    to keep some other benefits of using a particular database compatibility level,
    you can use the ALTER DATABASE SCOPED CONFIGURATION statement to enable a particular
    database configuration setting at the individual database level. To disable the
    memory grant feedback feature in SQL Server 2017, you can use the following statement
    within the context of the applicable database:


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK = ON

    ```


    The following statement does the same for SQL Server 2019:


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET BATCH_MODE_MEMORY_GRANT_FEEDBACK = OFF

    ```


    You can enable back by switching the values ON and OFF on the previous statements.


    If you only need to disable this feature at the query level, instead of a database
    level, you can use the USE HINT as shown next:


    ```

    SELECT * ....

    OPTION (USE HINT(''DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK''))

    ```


    Row mode memory grant feedback works in a similar way to the batch mode version,
    but it is only available with SQL Server 2019\. To enable this feature, you would
    need to set the compatibility level to 150\. If you need to disable it while still
    keeping the database compatibility level, you can use the following statement:


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET ROW_MODE_MEMORY_GRANT_FEEDBACK = OFF

    ```


    You can just change to an ON value if you want to enable this feature back. Same
    as with batch memory grant feedback, you can disable this feature just at a query
    level. This can be useful if you are having a performance regression on a single
    query.


    ```

    SELECT * ....

    OPTION (USE HINT(''DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK''))

    ```'
