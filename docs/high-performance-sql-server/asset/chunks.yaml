  trans: '

    此外，仅当查询开销较大时才会考虑并行执行，而“昂贵查询”本身又由另一个配置设置——“并行开销阈值”来定义。该阈值的默认值为 5，同样地，一些数据库管理员也可能考虑提高此值。该阈值意味着，只有当查询处理器创建的初始串行计划成本达到或超过
    5 个成本单位时，才会考虑并行计划；但这并不意味着总是会选择并行计划。例如，可能出现以下情况：查询处理器最初估计某个串行计划的成本为 5.5，于是决定考察并行方案；在发现一个成本为
    6.3 的并行计划后，它决定保留串行方案，因为系统会选择成本最低的方案。但对于开销更大的查询，则很可能生成并行计划。当选择执行并行计划时，计划本身并不定义并行度；这将在运行时由查询处理器确定。完全有可能同一个计划在不同执行时改变其并行度。


    另外，即使您决定为“最大并行度”配置选项设置特定值，它也不是一个硬性限制。任何用户都可以通过使用 `MAXDOP` 查询提示运行查询，向查询处理器请求或建议使用更多处理器来运行并行查询。对并行度指定硬性限制的唯一方法是使用
    `Resource Governor`，该功能于 SQL Server 2008 引入。


    ## 常见误解：CXPACKET 等待


    关于并行的另一个常见误解（如第 5 章所述），是当人们看到大量 `CXPACKET` 等待事件时，便认为是并行出了问题，并决定更改此配置或其他设置以最小化或消除并行。正如所解释的，大多数情况下，并行本身并非问题所在。我们可能都听说过有人将配置值设为
    1 以消除并行的情况，这显然是完全错误的。可能存在一些极端情况，需要您将值设为 1 并在实例级别完全禁用并行，但必须有经过充分研究的、非常好的理由。也有一些应用程序，如
    Microsoft SharePoint，明确要求将最大并行度设置为 1。


    ## 使用 ALTER DATABASE SCOPED CONFIGURATION 覆盖


    最后，自 SQL Server 2016 起，您还可以使用之前介绍的 `ALTER DATABASE SCOPED CONFIGURATION` 语句中的
    `MAXDOP` 设置选项，来覆盖为特定数据库在服务器级别配置的最大并行度。


    ## 示例：最大并行度如何工作


    接下来，我将通过一个示例展示 `最大并行度` 的工作方式。在我的测试环境中，采用 SQL Server 默认配置，并拥有八个逻辑处理器，以下查询创建了一个成本为
    4.33126 的并行计划。该信息显示在图 3-1 的执行计划中。


    ![../images/393702_2_En_3_Chapter/393702_2_En_3_Fig1_HTML.jpg](img/393702_2_En_3_Fig1_HTML.jpg)


    图 3-1：并行计划


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    ```


    在此计划中，有两个操作以并行方式执行：排序操作和聚集索引扫描。请注意，并行是在操作符级别工作的，因此并行计划中的所有操作符并非都必须并行运行。实际执行计划甚至告诉我，对于这次特定的执行，每个线程为这两个操作分别处理了多少行数据，如下方
    XML 执行计划片段所示：


    ### 更改最大并行度


    假设您希望将 `最大并行度` 设置更改为 1：


    ```sql

    sp_configure ''max degree of parallelism'', 1

    RECONFIGURE

    ```


    再次运行前面的 `SELECT` 语句显然会创建图 3-2 所示的串行计划。


    ![../images/393702_2_En_3_Chapter/393702_2_En_3_Fig2_HTML.jpg](img/393702_2_En_3_Fig2_HTML.jpg)


    图 3-2：串行计划


    但是，您可以通过使用 `MAXDOP` 查询提示来覆盖它，如下所示，使用 `MAXDOP 8`：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    OPTION (MAXDOP 8)

    ```


    前面的查询再次创建了一个使用八个线程的并行计划。您可以尝试 `MAXDOP` 的其他几个值，并观察其行为。最后，别忘了将 `最大并行度` 设置改回默认值：


    ```sql

    sp_configure ''max degree of parallelism'', 0

    RECONFIGURE

    ```


    ## 并行开销阈值


    如前一节所述，`并行开销阈值` 配置设置的默认值为 5，它定义了在查询优化过程中，查询处理器开始考虑并行计划的开销阈值。是使用此默认值还是更高的值，以及使用哪个值，正成为一个新的争论话题。网上一些推荐的主要问题在于，关于提高此值以及针对特定工作负载使用哪个值，缺乏明确的研究或性能数据，更不用说来自
    Microsoft 的官方建议。


    虽然默认值 5 对许多工作负载来说可能是一个不错的选择，但对于某些特定场景，您也可以考虑提高此值。使用哪个值取决于您的工作负载，并且应该经过彻底测试。例如，如果您决定将此配置值从
    5 更改为 25，这大致意味着，所有原始串行成本估计在 5 到 25 之间的计划将不再被考虑并行化，而继续作为串行计划执行。您可以选择研究这些查询，以查看新的串行选择是否不会影响执行性能，特别是对于那些关键查询或频繁执行的查询；或者，您也可以对整个工作负载进行整体测试。


    请记住，选择默认值也并非不佳。毕竟，并行能够提升查询性能，并且当选择了并行计划时，查询处理器已经比较了串行计划和并行备选方案，并选择了最佳方案。假设成本估计是充分的，它的性能会更好。此外，如第
    5 章所述，单独看到大量 `CXPACKET` 等待并不意味着您需要更改此配置或“最大并行度”配置设置。


    最后提醒，此配置设置与“最大并行度”设置协同工作，这意味着如果选择了一个并行查询计划来执行，其并行度将在执行前根据后一个配置设置来定义。

