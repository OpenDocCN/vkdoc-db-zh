  trans: '

    # 启用、清空与禁用查询存储


    查询存储默认处于禁用状态。要在当前数据库上启用它，可以使用 `ALTER DATABASE CURRENT SET QUERY_STORE = ON` 语句。查询存储一旦启用，便会开始收集查询计划与性能数据，你可以通过查询存储目录视图来分析这些数据。信息在编译和执行后立即可用。


    你可以主动分析收集到的信息，以了解应用程序中查询性能的变化；也可以在遇到性能问题时，进行事后分析。查看存储的不同指标后（这些指标与 `sys.dm_exec_query_stats`
    动态管理视图中存储的指标非常相似），你就可以决定针对特定指标进行优化，例如查询持续时间、CPU 时间、逻辑 IO 读取、逻辑 IO 写入、物理读取等。一旦识别出问题，你可以使用传统的查询调优技术来尝试解决，或者使用查询存储来强制使用之前的某个计划。该计划必须已被查询存储捕获才能被强制使用，这显然意味着它是一个有效的计划（或至少在收集时是有效的——稍后会详细说明），并且它之前是由查询优化器生成的。要强制计划，你需要同时知道
    `plan_id` 和 `query_id`，这可以在 `sys.query_store_plan` 目录视图中找到。从技术上讲，你也可以不使用查询存储，而是通过计划指南来强制计划，但这会更复杂，并且你首先仍需要手动收集和找到所需的计划。


    即使查询存储处于禁用状态，你也可以通过运行以下语句来查询其当前配置值：


    ```sql

    SELECT * FROM sys.database_query_store_options

    ```


    这将返回以下数据：


    | `desired_state` | 0 |

    | --- | --- |

    | `desired_state_desc` | OFF |

    | `actual_state` | 0 |

    | `actual_state_desc` | OFF |

    | `readonly_reason` | 0 |

    | `current_storage_size_mb` | 0 |

    | `flush_interval_seconds` | 900 |

    | `interval_length_minutes` | 60 |

    | `max_storage_size_mb` | 100 |

    | `stale_query_threshold_days` | 30 |

    | `max_plans_per_query` | 200 |

    | `query_capture_mode` | 1 |

    | `query_capture_mode_desc` | ALL |

    | `size_based_cleanup_mode` | 1 |

    | `size_based_cleanup_mode_desc` | AUTO |


    要在 AdventureWorks2017 数据库上启用查询存储，请使用以下语句：


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE = ON

    ```


    注意


    初始还原 AdventureWorks2017 数据库时，查询存储可能已经处于启用状态。


    启用查询存储后，只有状态会发生改变。所有其他默认值将保持不变。你也可以在启用查询存储时更改一个或多个配置值，如下文所示。如果再次显示 `sys.database_query_store_options`
    目录视图，你会看到 `desired_state` 和 `actual_state` 列现在的值都是 2，并且 `desired_state_desc` 和
    `actual_state_desc` 已切换为 `READ_WRITE`。这两个状态用于区分用户显式设置的期望操作模式与实际或真实状态。当这两个值不同时，最常见的情况是请求了
    `READ_WRITE` 模式，但查询存储由于磁盘空间不足而自动切换到了 `READ_ONLY` 模式。


    或者，你也可以使用 SQL Server Management Studio 执行相同的操作。右键单击你的数据库并选择“属性”。然后选择“查询存储”页。在“常规”的“操作模式（请求）”中，选择“读写”。请记住，使用
    SQL Server Management Studio 时，会默认填充多个值，但你可以更改其中任何值，完成后单击“确定”。查询存储页面如图 6-4 所示。


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig4_HTML.jpg](img/393702_2_En_6_Fig4_HTML.jpg)


    图 6-4. 查询存储配置


    默认情况下，以下语句和值将被发送到 SQL Server：


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE = ON

    GO

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE (OPERATION_MODE = READ_WRITE,
    CLEANUP_POLICY = (STALE_QUERY_THRESHOLD_DAYS = 367), DATA_FLUSH_INTERVAL_SECONDS
    = 900, INTERVAL_LENGTH_MINUTES = 60, MAX_STORAGE_SIZE_MB = 100, QUERY_CAPTURE_MODE
    = ALL, SIZE_BASED_CLEANUP_MODE = OFF)

    GO

    ```


    注意


    你总是可以通过使用 SQL Trace 或 Extended Events 来捕获 SQL Server Management Studio 或其他工具发送的语句。你甚至可以捕获
    Profiler 和 Extended Events GUI 本身发送的语句！


    查询存储的默认选项对于快速入门来说是合适的，但你应该根据你的工作负荷和性能故障排除需求来更新其中一些选项。初次配置后，你可以监控查询存储随时间推移的表现，并相应地调整其配置。如你所见，`MAX_STORAGE_SIZE_MB`
    仅为 100 MB，因此这可能是你首先想要更改或最初就配置为更高值（根据你的需要）的设置。`MAX_STORAGE_SIZE_MB` 是在数据库内为查询存储分配的磁盘空间。如果你不确定，可以至少从
    1024 MB 或更大的值开始，但需要相应地监控磁盘空间使用情况，因为数据收集将取决于你系统的工作负荷和活动。不幸的是，如果分配的空间已满，查询存储将直接停止收集新数据，不会发出通知，并会静默切换到
    `READ_ONLY` 状态，这意味着它将不再收集有关你查询的任何额外信息。你可以使用以下查询监控此状态：


    ```sql

    SELECT actual_state_desc, desired_state_desc, current_storage_size_mb,

    max_storage_size_mb, readonly_reason

    FROM sys.database_query_store_options

    ```


    在我的测试中，我曾短暂地超过了为配置大小分配的空间而没有出现问题，因为看起来空间使用情况并未进行实时验证。它只是在一段时间后才进入 `READ_ONLY`
    状态，如下列配置值所示：


    | `actual_state_desc` | `READ_ONLY` |

    | --- | --- |

    | `desired_state_desc` | `READ_WRITE` |

    | `current_storage_size_mb` | 4 |

    | `max_storage_size_mb` | 1 |

    | `readonly_reason` | 65536 |


    目前，目录视图不显示 `readonly_reason` 的描述，但文档显示 65536 表示查询存储已达到 `MAX_STORAGE_SIZE_MB` 选项设置的大小限制。文档错误地指出，在扩展
    `MAX_STORAGE_SIZE_MB` 值后，你需要将状态更改回 `READ_WRITE`，但我的测试表明无需这样做。扩展 `MAX_STORAGE_SIZE_MB`
    将自动使查询存储返回到 `READ_WRITE` 状态：


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE (MAX_STORAGE_SIZE_MB = 2048)

    ```


    请记住，虽然你可以更改查询存储的大小，但其内部表始终存储在数据库的主文件组中，目前无法更改。或者，你可以激活查询捕获和清理策略来控制磁盘空间的使用，如下文所述。


    如前面 SQL Server Management Studio 生成的代码所示，你可以使用以下语法一次更改多个属性，并用逗号分隔：


    ```sql

    ALTER DATABASE database_name SET QUERY_STORE ( [,... n])

    ```


    如果你需要清空查询存储数据，可以单击查询存储页面上的“清除查询数据”按钮，如前文图 6-4 所示。这将发送以下语句，你也可以直接键入该语句以获得相同的结果：


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    ```

