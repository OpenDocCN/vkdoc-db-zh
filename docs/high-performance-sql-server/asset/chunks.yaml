- fmt: "## In-Memory OLTP\n\n在论文《OLTP Through the Looking Glass, and What We Found\
    \ There》中，Michael Stonebraker 等人使用一个开源数据库进行研究，展示了现代数据库系统中查询执行时间的分布情况。他们的结果表明，对于该特定的数据库系统，查询执行时间主要由缓冲区管理器、锁存、锁定和日志记录等组件主导，分别占执行时间的\
    \ 34.6%、14.2%、16.3% 和 11.9%。这四个领域大约占执行时间的 77%。\n\n**注意**  \n《OLTP Through the\
    \ Looking Glass, and What We Found There》这篇论文是推荐阅读材料。你可以在线找到它：[`http://nms.csail.mit.edu/~stavros/pubs/OLTP_sigmod08.pdf`](http://nms.csail.mit.edu/%257Estavros/pubs/OLTP_sigmod08.pdf)。\n\
    \nSQL Server 性能工程团队进行了一项类似的分析，展示了在 SQL Server OLTP 系统中时间占查询执行总时间的百分比分布。他们的分析结果同样有趣，表明通信栈占用了总查询执行时间的\
    \ 10%。I/O 和线程管理又占了 10%，而存储引擎（包括访问方法、事务、锁和日志管理器）使用了 45%。最后，查询处理器占用了总执行时间的 35%。理解\
    \ OLTP 系统中的时间分布是他们研究的关键部分，这使他们能够专注于数据库系统中那些有更多优化机会的组件。\n\nHekaton 是一个为 OLTP 工作负载设计的内存优化引擎，它受益于当前硬件，并旨在最小化在之前列出的一些组件上花费的查询执行时间。内存\
    \ OLTP 通过以下特性实现更好的性能：\n\n*   **内存优化引擎**：数据始终位于内存中，并且 Hekaton 引擎的数据结构和算法针对内存访问进行了优化。新结构包括内存优化的非聚集索引和哈希索引。\n\
    *   **多版本并发控制和乐观并发**：消除了锁和锁存器，因此不再有对锁存器和自旋锁的争用、用户等待锁或阻塞。与 SQL Server 2005 中引入的快照隔离级别类似，Hekaton\
    \ 引擎使用版本控制，尽管其版本存储在内存中而非 `tempdb` 数据库中。\n*   **本机代码**：查询优化器仍用于生成执行计划，但此计划还会被翻译成\
    \ C 代码，编译成 DLL，并加载到内存中。本机代码比传统的解释式查询计划执行得更快。\n\nHekaton 随 SQL Server 2014 发布，并且与列存储索引类似，它最初存在相当多的限制。主要限制是表创建后无法以任何方式更改。无法添加或删除列或索引，也无法更改其任何属性。从\
    \ SQL Server 2016 开始，可以对内存优化表使用 `ALTER TABLE` 来更改大多数表属性。但与传统的基于磁盘的表类似，你仍然希望从一开始就以最佳方式设计内存优化表，因为在生产后进行更改可能需要维护窗口，并可能导致数据库停机。\n\
    \n内存优化的数据结构目前包括表和表变量，而本机编译的模块包括存储过程、触发器以及标量和表值用户定义函数。这些内存优化的数据结构是使用新的 `MEMORY_OPTIMIZED`\
    \ 和 `NATIVE_COMPILATION` 子句定义的。与传统的数据库引擎存储结构不同，内存优化的数据不存储在数据页中。行始终在内存中，表至少需要一个索引。在\
    \ Hekaton 中，表必须完全适合内存，并且其所有数据始终在内存中。但是，你不必将整个数据库移到内存中，可以选择要迁移数据库中的哪些表。你还可以选择哪些存储过程要迁移到本机编译形式。\n\
    \n尽管列存储索引和 Hekaton 都是内存技术，但 Hekaton 的三个性能优势都不直接适用于列存储索引，因为它们用于不同的工作负载并且具有不同的架构。列存储索引中仍然持有锁和锁存器，它们也不实现本机编译代码。列存储索引的性能优势更多地与其基于列的存储、高压缩率和批处理执行算法有关。列存储索引将在下一节中介绍。\n\
    \n**注意**  \n尽管列存储索引和 Hekaton 都是内存技术，但只有后者要求表完全适合内存。列存储索引通常用于非常大的表，不要求完全适合内存。\n\
    \n有趣的是，在 SQL Server 2012 发布后几天，微软技术院士 David Campbell 在他的论文《The Coming In-Memory\
    \ Database Tipping Point》中暗示了将为事务工作负载推出新的内存引擎，这也是一篇推荐阅读材料。你可以在以下网址找到它：[`https://blogs.technet.microsoft.com/dataplatforminsider/2012/04/09/the-coming-in-memory-database-tipping-point`](https://blogs.technet.microsoft.com/dataplatforminsider/2012/04/09/the-coming-in-memory-database-tipping-point)。同年晚些时候在西雅图的一次会议上，Hekaton\
    \ 被正式宣布。\n\n### 初始版本后的增强功能\n\n从 SQL Server 2016 开始，内存 OLTP 现在能够使用 `ALTER TABLE`\
    \ 和 `ALTER PROCEDURE` 语句来更改表和本机过程。\n\nHekaton 的原始版本在内存方面还有一个严重限制，即数据库中所有表的总内存大小不应超过\
    \ 256 GB。随着 SQL Server 2016 的发布，此限制最初扩展到 2 TB，并且不是一个严格的硬性限制，而是一个支持限制。在 SQL Server\
    \ 2016 RTM 发布几周后，微软宣布正在取消此类限制，并支持操作系统可用的任意内存量。\n\n现在表扫描操作可以并行执行。虽然对于纯 OLTP 工作负载来说这不是一个大要求，但它现在可以使操作分析查询受益，如本章后面所述。\n\
    \n查询优化器使用的统计信息现在会自动更新，就像基于磁盘的表一样。你现在也可以在手动更新统计信息时指定采样方法，因为在 SQL Server 2014 中，`FULLSCAN`\
    \ 是唯一可用的选择。然而，更新后的统计信息不会像传统存储过程那样立即使本机编译模块受益。也就是说，无论是手动还是自动更新统计信息，都不会触发本机编译模块的新优化。你将必须手动重新编译它们，例如，使用\
    \ `sp_recompile` 系统存储过程。\n\n最后，从 SQL Server 2017 开始，Hekaton 移除了每个表或表类型最多八个索引的原始限制。虽然你现在可以定义任意数量的索引，但适用于基于磁盘的表的相同建议仍然适用，你应该只定义真正需要的索引。"
  raw: '## In-Memory OLTP


    In the paper “OLTP Through the Looking Glass, and What We Found There,” Michael
    Stonebraker et. al researched with an open source database to show where query
    execution time is spent in modern database systems. Their results showed that
    for this particular database system, the query execution time is dominated by
    components such as the buffer manager, latching, locking, and logging, comprising
    34.6%, 14.2%, 16.3%, and 11.9% of the execution time, respectively. These four
    areas make about 77% of the execution time.


    Note


    The “OLTP Through the Looking Glass, and What We Found Their” paper is a recommended
    reading. You can find it online at [`http://nms.csail.mit.edu/~stavros/pubs/OLTP_sigmod08.pdf`](http://nms.csail.mit.edu/%257Estavros/pubs/OLTP_sigmod08.pdf).


    The SQL Server performance engineering team performed a similar analysis that
    showed where time is spent in a SQL Server OLTP system as a percentage of the
    total query execution. The results of their analysis were similarly interesting,
    indicating that the communication stack used 10% of the total query execution
    time. I/O and thread management accounted for another 10%, while the storage engine
    including access methods, transaction, lock, and log managers used 45%. Finally,
    the query processor accounted for 35% of the total time used in execution. Understanding
    where time is spent in an OLTP system was a critical part of their research, which
    allowed them to focus on the components of a database system that has more opportunity
    for additional optimizations.


    Hekaton is a memory-optimized engine for OLTP workloads that benefits from current
    hardware and was designed to minimize the query execution time spent on some of
    the previously listed components. In-Memory OLTP achieves better performance with
    the following features:


    *   Memory-optimized engine: Data is always in memory, and the Hekaton engine
    data structures and algorithms are optimized for memory access. New structures
    include memory-optimized nonclustered indexes and hash indexes.


    *   Multiversion concurrency control and optimistic concurrency: Locks and latches
    are eliminated so we no longer have contention for latches and spinlocks, user
    waits for locks, or blocking. Similar to the snapshot isolation level introduced
    with SQL Server 2005, the Hekaton engine uses versioning, although its versions
    are stored in memory instead of the `tempdb` database.


    *   Native code: The query optimizer is still used to produce an execution plan,
    but this plan is additionally translated into C code, compiled into a DLL, and
    loaded in memory. Native code executes faster than traditional interpreted query
    plans.


    Hekaton was released with SQL Server 2014, and, similar to columnstore indexes,
    it started with a considerable number of limitations. The main limitation was
    that after a table was created, it could not be changed in any way. It was not
    possible to add or remove columns or indexes or change any of its properties.
    `ALTER TABLE` can now be used with memory-optimized tables starting with SQL Server
    2016 to change most of the table properties. But similar to the traditional disk-based
    tables, you still want to design your memory-optimized tables in the best possible
    way from the beginning since performing changes after production may require a
    maintenance window with potentially database downtime.


    Memory-optimized data structures currently include tables and table variables,
    while natively compiled modules include stored procedures, triggers, and scalar
    and table-valued user-defined functions. These memory-optimized data structures
    are defined using the new `MEMORY_OPTIMIZED` and `NATIVE_COMPILATION` clauses
    . Memory-optimized data is not stored in data pages unlike traditional database
    engine storage structures. Rows are always in memory, and tables require at least
    one index. In Hekaton, tables must fit entirely in memory, and all its data is
    always in memory all the time. However, you do not have to move the entire database
    to memory, and you can select which tables of a database to be migrated. You can
    also choose which stored procedures to migrate to natively compiled form.


    Even though both columnstore indexes and Hekaton are in-memory technologies, none
    of the three performance benefits of Hekaton directly apply to columnstore indexes
    as they are used in different workloads and have different architecture. Locks
    and latches are still held in columnstore indexes, and they do not implement natively
    compiled code. Performance benefits of columnstore indexes are more related to
    their column-based storage, high compression, and batch processing execution algorithms.
    Columnstore indexes are covered in the next section.


    Note


    Although both columnstore indexes and Hekaton are in-memory technologies, only
    the latter requires a table to entirely fit in memory. Columnstore indexes are
    usually used for very large tables and are not required to fit entirely in memory.


    Interestingly, just a few days after SQL Server 2012 was released, Microsoft’s
    technical fellow David Campbell hinted about a new in-memory engine for transactional
    workloads in his paper “The Coming In-Memory Database Tipping Point,” which is
    a recommended reading. You can find it at [`https://blogs.technet.microsoft.com/dataplatforminsider/2012/04/09/the-coming-in-memory-database-tipping-point`](https://blogs.technet.microsoft.com/dataplatforminsider/2012/04/09/the-coming-in-memory-database-tipping-point).
    Hekaton was publicly announced later that same year at a conference in Seattle.


    ### Enhancements After the Initial Release


    Starting with SQL Server 2016, In-Memory OLTP now includes the ability to change
    tables and native procedures by using the `ALTER TABLE` and `ALTER PROCEDURE`
    statements.


    The original version of Hekaton also had a serious limitation regarding memory
    as the total in-memory size of all the tables in a database should not exceed
    256 GB. With the SQL Server 2016 release, this limit was originally extended to
    2 TB and was not exactly a hard limit but a supported limit. Weeks after SQL Server
    2016 RTM was released, Microsoft announced it was removing such limits and supporting
    any amount of memory available by the operating system.


    Parallelism is now possible with table scan operations. Although not a big requirement
    for pure OLTP workloads, it can now benefit operational analytic queries, as covered
    later in this chapter.


    Statistics used by the query optimizer are now automatically updated, as is the
    case with disk-based tables. You can now also specify a sample when manually updating
    statistics, as `FULLSCAN` was the only choice available in SQL Server 2014\. However,
    updated statistics do not immediately benefit natively compiled modules in the
    same way they do with traditional stored procedures. That is, an update of statistics,
    either manual or automatic, does not trigger a new optimization on natively compiled
    modules. You will have to manually recompile them, for example, using the `sp_recompile`
    system stored procedure.


    Finally, starting with SQL Server 2017, Hekaton has removed the original limitation
    of a maximum of eight indexes per table or table type. Although you can now define
    as many indexes as you like, the same recommendation for disk-based tables applies,
    and you should only define the indexes that are really needed.'
