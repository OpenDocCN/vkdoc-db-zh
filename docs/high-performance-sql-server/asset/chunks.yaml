    DECLARE @ts_now bigint;

    SELECT @ts_now=cpu_ticks/(cpu_ticks/ms_ticks)

    FROM sys.dm_os_sys_info;

    SELECT record_id,

    DATEADD(ms, -1 * (@ts_now - [timestamp]), GETDATE()) as event_time,

    CASE

    WHEN event = 0 THEN ''Allocation Cache Init''

    WHEN event = 1 THEN ''Allocation Cache Add Entry''

    WHEN event = 2 THEN ''Allocation Cache RMV Entry''

    WHEN event = 3 THEN ''Allocation Cache Reinit''

    WHEN event = 4 THEN ''Allocation Cache Free''

    WHEN event = 5 THEN ''Truncate Allocation Unit''

    WHEN event = 10 THEN ''PFS Alloc Page''

    WHEN event = 11 THEN ''PFS Dealloc Page''

    WHEN event = 20 THEN ''IAM Set Bit''

    WHEN event = 21 THEN ''IAM Clear Bit''

    WHEN event = 22 THEN ''GAM Set Bit''

    WHEN event = 23 THEN ''GAM Clear Bit''

    WHEN event = 24 THEN ''SGAM Set Bit''

    WHEN event = 25 THEN ''SGAM Clear Bit''

    WHEN event = 26 THEN ''SGAM Set Bit NX''

    WHEN event = 27 THEN ''SGAM Clear Bit NX''

    WHEN event = 28 THEN ''GAM Zap Extent''

    WHEN event = 40 THEN ''Format IAM Page''

    WHEN event = 41 THEN ''Format Page''

    WHEN event = 42 THEN ''Reassign IAM Page''

    WHEN event = 50 THEN ''Worktable Cache Add IAM''

    WHEN event = 51 THEN ''Worktable Cache Add Page''

    WHEN event = 52 THEN ''Worktable Cache RMV IAM''

    WHEN event = 53 THEN ''Worktable Cache RMV Page''

    WHEN event = 61 THEN ''IAM Cache Destroy''

    WHEN event = 62 THEN ''IAM Cache Add Page''

    WHEN event = 63 THEN ''IAM Cache Refresh Requested''

    ELSE ''Unknown Event''

    END as event_name,

    session_id as s_id,

    page_id,

    allocation_unit_id as au_id

    FROM

    (

    SELECT

    xml:record.value(''(./Record/@id)[1]'', ''int'') AS record_id,

    xml:record.value(''(./Record/ALLOC/Event)[1]'', ''int'') AS event,

    xml:record.value(''(./Record/ALLOC/SpId)[1]'', ''int'') AS session_id,

    xml:record.value(''(./Record/ALLOC/PageId)[1]'', ''varchar(100)'') AS page_id,

    xml:record.value(''(./Record/ALLOC/AuId)[1]'', ''varchar(100)'') AS allocation_unit_id,

    timestamp

    FROM

    (

    SELECT timestamp, convert(xml, record) as xml:record

    FROM sys.dm_os_ring_buffers

    WHERE ring_buffer_type = N''RING_BUFFER_ALLOC_TRACE''

    ) AS the_record

    ) AS ring_buffer_record

    -- WHERE session_id = 52

    ORDER BY record_id

    ```


    In addition to the DMVs and views covered earlier, you could use also extended
    events to capture and monitor events related to contention on latches on allocation
    pages. An obvious benefit of tracing events is that you don’t have to be looking
    at the moment the problem is happening as the information can be collected for
    you to review later. The following events are available:


    *   `latch_suspend_begin`: Occurs when an executing task must suspend while waiting
    for a latch to become available in the requested mode


    *   `latch_suspend_end`: Occurs when the executing task is resumed after waiting
    for a latch


    *   `latch_suspend_warning`: Occurs when there is a timeout waiting for a latch
    possibly causing performance problems


    Some of the interesting fields you can see by capturing these events are the following:


    *   `address`: The memory address where the latch resides


    *   `database_id`: The database ID of the page the latch protects


    *   `duration`: The amount of time in microseconds that the requestor waited for
    the latch (not available on `latch_suspend_begin`)


    *   `file_id`: The file ID of the page the latch protects


    *   `is_superlatch`: Indicates if the latch is a super latch


    *   `mode`: The mode of the latch request


    *   `page_id`: The page ID of the page the latch protects


    For example, the following code creates a session for the extended events related
    to latches. Notice we are filtering for `database_id` 2 and `page_id` 1 and 3.


    ```

    CREATE EVENT SESSION [test] ON SERVER

    ADD EVENT sqlserver.latch_suspend_begin (

    WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

    ),

    ADD EVENT sqlserver.latch_suspend_end (

    WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

    ),

    ADD EVENT sqlserver.latch_suspend_warning (

    WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

    )

    GO

    ```


    Once the session has been created, you can start it by running the following code:


    ```

    ALTER EVENT SESSION [test] ON SERVER

    STATE = START

    GO

    ```


    The following is a sample of one captured data event for `latch_suspend_end` ,
    showing contention. You can easily see the events using the Watch Live Data feature
    (which you can find on SQL Server Management Studio, looking at the Management
    folder ➤ Extended Events ➤ Sessions, right-clicking your active session, and selecting
    Watch Live Data).


    | `address` | 513679079488 |

    | --- | --- |

    | `database_id` | 2 |

    | `duration` | 42990 |

    | `file_id` | 1 |

    | `is_superlatch` | False |

    | `mode` | UP |

    | `page_id` | 1 |


    Finally, don''t forget to close and drop the session to finish this exercise:


    ```

    ALTER EVENT SESSION [test] ON SERVER

    STATE = STOP

    GO

    DROP EVENT SESSION [test] ON SERVER

    GO

    ```


    ## DDL Contention


    It is worth clarifying that the contention of allocating pages discussed in this
    section is sometimes referred to as DML contention, as it is mostly due to `INSERT`,
    `UPDATE`, and `DELETE` operations on temporary tables. This would be different,
    for example, from DDL contention, which can also happen in `tempdb` but is certainly
    less common than DML contention, and relates to the contention on the system catalogs
    needed to record information about the user-created objects. To see if you have
    DDL contention in `tempdb`, you can use the same methods described earlier for
    DML contention, but, instead of looking at contention of the allocation pages,
    you may see contention on pages belonging to the system catalog tables. Unfortunately,
    fixing DDL contention would require minimizing the number of user objects created
    and dropped in `tempdb`.'
