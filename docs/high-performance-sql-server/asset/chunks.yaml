    this plan has failed. Remember that this value shows optimization attempts and
    not query executions. The results also show that the `last_force_failure_reason`
    is 8712 and `last_force_failure_reason_desc NO_INDEX`, which were expected as
    documented at the beginning of this section. But if you enable or rebuild the
    index, the plan will continue to be forced. Run the following statement:


    ```

    ALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail REBUILD

    ```


    The forced plan will be used again by the query processor, and the values for
    `force_failure_count`, `last_force_failure_reason`, and `last_force_failure_reason_desc`
    on the `sys.query_store_plan` catalog will be reset to 0, 0, and NONE, respectively
    .


    ## Wait Statistics


    As mentioned in the previous chapter, starting with SQL Server 2016, it is now
    possible to track wait statistics at the session or query level, by using the
    sys.dm_exec_session_wait_stats DMV. Obviously, I am talking at the database engine
    level. Even when the Query Store was released during the same version, collecting
    wait information on the Query Store was not implemented until SQL Server 2017\.
    This feature was without a doubt the most important improvement to the Query Store
    since the original release.


    Wait statistics are enabled by default in the Query Store. For example, you can
    create a new database and, without enabling the Query Store, take a look at the
    sys.database_query_store_options to verify that wait_stats_capture_on is enabled.
    So if you enable the Query Store, the wait statistics feature will be automatically
    enabled along with it.


    You can also explicitly enable wait statistics by running the following statement:


    ```

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE (WAIT_STATS_CAPTURE_MODE = ON)

    ```


    In a similar way, you can disable the feature using the same statement with WAIT_STATS_CAPTURE_MODE
    = OFF.


    Wait types in the Query Store are grouped into wait categories, in a similar way
    as the data collection feature, as shown in Figure 5-3 in Chapter [5](#393702_2_En_5_Chapter.xhtml).
    Let us try a quick exercise to see how the feature works. After making sure the
    wait statistics feature is enabled, try running some expensive queries. A simple
    example could be running the following SELECT statements ten times each:


    ```

    SELECT * FROM Person.Person

    GO 10

    SELECT * FROM Sales.SalesOrderDetail

    GO 10

    ```


    You can immediately access the wait information after the queries are completed.
    In order to do that, you can use SQL Server Management Studio and run the Query
    Wait Statistics report from the Query Store folder. You may see a report similar
    to what I show in Figure [6-8](#393702_2_En_6_Chapter.xhtml#Fig8). The graph is
    based on the “wait category” metric, but you can change it to other choices such
    as avg wait time, min wait time, max wait time, std dev wait time, total wait
    time, or execution count. My example shows our two queries, called Query ID 1
    and 2, including their wait information.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig8_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Query Store wait statistics


    Clicking any wait category will take us to a second screen where we can see the
    wait information per query, including any available execution plans, as you can
    see in Figure [6-9](#393702_2_En_6_Chapter.xhtml#Fig9).


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig9_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Query wait statistics


    Finally, as mentioned earlier, waits are grouped in categories, instead of listing
    a particular wait such as CXPACKET or ASYNC_NETWORK_IO. For example, all the LCK_M_%
    waits are grouped in the Lock category, all LATCH_% into the Latch category, PAGELATCH_%
    into Buffer Latch, PAGEIOLATCH_% into Buffer IO, CXPACKET and others into Parallelism,
    ASYNC_NETWORK_IO and others into Network IO, and SOS_SCHEDULER_YIELD alone is
    listed as CPU, just to list the most common ones we usually see. You can see the
    entire list by looking at sys.query_store_wait_stats in the documentation. You
    can also see more details about waits in Chapter [5](#393702_2_En_5_Chapter.xhtml).'
  trans: '

    ## 强制失败


    如前所述，强制执行计划应是在研究和实施长期解决方案期间的一种临时措施。与使用查询提示的情况类似，强制计划也应受到监控，因为在数据库发生变更后，其性能可能会下降。此外，SQL
    Server 也可能无法强制执行指定的计划。查询存储通过 `sys.query_store_plan` 目录视图的 `last_force_failure_reason`
    和 `last_force_failure_reason_desc` 列提供有关强制计划失败的信息。这些列的文档记录值如下：


    *   8637: `ONLINE_INDEX_BUILD`：当目标表有一个正在联机构建的索引时，查询尝试修改数据。

    *   8683: `INVALID_STARJOIN`：计划包含无效的星型连接规范。

    *   8684: `TIME_OUT`：优化器在搜索强制计划指定的计划时，超出了允许的操作数。

    *   8689: `NO_DB`：计划中指定的某个数据库不存在。

    *   8690: `HINT_CONFLICT`：由于计划与查询提示冲突，查询无法编译。

    *   8694: `DQ_NO_FORCING_SUPPORTED`：由于计划与分布式查询或全文检索操作的使用冲突，无法执行查询。

    *   8698: `NO_PLAN`：查询处理器无法生成查询计划，因为无法验证强制计划对查询是否合法。

    *   8712: `NO_INDEX`：计划中指定的索引不再存在。

    *   8713: `VIEW_COMPILE_FAILED`：由于计划中引用的索引视图存在问题，无法强制查询计划。

    *   <其他值>: `GENERAL_FAILURE`：一般性强制错误（未涵盖在上述原因中）。


    一个展示此功能的简单示例是，禁用强制计划中正在使用的一个现有索引。首先，清空查询存储和计划缓存：


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    GO

    DBCC FREEPROCCACHE

    ```


    通过运行以下代码创建强制执行的计划（假定该存储过程已如之前所示创建）：


    ```sql

    EXEC test @pid = 898

    ```


    仅为此练习的目的，假定你可能至少有另一个计划，并且希望强制使用带有索引查找操作符的那个计划。运行以下查询以获取其 `plan_id`：


    ```sql

    SELECT plan_id, q.query_id, query_sql_text FROM sys.query_store_plan p

    JOIN sys.query_store_query AS q

    ON p.query_id = q.query_id

    JOIN sys.query_store_query_text qt

    ON q.query_text_id = qt.query_text_id

    WHERE query_sql_text LIKE ''%SELECT * FROM Sales.SalesOrderDetail%''

    ```


    检查结果，找到查询文本 `“(@pid int)SELECT * FROM Sales.SalesOrderDetail WHERE ProductID =
    @pid”`。获取 `query_id` 和 `plan_id` 值。在我的例子中，`query_id` 是 1，`plan_id` 是 1。运行以下命令以强制所需的计划：


    ```sql

    EXEC sys.sp_query_store_force_plan @query_id = 1, @plan_id = 1

    ```


    你也可以选择如前所述在 SQL Server Management Studio 中执行此过程。验证查询是否运行，是否使用了带有索引查找的计划，并且执行计划中的
    `Use Plan` 属性是否设置为 true。最后，禁用该索引：


    ```sql

    ALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail DISABLE

    ```


    如果你再次运行查询，强制计划将会失败，因为该计划所使用的索引不再可用。你将得到一个正常的查询优化和一个使用表扫描的计划。以下查询（首先将 `plan_id`
    更新为你之前使用的值）


    ```sql

    SELECT * FROM sys.query_store_plan

    WHERE plan_id = 1

    ```


    将返回 `force_failure_count` 为 1，这是强制此计划失败的次数。请记住，此值显示的是优化尝试次数，而非查询执行次数。结果还显示 `last_force_failure_reason`
    为 8712，`last_force_failure_reason_desc` 为 `NO_INDEX`，这与本节开头的文档记录一致。但是，如果你启用或重建索引，计划将继续被强制执行。运行以下语句：


    ```sql

    ALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail REBUILD

    ```


    查询处理器将再次使用该强制计划，并且 `sys.query_store_plan` 目录中的 `force_failure_count`、`last_force_failure_reason`
    和 `last_force_failure_reason_desc` 的值将分别重置为 0、0 和 NONE。


    ## 等待统计


    如前一章所述，从 SQL Server 2016 开始，可以通过使用 `sys.dm_exec_session_wait_stats` DMV 在会话或查询级别跟踪等待统计信息。显然，我指的是数据库引擎级别。尽管查询存储在同一版本中发布，但在
    SQL Server 2017 中才实现了在查询存储中收集等待信息的功能。毫无疑问，此功能是查询存储自最初发布以来最重要的改进。


    等待统计在查询存储中默认是启用的。例如，你可以创建一个新数据库，并在不启用查询存储的情况下，查看 `sys.database_query_store_options`
    以确认 `wait_stats_capture_on` 已启用。因此，如果你启用了查询存储，等待统计功能将随之自动启用。


    你也可以通过运行以下语句显式启用等待统计：


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE (WAIT_STATS_CAPTURE_MODE = ON)

    ```


    类似地，你可以使用 `WAIT_STATS_CAPTURE_MODE = OFF` 的相同语句来禁用该功能。


    查询存储中的等待类型被分组到等待类别中，其方式类似于第 5 章图 5-3 所示的数据收集功能。让我们尝试一个快速练习，看看此功能如何工作。在确保等待统计功能已启用后，尝试运行一些开销较大的查询。一个简单的例子是运行以下
    SELECT 语句各十次：


    ```sql

    SELECT * FROM Person.Person

    GO 10

    SELECT * FROM Sales.SalesOrderDetail

    GO 10

    ```


    查询完成后，你可以立即访问等待信息。为此，你可以使用 SQL Server Management Studio 并从查询存储文件夹运行“查询等待统计信息”报告。你可能会看到一个类似于我在图
    6-8 中展示的报告。该图基于“等待类别”指标，但你可以将其更改为其他选择，如平均等待时间、最小等待时间、最大等待时间、等待时间标准差、总等待时间或执行计数。我的示例显示了我们的两个查询，称为查询
    ID 1 和 2，包括它们的等待信息。


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig8_HTML.jpg](img/393702_2_En_6_Fig8_HTML.jpg)


    图 6-8 查询存储等待统计信息


    单击任何等待类别将带我们进入第二个屏幕，在那里我们可以看到每个查询的等待信息，包括任何可用的执行计划，如图 6-9 所见。


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig9_HTML.jpg](img/393702_2_En_6_Fig9_HTML.jpg)


    图 6-9 查询等待统计信息


    最后，如前所述，等待被分组到类别中，而不是列出像 `CXPACKET` 或 `ASYNC_NETWORK_IO` 这样的特定等待。例如，所有 `LCK_M_%`
    等待被分组到“锁”类别，所有 `LATCH_%` 分组到“闩锁”类别，`PAGELATCH_%` 分组到“缓冲区闩锁”，`PAGEIOLATCH_%` 分组到“缓冲区
    I/O”，`CXPACKET` 和其他一些分组到“并行”，`ASYNC_NETWORK_IO` 和其他一些分组到“网络 I/O”，而 `SOS_SCHEDULER_YIELD`
    单独列为“CPU”，这仅列举了我们通常看到的最常见的一些。你可以通过查看文档中的 `sys.query_store_wait_stats` 来查看完整列表。你也可以在第
    5 章中看到有关等待的更多详细信息。

    '
- fmt: '## Catalog Views


    Finally, although we have used some of the Query Store catalog views already,
    let’s review them all in this section. As mentioned, the collected data is persisted
    on disk and stored in the user database where the Query Store is enabled. The
    Query Store catalog views are shown in Figure 6-10 and contain the following views.


    | View Name | Description |

    | --- | --- |

    | `sys.query_store_query_text` | Query text information |

    | `sys.query_store_query` | Query information, including query hash, parameterization,
    compilation, and optimization information |

    | `sys.query_store_plan` | Execution plans, including history |

    | `sys.query_store_runtime_stats` | Query runtime statistics. The Query Store
    stores aggregate statistics on an interval for every executed plan. The interval
    is defined by the configuration option `INTERVAL_LENGTH_MINUTES` |

    | `sys.query_store_runtime_stats_interval` | Start and end time for intervals
    |

    | `sys.query_context_settings` | Query context settings information |


    ![Query Store catalog views](images/393702_2_En_6_Chapter/393702_2_En_6_Fig10_HTML.jpg)


    **Figure 6-10** Query Store catalog views


    The collected data is only captured when the query execution ends (including when
    a query is canceled or interrupted as shown earlier). The `query_hash` column
    of the `sys.query_store_query` catalog view is the MD5 hash of the individual
    query, based on the logical query tree, and it also includes optimizer hints.
    Also, as indicated earlier, an identical query will be considered distinct if
    used in an ad hoc query or in a stored procedure or in a different stored procedure.


    Queries with different context settings, that is, using different plan-affecting
    SET options, are considered distinct. Plan-affecting SET options can impact the
    choice of an execution plan, as they affect things like the results of evaluating
    constant expressions during the optimization process. The plan-affecting SET options
    are the following:


    - `ANSI_NULL_DFLT_OFF`

    - `ANSI_NULL_DFLT_ON`

    - `ANSI_NULLS`

    - `ANSI_PADDING`

    - `ANSI_WARNINGS`

    - `ARITHABORT`

    - `CONCAT_NULL_YIELDS_NULL`

    - `DATEFIRST`

    - `DATEFORMAT`

    - `FORCEPLAN`

    - `LANGUAGE`

    - `NO_BROWSETABLE`

    - `NUMERIC_ROUNDABORT`

    - `QUOTED_IDENTIFIER`


    You can find more information about the plan-affecting SET options by reading
    the Microsoft white paper “Plan Caching in SQL Server 2008” at [https://msdn.microsoft.com/en-us/library/ee343986(v=sql.100).aspx](https://msdn.microsoft.com/en-us/library/ee343986(v=sql.100).aspx).


    Finally, in addition to `sp_query_store_force_plan` and `sp_query_store_unforce_plan`,
    covered earlier, the Query Store provides the following stored procedures:


    - `sp_query_store_remove_query`: Removes a query, as well as all its associated
    plans and runtime statistics from the Query Store

    - `sp_query_store_remove_plan`: Removes a specific plan from the Query Store

    - `sp_query_store_reset_exec_stats`: Clears the runtime statistics for a specific
    query plan from the Query Store

    - `sp_query_store_flush_db`: Flushes the in-memory portion of the Query Store
    data to disk


    ## Live Query Statistics


    Live Query Statistics is another query troubleshooting feature introduced with
    SQL Server 2016 that you can use to view a live query plan while the query is
    still in execution. Using this feature, which can also be used with SQL Server
    2014 as explained later, you can see query plan information in real time without
    the need to wait for the query to complete. Live Query Statistics can be useful
    to determine which part of a query could be running slow and to troubleshoot queries
    which either never finish, fail after many hours, or just take many hours to complete.
    Usually, a challenge with queries taking a long time to execute is the lack of
    runtime execution statistics (like the information provided by the `sys.dm_exec_query_stats`
    DMV or the `SET STATISTICS IO` and `SET STATISTICS TIME` statements) or an actual
    execution plan. Often using an estimated execution plan is not enough for troubleshooting
    a query problem. For example, since it only provides estimated information, it
    cannot be used to detect cardinality estimation problems.


    Live Query Statistics uses information that is available through the `sys.dm_exec_query_profiles`
    DMV. Since this DMV was introduced with SQL Server 2014, Live Query Statistics
    could also be used against this version of SQL Server provided that you use SQL
    Server 2016 Management Studio or later, as Live Query Statistics is implemented
    in this tool. Keep in mind that this feature uses a significant number of system
    resources so it should only be used in troubleshooting scenarios. There are several
    ways to enable this feature in SQL Server Management Studio, including selecting
    Include Live Query Statistics on the SQL Editor toolbar or using similar choices
    on the Tools menu or Activity Monitor. To test how Live Query Statistics works,
    enable the feature using any of the three previous methods, and run the following
    query against the AdventureWorks2017 database.


    ![Live Query Statistics execution](images/393702_2_En_6_Chapter/393702_2_En_6_Fig11_HTML.jpg)


    **Figure 6-11** Live Query Statistics execution


    ```sql

    SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2

    ```


    This should show a plan similar to the one in Figure 6-11 in which Live Query
    Statistics shows both the overall query progress and the progress and elapsed
    time for the query plan operators, and the information is being updated as the
    query is being executed. At the time of writing, Hekaton natively compiled stored
    procedures are not supported by the Live Query Statistics feature.


    Currently, Live Query Statistics does not reveal as much information as the DMV
    so you may also want to query it as well. To better understand the information
    available through Live Query Statistics, we could examine the data provided by
    the DMV. The DMV returns a rich list of performance information including row
    count, rewinds, rebinds, elapsed time, CPU time, number of table or index scans,
    logical reads, physical reads, read-aheads, LOB logical reads, LOB physical reads,
    and LOB read-aheads, among others. (Please refer to the documentation for the
    entire list.) The counters are per operator per thread.


    In order to use the `sys.dm_exec_query_profiles` DMV, you will first need to enable
    the runtime execution plan statistics collection, using either the `SET STATISTICS
    PROFILE ON` or `SET STATISTICS XML ON` statements, on the same session where you
    would be running the query that will be the focus of the live statistics. For
    an example, follow the following exercise. Open a session where you plan to run
    the query to get information from and obtain its session ID. (You can look at
    the SQL Server Management Studio editor or run a statement like `SELECT @@SPID`.)
    Run the following statement:


    ```sql

    SET STATISTICS PROFILE ON

    ```


    Now run


    ```sql

    SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2

    ```'
