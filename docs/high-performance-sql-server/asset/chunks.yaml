    the technical details are outside the scope of this book. For a way to get started,
    look at Columnstore Indexes Defragmentation at [`https://msdn.microsoft.com/en-us/library/dn935013.aspx`](https://msdn.microsoft.com/en-us/library/dn935013.aspx)
    .


    ## Operational Analytics


    As covered earlier, starting with SQL Server 2016, you now have the capability
    of running real-time analytical queries directly on OLTP systems by implementing
    updatable columnstore indexes on OLTP tables. Nonclustered columnstore indexes
    are not new, but they were read-only structures on previous versions of SQL Server
    and now can be implemented on OLTP disk-based tables. A clustered columnstore
    index can be created on memory-optimized tables to provide operational analytics
    as well.


    To better understand the benefit of real-time analytical queries on a transactional
    system, let’s quickly review the traditional data warehouse or analytics architecture,
    which is pictured in Figure [7-5](#393702_2_En_7_Chapter.xhtml#Fig5). In this
    architecture, we usually have OLTP and data warehouse/analytics workloads separated
    in two different servers and data being moved from one or more locations into
    the data warehouse using ETL jobs.


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig5_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Traditional data warehouse/analytics architecture


    SQL Server operational analytics can be used in scenarios where real-time data
    is required by running queries directly in an OLTP environment. The simplified
    architecture is shown in Figure [7-6](#393702_2_En_7_Chapter.xhtml#Fig6).


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig6_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig6_HTML.jpg)


    Figure 7-6


    SQL Server operational analytics


    This architecture has the following advantages:


    *   No data latency: Operational analytics are real time. As soon as a transaction
    is committed, its data can be picked up by an analytical query. A typical data
    warehouse, however, requires ETL jobs scheduled to run periodically, for example,
    once a day. In this case, the data in the data warehouse could be up to one day
    old. Some analytical needs may require real-time or close to real-time data.


    *   No ETL needed: You access the transactional data directly from the OLTP database.


    *   Cost: No need of additional server infrastructure or software licenses. Of
    course, this assumes that your server performance and available resources can
    support both transactional and analytical workloads at the same time.


    *   No changes required to the OLTP application. Changes will be required to your
    analytical queries, of course, if they already exist.


    Obviously, while having the best performance on OLTP workloads is of paramount
    importance, you may have concerns about performance after adding additional columnstore
    indexes and analytical workloads. The disadvantages of this new architecture are
    the following:


    *   No data from additional sources: Since the columnstore indexes are created
    on the transactional database, real-time queries target a single data source.
    You can access real-time data from your OLTP database and potentially data from
    other SQL Server databases on the same or even another instance. Typical data
    warehouses integrate data from multiple sources including other relational or
    nonrelational data sources.


    *   Analytical queries are faster on a star schema: Data warehouses usually implement
    a star schema. Data in an OLTP schema is more normalized, typically using a third
    normal form (3NF) to minimize duplication of data and ensure referential integrity.
    However, columnstore indexes provide better performance than accessing the OLTP
    normalized tables directly.


    *   Performance considerations: Although creating and maintaining an additional
    nonclustered index may not be a performance problem, some considerations must
    be taken while running new analytical queries to the same database. Your server
    should be able to support this new workload. Some performance recommendations
    are shown next.


    *   No cubes or other preaggregated data: More sophisticated aggregations or analytical
    queries may still need the traditional data warehouse approach.


    As hinted, some recommendations to improve performance while running both operational
    and analytical workloads on the same database include the following:


    *   Using Always On availability groups to run queries on a secondary replica:
    You can offload your analytical workload to an Always On availability group secondary
    replica. Columnstore indexes will still have to be updated on the primary replica,
    but analytical queries are executed against the secondary replica, with minimal
    performance disruption on the primary.


    *   Using a columnstore filtered index: This solution can be used for the case
    where there is contention while both transactional and analytical workloads access
    the most current or “hot” data. Since every insert, delete, and update operation
    needs to be reflected in the columnstore index, you can consider avoiding those
    rows that are having frequent updates. This is accomplished by filtering out those
    rows from the columnstore index. Analytical queries will still have access to
    all the data by using both the columnstore index for most of the data and the
    transactional table for the most recent data. This is done transparently and it
    is up to the query optimizer to decide how to do this. An example on how to do
    this is shown later in this chapter.


    *   Using compression delay: In cases where it is not easy or practical to define
    a filtered index, an alternate choice could be to delay compression on the columnstore
    index. As explained earlier, rows are compressed on such indexes, but because
    of the same phenomenon explained with filtered indexes, sometimes “hot” data may
    change frequently. If rows are compressed too early, they may need to be recompressed
    multiple times as data is continuously being updated. The `COMPRESSION_DELAY`
    option may be used to help with this compression overhead. For more details about
    this choice, see [`https://msdn.microsoft.com/en-us/library/dn817827.aspx`](https://msdn.microsoft.com/en-us/library/dn817827.aspx).


    Now, let’s look at examples using both disk-based and memory-optimized tables.'
  trans: '# 列存储索引中的碎片


    最后，列存储索引也可能像常规的 B 树索引一样产生碎片。你可以使用 `dm_db_column_store_row_group_physical_stats`
    DMV 来找出碎片级别：


    ```sql

    SELECT OBJECT_NAME(object_id),

    100 * (ISNULL(deleted_rows,0)) / total_rows AS fragmentation, *

    FROM sys.dm_db_column_store_row_group_physical_stats

    ```


    当碎片级别达到 20% 或更高时，你可以考虑进行碎片整理。与基于磁盘的索引类似，你可以使用 `ALTER INDEX REORGANIZE` 和 `ALTER
    INDEX REBUILD` 语句。`ALTER INDEX REORGANIZE` 的基本示例如下：


    ```sql

    ALTER INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew REORGANIZE

    ```


    类似地，`ALTER INDEX REBUILD` 的基本语法如下所示：


    ```sql

    ALTER INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew REBUILD

    ```


    列存储索引中的碎片处理方式与行存储不同，其技术细节超出了本书的范围。要了解入门方法，请查看《列存储索引碎片整理》一文，链接位于 [`https://msdn.microsoft.com/en-us/library/dn935013.aspx`](https://msdn.microsoft.com/en-us/library/dn935013.aspx)。


    ## 操作分析


    如前所述，从 SQL Server 2016 开始，通过在 OLTP 表上实现可更新的列存储索引，你现在能够在 OLTP 系统上直接运行实时分析查询。非聚集列存储索引并非新特性，但在之前的
    SQL Server 版本中它们是只读结构，现在可以在基于磁盘的 OLTP 表上实现。也可以在内存优化表上创建聚集列存储索引，以提供操作分析功能。


    为了更好地理解在事务系统上进行实时分析查询的好处，让我们快速回顾一下传统的数据仓库或分析架构，如图 7-5 所示。在此架构中，我们通常将 OLTP 和数据仓库/分析工作负载分离在两个不同的服务器上，并使用
    ETL 作业将数据从一个或多个位置移动到数据仓库中。


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig5_HTML.jpg](img/393702_2_En_7_Fig5_HTML.jpg)


    图 7-5：传统数据仓库/分析架构


    SQL Server 操作分析可用于需要实时数据的场景，通过直接在 OLTP 环境中运行查询实现。简化的架构如图 7-6 所示。


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig6_HTML.jpg](img/393702_2_En_7_Fig6_HTML.jpg)


    图 7-6：SQL Server 操作分析


    该架构具有以下优点：


    *   **无数据延迟：** 操作分析是实时的。事务一旦提交，其数据即可被分析查询获取。然而，典型的数据仓库需要定期运行 ETL 作业，例如每天一次。在这种情况下，数据仓库中的数据可能滞后一天。某些分析需求可能需要实时或接近实时的数据。

    *   **无需 ETL：** 你直接从 OLTP 数据库访问事务数据。

    *   **成本：** 不需要额外的服务器基础设施或许可证费用。当然，这假设你的服务器性能和可用资源能够同时支持事务和分析工作负载。

    *   **无需更改 OLTP 应用程序。** 当然，如果你的分析查询已经存在，则需要对其进行更改。


    显然，虽然在 OLTP 工作负载上保持最佳性能至关重要，但在添加额外的列存储索引和分析工作负载后，你可能会对性能有所担忧。这种新架构的缺点如下：


    *   **无额外数据源：** 由于列存储索引是在事务数据库上创建的，实时查询仅针对单一数据源。你可以访问 OLTP 数据库的实时数据，并可能访问同一实例甚至另一个实例上其他
    SQL Server 数据库的数据。典型的数据仓库则集成了来自多个来源的数据，包括其他关系型或非关系型数据源。

    *   **分析查询在星型模式上更快：** 数据仓库通常实现星型模式。OLTP 模式中的数据规范化程度更高，通常使用第三范式 (3NF) 以最小化数据重复并确保引用完整性。然而，列存储索引比直接访问
    OLTP 规范化表提供更好的性能。

    *   **性能考虑：** 虽然创建和维护额外的非聚集索引可能不是性能问题，但在对同一数据库运行新的分析查询时必须考虑一些因素。你的服务器应该能够支持这个新的工作负载。下文展示了一些性能建议。

    *   **无多维数据集或其他预聚合数据：** 更复杂的聚合或分析查询可能仍需要传统的数据仓库方法。


    如前所述，在同一数据库上同时运行操作和分析工作负载时，提高性能的一些建议包括：


    *   **使用 Always On 可用性组在辅助副本上运行查询：** 你可以将分析工作负载卸载到 Always On 可用性组的辅助副本上。列存储索引仍需要在主副本上更新，但分析查询在辅助副本上执行，对主副本的性能干扰最小。

    *   **使用列存储筛选索引：** 当事务和分析工作负载访问最新或“热点”数据存在争用时，可以使用此解决方案。由于每个插入、删除和更新操作都需要反映在列存储索引中，你可以考虑避开那些频繁更新的行。这可以通过从列存储索引中过滤掉这些行来实现。分析查询仍然可以通过对大多数数据使用列存储索引，对最新数据使用事务表来访问所有数据。这个过程是透明的，由查询优化器决定如何实现。本章稍后将展示一个如何实现的例子。

    *   **使用压缩延迟：** 在定义筛选索引不容易或不实际的情况下，另一个选择是延迟列存储索引的压缩。如前所述，行会在此类索引上被压缩，但由于与筛选索引相同的原因，有时“热点”数据可能变化频繁。如果行过早压缩，随着数据不断更新，它们可能需要多次重新压缩。`COMPRESSION_DELAY`
    选项可用于帮助解决此压缩开销。有关此选项的更多详细信息，请参阅 [`https://msdn.microsoft.com/en-us/library/dn817827.aspx`](https://msdn.microsoft.com/en-us/library/dn817827.aspx)。


    现在，让我们看一下基于磁盘的表和内存优化表的使用示例。'
- fmt: '## Using Disk-Based Tables


    Since we want to run these examples on an OLTP database, we will now switch back
    to the `AdventureWorks2017` database. Let us create a nonclustered columnstore
    index on the `SalesOrderHeader` table:

    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX SalesOrderHeader_ncci ON Sales.SalesOrderHeader
    (

    SalesOrderID, RevisionNumber, OrderDate, DueDate, ShipDate, Status,

    OnlineOrderFlag, PurchaseOrderNumber, AccountNumber, CustomerID, SalesPersonID,

    TerritoryID, BillToAddressID, ShipToAddressID, ShipMethodID, CreditCardID,

    CreditCardApprovalCode, CurrencyRateID, SubTotal, TaxAmt, Freight, Comment,

    ModifiedDate)

    ```


    Creating such an index is everything we need to start running analytical queries.
    For example, the following query will use the nonclustered columnstore index as
    shown in the plan in Figure 7-7, in which scan operation is running in batch execution
    mode:


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig7_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig7_HTML.jpg)


    Figure 7-7: Nonclustered columnstore index on an OLTP table


    ```sql

    SELECT MAX(TotalDue)

    FROM Sales.SalesOrderHeader

    ```


    Of course, it is up to the query optimizer to decide whether to use the columnstore
    index or any other data structure. If you look at the cost of the previous query,
    it will show 0.017469 cost units. Running the next query asking the query optimizer
    not to use such an index would estimate a cost of 0.569733, which obviously is
    more expensive. You could also test just dropping the index without the hint to
    get the same behavior and cost.

    ```sql

    SELECT MAX(TotalDue)

    FROM Sales.SalesOrderHeader

    OPTION (IGNORE_NONCLUSTERED_COLUMNSTORE_INDEX)

    ```


    Note: The `IGNORE_NONCLUSTERED_COLUMNSTORE_INDEX` hint asks the query optimizer
    to ignore any nonclustered columnstore index in a query. You could use it in cases
    when `SQL Server`, for some reason, is not giving you a good execution plan.


    Now I’ll show you an exercise where using a filtered nonclustered columnstore
    index can be useful, but we need to drop the current index first. Trying to create
    a second nonclustered columnstore is not supported and would get you error message
    35339.

    ```sql

    DROP INDEX Sales.SalesOrderHeader.SalesOrderHeader_ncci

    ```


    Let’s make the assumption that “hot” data has a status of 1. (For some reason,
    this is not implemented in `AdventureWorks2017`, and the entire table has a value
    of 5.) Let’s update a few rows with the most recent ship date:

    ```sql

    UPDATE Sales.SalesOrderHeader

    SET Status = 1

    WHERE ShipDate = ''2014-07-07 00:00:00.000''

    ```


    Run the following statement to create a filtered nonclustered columnstore index
    to contain all the rows with status 5, which is most of the rows in the table:

    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX SalesOrderHeader_ncci ON Sales.SalesOrderHeader
    (

    SalesOrderID, RevisionNumber, OrderDate, DueDate, ShipDate, Status,

    OnlineOrderFlag, PurchaseOrderNumber, AccountNumber, CustomerID, SalesPersonID,
    TerritoryID, BillToAddressID, ShipToAddressID, ShipMethodID, CreditCardID, CreditCardApprovalCode,
    CurrencyRateID, SubTotal, TaxAmt, Freight, Comment, CreditCardApprovalCode, CurrencyRateID,
    SubTotal, TaxAmt, Freight, Comment, ModifiedDate)

    WHERE Status = 5

    ```


    Trying to run the previous analytical query would not yet choose the columnstore
    index even when the query processor can benefit from it and access all the data
    where status is 5. The reason is simple: there is no cheap way to access the few
    remaining rows, where status is 1, without a table scan of the base table. So
    the query is doing a regular table scan anyway. In order to help, it is recommended
    to have a row-based clustered or nonclustered index on the `Status` column. Let’s
    try the second choice:

    ```sql

    CREATE INDEX IX_Status ON Sales.SalesOrderHeader(Status)

    ```


    Once this rowstore index is created, running the previous analytical query will
    use the nonclustered columnstore index for most of the data and the rowstore nonclustered
    index for the remaining required rows, as shown in the partial execution plan
    in Figure 7-8.


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig8_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig8_HTML.jpg)


    Figure 7-8: Query using a filtered columnstore index


    A more complicated analytical query like the following will produce a plan similar
    to Figure 7-8, using a columnstore for most of the data plus navigating to additional
    rows using a rowstore index:

    ```sql

    SELECT SalesPersonID, SUM(TotalDue), AVG(TotalDue)

    FROM Sales.SalesOrderHeader

    WHERE TerritoryID > 3

    GROUP BY SalesPersonID

    ```


    Finally, to clean up, drop both indexes created in this exercise and set the `Status`
    column to their original values:

    ```sql

    DROP INDEX Sales.SalesOrderHeader.IX_Status

    DROP INDEX Sales.SalesOrderHeader.SalesOrderHeader_ncci

    UPDATE Sales.SalesOrderHeader

    SET Status = 5

    WHERE ShipDate = ''2014-07-07 00:00:00.000''

    ```'
