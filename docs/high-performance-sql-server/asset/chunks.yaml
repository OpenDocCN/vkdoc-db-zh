  trans: '

    ## 概要


    本章介绍了 **waits 性能分析方法**，该方法可用于解决性能问题，尤其是在其他传统方法无法准确定位性能瓶颈时。一种高级方法通常需要查看 SQL Server
    实例上的其他性能信息，并进行关联分析，有时甚至需要关联客户端或其他与 SQL Server 交互的数据源的信息。此外，由于等待事件在 SQL Server
    实例中持续发生，因此需要额外的知识和建立基准线，才能判断等待在何时真正构成了问题。


    # 6. 查询存储


    你是否曾因某个查询意外地获得了不同的执行计划而遇到性能问题？你是否曾在 SQL Server 升级后发现计划回退，并想了解某个查询之前的执行计划是什么样的？**查询存储**（`Query
    Store`）是 SQL Server 2016 引入的一项功能，可以帮助你排查和解决与执行计划变更相关的这些及其他性能问题。


    **查询存储**会自动捕获查询、执行计划和运行时统计信息的历史记录，使你能够发现查询计划的回退、识别开销大的查询，甚至强制查询处理器使用先前捕获的执行计划。此功能最初作为“云优先”功能在
    Azure SQL Database 上发布，目前已在所有版本的 SQL Server 中提供。


    本章将**查询存储**作为收集和排查工具进行介绍，并展示如何通过强制使用现有执行计划来快速解决性能问题。然而，与使用查询提示类似，强制计划并非长久之计，可能仍需要传统的查询调优技术来解决查询性能问题。本章还会介绍**实时查询统计信息**（`Live
    Query Statistics`），这是 SQL Server 2016 引入的另一项与查询性能相关的功能。


    ## 查询为何变慢？


    要理解**查询存储**的好处，我先从查询排查过程说起。你可以使用**查询存储**或其他工具，查明性能问题是否因为一个或多个查询变慢导致，并识别出这些具体查询。一旦检测到性能问题源于某个查询变慢，下一步就是找出原因。显然，并非每个查询性能问题都与计划变更有关。一个原本运行良好的查询突然变慢可能有多种原因。有时可能与阻塞或等待其他系统资源有关，这已在第
    5 章讨论过。在许多情况下，原因是某些东西发生了变化，但挑战在于找出具体是什么变了。通常，我们没有关于系统资源使用情况、查询执行统计信息或性能历史的基线。事实上，我们常常连旧的计划是什么都不清楚。可能是数据、架构或查询参数等方面的变化导致查询处理器生成了一个新计划。也可能是，在数据量增加、工作负载加大或其他变化后，新计划虽然执行时间比以前长，但可能成为了适应新数据库状态的“好计划”。


    ## 计划变更


    由印度科学研究所开发的 **Picasso 数据库查询优化器可视化工具**（`Picasso Database Query Optimizer Visualizer`）可用于展示查询计划为何变更，以及基于谓词的选择性，同一查询可能选择多少个不同的计划。**Picasso
    数据库查询优化器可视化工具**的一个示例如图 6-1 所示。


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig1_HTML.jpg](img/393702_2_En_6_Fig1_HTML.jpg)


    图 6-1 Picasso 数据库查询优化器可视化工具


    图中的每种颜色代表同一查询的一个不同计划，每个计划都是根据谓词的选择性选定的。有趣的是，当跨越图中的某个边界并选择了不同的计划时，大多数情况下，两个计划的成本和性能应该是相似的，因为选择性或估计行数只是略有变化。例如，当向表中添加了符合所用谓词条件的新行时，就可能发生这种情况。然而，在某些情况下，主要是由于查询优化器成本模型存在局限性，无法正确建模某些因素，导致新计划与先前的计划相比性能差异巨大，从而给应用程序及其用户带来问题。需要澄清的是，图中显示的计划是查询优化器根据所用参数的选择性为同一查询选定的最终计划，而不是优化器在考虑选择时众多备选方案中的一部分。你可以在
    `http://dsl.cds.iisc.ac.in/projects/PICASSO` 找到关于 **Picasso 数据库查询优化器可视化工具**的更多信息。


    计划的另一个众所周知的问题是，由于 SQL Server 累积更新（CU）、服务包或版本升级后的变更导致的性能回退。提到查询优化器内部的变更，一个主要担忧就是计划回退，这被认为是查询优化器改进的一大障碍。回退是指对查询优化器应用修复后引入的问题，有时被称为经典的“两个或多个错误抵消成正确”。例如，当两个错误的估计值——一个高估了某个值，另一个低估了它——相互抵消，幸运地给出了一个良好的估计，从而整体上产生了一个良好的执行计划时，就可能发生这种情况。在查询优化器改进后，只修正其中一个值可能导致错误的估计，从而对计划选择产生负面影响，引发性能回退。


    ## 查询存储如何提供帮助


    通过收集查询和计划信息、收集运行时统计信息，并允许你强制使用现有的查询计划，**查询存储**在以下场景中非常有用：


    1.  计划回退

    2.  SQL Server 升级

    3.  应用程序/硬件变更

    4.  识别开销大的查询

    5.  识别即席工作负载


    ### 计划回退


    在早期版本的 SQL Server 中，没有简便的方法来判断是否发生了计划回退，因为只能看到特定计划的当前版本。**查询存储**通过将查询计划的历史存储在系统中，并捕获每个计划随时间推移的性能表现，使你能够识别出那些随时间推移变慢的查询。“回退查询”报告可用于识别那些执行指标最近出现回退、可能正在数据库中引发性能问题的查询。

    '
- fmt: "### SQL Server Upgrades\n\n你可以使用查询存储（Query Store）和数据库兼容级别（`COMPATIBILITY_LEVEL`）设置来最小化\
    \ SQL Server 升级的风险。兼容级别会将某些数据库行为设置为与指定版本的 SQL Server 兼容。例如，你可以升级到 SQL Server 2019，同时将\
    \ `COMPATIBILITY_LEVEL` 设置保持为 140（SQL Server 2017），这样你就可以使用前一个版本的查询处理器。通过启用查询存储，你可以收集查询和性能数据以创建基线，之后再将\
    \ `COMPATIBILITY_LEVEL` 设置更改为 150（SQL Server 2019）来使用最新版本的查询处理器。如果发现计划回归，你将能够使用查询存储在不同层级缓解问题，包括强制特定执行计划、调整查询或更改回原始的\
    \ `COMPATIBILITY_LEVEL` 设置。此方案也可用于 SQL Server 累积更新（CU）或服务包，尽管在这种情况下数据库兼容级别保持不变。\n\
    \n> 注意：如第 3 章所述，跟踪标志 4199 也可用于控制在你升级到 SQL Server 2019 并使用数据库 `COMPATIBILITY_LEVEL`\
    \ 150 后是否启用查询优化器修复。此外，如第 1 章所述，从 SQL Server 2017 开始，不再使用服务包，新的服务模型基于累积更新。\n\n\
    ### Application/Hardware Changes\n\n与前面提到的 SQL Server 升级概念类似，你可以使用查询存储来测试系统中的重大变更，包括数据库、应用程序或硬件变更。同样，你可以收集查询和计划数据来创建基线，实施所需的变更，然后使用查询存储来分析工作负载并识别任何性能回归。\n\
    \n### Identify Expensive Queries\n\n虽然在之前版本的 SQL Server 中，你可以使用 DMV 或其他一些语句或可用的性能数据来识别开销大的查询，但这些方法通常有一些限制。过去使用的其他技术可能需要捕获开销大的跟踪并进行复杂的分析才能获得类似的信息。正如我稍后将解释的，查询存储消除了一些此类限制，使你能够根据特定的执行指标快速识别数据库中开销最大的查询。要访问此信息，请在\
    \ SQL Server Management Studio 的查询存储文件夹中使用“消耗资源最多的查询”报告。选择一个你感兴趣的执行指标，以识别在提供的时间区间内对数据库资源消耗影响最大的查询。\n\
    \n> 注意：请记住，即使你在系统中找到了开销大的查询，你仍然可能需要应用标准的查询调整技术来改进其性能。查询调整超出了本书的范围。一个很好的参考资料是作者之前的书\
    \ *Microsoft SQL Server 2014 Query Tuning & Optimization*。\n\n### Identify Ad\
    \ Hoc Workloads\n\n你可以使用查询存储来识别临时工作负载，其特征通常是大量不同的查询很少执行，通常只执行一次。临时工作负载在查询优化上花费了系统资源的很大一部分，并在计划缓存中使用大量内存。识别临时工作负载将在本章后面介绍。\n\
    \n### Architecture\n\n查询存储直接与查询处理器交互。如图 6-2 所示，每次 SQL Server 编译或执行查询时，都会向查询存储发送一条消息。\n\
    \n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig2_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig2_HTML.jpg)\n\
    *图 6-2 查询存储工作流概览*\n\n图 6-3 也显示了更详细的查询编译和执行流程。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig3_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig3_HTML.jpg)\n\
    *图 6-3 查询编译与执行*\n\n查询编译和执行流程如下：\n\n1.  当查询提交给 SQL Server 执行时，SQL Server 会尝试在计划缓存中查找现有的执行计划。\n\
    2.  如果未找到计划，它将继续运行查询编译和优化过程。生成执行计划后，它会将查询文本和查询计划发送到查询存储。\n3.  如果查询被配置为使用查询存储中的现有计划，查询处理器将尝试使用强制计划中提供的信息创建计划。\n\
    4.  在前面列出的三种场景（在缓存中找到计划、新优化或强制计划）中的任何一种之后，查询处理器将检查是否需要重新编译。\n5.  如果在重新编译过程中创建了新计划，查询处理器会再次将查询文本和新的查询计划发送到查询存储。同一查询的所有查询计划都将保留在查询存储中，最多保留由\
    \ `MAX_PLANS_PER_QUERY` 配置选项定义的数量。\n6.  一旦计划被选择并执行，查询处理器将运行时执行统计信息发送到查询存储。\n\n\
    优化和执行信息首先保存在内存中，稍后根据查询存储配置持久化到磁盘。数据根据 `INTERVAL_LENGTH_MINUTES` 参数（默认为一小时）进行聚合，并根据\
    \ `DATA_FLUSH_INTERVAL_SECONDS` 参数刷新到磁盘。如果系统存在内存压力，数据也可能更早刷新到磁盘。无论如何，当你运行 `sys.query_store_runtime_stats`\
    \ 目录视图时，你将能够访问内存和磁盘中的所有数据，因为它被设计为从两个来源检索数据。\n\n查询文本的定义从语句的第一个标记的第一个字符开始，到最后一个标记的最后一个字符结束。其内部的空格和注释会被计算在内，但如果它们位于之前或之后，则不被视为查询文本的一部分。查询还必须位于同一对象上才会被视为相同查询。如果相同的查询用于两个不同的存储过程，它将被视为不同的查询，并且对象的\
    \ `object_id` 会保存在查询存储目录视图中。建议你在维护对象时使用 `ALTER` 语句而不是 `DROP` 和 `CREATE` 语句，以保持相同的\
    \ `object_id` 值（除了保留权限等其他好处）。\n\n> 注意：如果你仍然需要使用 `DROP` 和 `CREATE` 语句，SQL Server\
    \ 2016 还引入了新的 `DROP IF EXISTS` 语法，允许你仅在对象已存在时才条件性地删除它。有关存储过程的示例，请参阅 SQL Server\
    \ 文档 [`https://msdn.microsoft.com/en-us/library/ms174969.aspx`](https://msdn.microsoft.com/en-us/library/ms174969.aspx)。\n\
    > \n> ```\n> DROP IF EXISTS\n> ```"
  raw: '### SQL Server Upgrades


    You can use the Query Store and the database compatibility level or `COMPATIBILITY_LEVEL`
    setting to minimize the risk of SQL Server upgrades. The compatibility level sets
    certain database behaviors to be compatible with a specified version of SQL Server.
    For example, you can upgrade to SQL Server 2019 and still keep the `COMPATIBILITY_LEVEL`
    setting to 140 (SQL Server 2017), which allows you to use the previous version
    of the query processor. By enabling the Query Store, you can collect query and
    performance data to create a baseline and later change the `COMPATIBILITY_LEVEL`
    setting to 150 (SQL Server 2019) to use the latest version of the query processor.
    If a plan regression is found, you will be able to use the Query Store to mitigate
    the problem at different levels, which could include forcing a specific execution
    plan, tuning a query, or changing back to the original `COMPATIBILITY_LEVEL` setting.
    This scenario can also be used with SQL Server cumulative updates (CUs) or service
    packs, although in this case the database compatibility level remains the same.


    Note


    As covered in Chapter [3](#393702_2_En_3_Chapter.xhtml), trace flag 4199 can also
    be used to control whether query optimizer fixes are enabled after you upgrade
    to SQL Server 2019 and use the database `COMPATIBILITY_LEVEL` 150\. Also, as mentioned
    in Chapter [1](#393702_2_En_1_Chapter.xhtml), starting with SQL Server 2017, service
    packs are no longer used, and the new servicing model is based on cumulative updates.


    ### Application/Hardware Changes


    Similar to the concept of SQL Server upgrades mentioned before, you could use
    the Query Store to test major changes in your system including database, application,
    or hardware changes. Again, you can collect query and plan data to create a baseline,
    implement the required changes, and use the Query Store to analyze the workload
    and identify any performance regression.


    ### Identify Expensive Queries


    Although you can identify expensive queries in previous versions of SQL Server
    using DMVs or some other statements or available performance data, these methods
    usually have several limitations. Some other techniques used in the past would
    require capturing an expensive trace and performing some complicated analysis
    to get similar information. As I will explain later, the Query Store removes some
    of these limitations and allows you to quickly identify the most expensive queries
    in your database based on a specific execution metric. To access this information,
    use the “Top Resource Consuming Queries” report in the Query Store folder in SQL
    Server Management Studio. Choose an execution metric of interest to identify the
    queries that have the biggest impact to database resource consumption for a provided
    time interval.


    Note


    Keep in mind that even after you find the expensive queries in your system, you
    still may need to apply standard query-tuning techniques to improve their performance.
    Query tuning is beyond the scope of this book. A good reference for this topic
    is the author’s previous book *Microsoft SQL Server 2014 Query Tuning & Optimization*.


    ### Identify Ad Hoc Workloads


    You can use the Query Store to identify ad hoc workloads, which are typically
    characterized with a relatively large number of different queries executed very
    rarely and usually only once. Ad hoc workloads spend a significant portion of
    system resources in query optimization and use a large amount of memory in the
    plan cache. Identifying ad hoc workloads is covered later in this chapter.


    ## Architecture


    The Query Store directly interacts with the query processor. As shown in Figure
    [6-2](#393702_2_En_6_Chapter.xhtml#Fig2), every time SQL Server compiles or executes
    a query, a message is sent to the Query Store.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig2_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Query Store workflow overview


    A more detailed query compilation and execution flow is also shown in Figure [6-3](#393702_2_En_6_Chapter.xhtml#Fig3).


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig3_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Query compilation and execution


    The query compilation and execution flow is as follows:


    1.  When a query is submitted to SQL Server for execution, SQL Server will try
    to find an existing execution plan in the plan cache.


    2.  If no plan is found, it will proceed to run the query compilation and optimization
    process. After an execution plan is generated, it will send the query text and
    query plan to the Query Store.


    3.  If the query is configured to use an existing plan in the Query Store, the
    query processor will try to create a plan using the information provided in the
    forced plan.


    4.  After any of the three previously listed scenarios—plan found in cache, new
    optimization, or plan forced—the query processor will check if a recompile is
    needed.


    5.  If a new plan is created during the recompile process, again, the query processor
    will send the query text and the new query plans to the Query Store. All the query
    plans for the same query will be kept in the Query Store, up to a maximum defined
    by the `MAX_PLANS_PER_QUERY` configuration option.


    6.  Once a plan is chosen and executed, the query processor will send the runtime
    execution statistics to the Query Store.


    The optimization and execution information is kept in memory first and only later
    persisted to disk, depending on the Query Store configuration. Data is aggregated
    according to the `INTERVAL_LENGTH_MINUTES` parameter, which defaults to one hour,
    and flushed to disk according to the `DATA_FLUSH_INTERVAL_SECONDS` parameter.
    The data can also be flushed to disk earlier if there is memory pressure on the
    system. In any case, you will be able to access all of the data, both in memory
    and disk, when you run the `sys.query_store_runtime_stats` catalog, as it is designed
    to retrieve the data from both sources.


    The definition of the query text starts at the first character of the first token
    of the statement and ends at the last character of the last token. Space and comments
    inside do count, but if they are before or after, they are not considered part
    of the query text. A query also has to be on the same object to be considered
    the same query. If the same query is used in two different stored procedures,
    it would be considered a different query, and the `object_id` of the object is
    kept in the Query Store catalogs. It is recommended that you use `ALTER` instead
    of `DROP` and `CREATE` statements when maintaining objects to keep the same `object_id`
    value (in addition to other benefits like keeping permissions and so forth).


    Note


    If you still need to use the `DROP` and `CREATE` statements, SQL Server 2016 also
    introduces the new `DROP IF EXISTS` syntax, which allows you to conditionally
    drop an object only if it already exists. For an example with stored procedures,
    see the SQL Server documentation at [`https://msdn.microsoft.com/en-us/library/ms174969.aspx`](https://msdn.microsoft.com/en-us/library/ms174969.aspx).'
