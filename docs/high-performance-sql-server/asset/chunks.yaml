    Similarly, this is the code you would use for a trigger. Natively compiled triggers
    are only available on memory-optimized tables, and these are the only kind of
    triggers allowed on these tables.


    ```

    CREATE TRIGGER Insert_SalesOrderHeader

    ON dbo.SalesOrderHeader

    WITH NATIVE_COMPILATION, SCHEMABINDING

    FOR INSERT, UPDATE, DELETE

    AS BEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''us_english'')

