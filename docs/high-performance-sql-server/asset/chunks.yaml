- fmt: '### sys.dm_os_performance_counters


    `sys.dm_os_performance_counters` DMV 包含了与你可以从 Windows 访问的性能计数器相同的一个子集，例如，如前文所述，使用性能监视器。但是，此
    DMV 仅包括与 SQL Server 相关的计数器。该 DMV 返回大量行，行数也取决于某些计数器可用实例的数量。例如，在 `SQLServer:Databases`
    中，每个 `counter_name` 和 `instance_name` 列（在此情况下是每个数据库）都有一个条目。换句话说，拥有 60 个计数器和 10
    个数据库将单独产生 600 个条目。


    表 [8-1](#393702_2_En_8_Chapter.xhtml#Tab1) 显示了此 DMV 的一个小样本输出。


    表 8-1


    样本输出


    | object_name | counter_name | instance_name | cntr_value | cntr_type |

    | --- | --- | --- | --- | --- |

    | SQLServer:Buffer Manager | Buffer cache hit ratio |   | 1133 | 537003264 |

    | SQLServer:Buffer Manager | Buffer cache hit ratio base |   | 1175 | 1073939712
    |

    | SQLServer:Buffer Manager | Page lookups/sec |   | 162331031 | 272696576 |

    | SQLServer:Buffer Manager | Free list stalls/sec |   | 0 | 272696576 |

    | SQLServer:Buffer Manager | Database pages |   | 285880 | 65792 |

    | SQLServer:Buffer Manager | Target pages |   | 16138240 | 65792 |

    | SQLServer:Buffer Manager | Integral Controller Slope |   | 127 | 65792 |

    | SQLServer:Buffer Manager | Lazy writes/sec |   | 24010 | 272696576 |


    此外，数据是以原始形式公开的，可能需要进行额外处理才能使数据变得有用。更多信息，请参阅文章“解读来自 *sys.dm_os_performance_counters*
    的计数器值”，链接为 [`https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters`](https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters)。


    根据该文章，`cntr_value` 列的值应根据 `cntr_type` 列进行解释。例如，缓冲区缓存命中率的 `cntr_type` 值为 537003264，根据文章，这对应于表
    [8-2](#393702_2_En_8_Chapter.xhtml#Tab2) 中所示的 `PERF_LARGE_RAW_FRACTION` 值。


    表 8-2


    样本输出


    | Decimal | Hexadecimal | Counter Type Define |

    | --- | --- | --- |

    | 1073939712 | 0x40030500 | PERF_LARGE_RAW_BASE |

    | 537003264 | 0x20020500 | PERF_LARGE_RAW_FRACTION |

    | 1073874176 | 0x40020500 | PERF_AVERAGE_BULK |

    | 272696576 | 0x10410500 | PERF_COUNTER_BULK_COUNT |

    | 65792 | 0x00010100 | PERF_COUNTER_LARGE_RAWCOUNT |


    `PERF_LARGE_RAW_FRACTION` 计数器类型表示其对应的 `PERF_LARGE_RAW_BASE` 计数器值的一个分数，该值也在表 [8-2](#393702_2_En_8_Chapter.xhtml#Tab2)
    中显示为 1073939712。对于我们的示例，`PERF_LARGE_RAW_BASE` 表示缓冲区缓存命中率基数，也在前面的 DMV 样本输出中列出。然后我们可以使用以下公式：


    缓冲区缓存命中率 % = 100 * 缓冲区缓存命中率 / 缓冲区缓存命中率基数


    在我们的例子中，使用前面 DMV 输出的值，我们有 100 * 1133 / 1175，即 96.43%。有关其他计数器的更多详细信息，请参阅提到的文章。


    ## 动态管理视图和函数


    我们在本书的其他章节中已经介绍了很多 DMV。本节将包括一些对性能故障排除至关重要的额外 DMV。你可以在 [`https://msdn.microsoft.com/en-us/library/ms188754.aspx`](https://msdn.microsoft.com/en-us/library/ms188754.aspx)
    找到所有已记录的 DMV 和 DMF 的完整列表。


    ### sys.dm_io_virtual_file_stats


    `sys.dm_io_virtual_file_stats` DMF 为数据库中的每个数据和日志文件提供了丰富的 I/O 信息，不仅包括 I/O 活动数据，还包括等待延迟信息。返回的统计信息是自
    SQL Server 实例启动以来或数据库或数据文件从离线状态更改为联机状态以来累积的指标。此 DMF 替代了旧的 `fn_virtualfilestats`
    函数。


    仅由此 DMF 返回的 I/O 活动可能没有太大意义，因为它取决于 SQL Server 实例（或数据库或文件）已联机的天数，但当与同一实例上的其他文件进行比较时，它会很有帮助。一旦你发现某个数据库文件可能有过度的
    I/O 活动，你可能需要关联其他一些性能信息来采取措施。很多时候，你可以通过调整和优化查询（例如，提供正确的索引，查看改进执行计划，验证统计信息等）来缓解这些问题。在其他时候，根据你的结果，将数据库文件放置在不同的卷上也可能有所帮助，例如，将繁忙卷的
    I/O 分散到额外的卷上。尝试将 I/O 活动与 `sys.dm_db_index_usage_stats` 关联也可以提供有价值的信息。


    `sys.dm_io_virtual_file_stats` DMF 有两个可选参数，数据库 ID 和文件 ID，可以如下例所示使用：

    ```

    SELECT * FROM sys.dm_io_virtual_file_stats(DB_ID(''AdventureWorks2017''), NULL)

    ```

    不带参数调用此 DMF 将列出所有数据库中的所有文件，如下例所示：

    ```

    SELECT DB_NAME(mf.database_id), physical_name, fs.*

    FROM sys.dm_io_virtual_file_stats(NULL, NULL) fs

    JOIN sys.master_files mf

    ON mf.database_id = fs.database_id

    AND mf.file_id = fs.file_id

    ```

    表 [8-3](#393702_2_En_8_Chapter.xhtml#Tab3) 显示了一个部分样本输出。


    表 8-3


    样本输出


    | database_name | num_of_bytes_read | io_stall_read_ms | num_of_bytes_written
    | io_stall_write_ms |

    | --- | --- | --- | --- | --- |

    | tempdb | 18735104 | 5642 | 2605056 | 999 |

    | tempdb | 1015808 | 186 | 2162688 | 281 |

    | tempdb | 2260992 | 803 | 1507328 | 201 |

    | tempdb | 2121728 | 322 | 1613824 | 1388 |

    | tempdb | 2301952 | 420 | 1662976 | 714 |

    | AdventureWorks2017 | 275603456 | 147988 | 43155456 | 9587 |

    | AdventureWorks2017 | 185999360 | 12248 | 202964992 | 258568 |

    | AdventureWorksDW2017 | 113778688 | 35233 | 74670080 | 3129 |

    | AdventureWorksDW2017 | 1130496 | 2322 | 47136768 | 14632 |


    所有列都提供了重要的 I/O 信息。仅列出最关键的几个：

    *   `num_of_reads`：在数据库文件上执行的读取次数。

    *   `num_of_bytes_read`：在数据库文件上读取的总字节数。

    *   `io_stall_read_ms`：用户为在数据库文件上执行的读取而等待的总时间。以毫秒为单位。

    *   `num_of_writes`：在数据库文件上执行的写入次数。

    *   `num_of_bytes_written`：写入数据库文件的总字节数。

    *   `io_stall_write_ms`：用户为在数据库文件上完成的写入而等待的总时间。以毫秒为单位。

    *   `io_stall`：用户为在数据库文件上完成的 I/O 而等待的总时间。它基本上是 `io_stall_read_ms` 加上 `io_stall_write_ms`。以毫秒为单位。

    *   `size_on_disk_bytes`：磁盘上用于数据库文件的字节数。'
  raw: '### sys.dm_os_performance_counters


    The `sys.dm_os_performance_counters` DMV contains a subset of the same performance
    counters and information that you can access from Windows, for example, using
    Performance Monitor, as explained earlier. However, this DMV only includes the
    SQL Server–related counters. The DMV returns a large number of rows that also
    depends on the number of available instances for some counters. For example, in
    `SQLServer:Databases`, there is an entry per `counter_name` per `instance_name
    column`, which in this case is for each database. In other words, having 60 counters
    and 10 databases would make 600 entries alone.


    A small sample output of this DMV is shown in Table [8-1](#393702_2_En_8_Chapter.xhtml#Tab1).


    Table 8-1


    Sample Output


    | object_name | counter_name | instance_name | cntr_value | cntr_type |

    | --- | --- | --- | --- | --- |

    | SQLServer:Buffer Manager | Buffer cache hit ratio |   | 1133 | 537003264 |

    | SQLServer:Buffer Manager | Buffer cache hit ratio base |   | 1175 | 1073939712
    |

    | SQLServer:Buffer Manager | Page lookups/sec |   | 162331031 | 272696576 |

    | SQLServer:Buffer Manager | Free list stalls/sec |   | 0 | 272696576 |

    | SQLServer:Buffer Manager | Database pages |   | 285880 | 65792 |

    | SQLServer:Buffer Manager | Target pages |   | 16138240 | 65792 |

    | SQLServer:Buffer Manager | Integral Controller Slope |   | 127 | 65792 |

    | SQLServer:Buffer Manager | Lazy writes/sec |   | 24010 | 272696576 |


    In addition, the data is exposed in raw form, and additional processing may need
    to be performed for the data to be useful. For more information, see the article
    “Interpreting the counter values from *sys.dm_os_performance_counters*” at [`https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters`](https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters).


    According to the article, the values of the `cntr_value` columns should be interpreted
    according to the `cntr_type` column. For example, buffer cache hit ratio has a
    `cntr_type` value of 537003264, which according to the article corresponds to
    the `PERF_LARGE_RAW_FRACTION` value shown in Table [8-2](#393702_2_En_8_Chapter.xhtml#Tab2).


    Table 8-2


    Sample Output


    | Decimal | Hexadecimal | Counter Type Define |

    | --- | --- | --- |

    | 1073939712 | 0x40030500 | PERF_LARGE_RAW_BASE |

    | 537003264 | 0x20020500 | PERF_LARGE_RAW_FRACTION |

    | 1073874176 | 0x40020500 | PERF_AVERAGE_BULK |

    | 272696576 | 0x10410500 | PERF_COUNTER_BULK_COUNT |

    | 65792 | 0x00010100 | PERF_COUNTER_LARGE_RAWCOUNT |


    A `PERF_LARGE_RAW_FRACTION` counter type represents a fraction of its corresponding
    `PERF_LARGE_RAW_BASE` counter value, also shown in Table [8-2](#393702_2_En_8_Chapter.xhtml#Tab2)
    with the value 1073939712\. For our example, `PERF_LARGE_RAW_BASE` represents
    the buffer cache hit ratio base, also listed in the previous DMV sample output.
    Then we can use the following formula:


    Buffer cache hit ratio % = 100 * Buffer cache hit ratio / Buffer cache hit ratio
    base


    In our case , using the values of the previous DMV output, we have 100 * 1133
    / 1175 or 96.43%. For more details about other counters, please refer to the mentioned
    article.


    ## Dynamic Management Views and Functions


    We have covered a large number of DMVs in other chapters of this book. This section
    will include some additional DMVs critical for performance troubleshooting. You
    can find the entire list of documented DMVs and DMFs at [`https://msdn.microsoft.com/en-us/library/ms188754.aspx`](https://msdn.microsoft.com/en-us/library/ms188754.aspx).


    ### sys.dm_io_virtual_file_stats


    The `sys.dm_io_virtual_file_stats` DMF provides a rich amount of I/O information
    for each data and log file in a database, including not only I/O activity data
    but also wait latency information. The statistics returned are metrics accumulated
    since the SQL Server instance was started or since the time a database or data
    file changed its status from offline to online. This DMF replaces the old `fn_virtualfilestats`
    function.


    The I/O activity returned by this DMF alone may not have much meaning as it depends
    on the number of days the SQL Server instance (or database or file) has been online,
    but it can be helpful when compared to other files on the same instance. Once
    you find that a database file may have excessive I/O activity, you may need to
    correlate with some other performance information to take action. Many times you
    can alleviate these problems by tuning and optimizing your queries (e.g., providing
    the right indexes, looking to improve the execution plan, verifying statistics,
    etc.). Some other times, depending on your results, placing the database files
    on a different volume may help as well, for example, spreading the I/Os of a busy
    volume into additional volumes. Trying to correlate I/O activity with the `sys.dm_db_index_usage_stats`
    can also provide valuable information.


    The `sys.dm_io_virtual_file_stats` DMF has two optional parameters, database ID
    and file ID, which can be used as shown in the following example:


    ```

    SELECT * FROM sys.dm_io_virtual_file_stats(DB_ID(''AdventureWorks2017''), NULL)

    ```


    Calling this DMF without parameters will list all the files in all the databases,
    as shown in the following example:


    ```

    SELECT DB_NAME(mf.database_id), physical_name, fs.*

    FROM sys.dm_io_virtual_file_stats(NULL, NULL) fs

    JOIN sys.master_files mf

    ON mf.database_id = fs.database_id

    AND mf.file_id = fs.file_id

    ```


    A sample partial output is shown in Table [8-3](#393702_2_En_8_Chapter.xhtml#Tab3).


    Table 8-3


    Sample Output


    | database_name | num_of_bytes_read | io_stall_read_ms | num_of_bytes_written
    | io_stall_write_ms |

    | --- | --- | --- | --- | --- |

    | tempdb | 18735104 | 5642 | 2605056 | 999 |

    | tempdb | 1015808 | 186 | 2162688 | 281 |

    | tempdb | 2260992 | 803 | 1507328 | 201 |

    | tempdb | 2121728 | 322 | 1613824 | 1388 |

    | tempdb | 2301952 | 420 | 1662976 | 714 |

    | AdventureWorks2017 | 275603456 | 147988 | 43155456 | 9587 |

    | AdventureWorks2017 | 185999360 | 12248 | 202964992 | 258568 |

    | AdventureWorksDW2017 | 113778688 | 35233 | 74670080 | 3129 |

    | AdventureWorksDW2017 | 1130496 | 2322 | 47136768 | 14632 |


    All columns provide important I/O information. Just to list the most critical
    ones:


    *   `num_of_reads`: Number of reads made on the database file.


    *   `num_of_bytes_read`: Total number of bytes read on the database file.


    *   `io_stall_read_ms`: Total time that the users waited for reads made on the
    database file. Measured in milliseconds.


    *   `num_of_writes`: Number of writes made on the database file.


    *   `num_of_bytes_written`: Total number of bytes written to the database file.


    *   `io_stall_write_ms`: Total time that users waited for writes to be completed
    on the database file. Measured in milliseconds.


    *   `io_stall`: Total time that users waited for I/O to be completed on the database
    file. It is basically `io_stall_read_ms` plus `io_stall_write_ms`. Measured in
    milliseconds.


    *   `size_on_disk_bytes`: Number of bytes used on the disk for the database file
    .'
  trans: '### sys.dm_os_performance_counters


    `sys.dm_os_performance_counters` 动态管理视图包含了一个子集，其内容与你可以通过 Windows（例如，如前文所述，使用性能监视器）访问的性能计数器相同。但是，此动态管理视图仅包括与
    SQL Server 相关的计数器。该视图返回大量行，行数也取决于某些计数器可用实例的数量。例如，在 `SQLServer:Databases` 对象中，每个
    `counter_name` 和 `instance_name` 列（在这种情况下是每个数据库）都有一个条目。换句话说，拥有 60 个计数器和 10 个数据库将单独产生
    600 个条目。


    表 8-1 显示了此动态管理视图的一个小样本输出。


    表 8-1


    样本输出


    | object_name | counter_name | instance_name | cntr_value | cntr_type |

    | --- | --- | --- | --- | --- |

    | SQLServer:Buffer Manager | Buffer cache hit ratio |   | 1133 | 537003264 |

    | SQLServer:Buffer Manager | Buffer cache hit ratio base |   | 1175 | 1073939712
    |

    | SQLServer:Buffer Manager | Page lookups/sec |   | 162331031 | 272696576 |

    | SQLServer:Buffer Manager | Free list stalls/sec |   | 0 | 272696576 |

    | SQLServer:Buffer Manager | Database pages |   | 285880 | 65792 |

    | SQLServer:Buffer Manager | Target pages |   | 16138240 | 65792 |

    | SQLServer:Buffer Manager | Integral Controller Slope |   | 127 | 65792 |

    | SQLServer:Buffer Manager | Lazy writes/sec |   | 24010 | 272696576 |


    此外，数据是以原始形式公开的，可能需要进行额外处理才能使数据变得有用。更多信息，请参阅文章“解读来自 *sys.dm_os_performance_counters*
    的计数器值”，链接为 [`https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters`](https://blogs.msdn.microsoft.com/psssql/2013/09/23/interpreting-the-counter-values-from-sys-dm_os_performance_counters)。


    根据该文章，`cntr_value` 列的值应根据 `cntr_type` 列进行解释。例如，缓冲区缓存命中率的 `cntr_type` 值为 537003264，根据文章，这对应于表
    8-2 中所示的 `PERF_LARGE_RAW_FRACTION` 值。


    表 8-2


    样本输出


    | Decimal | Hexadecimal | Counter Type Define |

    | --- | --- | --- |

    | 1073939712 | 0x40030500 | PERF_LARGE_RAW_BASE |

    | 537003264 | 0x20020500 | PERF_LARGE_RAW_FRACTION |

    | 1073874176 | 0x40020500 | PERF_AVERAGE_BULK |

    | 272696576 | 0x10410500 | PERF_COUNTER_BULK_COUNT |

    | 65792 | 0x00010100 | PERF_COUNTER_LARGE_RAWCOUNT |


    `PERF_LARGE_RAW_FRACTION` 计数器类型表示其对应的 `PERF_LARGE_RAW_BASE` 计数器值的一个分数，该值也在表 8-2
    中显示为 1073939712。对于我们的示例，`PERF_LARGE_RAW_BASE` 表示缓冲区缓存命中率基数，也在前面的动态管理视图样本输出中列出。然后我们可以使用以下公式：


    缓冲区缓存命中率 % = 100 * 缓冲区缓存命中率 / 缓冲区缓存命中率基数


    在我们的例子中，使用前面动态管理视图输出的值，我们有 100 * 1133 / 1175，即 96.43%。有关其他计数器的更多详细信息，请参阅提到的文章。


    ## 动态管理视图和函数


    我们在本书的其他章节中已经介绍了很多动态管理视图。本节将包括一些对性能故障排除至关重要的额外动态管理视图。你可以在 [`https://msdn.microsoft.com/en-us/library/ms188754.aspx`](https://msdn.microsoft.com/en-us/library/ms188754.aspx)
    找到所有已记录的动态管理视图和动态管理函数的完整列表。


    ### sys.dm_io_virtual_file_stats


    `sys.dm_io_virtual_file_stats` 动态管理函数为数据库中的每个数据和日志文件提供了丰富的 I/O 信息，不仅包括 I/O 活动数据，还包括等待延迟信息。返回的统计信息是自
    SQL Server 实例启动以来或数据库或数据文件从离线状态更改为联机状态以来累积的指标。此动态管理函数替代了旧的 `fn_virtualfilestats`
    函数。


    仅由此动态管理函数返回的 I/O 活动可能没有太大意义，因为它取决于 SQL Server 实例（或数据库或文件）已联机的天数，但当与同一实例上的其他文件进行比较时，它会很有帮助。一旦你发现某个数据库文件可能有过度的
    I/O 活动，你可能需要关联其他一些性能信息来采取措施。很多时候，你可以通过调整和优化查询（例如，提供正确的索引，查看改进执行计划，验证统计信息等）来缓解这些问题。在其他时候，根据你的结果，将数据库文件放置在不同的卷上也可能有所帮助，例如，将繁忙卷的
    I/O 分散到额外的卷上。尝试将 I/O 活动与 `sys.dm_db_index_usage_stats` 关联也可以提供有价值的信息。


    `sys.dm_io_virtual_file_stats` 动态管理函数有两个可选参数，数据库 ID 和 文件 ID，可以如下例所示使用：

    ```

    SELECT * FROM sys.dm_io_virtual_file_stats(DB_ID(''AdventureWorks2017''), NULL)

    ```

    不带参数调用此动态管理函数将列出所有数据库中的所有文件，如下例所示：

    ```

    SELECT DB_NAME(mf.database_id), physical_name, fs.*

    FROM sys.dm_io_virtual_file_stats(NULL, NULL) fs

