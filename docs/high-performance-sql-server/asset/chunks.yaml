- fmt: '## Instant File Initialization


    Instant file initialization is a feature that can dramatically improve the performance
    of creation and restore of databases or operations such as adding, restoring,
    or expanding data files. It can be enabled by granting the “Perform Volume Maintenance
    Task” privilege to the SQL Server database engine service account. Unfortunately,
    their performance benefits apply only to data files and not to transaction log
    files.


    When SQL Server requests file space to Windows, by default, the file has to be
    first initialized by filling it with zeros. This operation can be time-consuming,
    especially for large file sizes or large growth operations. When using instant
    file initialization, however, SQL Server can skip zeroing the files, making the
    operation almost instantaneous. The only downside to using this feature is that
    files will not be zero initialized, and information previously available in those
    files may be visible using some advanced techniques. In addition, as indicated,
    this performance improvement cannot be used with transaction log files, so they
    still have to be zero initialized. This is one reason why it is a good idea to
    presize your transaction log files so that (depending upon transactional demand)
    growths are unlikely and can be avoided.


    To enable instant file initialization, you need to grant the “Perform Volume Maintenance
    Task” privilege to the SQL Server database engine service account by using the
    Local Security Policy application (`secpol.msc`) as documented in [`https://msdn.microsoft.com/en-us/library/ms175935(v=sql.130).aspx`](https://msdn.microsoft.com/en-us/library/ms175935%2528v%253Dsql.130%2529.aspx).
    Starting with SQL Server 2016, you can also grant this privilege at the setup
    level during the SQL Server installation process by checking the box “Grant Perform
    Volume Maintenance Task privilege to SQL Server Database Engine Service,” as shown
    in Figure [3-3](#393702_2_En_3_Chapter.xhtml#Fig3).


    ![`../images/393702_2_En_3_Chapter/393702_2_En_3_Fig3_HTML.jpg`](images/393702_2_En_3_Chapter/393702_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    “Perform Volume Maintenance Task” privilege during setup


    The setup screen also shows the security warning I mentioned earlier, which reads,
    “This privilege enables instant file initialization by avoiding zeroing of data
    pages. This may lead to information disclosure as it could allow deleted content
    to be accessed by an unauthorized principal.” Granting the “Perform Volume Maintenance
    Task” privilege can also be specified for a command-line installation using the
    `/SQLSVCINSTANTFILEINIT` parameter.


    ## Cardinality Estimator


    Another important choice impacting the performance of your application while using
    any of the latest releases of SQL Server is the choice of a cardinality estimator.
    SQL Server introduced the original cardinality estimator when the query processor
    was rearchitected back in SQL Server 7. More recently, starting with SQL Server
    2014, a new cardinality estimator was introduced to overcome some of the limitations
    of the original. Beginning with that version, you have to choose one or the other,
    and most of the time the choice will depend on the database compatibility level.


    But what is a cardinality estimator? A cardinality estimator is a component of
    the query optimizer used during optimization to estimate the number of rows every
    operation in a query would return. This information is essential to help the query
    optimizer estimate the cost of each operation and, by doing that, make the best
    decision about the physical operations to use to assemble an execution plan.


    The new cardinality estimator includes a variety of changes compared to the original,
    which are documented on the Microsoft white paper “Optimizing Your Query Plans
    with the SQL Server 2014 Cardinality Estimator,” located at [`https://msdn.microsoft.com/en-us/library/dn673537.aspx`](https://msdn.microsoft.com/en-us/library/dn673537.aspx).
    The new cardinality estimator includes some additional updates for the latest
    releases as well.


    You may be asking, if the new cardinality estimator fixes limitations of the old
    one, why there is still the choice of using the old cardinality estimator. The
    answer is plan performance regressions. Due to the complexity of the query optimization
    process, even in cases when a problem is fixed, a regression can create a performance
    problem on a query that had an acceptable execution time before. This is sometimes
    called “two or more wrongs make a right” when, for example, two bad estimations,
    one overestimating and the second underestimating, cancel each other out, giving
    a good estimation as a result. After only one of the estimations is fixed, it
    is possible to now get a bad estimation, and the query optimizer may end up selecting
    a bad performing execution plan.


    The new cardinality estimator can be enabled using the latest database compatibility
    level of the version of SQL Server being used. For example, it is 120 for SQL
    Server 2014, 130 for SQL Server 2016, 140 for SQL Server 2017, and 150 for the
    latest version. The compatibility level can also be explicitly changed using the
    following statement:


    ```sql

    ALTER DATABASE AdventureWorks SET COMPATIBILITY_LEVEL = 150

    ```


    Any older database compatibility levels would use the old cardinality estimator.
    The oldest compatibility level in the current release is SQL Server 2008 (100).


    There are a couple more choices to define the cardinality estimator to use during
    query optimization. If you need to use the old cardinality estimator but need
    to retain the new database compatibility levels, you can use the `LEGACY_CARDINALITY_ESTIMATION`
    option of the new `ALTER DATABASE SCOPED CONFIGURATION`:


    ```sql

    ALTER DATABASE SCOPED CONFIGURATION

    SET LEGACY_CARDINALITY_ESTIMATION = ON

    ```


    An alternate choice to enable the old cardinality estimator is to use trace flag
    9481, which can be defined at the server level or at the query level if using
    the `QUERYTRACEON` query hint as shown next:


    ```sql

    SELECT * FROM Person.Address WHERE City = ''Burbank'' AND PostalCode = ''91502''

    OPTION (QUERYTRACEON 9481)

    ```


    ## optimize for ad hoc workloads


    Query optimization is an expensive operation, so SQL Server tries to keep the
    created execution plans in an area of the memory called the plan cache (or procedure
    cache in some older versions of SQL Server). This saves optimization time and
    resources in case the same query needs to be executed again. However, a well-known
    problem with workloads with a large number of ad hoc queries is that execution
    plans may be kept in the plan cache, never be reused again, therefore wasting
    this plan cache memory.


    A plan always has to be generated for a query to be executed, but when you use
    the “optimize for ad hoc workloads” configuration option, SQL Server will not
    keep the execution plan the first time it is compiled and executed. Instead, it
    will keep a small plan stub that will use only a small fraction of the memory
    required for the entire plan. If the same query is executed a second time, the
    database engine will know by looking at the plan stub that this is a second execution
    and will perform a new optimization, but this time will keep the resulting plan
    in cache. In other words, the plan stub is replaced by this new query plan which
    can be used for subsequent executions.


    Although you could enable this configuration option on almost any SQL Server instance,
    this choice is mostly recommended for instances with ad hoc workloads. A small
    drawback for some other workloads is that every valid and reused query will have
    to be optimized a second time for the plan to be kept in cache.'
  raw: '## Instant File Initialization


    Instant file initialization is a feature that can dramatically improve the performance
    of creation and restore of databases or operations such as adding, restoring,
    or expanding data files. It can be enabled by granting the “Perform Volume Maintenance
    Task” privilege to the SQL Server database engine service account. Unfortunately,
    their performance benefits apply only to data files and not to transaction log
    files.


    When SQL Server requests file space to Windows, by default, the file has to be
    first initialized by filling it with zeros. This operation can be time-consuming,
    especially for large file sizes or large growth operations. When using instant
    file initialization, however, SQL Server can skip zeroing the files, making the
    operation almost instantaneous. The only downside to using this feature is that
    files will not be zero initialized, and information previously available in those
    files may be visible using some advanced techniques. In addition, as indicated,
    this performance improvement cannot be used with transaction log files, so they
    still have to be zero initialized. This is one reason why it is a good idea to
    presize your transaction log files so that (depending upon transactional demand)
    growths are unlikely and can be avoided.


    To enable instant file initialization, you need to grant the “Perform Volume Maintenance
    Task” privilege to the SQL Server database engine service account by using the
    Local Security Policy application (`secpol.msc`) as documented in [`https://msdn.microsoft.com/en-us/library/ms175935(v=sql.130).aspx`](https://msdn.microsoft.com/en-us/library/ms175935%2528v%253Dsql.130%2529.aspx).
    Starting with SQL Server 2016, you can also grant this privilege at the setup
    level during the SQL Server installation process by checking the box “Grant Perform
    Volume Maintenance Task privilege to SQL Server Database Engine Service,” as shown
    in Figure [3-3](#393702_2_En_3_Chapter.xhtml#Fig3).


    ![../images/393702_2_En_3_Chapter/393702_2_En_3_Fig3_HTML.jpg](images/393702_2_En_3_Chapter/393702_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    “Perform Volume Maintenance Task” privilege during setup


    The setup screen also shows the security warning I mentioned earlier, which reads,
    “This privilege enables instant file initialization by avoiding zeroing of data
    pages. This may lead to information disclosure as it could allow deleted content
    to be accessed by an unauthorized principal.” Granting the “Perform Volume Maintenance
    Task” privilege can also be specified for a command-line installation using the
    `/SQLSVCINSTANTFILEINIT` parameter.


    ## Cardinality Estimator


    Another important choice impacting the performance of your application while using
    any of the latest releases of SQL Server is the choice of a cardinality estimator
    . SQL Server introduced the original cardinality estimator when the query processor
    was rearchitected back in SQL Server 7\. More recently, starting with SQL Server
    2014, a new cardinality estimator was introduced to overcome some of the limitations
    of the original. Beginning with that version, you have to choose one or the other,
    and most of the time the choice will depend on the database compatibility level.


    But what is a cardinality estimator? A cardinality estimator is a component of
    the query optimizer used during optimization to estimate the number of rows every
    operation in a query would return. This information is essential to help the query
    optimizer estimate the cost of each operation and, by doing that, make the best
    decision about the physical operations to use to assemble an execution plan.


    The new cardinality estimator includes a variety of changes compared to the original,
    which are documented on the Microsoft white paper “Optimizing Your Query Plans
    with the SQL Server 2014 Cardinality Estimator,” located at [`https://msdn.microsoft.com/en-us/library/dn673537.aspx`](https://msdn.microsoft.com/en-us/library/dn673537.aspx).
    The new cardinality estimator includes some additional updates for the latest
    releases as well.


    You may be asking, if the new cardinality estimator fixes limitations of the old
    one, why there is still the choice of using the old cardinality estimator. The
    answer is plan performance regressions. Due to the complexity of the query optimization
    process, even in cases when a problem is fixed, a regression can create a performance
    problem on a query that had an acceptable execution time before. This is sometimes
    called “two or more wrongs make a right” when, for example, two bad estimations,
    one overestimating and the second underestimating, cancel each other out, giving
    a good estimation as a result. After only one of the estimations is fixed, it
    is possible to now get a bad estimation, and the query optimizer may end up selecting
    a bad performing execution plan.


    The new cardinality estimator can be enabled using the latest database compatibility
    level of the version of SQL Server being used. For example, it is 120 for SQL
    Server 2014, 130 for SQL Server 2016, 140 for SQL Server 2017, and 150 for the
    latest version. The compatibility level can also be explicitly changed using the
    following statement:


    ```

    ALTER DATABASE AdventureWorks SET COMPATIBILITY_LEVEL = 150

    ```


    Any older database compatibility levels would use the old cardinality estimator.
    The oldest compatibility level in the current release is SQL Server 2008 (100).


    There are a couple more choices to define the cardinality estimator to use during
    query optimization. If you need to use the old cardinality estimator but need
    to retain the new database compatibility levels, you can use the `LEGACY_CARDINALITY_ESTIMATION`
    option of the new `ALTER DATABASE SCOPED CONFIGURATION`:


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET LEGACY_CARDINALITY_ESTIMATION = ON

    ```


    An alternate choice to enable the old cardinality estimator is to use trace flag
    9481, which can be defined at the server level or at the query level if using
    the `QUERYTRACEON` query hint as shown next:


    ```

    SELECT * FROM Person.Address WHERE City = ''Burbank'' AND PostalCode = ''91502''

    OPTION (QUERYTRACEON 9481)

    ```


    ## optimize for ad hoc workloads


    Query optimization is an expensive operation, so SQL Server tries to keep the
    created execution plans in an area of the memory called the plan cache (or procedure
    cache in some older versions of SQL Server). This saves optimization time and
    resources in case the same query needs to be executed again. However, a well-known
    problem with workloads with a large number of ad hoc queries is that execution
    plans may be kept in the plan cache, never be reused again, therefore wasting
    this plan cache memory.


    A plan always has to be generated for a query to be executed, but when you use
    the “optimize for ad hoc workloads” configuration option, SQL Server will not
    keep the execution plan the first time it is compiled and executed. Instead, it
    will keep a small plan stub that will use only a small fraction of the memory
    required for the entire plan. If the same query is executed a second time, the
    database engine will know by looking at the plan stub that this is a second execution
    and will perform a new optimization, but this time will keep the resulting plan
    in cache. In other words, the plan stub is replaced by this new query plan which
    can be used for subsequent executions.


    Although you could enable this configuration option on almost any SQL Server instance,
    this choice is mostly recommended for instances with ad hoc workloads. A small
    drawback for some other workloads is that every valid and reused query will have
    to be optimized a second time for the plan to be kept in cache.'
  trans: '## 即时文件初始化


    即时文件初始化是一项可以显著提升数据库创建和恢复操作，或添加、恢复、扩展数据文件等操作性能的功能。可以通过向 SQL Server 数据库引擎服务账户授予“执行卷维护任务”权限来启用此功能。遗憾的是，其性能优势仅适用于数据文件，而不适用于事务日志文件。


    当 SQL Server 向 Windows 请求文件空间时，默认情况下，文件必须首先通过填充零来初始化。此操作可能非常耗时，尤其是对于大文件或大型增长操作。然而，使用即时文件初始化时，SQL
    Server 可以跳过文件置零过程，使操作几乎瞬间完成。使用此功能的唯一缺点是文件不会进行零初始化，使用某些高级技术可能会看到该文件中先前存在的信息。此外，如前所述，此性能提升无法用于事务日志文件，因此它们仍然必须进行零初始化。这就是为什么建议预先设定事务日志文件大小的原因之一，以便（根据事务需求）增长不太可能发生并可以避免。


    要启用即时文件初始化，您需要使用本地安全策略应用程序（`secpol.msc`）向 SQL Server 数据库引擎服务账户授予“执行卷维护任务”权限，具体操作如文档
    [`https://msdn.microsoft.com/en-us/library/ms175935(v=sql.130).aspx`](https://msdn.microsoft.com/en-us/library/ms175935%2528v%253Dsql.130%2529.aspx)
    所述。从 SQL Server 2016 开始，您也可以在 SQL Server 安装过程中的安装级别授予此权限，方法是勾选“向 SQL Server 数据库引擎服务授予执行卷维护任务权限”复选框，如图
    3-3 所示。


    ![`../images/393702_2_En_3_Chapter/393702_2_En_3_Fig3_HTML.jpg`](img/393702_2_En_3_Fig3_HTML.jpg)


    图 3-3


    安装期间的“执行卷维护任务”权限


    安装屏幕还显示了之前提到的安全警告，内容为：“此权限通过避免数据页置零来实现即时文件初始化。这可能导致信息泄露，因为它可能允许未经授权的主体访问已删除的内容。”对于命令行安装，也可以使用
    `/SQLSVCINSTANTFILEINIT` 参数指定授予“执行卷维护任务”权限。


    ## 基数估计器


    在使用任何最新版本的 SQL Server 时，影响应用程序性能的另一个重要选择是基数估计器的选择。当查询处理器在 SQL Server 7 中重新架构时，SQL
    Server 引入了原始的基数估计器。最近，从 SQL Server 2014 开始，引入了一个新的基数估计器，以克服原始估计器的一些限制。从该版本开始，您必须选择其中之一，大多数情况下，选择将取决于数据库兼容性级别。


    但什么是基数估计器？基数估计器是查询优化器的一个组件，在优化期间用于估计查询中每个操作将返回的行数。此信息对于帮助查询优化器估计每个操作的成本，并据此就用于组装执行计划的物理操作做出最佳决策至关重要。


    与原始估计器相比，新的基数估计器包含多种变化，这些变化记录在 Microsoft 白皮书《使用 SQL Server 2014 基数估计器优化查询计划》中，地址为
    [`https://msdn.microsoft.com/en-us/library/dn673537.aspx`](https://msdn.microsoft.com/en-us/library/dn673537.aspx)。新的基数估计器也包含针对最新版本的一些额外更新。


    您可能会问，如果新的基数估计器修复了旧版的限制，为什么仍然可以选择使用旧版的基数估计器。答案是计划性能回归。由于查询优化过程的复杂性，即使在问题得到修复的情况下，回归也可能在之前执行时间可接受的查询上产生性能问题。这有时被称为“两个错误等于正确”，例如，当两个错误的估计，一个高估，另一个低估，相互抵消，结果给出了一个好的估计。在仅修复其中一个估计之后，现在有可能得到一个糟糕的估计，查询优化器最终可能选择一个性能较差的执行计划。


    新的基数估计器可以通过使用所用 SQL Server 版本的最新数据库兼容性级别来启用。例如，SQL Server 2014 是 120，SQL Server
    2016 是 130，SQL Server 2017 是 140，最新版本是 150。也可以使用以下语句显式更改兼容性级别：


    ```sql

    ALTER DATABASE AdventureWorks SET COMPATIBILITY_LEVEL = 150

    ```


    任何较旧的数据库兼容性级别都将使用旧的基数估计器。当前版本中最旧的兼容性级别是 SQL Server 2008（100）。


    还有几个选择可以定义在查询优化期间使用的基数估计器。如果您需要使用旧的基数估计器但需要保留新的数据库兼容性级别，可以使用新的 `ALTER DATABASE
    SCOPED CONFIGURATION` 的 `LEGACY_CARDINALITY_ESTIMATION` 选项：


    ```sql

    ALTER DATABASE SCOPED CONFIGURATION

    SET LEGACY_CARDINALITY_ESTIMATION = ON

    ```


    启用旧基数估计器的另一个选择是使用跟踪标志 9481，可以在服务器级别定义，或者如果在查询中使用 `QUERYTRACEON` 查询提示，也可以在查询级别定义，如下所示：


    ```sql

    SELECT * FROM Person.Address WHERE City = ''Burbank'' AND PostalCode = ''91502''

    OPTION (QUERYTRACEON 9481)

    ```


    ## 即时(ad hoc)工作负载优化


    查询优化是一项开销很大的操作，因此 SQL Server 会尝试将创建的执行计划保存在称为计划缓存（在一些较旧的 SQL Server 版本中称为过程缓存）的内存区域中。如果同一查询需要再次执行，这可以节省优化时间和资源。然而，对于具有大量即时查询的工作负载，一个众所周知的问题是执行计划可能会一直保留在计划缓存中，但从未被再次使用，从而浪费了此计划缓存内存。


    执行查询始终需要生成一个计划，但当您使用“即时(ad hoc)工作负载优化”配置选项时，SQL Server 在第一次编译和执行查询时将不会保留执行计划。相反，它将保留一个小型计划存根，该存根仅使用整个计划所需内存的一小部分。如果再次执行相同的查询，数据库引擎通过查看计划存根会知道这是第二次执行，并将执行新的优化，但这次会将结果计划保留在缓存中。换句话说，此新的查询计划将替换计划存根，并可用于后续执行。


    尽管您几乎可以在任何 SQL Server 实例上启用此配置选项，但此选择主要推荐用于具有即时工作负载的实例。对于其他一些工作负载，一个小缺点是每个有效且重用的查询都将必须进行第二次优化，以便将计划保留在缓存中。'
- fmt: '## SQL Server Enterprise Edition


    If you are looking for the best possible performance for your database and application,
    you need to use the Enterprise edition of SQL Server. The document “Editions and
    supported features of SQL Server 2019 (15.x)” at [`https://docs.microsoft.com/en-us/sql/sql-server/editions-and-components-of-sql-server-version-15`](https://docs.microsoft.com/en-us/sql/sql-server/editions-and-components-of-sql-server-version-15)
    compares scalability limits and features supported by the various editions of
    SQL Server 2019. You can access the same documents for SQL Server 2017 and other
    older versions from those pages as well.


    SQL Server Enterprise edition supports all the memory and processors supported
    by the operating system. In the case of Windows Server 2016 Standard or Datacenter
    edition, it means up to 24 TB of memory and 512 cores could be available for SQL
    Server. For Windows Server 2019 Standard or Datacenter edition, it goes up to
    24 TB of memory and an unlimited number of cores. SQL Server Standard edition,
    on the other hand, will be limited to the lesser of 4 sockets or 24 cores and
    128 GB of memory.


    As mentioned in Chapter [2](#393702_2_En_2_Chapter.xhtml), starting with SQL Server
    2016 Service Pack 1, several features which used to be Enterprise-only are now
    available on all the editions of the product. Such features include In-Memory
    OLTP, columnstore indexes, database snapshots, compression, partitioning, Always
    Encrypted, row-level security, dynamic data masking, and change data capture,
    among others.


    As you can see in the previous document, there are still plenty of features that
    are only available on SQL Server Enterprise edition. Just to list the most important
    ones, especially from the performance point of view, we have:


    *   Resource Governor

    *   Online nonclustered columnstore index rebuild

    *   In-memory optimized tempdb metadata

    *   Partitioned table parallelism

    *   NUMA aware and large page memory and buffer array allocation

    *   Read-ahead

    *   Advanced scanning

    *   Automatic tuning

    *   Batch mode for rowstore

    *   Row mode memory grant feedback

    *   Batch mode adaptive joins

    *   Batch mode memory grant feedback

    *   Distributed partitioned views

    *   Parallel index operations

    *   Automatic use of indexed views by the query optimizer

    *   Parallel consistent check

    *   Star join query optimizations

    *   Global batch aggregation

    *   Always On availability groups (see the following note)

    *   Online index create and rebuild

    *   Resumable online index rebuilds

    *   Fast recovery


    > **Note**

    > SQL Server Standard edition provides Basic Always On availability groups which
    support a failover environment for a single database and a single replica. Basic
    availability groups are intended to replace the deprecated database mirroring
    feature and provide a similar level of feature support.


    ## Memory Configuration


    SQL Server can automatically and dynamically manage memory without any change
    to the default memory configuration. This can work perfectly fine most of the
    time when SQL Server is installed as a single instance on a dedicated server.
    In this case, you could leave the default settings of `max server memory` and
    `min server memory`, as no other application or server component is competing
    for the server memory. SQL Server is designed to dynamically allocate memory only
    when needed and, in order to avoid the operating system to page memory to disk,
    release it if not much is available. If you are targeting for a high performance
    SQL Server installation, it is strictly recommended to have a server dedicated
    just for your production SQL Server instance, as other applications or components
    on the same server may compete for memory and other server resources.


    However, in some cases, you may want to tune the memory configuration for some
    specific cases—for example, if you want to restrict the memory available to SQL
    Server or if you are seeing memory problems. Configuring memory using these settings
    is essential if you are using more than one instance of SQL Server, but, then
    again, multiple instances are not recommended for a high performance production
    installation. In order to estimate the `max server memory`, you should consider
    how much memory is needed by the operating system and other required server components,
    if any. As documented on [`https://msdn.microsoft.com/en-us/library/ms178067.aspx`](https://msdn.microsoft.com/en-us/library/ms178067.aspx),
    `max server memory` accounts for the following:


    1.  Buffer pool memory

    2.  All caches

    3.  Memory grants

    4.  Compile memory

    5.  Lock manager memory

    6.  CLR memory


    It also accounts for basically any memory clerk defined on `sys.dm_os_memory_clerks`.
    Memory not controlled by the `max server memory` configuration setting includes
    the following:


    1.  Memory heaps

    2.  Linked server providers other than SQL Server

    3.  Thread stacks

    4.  Non-SQL Server DLLs


    `Max server memory` is the high-water mark, and, except as indicated next, SQL
    Server cannot use more memory than the specified value on this configuration setting.
    Starting with the 2012 release, SQL Server might allocate more memory than the
    configured value for `max server memory` when there is insufficient contiguous
    free memory because of memory fragmentation. SQL Server can perform overcommitment
    instead of rejecting the memory request and, by doing that, briefly exceeding
    the configured `max server memory` setting.


    When configuring `min server memory`, SQL Server does not immediately allocate
    all the minimum memory. As before, it will only allocate more memory when its
    workload requires it. But once the `min server memory` is reached, memory is never
    released under that point.


    For example, to configure the `max memory` to 492 GB, you could run the following
    statements:


    ```sql

    sp_configure ''max server memory'', 503808

    GO

    RECONFIGURE

    ```


    To get back to its default, run the following:


    ```sql

    sp_configure ''max server memory'', 2147483647

    GO

    RECONFIGURE

    ```


    You can use the `sys.dm_os_sys_info` and `sys.dm_os_process_memory` DMV to get
    general information about the memory in the system. Some other memory configuration
    choices are 32-bit related, but this architecture is currently disappearing. In
    fact, SQL Server 2016 was the first database engine release to be no longer available
    for the 32-bit architecture. Another SQL Server architecture, Itanium, was also
    deprecated with SQL Server 2008 R2 and Windows Server 2008 R2 a few years ago.


    ## Lock Pages in Memory


    Lock Pages in Memory is a Windows policy that prevents the operating system from
    paging data in physical memory to disk, which is usually an expensive operation.
    Although this configuration option may be less relevant than earlier versions,
    it is still available in all the latest versions of SQL Server. While trace flag
    845 was required in the Standard edition of SQL Server 2012 and other older versions,
    it is not needed for later versions of the product. Trace flag 845 was never required
    for the Enterprise edition of SQL Server.


    To enable Lock Pages in Memory, you need to enable the policy with the same name
    for the service account used by the SQL Server database engine using the Windows
    group policy tool (`gpedit.msc`). For details on how to perform this, see [`https://msdn.microsoft.com/en-us/library/ms190730.aspx`](https://msdn.microsoft.com/en-us/library/ms190730.aspx).'
