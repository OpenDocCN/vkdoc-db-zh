  trans: '

    ## 备份压缩默认值


    “备份压缩默认值”是另一个有趣的选项，它有助于压缩您的数据库备份，默认情况下是禁用的。虽然压缩 SQL Server 备份可能会增加处理器使用的开销，但它将最小化
    I/O 操作，从而提升备份速度，同时还能节省磁盘空间。您也可以选择在备份级别使用`DATABASE BACKUP`语句的`COMPRESSION`设置选项来启用压缩，但建议将其设为服务器默认值。


    备份压缩功能随 SQL Server 2008 引入，目前仅在企业版和标准版中可用。


    ## 查询调节器成本限制


    “查询调节器成本限制”配置选项允许您定义在 SQL Server 实例中执行的查询的成本限制，这里的成本限制指的是执行计划的估计成本。您也可以使用`SET
    QUERY_GOVERNOR_COST_LIMIT`语句在单个连接级别上实现相同的效果。


    例如，运行以下语句，将查询调节器成本限制临时更改为 20：


    ```

    sp_configure ''query governor cost limit'', 20

    RECONFIGURE

    ```


    尝试运行如下这样一个开销较大的查询，将会导致错误消息“查询已被取消，因为此查询的估计成本 (%d) 超过了配置的阈值 %d”：


    ```

    SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2

    ```


    测试完成后，别忘了将配置值设回默认值：


    ```

    sp_configure ''query governor cost limit'', 0

    RECONFIGURE

    ```


    ## 阻塞进程阈值


    “阻塞进程阈值”是一个实用的配置选项，可用于指定生成阻塞进程警报的阈值。阈值以秒为单位指定，此配置选项的默认值为 0，意味着不生成警报。配置此设置后，仍需明确定义警报才能触发相应操作。运行以下语句将阻塞进程阈值更改为
    5 秒：


    ```

    sp_configure ''blocked process threshold (s)'', 5

    RECONFIGURE

    ```


    创建警报的一种方法是使用`blocked_process_report`扩展事件，并按如下方式创建会话：


    ```

    CREATE EVENT SESSION blocked_process_test ON SERVER

    ADD EVENT sqlserver.blocked_process_report

    GO

    ALTER EVENT SESSION blocked_process_test ON SERVER

    STATE = START

    ```


    会话创建并启动后，每当有进程被阻塞达到 5 秒时，它就会开始捕获事件。


    测试结束后，别忘了将配置值设回默认值。


    ```

    sp_configure ''blocked process threshold (s)'', 0

    RECONFIGURE

    GO

    ALTER EVENT SESSION blocked_process_test ON SERVER

    STATE = STOP

    GO

    DROP EVENT SESSION blocked_process_test ON SERVER

    ```


    ## 高级跟踪标志


    几年前，微软在一篇题为“SQL Server 在高性能工作负载下的调优选项”（Tuning Options for SQL Server When Running
    in High-Performance Workloads）的文章中，记录了一系列有用的跟踪标志，这些标志可在 SQL Server 运行高性能工作负载时帮助提升性能。您可以在
    [`https://support.microsoft.com/en-us/kb/920093`](https://support.microsoft.com/en-us/kb/920093)
    找到该文章，在本节中，我将对所列的跟踪标志做一个总结。


    首先，这些是高级跟踪标志，可能带来副作用，因此仅建议在穷尽了所有传统调优选项之后使用。此外，由于其中一些建议可能较为极端，文章警告应在生产系统实施前，于测试系统上评估其对工作负载的影响。所列的跟踪标志如下：


    1.  使用跟踪标志 652 来禁用预取扫描，即预读。如果您知道您的工作负载可以通过禁用预读获益，这或许是一个值得考虑的选择。

    2.  使用跟踪标志 8744 来禁用嵌套循环联接运算符使用的范围预取。

    3.  使用跟踪标志 661 来禁用幻影记录删除过程。启用此跟踪标志可以提升性能，因为无需删除已删除的记录，但这显然会影响磁盘使用率和扫描操作的性能。

    4.  使用跟踪标志 834 为缓冲池分配的内存启用 Windows 大页面分配。此跟踪标志要求将“锁定内存页”权限分配给 SQL Server 数据库引擎服务账户，如前所述。请注意，如果您使用此跟踪标志，则不支持列存储索引。列存储索引将在第
    7 章中介绍。

    5.  使用跟踪标志 836 为缓冲池启用最大服务器内存选项。此跟踪标志仅适用于 32 位版本的 SQL Server，但我真心希望您不再使用该架构。

    6.  使用跟踪标志 2301 来启用高级决策支持优化。跟踪标志 2301 也在文章“Query Processor Modeling Extensions
    in SQL Server 2005 SP1”中有更详细的介绍，地址为 [`https://blogs.msdn.microsoft.com/ianjo/2006/04/24/query-processor-modelling-extensions-in-sql-server-2005-sp1/`](https://blogs.msdn.microsoft.com/ianjo/2006/04/24/query-processor-modelling-extensions-in-sql-server-2005-sp1/)。

    7.  使用跟踪标志 8020 来禁用工作集监视。

    8.  使用多个跟踪标志来禁用各种环形缓冲区，包括使用 8011 禁用资源监视器环形缓冲区，8012 禁用调度程序的环形缓冲区，8018 禁用异常环形缓冲区，以及
    8019 禁用异常环形缓冲区的堆栈收集。禁用这些环形缓冲区可以提升 SQL Server 的性能，但具有讽刺意味的是，它们也提供有助于您进行故障排除的诊断信息。我不建议禁用这些环形缓冲区，但同样，这是您可以考虑的事情，并且希望只在短期基础上使用。

    '
- fmt: '## Configuring SQL Server on Linux


    As mentioned earlier, the latest two versions of SQL Server, 2017 and 2019, can
    run on both Windows and Linux operating systems. In addition, they can run on
    Docker which itself can run on Windows, Linux, and Mac OS. All the configurations
    mentioned so far in this chapter can also be applied to a Linux system. The rest
    of this chapter, however, will focus on configurations that only apply to Linux
    implementations. These configurations fall mostly in two categories: configuration
    using the `mssql-conf` utility and operating system configurations.


    Although you can use the `setup` option of the `mssql-conf` utility to install
    and configure SQL Server, this section assumes you have SQL Server and the command-line
    tools already installed. For details on how to install this, you can refer to
    the SQL Server documentation or my book *SQL Server on Linux* published by McGraw-Hill.
    Just for completeness, this is what you most likely would run to install and initially
    configure SQL Server:


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    usermod: no changes

    Choose an edition of SQL Server:

    1) Evaluation (free, no production use rights, 180-day limit)

    2) Developer (free, no production use rights)

    3) Express (free)

    4) Web (PAID)

    5) Standard (PAID)

    6) Enterprise (PAID) - CPU Core utilization restricted to 20 physical/40 hyperthreaded

    7) Enterprise Core (PAID) - CPU Core utilization up to Operating System Maximum

    8) I bought a license through a retail sales channel and have a product key to
    enter.

    Details about editions can be found at

    https://go.microsoft.com/fwlink/?LinkId=2109348&clcid=0x409

    Use of PAID editions of this software requires separate licensing through a

    Microsoft Volume Licensing program.

    By choosing a PAID edition, you are verifying that you have the appropriate

    number of licenses in place to install and run this software.

    Enter your edition(1-8): 2

    The license terms for this product can be found in

    /usr/share/doc/mssql-server or downloaded from:

    https://go.microsoft.com/fwlink/?LinkId=2104294&clcid=0x409

    The privacy statement can be viewed at:

    https://go.microsoft.com/fwlink/?LinkId=853010&clcid=0x409

    Enter the SQL Server system administrator password:

    Confirm the SQL Server system administrator password:

    Configuring SQL Server...

    ForceFlush is enabled for this instance.

    ForceFlush feature is enabled for log durability.

    Setup has completed successfully. SQL Server is now starting.

    ```


    Although you can configure multiple settings in several ways, for example, running
    SQL Server Management Studio on Windows while opening a session to your SQL Server
    instance running on Linux, in other cases, using the `mssql-conf` tool is the
    only way to perform those changes. Configuring a global trace flag or a TCP/IP
    port is a good example of requiring the `mssql-conf` tool, but in the Windows
    world, we would use SQL Server Configuration Manager. As mentioned earlier in
    Chapter [2](#393702_2_En_2_Chapter.xhtml), SQL Server Configuration Manager is
    not available on Linux.


    To see the available `mssql-conf` choices, run the utility without arguments:


    ```

    # /opt/mssql/bin/mssql-conf

    usage: mssql-conf [-h] [-n]  ...

    positional arguments:

    setup             Initialize and setup Microsoft SQL Server

    set               Set the value of a setting

    unset             Unset the value of a setting

    list              List the supported settings

    get               Gets the value of all settings in a section or of an

    individual setting

    traceflag         Enable/disable one or more traceflags

    set-sa-password   Set the system administrator (SA) password

    set-collation     Set the collation of system databases

    validate          Validate the configuration file

    set-edition       Set the edition of the SQL Server instance

    validate-ad-config

    Validate configuration for Active Directory

    Authentication

    setup-ad-keytab   Create a keytab for SQL Server to use to authenticate AD

    users

    optional arguments:

    -h, --help          show this help message and exit

    -n, --noprompt      Does not prompt the user and uses environment variables

    or defaults.

    ```


    It may not be immediately clear from that output but you can use the `mssql-conf`
    in two different ways.


    ### Using Specific Arguments


    The first is using one of the listed arguments, such as `traceflag` or `set-sa-password`,
    which enables or disables one or more trace flags or sets the system administrator
    password, respectively.


    ### Using the `set` and `unset` Arguments


    The second is using the `set` or `unset` arguments to set or unset the value of
    a specific setting. For example, a popular setting could be `memory.memorylimitmb`,
    which can be used to set the SQL Server memory limit. You can see the list of
    all the available settings by using the following command:


    ```

    /opt/mssql/bin/mssql-conf list

    ```


    SQL Server 2019 currently returns 60 entries, and I will mention the most useful
    ones in a moment. But first let me show you how to use `mssql-conf` to configure
    all three mentioned examples.


    ### Configuration Examples


    To enable a trace flag at the instance level, for example, 3226, you could run
    this:


    ```

    # /opt/mssql/bin/mssql-conf traceflag 3226 on

    SQL Server needs to be restarted in order to apply this setting. Please run

    ''systemctl restart mssql-server.service''.

    ```


    Run `systemctl restart mssql-server.service` as recommended. In the same way,
    the following command will disable the trace flag from the system:


    ```

    # /opt/mssql/bin/mssql-conf traceflag 3226 off

    ```


    To set the system administrator password, use `set-sa-password` as in the following
    example:


    ```

    /opt/mssql/bin/mssql-conf set-sa-password

    Enter the SQL Server system administrator password:

    Confirm the SQL Server system administrator password:

    Configuring SQL Server...

    ForceFlush is enabled for this instance.

    ForceFlush feature is enabled for log durability.

    The system administrator password has been changed.

    Please run ''sudo systemctl start mssql-server'' to start SQL Server.

    ```


    Next is an example using the `set` argument with a specific setting, in this case
    `memory.memorylimitmb`:


    ```

    /opt/mssql/bin/mssql-conf set memory.memorylimitmb 503808

    SQL Server needs to be restarted in order to apply this setting. Please run

    ''systemctl restart mssql-server.service''.

    ```


    This would set the SQL Server limit memory to 503,808 MB or 492 GB. As mentioned,
    `memory.memorylimitmb` is one of the 60 possible settings in SQL Server 2019.
    Next are some of the most useful settings:'
