    ```

    SELECT * FROM sys.dm_exec_query_profiles

    WHERE session_id = 55

    ```


    You would get a row per operator currently executing and, if you execute it a
    few times, should see some of the counters, like `row_count`, `cpu_time_ms`, or
    `logical_read_count`, updating its information as the query is being executed.
    To end the exercise, don’t forget to cancel the first query as it would take a
    long time to run and use a lot of resources.


    Finally, SQL Server Management Studio also includes a plan comparison tool that
    you can use to compare execution plans for troubleshooting purposes. This tool
    can be useful in query-tuning scenarios like testing changes in queries or changes
    in objects used by the queries like indexes . For more information about this
    tool, see [`http://blogs.msdn.com/b/sql_server_team/archive/2015/10/12/comparison-tool-released-with-latest-ssms.aspx`](http://blogs.msdn.com/b/sql_server_team/archive/2015/10/12/comparison-tool-released-with-latest-ssms.aspx).


    ## Summary


    The Query Store and Live Query Statistics are two of the most important database
    engine features introduced with SQL Server 2016 designed to help you in query
    performance troubleshooting. The Query Store allows you to troubleshoot query
    performance by collecting optimization and execution runtime statistics, helping
    you to pinpoint queries that may have regressed. Its data can also be used to
    find expensive queries that can be candidates for additional query tuning. Finally,
    the Query Store can be used to force a specific plan for a query, which can be
    useful if plan regression has been found.


    While the Query Store works with data of queries already completed, the Live Query
    Statistics can be used to troubleshoot queries while they are still running, something
    that can be useful for queries that either never finish, fail after many hours,
    or take many hours to complete.


    # Part IVPerformance Tuning and Troubleshooting


    ## 7. SQL Server In-Memory Technologies


    This chapter covers in-memory databases along with some other new technologies
    and paradigms that radically depart from the traditional disk-based rowstore architecture
    and query processing algorithms that most relational databases have been using
    for a few decades now. Current relational databases were architected back in the
    late 1970s, when hardware was totally different from what it is today, and databases
    were too large to fit in memory and assumed to be kept on disk. In addition to
    faster processors and declining memory cost, memory capacity in current hardware
    has increased in a way that most transactional databases could now fit entirely
    into it.


    Microsoft first introduced in-memory database technologies in the analytical and
    data warehouse arena. This technology, a column-based storage engine, was first
    available as part of the PowerPivot add-in for Excel and later included in the
    Analysis Services product. It eventually made it into the SQL Server relational
    engine in the form of columnstore indexes when it was introduced in SQL Server
    2012 and has now had very important enhancements throughout several releases.
    Although this technology is a column-based storage, it is worth noting that it
    is also a memory-optimized technology, and, in fact, it is sometimes called In-Memory
    Columnstore. With columnstore indexes, SQL Server introduced yet another new paradigm,
    batch execution mode, a query processing improvement when compared against the
    traditional row-based execution that SQL Server had been using in all its releases.


    In-memory technologies debuted into the transactional arena when In-Memory OLTP
    (Online Transaction Processing), widely known as Hekaton because of the name of
    its project announced in late 2012, was introduced with SQL Server 2014. In-Memory
    OLTP also introduced a new kind of stored procedure, called natively compiled,
    which is compiled to machine native code and loaded as in-process DLL (dynamic-link
    library) into memory. Similar to the beginning of columnstore indexes, Hekaton
    suffered considerable limitations on its initial release. Fortunately, it has
    greatly improved with the recent versions of the product, allowing more applications
    to be migrated to it.


    While SQL Server 2012 introduced columnstore indexes for analytical and data warehouse
    workloads and SQL Server 2014 In-Memory OLTP for transactional databases, the
    SQL Server 2016 release combined both technologies to provide real-time analytics
    by allowing you to create a columnstore index on operational tables. These columnstore
    indexes are now updatable and can be created, as mentioned, on operational tables,
    which can be either a regular disk-based or a memory-optimized Hekaton table.


    Although this chapter may contain more code than the remaining chapters of the
    book, the main focus is to show the new in-memory features, their characteristics,
    and performance benefits. It is not meant to be a programming guide, so implementing
    a feature may require a look at the SQL Server documentation.


    Since this chapter covers new technologies and paradigms, it also uses different
    terminology from the rest of the book. It uses the term “disk-based table” to
    refer to traditional tables in order to differentiate them from the new memory-optimized
    tables. Natively compiled stored procedures are also contrasted with the traditional
    stored procedures. In addition, it uses the term “rowstore” to refer to the traditional
    row storage as compared to the new column-based technologies (or columnstore).'
