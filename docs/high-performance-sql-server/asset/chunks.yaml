- fmt: '### Memory-Optimized Tables


    Let’s start playing with the technology. First, we need to create a database with
    Hekaton enabled. In order to achieve this, we need to create a filegroup with
    the `CONTAINS MEMORY_OPTIMIZED_DATA` clause, as shown in the following code. You
    can optionally add such a filegroup to an existing database, but only one such
    filegroup is allowed per database. Make sure you have the required drive and folder
    if you are running this in your system or change accordingly.


    Create a database:


    ```sql

    CREATE DATABASE Test

    ON PRIMARY (NAME = Test_data,

    FILENAME = ''C:\DATA\Test_data.mdf'', SIZE=500MB),

    FILEGROUP Test_fg CONTAINS MEMORY_OPTIMIZED_DATA

    (NAME = Test_fg, FILENAME = ''C:\DATA\Test_fg'')

    LOG ON (NAME = Test_log, Filename=''C:\DATA\Test_log.ldf'', SIZE=500MB)

    ```


    In the next example, I will try to create a table exactly as it appears in `AdventureWorks`
    as a quick exercise to understand some of the changes you need to do when migrating
    disk-based tables to In-Memory OLTP. In order to do this, I will use the script
    functionality available in SQL Server Management Studio (e.g., right-clicking
    the table and choosing Script Table as CREATE TO and New Query Editor Window).


    Note


    All the Hekaton examples in this chapter will use the `Test` database we have
    just created.


    This is the minimum version that can be successfully created as a disk-based table
    (just removing three columns that require a user-defined data type, which is not
    supported in Hekaton). I am adding the `WITH (MEMORY_OPTIMIZED=ON)` clause so
    you can test on your system.


    ```sql

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int IDENTITY(1,1) NOT FOR REPLICATION NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    SalesOrderNumber  AS (isnull(N''SO''+CONVERT(nvarchar(23),SalesOrderID),N''***
    ERROR ***'')),

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    TotalDue  AS (isnull((SubTotal+TaxAmt)+Freight,(0))),

    Comment nvarchar(128) NULL,

    rowguid uniqueidentifier ROWGUIDCOL  NOT NULL,

    ModifiedDate datetime NOT NULL,

    CONSTRAINT PK_SalesOrderHeader_SalesOrderID PRIMARY KEY CLUSTERED (

    SalesOrderID ASC

    )

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    Trying to run the `CREATE TABLE` statement returns some of the following error
    messages or recommendations:


    1.  Clustered indexes, which are the default for primary keys, are not supported
    with memory-optimized tables. Specify a `NONCLUSTERED` index instead.


    2.  Computed columns are not supported with memory-optimized tables (computed
    columns are supported starting with SQL Server 2017).


    3.  The feature `ROWGUIDCOL` is not supported with memory-optimized tables.


    Finally, up next is a working version, using the dbo schema:


    ```sql

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    Fortunately, SQL Server provides a better way to help you find and evaluate incompatibilities
    while migrating your tables to In-Memory OLTP. A tool called the Table Memory
    Optimization Advisor (or just Memory Optimization Advisor on recent versions)
    can help you to migrate your disk-based tables to memory-optimized tables. To
    run this tool, right-click the `Sales.SalesOrderHeader` table on the `AdventureWorks2017`
    database and select Memory Optimization Advisor. Running the migration validation
    part will show the screen in Figure [7-1](#393702_2_En_7_Chapter.xhtml#Fig1),
    which indicates that it cannot proceed with the migration and provides additional
    information and recommendations.


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig1_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Table Memory Optimization Advisor


    SQL Server provides a similar tool for stored procedures and other code called
    the Stored Procedure Native Compilation Advisor (or just Native Compilation Advisor),
    which you can find by right-clicking the code object you want to review. SQL Server
    2016 and later also includes the Transaction Performance Analysis Overview report,
    which can help you to decide which tables and code to move first to Hekaton. To
    run this report, right-click your database and select Report and Standard Reports.
    SQL Server 2014 provides similar reports, but you would have to enable and configure
    them using the Data Collector tool.'
  raw: '### Memory-Optimized Tables


    Let’s start playing with the technology. First, we need to create a database with
    Hekaton enabled. In order to achieve this, we need to create a filegroup with
    the `CONTAINS MEMORY_OPTIMIZED_DATA` clause, as shown in the following code. You
    can optionally add such a filegroup to an existing database, but only one such
    filegroup is allowed per database. Make sure you have the required drive and folder
    if you are running this in your system or change accordingly.


    Create a database:


    ```

    CREATE DATABASE Test

    ON PRIMARY (NAME = Test_data,

    FILENAME = ''C:\DATA\Test_data.mdf'', SIZE=500MB),

    FILEGROUP Test_fg CONTAINS MEMORY_OPTIMIZED_DATA

    (NAME = Test_fg, FILENAME = ''C:\DATA\Test_fg'')

    LOG ON (NAME = Test_log, Filename=''C:\DATA\Test_log.ldf'', SIZE=500MB)

    ```


    In the next example, I will try to create a table exactly as it appears in AdventureWorks
    as a quick exercise to understand some of the changes you need to do when migrating
    disk-based tables to In-Memory OLTP. In order to do this, I will use the script
    functionality available in SQL Server Management Studio (e.g., right-clicking
    the table and choosing Script Table as CREATE TO and New Query Editor Window).


    Note


    All the Hekaton examples in this chapter will use the Test database we have just
    created.


    This is the minimum version that can be successfully created as a disk-based table
    (just removing three columns that require a user-defined data type, which is not
    supported in Hekaton). I am adding the `WITH (MEMORY_OPTIMIZED=ON)` clause so
    you can test on your system.


    ```

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int IDENTITY(1,1) NOT FOR REPLICATION NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    SalesOrderNumber  AS (isnull(N''SO''+CONVERT(nvarchar(23),SalesOrderID),N''***
    ERROR ***'')),

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    TotalDue  AS (isnull((SubTotal+TaxAmt)+Freight,(0))),

    Comment nvarchar(128) NULL,

    rowguid uniqueidentifier ROWGUIDCOL  NOT NULL,

    ModifiedDate datetime NOT NULL,

    CONSTRAINT PK_SalesOrderHeader_SalesOrderID PRIMARY KEY CLUSTERED (

    SalesOrderID ASC

    )

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    Trying to run the `CREATE TABLE` statement returns some of the following error
    messages or recommendations:


    1.  Clustered indexes, which are the default for primary keys, are not supported
    with memory-optimized tables. Specify a `NONCLUSTERED` index instead.


    2.  Computed columns are not supported with memory-optimized tables (computed
    columns are supported starting with SQL Server 2017).


    3.  The feature `ROWGUIDCOL` is not supported with memory-optimized tables.


    Finally, up next is a working version, using the dbo schema:


    ```

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    Fortunately, SQL Server provides a better way to help you find and evaluate incompatibilities
    while migrating your tables to In-Memory OLTP. A tool called the Table Memory
    Optimization Advisor (or just Memory Optimization Advisor on recent versions)
    can help you to migrate your disk-based tables to memory-optimized tables. To
    run this tool, right-click the `Sales.SalesOrderHeader` table on the AdventureWorks2017
    database and select Memory Optimization Advisor. Running the migration validation
    part will show the screen in Figure [7-1](#393702_2_En_7_Chapter.xhtml#Fig1),
    which indicates that it cannot proceed with the migration and provides additional
    information and recommendations.


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig1_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Table Memory Optimization Advisor


    SQL Server provides a similar tool for stored procedures and other code called
    the Stored Procedure Native Compilation Advisor (or just Native Compilation Advisor),
    which you can find by right-clicking the code object you want to review. SQL Server
    2016 and later also includes the Transaction Performance Analysis Overview report,
    which can help you to decide which tables and code to move first to Hekaton. To
    run this report, right-click your database and select Report and Standard Reports.
    SQL Server 2014 provides similar reports, but you would have to enable and configure
    them using the Data Collector tool.'
  trans: '### 内存优化表


    让我们开始探索这项技术。首先，我们需要创建一个启用了 Hekaton 的数据库。为此，我们需要使用 `CONTAINS MEMORY_OPTIMIZED_DATA`
    子句创建一个文件组，如下列代码所示。你可以选择将此类文件组添加到现有数据库中，但每个数据库只允许一个这样的文件组。请确保你的系统拥有必要的驱动器和文件夹，或者根据实际情况进行调整。


    创建数据库：


    ```sql

    CREATE DATABASE Test

    ON PRIMARY (NAME = Test_data,

    FILENAME = ''C:\DATA\Test_data.mdf'', SIZE=500MB),

    FILEGROUP Test_fg CONTAINS MEMORY_OPTIMIZED_DATA

    (NAME = Test_fg, FILENAME = ''C:\DATA\Test_fg'')

    LOG ON (NAME = Test_log, Filename=''C:\DATA\Test_log.ldf'', SIZE=500MB)

    ```


    在下一个例子中，我将尝试创建一个与 `AdventureWorks` 中完全相同的表，作为一个快速练习，以理解将基于磁盘的表迁移到内存 OLTP 时需要进行的一些更改。为此，我将使用
    SQL Server Management Studio 中的脚本功能（例如，右键单击表并选择“将表脚本化为”->“CREATE 到”->“新建查询编辑窗口”）。


    > **注意**

    >

    > 本章中所有的 Hekaton 示例都将使用我们刚刚创建的 `Test` 数据库。


    这是一个可以成功创建为基于磁盘表的最小版本（仅移除了三个需要用户定义数据类型的列，这在 Hekaton 中不支持）。我添加了 `WITH (MEMORY_OPTIMIZED=ON)`
    子句，以便你可以在自己的系统上进行测试。


    ```sql

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int IDENTITY(1,1) NOT FOR REPLICATION NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    SalesOrderNumber  AS (isnull(N''SO''+CONVERT(nvarchar(23),SalesOrderID),N''***
    ERROR ***'')),

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    TotalDue  AS (isnull((SubTotal+TaxAmt)+Freight,(0))),

    Comment nvarchar(128) NULL,

    rowguid uniqueidentifier ROWGUIDCOL  NOT NULL,

    ModifiedDate datetime NOT NULL,

    CONSTRAINT PK_SalesOrderHeader_SalesOrderID PRIMARY KEY CLUSTERED (

    SalesOrderID ASC

    )

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    尝试运行 `CREATE TABLE` 语句会返回以下部分错误消息或建议：


    1.  聚集索引（主键的默认索引）在内存优化表中不受支持。请指定一个 `NONCLUSTERED` 索引。

    2.  计算列在内存优化表中不受支持（从 SQL Server 2017 开始支持计算列）。

    3.  `ROWGUIDCOL` 功能在内存优化表中不受支持。


    最后，接下来是一个可以正常工作的版本，使用了 dbo 架构：


    ```sql

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    幸运的是，SQL Server 提供了一种更好的方法来帮助你在将表迁移到内存 OLTP 时查找和评估不兼容性。一个名为“表内存优化顾问”（在新版本中简称为“内存优化顾问”）的工具可以帮助你将基于磁盘的表迁移到内存优化表。要运行此工具，请在
    `AdventureWorks2017` 数据库中右键单击 `Sales.SalesOrderHeader` 表，然后选择“内存优化顾问”。运行迁移验证部分将显示如图
    7-1 所示的屏幕，该屏幕指示无法继续进行迁移，并提供了附加信息和建议。


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig1_HTML.jpg](img/393702_2_En_7_Fig1_HTML.jpg)


    图 7-1


    表内存优化顾问


    SQL Server 为存储过程和其他代码提供了一个类似的工具，称为“存储过程本机编译顾问”（或简称“本机编译顾问”），你可以通过右键单击要检查的代码对象来找到它。SQL
    Server 2016 及更高版本还包含了“事务性能分析概述”报告，该报告可以帮助你决定首先将哪些表和代码迁移到 Hekaton。要运行此报告，请右键单击你的数据库，选择“报告”，然后选择“标准报告”。SQL
    Server 2014 提供了类似的报告，但你必须使用“数据收集器”工具来启用和配置它们。'
- fmt: "### Indexes\n\nIt was probably not obvious in our create table example earlier,\
    \ but every table requires at least one index. (Up to a maximum of eight can be\
    \ defined in SQL Server 2014 and 2016 versions. Error 1910 is returned if you\
    \ try to create more than this maximum number.) Hekaton was introduced with two\
    \ new index types, memory-optimized nonclustered indexes and hash indexes, but\
    \ each has a very different purpose. Indexes are automatically updated and live\
    \ only in memory; they are never persisted on disk, and they are actually rebuilt\
    \ every time SQL Server starts.\n\n**Note**\nMemory-optimized nonclustered indexes\
    \ were originally (and still sometimes) called range indexes, but they were later\
    \ renamed to just nonclustered indexes. This naming convention is confusing sometimes\
    \ as now we have nonclustered indexes for traditional tables, for columnstore\
    \ indexes, and for memory-optimized tables.\n\nHash indexes are designed to provide\
    \ the best possible performance by being able to find single rows faster than\
    \ any other SQL Server index. Hash indexes use some concepts new to SQL Server\
    \ users and require us to configure its initial size by specifying a bucket size.\
    \ Buckets are basically virtual containers for rows, and a built-in hash function\
    \ is used to map values to those buckets. For example, Figure 7-2 shows a hash\
    \ index on the `City` column with eight buckets. Using this hash index to find\
    \ the row `San Francisco` will use the hash function that will return bucket 2,\
    \ and the Hekaton engine will find the row there.\n\n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig2_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig2_HTML.jpg)\n\
    *Figure 7-2: Hash indexes showing hash collisions*\n\nHowever, collisions may\
    \ also occur while using the hash index. If you try to find the row `Prague`,\
    \ the hash function will correctly return bucket 5\\. However, since there is\
    \ more than one row, the engine will have to search a linked list to find the\
    \ requested row. Although having a small number of rows is not an issue, a performance\
    \ problem may appear when there is a large number of rows on each bucket. The\
    \ hash function will always efficiently find the correct bucket, but traversing\
    \ a long list may be a performance concern. We can monitor such information by\
    \ looking at the `avg_chain_length` column of the `sys.dm_db_xtp_hash_index_stats`\
    \ DMV, which records the average number of rows of all the hash buckets in the\
    \ index.\n\nUnfortunately, the bucket count cannot be changed dynamically, and,\
    \ in SQL Server 2014, it would require the creation of a new table with the new\
    \ `BUCKET_COUNT` configuration. SQL Server 2016 and later now allows using the\
    \ `ALTER TABLE` statement to change the bucket size, but it is still a major change\
    \ to the table structure, and it is a blocking operation that you may want to\
    \ perform only during a maintenance window as most likely it will require an application\
    \ outage. Because of this limitation, it is extremely important to estimate and\
    \ plan what the best value for the number of buckets to use is. Since the best\
    \ performance is achieved when a small number of rows is available per bucket,\
    \ the main recommendation is to configure the `BUCKET_COUNT` value to be the same\
    \ or twice the number of unique rows in the index.\n\nLet me show you some examples\
    \ with a smaller version of `SalesOrderHeader`. Creating a hash index requires\
    \ the `NONCLUSTERED HASH` keyword along with a `BUCKET_COUNT` definition:\n\n\
    ```sql\nCREATE TABLE dbo.SalesOrderHeader(\n    SalesOrderID int PRIMARY KEY NONCLUSTERED\
    \ HASH WITH\n        (BUCKET_COUNT = 10000),\n    OrderDate datetime NOT NULL,\n\
    \    ShipDate datetime NULL,\n    Status tinyint NOT NULL,\n    CustomerID int\
    \ NOT NULL,\n) WITH (MEMORY_OPTIMIZED = ON)\n```\n\nAfter the table is being populated,\
    \ you can do an analysis of the bucket usage by using the `sys.dm_db_xtp_hash_index_stats`:\n\
    \n```sql\nSELECT OBJECT_NAME(object_id), * FROM sys.dm_db_xtp_hash_index_stats\n\
    ```\n\nThe column `total_bucket_count` will show the total number of hash buckets\
    \ in the index, which is rounded to the next power of 2\\. For the example shown\
    \ where 10,000 buckets are requested, the index will be created with 16,384.\n\
    \nNonclustered indexes are memory-optimized b-tree indexes and more similar to\
    \ the nonclustered indexes we are used to on disk tables. They just require the\
    \ `NONCLUSTERED` keyword.\n\n```sql\nCREATE TABLE dbo.SalesOrderHeader(\n    SalesOrderID\
    \ int PRIMARY KEY NONCLUSTERED,\n    OrderDate datetime NOT NULL,\n    ShipDate\
    \ datetime NULL,\n    Status tinyint NOT NULL,\n    CustomerID int NOT NULL,\n\
    ) WITH (MEMORY_OPTIMIZED = ON)\n```\n\n**Note**\nAlthough a heavy computer science\
    \ level paper, you can learn more about the new range indexes on the paper “The\
    \ Bw-Tree: A B-Tree for New Hardware Platforms” by Justin Levandoski et. al, which\
    \ you can find online at [`www.microsoft.com/en-us/research/publication/the-bw-tree-a-b-tree-for-new-hardware`](http://www.microsoft.com/en-us/research/publication/the-bw-tree-a-b-tree-for-new-hardware).\n\
    \nAs a summary, hash indexes provide the best performance to search rows with\
    \ equality predicates (once again, assuming `BUCKET_COUNT` has been correctly\
    \ configured and maintained). Hash indexes cannot be used to find rows using nonequality\
    \ predicates or even using the order of the hash index. If no better index is\
    \ found, the previous operations would require a hash index scan. Memory-optimized\
    \ nonclustered indexes behave pretty much like a disk-based nonclustered index.\
    \ You can perform all the typical operations including searching rows with equality\
    \ and nonequality predicates and using the order of the index, range predicates,\
    \ although, as mentioned, hash indexes are superior on equality searches."
  raw: '### Indexes


    It was probably not obvious in our create table example earlier, but every table
    requires at least one index. (Up to a maximum of eight can be defined in SQL Server
    2014 and 2016 versions. Error 1910 is returned if you try to create more than
    this maximum number.) Hekaton was introduced with two new index types, memory-optimized
    nonclustered indexes and hash indexes, but each has a very different purpose.
    Indexes are automatically updated and live only in memory; they are never persisted
    on disk, and they are actually rebuilt every time SQL Server starts.


    Note


    Memory-optimized nonclustered indexes were originally (and still sometimes) called
    range indexes, but they were later renamed to just nonclustered indexes. This
    naming convention is confusing sometimes as now we have nonclustered indexes for
    traditional tables, for columnstore indexes, and for memory-optimized tables.


    Hash indexes are designed to provide the best possible performance by being able
    to find single rows faster than any other SQL Server index. Hash indexes use some
    concepts new to SQL Server users and require us to configure its initial size
    by specifying a bucket size. Buckets are basically virtual containers for rows,
    and a built-in hash function is used to map values to those buckets. For example,
    Figure [7-2](#393702_2_En_7_Chapter.xhtml#Fig2) shows a hash index on the `City`
    column with eight buckets. Using this hash index to find the row `San Francisco`
    will use the hash function that will return bucket 2, and the Hekaton engine will
    find the row there.


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig2_HTML.jpg](images/393702_2_En_7_Chapter/393702_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Hash indexes showing hash collisions


    However, collisions may also occur while using the hash index. If you try to find
    the row `Prague`, the hash function will correctly return bucket 5\. However,
    since there is more than one row, the engine will have to search a linked list
    to find the requested row. Although having a small number of rows is not an issue,
    a performance problem may appear when there is a large number of rows on each
    bucket. The hash function will always efficiently find the correct bucket, but
    traversing a long list may be a performance concern. We can monitor such information
    by looking at the `avg_chain_length` column of the `sys.dm_db_xtp_hash_index_stats`
    DMV, which records the average number of rows of all the hash buckets in the index.


    Unfortunately, the bucket count cannot be changed dynamically, and, in SQL Server
    2014, it would require the creation of a new table with the new `BUCKET_COUNT`
    configuration. SQL Server 2016 and later now allows using the `ALTER TABLE` statement
    to change the bucket size, but it is still a major change to the table structure,
    and it is a blocking operation that you may want to perform only during a maintenance
    window as most likely it will require an application outage. Because of this limitation,
    it is extremely important to estimate and plan what the best value for the number
    of buckets to use is. Since the best performance is achieved when a small number
    of rows is available per bucket, the main recommendation is to configure the `BUCKET_COUNT`
    value to be the same or twice the number of unique rows in the index.


    Let me show you some examples with a smaller version of `SalesOrderHeader`. Creating
    a hash index requires the `NONCLUSTERED HASH` keyword along with a `BUCKET_COUNT`
    definition:


    ```

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int PRIMARY KEY NONCLUSTERED HASH WITH

    (BUCKET_COUNT = 10000),

    OrderDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    After the table is being populated, you can do an analysis of the bucket usage
    by using the `sys.dm_db_xtp_hash_index_stats`:


    ```

    SELECT OBJECT_NAME(object_id), * FROM sys.dm_db_xtp_hash_index_stats

    ```


    The column `total_bucket_count` will show the total number of hash buckets in
    the index, which is rounded to the next power of 2\. For the example shown where
    10,000 buckets are requested, the index will be created with 16,384.


    Nonclustered indexes are memory-optimized b-tree indexes and more similar to the
    nonclustered indexes we are used to on disk tables. They just require the `NONCLUSTERED`
    keyword.


    ```

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int PRIMARY KEY NONCLUSTERED,

    OrderDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    Note


    Although a heavy computer science level paper, you can learn more about the new
    range indexes on the paper “The Bw-Tree: A B-Tree for New Hardware Platforms”
    by Justin Levandoski et. al, which you can find online at [`www.microsoft.com/en-us/research/publication/the-bw-tree-a-b-tree-for-new-hardware`](http://www.microsoft.com/en-us/research/publication/the-bw-tree-a-b-tree-for-new-hardware).


    As a summary, hash indexes provide the best performance to search rows with equality
    predicates (once again, assuming `BUCKET_COUNT` has been correctly configured
    and maintained). Hash indexes cannot be used to find rows using nonequality predicates
    or even using the order of the hash index. If no better index is found, the previous
    operations would require a hash index scan. Memory-optimized nonclustered indexes
    behave pretty much like a disk-based nonclustered index. You can perform all the
    typical operations including searching rows with equality and nonequality predicates
    and using the order of the index, range predicates, although, as mentioned, hash
    indexes are superior on equality searches .'
  trans: "### 索引\n\n在我们之前创建表的例子中可能不太明显，但每个表都至少需要一个索引。（在 SQL Server 2014 和 2016 版本中，最多可以定义八个。如果尝试创建超过此最大数量的索引，将返回错误\
    \ 1910。）Hekaton 引入了两种新的索引类型：内存优化非聚集索引和哈希索引，但它们的用途截然不同。索引会自动更新，且仅存在于内存中；它们永远不会持久化到磁盘上，并且实际上每次\
    \ SQL Server 启动时都会重建。\n\n**注意**\n内存优化非聚集索引最初（并且有时仍然）被称为范围索引，但后来被重命名为非聚集索引。这种命名约定有时会令人困惑，因为现在我们有用于传统表的非聚集索引、用于列存储索引的非聚集索引以及用于内存优化表的非聚集索引。\n\
    \n哈希索引的设计旨在通过比任何其他 SQL Server 索引更快地找到单行来提供最佳性能。哈希索引使用了一些对 SQL Server 用户来说是新的概念，并且要求我们通过指定桶大小来配置其初始大小。桶基本上是行的虚拟容器，内置的哈希函数用于将值映射到这些桶中。例如，图\
    \ 7-2 显示了在 `City` 列上创建的具有八个桶的哈希索引。使用此哈希索引查找行 `San Francisco` 将使用返回桶 2 的哈希函数，然后\
    \ Hekaton 引擎将在该处找到该行。\n\n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig2_HTML.jpg](img/393702_2_En_7_Fig2_HTML.jpg)\n\
    *图 7-2：显示哈希冲突的哈希索引*\n\n然而，使用哈希索引时也可能发生冲突。如果您尝试查找行 `Prague`，哈希函数将正确返回桶 5。但是，由于存在不止一行，引擎将不得不搜索链表以找到请求的行。虽然行数较少不是问题，但当每个桶中的行数很多时，可能会出现性能问题。哈希函数总是能高效地找到正确的桶，但遍历长链表可能是一个性能问题。我们可以通过查看动态管理视图\
    \ `sys.dm_db_xtp_hash_index_stats` 的 `avg_chain_length` 列来监控此类信息，该列记录了索引中所有哈希桶的平均行数。\n\
    \n不幸的是，桶计数不能动态更改，在 SQL Server 2014 中，这需要使用新的 `BUCKET_COUNT` 配置创建一个新表。SQL Server\
    \ 2016 及更高版本现在允许使用 `ALTER TABLE` 语句来更改桶大小，但这仍然是对表结构的重大更改，并且是一个阻塞操作，您可能只希望在维护窗口期间执行，因为它很可能需要应用程序中断。由于此限制，估算和规划最佳的桶数量值极为重要。因为当每个桶中的行数较少时可以获得最佳性能，所以主要建议是将\
    \ `BUCKET_COUNT` 值配置为与索引中的唯一行数相同或是其两倍。\n\n让我用一个小型化的 `SalesOrderHeader` 为例向您展示一些例子。创建哈希索引需要\
    \ `NONCLUSTERED HASH` 关键字以及 `BUCKET_COUNT` 定义：\n\n```sql\nCREATE TABLE dbo.SalesOrderHeader(\n\
    \    SalesOrderID int PRIMARY KEY NONCLUSTERED HASH WITH\n        (BUCKET_COUNT\
    \ = 10000),\n    OrderDate datetime NOT NULL,\n    ShipDate datetime NULL,\n \
    \   Status tinyint NOT NULL,\n    CustomerID int NOT NULL,\n) WITH (MEMORY_OPTIMIZED\
    \ = ON)\n```\n\n表填充数据后，您可以使用 `sys.dm_db_xtp_hash_index_stats` 分析桶的使用情况：\n\n```sql\n\
    SELECT OBJECT_NAME(object_id), * FROM sys.dm_db_xtp_hash_index_stats\n```\n\n\
    `total_bucket_count` 列将显示索引中哈希桶的总数，该数字被向上取整到下一个 2 的幂。在请求 10,000 个桶的示例中，索引将创建为\
    \ 16,384 个桶。\n\n非聚集索引是内存优化的 B 树索引，更类似于我们习惯的磁盘表上的非聚集索引。它们只需要 `NONCLUSTERED` 关键字。\n\
    \n```sql\nCREATE TABLE dbo.SalesOrderHeader(\n    SalesOrderID int PRIMARY KEY\
    \ NONCLUSTERED,\n    OrderDate datetime NOT NULL,\n    ShipDate datetime NULL,\n\
    \    Status tinyint NOT NULL,\n    CustomerID int NOT NULL,\n) WITH (MEMORY_OPTIMIZED\
    \ = ON)\n```\n\n**注意**\n虽然是一篇计算机科学水平较高的论文，但您可以在 Justin Levandoski 等人撰写的论文 “The\
    \ Bw-Tree: A B-Tree for New Hardware Platforms” 中了解更多关于新范围索引的信息，您可以在线找到： [`www.microsoft.com/en-us/research/publication/the-bw-tree-a-b-tree-for-new-hardware`](http://www.microsoft.com/en-us/research/publication/the-bw-tree-a-b-tree-for-new-hardware)。\n\
    \n总而言之，哈希索引为使用等值谓词搜索行提供了最佳性能（再次假设 `BUCKET_COUNT` 已正确配置和维护）。哈希索引不能用于使用非等值谓词或利用哈希索引的顺序来查找行。如果没有找到更好的索引，之前的操作将需要进行哈希索引扫描。内存优化非聚集索引的行为与基于磁盘的非聚集索引非常相似。您可以执行所有典型操作，包括使用等值和非等值谓词搜索行、利用索引顺序、范围谓词，尽管如前所述，哈希索引在等值搜索方面更优。"
- fmt: '### Natively Compiled Modules


    As mentioned earlier, there are three types of natively compiled modules in SQL
    Server 2016 and later, including stored procedures, scalar and table-valued user-defined
    functions, and triggers. Only stored procedures were available when Hekaton was
    originally introduced in SQL Server 2014. Let’s review all of them here. The following
    code is a basic definition of a natively compiled stored procedure:


    ```

    CREATE PROCEDURE test

    WITH NATIVE_COMPILATION, SCHEMABINDING,

    EXECUTE AS OWNER

    AS

    BEGIN ATOMIC WITH (

    TRANSACTION ISOLATION LEVEL = SNAPSHOT,

    LANGUAGE = ''us_english'')

    SELECT SalesOrderID, OrderDate, CustomerID

    FROM dbo.SalesOrderHeader

    END

    ```


    An example of its execution follows:


    ```

    EXEC test

    ```


    User-defined functions are sometimes mentioned as concern for performance problems.
    Natively compiled user-defined functions perform better but still should only
    be used when appropriate. Next is the most basic scalar user-defined function
    to show the required syntax:


    ```

    CREATE FUNCTION test_function()

    RETURNS int

    WITH NATIVE_COMPILATION, SCHEMABINDING

    AS BEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''English'')

    RETURN 1

    END

    ```


    You would call it using the following:


    ```

    SELECT dbo.test_function()

    ```


    This is an example of a table-valued user-defined function:


    ```

    CREATE FUNCTION dbo.test_tvf()

    RETURNS TABLE

    WITH NATIVE_COMPILATION, SCHEMABINDING

    AS

    RETURN SELECT SalesOrderID, OrderDate, Status FROM dbo.SalesOrderHeader

    ```


    You would call it using the following:


    ```

    SELECT * FROM dbo.test_tvf()

    ```


    Similarly, this is the code you would use for a trigger. Natively compiled triggers
    are only available on memory-optimized tables, and these are the only kind of
    triggers allowed on these tables.


    ```

    CREATE TRIGGER Insert_SalesOrderHeader

    ON dbo.SalesOrderHeader

    WITH NATIVE_COMPILATION, SCHEMABINDING

    FOR INSERT, UPDATE, DELETE

    AS BEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''us_english'')

    -- trigger code

    END

    ```


    In order to avoid unnecessary runtime checks for natively compiled modules, which
    have to be performed at execution time, some choices must be defined at compile
    time. The required options for any natively compiled module are as follows:


    *   `SCHEMABINDING`: Binds the natively compiled module to the schema of the underlying
    table or tables.

    *   `EXECUTE AS`: Specifies the security context under which to execute the natively
    compiled module.

    *   `ATOMIC`: Indicates that the entire block is executed as an atomic block and
    the entire block is either committed or rolled back. Part of the ANSI SQL standard.

    *   `TRANSACTION ISOLATION LEVEL`: Defines the transaction isolation level, but
    only the following three choices are available: `SNAPSHOT`, `REPEATABLE READ`,
    and `SERIALIZABLE`. Different from the traditional SQL Server code, there is no
    default transaction isolation level for natively compiled modules so this option
    has to be specified.

    *   `LANGUAGE`: Specifies the language environment for the code.


    Two other options, although not required, are `DATEFIRST` and `DATEFORMAT`, which
    specify the first day of the week and the date format. If not specified, they
    are inferred from the `LANGUAGE` option.


    ### Changing Tables and Natively Compiled Modules


    `ALTER TABLE` is now available to change most of the properties of a table including
    adding and removing columns, adding and removing indexes, or changing the value
    for `BUCKET_COUNT` on a hash index. `CREATE INDEX` and `DROP INDEX` are not allowed
    with memory-optimized tables; `ALTER TABLE` has to be used instead. Let’s look
    at a few examples assuming the following initial table:


    1.  Add a column. The following code adds three columns (by the way, these three
    columns were originally removed from the disk-based table as they were based on
    user-defined data types):


    ```

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL

    ) WITH (MEMORY_OPTIMIZED = ON)

    ```


    2.  Add an index. The following code adds a nonclustered index and a hash index:


    ```

    ALTER TABLE dbo.SalesOrderHeader

    ADD OnlineOrderFlag bit NOT NULL,

    PurchaseOrderNumber nvarchar(25) NULL,

    AccountNumber nvarchar(25) NULL

    ```


    3.  Change the bucket count of an index. The following code rebuilds an index
    and changes the bucket count to 100,000:


    ```

    ALTER TABLE dbo.SalesOrderHeader

    ADD INDEX IX_ModifiedDate (ModifiedDate),

    INDEX IX_CustomerID HASH (CustomerID) WITH (BUCKET_COUNT = 10000)

    ```


    4.  Remove columns or indexes. The following code removes the three columns added
    earlier:


    ```

    ALTER TABLE dbo.SalesOrderHeader

    ALTER INDEX IX_CustomerID

    REBUILD WITH (BUCKET_COUNT = 100000)

    ```


    ```

    ALTER TABLE dbo.SalesOrderHeader

    DROP COLUMN OnlineOrderFlag, PurchaseOrderNumber, AccountNumber

    ```


    Making changes to a table may interfere with the `SCHEMABINDING` property of natively
    compiled modules. Assume you have the following natively compiled stored procedure,
    which uses several columns from `SalesOrderHeader`:


    ```

    CREATE PROCEDURE dbo.test

    WITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS owner

    AS

    BEGIN ATOMIC

    WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''us_english'')

    SELECT SubTotal, ModifiedDate FROM dbo.SalesOrderHeader

    END

    ```


    Trying to drop a column from the table one of the columns referenced by the procedure


    ```

    ALTER TABLE  dbo.SalesOrderHeader

    DROP COLUMN SubTotal

    ```


    would return the following error:


    ```

    Msg 5074, Level 16, State 1, Line 1

    The object ''test'' is dependent on column ''SubTotal''.

    Msg 4922, Level 16, State 9, Line 1

    ALTER TABLE DROP COLUMN SubTotal failed because one or more objects access this
    column.

    ```


    However, you will be able to drop any other column not referenced by this procedure
    or any other schema-bound object:


    ```

    ALTER TABLE dbo.SalesOrderHeader

    DROP COLUMN TaxAmt

    ```


    Fortunately, using a star (*) to select all the columns in a table is not allowed
    in this case. Trying it would get error 1054, complaining that such a syntax is
    not allowed in schema-bound objects.


    New with SQL Server 2016, you can also alter natively compiled stored procedures.
    Other natively compiled objects like triggers and scalar and table-valued user-defined
    functions can be altered as well. For example, the following code alters the previously
    created stored procedure to remove one column from the `SELECT` list and change
    the isolation level:


    ```

    ALTER PROCEDURE dbo.test

    WITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS owner

    AS

    BEGIN ATOMIC

    WITH (TRANSACTION ISOLATION LEVEL = REPEATABLE READ, LANGUAGE = ''us_english'')

    SELECT SubTotal FROM dbo.SalesOrderHeader

    END

    ```'
