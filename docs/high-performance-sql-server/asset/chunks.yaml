- fmt: '### 简化


    简化的下一步是查询优化过程，实际上也是查询优化的第一步，由查询优化器执行。一旦查询优化器获得特定查询的最终逻辑树，如前一节所述，它会在进入完整的优化过程之前尝试对其进行简化。其中一些简化操作包括：


    1.  **谓词下推**：在这种简化优化中，`WHERE`子句中的过滤器可能会被下推到逻辑查询树中，以便实现早期数据过滤。此过程还可以帮助在完整的优化过程中更好地匹配索引和计算列。

    2.  **矛盾检测**：在此步骤中检测并移除矛盾。矛盾可能与检查约束或查询的编写方式有关。通过移除查询中的冗余操作，查询执行得到改进，因为无需将资源花费在不必要的操作上。例如，移除对不需要的表的访问可以节省`I/O`资源。

    3.  **子查询简化**：子查询被转换为连接。但是，由于子查询并不总是直接转换为内连接，因此可能会根据需要添加`GROUP BY`和外连接操作。

    4.  **冗余连接移除**：可以移除冗余的内连接和外连接。外键连接消除是这种简化的一个例子。当外键约束可用且仅请求引用表的列时，连接可以被移除。


    矛盾检测是我在会议演讲中最喜欢展示的主题之一，所以我想至少在这里展示一个例子。让我们从一个检查约束开始。`AdventureWorks`数据库有以下检查约束（无需运行代码，它已经存在）：

    ```

    ALTER TABLE [HumanResources].[Employee] WITH CHECK ADD CONSTRAINT [CK_Employee_VacationHours]

    CHECK (([VacationHours]>=(-40) AND [VacationHours]<=(240)))

    ```

    这意味着`VacationHours`列将不接受-40和240范围之外的值。例如，如果您运行以下查询，您将得到如图[1-6](#393702_2_En_1_Chapter.xhtml#Fig6)所示的计划，这是一个非常正常的预期计划：

    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig6_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig6_HTML.jpg)

    图 1-6

    `VacationHours`谓词的计划

    ```

    SELECT * FROM HumanResources.Employee

    WHERE VacationHours < 300

    ```

    然而，有趣的是观察查询优化器在您运行以下查询时的行为：

    ```

    SELECT * FROM HumanResources.Employee

    WHERE VacationHours > 300

    ```

    我们没有得到与图[1-6](#393702_2_En_1_Chapter.xhtml#Fig6)所示相同或类似的计划，而是得到了图[1-7](#393702_2_En_1_Chapter.xhtml#Fig7)中的计划。

    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig7_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig7_HTML.jpg)

    图 1-7

    矛盾检测

    这个非常简单的、只有一个常量扫描操作的计划基本上意味着查询优化器决定根本不创建计划。由于检查约束，查询优化器知道查询不可能返回任何记录，因此创建了一个常量扫描算子，该算子实际上不执行任何工作。


    您可以通过禁用检查约束并运行以下语句来验证检查约束确实在优化中起到了帮助作用：

    ```

    ALTER TABLE HumanResources.Employee NOCHECK CONSTRAINT CK_Employee_VacationHours

    ```

    禁用检查约束后，如果您再次运行最后一个查询（使用`VacationHours > 300`谓词），您应该会再次看到图[1-6](#393702_2_En_1_Chapter.xhtml#Fig6)中所示的执行计划，其中需要聚集索引扫描。如果没有检查约束，`SQL
    Server`别无选择，只能扫描表并执行过滤以验证是否存在任何符合请求谓词的记录。


    在结束这个练习之前，别忘了重新启用检查约束：

    ```

    ALTER TABLE HumanResources.Employee WITH CHECK CHECK CONSTRAINT CK_Employee_VacationHours

    ```

    最后，如果有人这样写查询会怎样？

    ```

    SELECT * FROM HumanResources.Employee

    WHERE VacationHours > 240 AND VacationHours < 100

    ```

    这个查询再次代表了一个明显的矛盾，因为这两个谓词条件不可能同时存在。查询将不返回任何数据，但更重要的是，查询处理器根本不需要任何时间就能发现这一点，创建的计划将只是另一个常量扫描，如图[1-7](#393702_2_En_1_Chapter.xhtml#Fig7)所示。您可能仍然认为没有人会写这样的查询，但这只是一个展示概念的非常简单的例子。查询优化器仍然会在具有多个表和谓词的非常复杂的查询中发现问题，或者即使一个谓词在一个查询中而矛盾的谓词在一个视图中。


    简化部分完成后，我们终于可以进入完整的优化过程了。但首先，是否需要检查一下是否真的需要优化呢？


    ### 简单计划优化


    在某些情况下可能不需要完整的优化。对于非常简单的查询就是这种情况，其中计划的选择可能非常简单或显而易见。查询优化器有一种称为简单计划的优化，可用于避免昂贵的优化过程。如前所述，优化过程的初始化和运行可能成本很高。


    我们最后执行的一个查询可能是简单计划的一个好例子：

    ```

    SELECT DatabaseLogID

    FROM dbo.DatabaseLog

    WHERE DatabaseLogID = 1

    ```

    当您运行这样的查询时，您可以请求一个执行计划来确认它是一个简单计划。


    注意：有几种方法可以请求估计的或实际的执行计划。要请求实际的图形执行计划，请在`SQL Server Management Studio`工具栏上选择“包括实际执行计划”（或`Ctrl-M`）。获得图形执行计划后，可以右键单击它并选择“显示执行计划
    XML …”。有关执行计划的更多详细信息，请参阅文档 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/execution-plans`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/execution-plans)。


    获得执行计划后，有几种方法可以验证它是简单计划优化。例如，您可以通过选择计划并查看“视图”➤“属性窗口”来查看计划属性。然后您可以查找“优化级别”属性。如果您查看`XML`计划，您会看到类似这样的内容：


    如果一个计划不符合简单优化的条件，`StatementOptmLevel`将显示值`FULL`，这意味着需要完整的优化。


    最后，如果查询不符合简单计划的条件，查询优化器将执行完整的优化。我们将在本节接下来介绍这个内容。但首先，如前所述，一个查询可能有数百万个可能的候选执行计划。因此，我们需要选择来创建替代计划，并清除可能不需要的计划。转换规则创建替代计划。一些定义的启发式方法用于清除或限制考虑的计划数量。转换规则是这类优化器的基本算法。事实上，一些优化器甚至被称为基于规则的优化器。然而，即使`SQL
    Server`优化器使用规则来搜索替代计划，它实际上被称为基于成本的优化器，因为关于选择计划的最终决定将是基于成本的决定。所以，接下来让我们讨论转换规则。'
  raw: '### Simplification


    Simplification is the next step on the query optimization process and, in fact,
    the first step of the query optimization per se and performed by the query optimizer.
    Once the query optimizer gets the final logical tree for a specific query, as
    indicated in the previous section, it will try to simplify it before going to
    the full optimization process. Some of these simplification operations include


    1.  Predicate pushdown: In this simplification optimization, filters in WHERE
    clauses may be pushed down in the logical query tree in order to enable early
    data filtering. This process can also help on better matching of indexes and computed
    columns later in the full optimization process.


    2.  Contradiction detection: Contradictions are detected and removed on this step.
    Contradictions can be related to check constraints or how the query is written.
    By removing redundant operations on a query, query execution is improved, as there
    is no need to spend resources on unnecessary operations. For example, removing
    access to a non-needed table can save I/O resources.


    3.  Simplification of subqueries: Subqueries are converted into joins. However,
    since subqueries do not always translate directly to an inner join, group by and
    outer join operations may be added as necessary.


    4.  Redundant joins removal: Redundant inner and outer joins could be removed.
    Foreign key join elimination is an example of this simplification. When foreign
    key constraints are available and only columns of the referencing table are requested,
    a join can potentially be removed.


    Contradiction detection is one of my favorite topics to show on my presentations
    at conferences, so I thought I would like to show at least one example here. Let
    us start with a check constraint. AdventureWorks has the following check constraint
    (no need to run the code, it is already there):


    ```

    ALTER TABLE [HumanResources].[Employee] WITH CHECK ADD CONSTRAINT [CK_Employee_VacationHours]

    CHECK (([VacationHours]>=(-40) AND [VacationHours]<=(240)))

    ```


    This means that no values outside –40 and 240 will be accepted for the VacationHours
    column. If you run the following query, for example, you will get the plan shown
    in Figure [1-6](#393702_2_En_1_Chapter.xhtml#Fig6), a pretty much normal expected
    plan:


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig6_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Plan for a VacationHours predicate


    ```

    SELECT * FROM HumanResources.Employee

    WHERE VacationHours < 300

    ```


    However, it is interesting to see the query optimizer behavior if you run the
    following query:


    ```

    SELECT * FROM HumanResources.Employee

    WHERE VacationHours > 300

    ```


    Instead of getting the same or a similar plan to the one shown in Figure [1-6](#393702_2_En_1_Chapter.xhtml#Fig6),
    we now get the plan in Figure [1-7](#393702_2_En_1_Chapter.xhtml#Fig7).


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig7_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Contradiction detection


    This very simple plan with a single constant scan operation basically means that
    the query optimizer decided not to create a plan at all. Because of the check
    constraint, the query optimizer knows there is no way the query can return any
    records at all and create a constant scan operator which is not really performing
    any work at all.


    You could validate that the check constraint is in fact helping on the optimization
    by disabling it, running the following statement:


    ```

    ALTER TABLE HumanResources.Employee NOCHECK CONSTRAINT CK_Employee_VacationHours

    ```


    After disabling the check constraint, if you run the last query again (using the
    VacationHours > 300 predicate), you should see again the execution plan shown
    in Figure [1-6](#393702_2_En_1_Chapter.xhtml#Fig6) where a clustered index scan
    is needed. Without the check constraint, SQL Server has no other choice but to
    scan the table and perform the filter to validate if any records with the requested
    predicate exist at all.


    Before ending this exercise, don’t forget to reenable back the check constraint:


    ```

    ALTER TABLE HumanResources.Employee WITH CHECK CHECK CONSTRAINT CK_Employee_VacationHours

    ```


    Finally, what if someone writes a query like this?


    ```

    SELECT * FROM HumanResources.Employee

    WHERE VacationHours > 240 AND VacationHours < 100

    ```


    Once again, this query represents an obvious contradiction, since those two predicate
    conditions could never exist at the same time. The query will return no data,
    but more importantly it would not take any time at all for the query processor
    to figure it out, and the plan created will be just another constant scan as shown
    in Figure [1-7](#393702_2_En_1_Chapter.xhtml#Fig7). You may still argue that nobody
    would ever write such a query, but this is a very simple example just to show
    the concept. The query optimizer would still find the problem in very complicated
    queries with multiple tables and predicates or even if one predicate is in one
    query and the contradicting predicate is on a view.


    After the simplification part is completed, we could finally move to the full
    optimization process. But first, what about a check to validate if an optimization
    is required after all?


    ### Trivial Plan Optimization


    There may be cases in which a full optimization is not required. This could be
    the case for very simple queries in which the plan choice may be very simple or
    obvious. The query optimizer has an optimization called trivial plan which can
    be used to avoid the expensive optimization process. As mentioned earlier, the
    optimization process may be expensive to initialize and run.


    One of our last executed queries may be a good example of a trivial plan:


    ```

    SELECT DatabaseLogID

    FROM dbo.DatabaseLog

    WHERE DatabaseLogID = 1

    ```


    When you run such query, you can request an execution plan to confirm it is a
    trivial plan.


    Note: There are several ways to request an estimated or actual execution plan.
    To request an actual graphical execution plan, select “Include Actual Execution
    Plan” (or Ctrl-M) on the SQL Server Management Studio toolbar. Once you have a
    graphical execution plan, you can right-click it and select “Show Execution Plan
    XML …”. For more details about execution plans, see the documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/execution-plans`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/execution-plans).


    Once you have an execution plan, there are a few ways to verify it is a trivial
    plan optimization. For example, you may look at the plan properties by selecting
    the plan and choosing View ➤ Properties Window. Then you can look for the “Optimization
    level” property. If you look at the XML plan, you would see something like this:


    If a plan does not qualify for a trivial optimization, StatementOptmLevel would
    show the value FULL which means that a full optimization was instead required.


    Finally, if the query did not qualify for a trivial plan, the query optimizer
    will perform a full optimization. We will cover that next in this section. But
    first, as mentioned earlier, a query could potentially have millions of possible
    candidate execution plans. So, we need choices to create alternate plans and to
    purge plans most likely not needed. Transformation rules create alternate plans.
    Some defined heuristics purge or limit the number of plans considered. Transformation
    rules are the fundamental algorithm for these kinds of optimizers. In fact, some
    optimizers are even called rule-based optimizers. However, even when the SQL Server
    optimizer uses rules to search for alternate plans, it is actually called a cost-based
    optimizer, as the final decision about selecting a plan will be a cost-based decision.
    So, let us talk about transformation rules next .'
