- fmt: 'Finally, another property set in the tuning profile was `vm.max_map_count`.
    Its default value, `65536`, may not be high enough for a SQL Server instance.
    It is recommended to change this value to `256K` or `262,144` as shown next:


    ```

    # sysctl vm.max_map_count

    vm.max_map_count = 65536

    # sysctl -w vm.max_map_count=262144

    vm.max_map_count = 262144

    ```


    ### Additional Configurations


    Three important additional configurations to consider in regard to a Linux system
    running SQL Server are transparent huge pages, swap files, and the last accessed
    date and time file property.


    Notice that the `vm.transparent_hugepages` value was set to “always” on our tuned
    profile. Transparent huge pages are an abstraction layer which uses large-sized
    pages of memory such as `2 MB` and `1 GB` which are recommended for applications
    using large amounts of memory like SQL Server. However, in case of high memory
    paging activity in SQL Server deployments, you may want to use the value “madvise.”
    In this scenario, transparent huge pages are disabled system-wide but are still
    available to applications that make a `madvise` call to allocate memory in the
    `madvise` region. The following is one way to accomplish this, where the value
    in brackets shows the active value:


    ```

    more /sys/kernel/mm/transparent_hugepage/enabled

    [always] madvise never

    # echo madvise > /sys/kernel/mm/transparent_hugepage/enabled

    # more /sys/kernel/mm/transparent_hugepage/enabled

    always [madvise] never

    ```


    You can also modify our tuning profile, replacing `always` with `madvise`, and
    make the `mssql` profile active again by running the following commands:


    ```

    # tuned-adm off

    # tuned-adm profile mssql

    ```


    Same as in the Windows platform, properly configuring a swap file on Linux is
    important for the performance of SQL Server. A swap file can be used when the
    available physical memory is full and inactive pages are moved to the swap space.
    For details on how to implement and maintain a swap file, please refer to your
    Linux distribution documentation.


    Linux writes a date and time timestamp every time it performs a read operation
    in a file. This means it technically generates write activity every time a file
    is accessed. Although this attribute can be required for some applications, it
    is not required and it is very expensive for a database system like SQL Server.


    It is recommended to disable this behavior on the file systems used by SQL Server.
    In order to perform that, you would have to add the `noatime` attribute to the
    associated mount options on such file systems.


    Check your operating system documentation for comprehensive instructions to perform
    this operation. One method is to edit the `/etc/fstab` file as shown next. The
    following commands show part of the `/etc/fstab` file:


    ```

    more /etc/fstab

    /dev/mapper/rootvg-usrlv /usr           xfs     defaults                0 0

    ```


    Edit the file to add `noatime` on the options column:


    ```

    more /etc/fstab

    /dev/mapper/rootvg-usrlv /usr           xfs     defaults,noatime        0 0

    ```


    Use the `mount` command to reload the file system information:


    ```

    # mount -o remount /

    ```


    ## Summary


    This chapter covered SQL Server configuration settings that can help in the performance
    of your databases and applications. We also discussed how some configuration choices
    are set to the best possible values or a good starting point by default. However,
    as workloads vary from one installation to another, some additional configurations
    may be required, especially for high performance installations.


    We also saw how some behaviors that were originally implemented as a trace flag,
    probably as a temporary solution to fix a particular problem, eventually made
    it to the database engine as a configuration default. This was the case of trace
    flags `2371`, `1117`, and `1118`, whose behavior is now enabled by default starting
    with SQL Server 2016. We covered trace flag `2371` in this chapter, and although
    we also briefly covered trace flags `1117` and `1118`, they are covered in greater
    detail in Chapter [4](#393702_2_En_4_Chapter.xhtml).


    Some configurations for performance should be considered if you use other SQL
    Server features such as Always On availability groups, compression, or encryption,
    just to name a few. Some other features, like in-memory technologies, are extremely
    critical for performance and will be covered in more detail in Chapter [7](#393702_2_En_7_Chapter.xhtml).


    Finally, we covered configuring SQL Server on Linux. This included ways to configure
    SQL Server settings, for example, by using the `mssql-conf` tool, and to configure
    Linux settings to improve the performance of SQL Server.


    # 4. tempdb Troubleshooting and Configuration


    `tempdb` is a system database used for holding temporary objects that can be user
    or system created. Unlike other databases, `tempdb` is recreated every time SQL
    Server starts. The various uses of `tempdb` can be generally categorized into
    three groups: user, internal, and version store objects.


    1.  **User objects**: Used for objects created directly by users like global and
    local temporary tables, table variables, or temporary stored procedures.


    2.  **Internal objects**: Used for internal objects including worktables to store
    temporary data for sorting, spools, and cursor and service broker information
    and workfiles for hash join and hash aggregate operations. Users cannot directly
    create these internal objects.


    3.  **Version store objects**: Used for row versioning for snapshot isolation
    levels, online index operations, `AFTER` triggers, and MARS (multiple active result
    sets).


    The performance problems discussed in this chapter mostly impact the first two
    areas, user and internal objects. One of these performance problems—one I learned
    the hard way the day we went live with a new application in my earlier years working
    as a database administrator—is `tempdb` contention. The creation of a large number
    of user objects in a short period of time can contribute to latch contention of
    allocation pages, also called DML (Data Modification Language) contention. Contention
    of system catalogs, also called DDL (Data Definition Language) contention, although
    not common, is also possible in some heavy use scenarios.


    Regarding internal objects, some query processor operations, such as storing intermediate
    runs for sorts or hash tables for hash joins and hash aggregates, may create performance
    problems when using `tempdb` as these operations were originally designed to work
    on server memory instead of disk. In this last case, `tempdb` is not the problem
    per se, but rather the fact that these operations need to use `tempdb`, which
    is obviously slower than memory access.


    SQL Server 2019 introduces probably the biggest tempdb performance improvement
    in the history of the product. Starting with this version, it is possible to configure
    tempdb to use memory-optimized metadata, an In-Memory OLTP–based feature. By enabling
    this configuration, tempdb metadata can now be moved into latch-free nondurable
    memory-optimized tables eliminating metadata contention entirely.


    Since memory-optimized tempdb metadata is an optional configuration in SQL Server
    2019 and DML contention is still a performance concern on all the versions of
    the product, I will still start this chapter covering the problem in greater detail.
    Memory-optimized tempdb metadata is covered later in this chapter.'
