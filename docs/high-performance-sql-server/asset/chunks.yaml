    the latest three versions of the product.


    Finally, as covering statistics in full detail is outside the scope of this book,
    I would recommend the Microsoft white paper “Statistics Used by the Query Optimizer
    in Microsoft SQL Server 2008,” which you can still find at [`https://msdn.microsoft.com/en-us/library/dd535534`](https://msdn.microsoft.com/en-us/library/dd535534)`(SQL.100).aspx`.
    Although written for SQL Server 2008, its contents are still relevant for all
    the supported versions of the product.


    ## tempdb Configuration


    The `tempdb` database has multiple configuration options that may greatly impact
    the performance of your SQL Server instance. In addition, there are several changes
    introduced with SQL Server 2016 that you need to be aware of. Those include the
    ability to automatically create multiple data files during setup based on the
    number of available processors on the system, or the new default `tempdb` configuration,
    which integrates the behavior of trace flags 1117 and 1118\. These and other changes
    are covered in Chapter [4](#393702_2_En_4_Chapter.xhtml), which is dedicated to
    tempdb.


    ## Query Optimizer Hotfix Servicing Model


    Starting with SQL Server 2000 Service Pack 3, query optimizer hotfixes were provided
    disabled by default and required different trace flags to enable them (e.g., using
    some of the trace flags with values between 4101 and 4135). The reason for requiring
    to explicitly enable them was to have execution plan stability and avoid plan
    regressions. Although the purpose of those updates was to fix some other problems,
    since they also included query optimizer improvements, regressions were still
    possible. For later versions (starting with SQL Server 2005 Service Pack 3 Cumulative
    Update 6, SQL Server 2008 Service Pack 1 Cumulative Update 7, and SQL Server 2008
    R2 RTM), Microsoft decided to combine most of the query optimizer upgrades into
    a single trace flag, 4199\. There were still a few particular cases that required
    their own trace flag, but the majority was using 4199\. The plan was to put together
    under the same trace flag all those updates that could be enabled by default in
    a future release. That future release was SQL Server 2016.


    Starting with SQL Server 2016, while using the latest compatibility level, all
    the query optimizer–related hotfixes, which in previous versions required trace
    flag 4199, will now be automatically enabled. Should you encounter a plan regression
    or any other problem, you just need to go back to a previous compatibility level
    to disable those query optimizer updates, assuming trace flag 4199 is disabled.


    Trace flag 4199 will now be used to enable new query optimizer hotfixes, released
    after the SQL Server RTM version. Finally, if you use a previous compatibility
    level and disable trace flag 4199, you are disabling query optimizer hotfixes
    released both before and after the SQL Server RTM.


    Table [3-1](#393702_2_En_3_Chapter.xhtml#Tab1) shows a summary of all possible
    scenarios mentioned when using the compatibility level and trace flag 4199 as
    defined in the SQL Server documentation.


    Table 3-1


    Trace Flag 4199 Servicing Model for SQL Server


    | SQL Server Version | Database Compatibility Level | TF 4199 | QO Changes from
    All Previous Database Compatibility Levels | QO Changes Post-RTM |

    | --- | --- | --- | --- | --- |

    | SQL Server 2016 | **100 to 120** | Off | Disabled | Disabled |

    | On | Enabled | Enabled |

    | **130** (Default) | Off | Enabled | Disabled |

    | On | Enabled | Enabled |

    | SQL Server 2017 | **100 to 120** | Off | Disabled | Disabled |

    | On | Enabled | Enabled |

    | **130** | Off | Enabled | Disabled |

    | On | Enabled | Enabled |

    | **140** (Default) | Off | Enabled | Disabled |

    | On | Enabled | Enabled |

    | SQL Server 2019 | **100 to 120** | Off | Disabled | Disabled |

    | On | Enabled | Enabled |

    | **130 to 140** | Off | Enabled | Disabled |

    | On | Enabled | Enabled |

    | **150** (Default) | Off | Enabled | Disabled |

    | On | Enabled | Enabled |


    As you may guess , the service model described in Table [3-1](#393702_2_En_3_Chapter.xhtml#Tab1)
    will be applied to future versions of the product where, for example, a newer
    compatibility level could be used to enable the query optimizer hotfixes before
    that version and the previous compatibility level to disable them in case of a
    performance regression (again, assuming trace flag 4199 is disabled). For more
    details, see “SQL Server Query Optimizer Hotfix Trace Flag 4199 Servicing Model”
    at [`https://support.microsoft.com/en-us/kb/974006`](https://support.microsoft.com/en-us/kb/974006).


    In addition, also new with SQL Server 2016, you can enable query optimizer hotfixes
    at the database level, regardless of their compatibility level, by using the `QUERY_OPTIMIZER_HOTFIXES`
    option of the new `ALTER DATABASE SCOPED CONFIGURATION` syntax. You can use this
    syntax as in the following statement:


    ```

    ALTER DATABASE SCOPED CONFIGURATION SET QUERY_OPTIMIZER_HOTFIXES = ON

    ```'
  trans: '## 标准自动统计信息更新


    自动更新统计信息的功能自 SQL Server 7 版起就已提供，当时查询处理器被重新架构，并引入了统计信息功能。自那时起，自动更新统计信息的算法变化不大；对于超过
    500 行的表，当列修改计数器（`colmodctrs`）或统计信息前导列上的更改次数达到“20% 的变化量加上 500”时，自动更新就会触发。


    请记住，SQL Server 7 和 SQL Server 2000 则依赖于 `rowmodctrs` 或行级修改计数器来实现相同的行为。显然，使用 `rowmodctrs`
    并非最优方案，因为它并非基于统计信息的前导列。例如，假设在列 `c1` 上有一个统计信息对象，列 `c2` 发生了 25% 的更改，但列 `c1` 没有更改。这仍然会触发对列
    `c1` 的统计信息更新，而这是完全不需要的。


    关于自动更新统计信息算法的更多细节，特别是涉及 500 行或更少的表、临时表和筛选统计信息的情况，可以在本节末尾列出的白皮书中找到。


    ### 跟踪标志 2371


    跟踪标志 2371 随 SQL Server 2008 R2 引入，作为一种改变并降低自动更新统计信息阈值的方法，并且与任何其他跟踪标志一样，它必须手动启用。新算法将使用新公式（定义为
    `SQRT(1000 * 行数)`）和旧公式（使用表大小的 20%）中计算结果较小的那个值。如果你用两个公式都算一下，你会发现阈值在表有 25,000 行时发生变化，此时两种情况返回的值相同，都是
    5000 次更改。例如，默认算法要求 20% 的更改，如果一个大表有十亿行，则需要 2 亿行更改才会触发更新。而跟踪标志 2371 则需要一个更小的阈值，在这种情况下是
    `SQRT(1000 * 1000000000)` 或 100 万次。


    从 SQL Server 2016 开始，当你使用兼容性级别 130、140 和 150 时，跟踪标志 2371 的行为默认启用，这基本涵盖了该产品的最新三个版本。


    最后，由于全面详细地介绍统计信息超出了本书的范围，我推荐参阅微软白皮书《Microsoft SQL Server 2008 中查询优化器使用的统计信息》，你仍然可以在
    [`https://msdn.microsoft.com/en-us/library/dd535534`](https://msdn.microsoft.com/en-us/library/dd535534)`(SQL.100).aspx`
    找到它。虽然该文是为 SQL Server 2008 编写的，但其内容对于所有受支持的产品版本仍然适用。


    ## tempdb 配置


    `tempdb` 数据库有多个配置选项，可能极大地影响 SQL Server 实例的性能。此外，SQL Server 2016 引入了几项你需要了解的更改。这些包括能够在安装过程中根据系统上可用处理器的数量自动创建多个数据文件，以及新的默认
    `tempdb` 配置，该配置整合了跟踪标志 1117 和 1118 的行为。这些及其他更改在第 4 章中有详细说明，该章专门讨论 tempdb。


    ## 查询优化器修复程序服务模型


    从 SQL Server 2000 Service Pack 3 开始，查询优化器修复程序默认是禁用提供的，需要不同的跟踪标志来启用它们（例如，使用 4101
    到 4135 之间的某些跟踪标志）。要求显式启用它们的原因是为了保持执行计划的稳定性并避免计划回退。虽然这些更新的目的是修复一些其他问题，但由于它们也包含了查询优化器的改进，回退仍然是可能的。对于后续版本（从
    SQL Server 2005 Service Pack 3 累积更新 6、SQL Server 2008 Service Pack 1 累积更新 7 和
    SQL Server 2008 R2 RTM 开始），微软决定将大多数查询优化器升级合并到一个单一的跟踪标志 4199 下。仍然有一些特定情况需要它们自己的跟踪标志，但大部分都使用
    4199。计划是将那些可以在未来版本中默认启用的所有更新都归入同一个跟踪标志下。这个未来版本就是 SQL Server 2016。


    从 SQL Server 2016 开始，在使用最新的兼容性级别时，所有以前版本中需要跟踪标志 4199 的查询优化器相关修复程序，现在都将自动启用。如果你遇到计划回退或任何其他问题，只需回退到之前的兼容性级别即可禁用这些查询优化器更新，前提是跟踪标志
    4199 是禁用的。


    跟踪标志 4199 现在将用于启用在 SQL Server RTM 版本之后发布的新的查询优化器修复程序。最后，如果你使用之前的兼容性级别并禁用跟踪标志 4199，你将同时禁用在
    SQL Server RTM 之前和之后发布的查询优化器修复程序。


    表 3-1 显示了在 SQL Server 文档中定义的、使用兼容性级别和跟踪标志 4199 时所有可能场景的摘要。


    表 3-1：SQL Server 的跟踪标志 4199 服务模型


    | SQL Server 版本 | 数据库兼容性级别 | TF 4199 | 来自所有先前数据库兼容性级别的 QO 变更 | RTM 后的 QO 变更 |

    | --- | --- | --- | --- | --- |

    | SQL Server 2016 | **100 至 120** | 关闭 | 禁用 | 禁用 |

    | | | 开启 | 启用 | 启用 |

    | | **130**（默认） | 关闭 | 启用 | 禁用 |

    | | | 开启 | 启用 | 启用 |

    | SQL Server 2017 | **100 至 120** | 关闭 | 禁用 | 禁用 |

    | | | 开启 | 启用 | 启用 |

    | | **130** | 关闭 | 启用 | 禁用 |

    | | | 开启 | 启用 | 启用 |

    | | **140**（默认） | 关闭 | 启用 | 禁用 |

    | | | 开启 | 启用 | 启用 |

    | SQL Server 2019 | **100 至 120** | 关闭 | 禁用 | 禁用 |

    | | | 开启 | 启用 | 启用 |

    | | **130 至 140** | 关闭 | 启用 | 禁用 |

    | | | 开启 | 启用 | 启用 |

    | | **150**（默认） | 关闭 | 启用 | 禁用 |

    | | | 开启 | 启用 | 启用 |


    如你所料，表 3-1 中描述的服务模型将应用于产品的未来版本，例如，在这些版本中，可以使用更新的兼容性级别来启用该版本之前的查询优化器修复程序，而使用之前的兼容性级别在发生性能回退时禁用它们（再次强调，假设跟踪标志
    4199 是禁用的）。更多详情，请参阅 [`https://support.microsoft.com/en-us/kb/974006`](https://support.microsoft.com/en-us/kb/974006)
    上的“SQL Server 查询优化器修复程序跟踪标志 4199 服务模型”。


    此外，SQL Server 2016 的另一项新功能是，你可以使用新的 `ALTER DATABASE SCOPED CONFIGURATION` 语法中的
    `QUERY_OPTIMIZER_HOTFIXES` 选项，在数据库级别启用查询优化器修复程序，而不考虑其兼容性级别。你可以按如下语句使用此语法：


    ```

    ALTER DATABASE SCOPED CONFIGURATION SET QUERY_OPTIMIZER_HOTFIXES = ON

    ```'
- fmt: '## 配置与查询提示


    有关新的 `ALTER DATABASE SCOPED CONFIGURATION` 语句的更多详细信息，请参阅 [`https://msdn.microsoft.com/en-us/library/mt629158.aspx`](https://msdn.microsoft.com/en-us/library/mt629158.aspx)。


    最后，在查询级别启用查询优化器修补程序也是可能的，可以使用跟踪标志 4199 与 `QUERYTRACEON` 提示，或者使用 `USE HINT(''ENABLE_QUERY_OPTIMIZER_HOTFIXES'')`
    查询提示。例如，以下两个查询是等效的：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    OPTION (QUERYTRACEON 4199)


    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    OPTION (USE HINT(''ENABLE_QUERY_OPTIMIZER_HOTFIXES''))

    ```


    > 注意

    >

    > 虽然在网络上常见将大量跟踪标志与 `QUERYTRACEON` 提示结合使用，但只有少数几个是 Microsoft 文档化并支持的。你可以在 [`https://support.microsoft.com/en-us/kb/2801413`](https://support.microsoft.com/en-us/kb/2801413)
    查看此类列表。我自己的许多帖子和文章也包含了这种未文档化的跟踪标志，并且，如往常一样，我总是会澄清它们是未文档化的、不受支持的，并且不打算在生产环境中使用。


    ## 最大并行度


    这个配置选项在过去几年中一直是一个争论的话题，尤其是在拥有大量处理器的新硬件开始变得普遍之后。


    基本上，“最大并行度”配置选项定义了查询处理器可以用于单个查询的并行度，或者换句话说，一个查询在执行时可以使用的逻辑处理器数量。当使用默认值 0 时，SQL
    Server 可以在运行时决定执行并行计划所使用的逻辑处理器数量，最多可达 64 个。请记住，这并不意味着每个并行查询都会一直使用最大数量的可用处理器。例如，如果你的系统有
    64 个逻辑处理器并且使用默认配置，一个查询仍然很可能只使用八个处理器并以八个线程运行。同样，这是查询处理器在执行时做出的决定。


    Microsoft 提出了使用最大并行度为八的建议，文档记录在 [`https://support.microsoft.com/en-us/kb/2806535`](https://support.microsoft.com/en-us/kb/2806535)。基本上，这个最佳实践要求将“最大并行度”配置选项设置为与系统中逻辑处理器数量相同，最多不超过八。而且，由于现在拥有八个或更多处理器非常普遍，八可能是一个常见的配置。再次强调，将此设置更改为八并不意味着每个并行查询都会使用八个线程。


    然而，请记住，Microsoft 的建议仅仅是一个建议或指导方针。文档本身指定该指南适用于典型的 SQL Server 活动，并且根据你的工作负载或应用程序模式，也可以考虑并彻底测试此设置的其他值。例如，假设你的系统有
    16 个逻辑处理器，并且工作负载中同时运行的查询数量较少，那么可以考虑使用最大并行度值为 16。另一方面，对于同一系统中查询数量很多的工作负载，值为 4 也可能是最佳选择。


    首先，运行 SQL Server 的硬件必须能够运行并行查询，根据当前的趋势，这几乎包括了今天的所有服务器，甚至包括大多数用于生产实例的虚拟机配置。其次，关联掩码配置选项（现已弃用）或
    `ALTER SERVER CONFIGURATION SET PROCESS AFFINITY` 语句必须允许多处理器使用，而它们默认都是允许的。最后，查询处理器必须决定使用并行是否确实可以提高查询性能。


    还有一系列功能本身就不支持并行，即使你的查询足够昂贵以证明其合理性。在这些功能中，包括有标量值用户定义函数；杂项内置函数如 `ERROR_NUMBER()`、`OBJECT_ID()`
    和 `@@TRANCOUNT`；具有数据访问权限的 CLR 用户定义函数；动态游标；TOP 子句；序列函数；多语句表值用户定义函数；以及全局标量聚合。执行计划也可以通过查看
    `NonParallelPlanReason` 属性来告诉你为什么没有使用并行。'
  raw: 'For more details about the new `ALTER DATABASE SCOPED CONFIGURATION` statement,
    see [`https://msdn.microsoft.com/en-us/library/mt629158.aspx`](https://msdn.microsoft.com/en-us/library/mt629158.aspx).


    Finally, enabling query optimizer hotfixes is also possible at the query level
    using either the trace flag 4199 along with the `QUERYTRACEON` hint or the USE
    HINT ''ENABLE_QUERY_OPTIMIZER_HOTFIXES'' query hint. For example, the following
    two queries are equivalent:


    ```

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    OPTION (QUERYTRACEON 4199)

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    OPTION (USE HINT(''ENABLE_QUERY_OPTIMIZER_HOTFIXES''))

    ```


    Note


    Although it is common to find a large variety of trace flags used with the `QUERYTRACEON`
    hint online, only a few are documented and supported by Microsoft. You can see
    such a list at [`https://support.microsoft.com/en-us/kb/2801413`](https://support.microsoft.com/en-us/kb/2801413).
    Many of my own posts and articles include such undocumented trace flags, and,
    as usual, I always clarify that they are undocumented, not supported, and not
    intended to be used in a production environment.


    ## max degree of parallelism


    This configuration setting has been a topic of debate, especially in the last
    few years when having a large number of processors started to become common in
    new hardware.


    Basically, the “max degree of parallelism” configuration option defines the degree
    of parallelism that the query processor can use for a single query, or said in
    a different way, the number of logical processors that a query can use at execution
    time. When using the default value, which is 0, SQL Server can decide at runtime
    the number of logical processors it can use to execute a parallel plan, up to
    a maximum of 64\. Keep in mind that this does not mean that every parallel query
    would use the maximum of processors available all the time. For example, if your
    system has 64 logical processors and you are using the default configuration,
    it is still very possible that a query can use only eight processors and run with
    eight threads. Again, this is a decision the query processor makes at execution
    time.


    Microsoft came up with the recommendation of using a maximum of eight, as documented
    at [`https://support.microsoft.com/en-us/kb/2806535`](https://support.microsoft.com/en-us/kb/2806535).
    Basically, this best practice asks to have the “max degree of parallelism” configuration
    option the same as the number of logical processors in the system, up to a maximum
    of eight. And since it is getting very common to have eight processors or more,
    eight might be a common configuration these days. And once again, changing this
    setting to eight does not mean that every parallel query will use eight threads.


    However, keep in mind that the recommendation by Microsoft is just that, a recommendation
    or a guideline. The document itself specifies that the guideline is applicable
    for typical SQL Server activity and that, depending on your workload or application
    patterns, some other values for this setting may be considered and thoroughly
    tested as well. For example, assuming your system has 16 logical processors and
    a workload with a small number of queries running at the same time, a max degree
    of parallelism value of 16 can be considered. On the other hand, for a workload
    with a large number of queries in the same system, a value of four could also
    be the best choice.


    First of all, the hardware running SQL Server must be capable of running parallel
    queries, which, based on current trends, includes almost every server today, even
    with most configurations in virtual machines for a production instance. Second,
    the affinity mask configuration option (which has now been deprecated) or the
    `ALTER SERVER CONFIGURATION SET PROCESS AFFINITY` statement must allow the use
    of multiple processors, which they both do by default. Finally, the query processor
    must decide if using parallelism can in fact improve the performance of a query.


    There is also a list of features that do not support parallelism in the first
    place, even if your query is expensive enough to warrant it. Among those features,
    we have scalar-valued user-defined functions; miscellaneous built-in functions
    such as ERROR_NUMBER(), OBJECT_ID(), and @@TRANCOUNT; CLR user-defined functions
    with data access; dynamic cursors; TOP clause; sequence functions; multistatement
    table-valued user-defined functions; and global scalar aggregates. An execution
    plan can also tell you why parallelism was not used by looking at the `NonParallelPlanReason`
    attribute .'
