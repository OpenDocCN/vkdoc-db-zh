  trans: '

    查询存储的早期版本以**页**为单位显示逻辑读取量。最新版本则以 KB 为单位显示相同的信息。例如，您可能会看到平均逻辑读取为 7054，或平均逻辑读取（KB）为
    56,432。正如我们在第 1 章所学，一个数据页大小为 8 KB。


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig6_HTML.jpg](img/393702_2_En_6_Fig6_HTML.jpg)


    ## 图 6-6：查询窗格的计划摘要


    此时，您可以研究为什么这两个计划的性能差异如此之大，并尝试应用任何传统的查询优化技术。查询存储提供了一个解决方案，并且该方案无需任何查询调优工作即可立即使用，那就是强制使用任何可用的执行计划——假设您希望该特定查询的每次执行都使用该计划。


    那么，下一步该做什么？虽然对于此示例而言，这并非完美的解决方案（这就是为什么参数敏感的查询难以修复，并且通常需要其他方法），但假设我们想要一致的性能，并决定使用包含表扫描的计划。让我们通过在"查询计划摘要"窗格中选择该计划，并在底部窗格显示计划时单击"强制计划"来强制执行该计划。计划摘要还为您提供了强制计划的选项。只有当计划保存在查询存储中时，您才能强制它。在系统要求确认时回答"是"。如果您在跟踪中捕获该查询，您会看到发送了类似的语句：


    ```

    EXEC sys.sp_query_store_force_plan @query_id = 1, @plan_id = 1

    ```


    您可以使用 `sp_query_store_force_plan` 来为特定查询强制执行特定计划。每当 SQL Server 遇到此查询时，如果计划缓存中没有可用的此类计划，它就会尝试强制执行提供的计划。如果强制计划失败，则会触发
    `plan_guide_unsuccessful` 扩展事件（或 Plan Guide Unsuccessful 跟踪事件），并指示查询优化器以正常方式优化查询。强制的计划会保存在计划缓存中，并根据需要重用。值得注意的是，此查询的计划只有在指定的存储过程内执行时才会被强制。如果相同的查询在不同的存储过程或即席查询中执行，则此操作将不适用。


    此时，即使您清除计划缓存并使用值 898 运行查询，您也将始终获得包含表扫描的计划。尽管执行计划中的 `Use Plan` 属性将为 true，但这并不表示这是一个强制计划。目前，了解此信息的唯一方法是查看
    `sys.query_store_plan` 目录视图中的 `is_forced_plan` 列。


    SQL Server Management Studio 还在同一图形界面上提供了取消强制计划的选项。执行该操作将向 SQL Server 发送类似的语句：


    ```

    EXEC sys.sp_query_store_unforce_plan @query_id = 1, @plan_id = 1

    ```


    强制计划在后台使用计划指南。当计划被强制时，SQL Server 会隐式地添加一个 `USE PLAN` 提示，其中包含与该语句关联的 XML 计划片段，因此您不再需要单独使用计划指南。此外，请注意，当单独使用计划指南时，查询优化器不保证会生成完全请求的强制计划，而至少是与其类似的计划。另外，您应该意识到，在某些情况下强制计划可能不起作用，一个典型的例子是当架构发生更改时。因此，如果某个计划使用了索引但该索引已不复存在，则无法重用和强制该计划。在这种情况下，SQL
    Server 将执行正常的优化，并会在 `sys.query_store_plan` 目录视图中记录强制计划操作失败的事实。计划强制失败将在本章后面解释。有关可使用查询存储和
    `USE PLAN` 强制的查询计划元素的更多详细信息，请参阅 [`https://technet.microsoft.com/en-us/library/ms186954`](https://technet.microsoft.com/en-us/library/ms186954)`(v=sql.105).aspx`。


    清除或禁用查询存储也将禁用任何强制的查询计划。一旦清除了计划，就无法再强制它，因为该计划已从查询存储数据库中永久删除。但是，如果在某个计划配置为强制时禁用了查询存储，那么一旦查询存储再次启用，该计划将被重新强制（假设该计划未被其他方式删除）。在我们的示例中，取消强制先前的计划，并使用
    ProductID 898 再次运行该过程，将执行正常的查询优化，创建包含索引查找/键查找组合的原始计划，并且执行计划中将不再出现 `Use Plan` 属性。


    最后，强制计划不应被视为长期解决方案，因为与使用查询提示类似，数据库数据和架构可能会发生变化，而强制的计划可能不再是最优的。因此，仍然需要使用传统的查询调优技术来修复有问题的查询。

    '
- fmt: '# Performance Troubleshooting


    As mentioned in the previous section, you can analyze the information collected
    by the Query Store, either proactively to understand the query performance changes
    in your application or reactively in case you have a performance problem. The
    Query Store can be used to find out the expensive queries pretty much in the same
    way we used to do it with the `sys.dm_exec_query_stats` DMV. The Query Store provides
    some additional benefits to using this DMV including the following:


    1.  Using the `sys.dm_exec_query_stats` DMV provides a view of only the plans
    currently in the plan cache. Only the current version of a plan exists, and even
    this version can be removed from the plan cache at any time. The Query Store persists
    all the history of plans for every query.


    2.  Not every plan gets cached and therefore exposed by the `sys.dm_exec_query_stats`
    DMV. All the plans are stored by the Query Store, even incomplete queries, as
    explained later.


    To display the most expensive queries in a database, you can use the “Top Resource
    Consuming Queries” report in `SQL Server Management Studio`, which allows you
    to select different metrics including CPU time, duration, execution count, logical
    reads, logical writes, memory consumption, and physical reads. An example for
    CPU time is shown in Figure 6-7.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig7_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig7_HTML.jpg)


    Figure 6-7: Top 25 resource consumers report


    For additional flexibility, you can write your own queries using the runtime statistics
    collected on `sys.query_store_runtime_stats` along with the other Query Store
    catalog views.


    As one of my favorite techniques, I can run a trace or extended event session
    against `SQL Server Management Studio`, run the Top Resource Consuming Queries
    report selecting the metric I need, and see which query is being submitted to
    the engine. For example, when running the report for CPU time shown in Figure
    6-7, I saw the following query being submitted, copied here with some minor edits,
    including removing a filter selecting specific intervals to get most expensive
    queries during the last hour:


    ```sql

    SELECT TOP 25

    p.query_id query_id,

    qt.query_sql_text query_text,

    CONVERT(float, SUM(rs.avg_cpu_time * rs.count_executions)) total_cpu_time,

    SUM(rs.count_executions) count_executions,

    COUNT(DISTINCT p.plan_id) num_plans

    FROM sys.query_store_runtime_stats rs

    JOIN sys.query_store_plan p ON p.plan_id = rs.plan_id

    JOIN sys.query_store_query q ON q.query_id = p.query_id

    JOIN sys.query_store_query_text qt ON q.query_text_id = qt.query_text_id

    GROUP BY p.query_id, qt.query_sql_text

    ORDER BY total_cpu_time DESC

    ```


    As covered earlier, you can use the Query Store to identify ad hoc workloads in
    your database. Since ad hoc workloads can consist of a large number of different
    queries, they usually spend a significant portion of system resources in query
    optimization and use a large amount of memory in the plan cache. To identify an
    ad hoc workload, you can use “Top Resource Consuming Queries,” as explained earlier,
    and select Execution Count as the metric for the report. A large number of queries
    on the graph or report showing an execution count of 1 may reveal an ad hoc workload.
    You may also need to visualize more than the default of 25 queries and include
    a larger value. In order to do that, select Configure (look for it at the top-right
    region of the screen), then Return, and specify a new value on the Top section.
    Once the report is displayed, you can also click the exec count column to start
    with the queries with an execution count value of 1, as shown earlier in Figure
    6-7.


    If you have a large number of ad hoc queries, you may want to enable the “optimize
    for ad hoc workloads” configuration option, which SQL Server can use to improve
    the efficiency of the plan cache. When this configuration is enabled, SQL Server
    minimizes the memory used by the plan cache by storing only a small compiled plan
    stub in the plan cache instead of the full compiled execution plan for queries
    that are executed only once. For more details about the “optimize for ad hoc workloads”
    configuration option, see Chapter 3.


    An alternate solution to reusing plans, although more drastic, is to force parameterization
    at the database level. This configuration can be useful in cases where multiple
    similar ad hoc queries can benefit from using the same execution plan. Forcing
    the same plan may not always be a good solution, so this is a choice that requires
    careful and thorough testing. Forcing parameterization at the database level can
    be implemented by using the `ALTER DATABASE SET PARAMETERIZATION FORCED` statement.'
