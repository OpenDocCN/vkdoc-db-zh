  trans: '## 使用内存优化表


    我们刚刚看到了如何在基于磁盘的 OLTP 表上创建非聚集列存储索引。如果我们想在内存优化表上执行相同的操作，则存在一些重要的区别。首先，我们不能使用非聚集列存储索引；只允许创建聚集列存储索引。此外，根据内存优化表的要求，整个索引必须放入内存中。


    然而，这并不意味着需要双倍的内存，因为列存储索引通常具有很高的压缩级别。来自微软的数据显示平均压缩率可达十倍，因此额外的列存储索引所需的内存仅比内存优化表本身多出约
    10%。


    让我们创建这个表。请注意，列存储索引是在创建表时定义的。也可以在现有的内存优化表上创建索引，后面将展示如何操作的示例。


    ```

    CREATE TABLE SalesOrderHeader (

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL,

    INDEX SalesOrderHeader_cci CLUSTERED COLUMNSTORE)

    WITH (MEMORY_OPTIMIZED = ON)

    ```


    为了运行一些基本的分析查询，我们需要填充一些数据。尝试直接从 `AdventureWorks2017` 复制数据会返回以下错误，所以我们分两步进行，使用一个临时表：


    ```

    Msg 41317, Level 16, State 5, Line 1

    访问内存优化表或原生编译模块的用户事务不能访问超过一个用户数据库或 model 和 msdb 数据库，也不能写入 master。

    ```


    运行以下语句将数据复制到临时表：


    ```

    SELECT

    SalesOrderID,

    RevisionNumber,

    OrderDate,

    DueDate,

    ShipDate,

    Status,

    CustomerID,

    SalesPersonID,

    TerritoryID,

    BillToAddressID,

    ShipToAddressID,

    ShipMethodID,

    CreditCardID,

    CreditCardApprovalCode,

    CurrencyRateID,

    SubTotal,

    TaxAmt,

    Freight,

    Comment,

    ModifiedDate

    INTO #temp

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    ```


    最后，将数据插入内存优化表：


    ```

    INSERT INTO dbo.SalesOrderHeader (

    SalesOrderID,

    RevisionNumber,

    OrderDate,

    DueDate,

    ShipDate,

    Status,

    CustomerID,

    SalesPersonID,

    TerritoryID,

    BillToAddressID,

    ShipToAddressID,

    ShipMethodID,

    CreditCardID,

    CreditCardApprovalCode,

    CurrencyRateID,

    SubTotal,

    TaxAmt,

    Freight,

    Comment,

    ModifiedDate)

    SELECT * FROM #temp

    ```


    成功填充表后，您可以运行一些类似于上一节中的分析查询，这两种情况都将受益于之前创建的列存储索引：


    ```

    SELECT MAX(SubTotal)

    FROM dbo.SalesOrderHeader

    SELECT SalesPersonID, SUM(SubTotal), AVG(SubTotal)

    FROM dbo.SalesOrderHeader

    WHERE TerritoryID > 3

    GROUP BY SalesPersonID

    ```


    您也可以向现有的内存优化表添加列存储索引。例如，假设该表已存在，请遵循以下代码：


    ```

    CREATE TABLE SalesOrderHeader (

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL)

    WITH (MEMORY_OPTIMIZED = ON)

    ```


    您只需要添加以下语句即可获得与之前相同的结果：


    ```

    ALTER TABLE SalesOrderHeader ADD INDEX SalesOrderHeader_cci CLUSTERED COLUMNSTORE

    ```


    当前的一个限制是，您需要将内存中表的所有列都包含在列存储索引中。内存优化表不支持非聚集列存储索引。尝试使用 `ALTER TABLE ADD INDEX`
    语句添加此类索引将返回以下错误消息：


    ```

    Msg 10794, Level 16, State 76, Line 1

    The feature ''NONCLUSTERED COLUMNSTORE'' is not supported with memory optimized
    tables.

    ```


    ## 总结


    本章涵盖了 SQL Server 的内存技术。尽管主要目的是介绍针对内存优化的数据库，但也引入了一些相关的趋势和范式，包括原生编译模块、列式数据库和批处理。这些新趋势分别是对解释执行、基于行的存储和逐行查询执行等传统技术的补充或竞争。列存储索引和内存
    OLTP 在最初发布时都存在严重的限制，但在后续版本中得到了改进。


    我们介绍了内存 OLTP 和列存储索引，这两个功能最初发布时存在一些限制，但经过几个 SQL Server 版本的迭代已得到改进。本章最后介绍了操作型分析，现在可以在基于磁盘或内存优化的事务表上创建列存储索引，以允许执行实时分析查询。


    我们期望本章介绍的技术和范式能代表 SQL Server 乃至整个关系数据库技术的未来。'
- fmt: '# 8. Performance Troubleshooting


    This chapter discusses what information to look for when troubleshooting SQL Server
    performance problems, both examining real-time data and collecting information
    for later analysis. Performance information in SQL Server is exposed in several
    ways, and different tools are usually used to either see or collect that data.
    One of the new and very promising tools, the `Query Store`, was fully explained
    in Chapter [6](#393702_2_En_6_Chapter.xhtml). I am sure the `Query Store` will
    become the main tool for query performance troubleshooting for SQL Server 2016
    and above. In addition to query performance, there are many performance areas
    that do not fall into the query troubleshooting category.


    Proactively collecting information is critical for high performance systems. You
    cannot just rely on getting the current available information after you have been
    asked to look at a performance problem. The required information may already be
    gone by the time you connect to the SQL Server instance to research it. Collected
    data, however, may show directly and quickly what the problem is. In addition,
    you may need a baseline and probably performance trends to understand how your
    system works and proactively figure out when things are starting to deviate from
    a desirable or expected behavior, either because of an unexpected problem or an
    increasing workload.


    This chapter covers a large variety of performance information including performance
    counters, information provided through objects like `DMVs` or `DMFs` (dynamic
    management functions) and SQL Server events, which currently cover extended events
    and the currently deprecated `SQL Trace`, better known by the client tool used
    to access it, `SQL Profiler`. This performance information is provided by SQL
    Server and in some other cases by Windows Server or even by other Windows applications,
    services, or drivers. Having said that, the number of performance counters, events,
    or management objects is so vast, and more and more are introduced with every
    release or even service pack that only the most important or useful ones will
    be described here. Many more were used and described in other chapters of the
    book as well. I will also provide you links to the documentation if you need to
    see the entire list or more details.


    Note


    This chapter does not teach how to use the tools since it is assumed the reader
    has a basic knowledge and experience using them. The `Query Store` is an exception
    since it is a new tool, but it was covered in detail in Chapter [6](#393702_2_En_6_Chapter.xhtml).


    Finally, in many of the cases, providing magic values for some performance counters
    or other performance information has been historically a problem and sometimes
    the reason for bad advice about those values comes from the internet. There is
    also the case when some of those values were once good recommendations in the
    past, but don’t make so much sense anymore. A classic example is the famous value
    of 300 for `Page Life Expectancy (PLE)`, which is no longer a good recommendation,
    if it ever was. So the recommendation, in most cases, is not to look for a specific
    magic value and instead compare to a baseline.


    ## Performance Counters


    Performance counters are objects that provide information to monitor system activity.
    Although available from Windows, they show information not only about the operating
    system but also about some other Windows applications, services, and drivers.
    As a Windows application itself, SQL Server provides a rich number of performance
    counters, but it is common that, when troubleshooting SQL Server problems, performance
    counters from the operating system as well as some other Windows services or drivers
    may be required.


    Similar to the information provided by waits, as covered in Chapter [5](#393702_2_En_5_Chapter.xhtml),
    the values provided by performance counters can sometimes be difficult to interpret
    and may require either experience or a baseline from the system to compare with.
    As indicated earlier, there are also some cases of bad advice online where values
    recommended may not be exactly a good choice for your system or, even if there
    were a valid recommendation in the past, may not be a good value anymore.


    Performance counters use three basic terms: `objects`, `counters`, and `instances`.
    SQL Server performance objects have the format `SQLServer:<object name>` and may
    contain multiple counters. For example, the `SQLServer:Databases` object contains
    counters such as `Data File(s) Size (KB)` or `Log Growths`, both of which are
    explained later. Some objects may have multiple instances. Using the same example,
    for `SQLServer:Databases`, the instances in this case are represented by the system
    and user databases available on the server. You could get performance information
    from either one, some, or the total of all the instances combined. The SQL Server
    performance counter names will change slightly depending on whether you have a
    default or named instance. For example, `SQLServer:Databases` defines a counter
    on a default SQL Server instance, but will be called `MSSQL$<instance name>:Databases`
    on a named instance.


    Note


    A performance counter instance and a SQL Server instance both use the term “instance,”
    but they are not related concepts.


    There are a large number of SQL Server performance counters, most of them starting
    with the name `SQLServer` and some more starting with `SQLAgent`. Outside these
    two groups, there are several objects for SQL Server In-Memory OLTP called `SQL
    Server <version> XTP`, for example, `SQL Server 2017 XTP Storage` or `SQL Server
    2017 XTP Transactions`. You can get the entire list and details of the SQL Server
    performance counters at [`https://technet.microsoft.com/en-us/library/ms190382.aspx`](https://technet.microsoft.com/en-us/library/ms190382.aspx)
    and the SQL Server In-Memory OLTP performance counters at [`https://technet.microsoft.com/en-us/library/dn511015.aspx`](https://technet.microsoft.com/en-us/library/dn511015.aspx).


    SQL Server also provides the `sys.dm_os_performance_counters` `DMV`, which, although
    can be easily queried, unfortunately only covers SQL Server counters, so you still
    need to look outside for the remaining Windows counters that you may need. In
    addition, `sys.dm_os_performance_counters` requires additional processing to its
    data, which we will discuss later.'
  raw: '# 8. Performance Troubleshooting


    This chapter discusses what information to look for when troubleshooting SQL Server
    performance problems, both examining real-time data and collecting information
    for later analysis. Performance information in SQL Server is exposed in several
    ways, and different tools are usually used to either see or collect that data.
    One of the new and very promising tools, the Query Store, was fully explained
    in Chapter [6](#393702_2_En_6_Chapter.xhtml). I am sure the Query Store will become
    the main tool for query performance troubleshooting for SQL Server 2016 and above.
    In addition to query performance, there are many performance areas that do not
    fall into the query troubleshooting category.


    Proactively collecting information is critical for high performance systems. You
    cannot just rely on getting the current available information after you have been
    asked to look at a performance problem. The required information may already be
    gone by the time you connect to the SQL Server instance to research it. Collected
    data, however, may show directly and quickly what the problem is. In addition,
    you may need a baseline and probably performance trends to understand how your
    system works and proactively figure out when things are starting to deviate from
    a desirable or expected behavior, either because of an unexpected problem or an
    increasing workload.


    This chapter covers a large variety of performance information including performance
    counters, information provided through objects like DMVs or DMFs (dynamic management
    functions) and SQL Server events, which currently cover extended events and the
    currently deprecated SQL Trace, better known by the client tool used to access
    it, SQL Profiler. This performance information is provided by SQL Server and in
    some other cases by Windows Server or even by other Windows applications, services,
    or drivers. Having said that, the number of performance counters, events, or management
    objects is so vast, and more and more are introduced with every release or even
    service pack that only the most important or useful ones will be described here.
    Many more were used and described in other chapters of the book as well. I will
    also provide you links to the documentation if you need to see the entire list
    or more details.


    Note


    This chapter does not teach how to use the tools since it is assumed the reader
    has a basic knowledge and experience using them. The Query Store is an exception
    since it is a new tool, but it was covered in detail in Chapter [6](#393702_2_En_6_Chapter.xhtml).


    Finally, in many of the cases, providing magic values for some performance counters
    or other performance information has been historically a problem and sometimes
    the reason for bad advice about those values comes from the Internet. There is
    also the case when some of those values were once good recommendations in the
    past, but don’t make so much sense anymore. A classic example is the famous value
    of 300 for Page Life Expectancy (PLE), which is no longer a good recommendation,
    if it ever was. So the recommendation, in most cases, is not to look for a specific
    magic value and instead compare to a baseline.


    ## Performance Counters


    Performance counters are objects that provide information to monitor system activity.
    Although available from Windows, they show information not only about the operating
    system but also about some other Windows applications, services, and drivers.
    As a Windows application itself, SQL Server provides a rich number of performance
    counters, but it is common that, when troubleshooting SQL Server problems, performance
    counters from the operating system as well as some other Windows services or drivers
    may be required.


    Similar to the information provided by waits, as covered in Chapter [5](#393702_2_En_5_Chapter.xhtml),
    the values provided by performance counters can sometimes be difficult to interpret
    and may require either experience or a baseline from the system to compare with.
    As indicated earlier, there are also some cases of bad advice online where values
    recommended may not be exactly a good choice for your system or, even if there
    were a valid recommendation in the past, may not be a good value anymore.


    Performance counters use three basic terms: objects, counters, and instances.
    SQL Server performance objects have the format `SQLServer:<object name>` and may
    contain multiple counters. For example, the `SQLServer:Databases` object contains
    counters such as Data File(s) Size (KB) or Log Growths, both of which are explained
    later. Some objects may have multiple instances. Using the same example, for `SQLServer:Databases`,
    the instances in this case are represented by the system and user databases available
    on the server. You could get performance information from either one, some, or
    the total of all the instances combined. The SQL Server performance counter names
    will change slightly depending on whether you have a default or named instance.
    For example, `SQLServer:Databases` defines a counter on a default SQL Server instance,
    but will be called `MSSQL$<instance name>:Databases` on a named instance.


    Note


    A performance counter instance and a SQL Server instance both use the term “instance,”
    but they are not related concepts.


    There are a large number of SQL Server performance counters, most of them starting
    with the name SQLServer and some more starting with SQLAgent. Outside these two
    groups, there are several objects for SQL Server In-Memory OLTP called SQL Server
    <version> XTP, for example, SQL Server 2017 XTP Storage or SQL Server 2017 XTP
    Transactions. You can get the entire list and details of the SQL Server performance
    counters at [`https://technet.microsoft.com/en-us/library/ms190382.aspx`](https://technet.microsoft.com/en-us/library/ms190382.aspx)
    and the SQL Server In-Memory OLTP performance counters at [`https://technet.microsoft.com/en-us/library/dn511015.aspx`](https://technet.microsoft.com/en-us/library/dn511015.aspx).


    SQL Server also provides the `sys.dm_os_performance_counters` DMV, which, although
    can be easily queried, unfortunately only covers SQL Server counters, so you still
    need to look outside for the remaining Windows counters that you may need. In
    addition, `sys.dm_os_performance_counters` requires additional processing to its
    data, which we will discuss later.'
  trans: '

    # 8. 性能故障排除


    本章讨论在排查 SQL Server 性能问题时需要寻找哪些信息，既包括检查实时数据，也包括为后续分析收集信息。SQL Server 中的性能信息通过多种方式暴露，通常需要使用不同的工具来查看或收集这些数据。其中一种新颖且极具前景的工具
    `查询存储` 已在第 6 章中详细阐述。我确信 `查询存储` 将成为 SQL Server 2016 及以上版本查询性能故障排除的主要工具。除了查询性能，还有许多性能领域并不属于查询故障排除的范畴。


    **主动收集信息**对于高性能系统至关重要。你不能仅仅依赖在接到性能问题排查请求后才去获取当前可用信息。当你连接到 SQL Server 实例进行研究时，所需的信息可能已经消失了。然而，收集到的数据可以直接、快速地显示问题所在。此外，你可能需要一个基准，甚至可能还需要性能趋势，以了解系统如何运行，并主动发现情况何时开始偏离理想或预期的行为，无论是由于意外问题还是工作负载增加所致。


    本章涵盖了多种性能信息，包括性能计数器、通过 `DMV`（动态管理视图）或 `DMF`（动态管理函数）等对象提供的信息以及 SQL Server 事件，目前包括扩展事件和目前已弃用的
    `SQL Trace`（更广为人知的是其客户端工具 `SQL Profiler`）。这些性能信息由 SQL Server 提供，在某些情况下也由 Windows
    Server 甚至其他 Windows 应用程序、服务或驱动程序提供。话虽如此，性能计数器、事件或管理对象的数量非常庞大，并且随着每个版本甚至服务包的发布都会引入越来越多，因此这里仅描述最重要或最有用的那些。本书其他章节中也使用并描述了更多此类信息。如果你需要查看完整列表或更多详情，我也会提供文档链接。


    注意

    本章不教授如何使用这些工具，因为假定读者已具备使用这些工具的基本知识和经验。`查询存储` 是个例外，因为它是一个新工具，但已在第 6 章中详细涵盖。


    最后，在许多情况下，为某些性能计数器或其他性能信息提供“神奇值”历来是个问题，有时关于这些值的糟糕建议来自互联网。还有一种情况是，其中一些值在过去曾经是好的建议，但现在已不再那么有意义。一个经典的例子是
    `页面预期寿命 (PLE)` 著名的值 300，它已不再是一个好的建议（如果它曾经是的话）。因此，在大多数情况下，建议不是去寻找某个特定的“神奇值”，而是与基准进行比较。


    ## 性能计数器


    性能计数器是提供信息以监控系统活动的对象。尽管 Windows 自身提供这些计数器，但它们显示的信息不仅关于操作系统，也关于一些其他 Windows 应用程序、服务和驱动程序。作为
    Windows 应用程序，SQL Server 提供了丰富的性能计数器数量，但在排查 SQL Server 问题时，通常也需要来自操作系统以及一些其他 Windows
    服务或驱动程序的性能计数器。


    与第 5 章中介绍的等待信息类似，性能计数器提供的值有时可能难以解释，可能需要经验或系统基准进行比较。如前所述，网上也有一些糟糕建议的情况，其中推荐的值可能对你的系统并不完全合适，或者即使在过去曾是有效的建议，现在可能也不再是一个好的值。


    性能计数器使用三个基本术语：`对象`、`计数器` 和 `实例`。SQL Server 性能对象的格式为 `SQLServer:<对象名称>`，并且可能包含多个计数器。例如，`SQLServer:Databases`
    对象包含诸如 `数据文件大小 (KB)` 或 `日志增长` 等计数器，这两者将在后面解释。某些对象可能有多个实例。沿用此例，对于 `SQLServer:Databases`，这里的实例由服务器上可用的系统和用户数据库表示。你可以从一个、部分或所有实例的组合中获取性能信息。SQL
    Server 性能计数器名称会根据你使用的是默认实例还是命名实例而略有变化。例如，`SQLServer:Databases` 在默认 SQL Server
    实例上定义了一个计数器，但在命名实例上将被称为 `MSSQL$<实例名称>:Databases`。


    注意

    性能计数器实例和 SQL Server 实例都使用术语“实例”，但它们并非相关概念。


    存在大量的 SQL Server 性能计数器，其中大部分以 `SQLServer` 开头，还有一些以 `SQLAgent` 开头。除了这两组之外，还有几个用于
    SQL Server 内存 OLTP 的对象，称为 `SQL Server <版本> XTP`，例如 `SQL Server 2017 XTP 存储` 或
    `SQL Server 2017 XTP 事务`。你可以在 [`https://technet.microsoft.com/en-us/library/ms190382.aspx`](https://technet.microsoft.com/en-us/library/ms190382.aspx)
    获取 SQL Server 性能计数器的完整列表和详细信息，在 [`https://technet.microsoft.com/en-us/library/dn511015.aspx`](https://technet.microsoft.com/en-us/library/dn511015.aspx)
    获取 SQL Server 内存 OLTP 性能计数器的详细信息。


    SQL Server 还提供了 `sys.dm_os_performance_counters` `DMV`，虽然可以轻松查询，但不幸的是它只涵盖 SQL
    Server 计数器，因此你仍然需要从外部寻找你可能需要的其余 Windows 计数器。此外，`sys.dm_os_performance_counters`
    需要对其数据进行额外处理，我们将在后面讨论。

    '
- fmt: '# 性能监控与计数器


    尽管收集性能计数器数据通常不会影响系统性能，但应注意不要收集过多计数器或设置过短的更新间隔。用于显示和收集性能计数器的主要工具是 **Windows 性能监视器**，尽管还有其他一些相关流行工具，例如
    **PAL（日志性能分析）** 工具。PAL 用于分析性能计数器数据，可以在 `https://pal.codeplex.com` 找到。**SQL Server
    2008** 引入时，曾可以选择使用性能监视器和分析器来关联性能计数器和 **SQL 跟踪**事件的信息。如今，随着分析器和 **SQL 跟踪**被弃用，目前尚不清楚未来是否会有替代工具来用扩展事件完成相同的工作。


    最后，**数据收集器**（一个随 **SQL Server 2008** 引入的工具，在某些文档中称为 **MDW**（管理数据仓库））可用于收集最重要的性能计数器以及其他一些信息。启用此工具的一个直接好处是，您无需决定收集哪些性能计数器。数据收集器将根据
    **Microsoft 技术支持**的故障排除场景配置最有用的计数器。不过，您可以通过包含额外的性能计数器来微调此列表。移除性能计数器也是可能的，但很少需要。


    在下一节中，我将介绍一些最有用的性能计数器，但如前所述，还有很多其他计数器，您可以参考前面列出的文档以获取完整列表或其他详细信息。


    ### 比较批处理与事务


    测量每秒批处理请求数和每秒事务数是衡量 **SQL Server** 实例吞吐量的主要指标。它显示了您的实例当前执行的工作量。请记住，对于工作负载繁重的服务器，这些计数器可能显示的是实例的最大容量，但如果服务器不够繁忙，则只意味着它能够处理客户端应用程序发送的所有请求，并且可以在需要时处理更多请求。另一方面，特别是当您遇到性能问题时，等待分析可能表明应用程序发送的请求超出了
    **SQL Server** 实例的处理能力，而等待信息可能指明了限制所在。


    例如，如果一个 **SQL Server** 实例显示每秒 10,000 个批处理请求，这可能意味着它要么是实例能够处理的最大值，要么是应用程序提交的最大值。如果被请求，此实例有可能处理每秒
    12,000 个批处理请求。


    此外，相同的每秒批处理请求数在不同 **SQL Server** 实例之间可能并不意味着完全相同的吞吐量，因为它们的工作负载可能不同。例如，一个实例可能运行纯粹的
    **OLTP** 事务，而另一个可能是带有某些批处理的 **OLTP** 系统，还有一个可能是处理更昂贵查询的报表或分析系统。我尚未见过纯粹的 **OLTP**
    生产系统（如果它真的存在的话）。


    这些计数器的定义很简单：


    *   `SQLServer:Databases Transactions/sec`: 每秒事务数

    *   `SQLServer:SQL Statistics Batch Requests/sec`: 每秒接收到的批处理请求数

    *   `SQLServer:Transactions`: 活动事务总数


    为了更好地可视化和比较每秒批处理请求数与每秒事务数，让我们看以下练习。首先，创建一个表：

    ```sql

    CREATE TABLE t1 (id int IDENTITY(1,1), name varchar(20))

    ```


    运行以下包含十个隐式事务的批处理。为了有足够时间可视化服务器活动，我们使用 `GO` 命令运行该批处理 10,000 次。请根据您的测试系统随意调整。

    ```sql

    BEGIN

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    END

    GO 10000

    ```


    图 8-1 显示了我在执行过程中在性能监视器上截取的一个快照。请注意，每秒事务数大约是每秒批处理请求数的十倍，正如预期的那样。


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig1_HTML.jpg](images/393702_2_En_8_Chapter/393702_2_En_8_Fig1_HTML.jpg)


    **图 8-1**

    比较每秒批处理请求数与每秒事务数


    您也可以使用性能监视器中的折线图可视化相同的信息，尽管它们并非使用相同的比例尺进行绘制。（例如，图 8-2 中的值 3,919.333 在垂直轴上显示为 39.19。）您可以使用性能监视器属性更改垂直比例尺，如图
    8-3 所示。


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig3_HTML.jpg](images/393702_2_En_8_Chapter/393702_2_En_8_Fig3_HTML.jpg)


    **图 8-3**

    性能监视器垂直比例尺配置


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig2_HTML.jpg](images/393702_2_En_8_Chapter/393702_2_En_8_Fig2_HTML.jpg)


    **图 8-2**

    比较每秒批处理请求数与每秒事务数图表


    要进行清理，请删除表：

    ```sql

    DROP TABLE t1

    ```'
  raw: 'Although collecting performance counter data does not usually impact the performance
    of a system, some care should be taken not to collect too many counters or to
    have a frequent update interval. The main tool used to display and collect performance
    counters is Windows Performance Monitor, although there are some other related
    popular tools as well, such as the PAL (Performance Analysis of Logs) tool. PAL
    is used to analyze performance counter data and can be found at [`https://pal.codeplex.com`](https://pal.codeplex.com).
    Introduced with SQL Server 2008, there was the choice to correlate information
    from performance counters and SQL Trace events using Performance Monitor and Profiler.
    These days, with Profiler and SQL Trace deprecated, it is not clear yet if we
    will have a replacement tool to do the same with extended events in the future.


    Finally, the Data Collector, a tool introduced with SQL Server 2008 and called
    the MDW (Management Data Warehouse) on some documents, can be used to collect
    the most important performance counters along with some other information. An
    immediate benefit of enabling this tool is that you don’t have to decide which
    performance counters to collect. The Data Collector will configure the most useful
    according to troubleshooting scenarios from Microsoft technical support. You could,
    however, fine-tune this list by including additional performance counters. Removing
    performance counters is also possible but rarely needed.


    In the following section, I’ll cover some of the most useful performance counters,
    but as mentioned earlier, there are many more and you can refer to the previously
    listed documentation for the entire list or some additional details.


    ### Comparing Batches and Transactions


    Measuring batch requests per second and transactions per second is the main indicator
    of the throughput of your SQL Server instance. It shows how much work your instance
    is currently performing. Now keep in mind that with a server with a heavy workload,
    these counters may show the maximum capacity of the instance, but if the server
    is not busy enough, it just means that it is able to process all the requests
    being sent by the client application and more can be handled if needed. On the
    other hand, especially if you see a performance problem, wait analysis may show
    that the application is sending more requests than the SQL Server instance can
    handle, and the wait information may indicate what the limitations are.


    For example, if a SQL Server instance shows 10,000 batch requests per second,
    it could mean that either it is the maximum the instance can handle or the maximum
    the application is submitting. It could be possible for this instance to handle
    12,000 batch requests per second if it were requested.


    In addition, the same value of batch requests per second may not mean exactly
    the same throughput between one SQL Server instance and another as their workloads
    could be different. For example, one instance may be running pure OLTP transactions,
    while another may be an OLTP system with some batch processing, and yet another
    a reporting or analytical system handling more expensive queries. I have yet to
    see a pure OLTP production system, if it really exists.


    The definitions of these counters are straightforward:


    *   `SQLServer:Databases Transactions/sec`: Transaction per second


    *   `SQLServer:SQL Statistics Batch Requests/sec`: Number of batch requests received
    per second


    *   `SQLServer:Transactions`: Total number of active transactions


    To better visualize and compare batch requests per second and transactions per
    second, let’s look at the following exercise. First, create a table:


    ```

    CREATE TABLE t1 (id int IDENTITY(1,1), name varchar(20))

    ```


    Run the following batch containing ten implicit transactions each. To have enough
    time to visualize the server activity, we are running the batch 10,000 times by
    using the GO command. Feel free to adjust for your test system if needed.


    ```

    BEGIN

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    END

    GO 10000

    ```


    Figure [8-1](#393702_2_En_8_Chapter.xhtml#Fig1) shows one snapshot I took on Performance
    Monitor in the middle of the execution. Notice that the number of transactions
    per second is roughly ten times the number of batch requests per second, as expected.


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig1_HTML.jpg](images/393702_2_En_8_Chapter/393702_2_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Comparing batch requests/sec and transactions/sec


    You could also visualize the same information using the line graph in Performance
    Monitor, although these are not graphed using the same scale. (For example, the
    value 3,919.333 in Figure [8-2](#393702_2_En_8_Chapter.xhtml#Fig2) is shown at
    39.19 on the vertical axis.) You can change the vertical scale using Performance
    Monitor Properties, as shown in Figure [8-3](#393702_2_En_8_Chapter.xhtml#Fig3).


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig3_HTML.jpg](images/393702_2_En_8_Chapter/393702_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Performance Monitor vertical scale configuration


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig2_HTML.jpg](images/393702_2_En_8_Chapter/393702_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Comparing batch requests/sec and transactions/sec graph


    To clean up, drop the table:


    ```

    DROP TABLE t1

    ```'
  trans: '# 性能监控与计数器


    尽管收集性能计数器数据通常不会影响系统性能，但应注意不要收集过多计数器或设置过短的更新间隔。用于显示和收集性能计数器的主要工具是 **Windows 性能监视器**，尽管还有其他一些相关流行工具，例如
    **PAL（日志性能分析）** 工具。PAL 用于分析性能计数器数据，可以在 `https://pal.codeplex.com` 找到。**SQL Server
    2008** 引入时，曾可以选择使用性能监视器和分析器来关联性能计数器和 **SQL 跟踪**事件的信息。如今，随着分析器和 **SQL 跟踪**被弃用，目前尚不清楚未来是否会有替代工具来用扩展事件完成相同的工作。


    最后，**数据收集器**（一个随 **SQL Server 2008** 引入的工具，在某些文档中称为 **MDW**（管理数据仓库））可用于收集最重要的性能计数器以及其他一些信息。启用此工具的一个直接好处是，您无需决定收集哪些性能计数器。数据收集器将根据
    **Microsoft 技术支持**的故障排除场景配置最有用的计数器。不过，您可以通过包含额外的性能计数器来微调此列表。移除性能计数器也是可能的，但很少需要。


    在下一节中，我将介绍一些最有用的性能计数器，但如前所述，还有很多其他计数器，您可以参考前面列出的文档以获取完整列表或其他详细信息。


    ### 比较批处理与事务


    测量每秒批处理请求数和每秒事务数是衡量 **SQL Server** 实例吞吐量的主要指标。它显示了您的实例当前执行的工作量。请记住，对于工作负载繁重的服务器，这些计数器可能显示的是实例的最大容量，但如果服务器不够繁忙，则只意味着它能够处理客户端应用程序发送的所有请求，并且可以在需要时处理更多请求。另一方面，特别是当您遇到性能问题时，等待分析可能表明应用程序发送的请求超出了
    **SQL Server** 实例的处理能力，而等待信息可能指明了限制所在。


    例如，如果一个 **SQL Server** 实例显示每秒 10,000 个批处理请求，这可能意味着它要么是实例能够处理的最大值，要么是应用程序提交的最大值。如果被请求，此实例有可能处理每秒
    12,000 个批处理请求。


    此外，相同的每秒批处理请求数在不同 **SQL Server** 实例之间可能并不意味着完全相同的吞吐量，因为它们的工作负载可能不同。例如，一个实例可能运行纯粹的
    **OLTP** 事务，而另一个可能是带有某些批处理的 **OLTP** 系统，还有一个可能是处理更昂贵查询的报表或分析系统。我尚未见过纯粹的 **OLTP**
    生产系统（如果它真的存在的话）。


    这些计数器的定义很简单：


    *   `SQLServer:Databases Transactions/sec`: 每秒事务数

    *   `SQLServer:SQL Statistics Batch Requests/sec`: 每秒接收到的批处理请求数

    *   `SQLServer:Transactions`: 活动事务总数


    为了更好地可视化和比较每秒批处理请求数与每秒事务数，让我们看以下练习。首先，创建一个表：

    ```sql

    CREATE TABLE t1 (id int IDENTITY(1,1), name varchar(20))

    ```


    运行以下包含十个隐式事务的批处理。为了有足够时间可视化服务器活动，我们使用 `GO` 命令运行该批处理 10,000 次。请根据您的测试系统随意调整。

    ```sql

    BEGIN

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    END

    GO 10000

    ```


    图 8-1 显示了我在执行过程中在性能监视器上截取的一个快照。请注意，每秒事务数大约是每秒批处理请求数的十倍，正如预期的那样。


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig1_HTML.jpg](img/393702_2_En_8_Fig1_HTML.jpg)


    **图 8-1**

    比较每秒批处理请求数与每秒事务数


    您也可以使用性能监视器中的折线图可视化相同的信息，尽管它们并非使用相同的比例尺进行绘制。（例如，图 8-2 中的值 3,919.333 在垂直轴上显示为 39.19。）您可以使用性能监视器属性更改垂直比例尺，如图
    8-3 所示。


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig3_HTML.jpg](img/393702_2_En_8_Fig3_HTML.jpg)


    **图 8-3**

    性能监视器垂直比例尺配置


    ![../images/393702_2_En_8_Chapter/393702_2_En_8_Fig2_HTML.jpg](img/393702_2_En_8_Fig2_HTML.jpg)


    **图 8-2**

    比较每秒批处理请求数与每秒事务数图表


    要进行清理，请删除表：

    ```sql

    DROP TABLE t1

    ```'
- fmt: '### Log Growths


    Log growths are very expensive operations that can negatively impact the performance
    of your databases. Under `SQLServer:Databases`, `Log Growths` shows the total
    number of log growths for a database. This performance counter is especially important
    to show how critical it is to properly size your database files and, even more
    importantly, why not to rely on the default size configuration. Yes, there are
    production databases with these defaults out there. In addition, instant file
    initialization, mentioned in both Chapters [3](#393702_2_En_3_Chapter.xhtml) and
    [4](#393702_2_En_4_Chapter.xhtml), which helps to skip zeroing data files making
    a file growth operation almost instantaneous, does not help in transaction log
    files.


    Let’s do a quick exercise. Create a database with a default configuration:


    ```

    CREATE DATABASE test

    ```


    By inspecting the database properties, for example, using the Files section in
    SQL Server Management Studio, you can see that the initial size of the transaction
    log file is 8 MB, and autogrowth is enabled and configured to 64 MB. Open Performance
    Monitor and track both the `Log Growths` and `Log File(s) Size (KB)` counters,
    located on the `SQLServer:Databases` object. `Log File(s) Size (KB)` is the cumulative
    size of all the log files in a database, although usually only one such a file
    is needed on a database. Make sure you choose only the `test` database.


    Let’s create some transactions. We will slightly modify our previous table example
    to have larger rows so we can fill out data pages faster. Run the following statement:


    ```

    USE DATABASE test

    GO

    CREATE TABLE t1 (id int IDENTITY(1,1), name char(8000))

    ```


    Add data to stress the transaction log file:


    ```

    BEGIN

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    END

    GO 30000

    ```


    Originally, `Log Growths` will show 0 and `Log File(s) Size (KB)` 8184, which
    corresponds to the 8 MB mentioned earlier. Review Performance Monitor carefully
    as you run the code. It may be easier to follow in this case if you choose to
    visualize the data as a report. It should not take long until `Log Growths` reaches
    10 so you can cancel the query when it reaches such value. Ten file increments
    of 64 MB each plus the original 8 MB should give a size of 648 MB, which is the
    file size I see at the end of this exercise. In other words, `Log File(s) Size
    (KB)` will show 663,544 and `Log Growths` 10. Drop the database to end the exercise.


    As we previously discussed, it is strongly recommended to size the transaction
    log file to the maximum required size to avoid log growths or, even worse, transaction
    failures and potential application outages, if the file becomes full without the
    possibility to expand. Usually, finding the optimal file size requires some testing,
    and, unfortunately, an unexpected activity or long transaction may still happen
    that requires the log to grow. However, by following the previous recommendations,
    you can avoid or minimize those chances.


    A performance problem related to transaction log file growth operation could be
    very difficult to troubleshoot if you are not tracing or collecting data since,
    usually after the file size has increased, the performance will return to normal
    with no information to show what the problem was. The `PREEMPTIVE_OS_WRITEFILEGATHER`
    wait type may also show that a file is being zero-initialized, but depending on
    how you capture waits, you may not have additional information to point to a specific
    database or file. For more details about troubleshooting performance with waits,
    see Chapter [5](#393702_2_En_5_Chapter.xhtml).


    Finally, you may be able to see those events using the SQL Server default trace
    and visualize its information immediately by running the Disk Usage report. To
    run the report, right-click the `test` database and select `Reports` > `Standard
    Reports` > `Disk Usage`. Information is shown in the `Data/Log Files Autogrow/Autoshrink
    Events` section. Keep in mind that the default trace has a limited file size and
    older events will be eventually deleted.


    ### Data File(s) Size (KB)


    Similar to `Log File(s) Size (KB)` explained in the previous section, the `Data
    File(s) Size (KB)` performance counter shows the cumulative size of all the data
    files in the database. Unlike transaction log files, it is very common to have
    multiple data files in a database.


    Although there is no corresponding counter like `Log Growths` for data files,
    you can use the `Data File(s) Size (KB)` counter to figure out when a data file
    growth operation occurred. Once again, properly sizing your data files and enabling
    instant file initialization can help you avoid performance problems related to
    data file growth operations.


    Note

    The SQL Server default trace and the Disk Usage report can be helpful to show
    data file autogrow events as well.


    ### Page Reads/Sec


    Under `SQLServer:Buffer Manager`, `Page reads/sec` shows the number of physical
    database pages read by SQL Server. Troubleshooting a problem with excessive `Page
    reads/sec` would require additional information, such as finding out which queries
    are performing large number of reads or analyzing the output of some DMVs like
    `sys.dm_io_virtual_file_stats` or `sys.dm_db_index_usage_stats`. Taking a look
    at memory information can be helpful as well.


    Troubleshooting a problem related to queries would require traditional query optimization
    techniques, including analyzing the query execution plan, seeing if one or more
    indexes are required, finding if excessive table scans or index seeks are being
    performed, or researching if a parameter-sensitive query is impacting I/O operations.


    Note

    As shown later in this chapter, starting with SQL Server 2016 and SQL Server 2014
    Service Pack 2, you can find operator-level performance information in an execution
    plan, including I/O statistics.


    ### Page Writes/Sec


    Under `SQLServer:Buffer Manager`, `Page writes/sec` shows the number of physical
    database page writes issued per second. Most of the recommendations mentioned
    on `Page reads/sec` may also apply here. You can also try to correlate this counter
    with the Log Flush counters explained later.'
