- fmt: '### `sys.dm_os_volume_stats`


    `sys.dm_os_volume_stats` DMF 根据提供的数据库 ID 和文件 ID，返回系统中有关卷的信息。与本书中的其他函数不同，此函数必须提供参数。返回的部分信息包括：卷挂载点、逻辑卷名、文件系统类型（如
    NTFS、FAT 或 RAW）、卷总大小（字节）、可用空间、卷是否支持操作系统压缩、备用数据流或稀疏文件，以及卷是否为只读和已压缩。


    以下是一个请求 `AdventureWorks` 中 `file_id` 为 1 的卷信息的示例：


    ```

    SELECT * FROM sys.dm_os_volume_stats (DB_ID(''AdventureWorks2017''), 1)

    ```


    **注意**


    挂载点是一种在不需要驱动器号的情况下将卷添加到文件系统的方法，可以在 NTFS 文件系统的目录中创建。挂载点随 Windows Server 2000 引入。


    ### `sys.dm_db_index_usage_stats`


    `sys.dm_db_index_usage_stats` DMV 返回有关数据库中表和索引所执行操作的信息，包括用户查询和系统查询产生的查找、扫描、书签查找和更新的次数。它还报告这些操作最后一次执行的时间。此信息按索引和表（即聚集索引或堆）报告。用户活动指用户和应用程序提交的查询。系统查询是内部生成的查询，例如执行统计信息更新所需的操作。


    此 DMV 可与 `sys.dm_io_virtual_file_stats` DMV 结合使用，以深入分析数据库中哪些对象可能具有过高的 I/O 活动。但是，它的工作方式与
    `sys.dm_io_virtual_file_stats` 不同，因为它不显示字节或等待时间，而主要从查询处理的角度显示活动。请注意，此 DMV 返回整个实例的信息，因此你可能希望仅选择特定数据库的结果，如下面的代码所示：


    ```

    SELECT OBJECT_NAME(object_id), * FROM sys.dm_db_index_usage_stats

    WHERE database_id = DB_ID()

    ORDER BY object_id, index_id

    ```


    你可以选择将此 DMV 与 `sys.indexes` 联接以获取额外的索引详细信息。以下是一个基本查询示例：


    ```

    SELECT OBJECT_NAME(s.object_id) AS object_name, i.name, s.*

    FROM sys.dm_db_index_usage_stats s JOIN sys.indexes i

    ON s.object_id = i.object_id AND s.index_id = i.index_id

    WHERE database_id = DB_ID()

    ORDER BY object_id, index_id

    ```


    一个基本的样本输出如表 [8-4](#393702_2_En_8_Chapter.xhtml#Tab4) 所示。


    表 8-4

    样本输出


    | Name | index_id | user_seeks | user_scans | user_lookups | user_updates |

    | --- | --- | --- | --- | --- | --- |

    | PK_ProductReview_ProductReviewID | 1 | 1 | 0 | 0 | 0 |

    | PK_Document_DocumentNode | 1 | 1 | 0 | 0 | 0 |

    | PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID | 1 | 0 | 46 | 14 | 0 |

    | IX_SalesOrderDetail_ProductID | 8 | 14 | 8 | 0 | 0 |

    | PK_SalesOrderHeader_SalesOrderID | 1 | 0 | 8 | 4 | 3 |


    ### `sys.dm_exec_query_stats`


    `sys.dm_exec_query_stats` DMV 返回 SQL Server 中缓存查询计划的查询性能信息。尽管此 DMV 中的信息非常有帮助，但我还强烈建议你启用查询存储（或者如果你使用的是较旧的
    SQL Server 版本，则启用数据收集器）以收集更高质量的查询性能数据。


    如第 [6](#393702_2_En_6_Chapter.xhtml) 章所述，查询存储为使用此 DMV 提供了一些额外的好处，包括以下几点：


    1.  使用 `sys.dm_exec_query_stats` DMV 仅提供当前位于计划缓存中的计划的视图。计划的当前版本是唯一存在的，并且即使此版本也可能随时从计划缓存中移除。查询存储持久保存每个查询的所有历史计划。

    2.  并非每个计划都会被缓存，因此也就不会通过 `sys.dm_exec_query_stats` DMV 暴露。所有计划和查询信息都由查询存储存储，即使是那些不完整的查询的计划。


    话虽如此，`sys.dm_exec_query_stats` DMV 仍然具有许多优点，因为它可以在没有任何性能影响的情况下进行查询。这相对于旧版本的 SQL
    Server 是一个巨大的改进，在旧版本中获取类似信息需要运行昂贵的 SQL Trace 会话以及复杂的方法来处理和聚合数据。


    该 DMV 跟踪性能信息，例如工作线程时间（CPU 时间）、物理读取、逻辑写入、逻辑读取、公共语言运行时 (CLR)、已用时间和返回的行数。对于这些指标中的每一个，都会返回总计、最后、最小值和最大值统计数据。本章前面关于性能计数器的部分包含一个典型示例，该示例使用
    `sys.dm_exec_query_stats` DMV 获取系统中按 CPU 排序的最昂贵查询，该示例可以轻松更新，以列出按其他可用指标（如逻辑读取或物理读取）排序的昂贵查询。从
    SQL Server 2016 开始，此 DMV 包含与并行度、保留内存授予量、理想内存授予量、保留并行线程数和已用并行线程数相关的附加性能信息。'
  raw: '### sys.dm_os_volume_stats


    The `sys.dm_os_volume_stats` DMF returns information about the volumes in the
    system, based on the provided database ID and file ID. Unlike the other functions
    in this book, parameters must be provided. Some of the information returned includes
    volume mount point; logical volume name; file system type such as NTFS, FAT, or
    RAW; volume total size in bytes; available free space; whether the volume supports
    operating system compression; alternate streams or sparse files; and finally if
    the volume is read-only and compressed.


    An example requesting volume information for the `file_id` 1 on AdventureWorks:


    ```

    SELECT * FROM sys.dm_os_volume_stats (DB_ID(''AdventureWorks2017''), 1)

    ```


    Note


    A mount point is a method to add volumes to a file system without the need of
    a drive letter and can be created in a directory on an NTFS file system. Mount
    points were introduced with Windows Server 2000.


    ### sys.dm_db_index_usage_stats


    The `sys.dm_db_index_usage_stats` DMV returns information about the operations
    performed on tables and indexes of a database including the number of seeks, scans,
    bookmark lookups, and updates by both user queries and system queries. It also
    reports the last time each of these operations was performed. The information
    is reported per index and table (i.e., a clustered index or heap). User activity
    is the queries submitted by users and applications. System queries are internally
    generated queries such as the operations required to perform statistics update.


    This DMV could be used in conjunction with the `sys.dm_io_virtual_file_stats`
    DMV to drill down which objects in a database may have excessive I/O activity.
    However, it works in a different way as `sys.dm_io_virtual_file_stats`, as it
    does not show bytes or waits but mostly shows the activity from the query processing
    point of view. Keep in mind that this DMV returns information for the entire instance
    so you may want to select results for a specific database only, like in the following
    code:


    ```

    SELECT OBJECT_NAME(object_id), * FROM sys.dm_db_index_usage_stats

    WHERE database_id = DB_ID()

    ORDER BY object_id, index_id

    ```


    You can optionally join this DMV to `sys.indexes` for additional index details.
    Here is a basic query example:


    ```

    SELECT OBJECT_NAME(s.object_id) AS object_name, i.name, s.*

    FROM sys.dm_db_index_usage_stats s JOIN sys.indexes i

    ON s.object_id = i.object_id AND s.index_id = i.index_id

    WHERE database_id = DB_ID()

    ORDER BY object_id, index_id

    ```


    A basic sample output is shown in Table [8-4](#393702_2_En_8_Chapter.xhtml#Tab4).


    Table 8-4


    Sample Output


    | Name | index_id | user_seeks | user_scans | user_lookups | user_updates |

    | --- | --- | --- | --- | --- | --- |

    | PK_ProductReview_ProductReviewID | 1 | 1 | 0 | 0 | 0 |

    | PK_Document_DocumentNode | 1 | 1 | 0 | 0 | 0 |

    | PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID | 1 | 0 | 46 | 14 | 0 |

    | IX_SalesOrderDetail_ProductID | 8 | 14 | 8 | 0 | 0 |

    | PK_SalesOrderHeader_SalesOrderID | 1 | 0 | 8 | 4 | 3 |


    ### sys.dm_exec_query_stats


    The `sys.dm_exec_query_stats` DMV returns query performance information for cached
    query plans in SQL Server. Although the information in this DMV is extremely helpful,
    I also strongly recommend you enable the Query Store (or the Data Collector, if
    you are in an older SQL Server version) to collect better quality query performance
    data.


    As mentioned in Chapter [6](#393702_2_En_6_Chapter.xhtml), the Query Store provides
    some additional benefits to using this DMV including the following:


    1.  Using the `sys.dm_exec_query_stats` DMV provides a view of only the plans
    currently in the plan cache. Only the current version of a plan exists, and even
    this version can be removed from the plan cache at any time. The Query Store persists
    all the history of plans for every query.


    2.  Not every plan gets cached and therefore exposed by the `sys.dm_exec_query_stats`
    DMV. All the plans and query information are stored by the Query Store, even those
    of incomplete queries.


    Having said that, the `sys.dm_exec_query_stats` DMV has a lot of benefits as it
    can be queried without any performance impact. This is a huge improvement over
    older versions of SQL Server where getting similar information would require running
    an expensive SQL Trace session along with complex methods to process and aggregate
    data.


    The DMV tracks performance information such as worker time (CPU time), physical
    reads, logical writes, logical reads, Common Language Runtime (CLR), elapsed time,
    and rows returned. For each one of these indicators, total, last, minimum, and
    maximum statistics are returned. The section about performance counters earlier
    in this chapter includes a typical example using the `sys.dm_exec_query_stats`
    DMV to obtain the most expensive queries in the system by CPU, which can be easily
    updated to list expensive queries by other available metrics such as logical reads
    or physical reads. Starting with SQL Server 2016, this DMV includes additional
    performance information related to the degree of parallelism, amount of reserved
    memory grant, amount of ideal memory grant, reserved parallel threads, and used
    parallel threads .'
  trans: '

    ### `sys.dm_os_volume_stats`


    `sys.dm_os_volume_stats` 这一 DMF（动态管理函数）根据提供的数据库 ID 和文件 ID，返回系统中有关卷的信息。与本书中的其他函数不同，此函数必须提供参数。返回的部分信息包括：卷挂载点、逻辑卷名、文件系统类型（如
    NTFS、FAT 或 RAW）、卷总大小（字节）、可用空间、卷是否支持操作系统压缩、备用数据流或稀疏文件，以及卷是否为只读和已压缩。


    以下是一个请求 `AdventureWorks` 中 `file_id` 为 1 的卷信息的示例：


    ```

    SELECT * FROM sys.dm_os_volume_stats (DB_ID(''AdventureWorks2017''), 1)

    ```


    **注意**


    挂载点是一种在不需要驱动器号的情况下将卷添加到文件系统的方法，可以在 NTFS 文件系统的目录中创建。挂载点随 Windows Server 2000 引入。


    ### `sys.dm_db_index_usage_stats`


    `sys.dm_db_index_usage_stats` 这一 DMV（动态管理视图）返回有关数据库中表和索引所执行操作的信息，包括用户查询和系统查询产生的查找、扫描、书签查找和更新的次数。它还报告这些操作最后一次执行的时间。此信息按索引和表（即聚集索引或堆）报告。用户活动指用户和应用程序提交的查询。系统查询是内部生成的查询，例如执行统计信息更新所需的操作。


    此 DMV 可与 `sys.dm_io_virtual_file_stats` DMV 结合使用，以深入分析数据库中哪些对象可能具有过高的 I/O 活动。但是，它的工作方式与
    `sys.dm_io_virtual_file_stats` 不同，因为它不显示字节或等待时间，而主要从查询处理的角度显示活动。请注意，此 DMV 返回整个实例的信息，因此你可能希望仅选择特定数据库的结果，如下面的代码所示：


    ```

    SELECT OBJECT_NAME(object_id), * FROM sys.dm_db_index_usage_stats

    WHERE database_id = DB_ID()

    ORDER BY object_id, index_id

    ```


    你可以选择将此 DMV 与 `sys.indexes` 联接以获取额外的索引详细信息。以下是一个基本查询示例：


    ```

    SELECT OBJECT_NAME(s.object_id) AS object_name, i.name, s.*

    FROM sys.dm_db_index_usage_stats s JOIN sys.indexes i

    ON s.object_id = i.object_id AND s.index_id = i.index_id

    WHERE database_id = DB_ID()

    ORDER BY object_id, index_id

    ```


    一个基本的样本输出如表 8-4 所示。


    表 8-4

    样本输出


    | 名称 | 索引 ID | 用户查找次数 | 用户扫描次数 | 用户书签查找次数 | 用户更新次数 |

    | --- | --- | --- | --- | --- | --- |

    | PK_ProductReview_ProductReviewID | 1 | 1 | 0 | 0 | 0 |

    | PK_Document_DocumentNode | 1 | 1 | 0 | 0 | 0 |

    | PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID | 1 | 0 | 46 | 14 | 0 |

    | IX_SalesOrderDetail_ProductID | 8 | 14 | 8 | 0 | 0 |

    | PK_SalesOrderHeader_SalesOrderID | 1 | 0 | 8 | 4 | 3 |


    ### `sys.dm_exec_query_stats`


    `sys.dm_exec_query_stats` 这一 DMV 返回 SQL Server 中缓存查询计划的查询性能信息。尽管此 DMV 中的信息非常有帮助，但我还强烈建议你启用查询存储（或者如果你使用的是较旧的
    SQL Server 版本，则启用数据收集器）以收集更高质量的查询性能数据。


    如第 6 章所述，查询存储为使用此 DMV 提供了一些额外的好处，包括以下几点：


    1.  使用 `sys.dm_exec_query_stats` DMV 仅提供当前位于计划缓存中的计划的视图。计划的当前版本是唯一存在的，并且即使此版本也可能随时从计划缓存中移除。查询存储持久保存每个查询的所有历史计划。

    2.  并非每个计划都会被缓存，因此也就不会通过 `sys.dm_exec_query_stats` DMV 暴露。所有计划和查询信息都由查询存储存储，即使是那些不完整的查询的计划。


    话虽如此，`sys.dm_exec_query_stats` DMV 仍然具有许多优点，因为它可以在没有任何性能影响的情况下进行查询。这相对于旧版本的 SQL
    Server 是一个巨大的改进，在旧版本中获取类似信息需要运行昂贵的 SQL Trace 会话以及复杂的方法来处理和聚合数据。


    该 DMV 跟踪性能信息，例如工作线程时间（CPU 时间）、物理读取、逻辑写入、逻辑读取、公共语言运行时 (CLR)、已用时间和返回的行数。对于这些指标中的每一个，都会返回总计、最后、最小值和最大值统计数据。本章前面关于性能计数器的部分包含一个典型示例，该示例使用
    `sys.dm_exec_query_stats` DMV 获取系统中按 CPU 排序的最昂贵查询，该示例可以轻松更新，以列出按其他可用指标（如逻辑读取或物理读取）排序的昂贵查询。从
    SQL Server 2016 开始，此 DMV 包含与并行度、保留内存授予量、理想内存授予量、保留并行线程数和已用并行线程数相关的附加性能信息。

