  trans: '

    # 第三部分 监控


    ## 监控磁盘空间


    虽然监控 `tempdb` 上的磁盘空间本身并不直接属于性能范畴，但看到意外的大量磁盘空间使用情况有时可能是性能问题或其他问题的征兆。`tempdb` 中大多数与磁盘空间相关的问题是由版本控制引起的（当使用两种快照隔离中的任何一种时），或者由排序或哈希联接创建的内部对象引起，这已在上一节中介绍过。


    你可以使用 `sys.dm_db_file_space_usage` 动态管理视图（DMV）来返回数据库中每个文件的空间使用情况信息。事实上，在较早版本的
    SQL Server 中，此 DMV 仅适用于 `tempdb`，但后来被扩展到包含每个数据库的信息，尽管内部对象和版本存储相关的列仍然仅适用于 `tempdb`。以下查询通常用于报告不同对象使用的空间：


    ```sql

    USE tempdb

    GO

    SELECT

    SUM (user_object_reserved_page_count) * 1.0 / 128 as user_object_mb,

    SUM (internal_object_reserved_page_count) * 1.0 / 128 as internal_objects_mb,

    SUM (version_store_reserved_page_count) * 1.0 / 128  as version_store_mb,

    SUM (unallocated_extent_page_count) * 1.0 / 128 as free_space_mb,

    SUM (mixed_extent_page_count) * 1.0 / 128 as mixed_extents_mb

    FROM sys.dm_db_file_space_usage

    ```


    有时，你可能需要查找可能导致磁盘空间问题的特定进程。在这种情况下，你可以使用 `sys.dm_db_task_space_usage` DMV，它按任务返回页面分配和释放活动，并且仅适用于
    `tempdb` 数据库。一个示例是以下查询，借鉴了本章摘要中提到的 `tempdb` 白皮书：


    ```sql

    SELECT t1.session_id, t1.request_id, t1.task_alloc,

    t1.task_dealloc, t2.sql_handle, t2.statement_start_offset,

    t2.statement_end_offset, t2.plan_handle

    FROM (SELECT session_id, request_id,

    SUM(internal_objects_alloc_page_count) AS task_alloc,

    SUM (internal_objects_dealloc_page_count) AS task_dealloc

    FROM sys.dm_db_task_space_usage

    GROUP BY session_id, request_id) AS t1,

    sys.dm_exec_requests AS t2

    WHERE t1.session_id = t2.session_id

    AND (t1.request_id = t2.request_id)

    ORDER BY t1.task_alloc DESC

    ```


    ## 总结


    `tempdb` 是一个特殊的系统数据库，它与 SQL Server 实例上的所有数据库和活动共享，用于保存临时对象或中间结果集。在本章中，我们从 SQL
    Server 性能角度介绍了 `tempdb`。向读者推荐的另一份资料是 Microsoft 白皮书《在 SQL Server 2005 中使用 tempdb》，尽管它涵盖的是较旧版本的
    SQL Server，但仍包含大量相关且有用的信息。你可以在以下网址找到这份白皮书：[`https://technet.microsoft.com/en-us/library/cc966545.aspx`](https://technet.microsoft.com/en-us/library/cc966545.aspx)。


    与 `tempdb` 相关的两个最常见的性能问题是分配页的闩锁争用，以及当某些查询处理器操作（如排序、哈希联接或使用范围扫描的交换）没有足够内存时发生的 `tempdb`
    溢出。SQL Server 2016 引入的新默认设置有助于避免或最小化 `tempdb` 争用问题，方法是在安装期间自动配置多个数据文件，并包含了以前版本需要显式配置跟踪标志
    1117 和 1118 的行为。


    此外，SQL Server 2019 引入的内存优化 tempdb 元数据是多年来最有前途的 tempdb 新功能。此功能旨在通过将 tempdb 系统表移动到无闩锁的非持久化内存优化表中来消除元数据争用。


    ## 5. 分析等待统计信息


    当特定问题缺乏信息时，我用于故障排除性能问题的主要建议之一是运行 SQL 跟踪或扩展事件会话以找出最耗资源的查询。此方法通常会根据一个或多个指标（包括持续时间、CPU
    使用率、逻辑读和物理读、写入、行数等）向我们显示最耗资源的查询。很多时候选择的指标是持续时间，即查询执行所需的时间。我们通常假设整个持续时间都是有效工作，当然这可以优化。在许多情况下，这种方法可以找到有问题的查询，调整它们就能解决性能问题。


    然而，在这个持续时间指标中隐藏或不明显的是，查询执行有效工作花了多少时间，以及什么都不做（基本上是在等待其他事情发生）花了多少时间。了解这两个值很重要，因为两者都可以被优化或处理。例如，一个查询可能显示持续时间为
    30 秒——20 秒用于工作（例如扫描表），剩下的 10 秒用于等待系统资源或被阻塞。查询调优者通常会忽略等待部分，并且他们只能优化工作部分，因为大多数工具只显示那部分信息。例如，他们可以轻松地在执行计划中找到表扫描，而使用索引查找可能更合适。


    同样正确的是，有时优化工作部分也可能间接优化等待部分，但并非总是如此。阻塞可能仍在发生，所以我们可能只解决了一半的问题。在其他一些情况下，等待可能主导持续时间，因此优化其他领域只会带来适度的性能改进。这些情况表明，为什么等待分析是性能故障排除的重要组成部分。总之，性能问题的发生是因为
    SQL Server 要么执行了过多的工作，要么可能什么都没做，只是等待资源可用的时间太长。虽然一个查询长时间等待并不真正使用资源，但它对最终用户来说会显得很慢。


    幸运的是，SQL Server 会跟踪数据库引擎中发生的每次等待，这些信息可以通过多种方式获得。虽然该信息在产品的所有版本中都可用，但本章展示的 DMV 和技术是在
    SQL Server 2005 及更高版本中引入的。


    等待性能调优方法，也称为故障排除等待和队列，是一种广泛使用的调优方法，最初由 Tom Davidson 的 Microsoft 白皮书《SQL Server
    2005 Waits and Queues》引入，你仍然可以在 [`https://technet.microsoft.com/en-us/library/cc966413.aspx`](https://technet.microsoft.com/en-us/library/cc966413.aspx)
    找到。


    一旦我们知道 SQL Server 在等待什么，我们应该拥有解决问题所需的所有信息，对吗？不幸的是，事情并非那么简单。等待和队列性能方法通常需要一些经验和来自其他来源的额外分析，包括查看系统范围内的性能数据。等待在
    SQL Server 中随时发生。事实上，即使有大量的等待通常也不意味着存在问题。在许多情况下，SQL Server 等待某些东西是完全正常的。一些特定的等待，通常称为良性等待，可以始终被忽略，因此将它们从我们的分析中过滤掉也很重要。


    当我们获得等待信息时，我们通常只得到一个数字，因此挑战在于知道等待何时是异常或过度的。在大多数情况下，你必须将等待信息与你可以从 SQL Server 的各种来源（包括
    DMV、性能计数器、SQL 跟踪、扩展事件等）获得的其他一些信息关联起来，然后解释和关联所得的数据。

