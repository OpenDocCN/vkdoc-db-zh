  trans: '## tempdb 溢出警告


    尽管 SQL Server 中的每个查询都需要一些内存来执行其工作，但某些查询操作（如哈希、排序和交换）可能需要显著更多的内存，具体取决于它们需要处理的数据量。这些内存用于存储待排序的行，或用于构建哈希连接和哈希聚合运算符所使用的哈希表。在某些情况下，并行查询计划（包含多个范围扫描）也可能需要内存授权。查询优化器通常能较好地估算所需内存量，如果内存可用，它将在执行时提供给运算符。


    然而，如第 1 章所述，当分配的内存不足，哈希、排序和并行或交换运算符被迫进行额外的数据处理或使用 `tempdb` 数据库（溢出到磁盘）时，可能会导致性能问题。这些问题通常源于基数估计不佳，查询优化器可能低估了查询所需的内存量。由于授予查询的内存可能少于所需，排序操作或哈希操作的生成输入可能无法容纳在可用内存中。一旦查询开始执行，即使没有足够的内存，它也必须继续运行。


    你可以使用 `sort_warning`、`hash_warning` 和 `exchange_spill` 扩展事件（或 `Sort Warning`、`Hash
    Warning` 和 `Exchange Spill` 跟踪事件类）来监控系统中可能发生的这些性能问题。从 SQL Server 2016 开始，你还可以使用第
    6 章介绍的“实时查询统计信息”功能，这也有助于实时查看这些性能问题，因为这些操作可能占据查询执行的很大一部分。


    除了性能问题外，由于访问磁盘比访问内存慢数倍，这些操作可能在 `tempdb` 上创建大量内部对象，从而导致磁盘空间问题。我曾在此类场景中见过问题查询向 `tempdb`
    写入数十或数百 GB 的数据。我们将在下一节更详细地讨论如何监控 `tempdb` 使用的磁盘空间量。


    由于此问题的主要原因是查询优化器低估了所需内存，因此修复它的最佳行动方案是确保统计信息存在且是最新的。根据具体问题，将给出额外的建议，如下三节所示。


    ### 排序警告


    排序警告由需要排序的查询产生，例如使用 `ORDER BY` 子句时。`sort_warning` 扩展事件提供了用于排查此问题的附加数据，包括实际排序行数、授予的内存量、使用的内存量，以及从工作表读取和写入的页数。你应该特别注意
    `sort_warning_type` 列，它显示是否需要单次额外遍历或多次遍历来获取排序输出。此警告类型信息也可通过使用 `EventSubClass`
    列的 `Sort Warning` 跟踪事件获得。该事件还包括 `query_operation_node_id` 列，你可以使用它来识别是哪个运算符导致了
    `tempdb` 溢出，或者也可以查看执行计划以查找排序运算符上的警告或 `SpillToTempDb` 属性。避免排序警告的一个典型解决方案是为查询添加适当的索引。更多关于索引的详细信息将在第
    9 章介绍。


    ### 哈希警告


    当哈希连接没有足够的内存来创建其哈希表时，会产生哈希警告。哈希连接的工作原理是在内存中创建一个称为生成输入的哈希表。连接的第二个输入（称为探测输入）将被读取并与哈希表进行比较，返回匹配的行。查询优化器将选择两个连接表中较小的一个作为生成输入，并且通常能正确估计其哈希表所需的内存量。如果估计不正确，查询处理器甚至可以在执行时反转这两个角色，选择新的较小输入作为生成输入。


    但是，当对此哈希表所需内存的估计不佳时，仍然可能出现性能问题。由于查询可能没有分配足够的内存，可能需要 SQL Server 在 `tempdb` 中使用一个工作文件。


    当生成输入无法容纳在可用内存中时，SQL Server 必须首先将其行分成多个分区，分别进行处理。如果其中任何分区仍然无法容纳在可用内存中，它们将被分成子分区，并再次分别处理。此拆分过程将持续进行，直到每个分区都能容纳在可用内存中，或者达到最大递归级别。最大递归级别在事件的
    `recursion_level` 列（或 SQL 跟踪中的 `IntegerData` 列）中显示，并对应于生成输入被子分区的次数。此整个过程称为哈希递归。


    当哈希递归达到最大递归级别时，查询处理器将尝试使用称为哈希中止的不同过程来处理剩余数据。SQL Server 将在执行期间使用 `hash_warning_type`
    事件列（或 `Hash Warning` 跟踪事件中的 `EventSubClass` 列）显示使用的是哈希递归还是哈希中止。


    与前面讨论的排序警告类似，`hash_warning` 扩展事件提供了额外的故障排除数据，例如包括实际唯一哈希行数、授予的内存量、使用的内存量，以及从工作表读取和写入的页数。


    要避免哈希警告问题，除了前面提到的关于统计信息的一般建议外，你可以尝试使用不同的连接类型。或者，如果你服务器上的内存有限，可以增加可用内存。使用不同的连接类型可能需要使用查询提示，并且应仔细测试以验证其是否确实提高了查询性能。


    ### 交换警告


    最后，交换警告比其他两种更少见，它发生在并行计划中的通信缓冲区被临时写入 `tempdb` 数据库时。如第 1 章所述，交换运算符负责通过同时使用多个处理器执行查询来实现
    SQL Server 中的并行。交换警告问题仅在你有多个有序范围扫描的情况下发生。在这种情况下，你可以尝试避免使用 `ORDER BY` 子句，尝试避免多个范围扫描，尝试使用索引提示以不同的方式访问表，甚至极端情况下避免并行计划，例如使用
    `MAXDOP` 查询提示。'
- fmt: '# Part III Monitoring


    ## Monitoring Disk Space


    Although monitoring disk space on `tempdb` does not directly fall into the performance
    area per se, seeing unexpected large amounts of disk space used can sometimes
    be an indication of performance issues or other problems. Most of the disk space–related
    issues in `tempdb` are created by versioning, when any of the two flavors of snapshot
    isolation is used, or by internal objects created by sorts or hash joins, as covered
    in the previous section.


    You can use the `sys.dm_db_file_space_usage` DMV to return space usage information
    for each file in a database. In fact, in older versions of SQL Server, this DMV
    was only applicable to `tempdb` but was later extended to include information
    for every database, although the internal objects and version store–related columns
    still apply only to `tempdb`. The following query is commonly used to report the
    space used by the different objects:


    ```sql

    USE tempdb

    GO

    SELECT

    SUM (user_object_reserved_page_count) * 1.0 / 128 as user_object_mb,

    SUM (internal_object_reserved_page_count) * 1.0 / 128 as internal_objects_mb,

    SUM (version_store_reserved_page_count) * 1.0 / 128  as version_store_mb,

    SUM (unallocated_extent_page_count) * 1.0 / 128 as free_space_mb,

    SUM (mixed_extent_page_count) * 1.0 / 128 as mixed_extents_mb

    FROM sys.dm_db_file_space_usage

    ```


    Sometimes, you may need to look for a specific process which can be causing the
    disk space problem. In this case, you could use `sys.dm_db_task_space_use` DMV,
    which returns page allocation and deallocation activity by task and is applicable
    only to the `tempdb` database. An example is the following query, borrowed from
    the `tempdb` white paper mentioned in the summary of this chapter:


    ```sql

    SELECT t1.session_id, t1.request_id, t1.task_alloc,

    t1.task_dealloc, t2.sql_handle, t2.statement_start_offset,

    t2.statement_end_offset, t2.plan_handle

    FROM (SELECT session_id, request_id,

    SUM(internal_objects_alloc_page_count) AS task_alloc,

    SUM (internal_objects_dealloc_page_count) AS task_dealloc

    FROM sys.dm_db_task_space_usage

    GROUP BY session_id, request_id) AS t1,

    sys.dm_exec_requests AS t2

    WHERE t1.session_id = t2.session_id

    AND (t1.request_id = t2.request_id)

    ORDER BY t1.task_alloc DESC

    ```


    ## Summary


    `tempdb` is a special system database that is shared with all the databases and
    activities on the SQL Server instance, and it is used for holding temporary objects
    or intermediate result sets. In this chapter, we covered `tempdb` from a SQL Server
    performance point of view. An additional recommendation for the reader is the
    Microsoft white paper “Working with tempdb in SQL Server 2005,” which, although
    covering an older version of SQL Server, still contains a lot of relevant and
    useful information. You can find this white paper at [`https://technet.microsoft.com/en-us/library/cc966545.aspx`](https://technet.microsoft.com/en-us/library/cc966545.aspx).


    Two of the most common performance problems related to `tempdb` are latch contention
    of allocation pages and `tempdb` spills when not enough memory is available for
    some query processor operations like sorts, hash joins, or exchange using range
    scans. New defaults introduced with SQL Server 2016 help to avoid or minimize
    the `tempdb` contention problem by automatically configuring multiple data files
    during installation and including the behavior that previous versions require
    to explicitly configure trace flags 1117 and 1118.


    In addition, memory-optimized tempdb metadata, introduced with SQL Server 2019,
    is the most promising tempdb new feature in years. This feature was designed to
    remove metadata contention by moving tempdb system tables into latch-free nondurable
    memory-optimized tables.


    ## 5. Analyzing Wait Statistics


    One of my main recommendations for troubleshooting a performance problem when
    a particular issue is lacking information is to run a SQL trace or extended event
    session to find out the most expensive queries. This method will usually show
    us the most expensive queries based on one or more metrics including duration,
    CPU usage, logical and physical reads, writes, rows, and so on. Many times the
    metric of choice is duration, or how long the query took to execute. We usually
    assume this entire duration is usable work, which of course can be optimized.
    In a lot of cases, this method can find the troubled queries, and tuning them
    solves the performance problem.


    However, something that is hidden or not obvious in this duration metric is how
    much time the query spent performing usable work and how much time it spent doing
    nothing, basically waiting for something else to happen. It is important to know
    both values as both can be either optimized or addressed. For example, a query
    may show a duration of 30 seconds—20 seconds spent doing work, like scanning a
    table, and the remaining 10 seconds spent waiting for system resources or being
    blocked. Query tuners will usually miss the waiting part, and they can optimize
    the work part as most tools only show that information. For example, they can
    easily find table scans in an execution plan where an index seek is more appropriate.


    It is also true that sometimes optimizing the work part may also indirectly optimize
    the wait part, but not every time. Blocking may still be happening, so we may
    have just fixed half the problem. In some other cases, waiting may dominate the
    duration, so optimizing other areas will only give a modest performance improvement.
    These cases show why wait analysis is an important part of performance troubleshooting.
    In summary, performance problems happen because SQL Server is either doing excessive
    work or maybe doing nothing but waiting too long for resources to be available.
    Although a query spending a long time waiting does not really use resources, it
    will appear slow to the final user.


    Fortunately, SQL Server tracks every wait happening in the database engine, and
    this information is available in multiple ways. While this information is available
    in all the versions of the product, the DMVs and techniques shown in this chapter
    were introduced in SQL Server 2005 and later versions.


    The waits performance tuning methodology, also called troubleshooting waits and
    queues, is a widely used tuning methodology originally introduced with the Microsoft
    white paper “SQL Server 2005 Waits and Queues” by Tom Davidson, which you can
    still find at [`https://technet.microsoft.com/en-us/library/cc966413.aspx`](https://technet.microsoft.com/en-us/library/cc966413.aspx).


    Once we know what SQL Server is waiting for, we should have all the information
    we need to fix the problem, right? Unfortunately, it is not that simple. The waits
    and queues performance methodology usually requires some experience and additional
    analysis from other sources, including looking at system-wide performance data.
    Waits happen all the time in SQL Server. In fact, often even large numbers of
    waits does not mean there is a problem. In many cases, it is perfectly normal
    for SQL Server to wait for something. Some specific waits, usually called benign
    waits, can be ignored at all times so it is also important to filter them out
    of our analysis.


    When we get wait information, we usually just get a number so the challenge is
    knowing when the waits are abnormal or excessive. In most cases, you will have
    to correlate the wait information with some other information that you can obtain
    in SQL Server from diverse sources, including DMVs, performance counters, SQL
    trace, extended events, and so forth, and then interpret and correlate the resulting
    data.'
