    最后，调优配置文件中设置的另一个属性是 `vm.max_map_count`。其默认值 `65536` 对于 SQL Server 实例来说可能不够高。建议将此值更改为
    `256K` 或 `262,144`，如下所示：


    ```

    # sysctl vm.max_map_count

    vm.max_map_count = 65536

    # sysctl -w vm.max_map_count=262144

    vm.max_map_count = 262144

    ```


    ### 附加配置


    关于运行 SQL Server 的 Linux 系统，有三个重要的附加配置需要考虑：透明大页、交换文件以及文件的最后访问日期和时间属性。


    请注意，在我们的调优配置文件中，`vm.transparent_hugepages` 的值被设置为“always”。透明大页是一个抽象层，它使用大尺寸的内存页，例如
    `2 MB` 和 `1 GB`，这对于像 SQL Server 这样使用大量内存的应用程序是推荐的。但是，如果在 SQL Server 部署中遇到高内存分页活动，您可能需要使用“madvise”这个值。在这种情况下，系统范围内的透明大页被禁用，但对于调用
    `madvise` 在 `madvise` 区域分配内存的应用程序仍然可用。以下是一种实现方式，方括号中的值表示当前激活的值：


    ```

    more /sys/kernel/mm/transparent_hugepage/enabled

    [always] madvise never

    # echo madvise > /sys/kernel/mm/transparent_hugepage/enabled

    # more /sys/kernel/mm/transparent_hugepage/enabled

    always [madvise] never

    ```


    您也可以修改我们的调优配置文件，将 `always` 替换为 `madvise`，并通过运行以下命令再次激活 `mssql` 配置文件：


    ```

    # tuned-adm off

    # tuned-adm profile mssql

    ```


    与 Windows 平台一样，在 Linux 上正确配置交换文件对 SQL Server 的性能很重要。当可用物理内存已满且非活动页被移动到交换空间时，可以使用交换文件。有关如何实现和维护交换文件的详细信息，请参阅您的
    Linux 发行版文档。


    Linux 在每次对文件执行读取操作时都会写入一个日期和时间戳。这意味着从技术上讲，每次访问文件时都会产生写入活动。虽然某些应用程序可能需要此属性，但对于像
    SQL Server 这样的数据库系统来说，它并非必需且开销很大。


    建议在 SQL Server 使用的文件系统上禁用此行为。为此，您需要在相关文件系统的挂载选项中添加 `noatime` 属性。


    请查阅您的操作系统文档以获取执行此操作的综合说明。一种方法是编辑 `/etc/fstab` 文件，如下所示。以下命令显示了 `/etc/fstab` 文件的一部分：


    ```

    more /etc/fstab

    /dev/mapper/rootvg-usrlv /usr           xfs     defaults                0 0

    ```


    编辑该文件，在选项列中添加 `noatime`：


    ```

    more /etc/fstab

    /dev/mapper/rootvg-usrlv /usr           xfs     defaults,noatime        0 0

    ```


    使用 `mount` 命令重新加载文件系统信息：


    ```

    # mount -o remount /

    ```


    ## 总结


    本章介绍了有助于提高数据库和应用程序性能的 SQL Server 配置设置。我们还讨论了一些配置选项如何默认设置为最佳可能值或一个良好的起点。然而，由于工作负载因安装实例而异，可能需要一些额外的配置，特别是对于高性能安装。


    我们还看到一些最初作为跟踪标志实现的功能——可能是为了解决特定问题的临时方案——最终如何成为数据库引擎的默认配置。跟踪标志 `2371`、`1117` 和
    `1118` 就是这种情况，从 SQL Server 2016 开始，它们的行为现在默认启用。我们在本章介绍了跟踪标志 `2371`，虽然我们还简要介绍了跟踪标志
    `1117` 和 `1118`，但它们在第 4 章中有更详细的介绍。


    如果您使用其他 SQL Server 功能，例如 Always On 可用性组、压缩或加密等，应考虑一些性能相关的配置。其他一些功能，如内存中技术，对性能极为关键，将在第
    7 章中更详细地介绍。


    最后，我们介绍了在 Linux 上配置 SQL Server。这包括配置 SQL Server 设置的方法，例如使用 `mssql-conf` 工具，以及配置
    Linux 设置以提高 SQL Server 的性能。


    # 4. tempdb 故障排除与配置


    `tempdb` 是一个系统数据库，用于保存由用户或系统创建的临时对象。与其他数据库不同，`tempdb` 在每次 SQL Server 启动时都会重新创建。`tempdb`
    的各种用途通常可分为三类：用户对象、内部对象和版本存储对象。


    1.  **用户对象**：用于用户直接创建的对象，如全局和局部临时表、表变量或临时存储过程。


    2.  **内部对象**：用于内部对象，包括存储排序、Spool、游标和服务中介器信息的临时数据的工作表，以及用于哈希连接和哈希聚合操作的工作文件。用户无法直接创建这些内部对象。


    3.  **版本存储对象**：用于快照隔离级别的行版本控制、联机索引操作、`AFTER` 触发器和 MARS（多个活动结果集）。


    本章讨论的性能问题主要影响前两个领域，即用户对象和内部对象。其中一个性能问题——在我早年担任数据库管理员时，我们在一个新应用程序上线那天才艰难地意识到的问题——是
    `tempdb` 争用。在短时间内创建大量用户对象可能导致分配页的闩锁争用，也称为 DML（数据操作语言）争用。系统目录的争用，也称为 DDL（数据定义语言）争用，虽然不常见，但在某些重度使用场景下也可能发生。


    关于内部对象，一些查询处理器操作，例如为排序存储中间运行结果或为哈希连接和哈希聚合存储哈希表，在使用 `tempdb` 时可能会产生性能问题，因为这些操作最初设计为在服务器内存而非磁盘上工作。在后一种情况下，`tempdb`
    本身并不是问题，而是这些操作需要使用 `tempdb`，这显然比内存访问慢。


    SQL Server 2019 引入了该产品历史上可能最大的 tempdb 性能改进。从这个版本开始，可以配置 tempdb 使用基于内存优化的元数据，这是一个基于内存中
    OLTP 的功能。启用此配置后，tempdb 元数据现在可以移动到无闩锁的非持久化内存优化表中，从而完全消除元数据争用。


    由于内存优化的 tempdb 元数据在 SQL Server 2019 中是一个可选配置，并且 DML 争用在所有版本的产品中仍然是一个性能问题，我仍将在本章首先更详细地介绍这个问题。内存优化的
    tempdb 元数据将在本章后面介绍。

    '
- fmt: '## DML Contention


    As mentioned earlier, one of the two biggest performance problems that `tempdb`
    faces is latch contention in allocation pages, which is also called DML contention
    as it is mostly due to `INSERT`, `UPDATE`, and `DELETE` operations on temporary
    tables. To analyze the problem and talk about workarounds and possible solutions,
    let’s start with an introduction to allocation pages. Latches were introduced
    in Chapter 1. As shown in Figure 4-1, every database data file starts with a file
    header page, followed by the `PFS`, `GAM`, `SGAM`, `BCM`, and `DCM` pages.


    ![../images/393702_2_En_4_Chapter/393702_2_En_4_Fig1_HTML.jpg](images/393702_2_En_4_Chapter/393702_2_En_4_Fig1_HTML.jpg)


    Figure 4-1: Data file pages


    The `PFS` (Page Free Space) page records the allocation status of each page in
    a database file and is the first page on a database after the file header page.
    Each byte in the `PFS` page records information about one specific page, which
    means the `PFS` page can cover only a limited number of pages, in this case, 8088.
    In a large enough database, a new `PFS` page will be available every 8088 pages
    in a data file, roughly every 64 MB, so you can find `PFS` pages at pages 1, 8088,
    16176, 24264, and so on. Bits 0–2 of each byte in the `PFS` page indicate if the
    page is empty or the percentage full if it is not, while bits 3–7 keep other page
    information not related to our topic.


    `GAM` and `SGAM` are related to extents, so let me start by explaining pages and
    extents. As covered in Chapter 1, a page is the fundamental unit of data storage
    in SQL Server, and its size is 8 KB. An extent is eight pages and its size is
    therefore 64 KB. SQL Server traditionally uses two kinds of extents, mixed and
    dedicated extents. Mixed extents are used for small objects that can, at least
    initially, fit in one page. By using a mixed extent, they can allocate up to eight
    distinct objects. On the other hand, a dedicated extent, also called uniform extent,
    is used for larger objects in which all eight pages are used by the same object.


    `GAM` (Global Allocation Map) pages keep track of allocated extents using only
    one bit of information per extent. A `GAM` page tracks information about 64,000
    extents, which covers almost 4 GB of data. The `GAM` and `SGAM` will appear every
    511,232 pages, so you can find the `GAM` pages at pages 3, 511232, 1022464, 1533696,
    and so on.


    `SGAM` (Shared Global Allocation Map) pages keep track of mixed extents with at
    least one unused page. Similar to a `GAM` page, it uses a bit per extent and has
    information about 64,000 extents, which covers almost 4 GB of data. A value of
    1 indicates a mixed extent with at least one unused page, and a value of 0 indicates
    either a dedicated extent or a mixed extent without a free page. As mentioned,
    you can find the `SGAM` pages at page 4, 511233, 1022465, 1533697, and so on.


    `IAM` (Index Allocation Map) pages keep track of the extents used by a table or
    index per allocation unit covering the extents in a 4 GB database file.


    `DCM` (Differential Changed Map, also called DIFF) pages keep track of the extents
    that have changed since the last `BACKUP DATABASE` statement, having a value of
    1 for extents that have been modified and 0 for extents that have not.


    `BCM` (Bulk Changed Map) pages keep track of extents that have been modified by
    bulk-logged operations since the last `BACKUP LOG` statement, having a value of
    1 for extents that have been modified and 0 for extents that have not. It is also
    called `ML`, or Minimally Logged.


    You can verify if a page is a `PFS`, `GAM`, or `SGAM` page by using the undocumented
    statement `DBCC PAGE`, which has the following syntax:


    ```

    DBCC PAGE ( {''dbname'' | dbid}, filenum, pagenum [, printopt={0|1|2|3} ])

    ```


    **Note**: Although `DBCC PAGE` is an undocumented and unsupported statement and
    should be used at your own risk, it is relatively safe and used extensively by
    the SQL Server community.


    The page type will be displayed as `m_type` on the page header. Although there
    are many page types, some of the interesting values for the purpose of this chapter
    include the following:


    *   1: Data page

    *   2: Index page

    *   8: `GAM` page

    *   9: `SGAM` page

    *   10: `IAM` page

    *   11: `PFS` page

    *   15: File header page

    *   16: `DCM` map page

    *   17: `BCM` map page


    As an example, run


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(''tempdb'', 1, 1, 0)

    ```


    where the first three parameters are the database name, file ID, and page number,
    respectively. The last choice, `printopt` 0, requests to just print the page header
    information of the page we want to inspect. `DBCC TRACEON(3604)` is required to
    send the output of the statement to SQL Server Management Studio, which you can
    see using the Messages tab. Part of the output is shown next, where `m_type 11`
    shows it is a `PFS` page, in this case the first `PFS` page in the file:


    ```

    m_pageId = (1:1)                  m_headerVersion = 1                m_type =
    11

    m_typeFlagBits = 0x1              m_level = 0                        m_flagBits
    = 0x0

    m_objId (AllocUnitId.idObj) = 99  m_indexId (AllocUnitId.idInd) = 0

    Metadata:

    AllocUnitId = 6488064

    Metadata: PartitionId = 0         Metadata: IndexId = 0              Metadata:
    ObjectId = 99

    ```


    Using the values 2, 3, 6, and 7 for `pagenum` will return the `GAM`, `SGAM`, `DCM`,
    and `BCM` pages, respectively. You can play with the other values mentioned such
    as 8088, 16176, 24264, and so on, for additional `PFS` pages, assuming the file
    is large enough.


    New with SQL Server 2019, the `sys.dm_db_page_info` DMF is finally a documented
    and supported way to get information about a page in a database. Although `DBCC
    PAGE` has more functionality, the `sys.dm_db_page_info` DMF still can be extremely
    helpful in many cases. `DBCC PAGE` will still be needed for cases when the entire
    contents of the page are needed.


    The parameters for `sys.dm_db_page_info` are very similar to those required by
    `DBCC PAGE`. You would need to provide the database id, file id, page id, and
    a mode, which determines the level of detail of the returned information. The
    values for `mode` could be `LIMITED` and `DEFAULT`. For example, our last `DBCC
    PAGE` statement could be run in the following way:


    ```

    SELECT * FROM sys.dm_db_page_info(2, 1, 1, ''DETAILED'')

    ```


    For more details about SQL Server pages and extents, see “Pages and Extents Architecture”
    at [`https://technet.microsoft.com/en-us/library/cc280360`](https://technet.microsoft.com/en-us/library/cc280360)`(v=sql.105).aspx`.
    For more details about `DBCC PAGE`, see [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/06/10/how-to-use-dbcc-page/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/06/10/how-to-use-dbcc-page/).'
  raw: '## DML Contention


    As mentioned earlier, one of the two biggest performance problems that `tempdb`
    faces is latch contention in allocation pages, which is also called DML contention
    as it is mostly due to `INSERT`, `UPDATE`, and `DELETE` operations on temporary
    tables. To analyze the problem and talk about workarounds and possible solutions,
    let’s start with an introduction to allocation pages. Latches were introduced
    in Chapter [1](#393702_2_En_1_Chapter.xhtml). As shown in Figure [4-1](#393702_2_En_4_Chapter.xhtml#Fig1),
    every database data file starts with a file header page, followed by the PFS,
    GAM, SGAM, BCM, and DCM pages.


    ![../images/393702_2_En_4_Chapter/393702_2_En_4_Fig1_HTML.jpg](images/393702_2_En_4_Chapter/393702_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Data file pages


    The PFS (Page Free Space) page records the allocation status of each page in a
    database file and is the first page on a database after the file header page.
    Each byte in the PFS page records information about one specific page, which means
    the PFS page can cover only a limited number of pages, in this case, 8088. In
    a large enough database, a new PFS page will be available every 8088 pages in
    a data file, roughly every 64 MB, so you can find PFS pages at pages 1, 8088,
    16176, 24264, and so on. Bits 0–2 of each byte in the PFS page indicate if the
    page is empty or the percentage full if it is not, while bits 3–7 keep other page
    information not related to our topic.


    GAM and SGAM are related to extents, so let me start by explaining pages and extents.
    As covered in Chapter [1](#393702_2_En_1_Chapter.xhtml), a page is the fundamental
    unit of data storage in SQL Server, and its size is 8 KB. An extent is eight pages
    and its size is therefore 64 KB. SQL Server traditionally uses two kinds of extents,
    mixed and dedicated extents. Mixed extents are used for small objects that can,
    at least initially, fit in one page. By using a mixed extent, they can allocate
    up to eight distinct objects. On the other hand, a dedicated extent, also called
    uniform extent, is used for larger objects in which all eight pages are used by
    the same object.


    GAM (Global Allocation Map) pages keep track of allocated extents using only one
    bit of information per extent. A GAM page tracks information about 64,000 extents,
    which covers almost 4 GB of data. The GAM and SGAM will appear every 511,232 pages,
    so you can find the GAM pages at pages 3, 511232, 1022464, 1533696, and so on.


    SGAM (Shared Global Allocation Map) pages keep track of mixed extents with at
    least one unused page. Similar to a GAM page, it uses a bit per extent and has
    information about 64,000 extents, which covers almost 4 GB of data. A value of
    1 indicates a mixed extent with at least one unused page, and a value of 0 indicates
    either a dedicated extent or a mixed extent without a free page. As mentioned,
    you can find the SGAM pages at page 4, 511233, 1022465, 1533697, and so on.


    IAM (Index Allocation Map) pages keep track of the extents used by a table or
    index per allocation unit covering the extents in a 4 GB database file.


    DCM (Differential Changed Map, also called DIFF) pages keep track of the extents
    that have changed since the last `BACKUP DATABASE` statement, having a value of
    1 for extents that have been modified and 0 for extents that have not.


    BCM (Bulk Changed Map) pages keep track of extents that have been modified by
    bulk-logged operations since the last `BACKUP LOG` statement, having a value of
    1 for extents that have been modified and 0 for extents that have not. It is also
    called ML, or Minimally Logged.


    You can verify if a page is a PFS, GAM, or SGAM page by using the undocumented
    statement `DBCC PAGE`, which has the following syntax:


    ```

    DBCC PAGE ( {''dbname'' | dbid}, filenum, pagenum [, printopt={0|1|2|3} ])

    ```


    Note


    Although `DBCC PAGE` is an undocumented and unsupported statement and should be
    used at your own risk, it is relatively safe and used extensively by the SQL Server
    community.


    The page type will be displayed as `m_type` on the page header. Although there
    are many page types, some of the interesting values for the purpose of this chapter
    include the following:


    *   1: Data page


    *   2: Index page


    *   8: GAM page


    *   9: SGAM page


    *   10: IAM page


    *   11: PFS page


    *   15: File header page


    *   16: DCM map page


    *   17: BCM map page


    As an example, run


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(''tempdb'', 1, 1, 0)

    ```


    where the first three parameters are the database name, file ID, and page number,
    respectively. The last choice, printopt 0, requests to just print the page header
    information of the page we want to inspect. `DBCC TRACEON(3604)` is required to
    send the output of the statement to SQL Server Management Studio, which you can
    see using the Messages tab. Part of the output is shown next, where `m_type 11`
    shows it is a PFS page, in this case the first PFS page in the file:


    ```

    m_pageId = (1:1)                  m_headerVersion = 1                m_type =
    11

    m_typeFlagBits = 0x1              m_level = 0                        m_flagBits
    = 0x0

    m_objId (AllocUnitId.idObj) = 99  m_indexId (AllocUnitId.idInd) = 0

    Metadata:

    AllocUnitId = 6488064

    Metadata: PartitionId = 0         Metadata: IndexId = 0              Metadata:
    ObjectId = 99

    ```


    Using the values 2, 3, 6, and 7 for pagenum will return the GAM, SGAM, DCM, and
    BCM pages, respectively. You can play with the other values mentioned such as
    8088, 16176, 24264, and so on, for additional PFS pages, assuming the file is
    large enough.


    New with SQL Server 2019, the sys.dm_db_page_info DMF is finally a documented
    and supported way to get information about a page in a database. Although DBCC
    PAGE has more functionality, the sys.dm_db_page_info DMF still can be extremely
    helpful in many cases. DBCC PAGE will still be needed for cases when the entire
    contents of the page are needed.


    The parameters for sys.dm_db_page_info are very similar to those required by DBCC
    PAGE. You would need to provide the database id, file id, page id, and a mode,
    which determines the level of detail of the returned information. The values for
    mode could be LIMITED and DEFAULT. For example, our last DBCC PAGE statement could
    be run in the following way:


    ```

    SELECT * FROM sys.dm_db_page_info(2, 1, 1, ''DETAILED'')

    ```


    For more details about SQL Server pages and extents, see “Pages and Extents Architecture”
    at [`https://technet.microsoft.com/en-us/library/cc280360`](https://technet.microsoft.com/en-us/library/cc280360)`(v=sql.105).aspx`.
    For more details about `DBCC PAGE`, see [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/06/10/how-to-use-dbcc-page/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/06/10/how-to-use-dbcc-page/).'
  trans: '## DML 争用


    如前所述，`tempdb` 面临的两大性能问题之一是在分配页上的锁存争用，这也被称为 DML 争用，因为它主要是由临时表上的 `INSERT`、`UPDATE`
    和 `DELETE` 操作引起的。为了分析问题并讨论变通方法和可能的解决方案，让我们从介绍分配页开始。锁存已在第 1 章介绍过。如图 4-1 所示，每个数据库的数据文件都以一个文件头页开始，后面跟着
    `PFS`、`GAM`、`SGAM`、`BCM` 和 `DCM` 页。


    ![../images/393702_2_En_4_Chapter/393702_2_En_4_Fig1_HTML.jpg](img/393702_2_En_4_Fig1_HTML.jpg)


    图 4-1：数据文件页


    `PFS`（页面可用空间）页记录数据库文件中每个页的分配状态，是文件头页之后数据库中的第一页。`PFS` 页中的每个字节记录一个特定页的信息，这意味着一个
    `PFS` 页只能覆盖有限数量的页，在这种情况下是 8088 个。在一个足够大的数据库中，数据文件中每 8088 个页就会出现一个新的 `PFS` 页，大约每
    64 MB 一个，因此您可以在第 1、8088、16176、24264 等页找到 `PFS` 页。`PFS` 页中每个字节的第 0-2 位表示该页是否为空，或者如果非空则表示其满的百分比，而第
    3-7 位则保存与我们主题无关的其他页面信息。


    `GAM` 和 `SGAM` 与区有关，因此让我首先解释页和区。如第 1 章所述，页是 SQL Server 中数据存储的基本单位，其大小为 8 KB。一个区是八个页，因此其大小为
    64 KB。SQL Server 传统上使用两种区：混合区和统一区。混合区用于小对象，这些对象至少最初可以容纳在一个页中。通过使用混合区，它们最多可以分配八个不同的对象。另一方面，统一区（也称为专用区）用于较大的对象，其中所有八个页都由同一个对象使用。


    `GAM`（全局分配映射）页使用每个区仅一位的信息来跟踪已分配的区。一个 `GAM` 页跟踪 64,000 个区的信息，这涵盖了近 4 GB 的数据。`GAM`
    和 `SGAM` 页每 511,232 个页出现一次，因此您可以在第 3、511232、1022464、1533696 等页找到 `GAM` 页。


    `SGAM`（共享全局分配映射）页跟踪至少有一个未使用页的混合区。与 `GAM` 页类似，它每个区使用一位，并包含 64,000 个区的信息，覆盖近 4 GB
    的数据。值 1 表示至少有一个未使用页的混合区，值 0 表示统一区或没有空闲页的混合区。如前所述，您可以在第 4、511233、1022465、1533697
    等页找到 `SGAM` 页。


    `IAM`（索引分配映射）页跟踪表或索引每个分配单元使用的区，覆盖 4 GB 数据库文件中的区。


    `DCM`（差异更改映射，也称为 DIFF）页跟踪自上次 `BACKUP DATABASE` 语句以来已更改的区，对于已修改的区值为 1，对于未修改的区值为
    0。


    `BCM`（批量更改映射）页跟踪自上次 `BACKUP LOG` 语句以来通过批量日志记录操作修改的区，对于已修改的区值为 1，对于未修改的区值为 0。它也被称为
    `ML`（最小日志记录）。


    您可以使用未公开的语句 `DBCC PAGE` 来验证一个页是 `PFS`、`GAM` 还是 `SGAM` 页，其语法如下：


    ```

    DBCC PAGE ( {''dbname'' | dbid}, filenum, pagenum [, printopt={0|1|2|3} ])

    ```


    **注意**：尽管 `DBCC PAGE` 是一个未公开且不受支持的语句，使用风险自负，但它相对安全，并被 SQL Server 社区广泛使用。


    页类型将在页头中显示为 `m_type`。虽然有很多页类型，但就本章目的而言，一些有趣的值包括：


    *   1: 数据页

    *   2: 索引页

    *   8: `GAM` 页

    *   9: `SGAM` 页

    *   10: `IAM` 页

    *   11: `PFS` 页

    *   15: 文件头页

    *   16: `DCM` 映射页

    *   17: `BCM` 映射页


    例如，运行


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(''tempdb'', 1, 1, 0)

    ```


    其中前三个参数分别是数据库名称、文件 ID 和页码。最后一个选项 `printopt` 为 0，请求仅打印我们要检查的页的页头信息。需要 `DBCC TRACEON(3604)`
    将语句的输出发送到 SQL Server Management Studio，您可以在“消息”选项卡中查看输出。部分输出如下所示，其中 `m_type 11`
    显示它是一个 `PFS` 页，在本例中是文件中的第一个 `PFS` 页：


    ```

    m_pageId = (1:1)                  m_headerVersion = 1                m_type =
    11

    m_typeFlagBits = 0x1              m_level = 0                        m_flagBits
    = 0x0

    m_objId (AllocUnitId.idObj) = 99  m_indexId (AllocUnitId.idInd) = 0

    Metadata:

    AllocUnitId = 6488064

    Metadata: PartitionId = 0         Metadata: IndexId = 0              Metadata:
    ObjectId = 99

    ```


    对于 `pagenum` 使用值 2、3、6 和 7 将分别返回 `GAM`、`SGAM`、`DCM` 和 `BCM` 页。您可以尝试使用其他提到的值，例如
    8088、16176、24264 等，来获取其他的 `PFS` 页（假设文件足够大）。


    SQL Server 2019 新增的 `sys.dm_db_page_info` DMF（动态管理函数）最终成为一个有文档记录且受支持的获取数据库中页面信息的方法。虽然
    `DBCC PAGE` 功能更多，但 `sys.dm_db_page_info` DMF 在许多情况下仍然非常有用。当需要页面的全部内容时，仍然需要 `DBCC
    PAGE`。


    `sys.dm_db_page_info` 的参数与 `DBCC PAGE` 所需的参数非常相似。您需要提供数据库 ID、文件 ID、页面 ID 和一个模式（mode），该模式决定了返回信息的详细程度。`mode`
    的值可以是 `LIMITED` 和 `DEFAULT`。例如，我们最后的 `DBCC PAGE` 语句可以用以下方式运行：


    ```

    SELECT * FROM sys.dm_db_page_info(2, 1, 1, ''DETAILED'')

    ```


    有关 SQL Server 页和区的更多详细信息，请参阅“页和区体系结构”，网址为 [`https://technet.microsoft.com/en-us/library/cc280360`](https://technet.microsoft.com/en-us/library/cc280360)`(v=sql.105).aspx`。有关
    `DBCC PAGE` 的更多详细信息，请参阅 [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/06/10/how-to-use-dbcc-page/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/06/10/how-to-use-dbcc-page/)。'
- fmt: '## Describing tempdb Latch Contention


    Every time a new object has to be created in `tempdb`, which is usually a temporary
    table, and at least one row is inserted, two new pages must be allocated from
    a mixed extent and assigned to the new object. One is an IAM page and the second
    one is a data page. During this process, SQL Server also has to access and update
    the very first PFS page and the very first SGAM page in the data file.


    As discussed in Chapter [1](#393702_2_En_1_Chapter.xhtml), only one thread can
    change an allocation page at a time, by requesting a latch on it. When there is
    high activity and a large number of temporary tables being created and dropped
    in `tempdb`, contention on the PFS and SGAM pages is possible. Remember that this
    is not an I/O problem as allocation pages are in this case already in memory.
    Obviously, this contention impacts the performance of the processes creating those
    tables since they may have to wait and SQL Server may appear unresponsive for
    short periods of time. Keep in mind that although user databases also use allocation
    pages, they are not likely to have a latch contention problem since not as many
    objects are created at the same time as in `tempdb`.


    Back in the SQL Server 2000 days, when temporary tables were deleted, these pages
    would need to be deallocated, requiring a new latch on the PFS page and potentially
    another latch on the SGAM page. An optimization introduced with SQL Server 2005,
    temporary table caching, improved this mechanism by caching one IAM page and one
    data page when the temporary table is deleted, which could be reused if the same
    temporary table or table variable had to be created again, avoiding access to
    the allocation bitmap pages. However, this caching mechanism has some limitations,
    and latch contention is not completely avoided on systems with heavy `tempdb`
    use.


    The easiest way to check if you have a latch contention problem on `tempdb` allocation
    pages is to look for `PAGELATCH_XX` waits on the database activity. Please note
    that they are not the same as `PAGEIOLATCH_XX` waits. Run the following code:


    ```sql

    SELECT * from sys.dm_os_waiting_tasks

    WHERE wait_type LIKE ''PAGE%LATCH%''

    AND resource_description LIKE ''2:%''

    ```


    Optionally, you could also try the following:


    ```sql

    SELECT * FROM sys.dm_exec_requests

    WHERE wait_type LIKE ''PAGE%LATCH%''

    AND wait_resource LIKE ''2:%''

    ```


    or


    ```sql

    SELECT * FROM sysprocesses

    WHERE lastwaittype LIKE ''PAGE%LATCH%''

    AND waitresource LIKE ''2:%''

    ```


    Note


    Traditionally, `sysprocesses` has been widely used to get these latch waits, and
    it is very likely you will still see it in old code examples and other sources.
    Since this was a SQL Server 2000 system table and only included in newer versions
    as a view for backward compatibility, it should not be used in new code anymore.


    The `resource_description` column in `sys.dm_os_waiting_tasks` has a large number
    of formats depending on the resource that is being consumed. In the case of latch
    contention, the format we are interested in is `<db-id>:<file-id>:<page-in-file>`,
    which represents the database ID (which is always 2 for tempdb), file ID, and
    page in file, respectively. If you see `resource_description` as `2:1:1` and `2:1:3`,
    you know immediately that they are the PFS and SGAM pages, respectively. The `wait_type`
    would usually be `PAGELATCH_UP` although `PAGELATCH_EX` can also appear, and the
    file ID most likely would be 1. File IDs greater than 1 are not common as creating
    additional files is a workaround to this issue as shown in the next section.


    ## Fixing tempdb Latch Contention


    In my opinion, there is no perfect solution to the latch contention problem as
    the database engine should be able to escalate and work fine as the number of
    operations increase. An obvious solution may be to minimize the number of temporary
    tables created in `tempdb` at the same time, but this may not be easy to implement
    as it would require code and application changes. Keep in mind that internal objects,
    like the ones created by sort and hash operations, are not created explicitly
    by users and do not require the allocation methods discussed in this section.
    These internal objects are, however, a performance problem for other reasons that
    we will discuss later.


    The workaround to these problems has historically been one or a combination of
    some of the following choices, prior to SQL Server 2016:


    1.  Using multiple data files

    2.  Enabling trace flag 1118

    3.  Enabling trace flag 1117


    Let’s cover these in the following sections.


    ### Using Multiple Data Files


    One possible solution to the latch contention problem is to use multiple data
    files for `tempdb`. By using multiple files, allocation bitmaps will be spread
    onto these files, minimizing contention as SQL Server will balance incoming requests
    across them. Using multiple files can help with both PFS and SGAM pages, and using
    trace flag 1118, as shown next, can greatly minimize the use of SGAM pages as
    well.


    One question that has been debated for years is what the optimal number of files
    for `tempdb` should be. The fact that applications could use `tempdb` in different
    ways and have different workloads has proved difficult to recommend a specific
    number for every scenario. Fortunately, there is a good recommendation that can
    work on most use cases and consists of creating one data file per logical processor
    available to the SQL Server instance, up to a maximum of eight files. As shown
    later, starting with SQL Server 2016, this recommendation is now a default configuration
    option for `tempdb` when you install the software. As mentioned in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    SQL Server creates a scheduler per logical processor available to SQL Server,
    so the number of logical processors is also the maximum number of concurrent threads.
    Having multiple files means multiple PFS and SGAM pages, which means more allocations
    can happen at a time, reducing contention as threads are not waiting for one set
    of allocation pages. But this is a general guideline, and there might be cases
    where a high `tempdb` usage may still show contention. In these cases, it is recommended
    to create additional data files in multiples of four, up to the number of logical
    processors available in the system.


    As explained in the next section, data files on `tempdb` should be created with
    the same size and have the same autogrowth setting.'
