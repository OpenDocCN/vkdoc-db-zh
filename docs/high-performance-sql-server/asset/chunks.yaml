    You can use ON to revert back. Similar to our earlier cases, you can use the USE
    HINT as in


    ```

    SELECT * ...

    OPTION (USE HINT(‘DISABLE_DEFERRED_COMPILATION_TV’)

    ```


    ## Scalar UDF Inlining


    A scalar user-defined function (UDF) is a UDF which returns a single data value.
    Scalar UDFs have traditionally been a performance problem for SQL Server as they
    do not follow the set-oriented model that SQL Server uses. Instead, they follow
    a less effective iterative mode. For example, when a UDF is used in a query with
    multiple rows, the code is processed one row at a time. Costing, as you saw in
    Chapter [1](#393702_2_En_1_Chapter.xhtml), which is used to cost operators and
    make a better decision for building an execution plan, is not available on UDFs.
    Intra-query parallelism is not available on queries using UDFs either.


    Scalar UDF inlining, a new feature with SQL Server 2019, automatically transforms
    scalar UDFs into relational expressions embedding them in the SQL Server query.
    This greatly improves the performance of queries using scalar UDFs as they now
    use a set-oriented model instead of using the traditional iterative model.


    Similar to the previous features discussed in this chapter, you can use the following
    statement if you need to disable scalar UDF inlining at the database level:


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET TSQL_SCALAR_UDF_INLINING = OFF

    ```


    In the same way, you can reenable the feature using the ON value.


    The hint needed to disable this feature at the query level is shown next:


    ```

    SELECT * ...

    OPTION (USE HINT(''DISABLE_TSQL_SCALAR_UDF_INLINING''))

    ```


    ## Approximate Count Distinct


    Different than all of the intelligent processing features covered in this chapter,
    APPROX_COUNT_DISTINCT is a new SQL Server function, and as such it does not require
    a database compatibility level mode to use it. The APPROX_COUNT_DISTINCT function
    is an alternative to using COUNT(DISTINCT) and returns the approximate number
    of unique non-null values in a group by evaluating an expression for each row
    in a group. This function is designed to provide aggregations across very large
    amounts of data where responsiveness is more critical than absolute precision.


    The APPROX_COUNT_DISTINCT function is based on the HyperLogLog algorithm whose
    purpose is to calculate an approximation of the number of distinct elements in
    a set, and its SQL Server implementation guarantees up to a 2% error rate within
    a 97% probability. You can find more details about this algorithm by looking at
    [`https://en.wikipedia.org/wiki/HyperLogLog`](https://en.wikipedia.org/wiki/HyperLogLog).


    Let me show you an example using the AdventureWorksDW2017 database. Keep in mind
    that since we do not have a very large table, we may not be able to notice any
    performance difference. Run the following statements while requesting actual execution
    plans:


    ```

    SELECT COUNT(DISTINCT(UnitCost))

    FROM FactProductInventory

    SELECT APPROX_COUNT_DISTINCT(UnitCost)

    FROM FactProductInventory

    ```


    You could see that the generated execution plans are very different. As expected
    while manipulating large amounts of data, the COUNT(DISTINCT) query contains a
    hash aggregation operator, as you can see in Figure [10-5](#393702_2_En_10_Chapter.xhtml#Fig5).
    The plan for the APPROX_COUNT_DISTINCT function , which you can see in Figure
    [10-6](#393702_2_En_10_Chapter.xhtml#Fig6), does not include a hash aggregation
    operator and, as such, requires less memory, and there is no need for a memory
    grant. The results on my test system are 89,161 and 92,430, in which the first
    value is the exact number of distinct values and the latter is the approximation.


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig6_HTML.jpg](images/393702_2_En_10_Chapter/393702_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Plan for APPROX_COUNT_DISTINCT


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig5_HTML.jpg](images/393702_2_En_10_Chapter/393702_2_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Partial plan for COUNT(DISTINCT)


    Finally, as suggested earlier, there is no need to enable or disable this feature.
    You could just decide if COUNT(DISTINCT) or APPROX_COUNT_DISTINCT is better for
    your application needs .


    ## Summary


    SQL Server 2017 introduced several query processing features under the umbrella
    of adaptive query processing. The SQL Server 2019 release expanded the number
    of features giving them a new name, intelligent query processing. Intelligent
    query processing features provide performance enhancements with no application
    changes needed and no effort or very minimal effort. Microsoft has said more intelligent
    processing enhancements will be released in future versions of the product.


    This was an introductory chapter on intelligent query processing, so covering
    these features in detail is outside the scope of this book. For more details,
    you may want to refer to the SQL Server documentation.'
  trans: '## 表变量延迟编译


    表变量未被广泛使用的主要原因可能在于，与前面提到的多语句表值函数类似，SQL Server 不提供可用于生成最优执行计划的优化器统计信息。如前所述，表变量和多语句表值用户定义函数不支持统计信息，因此对于近期版本的
    SQL Server，查询优化器将使用固定的 100 行估计值；对于 SQL Server 2014 之前的版本，则仅使用 1 行。


    从 SQL Server 2019 开始，表变量的行为将与之前提到的交错执行特性类似。SQL Server 将先执行表变量代码，从而获知实际的基数估计值或实际行数。随后，延迟编译将利用此准确的估计值来生成性能更好的执行计划。最后请记住，尽管此行为现在看起来与临时表非常相似，但即使对于
    SQL Server 2019，表变量仍然没有统计信息。


    与之前一样，如果需要在数据库级别禁用此功能，可以使用：


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET DEFERRED_COMPILATION_TV = OFF

    ```


    可以使用 `ON` 来恢复。与我们之前的情况类似，可以使用 `USE HINT`，如下所示：


    ```

    SELECT * ...

    OPTION (USE HINT(''DISABLE_DEFERRED_COMPILATION_TV''))

    ```


    ## 标量 UDF 内联


    标量用户定义函数（`UDF`）是一种返回单个数据值的 `UDF`。标量 `UDF` 一直是 SQL Server 的一个性能问题，因为它们不遵循 SQL Server
    使用的面向集合模型。相反，它们遵循效率较低的迭代模式。例如，当一个 `UDF` 用在涉及多行的查询中时，代码会逐行处理。如你在第 1 章所见，用于对操作符进行成本估算并为构建执行计划做出更优决策的成本估算机制，并不适用于
    `UDF`。使用 `UDF` 的查询也无法利用查询内并行度。


    标量 `UDF` 内联是 SQL Server 2019 的一项新特性，它自动将标量 `UDF` 转换为关系表达式，并嵌入到 SQL Server 查询中。这极大地提升了使用标量
    `UDF` 的查询的性能，因为它们现在采用面向集合的模型，而非传统的迭代模型。


    与本章前面讨论的特性类似，如果需要在数据库级别禁用标量 `UDF` 内联，可以使用以下语句：


    ```

    ALTER DATABASE SCOPED CONFIGURATION

    SET TSQL_SCALAR_UDF_INLINING = OFF

    ```


    同样，可以使用 `ON` 值重新启用此特性。


    在查询级别禁用此特性所需的提示如下所示：


    ```

    SELECT * ...

    OPTION (USE HINT(''DISABLE_TSQL_SCALAR_UDF_INLINING''))

    ```


    ## 近似计数不同值


    与本章涵盖的所有智能处理特性不同，`APPROX_COUNT_DISTINCT` 是一个新的 SQL Server 函数，因此不需要使用数据库兼容级别模式。`APPROX_COUNT_DISTINCT`
    函数是使用 `COUNT(DISTINCT)` 的替代方案，它通过对组中的每一行计算一个表达式，返回组中唯一非空值的近似数量。此函数旨在为需要响应速度比绝对精确度更重要的海量数据提供聚合计算。


    `APPROX_COUNT_DISTINCT` 函数基于 HyperLogLog 算法，该算法的目的是计算集合中不同元素数量的近似值，其在 SQL Server
    中的实现保证在 97% 的概率下误差率不超过 2%。你可以通过查阅 [`https://en.wikipedia.org/wiki/HyperLogLog`](https://en.wikipedia.org/wiki/HyperLogLog)
    获取有关此算法的更多细节。


    让我用 AdventureWorksDW2017 数据库展示一个例子。请记住，由于我们的表不够大，可能无法注意到任何性能差异。在请求实际执行计划的同时运行以下语句：


    ```

    SELECT COUNT(DISTINCT(UnitCost))

    FROM FactProductInventory

    SELECT APPROX_COUNT_DISTINCT(UnitCost)

    FROM FactProductInventory

    ```


    你可以看到生成的执行计划非常不同。正如处理大量数据时所预期的，`COUNT(DISTINCT)` 查询包含一个哈希聚合操作符，如图 10-5 所示。而 `APPROX_COUNT_DISTINCT`
    函数的计划（如图 10-6 所示）不包含哈希聚合操作符，因此所需内存更少，并且不需要内存授予。我在测试系统上的结果分别是 89,161 和 92,430，其中第一个值是不同值的精确数量，后者是近似值。


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig6_HTML.jpg](img/393702_2_En_10_Fig6_HTML.jpg)


    图 10-6

    `APPROX_COUNT_DISTINCT` 的计划


    ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig5_HTML.jpg](img/393702_2_En_10_Fig5_HTML.jpg)


    图 10-5

    `COUNT(DISTINCT)` 的部分计划


    最后，如前所述，无需启用或禁用此特性。你只需根据应用需求决定使用 `COUNT(DISTINCT)` 还是 `APPROX_COUNT_DISTINCT`
    更合适。


    ## 总结


    SQL Server 2017 在自适应查询处理的框架下引入了多项查询处理特性。SQL Server 2019 扩展了这些特性的数量，并赋予它们一个新名称：智能查询处理。智能查询处理特性无需更改应用程序，且无需或只需付出极少努力，即可提供性能增强。微软表示，未来版本的产品中将发布更多智能处理增强功能。


    本章是智能查询处理的介绍性章节，因此详细涵盖这些特性超出了本书的范围。更多细节，你可能需要参考 SQL Server 文档。'
- fmt: '# 11. SQL Server Storage


    This chapter covers storage from the SQL Server point of view, and although other
    factors such as availability and recoverability play a very important role in
    selecting and configuring storage, we focus mostly on performance. Disk is traditionally
    the slowest component in a database system, so tuning storage for performance
    is essential and usually comes in two high-level areas: directly tuning the storage
    and tuning the components to make efficient use of the storage. The first area
    refers to tuning and configuring the storage hardware itself, while the second
    one relates to tuning the other components of the system to make optimal use of
    the storage and includes items such as proper SQL Server configuration and creating
    the right indexes.


    All the topics presented so far in this book mostly involve the SQL Server database
    professional, including such roles as database developer, database administrator,
    and database architect. But implementing a high performance application in production
    always involves several other roles and sometimes teams in a corporation. Nothing
    is truer as it relates to storage.


    I still remember the old days when I used to sit with my Windows administrator
    and configure the drives for our servers using `RAID` 1, 5, or 10. As storage—especially
    enterprise-level storage—becomes more and more sophisticated, tuning and administering
    it will usually fall outside the scope of the SQL Server database professional
    and very likely even onto a different team.


    Whatever the separation of responsibilities in a corporation is, storage does
    not have to be a black box for the SQL Server professional. As a result, it is
    very important to understand how the storage works and properly communicate to
    the storage team the database requirements. Performance is not only the initial
    configuration but also continuous monitoring and troubleshooting, so this should
    also be an iterative process. In fact, the same is true as it relates to good
    communication with the teams that own the remaining parts of the application whether
    it is the operating system, application servers, web servers, or the hardware
    itself.


    In hardware trends, as we noticed in Chapter 7, relational databases were originally
    architected based on the hardware available in the 1970s. Memory size was limited,
    and relational databases were built around the fact that they were not able to
    fit in memory, reading data from disk only as needed and creating buffer managers
    to keep the most used data in memory. Although processor and memory speeds, along
    with memory and disk sizes, have increased dramatically, the disk access speed
    has not kept up at the same rate, making a big gap between the disk access time
    and processor and memory processing times. Limited by moving mechanical components,
    disk has been traditionally the slowest component in a database system (or as
    the late Jim Gray sometimes described it, “disk is the new tape”).


    New trends like larger amounts of data, high-availability requirements, and virtualization
    put additional requirements on a database system. I still remember the days when
    a few dozen GB size was considered a large database, but database sizes now are
    measured in terabytes, and even sizes in petabytes are common. Data is now also
    required to be available 24/7 (ironically, I originally wrote this during a major
    Delta Air Lines outage that stopped their business operations for days). Data
    availability or, even worse, data loss can seriously impact a business. Virtualization
    and cloud services are another important trend as more and more high performance
    and mission-critical applications are being migrated to services like Amazon AWS
    or Microsoft Azure.


    Fortunately, there are also new technologies to help with these new trends and
    new demanding requirements. As the cost of flash-based storage continues to decline,
    flash drives are expected to gradually replace spindle-based magnetic disk in
    data centers, becoming the de facto enterprise standard for primary storage. But
    since relational database engines still use the same architecture defined back
    in the 1970s, it is being suggested that new query processing algorithms should
    be developed to take advantage of this faster storage. In addition, as many databases
    can now fit in memory, new technologies such as in-memory databases are being
    developed and implemented. SQL Server incorporates those technologies, and they
    are covered in Chapter 7.


    As hinted earlier, the second part on optimizing storage is within your database.
    Many times, what seems to be a storage problem or an issue with storage struggling
    to keep up with the required performance can be fixed within SQL Server. We cover
    many of those techniques in the rest of the book. For example, when storage is
    not able to keep up with your workload, the problem could be fixed by creating
    the right indexes, by properly configuring SQL Server and `tempdb`, or by taking
    benefit of new in-memory technologies such as `In-Memory OLTP` or `columnstore`
    indexes. With flash drives replacing spindle-based magnetic disks, a myth quickly
    arose suggesting that optimizing database and code was no longer important. Nothing
    could be farther from the truth.


    Finally, when selecting and reviewing a storage solution, in addition to performance,
    some other important factors such as reliability and availability are considered
    as well. Redundancy choices such as `RAID` (redundant array of independent disks)
    or high-availability and disaster recovery solutions, such as `Windows failover
    clustering` or `SQL Server Always On availability groups`, are usually implemented
    in mission-critical applications.'
