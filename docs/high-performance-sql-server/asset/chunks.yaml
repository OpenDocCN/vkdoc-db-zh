    instead of having a single huge data file for the entire database, especially
    when you can separate them into different drives to avoid contention. You can
    research I/O usage information per file if needed, using the `sys.dm_io_virtual_file_stats`
    DMV, as covered in Chapter [8](#393702_2_En_8_Chapter.xhtml). As with `tempdb`,
    data files should be initially configured of equal size to take benefit of the
    proportional fill algorithm.


    The vast majority of the times, only one transaction log file is required per
    database, being perhaps the only possible exception when a second file is needed
    being when a volume becomes unexpectedly full and you need to use space from a
    different volume. A transaction log file benefits from sequential reads so, if
    you have multiple databases, you may consider separating each database transaction
    log file on their own volume. Having transaction log files for multiple databases
    on the same volume may change the sequential to random reads as activity may be
    happening for all databases simultaneously.


    Correctly sizing your database files and configuring autogrowth settings are also
    important, as usually SQL Server defaults are not appropriate. The values to use
    would depend on your database size and needs, and, as mentioned earlier in this
    book, it is recommended to assign the maximum file size depending on the allocated
    drives in order to avoid expensive autogrowth operations and possible fragmentation.
    Remember that instant file initialization can help on data files but is not yet
    available on transaction log files. Researching the maximum size the transaction
    log file can grow and having that size is a best practice for performance. Don’t
    ever shrink this file unless you are sure it is not going to grow again. Growing
    file size operations are very slow, especially in transaction log files, and may
    also introduce a specific kind of fragmentation, as covered later in this section.


    As an example, if you assigned a 512 GB volume to a database including size for
    future growth, allocate all the possible disk space from the beginning, perhaps
    just leaving enough space as required by your disk-monitoring tools (so you do
    not get those disk full or disk almost full notifications). Obviously, this becomes
    a little bit more complicated if more than one database shares the volume so keeping
    database growth trends and statistics can help you make those decisions.


    Setting the maximum size on database files, even with a large percentage of empty
    space, does not affect the size of your backups, although it will impact copies
    of the database used for availability groups, log shipping, or database mirroring
    configurations. Copies of the databases to other environments such as QA and development
    will be impacted as well, although they can be shrunk upon restore to save some
    disk space.


    ### Fragmentation


    Fragmentation is a problem that can occur in clustered and nonclustered indexes
    and heaps and may hurt performance for workloads doing scans or sequential I/Os.
    Operations performing random disk I/Os are not impacted by fragmentation. Fragmentation
    may also limit the efficiency of read-ahead operations as it relies on contiguous
    pages on disk. The read-ahead mechanism used by SQL Server anticipates the data
    pages needed to fulfill a query request by bringing the pages into the buffer
    pool before they are actually used by the query. A read-ahead operation can read
    up to 64 contiguous pages or 512 KB. Monitoring and dealing with fragmentation
    is also important on flash-based storage.


    Fragmentation can be fixed by periodically running index reorganize and index
    rebuild maintenance jobs and configuring indexes with an appropriate fill factor.
    These topics are covered in Chapter [9](#393702_2_En_9_Chapter.xhtml). Fragmentation
    is also possible on transaction log files, and it is covered next.


    ### Virtual Log Files


    The SQL Server transaction log file is divided into virtual log files (VLFs),
    and it can become internally fragmented when a large number of these VLFs are
    created. Such file fragmentation can impact the performance of the transaction
    log operations and increase the database recovery time. An adequate number of
    VLFs would depend on the size of the transaction log file, and although there
    is no specific recommended value, it definitely should not be in the hundreds
    or thousands.


    When a transaction log file is originally created, it will have an initial number
    of VLFs, which is usually adequate. But every time an autogrowth operation occurs
    or the size is manually expanded, SQL Server adds several VLFs, usually 4, 8,
    or 16, depending on the added size. Performing multiple grow operations over time
    can create hundreds or thousands of VLFs. To display the number of VLFs in your
    transaction log file, run the following statement, which will return a row for
    every VLF file:


    ```

    DBCC LOGINFO

    ```


    A typical summarized output is next .


    | **RecoveryUnitId** | **FileId** | **FileSize** | **StartOffset** | **FSeqNo**
    | **Status** | **Parity** | **CreateLSN** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 0 | 2 | 458752 | 8192 | 70 | 2 | 64 | 0 |

    | 0 | 2 | 458752 | 466944 | 71 | 2 | 64 | 0 |

    | 0 | 2 | 458752 | 925696 | 72 | 2 | 128 | 0 |

    | 0 | 2 | 712704 | 1384448 | 73 | 2 | 128 | 0 |


    Note


    For more details about the algorithm used to determine how many VLFs are added
    for create, grow, and autogrowth operations, you can refer to the following article:
    [www.​sqlskills.​com/​blogs/​paul/​important-change-vlf-creation-algorithm-sql-server-2014/​](http://www.sqlskills.com/blogs/paul/important-change-vlf-creation-algorithm-sql-server-2014/).'
  trans: '

    ### 数据库文件


    数据库文件的放置仍然至关重要。传统上，一项最佳实践是将数据文件、事务日志文件和 `tempdb` 文件分离到不同的卷中。尽管在某些情况下，SAN 存储抽象可能使得这种分离并非绝对必要，但它仍然是一个良好的实践，因为分离也有助于维护和管理目的。与
    `tempdb` 类似（如第 4 章所述），为数据库拥有多个数据文件而非一个庞大的单一数据文件，可以提升性能和管理性，尤其是当您能将它们分离到不同驱动器以避免争用时。如果需要，您可以使用
    `sys.dm_io_virtual_file_stats` DMV 研究每个文件的 I/O 使用情况信息，如第 8 章所述。与 `tempdb` 一样，数据文件应初始配置为相同大小，以利用比例填充算法的优势。


    绝大多数情况下，每个数据库仅需一个事务日志文件。唯一可能需要第二个文件的例外情况，或许是当一个卷意外填满，您需要使用来自不同卷的空间时。事务日志文件受益于顺序读取，因此，如果您有多个数据库，您可以考虑将每个数据库的事务日志文件分离到各自的卷上。将多个数据库的事务日志文件放在同一个卷上，可能会将顺序读取变为随机读取，因为活动可能同时发生在所有数据库上。


    正确调整数据库文件大小并配置自动增长设置也很重要，因为通常 SQL Server 的默认值并不合适。使用的数值将取决于您的数据库大小和需求，并且如本书前文所述，建议根据分配的驱动器来指定最大文件大小，以避免代价高昂的自动增长操作和可能的碎片。请记住，即时文件初始化对数据文件有帮助，但对事务日志文件尚不可用。研究事务日志文件可能增长到的最大大小并设置该大小，是提升性能的最佳实践。除非您确定文件不会再增长，否则切勿收缩此文件。文件大小增长操作非常缓慢，尤其是在事务日志文件中，并且也可能引入一种特定类型的碎片，这将在本节稍后介绍。


    例如，如果您为一个数据库分配了 512 GB 的卷（包括未来增长的空间），请从一开始就分配所有可能的磁盘空间，或许仅留下您的磁盘监控工具所需的空间（这样您就不会收到那些磁盘已满或即将满的通知）。显然，如果多个数据库共享该卷，情况会变得稍微复杂一些，因此跟踪数据库增长趋势和统计数据可以帮助您做出这些决策。


    在数据库文件上设置最大大小，即使留有大量空白空间，也不会影响备份的大小，尽管它会影响用于可用性组、日志传送或数据库镜像配置的数据库副本。复制到其他环境（如
    QA 和开发环境）的数据库也会受到影响，尽管在还原时可以收缩它们以节省一些磁盘空间。


    ### 碎片


    碎片是可能在聚集索引、非聚集索引以及堆中发生的一个问题，并且可能损害执行扫描或顺序 I/O 的工作负载的性能。执行随机磁盘 I/O 的操作不受碎片的影响。碎片还可能限制预读操作的效率，因为它依赖于磁盘上连续的页面。SQL
    Server 使用的预读机制通过在查询实际使用之前将数据页引入缓冲池，来预测满足查询请求所需的数据页。一次预读操作最多可以读取 64 个连续页面或 512
    KB。在基于闪存的存储上，监控和处理碎片也很重要。


    可以通过定期运行索引重新组织和索引重建维护作业，并为索引配置适当的填充因子来修复碎片。这些主题在第 9 章中介绍。事务日志文件也可能出现碎片，接下来将进行介绍。


    ### 虚拟日志文件


    SQL Server 事务日志文件被划分为虚拟日志文件 (VLF)，当创建大量这些 VLF 时，可能会导致内部碎片。此类文件碎片会影响事务日志操作的性能，并增加数据库恢复时间。足够数量的
    VLF 取决于事务日志文件的大小，尽管没有具体的推荐值，但它绝对不应该是数百或数千个。


    当最初创建事务日志文件时，它会具有初始数量的 VLF，这通常是足够的。但每次发生自动增长操作或手动扩展大小时，SQL Server 会添加几个 VLF（通常是
    4、8 或 16 个，具体取决于添加的大小）。随着时间的推移执行多次增长操作，可能会创建数百或数千个 VLF。要显示事务日志文件中的 VLF 数量，请运行以下语句，它将为每个
    VLF 文件返回一行：


    ```

    DBCC LOGINFO

    ```


    一个典型的汇总输出如下。


    | **RecoveryUnitId** | **FileId** | **FileSize** | **StartOffset** | **FSeqNo**
    | **Status** | **Parity** | **CreateLSN** |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 0 | 2 | 458752 | 8192 | 70 | 2 | 64 | 0 |

    | 0 | 2 | 458752 | 466944 | 71 | 2 | 64 | 0 |

    | 0 | 2 | 458752 | 925696 | 72 | 2 | 128 | 0 |

    | 0 | 2 | 712704 | 1384448 | 73 | 2 | 128 | 0 |


    注意


    有关确定在创建、增长和自动增长操作中添加多少 VLF 所用算法的更多详细信息，您可以参考以下文章：[www.​sqlskills.​com/​blogs/​paul/​important-change-vlf-creation-algorithm-sql-server-2014/​](http://www.sqlskills.com/blogs/paul/important-change-vlf-creation-algorithm-sql-server-2014/)。

