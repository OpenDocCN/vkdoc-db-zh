  trans: '## 使用查询存储


    在上一节中，我们了解了如何启用和配置查询存储。现在，让我们通过运行一些查询来实际操作一下。在我们的示例中，我们可以在数据收集后立即进行检查。然而，在生产环境中，你可能希望等待一段时间，直到收集到具有代表性的工作负载，这取决于你的应用程序，可能需要例如一整天或一周的时间。让我们用我在
    `AdventureWorks2017` 数据库上最喜欢的一个查询来测试它，这个查询的优势在于它极其简单，并且在这种情况下可以展示参数敏感问题。创建以下存储过程：


    ```sql

    CREATE PROCEDURE test (@pid int)

    AS

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = @pid

    ```


    > **Note**

    >

    > 请记住，这是一个简化的练习，旨在展示查询存储的工作原理。你当然可以使用其他技术来解决参数敏感查询的问题，但在像 `AdventureWorks2017`
    这样的小型数据库中模拟计划回归会付出更多的努力。而且，是的，查询存储也可以用来查找参数敏感查询（或更常称为与参数探测相关的问题）。


    根据提供给过程的参数值，可能会创建两种可能的执行计划。这相当于图 6-1 中的毕加索图，仅显示两种颜色。使用 `ProductID` `898` 执行存储过程将创建一个包含索引查找和键查找运算符的计划，而使用值
    `870` 则会选择表扫描。在这两种情况下，创建的计划都将适合所提供的参数。尝试任何其他可能的值仍将创建这两种计划之一，前提是需要并执行了新的优化。但作为一个参数敏感的查询或过程，当重用一个可能不适合所提供参数的现有计划时，可能会出现性能问题。


    例如，对 `ProductID` `898` 运行使用表扫描计划的过程可能会导致一些性能问题，因为必须扫描整个表才能返回仅 9 行数据。但最高的性能问题将发生在使用索引查找/键查找计划的
    `ProductID` `870` 上，因为它执行了 14,000 次逻辑读取，而整个表扫描只需 1200 次读取。性能问题的原因在于索引查找/键查找组合非常昂贵，只有在返回少量行时才是一个好的解决方案。让我们创建这个场景，看看查询存储是否能检测到该性能问题。首先，运行
    `SET STATISTICS IO ON` 以启用 SQL Server 显示有关查询产生的磁盘活动量的信息，并运行 `ALTER DATABASE SET
    QUERY_STORE CLEAR ALL` 来清除查询存储当前存储的任何信息。运行以下语句：


    ```sql

    SET STATISTICS IO ON

    GO

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    ```


    运行第一个查询以创建表扫描计划。你可以选择在 SQL Server Management Studio 中通过选择“包含实际执行计划”来可视化该计划。


    ```sql

    EXEC test @pid = 870

    ```


    运行前面的语句将显示 1248 次逻辑读取，你可以在“消息”选项卡上看到（根据几个因素，这个值可能会有微小差异）。如果你随后尝试以下查询，它将重用表扫描计划，因此将具有相同的逻辑读取次数（假设该计划尚未从计划缓存中删除）：


    ```sql

    EXEC test @pid = 898

    ```


    事实上，任何参数都将使用相同的计划，并且性能也将相同。至少在这种情况下，性能是稳定和一致的，尽管对于最后一种情况（必须扫描整个表才能返回仅 9 行）来说，可能不是一个完美的解决方案。


    但是，使用索引查找和键查找运算符的计划会出现更大的性能差异。我们假设当前计划已从计划缓存中清除，并且下一次执行使用 `ProductID` `898`，从而创建一个新的优化和一个新计划。为了模拟这一点，我们将使用
    `DBCC FREEPROCCACHE` 语句，虽然这不是实现此目的的最佳方法，但它是一种简单的方法，以便我们专注于主要观点。运行以下查询：


    ```sql

    DBCC FREEPROCCACHE

    GO

    EXEC test @pid = 898

    GO

    EXEC test @pid = 870

    ```


    > **Note**

    >

    > `DBCC FREEPROCCACHE` 将从整个计划缓存中删除所有计划，因此请小心，不要在生产环境中运行此类语句。


    这些执行的逻辑读取次数分别为 29（获取 9 行）和 14,077（获取 4688 行）。14,077 是一个巨大的数字，对于之前显示仅需 1266 次逻辑读取即可执行表扫描操作的表来说。这一次，执行时间不稳定，它将取决于提供的参数，更准确地说，取决于所需的索引查找/键查找次数。换句话说，使用表扫描的计划将始终具有相同的性能，具体取决于表中的页数。但使用索引查找/键查找的计划将取决于读取的行数，因此其开销可以从非常小到非常大。


    确保你已执行前面的查询，我们现在可以运行此查询来显示查询存储收集的一些信息：


    ```sql

    SELECT rs.avg_logical_io_reads, qt.query_sql_text,

    q.query_id, qt.query_text_id, p.plan_id, rs.runtime_stats_id,

    rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    JOIN sys.query_store_runtime_stats_interval AS rsi

    ON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id

    ```


    我们得到以下输出；仅显示所需的行：


    | `平均逻辑 IO 读取次数` | `1249` | `7054` |

    | --- | --- | --- |

    | `查询 SQL 文本` | (@pid int)SELECT * FROM | (@pid int)SELECT * FROM |

    | `查询 ID` | 1 | 1 |

    | `查询文本 ID` | 1 | 1 |

    | `计划 ID` | 1 | 2 |

    | `运行时统计信息 ID` | 1 | 2 |

    | `平均行数` | 2348.5 | 2348.5 |

    | `执行次数` | 2 | 2 |


    这表明，对于 `计划 ID` 1（表扫描计划），平均逻辑 IO 读取次数为 1249，因为整个表有 1249 页。对于 `计划 ID` 2（包含索引查找和键查找运算符的计划），平均值为
    7054，这大约是 29 加上 14,077 除以 2，因为有两次执行。


    SQL Server Management Studio 也可以向你显示此信息和其他查询存储信息。在数据库下的查询存储文件夹中，右键单击“性能回归查询”，然后选择“查看性能回归查询”。该报表将让你选择
    CPU 时间 (us)、持续时间 (us)、逻辑读取、逻辑写入、内存消耗 (KB) 和物理读取。单击“以网格格式查看性能回归查询及其详细信息”。图 6-5
    显示了按逻辑读取排序的报表。


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig5_HTML.jpg](img/393702_2_En_6_Fig5_HTML.jpg)


    图 6-5：按逻辑读取排序的前 25 个性能回归查询


    单击我们感兴趣的查询。（即使你遵循了相同的步骤，你也可能有不同的 `查询 ID`。）在右上角窗格中，你会看到一个类似于图 6-6 的屏幕，其中显示了两个计划，由两个小圆圈表示。单击一个圆圈将显示每个计划的运行时信息，图形化计划将显示在底部窗格中（图
    6-6 中未显示）。


    > **Note**'
- fmt: 'Older versions of the Query Store will show logical reads in pages. The latest
    version shows the same information on KBs. For example, you may see 7054 for Avg
    Logical Reads or 56,432 for Avg Logical Reads (KB). As we learned in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    a data page is 8 KB.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig6_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig6_HTML.jpg)


    ## Figure 6-6: Plan summary for query pane


    At this point, you could research why there is such a big difference in the performance
    for both plans and try to apply any of the traditional query-tuning techniques.
    A solution that the Query Store provides and one that is immediately available
    without needing any query-tuning effort is to force any of the available execution
    plans, assuming you want to use that plan for every execution of that particular
    query.


    So, what to do next? Although not a perfect solution for this example (this is
    why parameter-sensitive queries are difficult to fix and usually require some
    other methods), suppose that we want consistent performance and decided to use
    the plan with the table scan. Let’s force that plan by selecting the plan on the
    “Plan summary for query” pane and clicking “Force Plan” when the plan is displayed
    on the bottom pane. Plan summary also gives you the choice to force a plan. You
    can only force a plan when it is saved in the Query Store. Answer “Yes” when asked
    for confirmation. If you capture the query in a trace, you would see a similar
    statement being sent:


    ```

    EXEC sys.sp_query_store_force_plan @query_id = 1, @plan_id = 1

    ```


    You can use `sp_query_store_force_plan` to force a specific plan for a particular
    query. Every time SQL Server encounters this query, if no such plan is available
    in the plan cache, it tries to force the plan provided. If plan forcing fails,
    the `plan_guide_unsuccessful` extended event (or Plan Guide Unsuccessful trace
    event) is fired, and the query optimizer is instructed to optimize the query in
    the normal way. The forced plan is kept in the plan cache and will be reused as
    needed. It is worth noting at this point that the plan for this query will be
    forced only if executed within the specified stored procedure. This would not
    apply if the same query is executed in a different stored procedure or ad hoc
    query.


    At this point, even if you clear the plan cache and run the query with the value
    898, you will always get the plan with the table scan. Although the `Use Plan`
    attribute in the execution plan will be true, it does not show this is a forced
    plan, and at this moment the only way to know that information is by looking at
    the `is_forced_plan` column of the `sys.query_store_plan` catalog.


    SQL Server Management Studio also provides the choice to unforce the plan on the
    same GUI. Doing that will send a similar statement to SQL Server:


    ```

    EXEC sys.sp_query_store_unforce_plan @query_id = 1, @plan_id = 1

    ```


    Forcing a plan uses plan guides in the background. When a plan is forced, SQL
    Server implicitly adds a `USE PLAN` hint with the fragment of the XML plan associated
    with that statement, so you no longer need to use a plan guide anymore. Also,
    keep in mind when using a plan guide alone, the query optimizer is not guaranteed
    to produce the exact requested forced plan, but at least something similar to
    it. In addition, you should be aware that there may be some cases where forcing
    a plan does not work, a typical example being when the schema has changed. So,
    if a stored plan uses an index but the index no longer exists, it would be impossible
    to reuse and force such plan. In this case, SQL Server will perform a normal optimization,
    and it will record the fact that the forcing plan operation failed in the `sys.query_store_plan`
    catalog. Plan forcing failure is explained later in this chapter. For more details
    about the elements of a query plan that can be forced with the Query Store and
    `USE PLAN`, see [`https://technet.microsoft.com/en-us/library/ms186954`](https://technet.microsoft.com/en-us/library/ms186954)`(v=sql.105).aspx`.


    Purging or disabling the Query Store will also disable any forced query plans.
    Once you purge a plan, there is no way to force it back as the plan has been permanently
    removed from the Query Store database. However, if you disable the Query Store
    while a plan was configured as forced, it will be forced back once the Query Store
    is enabled again, assuming the plan was not deleted by some other means. Unforcing
    the previous plan in our example and running the procedure with the ProductID
    898 again will perform a normal query optimization, creating the original plan
    with the index seek/key lookup combination, and the `Use Plan` attribute will
    not appear in the execution plan anymore.


    Finally, forcing a plan should not be considered a long-term solution as, similar
    to using query hints, the database data and schema can change, and the forced
    plan can no longer be optimal. Again, using traditional query-tuning techniques
    should be required to fix the problematic query.'
