    ## 微软的重大宣布


    2016 年 3 月，在纽约举办的 Data Driven 大会上，当微软云与企业部执行副总裁**斯科特·格思里**宣布 SQL Server 将登陆 Linux
    平台时，我们整个科技界都感到无比震惊。你仍可在此阅读当时的公告：[`https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux/`](https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux/)。在那一天之前，我们偶尔只会听到
    SQL Server 将被移植到 Linux 的消息，结果发现那只是在 4 月 1 日或愚人节发布的玩笑。但这一次，并非儿戏。


    该产品的首批代码，即后来成为 SQL Server 2017 的首个公开预览版或 CTP（社区技术预览版），于同年 11 月在同一个城市的 Microsoft
    Connect() 大会上发布。


    > **注意**

    >

    > 我对 SQL Server 在 Linux 上运行的可能性感到无比兴奋，以至于我自己写了一整本关于 SQL Server on Linux 的书。如果你对更多细节感兴趣，可以阅读由麦格劳-希尔出版的
    `SQL Server on Linux`。


    在同一活动中，微软还发布了 SQL Server 2016 Service Pack 1，并宣布从该版本开始，**在 SQL Server 的历史上首次**，所有应用和可编程性功能都将在产品的所有版本中提供。诸如内存中
    OLTP、列存储索引、数据库快照、压缩、分区、全程加密、行级安全、动态数据屏蔽和变更数据捕获等功能，都将从免费的 Express 版到 Standard 和
    Enterprise 版，在所有 SQL Server 版本中可用。这显然也影响了 Linux 版 SQL Server，因为它计划成为 SQL Server
    2017 发布的一部分。


    所有应用和可编程性功能在所有版本中都可用，这将使应用程序更具可移植性，可以在任何版本上进行开发和部署，现在还可以在多个平台上——或至少在 Windows、Linux
    和 Docker 上运行。此外，自 2016 年 3 月起，从 SQL Server 2014 开始的 SQL Server Developer 版本也免费提供。


    在这两场活动宣布了多项重大消息之后，似乎我们仍未准备好迎接又一个大惊喜。就在上述 Linux 版 SQL Server 的首个 CTP（后来成为首个 Linux
    版 SQL Server）发布两天后，多家媒体（从 `The Register` 开始）指出，该产品并非像几乎所有人预期的那样是（代码）移植，而是使用了一种基于名为
    Drawbridge 研究项目的虚拟化技术。你仍然可以在 [`www.theregister.com/2016/11/18/microsoft_running_windows_apps_on_linux`](https://www.theregister.com/2016/11/18/microsoft_running_windows_apps_on_linux)
    阅读到类似《微软 Linux？微软在 Linux 上运行其 Windows SQL Server 软件》这样的文章。


    尽管微软从未明确表示这是（代码）移植（即编译 SQL Server 代码并将其作为原生 Linux 应用程序运行），但这是最合乎逻辑的假设。第一次从微软外部的其他消息来源听说情况恰恰相反时，感觉很奇怪。SQL
    Server 团队在一个月后才公开了其架构，主要通过文章《SQL Server on Linux: How? Introduction》，这篇文章至今仍值得一读，你可以在
    [`https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/`](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/)
    找到它。


    虽然从宣布到最终交付软件成品用了不到三年时间，但这项工作实际上跨越了产品的两个版本。虽然对 Linux 的支持工作始于 2014 年底和 2015 年初，但
    SQL Server 2016 在 2016 年 5 月发布。而首个支持 Linux 的版本 SQL Server 2017，直到 2017 年 10 月才发布。


    目前，只有最新的两个 SQL Server 版本，2017 和 2019，可以在 Linux 上运行。它们可以在 Red Hat Enterprise Linux、SUSE
    Linux Enterprise Server 和 Ubuntu 上运行。这些版本的 SQL Server 也可以在 Docker 上运行，而 Docker
    本身可在 Linux、Windows 和 Mac OS 平台上运行。


    > **注意**

    >

    > 在 Linux 上安装 SQL Server 或在 Docker 上运行 SQL Server 超出了本书的范围。有关如何执行此操作的详细信息，请参阅
    [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview?view=sql-server-ver15)
    中的安装部分。


    我将用本章剩余的部分来解释 SQL Server on Linux 背后的架构。可能还需要一点历史背景来提供视角。


    ## 一点历史


    尽管 SQL Server 作为仅限 Windows 的软件产品已有二十多年，但没多少人知道它起源于 Unix 世界。SQL Server 最初是 Sybase
    的产品，运行在多个 Unix 平台上，最初被称为 DataServer。在那个年代，为了在多个平台上运行软件，代码必须针对每个操作系统进行移植和编译。所以
    SQL Server 最初是一项多平台技术。在那些早期日子里，Windows 甚至还不存在（或者至少服务器软件不存在，最初称为 Windows NT）。一段时间后，Sybase
    与 Microsoft 合作，首先将 SQL Server 带到 OS/2，后来带到 Windows。


    微软和 Sybase 甚至与 Ashton-Tate 有过短暂的合作，这次合作的成果是于 1989 年 5 月发布了用于 OS/2 的 Ashton-Tate/Microsoft
    SQL Server 1.0。与 Ashton-Tate 的协议结束后，产品名称更改为 Microsoft SQL Server，其第一个版本 1.1 于
    1990 年夏天发布。


    几年后，微软发布了一个新的基于服务器的操作系统 Windows NT。其第一个版本 Windows NT 3.1 于 1993 年 7 月发布（没有版本 1
    或 2）。Windows NT 的内核最初打算用于 OS/2。Windows NT 是用 C、C++ 和汇编语言编写的。很快，微软决定将 SQL Server
    从 OS/2 移植到 Windows NT。


    用于 OS/2 的 SQL Server 4.2 被移植到 Windows NT，产生了 SQL Server 4.21，并于 1993 年发布。1994
    年 4 月，微软和 Sybase 宣布结束他们的开发协议，各自决定开发自己的 SQL Server 或数据库产品。SQL Server 4.2B 是该产品在
    OS/2 上的最后一个版本。


    在 SQL Server 的那些早期日子里，无论是作为 Sybase 产品还是微软产品，总面临着一个两难的抉择：是让产品具有可移植性并能够运行在多个平台上，还是让产品为单一操作系统而设计、编写和优化。这是微软在离开
    OS/2 平台并保留 SQL Server 为仅限 Windows 软件时做出的决定之一。当微软尝试将 SQL Server 移植到 Linux 时，同样的关切再次出现。可移植性的目标有时与性能目标相冲突。换句话说，一个软件项目要么需要为每个支持的平台进行重大的重新工程，要么采取“最低公分母”的方法，无法充分利用每个平台的特性。


    > **注意**：你可以通过阅读 Kalen Delaney 所著的 `Inside Microsoft SQL Server 2000` 的第 1 章 来了解更多关于
    SQL Server 的历史，你也可以在线找到该章节：[`www.sqlserverinternals.com/s/History-of-SQL-Server.pdf`](https://www.sqlserverinternals.com/s/History-of-SQL-Server.pdf)。

