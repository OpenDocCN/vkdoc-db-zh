- fmt: '## Force Failure


    As mentioned earlier, plan forcing should be a temporary solution while a long-term
    solution is researched and implemented. Similar to the case of using query hints,
    forced plans should be monitored, as performance may degrade after changes in
    your database. There is also the possibility that SQL Server may fail to force
    a specified plan. The Query Store provides information regarding force plan failure
    using the columns `last_force_failure_reason` and `last_force_failure_reason_desc`
    of the `sys.query_store_plan` catalog view. The documented values for these columns
    are as follows:


    *   8637: `ONLINE_INDEX_BUILD`: Query tries to modify data while target table
    has an index that is being built online.

    *   8683: `INVALID_STARJOIN`: Plan contains invalid StarJoin specification.

    *   8684: `TIME_OUT`: Optimizer exceeded number of allowed operations while searching
    for plan specified by forced plan.

    *   8689: `NO_DB`: A database specified in the plan does not exist.

    *   8690: `HINT_CONFLICT`: Query cannot be compiled because plan conflicts with
    a query hint.

    *   8694: `DQ_NO_FORCING_SUPPORTED`: Cannot execute query because plan conflicts
    with use of distributed query or full-text operations.

    *   8698: `NO_PLAN`: Query processor could not produce query plan because forced
    plan could not be verified to be legal for query.

    *   8712: `NO_INDEX`: Index specified in plan no longer exists.

    *   8713: `VIEW_COMPILE_FAILED`: Could not force query plan because of a problem
    in an indexed view referenced in the plan.

    *   <other value>: `GENERAL_FAILURE`: General forcing error (not covered with
    preceding reasons).


    A trivial example to show this feature would be to disable an existing index that
    is used in a forced plan. Clean the Query Store and plan cache:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    GO

    DBCC FREEPROCCACHE

    ```


    Create the indexed plan by running the following code (it assumes the procedure
    was created as shown earlier):


    ```sql

    EXEC test @pid = 898

    ```


    Just for the purpose of this exercise, it is assumed that you may have at least
    another plan, and you want to force the one with the seek index operator. Run
    the following query to obtain its `plan_id`:


    ```sql

    SELECT plan_id, q.query_id, query_sql_text FROM sys.query_store_plan p

    JOIN sys.query_store_query AS q

    ON p.query_id = q.query_id

    JOIN sys.query_store_query_text qt

    ON q.query_text_id = qt.query_text_id

    WHERE query_sql_text LIKE ''%SELECT * FROM Sales.SalesOrderDetail%''

    ```


    Inspect the results to find the query text “(@pid int)SELECT * FROM Sales.SalesOrderDetail
    WHERE ProductID = @pid”. Get the `query_id` and `plan_id` values. In my case,
    `query_id` is 1 and `plan_id` is 1. Run the following to force the required plan:


    ```sql

    EXEC sys.sp_query_store_force_plan @query_id = 1, @plan_id = 1

    ```


    You can optionally perform this process in SQL Server Management Studio as explained
    earlier. Verify that the query runs, that the plan using an index seek is used,
    and that the `Use Plan` attribute in the execution plan is set to true. Finally,
    disable the index:


    ```sql

    ALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail DISABLE

    ```


    If you run the query again, forcing the plan will fail as the index used by the
    plan is no longer available. You will instead get a normal query optimization
    and a plan using a table scan. The following query, first updating the `plan_id`
    to the one you used earlier


    ```sql

    SELECT * FROM sys.query_store_plan

    WHERE plan_id = 1

    ```


    will return `force_failure_count` 1, which is the number of times that forcing
    this plan has failed. Remember that this value shows optimization attempts and
    not query executions. The results also show that the `last_force_failure_reason`
    is 8712 and `last_force_failure_reason_desc` `NO_INDEX`, which were expected as
    documented at the beginning of this section. But if you enable or rebuild the
    index, the plan will continue to be forced. Run the following statement:


    ```sql

    ALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail REBUILD

    ```


    The forced plan will be used again by the query processor, and the values for
    `force_failure_count`, `last_force_failure_reason`, and `last_force_failure_reason_desc`
    on the `sys.query_store_plan` catalog will be reset to 0, 0, and NONE, respectively.


    ## Wait Statistics


    As mentioned in the previous chapter, starting with SQL Server 2016, it is now
    possible to track wait statistics at the session or query level, by using the
    `sys.dm_exec_session_wait_stats` DMV. Obviously, I am talking at the database
    engine level. Even when the Query Store was released during the same version,
    collecting wait information on the Query Store was not implemented until SQL Server
    2017. This feature was without a doubt the most important improvement to the Query
    Store since the original release.


    Wait statistics are enabled by default in the Query Store. For example, you can
    create a new database and, without enabling the Query Store, take a look at the
    `sys.database_query_store_options` to verify that `wait_stats_capture_on` is enabled.
    So if you enable the Query Store, the wait statistics feature will be automatically
    enabled along with it.


    You can also explicitly enable wait statistics by running the following statement:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE (WAIT_STATS_CAPTURE_MODE = ON)

    ```


    In a similar way, you can disable the feature using the same statement with `WAIT_STATS_CAPTURE_MODE
    = OFF`.


    Wait types in the Query Store are grouped into wait categories, in a similar way
    as the data collection feature, as shown in Figure 5-3 in Chapter 5. Let us try
    a quick exercise to see how the feature works. After making sure the wait statistics
    feature is enabled, try running some expensive queries. A simple example could
    be running the following SELECT statements ten times each:


    ```sql

    SELECT * FROM Person.Person

    GO 10

    SELECT * FROM Sales.SalesOrderDetail

    GO 10

    ```


    You can immediately access the wait information after the queries are completed.
    In order to do that, you can use SQL Server Management Studio and run the Query
    Wait Statistics report from the Query Store folder. You may see a report similar
    to what I show in Figure 6-8. The graph is based on the “wait category” metric,
    but you can change it to other choices such as avg wait time, min wait time, max
    wait time, std dev wait time, total wait time, or execution count. My example
    shows our two queries, called Query ID 1 and 2, including their wait information.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig8_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig8_HTML.jpg)


    Figure 6-8 Query Store wait statistics


    Clicking any wait category will take us to a second screen where we can see the
    wait information per query, including any available execution plans, as you can
    see in Figure 6-9.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig9_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig9_HTML.jpg)


    Figure 6-9 Query wait statistics


    Finally, as mentioned earlier, waits are grouped in categories, instead of listing
    a particular wait such as `CXPACKET` or `ASYNC_NETWORK_IO`. For example, all the
    `LCK_M_%` waits are grouped in the Lock category, all `LATCH_%` into the Latch
    category, `PAGELATCH_%` into Buffer Latch, `PAGEIOLATCH_%` into Buffer IO, `CXPACKET`
    and others into Parallelism, `ASYNC_NETWORK_IO` and others into Network IO, and
    `SOS_SCHEDULER_YIELD` alone is listed as CPU, just to list the most common ones
    we usually see. You can see the entire list by looking at `sys.query_store_wait_stats`
    in the documentation. You can also see more details about waits in Chapter 5.'
