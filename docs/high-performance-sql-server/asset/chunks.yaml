    \ 目录视图时，你将能够访问内存和磁盘中的所有数据，因为它被设计为从两个来源检索数据。\n\n查询文本的定义从语句的第一个标记的第一个字符开始，到最后一个标记的最后一个字符结束。其内部的空格和注释会被计算在内，但如果它们位于之前或之后，则不被视为查询文本的一部分。查询还必须位于同一对象上才会被视为相同查询。如果相同的查询用于两个不同的存储过程，它将被视为不同的查询，并且对象的\
    \ `object_id` 会保存在查询存储目录视图中。建议你在维护对象时使用 `ALTER` 语句而不是 `DROP` 和 `CREATE` 语句，以保持相同的\
    \ `object_id` 值（除了保留权限等其他好处）。\n\n> 注意：如果你仍然需要使用 `DROP` 和 `CREATE` 语句，SQL Server\
    \ 2016 还引入了新的 `DROP IF EXISTS` 语法，允许你仅在对象已存在时才条件性地删除它。有关存储过程的示例，请参阅 SQL Server\
    \ 文档 [`https://msdn.microsoft.com/en-us/library/ms174969.aspx`](https://msdn.microsoft.com/en-us/library/ms174969.aspx)。\n\
    > \n> ```\n> DROP IF EXISTS\n> ```\n"
- fmt: '# Enabling, Purging, and Disabling the Query Store


    The Query Store is disabled by default. To enable it on the current database,
    you can use the `ALTER DATABASE CURRENT SET QUERY_STORE = ON` statement. Once
    the Query Store is enabled, it will start collecting the plans and query performance
    data, and you can analyze that data by looking at the Query Store catalog views.
    The information is available immediately after compilation and execution.


    You can analyze the information collected either proactively to understand the
    query performance changes in your application or retroactively in case you have
    a performance problem. Once you look at the different metrics stored, which are
    very similar to what is stored, for example, in the `sys.dm_exec_query_stats`
    DMV, you can make the decision to optimize for a specific metric like query duration,
    CPU time, logical IO reads, logical IO writes, physical reads, and so on. Once
    you identify the problem, you can use traditional query-tuning techniques to try
    to fix the problem, or you can use the Query Store to force a previous plan. The
    plan has to be captured in the Query Store to be forced, which obviously means
    it is a valid plan (or at least it was at the moment when it was collected—more
    on that later) and it was previously generated by the query optimizer. To force
    a plan, you need both the `plan_id` and `query_id`, which can be found in the
    `sys.query_store_plan` catalog view. Technically, you could also force a plan
    using a plan guide without the Query Store, but it would be more complicated and
    you would still have to manually collect and find the required plan in the first
    place.


    You can query the Query Store current configuration values, even if it is disabled,
    by running the following statement:


    ```sql

    SELECT * FROM sys.database_query_store_options

    ```


    This will return the following data:


    | `desired_state` | 0 |

    | --- | --- |

    | `desired_state_desc` | OFF |

    | `actual_state` | 0 |

    | `actual_state_desc` | OFF |

    | `readonly_reason` | 0 |

    | `current_storage_size_mb` | 0 |

    | `flush_interval_seconds` | 900 |

    | `interval_length_minutes` | 60 |

    | `max_storage_size_mb` | 100 |

    | `stale_query_threshold_days` | 30 |

    | `max_plans_per_query` | 200 |

    | `query_capture_mode` | 1 |

    | `query_capture_mode_desc` | ALL |

    | `size_based_cleanup_mode` | 1 |

    | `size_based_cleanup_mode_desc` | AUTO |


    To enable the Query Store on the AdventureWorks2017 database, use the following
    statement:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE = ON

    ```


    Note


    The AdventureWorks2017 database may already have the Query Store enabled when
    you initially restore it.


    After enabling the Query Store, only the state will be changed. All the other
    default values will remain the same. You could also change one or more configuration
    values when you enable the Query Store, as shown later. If you display the `sys.database_query_store_options`
    catalog view again, you can see that both the `desired_state` and `actual_state`
    columns have now the value 2 and that the `desired_state_desc` and `actual_state_desc`
    switched to `READ_WRITE`. These two states are used to differentiate the desired
    operation mode explicitly set by the user and the actual or real state. The most
    common case when these values may be different is when the `READ_WRITE` mode is
    requested but the Query Store has to automatically switch to `READ_ONLY` due to
    lack of disk space.


    Alternatively, you can use SQL Server Management Studio to perform the same operations.
    Right-click your database and select Properties. Then select the Query Store page.
    On General, Operation Mode (Requested), select Read Write. Keep in mind that when
    using SQL Server Management Studio, several values are populated by default, but
    you can change any of these values and click OK when done. The Query Store page
    is shown in Figure [6-4](#393702_2_En_6_Chapter.xhtml#Fig4).


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig4_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig4_HTML.jpg)


    Figure 6-4. Query Store configuration


    By default, the following statements and values will be sent to SQL Server:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE = ON

    GO

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE (OPERATION_MODE = READ_WRITE,
    CLEANUP_POLICY = (STALE_QUERY_THRESHOLD_DAYS = 367), DATA_FLUSH_INTERVAL_SECONDS
    = 900, INTERVAL_LENGTH_MINUTES = 60, MAX_STORAGE_SIZE_MB = 100, QUERY_CAPTURE_MODE
    = ALL, SIZE_BASED_CLEANUP_MODE = OFF)

    GO

    ```


    Note


    You can always capture the statements sent by SQL Server Management Studio or
    some other tools by using SQL Trace or Extended Events. You can even capture the
    statements sent by Profiler and the Extended Events GUI themselves!


    The default Query Store options are good for a quick start, but you should update
    some of those options depending on your workload and performance troubleshooting
    requirements. After the initial configuration, you can monitor how the Query Store
    behaves over time and adjust its configuration accordingly. As you can see, `MAX_STORAGE_SIZE_MB`
    is only 100 MB, so this is the first setting that you may want to change or originally
    configure to a higher value, depending on your needs. `MAX_STORAGE_SIZE_MB` is
    the disk space allocated to the Query Store inside the database. You could start
    with a value of at least 1024 MB, or greater if you are not sure, but monitor
    disk space used accordingly as the data collection will depend on the workload
    and activity of your system. Unfortunately, if the allocated space becomes full,
    the Query Store will just simply stop collecting new data without notifications
    and will silently switch to `READ_ONLY` state, meaning it will not be collecting
    any additional information about your queries. You can monitor this status by
    using the following query:


    ```sql

    SELECT actual_state_desc, desired_state_desc, current_storage_size_mb,

    max_storage_size_mb, readonly_reason

    FROM sys.database_query_store_options

    ```


    In my testing, I was able to go over the configured size allocated for a brief
    time without a problem as it looks like the space used is not validated in real
    time. It only went to `READ_ONLY` state some time later, as shown in the following
    configuration values:


    | `actual_state_desc` | `READ_ONLY` |

    | --- | --- |

    | `desired_state_desc` | `READ_WRITE` |

    | `current_storage_size_mb` | 4 |

    | `max_storage_size_mb` | 1 |

    | `readonly_reason` | 65536 |


    Currently, the catalog view does not show a description for `readonly_reason`,
    but the documentation shows that 65536 means the Query Store has reached the size
    limit set by the `MAX_STORAGE_SIZE_MB` option. The documentation incorrectly says
    that you need to change the status back to `READ_WRITE` after expanding the `MAX_STORAGE_SIZE_MB`
    value, but my testing shows that it is not needed. Expanding `MAX_STORAGE_SIZE_MB`
    will automatically return the Query Store to the `READ_WRITE` state:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE (MAX_STORAGE_SIZE_MB = 2048)

    ```


    Keep in mind that although you can change the size of the Query Store, its internal
    tables are always stored in the database primary filegroup, and this currently
    cannot be changed. Alternatively, you can activate query capture and cleanup policies
    to control the disk space used, as explained later.


    As the SQL Server Management Studio generated code showed earlier, you can change
    more than one attribute at a time, separating them with commas, using the following
    syntax:


    ```sql

    ALTER DATABASE database_name SET QUERY_STORE ( [,... n])

    ```


    If you need to purge the Query Store data, you can select the “Purge Query Data”
    button on the Query Store page, as shown earlier in Figure [6-4](#393702_2_En_6_Chapter.xhtml#Fig4).
    This will send the following statement, which you could have also typed directly
    to get the same results:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    ```'
