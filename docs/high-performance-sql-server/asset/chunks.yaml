    ## Using Environment Variables


    You can also configure a SQL Server instance in Linux using environment variables
    , although this will only assist with the initial installation using the mssql-conf
    setup command on the Linux host or as a new SQL Server container in Docker. To
    configure SQL Server after setup for either of these scenarios, just use the mssql-conf
    utility as explained earlier.


    These are the variables supported as of SQL Server 2019 (all except the last four
    are available for SQL Server 2017):


    | ACCEPT_EULA | Sets a value to confirm your acceptance of the End-User Licensing
    Agreement |

    | --- | --- |

    | MSSQL_SA_PASSWORD | Configures the sa user password |

    | MSSQL_PID | Sets the SQL Server edition or product key |

    | MSSQL_LCID | Sets the language ID to use for SQL Server |

    | MSSQL_COLLATION | Sets the default collation for SQL Server |

    | MSSQL_MEMORY_LIMIT_MB | Sets the maximum amount of memory, in MB, that SQL Server
    can use. By default, it is 80% of the total physical memory |

    | MSSQL_TCP_PORT | Configure the TCP port that SQL Server listens on. The default
    port is 1433 |

    | MSSQL_IP_ADDRESS | Sets the IP address |

    | MSSQL_BACKUP_DIR | Sets the default backup directory location |

    | MSSQL_DATA_DIR | Changes the directory where the new SQL Server database data
    files are created |

    | MSSQL_LOG_DIR | Changes the directory where the new SQL Server database log
    files are created |

    | MSSQL_DUMP_DIR | Changes the directory where SQL Server will save the memory
    dumps and other troubleshooting files by default |

    | MSSQL_ENABLE_HADR | Enables availability groups |

    | MSSQL_AGENT_ENABLED | Enables SQL Server Agent |

    | MSSQL_MASTER_DATA_FILE | Sets the location of the master database data file
    |

    | MSSQL_MASTER_LOG_FILE | Sets the location of the master database log file |

    | MSSQL_ERROR_LOG_FILE | Sets the location of the error log files |


    For example, you can use environmental variables in the following way to install
    SQL Server Developer edition, specifying a password for sa and accepting the SQL
    Server End-User Licensing Agreement:


    ```

    sudo ACCEPT_EULA="Y" MSSQL_PID="Developer" MSSQL_SA_PASSWORD=''Pa$$w0rd'' /opt/mssql/bin/mssql-conf
    setup

    ```


    ## Performance Best Practices


    Similar to the Windows world, you usually do not have to worry about performing
    a large number of operating system configurations in Linux in order to run and
    optimize SQL Server for performance. Obviously, selecting the right hardware or,
    in a virtualized platform, the right configurations for a virtual machine is still
    essential. Properly configuring storage, as covered in Chapter [11](#393702_2_En_11_Chapter.xhtml),
    is extremely important as well.


    However, there are a few configuration guidelines for SQL Server on Linux that
    you could take advantage from, which I will cover next. Some SQL Server administrators,
    new to the Linux world, may be intimidated by performing these configuration changes
    on their own, so it may be recommended that they work closely with their system
    administrators. Sometimes, the same is true even for Windows systems where we
    usually have to work very closely with both the system and the storage administrators
    to take advantage of the available hardware, operating system, and storage.


    I will use this last section of the chapter to describe some of those configuration
    guidelines, starting with memory configuration.


    ### Memory and the Out-of-Memory Killer


    By default, SQL Server uses only up to 80% of the available physical memory in
    Linux, so you may want to use mssql-conf and the memory.memorylimitmb setting
    to configure it to a higher value. This setting configures the memory limit, and
    its value must be specified in MB. An example using the memory.memorylimitmb setting
    was provided in the previous section where we set the memory limit to 492 GB.


    However, a system with improper configured memory can also create problems. You
    will need to make sure you are leaving enough memory for the operating system
    and possibly any other processes running in the same system. Since many applications
    allocate their required memory up front and usually do not utilize all this memory,
    the Linux kernel was designed with the ability to overcommit memory to make memory
    usage more efficient. And what is worst, a system running low in memory may lead
    the kernel to start killing processes in order to free up memory and stay operational.
    Since SQL Server is most likely the process using most of the memory, it would
    also be likely the process killed.


    If you suspect the SQL Server was killed for this reason, you should inspect the
    contents of the /var/log/messages file and look for a message indicating that
    the sqlservr process was actually killed because the system was running out of
    memory. If you find this evidence, the best way to avoid this problem is to properly
    configure the required memory for SQL Server, leaving enough memory for Linux
    and any other processes running in the same system.'
