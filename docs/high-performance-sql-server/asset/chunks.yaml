    ## Using Multiple Data Files


    One possible solution to the latch contention problem is to use multiple data
    files for `tempdb`. By using multiple files, allocation bitmaps will be spread
    onto these files, minimizing contention as SQL Server will balance incoming requests
    across them. Using multiple files can help with both PFS and SGAM pages, and using
    trace flag 1118, as shown next, can greatly minimize the use of SGAM pages as
    well.


    One question that has been debated for years is what the optimal number of files
    for `tempdb` should be. The fact that applications could use `tempdb` in different
    ways and have different workloads has proved difficult to recommend a specific
    number for every scenario. Fortunately, there is a good recommendation that can
    work on most use cases and consists of creating one data file per logical processor
    available to the SQL Server instance, up to a maximum of eight files. As shown
    later, starting with SQL Server 2016, this recommendation is now a default configuration
    option for `tempdb` when you install the software. As mentioned in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    SQL Server creates a scheduler per logical processor available to SQL Server,
    so the number of logical processors is also the maximum number of concurrent threads.
    Having multiple files means multiple PFS and SGAM pages, which means more allocations
    can happen at a time, reducing contention as threads are not waiting for one set
    of allocation pages. But this is a general guideline, and there might be cases
    where a high `tempdb` usage may still show contention. In these cases, it is recommended
    to create additional data files in multiples of four, up to the number of logical
    processors available in the system.


    As explained in the next section, data files on `tempdb` should be created with
    the same size and have the same autogrowth setting.'
  trans: '## 描述 tempdb 闩锁争用


    每当需要在 `tempdb` 中创建一个新对象（通常是临时表），并且至少插入一行数据时，必须从混合区中分配两个新页面并分配给该新对象。一个是 IAM 页面，第二个是数据页。在此过程中，SQL
    Server 还必须访问并更新数据文件中的第一个 PFS 页面和第一个 SGAM 页面。


    如第 1 章所述，一次只能有一个线程通过请求其上的闩锁来更改一个分配页。当活动量很大，并且在 `tempdb` 中创建和删除大量临时表时，PFS 和 SGAM
    页面上可能会发生争用。请记住，这不是一个 I/O 问题，因为在这种情况下分配页已经在内存中。显然，这种争用会影响创建这些表的进程的性能，因为它们可能必须等待，并且
    SQL Server 可能会在短时间内显得无响应。请记住，尽管用户数据库也使用分配页，但它们不太可能遇到闩锁争用问题，因为不像在 `tempdb` 中那样同时创建那么多对象。


    回到 SQL Server 2000 时代，当删除临时表时，这些页面需要被释放，这需要在 PFS 页面上获得一个新的闩锁，并可能在 SGAM 页面上再获得一个闩锁。SQL
    Server 2005 引入了一项优化——临时表缓存，通过在删除临时表时缓存一个 IAM 页面和一个数据页来改进此机制，如果必须再次创建相同的临时表或表变量，则可以重复使用它们，从而避免访问分配位图页面。然而，这种缓存机制有一些局限性，在
    `tempdb` 使用繁重的系统上并不能完全避免闩锁争用。


    检查 `tempdb` 分配页上是否存在闩锁争用问题的最简单方法是查看数据库活动中的 `PAGELATCH_XX` 等待。请注意，它们与 `PAGEIOLATCH_XX`
    等待不同。运行以下代码：


    ```sql

    SELECT * from sys.dm_os_waiting_tasks

    WHERE wait_type LIKE ''PAGE%LATCH%''

    AND resource_description LIKE ''2:%''

    ```


    或者，你也可以尝试以下方法：


    ```sql

    SELECT * FROM sys.dm_exec_requests

    WHERE wait_type LIKE ''PAGE%LATCH%''

    AND wait_resource LIKE ''2:%''

    ```


    或


    ```sql

    SELECT * FROM sysprocesses

    WHERE lastwaittype LIKE ''PAGE%LATCH%''

    AND waitresource LIKE ''2:%''

    ```


    注意


    传统上，`sysprocesses` 被广泛用于获取这些闩锁等待信息，你很可能在旧代码示例和其他来源中仍然看到它。由于它是 SQL Server 2000
    的系统表，在新版本中仅作为视图包含以保持向后兼容性，因此不应在新代码中使用。


    `sys.dm_os_waiting_tasks` 中的 `resource_description` 列根据所消耗的资源有大量格式。对于闩锁争用，我们感兴趣的格式是
    `<db-id>:<file-id>:<page-in-file>`，分别代表数据库 ID（对于 tempdb 始终为 2）、文件 ID 和文件中的页。如果你看到
    `resource_description` 为 `2:1:1` 和 `2:1:3`，你立即就能知道它们分别是 PFS 和 SGAM 页面。`wait_type`
    通常是 `PAGELATCH_UP`，尽管 `PAGELATCH_EX` 也可能出现，文件 ID 很可能为 1。文件 ID 大于 1 的情况并不常见，因为创建额外的文件是解决此问题的一种方法，如下一节所示。


    ## 修复 tempdb 闩锁争用


    在我看来，对于闩锁争用问题没有完美的解决方案，因为随着操作数量的增加，数据库引擎应该能够自动升级并正常工作。一个显而易见的解决方案可能是最小化同时在 `tempdb`
    中创建的临时表数量，但这可能不容易实现，因为它需要代码和应用程序的更改。请记住，内部对象（例如由排序和哈希操作创建的对象）不是由用户显式创建的，并且不需要本节讨论的分配方法。然而，这些内部对象由于其他原因也是性能问题，我们将在后面讨论。


    在 SQL Server 2016 之前，历史上解决这些问题的变通方法是以下一种或多种选择的组合：


    1.  使用多个数据文件

    2.  启用跟踪标志 1118

    3.  启用跟踪标志 1117


    我们将在以下各节中介绍这些方法。


    ### 使用多个数据文件


    解决闩锁争用问题的一种可能方法是为 `tempdb` 使用多个数据文件。通过使用多个文件，分配位图将分布在这些文件上，从而最小化争用，因为 SQL Server
    将在它们之间平衡传入请求。使用多个文件可以帮助解决 PFS 和 SGAM 页面的问题，并且使用如后文所示的跟踪标志 1118 也可以大大减少 SGAM 页面的使用。


    多年来一直争论的一个问题是 `tempdb` 的最佳文件数量应该是多少。事实上，应用程序可以以不同的方式使用 `tempdb` 并具有不同的工作负载，因此很难为每种情况推荐一个特定的数字。幸运的是，有一个很好的建议适用于大多数用例，即为
    SQL Server 实例可用的每个逻辑处理器创建一个数据文件，最多八个文件。如下所示，从 SQL Server 2016 开始，此建议现在成为安装软件时
    `tempdb` 的默认配置选项。如第 1 章所述，SQL Server 为可用的每个逻辑处理器创建一个调度器，因此逻辑处理器的数量也是并发线程的最大数量。拥有多个文件意味着有多个
    PFS 和 SGAM 页面，这意味着可以同时进行更多的分配，减少争用，因为线程不必等待一组分配页面。但这只是一个通用准则，在某些情况下，高 `tempdb`
    使用率仍可能显示争用。在这些情况下，建议以四个为增量创建额外的数据文件，直到达到系统中可用的逻辑处理器数量。


    如下一节所述，`tempdb` 上的数据文件应创建为相同的大小并具有相同的自动增长设置。'
- fmt: '# Trace Flags 1117 and 1118


    Since SQL Server uses SGAM pages to look for mixed extents with at least one unused
    page, a possible workaround to SGAM contention could be to avoid mixed extents
    altogether and, instead, exclusively use uniform extents. `trace flag 1118` has
    been available since SQL Server 2000 to do just this. By disabling most of the
    single-page allocations and, instead, using dedicated extents, you reduce the
    contention on SGAM pages. A downside with using `trace flag 1118` is that every
    object will use a dedicated extent, which requires eight pages. If the object
    is small enough to fit in only one page, this is effectively wasting space. That
    is, if the object only requires 8 KB of space, it will have to use 64 KB, thus
    wasting 56 KB of storage. The other downside is that this configuration takes
    effect at the instance level, impacting user databases as well. SGAM pages will
    still be used, as IAM pages will still need to be single-page allocations from
    mixed extents, but SGAM contention will most likely be eliminated or greatly minimized.


    `trace flag 1117` is related to how SQL Server increases the size of database
    files when enabling even growth of all files in a filegroup. This discussion requires
    an introduction to three important points:


    1.  Do not rely on autogrowth.

    2.  Configure database instant file initialization.

    3.  Create data files of equal size.


    Do not rely on the default autogrowth configuration, but leave it enabled with
    a proper file growth configuration, so it can be used as a last resort choice.
    A production environment most likely will have a dedicated drive for `tempdb`,
    if not a dedicated drive for data files and another for the transaction log file.
    If you are in this situation, simply allocate all the space possible to the `tempdb`
    files. This will help to avoid growing the database files during production operations,
    causing unnecessary overhead. At the same time, it will minimize fragmentation.


    Configure database instant file initialization, which is covered in detail in
    Chapter 3 and briefly described in the next section.


    Create data files of equal size. A mechanism called the proportional fill algorithm
    used by SQL Server considers the current size of the database files, at least
    at the filegroup level. This algorithm determines the order files are utilized
    and written to. It attempts to spread the allocations across the pages in a round-robin
    fashion. There is an unfortunate behavior when files are not the same size. Instead
    of spreading GAM allocations evenly between all the data files on a database,
    it would favor the largest file instead. Because of this, it is critical to have
    all the data files the same size.


    `trace flag 1117` helps you to avoid this problem by growing all the `tempdb`
    files together at the same time by the configured increment. However, as in the
    case of `trace flag 1118`, `trace flag 1117` applies to the entire SQL Server
    instance, working at the filegroup level on user databases. You may need to review
    this setting if it might be a problem for filegroups on your user databases.


    As we will see in the next section, the behavior of `trace flags 1117` and `1118`
    can now be configured at the database level.


    # SQL Server 2016 Enhancements


    SQL Server 2016 introduced several important enhancements for `tempdb`, so let
    us discuss them in this section. As mentioned in the introduction to this chapter,
    some of the previous `tempdb` recommendations are now either configured or enabled
    by default in SQL Server 2016. Let’s start with the SQL Server setup process.


    One of the screens during the SQL Server installation, shown in the previous chapter
    in Figure 3-3, now gives you the choice to grant the “Perform Volume Maintenance
    Task” privilege to the SQL Server database engine service account, automatically
    enabling instant file initialization. In previous versions of SQL Server, this
    was a choice that you would have to configure separately from the SQL Server setup
    or configuration process.


    By default, when a database is created or restored (or when a file is added, expanded,
    or restored), files are first initialized by filling them with zeros. In some
    cases, depending on the file size, this may be time-consuming. By enabling instant
    file initialization, SQL Server skips zeroing the files, making the process almost
    instantaneous. The only downside of skipping this process, as warned on the mentioned
    setup screen in Figure 3, is that avoiding zeroing data pages “may lead to information
    disclosure as it could allow deleted content to be accessed by an unauthorized
    principal.” Please refer to Chapter 3 for more details about the instant file
    initialization feature.


    Later in the setup process, SQL Server allows you to configure `tempdb`. Different
    from previous versions of SQL Server, the installation process now recommends
    the number of data files to be the same as the logical processors available in
    the system, up to a maximum of eight. This will be the default configuration if
    you take no action, as shown in Figure 4-2.


    ![../images/393702_2_En_4_Chapter/393702_2_En_4_Fig2_HTML.jpg](images/393702_2_En_4_Chapter/393702_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Tempdb configuration during setup


    Note


    As suggested in Figure 4-2, please also be sure you properly configure the initial
    data file and autogrowth sizes according to your application workload and requirements.


    This default number of data files will also be automatically configured if you
    perform a command-line installation, and, optionally, you have the choice to specify
    a different value by using the `/SQLTEMPDBFILECOUNT` installation parameter. For
    more details about this and other `tempdb`-related setup parameters, see “Install
    SQL Server from the Command Prompt” at [`https://docs.microsoft.com/en-us/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt`](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt).


    At the time of writing, creating a Microsoft Azure SQL Server 2019 image still
    provisions a single data file for a multiprocessor virtual machine. As a result,
    you may still need to manually configure the number of files accordingly.


    Another major change introduced with SQL Server 2016 is that `trace flags 1117`
    and `1118` are no longer needed in `tempdb` as their behavior is now automatically
    enabled for this database. `tempdb` in SQL Server 2016 and later will use uniform
    extents for object allocations and will also grow all the `tempdb` files together
    at the same time by default for the configured increment. The behavior originally
    offered by `trace flags 1117` and `1118` is now offered at a database level using
    the `ALTER DATABASE` statement.'
