  trans: '

    ### 聚合


    聚合是一种操作，它将多行的值组合在一起，形成一个具有更重要意义或度量的单一值。聚合的结果可以是一个单一值（例如公司的平均工资），也可以是一个按组计算的值（例如按部门计算的平均工资）。查询处理器有两个运算符来实现聚合：流聚合和哈希聚合，它们可用于处理包含聚合函数（如
    `AVG` 或 `SUM`）或 `GROUP BY`、`DISTINCT` 子句的查询。


    流聚合用于包含聚合函数（如 `AVG` 或 `SUM`）且没有 `GROUP BY` 子句的查询，它们总是返回一个单一值。当提供的数据已经按 `GROUP
    BY` 子句的谓词排序（例如，通过使用索引）时，流聚合也可用于具有较大数据集的 `GROUP BY` 查询。哈希聚合可用于那些数据未排序、无需排序且预计只有少量分组的大型表。最后，使用
    `DISTINCT` 关键字的查询可以通过流聚合、哈希聚合或去重排序运算符来实现。与去重排序运算符的主要区别在于，如果没有可用的索引，它会同时删除重复项并对其输入进行排序。使用
    `DISTINCT` 关键字的查询可以重写为使用 `GROUP BY` 子句，并且它们会生成相同的计划。


    到目前为止，我们已经看到可能有运算符要求数据已经有序。流聚合是这种情况，接下来我们将看到的合并连接也是这种情况。查询优化器可能会利用现有索引，或者可能显式地引入一个排序运算符来提供已排序的数据。在其他一些情况下，数据将通过哈希算法排序，本节展示的哈希聚合以及接下来介绍的哈希连接就是这种情况。排序和哈希都是停止-前进或阻塞操作，因为它们在消耗完所有输入（或在哈希连接的情况下至少是生成输入）之前无法产生任何行。正如稍后的“内存授予”部分所示，对所需内存的错误估计可能导致性能问题。


    ### 连接


    连接是一种操作，它基于某些公共信息（通常是定义为连接谓词的一个或多个列）将来自两个表的记录组合在一起。由于连接一次只处理两个表，因此请求从 n 个表中获取数据的查询必须作为
    n - 1 个连接的序列来执行。SQL Server 使用三种物理连接运算符来实现逻辑连接：嵌套循环连接、合并连接和哈希连接。最佳的连接算法取决于具体情况，因此没有一种算法优于其他算法。让我们快速回顾一下这三种算法的工作原理及其成本。


    #### 嵌套循环连接


    在嵌套循环连接算法中，外部输入（在图形化计划中显示在顶部）的运算符只执行一次，而内部输入的运算符对于满足连接谓词的每一行都会执行一次。该算法的成本是外部输入的大小乘以内部输入的大小。当连接的外部输入较小且内部输入在连接键上有索引时，嵌套循环连接更合适。当内部输入可能很大、存在支持索引且只有少数行满足连接谓词（这也意味着外部输入中只有少数行会被搜索）时，嵌套循环连接尤其有效。


    #### 合并连接


    合并连接要求连接谓词上有一个等号运算符，并且其输入已按此谓词排序。在此连接算法中，两个输入都只执行一次，因此其成本是读取两个输入的成本之和。如果输入尚未排序，查询处理器不太可能选择合并连接，尽管根据估计成本，可能存在它决定对一个甚至两个输入进行排序的情况。合并连接算法的工作原理是同时读取并比较来自每个输入的一行，返回匹配的行，直到其中一个或两个表处理完毕。


    #### 哈希连接


    与合并连接类似，哈希连接要求连接谓词带有等号运算符，并且两个输入都只执行一次。然而，与合并连接不同的是，它不要求其输入已排序。哈希连接的工作原理是在内存中创建一个哈希表，称为生成输入。第二个表，称为探测输入，将被读取并与哈希表进行比较，返回匹配的行。哈希连接可能出现的一个性能问题是，对哈希表所需内存的估计不准，这种情况下可能分配的内存不足，并可能要求
    SQL Server 在 `tempdb` 中使用工作文件。查询优化器很可能为大型输入选择哈希连接。与合并连接一样，哈希连接的成本是读取两个输入的成本之和。


    ### 并行性


    并行性是 SQL Server 使用的一种机制，用于在多个不同的处理器上同时执行查询的部分内容，然后在最后组合输出以获得正确的结果。为了使查询处理器考虑并行计划，SQL
    Server 实例必须能够访问至少两个处理器或核心，或者超线程配置，并且关联掩码和最大并行度配置选项都必须允许使用至少两个处理器。


    `最大并行度` 高级配置选项可用于限制并行计划中可以使用的处理器数量。默认值 0 允许所有可用的处理器用于并行性。另一方面，`关联掩码` 配置选项指示哪些处理器有资格运行
    SQL Server 线程。默认值 0 表示可以使用所有处理器。SQL Server 只会考虑那些其串行计划估计成本超过配置的 `并行性成本阈值` 的查询的并行计划，后者的默认值为
    5。这基本上意味着，如果您拥有适当的硬件，SQL Server 的默认配置值将允许并行性，无需额外更改。


    SQL Server 中的并行性由并行运算符（也称为交换运算符）实现，它实现了 `分发流`、`收集流` 和 `重分区流` 逻辑操作。


    SQL Server 中的并行性通过将一个任务拆分到同一运算符的两个或多个实例来工作，每个实例在自己的调度器上运行。例如，如果需要查询计算一个小表中的记录数，单个流聚合运算符可能就足以执行该任务。但如果需要查询计算一个非常大的表中的记录数，SQL
    Server 可能使用两个或多个流聚合运算符，它们将并行运行，每个运算符被分配计算表中一部分的记录数。每个流聚合运算符将执行部分工作，并在不同的调度器上运行。


    ```sql

    -- 示例：可能生成并行计划的简单查询

    SELECT COUNT(*) FROM VeryLargeTable;

    ```

    '
- fmt: '### Updates


    Update operations in SQL Server also need to be optimized so they can be executed
    as quickly as possible and are sometimes more complicated than `SELECT` queries
    as they not only need to find the data to update but may also need to update existing
    indexes, execute triggers, and reinforce existing referential integrity or check
    constraints.

    Update operations are performed in two steps, which can be summarized as a read
    section followed by the requested update section. The first step determines which
    records will be updated and the details of the changes to apply and will read
    the data to be updated just like any other `SELECT` statement. For `INSERT` statements,
    this includes the values to be inserted, and for `DELETE` statements, the keys
    of the records to be deleted, which could be the clustering keys for clustered
    indexes or the RIDs for heaps. For `UPDATE` statements, a combination of both
    the keys of the records to be updated and the values to be updated is needed.
    In the second step, the update operations are performed, including updating indexes,
    validating constraints, and executing triggers, if required. The update operation
    will fail and roll back if it violates any constraint.


    ## Memory Grants


    Although every query submitted to SQL Server requires some memory, sorting and
    hashing operations require significant larger amounts of memory, which, in some
    cases, can contribute to performance problems. Different from the buffer cache,
    which keeps data pages in memory, a memory grant is a part of the server memory
    used to store temporary row data while a query is performing sorting and hashing
    operations, and it is only required for the duration of the query. This memory
    is required to store the rows to be sorted or to build the hash tables used by
    hash join and hash aggregate operators. In rare cases, a memory grant may also
    be required for parallel query plans with multiple range scans.

    The memory required by a query is estimated by the query optimizer when the execution
    plan is assembled, and it is based on the estimated number of rows and the row
    size in addition to the kind of operation required, such as a sort, a hash join,
    or a hash aggregate. Although this process usually works fine, in some cases,
    some performance problem may occur:


    1.  A system running multiple queries requiring sorting or hashing operations
    may not have enough memory available, requiring one or more queries to wait.

    2.  A plan underestimating the required memory could lead to additional data processing
    or to the query operator to use disk (spilling).


    In the first case, SQL Server estimated the minimum memory needed to run the query,
    called required memory, but since there is not enough memory in the system, the
    query will have to wait until this memory is available. You can get information
    about the queries that have acquired a memory grant or that still require a memory
    grant to execute by looking at the `sys.dm_exec_query_memory_grants` DMV. For
    example, the following code will show queries waiting for a memory grant:


    ```sql

    SELECT * FROM sys.dm_exec_query_memory_grants WHERE grant_time IS NULL

    ```


    In the second case , usually due to bad cardinality estimations, the query optimizer
    may have underestimated the amount of memory required for the query and the sort
    operations, or the build inputs of the hash operations do not fit into the available
    memory. You can use the `sort_warning`, `hash_warning`, and `exchange_spill` extended
    events (or the Sort Warning, Hash Warning, and Exchange Spill trace event classes)
    to monitor the cases where these performance problems may be happening in your
    database.

    The resource semaphore process is responsible for reserving and allocating memory
    to incoming queries. When enough memory is available in the system, the resource
    semaphore will grant the requested memory to queries in a first-in, first-out
    (FIFO) basis so they can start execution. If not enough memory is available, the
    resource semaphore will place the current query in a waiting queue. As memory
    becomes available, the resource semaphore will wake up queries in the waiting
    queue and will grant the requested memory so they can start executing. Additional
    information about the resource semaphore can be shown using the `sys.dm_exec_query_resource_semaphores`,
    which, in addition to the regular resource semaphore described here, describes
    a small-query resource semaphore. The small-query resource semaphore takes care
    of queries that requested memory grant less than 5 MB and query cost less than
    three cost units. The small-query resource semaphore helps improve response time
    for small queries that are expected to execute very fast.

    Memory-related waits can be detected with the `RESOURCE_SEMAPHORE` wait type,
    which indicates that a query memory request cannot be granted immediately because
    of other concurrent queries. Monitor this wait to detect excessive number of concurrent
    queries or excessive memory request amount. You can use the following query to
    see such information:


    ```sql

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''RESOURCE_SEMAPHORE''

    ```


    Note


    Related wait type `RESOURCE_SEMAPHORE_QUERY_COMPILE` indicates excessive concurrent
    query compiles. `RESOURCE_SEMAPHORE_MUTEX` shows waits for a thread reservation
    when running a query, but it also occurs when synchronizing query compile and
    memory grant requests. More details on waits will be covered in Chapter 5.


    Finally, the memory grant feedback, a feature introduced with SQL Server 2017,
    was designed to help with these situations by recalculating the memory required
    by a query and updating it in the cached query plan. The memory grant feedback
    comes in two flavors, batch mode and row mode , and it is covered in more detail
    in Chapter 10.'
