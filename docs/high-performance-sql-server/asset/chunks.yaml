- fmt: '# 1. How SQL Server Works


    SQL Server default configuration allows you to run noncritical applications with
    little knowledge or administrative effort. This is especially true for applications
    running the lower Stock Keeping Units (SKUs) of the product such as SQL Server
    Express edition. However, for most production applications, you need to follow
    a database implementation cycle consisting of four steps: design, configuring,
    monitoring, and troubleshooting. This is extremely important for mission-critical
    applications where areas such as performance, availability, or security are an
    essential requirement. I want to emphasize that this is a cycle as well. Once
    these four steps are successfully completed and the application goes live, it
    does not end there. Monitoring is vitally important. As the workload, database,
    or application changes—or even during regular activity—problems will arise that
    may require a new thinking, design, and configuration, going back to the aforementioned
    cycle again. This book focuses on performance and will guide you through all the
    four areas, giving you the tools and knowledge required to get the best performance
    out of your databases.


    Before getting into the four areas, this introductory chapter explains how the
    SQL Server database engine works and covers everything that happens in the system
    from the moment a client makes a connection using the Tabular Data Stream (TDS)
    protocol over a network protocol until a query is executed and the results are
    returned to the client. Although so many things could happen in the middle and
    may require an entire book to cover it, I focus on the work performed by `SQLOS`,
    the relational engine, which consists of the query optimizer and the execution
    engine, and other important performance-related factors like memory grants, lock,
    and latches. The content of this chapter is the foundation for the rest of the
    book.


    This book does not explicitly cover query tuning and optimization, so you don’t
    have to be an advanced query writer or understand execution plans to use it. This
    book can help database administrators, architects, and database developers to
    better understand how SQL Server works and what to do to fix performance problems.
    For information on query tuning and optimization, you can refer to my book *Microsoft
    SQL Server 2014 Query Tuning & Optimization* (McGraw-Hill Education, 2015).


    ## TDS/Network Protocols


    SQL Server is a client-server platform in which a client usually establishes a
    long-lived connection with the database server using the Tabular Data Stream (TDS)
    protocol over a network protocol. `TDS` is an application-level protocol that
    facilitates the interaction between clients and SQL Server. Sybase Inc. initially
    designed and developed it for their Sybase SQL Server relational database engine
    in 1984, which later became a Microsoft product. Although the `TDS` specification
    does not define a specific network transport protocol, the current version of
    `TDS` has been implemented over the `TCP/IP` and `Named Pipes` network transport
    protocols. The Virtual Interface Architecture (`VIA`) network protocol was deprecated
    but still available on older versions of SQL Server. It was finally removed with
    SQL Server 2016.


    **Note**

    You can also use the `Shared Memory` protocol to connect to an instance of SQL
    Server, but it can only be used to connect from the same computer where the database
    engine is running; it cannot be used for access from other computers on the network.


    `TDS` provides several functions including authentication and identification,
    channel encryption negotiation, specification of requests in SQL and bulk insert
    operations, invocation of a stored procedure or user-defined function, and the
    return of data. Open Database Connectivity (`ODBC`), Java Database Connectivity
    (`JDBC`), and Object Linking and Embedding Database (`OLE DB`) are libraries that
    use `TDS` to transfer data between the client and SQL Server. `TDS` requests and
    responses between a client and SQL Server can be inspected by using different
    network protocol analyzer tools such as `Wireshark`. Another popular tool, Microsoft
    Message Analyzer (`MMA`), was retired as of November of 2019.


    A SQL Server client can use `TDS` to execute the following request types when
    communicating with the database server:


    *   SQL Batch: To send a SQL statement or a batch of SQL statements

    *   Remote procedure call: To send a remote procedure call containing the stored
    procedure or user-defined function name, options, and parameters

    *   Bulk load: To send a SQL statement for a bulk insert/bulk load operation


    Note that a stored procedure or user-defined function name can be requested through
    either a remote procedure call or a SQL batch. For more details about `TDS`, you
    can find the `TDS` specification at [`https://msdn.microsoft.com/en-us/library/dd304523.aspx`](https://msdn.microsoft.com/en-us/library/dd304523.aspx).


    `TCP/IP` is by far the most common protocol used by SQL Server implementations.
    The default `TCP/IP` port used by the database engine is `1433`, although other
    ports can be configured and are in some cases required, for example, when running
    multiple instances on the same server. Some other services may use a different
    port. For example, the SQL Server Browser starts and claims UDP port `1434`. When
    the SQL Server database engine uses a `TCP/IP` port different from the default,
    the port number has to either be specified in the connection string at the client
    or it can be resolved by the SQL Server Browser service, if enabled. The default
    pipe, `\sql\query`, is used when `Named Pipes` protocol is configured.


    A client can use the following application programming interfaces (APIs) or libraries
    to connect to a SQL Server instance:


    *   `ODBC`: `ODBC` (Open Database Connectivity) is an open standard API based
    on the Call-Level Interface (`CLI`) specifications originally developed by Microsoft
    during the early 1990s. `ODBC` has become the de facto standard for data access
    in both relational and nonrelational database management systems.

    *   `OLE DB`: `OLE DB` (Object Linking and Embedding Database) is an API designed
    by Microsoft for accessing not only SQL-based databases but also some other different
    data sources in a uniform matter. Even though `OLE DB` was originally intended
    as a higher-level replacement for and successor to `ODBC`, `ODBC` remains the
    most widely used standard for database access.

    *   `JDBC`: `JDBC` (Java Database Connectivity) is an API developed by Sun Microsystems
    that defines how a client can access a relational database from the Java programming
    language. `JDBC` is part of the Java standard edition platform, which has since
    been acquired by Oracle Corporation.

    *   `ADO.NET`: `ADO.NET` (ActiveX Data Objects for .NET) is a set of classes that
    expose data access services and is an integral part of the Microsoft .NET framework.
    `ADO.NET` is commonly used to access data stored in relational database systems
    though it can access nonrelational sources as well.


    ## How Work Is Performed


    Now that we have seen how a client connects to the database server, we can review
    what happens next and see how the work requested by the client is performed. In
    SQL Server, each user request is an operating system thread, and when a client
    connects, it is assigned to a specific scheduler. Schedulers are handled at the
    `SQLOS` level, which also handles tasks and workers, among other functions. Moving
    a level higher, we have connections, sessions, and requests. Let’s review schedulers,
    tasks, and workers by first introducing `SQLOS`.'
