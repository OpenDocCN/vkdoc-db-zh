    之前的代码适用于 SQL Server 2012 及更高版本。对于早于 SQL Server 2012 的版本，您可以使用以下代码，因为当时环形缓冲区的名称是
    `RING_BUFFER_ALLOC_TRACE`，并且该脚本还需要一些其他小改动：


    ```sql

    DECLARE @ts_now bigint;

    SELECT @ts_now=cpu_ticks/(cpu_ticks/ms_ticks)

    FROM sys.dm_os_sys_info;

    SELECT record_id,

    DATEADD(ms, -1 * (@ts_now - [timestamp]), GETDATE()) as event_time,

    CASE

    WHEN event = 0 THEN ''分配缓存初始化''

    WHEN event = 1 THEN ''分配缓存添加条目''

    WHEN event = 2 THEN ''分配缓存移除条目''

    WHEN event = 3 THEN ''分配缓存重新初始化''

    WHEN event = 4 THEN ''分配缓存释放''

    WHEN event = 5 THEN ''截断分配单元''

    WHEN event = 10 THEN ''PFS 分配页''

    WHEN event = 11 THEN ''PFS 释放页''

    WHEN event = 20 THEN ''IAM 置位''

    WHEN event = 21 THEN ''IAM 清位''

    WHEN event = 22 THEN ''GAM 置位''

    WHEN event = 23 THEN ''GAM 清位''

    WHEN event = 24 THEN ''SGAM 置位''

    WHEN event = 25 THEN ''SGAM 清位''

    WHEN event = 26 THEN ''SGAM 置位 NX''

    WHEN event = 27 THEN ''SGAM 清位 NX''

    WHEN event = 28 THEN ''GAM 清除区''

    WHEN event = 40 THEN ''格式化 IAM 页''

    WHEN event = 41 THEN ''格式化页''

    WHEN event = 42 THEN ''重新分配 IAM 页''

    WHEN event = 50 THEN ''工作表缓存添加 IAM''

    WHEN event = 51 THEN ''工作表缓存添加页''

    WHEN event = 52 THEN ''工作表缓存移除 IAM''

    WHEN event = 53 THEN ''工作表缓存移除页''

    WHEN event = 61 THEN ''IAM 缓存销毁''

    WHEN event = 62 THEN ''IAM 缓存添加页''

    WHEN event = 63 THEN ''IAM 缓存请求刷新''

    ELSE ''未知事件''

    END as event_name,

    session_id as s_id,

    page_id,

    allocation_unit_id as au_id

    FROM

    (

    SELECT

    xml:record.value(''(./Record/@id)[1]'', ''int'') AS record_id,

    xml:record.value(''(./Record/ALLOC/Event)[1]'', ''int'') AS event,

    xml:record.value(''(./Record/ALLOC/SpId)[1]'', ''int'') AS session_id,

    xml:record.value(''(./Record/ALLOC/PageId)[1]'', ''varchar(100)'') AS page_id,

    xml:record.value(''(./Record/ALLOC/AuId)[1]'', ''varchar(100)'') AS allocation_unit_id,

    timestamp

    FROM

    (

    SELECT timestamp, convert(xml, record) as xml:record

    FROM sys.dm_os_ring_buffers

    WHERE ring_buffer_type = N''RING_BUFFER_ALLOC_TRACE''

    ) AS the_record

    ) AS ring_buffer_record

    -- WHERE session_id = 52

    ORDER BY record_id

    ```


    ## 使用扩展事件进行监控


    除了前面介绍的 DMV 和视图外，您还可以使用扩展事件来捕获和监控与分配页上的闩锁争用相关的事件。跟踪事件的一个明显好处是，您不必在问题发生的那一刻进行观察，因为信息可以收集起来供您稍后查看。以下事件可用：


    *   `latch_suspend_begin`：当执行任务必须挂起以等待闩锁以请求的模式变为可用时发生。

    *   `latch_suspend_end`：当执行任务在等待闩锁后恢复时发生。

    *   `latch_suspend_warning`：当等待闩锁超时时发生，可能导致性能问题。


    捕获这些事件时，您可以看到的一些有趣字段如下：


    *   `address`：闩锁所在的内存地址。

    *   `database_id`：闩锁保护的页的数据库 ID。

    *   `duration`：请求者为等待闩锁花费的微秒数（在 `latch_suspend_begin` 上不可用）。

    *   `file_id`：闩锁保护的页的文件 ID。

    *   `is_superlatch`：指示闩锁是否为超级闩锁。

    *   `mode`：闩锁请求的模式。

    *   `page_id`：闩锁保护的页的页 ID。


    例如，以下代码创建了一个与闩锁相关的扩展事件会话。请注意，我们筛选了 `database_id` 为 2 且 `page_id` 为 1 和 3 的情况。


    ```sql

    CREATE EVENT SESSION [test] ON SERVER

    ADD EVENT sqlserver.latch_suspend_begin (

    WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

    ),

    ADD EVENT sqlserver.latch_suspend_end (

    WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

    ),

    ADD EVENT sqlserver.latch_suspend_warning (

    WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

    )

    GO

    ```


    会话创建后，您可以通过运行以下代码来启动它：


    ```sql

    ALTER EVENT SESSION [test] ON SERVER

    STATE = START

    GO

    ```


    以下是一个捕获到的 `latch_suspend_end` 数据事件样本，显示了争用情况。您可以使用“实时监视数据”功能轻松查看事件（在 SQL Server
    Management Studio 中，查看“管理”文件夹 ➤ “扩展事件” ➤ “会话”，右键单击您的活动会话，然后选择“实时监视数据”）。


    | `address` | 513679079488 |

    | --- | --- |

    | `database_id` | 2 |

    | `duration` | 42990 |

    | `file_id` | 1 |

    | `is_superlatch` | False |

    | `mode` | UP |

    | `page_id` | 1 |


    最后，不要忘记关闭并删除会话以完成此练习：


    ```sql

    ALTER EVENT SESSION [test] ON SERVER

    STATE = STOP

    GO

    DROP EVENT SESSION [test] ON SERVER

    GO

    ```


    ## DDL 争用


    值得澄清的是，本节讨论的分配页争用有时被称为 DML 争用，因为它主要是由于对临时表的 `INSERT`、`UPDATE` 和 `DELETE` 操作引起的。这不同于，例如，DDL
    争用，后者也可能发生在 `tempdb` 中，但肯定比 DML 争用少见，并且涉及记录用户创建对象信息所需的系统目录上的争用。要查看 `tempdb` 中是否有
    DDL 争用，您可以使用前面描述的与 DML 争用相同的方法，但是，您可能看到的是属于系统目录表的页上的争用，而不是分配页上的争用。不幸的是，解决 DDL
    争用需要最小化在 `tempdb` 中创建和删除的用户对象数量。

    '
- fmt: '## tempdb Spill Warnings


    Although every query in SQL Server requires some memory to perform its work, some
    query operations, like hash, sort, and exchange, may require significantly larger
    amounts of memory, depending on the amount of data they need to process. This
    memory is required to store the rows to be sorted or to build the hash tables
    used by hash join and hash aggregate operators. In some cases, a memory grant
    may also be required for parallel query plans with multiple range scans. The query
    optimizer usually does a good job estimating how much memory will be required,
    and if the memory is available, it will be provided to the operator at execution
    time.


    However, as mentioned in Chapter [1](#393702_2_En_1_Chapter.xhtml), hash, sort,
    and parallelism or exchange operators can create performance problems in the cases
    when not enough memory is allocated and they are instead forced to do additional
    data processing or to use the `tempdb` database (spilling to disk). These problems
    are usually due to bad cardinality estimations where the query optimizer may underestimate
    the amount of memory required for the query. Since the query may be granted less
    memory than needed, the sort operations or the build input of the hash operations
    may not fit into this available memory. Once the query is executing, it has to
    continue despite not having enough memory to run.


    You can use the `sort_warning`, `hash_warning`, and `exchange_spill` extended
    events (or the `Sort Warning`, `Hash Warning`, and `Exchange Spill` trace event
    classes) to monitor the cases where these performance problems may be happening
    in your system. Starting with SQL Server 2016, you can also use the Live Query
    Statistics feature, explained in Chapter [6](#393702_2_En_6_Chapter.xhtml), which
    may help to take a look at these performance problems in real time too, as these
    operations can take a huge part of the query execution.


    In addition to the performance problems, as accessing disk is several times slower
    than memory, there might be disk space problems as these operations may use a
    large amount of space to create internal objects on `tempdb`. I’ve seen problem
    queries writing dozens or hundreds of GBs of data to `tempdb` on this scenario.
    We will discuss more on how to monitor how much disk space is used in `tempdb`
    in the next section.


    Since the main reason for this problem is that the query optimizer underestimates
    the required memory, the best plan of action to fix it is to make sure statistics
    do exist and are up to date. Additional recommendations will be given depending
    on the problem, as shown in the next three sections.


    ### Sort Warning


    Sort warnings are created by queries requiring sorts, for example, when using
    the `ORDER BY` clause. The `sort_warning` extended event provides additional data
    to troubleshoot this problem, which includes the actual number of sorted rows,
    granted memory, used memory, and the number of pages read from and written to
    the worktable. You should pay special attention to the `sort_warning_type` column,
    which shows whether a single additional pass or multiple passes were required
    to obtain the sorted output. This warning type information is also available on
    the `Sort Warning` trace event using the `EventSubClass` column. The event also
    includes the column `query_operation_node_id`, which you can use to identify which
    operator is causing the `tempdb` spill, or you can also look at an execution plan
    to look for a warning on a sort operator or a `SpillToTempDb` property. A typical
    solution to avoid sort warnings is to add a proper index to the query. More details
    about indexes will be covered in Chapter [9](#393702_2_En_9_Chapter.xhtml).


    ### Hash Warning


    Hash warnings are created when hash joins do not have enough memory to create
    their hash table. A hash join works by creating a hash table in memory called
    the build input. The second input of the join, called the probe input, will be
    read and compared to the hash table, returning the rows that match. The query
    optimizer will select the smaller of both join tables as the build input and will
    usually correctly estimate how much memory is required for its hash table. The
    query processor can even reverse those roles at execution time if the estimation
    was incorrect, choosing the new smaller input as the build input.


    But there might still be performance problems when there is a bad estimation of
    the memory required for this hash table. Since the query might not have enough
    memory allocated, it may require SQL Server to use a workfile in `tempdb`.


    When the build input does not fit into the available memory, SQL Server first
    has to split its rows into several partitions, which are processed separately.
    If any of those partitions still do not fit into the available memory, they are
    split into subpartitions, which are again processed separately. This splitting
    process will continue until each partition fits into the available memory or until
    the maximum recursion level is reached. The maximum recursion level is shown on
    the `recursion_level` column of the event (or the `IntegerData` column on SQL
    trace) and corresponds to the number of times the build input was subpartitioned.
    This entire process is called hash recursion.


    When hash recursion has reached the maximum recursion level, the query processor
    will try instead a different process called hash bailout to process the remaining
    data. SQL Server will show if hash recursion or hash bailout was used during execution
    on the `hash_warning_type` event column (or the `EventSubClass` column in a `Hash
    Warning` trace event).


    Similar to the sort warning discussed earlier, the `hash_warning` extended event
    provides additional troubleshooting data like including the actual number of uniquely
    hashed rows, granted memory, used memory, and the number of pages read from and
    written to the worktable.


    To avoid hash warning problems, in addition to the general recommendation about
    statistics mentioned earlier, you can try using a different join type. Or, if
    you have limited memory on the server, increase the memory available. Using a
    different join type may require using a query hint and should be carefully tested
    to verify that, in fact, it improves the performance of a query.


    ### Exchange Warning


    Finally, the exchange warning, which is less common than the other two, occurs
    when the communication buffers in a parallel plan have been temporarily written
    to the `tempdb` database. As discussed in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    the exchange operator is responsible for implementing parallelism in SQL Server
    by using multiple processors simultaneously to execute a query. The exchange warning
    problem only occurs in cases when you have multiple ordered range scans. In this
    case, you may try to avoid using the `ORDER BY` clause, try to avoid the multiple
    range scans, try to use an index hint to access the tables in a different way,
    or even go to the extreme of avoiding parallel plans, for example, by using the
    `MAXDOP` query hint.'
