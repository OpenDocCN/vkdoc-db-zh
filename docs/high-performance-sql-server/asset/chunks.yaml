  trans: '

    要再次禁用查询存储，您可以使用 SQL Server Management Studio 并在“操作模式（请求）”中选择“关闭”，或者使用以下语句：


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE = OFF

    ```


    除了 `MAX_STORAGE_SIZE_MB` 外，查询存储中还可以配置以下选项：


    1.  `OPERATION_MODE`：更新查询存储的操作模式，可为 `OFF`、`READ_ONLY` 和 `READ_WRITE`。如前所述，查询存储的状态可以通过目录视图
    `sys.database_query_store_options` 中的 `desired_state_desc` 和 `actual_state_desc`
    查看。查询存储禁用时为 `OFF`，启用时为 `READ_ONLY` 和 `READ_WRITE`。查询存储启用后，通常处于 `READ_WRITE` 状态。如前文所述，如果存在磁盘空间问题，或者您手动更改操作模式，查询存储可能会自动进入
    `READ_ONLY` 状态。


    2.  `MAX_PLANS_PER_QUERY`：指示为每个查询维护的最大计划数，默认值为 200。查询存储使您能够探索特定查询在生产工作负载中可能创建了多少个不同的执行计划，这在以前是不可能的，除非使用像
    Picasso Database Query Optimizer Visualizer 这样的第三方工具。


    3.  `INTERVAL_LENGTH_MINUTES`：定义将运行时执行统计信息数据聚合到查询存储中的时间间隔，默认值为 60 分钟。存储每一次查询执行是不现实的，因为有些查询可能在短时间内执行数千或数百万次。查询存储将按指定的时间间隔为每个查询存储一行，其中包含聚合的运行时统计信息。例如，如果一个查询在一小时内执行了
    2000 次，目录视图 `sys.query_store_runtime_stats` 中的间隔将显示 2000 次 `count_executions`，但所有这些执行的性能数据将被聚合。使用较小的值在需要更精细粒度时可能有用，但也会占用更多磁盘空间。


    4.  `CLEANUP_POLICY`：定义查询存储的数据保留策略。目前，唯一可能的值是 `STALE_QUERY_THRESHOLD_DAYS`，它指定查询信息在查询存储中保留的天数。如本节开头
    `ALTER DATABASE` 语句所示，其默认值为 367 天。此配置值也会影响查询存储所需的磁盘空间，对于某些工作负载而言 367 天可能过高，因此您可能需要将其配置为较低的值。


    5.  `DATA_FLUSH_INTERVAL_SECONDS`：定义将写入查询存储的数据持久化到磁盘的频率。其默认值为 900 秒或 15 分钟。如架构部分所示，查询存储收集的数据是立即可用的，但出于性能考虑，它们只是异步写入磁盘。


    最后，查询存储还具有用于定义查询捕获和清理策略的配置选项。定义查询捕获策略可以通过 `QUERY_CAPTURE_MODE` 完成，其值为 `ALL`、`AUTO`
    和 `NONE`，描述如下：


    1.  `ALL`：定义捕获所有查询。这是默认值。


    2.  `AUTO`：指示仅根据执行次数和资源消耗捕获相关查询。使用此选项时，编译和执行时间短且执行频率低的查询不会被收集。频率、编译和执行时间的阈值是内部确定的，无法手动配置。


    3.  `NONE`：请求查询存储停止捕获新查询。使用此配置选项时，查询存储将仅收集已捕获查询的编译和运行时统计信息。应谨慎使用此配置，因为会错过新查询的重要信息。


    清理策略使用 `SIZE_BASED_CLEANUP_MODE` 配置选项定义，其值为 `OFF`（默认值）和 `AUTO`。`OFF` 表示策略已禁用，不会自动删除数据。如果定义了
    `AUTO` 值，当磁盘大小达到 `MAX_STORAGE_SIZE` 中定义值的 90% 时，策略将自动激活。清理策略首先删除最不常用和最旧的查询，并在达到
    `MAX_STORAGE_SIZE` 定义的磁盘空间约 80% 时停止。

    '
- fmt: '## Using the Query Store


    In the previous section, we saw how to enable and configure the Query Store. Let’s
    now see it in action running some queries. In our examples, we can examine the
    data immediately as soon it is collected. In a production environment, however,
    you may want to wait some time until a representative workload is collected, which
    would depend on your application and could be, for example, an entire day or a
    week. Let’s test it with one of my favorite queries on the `AdventureWorks2017`
    database, which has the advantage that it is extremely simple and, in this case,
    can show parameter-sensitive problems. Create the following stored procedure:


    ```sql

    CREATE PROCEDURE test (@pid int)

    AS

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = @pid

    ```


    > **Note**

    >

    > Keep in mind that this is a simplified exercise to show how the Query Store
    works. You could certainly solve problems with parameter-sensitive queries using
    some other techniques, but it would take a lot more effort to simulate a plan
    regression in a small database like `AdventureWorks2017`. And, yes, the Query
    Store could also be used to find parameter-sensitive queries (or more commonly
    known as queries with parameter sniffing–related problems).


    Depending on the values provided to the procedure, two possible execution plans
    could be created. This is equivalent to the Picasso diagram in Figure [6-1](#393702_2_En_6_Chapter.xhtml#Fig1),
    showing only two colors. Executing the stored procedure with `ProductID` `898`
    will create a plan with index seek and key lookup operators, and using a value
    of `870` will instead select a table scan. In both cases, the created plan will
    be adequate for the provided parameters. Trying any other possible value will
    still create any of these two plans, assuming a new optimization is required and
    performed. But as a parameter-sensitive query or procedure, performance problems
    may occur when reusing an existing plan that may not be adequate for the provided
    parameter.


    For example, running the procedure for `ProductID` `898` with a plan that uses
    a table scan may cause a bit of a performance problem as the entire table has
    to be scanned to return only nine rows. But the highest performance problem will
    happen when the `ProductID` `870` is used with the index seek/key lookup plan
    as it performs 14,000 logical reads for a table that can be scanned with only
    1200 reads. The reason for the performance problem is that the index seek/key
    lookup combination is very expensive and is only a good solution when a small
    number of rows are returned. Let’s create that scenario and see if the Query Store
    can detect that performance problem. First, run `SET STATISTICS IO ON` to enable
    SQL Server to display information regarding the amount of disk activity generated
    by our queries, and `ALTER DATABASE SET QUERY_STORE CLEAR ALL` to clear any information
    currently stored by the Query Store. Run the following statements:


    ```sql

    SET STATISTICS IO ON

    GO

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    ```


    Run the first query to create a table scan plan. You can optionally visualize
    the plan in SQL Server Management Studio by selecting Include Actual Execution
    Plan.


    ```sql

    EXEC test @pid = 870

    ```


    Running the previous statement will show 1248 logical reads, which you can see
    on the Messages tab (you may have small variations on this value depending on
    a few factors). If you later try the following query, it will reuse the table
    scan plan, so it will have the same number of logical reads (assuming the plan
    has not been removed from the plan cache):


    ```sql

    EXEC test @pid = 898

    ```


    In fact, any parameter used will use the same plan and the performance will be
    the same. At least in this case, the performance is stable and consistent, although
    probably not a perfect solution for the latest case, which has to scan the entire
    table to return only nine rows.


    But a higher performance variation will occur with the plan using the index seek
    and key lookup operators. Let’s suppose that the current plan is evicted from
    the plan cache and that the next execution uses the `ProductID` `898`, creating
    a new optimization and a new plan. To simulate that, we will use the `DBCC FREEPROCCACHE`
    statement, which, although not the best method to accomplish this, is a simple
    way to do it so we can focus on our main point. Run the following query:


    ```sql

    DBCC FREEPROCCACHE

    GO

    EXEC test @pid = 898

    GO

    EXEC test @pid = 870

    ```


    > **Note**

    >

    > `DBCC FREEPROCCACHE` will remove all the plans from the entire plan cache, so
    be careful not to run such a statement on a production environment.


    Logical reads for these executions were 29 (to obtain nine rows) and 14,077 (to
    obtain 4688 rows), respectively. 14,077 is a huge number for a table in which
    a table scan operation only takes 1266 logical reads as shown earlier. This time,
    the execution time is not stable, and it will depend on the parameter supplied
    and, more exactly, on the number of index seeks/key lookups required. In other
    words, a plan using a table scan will always have the same performance, depending
    on the number of pages in the table. But the plan with index seeks/key lookups
    will depend on the number of rows read, so it can range from very cheap to very
    expensive.


    Making sure you executed the previous queries, we can now run this query to display
    some of the information collected by the Query Store:


    ```sql

    SELECT rs.avg_logical_io_reads, qt.query_sql_text,

    q.query_id, qt.query_text_id, p.plan_id, rs.runtime_stats_id,

    rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    JOIN sys.query_store_runtime_stats_interval AS rsi

    ON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id

    ```


    We get the following output; only the required rows are displayed:


    | `avg_logical_io_reads` | `1249` | `7054` |

    | --- | --- | --- |

    | `query_sql_text` | (@pid int)SELECT * FROM | (@pid int)SELECT * FROM |

    | `query_id` | 1 | 1 |

    | `query_text_id` | 1 | 1 |

    | `plan_id` | 1 | 2 |

    | `runtime_stats_id` | 1 | 2 |

    | `avg_rowcount` | 2348.5 | 2348.5 |

    | `count_executions` | 2 | 2 |


    This shows that for `plan_id` 1, the one with the table scan, the average logical
    IO reads was 1249 as the entire table has 1249 pages. For `plan_id` 2, the plan
    with the index seek and key lookup operators, the average was 7054, which is roughly
    29 plus 14,077 divided by 2, as there were two executions.


    SQL Server Management Studio can also show you this and other Query Store information.
    Right-click Regressed Queries on the Query Store folder under the database and
    select View Regressed Queries. The report will give you the choice to select CPU
    Time (us), Duration (us), Logical Reads, Logical Writes, Memory Consumption (KB),
    and Physical Reads. Click "View regressed queries in a grid format with additional
    details." Figure [6-5](#393702_2_En_6_Chapter.xhtml#Fig5) shows the report with
    logical reads.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig5_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig5_HTML.jpg)


    Figure 6-5: Top 25 regressed queries sorted by logical reads


    Click the query we are interested in. (You may have different `query_id` even
    if you have followed the same steps here.) You would see a screen similar to Figure
    [6-6](#393702_2_En_6_Chapter.xhtml#Fig6) on the top-right pane that shows both
    plans, represented by two small circles. Clicking a circle will show runtime information
    for each plan, and the graphical plan will be displayed at the bottom pane (not
    shown in Figure [6-6](#393702_2_En_6_Chapter.xhtml#Fig6)).


    > **Note**'
