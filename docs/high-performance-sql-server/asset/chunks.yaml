- fmt: '### Kernel Settings


    对于那些在 Unix 世界（例如 Oracle）中使用过其他数据库的人来说，需要配置内核设置应该不会令人惊讶。在本节中，我将讨论 Microsoft 为 Linux
    环境推荐的 CPU 和磁盘内核设置。您可能还想查阅您的 Linux 发行版文档，了解如何执行这些配置。在本节中，我将介绍 Red Hat Enterprise
    Linux 的基础知识。


    在 Red Hat Enterprise Linux 中，您还可以使用性能调优配置文件。Linux 提供了预定义的调优配置文件，我们也可以创建自己的配置文件，接下来我们将这样做。为此，我们将使用
    `tuned-adm` 工具。


    首先，我们可以使用 `tuned-adm` 获取系统中可用调优配置文件的列表：


    ```bash

    # tuned-adm list

    Available profiles:

    - accelerator-performance     - Throughput performance based tuning with disabled
    higher latency STOP states

    - balanced                    - General non-specialized tuned profile

    - desktop                     - Optimize for the desktop use-case

    - hpc-compute                 - Optimize for HPC compute workloads

    - intel-sst                   - Configure for Intel Speed Select Base Frequency

    - latency-performance         - Optimize for deterministic performance at the
    cost of increased power consumption

    - network-latency             - Optimize for deterministic performance at the
    cost of increased power consumption, focused on low latency network performance

    - network-throughput          - Optimize for streaming network throughput, generally
    only necessary on older CPUs or 40G+ networks

    - powersave                   - Optimize for low power consumption

    - throughput-performance      - Broadly applicable tuning that provides excellent
    performance across a variety of common server workloads

    - virtual-guest               - Optimize for running inside a virtual guest

    - virtual-host                - Optimize for running KVM guests

    Current active profile: virtual-guest

    ```


    以下命令显示当前活动的调优配置文件（在前面的示例中也显示过）：


    ```bash

    # tuned-adm active

    Current active profile: virtual-guest

    ```


    最初，当适用于 Linux 的 SQL Server 刚刚随 2017 版本发布时，Microsoft 推荐使用 `throughput-performance`
    配置文件。如果您仍然需要此配置文件，可以使用以下命令启用它：


    ```bash

    # tuned-adm profile  throughput-performance

    ```


    然而，从 Red Hat Enterprise Linux 8.0 开始，Microsoft 与 Red Hat 共同开发了一个 `mssql` 配置文件，以提供针对
    SQL Server 实现的最佳性能相关调优。顺便说一句，您可以通过运行 `cat /etc/os-release` 来验证您的 Red Hat Enterprise
    Linux 系统版本。例如，我得到以下部分输出：


    ```bash

    # cat /etc/os-release

    NAME="Red Hat Enterprise Linux"

    VERSION="8.2 (Ootpa)"

    ID="rhel"

    ID_LIKE="fedora"

    VERSION_ID="8.2"

    PLATFORM_ID="platform:el8"

    PRETTY_NAME="Red Hat Enterprise Linux 8.2 (Ootpa)"

    ```


    这是由 Microsoft 和 Red Hat 提出的配置文件，您可以看到，它包含了前面提到的系统定义的 `throughput-performance`
    配置文件。配置文件定义文件中的 `include` 参数允许您在现有配置文件的基础上构建自己的 `tuned` 配置文件。


    ```ini

    #

    # A tuned configuration for SQL Server on Linux

    #

    [main]

    summary=Optimize for Microsoft SQL Server

    include=throughput-performance

    [cpu]

    force_latency=5

    [sysctl]

    vm.swappiness = 1

    vm.dirty_background_ratio = 3

    vm.dirty_ratio = 80

    vm.dirty_expire_centisecs = 500

    vm.dirty_writeback_centisecs = 100

    vm.transparent_hugepages=always

    vm.max_map_count=1600000

    net.core.rmem_default = 262144

    net.core.rmem_max = 4194304

    net.core.wmem_default = 262144

    net.core.wmem_max = 1048576

    kernel.numa_balancing=0

    kernel.sched_latency_ns = 60000000

    kernel.sched_migration_cost_ns = 500000

    kernel.sched_min_granularity_ns = 15000000

    kernel.sched_wakeup_granularity_ns = 2000000

    ```


    为了实施所提出的配置文件，请按照以下步骤操作。


    如所示创建 `mssql` 目录：


    ```bash

    # mkdir /usr/lib/tuned/mssql

    ```


    将前面展示的配置文件定义保存为 `/usr/lib/tuned/mssql` 下的 `tuned.conf` 文件。


    相应地更新权限，在本例中，以便任何人都可以执行 `tuned.conf` 文件：


    ```bash

    chmod +x /usr/lib/tuned/mssql/tuned.conf

    ```


    此时，您可以验证该配置文件是否可用。运行以下命令，仅显示部分输出：


    ```bash

    # tuned-adm list

    Available profiles:

    - mssql                       - Optimize for Microsoft SQL Server

    ```


    然后，您可以通过运行以下命令来启用该配置文件：


    ```bash

    # tuned-adm profile mssql

    ```


    最后，验证它是否已启用：


    ```bash

    # tuned-adm active

    Current active profile: mssql

    ```


    表 [3-2](#393702_2_En_3_Chapter.xhtml#Tab2) 和表 [3-3](#393702_2_En_3_Chapter.xhtml#Tab3)
    显示了 Microsoft 推荐的 CPU 和磁盘设置。您可能会注意到，其中一些值已经包含在之前创建的自定义 `mssql` 调优配置文件中。接下来让我们更详细地讨论这些设置和值。


    表 3-2


    推荐的 CPU 相关内核设置


    | Setting | Value | Details |

    | --- | --- | --- |

    | CPU frequency governor | performance | 请参阅您发行版文档中的 `cpupower` 命令 |

    | ENERGY_PERF_BIAS | performance | 请参阅您发行版文档中的 `x86_energy_perf_policy` 命令 |

    | min_perf_pct | 100 | 请参阅您关于 intel p-state 的文档 |

    | C-States | C1 only | 请参阅您的 Linux 或系统文档，了解如何确保 C-States 设置为 C1 only |


    表 3-3


    推荐的磁盘相关内核设置


    | Setting | Value | Details |

    | --- | --- | --- |

    | disk readahead | 4096 | 请参阅 `blockdev` 命令 |

    | sysctl settings | kernel.sched_min_granularity_ns = 10000000 | 请参阅 `sysctl`
    命令 |

    | kernel.sched_wakeup_granularity_ns = 15000000 |

    | vm.dirty_ratio = 40 |

    | vm.dirty_background_ratio = 10 |

    | vm.swappiness = 10 |


    表 [3-3](#393702_2_En_3_Chapter.xhtml#Tab3) 展示了 `sysctl` 命令，该命令用于在运行时配置内核参数。尽管表中列出的设置已在本节前面创建的
    `mssql` 配置文件中配置并启用，但我将向您展示此命令的工作原理。您可以使用 `sysctl` 命令查看当前的内核值，如下例所示：


    ```bash

    # sysctl kernel.sched_min_granularity_ns

    kernel.sched_min_granularity_ns = 15000000

    ```


    这将返回我们刚刚在配置文件中设置的值；您也可能会看到一个默认值。如果您想设置一个新值，可以使用


    ```bash

    # sysctl -w kernel.sched_min_granularity_ns=10000000

    kernel.sched_min_granularity_ns = 10000000

    ```


    您可以使用 `--all` 选项显示系统中当前配置的所有内核设置：


    ```bash

    # sysctl -–allsysctl

    ```


    我当前的安装返回了 942 个值。


    如表 [3-3](#393702_2_En_3_Chapter.xhtml#Tab3) 所示，您可以使用 `blockdev` 命令来设置磁盘预读（readahead）属性。让我们从获取系统中所有设备的报告开始：


    ```bash

    # blockdev --report

    RO    RA   SSZ   BSZ   StartSec            Size   Device

    rw  8192   512  4096          0     21474836480   /dev/sdb

    rw  8192   512  4096       2048     21472739328   /dev/sdb1

    rw  8192   512  4096          0     68719476736   /dev/sda

    ```


    我们现在可以使用 `--getra` 和 `--setra` 选项分别读取和设置预读值：


    ```bash

    # blockdev --getra /dev/sda


    # blockdev --setra 4096 /dev/sda

    # blockdev --report

    ```


    再次运行报告将显示 4096，如表 [3-3](#393702_2_En_3_Chapter.xhtml#Tab3) 中所推荐。


    前面创建的配置文件还在多节点 NUMA 系统上禁用了自动 NUMA 平衡。需要禁用此性能配置，因为默认情况下启用此属性。


    ```bash

    # sysctl kernel.numa_balancing

    kernel.numa_balancing = 1

    # sysctl -w kernel.numa_balancing=0

    ```'
  raw: '### Kernel Settings


    For those of us who have worked with other databases in the Unix world (e.g.,
    Oracle), the need to configure kernel settings will not be surprising. In this
    section, I will discuss CPU and disk kernel settings Microsoft recommends for
    a Linux environment. You may also want to look at the documentation on your Linux
    distribution on how to perform these configurations. In this section, I will cover
    the basics for Red Hat Enterprise Linux.


    In Red Hat Enterprise Linux, you can also use performance tuning profiles. Linux
    provides predefined tuning profiles, and we can also create our own, as we will
    do next. In order to do this, we will use the tuned-adm tool.


    To get started, we can use tuned-adm to get a list of the available tuning profiles
    in the system:


    ```

    # tuned-adm list

    Available profiles:

    - accelerator-performance     - Throughput performance based tuning with disabled
    higher latency STOP states

    - balanced                    - General non-specialized tuned profile

    - desktop                     - Optimize for the desktop use-case

    - hpc-compute                 - Optimize for HPC compute workloads

    - intel-sst                   - Configure for Intel Speed Select Base Frequency

    - latency-performance         - Optimize for deterministic performance at the
    cost of increased power consumption

    - network-latency             - Optimize for deterministic performance at the
    cost of increased power consumption, focused on low latency network performance

    - network-throughput          - Optimize for streaming network throughput, generally
    only necessary on older CPUs or 40G+ networks

    - powersave                   - Optimize for low power consumption

    - throughput-performance      - Broadly applicable tuning that provides excellent
    performance across a variety of common server workloads

    - virtual-guest               - Optimize for running inside a virtual guest

    - virtual-host                - Optimize for running KVM guests

    Current active profile: virtual-guest

    ```


    The following command shows what the active tuning profile is (which was also
    shown in the previous example):


    ```

    # tuned-adm active

    Current active profile: virtual-guest

    ```


    Originally, when SQL Server for Linux was just released with the 2017 version,
    Microsoft recommended using the throughput-performance profile. If you still need
    this profile, you can enable it using the next command:


    ```

    # tuned-adm profile  throughput-performance

    ```


    However, starting with Red Hat Enterprise Linux 8.0, an mssql profile was codeveloped
    with Red Hat to offer the best performance–related tuning for SQL Server implementations.
    By the way, you can verify your Red Hat Enterprise Linux system version by running
    cat /etc/os-release. For example, I get the following partial output:


    ```

    # cat /etc/os-release

    NAME="Red Hat Enterprise Linux"

    VERSION="8.2 (Ootpa)"

    ID="rhel"

    ID_LIKE="fedora"

    VERSION_ID="8.2"

    PLATFORM_ID="platform:el8"

    PRETTY_NAME="Red Hat Enterprise Linux 8.2 (Ootpa)"

    ```


    This is the profile proposed by Microsoft and Red Hat, which, as you may see,
    includes the mentioned system-defined throughput-performance profile. The include
    parameter in a profile definition file allows you to base your own tuned profiles
    on existing profiles.


    ```

    #

    # A tuned configuration for SQL Server on Linux

    #

    [main]

    summary=Optimize for Microsoft SQL Server

    include=throughput-performance

    [cpu]

    force_latency=5

    [sysctl]

    vm.swappiness = 1

    vm.dirty_background_ratio = 3

    vm.dirty_ratio = 80

    vm.dirty_expire_centisecs = 500

    vm.dirty_writeback_centisecs = 100

    vm.transparent_hugepages=always

    vm.max_map_count=1600000

    net.core.rmem_default = 262144

    net.core.rmem_max = 4194304

    net.core.wmem_default = 262144

    net.core.wmem_max = 1048576

    kernel.numa_balancing=0

    kernel.sched_latency_ns = 60000000

    kernel.sched_migration_cost_ns = 500000

    kernel.sched_min_granularity_ns = 15000000

    kernel.sched_wakeup_granularity_ns = 2000000

    ```


    In order to implement the proposed profile, follow the following steps.


    Create the mssql directory as shown next:


    ```

    # mkdir /usr/lib/tuned/mssql

    ```


    Save the profile definition shown earlier with a file named tuned.conf under /usr/lib/tuned/mssql.


    Update the permissions accordingly, in this case, so that anyone could execute
    the tuned.conf file:


    ```

    chmod +x /usr/lib/tuned/mssql/tuned.conf

    ```


    At this moment, you could verify that the profile is available. Run the following
    command, only partial output shown:


    ```

    # tuned-adm list

    Available profiles:

    - mssql                       - Optimize for Microsoft SQL Server

    ```


    You can then enable the profile running:


    ```

    # tuned-adm profile mssql

    ```


    Finally, validate that it is enabled:


    ```

    # tuned-adm active

    Current active profile: mssql

    ```


    Tables [3-2](#393702_2_En_3_Chapter.xhtml#Tab2) and [3-3](#393702_2_En_3_Chapter.xhtml#Tab3)
    show the Microsoft recommended CPU and disk settings. You may notice that some
    of those values were included in the previous custom mssql tuning profile. Let
    us discuss more about those settings and values next.


    Table 3-3


    Recommended Disk-Related Kernel Settings


    | Setting | Value | Details |

    | --- | --- | --- |

    | disk readahead | 4096 | See the blockdev command |

    | sysctl settings | kernel.sched_min_granularity_ns = 10000000 | See the sysctl
    command |

    | kernel.sched_wakeup_granularity_ns = 15000000 |

    | vm.dirty_ratio = 40 |

    | vm.dirty_background_ratio = 10 |

    | vm.swappiness = 10 |


    Table 3-2


    Recommended CPU-Related Kernel Settings


    | Setting | Value | Details |

    | --- | --- | --- |

    | CPU frequency governor | performance | See the **cpupower** command in your
    distribution’s documentation |

    | ENERGY_PERF_BIAS | performance | See the **x86_energy_perf_policy** command
    in your distribution’s documentation |

    | min_perf_pct | 100 | See your documentation on intel p-state |

    | C-States | C1 only | See your Linux or system documentation on how to ensure
    C-States is set to C1 only |


    Table [3-3](#393702_2_En_3_Chapter.xhtml#Tab3) shows the sysctl command, which
    is used to configure kernel parameters at runtime. Although the settings listed
    in the table were already configured and enabled at the mssql profile created
    earlier in this section, I will show you how this command works. You can use the
    sysctl command to see a current kernel value as in the following example:


    ```

    # sysctl kernel.sched_min_granularity_ns

    kernel.sched_min_granularity_ns = 15000000

    ```


    This returns the value we just set on the profile; you may see a default value
    too. If you wanted to set a new value, you could use


    ```

    # sysctl -w kernel.sched_min_granularity_ns=10000000

    kernel.sched_min_granularity_ns = 10000000

    ```


    You can display all the kernel settings currently configured in the system by
    using the --all option:


    ```

    # sysctl -–allsysctl

    ```


    My current installation returned 942 values.


    As also indicated in Table [3-3](#393702_2_En_3_Chapter.xhtml#Tab3), you can use
    the blockdev command to set the disk readahead property. Let us start with a report
    of all the devices in the system:


    ```

    # blockdev --report

    RO    RA   SSZ   BSZ   StartSec            Size   Device

    rw  8192   512  4096          0     21474836480   /dev/sdb

    rw  8192   512  4096       2048     21472739328   /dev/sdb1

    rw  8192   512  4096          0     68719476736   /dev/sda

    ```


    We can now use the --getra and --setra options to read and set the readahead values,
    respectively:


    ```

    # blockdev --getra /dev/sda


    # blockdev --setra 4096 /dev/sda

    # blockdev --report

    ```


    Running the report again will show 4096, as recommended in Table [3-3](#393702_2_En_3_Chapter.xhtml#Tab3).


    The profile created earlier also disables auto numa balancing on a multinode NUMA
    system. Disabling this performance configuration is required as this property
    is enabled by default.


    ```

    # sysctl kernel.numa_balancing

    kernel.numa_balancing = 1

    # sysctl -w kernel.numa_balancing=0

    ```'
