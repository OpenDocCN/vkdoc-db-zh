  trans: '### system_health 扩展事件会话


    `system_health` 会话是一个扩展事件会话，用于自动收集可用于排查性能问题的系统数据。它在每个 SQL Server 安装中默认配置，会在实例启动时自动开始并持续运行。虽然可以关闭和删除
    `system_health` 会话，但不建议这样做，因为它的运行不会产生明显的性能影响。


    `system_health` 会话收集多个领域的信息（详情请参阅 [`https://msdn.microsoft.com/en-us/library/ff877955.aspx`](https://msdn.microsoft.com/en-us/library/ff877955.aspx)），同时也会捕获多种等待类型。以下代码是
    SQL Server `system_health` 的部分定义，描述了它捕获的等待类型，并基于等待时长进行了过滤：


    ```sql

    ADD EVENT sqlos.wait_info(

    ACTION(package0.callstack,sqlserver.session_id,sqlserver.sql_text)

    WHERE ([duration]>(15000) AND ([wait_type]>=N''LATCH_NL'' AND ([wait_type]>=N''PAGELATCH_NL''

    AND [wait_type]=N''PAGEIOLATCH_NL''

    AND [wait_type]=N''IO_COMPLETION'' AND

    [wait_type]=N''FCB_REPLICA_WRITE'' AND wait_type

    AND wait_type AND ([wait_type]>=N''PREEMPTIVE_OS_GENERICOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_INITIALIZESECURITYCONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_AUTHZGETINFORMATIONFROMCONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_CRYPTACQUIRECONTEXT'' AND

    [wait_type]=N''PREEMPTIVE_OS_NETGROUPGETUSERS'' AND

    [wait_type]=N''PREEMPTIVE_OS_NETVALIDATEPASSWORDPOLICYFREE'' AND

    wait_type AND

    ([wait_type]>=N''PREEMPTIVE_OS_SETNAMEDSECURITYINFO'' AND

    [wait_type]=N''PREEMPTIVE_OS_RSFXDEVICEOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_DTCOPS'' AND

    [wait_type]=N''PREEMPTIVE_OS_CLOSEHANDLE'' AND

    [wait_type]=N''PREEMPTIVE_OS_GETCOMPRESSEDFILESIZE'' AND

    [wait_type]=N''PREEMPTIVE_OS_DISCONNECTNAMEDPIPE''AND

    [wait_type]<=N''PREEMPTIVE_CLOSEBACKUPMEDIA'' OR

    [wait_type]=N''PREEMPTIVE_OS_AUTHENTICATIONOPS'' OR

    [wait_type]=N''PREEMPTIVE_OS_FREECREDENTIALSHANDLE'' OR

    [wait_type]=N''PREEMPTIVE_OS_AUTHORIZATIONOPS'' OR

    [wait_type]=N''PREEMPTIVE_COM_COCREATEINSTANCE'' OR

    [wait_type]=N''PREEMPTIVE_OS_NETVALIDATEPASSWORDPOLICY'' OR

    [wait_type]=N''PREEMPTIVE_VSS_CREATESNAPSHOT''))))

    ```


    此外，`system_health` 事件会话使用了 `sp_server_diagnostics_component_result`，该过程本身会收集包括部分等待信息在内的各种诊断数据和健康信息。有关
    `sp_server_diagnostics_component_result` 的更多信息，请参阅 [`https://msdn.microsoft.com/en-us/library/ff878233.aspx`](https://msdn.microsoft.com/en-us/library/ff878233.aspx)。`sp_server_diagnostics_component_result`
    定义如下：


    ```sql

    ADD EVENT sqlserver.sp_server_diagnostics_component_result(SET collect_data=(1)

    WHERE ([sqlserver].[is_system]=(1) AND component))

    ```


    最后请记住，尽管 `system_health` 会话收集的信息会被捕获到文件和环形缓冲区两种目标中，但它可能只保留最近的事件，并且这些信息不会持久化存储，而是如下面所示进行循环利用。您可能需要执行一些额外步骤才能将这些信息持久化保存到磁盘。


    ```sql

    ADD TARGET package0.event_file(SET filename=N''system_health.xel'',max_file_size=(5),
    max_rollover_files=(4)),

    ADD TARGET package0.ring_buffer(SET max_events_limit=(5000),max_memory=(4096))

    ```


    该定义显示，文件目标的 `max_file_size`（最大文件大小，单位为兆字节）为 5 MB，`max_rollover_files`（文件系统中保留的最大文件数）为
    4，因此最大可存储 20 MB 的信息。可以使用以下查询读取文件目标：


    ```sql

    SELECT *, CAST(event_data AS XML)

    FROM sys.fn_xe_file_target_read_file(''system_health*.xel'', NULL, NULL, NULL)

    ```


    同样地，`system_health` 会话使用的环形缓冲区目标设置了 `max_events_limit` 为 5000，这意味着它最多在环形缓冲区中保留
    5000 个事件，当达到此限制时，较旧的事件将被丢弃。它还定义了最大内存量为 4096 千字节。默认情况下，达到这些限制时，最旧的事件会被丢弃，但另一个配置选项
    `occurrence_number` 允许您根据事件类型配置在被丢弃前所保留的事件数量。


    您可以使用以下查询作为起点，开始检查 `system_health` 会话捕获的信息，特别是环形缓冲区目标：


    ```sql

    SELECT CAST(t.target_data AS xml)

    FROM sys.dm_xe_session_targets t

    JOIN sys.dm_xe_sessions s

    ON s.address = t.event_session_address

    WHERE s.name = ''system_health''

    ```


    **注意**


    如果在尝试打开 XML 列时遇到意外的文件结尾解析错误，您可能需要增加 SQL Server Management Studio 会话中从服务器检索的 XML
    数据的字符数。为此，请使用 `工具` 菜单，选择 `选项` ➤ `查询结果` ➤ `SQL Server` ➤ `结果到网格` ➤ `检索到的最大字符数`，并将
    `XML 数据` 更改为 `无限制`（默认值为 2 MB）。


    与 `system_health` 会话类似，SQL Server 在多个产品版本中都提供了默认跟踪。虽然它不捕获任何等待信息，但默认跟踪会持久化记录一些主要与
    SQL Server 配置选项相关的活动和更改。随着 SQL 跟踪的推出，默认跟踪已被弃用。'
- fmt: '## Example: Analyzing CXPACKET Waits


    Since there are many wait types, more than a thousand as of SQL Server 2019, analyzing
    even the most common ones would require an entire book. Later in the chapter,
    I’ll describe the most common waits. In this section, I’ll show you how to troubleshoot
    one of the most common ones: the `CXPACKET` waits. Let’s create a problem that
    can demonstrate this kind of wait.


    ### 创建演示问题


    If you run the following query, most likely it will run for a few seconds without
    a problem using a sort operator and a parallel plan:


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    ```


    In my test system with four logical processors, I am able to see a parallel plan
    with four threads for both a clustered index scan and a sort operation. However,
    let’s assume we have a performance problem and we see `CXPACKET` waits. Let’s
    simulate waits by blocking one row. Run this on another session:


    ```sql

    BEGIN TRANSACTION

    UPDATE Sales.SalesOrderDetail

    SET OrderQty = 5

    WHERE SalesOrderDetailID = 121317

    ```


    Notice that the `UPDATE` statement completes but the transaction remains open.
    (No `COMMIT` or `ROLLBACK TRANSACTION` statement has been issued just yet.)


    Run the previous `SELECT` statement again on a different Management Studio session.
    If you use the new `Live Query Statistics` feature, you can see that it is using
    a parallel plan and the process blocks on the sort operator, as shown in Figure
    5-4. Even when the clustered index scan operator has processed 121,199 rows, no
    rows will ever be processed by the sort operator until the blocking ends. The
    new `Live Query Statistics` feature is covered in more detail in the next chapter.


    ![../images/393702_2_En_5_Chapter/393702_2_En_5_Fig4_HTML.jpg](images/393702_2_En_5_Chapter/393702_2_En_5_Fig4_HTML.jpg)


    *Figure 5-4: Live Query Statistics on a blocked query*


    ### 分析等待统计


    Run the following statement using the `session_id` number of the query running
    the `SELECT ORDER BY` statement, which in my case is 52:


    ```sql

    SELECT * FROM sys.dm_exec_requests WHERE session_id = 52

    ```


    This is what I get on my test system:


    | session_id | request_id | Status | command | blocking_session_id | wait_type
    | wait_time | last_wait_type | wait_resource |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 52 | 0 | suspended | SELECT | 0 | CXPACKET | 219773 | CXPACKET |   |


    It is common that once people troubleshooting waits see the `CXPACKET` wait type,
    they tend to assume it is a parallelism problem and perform some incorrect configuration
    or query changes focused on disabling parallelism. (By the way, not shown in the
    previous output and introduced in SQL Server 2016, you can also see the `DOP`
    or degree of parallelism and `parallel_worker_count` columns, which in my case
    both show four.)


    Another issue is that `sys.dm_exec_requests` does not show what the problem is,
    and some other tools are required. The `sys.dm_os_waiting_tasks` DMV can be more
    effective on this. Run the following query remembering to update the `session_id`
    to your executing query:


    ```sql

    SELECT * FROM sys.dm_os_waiting_tasks WHERE session_id = 52

    ```


    Now we get this data:


    | session_id | exec_context_id | wait_duration_ms | wait_type | blocking_session_id
    | blocking_exec_context_id | resource_description |

    | --- | --- | --- | --- | --- | --- | --- |

    | 52 | 3 | 1256486 | LCK_M_S | 55 | NULL | pagelock fileid=1 pageid=28576 dbid=5
    subresource=FULL id=lockdbc49b0380 mode=IX associatedObjectId=72057594057588736
    |

    | 52 | 4 | 1256486 | CXPACKET | 52 | NULL | exchangeEvent id=Portdbf1ce8300 WaitType=e_waitPortOpen
    nodeId=2 |

    | 52 | 0 | 1256605 | CXPACKET | 52 | 1 | exchangeEvent id=Portdbf1ce8300 WaitType=e_waitPortOpen
    nodeId=2 |

    | 52 | 2 | 1255426 | CXPACKET | 52 | 4 | exchangeEvent id=Portdbf1ce8300 WaitType=e_waitPortOpen
    nodeId=2 |

    | 52 | 1 | 1256486 | CXPACKET | 52 | 3 | exchangeEvent id=Portdbf1ce8300 WaitType=e_waitPortOpen
    nodeId=2 |


    We can see that the main process, execution context 0, is being blocked by the
    same process context id 1, and context id 1 is being blocked by context id 3.
    All of them show `CXPACKET` waits. However, context id 3 is being blocked by a
    different session with a `LCK_M_S` wait, which is the session running the `UPDATE`
    statement. This is a good example to show that something that seems to be one
    wait type problem in reality is related to a different wait type. In other words,
    something that looks like a parallelism problem in reality is not. Not shown on
    the output, you could see the same information and come to the same conclusion
    by looking at the `waiting_task_address`, which shows the address of the waiting
    task, and `blocking_task_address`, which is the task that is currently holding
    the resource the task is waiting on. Listed also is `resource_description`, which
    is also very helpful to understand the resource being consumed.


    ### 定位阻塞语句


    Run the following statement on the session running the `UPDATE`:


    ```sql

    ROLLBACK TRANSACTION

    ```


    The blocking will end and the sort will be able to finish as well.


    Finally, how do we find the statement that is blocking? After all, the statement
    has already been executed, and it won’t appear on some of the typical DMVs. Even
    the old `sysprocesses` compatibility catalog view will only show “AWAITING COMMAND”
    if you query it to see what the specific session ID is doing now. A couple of
    easy solutions are to use the old `DBCC INPUTBUFFER` statement and the new `sys.dm_exec_input_buffer`
    DMF.


    `DBCC INPUTBUFFER` displays the last statement executed by SQL Server for the
    specified session ID. An example on how to use it follows:


    ```sql

    DBCC INPUTBUFFER(55)

    ```


    The new `sys.dm_exec_input_buffer` DMF (dynamic management function) introduced
    in SQL Server 2014 Service Pack 2 can take the same parameters as `DBCC INPUTBUFFER`,
    as shown next:


    ```sql

    SELECT * FROM sys.dm_exec_input_buffer(55, NULL)

    ```


    Both will return, with some minor output differences, the executed statement `BEGIN
    TRANSACTION UPDATE Sales.SalesOrderDetail SET OrderQty = 5 WHERE SalesOrderDetailID
    = 121317`.


    This example shows how troubleshooting `CXPACKET` waits may show problems with
    other kinds of waits, in this case, `LCK_M_S` or blocking, which happen to be
    the root cause of the problem. Also, remember that, in general, troubleshooting
    waits would also require additional information from some other sources. In some
    cases, parallelism could, in fact, be the problem. Most of them can usually be
    fixed by updating related table statistics, creating appropriate indexes, or using
    other traditional query-tuning and optimization techniques.'
