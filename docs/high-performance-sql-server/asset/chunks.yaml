    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig11_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Plan without the Join to Sort Merge Join optimization


    Finally, I mentioned earlier that the query optimizer implements two physical
    algorithms for optimizing aggregations, hash and stream aggregation. Currently,
    the plan in Figure [1-11](#393702_2_En_1_Chapter.xhtml#Fig11) is using a hash
    aggregation (or Hash Match Aggregate). Let us disable hash aggregations as well.


    ```

    DBCC RULEOFF(''GbAggToHS'')

    ```


    The new plan is shown in Figure [1-12](#393702_2_En_1_Chapter.xhtml#Fig12). At
    this point, you won’t be surprised that instead of using a hash aggregation, it
    is now using a stream aggregation.


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig12_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Plan without hash aggregations


    Do you wonder what would happen if you disable stream aggregations as well? Try
    the following undocumented statement and run the original AdventureWorks query
    again:


    ```

    DBCC RULEOFF(''GbAggToStrm'')

    ```


    This time, it is not possible to generate a plan at all, and instead you will
    get the following error message:


    ```

    Msg 8624, Level 16, State 1, Line 60

    Internal Query Processor Error: The query processor could not produce a query
    plan. For more information, contact Customer Support Services.

    ```


    Finally, before ending this exercise, you should either enable the disabled rules
    again or close the session. RULEOFF and RULEON statements operate at the session
    level. You may get a very strange behavior if you continue working in the same
    session as you, in fact, have changed the behavior of the query optimizer. You
    may remember which rules you have disabled, or you can take benefit of the undocumented
    statement DBCC SHOWOFFRULES to display this list for you. Run the following:


    ```

    DBCC TRACEON(3604)

    DBCC SHOWOFFRULES

    ```


    You will see an output similar to this:


    ```

    DBCC execution completed. If DBCC printed error messages, contact your system
    administrator.

    Rules that are off globally:

    JNtoSM

    GbAggToStrm

    GbAggToHS

    GbAggBeforeJoin

    DBCC execution completed. If DBCC printed error messages, contact your system
    administrator.

    ```


    In the same way, you can use the undocumented statement DBCC SHOWONRULES to list
    all the rules which are still enabled, which in our case would be the remaining
    416 rules available for the query optimizer. To enable the disabled rules, run
    the undocumented statement DBCC RULEON as shown next:


    ```

    DBCC RULEON(''JNtoSM'')

    DBCC RULEON(''GbAggBeforeJoin'')

    DBCC RULEON(''GbAggToStrm'')

    DBCC RULEON(''GbAggToHS'')

    ```


    After enabling the listed transformation rules, you can run the query again and
    verify that everything goes back to normal. You can also run DBCC SHOWOFFRULES
    to verify that no rules are listed as disabled at all.


    There is an alternate, and also undocumented, method to disable rules at the query
    level only. Try the following query using the undocumented hint QUERYRULEOFF,
    which will disable the GbAggBeforeJoin rule but only for that particular query
    execution:


    ```

    SELECT c.CustomerID, COUNT(*)

    FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

    ON c.CustomerID = o.CustomerID

    GROUP BY c.CustomerID

    OPTION (RECOMPILE, QUERYRULEOFF GbAggBeforeJoin)

    ```


    You can include more than one rule if you specify a list separated by commas like
    in the following case:


    ```

    SELECT c.CustomerID, COUNT(*)

    FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

    ON c.CustomerID = o.CustomerID

    GROUP BY c.CustomerID

    OPTION (RECOMPILE, QUERYRULEOFF GbAggBeforeJoin, QUERYRULEOFF GbAggToHS)

    ```


    Run one last example:


    ```

    SELECT c.CustomerID, COUNT(*)

    FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

    ON c.CustomerID = o.CustomerID

    GROUP BY c.CustomerID

    OPTION (RECOMPILE, QUERYRULEOFF GbAggToStrm, QUERYRULEOFF GbAggToHS)

    ```


    As explained earlier, the following query would not create a plan either because
    again we are disabling rules for both stream and hash aggregations. But this time
    you will get a different error message as the query optimizer detected you are
    using a hint.'
