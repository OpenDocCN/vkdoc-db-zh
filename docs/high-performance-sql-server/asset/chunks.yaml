    ```


    `lightweight pooling` 选项是一个高级配置选项。如果您使用 `sp_configure` 系统存储过程来更新设置，则只能在 `show
    advanced options` 设置为 1 时更改 `lightweight pooling`。设置在服务器重启后生效。当然，如果您在测试环境中尝试此操作，别忘了在继续之前将其设置回
    0。查看 `sys.dm_os_workers` DMV 的 `is_fiber` 列将显示工作线程是否正在使用轻型池运行。

    '
- fmt: "### Workers\n\nA request can also use more than one worker or thread if parallelism\
    \ is used. The `task_state` column of the `sys.dm_os_tasks` DMV shows the state\
    \ of a task, which has the following documented definitions:\n\n*   PENDING: Waiting\
    \ for a worker thread\n\n*   RUNNABLE: Runnable, but waiting to receive a quantum\n\
    \n*   RUNNING: Currently running on the scheduler\n\n*   SUSPENDED: Has a worker,\
    \ but is waiting for an event\n\n*   DONE: Completed\n\n*   SPINLOOP: Stuck in\
    \ a spinlock\n\nSimilarly, you can find additional information about tasks waiting\
    \ on some resource by using `sys.dm_os_waiting_tasks`. We will cover waits in\
    \ great detail in Chapter [5](#393702_2_En_5_Chapter.xhtml).\n\nThe default value\
    \ for the `max worker threads` configuration option is `0`, which enables SQL\
    \ Server to automatically configure the number of worker threads at startup, and\
    \ it depends on the number of CPUs and whether SQL Server is running on a 32-bit\
    \ or 64-bit architecture, as shown in Table [1-1](#393702_2_En_1_Chapter.xhtml#Tab1).\n\
    \n**Table 1-1** Max Worker Threads Default Configuration\n\n| Number of CPUs |\
    \ 32-Bit Architecture (Up to SQL Server 2014) | 64-Bit Architecture (Up to SQL\
    \ Server 2016 SP1) | 64-Bit Architecture (Starting with SQL Server 2016 SP2) |\n\
    | --- | --- | --- | --- |\n| 4 or fewer processors | 256 | 512 | 512 |\n| 8 processors\
    \ | 288 | 576 | 576 |\n| 16 processors | 352 | 704 | 704 |\n| 32 processors |\
    \ 480 | 960 | 960 |\n| 64 processors | 736 | 1472 | 2432 |\n| 128 processors |\
    \ 1248 | 2496 | 4480 |\n| 256 processors | 2272 | 4544 | 8576 |\n\n> **Note**\n\
    > Starting with SQL Server 2016, the database engine is no longer available on\
    \ a 32-bit architecture.\n\nWorkers are created in an on-demand fashion until\
    \ the `max worker threads` configured value is reached (according to the value\
    \ shown in Table [1-1](#393702_2_En_1_Chapter.xhtml#Tab1) for a default configuration),\
    \ although this value does not take into account threads that are required for\
    \ system tasks. As shown earlier, the `max_workers_count` column on the `sys.dm_os_sys_info`\
    \ DMV will show the maximum number of workers that can be created.\n\nThe scheduler\
    \ will trim the worker pool to a minimum size when workers have remained idle\
    \ for more than 15 minutes or when there is memory pressure. For load-balancing\
    \ purposes, the scheduler has an associated load factor that indicates its perceived\
    \ load and that is used to determine the best scheduler to put this task on. When\
    \ a task is assigned to a scheduler, the load factor is increased. When a task\
    \ is completed, the load factor is decreased. This value can be seen on the `load_factor`\
    \ column of the `sys.dm_os_schedulers` DMV.\n\nFinally, SQLOS also has a scheduler\
    \ monitor, which is a task that runs continuously whose function is to monitor\
    \ the scheduler’s health. It includes several functions like making sure that\
    \ tasks yield at regular intervals, seeing that new queries assigned to a process\
    \ get picked up by a worker thread, ensuring that I/O completions get processed\
    \ in a reasonable time, and ascertaining that workers are balanced equally among\
    \ all the schedulers. A problem with any of these may return SQL Server errors\
    \ `17883`, `17884`, and `17887`. The scheduler monitor also maintains a health\
    \ record using a ring buffer that contains process and memory utilization information\
    \ and can be inspected from the `sys.dm_os_ring_buffers` DMV as shown next.\n\n\
    ```sql\nSELECT timestamp, CONVERT(xml, record) AS record\nFROM sys.dm_os_ring_buffers\n\
    WHERE ring_buffer_type = 'RING_BUFFER_SCHEDULER_MONITOR'\n```\n\n> **Note**\n\
    > A ring buffer is a circular data structure of a fixed size.\n\nAn example returned:\n\
    \n```xml\n<Record>\n  <SchedulerMonitorEvent>\n    <SystemIdle>12</SystemIdle>\n\
    \    <ProcessUtilization>4</ProcessUtilization>\n    <MemoryUtilization>98</MemoryUtilization>\n\
    \    ...\n  </SchedulerMonitorEvent>\n</Record>\n```\n\nHaving reviewed schedulers,\
    \ tasks, and workers, let’s move to a level higher and discuss connections, sessions,\
    \ and requests.\n\nYou can use the `sys.dm_exec_connections` DMV to see the physical\
    \ connections to the database server. Some of the interesting information is found\
    \ in the `net_transport` column, which shows the physical transport protocol used\
    \ by this connection such as `TCP`, `Shared Memory`, or `Session` (when a connection\
    \ has multiple active result sets, or MARS, enabled); `protocol_type`, which is\
    \ self-explanatory and could have values like `TSQL`; `Service Broker` or `SOAP`;\
    \ and some other important information like network address of the client connecting\
    \ to the database server and the port number on the client computer for TCP/IP\
    \ connections. There is a one-to-one mapping between a connection and a session,\
    \ as shown in Figure [1-2](#393702_2_En_1_Chapter.xhtml#Fig2).\n\n> **Note**\n\
    > Schedulers, workers, and tasks are objects at the SQLOS level and as such are\
    \ included in the SQL Server operating system–related DMVs, as compared to connections,\
    \ sessions, and requests, which are included in the execution-related DMV group.\n\
    \nSession information is shown using the `sys.dm_exec_sessions`, which includes\
    \ some important information that is helpful in troubleshooting performance problems\
    \ like status of the session, the session values for some SET options, or the\
    \ transaction isolation level used by the session. The possible documented values\
    \ of `status` are as follows:\n\n*   `Running`: Currently running one or more\
    \ requests.\n\n*   `Sleeping`: Currently connected but running no requests.\n\n\
    *   `Dormant`: The session has been reset because of connection pooling and is\
    \ now in pre-login state.\n\n*   `Preconnect`: The session is in the Resource\
    \ Governor classifier.\n\nFinally, `sys.dm_exec_requests` is a logical representation\
    \ of a query request made by the client at the execution engine level. It provides\
    \ a great deal of rich information including status of the request (which can\
    \ be `Background`, `Running`, `Runnable`, `Sleeping`, or `Suspended`), hash map\
    \ of the SQL text and execution plan (`sql_handle` and `plan_handle`, respectively),\
    \ wait information, and memory allocated to the execution of a query on the request.\
    \ It also provides a lot of rich performance information like CPU time in milliseconds,\
    \ total time elapsed in milliseconds since the request arrived, number of reads,\
    \ number of writes, number of logical reads, and number of rows that have been\
    \ returned to the client by this request.\n\n> **Note**\n> The `sys.dm_exec_session_wait_stats`\
    \ DMV, available since SQL Server 2016, can allow you to collect wait information\
    \ at the session level. More details of this DMV will be provided in Chapter [5](#393702_2_En_5_Chapter.xhtml).\n\
    \n![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig2_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig2_HTML.jpg)\n\
    \n**Figure 1-2** Execution-related DMV mapping\n\n### SQL Server on Linux\n\n\
    As you may probably know, starting with the 2017 version, SQL Server now runs\
    \ on Linux, more specifically on Red Hat Enterprise Linux, SUSE Linux Enterprise\
    \ Server, and Ubuntu. In addition, SQL Server can run on Docker. Docker itself\
    \ runs on multiple platforms, which means it is possible to run a SQL Server Docker\
    \ image on Linux, Mac, or Windows.\n\nAlthough SQLOS was created to remove or\
    \ abstract away operating system differences, it was never originally intended\
    \ to provide platform independence or portability or to help porting the database\
    \ engine to other platforms. But even when SQLOS did not provide the abstraction\
    \ functionality to move SQL Server to another operating system, it would still\
    \ play a very important role on the Linux release.\n\nSQL Server on Linux is not\
    \ a native Linux application but instead uses the Drawbridge application sandboxing\
    \ technology. This means Drawbridge provided the abstraction functionality that\
    \ was needed. SQL Server on Linux was born from marrying these two technologies,\
    \ SQLOS and Drawbridge, and was the birth of a new platform abstraction layer\
    \ later known as SQLPAL. How SQL Server on Linux works is explained in more detail\
    \ in Chapter [2](#393702_2_En_2_Chapter.xhtml)."
  raw: '### Workers


    A request can also use more than one worker or thread if parallelism is used.
    The `task_state` column of the `sys.dm_os_tasks` DMV shows the state of a task,
    which has the following documented definitions:


    *   PENDING: Waiting for a worker thread


    *   RUNNABLE: Runnable, but waiting to receive a quantum


    *   RUNNING: Currently running on the scheduler


    *   SUSPENDED: Has a worker, but is waiting for an event


    *   DONE: Completed


    *   SPINLOOP: Stuck in a spinlock


    Similarly, you can find additional information about tasks waiting on some resource
    by using `sys.dm_os_waiting_tasks`. We will cover waits in great detail in Chapter
    [5](#393702_2_En_5_Chapter.xhtml).


    The default value for the “max worker threads” configuration option is 0, which
    enables SQL Server to automatically configure the number of worker threads at
    startup, and it depends on the number of CPUs and whether SQL Server is running
    on a 32-bit or 64-bit architecture, as shown in Table [1-1](#393702_2_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    Max Worker Threads Default Configuration


    | Number of CPUs | 32-Bit Architecture (Up to SQL Server 2014) | 64-Bit Architecture
    (Up to SQL Server 2016 SP1) | 64-Bit Architecture (Starting with SQL Server 2016
    SP2) |

    | --- | --- | --- | --- |

    | 4 or fewer processors | 256 | 512 | 512 |

    | 8 processors | 288 | 576 | 576 |

    | 16 processors | 352 | 704 | 704 |

    | 32 processors | 480 | 960 | 960 |

    | 64 processors | 736 | 1472 | 2432 |

    | 128 processors | 1248 | 2496 | 4480 |

    | 256 processors | 2272 | 4544 | 8576 |


    Note


    Starting with SQL Server 2016, the database engine is no longer available on a
    32-bit architecture.


    Workers are created in an on-demand fashion until the “max worker threads” configured
    value is reached (according to the value shown in Table [1-1](#393702_2_En_1_Chapter.xhtml#Tab1)
    for a default configuration), although this value does not take into account threads
    that are required for system tasks. As shown earlier, the `max_workers_count`
    column on the `sys.dm_os_sys_info` DMV will show the maximum number of workers
    that can be created.


    The scheduler will trim the worker pool to a minimum size when workers have remained
    idle for more than 15 minutes or when there is memory pressure. For load-balancing
    purposes, the scheduler has an associated load factor that indicates its perceived
    load and that is used to determine the best scheduler to put this task on. When
    a task is assigned to a scheduler, the load factor is increased. When a task is
    completed, the load factor is decreased. This value can be seen on the `load_factor`
    column of the `sys.dm_os_schedulers` DMV.


    Finally, SQLOS also has a scheduler monitor, which is a task that runs continuously
    whose function is to monitor the scheduler’s health. It includes several functions
    like making sure that tasks yield at regular intervals, seeing that new queries
    assigned to a process get picked up by a worker thread, ensuring that I/O completions
    get processed in a reasonable time, and ascertaining that workers are balanced
    equally among all the schedulers. A problem with any of these may return SQL Server
    errors 17883, 17884, and 17887\. The scheduler monitor also maintains a health
    record using a ring buffer that contains process and memory utilization information
    and can be inspected from the `sys.dm_os_ring_buffers` DMV as shown next.


    ```

    SELECT timestamp, CONVERT(xml, record) AS record

    FROM sys.dm_os_ring_buffers

    WHERE ring_buffer_type = ''RING_BUFFER_SCHEDULER_MONITOR''

    ```


    Note


    A ring buffer is a circular data structure of a fixed size.


    An example returned:


    ```


    ```


    Having reviewed schedulers, tasks, and workers, let’s move to a level higher and
    discuss connections, sessions, and requests.


    You can use the `sys.dm_exec_connections` DMV to see the physical connections
    to the database server. Some of the interesting information is found in the `net_transport`
    column, which shows the physical transport protocol used by this connection such
    as TCP, Shared Memory, or Session (when a connection has multiple active result
    sets, or MARS, enabled); `protocol_type`, which is self-explanatory and could
    have values like TSQL; Service Broker or SOAP; and some other important information
    like network address of the client connecting to the database server and the port
    number on the client computer for TCP/IP connections. There is a one-to-one mapping
    between a connection and a session, as shown in Figure [1-2](#393702_2_En_1_Chapter.xhtml#Fig2).


    Note


    Schedulers, workers, and tasks are objects at the SQLOS level and as such are
    included in the SQL Server operating system–related DMVs, as compared to connections,
    sessions, and requests, which are included in the execution-related DMV group.


    Session information is shown using the `sys.dm_exec_sessions`, which includes
    some important information that is helpful in troubleshooting performance problems
    like status of the session, the session values for some SET options, or the transaction
    isolation level used by the session. The possible documented values of status
    are as follows:


    *   Running: Currently running one or more requests.


    *   Sleeping: Currently connected but running no requests.


    *   Dormant: The session has been reset because of connection pooling and is now
    in pre-login state.


    *   Preconnect: The session is in the Resource Governor classifier.


    Finally, `sys.dm_exec_requests` is a logical representation of a query request
    made by the client at the execution engine level. It provides a great deal of
    rich information including status of the request (which can be Background, Running,
    Runnable, Sleeping, or Suspended), hash map of the SQL text and execution plan
    (`sql_handle` and `plan_handle`, respectively), wait information, and memory allocated
    to the execution of a query on the request. It also provides a lot of rich performance
    information like CPU time in milliseconds, total time elapsed in milliseconds
    since the request arrived, number of reads, number of writes, number of logical
    reads, and number of rows that have been returned to the client by this request.


    Note


    The `sys.dm_exec_session_wait_stats` DMV, available since SQL Server 2016, can
    allow you to collect wait information at the session level. More details of this
    DMV will be provided in Chapter [5](#393702_2_En_5_Chapter.xhtml).


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig2_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Execution-related DMV mapping


    ### SQL Server on Linux


    As you may probably know, starting with the 2017 version, SQL Server now runs
    on Linux, more specifically on Red Hat Enterprise Linux, SUSE Linux Enterprise
    Server, and Ubuntu. In addition, SQL Server can run on Docker. Docker itself runs
    on multiple platforms, which means it is possible to run a SQL Server Docker image
    on Linux, Mac, or Windows.


    Although SQLOS was created to remove or abstract away operating system differences,
    it was never originally intended to provide platform independence or portability
    or to help porting the database engine to other platforms. But even when SQLOS
    did not provide the abstraction functionality to move SQL Server to another operating
    system, it would still play a very important role on the Linux release.


    SQL Server on Linux is not a native Linux application but instead uses the Drawbridge
    application sandboxing technology. This means Drawbridge provided the abstraction
    functionality that was needed. SQL Server on Linux was born from marrying these
    two technologies, SQLOS and Drawbridge, and was the birth of a new platform abstraction
    layer later known as SQLPAL. How SQL Server on Linux works is explained in more
    detail in Chapter [2](#393702_2_En_2_Chapter.xhtml).'
  trans: "### 工作线程\n\n如果使用了并行处理，一个请求也可以使用多个工作线程或线程。动态管理视图 `sys.dm_os_tasks` 的 `task_state`\
    \ 列显示任务的状态，其文档记录的定义如下：\n\n*   PENDING：等待工作线程\n\n*   RUNNABLE：可运行，但等待接收时间片\n\n\
    *   RUNNING：当前正在调度器上运行\n\n*   SUSPENDED：拥有工作线程，但正在等待某个事件\n\n*   DONE：已完成\n\n*\
    \   SPINLOOP：陷入自旋锁\n\n同样，你可以使用 `sys.dm_os_waiting_tasks` 找到有关等待某些资源的任务的附加信息。我们将在第\
    \ 5 章详细讨论等待。\n\n`max worker threads` 配置选项的默认值为 `0`，这使得 SQL Server 可以在启动时自动配置工作线程的数量，具体数量取决于\
    \ CPU 的数量以及 SQL Server 是在 32 位还是 64 位体系结构上运行，如表 1-1 所示。\n\n**表 1-1** 最大工作线程数默认配置\n\
    \n| 处理器数量 | 32 位体系结构 (最高至 SQL Server 2014) | 64 位体系结构 (最高至 SQL Server 2016 SP1)\
    \ | 64 位体系结构 (从 SQL Server 2016 SP2 开始) |\n| --- | --- | --- | --- |\n| 4 个或更少处理器\
    \ | 256 | 512 | 512 |\n| 8 个处理器 | 288 | 576 | 576 |\n| 16 个处理器 | 352 | 704 | 704\
    \ |\n| 32 个处理器 | 480 | 960 | 960 |\n| 64 个处理器 | 736 | 1472 | 2432 |\n| 128 个处理器\
    \ | 1248 | 2496 | 4480 |\n| 256 个处理器 | 2272 | 4544 | 8576 |\n\n> **注意**\n> 从 SQL\
    \ Server 2016 开始，数据库引擎不再提供 32 位体系结构版本。\n\n工作线程以按需方式创建，直到达到配置的 `max worker threads`\
    \ 值（根据默认配置，表 1-1 显示的值），尽管该值没有考虑系统任务所需的线程。如前所述，动态管理视图 `sys.dm_os_sys_info` 上的 `max_workers_count`\
    \ 列将显示可以创建的最大工作线程数。\n\n当工作线程闲置超过 15 分钟或出现内存压力时，调度器会将工作线程池缩减到最小大小。出于负载均衡的目的，调度器有一个关联的负载因子，用于指示其感知到的负载，并用于确定放置此任务的最佳调度器。当任务分配给调度器时，负载因子会增加。当任务完成时，负载因子会减少。该值可以在动态管理视图\
    \ `sys.dm_os_schedulers` 的 `load_factor` 列中看到。\n\n最后，SQLOS 还有一个调度器监视器，它是一个持续运行的任务，其功能是监视调度器的运行状况。它包括多项功能，例如确保任务定期让出（yield）、确保分配给进程的新查询能被工作线程拾取、确保\
    \ I/O 完成能在合理时间内得到处理，以及确保工作线程在所有调度器之间均衡分配。这些问题中的任何一个都可能导致 SQL Server 错误 `17883`、`17884`\
    \ 和 `17887`。调度器监视器还使用环形缓冲区维护运行状况记录，其中包含进程和内存利用率信息，可以从动态管理视图 `sys.dm_os_ring_buffers`\
    \ 中检查，如下所示。\n\n```sql\nSELECT timestamp, CONVERT(xml, record) AS record\nFROM\
    \ sys.dm_os_ring_buffers\nWHERE ring_buffer_type = 'RING_BUFFER_SCHEDULER_MONITOR'\n\
    ```\n\n> **注意**\n> 环形缓冲区是一种固定大小的循环数据结构。\n\n一个返回示例：\n\n```xml\n<Record>\n  <SchedulerMonitorEvent>\n\
    \    <SystemIdle>12</SystemIdle>\n    <ProcessUtilization>4</ProcessUtilization>\n\
    \    <MemoryUtilization>98</MemoryUtilization>\n    ...\n  </SchedulerMonitorEvent>\n\
    </Record>\n```\n\n了解了调度器、任务和工作线程后，让我们上升到一个更高的层面，讨论连接、会话和请求。\n\n你可以使用动态管理视图 `sys.dm_exec_connections`\
    \ 查看到数据库服务器的物理连接。一些有趣的信息可以在 `net_transport` 列中找到，它显示此连接使用的物理传输协议，例如 `TCP`、`Shared\
    \ Memory` 或 `Session`（当连接启用了多个活动结果集，即 MARS 时）；`protocol_type` 列是自解释的，其值可能为 `TSQL`、`Service\
    \ Broker` 或 `SOAP`；以及其他一些重要信息，例如连接到数据库服务器的客户端的网络地址以及用于 TCP/IP 连接的客户端计算机上的端口号。连接和会话之间是一对一映射关系，如图\
    \ 1-2 所示。\n\n> **注意**\n> 调度器、工作线程和任务是 SQLOS 级别的对象，因此包含在与 SQL Server 操作系统相关的 DMV\
    \ 中，而连接、会话和请求则包含在与执行相关的 DMV 组中。\n\n会话信息使用 `sys.dm_exec_sessions` 显示，其中包含一些有助于排查性能问题的重要信息，例如会话的状态、某些\
    \ SET 选项的会话值，或会话使用的事务隔离级别。`status` 列的可能文档记录值如下：\n\n*   `Running`：当前正在运行一个或多个请求。\n\
    \n*   `Sleeping`：已连接但当前未运行任何请求。\n\n*   `Dormant`：由于连接池，会话已被重置，现在处于预登录状态。\n\n*\
    \   `Preconnect`：会话处于资源调控器分类器中。\n\n最后，`sys.dm_exec_requests` 是客户端在执行引擎级别发出的查询请求的逻辑表示。它提供了大量丰富的信息，包括请求的状态（可以是\
    \ `Background`、`Running`、`Runnable`、`Sleeping` 或 `Suspended`）、SQL 文本和执行计划的哈希映射（分别为\
    \ `sql_handle` 和 `plan_handle`）、等待信息以及为查询执行分配的内存。它还提供了大量丰富的性能信息，例如以毫秒为单位的 CPU\
    \ 时间、自请求到达以来经过的总毫秒数、读取次数、写入次数、逻辑读取次数以及此请求已返回给客户端的行数。\n\n> **注意**\n> 自 SQL Server\
    \ 2016 起可用的动态管理视图 `sys.dm_exec_session_wait_stats` 允许你在会话级别收集等待信息。有关此 DMV 的更多详细信息将在第\
    \ 5 章中提供。\n\n![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig2_HTML.jpg](img/393702_2_En_1_Fig2_HTML.jpg)\n\
    \n**图 1-2** 与执行相关的 DMV 映射\n\n### Linux 上的 SQL Server\n\n如你可能知道的，从 2017 版本开始，SQL\
    \ Server 现在可以在 Linux 上运行，更具体地说，可以在 Red Hat Enterprise Linux、SUSE Linux Enterprise\
    \ Server 和 Ubuntu 上运行。此外，SQL Server 可以在 Docker 上运行。Docker 本身可以在多个平台上运行，这意味着可以在\
    \ Linux、Mac 或 Windows 上运行 SQL Server Docker 镜像。\n\n尽管创建 SQLOS 是为了消除或抽象掉操作系统差异，但其最初目标并非提供平台独立性或可移植性，或帮助将数据库引擎移植到其他平台。但即使\
    \ SQLOS 没有提供将 SQL Server 移植到另一个操作系统所需的抽象功能，它在 Linux 版本上仍然扮演着非常重要的角色。\n\nLinux\
    \ 上的 SQL Server 不是原生的 Linux 应用程序，而是使用了 Drawbridge 应用程序沙盒技术。这意味着 Drawbridge 提供了所需的抽象功能。Linux\
    \ 上的 SQL Server 是 SQLOS 和 Drawbridge 这两种技术结合的产物，也是后来被称为 SQLPAL 的新平台抽象层的诞生。Linux\
    \ 上的 SQL Server 如何工作将在第 2 章中更详细地解释。"
- fmt: '## Query Optimization


    We have seen how schedulers and workers execute tasks once a request has been
    submitted to SQL Server. After an idle worker picks up a pending task, the submitted
    query has to be compiled and optimized before it can be executed. To understand
    how a query is executed, we now switch from the world of SQLOS to the work performed
    by the relational engine, which is also called the query processor and consists
    of two main components: the query optimizer and the execution engine. The job
    of the query optimizer is to assemble an efficient execution plan for the query
    using the algorithms provided by the database engine. After a plan is created,
    it will be executed by the execution engine.


    The first operations the query processor needs to perform on a query are parsing
    and binding, which are performed by a component called the `algebrizer`. The next
    step the query processor performs is the query optimization process. As shown
    in Figure 1-3, the query optimization process is basically the enumeration of
    candidate execution plans and the selection of the best of these plans according
    to their cost, using both cardinality and cost estimations. The SQL Server query
    optimizer is a cost-based optimizer, and although it uses rules to explore the
    search space plan, it relies on a cost estimation model to estimate the cost of
    each of the candidate plans and select the most efficient one.


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig3_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig3_HTML.jpg)

    **Figure 1-3** Query optimizer architecture


    The relational engine implements a number of physical operations that are selected
    by the query optimizer to assemble an execution plan. So, in a simplistic way,
    query optimization could be seen as the process of mapping the original logical
    operations expressed in the initial tree representation to the physical operations
    implemented by the execution engine. Obviously, this is not a one-to-one operator
    matching and instead follows a more complicated process. Both logical and physical
    operations can be seen on each operator in an execution plan. For example, a logical
    aggregate operation has to either be mapped to a physical stream aggregate or
    a hash aggregate. On the other hand, a logical join could be mapped to a nested
    loops join, a merge join, or a hash join physical operator.


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig4_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig4_HTML.jpg)

    **Figure 1-4** SQL Server query processing process


    The query processing process follows several steps, as shown in Figure 1-4, although
    the main optimization process is performed by up to three exploration stages at
    the end. This is the part where transformation rules are used to produce candidate
    plans and cardinalities and costs are estimated. The optimization process does
    not have to execute all three exploration phases and could stop at any of them
    as soon as a good execution plan is found.


    In addition to the query text, which at this moment has been translated into a
    tree of logical operations and the metadata related to the objects directly related
    to the query, the query optimizer will collect additional information from other
    objects like constraints, indexes, and so on, along with optimizer statistics.


    As shown earlier in Figure 1-4, theoretically, in order to find the optimum execution
    plan for a query, a cost-based query optimizer should have to generate all possible
    execution plans that exist in that search space and correctly estimate the cost
    of each plan. Each of these operations is very complex, which is why query optimization
    is considered, using algorithm terminology, an NP-hard problem. So, it would be
    impossible for a query optimizer to perform an exhaustive search of all the possible
    plans as some complex queries may have thousands, or even millions, of possible
    solutions. For example, just considering the order of the joins in a query, depending
    on the tables to join, the number of possible solutions can be calculated as


    ```

    (2n – 2)!/(n – 1)!

    ```


    where both exclamation mark (`!`) symbols represent the mathematical factorial
    operation. Table 1-2 shows an example of the number of possible solutions for
    queries ranging from 2 to 12 tables, using two typical join shapes.


    **Table 1-2** Join Orders for Left-Deep and Bushy Trees


    | Tables | Left-Deep Trees | Bushy Trees |

    | --- | --- | --- |

    | 2 | 2 | 2 |

    | 3 | 6 | 12 |

    | 4 | 24 | 120 |

    | 5 | 120 | 1,680 |

    | 6 | 720 | 30,240 |

    | 7 | 5,040 | 665,280 |

    | 8 | 40,320 | 17,297,280 |

    | 9 | 362,880 | 518,918,400 |

    | 10 | 3,628,800 | 17,643,225,600 |

    | 11 | 39,916,800 | 670,442,572,800 |

    | 12 | 479,001,600 | 28,158,588,057,600 |


    **Note**

    Names like `left-deep`, `right-deep`, and `bushy trees` are commonly used to identify
    the shapes of the order of joins in logical trees. `Left-deep` trees are also
    called linear trees or linear processing trees. The set of `bushy trees` includes
    the sets of both `left-deep` and `right-deep` trees. For more details, you can
    look at my post at [`www.benjaminnevarez.com/2010/06/optimizing-join-orders/`](http://www.benjaminnevarez.com/2010/06/optimizing-join-orders/).


    In order to explore the search space, a plan enumeration algorithm is required
    to explore semantically equivalent plans. The generation of equivalent candidate
    solutions is performed by the query optimizer by using transformation rules. Heuristics
    are also used by the query optimizer to limit the number of choices considered
    in order to keep the optimization time reasonable. The set of alternative plans
    considered by the query optimizer is referred to as the search space and is stored
    in memory during the optimization process in a component called the `memo`.


    After enumerating candidate plans, the query optimizer needs to estimate the cost
    of these plans so it can choose the optimal one, the one with the lowest cost.
    The query optimizer estimates the cost of each physical operator in the `memo`
    structure, using costing formulas considering the use of resources such as I/O,
    CPU, and memory, although only the CPU and I/O costs are reported in the operators
    as can be seen later on the query plan. The cost of all the operators in the plan
    will be the cost of the query. The cost estimation is by operator and will depend
    on the algorithm used by the physical operator and the estimated number of records
    that will need to be processed. This estimate of the number of records is known
    as the cardinality estimation.'
