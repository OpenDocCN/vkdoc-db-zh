  trans: '

    ### 执行计划缓存


    一旦 SQL Server 查询优化器生成了某个执行计划，该计划可以存储在内存中，以便在再次执行相同查询时根据需要重复使用。由于查询优化在时间和系统资源方面是一项非常昂贵的操作，尽可能多地重用查询计划可以显著提升数据库的性能。这些计划存储在内存中一个称为“计划缓存”（之前也称为“过程缓存”）的区域，它们仅在少数情况下才会被移除，例如当遇到
    SQL Server 内存压力时、在实例或数据库级别执行了某些配置更改时，或者执行了特定语句（如 `DBCC FREEPROCACHE`）时。计划缓存是你分配给
    SQL Server 的内存的一部分，它与缓冲池一起用于存储数据库页面。


    之前我提到过，当一个查询或批处理被发送到 SQL Server 执行时，它会首先被发送到 `查询优化器` 以生成查询计划。实际上，在决定是否需要优化之前，SQL
    Server 会首先检查计划缓存，查看是否已存在针对该提交查询或批处理的执行计划。如果存在，则整个优化过程可以被跳过。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig17_HTML.jpg](img/393702_2_En_1_Fig17_HTML.jpg)


    图 1-17：SQL Server 编译和重新编译过程


    为了使用现有的执行计划，仍然需要进行一些验证。`图 1-17` 展示了 SQL Server 的编译和重新编译过程，你可以注意到，即使在为某个批处理在计划缓存中找到计划后，仍然会出于正确性相关的原因对其进行验证。这意味着，即使刚才还在使用的计划，在某些数据库更改（例如，对列或索引的更改）之后，也可能不再有效。显然，如果计划不再有效，则必须由查询优化器重新生成一个新计划，并将发生重新编译。


    在确认计划就正确性相关的原因验证有效之后，接下来会针对最优性或性能相关的原因进行验证。此验证中的一个典型情况是存在新的或过时的统计信息。同样，如果计划未能通过此项验证，该批处理将被送去进行优化，并生成一个新计划。此外，如果统计信息已过期，并且使用了默认的
    SQL Server 设置，则需要首先自动更新这些统计信息。如果禁用了统计信息的自动更新（这很少被推荐），那么这次更新将被跳过。如果配置了统计信息的异步更新，查询优化器将使用现有的统计信息（这些统计信息将在稍后异步更新，并且很可能在下次需要它们的优化时可用）。在任何这些情况下，新生成的计划都可能被保留在计划缓存中，以便再次重用。值得注意的是，如果系统中没有发生足够的更改，并且优化器做出了与之前相同的决策，那么新旧计划可能相同或非常相似。但无论如何，这是一项出于正确性和性能原因所必需的验证。


    到目前为止，我一直强调重用计划是可取的，以避免昂贵的优化时间和资源成本。然而，即使在通过了前述最优性验证之后，也可能存在一些情况，重用计划可能对性能无益，而请求一个新计划反而是更好的选择。在参数敏感型查询的情况下尤其如此，由于数据分布偏斜或不均匀，针对一个参数创建的计划可能不适用于具有不同参数的同一查询。这有时被称为“参数探测问题”，尽管实际上，参数探测是查询优化器使用的一种性能优化手段，旨在专门为最初传入的特定参数值生成一个定制的计划。正是因为它并非总是有效，才使得参数探测声名不佳。


    ## 查询执行


    如前一节所述，查询优化器从执行引擎可用的操作集合中选择操作来组装计划，生成的计划由查询处理器用于从数据库中检索所需的数据。在本节中，我将描述最常见的查询操作符（也称为迭代器），以及你将在执行计划中看到的最常见操作。

    '
- fmt: '### Operators


    执行计划中的每个节点都是一个操作符，为了执行其工作，至少实现了以下三个方法：


    *   `Open()`：使操作符初始化自身并设置任何所需的数据结构


    *   `GetRow()`：向操作符请求一行数据


    *   `Close()`：执行一些清理操作并关闭自身


    查询计划的执行包括调用树根操作符的`Open()`，然后重复调用`GetRow()`直到其返回`false`，最后调用`Close()`。树根操作符又会依次调用其子操作符的相同方法，这些子操作符又对其子操作符执行相同操作，依此类推。例如，一个操作符可以通过调用其子操作符的`GetRow()`方法来请求行数据。这也意味着，如果我们在SQL
    Server Management Studio中查看图形化的执行计划，计划的执行是从左到右开始的。


    由于`GetRow()`方法一次只产生一行，因此查询计划中显示的实际行数通常是特定操作符上调用该方法的次数，外加一次对`GetRow()`的额外调用以指示结果集结束。在执行计划树的叶子节点，通常存在数据访问操作符，它们实际从存储引擎检索数据，访问表、索引或堆等结构。尽管计划的执行是从左到右开始的，但数据流是从右向左的。随着行从右向左流动，会对其执行额外的操作，包括聚合、排序、过滤、连接等。


    值得注意的是，一次处理一行是SQL Server的传统查询处理方法，而通过列存储索引引入的新方法可以一次处理一批行。列存储索引在SQL Server 2012中引入，将在第7章详细讨论。


    > **注意**

    >

    > 实时查询统计信息是SQL Server 2016引入的一项查询故障排除功能，可用于在查询仍在执行时查看实时查询计划，从而无需等待查询完成即可实时查看查询计划信息。由于此功能所需的数据在SQL
    Server 2014数据库引擎中也可用，因此如果您使用SQL Server 2016 Management Studio，它也可以在SQL Server
    2014版本中工作。实时查询统计信息将在第6章中介绍。


    一个特定的操作不必读取所有行，这由调用操作符决定。一个典型的例子是`TOP`操作符与表扫描一起调用时。例如，如果`TOP`操作符在获取20行后停止调用`GetRow()`，则表扫描操作符实际上不需要扫描整个表，它返回`false`而不再调用子操作符。通过查看计划，您可能认为整个表都被扫描了，但您可以使用`STATISTICS
    IO`或新的`ActualRowsRead`属性（自SQL Server 2012 Service Pack 3、SQL Server 2014 Service
    Pack 2或SQL Server 2016起可用）来验证读取的页数。您可以通过运行以下查询看到此行为：


    ```

    SELECT TOP(20) *

    FROM Sales.SalesOrderDetail

    ```


    尽管所有迭代器都需要少量固定内存来执行其操作（存储状态、执行计算等），但有些操作符需要额外的内存，被称为内存消耗型操作符。对于这些操作符，包括排序、哈希连接和哈希聚合，所需的内存量通常与估计要处理的行数成正比。有关操作符所需内存的更多细节将在本章后面讨论。查询处理器实现了大量操作符，您可以在[此处](https://msdn.microsoft.com/en-us/library/ms191158)找到。以下部分概述了最常用的查询操作。


    ### Data Access Operators


    SQL Server有多个操作符可直接访问数据库存储，可总结为扫描和查找，如表1-3所示，并用于堆、聚集索引和非聚集索引等结构。扫描读取整个表或索引，而查找通过导航索引高效地检索行。正如表中所示，所有列出的结构都支持扫描操作，但只有聚集和非聚集索引支持查找操作。虽然这意味着您不能直接在堆结构上进行查找，但可以通过在其上创建非聚集索引来间接实现。


    **表 1-3**


    **数据访问操作符**


    | 结构 | 扫描 | 查找 |

    | --- | --- | --- |

    | 堆 | 表扫描 |   |

    | 聚集索引 | 聚集索引扫描 | 聚集索引查找 |

    | 非聚集索引 | 索引扫描 | 索引查找 |


    表1-3中未列出的一个附加操作是书签查找。在某些情况下，SQL Server可能需要使用非聚集索引快速在表中查找一行，但该索引本身并未覆盖查询所需的所有列。在这种情况下，查询处理器将使用书签查找，这实际上是一个非聚集索引查找加上一个聚集索引查找（或者是堆情况下的非聚集索引查找加上一个`RID`查找）。图形化计划将显示`Key
    Lookup`或`RID Lookup`操作符，尽管文本和XML计划会使用`lookup`关键字在基表上执行查找操作来显示我刚刚描述的操作。


    较新版本的SQL Server包含附加功能，使用内存优化表或列存储索引等结构，它们有自己的数据访问操作，也包括扫描和查找。内存优化表和列存储索引将在第7章中介绍。'
  raw: '### Operators


    Each node in an execution plan is an operator that, in order to perform its job,
    implements at least the following three methods:


    *   `Open()`: Causes an operator to initialize itself and set up any required
    data structures


    *   `GetRow()`: Requests a row from the operator


    *   `Close()`: Performs some cleanup operations and shuts itself down


    The execution of a query plan consists in calling `Open()` on the operator at
    the root of the tree, then calling `GetRow()` repeatedly until it returns false,
    and finally calling `Close()`. The operator at the root of the tree will in turn
    call the same methods on each of its child operators, and these will do the same
    on their child operators, and so on. For example, an operator can request rows
    from their child operators by calling their `GetRow()` method . This also means
    that the execution of a plan starts from left to right, if we are looking at a
    graphical execution plan in SQL Server Management Studio.


    Since the `GetRow()` method produces just one row at a time, the actual number
    of rows displayed in the query plan is usually the number of times the method
    was called on a specific operator, plus an additional call to `GetRow()` to indicate
    the end of the result set. At the leaf of the execution plan trees, there are
    usually data access operators that actually retrieve data from the storage engine
    accessing structures like tables, indexes, or heaps. Although the execution of
    a plan starts from left to right, data flows from right to left. As the rows flow
    from right to left, additional operations are performed on them including aggregations,
    sorting, filtering, joins, and so on.


    It is worth noting that processing one row at a time is the traditional query
    processing method used by SQL Server and that a new approach introduced with columnstore
    indexes can process a batch of rows at a time. Columnstore indexes were introduced
    with SQL Server 2012 and will be covered in detail in Chapter [7](#393702_2_En_7_Chapter.xhtml).


    Note


    Live Query Statistics, a query troubleshooting feature introduced with SQL Server
    2016, can be used to view a live query plan while the query is still in execution,
    allowing you to see query plan information in real time without the need to wait
    for the query to complete. Since the data required for this feature is also available
    in the SQL Server 2014 database engine, it can also work in that version if you
    are using SQL Server 2016 Management Studio. Live Query Statistics is covered
    in Chapter [6](#393702_2_En_6_Chapter.xhtml).


    A specific operation does not have to read all the rows as this is decided by
    the calling operator. A typical example is the top operator when called, for example,
    with a table scan. The table scan operator does not really need to scan the entire
    table if, for example, the top operator stops calling `GetRow()` after getting
    20 rows, returning false without calling the child operator anymore. By looking
    at the plan, you might think that the entire table was scanned, but you can verify
    the number of pages read by using STATISTICS IO or using the new `ActualRowsRead`
    attribute, which is available since SQL Server 2012 Service Pack 3, SQL Server
    2014 Service Pack 2, or SQL Server 2016\. You can see this behavior by running
    the following query:


    ```

    SELECT TOP(20) *

    FROM Sales.SalesOrderDetail

    ```


    Although all iterators require some small fixed amount of memory to perform its
    operations (store state, perform calculations, etc.), some operators require additional
    memory and are called memory-consuming operators. On these operators, which include
    sort, hash join, and hash aggregation, the amount of memory required is generally
    proportional to the number of estimated rows to be processed. More details on
    memory required by operators will be discussed later in this chapter. The query
    processor implements a large number of operators that you can find at [`https://msdn.microsoft.com/en-us/library/ms191158`](https://msdn.microsoft.com/en-us/library/ms191158).
    The following section includes an overview of the most used query operations .


    ### Data Access Operators


    SQL Server has several operators to directly access the database storage that
    can be summarized as scans and seeks, as shown in Table [1-3](#393702_2_En_1_Chapter.xhtml#Tab3),
    and used on structures like heaps, clustered indexes, and nonclustered indexes.
    A scan reads an entire table or index, while a seek efficiently retrieves rows
    by navigating an index. As you can see in the table, all the listed structures
    support scan operations, but only the clustered and nonclustered indexes support
    seek operations. Although this means that you cannot directly do a seek on a heap
    structure, you could indirectly do it by having a nonclustered index on it.


    Table 1-3


    Data Access Operators


    | Structure | Scan | Seek |

    | --- | --- | --- |

    | Heap | Table scan |   |

    | Clustered index | Clustered index scan | Clustered index seek |

    | Nonclustered index | Index scan | Index seek |


    An additional operation that is not listed in Table [1-3](#393702_2_En_1_Chapter.xhtml#Tab3),
    as it is not an operation per se, is a bookmark lookup. There might be cases when
    SQL Server needs to use a nonclustered index to quickly find a row in a table,
    but the index alone does not cover all the columns required by the query. In this
    case, the query processor would use a bookmark lookup, which in reality is a nonclustered
    index seek plus a clustered index seek (or a nonclustered index seek plus a RID
    lookup in the case of a heap). Graphical plans will show key lookup or RID lookup
    operators although text and XML plans would show the operations I have just described
    with a lookup keyword with the seek operation on the base table.


    Newer versions of SQL Server include additional features that use structures like
    memory-optimized tables or columnstore indexes that have their own data access
    operations, which also include scan and seeks . Memory-optimized tables and columnstore
    indexes will be covered in Chapter [7](#393702_2_En_7_Chapter.xhtml).'
  trans: '

    ### 操作符


    执行计划中的每个节点都是一个操作符，为了执行其工作，至少实现了以下三个方法：


    *   `Open()`：使操作符初始化自身并设置任何所需的数据结构

    *   `GetRow()`：向操作符请求一行数据

    *   `Close()`：执行一些清理操作并关闭自身


    查询计划的执行包括调用树根操作符的`Open()`，然后重复调用`GetRow()`直到其返回`false`，最后调用`Close()`。树根操作符又会依次调用其子操作符的相同方法，这些子操作符又对其子操作符执行相同操作，依此类推。例如，一个操作符可以通过调用其子操作符的`GetRow()`方法来请求行数据。这也意味着，如果我们在
    SQL Server Management Studio 中查看图形化的执行计划，计划的执行是从左到右开始的。


    由于`GetRow()`方法一次只产生一行，因此查询计划中显示的实际行数通常是特定操作符上调用该方法的次数，外加一次对`GetRow()`的额外调用以指示结果集结束。在执行计划树的叶子节点，通常存在数据访问操作符，它们实际从存储引擎检索数据，访问表、索引或堆等结构。尽管计划的执行是从左到右开始的，但数据流是从右向左的。随着行从右向左流动，会对其执行额外的操作，包括聚合、排序、过滤、连接等。


    值得注意的是，一次处理一行是 SQL Server 的传统查询处理方法，而通过列存储索引引入的新方法可以一次处理一批行。列存储索引在 SQL Server
    2012 中引入，将在第 7 章详细讨论。


    > **注意**

    >

    > 实时查询统计信息是 SQL Server 2016 引入的一项查询故障排除功能，可用于在查询仍在执行时查看实时查询计划，从而无需等待查询完成即可实时查看查询计划信息。由于此功能所需的数据在
    SQL Server 2014 数据库引擎中也可用，因此如果您使用 SQL Server 2016 Management Studio，它也可以在 SQL
    Server 2014 版本中工作。实时查询统计信息将在第 6 章中介绍。


    一个特定的操作不必读取所有行，这由调用操作符决定。一个典型的例子是`TOP`操作符与表扫描一起调用时。例如，如果`TOP`操作符在获取 20 行后停止调用`GetRow()`，则表扫描操作符实际上不需要扫描整个表，它返回`false`而不再调用子操作符。通过查看计划，您可能认为整个表都被扫描了，但您可以使用`STATISTICS
    IO`或新的`ActualRowsRead`属性（自 SQL Server 2012 Service Pack 3、SQL Server 2014 Service
    Pack 2 或 SQL Server 2016 起可用）来验证读取的页数。您可以通过运行以下查询看到此行为：


    ```

    SELECT TOP(20) *

    FROM Sales.SalesOrderDetail

    ```


    尽管所有迭代器都需要少量固定内存来执行其操作（存储状态、执行计算等），但有些操作符需要额外的内存，被称为内存消耗型操作符。对于这些操作符，包括排序、哈希连接和哈希聚合，所需的内存量通常与估计要处理的行数成正比。有关操作符所需内存的更多细节将在本章后面讨论。查询处理器实现了大量操作符，您可以在[此处](https://msdn.microsoft.com/en-us/library/ms191158)找到。以下部分概述了最常用的查询操作。


    ### 数据访问操作符


    SQL Server 有多个操作符可直接访问数据库存储，可总结为扫描和查找，如表 1-3 所示，并用于堆、聚集索引和非聚集索引等结构。扫描读取整个表或索引，而查找通过导航索引高效地检索行。正如表中所示，所有列出的结构都支持扫描操作，但只有聚集和非聚集索引支持查找操作。虽然这意味着您不能直接在堆结构上进行查找，但可以通过在其上创建非聚集索引来间接实现。


    **表 1-3**


    **数据访问操作符**


    | 结构 | 扫描 | 查找 |

    | --- | --- | --- |

    | 堆 | 表扫描 |   |

    | 聚集索引 | 聚集索引扫描 | 聚集索引查找 |

    | 非聚集索引 | 索引扫描 | 索引查找 |


    表 1-3 中未列出的一个附加操作是书签查找。在某些情况下，SQL Server 可能需要使用非聚集索引快速在表中查找一行，但该索引本身并未覆盖查询所需的所有列。在这种情况下，查询处理器将使用书签查找，这实际上是一个非聚集索引查找加上一个聚集索引查找（或者是堆情况下的非聚集索引查找加上一个`RID`查找）。图形化计划将显示`Key
    Lookup`或`RID Lookup`操作符，尽管文本和 XML 计划会使用`lookup`关键字在基表上执行查找操作来显示我刚刚描述的操作。


    较新版本的 SQL Server 包含附加功能，使用内存优化表或列存储索引等结构，它们有自己的数据访问操作，也包括扫描和查找。内存优化表和列存储索引将在第
    7 章中介绍。

    '
- fmt: '### Aggregations


    An aggregation is an operation where the values of multiple rows are grouped together
    to form a single value of more significant meaning or measurement. The result
    of an aggregation can be a single value, such as the average salary in a company,
    or it can be a per-group value, such as the average salary by department. The
    query processor has two operators to implement aggregations, stream aggregate
    and hash aggregate, which can be used to solve queries with aggregation functions
    such as `AVG` or `SUM` or the `GROUP BY` or `DISTINCT` clauses.


    Stream aggregate is used in queries with an aggregation function (like `AVG` or
    `SUM`) and no `GROUP BY` clause, and they always return a single value. Stream
    aggregate can also be used with `GROUP BY` queries with larger data sets when
    the data provided is already sorted by the `GROUP BY` clause predicate, for example,
    by using an index. A hash aggregate could be used for larger tables where data
    is not sorted, there is no need to sort it, and only a few groups are estimated.
    Finally, a query using the `DISTINCT` keyword can be implemented by a stream aggregate,
    a hash aggregate, or a distinct sort operator. The main difference with the distinct
    sort operator is that it both removes duplicates and sorts its input if no index
    is available. A query using the `DISTINCT` keyword can be rewritten as using the
    `GROUP BY` clause, and they will generate the same plan.


    We have seen so far that there might be operators that require the data to be
    already ordered. This is the case for the stream aggregate and also the case for
    the merge join, which we will see next. The query optimizer may employ an existing
    index, or it may explicitly introduce a sort operator to provide sorted data.
    In some other cases, data will be sorted by using hash algorithms, which is the
    case of the hash aggregation shown in this section, and the hash join, covered
    next. Both sorting and hashing are stop-and-go or blocking operations as they
    cannot produce any rows until they have consumed all their input (or at least
    the build input in the case of the hash join). As shown in the “Memory Grants”
    section later, incorrect estimation of the required memory can lead to performance
    problems.


    ### Joins


    A join is an operation that combines records from two tables based on some common
    information that usually is one or more columns defined as a join predicate. Since
    a join processes only two tables at a time, a query requesting data from n tables
    must be executed as a sequence of n – 1 joins. SQL Server uses three physical
    join operators to implement logical joins: nested loops join, merge join, and
    hash join. The best join algorithm depends on the specific scenario, and, as such,
    no algorithm is better than the others. Let’s quickly review how these three algorithms
    work and what their cost is.


    #### Nested Loops Join


    In the nested loops join algorithm, the operator for the outer input (shown at
    the top on a graphical plan) will be executed only once, while the operator for
    the inner input will be executed once for every row that qualifies for the join
    predicate. The cost of this algorithm is the size of the outer input multiplied
    by the size of the inner input. A nested loops join is more appropriate when the
    outer input of the join is small and the inner input has an index on the join
    key. The nested loops join can be especially effective when the inner input is
    potentially large, there is a supporting index, and only a few rows qualify for
    the join predicate, which also means only a few rows in the outer input will be
    searched.


    #### Merge Join


    A merge join requires an equality operator on the join predicate and its inputs
    sorted on this predicate. In this join algorithm, both inputs are executed only
    once, so its cost is the sum of reading both inputs. The query processor is not
    likely to choose a merge join if the inputs are not already sorted, although there
    may be cases, depending on the estimated cost, when it may decide to sort one
    or even both inputs. The merge join algorithm works by simultaneously reading
    and comparing a row from each input, returning the matching rows until one or
    both of the tables are completed.


    #### Hash Join


    Similar to the merge join, a hash join requires a join predicate with an equality
    operator, and both inputs are executed only once. However, unlike the merge join,
    it does not require its inputs to be sorted. A hash join works by creating a hash
    table in memory, called the build input. The second table, called the probe input,
    will be read and compared to the hash table, returning the rows that match. A
    performance problem that may occur with hash joins is a bad estimation of the
    memory required for the hash table, in which case there might not be enough memory
    allocated and may require SQL Server to use a workfile in `tempdb`. The query
    optimizer is likely to choose a hash join for large inputs. As with merge joins,
    the cost of a hash join is the sum of reading both inputs.


    ### Parallelism


    Parallelism is a mechanism used by SQL Server to execute parts of a query on multiple
    different processors simultaneously and then combine the output at the end to
    get the correct result. In order for the query processor to consider parallel
    plans, a SQL Server instance must have access to at least two processors or cores,
    or a hyperthreaded configuration, and both the affinity mask and the max degree
    of parallelism configuration options must allow the use of at least two processors.


    The `max degree of parallelism` advanced configuration option can be used to limit
    the number of processors that can be used in parallel plans. A default value of
    0 allows all available processors to be used in parallelism. On the other side,
    the `affinity mask` configuration option indicates which processors are eligible
    to run SQL Server threads. The default value of 0 means that all the processors
    can be used. SQL Server will only consider parallel plans for queries whose serial
    plans estimated cost exceeds the configured `cost threshold for parallelism`,
    whose default value is 5. This basically means that if you have the proper hardware,
    a SQL Server default configuration value would allow parallelism with no additional
    changes.


    Parallelism in SQL Server is implemented by the parallelism operator, also known
    as the exchange operator, which implements the `Distribute Streams`, `Gather Streams`,
    and `Repartition Streams` logical operations.


    Parallelism in SQL Server works by splitting a task among two or more instances
    of the same operator, each instance running in its own scheduler. For example,
    if a query is required to count the number of records on a small table, a single
    stream aggregate operator may be just enough to perform the task. But if the query
    is requested to count the number of records in a very large table, SQL Server
    may use two or more stream aggregate operators, which will run in parallel, and
    each will be assigned to count the number of records of a part of the table. Each
    stream aggregate operator will perform part of the work and would run in a different
    scheduler.


    ```sql

    -- 示例：可能生成并行计划的简单查询

    SELECT COUNT(*) FROM VeryLargeTable;

    ```'
