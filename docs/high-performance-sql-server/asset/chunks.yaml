  trans: '# SQL Server 数据收集器


    SQL Server 数据收集器是随 SQL Server 2008 引入的一项功能，是用于收集系统数据和解决性能问题的绝佳工具。它绝对是被使用最少的 SQL
    Server 工具之一，也是我过去广泛使用的一个工具。收集系统数据对于排查性能问题至关重要，因为常见的情况是，当问题没有症状时去调查，相关信息可能已经无法获取了。


    收集的信息包括以下内容：


    1.  磁盘使用情况：包括数据文件和事务日志文件的磁盘使用信息

    2.  查询统计信息：包括查询性能信息

    3.  服务器活动：包括大量的性能计数器和服务器活动信息，如等待、调度器、虚拟文件统计信息以及其他一些 DMV 的数据


    这三项对应于启用数据收集器时定义的三个收集集。你可以通过查看其属性来获取每个收集集所收集数据的具体详情。例如，在 `SQL Server Management
    Studio` 中，展开 `管理` 文件夹，选择 `数据收集`，然后选择 `系统数据收集集`，右键单击任一收集集并选择属性。


    作为示例，图 8-4 显示了 `服务器活动` 收集集属性，其中包含两个收集项。你可以检查第一个名为“服务器活动–DMV 快照”的收集项所使用的 `T-SQL`
    代码，该代码从多个 DMV 获取数据。列表中的第二个收集项名为“服务器活动–性能计数器”，显示了已定义的性能计数器。它包含一个很长的性能计数器列表，并且正如本章前面提到的，你可以通过包含额外的性能计数器来微调此列表。以下是这些性能计数器的一个非常小的示例列表：


    ![服务器活动收集集属性](img/393702_2_En_8_Fig4_HTML.jpg)


    *   `\Memory % Committed Bytes In Use`

    *   `\Memory \Available Bytes`

    *   `\Memory \Cache Bytes`

    *   `\Memory \Cache Faults/sec`

    *   `\Memory \Committed Bytes`

    *   `\Memory \Free & Zero Page List Bytes`

    *   `\Memory \Modified Page List Bytes`

    *   `\Memory \Pages/sec`

    *   `\Memory \Page Reads/sec`

    *   `\Memory \Page Writes/sec`

    *   ...


    该工具收集的数据被持久化存储在一个数据库中，你可以根据需要定义保留策略。最后，数据收集器包含报告，你可以用这些报告以美观的图形方式查看收集到的信息。你也可以创建自己的报告或编写自定义查询，直接从
    `数据收集器` 数据库获取数据。有关 `数据收集器` 的更多详情，请参阅 SQL Server 文档。


    ## 操作符级性能统计


    随 SQL Server 2016 引入，后来作为 SQL Server 2014 Service Pack 2 的一部分包含，现在可以在执行计划中看到操作符级别的性能信息，这对于查询执行故障排除来说是一条非常有用的信息。在早期版本的
    SQL Server 中，只能获取非常基础的信息，例如实际行数。


    查看 `XML` 计划将提供如此丰富且有价值的信息，可用于排查性能问题，例如实际读取的行数（这与 SQL 所有版本中都可用的实际行数不同）、实际 `CPU`
    时间、实际耗时、实际逻辑读取、实际物理读取、实际预读、实际 `LOB` 逻辑读取、实际 `LOB` 物理读取或实际 `LOB` 预读（显然在适用时）。


    例如，在 `AdventureWorks2017` 中运行以下查询并检查其生成的执行计划：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ```


    检查生成的计划将显示一个聚集索引扫描操作，其中包含以下信息，其中的 `RunTimeCountersPerThread` 元素，顾名思义，包含了每个线程的运行时性能信息计数器，如下
    `XML` 片段所示：


    ```xml

    <RunTimeCountersPerThread Thread="0" ActualRows="31465" ActualRowsRead="31465"
    ActualEndOfScans="1" ActualExecutions="1" ActualExecutionTime="2.0156" ... />

    ```


    尽管此性能信息是按线程显示的，但为简单起见，前面的示例是一个串行计划，并且只显示了线程 0。并行计划将按线程显示相同详细级别的信息。例如，在我的具有四个逻辑处理器的测试系统中，我可以看到
    `RunTimeCountersPerThread` 的五个条目：一个用于线程 0（即协调器或主线程），另外四个条目用于执行实际聚集索引扫描操作的每个实际线程。


    你可以通过请求实际执行计划来查看此信息。如我们所知，从 `SQL Server Management Studio` 获取实际执行计划很简单，且操作开销不大。从生产环境中应用程序执行的查询获取实际执行计划可能开销更大，因为它需要捕获所需的事件。作为替代方案，可以使用一个新的扩展事件
    `query_thread_profile` 来获取相同的信息。该事件在查询执行结束时由计划中使用的每个操作符和线程触发。此外，你可以使用该事件中的 `node_id`
    属性将其与计划中相应的操作符关联起来。


    ## 计划中的跟踪标志


    随 SQL Server 2014 Service Pack 2 和 SQL Server 2016 Service Pack 1 引入，执行计划现在会显示有关已启用跟踪标志的信息。这包括在优化时和执行时（如果请求了实际执行计划）启用的实例级别、会话级别和查询级别跟踪标志。会话和查询级别在计划中均显示为会话。


    注意：查询级别跟踪标志使用 `QUERYTRACEON` 查询提示来指示，尽管此提示已在 SQL Server 的多个版本中可用，但直到最近才被文档化，并且仅支持有限数量的跟踪标志，如
    [`https://support.microsoft.com/en-us/kb/2801413`](https://support.microsoft.com/en-us/kb/2801413)
    所示。


    通过使用这个新功能，你可以查看特定的行为是否是通过跟踪标志引入的，这会影响执行计划的选择，或者可能以其他方式影响查询性能。当你需要共享执行计划，而你又没有直接访问生成该计划的服务器时，此功能将特别有用。


    ## 总结


    本章介绍了通过监控或从 SQL Server 实例收集数据来进行性能故障排除。它还演示了主动收集和持久化这些数据以供后续分析，对于理解特定系统如何工作、创建基线以及了解性能何时偏离理想或预期行为是多么有益。


    性能问题可能由多种原因引起，其中有些甚至是良性的，例如网站客户和销售额的增加。因此，主动监控和理解性能趋势对于预见和应对这些变化至关重要。虽然不可能列出一个详尽的清单，但本章涵盖了最关键的性能计数器、动态管理对象和事件，以及一些用于显示和收集此类数据的工具。本书的其他章节以及与当前主题相关的部分也引入了一些其他的性能计数器、动态管理对象和事件。'
- fmt: '# 9. Indexing


    Indexing is, without a doubt, one of the best ways to improve the performance
    of your queries and applications, and this book would not be complete without
    covering this topic. This chapter explains how indexes work, how you can define
    the right indexes for your application, and how you can use some of the tools
    available in SQL Server to help you make the best possible decisions about your
    indexes. These tools include the missing indexes feature and the Database Engine
    Tuning Advisor, also called the DTA.


    This chapter will also show you why the lack of indexes or even poorly designed
    indexes can negatively impact your query execution performance. After all, having
    a proper index can be the difference between having to scan an entire table and
    just reading a couple of pages to find the required data. Indexing may sound like
    a trivial task, and, in fact, it is common to see beginner database professionals
    who usually just blindly create indexes on columns without a proper analysis or
    background about the database, schema, or queries, hoping the created indexes
    will just magically improve the performance of a database.


    Although a large part of this chapter focuses on using tools to design indexes,
    it is always emphasized that no recommendations from such tools should be applied
    without proper analysis and performance testing, as many times they are blindly
    implemented. In other words, it is up to the SQL Server professional to decide
    whether the recommended indexes make sense and to verify they really improve the
    performance of your queries. For this reason, the chapter starts by covering indexes,
    what they are, and in which situations they might be a good choice.


    In order for you to properly design indexes, you need to know how indexes work
    and in which situations they can be useful, in addition to understanding your
    workload and queries. Tools like the DTA can figure this out very well. If you
    feed them a proper workload and queries, they can help you and do most of the
    job. But it is finally up to you to decide if the provided recommendations are
    in fact a good choice for your queries.


    Do I recommend using the DTA all the time? Yes. Even for experienced database
    professionals, it is always interesting to see what the DTA recommends. After
    all, the DTA uses the query optimizer estimations to select the best indexing
    choices, which makes a lot of sense as it is also the query optimizer that decides
    if your index is useful or not when the query is finally executed. In addition,
    this tool can analyze thousands of choices in about the same time you just stare
    at a query trying to understand what the query does. But then again keep in mind
    that estimations are just that, estimations.


    Finally, this chapter focuses on traditional tables and indexes, such as clustered
    indexes, nonclustered indexes, and filtered indexes, which are either heaps or
    b-tree structures. Newer technologies such as In-Memory OLTP, also known as Hekaton,
    or columnstore indexes include new types of indexes that can greatly improve the
    performance of your databases. These new technologies are covered in detail in
    Chapter [7](#393702_2_En_7_Chapter.xhtml), which is dedicated to SQL Server in-memory
    features. There are some other types of less commonly used indexes like XML, spatial,
    or full-text indexes that are only needed for more special cases and will not
    be covered here.


    ## How SQL Server Uses Indexes


    It is usually difficult to anticipate all the required indexes during database
    design so, in many cases, new indexes are always added after the application has
    been put in production. Indexes are also being added as new business functionality
    or new code—for example, queries or stored procedures—are being introduced to
    the database. Although not intended to be a query tuning and optimization lesson,
    this chapter focuses mostly on the tools SQL Server has to make your job easier.
    Having said that, a good understanding of how SQL Server works is always important.
    In this section, I will show you how SQL Server uses indexes and how it can help
    you with the performance of your queries.


    Creating the right indexes could range from a very simple to an overwhelming task.
    I’ve seen many beginner SQL Server professionals who just say, well, my query
    `WHERE` clause uses column `col1` so I just have to create an index on `col1`.
    Right, it might help. But in production scenarios, the choices are usually many
    and more complicated, and creating the right indexes could be time-consuming.
    In addition to understanding how indexes work, before designing indexes for your
    database, you should have the following knowledge or at least consider some or
    all of the following points:


    1. Understand the database schema and workload, like OLTP, Reporting, Data Warehouse,
    or a mix of some of those. I am not sure if a pure OLTP workload really exists;
    every OLTP database I have ever seen includes some other non-OLTP queries as well.

    2. Understand your queries and especially which ones are your critical queries
    and which are most frequently executed.

    3. Understand the query predicates where an index can be used (e.g., an equality,
    nonequality, or complex expressions, more on this later).

    4. Understand whether to use clustered indexes or heaps on your table design.

    5. Understand whether to use clustered or nonclustered indexes.

    6. Understand whether you need single-column or multicolumn indexes and what the
    order of the columns could be.

    7. Understand what the query predicates are that may benefit from an index and
    what their selectivity is.

    8. Understand whether you need unique or filtered indexes.

    9. Understand whether you need included columns in addition to the index keys.

    10. Understand whether you need to change the default fill factor value.

    11. Understand whether you need to consider partitioning or filegroup placement.


    Note


    Selectivity is a measure of the number of rows that are returned by a predicate.
    A predicate returning a small number of rows is said to be highly selective.


    Having said that, the syntax for the `CREATE INDEX` statement has a large number
    of choices as you can see in the documentation at [`https://msdn.microsoft.com/en-us/library/ms188783.aspx`](https://msdn.microsoft.com/en-us/library/ms188783.aspx).
    Some options such as `ASC` (ascending) or `DESC` (descending) are rarely needed
    as ascending is the default when you create an index, and the database engine
    can navigate such indexes in either direction. You will need to explicitly use
    these options, however, if you need to transverse two or more columns and at least
    one of them is accessed in the opposite direction. As an example, if you have
    an index on both columns `col1` and `col2`, it could be used on a query using
    `ORDER BY col1, col2` but not on `ORDER BY col1, col2 DESC`. If helping such a
    query is important, you could define the index as `col1, col2 DESC` so it matches
    the requested query order and a potentially expensive sort operation can be avoided.'
  raw: '# 9. Indexing


    Indexing is, without a doubt, one of the best ways to improve the performance
    of your queries and applications, and this book would not be complete without
    covering this topic. This chapter explains how indexes work, how you can define
    the right indexes for your application, and how you can use some of the tools
    available in SQL Server to help you make the best possible decisions about your
    indexes. These tools include the missing indexes feature and the Database Engine
    Tuning Advisor, also called the DTA.


    This chapter will also show you why the lack of indexes or even poorly designed
    indexes can negatively impact your query execution performance. After all, having
    a proper index can be the difference between having to scan an entire table and
    just reading a couple of pages to find the required data. Indexing may sound like
    a trivial task, and, in fact, it is common to see beginner database professionals
    who usually just blindly create indexes on columns without a proper analysis or
    background about the database, schema, or queries, hoping the created indexes
    will just magically improve the performance of a database.


    Although a large part of this chapter focuses on using tools to design indexes,
    it is always emphasized that no recommendations from such tools should be applied
    without proper analysis and performance testing, as many times they are blindly
    implemented. In other words, it is up to the SQL Server professional to decide
    whether the recommended indexes make sense and to verify they really improve the
    performance of your queries. For this reason, the chapter starts by covering indexes,
    what they are, and in which situations they might be a good choice.


    In order for you to properly design indexes, you need to know how indexes work
    and in which situations they can be useful, in addition to understanding your
    workload and queries. Tools like the DTA can figure this out very well. If you
    feed them a proper workload and queries, they can help you and do most of the
    job. But it is finally up to you to decide if the provided recommendations are
    in fact a good choice for your queries.


    Do I recommend using the DTA all the time? Yes. Even for experienced database
    professionals, it is always interesting to see what the DTA recommends. After
    all, the DTA uses the query optimizer estimations to select the best indexing
    choices, which makes a lot of sense as it is also the query optimizer that decides
    if your index is useful or not when the query is finally executed. In addition,
    this tool can analyze thousands of choices in about the same time you just stare
    at a query trying to understand what the query does. But then again keep in mind
    that estimations are just that, estimations.


    Finally, this chapter focuses on traditional tables and indexes, such as clustered
    indexes, nonclustered indexes, and filtered indexes, which are either heaps or
    b-tree structures. Newer technologies such as In-Memory OLTP, also known as Hekaton,
    or columnstore indexes include new types of indexes that can greatly improve the
    performance of your databases. These new technologies are covered in detail in
    Chapter [7](#393702_2_En_7_Chapter.xhtml), which is dedicated to SQL Server in-memory
    features. There are some other types of less commonly used indexes like XML, spatial,
    or full-text indexes that are only needed for more special cases and will not
    be covered here.


