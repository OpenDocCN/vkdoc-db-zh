    ## 目录视图


    最后，尽管我们已经使用过一些查询存储目录视图，但让我们在本节中回顾所有这些视图。如前所述，收集的数据持久化在磁盘上，并存储在启用了查询存储的用户数据库中。查询存储目录视图如图
    6-10 所示，包含以下视图。


    | 视图名称 | 描述 |

    | --- | --- |

    | `sys.query_store_query_text` | 查询文本信息 |

    | `sys.query_store_query` | 查询信息，包括查询哈希、参数化、编译和优化信息 |

    | `sys.query_store_plan` | 执行计划，包括历史记录 |

    | `sys.query_store_runtime_stats` | 查询运行时统计信息。查询存储对每个已执行计划按时间间隔存储聚合统计信息。该间隔由配置选项
    `INTERVAL_LENGTH_MINUTES` 定义 |

    | `sys.query_store_runtime_stats_interval` | 间隔的开始和结束时间 |

    | `sys.query_context_settings` | 查询上下文设置信息 |


    ![查询存储目录视图](img/393702_2_En_6_Fig10_HTML.jpg)


    **图 6-10** 查询存储目录视图


    仅当查询执行结束时（包括如前面所示查询被取消或中断的情况）才会捕获收集的数据。`sys.query_store_query` 目录视图的 `query_hash`
    列是基于逻辑查询树的单个查询的 MD5 哈希值，它也包括优化器提示。此外，如前所述，如果相同的查询用于即席查询或存储过程中，或用于不同的存储过程中，则将被视为不同的查询。


    具有不同上下文设置（即使用影响执行计划的不同 SET 选项）的查询被视为不同的查询。影响执行计划的 SET 选项会影响执行计划的选择，因为它们会影响优化过程中常量表达式计算的结果等。影响执行计划的
    SET 选项如下：


    - `ANSI_NULL_DFLT_OFF`

    - `ANSI_NULL_DFLT_ON`

    - `ANSI_NULLS`

    - `ANSI_PADDING`

    - `ANSI_WARNINGS`

    - `ARITHABORT`

    - `CONCAT_NULL_YIELDS_NULL`

    - `DATEFIRST`

    - `DATEFORMAT`

    - `FORCEPLAN`

    - `LANGUAGE`

    - `NO_BROWSETABLE`

    - `NUMERIC_ROUNDABORT`

    - `QUOTED_IDENTIFIER`


    您可以通过阅读 Microsoft 白皮书 “Plan Caching in SQL Server 2008” 在 [`msdn.microsoft.com/en-us/library/ee343986(v=sql.100).aspx`](https://msdn.microsoft.com/en-us/library/ee343986(v=sql.100).aspx)
    找到有关影响执行计划的 SET 选项的更多信息。


    最后，除了前面介绍的 `sp_query_store_force_plan` 和 `sp_query_store_unforce_plan` 之外，查询存储还提供了以下存储过程：


    - `sp_query_store_remove_query`: 从查询存储中删除一个查询及其所有关联的计划和运行时统计信息。

    - `sp_query_store_remove_plan`: 从查询存储中删除特定计划。

    - `sp_query_store_reset_exec_stats`: 从查询存储中清除特定查询计划的运行时统计信息。

    - `sp_query_store_flush_db`: 将查询存储在内存中的部分数据刷新到磁盘。


    ## 实时查询统计信息


    实时查询统计信息是 SQL Server 2016 引入的另一个查询故障排除功能，您可以在查询仍在执行时使用它来查看实时查询计划。使用此功能（正如稍后解释的，它也可用于
    SQL Server 2014），您可以实时查看查询计划信息，而无需等待查询完成。实时查询统计信息对于确定查询的哪一部分可能运行缓慢，以及对那些要么永不完成、要么运行数小时后失败、要么需要很长时间才能完成的查询进行故障排除非常有用。通常，长时间执行查询面临的一个挑战是缺乏运行时执行统计信息（如
    `sys.dm_exec_query_stats` DMV 或 `SET STATISTICS IO` 和 `SET STATISTICS TIME` 语句提供的信息）或实际执行计划。通常，仅使用估计执行计划不足以解决查询问题。例如，由于它只提供估计信息，因此无法用于检测基数估计问题。


    实时查询统计信息使用通过 `sys.dm_exec_query_profiles` DMV 可用的信息。由于此 DMV 是在 SQL Server 2014
    中引入的，因此只要您使用 SQL Server 2016 Management Studio 或更高版本，实时查询统计信息也可以用于 SQL Server
    2014，因为该功能是在此工具中实现的。请记住，此功能使用大量系统资源，因此应仅在故障排除场景中使用。在 SQL Server Management Studio
    中有几种启用此功能的方法，包括在 SQL 编辑器工具栏上选择“包括实时查询统计信息”，或在“工具”菜单或“活动监视器”上使用类似选项。要测试实时查询统计信息如何工作，请使用前面三种方法中的任何一种启用该功能，然后针对
    AdventureWorks2017 数据库运行以下查询。


    ![实时查询统计信息执行](img/393702_2_En_6_Fig11_HTML.jpg)


    **图 6-11** 实时查询统计信息执行


    ```sql

    SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2

    ```


    这应该显示一个类似于图 6-11 中的计划，其中实时查询统计信息同时显示整体查询进度以及查询计划操作符的进度和已用时间，并且信息会在查询执行时实时更新。在撰写本文时，Hekaton
    内存中编译存储过程不受实时查询统计信息功能支持。


    目前，实时查询统计信息揭示的信息不如 DMV 多，因此您可能还想查询 DMV。为了更好地理解通过实时查询统计信息可用的信息，我们可以检查 DMV 提供的数据。DMV
    返回丰富的性能信息列表，包括行数、倒带次数、重新绑定次数、已用时间、CPU 时间、表或索引扫描次数、逻辑读取次数、物理读取次数、预读次数、LOB 逻辑读取次数、LOB
    物理读取次数和 LOB 预读次数等。（请参阅文档获取完整列表。）这些计数器是每个操作符、每个线程的。


    为了使用 `sys.dm_exec_query_profiles` DMV，您首先需要启用运行时执行计划统计信息收集，可以使用 `SET STATISTICS
    PROFILE ON` 或 `SET STATISTICS XML ON` 语句，在您将要运行的、作为实时统计信息焦点的查询所在的同一会话中启用。作为一个例子，请按照以下练习操作。打开一个您计划运行查询以获取信息的会话，并获取其会话
    ID。（您可以查看 SQL Server Management Studio 编辑器或运行类似 `SELECT @@SPID` 的语句。）运行以下语句：


    ```sql

    SET STATISTICS PROFILE ON

    ```


    现在运行


    ```sql

    SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2

    ```

