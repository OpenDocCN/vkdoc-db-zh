    Figure 1-10


    Plan with GbAggBeforeJoin rule disabled


    In this plan, we can see that the GbAggBeforeJoin optimization has been disabled,
    and the best plan found shows that the aggregation is now after the join. If you
    wonder why one plan was chosen against the other, you may want to check at the
    cost of the plan. The cost of the original plan is 0.309581, while the cost of
    the plan without the GbAggBeforeJoin optimization is 0.336582, so clearly the
    original is the winner. In cost, lower values are better, obviously. Although
    the numbers may not show a big difference, keep in mind these are very small tables
    and the difference would be bigger on real production databases.


    We could play with some other optimizations or rules shown previously. For example,
    we see that the final plan is using a merge join. Wonder what the query optimizer
    would do without a merge join? Run the following to disable the “Join to Sort
    Merge Join” rule:


    ```

    DBCC RULEOFF(''JNtoSM'')

    ```


