    and documented; however, it is not recommended unless you have really good reasons
    to do so. By the way, the FORCE ORDER hint specifies that the join order and aggregation
    placement indicated by the query syntax is preserved during query optimization.


    ### The Memo


    As indicated earlier, the memo is a memory structure used to store the alternatives
    generated and analyzed by the query optimizer. A new memo structure is created
    for each optimization, and it is only kept during the optimization process. Initially,
    the original logical tree created during parsing and binding will be stored in
    the memo. As transformation rules are applied during the optimization process,
    the new logical and physical operations will be stored here.


    As expected, the memo will store all the logical and physical operations created
    while applying transformation rules, as discussed before. The cost estimation
    component will estimate the cost of the physical operations stored here. There
    is no need to estimate the cost of logical operations.


    You could potentially see the contents of the memo structure using the undocumented
    trace flag 8608, to display the initial memo structure, and trace flag 8615, to
    display its final structure. Let us just try a quick example just for academic
    purposes. Let us work with the following query:


    ```

    DBCC TRACEON(3604)

    SELECT ProductID, ListPrice FROM Production.Product

    WHERE ListPrice > 90

    OPTION (RECOMPILE, QUERYTRACEON 8606)

    ```


    By using undocumented trace flag 8606, we could see that we have the following
    final logical tree (this is the tree representation as we showed earlier, and
    we are not inspecting the memo structure yet):


    ```

    LogOp_Select

    LogOp_Get TBL: Production.Product Production.Product TableID=482100758 TableReferenceID=0
    IsRow: COL: IsBaseRow1000

    ScaOp_Comp x_cmpGt

    ScaOp_Identifier QCOL: [AdventureWorks2017].[Production].[Product].ListPrice

    ScaOp_Const TI(money,ML=8) XVAR(money,Not Owned,Value=(10000units)=(900000))

    ```


    In the same way, we could see how each of these initial operators was stored in
    the memo, by using undocumented trace flag 8608\. Run the following query:


    ```

    DBCC TRACEON(3604)

    SELECT ProductID, ListPrice FROM Production.Product

    WHERE ListPrice > 90

    OPTION (RECOMPILE, QUERYTRACEON 8608)

    ```


    You will get the following output, which shows each operation from the original
    logical tree, for example, LogOp_Select or LogOp_Get, is now stored in the memo
    structure:


    ```

    DBCC execution completed. If DBCC printed error messages, contact your system
    administrator.

    --- Initial Memo Structure ---

    Root Group 4: Card=216 (Max=10000, Min=0)

    0 LogOp_Select 3 2 (Distance = 0)

    Group 3: Card=504 (Max=10000, Min=0)

    0 LogOp_Get (Distance = 0)

    Group 2:

    0 ScaOp_Comp  0 1 (Distance = 0)

    Group 1:

    0 ScaOp_Const  (Distance = 0)

    Group 0:

    0 ScaOp_Identifier  (Distance = 0)

    ```


    You can also try at your own risk the same query with undocumented trace flag
    8615 to display the final memo structure.


    ### Full Optimization


    We just reviewed how transformation rules work. Now let us define how the full
    optimization process works. As defined earlier, query optimization uses transformation
    rules to produce alternate equivalent plans and operations and heuristics to purge
    or limit the number of plans considered. A cost estimation component is also required
    to select the best plan. Remember, in our previous example, just a simple optimization
    such as moving a group by aggregate before the join changed the cost of the plan
    from 0.336582 to 0.309581 (more on cost estimation and the meaning of this cost
    value later).


    We also saw that the sys.dm_exec_query_transformation_stats DMV lists all the
    possible transformation rules which can be used by the query optimizer. Obviously,
    the query optimizer does not run all the transformation for every single query;
    it runs the transformations required depending on the query features. It will
    apply transformation related to joins to queries performing joins, transformation
    rules about aggregations only if the query uses aggregations, and so on. There
    will never be a need to apply rules for star join queries, columnstore indexes,
    or windowing functions to our previous example as they are not used by the query
    at all.


    Even further, it will not execute all applicable rules at the same time either.
    Not all the transformation rules are applied at the same time, and rather the
    query optimization process is performed in up to three steps or phases, and there
    is no need to execute all of them. This means that the query processor can find
    a good execution plan on the first phase and finish the optimization process.
    If there is not a good plan on this first phase, it will go to the second phase
    to once again try to find what the optimizer considers a good execution plan.
    If no plan is found, there will still be a third phase, where the best plan found
    would be returned. These phases are as follows:


    *   Search 0 or transaction processing phase: This phase will try to find a plan
    as quickly as possible without trying sophisticated transformations. This phase
    is optimal for small queries typically found on transaction processing systems,
    and it is used for queries with at least three tables.


    *   Search 1 or quick plan: Search 1 uses additional transformation rules, limited
    join reordering, and it is more appropriate for complex queries.


    *   Search 2 or full optimization: Search 2 is used for queries ranging from complex
    to very complex. A larger set of potential transformation rules, parallel operators,
    and other advanced optimization strategies are considered in this phase.


    There are a few ways, some documented and some undocumented, to see which phases
    are executed during a specific query optimization. Let us start with the documented
    way, or rather partially documented, which is using the sys.dm_exec_query_optimizer_info
    DMV.


    Note


    The sys.dm_exec_query_optimizer_info DMV is very interesting in many other ways,
    so I will discuss a few of them later in this section too.


    Run the following statement:


    ```

    SELECT * from sys.dm_exec_query_optimizer_info

    ```


