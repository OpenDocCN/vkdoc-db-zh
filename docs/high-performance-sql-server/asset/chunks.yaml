    ## 未文档化规则探索方法


    我们有另一种未文档化的方法来操作这些规则，这可以帮助我们更好地理解它们的工作原理。但请注意，这些是未文档化的语句，因此**绝不应该**在生产环境中使用。我甚至不建议在任何其他共享环境中使用它们，即使该环境是非生产环境。但您可以在个人的SQL
    Server安装中用于学习或故障排除目的。


    ### 会话级别禁用规则


    我们可以使用未文档化的`DBCC RULEOFF`语句，仅为当前会话禁用`GbAggBeforeJoin`规则。禁用意味着查询优化器将完全无法使用它。


    ```

    DBCC RULEOFF(''GbAggBeforeJoin'')

    ```


    再次运行我们之前的查询，现在将显示如图 [1-10](#393702_2_En_1_Chapter.xhtml#Fig10) 所示的执行计划。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig10_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig10_HTML.jpg)


    图 1-10：禁用 GbAggBeforeJoin 规则后的执行计划


    在这个计划中，我们可以看到 `GbAggBeforeJoin` 优化已被禁用，找到的最佳计划显示聚合现在位于连接之后。如果您想知道为什么选择一个计划而不是另一个，您可能需要检查计划的成本。原始计划的成本是
    0.309581，而没有 `GbAggBeforeJoin` 优化的计划成本是 0.336582，所以显然原始计划是赢家。成本方面，数值越低显然越好。尽管这些数字可能没有显示出很大的差异，但请记住，这些是非常小的表，在真实的生产数据库上差异会更大。


    我们还可以尝试使用之前展示的其他优化或规则。例如，我们看到最终计划使用了合并连接。想知道如果没有合并连接，查询优化器会怎么做吗？运行以下命令来禁用“连接转换为合并连接”规则：


    ```

    DBCC RULEOFF(''JNtoSM'')

    ```


    运行相同的查询现在将生成如图 [1-11](#393702_2_En_1_Chapter.xhtml#Fig11) 所示的计划。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig11_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig11_HTML.jpg)


    图 1-11：没有“连接转换为合并连接”优化后的执行计划


    最后，我之前提到过，查询优化器为优化聚合实现了两种物理算法：哈希聚合和流聚合。目前，图 [1-11](#393702_2_En_1_Chapter.xhtml#Fig11)
    中的计划使用的是哈希聚合。让我们也禁用哈希聚合。


    ```

    DBCC RULEOFF(''GbAggToHS'')

    ```


