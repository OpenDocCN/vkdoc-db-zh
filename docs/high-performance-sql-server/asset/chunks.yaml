  trans: '# 9. 索引


    毫无疑问，索引是提升查询和应用程序性能的最佳方法之一，本书若不涵盖此主题便不算完整。本章将阐述索引的工作原理，如何为应用程序定义合适的索引，以及如何利用 SQL
    Server 提供的一些工具（包括缺失索引功能和数据库引擎优化顾问，亦称 DTA）来帮助你做出最优的索引决策。


    本章还将说明为何缺乏索引，甚至设计不良的索引，会对查询执行性能产生负面影响。毕竟，拥有合适的索引可能意味着需要扫描整张表与只需读取几页数据就能找到所需信息之间的天壤之别。索引听起来可能像是一项琐碎的任务，事实上，经常可以看到初学者数据库专业人士通常只是盲目地在列上创建索引，而没有对数据库、架构或查询进行适当的分析或了解背景，寄希望于创建的索引能奇迹般地提升数据库性能。


    尽管本章很大一部分重点在于使用工具来设计索引，但始终强调，此类工具给出的任何建议都不应在未经适当分析和性能测试的情况下应用，因为很多时候它们是被盲目实施的。换言之，是否采纳推荐的索引并验证它们是否真的提升了查询性能，这取决于
    SQL Server 专业人士。为此，本章首先介绍索引是什么，以及在何种情况下它们可能是一个好的选择。


    为了正确设计索引，除了了解你的工作负载和查询外，你还需要知道索引如何工作以及在哪些情况下它们可能有用。像 DTA 这样的工具能很好地做到这一点。如果你为它们提供适当的工作负载和查询，它们可以协助你并完成大部分工作。但最终，你需要判断所提供的建议是否真的对你的查询有利。


    我是否推荐一直使用 DTA？是的。即使是经验丰富的数据库专业人士，看看 DTA 的建议也总是有益的。毕竟，DTA 使用查询优化器的估算来选择最佳的索引方案，这很有意义，因为在查询最终执行时，同样是查询优化器决定你的索引是否有用。此外，这个工具能在你仅仅盯着一条查询试图理解其作用的大致相同时间内，分析成千上万种选择。但请再次记住，估算终究只是估算。


    最后，本章重点讨论传统表和索引，例如聚集索引、非聚集索引和筛选索引，它们要么是堆，要么是 B 树结构。较新的技术，如内存中 OLTP（亦称 Hekaton）或列存储索引，包含了可以大幅提升数据库性能的新型索引。这些新技术将在第
    7 章中详细讨论，该章专门介绍 SQL Server 内存功能。还有一些其他类型较少使用的索引，如 XML、空间或全文索引，它们仅用于更特殊的情况，此处不作讨论。


    ## SQL Server 如何使用索引


    在数据库设计阶段通常很难预见所有必需的索引，因此在许多情况下，新索引总是在应用程序投入生产后才被添加。随着新的业务功能或新代码（例如查询或存储过程）被引入数据库，索引也会被添加。虽然本章并非旨在成为查询调优和优化课程，但它主要关注
    SQL Server 提供的、能让工作更轻松的工具。话虽如此，深入理解 SQL Server 的工作原理始终是重要的。在本节中，我将向你展示 SQL Server
    如何使用索引，以及这如何有助于提升你的查询性能。


    创建合适的索引可能从非常简单到极其繁重不等。我见过许多初学者 SQL Server 专业人士只是简单地说：好吧，我的查询 `WHERE` 子句使用了列 `col1`，所以我只需要在
    `col1` 上创建一个索引。对，这或许有帮助。但在生产场景中，选择通常很多且更复杂，创建合适的索引可能非常耗时。除了了解索引如何工作之外，在为数据库设计索引之前，你应该具备以下知识或至少考虑以下部分或全部要点：


    1.  理解数据库架构和工作负载类型，如 OLTP、报表、数据仓库或这些类型的某种混合。我不确定是否存在纯粹的 OLTP 工作负载；我所见过的每一个 OLTP
    数据库都包含一些其他非 OLTP 查询。

    2.  理解你的查询，尤其是哪些是关键查询，哪些是最常执行的查询。

    3.  理解索引可用的查询谓词（例如，等于、不等于或复杂表达式，稍后详述）。

    4.  理解在表设计中是使用聚集索引还是堆。

    5.  理解是使用聚集索引还是非聚集索引。

    6.  理解是需要单列索引还是多列索引，以及列的顺序可能是什么。

    7.  理解哪些查询谓词可能受益于索引及其选择性如何。

    8.  理解是否需要唯一索引或筛选索引。

    9.  理解除了索引键之外是否还需要包含列。

    10. 理解是否需要更改默认的填充因子值。

    11. 理解是否需要考虑分区或文件组放置。


    > 注意

    >

    > **选择性**是衡量谓词返回行数的一个指标。返回少量行的谓词被称为具有高选择性。


    如前所述，`CREATE INDEX` 语句的语法有大量的选项，你可以在文档 [`https://msdn.microsoft.com/en-us/library/ms188783.aspx`](https://msdn.microsoft.com/en-us/library/ms188783.aspx)
    中查看。一些选项如 `ASC`（升序）或 `DESC`（降序）很少需要，因为创建索引时升序是默认值，而且数据库引擎可以正反方向导航此类索引。但是，如果你需要遍历两个或更多列，并且其中至少一个列需要以相反方向访问，则需要显式使用这些选项。例如，如果你在列
    `col1` 和 `col2` 上都有索引，它可能用于 `ORDER BY col1, col2` 的查询，但不能用于 `ORDER BY col1, col2
    DESC` 的查询。如果帮助此类查询很重要，你可以将索引定义为 `col1, col2 DESC`，使其匹配请求的查询顺序，从而避免可能代价高昂的排序操作。'
- fmt: '# As suggested in the introduction to this chapter, although indexes have
    several uses, definitely the most important is navigation, that is, to find one
    or more rows as quickly and efficiently as possible. This is traditionally accomplished
    using b-tree structures. Index searches use random disk I/Os and are extremely
    effective for a small or limited number of rows, so they are essential for OLTP
    workloads. However, each random disk I/O usually requires reading a few database
    pages, so as the number of rows increases, it became more and more expensive.
    The reason this cost is high is because it requires traversing the b-tree structure
    from the root to the leaves, potentially reading a few database pages, and, although
    each page usually contains many rows, most of the time only one is needed.


    For this reason, when SQL Server is required to process a large number of rows,
    the query optimizer will most likely choose instead to perform sequential disk
    I/Os, such as a table scan or an index scan. Some query processing operations,
    such as sorting and hashing, heavily used in reporting and Data Warehouse workloads,
    will definitely benefit from this sequential disk I/O as well. This is the case,
    for example, of star join queries or queries using aggregations.


    Another interesting behavior is that random disk I/O cost greatly depends on the
    number of rows being accessed, which is totally different from sequential disk
    I/O in which the cost is usually the same disregarding the number of requested
    rows. For example, a table scan cost is the same if we request only 5% of the
    rows or the entire table. Random disk I/O cost, however, increases dramatically
    if we request only a few rows or if we request a few hundred or thousand rows,
    switching quickly from an extremely efficient operation to a very expensive one.
    In addition, random disk I/Os are potentially performed twice per search when
    the selected index does not cover the query as very likely the base table also
    has to be accessed as well. Finally, SQL Server could use more than one nonclustered
    index at a time if this helps the performance of the query. This operation is
    called index intersection, and, as usual, making this choice will be a cost-based
    decision.


    ### Where to Use Indexes


    The SQL Server query optimizer uses indexes in some of the following ways:


    1.  To find rows according to a filter predicate or a join predicate.

    2.  To deliver rows in a specific order.

    3.  If the index covers the query, meaning it includes all the required columns,
    the main table does not need to be accessed at all.


    Let us take a look at those choices in more detail. SQL Server can use an index
    on expressions such as the following:


    ```

    col1 = 12

    col2 = ''California''

    col3 > 30

    col4 IN (7, 23, 38)

    col5 BETWEEN 23 AND 38

    ```


    SQL Server may not be able to match an index on more complicated expressions such
    as the following:


    ```

    col6 = ABS(col1)

    col7 = (col1 * 3.1416) / col2

    ```


    As we will show later, equality vs. nonequality predicates greatly impact the
    selection of an index. Complex expressions are an interesting query processor
    limitation too. You may be surprised to learn that the query optimizer is not
    able to resolve some of these expressions. This means that not only the query
    optimizer cannot choose an index to find the rows that qualify for this expression,
    but it also cannot estimate the number of rows returned by the predicate. This
    estimation, called cardinality estimation, is usually provided by statistics,
    and it is essential for the query optimization process. Obviously, SQL Server
    will always return the correct data even with a bad cardinality estimation; it
    is just that getting the data may not be very efficient in these cases.


    For example, the following query will create an efficient execution plan using
    an index seek as the `SalesOrderDetail` table has an index on the `ProductID`
    column:


    ```sql

    USE AdventureWorks2017

    GO

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```


    However, if we try the following query adding a function, we will instead get
    the most expensive plan shown in Figure [9-1](#393702_2_En_9_Chapter.xhtml#Fig1),
    which has to perform a table scan, reading all the rows on the table and introducing
    a filter operator later in the process to return the correct data:


    ![../images/393702_2_En_9_Chapter/393702_2_En_9_Fig1_HTML.jpg](images/393702_2_En_9_Chapter/393702_2_En_9_Fig1_HTML.jpg)


    **Figure 9-1** Plan ignoring a nonclustered index


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ABS(ProductID) = 898

    ```


    Computed columns may be able to help in both cases—to have a better cardinality
    estimation and to create and use an index. They help by providing more information
    to the query optimizer as statistics are now automatically created when needed.
    You could also create an index on a computed column if it can help to find rows
    quickly.


    Although sometimes used by the SQL Server community, the term “sarg” (search argument)
    is not really used in the official documentation or the database research community
    so I would not use it here. Sarg refers to predicates that can be converted into
    an index operation, but it is an old term that originated from the old Sybase
    code and documentation and should no longer be applied to SQL Server. In *The
    Guru’s Guide to SQL Server Architecture and Internals*, Ken Henderson says, “The
    query optimizer in all recent versions of SQL Server is far more sophisticated
    in terms of its ability to use an index to speed up a query than it was in older
    versions of the product” (Addison-Wesley, 2004). Since the query optimizer’s ability
    to use indexes is no longer constrained to simple expressions, the term “sarg”
    is no longer relevant.'
