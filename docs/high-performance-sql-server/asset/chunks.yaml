  trans: '

    ## 使用基于磁盘的表


    由于我们希望在 OLTP 数据库上运行这些示例，我们现在将切换回 `AdventureWorks2017` 数据库。让我们在 `SalesOrderHeader`
    表上创建一个非聚集列存储索引：

    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX SalesOrderHeader_ncci ON Sales.SalesOrderHeader
    (

    SalesOrderID, RevisionNumber, OrderDate, DueDate, ShipDate, Status,

    OnlineOrderFlag, PurchaseOrderNumber, AccountNumber, CustomerID, SalesPersonID,

    TerritoryID, BillToAddressID, ShipToAddressID, ShipMethodID, CreditCardID,

    CreditCardApprovalCode, CurrencyRateID, SubTotal, TaxAmt, Freight, Comment,

    ModifiedDate)

    ```


    创建这样的索引就足以让我们开始运行分析查询了。例如，以下查询将使用非聚集列存储索引，如图 7-7 中的执行计划所示，其中扫描操作以批处理执行模式运行：


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig7_HTML.jpg](img/393702_2_En_7_Fig7_HTML.jpg)


    图 7-7：在 OLTP 表上的非聚集列存储索引


    ```sql

    SELECT MAX(TotalDue)

    FROM Sales.SalesOrderHeader

    ```


    当然，是否使用列存储索引或其他任何数据结构，是由查询优化器决定的。如果你查看上一个查询的成本，它将显示 0.017469 个成本单位。运行下一个查询，要求查询优化器不使用此类索引，则估计成本为
    0.569733，这显然更昂贵。你也可以尝试在不使用提示的情况下直接删除索引，以获得相同的行为和成本。

    ```sql

    SELECT MAX(TotalDue)

    FROM Sales.SalesOrderHeader

    OPTION (IGNORE_NONCLUSTERED_COLUMNSTORE_INDEX)

    ```


    注意：`IGNORE_NONCLUSTERED_COLUMNSTORE_INDEX` 提示要求查询优化器在查询中忽略任何非聚集列存储索引。在 `SQL Server`
    由于某些原因未能为你提供良好的执行计划时，你可以使用它。


    现在，我将展示一个使用筛选的非聚集列存储索引可能很有用的练习，但我们需要先删除当前的索引。尝试创建第二个非聚集列存储索引是不支持的，并会导致错误消息 35339。

    ```sql

    DROP INDEX Sales.SalesOrderHeader.SalesOrderHeader_ncci

    ```


    让我们假设“热门”数据的状态为 1。（出于某种原因，`AdventureWorks2017` 中没有实现这一点，整个表的值都是 5。）让我们更新几行具有最近发货日期的记录：

    ```sql

    UPDATE Sales.SalesOrderHeader

    SET Status = 1

    WHERE ShipDate = ''2014-07-07 00:00:00.000''

    ```


    运行以下语句以创建一个筛选的非聚集列存储索引，包含所有状态为 5 的行，这是表中的大部分行：

    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX SalesOrderHeader_ncci ON Sales.SalesOrderHeader
    (

    SalesOrderID, RevisionNumber, OrderDate, DueDate, ShipDate, Status,

    OnlineOrderFlag, PurchaseOrderNumber, AccountNumber, CustomerID, SalesPersonID,
    TerritoryID, BillToAddressID, ShipToAddressID, ShipMethodID, CreditCardID, CreditCardApprovalCode,
    CurrencyRateID, SubTotal, TaxAmt, Freight, Comment, CreditCardApprovalCode, CurrencyRateID,
    SubTotal, TaxAmt, Freight, Comment, ModifiedDate)

    WHERE Status = 5

    ```


    即使查询处理器可以从中受益并访问状态为 5 的所有数据，尝试运行先前的分析查询也不会选择列存储索引。原因很简单：没有廉价的方法来访问剩余的少数状态为 1 的行，而不对基表进行表扫描。因此，查询无论如何都在进行常规的表扫描。为了提供帮助，建议在
    `Status` 列上创建一个基于行的聚集或非聚集索引。让我们尝试第二种选择：

    ```sql

    CREATE INDEX IX_Status ON Sales.SalesOrderHeader(Status)

    ```


    一旦创建了这个行存储索引，运行先前的分析查询将使用非聚集列存储索引来处理大部分数据，并使用行存储非聚集索引来处理剩余的所需行，如图 7-8 中的部分执行计划所示。


    ![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig8_HTML.jpg](img/393702_2_En_7_Fig8_HTML.jpg)


    图 7-8：使用筛选列存储索引的查询


    像下面这样更复杂的分析查询将产生类似于图 7-8 的计划，对大部分数据使用列存储索引，加上使用行存储索引导航到额外的行：

    ```sql

    SELECT SalesPersonID, SUM(TotalDue), AVG(TotalDue)

    FROM Sales.SalesOrderHeader

    WHERE TerritoryID > 3

    GROUP BY SalesPersonID

    ```


    最后，为了清理，删除本练习中创建的两个索引，并将 `Status` 列设置回其原始值：

    ```sql

    DROP INDEX Sales.SalesOrderHeader.IX_Status

    DROP INDEX Sales.SalesOrderHeader.SalesOrderHeader_ncci

    UPDATE Sales.SalesOrderHeader

    SET Status = 5

    WHERE ShipDate = ''2014-07-07 00:00:00.000''

    ```

    '
- fmt: '## Using Memory-Optimized Tables


    We just saw how to create a nonclustered columnstore index on a disk-based OLTP
    table. There are some important differences if we want to perform the same operation
    on memory-optimized tables. First of all, we cannot use a nonclustered columnstore;
    only a columnstore clustered index is allowed. Also, as required by memory-optimized
    tables, the entire index has to fit in memory.


    However, this does not mean that this will require twice the memory as the columnstore
    index usually has a high level of compression. Data from Microsoft shows an average
    of ten times compression, so the additional columnstore index would only require
    about 10% more of memory than the memory-optimized table.


    Let’s create the table. Notice that the columnstore index is defined when the
    table is created. The index can also be created on an existing memory-optimized
    table, and an example on how to do that is shown later.


    ```

    CREATE TABLE SalesOrderHeader (

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL,

    INDEX SalesOrderHeader_cci CLUSTERED COLUMNSTORE)

    WITH (MEMORY_OPTIMIZED = ON)

    ```


    In order to run some basic analytical queries, we need to populate with some data.
    Trying to copy data directly from `AdventureWorks2017` would return the following
    error, so let’s do it in two steps, using a temporary table:


    ```

    Msg 41317, Level 16, State 5, Line 1

    A user transaction that accesses memory optimized tables or natively compiled
    modules cannot access more than one user database or databases model and msdb,
    and it cannot write to master.

    ```


    Run the following statement to copy the data to a temporary table :


    ```

    SELECT

    SalesOrderID,

    RevisionNumber,

    OrderDate,

    DueDate,

    ShipDate,

    Status,

    CustomerID,

    SalesPersonID,

    TerritoryID,

    BillToAddressID,

    ShipToAddressID,

    ShipMethodID,

    CreditCardID,

    CreditCardApprovalCode,

    CurrencyRateID,

    SubTotal,

    TaxAmt,

    Freight,

    Comment,

    ModifiedDate

    INTO #temp

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    ```


    And, finally, insert the data into the memory-optimized table:


    ```

    INSERT INTO dbo.SalesOrderHeader (

    SalesOrderID,

    RevisionNumber,

    OrderDate,

    DueDate,

    ShipDate,

    Status,

    CustomerID,

    SalesPersonID,

    TerritoryID,

    BillToAddressID,

    ShipToAddressID,

    ShipMethodID,

    CreditCardID,

    CreditCardApprovalCode,

    CurrencyRateID,

    SubTotal,

    TaxAmt,

    Freight,

    Comment,

    ModifiedDate)

    SELECT * FROM #temp

    ```


    After you successfully populated the table, you can run some analytical queries
    similar to the ones in the previous section , which in both cases will take benefit
    of the columnstore indexes created previously:


    ```

    SELECT MAX(SubTotal)

    FROM dbo.SalesOrderHeader

    SELECT SalesPersonID, SUM(SubTotal), AVG(SubTotal)

    FROM dbo.SalesOrderHeader

    WHERE TerritoryID > 3

    GROUP BY SalesPersonID

    ```


    You can also add a columnstore index to an existing memory-optimized table. As
    an example, follow the next code, assuming this table already exists:


    ```

    CREATE TABLE SalesOrderHeader (

    SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,

    RevisionNumber tinyint NOT NULL,

    OrderDate datetime NOT NULL,

    DueDate datetime NOT NULL,

    ShipDate datetime NULL,

    Status tinyint NOT NULL,

    CustomerID int NOT NULL,

    SalesPersonID int NULL,

    TerritoryID int NULL,

    BillToAddressID int NOT NULL,

    ShipToAddressID int NOT NULL,

    ShipMethodID int NOT NULL,

    CreditCardID int NULL,

    CreditCardApprovalCode varchar(15) NULL,

    CurrencyRateID int NULL,

    SubTotal money NOT NULL,

    TaxAmt money NOT NULL,

    Freight money NOT NULL,

    Comment nvarchar(128) NULL,

    ModifiedDate datetime NOT NULL)

    WITH (MEMORY_OPTIMIZED = ON)

    ```


    You just would need to add the following statement to get the same results as
    before:


    ```

    ALTER TABLE SalesOrderHeader ADD INDEX SalesOrderHeader_cci CLUSTERED COLUMNSTORE

    ```


    A current limitation is that you need to include all the columns of the in-memory
    table on the columnstore index. Nonclustered columnstore indexes are not supported
    with memory-optimized tables. Trying to add such an index with the `ALTER TABLE
    ADD INDEX` statement as shown previously would return the following error message:


    ```

    Msg 10794, Level 16, State 76, Line 1

    The feature ''NONCLUSTERED COLUMNSTORE'' is not supported with memory optimized
    tables.

    ```


    ## Summary


    This chapter covered SQL Server in-memory technologies, and, although the main
    purpose was to present databases optimized for memory, some related trends and
    paradigms were introduced as well including natively compiled modules, column-based
    databases, and batch processing. These new trends complement or compete with traditional
    technologies such as interpreted execution, row-based storage, and row-at-a-time
    query execution, respectively. Both columnstore indexes and In-Memory OLTP were
    originally released with serious limitations but have been improved in subsequent
    releases.


    We covered In-Memory OLTP and columnstore indexes, two features that, although
    originally released with some limitations, have been improved throughout several
    SQL Server releases. The chapter concluded by covering operational analytics that
    now allow a columnstore index to be created on either disk-based or memory-optimized
    transactional tables to allow the execution of real-time analytical queries.


    We expect the technologies and paradigms presented in this chapter to represent
    the future in SQL Server and relational database technologies in general.'
