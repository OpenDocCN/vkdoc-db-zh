  trans: '## 索引维护


    我们显然不希望为系统中的每一个查询都创建索引。索引应仅用于提升关键或频繁使用的查询的性能，因为创建过多的索引可能会引入新的性能问题。由于每个索引都需要维护——无论是通过数据库引擎在每次插入、更新或删除操作时自动维护，还是由数据库管理员在调度作业以消除碎片或更新统计信息时手动维护——因此应限制每个表创建的索引数量。此外，索引会占用宝贵的存储空间，并可能消耗更多内存资源。


    在表上创建索引的数量也取决于系统类型：是数据时刻变化的 **OLTP** 系统，还是数据仅定期变化（例如，使用 **ETL** 作业）的**数据仓库**。这两种工作负载的索引特性也不同：前者可能用于辅助单次查找，后者则用于辅助数据聚合。总而言之，拥有过多索引可能引发的部分问题如下：


    1.  更新操作（如 `INSERT`、`UPDATE`、`DELETE`、`MERGE` 等）的性能可能会受到负面影响。

    2.  用于索引重建或索引重新组织操作（以消除或最小化索引碎片）或统计信息更新的维护作业可能耗时更长，消耗更多资源，并扩大数据库维护窗口。

    3.  将需要更多的磁盘空间存储，并可能占用更多内存。


    关于碎片的更多详情，可以参考第 8 章，其中我们还讨论了 `sys.dm_db_index_physical_stats` 这个 **DMV**。


    ## 堆表


    堆表本身并非索引或 **b-tree** 结构，但在此仍需涵盖，因为任何表都必须配置为堆表或聚集索引。堆表是一种数据结构，其中的行以无特定顺序存储。尽管在堆表和聚集索引表之间做选择有时是一个值得讨论的话题，并且取决于您的数据库和工作负载，但通常设计良好的聚集索引具有能提供顺序的优势，这种顺序可用于范围扫描或返回排序数据。话虽如此，堆表也可用于其他一些情况，例如小表，或者当建议的候选聚集键可能大于堆表的行标识符（`RID`）时。`RID`
    仅长八字节，用作堆表中行的定位器。小表不仅可以配置为堆表，而且可能根本不需要非聚集索引，因为在某些情况下，扫描整个表的成本可能低于遍历任何替代的 **b-tree**
    索引结构。


    尽管大多数情况下建议使用聚集索引，因为它们提供了按顺序访问数据的好处，但使用堆表也有一些其他优势，特别是对于小表或为了避免页面拆分等问题并最小化碎片。关于选择聚集索引还是堆表的精彩讨论，请参阅位于
    [`https://technet.microsoft.com/en-us/library/cc917672.aspx`](https://technet.microsoft.com/en-us/library/cc917672.aspx)
    的文章“**Clustered Indexes and Heaps**”。


    ## 聚集索引


    通常，一个表会拥有，或者更准确地说，它本身就是一个聚集索引。前文“堆表”部分列出了一些例外情况。之前提到过一种情况，即当建议的聚集索引键过大，而堆表 `RID`
    仅使用八字节时。可以通过使用标识属性（可以是 `int` 或 `bigint` 数据类型，分别使用四字节和八字节）来实现与这个八字节堆表 `RID` 大小相似的东西。也就是说，您可以开始使用
    `int` 数据类型，如果需要，以后再升级为 `bigint`。如果您事先就知道需要 `bigint`，则应一开始就使用它，以避免日后在生产使用时进行转换维护。


    由于堆表不提供任何顺序，并且需要非聚集索引来查找特定行，因此聚集索引的优势在于已经提供了这种好处。但由于只有一个聚集键或顺序可用，因此必须明智地选择。聚集索引键的最佳选择是能辅助范围查询的那种，使得索引可以快速找到范围内的第一行，并沿着逻辑（希望也是物理）索引顺序找到其余行。范围查询是指使用大于或小于运算符（如
    `>`、`>=`、`<` 或 `<=`）或 `BETWEEN` 子句来过滤谓词的查询。聚集索引也有助于 `JOIN` 谓词，例如在定义主细表和外键约束时。如果
    `ORDER BY` 和 `GROUP BY` 查询基于表的聚集键，它们也将大大受益。


    多年来的最佳实践表明，出于性能和磁盘空间使用的考虑，建议聚集索引键具备唯一、窄小、静态且始终递增的特性。作为旁注，这四个建议对堆表来说不是问题，因为 `RID`
    遵循这四个特性。`RID` 相对窄小，因为它只使用八字节。让我们回顾一下为聚集索引键推荐的唯一、窄小、静态和始终递增这四个特性：


    1.  **唯一**：建议聚集索引键是唯一的。如果不是，将添加一个四字节的唯一标识符（uniqueifier）以确保其唯一性。

    2.  **窄小**：建议聚集键尽可能窄小，以节省磁盘存储和内存使用。这一点非常重要，因为每个非聚集索引行也会存储此聚集键，再次影响存储和内存使用。聚集键可以是一个或多个列，因此建议使用尽可能少的列或单个列，并且键要短。

    3.  **静态**：我认为这应该是聚集键的一个要求。易变的聚集键（可能发生变化或持续变化）可能导致严重的性能问题，因为行必须从一个页面移动到另一个页面，并导致页面拆分和碎片。

    4.  **始终递增**：建议使用始终递增的值，例如由 `IDENTITY` 属性提供的值。这有助于始终将新行添加到索引末尾的新页面中，避免页面拆分和碎片。然而，在高并发、非常密集的工作负载下，可能因所有新行始终插入到最后一个相同页面而引发争用问题。这个问题通常被称为“最后一页插入争用”，也可能影响堆表。


    **注意**


    如果“最后一页插入争用”问题是您应用程序中的严重瓶颈，您绝对应考虑使用内存优化表和内存中 **OLTP**。有关此 **SQL Server** 功能的详细信息，请参见第
    7 章。碎片和页面拆分在第 8 章中有更详细的介绍。


    最后，定义主键时，默认情况下也会使用 **T-SQL** 或 **SQL Server Management Studio** 创建一个聚集索引。要更改此行为（例如，改为创建非聚集索引），则需要明确指定。'
- fmt: '### Nonclustered Indexes


    Nonclustered indexes are the traditional secondary indexes used by SQL Server
    and can be created on the main clustered index or a heap. As such, they contain
    only one or a few columns of the base table as index keys. They can optionally
    contain one or more columns, not as keys, but as additional data to cover a query,
    using the `INCLUDE` clause.


    Nonclustered indexes are essential for exact match queries, which are used to
    find one or a few rows using equality comparisons. Like clustered indexes, they
    could be extremely useful for range queries but only if the index covers the query.
    Range queries could be helpful when using a noncovering index only for a very
    limited number of rows as the main table would in that case have to be accessed
    anyway, and, as mentioned earlier, random disk I/Os become very expensive as the
    number of rows increases. Nonclustered indexes can benefit `ORDER BY` and `GROUP
    BY` queries as well, again assuming they cover the query.


    As mentioned earlier, if you want to cover a column that is not required for searching
    purposes, it can be added to the index using the `INCLUDE` clause. For example,
    if column `col1` is included, it can be returned by a query, but you cannot use
    it to search in a filter predicate such as `col1 = 12`. I’ve seen in the documentation
    advice that an `INCLUDE` column can help you to avoid the index limitation of
    16 key columns or key size of 900 bytes, but if you are getting even close to
    those limits, you should rethink your index design. As mentioned earlier, it does
    not exactly play the same role as such columns cannot be used in a search predicate.
    A reminder that a nonclustered index also covers the clustered index keys, and
    like those, we should keep nonclustered indexes as small as possible.


    Finally , be aware that the term “nonclustered index” is also used with In-Memory
    OLTP and columnstore index technologies, so it is usually a good practice to always
    call the indexes in these new technologies memory-optimized nonclustered indexes
    and nonclustered columnstore indexes.


    Note


    The recommended properties for a clustered index (unique, narrow, static, and
    ever-increasing) either do not apply for nonclustered indexes or are less relevant.


    ### Filtered Indexes


    Filtered indexes were introduced with SQL Server 2008 and can be very helpful
    in situations where subsets of data can be eliminated from the query results.
    Typical scenarios for filtered indexes are data with sparse columns, data with
    large number of `NULL` values, or columns with heterogeneous data. Filtered indexes
    require a `WHERE` clause with a filter predicate indicating the rows to include
    in the index.


    Note


    Sparse columns, also introduced with SQL Server 2008, are columns that have an
    optimized storage for `NULL` values and are used in cases when a large number
    of the values in the column are `NULL`.


    ## Working with Indexes


    Let’s take a quick tour creating a few indexes for some basic scenarios, reviewing
    some of the concepts explained in this chapter and looking to the missing indexes
    feature along the way, showcasing some of its benefits and limitations. Create
    a new database called “test” and run the following code to populate it with some
    data. Keep in mind that the missing indexes feature is not an index tuning tool
    and, as discussed, has a number of limitations. It helps as it is always available
    and can provide feedback even without requesting it. If you need an index tuning
    tool, you should use the DTA.


    ```sql

    SELECT *

    INTO dbo.SalesOrderDetail

    FROM AdventureWorks2017.Sales.SalesOrderDetail

    GO

    SELECT *

    INTO dbo.SalesOrderHeader

    FROM AdventureWorks2017.Sales.SalesOrderHeader

    ```


    At this moment, we are ready to run some queries on the test database. Let’s try
    a few simple ones while looking at the produced execution plans. We will immediately
    see a couple of limitations of the missing indexes feature, the first one being
    that it cannot be used to recommend clustered indexes. The following query would
    be a great example for such a tool to recommend a clustered index as it would
    be helpful to perform a range scan by first finding the row with `SalesOrderID`
    50000 and navigating the index throughout `SalesOrderID` 70000:


    ```sql

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    ```


    We don’t see any missing index recommendation on the graphical execution plan.
    There is, however, a second limitation that may be blocking providing any recommendation.
    The produced plan is a trivial plan, and the missing indexes feature does not
    work with a trivial plan either. Missing index information is provided by the
    query optimizer during a full optimization, and since a trivial plan skips this
    optimization, no missing index information is provided. There are several ways
    to avoid a trivial plan although, in fact, you would rarely see this problem on
    your real-life databases, as even some minor changes make the query require a
    full optimization. A simple way to avoid a trivial plan is to use an undocumented
    trace flag to force a full optimization. This is trace flag 8757, and, as an undocumented
    trace flag, it is not supported and should not be used in a production environment.


    Trying the following query will create a full optimized plan, but the limitation
    with clustered indexes remains, and we still got no recommendation. By the way,
    the DTA, as covered later, would recommend a clustered index on the `SalesOrderID`
    column for this range query.


    ```sql

    SELECT * FROM SalesOrderHeader

    WHERE SalesOrderID BETWEEN 50000 AND 70000

    OPTION (QUERYTRACEON 8757)

    ```


    Many times the decision to create a clustered index and which keys to use for
    such index is performed during database or table design. Let’s manually create
    clustered indexes for both tables.


    ```sql

    CREATE CLUSTERED INDEX PK_SalesOrderHeader ON SalesOrderHeader(SalesOrderID)

    GO

    CREATE CLUSTERED INDEX PK_SalesOrderDetail

    ON SalesOrderDetail(SalesOrderID, SalesOrderDetailID)

    ```


    A foreign key constraint on this master-detail table would be a natural choice
    here. I may not go that far to cover an entire exercise but will just discuss
    the basic steps to see how the tools work. Let’s continue the exercise with a
    very simple query:


    ```sql

    SELECT * FROM SalesOrderDetail

    WHERE ProductID = 898

    ```


    This time, we get a clustered index scan, technically a table scan, with no missing
