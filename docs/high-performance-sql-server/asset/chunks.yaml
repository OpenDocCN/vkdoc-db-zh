    这是由 Microsoft 和 Red Hat 提出的配置文件，您可以看到，它包含了前面提到的系统定义的 `throughput-performance`
    配置文件。配置文件定义文件中的 `include` 参数允许您在现有配置文件的基础上构建自己的 `tuned` 配置文件。


