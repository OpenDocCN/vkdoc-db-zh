    ## 引言


    第 1 章介绍了 SQLOS 并解释了 SQL Server 使用的是一个**非抢占式调度器**。在这种调度器中，任务会周期性地主动释放控制权，并且只要其**时间量子**允许，就会一直运行，直到它在某个同步对象上被挂起。我们还了解到，在少数情况下，当任务运行
    SQL Server 域之外的代码时，它可以在抢占模式下运行。这两种情况都体现在图 5-1 中，该图展示了第 1 章已解释过的任务执行过程。在本章中，我们将扩展此主题，并解释该任务执行过程如何契合**等待与队列**性能方法论。


    ![../images/393702_2_En_5_Chapter/393702_2_En_5_Fig1_HTML.jpg](img/393702_2_En_5_Fig1_HTML.jpg)


    **图 5-1**

    任务执行过程


    从用户的角度来看，一个请求似乎总是在运行。毕竟，当我们运行一个查询时，它看起来一直在执行。但是，如图 5-1 所示，一个请求有时在运行，有时在等待。当它运行时，它正在使用处理器时间执行有用的工作。当它被挂起时，它在等待某物——可能是一个资源，可能是一个同步对象——或者可能在等待分配工作。此时，任务被称为处于**等待者列表**中。当它**可运行**时，任务已准备好执行，但它首先必须等待分配给它的处理器时间片，这被称为处于**可运行队列**中。在可运行队列中等待处理器时间所花费的时间称为**信号等待时间**。当这些部分中的任何一个耗时过长，无论是运行还是等待，理解其原因都非常重要，因为在这两种情况下都可能存在改进的可能。SQL
    Server 会跟踪关于请求为何等待、等待了多久以及在等待什么的所有信息。


    正如第 1 章所述，SQL Server 为每个逻辑处理器配备一个调度器，此外，还有一些用于内部任务的隐藏调度器，以及一个用于 DAC（专用管理员连接）的调度器。你可以通过查看`sys.dm_os_schedulers`动态管理视图（DMV）的`status`列来识别它们。该
    DMV 中一个有趣的列是`quantum_length_us`，它显示了调度器使用的时间量子，通常为 4 毫秒（或 4000 微秒）。另外，请记住图 5-1
    只展示了一个调度器或逻辑处理器。在一个拥有八个逻辑处理器的系统上，相同的流程会发生八次，可能同时有八个任务在运行并使用 CPU，以及八个等待者列表和可运行队列。


    一个特殊情况（也在图 5-1 中标出）是从“运行”到“可运行”的转换。当一个任务用完了它的时间量子而无需等待任何资源时，就可能发生这种情况。SQL Server
    的代码被设计用于检测代码中可能发生这种情况的区域，并在时间量子达到极限（通常为四毫秒）时，通过编程使其自愿让出处理器时间。即使该任务是系统中唯一的用户任务，它也必须让出时间，这在活动系统中显然并不常见。即使在几乎空闲的系统上，也存在其他作为后台系统进程运行的进程。


    从技术上讲，你可以使用`sys.dm_os_waiting_tasks` DMV 查看等待者列表。与稍后讨论的可运行队列不同，等待者列表没有任何特定的顺序，任务可以在任何时刻到达，并且由于它们等待的资源可能在任何时候变得可用，它们也可以随时停止等待并离开列表。一旦资源可用，任务将被发出信号，被放置到可运行队列的末尾。`sys.dm_os_waiting_tasks`
    DMV 的`resource_description`列显示了任务正在等待的资源，该列可能包含大量可能的值，这些值在 [`https://msdn.microsoft.com/en-us/library/ms188743.aspx`](https://msdn.microsoft.com/en-us/library/ms188743.aspx)
    上有很好的文档说明。


    可运行队列通常作为一个先进先出（FIFO）列表工作，这意味着任务被放入此队列并按照它们到达的顺序得到服务。唯一的例外是当配置了资源调控器来改变此优先级时，但那是一种特殊配置，并不常见。`sys.dm_os_schedulers`
    DMV 上的`runnable_tasks_count`列显示了特定调度器的可运行队列上的工作线程数。


    图 5-1 所示的任务执行过程将持续到查询执行完成，除了少数查询被取消、超时或因某些其他原因无法完成的情况。下一章将介绍的新功能**查询存储**，也允许你在需要对这些查询进行故障排除时跟踪它们。


    任务执行状态（运行、可运行或挂起）可以通过`sys.dm_exec_requests`的`status`列显示，正如第 1 章所述，该视图返回有关 SQL
    Server 中正在执行的每个请求的信息。SQL Server 中还有两种额外的任务执行状态：**后台**和**睡眠**。“后台”用于后台系统进程。“睡眠”可以用于任何连接（无论是用户进程还是系统进程），这些连接已完成工作，当前已连接但未积极工作或正等待工作。如前所述，等待信息可在多个
    DMV 和其他来源中找到，并将在下一节详细说明。


    如前所述，等待在 SQL Server 中随时发生，你可以通过多种方式查看此信息，包括运行`sys.dm_exec_requests` DMV。让我们构建一个简单的示例来向你展示如何获取此信息。打开一个
    SQL Server Management Studio 会话并运行以下语句：


    ```sql

    BEGIN TRANSACTION

    UPDATE Sales.SalesOrderDetail

    SET OrderQty = 5

    WHERE SalesOrderDetailID = 121317

    ```


    请注意，一个事务已启动但尚未提交或回滚。打开另一个会话并运行：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderDetailID = 121317

    ```


    然后打开第三个会话并运行：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    ```


    由于第一个会话在`Sales.SalesOrderDetail`表上持有一个未提交事务的锁，另外两个会话将被阻塞。在一个新的会话上运行：


    ```sql

    SELECT * FROM sys.dm_exec_requests r JOIN sys.dm_exec_sessions s

    ON r.session_id = s.session_id

    WHERE s.is_user_process = 1

    ```


    **注意**


    我们与`sys.dm_exec_sessions`进行连接的唯一原因是使用`is_user_process`列，该列指示会话是系统进程还是用户进程。我们不能再像在之前版本的
    SQL Server 中那样仅仅依赖`session_id`值。


    你应该会看到类似以下内容（为适应页面进行了汇总）：


    | session_id | status | Command | blocking_session_id | wait_type | last_wait_type
    | wait_resource |

    | --- | --- | --- | --- | --- | --- | --- |

    | 59 | suspended | SELECT | 55 | LCK_M_S | LCK_M_S | KEY: 5:72057594057588736
    (722affd45fb5) |

    | 64 | running | SELECT | 0 | NULL | MEMORY_ALLOCATION_EXT |   |

    | 65 | suspended | SELECT | 0 | CXPACKET | CXPACKET |   |

    '
- fmt: '## 会话阻塞场景分析


    会话 55 正在阻塞会话 59。（它也阻塞着 65，但此处未显示，稍后详述。）会话 59 是第一个 `SELECT`，正在等待 `KEY` 资源。会话 65
    是第二个 `SELECT`，正在等待 `CXPACKET`。会话 55 是未提交的事务，它甚至没有出现在 `sys.dm_exec_requests` 中，因为从技术上讲它当前没有执行任何操作。`UPDATE`
    语句已完成，但事务仍未关闭。会话 59 和 65 处于挂起状态并位于等待者列表中。即使在这个拥有四个处理器的系统中，也只有一个任务（64，即正在运行 DMV
    的会话）在运行。


    在第一个会话上运行以下语句：


    ```

    ROLLBACK TRANSACTION

    ```


    > **注意**

    > 在使用 `sys.dm_exec_requests` DMV 分析等待时，一个主要限制是在分析并行查询时。此 DMV 每个会话只显示一条记录，因此它只显示父任务的信息，而不显示子任务的信息。本章稍后将提供一种解决并行查询问题的替代方案。


    事务回滚后可能发生多种情况；我将简要描述我捕获到的情况。实际上，这是一个非常简化的示例。在执行这些任务期间会发生更多等待，如下一节所示，如果需要详细的等待信息，SQL
    Server 提供了捕获这些等待的方法。


    事务回滚后，会话 59 所需的 `KEY` 资源变为可用，因此会话 59 被唤醒并置于可运行队列中。最终，会话 59 获得处理器时间并能够完成其工作。会话
    59 有可能再次等待其他资源，但通过手动运行此 DMV 很难捕获这些等待。然而，如前所述，可以通过其他方法捕获。


    会话 65 也得以继续。一旦它等待的资源可用，它就被置于可运行队列中，最终获得处理器时间并继续运行。由于这是一个更昂贵的查询，它很可能发生了更多等待，并可能多次被置于等待者列表和可运行队列中。我捕获到的是会话
    65 在 `ASYNC_NETWORK_IO` 上的等待者列表中。此查询请求的排序可能运行得足够快，以至于您可能看不到它，或者您可能会看到其他等待。可运行状态可能非常短暂，除非您查看更繁忙的系统，否则无法捕获它。


    | session_id | status   | command | blocking_session_id | wait_type         |
    last_wait_type    | wait_resource |

    | ---------- | -------- | ------- | ------------------- | ----------------- |
    ----------------- | ------------- |

    | 64         | running  | SELECT  | 0                   | NULL              |
    MEMORY_ALLOCATION_EXT |               |

    | 65         | suspended| SELECT  | 0                   | ASYNC_NETWORK_IO  |
    ASYNC_NETWORK_IO  |               |


    最后，如果再次运行 DMV，两个 `SELECT` 语句都将完成，因此您将不再看到 DMV 的任何输出，除了运行 DMV 的会话 64。


    这个简化场景总结在图 5-2 中，其中包括了另外两个会话（52 和 53），它们未在 DMV 中捕获，但为完整起见而显示，因为在仅包含少量事务的示例中捕获可运行任务很困难。


    ![任务执行过程示例](images/393702_2_En_5_Chapter/393702_2_En_5_Fig2_HTML.jpg)


    **图 5-2** 任务执行过程示例


    在图 5-2 中，spid 64 最初正在执行，spid 52 位于可运行队列顶部。在 spid 64 完成（或因任何原因离开运行状态）后，spid 52
    从可运行状态转为运行状态，而 spid 53 现在位于可运行队列顶部。由于 spid 59 等待的锁现已可用，它被唤醒并移动到可运行队列末尾。在短时间内，spid
    65 仍位于等待者列表中，如图 5-2 所示，但由于它间接等待与 59 相同的资源，它最终也将被移动到可运行队列。


    ## 系统进程的等待


    您可能已经注意到我们过滤掉了系统进程。SQL Server 还有一些专用线程，我们通常不应该担心它们的等待。例如，在检查等待类型和等待时间的同时，运行以下查询几次：


    ```

    SELECT * FROM sys.dm_exec_requests

    WHERE wait_type = ''REQUEST_FOR_DEADLOCK_SEARCH''

    ```


    死锁监视器通常在两次死锁检测事件之间等待 `REQUEST_FOR_DEADLOCK_SEARCH` 等待类型，最长可达五秒。`wait_time` 永远不会超过五秒（以毫秒计）。`command`
    列显示内部系统进程执行的任务类型，本例中是 `LOCK MONITOR`。还有其他几个具有类似等待的系统进程，如稍后的“计时器等待类型”部分所示。


    尽管在 `sys.dm_exec_requests` 上显示的等待时间会被重置，但它实际上会被累积并可在 `sys.dm_os_wait_stats` 中获取。例如，以下查询


    ```

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''REQUEST_FOR_DEADLOCK_SEARCH''

    ```


    可能显示以下输出。


    | wait_type                  | waiting_tasks_count | wait_time_ms | max_wait_time_ms
    | signal_wait_time_ms |

    | -------------------------- | ------------------- | ------------ | ----------------
    | ------------------- |

    | REQUEST_FOR_DEADLOCK_SEARCH | 20                  | 100118       | 5014             |
    100118              |


    此信息显示时间被重置了 20 次；换句话说，发生了 20 次独立的等待，最大等待时间为 5014 毫秒。由于该进程并非严格等待某个资源，信号等待时间与等待时间相同。


    ## 等待信息的收集


    尽管我们可以在 `sys.dm_exec_requests` 和 `sys.dm_os_waiting_tasks` 上看到与等待相关的信息，但这些 DMV
    主要侧重于实时信息，或者在我们需要关于当前正在执行的特定进程的数据时非常有用。很多时候，我们希望累积统计等待信息或收集这些信息以供后续分析。主要有三种方法可以实现此目标：使用
    `sys.dm_os_waits` DMV、SQL Server 扩展事件，以及 SQL Server 2016 引入的 `sys.dm_exec_session_wait_stats`
    DMV。让我们逐一回顾，并了解在何种场景下每种方法可能是最佳选择。'
  raw: 'Session 55 is blocking session 59\. (It is also blocking 65, but not shown
    here, more on that later.) Session 59 is the first `SELECT` and it is waiting
    on a `KEY` resource. Session 65 is the second `SELECT` and is waiting on `CXPACKET`
    waits. Session 55 is the open transaction, and it is not even shown on `sys.dm_exec_requests`
    as it is currently technically not executing anything. The `UPDATE` statement
    has been completed, but the transaction is still open. Sessions 59 and 65 are
    suspended and on the waiter list. Even in this system with four processors, only
    one task is running, 64, which is the session running the DMV.


    Run the following statement on the first session:


    ```

    ROLLBACK TRANSACTION

    ```


    Note


    A major limitation when looking at waits using the `sys.dm_exec_requests` DMVs
    is when analyzing parallel queries. This DMV only displays an entry per session,
    so it only displays information about the parent task and not about the child
    tasks. An alternate solution to troubleshoot these parallel queries will be provided
    later in the chapter.


    Multiple scenarios can happen after the transaction is rolled back; I will describe
    the scenario I captured shortly. Now, in reality, this is a very simplified example.
    Many more waits are happening during the execution of these tasks, and, as shown
    in the next section, SQL Server provides methods to capture those waits if we
    need that detail of wait information.


    After the transaction was rolled back, the `KEY` resource required by session
    59 became available, so session 59 was signaled and placed in the runnable queue.
    Eventually, session 59 got access to processor time and was able to finish their
    work. There is the possibility that session 59 could have waited again for something
    else, but it would have been difficult to capture those waits by manually running
    this DMV. It can be captured by other methods, however, as mentioned earlier.


    Session 65 was also able to continue. Once the resource it was waiting for was
    available, it was placed on the runnable queue and eventually got processor time
    and continued running. Since this is a more expensive query, it is very likely
    it got some more waits and placed on the waiter list and runnable queue probably
    multiple times. The one I captured is where session 65 is on the waiter list on
    `ASYNC_NETWORK_IO` . The sort requested by this query may run fast enough so you
    may not even see it or you may see some other wait. Runnable status may be so
    brief that you cannot capture it unless you look at a busier system.


    | session_id | status | command | blocking_session_id | wait_type | last_wait_type
    | wait_resource |

    | --- | --- | --- | --- | --- | --- | --- |

    | 64 | running | SELECT | 0 | NULL | MEMORY_ALLOCATION_EXT |   |

    | 65 | suspended | SELECT | 0 | ASYNC_NETWORK_IO | ASYNC_NETWORK_IO |   |


    Finally, if you run the DMV again, both `SELECT` statements will be completed
    so you no longer see any output from the DMV, except session 64 for the DMV execution.


    This simplified scenario is summarized in Figure [5-2](#393702_2_En_5_Chapter.xhtml#Fig2),
    which includes two additional sessions, 52 and 53, not captured on the DMVs but
    shown for completeness, as runnable tasks are hard to capture in an example with
    just a few transactions.


    ![../images/393702_2_En_5_Chapter/393702_2_En_5_Fig2_HTML.jpg](images/393702_2_En_5_Chapter/393702_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Task execution process example


    In Figure [5-2](#393702_2_En_5_Chapter.xhtml#Fig2), spid 64 is originally executing,
    and spid 52 is at the top of the runnable queue. After spid 64 completes (or leaves
    the running state for any of the reasons mentioned earlier), spid 52 moves from
    runnable to running, and spid 53 is now at the top of the runnable queue. Since
    the lock that spid 59 was waiting on is now available, it is signaled to move
    to the end of the runnable queue. For a brief time, spid 65 remains on the waiter
    list, as shown in Figure [5-2](#393702_2_En_5_Chapter.xhtml#Fig2), but since it
    is indirectly waiting for the same resource as 59, it will be eventually moved
    to the runnable queue as well.


    You may have noticed that we filtered out the system processes. SQL Server also
    has some dedicated threads, and we usually should not worry about their waits.
    For example, run the following query a few times while examining the wait type
    and wait time:


    ```

    SELECT * FROM sys.dm_exec_requests

    WHERE wait_type = ''REQUEST_FOR_DEADLOCK_SEARCH''

    ```


    The lock or deadlock monitor is usually waiting on a `REQUEST_FOR_DEADLOCK_SEARCH`
    wait type up to five seconds between deadlock detection events. `wait_time` will
    never be more than five seconds (measured in milliseconds). The command column
    shows the type of task the internal system process performs, in this case `LOCK
    MONITOR`. There are several other system processes with similar waits as shown
    later in the “Timer Wait Types” section.


    Although the wait time is reset as shown on `sys.dm_exec_requests` , it is in
    fact accumulated and available on `sys.dm_os_wait_stats` . For example, the following
    query


    ```

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''REQUEST_FOR_DEADLOCK_SEARCH''

    ```


    can show the next output.


    | wait_type | waiting_tasks_count | wait_time_ms | max_wait_time_ms | signal_wait_time_ms
    |

    | --- | --- | --- | --- | --- |

    | REQUEST_FOR_DEADLOCK_SEARCH | 20 | 100118 | 5014 | 100118 |


    This information shows that the time was reset 20 times; in other words, there
    have been 20 separate waits, and the maximum wait time was 5014 milliseconds.
    Since the process is not waiting for a resource per se, the signal wait time is
    the same as the wait time.


    ## Wait Information


    Although we can see wait-related information on `sys.dm_exec_requests` and `sys.dm_os_waiting_tasks`
    , these DMVs are most focused on real-time information or useful when we need
    data about a particular process that is currently executing. Many times we would
    want to accumulate the statistical wait information or collect it for later analysis.
    There are three main ways to achieve this, using the `sys.dm_os_waits` DMV , SQL
    Server Extended Events, and, introduced with SQL Server 2016, the `sys.dm_exec_session_wait_stats`
    DMV . Let us review each one and see in which scenarios each one could be the
    best choice.'
