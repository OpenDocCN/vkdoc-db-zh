  raw: '## Latches and Spinlocks


    Latches and spinlocks are two synchronization mechanisms considered an important
    part of a waits performance methodology. As covered in Chapter [1](#393702_2_En_1_Chapter.xhtml),
    latches are short-term lightweight synchronization primitives used to protect
    memory structures for concurrent access and multiple wait types, using the `PAGELATCH`,
    `PAGEIOLATCH`, `LATCH`, and `TRAN_MARKLATCH` prefixes, available on the previously
    mentioned DMVs to track them. Since probably the most common latch problem is
    related to contention on allocation pages in `tempdb`, I cover them in more detail
    in Chapter [4](#393702_2_En_4_Chapter.xhtml). You can get additional information
    about latch contention by reading the Microsoft white paper “Diagnosing and Resolving
    Latch Contention on SQL Server,” which you can find at [Diagnose and resolve latch
    contention on SQL Server](https://docs.microsoft.com/en-us/sql/relational-databases/diagnose-resolve-latch-contention).


    As also introduced in Chapter [1](#393702_2_En_1_Chapter.xhtml), spinlocks are
    lightweight synchronization primitives used by the SQL Server engine to protect
    access to some internal data structures, but they go to a deeper level than a
    latch. Structures protected by spinlocks are usually held only for an extremely
    short time, which makes them a better choice compared to latches. Using a latch
    will require the task to yield its processor time if the resource is not available,
    which is a very expensive operation. Different from latches, though, spinlocks
    will run in a loop for a period of time periodically checking for the availability
    of a resource.


    Although it is very unlikely that you will have to troubleshoot problems with
    spinlocks, spinlock contention could happen on some systems that have both high
    concurrency and a high number of processors. At the same time that new versions
    of SQL Server continue to improve scalability, the new hardware has more and more
    processors that compete for resources and, in some cases, create concurrency problems,
    which usually result in a high CPU usage. But as suggested, just because you see
    high concurrency and high CPU usage, you should not immediately assume it is spinlock
    contention and try some other more common troubleshooting techniques first.


    The starting point to troubleshoot spinlock contention is through the `sys.dm_os_spinlock_stats`
    DMV, which until recently did not even appear in the documentation and currently
    is just barely documented. When almost all of the 396 spinlock type descriptions
    just show as “Internal use only,” it sure still remains as a very obscure topic.


    So currently, the main source for information to troubleshoot spinlock contention
    still is the Microsoft white paper “Diagnosing and Resolving Spinlock Contention
    on SQL Server,” which you can find at [Diagnose and resolve spinlock contention
    on SQL Server](https://docs.microsoft.com/en-us/sql/relational-databases/diagnose-resolve-spinlock-contention).
    As a matter of fact, troubleshooting spinlock contention could be a very advanced
    topic that may require deep knowledge of the SQL Server engine. For example, the
    case mentioned in the white paper required involvement of the SQL Server customer
    support team and finally led to the discovery of a bug, which has been since corrected.


    Let’s run the DMV:


    ```

    SELECT * FROM sys.dm_os_spinlock_stats

    ORDER BY spins DESC

    ```


    You could also visualize the different spinlock types querying the following catalog
    (although it no longer works for SQL Server 2019):


    ```

    SELECT map_value, map_key, name FROM sys.dm_xe_map_values

    WHERE name = ''spinlock_types''

    ```


    I get 396 rows querying sys.dm_os_spinlock_stats in SQL Server 2019, a sample
    of which is next. Again, similar to other waits, large numbers alone do not mean
    a problem with spinlock contention.


    | name | collisions | spins | spins_per_collision | sleep_time | backoffs |

    | --- | --- | --- | --- | --- | --- |

    | LOCK_HASH | 107232 | 31777250 | 296.3411 | 15 | 7623 |

    | RESQUEUE | 72620 | 21237701 | 292.4497 | 29 | 3134 |

    | SOS_SCHEDULER | 16726 | 14204588 | 849.252 | 2 | 1154 |

    | BLOCKER_ENUM | 18572 | 5098250 | 274.5127 | 0 | 267 |

    | SECURITY_CACHE | 12965 | 4939500 | 380.9873 | 0 | 2643 |

    | SOS_SUSPEND_QUEUE | 5648 | 1975750 | 349.8141 | 14 | 157 |


    Let’s briefly discuss the meaning of the columns. A collision happens when a task
    tries to access a resource that is not available and the DMV keeps the number
    of collisions for each specific spinlock type. In the same way, if the resource
    is not available, a task executes a loop waiting for the resource, and every loop
    is counted as spin. A spin uses CPU, which is why spinlock contention symptom
    shows as high CPU usage. A thread does not attempt to access the resource on each
    spin, as you can see by looking at the `spins_per_collision` column. Instead,
    a task will perform multiple spins before attempting to access a resource again.
    As you guessed, `spins_per_collision` is just collision divided by spins. A thread
    will not continue to spin indefinitely, so after a certain number of spins, it
    may determine to avoid using excessive CPU and yield. This operation is called
    a backoff. After a backoff operation, the thread will go to sleep.


    Similar to wait statistics, latches and spinlock statistics can also be cleared
    using the `DBCC SQLPERF` statement. The following will clear latches statistics:


    ```

    DBCC SQLPERF(''sys.dm_os_latch_stats'', CLEAR)

    ```


    The following statement will clear spinlock statistics. But, once again, clearing
    spinlock statistics is undocumented, and it is only available since SQL Server
    2012.


    ```

    DBCC SQLPERF(''sys.dm_os_spinlock_stats'', CLEAR)

    ```


    ## Common Waits


    Finally, since there are a large number of wait types and it would be impossible
    to describe them all, a chapter about waits wouldn’t be complete without describing
    at least the most common ones, along with recommendations on how to fix or minimize
    them. In fact, with so many waits available, there is currently no single document
    to describe them all. The original white paper described earlier, “SQL Server
    2005 Waits and Queues,” used to be the official wait list, but it has not been
    updated since 2006\. The `sys.dm_os_wait_stats` SQL Server documentation at [`https://msdn.microsoft.com/en-us/library/ms179984.aspx`](https://msdn.microsoft.com/en-us/library/ms179984.aspx)
    documents a large number of waits, but there are still dozens or hundreds with
    little or no documentation. At the time of this writing, Paul Randal, formerly
    a Program Manager with the SQL Server Storage Engine team, has published a wait
    types and latch classes library, but it is also a work in progress. You can find
    these two sources at [`www.sqlskills.com/help/waits/`](http://www.sqlskills.com/help/waits/)
    and [`www.sqlskills.com/help/latches`](http://www.sqlskills.com/help/latches).
    In this section, I’ll cover some of the most common wait types you will see in
    your production environments.'
