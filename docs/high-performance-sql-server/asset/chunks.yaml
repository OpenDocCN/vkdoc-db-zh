- fmt: '### Compression


    Compression is another SQL Server feature to consider to improve I/O performance
    and storage usage although at the price of additional CPU resources. SQL Server
    offers several types of compression. Row and page compression for regular tables
    was introduced with SQL Server 2008, and it is a feature that has to be explicitly
    enabled at several levels: heap, clustered index, nonclustered index, and indexed
    views. It can also be configured at the partition level when partitioning is being
    used. On the other hand, columnstore indexes always use compression, and this
    feature is not user configurable. Finally, compression can also be enabled on
    database backups.


    SAN and some other storage solutions may offer compression capabilities as well,
    so coordinate with your storage administrator to understand which choices are
    available before making a decision, especially since enabling compression in both
    places may possibly use additional resources probably without additional benefits.


    Finally, delayed durability, a feature introduced with SQL Server 2014, may help
    you in some very specific scenarios where you want to improve the performance
    of the transaction by delaying log buffer flushes to disk but with the very important
    caveat that you may lose transactions in case of a system failure. Even when data
    loss is only possible in a system failure, this may not be acceptable, especially
    when there are a large number of applications expecting guaranteed durable transactions.
    Delayed durability can be specified by an administrator at the database level
    using the `ALTER DATABASE SET DELAYED_DURABILITY` statement or within Hekaton
    natively compiled stored procedures using the `DELAYED_DURABILITY` clause. The
    `ALTER DATABASE SET DELAYED_DURABILITY` statement also allows delayed durability
    to be enabled at the transaction level, in which case it must be explicitly declared
    at every required transaction. For more details, please refer to the SQL Server
    documentation.


    ## Metrics and Performance


    In this section, I’ll show you the main metrics used to measure storage performance
    and which tools you can use to see such information, whether it is from Windows
    or SQL Server. The main metrics are as follows:


    1.  IOPS (input/output operations per second): It is the number of input/output
    operations per second.

    2.  Latency: Also called response time, it is the time required to complete a
    single input/output operation. Latency is usually measured in milliseconds, with
    flash-based storage now achieving single input/output operations in a fraction
    of a millisecond.

    3.  Throughput or bandwidth: It is the amount of data transferred in some specific
    time, for example, megabytes per second.


    These three metrics—IOPS, latency, and bandwidth—are closely related. Since latency
    is the time to complete a single input/output operation, by using latency, we
    could estimate how many operations could be completed per second (IOPS). For example,
    if you have a latency of 1 millisecond, you can roughly process 1000 operations
    per second, or 1000 IOPS. In the same way, the throughput can show the amount
    of data transferred per second.


    In Chapter [8](#393702_2_En_8_Chapter.xhtml), we covered how the `LogicalDisk`
    and `PhysicalDisk` objects provide a large variety of counters that can help you
    to monitor I/O operations in your system. `LogicalDisk` and `PhysicalDisk` provide
    the same counters, but they just provide information from either the logical or
    physical disk perspective. By looking at the most useful performance counters,
    you could easily correlate which ones measure IOPS, latency, or bandwidth.


    The following performance counters measure latency:


    *   Avg. Disk sec/Transfer: `Avg. Disk sec/Transfer` is the time, in seconds,
    of the average disk transfer.

    *   Avg. Disk sec/Read: `Avg. Disk sec/Read` is the average time, in seconds,
    of a read of data from the disk.

    *   Avg. Disk sec/Write: `Avg. Disk sec/Write` is the average time, in seconds,
    of a write of data to the disk.


    The following performance counters measure throughput:


    *   Disk Bytes/sec: `Disk Bytes/sec` is the rate at which bytes are transferred
    to or from the disk during write or read operations.

    *   Disk Read Bytes/sec: `Disk Read Bytes/sec` is the rate at which bytes are
    transferred from the disk during read operations.

    *   Disk Write Bytes/sec: `Disk Write Bytes/sec` is the rate at which bytes are
    transferred to the disk during write operations.


    The following performance counters measure IOPS:


    *   Disk Transfers/sec: `Disk Transfers/sec` is the rate of read and write operations
    on the disk.

    *   Disk Reads/sec: `Disk Reads/sec` is the rate of read operations on the disk.

    *   Disk Writes/sec: `Disk Writes/sec` is the rate of write operations on the
    disk.


    Finally, an important performance counter, `Avg. Disk Queue Length`, shows the
    average number of both read and write requests that are queued for a particular
    disk.


    There are several tools that you can use to measure the storage performance, which
    can be helpful to create a baseline or troubleshoot performance problems, either
    before or after the database is implemented in production. Such tools range from
    Performance Monitor, a tool very familiar to database professionals, which is
    covered in Chapter [8](#393702_2_En_8_Chapter.xhtml), along with some important
    performance counters, to other Windows tools like Resource Monitor or some utilities
    like `Diskspd` or `SQLIOSim`. Some very popular utilities used in the past, such
    as `sqlio` or `SQLIOStress`, have been replaced. `Diskspd` or `SQLIOSim` should
    be used instead. In this section, I’ll take a high-level overview of such tools.


    ### Resource Monitor


    Resource Monitor is a Windows utility that can be used to obtain information about
    the use of hardware such as processor, memory, disk, and network and software
    such as file handles and modules and resources in real time. For a quick tour
    on how to see file performance information in real time, let’s create an exercise
    to stress the system doing the same exercise we did in Chapter [8](#393702_2_En_8_Chapter.xhtml).
    Create a new database using SQL Server default options and run the following statement:


    ```

    CREATE TABLE t1 (id int IDENTITY(1,1), name char(8000))

    ```


    Add data to stress the transaction log file:


    ```

    BEGIN

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    END

    GO 30000

    ```


    On Resource Monitor, select Disk and Sort by Write (B/sec), and you will see the
    effect of the stress test on the database files, both data and transaction log
    files, as shown in Figure [11-1](#393702_2_En_11_Chapter.xhtml#Fig1).


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig1_HTML.jpg](images/393702_2_En_11_Chapter/393702_2_En_11_Fig1_HTML.jpg)


    *Figure 11-1* Windows Resource Monitor showing disk information'
