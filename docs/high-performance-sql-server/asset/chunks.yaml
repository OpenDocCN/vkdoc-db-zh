    free to use them in your personal installation of SQL Server for learning or troubleshooting
    purposes.


    We could use the undocumented DBCC RULEOFF statement to disable the GbAggBeforeJoin
    rule only for the current session. Disabling means the query optimizer will not
    be able to use it at all.


    ```

