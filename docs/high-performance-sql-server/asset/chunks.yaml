    \ 0 净值: 0 总计: 0 净值: 0.004\n```\n\n最后，如果我们使用相同的查询，但使用未经文档记载的跟踪标志 `2372`，它似乎再次与故障排除内存问题有关。这是输出：\n\
    \n```\nDBCC execution completed. If DBCC printed error messages, contact your\
    \ system administrator.\nNNFConvert 前内存: 14\nNNFConvert 后内存: 14\n项目移除前内存: 16\n\
    项目移除后内存: 17\n简化前内存: 17\n简化后内存: 29\n启发式连接重排序前内存: 29\n启发式连接重排序后内存: 34\n项目规范化前内存:\
    \ 34\n项目规范化后内存: 37\n阶段 TP 前内存: 40\n阶段 TP 后内存: 55\n阶段 QuickPlan 前内存: 55\n阶段 QuickPlan\
    \ 后内存: 67\n复制输出前内存: 67\n复制输出后内存: 68\n```\n\n所有三种方法都显示，这个特定查询经历了查询优化过程的两个阶段：事务处理和快速计划。\n"
- fmt: '### Cost Estimation


    As mentioned earlier, the quality of the execution plans the query optimizer generates
    is directly related to the quality of the equivalent plans produced and the accuracy
    of their cost estimates. This means that even when the query optimizer is able
    to produce a perfect execution plan for a query (and have it stored in the memo),
    an incorrect cost estimation may lead to the query optimizer choosing another
    less efficient plan.


    The query optimizer uses costing formulas considering the use of resources such
    as I/O, CPU, and memory, and the resulting values may look like a mystery for
    many. For example, you may be surprised that cost estimation does not consider
    if your query has to read data from disk or if the data is already in memory.
    It does not consider either if you are using a very old-style magnetic hard drive
    or the fastest SSD volumes. But despite not taking these considerations into account,
    cost estimation works very well for the purpose of selecting a good enough execution
    plan.


    Finally, if you ever wondered how a cost number like `2.65143` was calculated,
    I will include a basic introduction here so at least you know the basic concept
    of how it works. Cost estimation is performed for each operator, and the plan
    cost is the sum of the cost of all the operators in such a plan. The cost of each
    operator depends on its algorithm and the estimated number of rows the operator
    will return. Some operators, like sort and hash join, will consider memory available
    in the system as well.


    As you can see in every execution plan, every operator includes a cost associated
    with it. Some operators may have both CPU and I/O costs. Some others may have
    only CPU cost. Usually, operators at the beginning of the execution plan data
    flow (meaning starting from the right in the plan shape) will have I/O costs.
    Some examples are table scans, clustered index scans, or index seeks. An example
    can be seen in Figure [1-13](#393702_2_En_1_Chapter.xhtml#Fig13). Once again,
    notice that this is an estimated cost. Although plans show both estimated and
    actual values for some properties (like number of rows), there is no such thing
    as an actual CPU or I/O cost (but there are multiple tools to find out the real
    performance information of a query; many of those, like the Query Store, are covered
    in this book).


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig13_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig13_HTML.jpg)


    **Figure 1-13**

    Operator showing both CPU and I/O costs


    Note: I am saying data flows from right to left in an execution plan. By definition,
    execution goes on the opposite direction, that is, from left to right, which means
    the top-level operators request rows from the operators on the right.


    Now let me show you a cost estimation example for the following query:


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    WHERE LineTotal = 35

    ```


    Run the query, request a plan, and show the properties of the clustered index
    scan operator. For this specific example of the clustered index scan, I noticed
    that the CPU cost for the first record is `0.0001581` and `0.0000011` for any
    additional record after that. Since we have an estimated number of `121,317` records,
    we can calculate the total cost as `0.0001581 + 0.0000011 * (121317 – 1)`, which
    comes to `0.133606`, and it is the value shown for the estimated CPU cost in Figure
    [1-13](#393702_2_En_1_Chapter.xhtml#Fig13).


    In the same way, I noticed that the minimum I/O cost is `0.003125` for the first
    database page which then grows in increments of `0.00074074` for every additional
    page. Since the clustered index scan operator scans the entire table, I can use
    the following query to find the number of database pages, which in this case returns
    `1239`:


    ```sql

    SELECT in_row_data_page_count, row_count

    FROM sys.dm_db_partition_stats

    WHERE object_id = object_id(''Sales.SalesOrderDetail'')

    AND index_id = 1

    ```


    Because the operator scans the entire table, which has `1239` pages, I can now
    estimate the I/O cost which is `0.003125 + 0.00074074 * (1239 – 1)` or a total
    of `0.92016112` or `0.920162` as rounded and shown on the plan in Figure [1-13](#393702_2_En_1_Chapter.xhtml#Fig13).


    So the total cost of the operator is both the CPU cost, `0.133606`, and the I/O
    cost, `0.920162`, for a total of `1.05377` as shown in Figure [1-13](#393702_2_En_1_Chapter.xhtml#Fig13).
    Following the same process, the cost of the entire plan is the sum of the cost
    of every operator on the plan. In this case, we add the cost of two computer scalar
    operators, `0.01213`, and finally the cost of a filter operator, `0.05823`, which
    goes to a total of `1.13626`, which is the cost shown in the execution plan in
    Figure [1-14](#393702_2_En_1_Chapter.xhtml#Fig14) (again, sometimes the numbers
    are rounded).


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig14_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig14_HTML.jpg)


    **Figure 1-14**

    Plan showing total cost


    Finally, keep in mind this is just a cost model; although it works perfectly fine
    to select a good enough execution plan, it does not mean that it is the real cost
    on a real execution. I have heard many people trying to compare performance efficiency
    of a plan with another by using these costs. This is a big mistake. As I said
    before, there are multiple tools to look into the real performance information
    of a query.


    An interesting anecdote regarding the history of cost estimation in SQL Server
    has to do with the original meaning of the cost value. Originally, the number
    meant the number of seconds the query would take to execute on a particular hardware
    configuration. So, a cost of `1.25` would mean the query would take `1.25` seconds
    to execute. Obviously, the execution time would depend on the hardware, so these
    costs were measured at Microsoft at what was called Nick’s computer, an employee
    working on the query processing team. This happened in the SQL Server 7 days,
    when the current query optimizer was written. Currently, the values should not
    be associated with seconds or any other measure and are just called cost units.'
