    to automatically configure the number of maximum worker threads. For more details,
    see the following Books Online entry: [`https://msdn.microsoft.com/en-us/library/ms190219.aspx`](https://msdn.microsoft.com/en-us/library/ms190219.aspx).


    ### PREEMPTIVE_*


    The `PREEMPTIVE_` prefix includes a large number of waits (225 in SQL Server 2019),
    all of which occur when the SQLOS scheduler switches to preemptive mode to perform
    a specific external operation. In preemptive mode, you will see the task status
    as Running as in reality its execution is outside the control of the SQLOS.


    ### OLEDB


    You will see `OLEDB` waits when a task is waiting for data from a SQL Server Native
    Client OLE DB provider. You should look at these sources, which in many cases
    are linked servers or SSIS packages, for the possibility of optimizations. Executing
    DMVs or `DBCC CHECK` commands will also show `OLEDB` waits as internally they
    are implemented as special `OLEDB` calls.


    ### IO_COMPLETION


    This wait type occurs for a large variety of I/O waits related to reads and writes
    other than database pages. Some examples of these I/O operations include reading
    and writing sort or hash workfiles on `tempdb`, reading and writing records or
    any other information from the transaction log (other than `WRITELOG` explained
    next), or reading and writing eager spools to `tempdb`. As mentioned previously,
    I/O waits on data pages appear as `PAGEIOLATCH_` waits.


    ### WRITELOG


    `WRITELOG` occurs when a thread is waiting for SQL Server to write a log block
    to the transaction log, mostly as a result of a transaction commit or a checkpoint
    operation. Keep in mind that every update operation requires a transaction, even
    if one has not been explicitly created, for example, using the `BEGIN/COMMIT TRANSACTION`
    statements. Although some recommendations online ask for reducing the amount of
    changes to the database, assuming that has been optimized, the remaining thing
    to do is to use a faster I/O subsystem, at least for the transaction log file.
    In addition, you could also consider implementing delayed durability, a feature
    introduced with SQL Server 2014.'
  trans: '

    ## CXPACKET


    这是并行处理等待。系统中出现此类等待并不一定意味着存在问题，或并行处理本身有问题。不幸的是，网上一些错误的观点与此相左，这给并行处理带来了不好的声誉。因此，许多人对此类等待的错误反应就是有时禁用并行处理。事实是，我们可能需要进行额外的研究来确认并行处理是否真的是问题所在。正如本章前面的例子所介绍的，要排查
    `CXPACKET` 等待，我们应该从查看其他子并行线程上的等待开始。


    此外，从 SQL Server 2016 Service Pack 2 和 SQL Server 2017 CU3 开始，`CXPACKET` 等待被分离为
    `CXPACKET` 和 `CXCONSUMER` 等待，主要是将生产者线程和消费者线程的等待分开。因此，`CXPACKET` 现在仅适用于与查询处理器交换操作符同步以及为消费者线程生成行相关的等待。消费者线程等待现在使用
    `CXCONSUMER` 等待类型单独跟踪。


    ## CXCONSUMER


    如前所述，从 SQL Server 2016 Service Pack 2 和 SQL Server 2017 CU3 开始，`CXPACKET` 等待现在被分离为
    `CXPACKET` 和 `CXCONSUMER` 等待。`CXCONSUMER` 是消费者线程等待生产者线程发送行，通常可以安全地忽略。


    ## PAGELATCH_* 和 PAGEIOLATCH_*


    闩锁及与闩锁相关的等待已在第 1 章介绍，本章前面也已讨论过。此外，与 `tempdb` 中分配页上的争用相关的闩锁等待将在第 4 章详细讨论。


    ## ASYNC_NETWORK_IO


    尽管此等待类型的名称可能暗示网络问题，但最常见的场景是客户端处理数据的问题。通常，建议是确保客户端处理数据的速度足够快，或验证客户端本身是否存在性能问题。网络连接问题不太常见，但也建议检查一下。


    ## SOS_SCHEDULER_YIELD


    正如第 1 章和本章开头所介绍的，SQL Server 使用非抢先式调度程序，因此当一个任务用完其时间片时，它被设计为自愿让出 CPU。该任务永远不会被挂起，而是直接从运行状态转到可运行状态，因为它不需要等待任何资源或其他任何东西。在可运行队列中的这种等待反映为
    `SOS_SCHEDULER_YIELD` 等待，通常并不意味着存在问题。由于在之前讨论的 DMV 中，`wait_time` 包含 `signal_wait_time`，对于等待
    `SOS_SCHEDULER_YIELD` 的任务，这两个值将相同或非常接近。


    这种等待类型也可能意味着自旋锁争用，但如前所述，这并不常见。


    ## THREADPOOL


    如第 1 章所述，SQL Server 中的工作线程是按需创建的，直到达到配置的“最大工作线程数”值。如果没有足够的工作线程用于查询执行，任务可能不得不等待，此时就会看到这种等待类型。这并不意味着必须增加“最大工作线程数”的值，因为通常建议使用默认值
    0。还应该调查其他一些等待或性能问题。显示这些等待的查询很可能应该进行优化，特别是当它们使用大量线程的并行计划时。


    “最大工作线程数”配置值没有考虑后台系统进程所需的工作线程，其默认值允许 SQL Server 自动配置最大工作线程数。更多详细信息，请参阅以下联机丛书条目：[`https://msdn.microsoft.com/en-us/library/ms190219.aspx`](https://msdn.microsoft.com/en-us/library/ms190219.aspx)。


    ## PREEMPTIVE_*


    `PREEMPTIVE_` 前缀包含大量等待（在 SQL Server 2019 中有 225 种），所有这些等待都发生在 SQLOS 调度程序切换到抢先模式以执行特定的外部操作时。在抢先模式下，您会看到任务状态为
    `Running`，因为实际上它的执行超出了 SQLOS 的控制。


    ## OLEDB


    当任务正在等待来自 SQL Server Native Client OLE DB 提供程序的数据时，您会看到 `OLEDB` 等待。您应该检查这些来源（在许多情况下是链接服务器或
    SSIS 包），看看是否有优化的可能性。执行 DMV 或 `DBCC CHECK` 命令也会显示 `OLEDB` 等待，因为它们在内部是作为特殊的 `OLEDB`
    调用来实现的。


    ## IO_COMPLETION


    此等待类型发生于多种与读写操作相关的 I/O 等待，这些读写操作不涉及数据库页。此类 I/O 操作的一些例子包括：在 `tempdb` 上读写排序或哈希工作文件；从事务日志中读写记录或任何其他信息（除了下面将解释的
    `WRITELOG`）；以及将 eager spool 读写到 `tempdb`。如前所述，数据页上的 I/O 等待显示为 `PAGEIOLATCH_` 等待。


    ## WRITELOG


    当线程正在等待 SQL Server 将日志块写入事务日志时，会发生 `WRITELOG` 等待，这主要是事务提交或检查点操作的结果。请记住，每个更新操作都需要一个事务，即使没有显式创建，例如使用
    `BEGIN/COMMIT TRANSACTION` 语句。尽管网上的一些建议要求减少对数据库的更改量，但假设这已经优化，剩下的就是使用更快的 I/O 子系统，至少对于事务日志文件而言。此外，您还可以考虑实现延迟持久性，这是
    SQL Server 2014 引入的一项功能。

    '
- fmt: '## Timer Wait Types


    There are several wait types that are usually used by background system processes
    on which large waiting times do not necessarily mean there is a problem. One example
    of these waits was covered earlier when I showed the `REQUEST_FOR_DEADLOCK_SEARCH`
    wait. Let''s update the previous query to include some of these wait types so
    we can also take a look at which tasks use them:


    ```sql

    SELECT session_id, command, wait_type, wait_time FROM sys.dm_exec_requests

    WHERE wait_type IN (''BAD_PAGE_PROCESS'',

    ''BROKER_EVENTHANDLER'',

    ''BROKER_TRANSMITTER'',

    ''CHECKPOINT_QUEUE'',

    ''DBMIRROR_EVENTS_QUEUE'',

    ''DBMIRRORING_CMD'',

    ''KSOURCE_WAKEUP'',

    ''LAZYWRITER_SLEEP'',

    ''LOGMGR_QUEUE'',

    ''ONDEMAND_TASK_QUEUE'',

    ''REQUEST_FOR_DEADLOCK_SEARCH'',

    ''SQLTRACE_BUFFER_FLUSH'',

    ''WAITFOR'')

    ```


    I get the following output on my test system:


    | session_id | Command | wait_type | wait_time |

    | --- | --- | --- | --- |

    | 1 | LAZY WRITER | LAZYWRITER_SLEEP | 938 |

    | 3 | LOG WRITER | LOGMGR_QUEUE | 79 |

    | 4 | SIGNAL HANDLER | KSOURCE_WAKEUP | 445305651 |

    | 5 | LOCK MONITOR | REQUEST_FOR_DEADLOCK_SEARCH | 4736 |

    | 6 | BRKR TASK | BROKER_TRANSMITTER | 445366653 |

    | 12 | RESOURCE MONITOR | ONDEMAND_TASK_QUEUE | 42312 |

    | 14 | CHECKPOINT | CHECKPOINT_QUEUE | 9784594 |

    | 25 | BRKR EVENT HNDLR | BROKER_EVENTHANDLER | 445322210 |

    | 29 | BRKR TASK | BROKER_TRANSMITTER | 445366652 |

    | 55 | WAITFOR | WAITFOR | 100651 |


    As you can see, especially if you run the query a few times monitoring its output,
    some of the wait times are extremely large, while the times for other waits seem
    to reset periodically.


    The wait time for some of these wait types will be reset to 0 after a specific
    number of seconds. For example, the lazy writer will be reset after 1 second and
    the resource monitor task after 60 seconds. Some of these background tasks have
    a dedicated worker thread, so instead of creating a new task every time they need
    to do some work, they are just suspended between work intervals. In the sample
    output, `WAITFOR` was explicitly executed by a user query running the `WAITFOR`
    statement, so session ID 55 was not a background process.


    Some of these interesting background processes are as follows:


    1.  Lazy writer

    2.  Log writer

    3.  Signal handler

    4.  Lock monitor

    5.  Resource monitor

    6.  Checkpoint


    You can use the status column of the `sys.dm_exec_requests` to list all the sessions
    running as background tasks as in the following query:


    ```sql

    SELECT session_id, command, wait_type, wait_time, status FROM sys.dm_exec_requests

    WHERE status = ''background''

    ```


    ## What Is New on SQL Server 2019


    SQL Server 2019 introduces two changes related to wait statistics. The first one
    is a new wait type, `WAIT_ON_SYNC_STATISTICS_REFRESH`, which shows accumulated
    waits spent on synchronous statistics refresh operations. In addition, the command
    column of the `sys.dm_exec_request` DMV will now show `SELECT (STATMAN)` if a
    `SELECT` statement is waiting for such a synchronous statistics.


    Keep in mind that a synchronous statistics refresh operation is a regular update
    of optimization statistics performed in the middle of a query optimization process
    and is obviously not the same as an asynchronous statistics refresh operation
    that you configure manually by using the `AUTO_UPDATE_STATISTICS_ASYNC` option
    of the `ALTER DATABASE` statement. More details about statistics and statistics
    maintenance are provided in Chapters [1](#393702_2_En_1_Chapter.xhtml) and [3](#393702_2_En_3_Chapter.xhtml).


    ## Blocking


    Blocking itself is a large topic that would require a chapter of its own, if not
    an entire book. Since covering blocking in depth is outside the scope of this
    book, I will use this section to cover the basics and will refer to additional
    information at the end. Blocking is related to lock waits, and some of the best
    ways to troubleshoot them is to use the `sys.dm_tran_locks` or `sys.dm_os_waiting_tasks`
    DMVs where they will show as `LCK_` wait types. Locks can be acquired to the RID,
    key, page, extent, table, metadata, database, and other levels. There are also
    several resource lock modes including Shared (S), Update (U), Exclusive (X), Intent,
    Schema, Bulk Update (BU), and Key-range.


    Such a variety of choices creates a large number of locks and lock wait types,
    63 on all the currently supported versions of SQL Server, identified by the `LCK`
    prefix such as `LCK_M_S` shown in earlier examples, `LCK_M_U`, `LCK_M_X`, and
    so on, and many different resource formats depending on the resource, all documented
    at `sys.dm_os_waiting_tasks` ([`https://msdn.microsoft.com/en-us/library/ms188743.aspx`](https://msdn.microsoft.com/en-us/library/ms188743.aspx))
    on the lock resource owner section. For example, the page resource format is


    ```

    pagelock fileid= pageid= dbid= subresource=

    ```


    As usual, do not automatically assume that locks alone are the root cause of a
    performance problem as minimizing the size of the transaction and other optimizations
    could be possible to avoid or minimize such waits. A bad piece of advice that
    I see a lot of times is to just use the `NOLOCK` hint to avoid locks. That does
    not mean that the `NOLOCK` hint should never be used. The hint exists for a reason,
    but I see it abused everywhere. Developers should understand how `NOLOCK` really
    works and if it makes sense for the business transaction they are using it for.
    Alternate solutions like implementing snapshot isolation should be considered
    as well.


    The blocked process threshold configuration option uses the deadlock monitor background
    thread shown earlier and can be configured using `sp_configure`. The default configuration
    is 0, meaning that no blocked process reports are generated. An example configuring
    the blocked process threshold to five seconds is next.


    ```sql

    sp_configure ''blocked process threshold'', 5

    RECONFIGURE

    ```


    Note: You can use "blocked process threshold" or "blocked process threshold(s)"
    or technically any other unique string that is part of the configuration name.
    This is also true for any other configuration option.


    Deadlocks occur when two or more processes permanently block each other. However,
    you usually won''t have time to react to those waits. The SQL Server engine will
    detect them within five seconds and kill one of the processes involved. Although
    automatically taken care of by the database engine, they are still a problem,
    and SQL Server offers several tools to troubleshoot them. There are also several
    recommendations published in the documentation about how to deal with them including
    keeping transactions shorter and accessing the objects in the same order. Deadlocks
    are detected by the deadlock monitor background thread.


    For more additional information about locking, see "Locking in the Database Engine"
    at [`https://technet.microsoft.com/en-us/library/ms190615(v=sql.105).aspx`](https://technet.microsoft.com/en-us/library/ms190615%2528v%253Dsql.105%2529.aspx).


    ## In-Memory OLTP


    Although In-Memory OLTP, sometimes known by its original project name Hekaton,
    is covered in detail in Chapter [7](#393702_2_En_7_Chapter.xhtml), in this section
    I will introduce its performance benefits especially as it relates to waits by
    locks and latches. In-Memory OLTP includes several performance benefits based
    on new hardware trends such as the following:


    1.  Tables and indexes are optimized for memory-only use.

    2.  New natively compiled stored procedures are compiled to native code.

    3.  No locks and latches are needed.


    Based on new optimistic concurrency methods that rely on versioning, this new
    technology does not use locks and latches, and blocking is eliminated. However,
    transaction conflicts still have to be taken care of, and, in some cases, transactions
    may have to be resubmitted. It is worth noting that this new versioning process
    is entirely memory based and is not the same as the `tempdb` versioning technology
    introduced with SQL Server 2005 and used by features like snapshot isolation,
    MARS, or triggers.'
