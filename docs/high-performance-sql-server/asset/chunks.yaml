    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig5_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Query tree representation


    Name resolution for views also includes the process of view substitution in which
    a view reference is expanded to include the actual view definition. The query
    tree representation, as shown in Figure [1-5](#393702_2_En_1_Chapter.xhtml#Fig5),
    represents the logical operations performed by the query and is closely related
    to the original syntax of the query. These logical operations include things like
    “get data from the Sales table,” “perform an inner join,” “perform an aggregation,”
    and so on. The query processor will use different tree representations during
    the entire optimization process, and these trees will have different names.


    Although these logical trees are not defined anywhere in the documentation, the
    following query will return the names of those tree representations:


    ```

    SELECT * FROM sys.dm_xe_map_values

    WHERE name = ''query_optimizer_tree_id''

    ```


    The following is the output of such query on SQL Server 2019 Cumulative Update
    4\. The @@VERSION function in my system in addition returns Microsoft SQL Server
    2019 (RTM-CU4) (KB4548597) - 15.0.4033.1 (X64) where KB4548597 is the knowledge
    base article describing the cumulative update and 15.0.4033.1 is the product version.
    Starting with SQL Server 2017, service packs are no longer available, and the
    new servicing model will be based on cumulative updates (and General Distribution
    Releases, or GDRs, when required), and only CU are released.'
  trans: '

    基数估计使用一种数学模型，该模型依赖于统计信息以及基于简化假设（如均匀性、独立性、包含性和包含性——这些假设对于 SQL Server 2014 引入的新基数估计器仍然成立）进行的计算。统计信息包含描述表中一个或多个列值分布的信息，由直方图、全局计算的密度信息以及可选的特殊字符串统计信息（也称为
    `tries`）组成。基础表的基数可以直接使用统计信息获取，但大多数其他基数的估计——例如，过滤器或连接的中间结果——必须使用预定义的模型和公式来计算。然而，该模型并未涵盖所有可能的情况，有时如前所述，会使用假设。默认情况下，统计信息由
    SQL Server 自动创建和更新，管理员也有多种选择来管理它们。


    注意


    关于 SQL Server 查询优化器内部行为的大多数信息，可以使用未公开的语句和跟踪标志来检查，尽管这些不受 Microsoft 支持，也不打算在生产系统中使用。我们将在本章后续部分介绍其中一些内容。


    由于本章的重点是理解 SQL Server 的工作原理，在介绍之后，现在让我们更详细地回顾查询优化过程，从解析和绑定开始。


    ### 解析与绑定


    如前所述，解析和绑定是提交查询执行时执行的第一个操作。解析检查查询的语法是否正确，包括关键字的正确使用和拼写，并将其信息转换为代表查询逻辑操作符的关系代数树。


    绑定过程检查查询中引用的表、列和任何其他元素是否存在，将逻辑树上的每个对象与系统目录中的相应对象关联起来。此过程也称为名称解析。绑定还会验证请求的查询对象之间的操作是否有效，以及这些对象对运行查询的用户是否可见（即用户是否具有所需的权限）。绑定操作后的结果树随后被发送给查询优化器。例如，以下查询的树表示如图
    1-5 所示，该图显示了数据访问、连接、过滤和聚合操作：


    ```

    SELECT ProductID, COUNT(*)

    FROM Sales.SalesOrderHeader so JOIN Sales.SalesOrderDetail sod

    ON so.SalesOrderID = sod.SalesOrderID

    WHERE SalesPersonID = 275

    GROUP BY ProductID

    ```


    注意


    本书中的大多数示例使用的是 AdventureWorks 数据库，您可以从 [`https://docs.microsoft.com/zh-cn/sql/samples/adventureworks-install-configure`](https://docs.microsoft.com/zh-cn/sql/samples/adventureworks-install-configure)
    下载。请下载 `AdventureWorks2017.bak` 和 `AdventureWorksDW2017.bak` 备份文件，它们分别是 OLTP（在线事务处理）和数据仓库数据库，并在
    SQL Server 中将它们还原为 `AdventureWorks2017` 和 `AdventureWorksDW2017`。本书中的所有代码都在 SQL
    Server 2019 中测试过，因此您还需要确保将这些数据库的兼容级别更改为 150。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig5_HTML.jpg](img/393702_2_En_1_Fig5_HTML.jpg)


    图 1-5

    查询树表示


    视图的名称解析还包括视图替换过程，其中视图引用被展开以包含实际的视图定义。如图 1-5 所示的查询树表示，代表了查询执行的逻辑操作，并与查询的原始语法密切相关。这些逻辑操作包括诸如“从
    Sales 表获取数据”、“执行内连接”、“执行聚合”等。查询处理器在整个优化过程中将使用不同的树表示，这些树将有不同的名称。


    尽管这些逻辑树在文档中没有明确定义，但以下查询将返回这些树表示的名称：


    ```

    SELECT * FROM sys.dm_xe_map_values

    WHERE name = ''query_optimizer_tree_id''

    ```


    以下是在 SQL Server 2019 累积更新 4 上执行此查询的输出。我系统中的 `@@VERSION` 函数还返回 `Microsoft SQL Server
    2019 (RTM-CU4) (KB4548597) - 15.0.4033.1 (X64)`，其中 `KB4548597` 是描述该累积更新的知识库文章，`15.0.4033.1`
    是产品版本。从 SQL Server 2017 开始，不再提供服务包，新的服务模式将基于累积更新（以及需要时的一般分发版本，或 GDRs），并且仅发布 CU。

    '
- fmt: '**注意：** 累积更新旨在在最初版本（称为 RTM 或 Release to Manufacturing）发布后更频繁地发布，然后在这种新服务模型中减少频率。在完整的
    5 年主流生命周期的前 12 个月中，每月将提供一次累积更新，然后在剩余的 4 年中每 2 个月提供一次。有关此新服务模型的更多详细信息，您可以查看[`https://techcommunity.microsoft.com/t5/sql-server/announcing-the-modern-servicing-model-for-sql-server/ba-p/385594`](https://techcommunity.microsoft.com/t5/sql-server/announcing-the-modern-servicing-model-for-sql-server/ba-p/385594)（或搜索“Announcing
    the Modern Servicing Model for SQL Server”）。


    以下是查询结果。


    | map_key | map_value |

    | --- | --- |

    | 0 | CONVERTED_TREE |

    | 1 | INPUT_TREE |

    | 2 | SIMPLIFIED_TREE |

    | 3 | JOIN_COLLAPSED_TREE |

    | 4 | TREE_BEFORE_PROJECT_NORM |

    | 5 | TREE_AFTER_PROJECT_NORM |

    | 6 | OUTPUT_TREE |

    | 7 | TREE_COPIED_OUT |


    有几个未文档化的跟踪标志（`8605`、`8606` 和 `8607`），它们可以允许您检查那些内部树的内容，尽管信息将以文本形式打印，不如图形执行计划那样直观。此外，该树将显示关系代数运算，这些运算可能与我们在查询计划上看到的逻辑和物理运算不太相似。接下来是一个使用跟踪标志
    `8605` 显示 SQL Server 创建的查询初始树表示的示例。


    ```

    DBCC TRACEON(3604)

    SELECT DatabaseLogID

    FROM dbo.DatabaseLog

    WHERE DatabaseLogID = 1

    OPTION (RECOMPILE, QUERYTRACEON 8605)

    ```


    在这种情况下，`QUERYTRACEON` 是一个查询提示，允许您在查询级别启用影响计划的跟踪标志。如我们所知，跟踪标志是一种众所周知的机制，用于设置特定的服务器特性或更改
    SQL Server 中的特定行为。


    **注意：** `QUERYTRACEON` 查询提示多年来一直是未文档化且不受支持的，直到最近才得到支持，但仅支持有限数量的可用跟踪标志。您可以通过查看[`https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-query`](https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-query)的文档获取有关
    `QUERYTRACEON` 支持的跟踪标志的更多信息。


    `RECOMPILE` 在此查询中并非严格必需，但它允许您在决定多次运行查询时强制优化。`DBCC TRACEON` 和跟踪标志 `3604` 是必需的，以便将跟踪输出重定向到执行语句的客户端，在本例中是
    SQL Server Management Studio。输出将显示在“消息”选项卡上。此示例的输出为


    ```

    *** Converted Tree: ***

    LogOp_Project QCOL: [AdventureWorks2017].[dbo].[DatabaseLog].DatabaseLogID

    LogOp_Select

    LogOp_Get TBL: dbo.DatabaseLog dbo.DatabaseLog TableID=901578250 TableReferenceID=0
    IsRow: COL: IsBaseRow1001

    ScaOp_Comp x_cmpEq

    ScaOp_Identifier QCOL: [AdventureWorks2017].[dbo].[DatabaseLog].DatabaseLogID

    ScaOp_Const TI(int,ML=4) XVAR(int,Not Owned,Value=1)

    AncOp_PrjList

    ```


    最后，提醒一下，本书（尤其是本章）包含许多未文档化和不受支持的功能及语句。因此，您可以在测试环境中将其用于学习或故障排除目的，但不建议在生产环境中使用。在生产环境中使用它们可能会导致
    Microsoft 不再提供支持。当某个语句、功能或跟踪标志是未文档化且不受支持时，我会予以说明。


    尽管所列出的关系代数运算完全没有文档化，并且在这种晦涩的文本格式中可能很难阅读，但我们可以识别出查询的三个主要操作（即 SELECT、FROM 和 WHERE
    子句）分别对应于关系代数运算 Project 或 `LogOp_Project`、Get 或 `LogOp_Get`、以及 Select 或 `LogOp_Select`。更复杂的是，`LogOp_Select`
    运算与 SELECT 子句无关，而更多地与过滤操作或 WHERE 子句相关。`LogOp_Project` 用于指定结果中所需的列。最后，`LogOp_Get`
    指定查询中使用的表。


    总之，跟踪标志 `8605` 可用于显示 SQL Server 创建的查询初始树表示，跟踪标志 `8606` 将显示优化过程中使用的其他逻辑树（例如，输入树、简化树、连接折叠树、项目规范化前的树或项目规范化后的树），跟踪标志
    `8607` 将显示优化输出树。有关这些跟踪标志的更多详细信息，您可以查看我博客中的以下文章：[`www.benjaminnevarez.com/2012/04/more-undocumented-query-optimizer-trace-flags`](http://www.benjaminnevarez.com/2012/04/more-undocumented-query-optimizer-trace-flags)。


    在解析和绑定完成后，真正的查询优化过程开始了。查询优化器将获取生成的逻辑树，并从简化过程开始。'
  raw: 'Note: Cumulative updates are intended to be released more frequently after
    the original release (called RTM or Release to Manufacturing) and then less often
    in this new service model. A cumulative update will be available every month for
    the first 12 months and then every 2 months for the remaining 4 years of the full
    5-year mainstream life cycle. For more details about this new servicing model,
    you can look at [`https://techcommunity.microsoft.com/t5/sql-server/announcing-the-modern-servicing-model-for-sql-server/ba-p/385594`](https://techcommunity.microsoft.com/t5/sql-server/announcing-the-modern-servicing-model-for-sql-server/ba-p/385594)
    (or search for “Announcing the Modern Servicing Model for SQL Server”).


    These are the query results.


    | map_key | map_value |

    | --- | --- |

    | 0 | CONVERTED_TREE |

    | 1 | INPUT_TREE |

    | 2 | SIMPLIFIED_TREE |

    | 3 | JOIN_COLLAPSED_TREE |

    | 4 | TREE_BEFORE_PROJECT_NORM |

    | 5 | TREE_AFTER_PROJECT_NORM |

    | 6 | OUTPUT_TREE |

    | 7 | TREE_COPIED_OUT |


    There are several undocumented trace flags (8605, 8606, and 8607) which can allow
    you to inspect the contents of those internal trees, although the information
    will be printed as text and not as visually appealing as a graphical execution
    plan. In addition, the tree will show relational algebra operations which may
    not be very similar to the logical and physical operations we see on query plans.
    Next is one example using trace flag 8605 to display a query initial tree representation
    created by SQL Server.


    ```

    DBCC TRACEON(3604)

    SELECT DatabaseLogID

    FROM dbo.DatabaseLog

    WHERE DatabaseLogID = 1

    OPTION (RECOMPILE, QUERYTRACEON 8605)

    ```


    In this case, QUERYTRACEON is a query hint that lets you enable a plan-affecting
    trace flag at the query level. As we know, a trace flag is a well-known mechanism
    used to set specific server characteristics or to alter a particular behavior
    in SQL Server.


    Note: The QUERYTRACEON query hint was undocumented and unsupported for many years
    and only recently has been supported but only with a limited number of the available
    trace flags. You can get more information about the trace flags supported by QUERYTRACEON
    by looking at the documentation at [`https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-query`](https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-query).


    RECOMPILE is not strictly required in this query, but it allows you to force an
    optimization in case you decide to run the query more than once. DBCC TRACEON
    and trace flag 3604 are required in order to redirect the trace output to the
    client executing the statement, in this case SQL Server Management Studio. The
    output will be shown on the Messages tab. The output for this example is


    ```

    *** Converted Tree: ***

    LogOp_Project QCOL: [AdventureWorks2017].[dbo].[DatabaseLog].DatabaseLogID

    LogOp_Select

    LogOp_Get TBL: dbo.DatabaseLog dbo.DatabaseLog TableID=901578250 TableReferenceID=0
    IsRow: COL: IsBaseRow1001

    ScaOp_Comp x_cmpEq

    ScaOp_Identifier QCOL: [AdventureWorks2017].[dbo].[DatabaseLog].DatabaseLogID

    ScaOp_Const TI(int,ML=4) XVAR(int,Not Owned,Value=1)

    AncOp_PrjList

    ```


    Finally, a reminder that this book, especially this chapter, includes many undocumented
    and unsupported features and statements. As such, you can use them in a test environment
    for learning or troubleshooting purposes, but they are not meant to be used in
    a production environment. Using them in your production environment could make
    it unsupported by Microsoft. I will identify when a statement, feature, or trace
    flag is undocumented and unsupported.


    Although the listed relational algebra operations are not documented in any way
    and may be even hard to read in such a cryptic text format, we could identify
    that the three main operations of the query, which are the SELECT, FROM, and WHERE
    clauses, correspond to the relational algebra operations Project or LogOp_Project,
    Get or LogOp_Get, and Select or LogOp_Select, respectively. To make things even
    more complicated, the LogOp_Select operation is not related to the SELECT clause
    but has to do more with the filter operation or WHERE clause. LogOp_Project is
    used to specify the columns required in the result. Finally, LogOp_Get specifies
    the table used in the query.


    In summary, trace flag 8605 can be used to display the query initial tree representation
    created by SQL Server, trace flag 8606 will display additional logical trees used
    during the optimization process (e.g., the input tree, simplified tree, join-collapsed
    tree, tree before project normalization, or tree after project normalization),
    and trace flag 8607 will show the optimization output tree. For more details about
    these trace flags, you can look at the following post at my blog at [`www.benjaminnevarez.com/2012/04/more-undocumented-query-optimizer-trace-flags`](http://www.benjaminnevarez.com/2012/04/more-undocumented-query-optimizer-trace-flags).


    After parsing and binding are completed, the real query optimization process starts.
    The query optimizer will obtain the generated logical tree and will start with
    the simplification process.'
