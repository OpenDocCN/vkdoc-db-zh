    public with the architecture only a month later, mostly with the article “SQL
    Server on Linux: How? Introduction” which is still a good read which you can find
    at [`https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/`](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/).


    Although it took less than three years to ship the final bits of the software,
    work still spanned two versions of the product. While work on Linux started back
    in late 2014 and early 2015, SQL Server 2016 was released in May of 2016\. SQL
    Server 2017, the first release to run on Linux, would not be released until October
    of 2017.


    Currently, only the latest two versions of SQL Server, 2017 and 2019, can run
    on Linux. They can run on Red Hat Enterprise Linux, SUSE Linux Enterprise Server,
    and Ubuntu. These versions of SQL Server can also run on Docker, which itself
    runs on Linux, Windows, and Mac OS platforms.


    Note


    Installing SQL Server on Linux or running SQL Server on Docker is outside the
    scope of this book. For details about how to perform this, see the installation
    section at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview%253Fview%253Dsql-server-ver15).


    I will use the remainder of this chapter to explain the architecture behind SQL
    Server on Linux. A bit of history to bring perspective may be needed as well.


    ## A Bit of History


    Although SQL Server has been a Windows-only software product for more than two
    decades, not so many people know that it started in the Unix world. SQL Server
    was originally a Sybase product which ran in several Unix platforms and was originally
    called DataServer. Back in the day, in order to run software on multiple platforms,
    the code had to be ported and compiled for every operating system. So SQL Server
    started as a multiplatform technology. Windows did not even exist on those early
    days (or at least the server software, originally called Windows NT). Sometime
    later, Sybase partnered with Microsoft to take SQL Server first to OS/2 and later
    to Windows.


    Microsoft and Sybase even had a short partnership with Ashton-Tate, and the result
    of this partnership released Ashton-Tate/Microsoft SQL Server 1.0 for OS/2 in
    May 1989\. After the agreement with Ashton-Tate ended, the name of the product
    was changed to just Microsoft SQL Server, and its first version, 1.1, was released
    in the summer of 1990.


    A few years later, Microsoft released a new server-based operating system, Windows
    NT. Its first version, Windows NT 3.1, was released in July 1993 (there was no
    version 1 or 2). The kernel of Windows NT was originally intended to be used on
    OS/2\. Windows NT was written in C, C++, and assembly language. Very soon Microsoft
    decided to port SQL Server from OS/2 to Windows NT.


    SQL Server 4.2 for OS/2 was ported to Windows NT resulting in SQL Server 4.21
    and was released in 1993\. In April 1994, Microsoft and Sybase announced the end
    of their development agreement, and each decided to develop its own SQL Server
    or database products. SQL Server 4.2B was the last version of the product for
    OS/2.


    Back in those early days of SQL Server, both as a Sybase product and a Microsoft
    product, there was always the dilemma and decision to make about making a product
    portable and able to run on more than one platform or making a product designed,
    written, and optimized for a single operating system. This was one of the decisions
    Microsoft took while leaving the OS/2 platform and keeping SQL Server a Windows-only
    software. This same concern would return when Microsoft tried to port SQL Server
    to Linux. The goals of portability sometimes conflict with the goals of performance.
    In other words, a software project would either need a major reengineering for
    every supported platform or it could take a lowest common denominator approach
    and not fully use the features of every platform.


    Note: You can learn more about the history of SQL Server by reading Chapter [1](#393702_2_En_1_Chapter.xhtml)
    of *Inside Microsoft SQL Server 2000* by Kalen Delaney which you can also find
    online at [`www.sqlserverinternals.com/s/History-of-SQL-Server.pdf`](https://www.sqlserverinternals.com/s/History-of-SQL-Server.pdf).'
