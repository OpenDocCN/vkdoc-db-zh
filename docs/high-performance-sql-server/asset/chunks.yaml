    Server 可以在运行时决定执行并行计划所使用的逻辑处理器数量，最多可达 64 个。请记住，这并不意味着每个并行查询都会一直使用最大数量的可用处理器。例如，如果你的系统有
    64 个逻辑处理器并且使用默认配置，一个查询仍然很可能只使用八个处理器并以八个线程运行。同样，这是查询处理器在执行时做出的决定。


    Microsoft 提出了使用最大并行度为八的建议，文档记录在 [`https://support.microsoft.com/en-us/kb/2806535`](https://support.microsoft.com/en-us/kb/2806535)。基本上，这个最佳实践要求将“最大并行度”配置选项设置为与系统中逻辑处理器数量相同，最多不超过八。而且，由于现在拥有八个或更多处理器非常普遍，八可能是一个常见的配置。再次强调，将此设置更改为八并不意味着每个并行查询都会使用八个线程。


    然而，请记住，Microsoft 的建议仅仅是一个建议或指导方针。文档本身指定该指南适用于典型的 SQL Server 活动，并且根据你的工作负载或应用程序模式，也可以考虑并彻底测试此设置的其他值。例如，假设你的系统有
    16 个逻辑处理器，并且工作负载中同时运行的查询数量较少，那么可以考虑使用最大并行度值为 16。另一方面，对于同一系统中查询数量很多的工作负载，值为 4 也可能是最佳选择。


    首先，运行 SQL Server 的硬件必须能够运行并行查询，根据当前的趋势，这几乎包括了今天的所有服务器，甚至包括大多数用于生产实例的虚拟机配置。其次，关联掩码配置选项（现已弃用）或
    `ALTER SERVER CONFIGURATION SET PROCESS AFFINITY` 语句必须允许多处理器使用，而它们默认都是允许的。最后，查询处理器必须决定使用并行是否确实可以提高查询性能。


    还有一系列功能本身就不支持并行，即使你的查询足够昂贵以证明其合理性。在这些功能中，包括有标量值用户定义函数；杂项内置函数如 `ERROR_NUMBER()`、`OBJECT_ID()`
    和 `@@TRANCOUNT`；具有数据访问权限的 CLR 用户定义函数；动态游标；TOP 子句；序列函数；多语句表值用户定义函数；以及全局标量聚合。执行计划也可以通过查看
    `NonParallelPlanReason` 属性来告诉你为什么没有使用并行。

    '
- fmt: 'Also, parallelism is only considered for expensive queries, which again are
    defined by another configuration setting—the “cost threshold for parallelism,”
    whose default value is five and which, again, some database administrators may
    consider increasing as well. This threshold means that parallelism would only
    be considered by the query processor if an initially created serial plan has the
    cost of five or more cost units, so it does not mean that a parallel plan is always
    selected. For example, it is totally possible that the query processor initially
    estimates a cost of 5.5 for a serial plan, decides to inspect a parallel choice,
    and, after finding a parallel plan of 6.3, decides to stick with the serial choice
    as the lowest cost choice is selected. But for more expensive queries, most likely
    a parallel plan would be produced. When a parallel plan is selected for execution,
    the plan itself does not define the degree of parallelism; this will be defined
    at runtime by the query processor. It is totally possible for the same plan to
    change the degree of parallelism from one execution to the next one.


    In addition, even if you decide to set a specific value for the max degree of
    parallelism configuration option, it is not a hard limit. Any user can run a query
    with the `MAXDOP` query hint asking or recommending the query processor to use
    more processors to run a parallel query. The only way to specify a hard limit
    on the degree of parallelism is using the `Resource Governor`, a feature introduced
    with SQL Server 2008.


    ## Common Misunderstanding: CXPACKET Waits


    Another common misunderstanding of parallelism, as explained in Chapter 5, is
    when people see a large number of `CXPACKET` waits, in which case they assume
    parallelism is the problem and decide to change this configuration or some other
    setting to minimize or eliminate parallelism. As explained, most of the time,
    parallelism itself is not the problem, and probably we are all aware of cases
    of people setting the configuration value to one to eliminate parallelism, which
    obviously is totally wrong. There might be some extreme cases when you want to
    set the value to one and totally disable parallelism from the instance, but there
    must be a very good researched reason. There are also some applications, like
    Microsoft SharePoint, which explicitly require setting the max degree of parallelism
    setting to one.


    ## Override with ALTER DATABASE SCOPED CONFIGURATION


    Finally, introduced with SQL Server 2016, you can also use the `MAXDOP` set option
    of the new `ALTER DATABASE SCOPED CONFIGURATION` statement covered earlier to
    override the max degree of parallelism configured at the server level for the
    specified database.


    ## Example: How max degree of Parallelism Works


    Next, I will show you an example of how the `max degree of parallelism` works.
    In my test environment with a SQL Server default configuration and eight logical
    processors, the following query creates a parallel plan of cost 4.33126. This
    information is shown in the execution plan in Figure 3-1.


    ![../images/393702_2_En_3_Chapter/393702_2_En_3_Fig1_HTML.jpg](images/393702_2_En_3_Chapter/393702_2_En_3_Fig1_HTML.jpg)


    Figure 3-1: Parallel plan


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    ```


    In this plan, two operations are executed in parallel, the sort operation and
    the clustered index scan. Notice that parallelism works at the operator level,
    so not all the operators in a parallel plan are required to run in parallel. The
    actual execution plan even tells me how many rows each thread processed for this
    particular execution for both operations, as shown next from an XML plan fragment:


    ### Changing the max degree of parallelism


    Assuming you want to change the `max degree of parallelism` setting to one:


    ```sql

    sp_configure ''max degree of parallelism'', 1

    RECONFIGURE

    ```


    Running again the previous `SELECT` statement would obviously create the serial
    plan shown in Figure 3-2.


    ![../images/393702_2_En_3_Chapter/393702_2_En_3_Fig2_HTML.jpg](images/393702_2_En_3_Chapter/393702_2_En_3_Fig2_HTML.jpg)


    Figure 3-2: Serial plan


    But you could override it by using the `MAXDOP` query hint as shown next, using
    `MAXDOP 8`:


    ```sql

    SELECT * FROM Sales.SalesOrderDetail

    ORDER BY OrderQty

    OPTION (MAXDOP 8)

    ```


    The previous query again creates a parallel plan using eight threads. You can
    try a few other values for `MAXDOP` and observe its behavior. Finally, do not
    forget to change the `max degree of parallelism` setting back to the default:


    ```sql

    sp_configure ''max degree of parallelism'', 0

    RECONFIGURE

    ```


    ## cost threshold for parallelism


    As introduced in the previous section, the `cost threshold for parallelism` configuration
    setting, whose default value is five, defines the cost at which the query processor
    starts considering parallel plans during the query optimization process. Whether
    to use this default or a higher value and which value to use is becoming a new
    topic of debate. The main problem with some of the recommendations online is that
    there is no definitive research or performance data—let alone a recommendation
    from Microsoft—about increasing this value and which value to use for a specific
    workload.


    Although the default five could be a good choice for many workloads, you may also
    consider increasing this value for some specific scenarios. Which value to use
    would depend on your workload and should be thoroughly tested. For example, if
    you decide to change this configuration value from 5 to 25, this roughly means
    that all your plans whose original serial cost was estimated between 5 and 25
    will no longer be considered to be parallelized and continue as serial plans.
    You have the choice to either research such queries to see if the new serial choice
    does not impact the execution performance, especially if those are critical queries
    or are executed frequently, or you could also just test your workload as a whole.


    Keep in mind that the default value is not a bad choice either. After all, parallelism
    improves query performance, and, when a parallel plan is selected, the query processor
    compared the serial plan against the parallel alternative and selected the best
    choice. Assuming the cost estimation is adequate, it will perform better. Also,
    as explained in Chapter 5, seeing a large number of `CXPACKET` waits alone does
    not mean that you need to change this or the `max degree of parallelism` configuration
    settings.


    Finally, a reminder that this configuration setting works in conjunction with
    the `max degree of parallelism` setting, meaning that if a parallel query plan
    was selected for execution, its degree of parallelism will be defined just before
    execution influenced by this last configuration setting.'
