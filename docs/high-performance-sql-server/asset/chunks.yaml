- fmt: '## Statistics Update


    ### 自动统计信息的创建与更新


    默认情况下，SQL Server 会自动创建并更新查询优化统计信息。你可以更改此数据库级别的默认设置，但这几乎从不被推荐，因为这将要求开发人员或管理员手动创建和更新所有必需的统计信息。虽然可以禁用统计信息的创建，但这没有太大意义，因为查询优化器可以高效地为你创建所需的统计信息。当你为索引键中涉及的列创建索引时，一些其他统计信息也会自动创建。然而，有些统计信息（如多列统计信息）不会自动创建，需要手动创建（不过，像
    Database Engine Tuning Advisor 这样的工具可以在此提供帮助）。


    更新统计信息则略有不同。当达到特定阈值时，SQL Server 可以自动更新统计信息。尽管有两种阈值或算法来实现这一点（我稍后会详细介绍），但一个常见问题是用于更新统计信息对象的样本大小。高性能数据库需要更主动地更新统计信息方法，而不是让
    SQL Server 使用非常小的样本去触发这两种阈值中的任何一种。


    ### 自动更新机制的问题


    我认为自动统计信息更新的主要问题是传统的 20% 固定更改阈值，需要达到此阈值才能触发更新操作。对于大表，这需要非常大量的更改。提到的第二种算法（通常通过使用跟踪标志
    `2371` 来启用）稍微改善了自动更新统计信息所需的阈值，但样本大小的问题仍然存在。统计信息更新是在查询优化过程中触发的——当你运行一个查询时，但在它执行之前。从技术上讲，由于它属于执行过程的一部分，因此只使用非常小的样本。这个小样本可能并不总是足够，但至少有一定道理，因为你可能不希望在查询执行过程中使用更大的样本，因为它可能主导执行时间。


    ### 主动维护方法


    前述过程对于许多工作负载可能是高效的，但对于性能要求更高的应用程序，需要一种更主动的方法。这种主动方法通常意味着拥有一个计划的维护作业，以定期更新统计信息。这种方法解决了前面提到的两个问题：无需等待达到特定的大阈值，并提供了更好的样本大小（如果不是使用整个表的话，这称为
    `fullscan`）。


    > **注意**

    >

    > 请记住，拥有维护作业并不意味着你需要一个完全无活动的维护窗口，因为这个作业和其他维护作业可以与用户事务一起运行。然而，显然强烈建议在活动量较低的时段进行。


    在我看来，新算法也不足够，但它肯定比没有自动统计信息更新要好。新算法对于大表的好处是显而易见的，但在如此大的表中使用小样本可能仍然不充分。这就是为什么我首先建议主动更新统计信息，但为了以防万一，仍将自动更新作为第二选择保留启用状态。


    ### 实施挑战


    尽管有免费的工具和脚本可用于更新统计信息（甚至在 SQL Server 内部），但创建一个高效执行此更新的脚本并不像听起来那么容易，特别是对于大型数据库。你的脚本将必须处理以下部分或全部问题：应该更新哪些表、索引或统计信息？应使用表的百分之多少作为样本大小？我需要执行
    `fullscan` 吗？我需要多长时间更新一次统计信息？更新统计信息会影响我的数据库性能活动吗？我需要维护窗口吗？频繁更新会影响我的计划缓存吗？大多数这些问题的答案将取决于具体实现，因为涉及太多不同的因素。


    ### 确定更新时机


    首先，我们必须定义更新统计信息的时机点。例如，决定何时重建索引非常容易，因为我们可以基于索引碎片级别做出这样的决定。此类信息可以通过 `sys.dm_db_index_physical_stats`
    DMV 轻松获取，其文档可在 [`https://msdn.microsoft.com/en-us/library/ms188917.aspx`](https://msdn.microsoft.com/en-us/library/ms188917.aspx)
    找到。该 DMV 文档甚至提供了碎片阈值和入门脚本。但为统计信息做类似的事情则稍微复杂一些。


    传统上，数据库管理员依赖于根据统计信息的最后更新日期（例如，可以使用 `DBCC SHOW_STATISTICS` 语句或 `STATS_DATE` 函数查看）或
    `sys.sysindexes` 兼容视图中较旧的列（如 `rowmodctr`）来更新统计信息，这两者都有缺点。如果表在特定时间段内没有太大变化，那些统计信息可能仍然有用。此外，`rowmodctr`
    列不考虑主统计信息列的更改，而以下解决方案则会考虑。引入于 SQL Server 2012 Service Pack 1 和 SQL Server 2008
    R2 Service Pack 2，你可以使用一个新的 DMF——`sys.dm_db_stats_properties`，来返回有关特定统计信息对象的信息。其中一列
    `modification_counter`，返回自上次更新对象统计信息以来主统计信息列的更改次数，因此此值可用于决定何时更新它们。更新的时机点将取决于你的数据，并且可能难以估计，但至少你拥有比以前更好的选择。


    ### 与索引维护的协调


    除了统计信息维护作业外，通常还应该有重建或重组索引的作业，这使得选择更新统计信息的时机变得更加复杂。重建索引将更新统计信息，其效果等同于表级别的 `fullscan`。重组索引则完全不触及或更新统计信息。我们通常只希望根据碎片级别重建索引，因此只会更新这些索引的统计信息。我们可能不希望统计信息作业再次更新这些统计信息。传统上，这留给你的脚本来解决，面临着更新哪个统计信息对象的困难决定，有时最终导致同一个对象被更新两次。如前所述，目前可以通过使用
    `sys.dm_db_stats_properties` DMF 来解决或最小化这个问题。


    ### 未使用统计信息的维护


    最后，目前没有记录在案的方法来了解统计信息是否正在被查询优化器使用。让我们假设一个临时查询只执行了一次，它在某些列上创建了统计信息。假设这些统计信息再未被任何查询使用，维护作业仍将继续更新这些统计信息对象，只要这些列存在，就可能一直更新下去。


    > **注意**

    >

    > 如果你需要 SQL Server 维护解决方案，我强烈推荐使用 Ola Hallengren 的脚本进行备份、完整性检查以及索引和统计信息维护。此维护解决方案是免费的，可以从
    [`https://ola.hallengren.com/`](https://ola.hallengren.com/) 下载。'
  raw: '## Statistics Update


    By default, SQL Server automatically creates and updates query optimization statistics.
    You can change this database level default, but doing so is almost never recommended
    as it would require the developer or administrator to manually create and update
    all the required statistics. Although disabling the creation of statistics is
    possible, it does not make much sense as the query optimizer can efficiently create
    the required statistics for you. Some other statistics will be created automatically
    when you create indexes for the columns involved in the index key. Some statistics,
    however, like multicolumn statistics are not created automatically and would need
    to be created manually (some tools like the Database Engine Tuning Advisor could
    help on this, though).


    Updating statistics is a little bit different. SQL Server can automatically update
    statistics when a specific threshold is reached. Although there are two thresholds
    or algorithms used to accomplish this (which I’ll cover in more detail in a moment),
    a common problem is the size of the sample used to update the statistics object.
    High performance databases require a more proactive approach to updating statistics
    instead of letting SQL Server hit any of these two thresholds with a very small
    sample.


    The main problem I see with automatic statistics update is the traditional 20%
    fixed threshold of changes required to trigger the update operation, which for
    large tables would require a very significant amount of changes. The second algorithm
    mentioned, usually enabled by using trace flag 2371, improves a bit on the threshold
    required to automatically update statistics, but the size of sample issue remains.
    The statistics update is triggered during the query optimization process when
    you run a query but before it is executed. Since it is technically part of the
    execution process, only a very small sample is used. This small sample may not
    always be enough but at least makes sense as you may not want to use a larger
    sample in the middle of a query execution as it may dominate the execution time.


    The previous process can be efficient for many workloads, but for more performance-demanding
    applications, a more proactive approach is required. This proactive approach usually
    means having a scheduled maintenance job to update statistics on a regular basis.
    This method fixes both problems mentioned earlier—not having to wait for a specific
    large threshold to hit and providing a better sample size, if not using the entire
    table (which is called a fullscan).


    Note


    Keep in mind that having a maintenance job does not imply that you need a maintenance
    window with no activity at all as this and other maintenance jobs could run along
    with user transactions. However, a period with low activity is obviously strongly
    recommended.


    In my opinion, the new algorithm is not enough either, but it is certainly better
    than no automatic update of statistics. The benefit of the new algorithm is obvious
    with large tables, but a small sample used in such large tables may still be inadequate.
    This is the reason I recommend to proactively update statistics in the first place,
    but leave the automatic update enabled, just in case, as a second choice.


    Although there are free tools and scripts available to update statistics, even
    within SQL Server, creating an efficient script to perform this update is not
    as easy as it sounds, especially for large databases. Your script will have to
    deal with some or all of the following questions: Which tables, indexes, or statistics
    should be updated? What percentage of the table should be used as sample size?
    Do I need to do a fullscan? How often do I need to update statistics? Does updating
    statistics impact my database performance activity? Do I need a maintenance window?
    Does updating statistics frequently impact my plan cache? The answer to most of
    these questions will depend on the particular implementation as there are so many
    varying factors.


    First, we have to define a point at which to update statistics. For example, it
    is very easy to decide when to rebuild indexes as we can make such decision based
    on the index fragmentation level. Such information is easily available through
    the `sys.dm_db_index_physical_stats` DMV, whose documentation can be found at
    [`https://msdn.microsoft.com/en-us/library/ms188917.aspx`](https://msdn.microsoft.com/en-us/library/ms188917.aspx).
    The DMV documentation even provides a fragmentation threshold and a script to
    get started. But doing something similar for statistics is a little bit more complicated.


    Traditionally, database administrators relied on updating statistics based on
    the last updated date for statistics (which can be seen, e.g., using the `DBCC
    SHOW_STATISTICS` statement or the `STATS_DATE` function) or older columns like
    `rowmodctr` available on the `sys.sysindexes` compatibility view, both of which
    have some drawbacks. If a table hasn’t changed much in a specific period of time,
    those statistics may still be useful. In addition, the `rowmodctr` column does
    not consider changes for the leading statistics column as the following solution
    does. Introduced with SQL Server 2012 Service Pack 1 and SQL Server 2008 R2 Service
    Pack 2, you can use a new DMF, `sys.dm_db_stats_properties` , to return information
    about a specific statistics object. One of the columns, `modification_counter`
    , returns the number of changes for the leading statistics column, since the last
    time the statistics on the object were last updated so this value can be used
    to decide when to update them. The point at which to update will depend on your
    data and could be difficult to estimate, but at least you have better choices
    than before.


    Along with jobs for statistics maintenance, usually there also should be jobs
    to rebuild or reorganize indexes, which makes the choice to update statistics
    a bit more complicated. Rebuilding an index will update statistics with the equivalent
    of a table fullscan. Reorganizing an index does not touch or update statistics
    at all. We usually only want to rebuild indexes depending on their fragmentation
    level, so statistics will be updated only for those indexes. We may not want the
    statistics job to update those statistics again. Traditionally, this has been
    left to your scripts with the difficult decision about which statistics object
    to update and sometimes end up updating the same object twice. As mentioned, currently,
    this problem can be fixed or minimized by using the `sys.dm_db_stats_properties`
    DMF.


    Finally, there is currently no documented method of knowing if statistics are
    being used by the query optimizer. Let us suppose an ad hoc query was executed
    only once, which created statistics on some columns. Assuming those statistics
    are never used again by a query, maintenance jobs will continue to update those
    statistics objects potentially as long as the columns exist.


    Note: If you need a SQL Server maintenance solution, I strongly recommend using
    Ola Hallengren’s scripts for backups, integrity checks, and index and statistics
    maintenance. This maintenance solution is free and can be downloaded from [`https://ola.hallengren.com/`](https://ola.hallengren.com/).'
  trans: '## 统计信息更新


    ### 自动统计信息的创建与更新


    默认情况下，SQL Server 会自动创建并更新查询优化统计信息。你可以更改此数据库级别的默认设置，但这几乎从不被推荐，因为这将要求开发人员或管理员手动创建和更新所有必需的统计信息。虽然可以禁用统计信息的创建，但这没有太大意义，因为查询优化器可以高效地为你创建所需的统计信息。当你为索引键中涉及的列创建索引时，一些其他统计信息也会自动创建。然而，有些统计信息（如多列统计信息）不会自动创建，需要手动创建（不过，像
    Database Engine Tuning Advisor 这样的工具可以在此提供帮助）。


    更新统计信息则略有不同。当达到特定阈值时，SQL Server 可以自动更新统计信息。尽管有两种阈值或算法来实现这一点（我稍后会详细介绍），但一个常见问题是用于更新统计信息对象的样本大小。高性能数据库需要更主动地更新统计信息方法，而不是让
    SQL Server 使用非常小的样本去触发这两种阈值中的任何一种。


    ### 自动更新机制的问题


    我认为自动统计信息更新的主要问题是传统的 20% 固定更改阈值，需要达到此阈值才能触发更新操作。对于大表，这需要非常大量的更改。提到的第二种算法（通常通过使用跟踪标志
    `2371` 来启用）稍微改善了自动更新统计信息所需的阈值，但样本大小的问题仍然存在。统计信息更新是在查询优化过程中触发的——当你运行一个查询时，但在它执行之前。从技术上讲，由于它属于执行过程的一部分，因此只使用非常小的样本。这个小样本可能并不总是足够，但至少有一定道理，因为你可能不希望在查询执行过程中使用更大的样本，因为它可能主导执行时间。


    ### 主动维护方法


    前述过程对于许多工作负载可能是高效的，但对于性能要求更高的应用程序，需要一种更主动的方法。这种主动方法通常意味着拥有一个计划的维护作业，以定期更新统计信息。这种方法解决了前面提到的两个问题：无需等待达到特定的大阈值，并提供了更好的样本大小（如果不是使用整个表的话，这称为
    `fullscan`）。


    > **注意**

    >

    > 请记住，拥有维护作业并不意味着你需要一个完全无活动的维护窗口，因为这个作业和其他维护作业可以与用户事务一起运行。然而，显然强烈建议在活动量较低的时段进行。


    在我看来，新算法也不足够，但它肯定比没有自动统计信息更新要好。新算法对于大表的好处是显而易见的，但在如此大的表中使用小样本可能仍然不充分。这就是为什么我首先建议主动更新统计信息，但为了以防万一，仍将自动更新作为第二选择保留启用状态。


    ### 实施挑战


    尽管有免费的工具和脚本可用于更新统计信息（甚至在 SQL Server 内部），但创建一个高效执行此更新的脚本并不像听起来那么容易，特别是对于大型数据库。你的脚本将必须处理以下部分或全部问题：应该更新哪些表、索引或统计信息？应使用表的百分之多少作为样本大小？我需要执行
    `fullscan` 吗？我需要多长时间更新一次统计信息？更新统计信息会影响我的数据库性能活动吗？我需要维护窗口吗？频繁更新会影响我的计划缓存吗？大多数这些问题的答案将取决于具体实现，因为涉及太多不同的因素。


    ### 确定更新时机


    首先，我们必须定义更新统计信息的时机点。例如，决定何时重建索引非常容易，因为我们可以基于索引碎片级别做出这样的决定。此类信息可以通过 `sys.dm_db_index_physical_stats`
    DMV 轻松获取，其文档可在 [`https://msdn.microsoft.com/en-us/library/ms188917.aspx`](https://msdn.microsoft.com/en-us/library/ms188917.aspx)
    找到。该 DMV 文档甚至提供了碎片阈值和入门脚本。但为统计信息做类似的事情则稍微复杂一些。


    传统上，数据库管理员依赖于根据统计信息的最后更新日期（例如，可以使用 `DBCC SHOW_STATISTICS` 语句或 `STATS_DATE` 函数查看）或
    `sys.sysindexes` 兼容视图中较旧的列（如 `rowmodctr`）来更新统计信息，这两者都有缺点。如果表在特定时间段内没有太大变化，那些统计信息可能仍然有用。此外，`rowmodctr`
    列不考虑主统计信息列的更改，而以下解决方案则会考虑。引入于 SQL Server 2012 Service Pack 1 和 SQL Server 2008
    R2 Service Pack 2，你可以使用一个新的 DMF——`sys.dm_db_stats_properties`，来返回有关特定统计信息对象的信息。其中一列
    `modification_counter`，返回自上次更新对象统计信息以来主统计信息列的更改次数，因此此值可用于决定何时更新它们。更新的时机点将取决于你的数据，并且可能难以估计，但至少你拥有比以前更好的选择。


    ### 与索引维护的协调


    除了统计信息维护作业外，通常还应该有重建或重组索引的作业，这使得选择更新统计信息的时机变得更加复杂。重建索引将更新统计信息，其效果等同于表级别的 `fullscan`。重组索引则完全不触及或更新统计信息。我们通常只希望根据碎片级别重建索引，因此只会更新这些索引的统计信息。我们可能不希望统计信息作业再次更新这些统计信息。传统上，这留给你的脚本来解决，面临着更新哪个统计信息对象的困难决定，有时最终导致同一个对象被更新两次。如前所述，目前可以通过使用
    `sys.dm_db_stats_properties` DMF 来解决或最小化这个问题。


    ### 未使用统计信息的维护


    最后，目前没有记录在案的方法来了解统计信息是否正在被查询优化器使用。让我们假设一个临时查询只执行了一次，它在某些列上创建了统计信息。假设这些统计信息再未被任何查询使用，维护作业仍将继续更新这些统计信息对象，只要这些列存在，就可能一直更新下去。


    > **注意**

    >

    > 如果你需要 SQL Server 维护解决方案，我强烈推荐使用 Ola Hallengren 的脚本进行备份、完整性检查以及索引和统计信息维护。此维护解决方案是免费的，可以从
    [`https://ola.hallengren.com/`](https://ola.hallengren.com/) 下载。'
- fmt: '## Standard Automatic Statistics Update


    Automatically updating statistics has been available since SQL Server 7, when
    the query processor was rearchitected and the statistics feature was introduced.
    Since then, the algorithm to automatically update statistics has not changed much;
    for tables with more than 500 rows, the automatic update will hit when the column
    modification counters (`colmodctrs`) or changes on the statistics leading column
    hit 20% of changes plus 500.


    Keep in mind that SQL Server 7 and SQL Server 2000 relied instead on the `rowmodctrs`
    or row-level modification counters to get the same behavior. Obviously, using
    `rowmodctrs` was not optimal as it was not based on the statistics leading column.
    For example, suppose there was a statistics object on column `c1`, 25% of changes
    on column `c2`, but no changes on `c1`. This will still trigger a statistics update
    on column `c1` which was not needed at all.


    A few more details about the algorithm to automatically update statistics, especially
    as it relates to tables with 500 rows or smaller, temporary tables, and filtered
    statistics, can be found at the white paper listed at the end of this section.


    ### Trace Flag 2371


    Trace flag 2371 was introduced with SQL Server 2008 R2 as a way to change and
    lower the threshold in which statistics are automatically updated, and, as any
    other trace flag, it had to be manually enabled. The new algorithm will use whatever
    number of changes is smaller between the new formula, defined as `SQRT(1000 *
    number of rows)`, and the old one using 20% of the size of the table. If you do
    the math using both formulas, you can see that the threshold changes with tables
    of 25,000 rows in which both cases return the same value, 5000 changes. For example,
    with the default algorithm requiring 20% of changes, if a large table has a billion
    rows, it would require 200 million rows to trigger the update. Trace flag 2371
    would require a smaller threshold, in this case `SQRT(1000 * 1000000000)` or 1
    million.


    Starting with SQL Server 2016, the behavior of trace flag 2371 is enabled by default
    when you use the compatibility levels 130, 140, and 150, which basically includes
    the latest three versions of the product.


    Finally, as covering statistics in full detail is outside the scope of this book,
    I would recommend the Microsoft white paper “Statistics Used by the Query Optimizer
    in Microsoft SQL Server 2008,” which you can still find at [`https://msdn.microsoft.com/en-us/library/dd535534`](https://msdn.microsoft.com/en-us/library/dd535534)`(SQL.100).aspx`.
    Although written for SQL Server 2008, its contents are still relevant for all
    the supported versions of the product.


    ## tempdb Configuration


    The `tempdb` database has multiple configuration options that may greatly impact
    the performance of your SQL Server instance. In addition, there are several changes
    introduced with SQL Server 2016 that you need to be aware of. Those include the
    ability to automatically create multiple data files during setup based on the
    number of available processors on the system, or the new default `tempdb` configuration,
    which integrates the behavior of trace flags 1117 and 1118. These and other changes
    are covered in Chapter [4](#393702_2_En_4_Chapter.xhtml), which is dedicated to
    tempdb.


    ## Query Optimizer Hotfix Servicing Model


    Starting with SQL Server 2000 Service Pack 3, query optimizer hotfixes were provided
    disabled by default and required different trace flags to enable them (e.g., using
    some of the trace flags with values between 4101 and 4135). The reason for requiring
    to explicitly enable them was to have execution plan stability and avoid plan
    regressions. Although the purpose of those updates was to fix some other problems,
    since they also included query optimizer improvements, regressions were still
    possible. For later versions (starting with SQL Server 2005 Service Pack 3 Cumulative
    Update 6, SQL Server 2008 Service Pack 1 Cumulative Update 7, and SQL Server 2008
    R2 RTM), Microsoft decided to combine most of the query optimizer upgrades into
    a single trace flag, 4199. There were still a few particular cases that required
    their own trace flag, but the majority was using 4199. The plan was to put together
    under the same trace flag all those updates that could be enabled by default in
    a future release. That future release was SQL Server 2016.


    Starting with SQL Server 2016, while using the latest compatibility level, all
    the query optimizer–related hotfixes, which in previous versions required trace
    flag 4199, will now be automatically enabled. Should you encounter a plan regression
    or any other problem, you just need to go back to a previous compatibility level
    to disable those query optimizer updates, assuming trace flag 4199 is disabled.


    Trace flag 4199 will now be used to enable new query optimizer hotfixes, released
    after the SQL Server RTM version. Finally, if you use a previous compatibility
    level and disable trace flag 4199, you are disabling query optimizer hotfixes
    released both before and after the SQL Server RTM.


    Table [3-1](#393702_2_En_3_Chapter.xhtml#Tab1) shows a summary of all possible
    scenarios mentioned when using the compatibility level and trace flag 4199 as
    defined in the SQL Server documentation.


    Table 3-1: Trace Flag 4199 Servicing Model for SQL Server


    | SQL Server Version | Database Compatibility Level | TF 4199 | QO Changes from
    All Previous Database Compatibility Levels | QO Changes Post-RTM |

    | --- | --- | --- | --- | --- |

    | SQL Server 2016 | **100 to 120** | Off | Disabled | Disabled |

    | | | On | Enabled | Enabled |

    | | **130** (Default) | Off | Enabled | Disabled |

    | | | On | Enabled | Enabled |

    | SQL Server 2017 | **100 to 120** | Off | Disabled | Disabled |

    | | | On | Enabled | Enabled |

    | | **130** | Off | Enabled | Disabled |

    | | | On | Enabled | Enabled |

    | | **140** (Default) | Off | Enabled | Disabled |

    | | | On | Enabled | Enabled |

    | SQL Server 2019 | **100 to 120** | Off | Disabled | Disabled |

    | | | On | Enabled | Enabled |

    | | **130 to 140** | Off | Enabled | Disabled |

    | | | On | Enabled | Enabled |

    | | **150** (Default) | Off | Enabled | Disabled |

    | | | On | Enabled | Enabled |


    As you may guess , the service model described in Table [3-1](#393702_2_En_3_Chapter.xhtml#Tab1)
    will be applied to future versions of the product where, for example, a newer
    compatibility level could be used to enable the query optimizer hotfixes before
    that version and the previous compatibility level to disable them in case of a
    performance regression (again, assuming trace flag 4199 is disabled). For more
    details, see “SQL Server Query Optimizer Hotfix Trace Flag 4199 Servicing Model”
    at [`https://support.microsoft.com/en-us/kb/974006`](https://support.microsoft.com/en-us/kb/974006).


    In addition, also new with SQL Server 2016, you can enable query optimizer hotfixes
    at the database level, regardless of their compatibility level, by using the `QUERY_OPTIMIZER_HOTFIXES`
    option of the new `ALTER DATABASE SCOPED CONFIGURATION` syntax. You can use this
    syntax as in the following statement:


    ```

    ALTER DATABASE SCOPED CONFIGURATION SET QUERY_OPTIMIZER_HOTFIXES = ON

    ```'
