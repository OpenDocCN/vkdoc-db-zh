  trans: '## 计时器等待类型


    通常由后台系统进程使用的几种等待类型，其等待时间长并不一定意味着存在问题。之前介绍 `REQUEST_FOR_DEADLOCK_SEARCH` 等待时，已涉及其中一种。让我们更新之前的查询，加入部分此类等待类型，以便查看哪些任务使用了它们：


    ```sql

    SELECT session_id, command, wait_type, wait_time FROM sys.dm_exec_requests

    WHERE wait_type IN (''BAD_PAGE_PROCESS'',

    ''BROKER_EVENTHANDLER'',

    ''BROKER_TRANSMITTER'',

    ''CHECKPOINT_QUEUE'',

    ''DBMIRROR_EVENTS_QUEUE'',

    ''DBMIRRORING_CMD'',

    ''KSOURCE_WAKEUP'',

    ''LAZYWRITER_SLEEP'',

    ''LOGMGR_QUEUE'',

    ''ONDEMAND_TASK_QUEUE'',

    ''REQUEST_FOR_DEADLOCK_SEARCH'',

    ''SQLTRACE_BUFFER_FLUSH'',

    ''WAITFOR'')

    ```


    在我的测试系统上获得以下输出：


    | session_id | Command | wait_type | wait_time |

    | --- | --- | --- | --- |

    | 1 | LAZY WRITER | LAZYWRITER_SLEEP | 938 |

    | 3 | LOG WRITER | LOGMGR_QUEUE | 79 |

    | 4 | SIGNAL HANDLER | KSOURCE_WAKEUP | 445305651 |

    | 5 | LOCK MONITOR | REQUEST_FOR_DEADLOCK_SEARCH | 4736 |

    | 6 | BRKR TASK | BROKER_TRANSMITTER | 445366653 |

    | 12 | RESOURCE MONITOR | ONDEMAND_TASK_QUEUE | 42312 |

    | 14 | CHECKPOINT | CHECKPOINT_QUEUE | 9784594 |

    | 25 | BRKR EVENT HNDLR | BROKER_EVENTHANDLER | 445322210 |

    | 29 | BRKR TASK | BROKER_TRANSMITTER | 445366652 |

    | 55 | WAITFOR | WAITFOR | 100651 |


    如你所见，特别是如果你多次运行查询监控其输出，有些等待时间极长，而其他等待的时间似乎会定期重置。


    其中一些等待类型的等待时间会在特定秒数后重置为 0。例如，延迟写入器（lazy writer）会在 1 秒后重置，资源监视器任务（resource monitor
    task）会在 60 秒后重置。这些后台任务中的一些拥有专用的工作线程，因此它们不会每次需要执行工作时都创建新任务，而是在工作间隔期间被挂起。在示例输出中，`WAITFOR`
    是由执行 `WAITFOR` 语句的用户查询显式执行的，因此会话 ID 55 并非后台进程。


    部分有趣的后台进程如下：


    1.  延迟写入器

    2.  日志写入器

    3.  信号处理器

    4.  锁监视器

    5.  资源监视器

    6.  检查点


    你可以使用 `sys.dm_exec_requests` 的 status 列来列出所有作为后台任务运行的会话，如下列查询所示：


    ```sql

    SELECT session_id, command, wait_type, wait_time, status FROM sys.dm_exec_requests

    WHERE status = ''background''

    ```


    ## SQL Server 2019 的新特性


    SQL Server 2019 引入了两个与等待统计信息相关的变更。第一个是新的等待类型 `WAIT_ON_SYNC_STATISTICS_REFRESH`，它显示在同步统计信息刷新操作上累积的等待时间。此外，`sys.dm_exec_request`
    DMV 的 command 列现在会在 `SELECT` 语句等待此类同步统计信息时显示 `SELECT (STATMAN)`。


    请记住，同步统计信息刷新操作是在查询优化过程中执行的常规优化统计信息更新，这显然不同于通过 `ALTER DATABASE` 语句的 `AUTO_UPDATE_STATISTICS_ASYNC`
    选项手动配置的异步统计信息刷新操作。关于统计信息及统计信息维护的更多详细信息，请参阅第 1 章和第 3 章。


    ## 阻塞


    阻塞本身是一个很大的主题，即使不写一整本书，也值得用一章来阐述。由于深入探讨阻塞超出了本书范围，我将在本节介绍基础知识，并在末尾提供更多信息的参考。阻塞与锁等待相关，对其进行故障排除的最佳方法之一是使用
    `sys.dm_tran_locks` 或 `sys.dm_os_waiting_tasks` DMV，它们会显示为 `LCK_` 等待类型。锁可以在 RID、键、页、区、表、元数据、数据库及其他级别获取。资源锁模式也有多种，包括共享（S）、更新（U）、排他（X）、意向、架构、大容量更新（BU）和键范围。


    如此多的选择产生了大量的锁和锁等待类型（在当前所有支持的 SQL Server 版本中总共 63 种），由 `LCK` 前缀标识，例如之前示例中显示的 `LCK_M_S`、`LCK_M_U`、`LCK_M_X`
    等，以及根据资源不同而有多种不同的资源格式，所有这些都在 `sys.dm_os_waiting_tasks`（[`https://msdn.microsoft.com/en-us/library/ms188743.aspx`](https://msdn.microsoft.com/en-us/library/ms188743.aspx)）文档的锁资源所有者部分有记录。例如，页资源格式为：


    ```

    pagelock fileid= pageid= dbid= subresource=

    ```


    像往常一样，不要自动假定锁本身就是性能问题的根本原因，因为通过最小化事务大小和其他优化措施，有可能避免或最小化此类等待。我经常看到一个糟糕的建议是直接使用
    `NOLOCK` 提示来避免锁。这并不意味着 `NOLOCK` 提示永远不应该使用。该提示的存在有其原因，但我看到它被滥用了。开发人员应该理解 `NOLOCK`
    的实际工作原理，以及它对于他们正在使用的业务事务是否有意义。还应考虑替代解决方案，例如实现快照隔离。


    阻塞进程阈值配置选项使用了前面提到的死锁监视器后台线程，并且可以使用 `sp_configure` 进行配置。默认配置为 0，表示不生成阻塞进程报告。下面是一个将阻塞进程阈值配置为五秒的示例：


    ```sql

    sp_configure ''blocked process threshold'', 5

    RECONFIGURE

    ```


    注意：你可以使用 "blocked process threshold" 或 "blocked process threshold(s)"，或者从技术上讲，任何其他属于配置名称一部分的唯一字符串。这对于任何其他配置选项也是如此。


    当两个或多个进程永久相互阻塞时，就会发生死锁。然而，你通常没有时间对这些等待做出反应。SQL Server 引擎会在五秒内检测到它们并终止涉及的其中一个进程。虽然由数据库引擎自动处理，但它们仍然是个问题，SQL
    Server 提供了多种工具来对其进行故障排除。文档中还发布了几条关于如何处理它们的建议，包括保持事务简短以及以相同顺序访问对象。死锁由死锁监视器后台线程检测。


    有关锁的更多信息，请参阅 [`https://technet.microsoft.com/en-us/library/ms190615(v=sql.105).aspx`](https://technet.microsoft.com/en-us/library/ms190615%28v=sql.105%29.aspx)
    上的“数据库引擎中的锁定”。


    ## 内存 OLTP


    尽管内存 OLTP（有时以其原项目名称 Hekaton 为人所知）在第 7 章中有详细介绍，但在本节中，我将介绍其性能优势，特别是与锁和闩锁等待相关的方面。内存
    OLTP 包含基于新硬件趋势的若干性能优势，例如：


    1.  表和索引针对纯内存使用进行了优化。

    2.  新的原生编译存储过程被编译为本机代码。

    3.  无需锁和闩锁。


    基于依赖于版本控制的新乐观并发方法，这项新技术不使用锁和闩锁，从而消除了阻塞。然而，仍然需要处理事务冲突，在某些情况下，可能需要重新提交事务。值得注意的是，这个新的版本控制过程完全基于内存，与
    SQL Server 2005 引入并用于快照隔离、MARS 或触发器等功能的 `tempdb` 版本控制技术不同。'
- fmt: '## Summary


    This chapter introduced the waits performance methodology, which can be used to
    fix performance problems especially when other traditional methods are not able
    to pinpoint the performance issue. An advanced methodology will usually require
    looking at and correlating with other performance information on the SQL Server
    instance or even with clients or other data sources interacting with SQL Server.
    In addition, since waits happen in a SQL Server instance all the time, additional
    knowledge and baselining is required to understand when waits are, in fact, a
    problem.


    # 6. The Query Store


    Have you ever had a performance problem due to the fact that a query unexpectedly
    got a different execution plan? Have you ever found a plan regression after a
    SQL Server upgrade and wanted to know what the previous execution plan for a query
    was? The `Query Store`, a feature introduced with SQL Server 2016, can help you
    to troubleshoot and solve these and other performance problems related to changes
    in execution plans.


    The `Query Store` automatically captures the history of queries, execution plans,
    and runtime statistics, and it allows you to find regressions in query plans,
    identify expensive queries, and even force the query processor to use a previously
    captured execution plan. Currently available in all the editions of SQL Server,
    this feature was originally released as a cloud-first feature on Azure SQL Database.


    This chapter covers the `Query Store` as a collection and troubleshooting tool
    and shows how you can use it to quickly fix a performance problem by forcing an
    existing execution plan. However, as with the use of query hints, forcing a plan
    is not considered a long-term solution, and traditional query-tuning techniques
    may still be required to fix a query performance problem. This chapter also covers
    `Live Query Statistics`, another query performance–related feature introduced
    with SQL Server 2016.


    ## Why Is a Query Slow?


    To understand the benefits of the `Query Store`, let me start talking about the
    query troubleshooting process. You can use the `Query Store`, or some other tools,
    to find out if the reason we have a performance problem is because one or more
    queries are slow, and then identify what those queries are. Once you have detected
    that a performance problem is due to a slow query, the next step is to find out
    why. Obviously, not every query performance problem is related to plan changes.
    There could be multiple reasons why a query that has been performing well is suddenly
    slow. Sometimes this could be related to blocking or waiting for some other system
    resources, which I covered in Chapter 5. In many cases, the reason is that something
    may have changed, but the challenge may be to find out what it is. Usually, we
    don’t have a baseline about system resource usage, query execution statistics,
    or performance history. In fact, often we have no idea what the old plan was.
    It may be the case that a change, for example, in data, schema, or query parameters,
    made the query processor produce a new plan. It may also be the extreme case that
    after getting more data, an increasing workload, or some other changes, the new
    plan, although taking longer to execute than before, may be the new “good plan”
    for the new database state.


    ## Plan Changes


    The `Picasso Database Query Optimizer Visualizer` tool, developed by the Indian
    Institute of Science, can be used to show why the plans in a query change and
    how many different plans could be selected for the same query based on the selectivity
    of their predicates. An example diagram of the `Picasso Database Query Optimizer
    Visualizer` tool is shown in Figure 6-1.


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig1_HTML.jpg](images/393702_2_En_6_Chapter/393702_2_En_6_Fig1_HTML.jpg)


    Figure 6-1 Picasso Database Query Optimizer Visualizer


    Each color in the diagram is a different plan for the same query, and each plan
    is selected based on the selectivity of the predicates. It is interesting to note
    that when a boundary in the graph is crossed and a different plan is selected,
    most of the time the cost and performance of both plans should be similar, as
    the selectivity or estimated number of rows only changed slightly. This could
    happen, for example, when a new row is added to a table that qualifies for the
    used predicate. However, in some cases, mostly due to limitations in the query
    optimizer cost model in which it is unable to model something correctly, the new
    plan can have a large performance difference compared to the previous one, creating
    a problem for your application and its users. It is worth clarifying that the
    plans shown in the diagram are the final plans selected by the query optimizer
    for the same query depending on the selectivity of the parameters used. They are
    not some of the many alternatives the optimizer has to consider selecting only
    one. You can find more information about the `Picasso Database Query Optimizer
    Visualizer` tool at `http://dsl.cds.iisc.ac.in/projects/PICASSO`.


    Another well-known problem with plans is performance issues due to regressions
    after changes on SQL Server cumulative updates (CUs), service packs, or version
    upgrades. A major concern that comes to mind with changes inside the query optimizer
    is plan regressions, which have been considered a big obstacle to query optimizer
    improvements. Regressions are problems introduced after a fix has been applied
    to the query optimizer, and it is sometimes referred to as the classic “two or
    more wrongs make a right.” For example, this can happen when two bad estimations,
    one overestimating a value and the second one underestimating it, cancel each
    other out, luckily giving a good estimate and therefore producing a good execution
    plan overall. Correcting only one of these values after a query optimizer improvement
    may now lead to a bad estimation that may negatively impact the choice of plan
    selection, causing a regression in performance.


    ## How the Query Store Can Help


    By collecting query and plan information, gathering runtime statistics, and allowing
    you to force an existing query plan, the `Query Store` can be useful in the following
    scenarios:


    1.  Plan regressions

    2.  SQL Server upgrades

    3.  Application/hardware changes

    4.  Identify expensive queries

    5.  Identify ad hoc workloads


    ### Plan Regressions


    In previous versions of SQL Server, there was no easy way to know if a plan regression
    had occurred as you could only see the current version of a specific plan. By
    storing the history of query plans in the system and capturing the performance
    of each one over time, the `Query Store` allows you to identify queries that have
    got slower over time. The “Regressed Queries” report can be used to identify queries
    for execution metrics that have recently regressed and may be creating performance
    problems in your database.'
