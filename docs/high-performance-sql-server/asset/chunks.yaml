    打开第二个会话并运行以下代码，将会话 ID 替换为你在上一步中获取的信息：


    ```

    SELECT * FROM sys.dm_exec_query_profiles

    WHERE session_id = 55

    ```


    你将为每个当前正在执行的操作符获得一行数据，并且如果你执行几次，应该能看到一些计数器（如 `row_count`、`cpu_time_ms` 或 `logical_read_count`）随着查询的执行而更新其信息。要结束练习，不要忘记取消第一个查询，因为它会运行很长时间并消耗大量资源。


    最后，SQL Server Management Studio 还包含一个计划比较工具，可用于比较执行计划以进行故障排除。此工具在查询调优场景中非常有用，例如测试查询的更改或查询所使用对象（如索引）的更改。有关此工具的更多信息，请参阅
    [`http://blogs.msdn.com/b/sql_server_team/archive/2015/10/12/comparison-tool-released-with-latest-ssms.aspx`](http://blogs.msdn.com/b/sql_server_team/archive/2015/10/12/comparison-tool-released-with-latest-ssms.aspx)。


    ## 总结


    查询存储和实时查询统计是 SQL Server 2016 引入的两个最重要的数据库引擎功能，旨在帮助你进行查询性能故障排除。查询存储通过收集优化和执行运行时统计信息，允许你排除查询性能故障，帮助你精确定位可能已出现性能回退的查询。其数据也可用于查找可作为额外查询调优候选的昂贵查询。最后，查询存储可用于强制查询使用特定计划，这在发现计划回退时非常有用。


    虽然查询存储处理的是已完成查询的数据，但实时查询统计可用于在查询仍在运行时对其进行故障排除，这对于那些要么永远无法完成、要么运行数小时后失败、要么需要数小时才能完成的查询非常有用。


    # 第四部分 性能调优与故障排除


    ## 7. SQL Server 内存中技术


    本章涵盖内存中数据库以及一些其他新技术和范式，这些技术从根本上脱离了传统基于磁盘的行存储架构和查询处理算法，而大多数关系数据库几十年来一直使用这些传统技术。当前的关系数据库架构可追溯到
    20 世纪 70 年代末，当时硬件与今天完全不同，数据库太大无法全部装入内存，并被假定保存在磁盘上。除了更快的处理器和不断下降的内存成本外，当前硬件的内存容量已大幅增加，以至于现在大多数事务数据库可以完全放入内存中。


    微软首先在分析和数仓领域引入了内存中数据库技术。这项基于列的存储引擎技术最初作为 Excel 的 PowerPivot 插件的一部分提供，后来包含在 Analysis
    Services 产品中。它最终以列存储索引的形式进入了 SQL Server 关系引擎，并在 SQL Server 2012 中首次引入，经过几个版本的发展，如今已有了非常重要的增强。尽管这项技术是基于列的存储，但值得注意的是，它也是一项内存优化技术，事实上，它有时被称为内存中列存储。通过列存储索引，SQL
    Server 引入了另一种新范式——批处理执行模式，与 SQL Server 所有版本中一直使用的传统基于行的执行相比，这是一种查询处理改进。


    内存中技术首次亮相于事务处理领域是在 2014 年推出 SQL Server 2014 时，其内存中 OLTP（在线事务处理）功能，因其项目名称而在 2012
    年底宣布时被广泛称为 Hekaton。内存中 OLTP 还引入了一种新型存储过程，称为本机编译存储过程，它被编译为机器本机代码，并以进程内 DLL（动态链接库）的形式加载到内存中。与列存储索引的初期类似，Hekaton
    在其初始版本中存在相当大的限制。幸运的是，随着产品新版本的发布，它已得到极大改进，允许更多应用程序迁移到它上面。


    SQL Server 2012 为分析和数据仓库工作负载引入了列存储索引，SQL Server 2014 为事务数据库引入了内存中 OLTP，而 SQL Server
    2016 版本则结合了这两项技术，通过允许你在操作表上创建列存储索引来提供实时分析。这些列存储索引现在是可更新的，并且可以如前所述在操作表上创建，这些表既可以是常规的基于磁盘的表，也可以是内存优化的
    Hekaton 表。


    尽管本章包含的代码可能比本书其余章节更多，但主要重点是展示新的内存中功能、它们的特性和性能优势。它并非编程指南，因此实现某个功能可能需要查阅 SQL Server
    文档。


    由于本章涵盖新技术和新范式，它也使用了与本书其他部分不同的术语。它使用术语“基于磁盘的表”来指代传统表，以区别于新的内存优化表。本机编译存储过程也与传统存储过程形成对比。此外，它使用术语“行存储”来指代传统的行存储，以区别于新的基于列的技术（或列存储）。

