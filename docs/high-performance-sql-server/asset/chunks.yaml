  trans: '

    ### 日志增长


    日志增长是一种开销很大的操作，可能对数据库性能产生负面影响。在 `SQLServer:Databases` 性能对象下，`Log Growths` 计数器显示了数据库日志增长的总次数。这个性能计数器尤为重要，它揭示了为何正确设置数据库文件大小至关重要，更关键的是，解释了为何不应依赖默认大小配置。是的，现实中确实存在使用这些默认配置的生产数据库。此外，**即时文件初始化**（在第
    3 章和第 4 章均有提及）有助于跳过数据文件的零初始化过程，使文件增长操作几乎瞬间完成，但此功能对事务日志文件无效。


    我们来做一个快速练习。创建一个使用默认配置的数据库：


    ```

    CREATE DATABASE test

    ```


    通过检查数据库属性（例如，在 SQL Server Management Studio 中使用“文件”页），你可以看到事务日志文件的初始大小为 8 MB，并且启用了自动增长，配置为每次增长
    64 MB。打开性能监视器（Performance Monitor），并跟踪 `SQLServer:Databases` 对象下的 `Log Growths`
    和 `Log File(s) Size (KB)` 这两个计数器。`Log File(s) Size (KB)` 是数据库中所有日志文件的累计大小（尽管通常一个数据库只需一个这样的文件）。请确保只选择
    `test` 数据库。


    让我们创建一些事务。我们将稍微修改之前的表示例，使行更大，从而能更快地填满数据页。运行以下语句：


    ```

    USE DATABASE test

    GO

    CREATE TABLE t1 (id int IDENTITY(1,1), name char(8000))

    ```


    添加数据以给事务日志文件施加压力：


    ```

    BEGIN

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    INSERT INTO t1 VALUES (''Hello'')

    END

    GO 30000

    ```


    最初，`Log Growths` 会显示 0，而 `Log File(s) Size (KB)` 显示 8184，这对应于前面提到的 8 MB。在运行代码时，请仔细查看性能监视器。在这种情况下，如果选择将数据可视化为报告，可能更容易跟踪。`Log
    Growths` 很快就会达到 10，此时你可以取消查询。10 次文件增长，每次 64 MB，加上原始的 8 MB，总大小应为 648 MB，这正是我在练习结束时看到的文件大小。换句话说，`Log
    File(s) Size (KB)` 将显示 663,544，而 `Log Growths` 显示 10。练习结束后，请删除该数据库以结束练习。


    如前所述，强烈建议将事务日志文件大小设置为所需的最大值，以避免日志增长；更糟糕的是，如果文件变满且无法扩展，可能导致事务失败和潜在的应用程序中断。通常，找到最优文件大小需要进行一些测试，但不幸的是，仍可能发生意外的活动或长时间运行的事务，导致日志需要增长。不过，遵循之前的建议，你可以避免或最小化这些情况的发生。


    与事务日志文件增长操作相关的性能问题可能非常难以排查，除非您正在跟踪或收集数据，因为通常在文件大小增加后，性能会恢复正常，没有任何信息能显示问题所在。`PREEMPTIVE_OS_WRITEFILEGATHER`
    等待类型也可能表明某个文件正在进行零初始化，但根据您捕获等待信息的方式，您可能没有指向特定数据库或文件的额外信息。有关使用等待排查性能问题的更多详细信息，请参见第
    5 章。


    最后，您可能能够使用 SQL Server 默认跟踪查看这些事件，并通过运行“磁盘使用情况报告”立即可视化其信息。要运行报告，请右键单击 `test` 数据库，选择“报表”
    > “标准报表” > “磁盘使用情况”。信息显示在“数据/日志文件自动增长/自动收缩事件”部分。请记住，默认跟踪的文件大小有限，较旧的事件最终会被删除。


    ### 数据文件大小 (KB)


    与前一节解释的 `Log File(s) Size (KB)` 类似，`Data File(s) Size (KB)` 性能计数器显示数据库中所有数据文件的累计大小。与事务日志文件不同，数据库中拥有多个数据文件是非常常见的。


    尽管没有像 `Log Growths` 那样针对数据文件的对应计数器，但您可以使用 `Data File(s) Size (KB)` 计数器来判断数据文件增长操作何时发生。再次强调，正确设置数据文件大小并启用即时文件初始化，可以帮助您避免与数据文件增长操作相关的性能问题。


    注意

    SQL Server 默认跟踪和“磁盘使用情况报告”也有助于显示数据文件自动增长事件。


    ### 每秒页面读取数


    在 `SQLServer:Buffer Manager` 性能对象下，`Page reads/sec` 显示 SQL Server 读取的物理数据库页数。排查
    `Page reads/sec` 过高的问题需要额外信息，例如找出哪些查询正在执行大量读取，或者分析某些 DMV（如 `sys.dm_io_virtual_file_stats`
    或 `sys.dm_db_index_usage_stats`）的输出。查看内存信息也可能有帮助。


    排查与查询相关的问题需要使用传统的查询优化技术，包括分析查询执行计划、查看是否需要一个或多个索引、查找是否正在执行过多的表扫描或索引查找，或者研究参数敏感的查询是否影响了
    I/O 操作。


    注意

    如本章后面所示，从 SQL Server 2016 和 SQL Server 2014 Service Pack 2 开始，您可以在执行计划中找到操作符级别的性能信息，包括
    I/O 统计信息。


    ### 每秒页面写入数


    在 `SQLServer:Buffer Manager` 性能对象下，`Page writes/sec` 显示每秒发出的物理数据库页写入数。关于 `Page
    reads/sec` 的大多数建议也可能适用于此。您还可以尝试将此计数器与后面解释的日志刷新计数器关联起来分析。

    '
- fmt: '### Page Life Expectancy


    The Page Life Expectancy (PLE) performance counter, under the `SQLServer:Buffer
    Manager` object, shows the average number of seconds a data page will stay in
    the buffer pool. Although there is still a lot of advice online about considering
    a value of 300 and lower as the threshold where PLE is a problem, this is no longer
    a good recommendation. This recommendation was originally published by Microsoft
    many years ago based on the paper “The Five-Minute Rule for Trading Memory for
    Disc Accesses and the Five-Byte Rule for Trading Memory for CPU Time.” The rule
    refers to the tipping point between when a page should be kept in memory and accessed
    from disk based on cost—both price and performance.


    > Note

    >

    > The paper is still an interesting read, and you can find it online at [`www.hpl.hp.com/techreports/tandem/TR-86.1.pdf`](http://www.hpl.hp.com/techreports/tandem/TR-86.1.pdf).
    In addition, the five-minute rule was reviewed 10 and 20 years later, and you
    can read about the new findings by looking at “The Five-Minute Rule Ten Years
    Later and Other Computer Storage Rules of Thumb” at [`http://research.microsoft.com/en-us/um/people/gray/5_min_rule_sigmod.pdf`](http://research.microsoft.com/en-us/um/people/gray/5_min_rule_sigmod.pdf)
    and “The Five-Minute Rule 20 Years Later and How Flash Memory Changes the Rules”
    at [`http://cacm.acm.org/magazines/2009/7/32091-the-five-minute-rule-20-years-later`](http://cacm.acm.org/magazines/2009/7/32091-the-five-minute-rule-20-years-later).


    Based on most current hardware trends, you will be better by having a baseline
    and considering an issue only if the PLE drops for an extended period of time.
    PLE dropping for a short time may not be a problem, as some expensive queries
    and jobs may cause it, but it should be able to recover soon.


    A second item to consider regarding PLE is if you are using a non-uniform memory
    access (NUMA) architecture, something that is very common these days. If you are
    using NUMA, you should use PLE from the `SQLServer:Buffer Node` object, as `SQLServer:Buffer
    Manager` will show a general value for all the NUMA nodes. In this scenario, there
    could be a case where the PLE for a NUMA node has a problem and may need your
    attention, but if you focus on the general PLE, such a problem may not be apparent.
    In a similar way, a major change in one node—for example, a maintenance job dropping
    the PLE in a large way—may also impact the general value, making the problem look
    like a system-wide problem.


    ### Buffer Cache Hit Ratio


    This performance counter, also from `SQLServer:Buffer Manager`, shows the percentage
    of pages that were returned from the buffer pool without having to resort to disk.
    This ratio is calculated considering only the last few thousand page accesses,
    and a 100% or close to 100% ratio is desirable.


    ### % Processor Time


    An essential performance counter to monitor and straightforward to understand,
    % Processor Time, under the `Processor` object, measures the average percentage
    of time the processor spends executing non-idle threads, and it is the primary
    indicator of processor activity.


    Obviously, the first thing to validate after high processor usage is if it is
    SQL Server related, which, in a dedicated server, is most likely going to be the
    case. Having said that, a high performance installation requires to run SQL Server
    not only on its own server but also as the only SQL Server instance. But even
    in such configurations, it is good to discard the cases when some other Windows
    service or application may be the problem. I’ve seen such cases in production
    too.


    To analyze the percentage of time the processor spends executing a specific process,
    you can use the % Processor Time, this time under the `Process` object. While
    looking at this counter in Performance Monitor, you may want to select the SQL
    Server process or a few other processes you suspect are consuming processor time.
    Your server may list a large number of instances (in this case, processes). The
    database engine service is called `sqlservr` (corresponding to the executable
    file `C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\Binn\sqlservr.exe`).
    Some other SQL Server services may be running as well, for example, the SQL Server
    Agent (named `SQLAGENT.EXE`), the SQL Server Browser (`sqlbrowser.exe`), and a
    few others, depending on your installation choices.


    Once you verify it is, in fact, SQL Server using the majority of the processor
    time, the next thing to do is to find what internal processes inside SQL Server
    may be utilizing such resources, for example, by looking at the most expensive
    queries. You could use the Query Store or data collected by the Data Collector
    feature or some other tool. If you are not collecting any performance data, you
    can just simply look at the current data from the `sys.dm_exec_query_stats` DMV,
    assuming the problem query is still in the plan cache. An example of such query
    follows, which will list the 20 most expensive queries by CPU usage:


    ```sql

    SELECT TOP 20 qstats.query_hash,

    SUM(qstats.total_worker_time) / SUM(qstats.execution_count) AS avg_total_worker_time,

    MIN(qstats.statement_text) AS statement_text

    FROM (SELECT qs.*, SUBSTRING(st.text, (qs.statement_start_offset/2) + 1,

    ((CASE statement_end_offset

    WHEN -1 THEN DATALENGTH(ST.text)

    ELSE qs.statement_end_offset END

    - qs.statement_start_offset)/2) + 1) AS statement_text

    FROM sys.dm_exec_query_stats qs

    CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS st) AS qstats

    GROUP BY qstats.query_hash

    ORDER BY avg_total_worker_time DESC

    ```


    Additionally, you can also look at the currently executing queries using the `sys.dm_exec_requests`
    DMV, as in the following query:


    ```sql

    SELECT TOP 20 SUBSTRING(t.text, (r.statement_start_offset/2) + 1,

    ((CASE statement_end_offset

    WHEN -1 THEN DATALENGTH(t.text)

    ELSE r.statement_end_offset END

    - r.statement_start_offset)/2) + 1) AS statement_text, *

    FROM sys.dm_exec_requests r

    CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t

    ORDER BY cpu_time DESC

    ```


    Notice that in both queries the data is sorted by processor time, using the `total_worker_time`
    column in the first case and `cpu_time` in the second one. As mentioned in Chapter
    [6](#393702_2_En_6_Chapter.xhtml), both `sys.dm_exec_query_stats` and `sys.dm_exec_requests`
    also include other columns that you could use to easily update any of the previous
    queries to sort on a different performance metric, such as logical or physical
    reads. Finally, once you find out which queries are consuming your processor resources,
    you can focus on their tuning and optimization.


    ### Processor Queue Length


    This counter, listed under the `System` object, indicates the number of threads
    in the processor queue for all the processors. A large number in the Processor
    Queue Length counter usually means that there are more threads than the current
    processors can service in an efficient way. Similar to the % Processor Time counter,
    finding and optimizing expensive queries could be a good way to improve the performance
    of your system.


    ### Latches


    The `SQLServer:Latches` object contains several counters that can help you to
    monitor the number of latch requests that had to wait and their average latch
    wait time in milliseconds. Latches are short-term, lightweight synchronization
    primitives used to protect memory structures for concurrent access and are covered
    in more detail in Chapters [1](#393702_2_En_1_Chapter.xhtml) and [5](#393702_2_En_5_Chapter.xhtml).
    The performance counters also provide information about the number of latches
    that are currently SuperLatches, the number of latches that have been promoted
    to SuperLatches, and the number of SuperLatches that have been demoted to regular
    latches.'
