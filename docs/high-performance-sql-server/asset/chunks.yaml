    ### `sys.dm_db_index_physical_stats`


    此动态管理视图（DMV）可用于获取表和索引的碎片信息。碎片可能存在三种形式：页碎片、逻辑碎片和区碎片。当数据页未完全填满时，就会出现页碎片。另一方面，当对象的页在物理上未按顺序排列时，就会出现逻辑碎片和区碎片。逻辑碎片是指页未按索引的逻辑顺序在物理上排序。区碎片是一个类似的概念，指堆的区在物理上未按顺序排列。


    碎片可能仅在表和索引扫描操作时导致性能问题，例如执行预读操作时。主要由索引查找组成的工作负载不会受到碎片影响（至少逻辑或区碎片不会）。`sys.dm_db_index_physical_stats`
    中的两列 `avg_page_space_used_in_percent` 和 `avg_fragmentation_in_percent` 反映了表或索引的碎片级别。


    `avg_page_space_used_in_percent` 列指示数据页中已使用空间的平均百分比，这基本上表示了页的填充度。通常可以通过配置适当的填充因子值来控制页填充度，该值指定数据页应被数据填充的百分比，可以在从服务器到对象级别的不同层级进行配置。例如，填充因子为
    90 意味着页面填充了 90%，仅留下剩余的 10% 用于新行。最佳值取决于应用程序和数据库的使用情况。服务器默认配置的填充因子值为 0（顺便说一句，这与
    100 完全相同），意味着页面将被填满容量，并且在行通常添加到表末尾时（例如使用 `IDENTITY` 约束时）工作状态良好。此默认值对于磁盘空间使用也是最优的，因为页面已满，扫描也会很高效（意味着无需扫描部分空白页面执行额外的
    I/O 操作）。但对于随机插入数据操作，完全填满的页面可能并非最优，因为这将需要页面拆分，除了产生碎片外还会导致性能问题。


    对于需要随机插入数据操作的情况，小于 100% 的值可能是合适的。这可以通过根据应用程序特定的插入数据需求调整填充因子配置来实现。当 SQL Server
    在页面中没有空间用于额外的行，或用于更新现有行而其新的较大尺寸不再适合该页面时，就会发生页面拆分。拆分操作基本上会创建一个新页面，将原始页面中大约一半的行移动到新页面。页面拆分是一项昂贵的操作，并会导致碎片，因为最终会产生两个大约只填满
    50% 的页面。应避免或最小化页面拆分，可以使用 `SQLServer:Access Methods` 性能计数器中的 Page Splits/sec 或
    `page_split` 扩展事件进行监控。如第 9 章所述，索引的一个性能建议是使用一个始终递增的值以最小化这些问题。


    `avg_fragmentation_in_percent` 列指的是索引的逻辑碎片百分比或堆的区碎片百分比。逻辑碎片指的是索引叶级页中未按顺序排列的页的百分比，即页未按索引的逻辑顺序在物理上排序。区碎片是堆的一个类似概念，指堆的区在物理上未按顺序排列。


    修复数据库中的页碎片需要调整填充因子配置级别（如果您的应用程序需要在现有页上插入行）。逻辑或区碎片可以通过重建或重新组织索引或表来修复。您通常只需要更新一次填充因子。另一方面，重建或重新组织索引或表可能需要定期执行，通常在数据库维护作业中进行。决定何时重建或重新组织索引取决于您的数据库，但通常一个安全的起点是当碎片率在
    10% 到 40% 之间时重新组织索引，当碎片率大于 40% 时重建索引。根据定义，堆不包含聚集索引，但您也可以通过在其上创建聚集索引然后删除它来对其碎片整理。在堆上创建聚集索引将以最优方式重新分布数据，不留任何碎片，之后删除它只会移除索引的元数据定义，数据保持不变。


    以下代码将通过查看 `avg_fragmentation_in_percent` 列中碎片大于 10% 的情况，返回当前数据库中可能需要碎片整理的索引：


    ```sql

    SELECT *

    FROM sys.dm_db_index_physical_stats (DB_ID(), NULL, NULL , NULL, ''LIMITED'')

    WHERE avg_fragmentation_in_percent > 10

    ```


    然后，您可以编写一个脚本，根据百分比选择运行 `ALTER INDEX REORGANIZE` 或 `ALTER INDEX REBUILD`，如下面的伪代码所示：


    ```sql

    IF avg_fragmentation_in_percent = 30.0

    SET @command = ''ALTER INDEX '' + ... + '' REBUILD''

    EXEC (@command)

    ```


    `sys.dm_db_index_physical_stats` 的文档位于 `https://msdn.microsoft.com/en-us/library/ms188917.aspx`，其中包含了执行此操作的基本代码，您可以根据特定需求进行调整。


    注意：我强烈建议使用 Ola Hallengren 的 SQL Server 维护解决方案来进行备份、完整性检查以及索引和统计信息维护。此维护解决方案是免费的，可以从
    `https://ola.hallengren.com/` 下载。


    ### `sys.dm_exec_query_optimizer_info`


    `sys.dm_exec_query_optimizer_info` 动态管理视图返回有关查询优化器执行的优化的信息。您可以使用此信息获取有关系统或特定工作负载的查询优化信息。目前，该
    DMV 返回 39 行，列出了大量信息，例如优化总数、每次优化的平均耗时、每次优化的平均预估成本，以及关于优化的详细信息，如简单计划、超时、优化期间的内存问题，或与插入、删除、更新、合并、子查询、提示、视图引用、远程查询和索引视图相关的优化数量。这可以为您提供有关系统中发生的优化的详细信息。此
    DMV 的某些条目是未文档化的。


    表 8-5 展示了一个简短的输出示例。


    表 8-5：示例输出


    | counter | occurrence | value |

    | --- | --- | --- |

    | timeout | 495 | 1 |

    | memory limit exceeded | 0 | NULL |

    | insert stmt | 12836 | 1 |

    | delete stmt | 93 | 1 |

    | update stmt | 12 | 1 |

    | merge stmt | 0 | NULL |

    | contains subquery | 7161 | 1 |

    | unnest failed | 11783 | 1 |

    '
- fmt: '## SQL Trace/Extended Events


    ### sys.dm_os_sys_info


    `sys.dm_os_sys_info` DMV 返回有关运行 SQL Server 的系统的信息，包括有关服务器和 SQL Server 实例的信息。从
    SQL Server 2016 开始，它包含一个较大的列列表，其中包括诸如逻辑处理器数量、服务器上的物理内存总量、非抢占式任务的量子（以毫秒为单位）、最大工作线程数、在
    SQL Server 进程中配置的用户调度程序数量、调度程序总数、SQL Server 实例上次启动的日期和时间，以及 SQL Server 是否在虚拟机或
    NUMA 配置中运行等信息。


    例如，我的测试系统返回的示例见表 [8-6](#393702_2_En_8_Chapter.xhtml#Tab6)。（结果只有一行。以下列表仅包含少数几列。）


    **表 8-6**


    **示例输出**


    | Column | Value |

    | --- | --- |

    | cpu_count | 4 |

    | hyperthread_ratio | 4 |

    | physical_memory_kb | 8266712 |

    | virtual_memory_kb | 137438953344 |

    | os_quantum | 4 |

    | max_workers_count | 512 |

    | scheduler_count | 4 |

    | scheduler_total_count | 15 |

    | sqlserver_start_time | 2016-06-17 07:49:24.397 |

    | affinity_type_desc | AUTO |

    | virtual_machine_type_desc | NONE |

    | softnuma_configuration_desc | OFF |


    ### sys.dm_os_windows_info


    当 SQL Server 在此操作系统中运行时，`sys.dm_os_windows_info` 提供 Windows 信息。此 DMV 返回 Microsoft
    Windows 信息，如操作系统版本、服务包级别、库存单位 (SKU) 和 Windows 区域设置标识符 (LCID)。要在 Linux 系统上访问类似信息，可以使用
    `sys.dm_os_host_info` DMV。


    注意


    如第 [2](#393702_2_En_2_Chapter.xhtml) 章所述，从 SQL Server 2017 版本开始，SQL Server 现在可以在
    Windows、Linux 和 Docker 容器上运行。


    ### sys.dm_os_host_info


    `sys.dm_os_host_info` 返回操作系统信息，适用于 Windows 和 Linux。`host_platform` 列返回 `Windows`
    或 `Linux`，而 `host_distribution` 列返回操作系统的描述。所有其他列仅适用于 Windows，也可以使用前面描述的 `sys.dm_os_windows_info`
    DMV 查看。


    ## SQL Trace/Extended Events


    除了性能计数器和直接从 DMV 与 DMF 获取的数据外，SQL Trace 和扩展事件是监控 SQL Server 或获取数据以排查性能问题的主要工具。不过，与性能计数器、DMV
    和 DMF 不同，从事件收集数据通常成本更高，因此只会在需要时收集数据，例如在排查性能问题并进行充分筛选时。尽管扩展事件随 SQL Server 2008
    引入，但截至 SQL Server 2012，SQL Trace 已被弃用，并计划在 SQL Server 的未来版本中移除。然而，SQL Trace 的使用（主要通过其客户端工具
    SQL Profiler）非常广泛，因此在我看来，它不会很快从产品中移除。


    与性能计数器类似，扩展事件和 SQL Trace 都有大量的事件。例如，运行以下代码返回现有扩展事件，对于 SQL Server 2019 RTM 将返回
    1846 个事件（相比之下，SQL Server 2016 RTM 返回 1303 个事件，SQL Server 2014 RTM 返回 870 个事件）：


    ```

    SELECT name, description

    FROM sys.dm_xe_objects

    WHERE object_type = ''event''

    ORDER BY name

    ```


    尽管您很可能使用脚本来处理扩展事件并运行诸如 `CREATE EVENT SESSION`、`ALTER EVENT SESSION` 和 `DROP EVENT
    SESSION` 之类的语句，但通过其 SQL Server Management Studio 用户界面可以轻松入门。该界面还可以帮助您为所选事件和选项编写脚本。扩展事件用户界面还允许您根据一些常见的故障排除场景选择现有模板，这与长期以来在
    SQL Profiler 中使用模板的方式非常相似。也可以创建自定义模板。


    要涵盖常见事件及其使用方法的讨论需要单独一章。此外，我们在第 [5](#393702_2_En_5_Chapter.xhtml) 章中介绍了一个使用扩展事件跟踪特定进程等待的示例，因此您可能需要参考它。但如果您在排查性能问题时没有额外信息，首要任务之一是查看正在运行的高开销查询，并寻找优化机会。以下事件列表有助于收集此类信息，可用于排查高开销查询：


    *   `sql_statement_completed`：指示 SQL 语句已完成。其 SQL Trace 对应事件是 `SQL:StmtCompleted`。


    *   `sp_statement_completed`：当存储过程内的 SQL 语句完成时发生。其 SQL Trace 对应事件是 `SP:StmtCompleted`。


    *   `module_end`：当模块的执行完成时发生。其 SQL Trace 对应事件是 `SP:Completed`。


    *   `sql_batch_completed`：指示批处理已完成。其 SQL Trace 对应事件是 `SQL:BatchCompleted`。


    *   `rpc_completed`：指示远程过程调用已完成。其 SQL Trace 对应事件是 `RPC:Completed`。


    这些事件只会查找已完成的 SQL 语句。遗憾的是，无法使用事件来查找未能完成的语句的性能信息，但您可以使用新的查询存储功能获取此类信息，如第 [6](#393702_2_En_6_Chapter.xhtml)
    章所述。在某些情况下，未完成的语句可能是性能问题，因此排查这些情况可能是必要且重要的。


    您可以在 [`https://msdn.microsoft.com/en-us/library/ms175481.aspx`](https://msdn.microsoft.com/en-us/library/ms175481.aspx)
    找到已记录的 SQL Trace 事件。


    注意


    尽管在撰写本文时我尚未看到完整的扩展事件文档在线发布，但您可以使用 SQL Server Management Studio 用户界面通过键入事件全名或部分名称来快速搜索事件。选择特定事件还可以显示其描述及其事件字段的描述。'
  raw: '### sys.dm_os_sys_info


    The `sys.dm_os_sys_info` DMV returns information about the system where SQL Server
    is running, including both information about the server and SQL Server instance.
    Starting with SQL Server 2016, it includes a large list of columns, including
    information such as the number of logical processors, total amount of physical
    memory on the server, quantum in milliseconds for a nonpreemptive task, maximum
    number of workers, number of user schedulers configured in the SQL Server process,
    total number of schedulers, date and time when the SQL Server instance was last
    started, and whether SQL Server is running in a virtual machine or NUMA configuration.


    For example, my test system returns the sample shown in Table [8-6](#393702_2_En_8_Chapter.xhtml#Tab6).
    (The result is only one row. Only a few columns are included in the following
    list.)


    Table 8-6


    Sample Output


    | Column | Value |

    | --- | --- |

    | cpu_count | 4 |

    | hyperthread_ratio | 4 |

    | physical_memory_kb | 8266712 |

    | virtual_memory_kb | 137438953344 |

    | os_quantum | 4 |

    | max_workers_count | 512 |

    | scheduler_count | 4 |

    | scheduler_total_count | 15 |

    | sqlserver_start_time | 2016-06-17 07:49:24.397 |

    | affinity_type_desc | AUTO |

    | virtual_machine_type_desc | NONE |

    | softnuma_configuration_desc | OFF |


    ### sys.dm_os_windows_info


    `sys.dm_os_windows_info` provides Windows information when SQL Server is running
    in this operating system. Microsoft Windows information such as operating system
    release, service pack level, Stock Keeping Unit (SKU), and Windows Locale Identifier
    (LCID) are returned by this DMV. To access similar information on a Linux system,
    you can use the sys.dm_os_host_info DMV.


    Note


    As mentioned in Chapter [2](#393702_2_En_2_Chapter.xhtml), starting with the SQL
    Server 2017 release, SQL Server can now run on Windows, Linux, and Docker containers.


    ### sys.dm_os_host_info


    The sys.dm_os_host_info returns operating system information and applies to both
    Windows and Linux. The column host_platform returns either Windows or Linux, and
    the host_distribution column returns a description of the operating system. All
    the other columns apply only to Windows and are also visible using the sys.dm_os_windows_info
    DMV described earlier.


    ## SQL Trace/Extended Events


    Along with performance counters and the data obtained directly from DMVs and DMFs,
    SQL Trace and extended events are the main tools to monitor SQL Server or obtain
    data to troubleshoot performance problems. Unlike performance counters, DMVs,
    and DMFs, though, collecting data from events is usually more expensive, and you
    will be collecting its data only as needed, for example, when troubleshooting
    a performance problem and filtering adequately. Although extended events were
    introduced with SQL Server 2008, as of SQL Server 2012, SQL Trace has been deprecated
    and it is planned to be removed in a future version of SQL Server. However, SQL
    Trace use, mostly by means of its client tool, SQL Profiler, is so widely spread
    that, at least in my opinion, I do not see it being removed from the product anytime
    soon.


    Similar to performance counters, there are a huge number of events for both Extended
    Events and SQL Trace. For example, running the following code to return the existing
    Extended Event events would return 1846 for SQL Server 2019 RTM (compared to 1303
    events returned in SQL Server 2016 RTM or 870 events in SQL Server 2014 RTM):


    ```

    SELECT name, description

    FROM sys.dm_xe_objects

    WHERE object_type = ''event''

    ORDER BY name

    ```


    Although you will most likely be using scripts to work with extended events and
    run statements such as `CREATE EVENT SESSION`, `ALTER EVENT SESSION`, and `DROP
    EVENT SESSION`, you could get started easily by using its SQL Server Management
    Studio user interface. Such an interface can also help you to script the events
    and choices you select. The Extended Events user interface also allows you to
    select existing templates according to some common troubleshooting scenarios in
    pretty much the same way templates have been used in SQL Profiler since a long
    time ago. Custom templates can be created as well.


    A discussion covering common events and how to use them would require a chapter
    on its own. In addition, we covered an example of using extended events to track
    waits for a specific process back in Chapter [5](#393702_2_En_5_Chapter.xhtml),
    so you may want to refer to it. But if you are troubleshooting a performance problem
    with no additional information, one of the top items to do is to see which expensive
    queries are running and to look for an optimization opportunity. The following
    list of events would help to collect such information that you can use to troubleshoot
    expensive queries:


    *   `sql_statement_completed`: Indicates that a SQL statement has been completed.
    Its SQL Trace counterpart is `SQL:StmtCompleted`.


    *   `sp_statement_completed`: Occurs when a SQL statement inside a stored procedure
    has been completed. Its SQL Trace counterpart is `SP:StmtCompleted`.


    *   `module_end`: Occurs when the execution of a module has been completed. Its
    SQL Trace counterpart is `SP:Completed`.


    *   `sql_batch_completed`: Indicates that a batch has been completed. Its SQL
    Trace counterpart is `SQL:BatchCompleted`.


    *   `rpc_completed`: Indicates that a remote procedure call has been completed.
    Its SQL Trace counterpart is `RPC:Completed`.


    These events would look for completed SQL statements only. Unfortunately, there
    is no way to use events to find performance information about statements that
    were not able to finish, but you can get such information with the new Query Store
    feature, as covered in Chapter [6](#393702_2_En_6_Chapter.xhtml). In some cases,
    incomplete statements could be a performance problem so troubleshooting those
    can be required and important.


    You can find the documented SQL Trace events at [`https://msdn.microsoft.com/en-us/library/ms175481.aspx`](https://msdn.microsoft.com/en-us/library/ms175481.aspx).


    Note


    Although at the time of writing I don’t see the entire Extended Events documentation
    published online, you can use the SQL Server Management Studio user interface
    to quickly search events by typing either their full or partial names. Selecting
    a specific event can also show its description along with the description of its
    event fields.'
