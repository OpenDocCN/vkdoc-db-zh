  trans: '

    # DMVs/DMFs


    多个 DMV 和 DMF 可用于显示存储使用情况和信息，这些将在第 8 章中介绍，包括 `sys.dm_io_virtual_file_stats` DMF、`sys.dm_os_volume_stats`
    DMF、`sys.dm_db_index_physical_stats` DMV 和 `sys.dm_db_index_usage_stats` DMV。


    `sys.dm_io_virtual_file_stats` DMF 为数据库中的每个数据和日志文件提供了丰富的 I/O 信息，不仅包括 I/O 活动数据，还包括等待延迟信息。`sys.dm_os_volume_stats`
    DMF 根据提供的数据库 ID 和文件 ID 返回有关系统中卷的信息。`sys.dm_db_index_physical_stats` DMV 允许你获取表和索引的碎片信息。`sys.dm_db_index_usage_stats`
    DMV 返回有关在数据库的表和索引上执行的操作的信息，包括用户查询和系统查询的查找、扫描、书签查找和更新次数。更多细节和其他 DMV，请参阅该章节。


    此外，出于调优目的，有时你可能想了解哪些查询使用了最多的 I/O 资源。如果你启用了查询存储，则可以收集这些查询，如第 6 章所述。另外，你可以使用 `sys.dm_exec_query_stats`
    DMV 基于计划缓存中可用的查询统计信息来列出此类查询。同样在第 8 章中介绍，你可以使用此 DMV 根据 I/O 资源（如逻辑读取、物理读取或逻辑写入）来列出开销最大的查询。最后，查询
    I/O 信息也可以通过使用 `SET STATISTICS IO` 语句来获取。


    ## 卷配置


    Windows 分配单元大小和磁盘分区对齐是配置存储时常被忽略的两个主题。尽管格式化 NTFS 卷时 Windows 分配单元大小的默认值是 4 KB，但微软长期以来一直建议在格式化将用于
    SQL Server 数据文件和事务日志文件的 NTFS 卷时使用 64 KB 大小。


    磁盘分区对齐仍然是一个重要的考虑因素，尤其是在旧版本的 Windows 上。分区未对齐是指存在于 Windows 2003 及更早版本中的一个问题，其中写入分区的第一个数据块大小为
    63K。但是由于 Windows 更倾向于处理偶数大小的数据块，例如 4K 或 64K，这样的磁盘操作将需要跨越两个扇区，从而导致性能问题。


    附加到 Windows Server 2008 或更高版本的现有分区可能仍存在此问题，因为当服务器升级到 Windows Server 2008 时，分区不会自动对齐，因此必须重建分区才能获得最佳性能。即使在新版本的
    Windows 上磁盘分区对齐不是问题，也可以验证正确的配置。要验证正确的分区对齐或修复分区对齐问题，请参阅文章 [`https://support.microsoft.com/en-us/kb/929491`](https://support.microsoft.com/en-us/kb/929491)。有关磁盘分区对齐的更多详细信息，请参阅微软白皮书
    "Disk Partition Alignment Best Practices for SQL Server"，网址为 [`https://technet.microsoft.com/en-us/library/dd758814(v=SQL.100).aspx`](https://technet.microsoft.com/en-us/library/dd758814%2528v%253DSQL.100%2529.aspx)。


    ## RAID 级别


    正如本章前面所述，SQL Server 存储解决方案通常实现某种形式的 RAID（独立磁盘冗余阵列），因此让我们在本节讨论一些最流行的配置，包括 RAID
    级别 0、1、5、6 和 10。RAID 也可以在软件级别实现，但与使用硬件 RAID 控制器相比，它存在限制和性能损失。RAID 采用镜像、条带化和奇偶校验错误检测等技术。


    再次记住，即使你拥有一些企业级存储，并且只需要向存储管理员请求磁盘空间，你仍然需要了解这些卷可能具有的 RAID 配置类型，甚至可能需要根据你的需求请求特定配置。


    ### RAID 0


    RAID 0，或称条带化，指的是将数据分布在两个或多个驱动器上的过程。仅条带化不提供数据冗余，因此一个驱动器故障意味着你将丢失数据。RAID 0 没有额外的存储成本，因为所有驱动器容量都被使用。由于没有冗余，它不应用于数据或事务日志文件，但可能在其他地方有用途，例如作为备份复制到永久位置之前的临时存储。RAID
    0 配置如图 11-3 所示。


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig3_HTML.jpg](img/393702_2_En_11_Fig3_HTML.jpg)


    图 11-3 RAID 0


    ### RAID 1


    RAID 1，或称镜像，同时将相同的数据写入两个或多个驱动器。显然，这种实现的成本至少是所用存储的 50%。RAID 1 可以从驱动器故障中恢复，因为数据至少有第二个副本。在这种情况下，应尽快更换故障驱动器，以便
    RAID 控制器可以再次复制驱动器数据，因为在故障驱动器完全重建之前，数据将处于风险之中。只有在镜像驱动器重建之前第二个驱动器也发生故障时，才可能发生数据丢失。


    RAID 1 的一个典型用途是镜像服务器的本地操作系统驱动器，该驱动器通常也托管 SQL Server 安装软件。RAID 1 如图 11-4 所示。


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig4_HTML.jpg](img/393702_2_En_11_Fig4_HTML.jpg)


    图 11-4 RAID 1


    ### RAID 5


    RAID 5，或称带奇偶校验的磁盘条带化，与 RAID 0 类似，数据分布在两个或多个驱动器上，但此外还存储奇偶校验信息。奇偶校验信息并非仅存储在一个驱动器上，而是存储在所有驱动器中，如图
    11-5 所示。RAID 5 提供故障保护，同时最小化磁盘使用量，至少与 RAID 1 相比是这样。


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig5_HTML.jpg](img/393702_2_En_11_Fig5_HTML.jpg)


    图 11-5 RAID 5


    使用 RAID 5 的成本是计算奇偶校验信息的成本加上存储它所使用的空间，即所用 n 个驱动器的 1/n。例如，在图 11-5 中，使用了四个驱动器，而仅奇偶校验信息就使用了一个驱动器，因此成本是
    1/4。RAID 5 可以从一个驱动器故障中恢复，但不能从两个或更多驱动器故障中恢复。RAID 5 配置中的最小驱动器数量是三个。


    ### RAID 6


    RAID 6，或称带双奇偶校验的磁盘条带化，与 RAID 5 类似，但它增加了另一级奇偶校验信息，基本上通过添加另一个奇偶校验块来扩展 RAID 5。如果
    RAID 5 防止单磁盘故障，RAID 6 则可以容忍丢失两个磁盘。


    使用 RAID 6 的成本是计算奇偶校验信息的成本加上存储它所使用的空间，即所用 n 个驱动器的 2/n。例如，在图 11-6 中，使用了五个驱动器，而奇偶校验使用了两个驱动器，因此成本是
    2/5。


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig6_HTML.jpg](img/393702_2_En_11_Fig6_HTML.jpg)


    图 11-6 RAID 6

    '
- fmt: '### RAID 10


    `RAID 10`，或称 `RAID 0+1` 或镜像与条带化，是基本 `RAID` 级别 `RAID 0` 和 `RAID 1` 的组合，因此此配置使用镜像和条带化，而不使用奇偶校验信息。与
    `RAID 1` 类似，此实现的成本是所用存储的 50%。在 `RAID 10` 中，数据首先被镜像，然后被条带化，如图 [11-7](#393702_2_En_11_Chapter.xhtml#Fig7)
    所示。此配置的一个变体是 `RAID 01` 或 `RAID 0+1`，其中数据首先被条带化，然后被镜像。


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig7_HTML.jpg](images/393702_2_En_11_Chapter/393702_2_En_11_Fig7_HTML.jpg)


    图 11-7 `RAID 10`


    总之，对于 `SQL Server` 数据和事务日志文件，`RAID 5` 可能是最受欢迎的，因为它提供了冗余且成本不高。在某些情况下，也会使用 `RAID
    10`，甚至 `RAID 1`，事实上，它被推荐用于事务日志文件，因为它有助于顺序写入操作，尽管当同一卷包含多个数据库的日志文件时，这一优势会最小化或丧失。


    ## 查询处理


    查询优化和处理是存储使用的关键部分。正如我们在本书前面提到的，一个好的查询优化器应该创建一个计划，尽早过滤掉数据以提高查询性能。如果这种过滤可以在存储引擎级别完成，查询将非常高效，因为不需要为不需要的行进行额外的处理。不幸的是，出于多种原因，有时查询必须扫描整个表并在多个查询操作中处理所有行，只是为了在最后过滤掉所需的行，这是一个非常昂贵的过程。一个典型的例子在第
    [9](#393702_2_En_9_Chapter.xhtml) 章中展示，其中查询处理器能够为以下查询创建一个非常高效的计划：


    ```

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```


    但是，一旦过滤谓词变为 `WHERE ABS(ProductID) = 898`，查询处理器就无法理解它，转而需要进行非常昂贵的全表扫描。话虽如此，通常拥有正确的索引是帮助查询性能的最佳方法之一，但不是唯一的方法。正如你在这个例子中看到的，即使有一个完美的索引，由于查询处理器的限制，`SQL
    Server` 也无法使用它。这正是额外的查询调整和优化可能有助于进一步提高数据库性能的地方。


    这里值得提醒的是，查询优化器的限制绝不意味着你可能得到错误的数据，因为它更多地关系到你获取数据的效率。


    最后，近期的数据库研究关注基于闪存的存储对数据库和查询处理算法的影响。在“Query Processing Techniques for Solid State
    Drives”（你可以在 [`http://nms.csail.mit.edu/~stavros/pubs/SSD_sigmod09.pdf`](http://nms.csail.mit.edu/%257Estavros/pubs/SSD_sigmod09.pdf)
    找到）中，Goetz Graefe 等人展示了如何使用新的数据结构和算法可以利用闪存存储来提高数据库性能，因为当前的关系数据库引擎是基于传统的磁盘使用开发的。此外，在“Do
    Query Optimizers Need to be SSD-aware?”（你可以在 [`www.adms-conf.org/p44-PELLEY.pdf`](http://www.adms-conf.org/p44-PELLEY.pdf)
    阅读）中，Steven Pelley 等人分析了查询优化器的成本估算模型是否需要更新，以考虑固态硬盘上随机 I/O 操作速度的提升。


    ## 总结


    本章从 `SQL Server` 的角度介绍了存储，并展示了如何在多个级别优化存储使用，从存储硬件本身一直到数据库设计和配置以及查询调整和优化。同时介绍了存储趋势，包括随着成本持续下降，基于闪存的存储如何成为主要存储的企业标准。


    最后，重点放在了通过使用本书几章中展示的技术来最小化数据库请求的存储使用上，例如，创建正确的索引，如第 [9](#393702_2_En_9_Chapter.xhtml)
    章所述；正确配置 `SQL Server` 和 `tempdb`，如第 [3](#393702_2_En_3_Chapter.xhtml) 和 [4](#393702_2_En_4_Chapter.xhtml)
    章所述；或利用新的内存技术，如内存中 `OLTP` 或列存储索引，这些在第 [7](#393702_2_En_7_Chapter.xhtml) 章中解释。'
  raw: '### RAID 10


    RAID 10, or RAID 0+1 or mirroring and striping, is a combination of the basic
    RAID levels RAID 0 and RAID 1, so this configuration uses mirroring and striping
    and no parity information. Similar to RAID 1, the cost of this implementation
    is 50% of the storage used. In RAID 10, the data is first mirrored and then striped,
    as shown in Figure [11-7](#393702_2_En_11_Chapter.xhtml#Fig7). A variation of
    this configuration is RAID 01 or RAID 0+1 in which the data is first striped and
    then mirrored.


    ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig7_HTML.jpg](images/393702_2_En_11_Chapter/393702_2_En_11_Fig7_HTML.jpg)


    Figure 11-7


    RAID 10


    In summary, RAID 5 is perhaps the most popular for SQL Server data and transaction
    log files as it provides redundancy and is not very expensive. In some cases,
    RAID 10, or even RAID 1, is used as well and is, in fact, recommended for transaction
    log files as it helps with sequential write operations, although this benefit
    is minimized or lost when the same volume contains the log file for multiple databases.


    ## Query Processing


    Query optimization and processing are a critical part of the storage usage. As
    we have noted before in this book, a decent query optimizer should create a plan
    that filters out data as early as possible to improve the query performance. If
    this filtering can be done at the storage engine level, the query would be very
    efficient as no additional processing is required for rows that are not needed.
    Unfortunately, for several reasons, sometimes a query has to scan an entire table
    and process all the rows throughout multiple query operations, just to filter
    out the required rows at the end, having a very expensive process. A typical example
    was shown in Chapter [9](#393702_2_En_9_Chapter.xhtml) where the query processor
    was able to create a very efficient plan for the following query:


    ```

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    ```


    But as soon as the filter predicate changed to WHERE ABS(ProductID) = 898, the
    query processor was no longer able to understand it, requiring instead a very
    expensive table scan. Having said that, typically having the right indexes is
    one of the best ways to help with query performance but not the only one. As you
    saw with this example, even with a perfect index, due to a query processor limitation,
    SQL Server was not able to use it. This is where additional query tuning and optimization
    may help to further improve the performance of your databases.


    It is worth reminding here that a query optimizer limitation in no way means you
    may get incorrect data as it is more related to how efficiently you get the data.


    Finally, recent database research is focusing on the impact of flash-based storage
    on database and query processing algorithms. In “Query Processing Techniques for
    Solid State Drives,” which you can find at [`http://nms.csail.mit.edu/~stavros/pubs/SSD_sigmod09.pdf`](http://nms.csail.mit.edu/%257Estavros/pubs/SSD_sigmod09.pdf),
    Goetz Graefe et. al show how using new data structures and algorithms can take
    advantage of flash storage to improve the database performance as current relational
    database engines were developed based on traditional disk usage. In addition,
    in “Do Query Optimizers Need to be SSD-aware?,” which you can read at [`www.adms-conf.org/p44-PELLEY.pdf`](http://www.adms-conf.org/p44-PELLEY.pdf),
    Steven Pelley et. al analyze if the cost estimation model of query optimizers
    should be updated to account for the increased speed on random I/O operations
    on solid-state disks.


    ## Summary


    This chapter covered storage from SQL Server’s point of view and showed how storage
    usage can be optimized at several levels, going from the storage hardware itself
    all the way into database design and configuration and query tuning and optimization.
    Storage trends were covered as well, including how flash-based storage is becoming
    the de facto enterprise standard for primary storage as its cost continues to
    decline.


    Finally, focus has been given to minimizing the storage usage by database requests
    by using techniques shown in several chapters of the book, for example, creating
    the right indexes, as covered in Chapter [9](#393702_2_En_9_Chapter.xhtml); by
    properly configuring SQL Server and tempdb, as covered in Chapters [3](#393702_2_En_3_Chapter.xhtml)
    and [4](#393702_2_En_4_Chapter.xhtml); or by taking benefit of new in-memory technologies
    such as In-Memory OLTP or columnstore indexes, explained in Chapter [7](#393702_2_En_7_Chapter.xhtml).'
