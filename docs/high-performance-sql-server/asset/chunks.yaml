    如表 3-3 所示，您可以使用 `blockdev` 命令来设置磁盘预读（readahead）属性。让我们从获取系统中所有设备的报告开始：


    ```bash

    # blockdev --report

    RO    RA   SSZ   BSZ   StartSec            Size   Device

    rw  8192   512  4096          0     21474836480   /dev/sdb

