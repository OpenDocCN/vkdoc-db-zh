  trans: '

    # 11. SQL Server 存储


    本章将从 SQL Server 的视角来探讨存储。虽然在选择配置存储时，可用性与可恢复性等因素也至关重要，但我们主要关注性能方面。磁盘传统上是数据库系统中最慢的组件，因此为性能优化存储至关重要，通常涉及两个高层领域：直接调优存储，以及调优组件以高效利用存储。前者指的是对存储硬件本身进行调优和配置，而后者则涉及调整系统的其他组件，以优化存储的使用，包括诸如正确配置
    SQL Server 和创建合适的索引等事项。


    到目前为止，本书中讨论的所有主题主要涉及 SQL Server 数据库专业人员，包括数据库开发人员、数据库管理员和数据库架构师等角色。但在生产环境中实现高性能应用程序总是涉及公司内的其他角色，有时甚至是不同的团队。对于存储而言，这一点尤为真实。


    我依然记得过去的日子，那时我与 Windows 管理员一起，使用 `RAID` 1、5 或 10 为我们的服务器配置驱动器。随着存储——尤其是企业级存储——变得越来越复杂，其调优和管理通常会超出
    SQL Server 数据库专业人员的职责范围，甚至很可能落在不同的团队身上。


    无论公司内的职责如何划分，存储对 SQL Server 专业人员来说不必是一个黑盒。因此，理解存储的工作原理，并向存储团队正确传达数据库需求至关重要。性能不仅关乎初始配置，还包括持续的监控和故障排除，所以这应该是一个迭代的过程。事实上，与负责应用程序其余部分（无论是操作系统、应用服务器、Web
    服务器还是硬件本身）的团队保持良好沟通也是如此。


    在硬件趋势方面，正如我们在第 7 章中提到的，关系数据库最初是基于 1970 年代可用的硬件架构设计的。当时内存容量有限，关系数据库的设计基于无法将全部数据装入内存这一事实，仅在需要时从磁盘读取数据，并创建缓冲区管理器将最常用的数据保留在内存中。尽管处理器和内存速度以及内存和磁盘容量已大幅提升，但磁盘访问速度并未同步提高，导致磁盘访问时间与处理器、内存处理时间之间存在巨大差距。受限于移动机械部件，磁盘传统上一直是数据库系统中最慢的组件（或者如已故的
    Jim Gray 有时所描述的，“磁盘是新的磁带”）。


    数据量增大、高可用性要求和虚拟化等新趋势给数据库系统带来了额外的要求。我依然记得几十 GB 大小被认为是大型数据库的日子，但现在数据库大小已以 TB 计量，甚至
    PB 级别也已常见。数据现在还要求 7*24 小时可用（讽刺的是，我最初写下这段话时，正值达美航空的一次重大中断，导致其业务运营停摆数天）。数据可用性，甚至更糟的数据丢失，会严重影响业务。虚拟化和云服务是另一个重要趋势，越来越多的高性能和关键任务应用程序正迁移到
    Amazon AWS 或 Microsoft Azure 等服务上。


    幸运的是，也有新技术来应对这些新趋势和苛刻的要求。随着基于闪存的存储成本持续下降，闪存驱动器预计将在数据中心逐步取代基于主轴的磁盘，成为主要存储的企业实际标准。但由于关系数据库引擎仍在使用
    1970 年代定义的相同架构，有人建议开发新的查询处理算法来利用这种更快的存储。此外，由于许多数据库现在可以装入内存，诸如内存数据库等新技术正在被开发和实施。SQL
    Server 融入了这些技术，它们将在第 7 章中介绍。


    如前所述，优化存储的第二部分在于您的数据库内部。很多时候，看似是存储问题或存储性能难以跟上需求的问题，可以在 SQL Server 内部解决。我们将在本书的其余部分介绍许多此类技术。例如，当存储无法满足工作负载需求时，可以通过创建合适的索引、正确配置
    SQL Server 和 `tempdb`，或利用新的内存中技术（如 `In-Memory OLTP` 或 `列存储` 索引）来解决问题。随着闪存驱动器取代基于主轴的磁盘，一个误区很快出现，认为优化数据库和代码不再重要。事实绝非如此。


    最后，在选择和评估存储解决方案时，除了性能，还需要考虑可靠性、可用性等其他重要因素。诸如 `RAID`（独立磁盘冗余阵列）的冗余选择，或高可用性与灾难恢复解决方案，如
    `Windows 故障转移群集` 或 `SQL Server Always On 可用性组`，通常会在关键任务应用程序中实施。

    '
- fmt: '## Storage Types


    Although it is outside the scope of this book to cover details about the storage
    commonly used in SQL Server, I would say it usually falls in the following main
    categories, any of which could use traditional spindle-based magnetic disks, flash
    disk storage, or hybrid, except where otherwise specified:


    1.  Storage area networks (`SAN`): A dedicated network that provides access to
    consolidated storage. The most common storage for mission-critical applications.


    2.  Peripheral Component Interconnect Express (`PCIe`)–based solid-state drives
    (`SSDs`): This is flash disk storage connected throughout this bus standard.


    3.  Internal storage: Traditional storage on server bays using drives such as
    Serial Attached SCSI (`SAS`) or Serial AT Attachment (`SATA`).


    4.  Direct-attached storage (`DAS`): Storage directly attached to a server as
    opposed to internal storage or storage accessed over the network. `DAS` could
    be `SAS`/`SATA` drives usually connected to a server using a host bus adapter
    (`HBA`).


    5.  File shares/servers: File servers that can be used for SQL Server databases
    such as Server Message Block (`SMB`) file server. An `SMB` file share can also
    be used for Windows failover clustering installations. For more details, see [`https://msdn.microsoft.com/en-us/library/hh759341.aspx`](https://msdn.microsoft.com/en-us/library/hh759341.aspx).


    Although I have used these types of storage for SQL Server implementations, most
    of the mission-critical or high performance applications I have seen in my career
    use some kind of `SAN` storage. `SAN` storage comes in a lot of varieties ranging
    from the traditional spindle-based magnetic disk to all-flash disk storage or
    hybrid. `SAN` storage solutions also provide additional features similar to those
    available in SQL Server such as snapshots, replication, and compression, although
    in some cases those features can complement those available on SQL Server. In
    other cases, they may perform the same functions and compete for resources when
    enabled, so be sure to review with your storage administrator what those choices
    are and which ones may be beneficial to implement. Once again, working closely
    with your storage administrator is essential to define the database and storage
    architecture of your application.


    There are some other advantages of using `SAN` storage such as providing the shared
    storage required for traditional failover clustering. A `SAN` allows the nodes
    of a SQL Server cluster to access the same storage volume and move the storage
    between nodes. Only one node can access the volume at a time though.


    Finally, some other high-availability or disaster recovery solutions such as Always
    On availability groups, whose popularity increases every day, or the currently
    deprecated database mirroring technology can work with any kind of storage. Both
    availability groups and database mirroring work in a similar way by replicating
    the data at the database level in either a synchronous or an asynchronous way.
    Database mirroring only supports a single secondary, while availability groups
    can have multiple replicas or secondaries (but only in SQL Server Enterprise edition).
    A flavor of availability groups, called basic availability groups, can be used
    on SQL Server Standard edition to implement failover environment solution for
    a single database.


    ## Flash-Based Storage


    As the cost of flash-based storage continues to decline, flash drives are expected
    to gradually replace spindle-based magnetic disks in data centers, becoming the
    de facto enterprise standard for primary storage. Flash storage has been available
    for a while. But as has happened with other popular technologies, widespread adoption
    may be initially slow as sometimes the technology is either initially prohibitively
    expensive or it may take time to mature.


    Spindle-based electromechanical magnetic disks contain spinning disks and movable
    read and write heads, compared to flash, which is a nonvolatile semiconductor
    technology and has no moving mechanical components. Flash storage is many times
    faster than magnetic disks for random I/O reads, although the performance improvement
    is more modest for sequential reads and especially for writes. Their performance
    and price comparisons depend on the kind of flash drive, which can range from
    consumer levels like `TLC` (triple-level cell) or `MLC` (consumer multilevel cell)
    to enterprise storage such as `EMLC` (enterprise multilevel cell) or `SLC` (single-level
    cell), although submillisecond latency has been reported in the best cases.


    Because of these performance characteristics, flash can be an excellent choice
    for applications with a high number of random I/O read requests such as the ones
    using OLTP databases. Data warehouse workloads with large sequential reads will
    have less benefit. Another limitation of flash is that it has a finite number
    of possible writes, called program-erase cycles, which may introduce errors and
    failures impacting the storage life. Once again, the probability of error depends
    on the type of flash, decreasing from consumer to enterprise levels.


    Finally, when flash drives originally became available, their speed helped to
    start some myths indicating that query optimization would no longer be required
    when using this storage (e.g., no need to worry about index tuning, fragmentation,
    or other optimizations). I even remember hearing these statements directly from
    vendors. The reality is that even when flash improves the disk performance access,
    especially for random I/Os, all those optimizations and configurations are still
    required and highly recommended. This is especially true if you have a bottleneck
    somewhere else, as the flash drive performance will not shine until such a bottleneck
    is fixed.


    ## Database Configuration


    Understanding your I/O workload and how your database uses disk is essential for
    an efficient design focused on performance. Be sure to do this research and provide
    the required information to the storage administrator so disk can be configured
    accordingly. Sometimes, an I/O workload may be hard to estimate in advance. It
    is easy to say that an OLTP database will use only random disk I/Os, but I have
    yet to see a pure OLTP workload. It is very common for OLTP systems to have some
    reporting queries, queries running aggregations, or even business-related batch
    processing jobs. In addition, OLTP systems also require database maintenance activities
    such as database backups, database integrity checks, index rebuild and reorganization,
    statistics update, and so on, which require sequential disk I/O reads. On the
    other hand, reporting workloads and Data Warehouse databases will have mostly
    sequential I/Os, with mostly reads, in addition to periodic ETL jobs updating
    data in the database. Finally, as covered in Chapter 7, with the introduction
    of updatable nonclustered columnstore indexes, it is now possible to have analytical
    workloads on OLTP systems as well, creating a workload with random and sequential
    I/Os combined.'
