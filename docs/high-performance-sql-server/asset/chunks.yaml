    # 未完成的查询


    查询存储一个非常有趣的功能是，你可以查看一条查询的最终状态。这对于查找那些未能成功完成的查询信息尤其有用。在 SQL Server 中，使用其他现有方法要实现这一点曾经非常困难。你可以通过查看
    `sys.query_store_runtime_stats` 目录视图的 `execution_type` 和 `execution_type_desc`
    列来找到这些信息。根据文档，`execution_type` 列的可能值如下：


    *   0：常规执行（成功完成）

    *   3：客户端发起中止的执行

    *   4：异常中止的执行


    你的大多数查询将返回值 0，表示它们已成功执行。因此，让我们运行一个示例，看看当查询未成功执行时是如何工作的。首先清空查询存储，以便更容易管理我们查询中的可用结果：


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    ```


    运行以下查询（请注意，如果任其执行，此查询将运行很长时间）：


    ```sql

    SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2

    ```


    让查询运行大约五秒，然后取消它。现在运行以下查询：


    ```sql

    SELECT COUNT(*) FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail
    s2

    ```


    与之前被取消的执行不同，此查询应很快完成，并报出一条关于算术溢出错误（将表达式转换为数据类型 int 时发生）的错误消息。


    最后，运行以下查询，它应在不到一秒内成功完成：


    ```sql

    SELECT COUNT_BIG(*) FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail
    s2

    ```


    现在，让我们通过运行以下查询来检查执行类型值：


    ```sql

    SELECT rs.avg_logical_io_reads, qt.query_sql_text,

    q.query_id, execution_type_desc, qt.query_text_id, p.plan_id, rs.runtime_stats_id,

    rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    JOIN sys.query_store_runtime_stats_interval AS rsi

    ON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id

    ```


    输出应包含以下数据：


    | `avg_logical_io_reads` | `query_sql_text` | `execution_type_desc` |

    | --- | --- | --- |

    | `942` | select count(*) from sales.SalesOrderDetail s1 cross join sales.SalesOrderDetail
    s2 | Exception |

    | `343572` | select * from sales.SalesOrderDetail s1 cross join sales.SalesOrderDetail
    s2 | Aborted |

    | `942` | select count_big(*) from sales.SalesOrderDetail s1 cross join sales.SalesOrderDetail
    s2 | Regular |


    如你所见，查询存储能够追踪所有先前的查询，并为我们提供查询状态或查询执行类型，以及运行时和性能信息。这在查询失败并需要查看诸如资源使用情况、持续时间等额外信息的场景中非常有帮助。请记住，查询必须是有效的，且必须已生成执行计划并开始执行，才能在其失败或取消后被追踪。如果查询编译失败，则没有任何信息可追踪。例如，如果查询尝试使用一个不存在的表，则不会生成计划，也不会有查询执行发生。比如，如果你运行：


    ```sql

    SELECT * FROM authors

    ```


    你将收到“对象名 ''authors'' 无效”的错误，并且根本没有进行优化或执行，因此查询存储也不会捕获任何信息。


    追踪未成功完成的查询时，一个常见的问题与 `.NET` 应用程序的默认查询超时设置有关，该设置为 30 秒。你可以使用以下代码测试一个 `.NET` 应用程序的默认超时。由于默认的
    `.NET` 超时未被更改，并且代码中执行的查询肯定会运行超过 30 秒，你将得到如前所述的 Exception 类型的查询执行结果：


    ```csharp

    using System;

    using System.Data.SqlClient;

    public class Test {

    public static void Main() {

    string connectionString = "Data Source=(local);Initial Catalog=AdventureWorks2017;Integrated
    Security=SSPI";

    string queryString = "SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail
    s2";

    using (SqlConnection connection = new SqlConnection(connectionString)) {

    connection.Open();

    SqlCommand command = new SqlCommand(queryString, connection);

    try {

    command.ExecuteNonQuery();

    }

    catch (SqlException e) {

    Console.WriteLine("Got expected SqlException due to command timeout ");

    Console.WriteLine(e);

    }

    }

    }

    }

    ```


    **注意**


    测试此示例无需安装 Visual Studio，只需安装 Microsoft `.NET` 框架即可。如果你也安装了 SQL Server，那么它应该已经安装。典型安装会在
    `C:\Windows\Microsoft.NET` 文件夹下有一个或多个版本的 Microsoft `.NET` 框架，你可以在那里找到 Microsoft
    Visual C# 编译器或 `csc.exe`。如果你没有使用默认的 SQL Server 实例或没有使用 Windows 身份验证，则可能需要更新提供的代码。


    编译代码的一个简单方法是运行以下命令，假设代码保存在名为 test.cs 的文件中：


    ```shell

    "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" test.cs

    Microsoft (R) Visual C# Compiler version 4.8.3752.0

    for C# 5

    Copyright (C) Microsoft Corporation. All rights reserved.

    ```


    运行创建的可执行文件 test.exe 将产生预期的错误：


    ```shell

    Got expected SqlException due to command timeout

    System.Data.SqlClient.SqlException (0x80131904): Execution Timeout Expired.  The
    timeout period elapsed prior to completion of the operation or the server is not
    responding. ---> System.ComponentModel.Win32Exception (0x80004005): The wait operation
    timed out

    ```


    既然我已经提到查询存储会追踪在配置的数据库中执行的所有查询，你可能会问，它是否也会捕获使用了 `RECOMPILE` 提示的查询、维护语句或跨数据库查询。让我用以下例子来回答。在测试数据库上创建一个小表，为运行跨数据库查询做准备：


    ```sql

    USE Test

    CREATE TABLE Orders (SalesOrderID int)

    INSERT INTO Orders VALUES (43659)

    ```


    回到 AdventureWorks2017。再次清空查询存储，以便更容易查看存储在目录视图中的查询：


    ```sql

    USE AdventureWorks2017

    GO

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    ```


    运行以下语句，确保将备份目标更新为有效路径：


    ```sql

    ALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail REBUILD

    GO

    DBCC CHECKDB

    GO

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    OPTION (RECOMPILE)

    GO

    BACKUP DATABASE AdventureWorks2017 TO  DISK = ''c:\data\delete_me.bak''

    GO

    SELECT * FROM Sales.SalesOrderDetail a JOIN Test.dbo.Orders b

    ON a.SalesOrderID = b.SalesOrderID

    ```


    使用之前的查询来检查哪些查询被查询存储捕获了。除了 `DBCC CHECKDB` 和 `BACKUP DATABASE` 语句外，其余所有查询都被捕获了。

