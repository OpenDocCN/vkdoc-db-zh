  trans: '# 1. SQL Server 工作原理


    SQL Server 的默认配置允许你在知识或管理精力投入较少的情况下运行非关键应用程序。对于运行该产品较低**库存单位（SKU）**（如 SQL Server
    Express 版本）的应用程序尤其如此。然而，对于大多数生产应用程序，你需要遵循一个包含四个步骤的数据库实施周期：设计、配置、监控和故障排除。这对于**任务关键型应用程序**至关重要，在这些场景中，性能、可用性或安全性等领域是基本要求。我想强调的是，这同时也是一个循环。一旦这四个步骤成功完成且应用程序上线，事情并不会就此结束。监控至关重要。随着工作负载、数据库或应用程序的变化——甚至在常规活动期间——问题将会出现，这可能需要重新进行思考、设计和配置，再次回到前面提到的循环中。本书重点关注性能，将引导你了解所有这四个领域，为你提供从数据库中获取最佳性能所需的工具和知识。


    在深入这四个领域之前，本介绍章节将阐释 SQL Server 数据库引擎的工作原理，并涵盖从客户端通过网络协议使用表格数据流（TDS）协议建立连接开始，到查询执行完毕并将结果返回给客户端期间，系统中发生的所有事情。尽管在此过程中可能发生很多事情，并且可能需要一整本书来涵盖，但我将重点放在
    `SQLOS`、关系引擎（由查询优化器和执行引擎组成）以及其他重要的性能相关因素（如内存授予、锁和闩锁）所执行的工作上。本章内容是本书其余部分的基础。


    本书不明确涵盖查询调优和优化，因此你无需是高级查询编写者或理解执行计划也能使用它。本书可以帮助数据库管理员、架构师和数据库开发人员更好地理解 SQL Server
    的工作原理以及如何解决性能问题。有关查询调优和优化的信息，你可以参考我的书 *Microsoft SQL Server 2014 查询调优与优化*（McGraw-Hill
    Education，2015）。


    ## TDS/网络协议


    SQL Server 是一个客户端-服务器平台，客户端通常通过网络协议使用表格数据流（TDS）协议与数据库服务器建立长连接。`TDS` 是一种应用层协议，用于促进客户端与
    SQL Server 之间的交互。它最初由 Sybase Inc. 于 1984 年为其 Sybase SQL Server 关系数据库引擎设计和开发，后来成为了
    Microsoft 的产品。尽管 `TDS` 规范没有定义特定的网络传输协议，但当前版本的 `TDS` 已在 `TCP/IP` 和 `命名管道` 网络传输协议上实现。虚拟接口架构（`VIA`）网络协议已被弃用，但在旧版本
    SQL Server 中仍可用。它最终在 SQL Server 2016 中被移除。


    **注意**

    你也可以使用 `共享内存` 协议连接到 SQL Server 实例，但它只能用于从运行数据库引擎的同一台计算机连接；无法用于从网络上的其他计算机访问。


    `TDS` 提供多种功能，包括身份验证和标识、通道加密协商、SQL 请求和批量插入操作的规范、存储过程或用户定义函数的调用以及数据返回。开放数据库连接（`ODBC`）、Java
    数据库连接（`JDBC`）和对象链接与嵌入数据库（`OLE DB`）是使用 `TDS` 在客户端和 SQL Server 之间传输数据的库。客户端和 SQL
    Server 之间的 `TDS` 请求和响应可以通过使用不同的网络协议分析工具（如 `Wireshark`）来检查。另一个流行工具 Microsoft 消息分析器（`MMA`）已于
    2019 年 11 月退役。


    SQL Server 客户端在与数据库服务器通信时，可以使用 `TDS` 执行以下类型的请求：


    *   SQL 批处理：发送一条 SQL 语句或一批 SQL 语句

    *   远程过程调用：发送一个包含存储过程或用户定义函数名称、选项和参数的远程过程调用

    *   批量加载：发送用于批量插入/批量加载操作的 SQL 语句


    请注意，存储过程或用户定义函数名称可以通过远程过程调用或 SQL 批处理来请求。有关 `TDS` 的更多详细信息，你可以在 [`https://msdn.microsoft.com/en-us/library/dd304523.aspx`](https://msdn.microsoft.com/en-us/library/dd304523.aspx)
    找到 `TDS` 规范。


    `TCP/IP` 是迄今为止 SQL Server 实现中最常用的协议。数据库引擎使用的默认 `TCP/IP` 端口是 `1433`，尽管可以配置其他端口，并且在某些情况下是必需的，例如在同一服务器上运行多个实例时。其他一些服务可能使用不同的端口。例如，SQL
    Server Browser 服务启动并声明 UDP 端口 `1434`。当 SQL Server 数据库引擎使用不同于默认值的 `TCP/IP` 端口时，必须在客户端的连接字符串中指定端口号，或者，如果已启用，也可以通过
    SQL Server Browser 服务来解析。当配置了 `命名管道` 协议时，会使用默认管道 `\sql\query`。


    客户端可以使用以下应用程序接口（API）或库连接到 SQL Server 实例：


    *   `ODBC`：`ODBC`（开放数据库连接）是一种基于调用级接口（`CLI`）规范的开放式标准 API，最初由 Microsoft 在 20 世纪
    90 年代初开发。`ODBC` 已成为关系型和非关系型数据库管理系统中数据访问的事实标准。

    *   `OLE DB`：`OLE DB`（对象链接与嵌入数据库）是 Microsoft 设计的一种 API，不仅用于访问基于 SQL 的数据库，还用于以统一方式访问其他一些不同的数据源。尽管
    `OLE DB` 最初旨在作为 `ODBC` 的高级替代品和继承者，但 `ODBC` 仍然是使用最广泛的数据库访问标准。

    *   `JDBC`：`JDBC`（Java 数据库连接）是 Sun Microsystems 开发的一种 API，定义了客户端如何从 Java 编程语言访问关系数据库。`JDBC`
    是 Java 标准版平台的一部分，该平台现已被 Oracle 公司收购。

    *   `ADO.NET`：`ADO.NET`（用于 .NET 的 ActiveX 数据对象）是一组公开数据访问服务的类，是 Microsoft .NET
    框架不可或缺的一部分。`ADO.NET` 通常用于访问存储在关系数据库系统中的数据，但它也可以访问非关系数据源。


    ## 工作执行方式


    既然我们已经了解了客户端如何连接到数据库服务器，现在可以回顾接下来发生的事情，看看客户端请求的工作是如何执行的。在 SQL Server 中，每个用户请求都是一个操作系统线程，当客户端连接时，它会被分配给一个特定的调度器。调度器在
    `SQLOS` 级别处理，该级别也处理任务和工作线程等其他功能。向上提升一个级别，我们有连接、会话和请求。让我们首先介绍 `SQLOS`，然后回顾调度器、任务和工作线程。'
- fmt: '### SQLOS


    SQLOS 是 SQL Server 的应用层，负责管理所有操作系统资源，包括管理非抢占式调度、内存和缓冲区管理、I/O 函数、资源调控、异常处理和扩展事件。SQLOS
    代表其他数据库引擎层向操作系统发起调用来执行这些功能，或者在调度等情况下，提供针对 SQL Server 特定需求优化的服务。


    SQL Server 调度器是在 SQL Server 7 中引入的，因为在此之前，它依赖于 Windows 调度设施。这里的主要问题是，为什么需要 SQLOS
    或数据库引擎来替代可用的操作系统服务。操作系统服务是通用服务，有时并不适合数据库引擎的需求，因为它们扩展性不佳。与其为任何进程使用通用调度设施，不如优化调度并使其适应
    SQL Server 的特定需求。两者之间的主要区别在于，Windows 调度器是抢占式调度器，而 SQL Server 是协作式调度器或非抢占式调度器。这提高了可扩展性，因为让线程自愿让出（CPU）比让
    Windows 内核介入以防止单个线程独占处理器更有效率。


    注意


    在 *Operating System Support for Database Management* 一文中，Michael Stonebraker 探讨了若干操作系统服务是否适用于支持数据库管理功能，如调度、进程管理、进程间通信、缓冲池管理、一致性控制和文件系统服务。您可以在
    [`www.csd.uoc.gr/~hy460/pdf/stonebreaker222.pdf`](http://www.csd.uoc.gr/%257Ehy460/pdf/stonebreaker222.pdf)
    在线找到此出版物。


    ### 调度器


    调度器负责调度任务，并映射到系统中的单个逻辑处理器。它们通过允许线程暴露给单个处理器、接受新任务并将其交给工作线程来执行，以此管理线程调度（工作线程稍后会有更详细的描述）。在任何给定时间，只有一个工作线程可以暴露给单个逻辑处理器，因此，在这样一个处理器上只有一个任务可以执行。


    执行用户请求的调度器，其 ID 号小于 1048576，您可以使用 `sys.dm_os_schedulers` DMV（动态管理视图）来显示其运行时信息。SQL
    Server 启动时，调度器的数量将与实例可用的逻辑处理器数量相同。例如，如果您的系统分配给 SQL Server 有 16 个逻辑处理器，`sys.dm_os_schedulers`
    可以显示从 0 到 15 的 `scheduler_id` 值。ID 大于或等于 1048576 的调度器由 SQL Server 内部使用，例如专用管理员连接调度器，其
    ID 始终为 1048576。（在 SQL Server 2008 及更早版本中是 255。）这些通常被称为隐藏调度器，顾名思义，用于处理内部工作。除非处理器关联掩码配置为这样做，否则调度器不会在特定处理器上运行。


    `sys.dm_os_sys_info` DMV 的 `max_workers_count` 列显示可以创建的最大工作线程数，而 `sys.dm_os_schedulers`
    的 `active_worker_count` 列显示在任何给定时间处于活动状态的工作线程数。如果您监控这个值，就可以找出您的 SQL Server 实例实际使用的最大工作线程数。例如，在我的测试系统上（有
    16 个逻辑处理器）运行以下查询，显示了最大 512 个工作线程，但在执行查询时只有 32 个处于活动状态：


    ```sql

    SELECT max_workers_count FROM sys.dm_os_sys_info

    SELECT SUM(active_workers_count) FROM sys.dm_os_schedulers

    ```


    任务是一个执行请求，代表需要完成的工作；而工作线程映射到操作系统线程（当使用默认的线程模式时），或者如果使用了 Windows 纤程（轻型池）配置选项，则映射到
    Windows 纤程。图 [1-1](#393702_2_En_1_Chapter.xhtml#Fig1) 展示了任务执行过程。


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig1_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig1_HTML.jpg)


    图 1-1


    任务执行过程


    如前所述，在 SQL Server 中，调度器以非抢占模式运行，这意味着任务会周期性地自愿释放控制权，并会运行到其允许的时间配额用完，或者直到在同步对象上被挂起为止（时间配额或时间片是允许进程运行的时间段）。在此模型下，线程必须在常见的点自愿让出给另一个线程，而不是被
    Windows 操作系统随机地上下文切换出去。SQL Server 代码的编写方式是，它会在必要时并在适当的位置进行让出，以提供更好的系统可扩展性。


    图 [1-1](#393702_2_En_1_Chapter.xhtml#Fig1) 显示任务也可以在抢占模式下运行，但这只会在任务运行 SQL Server
    域之外的代码时发生，例如执行扩展存储过程、分布式查询或其他一些外部代码。在这种情况下，由于代码不受 SQL Server 控制，工作线程会切换到抢占模式，任务将在此模式下运行，因为它不受调度器控制。您可以通过查看
    `sys.dm_os_workers` DMV 的 `is_preemptive` 列来识别工作线程是否在抢占模式下运行。


    如前所述，SQL Server 默认以线程模式运行。另一种选择是在 Windows 纤程模式下运行。很少推荐在 Windows 纤程模式下运行 SQL Server，因为它仅适用于工作线程的上下文切换是性能关键瓶颈的某些情况。此外，在轻型池下不支持公共语言运行时
    (CLR) 执行。可以使用 `lightweight pooling` 服务器配置选项（默认值为 0）来启用 Windows 纤程模式，例如运行以下语句：


    ```sql

    EXEC sp_configure ''lightweight pooling'', 1

    ```


    `lightweight pooling` 选项是一个高级配置选项。如果您使用 `sp_configure` 系统存储过程来更新设置，则只能在 `show
    advanced options` 设置为 1 时更改 `lightweight pooling`。设置在服务器重启后生效。当然，如果您在测试环境中尝试此操作，别忘了在继续之前将其设置回
    0。查看 `sys.dm_os_workers` DMV 的 `is_fiber` 列将显示工作线程是否正在使用轻型池运行。'
  raw: '### SQLOS


    SQLOS is the SQL Server application layer responsible for managing all operating
    system resources which includes managing nonpreemptive scheduling, memory and
    buffer management, I/O functions, resource governance, exception handling, and
    extended events. SQLOS performs these functions by making calls to the operating
    system on behalf of other database engine layers or, like in the cases of scheduling,
    by providing services optimized for the specific needs of SQL Server.


    SQL Server schedulers were introduced with SQL Server 7 since before that version
    it relied on the Windows scheduling facilities. The main question here is why
    there is the need for SQLOS or a database engine to replace available operating
    system services. Operating system services are general-purpose services and sometimes
    inappropriate for database engine needs as they do not scale well. Instead of
    using generic scheduling facilities for any process, scheduling can be optimized
    and tailored to the specific needs of SQL Server. The main difference between
    the two is that a Windows scheduler is a preemptive scheduler, while SQL Server
    is a cooperative scheduler or nonpreemptive one. This improves scalability as
    having threads voluntarily yield is more efficient than involving the Windows
    kernel to prevent a single thread from monopolizing a processor.


    Note


    In *Operating System Support for Database Management*, Michael Stonebraker examines
    whether several operating system services are appropriate for support of database
    management functions like scheduling, process management, and interprocess communication,
    buffer pool management, consistency control, and file system services. You can
    find this publication online at [`www.csd.uoc.gr/~hy460/pdf/stonebreaker222.pdf`](http://www.csd.uoc.gr/%257Ehy460/pdf/stonebreaker222.pdf).


    ### Schedulers


    Schedulers schedule tasks and are mapped to an individual logical processor in
    the system. They manage thread scheduling by allowing threads to be exposed to
    individual processors, accepting new tasks, and handing them off to workers to
    execute them (workers are described in more detail shortly). Only one worker at
    a time can be exposed to an individual logical processor, and, because of this,
    only one task on such processor can execute at any given time.


    Schedulers that execute user requests have an ID number less than 1048576, and
    you can use the `sys.dm_os_schedulers` DMV (Dynamic Management View) to display
    runtime information about them. When SQL Server starts, it will have as many schedulers
    as the number of available logical processors to the instance. For example, if
    in your system SQL Server has 16 logical processors assigned, `sys.dm_os_schedulers`
    can show `scheduler_id` values going from 0 to 15\. Schedulers with IDs greater
    than or equal to 1048576 are used internally by SQL Server, such as the dedicated
    administrator connection scheduler, which is always 1048576\. (It was 255 on versions
    of SQL Server 2008 and older.) These are normally referred to as hidden schedulers
    and, as suggested, are used for processing internal work. Schedulers do not run
    on a particular processor unless the processor affinity mask is configured to
    do so.


    The column `max_workers_count` on the `sys.dm_os_sys_info` DMV shows the maximum
    number of workers that can be created, and the `active_worker_count` column from
    `sys.dm_os_schedulers` shows the number of workers that are active at any given
    time. If you monitor this value, you can find out the maximum numbers of workers
    that are really used by your SQL Server instance. For example, running the following
    on my test system with 16 logical processors shows 512 maximum workers but only
    32 active when the query was executed:


    ```

    SELECT max_workers_count FROM sys.dm_os_sys_info

    SELECT SUM(active_workers_count) FROM sys.dm_os_schedulers

    ```


    A task is an execution request and represents the work that needs to be performed
    while a worker maps to an operating system thread (when the thread mode, the default,
    is used) or to a Windows fiber if Windows fiber (lightweight pooling) configuration
    option is used. Figure [1-1](#393702_2_En_1_Chapter.xhtml#Fig1) shows the task
    execution process.


    ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig1_HTML.jpg](images/393702_2_En_1_Chapter/393702_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Task execution process


    As mentioned earlier, in SQL Server, a scheduler runs in a nonpreemptive mode,
    meaning that a task voluntarily releases control periodically and will run as
    long as its quantum allows it or until it gets suspended on a synchronization
    object (a quantum or time slice is the period of time for which a process is allowed
    to run). Under this model, threads must voluntarily yield to another thread at
    common points instead of being randomly context-switched out by the Windows operating
    system. The SQL Server code was written so that it yields as often as necessary
    and in the appropriate places to provide better system scalability.


    Figure [1-1](#393702_2_En_1_Chapter.xhtml#Fig1) shows that a task can also run
    in preemptive mode, but this will only happen when the task is running code outside
    the SQL Server domain, for example, when executing an extended stored procedure,
    a distributed query, or some other external code. In this case, since the code
    is not under SQL Server control, the worker is switched to preemptive mode, and
    the task will run in this mode as it is not controlled by the scheduler. You can
    identify if a worker is running in preemptive mode by looking at the `is_preemptive`
    column of the `sys.dm_os_workers` DMV.


    As indicated earlier, SQL Server by default will run in thread mode. An alternate
    choice is running in a Windows fiber mode. Running SQL Server in a Windows fiber
    mode is rarely recommended as it is only helpful for certain situations in which
    the context switching of the workers are the critical bottleneck in performance.
    In addition, Common Language Runtime (CLR) execution is not supported under lightweight
    pooling. The lightweight pooling server configuration option, which defaults to
    0, can be used to enable Windows fiber mode, for example, by running the following
    statement:


    ```

    EXEC sp_configure ''lightweight pooling'', 1

    ```


    The lightweight pooling option is an advanced configuration option. If you are
    using the sp_configure system stored procedure to update the setting, you can
    change lightweight pooling only when show advanced options is set to 1\. The setting
    takes effect after the server is restarted. Of course, if you try this in your
    test environment, don’t forget to set it back to 0 before continuing. Looking
    at the `is_fiber` column on the `sys.dm_os_workers` DMV will show if the worker
    is running using lightweight pooling.'
