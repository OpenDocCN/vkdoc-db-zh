    see such information:


    ```

    SELECT * FROM sys.dm_os_wait_stats

    WHERE wait_type = ''RESOURCE_SEMAPHORE''

    ```


    Note


    Related wait type `RESOURCE_SEMAPHORE_QUERY_COMPILE` indicates excessive concurrent
    query compiles. `RESOURCE_SEMAPHORE_MUTEX` shows waits for a thread reservation
    when running a query, but it also occurs when synchronizing query compile and
    memory grant requests. More details on waits will be covered in Chapter [5](#393702_2_En_5_Chapter.xhtml).


    Finally, the memory grant feedback, a feature introduced with SQL Server 2017,
    was designed to help with these situations by recalculating the memory required
