  trans: '# 性能故障排除


    正如前一节所述，你可以分析查询存储收集的信息，无论是主动分析以了解应用程序中的查询性能变化，还是被动分析以应对性能问题。查询存储可用于找出资源消耗高的查询，其方式与我们过去使用
    `sys.dm_exec_query_stats` 动态管理视图的方式大致相同。相比于使用此动态管理视图，查询存储提供了一些额外优势，包括：


    1.  使用 `sys.dm_exec_query_stats` 动态管理视图只能查看当前位于计划缓存中的计划。每个计划只存在当前版本，而且即使是这个版本也可能随时从计划缓存中被清除。查询存储则会持久化保存每个查询所有历史版本的计划。


    2.  并非所有计划都会被缓存，因此也不会通过 `sys.dm_exec_query_stats` 动态管理视图暴露出来。而查询存储会存储所有的计划，甚至是未完成的查询计划，后文将对此进行说明。


    要显示数据库中资源消耗最高的查询，你可以使用 `SQL Server Management Studio` 中的“前几大资源消耗查询”报告。该报告允许你选择不同的指标，包括
    CPU 时间、持续时间、执行次数、逻辑读取、逻辑写入、内存消耗和物理读取。图 6-7 展示了以 CPU 时间为指标的示例。


    ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig7_HTML.jpg](img/393702_2_En_6_Fig7_HTML.jpg)


    图 6-7：前 25 大资源消耗查询报告


    为了获得更大的灵活性，你可以结合使用 `sys.query_store_runtime_stats` 运行时统计信息视图以及其他查询存储目录视图，编写自己的查询。


    我最喜欢的一种技巧是：在 `SQL Server Management Studio` 中运行跟踪或扩展事件会话，运行“前几大资源消耗查询”报告并选择我需要的指标，然后查看提交给引擎的是哪个查询。例如，在运行图
    6-7 所示的以 CPU 时间为指标的报告时，我看到提交了以下查询（此处已稍作编辑，包括移除了一个筛选特定时间段以获取最近一小时内最耗资源查询的过滤器）：


    ```sql

    SELECT TOP 25

    p.query_id query_id,

    qt.query_sql_text query_text,

    CONVERT(float, SUM(rs.avg_cpu_time * rs.count_executions)) total_cpu_time,

    SUM(rs.count_executions) count_executions,

    COUNT(DISTINCT p.plan_id) num_plans

    FROM sys.query_store_runtime_stats rs

    JOIN sys.query_store_plan p ON p.plan_id = rs.plan_id

    JOIN sys.query_store_query q ON q.query_id = p.query_id

    JOIN sys.query_store_query_text qt ON q.query_text_id = qt.query_text_id

    GROUP BY p.query_id, qt.query_sql_text

    ORDER BY total_cpu_time DESC

    ```


    如前所述，你可以使用查询存储来识别数据库中的即席工作负载。由于即席工作负载可能包含大量不同的查询，它们通常会在查询优化上消耗相当大比例的系统资源，并在计划缓存中占用大量内存。要识别即席工作负载，你可以使用前面介绍的“前几大资源消耗查询”报告，并选择“执行次数”作为报告指标。图表或报告中出现大量执行次数为
    1 的查询，可能就表明存在即席工作负载。你可能还需要查看超过默认 25 个查询的更多查询，并设置一个更大的数值。为此，请选择“配置”（位于屏幕右上角区域），然后点击“返回”，并在“前几大查询”部分指定一个新值。报告显示后，你也可以点击“执行次数”列，以便从执行次数值为
    1 的查询开始查看，如前图 6-7 所示。


    如果你有大量即席查询，你可能需要启用“即席工作负载优化”配置选项，SQL Server 可以利用此选项来提高计划缓存的效率。启用此配置后，SQL Server
    通过仅在计划缓存中存储一个小型的已编译计划存根，而非为仅执行一次的查询存储完整的已编译执行计划，从而最小化计划缓存的内存使用量。有关“即席工作负载优化”配置选项的更多详细信息，请参阅第
    3 章。


    另一种重用计划的替代方案是在数据库级别强制实施参数化，尽管此方法更为激进。当多个相似的即席查询可以从使用相同的执行计划中受益时，此配置可能很有用。强制使用相同的计划可能并非总是好的解决方案，因此这是一个需要仔细和全面测试的选择。可以通过使用
    `ALTER DATABASE SET PARAMETERIZATION FORCED` 语句来实现数据库级别的强制参数化。'
- fmt: '# Incomplete Queries


    A very interesting feature that you can use with the Query Store is to see the
    final status of a query, which is especially helpful to find information about
    queries that didn’t complete successfully. This is something that was very difficult
    to accomplish using other current methods in SQL Server. You can find this information
    by looking at the `execution_type` and `execution_type_desc` columns of the `sys.query_store_runtime_stats`
    catalog view. The possible values for the column `execution_type` as documented
    are as follows:


    *   0: Regular execution (successfully finished)

    *   3: Client-initiated aborted execution

    *   4: Exception-aborted execution


    Most of your queries will return the value 0, meaning they were successfully executed,
    so let’s run an example to see how it works when queries are not executed successfully.
    Clear the Query Store so it is easier to manage the available results in our queries:


    ```sql

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    ```


    Run the following query (be careful, the query would run for a long time if left
    executing):


    ```sql

    SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2

    ```


    Let the query run for five seconds or so and cancel it. Now run the following
    query:


    ```sql

    SELECT COUNT(*) FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail
    s2

    ```


    Different from the previous execution, which was canceled, this query should finish
    quickly with an error message complaining about an arithmetic overflow error converting
    expression to data type int.


    Finally, run the following query, which should finish successfully in less than
    a second:


    ```sql

    SELECT COUNT_BIG(*) FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail
    s2

    ```


    Let’s inspect the execution type value by running the following query:


    ```sql

    SELECT rs.avg_logical_io_reads, qt.query_sql_text,

    q.query_id, execution_type_desc, qt.query_text_id, p.plan_id, rs.runtime_stats_id,

    rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    JOIN sys.query_store_runtime_stats_interval AS rsi

    ON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id

    ```


    The output should contain the following data:


    | `avg_logical_io_reads` | `query_sql_text` | `execution_type_desc` |

    | --- | --- | --- |

    | `942` | select count(*) from sales.SalesOrderDetail s1 cross join sales.SalesOrderDetail
    s2 | Exception |

    | `343572` | select * from sales.SalesOrderDetail s1 cross join sales.SalesOrderDetail
    s2 | Aborted |

    | `942` | select count_big(*) from sales.SalesOrderDetail s1 cross join sales.SalesOrderDetail
    s2 | Regular |


    As you can see, the Query Store was able to track all the previous queries and
    provide us with the status of the query or type of query execution, along with
    the runtime and performance information. This could be very helpful in scenarios
    when a query fails and you need to see additional information like resources used,
    duration, and so on. Keep in mind that a query must be valid, and a plan should
    be generated and should start executing for it to be tracked after a failure or
    cancelation. If a query fails to compile, there is nothing to be tracked. For
    example, if a query tries to use a table that does not exist, no plan will be
    generated, and there will be no query execution. For example, if you run


    ```sql

    SELECT * FROM authors

    ```


    you will receive an “Invalid object name” error, and there will be no optimization
    or execution at all and, therefore, no information captured by the Query Store.


    A common problem with tracking queries that didn’t complete successfully is related
    to the default query timeout setting for `.NET` applications, which is 30 seconds.
    You can test a `.NET` application default timeout using the following code. Since
    the default `.NET` timeout is not changed and the query executed in the code will
    definitely run for more than 30 seconds, you will get the Exception type of query
    execution as mentioned before:


    ```csharp

    using System;

    using System.Data.SqlClient;

    public class Test {

    public static void Main() {

    string connectionString = "Data Source=(local);Initial Catalog=AdventureWorks2017;Integrated
    Security=SSPI";

    string queryString = "SELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail
    s2";

    using (SqlConnection connection = new SqlConnection(connectionString)) {

    connection.Open();

    SqlCommand command = new SqlCommand(queryString, connection);

    try {

    command.ExecuteNonQuery();

    }

    catch (SqlException e) {

    Console.WriteLine("Got expected SqlException due to command timeout ");

    Console.WriteLine(e);

    }

    }

    }

    }

    ```


    **Note**


    You don’t need Visual Studio installed to test this example, just the Microsoft
    `.NET` framework, which should be already installed if you also have SQL Server.
    A typical installation would have one or more versions of the Microsoft `.NET`
    framework at the `C:\Windows\Microsoft.NET` folder, where you can find the Microsoft
    Visual C# Compiler or `csc.exe`. The provided code may need to be updated if you
    are not using a default SQL Server instance or if you are not using Windows authentication.


    A simple way to compile the code could be running the following, assuming the
    code is saved in a file named test.cs:


    ```shell

    "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" test.cs

    Microsoft (R) Visual C# Compiler version 4.8.3752.0

    for C# 5

    Copyright (C) Microsoft Corporation. All rights reserved.

    ```


    Running the created executable test.exe would produce the following expected error:


    ```shell

    Got expected SqlException due to command timeout

    System.Data.SqlClient.SqlException (0x80131904): Execution Timeout Expired.  The
    timeout period elapsed prior to completion of the operation or the server is not
    responding. ---> System.ComponentModel.Win32Exception (0x80004005): The wait operation
    timed out

    ```


    Since I’ve mentioned that the Query Store tracks all the queries executed in the
    configured database, you may be asking if it captures queries using the `RECOMPILE`
    hint, maintenance statements, or cross-database queries. Let me answer with the
    following examples. Create a small table on a test database to prepare for running
    a cross-database query:


    ```sql

    USE Test

    CREATE TABLE Orders (SalesOrderID int)

    INSERT INTO Orders VALUES (43659)

    ```


    Go back to AdventureWorks2017. Again, clear the Query Store so it is easy to look
    at the query stored in the catalog views:


    ```sql

    USE AdventureWorks2017

    GO

    ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL

    ```


    Run the following statements making sure to update the backup destination to a
    valid path:


    ```sql

    ALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail REBUILD

    GO

    DBCC CHECKDB

    GO

    SELECT * FROM Sales.SalesOrderDetail

    WHERE ProductID = 898

    OPTION (RECOMPILE)

    GO

    BACKUP DATABASE AdventureWorks2017 TO  DISK = ''c:\data\delete_me.bak''

    GO

    SELECT * FROM Sales.SalesOrderDetail a JOIN Test.dbo.Orders b

    ON a.SalesOrderID = b.SalesOrderID

    ```


    Inspect which queries were captured by the Query Store using the previous query.
    All of them except the `DBCC CHECKDB` and `BACKUP DATABASE` statements were captured.'
