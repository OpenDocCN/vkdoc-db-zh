- fmt: 'Starting with SQL Server 2016, the behavior of trace flag 1118 is the default
    for `tempdb` and all the user databases. This means that objects created on those
    databases will use uniform extents. The remaining system databases, `master` and
    `msdb`, will still use mixed extents. A new `ALTER DATABASE` option, `MIXED_PAGE_ALLOCATION`,
    allows you to change this default and to use mixed extents instead at the individual
    database level.


    The behavior of trace flag 1117 is disabled for user databases, but it can be
    changed at the database level using the `ALTER DATABASE AUTOGROW_SINGLE_FILE`
    and `AUTOGROW_ALL_FILES` file and filegroup options. `AUTOGROW_SINGLE_FILE`, which
    is the default, allows to grow a single file in a filegroup, and `AUTOGROW_ALL_FILES`
    allows growth of all the files in a filegroup when the autogrow threshold is met.


    For `tempdb`, the `AUTOGROW_ALL_FILES` filegroup property is turned on by default
    and cannot be modified (the primary filegroup is the only filegroup allowed on
    `tempdb`). The `MIXED_PAGE_ALLOCATION` database option is turned off by default
    and cannot be modified either. Trying to change any of these choices would return
    an error message indicating that the option cannot be set in the `tempdb` database.
    This means that `tempdb` is configured exactly as best practices would advise
    through trace flags prior to SQL Server 2016.


    Finally, keep in mind that even with these configurations and defaults available
    starting with SQL Server 2016, contention may still be possible on systems with
    heavy `tempdb` use, so the additional information provided in this chapter may
    still be useful to help with those problems.


    ## What Is New in SQL Server 2019


    SQL Server 2017 was mostly a vehicle to ship the Linux release, and so there was
    not much in significant enhancements for tempdb. Probably the only improvement
    was that the setup process now allows specifying an initial tempdb file size of
    up to 256 GB per file, but that is pretty much it. Actually, it is ironic that
    one of the improvements of SQL Server 2016, which is the ability to create multiple
    data files during the installation, did not even make it into the Linux release
    in 2017.


    Starting with SQL Server 2019, you can now also create multiple data files during
    a new SQL Server on Linux installation, same as with a SQL Server on Windows installation.


    A second improvement for the latest version is an improvement on PFS updates.
    For this release, PFS pages, which were described earlier in this chapter, can
    now be updated using a shared latch instead of an exclusive latch, greatly helping
    alleviate page latch contention on PFS pages. This behavior is enabled by default
    on all the instance databases obviously including tempdb.


    But without a doubt, the most important tempdb enhancement of the SQL Server 2019
    release is memory-optimized tempdb metadata. I cover this feature in the next
    section.


    ## Memory-Optimized tempdb Metadata


    As mentioned at the beginning of this chapter, SQL Server 2019 introduces probably
    the biggest tempdb performance improvement in the history of the product, finally
    providing relief to a problem that has been impacting SQL Server for many years.
    Starting with this version, you can now configure tempdb to use memory-optimized
    metadata, a feature based on the In-Memory OLTP technology. By enabling this tempdb
    configuration, tempdb metadata can now be moved into latch-free nondurable memory-optimized
    tables and by doing that technically eliminating metadata contention.


    To enable memory-optimized tempdb metadata, you can use the following statement:


    ```

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = ON

    ```


    You can verify the feature is enabled at any time by running the following code:


    ```

    SELECT SERVERPROPERTY(''IsTempdbMetadataMemoryOptimized'')

    ```


    Enabling the feature will require to restart the SQL Server service. The same
    is true if you decide to disable the feature later for any reason.


    This feature still has a few limitations, but it is still a huge improvement,
    and we hope those limitations could be eliminated in the coming cumulative updates
    or newer versions of the product. The current limitations of the feature are:


    1.  As we will cover in Chapter 7, a current limitation of In-Memory OLTP is that
    a single transaction may not access memory-optimized tables in more than one database.
    The same is true for tempdb, and so this means that you cannot access system views
    in tempdb in the same transaction where you access a memory-optimized table in
    a user database.


    2.  Columnstore indexes cannot be created on temporary tables while memory-optimized
    tempdb metadata is enabled.


    3.  Using the `COLUMNSTORE` or `COLUMNSTORE_ARCHIVE` parameter of the `sp_estimate_data_compression_savings`
    is not supported.


    4.  As mentioned, enabling or disabling the feature will require a SQL Server
    service restart.


    As you can see, the first limitation in this list is, in fact, an In-Memory OLTP
    limitation, and since it impacts mostly catalog or system views, perhaps it is
    not very restricting for your applications. Finally, if you need to disable this
    feature, you could run the following statement, which requires a SQL Server service
    restart:


    ```

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = OFF

    ```


    Let us run a complete example. The following code creates a temporary table and
    inserts a single row on it. We will create an expensive workload by running this
    code thousands of times simultaneously. An easy way to accomplish this is to use
    the ostress utility. Save the following code into a file with a name like tempdbtest.sql:


    ```

    CREATE TABLE #tempdbtest (id int, name char(7000))

    INSERT INTO #tempdbtest VALUES (1, ''tempdb test'')

    ```


    Note: You can download the ostress utility as part of the RML Utilities for SQL
    Server at [`www.microsoft.com/en-us/download/details.aspx?id=4511`](https://www.microsoft.com/en-us/download/details.aspx%253Fid%253D4511).


    Prepare your system to run the following:


    ```

    ostress -n5000 -itempdbtest.sql

    ```


    Basically, this runs the code we save in the file tempdbtest.sql using 5000 connections
    simultaneously. You may need to provide a file path too.


    We are going to monitor waits in two different ways, using Performance Monitor
    (perfmon) and querying the `sys.dm_os_waiting_tasks` DMV. Be ready to run the
    following query while the load is running. We know you can miss some waits while
    running the query interactively, so we want to complement it with the Performance
    Monitor data. `sys.dm_os_waiting_tasks` and `PAGE_LATCH` waits were covered earlier
    in the chapter. Additional ways to collect wait information are covered in the
    next chapter.


    ```

    SELECT * FROM sys.dm_os_waiting_tasks

    WHERE wait_type LIKE ''PAGE%LATCH%''

    AND resource_description LIKE ''2:%''

    ```


    Open Performance Monitor and add the following counters:


