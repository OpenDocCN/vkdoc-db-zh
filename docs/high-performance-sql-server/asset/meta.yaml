- - '#'
  - 9. 索引
- - '##'
  - SQL Server 如何使用索引
- - '###'
  - 正如本章引言所述，尽管索引有多种用途，但**最重要**的无疑是导航，即尽可能快速高效地找到一行或多行数据。传统上，这是通过使用 B 树结构来实现的。索引搜索使用随机磁盘
    I/O，对于少量或有限行数的检索极为有效，因此对于 OLTP 工作负载至关重要。然而，每次随机磁盘 I/O 通常需要读取几个数据库页面，因此随着行数的增加，其代价变得越来越高。这种代价高昂的原因在于，它需要从根节点遍历
    B 树结构直到叶子节点，可能读取多个数据库页面。尽管每个页面通常包含许多行，但大多数时候只需要其中一行。
