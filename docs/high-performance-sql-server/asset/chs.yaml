  ### 图 9-11

  #### DTA 建议选项卡


  `Recommendations` 选项卡显示诸如建议创建或删除的对象以及执行此类操作所需代码等信息。`Target of Recommendation` 列显示了将要创建的对象（在本例中），其中统计信息以
  `_dta_stat` 开头，索引以 `_dta_index` 开头，视图以 `_dta_mv` 为前缀。建议选项卡的最后一列是 `Definition` 列，该列可点击，会显示创建建议对象的代码。以下是本练习中四个建议对象的代码。（代码按原样显示，因此不遵循本书其余部分的风格和格式。）


  ```sql

  CREATE STATISTICS [_dta_stat_565577053_1_5] ON [dbo].SalesOrderDetail

  CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderDetail_9_565577053__K5_1_2] ON [dbo].[SalesOrderDetail]

  (

  [ProductID] ASC

  )

  INCLUDE ([SalesOrderID],

  [SalesOrderDetailID]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE =
  OFF) ON [PRIMARY]

  SET ANSI_PADDING ON

  CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderDetail_9_565577053__K5_K1_2_3_4_6_7_8_9_10_11]
  ON [dbo].[SalesOrderDetail]

  (

  [ProductID] ASC,

  [SalesOrderID] ASC

  )

  INCLUDE ([SalesOrderDetailID],

  [CarrierTrackingNumber],

  [OrderQty],

  [SpecialOfferID],

  [UnitPrice],

  [UnitPriceDiscount],

  [LineTotal],

  [rowguid],

  [ModifiedDate]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE = OFF) ON
  [PRIMARY]

  CREATE CLUSTERED INDEX [_dta_index_SalesOrderHeader_c_9_581577110__K1] ON [dbo].[SalesOrderHeader]

  (

  [SalesOrderID] ASC

  )WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE = OFF) ON [PRIMARY]

  ```


  让我们快速分析一下这些建议。与我们之前在缺失索引练习中得到的结果相比，我们看到建议略有不同，这主要是因为我们知道 `SalesOrderHeader` 和 `SalesOrderDetail`
  是主从表，并且我们决定预先为其创建聚集索引。正如我们讨论过的，缺失索引功能无法建议聚集索引。本练习表明，仅使用默认设置，我们就获得了关于聚集索引、非聚集索引和统计信息的建议。


  正如预期的那样，建议在 `SalesOrderHeader` 表上创建的聚集索引是我们提供的范围查询（即带有 `WHERE SalesOrderID BETWEEN
  50000 AND 70000` 谓词的查询）的结果。我们还获得了几个非聚集索引和一个多列统计信息对象的建议。这些建议可能是个不错的选择，但它们与我们之前的练习并不匹配，因为我们手动在
  `SalesOrderDetail` 上创建了一个聚集索引，而这是这些主从表原始设计的一部分。由于我们没有提供任何范围查询，因此没有建议为 `SalesOrderDetail`
  创建聚集索引。显然，DTA 无法就其未知的信息提出建议，因此向其提供所有重要查询至关重要。同样值得注意的是，DTA 建议在 `SalesOrderID` 和 `ProductID`
  上创建多列统计信息。多列统计信息永远不会由 SQL Server 自动创建。


  如您所见，即使对于这个简单的练习，您也可能需要花费一些时间在测试环境中分析、评估和验证所提供的建议，但这绝对是在将其部署到生产实例之前必须做的工作。我必须再次强调，我们绝不能盲目实施这些建议。


  `Reports` 选项卡显示了关于调优过程的大量有趣信息，包括包含调优信息的摘要以及 15 个不同的报告。DTA 中呈现的所有信息都存储在 `msdb` 数据库中，因此如果您有特殊需求，可以查看一下。这些信息存储在
  `DTA_` 表中，并将一直保留，直到您删除 DTA 会话。


  最后，如前所述，产品最新版本中引入了两个非常有用的 DTA 功能：您现在可以使用计划缓存和查询存储作为要分析的工作负载源，因此您根本不需要收集任何数据。这非常有意义，因为您最昂贵的查询很可能就在其中，正如我们在第
  8 章通过 `sys.dm_exec_query_stats` DMV 或在第 6 章通过查询存储向您展示的那样。


  让我们通过以下练习来看看这些功能。为了模拟计划缓存中的真实工作负载，您可以在 SQL Server Management Studio 中运行我们的测试查询，并在前面加上
  `DBCC FREEPROCCACHE` 语句，该语句用于清除现有的计划缓存，如下所示：


