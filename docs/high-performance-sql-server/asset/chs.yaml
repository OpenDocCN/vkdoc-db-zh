  DMV 返回 39 行，列出了大量信息，例如优化总数、每次优化的平均耗时、每次优化的平均预估成本，以及关于优化的详细信息，如简单计划、超时、优化期间的内存问题，或与插入、删除、更新、合并、子查询、提示、视图引用、远程查询和索引视图相关的优化数量。这可以为您提供有关系统中发生的优化的详细信息。此
  DMV 的某些条目是未文档化的。


