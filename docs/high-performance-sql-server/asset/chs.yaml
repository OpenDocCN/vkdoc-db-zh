  ## 批处理模式自适应连接


  如第 1 章所述，在查询优化期间由于基数估计错误而选择错误的连接算法，可能会严重影响查询性能。自适应连接提供了一种解决方案，它允许执行计划在执行时根据流经连接操作符的实际行数动态选择物理连接算法。在执行过程中，自适应连接操作符会先假定该连接是哈希连接，并读取连接的生成输入；如果达到计算出的阈值，则将继续作为哈希连接执行。如果未达到阈值，计划仍会使用生成输入，但转而继续执行为嵌套循环连接。在当前版本的批处理模式自适应连接中，仅支持哈希连接和嵌套循环连接，并且如前所述，计划最初会假定物理连接是哈希连接。


  批处理模式自适应连接，顾名思义，仅限于使用批处理模式操作符的查询。在 SQL Server 2017 中，这基本上仅限于使用列存储索引的操作。然而，在最新版本中，它还包括使用行存储批处理模式的操作，这也是本章稍后将讨论的新功能。


  最后，在某些情况下，您可能需要禁用本章涵盖的此功能或其他功能。例如当遇到性能回退时。若要在不更改数据库兼容级别的情况下，为整个数据库级别禁用批处理模式自适应连接，可以对
  SQL Server 2017 使用以下语句：


  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET DISABLE_BATCH_MODE_ADAPTIVE_JOINS = ON

  ```


  以下语句对 SQL Server 2019 执行相同操作：


  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET BATCH_MODE_ADAPTIVE_JOINS = OFF

  ```


  如果需要重新启用此功能，可以相应地反转 `ON` 和 `OFF` 的值。


  如果需要对特定查询禁用批处理模式自适应连接，但为数据库的其他查询保持该功能启用，还可以使用 `USE HINT` 子句，如下所示：


  ```

  SELECT * ...

  OPTION (USE HINT(''DISABLE_BATCH_MODE_ADAPTIVE_JOINS''))

  ```


  让我们通过在 `SalesOrderHeader` 表上创建列存储索引来尝试此功能的示例：


  ```

  CREATE NONCLUSTERED COLUMNSTORE INDEX CIX_SalesOrderID

  ON Sales.SalesOrderHeader(TaxAmt)

  ```


  接下来是我们的示例查询：


  ```

  SELECT SUM(soh.TaxAmt)

  FROM Sales.SalesOrderHeader soh

  JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

  ```


  在 SQL Server 2019 中运行上述查询将生成如图 10-2 所示的计划。如果您使用的是 SQL Server 2017，则需要使用实时查询统计信息功能才能看到相同的信息。


  注意：实时查询统计信息功能在 SQL Server 2016 中引入，它允许您可视化每个已执行分支上处理的行数。


  ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig2_HTML.jpg](img/393702_2_En_10_Fig2_HTML.jpg)


  图 10-2 自适应连接查询计划


  图 10-2 中计划最重要的部分是新的自适应连接操作符，它与常规物理连接不同，具有三个输入。第一个或顶部的分支是生成输入，在本例中是一个列存储索引扫描操作符。第二个或中间的分支是如果选择哈希连接将会使用的输入。如您所见，计划显示已处理了
  `121317` 行中的 `121317` 行，这意味着该分支已被选中。第三个也是底部的分支是如果选择嵌套循环连接将会使用的输入。同样，您可以在图 10-2 中看到，由于
  `121317` 行中的 `0` 行已被处理，该分支未被选中。


  您还可以检查定义计划用于此决策的阈值的值。如果您查看自适应连接操作符的属性，`Adaptive Threshold Rows` 属性将显示值 `1398.57`。行数等于或大于此阈值的任何数量都将使计划继续作为哈希连接执行。更小的数量将把连接切换到嵌套循环连接。


  最后，删除创建的索引：


  ```

  DROP INDEX Sales.SalesOrderHeader.CIX_SalesOrderID

  ```




  ## 内存授权反馈


  SQL Server 使用缓冲区缓存页面来保存查询所使用的数据。然而，其他一些操作（例如排序和哈希）可能需要大量的额外内存。它们无法使用计划缓存，而是需要内存授权。内存授权用于存储待排序的行，或者存储哈希连接和哈希聚合运算符所使用的哈希表，并且仅在查询执行期间需要。在某些极少数情况下，具有多个范围扫描的并行计划也可能需要内存授权。


  查询所需的内存量由查询优化器在生成计划时估算。尽管此过程通常能正确估算所需内存，但在某些情况下，可能会发生以下性能问题：


  1.  低估所需内存的计划可能导致额外的查询处理或将数据溢出到磁盘。

  2.  高估所需内存的计划可能会浪费宝贵的资源，并可能导致其他查询不得不等待它们自己请求的内存。


  内存授权反馈旨在通过重新计算查询所需的内存并在缓存的查询计划中更新它来帮助解决这些情况。内存授权反馈可以从 `tempdb` 溢出事件或实际使用的内存量中获取信息。虽然这种改进的估算可能在查询的第一次执行时没有帮助，但它可以用于提升后续执行的性能。内存授权反馈实际上是一个学习过程，并且顾名思义，它从真实的运行时信息中获得反馈。内存授权反馈有两种模式：批处理模式（随
  SQL Server 2017 引入）和行模式（随 SQL Server 2019 引入）。


  对于参数敏感的查询，内存授权反馈将自动禁用。如第 1 章所解释，在某些情况下，当我们遇到倾斜或不均匀的数据分布时，重用使用一个参数创建的计划可能不适用于具有不同参数的相同查询。对于参数敏感的查询，可能需要多次重复运行才能禁用此功能，因为可能需要时间才能发现查询的内存需求存在差异。您可以通过监控
  `memory_grant_feedback_loop_disabled` 扩展事件来监控该功能何时被禁用。


  由于内存授权反馈信息存储在执行计划中，这带来了一些限制。例如，使用 `OPTION (RECOMPILE)` 或在存储过程级别使用 `RECOMPILE` 的查询永远不会缓存计划。计划也可能从计划缓存中被移除，从而同时丢失其反馈信息。在这些情况下，内存授权反馈功能无法使用。有关重新编译和计划缓存的更多详细信息，请参阅第
  1 章。


  与本章介绍的所有功能一样，如果您遇到任何性能问题，可以在数据库级别禁用它们。由于您可能仍希望保留使用特定数据库兼容级别带来的一些其他好处，您可以使用 `ALTER
  DATABASE SCOPED CONFIGURATION` 语句在单个数据库级别启用特定的数据库配置设置。要在 SQL Server 2017 中禁用内存授权反馈功能，您可以在适用的数据库上下文中使用以下语句：


  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK = ON

  ```


  以下语句在 SQL Server 2019 中执行相同操作：


  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET BATCH_MODE_MEMORY_GRANT_FEEDBACK = OFF

  ```


  您可以通过在上述语句中切换 `ON` 和 `OFF` 的值来重新启用它。


  如果您只需要在查询级别（而不是数据库级别）禁用此功能，可以使用 `USE HINT`，如下所示：


  ```

  SELECT * ....

  OPTION (USE HINT(''DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK''))

  ```


  行模式内存授权反馈的工作方式与批处理模式版本类似，但它仅在 SQL Server 2019 中可用。要启用此功能，您需要将兼容级别设置为 `150`。如果您需要在保持数据库兼容级别不变的情况下禁用它，可以使用以下语句：


  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET ROW_MODE_MEMORY_GRANT_FEEDBACK = OFF

  ```


  如果您想重新启用此功能，只需将值改为 `ON`。与批处理内存授权反馈相同，您可以仅在查询级别禁用此功能。如果您在单个查询上遇到性能回归，这将非常有用。


  ```

  SELECT * ....

  OPTION (USE HINT(''DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK''))

  ```





  ## 交错执行


  正如我在本章前面所提到的，传统的查询优化会生成一个执行计划，无论基数估计是否准确，该计划都会被执行。通常，我们只在查询执行后，尤其是在出现糟糕的查询性能问题后，才会知道糟糕的基数估计。交错执行是一项旨在帮助解决其中一些基数估计问题的新功能。


  多语句表值函数（Multistatement table-valued functions）的历史问题在于，传统上它们有一个固定的基数估计。这个猜测值在 SQL
  Server 2014 及更高版本中是 100 行，而在任何更早的版本中只有 1 行。当实际要处理的行数高于估计的猜测值时，这种固定的基数估计可能导致查询优化器做出糟糕的决策。在这些情况下，可能会创建一个非最优的执行计划，从而导致查询性能问题。


  从 SQL Server 2017 开始，交错执行使查询计划能够基于修订后的基数估计进行适应。在此过程中，SQL Server 可以优化查询的一部分，暂停当前的查询优化，执行部分计划，捕获准确的基数估计，然后恢复对查询剩余部分的优化。捕获准确的基数信息有助于查询优化器为查询的剩余部分做出更好的决策。实际行数与估计行数之间的差异越大，以及计划中消耗这些行的下游操作越多，获得的收益就越大。在当前版本中，交错执行仅适用于多语句表值函数，但计划在未来添加对更多结构的支持。


  您可以使用 `interleaved_exec_status` 扩展事件来查明是否正在发生交错执行。同样，您可以使用 `interleaved_exec_stats_update`
  扩展事件来验证基数估计是否由交错执行功能更新。


  与本章中的其他功能一样，在像数据库引擎这样的复杂软件中，任何新功能都可能对某些查询导致性能回退。因此，您可能决定在数据库级别禁用此功能，或许只在查询级别启用。要在数据库级别为
  SQL Server 2017 禁用交错执行，请使用以下语句：

  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET DISABLE_INTERLEAVED_EXECUTION_TVF = ON

  ```


  如果您使用的是最新版本的 SQL Server，可以使用：

  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET INTERLEAVED_EXECUTION_TVF = ON

  ```


  要在查询级别禁用，请使用以下提示：

  ```

  SELECT * ...

  OPTION (USE HINT(''DISABLE_INTERLEAVED_EXECUTION_TVF''))

  ```


  最后，让我们看一个交错执行如何工作的例子。创建以下函数：

  ```

  CREATE FUNCTION dbo.ufn_SalesOrderDetail(@year int)

  RETURNS @SalesOrderDetail TABLE

  (

  [SalesOrderID] [int] NOT NULL,

  [SalesOrderDetailID] [int] NOT NULL,

  [CarrierTrackingNumber] nvarchar NULL,

  [OrderQty] [smallint] NOT NULL,

  [ProductID] [int] NOT NULL,

  [SpecialOfferID] [int] NOT NULL,

  [UnitPrice] [money] NOT NULL,

  [UnitPriceDiscount] [money] NOT NULL,

  [LineTotal] money NOT NULL,

  [rowguid] [uniqueidentifier] ROWGUIDCOL NOT NULL,

  [ModifiedDate] [datetime] NOT NULL)

  AS

  BEGIN

  INSERT @SalesOrderDetail

  SELECT * FROM Sales.SalesOrderDetail

  WHERE YEAR(ModifiedDate) = @year

  RETURN

  END

  ```


  首先，我想向您展示引入交错执行之前的计划。如前所述，有几种方法可以禁用此功能，例如更改数据库兼容级别、使用数据库作用域配置选项或使用查询提示。让我们尝试最后一种选择。

  ```

  SELECT * FROM dbo.ufn_SalesOrderDetail(2014) o

  JOIN Sales.SalesOrderHeader h ON o.SalesOrderID = h.SalesOrderID

  OPTION (USE HINT(''DISABLE_INTERLEAVED_EXECUTION_TVF''))

  ```


  此查询将创建图 10-3 中的计划。


  ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig3_HTML.jpg](img/393702_2_En_10_Fig3_HTML.jpg)


  图 10-3：没有交错执行的计划


  您可能会注意到，预期的估计行数 100 使得查询优化器相信对于如此低的行数，嵌套循环连接可能是最合适的物理运算符。现在在没有任何提示的情况下运行查询：

  ```

  SELECT * FROM dbo.ufn_SalesOrderDetail(2014) o

  JOIN Sales.SalesOrderHeader h ON o.SalesOrderID = h.SalesOrderID

  ```


  这一次，我们得到了图 10-4 中的计划。


  ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig4_HTML.jpg](img/393702_2_En_10_Fig4_HTML.jpg)


  图 10-4：带有交错执行的计划


  您现在可以看到估计行数与实际行数相同，查询优化器对于计划做出了不同的决策。这次，计划同时使用了排序和合并连接操作来处理相同的数据，这对于如此大的行数可能更合适。


  ## 行存储上的批处理模式


  行存储上的批处理模式（Batch mode on rowstore）功能随 SQL Server 2019 引入。列存储的批处理模式在之前的几个版本中已经可用，始于
  SQL Server 2012 引入列存储索引时。如第 7 章所述，批处理模式处理是一种基于向量的执行方法，旨在通过一次处理多行而不是使用传统的逐行处理运算符来提高查询性能。


  查询优化器可以在位图过滤器、磁盘堆和 B 树索引上使用行存储上的批处理模式，这基本上意味着磁盘上的聚集和非聚集索引。该功能还支持所有现有的适用于列存储的启用批处理模式的运算符。当您不想创建列存储索引，或者因为您还需要一个列存储索引不支持的功能而无法创建时，行存储上的批处理模式可以提供帮助。然而，行存储上批处理模式当前的一个限制是它不适用于内存优化
  OLTP 表或获取/筛选大对象列的查询。


  即使批处理模式可用于行存储，此功能仍然仅对处理大量行的查询有益，例如分析或商业智能查询。如第 1 章所建议的，使用批处理模式的决定就像查询优化器中的其他任何决策一样，是一个基于成本的决定。此成本估计将显示使用行存储批处理模式是否对查询的性能有益。优化器考虑批处理模式的一些最低要求包括表的大小、使用的运算符以及输入查询中的估计基数。您可以通过在运算符级别检查“实际执行模式”属性来验证您的计划是否正在使用批处理模式。您可以通过查看第
  7 章中的“列存储索引”部分了解更多关于批处理模式的细节。


  要使用行存储上的批处理模式，您只需将兼容性模式更改为 SQL Server 2019 或 150。要在不更改数据库兼容性级别的情况下在数据库级别禁用行存储上的批处理模式，您可以使用：

  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET BATCH_MODE_ON_ROWSTORE = OFF

  ```


  要重新启用此功能，只需将值更改为 ON。


  要在查询级别禁用此功能（假设您发现了性能回退），您可以尝试使用 USE HINT，如下所示：

  ```

  SELECT * ...

  OPTION(USE HINT(''DISALLOW_BATCH_MODE''))

  ```


  还有一个提示可以在通过数据库作用域配置禁用时启用批处理模式。在这种情况下，您可以尝试：

  ```

  SELECT *

  OPTION(USE HINT(''ALLOW_BATCH_MODE''))

  ```




  ## 表变量延迟编译


  表变量未被广泛使用的主要原因可能在于，与前面提到的多语句表值函数类似，SQL Server 不提供可用于生成最优执行计划的优化器统计信息。如前所述，表变量和多语句表值用户定义函数不支持统计信息，因此对于近期版本的
  SQL Server，查询优化器将使用固定的 100 行估计值；对于 SQL Server 2014 之前的版本，则仅使用 1 行。


  从 SQL Server 2019 开始，表变量的行为将与之前提到的交错执行特性类似。SQL Server 将先执行表变量代码，从而获知实际的基数估计值或实际行数。随后，延迟编译将利用此准确的估计值来生成性能更好的执行计划。最后请记住，尽管此行为现在看起来与临时表非常相似，但即使对于
  SQL Server 2019，表变量仍然没有统计信息。


  与之前一样，如果需要在数据库级别禁用此功能，可以使用：


  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET DEFERRED_COMPILATION_TV = OFF

  ```


  可以使用 `ON` 来恢复。与我们之前的情况类似，可以使用 `USE HINT`，如下所示：


  ```

  SELECT * ...

  OPTION (USE HINT(''DISABLE_DEFERRED_COMPILATION_TV''))

  ```


  ## 标量 UDF 内联


  标量用户定义函数（`UDF`）是一种返回单个数据值的 `UDF`。标量 `UDF` 一直是 SQL Server 的一个性能问题，因为它们不遵循 SQL Server
  使用的面向集合模型。相反，它们遵循效率较低的迭代模式。例如，当一个 `UDF` 用在涉及多行的查询中时，代码会逐行处理。如你在第 1 章所见，用于对操作符进行成本估算并为构建执行计划做出更优决策的成本估算机制，并不适用于
  `UDF`。使用 `UDF` 的查询也无法利用查询内并行度。


  标量 `UDF` 内联是 SQL Server 2019 的一项新特性，它自动将标量 `UDF` 转换为关系表达式，并嵌入到 SQL Server 查询中。这极大地提升了使用标量
  `UDF` 的查询的性能，因为它们现在采用面向集合的模型，而非传统的迭代模型。


  与本章前面讨论的特性类似，如果需要在数据库级别禁用标量 `UDF` 内联，可以使用以下语句：


  ```

  ALTER DATABASE SCOPED CONFIGURATION

  SET TSQL_SCALAR_UDF_INLINING = OFF

  ```


  同样，可以使用 `ON` 值重新启用此特性。


  在查询级别禁用此特性所需的提示如下所示：


  ```

  SELECT * ...

  OPTION (USE HINT(''DISABLE_TSQL_SCALAR_UDF_INLINING''))

  ```


  ## 近似计数不同值


  与本章涵盖的所有智能处理特性不同，`APPROX_COUNT_DISTINCT` 是一个新的 SQL Server 函数，因此不需要使用数据库兼容级别模式。`APPROX_COUNT_DISTINCT`
  函数是使用 `COUNT(DISTINCT)` 的替代方案，它通过对组中的每一行计算一个表达式，返回组中唯一非空值的近似数量。此函数旨在为需要响应速度比绝对精确度更重要的海量数据提供聚合计算。


  `APPROX_COUNT_DISTINCT` 函数基于 HyperLogLog 算法，该算法的目的是计算集合中不同元素数量的近似值，其在 SQL Server
  中的实现保证在 97% 的概率下误差率不超过 2%。你可以通过查阅 [`https://en.wikipedia.org/wiki/HyperLogLog`](https://en.wikipedia.org/wiki/HyperLogLog)
  获取有关此算法的更多细节。


  让我用 AdventureWorksDW2017 数据库展示一个例子。请记住，由于我们的表不够大，可能无法注意到任何性能差异。在请求实际执行计划的同时运行以下语句：


  ```

  SELECT COUNT(DISTINCT(UnitCost))

  FROM FactProductInventory

  SELECT APPROX_COUNT_DISTINCT(UnitCost)

  FROM FactProductInventory

  ```


  你可以看到生成的执行计划非常不同。正如处理大量数据时所预期的，`COUNT(DISTINCT)` 查询包含一个哈希聚合操作符，如图 10-5 所示。而 `APPROX_COUNT_DISTINCT`
  函数的计划（如图 10-6 所示）不包含哈希聚合操作符，因此所需内存更少，并且不需要内存授予。我在测试系统上的结果分别是 89,161 和 92,430，其中第一个值是不同值的精确数量，后者是近似值。


  ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig6_HTML.jpg](img/393702_2_En_10_Fig6_HTML.jpg)


  图 10-6

  `APPROX_COUNT_DISTINCT` 的计划


  ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig5_HTML.jpg](img/393702_2_En_10_Fig5_HTML.jpg)


  图 10-5

  `COUNT(DISTINCT)` 的部分计划


  最后，如前所述，无需启用或禁用此特性。你只需根据应用需求决定使用 `COUNT(DISTINCT)` 还是 `APPROX_COUNT_DISTINCT` 更合适。


  ## 总结


  SQL Server 2017 在自适应查询处理的框架下引入了多项查询处理特性。SQL Server 2019 扩展了这些特性的数量，并赋予它们一个新名称：智能查询处理。智能查询处理特性无需更改应用程序，且无需或只需付出极少努力，即可提供性能增强。微软表示，未来版本的产品中将发布更多智能处理增强功能。


  本章是智能查询处理的介绍性章节，因此详细涵盖这些特性超出了本书的范围。更多细节，你可能需要参考 SQL Server 文档。



  '
- '# 11. SQL Server 存储


  本章将从 SQL Server 的视角来探讨存储。虽然在选择配置存储时，可用性与可恢复性等因素也至关重要，但我们主要关注性能方面。磁盘传统上是数据库系统中最慢的组件，因此为性能优化存储至关重要，通常涉及两个高层领域：直接调优存储，以及调优组件以高效利用存储。前者指的是对存储硬件本身进行调优和配置，而后者则涉及调整系统的其他组件，以优化存储的使用，包括诸如正确配置
  SQL Server 和创建合适的索引等事项。


  到目前为止，本书中讨论的所有主题主要涉及 SQL Server 数据库专业人员，包括数据库开发人员、数据库管理员和数据库架构师等角色。但在生产环境中实现高性能应用程序总是涉及公司内的其他角色，有时甚至是不同的团队。对于存储而言，这一点尤为真实。


  我依然记得过去的日子，那时我与 Windows 管理员一起，使用 `RAID` 1、5 或 10 为我们的服务器配置驱动器。随着存储——尤其是企业级存储——变得越来越复杂，其调优和管理通常会超出
  SQL Server 数据库专业人员的职责范围，甚至很可能落在不同的团队身上。


  无论公司内的职责如何划分，存储对 SQL Server 专业人员来说不必是一个黑盒。因此，理解存储的工作原理，并向存储团队正确传达数据库需求至关重要。性能不仅关乎初始配置，还包括持续的监控和故障排除，所以这应该是一个迭代的过程。事实上，与负责应用程序其余部分（无论是操作系统、应用服务器、Web
  服务器还是硬件本身）的团队保持良好沟通也是如此。


  在硬件趋势方面，正如我们在第 7 章中提到的，关系数据库最初是基于 1970 年代可用的硬件架构设计的。当时内存容量有限，关系数据库的设计基于无法将全部数据装入内存这一事实，仅在需要时从磁盘读取数据，并创建缓冲区管理器将最常用的数据保留在内存中。尽管处理器和内存速度以及内存和磁盘容量已大幅提升，但磁盘访问速度并未同步提高，导致磁盘访问时间与处理器、内存处理时间之间存在巨大差距。受限于移动机械部件，磁盘传统上一直是数据库系统中最慢的组件（或者如已故的
  Jim Gray 有时所描述的，“磁盘是新的磁带”）。


  数据量增大、高可用性要求和虚拟化等新趋势给数据库系统带来了额外的要求。我依然记得几十 GB 大小被认为是大型数据库的日子，但现在数据库大小已以 TB 计量，甚至
  PB 级别也已常见。数据现在还要求 7*24 小时可用（讽刺的是，我最初写下这段话时，正值达美航空的一次重大中断，导致其业务运营停摆数天）。数据可用性，甚至更糟的数据丢失，会严重影响业务。虚拟化和云服务是另一个重要趋势，越来越多的高性能和关键任务应用程序正迁移到
  Amazon AWS 或 Microsoft Azure 等服务上。


  幸运的是，也有新技术来应对这些新趋势和苛刻的要求。随着基于闪存的存储成本持续下降，闪存驱动器预计将在数据中心逐步取代基于主轴的磁盘，成为主要存储的企业实际标准。但由于关系数据库引擎仍在使用
  1970 年代定义的相同架构，有人建议开发新的查询处理算法来利用这种更快的存储。此外，由于许多数据库现在可以装入内存，诸如内存数据库等新技术正在被开发和实施。SQL
  Server 融入了这些技术，它们将在第 7 章中介绍。


  如前所述，优化存储的第二部分在于您的数据库内部。很多时候，看似是存储问题或存储性能难以跟上需求的问题，可以在 SQL Server 内部解决。我们将在本书的其余部分介绍许多此类技术。例如，当存储无法满足工作负载需求时，可以通过创建合适的索引、正确配置
  SQL Server 和 `tempdb`，或利用新的内存中技术（如 `In-Memory OLTP` 或 `列存储` 索引）来解决问题。随着闪存驱动器取代基于主轴的磁盘，一个误区很快出现，认为优化数据库和代码不再重要。事实绝非如此。


  最后，在选择和评估存储解决方案时，除了性能，还需要考虑可靠性、可用性等其他重要因素。诸如 `RAID`（独立磁盘冗余阵列）的冗余选择，或高可用性与灾难恢复解决方案，如
  `Windows 故障转移群集` 或 `SQL Server Always On 可用性组`，通常会在关键任务应用程序中实施。



  ## 存储类型


  虽然本书不涉及 SQL Server 常用存储的详细内容，但我认为它们通常可分为以下几类（除非另有说明，否则各类均可使用传统的基于盘片的磁盘、闪存盘存储或混合存储）：


  1.  存储区域网络（`SAN`）：提供对整合存储访问的专用网络。这是关键任务应用最常见的存储形式。


  2.  基于 PCI Express（`PCIe`）的固态硬盘（`SSD`）：这是通过此总线标准连接的闪存盘存储。


  3.  内部存储：使用服务器托架上的传统存储驱动器，如串行连接 SCSI（`SAS`）或串行 ATA（`SATA`）。


  4.  直连存储（`DAS`）：直接连接到服务器的存储，而非内部存储或通过网络访问的存储。`DAS` 可以是通常通过主机总线适配器（`HBA`）连接到服务器的
  `SAS`/`SATA` 驱动器。


  5.  文件共享/服务器：可用于 SQL Server 数据库的文件服务器，例如服务器消息块（`SMB`）文件服务器。`SMB` 文件共享也可用于 Windows
  故障转移群集安装。详见 [`https://msdn.microsoft.com/en-us/library/hh759341.aspx`](https://msdn.microsoft.com/en-us/library/hh759341.aspx)。


  虽然我曾将这些存储类型用于 SQL Server 实施，但在我职业生涯中见过的大多数关键任务或高性能应用程序都使用某种 `SAN` 存储。`SAN` 存储种类繁多，范围从传统的基于盘片的磁盘到全闪存盘存储或混合存储。`SAN`
  存储解决方案还提供与 SQL Server 中类似的功能，如快照、复制和压缩，尽管在某些情况下这些功能可以与 SQL Server 的功能互补。在其他情况下，它们可能执行相同的功能，并在启用时争夺资源，因此务必与存储管理员一起审查这些选项以及哪些选项可能有益于实施。再次强调，与存储管理员密切合作对于定义应用程序的数据库和存储架构至关重要。


  使用 `SAN` 存储还有其他优势，例如提供传统故障转移群集所需的共享存储。`SAN` 允许 SQL Server 群集的节点访问相同的存储卷，并在节点之间移动存储。但一次只有一个节点可以访问该卷。


  最后，其他一些高可用性或灾难恢复解决方案，如日益普及的 Always On 可用性组，或目前已弃用的数据库镜像技术，可以与任何类型的存储配合工作。可用性组和数据库镜像的工作方式类似，都在数据库级别以同步或异步方式复制数据。数据库镜像仅支持单个辅助副本，而可用性组可以有多个副本或辅助副本（但仅在
  SQL Server 企业版中）。可用性组的一种形式，称为基本可用性组，可在 SQL Server 标准版上使用，以实现针对单个数据库的故障转移环境解决方案。


  ## 基于闪存的存储


  随着基于闪存的存储成本持续下降，闪存驱动器有望逐渐取代数据中心中基于盘片的磁盘，成为主要存储的事实上的企业标准。闪存存储已经出现了一段时间。但正如其他流行技术所经历的那样，最初的大规模采用可能比较缓慢，因为有时技术要么最初价格过高，要么需要时间才能成熟。


  与闪存（一种非易失性半导体技术，没有移动机械部件）相比，基于盘片的机电磁盘包含旋转盘片和可移动的读写头。闪存用于随机 I/O 读取时比磁盘快许多倍，尽管对于顺序读取，尤其是写入，性能提升较为一般。它们的性能和价格比较取决于闪存驱动器的类型，范围从消费级如
  `TLC`（三层单元）或 `MLC`（消费级多层单元）到企业级存储如 `EMLC`（企业级多层单元）或 `SLC`（单层单元），尽管在最佳情况下已报告有亚毫秒级延迟。


  由于这些性能特性，对于具有大量随机 I/O 读取请求的应用程序（例如使用 OLTP 数据库的应用程序），闪存可能是一个绝佳的选择。具有大量顺序读取的数据仓库工作负载受益较少。闪存的另一个限制是它具有有限的可写次数，称为编程-擦除周期，这可能引入错误和故障，影响存储寿命。同样，错误的概率取决于闪存的类型，从消费级到企业级逐级降低。


  最后，当闪存驱动器最初问世时，其速度引发了一些神话，表明使用这种存储后不再需要查询优化（例如，无需担心索引调整、碎片整理或其他优化）。我甚至记得直接从供应商那里听到过这些说法。现实情况是，即使闪存提高了磁盘访问性能，特别是对于随机
  I/O，所有这些优化和配置仍然是必需的并且强烈建议进行。特别是当瓶颈存在于其他地方时，因为除非该瓶颈被解决，否则闪存驱动器的性能不会充分发挥。


  ## 数据库配置


  了解您的 I/O 工作负载以及数据库如何使用磁盘，对于专注于性能的高效设计至关重要。请务必进行此项研究，并向存储管理员提供所需信息，以便相应地配置磁盘。有时，I/O
  工作负载可能难以提前估算。很容易说 OLTP 数据库只会使用随机磁盘 I/O，但我尚未见到纯粹的 OLTP 工作负载。OLTP 系统通常包含一些报表查询、运行聚合的查询，甚至与业务相关的批处理作业。此外，OLTP
  系统还需要数据库维护活动，如数据库备份、数据库完整性检查、索引重建和重组、统计信息更新等，这些活动需要顺序磁盘 I/O 读取。另一方面，报表工作负载和数据仓库数据库主要为顺序
  I/O，以读取为主，另外还有定期更新数据库中数据的 ETL 作业。最后，正如第 7 章所涵盖的，随着可更新的非聚集列存储索引的引入，现在也可以在 OLTP 系统上运行分析工作负载，从而创建随机和顺序
  I/O 相结合的工作负载。



  ### 数据库文件


  数据库文件的放置仍然至关重要。传统上，一项最佳实践是将数据文件、事务日志文件和 `tempdb` 文件分离到不同的卷中。尽管在某些情况下，SAN 存储抽象可能使得这种分离并非绝对必要，但它仍然是一个良好的实践，因为分离也有助于维护和管理目的。与
  `tempdb` 类似（如第 4 章所述），为数据库拥有多个数据文件而非一个庞大的单一数据文件，可以提升性能和管理性，尤其是当您能将它们分离到不同驱动器以避免争用时。如果需要，您可以使用
  `sys.dm_io_virtual_file_stats` DMV 研究每个文件的 I/O 使用情况信息，如第 8 章所述。与 `tempdb` 一样，数据文件应初始配置为相同大小，以利用比例填充算法的优势。


  绝大多数情况下，每个数据库仅需一个事务日志文件。唯一可能需要第二个文件的例外情况，或许是当一个卷意外填满，您需要使用来自不同卷的空间时。事务日志文件受益于顺序读取，因此，如果您有多个数据库，您可以考虑将每个数据库的事务日志文件分离到各自的卷上。将多个数据库的事务日志文件放在同一个卷上，可能会将顺序读取变为随机读取，因为活动可能同时发生在所有数据库上。


  正确调整数据库文件大小并配置自动增长设置也很重要，因为通常 SQL Server 的默认值并不合适。使用的数值将取决于您的数据库大小和需求，并且如本书前文所述，建议根据分配的驱动器来指定最大文件大小，以避免代价高昂的自动增长操作和可能的碎片。请记住，即时文件初始化对数据文件有帮助，但对事务日志文件尚不可用。研究事务日志文件可能增长到的最大大小并设置该大小，是提升性能的最佳实践。除非您确定文件不会再增长，否则切勿收缩此文件。文件大小增长操作非常缓慢，尤其是在事务日志文件中，并且也可能引入一种特定类型的碎片，这将在本节稍后介绍。


  例如，如果您为一个数据库分配了 512 GB 的卷（包括未来增长的空间），请从一开始就分配所有可能的磁盘空间，或许仅留下您的磁盘监控工具所需的空间（这样您就不会收到那些磁盘已满或即将满的通知）。显然，如果多个数据库共享该卷，情况会变得稍微复杂一些，因此跟踪数据库增长趋势和统计数据可以帮助您做出这些决策。


  在数据库文件上设置最大大小，即使留有大量空白空间，也不会影响备份的大小，尽管它会影响用于可用性组、日志传送或数据库镜像配置的数据库副本。复制到其他环境（如 QA
  和开发环境）的数据库也会受到影响，尽管在还原时可以收缩它们以节省一些磁盘空间。


  ### 碎片


  碎片是可能在聚集索引、非聚集索引以及堆中发生的一个问题，并且可能损害执行扫描或顺序 I/O 的工作负载的性能。执行随机磁盘 I/O 的操作不受碎片的影响。碎片还可能限制预读操作的效率，因为它依赖于磁盘上连续的页面。SQL
  Server 使用的预读机制通过在查询实际使用之前将数据页引入缓冲池，来预测满足查询请求所需的数据页。一次预读操作最多可以读取 64 个连续页面或 512 KB。在基于闪存的存储上，监控和处理碎片也很重要。


  可以通过定期运行索引重新组织和索引重建维护作业，并为索引配置适当的填充因子来修复碎片。这些主题在第 9 章中介绍。事务日志文件也可能出现碎片，接下来将进行介绍。


  ### 虚拟日志文件


  SQL Server 事务日志文件被划分为虚拟日志文件 (VLF)，当创建大量这些 VLF 时，可能会导致内部碎片。此类文件碎片会影响事务日志操作的性能，并增加数据库恢复时间。足够数量的
  VLF 取决于事务日志文件的大小，尽管没有具体的推荐值，但它绝对不应该是数百或数千个。


  当最初创建事务日志文件时，它会具有初始数量的 VLF，这通常是足够的。但每次发生自动增长操作或手动扩展大小时，SQL Server 会添加几个 VLF（通常是
  4、8 或 16 个，具体取决于添加的大小）。随着时间的推移执行多次增长操作，可能会创建数百或数千个 VLF。要显示事务日志文件中的 VLF 数量，请运行以下语句，它将为每个
  VLF 文件返回一行：


  ```

  DBCC LOGINFO

  ```


  一个典型的汇总输出如下。


  | **RecoveryUnitId** | **FileId** | **FileSize** | **StartOffset** | **FSeqNo**
  | **Status** | **Parity** | **CreateLSN** |

  | --- | --- | --- | --- | --- | --- | --- | --- |

  | 0 | 2 | 458752 | 8192 | 70 | 2 | 64 | 0 |

  | 0 | 2 | 458752 | 466944 | 71 | 2 | 64 | 0 |

  | 0 | 2 | 458752 | 925696 | 72 | 2 | 128 | 0 |

  | 0 | 2 | 712704 | 1384448 | 73 | 2 | 128 | 0 |


  注意


  有关确定在创建、增长和自动增长操作中添加多少 VLF 所用算法的更多详细信息，您可以参考以下文章：[www.​sqlskills.​com/​blogs/​paul/​important-change-vlf-creation-algorithm-sql-server-2014/​](http://www.sqlskills.com/blogs/paul/important-change-vlf-creation-algorithm-sql-server-2014/)。




  ### 压缩


  压缩是另一个可用于提升 I/O 性能和优化存储使用的 SQL Server 功能，尽管其代价是额外的 CPU 资源。SQL Server 提供了多种压缩类型。常规表的**行压缩**和**页压缩**功能随
  SQL Server 2008 引入，并且这是一个需要在多个级别显式启用的功能：堆、聚集索引、非聚集索引和索引视图。如果使用了分区，还可以在分区级别进行配置。另一方面，列存储索引始终使用压缩，并且此功能不可由用户配置。最后，也可以在数据库备份上启用压缩。


  SAN 和其他一些存储解决方案也可能提供压缩功能，因此在做决定前，请与您的存储管理员协调，了解有哪些可用选项，尤其是在两个地方都启用压缩可能会额外消耗资源却可能没有带来额外收益的情况下。


  最后，**延迟持久性**是随 SQL Server 2014 引入的一项功能，在某些特定场景下可能对您有帮助。当您希望通过延迟日志缓冲区刷写到磁盘来提升事务性能时，但有一个非常重要的注意事项：在系统发生故障时，您可能会丢失事务。即使数据丢失仅在系统故障时才可能发生，这也可能是不可接受的，特别是当有大量应用程序期望保证持久性事务时。管理员可以在数据库级别使用
  `ALTER DATABASE SET DELAYED_DURABILITY` 语句，或在 Hekaton 本地编译存储过程中使用 `DELAYED_DURABILITY`
  子句来指定延迟持久性。`ALTER DATABASE SET DELAYED_DURABILITY` 语句还允许在事务级别启用延迟持久性，在这种情况下，必须在每个需要的事务中显式声明。有关更多详细信息，请参阅
  SQL Server 文档。


  ## 指标与性能


  在本节中，我将向您展示用于衡量存储性能的主要指标，以及您可以用来查看这些信息的工具，无论是来自 Windows 还是 SQL Server。主要指标如下：


  1.  IOPS（每秒输入/输出操作数）：指每秒执行的输入/输出操作次数。

  2.  **延迟**：也称为响应时间，是指完成单个输入/输出操作所需的时间。延迟通常以毫秒为单位衡量，而基于闪存的存储现在完成单个输入/输出操作只需几毫秒的几分之一。

  3.  **吞吐量**或**带宽**：指在特定时间内传输的数据量，例如，以 MB/秒为单位。


  这三个指标——IOPS、延迟和带宽——是密切相关的。由于延迟是完成单个输入/输出操作所需的时间，通过延迟，我们可以估算每秒可能完成多少操作（IOPS）。例如，如果您有
  1 毫秒的延迟，您大约可以每秒处理 1000 次操作，即 1000 IOPS。同样，吞吐量可以显示每秒传输的数据量。


  在第 8 章中，我们介绍了 `LogicalDisk` 和 `PhysicalDisk` 对象如何提供大量有助于监控系统中 I/O 操作的计数器。`LogicalDisk`
  和 `PhysicalDisk` 提供相同的计数器，但它们分别从逻辑磁盘或物理磁盘的角度提供信息。通过查看最有用的性能计数器，您可以轻松关联哪些计数器测量 IOPS、延迟或带宽。


  以下性能计数器用于测量延迟：


  *   平均磁盘秒/传输（Avg. Disk sec/Transfer）：`Avg. Disk sec/Transfer` 是平均磁盘传输时间（以秒为单位）。

  *   平均磁盘秒/读取（Avg. Disk sec/Read）：`Avg. Disk sec/Read` 是从磁盘读取数据的平均时间（以秒为单位）。

  *   平均磁盘秒/写入（Avg. Disk sec/Write）：`Avg. Disk sec/Write` 是向磁盘写入数据的平均时间（以秒为单位）。


  以下性能计数器用于测量吞吐量：


  *   磁盘字节/秒（Disk Bytes/sec）：`Disk Bytes/sec` 是在写入或读取操作期间，字节传输到或从磁盘传输的速率。

  *   磁盘读取字节/秒（Disk Read Bytes/sec）：`Disk Read Bytes/sec` 是在读取操作期间，从磁盘传输字节的速率。

  *   磁盘写入字节/秒（Disk Write Bytes/sec）：`Disk Write Bytes/sec` 是在写入操作期间，传输到磁盘的字节速率。


  以下性能计数器用于测量 IOPS：


  *   磁盘传输/秒（Disk Transfers/sec）：`Disk Transfers/sec` 是磁盘上读取和写入操作的速率。

  *   磁盘读取/秒（Disk Reads/sec）：`Disk Reads/sec` 是磁盘上读取操作的速率。

  *   磁盘写入/秒（Disk Writes/sec）：`Disk Writes/sec` 是磁盘上写入操作的速率。


  最后，一个重要的性能计数器 `Avg. Disk Queue Length` 显示了特定磁盘上排队的读取和写入请求的平均数量。


  有几种工具可用于测量存储性能，这有助于在生产环境实施数据库前后建立基线或进行性能故障排除。这些工具范围广泛，从性能监视器（Performance Monitor，这是数据库专业人员非常熟悉的工具，第
  8 章已介绍）及其重要性能计数器，到其他 Windows 工具如资源监视器（Resource Monitor），或一些实用程序如 `Diskspd` 或 `SQLIOSim`。过去一些非常流行的实用程序，如
  `sqlio` 或 `SQLIOStress`，已被取代。现在应使用 `Diskspd` 或 `SQLIOSim` 代替。在本节中，我将对这些工具进行概述。


  ### 资源监视器


  资源监视器是一个 Windows 实用程序，可用于实时获取有关硬件（如处理器、内存、磁盘和网络）以及软件（如文件句柄和模块）和资源使用情况的信息。为了快速了解如何实时查看文件性能信息，让我们创建一个练习来对系统施加压力，执行与第
  8 章中相同的练习。使用 SQL Server 默认选项创建一个新数据库，并运行以下语句：


  ```

  CREATE TABLE t1 (id int IDENTITY(1,1), name char(8000))

  ```


  添加数据以对事务日志文件施加压力：


  ```

  BEGIN

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  END

  GO 30000

  ```


  在资源监视器中，选择“磁盘”并按“写入 (B/秒)”排序，您将看到压力测试对数据库文件（包括数据文件和事务日志文件）的影响，如图 11-1 所示。


  ![../images/393702_2_En_11_Chapter/393702_2_En_11_Fig1_HTML.jpg](img/393702_2_En_11_Fig1_HTML.jpg)


  *图 11-1* Windows 资源监视器显示磁盘信息




  ### Diskspd


  Diskspd（或 Diskspeed）实用工具是一个命令行存储测试工具，它替代了 sqlio——一个多年来 SQL Server 专业人员广泛使用但现已无法下载的工具。Diskspd
  的主要侧重点是性能测试，尽管准确性同样重要，因为该工具会验证数据是否被正确读取和写入。与 SQLIOSim（它使用最少数量的参数并自动测试所有常见的 SQL Server
  存储访问模式）不同，Diskspd 对 SQL Server 存储使用一无所知，需要由你来使用正确的参数来模拟适当的测试。


  Diskspd 可用于各种存储，例如本地磁盘、SAN 上的 LUN 或 SMB 文件共享，并且与 SQLIOSim 一样，不需要安装 SQL Server。Diskspd
  可从 [`https://gallery.technet.microsoft.com/DiskSpd-a-robust-storage-6cd2f223`](https://gallery.technet.microsoft.com/DiskSpd-a-robust-storage-6cd2f223)
  下载，并且由于它目前是开源的，其 C++ 源代码也已在 [`https://github.com/microsoft/diskspd`](https://github.com/microsoft/diskspd)
  提供。


  如果你之前使用过 sqlio，那么 Diskspd 应该非常简单直接，因为其工作方式非常相似。如果你是第一次接触这类实用工具，可能需要一些时间来学习如何使用它来模拟特定的
  SQL Server I/O 模式。


  Diskspd 包含其自带的文档，随软件下载一起提供，此外还包括关于使用 Diskspd 模拟 SQL Server 工作负载的指导文档。该文档名为“在 SQL
  Server 环境中使用 DiskSpd”，其中包含 SQL Server 在不同操作（如常规活动、检查点、惰性写入器、大容量插入、备份、还原、`DBCC CHECKDB`、索引重建、数据文件的预读或日志文件的常规活动）中使用的典型读写模式信息。例如，SQL
  Server 的常规活动读取和写入的数据块大小从 8 KB 到 128 KB 不等，预读最多使用 512 KB，而检查点可以写入 64 KB 到 128 KB
  的数据。该文档还包含有关使用的线程数以及 I/O 模式是随机还是顺序的信息。你可以使用此工具在 Diskspd 中帮助模拟这些 SQL Server I/O 模式。更多详情请参阅该文档。


  让我们创建一个练习：以管理员身份打开命令提示符窗口并执行以下命令：


  `diskspd -c1024M -d120 -r -w0 -t8 -o8 -b8K -L test.dat`


  所选参数的含义如下：


  -   `-c1024M`: 创建一个 1,024 MB 的文件

  -   `-d120`: 测试持续时间，本例为 120 秒

  -   `-r`: 随机 I/O

  -   `-w0`: 写入请求的百分比，本例为 0，因为是只读工作负载

  -   `-t8`: 线程数

  -   `-o8`: 每个线程的未完成 I/O 请求数

  -   `-b8K`: 块大小

  -   `-L`: 测量延迟统计数据

  -   `test.dat`: 为测试创建的文件


  可选地，你可以使用输出参数来更好地控制输出的数据，而不仅仅是在命令提示符窗口中查看。测试完成后，将显示类似以下的信息。第一部分将显示所用参数的摘要。第二部分将显示每个处理器的
  CPU 利用率摘要，如下所示：


  ```

  CPU |  Usage |  User  |  Kernel |  Idle

  0|  21.38%|  14.66%|    6.72%|  78.62%

  1|  22.47%|  15.53%|    6.94%|  77.53%

  2|  19.36%|  14.52%|    4.84%|  80.64%

  3|  23.29%|  17.40%|    5.90%|  76.71%

  avg.|  21.63%|  15.53%|    6.10%|  78.37%

  ```


  接下来的三个部分显示读取 I/O、写入 I/O 和总 I/O。由于我只请求了读取，写入 I/O 将显示为 0，而读取 I/O 和总 I/O 将相同。一个小型示例如下：


  ```

  Read IO

