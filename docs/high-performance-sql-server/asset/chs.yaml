  查询执行后，它们很可能会进入计划缓存，然后您可以创建一个 DTA 会话，选择 `Plan Cache` 作为工作负载。当您调优计划缓存时，您并没有显式提交查询。因此，在调优会话结束时查看报告（例如
  `Statement detail` 报告）以了解调优了哪些类型的查询就更加重要了。您可以如前所述在 `Reports` 选项卡上找到这些内容。在我的案例中，我得到了与之前文件练习相同的建议，但需要提醒的是，当您调优计划缓存时，您对要调优哪些查询的控制可能较少。


  好奇 DTA 如何决定从计划缓存中调优哪些查询吗？您可以使用 SQL 跟踪或扩展事件查看 DTA 提交给数据库引擎的查询。这是我在测试中得到的结果，它显示 DTA
  提交了以下查询，以根据持续时间找出最耗费资源的 1000 个查询：


  ```sql

  select top 1000 isnull(st.objectid,0),

  isnull(st.dbid,0), avg(cp.execution_count), st.text

  from sys.dm_exec_query_stats cp

  cross apply sys.dm_exec_sql_text(cp.plan_handle) st

  where cp.creation_time < N''2016-08-08 03:47:06.273'' and st.dbid in (9)

  group by st.text,st.objectid,st.dbid

  order by sum(total_elapsed_time) desc

  ```


